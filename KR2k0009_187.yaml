body:
  text: 思南府在責州省治東北六百里東西距四百里南北距五百六十里東至銅仁府界一百里西至遵義府界三百里南至石阡府界六十里北至四川酉陽州彭水縣界五百里東南至銅仁府界一百八十里西南至石阡府龍泉縣界五十里東北至四川酉陽州界三百七十里西北至四川瀘州合江縣界二百一十五里自府治至京師七千三百九十五里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州荒裔戰國時為楚地秦屬黔中郡漢為武陵郡酉陽縣地三國吳以後為黔陽縣地元和志思州自漢至呉並為武陵郡酉陽縣地吳分置黔陽縣至梁陳不改隋為巴東郡務川縣唐初於縣置務州貞觀初改為思州舊唐書地理志武德四年置務州領務川等三縣貞觀元年以廢夷州六縣廢思州五縣來屬務州四年改務州為思州天寶初改州為安夷郡隸江南道乾元元年復為思州五代時入於蠻宋政和八年復置思州屬䕫州路宣和中廢紹興初復置宋史地理志思州政和八年建領務川邛水安夷三縣宣和四年廢州為城紹興元年復為思州元初置思州軍民安撫司泰定中改為宣慰司元史泰定帝紀三年十一月以思州土官田仁為思州宣慰使明洪武五年析置思南宣慰司屬湖廣明地理考思州洪武初析為二宣慰屬湖廣永樂中置思南府屬貴州布政司明統志永樂十一年改宣慰司為府通志時宣慰田氏以不法廢因改為思南府本朝因之屬貴州省領縣三土司二安化縣附郭東西距一百八十里南北距二百五十里東至印江縣界四十里西至石阡府龍泉縣界一百四十里南至銅仁府界一百四十里北至婺川縣界一百一十里東南至銅仁府界一百五十里西南至石阡府界六十里東北至四川酉陽州界一百三十里西北至四川彭水縣界二百五十里漢武陵郡酉陽縣地隋務川縣地唐為思州治又置思王縣屬思州五代時俱廢宋仍為務川縣地元置思州安撫司領水特姜長官司明洪武初改水德江長官司隸思南宣慰司治鎮遠州二十二年還治水德江永樂中始為思南府治萬厯三十三年置安化縣仍為府治本朝因之婺川縣在府城西四百里東西距八十五里南北距一百六十里東至安化縣界五十五里西至石阡府龍泉縣界三十里南至安化縣界六十五里北至遵義府正安州界九十五里東南至安化縣界五十里西南至龍泉縣界五十里東北至四川彭水縣界一百二十五里西北至正安州界七十里漢武陵郡酉陽縣地自晉至陳為黔陽縣地隋置務川縣屬庸州後屬巴東郡唐置高富縣屬夷州後廢宋政和中復置思州及務川縣於此宣和中廢為堡隸黔州紹興初復為縣仍屬思州元曰婺川縣屬思州安撫司明初屬思南宣慰司永樂中改屬思南府本朝因之印江縣在府城南四十里東西距六十里南北距三百四十里東至本府屬朗溪司界十五里西至安化縣界四十五里南至銅仁府界一百二十里北至本府屬沿河司界二百二十里東南至銅仁府界四百里西南至安化縣界六十里東北至四川酉陽州界八十里西北至安化縣界七十六里漢武陵郡酉陽縣地自晉至陳為黔陽縣地隋為務川縣地唐開元四年置思卭縣屬思州五代時廢宋政和八年置邛水縣屬思州宣和中廢為堡紹興初復為縣隸黔州元置思卭江等處長官司屬思州安撫司後訛卭為印明洪武初屬思南宣慰司永樂中屬思南府宏治七年改置印江縣仍屬思南府本朝因之朗溪長官司在府城東八十里元置朗溪洞官明洪武十年改置今司屬思南宣慰司永樂中改屬烏羅府正統三年仍屬思南府正長官田姓副長官任姓沿河祐溪長官司在府城北二百一十里元置沿河祐溪二司屬思州軍民安撫司明合置今司永樂中屬思南府正長官張姓副長官冉姓形勢山川險阻牂牁要路明皇輿考二江襟帶於左右重岡起伏於四隅明統志上接烏江下通楚蜀商旅康莊舟車孔道黔記風俗蠻獠雜居言語各異寰宇記信巫屏醫擊鼓迎客明統志漸被徳化務本力穡唱歌耕種明皇輿考城池思南府城周四里有奇門五水門一明宏治十四年建本朝順治十八年修康熙十二年增修安化縣附郭婺川縣城周三里門四明嘉靖二年建本朝康熙十年修印江縣城周二里有奇門四明嘉靖二十八年建本朝康熙十一年修學校思南府學在府治東北明永樂十三年建本朝康熙十年修二十八年雍正十二年重修入學額數二十名安化縣學在府治北本朝康熙三十八年建雍正五年修入學額數十二名婺川縣學在縣治東舊在治南明嘉靖閒建萬厯五年徙建本朝康熙五十五年修入學額數八名印江縣學在縣治南明萬厯中建後圯本朝順治十七年重建康熙十年修三十一年重修入學額數八名大中書院在府治中和山萬厯中建為仁書院在府城内明知府田稔與郡人李渭溝學於此本朝康熙三十年修鳳岡書院在府城内本朝嘉慶十一年建古務書院在婺川縣城内本朝乾隆四十一年建振徳書院在印江縣城北登文書院在印江縣城内本朝乾隆十五年建按舊志有斗坤書院在府城東明隆慶中建今廢户口原額人丁一千八百一十五今滋生男婦大小共三十三萬五千八百八十二名口計八萬二千八百四十二户田賦田地山塘共一十萬四千三百六十七畝二分有奇額徴地丁正雜銀八千三百八十六兩八錢八分四釐米一千二百四十六石五斗山川中和山在府治内通志山勢紆折上多古柏俯瞰江流為郡大觀萬勝山在府城東一里一名萬聖山名勝志四面陡絶元末紅巾之亂郡人避兵於此通志上平坦可耕明嘉靖中郡人李渭築室讀書其中府志山高數十仞下臨徳江知府趙恒鐫仁壽二字於山腰石壁故又名仁壽山東勝山在府城東三里一名東山通志孤峯竦峙如畫思唐山