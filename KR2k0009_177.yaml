引去安輯流亡給牛種勸開墾民得復業賈漢誼曲沃人順治十六年知鬱林州兵燹後地多荒蕪漢誼履畝量丈釐正賦役至今賴之張應勝江西人康熙時知北流縣時孫延齡擁衆來攻應勝調集鄉勇固守三日守備常濳出降賊城遂陷應勝力戰為賊所害家丁五人工書何涵皆戰死賈有福錦州人康熙二十三年知鬱林州值土寇猖獗潯梧各路進兵會勦有福匹馬從征諸盜相繼擒治州經兵燹多逋欠力請蠲除民獲安堵人物唐龎孝泰博白人龍朔中以左驍騎將軍為遼東道行軍總管與蘇定方程名振等征高麗嶺西兵逼蛇水蓋蘇文來攻孝泰與戰手殺數十人兵少力屈死之宋徐噩博白人仁宗時鄉舉攝宜州討歐希範有功授白州長史皇祐中儂智高叛噩引兵追至亟陽大㨗厯戰於金城驛援兵不至死之贈大理寺丞秦懷忠博白人嘉祐初以進士令徐聞有異政再任雷州推官平反冤獄擢僉書雷州軍事厯知容州李時亮博白人嘉祐進士累官知廉州有異政熙寕中交人犯境獻平邊十築又疏時政得失五十事神宗嘉納之累遷散騎常侍冼積忠北流人紹興進士官朝請大夫知白州有治聲州志作積中但中庸北流人紹興進士官至廣東提點刑獄砥礪名節政績著聞陳應博白人德祐中為南流尹元以譚道福知鬱林州應與提刑鄧得遇合謀倡義乘除夜三鼓奮勇登城殺邏卒道福遁去得遇疏上其事擢應藤州知州後元兵大至得遇死難應削迹不知所終元龎森北流人至順中厯官台州通判制行廉潔以古名賢自期嘗手書漢循吏傳於壁以自警明陶成鬱林人永樂中舉于鄉為交阯鳳山典史尚書黄福薦其賢命暑諒江府敎授夷人化之正統中厯官浙江副使遇事敢任處州賊葉宗留等作亂成屢破之後與都指揮僉事崔元戰死時景泰元年五月也事聞贈左叅政陶魯成子以父䕃授新會丞時甫弱冠縣令王重器之勉之學天順中以破賊功就遷知縣成化宏治時屢破劇賊厯官至湖廣布政使兼廣東按察副使領嶺西道事魯善撫士多智術謀定後戰鑿池公署後為亭其中不置橋夜則召部下計事以板度語畢今退故常得勝算而機不洩厯官四十五年始終不離兵事然不專尚武治寇賊先化之不得巳乃用戰每平賊率置縣建學以興敎化前後大小數十戰奪還𬒳掠及撫安復業者十三萬七千有奇兩廣人倚之如長城子荆民以父功世襲副千户李宏北流人永樂進士擢御史嘗上時政十事皆經國正論多見施行文旭鬱林人宏治時以歲貢授奉議衞經厯父早殁事母至孝子濳亦以孝稱親殁廬墓三年濳姪桂少孤天性孝友長於文學嘉靖中舉于鄉何以尚興業人嘉靖末由舉人官户部司務會主事海瑞以直諫下獄以尚抗疏論救予杖奪職隆慶初起光祿寺丞又以劾高拱坐謫拱罷起雷州推官終南京鴻臚卿黄燦然博白人由舉人知大昌縣後歸里為安仁賊所執不屈罵賊死十一年本朝乾隆四賜諡節愍本朝鄭振祖鬱林人順治初鬱林有土寇人鎮紏衆圍州城厯三月城内糧盡有顔伯素者領兵博白振祖與弟拔祖夜縋城出潛詣顔請救未至而土寇蕭荆壁先計誘破城三人引兵力戰殺賊甚多力屈遇害楊嗣秉鬱林人早孤母周氏患咯血病嗣秉廢業攻醫鬻產以供湯藥厯十七載侍奉不倦周以壽終馬若光鬱林人㓜喪父順治十一年賊李定國掠州境與母黄氏避兵山中母被執若光冐刃入賊泣語賊殺巳以釋其母賊感動遂俱釋以歸龎頴陸川人順治庚子舉人知嘉魚縣有循蹟當夏包子之變獨守孤城盡力保禦嘉人請為立祀張暎軫鬱林人康熙二十九年副榜初土寇唐朝鳳荼毒州境其母被掠時軫年十二匍匐號救賊異而釋之陳朝圭鬱林人㓜鞠於繼母及卒廬墓三年遇大風鄰屋盡壞而朝圭廬獨存異母弟妹皆㓜朝圭維持調䕶有人所不能堪者既長畢為婚嫁雍正中由副貢知辰溪縣民敬戴之如父母調永順終道州知州譚載球鬱林人家貧負薪以養親一日隨父趁墟賊刧其父載球力救得免父母卒皆廬墓三年得食則祭祭未嘗不撫塜長號雍正十三年旌乾隆十四年祀孝子祠文兆龍鬱林人歲貢父病侍湯藥不離側適寇至負父拜泣寇為感動不相驚擾母張氏患癆咳兆龍憂形于色朝夕祈於神以延母壽壽果至七十有八乾隆八年旌祀孝子祠李甲先博白人貢生由敎諭遷慶遠敎授與兄甲芳事親俱以孝聞甲芳卒甲先視其子如子嘗以學俸置義田給族之耕讀者辛丑秋邑大饑乃取家財擇里中少壯人授一金使出糴老稚不能行作糜賑之年八十三卒又同邑李維藩李廷芬皆以孝稱流寓元文升宋相天祥弟壁之子也天祥死難以井為嗣後仕元海北廉訪使卒於鬱林之八曡岡子孫遂家焉列女晉石崇妾綠珠博白人姓梁氏孫秀使人求之崇不與秀怒勸趙王倫誅崇因矯詔收之崇謂珠曰我今為爾得罪珠泣曰當効死於官前遂自投樓下死明李啟東妻徐氏博白人成化中龍山賊陷城徐被掠罵賊而死朱文盛妻謝氏陸川人正德中賊犯縣城獲文盛索金謝往紿賊願以身代夫取銀以贖賊釋文盛謝為所害楊四妻劉氏興業人少寡有富商艷其色欲強取之啗以財劉不從逮於獄脅之服毒死梁英女鬱林人名新姐年十七嘉靖中賊刼其家欲汚之不從被殺陳所藴妻呉氏鬱林人所藴以舉人會試道亡呉聞訃旬日不食將死姑慰諭乃進食時年二十二既釋服姑憐其少無子欲嫁之呉引刀自毀其貎姑死貧無以葬拮据將事數膺旌表廖錦妻文氏鬱林人錦應試卒於途文年二十二無子有鄉貴謀議㛰者文峻拒之矢節以終鄧日孚妻陶氏鬱林人孚鄉試還灕江舟覆死訃聞陶吞金不死又絶粒半月不死遂盡焚服飾縞衣蔬食以終其身曾才魯母楊氏鬱林人年十六孀居撫孤始終不渝龎文甸妻梁氏陸川人年十九而寡誓志矢節媒氏逼嫁不從服毒死本朝王氏三烈博白農家女亥娘酉娘竹姑康熙十九年避亂於宴石巖寇攻急三女度不得免俱投崖死縣令程鑣立三烈祠於崖下關于袞妻文氏鬱林人夫亡守節與同州楊作屏妻陶氏均康熙年間旌陳仁道妻龎氏博白人康熙十九年寇剽掠其夫集衆拒之為所害氏購骸歸葬盡變其產募壯士摛賊縛殺以祭夫墓紡績守節終其身又同縣王祚釗妻朱氏年二十一夫卒家貧無手足助值土寇亂避居山中嵗洊飢備極艱苦朱之虬妻林氏孝事舅姑舅姑繼没夫亦早世林年二十五子景博景邑及夫弟玿熙皆㓜值閩盜葉天易亂林攜家匿深山中屢瀕於危亂定後歸其故廬以十指營舅姑葬以耕讀朂其家後次子景邑亦早卒婦李氏依姑守志陳世瓉妻梁氏鬱林人夫亡守節與同州烈婦文秉世妻梁氏均雍正年間旌秦泗衡妻劉氏博白人夫亡守節雍正年間旌何士逢妻盧氏北流人年二十二而寡撫遺孤成立與同縣李天樞妻鄒氏李文煒妻黄氏謝朝薦妻陳氏李朝瓚妻龍氏羅文滔妻某氏均雍正年間旌龎順妻梁氏陸川人夫卒閉户自經以救得生自是毀容縞素孝事姑撫孤子騆並夫㓜弟顃頔皆成立雍正三年旌同縣龎隷妾李氏吕繹如妻陳氏子若契妻李氏均雍正年間旌楊元浩妻龎氏鬱林人守節撫孤其子式序妻李氏亦矢志守貞姑媳以雙節稱乾隆元年旌同州李以峒妻鄧氏鐘培妻蘇氏晏朝妻蔣氏鍾夢獬妻黄氏張映翼妻黎氏楊彥炯妻李氏蘇其燆妻文氏文道新妻龎氏梁玉英妻龎氏文際泰妻李氏陳聚震妻李氏黎士雅妻馮氏蘇孫槐妻文氏辛國相妻李氏黎若淳妻梁氏梁海立妻楊氏盧偉才妻王氏李溶妻楊氏陳朝堂妻王氏楊廷楷妻秦氏梁廷培妻牟氏鍾業妻楊氏牟維楹妻龎氏牟照彰妻楊氏梁應朝妻黎氏梁汝烈妻楊氏王正簡妻蘇氏陶璋妻文氏盧廷彦妻王氏英慎叅妻甘氏均乾隆年間旌陳朝執妾鍾氏鬱林人嫁二十八日而夫卒嫡妻晏氏無子諭以他適答以從一而終泣拒之旦夕侍晏側晏惑於堪輿鍾勸其早葬晏病久侍湯藥寢食俱廢晏年八十三鍾年六十三嵗卒士民請祀節孝同州秦昌祺妻楊氏姑年八十餘病牀褥楊侍湯藥供溺溷寒暑不少懈亦以節稱唐元理妻陳氏鬱林人夫亡擇姪為後家貧翁姑皆在殯勤紡績以葬嗣子僖娶鄧氏生子而殁姑婦相依為命一門雙節鄉理敬之朱繼喜女三妹博白人年十三守正捐軀乾隆二年旌同縣節婦黄之璠妻文氏黄鍾存妻羅氏李廷柱妻張氏王德隆妻謝氏呉地穰妻李氏劉芳妻陳氏林兆奇妻朱氏秦理妻楊氏朱景尚妻呉氏黄玉琚妻羅氏莫子聰妻鍾氏黄日俊妻程氏媳羅氏朱之選妻王氏媳李氏均乾隆年間旌秦儒瑋妻梁氏博白人年二十六夫亡子㓜翁老家貧氏嘗食野蔬而以榖飯翁翁見梁孟中僅藜藿悲泣失聲梁跪泣曰翁第看二孫成立媳之福也他何足計後翁殁貸棺而斂紡績償其值與同縣朱衍金妻掲氏賓汝斂妻馮氏李廷芳妻朱氏俱以節孝聞曹大經妻李氏北流人夫亡守節同縣楊元萱妻曹氏蒙用黼妻陳氏梁世正妻李氏陳祖仁妻李氏曾仁禎妻梁氏邱曰信妻陳氏顧紹基妻袁氏梁翹槫妻韋氏蔡啟文妻鄒氏李靄吉妻譚氏梁世臻妻曾氏馬乃驤妻李氏林翰妻邱氏李諏吉妻陳氏蒙懋績妻李氏顧紹勲妻李氏蔣上塤妻區氏李維凝妻梁氏陳斯猷妻梁氏均乾隆年間旌龎顗妻呉氏陸川人夫亡守節撫孤成立後子及孫相繼亡與媳黄氏孫媳李氏三世孀居一門苦節乾隆元年旌同縣龎䪸妻余氏龎嶠妻陶氏龎崧妻謝氏楊文德妻湯氏江騰鰲妻黄氏傅宗禮妻李氏陳煥妻盧氏陳士光妻王氏陳奎妻黄氏均乾隆年間旌蘇芳鎬妻陳氏鬱林人夫亡守節與同州梁棟概妻李氏何殿㼂妻薛氏黄景堂妻梁氏均嘉慶年間旌王久譽妻張氏博白人夫亡守節與同縣李德輝妻唐氏黄德光妻謝氏均嘉慶年間旌闕邦覲妻寗氏北流人覲選庶常未及娶而卒寗奔喪守貞與同縣節婦曾衍侯妻馬氏曹與妻陳氏劉文瀾妻陳氏党高先妻呉氏伍者敘妻梁氏凌卓漢妻梁氏楊峻妻寗氏龎潮玉妻梁氏均嘉慶年間旌李時銘妻陳氏陸川人捐軀明志嘉慶四年旌覃瑞莊妻唐氏興業人夫亡守節與同縣壽婦耆氏龎則孟妻黎氏俱嘉慶年間旌按舊志嘉靖中縣令張子英妻卜氏為賊所刼墜樓死民立貞烈祠祀之熊伯虎妻張氏湖南祁陽人順治中随夫僑寓博白時陸川盜某伺伯虎往北流使其黨殺於路欲奪張張自經死其侍女亦赴火死謹附記仙釋元李龍興業人至正間事修煉術偶攜妻至外家酣飲還途中謂妻曰體中燥痒不可忍㑹須過前溪一浴爾姑待於此有頃風雨驟作妻趨視之則遍身鱗甲矣屬曰我嵗一來歸當以米糕祀我遂化龍去每嵗果一還還則雨足稼豐鄉人呼其居曰李龍宅土產布元和郡縣志鬱林貢紵布勾芒木明統志皮可績為布鬱林州出椰子格古要論出鬱林州樹似梹榔實大如瓜肉白可食鋸開中有酒微酸謂之椰子酒其殻可為酒器人面子格古要論出鬱林州春花夏實秋熟雨邊似人面故名縮砂明統志鬱林州博白縣岀葛仙米出北流勾漏洞水澤間暴乾仍漬以水如粒米狀以酒泛之清爽襲人苗蠻夷人在鬱林州居山谷食用手搏酒名都林合糟共飲死則打鼓助哀其在廢黨州古黨峒者男椎髻女散髮徒跣吹笙巢居夜泊猺在博白縣無版籍散居各堡在北流居縣治南雞兒坡南祿茆田那留等十二村男女跣足或著木履性頗馴在陸川居深山中伐木燒地種稻粟薑瓜茹芋為食性敦樸寄物善藏經久不失也獞在北流縣與猺錯居習俗亦同狼在鬱林州東北四十里抵大容山皆是俗近猺而不為患明正徳間苦流寇募充戍兵其後授田編户謂之熟狼在博白善用銅礮健守石梯界牌諸隘設狼目總之佃田輸賦與民無異在陸川者來自賓州使充戍卒授田耕守别置狼籍在興業居興德鄉二三圖耕山采樵夜然松薪代燭山子在博白縣者即猺類習尚亦同在陸川縣者居山伐木種地性極淳樸纂修官臣李紹昉恭纂臣蔣立鏞恭纂提調官前總纂臣鄭紹謙恭覆輯校對官臣吳清皋恭校
