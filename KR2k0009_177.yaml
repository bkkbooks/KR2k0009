body:
  text: 太平府在廣西省冶西南二千五十里東西距四百八十里南北距二百八十五里東至南寕府宣化縣界二百三十里西至越南界二百五十里南至南寕府土忠州界七十里北至南寕府歸德土州界二百十五里東南至南寕府遷隆峒界二百里西南至越南界二百七十五里東北至南寕府隆安縣界二百六十里西北至鎮安府都康土州界二百二十五里自府治至京師九千五百十里分野天文翼軫分野鶉尾之次建置沿革禹貢􅍮州南裔周百越地漢鬱林郡臨塵雍雞等縣地晉以後為蠻獠所居唐置羈縻州屬邕州都督府宋初分為左江道後析置太平砦仍屬邕州九域志止有太平砦明統志又有古萬遷隆永平横山共為五砦各領州縣峒元置太平路仍屬左江道明洪武二年改為太平府屬廣西布政使司本朝因之屬廣西省領廳二州四縣一土州十六舊設十八員雍正七年裁上石西一員十一年裁思誠一員土縣二土司一崇善縣附郭東西距一百五里南北距七十八里東至左州界四十五里西至上龍土司界六十里南至土江州界八里北至太平土州界七十里東南至土江州界五里西南至上龍土司界五十里東北至左州界五十里西北至太平土州界七十里宋置太平砦又分置崇善縣屬之元屬太平路明初屬太平府嘉靖十七年始移縣入府郭為府治本朝因之左州在府北一百里東西距七十五里南北距五十九里東至永康州界四十里西至太平土州界三十五里南至崇善縣界四十四里北至永康州界十五里東南至崇善縣界五十里西南至太平土州界四十里東北至永康州界五十里西北至太平土州界二十里唐置羈縻左州屬邕州都督府宋屬左江道元屬太平路明屬太平府本朝因之養利州在府北一百五十里東西距七十里南北距四十五里東至萬承土州界十五里西至龍英土州界二里南至太平土州界三十里北至茗盈土州界十五里東南至永康州界六十里西南至崇善縣思誠界二十里東北至茗盈土州界十里西北至龍英土州界五里宋置養利州屬太平砦元屬太平路明屬太平縣宣徳七年改同正州本朝因之永康州在府東北一百八十五里東西距六十五里南北距九十五里東至羅陽土縣界五里西至萬承土州界六十里南至崇善縣界八十里北至南寕府宣化縣界十五里東南至羅陽土縣界八里西南至崇善縣界八十里東北至羅陽土縣界十里西北至南寕府隆安縣界八十里宋置永康縣屬遷隆砦元屬太平路明屬太平府成化八年改同正縣萬厯二十七年升為永康州本朝因之寕明州在府西南一百二十里東西距九十里南北距一百十五里東至土思州界四十五里西至下石西土州界四十五里南至越南界七十里北至上龍土司界四十五里東南至土思州界二十五里西南至越南文淵州界一百五里東北至土思州界二十五里西北至龍州㕔界五十里唐宋羈縻思明州地元别置思明州屬思明路明屬思明府萬歴十年改屬太平府本朝康熙五十八年改設流官雍正五年罷知州以思明府同知管州事十一年改為寕明州仍設知州屬太平府太平土州在府西北一百十里東西距七十里南北距六十里東至左州界四十里西至安平土州界三十里南至崇善縣界二十里北至養利州界四十里東南至崇善縣界三十里西南至上龍土州界三十里東北至左州界六十里西北至崇善縣思誠界十五里宋置太平州屬太平砦元屬太平路明屬太平府本朝因之安平土州在府西北一百三十七里東西距六十一里南北距五十里東至崇善縣思誠界一里西至越南界六十里南至上龍土司界二十五里北至鎮安府下雷土州界二十五里東南至太平土州界七里西南至上龍土司界三十里東北至崇善縣思誠界五里西北至下雷土州界六十里唐置羈縻波州屬邕州都督府宋皇祐元年改曰安平州屬左江道元屬太平路明屬太平府本朝因之萬承土州在府東北一百五十里東西距四十里南北距五十五里東至永康州界二十里西至養利州界二十里南至永康州界四十里北至全茗土州界十五里東南至永康州界八十里西南至養利州界十五里東北至都結土州界八十里西北至茗盈土州界四十里唐置羈縻萬承州屬邕州都督府宋屬左江道元屬太平路明屬太平府本朝因之茗盈土州在府東北一百七十里東西距十六里南北距十二里東至萬承土州界十五里西至全茗土州界一里南至養利州界七里北至全茗土州界五里東南至養利州界十五里西南至全茗州界一里東北至全茗土州界十一里西北至全茗土州界五里宋置茗盈州屬邕州元屬太平路明屬太平府本朝因之全茗土州在府北少東一百六十里東西距二十里南北距二十三里東至茗盈土州界一里西至龍英土州界十九龍英土州界二十里南至茗盈土州界三里東南至茗盈土州界里北至三里西南至茗盈土州界十八五里西北至龍英土州里東北至茗盈土州界十界十六里宋置全茗州屬邕州元屬太平太平府本朝路明屬因之龍英土州在府西北二百里東西距八十五里南北距九十鎮安府上映土州里東至養利州界七十里西至界十五里南至崇善縣思誠界四十里北至結安土州界五十里東南至養利州界四十里西南至鎮不府下雷土州界五十里東北至全茗土州界二十五州界三十里西北至鎮安府都康土里宋為龍英峒屬太平砦元置龍英州屬太平路明平府本朝因屬太之佶倫土州在府東北二百三十里東西距七十五六里南北距二十五十里西至鎮逺土里東至南州界十五寕府果化土州界里南至都結土州界五果化里北至南寕府歸德土州界二十里東南土州界四十里西南至結安土州界十五至里東北至果化土州界