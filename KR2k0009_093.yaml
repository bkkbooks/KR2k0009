front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_093-1a}
body:
  text: 蘭州府二古蹟金城故城在臯蘭縣西南漢置縣屬金城郡應劭曰初築城得金故曰金城薛瓚曰稱金取其堅也東晉時為金城郡治咸康元年張駿分郡屬河州秦苻堅建元七年移涼州治金城郡尋罷乞伏乾歸太初元件自苑川遷都金城稱河南王明年稱金城王七年稱秦王遷都西城涼呂光龍飛二年伐秦克金城其年南涼秃髮烏孤攻涼金城克之皆金城縣也後魏省尋復置子城縣兼移金城郡來治隋書地理志金城縣舊曰子城帶金城郡大業初改為金城隋末䧟薛舉其後又改縣曰五泉唐為蘭州治元和志州南至臨州一百九十里西南至河州三百里舊唐書地理志五泉漢金城縣幵羌所處乞伏乾歸都此稱涼隋志五泉縣咸亨二年復為金城天寶元件復為五泉後䧟吐蕃宋時入西夏元豐四年宦者李憲帥五路之師伐夏收復蘭州崇寕三年復改置蘭泉縣爲倚郭金省入州元統志有石龜城在州城北河畔蘭州志石龜城即州基也北臨黄河有石如龜伏城垣下又有西古城在州西南四十里河南岸即金城故址眀宏治十八年置堡允吾故城在臯蘭縣西北漢置縣爲金城郡治應劭曰音鉛牙後漢因之晉初徙郡治榆中縣廢隆安元年乞伏乾歸攻涼允吾郡克之四年乾歸爲姚興所敗西保允吾即故城也水經注允吾縣在大河之北湟水之南元和志在廣武縣西南一百六十里按漢允吾在黃河之北明統志謂允吾城在蘭州西南五十里蘭州志土人謂之西古城宏治十年爲堡皆誤榆中故城在金縣西北戰國策蘇厲說趙曰楚扞關至榆中千五百里史記秦始皇三十三年西北自榆中並河以東漢置榆中縣屬金城郡水經注河水東過榆中縣北昔蒙恬爲秦北逐戎人開榆中之地即此晉初爲金城郡治十六國春秋西秦乞伏乾歸更始二年攻秦拔金城郡以乞伏務和爲東金城太守鎮之蓋東晉後移郡治金城故以此爲東金城也後魏亦爲金城郡治後郡徙縣廢後漢書注在今金城縣東通鑑注在蘭州東五十里按寰宇記謂即大小榆谷明統志又云在蘭州西二百里皆誤勇士故城在金縣東北漢置屬天水郡地理志縣有屬國都尉治滿福後漢屬漢陽郡晉廢十六國春秋苻秦皇始中鮮卑乞伏司繁自麥田遷於廣堅山建元七年苻堅使王統攻之司繁兵敗詣統降以其從叔吐雷為勇士護軍撫其部衆尋復使司繁還鎮勇士川及堅敗司繁子國仁遂擊併諸部以晉太元十年稱秦河二州牧分其地置十二郡築勇士城居之十三件國仁弟乾歸又遷於金城顔師古漢書注勇士縣即今俗呼為健士者也隋初避太子諱因而遂改舊志在靖遠䘙西南二百里狄道故城在狄道州西南史記匈奴傳隴西有翟豲之戎百官表縣有蠻夷曰道漢因置狄道縣為隴西郡治後漢永初五年羌亂詔隴西郡徙襄武延光二年還治狄道晉建元元年張駿以狄道立武始郡水經注洮水逕降狄道故城西闞駰曰今曰武始也後魏時武始郡治勇田縣仍領狄道及陽素二縣隋屬金城郡唐初屬蘭州乾元初為臨州治寶應初䧟廢寰宇記縣在蘭州南一百九十里宋熙寕五年王韶破羌族遂城武勝建為鎮洮軍更名熙州金元增修在洮河之上亦曰洮城臨洮府志有舊土城俗名番城在縣南一里許東西南三面與府城濠相連即故城也又舊志有武始城在縣北七十里蓋即故勇田縣其陽素無考安故故城在狄道州南漢置縣屬隴西郡後漢因之晉初省前涼復置兼置安故郡十六國春秋永昌元年張茂分安故郡屬定州又乞伏國仁建義元年置安固郡後廢水經注洮水逕安故縣故城西十三州志曰縣在隴西郡南四十七里蓋延轉擊狄道安故五谿羌大破之即此也按寰宇記安故城在五泉縣西南明統志在蘭州西八十里舊志在今狄道縣西南一百六十里皆與水經注不合首陽故城在渭源縣東北漢置縣屬隴西郡漢書永光二年隴西羌多姐旁種反詔馮奉世討之屯首陽西極上如淳曰西極山名也水經注首陽縣高城嶺上有城號渭源城隋志無首陽而有渭源縣元和志渭源縣正東微南至渭州九十里西魏文帝分隴西置渭源郡因渭水為名開皇三年罷舊唐書地理志渭源漢首陽縣地後魏分置渭陽郡又改首陽為渭源縣上元二年改首陽縣仍於渭源故城分置渭陽縣儀鳳三年廢首陽併入渭源九域志熙州有渭源堡熙寕五年置在州東九十二里金志屬康樂縣臨宋界元志至元十三年復升堡為縣明統志在府東一百二十里臨洮府志渭源故城在縣東北與今城相連又渭源堡在縣西北三百歩許岡上周五里明嘉靖萬厯閒重修祖厲故城在靖遠縣西南漢置縣屬安定郡李斐曰音嗟賴後漢屬武威郡晉省魏書地形志隴東郡有祖厲縣在今平凉府界非故縣也寰宇記祖厲城一名馬城明統志祖厲地在衞城西南一百三十里烏蘭故城在靖遠縣西南唐置屬會州元和志縣東南至州一百四十里本漢祖厲縣地前涼張軌收其縣人於涼州故武威縣側近别置祖厲縣周武帝西巡於此置烏蘭關又置縣在會寕關東南四里舊城内沙石不堪久居天授二年移置於東北七里平川寰宇記縣在州西北驛路一百八十里按元和志東南當為東北寰宇記西北當作西南鸇陰故城在靖遠縣西北漢置鶉陰縣屬安定郡後漢曰鸇陰屬武威郡魏黄初二年張既為涼州刺史至金城渡河賊騎逆拒於鸇陰口晉省十六國春秋苻秦建元二十一年尉祐據允吾叛從弟隨據鸇陰起兵應之即此魏書地形志平涼郡治鸇陰縣在今平涼府界非故縣也章懷太子曰故城在姑臧東南因水為名寰宇記鸇水名某城俗名正陰城枹罕故城今河州治漢置縣屬金城郡應劭曰故罕羌侯邑也後漢改屬隴西郡靈帝時隴西宋建聚衆據枹罕自稱河首平漢王建安十九年曹操遣夏侯淵討平之十三州志枹罕縣在郡西二百一十里灕水在城南門前東過也晉初廢惠帝時置枹罕護軍十六國春狄咸和二年劉曜將劉引攻涼枹罕護軍辛晏降之遂失河南地五年張駿收復河南地咸康元年分晉興郡置河州秦苻堅建元三年克枹罕以彭越為涼州刺史鎮之七年徙涼州治金城以李儼子辨為河州刺史領晉興太守鎮枹罕西秦乞伏乾歸太初二年枹罕羌彭奚念來附以為北河州刺史更始元件以屋列破光為河州刺史鎮枹罕乞伏熾磐永康元年遷都枹罕魏書地形志河州乞伏乾歸都眞君六年置鎮後改州治枹罕元和志河州晉惠帝立枹罕護軍前涼張軌立晉興郡張駿二十一年以州界遼遠分置河州後乞伏熾磐又自金城都於此後魏置枹罕鎮太和十六年復為河州大業三年改為枹罕郡武德二年討平李軌改置河州寶應元年入於吐蕃宋史吐蕃傳嘉祐中瞎氈子木征居河州後徙安江城九域志熙寕六年收復置河州以唐枹罕縣地置枹罕縣九年省金史地理志枹罕縣貞元二年復置臨洮府志枹罕廢縣在河州西有西古城在州西二十里相傳宋時築又有北古城在州北一里俗名番城疑即金貞元時城也大夏故城在河州東南漢置屬隴西郡後漢因之晉初縣廢惠帝時張軌復置屬晉興郡張駿又置大夏郡十六國春秋咸康元年張駿以大夏郡屬河州永和二年石趙將麻秋克金城進取大夏執太守朱晏大和二年張天錫擊李儼克大夏郡皆即故城也後郡廢後魏皇興三年復置大夏郡後復為縣屬金城郡隋屬枹罕郡唐屬河州貞觀元年省入枹罕五年復置元和志縣西北至河州七十里廣德後没於吐蕃白石故城在河州西南漢置屬金城郡永光二年馮奉世討隴西叛羌以典屬國任立為右軍屯白石後漢改屬隴西郡晉初縣廢十三州志白石縣在狄道縣西北二百八十五里十六國春秋苻堅建元三年張天錫攻李儼於枹罕王猛馳救使姜衡屯白石乞伏熾磐永康三年討破休官於白石川進據白石城即故地也鳳林故城在河州西南本漢白石縣地晉惠帝時張軌分置永固縣屬晉興郡唐改置鳳林縣屬河州元和志縣東北至州八十里儀鳳元年於河州西移安鄉縣理此天寶元年改名鳳林舊唐書地理志鳳林漢白石縣張駿改為永固貞觀七年於廢縣置烏州十一年州廢於城内置安鄉縣天寶元年改為鳳林取關名也按漢白石縣晉末其城尚在舊唐志謂張氏改為永固特置於其地耳寰宇記又云張駿八年改晉志張軌時已有永固縣亦非駿改也安鄉新唐志作安昌諸書多不同河關故城在河州西漢置縣屬金城郡水經注引地理志曰宣帝神爵二年置蓋取河之關塞也後漢改屬隴西郡晉初省惠帝復置屬狄道郡十六國春秋後涼呂光龍飛二件攻西秦克河關即此後入吐谷渾廢會寕舊城在靖遠縣東北元和志㑹州古西羌地周太祖爲西魏相來巡㑹師於此土人張信罄資饗六軍太祖悅因命置州以會爲名周保定二年廢州改爲㑹寕防隋開皇元年改防爲鎮武德二年討平李軌置西會州貞觀八年以此州倉儲殷實改爲栗州其年又爲㑹州東南至原州三百九十里西南至蘭州三百八十里治會寕縣本漢鸇隂縣地周太祖置會寕縣屬會州大業二年改爲涼州縣武德二年又改㑹寕宋史雍熙二年李繼遷破㑹州焚毁城郭而去元統志宋崇寕三年置㑹州倚郭縣曰敷川金大定二十二年置保川縣明年州䧟河西遷治復修廢城置䘙即今治會州城明統志正統二年按今治即宋之敷川廢縣而唐之會寕縣又在其東北也敷川縣宋志怍敷文誤武城廢郡在河州東晉時前涼張氏置十六國春秋咸康元年張駿分武城郡屬河州永和初趙將麻秋來伐武城太守張悛同守枹罕又西秦乞伏國仁亦置武城郡澆河廢郡在河州西古西羌所居後漢延熹中燒當等八種羌爲宼段熲擊破之遂定其地東晉時呂光置澆河郡隆安初爲南涼秃髮烏孤所取後入吐谷渾宋景平元年拜吐谷渾阿豺爲澆河公水經注河水東逕澆河故城北有二城東西角犄東北去西平二百二十里宋少帝拜阿豺爲澆河公即此城也隋書地理志澆河郡後周武帝逐吐谷渾以置廓州總管府開皇初府廢治河津縣後周置洮河郡領洮河廣威安戎三縣開皇初郡廢併三縣入焉大業初置澆河郡元和志秃髪烏孤以河南地爲澆河郡後周建德五年於今州理西南逹化縣界澆河故城置廓州以開廓邊境爲義舊唐書地理志澆河城在達化縣西一百二十里寰宇記澆河城亦謂之故廓州城相傳趙充國所築即阿豺舊理按唐時廓州治化隆别見西寕府積石廢州在河州西唐書地理志達化縣西有積石軍本靜邊鎮元和志積石軍在廓州西南一百五十里儀鳳二年置北枕黃河即隋澆河郡所理宋史地理志積石軍本溪哥城元符閒為吐蕃溪巴温所據大觀二年臧征撲哥以城降即其地建軍東至廓州界八十里西至青海一百餘里北至西寕州八十里金大定二十二年升為積石州眀初廢又宋時西夏亦置積石州夏國傳河外有積石州元太祖本紀二十二年伐西夏留兵攻夏王城自帥師渡河攻積石州此别自一城或謂即唐宋積石軍非是阿干廢縣在臯蘭縣南九域志元豐六年置阿干堡在州西南四十里元統志金大定二十二年升阿干堡為縣屬蘭州至元七年併入州明統志廢縣在州南四十五里媪圍廢縣在臯蘭縣東北漢置縣屬武威郡後漢因之晉省水經注河水逕媪圍縣界東北流龕谷廢縣在金縣南宋史吐蕃傳景德中西涼府率龕谷蘭州諸族攻者龍族嘉祐中唃廝囉子瞎氈居龕谷屢通貢九域志元豐四年置龕谷砦在州東九十四里宋史地理志龕谷砦元祐七年廢紹聖三年復修為堡東至定遠砦二百里西至阿干堡七十里南至通谷堡一百二十里北至定邊城三十里元統志金大定二十二年升龕