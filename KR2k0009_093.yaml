恕百姓悅服隋段文振期原人高祖時為河州刺史有威惠遷蘭州總管崔仲方安平人開皇中為會州總管時諸羌猶未賓附詔令仲方擊之與賊三十餘戰諸部悉平裴倫河東人大業末為渭源令為薛舉所陷遇害唐崔知溫鄢陵人高宗時纍遷蘭州刺史黨項羌三萬入侵州兵寡衆懼莫知所出知溫披闔不設備羌怪之不敢進會將軍權善才率兵至大破其衆善才欲窮追之知溫曰古善戰弗從奔且溪谷復深萬一有變不可悔善才曰善分降口五百贈知溫辭曰我議公事圖私利耶安敬忠開元中為會州刺史黃河橫浸州城敬忠築堰以捍之五代晉楊承信沙陀人少帝時領蘭州刺史為政不苛及卒蘭民表乞祠之宋王嗣宗汾州人通判河州太宗遣武德卒潛察遠方事嗣宗因奏請委任天下賢俊不宜猥信此輩以為耳目王韶德安人熙寧中知通遠軍引兵城渭源堡破蒙羅角抹耳水巴等族遂城武勝建為鎮洮軍更名熙州以韶知州事六年取河州攻破諾捫桑城穿露骨山南入洮州連拔宕岷二州疊洮羌皆以城附七年入朝還至興平聞景思立敗於踏白城賊圍河州日夜馳至熙直扣定羌城破結河族斷夏國通路又循西山繞出踏白後焚八千帳瞎征窮蹙丐降遂俘以獻苗授潞州人熙寧中從王韶為先鋒盡得河湟地鬼章寇河州詔授往一戰克撒宗論功第一遂知州事復討生羌於露骨山斬首萬級獲其大酋冷雞朴羌族十萬七千帳內附威震洮西徙知熙州元豐中取定西蕩禹臧花麻諸族降户五萬城蘭川遇賊數萬於女遮谷登山逆賊敗之又踰天都山焚南牟屯汲煙凡師行百日轉鬬千里始入塞王君萬寧遠人熙寧中為熙河路鈐轄洮西羌叛圍河州君萬請於王韶以為南撒宗城小而堅強勇所聚若併兵破之圍當自解韶用其計圍果解趙隆成紀人崇寧中鈐轄熙河兵將前軍出邈川豫復鄯廓夏人寇涇原詔熙河深入師至鐵山隆先登士皆殊死戰敵解去召詣闕慰勞之張守約濮州人神宗時為熙河鈐轄仍統秦鳳羌兵駐通遠河州羌率衆三萬屯於敦波欲復舊地守約度洮水擊破之取窖粟食軍羌老弱畜産走南山左右欲邀之守約曰彼非敢迎戰逃死耳輒出者斬張詵浦城人熙寧中知熙州薰氊遣鬼章逼岷州詵往討破之於錯鑿城斬首萬級元豐中權經略熙河事時倉卒冶戎有司計産調夫民多流亡詵訴其狀乞敕劒外招攜之劉仲武成記人熙寧中遷熙河都監知河州吐蕃趙懷德狼阿章衆數萬叛仲武以伏兵敗之復西寧州未幾懷德阿章降李浩西河人神宗時為熙河鈐轄李憲討山後羌浩將右軍至合龍嶺會戰遣降羌乞嘊輕騎突敵帳俘其酋冷雞朴李密撒馘三千王文郁新秦人元豐中為熙河路鈐轄夏人圍蘭州已奪兩關門文郁募死士夜縋而下持短兵突入賊即掃營去擢知蘭州諜知夏人將大入清野以俟果舉國趨臯蘭文郁乘城禦之殺傷如積圍九日而解進秩知河州築安西城金城關劉舜卿開封人元祐初知熙州夏人聚兵天都連西羌鬼章青宜結先城洮州將大舉入寇舜卿欲乘其未集擊之會諸將議方略使姚兕部洮西領武勝兵合河州熟羌搗講朱城遣人間道焚河橋以絶西援种誼部洮東由哥龍谷宵濟拜金川黎明至臨洮城下一鼓克之俘鬼章并首領九人斬馘數千計种誼雒陽人元祐初知蘭州蘭與通遠皆絶塞中間保障不相接腴田多棄不耕誼請城李諾平以扼衝要姚兕五原人元祐初為熙河副總管與种誼合兵討鬼章於洮州破六浦宗城夜斷浮橋援兵不得渡遂擒鬼章范育三水人元祐初出知熙州時議棄質孤勝如兩堡育爭之曰熙河以蘭州為要塞此兩堡者蘭州之蔽也棄之則蘭州危熙河有腰背之憂矣又請城李諾平汝遮川曰此趙充國屯田古榆塞之地也不報紹興中採其抗論棄地及進築之策贈寶文閣學士孫路開封人元祐初司馬光議棄河湟邢恕謂路嘗為河蘭二州判官在彼四年有捍禦之功光亟召問路挾輿地圖示光曰自通遠至熙州才通一徑熙之北已接夏境今自北關辟土百八十里瀕大河城蘭州然後可以捍蔽若捐以豫敵一道危矣光幡然曰賴以訪君不然幾誤國事議遂止王厚韶子紹聖中幹當熙河公事會瞎征隴拶爭國河州守將王瞻與厚同獻議復故地元符元年師出塞下邈川降瞎征隴拶出迎遂定湟鄯命厚知湟州崇寧中為熙河經略安撫使擊溪賖罷撒大敗之其母與諸酋開鄯州降遂入廓州蔣之奇宜興人元祐中知熙州夏人論和請畫封境之奇揣其非誠務守僃謹斥侯常若敵至夏人不敢犯塞范純粹吳縣人哲宗時知熙州章惇蔡卞經略西夏疑純粹不與共事改知鄧州遊師雄武功人元祐初吐蕃謀據熙河詔遣師雄與邊臣措置師雄請於帥劉舜卿分兵二道以攻之遂破洮州擒鬼章紹聖中詔攝熙州以夏人擾邊詔使者與熙帥秦帥共謀之使者鋭於討擊師雄謂進築城壘以自蔽未應深入上章爭之不報既而卒用師雄策何常京兆人哲宗時為熙河轉運副使議者欲貸民金帛而使入粟塞下常曰車牛轉輸民力已病然未至死亡者粟自官出而民無害也今強以金帛使自入粟懼非貧弱之利鍾傅樂平人哲宗命幹當熙河涇原秦鳳三路公事夏人陷金明渭帥毛漸出兵攻其沒煙寨傅合擊破之又與熙州王文郁進築安西城遂作金城關种朴誼子紹聖中為熙河鈐轄知河州安撫洮西沿邊公事河南蕃部叛拒官軍朴至州才二日熙帥胡宗回迫之出討遇伏力戰而死事聞贈朴雄州防禦使官其後十人姚雄五原人哲宗時知河州种朴戰殁王贍軍陷敵中雄自鄯至湟四戰皆捷拔出之遂築安鄉關夾河立堡以護浮梁通湟水漕運商旅負販入湟者始絡繹於道苗履授子元符初以熙河蘭會都鈐轄知蘭川詔同王瞻取青唐與姚雄合兵討峗羌箋羅結焚其族帳而還程之邵眉山人徽宗時為熙河都轉運使敵犯熙河之邵攝帥事屯兵行邊境解去鄭驤玉山人姚古奏為熙河蘭廓路經略司屬官地震秦隴金城六城壞驤自請董兵護築益機灘新堡六百步以控西夏堡成以功遷官嘗撫熙寧迄政和攻取建置之迹為拓邊録十卷兵將蕃漢雜事為别録八十卷圖畫西蕃西夏回鶻盧甘諸國人物圖書為河隴人物志十卷序贊普迄溪巴溫董氊世族為蕃譜系十卷吳擇仁永興人徽宗時擢熙河路轉運判官即以直祕閣為副使從招討使王厚領兵深入克蘭廓城柵十三何灌祥符人徽宗時提舉熙河蘭湟弓箭手入言漢金城湟中穀斛八錢今西寧湟廓即其地漢唐故渠尚可考若葺渠引水使田不病旱則人樂應募而射士之額足矣從之甫半載得善田二萬六千頃募士七千四百人改知蘭州攻仁多泉城炮傷足不顧卒拔之趙遹開封人徽宗時知熙州諸蕃聞遹至相賀曰朝廷真欲無事矣爭出鉏耨牛價為頓高時議更陜西大鐵錢價與銅錢輕重等遹上言銅重鐵輕自然之理今反其禁民誰信之以人奪天雖厲其禁終不可行也張叔夜開封人徽宗時為蘭州録事參軍州本漢金城郡地最極邊恃河為固每嵗河水合必嚴兵以備士不釋甲者纍月叔夜曰此非計也有地曰大都者介五路間羌人入寇必先至彼點集然後議所向每一至則五路皆悚叔夜按其形勢畫攻取之策訖得之建為西安州自是蘭無羌患劉韐崇安人徽宗時王厚鎮熙州辟狄道令提舉陜西平貨司河湟兵屯多食不繼韐延致酋長出金帛從易粟就以餉軍公私便之張浚綿竹人徽宗時為熙河幕官遍行邊壘覽山川形勢時時與舊戍將握手飲酒問守邊舊法及軍陳方略之宜故能通知邊事本末劉惟輔涇州人建炎中為熙河馬步軍副總管金得秦州經略使張深遣惟輔將三千騎禦之夜趨新店黎明短兵相接惟輔舞矟刺殺其先鋒貝勒哈富敵遂退會都護張嚴遇伏死金兵掠熙河惟輔為所執百方誘之終不言而死贈昭化軍節度使立廟號忠烈貝勒哈富舊作孛堇黑鋒今改高子孺狄道人建炎中知蘭州龕谷寨金兵執劉惟輔子孺聞其尚存固守以待及城陷先刃其家而後死韓青建炎中為熙河馬步軍第六將間行從劉惟輔為金兵所擒亦罵不絶口而死金龎迪延安人天眷中為臨洮尹兼熙秦路兵馬都總管陜右大飢流亡四集迪開渠溉田流民利其食居民藉其力郡人立碑紀政績璞薩忠義上京巴爾古河人為臨洮尹兼熙秦路兵馬都總管海陵召至京師謂之曰洮河地接吐審木波異時㔄害良民州縣不能制汝宿將故以命汝賜條服玉具佩刀閲再考乃徙去璞薩忠義舊作僕散忠義巴爾古河舊作拔盧古河今並改楊仲武保安人海陵時同知臨洮尹臨洮地接西羌與木波雜居邊將貪暴木波苦之遂相率寇掠仲武時改同知河中府以前治臨洮乃從數騎入其營諭之曰此皆將校侵漁汝等以至此耳今懲治此輩不復擾害汝也并以禍福曉之羌人喜悅寇掠遂息後復掠熙河熙河主帥使人諭之不肯去曰楊總管來吾乃解去熙河具奏詔復遣仲武及至與其酋帥相見責以負約對曰邊將苦我今之來求訴於上官耳幸見公願終身不犯塞乃舉酒酹天折箭為誓仲武因以卮酒飲之曰當為汝更請若復背約必舉兵矣羌人羅拜而去張中彥張義堡人大定中為臨洮尹華州劉海搆亂既敗籍從亂者數千人中彥惟論為首者戮之西羌吹折密臧隴逋龎拜四族恃險不服使侍御史何醇之就中彥論方略中彥曰此羌叛服不常非中彥自行不可即至積石達南寺酋長四人來與之約降事遂定卒於官百姓哀號輟市立像祀之圖克坦哈希上京人為臨洮尹時關陜以西初去兵革百姓多失業圖克坦哈希守之以靜民多還歸圖克坦哈希舊作徒單合喜今改璞薩揆忠義子章宗初知臨洮府事陜西提刑司舉揆剛直眀斷獄無冤滯禁戢家人百姓莫識其面積石洮二州舊寇皆遁商旅得通於是晉官一階仍詔褒諭璞薩揆舊作僕散揆今改圖們和吞貞祐三年知臨洮府兼本路兵馬都總管叛賊蘭州奇徹克森等誘夏人入寇圍臨洮凡半月城中兵數千粟且不支衆皆危之圖們和吞為開諭禍福皆自奮乃夜出襲賊壘夏兵大亂遂大捷夏人遁去正大三年復為臨洮府總管元兵破臨洮圖們和吞被執誘之降不屈遂殺之詔贈中京留守立像褒忠廟圖們和吞舊作陀滿胡土門奇徹克森舊作極陳僧今並改元趙阿爾班世居臨洮世祖時為臨洮府元帥嵗飢發私廪以賑貧乏人賴不飢郡當孔道傳置旁午有司敝於供給趙阿爾班以私馬百匹充驛騎羊千口代民輸帝聞而嘉之詔京兆行省酬其值趙阿爾班曰我豈以私惠邀公賞耶卒不受趙阿爾班舊作趙阿哥潘今改明寧正壽州人洪武三年為河州衛指揮使奏言民間轉輸甚勞而茶布可以易粟以茶給軍士令自相貿易庶省西民之勞詔從之正初至衛城空虛正勤於勞徠不數年遂為樂土璽書嘉勞張忠太康人永樂中知蘭縣時邑中户僅滿千而每月役以萬計嵗修黃河浮橋尤為民纍忠奏請軍民並役而浮橋令各縣衛協修境中水利舊為豪家所占忠令均之於民民困始蘇劉昭全椒人宣德中以都督同知鎮西寧河州厯二十年番漢畏服西陲晏然楊繼盛容城人嘉靖中以兵部員外郎諌馬市貶狄道典史地雜番俗罕知詩書繼盛簡子弟秀者百餘人聘三經師教之鬻所乘馬出婦服裝市田資諸生番民信愛之呼曰楊父縣有煤山番人制之不開民仰薪二百里外繼盛往召番諭之咸曰楊公即須我曹穹帳亦舍之况煤山耶劉綎南昌人萬厯中為臨洮總兵官和爾啓宰桑昆都楞岱青塔布囊等掠番境窺內地綎遣部將擊之莽刺川斬獲甚多帝為告郊廟宣捷進綎秩豫廕和爾啓舊作火落赤宰桑舊怍真相昆都楞舊作昆都魯岱青塔布囊舊作歹成他卜囊今並改曹變蛟大同人崇禎中為臨洮總兵官時陜西諸將剿賊皆無功惟變蛟降小紅狼餘賊走竄不敢大逞闖賊自洮州出番地變蛟偕賀人龍追敗之轉戰千餘里不解甲者二十七晝夜賊潰入塞洮州將扼戰不力遂復入岷州及西和禮縣山中變蛟還剿賊敗入山尋復東遁變蛟追之設三覆於潼關南原賊奔入伏中死者相枕藉賊妻女盡失僅從七人竄録功進左都督本朝李絮飛奉天正黃旗人順治五年為臨鞏道甫至任會同人米刺印叛殉節死又蘭州同知趙翀學正白旗人同時死難魏勷柏鄉人順治間任臨洮道厯政四載苞苴不行士民頌之李淐定興人順治二年為渭源知縣政尚平恕遭回變淐議守城姦民為賊內應遂被執罵賊不屈死季佺正定人康熙初為西寧遊擊從張勇王進寶恢復臨洮時軍務填委以佺有文武才奏授臨洮知府佺撫綏流移經理挽運事集而民不擾王之鯨黃岡人知金縣前令王鯤化因虧空倉穀二千餘石繫獄逮段四十餘人之鯨至檢縣中荒地買牛種募人耕墾計嵗所穫納糧外即以貯倉積三年乃以代償逋課由是官吏皆得釋歸時方興屯田數多虛報之鯨力請減免民有鬻子女者為贖還民勒石頌之楊宗仁奉天正白旗人康熙中由階州知州遷臨洮同知監蘭州鎮遠橋商稅值嵗歉請發倉賑飢減稅額招流亡上官有疑獄輒付宗仁一訊即決郡多盜有老瓜賊尤為民害因讞他獄得百餘案皆為窮治捕置諸法盜風頓息人物漢辛慶忌狄道人父武賢宣帝時為酒泉太守拜破羌將軍慶忌少以父任為右校丞屯田烏孫赤谷城與歙侯戰陷陳卻敵元帝初舉茂才遷郎中車騎將軍朝廷多重之者遷張掖太守徙酒泉所在著名成帝時大將軍王鳯薦為光祿大夫執金吾後拜為左將軍慶忌居處恭儉食飲被服尤節約為國虎臣遭世承平胸奴西域親附敬其威信長子通中子遵少子茂出為郡守皆有將帥之風宗族支屬至二千石者十餘人牛邯狄道人有勇力才氣雄於邊陲隗囂據隴坻使邯軍瓦亭帝征囂王遵與邯舊故以書喻之邯得書乃謝士衆歸命洛陽拜為大中大夫杜林馬援並薦之以為護羌校尉與來歙平隴右晉辛勉狄道人博學有貞固之操懷帝時為侍中隨帝至平陽劉聰將署為光祿大夫勉固辭不受聰遣其黃門侍郎喬度齎藥酒逼之勉引藥將飲度遽止之曰相試耳聰嘉其貞節深敬異之為築室平陽西山月致酒米勉亦辭不受年八十卒辛賓勉族弟愍帝時為尚書郎帝蒙塵於平陽劉聰使帝行酒洗爵賓起而抱帝大哭遂被害辛謐狄道人博學善屬文工草隸書性恬靜不妄交遊永嘉末兼散騎常侍慰撫關中及長安陷沒於劉聰聰拜大中大夫固辭不受石勒季龍之世並不應辟命雖處喪亂之中頽然高邁及冉閔僭號備禮徴為太常謐遺閔書勸以歸身本朝因不食而卒辛恭靖狄道人隆安中為河南太守姚興陷河南被執至長安欲官之恭靖厲色曰我願為國家鬼不為羌賊臣興怒幽之别室三年至元興中誑守者乃踰垣遁歸於江東南北朝魏趙柔金城人少以德行才學知名河右沮渠牧犍時為金部郎太祖平涼州內徙京師厯著作郎河內太守甚著信惠辛紹先狄道人父淵仕西涼為驍騎將軍涼後主歆與沮渠蒙遜戰於蓼泉軍敗失馬淵以所乘授歆而身死於難以義烈見稱西土涼州平紹先內徙家晉陽有至性丁父憂三年口不甘味頭不櫛沐自中書博士轉神部令皇興中為下邳太守卒於郡子鳳達耽道樂古有長者名為京兆王子推國常侍辛琛狄道人少孤曾過友人見其父母無恙垂涕久之釋褐奉朝請滎陽郡丞景明中為揚州征南府長史刺史李崇多事産業琛每諫折卒於官琛寬雅有度量涉獵經史喜愠不形於色當官奉法所在有稱辛穆鳳達弟舉茂才東雍州别駕初隨父在邳州與彭城陳敬文友善敬文病臨卒以雜綾二十匹託穆與其弟敬武穆久訪不得經二十年始於洛陽見敬武還之封題如故世稱廉行厯東荆州司馬轉長史帶義陽太守領戍轉汝陽太守有惠政正光中除平原相卒於郡辛雄狄道人有孝性清河王懌為司空辟為左曹雄用心平直加以間明政事經其斷剖莫不悅服厯尚書駕部三公郎每有疑議與公卿駁難事多見從孝莊時纍除度支尚書兼侍中辛祥鳳達子舉司州秀才再選司空主簿咸陽王禧妃即祥妻之妹及禧構逆親知多罹塵謗祥獨不預後除郢州龍驤府長史帶義陽太守白早生反梁遣來援祥堅城固守州境獲全辛子馥穆子纍遷平原相元皓入洛子馥不從天平中除太尉府司馬白山連接三齊瑕邱數州之界多有盜賊子馥受使檢覆因辨山谷要害宜立鎮戍之所諸州豪右在山鼓鑄姦黨多依之又得密造兵仗上表請破罷諸冶朝廷喜而從之卒於清河太守辛少雍祥弟有孝行為祖父紹先所愛紹先性嗜羊肝及卒少雍終身不食肝性仁厚有禮義門內之法為時所重稍遷司空高陽王雍田曹參軍清正不憚強禦積年久訟造次決之請託路絶時稱賢明卒於給事中辛慶之狄道人少以文學徵至洛陽對策第一除祕書郎大統中厯度支尚書遷南荆州刺史位遇雖隆而率性儉素志量淹和有儒者風度又以其經明行修令與盧誔等教授諸王拜祕書監北齊辛術琛子仕魏為清河太守政有能名纍遷散騎常侍武定六年侯景叛除東南道行臺尚書與高嶽等破侯景擒蕭淵明齊天保元年侯景徴江西租稅術率諸軍渡淮斷之燒其稻數百萬石還鎮下邳人隨術北渡淮者三千餘家及王僧辨破景術招攜安撫城鎮相繼款附於是移鎮廣陵厯遷吏部尚書遷鄴以後大選之職知名者數四互有得失術取士以才以器循名責實新舊參舉管庫必擢門閥不遺考之前後銓衡最為折衷術清儉寡嗜欲勤於所職臨軍以威嚴牧人有惠政少愛文史晚更勤學雖在戎旅手不釋卷周王傑本名文達金城直城人善騎射有膂力從魏孝武西遷周文奇其才擢授羽林監嘗謂諸將曰王文達萬人敵也從復潼關破沙苑爭河橋戰芒山皆以勇敢聞親待日隆賜姓宇文氏進爵為公魏恭帝元年從于謹拔江陵孝閔踐阼進爵張掖郡公為河州刺史建德初除涇州總管為百姓所慕辛昂慶之族子尉遲迥平蜀表為龍州長史領龍安郡事威惠洽著尋行成都令遷梓潼郡守入為司隸上士遷吏部天和初陸騰討信州蠻詔昂運糧饋之莫有怨者巴州萬榮郡人反叛昂募人出其不意直趨賊壘望風瓦解厯渠州刺史轉通州進位驃騎天將軍辛威隴西人初從賀拔嶽征討有功假輔國將軍都督及周文統嶽衆見威奇之引為帳內從擒竇泰復宏農戰沙苑並先登陷敵勇冠一時為河州刺史本州大中正頗得人和纍封宿國公威性持重有威嚴厯官數十年未嘗有過故得以身名終其家五世同居時并稱之劉雄臨洮子城人初為文帝親信後拜中大夫賜姓宇文氏天和中封周昌侯尋為河州刺史宣政元年突厥入幽州雄戰殁贈亳州總管隋李禮成狄道人沈深有行檢周時以軍功拜車騎大將軍時朝廷有所徵發禮成度蠻必為亂上表固諌周武帝從之從伐齊拜北徐州刺史未幾徴為民部中大夫高祖受禪進封絳郡公辛德源術族子沈靜好學博覽強記齊中書侍郎劉逖上表薦之除散騎侍郎聘陳還待詔文林館高祖受禪隱林慮山祕書監牛宏以德源才學顯著奏與著作郎王邵同修國史撰集注春秋三傳三十卷注楊子法言二十三卷有集二十卷子素臣正臣並博涉有文義李安狄道人仕周授儀同少師右上士高祖引之左右遷職方中大夫復拜安弟哲為儀同安叔父璋與周趙王謀害高祖誘哲為內應安隂白之及趙王等伏誅將加官賞安頓首曰豈可將叔父之命以求官賞俯伏流涕髙祖為之改容命有司罪止璋身高祖即位厯黃門侍郎平陳之役安率衆先鋒大破陳師進位上大將軍高祖嘗愍安兄弟滅親奉國拜安哲俱為柱國安歔欷悲感不能自勝疾甚而卒辛公義狄道人早孤母氏親授書傳周天和中選任大學生以勤苦著稱武帝時知入露門學每月集御前與大儒講論數被嗟異從平齊遷掌治上士開皇元年除主客侍郎從平陳以功除岷州刺史境內呼為慈母遷牟州刺史亦有異政仁壽初充揚州道黜陟大使後為司隸大夫辛彥之狄道人九嵗而孤博涉經史文帝初除太常少卿纍拜禮部尚書與袐書監牛宏撰新禮吳興沈重名為碩學彥之與重議論重不能抗謝曰辛君所渭金城湯池無可攻之勢後為隨州刺史遷洛州俱有惠政所撰有墳典六官祝文禮要新禮五經異義唐渾瑊蘭州人本鐵勒九姓部落之渾部也父釋之有才武從朔方軍積功封寧朔郡王廣德中與吐蕃戰殁於靈武瑊年十一即善騎射從破賀魯部勇冠三軍後從李光弼定河北又從郭子儀復兩京敗安慶緒數破吐蕃有功纍遷單于大都護德宗幸奉天授都虞候京畿渭北節度使朱泚兵薄城瑊力戰卻之遷檢校尚書左僕射同平章事兼奉天行營副元帥朱泚平論功加侍中封咸寧郡王卒贈太師諡忠武瑊通春秋漢書天性忠謹功高而志益下世方之金日磾辛雲京金城人世為將家有膽決以擒生斬馘常冠軍遷太常卿史思明屯相州雲京以鋭兵襲滏陽追破其衆加代州都督太原軍亂帝以雲京沈毅授太原尹進封金城郡王數年太原大治加檢校尚書僕射同中書門下平章事卒贈太尉諡忠獻辛京杲雲京從弟信安王褘節度朔方京杲與弟雯以策説褘評咨加異後從李光弼出井陘督趫蕩先驅戰嘉山尢力肅宗召見許為黥彭關張之流纍遷鴻臚卿召為英武軍使代宗立封庸國公遷左金吾衛大將軍進晉昌郡王後為工部尚書致仕朱泚盜京師以老病不能從西嚮慟哭而卒贈太子少保雯亦從光弼定恆趙後署太原三城使史思明屯相軍及㵚陽雯逆擊走之東都陷退寧河陽卒於屯辛讜雲京曾孫學詩書能擊劒重然諾賑人之急龎勛反攻杜慆於泗州讜趨泗口貫賊柵入城見慆乃夜踰淮至洪澤見戍將郭厚本告急厚本付兵五百即濟淮與慆表裏擊賊大破之圍三月救兵外敗城益危讜復夜斬賊柵出見淮南節度使令狐綯詣浙西見杜審權合兵五千與賊決戰圍乃解以功拜亳州刺史終嶺南節度使宋王淵熙州人善騎射應募擊夏國屢有功纍遷西河路部將宣和中從劉延慶討平方臘靖康𥘉為真定府都統制討平叛寇吳湛高宗即位羣盜蜂起以淵為制置使提兵四出所向皆捷拜僉書樞密院事為苗傅劉正彥所害贈少保諡襄愍金郭哈瑪爾會州人世為保甲射生手與兄羅丹俱以善射應募羅丹以功授會州刺史夏人攻破會州兄弟俱被擒羅丹見殺哈瑪爾獨拔歸元光二年復取會州以功遙授知鳳翔府事本路兵馬都總管元帥左都監兼行蘭會洮河元帥府事甲午春金亡西州無不歸元獨哈瑪爾堅守孤城元兵盡力攻之哈瑪爾集州內金銀銅鐵雜鑄為炮以擊攻者殺牛馬以食戰士軍士死傷者衆乃命積薪州廨呼集家人及城中將校妻女閉諸一室將自焚之火既熾率將士於火前持滿以待城破鏖戰既久士卒弓盡矢絶者挺身入火中哈瑪爾獨上大草積以門扉自蔽發二三百矢無不中者矢盡自焚郭哈瑪爾舊作郭蝦蟆羅丹舊作祿大今並改眀趙安狄道人永樂初除臨洮百户使西域從北征立功進都指揮同知宣德中從陳懷討平松潘番進都督僉事復以左參將從史昭討曲先又與侍郎徐晞偕出塞討阿勒台俱有功正統初進都督同知充右副總兵協任禮鎮甘肅明年與王驥任禮蔣貴分道進師安至刁力溝縶鼐呼及烏克台等封會川伯子英嗣官立功進都督同知阿勒台舊作阿台鼐呼舊作乃顔匆烏克台舊作奄克台今並改王鞃河州人正統中進士授户科給事中英宗北狩郕王攝朝羣臣劾王振誤國