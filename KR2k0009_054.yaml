body:
  text: 大清一統志保德州在山西省治西北四百六十里東西距二百三十里南北距二百二十里東至寕武府五寨縣界一百二十里西至太原府興縣界一百十里南至太原府岢嵐州界七十里北至邊牆一百五十里東南至岢嵐州界一百六十里西南至興縣界一百里東北至寕武府偏關縣界一百八十里西北至蒙古界一百四十五里本州境東西距八十里南北距九十一里東至河曲縣界四十里西至陜西榆林府府谷縣界四十里南至興縣界九十里北至府谷縣界一里東南至岢嵐州界一百七十里西南至興縣界九十界三十里西北至府谷縣界三里東北至河曲縣十里自州治至京師一千七百十五里分野天文昴畢分野大梁之次建置沿革禹貢冀州之域春秋屬晉戰國為樓煩地漢太原郡地魏晉新興郡地後魏永安郡地隋唐為嵐州地宋淳化四年祈嵐州地置定羌軍景德二年改保德軍屬河東路金大定十一年置保德縣為軍治二十二年升保德州屬河東北路元憲宗七年省縣入州屬冀寕路明洪武七年降為縣九年復為州屬太原府本朝雍正二年升為直隸州屬山西省領縣一河曲縣在州東北一百三十里東西距一百四十二里南北距一百三十三里東至寕武府五寨縣界一百四十里西至陜西榆林府府谷縣界二里南至本州界一百三十里北至蒙古黄河界三里東南至太原府岢嵐州界一百七十里西南至本州界一百里東北至寕武府偏關縣界一百八十里西北至蒙古界十五里漢太原郡地唐嵐州地五代北漢置雄勇鎮宋太平興國七年建火山軍屬河東路治平四年置火山縣爲軍治熙寕元年縣省金貞元元年置河曲縣大定二十二年升爲火山州治河曲後改州曰隩州屬河東北路元至元二年州縣俱省入保德州明洪武二年復置河曲縣六年省十四年又置屬太原府本朝雍正二年改屬保德州形勢迫臨黄河密邇西徼續文獻通考羣山屹峙於東南黄河繞流於西北通志風俗土瘠民貧莫不尚義明統志質樸剛勁猶有古風州志城池保德州城周七里有奇門四宋淳化中土築金大定中增築明萬厯中甃甎本朝順治六年修康熙六年四十六年乾隆三十二年重修河曲縣城周三里有奇門三明宣德初土築名灰溝營萬厯中甃甎改名河保營本朝乾隆二十七年爲縣治三十三年重修學校保德州學在州治西舊在城東南隅宋熙寕初建金大定中移建今所本朝順治十年修康熙十二年三十二年重修入學額數十二名河曲縣學在縣東南舊縣治東北明洪武中建成化間遷明倫堂於縣治北隅崇禎中重建入學額數八名宿文書院在河曲縣南本朝乾隆二十二年建按舊志載見龍書院在州治西明萬厯中建今廢謹附記户口原額人丁六千三百八十九今滋生男婦共一十四萬七百六十九名口計二萬二千七百四十一户田賦田地九百四十七頃四十畝有奇額徴地丁正雜銀九千四百四十一兩五錢四分九釐糧三千二百三十石八斗九升有奇山川馬頭山在州東二十里氊帽山在州東六十里山半有洞可容百人鷹窩山在州東六十里又窩弓山亦在州東六十里翠峯山在州東八十里接河曲縣界明統志保德州治東有翠峯其形如覆斗色恒蒼翠獅子山在州東南二十里又孤山在州東南三十里劉家山在州東南五十里堂子山在州東南六十里崖半有石洞又黄龍山倒座山俱在州東南六十里袁家山在州東南七十里赤山在州東南八十里山皆楓樹經霜盡赤土門山在州東南八十里又賀家山在州東南九十里柏山在州東南一百里又潘家山桑林山俱在州東南一百里蒼水山在州東南一百二十里以山中水色蒼故名其水不竭不溢州人木炭取給於此蓮花山在州南一里其山五峯東為東廓山西為西廓山俱臨黄河又分三小支入州城東為鐵山西為金山中一支當州治形如蓮房故名銀鑪山在州南十里寨山在州南三十里又羊頭山在州南四十里麥子山在州南七十里有洞昔人常避兵於此伊山在州南接岢嵐州界飛龍山在州西南十里又州東北亦有飛龍山黄金山在州西南六十里又神山在州西南八十里又野人山在州西南九十里石梯山在州東北二十里上有墩墩下一堡甚險隘山下為水寨山渡口亦戍守要地逍遥山在州東北二十里一名腰莊出鐵器黄巍梁山在河曲縣東南二十五里高埓翠峯可眺數百里外强梁山在河曲縣東南一百里又杜家山在縣東南一百十里又望羊山在縣東南一百三十里又葫蘆山在縣東南一百六十里火山在河曲縣南六十五里寰宇記在火山軍東四十里遼史景宗紀乾亨元年太保舒蘇與宋兵戰於火山縣志在舊縣西五里黄河東岸山上有孔以草投孔中烟焰上發可熟食不生草木上有􅚑砂窟下有氣砂窟黄河過此如遇覆釡河流為之曲尖山在河曲縣南一百里峯銳故名郝家嶺在州東南三十里峯子嶺在州南五十里西溝水出焉流經州城西入河楊家嶺在州南接岢嵐州界又王家嶺亦在州南黨家嶺在州西南九十里韓家嶺在河曲縣東南三十里木瓜崖在州城西又花花崖在州西南八十里鵰黄崖在河曲縣東南八十里赤崖在河曲縣南三十里土色俱赤相傳吕梁未鑿時河出此山之上崖上有蛤蚌遺殻倒回谷在州東北三十五里金史忠義傳正大八年陳和尚有倒囘谷之勝夾子洞在州東南七十里纏户崖洞在州西南四十里上有石崖下逼黄河外小内大可容數百人石洞在河曲縣南六十五里深廣可容千人又縣東南河峪村亦有石洞高一丈六尺廣二丈深三丈有奇天橋峽在河曲縣南九十五里上闊十二丈五尺中闊七丈下闊八丈五尺共長九十丈黄河流經其中每雨激浪如雷聲聞數十里冬月積冰成橋俗謂之天橋明時議建橋於此不果禪師崖棧在州西南