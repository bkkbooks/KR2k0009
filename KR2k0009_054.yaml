名為姚暹渠唐姜師度魏人開元中拜河中尹管解縣鹽池先是兩池漸涸師度發卒開拓疏決水道置為鹽屯大收其利公私賴之劉晏南華人天寳中調夏令未嘗督賦而輸無逋期司空輿虞鄉人大中時盧宏正管鹽鐵表為兩池榷鹽使先是法疏闊吏輕觸禁輿為立約數十條莫不以為宜五代周張崇詁廣順初為解州刺史兩池榷鹽使多規畫鹽池利害宋王禹偁淳化四年知解州多善政趙瞻永城人仁宗時知夏縣作八監堂書古賢令長治迹以自監張戩長安人載之弟熙寕中知夏縣縣素多訟戩待以至誠反覆教諭不數月而訟衰去之日民遮道送不得行無不泣下者李綽元祐初為解縣令兼鹽池事嘗修堤堰以防衞鹽池後人遂名為李綽堰邵伯温洛陽人雍之子政和時知芮城政尚公平民間無事㡬於禮樂之化金耶律德元大定間知解州軍州事時歲苦旱盜嘯聚梗路德元曰先除民害後祈雨澤神必不違密與數騎造賊穴追捕悉平遂祈雨於五龍祠雨隨車而至民歌頌之元靳用古大德間知解州嚴而不苛境内清肅嘗引山泉入城以便汲飲民永賴之辛邦彦汾西人為夏縣令廉明精察建司馬温公祠堂書院及修黒龍李綽諸堰設常平倉事集而民不擾王仲文祥符人至正間知夏縣政尚寛簡嘗出勸農自齎米煮粥以食民私増棗數枚食畢遺棗於民夫人素氏躬紡織以助其廉布顔布哈至正間為平陸尹親勞畎畝民多蓋藏家聞絃誦布顔布哈舊作普賢不花今改正明吳惠浮梁人正統中知解州時聽民間紡織聲勸懲勤惰遇貧不能婚者給以貲俾成禮修葺廟學無所擾嘗欲開鹽埸利百姓為當道所沮欲因入覲面奏㑹卒京邸不果民聞巷哭圖像祀之雷縉同州人正統七年知夏縣墾荒田濬水利均徭役凡有興作不勞而事集暇時召父老子弟以孝弟勤儉勸之姜洪廣德人宏治二年知夏縣躬節儉政治嚴明士驕悍導之以禮民當甲者不費一錢夏人立祠與雷縉合祀謂縉為慈母洪為嚴父云吕柟髙陵人嘉靖初由翰林修撰謫解州判官攝州事興利剔弊不遺餘力建解梁書院擇民間子弟講習其中文教大興陳世寶鉅鹿人隆慶中知夏縣縣西三十里牛家凹爲萑苻藪世寳築城堡招集流移給以牛種半年成聚盜賊屏息魏學徵咸陽人萬厯中知平陸縣扶弱抑强嘗開興文渠以資灌溉人懷其德袁葵東明人崇禎中知夏縣廉敏有治才流賊猝至城下葵設奇擊却之房之屏宛平人崇禎末由舉人知安邑縣流㓂陷城之屏北面拜入署與母訣命妻子各自盡遂投井未死賊曳出之不屈被害本朝李因之長山人順治五年任河東鹽運司副使清正率屬不私一錢值姜瓖之變殉運城贈本政司叅議又運同鄭宏圖奉天人甫莅任值亂亦死之贈布政司叅政知事王存鏊邱縣人亦同殉難贈布政司照磨時稱三烈並祀忠烈祠鄒藴賢奉天人順治十年知解州輕徭緩徴以安凋瘵閭里漸蘇既去州人建祠祀之劉之屏萬全衛人順治四年以進士知夏縣善撫字人稱劉父姜瓖之亂登陴督守手刃二賊力竭死城上贈按察司僉事入祀忠烈祠遅日巽廣寕人順治七年以貢生知夏縣時姜瓖餘孽猶潛伏日巽練鄉勇躬督往殄之脅從者赦之俾得復業又力請蠲積逋減省徭役夏人始蘇鄭四端陳留人順治十三年以進士知夏縣嚴明正直每咨訪民疾苦勤懇不懈解去士民閉城門留之累日乃得出境江闓貴陽人康熙三十年以舉人知解州為政安靜若不知有官先是民多宿逋闓請分年帶徴以紓之民懷其德人物漢郅都大陽人以郎事孝文帝孝景時都為中郎將敢直諌面折大臣於朝拜濟南太守為人公廉問遺無所受請寄無所聽嘗自稱曰已倍親而仕身固當奉職死節官下終不顧妻子矣遷中尉行法不避貴戚拜雁門太守匈奴患之竇太后乃竟中都以危法斬之張次公河東人以校尉從大將軍衛青擊匈奴有功封岸頭侯裴瑜字雉璜河東人聰明敏達觀物無滯史弼為河東太守以舉孝廉忤中常侍侯覧被檻車徴瑜以前孝廉送至崤澠之間大言於道旁曰明府摧折虐臣選德報國如其獲罪足以垂名竹帛願不憂不懼弼曰昔人刎頸九死不恨瑜後位至尚書三國魏衞覬字伯儒安邑人少以才學稱漢末為司空掾累遷尚書魏國既建拜侍中與王粲並典制度明帝即位進封閿鄉侯受詔典著作又為魏官儀覬以文章顯好古文鳥篆隸草無所不善厯仕漢魏時獻忠言卒諡曰敬侯焦先字孝然大陽人見漢室衰乃絶口不言及魏受禪常結草為廬於河之湄獨止其中冬夏恒不著衣卧則以身親土欲食則為人賃作飽輒去亦有數日不食時行不由邪徑目不與女子逆視河東太守杜恕安定太守董經皆過視之終不肯語其後野火燒其廬先因露寢遭冬雪大至先袒卧不移年百餘歲卒杜摯字德魯河東人初上笳賦署司徒軍謀吏後舉孝廉除郎中轉補校書卒所著文賦頗傳董㝷河東人為司徒軍議掾景初元年大發銅鑄作銅人又鑄黄龍鳳凰起土山使公卿羣僚負土㝷上書極諌帝曰董㝷不畏死耶主者奏收㝷有詔勿問後為貝邱令清省得民心晉衞瓘字伯玉覬之子十歲喪父至孝過人襲父爵閿鄉侯弱冠爲魏尚書郎累遷廷尉卿明法理聽訟必以情鄧艾鍾會伐蜀瓘持節監軍事蜀平議封固辭不受除使持節都督關中諸軍事厯青徐幽并四州皆有功績累封菑陽公餘爵悉讓二弟六男無爵逺近稱之咸寕初徴拜尚書令加侍中瓘學問深博嫺習文藝與尚書郎索靖俱善草書時號一臺二妙遷司空爲政清簡甚得聲譽惠帝初輔政爲楚王瑋所害追諡曰成衞恒字巨山瓘之子少辟司空齊王府累遷黄門郎善草隸書爲四體書勢與瓘同遇害後贈長水校尉衞玠字叔寳恒之子年五歲風神秀異及長好談名理名士莫不推服拜太子洗馬爲門戸大計奉母南行山簡謝鯤等皆欽重之玠終身不見喜愠之色卒於建業年二十七於時中興名士惟王承及玠爲第一云南北朝魏閻元明安邑人太和五年除北隨郡太守母念元明泣喪明元明悲訴許歸養一見母母目復明詔表孝行復其家母亡服終心喪不輟每忌日悲動旁鄰昆弟雍和百口同居張元字孝始芮城人祖成假平陽郡守父延儁仕州郡累為功曹主簿並以純至為鄉里所推元年十六祖喪明三年元恒憂泣誦經祈祐見盲者得視之言遂延七僧然七燈願以燈光明祖目而巳代闇如此七日忽夢老翁以金鎞療其祖目三日果明祖殁號躍絶而復蘇隨其父水漿不入口三日博士楊軌等二百餘人上其狀詔表其閭周紐回字孝正安邑人性至孝父母喪廬墓側負土成墳廬前生麻一株髙丈許圍之合拱枝葉鬰茂冬夏恒青有鳥棲其上囘舉聲哭鳥亦悲鳴時人異之武帝表其門閭擢授甘泉令隋紐士雄囘之子少質直孝友喪父廬墓負土成墳庭前一槐先甚鬰茂及士雄居喪遂枯死服闋還宅槐復榮髙祖聞之歎其父子至孝下詔襃揚號所居為累德里郭絢安邑人初為尚書令史後以軍功拜儀同厯數州司馬長史皆有能聲大業初宇文㢸巡河北引絢為副拜涿郡贊務遷通守兼領留守捕獲山東羣盜一郡獲全與柳儉敬肅俱以清名聞天下帝賜絢帛百疋以旌之後將兵擊竇建德於河間戰死唐張志寛安邑人居父喪哀毀州里稱之王君廓兵畧地不暴其閭倚全者百餘姓後爲里正忽詣縣稱母病求假令問狀對曰母有疾志寛輒病是以知之令謂其妄繫於獄馳驗如言乃慰遣之母終負土成墳手蒔松柏髙祖遣使者就弔拜員外散騎常侍賜物四十段表其閭柳範解人貞觀中爲侍御史時呉王恪好田獵範彈治之太宗曰權萬紀不能輔導罪當死範進曰房元齡事陛下猶不能諌止田獵豈宜獨罪萬紀帝怒範謝曰主聖則臣直乃解髙宗時厯尚書右丞揚州大都督府長史柳奭字子邵解人父以隋時使髙麓卒奭往迎喪號踊盡哀爲夷人所慕貞觀中累進中書令得罪武后死神龍初復官柳澤解人範奭從孫風度方嚴景雲中爲右率府鎧曹參軍先是姚元崇宋璟輔政白罷斜封官太平公主奏復之澤詣闕上疏不報㑹入調言事睿宗善之拜監察御史開元中周慶立造奇器以進澤復上書諫明皇稱善厯遷太子右庶子卒衞大經解人卓然髙行口無二言武后召之固辭以疾開元時畢搆爲刺史使縣令就謁辭不見大經邃於易人謂之易聖張琇解人父審素以嶲州都督被誣為監察御史楊汪所誅琇與兄瑝流嶺表逃還殺汪吏捕之明皇謂孝子不顧命殺之可以成志赦之則虧律乃殺之臨刑琇色獨自如曰死見父復何恨人莫不閔之為誄掲於道歛錢葬北邙恐仇人發之作疑冢云張守珪河北人慷慨尚節義善騎射由平樂府别駕厯幽州長史河北節度副大使累立邊功開元中入見帝帝賦詩寵之加右羽林大將軍從子獻甫以軍功至檢校尚書左僕射卒贈司空曲環安邑人從哥舒翰討吐蕃拔堡取城授果毅别將安祿山反破賊鋭將與諸將討史朝義平河北大厯中數破走吐蕃威名大振累遷開府儀同三司封晉昌郡王邠隴兵馬使擢邠隴行營節度使皆有戰功改陳許節度不三歲民之客他縣者皆歸焉轉檢校尚書左僕射卒贈司空宋董孝章解州人十世同居咸平中旌表蠲其課調司馬池字和中夏人少喪父家貲數十萬悉推諸父而自力讀書舉進士當試殿廷母亡友匿其報書池心動行至宫門徘徊不能入友告以母病遂號慟而歸後中第厯任州縣皆有政聲擢知鳳翔府召知諫院上表懇辭仁宗謂宰相曰池獨嗜退亦難能也累遷天章閣待制知晉州卒司馬旦字伯康池之子清直敏强雖小事必審思度不中不釋以父任為秘書省校書郎厯知梁山軍安州治郡有大體所施設取於適理便事累遷至大中大夫卒年八十二性與弟光友愛光平時所與論天下事旦有助焉嘗有以罪廢貧不能自存者月分俸以濟之其人願以女為妾旦驚謝出妻匳中物使嫁之司馬光字君實池次子寳元初中進士甲科除奉禮郎厯同知諌院仁宗國嗣未定力陳利害帝大感動英宗立議濮王典禮光言為人後者為之子不得顧私親宜稱為皇伯髙官大國以尊榮之神宗即位為御史中丞上疏論修身之要曰仁曰明曰武治國之要曰官人曰信賞曰必罰皆生平力學所得者常患厯代史繁人主不能遍覽為通志八卷以獻英宗悦之命續其書神宗名之曰資治通鑑俾日進讀王安石得政行新法光疏其利害拜樞宻副使辭請罷制置條例司追還提舉官革青苗助役等法抗章至七八遂求去居洛十五年天下日夕引領望其為相哲宗初起為門下侍郎㝷拜尚書左僕射開言路立十科薦士法凡新法之為民害者不數月間剗革畧盡一變為嘉祐治平之治以勤政致疾卒年六十八贈太師温國公諡文正光孝友忠直不妄言動作必以禮自言平生所為無不可對人言者誠心自然天下敬信建炎中配享哲宗廟廷司馬里字昭逺池從子進士釋褐通判鄜州性廉靜質直所至有惠政每罷官至京師未嘗有所謁官太常少卿卒司馬康字公休光之子幼端謹至孝敏學博通羣書丁母憂毀㡬滅性以明經上第厯校書郎光薨治喪皆用禮經家法得遺恩悉以與族人累拜右正言數進言哲宗及太皇太后多切至以腹疾卒朝野痛之贈右諌議大夫劉永一夏人孝友廉謹熙寕初巫咸水溢入城民多溺永一持竿立門前見他人物流入者輒為擿出之有僧寓錢數萬於其室僧死永一詣縣自言請歸其弟子行事多類此兄太為醫助教居親喪不飲酒食肉終三年司馬光稱之蘇慶文夏人事父母以孝聞母少寡慶文懼其妻不能敬事每戒之曰汝事吾母少不謹必逐汝妻奉教母得安其室終身又同縣臺亨工畫元豐中待詔翰林亨名第一以父老固辭歸養閭里賢之吕圓登夏人以良家子應募捍金兵殽澠間李彦仙保三觜圓登歸之功最多陜州城垂破以兵來援被重創方卧聞城陷遽起戰死司馬朴字文季旦之孫少育於外祖范純仁以純仁遺恩爲官累遷兵部侍郎二帝將北遷朴遺書金人請存立趙氏金兵挾以北去徽宗崩服斬衰朝夕哭金主義而不問嘗授朴行臺左丞朴辭而止後卒於真定訃聞贈兵部尚書諡忠潔金劉祖謙字光甫安邑人承安中進士厯州縣有政績拜監察御史以鯁直稱一時名士如雷淵李獻能王渥皆遊其門官至翰林修撰明王翰字時舉父仲文知夏縣以廉稱既致仕貧不能歸遂爲夏縣人受業歸暘學成結廬中條山洪武初以經明行修辟爲本學訓導改平陸遷鄢陵教諭所至皆有教法永樂初周王聞其才乞爲教授王素驕縱多不法翰數諫不聽因佯狂去久之薦爲翰林編修已復以周邸事調廉州教授倭㓂數千人破城入率諸生巷戰死之藺芳字仲文夏人洪武中舉孝廉累遷刑部郎永樂中出爲吉安知府有惠政已從宋禮開㑹通河又治陽武決河並有功擢工部右侍郎治德州良店黄河故道所經郡邑有不便民者輒疏以聞卒於官史誠祖解州人洪武末詣闕陳鹽法利弊太祖納之授汶上知縣永樂七年考覈郡縣長吏誠祖治居第一特擢濟寕知州仍視汶上縣事益勤於治屢當遷職輒爲民奏留閲二十九年竟卒於任張芮安邑人成化進士厯官翰林學士值閹瑾用事公卿咸違禮庭謁芮獨長揖不拜瑾銜之誣他事謫鎮江府同知瑾誅復起爲太常寺卿薛賓夏八洪武間貢士累官刑部右侍郎建文嗣位改北平布政司叅政燕邸有異謀賓與左布政使張昺密奏上命先發制之事洩賓等入見被執賓抗辨不服令武士以金瓜擊之落其齒俱見殺相世芳安邑人性沈毅質直不苟言笑正徳進士厯官刑部郎中嘉靖初議大禮抗疏直諌忤㫖廷杖㡬斃謫戍延安凡十三年終無怨言隆慶中追贈太常寺少卿劉翀字文翔平陸人正徳末進士累官監察御史發宸濠逆謀武宗北巡力請迴鑾嘉靖初大禮議起抗疏爭之㝷條陳時宜十二事多見采納後卒以直言忤時引􅔂歸李錦字尚絅芮城人母喪廬墓及父喪亦如之竟卒於墓所錦子澤澤子柄皆以廬墓被旌劉敏寛安邑人萬厯進士厯官兵部尚書總制三邊所至簡兵蒐乘儲糈繕堡奏㨗三十有奇進階少保榆林人立祠祀之王國訓字振之解州人天啟進士厯知金鄉夀張滋陽武清諸縣事崇禎中調扶風國訓性剛嚴恥干進故官久不遷八年秋賊來犯偕同城官固守閲兩月外援不至城陷罵賊死贈光祿少卿又同州人趙躋昌天啟舉人初授介休縣教諭陞知咸陽縣闖賊破城罵賊不屈死本朝乾隆四十一年同賜諡節愍王紀字惟理芮城人萬厯進士厯僉都御史巡撫保定歲屢凶累請蠲賑涖任四年部内大治擢漕督並撫鳳陽歲又大祲賑救如畿輔天啟初遷刑部尚書主事徐大化附魏璫紀劾罷之㝷劾閣臣沈㴶交結婦寺為客魏所忌斥歸崇禎初復官贈少保諡莊毅曹于汴字自梁安邑人萬厯中鄉試第一成進士以推官徴授吏科給事中遇事敢言掌京察斥逐羣小殆盡熹宗立遷左僉都御史佐趙南星主京察力扶善類為魏忠賢所斥崇禎初拜左都御史振舉憲規臺中肅然羣小交惡之謝事歸卒贈太子太保于汴篤志正學操履粹白立朝不阿有古大臣風李貞佐字無欲安邑人受業曹于汴之門以學行著天啟舉人崇禎中除郟縣知縣土㓂楊同錦為李自成所殺餘黨猶聚焦家寨貞佐練鄉兵固守城陷𬒳執大罵賊割其舌支解死友人王昱相隨不去賊義之昱收葬貞佐於南郊贈河南僉事本朝乾隆四十一年賜諡節愍姚汝明夏人天啟元年舉於鄉性孝友崇禎中歲大歉傾廪賑濟為蠡縣知縣有惠政懲姦勸善盜多復為良民後為河間同知殉難妻任氏亦死本朝乾隆四十一年賜謚節愍本朝李峕字元仲本州人雄偉有岸畧明末舉人順治初任濟寕道時李自成餘孽猶未平峕勵將士擒獲輒盡法治之賊忿甚一日伺旹出伏數十人執之峕遂被害贈光祿寺卿蕭熙載本州諸生順治初避闖賊難父被執投井號泣從之並死侯佐本州人知建平合肥二縣有循良聲擢刑部主事調吏部姜瓖之變遇賊拷掠不屈與父嗣晉俱被害劉曰晏本州諸生姜瓖之亂㓂至依父不去賊歎其孝釋之比父歿哀毀甚八載不入内李忱字恂九安邑貢生順治中知西安縣以卓異遷鞏昌同知擢知金華府㑹閩變陷金華六屬邑忱獨嚴守禦請兵復六邑克之以勞卒於官馬迪吉夏人明崇禎舉人順治初知鄧州有惠政賊劉二虎率衆數萬犯境迪吉誓死守殺牛畜為食撤屋為薪人無異志賊計窮遁去以功陞治中卒秦章夏人年四十無子兄文亦無子弟錦有二子順治十一年姜瓖餘孽夜肆掠章與妻馮棄其女各負一姪踰牆走質明歸女故無恙文先為賊殺至是錦亦被烙死文妻與其女皆被掠章鬻産贖歸婚嫁之章後亦有子薛佩玉芮城人順治辛丑進士知貴州都匀縣時初改衞為縣呉三桂反駐防兵數千譁譟焚掠佩玉登城呼首領諭令解甲不應擁還署以健卒守之授偽印抗節不屈北向再拜登樓縊死王尹方字鶴㓅安邑人康熙癸丑進士改庶吉士累官内閣學士兼禮部侍郎有清望庚午主試江南多搜落卷中之校閲率至丁夜盡文之變得士最盛事訖以疾乞歸卒性至孝生母殁以適母年髙請終養生母故不慊於嫡母者也鄉黨咸稱其厚葛鳳翔安邑生員性孝友甘貧力學康熙三十年邑大祲鬻田宅及家人簪珥等物以周同族使不至離散族人無食者與之田以耕不能娶者代爲娶又設教義塾造就多成立邑人德之乾隆十一年入祀鄉賢張潤民字膏之夏人性醇謹有守以孝友聞康熙丁未進士由中書舍人累遷河南督學僉事克舉其職嘗拆童子號提調某潛請易潤民大怒再三謝罪乃解人謂公而明爲學政最馬祚錫安邑人孝行著聞同縣孝子郭夢龍楊冲雲俱乾隆年間旌郭丕蘭芮城人孝義著稱同縣孝子郭含章李天仁俱乾隆年間旌流寓漢樂恢長陵人事博士焦永永爲河東太守恢隨之官閉廬精誦不交人物後永以事被劾諸弟子皆以通關被繫恢獨皦然不汚於法張宗魯陽人更始以為偏將軍見更始政亂因將家屬客安邑及大司徒鄧禹西征定河東宗詣禹自歸第五倫長陵人久宦不達遂將家屬客安邑變姓名自稱王伯齊載鹽往來太原上黨所過輒為糞除而去陌上號為道士親友故人莫知其處閔貢字仲叔太原人客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞勅吏常給焉仲叔知之乃歎曰閔仲叔豈以口腹累安邑耶遂去客沛唐陽城北平人徙陜州夏縣及進士第去隱中條山逺近慕其行來學者接於道閭里有爭訟不詣官而詣城決之有奴亦化其德方介自約李泌薦城於德宗召拜諌議大夫王龜其先太原人家揚州穆宗時侍父起至河中廬中條山朔望一歸省州人號郎君谷未始以人事自嬰武宗雅知之以左拾遺召入謝自陳病不任職詔許焉元察罕其先西域板勒紇城人徙解州皇慶元年以中書省平章政事乞歸解州立碑先塋許之暮年隱居德安白雲山别墅以白雲自號嘗入見帝望見曰白雲先生來也其見寵遇如此歸暘汴梁人至元末以集賢學士致仕間關避兵至解之夏縣慕司馬光為人居其墓側讀書以終列女晉衞瓘女瓘為楚王瑋所害及瑋誅瓘女與國臣書曰先公名諡未顯無異凡人每怪一國蔑然無言春秋之失其咎安在悲憤感慨故以示意於是主簿劉縣等上言訟之乃追封瓘蘭陵郡公諡曰成贈假黄鉞南北朝魏孫神妻陳氏河北郡人神當逺戌欲以孤兄子自代陳曰為國征戍因道逺而代以孤姪天下誰其相許神感其言乃自行在戌未㡬便喪槥柩至陳望見哀甚一慟而卒文帝詔表其閭唐衞孝女夏人字無忌父為鄉人衞長則所殺無忌甫六歲無兄弟母改嫁逮長志報父讐㑹從父大延客長則在坐無忌抵以甓殺之詣吏稱父冤已報請就刑巡察使褚遂良以聞太宗免其罪給驛徙雍州賜田宅令州縣以禮嫁之宋司馬沂妻李氏夏人年二十八沂殁父母欲奪其志翁姑亦遣焉李不可惡衣蔬食躬執勤勞教二子詠里詠早卒里登進士第累官太常少卿李封永夀太君元孫某妻呉氏平陸人夫第進士亡無子所親欲奪其志令再醮巨室王氏子呉堅拒不從後遇亂投崖死明劉達妻李氏安邑人夫亡守節有富民求為室姑諾之李引刀截其左耳遂不櫛沐年七十五卒任明妻樊氏夏人夫亡無子守志不嫁事舅姑盡婦道夫從子迪幼失母繼母逐之樊養撫如子迪亦事樊如母宏治末大疫夫弟峻舉家俱病人爭避之樊獨為餽湯藥勤省視卒得全活樊亦無染夀九十三卒尉時常妻田氏夏人事姑盡孝姑病割股食之生五子夀百歲曾孫百人耿四目妻張氏解州人夫亡姑憐其少令他適張佯順姑意曰母老且病婦當代子養俟母百年後嫁未晚也後年餘姑卒紡織自給堅守以終李貞佐母喬氏安邑人貞佐知郟縣李自成來㓂城陷貞佐罵賊被殺母喬亦死之又楊時和妻劉氏安邑城陷亦罵賊遇害孫貞妻柴氏夏人崇禎五年避賊山谷賊搜獲引其手柴嚙其肉而棄之曰賊汚吾手執其臂又嚙其肉而棄之曰賊汚吾臂賊義其節而去柴罵不絶聲賊怒返殺之本朝柳星妻邱氏本州人姜瓖之亂賊入室索金帛夫婦並被拷掠邱紿賊釋其夫去攜幼女投井死周光祚妻犢氏安邑人姜瓖之亂被掠時幼子在抱善言誘賊以子授夫令竄既逺犢乃挺身大罵賊怒殺之同縣張鳳鳴妻馬氏亦罵賊被殺又李肇元妻曹氏明都憲于汴女李禧引妻王氏皆遇盜不屈投井死馮景運妻董氏夏人姜瓖之亂避兵尉郭堡堡破棄子女投井死楊燦妻張氏夏人順治中燦赴省張歸母家夜半土賊發突入寢擁執上馬張倒投於地罵不休賊攢刃刺殺之又周廷旦妻張氏遇盜奪其襁褓兒厲聲大罵賊斫死之鄧進龍妻張氏平陸人姜瓖之亂張隨衆避賊行至絶崖張坐地不行㓂俄至投身崖下死又陳惟謙妻仝氏避賊𬒳掠抱兒玉平投深谷死三日收其屍面如生兒竟無恙姚玉鏡芮城人姚鳳翀之次女姜瓖之亂偕母妹走避賊突至鏡謂母率妹東奔既逺鏡以石自擊其額伏地大罵冒白刃死同被難者巡檢董其宇妻王氏自刎死王之興妻張氏孫萬正妻王氏張茂逺妻韓氏王希望妻趙氏蕭禹妻李氏董建都妻楊氏俱投井死李順妻任氏本州人順貧無寸土㑹歲凶姑恐其餓死欲嫁之不聽為富室傭女紅與之食不食必懷以遺姑姑八旬患癱瘓任哺飲食手溲溺晨夜無間姑殁將葬雨連旬任與夫哭告鄉里衆感其孝為發喪築土頃刻而成邢烈女安邑人許字王偘上元節舉家出遊有强暴踰牆挑之女堅拒不從遂遇害晉思忠妻盧氏夏人夫亡守節事姑一日姑攜孫出盧獨居族無賴犯之盧不從遇害事聞被旌藺國秀妻房氏夏人國秀薙豆田間房往助之遇强暴堅拒不從遂為所害康熙四十九年旌鄭某妻張氏夏人姑久病卧不安席張以股承之雖至腫弗恤後遇盜與女生姐俱自縊馬淑援妻韓氏夏人年十九夫亡無子守節奉姑姑殁鬻産營葬值歲祲人咸逃竄就食韓獨處餓死於室楊烈女平陸人文業農與妻偕往田間惡少踰牆逼女詈罵不屈被勒死呉發龍妻令狐氏平陸人美而賢夫以役赴省令狐往田中遇强暴不從被害張迎吉繼妻劉氏芮城人撫前妻子如巳出遇盜逼之投井掠其子去劉溺兩日不濡遇救出哭求子卒知其所在傾貲贖囘李鵬翹妻介氏本州人夫亡守節同州節婦王培槐妻許氏俱乾隆年間旌張三統妻樊氏安邑人夫亡守節事親盡孝同縣節婦劉日巖妻郭氏丁三仁妻馬氏郭步林妻丁氏周邵繼妻景氏吕坪妻弋氏相于藩妻張氏文道源妻丁氏周自修妻張氏張西雝妻李氏相元品妻景氏張妻任氏景作棟妻李氏任光紳妻晉氏柴世榮妻閆氏張其烈妻徐氏劉肅誥未婚妻張氏王澤妻張氏曹瑨繼妻張氏俱乾隆年間旌樊鎖娃妻劉氏夏人守正捐軀同縣烈婦王維翰妻張氏貞女閆秉隨女節婦王如章妻周氏張慎習妻姚氏張世瓊妻賈氏李紳妻王氏毛宏道妻金氏張世瑋妻帥氏高學仁妻申氏蘇芬妻張氏張肇基妻景氏孫日省妻張氏張世珻妻陳氏姚帝徴妻裴氏蔡瑜妻馬氏蔡都傑妻張氏張好義妻裴氏崔陵妻陳氏俱乾隆年閒旌姜恂饒妻車氏平陸人守正捐軀同縣節婦暄升之妻杜氏張不伐妻李氏伊素寬妻楊氏趙仁術妻楊氏俱乾隆年閒旌李為楷妻劉氏芮城人夫亡守節同縣節埽薛歩雲妻吕氏薛歩元妻姚氏陰根立妻杜氏俱乾隆年閒旌高毓密妻李氏本州人夫亡守節同州節婦雷慶繼妻上官氏許汝臘妻呂氏介雲衢妻李氏介雲翼妻董氏范折桂妻張氏俱嘉慶年閒旌葛元陽妻宋氏安邑人夫亡守節同縣節婦吳恂妻王氏關振都繼妻吕氏文檜妻陳氏孫玉藴妻張氏李毓騉妻郭氏胡景曽妻郭氏李延忠繼妻劉氏郭磐繼妻南氏孫鉽妻李氏黄趙氏俱嘉慶年閒旌孫允潘妻田氏夏人守正捐軀同縣烈婦崔九長妻張氏武振蒼妻裴氏蘇滿金妻吳氏節婦郭景儀妻侯氏蘇台妻仝氏柴聯召妻呉氏陰璠妻常氏陰興祿妻李氏嘉承恩繼妻耿氏嘉承詔妻張氏李常年妻趙氏李宗正妻曹氏張維妻高氏王祿妻歐陽氏俱嘉慶年閒旌史奉陽妻王氏平陸人夫亡守節嘉慶年間旌薛長源妻張氏芮城人夫亡守節同縣節婦薛繼文妻王氏薛大業妻吉氏宋全綱妻王氏張温㳟妻陳氏党超祥妻蔡氏王璇繼妻陳氏俱嘉慶年閒旌仙釋漢王喬河東人顯宗時為葉令喬有神術每朔望自縣詣臺朝帝怪其來數而不見車騎密令太史伺之言臨至有雙鳧從東南來舉羅張之得一舄乃所賜尚書官屬履也孫博河東人讀書能屬文晚學道能使草木皆為火光照耀數十里行大水中身不沾濡後入林慮山合神丹仙去唐侯道華芮城人初河中永樂道淨院有道士鄧太元錬藥貯院内道華在院供給使常好子史手不釋卷或問要此何為答曰天下無愚懵仙人咸大笑之一日入市醉歸悉斫其院前松枝曰無礙我上昇處也後七日松上有雲鶴笙歌道華飛坐松頂揮手謝去金李寶安邑人冬夏披中衣寒暑不侵談笑遊廛市見者輒獲利人圗其像以爲利市神大定二十年詔賜方外衣不受朝退失履而去自燕至安邑二千餘里不二日還土產鐵漢書地理志安邑縣有鐵官錫平陸縣箕山出鹽安邑縣鹽池出漢書地理志安邑縣有鹽官唐書地理志安邑縣有鹽池朴硝出州硝池礬州有膽礬窟葡萄安邑縣岀棗安邑縣出名曰御棗明初曾充歲貢海榴通志出安邑者佳藥寰宇記解州產升麻黄芩瓜蔞根按隋書地理志安邑縣有銀冶唐書地理志解州有銅穴十二平陸縣有銀穴三十四銅穴四十八今並無聞纂修官臣馮芝恭纂總纂官臣顧蒓許應藻恭覆輯校對官臣牛鎮恭校
