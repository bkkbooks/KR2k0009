徠夷猓次年委勘景東陶上官讐殺事投賄不納被毒而卒馬自然內江人成化間任姚安知府時大石淜散溢民田患水不均自然築隄開東西二閘以時啓閉遂永為利王家慶內江人宏治中任姚安知府以剛介稱建東西南三城甃石橋於蜻蛉諸渠民不病涉蔣哲貴州衛人宏治初任廣通知縣剛介廉明沐國公家人有恃勢作威者按治如法卒於官百姓哀之范璋餘姚人宏治𥘉以工部主事忤權貴謫吕合驛丞尋升楚雄知縣卜遷學宫誨勵諸生多所成就董朴麻城人正德中知楚雄府重學校朔望詣學講論四時考校以示勸懲諸生貧不克葬者捐資以助增祭器建學舍立哨堡課農桑尋升江西參政黃澍侯官人正德中知姚安府雪寃獄十三人建棟川書院以課士祝宏舒溫江人嘉靖問任楚雄知府篤意學校易五顯祠為龍岡書院武定鳳朝文之亂遠近歸之賊不敢入其境威慎宣城人嘉靖間任楚雄知府清介不畏強禦卒於官同僚為殮劉名弼長垣人嘉靖間以通判署楚雄縣仁恕清慎創建義學邑之人文蔚起皆其力也何應和東莞人嘉靖間任南安知州撫民以仁禦盜以信境內肅然後以終養歸踰年有安龍之變州人感曰何公在當不至是苟詵華陽人嘉靖中知南安州清苦茹淡時蠻賊安龍焚掠州境三十餘年詵出竒設䇿入巢穴格殺之地方以安立祠祀焉莫相全州人嘉靖中知姚州才敏行潔安鳳之亂首倡大義得衆萬餘人晝張旗鼓夜則登陴守城賊憚不敢入民賴以安趙恆晉江人嘉靖間知姚安府有才識善決獄曲直莫能逃楊曰贊揭陽人嘉靖間任姚安知府剛方廉潔時苴却蠻荼毒民人曰贊白大吏除之並設守備督營兵為守禦民立石頌功王鼎汝州人嘉靖間以御史出知姚安修城池飭學校教民植桑麻務紡織教以男冠女髻禁婦人不得市易立保甲以察盜賊姚境稱治何朂枝江人嘉靖間任姚安知府修築夾口壩注水以濟大石淜之不及至今利賴張大亨全州人弱冠領鄉薦以嚴嵩為其大父門生故二十餘年不出仕隆慶初擢楚雄府同知攜一蒼頭一稚子自隨於吏事迎刃而解芟除九場巨憝民賴以安侯文才營山人萬厯中知楚雄府郡人不知紡織文才始教之𧖟桑布帛之利以興溫可貞東莞人萬厯中知南安州時鎮莊民施成信乘武定之亂脅衆肆掠可貞募鄉勇三千人築兩龍營寨擒巨魁殲之邊境獲安殷輅博羅人萬厯間任南安知州奉母至孝風動一州尤多惠政李翹大邑人萬厯初由雲南府通判升南安知州視民如子州人肖像偕溫可貞殷輅稱三賢祠祀之周希尹宜山人萬厯間任姚安知府務敦大去煩苛土官皆奉法惟謹捐修南中書院甃大石淜諸閘士民德之郭崶昆明歲貢生任楚雄訓導與參謀楊畏知倡建守城䇿後為孫可望杖殺妻葛氏先投井死童述先沔陽人萬厯中任姚安府推官姚自武定變後人民凋瘵述先署府事革軍民火耗及所解公費米鹽雜稅民困以蘇羅廷璠豫章人崇禎間知楚雄府與民休息興學除姦卒官土人肖像祀之孔元德威清衛人崇禎中任姚安知府姚曠遠各淜聚水難以全濟元德自行擇地捐築豐樂淜聚水溉田歲增穀千餘石人物元量成段氏臣世居威楚代高泰運為相遣使內附能恤孤寡老幼風俗化之稱夷中君子楊惠威楚人父早逝母疾禱神求代母感神夢以子孝延年翌日病痊年八十五卒惠負土營墳廬墓三年有司以聞表其門蠲徭役明高惠姚州土舍洪武十七年土官自久寇品甸惠為姚州同知從西平侯沐英擊平之二十年普定侯陳桓總制雲南於姚安等處立營屯糧時惠治姚安安輯其民稱能吏王用之鎮南州人宣德間任交趾慈廉州知州交人叛被執不屈死事聞贈官賜祭趙和白鹽井人天順間母遭兵掠和年十四晝夜涕泣隨至遼東見其母主者留不即遣和泣血哀求乃與母俱還高梓潼賜姚州土州同五歲喪父母談氏病痿痺朝夕稽顙北辰求代母病目賜時舐之病癰又吮之俱愈成化中詔豫旌表高棟姚州土舍宏治十六年普安賊叛屠郡縣棟與指揮唐永擊之奮勇殺賊追至板橋驛遇伏孤身轉戰身中數鎗而死宋鈺楚雄人正德中蘄水教諭擢知嶽池多惠政登仕籍二十年所得俸資悉周親族家無餘財王鳴鳳大姚人事母以孝聞知府王鼎竒其學行為擇娶則一醜女也鼎欲更娶鳴鳳不可曰此女見棄終身失所矣鼎益奇之以貢謁選至京師從王守仁學獻籌邊六夢神授方母病遂愈後母殁廬墓側時羅賊劫掠感其孝舍之而去兄鯤舉家疾疫鯉與同寢處供湯藥萬厯七年詔賜銀幣建坊旌奬劉九疇姚安人由貢生知綦江縣方出仕盡以遺産讓諸弟鄉里重之萬厯間賜孝友馳聲扁額靳時芳姚安人侍父赴京父在途疾不能乘馬時芳背負而行母病癰時芳晨夕抱扶厯三十二年如一日家貧教授跬步有繩尺遊其門者皆有規程姪仕清幼孤撫之成立年八十三卒周孔徒定遠人性孝友撫兄子育弟妹周濟貧乏鄉里稱之子昌祚天啓進士少孤事母以孝聞官大理評事丁師羲楚雄人崇禎中知霸州時州城被兵竭力戰守城陷死之贈參議本朝乾隆四十一年賜諡節愍俞觀楚雄人與弟益潛心理學教授生徒遠近負笈而至時土賊陷城聞其名迫之使見不屈自投泮水遇救遂隱不出杜天楨楚雄人崇禎末土賊沙定洲攻城天楨創議力守監軍楊畏知敗於流寇城中瓦解天楨至西城樓書壁曰恨滇南無一赤心男子求後世免一青史罪名正衣冠自縊王承憲楚雄人崇禎末襲職為楚雄衛指揮中武舉授遊擊為楊畏知前鋒沙定洲圍城承憲擊却之賊陰誘其部曲承憲大呼手刃數人與弟承瑱俱戰死本朝乾隆四十一年賜諡烈愍謝琯楚雄人任四川遵義推官適流寇攻城琯戰敗不屈賊令屠城琯曰苟止殺吾當從汝賊喜遵義人遂獲免迫與偕行至貴陽自縊於學宫本朝乾隆四十一年賜諡節愍陳士性楚雄人崇禎末任冀州州同流賊陷城不屈死之本朝乾隆四十一年豫入忠義祠王家祥楚雄廪生流賊人城闔家二十九口皆投水死本朝乾隆四十一年豫入忠義祠張朝綱廣通人崇禎時任渾源州州同解職歸流寇至廣通朝綱謂妻馮氏曰吾受國恩何忍偷生與妻從容自縊長子耀葬親訖亦死本朝乾隆四十一年賜諡節愍包洪䇿廣通人崇禎末任新都知縣甫四月流寇至䇿力守孤城兵少食盡城陷被執不屈罵賊死李師泌姚安人邑武生吾必奎叛楊畏知任楚雄監軍以守備委師泌協守必奎陷城師泌不屈直前大罵賊令䥷其首師泌罵曰賊奴䥷人何不先其足乎遂從足䥷至首而死楚人莫不哀之本朝乾隆四十一年豫入忠義祠席上珍姚安人崇禎中孫可望等入雲南上珍與州守何思大姚舉人金世鼎嬰城固守城陷世鼎自殺上珍被執至昆明罵賊磔於市思亦不屈死之本朝乾隆四十一年豫入忠義祠本朝楊三奇南安人順治間有賊劫其家父被執三奇年十四奮身抱賊曰但傷我母傷我父遂受刃死父得全陳士驥南安人順治舉人吳三桂反檄官之拒不受事平授隆德縣知縣徐達乾字躋菴楚雄人康熙癸丑進士吳三桂叛杜門八年脅以偽命不屈賊平滇撫疏薦授山東高苑縣有殊績纍遷吏科都給事中張肫仁楚雄人康熙癸卯舉人吳三桂叛脅以官不受貧居教授以終李天秩楚雄人康熙庚午舉人當事重其才延為山長議論開發一時人士多所成就薩綸錫楚雄人康熙乙未進士選庶常授檢討氣度安詳詩文博雅為迤西甲科之首夏詔新姚州人雍正七年選拔厯官瀘州所至以廉能著致仕歸與兄弟共財産多義舉且以家藏十三經草一史送書院三姚人士無不佩其德陳綏端定遠人純孝性成乾隆五十一年白井季魯望嘉慶間以順孫旌又旌流寓唐李善江都人善屬文淹貫古今號為書簏顯慶中纍遷崇文館直學士為文選注敷析淵洽坐與賀蘭敏之善流姚州尋赦還宋高量成大理人世為段氏相避位不仕築城於威楚之德江村恤孤寡教子弟風俗為之一變明黃輔巴縣人成化間以舉人任南安州學正後寓廣通聚徒講學士類賴其陶成今子孫猶在南安黃守鐘宋黃庭堅之後官於姚遂家焉列女明王定邦妻孫氏楚雄人年二十九夫亡守節訓二子承寵承憲以忠義立身後俱死國難氏年八十三卒王俊妻嚴氏楚雄人夫卒無子甘貧守節而終楊時泰妻何氏鎮南人年二十七夫卒撫孤教子夀至百歲鞠以和妻楊氏南安人年二十三夫亡無子誓志守節年至九十一歲楊煥袍妻楊氏南安人年二十值沙賊之亂氏被執厲聲罵賊冒刃而死包遇景女定遠人為野寇所掠女不辱𬒳殺周國正妻張氏定遠人年二十夫踰垣失足死氏舐其血大慟自縊以殉周如盤妻陸氏定遠人年十五夫卒氏悲涕不已至夜遂死於尸側孟宗聖妻溫氏定遠人年二十餘夫殁事姑孝教子成立夀至百歲李大中妻張氏定遠人遇賊劫掠恐為所污投河死蘇蘭妻董氏廣通人年二十六夫亡守節安鳳之變劫掠至縣氏負姑遠避崎嶇山谷間卒免於難楊世恩妻韋氏廣通人崇禎五年野賊焚民居氏恐受辱投烈熖中死徐光鼎妻萬氏廣通人崇禎五年野賊破城氏投池死段元臣妻王氏廣通人野賊破城為賊兵所獲投水死劉襄妻高氏姚州人明末流寇陷城氏懼辱抱幼子投井死陳友忠妻魯氏江南人隨父戍姚安所年二十八夫戰死交趾氏撫孤守節成化中旌靳志妻趙氏姚安人守節撫孤子復卒撫孫成立王經妻張氏大姚人夫卒苦節事親撫子鳴鳯戉立後官縣令以清節著人以為母教施經綸妻張氏大姚人夫卒於官臨訣託以養父母氏扶櫬歸有欲奪其志者氏泣曰違夫何以相見地下孝事舅姑守節終身景同春妾趙氏琅井人同春夫婦相繼殁氏為立嗣殮如禮葬前一口自縊死家人哀之同穴葬焉張震妻王氏白鹽井人年二十夫卒撫子世榮及長娶婦世榮又殁姑媳相依守節不渝席上珍妻封氏白鹽井人流寇張虎陷姚州上珍罵賊死氏亦𬒳執將逼之氏紿曰姑俟七日乃可賊禁氏廟中伺間潛出投井死今名其井曰節井王鳴鳳妻王氏嗚鳳由嵩明遷居白井黔國公委理迤勳莊流寇之變天波出奔鳴鳳率莊人起義往衛臨行謂氏曰藐孤一線其付之鄉乎後力戰死氏年二十八攜孤英避居麗江土知府木瑶嘉其忠節庇之遂撫英成立夀七十七終本朝謝泰來妻金氏鎮南人夫亡守節事親教子康熙間旌袁尚義妻李氏楚雄人年少夫亡事親守節與同縣陳所養妻羅氏白璋妻王氏均雍正間旌張天琯妻孟氏定遠人守節撫孤雍正間旌魯達道妻李氏姚州人夫亡守節孝慈兼至雍正間旌倪光捷妻王氏大姚人年少夫亡撫孤成立雍正間旌王希孔妻張氏白鹽井人夫亡守節雍正間旌陳天成妻薩氏楚雄人夫亡無子撫姪成立與同縣江長源妻劉氏劉宗孟妻王氏宋學平妻卜氏均乾隆間旌李德湛妻段氏南安人夫亡守節孝慈兼至乾隆間旌李濬妻楊氏定遠人夫亡守節與同縣金淳妻田氏唐廷對妻李氏李森榮妻王氏均乾隆間旌張鏡妻徐氏姚州人夫亡守節與同州由虞升妻再氏李望道妻袁氏王式良妻朱氏唐德焯妻羅氏均乾隆間旌張天瓊妻宋氏黑鹽井人撫孤守節乾隆間旌王九章妻張氏白鹽井人夫亡守節與同里王肇統妻何氏楊世基妻王氏均乾隆間旌花筆平妻宋氏楚雄人夫亡守節與同縣卜爾松妻陳氏倪育衛妻麥氏均嘉慶間旌侯德周女定遠人守貞不字嘉慶間旌高代空妻何氏姚州人夫亡守節嘉慶間旌沙應龍妻趙氏大姚人夫亡守節與同縣陳玠妻華氏均嘉慶間旌李輝魯妻洪氏白鹽井人夫亡守節與同里張燦祖妻王氏陳統舜妻唐氏夏元璋妻張氏王惟相妻郭氏均嘉慶間旌仙釋唐楊波遠葉榆人永徽時嘗騎三角青牛逍遙威楚間滇池鹽井四十餘處皆楊所開王載元南詔時同友張明亨棲威楚之五樓山有道人至自稱無心昌道人與飲歡噱起謂二子曰來年秋風起塞外吾當再來及期道人果至攜醇酒與二子飲飲畢騰空而上二子亦俱仙去後人謂昌無心乃吕字也其吕巖乎遂名閣關灘為吕閣土産金唐書地理志姚州土貢麩金明統志龍蛟江出銀楚雄南安出鹽白鹽井出墨鹽定遠縣出黑井琅井廣通縣阿陋井猴井俱産鹽色黑麝香唐志姚州土貢莎羅布寰宇記姚州有橦木皮可為布府志即梭蘿布越氊寰宇記姚州産又引蜀記云雲南越毭􅪭罽也響石出楚雄縣文殊山聲清越宜為磬今無錦雞白鷼俱府境出龍目寰宇記姚州産似荔枝菩提子俗名木槵子可為念珠圓淨勝他産世傳高泰祥死節一女流亡民間未知兄弟所在手植此樹以卜存亡九植咸茁久之盡得今存者九族
