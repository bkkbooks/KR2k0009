body:
  text: 南龍州貞觀中更名鉤州隸戎州都督府按元史地理志唐隸牂州天寶末沒於南詔蒙氏置通海郡都督府段氏改為通海節度尋改秀山郡後復名通海阿𤏡部蠻居之元憲宗六年內附置阿𤏡部萬户府至元八年改為南路十三年又改為臨安路隸雲南行省明洪武十六年改為臨安府屬雲南布政使司本朝因之屬雲南省領州三縣五長官司五建水縣附郭東西距七十里南北距二百十里東至阿迷州界三十里至石屏州界四十里南至蒙自縣界五十里北至通海縣界一百六十里東南至蒙自縣界二百八十里西南至納樓司界六十里東北至寧州界一百三十里西北至石屏州界三十里漢益州郡賁古縣地唐時烏麼蠻地元和間蒙氏築城名惠􅝮漢語曰建水段氏時為些麼徒蠻所據元初內附置建水千户所屬阿𤏡萬户府至元十三年改建水州屬臨安路明為臨安府治本朝因之乾隆三十五年改州為縣石屏州在府城西八十里東西距一百九十里南北距三百五十五里東至建水縣界四十里西至元江州界一百五十里南至納樓司界二百里北至通海縣界一百五十五里東南至建水縣界九十八里西南至元江州界一百七十里東北至建水縣界六十里西北至嶍峩縣界一百里漢益州郡地蠻曰舊欣漢言林麓唐時烏麼蠻居之段氏時阿𤏡蠻奪據闢地得石坪聚為居邑因名石坪元至元七年改邑為州隸臨安路明洪武十五年改曰石屏州屬臨安府本朝因之阿迷州在府城東南一百二十里東西距二百九十里南北距三十五里東至開化府界二百里西至建水縣界九十里南至蒙自縣界五里北至廣西州彌勒縣界三十里東南至蒙自縣界三十六里西南至納樓司界一百五十里東北至彌勒縣界二十里西北至建水縣界六十里漢益州郡地元初為阿寧萬户府阿寧古蠻名後訛為阿迷至元初隸南路總管府大德中隸臨安路明洪武十五年改置阿迷州屬臨安府本朝因之寧州在府城東北二百五十里東西距一百二十里南北距一百四十五里東至廣西州彌勒縣界九十里西至通海縣界三十里南至建水縣界九十五里北至􅊹江府江川縣界五十里東南至蒙自縣界八十里西南至建水縣界七十里東北至􅊹江府河陽縣界七十里西北至江川縣界四十里漢益州郡地蜀漢為興古郡地晉為梁水郡地唐𥘉為南寧州地武德七年析置西寧州貞觀八年改黎州天寶末沒於蠻尋屬爨部又屬寧部元初置寧部萬户後改寧海府至元十三年改寧州隸臨安路明屬臨安府本朝因之通海縣在府城西北一百五十里東西距三十里南北距七十里東至寧州界十里西至河西縣界二十里南至建水縣界二十里北至寧州界五十里東南至建水縣界五十一里西南至石屏州界六十里東北至寧州界二十里西北至河西縣界十五里漢句町縣地三國漢屬興古郡唐置通海鎮後為阿𤏡蠻所居蒙氏於此置通海郡段氏改秀山郡尋復為通每郡元初立通海千户所隸鄯闡萬户至元十三年改通海縣隸寧海府二十七年隸臨安路後又改隸寧州明屬臨安府本朝因之河西縣在府城西北一百八十里東西距七十里南北距五十里東至寧州界三十里西至嶍峩縣界四十里南至通海縣界五里北至􅊹江府江川縣界四十五里東南至通海縣界十五里西南至石屏州界五十里東北至寧州界五十里西北至􅊹江府新興州界三十里漢益州郡地唐初置河西縣隸西宗州天寶後沒於蠻後阿𤏡蠻居之名休臘部元憲宗六年內附七年即阿𤏡蠻立萬户所以休臘隸之至元十三年置河西州隸臨安路二十六年改為縣明屬臨安府本朝因之嶍峩縣在府城西二百六十里東西距一百一里南北距一百六十里東至河西縣界一里西至元江州新平縣界一百里南至石屏州界六十里北至雲南府易門縣界一百里東南至河西縣界二里西南至石屏州界六十里東北至􅊹江府新興州界二十五里西北至易門縣界一百里漢益州郡地唐時為嶍倪蠻所居名嶍峩部後併於阿𤏡元初內附置嶍峩千户隸阿𤏡萬户至元十三年改為嶍峩州二十六年降為縣隸臨安路後改隸寧州明初改屬臨安府本朝因之蒙自縣在府城東南一百五十里東西距一百十里南北距一百二十里東至開化府界三十里西至建水縣界八十里南至開化府界四十里北至阿迷州界八十里東南至開化府界六十五里西南至建水縣界三十里東北至阿迷州界五十里西北至建水縣界六十里漢益州郡地白蠻居之以目則山而名訛為蒙自南詔時以趙氏鎮守至段氏為阿𤏡所有元憲宗七年置蒙自千户隸阿𤏡萬户至元十三年改為蒙自縣隸臨安路明屬臨安府本朝因之虧容甸長官司在府西南一百四十里東西距四十五里南北距二十里東至阿迷州界二十里西至元江州界二十五里南至舊滇處司界十里北至石屏州界十里本虧容甸部元隸元江路明改為長官司屬臨安府本朝因之土長官阿氏世襲納樓茶甸長官司在府西南一百八十里東西距二百里南北距二百四十五里東至納更土司界七十里西至元江州界一百三十里南至元江州界一百五十里北至建水縣界九十五里本蠻地唐時蒙氏名為茶甸元置十户隸阿寧萬户後分為二千户隸雲南行省又改納樓茶甸明改為長官司屬臨安府本朝因之落恐甸長官司在府西南二百里東西距二百里南北距一百五里東至舊溪處司界七十里西至元江州界一百三十里南至建水縣界九十里北至思陀司界十五里本伴溪落恐部元置軍民萬户屬元江路明改長官司屬臨安府本朝因之土長官陳氏世襲左能寨長官司在府西南二百三十里東西距四十五里南北距三十五里東至落恐司界三十里西至思陀司界十五里南至舊溪處司界十五里北至思陀司界二十里舊為司陀甸寨明置長官司屬臨安府本朝因之土長官吳氏世襲思陀甸長官司在府西南二百五十里東西距一百里南北距六十里東至元江州界七十里西至落恐司界三十里南至左能司界十五里北至元江州界四十五里本官桂思陀部元置和泥路屬元江路明改為長官司屬臨安府本朝因之土長官李氏世襲形勢南連交趾北抵􅊹江西連楚雄為滇南之上閫作邊陲之保障通志風俗習俗質野採獵為業明志士尚氣節民專稼穡畏法不爭崇文敬老通志城池臨安府城周六里有奇門四自城東北繞西北至西南有濠舊有土城明洪武二十年易以甎本朝康熙四年雍正五年十三年屢修石屏州城周四里門四有池明嘉靖三十年創築土城天啓五年易以甎本朝康熙六年修雍正四年復修阿迷州城周三里門四舊土城明正統間築萬厯四十五年易以甎本朝康熙九年雍正八年屢修寧州城周三里門三明嘉靖十一年始築土城崇禎十三年易以甎本朝康熙十一年修通海縣城周二里門四有池即通海守禦所明洪武十五年創築土城二十四年易以甎本朝康熙八年裁所歸縣移縣治於此五十六年修河西縣城周二里有奇舊有城久廢明成化間遷建崇禎六年砌石嶍峩縣城周一里有奇門四有池舊有土城明正德六年移築崇禎七年易以甎本朝雍正七年重修蒙自縣城周四里門四明成化二十年創築土城萬厯四十三年易以甎本朝雍正八年修學校臨安府學在府治西元時創建本朝康熙中屢修入學額數二十名建水縣學附府學內舊為州學明萬厯四十三年建本朝乾隆三十五年改為縣學入學額數二十名石屏州學在州治東明洪武二十二年建本朝雍正元年修入學額數二十名阿迷州學在州治東北明再遷本朝雍正三年移於今所入學額數十五名寧州學在州治東明洪武二十六年建本朝康熙中屢修入學額數十五名通海縣學在縣城南明洪武二十五年建本朝康熙二十九年雍正十一年屢修入學額數二十名河西縣學在縣治南元泰定中建本朝康熙中修雍正七年重修入學額數二十名嶍峩縣學在縣城北明天啓七年移建本朝康熙三十四年雍正十三年屢修入學額數十二名蒙自縣學在縣治東明洪武二十七年建本朝康熙二十年五十一年屢修入學額數十八名崇正書院在建水縣西門外明嘉靖間建崇文書院在建水縣治本朝康熙十九年知府董宏毅建煥文書院在建水縣治本朝康熙五十五年知縣陳肇金建龍泉書院在石屏州治萬厯間建本朝乾隆十八年知州管學宣修靈泉書院在阿迷州冶本朝乾隆三十五年知州邊鏞改建凝陽書院在寧州治本朝乾隆四十八年知州周鑑等建秀麓書院在通海縣治本朝乾隆五十四年知縣朱觀光建登雲書院在嶍峩縣治本朝乾隆五十八年知縣戴丹書等建觀瀾書院在蒙自縣治本朝乾隆五十七年知縣李焜等建户口原額人丁共一萬九十九百一十四今滋生男婦大小共四十萬五千二百九十六名口計九萬八千三百九十一户又屯民男婦大小共十二萬七千一百三十四名口計三萬六千七百二十八户田賦田地九千九百三十四頃二十九畝七分有奇共額徴地可正雜銀二萬三千九百一十九兩七分六釐未一萬八千三百四十一石六斗五升一合七勺山川石巖山在建水縣東十五里或謂之蒙山山麓有洞異龍湖瀘江諸水流入其中流出入阿迷州界府志山麓有洞三一曰水雲洞亦名雲津洞亦名中洞亦名巖洞門前虛敞可容數百人瀘江之水赴以為壑冬月水落架橋列炬而入石笋倒垂如龍蛇虎豹之狀旋轉回合幾二十里一曰南明洞在水雲洞後上有兩竅陽光射入見石牀丹竈一曰萬象洞與南明洞相連勢更峻絶厯級而上隱隱聞風雷聲通志昔遷客閻間所闢又稱閻洞亦曰句町三洞州志三洞合五河之氷匯為一泓折而入西阻華蓋連岡疊嶂延亘數百里為郡城右臂捧印山在建水縣東二十里有石如印在山巔俗云仙人捧印矣和波山在建水縣東南沙寨村林壑之美宛如畫圖象山在建水縣南五里其形如象煥文山亦作判文山明統志在建水縣南二十里高千餘仞中有三峯削出如筆架昔大理段思平外舅爨判居其上因名府志煥文山在府南三十里北拱學宫三峯秀拔其影倒入泮池本名泮文後易今名連雲山在建水縣南二十里四時常有雲氣寶山在建水縣西南二里産石如寶相傳此山夜有光如火又樂榮山在府城西南三里其土香美作餅炙熟可食𤏡婦每嗜之溪處山在建水縣廢溪處甸西奇峭延長中多溪澗接虧容甸司界火焰山在建水縣西北十里土有硫黃氣履之灼足著枯葉即焦攣疾者卧其上輒愈又有豐山與火焰山相連土地肥沃草木茂盛民居其間者多富足黑沖山在建水縣西北四十里雲深樹暗多瘴厲人不敢往晴山在建水縣北三十五里舊名北嶺山勢嵯峩林木蔥鬱與煥文山相峙為郡之主山三台山在建水縣東北八十里俗名三尖山絶巘凌空羊腸一線上有梁王城昔蠻酋常恃險居此又雲龍山在縣東北九十里一名回龍山石門山在建水縣東北百里箐口鑿石為門以通車馬下臨曲江險隘可守菜玉山在石屏州東十五里産石碧潤如玉謂之菜玉下有石碧澗海門山在石屏州東四十里橫堵異龍湖口一名海東山雲臺山在石屏州東南雲臺里産異石鍾秀山在石屏州南二十五里延亘百餘里明統志中産紫石可採為研又有寶山在鍾秀山右産石如圓珠蓮花山在石屏州西三里形如蓮下有蓮花池乾陽山在石屏州北五里高五百餘丈延亘二十里中有石洞山麓有乾陽龍王祠歲旱禱雨之處烏充山在阿迷州東二十五里明統志又名東山嘗有烏飛集其上通志州之鎮山也每晨有白雲亘山腰恍如玉