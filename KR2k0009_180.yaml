斬衆皆踴躍賊舟將至衆欲迎敵祐曰無急也無何賊兵蟻附發炮擊之連碎數十舟斬首數百級受圍七旬糧乏富民王帑出粟千石以食其衆會救至得免明施大節建水人永樂舉人知安南演州慈愛廉明值黎利叛繕甲兵積糧餉為守禦計後力屈死之時同邑洪秀任交州知府同殉難正統間祀昭忠祠王綸建水人永樂間擊交趾有功以千户鎮守蒙自後交趾復叛力戰死之張海寧州人宣德中任揚州推官有異政擢御史巡按福建討平巨冦鄧茂七升貴州按察使值苗蠻作亂海約束撫綏一方以安李旺河西人正統中知戎縣事初蒞任冦賊猖獗躬率衆擒之殁於陳事聞贈敘州府通判賜敕褒廕立祠祀之邢幹字秉忠建水人天順進士任郎中時劾權貴謫知瀘州擢南陽知府興水利均徭役戢豪強與張隆田容張文宗稱建水四賢楊升阿迷人天順間以貢入太學隨御史某巡四川發御史受賄民頌之遂命代巡按御史事能舉其職凡七閲月乞歸生平不附權要不貪祿位以清介稱張西銘字希載寧州人海子成化中進士授金溪知縣縣有虎嘻人蝗食稼西銘禱於神兩害俱息以治行第一擢御史巡按遼東再按蘇松後督學順天士類心服王暻字明仲建水人幼聰敏為諸生時捐金以贖人妻後登宏治中進士授懷寧知縣以最績擢御史時劉瑾擅權暻抗疏力詆朝中以真御史目之談彥章建水人任百户阿迷蒙自野賊劫掠彥章隨指揮魯仲軒千户李璋追捕𬒳執不屈罵賊而死仲軒璋亦被害劉洙字道源建水人正德中進士在諫垣十二年以蹇鍔著名諫武宗遊畋五事世宗端治本七事時論韙之李文忠字宗周廢臨安衛人宏治中舉人官禮部員外以議禮廷杖出為四川僉事整肅風紀厯固原兵備道王庭表字民望阿迷人正德中進士以刑部郎中命勘寧夏台浤之獄不避權貴改四川僉事尋報罷里居三十餘年孝友惇篤凡有益於鄉者必昌言之繆宗周通海人正德中進士任户部主事以議大禮廷杖後厯升浙江布政使所至有聲績既歸里三十餘年絶迹公庭清約如寒士父璋任武昌通判以政績著聞楊僎建水人嘉靖中進士官吏科給事中疏靖難諸忠節事留中不報時論多之仕至參議居鄉以德行稱紀經綸字肫夫建水人嘉靖舉人為諸生時以婢女父有軍功養為女嫁之知新都縣編縣馬以濟驛困知上蔡縣開金梁渠以興氏利計擒劇賊黑龍黑虎黑象等萬文彩廢臨安衛人嘉靖中進士厯任富順成安知縣擢給事中彈劾不避權要疏諫開馬市出為貴州參議賑飢民擒妖賊升四川威茂兵備道退土番之冦邊賴以安楊廷相廢臨安衛人嘉靖中進士由大理寺評事升河南參議所至辨冤剔弊皆有聲稱尋以議調乞休林下三十餘年恂恂若素士許鎡字國器石屏人性剛直嘉靖中進士擢御史有諌官詹仰庇斃於廷杖鎡伏尸哭上聞之乃命葬出為江西副使與巡按御史忤致仕歸張廷祚蒙自人嘉靖三十六年土賊逼城兄廷佩戰死廷祚奮身往救亦死妻李氏年尚少矢志撫孤年九十餘卒王恩民字成宇建水人隆慶中進士擢御史出為湖廣荆西右參議時崔家坪有巨冦恩民盡殱除之大學士張居正以父喪歸恩民弔賻獨如常儀尋調貴州有蠻冦突至城下恩民率官民出擊賊挫遁後官至福建巡撫蕭崇業字允修建水人隆慶中進士由庶常授兵科給事厯户工二垣先後封事數十上禁侈靡開潞河劾欺弊調驛傳奉使册封琉球歸報命晉兵科都給事厯官南京右僉都御史以母養告歸尋卒賜祭奠包見捷字汝鈍建水人幼穎異八歲能為七言詩萬厯中進士以庶吉士改户科給事中危言不諱謫為貴州布政使都事後厯吏部右侍郎以勞卒贈工部尚書馬一荀建水人萬厯舉人權慶陽府值飢冦肆掠一荀開渠建倉練士詰姦一方帖然崇禎三年流冦突至以計殺內應者數十人殺賊無算士民立祠祀之陳鑑石屏人萬厯進士官左江道副使廉正有聲見璫禍起致仕歸念其地多賊土城不可以守捐金易以甎後沙普龍三賊屢攻不能破皆其力也王夔龍石屏人萬厯中進士知巴陵縣多惠政及為御史風裁為一時冠塗時相字揆宇石屏人萬厯中進士任户部主事有廉聲升大名知府置常平倉在任五年所轄州縣積粟至數十萬朝議推為廉能第一厯官南京太僕卿家居時巡撫陳用賓以征伐議加稅充兵餉時相遺書力爭之王元翰字伯舉寧州人萬厯中進士由庶吉士改吏科給事中屢疏皆中時弊天啓間召用以讒阻卒於金陵子開州庠生流冦入滇開母妻俱赴昆明池死開被執賊殺之張法孔寧州人事母至孝萬厯中進士授户部郎中提督建昌學政厯官四川布政使清操絶倫流冦張獻忠犯成都獨守南門捐資募士夜搗賊營獻忠遂遁後致仕歸修學繕城蜀藩特疏薦之以太常寺卿取用為天下清官第一趙琦寧州人萬厯中進士初授工部員外巡厯山東臨清等處纍官大名府時東省邪教猖獗琦選丁壯繕器械修城池未幾盜起賴豫備得全尋改保定政簡刑清卒於官殯殮不辦事聞命馳驛歸葬者義寧州人萬厯間隨征莽應裏嶽鳳及楊林緬甸用兵皆立戰功後以覘賊誤入伏中手刃數十人圍益厚馬蹶矢集於身及救至見尸僵立猶持刃作殺賊狀事聞贈參將諡忠勇楊林及甸苴關皆立祠祀之李元初河西人萬厯舉人赴京謁選父扶杖送之不覺淚下元初即隨父歸結廬普應山不復出談三極字立之蒙自人萬厯舉人令綿竹會邊有警巡撫因播州宣慰司楊應龍以進木助工得主眷欲調其兵三極極言不可後果叛三極又言時方東作宜緩用兵巡撫怒其謇諤且愧前議之酬遷為南路學正後有知其才者薦擢知石阡府靖苗疆勸農桑興學校以養親告歸時有建水黃立中隆慶進士知資縣應龍兵過滋擾立中繩其犯法者他邑賴焉白燦然五村民萬厯間土酋嘯聚縣令拔為練長率鄉勇禦賊全家遇害李國柱建水人天啓舉人任常德府同知流冦陷城死之姚敷典通海人萬厯武舉人任守備征普酋忠勇冠軍賊夜劫營敷典手刃七人與參議周永吉同死𤾥遊擊將軍趙民保字爾容通海人天啓舉人任南陽府同知流冦陷城絳服端坐厲聲罵賊死於難王化行河西人天啓舉人任商水令時流冦充斥急修城郭工甫竣而闖賊至偕二子恩寵恩錫死之任士茂建水人崇禎舉人任彭澤令告歸沙定洲脅使附已不屈死之廖履亨建水人崇禎進士任吉水令致仕歸李定國陷臨安赴水死妻曽氏率子女僕奴闔門自縊史覲宸石屏人崇禎中知順慶府張獻忠攻破順慶覲宸力禦被執罵賊而死本朝乾隆四十一年賜諡烈愍妻董氏亦以孝慈聞王士昌字心泰寧州人崇禎中舉人任河南泌陽知縣時流冦猖獗練兵秣馬為守禦計逾數月賊衆重圍其城救不至城陷冠服懷印正坐公堂罵賊殉難特賜光祿卿廕一子本朝乾隆四十一年賜諡節愍蔡鼎錡寧州人崇禎間屢立戰功授左軍都督隨左良玉入陜西討賊中三十餘矢力屈死之贈寧威將軍楊一忠河西人崇禎中任巴縣教諭流冦攻城分門拒守城陷罵賊被害子名嗣伏尸而哭亦被害本朝乾隆四十一年豫入忠義祠徐煒河西人崇禎中舉人官至偏沅巡撫有惠政沅人祠祀之歸里後流賊臨城兵民懼閉城賊曰我輩沅州人欲見徐公耳煒衣冠坐城上責以大義諸賊羅拜而散耿廷籙河西人崇禎中四川巡撫都御史丁艱歸流冦陷河西廷籙赴水死妻楊氏被執罵賊死本朝乾隆四十一年賜諡節愍陳竭忠建水武舉人任貴州守備調征蕎甸先登陷陳殁曽有坤建水人城陷舉火自焚妻田氏抱幼子逸去以延宗祀王保建水人多勇力殺土賊剿叛兵屢立戰功後遇賊戰死土人祀之范應華建水人崇禎中任參將死於普名聲之難本朝乾隆四十一年賜諡節愍吳希賢字進夫建水人母有瘵疾希賢親溲穢籲天求代侍祖亦如之有叔早世撫其孤女厚嫁之仕為渠縣知縣誘擒巨冦刁七輩萑苻帖然性狷介不能曲事上官中深文罷歸龍在田石屏土官舍人屢立戰功洊擢都督同知諸將忌其功罷歸崇禎十五年上書願捐軀報國不效甘伏斧鑕議寢不行吾必奎反立擒之後遂隱於家胡平表阿迷人為忠州判官樊龍陷重慶平表縋城下詣秦良玉乞師號泣不食飲者五晝夜良玉為發兵圍遂解厯遷貴州參議後總督張鶚鳴言平表小吏慷慨赴義復新都解成都圍降樊龍克重慶用六千人敗奢安二酋十萬兵請以本官加督師御史銜賜之專敕部議格不行尋征流冦舟覆夔峽死蜀人專祠祀之何天衢字升宇阿迷人普名聲招為頭目後名聲謀逆天衢曰此丈夫報國時也遂坑殺鐃手數十人率先歸順屢立功授副總兵後以糧盡舉家自焚死妻趙氏率其妾洪氏先縊死溫如珍阿迷人幼隨父征苗父殁於陳力戰擒殺父者戮之普名聲攻臨安如珍適以解餉至城門盡閉民避亂者不得入乃執刃坐西門外令百姓魚貫進及圍城急隨方備禦十五晝夜不解甲賊始退擢臨元參將王恩詔阿迷諸生詣京師請誅普酋子維啓亦與朱國翰李夢旭陳破逆䇿俱不用及普酋叛城陷維啓冒火員母出維啓子志道憤土官李廷樞虐使其民具呈大吏請改土歸流有父祖風楊國彥阿迷人普名聲叛國彥以義勵鄉民禦之為賊所害楊雲龍字景從阿迷廩生少孤事大母以孝聞為流賊所執以刃脅其金憤罵曰我秀才也死則死耳安所得金與賊乎遂見殺後子婦錢氏死節亦最烈蒲綸寧州人與弟纓自幼以勇聞皆在黔以戰功授參將征張獻忠以數騎偵賊綸被執不屈死纓突圍出後著功於晉楚粵豫諸省晉後軍都統死於難趙發祥通海人有勇略善騎射沙定洲叛發祥率鄉人出禦為賊所獲不屈死之李元祺河西貢生任通道令流冦陷城憤罵不屈死何文瑞蒙自諸生普名聲素景其名親謁其廬勸誘之文瑞大罵且援弓欲射賊執之不屈死聶為德石屏人與妻薑氏皆以孝聞及母卒鬻子以葬夢神謂曰神感汝孝賜汝金覺後席上果百金因贖子歸二子同往廠地長子耳有贅肉廠民夢神語曰與多耳同夥斯得礦矣訪得之喜邀同事所獲無算人咸以為孝感張九逵蒙自人武舉新安所千户為流賊所獲罵不絶口賊愓以兵罵如故遂遇害同邑邢鎬為新安百户城陷率妻杜氏其弟鼇亦率妻杜氏闔門焚死楊世春阿迷人事母至孝母殁廬墓三年鄉人稱為楊孝子子忱亦至孝有父風趙文宿阿迷人家貧性純孝敕賜天下孝子第一許綱通海人家貧甚止一子日採薪以養瞽母一日綱樵於山婦為鄰家傭母攜子出墜井以瞽不能救哭之哀綱回慰之曰子可再生母母慟也多方勸解之吳孝先嶍峩人年十二隨父入山父為虎攫孝先拔父刀刺虎死後建水段允明父母皆死於流賊允明年十二賊欲役之大罵求死遂遇害一郡稱為兩孝童本朝王立憲建水人康熙間舉人任廣寧令革總理苛派免三站供役除窖貯官榖之害曽出誣殺而不得正犯不數日正犯自首曰不忍令賢君為我受劾也世宗潛邸時奉使祭告福陵道出其地書百里甘棠四字賜之曽齡建水人其家遭李定國之變闔門殉難名氏失傳齡以孑遺終身哀慕不衰建祠置田理義倉興書院士民德之子旭康熙間舉人任安邑令有惠政卒祀安邑名宦張漢字月槎石屏人康熙進士少負文名以檢討出為河南知府與上官抵牾歸乾隆丙辰試博學宏詞科二等三名復授檢討改官御史條陳河南荒歉狀有直聲江南儲大文胡宗緒皆其禮闈所得士著有詩古文詞數種邢世瞻建水人康熙舉人任浦江令建水星亭以禦火災開蓄水塘以灌田畝設育嬰堂以恤孤興學校褒節義浦人專祠祀焉陳國琬建水人幼瞽習星命以養親生死皆盡禮弟國彥早卒撫其子如已出妹早寡贍之終身孫綸揚建水人妻殁不娶拾蕭姓金還之其子復拾金亦令還之俱却謝不受周啓元建水貢生康熙四年土首叛死於萬明寺諸生唐方敬死於阿迷楊德培死於黑窰主事鄒應啓死於晴山張鵾羽石屏諸生康熙乙已龍韜作逆不屈死之許邦相石屏人親死廬墓三年墓下忽湧泉水時呼為孝感泉張良伍石屏貢生不受吳逆官混迹樵漁後任霑益學正以母老乞歸房書石屏舉人幼失父事孀母先意承志及母殁以廬墓哀毁致疾卒楊培阿迷歲貢吳逆叛堅守臣節隱居於鄉後任開化府教授振興文教士風翕然歸里後廣置義田以贍孤貧乾隆四十四年入祀鄉賢祠伍士琪阿迷人康熙辛酉舉人以户部員外引疾歸置學田興水利建家廟乾隆四十二年入祀鄉賢祠同州楊天興亦以孝行於乾隆五十八年旌劉廷表寧州人父以逋賦拘獄中廷表年十四典身以償叔父避吳逆變在外訪歸事之推愛姊妹兄弟甚篤每曰父母既殁無由展我孝思父母所係念者吾厚之聊以慰九泉也台瑮通海人康熙舉人任長夀令循聲大著署黔江時方量田􅺱以地瘠薄力請以下則減賦去任後邑人祀之王聖嶍峩諸生康熙四年土酋叛聖往責以大義賊怒擊之罵賊而死傅為詝建水人其祖大美以植品樂善入祀鄉賢祠為詝雍正癸丑進士由檢討改御史請為明御史趙撰補諡又條奏國計民生利弊五事萬餘言官至右副都御史嘉慶十六年入祀鄉賢祠陳纕石屏人雍正進士任吳江令民有呈其妻被蘆墟神攝去為妾者纕親詣其廟見祈禱者若狂立毁其像此患遂絶向舒河西人秉心孝友乾隆五十八年旌同縣向善王亮品皆以孝行旌柏為楹嶍峩人與同縣董於書周儀均以孝行於乾隆五十八年旌王敬德蒙自人聘妻段氏值冦亂刲氏耳鼻其父以廢辭婚敬德不從卒娶之郭羽宸河西諸生家甚貧而事母旨甘無缺值猓逆變母驚悸死宸亦一慟而絶趙文瑛通海人篤志孝友嘉慶七年旌流寓明王奎字景常松陽人洪武初為山西參政以事謫戍臨安博學多才滇士人多從之遊後召還韓宜可字伯時山陰人洪武間以劾胡惟庸下獄後為山西布政因事謫戍與王奎闡明文教郡人立二賢祠祀之解守居庸人洪武間為州訓導被誣謫戍河西旋命軍中通經儒士召入翰林會靖難兵至以建文舊臣仍發戍所邑士多出其門常升懷遠人開平王遇春次子襲封開國公以抗靖難師安置臨安尋以憂死閻閎臨清人嘉靖初吏科給事中謫蒙自縣丞寓建水作正已堂記後召還閎在臨安探巖穴之勝今有山洞以閻名尹革河南人嘉靖間任兵科給事中時楊慎以議禮謫戍革上疏諫亦被斥為太和縣丞因寓蒙自遂家焉畢山人𥘉不言其生年明末遊石屏愛異龍湖島遂居焉常為人相地有奇驗一日危坐語人曰豫逝矣悉取書籍及詩草焚之今州西有墓列女元蘇氏女父蘇那懷元末任曲陀關萬户同知卒兩子俱幼女撫育成立終身不字事聞被旌明邢奎妻江氏建水人正統中隨夫戍廣西南丹衛未幾奎卒氏年二十七廣人留之不聽攜孤負骸歸葬安貧守節撫孤成立萬傳妻張氏建水人傳死氏年二十二無子紡績養舅姑舅姑殁終身如禮歎曰吾事畢矣遂自縊陸華妻薛氏建水人夫為臨安土官氏年二十夫卒苦節撫孤同州曽麟妻曹氏曾祥妻賈氏楊文光妻馮氏青年守志厯久勿渝詔旌其門趙寧妻王氏建水人年十九夫卒一女尚幼父母勸其改適氏以死自誓苦節四十餘年同州邢思明妻藍氏何儼妻王氏萬昂妻王氏李松妻歐陽氏王璠妻趙氏張實妻李氏劉錕妻朱氏邢思義妻高氏毛鶴妻黃氏任官妻李氏談敷惠妻李氏俱以苦節詔旌其門張顯妻蔡氏建水人年二十夫亡子坦甫四歲偕幼妾趙氏撫之及長為娶談氏坦尋卒談年二十守志如姑一門三節姚思敬妻洪氏建水人思敬孝事父母田宅推讓其弟及卒氏不食踰旬而死孫孟麟妻胡氏建水人年十四未婚聞孟麟病私刲股煎湯告母使療之及歿欲自刎母救得免隨歸夫家守貞五十餘年卒葉翠妻楊氏建水人年二十四夫亡守節朝夕哀號嬰病而卒曹鼐妻葉氏建水人夫亡截耳以置棺中聞者慘然曹氏女建水人已字良家有武辨強欲娶之自縊死同州沙鎔金女夷女六姐俱遇暴不屈自盡楊昱妻夏氏建水人流賊圍城氏引二子付二嫗令撫育以延後嗣自率二女一婢投繯死同州一時自經者姚省賢妻任氏黃大秩妻任氏及同居之祝氏吳鼎恆妻洪氏李芬妻高氏俱自縊楊應梧妻劉氏建水人流賊陷城時氏謂子曰丙曰速火勿使賊見我尸也曰丙亦赴火死媳周氏自縊同州一時自焚者沈果明妻及子女鄒魯沂妻高氏及媳吳氏朱氏張氏陳氏孫氏李盛春妻姚氏及子如心媳朱氏孫氏孫媳張氏夏啓昌妻沈氏及媳鄒氏常氏幼孫五人婢數十人張燮任妻龔氏及媳鄒氏祁氏姆王氏姪媳蕭氏馬氏又曾左泉妻白氏闔家自焚祁京妻楊氏建水人流賊陷城賊欲犯之氏大罵賊碎其尸同州包家苑女美姿容賊掣刃威迫不從斬其手足而死又紅衣女失其姓氏為賊所得紿以尋藏金見一井即投入女奴亦從之塢士英妻王氏建水人流寇至以士英有才略分守南城城陷䇿騎歸氏已設繯相待因登樓縱火子女俱焚死同州曽有朋亦出守城妻王氏偕其嬸姑子女俱投繯有朋還舉火自焚死劉晟死於賊妻台氏縱身入大死劉昌為賊支解妻王氏投濠中死劉世皥妻李氏建水人崇禎四年普酋之亂度不能免同媳曹氏並孫女惠姐科姐啓姐闔門死節陳竭忠妻楊氏建水人竭忠死於戰後氏於沙賊叛時自縊李完妻曾氏廢臨安衛人夫任本衛指揮早卒以死自誓撫子仁成立仁卒撫孫中珍中珍繼殞又撫曾孫五十餘年子婦樊氏孫婦趙氏皆孀居守志人稱世節詔旌其門樊氏女廢新安所人許聘諸生胡啓愚以家貧弗克