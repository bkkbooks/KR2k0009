front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_022-1a}
body:
  text: 錦州府三名宦遼劉伸宛平人重熙中纍遷南京副留守改崇義軍節度使政務簡靜民用不擾致烏鵲同巢之異優詔褒之韓德凝王田人開泰中纍遷崇義軍節度使移鎮廣德秩滿部民請留從之韓慶民宜州節度使金人克宜州慶民死之金程寀析津人太祖時授錦州安昌令潔己愛民興利除弊其歿也邑人祀之伯特德哩布奚五王族人初授濱州刺史廉入優等纍遷崇義軍節度使為人孝謹為政簡靜不積財貨凡調官行李止車一乘臧獲數人而已伯特德哩布舊作伯德特離布今改正高楨遼陽人天會六年以尚書左僕射判廣寧尹在鎮八年政令肅凊吏畏而人安之李完朔州馬邑人明昌中同知廣宰府長於吏治所至姦惡屏迹民皆便之盧孝儉宣德州人大定中遷同知廣寧尹歲大飢民多流亡失業乃借僧粟留其一歲之用使平其價市與貧民既以救民僧亦獲利持嘉暉萊州人為歸德軍節度使宗州舊無學持嘉暉為營建學舍勸督生徒肄業者復其身人競趨之持嘉暉舊作赤盞暉今改正伊喇溫遼橫帳人世宗時厯崇義軍節度使移臨海軍州治近水秋雨水潦暴至城下城頗決百姓惶駭不知沂為溫躬督夫役繕完之雖臨不測無所避僚屬或止溫溫曰為政疵癘水泛溢為災守臣之罪也當以此身謝百姓雖死不恨尋移鎮武定伊喇改見前馬惠迪漷陰人同知崇義軍節度使事廉能稱職大懷貞遼陽人大定中為興中尹錦州富民蕭鶴夀途中殺人匿府少尹家有司捕不得懷貞以訃取之置於法布薩揆上京人明昌中同知崇義軍節度使事有惠政布薩舊作僕散今改正伊喇富森東北路烏爾呼河明安人大安初同知興中府事繕城浚濠賊至卻退改廣寧被牒如鄰郡元兵薄城其子通華善率家奴拒戰城賴以完富森還悉放奴為良終不言子之功識者多之伊喇富森烏爾呼河明安改俱見前通華善舊作銅和尚今改正元胡秉彝霸州人為錦州知州初州民不業耕織秉彞編伊尹武侯耕田遺制及苗司農栽桑圖遍行都部又於城東築濟民園種桑聽民移植雖蔬菜果蓏栽植有方小民效法衣食饒足至元中民苦轉輸秉彝令蓄積者聽自輸官民輦運赴倉侵漁遂息劉敏中章邱人大德中以宣撫使巡行遼東錦州雨水為災輒發廪賑之王居禮河東人知錦州勸學興農一以清心省事為本歲凶發倉賑濟全活甚衆有訟田不決者以情理開喻之其人相讓而退王伯勝文安人仁宗時為遼陽行省平章政事遼陽省治懿州州弊陋民不知學伯勝始至增郡學弟子員擇賢師以教之使客至無所舍皆館於民民苦之伯勝乃擇隙地為館廄度間田百頃募民耕種以廩餼之歲大旱伯勝齋戒以禱禱畢即雨人謂之平章雨郭嘉濮陽人順帝時厯官廣寧路總管兼諸鄂囉勸農防禦時民苦和糴嘉設法計户口第甲乙民甚便之有詔團結義兵嘉集民數千教以坐作進退號令齊一賞罰明信故東方諸郡錢糧之富甲兵之精稱嘉為最後寇陷遼陽孤城無援嘉力戰以死鄂囉舊作奧魯今改正明曹鳳臨淮人洪武時為廣寧中屯衛指揮同知築城池創衛治撫恤士卒官至都指揮同知劉斌崇明人以靖難功授指揮使進都指揮僉事備禦寧遠築城建衛時值歲儉外禦邊陲內撫軍士政理民安甚有能聲王祥固始人以都指揮僉事任廣寧開府僉書修築寧遠蒲河等城掌遼東事恤下興學頗多善政施聚順天通州人寧德中進都指揮使守備義州以勇敢稱文廣江都人止統間以署都指揮僉事備禦寧遠諾延犯邊廣率兵窮追遇伏中流矢死贈鎮國將軍李榮江都人寧遠衛指揮使正統間守備塔山追敵至利州大戰於長坡自午至暮不少挫敵不能支棄所掠而奔趙忠遼陽人廣寧右衛指揮僉事守鎮靜堡正統十四年敵圍堡甚急忠乘城力戰歸語其妻曰若城破吾不苟活汝母子當自裁敵攻益急訛言城陷妻女皆縊死攻圍凡兩晝夜以堡堅解去守臣上忠全城功升指揮同知賜金為妻女營葬表其門曰忠節李英其先盧龍人遷義州成化間為廣寧中屯衛指揮厯左軍都督僉事充右參將分守錦義二城講武恤士訓練之暇以書史自娛敦尚古禮建祠宇謹祭祀一以朱子為法在任七年百度具舉王銘錦州人成化中守備寧遠講武練軍重修二城廟學甲辰有寇警銘率精騎捲甲直趨百餘里遏其歸路盡獲所失人畜而還自是數年無犯境者馮時泰山西汾州人任廣寧道兵備參議守止不阿築大定老軍臺堡數十處區畫有方及邊隅告警主帥失機時泰奉旨勘實有忤當事遂被逮遼民無不稱冤高邦佐襄陵人天啓元年遼陽破以邦佐為布政使參政分守廣寧邦佐知邊事不可為乞歸方報允而王化貞棄城逃衆謂邦佐既請告可入關邦佐叱之曰吾一日未去則一日封疆臣也夜作書訣母策騎趨石屯謁熊廷弼言城中雖亂外間未知亟提兵入城斬一二人人心自定公即不行請授邦佐兵赴難廷弻不聽偕化貞並走邦佐仰天歎泣曰經略巡撫俱逃事去矣松山吾守地當死此遂西向拜闕復拜母解印綬自經官舍僕高永曰主人死安可無從者亦自經於側事聞再贈太僕卿諡忠節同時顧頤以右參政分守遼海亦以力屈自經贈太僕少卿本朝乾隆四十一年賜高邦佐顧頤俱諡節愍袁崇煥東莞人天啓二年駐守關外以哈刺慎侵關內地始入守關安置遼人時十三山難民十餘萬久困不得出崇煥將五千兵駐寧遠以壯聲援别遣驍將救之三年督修寧遠城工成為關外重鎮崇煥在職勤慎善撫將士由是流移駢集商旅輻輳遠近望為樂土本朝乾隆四十八年特旨録其裔孫袁炳授縣丞何可剛遼東人天啓中纍遷署寧遠副將事崇禎初袁崇煥請令可剛專防寧遠且言可剛仁而有勇不破公錢不納私餽敝衣糲食不異士卒事至善謀才可大用詔加都督僉事進右都督已而錦州圍急督諸將赴援與祖大夀監築大淩河城工甫竣大兵圍之糧盡援絶大夀及諸將皆欲降以可剛不從掖出城外殺之可剛顔色不變亦不出一言含笑而死一年本朝乾隆四十賜諡忠節曹變蛟大同人文詔從子也才勇冠時初隸文詔軍中破山西湖廣陜西四川諸流寇大小數十戰斬馘無算積功最多賊咸畏大小曹將軍厯官至援遼總兵崇禎十四年從洪承疇以十三萬衆救錦州時錦州圍急變蛟營松山北乳峯山列七營於兩山間環以長壕及戰軍潰還保松山大兵圍之明年二月副將夏成德為內應松山遂破被執不屈死之本朝乾隆四十一年賜諡忠烈楊倫前屯衛副總兵明季陳亡又前屯衛總兵李鳴鳯副總兵羅文耀寧遠總兵王定宸皆同時殉節本朝乾隆四十一年賜楊倫諡烈愍李鳴鳯等俱諡節愍本朝劉文亮漢軍鑲黃旗人以佐領兼知錦縣招徠民人為之度邑居給牛種課勤惰而勸相之又設義學延師以教文風遂振人物南北朝魏屈遵徒河人博學多才藝為慕容垂博陵令後歸趙太武素聞其名任以文誥拜中書令賜爵下蔡子屈恆遵孫太武時以破平涼功賜爵濟北公委以大政車駕出征常居中留鎮卒贈征西大將軍諡曰成盧魯元徒河人明元時以忠謹給侍東宫太武即位為中書侍郎性多容納纍遷中書監領祕書事賜爵襄城公後遷太保録尚書事卒贈襄城王諡曰孝盧醜徒可人魯元之族太武為監國醜以篤學博聞入授太武經後賜爵濟陰公位尚書加散騎常侍卒官河內太守周豆盧永安徒河人驍果善射魏永安中從爾朱天光破万俟醜奴賜爵靈夀男周文時來歸從擒竇泰破稽胡與東魏戰於芒山皆有功進范陽郡公初永安無子養弟永恩子績及生子讚親族皆請讚為嗣水安曰兄弟之子猶丁也終不易時以此多之隋豆盧績永安姪初周明帝時嗣永安爵授左武伯中大夫自以經業未通請解職遊露門學帝嘉之敕以本官就學丁父艱哀毁過禮武帝嗣位起復為胃州刺史有惠政隋開皇中拜夏州總管以其家世貴盛動效克彰甚重之子育英果有氣節漢王諒鎮並州為王府主簿諒謀作亂育與司馬皇甫誕合謀閉城拒諒諒襲擊之育兵敗遂遇害唐李楷洛柳城人本契丹渠帥中宗時纍官左羽林大將軍封薊郡公吐蕃寇可源楷洛擊走之師還卒於道諡忠烈李光弻楷洛子襲父封以功進雲麾將軍安祿山反郭子儀薦其能詔加魏郡太守河北採訪使光弻以朔方兵五千東救常山降思義又卻賊於饒陽會郭子儀守雲中詔悉衆出井陘與光弻合擊史思明於九門西大敗之至德二載思明等將兵十萬攻光弻於太原時麾下兵不滿萬光弻徹屋為􅳤石車石所擊輒傷賊思明為飛樓漳以木幔築土山臨城光弻遣人穴地頽之又時遣突騎出乘賊俘斬萬計思明乃遁去乾元初九節度師潰於相州光弻整衆還太原未幾為天下兵馬副元帥賊方窺洛光弻悉軍趨河陽擒安太清於懷州廣德元年擒浙東賊袁朝賜鐵劵圖形凌雲閣光弻善用人謀定後戰能以少覆衆初與郭子儀齊名而戰功推中興第一卒贈大保諡武穆子彚有志操為宿州刺史治行頗著李惠登柳城人為平虛軍禆將安祿山亂從董秦泛海略定滄棣等州史思明反惠登陷賊中以計得脫依來瑱及李希烈反以兵二千使屯隋州惠登挈州歸朝即拜隋州刺史居二十年興利去害田闢户增人歌舞之節度使于頔上其績詔加御史大夫遼耶律良生於乾州讀書醫巫閭山學既博將入南山肄業友人止之曰爾馳驅千里縱聞見過人年亦垂暮今若即仕已有餘地良口窮通命也非爾所知不聽留數年而歸清寧中遷知制誥兼知部署司事奏請編御製詩文目曰清寧集上命良詩為慶會集親製其序咸雍初同知南院樞密使事出知中京留守事卒追封遼西郡王諡忠成馬人望高祖為石晉青州刺史太祖徙其族於醫巫閭山因家焉人望穎悟幼孤長以才學稱咸雍中第進士纍擢南京三司度支判官公私兼裕遷警巡使剖決獄訟無一冤者為保靜軍節度使時諸處飢乏惟人望所治粒食不闕遷中京度支使始至府廪皆空視事半歲積粟十五萬斛錢二十萬鏹拜南院樞密使人不敢干以私所推薦皆為名臣以守司徒兼侍中致仕卒諡文獻姚景行興中縣人纍官翰林院學士道宗即位為北府宰相後告歸道聞重元亂收集行旅三百餘騎勤王比至賊已平道宗嘉其忠咸雍元年出為武定軍節度使減徭投疏冤帶廣儲蓄勤校閲郡民宜之卒封柳城郡王諡文獻竇景庸中京人清寧中進士纍官武定軍節度使招流亡戢姦滑決冤獄輕重大小務愜人心後拜中京留守卒諡肅憲張寶錦州人四世同居道宗嘉之令其子為三班祇候金李三錫錦州安昌人遼季盜攻錦州州人推三錫立兵事設機應變城賴以完後歸金厯官河北西路轉運使致仕三錫政事強明所至稱治世宗舊聞其名大定初起為北京路都轉運使制下而三錫已卒梁肅奉聖州人幼篤志好學天眷二年擢進士第調平遙主簿遷絳縣令以廉入為尚書省令史遷定海軍節度副使營治汴宫肅分護役事攝大名少尹正隆末境內盜起百姓陷賊中不能自辨者數千人皆繫大名獄肅至官廉得其情讞出者十八九大定四年通檢東平大名兩路户籍物力稱其平允他使者所至皆以苛刻增益為功百姓訴苦之朝廷敕諸路咸以東平大名通檢為準於是始定七年河決李固詔肅視之遂奏決河水六分舊河水四分今塞決河復故道為一再決而南則南京憂再決而北則山東河北皆可憂不若止於李固南築隄使兩河分流以殺水勢世宗從之十四年充宋國詳問使稱旨遷濟南尹召拜參知政事肅知無不言致仕卒諡正憲鄧儼懿州宜民人天德三年進士大定中有司奏使宋者世宗命選漢官一人梁肅以王翛張大節鄧儼對世宗曰翛大節苦無資厯與左右司官辛苦不同其命儼往纍遷吏部侍郎明昌初為户部尚書上命尚書集百官議如何使民棄末務本以廣儲蓄儼言今之風俗競為侈靡莫若定制度使貴賤上下衣冠車馬室宇器用各有等差裁抑婚姻喪葬過度之禮罷去鄉社追逐無名之費用度有節則蓄積日廣矣後出知歸德府致仕張九思錦州人以亳州防禦使副劉仲延受宋歲貢於泗州往歲受貢者每以幣物不精責宋使者宋使者私饋銀幣各直數百十以為常九思獨不肯受仲延從之私饋遂絶纍遷工部尚書張景仁遼西人纍官翰林待制大定二年與宋議和往復凡七書皆景仁為之世宗嘗稱之曰今之文章如張景仁與宋人往復書指事達意辨而裁真能文之士也纍遷御史大夫平章政事烏庫哩元忠擅決六品官景仁劾之朝廷肅然烏庫哩改見前孫德淵興中人大定十六年進士調淶水丞察廉遷沙河令剛正幹能及去官民為刻石祠之貞祐二年拜工部尚書會乏兵食有司請鬻恩例舉人居喪者亦許納穀就試德淵奏此大傷名教事遂寢及致仕御史許古論德淵忠亮明敏可大用宣宗嘉納未及用而卒舒穆嚕元懿州路人七歲喪父號泣不食者數日十三居母喪如成人嘗為擊鞠戲馬踣歎曰生無兄弟而數乘此險設有不測奈何由是終身不復為之補樞密院尚書省譯史遷監察御史同知淄川軍州事厯知濟南府卒生平寡言笑尚節儉居官自守不交權要人以是稱之舒穆嚕改見前耶律履遼東丹王七世孫家廣寧方五歲卧廡下見微雲往來天際忽謂乳母曰此所謂卧看青天行白雲者耶及長博學多藝善屬文初舉進士惡搜檢煩􅖰去之廕補承奉班祗候纍官禮部尚書兼翰林院直學士至尚書右丞卒諡文獻履秀峙通悟精厯算書繪事初族父德元未有子以履為後既而生子震德元歿盡推家資與之子辨材善材楚材皆有名耶律辨材履子家義州天姿倜儻軀幹雄偉以志節自負為中京兵馬副都指揮使宣宗問軍政利弊辨材言將相多非其材遂忤權貴出為許州兵馬鈐轄李經錦州人作詩極刻苦喜出奇語不襲前人李純甫見其詩曰真今世太白也再舉不第拂衣去南渡後其鄉帥有表至朝廷士大夫識之曰此經筆也朝議以武功就命倅其州競去元耶律楚材履子少孤母楊氏教之學博極羣書旁通天文地理律厯術數及釋老醫卜之説下筆為文若宿搆者金末為開州同知完顔復興留守燕辟左右司員外朗太祖定燕召見處之左右每征伐必命之卜謂太宗曰此人天賜我家爾後軍國庶政當悉委之甲申帝至東印度駐鐵門關有一角獸形如鹿而馬尾其色緣作人言謂侍衛曰汝主宜早還帝問楚材對曰此瑞獸也其名角端能為四方語好生惡殺天降符以告陛下願承天心以全民命帝即日班師太宗即位楚材奏諸州縣長吏專理民事萬户府專總軍政課稅專掌錢榖各不相統攝著為令權貴不得志遂為舒穆嚕軒達布等搆陷而太宗獨察其誣及軒達布獲罪命楚材鞫治楚材請寬之太宗謂近侍曰不較私讐真長者汝曹宜效之後拜中書令事無巨細悉以委之汴梁將下大將蘇布特言金人抗拒宜屠之楚材馳諫帝從之得避兵居汴者百四十七萬人又求得孔子五十一代孫元措奏襲封行聖公付以林廟地命收太常禮樂生及召名儒梁涉等使進講東宫置鍽修經籍所由是文治興焉定天下賦稅奏用儒臣皆從其計陳時務十䇿悉施行之卒贈太師諡文正蘇布特舊作速不臺今改正石天應興中永德人以功遷兵馬都元帥移軍河中金軍潛師由中條來攻天應力戰死耶律鑄楚子幼聰敏善屬文領中書省事採厯代德政合於時宜者以進從憲宗征蜀屢出奇計中統二年拜中書左丞相至元初奏定法令三十七章吏民便之初清廟雅樂止有登歌詔鑄制宫縣八佾之舞樂成賜名大成十年遷平章軍國重事監修國史朝廷有大事必咨訪焉卒贈太師諡文忠李守賢義州人金末與兄庭植歸太祖授錦州臨海軍節度觀察使遷河東南路兵馬都總管既至人皆曰吾等可恃以生矣知平陽府事有惠政時河中未下守賢請自北面鑿城先登城果下明年大破趙雄兵於芮城時金兵十餘萬保少室山太平寨守賢以三千兵破之不兩旬諸寨望風俱下守賢未嘗妄殺一人攻河南降其渠魁關東洛西遂定子彀從征有功授河東道行軍萬户兼總管摧鋒陷陳所至克捷中統三年改河東路總管移京兆路李伯溫守賢從兄伯通弟伯通擊張致戰歿於錦州城北伯溫行平陽元帥府事金兵來攻李成開水門導敵入伯溫謂左右曰吾受方面之寄今不幸失律當以死報國不可辱汝等宜逃生士卒皆猶豫不忍去伯溫即拔劒殺家屬投并中以刃植柱刺心而死金人見伯溫抱柱如生無不嗟歎弟守正守忠守正為平陽守以功授河東南路兵馬都元帥輿金人戰殁守忠代守平陽為都元帥嘗攻益都北還軍將彭智據義州叛守忠力戰復之後為金人所執大罵不屈而死王珣本姓耶律金末避難遼西更姓王遂為義州開義人武力絶人善騎射穆呼哩略地奚霅珣率衆出迎以珣為元帥兼領義川二州事後平張致賜金虎符加金紫先祿大夫充兵馬都元帥鎮遼東便宜行事兼義川等州節度使珣為政簡易賞罰明信誅強扶弱毫髮無徇穆呼哩改見前劉世英其先范陽人後遷遼陽川州初穆呼哩經略遼東世英隸麾下以功充行軍副總管其時平陽諸郡被兵之餘民物空竭世英言於穆呼哩曰自古建國以民為本今可東殺掠殆盡異日我師復來孰給轉輸收存恤亡此其時也穆呼哩善之奏授絳州節度使卒命弟亨安領其衆賜金虎符行元帥府事攻金伐宋出奇制勝戰功居多所獲金帛悉與將佐故士卒樂為用焉穆呼哩改見前王榮祖珣長子性沈厚勇力絶人襲崇義軍節度使入朝帝聞其勇選三力士與搏皆應手而倒計金平章政事葛布格所至有功授北京等路征行萬户換金虎符伐高麗圍王京高麗奉表入貢擒布希萬努再伐高麗破十餘城降天龍諸堡移鎮高麗募民屯戍闢地千里中統元年詣闕授沿邊招討使兼北京等路征行萬户還鎮卒葛布格舊作葛不哥今改正布希萬努改見前耶律希亮鑄子少跋涉西土羈旅困苦武宗時官翰林學士承旨為人性至孝困厄遐方家資散亡僅藏祖考畫像四時致奠盡誠盡敬雖疾病不廢書史或中夜起坐取燭以書著愫軒集三十卷後追封淶水郡公諡忠嘉明畢恭前屯衛籍其先山東濟寧人恭有文武才正統間以巡撫王翺薦授百户厯指揮僉事圖上方略開設迤西邊堡墻壕增置烽堠兵威大振進署都指揮僉事守備寧前等衛在任五年邊鄙安謐進掌都司撫士卒革姦弊廣屯田興學校政平訟理軍民咸稱之賀欽其先浙江定海人以戍邊籍義州少好學讀近思録有悟成化二年登進士授户科給事中已而師事陳獻章既歸肖其像事之宏治改元用閣臣薦起為陜西參議未至而母死乃上疏懇辭且陳四事一資真儒以講聖學二薦賢才以輔治道三遵祖制以處內官四興禮樂以化天下疏凡數萬言奏入報聞正德四年太監劉瑾括遼東田東人震恐義州守又貪橫民變聚衆劫掠相戒曰母驚賀黃門欽聞之急諭禍福以身任之亂遂定欽學不務博涉專讀四書六經小學期於反身實踐謂學不必求之高遠在主敬以收放心而已隱居醫巫閭山下别號醫閭有集四卷史璠廣寧人性至孝母病朝夕侍立病篤益勤苦夜不就枕及母卒居倚廬中門絶酒肉遠惟薄三年不出賀欽為作倚廬記以表之陳夀其先新淦人祖志宏代兄戍遼東遂籍寧遠衛夀少貧甚得遺金坐至夜分還其主從鄉人賀欽學登成化八年進士授户科給事中言時政無隱彈劾不避權要宏治十三年以右僉都御史巡撫延綏軍聲大振尋遷右副都御史掌南院正德初劉瑾矯詔逮南京科道戴銑等夀抗章論救瑾怒罷其官九年復起巡撫陜西尋拜南京兵部侍朗陜人呼號擁輿移日不得行追刑部尚書致仕夀廉厯官四十年無家可歸寓南部所居不蔽風雨其卒也尚書李充嗣府尹寇天敘為之殮賀士咨欽子性通敏博極羣書領宏治壬子鄉薦抱道自娛絶意仕進都御史張文錦薦其材應詔陳務實學存敬慎謹細微親賢遠邪等十二事不報即辭歸隱居終身傅鑰遼東廣寧人正德間進士授給事中嘗論邊事會宣大將領失利亡卒甚多廷議遣鑰覆視上曰是嘗言邊事者稱是選矣鑰至鎮考治甄别不隨不苛得實以報嘉靖間纍升山西按察使用法平怒兼得大體富民某殺人當死以貨免鑰收鞫之置於法知縣某主簿某皆良吏為姦人所搆事下按察使或謂鑰曰是當道所欲入也鑰以法如此不可枉徇竟白之終河南巡撫趙國忠錦州衛人嗣指揮職嘉靖初舉武會試進都指揮僉事擢錦義右參將連破敵進署都督僉事為遼東總兵官有功進都督同知已代趙卿鎮宣府命部將逆擊諳達於大滹沱敗之寇盡走及諳達薄京師國忠趨入衛移護諸陵寇見國忠陳紅門不敢入三十一年再鎮遼東禦却小王子數萬騎明年逐敵出塞多斬獲進秩一等國忠善戰射穿札為將有威嚴厯兩鎮繕亭障練士馬邊防賴之諳達舊作俺答今改正趙傾葵廣寧衛人嘉靖中為蘇鎮參將三十四年寇犯馬蘭峪傾葵往禦與指揮禇文明等俱力戰無贈都督同知諡忠壯賈冕廣寧衛人世職指揮尋舉武會試進署都指揮僉事為中路遊擊將軍嘉靖三十八年寇犯遼陽南扺海州冕督軍往禦死焉贈都督僉事諡忠壯黑春其先建川人世職廣寧指揮使以功進署都指揮僉事厯遼陽副總兵嘉靖四十一年王果導寇分入春禦之身自搏戰殺數十人敵棄資仗遁詔進三秩頃之寇掠陽坫堡春逆擊乘勢逐之陷伏中寇知其驍將圍之數重春與把總田耕等力戰二晝夜援師不至死之贈都督僉事諡忠壯楊照前屯衛人都督鎮之孫嗣世職為前屯衛指揮使嘉靖中以功纍遷遼東總兵官屢立戰功嚴嵩怒照不輸賄解職嵩敗朝廷以宿望起之四十二年蒙古深入全海諸衛總兵官吳瑛不能禦詔罷瑛以照代其秋又聚衆廣寧塞外謀大入照率諸將由鎮夷堡分道掩之夜失道去塞六十里遂為敵所圍力戰中矢死照忠勇負氣撫士有恩嘗涅盡忠報國四字於背誓以死自效起官數月間屢戰皆捷竟殞於陳贈少保左都督諡忠壯楊維藩照叔父結髮從父都督鎮於行間屢效首功積官指揮僉事擢廣寧鎮武營遊擊痛照陳亡誓滅敵雪恥嘉靖四十四年蒙古萬餘騎攻鎮武維藩兵不滿千迎之於境內蓮子湖臺與衆誓曰此死地也血戰或生遂進戰殺敵幾半手刃數十人力竭死之詔贈都督僉事與線補衮並立祠祭祀子櫳職贈三秩線補衮世職寧遠衛指揮由廣寧遊擊進寧遠參將嘉婧四十四年敵攻小團山補衮擊卻之追至黃土臺敵大至圍之數重補衮與廣寧遊擊楊維藩鏖戰艮久補衮乎殺數人面中二矢鏃出腦後突圍還營數日而殞詔贈都督僉事王治道錦州衛人嘉靖間由世廕厯薊州參將四十五年擢遼東副總兵進署都督僉事充總兵官隆慶初以纍立戰功進署都督同知時遼土荒殘武備積廢治道與巡撫魏學曾修築沿邊墻堡自廣寧迄審陽隆慶四年實該巴雅呼等犯錦州大勝堡治道與參將郎得功上馬追逐獨十餘騎從時敵伏兵齊家山治道等誤入其中殊死戰敵稍却知無援遂圍之矢且盡盡鋭奪圍出馬忽蹶敵攢射之遂死事聞贈少保左都督諡忠愍立祠賜祭實該巴雅呼舊作辛愛卜言兀今改正郎得功廣寧衛人世職指揮僉事進參將與總兵王治道同時戰死贈都督同知得功父傑禦敵花兒營力戰死二弟賓寶諸子得臣得君得恩及羣從數人皆戰死其妻並守節不嫁得功復死王事時論多之程錤廣寧衛人太學生母病日侍湯藥夜不解衣母轉病痢錤因醫者言嘗糞而甘知不救悲號幾死母卒值鄰家失火風急勢迫錤撫棺號曰萬一不虞與母俱焚耳忽焉風反火滅人以為孝感所致宫守禮前屯衛人為諸生性端謹好古執禮父里問病篤守禮衣不解帶藥必親嘗及卒哀號纍日廬墓三年有白雀巢於廬上事繼母尢謹朝夕率其妻問安母初有他志感其純孝遂已與鄉人飲守禮在座少長莫敢喧譁其風動流俗如此嘉靖間守臣奏旌其門楊振義州衛人世職本衛指揮使天啓二年河東失守歸路梗其母自縊振偕父及弟書伏夜行渡鴨緑江扺朝鮮入皮島為千總崇禎初以功纍擢副總兵十二年松山被圍巡撫議救援諸將莫前振獨請往至吕翁山遇伏全軍盡歿振被軌令至松山説降未至城里許南向坐於地命從官李祿告城中人曰諸將援軍即至城中人聞之益堅守振祿皆被殺楊國柱遼東義州人精騎射以功佩將軍印總宣鎮兵引兵救錦州先至松山陷伏中大兵四面呼降國柱太息語其下曰此吾兄子昔年殉難處也吾獨為降將軍乎突圍中矢墮馬死建祠歲祀額曰旌烈本朝乾隆四十一年賜諡列愍朱文德義州衛人後家錦州崇禎時積戰功至松山副將忤監視中官高起潛斥罷十一年起故官及城被圍文德率前鋒拒守甚力城破不屈死本朝乾隆四十一年賜諡烈愍周遇吉錦州衛人少有勇力好府生後入行伍戰輒先登積功至前鋒營副將崇禎十年從討賊河南戰光山固始皆大捷後復討破胡可受於淅川降其全部出師襄陽守槐樹關張獻忠遂不敢犯與諸將大破羅汝才於豐邑坪屢加太子少保左都督代許定國為山西總兵官李自成犯山西平陽守將説遇吉降遇吉立斬之憑城固守潛出兵奮擊殺賊無算會食盡援絶退保寧武賊踵至遇吉四面發大炮殺賊萬人火藥盡外圍轉急於是設伏城內出弱卒誘賊入城亟下閘殺數千人賊用炮攻城圮復完者再傷其四驍將自成懼欲退賊將獻計前隊死後復繼官軍力盡城遂陷遇吉巷戰馬蹶徒步跳蕩手格殺數十人身被矢如蝟竟為賊執大罵不屈賊懸之高竿叢射殺之復臠其肉城中士民感遇吉忠義咸巷戰死亡略盡遇吉死京師遂不守賊每語人曰他鎮復有一周總兵吾安得至此當遇吉死時其妻劉氏率婦女射賊殺數百人賊縱火焚之闔門皆死於難本朝乾隆四十一年賜諡忠武李慶錦州人官百户四世百口同居慶年百餘歲咸重其齒德張寶錦州人四世同居本朝吳景道廣寧人隸正黃旗漢軍天聰時擢吏部啓心郎順治初擢河南巡撫厯平大河南北巨寇以功纍晉兵部尚書卒贈太子太保諡懿僖賜祭葬祀名宦祠李棲鳳廣寧人隸鑲紅旗漢軍天聰時授內院副理事官順治初擢安徽巡撫平土寇有功六年調撫粵平定南韶雷廉等處並破李定國之衆撫粵八載治迹懋著以兵部尚書總督兩廣加太子少保卒祀名宦祠陳錦錦州人隸正藍旗漢軍天聰時授騎都尉順治初任登萊巡撫厯平山東土寇尋由操江總督調浙閩屢敗海賊於舟山與鄭成功戰江東橋次同安夜為賊所刺卒贈兵部尚書賜祭葬蔡士英錦州人隸正白旗漢軍順治元年從入關剿撫山東及山西太原等處皆有功又從定浙江福建九年巡撫江西討平土賊楊文等疏免逋賦浮糧民甚德之晉漕運總督卒諡襄敏賜祭葬郎廷佐廣寧人隸鑲黃旗漢軍順治二年官國史院侍讀三年從定四川六年從剿叛鎮薑瓌尋擢江西巡撫晉兩江總督多惠政十六年破海賊鄭成功擒其將甘輝等康熙時從康親王傑書駐浙之金華討逆藩耿精忠卒於軍賜祭葬祀名宦祠郎永清廣寧人隸鑲黃旗漢軍順治初由知府纍擢至湖南布政使有惠政卒祀名宦祠長子廷樞任粵東按察使有清望次子廷極厯任漕運總督卒諡溫勤徐廷印廣寧人順治初纍官神木副使高有才之變死之贈按察使秦宗堯義州人順治𥘉厯知華州有政績擢知寧國府時召天下賢守令十六人各賜衣一襲宗堯與焉董璘廣寧人知沙縣時縣境初闢璘悉心撫字始有更生之樂順治四年土寇攻城糧盡待援不至死之又海城令甘體垣不受偽命死光澤令柯永新值變不食死張鳳儀錦州人隸正藍旗漢軍知江西廣信府當兵燹之後實心撫循順治初分巡嶺北叛鎮金聲桓圍贛城中糧匱諸將言老弱徒糜軍食不若殺之併力固守鳯儀正色曰王者之師攻城且不妄殺况守城而屠我民乎未幾援至一郡獲全于時躍廣寧人隸正白旗漢軍順治間由合肥知縣厯陜西按察使聽斷明允遷山西布政使十二年巡撫廣西時桂林初復李定國尚據六郡時躍調兵轉餉甚著勞績擢總督卒賜祭葬祀名宦祠劉浩錦州人隸鑲紅旗漢軍父武元積軍功至一等輕車都尉浩由治中擢知潯州康熙十三年孫延齡以桂林叛浩攖城拒賊副將蔣秉鑑內應執浩送賊營父子五人抗節不屈闔門百餘人皆𬒳害康熙二十二年贈太僕寺卿雍正三年入祀昭忠祠王應奎錦州人隸鑲藍旗漢軍知南豐縣時逆藩耿精忠叛應奎率家衆與鎮兵分守縣城及城陷應奎死之王之儀廣寧人隸正藍旗漢軍為福州知府耿精忠之變罵賊而死郎廷相廣寧人廷佐弟康熙初纍遷四川布政使招撫流移四方至者甚衆擢河南巡撫再遷福建總督時耿精忠初平餘黨紀朝佐張八等尚連營抗拒廷相剿撫兼施旬月間次第悉半二十七年卒於閩流寓五代馬允卿青州刺史遼兵至堅守不降城破被執太祖義釋之從家於醫巫閭列女遼韓慶民妻不知其姓氏慶民為宜州節度使金人破宜州慶民不屈死以其妻配將士其妻誓死不從遵自殺金世宗讀太宗實録見慶民夫婦事歎曰如此節操可謂難矣元李袁氏瑞州人夫歿氏年十九誓不冉嫁以養舅姑有王成者挾勢欲娶之氏曰吾聞烈女不更二夫遂往夫墓痛哭縊死樹下明楊氏妙真浙江