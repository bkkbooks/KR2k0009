也都特赫國語窗楞也伊津國語經緯之經也額圖密國語穿戴也阿布國語適才之意也富爾吉哈國語壅沙地也齊克騰國語斡也翁錦國語凡物安柄之孔也敦敦國語小蝶也畢勒哩國語籥也格楞國語衆也托索密國語預備也達拉哈國語領頭也魯庫國語林茂草密也額密勒國語雌也噶勒畢國語耳聰也阿穆爾蒙古語平安也圖呼勒蒙古語牛犢也鈕斡哩國語緑色也額勒赫肯國語緩也鄂克托國語藥也費克圖國語間隙也畢爾騰國語水淀也達都國語熟瘤也綏芬國語錐子也伊濟密國語梳頭也又紡織也奇嚕國語小旗也安巴善赫國語安巴大也善赫蛇也山壁國語涼水投物也前纂修官臣賈楨恭纂輯總纂官臣邱建猷恭覆輯前校對官臣王式和恭校恭覆校大清一統志吉林二古迹顯德故城在吉林城東南唐書渤海傳上京南為中京曰顯德府領盧顯鐵湯榮興六州地理志自鴨緑江口舟行百餘里乃小舫泝流東北三十里至泊汋口得渤海之境又泝流五百里至九都縣城故高麗王都又東北泝流二百里至神州又陸行四百里至顯州天寶中王所都按顯州即顯德府唐先天二年賜名呼爾罕州是也遼史謂即平壤城又以遼置東京之顯州為本顯德府地皆誤呼爾罕舊作忽汗今改正渤海上京城在寧古塔城西南唐書渤海本粟末靺鞨附高麗者姓大氏高麗滅率衆保挹婁之東牟山萬歲通天中契丹盡忠反有舍利齊齊克仲象者度遼水保大白山之東北阻鄂掄河自固武后封為鎮國公其子祚榮建國自號震國王地方五千里盡得扶餘沃沮辨韓朝鮮海北諸國先天中拜為渤海郡王以所統為呼爾罕州自是始去靺鞨號專稱渤改年號天寶末徙上京直海子武義直大圖宇私舊國三百里呼爾罕海之束建五京十五府六十二州此為肅愼故城曰上京龍泉府賈耽曰自安東都護府東北經故蓋牟新城又經渤海長嶺府千五百里至渤海王城城臨呼爾罕海其西南三十里有古肅愼城其北經德里鎮至南黑水靺鞨千里又曰自神州陸行四百里至顯州又正北如東六百里至渤海王城按通志謂渤海上京在烏拉境內今以唐書考之當在寧古塔西南境與金上京相近明統志云金滅遼設都於渤海上京是也齊齊克仲象原作乞乞仲象鄂掄原作輿婁武義直大圖宇原作武藝斥大土宇今並改正肇州故城在白都訥城南舊名珠赫店宋政和四年女直取寧江祖州遼人使其將蕭嗣先等發兵屯珠赫店金太禦之至混同江遼兵方懷陵道太祖擊走之遂率衆進登岸大破遼兵於此天會八年以太祖肇基王迹於此置肇州治始興縣承安八年又置武興軍金末廢按元時亦有肇州元志附於廣寧府路下注云按哈喇巴圖魯傳至元三十年世祖謂哈喇巴魯圖曰諾延故地曰阿巴拉呼者産魚吾今立城而以烏蘇哈喇哈納斯奇爾濟蘇三部人居之名其城曰肇州汝往為宣慰使既至定市里安民居得魚九尾皆千斤來獻又成宗紀元貞元年立肇州屯田萬户府以遼陽行省左丞額森領其事焉而元統志與經世大典皆不載此州不知其所屬所領之詳今以廣寧為諾延分地故附注於廣寧之下元之肇州明初已不知所在今考博多歡傳太祖分封東諸侯以二十為率諾延得其九五則其地自大不但廣寧而已又伊實特穆爾傳云諾延之遺孽哈丹托壘復叛伊實特穆爾過黑龍江搗其巢穴可知黑龍江左右亦諾延故地疑元之肇州即仍金舊且近混同黑龍二江故産大魚耳今白都訥城東南阿勒楚喀河西岸有古城周二十里內有子城南距吉林城三百四十里東去舊會寧城六百里與金史道里相合疑即肇州遺址也哈喇巴圖魯原作哈喇八都魯諾延原作乃顔阿巴拉呼原作阿八喇忽烏蘇哈喇哈納斯奇爾濟蘇原作兀速憨哈納思乞里吉思額森原作阿山博多歡原作博都歡伊實特穆爾原作玉昔帖木兒哈丹托壘原作哈丹秃魯干今並改正寧江州舊城在吉林城北境混同江金廢東岸遼清寧中置亦曰混同軍領混同縣按遼金二史金太祖起兵先攻寧江州遼守將耶律烏納戰敗棄城渡混同江而西是州在江以東矣高士奇扈從録云大烏拉去船廠八十餘里即遼之州師次寥晦寧江州也又金太祖攻寧江城又得勝陀金太祖誓師處會寧舊城在寧古塔城勒之地金之西南金史地理志上京路即海古舊土也國初稱為內地天眷元年號上京海陵貞元二年遷都於燕削上京之號止稱會寧府大定十三年復為上京會寧府初為會寧州太宗以建都升為府治會寧縣東至呼爾哈六百三十里西至肇州五百五十里北至扶餘路七百里東南至率賓路一千六百里至海蘭路一千八百里高士奇扈從録沙林東南十五里曰火茸城金之上京會寧府可里餘三殿基址皆在也廣四十餘里中間禁城碎碧瓦碁布其上禁城外有大石佛高可三大小欹出大城而西則許蓮花承之前有石塔向東芰荷彌渚逶迤茫渺莫窮其際渚間有亭榭遺迹自沙林而東八十里為寧古塔通志寧古塔西南六十里瑚爾哈河之南有古大城周三十里四面七門內城周五里東西南各一門內有宫殿舊基即會寧府之遺址也歸仁廢縣舊志在開原縣東北吉林界遼史地理志通州安遠軍本扶餘國王城渤海號扶餘太祖改龍州聖宗更今名統通遠安遠歸仁漁谷四縣金州廢以三縣併入歸仁屬咸平府元初廢全遼志開原北陸路第三站曰歸仁站即故縣也又玉山廢縣亦在縣東吉林烏拉界金承安三年以穆蘇珠巴郭勒河之間相去六百里之地置縣屬咸平府貞祐二年升為州後廢穆蘇珠巴郭勒原作瑪速集平郭林今改正曲江廢縣在舊會寧城東北金大定七年置鎮東縣屬會寧府十三年改曰曲江又有宜春縣亦大定七年置屬會寧府元初與府俱廢按曲江初名鎮東以在會寧之東也以其當水曲之地故改名曲江今寧古塔城正當瑚爾哈河灣曲處疑即曲江縣地也廢賓州在阿勒楚喀境本渤海城遼統和十七年置州於鴨子混同二水之間尋曰懷化薄軍金益州初敗遼是也後軍於廢又沃稜濼廢祥州東在取賓祥賓州西威三南遼州置進祥州瑞聖南遼置軍統懷亦曰武德縣寧軍屬黃龍府又屬黃龍府金廢俱威州在廢沃賓州稜原作斡今改鄰正那丹佛哷城在吉林城三里三百南二百六十里步有奇門四外周有重濠內周二里有餘小城門二輝發城有三一七十里在吉吉林林城南峯上一三百在輝發按峯西北周四實録里二輝發門一在之先本輝發河姓伊克邊岡上謹得哩黑龍江岸尼瑪居焉因察呼部人倫國有星古之噶揚禮者自阿圖謨黑圖龍江遷於二人居於扎魯璋地姓發納始喇欲祖生附子其姓備臣殺七備臣牛祭天改姓生納靈阿納納喇是為輝靈阿生拉哈都訥督拉根達哈爾都督生漢齊訥噶哈根達禪爾都督漢生噶哈旺吉禪都努招督生服附齊近諸古部築城於輝發河察哈爾國扎薩克邊呼爾奇山號圖圖們汗自將輝發國時圍其城不蒙克而音還旺達哩吉為努卒孫葉赫貝拜音勒布達哩自為貝勒癸巳年齋等所誘四國合兵劫拜我瑚布察寨尋又九國合兵來侵太祖擊敗之古哷山拜音達哩見布齋為我兵所殺驚懼逃歸乙未年太祖率兵敗其多璧城斬城守克充額蘇蒙額二人而還丁酉年遣使來乞盟既而拜音達哩族衆叛歸葉赫其部下又欲叛拜音達哩聞之以其臣七人之子來質乞援兵太祖發兵千人助之葉赫貝勒納林布祿搆拜音達哩曰爾若索還爾質子吾即反爾叛族拜音達哩信之乃曰吾其中立於滿洲葉赫二國之間乎遂取回七臣之子以己子與納林布祿為質而納林布祿竟不歸其叛族拜音達哩遣其臣來告曰吾前者誤為納林布祿所誑今欲乞恩賜我婚太祖允之後拜音達哩背約不娶太祖遣使謂曰汝昔助葉赫二次來侵我宥爾罪復許爾婚今背約不娶何也拜音達哩紿曰俟吾葉赫質子歸乃娶耳旋築城三層以自固後太祖復遣使謂曰爾質子既歸今將何如拜音達哩以堅城足恃遂負約丁未年秋九月太祖率兵圍其城充之誅拜音達哩及其子招降其衆乃班師康熙三十七年有御製行圍所經輝發葉赫哈達諸地皆我祖宗之所開并遺迹存焉賦詩二首乾隆十九年有御製輝發古城懷古及登輝發城再賦詩葉赫城在吉林城西四百九十五里周四里東西二門又有葉赫山城在葉赫城西北三里周四里門二內有子城周二里明時於其地置鎮北關為互市亦曰北關又有葉赫珊延府城距葉赫城里許相傳皆葉赫築謹按實録葉赫之先蒙古國人姓土默特滅呼倫國所居璋地之納喇部遂據其地因姓納喇後遷於葉赫河岸號葉赫國其始祖星根達爾罕生錫爾克明安圖錫爾克明安圖生齊爾噶尼齊爾噶尼生楚孔額楚孔額生台楚台楚生二子長清嘉努次揚吉努兄弟各居一城綏服附近諸部哈達國人多歸之遂皆稱貝勒太祖初如葉赫其貝勒揚吉努識為非常人曰我有幼女俟其長當奉侍太祖因以禮聘焉甲申年明寧遠伯李成梁聽哈達國讒搆誘清嘉努揚吉努兩貝勒至開原并從兵三百皆殺之清嘉努子布齋揚吉努子納林布祿各繼其父為貝勒李成梁率兵圍攻納林布祿所居東城不克而歸乃與和好焉戊子年納林布祿送妹來歸是為孝慈皇后辛卯年納林布祿遣使伊勒當阿拜斯翰來告曰爾國人衆我國人寡可將額勒敏扎庫穆二地以一與我太祖諭曰我為滿洲爾乃呼倫爾國雖大我豈肯取我國既廣爾豈得分且土地非牛馬比豈可割裂分給與爾爾等皆執政之臣不能各諫爾主奈何靦顔來告耶既而葉赫哈達輝發三國貝勒復各遣使來太祖宴之葉赫使者圖爾德起請曰我主有言欲相告恐觸怒見責奈何太祖曰爾不過述爾主之言耳所言善吾聽之出惡言吾亦遣人以惡言報之吾豈爾責乎圖爾德曰我主云欲分爾地爾不與欲令爾歸附又不從儻兩國興兵我能入爾境爾安能蹈我地耶太祖聞言大怒引佩刀斷案諭曰爾葉赫諸舅何嘗親臨陳前馬首相交破胄裂甲經一大戰耶昔哈達國蒙格布祿與其兄之子岱善自相擾亂故爾等得以掩襲之何視我若彼之易也況爾地豈盡設關隘吾視蹈爾地如入無人之境畫即未至夜亦可來爾其奈何昔吾以先人殺於之明故曾問未罪於得收明其明骸歸我骨徒喪肆歲大輸言金於幣汝我何父見為也遂作迎見書阿林察出命巴書誦克什之布阿林齋曰察吾持往既見布書齋使不必人會吾見弟也勿歸阿布林察曰齋曰吾我弟言辭主不遜有汝命此主怒書不之良令是俱但吾白弟見山珠書又舍哩恐部有長傷裕於楞汝額耳阿訥殷林部察乃長搜還未恩色幾克長什同引葉赫祖曰任彼兵劫劫之我可東界洞也此不寨羣臣過我同入國告之人太遠附葉赫劫掠我然乎蓋水寨耳必下水流豈能火必越上山而然珠流舍火哩豈訥能殷踰二河路而終當為我達烏拉有輝也癸發合巳兵年劫夏六我瑚月布布察齋納林寨布祿太與祖哈率兵擊之拉輝發而科遁秋爾沁九錫月伯布卦齋納勒察林珠布舍祿復哩訥糾殷哈諸達部烏兵分三烏哩路堪來行侵百里許度太嶺祖羣命烏鴉競哩堪由噪若阻東其路行往者偵欲還堪鴉異乃之散馳再歸行鴉以告復噪飛鳴太撲祖面命幾不由扎能喀前路烏哩向渾河部偵之烏哩堪復馳往見敵兵營渾河北岸方夜爨火密如星欲俟飯畢乘夜度沙濟嶺而來烏哩堪偵實奔告時夜已過半太祖曰日者聞葉赫兵來今果然我軍昏夜出恐驚國人傳語諸將期旦日啓行遂就寢甚酣妃富察氏呼上覺謂曰九國兵來攻何反酣寢耶豈方寸亂耶抑懼之甚耶太祖曰人有所懼雖寢不成寐吾果懼安能酣寢前聞葉赫引兵三路來侵因無期時以為念既至吾心定矣吾若有負於葉赫天必厭之安得不懼今我順天命守疆土彼不我悅糾九國之兵以戕害無咎之人知天必不佑也安寢如故及旦太祖率諸貝勒大臣詣堂子再拜祝曰皇天后土上下神祇某與葉赫本無釁端守境安居彼來搆怨糾合兵衆侵陵無辜天其鑒之又拜祝曰願敵人垂首我軍奮揚人不遺鞭馬無顛躓惟祈至托克索渡口默佑助我戎行遂引兵誡軍士曰解爾蔽手去爾護項或項臂傷亦惟天命不然身先拘縶難以奮擊我兵輕便破敵必矣衆皆如上命告行曰至敵扎兵喀辰之時野已扎至喀攻城城城不守克鼐退護攻繖赫坦濟二格人城來敵兵甚衆奈上何安衆在聞我之兵色幾變何有言朗訖塔遂哩登者山後望至之呼還曰告曰敢若戰以必敵破兵敵為兵多我如不兵勝亦我豈甘少軍耶法我衆國心之乃人定驍勇之太否祖則使旦人日往接偵戰時敵兵諭運曰糧敵芻若立還營軍壘乘偵夜者擊以告者言葉赫太兵祖萬遂人駐哈軍達是烏夕拉葉兵赫萬營人有一蒙古人科來爾降沁及太錫祖伯曰卦爾勒等察無兵憂萬吾人必我不兵疲聞爾之力復變俾爾色苦戰惟壁於陳險以隘步誘軍之徐使進來彼若部來長我甚兵多迎兵擊之皆烏否合則勢四將面觀列望不貝前勒其一爭二先人督彼戰衆者自必潰其我貝兵勒雖我少以逸奮力待一勞戰傷固其可必克勝及耳遂於是復攻旦日進兵太初祖葉至赫古兵哷攻山赫對濟格城不赫濟格城據葉險赫結兵陳見之罷攻命城大引臣兵額來亦戰都我率兵兵迎百人擊敗挑之戰斬九人敵稍卻葉赫貝勒布齋錦台什及科爾沁貝勒翁阿岱莽古斯明安復并力合戰布齋先衆突前所乘馬觸木而踣我兵名烏坦者趨前踞其身刺殺之敵兵遂亂哈達貝勒蒙古布祿輝發貝勒拜音達哩等皆膽落潰奔科爾沁貝勒明安馬被陷遂棄鞍裸身騎驏馬走大祖緃兵掩擊積尸滿溝壑追奔至哈達國柴河寨之南時已暮結繩截路邀殺敗兵甚衆是役也斬級四千獲馬三千匹鎧胄千副以整以暇而破九部三萬之衆軍威大震遠邇懾服冬十月太祖遣兵征珠舍哩部獲其部長裕楞額閏十一月命大臣額亦都安費揚古噶蓋率兵千人征訥殷部攻克佛多和山寨斬其部長搜恩色克什明年科爾沁貝勒明安遣使通好自是蒙古諸部長通使不絶丁酉年納林布祿錦台什及布齋之子布揚古遣使來告曰吾等兵敗名辱自今以後願復締前好重以婚媾布揚古請納妹以和錦台什復請以女歸貝勒代善太祖許焉遂請盟太祖諭曰爾等踐盟則已有渝盟者待三年不悛吾乃征之未幾納林布祿背盟有穆哈連者引陳獲蒙古馬四十匹來歸我國納林布祿奪其馬執送穆哈連於蒙古又以錦台什所許我國貝勒代善之女適蒙古喀爾喀部貝勒齋賽癸卯年秋九月孝慈皇后疾篤思見母大祖遣使至葉赫迎之納林布祿不許止令僕人南泰來視太祖曰汝葉赫諸舅無故掠我瑚布察寨又率九國之兵侵我自悔起兵開釁之罪刑馬歃血祭天盟誓願聯姻通好旋即背盟以既許歸我之女改適蒙古今我國妃病篤欲與母訣又不許是終絶我好也既如此兩國當復相讎我將問罪汝邦築城汝地矣甲辰年春正月太祖率兵征葉赫攻克璋城及阿齊蘭城取其七寨俘二千餘人而還癸丑年春正月太祖滅烏拉國布占奉逃奔葉赫時納林布祿已卒太祖遣使諭錦台什布揚古曰昔我陳擒布占泰赦其死罪而贍養之又妻以三女輒敢以恩為讎是以問罪往征削平其國今投汝汝其執之以獻使者凡三往錦台什布揚古不從秋九月太祖率兵四萬征之有逃卒至葉赫泄軍期葉赫遂盡收散處居民其烏蘇城以痘疫末收我兵圍之太祖諭城中人曰降則贍養之不降則進攻城中人曰大國兵衆豈我等所能禦苟撫我我曷為不降其城長瑚什穆繖坦遂開門降太祖酌金巵飲之各賜冠服葉赫所屬璋城吉當阿城雅哈城克爾素城和敦城喀布齊賚城鄂吉岱城及屯寨凡十九處盡焚之收烏蘇城降衆三百户而還錦台什布揚古使人訴於明曰哈達輝發烏拉三國滿洲已盡取之今復侵我葉赫其意欲削平諸國即取遼東以建國都將使開原鐵嶺為牧馬之場矣明人乃遣遊擊馬時楠周大岐率練習火器者千人守衛葉赫東西二城太祖聞之欲致書於明遂躬詣撫順所城遊擊李永芳出城三里外迎太祖以禮接之永芳迎入教場太祖以書與永芳曰昔葉赫哈達烏拉輝發蒙古錫伯卦勒察珠舍哩訥殷九國於癸巳歲合兵侵我我是以興師禦之天厭其辜我師大捷斬葉赫貝勒布齋生擒烏拉貝勒布占泰以歸逮丁酉歲刑馬歃血以盟通婚媾無忘舊好詎意葉赫渝棄前盟將已字之女悔而不與至布占泰我所恩養者也反以德為讎故伐之而殲其兵取其國布占泰孑然一身奔於葉赫我索取之又不我與此我所以征討葉赫也我與汝國何嫌何怨欲相侵耶太祖既與書永芳遂還乙卯年貝勒大臣等聞葉赫欲以布揚古所許我國之妹適喀爾喀部貝勒巴哈達爾罕之子莽果勒岱皆憤怒請曰葉赫女既為上所聘又將以適蒙古無禮莫甚焉宜乘其許而未行急發兵攻其城而取之太祖諭曰征討國之大事若故怒而興師則未為可也蓋此女之生以負婚之釁所由起實非偶然哈達輝發烏拉三國皆因此女興兵搆怨相繼滅亡是此女之召釁亡國已有明驗今明又助葉赫天殆欲亡葉赫以激怒我而啓大釁也若奮力征之縱得其女徒至不祥即歸他人亦不永年吾知此女流禍已盡死期將至矣諸貝勒大臣仍欲興師堅請太祖曰使吾因此發怒興師征討汝等猶當諫止吾早已洞徹事機釋然於中置諸度外汝等何反堅請不巳耶吾無憾汝等何憾焉吾斷不以汝等言勞師動衆也尋葉赫以此女嫁蒙古未一年果亡諸貝勒大臣請興師征明曰此女年已三十有三受我國之聘垂二十年因明國興兵衛助葉赫錦台什布揚古恃其勢遂與蒙古今征明宜也太祖曰明恃勢橫行抗違天意使我今日仗義伐明天必佑之天佑我可以克敵但我國儲積未充縱得其人民其何以養之恐我國人民反致損耗惟及是時撫輯我國固疆圉修邊備重農積榖為先務耳天命四年春正月太祖命大貝勒代善率大臣十六人兵五千往守扎喀關以防明兵親統軍征葉赫深入其界自克伊特城尼雅罕寨距葉赫城東十里克大小屯寨二十餘其逃入城者盡追擒之又取葉赫所屬蒙古遊牧畜産整兵而還離葉赫城六十里駐營翼日班師先是錦台什布揚古聞我兵往征遣使向明開原總兵馬林告急馬林率兵出葉赫城四十里見我國兵勢強盛不敢戰而退三月明兵四路來侵錦台什布揚古欲助明引兵至開原中固城聞明兵大敗乃還秋八月太祖統軍征之時太祖已取明開原鐵嶺葉赫貝勒錦台什居東城布揚古居西城我軍先馳向西城布揚古偕其弟布爾杭古率兵出城西門陟岡鳴角鼓噪望見我軍旌旗劒戟如林隊伍整肅前後絡繹自度弗能禦倉皇入城諸貝勒遂督兵圍之太祖統軍圍東城先破其郭軍士薄城布列梯楯呼錦台什出降錦台什不從答曰我非明兵比等丈夫也肯束手歸乎與其降汝寧戰而死耳太祖遂督兵攻城兩軍拒戰矢如雨雹城上發火器擲巨石滚木我軍冒矢石穴其城城墮遂入城敵衆皆敗禁軍士毋得妄殺又潰使人持太祖遣人執幟約上黃蓋傳諭城中降者免死於是城中兵民俱降錦台什攜妻及幼子登高臺我兵圍之呼曰汝降速下否則進攻錦台什曰吾戰不能勝城破困於家縱再戰豈能勝乎汝皇子四貝勒吾妹所生也得相見聞其盟言吾乃下時西城太祖召之至四貝勒攻命曰爾舅有言待汝至乃下汝往彼下則已不下以兵毀其臺四貝勒既至錦台什曰吾與甥未識面真偽烏能辨我國大臣費英東額駙達爾漢曰汝視常人中有如我四貝勒魁梧奇偉者乎汝國使者必嘗語汝何難識别耶若仍不信曩者我國議和之時曾以媪往媪乳汝子德勒格爾今尚在盍令視之錦台什曰何用媪為也觀此子辭色似未承父命善遇我也特誘我下臺而見殺耳吾石城鐵門既失困守此臺縱戰不能勝但我祖父世居斯土我生於斯長於斯則死於斯而已四貝勒曰汝疲勞百姓至於數年所築重城今皆摧破獨據此臺何為也汝欲誘人至此與汝并命孰肯如汝之意耶汝如何曰得我活汝盟言汝方下也豈戰不能擒汝而與汝盟歟吾已在此汝下引汝往見父皇生殺惟父皇命且汝當日之意將欲翦滅親戚我屢欲和好遣二三十人至汝國汝輕視我國謂懼而求和殺我使臣或羈留焉致有今日傾覆之禍若父皇念汝惡則戮汝儻不念汝惡以吾之故貸汝汝生矣凡勸諭者再三錦台什仍執前言不下四貝勒曰舅言吾來即下吾乃來若下速下引見父皇否則吾往矣錦台什曰姑勿往吾先令親臣阿爾塔什往見而回吾乃下遂令阿爾塔什來見上察言觀色太祖諭責之來非曰離間諸汝耶念此舅與我宜誅汝為難致明人舉兵四十萬事既往不汝咎耳汝還語貝勒與偕子德勒格來阿爾被爾塔什創在家還勸錦台什不從曰聞吾召之來吾與相見乃下四其父曰貝我勒召德勒格爾至與之見德等戰既不勝城又破今居此勒格爾謂臺欲何為盍下四臺生死聽之勸諫再四錦台貝勒欲縛德勒格爾德勒格什終不爾曰吾從年三十六乃勒以於今其言日奏死耶殺之太可也祖曰何縳焉四子勸父降而不從貝父之罪也太祖以父所當誅匆食賜殺其子引德勒格四貝勒與同爾見食諭曰此爾之幼子趨下兄也善遇之錦台什引弓錦台什從者復妻因其夫不下擐甲以待我兵攜持斧毀台什其已臺錦台什縱死令毀臺之火焚屋宇盡燬我諸將謂錦兵退還火燎中錦台什身自下為我兵所執縊死之從會東城已破布揚古時諸貝勒圍西城招布爾杭古大懼使人降不來告願大降以兵至懷疑不敢出此豈舍汝去大貝勒曰乎吾以汝始令汝為外兄降汝不弟愛而從欲生之故令汝降若戰則汝等盡死於我之小卒手降則生矣果願降恐兄弟偕來或被殺盍令汝母先來汝母吾外姑也豈執婦人而殺之乎布揚古布爾杭古復使人約盟且欲仍居此城大貝勒怒曰何復為此言也既破東城豈力不能拔西城聽汝等居此而去乎速降則已否則父皇至必攻克爾城克城之後汝等駢首戮矣布揚古布爾杭古乃令其母來大貝勒以禮接見其母曰汝無盟言故吾二子懷疑而懼耳大貝勒乃以刀劃酒誓曰若汝等降而我殺之殃及我若既誓而汝仍不降殃及汝等汝等不降破汝城必殺無赦乃執酒飲其半分其半送布揚古布爾杭古飲之遂開門降大貝勒引布揚古見上布揚古復勒焉立大貝勒挽其轡曰爾殆非丈夫耶言既定又立此躊躇何為也乃來見布揚古跪不恭僅屈一膝不拜而起太祖親以金巵賜之酒不恭如初屈一膝偏向酒不竟飲沾脣而已又不拜而起太祖諭大貝勒曰引而婦兄去回彼西城是日太祖深念久之謂吾既不念舊惡欲留而豢養之貸其死豫以生全未見有喜色仍讎怨且拜跪亦不少屈此人可豢養耶是夜命縊死之其弟布爾杭古以大貝勒故宥其死助葉赫防守之明遊擊馬時楠及兵一千盡殺之葉赫所屬各城俱降康熙二十一年有御製經葉赫廢城詩乾隆八年有御製望葉赫舊墟詩棟鄂城在城西南五百二十里周九里門四通志舊為棟鄂部長魯克索所居謹按實録初我國六祖寶實次子阿哈納往聘薩克達路長巴斯翰之妹為妻巴斯翰謂阿哈納家貧不許旋以妻棟鄂部長克徹巴顏之子額勒吉後額勒吉往巴斯翰所還至阿布達哩岡為額圖阿嚕部下九賊所殺克徹巴顏曰往者寧古塔阿哈納欲聘之女吾子娶之故𬒳殺也時哈達萬汗遣人告克徹巴顏曰爾子乃額圖阿嚕部下九賊殺之我擒以與爾復爾讎爾歸附我克徹巴顔曰吾子被殺奈何又欲降我此必寧古塔人以額圖阿嚕地遠故為飾詞以委謝耳吾等乃比鄰兄弟若直在寧古塔人可令饋哈達金帛執九賊與我面質九賊詞服果非寧古塔人所殺則所饋哈達金帛吾倍償之三祖索長阿聞其語潛遣人紿之曰爾子乃我部下人所殺爾以金帛與我我當為爾殺此讎人克徹巴顔曰哈達萬汗言額圖阿嚕部下九賊殺吾子今云爾部下人殺吾子皆爾寧古塔人誑我也遂成讎怨引兵侵掠寧古塔東南二路諸貝勒幾不能支與景祖議曰我等同祖所生分居十二處勢渙散當聚族而居共相保守既定議三祖索長阿次子烏泰不從曰一處何可居也將不為孳息畜産計乎今不必聚居借兵於哈達萬汗便哈達萬汗烏泰婦翁也於是借兵攻棟鄂部者再獲其數寨初寧古塔諸貝勒與哈達萬汗互為婚媾聲勢相埓自借兵後乃示弱焉及我太祖討尼堪外蘭既攻克圖倫城長祖德世庫二祖留闡三祖索長阿六祖寶實之子孫忌太祖英武同謀加害弗遂六祖寶實長子康嘉借兵哈達萬汗以渾河部兆嘉城長理岱為嚮導劫我瑚濟寨而去分所獲於中途太祖部將安費揚古率十二人追及之奮勇突衝入敗哈達兵斬四十餘人盡獲所掠而還甲申年春正月太祖率兵征兆嘉城途遇大雪至噶哈嶺路險峻難登諸叔暨諸兄弟勸勿進兵太祖曰理岱我同姓兄弟乃自相戕害反為哈達嚮導豈可恕耶遂鑿山為磴軍士鱗次立以繩東馬曳之踰嶺至兆嘉城下三祖索長阿第四子龍敦豫使人潛告理岱理岱鳴角集兵登城以待衆復請曰彼有備未易攻姑旋師太祖曰吾固知其有備而來何遽還耶遂督衆圍城攻克之擒理岱宥其死而贍養之先是棟鄂部諸貝勒聞我國擊敗哈達兵因集議曰昔寧古塔貝勒借哈達兵攻我取我數寨今彼與哈達國相讎吾等宜乘機攻之用蟒毒淬箭為攻具適其部內亂太祖聞之與衆計曰棟鄂部內亂宜往攻衆諫曰兵未可輕入其境幸而勝誠善倘有失奈何太祖曰我不乘機先發儻彼復和好必加兵我矣衆皆曰善秋九月太祖率兵五百征之其貝勒阿海巴顔聚兵四百於所居齊吉達城閉城以守我兵至圍攻其城縱火焚城樓及村中廬舍城垂陷會大雪罷攻太祖命衆先還留十二人以從伏濃煙中城內人謂兵已退引衆出太祖邀擊之斬四人獲甲二副會完顏部之遜扎沁廣衮來請曰翁鄂洛吾讎也曾為所縛乞以一旅助我破之太祖念既興兵至此宜乘此勘定一方遂率兵夜馳赴之遜扎沁廣衮有兄子岱度墨爾根密使人通於翁鄂洛城故豫知我軍至收其兵衆入城我軍亦縱火焚城樓及村中廬舍太祖乘屋顛射城中城中鄂爾果尼潛射太祖傷首貫胄太祖拔箭見敵趨過即以所拔之箭從煙突隙處迎射之貫其股應弦而踣太祖被創流血至足猶鏖戰不已敵復有羅科者乘煙熖中潛逼突發一矢中太祖項砉然有聲穿鎖子甲護項鏇捲如鈎拔之血肉並落衆競趨而前欲登屋扶掖諭止之曰爾勿來恐為敵窺吾當徐下時項下血涌如注以一手捫創一手拄弓而下二人掖而行忽迷仆諸臣皆大驚相怨咎少蘇裹創迷而復蘇者數四蘇輒飲水凡一晝夜血猶不止裹創厚寸餘至次日未時血始止於是棄垂下之城而還太祖創愈復率兵攻克翁鄂洛城獲鄂爾果尼及羅科諸臣請誅之太祖曰兩敵交鋒志在取勝彼為其主乃射我今為我用不又將為我射敵耶如此勇敢之人若臨陳死於鋒鏑猶將惜之奈何以射我故而殺之乎遂授鄂爾果尼羅科官各轄三百人諸臣皆頌上大度云戊子年夏四月棟鄂部長克撤巴顏之孫何和里率本部軍民來歸太祖以長女妻之授為一等大臣哈達城在城西南五百三十里伊徹峯上相近又有哈達石城初哈達貝勒自舊城遷居於此稱新城其舊城在開原縣東六十五里明置廣順關於此為市易處亦曰南關謹按實録哈達之先本呼倫國姓納喇其始祖名納齊布祿生尚延多爾和齊尚延多爾和齊生嘉瑪喀碩珠古嘉瑪喀碩珠古生綏屯綏屯生都勒喜都勒喜生克什訥都督克什訥都督生子二長徹徹穆次旺濟外蘭克什訥都督為族人巴岱達爾罕所害徹徹穆之子萬奔錫伯部相近之綏哈城旺濟外蘭奔哈達主其部後被害其子博勒寬沙津殺父仇至綏哈城迎兄萬至哈達為部主萬攻取附近諸部遠者又招徠之其勢乃盛葉赫烏拉輝發及渾河部俱屬之遂稱為汗既而黷貨無厭民不堪命多叛投葉赫先附諸部亦皆攜二萬汗卒子瑚爾罕繼之甫八月卒弟康古嚕繼之尋亦卒弟蒙格布祿繼之癸巳年夏六月蒙格布祿為葉赫貝勒布齋等所誘合兵劫我瑚布察寨太祖率兵追之設伏於途少引兵亦略哈達國富勒嘉齊寨其兵來戰太祖欲引敵至伏兵處令我兵前行獨殿後誘之俄而敵兵三人聯騎揮刀追逼又一人揮刀迎擊於前太祖念兵刃自後至猶可避自前至恐傷面目及手遂引弓射前至者其人在右發矢未便因回身從馬項上射之中馬腹遂逸去其三人乘發矢時掩至太祖乘馬驚躍幾墜賴右足據鞍得復乘遂射蒙格布祿馬仆地其從者易馬以乘之遁歸太祖率騎兵三人步卒二十人追擊斬十二人獲甲六副馬十八匹乃還秋九月蒙格布祿復為布齋等所誘九國合兵來侵太祖擊敗之古哷山蒙格布祿見布齋為我兵所殺驚懼逃歸丁酉年遣使來乞盟願復修前好戊戌年哈達城北溪中流血己亥年蒙格布祿與葉赫搆兵力不能敵以三子來質乞援太祖命大臣費英東噶蓋率兵二千助哈達駐防其地葉赫貝勒納林布祿聞之搆明開原通事代為齎書誘蒙格布祿曰爾若執滿洲來援二將索還所質三子盡殺其兵二千我妻汝以所求之女修前好焉蒙格布祿惑其言約於開原城定議太祖聞之遂率兵征哈達貝勒舒爾哈齊請為先鋒自試太祖命統兵一千為前隊既至敵兵出拒舒爾哈齊按兵不動告曰彼兵出矣太祖曰豈謂此城無兵而來耶遂督兵進擊時舒爾哈齊兵填擁於前太祖麾之使開路塞不能入乃沿城而行城上矢石雨下軍士多𬒳傷者太祖督兵攻克其城大將揚古利生擒貝勒蒙格布祿馳告太祖命勿殺賜以所御貂帽及豹裘贍養之盡招服哈達屬城器械財物無所取室家子女完聚如故悉編入户籍遷之以歸辛丑年春正月太祖以女妻蒙格布祿之子烏爾古岱明國遣使來言曰爾何故伐哈達而取其國耶其復烏爾古岱國太祖從其言命烏爾古岱同公主率所部人民以歸後葉赫貝勒納林布祿糾蒙古兵數侵掠哈達太祖遣使告於明曰吾令烏爾古岱還國今葉祖父何故𬒳害汝等乃我不共戴天之讎也明遣使謝曰非有意也誤耳乃歸二祖喪太祖謂使臣曰害我祖父者尼堪外蘭所搆也必執以與我乃已明使不從尼堪外蘭旋又迫太祖往附父部下人也搆明兵害吾太祖曰爾吾祖父恨不能手刃汝豈反從汝偷生自是恨益深適蘇克素護河部薩爾滸城主諾密納之兄卦喇為尼堪外蘭所譖明撫順所守吏責治之諾密納與同部嘉穆瑚寨主噶哈善哈斯瑚沾河寨主常舒及弟揚舒俱忿恚相議曰與其倚賴此等人何如投附聰睿貝勒也議定遂來通款太祖椎牛祭思復讎以天與之盟遣還太祖日夜顯祖遺甲十三副謀伐尼堪外蘭歲癸未明神宗十一年也太祖年二十五夏五月起兵攻尼堪外蘭於圖倫城尼堪外蘭豫知之攜妻子遁戌年秋七月太祖攻克其城而還丙太祖知尼堪外蘭居鄂勒歡城復率兵往征時城外有四十餘人欲避兵挾弓矢走前行一人戴氊笠被青棉甲太祖望見疑即尼堪外蘭奮身往追為四十人所環逼衆矢交發太祖身中三十餘創貫胸及肩猶鏖戰不退射殪八人斬一人餘皆竄遁攻克鄂勒歡城索尼堪外蘭弗獲斬城內漢人十九人又執中矢者六人深入其矢使傳諭明之邊吏執送尼堪外蘭否即興兵征明明邊吏遣人復曰尼堪外蘭既歸我未便執送自來殺之可也太祖命齋薩率四十人往尼堪外蘭聞我兵至欲登臺避匿明人不容登臺去其梯齋薩遂斬尼堪外蘭取其首來獻佛勒和城在城北三十三里周三里東一門舊佛索諾貝勒所居古城有三一在城北八十四里周一里門一一在城西南五十里周三百六十步門四一在城西南五百餘里周八十步門一俗皆稱為古城建自何代俱無考又寧古塔有二古城一在城東南五百八十五里周五里門十一內有子城周一里門五一在城東北六百里周三里門二又白都訥城東南有古城周二十里內有子城周四里又西古城在寧古塔西二十五里周一里門二五國頭城在寧古塔城東北契丹國志女直東北與五國為鄰五國之東接大海出名鷹自海東來者謂之海東青遼人酷愛歲嵗求之女直至五國戰鬬而後得不勝其擾大金國志天會八年宋二帝自韓州如五國城城在金國所都之東北千里明統志自此而東分為五國故名舊傳宋徽宗葬於此高士奇扈從録自寧古塔東行六百里曰章圖哩噶善松花黑龍二江合流於此有大土城或云五國城章圖哩噶善原作羌突里噶尚今改正蘇克素護河諸部俱在吉林城西南五百里外謹按實録乙酉年秋九月太祖率兵攻蘇克素護河部之安圖瓜爾佳城斬其城王諾謨歡丙戌年夏五月攻克渾河部之貝琿寨秋七月攻哲陳部之托摩和城遇雷雨旋師越數日太祖往招撫之其衆俱降丁亥年夏六月攻克哲陳部山寨擒寨主阿爾泰斬之秋八月太祖遣巴圖魯額亦都率兵征巴勒達城既至渾河水漲不能涉令以繩聯軍士魚貫而渡先率精鋭數人乘夜攻巴勒達城樹梯而上城中人迎拒額亦都跨城堞而戰身中五十創猶死戰不退城中人皆潰遂克其城太祖復自率兵攻洞城克之降其城主扎海以還戊子年秋九月太祖率兵夜過東星阿地天隕一星大如斗有光士馬皆驚太祖知為克敵之象遂進攻完顔城克之斬其城主岱圖墨爾根己丑年春正月太祖率兵征兆嘉城伏兵城下城主凝固沁遣兵百人出戰我伏兵不即擊引弓射之敵兵衝突上前四面環繞太祖獨立百人中手刃九人擊敗其衆悉潰走圍城四日將破之我兵遂弛備分取所俘獲聚而譁太祖解甲授侍臣鼐護被之諭曰我兵喧譁恐致爭奪爾往禁止鼐護既往喧益甚太祖又以棉甲授侍臣巴爾泰被之諭曰敵將遁速取吾甲巴爾泰往因喧譁未息不即來忽敵兵十人出遁刺太祖族弟旺善為敵兵撲仆地踞其身欲太祖未及甲奮身直前發天中敵兵額應弦而踣援旺善起衆兵乃至攻克其城斬城主凝固沁而還東海窩集部在琿春城東南凡沿海林木叢茂處皆曰窩集謹按實録丁未年夏五月太祖命貝勒巴雅喇大臣額亦都費英東侍衛扈爾漢率兵千人往征東海窩集部取赫濟赫鄂摩和索囉佛訥赫三路屯寨俘二千人而還己酉年冬十二月命扈爾漢率兵千人征窩集部之瑚葉路取之收二千户而還賜扈爾漢甲胄馬匹號為達爾漢嗣有歸附我國之窩集部綏芬路長圖楞為窩集部之雅蘭路人所掠庚戌年冬十一月命額亦都率兵千人征雅蘭路額亦都先往窩集部之那木都魯綏芬寧古塔尼瑪察四路招其路長康果禮喀克都哩昻古明安圖烏嚕喀僧額尼喀哩瑭松阿葉克舒等今其攜家口前行族師至雅蘭路遂擊取之俘萬餘人而還辛亥年秋七月命台吉阿巴泰大臣費英東安費揚古率兵千人征窩集部之烏勒固宸穆稜二路取之尋有窩集部之扎庫塔人來附太祖賜甲三十副遣之還其人以甲送黑龍江濱窩集部人被於樹以試射又貪烏拉國布匹受貝勒布占泰招撫冬十二月命額駙何和里同額亦都扈爾漢率兵二千往征扎庫塔城圍三日招之不下遂攻克其城斬首千餘俘二千餘人並招降環近各路收五百户令圖勒伸額勒伸二人衛之來歸甲寅年冬十一月太祖遣兵五百征窩集部之雅蘭西林二路收降民二百户俘千人而還乙卯年冬十一月太祖遣兵二千征窩集部東額赫庫楞先是額赫庫楞人寄語我國曰人謂爾國驍勇可來與我等決一戰至是八旗兵分兩路進招之不服遂布陳鳴螺越濠三層毀其柵攻克其城陳斬八百人俘獲萬人收撫其居民編户口五百乃班師廢海蘭路在吉林城東南金置金史地理志西北至上京一千八百里東南至高麗界五百里廢率賓路在城東南金史地理志率賓路遼時為率賓府本率賓故地天會二年以扎蘭路都貝勒所居地瘠遂遷於此海陵置節度使大定十一年以扎蘭率賓相去千里既居率賓不可忘本遂命名親管明安曰扎蘭明安西北至上京一千五百七十里東北至乎爾哈一千一百里西南至海蘭路一千二百里比至邊界斡罕阿林千户二千里元廢率賓原作恤品又作速頻海蘭原作哈懶扎蘭原作耶懶明安原作猛安貝勒原作孛堇斡罕阿林原作斡可阿鄰今並改正廢呼爾哈路在寧古塔城東金史地理志呼爾哈路初置萬户海陵改置節度使承安三年置節度副使西至上京六百三十里北至邊界哈唎巴圖千户一千五百里元置呼爾哈軍民萬户府元志距上都四千二百里大都三千八百里又有屯路距上都四千里哈喇已圖千户原作合里賓忒千户今改正乾元殿在舊會寧府城內金天會三年建通志金於海古勒地置會寧府號為上京因建此殿又建東華殿西清殿龍夀殿奎文殿薰風殿又有慶元宫五雲樓皇武殿在舊會寧府城內金世宗打毬校射之所大定間世宗謂羣臣曰上京風物朕自樂之祖宗舊邦不忍舍去後數日宴宗室於皇武殿曰朕尋常不飲酒今日甚欲沈醉此樂亦不易得也宗室故老以次起舞進酒金主曰吾來數月未有一人歌本曲者吾為汝等歌之命宗室弟子皆坐殿上聽朕自歌其辭羣臣宗戚皆稱萬歲雲錦亭在舊會寧府城內又有臨漪亭並金世宗建為籠鷹之所金史地理志在愛新水側正隆時海陵平其址大定時世宗修復之歐孝子里在寧古塔城東通志明監生歐某家有妖狐為患有善治者燻死數狐老狐益引黨類作祟已魅殺臧獲十餘人復聲言將殺歐某之母屢至危殆歐某割股以進俄聞狐語曰此人割股孝親天已增其母夀十年矣遂去不復為患後十年母以夀終嘉蔭侯廟金大定中册上京諸林為嘉蔭侯立廟後廢今其地大木欉然皆數百年物也城堡寧古塔城在吉林城東南五百四十餘里瑚爾哈河北岸植木為牆高二丈餘周二里半東西南三門外城周十里門四西南濱瑚爾哈河本朝康熙五年自舊城遷建於此其舊城在今城西北五十里海蘭河南石城周一里餘外城周五里餘國初建東至東海三千餘里西至吉林二百五十里南至圖們江朝鮮界六百里北至混同江黑龍江將軍所轄界六百里東南至海一千五百七十里西南至勒富善河五百里東北至海三千餘里西北至阿爾楚喀城七百餘里順治十年設昻邦章京及副都統鎮守康熙元平改鎮守寧古塔等處將軍十年穆副都統於吉林十五年移將軍於吉林城移副都統鎮守於此雍正五年增置泰寧縣屬奉天府七年罷謹按寧古塔境內舊城甚多其中塞址猶存者如城東三里瑚爾哈河之北有覺羅城周五十八步門一城西二十五里有西古城周一里東西門各一城西三十里有穆當阿城周一里餘南北門各一城南邊牆內有舊覺羅城周一百步城南二十里有噶斯哈城周一里餘門一城北四十五里海蘭河南岸有薩勒瑚城周一百步門一城東南五百八十里有英愛城周一里東南門各一城東南五百八十里有費雅城周三里門五城東南六百五十里有富爾丹二城一周三里門四一周二里餘門三城東南六百七十里有富勒堅城周七十步門一城東北五十餘里有克音城周三里門一城東北三百五十里有安巴畢喇城亦名大河城周六里門四城東北九百里混同江之南有斡里城周三里門二城西北五十里海蘭河南岸有布爾哈圖城周二里門二城西北五十二里有布爾哈圖西古城周一里門二又吉林城東十二里有尼什哈城在尼什哈山上周二里門三其城之西有一井木生其中旁有鯽魚池三石砌城北七十里有薩爾巴禪城周一里門一城北八十七里有錫蘭城周二里門一城北一百十里有蘇斡延城周二里門一城北一百十一里混同江中有島名蘇斡延島上有城周一里門一城東南七里伊蘭茂山上有伊蘭茂城周一里餘門二其外有郭周二里門一城西南五百二十五里有呼嚕城周二百四十步門二城西南五百餘里有錫伯城周一百二十步門二又城西南五百四十里有富勒哈城周八十步門一城西南五百五十里有邦塞城周八十步門一城西南五百六十里有呼濟城周一百步門一又城西南伊徹峯之西有石城一周二百四十步門一又城西南五百二十里安巴和托峯下有小石城周八十步門一又城東北三十里伊罕山上有伊罕山城周一里門一城東北三十二里有鄂謨城周二里門一城西北五百五十餘里有善延府城周一百六十步門一城西北五百五十五里有索勒和城周八十步門一又城東北混同江中有哈勒費延島島上有城土人即謂之哈勒費延城周二里門一以上諸城俱無創建年月亦未詳建自何人何代附識於此以備參考薩勒瑚舊作賽爾瑚英愛舊作英靉富勒堅舊作富爾嘉克音舊作刻印斡里舊作瓦利蘇斡延舊作蘇瓦延富勒哈舊作富爾哈伊徹舊作依車索勒和舊作索爾和哈勒費延舊作哈爾費延今並改正打牲烏拉城在吉林城北七十里混同江東東至團山子二十三里西至思沛口二十四里南至三家村四十里北至康家屯六十八里遼時寧江州故址其先烏拉布占泰貝勒居此城周十五里門四內有小城周二里東西二門有土臺高八尺周一百步本朝康熙四十二年因舊城有水患於哈思呼貝勒城東移建新城周八里門四設協領等官駐防有居民九百餘户謹按實録烏拉之先以呼倫為國號姓納喇其始祖名納齊布祿四傳至都勒喜生子二長克什訥都督次古對珠顏古對珠顔生泰蘭泰蘭生布延布延收服附近諸部築城於烏拉河岸洪尼地國號烏拉衆稱為貝勒生子二長布罕次博克多布延卒子布罕繼之布罕卒子滿泰繼之癸巳年夏六月滿泰為葉赫貝勒等所誘合兵劫我瑚布察寨太祖率兵擊之遂遁去秋九月滿泰之弟布占泰隨葉赫哈達貝勒等九國合兵來侵太祖擊之於古哷山下九國兵皆敗遁葉赫貝勒布齋為我兵所殺明日有卒擒一人至告曰吾獲一人將殺之彼大呼勿殺願自贖因縛之來見太祖問曰爾何人也對曰烏拉貝勒滿泰之弟布占泰也恐見殺未敢明言生死惟命耳遂叩首太祖曰女等九部會兵侵害無辜天厭汝等昨已擒斬布齋彼時獲爾亦必殺矣今既見汝何忍段語曰生人之名勝於殺人與人之名勝於取人遂解其縛捨猁猻裘贍養之丙申年秋七月賜太祖遣大臣圖勒坤黃占博勒寬斐揚占送之歸時烏拉貝勒滿泰與其子往所屬蘇斡延錫蘭地並以淫部民妻被殺及布占泰至滿泰之叔興兄雅欲殺之因我國衛送二大臣嚴為防護不能害興尼雅奔葉赫圖勒坤黃占等立布占泰為烏拉國主乃還布占泰遣使乞盟感我太祖再生恩事如父未幾布占泰背盟以我國所屬瓦爾喀部之安楚拉庫訥河二路衆所推服之三人送葉赫貝勒納林布祿并引其使招誘安楚拉庫訥河二路戊戌年春正月太祖命貝勒褚英巴雅喇大臣寨二費英東噶蓋率兵一千征安楚拉十餘盡招徠其人民而還庫路取屯太祖乃賜褚英號洪巴圖魯巴雅喇號卓哩克圖丁未年春正月瓦爾喀部斐優城長䇿穆特赫來朝告曰吾等因地方遙阻遂附烏拉不得已也今烏拉貝勒布占泰遇吾等虐甚乞移家來附太衛祖命貝勒舒爾哈齊褚英代善大臣費英東侍扈爾漢率兵三千至斐優城徙之時夜陰晦軍中大纛之上有光衆以為異捫視無有復樹之光如初舒爾哈齊曰吾自幼從上征討所厯之地多矣未見此異其非吉兆耶欲還兵褚英代善曰或吉或凶兆已先定吾等何所見而遽還將何以還報上命耶遂決意前進至斐優城盡收環城屯寨凡五百户令扈爾漢率兵三百護之先行布占泰發兵萬人邀諸路扈爾漢見之令五百户結寨山巔以兵百人衛之使人馳告後隊諸貝勒是夕烏拉兵萬人而我國扈爾漢兵僅二百人各據山一面結營相持翼日烏拉以萬人攻我二百兵我國大將揚古利馳至先衆奮擊斬烏拉兵七人我兵止傷一人烏拉兵退渡河登山畏懼不敢前兩軍相向駐營日過午我國後隊諸貝勒兵悉至見烏拉兵衆褚英代善策馬而前諭衆曰皇父每有征伐無不摧堅陷敵今日雖未親履行間而我等奉上命來此爾衆何憂昔布占泰來侵我國我國擒而縛之皇父宥其死復豢養之歸主其國為時未久人猶是人曾從吾手而釋非有天幸得脫也今豈不能再縛之耶彼兵雖多我國荷天眷仗天威皇父威名夙著破敵兵必也衆軍士皆曰願效力遂渡河禇英代善各率兵五百分二路緣山奮擊烏拉兵大敗代善追及烏拉統兵貝勒博克多從馬上左手攫其胄而斬之時天氣晴明忽隂晦大雪寒冽被傷敵兵棄甲逃者僵仆甚衆是役也陳斬博克多及其子生擒貝勒常住與貝勒瑚哩布斬三千級獲馬五千匹甲三千副師還太祖賜舒爾哈齊號達爾漢巴圖魯以褚英遇大敵率先敗其衆特賜號阿爾哈圖圖們以代善陳斬博克多又與兄並進克敵特賜號古英巴圖魯戊申年春三月太祖命貝勒禇英阿敏率兵五千征烏拉國圍其伊罕山城克之斬千人獲甲三百俘其衆以歸時烏拉貝勒布占泰與科爾沁貝勒翁阿岱合兵出烏拉城二十里遙望我軍知不可敵遂相約而還布占泰因失伊罕山城大懼始遣使修好乞盟執葉赫貝勒納林布祿屬下五十人送我使臣殺之尋又背盟侵我國所屬窩集部之瑚爾哈路者再壬子年秋九月癸丑太祖率兵征之庚申師至烏拉太祖張黃蓋鳴鉦鼓沿烏拉河而行布占泰率兵迎戰至河濱見我兵甲胄鮮明士馬精強軍勢甚盛烏拉兵人人惴恐無鬬志太祖遂沿河岸而下克其臨河五城又取金州城駐師焉其城在布占泰所居大城河岸之西距城西門二里許冬十月辛酉朔太祖以太牢告天祭纛駐兵三日布占泰晝則率兵出城相持河岸夜則入城休息諸貝勒請渡河擊之太祖曰毋作此浮面取水議也當為探原之論耳譬伐大木豈能遽摧必以斧斤斫而小之然後可折今以勢均力敵之大國欲一舉而取之能盡如吾願乎我且削其所屬外城獨留所居大城外城盡下則無僕何以為主無民何以為君乎遂率師毀其六城焚其廬舍糗糧移駐於富勒哈河渡口布占泰使人來告曰上乘怒興兵至此今上怒已息乞留一言而歸又親率其臣六人乘舟至河中跽而乞曰烏拉國即上之國也幸勿盡焚糗糧叩首哀籲不巳太祖擐甲乘馬率貝勒大臣出衆軍前立馬河中水及馬腹乃諭責布占泰曰我昔擒汝於陳貸汝死贍養汝俾主烏拉國以三女妻汝許汝盟誓者七汝藐匆天地屢背誓言再侵吾所屬瑚爾哈路欲奪吾所聘葉赫女又以鳴鏑射吾女吾以女歸汝異國義當尊為國妃何得陵暴至此我愛新覺羅氏由上天降生事事順天命循天理數世以來遠近欽服從不被辱於人汝即不知百世以前事豈十世以來之事亦不知耶若我女有過汝宜告我無故𬒳辱他國且不受況我國乎古人云寧損其骨無損其名我非樂有此舉乃汝負恩悖亂是以聲罪致討耳布占泰對曰此必有人離間吾與上恩同父子今之不睦其語皆為傳布者誤也布占泰之臣拉布泰從旁率爾進言曰上既因此而怒何不遣使來問太祖責拉布泰曰我部下豈少汝輩人耶尚謂辱吾女為誣奪吾所聘女為妄言乎凡事未實則須問既實矣又何問焉此河無不冰之日吾兵無不再乘之理汝口雖利龍齒吾刃乎布占泰大懼止拉布泰勿言布占泰弟貝勒喀爾喀瑪請曰乞上寬宥賜一言而行太祖曰汝果無此事以汝子及大臣子為質始鑒汝誠不然吾不信也遂回營駐烏拉國五日還兵至烏拉河邊伊瑪呼山岡以木為城留兵千人守之癸丑年春正月太祖聞布占泰以其子綽啓鼐及十七臣之子送葉赫為質知其終不知悛改太祖乃親率大兵往征之時布占泰期於正月丙子送其子質葉赫而我兵先一日至攻取烏拉之遜扎塔克城督兵進克郭多鄂謨二城時布占泰率兵三萬越富勒哈城列營我統兵貝勒大臣皆欲戰太祖止之曰征伐大國豈能使之遽無孑遺乎仍以前言敕諭諸貝勒大臣時貝勒代善阿敏大臣費英東額亦都安費揚古揚古利何和里侍衛扈爾漢及諸將皆奮然曰我士飽馬騰利在速戰所慮者布占泰不出耳今彼兵既出平原曠野可一鼓擒也太祖曰我仰荷天眷自用兵以來雖遇徑敵無不單騎突陳斬將搴旗今日之役何難率爾等身先搏戰但恐貝勒諸大臣或有一二被傷實深惜之故欲計出萬全非有所懼而緩之也爾衆志既孚即可決戰因命取鎧胄被之貝勒大臣及諸將聞太祖言皆踴躍傳令軍士盡甲太祖遂定䇿諭軍士曰儻蒙天春佑破敵衆即乘勢奪門克其城毋使復入於是我軍前進布占泰率兵三萬由富勒哈城而來令軍士步行列陳以待兩軍距百步許我兵亦下馬步戰矢交發如雨呼聲動天太祖奮然挺身而入諸貝勒大臣率軍士鼓勇縱擊大敗烏拉兵十損其六七餘皆棄甲逃竄遂乘勢奪其門太祖登城西門樓坐城上悉樹我軍旗幟布占泰率敗兵不滿百人急還城下見我軍旗幟大驚而奔復遇貝勒代善率精兵邀擊之布占泰勢不能敵遂遁又損兵過半餘皆潰走布占泰僅以身免投葉赫國而去我軍獲馬匹甲胄器械無算盡收撫其所屬城邑駐軍十日大賚有功將士烏拉敗兵來歸者遂還其妻子僕從編户萬家其餘俘獲分給衆軍乃班師布延之族裔及滿泰布占泰之子孫授官職者甚衆後太祖遣使往葉赫令獻布占泰葉赫錦台什等不與太祖乃興師滅之詳見葉赫城注康熙三十七年有御製入烏拉境詩阿勒楚喀城在吉林城東北四百五十里舊城周二里南北二門為寧古塔邊界雍正三年設協領佐領防禦官兵駐此七年改建新城周三里乾隆二十一年增設副都統鎮守東至三姓界二百九十餘里西至白都訥界一百餘里南至吉林界六百七十里北至松花江北岸蒙古郭爾羅斯界一百餘里又城之南四里有古城城內有小城尚餘宫殿舊址不知建自何代白都訥城在吉林城西北五百二十五里舊名納爾渾又曰新城本朝康熙三十二年建高一丈二尺周七里門四東至阿勒楚喀界一百五十餘里西至松花江蒙古郭爾羅斯界二里南至吉林界三百餘里北至松花江蒙古郭爾羅斯界七十里康熙三十一年移吉林副都統駐此鎮守雍正五年設長寧縣屬奉天府乾隆二年改設州同十二年裁嘉慶十五年設同知巡檢等官琿春城在吉林城東南一千一百里琿春河東岸南與朝鮮接界皆庫雅拉等所居城周一里門四康熙五十三年修設協領等官駐防東至海二百八十里西至圖們江二十里南至海一百十里北至佛斯亨山一百二十里三姓城在吉林城東北九百三十六里東西數百里皆滿洲所居康熙五十三年編置佐領五十四年築城周五里濠深七尺設協領防禦管轄雍正七年增設副都統鎮守東至東海四千餘里西至阿勒楚喀界三百餘里南至吉林界三百里北至黑龍江界一百餘里又城西一百五十里瑚爾哈河西岸有西古城城南六十里瑚爾哈河東岸有東古城城北二里有北古城其基址半存皆莫詳創建何代長春廳原係蒙古郭爾羅斯扎薩克公地方嘉慶五年添設通判巡檢管理東至木石河一百九十里與松花江接界西至巴彥吉魯克山四十里與喀爾沁達爾罕王接界南至伊屯邊門八里與吉林接界北至紀家窩鋪一百七十二里與郭爾羅斯扎薩克公接界廳治無城又寬城子在廳北五十里設廢年無考海蘭河屯在寧古塔西北六十里海蘭河北岸有城周三里門四乾隆十九年有御製海蘭河屯詩博爾濟堡在吉林城北八十里周一百步門一二十家堡在吉林城北一百十里通志城周一里南門一雙城堡在阿勒楚喀境內嘉慶十九年設委協領等官駐防關郵法特哈邊門在吉林城北一百七十里一名巴延鄂佛羅由吉林至白都訥黑龍江之道也東北以額塞哩河為界自此設邊而西邊外皆蒙古所居伊屯邊門在吉林城西北二百八十里東距法特哈邊門一百七十七里舊設有官兵駐防雍正六年復增設佐領乾隆十九年有御製入伊屯邊門詩克爾素邊門在吉林城西北四百里東距伊屯邊門一百八十四里布爾德庫蘇巴爾罕邊門在吉林城西北五百里東距克爾素邊門一百五十里西至開原縣威遠堡邊界一百七十八里以上四邊門皆統於吉林將軍所轄東起吉林烏拉北西抵開原縣威遠堡邊門外遮羅奉天北境即所謂新邊也每門設防禦筆帖式各一員兵二十名額赫茂站在吉林城東南九十里又東南八十里至拉發站即額昔楚站又東南六十五里至圖依屯站即安巴多觀站過此八十里有伊克蘇小站又東南四十里至鄂摩和索羅站過此八十里有搭拉小站又東南六十里至畢爾罕畢喇站又東南六十里至沙蘭站又東南八十里至寧古塔以上七站自吉