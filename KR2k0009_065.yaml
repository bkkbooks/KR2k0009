賴全活者甚衆盜賊衰息賜書褒諭大臣議欲修復黄河故道䕫極言不可遂罷韓琦安陽人仁宗時以資政殿學士出知鄆州京東素多盜捕法以百日為三限限中不獲抵罪琦請獲他盜者聽比折除過故盜多獲又開水利便民趙槩虞城人仁宗時知鄆州吏按前守馮浩公使錢三十萬當以職田祖償槩知其貧為代以巳俸劉敞新喻人仁宗時知鄆州決訟獄明賞罰境内肅然客行壽張道中遺一囊錢人為守視客還取得之又有暮遺物道中者旦往訪之故在先是久旱地多蝗敞至而雨蝗出境龎籍城武人仁宗時知鄆州治以愛民為主明習法令長於吏事僚屬言有可取雖文書己行立為改易張奎臨濮人仁宗時知鄆州數月捕京東盜悉平奎治身有法度風力精强所至有治績人不敢欺李璋章懿皇太后從子知鄆州京東大盜白日殺縣令掠人道中璋信賞罰督擒捕盜為衰止歲天水民以船筏邀利多溺死璋一切籍之約所勝載如黄河法發卒城州西關修路數十里夾道植柳人指爲李公柳馬黙城武人知須城縣縣爲鄆州鄆吏犯法不可捕黙趨府杖之客次鄆守張方平素貴掾屬來前閉目不與語黙白事忽開目熟視乆之盡行其言委以事王克臣洛陽人熙寕中知鄆州京東多盗克臣請以便宜處決斬尤築者以狥盜少衰河決曹村克臣亟築隄城下或曰河去鄆遠且州徙高原八十年不知有水患安事此克臣不聽隄成水大至不没者纔尺餘復起甬道屬之東平王陵埽人得趨以避水事平皆繪像奉之許將閩人神宗時知鄆州上元張燈吏籍爲盜者繫獄將曰是絶其自新之路也悉縱遣之自是民無犯法囹圄皆空父老嘆曰自王沂公後五十六年始再見獄空耳鄆士喜聚謗官政將雖弗禁其俗自息杜紘鄄城人神宗時知鄆州有掲幟城隅著妖言期爲變州民皆震俄而草場白晝火蓋所揭一事也民益恐或請大索城中紘笑曰好計正在此冀因吾膠擾而發奈何墮其術中彼無能爲也無何獲盜按誅之喬執中高郵人神宗時爲須城主簿時河役大興部役者不得人一夕譟而潰因致大獄執中往代終帖然富民賂吏將剏橋所居以㒺市利執中疏其害使者入吏言使成之執中曰官可去橋不可剏也卒不能奪曾孝寛晉江人元豐中知鄆州鄆有孟子廟孝寛請於朝得封鄒國公配享孔子滕元發東陽人兩知鄆州學生食不給民有爭公田二十年不決者元發曰學無食而以良田飽頑民乎乃請以爲學田訟遂絶時淮南京東饑元發慮流民且至先度城外廢營地召諭富室使爲席屋一夕成二千五百間井竈皆具所全活五萬人亷公諤堂邑人爲萊蕪令專務德化百姓歌之曰釡中生塵魚境内安以樂昔聞范史雲今見亷公諤許幾貴溪人知鄆州梁山灤多盜皆漁者窟穴也幾籍十人爲保使晨出夕歸否則以告輒窮治無脱者李格非濟南人爲鄆州教授郡守以其貧欲使兼他官謝不可王靚知東平府襲慶守張漴使郡人詣闕奏請登封靚以京東歲凶多盜上疏誎執政不悦郭永元城人徽宗時爲東平府司録參軍府事無大小永咸決之吏有不能辨者私相靳曰爾非郭司録耶姚益恭知須城縣清白有才幹鞭扑不施境内大冶金梁肅奉聖州人大定中通檢東平大名兩路户籍物民稱平允他使者皆以苛刻增益為功百姓苦之朝廷勅諸路以東平大名通檢為準於是始定完顔守貞完顔部人章宗時知東平府事上諭之曰東平素號雄藩比年饑歉卿其為朕往綏撫之仍賜金帛廏馬以寵其行他日上問宰臣守貞治東平如何對曰亦不勞力上曰以彼之才治一路誠有餘矣雷淵渾源人至寕中為東平録事河朔重兵所在多驕將悍卒淵出入軍中偃然不為屈不數月閭巷間多畫淵像雖大將不敢以新進書生遇之㝷遷東阿令哈薩喇安禮大名路人至寕末為泰安州刺史貞祐初山東𬒳兵或勸其遁哈薩喇安禮曰我去城誰與守戰旬日城陷不屈死哈薩喇安禮舊作和速嘉安禮今改正蒙古喀明安人興定中知東平府事蒙古喀以東平重鎮奏乞益兵益都張林為亂侵掠東平蒙古喀討平之詔遷一階蒙古喀舊作蒙古綱明安舊作猛安今改正楊伯淵藁城人知泰安有惠政百姓刻石紀其事董積躬青城人為奉符令政平訟簡有古循吏風元嚴實長清人太宗時授東平路行軍萬戸約束諸將母敢有殺掠者㑹大飢民北徙者多餓死又法藏匿逃者保社皆坐逃亡無所託僵屍蔽野實命作糜粥盛置道旁全活者衆實卒遠近悲悼野哭巷祭旬月不已嚴忠濟實第二子襲東平路行軍萬户管民長官開府布政一法其父養老尊賢治為諸道第一嘗借貸於人代部民納逋賦歲久愈多及謝事債家執劵來徵帝命發内藏代償東平廟學故隘陋改卜高爽教養諸生後多顯者幕僚如宋子貞劉肅李昶徐世隆俱為名臣張晉亨南宫人太宗時權知東平事東平貢賊率倍他道迎送供億簿書獄訟日不暇給厯七年吏畏民安齊榮顯聊城人授東平路總管府参議時攻淮南道出東平民間供給費銀二萬錠榮顯詣斷事官愬之得折充賦税民賴以不困宋子貞長子人金末率衆歸東平行臺嚴實招致幕府用為詳議官兼提舉學校時饑民北徙子貞賑救全活萬餘人金士流寓者悉引見周給薦拔名儒四方聞風而至故東平一時人材多於他鎮太宗命為行臺右司郎中行臺所統五十餘城子貞命官分三道糾察官吏始有綱紀東平將校占民為部曲户謂之脚寨幾四百所子貞請罷歸州縣實卒子忠濟請於朝授叅議東平路事兼提舉太常禮樂子貞作新廟學招致生徒百餘人出粟贍之俾習經藝親臨程試齊魯儒風為之一變徐世隆西華人嚴實招致東平幕府勸實收養寒素實子忠濟以世隆為東平行臺經厯益贊忠濟興學養士姚樞柳城人世祖即位立十道宣撫使以樞使東平既至郡置勸農檢察二人以監之推物力以均賦役罷鐡官張德輝交城人世祖初遷東平路宣慰使春旱禱泰山而雨東平賦夥獄煩凡遇賊奸悉窮之不少貸奏免遠輸豆粟二十萬斛和糴十萬斛伯赫泰議賦繭絲令民税而後輸德輝曰是誣上以毒下也且後期之責孰任之遂罷其事孀婦馬氏將鬻其女以代納逋賦分已俸代償之仍蠲其額伯赫泰舊作寳合丁今改正塔塔爾泰控根郭瓦第三子至元中襲東平達魯噶齊涖官一紀鎮靜不擾塔塔爾泰舊作塔塔兒台控根郭瓦舊作孔温窟哇達魯噶齊舊作達魯花赤今俱改正茂漢至元中知肥城縣剏城垣興學宮先是民輸賦於府往返六百里道經鹹海夏月霖潦民多病涉乃立圍並庫於縣以從民便在任十八年民思之不能忘茂漢舊作抺漢今改正晉畢塔塔爾泰子至元十四年監東平多善政以清白稱嘗出家藏書二千餘卷置東平廟學使學徒講肄之晉畢舊作只必今改正圖卜申晉畢弟嗣兄職性淳靖喜怒不形知民疾苦而能以善道之旱嘗致禱即雨歲飢請於朝發廪賑之睦同僚興學校士民刻石紀績圖卜申舊作秃不申今改正宫欽東萊人至大二年爲東阿令以威嚴爲理剗除宿蠧均徭省賦邑當驛道供億百出欽與民爲假貸羔豚雞黍皆以便蓄養取用不乏山東大饑斗米百錢欽首出三年俸幣爲倡富民和之得錢二萬餘緡賴以全活者甚衆邑故有黠民工訟欽亷其人悉置之法皆化爲善良去十餘年吏民思之和道懐慶人延祐中尹萊蕪性嚴明不事脂韋勤課農桑招徠流移秩滿民立石頌之明黄哲番禺人洪武初知東阿縣縣經毛貴亂後民多流徙聞哲善政皆復業狼溪有物為怪數啖人哲為文禱於神風雷暴至有蛟死水上怪遂息六年升東平府通判疏決河於梁山㝷上疏忤㫖放歸復召回東平邵惲洪武時知新泰縣亷明平恕在任九年官無廢事邑無流民李得洪武時知萊蕪縣公亷勤幹治政有方秩滿民詣闕乞留在任十有五年而卒鄭華臨海人建文時貶東平吏目燕兵至長貳棄城走華率吏民固守城破不屈死貝秉彝上虞人永樂中知東阿縣邑東北地卑下乃開渠注大清河涸之得腴田千餘頃民有兄弟相訟者以大義曉之皆悔謝去嘗獻平糶議於朝為備荒計凡廢鐵敗皮朽索故紙悉貯之庫㑹車駕北巡勅有司建席殿並以濟用上嘉其治行加秩六品及卒囊無餘資吏民為具棺歛日㑹哭者數百人李湘泰和人永樂中知東平州州轄五縣地多荒蕪湘督民開墾公私皆實有所徵發必覈丁産厚薄及將去民訴於朝乞留有奸民誣以罪父老伏闕訟冤詔復官涖州十餘年上下親如父子葉祺溧水人知東阿縣正統間考最入都縣民羣列其善政遂留任王範開州人成化中知東平内官過境聞其姓名亟趨出境有不暇取廪給者以憂去服吏民復請於朝再知東平凡七年升福建僉事去之日州民泣送溢路何繼周閩縣人宏治間知萊蕪縣時旱蝗為災繼周引咎齋禱即時大雨滂沛蝗盡斃民以為誠德之感高嶼錦衣衞人正德間擢守泰安城先為劇盜劉六劉七等破嶼至擊走之追至玉兒莊斬賊首餘衆悉平熊驂固始人正徳間知萊蕪霸州賊攻城急驂率衆力戰而死城陷主簿韓塘亦死之劉瓚新鄉人正德間知新泰到縣三日流賊數萬騎􅊳至瓚悉力守城攻三日不克而去劉宗禮大名人嘉靖中知新泰清儉愛下居二年調延川且去猶令人治畦曰我留一分則民省一分也白棟榆林人隆慶中知東阿縣質直慈惠練於民情善綜細務凡徭役里甲催科之令有不便輒次第更改後皆奉為良法及去民建祠祀之謂之白公社郭子智遼東人崇禎十四年授平隂知縣土寇攻城城陷與教諭左欒死之吳汝宗龍巖人崇禎十五年知東阿縣城破死之本朝武士豪正定人順治五年知萊蕪縣時土寇竊發隣邑多不守而萊蕪獨完士豪保障之力也鍾國義山隂人康熙三年知莱蕪縣萊邑山城僻壤地非孔道後章邱縣欲以山徑通南路驛遞國義力持不可邑人稱之王育良正黄旗漢軍康熙二十八年知東阿縣邑當孔道驛中向不設車有事則里民按日輪值育良乃捐貲造車數十輛駕以驛馬令驛卒御之民以不擾又創行滾單革單頭包攬諸弊詳改淺閘夫為雇役百姓稱便後卒於官邱恩榮黄岡人乾隆三十年由萊蕪調泰安知縣仁明慈惠政簡刑輕擢吏部員外郎王溥山陽人乾隆四十年由冠縣調泰安知縣聽斷嚴明胥吏畏之越二載境内肅然張鳴鐸靜海人乾隆四十二年知泰安縣寛厚有容與前令得寛猛交濟之義邑人愛戴如慈母㝷以憂去士民涕泣送之人物漢高堂生平陽人著士禮十七篇言禮者咸宗之嬴公東平人從胡母生受公羊春秋守學不失師法為昭帝諫大夫授東海孟卿魯國眭孟毛莫如泰山人受易於琅邪魯伯官至常山太守栗豐泰山人受詩於河内食子公豐後為刺史㝠都泰山人受公羊春秋於頴川堂溪惠為丞相史又與琅邪筦路事顔安樂故顔氏復有筦㝠之學夏侯勝東平人少孤好學徵為博士光禄大夫㑹昌邑王嗣立數出勝諫曰天久隂不雨臣下有謀上者王縛以屬吏時霍光與張安世謀廢王以為泄語召問勝對言在洪範傳光安世大驚後光令勝用尚書授太后遷長信少府賜爵關内侯宣帝時為諫大夫給事中勝為人質樸守正帝親信之受詔撰尚書論語説賜黄金百斤年九十卒於官郭巨肥城人家貧父早逝事母苦甘㫖不繼有子方三歲慮其常分母食因與妻謀掘地欲埋之至尺餘得黄金一釜王章鉅平人累官諫大夫在朝廷名敢直言元帝初毁中書令石顯免官成帝立遷司隸校尉大臣貴戚敬憚之時王鳯輔政章言鳯不可任用宜更選忠賢遂為鳯所陷劉恭式人城陽景王章之後少習尚書通大義為赤眉所掠隨樊崇等降更始封式侯拜侍中赤眉欲殺更始恭為請不能得呼曰臣誠力竭請得先死拔劍欲自刎崇等共救止之謝禄縊殺更始恭夜往收藏其屍建武三年為更始報殺謝禄自繫獄赦不誅羊陟梁父人少清直遷冀州刺史奏案貪濁所在肅然三遷尚書令奏太尉張顥等公行貨賂不納又薦太尉劉寵等清亮在公帝嘉之拜陟河南尹㑹黨事起免官禁錮卒於家羊續平陽人祖父侵安帝時司隸校尉父儒桓帝時太常續以忠臣子孫累官廬江南陽二郡太守討平諸寇百姓歡服靈帝欲以為太尉時拜三公者皆輸東圍禮錢千萬令中使督之續舉緼𫀆示之曰臣之所資惟此而已遂不登公位而徴為太常㑹病卒鮑信泰山平陽人少有大節況毅有謀大將軍何進辟拜騎都尉董卓始至勸袁紹襲之不從乃歸鄉里收徒衆與弟韜以兵應曹操於已吾汴水之戰韜死之表信為濟北相與黄巾賊戰陷陣死王匡泰山人輕財好施以任俠聞初平元年為河内太守與袁紹起兵討卓胡母班泰山人名在八廚官執金吾山東兵起董卓遣使説觧紹等諸軍遂𬒳害王考夀張人官至冀州刺史名在八厨張邈夀張人少以俠聞振窮救急即傾家亦不甚惜士多歸之初辟公府以高第拜騎都尉遷陳留太守董卓之亂與曹操共舉義兵及袁紹為盟主有驕色邈正義責之後為曹操所害三國魏劉楨東平人太祖時辟為丞相掾文帝好文學楨與孔融陳琳王粲徐幹阮瑀應㻛為七子楨卒帝甚惜之鮑勛信子建安中為中庻子守正不撓太子恚望甚及即位勛數諫爭竟被誅勛内行既修亷而能施死之日家無餘財孫觀泰山人與臧霸俱起討黃巾拜騎都尉魏武使霸招觀並兄康皆厚遇之觀戰嘗先登征定青徐羣賊封吕都亭侯康亦封列侯觀從征孫權於濡湏口中創卒高堂隆高堂生後太祖召為軍議掾明帝在藩選為傳及即位累遷光禄勲帝增崇宫殿隆上疏切諫詔稱其亷侔伯夷直過史魚及卒帝嘆息曰天不欲吾成事高堂隆舎我去也吕安東平人有濟世志與嵇康友善毎一相思輒千里命駕後為兄巽誣安不孝康義不負心保明其事鍾㑹勸司馬昭因此除之殺安及康程昱東阿人黃巾起縣丞王度反應之昱率吏民擊度等破走東阿得全太祖征徐州使昱與荀或留守鄄城張邈等叛迎吕布郡縣響應惟鄄城范東阿不動袁紹在黎陽時昱有兵七百守鄄城太祖欲益以二千兵昱不肯曰袁紹擁十萬衆見昱兵少必䡖易不來攻若益兵過則不可不攻攻則必克徒兩損其勢太祖從之紹果不往昱收精兵數千人㑹黎陽討袁譚袁尚譚尚敗走魏國既建為衞尉文帝踐阼進封安鄉侯卒謚肅侯孫曉嘉平中為黄門侍郎時校事放橫曉上書諫遂罷校事官晉羊祜續孫累官尚書右僕射都督荆州諸軍事綏懷遠近甚得江漢之心與吳人開布大信吳人翕然悦服後入朝面陳伐吳之計舉杜預自代㝷卒南州人聞祜䘮莫不號慟吳守邊將士亦為之泣及吳平羣臣上夀帝執爵流涕曰此羊太傳之功也因䇿告祜廟羊琇泰山人渉學有知算少舉郡計㕘鎮西鍾㑹軍事會謀反琇正言苦諫還賜爵關内侯武帝未立為太子琇為畫䇿甚有匡救及踐阼累遷中䕶軍加散騎常侍劉卞須昌人為左衛率知賈后廢太子之謀甚憂之以計干張華而不見用益以不平賈后親黨微服聽察外間頗聞卞言乃遷卞為雍州刺史卞恐為賈后所誅遂飮藥卒魏浚東阿人寓居關中永嘉末與流人數百家東保河隂之硤石懐帝以為揚威將軍平陽太守及洛陽陷屯於洛北石梁塢撫養遺衆遠近感悦劉琨承制假浚河南尹劉曜忌浚得衆率軍圍之為曜所得死之族子該領其衆曜攻李矩該破之後漸飢敝曜寇日至單騎至南陽帝以為平北將軍雍州刺史王敦反該拒而不應蘇峻反率衆救臺􅌰於道羊曼祜兄孫少知名本州禮命太傅辟皆不就元帝以為丞相主簿委以機密厯晉陵太守以公事免時州里稱阮放郄鑒胡母輔之卞壸蔡謨阮孚劉綏及曼為兖州八伯蓋擬古之八俊也後蘇峻作亂曼勒衆不動為峻所害追贈太常胡母輔之班元孫少擅高名有知人之鑒王澄常稱爲後進領袖辟别駕太尉掾並不就以家貧求試守䌓昌令甚有能名元帝時累官揚武將軍羊鑒泰山人討蘇峻有功封豐城縣侯羊曇泰山人謝安之甥爲安所重安薨後輟樂彌年行不由西州路嘗因石頭大醉扶路唱樂不覺至州門左右白臼此西州門曇悲感不已以馬䇿叩扉誦曹子建詩曰生存華屋處零落歸山邱慟哭而去南北朝宋羊欣泰山人少靖黙無競於人泛覽經籍尤長隸書累官義興太守稱病免歸武帝文帝並恨不識之羊元保泰山人爲武帝鎮軍叅軍景平中累遷長史王宏甚知重之謂左長史庾登之吏部尚書王淮之曰卿二賢明美朗詣㑹悟多通然宏懿之量故當共推羊也入爲黄門郎𥙷宣城太守又厯丹陽尹㑹稽吳郡太守爲政雖無殊績而去後常令人思孝武即位爲金紫光禄大夫卒魏畢衆敬須昌人仕宋爲泰山太守後歸魏拜兗州刺史賜爵東平公徵還京師孝文賓禮舊老與高允引至方山甚相愛敬後乞還桑梓帝賜酒饌車馬勞遣之卒於兗州子元寶豪俠有武幹涉獵書史與父同建勲業賜爵須昌侯後拜兗州刺史父子相代為本州世以為榮子祖朽襲爵例降為伯官東豫州刺史清平有信百官稱之吕思禮夀張人舉秀才對䇿高第除相州功曹叅軍葛榮圍鄴思禮有守禦勲賜爵平陸縣伯文帝即位累遷都官尚書從擒竇泰進爵為侯思禮好學有才雖謀軍國而手不釋卷夜讀書令蒼頭執燭燭燼數升沙苑之捷命為露布食頃而成所為碑誄表頌並傳於世羊深琇七世孫父祉平北將軍深早有風尚學渉經史累官給事黄門侍郎以功賜爵新泰男莊帝踐阼除太府卿深處分軍國損益隨機頗有時譽弟偘為泰山太守外招梁寇深在彭城得偘書慨然流涕斬使並書表間帝褒其忠烈後為齊州刺史東魏軍討破之死於陣子肅以學尚知名羊敦深從弟性尚簡素學涉書史除給事中出為本州别駕厯廣平太守俱有能名卒於官從弟烈字信卿好讀書能言名理孝昌末從弟偘為泰山太守據郡起兵烈知其謀馳赴洛陽告難朝廷將加厚賞烈卒無所受天保中累遷尚書祠部左右户郎中在官咸為稱職厯陽平太守義州刺史以老還鄉卒烈家傳素業閨門修飭為世所稱北齊傅伏泰安人以戰功除東雍州刺史周克并州以伏子世寛來招伏曰事君有死無二此兒不忠不孝願即斬之後聞後主已被獲哭良久然後降周武親執手曰為臣當若此朕平齊惟見公一人以為岷州刺史㝷卒梁羊侃漢南陽太守續之裔也少而瑰瑋博涉書記尤好左氏春秋孫吳兵法弱冠隨父祉在梁州立戰功其父每有南歸之志侃至是將舉河濟以成先志大通三年至京師授徐州刺史徴太子左衞率車駕幸樂遊苑侃預宴時新造兩刃矟成高祖令試之侃執矟上馬左右擊刺特盡其妙高祖善之製武宴詩三十韻以示侃侃即席應詔高祖覽曰可謂鄒魯遺風英賢不絶侯景攻陷厯陽侃副宣城王都督城内諸軍事親自扺拒賊退加侍中軍師將軍初侃長子鷟為景所獲執來城下侃曰我傾宗報主猶恨不足豈復計此一子數日復持來因引弓射之賊感其忠義亦不之害卒贈侍中䕶軍將軍羊鵾侃子隨侃臺内城陷侯景待之甚厚及景敗鵾密圖之乃隨其東走景惟餘三舸下海欲向蒙山會景倦晝寢鵾語海師直向京口景覺大驚欲投水鵾以矟刺殺之世宗以為青州刺史封昌國縣公後征陸納平峽中破郭元建累遷東晉州刺史承聖三年為侯填所害時年二十八羊鴉仁泰山人少驍果有膽力普通中自魏歸國封廣晉縣侯征伐青齊間累有功績大同七年為北司州刺史侯景反鴉仁率所部入援臺城陷為景所留以為五兵尚書鴉仁常思奮發遂出奔江陵為北徐州刺史荀伯道諸子所害唐吕元膺東平人始遊京師謁故相齊映映嘆曰吾不及識婁郝殆斯人類乎䇿賢良高第調安邑尉厯為蘄州刺史元和中復刺同州既謝帝問時政得失論奏激切明日謂宰相曰元膺直氣讜言宜留左右進御史中丞俄拜東都留守東都有李師道留邸兵與山棚謀竊發事覺元膺擒破之改河中節度使時方鎮多姑息獨元膺秉正自將無不嚴憚入拜吏部侍郎正色立朝有台宰望居官始終無訾缺五代漢和凝須昌人唐天成中遷翰林學士知貢舉時進士多浮薄喜為諠譁以動主司每放榜則圍棘閉省門絶人出入以為常凝撤棘開門而士皆肅然無譁所取皆一時之秀厯晉仕漢拜太子太傅封魯國公周王朴東平人少舉進士世宗即位遷比部郎中獻平邊䇿世宗鋭意征伐朴言用兵之䇿謂江淮可先取世宗引與計議無不合世宗外事征伐而内修法度朴為人明敏多材知隂陽律厯之法莫不通焉世宗征淮朴留京師廣新城通道路多所規為至言諸國興滅次第後皆如其言及卒世宗親臨其䘮以玉斧叩地大慟宋趙鄰幾須城人太平興國中官左補闕知制誥時輩咸推服之常欲追補唐武宗以來實録孜孜訪求遺事㑹疾亟以書未成為恨淳化中太宗取其書得鄰幾所補㑹昌以來日厯二十六卷及文集三十四卷所著鯫子一卷六帝年畧一卷史氏懋官志五卷并他書五十餘卷竇益乾封人合居五六世有節行大中祥符初東封泰山即行在所降詔褒美優賜粟帛梁顥須城人初舉進士不中第雍熙三年復舉進士賜甲科知魚臺縣累遷右司諫真宗初獻聽政箴詔訪羣臣邊事顥上疏言用兵之道在乎明賞罰擇邊臣時論稱之顥每進對詞辨明敏真宗器賞之凡羣臣上封事者悉付顥詳閲可否拜翰林學士孫奭博平人徙居須城九經及第為國子監直講太宗幸國子監召奭講書賜五品服真宗詔百官轉對奭上十事大中祥符初得天書於承天門召問奭奭對曰臣愚所聞天何言哉豈有書也將祀汾隂奭上書諫有十不可天禧中朱能獻乾祐天書復上疏諫帝嘗令陳政事得失奭以納諫恕直輕徭薄歛四事為言頗施行焉仁宗朝累遷龍圖閣學士畫無逸圖上之奭性方重事親篤孝嘗掇五經切於治道者為經典徽言五十卷又撰崇祀録樂記圖五經節解五服制度嘗奉詔與邢昺杜鎬校定諸經正義莊子爾雅釋文考正尚書論語孝經爾雅謬誤及律音義穆修鄆州人真宗東封詔舉齊魯經術之士修預選賜進士出身累官潁州文學叅軍修性剛介人欲與交往往拒之宰相欲識修且將用為學官修終不往見母死自負櫬以葬自五代文敝宋初修與柳開始為古文士大夫稱能文者必曰穆叅軍慶厯中祖無擇訪得所著詩書序記誌等數十首集為三卷馬尋須城人舉毛詩學累判大理寺以明習法律稱終司農卿梁固顥子嘗著漢春秋大中祥符元年舉服勤詞學科擢甲第累遷著作郎直史館厯戸部判官判戸部勾院明於吏道嘗詔鞫獄時稱平審天禧大禮成奏頌甚工有集十卷梁適顥子固弟少孤嘗輯父遺文及所自著以進真宗曰梁顥有子矣仁宗時奉使陜西與范仲淹條邊機十餘事儂智高入寇移嫚書求邕桂節度帝將受其降適曰若爾嶺外非朝廷有矣乃遣狄青討之賊平帝曰向非適言南方安危未可知也後以太子太保致仕石介奉符人篤學有志尚樂善嫉惡遇事奮然敢為進士及第厯嘉州判官丁父母憂耕徂徠山下葬五世未葬者七十䘮以易教授於家魯人號介徂徠先生入為國子監直講從學者甚衆太學繇此益盛介嘗患文章之弊佛老為蠧著怪説又著唐鑑以戒姦臣宦官宫女指切當時無所諱忌杜衍韓琦薦擢太子中允㑹范仲淹富弼等同時執政歐陽修王素等並為諫官介喜作慶厯聖德詩所稱多一時名臣其言大姦盖斥夏竦也㝷出通判濮州未赴卒有徂徠集行於世郭勸湏城人仁宗時為侍御史諫郭后不當廢陳氏非世閥不可以儷宸極趙元昊襲父位以勸為官告使所遺百萬悉拒不受累遷侍讀學士及再為侍諫曰吾起諸生志不過郡守今年七十列侍從可以歸矣遂用元日拜章三上不得謝後二年卒子源明治平中為太常博士㑹御史知雜事吕誨等奏彈中書議追崇濮王典禮非是被黜以源明𥙷監察御史裏行源明乞免除命請追還誨等李叅須城人厯淮南京西陜西轉運使朝廷患邊費廣叅建議輦錢邊郡以平估糴省榷貨錢千萬計治平中知泰州蕃酋藥家族作亂討平之居鎮閲歲未嘗以邊事聞神宗知其才書姓名於殿柱以知永興軍不行卒叅剛果嚴深事至即決時稱能吏孫瑜奭子厯兩浙轉運使仁宗訪其家世謂曰卿孫奭子耶奭大儒也久以道輔朕因面賜金紫先是郡縣倉庾以斗斛大小為姦瑜奏均其制黜吏之無狀者厯知蔡州累官工部侍郎卒始奭亡朝廷録其子孫時瑜之子為諸孫長曰吾忍以父䘮而官吾子乎以兄之孤上之龔鼎臣須城人第進士官平陰主簿疏洩瀦水得良田數千頃以薦為泰寕軍節度掌書記石介死讒者謂介北走遼詔兖州劾狀鼎臣獨曰介豈有是願以闔門證其死厯知渠州擢起居舍人同知諫院在言路累歲濶畧細故至大事無所顧忌神宗即位以王安石不悦出知兖州諸道方田使者希功賞槩加舊籍以病民鼎臣獨一無所增留守南京時河決曹村流殍滿野鼎臣勞來振拊歸者不可勝計姜潛奉符人從孫復學春秋吳奎薦為韓王伴讀進謁宗正允弼吏引趨庭潛呼馬欲去遂以客禮見神宗召對延和殿訪以治道對曰有堯舜二典在顧陛下致之之道何如耳錢乙本吳越王俶支屬北遷鄆州父潁善醫東之海上乙方三歲母死姑嫁吕氏收養之及長告以家世即泣請迹尋積數歲迎父以歸時已三十矣鄉人感嘆賦詩咏之其事吕如父吕没無嗣為收葬行服乙以顱𩕄方著名擢太醫丞梁燾須城人哲宗朝為諫議大夫有請宣仁后御文德殿服衮冕受冊者燾率同列諫后欣納之文彦博議遣劉奉世使夏國御史張舜民論其不富遣降通判虢州燾言當還舜民以正國體章十上不聽出知潞州明年以左諫議大夫召上書願正綱紀明法度采用忠言講求仁術前宰相蔡確作詩怨謗燾與劉安世攻之確卒竄新州蔡京帥蜀燾曰元豐侍從惟京輕險貪愎不可用後以司馬光黨化州安置燾立朝以引援人物爲意作薦士録具載姓名其好賢樂士如此馬伸東平人紹聖四年進士崇寕初范致虛攻程頤爲邪說伸獨依頤門以學卒受中庸以歸靖康初以卓行薦擢監察御史汴京陷金人立張邦昌伸爲議狀乞存趙氏復請速迎康王同院無肯連名者伸獨持以往繳申尚書省高宗即位擢殿中侍御史朝廷方召孫覿謝克家伸奏覿克家趨操不正乃負國之賊宜加遠竄又疏言黄潛善汪伯彦同惡相濟望速罷其政柄責濮州監酒税時用事者以濮迫寇境故有是命趣使上道伸怡然襆被而行死道中天下識與不識皆冤痛之李迨東平人叅曾孫通判濟州高宗以大元帥過濟迨應辦軍需無缺會勸進乘輿儀物不日而辦上深歎賞金人歸三京命迨為京畿都轉運使孟庾時為權東京留守潛通北使且使人告迨曰北人以兵至矣迨曰吾家食禄二百年萬死不足報如果然吾將極罵以死告者悚然而去李亘乾封人為尚書郎建炎末金兵至淮南亘不及避劉豫使守大名因與淩唐佐密謀豫可取狀告於朝事泄坐死王質鄆人徙興國與九江王阮齊名著論五十篇言厯代君臣治亂謂之朴論中紹興三十年進士第為太學止時孝宗屢易相國論未定質上疏言和戰守之事天子心知質忠而忌者讒質年少好異論遂罷去虞允文當國孝宗命擬進諫官允文以質鯁亮不回且文學推重於時可右正言中貴人隂阻之奉祠山居絶意禄仕金王去非平隂人嘗就舉不得意即屏去督妻孥耕織以給伏臘家居教授束修有餘輒分惠人弟子班忱貧不能朝夕一女及笄去非為辦裝嫁之比隣有䘮忌東出西與北皆人居南則去非家去非壊蠶室使䘮南出遂得葬焉張萬公東阿人父彌學夢至一室牓曰張萬相公讀書堂已而萬公生因以名焉累遷郎中世宗稱其純直明昌中拜叅知政事厯知河中府㝷拜平章政事初有司建議自西南西北路沿臨潢逹泰州開築壕塹連年未就萬公言罷之為便主兵者又言屯田地寡願括民田之冒税者分給戰士萬公獨言其不可一日奏事帝曰卿言天乆隂晦由用人邪正不分然孰為小人萬公以張煒田櫟張嘉貞為言帝即命三人補外帝嘗有意春蒐顧視萬公萬公曰動何如靜帝改容而止黄久約須城人以翰林直學士授左諫議大夫爲賀宋生日副使道經宿泗見貢新枇杷子者州縣調民夫遞進還奏罷之㝷請老詔諭之曰卿忠直敢言未可便去左右遷太常卿仍兼諫職嘗侍朝故事宰相奏事則近臣退避久約欲趨出世宗止之自是諫臣不避以為常章宗即位乆約以國富民貧本輕末重任人太雜吏權太重官鹽價高坊場害民與夫選左右擇守令八事為獻皆嘉納之紀天錫泰安人早棄進士業學醫精於其技遂以名世集註難經五卷大定中上其書授醫學博士党懐英其先馮翊人父純睦泰安軍録事叅軍卒於官妻子不能歸因家焉大定第進士能屬文工篆籀當時稱爲第一厯翰林學士承㫖卒趙渢東平人大定中進士仕至禮部郎中性冲澹學道有所得尤工書自號黄山党懷英小篆李陽冰以來鮮有及者時人以渢配之號曰党趙有黄山集行於世高霖東平人大定中進士累遷國史院編修官建言黄河當疏其阨塞若開雞瓜河以殺其勢可免數埽之勞凡捲埽工物皆取於民大爲時病乞並河隄廣樹榆柳數年之後隄岸既固埽材亦便民力漸省朝廷從之至寕中厯兵部尚書叅知政事中都留守平章政事莫呢盡忠棄中都南奔霖死之莫呢舊作抺撚今改正侯摯東阿人累遷尚書右丞時紅襖賊爲亂詔摯行省事於東平權本路兵馬都總管興定元年濟南泰安滕兖等州土賊起摯討降之李全據密州摯督兵討復其城行省王汝霖謀結外應摯遣兵捕之并其黨皆就誅天興元年爲平章政事封蕭國公摯爲人威嚴御兵人莫敢犯在朝遇事敢言又喜薦士如張文舉雷淵麻九疇軰皆由摯進用南渡後宰執中人望最重元石珪新泰人宋徂徠先生守道裔孫金末兵戈四起珪率少壯負險自保後棄妻子歸元授光禄大夫領兵破曹州與金將連戰數晝夜糧絶援不至被擒金主壯其為人誘以名爵珪憤然曰吾身事大朝官至光禄復能授封他國耶金主怒殺於市怡然就死李昶須城人父世弼受孫明復春秋昶頴悟過人讀書如夙習興定二年初與父同登進士授温縣丞後為經厯以父憂去官杜門教授一時名士若李謙馬紹吳衍輩皆出其門世祖伐宋召問治國用兵之要疏對甚嘉納之明年即位召訪國事昶知無不言眷遇益隆世祖嘗燕處望見昶輒歛容曰李秀才至矣其見敬禮如此至元五年為吏部尚書凡議大政宰相延置上座傾聽其説嘗著春秋左氏遺意二十卷及孟氏權衡遺説五卷李謙東阿人與徐世隆孟祺閻復齊名而謙為首為東平教授無俸郡歛儒戸銀百兩備束脩謙辭曰家幸非甚貧者豈可聚貨以自殖乎召為應奉翰林文字遷太子左諭德侍𥙿宗於東宫陳十事曰正心睦親崇儉幾諫戢兵親賢尚文定律正名革弊又傳成宗於潛邸世祖深加噐重以足疾辭歸成宗即位升學士復引疾還家仁宗即位召見於行在疏言九事謙文章醇厚學者宗之號野齋先生王閏須城人父性乖戾閏左右承順甚得其歡心父嘗卧疾夜燃長明燈室中火延籬壁間閏聞火聲驚起馳救火已熾煙焰蔽寢户閏􅊳入火中解衣蒙父抱而出肌體灼爛而父無少傷一女不能救遂焚死王構東平人父公淵遭金末之亂其兄三人挈家南奔公淵獨誓守死墳墓卒得存其家而三兄不知所終構少頴悟風度凝厚學問該博至元十一年授翰林國史院編修官時遣丞相巴顔伐宋先下詔讓之命構屬草以進世祖大悦成宗立為學士叅議中書省事時有請搜括田賦者構與平章何榮祖力言其不可得不行武宗即位召拜翰林學士承㫖卒構厯事三朝練習典故凡謚冊之文皆所撰定朝廷每有大議必咨訪焉喜薦引寒士所辟數十人皆有名於時巴顔舊作伯顔今改正耶律有尚家東平受業許衡之門稱高第弟子其學邃於性理而尤以誠為本儀容詞令動中規矩至元八年衡兼國子祭酒奏以門人十二為齋長有尚其一也衡還鄉里朝廷以有尚等爲助教嗣領其學亊及有尚去而國學事頗廢廷議爲非有尚無足以繼衡者累遷國子祭酒以親老辭歸大德中復兩爲國子祭酒前後五居國學其教法一遵衡之舊而勤謹有加焉身爲學者師表數十年海内宗之卒謚文正李之紹平隂人從李謙學家貧教授鄉里學者咸集至元中以薦授翰林國史院編修官直學士姚燧欲試其才凡翰林應酬之文積十餘事併付之之紹援筆立成大德中丁母憂累起復終不能奪延祐三年升國子祭酒夙夜孜孜以教育人材爲心累升翰林侍講學士告老歸之紹自以其性優游少斷故號果齋以自勵明王彬東平人洪武進士建文中爲衘史巡視江淮燕兵至彬與指揮崇剛共守揚州時指揮王禮潛議舉城迎降彬執繫獄晝夜固守㑹燕人射書城中言縛彬獻者官三品千戸徐政張勝遂執彬以降不屈死師逵東阿人太祖時授御史擢陜西按察使獄繫囚數千逵至閲牘訊鞫旬月而盡成祖北征以逵督運逵以道路遥逺奏設頓舍令民以次遞輓營建北京遣逵采木湖湘凡八年仁宗即位召爲戸部尚書兼掌吏部逵亷潔自持成祖嘗論扈從北來大臣不貪者帷逵一人張本東阿人洪武時由國子生爲江都知縣永樂中累遷工部侍郎坐事謫交阯布政司使起爲刑部侍郎仁宗即位進南京兵部尚書兼掌都察院事宣德初復兼太子賓客本厯仕三朝亷介有守奉公不撓爲上所信成祖嘗宴近臣各設銀器一案因以賜之至本前獨設陶器謂曰卿號窮張銀器不知用也張翼泰安人永樂中由諸生貢入國學父母殁皆廬墓三年有慈烏數百亘夕飛鳴墓樹事聞旌表趙讓肥城人家貧㓜孤事母至孝母終廬於墓側虎夜至讓但悲泣虎避去有刼入廬感其孝以百錢遺之永樂中詔旌其門王福延平陰人事親以孝聞母殁既葬夜宿墓廬晝歸奉父及繼母殁並廬墓三年正統中詔旌其門張琛東平人正統間爲衢州府同知父殁廬墓三年有巨蛇馴擾之異官至福建左布政使劉田東阿人父約爲河南叅政忤劉瑾罷歸田中宏治進士授元氏知縣中官劉瑾遣其下至縣坐傳舍趣召縣令田至怒其不起立即命吏執送獄曰若至此奉何詔㫖求解乃得去民間獲白兔送縣丞以下皆來賀謂當奏聞田因留置酒即炙􅊵噉之正德時命督江南漕運軍人需索之弊一切禁絶弟隅登嘉靖進士博學有文由御史厯官巡撫所至稱職劉源清東平人正徳進士知江西進賢縣宸濠反源清以縣當孔道日規戰守計嘗積薪環室戒家人曰事急即火母汚於賊宸濠遣其黨以兵出縣境源清募死士二百人繞出其後擒二人戮之及宸濠以檄至縣源清立斬其使累遷兵部左侍郎總督宣大軍務侍郎黄綰以蜚語中傷逮繫獄乆之罷歸于愼行東阿人隆慶進士官修撰神宗嘗大書責難陳善四字賜之張居正奪情慎行偕同官具疏諫吕調陽沮之不得上㝷引疾歸起為左諭徳時居正巳卒有詔籍其家慎行乃貽書尚書邱橓言居正母老諸子覆巢遺卵宜推明主惟蓋之思全大臣簪履之誼舉朝義之㝷拜禮部尚書上疏力請建儲不報自劾罷歸後詔以原官兼東閣大學士俄得疾草遺疏勸帝親大臣録遺佚補言官慎行貫穿百家學有原委北人居詞館者推為冠冕卒謚文定著有穀城山房全集讀史漫録筆麈史摘若干卷行於世孟一脈東阿人隆慶進士擢御史時因覃恩請還鄒元標傅應楨艾穆沈思孝諸人於戍所張居正惡之奪其職後復起為御史疏陳五亊以切直忤㫖謫建昌推官累遷右僉都御史巡撫南贛李汝桂泰安人父欽貢士有高致年百歲汝桂少篤志聖學刻苦敦行三為學官著教言講餘録年八十卒學者稱曰還樸先生宋燾泰安人萬厯進士自庻吉士授御史按應天諸府疏斥首輔朱𢋫坐謫旋請假歸卒於家天啓間以鄒元標言贈光禄少卿吳暐萊蕪人萬厯進士初仕歸徳推官以毅直觸巡按御史怒被劾厯官肅州兵備副使敕將領一切支收勿得裁扣軍中懽呼兵民安堵又升大同分巡忤大璫遂為所中解組歸譚性教萊蕪人萬厯進士授陳留令遷襄城令多異政時魏璫熾燄性教所治之地獨無璫祠人重其節概引疾歸軍民遮留泣送者數萬人元之偉萊蕪人天啓進士厯知河問府收養山東難婦一百餘口悉給資費歸里升陽和兵備李自成渡河脅降不從遂遇害本朝乾隆四十一年賜謚節愍本朝程際雲平隂人順治戊子拔貢當甲申乙酉時嘗奉二親避亂茌平及城陷倉皇負母渉濠水深没頂際雲常覺足下有物支柱既得濟視前後者皆不免人以為孝感所致康熙元年授順德通判㝷遷梧州府同知以道遠不能迎養遂辭不往父母終年俱九十餘服闋擢補石阡知府卒於官孫光祀平陰人順治乙未進士好讀書尚氣節在諫垣二十餘疏所陳皆切要有不下部議而直施行者累遷兵部侍郎乞休歸里值歲大祲出栗五百石以賑全活甚衆睦族周貧孜孜為善邑人多稱述焉趙國麟泰安人康熙丙戍進士授長垣知縣攝内黃篆時邑中大饑國麟先發倉粟賑之復值河決潰隄逼長垣城國麟率吏堵築並縛筏垂絙以拯溺者計口授居後乃捐金築隄又請起太行隄百餘里開支河數道由是長垣無水患累遷至福建布政使閩中舊俗有女未嫁而夫死則縛綵為層屋至期女登就縊國麟疏其事禁戢之由安徽巡撫内擢尚書㝷授文淵閣大學士未幾因事罷歸復賜尚書職銜以疾卒國麟潛心宋五子書嘗設青巖義社於泰山之麓著有文統類編學庸困知録與點集雲月硯軒藏稿行世王者臣東平人州庠生性孝友家非素豐而樂施予嘗於里内捐設義學以教閭黨貧家子弟籍以成就者甚夥卒祀鄉賢張布萊蕪人㓜喜讀書以父老丁繁乃棄學經營撫弟極友愛弟卒視其子女逾於巳所出嫁娶必先之歲饑焚千金之劵復捐貲助賑鄉里咸稱其德流寓漢蔡邕陳留圉人忤中常侍王甫弟王智密告邕謗訕邕慮卒不免乃亡命往來依泰山羊氏積十二年晉張忠中山人永嘉之亂隱於泰山恬靜寡欲清虚服氣餐芝餌石修導飬之法苻堅遣使徵之至即乞還卒謚安道先生宋孫復平陽人舉進士不第退居泰山學春秋著尊王發微十二篇山東自石介而下皆執弟子禮稱為泰山先生馬黙城武人家貧徒步詣徂徠從石介學諸生時以百數一旦出其上既而將歸介語諸生曰馬君他日必為名臣宜送之山下元王磐永年人東平總管嚴實興學養士迎磐為師受業者常數百人後多為名士中統初李璮以禮延致之及璮謀不軌磐馳入京師以聞璮平遂挈妻子至東平後以資徳大夫致仕帝命其壻李穉賔為判官以便養孟祺符離人侍父徙居東平至元中累官嘉興路總管以疾歸東平卒謚文襄閻復其先和州人家於高唐弱冠入東平學時嚴實領東平行臺招諸生肄業迎元好問考試其文預選者四人復為首徐䎦李謙孟祺次之官至平章政事列女漢王章妻女初章為諸生學長安獨與妻居章疾病無被卧牛衣中與妻決涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰逾仲卿不自激昻乃反涕泣何鄙也及為京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時也書上章下廷尉妻子皆收繫章小女年可十二夜起號泣曰平日獄上呼囚數常至九今八而止我父素剛先死者必父明日問之章果死晉羊耽妻辛氏字憲英魏侍中毗之女也聰明有才鑒鍾會伐蜀憲英以㑹縦恣知其必反會請其子琇爲叅軍誡之日軍旅之間可以齊者其爲仁恕乎及蜀滅㑹果反琇竟得全耽從子祜嘗送錦被憲英嫌其華反而覆之其明鑒儉約如此唐趙氏女萊蕪人唐末兵起同嫂避兵時大旱行久而渴人餽漿水其嫂飲之女不受覆於溝中遂渴死至今溝水如白漿因名漿水溝宋馮賢妃東平人九嵅入宫及長得侍仁宗生邢魯國二公主封始平郡君帝將進其品力辭不拜養女林美人得幸神宗生二王而殁王尚㓜妃保育如已子累加才人媫妤修容在禁廷幾六十載始終五朝勤修禮度卒贈賢妃徐順妻彭氏東平人早寡不忍獨生以死從夫事聞命褒表元郭三妻楊氏須城人亊舅姑以孝閒夫死戍所母欲奪嫁之氏號慟自誓乃己久之夫骨還舅曰新婦年少終必他適可令吾子鰥處地下耶將求里人亡女骨合瘞之氏聞益悲不食五日自經死合葬焉明鄭氏東平人少寡守志割體内療姑病袁亨妻翟氏肥城人年二十一正德時爲賊所掠翟大呼曰快殺我誓不見汚賊怒知不可强斷其左臂身卧地罵不絶口剖腹而死張繩武妻李氏萊蕪人進士張嚴之母也崇禎間攜㓜女避兵為兵所執李曰吾家世清白惟有死耳詞色俱厲兵殺之其女抱母屍吮血拭面痛絶復甦賊又迫之女曰焉有母死而子存者兵怒亦殺之後十年賊又至嚴妻朱氏遇賊掠之馬上朱號哭曰昔日吾姑死於兵吾小姑亦死於兵吾苟偷生何以見死者於地下賊怒斷其首時謂一門三烈劉馴妻徐氏東阿人正徳六年流賊楊虎率衆過其村執徐以去行里許見道旁有井紿賊緩縳投井死董善妻周氏東阿人流賊至逼上馬氏大罵賊怒斷其首懸樹上同縣仝自明妻王氏賊欲汚之王忿罵賊以刀剖其腹而去本朝張氏女泰安人年十七守正捐軀劉士俊妻冀氏新泰人順治初為山賊所掠罵賊而死同縣趙宗實妻尹氏守正捐軀王鳯翔妻曹氏趙自亨妻李氏俱遇賊不屈而死韓必宣妻趙氏萊蕪人順治五年為土賊所掠大罵𬒳殺同縣孫慶錫妻張氏遇賊不辱死亓甸妻王氏萊蕪人于歸二年夫死子方襁褓王號哭不食或勸以撫孤未幾子又死一日户不啓鄰婦疑而視之則北面自縊於中庭旁列自製衣衾含殮之具時年二十二牛漢華妻任氏東平人夫亡撫孤守節七十年卒年九十五歲張銑妻劉氏東平人夫亡自縊卜鏡妻王氏東阿人順治初土寇掠氏引弓脅之罵賊甚厲中五矢而亡蘇魁吾妻吳氏泰安人順治八年土寇攻掠泰安吳抱㓜子逃難為賊所逼不從賊先刺其子氏守正捐軀同縣張永年女順治初年為土寇所掠不辱罵賊死節婦于光先妻周氏楊淳妻宋氏楊大任妻宋氏均康熙年間旌陳標妻趙氏新泰人順治初年土宼未靖氏被據罵賊求死賊痛加鞭笞氏罵愈厲一賊哭出刺之棄屍道旁後葬於裹城頭同縣烈女郭氏李大聘妻陳氏烈婦傅上宏妻禇氏管成章妻姜氏牛祚隆妾閻氏均康熙年間旌張來妻孫氏萊蕪人遇暴不從𬒳殺同縣亓名儒繼妻田氏夫亡遺孤未幾月前妻二子皆㓜而姑又年老氏忍死守節均康熙年間旌房拱乾妻王氏東阿人拱乾死子崙方四齡氏守節教子補博士弟子員崙繼殁與媳賀氏撫孫天成入學食餼天成又殁與孫媳龎氏撫曾孫壘成立三世節孝同縣魏嗣徽妻雷氏劉㴒妻賈氏張守亷妻楊氏與子文芳妻薛氏均康熙年間旌張近方妻秦氏平隆人夫死絶粒五十四日殁同縣烈婦孫嗣亷妻高氏生員孫如楫妻于氏田如墉妻仇氏趙文烜妻劉氏生員程九萬妻張氏均康熙年間旌王吉士妻趙氏肥城人夫亡守節同縣孫嘉印妻趙氏田擴先妻杜氏王昌基妻孔氏張壆妻張氏王慎倫妻邊氏與子繼周妻龔氏王沛妻王氏趙光天妻李氏方夣祥妻羅氏陳大法妻馮氏鹿熾妻張氏鹿烺妻趙氏均雍正年間旌殷士超妻張氏東阿人夫亡守節同縣秦潢妻張氏秦烜繼妻房氏張元蔚妻陸氏張鵬雲棄妻劉氏均雍正年間旌陳氏女泰安人陳廷玉女守正捐軀同縣節婦劉芬妻聶氏杜大本妻劉氏劉英符妻梁氏王勤妻梁氏徐標妻張氏楊大濤妻劉氏楊文集妻周氏劉夫漢妻郝氏趙大昌妻張氏房寀妻劉氏與子星景妻陳氏劉宗鈐妻張氏崔士奇妻武氏烈婦安銜妾顔氏張欽妾孫氏均乾隆年間旌尹永連妻孫氏肥城人年十九夫殁母欲令他適孫指遺孤泣曰吾奚忍負尹氏因齩一指自誓鄉人指為九指婦一夕有盜入其室聞空中叱曰奈何入節婦宅盜驚逸去同縣烈婦胡吉士妻隂氏柳輝瑕妻王氏均乾隆年間旌李夢箸妻江氏肥城人夫亡守節同縣路祥妻趙氏李慎心妻劉氏李進儒妻段氏魏成魁妻王氏李桂林妻張氏尹記妻趙氏趙遐齡妻張氏尹汝著妻王氏均乾隆年間旌朱大峯妻魏氏萊蕪人夫死子方彌月氏欲託孤於伯氏捐軀以從伯氏曰死易立孤難獨不念吾弟之乏嗣乎因遣之母家未幾子又殤以腰絰自經同縣烈婦王應蛟妻李氏徐興妻韓氏節婦景遷妻李氏郭易簡妻韓氏均乾隆年間旌李守富妻張氏東平人守正捐軀同州烈婦劉芳煒妻卜氏單用賓繼妻張氏孟淑壯妻宋氏孟貞教妻劉氏郭岑妻巴氏陳詵妻李氏楊永祚妻王氏盧松妻宋氏孫國珍妻張氏楊煊妻侯氏李居詢妻王氏張子恭妻李氏張子謙妻蕭氏韓呈喜妻李氏王宸遊妻吕氏劉芳剛妻楊氏趙建鉁妻王氏王毓伾妻張氏吕擢廷聘妻吕氏李祖堯妻張氏李瑞妻王氏喬大岳妻梁氏林曰琦妻李氏趙坤妻徐氏康序妻成氏均乾隆年間旌師興棠妻李氏東阿人夫亡守節同縣李汝津妻馬氏欒得妻李氏均乾隆年間旌葉湑妻邱氏平隂人夫亡守節同縣趙程鵬妻尹氏李瑞妻吕氏趙運祥妻李氏尹士恒妻孔氏丁貴常妻高氏何兆行妻王氏均乾隆年間旌李氏女泰安人李成女守正捐軀同縣節婦蕭子景妻王氏蕭懐濱妻劉氏李龍觀妻趙氏馬國泰妻谷氏孫言稭妻張氏張吉仁妻丁氏孫交妻李氏妾王氏王大盛聘妻吕氏張芹妻王氏均嘉慶年間旌錢二妻何氏肥城人遇暴不從捐軀明志同縣烈婦李全妻史氏張民德妻李氏節婦隂蒼輔妻丁氏隂文德妻尹氏朱其錡妻胡氏王希妻欒氏路俸文妻胡氏均嘉慶年間旌張泗濱妻楊氏萊蕪人夫亡守節同縣狄佩來妻秦氏吕士英妻田氏吳文太妻吕氏陳士陵妻倪氏均嘉慶年間旌袁永貞繼妻郭氏東平人夫亡守節同州張崇勲妻井氏范俊妻李氏趙建白妻李氏劉銘妻杜氏程林妻孟氏康序妻成氏趙坤妻徐氏劉吉聖妻牛氏王炳妻李氏王毓桂妻孫氏竇文涵妻潘氏侯滋芳妻陸氏李兆妻續氏均嘉慶年間旌高楷妻周氏東阿人夫亡守節同縣張藹妻張氏賈治修妻龎氏張繼先妻秦氏劉牛氏均嘉慶年間旌秦王氏平陰人夫亡守節同縣田何氏張孫氏魏張氏均嘉慶年間旌仙釋漢泰山老人不知姓名武帝東巡見老翁於道頭上白光高數尺􅏜而問之對曰臣年八十五時衰老垂死遇有道者教臣絶穀但服食飲水并作神枕法臣行之轉老為少黑髪更生齒落復出今年百八十歲矣帝受其方賜玉帛老父後入泰山每十年五年時還鄉里三百餘年乃不復還矣土産元石石鍾乳俱泰安出蒼术桔梗明統志俱新泰縣出繭綢舊志萊蕪縣出繒縑出東阿縣水經注東阿出佳繒縑唐書地理志鄆州土貢絹阿膠出東阿縣禹貢傳東阿濟水所經水經注阿城北門内西側臯上有井其巨若輪深六丈歲嘗煮膠以貢天府宋史地理志東平府貢阿膠今井在東阿舊縣西取其水煮黑驢皮爲膠治血症掛劍草出東阿縣徐君墓葉如員劍服之已人心疾全蠍出平隂縣蠍凡九節生城東山中服之已人風疾縣以入貢按舊志引唐書地理志鄆州土貢防風宋史地理志襲慶府貢紫石英明通志萊蕪縣出銅鐵舊有冶今廢謹附記提調官前總纂臣鄭紹謀恭纂并覆輯校對官臣潘斌恭校
