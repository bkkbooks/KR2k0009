front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_065-1a}
body:
  text: 沂州府二名宦漢汲黯濮陽人武帝時遷東海太守黯學黃老言治官民好清靜擇丞史任之責大指而巳不細苛黯多病卧閤内不出歲餘東海大治尹翁歸河東平陽人宣帝時拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人與語终日不敢使見既去謂邑子曰此賢不可干以私翁歸治東海明察吏民皆改行自新東海大豪郯許仲孫為奸猾亂吏治郡中苦之二千石欲捕者輒以力勢變詐自解翁歸至論棄仲孫市一郡怖栗東海大治以高等入守右扶風祭彤潁陽人建武中遷襄賁令襄賁盜賊公行彤至誅破奸猾殄其支黨數年政清増秩一等宋均安衆人永平初遷東海相在郡五年坐法免官吏民思均恩化為之作歌詣闕乞留者數千人黃浮汝南人桓帝時為東海相時中常侍徐璜弟宣為下邳令恣行暴虐浮收宣家屬無少長悉考之掾史固諫浮曰徐宣國賊今日殺之明日坐死足以暝目矣即按宣罪棄市暴其尸以示百姓郡中震慓浮坐髠鉗輸左校趙咨東郡燕人延禧中拜東海相在官清簡計日受俸豪黨畏其儉節視事三年以病自乞徴拜議郎三國魏胡質夀春人黃初中任東莞太守在郡九年吏民便安將士用命晉王承晉陽人永寕中遷東海太守政尚清靜不爲細察有盜池中魚者綱紀推之承曰文王之囿與衆共之池魚復何足惜耶有犯夜者爲吏所拘問其故答曰從師受書不覺日暮承曰鞭撻甯越以立威名非政化之本使吏送令歸家諸葛恢陽都人元帝時爲即邱長轉臨沂令爲政和平南北朝周豆盧通徒河人大象中爲北徐州刺史尉遲迴作逆遣其所署莒州刺史烏丸尼率衆來攻通逆擊殺之唐高智周晉陵人永徽間費令與丞尉均取俸民安其化刻石頌美五代梁徐懷玉焦夷人從大祖征討遷沂州刺史屬歲屢豐乃繕兵治壁爲戰守具已而王師範叛擾梁東境懷玉屢以州兵擊破之唐張廷藴襄邑人明宗時為沂州刺史廷藴素廉卒之日家無餘貲晉郭瓊盧龍人開運中沂州刺史時盜賊蠭起瓊單騎赴郡賊聞其威名相率遁去周張暉大城人廣順中為沂州刺史三年吏民詣闕奏留宋戚綸楚邱人太平興國中為沂水主簿按版籍得逋户脱户漏租者甚衆孫奭博平人雍熙中為莒縣主簿上書願試講説遷大理評事趙德彝秦王廷羙子年十九判沂州飛蝗入境吏民請坎瘞火焚之德彝曰上天降災官臣之罪乃責躬引咎齋戒致禱既而蝗自殪儒生乙恕郊居肄業有尸橫舍下所司捕恕抵獄德彝疑其冤令緩刑未㡬果獲殺人者恕遂得釋淳化初改封廣平郡公部民詣闕乞留有詔嘉獎張燾臨濮人知沂州沂產布濰產絹而有司科賦相反燾始革之向綜河内人知沂州沂阻山多盜綜請用重法繩禁歳斷大辟減半性寛裕善治劇獨於奸惡不少恕金李偲安喜人大定中沂州防禦使沂南邊郡户部符借民間田種禾取藁秸備警急用度偲曰如此則農夫失業具奏止之轉運司牒郡輸粟胊山調急夫數萬人時久雨泥濘輓運不能前進偲遣吏往胊山刺取其官廪見儲糧數可支半歲即具其事牒運司請緩期民便之鈕瑚魯舍音正定府路烏珠克明安人明昌中為臨沂令有不逞輩五百人結為黨社大擾境内舍音下車其黨散去蝗起莒密間獨不入臨沂境先是朝廷括河朔山東地隱匿者没入官告者給賞莒州刺史教其奴告臨沂人冒地積賞錢三百萬先給官鏹乃徴於民民甚苦之舍音列其冤狀白州州不為理即聞於户部而徴還之流民歸業縣人勒其事於石鈕瑚魯舍音舊作女奚烈守愚烏珠克明安舊作吾直克猛安今俱改正完顔伯嘉北京路翁鄂洛必拉明安人章宗時莒州刺史讞屬縣盜伯嘉曰饑寒為盜得錢二千何經月不使一錢此必官兵捕他盜不獲誣以準罪耳詰之果然翁鄂洛必拉明安舊作訛魯古必刺猛安今改正燕安宣宗時為莒州提控守天勝寨紅襖賊五公喜襲據沂州安擊走之遂復沂州興定四年封東莒公益都府路皆隸焉五年與䝉古喀王庭王保全束平以功遷金紫光祿大夫還天勝戰死䝉古喀舊作䝉古綱今改正元董文炳藁城人至元中改山東統軍副使治沂州沂與宋接境鎮兵仰内郡餉運有詔和糴本部文炳命收州縣所移文衆諫以違詔文炳曰但止之乃遣使入奏帝悟罷之明牟魯烏程人洪武初為莒州同知青州民孫古朴等為亂襲州城執魯欲降之魯曉以禍福賊擁至城南鄒家莊魯大罵賊遂殺之詔恤其家李錫武進人正德中知沂州時流賊犯境圍城數日人心震懼錫廣設方畧談笑鎮之乘夜選輕騎斫其營斬數百級賊遂遁去唐龍蘭溪人正德間知郯城縣縣當孔道荒敝甚龍竭力撫循民用不困大盜劉六等起龍率衆固守僮僕多戰死城卒以全俞青正德中為日照縣典史流賊攻城率衆禦之殁於陣馮舜田蒲州人嘉靖中知日照縣居官愛民不畏強禦樂安劇賊數百騎薄城未成列舜田命善射者射之繼以虎尾礮斃數十人賊遂退黄燆延平人嘉靖中知蒙陰縣歲大饑燆請發賑陳便宜十事全活萬計萊蕪李彦清乘機為亂燆率鄉兵擊破之楊果陽曲人萬厯初知費縣地荒民散果招撫復業鄰近饑民皆就食焉晉承眷洪洞人萬厯中知沂州案牘清理與平白蓮賊在任九年政績懋著侯國安雄縣人萬厯中知莒州招集流亡給以牛種復業者甚衆行均丈法令民自輸納積弊悉除杜洽任邱人萬厯中知䝉陰縣廉明多異政臨朐以採礦致亂據山以拒官軍洽聞亂單騎往諭衆皆稽首聽命臨胊人立祠祀之金三聘順天人崇禎末知郯城縣流賊陷城死之景淑範蘭州人崇禎末知莒州城陷死之時訓導李重華亦死於難葉爚漢中人崇禎末知䝉陰縣城陷死之本朝夏成德遼東人順治初山寇未平成德以總兵來鎮沂州時以太義諭將校因是士皆奮勇盜賊漸平沂民於是不苦于兵卒祀名宦祠崔崶長垣人順治丙戌進士知蒙陰縣值土賊丁明吾陷城罵賊死祀名宦祠人物漢澓中翁東海人嘗授詩於漢宣帝于公郯人為縣獄吏郡決曹決獄平罹文法者于公所決皆不恨郡中為之立生祠東海有孝婦少寡亡子養姑甚謹其後姑死姑女告婦殺姑吏具獄上府于公爭之弗得辭疾去太守竟殺孝婦郡中枯旱三年後太守至于公具言其故於是祭表其墓天立大雨始于公門閭壞父老方治之公曰少高大令容駟馬高葢車我治獄多陰德子孫必有興者後于定國為丞相封侯傳世云于定國于公子以才高舉侍御史遷中丞宣帝時超為廷尉定國為人謙恭尤重經術士雖卑賤恩敬甚備其決獄平法務加審慎之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以不冤甘露中為丞相封西平侯永光初乞骸骨歸第數歲卒子永折節修行居䘮如禮以孝行聞官至御史大夫后蒼郯人事夏侯始昌通詩禮宣帝時為博士官至少府授翼奉蕭望之匡衡衡授琅邪師丹伏理斿君由是齊詩有翼匡師伏之學又從東海孟卿受禮説禮數萬言號日后蒼曲臺記授梁戴德戴聖慶普由是禮有大戴小戴慶氏之學雅琴師氏東海人師曠後著雅琴八篇髪福東海人受詩淄州長孫順至大官徒衆甚盛薛宣郯人舉茂才為冤句令大將軍王鳳聞其能薦為長安令以明習文法詔補御史中丞數言政事便宜舉奏刺史郡國二千石白黑分明由是知名尋為御史大夫代張禹為丞相封高陽侯坐事免又徵復舊職任政數年罷歸衞宏東海人從九江謝曼卿受毛詩作詩序後從大司空杜林受古文尚書作訓㫖光武以為議郎劉洪蒙陰人魯王宗室也篤信好學善算當世無偶觀六藝羣書意以為天文數微遂專心鋭思作七曜術拜郎中撿東觀與蔡邕共述律厯記及造乾象術十餘年考驗日月與象相應陳耽東海人以中正稱靈帝時厯官司徒光和五年詔公卿以謠言舉刺史二千石為民蠧害者時太尉許􅖢司空張濟承望内官受取賄賂其宦者子弟賓客雖貪汚穢濁皆不敢問而虛糾邊逺小郡清修有惠化者二十六人吏人詣闕陳訴耽上言公卿所舉率黨其私其言忠切帝以讓􅖢濟由是諸坐謠言徴者悉拜議郎宦者怨之遂誣陷耽死獄中劉虞郯人初遷幽州刺史民夷感其德化後爲大司馬進封襄賁侯董卓之亂山東諸將欲立虞爲主虞厲色叱曰主上蒙塵吾不能清雪國恥而諸君反造逆謀以相垢誤耶於是選掾田疇間行奉使長安又遣數千騎奉迎天子公孫瓚勸袁術奪其兵後又誣虞與袁紹等欲稱尊號斬虞於薊市三國漢諸葛亮陽都人少孤從叔父元避難荆州躬耕隴畝自比管仲樂毅徐庶謂先主曰諸葛孔明者卧龍也先主遂詣亮三往乃見後從先主敗曹操於赤壁收江南及成都平䇿爲丞相先主病篤屬以後事曰嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力効忠貞之節繼之以死建興元年封武鄉侯領益州牧南中諸郡叛亂率衆平之乃治戎講武率諸軍北駐漢中屢出祁山平武都陰平諸郡分兵屯田爲久駐之基尋卒於軍司馬宣王案行其營壘曰天下竒才也謚忠武侯亮性長於巧思損益連弩作木牛流馬推演八陣圖咸得其要云諸葛瞻亮子年十七尚公主拜騎都尉景耀四年爲行都䕶衞將軍平尚書事魏鄧艾伐蜀自陰平入瞻督諸軍至涪艾遺書誘瞻降瞻怒斬其使遂戰大敗臨陣死長子尚歎曰父子荷國重恩不早斬黄皓以致傾敗用生何爲乃馳赴魏軍而死魏徐奕東莞人曹公爲司空時辟爲掾屬從西征軍還留奕爲丞相長史鎮撫西京稱其威信再遷尚書令曹公征漢中魏諷等謀反曹公歎曰安得爪牙之臣可以遏奸防謀者乎桓階曰徐奕其人也乃以爲中尉數月拜諫議大夫卒國淵葢人師事鄭康成康成稱之曰子尼美才也必爲國器曹公辟爲司空掾每于公朝議論常直言正色累遷太僕卿布衣蔬食祿賜散之舊故宗族恭儉自守卒於官王朗東海人以通經拜郎中除菑邱長後遷㑹稽太守爲孫䇿所破曹公徴爲諫議大夫文帝時遷御史大夫上疏勸育民省刑㝷改司空封樂平鄉侯諫止遊獵是時大興屯田欲舉軍東征朗又上疏諫明帝時進封蘭陵侯轉爲司徒著易春秋孝經周官傳奏議論諫咸傳於世王肅朗子黃初中爲散騎黃門侍郎太初中上疏陳政本景初間宫室盛興上疏極諫出為廣平太守徵還遷太常時大將軍曹爽專權任用何晏鄧颺等肅正色論曰此輩即宏恭石顯之屬爽等聞之相戒後加散騎常侍卒肅善賈馬之學為尚書詩論語三禮左氏解及撰定父朗所作易傳皆列於學宫其所論駮朝廷典制郊祀宗廟喪紀輕重凡百餘篇繆襲東海人該覽經傳徵博士六辟公府有才學多所述敘官至尚書光祿勲卞蘭開陽人武宣后之從子少有才學明帝時常因侍從數切諫帝雖不能從猶納其欵誠呉徐盛莒人遭亂居呉以勇氣聞孫權統事以為别部司馬守柴桑常以吏士二百破黃祖兵數千為中郎將累遷安東將軍封蕪湖侯于時魏文帝有渡江之志盛建計從建業築圍作薄落圍上設假樓江中浮船文帝到廣陵望圍愕然便引軍還諸將皆伏黃武中卒諸葛瑾陽都人為孫權長史轉中司馬後漢建安中權遣瑾使蜀通好與其弟亮俱公會相見退無私面與權談説諫喻未嘗切愕權意往往而釋後先主伐呉或言瑾别遣親人與蜀相聞權曰子瑜之不負孤猶孤之不負子瑜也瑾為人有容貌思度于時服其宏雅累拜大將軍左都䕶領豫州牧諸葛靚瑾族弟誕子奔呉為大司馬呉亡逃竄不出晉武帝與靚有舊因就見焉靚逃於厠帝逼見之靚流涕曰不能漆身垢面復覩聖顔詔為侍中固辭歸鄉里终身不向晉而坐晉王祥臨沂人早喪親事繼母朱氏至孝母欲生魚時天寒冰凍祥解衣將剖冰求之氷忽自解雙鯉躍出母又思黃雀炙復有雀數十飛入其幕初為徐州别駕州界清靜政化大行累遷大司農封萬歲亭侯武帝為晉王祥與荀顗往謁顗曰當拜祥曰安有天子三公而拜人者及入獨長揖武帝踐阼拜太保進爵為公以年老固辭賜几杖不朝安車就第王覽祥異母弟母朱遇祥不慈祥𬒳楚撻覽輒涕泣抱持朱屢以非理使祥覽輒與俱又虐使祥妻覽妻亦趨而共之母以祥有時譽密酖之覽知而取酒飲母遽奪反之自後朱賜祥饌覽必先嘗朱懼遂止應本郡召稍遷清河太守封即邱子咸寕中以光祿大夫卒閻德東海人唐彬初受學於德門徒甚衆獨目彬有廊廟才及彬官成而德已卒乃為之立碑王戎臨沂人㓜而穎悟神采秀徹阮籍與之友常為竹林之遊鍾㑹伐蜀問計將安出戎曰非成功之難保之難也及會敗議者以為知言辟相國掾累遷吏部尚書又遷尚書左僕射領吏部戎以晉室方亂與時舒卷卒謚曰元王澄衍弟少厯顯位遷成都王穎從事中郎穎嬖監孟玖譖殺陸機兄弟天下切齒澄勸頴殺之士庶稱善及頴敗以迎大駕勲封高鄉侯惠帝末為荆州刺史元帝徴為軍諮祭酒赴召時王敦鎮豫章憚澄盛名使力士搤殺之諸葛恢靚子初試守即邱長避地江左名亞王導庾亮導嘗謂曰明府當為黑頭公時潁川荀顗陳留蔡謨與恢俱字道明有名譽號曰中興三明元帝時遷江南令討周馥有功封博陵亭侯累遷尚書右僕射成帝踐阼加侍中恢兄頤字道囘亦為元帝所噐重終於太常王導覽孫少有風鑒識量清逺襲祖爵即邱子時元帝為琅邪王與導素相親善導傾心推奉及徙鎮建康導勸帝收禮賢人由是朝野傾心帝嘗從容謂曰卿吾之䔥何也愍帝即位上書興復學校帝納之進驃騎大將軍明帝伐王敦假節督軍事敦平封始興郡公後受遺詔輔立成帝出討石勒蘇峻難作敬導德望不敢加害賊平請帝鎮建康進位太傅拜丞相咸和五年卒弟潁敞與導俱知名時人以潁方温太真以敞比鄧伯道云王舒導從弟潛心學植不營當時名年四十餘州禮命太傅辟皆不就元帝鎮建康參鎮東軍事頻領望府咸稱明練太寕初王敦表為鷹揚將軍荆州刺史徵代鄧攸為尚書僕射又出為㑹稽太守蘇峻作逆舒屢戰失利自貶去節尋監浙江東五郡事使子允之大破韓晃於長塘賊平以功封彭澤縣侯卒允之字深猷伯敦與錢鳳謀逆允之知之至都白舒舒即與兄導俱啓明帝敦平允之隨舒至會稽及蘇峻反允之討賊有功封番禺縣侯王彬導從弟少稱雅正弱冠不就州郡之命元帝引為鎮東賊曹㕘軍豫討華軼功封都亭侯愍帝時遷侍中從兄敦舉兵入石頭帝使彬勞之㑹周顗遇害彬既見因數敦曰兄抗旌犯順殺戮忠良謀圖不軌禍及門户音辭慷慨聲淚俱下敦大怒曰爾狂悖至此吾不能殺汝耶彬意氣自若後敦議舉兵向京師彬諫甚苦俄為豫章太守敦平有司奏籍彬詔原之遷尚書右僕射卒王彪之彬次子初除佐著作郎累遷廷尉桓温下武昌殷浩欲告退彪之止之温亦果不進後簡文以爲會稽内史會桓温鎮姑熟四方修敬皆遣上佐綱紀彪之獨不遣温乃以罪檻收彪之下吏㑹赦兔復爲僕射是時温將廢海西公彪之知温不臣迹巳著理不可奪乃命定儀制神彩毅然朝廷以此服之簡文崩羣臣疑惑謂當須温處分彪之正色曰君崩太子代立大司馬何容得異朝議乃定孝武即位遷尚書令加光祿大夫儀同三司卒王稜彬季父琛子渡江爲元帝丞相從事中郎從兄導以稜有政事才宜守大郡乃出爲豫章太守知從兄敦有㒺上心日夕諍諫每言苦切敦不能容潛使人害之王羲之導從子以骨鯁稱尤善隸書爲古今冠拜右軍將軍㑹稽内史時殷浩與桓温不協羲之以國家之安在内外和與書戒之浩不從果敗東土饑荒輒開倉賑貸朝廷賦役繁重毎上疏爭之多見從羲之雅好服食養性樂㑹稽山水嘗與同志宴集蘭亭爲序以申其志遂於父母墓前作文自誓稱病去官卒王凝之羲之子亦工草隸仕厯江州刺史㑹稽内史為孫恩所害王徽之羲之子卓犖不覊為桓冲騎兵叅軍冲嘗謂曰卿在府日久比當相料理徽之初不酬答直高視以手版柱頰曰西山朝來致有爽氣耳嘗居山陰夜雪初霽忽憶戴逵便乘舟詣之造門而返人問其故曰乘興而來興盡而返何必見安道耶其傲達若此後為黄門侍郎棄官東歸王獻之羲之子少有盛名高邁不覊嘗與兄徽之操之俱詣謝安既出客問王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言知之工草隸善丹青七八歲時學書羲之密從後掣其筆不得歎曰此兒後當復有大名起家秘書郎以選尚新安公主謝安請為長史㝷除呉興太守徴拜中書令卒劉超臨沂人少有志尚為琅邪國記室掾以忠謹清慎為元帝所拔從渡江專掌文檄以左右勤勞賜爵原鄉亭侯處身清苦衣不重帛家無擔石之儲成帝初遷射聲校尉統衆宿衞號為君子營蘇峻謀逆遷帝石頭超步侍左右密謀欲奉帝出事泄為峻所害峻平詔遷塟髙地使出入得瞻其墓追贈衞尉諡曰忠子訥謹飭有石慶之風訥子享亦清慎王恂肅子文義通博在朝忠正官至河南尹何無忌郯人少有大志忠義任氣州辟從事轉太學博士舅劉牢之鎮京口每有大事嘗與叅議桓元簒位與劉𥙿劉毅共舉義兵桓元敗屢進持節將軍江州刺史以興復功封安城郡開國公後與盧循别帥徐道覆戰失利賊衆登艦者數千人無忌辭色不撓遂握節以死謚忠肅南北朝宋劉穆之莒人武帝克京城何無忌薦為府主簿累遷尚書左僕射穆之内總朝政外供軍旅决斷如流事無擁滯裁有閒暇校定墳籍卒追封南康郡公從弟秀之遷尚書右僕射涖官清潔家無餘財臧燾莒人武敬皇后兄也少好學善三禮晉太元中始立國學舉燾為助教宋武帝義旗建厯㕘軍事後拜太常燾雖外戚貴顯彌自冲約所得俸祿與親戚共之以光祿大夫卒臧熹燾弟與燾並好經學熹皆騎射志立功名晉隆安初從武帝至建業使入客收圖書器物封府庫有金飾樂器武帝問熹卿欲此乎熹正色曰將軍首建大義劬勞王室熹雖不肖無情于樂以建義功封始興縣五等侯㕘車騎中軍軍事武帝遣朱齡石統大衆伐蜀命熹竒兵出中水蜀大將譙撫之敗走熹追斬之成都平遇病卒贈光祿勲王宏導曾孫少好學以清悟知名武帝召補鎮軍諮議㕘軍以佐命功封華容縣公文帝即位以定䇿安社稷進車騎大將軍遷司徒錄尚書事元嘉中進位太保領中書監卒諡文昭配食武帝廟廷宏博練政體留心庶事斟酌時宜每存優允既人望所宗造次必存禮法凡動止施為及書翰儀體後人皆依放之謂之王太保家法王曇首宏弟幼有素尚兄弟分財曇首惟取圖書而已為文帝鎮西長史武帝謂文帝曰曇首輔相才也及文帝入奉大統以為侍中遷太子詹事卒文帝歎曰王詹事所疾不救國之衰也贈光祿大夫謚曰文徐湛之羨之從孫幼而有識及長頗涉大義事祖母及母並以孝聞元嘉中拜秘書監累官尚書僕射領䕶軍將軍元兇事起見害謚忠烈王誕宏從兄少有才藻襲爵雉鄉侯為武帝太尉長史盡心歸奉帝甚仗之後為呉國内史母憂去職武帝伐劉毅起為輔國將軍毅既平誕先還卒王華誕從祖弟武帝北伐長安辟華為主簿文帝將入奉大統華贊決就徴及即位以華為侍中右衞將軍遷䕶軍將軍元熹四年卒王惠誕從祖弟恬靜不交遊未嘗有雜事武帝以為行㕘軍宋國初建當置郎中令難其人帝以惠居之謂不減袁曜卿少帝即位拜吏部尚書客有以書求官者得輒聚閣上及去職印封如初王球惠從父弟少與惠齊名文帝時厯位吏部尚書性簡貴不交遊居選職不視求官書疏而銓衡有序除尚書僕射卒王彧球從子好言理少與陳郡謝莊齊名孝武時遷司徒左長史明帝即位累加太子太保王裕之晉驃騎將軍廙曾孫少有清尚性恬靜樂山水求為天門太守轉南平去官桓元篡位屢召不下武帝以為車騎從事中郎永初中累遷吏部尚書元嘉中厯遷尚書令表求還東車駕餞送卒於餘抗孫秀之武帝時為晉平太守期年求還或問其故答曰此郡沃壤財生則禍逐吾山資已足豈可久留以妨賢路時人以為王晉平恐富求歸王鎮之裕之從祖弟初補剡上虞令有能名為大將軍錄事㕘軍賑恤三呉饑荒糾奏㑹稽内史王愉為所排抑補安成太守後為御史中丞執正不撓百僚憚之出為平越中郎將廣州刺史在鎮不受俸祿簫然寡營齊武踐阼卒於宣訓衞尉王宏之鎮之弟武帝屢徴不就從兄𥙿之嘗解貂裘與之即著以採藥舊家在㑹稽上虞性好釣垂綸江上築室始寕沃川謝靈運曰宏之拂衣歸耕踰厯三紀真千載盛美也及卒顔延之欲為作誄自悵筆短不足書美竞不就王韶之裕之從祖弟家貧好學私撰晉安帝陽秋及成時人謂宜居史職即除著作佐郎使續後事辭論可觀武帝時遷黃門侍郎少帝即位出為呉郡太守徙呉興卒撰孝傳三卷王悦之獻之孫少厲清操亮直有風檢泰始中為黄門郎御史中丞上以其廉介賜田五頃遷侍中掌檢校御府太官太醫諸署時姦竊者衆悦之按覆無所避衆共咒誼之病卒於官王准之彪之曾孫家世相傳諳江左舊事緘之青箱世謂之王氏青箱學准之兼明禮傳擔于文詞宋臺建為御史中丞元嘉中領吏部出為丹陽尹准之究識舊儀問無不對彭城王義康歎曰但得如王准之兩三人天下便足卒贈太常顔延之臨沂人好讀書文章冠絶當時官至金紫光禄大夫與謝靈運齊名江左稱顔謝焉虞邱進郯人少時從謝㓜度討苻堅有功封闗内侯後從武帝征孫恩定建業及盧循逼都邑孟昶等議奉天子過江進廷議面折武帝甚嘉之除鄱陽太守義熙中累遷太子右衛率卒何承天郯人㓜孤母徐廣姊承天㓜漸訓義武帝起義為行㕘軍宋臺建為尚書祠部郎共撰朝儀元嘉中除著作佐郎撰國史遷御史中丞時魏軍南侵承天上安邊論凡陳四事文帝毎有疑議必先訪之刪禮論為三百卷及文集傳於世王微宏弟少好學善屬文素無宦情江湛舉為吏部郎微確乎不可拔與何偃書深言麈外之適常住門屋一間尋書玩古終日端坐席皆生塵埃坐處獨淨後贈秘書監王僧綽曇首子元嘉中累遷吏部郎㕘掌大選究識流品任舉咸盡其分僧綽沈深有局度不以才能髙人文帝將廢立僧綽謂宜束斷及劭弑逆乃收害焉王僧䖍曇首子弱冠雅善隸書文帝時為太子舍人兄僧綽為元凶所害親賓咸勸之逃僧䖍泣曰今日之事苦不及見耳若同歸九泉猶羽化也累遷尚書令齊受命遷侍中左光禄開府儀同三司徐孝嗣湛之孫厯御史中丞出為吳興太守在郡有能名復徴為五兵尚書臺閻事多委之明帝時以廢立功封枝江縣侯進爵為公轉尚書令孝嗣愛好文學器量宏雅不以權勢自居後為羣小所憎勸帝賜死其子演況皆見殺魏王肅臨沂人太和中父奐及兄弟並為齊所殺肅自建業奔魏孝文聞其至虛襟待之肅陳説治亂音韻雅暢帝嗟納之㝷補輔國大將軍長史詔肅討齊義陽以破齊將裴叔業功進號鎮南將軍封汝陽縣子高祖崩遺詔以肅為宰輔參量憂勤上下稱為和輯世宗時以肅淮南累捷封開國侯㝷為散騎常侍都督淮南諸軍事肅頻在邊逺近歸懷清心好施終始亷約家無餘財卒贈侍中司空齊臧榮緒莒人㓜孤躬自灌園以供祭祀母䘮後朔望輒拜薦甘珍未嘗先食純篤好學括東西晉為一書紀録志傳百一十卷又著五經序論隱居京口敎授高祖為揚州刺史徴為主簿不至永明六年卒王儉曇首孫父僧綽遇害儉襲豫寕縣侯解褐秘書郎太子舍人超遷秘書丞依七畧撰七志四十卷表獻之又撰元徽四部書目齊臺建遷尚書左僕射領吏部時朝儀草創皆儉議定之建元初封南昌縣公武帝即位議定郊祀之禮悉從之儉寡嗜慾惟以經國為務家無遺財手筆典裁為當時所重毎博議引證先儒罕有其例八坐丞郎無能異者卒謚文憲王思遠宏之孫少無仕心建元初厯竟陵王司徒録事參軍思遠求出為逺郡除建安内史累受司徒左長史初從父兄晏贊明帝廢立之計思逺謂晏及早引決猶可保全門户旬日晏及禍明帝知思逺有言遷為侍中卒贈太常王僧祐微兄光禄勲逺子未弱冠頻經憂居䘮至孝服闋髪落殆盡雅好博古善老莊不尚繁華亭亭獨立不交當世沛國劉瓛上書薦之為著作佐郎遷司空祭酒謝病不與公卿遊高帝謂王儉曰卿從可謂朝隱卒於黄門郎王智深臨沂人武帝時為孫章王記室敇撰宋紀三十卷家貧無人事嘗五日不食掘莞根食之卒于家顔見遠臨沂人為御史中丞梁武帝受禪見遠不食數日而卒王摛郯人以博學見知王儉儉嘗使賓客隸事惟廬江何憲為勝賞以五花簟白團扇摛後至操筆便成舉坐擊賞乃抽簟掣扇而去儉笑曰所謂大力者負之而趨永明間為尚書左丞王諶郯人永明間厯黄門郎領驍騎將軍諶貞正和謹少貧常自紡績及通貴後每為人説之世稱其達梁劉勰莒人早孤篤志好學家貧不婚娶依沙門居處積十餘年遂博通經論天監中以東宫通事舍人兼步兵校尉昭明太子好文學深愛接之初勰撰文心雕龍五十篇論古今文體沈約大重之謂深得文理有文集行於世孫謙莒人天監中徵為光禄大夫謙自少及老厯二縣五郡所在廉潔居身儉素力於仁義行已過人甚逺兄靈慶嘗病寄謙謙出行還問起居靈慶曰向飲冷熱不調即時猶渴謙退遣其妻人咸服之顔協見遠子博涉羣書工於草隸飛白不求顯逹累辭徵辟為湘東王記室撰晉仙傳及日月災異圖徐勉郯人少孤貧早勵清節太尉王儉稱勉有宰輔之量天監初除吏部郎叅掌大選遷侍中叅掌軍書劬勞夙夜動輒數旬乃一還宅嘆曰吾憂國忘家乃至於此嘗與門人夜集有客求官勉正色曰今夕止可談風月不宜及公事時人咸服其無私居選官彝倫有序既􅈺尺牘兼善辭令雖文案填積坐客充滿應對如流手不停筆除尚書僕射卒何遠郯人謁高祖隨破朱雀軍爲建康令厯武昌東陽太守免歸遠耿介無私曲絶請謁未嘗以顔色千人其輕財好施言不虛妄蓋天性也歸家經歲不言榮辱士類多之後為征西叅軍撫軍司馬卒王僧孺郯人蕭八代孫五歲讀孝經能屬文天監中為南海太守再遷御史中丞卒僧儒好墳籍聚書至萬餘卷率多異本與沈約任昉家書埒集十八州譜百家譜東南譜及文集三十卷並行於世臧盾燾四世孫父未甄博涉文史有才幹卒官江夏太守盾㓜從琅邪諸葛璩受五經璩嘆曰此王佐才也初為撫軍行叅軍遷尚書中兵郎盾美風儀善舉止敏瞻有風力長於撥繁性公彊在憲臺甚稱職居䘮五年不出廬户形骸枯顇家人不復識太同初遷中領軍卒臧厥盾弟以幹局稱累官員外散騎常侍卒於官厥前後居職所掌之局大事及蘭臺廷尉所不能決者敕並付厥厥辨斷精詳咸得其理後有撾登聞鼓訴者求付清直舍人高祖曰臧厥既亡此事便無可付其見知如此臧嚴盾從弟幼有孝行孤貧勤學初為安成王侍郎轉常侍性孤介僕射徐勉欲識之嚴終不詣遷湘東王㕘軍兼記室王嘗自執四部書目試之嚴自甲至丁卷中各對一事並作者姓名無遺失厯監義陽武寕郡羣蠻悦服卒官鎮南諮議㕘軍文集十卷徐摛郯人㓜好學及長遍覽經史屬文好新變不拘舊體仕為晉安王侍讀高祖詔問經史百家及論釋教摛商較縱橫應答如響帝甚加嘆異累官太子左衞率及侯景攻陷臺城簡文居永福省侍衞莫有存者搗獨侍立不動景由是憚摛卒謚貞子王規儉孫八歲居母䘮有至性稱曰孝童侍東宫為昭明太子所禮常以門宗貴盛恒思減退後為中庶子辭疾不拜於鍾山築室居焉何遜承天曾孫八歲能賦詩弱冠州舉秀才范雲見其對䇿大加稱賞因結忘年交沈約嘗謂遜曰每見卿詩一日三復猶不能已天監中為水部郎王志僧䖍孫九歲居母䘮哀容毁瘠天監初為丹陽尹為政清靜累遷中書令志善草隸當時以為楷法稱書聖家居建康馬糞巷門風寛恕志尤惇厚兄弟子姪皆篤實謙和時人號馬糞諸王為長者王彬志弟好文章習篆隸與志齊名時人為之語曰三真六草為天下寳天監中厯吏部尚書秘書監彬立身清白推賢接士有士君子風王筠志從子七歲能文及長清靜好學沈約嘗啟上言晚來名家無先筠者昭明太子愛文學士筠以方雅見禮累官太子詹事自撰文章凡一百卷行於世徐伯陽東海人父僧權以善書知名家有史書伯陽所讀者近三千餘卷除晉安王㕘軍卒何思澄郯人少勤學工文辭厯安西相東武陵録事㕘軍子朗與宗人遜並擅文名時人語曰東海三何子朗最多陳徐陵摛子太清初為通直散騎侍郎陳受禪加散騎常侍時安成王權傾朝野殿上侍立仰視陵遣殿中郎引王下殿自是朝廷肅然陵器局深遠容止可觀性又清簡無所營樹俸禄與親族共之爲一氏文宗亦不以矜物於後進接引無倦其文頗變舊體緝裁巧密多有新意弟孝克事生母至孝家道壁立母欲梗未爲粥不能常辦母亡後遂終身噉麥焉顔晃臨沂人好學有辭果官至中書舍人掌詔誥晃家世單門而介然修立爲當世所知其表詔誥下筆立成便得事理徐儉陵子幼而修立勤學有志操累遷中書侍郎太建初廣州刺史歐陽紇反宣帝令儉諭㫖紇言辭不恭儉曰吕嘉之事誠當己逺將軍獨不見周廸陳寳應乎轉禍爲福未爲晩也紇平爲中書舍人後主立尚書令江總望重一時爲儉所劾後主深委任焉弟份九歲爲夢賦陵奇之性孝悌官太子洗馬先陵卒北齊顔之推協子世善周官左氏學之推博覽羣書詞情典麗顯祖一見悦之即除奉朝請厯選中書舍人之推處事勤敏帝甚加恩接㝷除黄門侍郎有文集三十卷家訓二十篇行於世周顔之儀之推弟博涉羣書明帝以爲麟趾殿學士高祖建東宫以之儀爲侍讀宣帝即位遷御史中大夫進爵爲公好犯顔驟諫帝毎優容之帝崩劉昉等矯遺詔以隋文帝為丞相輔少主之儀厲聲曰阿衡之任宜在宗英公等奈何以神器假人誣㒺先帝於是文帝大怒出為西疆郡守㝷拜集州刺史代還優游不仕嘗正月入朝文帝望而識之謂曰見危授命臨大節而不可奪古人所難何以加卿有文集十卷王褒規子七歲能屬文初授車騎大將軍明帝好文學褒與庾信才名最高特加親待加開府儀同三司後出為宜州刺史卒於官隋鮑宏郯人善屬文為湘東王記室隋文帝受禪進爵為公授均州刺史有集十卷包愷東海人兄愉明五經愷悉傳其業又從王仲通授史記漢書尤稱精究大業中為國子助敎學者以蕭該及愷二人為宗匠卒門人起墳立碣焉王胄臨沂人大業中為著作佐郎與虞綽齊名後進之士咸以二人為準的兄眘字元恭博學多通官秘書郎唐顔師古之推孫少博覽精詁訓學善屬文高祖時授朝散大夫累遷中書舍人專典機密師古性敏給明練治體軍國務多詔令一出其手太宗即位考定五經多所釐正諸儒共非詰之師古輒引晉宋舊文隨方曉答援據該明出其悟表封琅邪縣男以宏文館學士卒弟相時貞觀中諫議大夫有爭臣風徐曠孝嗣五世孫博通五經明左氏春秋常從沈重受業不數日辭去曰所説紙上語耳若奥境彼有所未見重知其語召與反覆研辨嗟嘆其能性方正舉動純重為國子博士高祖幸國學觀釋奠曠發春秋題論難蜂起隨方召對莫能屈帝異之王無競宏之逺裔擢下筆成章科授欒城尉遷殿中監察御史㑹朝宰相宗楚客楊再思離立偶語揚笏曰朝禮尚敬大臣不宜慢常典後貶廣州卒顔真卿師古五世從孫開元中以監察衘史使河隴時五原有冤獄久不決天且旱真卿辨獄而雨郡人呼御史雨出為平原太守安禄山盡陷河朔獨平原城守具備帝謂左右曰朕不識真卿何如人所為乃若此即拜户部侍郎肅宗初授尚書遷御史大夫代宗時封魯郡開國公楊炎當國以直不容又為盧杞所銜李希烈陷汝州𣏌乃建議遣真卿往諭之詔可公卿皆失色真卿曰君命可避乎既見希烈逼使上疏雪己真卿不從遂縊殺之贈司徒謚文忠真卿善正草書筆力遒婉世寳傳之顔杲卿與真卿同五世祖性剛正莅事明濟安禄山聞其名表為判官假常山太守禄山反杲卿稱疾不視事潛召處士權渙郭仲邕定䇿禄山使史思明等攻常山杲卿晝夜戰糧矢盡六日而陷賊脅使降不應縳之天津橋柱節解之杲卿詈不絶賊鉤斷其舌而死乾元初贈太子太保謚忠節顔春卿杲卿弟倜儻美姿儀通當世務十六舉明經調犀浦主簿常送徒於州亡其籍至廷口記物色凡千人無所差長史陸象先異之轉蜀尉終偃師丞王難得臨沂人天寳初為河源軍使吐蕃贊普子郎支都者恃趫敏畧陣挑戰無敢校者難得怒挾矛駷馬馳支都直斬其首帝壯其果累授金吾將軍從郭子儀攻相州封琅邪郡公卒䁬潞州大都督王仲邱琅邪人開元中厯左補闕内供奉集賢修撰起居舍人時典章差駮仲邱欲合貞觀顯慶二禮據有其舉之莫或廢之之誼請皆用詔可遷禮部員外郎卒贈秘書少監符令奇臨沂人初為盧龍軍裨將幽州亂挈子璘奔昭義軍即度薛嵩署為副軍嵩卒田承嗣盜其地引為右職田悦拒命令奇密語璘曰田氏覆亡無時汝能委質朝廷為唐忠臣我亦名揚後世矣璘俯泣不能對㑹使璘以三百騎䕶送李納歸齊乃嚙臂别璘領衆降馬燧悦怒切讓今奇令奇罵曰爾忘義背主旦夕死我敎子以順殺身何悔臨刑色不變後追贈户部尚書璘封義陽郡王後討李懐光有功宋王子輿莒人太平興國中進士解褐北海主薄厯太常博士真宗即位遷殿中侍御史入對與三司論列利害以子輿為長咸平中兼充淮南轉運使精於吏事裁量經制公私便之拜右諫議大夫卒金張暐日照人正隆中進士厯官右諫議大夫兼禮部侍郎暐博學該通最明古今禮樂家法為士族儀表妻卒齋居與子行簡講論古今諸孫課誦其側至夜分乃罷以為常張行簡暐子頴悟力學淹貫經史大定中進士第一除應奉翰林文字累遷禮部侍郎詔每奏事須令行簡常在左右貞祐𥘉轉大子太傅翰林院學士承㫖尚書時備防秋兵械令内外職官不以丁憂致仕皆納弓箭以行簡等議得免行簡為人端慤謹密所著文章十五卷禮例纂一百二十卷卒謚文正張行信先名行忠行簡弟大定中進士官銅山令累遷諫議大夫時瑚沙䕶巳除名賂遺權貴將復進用行信上章言之不報及瑚沙䕶弑逆人甚危之行信坦然不顧也貞祐初復上書言四事宣宗多用其議哀宗時以尚書左丞致仕家居惟以抄書敎子孫為事為人純正真率登相位殆若無官然遇事輒發無所畏避薨之日雖平昔甚媢忌者亦曰正人亡矣瑚沙䕶舊作湖沙虎今改正元張雄飛臨沂人世祖召見陳當世之務上大悦授平陽路轉運使請建東宫立御史臺上皆善之累官㕘知政事終燕南河北道宣慰使明公守敬蒙隂人父海洪武初戍邊海年過四十例許以子代三兄皆不肯徃守敬生子兟甫十月即往代之兟十五歲聞父所在終日哭渡海求父遇於遼東事聞詔免守敬授兟廣宗縣丞一年移疾以二驢載書籍徒步以歸杜澤沂水人洪武中由文學授本縣訓導以經明行修薦升司經局試校書進詹事府丞澤朴實持重言動不逾禮累官吏部尚書掌銓衡慎守不欺為帝信任以年老致仕玊璡日照人博通經史尤長於春秋初為教授洪武末以薦授寕波知府自奉儉約一日饌供魚羮命撤而埋之人號埋羹太守燕師臨江璡造舟艦謀勤王為衛卒縛至京成祖問造舟何為對曰欲泛海趨瓜州阻師南渡耳帝亦不罪放還李驥郯城人永樂中由舉人擢給事中遷監察御史出知河南府有惠政居民立祠洛陽城東李柰蒙隂人宣德中進士由行人授御史不避權惡尤惡貪暴人號鐵板李御史辨析讞訟衆驚為神都御史凡滯獄弗決者必以屬柰吏見有柰署字不更視曰李御史所録必無冤也補陜西㕘議署理河西邊儲及代㑹邊報急或勸急過河避柰曰吾荷國恩叨寄一方今有警宜以死報奈何去之竟侯代者至乃還治民無冤獄西人號為李佛景泰中乞歸終於家惟遺書數千卷而已王璟沂州人成化中進士知登封縣擢南臺御史言論正直轉僉都御史總理兩淮鹽法時浙東大饑條上便宜十二事所全活四十萬人改巡撫保定風裁整肅正德間進太子大保公勉仁蒙隂人宏治中進士授行人厯太僕少卿正德初忤劉瑾左遷四川㕘議勦蜀冦有功累升都御史巡撫大同值邊警率衆力戰以憂歸起巡撫鄖陽卒於官毛繡莒州人任西平縣丞正徳時流賊攻縣城破死之詔贈知縣建大忠祠司福日照人正德時同兄縣吏賓巡守官庫流賊陷城刼庫福力拒之賊怒縱火焚之煙熖中罵不絶口而死詔旌其門仍令其子寳世為義官張旼日照人邑庠生正德中父死躬員土築墳廬墓三年詔旌其孝母殁復廬墓卒於墓舍張景華郯城人正德中進士知吉水縣䇿宸濠必反預完城壘卒不能攻入為御史抗論武定侯驕橫不法直聲大振後總督漕運條上邊防漕運嚴嵩柄政諷言官以蜚語中之遂乞休卒郭學業日照人邑庠生嘉靖中母䘮廬墓側廬外得甘泉足供飲食三年歸泉遂涸劉璞莒州人萬厯中舉人累官御史熹宗時劾魏忠賢削籍家居著書卒贈太僕寺少卿公鼐蒙陰人萬厯中進士授編修累遷左庶子引􅔂歸光宗召拜祭酒熹宗立進鼐詹事上疏請纂修實録將光宗事蹟别為一録疏入不報㝷以言官多獲譴上疏切諫遷禮户二部右侍郎鼐好學博聞磊落有器識见魏忠賢亂政復引疾歸後為御史業有聲追論落職未幾卒楊肇基沂州人天啓中歴官山東總兵時白蓮賊徐鴻儒連陷鄒滕嶧三縣肇基每戰擐甲先登卒擒鴻儒降其衆萬餘人崇禎九年以右都督守薊鎮西協時永平灤州遷安遵化皆失守肇基以孤城介其間屢奏捷功稱一時名將後以勞悴卒於軍贈太傅謚曰武襄厲必中日照人天啓歲貢事父母以孝聞任海豐敎諭城陷率同官死於明倫堂高名衡沂州人崇禎中進士知如臯縣以才徵授御史巡按河南即上封疆六事流賊李自成圍開封名衡集衆拒守賊穴城將入守者投以火後復煮穢汁灌之賊死無算明年復至圍而不攻城中食盡河決城沉名衡從城上泛舟出帝念拒守勞加兵部侍郎辭疾歸抵家甫兩月大兵至沂州夫婦同殉節本朝乾隆四十一年賜謚忠節何鐩莒州人貢生崇禎十五年城陷不屈死本朝乾隆四十一年賜入忠義祠本朝楊珍蘭山人順治三年以武生從軍積功至遊擊時土寇猖獗總督張存仁選勇士往招撫珍毅然將命挺身入賊穴諭以大義賊負固不服縶之不屈死李榮宗費縣人順治丙戌進士知垣曲縣姜瓖反死於難諭賜祭葬贈山西按察司僉事祀名宦祠丁泰日照人順治戊戌進士授陳留知縣以考績稱最升吏科給事中條議漕折屯逋及察追侵欺無不中窽掌工科覈河工額數必詳必確河南山東旱疏請發帑金賑濟先是海禁甚嚴沿海貧民失業流徙泰具疏面陳形勢得弛海禁民皆賴之予假歸里卒李簠日照人性至孝友爲諸生時嘗教授生徒多所陶成順治辛卯舉於鄉授蓬萊縣敎諭遷安東衞敎授課士有方秩滿升江西浮梁知縣稱疾歸乃出貲鑿義井三以便汲施地一區以給貧不能葬者子應廌由康熙丙戌進士累官内閣學士兼禮部侍郎克承父志增廣義田以贍族里凡婚䘮皆有定式蓋畧倣范文正云陳祚熙莒州人㓜有文名康熙元年歲薦嘗傾産修文廟建唘聖祠性最孝友好施予制行端方言笑不苟卒祀鄉賢祠流寓周老萊子列仙傳楚人當時世亂逃耕於䝉山之陽莞葭為墻蓬蒿為室杖木為牀蓍艾為蓆𦵔芰為南墾山插種五穀楚王至門而迎之遂去至於江南而止曰鳥獸之解毛可績而衣其遺粒足食也漢書藝文志道家老萊子十五篇漢包咸曲阿人王莽末於東海界為赤眉賊所得遂見拘執咸晨夜誦經自若賊異而遣之因住東海立精舍講授光武即位乃歸鄉里李變南鄭人父固死於獄中父門生王成將變乘江東下入徐州界内變姓名為酒家傭而成賣卜於市隂相往來燮從受學酒家以女妻變變專精經學十餘年梁冀誅燮乃以本末告酒家酒家具車重厚遣之皆不受遂還歸里承宫姑幕人與妻子之䝉隂肆力耕種禾黍將熟人有誣之者宫不與計推之而去鄭康成高密人獻帝時黄巾寇青部乃避地徐州徐州牧陶謙接以師友之禮建安元年還髙密金吳邦傑登州軍事判官寓居日照之村墅為元兵所得驅令攻城邦傑曰吾荷國恩詎忍攻吾君之城與之酒食不顧乃弑之詔贈朝列大夫定海軍節度副使列女漢東海孝婦東海人少寡無子飬姑甚謹其後姑自經死太守竟論殺孝婦郡中枯旱三年後太守祭孝婦冡因表其墓天立大雨嚴延年母從東海來欲從延年臘到雒陽適見報囚母大驚便止都亭不肯入府延年出謁母數責延年延年服罪自為母御歸府舍母畢正臘謂延年曰天道神明人不可獨殺我不意當老見壯子被刑戮也遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢知其母晉愍懐太子妃王氏太尉衍女字惠風太子廢衍請絶婚惠風號泣而歸及劉曜陷洛陽以惠風賜其將喬屬屬將妻之惠風拔劍拒屬義不受辱遂被害王凝之妻謝氏字道韞安西將軍奕女聰識有才辨謝安謂有雅人深致後凝之及諸子為孫恩所害謝氏抽刃出門亂兵稍至手殺數人賊入欲害