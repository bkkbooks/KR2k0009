body:
  text: 大清一統志盛京盛京形勢崇高水土深厚長白峙其東醫閭拱其西滄溟鴨綠繞其前混同黒水縈其後山川環衞原隰沃饒洵所謂天地之奥區也天作地藏自開闢以來以待聖人我太祖高皇帝誕膺天命肇造鴻圖始自興京撫有葉赫輝發諸地遂城界藩薩爾滸而築東京於遼陽天命十年以瀋陽爲形勝之地王氣所鍾遂定都焉太宗文皇帝底定全遼築城垣建壇廟營宫闕號曰盛京世祖章皇帝統一寰宇定鼎京師尊盛京爲留都監往代兩都之制設官分職管轄八旗駐防禁旅規模宏遠又邠岐之地橋山在焉聖祖仁皇帝六十一年之間大駕三巡躬修展謁盡誠盡敬孝思以申禮成肆覲會同有繹以燕以賚中外禔福闢地自黒龍江以北諸部及大興安嶺之外世宗憲皇帝善繼善述添設州縣増易駐防聖謨洋洋經畫盡善高宗純皇帝祗遹紹聞丕繩祖武御極六十年四謁丹陵用展孝敬賜酺賜復恩澤便蕃本覲光揚烈之忱溯基命造邦之統賦有陪都之製舞成世德之辭奎藻宸章益光前烈仁宗睿皇帝御宇二十五年兩謁珠邱用申孝慕蓋自重熙累洽以來聲教之隆文明之盛固已踰絶域而被殊方而盛京四境幅員萬里民物阜康風俗淳厚瞻陵寢之巍峩仰宫廷之肅穆龍蟠鳳翥佳氣鬱葱國家億萬年景祚鴻庥皆基於此云大清一統志盛京統部東西距五千九十餘里南北距五千八百三十餘里東至海四千三百餘里西至山海關直隸永平府界七百九十里南至海七百三十餘里北踰蒙古科爾沁地至黑龍江外興安嶺俄羅斯界五千一百餘里東南至錫赫特山朝鮮界二千九百餘里西南至海八百餘里東北至海四千餘里西北至蒙古土黙特界六百九十餘里自盛京至京師一千四百六十餘里分野天文尾箕分野析木之次爾雅折木謂之津箕斗之間漢津也漢書地理志燕地尾箕分野遼西遼東皆燕分也樂浪元莬亦宜屬焉又自危四度至斗六度謂之析木之次燕之分也晉書天文志遼東西入尾十度樂浪入箕三度元莬入箕六度唐書天文志箕與南斗相近爲遼水之陽盡朝鮮三韓之地建置沿革古冀青二州之域奉天屬青錦州屬冀通典禹貢曰海岱惟青州孔安國以為東北據海西南距岱此則青州之地東跨海矣其界蓋從岱山東厯密州東北經海曲萊州越海分遼東樂浪三韓之地西抵遼水也舜分冀州東北為幽州尚書集傳舜分冀東北醫無閭之地為幽州青州東北為營州通典鄭康成云舜以青州越海分置營州其遼東之地宜禹貢青之域也夏省幽營并為冀州之域商為幽州營州周初為幽州時肅愼國在其東北朝鮮國在其東南實兼冀營二州地同為幽州境戰國時遼河左右屬燕秦置遼東遼西二郡漢初因之屬幽州武帝元封四年拓朝鮮地増置眞番臨屯元菟樂浪四郡昭帝始元五年省眞番臨屯入元菟樂浪郡其東為高句驪後漢書高句驪在遼東之東千里南與朝鮮􅐮貊東與沃沮北與夫餘接武帝滅朝鮮以高句驪為縣使屬元菟北為夫餘挹婁諸國地後漢書夫餘在元莬北千里南與高句驪東與挹婁西與鮮卑接挹婁古肅愼之國也在夫餘東北千餘里東濱大海南與北沃沮接後漢建武十三年以遼東屬青州二十四年還屬幽州安帝時増置遼東屬國都尉漢末為公孫度所據魏志度分遼東郡為遼西中遼郡置太守自立為平州牧度死子康嗣康子淵自立為燕王景初二年司馬懿擊滅之度以中平六年據遼東至淵三世凡五十年魏克之置東夷校尉治襄平而分遼東元菟樂浪昌黎帶方五郡為平州後還合為幽州晉咸寕二年改遼東為國昌黎元菟帶方樂浪仍為郡均隸平州太興二年為慕容廆所蓋遼巖三州總章初平高麗置都督府九又置安東都護以統之唐書地理志總章元年李勣平高麗國得城百七十六分其地為都督府九州四十二縣一百置安東都護府於平壤城以統之用其酋渠為都督刺史縣令上元三年徙遼東郡故城儀鳳二年又徙新城聖厯元年史名安東都督府神龍元年復故名開元二年徙於平州天寶二年又徙遼西故郡城至德後廢先天中封大氏為渤海郡王後置五京十五府六十二州於黒水靺鞨之南及高麗舊境唐書渤海傳以肅愼故地為上京曰龍泉府領龍湖渤三州其南為中京曰顯德府領盧顯鐵湯榮興六州歲貊故地為東京曰龍原府亦曰柵城府領慶鹽穆賀四州沃沮故地為南京曰南海府領沃晴椒三州高麗故地為西京曰鴨綠府領神桓豐正四州曰長嶺府領瑕河二州夫餘故地為扶餘府常屯勁兵捍契丹領扶仙二州鄭頡府領鄚高二州挹婁故地為定理府領定瀋二州安邊府領安瓊二州率賓故地為率賓府領華蓋建三州佛寕舊地為東平府領伊蒙沱黒比五州鐵利故地為鐵利府領廣汾蒲海義歸六州越喜故地為懷逺府領達越懷紀富美福邪芝九州安遠府領寕郡慕常四州又郢銅涑三州為獨奏州涑州以其近涷沬江蓋所謂粟末水也龍原東南瀕海日本道也南海新羅道也鴨綠朝鮮道也長嶺營州道也扶餘契丹道也按渤海所置五京十五府六十二州多在今吉林烏拉寕古塔及朝鮮界其安東府所治遼東故地雖入渤海建置無聞地理志賈耽所記可考遼時東京州縣多襲其名號非復故地遼史謂皆渤海之舊其實未盡然也佛寕舊作佛湼今改正遼神冊初於遼陽故城建東平郡天顯三年升為南京十三年改為東京遼東京道領遼陽等州府軍城八十七其瀋集等州在今奉天府界西踰遼河為顯乾等州在今錦州府界東抵混同江為黄龍府及寕江賓祥威諸州在今開原以東吉林白都訥界其混同江以東為女直部在今寕古塔界又於東京之西北置上中二京遼上京臨潢府領軍府州城二十五在今錦州府廣寕縣西北邊外中京大定府領州十在今錦州府西直隸喜峯口外元之大寕路也中京興中府之興中營邱等縣亦在今錦州府邊外惟興中府之錦宜來隰等州及大定府之神水金源等縣在今錦州府界金仍建東京金東京路領遼陽府澄潘貴德蓋復來遠等六州又有博索府路其廣寕府則屬北京路博索舊作婆連今改正而以混同江以東為上京金上京路即海古勒之地金之舊土也天眷元年號上京領㑹寕府肇隆信三州在今開原以南及吉林白都訥界又有扶餘海蘭率賓呼爾哈等路今在寕古塔黒龍江界扶餘舊作蒲與海蘭舊作合懶率賓舊作恤品又作速頻呼爾哈舊作胡里改今並改正江以西為咸平路初為咸州天徳二年升為府屬咸平路領韓州在今開原縣以南界改遼中京為北京領大定興中臨潢廣寕四府元至元六年置東京總管府二十四年改遼陽等處行中書省統路七遼河以東曰遼陽路至元二十五年改東京為遼陽路領蓋懿二州東寕路本高句驪平壤城至元十三年置東寕路其地在今朝鮮界瀋陽路卽今盛京也遼金為瀋州昭德軍元初置安撫高麗軍民總管府元貞二年改為路開元路元史地理志開元路古肅愼之地元初癸巳嵗師至開元率賓東土悉平乙未歲立開元南京二萬户府治黄龍府至元四年更遼東路總管府二十三年改為開元路領咸平府後割咸平為散府俱隸遼東道宣慰司開元以東為海蘭府碩達勒達等路元史地理志海蘭府碩達勒達等路元初設軍民萬户府五分領混同江南北之地海蘭改見前碩達勒達舊作水達達今改正遼河以西曰廣寕路金廣寕府至元十五年分為路大寕路初為北京路至元七年改名明洪武四年置定遼都衞八年改為遼東都指揮使司革所屬州縣置衞二十五所十一永樂七年復置安樂自在二州外衞一百八十四所二十以山海關内隸之燕京而全遼之地郡縣皆廢疆圉旣分幅員漸隘我朝發祥長白王氣攸鍾肇祖原皇帝締造興京肇基王迹太祖高皇帝創建鴻業奄有哈達輝發烏拉葉赫寕古塔諸地天命四年城界藩五年遷薩爾滸六年取瀋陽遼陽七年建東京於遼陽十年自東京遷瀋陽定都於此太宗文皇帝底定全遼天聰八年尊為盛京宫闕始備聲教所訖蒙古朝鮮以及使犬使鹿諸部罔不徠臣世祖章皇帝統御六合定鼎京師以盛京為留都順治元年悉裁諸衞設内大臣副都統及每旗駐防三年改駐防内大臣為昂邦章京給鎭守總管官印十年以遼陽為府置遼陽海城二縣又於寕古塔設昂邦章京副都統鎭守之十四年省遼陽府為縣於盛京設奉天府置府尹康熙元年改奉天昂邦章京為鎭守遼東等處將軍寕古塔昂邦章京為鎭守寕古塔等處將軍三年於舊廣寕衞地設府領廣寕縣錦縣寕遠州是年奉天府又増置承德蓋平開原鐵嶺四縣改遼陽縣為州四年改鎭守遼東等處將軍為鎭守奉天等處將軍改廣寕府為錦州府移治錦縣仍屬奉天府尹十年以寕古塔副都統移吉林烏拉十五年以寕古塔將軍駐吉林烏拉復移副都統鎭守寕古塔是年吉林添設副都統二十三年於黒龍江設將軍及副都統二員二十九年移黒龍江將軍及副都統一員駐墨爾根三十一年移吉林副都統於白都訥三十七年移墨爾根副都統駐齊齊哈爾三十八年黒龍江將軍自墨爾根城移駐齊齊哈爾四十九年於墨爾根城設副都統雍正三年設吉林副都統於阿勒楚喀設協領五年於吉林烏拉設永吉州寕古塔設泰寕縣白都訥設長寕縣俱隸奉天府是年設熊岳錦州二副都統七年罷泰寕縣又於三姓設副都統十二年於故復州衞地置復州故金州衛地置寕海縣又於錦州府増設義州乾隆二年罷長寕縣九年設拉林副都統十二年罷永吉州二十一年設阿勒楚喀副都統二十二年以寕古塔將軍為吉林將軍三十四年裁拉林副都統三十七年設岫巖理事通判四十一年以岫巖通判兼轄鳳凰城嘉慶五年設長春廳十二年設昌圖廳十八年設新民廳西抵山海關東抵海濱南至圖們江接朝鮮界北至外興安嶺俄羅斯界皆屬奉天吉林黒龍江將軍所統而副都統復分鎭於將軍所轄之地其餘各城各邊門又有城守尉防守尉等員爲之分駐至編戸之民則隸於州縣而以府統之其錦州一府仍屬於奉天府尹府二奉天府錦州府屬奉天府將軍統轄之地三奉天吉林黒龍江形勢東窮大海在盛京城東四千三百餘里又東北至混同江入海處亦四千餘里西接外藩土黙特奈曼扎嚕特等諸蒙古皆與錦州府接界又東開原邊外為科爾沁界南臨朝鮮渤海奉天錦州二府南面皆臨渤海南通山東登萊二郡鳳凰城以東鴨綠江南為朝鮮國界北抵大興安山在黑龍江上流其北與俄羅斯分界其名山則有長白山在吉林城東南横亙千里高二百里山巔有潭為混同鴨綠諸江之源我朝發祥於此醫巫閭卽北鎭在廣寕縣西其大川則有混同江在吉林城東南卽松花江自長白山北流㑹嫩江折而東合黒龍江又東㑹烏蘇哩江入海黒龍江上源曰鄂倫河自西北流來凡六千餘里與混同江會鴨綠江在鳳凰城東南朝鮮以江為界遼河在盛京城西百里卽古大遼水漢置遼東遼西二郡由此水而分今為奉天錦州二府分界渾河在盛京城南卽古小遼水其重險則有山海關在寕遠州西二百里直隸永平府撫寕縣東百里鳳凰城在奉天府東南城西南有鳯凰城邊門有連山關為朝鮮貢道威遠堡在開原縣東北為吉林烏拉等處出入要道城池盛京城周九里三百三十二步門八南之左曰德盛南之右曰天佑北之東曰福勝北之西曰地載東之南曰撫近東之北曰内治西之南曰懷遠西之北曰外攘門樓八角樓四城壕周十里二百四步廣十四丈五尺外繚牆周三十二里四十八步本明瀋陽衞舊址我太祖高皇帝天命十年東京遷都於此太宗文皇帝天聰五年因舊城増拓