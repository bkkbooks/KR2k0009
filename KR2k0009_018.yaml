待遂選壯騎數十突進賊營左右出入勣合擊大破之李勣離狐人貞觀十六年以勣為遼東道行軍大總管率十六總管兵以伐高麗十九年勣趨遼東自通定濟遼水拔蓋牟遼東白崖等城從戰駐蹕山功最多二十一年復與牛進達伐高麗勣克南蘇木底進達克石城乾封初仍充遼東道行臺大總管擊高麗下十七城總章元年抜扶餘南蘇木底蒼巖城進圍平壤執高藏男建等裂其地州縣之薛仁貴絳州龍門人名禮以字行太宗征遼東仁貴應募以白衣立奇功高宗時與李勣平高麗以仁貴為安東都護鎭之撫孤存老檢制盜賊隨材任職襃崇節義高麗士衆皆欣然忘亡契苾何力鐵勒人太宗征高麗烏骨城為白巖聲援何力挺身陷陣槊中腰尚輦奉御薛萬徹單騎往救出何力於萬衆之中帝親傅瘡藥何力益憤束瘡再戰城旣拔得刺何力者高突勃騶使自殺之辭曰彼為主冒白刃以刺臣義士也捨之龍朔初拜遼東道行軍總管擊高麗進兵鴨綠江餘衆多降乾封初詔以何力為遼東道行軍大總管安撫大使副李勣同趨高麗何力大破高麗於南蘇進拔扶餘先引兵趨平壤勣軍繼之高麗平程名振洺州平恩人破劉黑闥有功拜營州長史封東平郡王從征高麗拜平壤道行軍總管攻沙卑城破獨山陣皆以少擊衆永徽六年以營州都督兼東夷都護擊高麗於貴端水焚其新城顯慶三年與仁貴攻拔赤烽鎭破高麗大將豆方婁龍朔三年與蘇定方等復攻高麗敗之龎同善乾封初以遼東道行軍總管援泉男生及高麗戰敗之男生率師來㑹詔拜同善特進遼東大都督封元菟郡公蘇定方名烈以字行冀州武邑人永徽六年為遼東道行軍大總管伐高麗敗之於貴端水龍朔元年復破之於浿江劉仁軌尉氏人麟德初為帶方州刺史破百濟立唐社稷頒正朔及廟諱然後修屯四儲糗糧訓士卒以圖高麗總章元年為遼東道副大總管兼安撫大使與李勣討高麗平之泉男生高麗葢蘇文子為弟男建男產等所逼遂率衆與契丹靺鞨兵内附明年入朝遷大都督遼東郡公詔還軍與李勣攻平壤擒高藏進卞國公奉詔安撫遼東並置州縣招流亡平斂賦罷力役民悅其寛卒謚曰襄勒碑著功遼耶律伊濟六院部人大祖平渤海立長子為東丹王以伊濟為中臺省右次相太宗卽位上表言渤海遺種寖以蕃息令居遠境恐為後患梁水之地乃其故鄉地衍土沃有木鐵魚鹽之利乘其微弱徙還其民萬世長策也帝嘉納之遂詔徙東丹國民於梁水伊濟鎭撫國人一切如故以功加太傅遷中臺省左相耶律伊濟舊作耶律羽之今改正韓制心幽州安次人開泰中拜上京留守太平中厯中京留守以不曲法不虐民不愛官自箴歲若不登奏免租賦民若被兵奏發廩賑寵居貴戚而不驕屢徙王位而不矜卒之日部民哀之若䘮父母蕭阿拉清寕中與蕭格同掌國政格諂諛不法阿拉爭之不得告歸除東京留守阿拉性忠果曉世務有經濟才㑹行色克色哩禮入朝陳時政得失蕭格以事中傷見殺蕭阿拉舊作蕭阿刺蕭格舊作蕭革色克色哩舊作瑟瑟今並改正金劉煥中山人宋末兵起乏食煥尚幼煑糠供母而自飲其清者稍長就學寒擁糞火讀書不怠登天德進士調中都市令以廉遷北京警巡使捕二惡少杖之庭中戒之曰孝弟謹慎則爲君子暴戾隱賊則爲小人自今以後母狃故習國有明罰吾不得私也由是衆皆畏服無敢犯者召爲監察御史父老數百人或卧車下或挽靴鐙曰我欲留使君期年不可得也大定中同知北京留守事時世宗幸上京所過州郡大發民夫治橋梁馳道以期恩賞煥所部惟平治端好而己上嘉其意遷遼東路轉運使卒諾延温都烏達阿卜薩水人通書史工文章世宗時授㑹寕尹北邊行軍都統時斡罕初定人心未安烏達為治寬多備禦謹斥堠邊境以安改北京留守以廉察舉所至有能名諾延温都烏達舊作耨盌温敦兀帶今改正納塔謀嘉上京路人初習策論進士世宗時補上京提刑書史以廉能著稱承安五年賜同進士出身調東京敎授湯池主簿皆著治績貞祐初遷翰林待制充元帥府經厯興定初諫伐宋降潁州刺史有守禦功納塔舊作納坦今改正完顏阿里巴斯海蘭路特克新必喇明安人明昌中登第貞祐初官御史中丞遼東路行尚書省事興定元年參知政事行尚書省元帥府於博索路寬厚愛人敏於吏事能治劇要時伯特呼圖有異志戕殺阿里巴斯識者惜其用之未盡詔贈平章政事封芮國公完顔阿里巴斯舊作完顔阿里不孫特克新必喇舊作泰申必喇伯特改見前呼圖舊作胡土今改正達魯楊昭努金末時蒙古兵略地高州拔惠和金源和衆龍山利建富庶等十五城降其北京留守音達琿進攻北京傍近諸寨樓子崖等二十餘塞皆降惟西乾河達魯五指山楊昭努獨守不下大小百餘戰昭努死之達魯敗走復聚衆攻龍山以槊刺烏葉爾中胸復為史天祥所敗達魯力戰死之達魯楊昭努舊作答魯楊趙奴今並改正元薩奇蘇囘鶻人世祖時授北京宣撫鋤奸抑强遼東以安㑹高麗有異志帝遣使究治則委罪於其臣洪察忽械送京師道遼東薩奇蘇訪知洪察忽以直諌迕意卽奏疏為直其事帝命釋之薩奇蘇舊作撒吉思今改正廉希憲世祖至元十一年為北京行省平章遼東多親王使者傳令㫖擾民官不能抗希憲至卽為革正有西域人自稱駙馬營於城外縶富人謬言索債希憲捕問曰法無私繫汝何敢擅繫氏其人哀求國王亦為之請乃得釋長公主入朝縱獵郊原希憲欲入奏公主請以鈔償民乃止自是貴人遇者皆莫敢縱王忱趙州人性明敏有才識授山北遼東道提刑按察司副使駙馬博和哩數獵民田忱以法繩之憲吏耿熙言徵北京宣慰司逋負計可得鈔二十萬錠帝遣使覈實熙懼事露擅增制語有并打算大小一切諸衙門等事十二字追繫官吏至數百人忱驗知其詐熙乃服罪博和哩舊作伯忽里今改正多爾濟巴勒穆呼哩七世孫順帝至正中為遼陽行省平章政事詢民疾苦知鄉民負販入城貴室公府皆强買之僅酬半值又其俗編柳為斗大小不一市儈得高下其手民咸痛之卽飭有司厲防禁齊稱量於是諸物畢集而價自平恤孤老平錢法汰胥吏愼勾稽興廢墜明賞罰百司聞風悚懼多爾濟巴勒舊作朵爾直班今改正伊蘇蒙古人至正初以討賊功累遷金紫光祿大夫知樞密院事旣而雷特穆爾布哈程思忠等陷永平伊蘇復灤州及遷安昌黎等縣擒雷特穆爾布哈程思忠棄城遁去詔拜遼陽行省左丞相開省永平時金復海蓋賊並起伊蘇分兵防守斬賊渠魁賊衆潰走於是分命官屬勞來安輯使民什伍相保以事耕種民為立石頌之伊蘇舊作也速雷特穆爾布哈舊作雷帖木兒不花今並改正姚樞本柳城人後遷居洛陽至元二十年為遼東按察使時人比之包孝肅云明葉旺馬雲旺六安人雲合肥人洪武四年以都指揮並鎭遼東八年納克楚寇遼東見城有備不敢攻越蓋州至金州為指揮韋富等所敗還至蓋城南十里沿柞河遁歸旺先以兵㧖柞河自連雲島至窟駝寨十餘里沿河壘冰為牆旁設坑穽㐲兵以伺雲及指揮吳立周鶚等建大旗於城中嚴兵不動寂若無人敵至伏四起納克楚倉皇北走趨連雲島遇冰城馬不能前悉陷於穽遂大潰旺等乘勝追擊至豬兒峪納克楚僅以身免第功進旺及雲為都督僉事久之召雲還京旺留鎭如故在遼凡十七年翦榛棘修城隍建立官府撫輯軍民墾田萬餘頃遂為永利孟善海豐人永樂元年以保定侯鎮遼東在鎮七年遠人􅍁附劉江宿遷人永樂中以左都督鎭守遼東時倭以三千人突寇金州江發兵殱其衆初江閲地形得望海堝勢高峻扼海咽喉特為增築及偵倭至伏兵山下别遣奇兵焚舟斷其歸路倭中伏擒斬且盡自是遼東倭寇遂絶以功封廣信伯巫凱句容人宣德初以都督僉事充總兵官鎭守遼東敵掠西山凱擊敗之盡得所掠者降勅襃勉時帝勤遠略造舟松花江招諸部地絶遠轉輸大困凱力請罷之已而造舟役復興中官阮堯民都指揮劉清等董之所為多不法凱劾堯民等下之吏凱性剛毅饒智略馭衆嚴而有恩在遼東三十餘年威惠並行邊務修飭前後守邊者皆莫及正統三年卒於官曹義儀眞人正統初代巫凱為總兵官凱名將義承其後廉介有守遼人皆安之王翺鹽山人正統七年以右僉都御史提督遼東軍務時遼東將屢失機翶以軍令久弛因諸將庭謁責以失律罪命左右曳出斬之皆惶恐叩頭願効死贖翶乃躬行邊自山海關抵開原繕城垣濬溝塹五里為堡十里為屯使烽燧相接練將士恤鰥寡軍民大悅又以邊塞孤遠軍餉匱乏緣俗立法令有罪得收贖人皆便之劉孜萬安人正統十年以御史出按遼東劾鎭守中官伊實哈收養義子家人有反狀景泰初以邊務方殷孜能懾服將吏期滿復留程信休寕人正統中以山東右參政督餉遼東巡撫寇深奏盜糧一石以上者死又置新斛視舊加大屬信鉤考信立碎之曰奈何納人於死深由是不悅尋以憂去天順初擢左僉都御史廵撫遼東造戰車剏義倉貯芻粟稽侵漁察奸細號令一新僉事胡鼎發都指揮使夏霖四十罪信以聞下霖錦衣獄門達言信不當代奏帝責令陳狀信疏辯而寇深方掌都察院修前隙乃劾信不輸罪徵下詔獄謫降南京太僕少卿李秉曹縣人成化二年以左都御史提督遼東軍務至卽劾鎭守中官及總兵失律罪出都指揮裴顯於獄又舉指揮崔勝傅海等軍令肅清彭誼東莞人成化四年以右副都御史巡撫遼東時鎭守中官横徵諸屬衞誼下令凡文牒不經巡撫審定者所司毋輒行虐燄為息戸部檄所司開黑山金場力奏罷之誼平居謙厚簡黙臨事毅然有斷鎭遼八年軍令振肅後四疏告歸歐信世職金吾衞成化七年充總兵官鎭守遼東累破福餘三衞被獎言者謂信雖廉已老請詔還巡撫彭誼奏官軍耆老皆言信忠謹有謀勇累立戰功威振邊陲年雖六十騎射勝壯士乃留鎭馬文升鈞州人成化十二年以兵部右侍郎提督遼東軍務巡撫陳鉞貪而狡將士小過輒罰馬馬價騰踊文升上邊計十五事因請禁之鉞於是與文升有隙文升還部鉞以掩殺冒功激變帝命文升往馳至鎭宣璽書慰撫無不聽撫者事方定而鉞諂事中官汪直日夜諧文升直因誣奏文升遂下詔獄謫戍重慶衞直敗復起為左副都御史巡撫遼東凡三渡遼軍民聞其來皆鼓舞禁抑中官總兵使不得朘削衆咸德之强珍滄洲人成化間以御史巡按遼東初遼東巡撫陳鉞起釁召敵敵至務為欺蔽巡按王崇之劾鉞鉞謀之汪直誣逮崇之下詔獄及直鉞用兵方論功而敵大入匿不以聞鉞遂入為戸部尚書珍往巡按請正鉞罪帝弗從未幾指揮王全等誘殺諾延衞人珍發其狀直方自矜有大功聞珍疏怒誣珍所核皆妄坐謫戍遼東居三年直敗復官李善隴州人成化間巡按遼東時總兵官羅雄武備廢弛太監韋朗侵漁兵餉縱其下奪人妻孥聞善至遂屏息論劾都督王鍇孫貴罷去豪右斂迹張鼐厯城人宏治十五年以右僉都御史巡撫遼東時軍政久弛又許餘丁納貲助驛遞給冠帶復其身邊人競援例避役鼐言不可因條上核屯糧清隱占稽客戸減軍禆數事悉允行尋劾分守中官劉恭等貪虐罪築邊牆自山海關迄開原靉陽凡千餘里遼撫自徐貫後厯張玉陳瑶韓重四人多得罪去至鼐稱能正德中移撫宣府馬中錫故城人正德初以右副都御史巡撫遼東還屯田於軍劾鎭守太監朱秀置官店擅馬市諸罪馭吏安民上下帖服李承勛嘉魚人正德中以右副都御史巡撫遼東時邊備久弛開原尤甚士馬纔十二城堡墩臺傾圮殆盡將士依城塹自守承勛疏請修築㑹世宗立發帑銀四十餘萬承勛命步將四人各一軍守要書身負畚鍤先士卒