河在阜寧縣東北上承西坎運料河下達射陽湖本朝乾隆十一年濬串場河南北有二一在鹽城縣東南自泰州及興化縣流入繞范公隄北流經伍祐場至縣西會鹽河由石䃮閘入新洋港出海一在縣治西北其水由汊河分支經新興場上岡鎮繞范公隄東北流七十里至阜寧縣入射陽湖出海即運鹽河也明時所開歲久淤塞本朝康熙四十五年特遣都統孫查齊開濬長二萬五千八百四十四丈在鹽城境者自便倉起至石䃮口止長六千五百四十一丈二尺由是積水暢流歸海雍正六年復遣官浚治築隄置閘乾隆八年重濬十八年又濬自是淮揚二郡下河之水有所宣泄水害永除而淮南鹽竈利賴無窮矣官河有二一在鹽城縣西南四十里馬鞍湖西南源出大蹤湖北入鹽河東入東塘河一在安東縣北三十里源自西漣河南通中漣河東北至縣東北七十里五港口接遏蠻等河通海州諸鹽場明嘉靖四十五年挑濬深通為商旅輻湊之道二河於本朝乾隆九年濬又封子河在鹽城縣西十八里自馬鞍湖分流東入官河乾隆十年濬東界河在鹽城縣西南八十里自揚州府興化縣流入定港為河與興化縣分中流為界西流由東塘河入射陽湖又西界河在縣西南一百里自舊運河分流達石䃮口亦與興化縣分中流為界西北入射陽湖本朝乾隆三年挑浚九年又浚又岡溝河在縣西南二十里自界河分流北合鹽河乾隆二十二年浚鹽河有二一在鹽城縣西上流會大蹤諸湖之水東流經縣西會串場河又東出石䃮天妃二口匯新洋港入海本朝乾隆二十四年浚一在清河縣中河北岸康熙二十六年開浚分中河水東北厯山陽縣朱元莊至安東縣界毗連海州趨串場河達葦蕩入海每年六七月開放建築大隄以衛田疇遇有淤塞隨時疏浚以濟鹽運新陽河在鹽城縣西百十里自大蹤湖合流為河達射陽湖東塘河在鹽城縣西北五十里源出大蹤湖西北流通官鹽二河入射陽湖又西塘河在縣西北九十里亦出大蹤湖西北流徑馬長汀入射陽湖凡廟灣運鹽者皆由東西塘河經大蹤湖達揚州府興化縣興化諸水亦由此泄入射陽湖歸海又九曲河亦在縣西五十里自馬鞍湖分流西北合東塘河俱於本朝乾隆五年十一年浚蘆溝河在鹽城縣西北六十里即東西二塘河合流處也又西北貫高姥張岐二塘北徑侍其汊入射陽湖上岡河在鹽城縣西北六十里舊名廖家港其水自東塘河東北流至上岡鎮入北串場河本朝乾隆五年浚改今名二十八年重濬草堰河在鹽城縣西北七十五里舊名院道港其水由東塘河東北流至草堰口入北串場河本朝乾隆五年濬改今名二十三年重濬淮河在清河縣南自安徽泗州流入匯為洪澤湖至縣西北清口黃河自西北來會之又折東北經山陽安東阜寧三縣境入於海其下流今通謂之黃河水經淮水徑盱眙縣又東北至下邳淮陰縣西泗水從西北來注之人東過淮陰縣北中瀆水出白馬湖東北注之又東兩小水流注之又東至廣陵淮浦縣入於海寰宇記淮水在淮陰縣西二百步禹貢錐指淮水又束北徑清河縣南與泗水合謂之淸口又東北徑山陽縣北又東北徑安東縣又東北入於海此導淮會泗沂東入海之故道也自元時河奪汴泗以入淮而兩瀆并為一瀆清口以東淮悉成河矣又漢志云至淮陵入海淮陵故城在今安徽盱眙縣西北八十五里此地距海甚遙淮何得於縣界入海淮陵乃淮陰之訛也縣志自安徽盱眙縣龜山益折而北又二十餘里而洪澤阜寧泥墩萬家諸湖環匯於東岸又東北至縣東南五里為運河口折而北五里合大河為黃淮交會之衝河自北而來河身比淮為高故易以遏淮淮自西而來淮之勢比清江浦又高故易以嚙運病淮必至於病運者莫如河利淮即所以利運者莫如淮黃運兩河之樞機實皆自淮操之明河渠考初淮自安東雲梯關入海無旁溢患逮與黃會黃水勢盛奪淮入海之路淮不能與黃敵往往避而東陳瑄鑿清江浦因築高家堰舊隄以障之淮揚恃以無恐而鳳泗間數為害嘉靖十四年總河劉天和築隄以衛泗陵而高堰方固淮暢流出清口隆慶四年濬淮工竣淮益無事至萬厯三年高家堰決高寶興鹽為巨浸而黃水躡淮且漸逼鳳泗會河從老黃河奔入海淮得乘虛出清口六年總河潘季馴言高堰淮揚之門户而黃淮之關鍵也欲導河以入海必藉淮以刷沙淮水南決則濁流停滯清口亦湮河必決溢上流而邳徐鳳泗皆為巨浸皆淮病而黃病黃病而漕亦病相因之勢也於是築高堰隄長八十里使淮不得東又以淮水北岸有王簡張福二口泄入黃河水力分清口易淤淺且黃水多由此倒灌入淮乃築隄捍之使淮無所出黃無所入全淮畢趨清口會大河入海十九年淮水溢泗州自後連年東決高良澗西灌泗陵遣給事中張企程往勘議者多請拆高堰總河楊一魁與企程不從而力請分黃導淮乃建武家墩涇河閘泄淮水由永濟河達涇河下射陽湖入海又建高良澗及周橋減水石閘以泄淮水一由岔河入涇河一由草子河寶應湖下子嬰溝俱下廣洋湖入海又挑高郵茆塘港通邵伯湖開金家灣下芒稻河入江以疏淮漲而淮水以平其後三閘漸塞崇禎間淮黃漲溢議者復請開高堰淮揚在朝者公疏力爭議遂寢然是時建義諸口數決下灌興鹽淮患日棘矣本朝康熙二十八年聖祖仁皇帝南巡閲高家堰諭朕於治河之事究心年久黃淮水勢相敵則清口刷而海口通淮水弱則黃水倒灌河底淤墊隄勢危而海口塞矣高家堰既有減水壩不可又令分流使淮河水弱四十二年諭向來黃河水高六尺淮河水低六尺不能敵黃所以常患淤墊今將六閘堵閉洪澤湖水高力能敵黃則運不致有倒灌之患四十六年諭天然壩一帶舊有河形當挑濬此河酌量可容漕艘建立閘座水小則閉閘蓄湖水以敵黃水大則開閘使之暢流一面由武家墩通至運河一面通至高部湖則商民船隻皆得長行似為永久利益又諭清口湖水七分敵黃三分濟運今應將大墩分水處西岸草壩再加寬大挑淸水多出黃河一分少入運河一分則運河東隄不致受險又於蔣家壩開河建閘引水由人字河芒稻河下江由下河及廟灣等處入海不惟洪澤湖之水可以宣泄而盱眙泗州積水田地亦漸次涸出水小則下板蓄水敵黃水大則啓板泄水且便於商民舟楫往來其祥符閘口門甚窄趁此黃水不甚高之時將歸仁安仁利仁三閘改寬泄水則徐州一帶民田可無淹沒之慮乾隆十六年高宗純皇帝南巡臨幸淮安諭朕經過淮安見城北一帶內外皆水雖有土隄為之防而人煙湊集之區設有異漲其何以堪亟應改建石工以資保障著總河高斌等會同總督黃廷桂確勘詳估及時建築二十二年諭五壩之水泄自洪湖但使洪湖之水從清口暢流會黃入海則黃水不致倒灌之虞而五壩之過水似可稍減向以河臣惟恃護隄轉致河漲遂有一潰難收之勢而清口則收束迫隘託言濟運不知近日運河之水患其多不患其少前曾降旨白鍾山等以清口東西二壩古人具有深意惟淮水力弱則資其堵禦并力刷黃淮水漲盛則早為宣泄以減其勢至於五壩則不得已而設此尾閭也因令於五壩過水一寸則東壩開寬二丈過水二寸則開寬四丈以期宣泄通暢不致奔溢五壩以為下河之患可將此旨勒石於清口及運河東壩俾治河諸臣永逺遵行二十七年諭朕閲視高堰隄工自武家墩迤北於乾隆二十二年命建甎工以來整繕堅緻足資保障惟由濟運壩至運口五百餘丈許尚存土壩之舊未免間有汕刷宜一律接建甎工以期鞏固河道總督高晉即遵諭行又諭江南瀕臨河湖沮洳之區南則高寶甘泉北則宿清海沭最稱窪下每遇伏秋大汛霖潦堪虞而下遊蓄泄機宜惟洪澤一湖尤為關鍵昨駐蹕蘇城時先命大學士劉統勳協辦大學士兆惠會同督撫河臣將歸江歸海諸路詳悉標志朕回鑾取道按閲講求指示其在高寶一帶應宣導歸江者自邵伯以下如灣頭閘壁虎橋鳳凰橋等處河身寬展足資分泄惟金灣滚壩寬五十丈而新開引河僅寬十五丈砥寬八丈未能暢達應再為展寬以河砥十文為率迤下地勢稍仰並挑濬深通俾成建瓴之勢又東灣滚壩前年巳改落低三尺而西灣壩尚仍其舊諸臣議請一體落低三尺朕量該處泄水情形至為便捷應再落一尺共低四尺則平日巳有尺水入江循序而進庶可豫減暴漲之勢其金灣六閘應拆去中二閘添建石壩接築土隄並量挑引渠湖水自無閼壅之患然此特為三湖旁疏曲引起見耳若其溯源挈要為釡底抽薪之䇿莫如廣疏淸口乃今第一義現在測驗洪湖高堰五壩高於水面七尺及七尺五寸不等清口口門現寬二十丈當即以此酌定成算將來俟兩壩之水如再長三尺清口不必議展如長至四尺即將清口拆寬十丈湖水以次遞長則清口以次遞寬總以上壩增一尺之水下口加寬十丈之門為準其或入夏後水勢旋長旋落不必急事堵塞以過秋汛為定逐漸收口仍至二十丈或十數丈如此則全湖勢暢以視求助於分支别派者其功奚啻倍蓰哉至駱馬湖水由永濟橋東注為六塘河源流既遠所受支河甚多河中淤埂阻滯溜勢一遇暴漲猝難容泄田廬易致漫淹應視兩岸中間窄狹者再加寬展切去河中淤埂俾遊波寬緩不致出槽隄身淺缺者量為修補以資捍禦其六塘河尾閭橫經鹽河由東岸武障等河下泄入海原設條石滚壩為過水之準其旁並設草壩水小則蓄水運鹽水漲則拆壩消水商利蓄而民利消彼此各爭其便當權其緩急利害立定限期以時啓閉其草壩以下各有引河及六塘河北岸之丁家溝南岸之馬家河鮑營河形勢紆曲阻塞者均如諸臣所請估挑辦理務使通流以達於海所有應添石壩大隄及一切疏浚各工該督撫河臣會同鹽臣核議以聞按有明以來淮不敵黃為患滋久聖祖仁皇帝躬親相度洞悉機宜自清口闢而黃不倒灌自六壩閉高堰築而全淮併力我高宗純皇帝臨工閲視睿慮周詳疏清口以暢其流通江海以消其漲昔之黃強淮弱者今則淮強黃弱矣安瀾之績利賴萬世謹録聖祖仁皇帝諭旨四條高宗純皇帝諭旨四條以見治河大要其厯年修築詳見運河及高家堰下崇河在清河縣南崇河集前自徐州府宿遷縣劉老澗分流東經桃源縣北四十里又東經清河縣界會沭河支流入東通安東縣漣河相傳石崇所鑿故名久淤鮑營引河在清河縣南鮑家營本朝康熙四十二年聖祖仁皇帝南巡命於王家營迤下鮑家營疏引河泄黃河漲水由張家集范家河三岔口厯石項湖入五丈河下潮河入海兩岸築隄於河口建壩以時宣泄乾隆八年二十七年屢濬郭家河在清河縣西宣泄魚溝浪石龍窩等處民田積水入民便河下注南六塘河達海本朝乾隆九年濬民便河在清河縣西上承桃源縣民便河水趨安東縣南股六塘河達海又西北小民便河亦宣泄縣境桃源縣民田積水注響水河下注南六塘河達海俱於本朝乾隆九年濬二十三年五十八年俱重濬周橋河在清河縣西宣泄漁溝東北灣周家東西二塘積水入民便河下注南六塘河達海本朝乾隆九年濬包家河在清河縣西上自桃源縣遙隄竹絡壩起及縣內永豐金城等鎮民田積水由包家閘趨注達海本朝乾隆二十三年濬屠家河在清河縣西宣泄桃源縣隴溝一帶民田積水至響水河入包家河下注南六塘河達海本朝乾隆二十三年濬營河在清河縣西北胡賢口北其左右皆軍營田故名府志康熙十年河決桃源七里溝三汊下流沙澱漕艘回空者由新河入營河南經半邊店娘子莊迤東南出王家營溯於淮大澗河在清河縣西北分泄民田積水入安東縣南六塘河達海本朝乾隆九年濬周家河在清河縣西北接泄桃源縣民便河之水至響水河入包家河匯注南六塘河以達海本朝乾隆二十三年濬馬家河在清河縣西北上承劉皮澗等處大河積水入大澗河韋家閘歸安東縣南股六塘河達海本朝乾隆二十八年濬中河在清河縣西北即運河下流也由清口出黃河順流數里至縣西楊家莊入口又西北經桃源縣東又北經宿遷縣東至駱馬湖口入新河按運河舊由清口達張莊厯黃河險溜二百里每遇風濤動淹兩月康熙二十六年特命河臣於黃河北岸遙縷隄內加挑中河一道上接張莊運口及駱馬湖之清水下厯桃清山安入海糧艘既出清口即截流徑渡由仲家莊閘直入中河北上又開鹽河一道自清河縣至安東潮河入海用泄暴漲三十一年仲家莊迤下陶家莊地方添閘一座兩閘行運三十二年建兩岸子隄以東水勢又於仲家莊陶家莊兩閘左右各添建一閘以利節宣三十八年以南岸窪下子隄不能建久於盛家道口起挑新中河一道改北岸為南岸另築北隄嗣因新河河頭灣曲三義壩迤上河身淺窄復築攔河隄一道改舊中河入新中河合而為一壩以上糧艘由舊中河壩以下仍由新中河四十二年以仲莊閘口與淸口相直水勢衝激逼溜南行清口水不得暢出遂改建閘口於楊家莊起黃河崖至中河鹽壩桃引河一道更築南隄二千九十餘丈北隄二百三十餘丈建御示閘及花家莊鹽壩自是清水暢流蓄泄有賴重運遄行無阻靳輔治河書自南北通運以來浮黃河而達者凡五百餘里明河臣李化龍開泇河以避黃河三百里之險至今賴之嗣後直口塞董口淤駱馬湖淺澀河臣因有開皂河之請而泇河之尾閭復通然自清口以違張莊運口河道尚長二百里重運泝黃而上日不過數里運者或至兩月方能進口而漂失沈溺往往不免蓋風濤激駛固非人力所能勝也康熙二十五年加築北岸遙隄後復加籌酌若於遙縷二隄之內再挑中河一道上接張莊運口并駱馬湖之清水下厯桃淸山安入平旺河以達於海而於清口對岸清河縣西仲家莊建大石閘一座既可以泄山左諸山之水而運道從此通行避黃河之險溜大利也乃決計題請興工至二十七年正月工竣連年重運一出淸口即截黃而北由仲莊閘進中河以入皂河避黃河之險二百里抵通之期較厯年先一月蓋自唐宋元明漕東南以濟西北者無不仰藉黃河以為灌輸既欲去其害又欲收其利故治河愈難至我朝而運道之利黃河者僅七里矣或議於中河北岸宿遷境內建減水壩數座以泄漲者臣曰不可蓋中河之水但患其弱而不患其強若北岸遙隄減壩一建則清水弱而黃必有內灌之憂河身立淤矣惟將遙隄再加高厚更於中河之北挑重河一道即以挑河之土築成重隄於西安錫成兩橋之間建閘一座既以分泄東省之異漲又以灌溉宿桃清等七州縣之田畝即遇黃淮並漲亦可分泄入中河以并出平旺歸海真永賴之䇿也又運艘自清口入仲家莊閘雖曰截流而北然逆流而西者居多若於清河治東陶家莊再建一閘重運由陶莊而入回空由仲莊而出則俱順流矣且兩閘並建用備不虞尤為萬全也河防志向者漕舟自清口出黃河溯流而上至支河口入運河康熙二十六年總河靳輔以黃河風濤之險請自駱馬湖鑿渠厯宿遷桃源二縣至清河仲家莊出口名曰中河三十八年總河于成龍因桃清中河南岸逼近黃河地勢卑下瀦水瀰漫難以築隄乃自桃源盛家道口至清河棄中河下段改鑿六十里名曰新中河次年總河張鵬翮又以新中河淺狹未足行運且盛家道口河頭灣曲漕船挽運不順乃於三義壩以下用新中河之半三義壩以上用舊中河之半合為一河重加挑浚四十二年聖祖仁皇帝南巡駐蹕清口諭仲莊閘清水出口逼流使南恐運口有礙乃移建閘座於陶家莊迤下楊家莊令中河之水從此出口於是運道大通漕艘利涉矣乾隆四年修築中河隄岸八年大浚淤塞並建涵洞十座十一年修築竹絡壩口門引黃入運十六年疏濬閘下引河二十三年修築清河縣鹽河石閘以資蓄泄高宗純皇帝六次南巡並有御製閲中河楊莊口詩恭依聖祖仁皇帝楊莊閘詩韻詩五十二年接築雙金閘楊家莊等壩五十五年復築五十六年改築中河東岸鉗口壩舊志自清河縣楊莊運口起至桃源縣交界三岔止計程一十七里自桃清交界三岔起至宿遷境內張莊運口止計程一百四十里有奇線河在清河縣北一名泄河泄縣內之水入縣西北金家湖迤東北達蔣家湖至浪石鎮東入吕家蕩出九衝口由搭連溝下大防河達安東縣新安鎮入海市河在安東縣東百餘步即大東二城相間之城濠也自中漣入澳河澳河在縣東南百步許一名龍潭南臨淮河古寨河在安東縣西北三十里西接西漣東南至縣西北十五里為成子河又南至縣西十五里為支家河又南通山陽新溝至縣西南十二里入淮河宋史河渠志元符元年工部言淮南所開修楚州支家河導漣水與淮通賜名通漣河又王宗望為江淮發運使楚州沿淮至漣州風濤險舟多溺議者謂開支氏渠引水入運河歲久不決宗望始成之為公私利明河渠考洪武二十七年濬山陽支家河縣志有響水河在縣西一里明洪武三年開引支家河中漣水南流入淮又大防河在縣西二十里西接清河澗東入支家河漣河在安東縣北源出碩護湖分為三曰中漣東漣西漣即古遊水也漢書地理志臨淮郡淮浦遊水北入海水經注淮水於淮浦縣支分北為遊水厯朐縣與沭合又沭水東南至朐縣入遊注海元和郡縣志漣水縣沭水俗名漣水西南自海州沭陽縣流入寰宇記漣水縣北漣水西自沭陽縣界分流南入縣界在沭陽名漣水入縣界名北漣水南流四十九里與南漣水合流于欽齊乘沭水南至沭陽縣入桑塸湖由湖東入於海沭水至此正名漣