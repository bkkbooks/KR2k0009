水大漲奇風猛浪倍異尋常而洶涌之勢一遇坦坡而其怒自平惟有隨波上下無所逞其衝突始知坦坡之力反有倍蓰於石工者故障淮以會黃者功在隄而保隄以障淮者功在坦坡也惟是填積坦坡以來垂及十載風濤之所汕刷平鋪卸去離隄巳四十五丈矣若用帑填積既所費不資又功程難見應每年令河兵歲夫逐漸加功立為定制每歲隄工一丈填王二方務使所增之數適稱所耗之數如是久之離隄百丈之內必漸墊而高因叢植柳蘆茭草之屬俟其根株交結茂盛蔓延則雖狂風動地雪浪排空終不能越百餘丈之茂林深草而潰隄矣雍正七年世宗憲皇帝特發帑金一百萬兩遣官督修八年幫築高堰壩下河隄九年復大修高堰石工至十年而石工告成乾隆四年增築高堰隄工十六年高宗純皇帝南巡親示機宜仁義禮三滚壩下添建智信二壩並立水則以次遞開而天然壩則永禁開放有御製閲高堰工詩閲高堰壩示河臣詩十九年二十年大修石隄工三千六百餘丈並修高堰草壩一百九十八丈二十二年命於武家墩迤北改建甎工有御製閲高堰工詩二十四年將高堰馬鞍柴工改建石工二十七年命自濟運壩至運口太平莊止一律接建甎工有御製命築高堰甎工詩三十年四十五年四十九年並有御製閲接築高堰隄工詩五十九年風損高堰石工自武家墩起至山盱所屬之蔣家壩止嘉慶十年高堰大隄於舊工卑矮處所間段加高石工普律加幫土工尋以江省操運石塊辦理竭蹶石工改用甎工計一萬一千七百六十餘丈十三年加築高堰大隄後創土坡十四年議築碎石坦坡大隄甎工仍改石工十六年議加培二隄仁宗睿皇帝諭高堰大隄須熟籌經久之策朕因保障民生節年來頒帑已至四十餘萬兩若果碎石坦坡有效豈復惜此區區惟現有坦坡處所大隄仍不免塌缷二隄在大隄之外該處保障究恃大隄若大隄不得力二隄豈復可恃此時自應將大隄殘缺之處補築齊全然後再將二隄築辦如式可收重門保障之益十七年培築大隄後創及大隄子堰岡門鎮堰在鹽城縣西府志自岡門至新河轉至侍其汣皆有古堰徑口堰在鹽城縣西二十一里岡門鎮西府志東臨運河西達馬鞍湖以通商賈侍其汊堰在鹽城縣西北一百里府志歲旱塞之以資灌溉遇潦則決之入射陽湖相傳油葫蘆港出口數里即其處今廢廣惠䃮在鹽城縣東門外二里即石䃮口也府志䃮舊捍海潮名白波湫遇運河水溢則從此決入海以殺水勢夏秋海潮浩大亦由此衝入浸田宋淳熙六年教授劉煒攝縣事始甃甎石紹興五年知縣徐挺之重修明洪武三十九年主簿蔡叔瑜重修今廢南河全考萬厯二年漕臣王宗沐修鹽城石䃮海口以疏下流入海之路淮南水利考石䃮口在鹽城縣東北八里凡高郵興化鹽城之漲皆由此入海凡射陽湖水多黃沙亦漫至此南至興化縣志在縣東門外一里舊有木橋以便往來後潮長橋壞明萬厯四年知縣杜善教請濬河建閘河通潮湧至敗民田居民溺死者不可勝計八年巡鹽御史薑璧題請築塞命知縣楊瑞雲督塞之仍於石䃮别置閘以備宣泄自是海潮無衝決之患矣大通䃮在鹽城縣北門外三里明洪武二十九年主簿蔡叔瑜建即天妃口也縣境大蹤諸河及串場河之水皆由石䃮天妃二口匯入新洋港歸海而天妃尤為緊要自閘座久廢內河之水無以蓄泄海潮灌入地成斥鹵民地屢受其患本朝雍正七年大濬淮揚下河於石䃮口建閘一座天妃口建閘十座以時啓閉自是旱潦有備水患永安五壩在府城北明永樂中陳瑄建漕河考永樂十三年建淮安五壩仁義二壩在新城東門外東北自城南引湖水抵壩口外即淮河遇清江口淤塞運船經此入淮禮智信三壩在新城西門外西北引湖水抵壩口外即淮河遇清江口淤塞則官民商船經此入淮萬厯六年河臣潘季馴奏舊置五壩信壩以近淮城係黃河掃灣久廢仁義二壩原共一口出船亦係黃河掃灣又與清口相鄰恐有意外衝漫不復修築止將禮智二壩修復與新莊閘為車盤三灞本朝康熙四十二年命於山旴汛建南北中滚水石壩三座三壩下挑河築隄束水入揚州府高郵州邵伯諸湖乾隆十六年以前三壩為仁義禮新增二壩為智信定為五壩三十四年仁義禮三壩添築子堰三十八年封築智義二壩五十二年補修五壩壩砥工程嘉慶十三年修築智禮二壩十八年議另建仁義禮三壩先挑仁義兩引河十九年拆建智壩石砥二十一年挑禮宇引河二十二年建仁義禮三壩於蔣家壩迤南二十四年接挑禮字引河河尾南鎖壩在山陽縣西南一里其地舊有甎閘宋時運糧由此至洪澤入淮明洪武十年開菊花潭以通舟楫閘遂廢六壩在山陽縣西南高家堰上自北而南曰武家墩曰高良澗曰周家橋曰古溝東曰古溝西曰唐埂又南為翟家壩皆本朝康熙十七年築以泄淮水之漲三十九年改建三滚水壩并天然壩二座河防雜記武家墩壩長十丈高良澗壩長十丈二尺周家橋壩長十四丈古溝東壩長三十四丈五尺古溝西壩長五十三丈五尺唐埂壩長四十八丈二尺河防志周橋迤南舊減水壩六座康熙三十五年大水衝決三十九年堵塞改建滚水石壩三座南北兩座各寬七十丈中一座寬六十丈建天然草壩二座一寬六十丈一寬六十二丈三尺鳳陽廠壩在山陽縣西北運河西岸本朝康熙十九年築減清江閘上流之水由運料新河厯楊家廟入山陽運河滿浦壩在山陽縣北門外四里府志地接窰溝板閘歲潦不常長隄為障陳家莊挑水壩在清河縣東黃河南岸本朝康熙三十九年建河防志康熙三十八年聖祖仁皇帝南巡駐蹕於此相度河勢親定方所命築壩挑黃水北入陶莊引河不致逼向運口有衝決之患今稱為御壩雍正八年復於御壩下接築頭二三壩並建御書亭後築掃工