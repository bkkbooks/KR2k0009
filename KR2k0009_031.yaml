body:
  text: 秦屬九江郡漢為射陽鹽瀆淮陰等縣屬臨淮郡西北境置泗水國即楚國地北境為東海琅邪二郡他後漢分屬廣陵郡及下邳國射陽鹽瀆屬廣陵淮陰淮浦屬下邳三國屬魏晉初為廣陵郡治宋書州郡志廣陵郡治淮陰後徙射陽義熙七年始分射陽地置山陽郡西境置淮陽濟陰二郡宋泰始二年於淮陰置兗州北境置青冀二州西境入魏齊曰北兗州南齊書州郡志北兗州鎮淮陰宋泰始二年失淮北於此立州鎮建元四年移治盱眙後復故而山陽郡屬南兗州梁改曰淮州西境初屬魏置東徐州中大通四年入梁改曰武州東魏因之兼領山陽淮陰二郡西境仍曰東徐州北齊廢淮陰郡周僑置東平郡隋開皇元年改郡為淮陰尋與山陽郡俱廢十二年置楚州移治山陽大業初州廢屬江都郡西境置下邳郡北境置東海郡唐武德四年於山陽置東楚州八年更名楚州天寶初復曰淮陰郡乾元初復曰楚州屬淮南道西境為徐州地北境置海州屬河南道五代唐天成三年楊吳升為順化軍後周顯德五年軍廢宋初曰楚州山陽郡隸淮南東路宋史地理志建炎四年置楚泗承州漣水軍鎮撫使淮東安撫制置使京東河北鎮撫大使嘉定初節制本路沿邊軍馬十年制置安撫使公事紹興間入金旋復紹定元年改州為淮安軍端平元年又改軍為淮安州元至元十四年立淮東路總管府二十年升淮安路屬河南行省明為淮安府直隸南京領州二縣九本朝屬江蘇江寧布政使司領縣六通志舊轄二州九縣雍正二年以贛榆沭陽屬海州宿遷睢寧屬邳州俱改直隸九年析海州鹽城地置阜寧山陽縣附郭東西距一百九十五里南北距一百二十里東至阜寧縣界七十里西至安徽泗州界一百二十五里南至揚州府寶應縣界八十里北至清河縣界四十里東南至鹽城縣界七十里西南至泗州盱眙縣界一百四十里東北至阜寧縣界八十里西北至清河縣界六十里本秦淮陰縣地漢置射陽縣屬臨淮郡後漢改屬廣陵郡三國時廢晉太康元年復置仍屬廣陵郡東晉後廢義熙中改置山陽縣兼置山陽郡宋齊至後魏皆因之隋開皇初郡廢為楚州治大業初屬江都郡唐為楚州治五代因之宋紹定元年改曰淮安為淮安軍治端平初為淮安州治元至元二十年仍曰山陽為淮安路治明為淮安府治本朝因之阜寧縣在府東北一百六十里東西距一百七十里南北距一百四十里東至海九十里西至山陽縣界八十里南至鹽城縣界五十里北至安東縣界黃河岸九十里東南至鹽城縣界一百五十里西南至山陽鹽城兩縣界九十里東北至安東縣界黃河口一百三十里西北至安東縣界六十里本山陽及鹽城二縣地本朝雍正九年析置阜寧縣屬淮安府鹽城縣在府東南二百四十里東西距一百九十里南北距一百三十里東至海一百里西至揚州府寶應縣界九十里南至揚州府興化縣界六十里北至阜寧縣界七十里東南至海一百里西南至興化縣界一百里東北至海七十里西北至山陽縣界一百四十里漢置鹽瀆縣屬臨淮郡後漢改屬廣陵郡三國時廢晉太康二年復置義熙中改曰鹽城屬山陽郡宋齊以後因之北齊置射陽郡陳改鹽城郡隋開皇初郡廢以縣屬江都郡隋末改置射州唐武德七年州廢復置鹽城縣屬楚州五代南唐割屬泰州宋太平興國三年還屬楚州紹興元年屬漣水軍三年還屬楚州元屬淮安路明屬淮安府本朝因之清河縣在府西五十里東西距八十六里南北距一百五里東至山陽縣界十里西至桃源縣界七十六里南至山陽縣界二十五里北至海州沭陽縣界八十里東南至山陽縣治六十里西南至泗州治二百十里東北至安東縣治八十二里西北至桃源縣治六十二里秦置淮陰縣漢屬臨淮郡後漢屬下邳國晉初為廣陵郡治東晉末徙屬山陽郡宋泰始中僑置兗州治淮陰南齊曰北兗州梁曰北雍州淮陰郡後改淮州東魏因之又置淮陰郡北齊廢為懷恩縣周改縣曰壽張又僑立東平郡隋開皇元年復改郡為淮陰兼立楚州尋廢郡改縣曰淮陰大業初州廢又并縣入山陽唐初復置武德七年有乾封二年復置屬楚州乾符中高駢置淮寧軍五代因之宋紹興五年廢為鎮明年復置咸淳九年始分西北界置清河軍及清河縣屬淮南東路元至元十五年廢清河軍以清河縣屬淮安路明屬淮安府本朝因之安東縣在府東北六十里東西距九十里南北距二百里東至阜寧縣界三十里西至海州沭陽縣界六十里南至阜寧縣界一百二十里北至海州界八十里東南至阜寧縣治七十里西南至淸河縣界六十里東北至海一百二十里西北至海州沭陽縣界六十里漢置淮浦縣屬臨淮郡後漢改屬下邳國晉屬廣陵郡宋屬臨淮郡後省明帝僑置東海郡及襄賁縣齊為北東海郡東魏武定七年改置海安郡隋開皇初郡廢改縣曰漣水屬東海郡唐武德四年於縣置漣州貞觀元年州廢改曰桃園縣屬淮安路明曰桃源縣屬淮安府本朝因之形勢水陸交通沃野有開殖之利方舟運漕亦無他阻晉荀羡北征議大江前流長淮卻阻唐李途記室新書俯臨淮海控制山東宋繫年録南北襟喉江淮要衝元董摶霄淮安議長淮奧壤表海名邦輿地紀勝風俗人多勇悍習戰爭晉伏滔正淮論淳實尚義務勤耕耨圖經俗多輕剽士任氣節隋書地理志漸漬聖化綽有儒風圖册城池淮安府城有三城南曰舊城周十一里門四水門二東晉時故址宋重築明初甃甎本朝康熙二十三年修二十八年乾隆五年重修其北曰新城周七里二十丈門五水門二元末土築明洪武十年甃甎本朝乾隆十一年修二城之中曰聯城門四水門四明嘉靖三十九年增築以聯貫新舊二域本朝乾隆九年修三十九年重修舊城濱運河新城濱淮河濠廣四丈深一丈二尺乾隆十六年二十二年三十年四十五年高宗純皇帝南巡俱有御製過淮安城詩山陽縣附郭阜寧縣城分山陽鹽城二縣地治廟灣城本朝雍正九年新築乾隆四年修鹽城縣城周七里有奇門四舊土城宋紹興間築明永樂十六年甃甎本朝乾隆三十三年修清河縣城本朝乾隆二十六年改築安東縣城周八里有奇門四水門一明萬厯二十六年土築天啓五年甃甎本朝康熙七年修桃源縣城舊址周八里門四明正德六年土築萬厯十九年重築周七百十八丈崇禎中河決城遂湮廢本朝順治康熙年間屢修乾隆元年嘉慶五年重修學校淮安府學在府舊城南門外宋景祐二年建建炎中燬嗣後屢建屢徙淳熙中復故址本朝康熙雍正年間屢修乾隆三年三十九年重修入學額數二十三名山陽縣學在縣治內即元蒙古學基明洪武四年建本朝康熙雍正年間屢修乾隆三年三十年重修入學額數二十一名阜寧縣學即廟灣鎮舊學舊為觀瀾書院今為學本朝乾隆三十五年修入學額數八名鹽城縣學在縣治南三百步宋紹興二十七年建本朝順治康熙年間屢修乾隆十二年重修入學額數二十一名清河縣學在縣治北本朝乾隆二十八年建入學額數二十名安東縣學在縣治東南明天順三年重建本朝順治十六年修雍正四年重修入學額數二十名桃源縣學在縣治南元至元中建明洪武初重建本朝康熙雍正年間屢修乾隆二年重修入學額數二十名淮陰書院在府城西南本朝乾隆六年建正學書院在鹽城縣明嘉靖十七年建崇正書院在清河縣明隆慶五年建臨川書院在清河縣十二年建本朝康熙三按舊志載仰止書院在府城東南隅名宦祠內明正德十一年建節孝書院在府城東門外二里明嘉靖中建正學書院在府學西志道書院在府城西南清江書院在府城北清江浦今俱廢謹附記户口原額人丁二十七萬一百六今滋生男婦大小共一百六十三萬七千五百九十一名口田賦田地七萬三千二百五頃九十畝六分有奇額徴地丁正雜銀十四萬四千七百九十三兩六錢三分八釐又雜辦銀一百二十八兩九錢七分二釐米麥五萬四百四十七石二斗九升山川鉢池山在山陽縣西北十五里以形似名岡阜盤旋凡八九里杜光庭七十二福地此其一也今隄此以禦河患老子山在清河縣西南一百里接安徽盱眙縣界一名老祖山霍山在清河縣老子山南形勢起伏一峯崒然跨盱眙清河之間女工山在桃源縣南相傳遠近婦女以衣兜土而成高數丈本朝順治十六年移城西娘娘廟建此金牛岡在山陽縣西北十里方與勝覽周世宗伐南唐嘗宿兵於此闊沙岡在阜寧縣射陽湖南自喻口起蜿蜒綿亙直抵鹽城一名大沙岡沙岡在鹽城縣西北南抵岡門鎮北距海濱接阜寧縣界延袤起伏約百三四十里鐵柱岡在鹽城縣北二里海岸上方輿勝覽故老相傳秦皇繫馬處丁家岡在桃源縣黃河南岸近因河砥墊高岡形漸窪九里岡在桃源縣西北四十里南逼黃河北近倉基湖本朝康熙十年增築月隄於此仙人洞在清河縣老子山西深二丈許下臨淮水四壁如削龍墩在鹽城縣西五十里九曲河西岸泰山墩在清河縣西南府志去馬頭鎮二里許即漂母冢後人因墩下有東嶽祠名為泰山墩陂澤中突兀一邱遠望如浮翠有閘鎖兩河之口按今天妃閘在墩北惠濟閘在墩南南北兩岸皆為運口三台墩在清河舊縣有三墩舊治坐中墩左右各一為之輔狀元墩在桃源縣東南半里桃花最盛蓮花墩在桃源縣西三十里縣志舊在水中央經厯沖漫凸起不沒周回有稜瓣如蓮花然青墩在桃源縣西北四十五里海自海州入安東縣東為淮水會黃入海之口其南岸為阜寧縣境又折而東南至鹽城縣東又東南接揚州府興化縣界元和志在漣水縣北百四十里寰宇記鹽城縣人以魚鹽為業擅利巨海山陽舊志在縣東二百里自鹽城縣折而西北有大海口為淮河入海處其南為廟灣廟灣之西為劉莊又西南為鹽城縣之姚家場皆沿海大鎮也大海口東南有蛤蜊麻線二港為窺伺之徑道鹽城舊志縣東至海三十里海口有三一為斗龍港一為新洋港由港而入一為石䃮口經縣之南一為天妃口經縣之北最北通射陽湖安東舊志在縣東一百二十里淮南水利考山陽縣廟灣海口在縣東北一百八十里凡山陽之漲水入射陽湖者自此入於海舊口闊一千六百餘步今闊六百步餘海口獨有沙潮落微露其形潮來則翻騰而上勢若排天潘季馴河防一覽議者因海壅河高致決隄四溢遂以浚海為上策不知漲沙當海口之中潮退則見潮長則沒縱乘潮退施工而一沒之後濁流淤泥隨復如故故海無可浚之理惟當導河以歸之海繕治河隄俾無旁決則合流勢勇沙隨水出海口自不虞淤矣本朝河臣靳輔於近口創築兩岸長隄一萬八千餘文使河不旁流以闢海口後以襀沙漸多築攔黃壩導黃河分由旁口入海而河流愈壅康熙三十九年特命盡毀攔黃壩賜名大通口乾隆三十年高宗純皇帝諭黃河入海停淤漸高不為經理恐久之不能保無梗阻四十一年河臣查勘黃河海口自雲梯關以下三百餘里至南北尖水中淤有暗灘但潮汐往來勢尚湍急雖不能建瓴暢流亦當不致阻滯四十四年三套等處水漫塌缷尋瑱補完整五十一年於北岸開挖二套引河冀黃河由北潮河入海旋亦淤閉嘉慶八年仁宗睿皇帝諭若不疏通海口尾閭河身仍多淤墊水勢日見其高僅於各工增卑培薄年復一年伊於胡砥十三年接築雲梯關外兩岸長隄藉以束水攻沙激溜歸海河臣奏明海口一帶寬深並無阻遏十五年諭海口為全河尾閭前人相度經營立法周備黃河千里一曲本天地自然形勢非人所能強總之下遊通暢則上遊方無壅遏之虞後之治河者自應遵守前規勿參私臆是年修復海口舊河大工挑濬張家莊以東二木樓以