五河而下將謀渡江非得楚州運河無緣自違願朝廷留意卒移守楚州北使過者觀其雉堞堅新號銀鑄城李孟傅上虞人為楚州司户參軍單車赴官公退閉户讀易郡守部使者不敢待以屬吏修復陳公塘有灌溉之利黃師雍福州人寶慶𥘉為楚州官屬出盜賊白刃之衝不畏不懾李全反狀已露師雍密結忠義軍别部都統時青圖之謀泄全殺青師雍不為動秩滿朝議褒異周子鎔理宗時淮安主簿為金所俘數遣蠟九諜報邊事後歸國授朝奉郎彭義斌理宗時為統制屯楚州李全殺許國牒義斌聽節制義斌斬齎牒人告天誓衆出兵敗全進攻真定降金將武仙衆至數十萬致書趙善湘曰不誅逆全恢復不成賊平之後收復一京三府然後義斌戰河北盱眙諸將襄陽騎士戰河南神州可復也未幾與元兵戰內黃之五馬山死之王孝忠為鎮江前軍統制兼淮東路分戍淮隂楊貴叛孝忠率衆迎戰勝氣百倍俄水軍統制朱信降賊孝忠孤軍力不敵死焉耿世安宋末為淮東副總管兩淮都撥發官元兵至制置使賈似道調世安提兵戍漣水軍世安迎至漁溝以三百騎入陳鏖戰身被七創猶能追殺潰兵收兵還至數里殁事聞贈五官元許維禎遂州人至元十五年為淮安總管府判官屬縣鹽城及丁溪場二虎為害維禎默禱於神祠一虎去一虎死祠前境內旱蝗維禎禱而雨蝗亦息是年冬無雪父老言於維禎曰冬無雪民多疾奈何維禎曰我當為爾禱已而雪深三尺朝廷聞其事方欲用之而卒梁曾燕人至元三十年授淮安路總管到官興學校勵風俗河南行省事有疑者皆委曾議之褚布哈石樓人至元中淮東副使汝潁盜發勢張甚布哈守淮安五年前後數十百戰城中食且盡賊攻圍益急總兵屯下邳相去五百里凡遣使十九輩告急皆不聽城中飢者至家人老稚更相食力既盡城陷布哈猶據西門力鬬中傷見執為賊所臠次子班格冒白刃護之亦見殺褚布哈舊作禇不華班格舊作伴哥今俱改正明薛祥瀘州人洪武初授京畿都漕運使分司淮安濬河築隄自揚達濟數百里繇役均平民無怨疾山陽海州民亂詿誤甚衆祥會鞫無驗者悉原之治淮八年民相勸莫為惡負薛公及考滿還京皆焚香祝天願薛公再來或寫真生祠之陳瑄合肥人永樂初封平江伯以總兵官督漕運時漕舟抵淮安率陸運過壩踰淮達清河勞費甚巨瑄用故老言自城西管家湖鑿渠二十里為清河浦導湖水入淮由是漕舟直達於河省費不資李信圭泰和人洪熙時知清河縣俗好發冢縱火信圭設教戒十三條令里民書於牌月朔望警戒且令書其勤惰善惡以聞俗為人變縣當衝要使節絡繹民罷於役信圭上疏乞申明前令公事亟者舟與五人緩者則否又請自儀真抵通州免其雜徭俾得盡力農田兼供夫役帝皆從之自是他郡亦蒙其澤正統元年擢知蘄州清河民詣闕乞留命以知州理縣事民田數百頃為淮安衛卒所奪奏還之天久雨淮水大溢奏請賑貸併停歲辦物料及軍匠廚役濬河人夫往來道死者為三大冡瘞之在清河二十二年擢知處州府彭遠南昌人宣德中知淮安府淮南北大飢流民四至逺搆舍以居日給二糜稍寬鹺禁全活者萬計民間故乏牛為假貸之後被誣當罷民擁中官舟乞為奏請宣宗命復留之王竑河州人景泰初以僉都御史出督漕運淮安徐州大水竑不待報發倉賑之山東河南飢民咸就食廩不能給發徐州廣運倉以賑乃自劾專擅罪并請令死罪以下得入粟贖帝命侍郎鄒幹齎帑金馳赴竑躬自巡行散賑不足則令沿淮上下商舟及富户出米以給飢民全活無算流徙復業病者給藥死者具槥鬻子女則贖而歸之還籍者豫道里費人忘其飢頌聲大作輯其事為救荒録以傳後淮人立祠祀之陳鋭瑄曾孫成化中以平江伯鎮淮安總督漕運建淮河口石閘築隄疏泉修舉廢墜淮揚飢疫鋭煮糜施藥多所存濟徐鏞興國人宏冶初知淮安府嵗飢亟修糴賑法循行鄉邑勸課農桑歲轉豐稔窮民苦無告者勸富室助其婚葬學校圯葺而大之程㸅南城人正德中知鹽城縣旱蝗民飢力行賑恤有冤獄論死者十九人為申雪之築隄捍決渠建水次倉便轉運諸為民興除利弊務殫其力楊宏西安左衛人世宗時督漕運鎮淮安悉心經畫多所釐正歲大飢疏請節民力寬商稅弛鹽禁減漕糧乞帑金易米煮粥存活萬計淮人立祠祀焉孫繼魯雲南右衛人嘉靖中知淮安府以清節聞織造中官過淮繼魯與之忤誣逮至京大學士夏言救免繼魯不謝邵元哲貴陽人萬厯初知淮安府城東澗河通射陽湖入海為輸灌咽喉久淤元哲白部使者濬之又築城西長隄以防黃河下流之決潘季馴烏程人萬厯六年為河漕尚書築崔鎮以防決口建高堰以東淮水凡四奉治河命前後二十七年習知地形險要增築設防置官建閘經理悉當淮民賴之著河防一覽十二卷練國事永城人萬厯末知山陽縣大水決隄國事躬捍衛兩月始平史可法大興人崇禎間督漕運大濬南河盡除弊政福王立以功進大學士與馬阮不協督師淮揚分江北為四鎮自王家營而北最衝要可法自任之年本朝乾隆四十一賜諡忠正本朝白登明蓋平人由貢生授河南柘城令擢江南太倉州康熙間起授高郵州知州值歲旱蝗繼又大水請蠲勸賑全活無算築湖隄嚴禁胥吏剋減以勞卒於官貧無餘資鄉里立祠私祀者凡四所云靳輔奉天人康熙間總督河道上陳河務事宜八疏悉奉俞允大發帑金專任委成輔治河十七年經理無不曲當既老病劇又疏陳兩河善後之䇿請豁開河築隄廢田之糧沿淮軍民感誦治績不衰著有治河書十二卷奏疏八卷齊蘇勒滿洲正白旗人康熙間總督河道蒞政清勤河防完固疏復瓜洲花園港運道建閘啓閉以順水勢堵瓜州城西新開河道以免江水逼城之患尤為偉績嵇曾筠無錫人雍正間總督南河疊遇山水暴漲相機堵泄淮民受其利旋奉命發帑大修高堰石工曾筠悉心經理屹然巨障下河七州縣恃以無患著河防奏議十卷人物漢韓信淮陰人家貧不得推擇為吏常從人寄食項梁渡淮信仗劒從之梁敗又屬項羽為郎中羽弗用亡楚歸漢滕公言於漢王以為治票都尉數與蕭何語何奇之信亡何自追之曰諸將易得如信國士無雙必欲爭天下非信無可與計事者於是漢王拜信為大將遂聽信計舉兵東出陳倉定三秦漢兵敗卻彭城齊趙魏皆反漢王以信為左丞相進兵擊魏虜魏王豹進擊趙代破代東下井陘擊趙破趙軍斬成安君擒趙王歇發使於燕燕從風而靡拜為相國發兵擊齊齊平遂立信為齊王將兵會垓下項羽死高祖徙信為楚王信初之國有變告信欲反帝用陳平謀偽遊雲夢信謁於陳縛之至洛陽赦為淮陰侯陳豨反帝自將信稱病不從其舍人弟上書變告信欲反狀吕后斬之枚乘淮陰人為吳王濞郎中王初謀為逆乘奏書諫不納去之梁從孝王遊景帝即位吳王與六國謀反乘復説吳王還兵疾歸吳王不用乘策卒見擒滅乘由是知名景帝召拜宏農都尉以疾去官歸淮陰武帝為太子聞乘名及即位乘年已老乃以安車蒲輪徵之道死枚臯乘子年十七上書梁共王召為郎見讒惡亡至長安上書自陳枚乘之子召見使賦平樂館善之拜為郎貴幸比東方朔從巡狩遊觀帝有所感輒使賦之陳球淮浦人少涉儒學善律令陽嘉中舉孝廉纍遷至廷尉熹平元年竇太后崩官者積怨竇氏中常侍曹節等欲别葬太后詔公卿大會朝堂令中常侍趙中監議既議坐者數百人各瞻望中官莫肯先言球曰皇太后以盛德良家母臨天下宜配先帝是無所疑便操筆下議公卿以下皆從之於是乃定六年遷司空尋免光和元年遷太尉明年為永樂少府與司徒河間劉郃謀誅宦官未發曹節聞之誣以謀議不軌下獄死子瑀吳郡太守瑀弟琮汝陰太守並知名臧􅌈射陽人有幹事才熹平中厯胸奴中郎將還京師太尉袁逢問其西域諸國土地風俗人物種數􅌈具答言西域本三十六國後分五十五稍散至百餘國其國大小道里遠近人數多寡風俗燥溼山川草木鳥獸異物名種不與中國同者口陳其狀手畫地形逢奇其才歎息言雖班固作西域傳何以加此轉拜長水校尉終太原太守臧洪􅌈子年十五舉孝廉補即邱長中平末棄官還家太守張超請為功曹時董卓圗危社稷洪説超誅除國賊為天下倡義超然其言與洪西至陳留見兄邈計事邈引洪與語大異之後袁紹以洪領青州刺史任事二年紹憚其能徙為東郡太守時曹操圍張超於雍邱甚急洪聞超圍徒跣號泣從紹請兵紹不許超遂族滅洪由是怨紹絶不與通紹興兵圍之城陷被執洪據地瞋目數紹紹知終不為用乃殺之陳容射陽人少為諸生親慕臧洪隨為東郡丞城未破洪先使歸紹容見洪當死謂紹曰將軍舉大事欲為天下除暴而先誅忠義豈合天意紹慙使牽出謂曰汝非臧洪儔空復爾為容顧曰夫仁義豈有常所蹈之則君子背之則小人今日願與臧洪同日死不與將軍同日生也遂復見殺陳圭球兄子舉孝廉官沛相袁紹欲結吕布為援為子索布女布許之術遣使以僭號告布并迎婦圭恐術布成婚則徐揚合從將為國難説布曰將軍與術結婚受天下不義之名必有纍卵之危布亦怨術女已在塗追還絶婚陳登圭子忠亮高爽深沈有大略舉孝廉除東陽長曹操以為廣陵太守率兵進圍吕布功加伏波將軍孫䇿遣軍來攻登大破之遷東城太守年三十九卒後許汜與劉先主共論天下人先主因言曰若元龍文武膽志當求之於古耳造次難得比也按元龍登字三國魏陳琳射陽人初為何進主簿進欲誅諸宦官太后不聽乃召四方猛將引兵向京城欲以劫恐太后琳諌進不納避難冀州袁紹使典文章袁氏敗歸魏為司空軍謀祭酒管記室軍國書檄多琳所作為建安七子之一吳步騭淮陰人避難江東孫權為討虜將軍召為主計後拜使持節征南中郎將劉表所置蒼梧太守吳巨陰懷異心騭徇斬之威聲大震加拜平戎將軍封廣信侯武陵蠻蠢動騭討平之黃武二年改封臨湘侯五年徙屯漚口權稱尊號拜驃騎將軍領冀州牧都督西陵時中書吕一典校文書多所糾舉騭上疏諫權悟遂誅吕一前後薦達屈滯救解患難書數十上赤烏九年為丞相猶誨育門生手不釋書被服居處有如儒生在西陵二十年鄰敵敬其威信性寬洪得衆喜怒不形聲色而外內肅然隋張奫淮陰人好讀兵書尢便刀楯以勇決知名高𥘉作相授大都督領鄉兵平陳有功進開府儀同三司封文安縣子率水軍破賊管子遊於京口薛子建於和州徴拜大將軍尋從楊素征江表别破高智惠於會稽吳世華於臨海開皇中從漢王諒征遼東諸軍多物故奫衆獨全高祖善之仁壽中遷潭州總管卒唐王義方漣水人客於魏事母謹甚舉明經補晉王府參軍直宏文館顯慶元年擢侍御史會李義府縱大理囚婦淳于氏迫其丞畢正義縊死無敢白其姦義方上言姦臣肆虐殺人滅口請下有司雜治即具法冠對仗叱義府下跪讀所言帝方安義府狡佞恨義方以孤士觸宰相貶萊州司户參軍吉中孚楚州人登宏詞科厯翰林學士户部侍郎工吟咏名列大厯十才子中趙嘏山陽人會昌進士杜牧見其詩有長笛一聲人倚樓之句稱為趙倚樓官渭南尉所著有渭南集宋劉承規山陽人太宗即位超拜北作坊副使雍熙中纍加官懇辭真宗時朝陵東封及祀汾陰皆留掌大內禮成當進秩表求休致改新州觀察使承規以廉使月廩歸於有司卒贈鎮江軍節度諡忠肅承規事三朝以精力聞掌內藏三十年檢察精密動著條式好儒學喜聚書間接文士質訪故實寢疾惟以公務為念趙師旦山陽人以廕試將作監主簿厯知康州儂智高破雍州入脅師旦師旦大罵智高怒害之事平贈光祿少卿徐積山陽人三歲父死旦旦求之甚哀母使讀孝經輒涕落不能止事母至孝從胡翼之學應舉人都不忍捨親徒載而西登進士第舉首許安國率同年生入拜具致百金為壽謝卻之以父名石終身不用石器行遇石則避而不踐母亡廬墓三年雪夜伏墓側哭不絶音吕溱過其廬聞之曰使鬼神有知亦垂涕也甘露歲降兆域杏兩枝合為幹鄉人有爭訟多就取決州以行聞詔賜粟帛元祐初近臣合薦為楚州教授每升堂訓諸生聞之者襝祍敬聽轉和州防禦推官改宣德郎卒政和六年賜諡節孝處士張耒淮陰人弱冠第進士范純仁以館閣薦纍遷著作郎史館檢討紹聖初知潤州坐黨籍謫官徽宗召為太常少卿出知潁汝二州尋復坐黨籍落職耒有雄才筆力絶健誨人作文以理為主作詩晚歲效白居易體樂府效張籍建炎初贈集英殿修撰王資深山陽人第進士纍官尚書郎初擢御史首論在廷大臣章具將上蔡京遣所親謂曰慎勿言當以此位相處不答翌日出知揚州尋改明州嘗注周書及方言扈再興淮人有膂力善機變每戰被髮內袒徒跣揮雙刀奮呼入陳人馬辟易金人犯襄陽棗陽再興設伏掩擊大敗之授神徑統制自是無日不戰又破順昌縣淅川鎮入鄧州破高頭進攻唐州斬其將從義圍唐州截其歸路獲其副統軍廣威將軍努克特尋以病卒子世達亦以名將稱官至都統制努克特舊作衲撻達今改正米立淮人三世為將江西制置使黃萬石署為帳前都統制元兵略江西立迎戰於江坊被執不降繫獄行省遣萬石諭之立曰侍郎國家大臣立一小卒耳何足道但三世食趙氏祿趙亡何以生為萬石再三説之不屈遂遇害陸秀夫鹽城人景定初進士李庭芝鎮淮南辟置幕中秀夫才思清麗性沈靜不苟求人知每宴集坐尊俎間矜莊終日未嘗少有希合至察其事皆治庭芝益器之德祐元年邊事急庭芝上其名纍擢至宗正少卿二年以禮部侍郎使軍前請和不就二王走溫州秀夫追從之與陳宜中張世傑等立益王於福州進端明殿學士簽書樞密院事時君臣播越海濱庶事疏略每朝會秀夫儼然正笏立如治朝王殂羣臣皆欲散去秀夫曰度宗一子尚在天若未欲絶宋此豈不可為國耶乃立衛王以秀夫為左丞相與張世傑共秉政時世傑駐兵崖山秀夫外籌軍旅內調工役凡有述作又盡出其手雖匆遽流離中猶日書大學章句以勸講元至元十六年崖山破秀夫走衛王舟度不可脫乃仗劒驅妻子入海即負王赴海死繆朝宗山陽人知梅州文天祥入閩福安朝宗間道從之孜孜奉公軍府政令悉出其手空坑之敗自經於山間天祥有詩哀之張孝忠淮人德祐初吕文煥導元兵東下調孝忠逆戰團湖坪矢盡孝忠揮雙刀擊殺百餘人前軍稍卻後軍繞出孝忠後衆驚潰孝忠中流矢死黃文政淮人戍蜀軍潰間道走靜江馬塈邀與同守城破文政被執大詬不屈元軍斷其舌以次劓刖之文政含胡叱咄比死不絶聲龔開淮陰人嘗與陸秀夫同居廣陵幕府宋亡不仕嘗為文天祥陸秀夫作傳人擬之遷固元趙篔翁山陽人延祐甲寅始設科取士篔翁成進士授泗州判官後為總管中大夫補著雅樂有覆瓿集金原舉鹽城人善吟咏博通經史光工楷書篆草弱冠為郡學録厯州郡守有雲谷集明楊靖山陽人洪武進士選庶吉士擢户部侍郎以稱職見重於帝製大誥奬靖等以激勵羣臣二十二年進尚書明年調刑部冤獄多所平反嘗鞫一武辨門卒檢其身得大珠僚屬驚異靖徐曰安有珠大如此者乎碎之帝聞嘉其有四善焉會征龍州詔靖諭安南輸粟以白衣往反覆諭之安南遂奉詔帝大悅召為左都御史靖有智略善理繁劇治獄明察而不深文坐小事賜死年三十八時論惜之金濂山陽人永樂進士授御史宣德初巡按廣東廉能稱最正統三年擢僉都御史參贊軍務八年拜刑部尚書與陳懋等討福建賊鄧茂七等有功景泰初召改户部時四方用兵需餉急濂綜核無遺議上撙節便宜十六事國用得無乏卒贈沭陽伯諡榮襄王瑜山陽人以總旗選隸趙王府護衛永樂末皇太子裁抑宦寺中官王儼等懼潛與趙府護衛指揮孟賢謀將令中人毒帝廢太子立趙王其黨高正密告瑜瑜大驚遂詣闕告變帝乃急捕賢等盡得其邪謀皆伏誅授瑜遼海衛千户仁宗立擢錦衣衛指揮同知戒同官勿慢瑜事必白瑜乃行瑜持大體不為苛細廷中稱其賢宣德八年進左副總兵鎮淮安董漕運纍遷左軍都督僉事淮安瑜故鄉也人以為榮在淮數年有善政葉淇山陽人景泰進士授御史天順初石亨譖之下吏考訊無驗出為武陟知縣成化中纍官大同巡撫孝宗立召為户部侍郎遷尚書哈密為吐魯番所陷守臣請給其遺民廪食處之內地淇曰是自貽禍也寢其奏姦民獻大名地為皇莊淇議歸之有司內官龍綬請開銀礦淇不可帝從之後綬請長蘆鹽二萬引鬻於兩淮以供織造費淇力爭竟不納居户部六年直諒有執能為國惜財用每廷議用兵輒持不可乞休歸卒贈太子太保子贄天順進士厯官刑部右侍郎以清操聞劉世安其先山陽人襲世職為衛指揮使勇敢善戰延綏用兵以戰功纍遷都睿同知改左副總兵協守大同宏治中鎮甘肅與巡撫許進襲破吐魯番於哈密復其城而還進左都督安有膽智孝宗時稱良將焉卒贈廣昌伯楊文母喪廬墓晨奉櫛頮夕奉浣濯成化中旌王鋐山陽人父母及祖父母相繼殁俱躬負土成墳廬其墓三載刻木為像晨昏泣奠成化中旌韋斌山陽人成化進士官給事中嘗曰假彈劾以快私讐掇細微以賣公道吾所深恥出為福建學使衡鑒精明拒絶私情多所造就蘇勤安東人自其五世祖至勤六世同居不殖私財敦尚禮義成化間旌為義門朱勇安東人五世同居宏治間旌丁震山陽人自其高祖父義以來五世同居正德中旌蔡昂山陽人少穎異嗜讀書每假人書一覽成誦正德甲戌進士在史館幾三十年有聲於時厯官禮部侍郎有頤貞堂集潘塤山陽人正德進士授工科給事中性剛決彈劾無所避論都御史王鼎南京兵部尚書劉機鼎竟罷去復劾保定巡撫寧果天津督兵御史陳天祥貪暴詔俱召還乾清宫災塤上疏切諫報聞遷兵科都給事中以爭右都督毛倫襲廕事中旨外調開州同知嘉靖七年纍官右副都御史巡撫河南潞州巨盜陳卿為亂山西巡撫討賦無功敕塤會剿大破之捷聞帝將大賚適以他事罷去及給事中夏言核上平賊功塤為首桂萼惡之但賚銀幣而已陳斗南鹽城人嘉靖進士事繼母至孝母病疽悲號七日口吮所患母立愈人稱孝感丁士美清河人嘉靖進士第一授修撰萬厯初厯吏部左侍郎為人謙厚不露廉鍔居官絶餽遺與人處退然若無能意所不可輒怫然見辭色以父老屢請終養不許及聞訃哀毁成疾卒贈禮部尚書諡文恪楊錦山陽人母疾侍湯藥不解衣者三月侍父鸞寢處不入私室者十數年每冬月父足凍裂以舌舐之父患劇疾嘗其糞嘉靖中以嵗貢當赴京錦念父老不忍離膝下竟不行孔金山陽人父早亡母謝氏遺腹三月而生母為大賈杜言逼娶投河死金長屢訟於官不勝乃乞食走訴闕下不得達還墓所晝夜號泣里人陳其事於府知府張守約坐言大辟卒死獄中金子良亦有孝行父病刲股為羮以進旋愈比卒廬墓哀毁萬厯四十三年父子並得旌邱度山陽人萬厯進士授南康推官遷主事榷稅九江正課既足盡弛關禁任舟楫往來厯遷光祿卿卒贈户部右侍郎度居官廉介持法不避豪強初為諸生時知府高其文行延為弟子師不可念其貧為置田復遺之金皆不受始艱於子家人為置妾久而還之仍處子也其操行如此嶽鍾秀山陽人性至孝為兒時即刲股愈父疾母病嘗糞知不起籲天求代居喪毁瘠骨立萬厯丁酋舉於鄉以知縣徵授刑部主事詳讞囚册出死罪百餘人富豪殺人論死賄庖人埋金驛館求赦鍾秀怒將執治之庖人夜遁厯郎中出為雲南參議遷貴州副使所至以清操聞張世顯大河衛人天啓初為戚家堡遊擊聞警出戰兵敗他部皆走部卒亦請暫避世顯不可血戰重圍中力盡援絶身被數十創死王宏安東人白蓮寇起宏應募往剿被執不屈釘於二樹間罵不絶口而死潘宏山陽人崇禎中以貢生知舞陽縣李自成攻陷南陽所屬州縣皆失守進攻舞陽宏發炮擊之多斃諸生潛遣人約降乃開門縛宏以獻賊索印脅降宏怒罵不屈乃斷其手支解之子澄瀾痛憤大哭投井死嶽薦山陽人少嗜學該涉經史尤好濂閩書歲飢已食粳核文母甘旨未嘗缺有庶弟甫生其母卒薦適生女命婦棄女而乳其弟持身嚴重接人和易誨子弟諄切不倦終身未嘗去書而不喜著述鄉人稱為西來先生趙世選山陽人崇禎八年以貢生授和州訓導扺任九日獻賊逼城與知州誓死守三日城陷罵賊不屈死事聞贈國子監學録周文煒清河人官商州同知署州事癸未闖賊犯境文煒竭力守禦城陷罵不絶口為賊所磔子元生哭父罵賊亦被殺本朝乾隆四十一年賜諡忠愍鍾希賢清河人冀北道參議崇禎十一年闖賊亂城陷不屈死同縣王茂遠知靈璧縣與希賢同殉節本朝乾隆四十一年並賜諡節愍羅應選桃源人知龍安縣崇禎十七年賊入蜀誓死守城比陷舉家遇害太朝乾隆四十一年賜諡節愍王百度鹽城人崇禎末為崇明守備搗賊崇明中流矢死本朝乾隆四十一年賜諡節愍劉永昌安東人崇禎末鎮守江淮總兵官闖賊陷應州父被執招之不屈投江死本朝乾隆四十一年賜諡節愍張緯安東人崇禎末官銅陵訓導城破不屈死四十一年本朝乾隆賜諡節愍李幹才鹽城人崇禎末生員甲申聞京師破不食死同縣生員石盤與都司酆某同舉兵兵敗被執死本朝乾隆四十一年並賜入昭忠祠本朝張弨山陽人精六書貧而嗜古尤究心金石後以聾廢而考證彌勤顧炎武音學弨所寫定張新標山陽人順治進士有文名官考功司甚舉其職徐越山陽人順治進士授行人擢御史在諌垣十有三年條奏皆關大政言漕河事先後十六疏厯陳淮黃分合變遷及兩河衝決州縣被災狀尤悉遷兵部督捕左理事官引疾歸陸求可山陽人順治進士知裕州墾荒田蘇驛遞民以父母歌之厯官福建學道求可少孤事祖母與母極孝篤志好學為時所稱邱象升山陽人順治進士選庶吉士纍遷侍講通判瓊州黎酋恃險梗化選兵進剿戮其渠帥入為大理寺副部議有與律未合者多所駮正弟象隨貢生舉博學鴻詞授檢討厯官洗馬象隨少有才名性至孝父殁廬墓三年族人稱之劉昌言山陽人順治進士知岑溪縣鄰寇彭奇犯境以忠義激勵士卒協力固守復設方略誘之寇黨遂縛奇以降并獻名册昌言誅其魁焚其册全活數千人岑俗輕生小忿輒茹毒隕命為立嚴禁攝蒼梧縣卒李鎧山陽人少孤力學篤於孝友順治進士厯知綏陽蓋平二縣俱著循績又舉博學鴻詞授編修纂修明史屢擢內閣學士兼禮部侍郎鎧博覽羣籍至老彌篤所著詩賦外有史斷讀史雜記諸篇張鴻烈山陽人康熙已未舉博學鴻詞授檢討纂修明史疏請開支河轉漕以避河險又時興殿工採木遠省復有寬期減數之請事悉施行鴻烈詞藻豐蔚一時推為巨手宋曹鹽城人工詩善書初舉山林隱逸郡縣敦趨上道曹辭疾不就大臣復以博學鴻詞薦堅辭時稱為射陵先生嵇宗孟安東人天資穎異善屬文順治舉人厯守杭州乞歸舉博學鴻詞以疾辭不赴著有立命堂集楚江蠡史諸篇閻若璩其光自太原徙山陽若璩淹貫經史學博而精尤長於考訂所著有尚書疏證四書釋地困學紀聞注等篇周振采山陽人博學能文名著大江南北以選貢生終藝林惜之盧順桃源人嘉慶九年由營伍拔補山東營把總以防守有功洊升署淮揚河營遊擊尋署參將二十三年調赴豫省