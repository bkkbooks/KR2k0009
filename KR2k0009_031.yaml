front:
  text: 大清一統志淮安府在江蘇省江寧府北五百里蘇州府西北七百五十里東西距四百四十里南北距二百六十里東至海州界二百三十里西至安徽泗州界二百十里南至揚州府寶應縣界八十里北至海州沭陽縣界一百八十里東南至揚州府泰州治四百九十里西南至泗州治一百八十里東北至海一百八十里西北至徐州府宿遷縣界一百九十里自府治至京師一千九百七十五里分野天文斗分野星紀之次建置沿革禹貢揚徐二州之域春秋屬吳戰國屬楚
  hash: sha256:24bbf2b5480151ee77e7101d4635847b960ef7e8f5f8a535631e6476b8961083
