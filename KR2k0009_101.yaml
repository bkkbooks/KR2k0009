front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_101-1a}
body:
  text: 杭州府二古蹟錢塘故城在今錢塘縣西秦置始皇三十七年東遊過丹陽至錢塘漢為西部都尉治後漢省中平二年封朱㒞為錢塘侯蓋是時復置也孫策入會稽以程普為呉郡都尉治錢塘水經注靈隱山下有錢塘故縣浙江逕其南元和志錢塘記云昔一境逼近江流縣理靈隱山下今餘址猶存郡議曹華信立塘以防海水乃遷理此地隋平陳以後縣頻遷置貞觀四年定於今所寰宇記隋開皇十年自餘杭移州理錢唐十一年復移州於柳浦西依山築城即今郡是也咸淳臨安志古州城隋楊素創周廻三十六里九十步唐大順元年錢鏐築新夾城五十餘里景福二年鏐又築羅城自秦望山由夾城東亘江干洎錢塘湖霍山范浦周七十里宋紹興二十八年增築内城及東南之外成附於舊城内城亦曰皇城周九里府志元至正十九年張士誠更築府城周六千四百丈有竒東自艮山門至螺螄門視舊城拓開三絡市河於内南自候潮門迤西則縮入二里里而而截鳳凰山於外城之東西視舊差廣即今城是也通志錢塘舊治有四一在靈隱山麓一在錢湖門外皆漢魏時治也一在錢塘門内今爲敎場地唐縣治也一在紀家橋華嚴寺故址宋縣治也按靈隱山下並無鈛塘之跡亦萬無可作縣治之理漢書地理志於錢塘西部都尉治下係以武林山武林水所出蓋言都尉治在錢塘非謂錢塘治在武林山也劉真道作錢塘記誤以漢志武林山三字連上都尉治作白因有縣治在靈隱山下之說酈道元注水經復沿其誤至今俱莫能定通志所云錢塘舊縣有四實則止有三也鹽官故城今海寕州治本海鹽縣地漢書地理志海鹽縣有鹽官三國呉志陸遜始仕孫權幕府出爲海昌屯田都尉并領縣事裴松之註陸氏祠堂像贊曰海昌今鹽官縣也宋書州郡志呉記云鹽官本屬嘉興呉立海昌都尉治此後改爲縣陳書高祖紀永定二年割呉郡鹽官海鹽前京三縣置海寕郡隋書地理志監官縣屬餘杭郡不云置郡蓋郡尋廢也元和志鹽官縣西南去杭州一百三十里元史地理志元貞元年以户口繁多升為鹽官州天歷二年改海寕州東南濱巨海自唐宋常有水患泰定四年害尤甚命都水少監張仲仁往治之文宗即位水勢始平故改海寕舊志有海昌城在今縣南二十里古海昌都尉治又有海安舊城在縣西北四十一里隋大業十三年築或以為鹽官縣治此誤富陽故城在今富陽縣治西北隅漢置元和志縣東北去杭州七十三里本漢富春縣晉孝武太元中避鄭太后諱改春為陽舊志唐咸通十年令趙訥築城周十二里吳越時以其地逼江壘以磚石元燬又有東安郡城在縣北十八里吳黄武四年分置東安郡治富春以全琮為太守七年復廢此其故址也餘杭故城今餘杭縣治水經注浙江東逕餘杭故縣南新縣北秦始皇南遊會稽途出是地因立為縣漢末陳渾移築南城縣後谿南大塘即渾立以防水也元和志縣東南去杭州七十里秦始皇捨舟杭於此因以為名縣志舊城在苕溪南漢陳渾徙溪北唐末吳越王復徙溪南號青平軍城宋雍熙中軍廢再徙溪北自後因之臨水故城在臨安縣北後漢建安十六年賀齊討破郎稚表分餘杭為臨水縣晉改曰臨安水經注縣因岡為城南門尤高謝安涖郡遊縣逕此門以為難為亭長元和志臨安縣東南去杭州一百二十八里隋亂廢置無准垂拱四年廵撫使狄仁傑復奏置五代史吳越世家光化元年改錢鏐素所居營曰衣錦營升為衣錦城天祐四年升衣錦城為安國衣錦軍縣志舊治在今縣北四里宋景定中移西墅元末燬明初移治東市太廟山右即吳越衣錦軍治於潛故城在今於潛縣治北吳越春秋秦徙大越鳥語人置之朁即此漢置於朁縣後漢始加水曰潛元和志縣東去杭州二百里舊志隋開皇中楊素始築縣城周一里有奇久廢元至正十七年行省參政楊鄂勒哲重築自金鵝嶺由石龍口直抵縣抵山周五里明洪武初以縣非控要之地且岡陵重複遂不置城又潛州城在縣東七里唐武德中築今其地名城嶺楊鄂勒哲舊作楊完者今改正紫溪故城在於潛縣南三十里唐垂拱三年析於潛置縣萬歲通天初改曰武隆其年又析置武隆縣復曰紫溪聖厯三年省新城故城在今新城治東三國呉折富春縣置元和志新城縣東北去杭州一百三十二里府志古城唐徐敬業築大順二年吳越都將杜稜領兵鎮東安因山而城之築為保障羅隱有記後楊行密遣將盡鋭來攻稜拒却之因謂之杜稜城錢江故縣在仁和縣治北武林門内梅家橋南吳越割錢塘鹽官二縣地置宋改曰仁和徒今治舊志宋太祖自陳橋驛入仁和門受周禪及高宗南渡見縣名仁和曰此故都城門名也遂決遷都之計武隆故縣在昌化縣治南唐武后萬歳通天初析紫溪置武隆縣以為已䜟神龍元年改曰唐山元和志縣東去杭州二百四十八里咸淳志縣因山為城北負唐山不設門南憑漢歳久盡圯南新廢縣在新城縣西寰宇記在杭州西一百六十里乾徳五年錢氏割臨安縣地置南新場以便徵科元豐九域志淳化五年以南新場為昭德縣六年改南新縣熙寕五年省為鎮入新城縣志南新鎮在縣西五十里元至元十三年置巡司明初廢管城在海寕州西北距石門縣界舊志吳王夫差築以拒越今有管城廟即其遺跡舊倉城在餘杭縣東南二里安樂山唐永貞五年刺史張綱置吳越時廢營盤城在餘杭縣南一里苕溪南元至正十六年楊鄂勒哲命部將築以守禦後廢楊鄂勒哲改見前越王城在於潛縣東十五里夏少康之後封於越其支庶居此築城又名平越城今平越村即其地吳越西府在仁和縣鳯凰山右唐光化二年呉越王錢鏐即杭州治擴而大之依山阜以為宫室名曰鎮海軍使院梁開平元年始建國外城門十子城門二屯營六所居殿曰握髪曰仁政有八㑹亭晉天福時建以平吳定越八㑹於此也後更名都㑹堂碧波亭忠懿王閲兵處功臣堂紀功也仙居堂忠獻王即位處天冊堂忠遜王即位處又有疊雪樓武肅王架强弩射潮處又有思政堂武功堂大慶堂瑶臺院牧馬監在餘杭縣南上下湖宋命守臣梁汝嘉提舉每馬五百匹為一監南宋故宫在仁和縣鳳凰山即唐以來州治也咸淳志建炎三年詔以杭州治為行宫紹興元年詔守臣徐康國措置草創二年南門成二十八年増築禁城以文德殿為正衙垂拱殿為常朝後殿有四曰延和曰崇政曰福安曰復古孝宗建射殿曰選德理宗闢講殿曰緝熙度宗改東宮益堂曰熙明置經籍其中舊志元至元十四年宋宫室悉燬於火後西僧楊嘉木揚喇勒智請即故宫址建報國等五寺至正之亂五寺亦廢楊嘉木揚喇勒智舊作楊連真伽今改正德夀宫在府城内望仙橋東宋紹興末即秦檜舊第改築新宫名曰德夀孝宗受禪高宗移御於此後孝宗內禪亦居於此改名重華咸淳閒改為道院賜額宗陽宫石有苔梅久萎明藍瑛畫梅鐫於碑上本朝乾隆十六年四十五年高宗純皇帝臨幸俱有御製題德夀宫梅石碑詩開元宫在府城内泰和坊宋寕宗潛邸也嘉泰初詔改為開元宫元時即宫之左為行中書省龍翔宫在府城内後市街宋理宗潛邸淳祐初詔改為龍翔宫元末燬宋壇廟明統志圓壇在府城南八里社稷壇在府治北皆紹興十三年築先農壇在府東南十里紹興十五年築高禖壇亦在府東南十里紹興十六年築九宫壇在府治東故青門外紹興十八年築太廟在府城内瑞石山之東紹興四年建十三年又建景靈宫以奉祖宗神御在城内西北隅十五年又建神御殿在大内今皆廢聚景園在錢塘縣清波門外咸淳志孝宗致養北宫拓圃西湖之東亭宇皆孝宗御扁西湖游覽志園有㑹芳殿瀛春攬遠等堂花光揺津翠光桂景灎碧涼觀瓊芳彩霞寒碧等亭柳浪學士等橋今惟栁浪橋尚存玉津園在錢塘縣龍山北宋紹興十七年建淳熙中孝宗與羣臣燕射之所錢象祖誅韓侂胄於此又翠芳園在錢塘門外面南屏山舊名屏山園玉壺園在錢塘門外集芳園在葛嶺前臨湖曲後據山岡理宗以賜賈似道湖曲園在錢塘縣西咸淳志安撫趙與􅊸建南山自南高峯而下皆趨而東獨此山自淨慈右轉起為雷峰少西而止西南諸峯若在几案柳隄梅嶼左右映帶有賀監一曲之義因名小有天園在錢塘縣南屏山汪氏所建本朝乾隆十六年二十二年二十七年三十年四十五年四十九年高宗純皇帝六次臨幸俱有御製詩并御書勝閣入雲扁額又漪園亦汪氏所建乾隆二十二年二十七年三十年四十五年高宗純皇帝四次臨幸俱有御製詩并御書香雲法雨扁額又巢居閣在孤山竹素園在金沙澗後留餘山居聽泉亭俱在陶莊吟香别業在巡撫范承謨園内節次添建諸勝俱有御製詩富景園在仁和縣東崇新門外宋孝宗嘗奉母遊幸規模畧仿湖山按府城内外唐宋以來舊園凡五十餘處兹載其著者安瀾園在海寕州北本朝大學士陳元龍别業中有竹堂月閣諸勝本名隅園乾隆二十七年海塘高宗純皇帝南巡躬閲駐蹕於此因賜今名有御製即事雜詠五律六首詩三十年四十五年四十九年俱有御製曡前韻六首詩又有御書水竹延清筠香館各扁額鎮海樓在府城内吳山東麓即呉越舊城南門也初名朝天門元改爲拱北樓明改今名樓甚壯麗眺望江中遠近畢見聚遠樓在府城内德夀宫宋高宗題額又香遠樓在府治咸淳七年安撫潛說友建最爲郡治佳處十三間樓在石佛院蘇軾守杭治事於此望湖樓一名看經樓乾徳五年建他如湧金樓在豐像門映江樓在候潮門俱宋建有名者豐樂樓在府城湧金門外咸淳志舊名聳翠樓據西湖之㑹淳祐九年安撫趙與􅊸徹新之瑰麗宏特爲西湖壯觀望海樓在府舊治中和堂之北唐武徳七年建一名望潮樓又名東樓白居易詩東樓勝事我偏知蘇軾有望海樓詩又觀潮樓在仁和縣候潮門本朝乾隆年間新建額係高宗純皇帝御書勅祠潮神其内乾隆十六年二十二年二十七年三十年四十五年四十九年高宗宸輿六幸俱有御製錢塘觀潮歌觀江潮作歌觀潮樓紀事觀海潮作歌觀潮四首并曡乙酉詩韻諸詩清暉樓在舊府治唐郡守嚴維建白居易有詩天開圖畫樓有二一在海寕州東北硖石西山廣福院宋天禧間建元趙孟頫書額一在錢塘縣呉山梓潼廟又翫江樓在餘杭縣治東面瞰苕溪宋柳耆卿建大觀臺在呉山頂石面砥平方廣如削下有龍神廟本朝聖祖仁皇帝嘗駐蹕於此有御製七言絶句一首乾隆十六年高宗純皇帝臨幸有御製晏山大觀歌二十七年御賜龍神廟靈佑安瀾扁額琴臺在錢塘縣慧日峯西怪石聳秀上有石壁刻未元章琴臺二大字本朝乾隆十六年二十二年高宗純皇帝南巡過此有御製琴臺詩竹閣在錢塘縣孤山唐白居易建又有四照閣在山巔後廢本朝雍正八年建亭於上虚白堂在府城内舊治唐白居易有詩刻石堂上後為錢氏都㑹堂又有因巖堂在郡圃居易亦有詩有美堂在府城内呉山最高處宋嘉祐二年梅摯出守杭州仁宗賜詩有地有湖山美之句擊因作堂名之歐陽修為記蔡襄書柏堂在錢塘縣孤山陳天嘉二年建廣化寺有昔時所植二柏宋熙寕中僧志詮作堂其側與白居易竹閣相連蘇軾作孤山二詠紀之本朝乾隆二十七年三十年四十五年四十九年高宗純皇帝四次經過俱有御製柏堂竹閣用蘇軾韻詩並御書扁額中和堂在仁和縣鳯凰山下本錢鏐閲禮堂宋時為郡治至和二年郡守孫沔建堂易名中和建炎三年高宗臨幸改為偉觀清暑堂在府舊治左宋治平三年郡守蔡襄建自為記及書刻石堂上三瑞堂在昌化縣治後宋景定中邑中産瑞麥嘉禾嘉粟令劉宗憲獻於朝理宗賦詩記之以賜輔臣因建堂夢謝亭