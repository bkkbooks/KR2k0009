給壻人皆服其明斷薛映成都人景德時知杭州臨決鋒鋭庭無留事王濟饒陽人景德中知杭州郡西有錢塘湖歲久堙塞濟命工濬治增置斗門以備潰溢之患仍以白居易舊記刻石湖側民利之馬亮合肥人真宗時知杭州先是江濤大溢調兵築隄而工未就詔問捍江之䇿亮袖詔禱伍員祠下明日潮為之郤出橫沙數里隄遂成李及鄭州人真宗時知杭州惡杭俗輕靡不事宴遊一日冒雪出衆謂當置酒召客乃獨造林逋清談至暮而歸居官數年未嘗市呉中一物比去惟市白樂天集張若谷沙縣人真宗時知杭州㑹歲饑出餘廪為糜粥民賴以濟戚綸楚邱人大中祥符三年知杭州江潮為患乃立埽岸以易柱石之制孫錫真州人天聖間知仁和縣籍取兇惡戒以不改必窮極案治其餘一待以仁怒邑人畏而愛之俞獻卿歙人景祐中知杭州暴風江潮溢決隄獻卿大發卒鑿西山石作隄數十里民用便之張方平睢陽人仁宗時知杭州下車時訟庭肅然修救荒之政人無失所又清郡城溝瀆乘潮納新水錢塘人德之李紘麓邱人知於潛縣有惠政鄭戩呉縣人慶厯初知杭州錢塘湖溉田數千頃錢氏置撩湖軍以疏淤填水患旣納國後不復治葑土堙塞為豪族僧坊所占冐湖水益狹戩發屬縣丁夫數萬闢之民賴其利事聞詔本郡歳治如戩法楊偕中部人慶歴中知杭州有能績上太平可致十象圖方偕莆田人慶厯中知杭州有能聲杭訟牒素煩皆决遣無留事孫洙廣陵人仁宗時為於潛令歐陽修包拯吳奎三人交舉洙應賢良方正科范仲淹呉縣人皇祐初知杭州㑹大饑仲淹發稟及募民存餉為術甚備俗喜競渡好佛事乃縱民讌游湖上又諭諸寺僧興工作給直以惠貧者是歲兩浙惟杭州晏然民不流徙李兑臨潁人出知杭州仁宗書安民二字以寵之為政簡嚴老益精明錢顗無錫人仁宗時為寕海節度推官守孫沔用威嚴為治屬吏奔走聽命顗當官而行無所容撓遇不可必爭之余良肱分寕人通判杭州江潮屢溢漂官民廬舍良肱曡石隄二十里障之潮不為害趙抃衢州人熙寕中知杭州政多惠利陳襄侯官人熙寕中知杭州善撫人民修復唐李泌六井民獲其利蘇軾眉州人熙寕中通判杭州時新政日下軾每因法以便民民賴以安元祐初知杭州㑹大旱饑疫並作軾請免本路上供米三之一復得賜度僧牒易米以救饑者又減價糶常平米多作饘粥藥劑遣使挾醫分坊治病活者甚衆時唐李泌所作六井白居易所浚漕河皆久廢西湖葑積為田水亦無幾軾復浚茅山鹽橋二河以通漕造堰牐以為湖水蓄洩之限以餘力復完六井又取葑田積湖中南北徑三十里為長隄以通行者杭人名蘇公隄軾二十年間再莅杭有德於民家有畫像飲食必祝又作王祠以報蘇頌南安人熙寕中呉越饑選知杭州一日岀遇百餘人哀訴曰某以轉運司責逋市易緍錢夜囚畫繫雖死無以償頌曰吾釋汝使汝營生奉衣食之餘悉以償官期以歲月可乎衆皆謝不敢負果如期而足嘗燕客有美堂或告将兵欲亂頌密捕渠領十軰付獄中迨夕會散坐客不知也崔遹元豐時為於潛令興築元豐塘為利甚溥人呼為崔長官塘孔文仲新喻人調餘杭尉恬介自守不事請謁轉運使在杭召與議事事已馳歸不詣府人問之曰吾於府無事也張閣河陽人徽宗時知杭州浙部和冒絹杭獨居十三戸有至數百匹者閣請均之他郡杭乆闕守閣經理有敘去惡少年之為人害者州以理聞楊時將樂人知餘杭縣有惠政毛注西安人徽宗時知富陽縣以治辦稱曾孝藴晉江人徽宗時知杭州時方臘已破杭孝蘊單車至城下城免復軍士多殺人孝藴下令從者得自首無輒殺皆束手不敢鷔王昞華陽人政和七年令鹽官吏畏民安詞息鹽饒政有條理蓋吏之以敏幹著者章誼浦城人建炎初通判杭州時陳通寇錢塘城閉誼聚七縣弓兵以張聲勢賊平旋加撫定人皆德之朱蹕安吉人知錢塘縣建炎三年金人陷杭州初犯餘杭守臣康允之退保赭山蹕白允之率弓手土軍前路拒敵使杭民為逃死計行二十里遇金兵蹕兩中流矢左右挾至天目山猶能率鄉兵禦敵後數日遇害梁汝嘉麗水人紹興中知臨安府時火與盜屢作汝嘉修火政嚴巡徼盜發輒得火災亦息風績最著李彥穎德清人紹興中主餘杭簿守曹泳豪敚酒家業為官監利其貲具彥穎爭之泳怒戒吏煅煉不得毫髮罪趙子潚宋宗室高宗時知臨安府吏不能欺禁權家僦人子女為僕妾調三衙卒修都城不擾而辦葉衡金華人紹興中知於潛縣户版積弊富民多隱漏貧弱困於陪輸衡定為九等自五以下除其籍而均其額於上之四等貧者頓蘇徴科為期限榜縣門俾里正諭民不遣一吏而賦自足歲災蝗不入境治為諸邑最邵文炳紹興間爲於潛令大興水利又減山鄉折米之直民懷其德政與葉衡同祀號二賢祠吳芾仙居人孝宗時知臨安府内侍家僮毆傷酒保芾捕治之徇於市權豪側目李祥無錫人隆興中爲錢塘主簿時姚憲尹臨安俾攝錄參邏者以巧法爲能嘗誣告一武臣子謗朝政鞫於獄祥不使邏者入門旣而所告無實具以白尹尹驚曰上命無實乎祥曰即坐譴自甘憲具論如祥意帝遂賜憲爲諌大夫調祥濠州錄事參軍周淙長興人乾道中知臨安府上言風化必自近始陛下躬履節儉以示四方而貴近奢靡殊不知革乃條上禁革十五事帝嘉納之臨安駐蹕歲久居民日增河流湫隘舟楫病之淙請疏濬工畢授秘閣修撰楊簡慈谿人乾道中授富陽主簿富陽民多服賈而不知學簡興學養士文風遂振張杓綿竹人孝宗時知臨安府奏除逋欠四萬緡米八百斛都城浩穰奸盜聚匿杓畫分地以警捕夜戸不閉張師尹納女掖庭恃以恣横杓因事痛繩之徙其家信州其類怗服修三牐復六井婁機嘉興人孝宗時調於潛丞輕賦税正版籍簡獄訟興學校耿秉江陰人乾道中知新城縣有額外橫加米絹銀民不堪命力請蠲其半後官戸部侍郎復以爲請詔悉除之蔡戡晉陵人紹熙四年知臨安歲澇糴艱急請發倉民賴以濟趙希言惠王元孫嘉定中知仁和縣闢學宫地四百餘畝臨平塘隄決希言督役親捧土投石兵民爭奮隄成因築重隄後不復決民病和買絹折錢重乃節公費代其輸袁韶慶元人嘉定十三年爲臨安府尹幾十年理訟精簡道不拾遺平反冤獄甚多趙與懽宋宗室理宗時知臨安府浙西安撫使剖決明暢罪者咸服後以潮汐齧隄復命知臨安府江隄事竣獄空力丐罷㑹饑民相攜溺死帝仍付府事與灌上則祈哀公朝下則推誠勸分甘雨隨至米商來集流移至者有以濟之與懽三爲府尹盡力民事都人稱趙端明必以手加額曰趙佛子也吕沆歙人理宗時知於潛縣重囚逸聞沆至自歸馬光祖金華人理宗時知臨安府厯陳京師艱食和糴增價海道致寇三害後再知臨安歲饑勸榮王發粟剸治浩穰風績凛然文天祥吉水人開慶初元兵伐宋宦者董宋臣説上遷都人莫敢議其非者天祥時為寕海軍節度判官上書乞斬宋臣以一人心不報後知臨安府常懋臨卭人理宗時為簽書臨安府判不為權勢撓主管城南廂聽訟嚴明豪右憚之李芾衡州人咸淳元年知臨安府賈似道富國前尹事無鉅細先關白始行芾獨無所問福王府有廹人死者以道為營救芾往復辨論竟寘諸法嘗閲火具民有不為具首問之似道家人也立杖之唐震㑹稽人咸淳中通判臨安府時潛説友尹京恃賈似道勢甚驕蹇㑹府有具獄將置辟震力辨其非説友爭之不得上其事刑部卒是震議元申屠致遠夀張人至元中為杭州路總管府推官宋駙馬楊鎮從子玠節家富於貲守藏吏姚溶竊其銀懼事覺誣玠節陰與宋廣益二王通有司榜笞誣服致遠讞之得其情溶服辜玠節以賄為謝致遠怒絶之臧夢解慶元人至元中知海寕州剛直亷慎門無私謁差役皆當其貧富而吏無所預增民戸七百六十有四闢田四百四十三頃桑柘榆柳交䕃境内政平訟簡為諸州縣最梁曽蔡人大德初除杭州路總管政事文學皆有可觀戸口復者五萬一千四百戸請禁暮夜鞫囚遊街酷刑朝廷是之著為令常濟大德十一年為餘杭縣尹歲饑濟請以本縣儲糧賑之活民數萬趙連甘陵人至治中除杭州路總管杭為劇郡長吏多不稱職連為人強毅開敏吏不敢欺浙右病於徭役民充坊里正者皆破家連議以屬縣坊正為雇役里正用田賦以均之民咸以為便踰年召拜吏部侍郎杭人思之刻其政績於碑納琳河西人天厯元年除杭州路總管鋤奸去蠧吏畏民悅納琳舊作納麟今改正張傑濟南人為於潛縣尹至元間有賊兩抵縣境傑以義結民為伍乘法統衆殺其魁餘皆遁去縣獲安堵常野先至正中為餘杭縣尹增築南湖塘及縣西官塘十八里民免水溢之患明王興福隨州人洪武初知杭州府時杭初附人心未安興福善撫輯寛簡不苛民甚德之秩滿郡人遮道攀留興福諭遣之曰非余能惠父老父老善守法耳太祖嘉之擢吏部尚書楊卓南昌人洪武中為杭州通判杭民有兄弟爭田累歲不決卓至垂涕不欲訊兄弟感悟遂相讓卓精吏事吏不能欺而為治尚寛恕民悦服焉黃信中餘干人洪武中知錢塘縣愛民勤政九載課最當遷部民詣闕請再任帝嘉之即擢杭州守俾得治其故縣葉宗行華亭人永樂中知錢塘縣縣為浙江省㑹徭重豪有力往往搆黠吏得財役貧宗行令民自占甲乙書於册以次簽役役乃均嘗視事有蛇升階若有所訴宗行曰爾有冤耶遣吏尾之入餅肆爐下發之得屍乃肆主利其財而殺之者遂伏辜按察使周新重之一日伺其岀潛入其室惟見笠澤銀魚腊一裹新歎息去時呼為錢塘一葉清劉秉獲鹿人永樂中知新城縣邑之折桂鄉有魚池潭水不常蓄每旱田無以漑東相度地勢鑿山通道築堰二十餘丈為閘以備蓄洩漑田二千餘畝民立祠以祀呉堂樂平人宣德九年知富陽縣宿弊盡釐庭稀訟牒嘗繪楊震卻金故事於退所以自勵在任築春江隄復東觀山關奏減白綿貢尤政績之最著者秩滿民立報功祠以祀陳復懷安人正統時知杭州府廉靜無私獄訟大省日端坐與曹掾講讀律令遭喪部民乞留詔起復未幾卒廵撫軒輗倡僚屬助之乃克斂吏民相率致賻其子盡卻之稱貸以歸張敏蠡縣人天順五年知餘杭縣惠庇善弱威制豪强居二年邑治民安陳讓大河衞人成化中知杭州府海寕瀕海潮逼城下讓於城外里許開支河築内隄延袤十里水勢漸殺及隄而止海寕人德之立祠以祀楊孟瑛酆都人宏治中知杭州府多便民政西湖爲豪右所占孟瑛力行浚復俾水有蓄洩下塘諸田皆獲灌漑梁材南京金吾右衞人清修勁節正德中知杭州府有惠政杭屬縣田租科例不一材爲酌輕重立畫一之法民甚便之張應亮高淳人嘉靖間知餘杭縣廉明若神時倭告警督撫命以戎務應亮奏凱而還擢御史蘇湖泰和人萬厯中知海寕縣值海決塘盡圮湖參用坡陀式縱橫式擇官民之廉幹者分任丈尺酌量其難易尅期興作懸賞格以課督之三月工竣朱光祚江夏人萬厯中知錢塘縣善聽訟片言立決勸墾荒地數千畝皆成良田建築七坊以資蓄洩漑田無算聶心湯新淦人萬厯中知錢塘縣南湖水溢諸鄉𬒳災心湯建化灣塘築閘為啟閉且濬湖渠歲乃大稔又建復捍江塘以禦潮蔡懋德崑山人萬厯中杭州推官山東白蓮賊起浙中奸人亦殺長興知縣時調浙兵援遼兵不樂行謀為變懋德籌畫之事乃定周宗建呉江人萬厯末知仁和縣有異政入為御史忤魏璫詔獄瘐死顧咸建崑山人崇禎末知錢塘縣甫之官聞京師陷入情洶洶咸建戢奸宄嚴警備巡按御史彭遇颽貪殘激變頼咸建調䕶事定而民免株連南都失守馬士英方國安擁兵至所過淫掠咸建先期犒師請駐城外城中得無擾時監司反郡邑長吏悉逋竄咸建散遣妻子獨守官不去大兵至被執死之林垐侯宫人崇禎末知海寕縣邑有妖人以劍術惑衆聚千人垐捕殺之南都覆杭州亦不守卒乘饑乞餉環署大譟垐罪為首者而如其請乃定唐自彩達州人崇禎末知臨安縣嚴明廉介杭州失事死之本朝嚴正矩孝感人順治中知杭州府大兵初駐正矩調御有方民得不擾有誣巨室以大獄者反坐之告訐頓息李人龍深澤人順治三年知昌化縣縣為賊所踞人龍至寄署臨安西墅馳檄宣布德威人心翕然賊遂遁人龍率兵民追擒之又請免被賊時逋賦民賴以安費國暄無錫人順治初知餘杭縣時南北鄉賊黨數千為害國暄部置丁壯入鄉互為聲援賊所往輒預知逆擊之賊遂散洪有度山西人順治中授新城尉勤於職事辛丑三月白頭賊自渌川扺縣掠刦有度聞警出追至母子嶺賊竄匿夜復擁圍有度奮力禦敵被害其妻撫棺痛哭不食死朱永盛城固人順治中知富陽縣開北城河立永濟渡修恩波橋築三墩捍之又諭降山寇萬餘人績最著許三禮安陽人康熙中知海寕縣濬城隍立社倉建義塾疏四境塘河剏莊婆堰瑭路至石門界以通輓運公私賴之孫毓珩奉天人康熙中知新城縣治廉惠開永昌鄉新渠築堰以資灌漑歲旱步禱數十里雨立澍因感寒疾卒氏肖像祀之至今舁像禱雨無不應者田嘉種臨潼人乾隆已丑進士知餘杭縣勤慎治事謝絶苞苴興學校勸農桑聽訟以化導為主民不忍欺值歲歉捐廉勸賑全活無數去官日百姓遮道泣送至今稱頌之人物漢轅終古錢唐人元封元年樓船將軍楊僕入東越東越使徇北將軍守武林敗樓船軍數校尉殺長吏僕率終古斬徇北將軍為禦兒侯孫鍾富春人其性至孝以種瓜為業嘗有三少年詣鍾曰予司命也以君孝感於天故來耳遂指山曰此堪為墓鍾志之及卒葬焉墳上嘗有紫雲曼延數里人謂孫氏其興矣鍾即堅之先也三國吳徐琨富春人隨孫堅征伐有功拜偏將軍隨孫策討樊能于麋等於横江擊破張英於當利口䇿表琨領丹陽太守復以督軍中郎將領兵破李術封廣德侯後從討黃祖中流矢卒子矯嗣侯矯弟祚俱有戰功凌統字公績餘杭人父操從孫權討江夏中流矢死統年十吾拜别部司馬後復征江夏統為前鋒大獲以為承烈都尉與周瑜等破曹操於烏林遷校尉雖在軍旅親賢接士輕財重義有國士之風從往合肥魏將張遼奄至統陷圍扶扞權出還戰左右盡死身亦被創所殺數十人度權已免乃還拜偏將軍及卒權為流涕全琮字子璜錢塘人父柔漢靈帝時為尚書郎右丞董卓亂棄官歸嘗使琮齎米數千斛到呉市易琮至皆㪚用空船而還柔大怒琮曰士大夫方有倒懸之患故便賑贍不及啟報柔更奇之後權以為奮武校尉擊敗魏師封錢塘侯赤烏中遷右大司馬左軍師琮為人恭順善於和顔納䂓謙虛接士無驕色子緒亦知名官至鎮北將軍丁諝錢塘人出於役伍顧邵拔而友之為立聲譽仕至典軍中郎世以邵為知人晉范平字子安錢塘人硏覽墳索遍該百氏姚信賀邵之徒皆從受業吳時舉茂才累遷臨安太守政有異能太康中頻徴不起卒諡曰文貞先生賀循勒碑紀其德行三子奭咸泉並以儒學至大官泉子蔚關内侯家世好學有書七千餘卷遠近來讀者恒百餘人蔚為辦衣食蔚子文才亦幼知名孫晷字文度富春人呉伏波將軍秀曽孫恭孝清約有學識父母起居嘗饌不離左右富春車道旣少動經山川父艱於風波每行乘籃輿晷必躬自扶侍兄嘗篤疾經年藥石甘苦必經心目見人飢寒並周贍之鄉里贈遺一無所受三公交辟並不就卒時年三十八歲朝野嗟痛之孫惠字徳施富春人呉豫章太守賁曽孫好學有才識永寕初從齊王冋討趙王倫以功封晉興縣侯冋驕矜僭侈惠諷以五難四不可勸令歸藩辭甚切至冋不納惠辭疾去頃之冋果敗成都王穎以陸機爲前鋒都督惠憂其致禍勸機辭讓及機兄弟被戮惠甚傷恨之後爲東海王越軍諮祭酒每造書檄應命立成皆有文采以迎駕功封臨湘縣公孫拯字顯世富春人能屬文仕呉爲黃門郎孫皓世侍臣多得罪惟拯與顧榮以智免呉平後爲涿令有稱績後爲陸機司馬機爲孟玖等所誣收拯考掠兩踝骨見終不變辭曰吾義不可誣枉知故竟死獄中禇陶字季雅錢塘人少而聰慧以墳與自娯年十三作鷗鳥水磑二賦見者奇之呉平召𥙷尚書郎張華謂陸機曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見禇生仕至中尉南北朝宋卜天與餘杭人元嘉中爲廣威將軍元凶劭之變事起倉卒舊將皆望風屈謝天與不暇披甲疾呼左右出戰手射劭於東宝幾中逆從擊之臂斷遂見殺孝武即位贈益州刺史諡壯侯子伯宗殿中將軍泰始初擊南賊於赭圻戰殁呉喜臨安人少涉經史從沈慶之征蠻爲孝武所知遷河東太守明帝時四方反叛喜假建威將軍性寛厚人並懷之及東討所至克㨗五年大破魏兵於荆亭封東興縣侯范叔孫錢唐人少而仁厚周窮濟急鄉曲貴其義行莫有呼其名者孝建初除竟陵王國中軍不就齊顧歡字景怡一字元平鹽官人家世微寒歡獨好學鄉中有學舍貧無以受業於舍壁後倚聽無遺忘者夕則然松節讀書或然糠自照篤志不倦母亡水漿不入口者七日廬於墓次遂隱不仕於天台山開館聚徒受業者常近百人高帝輔政徴爲揚州主簿自稱山谷臣進政綱一卷東歸歡口不辨而善於著論又注王弼易二繫學者傳之顧黯字長孺鹽官人爲散騎侍郎有隱操與顧歡俱不就徴禇伯玉字元璩錢唐人少有隱操往剡居瀑布山三十餘年王僧達爲呉郡苦禮致之停郡信宿纔交數言而退寕朔將軍邱珍孫與僧達書欲致之僧達答曰禇先生從白雲遊舊矣高帝手詔呉會二郡以禮迎遣又辭疾帝不欲違其志敕於剡白石山立太平館居之杜京產字景齊錢唐人少恬靜閉意榮宦專修黃老於㑹稽日門山聚徒教授建武初徴員外散騎侍郎京產曰荘生持釣豈為白璧所囘辭疾不就子棲字孟山善清言豫章王嶷聞其名辟議曹從事後為學士以父老歸養京產亡晨夜不罷哭嘔血數升至祥禫暮夢見其父慟哭而絶人稱其孝杜文謙錢唐人仕廢帝為博士溧陽令時明帝知權蕭諶用事將圖篡弑文謙與綦母珍之謀諶珍之不能用其計為明帝所誅文謙有學行善言吐其父聞其死曰吾所憂者恐其不得死地耳今以忠義死復何恨哉梁范述曾字子元錢唐人㓜好學仕齊為太子步兵校尉為人謇諤在官多所諫諍建武初除永嘉太守累拜中㪚大夫還鄉里武帝踐祚徴至仍辭還下詔褒美以為大中大夫生平所得俸祿皆以分施及老壁立無資有易文言注及雜詩賦數十篇范元炎字伯珪錢唐人祖悅之以太學博士徴不至父靈瑜居父憂以毁卒元炎時童孺哀慕盡禮及長好學博通經史祖母患癰恆自舍吮家貧惟以園蔬爲業嘗岀行見人盜其菘元炎遽退走或有涉溝盜其筍者伐木爲橋以渡之自是盜者大慙一鄉無復草竊齊梁間累徴辟皆不就朱异字彥和錢唐人七歲外祖顧歡謂此兒非常器遍治五經兼通雜藝年二十都尚書沈約甚重之尋以明山賓薦高祖召見使說孝經周易義召直西省俄兼太學博士自周捨卒後代掌機謀每四方表疏當局簿領填委异縱横敏贍筆不暫停頃刻便了著有禮易講疏及儀注文集百餘卷褚修錢唐人父仲都善周易爲當時之冠厯位五經博士修少傳父業武陵王紀爲揚州引爲記室性至孝父喪毁瘠過禮及丁母憂水漿不入口者二十三日每號慟輒嘔血遂以毁卒戚衮字公文鹽官人受三禮於國子助教劉文紹年十九武帝敕策孔子正言幷周禮禮記義衮對高第除揚州祭酒從事史簡文在東宫召衮及諸儒講論次令中庶子徐摛質難摛辭辯縱横諸儒懾氣衮精采自若領答如流簡文深加歎賞敬帝立爲江州刺史撰禮記義四十卷禇冕錢唐人南康王㑹理謀誅侯景黨王偉被收冕與會理有舊亦囚於官問事之听起考掠千計終無所言偉害㑹理等冕竟以不服釋之陳杜之偉字子大錢唐人家世儒學以三禮專門之偉幼精敏有逸才年十五遍觀文史及儀禮故事時軰稱其早成仕梁爲東宫學士兼太學博士及武帝受禪除鴻臚卿敕撰梁史有文集十七卷杜稜字雄盛錢唐人少落泊不爲時知頗涉書傳武帝鎮朱方以稜監義興琅琊二郡文帝嗣位以預建立功封永城縣侯仕至侍中尋加特進䕶軍將軍卒諡成配享武帝廟庭駱文牙字旗門臨安人文帝爲呉興太守引爲將帥從平杜龕張彪每戰陷陣勇冠衆軍又北拒王琳有功封臨安縣侯厯遷散騎常侍豐州刺史顧越字思南鹽官人所居新坡黃岡世有鄉校祖道望父仲成家傳儒學並專門授教越幼明慧勵精學業遍該經藝仕梁累遷國子博士歸鄉棲隱於虎邱山天嘉中詔侍東宫講讀遷給事中黄門侍郎時朝廷草創疑議多所取決所著喪服毛詩老子孝經論語等義疏四十餘卷全綬字宏立錢唐人幼受業於博士禇仲都篤志硏翫得其精微太建中位始興王府諮議參軍隋陸知命字仲通富春人好學識大體以貞介自持高智慧等作亂於江左晉王鎮江都以其三呉之望召令諷諭反者知命説下賊十七城得其渠帥三百餘人以功拜儀同三司煬帝嗣位拜治書侍御史侃然正色為百僚所惲卒贈御史大夫許善心字務本新城人初為新安王法曹陳亡高祖拜散騎常侍於座間製神雀頌奏之高祖甚悦除秘書丞大業十四年化及弑逆隋官盡詣朝謁善心獨不至化及曰此人大負氣遂害之母范氏撫柩曰能死國難我有兒矣亦不食而終按隋書本傳稱善心高陽北新城人考隋書地理志高陽隷河間並無新城縣而舊唐書許敬宗傳稱敬宗杭州人善心子是高陽乃在北之郡望南渡後居新城無疑矣因從浙江舊志載入顧彪字仲文餘杭人明尚書春秋大業中為秘書博士撰古文尚書疏二十卷魯世達餘杭人煬帝時為國子助教撰毛詩章句義疏四卜二卷唐褚亮字希明錢塘人少警敏博覽圖史在陳隋時己顯名入魯授秦王文學高祖獵親格虎亮懇愊致諌高祖禮納之太宗每征伐亮在軍中常預秘謀貞觀中累遷散騎常侍封陽翟縣侯太宗旣平寇亂乃命鄉儒官城西作文學館收聘賢才亮與杜如晦等並以本官兼學士命閻立本圖像使亮為之贊號十八學士時在選中者人謂之登瀛洲凌準字崇一富陽人以孝弟間有謀略尚氣節年二十以書干丞相丞相以聞試其文日萬言擢崇文館校書郎官至尚書後降知連州以没著有六經解圍後漢春秋二十餘萬言禇遂良字登善亮子博涉文史工隸楷貞觀中為諌議大夫兼知起居事帝曰朕有不善卿必記耶對曰臣職載筆君舉必書高宗即位封河南縣公拜尚書右僕射帝將廢王皇后立武昭儀遂良力諌不聽因致笏殿陛叩頭流血後累貶愛州刺史卒德宗追贈太尉禇無量字宏度鹽官人幼刻意典墳尤精三禮史記擢明經第累遷國子司業修文館學士中宗南郊祝欽明等建言皇后為亞獻無量據禮固爭明皇為太子兼侍讀撰翼善記以進及即位遷左㪚騎常侍兼國子祭酒封舒國公頻上書陳得失請採天下遺書不數年四庫完治卒贈禮部尚書諡文所撰述百餘篇許遠鹽官人善心曽孫寛厚長者明吏治安禄山反明皇召拜睢陽太守㑹張廵拔衆至與遠合兵拒賊賊將尹子奇將十餘萬再圍睢陽食盡援絶城陷被執至偃師不屈死贈荆州大都督官其子玫婺州司馬立廟睢陽大中時圖像於凌煙閣章成緬於潛人家貧篤學性至孝貞元中喪母廬墓十五年有紫芝烏鵲麋鹿馴擾之異敕表其閭大和中為山南東道從事五代呉越羅隱字昭諫新城人本名横凡十上不中第遂更今名能詩與族人虬鄴齊名號三羅光啟中為錢塘令有善政錢鏐辟為從事朱全忠篡唐以諌議大夫召隱隱不行且勸鏐舉兵討梁鏐雖不能用心甚義之累官鹽鐵發運使著作佐郎遷諌議大夫給事中卒年七十七隱為文章多氣力而性傲睨所著集多散失不傳成及字宏濟錢塘人為杭州團練副使與錢鏐同事攻討密謀多岀於及鏐巡衣錦城武勇右都指揮使徐綰叛及與綰戰鏐得踰城入累官保大彰義等軍節度杜建徽字延光新城人父稜為錢鏐將鎮東安有克敵功拜潤州刺史建徽少強勇有大志從錢鏐征伐輒單衣入陣累立大功自武安都將累遷昭化軍節度使吳越國丞相林克己錢塘人忠懿王時官通儒院學士博學善文章宋隱士逋即其孫也宋盛度字公量世居應天府後徙餘杭舉進士厯屯田員外郎從幸大名數上疏論邊事奉使陜西繪西域圖及河西隴右圖以獻因言形勢備禦之道帝稱其博學累遷知樞密院事卒諡文肅度精於為文常奉詔編續通典文苑英華子申甫為福建轉運使以修潔稱從兄京有吏能楊大雅字子正錢塘人素好學日誦數萬言進士及第累官集賢院學士知亳州大雅樸學自信無所阿附直集賢院二十五年不遷天禧中使淮南循江按部遇風覆舟冠服盡喪時丁謂鎮金陵遣人遺衣一襲大雅辭不受所著有大隱集西垣集職林兩漢博聞林逋字君復錢塘人少孤力學恬淡好古弗趨榮利結廬西湖之孤山二十年足不及城市自為墓於廬側臨終有茂陵他日求遺草猶喜曽無封禪書之句仁宗賜諡和靖先生逋善行書喜為詩多奇句不娶無子教兄子宥成進士宥子大年介潔自喜英宗時為侍御史盧縝字叔微杭州人幼穎悟及長曉五經大義端拱初游京師徐鉉奇之延譽於朝登進士第調束鹿主簿未赴官卒嘗著五帝皇極志孺子問翼聖書數十篇錢惟演字希聖呉越王俶之子博學能文辭真宗時獻咸平聖政錄命直祕閣知制誥祥符中為翰林學士與楊億劉筠齊名家儲文籍侔於秘府在館閣與修册府元龜著典懿等集及金波遺事錄諸書從弟易字希白以才藻知名舉賢良方正科累遷翰林學士有金閨瀛洲西垣制集百五十卷青雲總錄青雲新錄南部新書洞徹志百三十卷易子彥遠明逸相繼皆以賢良方正登科彥遠字子高為右司諌知諭院數有建明郎簡字叔廉臨安人進士及第知寕國縣累調隨州推官及引對真宗曰簡厯官無過而無一人薦達是必恬於進者特改袐書省著作佐郎厯官刑部侍郎簡性和易喜賓客即錢塘城北治園廬自號武林居士嘗從學朱頔沈天鈞二人沒訪其子孫為主婚嫁平居宴語惟以宣上德救民患為意孫沔知杭州榜其里曰德夀坊謝綘字希深富陽人父濤以文行稱累官太子賓客絳舉進士甲科厯官州縣雖在外猶數論事遷兵部員外郎請罷内降凡詔令皆由中書樞密然後施行進聖治箴五篇後知鄧州卒絳以文學知名為人修潔醖藉所至大興學舍好施宗族喜賓客卒之日家無貲有文集五十卷子景温字師直登皇祐進士官禮部侍郎厯知鄆州河陽博學合聞厯事四朝與范仲淹歐陽修友善弟景初景平景初工詩景平善著書撰詩書傳説數十篇終袐書丞陸滋字元象世家於杭通毛鄭二詩易春秋舉於鄉母病不行博極羣書皇祐四年詔錄先朝遺士郡以滋應得杭州文學著有詩賦文論二十卷元綘字厚之錢塘人登進士第厯知上元永新縣台州皆有能績神宗時拜參知政事絳所至有威名工文辭為流輩推許蕃夷書詔多岀其手陸詵字介夫餘杭人進士起家知桂州親往邕州閲簡武備軍聲大振交人遂遣使入貢改知延州諒祚寇慶州聲言復攻大順詵留其使移牒問故諒祚始謝罪共貢職後知成都陳青苗法不便願罷四路使者詔獨置成都府一路強至字幾聖錢塘人慶厯六年登第為文簡古不徇俗舉進士宰相韓琦屢薦充館閣未及用而卒官祠部員外郎虞策字經臣錢塘人登進士第元祐中為監察御史進右正言數上書論事遷左司諌帝親政條所當先者五十六事後多施行累官吏部尚書知潤州卒虞奕字純臣策之弟第進士徽宗時遷戸部侍郎内侍總領内藏予奪顓己視戸部如僚屬奕白宰相曰計臣不才當易能者不可使他人侵其官即自劾不稱職詔為罷内侍集慶守張漴請登封東平守王靚諌執政將罪之奕言靚憂民愛君柰何反為罪靚罪獲免沈遘字文通錢塘人舉進士第二通判江寕府歸奏本治論仁宗嘉之除集賢校理尋知越州徙杭州為人疏雋博達明於吏治民或貧不能葬給以公錢嫁孤女數百人倡優養良家子者奪歸其父母令行禁止奸猾屏息累官翰林學士弟遼字睿達少好學不喜進取熙寕初為西院主簿土安石臾張法令遼議論拂意遂罷去遼文章奇麗尤長於歌詩曾鞏蘇軾黃庭堅皆與唱酬遘孫晦字元用宣和間進士廷對第一紹興中累官廣西經略膽氣過人議論激昂趙鼎嘗稱之錢藻字醇老呉越王五世孫舉進士又中制科為祕書校理三上書請光獻太后歸政天子厯遷侍讀學士刻厲於學為人清謹寡過人稱其長者周邦彥字美成錢塘人博涉百家書元豐初獻汴都賦神宗異之自太學諸生一命為正益盡力於辭章累遷徽猷閣待制邦彥好音樂製樂府長短句詞韻清蔚傳於世沈括字存中遘從弟擢進士第神宗時為河北西路察訪使遼蕭禧來理河東黃嵬地遣括往聘凡六會契丹知不可奪遂舍黄嵬厯知延州元祐中以光祿少卿分司居潤卒括博學善文於天文方志律法音樂醫藥卜算無所不通有筆談傳於世錢勰字穆文彥遠子五歲日誦千言以廕知尉氏縣神宗召對將任以清要官以不附王安石命權鹽鐵判官奉使高麗凡餽餼皆不納元祐初知開封府有能名厯翰林學士與章惇不合罷知池州卒孫鼛字叔靜錢塘人微時與蔡京善常曰蔡子貴人也然才不勝德恐貽天下憂徽宗時累官顯謨閣待制知鄆州邑人子為草祭之謡指切蔡京鼛以聞京怒誣以他謗遂致仕鼛篤於行義在廣東時蘇軾謫居惠州極意與周旋二子娶晁𥙷之黃庭堅女黨事起家人危懼鼛一無所顧時人稱之卒諡通靖吳師禮字安仲錢塘人為祕書省正字以預餞鄒浩免徽宗時改右司員外郎師禮工翰墨帝訪以字學對曰陛下御極之初當志其大者臣不敢以末伎對兄師仁字坦求篤學厲志喪親廬墓後為呉王教授錢即字中道呉越王諸孫第進士厯知慶州從延安府童貫宣撫陜西欲力平錢弊及行均糴法即抗章極陳其害坐貶睦寇作起知宣州以功進龍圖學士卒諡忠定徐奭杭州人居大隱坊又嘗居萬松嶺下徽宗朝賜號冲晦先生鞠嗣復㡬塘人宣和初知休寕縣方臘黨破縣欲逼使䧏面斬二士以怖之嗣復罵曰何不速殺我賊曰我縣人也明府宰邑有善政我不忍殺乃委之而去朝廷知之加直祕閣擢知睦州為賊所傷自力渡江乞師於宣撫未及而卒按宋史本傳失載籍貫今據萬厯杭州府志採入滕茂實字秀穎臨安人政和進士靖康元年假工部侍郎副路允迪出使爲金人所留遷之代州聞欽宗將至自爲哀詞且篆宋工部侍郎滕茂實墓九字以授友人董詵欽宗及郊茂實具冠幘迎謁拜伏號泣金人迫令易服不從請從舊主共行金人不許憂憤成疾卒雲中詵歸言於張浚浚上其事贈龍圖閣直學士唐恪字欽叟錢塘人以廕登第大觀中牂牁内附尚恫疑衷甲以迎恪持節招納盡去兵衞敵望見懽呼投兵聽命靖康初拜同知樞密院事金兵薄城下何㮚爲相京城不守車駕至金營恪曰計失矣及金人逼百官立張邦昌令呉幵莫儔入城取推戴狀恪仰藥而死王稟海寕人宫建武軍節度使當靖康之阨以孤軍守太原敵九攻而九拒之援兵不至糧絶城陷與其子荀入告原廟抱太宗御容同赴汾水死建炎四年追封稟安化郡王諡忠壯荀贈右武大夫恩州刺史召其孫沆襲封何鑄字伯夀餘杭人政和進士高宗時拜御史中丞秦檜主和議逮岳飛擊大理獄命鑄鞫之鑄察其冤白之檜檜不悦鑄曰鑄豈區區為一岳飛者強敵未滅無故戮一大將非社稷之長計檜諷万俟卨論鑄私岳飛謫徽州嘉定初諡恭敏李瓊仁和人以鬻繒為業事母孝母喜食時新瓊百方求市得之必十倍酬其直張九成字子韶錢塘人游京師從楊時學紹興二年對策直言擢第一授鎮東軍簽判忤提刑張宗臣投檄歸趙鼎薦於朝累遷權刑部侍郎金人議和九成為趙鼎陳十事鼎旣罷秦檜誘之九成不從又對高宗言敵情多詐不可不察檜惡之謫守台州再居南安軍凡十四年檜死起知温州九成硏思經學多有訓解寳慶初追封崇國公諡文忠葉時字秀發仁和人淳熙中登第操履端凝博學善屬文尤䆳周禮累官龍圖閣學士卒諡文康所著有禮經㑹元竹雅集黄黼字元章餘杭人少遊太學第進士累遷太常博士輪對言用人之道帝嘉奨之除兩浙轉運副使毘陵民饑取草根以充食郡縣不以聞黼取民食以進乞賑齊全活甚衆宫至權刑部侍郎關注字子東錢塘人紹興五年進士嘗教授湖州與胡瑗之孫滌裒瑗遺書得易解中庸義藏之學宫意在美風俗新人才有集二十卷趙汝談字履常餘杭人淳熙中進士第佐丞相趙汝愚定大策汝愚去國汝談與弟汝讜上疏乞斬韓侂胄聞者吐舌累獻備邊計厯江西提舉常平理宗初入對言多剴切兼直學士權吏部侍郎復疏邊事諸法帝稱歎進權刑部尚書卒諡文恪汝談天資絶人自少至老無一日去書册所著有書經及孟荀莊諸子通鑑杜詩註按汝談宋史本傳缺系籍據咸淳臨安志云太宗八世孫居餘杭嘉熙四年卒景定四年諡文恪今增入趙汝讜字蹈中汝談弟少俶儻有䡍材折節讀書與兄齊名以訟汝愚冤坐廢後登嘉定初進士厯知温州卒洪咨夔字舜俞於潛人嘉定進士厯金部員外郎應詔直言為史彌遠所惡鐫秩去理宗親政召為禮部員外郎拜監察御史上疏指陳時弊又乞罷樞密使薛極以厲大臣之節章三上岀之其他得罪清議者相繼劾去朝綱大振拜翰林學士加端明殿學士卒子􅈴字伯魯登淳祐進士第人稱其有父氣骨在至兵部尚書卒諡文清李宗勉字強父富陽人開禧進士累遷監察御史時謀出師汴洛宗勉力言宜修内治合人謀以飭邊防嘉熙中同僉書樞密院事深陳和議之非屢條邊事皆切時弊拜左丞相守法度抑僥倖不私親黨召用老成尤樂聞讜言卒贈少師諡文清章樵字升道昌化人嘉定進士厯海州高郵山陽教官習知海徼事再上時宰書力陳李全必叛全果亂郡縣官多被禍樵率諸生盛服坐堂上講誦賊至斂刃而退擢宰呉判常州皆以廉著終知處州著有集趙景緯字德文於潛人少勤學弱冠得周程諸書讀之恨不及登朱子之門與葉味道諸人相往來硏索益精淳祐初登進士第知台州有惠政進考功郎兼崇政殿説書時彗出於柳應詔上封事咸淳中兼權中書舍人封還濫恩詞頭進權禮部侍郎進聖學四箴卒諡文安景緯天性孝友雅志冲淡親沒無意仕進故其立朝之日不久云孫守榮富陽人生七歲病瞽遇異人教以風角鳥占之術其法以音律推五數播五行測度萬物始終盛衰之理凡問者一語頃輒知休咎寶慶間名大顯淮南帥薦諸朝為丞相史嵩之所忌貶死遠郡趙卯發字漢卿昌化人淳祐中以上舍登第通判池州元兵渡江守王起宗棄官去卯發攝州事繕壁聚糧為守禦計都統張林陰降敵卯發與妻雍氏同縊死贈華文閣待制諡文節妻贈順義夫人謝緒錢塘人理宗皇后謝氏之族世居邑之安溪徳祐二年帝北狩謝太后以病請留元兵宇入宫舁之而去緒大慟與其徒訣遂赴水死時苕水陡湧高丈餘緒尸立而逆流舉葬於金龍山之側汪元量字大有錢塘人為詩惑慨有氣節善鼓琴宋亡從三宫北去留燕甚久至文天祥所作拘幽十操元祖聞其名召之乞為黃冠歸自號水雲子有水雲集葛天思字號及仁和人仕宋甫半載為元兵所執勒䧏不從遂割其耳旋自縊無子妻妾二人協志守貞其里門在縣梅東巷口名割耳巷又名葛巷妻妾沒朝封雙夫人即以所居為廟元葉李字太白一字舜玉杭州人宋景定間以太學生伏闕上書攻賈似道竄漳州宋亡歸隱富春山世祖聞其名徵為浙西道儒學提舉至元中召見詢以治道李厯陳古帝王得失成敗之由請復立名道儒學提舉及郡教授累擢尚書左丞始定至元鈔法又請立太學薦周砥等十人為祭酒等官帝皆從之官至平章政事卒諡文簡凌緯字景文昌化人篤學能文大德中以才薦為雪江書院山長尋棄去著唐山紀事董子雅言夀者錄冰室集事偶韻語等書年九十三卒縣令表之曰康德先生朱清字元之冨陽人自幼力學以氣節自許宋末與葉李為同門生甚契已而李以攻賈似道投漳州友朋莫敢往省清獨往與之訣且具酒食服用之需親䕶送岀二千里外及似道罷李免歸清候之江上相見無一語相勞第勉之以風節自終元至元間李居左揆士趨附恐後清獨漠然若未始有一日之雅者李數遣人迎致之卒不往終以布衣居邑之東山鄉人稱東山先生鄧文原字善之一字匪石其先綿州人父漳徙錢塘至大中由修撰授江浙儒學提舉科舉制行文原校文江浙慮士守舊習大書朱子貢舉私議揭於門延祐中僉江浙肅政亷訪司事折獄有聲遷集賢直學士兼國子祭酒文原為文精深典雅當大德延祐時與袁桷黃溍輩振興文教有文集若干卷諡文肅楊載字仲宏杭州人少孤博涉羣書年四十不仕延祐初仁宗以科目取士載首應詔遂登進士第厯寕國路推官載為文以氣為主而詩尤有法凡所撰述人多傳誦之錢惟善字思復錢塘人至正元年省試羅刹江賦惟善據枚乘七發辨錢塘江為曲江由是得名號曲工居士官副提舉張士誠據呉遂不仕陳斗龍字南仲昌化人父天澤娶盛氏無子又娶妾王氏生斗龍遣去後天澤與盛卒斗龍哀毁感泣有羣烏集其舍飛鳴不去儒學提舉孫朝端舉其孝行為宗晦書院長後棄官㝷生母凡六年乃得之負母過百丈山遇徽寇泣求以身代賊義之舍去俞全杭州人幼被掠賣為箚糕家奴後獲為良自汴步歸杭尋其母及姊得之事母以孝聞明鄒濟字汝周錢塘人博學強記永樂初以平度知州預修太祖實錄除儀制郎中累官左庶子少詹事輔導東宫多所裨益時宫僚多得罪死濟以憂卒仁宗立贈太子少保諡文敏子幹字宗盛正統進士景帝初由兵部郎中超擢本部右侍郎以才為于謙所倚終禮部尚書卒諡康靖王洪字希國無釁因遣使議和卒還上皇謙力也謙秉性忠孝忘身憂國不避嫌怨徐珵後改名有貞及石亨輩忌嫉之英宗復位亨等誣謙謀迎立襄世子遂棄市籍没家無餘貲成化初復官宏治初加贈太傅諡忠愍萬厯中改諡忠肅子冕字景初屢上書訟父冤官至應天府尹額森舊作乜先今改正柴車字叔輿錢塘人永樂中以舉人官至職方郎中宣德五年擢兵部右侍郎正統初西京不靖以車廉幹命協贊甘肅軍務劾總兵劉廣等喪師冒賞罪帝旌其忠直在邊章數十上悉中事宜終本部尚書王琦仁和人永樂中由舉人厯御史山西僉事四川副使居官方潔一介不取致仕歸家無擔石儲衣敝綴之以紙杭州守奏聞於朝賜之金再拜固辭竟凍餓而死葉文榮海寕人性孝友弟酗酒殺人論死母日悲泣不食文榮患之謂母曰兒已有子請代弟死遂詣官服罪楊安字彦謙錢塘人宣德進士授刑部主事正統已未隨征麓川師至境上賊遣人約降安請嚴兵以待衆以為迂賊衆果奄至士卒多陷辛酉總督王驥仍以安行安督戰渡江不避矢石士卒用命遂克之又語驥令諸道俱奮乘勢搗賊巢賊死者無數還升刑部右侍郎奉命參贊雲南軍務時麓川賊首逸於𬗟安簡鋭師先遣使責緬緬人懼求出賊自效遂誅大憝函其首以獻景泰初晉禮部尚書調南京刑部天順改元致仕夏誠字克誠仁和人宣德舉人正統初擢御史英宗北征誠上疏力諌不聽扈從至土木遇難以身捍衞冒矢石身被數創血濺御衣殁於陣天順初賜卹官其子夏時正字季爵仁和人正統進士景泰中以刑部郎中錄囚福建多所平反累擢南京大理卿成化六年廵視江西災傷除無名税十餘萬汰諸司冗役數萬增築南昌瀕江隄及豐城諸縣陂岸乞歸貧甚僦居民舍布政使張瓚為築西湖書院居之時正雅好學閑居久多所著述於稽古禮文事尤詳江玭字用良仁和人景泰進士授禮科給事中諌濫度僧道訟按察使陳璇冤劾武清侯石亨罪聲震一時成化中官至山東參政致仕歸囊篋蕭然世業悉以讓兄弟子瀾字文淵性孝友成化進士㦄官南京禮部尚書卒贈太子太保諡文昭瀾子曉暉皆進士曉字景熙嘉靖中為工部右侍郎厯官以清慎稱暉字景孚庶吉士武宗南巡抗疏諌受杖闕下官至河南僉事蘇平字秉衡海寕人永樂中舉賢良方正不就與弟正遊京師並有詩名在景泰十才子之列項騏仁和人景泰中舉授南京禮部司務憲宗初應詔陳言謂李賢王翺當曹欽作亂不能奮身死義屈節求免亷恥謂何並請内䜿母干政皆人不敢言者厯南京刑部郎中謝病歸寄居於人甘貧屢空廵按御史高其節築室居之姚文仁和人為京衞軍父早喪每晨出赴操拜母而往歸亦如之母殁擇葬地於玉泉山虎跑成穴天順中旌表洪鍾字宣之錢塘人成化進士為刑部主事曉習律令尚書林聰器之宏治初遷四川按察使馬湖土知府安鼇恣虐鍾捕送京師一方始靖厯右副都御史巡撫順天整飭薊州邊備建議増築邊牆千餘里繕復城堡二百七十所悉城縁邊諸縣因奏減防秋兵歲省費數萬正德中湖廣飢盗起命鍾以左都御史總制軍務討之陜西河南四川皆隸焉以功進太子太保卒諡襄惠祝萃字惟貞海寕人成化進士授刑部主事劉槪妖言獄起萃論救之改工部從侍郎徐貫治水蘇松以功進員外郎㝷告歸即家授徒布衣蔬食泊然無求於世正德時厯廣東左布政乞歸日事著述以終老何訥富陽人父喪廬墓蛇虎不為害成化中旌表陳璋仁和人以歲貢生入國學父卒廬墓妻錢氏值姑患疽以口吮之而愈宏治中並被旌胡世安字永清仁和人宏治進士累官南京刑部主事上書極言時政闕失再遷郎中與李承勛魏拔余祐稱南都四君子厯太平寳慶知府遷江西副使宸濠驕横有異志世安上疏極言宸濠賄用事者誣以罪謫戍瀋陽居四年宸濠果反起戍中累擢四川巡撫嘉靖初召為兵部侍郎遷左都御史持大體上憲綱十餘條以清庶獄肅官方改刑部尚書每重獄必别白為帝言之轉兵部陳兵政十事又上備邊三事以疾乞歸世安風格峻整居官廉疾惡若仇而薦賢士如不及卒贈太保諡端敏邵鋭字思抑仁和人正德三年㑹試第一由編修出為寕國推官厯福建提學副使刻意奮厲以嚴苦自持日食惟菜羮糠飯厯官皆有惠澤比去士民多涕泗追送嘉靖中遷太僕卿得疾告歸以門廕予兄子生平恥近名學以程朱為鵠卒之日囊無餘金贈右副都御史以篤學有行特諡康僖邵經邦字仲德仁和人正德進士嘉靖初厯刑部員外郎張璁與經邦為同年生屢招致之經邦薄其人不應己以日食上言陛下復召張璁桂萼輔政人言籍籍今天變若此安可弗畏帝大怒立下鎮撫拷訊謫戍福建鎮海衞久之卒隆慶初復官子重生字古菴建白閣於靈鷲山呼猿洞祀許由及唐宋名賢為樓二楹中祀其父經邦足跡不入城市過節序歸家信宿事己即還嘗送其友抵城即辭曰吾不入此久矣如是者二十年徐江山字六橋錢塘人正德進士官尚寳卿性直敢言夏言與曽銑受禍無敢白其冤者江山首上疏申救陶仲文段朝用以方術得幸江山力辨其奸又馮恩繫獄中子行可刺血寫疏自縳闕下江山力贊通政為引奏得末減其好義如此許相卿字伯台海寕人正德進士世宗立授兵科給事中宦官張鋭張忠有罪論死帝復寛之又議加興獻皇號相卿皆疏爭又李賢以中官義子襲錦衣指揮崔文以左道罔上林俊以正人被譖前後論奉詞甚切直帝卒不聽謝病歸田汝成字叔禾錢塘人嘉靖進士為禮部主事上言衣冠之侣流竄窮荒望悉加寛宥忤㫖切責厯廣西參議分守右江與翁萬達討平土酋趙楷李寰及努灘賊侯公丁之亂終福建提學副使汝成博學工古文撰炎徼紀聞西湖遊覽志見稱於時子藝蘅亦有才名張瀚字子文仁和人嘉靖進士厯大名知府諳達犯京師詔遣兵部郎中徴畿輔民兵入衞瀚立簡八百人馳至真定請使者閲之若素練者累擢右副都御史廵撫陜西隆慶初提督兩廣皆有聲萬厯初擢吏部尚書瀚為張居正所引及居正遭喪中㫖令瀚諭留瀚持不可居正怒嗾言官劾之勒致仕士論重之卒贈太子少保諡恭懿諳達舊作俺答今改正陳洪𪷟字元卿臨安人嘉靖進士授刑部主事兵備九江盗起必洗其窟廵撫貴州時施州蠻黃中叛詔洪𪷟偕楚蜀二鎮討之自川東率大軍入深箐破洞砦百餘蜀兵從西北躡之黃中迫入楚叩軍門請死時貴與蜀有戰功而楚坐得酋首蜀楚爭功不能决洪𪷟曰皆天威也三省安得徼之疏上稱洪𪷟能讓屬疾疏請骸骨當候代復輿疾剗平鎮遠邛水巴狼等叛苗御史上前後功賜白金文綺加等查秉彝字性甫號近川海寕人嘉靖進士擢禮科給事中定莊敬太子冠禮轉戸科㑹大計羣吏條吏弊七事以上後以劾嚴嵩父子杖闕下謫雲南定邊尉嵩敗起官終順天府尹童漢臣字重良錢塘人嘉靖進士擢御史廵按山西諳達薄太原為設方略督諸將擊敗之以劾嚴嵩被謫嵩敗起知泉州府倭冦犯境有保障功終江西副使諳達改見前高儀字子象錢塘人嘉靖進士選庶吉士授編修累官禮部尚書穆宗即位諸大典禮皆儀所酌定事有不可必力争掌禮部四年每歲暮類奏四方災異遇事秉禮循法居職甚稱進文淵閣大學士卒贈太子太保諡文端儀性簡靜寡嗜好室無妾媵及殁幾無以殮孫商偉富陽人嘉靖中歲貢生授福建寕德教授倭寇陷城入學宫欲挾以行商偉曰吾學官也職當死學中遂遇害方廉字雙江新城人嘉靖進士厯禮部郎中尚書徐階知其賢言於吏部以為松江知府數年大治累升蘇松廵撫總督漕運長於應變所至辦治終南京工部侍郎孫枝字敬身錢塘人嘉靖進士厯給事中疏言納級指揮實壞軍政宜罷又言崇文門商課例皆收錢自每錢七徴銀一分錢法遂壞請徵錢如故悉從之廵視光禄多所釐定改廵京營詔遣中官吕用等典京營軍枝力諌乃已善能因事爭執後至山西右參政宋應昌字桐岡仁和人嘉靖進士累官山西副使巡撫山東上海防事宜預策倭為患進選將練兵積粟三策己而語驗廷議服其先見拜兵部右侍郎經略朝鮮假便宜行事與李如松襲取平壤進收開城黃梅平畿江源四道悉下時兵部尚書石星惑於封貢之説議撤兵應昌請留兵協守星不聽應昌度事難辦引疾乞休後敘平壤功加右都御史子守一亦有名應明德字養虚海寕人嘉靖進士授刑部主事時楊繼盛奏劾嚴嵩十罪五奸有㫖先下鎮撫司榜問究主者嗣發緹帥杖一百送刑部擬罪瀕死再蘇提牢皆奸黨也明德獨檢湯藥視飲食者十四日復説尚書出之老監遷於外庫或怵以重禍勿懾也江圻字子堅曉子隆慶進士厯南京刑部員外郎終廣西提學僉事性純孝父母疾嘗䑛糞衣不解帶居喪哀毁泣血寢苫食淡三年經寢室必俯其首目不流視妻化之經夫廬亦然當事欲奏聞於朝力辭曰柰何因父死爲名旣卒門人私諡孝端先生江鐸字士振圻子萬厯進士厯山西按察使播酋楊應龍叛擢僉御史巡撫偏沅帥師破瑪瑙長坎諸囤苦竹三渡等關乘勝及海龍囤應龍縊死又討平皮林八洞諸蠻以勞疾歸卒贈兵部右侍郎洪曜祖字詔孫鍾孫也萬厯進士由庶吉士除給事中疏請撤礦内臣劾本兵田樂納賄骪法語侵閣臣沈一貫降級家居十年起嘉定縣丞累升都御史廵撫汀贑平流賊蘇俊等功未敘被劾歸卒年七十九贈兵部尚書黃汝亨字貞父仁和人腦後稜稜有奇骨目如曙星萬厯戊戌進士知進賢縣邑多浮賦汝亨上書臺司力爭之寛其征又爲建倉水次不病輸輓暇則與諸生論文奏最以忌者左遷久之起南京工部主事升禮部部中視學江西力持風格進參議備兵湖西踰年謝病歸結廬南屏著有寓林集三十卷詩六卷鍾化民字維新仁和人萬厯進士厯儀制郎中帝命並封三王化民與顧允成面語王錫爵於朝瀋王請封其庶子為王化民持不可進光禄丞河南大饑奉命往賑全活數十萬人擢太常少卿尋以右僉都御史巡撫河南討平南陽礦盜及夾河賊以勞瘁卒官敕建忠惠祠祀之卓爾康字去病仁和人萬厯舉人為大同推官遷兩淮分司罷歸賊陷京師悲憤卒爾康究心經濟作河渠議十篇他若禮樂郊廟財賦轉運錢法官制各有成書其於兵事尤善官大同時盧象昇方為總督延之上坐咨兵事爾康抗談漏下乃已象昇用其策多效所著有易説詩學春秋辨義諸書章希義富陽人天啟中浙東大饑盡發儲粟以賑宗族有不能婚嫁者為之擇配不能就學者設義塾以教之里中咸曰但為刑罰所加母為章公所短又崇禎中昌化王錫衮餘杭嚴武順錢塘陸奇本朝𥘉俱以義行旌王道焜字昭平錢塘人天啟舉人崇禎時以邵武同知知光澤縣平賊有功升兵部職方主事方待命都城陷南還及杭州失守遂投繯死本朝乾隆四十一年賜諡節愍許文岐字我西仁和人崇禎進上授南京兵部主事進即中岀知黃州府賊大擾江北佐尚書范景文治戎備景文甚倚之厯遷下江防道副使守蘄城拒張獻忠城陷被執不屈死贈太常卿又參將崔文榮海寕人並於十一年本朝乾隆四賜諡忠烈陳潛夫字元倩錢塘人崇禎舉人十六年除開封推官時屬邑多從賊潛夫結副將劉洪起大破賊將陳德於柳園福王立擢監軍御史巡按河南尋入朝陳中興之策甚悉馬士英佯應而陰絀其言南都陷從魯王於紹興計恢復及江上師潰走山陰化龍橋偕妻妾二孟氏赴水死又同縣同知翁之琪並於本朝乾隆四十一年賜諡忠節顧王家字翊明仁和人崇禎時為汝州吏目撫賊有功當遷㑹賊復來寇汝人乞留之助郟城知縣李貞佐拒賊城陷被執大聲叱賊亂刃斫死子國亦死之本朝乾隆四十一年賜諡烈愍姚奇允字有僕錢塘人崇禎進士授南海知縣有聲入為兵部主事改御史巡按廣東未任聞贑州圍急與郝維經分道募兵入城拒守城破死之子端字以式亦死節又提學副使翁鴻業知州趙景和俱同縣人並於本朝乾隆四十一年賜諡節愍徐慶餘字兆穀新城人崇禎中以舉人授四川珙縣知縣有惠政流賊陷蜀慶餘堅守孤城力盡城陷被執不屈子文斗請以身代並遇害本朝乾隆四十一年賜諡慶餘節愍俞起蛟字芝雲錢塘人以明經授魯藩長史時肅王欲廢世子起蛟力持不可歲饑勸王廣加賑恤泰山盜起勢張甚起蛟力戰破其衆崇禎十五年兖州破魯王死起蛟力戰死之一門殉節者二十三人又湖東道姚生文仁和人知縣郁廷諫杭州人監軍俞元良海寕人都司許當宸餘杭人並於年本朝乾隆四十一賜諡節愍陸培字鯤庭錢塘人父運昌初名鳴勲崇禎進士與弟舉人鳴時鳴煃並馳名藝苑有三鳳齊鳴之稱運昌知永豐吉水二縣有治績培少負俊才有文名行誼修謹舉進士為行人奉使事竣歸省南都覆謀結壯士保鄉土聞潞王降遂自縊死兄圻亦有才名國變後遁入武當不知所終培於本朝乾隆四十一年賜諡忠節周宗彝字五重海寕人崇禎舉人城陷殉節死妻卜氏與二妾朱氏柴氏從死弟啟琦巷戰力竭被殺同邑余元良字仲駿崇禎進士與兄元禮俱殉難死並於本朝乾隆四十一年賜入祠祝淵字開美海寕人崇禎舉人㑹試入都適都御史劉宗周削籍淵未識宗周抗疏爭之帝下禮官議逮下詔獄尋𬒳釋都城陷呉麟徴殉難淵親爲含殮扶柩而還遂師事宗周嘗有過閉門長跪流涕自撾杭州失守淵方葬母事畢投繯而卒又千戸蔣心赤劉璿璣蕭文璽俱海寕人生員諸復方天眷俱仁和人並於賜入祠又有本朝乾隆四十一年賜諡節愍之左長史鄭安民給事中陳士京賜入祠之主簿陸介祚經厯鄭元俊俱係浙江人因未詳其縣籍今姑附杭州府之下朱朝瑛字美之海寕人崇禎進士除旌德知縣歸專事窮經初漳浦黄道周精易象天文之學以授時令分配三百八十四爻驗古今治亂詞㫖深奥朝瑛受業其門獨能通之編釋五經多破前儒成説名五經略記同邑張次仲方八歲母疾刲股而愈舉天啟鄉薦詩易並有著述其持論間與朝瑛殊然歸趣一也纂修官臣李煌恭纂前纂修官臣蔡賡颺恭纂前總纂官臣黄爵滋恭覆輯前校對官臣吳清臯恭校
