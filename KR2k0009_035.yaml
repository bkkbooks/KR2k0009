body:
  text: 海州直隸州在江蘇省江寧府東北八百二十里蘇州府北一千一百二十里東西距二百七十里南北距三百五里東至高公島大海一百二十里西至山東沂州府郯城縣界一百五十里南至淮安府安東縣界一百五十里北至山東沂州府日照縣界一百五十五里東南至海二百里西南至徐州府宿遷縣界一百六十里東北至海一百里西北至山東沂州府治二百四十里本州境東西距一百八十五里南北距一百九十里東至海十五里至高公島大海一百二十里西至山東郯城縣界一百五十里南至安東縣界一百五十里北至贛榆縣界四十里東南至海二百里西南至沭陽縣界七十里東北至海百里西北至沂州府治二百四十里自州治至京師一千七百里分野天文奎婁分野降婁之次建置沿革禹貢徐州之域春秋為魯東境戰國屬楚秦置朐縣漢屬東海郡後漢至晉因之劉宋泰始六年僑置青冀二州治鬱洲見宋書志又魏收志作廢帝子業置誤蕭齊兼置東莞琅邪二郡治胊山梁因之東魏武定七年改曰海州治龍沮城仍領琅邪郡高齊因之後周建德六年改郡縣俱曰朐山隋開皇初郡廢大業初改州為東海郡唐武德四年復曰海州兼置總管府貞觀元年府罷天寶初仍為東海郡乾元初復曰海州屬河南道五代及宋亦曰海州東海郡屬淮南東路隆興初割以卑金屬山東東路嘉定十二年收復元至元十五年升海州路總管府後改海寧府尋降為海寧州屬淮安路明初省胊山縣入復曰海州屬淮安府領贛榆縣本朝因之雍正二年升為直隸州屬江蘇省以舊隸淮安府之沭陽縣來屬領縣二贛榆縣在州西北八十里東西距九十里南北距一百四十五里東至海十五里西至山東沂州府蘭山縣界七十五里南至本州界七十里北至山東沂州府日照縣界七十五里東南至州治八十里西南至沂州府郯城縣界百八十里東北至海八十里西北至沂州府莒州治百八十里漢置贛榆縣屬琅邪郡後漢初省建初間復置改屬東海郡三國魏省晉太康元年復置劉宋因之蕭齊屬北海郡梁分置南北二青州東魏武定七年以贛榆縣屬東海郡人置義塘郡及懷仁縣屬南青州高齊廢贛榆縣隋開皇三年廢義塘郡以懷仁縣屬東海郡唐屬海州五代宋因之金大定七年改懷仁縣曰贛榆仍屬海州元屬海寧州明屬淮安府海州本朝屬海州沭陽縣在州西南一百二十里東西距一百二十五里南北距九十里東至淮安府安東縣界八十五里西至徐州府宿遷縣界四十里南至淮安府桃源縣界四十里北至本州界五十里東南至清河縣治一百八十里西南至桃源縣治一百二十里東北至本州治一百二十里西北至山東沂州府郯城縣界一百里漢置厚邱建陵二縣屬東海郡後漢省建陵晉因之劉宋省厚邱蕭齊復置厚邱及僮縣屬北東海郡梁天監五年置僮陽郡東魏武定七年改曰沭陽郡兼置懷文縣後周建德七年改縣曰沭陽隋開皇初郡廢以縣屬東海郡唐屬海州總章元年屬泗州咸亨五年還屬海州五代宋元因之明屬準安府本朝雍正二年改屬海州形勢東濱海西接徐邳北控齊魯南通江淮滄海渺瀰高嶼絶島環列先後但無關隘可守州舊志風俗俗尚朴實力農務漁州舊志土廣而瘠薄小民不事商賈不習工藝故民多貧州志城池海州城周九里有奇門四西設水關池深六尺明永樂中築本朝乾隆三十三年修贛榆縣城周四里有奇門三池深二丈元至正年間築以土明萬厯中甃甎本朝康熙七年修乾隆三十三年重修沭陽縣城周五里有竒門四有池舊土築明萬厯二十年甃甎本朝康熙十三年修乾隆三十三年重修學校海州學在州治西明洪武二年建本朝康熙十四年修十八年二十一年乾隆六年三十四年重修入學額數二十名贛榆縣學在縣治東南明洪武四年建崇禎末燬於兵本朝順治八年重建康熙七年修十一年乾隆三十四年重修入學額數十六名沭陽縣學在縣治南明洪武三年建於黃軍營鎮本朝康熙十二年修乾隆十六年移今所入學額數二十名石室書院在州城北隅本朝嘉慶七年建懷仁書院在贛榆縣城內南門大街本朝乾隆十六年建懷文書院在沭陽縣明倫堂後舊名厚邱書院本朝乾隆二十九年建嘉慶十一年易今名户口原額人丁三萬六千九百七十七今滋生男婦大小共五十八萬五千四百八十名口田賦田地二萬九千六百七十五頃三十三畝七分四釐額徴地丁正雜銀五萬五千三百七十六兩四分二釐又雜辦銀一百八十三兩六錢米麥二萬二千九百五十一石一升八合五勺山川石棚山在州治舊志即青龍山北嶺有巨石覆巖上其形如棚可容十數人八景中所謂石室春風者是也嶺甚高峻了無花木宋石延年判海州使人以泥裹桃核為彈擲其上數年間花發滿山爛若錦繡因名萬花巖宋蔡景繁有石室詩蘇軾和之其旁又有棲鳳拾翠等巖小鬲山在州東六十里三面絶塵皆百餘仞惟東南一道容人行田橫兄弟避亂所居也銀山在州東南二十餘里石湫鎮東其山近海多白石日出照耀色如鋪銀下有銀山壩盧石山在州東南寰宇記在朐山縣東南六千里按漢書云韓信為楚王鎮於三盧盧石伊盧等三山石色黑因以為名宋張耒曰謂此與伊盧句盧二山也墮星山在州東南七十里寰宇記有二南墮星山在胊山縣南六十里相傳商時星墮於此又北墮星山在縣東南五十里並高一里舊志作大星山小星山伊盧山在州東南八十里魏書志安樂縣有伊萊山寰宇記伊盧山一名大伊萊山在朐山縣南七十五里按史記云鍾離昧家在伊盧元和志云中盧盧石在東句盧在西故曰中盧又名伊萊山盧萊二字相近音訛也明統志在州東南八十二里陬山有東西二山俱在州東南百里一在海隅一在海中東西對峙蠣山在州東南寰宇記在朐山縣東南二百里海中四面平坦潮上半沒潮落方見故其上多蠣朐山在州南四里秦置朐縣以殛絲於羽山又禹貢徐州羽畎夏翟孔安國傳羽山之谷有翟雉羽中旌旄也漢書志祝其縣禹貢羽山在南隋書志朐山縣有羽山元和志在縣西北一百里即舜殛鯀處寰宇記在縣西北九十里明統志在贛榆縣西八十里又見山東沂州府鬱林山在州東北海中鬱洲漢末黃巾起邴原將家入海住鬱洲山中晉隆安五年孫恩自廣陵浮海而北劉裕躡之於郁洲南齊書志鬱洲在海中周回數百里島出白鹿土有田疇魚鹽之利水經注胊縣東北海中有大洲謂之郁洲山海經所謂郁山在海中者也言是山自蒼梧徙此山上猶有南方草木隋書志東海縣有鬱林山寰宇記謂之蒼梧山在東海縣東北二里舊志雲臺山在州東北海中周百餘里一名青峯頂其北有望日峯其陽有青霄洞通志雲臺山幽深秀特常冠雲氣按雲臺即古鬱林其地即古東海縣也舊志及通志俱誤析為二山今改正謝祿山在州東北隋書志東海縣有謝祿山寰宇記在東海縣城西一里王莽時東海徐宣謝祿等擊莽將田况大破之嘗屯兵於此因名巨平山在州東北寰宇記由吾大夫廟在東海縣北四十里巨平山南一名由吾峯中有龍潭栖雲山在州東北即巨平之北嶺南史明僧紹傳宋升明中僧紹弟慶符為青州僧紹隨之鬱洲結栖雲精舍舊志此山高渺故號栖雲朱紫山在州東北五十二里有紅壁丹崖自相輝映遠而望之若朱紫然嚶遊山在州東北一百三里海中去岸二十里周回浮海中羣鳥翔集嚶嚶然自相喧聒故名舊志去巨平山十五里元時海運所經通志作鷹遊山輿圖作鶯遊山按自鬱林以下諸山皆鬱洲中巒阜惟鶯遊在洲東北懸居海中秦山在贛榆縣東四十里海中相傳秦始皇嘗登此勒石今存山前名棋子灣西南水底有神路三十里闊數尺由岸直抵山麓亦傳為始皇所築洪濤浸激至今不圯武強山在贛榆縣南三十里舊志相傳有鄉人黃雄率衆禦寇於此故名夾谷山在贛榆縣西四十里春秋公會齊侯于夾谷即此舊志有數峯環列當面一峯尢峻深谷夾其中委蛇橫互谷之北坡級漸上為重臺有孔子廟又見山東淄川縣舊以為齊魯會處本寰宇記之訛按左傳祝其實夾谷今祝其漢縣故城在縣西五十里知夾谷宜在此地而金志所云淄川縣在夾谷山者别無可據當是誤以水經注萌水所出之甲山為夾谷山耳不得執金志而疑寰宇記訛也吳山在贛榆縣西北三十里夾谷山北峯巒獨秀時有雲氣左脅壁立千仞紀鄣山在贛榆縣西北七十里大金山在贛榆縣北縣城據其上又縣北二十里有小金山朱汪河經其下懷仁山在贛榆縣北四十里東魏置縣以此其山無草木欄頭山在贛榆縣東北七十里舊志海邊有石欄際海可遮洪濤故名並峙者曰阿夜山海霧晝昏如夜故名其西有水簾洞建陵山在沭陽縣西北百里魏書志建陵縣有建陵山寰宇記在沐陽縣西北建陵縣緣此各南北狹長有陵阜舊志一名張倉山其北十五里有由吾洞塔山在沭陽縣西北百里接徐州府宿遷縣界為八景之一韓山在沭陽縣東北五十里按州舊志韓信為楚王講武之所孤山在沭陽縣東北七十里其脈自海州大伊山來為八景之一分水嶺在贛榆縣北七十里與山東日照縣分界又北至日照縣九十里上有水一線自石間射出高尺許分為東西二流獅子巖在州東北海中故東海城北三十里形如獅子上有泉曰濯纓大小二島在州東北五十里濱海兩山對峙潮生則沒高公島在州東北故東海城東八十里海中由吾洞在沭陽縣西北百里張倉山北隋由吾道榮學道處海北自山東安東衛斜石界入州境經贛榆縣東十五里又南經州城東十五里又東南接淮安府安東縣界州東有古東海縣地懸居海中寰宇記在東海縣東二十八里西趨州城往來所渡廣二十餘里七月內渡者多逢風流溺餘月則否按州境有十五海口在贛榆縣東北曰荻水曰分水曰柘汪曰潮河縣東曰興莊曰青口縣東南曰唐生曰范家曰小河在州東北曰臨洪州東南曰恬風又東南曰新壩曰板浦曰出河港曰河口接淮安府安東縣界景濟河在州東南二十餘里為運鹽道板浦河在州東南四十里板浦鎮束東北流入海為板浦口本朝乾隆八年濬一帆河在州東南八十里自淮安府安東縣東北流入經伊盧山南入海按輿圖此即安東縣之鹽河也北流經州南新安鎮西接碩頃湖東南口又北流分為二一東流入海為淮河口一北流與碩頃東出之水會而北經大伊山南又東北經伊盧山東北入海武障河在州東南分泄六塘河之水歸海本朝乾隆十八年濬官河在州南四十里舊志自新壩南通安東之支家河即唐時漕河垂拱中所開自漣水北通海沂密等州者也本朝乾隆八年濬加築隄工按輿圖當即新壩口河但並不接淮安府安東縣之河陸里河在州南一百三十里通官河東流入海本朝乾隆十一年濬義澤河在州西南分泄六塘河之水入鹽河歸海本朝乾隆十八年濬高墟河在州西南八十里相近有王官口下防口二河俱分泄前後沭河水由爛泥洪青伊湖入漣河歸海本朝乾隆十八年濬玉帶河舊名薔薇河在州西一里南自新壩通漣水內接市河入州城西北通贛榆臨洪鎮流入桑墟湖砂礓河由徐州府宿遷縣經淮安府桃源縣入沭陽張開河口歸前沭河達漣河入海僚分泄六塘河之幹河本朝乾隆二十二年濬碩濩湖在沭陽縣東八十里寰宇記相傳秦始皇時陷縣為湖高齊天保中此湖嘗竭西南隅有小城餘址猶存舊志州南有碩頃湖又名大湖西距沭陽東南距安東各得三分之一廣八十里袤四十里南有小河通淮北通桑墟河按碩頃湖即碩濩湖古今異名也金湖在沭陽縣東南五十里桑墟湖