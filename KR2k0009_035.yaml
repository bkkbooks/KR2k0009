名宦五代周邊珝華州鄭人顯德二年以職方員外郎出知通州歲鬻鹽於狼山等處增課萬餘石設州置守自珝始宋錢冶景德間知如皋縣邑不農桑以鹽為業冶曰使民足於衣食鹽猶農也乃悉求鹽利害為條目民以便利鹽亦歲增曾易占南豐人祥符間知如皋縣歲大飢請於州得越海轉粟所活數萬人明年稍稔州課民賦如常易占力請緩徴他縣民多轉徙惟邑獨完王隨河南人乾興初以祕書少監出知通州因州地濱海少學者隨於州建學舍州人喜遣子弟就學吳遵路丹陽人明道二年知通州時歲將飢遵路募閭右出錢航海糴未以備食置廠設糜以處流移所存活甚衆任建中寶元間通判通州築隄二十里以捍江潮田無齧沒沈起明州人知海門縣縣負海地卑間歲海潮至冒民田舍民徙以避棄其業起築隄百里引江水灌溉其中田益闢民相率以歸元綘錢塘人知海門縣淮民多盜販鹽制置使建言滿二十斤者皆坐徒綘曰海濱之人恃鹽以為命非羣販比也笞而縱之張次山河南人調泰興簿督開河渠工多先辦包拯薦之於朝徐績南陵人判通州濱海有捍隄廢不治歲苦漂溺績躬督防海卒護築之李大有東陽人判通州州田歲苦旱鑿狼山麓引江水入河溉之自是歲乃屢稔攝郡事吏持案白送例錢大有悉却之吳表臣永嘉人擢通州司理陳瓘謫居郡中一見器之盛章者朱勔黨也嘗市娨有武臣強取之章誣以罪繫獄表臣方鞫之郡將曰知有盛待制乎表臣佯若不知卒直其事尤袤無錫人為泰興令問民疾苦皆曰郡伯鎮置頓為金使經行也使率不受而空厲民漕司輸藁秸致一束數十金二弊久莫之去乃力請臺閫奏免之縣舊有外城屢殘於寇袤即修築己而金渝盟陷揚州獨泰興以有城得全王柟大名人孝宗時調海門尉乘輕舟入海濤捕劇賊小吳郎并其徒十七人獲之獄成不受賞程迥餘姚人孝宗時為泰興尉訓武郎楊大烈死而妻女存有訟其妻非正室者官沒其資部使者以諉回迥曰大烈死資産當歸其女女死歸所生母可也喬行簡東陽人慶元時知通州條上便民事劉宰金擅人為泰興令有殺人獄具謂禱於叢祠所致宰毁其廟斬首以徇鄰邑有租牛縣境者租戶與主有姻連因喪會竊劵而逃其子纍訟不休宰至鞫得其情盜劵者憮然為歸牛與租富室亡金叉惟二僕婦在置之有司咸以為冤宰命各持一蘆曰非盜叉者詰朝蘆當自若果盜則長於今二寸明旦視之一自若一去其蘆二寸矣訊之果服其罪有姑訴婦不養者宰召其一婦并姑置一室或餉其婦而不及姑徐伺之一婦每以己饌饋姑姑猶呵之其一及之如是纍日遂得其情薑才濠州人為通州副都統元兵攻揚州才為三疊陳戰於三里溝有功又與戰揚子江流矢貫才肩才拔矢揮刀而前所向辟易宋亡灜國公至瓜洲才與李庭芝誓將士出奪之以四萬人夜搗瓜洲戰三時衆擁灜國公避去元將阿爾珠招之才曰吾甘死豈作降將軍耶與庭芝東至泰州阿爾珠兵追及才疽發脅不能戰都統曹安國執以獻阿爾珠愛其忠勇欲降而用之才肆為謾言阿爾珠怒剮之揚州阿爾珠舊作阿术今改正明鄭重慈溪人成化間知通州重濬金沙河西亭河數十里民利之蔡暹成化間知泰興縣邑南濱大江每歲江水浸齧民田暹築堰捍禦長萬六千餘丈劉文寵玉四人宏治初知如皋縣舊編種馬止百餘匹永樂間以六安州被災寄養官馬千三百餘匹沿為民纍值朝使清理馬政文寵力請仍如原額民困獲蘇黃連萬全人正德中為泰興縣主簿流寇劉六等劫掠縣界連率民兵禦之生擒賊黨李南乘勝追賊被創死裴紹宗渭南人正德中令海門裁抑浮費奏蠲坍糧後官給事中以諫死張承恩易州人正德間知通州不避強禦有獻沙漲田於戚畹者承恩榜禁之其人懾而止黎堯勳四川人嘉靖中知如皋縣豪室悍竈兼并為患堯勳特請均田辨肥磽定稅為上中下三則迄今便之嵇鑘德清人嘉靖末知如皋縣百户余顯橫鷙海上鑘鈎致其黨按治正法戌海卒每歲更番為民患鑘先期畫界與戍將約母犯民俄卒殺漁者鑘執以詰戍將卒伏辜包柳芳嘉興人隆慶初為通州運判時海潮大作由石港至馬塘隄岸崩圯溺死人畜無算柳芳建議築隄自彭家口直接石港縈紆十六里凡各竈場産在隄外者俱得全民田遂免漂沒之患宋文昌商城人萬厯中知如皋縣邑田磽確仰灌淮流鹺使者惑姦人請自牙橋鑿渠東注水盡歸江闔邑苦暵文昌力請塞渠民利之周承恩武岡人萬厯中知如皋縣故例濬河之役通邑計里出夫有欲專責瀕河民役之承恩力爭得己江沙善崩漲徙靡定往往射水占賦承思均之邑中徭賦以清李衷純秀水人萬厯末知如皋縣縣地瀕江海沙漲成洲豪家輒據為業洲民爭之不得則以田獻勳辨每秋穫戈船旗鼓相接衷純單車往諭乃得解大盜數百倚洲恣掠衷純捕馘其首餘黨盡散造戰艦募兵百人邏行江上盜賊屏迹本朝陳棐光州人順治初知泰興縣時天下初定主兵者疑邑人反側棐力保無他民賴安全以最擢御史陳秉彝奉天人順治初知知皋縣會霪雨江水泛溢民多流亡秉彝倡募設帳全活甚衆馬御輦涇陽人順治二年知如皋縣時海寇及鹽徒作亂遇害事聞加贈廕恤人物宋王維熙如皋人景祐進士為大理寺詳斷官持法堅正務原人情奏案成廷尉使易之不從儂智高反掠嶺南諸州吏棄城者當坐法維熙議嶺南兵與城皆無足恃奈何以常法置之死上亦憫之皆得免纍官司封員外郎吳及通州靜海人以進士起家為侯官尉纍遷太常寺博士時仁宗春秋高無子及因推言閹寺以及繼嗣事帝異其言嘉祐三年擢右正言復上疏請擇宗室子以備儲副明年管勾登聞檢院請省冗官汏冗兵條上十餘事多施用之又言州郡官司各專其民擅造閉䊮之令遂詔鄰州鄰路災傷而輒閉糴論如違制律久之遷右司諌管勾國子監在職數年以徑正稱遇事無大小輒言後出知廬州進戶部直昭文館復知桂州卒王覿如皋人第進士神宗時為編修三司令式刪定官尋除司農寺丞司農時為要官進用者多由此選覿拜命一日即求外韓絳高其節哲宗立擢司諌上疏極論蔡確章惇韓縝張璪朋邪害正相繼斥去又劾竄吕惠卿時差役法復行議者謂免役法無一事可用覿因採掇數十事於差法有助可以通行者上之遂論青苗之害乞盡罷新令而復常平舊法覿在言路欲深破明黨之説朱光庭訐蘇軾館職䇿間吕陶辨其不然遂起洛蜀二黨之説覿言學士命詞失指其事尚小使士大夫有朋黨之名大患也帝深然之置不問尋拜侍御史右諫議大夫厯遷刑戶工部侍郎徽宗即位遷御史中丞覿清修簡淡人莫見其喜愠持正論始終再罹遣逐不少變王俊義覿從子遊學京師資用之或薦之童貫欲厚聘之拒不答以太學上舍選徽宗親程其文擢為第一蔡京邀使來見曰一見我左右史可立得俊義不往僅拜國子博士𩔶遷右司員外郎為王黼所惡以直祕閣知嶽州卒顧欣泰興人十歲喪父以母常病葷腥不入口者十載雞初鳴具冠帶率妻子詣母室問其所欲如此五十年未嘗離母左右母老目不能覩物欣日夜號泣祈天刺血寫佛經數卷母目忽明孫益泰興人紹定中李全遊騎薄城下縣令王爚募人守禦益起從之俄賊兵大至率衆拒之勢稍却益厲聲呼曰王令君募我來將以守護城邑我輩不為一死何面目見令君乎遂身先赴敵死同時顧緒顧珣俱戰死事聞贈益為保義郎明翟善泰興人洪武中貢入國學擢文選主事進員外郎掌部事尋拜侍郎時諸司未有定格善承旨仿唐六典為書名諸司職掌頒行天下後升尚書太祖欲為營第於其里善辭以江鄉地隘宗親衆不忍奪人自益又善家戍籍帝欲免之善曰今區宇初定戍卒宜增不可以臣破例帝皆善之朱顯忠如皋人從傅友德征蜀克文州令留守偽夏趙元帥與平章丁世興合兵政圍甚急顯忠悉兵拒戰力不敵城陷死之茅大芳名誧以字行泰興人博學能詩文洪武中為淮南學官擢秦府右長史輔導盡職建文初遷副都御史燕師入南京坐姦黨被收不屈死本朝乾隆四十年賜諡忠節許孚世為蘇州人元末隨父避亂如皋遂家焉舉建文己卯鄉試為方正學所得士時官工部主事榷蕪湖關聞正學殉難北向再拜泣曰吾師獲死所矣遂飲鴆死張起泰興人初遭寇亂與母相失起日夜悲泣行求四方三十年遇於濟寧奉以歸姚繼巖通州人宏治進士授工部主事厯吏部郎中一時有冰鑑之目武宗南狩繼巖與同官張元承倡令省院諸臣連章奏留被廷杖世宗初升太常少卿清譽益著張羽泰興人宏治進士由淳安知縣擢御史彈劾中貴疏論時事甚剴切巡按雲南奏免開礦及中官怙勢者後守保定以母疾乞歸崔桐海門人正德進士授編修諫武宗南巡被廷杖世宗初伏闕諌議禮復被廷杖後以副使督學於楚有清名厯辰沅兵備定永順保定爭地平長沙安化山寇擢為南京太僕纍拜禮部侍郎錢鐸通州人正德進士嘉靖初任刑部主事以諫大禮廷杖後進員外勳戚有擅役黑窰廠官軍者屬鐸鞫問罪家人管勾數十輩皆發編伍勳戚為之斂迹以郎中出守肇慶鄖陽擢廣西副使功績甚著顧養謙通州人嘉靖進士由戶部郎中厯遷杭嚴道臺省推轂邊才遂徙謙備兵薊鎮尋拜右僉都御史巡撫遼東著勳績遷南京户部侍郎以憂去時謂飬謙必能辦倭起為兵部侍郎總督薊遼軍務養謙膽氣過人臨事多知略所在著聲卒諡襄敏徐可行通州人萬厯中為長興簿先是嘉興有葉朗生之變其黨吳野樵等潛匿長興突入縣堂誘執縣令石有恆可行聞變亟挺劒喝賊梃刃交下遂先令死罵不絶口冒起宗如皋人崇禎進士授行人選南考功掌內計時憚其方正出為兖西僉事會流寇據河南起宗監河上軍賊不能渡後備兵嶺西旋調湖南寶慶副使以憲副督漕江上乞休歸子襄為諸生有聲許直如皋人崇禎進士以名節自砥知義烏縣清操皭然母憂歸哀毁骨立服闋補惠來縣因清望徴授文選主事進考功員外郎賊陷都城令百官報名直曰身可殺志不可奪不赴作書寄父絶命詞遂自經死本朝乾隆四十一年賜諡忠愍殷尚聲通州人官桂陽州判崇禎末流賊薄城城陷尚聲死之男婦從難者六人本朝乾隆四十年賜諡節愍閻應元通州人崇禎中為江隂典史手射殺賊三人南京亡大兵攻江隂應元守甚固城陷被執不屈死本朝乾隆四十一年子入昭忠祠本朝李我彭通州人寄居揚州順治乙酉四月城陷我彭負母逃至水側兵及之母驚殞我彭伏水草中俟兵過負母尸走數里掩埋畢再拜一慟而絶吳應昌通州人以武解元登順治壬辰進士授徐州守備升浦口都司己亥六月海寇入犯因調防談家洲陷陳不屈死事聞贈恤世廕孫閎達通州人康熙甲辰進士知山西太原縣愷悌得民每兩造赴庭閎達懇切誨諭多罷訟而去以病歸士民感戴入祀太原名宦祠生平日所為夜必檢記所著有省身録入祀本州鄉賢祠丁腹松通州人康熙癸未進去知扶風縣值凋殘之後事事與民休息聽訟明允以德化人善政不可枚舉雍正七年入祀名宦祠陳德奎通州人以武舉授湖北宜昌鎮標守備剿湖南苗匪有功嘉慶二年加都司銜剿辦湖北教匪擊賊於長陽縣陳亡事聞贈恤世廕如例李秉忠通州人由例貢生任貴州鎮寧黔西知州復任雲南羅平嘉慶二年黔粵苗匪竄入羅平秉忠剿撫有功晉開化知府續任廣東韶州攝瓊州府事護雷瓊兵備道所至有聲嚴高通州人任廣東碣石鎮標右營都司嘉慶十四年協剿磨刀洋面盜匪陳亡事聞贈恤如例廕雲騎尉世職流寓唐李綱本姓徐其先曹州人父敬業起兵揚州討武氏不克死之綱逃匿