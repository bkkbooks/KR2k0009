故城在巢縣西北一名會吳城春秋吳邑哀公十二年公會吳於槖臯漢置槖臯縣屬九江郡後漢省三國吳志朱桓傳黃武元年曹仁遣其子泰攻濡須城自將萬人留槖臯杜預左傳注槖臯故城在浚遒縣東南括地志在巢縣西北五十六里宋紹興十一年烏珠陷廬州屯柘臯為劉錡所敗即此烏珠舊作兀术今改正按漢志槖臯浚道二縣屬九江郡後漢省槖臯入浚遒故杜注云在浚遒東南今巢縣北有柘臯鎮舊説謂槖音近拓拓又類柘展轉致訛考春秋釋文槖音章夜反是槖字本有柘音可證今巢縣之柘臯即古槖臯矣潁川廢郡在巢縣東南劉宋僑置屬南豫州南齊初屬豫州境後省水經注竇湖水東出為後塘塘上有潁川僑郡故城無為廢縣今無為州治宋縣也寰宇記無為州軍本廬州巢縣之無為鎮曹操征孫權築城于此攻吳無功因號無為城臨濡須水上壖也尋為無為監為江淮之要津熙寧三年析巢廬江二縣地置無為縣明初省縣入州州志無為縣本唐巢縣之城口鎮故址今在州西三里花家疃扶陽廢縣在無為州西北接巢縣界晉末僑置屬南譙郡宋齊因之後省唐武德三年復置屬巢州七年廢開城廢縣在無為州西唐武德三年置屬巢州七年廢州志今為開城鎮在州西四十里新城在合肥縣西北寰宇記魏青龍元年滿寵為揚州都督上表請於合肥城西北三十里立新城吳志云大帝頻征合肥新城是也方輿紀要今雞鳴山下有新城故址晉平吳復還故治宋乾道新城記今城西北有白渡港魏築二壘于此號曰合肥城寰宇記又有界樓故城一名金牛城在縣西北五十里開皇五年立鎮置倉在廬夀二州界赭城在合肥縣西北唐光啓二年夀州刺史張翺遣兵冦廬州楊行密將田頵等敗之于赭城是也滁陽城在合肥縣東北寰宇記慎縣古滁陽城在縣東北六十四里吳赤烏十三年孫權遣兵斷滁作堰以淹北道遂築此城為守備東晉置南梁郡隋開皇三年廢慕容城在廬江縣東二十里相傳慕容垂屯兵所築舒鳩城即今舒城縣左傳文公十二年犀舒叛楚成公十七年楚滅舒庸襄公二十五年舒鳩人卒叛楚令尹子木伐之及離城杜預曰羣舒偃姓舒庸舒鳩之屬又曰離城舒鳩城寰宇記舒鳩城在舒城縣城內又云舒庸城與舒鳩城相似又有舒鮑城龍舒城俱在縣西一百里按龍舒當在今安慶府辨見前霍湖城在舒城縣南五里又花家城團基城在縣西十里羊家城繆家城在縣西十五里陽石城在縣北三十五里皆南北朝及南宋初戍守之處按團基城江南通志及府志俱作團箕城羊家城俱作羊舌城又云羊舌城一名陽石亞夫城在舒城縣東南十五里相傳周亞夫築東西二城其基尚存茆城在舒城縣東南二十里相傳曹操嘗屯兵于此高陽城在舒城縣西南二十里相傳高陽氏封子庭堅于舒蓼之間故名周瑜城在舒城縣西十八里相傳瑜從孫䇿舉義于舒因築有淨梵寺今為牧馬市鎮羹頡城在舒城縣西北三十里相傳漢高帝封兄子信為羹頡侯國于此新附城在無為州南十五里吳諸葛恪築以居新附者故名姚萇村在巢縣東北三十里青龍湯山橫山之間四山環合中為原田相傳東晉時姚萇駐兵屯田處浮邱釣石在巢縣東南三十里濡須口為浮邱公釣處水濱一大石如棋枰上鐫四字曰浮邱釣石濡須塢在無為州東北五十里濡須水口即偃月塢也一名偃月城寰宇記初吕蒙守濡須聞曹搡將來欲夾水築塢諸軍皆曰上岸擊賊洗足入舟何用塢為蒙曰兵有利鈍邂逅之間步騎相蹙何暇及水遂築塢形如偃月故以為名玉海引元和郡縣志建安十八年曹操至濡須與孫權相拒月餘權乘輕舟從濡須口入偃月塢三國吳志吕蒙傳蒙從孫權拒曹操于濡須勸權夾水口立塢備禦甚精注引吳録云云與寰宇記同按濡須塢即偃月塢舊志誤析為二今訂正寰宇記以塢在巢縣東南者時巢縣兼有今無為州地也吳王宫在廬江縣城內東南世傳五代吳楊行密故宅今為金剛寺教弩臺在合肥縣東關內方輿勝覽魏曹操所築教強弩以禦吳舟師唐大厯中因遺址違明教寺義門臺在合肥縣西十八里唐萬敬儒三世同居于此明遠臺在合肥縣東北梁縣鄉回環皆水中有一洲相傳鮑明遠讀書于此府志宋張持正即其地建俊逸亭避暑臺在廬江縣東北隅寰宇記曹操伐吳避暑休兵之處釣魚臺有二一在廬江縣東南八里石磯枕河相傳左慈釣魚處一在無為州東北舊傳浮邱伯釣魚之所子胥臺在廬江縣梓潼觀西亦稱伍相公臺今為玉虛觀孔子臺在巢縣西北五十里名勝志相傳孔子南逰至槖臯與弟子憩臺而返五鳳樓在府東城上輿地紀勝唐天祐中張崇築城創樓鳳集其上因以紀瑞鎮淮樓在府治東北隅宋紹興辛已金人南侵陷廬時築作金斗門樓據其上郭振改為譙樓又府治後有葵廳亦振建明郡守龍誥重建鎮淮樓有銅壺以核晝夜時刻九華樓在無為州南城上望池州九華山故名一名南樓宋米芾建又有稻孫樓明遠樓聚山閣俱芾建講書樓在無為州治內宋謝枋得寓于州人建此樓居之懸魚堂在府治內名勝志漢羊續為廬江太守有饋生魚者意難却之乃曝為乾懸于壁上他日復饋續乃出所懸魚以示之其人懼而退後因建為堂三至堂在府治西宋陳堯佐三守是邦故以名堂葉祖洽有記春暉堂在舒城縣邑人胡拱辰事母考因以為名明宋濓有辭萬卷堂在無為州崇德觀西宋祥符中李景倦藏書于此多祕閣所無者後以其半進于朝雲錦堂在無為州治內宋建仰高堂在無為州治東宋米芾建自撰記景賢亭在府治內有晏殊包拯詩刻石衣錦亭輿地紀勝在府治東宋天禧五年馬亮歸守鄉郡創此亭故名古陵亭在廬江縣境一作庱亭寰宇記搜神記云龍舒陵亭有樹高數十文時久旱長老因以酒脯往祭有寡婦李憲于光中見衣繡女