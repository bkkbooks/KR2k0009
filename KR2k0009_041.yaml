第一玉虛觀在廬江縣南關一名南臺相傳左慈所居內有丹井遺址崇德觀在無為州治東隅舊名羣仙觀宋建本朝順治十五年重修白鶴觀在無為州襄安鎮墩上唐建墩形如印高十餘丈紫微觀舊在巢縣北金庭山下晉咸康四年創後遷入城明洪武二年再遷于縣治西北卧牛山名宦漢王景䛁邯人建初中遷廬江太守先是百姓不知牛耕致地力有餘而食常不足郡界有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起蕪廢教用犂耕由是墾闢倍多境內豐給遂銘石刻誓令民知常禁又訓令蠶織為作法制皆著於鄉亭應融汝南人守廬江八年有惠政拜司隸校尉范式金鄉人為廬江太守有威名滕撫北海劇人建康元年九江范容周生等相聚反又陰陵人徐鳳馬勉等冦郡縣攻沒合肥命撫為九江都尉進擊大破之又擊斬厯陽賊華孟東南悉平盧植涿人靈帝時拜廬江太守深達政宜務存清靜宏大體而已羊續平陽人靈帝時為廬江太守黃巾賊攻舒續發縣中男子二十以上皆持兵勒陳小弱者使負水灌火并勢力戰大破之郡界平後安風賊戴風等作亂續復擊破之生獲渠帥其餘黨輩願為平民賦與佃器使歸農業陸康吳人光和中廬江賊黃穰等與江夏蠻連結攻沒四縣拜康廬江太守康申明賞罰擊破穰等餘黨悉降獻帝即位天下大亂康蒙險遣孝亷計吏奉貢不缺詔加忠義將軍袁術遣使求委輸兵甲康以其叛逆不納術遣孫䇿圍城康固守二年城陷月餘發病死陶謙丹陽人除舒令郡守不樂而謙在官清白無可糾舉三國魏劉馥相人曹操表為揚州刺史馥既受命單馬造合肥空城建立州治南懷緒等皆安集之數年中恩化大行百姓樂其政流民越江山而歸者以萬數於是聚諸生立學校廣屯田興治芍陂及茹陂七門吳塘諸堨以溉稻田官民有蓄又高為城壘多積木石編作草苫數千萬枚益貯魚膏數千斛為戰守備卒士民益追思之以為雖董安于之守晉陽不能過也劉靖馥子黃初中遷廬江太守詔曰卿父昔為彼州今卿復據此郡可謂克負荷者也靖為政初雖如碎密終於百姓便之有馥遺風滿寵昌邑人明帝四年拜征東將軍時吳主揚聲欲至合肥寵召集諸軍吳兵尋退寵計其偽退表不罷兵後十餘日果更來不克而還又以合肥城南臨江湖北遠壽春賊得據水為勢乃築新城於其西三十里以固守引賊平地而掎其歸路遂連敗吳兵張特涿郡人守合肥新城及諸葛恪圍城將陷乃謂吳人曰此城中尚有半人不欲降我當還相語之且持我印綬去為信吳人聽其辭而不取其印綬不攻特乃夜出諸屋材柵輔其闕二重明日謂吳人曰我但有鬪死耳吳人大怒進攻之不能克遂引去吳顧雍吳人州郡表薦弱冠為合肥長有治績晉華談廣陵人永寧中廬江內史時石冰之黨陸圭等屯據諸縣談遣司馬褚敦討平之又遣别軍擊冰都督孟徐獲其驍帥功封都亭侯南北朝梁韋睿杜陵人天監二年為豫州刺史魏遣衆來伐睿率州兵擊走之四年睿遣王超宗馮道根攻魏小峴城未能拔睿巡行圍柵因急攻之中宿而城拔遂進討合肥按行山川堰肥水頃之堰成水通舟艦繼至使軍主王懷靜築城於岸守之魏攻陷懷靜城乘勝至睿隄下睿令取繖扇麾幢樹之隄下示無動志魏兵鑿隄睿親與爭魏軍郤因築壘於隄以自固起鬬艦高與城等四面臨之城潰俘獲萬餘所獲軍實無所私焉馮道根酇人天監八年拜豫州刺史領汝陰太守為政清簡境內安定十六年復為豫州豫部重得道根人皆喜悅武帝每稱曰馮道根所在能使朝廷不復憶有一州裴邃聞喜人天監初為廬州太守時魏將呂頗率衆來攻邃拒破之普通二年加督鎮合肥為政寬明能得士心及卒淮肥間莫不流涕以為邃不死洛陽不足拔也夏侯亶譙人裴邃卒使亶持節馳驛代邃與魏相拒頻戰克捷普通七年淮堰水盛亶帥師入淮肥所向皆降詔以夀陽置豫州合肥鎮改為南豫州以亶為二州刺史時百姓多流散亶輕刑薄賦務農省役頃之民户充復荀朗潁陰人起家梁廬陵王行參軍侯景之亂朗起兵據巢湖簡文帝密授朗豫州刺史使討景朗率兵自巢湖出濡須邀破景軍陳黃法氍新建人大建五年大舉北伐以法氍為都督破齊軍於大峴進兵合肥望旗降款法氍禁侵掠躬自撫勞其年遷合州刺史隋韓擒虎東垣人開皇初高祖以擒虎有文武才用夙著威名於是拜為廬州總管委以平陳之任甚為敵人所憚唐朱敬則永城人武后時廬州刺史代還無淮南一物所乘止一馬子曹步從以歸賈深長樂人乾元中廬州刺史李華稱其有文武才略推心馭下治有嘉績張萬福元城人大厯初拜舒廬夀都團練使又攝舒州刺史督淮南盜賊窮破株黨李正巳反德宗以萬福為濠州刺史謂日江淮草木亦知爾威名路應陽平人刺廬州甓其城民不嵗苦逢水旱賤出與人歲熟以其得收故民不病飢而官府畜積羅珦會稽人德宗時為廬州刺史民間病者捨醫藥禱淫祠珦下令止之修學宫政教簡易有芝草白爵之祥淮南節度使杜佑上狀賜金紫服李翺和州人憲宗時廬州刺史時州旱疫亡籍口四萬權豪賤市田屋牟厚利而寠户仍翰賦翺下教使以田占租無得隱收豪室稅萬二千緍貧弱以安鄭綮河南人僖宗時廬州刺史黃巢掠淮南綮移檄請毋犯州境巢笑為斂兵州獨完僖宗嘉之賜緋魚歲滿去贏錢千緡藏州庫後他賊至終不犯鄭使君錢五代周宋琪薊人世宗時金陵歸款趙贊鎮廬州表琪為觀察判官部有冤獄琪辨出之宋何蒙洪州人太平興國中通判廬州時因火燔廨舍榷務俱盡蒙假民器貸鄰郡麴米為酒既而課入增倍户部使上其狀詔賚民錢獎之謝惟士陳留人建隆初知廬江時江淮新定繕修縣治撫綏士民境內以安楊允恭綿竹人至道中江淮發運使巢廬江二縣舊隸廬州道遠多寇民輸勞費允恭請以二縣建軍詔許之以無為為額陳堯佐閬中人真宗朝再知廬州以方嚴東下使人知畏而重犯法至其過失多保宥之劉筠大名人真宗時知廬州仁宗即位遷給事中筠素愛廬江遂築室城中搆閣藏前後所賜書再知廬州營冢墓作棺自為銘刻之既病徙於書閣卒筠遇事明達治尚簡嚴劉綜虞鄉人真宗時知廬州強敏有吏才所至挫抑豪右振興法度時論美之陳希亮青神人仁宗時知廬州時有虎翼軍士屯夀春者以謀反伏誅遷其餘黨數百人於廬各懷疑懼一日有竊入府舍將為不利者希亮笑曰此必醉耳貸而流之以其餘給左右使令且以守倉庫衆皆感激誓不敢二張田澶淵人嘉祐末知廬州治有善績楚建中洛陽人仁宗朝出知無為軍去後厯三甲子民更立祠祀之孫覺高郵人仁宗時為合肥主簿歲旱郡守檄民捕蝗輸官覺言民方艱食以米易之必盡力是為除害而享利也守悅推其法於他縣民賴之後為廬州守以明恕著聲王質華人神宗時知廬州盜教其徒並資而遁捕得之質論盜死大理以為法不當死質疏上不報降監舒州靈仙觀逾年韓琦知審刑院請盜殺其徒非自首者勿原著為令於是鄭戩葉清臣皆言質非罪且稱其材朱服烏程人哲宗時知廬州廬人飢便宜賑護全活十餘萬口明年大疫又課醫持善藥分拯之賴以安者甚衆米芾吳郡人政和間知無為軍善察民冤行法不畏強禦時飛蝗入境不傷禾稼人咸異之王蘧紹聖初知無為軍興修三墟開十二井築北嶺以捍水患李公麟舒州人元符中為無為州司戶參軍政尚通敏聽事判決筆無停思按明統志南畿志舊省志李公麟俱載入安慶府而舒城縣志據所得舊碑龍眠記定為舒城人考宋史又苑傳云舒州人舒州今安慶也桐域縣志載公麟龍眠山莊遺迹甚詳則公麟當屬之安慶矣而王稱東都事略作舒城人此書在宋史前典核可信廬州志亦不為無據然終以正史為定故入之名宦云陳瓘沙縣人徽宗時知無為軍為政亷平吳懋陽羡人徽宗時令廬江時劇盜劉五掠州縣懋之官或止之懋曰男兒當斬賊平亂鼠輩何為者賊聞不敢入境胡舜陟績溪人高宗時知廬州時淮西盜賊充斥廬人震恐舜陟修城治戰具人心始安冀州雲騎卒孫琪聚兵為盜至廬舜陟乘城拒守時出兵擊其抄掠者琪宵遁舜陟伏兵邀擊得其輜重而歸濟南僧劉文舜聚黨保舒州舜陟遣使招降時丁進李勝合兵為盜蘄夀間舜陟遣文舜破之請以身守江北以護行宫充淮西制置使自軍興後淮西八郡羣盜攻蹂無全城舜陟守廬二年安堵如故改知臨安府後遷淮西安撫使至廬州潰兵王全與其徒來降舜陟散財發粟流民漸歸楊存中崞縣人本名沂中紹興初為保信軍永宣使劉猊入淮西張浚使存中駐廬與劉光世相應卻之十一年以殿司兵三萬戍淮禦金人於柘臯金人以拐子馬分兩翼存中使人操長斧如墻而進鼓譟奮擊大破之王亨廬州守劉豫遣將王世沖以蕃漢兵攻廬州亨誘斬世沖大敗其衆仇悆益都人以淮西宣撫知廬州劉豫子麟合金兵大入悆募廬夀兵得數百益鄉兵二千出竒直抵夀春城下敵三戰皆止其後麟復增兵來寇悆復戰夀春城下俘馘甚衆尋詔詣闕軍民號送嶽飛湯隂人紹興三年烏珠劉豫合兵圍廬州高宗手札命飛解圍提兵趨廬偽齊已驅甲騎五千逼城飛張嶽字旗與精忠旗金兵一戰而潰廬州平十一年諜報金分道渡淮飛請合諸帥之兵破敵師至廬州金兵望風而遁烏珠改見前古迹門槖臯故城注劉錡德順軍人紹興中淮北宣撫判官金兵攻廬和二州錡自太平抵廬州據東關之險以遏其衝引兵出清溪兩戰皆勝行至柘臯與金將夾石梁河而陳河通巢湖廣二丈錡命曳薪疊橋須臾而成與諸軍會擊敵大敗王德熟羊寨人紹興七年以左護軍駐合肥柘臯之役德曰賊右陳堅我當先擊之麾軍渡橋首挫其鋒李顯忠青澗人官招撫前軍都統制烏珠犯合肥顯忠至孔城鎮與敵戰敗之烏珠曰世輔歸宋不曾立功此人敢勇宜避之焚盧江而走按顯忠初名世輔姚興相州人紹興中以兵馬副都監隸都統王權麾下與金兵戰廬州之定林卻之生擒呼沙呼及權退保和州留與拒敵至尉子橋金人以鐵騎進興力戰手殺數百人金人立權旗幟以誤興興奔之父子俱死金人曰有如興者十輩吾屬敢前乎呼沙呼舊作鶻殺虎今改正吕祉建陽人紹興中酈瓊與王德交訟命祉往廬州節制之祉至廬瓊等復訟德祉諭之瓊等感泣事小定會朝廷召瓊赴行在瓊懼遂叛執祉奔降劉豫擁次三塔祉罵曰死則死於此又語其衆曰劉豫逆臣爾軍中豈無英雄乃隨酈瓊去乎衆頗感動凡千餘人環立不行瓊恐搖動衆心急䇿馬先渡祉遇害張運貴溪人紹興中移二濡須金人犯廬夀等州大將駐兵淮壖以拒之運給餉未嘗乏絶陳規安邱人紹興中知廬州兼淮西安撫既至疾作有旨修郡城規在告吏抱文書入卧內規力疾起曰帥事機宜董之郡城通判董之語畢而卒張宗顔延安人紹興八年知廬州總帥事敵數百騎抵城下宗顔以騎百餘禦之敵退有至自淮北者傳金人言曰此張鐵山弟也胡伸婺源人知無為軍政尚慈恕而利病灼然民繪像祀之趙善俊太宗七世孫紹興中知廬州會歲旱江浙飢民麕至善俊分給官田貸牛種僦屋以居死者為給槥人至如歸州城舊毁於兵善俊葺完之因言異時恃巢湖以通饋運今既堙涸宜募鄉兵保孤姥二山治屋儲栗以備敵又增築學舍人感其化後再知廬州復芍陂七門堰農政用修免屬邑坊場河渡羡錢百姓德之楊告綿竹人調廬江尉時張景笞吏死而吏捕急逃歸告懼不見納告曰君勿憂也吾死生以之景卒免王希呂宿州人淳熙中知廬州兼安撫使修葺城守安集流散兵民賴之宇文紹節廣都人知廬州時韓托胄方議用兵紹節至郡議修築古城創造寨柵諸務專為固圍計丁仁灃清人知無為軍築堰蓄水以溉田民呼丁公堰趙汝談浚儀人知無為軍稱循吏郭振涇縣人淳熙間帥淮西展合肥城至今循其舊邱崈江陰軍人開禧中江淮宣撫使金人自渦口犯淮南或勸崈棄廬和為守江計崈日吾當與淮南俱存亡益增兵為防立雄淮軍邊境咸賴其力江潤身婺源人咸淳初為合肥主簿清廉剛決讞獄尤矜恕多所平反趙葵長沙人嘉定中通判廬州進大理司直淮西安撫參議官十七年李全住青州淮東制置使許國檄葵議兵葵曰君侯欲圖賊而坐賊穽中悔巳無及惟有重帳前兵猶足制之耳不聽卒敗杜杲邵武人淮西制置曾式中辟廬州節度推官浮光兵變果單騎往誅其渠魁守將爭餉金幣悉封貯一室將行屬通判鄭準反之安豐守告戍將扇搖軍情且為變帥欲討之杲與兩卒往諭之詣制府一軍怗然後以安撫兼廬州進淮西制置副使再與元兵戰有守功杜庶果子移廬州安撫副使人歡迎如見慈父治績甚多與元兵戰於望仙白沙城趙淮葵從子李全之叛屢立戰功德祐中戌銀樹壩兵敗被殺洪福夏貴家僮積勞加右武大夫知鎮巢貴既臣附於元招福不聽貴至城下好語語福請單騎入城門發而伏兵起執福父子福子大源大淵呼曰法止誅首謀何至舉家為戮福叱曰以一命報宋何至告人求活乎大罵請南向死以明不背國元郝彬信安人世祖時同知淮西道宣慰司事核户版理屯田諸廢修舉江淮財賦總管府掌東宮田賦其官屬皆從詹事院奉授不隸中書往往為姦利誅求無厭彬為總管入見請受憲司糾察以革私弊罷所隸六提舉司以蘇民瘼從之恩克圖至元中鎮廬州以私財築室一百二十餘間以居軍士之貧者事聞特命升其秩恩克圖舊作昂阿秃今改正塔海武宗時任廬州路總管時飛蝗北來民患之塔海禱於天蝗乃引去亦有墮水死者民乏食開廩減值俾民糴之全活甚衆特穆爾巴哈世祖孫天厯初封宣讓王鎮廬州至正十二年境內賊起亷訪使陳思謙勸特穆爾巴哈以所部兵分道擊賊擒其渠帥廬州境內皆平特穆爾巴哈舊作帖木兒不花今改正錫喇巴哈蒙古人泰定間任舒城縣歲旱民飢富家閉糴衆將肆掠錫喇巴哈奬勵義民糴穀賙給四境以安錫喇巴哈舊作燮理溥化今改正王碩河南人延祐中授無為州同知亷幹不畏強禦清理學田搜抉隱漏得田一百十九頃士得餼養明董曾洪武𥘉知無為州陳友諒陷城被執欲其降不屈沈之江唐元臨淮人明初知無為州招徠流散安集有方課最擢太僕少卿蘇敏昌平人洪武初知廬州府八載刑政不苛甚得民心伍孰廬陵人洪武中知廬江開設縣治招撫流移樂瓚潞州人洪武十年知無為州剛毅信直吏民畏服鄒以信廬陵人永樂五年知無為州政尚德教州人感化王仕錫南城人永樂二十二年知無為州興學勸農修廢舉墜任滿民留之揭稽廣昌人宣德十年知廬州興革悉中規度先是永樂中遷齊藩於廬王素驕衛士強攫人物頗為郡害稽力奏移之劉顯豐城人宣德中知舒城縣廣開水利導支流以􅓵灌溉高下得宜杜彪魏縣人知無為州振紀綱均賦役鋤強扶弱民大悅服程文確山人成化中知舒城縣通練吏治興學校修水利歲災為民懇免歲辦繇賦尋擢御史馬金西充人知廬州任久盡去宿蠧吳英裕州人成化間知巢縣理繁劇井然有條姦胥無所措手楊璲原武人正德中知廬州府時劉瑾專政境內有巨惡張杲為璫黨璲發其姦撲殺之庫吏循故事以美餘獻悉歸之庫孫聰開州人正德中知合肥縣寇亂之後招撫流移悉心安集龍誥攸縣人正德中知廬州府歲大旱開廪設粥平糶營建惠民倉鎮淮樓俾枵腹者藉力役以給食所活數萬李崙咸寧人知廬州府歲旱悉心賑救蝗不入境立俵馬法定鹽鈔價創河橋廣儲蓄善政具興吳嶽汶上人嘉靖中知廬州府稅課歲萬金例輸府嶽以代郵傳費西山薪故供官爨嶽弛其禁以利民民爰之張瀚仁和人嘉靖中知廬州府西關故有濠源出雞鳴諸山雨潦則病涉瀚跨流為橋民賴以濟歲祲發泉嚴禁糴販數讞大獄多所平反屠仲律嘉興人嘉靖中知廬州府諳於吏治尤愛民歲歉罄囊代翰秋稅不復徴補會疾作百姓祈禱願以身代竟卒於官齊恩隆德人嘉靖中無為州同知流寇犯圖山檄恩往禦以衆寡不敵死之贈光祿寺丞王家賓河南人嘉靖間知廬江恤荒興學皆極誠懇以拂權貴去官陳其樂貴溪人嘉靖中知合肥亷介有守雖居官家人不廢紡績何寵臨海人知無為州不事苛察而法無寬假倭人寇江上羽書日至寵修城警燧一方賴馬王俸秀水人萬厯中知廬州府别壷息民歲大旱手稿禾流涕禱壇壝且拜且行赤日正午雷雨忽作江沛然黃岡人署廬江縣事積弊之後力為振刷亷渠姦置之法一境肅然陳應龍侯官人萬厯中知無為州瀕江諸墟大小三百六十盛夏江流內灌膏腴盡沒應龍于魚口築堤五千二百七十餘丈扞之水患稍息民名之曰陳公壩何邦漸浪穹人萬厯中知無為州歲徴漕八千九百有竒以三千八百餘石運黃雒河交兑又五千一百餘石由江行千三百里解鳳陽江濤覆溺虧耗需索甚為民害邦漸請留鳳陽臨淮二縣米充鳳餉而本州併於黃雒河交兑彼此稱便胡震亨海鹽人萬厯初除合肥令英察如神頑梗至前一屬目使能指數姓名蠧吏秋毫不敢有所犯洪邦光福建人知無為州除養馬免糧田外一切歲辦不均邦光酌議申請分秋糧夏麥絲絹糖油四則以稅糧馬價照畝均攤至今垂為定例吳大朴固始人崇禎中知廬州府乙亥春流寇薄城大朴發炮斃其魁燒城外民居之為賊窟者又起炮樓臨濠東石閘賊不敢逼熊文舉新建人崇禎時知合肥縣亷平流賊薄城文舉築威逺亭守禦有方嚴覺歸安人崇禎中知巢縣愛士民除姦蠧乙亥流寇破城被執不屈死之家屬同時殉難張化樞雲南人崇禎中知無為州流賊夜襲城擁化樞去渡橋即投水賊挽之不得死至桐城賊使誘開城大呼曰我無為州官也賊脅我至此慎勿開城門賊殺之趙興基雲南太和人崇禎中為廬州通判賊張獻忠抵城下遣其下偽為諸生以入城中大優興基時守水西門聞變下戍樓與鬬斬數人被創死鄭元綬浙江人崇禎末廬州府經厯流賊攻廬州元綬分守南薰門力戰死本朝趙允光大興人順治初知廬州府時兵燹之後允光招徠撫字輕徭均賦民獲其利無為巢縣間有頑民聚黨為患允光捕獲其魁繩以法張鵾翔陜石人知合肥縣為政和平嚴不過刻寬不過縱時稱循吏吳允升奉天人順治九年知廬州府歲連旱設法賑濟全活者衆王業興奉天人順治中知廬州府海氛逼境業興率家丁及營卒登陴捍禦屢挫賊鋒州得無事治郡十三年勸課農桑減省刑獄民咸德之佟國貞奉天人順治中知無為州瀕江田廬恃壩捍蔽三壩將圯國貞自鮑家橋至周思溝築隄四千丈有奇名四壩後三壩傾而田廬卒無恙王宗聖奉天人順治中知舒城縣詳慎斷決吏不敢欺兵燹後安輯流亡威德並著張可捷大同人順治中知舒城縣安靜寬和蔬食布袍順民好惡祈文友廣東人順治十八年知廬江縣清丈量均里甲平賦役勸農桑薛之佐蒼溪人康熙間知廬州府精明強幹剔弊釐姦豪強不逞之徒皆潛徒境外士民賴之聶源宣府人知廬州府為政寬簡愛民禮士值大兵至郡軍需旁午殫心籌畫閭閻得以不優顔堯揆永春人康熙六年知無為州自李家祠至王家渡築壩八百八十文次年大水田廬恃以無恙名顔公壩何朝聘奉天人康熙初知舒城縣招民墾田給以牛種治舒七載獄訟衰息董守義奉天人康熙中知舒城縣有幹濟才逆藩之亂官兵往來絡繹舟車芻糗應時而辦閭閻無擾李衍芳雲南人康熙中知廬江縣縣南有二湖環湖皆墟田惟缺口一河通江泄水豪民截河外壩障上流以資灌溉潦則以鄰為壑民病之衍芳特申請除去徐大枚奉天人雍正初知廬州府居心仁厚聽斷公平子文燦復以海門同知權知廬州府多善政王宬鎮洋人乾隆二十二年知廬州府修築城垣建肥津閘以溉民田
