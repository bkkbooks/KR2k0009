body:
  text: 太平府二關隘蕪湖鈔關在蕪湖縣西河南岸將軍港明崇禎初設以榷商稅為戶部分司又河北岸河口鎮有抽分廠明成化七年設管竹木之稅為工部分司本朝初以工關歸户歲差部屬一員雍正元年歸巡撫委員兼管十一年設分巡道駐劄榷理大信巡司在當塗縣西南三十里大信河口亦曰東梁山巡司采石巡司在當塗縣西北二十里采石山元和志采石戍在縣西北牛渚山上西接烏江北連建業與和州橫江渡相對隋師伐陳賀若弼從此渡平陳置鎮貞觀初改鎮為戍新唐書志宣州有采石軍乾元二年置元和六年廢九域志當塗有采石慈湖黃池青遊丹陽薛店六鎮縣志采石營亦置於此舊有河泊所及驛丞今省魯港巡司在蕪湖縣西南十五里繁昌縣東北六十里接界處商旅駢集為防守要地明成化中移河口鎮巡司駐此荻港巡司在繁昌縣西北五十里舊有驛丞專司驛務今裁九域志繁昌縣有荻港楊家會諸鎮三山巡司在繁昌縣東北三十五里濱江上至荻港司七十里下至蕪湖河口司三十里薛店鎮在當塗縣東三十里即宋薛店鎮也青山鎮在當塗縣東南三千里青山南路濱西湖宋舊鎮也又亭頭鎮在府東南六十里黃池鎮在當塗縣東南八十里鎮北為縣界跨河而南為宣城西達蕪湖東抵江蘇高淳闤闠相連舟車四集實縣東南之巨鎮慈湖鎮在當塗縣北四十里河口鎮在蕪湖縣西濱江舊設巡司今移於魯港黃滸鎮在繁昌縣西南三十里即宋黃火鎮又上峩橋鎮在縣南一里下峩橋鎮在縣東北三十里明初嘗置繁昌河泊所於此久廢石緑場寰宇記唐開元中置其地枕江舟旅憧憧實津要之地府志在南陵仁義鄉今為繁昌地楊家沙在繁昌縣東北四十里大江中即青沙洲之東境也與江北奧龍河巡司相對明初置河泊所於此後廢陵口戍在當塗縣北晉咸和中蘇峻濟橫江登牛渚軍於陵口通鑑注在牛渚東北亦江濱戍守處又牛渚西南有白石通鑑咸安元年桓溫自廣陵還姑孰屯於此河口市在蕪湖縣城南沿河東西十里繁夥比於縣市府志作河南市石硊市在蕪湖縣南四十里與南陵縣接界晉桓彝為宣城內史蘇峻之亂出屯石硊即此魯港驛在蕪湖縣南二十里舊有驛丞今裁津梁南津橋在當塗縣南一名上浮橋又采虹橋在縣西南一名下浮橋俱跨姑孰溪襄城橋在當塗縣北門外明初太祖伏兵於襄城橋擒元將陳野先即此孝烈橋在蕪湖縣東南金馬門外一名市東橋宋烈女詹氏投水處通濟橋在蕪湖縣城南大河聯舟為梁以通往來一名浮橋一名便民橋富民橋在蕪湖縣西南五里大江口聚春橋在繁昌縣西北舊縣鎮石硊渡在蕪湖縣南四十里宋楊萬里有詩隄堰永豐陂在蕪湖縣唐書地理志在青弋江中咸通五年置新壩在當塗縣東南宋紹定中楊紹雲由此開渠引姑溪水入城濠明萬厯間以久塞重開引水經襄城橋出梅莊閘啓閉以時至今利焉萬春墟在蕪湖縣東十五里明正統間巡撫周帎築東壩遂破此以瀦水俗名萬頃湖其賦派入蘇常二府萬厯間復令居民納租取草今廢為青風草場泉石塘在繁昌縣北一里許周僅三畞餘溉田可百頃陵墓三國吳景帝陵在當塗縣東北洞陽山府志在縣東凌家山南北朝齊和帝陵在當塗縣北黃山周楚干將墓在蕪湖縣東北九里赤鑄山三國吳黃蓋墓在繁昌縣西南四十里有渡曰黃墓渡晉陶璜墓在當塗縣東六十五里陶回墓在當塗縣東北小朝山下桓溫墓在當塗縣東南青山寰宇記司馬陵晉司馬桓元偽尊為陵在青山東北隅又縣城南有溫女家毛璩墓在當塗縣南七里楊亮墓在當塗縣東南十五里泊山唐李白墓在當塗縣東南青山方輿勝覽在當塗縣東十七里青山之北白寶應元年卒初葬采石後遷龍山元和寸二年觀察使范傳正委當塗令諸葛縱改葬青山之北去舊墳六里賈島墓府志在當塗縣南二里省莊墟宋李之儀墓在當塗縣東二十五里藏雲山郭祥正墓在當塗縣東南青山陳規墓在當塗縣東南青山之北焦蹈墓在繁昌縣西南三十里赤沙灘石天麟墓在蕪湖縣南二十里丹陽鄉元十女墓在蕪湖縣東四十里德政鄉明陶安墓在當塗縣北十里大神山祠廟三忠祠在府治西祀明許瑗花雲王鼎李白祠在當塗縣東南青山麓續文獻通考萬厯初御史蔡夢説建李白祠於太平府之采石山虞太傅祠在當塗縣西北寶積山西祀宋虞允文續文獻通考景泰間重建虞允文祠於采石山下陶學士祠在當塗縣城中東街祀明陶安范學士祠在當塗縣城中忠節坊祀明范常陳通判祠在蕪湖縣察院東祀明縣丞陳一道忠臣祠在蕪湖縣東南七十里祀宋陶居仁烈女祠在蕪湖縣學西南祀宋詹烈女靈澤夫人祠在蕪湖縣西蟂磯本朝嘉慶二年奉人旨封崇節惠利夫賜英靈惠濟扁額梁文孝祠在蕪湖縣西長街升平橋東祀梁昭明太子海公祠在蕪湖縣西北明萬厯間建祀海瑞思賢祠在繁昌縣治東祀知縣林有年登勇將軍廟在當塗縣南門內西街祀宋馬進定江神祠在當塗縣西北采石山吕祖廟在蕪湖縣西慶十年奉本朝嘉旨加封夑元贊運神楊察廟在繁昌縣東南三十里祀南唐楊察龍王廟在繁昌縣西五里天井山禱雨輒應寺觀白雲寺在當塗縣東南青山晉咸寧四年建報恩光孝禪寺在當塗縣南門內唐貞觀二年建廣濟寺在當塗縣西北采石山吳亦烏二年建古麓心寺在當塗縣西北寶積山唐武德四年建普門寺在蕪湖縣西南甸山舊名普濟院南唐順義五年改建吉祥寺在蕪湖縣西五里舊名永夀晉永和二年建龍泉寺在繁昌縣西南二十里清隱山唐乾符間建靈山寺在繁昌縣西北四十里靈山墩張藝叟南征録繁昌東界有靈山寺踞山頂樓閣重復元妙觀在當塗縣北一名天慶西晉時建太平興國院在當塗縣東白紵山宋太平興國年建廣濟院在蕪湖縣北赭山南麓唐乾寧中建蓮社院在繁昌縣西南馬仁山下舊名馬仁院唐貞元間建香雲院在繁昌縣東北三十里香爐峯唐元和中建名宦漢荀淑潁陰人安帝時遷當塗長去職還鄉里後卒縣為立祠三國吳孫瑜富春人堅從子建安中以丹陽太守自溧陽領兵屯牛渚濟陰人馬普篤學好古瑜厚禮之使將吏子弟就普受業遂立學宫臨饗講肄周瑜舒人建安中孫䇿以瑜恩信著於廬江出備牛渚後領春穀長有治績黃蓋泉陵人建安中為春穀長縣有寇難蓋輒平定之陸遜吳人丹陽賊費棧扇動山越為作內應權遣遜討棧棧支黨多而主兵少遜乃益施牙幢分布鼓角夜潛山谷間鼓噪而前應時破散遂部伍東三郡得精卒數萬人屯蕪湖晉庾亮䣕陵人成帝時鎮蕪湖郭默據湓口以叛亮率步騎二萬會太尉陶侃討破之南北朝齊邱仲孚烏程人永明中為于湖令有能名太守吕文顯當時幸臣陵詆屬縣仲孚獨不為屈梁郭祖深襄陽人普通七年改南州津為南津校尉以祖深為之公嚴凊刻搜檢姦惡不避強禦常服故布𥜗素木案食不過一肉絶干請江中嘗有賊祖深自率討之大破賊威振遠近長江肅清唐李陽冰廣漢人寶應中當塗令愛民好士族人李白往依焉許渾澗州丹陽人大厯中攝當塗尉有能聲所著丁卯集有姑孰官舍諸詩宋宋準雍邱人開寶中出知南平軍會改軍為太平州依前知州事有治聲徐績南陵人大觀中知太平州召入覲極論茶鹽法為民病謂生財有道理財有義用財有法帝曰不見卿久今日乃聞嘉言黃庭堅分寧人崇寧元年知太平州以德化民不事箠楚訊治豪猾法不少貸郭偉建炎初知太平州金兵攻采石及蕪湖偉力戰敗之舊城跨姑溪上下立柵偉改築新城割姑溪於城外以便守禦孫懋宣州太平人紹興中以直龍圖閣知州事郡多冗吏懋首汰之朱子稱其愛立而教明可方良吏張運貴溪人紹興中知太平州當兵飢疾癘之餘運勞徠安輯之理財賦造戰艦繕甲兵申禁令民賴以安虞允文仁夀人紹興三十年金主亮率大軍臨采石朝命李顯忠代王權允文往蕪湖趨顯忠交權軍即犒師采石允文至權巳去顯忠未來金兵充斥宋軍三五星散允文謂坐待顯忠則誤國事遂立招諸將勉以忠義復命諸將列大陳不動分戈船為五部分甫畢金主麾數百艘截江而來直薄宋軍允文督諸將死戰有潰軍自光州至允文授以旗鼓從山後出敵疑援兵至始遁遂大敗之謂將士曰敵今敗明必復來夜半部分諸將分海舟縋上流别遣兵截楊林口金兵果至因夾擊之焚其舟三百始遁去再以捷聞隆興元年曾知太平州周葵宜興人紹興末知太平州水壞墟隄悉繕完凡百二十里傍郡墟皆沒惟當塗歲熟市河久湮雨暘交病葵下令城中家出一夫官給之食并力浚導公私便之吳芾仙居人孝宗時知太平州造舟以梁姑溪厯陽築者久役潰歸聲言欲趨郡境芾呼至城下厚犒遣之而密捕倡亂者繫獄以聞詔褎諭洪遵番陽人乾道中知太平州墟田壞民失業遵鳩民築墟凡萬數方冬盛寒遵躬履其間載酒食親餉饁人忘其勞墟遂成李椿永平人淳熙中知太平州既至力圖上流之備請選將練習緩急列艦上可以援東關濡須下可以應采石時服其識趙汝績宋宗室慶元初知當塗縣歲飢榖貴汝績開倉散米賑之事聞詔他郡行其法王居安黃巖人嘉定初知太平州當邊遽甫定歲儉汰去軍羣聚寇攘居安威惠流行晏然若無事時將副劉佑為怨家詣闕告密置獄金陵自誣服居安以書抵當路辨其冤事果白吕午歙縣人嘉定中調當塗丞守吳柔勝謂午有操守俾其子淵潛定交焉陳貴誼守太平屬午安集淮南流民吳柔勝寧國人嘉定中知太平州罷城下稅減萬春墟租疏市河多惠利子淵潛亦知是州並為名宦吳淵柔勝三子嘉熙中以寶章閣直學士知太平州一時兩淮民流徙入境者四十餘萬淵亟加慰撫周恤之使之什伍令土著人毋相犯旁郡流民焚劫無虛日獨太平境內肅然吳潛柔勝四子理宗時為督府參謀官兼知太平州言和戰成敗大計宜急救襄陽等事貽書執政論京西既失當招收京淮丁壯為精兵以保江西陳塏嘉興人淳祐中提領江淮鹽茶所兼知太平州請蠲放諸郡災傷發公帑代三縣輸折絲帛錢五十萬九千三百六十餘貫又作浮淮書堂以處兩淮民而教之徐鹿卿豐城人淳祐中領太平州蠲采石蕪湖兩務蘆稅蝗入當塗境鹿卿露香默禱忽飄風大起蝗悉渡淮牟子才井研人寶祐中以集英殿修撰知太平州首教民孝弟以前人慈竹義木二詩刻而頒之間詣學為諸生講説經義修采石戰艦百餘艘造兵仗以千計前政負上供綱及總所綱七十萬緡悉為補之蠲黃池酒息及三縣秋苗夏稅紬絲棉麥數千萬郡有平糴倉以米五千石益之又以緡錢二十六萬創抵庫歲收其息以助糴本江萬里都昌人咸淳初知太平州兼領江淮茶鹽江東轉運使潛心學行收召賢能有治聲元暢師文南陽人至大中太平路總管時大旱師文捐俸致禱澍雨大降遂為豐年當塗人坐殺牛祈雨囚繫六十餘人師文憫而出之公田米積盈屋呼貧士及細民恣其取去雖在任未久而境內之民晏然白珽錢塘人至正中太平路儒學正時兵燹後聖殿堂廡祭器載籍俱廢盡心修葺復修建天門采石二書院歐陽元瀏陽人延祐初蕪湖尹縣多疑獄久不決元察其情皆為平反豪右不法虐其驅奴元斷之從良貢賦徵發及時民樂趨事教化太行飛蝗不入境王惟中懷孟人泰定中當塗尹會大水後繼以旱蝗惟中築隄禱雨捕蝗勤於其職復勸富民捐米設粥全活甚衆倪淵烏程人泰定中當塗主簿先是田土失實賦斂不均淵署縣事編次為圖搜隱匿汰加派二稅如期而集縣有定塘為豪強所據淵立歸之民民訴歲荒守不聽淵力爭不得即求去守感悟委以檢閲即遍履阡陌核實除稅浦源無錫人泰定中蕪湖尹會大水郡發廩米千石減直以糶源謂民有錢可糶則不飢矣盡以米濟之謂同列曰郡有責吾獨償不以纍諸君也靳義河南人至正中守太平會溧水賊彭賓等寇郡義募壯勇列營柵要害且戰且撫賊遂降明兵渡采石沈水死明花雲懷遠人太祖克太平立行樞密院以雲為院判巳命趨寧國道殺羣盜還守太平陳友諒以舟師來寇雲與元帥朱文遜率三千人禦之文遜戰死友諒攻三日不克乃以巨舟乘漲令士卒緣舟尾攀堞登城遂陷縛雲急雲怒大呼縛盡裂起奪守者刀殺五六人大罵賊怒碎其首縛於舟檣叢射之而死後追封東邱郡侯許瑗樂平人太祖置幕中參軍事未幾命為太平知府陳友諒來寇執之抗罵不屈死追封高陽郡侯王鼎儀真人太祖克太平授為行樞密院判旋守太平陳友諒陷城抗罵不屈死之追封太原郡侯范常滁人太祖取太平命為太平知府常興學恤民以簡易為治官廩有榖數千石請於朝給民乏種者秋稔輸官公私皆足居三年民親愛之張嵓上虞人正統初當塗知縣縣治學宇譙樓驛舍橋梁道路皆嵓所修建林鉞晉江人嘉靖中知太平府築姑溪壩建亭於上由是溪水縈紆無衝決患陳一道晉江人嘉靖中蕪湖縣丞倭寇犯境奉檄防禦南陵衆皆奔竄一道鼓勇當其鋒以無援被害錢立仁和人萬厯初知太平府築蕪湖城創官墟東石隄四十里章嘉禎德清人萬厯中當塗知縣值大水隄且壞嘉禎曰隄壞民其魚矣吾何惜一死即躍入水若有物翼之出民畚鍤雲集隄竟無恙以府治下流水駃於匯處造浮圖鎮之置紀綱簿以清稅立和息票以止訟及卒士民哀思焉王柱長沙人萬厯中繁昌知縣值大祲捐俸設粥勸義民輸穀賑之又建橫塘河口二壩以備蓄泄徐養心江陵人崇禎中當塗知縣時流賊屠和陽民逃至江干無舟不得渡賊且近號呼赴水養心曰鄰民猶吾民也亟遣數十舟盡渡之時姑孰無備養心沿江夜張炬炮聲不絶賊懼而退本朝張京澤州人順治二年知當塗縣性清介食僅脫粟服御無華為政簡易折獄明敏自輯讞語為琴餘録催科不擾民咸德之吕秉忠遼東人順治三年太平同知時姑孰初定土寇竊發前此督捕者多羅織無辜秉忠力為詳釋保全無算金聲桓叛江西順流北下秉忠奉督撫檄守陳沙州軍容整肅叛兵不敢窺渡在任三年升知府去無舟車費巡按竇蔚贈之金乃得行林中瑜遼陽人順治二年以副將鎮太平奉檄討賊麻姑港口數立戰功郡東盜起中瑜馳擊之馬陷殁於陳范為憲內江人順治三年知繁昌縣會土寇千餘薄城下憲率衆登陴面中流矢不少動指麾勇士從城內隅出力戰殺賊賊遁事平士民有為讎家所陷以賊案株連者憲力為申雪俱得全宥劉震龍莆田人順治間知繁昌縣清介自持凡里役陋規革除殆盡折獄以誠民無冤屈會部使者清丈江洲震龍冒霜雪奔走蘆葦中親為布畫絶不假手書役故繁昌獨免增課之纍卒於官貧不能斂士民醵金為賻始得歸葬張邦寄遼東人由浙東監司左遷蕪湖令亷介平允自奉粗糲五年如一日淡若水大荔人乾隆中知蕪湖縣遇旱蝗步禱為民請命是夕雨大注蝗抱蘆死陳聖修山隂人乾隆中知蕪湖縣折獄明允多善政民呼為生佛吳嗣蕙新建人乾隆中知蕪湖縣興利除弊亷潔自持卒於官貧無以斂人物漢張磐丹陽人以清白稱桓帝時交址刺史桂陽賊胡蘭餘黨入交址磐擊破斬之為荆州刺史度尚所誣徵下廷尉會赦不肯出廷尉以其狀上詔書徵尚到廷尉辭窮受罪磐獲直以廬江太守終方儲丹陽人除郎中丁母憂歸負土成墳種松千株鸞鳥棲其上白􅊵遊其下陶謙丹陽人少為諸生仕州郡四遷為車騎將軍張溫司馬西討邊章會徐州黃巾起以謙為徐州刺史擊黃中大破走之境內晏然時李􅔸郭汜作亂關中四方斷絶謙每遣使間行奉貢西京詔遷為徐州牧加安東將軍封溧陽侯三國吳唐固丹陽人修身積學稱為儒者著國語公羊穀梁傳注講授常數十人拜議郎自陸遜張溫駱統等皆拜之終尚書僕射晉薛兼丹陽人清素有器宇與紀瞻閔鴻顧榮賀循齊名號五俊元帝為安東將軍以兼為軍咨祭酒遷丞相長史甚勤王事以上佐祿優每自約損取周而已進爵安陽鄉侯厯遷尚書領太子少傅張闓丹陽人少孤有志操太常薛兼進之於元帝言闓才幹貞固當今之良器厯侍中出補晉陵內史在郡甚有威惠後督丹陽義軍討蘇峻峻平賜爵宜陽伯遷廷尉以疾解職陶回丹陽人性雅正不畏強禦王導引為從事中郎遷司馬蘇峻之役回請早出兵守江口峻將至回謂峻必向小丹陽南道步來宜伏兵要之庾亮不從回尋還本縣收合義軍得千餘人與陶侃溫嶠等并力攻峻又别破韓晃以功封康樂伯遷吳興大守時大飢榖貴三吳尤甚回開倉及割府郡軍資數萬斛米以救之由是一境獲全徵拜領軍將軍加散騎常侍卒諡曰威何琦陽榖人沈敏有識度好古博學年十四喪父哀毁過禮事母最孝後為郡主簿遷涇令及母喪停柩在殯為鄰火所逼煙焰巳交家乏僮使計無從出乃匍匐撫棺號哭俄而風止火息其精誠所感如此服闋纍辟不就布褐蔬食恆以𫐠作為事樂道融丹陽人為王敦參軍敦遣道融召安南將軍甘卓道融雖為敦佐忿其逆節至襄陽説卓討敦卓不決軍行稽留會敦求和卓將旋主簿鄧騫與道融勸卓曰將軍起義兵而中廢為敗軍之將竊為將軍不取今將軍之下士卒各求其利一旦而還恐不可得也卓不從道融涕戾諌卓憂憤而死王諒丹陽人少有幹略初新昌太守梁碩自領交址迎前刺史修則子湛行州事永興中授諒交州刺史諒誘湛誅之謀誅碩弗克碩遂圖諒逼奪其節諒固執不與遂斷諒右臂諒正色曰死且不畏臂斷何有十餘日悲憤而卒南北朝齊劉係宗丹陽人高帝時纍官右軍將軍淮陵太守唐宇之亂發禁兵東討命係宗隨軍慰勞民賴以安時欲修白下城苦伇煩係宗啓謫役在東人隨宇為逆者上從之久在朝省嫺於職事明帝嘗曰學士不堪經國一劉係宗足矣董僧慧丹陽人有節義明帝殺鄱陽隨郡二王晉安王子懋舉兵赴難事敗王元邈知僧慧與謀執之僧慧曰晉安舉義兵僕實與謀僕得為主人死死不恨矣願至主人大殮退就湯鑊元邈義而許之白明帝免死配東冶子懋子昭基以方二寸絹為書參其消息以金假人崎嶇得至僧慧觀書慟而卒梁周興嗣項人世居姑孰博學善屬文天監初奏休平賦及舞馬賦帝甚嘉之纍官員外散騎侍郎厯給事中所著皇帝實録皇德記起居注職儀等百餘卷文集十卷唐陳商繁昌人初隱馬仁山以文謁韓愈愈稱其語高旨深登進士第會昌中以諌議權知貢舉厯禮部侍郎與撰敬宗實録終祕書監有文集十七卷張惟儉當塗人精左氏榖梁春秋舉進士厯知州刺史與侍御柳鎮善鎮子宗元作先友記惟儉與焉王居巖當塗人官驍騎尉長史遭亂棄官歸居青山楊行密據淮南使人以兵迫起之居巖散遣其家人以一身歸行密授湖州别駕不遣一日行密大會失居巖急使人至其廬則虛矣宋張崇繁昌人數世同居雍熙中內外千口閨門肅然宋惠直當塗人以進士任太常博士事親孝建炎三年周公望使金辟惠直自隨或勸之辭曰天步方艱豈臣子擇利時乎兼程而進至高郵疾卒王逢當塗人博學能屬文少舉進士不中教授蘇州晚始登第補南雄州軍事判官歸為國子監直講兼隴西郡王宅教授其徒李瑋尚岐國公主欲為逢求遷官逢辭不受久之通判徐州卒逢為人樂易篤於朋友與胡瑗最善喜著書有易傳十卷乾德指説一卷復書七卷郭祥正當塗人母夢李白而生少有詩聲梅堯臣方擅名一時見而嘆曰天才如此真太白後身也熙寧中舉進士纍官知端州棄去隱於縣青山著有青山集韋許蕪湖人志尚沖潔讀書通大義不事科舉蘇軾黃庭堅皆與遊元符中軾等貶逐雖親密不相聞許獨承接款曲且周其急士大夫以此多之高宗欲授以官許拜命而不署銜自號蕪陰居士唐敏求當塗人宣和進士調德化主簿盜起敏求挺身率衆捍賊度力不能支諭以禍福賊憤抵觸遂遇害事聞加贈升朝官仍補其子楠將仕郎李柳當塗人宣和進士以易學名紹興間通判徽州營卒為變柳直前諭之衆素敬柳曰官吏掊克故至此惟公哀憐之時巳捽太守於庭以柳言得不殺遷監察御史忤秦檜出知信州柳善占候知郡將有變豫為備俄貴溪賊起即日遣將分擊俘賊首以歸檜忌罷職復知饒州著易説張伯麟當塗人紹興初以明春秋入太學時秦檜主和議伯麟嘗題齋壁曰夫差而忘越人之殺而父乎同舍生請圬之伯麟不可會元夕復題於中官白諤門諜者以聞下獄榜掠無完膚流吉陽軍不為沮馬俊或曰名進太平州慈湖寨兵紹興二年寨軍陸德周青張順等據州叛青為謀主約翌日盡黥城中之少壯而屠其老弱然後擁衆渡江俊隸青左右得其謀陰結其徒十人殺賊然後諭衆開門其徒許之俊歸語其妻孫氏與之訣至南門伺青出上馬斫中頰九人懼不敢前俊與妻子皆遇害青被傷卧旬日賊黨散官軍至德青遂伏誅三年贈俊修武郎為立祠號登勇陶居仁蕪湖人以行義聞仕為鎮江録事參軍北軍攻鎮江統制官石祖忠舉城降居仁見執不屈遂見殺鄉人為立祠石天麟蕪湖人時南北江有事募勇敢士天麟與李資同應募由陜州入諭蠻長動以禍福皆相率降會資戮降者天麟止之不從蠻復叛天麟力戰死趙時賞和州宗室居太平咸淳進士知旌德縣德祐元年北軍至境時賞擁民兵捍戰有功升直寶章閣軍器太監從二王入閩中文天祥以為江西招討副使有䇿謀天祥重之空坑之役兵敗走吳溪追兵至問為誰曰我姓文遂禽之不屈死天祥以此得脫吕武太平步卒文天祥出使武應募從行偕脫鎮江之難沿淮東走海道賴武力為多天祥開府南劍武以武功補官遣之結約州縣起兵相應挺身犯難化賊為兵以環衛官將數千人出江西死於橫逆一軍揮泣葬之元胡光遠太平人母喪廬墓一夕夢母欲食魚晨起號天將求魚以祭見生魚五尾列墓前鄉里驚異方共聚觀有獺出草中浮水去衆知是獺所獻以狀聞於官表其閭李敘當塗人家貧寄食於友友家火遺一篋敘持而還之授江寧教諭新廟學置祭器嚴講課調建康書院山長及代餘粟千石一無所私遷平江學正秩滿歸姚和中當塗人世傳儒學不應徵召從遊甚盛婺源汪澤民同邑李習李翼皆出其門芮世通蕪湖人十世同居朝廷旌之明陶安當塗人少敏悟有大志博涉經史從耆儒李習遊元至元初舉江浙鄉試授明道書院山長避亂家居太祖渡江安與習率父老出迎與語太祖善之留參幕府授左司員外郎厯知饒州吳元年召為翰林學士為議禮總裁官又為議律官洪武元年命知制誥兼修國史嘗與帝論前代喪亂之源由於驕侈又言邪説害道帝皆嘉納之既命安為江西行省參知政事卒於官帝親為文以祭追封姑孰郡公安所學尤長於易筮驗若神方明初之議諸禮也宋濂以外艱家居其儀率安裁定李習當塗人以文學名太祖取太平習與陶安出迎遂擢為本府知府年八十餘矣卒於官習與弟翼齊名江左目為二李王愷當塗人通經史元時為府吏太祖拔太平召愷為掾從下京口撫定新附民及建中書省用為都事克衢州命總制軍民事常遇春守金華部將擾民愷執撻之遇春讓愷愷曰民者國之本撻一部將而民安將軍所樂聞也遇春乃謝尋遷左司郎中佐胡大海治省事苗軍作亂害大海執愷欲降之愷正色曰吾守土義當死詎從賊邪賊遂並其子行殺之追封當塗縣男吳晟當塗人至正庚子陳友諒陷姑孰晟為所執不屈被殺長子興先屯兵城南合攻解趙元帥之圍賜金幣未幾與友諒第五宰相戰於采石死之興弟振襲領父兵同大軍取建昌守江西戰死漳江門並御製文以祭潘庭堅當塗人太祖駐太平陶安入謁太祖詢人才以庭堅對為太平翼元帥府教授參機密庭堅以慎密謙約為太祖所稱擢中書省博士同知金華府事太祖為吳王召為翰林院侍講學士以老歸洪武四年復召主會試潘黼庭堅子幼師陶安授太平府學教授纍升中書省左司郎中吳元年除江西湖東道按察使會修律令留為議律官書成卒黼謹飭類父而文采清雅過之劉允當塗人洪武進士授懷慶通判以直見忤謫瑞安縣丞多善政超拜北平按察司副使考績留教授親王於內以老歸卒允博學侃侃善持節每召對多稱旨嚴升繁昌人建文時進士厯官大理寺少卿清軍蘇松執法不撓調南京僉都御史剛果自信嘗為神羊賦以見志焉李衡當塗人永樂進士除戶部員外郎以廉介勤慎為尚書夏原吉所任尋升湖廣參政撫和邊方翕然歸化原吉薦為兵部右侍郎卒於官衡為人老成端重而有理繁治劇之才著有淡軒詩集楊壁當塗人景泰進士擢監察御史劾石亨久之為陜西參議改平涼守致仕歸吳琛繁昌人景泰進士厯雲南道監察御史巡按四川明達果斷有聲英宗復位石亨專權自恣琛與同官劾之出知遷安縣五日天變雨雹命還臺職纍升右僉都御史巡撫甘肅湖廣總督兩廣卒於官鍾成當塗人少穎敏苦志積學景泰進士厯官大理寺正著聲明允門舍蕭然厯擢江西副使兩督學政士經品題者多為令器晚歸鄉里門下執經問難者踵接黃讓蕪湖人景泰進士授御史因天變與御史倪敬等陳十事皆觸忌諱以浮薄謫四川營山縣典史至則囅然笑曰此豈不可以行志邪上官重其才厯升中府都事雅有風裁錦衣門達用事役隸皆席勢橫甚讓榜掠其黠悍者達怒托其所役聽事人為賕遣戍廣西後詔以原官致仕李贊蕪湖人成化甲辰與弟貢同登進士贊授吏部文選主事正德中厯浙江左布政推太僕卿忤劉瑾致仕貢纍官右副都御史巡撫遼東亦以忤瑾致仕瑾敗起巡撫順天升兵部右侍郎致仕性孝友家居不易言笑服御質素訓子弟嚴而有禮汪宗器繁昌人成化進士授監察御史巡按湖南廣東薦賢斥貪得激揚體升南京大理少卿蒞獄平恕時劉瑾撓法動多掣肘遂決志以母老乞終養疏五上允之特進光祿卿致仕胡爟蕪湖人宏治六年進士改庶吉士授戶部主事十年災異求言爟應詔疏言中官李廣楊鵬引左道劉良輔輩惑亂聖聽而不肖士大夫方乞憐於其門交通請託陰盛陽微災何由弭因極陳戚畹方士傳奉冗員之害疏留中未幾廣死爟得無罪邢珣當塗人宏治進士正德初厯官南京刑部郎中忤劉瑾除名瑾誅起南京工部遷贑州知府招降劇盜滿總等授廬給田撫之甚厚後討他盜多藉其力王守仁征橫水桶岡珣常為先鋒功最增二秩宸濠反珣同守仁討平之遷江西右參政世宗録功增秩二等喻智當塗人正德進士厯湖廣按察使斷楚藩英耀獄升光祿卿以副都御史巡撫南贑秩滿歸嚴嵩使者過縣橫甚智執而撻之且諭之曰歸語而主撻而者喻都堂也端廷赦當塗人嘉靖進士授高安令擢監察御史首劾武定侯郭勛驕橫貴戚斂手避之巡茶馬於西陲劾去貪墨者數人屢升僉都御史巡撫山東河南升戶部右侍郎轉南京右都御史有大俠善結納要路侵害客商擒治之以正典刑錢法濫惡出令禁治中外凜凜倪嵩當塗人嘉靖進士由御史厯升戶部侍郎時曾銑議復河套夏言主之為嚴嵩所怒詔逮銑下獄嵩爭甚力調南京右都御史諷使更名嵩曰命名自父何可易後廷推吏部尚書嚴嵩厲聲曰廟堂可使有兩嵩邪嵩即日乞休去徐貢元繁昌人嘉靖進士由戶部郎中出知德安府厯兩司治獄多所平反羡金盡入公帑纍遷戶部侍郎總督糧儲性剛介始終一節與海瑞齊名周易蕪湖人嘉靖進士授兵部主事擢御史疏救吳彥條論邊務詞皆侃直督學北畿執政以私牘投焚之於門官至布政使司參議王懋蕪湖人嘉靖中由鄉薦任湖州府同知調彰德以卓異升刑部員外郎恤刑畿輔卒於官懋佐郡日定武康民變均徭薄賦甫三月而化行其在西曹爰書十餘上活囚四百餘人張𣏌當塗人與韓良直為密友韓疾劇以三十金授𣏌囑之曰妻方有孕若男也可以此撫之韓亡後妻果得子𣏌給衣食得成立及杞抱病將殁呼韓氏子啓篋金三百付之皆積年營息所致也子感泣聞者皆高其義陳一簡繁昌人萬厯進士任户部郎中理密雲餉搜剔積弊殆盡擢昌平僉事大璫張經以非法殺人手疏劾奏抵經罪官終河南副使蕭雲從蕪湖人崇禎己卯副榜專以詩文自娛有梅花堂遺稿并易存離騷圖兼工畫得倪黃筆法沈受蒲當塗人以薦授橫州知州升夔州同知調成都賊張獻忠入蜀城陷死之家屬無一人還者又同縣人金鼎祚任知縣亦殉節死本朝乾隆四十二年並賜諡烈愍史記言當塗人崇禎中由長沙知縣遷知陜州陜當賊衝記言出私財募士聘少室僧訓練之斬賊數十級生擒二十餘人老回回憤率數萬人乘雪夜來襲城陷記言縱火自焚兩僧掖之出曰死此何以自明乃越女牆下賊追獲之令降叱曰有死知州無降知州也遂被殺事聞贈光祿少卿本朝乾隆四十二年賜諡忠愍倪瑞允當塗人以歲貢任當塗縣張獻忠犯楚瑞允主防守軍餉不足破産以濟報最行取楊嗣昌愛其才留軍前賊攻城率兵拒守中流矢卒吳士琇當塗人崇禎中以拔貢任徽州府訓導教士重大節本朝兵下徽州士琇署祁門縣事城破不食死子繼生宜生相隨死本朝楊璜當塗人會兵繞其鄉璜匿妻子林中身守祖墓兵將執之遂赴水死子甫十齡見父溺號哭亦奔投水久之父子兩尸攜手浮出見者嗟異孫啓綸當塗人事母以純孝聞嘗負母避盜盜識之曰此孫孝子也遂解去楊世學當塗人順治丁亥進士由評事擢御史有請嚴採買杜騷擾諸疏部覆允行又請濬淮河下流海口河患自息時論韙之出為武昌分守道招撫山賊鄭鴻等十三寨厯衡永參政所至皆以清操聞韋嗣賢蕪湖人順治乙未進士授撫州推官剖決精敏擢吏部主事厯郎中凊介有守居鄉尤以仁厚得時譽張奇蕪湖人順治六年以鄉貢知廣東瓊州府文昌縣十一年正月徵糧城外遇城守楊殿臣搆通海賊韓昌時謀叛劫糧奪印不屈死之弟意次子仲景僕張喬同時遇害陳三齊繁昌人農家子十二歲母死朝夕上食哭泣盡哀既葬廬墓側三年時稱孝童宋真儒蕪湖人少孤與弟繩武事母盡孝母卒兄弟廬墓哀號不輟池蓮變為白色且有雙莖之異四世同居置田贍族康熙五十三年旌徐文靖當塗人雍正癸卯舉人乾隆初舉經學授檢討刻苦力行研貫經史百家耄年猶據案著書不輟年九十餘乃卒著有經言拾遺禹貢會箋竹書紀年統箋山河兩戒考管城碩記等書行世王瀚當塗人雲南景蒙營守備乾隆三十四年隨征緬甸攻猛養寨力戰殁於軍事聞恤廕如例流寓齊謝朓陽夏人為宣城太守愛青山有終焉之志築室其南唐天寶中改名謝公山唐李白隴西成紀人李陽冰為當塗令白依之代宗時以左拾遺召而白已卒宋石待問眉山人仁宗時通判太平樂其風土致仕後遂家蕪湖黃庭堅題其墓曰有宋賢良方正贈金紫大夫九謫而不悔自下劘上眉山石公之墓李之儀無埭人坐為范純仁遺表作行狀編管太平遂居姑孰著有姑溪集楊宏中福州人趙汝愚竄永州與林中麟等六人上書送太平州編管張祁厯陽人晚年卜居蕪湖之升仙橋築堂曰歸去來觴咏自適所居池多蛙即以硯擲之蛙聲遂息至今名其池曰禁蛙池列女唐李白二孫女元和末宣歙觀察使范傳正祭白冢禁樵採訪後裔惟二孫女嫁為民妻進止仍有風範因泣曰先祖志在青山頃葬東麓非本意傳正為改葬立二碑焉告二女將改嫁士族辭以孤窮失身命也不願更嫁傳正嘉嘆免其夫徭役聶氏當塗人年十三隨母採薪虎攫母去女持刀刺虎殺之母尸得全宋詹氏女蕪湖人紹興初淮寇一窠蜂破縣欲殺其父兄女趨前拜曰妾願執巾帚贖父兄命賊釋父兄縛女麾使亟去隨賊行過市東橋躍入水死賊相顧駭嘆元葛通甫妻丁月娥當塗人元末南北兵起月娥攜諸婦諸女僦居郡城沔寇至城失守月蛾抱所生女赴水死諸婦諸女凡九人皆爭相入水無一敢後者明花雲妻郜氏繁昌人洪武初雲守太平陳友諒來攻雲戰急郜祭家廟挈三歲兒泣與家人曰城破吾夫必死吾義不獨存然不可使花氏無後若輩善撫育之雲被執郜赴水死侍兒孫氏瘞郜畢抱兒行被執得脫復逃渡江為潰軍捽入水浮斷木至葦洲採蓮實哺兒七日不死夜半有老父號雷老挈之行達太祖所孫抱兒拜泣太祖亦泣置兒膝上曰此將種也賜雷老衣忽不見賜兒名煒纍官水軍左衛指揮僉事嘉靖初贈郜貞烈夫人孫安人立祠致祭陶安妻陳氏當塗人安殁前妻子昱坐法遣戍陳叩閽泣奏免昱罪徐俊妻周氏繁昌人俊卒無子周厲志守節成化初旌表白氏當塗人父與夫俱失其名未嫁守節父母卒倚叔白都以女工度日年七十餘一日忽更衣簪髻拜木主前家人驚駭禮三終而氣絶夏邦枓妻孫氏當塗人二十而寡家貧無子中歲瞽目祝天曰吾以針糿為命可奪邪忽雙燈自梁下目頃復明吳寶妻芮氏蕪湖人年十六歸寶明年夫亡父母偶諷之遂不歸侍姑疾刲股以進年七十餘卒張屺女繁昌人正德中流賊剽掠里人皆奔竄女年十七以事母病不去賊劫以行女抱樹痛哭大罵不屈賊不能奪乃衆磔之孫士毅妻陶氏當塗人守節十年值南都覆為亂卒所掠縛其手以刃臨之氏不從寸磔死吳昌祚妻謝氏當塗人亂卒掠太平得之田間氏以手抱樹大罵卒怒支解之某氏當塗人黃兵屠郡婦數十輩匿敵樓撤其梯氏至呼衆欲上衆恐兵至伏不應兵隨至執之訊及樓上氏曰無人脅以刃無異辭遂被殺樓上婦獲免白其義衆為瘞之同縣陳衷韞妻張氏張元詰妻倪氏蕪湖旌必韶聘妻葛氏農家婦鄒氏繁昌李模聘妻周氏宣璧妻土氏章其暗妻陳氏從大抱妻湯氏胡文珖妻孫氏殷起龍妻姚氏並女耀姑殷曰盤妻楊氏殷曰新妻彭氏柯昌茂妻蕭氏謝智妻柯氏從大恩妻朱氏從大懋妻陳氏徐宗宏妻張氏徐國斗妻葛氏從大新妻張氏姚之基聘妻從氏俱遇賊不辱慘死本朝朱還淳妻謝氏當塗人夫亡守節同縣吳學道妻嵇氏唐秉極妻曹氏均夫亡守節俱順治年間旌林珏妻徐氏當塗人夫亡守節同縣鍾蔡兩義婢一姓陶一姓王因主母孀居願侍奉終身以室女終豫章烈婦當塗人遇賊守正捐軀同縣郎應秀妻王氏郎遇采妻王氏徐守倫妻周氏暨女及媳湯德符妻芮氏均遇賊守正捐軀李愆妻陳氏蕪湖人夫亡守節同縣杜連妻丁氏張政善妻湯氏均夫亡守節俱順治年間旌俞廷耀妻陶氏蕪湖人夫亡殉節于斯光妻汪氏繁昌人夫亡殉節同縣何煥妻郝氏亦夫亡殉節陳吉士妻張氏繁昌人守正捐軀端揆妻唐氏當塗人夫亡守節同縣費嘉奏妻鍾氏楊惟樓妾焦氏許啓豸妻楊氏關大元妻吳氏彭應帶妻陳氏夏以禮妻吳氏郭際雲妻孔氏凌有亮妻張氏楊可侯妻施氏林春選妻高氏孫繼祖妻江氏均夫亡守節俱康熙年間旌俞一中妻韋氏蕪湖人夫亡守節同縣查時懋妻葉氏劉復浤妻唐氏畢祈妻葉氏均夫亡守節俱康熙年間旌晉執圭妻朱氏當塗人夫亡守節同縣朱時鳳妻李氏周之國妻吳氏張正大妾楊氏王應掄妻吳氏鮑一鳴妻庾氏晉德超妻彭氏盛於唐妻王氏王朝鼎妻葛氏晉珩妻張氏季潤翰妻黃氏李宏基妻張氏金其式妻張氏陳國治妻晉氏李雲莖妻彭氏蔣六御