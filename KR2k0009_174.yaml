body:
  text: 慶遠府在廣西省治西南五百七十里東西距四百七十里南北距二百九十里東至柳州府柳城縣界四十里西至貴州都勻府獨山州豐寧下土司界四百三十里南至思恩府上林縣界一百二十里北至柳州府羅城縣界一百七十里東南至柳州府柳城縣界七十里西南至思恩府安定土司界一百六十里東北至羅城縣界五十里西北至貴州都勻府荔波縣界三百二十里自府治至京師八千三十里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州南裔周百越地秦象郡地漢為鬱林郡地明統志以府為漢交址日南二郡之界按今府南去交址尚千餘里日南又在其南中隔思恩太平南寧三府巳為鬱林郡地二郡之界何得至此晉後淪於蠻唐貞觀四年始開置粵州治龍水縣乾封中改曰宜州天寶初曰龍水郡乾元初復曰宜州屬嶺南道舊唐志屬安南管新唐志屬雍管五代初屬楚周廣順元年屬南漢宋初亦曰宜州龍水郡屬廣南西路宣和元年置慶遠軍節度咸淳元年升為慶遠府以度宗潛邸也元至元十六年置慶遠路總管府大德元年改置慶遠南丹溪洞等處軍民安撫司屬廣西道明洪武三年仍為慶遠府屬廣西布政使司本朝因之屬廣西省領州二縣三土州二土縣一土州同一長官司三宜山縣附郭東西距一百八十里南北距七十里東至柳州府柳城縣界四十里西至河池州界一百四十里南至永定土司界四十里北至天河縣界三十里東南至柳城縣界七十里西南至永定土司界八十里東北至柳州府羅城縣界七十里西北至思恩縣界九十里古百越蠻地唐貞觀四年置龍水縣為粵州治乾封後為宜州治五代因之宋宣和初始改曰宜山南宋為慶遠府治元為路治明為府治本朝因之天河縣在府北少東一百十里東西距一百五十里南北距一百三十里東至柳州府羅城縣界四十里西至思恩縣界一百十里南至宜山縣界七十里北至羅城縣界六十里東南至宜山縣界四十里西南至宜山縣界五十五里東北至羅城縣界三十五里西北至思恩縣界一百二十里古蠻地唐貞觀四年始置天河縣屬粵州後屬宜州五代因之宋大觀元年廢入融州靖康元年復置仍屬宜州南宋屬慶遠府元明不改本朝因之河池州在府西二百五十里東西距八十五里南北距一百九十里東至宜山縣界五十里西至南丹土州界三十五里南至那地土州界一百十里北至思恩縣界八十里東南至東蘭州界五十五里西南至東蘭州界一百三十里東北至思恩縣界六十五里西北至南丹土州界六十三里古蠻地唐羈縻智州地宋初置河池縣屬羈縻金城州後屬智州治平二年改屬宜州大觀初於縣置庭州改縣曰懷德四年州廢仍曰河池縣南宋屬慶遠府元屬慶遠路明宏治十七年升為河池州屬慶遠府本朝因之思恩縣在府西北一百五十里東西距三百七十里南北距三百十里東至天河縣界一百七十里西至河池州界二百里南至宜山縣界三十里北至貴州都勻府荔波縣界二百八十里東南至宜山縣界三十五里西南至河池州界四十五里東北至都勻府古州界三百五十里西北至荔波縣界一百五十里古蠻地唐貞觀十二年開置環州治正平縣兼置思恩縣屬之天寶初改正平郡乾元初復曰環州屬嶺南道後省正平移州治思恩縣宋熙寧八年州廢以縣屬宜州南宋屬慶遠府元屬慶遠路明宏治十七年改屬河池州本朝屬慶遠府東蘭州在府西南四百二十里東西距一百七十二里南北距一百五十二里東至永定土司界三十二里西至泗城府界一百四十里南至思恩府都陽土司界一百二十里北至那地土州界三十里東南至欣城土縣界一百五十里西南至泗城府界一百四十里東北至河池州界八十里西北至那地土州界一百十里古蠻地宋初置羈縻蘭州屬宜州管崇寧五年納上元曰東蘭州明屬慶遠府本朝雍正七年以東院內六哨改流官以東蘭土州同分轄鳳山外六哨那地土州在府西南三百四里東西距二百二十里南北距七十五里東至河池州界六十里西至貴州興義府貞豐州界一百六十里南至東蘭州界三十里北至南丹土州界四十五里東南至河池州界五十里西南至貞豐州界一百五十五里東北至河池州界五十里西北至南丹土州界三十里古蠻地唐為猺蠻溪洞名曰那州宋崇寧五年納土置地那二州元因之明洪武初省那州入地州改今名屬慶遠府本朝因之南丹土州在府西北三百四十里東西距一百七十里南北距一百四十里東至河池州界八十里西至貴州興義府貞豐州界十里南至那地土州界五十里北至貴州都勻府荔波縣界九十里東南至河池州界六十里西南至那地土州界八十里東北至思恩縣界八十里西北至都勻府獨山州豐寧下土司界九十里古蠻地唐為羈縻極邊之地宋初置南丹州大觀元年改曰觀州四年復曰南丹州元初置安撫司大德初併司入慶遠路明洪武初仍曰南丹州二十八年州廢改設南丹衛尋復為南丹土州屬慶遠府本朝因之欣城土縣在府南少東九十里東西距一百二十里南北距一百二十里東至思恩府遷江縣界九十里西至思恩府上林縣界三十里南至遷江縣界八十里北至永定土司界四十里東南至遷江縣界九十里西南至上林縣界四十里東北至遷江縣界八十里西北至思恩府安定土司界八十里古蠻地唐初置芝州治欣城縣天寶初曰欣城郡乾元初復曰芝州屬嶺南道宋初為羈縻州屬宜州管慶厯三年州廢以縣屬宜州南宋屬慶遠府元屬慶遠路明宏治間降為土縣仍屬慶遠府本朝因之永定長官司在府西南六十里東西距二百里南北距一百六十里東至宜山縣界七十里西至東蘭州界一百三十里南至思恩府安定土司界一百里北至宜山縣界