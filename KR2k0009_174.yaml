曲意承順以孝著尚忠為都司差役攜彭偕往舟經洛黃灘獞寇遮劫尚忠被害賊逼彭登岸彭乘間投水死彭諫妻劉氏宜山人諫遇賊害死劉聞之閉户自縊衆往救氣未絶密護視之氏乃不飲食喪至劉往迎且行且哭因齧舌死王凱妻汪氏慶遠人年二十二夫罹罪被箠肉腐氏朝夕侍湯藥不能療乃告公姑曰夫死妾不能獨生幼女幸善撫之扼吭而死甘誠妻宋氏南丹衛人生子霖甫晬誠卒家貧織絍自給母強之改嫁氏哭曰婦人之義從一而終况吾為世祿之家適他姓何以見先人誓死不二撫霖成立任柳慶參將正德十三年旌本朝陳氏宜山人遇暴不從被害雍正二年旌崔峘妻歐氏思恩人年二十三夫死舅姑議改適氏潛聞奔哭夫墓飲食不入者三晝夜姑慰解誓不奪志土俗男女生周歲皆帶銀圈於項名曰命圈解輒有殃姑病氏禱于神解圈為藥餌資或諷止之氏曰姑死我獨生何為姑愈氏竟無恙雍正五年旌同縣曾三省妻韋氏陳雄妻莫氏均雍正年間旌何依義妻莫氏南丹土州人雍正八年土官莫我謙征古州改定旦寨被圍依義入圍救之出苗追之依義拒敵死莫氏守節撫孤義夫節婦蠻中所僅見者李良正妻楊氏天河人夫亡守節乾隆二年旌蘇繼洵妻謝氏宜山人夫亡守節乾隆三年旌韋扶海女獞人有姿色未嫁守正捐軀乾隆九年旌韋孝女天河人父母與兄食菌中毒同日死女幼許字顧姓願終身奉其家祀顧莫能強撫一子繼韋氏嗣始終如一楊世國妻李氏河池人生一子甫周歲世國死氏年少家貧嘗撫子德明泣曰吾所以不死者以有爾在也後德明從征古州殁於軍氏哭失明終身茶苦乾隆二年旌同縣劉士元妻王氏莫踰綱妻陳氏劉王氏楊李氏均乾隆年間旌陳國球妻覃氏思恩人夫亡守節嘉慶八年旌仙釋陸禹臣河東人避亂入南嶽遇道士授以仙術且謂曰汝得志當在山窮水絶處乃跋涉隱宜之北山居巖修煉後仙去吳優宜山人為州吏遇異人授一杖欲有所往攜之頃刻至家去郡治三十里每日昏暮歸家昧爽在郡人咸異之後卒櫬至桃源山重不可舉俄頃螻蟻銜土蓋棺成一巨塜鄉人因立廟祀之羅仙宜山人嘗牧牛於會仙山下一日遇老翁飲以水一勺身遂輕舉步如飛後仙去盧德洪宜州人幼棲南山廣化寺一旦失所在郡守張自明寓京師一僧來謁曰小僧宜州人住廣化寺姓盧名德洪聞君任吾州故來謁遂留談出一履為符自明至宜遊南山問德洪所在衆僧愕然云本僧别去久矣自明焚香祝曰汝有靈引我以香已而香拂山左石室中觀之有竅露光明德洪坐化於內一履在前與昔所遺無二土産銀宋史地理志宜州貢銀又河池有銀場明統志南丹土州孟英山出錫河池南丹那地三州出丹砂唐書地理志宜州有丹砂寰宇記宜山有富安砂監又撫水州有固屑場出硃砂布寰宇記宜州土産都洛麻狹幅布府志又有葛布棉花青麻楮皮𥿄府境出藥府境出豆􅞦草果馬檳榔山羊金志南丹那地土州出常食三七葉取其血佳三七金志南丹那地各土司俱出千年健府志各土司出永順頗佳苗蠻苗在東蘭州習俗頗馴撫水蠻在宜州南有縣四曰撫水京水多逢古勞唐隸黔其酋皆蒙姓同出有上中下三房及北遐一鎮民則有區廖潘吳四姓亦種水田采魚其保聚山險者雖有畬田收榖粟甚少但以藥箭射生鳥獸無牛羊桑柘地椎髻跣足走險如履平地言語侏􅍣畏鬼神喜淫祀刻木為契安化蠻在宜州西最鷙悍官月給生料鹽以拊之猶日侵省地以耕民不與爭官亦不能禁西南蕃在宜州境又有大小張大小王龍石滕謝諸蕃地與牂牁接人椎髻跣足或著木履衣青花斑布以射獵仇殺為事其南連雍州南江之外者羅殿自𣏌等以國名羅孔特磨白衣九道等以道名而峩州以西别有酋長無所統屬者蘇綺羅坐夜面計流求萬夀多嶺阿誤等蠻謂之生蠻􅍹在天河縣阿練里之山洞念洞有頂板赤膊過山諸種男子蓄髮挽髻裹以花布婦人以長帶束額耳帶大圈在河池婚姻以牛為禮嫁時不製衣被女過宿即返有越數年始回夫家者在思恩居五十二洞及儀鳳茆灘上中下疃之間男衣短狹青衣婦女小袂長裙歲首祭先祖擊銅鼓跳躍為樂在東蘭居四埲十三哨言語軥轉即獞人亦不能喻在南丹男女皆蓄髮挽髻負戴以額不與他類通婚姻在欣城俗貧而陋獞在宜山縣男剃髮留辮女未嫁者披髮已嫁者挽髻在天河有八千一百餘户居西鄉者出入佩環刀持鏢鎗性頑難化近頗畏法在河池思恩俗與猺同在東蘭有獞女能作花巾以白布畫花卉人物于上織成極工巧獠今右江西南一帶甚多有飛頭鑿齒鼻飲白衫花面赤禈之屬言語與漢迥别性鄙吝善耕作尤好種棉無年甲姓名一村中推有事力者曰郎火餘但稱火歲首以土杯十二貯水隨辰位布列郎火禱焉經夕集衆往觀若寅有水而卯涸則知正月雨二月旱自以不差􅳎狫即獠人服色尚青男衣短狹老者衣細褐女則短袂長裙宜山天河皆有之狼在那地土州衣服同漢民耕田而食征調則為狼兵明沈希儀用以破賊南丹欣城皆有土狼狑詳見桂林府宜山思恩亦有之􅬍即水苗猺之别種南丹及荔波境上有之男女皆挽髻向前項飾銀圈性凶暴睚眥之仇必報有事不訟官㺜在宜山縣龍門與􅬍獞雜居在南丹種甚多服飾略同獞性特愚為獞欺脅浪先自廣東陽山縣而來語言百世不變性好種畬居無定所土瘠即去每歲孟春男女上山斫柴作歌為樂宜山永定永順多有之大清一統志思恩府在廣西九百九省治西十五里南一南北千距一三百五百七十十里東里東西至距柳州土府來富州賓縣界七界二百十百八十里南至五南里西至寧府宣雲化南縣廣南界一府百三十南至里北宣化至縣慶遠界二府永百四定土十里司西界二南至百四太平十府里龍東英土