body:
  text: 浙江統部浙江省在京師南三千三百里東西距八百八十里南北距一千二百九十里東至寧波府大海六百餘里西至安徽徽州府界二百八十里南至福建建寧府界九百六十里北至江蘇蘇州府界三百三十里東南至福建福寧府界一千一百三十里西南至江西廣信府界七百五十里東北至江蘇松江府界三百七十里西北至安徽廣德州界三百二十里分野天文斗分野星紀之次新唐書天文志初南斗九度餘千四十二秒十二太中南斗二十四度終女四度自廬江九江負淮水南盡臨淮廣陵至於東海又逾南河得漢丹陽會稽豫章西嶺表自韶廣以濱彭蠡南涉越門訖蒼梧南海逾西珠崖以東為星紀之分也古吳越羣舒廬桐六蓼及東南百越之國南斗在雲漢下流當淮海間為吳分牽牛去南河􅎊遠自豫章迄會稽南逾嶺徼為越分建置沿革禹貢揚州東境春秋時屬吳越二國後并於越戰國屬楚周顯王四十六年楚伐越大敗其王無疆盡取其地至浙江北秦為會稽郡及鄣郡閩中郡地境內皆會稽地惟杭州府西境嚴州府西境及湖州府西境為鄣郡地台州府溫州府處州府為閩中郡地漢為會稽郡東西南三部都尉漢書地理志西部都尉治錢塘南部都尉治回浦虞預會稽典録陽朔元年徙東部都尉治鄞有寇害復徙句章及丹陽郡地元封五年置十三部刺史分屬揚州後漢為會稽吳丹陽三郡地永建四年移會稽郡治山陰而分浙西為吳郡三國屬吳又增置臨海吳興東陽及新都晉太康初改新安四郡晉亦屬揚州東晉又分置永嘉郡宋元嘉三十年分浙東五郡為會州省揚州孝建元年分浙東會稽東陽新安永嘉臨海五郡置東揚州而浙西吳郡吳興仍屬揚州大明三年以東揚州為揚州時以揚州為王畿故東揚州直云揚州八年復曰東揚州永光元年仍省入揚州齊因之梁普通五年又分置東揚州太平元年罷陳天嘉三年復置東揚州領會稽東陽臨海永嘉新安新寧及晉安建安共八郡貞明二年割揚州吳郡置吳州割錢唐縣為郡屬焉隋平陳置吳杭二州總管府隋書地理志改東揚州曰吳州廢錢唐郡置杭州及婺處睦等州大業初改為會稽餘杭東陽永嘉遂安五郡及吳郡宣城郡地時嘉湖二府地皆屬吳郡惟孝豐名原鄉省入綏安為宣城郡地唐武德四年復改諸郡為州置越州總管府七年改為都督貞觀元年屬江南道開元二十一年分屬江南東道領杭湖越明台婺衢睦溫括十州乾元初分置浙江東西二道唐書方鎮表至德二載置江東防禦使治杭州乾元元年於升州置浙江西道節度使領升潤等十州杭湖二州屬焉於越州置浙江東道節度使領越睦衢婺台明處溫八州二年廢浙江西道節度使置觀察使大厯五年廢浙江東道節度使置觀察使十四年合浙江東西二道置都團練觀察使建中元年分浙江東西為二道二年合二道觀察於潤州置節度使尋賜號鎮海軍貞元三年復分二道於蘇州置浙江西道觀察使元和二年升浙江西道觀察使為鎮海軍節度使四年廢節度使以觀察使領鎮海軍事二年廢浙江西道觀察復置鎮海軍節度使六年浙西觀察罷領鎮海軍事十三年廢鎮海軍節度使復置觀察使咸通三年置鎮海軍節度使八年罷十一年復置鎮海軍節度使中和三年升浙江東道觀察使為義勝軍節度使光啓三年改義勝軍為威勝軍文德元年置忠國軍節度使治湖州龍紀元年置杭州防禦使景福元年賜號武勝軍二年升為蘇杭等州觀察使尋廢徙鎮海軍節度使治杭州乾寧三年改威勝軍為鎮東節度五代史時拜錢鏐為鎮海鎮東軍節度使按自乾元初分置浙江東西二道大厯十四年合建中元年分二年又合貞元三年又分自此東西二道遂不復合矣唐書地理志開元十五道以浙江十郡盡屬江南東道而無浙江之目至方鎮表云乾元二年分置浙江東道西道是浙江道之名自乾元始浙江十郡之不屬江南亦自乾元始五代為吳越國增置秀州宋至道三年屬兩浙路熙寧中分浙東西為兩路宋史地理志熙寧七年分尋合為一九年又分十年復合南渡後復分西路領臨安嘉興二府安吉嚴二州東路領紹興慶元瑞安三府㜈台衢處四州元置浙江等處行中書省至元十三年立兩浙都督府於杭州二十一年自揚州遷江淮行省治此改曰江浙行省領杭州湖州嘉興建德慶元衢州婺州紹興溫州台州處州等十一路又元史地理志至元十三年平江南立兩浙都督府有安撫宣慰等司及總督府後又分江南浙西道肅政廉訪使領杭州湖州嘉興建德四路浙東道宣慰司都元帥府領慶元衢州二路浙東海右道肅政廉訪使領婺州紹興溫州台州四路統屬於中書省後為方國珍張士誠等所據明洪武元年置浙江行省處於杭州九年改為浙江等處承宣布政使司初領杭州嚴州明州龍遊金華紹興溫州台州處州九府十五年以直隸嘉興湖州二府隸焉本朝因之為浙江省雍正六年設溫台玉環廳同知共領府十一廳一杭州府嘉興府湖州府寧波府紹興府台州府金華府衢州府嚴州府溫州府處州府玉環廳形勢東瀕海南極閩西接重山北限五湖其名山則有會稽天目四明天台括蒼金華其大川則有浙江浦陽江苕溪太湖運河海其重險則有仙霞獨松昱嶺倚高阻深置亭列障東南之重鎮吳越之名區省志文職官總督統轄福浙駐劄福建舊時專設浙江總督康熙八年裁九年復設二十三年改併福浙總督雍正五年專設浙江總督兼管巡撫事十二年仍併福浙總督乾隆元年分設浙江總督三年併為閩浙總督巡撫兼督南北新二關駐杭州府舊以巡撫兼鹽政别遣六部司員分督南北新二關康熙五十五年二關歸巡撫兼管雍正七年歸織造兼管乾隆五十八年改織造為鹽政二關仍歸巡撫管理提督學政駐杭州府