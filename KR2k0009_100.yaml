五郡率衆屯上虞威名益振南北朝宋蔡興宗濟陽考城人世祖時都督東陽新安永嘉臨海五郡諸軍事以法繩會稽豪右及貴戚家罷諸逋負解遣雜役復修三吳鄉射禮隋賀若弼雒陽人高祖拜弼為吳州總管委以平陳之事開皇九年大舉伐陳帝勞之曰克定三吳卿之功也唐李栖筠趙人代宗時平盧行軍司馬許杲恃功擅留上元有窺江吳意拜栖筠浙江都團練觀察使圖之栖筠至張設武備遣辨士厚齎金幣抵杲軍賞勞使士歆愛奪其謀杲懼悉衆渡江又增學廬表宿儒河南褚沖吳何員等超拜學官為之師身執經問義遠邇趨慕至徒數百人又奏部豪姓多徙貫京兆河南規脫徭科請量産出賦以杜姦謀詔可尋拜御史大夫韓滉京兆長安人大厯十二年拜浙江東西都團練觀察使尋加鎮海軍節度使滉安輯百姓均其租稅未及踰年境內稱治涇師之亂滉以兵三千人臨金山江南兩浙轉輸粟帛府無虛月朝廷賴焉興元二年特封晉國公上以滉浙江東節度素著威名加江淮轉運使尋加度支諸道轉運鹽鐵等使楊於陵宏農人貞元末為浙東觀察使越人飢請出米三十萬石贍貧民政聲流聞薛戎寶鼎人貞元末纍遷浙東觀察使所部州觸酒禁者罪當死橘未貢先鬻者死戎弛其禁戎為吏不尚約束詭名譽故居官無灼灼可驚者已罷則懷之薛蘋寶鼎人憲宗時為浙東觀察使以治行徙浙西廉風俗守法度治身儉薄一袍十餘年不易因加賜朱紱然後解去除散騎左常侍元稹河南人穆宗時徙浙東觀察使明州歲貢蚶役郵子萬人不勝其疲稹奏罷之李德裕趙郡人穆宗時為浙西觀察使儉於自奉留州所得盡以贍軍除淫祠一千一十所又奏罷銀盝子粧具及條繚綾諸物文宗時改鎮海軍節度蘇常杭潤觀察使太和九年授太子賓客分司明年復浙西觀察使凡三鎮浙西前後十餘年陸亘蘇州吳人文宗時為浙東觀察使溫州濱海經賊亂奪官吏半祿代民租後相沿更以為姦亘還官全廩繩贓罪吏畏而賴之亘文明嚴重所到以善政稱王式太原人懿宗時為浙東觀察使時劇賊仇甫亂式至擒甫斬之餘姚民徐澤專魚鹽之利慈溪民陳瑊冒名仕至縣令皆豪縱州不能制式窮治其姦皆榜死裴璩聞喜人乾符四年為浙江鎮海節度使平王郢之亂五年曹師雄寇湖州璩遣兵擊破之皇甫政貞元中為浙東觀察使修治水利開鑿玉山朱儲二斗門以時蓄泄民甚德之宋翟守素任城人太平興國初錢俶獻浙右地詔守素為兩浙諸州兵馬都監安撫諸郡人心甚悅即以知杭州范珉大名宗城人太平興國初權知兩浙諸州軍事上言錢俶在國徭賦煩苛請蠲其弊從之楊克讓同州馮翊人太平興國初為兩浙西南路轉運使泉州民嘯聚為盜克讓在福州即率其屯兵至泉州與王明王文寶共討平之樂史宜黃人太宗時纍官兩浙巡撫使釋逋負賑飢民孫冕新淦人咸平中為兩浙轉運使治獄不濫斷訟如神吏畏而民愛之任中正濟隂人真宗時擢兩浙轉運使民飢中正不俟詔發官廪賑之陳堯佐閬中人仁宗時為兩浙轉運副使錢塘江篝石為隄再歲輒壞堯佐請下薪實土乃堅久卒如其議段少連開封人仁宗時為兩浙轉運副使舊使者所至郡縣簿書不暇殫閲往往委之吏胥少連令郡縣上簿書悉緘識遇事間指取一二自閲摘其非是者按之餘不及閲者全緘識以還由是吏不能為姦秀州獄死無罪人時少連在杭吏畏恐聚謀偽為死者服罪款未及綴屬少連已拏舟入城訊獄吏具服請罪時鄭向守杭無治才訟者不服往往徑趨少連少連一言處決莫不盡其理葉清臣長洲人仁宗時為兩浙轉運副使太湖有民田豪右據上遊水不得泄而民不敢訴嘗建請疏盤龍滙滬瀆港入於海民賴其利張夏雍邱人仁宗時為兩浙漕使杭州江潮為患故隄率用薪土被衝輒壞夏令作石隄上自六和塔下至東青門延袤十二里杭民德之鍾離瑾合刑肥人提點兩浙獄衢潤州飢聚餓者食之頗廢農作請發米二萬斛賑給田瑜夀安人慶厯中為兩浙轉運按察使杭州龍山隄歲決水冒民居輒賦芻塞之瑜與民約每芻十束更輸石一尺率五歲得石百萬為石隄隄固而歲不調民沈立厯陽人仁宗時為兩浙轉運使蘇湖水民艱食縣戒強豪民發粟以賑立亟命還之而勸使自稱貸須歲稔官為責償茶禁害山場榷場多在部內歲抵罪者輒數萬而官僅民得錢四萬立著茶法要覽如行通商法三司使張方平上其議罷榷法如所請後知越州杭州孫瑜博平人仁宗時為兩浙轉運使先是郡縣倉庾以斗斛大小為姦瑜奏均其制黜吏之亡狀者民大喜有言其變新器非便下遷知曹州尋有言瑜所作量法均一誠便者乃還其原資王鼎館陶人提點兩浙刑獄纍遷淮南兩浙制置發運使前使者多漁市南物持遺京師權貴鼎一無所市獨悉意精吏事凡調發綱吏度漕路遠近先後為成法於是勞逸均吏不能為重輕李復圭徐州豐人破産復圭為兩浙轉運使浙民以給衙前役多悉罷遣歸農令出錢助長召人承募民便之瀕海人賴蛤沙地以生豪家量受稅於官而占為己有復圭奏蠲其稅分以豫民沈括錢塘人熙寧中為兩浙察訪言本路歲上供帛九十八萬民苦倍償而發運司復以移用財貨為名增預買綢絹十二萬詔罷所增之數侯叔獻宜黃人慶厯間纍官兩浙常平使者兼都水監建議置提舉淤田司引水灌田四十萬頃韓晉卿安邱浙轉人元祐中為兩運使差役法復行諸道處畫多倉卒失序獨晉卿視民所宜而不戾法指張康國揚州中提人紹聖舉兩浙常平豪猾望風斂服發倉救荒江南就食者活數萬口陳遘永州人宣和二年方臘亂以龍圖閣直學士經制七路治於杭劾越州王仲市民造金茶器減值買軍糧劵而以私錢取薿糾之仲薿坐黜杭經巨寇後河渠堙塞邦人以水潦為病遘以冬月檄真揚潤楚諸郡凡守閘綱卒悉集治所用其力治河不兩月畢杭人利焉翟汝文丹陽人為浙東安撫使建炎改元上疏言上供常數當議裁損如浙東和預買絹歲九十七萬六千匹而越州乃二十萬五百匹杭州去年已減十二萬匹獨越州尚如舊今乞視戶等第減罷韓世忠延安人建炎三年苗傅之亂帝以世忠為江浙制置使自衢信追擊至漁梁與賊遇世忠挺戈而前賊驚潰俱追擒之王珏臨川人紹興初提點浙西茶鹽秀州歲以錢給亭民煮鹽時積至十九萬七千餘緡不給珏盡償之開華亭海河三百餘里鹽滋得流通且溢以溉田後兼提點刑獄劉安止歸安人建炎初為兩浙轉運判官苗劉之變安止自毗陵馳詣京口金陵見吕頤浩劉光世勉以忠義退而具軍需以佐勤王李逮東平人紹興五年除兩浙路轉運使言祖宗都大梁歲漕東南六百餘萬斛而六路之民無飛挽之擾蓋所運者官舟所役者兵卒故也今駐蹕浙右漕運地理不若中都之遠而公私苦之何也以所用之舟大半取於民間往往鑿井沈舟以避其役如溫明虔吉等處所置造船場乞委逐州守臣措置募兵卒牽挽使臣管押庶幾害不及民可以漸復漕運舊制陳桷平陽人紹興六年為兩浙西路提刑乞置鄉縣三老以厚風俗宫室車馬衣服器械俱定為差等重侈靡之禁顏師魯龍溪人紹興中為浙東提舉尋改浙西役法敝甚民遇役輒破家師魯下教屬邑預正流水籍稽其役之序寬比限免代輸咸便安之鹽課歲百巨萬本錢久不給亭竈私鬻禁不可止師魯撙帑緡盡償宿負戒官吏無侵移比旁路課獨最農民有墾曠土成田未及受租者姦豪多為已利師魯奏但當正其租賦不應繩以盜種失劭農重本意奏可遂著為令趙子潚宋宗室初為衢州推官以功進秩高宗時除兩浙轉運副使朝廷遣人檢沙田蘆場欲概增租額子潚以承買異冒占力止之時田之並太湖者被水患詔子潚往案視還言宜疏濬諸浦以達江海從之水患用息明州守趙善繼治郡殘酷子潚率諸監司劾罷之李寶河北人嘗陷金拔身從海道來歸金主亮渝盟由海道襲浙江授寶浙西路馬步軍副總管督海州捍禦屢敗敵兵後除靖海軍節度使沿海制置使朱倬閩縣人高宗時梁汝嘉制置浙東表攝參謀有羣寇就擒屬倬鞫問獨竄二人餘釋不問曰吾祖尉崇安日獲寇二百坐死者七十餘人吾祖謂此飢民剽食耳烏可盡繩以法悉除其罪吾其可愧吾祖乎劉潁西安人孝宗時提舉浙西常平茶鹽還澱水湖以泄吳松江二水禁民侵築民田賴之就遷提刑以洗冤澤物為任間詣獄察不應繫者縱遣之朱熹婺源人淳熙中浙東大飢除提點浙東常平茶鹽公事始拜命即移書他郡募米商蠲其徴及至則客舟之米已輻輳日鈎訪民隱按行境內單車屏徒從所至人不及知郡縣官吏憚其風采至自引去所部肅然凡丁錢和買役法榷酤之政有不便於民者悉釐而革之於救荒之餘隨事處畫必為經久之計又下社倉法於諸路羅點崇仁人淳熙間除浙西提舉規畫荒政凡數十奏躬行畎畝施惠甚溥程大昌休寧人孝宗時除浙東提點刑獄會歲豐酒稅踰額有挾朝命請增額者大昌方拒之乃止張杓綿竹人孝宗時提舉浙西常平督理荒政有執政姻黨閉糶杓首治之帝奬其不畏強禦遷兩浙轉運判官鄭興裔開封人淳熙初為浙西提刑上檢驗格目詔頒之諸路提刑司凡檢覆必給三本一申所屬一申本司一給被害之家後兼沿海制置使蠲常賦撤私稅閣境便之詹體仁浦城人光宗時提舉浙西常平務開漕渠濬練湖置斗門以備旱潦浙人賴之劉爚建陽人寧宗時提點浙西刑獄巡按不避寒署多所平反王居安黃巖人寧宗時提點浙西刑獄葛懌者用戚屬恩補官豪於資憾父之嬖既去而誣以盜株連瘐死者數人懌乃未嘗一造庭居安一閲得實立捕繫論罪械送他州汪綱黟縣人寧宗時提點浙東刑獄慮囚至婺有奴挾刀欲戕其主不遇而殺其子讕妄牽連徑出斬之釋衢囚之冤者台盜鍾亘非真盜尉覬賞躐申制司網謂治盜雖尚嚴豈得鍛鍊以成其罪於是得減死禱雨龍瑞宫有物蜿蜒朱色盤旋壇上者三日綱曰吾欲雨而已毋為異以惑衆言未竟雷雨大至歲以大熟范應鈴豐城人開禧間為浙東提點刑獄開明磊落守正不阿所至無留訟滯獄吳潛寧國人端平中提點浙西坑冶權兵部尚書浙西制置使轉浙東安撫使淳祐間授沿海制置大使判慶元府條具軍民久遠之計告於政府奏皆行之吳淵潛弟理宗時提點浙西刑獄會衢嚴盜起警報至調遣將士招捕之殲其渠魁散其支黨陳塤鄞縣人理宗時提點浙西刑獄歲旱盜起捕斬之盜懼徙去安吉州俞垓與丞相李宗勉連姻恃勢黷貨塤親按臨之弓手戴福以獲潘丙功為副尉宗勉倚之為腹心恣橫貪害塤至福風聞而去塤貽書宗勉曰治福所以報丞相也包恢建昌人理宗時提點浙西刑獄是時海寇為亂恢單車就道調許澉浦分屯建寨一旦集諸軍討平之李芾衡州人理宗時為浙東提刑移浙西浙西多盜羣穴太湖中芾迹得其出沒按捕之盜駭散高斯得卭州蒲江人理宗時遷浙東提點刑獄劾知處州趙善浣知台州沈塈等七人倚勢厲民疏上不報改江西轉運判官斯得具辭免上奏曰祖宗以來未有監司按吏一不施行者臣身為使者劾吏不行反叨易節若貪榮冒拜與頑鈍無恥無異乞併臣鐫罷以戒奉者章上七人使無狀竟罷去徐鹿卿豐城浙東人嘉定間提點刑獄兼提舉常平罷浮鹽經界鹻地先撤相通判溫州利韓世忠家寶玩家所籍之築史彌遠之鹿卿奏削其弟官居官廉約毫髮不妄清峻取胡潁湘潭人為浙西提點刑獄榮王府十二人行劫潁悉斬之一日輪對理敢屈太祖之宗曰聞卿好殺法以負陛下非意在折獄潁曰臣嗜殺也帝為之默不然王積翁長溪人獄全活除浙西安撫使幹辦公甚衆改秩知富陽縣治事奉旨決行為諸邑最秩滿除兩浙轉運司主管文字力請寬版曹催科之限東南諸郡咸便之汪立信六安人景定初提點年冬即嘉興治浙西刑獄明所講行荒政常懋臨卭人度宗為兩浙轉運時使禁戢吏姦不以急符督常賦懋請於朝捐金發粟復輟已海鹽歲為鹹潮害帑修築新塘三千稼六百二十五丈名曰者尺許民得奠居海晏塘是秋風濤大歲復告稔邑人德之作塘不浸後改浙東安撫使值水災捐楮以賑復請糴於朝民食不至乏絶兩浙及會稽山隂死者暴與貧而無以為殮者乃以十萬楮置普惠庫取息造棺以給之元張礎通州人至元十四年為江南浙西道提刑按察副使宣慰使實哩貪暴掠良民為奴礎劾黜之遂安縣民聚衆負險為亂命礎與同知浙西道宣慰司劉宣領兵捕之宣即欲進兵礎曰江南新附守吏或失撫字宜遣人招諭以全衆命宣不可礎曰諭之不來加誅未晚遂遣人諭之逆黨果自縛請罪礎釋之宣乃嘆服實哩舊作失里今改正劉宣太原人至元中同知浙西宣慰司事在宫五年威惠並著陳祐一名天祐寧晉人至元十四年遷浙東道宣慰使時江南初附軍士俘溫台民男女數千口祐悉奪還之未幾行省榷民商酒稅祐請曰兵火之餘傷殘之民宜從寬恤不報遣祐檢覆慶元台州民田還至新昌為盜所害華善蒙古人至元中為江南浙西道提刑按察使浙西宋故都民衆事繁在職惟務鎮靜人服其知大體華善舊作和尚今改正史弻博野人至元十九年為浙西宣慰使二十一年黃華反建寧春復霖雨米價踊貴弻即發米十萬石平價糶之而後聞於省省臣欲增其價弼曰吾不可失信願輟吾俸以足之省不能奪益出十萬石民得不飢蒙固台蒙古人至元中拜江浙行省左丞相時浙西大飢乃弛河泊禁發府庫官貨抵其值貿粟以賑之浙東盜起蠲田租以紓民力二十三年奏販鬻私鹽者皆海島民今征日本可募為水工從之役既罷請以戰艦付海漕又言省治在杭州其兩淮江東財賦軍實既南輸至杭復北輸至京往返勞頓不便請移省治於揚州帝從其請蒙固台舊作忙兀台今改正陳思濟柘城人至元中同知兩浙都運司事胥吏侵漁民困於賦役悉蠲除之二十三年同知浙東道宣慰司事時浙西大水民飢浙東倉廩殷實即轉輸以賑之全活者衆浙東復旱禱於名山雨大澍民賴以蘇雷膺渾源人至元二十三年授江南浙西道提刑按察使時蘇湖多雨傷稼百姓艱食膺請於朝發廩米二十萬石賑之江淮行省以發米太多議存三之一膺曰布宣皇澤惠養因窮行省臣職耳豈可效有司出納之吝耶行省不能奪悉給之陸垕江隂人至元中遷浙西廉訪使所至以黜贓吏洗冤獄為巳任嘗上章奏免儒役及舉行浙西助役法王都中福寧州人世祖時除浙東道宣慰副使金華有毆殺人者吏受賕以為病死都中摘屬吏覆按得其情獄具縣長吏而下皆以贓敗餘姚有豪張甲居海濱為不法擅制一方吏無敢涉其境都中捕繫之痛繩以法後除兩浙都轉運鹽使鹽亭竈户舊制三年一比附推排任事者恐斂怨久不舉行都中請於行省遍厯三十四場驗其物力高下以損益之役既平而課亦足公私便之擢浙東道宣慰使都元帥天厯初被省檄整點七路軍馬境內安宴董士選藁城人世祖時以中書左丞與平章政事徹爾往鎮浙西至部察病民事悉以帝意除之民大悅浙多湖泊廣蓄泄以備水旱率為豪民占以種藝水無所居積故數有水旱士選與徹爾力開復之徹爾舊作徹里今改正徹爾蒙古人大德元年為江浙行省平章事江浙稅糧甲天下平江嘉興湖州三郡當江浙什六七而其地極下水鍾為震澤震澤之注由吳松江入海歲久江淤塞豪民利之封土為田水道不通敗諸郡禾稼徹爾發卒數萬人疏之凡四月畢工徹爾改見前史奐卿真定人至元間授浙東宣慰副使屢破山賊功最一時遷江浙等處行中書省右丞至則除火餘官屋之傭若干緡減江東户課徐炎東平人至元末為浙西肅政廉訪使即宋太學舊址改建西湖書院炎有文學重望東南人士重之貝降蒙古人大德元年遷浙東廉訪副使令行禁止豪強攝伏同寅有貪穢者貝降抗疏劾之遂免其官貝降舊作拜降今改正托克托蒙古人成宗三年拜榮祿大夫江浙等處行中書省平章政事始至嚴飭左右毋預公家事且戒其掾屬曰僕從有私囑者慎勿聽軍民諸事有關利害者言之當言不言爾責也言而不聽我咎也聞者悚栗時朱清張瑄以海運致位參知政事多行不法恐事覺以金珠賂托克托求蔽其罪托克托大怒繫之有司遣使者以聞帝喜賜黃金五十兩寵賚之有豪民白晝殺人托克托立命有司按法誅之豪猾屏息民賴以安托克托舊作脫脫今改正托卜嘉蒙古人至元十五年為浙西按察便性淳靖喜怒不形知民疾苦而能以善道之旱嘗致禱即雨歲飢請於朝發廩以賑之睦同僚興學校加大中大夫士民刻石紀其政績托卜嘉舊作秃不甲今改正高睿河西人除浙西道肅政廉訪使鹽官州民有連結黨與持郡邑短長自目曰十老吏莫敢問睿至悉按以法閣境快之田滋開封人大德二年遷浙西廉訪使有縣尹張彧者被誣以贓獄成滋審之但俯首泣而不語滋以為疑明日齋戒詣城隍司禱曰張彧坐事有冤狀願神相滋明其誣守廟道士進曰曩有王成等五人同持誓狀到祠焚禱火未燼而去燼中得其遺藁今藏於壁間豈其人耶視之果然明日詣憲司詰成等不服因出所得火中誓狀示之皆驚愕服罪張彧得釋哈喇哈遜蒙古人大德二年拜江浙行省左丞相凡七日綱舉七十餘事民風吏習翕然為變哈喇哈遜舊作哈喇哈孫今改正吳元圭廣平人大德六年拜江浙行省參知政事初朱清張瑄以財雄江南遍以金帛連結當路而江浙省臣為尤甚惟元圭一無所污皇慶元年拜江浙行省左丞江淮漕臣言江南殷富蓋由多匿腴田若再行檢覆之法當益田畝纍萬計元圭曰江南之平幾四十年户有定籍田有定畝一有動搖其害不細執其論固爭月餘不能止移疾去延祐二年召還復以為言詔並遵舊制高昉大名人至大間由江浙行省參知政事進平章政事江左繁富中外徴求百至昉熟知利病務簡靜不擾以是民用安輯喀爾托克托蒙古人仁宗初拜江浙行省左丞下車進父老問民利病咸謂杭城故有便河通於江滸堙廢已久若疏鑿以通舟楫物價必平僚佐或難之喀爾托克托曰吾陛辭之日密旨許以便宜行事民以為便行之可也不一月而成喀爾托克托舊作康里脫脫今改正趙宏偉潁川人仁宗初為浙東廉訪副使聞郡人許謙得朱熹道學之傳延致為師於是人知嚮慕敬儼易水人皇慶元年除浙東道廉訪使有錢塘退卒詐服僧衣稱太后旨建婺州雙溪石橋因大興工役病民儼命有司發其姦贓杖遣之仍請奏罷其役郡大火焚數千家儼令發廩以賑貧餒取憲司廢堂材木及諸路學廩之羡者建孔子廟張思明揮州人皇慶元年再授兩浙鹽運使歲課充贏僚屬請上增數思明曰贏縮不常萬一以增為額是我希一已之榮遺百世之害天厯元年起為江浙行中書者左丞會陜西大飢中書撥江浙鹽運司歲課十萬錠賑之吏白周歲所入已輸京師當回咨中書思明曰陜西飢民猶鮒在涸轍往復踰月是索之枯魚之肆也其以下年未輸者如數與之有罪吾當坐朝廷韙之鄧文原綿州人延祐五年僉江南浙西道肅政廉訪司事吳興民夜歸巡邏者執之繫亭下其人遁去有追及之者刺其脅仆地明旦家人得之以歸比死其兄問殺汝者何如人曰白帽青衣長身者也其兄訴於官有司問值初更者曰張福兒執之使服焉械繫三年文原録之曰福兒身不滿六尺未見其長也刃傷右脅而福兒素用左手傷宜在左何右傷也鞫之果得真殺人者而釋福兒桐廬人戴汝惟家被盜有司得盜獄成送郡夜有焚戴氏廬者而不知汝惟所之文原曰此必有故也乃得其妻葉氏與其弟謀殺汝惟狀而於水涯樹下得尸與漬血斧俱在焉人以為神韓鏞濟南人天厯元年僉浙江廉訪司事擊姦暴黜貪墨而特舉烏程縣尹干文傅治行為諸縣最所至郡縣為之肅然曹鑑宛平人天厯元年調江浙財賦府副總管屬淮浙大水民以災告鑑損其賦什六七勢家因而詭免者鑑核實諭令首輸布延特穆爾蒙古人天厯間拜江浙行省平章政事持身廉介人不敢干以私布延特穆爾舊作卜顔鐵木兒今改正吕思誠平定州人文宗時僉浙西廉訪司事達實特穆爾時為南臺御史大夫與江浙省臣有隙嗾思誠劾之思誠曰吾為天子耳目不為臺臣鷹犬也不聽已而聞行省平章索吉貪墨浙民多怨之思誠奏疏其罪流之海南達實特穆爾舊作達識帖睦邇索吉舊作左吉今俱改正王克敬大寧人泰定中轉兩浙鹽運司使首減紹興民食鹽五千引溫州逮犯私鹽者以一婦人至怒曰豈有逮婦人千百里外與卒吏雜處者汚教甚矣自今毋得逮婦人建議著為令元統初為江浙行省參知政事江浙大旱諸民田減租惟長安寺田不減遂移牘中書以為不可忽天變而毒疲民嶺海徭賦竊發朝廷調戍兵之在行省者往討之會提調軍馬官缺故事漢人不得與軍政衆莫知所為克敬抗言行省任方面之寄豈可拘法坐視乃調兵往捕軍行給糧亦如之貢師泰宣城人泰定間除紹興路總管府推官詳讞之明為諸郡第一至正十五年授兩浙都轉鹽運使剔其積蠧通其利源大課以集國用資之復除江浙行省參知政事策丹蒙古人順帝初為浙西肅政廉訪使時有以駙馬為浙行省丞相其宦豎恃公主勢坐杭州達嚕噶齊位令有司強買民間物不從輒毆之有司來白䇿丹即逮之械以令衆自是丞相府無敢為民害者策丹舊作自當達嚕噶齊舊作達魯花赤今俱改正余闕蒙古人元統間僉浙東道廉訪使事發姦摘伏聰察若神州縣聞闕至貪墨吏多解印綬去扎實大食國人至元三年除僉浙西肅政廉訪使事即按問都轉鹽運使海道都萬户行宣政院等官贓罪浙右郡縣無敢為貪者復以浙右諸僧寺私蔽猾民有所謂道人道民行童者類皆瀆常倫隱徭役乃建議請勒歸本族俾供王賦朝廷是之即著以為令扎實舊作贍思今改正伯勒齊爾布哈蒙古人至正二年拜江浙行省左丞行至淮東聞杭城大火疾馳赴鎮即下令録𬒳災者二萬三千餘戶戶給鈔一錠焚死者亦如之給月米二斗幼稚給其半又請日減酒課織坊元額軍器溙器權停一年泛稅皆停又大作省治民居附其旁者增直買其基募民就役則厚其傭直又請歲減江浙福建鹽課十三萬引或遇淫雨亢旱輒出禱於神祠所禱無不應在鎮二年雖兒童婦女無不感其恩伯勒齊爾布哈舊作别兒怯不花今改正多爾濟蒙古人至正四年遷江浙行省左丞時杭城屢經災燬伯勒齊爾布哈先為相庶務寬紓多爾濟繼之咸仍其舊民心翕然汀州寇竊發多爾濟調遣將士招捕之威信所及數月即平居二年方面晏然多爾濟舊作朵爾只今改正伯勒齊爾布哈改見前蘇天爵真定人至正七年拜江浙行省參知政事江浙財賦居天下十七事務最繁劇天爵條分目别巨細不遺九年復為兩浙都轉運使時鹽法弊甚天爵拯治有方所辦課鈔及期而足強通蒙古人至正十年遷平章江浙行省時盜起汝潁蔓延江浙強通分遣僚佐往督師旅曽不踰時以次克復既乃令長吏按視民數凡詿誤悉置不問招徠流離俾安故業發官粟以賑之十四年托克托統兵南征一切軍資咸取具於江浙強通規措有方陸運川輸千里相屬十七年出鎮海寧州距杭百里地濱海磽瘠民甚貧居二年盜息而民阜在江浙七年涉厯艱險勞績甚著強通舊作慶重今改正托克托改見前董搏霄磁州人浙東宣慰副使理冤獄革弊政至正間以平賊復城功為參知政事舒穆嚕伊遜蒙古人至正十一年以守溫州功授浙東宣慰副使遷行樞密院判官總制處州山谷盜賊殄殲無遺拜江浙行省參知政事舒穆嚕伊遜舊作石抹宜孫今改正欲嚕特穆爾蒙古人至正十二年江南諸郡盜賊充斥拜平章政事行省江浙至鎮引僚屬集父老詢守備之方招募民兵數千人號令明肅統師次建德獲首賊何福斬於市遂復淳安等縣俘獲萬餘人復業者三萬餘家尋以疾卒於軍中欲嚕特穆爾舊作月魯帖木兒今改正樊執敬鄆城人至正時授江浙行省參知政事賊犯餘杭衆皆潰去賊呼執敬降執敬怒叱曰逆賊守關吏不謹汝得至此恨不碎汝萬段何謂降耶乃奮力砍賊因中槍而死欲嚕布哈蒙古人至正時拜江南行御史臺中丞由海道趨紹興為政寬猛不頗既而除浙西肅政廉訪使會張士誠據浙西僭王號度弗可與並處令姪同夀具舟載妻子而匿身木匱中蔽以藁秸脫走至慶元士誠遣鐵騎百餘追至曹娥江不及而返欲嚕布哈舊作月魯不花今改正明單安仁濠人明初為浙江按察副使時悍帥橫斂民曰寨糧安仁一置於法尋進按察使李質德慶人太祖命為江浙行省參知政事質以承流宣化為已任網紀畢張在任三年惠流兩浙熊鼎臨川人洪武𥘉為浙江按察僉事分部台溫時經方氏竊據後偽官悍將二百人暴橫甚鼎盡遷之江淮間民始安枕尋奏治溫之倡邪教者散其衆為農寧海強民陳德仲以憾支解黎異妻屢訴無為白之者鼎一日覽其牒忽有青蛙立案上鼎曰蛙非黎異乎果異止匆動果勿動乃逮德仲鞫實正其罪惠政甚著王濂定遠人洪武初為浙江按察僉事治行著聞大風晝晦詔求直言濂具陳民瘼太祖為緩徴劉丞直贛縣人洪武初為浙江按察僉事時方國珍初降丞直按部懲其尤梗法者一道肅清安然祥符人洪武五年授浙江布政使崇禮教斥姦頑十一年海齧江岸親率夫丁伐石築隄後得安居王鈍太康人洪武中為浙江布政使視事十年有美政時天下牧伯以久任著績者惟鈍與雲南張紞二人太祖常稱於朝以勸庶僚解敏洪武中舉進士授御史擢浙江按察僉事持法無私貪殘斂迹聲稱赫然王良祥符人建文時為浙江按察使燕王即帝位遣使召良良執使者將斬之衆劫之去良集諸司印九於私第與妻決妻先死遂積薪自焚印俱毁夏原吉湘陰人永樂初户部尚書浙西大水詔原吉往治役夫十餘萬濬吳淞下流入於海度地為閘以時蓄泄水患遂息歲大飢奏發粟三十萬石給牛種有請召民佃退淤田益賦者原吉馳疏止之姚廣孝還自浙西稱原吉曰古之遺愛也李素平谷人永樂中為浙江按察司副使發姦摘伏下無遁情用刑平而恕於民不擾仁宗召為右副都御史周新南海人永樂中為浙江按察使理冤釋滯鋤姦植善一方稱神明屬吏莫不改行後被誣見法朝野莫不痛之胡軫豐城人永樂間任浙江都轉鹽運使運同持身廉儉一毫不妄取於人常俸不給至鬻園蔬足之請托不行商旅被惠升浙江按察副使提學士人宗之林碩閩縣人永樂中以御史巡按浙江政尚嚴肅宣德初擢浙江按察使千户湯某結中官裴可烈為姦利碩將繩以法反為所誣逮入京帝親鞫問碩詞直帝為動容復碩官切責可烈碩在浙久人德其惠吳訥常熟人洪熙元年巡按浙江以振風紀植網常為務風裁凜然馬謹新樂人正統中以御史按浙貪猾屏迹疏賑四府飢以廉直入為驗封郎中軒輗鹿邑人正統中為浙江按察使一綴殆遍居常蔬食妻子親操井臼布袍補僚屬化之一方大治景帝立以右副都御史巡撫浙江閩賊吳金八等流劫青田諸縣輗與孫原貞討平之周忱吉水人正統間巡撫直隸江南兼嘉湖二府築海鹽捍海塘一郡七縣海不為患陶成鬱林人正統敢任倭犯桃中為浙江按察僉渚成密布釘板海事有智略遇事淖中倭至艤舟躍岸釘洞足背倭畏之秩滿進副使處州賊葉宗留等攻蘭溪成督兵進屯武莪立木城以守誘賊黨為內應前後斬首數百招降者二復熾焚木城成力戰不支遂被害士千餘人後賊民立祠祀之陳璇鳯陽人正統中為浙物於民率給直十之江按察使時兩司官市一吏又緣為姦璇痛革其弊同列不能堪譖之都御史洪英罷其官浙人數千號泣擁馬不得行且詣闕言治狀璇得還任天順中致仕歸止圖書數篋張驥安化人慶元人正統中巡撫浙江初葉宗留與麗水陳鑑湖以盜礦為業七年遂為亂散掠浙江江西福建境上而遂昌賊蘇牙俞伯通剽蘭溪與相應驥遣金華知府石瑁擊斬牙等撫定其餘黨時鑑湖殺宗留驥命麗水丞丁安率老人王世昌等入已賊巢招口無之鑑湖遂偕其黨六十餘人出降還所掠人算蘇記養等寇金華亦為官軍所獲賊勢遂衰景帝嗣位召還道卒浙民思慕之李俊定興人正統十三年差董浙江銀冶會處州賊起敕王晟亦𬒳害梁婺泰和人天順間任浙江左布政使興利除害民仰之如神明尊之如父母劉大夏華容人天順間浙江左布政使勤撫字緩催科移檄郡縣務在節用愛人不得興無名工作郡縣起解銀兩例有稱頭火耗嚴禁吏胥一毫不取孫珂福山人景泰間以御史按浙適歲大比珂監其事宿弊頓革行部一尚威嚴人莫敢犯所至伸冤抑除姦豪杜謙昌黎人景泰間浙江右布政使轉左在浙十有三年其建制多可為經久計為政以忠厚仁恕為本有惠利於人浙之士民稱頌之楊瑄豐城人成化初遷浙江副使按行海道禁將校私縱戍卒立操法修定海及霩衢健跳二所捍海塘海鹽隄岸二千三百丈民得奠居為副使十餘年政績卓然進按察使斷獄嚴明不苛西湖水舊溉諸縣田十六萬頃時堙塞過半瑄濬復之疾亟猶與同官論濬湖事語不及私楊繼宗陽城人成化中為浙江按察使時諸大吏供億率責辦民間鎮守中官日費萬千繼宗悉裁罷之數忤中官張慶慶兄敏在司禮每於帝前毁繼宗帝曰得非一錢不私之楊繼宗乎敏乃不敢害聞母喪立解印徒跣號哭出止驛亭盡籍廨中器物付有司惟攜一僕書數卷而還王恕三原人成化間巡撫南畿兼杭嘉湖等處時中官王敬乘傳東南搜索奇玩所至驚懼恕上疏力言其弊久之敬等俱收捕下獄中外稱快張敷華安福人成化時為浙江參議監溫處二府銀礦盜起至數千人守臣欲剿之敷華曰此可撫而弭也從數騎馳諭賊皆聽命執其魁十二人餘悉解散居浙十餘年厯右參政右布政使廉惠之聲聞於遠邇楊峻進賢人成化中厯浙江按察使有報父仇論死者峻嘉其孝出之晉左布政使鎮守中官恣橫峻面數其罪取鐵絙欲與駢鎖詣京師乃稍戢舒清德興人成化間由工部主事抽分浙江榷政為民築隄以禦水患號舒公隄居官清約如寒素彭韶莆田人成化時以刑部侍郎巡視浙江整理鹽法韶以商人苦抑配為定折價額蠲宿負憫竈戶煎辦徴賠折閲之困繪八圖以獻因條利病六事悉允行韓鎬盧氏人宏治初為浙江右參議歲飢金華衢州尤甚貧民奪富家粟盜乘之肆掠鎬聞即抵義烏夜遣人諭之比明悉遁去乃發粟賑濟嚴立保伍相司察所部肅然遷進右布政使海鹽捍海塘圯者數千丈衆議築之以屬鎬不三月而成邵寶無錫人宏治時為浙江按察使再遷右布政使鎮守中官議開處州銀礦寶力言其擾民得不償失卒寢其事孫需德興人宏治時為浙江按察使需既厲清節又善剗宿弊浙人稱為前劉後孫前劉者劉大夏曽為布政使有治行也張憲德興人宏治中為浙江右布政使捕置鎮守中官左右於理公帑無毫髮私張鸞咸寧人宏治中浙江按察使司巡視海道六年倭寇遠遁海疆肅清王璟沂水人宏治十四年以僉都御史理兩浙鹽政因賑奏行荒政十事多所全活方良永莆田人正德時為浙江左布政使時錢安用事以鈔二萬鬻於浙易銀三萬餘兩諸司憚安欲抑配於民良永爭之不得乃疏陳其狀請正典刑安為密召還所遣使者而以鈔直還民席書遂寧人正德八年按察浙江擒治豪右逐貪酷吏釋冤獄臬政一新韓邦奇朝邑人正德時為浙江僉事轄杭嚴二府宸濠蓄異志嘗命內豎假飯僧聚千人於杭州天竺寺邦奇立散遣之其儀賓托進貢假道衢州邦奇復持不可數裁抑中官為所搆被逮長吏欲為治裝揮去之梁材應天金吾右衛人正德中為浙江右參政尋進按察使宸濠反鎮守中官畢真約為內應材與巡按張縉等劫持真奪其兵兩浙以衛安黨以平禹州人正德間為浙江溫處兵備道溫處兵素驕因餉不給嘯聚為亂以平單騎諭之衆皆首伏懲其魁傑即日解散督府捕海賊五百人欲以為功訊之皆海中漁者為賊所掠悉縱之升浙江左右布政使陶炎絳州人正德中以右都御史巡視浙江時寧紹瀕海地颶風大作海隄毁者三百里居民漂沒萬數炎出帑按行賑救委官築隄捍水自蕭山至會稽凡五萬餘丈姚原賊犯華埠督兵擊敗斬其渠魁遂城開化常山遂安蘭溪四縣境內之大安朱裳沙河人嘉靖初為浙江按察副使日啜菜羹妻操井臼迎父就養同列知其貧共製衣一襲為夀父亦堅拒不納後再為浙江布政使革姦釐弊民吏振肅何瑭武陟人嘉靖初為浙江提務敦尚本學副使實諸生以士習翕然宗浮靡焉朱紈長洲人中巡撫嘉靖浙江及及福建濱海諸府先是倭舶至閩商賈多負其直倭大怨恨內地浙互市諸大姓姦民遂煽誘為亂紈首禁通番犯連破賊甚著威名者置重典海濱始會紈數詆諸大姓肅既庇賊率諸將諸大姓銜劾之以紈其擅殺戮佛罷職郎機國人行劫者嗾御史陳九聽勘仰藥死紈死罷巡視大臣得不設人後海寇大作咸思紈云阮鶚桐城人使得人嘉靖為盛間浙江提學副浙方苦倭寇撫官檄諸女分道司畫地防入得免追守鶚守武迫蹂􅏳之林門列營苦擢僉都關外令士御史巡撫浙自江賊是兩多方攻浙始得擊鶚隨機休息民思應之擒鶚德相斬殆與立盡祠胡宗憲績溪人撫升任嘉靖間由總督時歙餘姚縣擢人汪直據御史按浙江超五島煽諸倭入擢巡寇徐海陳東麻葉等巢柘林乍浦沙窪宗憲皆以計使自相擒獻賊悉蕩平遊居敬南人平嘉靖間浙江按察使僉患倭寇調主客兵數事厯萬計按察使左右布政庫無羡贏居敬立使時辦無誤議者欲敬前諭之練土著汰客兵兵皆解散在任衣粗當關而噪食糲漆枕督撫櫛匣令居尚青襟時物清節為浙省之冠俞大猷晉江浙東人嘉靖三十一年倭擾詔大猷為寧台諸郡參將以舟師連戰破之却賊於昌國衛賊轉掠紹興諸縣大猷升秩去三十五年復為浙江總兵平賊徐海浙西倭患遂息餘衆踞之賊多死其逸出者盡殲之舟山大猷乘夜雪攻浙東亦安胡宗憲許汪直通叛大猷市大猷力爭不急攻之宗憲被可及直誘入下吏其黨劾委賊大猷逮繫詔獄遂朝廷知其冤尋復用戚繼光登州嚴三人嘉靖中以參將守台金郡時倭寇方警繼光見衛所軍不習戰而閲之又以南方義烏兵剽悍可用召募三千多藪澤不利馳逐乃因地形人教制陳法節短而數明舟艦器械悉利戚家軍名聞天下倭大舉為更置自是戰無不寇台州繼光九戰皆捷俘斬千餘人無算倭自是不焚敢溺犯談綸宜黃人知府以嘉靖中為台州禦倭功進海道副使益募浙東良家子教之山突至台州綸與戚繼光連而盡罷客兵倭自象擊破之加右參政以憂去盧鏜汝寧衛人嘉靖時為參將分守浙東屢破倭賊擢副總兵與胡宗憲共圖大盜徐海殲之宗憲招汪直鏜亦使人説倭令擒直直由是與倭二卒伏誅進江浙總兵當倭難作諸將多望風潰敗獨鏜敢戰名亞俞戚王世貞太倉人嘉靖間浙江參政治吳興三郡吳越新罹兵火供億繁興世貞請汰內府內官大小監冗食及錦衣衛寄籍者事雖不行竟得改折漕糧十五萬蕭廩萬安人萬厯間以御史按浙吏牘山積立決如神雪冤獄以百數黜墨吏新宋濓方孝孺諸祠又請祀王守仁於學宫纍升副都御史巡撫浙江先是浙兵譟轅門羣不逞效尤為姦大剽城市廩時餉而法取之惡不敢生趙炳然劒州人以兵部右侍郎巡撫浙江時寇亂甫平財匱力絀炳然廉以率下悉更諸政令不便者仍奏減軍需之半民尸祝之婁至德項城人嘉靖時為浙江參政進右布政使酌定賦役為書十卷曰兩浙賦役成規民大便之陳儒吉水人嘉靖間浙江按察副使巡視寧紹海道首案文武贓吏捕縣丞藍佐指揮楊淮置之法軍民惕然後改督學以崇經術禁浮靡為已任薛應旗武進人嘉靖間為浙江提學副使鑒衡百不失一龎尚鵬南海人嘉靖末以御史巡按浙江浙民素苦徭役為舉行一條鞭法民大喜時通政吕希周御史嚴杰知府潘仲驂等並里居恣橫乃悉收治其子弟僮奴奏黜為民吏民震懾及去浙人立祠奉祀張淳桐城人萬厯時為杭嚴副使浙東有召募兵數千當汰軍中洶洶將為亂撫按患之淳曰是憍悍者留則有用散則叵測不若汰其老弱而留其壯勇則留者不思亂汰者不能亂矣從之事遂定甘士價信豐人萬厯間巡撫兩浙躬行儉約創武林書院講明正學歲大祲請留漕米數十萬石捐助分賑悉自擘畫巡行郡縣形神勞悴以是得疾卒時筐篋無存斂以浣衣士民號慟之聲連街達陌聞於朝立祠歲祀劉一焜江西人萬厯間巡撫浙江時中官吕貴督織造多所侵擾一焜疏駮且禁治其爪牙貴為斂威築龕山海塘千二百丈濬復餘杭南湖民賴其利張佳允銅梁人萬厯十年杭州兵變詔佳允以兵部右侍郎巡撫浙江甫入境杭民復亂佳允至諭營兵討亂民自贖而密捕兵之首惡者斬之二亂遂定陸完學武進人萬厯間任杭嚴兵備道副使歲飢未價騰踴或議減價完學獨謂吾正欲昂價以來之杭不産米悉資外挽若減價則商裏足矣越數日商舟踵至價果平厯任浙江巡撫修築海塘浙民得免水患傅好禮固安人萬厯中以御史巡按浙江歲大祲督屬吏賑恤請蠲田租停織造折漕糧留鹽課分賑皆報可行部湖州見民飢尤甚用便宜發帑易粟賑之自請服擅發罪詔特宥焉與撫臣合陳恤民十二事皆允行民困大蘇李邦華吉水人萬厯四十二年巡按浙江澄清吏治部內肅然織造中官劉成卒中官吕貴謀代之邦華上疏力諌兼斥中官進奉之弊及左石大奄之黨貴者直聲震朝野竇子稱合肥人萬厯間為浙江按察使清貞剛斷斥絶請託一時姦橫斂迹進右布政使例有羡餘子稱曰朝廷正苦餉不足安得有所為羡餘哉卒歸公帑杜喬林華亭人萬厯間遷浙江右參政分巡溫處海寇劉香老入犯圍府城喬林募勇士晝夜捍禦三戰皆捷侯洞曾嘉定人天啓間任浙江布政司左參政分守嘉湖道政務繁劇不資幕客治官書達旦不匪類潛蹤定漕卒之寐嚴行保甲亂軍民畏服許豸侯官人禎間浙崇江僉事分巡政釐正文寧紹築郡城殲海寇陳奇老體得人為盛時有權璫鎮浙等改督學豸抗不為禮士有儒服迎者立撻之郊蔡懋德崑山人崇禎初遷浙江右參政分守嘉興湖州劇盜屠阿丑衆千餘出沒太湖當事議剿之懋德曰此可計擒也悉召瀕湖土豪免其罪簡壯士與同發遂擒阿丑本朝佟國器漢軍正藍旗人順治道偕諸將剿擒吳日二年為嘉湖兵生朱天定並招備降白腰黨陸汧叛獄繁多國等巨寇悉平進按器平情讞鞫全活察使時浙東初甚衆後遷江西定巡撫調任浙平阮六等江招降海寇廖明旗剿卒後浙人追思祀之李際期孟津人順治二年任浙江參議督理學政時值鼎新際期立興學校培養人材所貢拔皆一時名流士風意振丕振擢參政兵備寧台釐姦剔弊振紀肅綱勵精案牘訟無冤抑朱思義漢軍正黃旗人順治五年為巡海道僉事時浙東初平將士縱恣思義嚴抑之告訐者不得逞民賴以安卒於官人皆惜之熊維傑漢軍鑲白旗人順治八年為浙江按察使性峭直不苟言笑然善撫其民為政簡而周剛而不劌時兵民雜處兵出擾民有司不敢問維傑出有來訴者必立馬受為之申理民望見其旗輒相慶張儒秀漢軍鑲白旗人順治九年任浙江左布政使公明威斷有開銷軍儲移解馬價二事此其尤著者趙國祚漢軍鑲紅旗人順治十五年任浙江總督兼節制江西廣信一府凡鹽策兵政民隱賊情及地方厄塞無不悉心究畫值米價騰貴發帑平糶並移檄鄰省無得遏糴士民德之朱昌祚漢軍鑲白旗人順治十八年以工部侍郎巡撫浙江時浙中寇盜未息昌祚多設方略且導以歸順之利賊黨多解散巡按御史既撤重案悉歸巡撫逮繫數千人昌祚數月間審結得釋者甚衆疏請蠲免溫台等郡無徵銀糧沿海居民避海寇內徙者發帑給田無犯以贍并嚴之大飭有軍征司不海昌祚得因軍厚犒諸興之際將約以苛徴於秋毫民浙人咸德之趙廷臣漢侍軍郎鑲黃旗總督浙人康熙閩時海元年以兵濱尚多未部右靖廷臣親赴軍興後定度海由支不寧台溫三足廷臣疏路出請復洋搜二十緝海宇四監鼓悉定鑄泉貨遂通范承謨漢史軍鑲黃旗人巡撫浙江既康熙至三八年月不以視副都御事人初易之一聞者股日栗出片紙盡列兩衢台處三郡山浙田豪惡姓沙礫不名捕可治置之而賦法如故田主承謨特多流亡疏免之纍及鄰族長吏嘉湖二郡苦白坐逋課去者相糧役重承謨復望為奏減杭得附老嘉大弱例飢肩出官庫銀鹽自給全易活米無平糴又算遷浙許最閩總貧督者為耿逆保兵所害部尚後贈太書諡忠子少貞色伯哩滿洲以都人康熙同知提八督年浙江軍務駐和愛養百寧波姓時紀律耿逆嚴明反於與閩士浙卒同甘苦文中盜賊四起武色協伯哩與總衢州色督李伯哩之督芳密軍台籌方略州剿除調兵四援之逆氛招撫流芳亡督浙軍賴以安以勤勞卒於任兵民立祠祀之色伯哩舊作塞白理今改正劉昌臣武陵人康熙十一年任浙江糧儲道除革一切輸運旗丁姦弊耿逆叛閩大兵駐衢進剿昌臣署藩篆夙夜措轉餉不絶復署臬司讞獄務得其情以勞卒官士民巷哭李之芳武定州人順治中以御史視浙鹽多所興革商民賴之康熙十二年擢兵部侍郎總督浙江明年三月耿逆反之芳檄諸路將士分守要害而身率兵趨衢州以遏賊衝賊衆數萬攻衢炮聲震地勢熾甚左右請少避之芳不顧麾將士力戰却之時溫處金嚴諸郡皆已從賊之芳以計招降偽將韓斌王得功生擒賊首汪磐繆國英等十五年八月督諸軍奪仙霞關大兵遂長驅入閩捷聞進兵部尚書浙東既定疏請蠲免金衢嚴溫處五郡舊賦賑撫流民百二十餘萬保浙之功之芳為最傅喇塔宗室康熙十三年奉命為寧海將軍討耿精忠進師台州連復太平樂清青田三縣會康親王於衢州進擊殺賊七千餘人破賊營二十八復雲和大兵至福建精忠降傅喇塔卒於軍賜諡惠獻乾隆五年入祀浙江賢良祠陳丹赤侯官人康熙中分巡溫處道耿精忠亂溫州總兵祖宏勳叛應之丹赤被執不屈遇害贈通政使諡忠毅楊應魁漢軍鑲紅康熙十三旗人年為台紹副使寇乘間蜂賊帥曽養性等水陸起寧紹道梗衆議欲號十萬陷黃巖土棄台州會應魁馳至力持不可曰我有矣悉力拒台寧紹之門户也台失則浙東非戰遂復仙居誅王從龍賊大敗遁去大兵下黃巖應魁涕泣命全活無算卒於官民哀思為民請不忘石琳滿洲康熙人二十尤年為浙甚戶口江布政使時耿逆多逃亡而丁賦猶初平浙東衢郡被兵責之里甲琳核實請免之軍興既久通省供億浩釐定力除一切陋規尤禁加繁逋欠耗常曰叢積琳悉為革民間一分火耗便可增一正供時以為名分言王國安漢十軍正白旗人康熙二一年授浙江巡撫浙自耿逆亂後官私凋敝國安鋤暴惡革收冬兑之令杜運丁需索松江沿海六苛徴立冬鹽場官收竈解課一派十國安一準徵收地丁之例官收官解不得為姦兵興後守卒驕橫貸子錢收民廬舍子女國安按法禁絶時延見鄉三老問所疾苦親巡闤闠遍厯村落籍記姦匪有犯者須臾縛至莠民悚息尋升浙閩總督趙士麟雲南河陽人康熙二十三年以副都御史巡撫浙江營卒以私債逼民人積成大案士麟移文將軍令繳劵約捐資代償時姦胥豪右多縱恣不法廉得其狀悉置之法杭城內河淤塞數百年士麟下令疏濬水道復通又繕城隍葺學校善政具舉未幾移撫江蘇兵民肖像祀之張鵬翮遂寧人康熙二十八年巡撫浙江屏絶各官餽遺革除一切陋規事無巨細親為裁決涖浙六載兵民相安查木楊滿洲人康熙三十三年鎮守浙江將軍朔望集兵民宣講聖諭嚴禁八旗兵卒放債剝民及縱攘竊者令牧馬毋踐禾稼墳塋卒於官士民建祠祀之諡敏恪顔光斆曲阜人康熙三十三年以檢討督學浙江性孤介人不敢干以私拔取真才不遺餘力所刻試牘風行海內垂數十年士人誦習不異於初薑橚保德州人康熙中以鴻臚少卿督學浙江文取清真間不足額則訪録前代忠孝理學之裔以輔之有薦於朝者曰薑橚一錢不要一情不聽蓋公論也四十二年聖祖南巡御書廉靜二字以賜之張泰交陽城人康熙四十二年巡撫浙江居官清正仁恕表率羣僚尤留意兵民重務編保甲謹斥堠俾絶盜源修江塘易土以石立廟鎮之開書院於紫陽山與諸生講論經史大義并倡行鄉約士民翕然向風卒於官浙人肖像祀於孤山徐元夢滿洲正白旗人姓舒穆祿康熙時巡撫浙江杭州等七府旱災疏請蠲賑並截留漕米平糶緩徴應完額賦以紓民力萬松嶺書院尚無嘉名元夢奏請獲賜浙水敷文扁額并內府書籍法帖以廣文教在浙四年甚多惠政郭世隆漢軍鑲紅旗人康熙間總督浙閩浙江協餉以歲歉難徴世隆疏撥鄰省帑銀三十萬濟之民力得紓海關監督請移寧波城外之關於鎮海增設紅毛館世隆持不可商稱便祀浙江名宦祠趙申喬武進人康熙四十年為浙江布政使受事三日首革南糧布袋之弊私徴私餽一切禁止就擢浙江巡撫藩庫有羡餘二千兩封識以授代者自藩署移撫廨器什惟襆被一肩書數簏而已江潮逼近杭城舊塘傾圯申喬躬親相度易土以石鎔鐵貫其中築子塘護焉在官不延幕客案牘皆手理屬吏服其公清俱不敢欺彭始摶鄧州人康熙中以檢討督學浙江衡文一夲經史所甄拔多老成積學校閲精勤無間晝夜逾年鬚髮盡白聖祖南巡御書公明盡職四字以賜之任滿還歸舟莫辦附糧艘至京浙士思之建祠西湖朱軾高安人康熙五十六年巡撫浙江以清吏治厚風俗為急務革除一切供億自奉淡泊以身率下奬廉斥貪持以和平定民間嫁娶刊布禮書除榷政之不便者海塘為潮所囓時築時圯而海寧上虞二縣尤甚軾悉心籌畫修築石塘三十七百餘丈重建敷文書院集諸生肄業親加訓課遠邇向風段志熙濟源人康熙間任浙江布政使以兄任寧台道凡浙中山川風土民生利弊靡不洞悉首革藩庫陋規收發賦餉躬親驗兌胥吏不得為姦遇水旱多方賑恤務獲安全杭城民廬稠密向多火災形家言北關拱宸橋汜水不制火志熙即捐俸倡修又開濬大小諸河修築海塘三千七百餘丈皆民不勞而事集尤加意學校為敷文書院肄業諸生捐置廩餼千金士風振起李衛銅山人雍正初巡撫浙江行順莊革里書圖甲請帑金三十萬糴米蜀中分貯常平永濟諸倉以備平糶晉總督仍兼巡撫並轄江蘇諸府州督捕事太湖素為盜藪衛廉得其姓名居址潛遣兵役躡之無得脫者自是東南少盜何世璂山東新城人雍正元年督學浙江剔除弊竇殆盡不以苛刻為明整飭士習丕振儒風方覲江都人雍正六年擢浙江按察使嘗謂盜之不弭吏為之市也嚴立科條盜遂衰止辨