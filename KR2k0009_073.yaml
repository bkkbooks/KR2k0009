治唐貞觀初屬衛州宋天聖四年隸安利軍熙寧六年廢入黎陽元祐初復置屬濬州元和志衛縣在衛州東北六十八里縣志今為衛縣集清淇故城在濬縣西隋開皇十六年置清淇縣大業初廢清淇入衛尋復置唐貞觀十七年省清淇入衛縣長安三年又置清淇縣神龍元年又省入衛縣頓邱故城在濬縣西本衛邑詩送子涉淇至於頓邱毛傳邱一成為頓邱水經注淇水又北徑頓邱縣故城西是也戰國時屬魏史記蘇代約燕王曰決宿胥之口魏無虛頓邱即此漢置縣屬東郡晉太始二年兼置頓邱郡後魏太和十八年屬汲郡後屬黎陽永安元年分入內黃天平中罷隋開皇六年復置屬武陽郡唐大厯七年置澶州晉大福四年以州為德清軍宋熙寧六年省入澶州清豐縣舊唐書志頓邱漢縣後移治所於陰安城今縣北陰安城是也寰宇記故城在衛縣西北二里黎陽故城在濬縣東北漢置黎陽縣屬魏郡漢志注晉灼曰黎山在其南河水經其東縣取山之名取水之陽以為名水經注河水又東北過黎陽縣南今黎山之東北故城蓋黎陽縣之故城也山在城西城憑山為基東阻為河魏書地形志黎陽郡孝昌中分汲郡置治黎陽城宋史河渠志大觀三年都水監言慮水溢為患乞移軍城於大伾山居山之間以就高仰按宋時郡台黎陽即漢時故城也政和五年升安利軍為州是時濬州與黎陽各治蓋濬州别治三山而黎陽則仍舊治也明初復徙治於山東北平陂即今縣治滑臺故城即今滑縣治晉書慕容德自鄴至滑臺景星見於尾箕漳水得白玉狀若璽時德始都滑臺魏書地形志東郡秦置治滑臺城晉改為濮陽後復天興中置兖州太和十八年改宋書州郡志兖州武帝平河南治滑臺水經注滑臺城有三重中小城謂之滑臺城舊傳滑臺入自修築此城因以名焉城即故鄭廩延邑也元和志滑州治白馬城即古滑臺城昔滑氏為壘後人增以為城又有都城周二十里相傳衛靈公所築甚為高峻堅險臨河寰宇記小城翟遼所築小城外大城高昌所築按大河南徙滑州白馬皆在河北而滑州故城已淪河中縣志云縣東二里有滑臺故城誤白馬故城在滑縣東二十里本衛漕邑詩言至于漕左傳閔公二年衛人立戴公以廬於曹陸璣詩疏衛本河北東徙渡河則在河南是也秦置白馬縣史記高祖西與秦將楊熊戰白馬漢屬東郡晉屬濮陽國後魏置兖州於滑臺白馬亦隨州徙治故城遂廢水經注白馬濟津之東南有白馬城衛文公東徙渡河都之故濟取名焉括地志白馬故城在滑州衛南縣西南二十四里封邱故城今封邱縣治左傳定公四年祝他曰武王分曹公以封父之繁弱漢置封邱縣水經注濟瀆東徑封邱縣南燕縣之延鄉也其在春秋為長邱元和志縣南至汴州五十里古之封國左傳封父之繁弱是也後屬衛不屬魏漢高祖與項羽戰敗於延鄉有翟母者免其難故以延鄉為封邱縣以封翟母元史地理志封邱縣金大定中河水湮沒遷治新城元初新城又為河水所壞乃因故城遺址稍加完葺而遷治焉災縣故城在考城縣東南本周戴國漢置縣屬梁國春秋隱公十年宋人蔡人衛人伐戴史記漢元年靳歙略梁地别將擊邢説軍災南漢書地理志災縣故戴國注應劭曰章帝改為考城元和志考城縣西南至曹州九十五里古戴國也後屬宋楚滅宋改名曰穀後漢兵起邑多災年故改為災縣章帝柴於岱宗過災縣詔御史改為考城至晉屬濟陰郡高齊天保七年省考城縣仍移城安縣理此舊志元時移治賀邱明洪武中移治江墓店正統二年又以河患徙築今城漢故城在縣南二十五里山陽廢縣在輝縣西南七十里金史興定四年以修武縣之重泉村置山陽縣屬輝州即古重泉城也元史地理志至元三年省山陽縣為鎮入輝州衛南廢縣在滑縣東六十里本衛楚邱地詩作于楚室左傳齊桓公封衛於楚邱漢書地理志衛為狄所滅齊桓公率諸侯伐狄而更封衛於河南曹楚邱是也隋開皇十六年置縣屬東郡唐屬滑州舊唐書志滑州衛南隋楚邱縣後以曹有楚邱乃改為衛南縣治古楚邱城儀鳳元年移治西北濱河之新城永昌元年又移於楚邱之故城南宋仍屬滑州金省按隋志有西濮陽大業初廢入衛南又平昌縣魏孝昌四年分白馬置長樂縣武泰初分涼城置皆屬東郡後齊皆廢韋城廢縣在滑縣東南本古豕韋國後漢書注白馬縣東南有韋城古豕韋氏之國是也隋開皇十六年置縣屬東郡唐宋屬滑州金時縣圮於水廢入白馬靈昌廢縣在滑縣西南隋開皇十六年置屬東郡唐屬滑州後唐避諱改曰靈河宋熙寧三年廢入白馬元和志靈昌縣東北至滑州七十里按九域志云治平三年廢與宋史異涼城廢縣在滑縣東北後魏置縣為東郡治宋書晉義熙十二年遣北兖州刺史王仲德破魏於東郡涼城水經注河水東北徑白馬縣之涼城北耆舊傳云東郡白馬縣之神馬亭實中層峙隋志白馬舊置東郡後齊并涼城縣入焉守節廢縣在封邱縣西寰宇記在封邱縣西北三十里武德三年李績於酸棗縣置黎州乃分胙城酸棗二縣地置守節縣屬之時東州未平人思效節縣新創立故以守節為名四年廢鄘城在汲縣東北周初所分之國鄭氏詩譜自紂城而南謂之鄘通典鄘城在新鄉縣西南三十二里古鄘國也寰宇記在汲縣東北十三里吳城在獲嘉縣西魏書地形志南修武有吳城府志一名吳亭隤城在獲嘉縣西北左傳隱公十一年桓王與鄭蘇忿生之田攢茅隤懷注攢茅隤皆在修武縣北水經注吳城水之北陂澤側有隤城今世俗謂之皮垣際陂北隔水一十五里俗所謂蘭邱也西十里又有一邱際山世謂之敕邱形狀相類疑即古攢茅杜預謂三邑皆在縣北非也括地志茅亭在獲嘉縣東北二十五里即古攢茅鄧城在輝縣西南六十里周九里水經注長泉水重發於鄧城西北又南徑鄧城東是也縣又有