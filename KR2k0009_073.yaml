front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_073-1a}
body:
  text: 彰德府三人物漢蓋寬饒魏郡人明經為郡文學以孝廉為郎舉方正對策高第遷諫大夫擢司隸校尉刺舉無所避平恩侯許伯入第衆皆賀寬饒後至曰毋多酌我我乃酒狂坐客皆屬目寬饒為人剛直高節志在奉公家貧俸錢月數千半以給吏民為耳目言事者身為司隸子常步行自戍北邊公廉如此是時上方用刑法信任中尚書宦官寬饒奏封事上以寬饒怨謗遂下寬饒吏寬饒引佩刀自剄杜鄴繁陽人鄴少孤其母張敞女鄴從敞子吉學問得其家書以孝廉為郎與車騎將軍王音善舉侍御史遷涼州刺史元壽元年詔舉方正直言扶陽侯韋育舉鄴方正未拜卒鄴子林清靜好古亦有雅材建武中歷位列卿至大司空馮勤繁陽人八歲善計初為太守銚期功曹有高能稱期常從光武征伐政事一以委勤薦于光武除為郎中給事尚書以圖議軍糧在事精勤遂見親識拜尚書僕射職事十五年以勤勞賜爵關內侯纍遷司徒勤愈恭約盡忠號稱任職勤母年八十每會見詔敕勿拜令御者扶上殿謂諸王曰使勤貴寵者此母也其見親重如此中元元年卒帝悼惜之臺佟鄴人隱于武安山鑿穴為居采藥自給建初中州辟不就刺史行部乃使從事致謁佟載病往謝刺史乃執贄見佟曰孝威居身如是其苦何如佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕惕庶事反不苦耶遂去隱逸終不見杜喬林慮人少為諸生舉孝廉辟司徒府纍官大司農時梁冀子弟五人及中常侍等以無功並封喬上書諫不省建和元年代胡廣為太尉桓帝將納冀妹冀欲令以厚禮迎之喬不聽因此日忤于冀李固見廢內外喪氣惟喬正色無所回撓于是海內歎息朝野瞻望焉在位數月免宦者唐衡左悺等共譖于帝梁冀遂諷有司劾喬及李固與劉鮪等交通繫死獄中霍諝鄴人年十五諝舅宋光坐繫獄諝愍舅冤奏記梁商商高諝才即奏原光罪由是顯名纍官金城太守再遷北海相入為尚書僕射是時大將軍梁冀貴戚秉權自公卿以下莫敢違牾諝數奏其事又因陛見陳聞罪失及冀誅後桓帝嘉其忠節封鄴都亭侯前後固讓不許出為河南尹遷司隸校尉轉少府廷尉卒官欒巴內黃人性質直學覽經典拜郎中四遷桂陽太守荆州刺史李固薦巴治迹徵拜議郎守光祿大夫遷沛相所在有績徴拜尚書靈帝時竇武陳蕃被誅巴上書極諫理陳竇之冤帝怒收付廷尉巴自殺審配魏郡人少忠烈慷慨有不可犯之節袁紹領冀州以配為治中甚見器任紹卒配等奉尚為嗣尚使配守鄴曹操進攻鄴鑿塹圍城引漳水以灌之配令士卒堅守死戰操出行圍配伏弩射之幾中兄子榮開門納操兵生獲配操意欲活之配意氣壯烈終無撓辭見者莫不歎息遂斬之晉邵續安陽人朴素有志烈博覽經史善談理義妙解天文初為成都王穎參軍王浚假續樂陵太守石勒破浚續孤危無援權附于勒勒亦以其子乂為督護既而段匹磾遺書要續俱歸元帝續從之其下諫曰今棄勒歸匹磾任子危矣續垂泣曰我出身為國豈得顧子而為叛臣哉遂絶子勒勒乃害乂元帝以續為平北將軍假節勒遣季龍乘虛圍續李龍掠其居人續率衆出救遂為所得使續降其城續呼兄子竺等曰吾志雪國難以報所受不幸至此汝等努力自勉勿有二心李龍遣使送續于勒勒厚撫之久之竟遇害南北朝魏孔伯恭鄴人父昭以密皇后親賜爵汝陰侯性柔曠有才用為趙郡太守進爵魯郡公伯恭以父任拜給事中顯祖初領鎮東將軍率兵援彭城破劉或將張永沈攸之等進攻下邳宿豫擢散騎常侍都督徐南兖州諸軍事卒贈鎮東大將軍東海王諡曰桓北齊慕容儼清都人容貌出羣衣冠甚偉頗學兵法工騎射魏河間王元琛辟為左廂軍破梁將馬元達等纍有功纍遷安東將軍天保初除開府儀同三同遣鎮郢城人信阻絶城守孤懸儼導以忠義信賞必罰人無異志顯祖召還封成陽郡公儼從征討每立功效有將帥之節卒贈司徒尚書令周申徽魏郡人少與母居盡力孝養及長好經史性審慎不妄交遊孝武初為記室參軍察徽沉密有度量每事信委之乃為大行臺郎中時軍國草創幕府務殷四方書檄皆徽之詞也大統十二年拜瓜州刺史徵兼尚書右僕射加開府儀同三司徽性勤敏凡所居官案牘無大小皆親自省覽以是事無稽滯吏不得為姦後雖厯公卿此志不懈厯少司空少保卒諡曰章隋陸彥師臨漳人少有行檢魏襄城王元旭引為參軍事以父艱去職哀毁殆不勝喪兄弟相率廬墓負土成墳齊文宣表其廬號其所住為孝終里厯中書黃門侍郎以不阿宦者出為中山太守高祖受禪拜吏部侍郎隋承周制官無清濁彥師在職凡所任人頗甄别于士庶論者美之兄卭博覽羣書善屬文卭子乂于五經最精熟人為之語曰五經無對有陸乂陸爽臨漳人少聰敏九歲就學日誦二千餘言周武帝聞其名與楊休之等十餘人俱徵入關諸人多將輜重爽獨載書數千卷至長安授宣納上士高祖受禪遷太子洗馬與宇文愷等撰東宫典記七十卷朝廷以其博學有口辨陳人至境常令迎勞開皇十一年卒官子法言敏學有家風釋褐承奉郎馬光武安人少好學晝夜不息尤明三禮開皇初授太學博士高祖幸學光升座講禮諸儒以次論難光剖析疑滯理義宏贍論者咸共推服後數年丁母憂歸鄉里遂有終焉之志以疾卒于家杜正元鄴人世以文學相授正元尤聰敏博涉多通兄弟數人並以文章才辨藉甚三河之間開皇末舉秀才尚書試方略正元應對如響下筆成章僕射楊素負才傲物正元抗辭酬對無所屈撓素甚不悅會林邑獻白鸚鵡素促召正元令作賦正元倉卒之際援筆立成辭理華贍素歎曰此真秀才吾不及也授晉王行參軍轉豫章王記室卒官弟正藏好學善屬文大業中應詔舉秀才著碑誄銘頌詩賦百餘篇又著文章體式大為後進所寶時人號為文軌乃至海外高麗百濟亦共傳習稱為杜家新書堯君素湯陰人煬帝為晉王時君素以左右從及嗣位纍遷鷹擊郎將大業末署河東通守唐遣吕紹宗韋義節等攻之圍甚急又賜君素金劵待以不死君素卒無降心其妻至城下招之君素引弓射應弦而倒泣厲將士誓以死守歲餘城中乏食為左右所害唐傅奕鄴人高祖時拜太史丞遷令上疏極詆浮屠法貞觀十三年卒臨終自志曰傅奕青山白雲人也奕雖善數然嘗自言其學不可以傳武德時所改漏刻定十二軍號皆詔奕云戴胄安陽人性堅正幹局明強隋末王世充謀篡切諫不納太宗引為府士曹參軍擢大理少卿胄犯顔據正參處法意至析秋毫隨類指摘言若泉湧帝益重之遷尚書左丞矜其貧賜錢十萬胄所敷納緣政得失咸有可觀奏已即削藁檢校吏部尚書卒諡曰忠子至德乾封中纍遷西臺侍郎同東西臺三品卒諡曰恭李君羡武安人高祖時任上輕車都尉秦王引置左右從破宋金剛于介休加驃騎將軍從討王世充為馬軍副總管從破竇建德劉黑闥所向必先登摧其鋒纍授左衛府中郎將突厥至渭橋君羡與尉遲敬德擊破之帝曰使皆如君羡者敵何足憂改左武候中郎將封武連縣公在仗讀書不休帝嘉勞厯蘭州都督左監門衛將軍華州刺史鄧世隆相州人隋末變姓名號隱元先生棲白鹿山貞觀初召授國子主簿與崔仁師慕容善行劉愷庾安禮敬播俱為修史學士厯衛尉丞終著作郎李延壽相州人貞觀中厯御史臺主簿兼直國史初延壽父大師多識前世舊事思擬春秋編年刋究南北事未成而殁延壽乃追終先志作南史北史二書合百八十篇上之其書甚有條理刪落釀辭過本書遠甚遷符璽郎兼修國史卒嘗撰太宗政典高宗觀之咨美直筆賜其家帛五十段馮元常安陽人舉明經及第高宗時厯尚書左丞嘗祕奏中宫權重宜少抑由是為武后所惡元常在職修舉識鑒澄遠帝委遇特厚武后擅朝出為隴州刺史徙眉州轉廣州都督凡三徙終不得至京師卒為酷吏周興所陷下獄死從弟元淑武后時厯清漳浚儀始平三縣令所至不挈妻子斥俸餘以給貧窮人咸譏其近名元淑曰吾性也不為苦終祠部郎中王同皎安陽人長安中尚太子女安定郡主桓彥範等誅二張遣同皎迎太子太子猶豫同皎即扶上馬從至元武門斬關入兵趨長生殿太后所奏誅易之等狀帝復位封琅琊公拜駙馬都尉遷光祿卿神龍時謀殺武三思三思令李悛上急變言同皎欲擁兵闕下廢皇后帝大怒斬同皎于都亭驛同皎且死神色自若睿宗立詔復官爵諡忠壯從子邱舉制科中第遷考功員外郎務核實材登科才滿百議者謂數十年來采録精明無邱比遷吏部侍郎典選復號平允以禮部尚書致仕孫潛元和中擢將作監吏或藉名北軍驕惰不事潛悉奏罷之拜涇原節度使遷檢校尚書左僕射卒沈佺期內黃人及進士第官至太子少詹事善詩與宋之問齊名學者宗之號沈宋盧從願臨漳人擢明經為夏尉又舉制科高第睿宗立纍拜吏部侍郎吏選自中宗後綱紀耗蕩從願精力于官偽牒詭功摘檢無所遺銓總六年以平允聞帝異之特官其一子贈其父敬一為鄭州長史授吏部尚書致仕卒諡曰文源乾曜臨漳人第進士神龍中以殿中侍御史黜陟江東奏課最遷諫議大夫開元初纍遷黃門侍郎同中書門下三品進位侍中建言大臣子求京職俊乂授外官非平施之道請出二子補外時嘉其讓位至太子少傅安陽郡公卒族孫光裕亦有名居官號清願撫諸弟友義卒官鄭州長史子洧擢進士第天寶中安祿山犯河洛為江陵大都督長史以禦賊卒贈禮部尚書諡曰懿宋韓令坤武安人周世宗時厯殿前都虞候領定武軍節度從征淮南下揚州又下壽州太祖親征李筠詔令坤率兵屯河陽澤潞平以功兼侍中建隆二年改成德軍節度令坤有才略識治道鎮常山凡七年北邊以安太祖聞其卒甚悼惜之韓重贇武安人少以武勇隸周太祖麾下從世宗戰高平以功遷鐵騎指揮使宋初以翊戴功擢領永州防禦使從征澤潞乾德五年出為彰德軍節度開寶二年太祖征太原過其郡命為北面都部署遇遼兵于定州大破其衆太祖優詔褒美七年卒子崇訓延平中屯鎮州遼兵至崇訓折其要路敵遁去後拜檢校太傅分司西京卒子允恭有謀略好學能世其家蔡審廷武安人少能騎射從周世宗戰高平有功遷軍使宋初授殿前散都頭指揮使從征李筠為飛石傷足車駕幸其官署問之賜賚甚厚乾德初授冀州刺史征太原時屯兵易州審廷訓練士卒甚整太祖過鎮陽見于行在命為鎮州兵馬都鈐轄開寶八年卒魏丕相州人為作坊副使在膱盡力以久次轉正使凡典工作十餘年討澤潞維揚下荆廣收川陜征河東平江南皆令修創器械無不精辦太祖幸洛郊祀三司使王仁瞻議雇民車牛運法物丕揀本坊匠少壯者二千餘分為遞鋪輸之時以為便出為黃州刺史還朝召對賜御書急就章朱邸集厯知鳳州襄州遷左驍衛大將軍卒丕好歌詩頗與士大夫遊接有時稱師頑內黃人少篤學與兄頌齊名建隆二年舉進士擢上第厯知邠簡資眉四州超拜工部郎中真宗纍召對詢其文章頑謙遜自晦帝益嘉之命知制誥兼史館修撰咸平二年同知貢舉召入翰林為學士五年卒頑曠達夷雅縉紳多慕其操尚劉用相州人曉音律善騎射端拱初領涼州刺史李順亂蜀為西路行營鈴轄賊平遷祁州刺史咸平中烽候數警用建議益邊兵俟其南牧即率驍鋭出東路以牽制其勢因圖上地形帝召宰相閲視可其奏景德初為邢州部署以城守之勞進爵邑厯知齊陳潞三州大中祥符二年卒李防內黃人舉進士厯官三司户部判官景德初江南旱詔與張知白分東西路安撫上言秦義嘗增江淮兩浙荆湖榷酤錢民頗煩擾詔悉罷之防好建明利害所至必有論奏朝廷頗施行之在江南晏殊以童子謁見防命賦詩使還薦之後至宰相韓國華安陽人性純直有時譽太平興國二年舉進士雍熙中假太常少卿使高麗既至其俗獷驁恃險遷延未即奉詔國華移檄諭以朝廷威德宜亟守臣節于是俯伏聽命使還遷左司諫充鹽鐵判官淳化二年遼人請和朝議疑其非實遣國華使河朔以察之既至盡得其詐以聞三年命直昭文館祥符初纍遷右諫議大夫代還卒竇舜卿安陽人以蔭為三班奉職辟府州兵馬監押夏人犯塞舜卿求援于大將王凱凱弗應舜卿提州兵出戰勝之明日經略使問狀凱懼要以同出為報舜卿歡然相許不自以為功熙寧中厯邠寧環慶路副總管改刑部侍郎卒諡康敏韓琦國華子天聖中舉進士方唱名太史奏五色雲見初授將作監丞厯官陜西經略安撫招討使與范仲淹在兵間久名重一時人心歸之朝廷倚以為重天下稱韓范嘉祐三年拜同中書門下平章事請建立皇嗣擇宗室之賢者以為宗廟社稷計英宗嗣位拜右僕射封魏國公神宗立拜司徒兼侍中判相州相人愛之如父母八年換節永興軍卒諡忠獻帝為治冡篆其碑曰兩朝顧命定策元勳配享英宗廟庭琦天資朴忠識量英偉臨事喜愠不見于色嘉祐治平間再決大策以安社稷時朝廷多故琦處危疑之際知無不為在魏都久遼使每過移牒必書名曰韓魏公在此故也其見重于外國如此韓忠彥琦子舉進士纍官尚書左丞知樞密院事哲宗親政更用大臣言者觀望爭言垂簾時事忠彥言昔仁宗始政當時亦多譏斥章獻時事仁宗惡其持情近薄下詔戒飭陸下能法仁祖用心則善矣徽宗即位拜門下侍郎忠彥陳四事一曰廣仁恩二曰開言路三曰去疑似四曰戒用兵踰月拜尚書右僕射上用忠彥言數下詔蠲天下逋負盡還流人而甄敘之以觀文殿大學士致仕卒韓浩琦孫以奉直大夫守濰州建炎二年金師攻城浩率衆死守城陷力戰死特贈三官官其家三人韓肖胄忠彥孫以蔭補承務郎厯開封府司録詔除直祕閣知相州王師傅燕肖胄策幽薊且有變宜陰為守備巳而金騎入境野無所掠而去建炎二年為祠部郎遷左司應詔陳五事擢工部侍郎時召問戰守計肖胄條奏千餘言帝稱其所對事理簡當紹興二年遷吏部侍郎時條例散失吏因為姦肖胄立重賞俾各省記編為條目以次行之舞文之弊始革三年拜端明殿學士同僉書樞密院事充通問使至金金人甚重之使還除資政殿學士知紹興府尋奉祠卒諡元穆嶽飛湯陰人少負氣節沈厚寡言家貧力學尤好左氏春秋孫吳兵法宣和四年應募隸留守宗澤紹興元年張浚請飛同討李成飛請為先鋒大破成軍江淮平纍授武安軍承宣使帝手書精忠嶽飛字以賜之厯授少保河南北路招討使討平羣盜屢破金兵既敗烏珠于郾城纍戰皆捷中原大震方指日渡河秦檜風臺臣請班師一日奉十二金字牌飛憤惋泣下曰十年之力廢於一旦既歸授樞密副使檜以飛終梗和議風万俟卨等劾飛遣使捕飛父子命何鑄鞫之飛裂裳以背示有盡忠報國四大字深入膚理坐繫兩月無可證者歲暮獄不成檜手書小𥿄付獄即報飛死飛至孝母有痼疾藥餌必親母卒水漿不入口者三日好賢禮士覽經史雅歌投壷恂恂如書生然忠憤激烈議論持正不挫于人卒以此得禍孝宗詔復飛官諡武穆後改諡忠武嘉定四年追封鄂王烏珠舊作兀术今改正嶽雲飛養子年十二從張憲戰多得其力每戰先諸軍登城襄漢平功在第一飛不言逾年銓曹辨之始遷武翼郎楊么平功亦第一張浚亷得其實奏乞擢異數飛力辭不受穎昌大戰無慮十數出入行陳體𬒳百餘創甲裳為赤以功遷忠州防禦使終左武大夫提舉醴泉觀万俟卨誣雲與張憲書令措置使還飛軍棄市時年二十三孝宗初與飛同復原官贈安遠軍承宣使楊再興飛將飛屯襄陽以圖中原再興取長水盡復西京險要又得馬萬匹芻粟數十萬中原響應後以三百騎遇烏珠兵十二萬于小商橋再興戰死獲其尸焚之得箭鏃二升姚興相州人靖康中以武功纍遷荆湖南路兵馬副都監金人渝盟王權遣興拒之與金兵遇麾兵力戰父子俱死詔贈容州觀察使諡忠毅李道相州人初歸宗澤澤卒依襄陽副使桑仲仲以為副都統制兼知隨州仲為霍明所殺道率兵縞素圍明于郢明亡去劉豫遣人持書招道道執其使以聞詔嘉奬之領榮州團練使除唐鄧郢州襄陽都統制從嶽飛收復襄陽等郡纍升御前諸軍統制武興蠻楊再興速歲寇倞道破其衆再為湖北副總管卒諡忠毅韓同卿琦五世孫女為寧宗后同卿纍官慶遠軍節度使加太尉李父托胄自以有定策功聲勢熏灼同卿每懼滿盈不敢干政同卿殁托胄竟敗人始服其善遠權勢云金王競彰德人博學能文善草隸書皇統初參政韓昉薦之召權應奉翰林文字二年試館閣競文居最遂為真遷尚書禮部員外郎時海陵當國欲令百官避堂諱競言人臣無公諱遂止天德初轉翰林待制纍擢禮部尚書同修國史大定四年卒官胡礪武安人少嗜學天會間至燕韓昉見而異之使賦詩以見志礪操筆立成思致清婉昉因館置門下自是學業日進舉進士第一授右拾遺權翰林修撰皇統初改同知深州軍州事再補翰林修撰遷禮部郎中一時典禮多所裁定天德初纍遷翰林學士改刑部尚書扈從至汴卒韓玉相州人明昌五年經義辭賦兩科進士入翰林為應奉應制一日百篇文不加點泰和中建言開通州潞水漕渠船運至都授同知陜西東路轉運使事與夏人戰敗之當路者忌其功驛奏玉與夏寇有謀朝廷疑之授玉河平軍節度副使道出華州被囚死于郡學臨終書二詩壁間士論冤之子不疑以父死非命誓不祿仕元蔡珍安陽人素驍勇從憲宗攻宋合州釣魚山中統三年從征李壇後從鎮襄陽徇安慶攻五河所至有功南方平入備宿衛至元十四年扈駕駐黑城珍遣兵士儲芻藁築土室軍府賴其用升忠武校尉時白海初建行營命珍督役卒事民不知擾二十七年進後衛親軍千户元貞元年進階武略告老歸杜瑛其先信安人中書葉赫圭開府于相瑛赴其聘遂家焉與良田千畝辭不受歲巳未世祖南伐至相召見問計瑛從容對數事帝納之中統初詔徴瑛辭不就杜門著書優遊道藝以終其身天厯中贈資政大夫追封魏郡公諡文獻葉赫圭舊作粘合圭今改正胡祗遹武安人少孤既長讀書見知于名流至元元年授應奉翰林文字轉右司員外郎時阿合瑪當國進用羣下官冗事煩祗遹建言省官莫如省吏省吏英如省事以是忤權姦出為太原路治中以最聞十九年為濟寧路總管召拜翰林學士不赴改江南浙西提刑按察使未幾以疾歸二十九年朝廷徴耆德者十人祗遹為之首卒諡文靖阿合瑪舊作阿合馬今改正郭昂林州人習刀槊能挽強梢通經史尤工詩至元二年上書言事平章廉希憲材之厯官至廣東宣慰使卒許有壬湯隂人幼頴悟讀書一目五行延祐二年進士纍拜監察御史泰定初上章言圖璊德爾之子瑣南與聞大逆請正典刑繼上正始十事為左司員外郎京畿飢白丞相發糧四十萬斛濟之民賴以活者甚衆三年升左司郎中每遇公議屢爭事得失汛掃積滯幾無留牘至正六年召為參知政事極論帝當親祠太廟徽政院當罷冗職當沙汰錢糧當裁節人皆韙之纍官集賢殿大學士階至光祿大夫致仕卒有壬厯事七朝垂五十年遇國家大事無不盡言皆一根至理而曲盡人情當權臣恣睢之時事有不便明辨力諍不知有死生利害君子多之圖璊德爾舊作鐵木迭兒今改正明郭資武安人洪武進士纍官户部尚書治錢榖有能稱性強毅人不能干以私任禮臨漳人起行伍纍官都督同知從征樂安及烏梁海俱有功正統初進左都督以破阿台功封寧遠伯鎮甘肅沙州衛都督納穆噶兄弟乖異禮乘其飢窘督兵徑詣其地收其全部而還卒贈侯諡僖武烏梁海舊作兀良哈納穆噶舊作喃哥今並改正石璞臨漳人永樂中舉於鄉選授御史厯江西副使著聲績纍遷工部尚書景泰時討貴州苗賊有功攻兵部致仕歸室廬不完英宗復位謂大學士李賢曰石璞純臣聞其尚健為我降璽書召之比至遷南京左都御史罷歸卒崔克升內黃人幼以孝聞父年九十九而終克升巳老猶徒跣負土成壟廬居三年宣德中旌表史五常內黃人父萱官廣東僉事卒葬南海縣和光寺側五常方七歲母攜以歸比長常以不得返葬為恨母語之曰爾父櫬內置大錢十爾謹志之及母殁廬墓終喪即往迎父櫬寺廢櫬無可覔忽老人以杖指其處乃得父櫬內置錢如母言扶歸合葬復廬墓三年正統六年旌表郭本安陽人善醫早孤事母孝母喪廬墓白鶴來棲成化中旌表崔升安陽人成化進士厯兵部員外郎因星變上言閹豎放恣妖僧蠱惑宜亟誅竄又言兵部尚書王恕今之伊傅不宜置之南京皆不報後厯延安知府四川參政並以廉惠著稱張士隆安陽人宏治進士厯御史正德中乾清宫災上疏譏切時政巡按鳳陽劾奏中官史宣罪錦衣千户廖愷錢凝所昵也大為姦利士隆偕同官劾之凝大怒搆之下詔獄謫晉州判官世宗立召復其故官終陜西副使崔銑升子宏治進士選庶吉士授編修以不附劉瑾出為南京户部主事嘉靖初厯南京國子祭酒會大學士蔣冕尚書汪俊等以爭大禮去位而張璁桂萼輩用事銑極言忠邪不分忤旨罷後以薦起仕至南京禮部侍郎初銑家居作後渠書屋讀書講學其中學者稱後渠先生晚歸門人益進嘗曰道在五倫學在治心功在慎獨卒諡文敏馬卿林縣人宏治進士選庶吉士授給事中出為大名知府嘉靖初厯浙江布政使以裁抑中官吳勳謫鶴慶知府政績甚著卿性強直有才略善處艱劇厯官右副都御史總督漕運兼撫鳳陽卒于官王勳湯隂人由太學生為淶水知縣正德初以事忤劉瑾瑾欲加罪隂使人入縣署覘之婦子紡織惟衣帶挂壁乃釋之清名徹于內廷擢汾州知府尋去官躬耕食力不履城市者三十年王科涉縣人正德進士知藍田縣有善政嘉靖時擢給事中帝遣內官織造陜西科力言其擾民尋巡視京營劾奏郭勛姦利不報李福達獄起復劾勛遂下獄削籍隆慶初贈太常少卿郭朴安陽人嘉靖進士改庶吉士授編修纍官吏部尚書掌銓一秉至公愛惜人才進武英殿大學士在相位以大權歸朝廷以職守還百司挈綱敦要隆慶初政一時稱治會言者劾高拱朴與拱鄉里相得不自安亦求去家居三十年卒諡文簡吳定安陽人萬厯進士厯御史疏請停內操忤旨奪俸厯官大理卿會御史傅好禮以諫稅使被黜定抗疏救之亦除名後為雲南巡撫罷歸卒王蕣徴安陽人萬厯末舉于鄉授蒲州知州以孤介拂上官意致仕歸崇禎十七年為賊所執憤恨不食而死本朝乾隆四十一年賜諡節愍尚大倫安陽人崇禎進士厯官刑部郎中國學生白夢謙以救黃道周繫獄大倫議寬之忤尚書意遂罷歸流賊陷安陽抗節死四十一年本朝乾隆賜諡烈愍司五教內黃人篤學有志行崇禎時為內邱訓導邑被兵佐長吏拒守有功十六年賊據關中郡縣風靡五教激勵士民且戰且守賊悉兵來攻四日城陷厲聲罵賊被磔死本朝乾隆四十一年賜諡烈愍本朝司九韶內黃人任潞安府推官薑瓖反被執不屈嚙指血作書請援賊覺遇害李塤湯陰人順治進士任福建尤溪令耿逆之變嬰城固守力竭見擒不屈死王伯勉湯陰人順治進士由行人遷選曹郎性孝友居官亷介改御史轉京卿歸里卒祀鄉賢蘇宏祖湯陰人順治進士知山西和順縣會薑瓖叛陷遼州逼和順宏祖訓厲鄉勇擒賊將王歌許三禮安陽人順治辛丑進士任海寧令以嚴明稱行取御史厯督捕郎中李丹林縣人知羅定州鄰寇剽掠率鄉勇一