士使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人又潛遣貧人能縫者傭作賊衣以綵綖縫其裾為識有出市里者吏輒擒之賊由是駭散咸稱神明崔瑗安平人順帝時遷汲令數言便宜開稻田數百頃視事七年百姓歌之李雲甘陵人初舉孝廉遷白馬令桓帝封中常侍單超等五人並為列侯專權選舉又立掖廷民女亳氏為后后家封者四人賞賜巨萬雲憂國將危心不能忍乃露布上書移副三府逮死獄中王渙河內人桓帝時為考城令政尚嚴猛聞仇覽以德化人署為主簿謂覽曰枳棘非鸞鳳所棲百里豈大賢之路乃以一月奉資覽入大學覽由是知名桓鸞龍亢人桓帝時為汲令甚有名迹宗慈安衆人為修武令時太守出自權豪多取貨賂慈遂棄官去三國魏吳質濟陰人為朝歌令臨淄侯植與書訓以政事質對曰墨子回車而質四年雖無德與民式歌且舞巳久矣鄭袤開封人為黎陽令吏民悅服太守班下屬城時見甄異為諸縣之最晉王宏高平人泰始初為汲郡太守撫百姓如家耕桑樹藝屋宇阡陌莫不躬自教示曲盡事宜司隸校尉石鑒上其政術武帝下詔稱之賜穀千斛南北朝魏明亮平原人世宗時轉汲郡太守譽宣遠近民吏追思之高祐渤海人高祖時為西兖州刺史鎮滑臺祐以郡國雖有大學縣黨宜有黌序乃縣立講學黨立教學村立小學又令一家之內自立一碓五家之外共造一井以給行客不聽婦人寄舂取水又設禁賊之方令五家相保若盜發則連其坐風化大行寇盜止息北齊房超為黎陽太守趙道德以事屬之超不發書棓殺其使齊主善之令守宰各置棓以誅屬請之使孟業安國人皇建二年遷東郡太守以寬惠著名其年麥一莖五穗餘或二穗四穗共一莖者合郡咸以政化所感河清三年敕人間養驢催買甚切業令權出庫錢貸人取辦後為憲司所劾被攝之日郡人皆泣而隨之詣闕訴冤者非一人乃敕放還石曜安喜人武平中為黎陽郡守值斛律武都為兖州刺史性甚貪暴先過衛縣令丞以下斂縑數千匹遺之及至黎陽令左右諷動曜曜手持一縑謂武都曰此是老石機杼聊以奉贈武都知曜清素純儒笑而不責隋郎茂新市人高祖為丞相授衛州司録有能名尋除衛國令時有繫囚二百茂親自究審釋免者百餘人民張元預與從父弟思蘭不睦丞尉請加嚴法茂曰元預兄弟本相憎疾又坐得罪彌益其忿非化民之意也遣縣中耆舊更往敦諭元預等各生感悔詣縣請罪茂曉以義遂相親睦元亨魏常山王五世孫高祖受禪出為衛州刺史衛土俗薄亨以威嚴鎮之風化大洽後以老病乞骸骨吏人詣闕上表請留卧治上嗟歎者久之敬肅蒲坂人仁壽中為衛州司馬有異迹王仁恭上邽人大業中為汲郡太守有能名遷信都太守汲郡吏民叩馬號呼於道數日不得出境唐李元慶高祖子為滑州刺史以治績聞數蒙褒賜敬暉平陽人聖厯初為衛州刺史時河北為突厥所擾方秋而城暉曰金湯非粟不守豈有棄農畝事城隍哉縱民歸斂闔部賴安徐彥伯瑕邱人中宗時為衛州刺史政多善狀璽書嘉勞孔若思山陰人中宗時為衛州刺史故事以宗室為州别駕見刺史驁放不肯致恭若思劾奏别駕李道欽請訊狀有詔别駕見刺史致恭自若思始以清白擢銀青光祿大夫潘好禮宗城人開元初為邠王長史王為滑州刺史好禮兼府司馬知州事農月王出獵家奴羅列好禮遮道諫王不許乃卧馬下呼曰今農在田王何得非時暴禾稼以損下人要先踐殺司馬然後聽所為王慚而還五代晉陳思讓盧龍人天福中為衛州刺史連丁內外艱時武臣罕有執喪禮者思讓不俟詔去郡奔喪聞者嘉之周郭進博野人顯德初為衛州刺史衛趙邢洺間多亡命者伺間椎剽進備知其情狀因設計發擲之數月間翦滅無餘宋周渭恭城人建隆初為白馬主簿縣大吏犯法渭即斬之帝奇其才擢右贊善大夫張岐崇安人太宗時調延津尉治行第一陳堯佐閬中人天禧中河決起知滑州造木龍以殺水怒又築長隄人呼為陳公隄許逖歙州人真宗時試汲尉二年汲人德之羣詣京師請逖為令遷校書郎知縣事寇瑊臨汝人仁宗時知滑州總領修河既以歲飢罷役瑊言楗芻已集若積之經年則朽腐為棄物後復興工斂之是重困也乃再詔塞河高繼勳蒙城人仁宗時知滑州河暴溢繼勳躬自督役露坐河上暮夜不輟水乃殺怒滑人德之李若谷豐人仁宗時知滑州河嚙韓村隄夜督兵為大掃至旦隄完梅摯新繁人知滑州州嵗備河調丁壯伐灘葦摯奏用州兵代之河大漲將決督工完隄防水不為患陳希亮青神人仁宗時知滑州河溢魚池掃且決希亮悉召河上使者發禁民捍之廬於所當決吏民涕泣更諫希亮堅卧不動水亦去人比之王尊燕度益都人仁宗時知滑州滑與黎陽對境河掃下臨魏郡霖潦暴至薪芻不屬度曰魏實為河朔根本不可坐視成敗悉以所儲茭楗禦之掃賴以不潰傅堯俞濟源人神宗時監黎陽縣倉草場守遣他吏代主出納堯俞不可曰居其官安得曠其職雖寒暑必日至庾中治事凡十年魯有開譙人神宗時知衛州水災人乏食貸常平錢穀與之奏蠲其息陳瓘沙縣人哲宗時知衛州專以仁慈及民庭無滯訟兩𬒳內除皆辭不就石公弼新昌人徽宗時調衛州司法參軍淇水監牧馬逸食人稻為田主所傷時牧法至密郡守韓宗哲欲坐以重辟公弼謂但當懲圉者民不可罪宗哲委以屬吏既而使者來慮囚如公弼議金王政熊嶽人金兵伐宋滑州降留政為安撫使政從數騎入州是時民多以飢為盜坐繫政皆釋之發倉廩以賑貧乏於是州民皆悅不復叛旁郡聞之亦多降者富察鼎壽哈蘇河人大定初為濬州防禦使有惠政百姓刻石紀之富察鼎夀舊作蒲察鼎夀哈蘇河舊作曷速河今並改正孟奎遼陽人大定中遷汲令察廉改定興令劉瑋咸平人大定中河決於衛自衛抵清滄皆𬒳其害詔瑋兼工部尚書往塞之或謂當徙民以避其衝瑋不然齋戒禱於河功役齊舉河復故道張簴為新鄉令大定時以河水入城閉塞救護有功與縣丞唐古堂固齊主簿溫屯威赫俱遷賞有差唐古堂固齊舊作唐括唐古出溫屯威赫舊作溫敦偎噶今並改正胥鼎繁畤人正大二年行尚書省於衛州力疾赴鎮來歸者益衆屢上章乞老且舉朝賢練軍政者自代詔不允張洵以廷尉出守白馬屢鞫大獄辨活者衆以兵變城陷赴井死元董文用藁城人中統十三年為衛輝路總管諸郡運江淮粟於京師衛當運十五萬石文用曰民藉可役者無幾且江淮風水舟不能以時至而先為期會是未運而民巳因矣乃集旁郡通議立驛置法民力以紓陳祐晉寧人至元三年授衛輝路總管衛當四方之衝號為難治祐申明法律創學宫修比干墓且請立祀典及去官民為立碑頌德王昌齡滄州人世祖時守衛輝路泉水自鄘城而來東流會於淇每秋潦輒溢入金隄昌齡乃築隄黑蕩陂以禦之患遂息又以清水出輝縣山陽鎮流入衛河乃度原隰濬畎澮溉田數百餘頃在任八年惠化大行鞏顯祖河陰人遷延津尹值嵗飢勸民貧富相通流移四方者招之復所素克察哩西夏人纍功授濬州達魯噶齊時軍旅數興中外徴需繁重户漸凋耗察哩撫綏教養曲盡機宜卒葬濬之黎陽山素克察哩舊作速哥察理達魯噶齊舊作達魯花赤今並改正尚文深澤人至元中出守輝州時河朔大旱輝獨以禱得雨境內大稔懷孟民馬氏宋氏誣服殺人積歲獄不能決提刑使者命文讞以論報文推迹究情得獄吏羅織狀兩獄乃釋李稷勝州人泰定中授淇州判官淇當衝要稷至能理其劇歲大飢告於朝以賑之民獲蘇劉秉直武清人至正八年為衛輝路總管賊有劫縣民鈔而殺之者捕不獲秉直具詞禱於神得賊姓名及所在命尉襲之果得賊於汴遂正其罪許義夫碭山人為封邱縣尹至正四年大飢盜賊羣起抄掠義夫聞賊至近境乃單馬出郊外十里迎之見賊數百人義夫力言縣小民貧皆巳驚惶逃竄幸無入吾境也言詞願款賊皆他往封邱之民得免於難王士元恩州人為濬縣尹至正十七年賊逼濬民悉潰散士元坐堂上顧其子致微使避賊曰吾守臣居此職也若則可逃子涕泣抱士元不去俱為所害明李驥郯城人洪武中知新鄉縣招流亡給農具復業者數千人孫鎮合肥人建文時知衛輝府興學課士教民樹畜禱雨驅蝗政績甚著燕師至堅守不下成祖即位謫戌山海王士廉永樂中知濬縣邑大蝗士廉齋戒率僚屬禱八蠟祠以失政自責越三日有烏數萬食煌盡邢表文安人天順中知獲嘉縣境多盜賊表專尚德教均徭賦復流民千七百家建社學訓子弟盜寇衰息楊動三原人成化中知濬縣勵志清苦二子皆不令入官來省侍輒遣還敝𫀆布履蕭然自得去之日民有致贐者語之曰某在濬數載曾受人一錢否張謙肥城人成化時知衛輝府創建百衆書院修學校課農桑平賦役政多可紀王憲東平州人宏治中知滑縣嚴毅自持以扶善鋤強緩賦均役為政劉繹代州人正德中知衛輝府時薊寇倡亂繹身親戎伍率民死守賊不能下遁去民賴以安高進錦衣衛人嘉靖中知滑縣吏事詳密裁革宿弊每歲俵馬舊無定制勢者屬免姦者攬應進編以為例歲有定名民便之楊麒上饒入嘉靖中知濬縣廉謹不擾時稱良吏宜溝店逆旅主人殺客而有其資置尸井中麒發治之因得劇賊數十人境內以安陸光祖平湖人嘉靖中知濬縣政務大體遇事有不便民者必力為建白出盧柟於獄人尤稱之張佳允銅梁人嘉靖中知滑縣賑恤有方世宗賜以金褒之時有盜偽為緹騎逮佳允因欲劫庫帑者佳允以計悉擒縛之人服其智孟重渭南人嘉靖中知滑縣清釐浮流銀數及欺隱田畝以廉敏稱劉煥睢州人萬厯時知濬縣濬介淇衛屢患水潦煥親疏瀹築隄防措置有條不擾而辦李呈祥隰州人崇禎時知延津縣建築甕城本朝祖可法奉天人順治元年為衛輝鎮總兵時流賊李自成寇濟源可法援懷慶因率將士拒守號令嚴明賊穴地潛攻可法命城內掘坎用火焚之賊架雲梯上復以火箭射燒賊死無算數遣壯士縋城斫營賊遂遁去紀國相開原衛人順治元年知輝縣雷流寇破殘之後國相修治城隍招撫流散通商賈設義學甚著能績劉元芳清苑人順治二年知延津縣省徭投恤驛坫以報最內擢陳起泰蓋州人順治四年知滑縣讞斷明決吏民不能欺嚴飭武備萑苻屏迹佟國璽撫順人順治七年知輝縣以崇學校勸農桑為務有貧民不能開墾者給以牛種勸令復業邑遭水患五閘衝決國璽親督修築使水歸故道稻田之利復興王克儉海州人順治中知新鄉縣威重有度撫黎庶如赤子轉餉建城著有勞績比歲歉捐賑公溥民免流亡黃河夫役舊為民纍克儉申請留修衛河立釋重困去後民立祠以祀李登瀛華亭人康熙中知新鄉縣政尚寬和不喜紛更政暇即與多士講業人文蔚起馮雲朝昌平州人康熙中知獲嘉縣值兵荒後地曠民稀驛站衝疲雲朝撫綏流移以墾荒田置馬匹以充傳遞興廢舉墜政績茂著嶽峯秀汶上人康熙中知封邱縣發姦摘伏捷若神明好延士大夫詢其利弊嘗躬行田野督課農桑邑濱大河一切供億轉輸悉心籌畫民不知擾吕文光山陽人乾隆中知滑縣邑故多盜文光懲擊無少縱修學宫及歐陽修畫舫書院士服其化民歌其惠周塤龍泉人乾隆中知淇縣創西東書院以課士每春秋輒載酒饌郊行勞氏之有勤力者民是以大勸強克捷韓城人任滑縣知縣嘉慶十八年教匪李文成與林清潛通逆謀克捷先期訪獲李文成等嚴訊得實刑夾監禁匪黨馮克善等糾集逸犯入城劫獄克捷全家𬒳害嗣李文成以刑傷不能遠逸迅就殲戮奉旨以克捷首破逆謀厥功甚大照知府例賜恤入祀京城昭忠祠賜諡忠烈世襲騎都尉又命於滑縣地方為克捷建立專祠其從難之強京課強克勳徐雲章李槐蔭諸自涵梁廷輝梁霈梁泰來張炎孫鼎章冠山及家丁祁升等三十五人俱從祀焉吕秉鈞新安人任滑縣教諭嘉慶十八年教匪滋事在署投井未死旋遇害全家及幕友唐會等十七人同時殉難事聞照知縣例議恤世襲雲騎尉劉斌咸寧人任滑縣老岸司巡檢嘉慶十八年教匪滋事稟縣拏獲逆首李文成旋值匪黨入城在署被戕全家同時殉難事聞照知縣例議恤世襲雲騎尉陳寶勳宛平人任滑縣典史嘉慶十八年教匪滋事在署被戕全家及幕友吕會亭等同時殉難事聞議恤又徐沆長興人河南候補從九品因解兵米赴營至濬縣小河口遇賊被戕賞恤如例戚名彰陜州人任滑縣把總嘉慶十八年教匪滋事擊賊陳亡子戚蕙雙喜女存子妾郭氏楊氏並婢二人同時殉難賞恤如例前總纂官臣張琴恭纂輯提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校
