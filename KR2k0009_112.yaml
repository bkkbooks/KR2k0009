書反長盡通經史慨然以斯道自任教授鄉里以躬行實踐爲本章溢胡深皆從之㳺有訥齋集行世葉子奇字世傑龍泉人從王毅遊聞理一分殊之㫖知聖賢之學以靜爲主以薦授巴陵簿所著有範通元理草木子明劉基字伯温青田人濠曽孫元進士爲江浙儒學提舉棄官隱青田山太祖下金華定括蒼徵基入見陳時務十八䇿建禮賢館處之基料事如神明佐太祖滅陳友諒執張士誠降方國珍北伐中原遂成帝業即位拜御史中丞兼太史令三年封誠意伯基剛毅慷慨每論天下安危義形于色羣臣或有獲過譴者多密爲解救時敷陳王道帝甞恭巳以聽呼爲老先生而不名曰吾子房也所作文章爲一代稱首所著有覆瓿集黎眉公集行世正德中加贈太師諡文成嘉靖中配享太廟子連字孟藻有文行卒江西叅政連子廌嗣爵世襲葉琛字景淵麗水人博學有才藻元末從舒穆嚕伊遜守處州爲畫䇿捕誅山寇授行省元帥太祖下處州以薦徴至金陵授營田司僉事尋遷洪都知府祝宗康泰叛琛𬒳執不屈大罵死之追封南陽郡侯祀功臣廟福王時追諡貞肅舒穆嚕伊遜譯見前章溢字三益龍泉人少從王毅遊有志聖賢之學天性孝友元末統鄉兵佐舒穆嚕伊遜屢平劇盜論功授浙東都元帥辭不受退隱匡山明兵克處州太祖以幣聘之與劉基宋濓葉琛偕至太祖勞曰联爲天下屈四先生授僉營田司事尋升浙東按察司僉事鎮撫處州討平餘寇又奏減處州加稅罷海船巨木洪武初拜御史中丞溢務存大體每諌議匡正太祖稱善後以䘮母悲戚過度感疾卒福王時追贈太保諡莊敏長子存道明初統鄉兵屢擊却陳友定兵以功授處州翼元帥副使總制胡深戰没命代領其衆為遊擊從李文忠定閩復從北伐以功授處州衞指揮使後從征陽和遇敵于斷頭山力戰死之胡深字仲淵龍泉人穎拔有智畧通經史百家兼曉術數元末兵亂集里中子弟自保處州鎮將舒穆嚕伊遜辟叅軍事討平羣盜進元帥明師取處州深降太祖召入見授左司員外郎遣還招集舊部曲尋命總制處州軍民事平山寇興文敎境内輯安張士誠將李伯昇大舉來侵頓兵城下不能拔引去又擊敗方明善攻下瑞安屢破陳友定兵因請規取八閩遂與朱亮祖進攻建寕破其二柵敵盡銳來圍深突圍與戰馬蹶被執遇害追封縉雲郡伯深久涖鄉郡馭衆寛厚未嘗妄戮一人為明初浙東保障云祝崑公榮子元末奉母避賊山中賊追及母急投崖下崑擲身赴救忽雷雨大作賊駭散一時避難者俱脱母墜深崖幾死崑幸掛樹捎不死卒負母而登洪武七年舉孝廉授知縣未幾乞養歸劉璟字仲璟基次子弱冠通諸經洪武二十三年命襲父爵璟言有兄子廌在乃授璟閣門使多所糾劾擢谷府長史温州賊葉丁香叛延安侯唐勝宗討之決策于璟破賊還稱璟才畧帝喜曰真伯温兒矣建文時靖難兵起璟獻十六䇿不聽成祖即位召璟稱疾不至逮入京猶稱殿下且云殿下百世後逃不得一簒字下獄自經死福王時贈大理少卿諡剛節本朝乾隆四十一年賜諡忠節張彦方龍泉人建文時由給事中乞便養改知樂平縣奉詔勤王率所部抵湖口遇靖難兵執至樂平𬒳害本朝乾隆四十一年賜諡烈愍葉希賢松陽人以進士爲御史建文中李景隆耿炳文禦燕相繼敗績希賢劾其喪師失律帝不聽燕王稱帝見殺或云去爲僧走蜀之重慶松柏灘匿跡以居所謂雪菴和尚也王景字景彰松陽人洪武𥘉爲懐遠敎諭以博學應詔命作朝享樂章並定藩王儀累官山西右叅政建文中召入翰林除禮部侍郎成祖即位擢學士帝問葬建文帝禮景對宜用天子禮從之卒于官李棠字宗楷縉雲人宣德進士授刑部主事爲尚書魏源所器金濂代源以剛嚴懾下棠與辨論譴訶不避濂亦器之厯郎中錄囚南畿多所平反景帝嗣位超遷本部右侍郎巡撫廣西討平諸寇整已率下令行政舉思明土官黄􅎫欲殺兄子鈞立其子灝棠執􅎫下獄􅎫窘乃遣上書請廢太子立帝子帝大喜立擢􅎫都督棠鬱鬱累疏謝病歸不擕嶺表一物以清節顯周南字文化縉雲人成化進士擢御史出按畿輔廣東彈劾不避權要厯江西右布政使擢右副都御史巡撫大同母䘮歸劉瑾擅政以大同倉粟浥爛下詔獄責輸畢釋爲民瑾誅起督南贑軍務汀州大帽山賊張時旺等聚衆攻剽延及江南廣東數年不靖南集諸道兵擊擒之斬獲五十人移師會總督陳金共平姚源諸賊境内遂安進右都御史總督兩廣軍務乞休贈太子少保應檟字子材遂昌人嘉靖進士授刑部主事拒絶私謁累遷山東布政使擢兵部右侍郎總督兩廣軍務諭降樊家屯馬江等劇賊討破七山諸寇卒于官贈兵部尚書葉德良字克復遂昌人為莆田縣丞嘉靖中倭寇莆田令簿尉棄城走德良獨堅守城陷死之贈太僕寺丞詹嘉言字心聲松陽人為象山縣訓導佐縣令平海寇轉蒼溪敎諭流賊猝至被執不屈死程必進字以序松陽人崇禎時以貢授贑州訓導城䧟與子矩俱死之本朝張翀字南𬈑麗水人康熙七年知羅源縣耿精忠縱其黨四出剝民翀笞數人逐出境精忠怒脅知府王之儀劾罷翀之儀持不可精忠益怒乃為檄趣翀赴會城而其黨於中途邀辱之翀得檄單騎往羅源百姓擁衛從翀行且塞路其黨望見不敢動卒于官民為立祠呉從謙景寕人由拔貢知武臨縣撫輯流移均徭役甚有恩惠升知武岡州呉詔功慶元人康熙乙卯耿精忠攻䧟慶元詔功練鄉兵守禦與同事呉毒男力戰死之又秦華麗水人嘉慶六年以外委從剿洋匪陣殁先後均廕卹如例陳鰲升宣平人母患癰皮肉潰爛而毒氣内攻醫不能治鰲升乃口吮出膿血毒盡皮肉漸生母疾得起後居母䘮廬墓旦夕哭雙目失明且染寒疾所親勸之歸舍鰲升曰吾不能斯須去此苟得殁于墓側以事吾母地下不悔也竟不歸疾劇而卒乾隆四十年以孝旌表列女三國吳柳朱松陽人朱育稱其一醮守節喪身不顧宋陳氏女縉雲人宣和中官軍所過俘掠女為所執植刃于旁曰從我則生否則死女不動聲色延頸受刃遂𬒳害元湯煇妻張氏龍泉人兵亂其家財先巳移入山砦夫與姑共守之舅以疾未行張歸任湯藥賊至命以輿載其舅而巳遇賊賊以刃脅之張掠髪整衣請受刃賊未忍殺張懼汚即奪其刃自刎死湯婍龍泉人有姿容賊殺其父母以刃脅之婍不勝悲咽乞早死因以頭觸刃賊怒斫殺之其妹亦不受辱死周婦毛氏松陽人至正間隨夫避亂麻鷖山中為賊所得脅之曰從我多與若金否則殺汝氏大詈賊怒刳其腸而去季銳妻何氏龍泉人至正中避兵于邑之䋲門巖賊至被執欲汚之氏乃與子榮兒女囘娘投巖而死周氏女名善才麗水人元末兵起隨母避兵甘泉寨寨破被掠堅不受辱遂遇害陳程妻葉氏麗水人元末處州城破葉度不免遂更衣母問何為葉曰生則取辱惟有死耳遂觸巖死葉抗妻王氏名妙泳遂昌人至正間山寇作亂將殺其夫汚之泳以二子囑姑即自刎而死郡縣以聞旌其節明呉質妻潘氏松陽人正統間宣平寇起避難横山賊攻破寨欲脅以行氏不從抱子投崖而死周氏女松陽人周廷輝女年十八有姿色正統間避兵横山宼至欲迫去不從即以刀按其頸女曰欲殺即殺決不汝汚遂𬒳害蔡儼妻包氏宣平人正統間賊陶得二作亂氏從舅姑避難東岩賊至氏𬒳執給賊曰我有金藏岩穴中當往取之賊以為然同至其所遂投崖死天順八年詔旌其門谷得與妻陳氏麗水人景泰𥘉山寇掠鄉村陳與隣婦同避岩穴為賊所執欲犯之陳憤罵不從脅以刃罵愈厲賊怒殺之賊去鄉人斂其骸葬于山嶺名為烈婦嶺鄭好密妻詹氏青田人好密忤大姓劉某𬒳誣逃去捕卒四人縲詹赴官走無人烟處詹自度不免至黄壇遇樵者謂卒曰屐折難行願假樵刀去之持屐戯四卒曰先得此者夕當侍寢投屐棘藂中四卒喧笑望屐競趨氏即引樵刀自刎趙氏女名璚縉雲人山寇犯境女侍父疾不忍離被執紿賊曰少入安慰吾父當從汝賊聽之即自縊死周氏女青田人父元岡浴簷下為虎所咥女年十八呼號攘臂擊虎至門外抱父足為虎所嚙父卒獲全葉華妻季氏龍泉人嘉靖間寇起季避石馬山𬒳執義不受汚投崖死有司建祠祀之本朝謝俊陛妻趙氏麗水人順治初方國安殘兵至括氏避于獅子山夫語曰兵至汝年少奈何氏曰有死而已兵果至夫𬒳刺仆地氏抱二歲兒觸崖而墮兒坐母腹上得不死鄉人以為神又同縣張科妻葉氏陳昌蔭妻奚氏王朝聖妻楊氏俱為兵所掠投水中死又松陽高攀桂妻徐氏年少寡居兵至即自縊又龍泉項國英妻陳氏自縊死呉光國妻陳氏自刎死祝元孝妻李氏觸牆死甯世忠妻張氏麗水人方兵掠城夫為兵所繫恐汚已遂以懐中幼女先投于井隨自溺越兩月夫歸撈其尸顔色不變梅友松妻葉氏青田人順治初為亂兵所執度不能免陽為好言紿兵行至天梯嶺嶺下坑深百丈亂石巉立氏呼天投下骨肉皆為虀粉又松陽徐日華妻葉氏避亂入山遇賊不從投崖而死李含章妻楊氏縉雲人順治戊子寇亂氏奉姑出避猝遇賊騎投水死又同縣朱泰來妻李氏為寇所執逼汚之大罵不從行數百步遇深潭即跳入水死又朱持獻妻沈氏為寇所執觸石而死駱佛喜妻周氏遂昌人順治丁亥氏為兵所掠挾坐馬上行五里至三墩橋有崖壁立氏竦身投崖血濺崖石而殞王廷奉妻李氏龍泉人順治四年夫為賊所殺其母逼令别嫁氏自刎死呉廷馨妻葉氏慶元人夫亡守節寇至欲犯之氏嚼血噴賊賊怒劈其顱臨死猶罵不絶口官表門曰節烈陳桂姑景寕人年甫及笄康熙十三年與姊同被寇擄至滴水河邊見岩崖峻險呼曰此吾與姊完節處也遂投崖入河死數日後浮尸水面衣裳井然不露寸膚郭世琯妻程氏青田人年方艾康熙乙卯閩寇䧟邑被掠賊出美衣誘之大罵不受又連殺數婦人以脅氏氏罵益厲賊怒亂斫之又同縣胡忠盛妻王氏寡居為賊所掠觸崖以死陶國俊妻杜氏縉雲人乙卯閩變氏避深山為兵所執痛哭大罵兵殺之其家所畜犬守尸旁七日不去及氏殮訖犬赴水死又朱以欽妻陳氏被掠即投水死周貞一妻呉氏慶元人乙卯耿逆陷城氏子三錫死之氏泣曰兒死矣吾不死必辱遂自經死葉仁智妻呉氏景寕人年二十夫亡其兄逼改嫁自經死翁烈婦遂昌人其夫華國治遊蕩破家逼婦再醮氏自刎死于雍正年間旌表呉擇姑雲和人受栁繼官聘未婚夫死氏聞訃哀慟決意守貞以紡績自給雍正五年旌表鄭兆昌妻陶氏宣平人夫亡守節養姑遭兵變備厯艱辛克完貞操同縣章元器妻盧氏及媳陶氏先後守志雙節一門人言無間並於雍正年間先後旌表錢桐妻王氏麗水人夫亡守節同縣林應會妻呉氏楊世藩妻梁氏汪一䕫妻徐氏許士冠妻戴氏金之瑜妻林氏周璿妻王氏朱定海妻俞氏又烈婦葉吕氏聶何氏俱於乾隆年間旌陳際乾妻耿氏奚光瑞妻項氏項起龍妻陳氏楊聚星妻周氏湯毓金妻趙氏葉葆幹妻梁氏周在洧妻顧氏生員何學濂妻方氏翁日照妻鮑氏生員王國治妻梁氏又烈婦高呉氏王正源妻章氏俱於嘉慶年間旌金葉懷妻楊氏青田人以拒姦自經乾隆年間旌表同縣留朝組妻呉氏生員潘鼎魁妻章氏生員留偉妻王氏又烈婦陳周氏俱於嘉慶年間旌盧載蘋妻謝氏縉雲人夫亡守節同縣虞際唐妻施氏丁遴妻陳氏施體和妻陶氏盧顯功妻趙氏陳士俊妻劉氏朱之環妻陳氏朱鏞妻李氏趙昂妻周氏應廷連妻虞氏徐序賓妻李氏王新宣妻樊氏李安堣妻田氏施方中妻朱氏陶承憲妻孫氏趙一豫妻朱氏朱天球妻趙氏鄭點妻曹氏陶溥妻馬氏盧干池妻吕氏又烈婦應楊氏俱於乾隆年間旌羊逢靄妻盧氏朱光炳妻劉氏吕明錦妻杜氏陶源妻朱氏朱