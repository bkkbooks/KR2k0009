額人丁一萬九千六百一十六今滋生男婦八萬一千七百五十二名口計一萬三千二百六十三户田賦田地等共九萬二千五百九十六畝六分有零額徴穀二萬四千八百六十四石六斗七升有零山川玉環山寰宇記一名木陋嶼又名地肺山周囘五百餘里上有流水潔白如玉因以為名郗司空先立别墅於此束晉居人數百家至今湖田現在通志舊名木嶼亦名木榴界温台之間分屬樂清太平二縣延袤七百餘里四面距海外際大洋實温台之門户全浙之藩籬也明洪武中因倭寇來犯徙民内地是山孤懸海外本朝雍正五年展復築城濬池建壇廟軍營招徠農氓設官駐防遂為海疆重地又太平志宋高宗南渡遺玉環於此故名中青山半在城内東青山半在城内西青山在城外峯巒秀聳水石清奇為玉環最勝處繡屏山在城東瑶嶴分水山在城西稍北三十里太平樂清分界處府志此與他地分水嶺不同所分者潮水之東西進退先後也靈山在城北三十里楚門港中與玉環山相接下有靈山溪金鈿山在城外十六都有筆架峯西南有小山巖石突起如硯虎义山山有鐵樹二株每踰四五年一發鳳凰山在雙廟仙人山即老城頭舊有寨城周圍五里今址猶存錦屏山山頂有巖方正又名方巾山龍尾山嶴内有巖方八尺周圍三丈餘號印巖三盤山在東南隔海中其地産樹名海瑚與珊瑚樹相似可辟火鷄冠山一名張嶼山在天開河口之外石塘山在東北海中西與玉環鄉相望東北與松門所相望大烏山在海中與西岸蒲岐相望山有平水大王廟苔山在西北海中蜜鶯山下有張相公廟塘洋山下有雙廟飛鳳山上有石鳳冠舊傳方國珍祖墓在此為誠意伯劉基鑿破福生山舊有福山寺寺前有古塔三座今址存南山南宋時有縣令葬此名縣主墳牛頭山扺海十餘里前有大密溪又有高椅山前臨小密溪琛浦山舊有石臺二尖巖山扺海五里前有溪名小溪舊有平水大王廟今址存木崗山山上有濟嫠堂堂之上有龍潭能興雲雨小麥嶼西海岸小山與大麥嶼相望花巖嶼在白沙屏蝤蛑嶴在九都黃大嶴在南隔海百丈巖在蘆嶼塔鰻洞在玉環郷女兒洞在漩門海玉環懸居海中四面皆海其西北由楚門渡海港旁有盤渦湍急曰漩門舟行避之踰岸即太平界其西由烏洋進蒲岐所至樂清其西南由烏洋南過黄花關進磐石衛至温州府城惟東南出黃坎二門即外洋渺無涯涘也玉環河舊在樂清縣四都本朝雍正八年同知張坦熊開濬又有瑶嶴河金鷄河正嶴河能仁河江心河俱見玉環志天開河在玉環城外源自西青中青二水引流環城南而東與東青水會又東經桃花嶺下有三峽潭水自西南來會東過陡門又東入海舊道下流湮塞本朝雍正八年將築城七月中晉雨衝開一渠深濶直通後浦長一千三百二十丈載石之舟可抵城下衆稱為天開河龍潭在大里嶴東北叢山中有溪水瀉下其深莫測仰天窩由三峽潭西南山平勢阻澗水廻環繞出大普竺亦名仰天河大密溪在牛頭山前小密溪在高椅山前古蹟玉環故城在玉環北隔港岸上明㓋武二十年信國公湯和建今圮玉環志故城在仙人山今名古城頭明㓋武二十年徙居民於腹裏今城址尚存楚門所城明洪武二十年湯和築東嶴寨城舊有廣盈二倉今廢南北監玉環自宋以前有監官王十朋送凌知監赴任玉環詩悠然水石間官情聊自適註玉環有南監北監林幹宅宋崇寕時樂清林幹隱玉環之木榴山草衣木質邑令鮑輝尊事之陶宏景丹室周行己丹室記云梁天監中陶宏景自海道至永嘉得木榴嶼居之以作丹少霞洞在城外西青山張少霞煉丹處關隘瑶嶴鎮在瑶嶴山下南臨海元置巡司曰北監巡司明初徙蔡嶴尋徙白沙嶺嘉靖八年又徙鶚嶺四十一年復還瑶嶴並建壽安堡於此築城周二里有奇今巡司廢又有驛丞今亦廢津梁小石橋在西門外環山勝境楚門渡在治北三十里白磴渡係古渡頭西南抵海舊名不等渡西青渡亦渡海處隄堰海塘本山四面皆海城南八都有里嶴塘西南一都有古順塘普竺塘北十二都有後灣塘東北十三都有蘆嶴塘塘洋塘在城南四都有陡門又城西北有西青塘城南有陳嶴塘楚門南塘在楚門所有陡門外禦鹹湖内蓄溪澗之水以溉田本朝雍正六年同知張坦熊建乾隆二十一年修黃大嶴塘本朝乾隆二十年築南浦中浦北浦三壩俱在玉環山自遷徙後無􅄵本朝雍正六年展復後始建新􅄵祠廟䕶國惠民廟祀張相公先是雍正五年有神托夢廟祝告以將歸玉環玉環既復居民見神燈往來不定於是塑像祀之額曰䕶國惠民神燈遂熄元壇廟在東青山下天后宮在坎門一在西青山文昌祠在珠簾島下寺觀靈山寺在治東十四都又有石龜院靈峯院普濟院谷順院福生院福嚴院俱在玉環鄉石佛菴在玉環鄉又有南山菴白雲菴梵音堂在十八都船亭在環山勝境溪北土產黍稷鹽苔如髪隨潮浮來土黄以之合磚堅如渾成石楠四時不凋烏江栗青栗山機烏又名林子烏那飯可燒白炭子可食錦漆不凋多節虎豆葉如豆莢内有小豆入藥山桃花紫不實檜巖紅墨桅岀小陳嶴皮可毒魚生龍杠卷柏叢生石上以葉似柏卷故名花蕭六月開花粉紅色結黒子可染網網入水昜腐者染之經久礬萬年青水荆山黃荆入藥消食下氣山椒不花而實不可食土漆皮粘人手即發腫刀瘡見血搗皮敷之即止鵲翠碧毛可為飾潮頭鷄似鷄而扁嘴野猪一名毛猪箭猪毛堅利如箭可作錐鑽怒則射人馬蛟身圓而狹長無鱗味美􅤤身如膏髓骨柔無鱗鱸石首魚鱂鯊鰡烏賊寄踞箬魚形似箬䱋魚形圓似團扇章巨正名蜛蝫郭璞江賦蜛蝫森衰而垂翅魟胎生以肝煉油然燈亮而不傷目鮆味美多脂彈塗又名跳魚味美紅魚似金魚大者長二三尺江瑶柱石􅨒郭璞江賦石􅨒應節而揚葩滚塘似鮕而身入蝤蛑穴中任其蛉蚷滑軟無傷俟其退殻而食之故又名蝤蛑虎䖳即水母沙蒜似土𧖟無頭味亦美鰲似鯉而微赤人鬼眼殻硬如銕緑色肉如蛤蜊海馬形如馬出水即死從小蝦中撿出之可入藥䗯似蛤而長有毛纂修官臣李煌恭纂前纂修官臣蔡賡颺恭纂前總纂官臣黄爵滋恭覆輯校對官臣李孚忠恭校
