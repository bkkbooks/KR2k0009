body:
  text: 處州府在浙江省治南一千九十八里東西距四百九十里南北距四百十里東至温州府永嘉縣界二百七十里西至福建建寕府浦城縣界二百二十里南至温州府泰順縣界二百三十里北至金華府武義縣界一百八十里東南至温州府瑞安縣治二百八十里西南至建寕府政和縣治四百六十里東北至金華府永康縣治一百八十里西北至衢州府龍游縣治二百七十里自府治至京師四千五百八十里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋戰國屬越後屬楚秦為閩中郡漢初為東甌國地後屬會稽郡為囘浦縣地後漢為章安縣地三國呉兼屬臨海郡晉屬永嘉郡時郡治永寕即今温州宋齊以後因之隋平陳廢郡始改置處州治括蒼縣開皇十二年改曰括州大業初改為永嘉郡唐武德四年復曰括州兼置總管府貞觀元年府罷天寶初改縉雲郡屬江南東道乾元初復曰括州大厯十四年復曰處州避太子諱建中初屬浙江東道五代屬呉越國宋仍曰處州縉雲郡屬浙東路元至元十三年立處州路屬東浙行省明洪武初改處州府屬浙江布政使司本朝因之隸浙江省領縣十麗水縣附郭東西距八十里南北距一百六十里東至青田縣界二十五里西至松陽縣界五十五里南至景寕縣界一百十里北至縉雲縣界五十里東南至青田縣界六十里西南至雲和縣治一百十五里東北至縉雲縣界九十二里西北至宣平縣界四十里漢會稽郡囘浦縣地後漢為章安縣地三國呉以後為松陽縣地隋開皇九年析松陽縣之東鄉置括蒼縣為處州治十二年為括州治大業中為永嘉郡治唐初曰括蒼仍為括州治大厯十四年改曰麗水仍為處州治五代及宋因之元為處州路治明為處州府治本朝因之青田縣在府東南一百五十里東西距一百五十五里南北距二百里東至温州府永嘉縣界三十里西至麗水縣界一百二十五里南至温州府瑞安縣界一百里北至縉雲縣界一百里東南至瑞安縣治一百七十里西南至景寕縣治一百三十里東北至台州府仙居縣治三百四十里西北至縉雲縣治一百九十里漢囘浦縣地後漢章安縣地三國呉以後為松陽縣地隋為括蒼縣地唐景雲二年析置青田縣屬括州大厯中屬處州五代及宋因之元屬處州路明屬處州府本朝因之縉雲縣在府東北九十里東西距一百二十里南北距一百里東至台州府仙居縣界八十五里西至麗水縣界三十五里南至青田縣界六十里北至金華府永康縣界四十里東南至温州府永嘉縣界一百五十里西南至麗水縣治九十二里東北至金華府東陽縣治一百六十里西北至金華府武義縣界四十五里漢囘浦縣地後漢章安縣地三國呉松陽縣地隋為括蒼縣地唐為麗水永康二縣地萬歲登封元年析置縉雲縣屬括州大厯中屬處州五代及宋因之元屬處州路明屬處州府本朝因之松陽縣在府西一百二十里東西距一百六里南北距一百五里東至麗水縣界六十六里西至遂昌縣界四十里南至雲和縣界七十五里北至宣平縣界三十里東南至雲和縣治一百十五里西南至龍泉縣界一百十七里東北至宣平縣治九十里西北至遂昌縣治七十五里漢囘浦縣地後漢章安縣地建安四年析置松陽縣屬會稽郡三國呉太平二年改屬臨海郡晉太寕初分屬永嘉郡宋齊至隋因之唐武德四年於縣置松州八年州廢屬括州貞元中徙治屬處州五代梁開平二年呉越改爲長松縣石晉天福四年又改爲白龍縣宋咸平二年復曰松陽縣仍屬處州元屬處州路明屬處州府本朝因之遂昌縣在府西少北一百八十里東西距一百二十里南北距一百五十里東至松陽縣界二十里西至衢州府江山縣界一百里南至龍泉縣界九十里北至衢州府龍游縣界六十里東南至松陽縣治七十五里西南至龍泉縣治二百四十里東北至金華府湯溪縣治一百五十里西北至衢州府西安縣治一百七十里漢㑹稽郡太末縣地三國呉赤烏二年析置平昌縣屬東陽郡晉太康元年改爲遂昌宋齊因之隋廢後復置唐武德八年省入松陽景雲二年復置屬括州後屬處州五代及宋因之元屬處州路明屬處州府本朝因之龍泉縣在府西南二百四十里東西距一百七十里南北距一百五十里東至雲和縣界八十里西至福建建寕府浦城縣界九十里南至慶元縣界七十里北至遂昌縣界八十里東南至景寕縣治二百四十里西南至浦城縣治一百六十里東北至松陽縣治二百五十里西北至衢州府江山縣治二百二十里漢囘浦縣地後漢章安縣地三國呉以後為松陽縣地唐乾元二年析遂昌松陽之龍泉鄉置龍泉縣屬處州五代因之宋宣和三年改曰劍川紹興元年復故元屬處州路明屬處州府本朝因之慶元縣在府西南四百里東西距一百二十里南北距一百二十里東至福建福寕府夀寕縣界九十里西至建寕府松溪縣界三十里南至建寕府政和縣界六十里北至龍泉縣界六十里東南至夀寕縣治一百九十里西南至政和縣治九十里東北至景寕縣治二百里西北至龍泉縣治一百五十里漢囘浦縣地後漢章安縣地三國呉以後為松陽縣地隋為括蒼縣地唐為龍泉縣地宋慶元三年析龍泉之松源鄉置慶元縣以紀年為名仍屬䖍州元屬處州路明初省入龍泉洪武十四年復置屬處州府本朝因之雲和縣在府西南一百十里東西距八十里南北距七十里東至麗水縣界四十里西至龍泉縣界四十里南至景寕縣界二十里北至松陽縣界五十里東南至景寕縣治五十里西南至景寕縣界三十五里東北至宣平縣治一百七十里西北至遂昌縣治九十五里漢囘浦縣地後漢章安縣地三國呉以後為松陽縣地隋為括蒼縣地唐為麗水縣地明景泰三年析麗水之浮雲元和二鄉置雲和縣屬處州府