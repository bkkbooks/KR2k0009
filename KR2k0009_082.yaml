名重一時人心歸之朝廷倚以為重天下稱為韓范薛向萬泉人權陜西轉運副使制置解鹽鹽足支十年而歲調畦夫數千向奏損其數兼提舉買馬監牧沙苑養馬嵗得駒三百而費錢四千萬占田千頃向請斥閒田予民改租入以市之乃置場於原渭以羨鹽之值市馬於是馬一嵗至萬匹凡將漕八年所入鹽馬芻粟數累萬民不益賦其課為最傅求考城人為陜西轉運使自康定用兵移税輸邊民力大困求令輸本州而轉錢以供邊糴兵民兩便之曹頴叔譙人仁宗時為陜西都轉運使請罷鑄大鐡錢從之兩川和買絹給陜西兵而蜀人苦於煩斂頴叔為嵗出本路緡錢五十萬以易軍衣之餘者兩川之民始無擾焉蔣之奇宜興人為陜西轉運副使經賦入以給用度公私用足比其去庫緡八十餘萬邊粟皆支二年范純粹仲淹子元豐中為陜西轉運判官時五路出師伐西夏高遵裕怒劉昌祚後期欲按誅之昌祚憂患病卧其麾下皆憤純粹勸遵裕往問疾其難遂解神宗責諸將無功謀欲再舉純粹奏關陜事力單竭公私大困若復加騷動根本可憂神宗納之任諒汝陽人徽宗時為陜西轉運副使降人李訛哆知邊廩不繼陰闕地窖粟而叛遺西夏書約取定邊諒諜知亟輸粟定邊及諸城堡且募人發所窖粟得數十萬石訛哆入寇失藏粟乃解去後為都轉運使童貫更錢法必欲鐵錢與銅錢等物價率十減其九詔諒與童貫議諒言為六路害寢其䇿趙子淔燕王德昭五世孫徽宗時除陜西轉運副使初蔡京鑄夾錫錢民病壅滯子淔請鑄小鐡錢以權之既成奏令民以舊銅錢易新鐵錢旬日得百餘萬緡帝手札以新錢百萬緡付五路均糴細麥民苦限迫子淔奏寛其期民便之張浚綿竹人高宗時為川陜宣撫處置使訪問風俗罷斥奸贓以搜攬豪傑為先務在陜三年訓新集之兵當方張之敵以劉子羽為上賓任趙開為都轉運使擢吳玠為大將守鳳翔西北遺民歸附日衆呉玠永洛城人紹興元年為陜西諸路都統制金兵狃常勝及與玠戰輒北烏珠㑹諸道兵攻和尚原玠縱兵夜擊大破之金久窺蜀以玠駐兵扼其衝不得逞烏珠舊作兀术今改胡世將晉陵人紹興九年以世將宣撫川陜時關陜初復朝廷分軍移屯熙秦鄜延諸道明年夏金兵陷同州入長安諸路皆震蜀兵既分聲援幾絶檢出入以防姦細上謂宰相曰阿嘍罕所至稱治聗西功績尤著用之雖遲亦可得數年力也富珠哩阿嘍罕舊作孛术魯阿魯罕伯爾克山舊作琵离葛山伊勒希舊作阿里喜今並改完顏宗道上京人章宗時除陜西路統軍使以鎮靜得軍民心特遷三階兼知京兆府事時夏旱俾長安令取太白湫水步迎於郊外及城而雨是􅍲大稔民刋石紀之高霖平東人簽陜西路按察司事體訪官員能否仍赴闕待對時南征調發繁急有司皆坐罪霖言其枉悉出之元田雄北京人太宗時授鎮撫陜西總管京兆等路事時關中苦於兵革郡縣蕭然雄披荆棘立官府招徠四山堡砦之未降者獲其人皆慰遣之由是來附者日衆雄乃敎民力田京兆大治李德輝潞縣人憲宗割京兆隸世祖潛藩擇廷臣能理財賦者俾調軍食立從宜府以德輝為使時汪世顯宿兵利州扼四川襟喉以窺進取數萬之師仰哺德輝乃募民入粟綿竹散錢幣給鹽劵為直陸挽興元水漕嘉陵未期年而軍儲充羨至元七年皇子安西王鎮關中奏以德輝為輔遂改安西王相至則視瀕涇營牧故地可得數千頃起廬舍疏溝澮假牛種四具與貧民二千家屯田其中歲得粟麥芻槀萬計楊惟中宏州人憲宗時遷陜右四川宣撫使時諸軍帥横侈病民郭千户者尤甚殺人之夫而奪其妻惟中戮之以徇闗中肅然廉希憲囘鶻人世祖以京兆分地命希憲為宣撫使京兆控制隴蜀諸王貴藩分布左右民雜羌戎尤號難治希憲講求民病抑强扶弱暇日從名儒許衡姚樞諮訪治道首請用衡提舉京兆學校敎育人材為根本計國制為士者無隸奴籍京兆多豪强廢令不行希憲至悉令著籍為儒有民妻與卜者厭詛其夫殺之獄成僚佐皆言方大旱卜者宜減死希憲議當伏法已而大雨立應世祖即位併京兆四川為一道以希憲為宣撫使劉太平和囉海入京兆謀為變希憲遣萬户劉黑馬等掩捕二人及其黨悉置獄㑹有詔赦至希憲命絞太平等於獄尸於通衢方出迎詔人心遂安乃遣使自劾停赦行刑帝深善之曰經所謂行權此是也别賜金虎符使節制諸將囘鶻舊作畏吾和囉海舊作霍魯海今並改商挺濟陰人世祖時楊惟中宣撫關中挺為郎中兵火之餘八州十二縣户不滿萬挺佐惟中進賢良黜貪暴明尊卑出淹滯定規程主簿責印楮幣頒俸禄務農薄税通其有無民乃得息賽音諤德齊沙木斯鼎囘囘人至元元年置陜西五路西蜀四川行中書省出為平章政事莅官三年增户九千五百六十五軍一萬二千二百五十五鈔六千二百二十五定屯田糧九萬七千二十一石撙節和買鈔三百三十一定中書以聞詔賞銀五千兩仍命陜西五路四川行院大小官屬並聽節制賽音諤德齊沙木斯鼎舊作賽典赤贍思丁今改許扆曲沃人成宗初授陜西行中書省右丞時關中饑議發倉粟賑之同列以未請於朝不可扆曰民為邦本今飢餒如此若俟命下無及矣遂大發粟不數日命亦下明年旱禱於終南山而雨嵗以大熟民皆畫像祀之田滋開封人大德十年拜陜西行省參知政事時陜西不雨三年道過西獄因禱曰滋奉命來參省事而安西不雨者三年民飢而死滋將何歸願降甘澤以福黎庶到官果大雨滋即開倉以麥五千餘石給小民之無種者俾來嵗收成以償官民大悦滿濟勒噶台泰定四年拜陜西行臺治書侍御史關陜大饑賑貸有不及者盡出私財以周貧民所活甚衆滿濟勒噶台舊作馬扎兒台今改張養浩濟南人天厯二年關中大旱民相食特拜陜西行臺中丞聞命即散其家之所有與鄉里貧乏者登車就道遇飢者則賑之死者則葬之道經華山禱雨於嶽祠泣拜不能起天忽陰翳一雨二日及到官復禱於社壇大雨如注禾黍自生秦人大喜到官四月夜則禱於天晝則出賑飢民無少怠遂得疾不起關中人哀之如失父母奈曼岱穆呼哩五世孫天厯二年遷陜西行省平章政事關中大饑詔募民入粟予爵四方富民應命輸粟露積關下而貧民乏鈔以糴奈曼岱取官庫未燬昏鈔識以省印給民行用俟官給賑饑鈔如數易之先是民或就食他所多毁牆屋以往奈曼岱諭勿毁及明年還皆得安堵如初奈曼岱舊作乃蠻台穆呼哩舊作木華黎今並改贍思真定人後至元二年拜陜西行臺監察御史戚里有執政陜西行省者恣為非道贍思發其罪而按之輒棄職夜遁有詔勿逮問然猶杖其私人多爾濟巴勒穆呼哩七世孫至正時陜西危急出爲陜西行臺御史大夫兼程至奉元而賊已至鴻門吏請涓日署事不許曰賊勢若此尚何顧陰陽拘忌哉即就署省臺素以舉措爲嫌不相聚論事多爾濟巴勒曰多事如此惡得以常例論乃與行省平章托多約五日一會集尋有㫖命與托多同討賊即督諸軍復商州修築奉元城壘募民爲兵出庫所藏銀爲大錢射中的者賞之由是人皆爲精兵金商義兵號毛葫蘆軍甚精鋭列其功以聞賜勅襃奬之其軍遂盛金州由興元鳳翔達奉元道里迴遠乃開義谷創制七驛往來便之多爾濟巴勒舊作朶爾直班托多舊作朶朶今並改穆呼哩改見前王思誠嵫陽人至正中出爲陜西行臺治書侍御史十七年紅巾陷商州奪七盤進據藍田縣距奉元一舍思誠㑹豫王阿喇特納實里及省院官於安西王邸衆􅍅懼無言思誠曰陜西重地天下之輕重係焉察罕特穆爾河南名將賊素畏之宜遣使求援此上䇿也乃移書察罕特穆爾得書大喜遂提輕兵五千倍道來援思誠犒軍於鳳凰山還定守禦九事夜宿臺中未嘗解衣既而援兵破賊思誠請於朝宜命察罕特穆爾專守關陜詔從之阿喇特納實里舊作阿刺忒納失里察罕特穆爾舊作察罕帖木兒今並改察罕特穆爾系出北庭祖父家河南爲沈邱人僉河北行樞密院事至正十七年賊陷商州攻武關直趨長安三輔震恐察罕特穆爾領衆入潼關與賊遇輒勝殺獲以億萬計賊黨皆散潰走南山入興元朝廷嘉其功授陜西行省左丞未幾賊陷秦隴據鞏昌遂窺鳳翔察罕特穆爾即先分兵入守鳳翔城而遣諜者誘賊圍鳳翔賊栗來圍之數十重察罕特穆爾自將鐡騎晝夜馳赴分軍張左右翼掩擊之賊大潰伏屍百餘里餘黨皆遁關中悉定察罕特穆爾改見前明劉季箎餘姚人洪武時爲陜西左參政陜有逋賦積歲不能輸有司峻刑督之季箎至與其僚分行郡縣悉縱械繫者緩爲之期民感其德悉完所逋陜不產碙砂而歲有課額爲奏罷之洪渠水溢病民爲治堰蓄洩便爲永利魏源建昌人永樂中以御史巡按陜西西安大疫療活甚衆奏言諸府倉粟積一千五十餘萬石足支十年今民疫妨農請輸鈔兩税之半從之涼州土寇將為變亟請剿亂遂息鄺埜宜章人永樂中有言秦民羣聚謀不軌者擢埜陜西按察副使埜白其誣詔誅妄言者宣德初關中饑埜分地賑濟民賴全活在陜既久刑清政簡陜人德之陳鑑呉縣人宣德中以右副都御史鎮陜西厯正統景泰凡三鎮陜為政慈惠每還朝必遮道泣送再至則歡迎數百里不絶其得軍民心前後撫陜者莫能及鄧棨南城人宣德中為陜西按察使單車就道不攜家累風裁凛然年富懷遠人英宗初為陜西左參政奏罷中官織駞毼復官吏諸生衞卒禄廪諸邊將校占墾田或至三四十頃富奏定其賦又言臣所部歲收較歲用入少出多今鎮守諸臣競請益兵餉何由給請減冗卒汰駑馬杜侵耗帝可其奏三邊供億浩繁民疲遠輸而豪猾因縁為姦利富量遠近定徵科出入慎鈎考宿弊盡革民因大蘇馬恭唐縣人正統中以御史巡視陜西邊防尋協贊延綏軍務公廉不擾將吏畏服居數年擢右僉都御史景泰初擊賊有功進右副都御史耿九疇盧氏人景泰中以刑部侍郎巡撫陜西都指揮楊得青私役操卒九疇劾之邊將請增臨洮諸衞戍九疇言邊城士卒非乏苟將帥嚴紀律精訓練勤撫恤絶侵漁則人人自奮不然徒滋冗食乃不增戍既以侍郎與巡按御史不相統改副都御史有㫖市羊角為燈諫寢其事又因災異疏陳時政帝優詔襃答項忠嘉興人天順初為陜西按察使歲饑發廩不待報母憂歸部民詣闕乞留詔起復七年以大理卿召民乞留如前遂改右副都御史巡撫其地西安水泉鹵不可飲為開龍首渠三十里又疏鄭白二渠以漑涇陽三原醴泉高陵臨潼五縣田七萬頃洮岷羌叛忠言羌志刦掠盡誅則傷仁遽撫則不威乃發兵據險揚聲進討卒降其衆成化初滿俊及據石城命忠總督軍務與巡撫馬文升分軍七道圍之誘俊出戰伏兵擒之忠大小三百餘戰親當矢石不少避論功進右都御史馬文升鈞州人成化初以右副都御史巡撫陜西與總督項忠討平大盜滿四數條奏便宜選將練兵豐財設險為守邊計番族不順命者悉討滅之修茶政易番馬八千有奇以給士卒賑鞏昌臨洮飢民績效甚著王越濬縣人成化初寇入河套越以副都御史帥師赴之屢擊破賊論功進右都御史總督軍務七年滿達囉及波勒瑚沙佳斯蘭留妻子老弱於紅鹽池大舉深入越䇿寇盡鋭而西不備東偏乃率總兵官許安等各將兵出榆林兩晝夜行八百里直薄其營大破之焚其廬帳及滿達囉等飽掠歸相顧痛哭自是遠徙不敢復居河套西陲息肩者數年十年廷議設總制府於固原延綏寕夏甘肅三邊並聽節制即以越任之宏治十年復起原官總制三邊亦有破賊功滿達囉舊作滿都魯波勒瑚舊作孛羅忽沙佳斯蘭舊作癿加斯蘭今並改余子俊青神人成化初以副都御史巡撫延綏上言三邊推延慶地平易利馳突寇屢來犯宿留重兵所費鉅萬不若於沿邊築牆置立堡砦為久遠計詔從之遂興役東起清水營西抵花馬池延袤一千七百七十里咸鑿崖築牆掘塹其下連續不絶每二三里置敵臺崖砦為巡警之所凡築城堡十一邊墩十五小墩十八崖砦八百十九役軍四萬人不三月而成牆内之地悉分屯墾嵗得糧六萬石有奇初延綏鎮治綏德州屬縣米脂吳堡悉在其外寇每輕騎入掠至是徙鎮榆林增益衞兵拓城置戍攻守器畢具遂爲重鎮軍民得安耕牧明年移撫陜西於涇陽鑿山引水溉田千頃餘通南山道直抵漢中以便行旅學校公署圯者悉新之奏免岷河洮三衞之戍南方者萬有奇易置南北之更戍者六千有奇就戍本土岷州栗林羌爲寇子俊潛師直抵其所設伏大破之阮勤交阯人成化中以右副都御史巡撫陜西築墩臺十四所治垣塹三十餘里歲饑奏兔七府租四十餘萬石李興嵩縣人成化時以御史按陜西墨吏豪宗多所搏擊嘗因所部災異自劾且劾巡撫蕭禎不職大吏咸疾之戴珊浮梁人成化中爲陜西提學副使正身率敎敦實抑浮修古聖賢祠墓増秩祀興旌節孝爲風俗勸鄭時舒城人成化中巡撫陜西時嵗比不登民多死徙鳳翔平涼諸府又地震時不俟報發倉儲及庫帑督所屬分巡賑恤屢奏請得蠲逋租停雜派又以時言詔湖廣輸糧十萬石銀二十萬兩往賑民大蘇息黄紱平越人成化末以右副都御史巡撫延綏劾罷叅將郭鏞都指揮鄭印李鐸王琮等計捕奸豪張綱申軍令増置墩堡邊政一新出見士卒妻衣不蔽體亟豫給三月餉親為拊循㑹有詔毁庵寺紱因盡汰諸尼以給壯士無妻者及紱去多攜子女拜送於道熊繡道州人宏治七年以右副都御史巡撫延綏以榆林城隘増築千二百丈莅政數年練兵積粟邊政修舉張敷華安福人宏治中巡撫陜西製婚娶喪葬之式妖僧據終南山廷議用兵尚書馬文升曰張都御史能辦此敷華果以計縛僧歸陳夀新淦人宏治中以右僉都御史巡撫延綏霍什數盜邊前鎮巡官俱得罪去夀至蒐軍實廣間諜分布士馬為十道使互相應援軍勢始振明年諸部大入諸道襲擊斬獲甚多正德中復巡撫陜西中官廖堂奉詔製氊幄百六十間贏金數萬將遺權倖夀聞檄所司留備賑堂遣爪牙數十輩散布州縣恣漁獵壽命捕之皆逃歸堂畏夀威為斂戢霍什舊作火篩今改秦紘單縣人宏治中以户部尚書兼右副都御史總制三邊軍務時其檄因陳便宜八事而急令總兵官侯勛等分兵援河東賊遂不敢出張文明陽曲人正德中以御史巡按陜西中官廖堂貪恣文明捕治其爪牙二十四人車駕幸延綏又上章馳諫且言江彬逢惡導非亟宜行誅帝不省既而文明朝行在諸權倖譖之遂下詔獄劉天和麻城人正德中以御史出按陜西裁抑中官廖堂堂搆之下獄謫官嘉靖初以僉都御史督甘肅屯政改撫陜西請撤鎮守中官及罷為民患者三十餘事又數討平劇賊境内以安十五年復為兵部左侍郎總制三邊軍務改製兵車訓練諸邊將士吉農擁衆數入寇輒擊敗之累加尚書太子太保吉農舊作吉囊今改姚鏌慈谿人正德中以右副都御史巡撫延綏先是武宗以十萬衆駐其地公私交匱鏌撫循有方漸復其舊已上邊務六事皆議行鎮城外素禁樵採鏌悉恣城中民芻牧嘉靖初吉農寇涇陽遣將邀斬其二將乃遁及去民刻像祀之吉農改見前翟鵬撫寕衞人嘉靖初為陜西按察使性剛介以清操聞寇天敘榆次人嘉靖初以右副都御史巡撫陜西寇入固原擊敗之討平大盜王居等歲大祲奏請蠲租發鹽課賑貸撫陜數年政無不舉王憲東平人嘉靖初為三邊總制吉農數萬騎深入憲督諸將擊敗之加太子太保中官織花絨於陜為公私害憲請罷之又因九廟成請釋還議禮得罪者為時所稱吉農改見前唐龍蘭谿人嘉靖中以兵部尚書總制三邊軍務㑹陜西大饑命兼理賑濟齎帑金三十萬以行龍奏行救荒十四事簡卒伍飭戎器明賞罰常如敵至時吉農諳達頻入寇龍調度得宜前後敗賊於鎮遠關於乾浦於定安屢被獎賚吉農改見前諳達舊作俺答今改浦鋐文登人嘉靖中以御史巡按陜西連上四十餘疏皆軍民大計總督楊守禮稱其賢時御史楊爵以直諌繫詔獄鋐馳疏申救帝怒逮之秦民奔送舍車下者常萬人皆號哭曾銑江都人嘉靖中以兵部侍郎總督三邉軍務寇入延慶銑遣將搗其巢冦始遁時寇牧近塞居民不敢樵採銑率諸軍驅之遠徙念寇居河套久為中國患遂上疏請復河套條上方畧十八事輔臣夏言欲倚成功㑹嚴嵩與言有隙力攻之乃逮銑又爲仇鸞所誣竟論死王以旂江寕人嘉靖中以兵部尚書總督三邊軍務寇入永昌及鎮番山丹以旂督諸將連擊破之在鎮六年修延綏城堡四千五百餘所又築蘭州邊垣比卒軍民爲罷市楊守謙徐州人嘉靖中爲陜西副使改督學有聲擢右僉都御史巡撫山西俄移撫延綏大興營田户部因請推行九邊定軍士賞格發倉儲貸飢卒尋移撫保定去之日民泣送之賈應春真定人嘉靖中以兵部右侍郎總督三邊軍務諸部入寇屢擊敗之築邊垣萬一千八百餘丈以花馬池閒田二萬頃給軍屯墾邊人賴之王遴霸州人嘉靖末以右僉都御史巡撫延綏蒐軍實錄武勇以其間築外郭治邊牆繕小芹河及諸墩堡戎備甚修寇凡六入塞皆失利去王崇古蒲州人隆慶初以兵部右侍郎總督三邊軍務奏給四鎮旂牌撫臣得用軍法督戰又指畫地圖分授諸太將趙岢雷龍等在陜七年先後獲首功甚多張守中聞喜人隆慶初爲延綏定邊僉事甓神木城修繕垣塹身先士卒與同甘苦衆皆感奮萬厯初由叅政就擢僉都御史巡撫其地益振風紀將吏趨職惟謹御史按部入境亦齎糧自隨修清平常樂商山邊垣延袤六百七十餘里李戴延津人萬厯初爲陜西右參政進按察使張居正尚名法四方大吏承風刻覈戴獨行之以寛蕭廩萬安人萬厯初以右僉都御史巡撫陜西時方覈天下閒田大吏爭希張居正指增賦廩令如額而止境内囘囘常羣行拾麥穗間或草竊耀州以變告廩撫諭之戮數人變遂定令拾麥母帶兵器儕偶不得過十人石茂華益都人萬厯中以兵部尚書總制三邊時關中大饑而茂華先爲參政素著恩信軍民聞其至相率哭迎於路乃請蠲賦省徭發倉賑濟存活無算茂華内撫百姓外飭邊防竟以勞瘁卒於官孫維城邱縣人萬厯中以右僉都御史巡撫延綏河套罷貢市十餘年至是吉農布哈等乞款維城與寕夏巡撫黄嘉善並申約束又條善後六事款事復堅卒於官將吏入視囊僅數金賻而歸其喪吉農改見前布哈舊作卜花今改余懋衡婺源人萬厯中以御史巡按陜西税監梁永輦私物於􅤀輔役人馬甚衆懋衡奏於朝永大恨賄膳夫毒懋衡再中毒不死遂上疏極論永罪永又廣召亡命擐甲自衞咸寕知縣滿朝薦持之急與其惡黨相格鬬懋衡遂以反逆聞永爪牙盡亡不久亦撤還關中始靖練國事水城人崇禎初以右僉都御史巡撫陜西關中大饑盜起國事偕五鎮大帥曹文詔賀虎臣等設機衝突往來涇州固原平涼耀州之間前後數百戰降者甚衆關中稍靖而嵗比不登屢請恤於朝不應國事撫瘡痍輯流冗民甚愛戴後因陳奇瑜車箱之捷誤受賊降關中復亂國事被逮遣戍吳甡興化人崇禎初延綏大饑盜起甡奉命往賑徧厯州縣拊循安輯解散寇黨明年即命巡按陜西所至察吏安民覈功罪靖寇亂將吏以城守堅完為上考由是屬城競厲烽火漸稀張允登漢州人崇禎四年以右參政分守河西時延綏大饑盜起允登救荒恤災詰姦緝盜咸惠甚著賊犯甘泉允登適在城中與知縣郭永圖登城守禦城陷死之贈太常卿汪喬年遂安人崇禎中為陜西右參政提督學校舉卓異就遷按察使十四年擢右僉都御史巡撫陜西尋進兵部右侍郎代傅宗龍總督三邊軍務討李自成至襄城兵敗援絶爲賊所害孫傳庭代州振武衞人崇禎中擢僉都御史巡撫陜西日夜治兵斬賊渠高迎祥等羣盗悉平㑹河南賊羅汝才等擁衆窺潼關傳庭督兵連戰闅鄉靈寳間賊大敗忽得總理熊文燦檄謂母妬吾撫賊功傳庭乃返以忤楊嗣昌得罪下獄十五年起兵部右侍郎總督陜西十六年加尚書改稱督師賜上方劍大軍出關次郟縣斫賊坐纛幾獲李自成㑹乆雨糧乏賊掩至乃退走潼關陷陣死未幾西安破妻張氏率三妾二女俱赴水死金毓峒保定衞人崇禎中以御史出按陜西承兵荒後諭屬吏拯卹秦人賴之入棧七百里悉盜藪爲建堡立驛設官分戍行旅無虞帝屢趣總督孫傳庭引兵出關毓峒獨謂將驕卒悍未可輕戰抗疏爭之不聽師果敗馮師孔原武人崇禎中以右僉都御史巡撫陜西時總督孫傳庭大舉討賊師孔主調兵食傳庭出關敗績李自成長驅破潼關不數日抵西安師孔厲兵拒守城陷投井死黄絅光州人崇禎中兵備臨鞏李自成等亂關中絅調番兵合剿大破之於潼關原擢陜西按察使賊陷西安妻王氏赴井死絅被執乘間亦赴井死贈太常卿本朝孟喬芳漢軍鑲紅旗人順治初以兵部侍郎總督陜西三邊軍務賊賀珍所在殘破遂圍西安喬芳出擊悉平之李鷂子反同州喬芳㑹大兵合討右輔以安􅉰人米喇印陷河蘭臨洮進逼鞏昌部將遣軍校乞師甚急喬芳寂無調發徐曰無恐汝歸時賊當破矣其人還未至援兵已四集賊大敗斬獲無算餘黨皆降延安賊王永强與府谷賊高有才連兵叛喬芳兼程馳至延安大破之自是諸郡悉平石維崑清苑人順治初以御史巡按陜西察吏嚴明奥援者無所顧爲忌者所中左遷大理寺副尋復官再按陜西民聞其來皆歡迎卒於官石鳳臺陽城人順冶初擢關西分守道署巡撫事時土寇未靖鳳臺防禦甚力居民獲安于時躍漢軍正白旗人順治中爲陜西按察使聽斷如神訟者至即得結民稱之曰于不落店駐兵擾民時躍一繩以法馭吏尤嚴所屬無敢受賕者馬之先漢軍鑲藍旗人順治中以右副都御史巡撫陜西尋晉兵部尚書總制三邊之先練邊事開屯田訓士伍皆有法卒於官秦民為罷市金礪漢軍鑲紅旗人順治中以兵部侍郎總督陜西明達有遠識馭軍嚴明為下所服居三年引疾歸李國英漢軍正紅旗人順治中以兵部尚書總督川陜再統師入川平定叛寇大興屯田以牛種數萬給墾者軍儲以足駐節所在與士卒同甘苦俸楈所入盡供餉士之用陳爌孟津人順治中為陜西左布政使以大計陳五事其一言延安土瘠民貧異時田租四五畝當内地一畝自興屯道白士麟督墾荒地按畝加科遂五倍於前為民重困疏入得減在任三年以勞瘁卒於官張瑃陽城人順治中以右副都御史巡撫陜西時重兵駐漢中鳳翔民越棧輸餉物力俱困瑃請以漢中額賦代輸且行其法於他鎮奸民朱君應詐稱明裔潛結諸番又王鳳貴等挾奸術誘竹谿山寇為亂瑃遣將悉擒之白如梅漢軍鑲白旗人康熙初以兵部尚書總督陜西時陜西河南湖廣三路將士㑹勦鄖寇興安地接鄖陽轉輸大困如梅請秦中輓運以白土關為界奏罷臨鞏練餉除黄甫烟税皆允行賈漢復漢軍正藍旗人康熙初巡撫陜西當兵燹後綏輯凋殘政績甚著親巡棧路自煎茶坪至雞頭關剗剔危險盡成坦途秦中自明末亂後志乘久缺漢復延致文士纂成通志粲然可觀佛尼勒滿洲鑲紅旗人康熙初授西安將軍征勦呉三桂叛黨大小八十餘戰統兵七年紀律嚴明所至秋毫無犯人思其德哈占滿洲正藍旗人康熙初以工部侍郎總督川陜呉三桂反黔蜀雲擾哈占從容指畫三秦晏然賊將王屏藩據漢中大兵分三路進剿哈占與撫遠大將軍圖海出大泥峪次舊縣關以待濟師㑹奮威將軍王進寶已克武關哈占與圖海定計直趨興安至漢中與進寳軍㑹及大兵入蜀奉詔駐漢中督餉飛芻輓粟軍無匱之賊將吳國柱等犯瀘州哈占倍道赴援屢戰皆㨗雲南平班師還西安初哈占奏立火器營於西安選屯軍二千人練習其後摧鋒陷鋭所向有功遂因其制以專官領之在陜十二年入為兵部尚書圖海滿洲正黄旗人康熙初平涼提督王輔臣叛以圖海為撫遠大將軍督兵討平之賊將王屏藩據漢中陳君極引兵出寶雞圖海遣將與賊連戰大破之自是賊不敢越寳雞而東大兵進取興漢圖海從大泥峪進薄鎮安遣奇兵破賊梁河關轉戰而前與王進寶㑹漢中全秦悉定葉映榴上海人康熙初官陜西提學道訓士以敦行為先每按部虚公考校雖被斥者亦無怨言博濟滿洲鑲白旗人康熙中授西安將軍嚴以約下秋毫無擾尋總督川陜為政持大體官吏肅清兵民安堵席爾達滿洲鑲紅旗人康熙中以兵部尚書出署川陜總督時大吏多受州縣餽遺州縣則私斂之於民席爾達欲杜其弊特疏請於朝勒石永禁河西嵗歉單騎驗視賑濟全活甚衆覺羅華顯滿洲正紅旗人康熙中巡撫陜西尋總督川陜修築營堡選習士馬軍政一新秦民久困重斂華顯嚴飭有司禁革私徵性清約屏絶餽遺在任五年卒於官許孫荃合肥人康熙中由户部郎中出督陜西學政勤於課士行部所至遇古聖賢名蹟力為修復表章敬待名儒李容輩為刻其所著書行世殷泰滿洲鑲紅旗人康熙中由甘省提督總督川陜莅事不尚虚文令行禁止人莫敢犯大計兩省官吏苞苴屏絶黜陟悉當以公事入蜀道經鳳漢所至問民疾苦山中父老具雞酒相迎輒停車慰勞人甚悦之額倫特佛尼勒子授西安佐領從征噶爾丹得頭等功牌遷協領聖祖仁皇帝幸西安閲八旗官兵賜宴親持金爵賜之酒謂諸王大臣曰伊家三世與朕出力朕故親持爵賜之遷西安副都統康熙五十五年以湖廣總督署西安將軍事協同川陜總督辦理軍餉率滿漢官兵駐西寕明年聞準噶爾將擾西藏即往巴里坤防禦五十七年率兵至喀喇烏蘇與賊相持數月衆寡不敵力戰殁於陣黄廷桂漢軍鑲紅旗人乾隆十三年由甘肅巡撫署陜甘總督尋調兩江總督十六年復任陜甘總督二十年以大學士管陜甘總督事時西陲甫定大兵追捕阿睦爾撒納及征剿囘部大小和卓木陜甘當西路孔道軍需旁午廷桂調度有方馬駝芻粟先期儲偫軍行迅速而民不知榎由騎都尉晉封三等忠勤伯卒祀賢良祠四十二年入祀名宦祠史貽直溧陽人雍正十年署陜西巡撫十一年以户部尚書總理陜西巡撫事劾罷軟廢弛之提鎮條官制各事宜吏治營制均為之整肅尹繼善滿洲鑲黄旗人乾隆十三年以協辦大學士授陜甘總督時征金川大兵出陜西調度得宜十六年復由兩江總督調署陜甘總督尋授文華殿大學士卒祀賢良祠四十二年入祀名宦祠鐘音滿洲鑲藍旗人乾隆十七年任陜西巡撫疏言常平倉榖因賑缺額請於嵗豐買補以實倉儲二十三年復任疏言連年災歉請借給貧民牛具耔種俾得盡力耕作民藉以蘇陳宏謀臨桂人乾隆年間四任陜西巡撫疏陳救旱良法請修周文武成康及周公太公陵墓申飭官箴檄八條興除告示二十四條均關陜省敎養要務政敎翕然卒祀賢良祠四十二年入祀名宦祠吳達善滿洲正紅旗人乾隆二十年任陜甘總督厯以所屬被災奏請借帑修城築壩以工代賑全活者衆三十六年復任陜甘總督時土爾扈特全部歸順辦理諸務周詳妥十二協卒祀賢良祠四年入祀名宦祠王文雄玉屏人任陜西固原提督嘉慶三年賊匪高均德等分路處五年追賊黨高二竄擾文雄於西鄉之屢剿敗於盩厔等法寶山梁衆寡不敵被十餘創卒祀昭忠祠恩賜三等子爵前總纂官臣丁善慶恭纂輯提調官臣許應藻恭覆輯校對官臣顔以燠恭校大清一統志西安府陜西省治東西距三百五里南北距五百二十三里東至同州府華州界一百六十里西至乾州武功縣界一百四十五里南至商州鎮安縣界二百四十五里北至鄜州宜君縣界二百七十八里東南至商州界二百里西南至漢中府洋縣界四百里東北至同州府白水縣界二百七十里西北至乾州永夀縣界二百里自府治至京師二千六百五十里分野天文東井分野鶉首之次星躔分野書自井九度至十三度為西安府分野建置沿革禹貢雍州之域周武王都此為鎬京東遷後屬秦後亦為都邑史記秦本紀德公初居雍獻公徙治櫟陽孝公作咸陽徙都之始皇時置内史漢書百官表内史周官秦因之掌治京師地理志京兆尹左馮翊右扶風故秦内史漢元年項羽分置雍塞二國章邯為雍王王咸陽以西司馬欣為塞王王咸陽以東至河及翟國為三秦㝷皆併於漢二年改為渭南河上中地三郡渭南即京兆河上即左馮翊皆塞國地中地即右扶風雍國地五年定都於此九年寵郡復為内史景帝二年分為左右内史按史記及漢書百官表皆作景帝二年分地理志作武帝建元六年分顔師古注據史記以表為正武帝太初元年改右内史為京兆尹三輔決錄注京大也天子曰兆民左内史為左馮翊漢書百官表注張晏曰馮輔也翊佐也決錄注馮馮也翊明也主爵都尉為右扶風漢書百官表主爵中尉秦官景帝中六年更名都尉武帝太初元年更名右扶風治内史右地注張晏曰扶助也風化也謂之三輔復置司隸校尉後漢遷都於洛陽置雍州於此㝷罷州以司隸督察如故潘岳關中記三輔舊治長安城中長吏各在其縣治民光武東都之後扶風出治槐里馮翊出治高陵建安中復置雍州三國魏改京兆尹為太守仍屬司隸晉初仍置雍州治京兆郡時扶風移治池陽後廢馮翊移治臨晉今同州府界建興後厯為劉聰石勒苻健姚萇赫連勃勃所據後魏亦曰雍州京兆郡時郡移治霸城永熙三年遷都於此是為西魏後周明帝二年改雍州刺史為牧京兆郡守為尹隋開