body:
  text: 陜西省在京師西南二千六百五十里東西距九百三十五里南北距二千四百二十六里東至河南陜州闅鄉縣界三百五里西至甘肅秦州清水縣界六百三十里南至四川太平廳界一千三十里北至榆林邊牆一千三百九十六里東南至河南南陽府淅川縣界六百二十里西南至四川保寕府廣元縣界一千三百八十五里東北至山西保德州河西縣界一千八百六十里西北至甘肅慶陽府正寕縣界三百二十里分野天文井鬼分野鶉首之次漢書地理志秦地於天官東井輿鬼之分野也其界自宏農故關以西京兆扶風馮翊北地上郡西河皆屬焉自井十度至柳三度謂之鶉首之次秦之分也建置沿革禹貢黑水西河惟雍州孔安國傳西據黒水東距西河即龍門之河在冀州西故曰西河晉書地理志雍州以其四山之地故以雍名亦謂西北之位陽所不及陰氣雍閼也按今陜西之地惟漢中府興安府商州為古梁州域餘皆屬雍周為王畿東遷後屬秦其東境分屬晉戰國時秦都咸陽其東北境屬魏南境屬楚秦始皇并天下以京師為内史兼置上郡漢中等郡漢元年項羽以漢中為漢國分秦地為雍塞翟三國漢高帝都長安初置渭南河上中地郡九年復為内史景帝分置左右内史武帝改内史置京兆尹左馮翊右扶風是為三輔置司隷校尉督察之又以上郡朔方元朔二年置西河元朔四年置等郡屬并州漢中郡屬益州武都安定北地等郡地屬涼州後漢遷都洛陽仍置司隸督察三輔晉書地理志光武都洛陽關中復置雍州後罷屬司隸諸郡分屬并益涼州如故建安十八年罷司隸置雍州獻帝春秋時省司隸校尉及涼州以其郡國并爲雍州魏志建安二十年分漢中之安陽西城爲西城郡三國屬魏仍曰雍州改京兆尹爲太守馮翊扶風各除左右華陽國志魏黄初二年改西城爲魏興郡其漢中郡屬漢後屬魏分置梁州晉仍曰雍梁二州晉初於長安置雍州統京兆馮翊扶風安定北地始平新平七郡梁州治漢中所領郡皆在今四川界魏興郡後屬荆州建興元年復都長安尋皆陷沒建興二年李雄陷漢中四年劉曜陷長安太興二年曜自平陽徙都長安改號趙復置司隸校尉以幽州刺史鎮北地咸和四年石勒克長安復置雍州永和六年石氏敗苻健據關中都長安是為前秦復置司隸校尉以荆州刺史鎮豐陽苻堅時分司隸為雍州分京兆為咸陽郡移洛州鎮陜城滅燕之後移洛州居豐陽太元九年苻堅敗梁州復屬晉十一年姚萇據長安是為後秦分司隸領北五郡置雍州刺史義熙三年赫達勃勃據朔方是為夏都統萬十三年劉裕滅姚泰復置雍州十四年勃勃陷長安以雍州牧鎮之又以朔州牧鎮三城秦州刺史鎮杏城北秦州刺史鎮武功豫州牧鎮李閏後魏神䴥三年平關中仍為雍州後分置洛太延五年仍苻秦置荆州太和十七年改岐華夏三州皆太和十一年置北華太和十五年置東秦州後改等州正始初克梁州劉宋於梁州兼置南秦州齊梁因之正始初改梁州後又屬梁改北梁州尋改南梁州梁末又屬西魏後又分置東益東夏延昌二年置南岐東梁皆孝昌三年置及東秦北雍東雍諸州西魏徙都長安改易州名廢帝元年改南梁為東梁州三年改為金州又改東雍為華州北雍為宜州華州為同州北華為鄜州東秦為隴州東夏為延州南岐為鳳州廢帝二年改東益州為興州又改東梁州為直州増置綏丹洋三州後周明帝二年改雍州刺史為雍州牧保定三年増置銀州隋開皇二年建新都三年廢郡存州大業初改雍州為京兆尹又改諸州為馮翊本同州新平本豳州扶風本岐州上郡本鄜州隋初改為鄜城郡雕陰本綏州隋初改上州延安本延州朔方本夏州漢川本梁州西城本金州河池本鳳州順政本興州上洛本洛州後周改商州等郡唐仍隋都復改諸郡為州貞觀二年分置關内及山南道關内道治京兆府領鳳翔府華同商邠隴鄜坊丹延鹽夏綏銀宥麟勝等州唐末李茂貞又増置乾耀鼎翟等州山南道開元二十一年又分東西西道治興元府領金商洋鳳興等州新唐志金州分屬東道按唐宥州在今延安府靖邊縣北邊外勝州在今榆林府府谷縣東北邊外鄂爾多斯界唐末廢都五代因之乾耀邠歧隴鄜坊丹延九州初屬岐鳳州屬岐亦屬蜀金州初屬蜀後皆屬唐梁洋二州屬前後蜀宋初曰陜西路熙寕五年分為永興軍路兼屬秦鳳利州京西河東四路宋史地理志慶厯元年分陜西沿邊為秦鳳涇原環慶鄜原四路熙寕五年以熙河洮岷州通遠軍為一路又以熙河等五州軍為一路通舊鄜延等五路共三十四州軍後分永興保安軍等為永興軍路秦階隴鳳等為秦鳳路並置轉運使仍以永興鄜延環慶秦鳳涇原熙河分六路各置經略安撫司永興軍路領京兆延安府同華耀邠鄜商坊丹等州其後又増銀州醴州及綏德清平等軍其鳳翔府隴鳳二州屬秦鳳路興元府洋興二州屬利州路金州屬京西路麟府豐三州屬河東路按宋豐州在今榆林府府谷縣東北邊外鄂爾多斯界南渡後陜西地入於金分為京兆鳳翔鄜延等路京兆府路本宋永興軍路皇統二年改名治京兆府領商乾同耀華等州鳳翔路本宋秦鳳路大定二十七年改名自秦州移治鳳翔府領隴州鄜延路治延安府領綏德鄜坊等州又以邠州分屬慶原路其興元府金洋鳳沔等州則仍屬宋利州路元中統三年立陜西四川行省治京兆至元二十三年改為陜西等處行中書省領奉元延安興元等路及鳳翔府邠隴等州明初仍立陜西行省洪武九年改置陜西等處承宣布政使司有左右二使並治西安府共領八府一州又置陜西都指揮使司統諸衞所本朝初因之康熙二年移右布政使治甘肅左布政使仍治西安領西安延安鳳翔漢中四府興安一州六年改左布政司曰西安布政使司後改曰陜西布政使司雍正三年升西安府之商同華耀乾邠六州延安府之鄜綏德葭三州直隸陜西布政司九年又升榆林衞為府十三年升同州為府仍降華耀葭三州為屬州乾隆四十八年升興安州為府凡領府七直隸州五西安府延安府鳳翔府漢中府榆林府興安府同州府商州直隸州乾州直隸州邠州直隸州鄜州直隸州綏德直隸州形勢東瀕黄河南據漢水西連秦隴北屆朔漠其名山則有終南太華吳嶽隴坻龍門橋山嶓冢其大川則有大河漢水渭水涇水洛水其重險則有潼關武關散關山川雄厚土田衍沃古稱天府是為隩區舊志户口康熙五十二年原額人丁二百四十萬三千三百二十一乾隆三十七年停編丁今滋生民户共男婦一千一百九十七萬六千七十九名口田賦田地二十五萬八千三百三十八頃八十六畝二分有奇額徴地丁銀一百五十三萬四千二百六十二兩一錢七分糧三萬二千五百四十二石五斗三升二合屯田四萬二頃八十一畝七分錢有二奇分額徴糧一地十丁二銀萬六九萬千六三千百七五百十五二十石七七兩四升五合額徵更銀名一地萬八一千千三十十六七兩頃四八錢十三二分畝八八分釐糧有三奇萬八石千二一百斗四六升十六五合税課潼州商府道大潼慶關關西商安州延龍安駒鳳寨翔隴漢州中咸榆陽林縣五等府處同共額民徵屯商更筏地税税銀徵三銀萬六四千千四五百百二五十十三八兩兩有有奇奇無定額徵銀當一税千額六徵百銀四六十千五四兩百有六十奇五牲兩畜税牙額税徵額銀九兩千有三百奇逢二閏十加七徵兩銀有七奇兩磨鐵課課額額徵徵銀銀九一十百一五十處兩准運礬河課東額官徵鹽銀共二額兩徵四鹽錢課銀鳳九翔千等府九百州三八十四府兩州四屬錢並有綏奇歸河德州之東清道澗奏縣銷准漢運中延定邊安鄜官鹽州共三額徴又鹽花課馬銀大七池千等四處百額三徵十鹽六課兩銀四一錢歸本千五百省四奏十銷四兩有奇歸山西巡撫奏銷延榆綏道額徵茶引價銀一千一百七十兩漢中興安二府額徵茶課銀五百三十三兩有奇文職官總督舊轄山陜後改轄川陜雍正九年改轄陜甘駐西安府乾隆二十四年移駐甘肅省城巡撫駐西安府提督陜甘學政駐三原縣布政使舊有在右二布政康熙二年以右布政駐蘭州專管甘肅改左布政為陜西布政使經厯理問庫大使廣積按察使經厯司獄督糧兼分守西乾鄜道駐西安府倉大使永敬鹽法兼分巡鳳邠道舊為驛鹽道駐西安府乾隆四十四年改鹽法道五十九年改鳳邠道移駐鳳翔府嘉慶十二年改今名仍駐西安府分守潼商兵備道駐潼關分巡陜安兵備道舊為漢興道嘉慶五年改今名駐漢中府分巡延榆綏兵備道舊為綏延鄜道駐綏德州乾隆二十五年裁榆葭道歸併改今名駐榆林府其原轄之鄜州歸督糧道管轄西安府知府同知二員一理事一清軍俱駐府城府學敎授訓導經厯舊有知事乾隆四十七年裁司獄撫民同知二員一孝義廳乾隆四十七年設駐孝義川嘉慶七年移駐舊縣關一寕陜廳舊為西安府水利通判駐涇陽王橋鎮乾隆四十七年移駐五郎關嘉慶五年改為寕陜撫民同知史十五員舊有興平縣店張驛驛丞乾隆十八年裁延安府知府同知駐安邊堡乾隆四年設府學敎授訓導照磨知縣十員膚施安塞甘泉安定保安宜川延川延長定邊靖邊縣丞甘泉駐臨青鎮嘉慶二十一年設舊有定邊縣縣丞乾隆五十九年裁鹽大使改設嘉慶十一年裁十九年復設二十一年復裁縣學敎諭二員膚施安塞訓導八員甘泉安定保安宜川延川延長定邊靖邊巡檢靖邊屬寕條梁乾隆二十年設典史十員鳳翔府知府通判府學敎授訓導經厯舊有司獄乾隆三十八年裁知州隴州同駐長寕驛州學學正訓導吏目知縣七員鳳翔岐山寶雞扶風郿麟遊􅊈陽縣丞二員鳳翔寶雞舊有三員乾隆三十三年裁扶風縣一員縣學敎諭七員訓導六員鳳翔岐山寶雞扶風郿􅊈陽舊有七員嘉慶十七年裁麟逰縣訓導一員巡檢寶雞屬虢川舊有益門鎮巡檢乾隆三十三年裁典史七員漢中府知府舊有同知乾隆二十六年裁府學敎授訓導經厯照磨撫民同知二員一定遠廳嘉慶七年設一留壩廳舊設通判乾隆四十年改為同知廳屬司獄定逺嘉慶七年設巡檢三員定遠屬黎壩嘉慶七年設駐簡池壩十年移駐今所漁渡壩嘉慶七年設駐姚家壩十年移駐今所留壩屬南星嘉慶十三年設驛丞留壩廳武關驛兼司獄乾隆三十八年設舊設巡檢乾隆二十八年裁知州寕羌州同駐陽平關州學學正訓導吏目驛丞黄壩驛知縣八員南鄭襃城城固洋西鄉鳳沔畧陽縣丞二員洋駐華陽鎮乾隆二十六年裁嘉慶七年復設西鄉駐五里壩乾隆四十七年設駐大池壩嘉慶七年移駐今所縣學敎諭五員南鄭城固洋西鄉沔訓導八員巡檢三員南鄭屬青石關襃城屬黄官嶺西鄉屬大巴山按黄官嶺一員乾隆四十七年設舊有西鄉屬鹽場關一員嘉慶七年裁典史八員驛丞三員襃城屬馬道驛鳳縣屬草涼驛三岔驛舊有鳳縣松林武關驛二員乾隆三十年裁襃城縣青橋驛一員乾隆四十七年裁沔縣黄沙驛一員乾隆五十五年裁大安驛一員乾隆三十八年移駐青羊峽嘉慶十三年裁榆林府知府同知駐神木縣府學敎授照磨兼管廣育倉舊有司獄乾隆三十八年裁知州葭州學學正吏目知縣四員榆林懷遠神木府谷縣學敎諭二員神木府谷訓導三員榆林懷遠府谷巡檢府谷屬麻地溝乾隆二年設典史四員興安府知府舊為興安直隸州乾隆四十七年升府府學敎授舊為州學學正乾隆四十七年改設舊有訓導乾隆五十五年裁照磨舊為州吏目乾隆四十七年改設撫民通判漢隂廳乾隆五十五年設廳學訓導乾隆五十五年設巡