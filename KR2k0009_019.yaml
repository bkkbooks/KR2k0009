front:
  text: 大清一統志奉天府東西距八百七十里南北距九百九十里東至撫順城與興京接界八十里西至山海關直隸永平府臨榆縣界七百九十里南至海七百三十里北至開原縣邊界二百六十里東南至鴨綠江朝觧界五百四十里西南至山海關界七百九十里東北至吉林界二百一十里西北至義州邊界四百五十里自府治至京師一千四百七十里分野天文尾箕分野析木之次建置沿革禹貢青州之域虞舜時為營州周為幽州
  hash: sha256:f03abec247c543e08f8d1bf17e243fba3363d50abfca709738335a3403716a17
