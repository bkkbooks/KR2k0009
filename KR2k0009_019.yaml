府也又云遼龍州隸東京金太祖建都置㑹寕州遼史太祖置黄龍府尋廢開泰九年復置龍州則知金之㑹寕府即遼之黄龍府也通志又云黄龍府本渤海扶餘府遼祖平渤海道至此有黄龍見城上長亙一里光耀奪目因名黄龍府則知遼之黄龍府即渤海之扶餘府也考通志古蹟所載扶餘城本扶餘王城在今開原縣境尤可明驗或據全遼志咸平在開原東北隅遂謂明三萬衞乃金之咸平府咸平爲古銅山地自在開原縣南其說誤矣竒哩木舊作乞例迷今改正布希萬努改見前故遼海衞在開原縣城内故三萬衞治東北明洪武二十一年置初治牛家莊二十六年徙治於此舊東寕衞在遼陽州城内明洪武十三年置轄六千戸所廢都司在遼陽州城内明洪武四年置定遼都衞八年改遼東都指揮使司廢行太僕寺在遼陽州城内舊都司治西南明洪武十三年建廢苑馬寺在遼陽州城内舊都司治西明永樂五年建永寕監在復州北五十里明永樂五年設遼東苑馬寺七年建城置監於此周三里有奇門三全遼志明初遼東設監六曰昇平新昌遼河長平安市永寕苑二十四曰甘泉安山河隂古城夾河龍臺耀州駝山黄山沙河馬鞍石城平川新安廣安平山南豐高平長川名山復州龍潭清河深河後俱廢惟存永寕一監清河深河復州名山四苑遼宫殿全遼志遼宫在遼陽城都司治東北高三文三門壯以樓觀四隅有角樓相去各二里宫北有讓帝御容殿又漢城遼以宫城之南外城為漢城又按東丹王宫在遼陽城東北有大東丹國新建南京碑金宫殿在遼陽州城北金皇統四年立寢殿曰保寕宴殿曰嘉惠前後正門曰天華曰乾貞又建宗廟有孝寕宫七年建御容殿華表柱在遼陽州城内相傳丁令威化鶴所集明統志在於都司城内鼔樓東舊有石柱湮没有道觀久發為倉遼海亭在遼陽州城内金高士談詩殘雪樓臺山向背夕陽城郭水東西張解詩晴光摇碧海遠色帶滄洲今故址無考管公屯在海城縣西北五十五里相傳漢管㓜安依公孫度時寓居之所蝎臺在遼陽州城内明統志在故東京城之東北隅金大定中修城役夫毁臺取土及半得石函啟之中有塊石圓滑天成摇撼作聲破之二大蝎尾稍相鉤見風即死釣魚臺在遼陽州南三十里相傳為渤海遊觀之處僊人臺在遼陽州千山香巖寺相傳為僊人對奕之所登者俯瞰滄海如在几席之下煉丹臺在海城縣西二十里相傳仙人白仲理煉丹處遼置仙鄉縣因此花露臺有二一在開原縣南四十里一三十里相傳邑中有姻家以華麗相尚築一臺自矜建置之年無考按漢時遼東有華麗縣所謂花露臺疑即華麗縣遺址音誤而後人加附㑹耳景遷堂明統志在都司城内元權遼陽府事洪革所建革有志於學慕慈母三遷之教故名山東周正為記唐紀功石在遼陽州駐蹕山唐太宗破高麗圖破陣狀勒石紀功南北市遼史志云於都城分南北市中為看樓朝集南市夕集北市街西有金德寺大悲寺駙馬寺鐡藩竿皆在焉雪菴舍利塔元僧塔也在香巖寺如二臼相合注水四時不竭洗馬澗在海城縣南八里河相傳尉遲敬德洗馬於此又搠㦸泉詳見山川注下哈斯罕關在寕海縣境金時關也元至元中屯田其地旅順古井在寕海縣南近海井中有鐵索懸樹上不詳所始城堡撫西城即撫順城在承德縣東八十里與興京接界城周三里門三明洪武二十一年置千户所於此本朝康熙二十九年設章京駐防乾隆四十三年修四十八年有御製撫順城詩嘉慶十年二十三年有順城詩謹按實錄御製撫太祖高皇帝戊子年於撫順清河靉陽寛甸四關口互市以通商賈自此國富民殷云天命三年四月壬寅太祖高皇帝率歩騎兵二萬征明臨行以七大恨告天癸卯分兵兩路進令左四旗兵取東州瑪哈丹親與諸貝勒率右四旗兵及八旗精鋭取撫順是夜駐營微雨隂晴不定太祖高皇帝欲囘兵大貝勒曰天䧏此雨以懈明邊將之心使吾進兵出其不意耳太祖高皇帝善其言至亥時乃行是時雲開月霽大軍分隊星馳趨撫順邊隊伍延亙百里旌旗蔽空甲辰昧爽圍撫順城執一人遺書遊擊李永芳永芳得書冠帶立城南門上言納款事又令軍士備守具我兵見之樹雲梯不移時登其城永芳遂出城降固山額真阿敦引永芳下馬謁見太祖高皇帝於馬上以禮答之於見下撫順東州瑪哈丹三城及臺堡寨共五百餘乃收兵各營於所至之地太祖高皇帝駐蹕撫順城乙巳留兵四千毁撫順城率大軍還又有蒲河城在縣北四十里明置蒲河中左千戸所於此乃遼東十八城之一其始建之年無考城周三里有竒今廢東京城在遼陽州東北八里太子河東周六里十歩東西廣二百八十丈南北袤二百六十二丈五尺門八與盛京城同東向者左曰迎陽右曰韶陽南向者左曰龍源右曰大順西向者左曰大遼右曰顯德北向者左曰懷遠右曰安遠我太祖高皇帝天命七年建名曰東京十年遷都瀋陽於東京設城守章京康熙二十年城守移駐金州城内宫殿與城同時建今管理驛站官守䕶牛莊城在海城縣西四十里城周二里九十三歩門三本朝天命八年建乾隆四十三年修東至遼陽城守界九十里西至廣寕城守界九十里南至蓋平城守界六十里北至廣寕城守界七十里東南至岫巖城守界一百里西南至海一百里東北至遼陽城守界八十里西北至廣寕城守界七十里明置驛於此本朝初設章京駐防康熙二十一年設廵檢司乾隆十三年増設四品協領熊岳城在蓋平縣西南六十里城周三里有竒南北二門本朝乾隆四十三年修東至岫巖城守界一百二十里西至海二十里南至復州城守界六十里北至蓋平城守界三十里東南至寕海城守界一百餘里西南至海五十餘里東北至蓋平城守界四十餘里西北至海三十餘里遼金時熊岳縣故址本朝康熙二十六