body:
  text: 北境秦為遼東郡地漢時所置遼東樂浪元菟三郡多屬今府治之東南及朝鮮界内地東北屬挹婁北為夫餘南近海為沃沮魏初為平州後還合為幽州晉咸寕中改遼東為國隷平州唐封渤海其後僭置五京十五府六十二州建瀋定二州屬定理府即今府治遼太宗時置瀋州興遼軍後改名瀋州昭德軍與遼陽府及開辰盧鐵等州並屬東京道按遼史地理志東京道遼陽府及開州辰州盧州鐵州興州崇州海州耀州嬪州貴德州集州廣州銀州同州咸州歸州蘇州復州並在今府境内金仍為瀋州與遼陽府及澄蓋貴德等州並屬東京路按金史地理志東京路遼陽府及澄州貴德州蓋州復州並在今府境内元省州縣置瀋陽路元史地理志元初平遼東高麗國麟州神騎都領洪福源引衆來歸授高麗軍民萬戸徙降民散居遼陽瀋州初創城郭置司存僑治遼陽故城中統二年改為安撫高麗軍民總管府及高麗舉國内附四年又以質子淳為安撫高麗軍民總管分領二千餘戸理瀋州元貞二年併兩司為瀋州等路總管府仍治遼陽故城與遼陽路並隷遼陽等處行中書省明洪武中置瀋陽中衛與定遼中左右前後等十三衛俱屬遼東都指揮使司都司治遼陽所領定遼中左右前後東寕海州蓋州復州金州鐵嶺三萬遼海十三衛及安樂自在二州俱在今府境内本朝天命十年太祖高皇帝自遼陽遷都於此太宗文皇帝天聰八年升為盛京順治十四年設奉天府置府尹今領州二縣六廳三錦州府州縣皆隸焉承德縣附郭東西距一百二十里南北距一百六十里東至撫順城與興京接界八十里西至新民廳界六十里南至遼陽州界九十里北至鐵嶺縣界七十里東南至遼陽州界一百三十里西南至遼陽州界一百五十里東北至鐵嶺縣界八十里西北至鐵嶺縣界九十里秦以前肅慎氏地漢晉迄唐屬挹婁國睿宗時屬渤海大氏置瀋州轄於定理府遼置興遼軍後改昭德軍更置三河縣又改樂郊為瀋州治金因之元初於瀋州地置安撫高麗軍民總管尋改瀋陽路明洪武二十年置瀋陽中衛隸遼東都指揮使司本朝建都尊為盛京順治十四年設奉天府康熙三年設承德縣為首邑按唐書渤海傳以挹婁故地為定理府遼史云瀋州本挹婁國地渤海建瀋州二説正合通志古蹟載承徳有古奧婁河注云奧婁即挹婁今之承德實遼瀋州其為古挹婁無疑遼陽州在府南一百二十里東西距四百六十三里南北距一百二十里東至興京界三百三十里西至錦州府廣寕縣界一百三十三里南至海城縣界六十里北至承徳縣界六十里東南至岫巖廰所轄鳳凰城界一百八十里西南至海城縣界七十八里東北至興京界一百四十里西北至承德縣界七十七里秦置遼東郡漢置襄平縣為遼東郡治後漢因之魏置東夷校尉治襄平縣晉為遼東國治太興初為慕容廆所據後燕時地入高句驪後魏至隋俱屬高句驪為遼東城唐貞觀十九年征高麗克遼東城以其地為遼州上元三年移置安東都䕶府於此後徙廢遼神册四年建東平郡天顯三年升為南京十三年改曰東京置遼陽府復置遼陽縣為府治金因之元初置東京總管府至元二十四年立遼陽等處行中書省二十五年改東京為遼陽路以遼陽縣為路治明㓋武四年置定遼都衛八年改遼東都指揮使司領衞二十五州二都司所治為定遼左右前後四衛東寕衞自在州中左二千户所左右前後四千户所本朝順治十年設遼陽府領遼陽海城二縣十四年罷府為遼陽縣康熙三年改為遼陽州隷奉天府海城縣在府南二百七十里東西距一百四十里南北距一百二十里東至岫巖廰界六十里西至錦州府廣寕縣界八十里南至蓋平縣界六十里北至遼陽州界六十里東南至岫巖廳界八十里西南至蓋平縣界八十里東北至遼陽州界八十里西北至遼陽州廣寕縣兩界八十里周秦屬朝鮮漢屬元菟後改屬樂浪都尉東漢罷都尉以封沃沮魏屬平州晉及隋屬高句驪唐平高麗置蓋州入渤海為南京南海府統沃晴椒三州六縣遼置海州南海軍尋置臨溟縣為州治金改澄州元省州縣屬遼陽路明洪武九年於故海州臨溟地置海州衞隸遼東都指揮使司本朝順治十年改海城縣隸遼陽府十四年改隷奉天按遼志云海州本㓇沮國地後漢書云東沃沮在高句驪蓋馬大山之東通志云蓋平古蓋牟城漢書高句驪有蓋馬大山即漢之西蓋馬考今海城西南隅至蓋平八十里蓋平為古蓋馬海城為古沃沮則知海城果為蓋平東北境也且通志云海城縣有沙卑城高麗置故沃沮地也又云渤海南京曡石為城幅員九里渤海大氏所建在今海城縣界據唐書渤海傳以沃沮故地為南京南海府尤可驗也蓋平縣在府南三百八十餘里東西距一百四十里南北距一百四十五里東至岫巖廰界一百二十里西至海二十里南至復州界九十里北至海城縣界五十五里東南至岫巖廳界一百二十里西南至復州界九十里東北至海城縣界九十里西北至海城縣界六十里周屬朝觧秦時為燕人衛滿所據漢屬元菟魏屬平州晉及隋屬高句驪為蓋牟城唐太宗征高麗取其地置蓋州後入渤海仍置蓋州又改辰州遼以通辰韓改辰州為奉國軍金章宗時改為辰州遼海軍明昌六年改為蓋州奉國軍元初為蓋州路至元六年併為東京支郡後屬遼陽路明洪武九年改置蓋州衛隸遼東都指揮使司本朝康熙三年置蓋平縣隸奉天府按新唐書引賈耽言蓋牟城在安東都䕶府東北府即今遼陽州據此則今蓋平似非古蓋牟也考唐書太宗征高麗取蓋牟城置蓋州由是渤海改蓋州為辰州改唐之蓋州也遼升辰州為奉國軍升渤海之辰州也辰州既為今蓋平則蓋平必為古蓋牟矣若如賈耽所言遼陽乃漢遼東郡也據通志蓋平於漢屬元菟而古蹟所載王莽元菟亭正在蓋平境内則其不為唐之安東都䕶府也亦信而有徵矣寕海縣在府南七百二十里東西距一百八十三里南北距一百二十里東至岫巖廰界一百八十里西至海三里南至海二十里北至復州界一百里東南至海四十五里西南至海九十里東北至岫巖復州分界一百八十里西北至海六十里周秦朝鮮地漢屬元菟郡晉至隋屬高句驪唐平高麗初置金州後入渤海屬杉盧郡遼為蘇州安復軍興宗置領來蘇懷化二縣隸東京道金皇統三年降為化成縣屬復州貞祐四年升為金州興定二年升為防禦屬東京路元𥘉屬蓋州路後併入遼陽路明洪武四年置金州衛隸遼東都指揮使司本朝初隷海城康熙三年改隷蓋平二十年設城守章京雍正五年設金州廵檢屬復州通判十二年置寕海縣隷奉天府按通志今寕海有唐金州城明統志云唐所置也可知唐金州即今寕海縣無疑矣考唐安東府於漢屬遼東金州於漢屬元菟此又漢元菟地也開原縣在府東北二百里東西距二百七十里南北距六十里東至吉林界七十里西至新民廰界二百里南至鐵嶺縣界五十里北至昌圖廰邊界十里東南至鐡嶺縣界六十五里西南至鐵嶺縣界六十里東北至威遠堡門吉林界三十里西北至昌圖廳邊界六十里唐虞息慎氏地啇周及秦肅慎氏地漢屬夫餘界至隋因之唐置黑水州都督府後渤海取扶餘地為扶餘府又為上京龍泉府遼屬黄龍府金㑹寕府地元初設開元萬户府至元中改開元路明洪武閒改元為原二十三年置三萬衞永楽中於城内置安樂自在二州隸遼東都指揮使司本朝康熙三年設開原縣隸奉天府按故三萬衛在今開原城内明𥘉所置也明統志云古開元城在三萬衛西門外金末元擒其將布希萬努於此置萬户府由今開原以知明三萬衞由三萬衛以知古開元城可知改元為原非二地明矣後漢書挹婁在扶餘東今鐵嶺西北正界開原開原為古扶餘鐵嶺為古挹婁也布希萬努舊作蒲鮮萬奴今改正鐵嶺縣在府北一百三十里東西距三百三十里南北距八十里東至興京界一百五十里西至新民廳界一百八十里南至承德縣界六十里北至開原縣界二十里東南至撫順城守界七十里西南至承徳縣界八十里東北至開原縣界六十里西北至開原縣界七十里唐虞息慎氏地周秦肅慎氏地漢晉屬挹婁隋屬越喜唐渤海取越喜地置富州屬懷遠府遼改銀州富國軍領延津新興永平三縣隷東京道金改新興縣屬咸平府元省縣仍隸咸平明洪武中改鐵嶺衛初二十一年衛治在古鐵嶺城二十六年徙置於此實銀州故地仍名鐵嶺衛隷遼東都指揮使司本朝康熙三年改鐵嶺縣隸奉天府按遼志銀州本渤海富州新興縣本故越喜地今鐵嶺即遼之新興古越喜國也通志云渤海取越喜改富州遼改銀州富國軍富國軍實因渤海富州得名矣承徳鐵嶺在晉以前同屬挹婁及隋唐初今鐡嶺地又屬越喜耳考挹婁故城在今鐵嶺南六十里若明志徙鐡嶺衛置故嚚州地又銀之訛也復州在府南五百六十餘里東西距二百二十里南北距一百八十里東至岫巖廳界一百八十里西至海四十里南至寕海縣界九十里北至蓋平縣界九十里東南至寕海縣界一百四十里西南至海九十里東北至熊岳城守界二百五十里西北至海四十里周秦為朝鮮地漢屬元菟郡魏屬平州晉至隋屬高句驪遼興宗置復州懷德軍領永寕德勝二縣隸東京道金明昌四年廢軍領永康化成二縣元屬盖州後入遼陽路明洪武十四年置復州衛隸遼東都指揮使司本朝初裁衛改隸蓋平雍正五年設復州通判轄復金二州境十二年改置州隸奉天府按復州魏屬平州元屬蓋州其地尚在今蓋平南蓋平於漢屬元菟郡則知復州必元菟地也新民廳在府西一百二十里東西距二百一十里南北距三百二十里東至承徳縣界六十里西至錦州府廣寕縣界一百五十里南至海城縣界二百四十里北至邊界八十里東南至承德縣界一百六十里西南至錦州府廣寕縣界二百里東北至鐵嶺縣界九十里西北至錦州府廣寕縣界一百八十里本承徳廣寕二縣地址本朝嘉慶十八年撥地分防設撫民同知並巡檢司岫巖廳在府南四百二十里東西距一百五十里南北距三百里東至鳳凰城界六十里西至蓋平縣界九十里南至海界一百五十里北至牛莊城守界一百五十里東南至鳳凰城界二百三十里西南至熊岳城界三百五十里東北至東分水嶺鳳凰城遼陽州界一百八十里西北至蓋平縣界九十里周本朝鮮地至秦屬􅐮漢屬元菟晉屬平州隋屬高麗蓋牟地唐平高麗屬安東都謢後渤海大氏據之為東京龍原府地遼屬東京道金明昌初置秀巖縣屬東京元屬遼陽路明鳳凰城界內地本朝初屬蓋平縣康熙二十六年設城守尉駐防乾隆三十七年移熊岳理事通判駐此並設廵檢四十一年以岫巖通判兼轄鳳凰城昌圖廳在府東北三百里東西距九十五里南北距六十里東至吉林邊栅二十五里西至遼河七十里南至威遠堡門邊壕二十里北至白塔河四十里東南至吉林並開原縣二界邊壕二十五里東北至白塔水口三十里西南至開原縣界八十里西北至土城子三十里本科爾沁所轄突額勒克地本朝嘉慶十二年設理事通判並廵檢司形勢遼東根本之地依山負海其險足恃金史地實要衝東北一都㑹元史滄海朝宗白山拱峙渾河遼水遮帶西南黑水混同襟環東北風俗遼東地廣箕子教其民以禮義田蠶織作民不相盜無門户之閉婦人貞信漢書地理志性悍果善騎射元志性樸實氣剛健習禮樂尚詩書通志本朝乾隆四十三年御製盛京土風雜詠十二首一威呼二呼蘭三法喇四斐闌五賽斐六額林七施函八拉哈九霞綳十豁山十一羅丹十二周斐城池奉天府城即盛京城