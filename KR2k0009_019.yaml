三萬於東門外命左四旗奪橋先登西城是夜城中兵舉火列炬拒戰逹旦道員牛維曜等乘亂先遁翼旦明兵列楯大戰又敗右四旗兵亦登城八旗同集一處沿城追殺明經略袁應泰等死之總兵朱萬良等皆戰殁􅛶城結彩焚香以黄紙書萬歲牌備乘輿迎入日正午大張鼓吹導引入城百姓夾道俯伏皆呼萬歲乃駐蹕遼陽城遼陽既下河東大小七十餘城皆降太祖高皇帝集貝勒諸臣議曰天既眷我授以遼陽今將移居此城耶抑仍還我國耶貝勒諸臣俱以還國對太祖高皇帝曰國之所重在土地人民今還師則遼陽一城敵且復至據而固守周遭百姓必將逃匿山谷不復為我有矣舍已得之疆土而還後必復煩征討非計之得也且此地乃明及朝鮮蒙古接壤要害之區天既與我即宜居之貝勒諸臣皆曰善遂定議遷都丙寅移遼陽官民居北城關廂其南大城則太祖高皇帝與貝勒諸臣及將士居之康熙二十一年有御製廵幸遼陽駐蹕遼陽夜深封月用唐太宗遼城望月詩原韻詩乾隆八年有御製遼陽懷古詩又按遼陽本漢縣名屬遼東郡後漢安帝初改屬元菟郡晉廢其舊址久堙以漢志及水經注考之其地當在今州西北界承德遼陽之間梁水渾河交㑹之處今州乃遼金之遼陽也遼志云本渤海金德縣地漢浿水縣高麗改為句麗縣渤海為常樂縣浿水在漢樂浪郡今朝鮮界内金德常樂乃渤海中京顯德府縣名皆不在此又按新唐書渤海所建府州無遼陽之名而遼志謂之遼陽故城金志直云渤海遼陽故城疑唐中葉安東府廢後渤海置城於此謂之遼陽事或有之然考遼紀太祖二年幸遼東神册三年幸遼陽故城四年建東平郡天顯元年始攻拔渤海扶餘城進圍輝罕城降大諲譔置東丹國太宗三年遷東丹國民於東平郡是渤海未平之先遼陽之地早入契丹初名遼東復名遼陽或即遼時命名非由渤海也遼志不考地理遂謂東京即平壤城亦即輝罕州又即中京顯德府以相去各千餘里之地合而為一誤甚輝罕舊作忽汗今改正西安平故城在遼陽州城東漢置縣屬遼東郡後漢因之吳志孫權遣謝宏陸恂拜句麗王宫為單于恂等到安平口即安平縣海口也晉咸康七年石虎將王華帥舟師自海道襲燕安平破之亦即此後入高麗為泊汋城唐書地理志安東府南至鴨緑江北泊汋城七百里故安平縣也居就故城在遼陽州西南漢置縣屬遼東郡後漢省晉復置屬遼東國咸和九年慕容皝擊其弟仁於遼東克襄平居就及新昌皆降於皝襄平故城在遼陽川北漢置縣為遼東郡治高帝八年封紀通為侯國後漢為郡治晉為遼東國治永嘉後屬慕容氏亦謂之遼東城慕容廆使其子翰鎮遼東即是城也後入高句驪隋大業八年度遼水圍遼東城貞觀十九年親征高麗拔遼東城以其城為遼州儀鳳初移安東都護府於遼東故城後復移新城賈耽曰自營州東百八十里至燕郡城又經汝羅守捉渡遼水至安東都䕶府五百里府故漢襄平地方輿紀要在都司城北七十里通志相傳今遼陽城西北隅故定遼左右後三衛治即其地巖州故城在遼陽州東北本高麗白崖城唐太宗拔之以其地為巖州後廢遼復置巖州治白巖縣屬瀋州金省通志巖州城在遼陽州東北五十七里石城山上周四里一門沓氏故城在遼陽州界漢置縣屬遼東郢後漢因之晉省按呉志嘉禾初孫權欲征公孫淵陸瑁諫曰㳫渚去淵道里尚遠通志云沓渚在遼陽漢書遼東郡有沓氏也時公孫淵居襄平呉師􅲥海遼東登自沓渚考襄平實鐵嶺故地遼陽西北至承德承德西北至鐵嶺道里數百故云遠耳海州故城今海城縣治本沃沮國地高麗為沙卑城亦曰卑沙城或訛為卑奢城自登萊海道趨高麗之平壤必先出此隋大業十年來䕶兒出海道至卑奢城敗高麗將趨平壤高麗懼而請降唐貞觀十九年伐高麗張亮程名振帥舟師自東萊渡海襲沙卑城其城四面懸絶惟西門可上唐兵攻拔之耀兵鴨綠江上渤海號南京南海府曡石為城幅員九里都督沃晴椒三州遼置海州南海軍屬東京道又置臨溟縣為州治金天德三年改澄州元省州縣屬遼陽路明置海州衞於此按遼志州本沃沮國地高麗為沙卑城通志云海城有沙卑城高麗置故沃沮地也考後漢書東沃沮在高句驪蓋馬大山之東漢之蓋馬即唐蓋牟今蓋平縣也今海城西南至蓋平界八十里是海城正在蓋平東北矣自此説明則知在漢為沃沮在高麗為沙卑在渤海為南海府在遼為海州更無疑也新昌故城在海城縣東漢置縣屬遼東郡後漢因之永寕二年高句驪與鮮卑寇遼東太守蔡諷追擊之於新昌戰殁晉亦為新昌縣咸和九年慕容仁自平郭趨新昌都䕶王寓擊走之遂徙新昌入襄平時仁與慕容皝相攻也金史地理志臨溟縣有鎮曰新昌疑即漢時舊縣也析木故城在海城縣東南四十里遼置縣屬遼陽府尋隸銅州廣利軍屬東京道金皇統三年廢州以縣屬澄州元省今有土堡周二里有奇土人猶稱析木城即其遺址按遼志以析木本漢望平縣地而諸志從之今考水經注大遼水自塞外東流直遼東之望平縣西屈而西南流逕襄平縣故城西是漢之望平居襄平之北其地當在今遼陽以北近遼河之上流析木在海城東南相去轉遠遼志之言非是且遼志既以顯州之山東縣為漢望平縣而又以此為望平縣亦自相矛盾矣耀州故城在海城縣西南六十里遼置州領巖淵縣隸海州金廢今有耀州城周二里餘即其故址按遼志耀州本渤海椒州故縣五椒山貂嶺澌泉尖山巖淵皆廢東北至海州二百里巖淵縣東界新羅故平壤城在縣西南東北至海州一百二十里通志考海城唐初置蓋州入渤海為南京南海府統沃晴椒三州六縣遼時耀州即南海所統之椒州也又漢書高句驪蓋馬大山在平壤今海城西南實蓋平界也遼隊故城在海城縣西漢置縣屬遼東郡顔師古曰隊音遂後漢省公孫度復置魏景初元年幽州刺史母邱儉擊公孫淵屯遼東南界淵逆儉於遼隊㑹天雨十餘日遼水大漲儉戰不利引軍還明年司馬懿征淵淵遣將軍卑衍楊祚等屯遼隊圍塹二十餘里懿佯出其南而潛軍濟水出其北徑指襄平晉廢水經注大遼水東逕遼隊縣故城西遼史地理志仙鄉縣本漢遼隊縣渤海為永豐縣遼改名屬遼陽府金廢明統志遼隊廢縣在海州衛西六十里蓋州故城今蓋平縣治遼史地理志本高麗蓋牟城渤海改蓋州又改辰州以辰韓得名井邑駢列最為衝㑹遼徙其民於祖州初曰長平軍尋改辰州奉國軍屬東京道統建安一縣金史地理志明昌四年罷哈斯罕建辰州遼海軍六年以與陳同咅仍名蓋州元史地理志初為蓋州路至元六年并為東京支郡八年省建安縣入州屬遼陽路明初改置衛按遼志辰州本高麗蓋牟城唐太宗㑹李世勣攻破蓋牟城即此渤海改為蓋州又改辰州可知蓋平之為唐時蓋牟決然無疑若據朝鮮古志云辰韓反在朝鮮之東以為甚遠不知海城周秦時實屬朝鮮通志海城東南至蓋平界六十里則蓋平自在朝觧之東也哈斯罕改見前平郭故城在蓋平縣南漢置縣屬遼東郡後漢因之晉省縣而城存大興四年慕容廆以其子翰鎮遼東仁鎮平郭咸和八年仁據平郭以叛慕容皝咸康二年親襲仁於平郭自昌黎東踐冰而進凡三百餘里至厯林口捨輜重輕兵趨平郭遂克之七年皝又使其子恪鎮平郭後魏太延二年北燕主馮宏奔高麗高麗處之於平郭尋徙北豐後高麗改置建安城唐貞觀十九年征高麗張儉進渡遼水趨建安城又李世勣言建安在南安市在北安市先下然後向建安二城蓋相近也儀鳳初徙熊津都督府於建安故城賈耽曰自安東都䕶府西南至建安城三百里故平郭縣也熊岳故城在蓋平縣西南六十里遼史地理志東京盧州元德軍本渤海杉盧郡故縣五山陽杉盧漢陽白巖霜巖皆廢在京東一百三十里治熊岳縣西至海一十五里傍海有熊岳山金廢州以縣屬蓋州元至元六年併入建安縣八年又併建安縣入蓋州今為熊岳城歸州故城在蓋平縣西南九十里遼初置州後廢統和二十九年復置治歸勝縣屬東京道金廢州降縣為鎮隸復州今有土堡曰歸州城周一里有竒即其故址安市故城在蓋平縣東北漢置縣屬遼東郡後漢及晉初因之後入高句驪為安市城唐貞觀十九年征高麗攻安市不克引還咸亨三年高麗餘衆復叛遣將高侃擊之敗之於安市城渤海置鐵州遼史地理志鐡州建武軍本漢安市縣高麗為安市城渤海置州故縣四位城河端蒼山龍珍皆廢治湯池縣在東京西南六十里金廢州以縣屬蓋州元至元六年併入建安縣八年又併建安縣入蓋州明統志安市廢縣在蓋州衛東北七十里通志今有湯池堡在縣東北六十里即故湯池縣也按遼志鐵州本渤海置也在漢為安市未有城高麗乃置城唐薛仁貴征高麗白衣登城即此金時蓋州所統有湯池縣即遼鐵州高麗安市城漢故縣也考今湯池堡去安市廢縣僅十里耳良是化成故城今寕海縣治遼興宗置蘇州安復軍兼置來蘇縣為州治金廢州改置化成縣隸復州貞祐四年復升為金州元廢明置金州衞於此又有懷化廢縣在縣東遼置屬蘇州金省按遼志謂蘇州本高麗南蘇地漢志高句驪縣有南蘇水城名因此開元故城今開原縣治元初設開元府後改開元路明洪武中改元為原以其地為三萬衛謹按實錄天命四年夏六月河漲太祖高皇帝統師四萬征明行三日大雨諭貝勒諸臣曰將囘兵耶抑進兵耶道濘渡口水溢軍行非便若留一二日待水涸土燥恐逃者洩語俾明知我取開原也宜進兵瀋陽以疑之遂發兵百人向瀋陽殺三十餘人擒二十人而還使人偵視開原無雨道不濘河水可濟太祖高皇帝乃率大軍進薄開原城明總兵馬林等嬰城守城上少列兵餘皆陳四門外我軍設楯梯進攻而以偏師掩擊東門外所陳兵敗之明兵爭入城填擁於門我兵奪門搏戰而攻城之兵雲梯未布即踰城入城上兵四面皆潰城外三門兵見城破驚竄我兵據門堵禦濠不得渡盡殲之權道事推官鄭之範先遁得脱馬林等皆陣殁太祖高皇帝登開原城坐南樓偵者以鐵嶺䘙有兵三千來援馳告諸貝勒率兵迎戰明兵望見即奔我兵二十人追及之斬四十人太祖高皇帝駐營開原三日籍所俘獲舉之不盡論功行賞乃班師秋七月太祖高皇帝師圍鐵嶺城城外各堡兵奔入城其不得入者悉奔竄我軍樹梯楯攻城之北明遊擊喻成名等督兵拒守槍礮矢石齊下我軍即登梯毁陴摧鋒突入城上兵驚潰陣斬喻成名等盡殲其衆太祖高皇帝遂入城駐蹕又按明統志云古開元城在三萬䘙西門外又元史地理志云金末其將布希萬努據遼東元出師伐之擒萬努至開元東土悉平開元之名始此元時於此置萬户府明因之設三萬衛又考通志古蹟所載扶餘府黄龍府黄龍寨並在今開原縣境此可據矣布希萬努改見前黄龍故城在開原縣境本渤海扶餘府遼太祖平渤海還至此有黄龍見城上長亙一里光耀奪目更名黄龍府晉岀帝降遼嘗置於此保寕七年府廢開泰九年復置統州五縣三金收國元年太祖親攻黄龍府次混同江無舟乘馬徑涉遂克黄龍天眷三年改濟州利涉軍以太祖涉濟故也天德二年置上京路轉運司四年改為濟州路轉運司大定二十九年改隆州利涉軍貞祐初升為隆安府屬上京路元初屬開元路按今吉林城西北二百餘里博屯山上有金羅索墓碑末云歸葬濟州之東南隩濟州即黄龍府據此則似濟州在今吉林地矣不知山在西北二百餘里未必即是吉林地且碑云濟州東南隩又不知其在濟州幾百里也於吉林云在西北於濟州云在東南則是博屯正在二地犬牙相入之界將謂此山古