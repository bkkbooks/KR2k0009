body:
  text: 為燕地秦為上谷郡地漢置廣寧等縣屬焉郡治沮陽屬幽州西南境兼為代郡地後漢因之晉分上谷置廣寧郡後魏兼置燕州北齊屬北燕州後周屬燕州隋屬涿郡唐初屬媯州唐光啓中始置武州屬河東道石晉天福初入遼改曰歸化州兼置雄武軍屬西京道遼史地理志歸化州本唐武州僖宗改毅州後唐太祖復武州明宗又為毅州潞王仍為武州晉高祖割獻於遼改今名宋宣和五年歸宋尋復入金大定七年改曰宣化州八年又改曰宣德州屬西京路元初升為宣寧府太宗七年改山東路總管府中統四年改宣德府屬上都路後至元三年改順寧府明洪武四年府廢二十六年置宣府左右前三衛隸北平都指揮使司永樂七年直隸京師又置總兵鎮此稱宣府鎮宣德五年置萬全都指揮使司領宣府左右前三衛及萬全左右隆慶左右懷安永寧保安懷來龍門開平蔚州共一十四衛雲州水寧等七所城堡三十有三其延慶保安二州則直隸京師本朝初仍曰宣府鎮領宣府前衛及萬全左右懷安懷來永寧龍門開平保安蔚州等十衛延慶保安二州康熙三十二年改置宣化府並以山西之蔚州來屬乾隆二十二年裁蔚縣併入蔚州今領州三縣七宣化縣附郭東西距九十五里南北距一百七十里東至龍門縣界五十五里西至懷安縣界四十里南至蔚州界一百三十五里北至龍門縣界三十五里東南至保安州治六十里西南至懷安縣治一百二十里東北至龍門縣治一百十里西北至萬全縣治八十里漢置廣寧縣屬上谷郡後漢因之晉省入下洛縣唐𥘉為懷戎縣地後析置文德縣為武州治遼為歸化州治金大定二十九年改縣曰宣德為宣德州治元為宣德府治明洪武初府縣俱廢二十六年改置宣府左右前三衛本朝初省左右二衛入前衛為宣府鎮治康熙二十二年改置宣化縣為宣化府治赤城縣在府東北一百七十里東西距七十五里南北距一百二十里東至邊界四十五里西至龍門縣界三十里南至龍門縣界二十里北至邊界一百里東南至延慶州界九十里西南至龍門縣界十里東北至邊界五十七里西北至邊界五十五里本漢上谷郡北境後魏禦夷鎮地唐為媯州地遼置望雲縣屬奉聖州金屬德興府元中統四年升為雲州明初州廢宣德五年置赤城堡本朝初屬宣府鎮曰上北路康熙三十二年改置赤城縣屬宣化府萬全縣在府西北八十里東西距一百三十里南北距七十里東至宣化縣四十五里西至山西大同府天鎮縣界八十五里南至懷安縣界四十里北至神威臺接邊界三十里東南至張家口前屯接宣化縣界三十五里西南至陽門堡接懷安縣界七十里東北至東窑子接龍門縣邊界四十里西北至鎮河臺接邊界九十里本漢上谷郡寧縣地唐為武州文德縣地元為宣德府宣平縣地明洪武二十六年置德勝堡永樂二年移萬全右衛治此十六年直隸京師宣德中屬萬全都指揮使司本朝初屬宣府鎮為西路康熙三十二年改置萬全縣屬宣化府龍門縣在府東少北一百十里東西距一百十五里南北距一百四十五里東至赤城縣界六十里西至宣化府界五十五里南至懷來縣界一百十五里北至邊界三十里東南至懷來縣治一百七十里西南至宣化縣界七十里東北至赤城縣界五十里西北至邊界二十五里漢置女祁縣屬上谷郡為東部都尉治後漢省唐末置龍門縣屬新州遼屬奉聖州金初屬宏州後屬德興府明昌三年又改屬宣德州元至元二年廢為鎮屬宣德縣二十八年復改置望雲縣屬雲州明洪武初州縣俱廢宣德六年置龍門衛屬萬全都指揮使司嘉靖元年分為中路本朝屬宣府鎮順治六年改曰下北路康熙三十二年復置龍門縣屬宣化府懷來縣在府東南一百五十里東西距七十里南北距七十里東至延慶州界二十里西至保安州界五十里南至順天府昌平州界五十里北至龍門縣界二十里東南至昌平州治一百五十里州界四十西南至保安州界七十里西北至宣化縣界八里東北至延十里戰國燕慶置上谷郡秦因之秦置沮陽縣為郡因之後魏時郡縣俱廢齊周及隋治漢及後漢為懷戎縣地晉唐垂拱中分置清夷軍長安二年始移懷戎縣及媯州來治天寶初曰媯川郡乾元初復曰媯州屬河北道五來屬西代晉天福元年入遼改京道金初州廢明昌六州曰年改可汗縣曰懷縣曰媯川屬德興府元復曰懷來縣延祐二年改洪武初改懷來守禦千户所永樂十屬龍慶州明五年改懷來左衛十庸關北六年曰懷來衛直隸京師宣德中又徙口隆慶右衛於此並屬萬全都指揮使居司本朝𥘉屬宣府鎮為東路康十二年復改為懷來縣屬宣化熙三府蔚州在府西南二百三十至保里東西距一百二十里南北距一百十里東安州界九十里西至山西大同府廣靈縣界三十里界六十南至易州廣昌縣界五十里里東南至廣昌縣治一百三北至西寧縣十里西南至大同府靈一百八十邱縣治一百三十里東北至保安州治里西北至西寧縣治九十里春秋時代國戰國屬趙置代郡秦亦為代郡漢初為代國尋為代郡治桑乾縣兼領代縣後漢徙郡治高柳以二縣屬之晉復移郡治代縣永嘉後廢後魏復置代郡孝昌中廢東魏天平中屬靈邱郡隋為靈邱縣地唐開元十二年始分置安邊縣屬蔚州天寶初自靈邱移州來治改曰安邊郡至德二載并改安邊縣曰興唐乾元初復曰蔚州屬河界道五代晉初改縣曰靈仙天福元年割屬遼仍為蔚州置忠順軍屬西京道宋宣和五年屬雲中路六年仍入金屬西京路元至元二年州廢縣屬宏州尋復置州改屬宣德府明洪武四年以州治靈仙縣省入屬山西大同府七年增置蔚州衛屬山西行都司宣德五年衛屬萬全都指揮使司本朝康熙三十二年改衛置蔚縣屬宣化府乾隆二十二年栽蔚縣