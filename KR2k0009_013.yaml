front:
  text: 大清一統志宣化府在直隸省治北七百里東西距三百六十里南北距二百七十五里東至邊界二百十五里西至山西大同府邊界一百四十五里南至易州淶水縣界二百十里北至張家口邊界六十五里東南至順天府昌平州界二百五十里西南至大同府廣靈縣界二百六十里東北至獨石口邊界三百十里西北至邊界一百六十里自府治至京師三百四十里分野天文尾箕分野析木之次建置沿革禹貢冀州之域周幽州之域春秋戰國時
