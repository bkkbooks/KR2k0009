時改名張士範有記靈巖寺在蔚州城內西北隅俗稱前寺雙松寺在蔚州城西北俗稱後寺府志云遼三宇故址金河寺在蔚州東小五臺山下金時建千佛寺在西寧縣順聖西城東南二里本金羅化院舊址靈山寺五保安州南一百五十里金泰和八年建靈真觀在赤城縣雲州堡西南十五里金閣山中舊曰雲溪觀元改名本朝康熙十一年修大清一統志宣化府四名宦漢李廣成紀人文帝時為上谷太守數與胸奴戰劉茂晉陽人為沮陽令王莽時棄官避世宏農山中教授蘇竟平陵人平帝時拜代郡中尉時胸奴擾亂北邊多罹其禍竟終完輯一郡光武即位就拜代郡太守使固塞以拒胸奴王霸潁陽人建武九年拜上谷太守時盧芳與胸奴烏桓會兵寇盜尤數詔霸將弛刑徒六千餘人與杜茂治飛狐道堆石布土築起亭障自代至平城三百餘里與胸奴烏桓大小數十百戰頗識邊事數上書言宜結和親又陳委輸可從溫水漕以省陸轉之勞事皆施行後南單于烏桓降服北邊無事在上谷二十餘歲永平二年以病免三國魏裴潛開喜人太祖以為代郡太守烏丸王及其大人凡三人各自稱單子專制郡事太祖欲討之潛曰宜以計謀圖之不可以兵成迫也遂單車之郡單于驚喜潛撫之以靜單于以下脫帽稽顙悉還前後所掠婦女器械財物潛暗誅郡中大吏與單于為表襄者郝溫郭端等十餘人北邊大震百姓歸心南北朝魏王憲北海劇人為上谷太守清身率下風化大行唐李思儉宏道元年為蔚州刺史突厥寇州思儉死之遼楊佶南京人重熙十五年出為武定軍節度使境內亢旱苗稼將稿視事之夕雨澤霑足百姓歌曰何以蘇我上天降雨誰其撫我楊公為主㶟陽水失故道乃以巳俸創長橋人不病涉及被召郡人攀援泣送竇景庸中京人大安中授武定軍節度使審決冤滯輕重得宜以獄空聞趙徽南京人咸雍中出為武定軍節度使及代軍民請留金完顏宗賢天德中除忠順軍節度使捕盜司執數人至府白獄巳具宗賢閲其案謂僚佐曰我察此輩必冤不鼓日賊果得人服其明伊拉衮遼橫帳人大定中由臨海軍移鎮武定歲旱且蝗因割指以血􅅹酒中祈禱既而雨霑足有羣鴉啄蝗立盡歲乃大熟伊拉衮改見保定府名宦賈少沖通州人熙宗時為定安令時蔚州刺史恃貴不法屬吏畏之每從其意少沖守正不阿用廉進官一階李瞻玉田人真元三年為忠順軍節度使正隆末盜賊蜂起膽增築城壘為備蔚人賴之以安王擴永平人明昌中為懷安令猾吏張執中誣敗二令擴到官執中挈家避去張特立東明人調宣德州司侯州多皇族巨室特立繩之以法闔境肅然元連格蒙古克類氏從太宗南伐數有功金亡後太宗謂曰西山之境八達以北汝其主之生平寬大愛人卒諡忠襄連格舊作速哥克類舊作怯烈今並改正明宋忠建文元年以都督總邊兵屯開平燕師起忠率兵至居庸闡不得進退保懷來燕王率精兵八千卷甲倍道至忠戰敗死之時都指揮余瑱彭聚孫泰與忠同守懷來及戰瑱被執不屈死泰中流矢裏創立戰與聚俱陷陳亡福王時贈忠夀昌伯諡莊愍瑱東陽伯諡翼愍泰象山伯諡勇愍聚左都督鄭亨合肥人永樂元年充總兵官鎮宣府時元道兵出沒塞下亨度宣府萬全懷來形便每數堡相距擇一堡為高城深池多置門浚井蓄水其中度可容數堡士馬者謹斥堠遠瞭望兵至夜舉火晝鳴炮併力堅守規畫周詳後莫能易後移守開平再鎮宣府五出塞皆有功趙羾祥符人永樂中以禮部尚書督建隆慶保安二州撫綏新集民安其業薛祿膠州人宣德初佩鎮朔大將軍印守宣府屢立功建議徙開平於內城以便戍守又築獨石隆慶等城躬視版築與卒伍同勞苦談廣丹徒人時以左都督鎮宣府二十年撫士卒有恩邊徼帖然李儀涿州人正統初宣鎮始設巡撫命儀以僉都御史往時軍府草創儀規畫俱可法守潔廉持正邊僥信畏以被誣下吏死嘉靖初鎮人建昭德祠以祀之羅亨信東莞人正統五年以僉都御史巡撫宣府汰諸衛冗官老弱者四百八十餘人土木之變人情恟懼有議棄宣府城者官吏軍民紛然就道亨信仗劎坐城門令曰敢出城一步者斬乂誓諸將曰朝廷付亨信此城以死守之人心始定額森奉車駕至傳命啓門亨信登城語曰奉命守城不敢擅啓門額森乃去時額森兵日薄城下亨信以孤城當其衝外禦強寇內屏京師以勞進副都御史楊洪六合人正統初守備赤城獨石以擊寇功進都指揮同知充右參將建議加築開平城拓龍門所自獨石至潮河川增至堠臺六十邢勢相接十二年充總兵官鎮宣府景泰中佩鎮朔大將軍印以疾召還京卒贈潁國公洪御軍嚴肅士馬精強為一時邊將冠迤北憚之稱為楊王牲好儒雅請建學宣府教諸將子弟朱謙夏邑人正統末充總兵官鎮宣府敵屢入犯謙力戰却之景泰初郭登守大同謙守宣府數以羸師挫徑騎敵不敢軼宣大南侵者二人力為多李秉曹縣人景泰二年以僉都御史代侍郎劉連督宣府軍餉盡反連弊政厚恤屯軍發帑市牛種士卒自城守外悉令屯作凡使者至及宦官鎮守供億料斂皆罷之尋命兼巡撫乃易守帥練士卒興學校經久之䇿細大畢舉邊關千里間比尸樂業天順初罷巡撫改官憲宗立復命以副都御史往撫軍民聞其來夾道歡迎葉盛崑山人景泰時為右參政督餉宣府協贊軍務自土木之變獨石馬營龍門諸衛赤城雕鶚諸堡將士皆棄城遁盛悉收復之發帑市牛種給軍盡心拊循惠政大著憲宗初以僉都御史巡撫宣府復舉官牛官田之法墾田四千餘頃以其餘積市戰馬千八百匹修屯堡七百餘所邊塞益安秦紘單縣人成化中以僉都御史巡撫宣府練兵積果繕器甲明斥堠為戰守計甚備小王子數萬騎入掠紘躬環甲胄與總兵官周玉等邀擊遁去尋復入寇連戰却之追還所掠璽書勞焉雍泰咸寧人宏冶十二年以副都御史巡撫宣府官馬死軍士不能償泰言於朝以官帑市邊軍貧有妻者輒鬻泰請官為資給尚書周經因令貧者給聘財典賣者收贖一軍盡歡馬中錫故城人宏治中以副都御史巡撫宣府劾罷貪耄總兵官馬儀革鎮守以下私役軍士使隸尺籍寇嘗犯邊督軍敗之翁萬達揭陽人嘉靖中以兵部侍郎總督宣大軍務謹偵堠明賞罰寇大入率兵擊敗之後修築邊牆自大同東路至宣府西路二百餘里敵臺暗門悉具後又修築宣府東路及大同西路邊牆凡八百里牆堞遠近濠塹深廣曲盡其宜寇乃不敢輕犯牆內得以耕牧歲省邊費幾半關山大同人嘉靖中宣府中路參將小王子率六萬騎入葛峪山所部不滿千力戰一盡夜援兵不至身被重創死詔贈恤豫祭郭都廣寧衛人嘉靖中以副總兵協守宣府寇入深井堡都率所部禦之轉戰三日多所斬獲追至淘沙堡兵疲無援陷圍中身𬒳數十創死事聞贈左都督諡忠壯李光啓嘉靖中為宣府參將遇賊於青邊口兵敗𬒳執攜至墩下索金帛為贖光啓瞋目大罵賊怒劚殺之詔贈都督僉事諡節愍立祠以祀王遴霸州人隆慶時以僉都御史巡撫宣府大興屯田募民耕治輕其租稅奏行屯政便宜邊儲賴之孫維城邱縣人萬厯中為赤城兵備副使繕亭障二百六十所招史車二部千餘人以功屢進按察使兵備如故部長安圖恃其勇挾五千騎邀賞維城請於督撫革其市賞而遣譯使責之語中窾要遂斂戢不敢肆安圖舊作安兔今改正閻生斗汾西人崇復中由歲貢生厯保安知州性廉介持法嚴吏民畏服七年大兵臨城生斗集吏民固守力屈死之判官李師聖吏目王本立訓導張文魁亦同死事問生斗贈太僕少卿師堅等贈恤如制朱之馮大興人崇禎十六年以僉都御史巡撫宣府明年三月李自成陷大同之馮集將吏於樓歃血誓死守盡出所有犒士時人心已散莫為盡力監視中官杜勛總兵王承廕先遣人納款叩頭請之馮降之馮大罵賊將至勛郊迎三十里外將士皆散走之馮登城使人發大炮無應者自起爇火或從後掣其肘俄賊薄城承廕遽開門降左右欲擁之馮出走叱之乃南向叩頭草表勸帝收人心培氣節遂自縊死本朝陸濬睿平湖人順治中為宣府推官察重囚鞏加世假大康性全等冤出之獄拔諸生之秀者以興文教鎮將徐洪志擅殺平民濬睿按之如律忤巡撫去楊維喬寧海人康熙十九年任口北道會嵗歉力請蠲賑有豪勢販略婦女越境者嚴禁之陳天棟永嘉人為西寧管糧通判歲飢力請蠲賑全活數萬人及去民立碑記之王騭福山人康熙二十五年任口北道旗丁利民地可種煙控部差員查丈騭力為詳請民不失業汪天柄錢塘人康熙中為西寧知縣邑有土可煎鹽被禁抑為民病者且三十年天柄申請聽民自煎公私賴之人物漢范升代郡人九歲通論語孝經及長習梁邱易老子教授後生建武二年光武徴詣懷宫拜議郎遷博士上疏讓於梁恭吕羌帝不許然由是重之數召見每有大議輒見訪問時尚書令韓歆欲為費氏易左氏春秋立博士詔下其議升以為非宜與韓歆許淑等互相辨難而罷永平中為聊城令坐事免卒於家韓珩代郡人清粹有雅量少喪父母奉養兄姊宗族稱孝悌事袁紹為别駕袁熙袁尚敗其將焦觸張南驅率諸郡太守令長背袁向曹珩獨不肯曹操聞珩節甚高之屢辟不至卒於家晉魯勝代郡人少有才操為佐著作郎元康初遷建康令著正天論遂表上求下公卿士考論不報嘗歲日望氣知將來多故便稱疾去它中書令張華遣子勸其更仕再徴博士舉中書郎皆不就其著𫐠為世所稱遭亂遺失惟注墨辨存趙至代郡人寫居洛陽少時詣師受業聞父耕叱牛聲投書而泣師怪問之至曰我小未能榮養使老父不免勤苦師甚異之後向遼西占户三辟部投享斷九獄見稱精審太康中以良吏赴洛方知母亡𥘉至自恥士伍欲以宦學立名期於榮養既而其志不就號憤慟哭嘔血而卒公孫鳳上谷人少有經學比長隱於昌黎之九城山谷冬衣單布寢土牀夏則并食於器停令臭敗然後食彈琴吟咏人莫能測也慕容暐在鄴以安車徵之及見暐不言不拜衣食舉動如在九城賓客造請鮮得與言數年病卒南北朝魏張衮沮陽人純厚篤實好學有文才太祖為代王選為左長史常參大謀決䇿帷幄破走劉顯大破慕容寶剋中山纍拜奮武將軍幽州刺史爵臨渭侯坐事黜為尚書令史袞遇創業之始以才謨見任率心奉上不顧嫌疑年過七十闔門守靜手執經書刋定乖失愛好人物喜誘無倦士類以此高之卒諡文康張恂衮弟隨衮歸魏參代王軍事皇始初拜中書侍郎帷幄窑謀頗預參議賜爵平皋子厯廣平常山二郡太守當官清白仁恕臨下百姓親愛治為當時第一卒諡曰宣張白澤衮之孫年十一遭母憂以孝聞長而博學高宗初除中散遷殷中曹給事中出行雍州刺史清心少欲吏民安之顯祖詔監臨官受羊一口酒一斛者罪至大辟與者代從坐論糾告者各隨所糾官授之白澤表諫請依律令顯祖納之太和初懷州民三十餘人謀反文明太后欲盡誅一城之民白澤諫止遷殿中尚書卒諡曰簡邵洪哲沮陽人縣令范道榮除名羈旅孤貧不能自理洪哲代詣京師明申曲直經厯寒暑不憚劬勞道榮卒得復雪又北鎮反亂道榮孤單無所歸洪哲兄伯川復卒鄉人送建幽州道榮感其誠節訴省申聞詔下州郡標其閭里唐侯仲莊蔚州人為李光弼先鋒擒安太清有功纍加冠軍將軍僕固懷恩以朔方反仲莊為都將訓兵自守號為平射人畏其鋒懷恩敗郭子儀代之引為腹心封上谷君王為神䇿京西將德宗幸奉天遷左衛將軍為防城使修壘堞晝夜執戈徼循帝還都復鎮奉天幾二十年卒贈洪州都督五代後唐高行周媯州人初隸明宗帳下為禆將莊宗遣明宗襲鄆州行周將前軍乘夜雨入其城鄆人方覺遂取之莊宗滅梁以功領端州刺史遷絳州明宗時從平朱守殷克王都恩振武彰武昭義節度使周大祖時卒贈尚書令金李師夔永興人以蔭為本州麴監太祖襲遼主於鴛鴦濼郡守委城遁去衆請師夔主郡事迪古鼐兵至師夔與其故人沈璋出降詔以師夔領節度璋佐之劇賊張勝以萬人逼城師夔度衆寡不敵偽與之和乘其不備使人刺勝殺之賊衆散去又擒斬别賊尹智穆是後賊衆不敢入境纍遷陜西東路轉運使封任國公迪古鼐舊作迪吉乃今改正沈璋永興人學進士業由武定軍節度副使纍遷山西路都轉運使加衛尉卿從伐宋汴京平衆爭趙資貨璋獨無所取惟載書數千卷而還知潞州事百姓為之立祠改同知太原尹介休人張覺聚黨鈔掠璋往招之覺即日降終鎮西軍節度使魏子平宏州人登進士第世宗時纍遷户部尚書拜參知政事上問民不足何也對曰古有一易再易之田今乃一切與上上田稅之此民之所以困也又問前令內外官並舉所知未聞有舉者子平請當舉之官每任須舉一人其獻納皆此類厯官平陽尹致仕梁肅奉聖州人天眷進士纍官攝大名少尹正隆未境內盜起平人陷賊者數千人肅考驗得其情讞出者十八九大定中轉吏部尚書疏言臺諌官宜親擇不可委之宰相恐樹私恩塞言路上嘉納之後拜參知政事疏論生財舒用八事又嘗誎田獵及請老上謂宰臣曰梁肅知無不言正人也卒諡正憲王元節宏州人幼穎悟雖家世顯貴而從學甚謹渾源劉撝愛其才俊以女妻之遂傳其賦學登天德三年詞賦進士第雅尚氣節不能隨時俯仰遷密州觀察判官既罷即逍遙鄉里以詩酒自娛號曰遁齋有詩集傳世弟元德亦第進士官提刑有名孫國綱業儒術尢長吏事宣宗聞其才幹特召為近侍棹御史死節牛德昌定安人父鐸遼將作大監德昌少孤其母教之學有勸以就蔭者其母曰大監遺命不使作承奉也登皇純二年進士調礬山簿遷萬全令有惠政纍官吏部侍郎中都路轉運使廣寧大原尹程輝靈仙人性倜儻敢言皇統二年擢進士第由尚書省令史纍官户部尚書拜參知政事世宗謂其遇事輒言過於王蔚以老乞休後起知河南府事卒諡忠簡靖安民永興人貞祐初隸苗道潤麾下以功纍遷知德興府事中都路總領招撫使道潤死安民代領其衆興定中安民出兵至礬山復取擔車寨元兵至提控馬豹等以安民妻子出降軍中駭亂衆欲降以保妻子安民及經厯官霍端不從遂遇害詔贈金紫光祿大夫畢資倫縉山人以傭雇從軍積功至都總領璞薩阿哈南征軍次梅林關不得過資倫引兵取之還復為宋所據資倫再奪之論功第一授遙領同知昌武軍節度使尋命統本軍屯泗州興定五年宋將時青襲破泗州資倫自投城下不死宋軍執以見青青説之降資倫極口罵青知無降意下盱眙獄復囚於鎮江府獄鈐以鐵繩脅誘百方凡十四年終不屈及聞蔡州破嘆曰吾無望矣容我一祭乃降耳宋人信之為設祭鎮江南岸資倫祭畢伏地大哭乘其不防投江水死宋人為立祠璞蕯阿哈舊作僕散阿海今改正殷禮宣德人性至孝鬻薪自給顧日求甘脆奉親貞祐中元兵陷宣德下令盡殺老者禮念父必不免乃伏其父於身下自以兩手據地延頸待勿項腦中二創幸不死至夜半蘇後二日令再下無老幼盡殺會禮以善舞被選己行至蔚州矣聞父死潛歸求尸得之負以涉河冰傷陘血出發母冡下尸封識之復還軍中後以功得漢軍千户子尚古尚質俱至顯官元劉敏宣德府人為太祖宿衛從征諸國授安撫使兼燕京路稅課漕鹽等事遼人夜掠民財敏戮其渠魁又豪民胃籍良民為奴者衆敏悉歸之選民習星宿者為司天興學校薦名士為之師太宗即位授行尚書省憲宗時請以子世亨自代退居年豐世祖南征過年豐敏入見諭之曰我太祖勵精圖治見而知者惟卿耳爾其彚次以為後法楊惟中宏州人金末以孫童子事太宗知讀書有膽略太宗器之年二十奉命使西域三十餘國宣暢國威敷布政教皆籍户口屬吏乃歸從皇子庫楚伐宋得名士數十人收伊洛諸書送燕都建太極書院延儒士趙復王粹等講授其間遂通聖賢書慨然欲以道濟天下定宗時仗節諭降武善餘黨憲宗時厯河南經略使陜右四川宣撫使所至肅然世祖總統東師奏惟中為江淮京湖南北道宣撫使諸帥並聽節制卒諡忠肅庫楚改見順天府流寓趙瑨蔚州人從穆瑚黎攻相州抵其門死士突出瑨直前擊之流矢中鼻側鏃出腦後拔夫再戰七日破其城論功授薊州行軍都元帥讓其兄圭改授軍民總管纍遷河南道提刑按察使卒諡襄穆穆瑚黎改見順天府人物魏初順聖人好讀書尤長於春秋為文簡而有法中統𥘉授國史院編修官尋拜監察御史首言方今法有未定百司無所持循宜參酌考定頒行天下時襄樊未下將括民為兵或請自大興姑初言京師天下之本詎宜騷動遂止纍遷御史中丞崔彧宏州人負才氣剛直敢言世祖器重之前後官御史中丞十年章凡數百上中書省請以或為右丞世祖曰崔或不愛於言惟可使任言責成宗即位或以病辭諭曰勉為朕少留卒追封鄭國公諡忠肅談澄懷來人襲父職為交城令時年十九有惠政世祖即位擢懷孟路總管歲旱令民鑿唐渠引沁水以溉田遂為永利厯陜西四川提刑按察使代四川僉省嚴忠範守成都會西南夷羅斯內附帝以撫新國宜擇文武全才遂以澄為副都元帥同知宣慰使事比至以疾卒武恪宣德府人初以神童遊學江南吳澄薦入國學明宗在潛邸選為説書秀才及出鎮欲起兵陜西恪諫遣還京師居陋巷教授子弟又宗知其名除祕書典簿丁內艱再除中瑞司典簿改汾西縣尹皆不起人或勸之仕恪曰向為親屈今親死不復仕矣恪好讀周易每日危坐或問先生學以何為本曰以敬為本所著水雲集若干卷吳思達蔚州人兄弟六人嘗以父命析居思達為開平縣主簿父卒還家治葬畢會宗族泣告其母曰吾兄弟别處十餘年矣今多破産以一母所生忍使苦樂不均耶即以家財代償其逋更復共居母卒哀毁甚宅後柳連理人以為義友所感明嚴垣懷安人永樂中由進士為御史厯按山東畿輔四川河南並著風力終浙江僉事性至孝入仕三十年人稱廉介李衍隆慶州人景泰淮士成化初厯官參議督四川松潘糧儲行部至彭索河知生蠻擾邊民不得耕衍以計誅其渠帥乃視要害築亭障墾荒田千餘頃灌縣江都堰壞衍修之三遷以户部侍郎權尚書事河北連歲飢郡縣當輸粟塞下者槖銀就糴穀騰貴衍請翰銀京師以太倉米給邊軍民便之二十年總督關陜引渭水為渠溉民田召為户部尚書以老告歸孫剛宣化前衛人以功遷部指揮守備永寧正統中敵陷獨石馬營剛率兵往援遇敵數萬騎猝至剛大呼陷陳死都指揮谷春衛指揮向通王敬張澄同死之事聞豫祭廕後葉盛奏建義烈祠祀之張俊宣府前衛人嗣世職為本衛指揮使纍擢大同遊擊將軍宏冶時霍什入寇力戰却之厯大同宣府總兵官正德間楊虎劉六等起率師進討屢敗賊俊為將能持亷有謀勇其殁也家無贏資霍什舊作大篩今改正王軏開平衛人宏治進士正德初厯工部員外郎出監遵化鐵廠劾前郎中鮑等虧耗因乞減歲辦數以寬民禁豪家母攬納薪炭詔從之嘉靖時以副都御史巡撫四川討平芒部隴政遷户部侍郎核九門苜蓿地勘御馬監草場多所釐政又出核勳戚莊田疏請如周制計品秩别親疏以定多寡於是兼并者悉歸之官終南京兵部尚書馬森懷安衛人嘉靖進士厯太平知府有善政纍遷至大理卿屢駿疑獄稱明允隆慶初為户部尚書勸帝力行節儉帝命中官崔敏發户部帑銀六萬市黃金森執奏乃止既又命購珠寶森力爭不聽以母老乞養歸森初學於王守仁門人黃直里居力贊巡撫龎尚鵬行一條鞭法鄉人德之為立報功祠卒贈太子少保諡恭敏嶽倫懷安衛人嘉靖進士官行人使河南見餓殍載路疏請蠲賦算發粟賑之又抗疏論宰相專擅謫齊東丞稍遷工部郎世宗南巡已戒行倫疏諫止上怒下詔獄尋放還郝杰蔚州人嘉靖進士授行人擢御史巡按畿輔寇入永平疏劾薊督劉燾巡撫耿隨卿觀望冒功並論副使沈應乾遊擊李信周冕等皆得罪去駕幸南海子命京營諸軍盡從復爭之不聽出為陜西副使纍遷僉都御史巡撫遼東總兵李成梁飾功邀敘督撫多庇之杰獨不與比進南京兵部尚書卒贈太子少保馬芳蔚州人有膽智初為隊長數禦寇有功纍加左都督嘉靖中為薊鎮副總兵尋移宣府寇大入山西芳一日夜馳五百里及之七戰皆捷又連敗之就擢總兵官擊破上海十萬衆每歲出師搗巢多所斬獲帥師至大松林登高四望耀兵而還芳起行伍為將帥大小百十戰身被十餘創以少擊衆未嘗不大捷威名震邊陲為一時將帥冠云子林它總兵守開原與二子燃熠俱戰死林兄子爌甘肅總兵闖寇破城被獲不屈而死爌弟飈為沔陽州同知城陷亦死之爌父子兄弟俱死國難本朝乾隆四十一年賜諡馬爌忠烈餘並豫祀忠義祠上海舊作辛愛今改正董一元宣府前衛人父暘嘉靖中為宣府遊擊將軍諳達犯滴水崖力戰死兄一奎都督僉事厯鎮三邊以勇敢著一元智略過之萬厯中以都督僉事厯昌平薊州宣府總兵官劾罷鄭洛經略洮河命一元練兵西寧擊破霍洛齊之衆擢鎮延綏徙遼東巴圖爾大舉入寇一元用計大破之逐北七十餘里斬獲甚衆進左都督加太子太保一元厯鎮衝邊並著勞績與麻貴張臣杜桐達雲為邊將選云霍洛齊改見保定府人物巴圖爾改見大名府人物潘宗顏保安衛人善詩賦曉天丈兵法登萬厯進士授户部主事厯郎中數上書當路言遼事不能用命督餉遼東擢開原六備僉事四十六年大兵至開原宗顏力戰死之贈大理卿諡節愍滿桂蒙古人𥘉入中國家宣府勇敢便騎射每從軍斬獲多由總旗厯官參將孫承宗奇其才擢副總兵守寧遠纍進總兵左都督移鎮關門大同桂天性忠勇持身廉無聲色好與士卒同甘苦所至輒有功崇禎二年京師戒嚴以五千騎入衛拜武經略與大兵戰於永定門外衆寡不敵力戰死贈少師遣官致祭有司為建祠本朝乾隆四十一年賜諡烈愍本朝馬騰龍宣化人順治𥘉隨定南王孔有德屢立戰功擢桂林遊擊李定國犯桂林騰龍竭力守禦糧盡援絶城陷被執不屈遇害妻郭氏被焚死仲弟從龍亦赴鬬死張文衡赤城人先世以指揮隸開平衛文衡早孤事母以孝聞通天官輿圖風角之説尤邃於易術能前知禨祥天聰八年自大同徒步來歸上書言安民計太宗嘉納之順治八年請守青州誘擒流賊餘黨趙應元等山東遂平移守淮安修戰具軍需應機立辦請於帥禁士卒母入城遷徽寧道副使勦平道盜汪張飛劉時祥等纍擢僉都御史巡撫甘肅總督孟喬芳調回兵往征川寇其酋米喇印丁國梀結連生羌乘間至蘭州為亂執總兵劉良臣文衡倉卒聞變部兵已與賊合僅得親卒三十餘人與賊巷戰賊矢攢射遂遇害僵立不仆賊驚懼羅拜誓不敢輕犯眷屬乃仆文武十餘人俱不屈死贈右都御史入祀昭忠祠姚永燾宣化人父熙吾官陜西興安知州永夀隨至任值鄰邑洵陽失守民多赴興安避亂永燾訓練保障全活甚衆參將康國安薦其才授興安都司順治三年叛賊孫守法糾流賊圍州城兩月糧盡援絶姦民內應城陷永燾死之賈士璋延慶州人順治𥘉以貢生授宜君知縣流賊王永強攻城陷士璋死之贈按察司僉事李之實延慶州人順治𥘉以貢生為江南睢寧訓導賊海時行倡亂攻陷睢寧之實不屈被殺贈國子監學録魏象樞蔚州人順治進士改庶吉士授吏科給事中劾安徽巡撫王懩徇庇受賄罷之又請定藩司會計之法及內外各署治事限期疏凡數上皆議行坐事左遷丁母憂家居用大學士馮溥薦起貴州道御史纍遷左都御史進刑部尚書上疏願留掌都察院事詔許之再擢刑部尚書以疾致仕卒諡敏果入祀賢良祠象樞性方嚴在臺省知無不言整飭紀綱百僚憚之及為刑部治獄嚴明未嘗輕有縱釋然𬒳罪者服其不冤好汲引人材所薦舉湯斌郝浴陸隴其諸人皆為名臣大儒居恆究心理學而惡虛聲操榜惟務力行所著有儒宗録知言録寒松堂集行世劉廷祉宣化人康熙中為湖廣南漳守備吳三桂遣其黨持書招之降廷祉焚其書率兵赴陳死馬宏儒蔚州人順治武進士厯官雲南掌印都司康熙十二年吳三桂謀逆脅受偽職不從餓死妾李氏鬻身殯殮事平喪歸易棺面色如生李旭升蔚州人康熙進士由中書纍遷工部侍郎福建沿海大飢奉命發江浙米三十萬石往賑旭升計口授食無遺無濫厯吏部侍郎加尚書銜致仕歸卒弟暄亨康熙進士仕中書居親喪哀毁廬墓學術醇正詩文皆有法度李周望旭升子康熙進士由編修遷侍讀督學湖廣以端士習正文體為已任詔命廷臣甄别各省學臣周望為天下第一擢國子祭酒纍遷禮部尚書以病歸卒周望為人厚重居官清慎自奉淡薄終身如一日弟舜臣廕生以孝友稱居鄉里急公好義殁祀鄉賢趙登舉宣化人由行伍往擊流賊以功升江西饒州參將康熙十四年賊圍廣信急登舉奉檄赴援直衝賊營擒前隊數人轉戰而前遇伏死之事聞贈都督同知武英西寧人任雲南曲尋鎮守備雍正十三年逆苗犯丹江英奉檄協剿擊賊於平寨河陳殁事聞贈都司孟臣宣化人任陜甘督標守備管遊擊事乾隆十二年隨征金川進攻會達力竭死之事聞贈參將廕守備王無黨萬全人武進士由侍衛洊擢貴州提督厯剿台拱九股及姑盧黑洞等處叛苗在黔年久懋著勞績乾隆二十四年調浙江提督以疾歸卒諡壯慤武遜宣化人寄居雲南乾隆三十一年由把總隨征緬甸擊賊於壩尾江陳亡事聞議恤廕把總張德飛宣化人由行伍洊升千總嘉廢元年隨勦湖北邪匪力竭陳亡同縣羅文峪把總王武平於漢壩擊賊陳亡蔚州路把總閃美玉於牛蹄灣擊賊陳亡千總張發祥隨剿陜西教匪陳亡事聞均議恤廕雲騎尉王國棟萬全人由行伍洊升都司嘉慶三年隨剿邪匪王三槐等於陜西之固軍壩以功賞戴花翎嗣因奪據白山寺對山分抄賊營受傷陳亡同縣千總劉炯隨剿箕山一帶賊匪陳亡郭錦標於上津堡擊賊陳亡安榮庫於分水嶺擊賊陳亡把總武文玉於火神山擊賊陳亡事聞王國楝加等議恤餘俱廕雲騎尉流寓明沈鍊會稽人嘉靖中以劾嚴嵩謫佃保安里老日致薪米遣子弟就學鍊語以忠義大節皆大喜爭詈嵩父子且縛草為人象李林甫秦檜及嵩醉則聚子弟攢射之嵩聞大怒囑總督楊順御史路楷搆殺之及嵩敗世蕃坐誅鍊所教保安子弟在太學者以一帛署鍊姓名官爵持入市觀世蕃斷頭訖大呼曰沈公可瞑目矣慟哭而去列女元臺叔齡妻劉氏宣德人會地震叔齡壓壞牆中家復失火不復救氏語小姑曰汝兄死吾必不生遂投火中死火滅家人得二尸灰燼中猶手相握事聞詔旌之明妙聰保安指揮張孟哲家婢永樂十一年寇入城孟哲妻李氏語小姑口吾與汝俱宦門女事亟即死耳不可辱遂同投樓前井中妙聰亦隨入二人顧皆未死妙聰念李有孕恐水傷之乃負李於背賊退家人以索引二人出而妙聰死矣時稱為義婢賈義妻王氏隆慶人宣德間義樵古城山中遇虎氏聞之踉蹌往救義已死氏奮身號呌奪夫尸負之歸虎隨至繞其屋咆哮久之去氏以舌舐血易新衣令匠為大棺曰欲實以衣衾也逮夜自縊死遂同棺葬焉池寬妻陳氏開平衛人年十六歸指揮池信子寬信監雲川城操演挈家以行正統間邊騎大入寬隨其父提兵援馬營雲川陷陳先為繯令小姑及其子女皆縊然後自縊死一門死者九人景泰初詔旌之仍立祠以祀賀榮妻韋氏宣鎮人歸軍校賀榮正德間榮從遊擊張勛禦敵於千家營戰死氏痛哭徒跣往尋夫骨負以歸既葬投池中死事聞詔旌其門林景雍妻張氏永寧人歸諸生林景雍嘉靖間寇至氏被掠逼之不從亂刃交下氏罵不絶口死詔旌其門趙資妻段氏隆慶人資死氏年十九事舅姑盡孝嘉靖間兵入泥河堡氏被掠將汚之氏罵詈不屈敵怒支解之劉瑛妻竺氏保安衛人歸指揮劉皓子瑛瑛死無子氏遂絶食伏柩前八日死時年十九本朝安進功女二姐宣化前衛人為強暴逼汚不從遇害康熙年間旌饒紹德妻朱氏赤城人紹德官江西浮梁知縣耿精忠叛兵民皆應賊藝猖獗氏與夫相對投繯夫救蘇氏己氣絶康熙年間旌宋友懷女典姐蔚州人字藺姓聞壻殁投繯以殉康熙年間旌劉德榮女二姐西寧人為強暴所逼不屈死康熙年間旌薛宗州妻楊氏宣化人夫為營兵弟宗寶素無賴一日乘兄出入調其嫂氏詈罵不從被斫死雍正年間旌魏之樞妻王氏宣化人之樞登鄉薦將婚而殁氏年十八奔喪遂留侍舅姑撫姪為嗣守貞數十年同縣節婦姚廷敬妻朱氏廷敬兩弟妻張氏李氏霍成印妻馮氏李郁妻王氏王世皋妻高氏董元妻楊氏王永福妻郭氏牛世儒妻仙氏褚世昞妻黃氏王汝霖妻冀氏郭家珍妻楊氏李自馨妻喬氏張士怛妻靳氏王士林妻楊氏五文麟妻葉氏姚廷槐妻李氏于養志妻王氏石永妻孔氏黑常暄妻高氏張希浚妻姚氏胡以融妻楊氏魏廷賓妻王氏趙賓妻劉氏閃全妻王氏陳國懷妻孫氏谷成妻白氏丁才妻孔氏陳祿妻張氏聞常祚妻郝氏同進福妻張氏許賓妻王氏李名卿妻張氏冀國梁妻郭氏張志奇妻潘氏陳萬鍾妻李氏王之畿妻蕭氏王元功妻張氏黑天潢妻張氏梁邦鈺妻任氏管有功妻朱氏王元模妻龎氏王道宏妻仇氏王永興妻韓氏酆得化妻王氏均乾隆年間旌龔爾昌妻朱氏赤城人夫