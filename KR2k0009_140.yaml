body:
  text: 四川統部在京師西南五千七百一十里東西距三千里南北距三千二百一十里東至湖北宜昌府巴東縣界一千七百六十里西至甘肅西寧府生番界一千二百四十里南至雲南武定州元謀縣界二千三十里北至陜西漢中府寧羌州界一千一百八十里東南至貴州大定府畢節縣界一千一百五十里西南由打箭爐出口至西藏阿里拉丹界九千六百七十五里東北至陜西興安府安康縣界一千四百一十里西北至甘肅階州文縣界一千一百五十里分野天文井鬼分野鶉首之次漢書地理志秦地於天官東井輿鬼之分野也南有巴蜀廣漢犍為武都又西南有牂牁越巂益州皆宜屬焉新唐書天文志東井輿鬼鶉首也初東井十二度中井二十七度終柳六度西南盡巴蜀漢中之地及西南夷犍為越巂益州郡極南河之表東至牂牁按魏太史陳卓以蜀中諸郡皆為魏分其説本於史記天官書觜觿參益州之言後之志天文者多沿之不知觜觿參為實沈之次於辰在申魏之分野河內河東之地在今河南山西省境與益州邈不相屬不可信也建置沿革禹貢華陽黑水惟梁州孔安國傳東據華山之南西距黑水風俗通梁者言西方金剛之氣強梁故名周官職方並入雍州為蠻夷巴蜀諸國地尚書牧誓庸蜀羌髳微盧彭濮孔安國傳八國皆蠻夷羌在西蜀髳微在巴蜀盧彭在西北庸濮在江漢之南慎靚王五年秦滅巴蜀置二郡漢元年屬漢國漢書本紀王巴蜀漢中四十一縣按漢中府今屬陜西高帝分置廣漢郡武帝開西夷置犍為沈黎汶山牂牁越巂等郡元封五年置益州部風俗通益之為言厄也言其地險厄亦曰疆壤益大故名按牂牁郡在今貴州省後省沈黎汶山王莽末為公孫述所據治成都後漢建武元年述改益州置司隸校尉十二年屬漢復為益州後漢志雒州刺史治雒劉焉傳中平五年為益州牧徙居綿竹興平元年徙居成都安帝分置蜀郡犍為屬國都尉建安中劉璋分置巴東巴西江陽三郡十九年昭烈帝定益州建都成都又分置梓潼涪陵汶山漢嘉朱提五郡三國魏景元四年分置梁益二州見宋志而晉志以為泰始三年置晉亦為梁益二州晉書地理志梁州領梓潼廣漢新都涪陵巴郡巴西巴東等郡益州領蜀郡犍為汶山漢嘉江陽朱提越巂等郡自後割裂僑寓不能悉紀永興初為李雄所據建號大成延康四年李夀改成曰漢永和三年歸晉寧康元年陷於苻秦太元八年來歸義熙元年又為譙縱所據九年討平之宋齊皆為梁益二州宋志梁州領漢中等二十郡益州領蜀郡等二十九郡齊志梁州領漢中等二十三郡又宏農等四十五荒郡益州領漢中等二十五郡東宕渠等七獠左郡及北部都尉梁天監後分置州郡益多元帝承聖元年為武陵王紀所據二年入西魏後周置總管府隋開皇二年廢益州置西南道行臺三年復置總管府大業元年府廢尋改諸州為郡按隋志之漢川西城房陵宕昌武都同昌河池順政等郡今屬陜西其清化通川宕渠義城平武汶山普安金山新城巴西遂寧涪陵巴郡巴東蜀郡臨邛眉山隆山資陽瀘川犍為越巂黔安等郡在今四川界唐武德元年復改諸郡為州梁益二州皆置總管府三年於益州置西南道行臺分遂瀘巂茂利夔黔等州皆置總管府九年罷行臺貞觀元年以益州置劒南道梁州置山南道時山南並得荆州北境開元二十二年分山南為東西而梁州為山南西道舊唐志劒南道領成都府及漢彭蜀眉綿劒梓閬果遂普陵資榮簡嘉邛雅黎瀘茂翼維戎姚巂松龍當悉靜恭柘保真霸等州山南西道領興元府及鳳興利通合集巴蓬壁開渠渝等州又夔萬忠三州分屬山南東道新唐志合渝二州屬劒南道又分乾昌二州閬果二州屬山南西道其東道又有涪州分黔州為黔中道至德二載分劒南道東西川節度昭宗初為王建所據建以唐大順二年克成都天復七年建國得五十三州凡二世三十五年是為前蜀後唐同光三年屬唐尋為孟知祥所據知祥以後唐同光四年入蜀應順元年建國得四十六州凡二世四十一年是為後蜀宋乾德三年平蜀置西川路開寶六年分置峽西路太平興國六年並為川峽路咸平四年分置益後曰成都路梓後曰潼川路利夔四路總曰四川路宋史地理志成都府路治成都府領眉蜀彭綿漢嘉邛簡黎雅茂威十二州永康石泉二軍仙井一監潼川路治潼川府領遂寧府及果資普昌敘瀘合榮渠九州長寧懷安廣安三軍富順一監利州路治興元府領利洋閬劒興蓬政巴八州夔州路治夔州領黔施萬忠開達涪恭珍思播十一州雲安梁山南平三軍大寧一監南渡後府州雖有改置然四路之界如故按興元府洋興二州今屬陜西省施州今屬湖北省珍思播三州今屬貴州省元置四川等處行中書省領成都嘉定廣元順慶永寧重慶夔州敘州馬湖九路潼川紹慶懷德三府保寧廣安二屬府彭漢安灌崇慶威簡眉邛劒龍巴沔蓬渠遂寧綿筠連瀘忠合涪來寧柔逺酉陽服施達梁山萬雲陽大寧開富順高戎三十六州長寧一軍至正中為明玉珍所據明史本傳歲乙未克重慶戊戍克成都建國號曰夏都於重慶明洪武四年平之置四川等處承宣布政使司領成都保寧順慶夔州重慶敘州馬湖龍安遵義九府潼川嘉定眉邛瀘雅六州東川烏蒙烏撒鎮雄四軍民府置四川都司領衛十一所八招討司一又置四川行都司領建昌鹽井會川寧番越巂等五衛崇禎末為流賊張獻忠所據本朝順治二年討平之置四川省康熙四年以烏撒軍民府隸貴州雍正六年以東川烏蒙鎮雄三軍民府隸雲南遵義府隸貴州並馬湖府入敘州府改建昌衛為寧遠府升綿茂達三州及資縣並為直隸州七年升雅州為府十二年升嘉定潼川二州為府升忠州為直隸州置黔彭直隸廳以重慶府屬之黔江彭水二縣屬焉十三年