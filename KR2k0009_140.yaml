刺史宣示漢德威懷遠夷自汶山以西前世所不至正朔所未加白狼槃木唐菆等百餘國奉貢稱臣僕輔上其事並譯夷人樂德慕德懷德歌三章帝嘉之事下史官録其歌張喬南陽人永初中為益州刺史元初六年永昌越巂諸郡夷叛殺長史燔城邑喬遣兵討平之延光二年旄牛夷叛攻零關喬與西部都尉擊破之永建初隴西鍾羌叛又討破之种皓洛陽人順帝時為益州刺史在職三年宣恩遠夷開曉殊俗岷山雜落皆懷服漢德其白狼槃木唐菆邛僰諸國自前刺史朱輔卒後遂絶皓至乃復舉種向化時永昌太守鑄黃金為文蛇以獻梁冀皓糾發逮捕馳傳上言而二府畏懦不敢案之山昱益州刺史延禧四年犍為屬國夷寇鈔百姓昱擊破之斬首千四百級餘皆解散龎芝益州刺史建寧六年蔡雍上封事稱芝有奉公疾姦之心尚書令羊陟以芝清亮在公薦舉升進帝嘉之三國漢諸葛亮陽都人先主定蜀以亮為軍師將軍先主外出亮常鎮守成都足食足兵建興元年領益州牧政事無巨細咸決於亮軍資所出國以富饒蔣琬湘鄉人亮卒琬領益州牧遷大將軍録尚書事處羣僚之右無喜色神守舉止有如平日既開府漢中疏陳涪水陸四通惟急是應遂還治涪費禕鄳人蔣琬自漢中還涪固讓州職禕領益州刺史當國功名略與琬比晉王濬宏農人武帝時為巴郡太守垂惠布政百姓賴之遷益州刺史懷輯殊俗待以威信蠻夷檄外多來歸降周撫尋陽人代毋邱奧監方伯之體論者稱之陸徽吳人元嘉中張尋趙廣為亂於益州兵寇之餘政荒民擾乃徵徽持節督寧益二州諸軍事益州刺史徽隱恤有方威惠並著寇盜靜息民物殷阜蜀土安悅劉秀之東莞莒人孝武初遷益州刺史州境豐阜前後刺史莫不營聚蓄多者致萬金所攜賓僚並京邑貧士出為郡縣皆以茍得自資秀之為治整肅以身率下遠近安悅劉亮彭城人益州刺史在任廉儉不營財貨公祿悉以還官太宗嘉之王元載下邳人益州刺史有清績西州稱之裴方明河東人益州中兵參軍元嘉九年賊程道養等圍成都自九月末至十二月方明出戰屢擊破之十年五月進軍涪城涪蜀皆平張岱吳人元徽中益州刺史性清直益土安其政齊陳顯達彭城人益州刺史益部山險多不賓服顯達襲斬大村獠自此山夷震服蕭鑑高帝第十子永明二年為益州刺史時年十四好學善屬文不重華飾器服清素有高士風州城北門常閉防夷鈔掠鑑曰善閉無關鍵且在德不在閉即令開之戎夷慕義自是清謐性甚清正在蜀未嘗有所營造當時稱之梁蕭恢簡文帝第十子天監中遷都督益州刺史成都去新城五百里陸路往來悉訂私馬百姓患之纍政不能改恢乃市馬千匹以付所訂之家有用則以次發之百姓賴焉子範亦為益州刺史開通劒道克復華陽蕭憺簡文帝第十一子天監九年拜都督益州刺史舊守宰丞尉歲時乞丐躬厯村里民苦之習以為常憺至州停斷嚴切百姓以蘇又興學校祭漢蜀郡太守文翁由是人多向方者魏傅豎眼清河人遷益州刺史性既清素不營産業衣食之外俸祿粟帛皆以饗夷恤士撫蜀人以恩信為本保境安人不以小利侵竊有掠蜀民入境者皆移送還本郡檢勒部下守宰肅然遠近雜夷相率款謁仰其德化尉遲迥代人大統未為益州刺史明賞罰布恩威綏輯新邦經略未附夷夏懷而歸之周宇文憲太祖第五子武成初除益州總管憲時年十六善於撫綏留心政術詞訟輻輳聽受不疲蜀人悅之裴文舉聞喜人為宇文憲總管府中郎加使持節蜀土沃饒或有勸文舉以利者答曰利之為貴莫若安身身安則道隆非貨之謂是以不為非惡財也憲矜其貧窶每資給之恆辭多受少庫狄峙代人世宗初益州刺史性寬和尚清靜甚為夷獠所安隋元巖洛陽人高祖初拜益州總管長史法令明肅吏民稱焉蜀王性好奢侈嘗欲取獠口以為閹人又欲生剖死囚取膽為藥巖皆不奉教排閣切諌王輒謝而止蜀中獄訟巖所裁斷莫不悅服獨孤楷仁夀初代蜀王秀為益州總管秀有異志楷諷諭久之乃受代楷察秀有悔色因勒兵為備秀至興樂將反襲楷覘知楷不可犯而止楷在益州甚有惠政唐張長遜櫟陽人檢校益州行臺左僕射厯遂夔二州總管所在皆有惠政皇甫無逸萬年人高祖以蜀新定吏多橫恣人不聊詔無逸持節巡撫得承制除吏既至黜貪暴用廉善法令嚴明蜀人以安嘗按部宿民家燈炷盡抽佩刀斷帶為炷其廉介類此高儉渤海蓚人武德中益州大都督府長史蜀人畏鬼而惡疾雖父母病皆委去望舍投餌哺之昆弟不相假財儉為設條教辨告督勵風俗翕然為變又引諸生講授經義學校復興秦時李冰導汶江水灌田瀕水者頃千金民相侵冒儉附故渠釃引旁出以廣溉道人以富饒子履行顯慶初亦居此職政有名李崇義河間元王孝恭子太宗時為益州都督府長史有威名李大亮涇陽人貞觀八年為劒南道巡省大使激濁揚清甚得名譽長孫操洛陽人貞觀中為益州長史以課最下詔褒揚韓思彥南陽人高宗時巡察劒南益州高資兄弟相訟纍年不決思彥敕廚宰飲以乳二人悟齧臂相泣曰吾乃夷獠不識孝義公將以兄弟共乳而生耶乃請輟訟蜀大飢開倉賑民然後以聞璽書褒美馮元常安陽人高宗時巡察劒南興利除害蜀土賴焉杜景佺武邑人性嚴正武后時為益州録事參軍時隆州司馬房嗣業徙州司馬詔未下即欲視事先笞責吏以示威景佺謂曰公雖受命為司馬州未受命何急數日祿耶嗣業怒不聽景佺曰公持咫尺制真偽莫辨即欲攪亂一府敬業揚州之禍非此類耶叱左右罷去按舊唐書通鑑佺皆作儉畢構偃師人中宗時兩為益州長史按察劒南振弊絶私號為清嚴睿宗立嘉構修潔獨行其治術又為諸使最乃賜璽書袍帶蘇頲武功人開元八年檢校益州大都督府長史按察節度劒南諸州時蜀雕敝人民流亡詔頲收劎南山澤鹽鐵自瞻頲尚簡靜重興力役即募戍人輸雇直開井置爐量入計出分所贏市穀以廣見糧時皇甫恂使蜀檄取庫錢市錦半肩琵琶捍撥玲瓏鞭頲不肯與或謂頲曰公今在遠豈宜忤聖意頲曰明主不以私愛奪至公豈以遠近間易忠臣節也倪若水藁城人以右臺監察御史黜陟劒南道繩舉嚴允課第一陸象先吳人明皇時為益州大都督府長史劒南按察使為政尚仁恕司馬韋抱真諫曰公當峻朴罰以示威不然民慢且無畏答曰政在治之而已必刑法以示威乎卒不從而蜀化李濬隴西人拜益州長史劒南節度使攝御史大夫所厯皆以誠信待物稱為良吏及去職咸有遺愛李璬明皇子天寶中領劒南節度大使帝西出令璬大設儲偫先即鎮以蜀郡長史崔圓為副璬渡綿州江登舟見綵緣席為藉者命撤去曰此可寢處奈何踐之視事兩月人甚安之韋倫京兆人明皇時從入蜀以監察御史為劒南節度行軍司馬置頓判官時中人衛卒多侵暴尤難治倫以清儉自將西人賴濟高適渤海人肅宗時為蜀彭二州刺史始明皇東還分劒南為兩節度百姓勞敝適上疏請罷東川以一劒南並力從事帝不納後梓州副使段子璋反適從崔光遠討斬之光遠不能戢軍以適代為西川節度使嚴武華陰人肅宗時坐房琯事貶巴州刺史遷東川節度使明皇合劒南為一道擢武成都尹劒南節度使破吐蕃七萬衆於當狗城遂收鹽川班宏汲人肅宗時高適鎮劒南表為觀察判官青城人以左道惑衆謀作亂事覺誣引屯將規緩死衆洶懼宏驗治即殺之人心大安張延賞猗氏人為劒南西川節度使建中間兵馬使張朏襲成都延賞諜知朏酣亂不設備遣將叱千遂捕斬朏復成都自楊國忠討南蠻三蜀疲罄及乘輿臨狩糜費百出後更郭英乂楊子琳亂益矜僭公私蕭然延賞事為之制薄入謹出府庫遂實德宗幸奉天貢獻踵道及次梁倚劒蜀為根本韋皋萬年人貞元初為劒南西川節度使治蜀二十一年數出師凡破吐番四十八萬擒殺都督節度城主籠官千五百斬首五萬餘級獲牛羊二十五萬收器械六百三十萬功烈為西南劇善撫士死傷婚嫁皆厚資之林藴莆田人貞元初西川節度推官劉闢反藴曉以順逆不聽復遺書切諫闢怒械於獄且殺之將就刑闢惜其直陰戒刑人抽劒磨其頸以脅服之藴怒曰死即死我項豈頑奴砥石耶闢知不可服捨之及闢敗藴名重京師盧坦洛陽人元和中為東川節度使盡捐鹽井榷率之籍吳少誠之誅坦遣兵屯安州每朔望使人問其父母妻子視疾病醫藥士皆感慰無逃還者李叔明新政人劒南判官招徠遺民時號能吏後拜東川節度使鄉邑凋落叔明治之二十年撫綏有方馮宿東陽人東川節度使涪水數壞民廬舍宿修治防庸一方便賴疾革將斷重刑家人請宥之宿曰命修短天也撓法以求佑吾不敢李夷簡唐宗室元和時為劒南西川節度使巂州刺史王容積姦贓屬蠻怒叛去夷簡逐容占檄諭禍福蠻落復平始韋皋作奉聖樂于頔作順聖樂常奏之軍中夷簡輒廢去謂禮樂非諸侯可擅制語其屬曰我欲蓋前人非以貽戒後來高崇文幽州人以左神䇿行營節度使討劉闢拜東川節度使擒闢檻送京師崇文入成都帥屯大逵市井不移珍貨如山無秋毫犯衣冠脅汙者請命為條上全活之刻石紀功鹿頭山武元衡文水人憲宗時為劒南西川節度使時蜀新定前節度高崇文不知吏治帝難其代遂有是命元衡至綏靖約束儉己寬民比三年上下完實蠻夷歸懷雅性莊重雖淡於接物而開府極一時選段文昌臨淄人穆宗初授劒南四川節度使文昌素諳蜀利病治寬靜間以威斷羣蠻震服長慶二年黔中蠻叛文昌使一介開曉蠻即引還彭濮蠻大酋蹉祿來請立石刋誓修貢獻太和中復節度西川卒崔戎安平人太和初為劒南宣撫使奏罷稅外薑芋錢當賦錢者率三之一以其一準繒布優其估以與民綏招流亡凡所廢置公私莫不便之盧宏宣開成中為東川節度使時歲飢盜贅結酋豪自王偽置官吏發廒廥招亡命聯蓬瀘嘉榮諸州訹蠻落搖亂根株槃熾宏宣下檄脅諭賊黨多降魁長逃入峽中吏捕誅之李德裕趙人為劒南西川節度使完殘奮怯皆有條次建籌邊樓按南道山川險要與蠻相入者圖之左西道與吐蕃相接者圖之右其部落衆寡餫饋遠邇曲折咸具乃召習邊事者指畫商訂盡知情偽又請甲人於安定弓人於河中弩人於浙西由是蜀之器械皆犀鋭率户二百取一人使習戰謂之雄邊子弟築仗義城禦侮城柔遠城復邛崍關遠民乃安二邊寖懼柳仲郢華原人大中中東川節度使孔目吏邊章簡以貨交近幸前後廉使無如之何仲郢因事決殺部內肅然在鎮五年美績流聞牛叢安定人咸通末拜劒南西川節度使時蠻犯邊抵大渡進略黎雅叩邛崍關謾書求入朝且曰假道叢囚其使四十人釋二人還之蠻懼即引去崔安潛全節人乾符中代高駢領西川節度使吏倚駢為姦利者皆誅之數更除謬政於是盜賊衰蜀民以安唐溪西川孔目官高仁厚平阡能等五賊陳敬瑄榜邛州賊黨皆釋不問未幾邛州刺史申獲對後苑鑑曰益部新復軍旅不和若聞使命驟至易其戎伍慮或猜懼變生不測請假臣安撫之名太宗善之鑑至蜀即部戍卒出境督繼恩等分路討捕殘寇招輯反側事遂平張玘西川都巡檢享化四年王小波掠彭山玘與鬭於江源縣射小波中其額旋被創死玘亦死之劉紹榮燕人為西川都巡檢使神禦軍卒亂或欲奉紹榮為帥者紹榮罵曰汝亟殺我我肯負朝廷哉叛卒遂擁王均為主紹榮自經死高繼􅈴蒙城人咸平初王均據益州以繼勳為益州兵馬都監以徑兵攻東郭二門克之賊退保子城餘黨保山藪中乃徙繼勳為綿漢劒門路都巡檢使繼勳募惡少年偵賊動靜窮躡巖穴掩其不備悉擒殺之張綸汝隂人以右班殿直從雷有終討王均於蜀有降寇數百據險叛使綸擊之綸曰此窮寇急之則生患不如諭以向背有終用其説賊果降以功遷厯益彭簡等州都巡檢使部卒掠居民綸斬首惡數人衆乃定雷有終郃陽人王均亂以有終知益州兼川峽兩路捉盜招安使平殄巨寇馬亮合肥人王均反以亮為西川轉運副使賊平亮全活數千餘人城中米斗千錢亮出廩米裁其價人賴以濟時諸州鹽井歲久泉涸而官督所賦課繫捕者州數百人亮盡釋之而奏廢其并又除屬部舊逋官物二百餘萬石普太原人王均叛以普為川峽路招安巡檢使佐雷有終率諸將進討至天回鎮賊拒戰普領前陳力擊破之賊退保益州普繕車炮又為地道攻城城破均夜遁普引兵追擊至富順監均自殺餘黨皆平馬知節薊人李順亂知節以羸兵三百守彭州賊十餘萬來攻城力戰破之授益州鈐轄加都巡檢劉旴叛逐都巡檢韓景祐知節與西川招安使上官正擊敗之斬旴旋知益州兼本路轉運使自乾德後歲漕蜀物動踰萬計時藉富民以部舟運坐沈覆破産者衆知節請代督以省校而程其漕事自是蜀人賴以免患趙禎宣城人遷益州路轉運使真宗諭曰蜀遠而數亂其利害朕所欲聞禎至數言部中事蒲江縣捕劫盜不得反逮繫平民楚掠誣服禎行部得其冤狀悉縱之再知益州度支市錦六千匹召工計歲織裁千餘匹止以歲所織數上供明鎬安邱人仁宗時益州路轉運使會歲飢民無積聚盜賊間發鎬為平物價募民為兵人賴以安韓琦安陽人仁宗時益利路飢為體量安撫使異時郡縣督賦調繁急市上供綺繡諸物不豫直崎為緩調蠲給之逐貪殘不職吏汰冗役數百活飢民百九十萬趙抃衢州人仁宗時為梓州路轉運使改益州路轉運使蜀地遠民弱吏肆為不法州郡公相餽餉抃整身率之蜀風為變窮城小邑民或生而不識使者抃行部無不至父老喜相慰姦吏悚服治平初復知成都以寬為治英宗立召還帝曰聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦稱是乎熙寧五年以大學士復知成都治益尚寬蜀郡晏然范純仁吳人神宗時徙成都路轉運使以新法不便戒州縣未得遽行安石怒純仁沮格遣使欲捃托私事不能得李之純無棣人為成都路轉運使成都歲發官米六千石損直與民言者謂惠民損上詔下其議之純曰蜀人恃此為生百年奈何一旦奪之事遂已秩滿復留凡數歲始還朝神宗勞之曰遐方不欲數易大吏使劒外安靜年榖屢豐以彰朝廷綏遠之意汝知之乎後復以直學士知成都府黃廉分寧人熙寧間為利州路轉運判官元祐初陸思閔茶法為川陜害遣廉使蜀按察至則奏罷其太甚者且言前所為誠病民若悉以豫之則邊計不集蜀貨不通園氓將受其弊請榷熙泰茶勿改而許東路通商禁南茶母入陜西以利蜀貨定博馬歲額為八千匹朝廷可其議使以直祕閣提舉王光祖開封人熙寧中為梓夔鈐轄渝獠叛詔熊本安撫與光祖同致討本疑光祖不為用使光祖將後軍出黃沙坎比發日已暮士相挽而前夜半抵絶頂質明獠望見大駭一鼓而潰楊萬等困於松溪又亟往援本愧謝上其功第一吐蕃圍茂州光祖領兵三千會王中正破雞宗關賊據石鼓村光祖擇鋭兵分襲吐蕃背出其不意皆驚遁後為瀘南安撫使兼領邊事吳玠永洛城人紹興九年金人請和帝以玠功高特進開府儀同三司遷四川宣撫使陜西階成等州皆聽節制治廢堰營田六十莊計田八百五十四頃歲收二十五萬石以助軍儲賜詔奬諭吳璘玠弟紹興初遷統制營仙人關金兵至關下璘血戰連日大敗之自是金人不敢窺蜀者數年進四川宣撫使守蜀二十年隱然為方面之重威名亞於玠張燾德興人高宗時知成都兼本路安撫許以便宜雖安撫一路而四川賦斂無藝者悉得蠲滅在蜀四年戢貪吏薄租賦歲旱發栗民得不飢暇則修學校與諸生講論蜀人懷其惠政李逮開封人紹興初為四川都轉運使兼提舉川陜茶馬請並提舉諸司以省冗費又奏欲省漕運莫如屯田漢中之地約收二十五萬餘石亦可稍寬民力降詔奬諭劉子羽崇安人張浚宣撫川陜辟子羽參議軍事浚合五路之兵以進子羽以非本計爭之會與金兵戰不利官屬有建䇿徙治夔州者子羽叱之謂宣使但當留駐興州以繫關中之望安全蜀之心又命吳玠柵和尚原守大散關而分兵悉守諸險寨金人知有備引去浚移治閬州子羽請獨留河池調護諸將以通內外聲援後拜利州路經略使兼知興元府再與金人戰全蜀之力子羽為多楊政臨涇人紹興十年金人渝盟政兼川陜宣撫副使司都統制凡大戰七斬獲甚眔胡世將晉陵人為四川安撫置使兼知成都宣撫吳玠以軍無糧奏請踵至世將既被命入境約玠會議蜀之餉運溯嘉陵江千餘里半年始達於是用轉般摺運之法軍儲稍充公私便之紹興九年玠卒遂以世將宣撫川陜鄭剛中金華人紹興中為四川宣撫副使宣撫司舊在綿閬間及胡世將代吳玠就居河池饋餉不繼剛中奏移司利州自是省費百萬奏蠲四川雜征於階成二州營田抵秦州界凡三千餘頃歲收十八萬斛李璆汴人遷四川安撫制置使成都舊城多毁圮璆至首命修築俄水大至民賴以安三江有堰灌眉田百萬頃久廢弗修璆率部刺史合力修復眉人感之繪像祠於堰所間遭歲飢發倉賑活無慮百萬家汪召嗣紹興中總領四川財賦軍馬錢糧奏蠲諸路久紹興十七年以前折估糴本等錢一百二十九萬餘緡米九萬八千七百餘石綾絹一萬四千餘匹蕭振溫州人高宗時知成都府制置四川軍儲適闕倉吏以窘告振奏留對糴米八萬斛以足軍食以其直歸計所秦檜風御史劾振要譽謫池陽檜死帝感悟亟遣振還成都父老歡呼載道振至一切以寬治或問其故振曰承縱弛革之當嚴今繼苛刻非寬則民力瘁矣帝嘉振治行謂宰臣曰四川善政前有胡世將今有蕭振進秩四等王剛中樂平人高宗時知成都府制置四川時吳璘纍官閥至大帥其下姚仲王彥等亦建節雄一方剛中檢身以法示人以禮恩威並行羽檄紛沓從容裁決皆中機會敵騎度大散關剛中夜馳二百里起吳璘於悵中責之曰大將與國義同休戚臨敵安得高枕而卧璘大驚又以蠟書抵張正彥濟師西師大集金兵敗走剛中謂其屬曰將帥之功吾何有焉成都萬歲池溉三鄉田歲久淤澱剛中疏之纍土為防上植榆柳州人指曰王公之甘棠也府學就圮繕完復其舊葺諸葛武侯祠張文定公廟夷黃巢墓表賢疸惡以示民盧法原德清人紹興中知夔州進川陜宣撫副使金兵攻關輔叛將史斌陷興州河東經制玉燮以乏食班師法原開關納之與燮同破斌復興州秦隴叛兵欲窺蜀法原極意拊循嚴為備禦視山川險阻分地置將前後屢捷汪應辰玉山人孝宗時為四川制置使知成都既至免利州路民餉運徙沿邊戍兵就糧內郡縱保勝義士復業存左藏所解白契二百萬以備不虞有謂蜀中綱馬宜浮江而下執政大將皆主其説應辰力言其不便遂得中止有欲增稅者應辰列奏民受其賜時吳璘駐蜀口病且死應辰遂攝宣撫之職蜀道晏然總所牒委官核四川匿契稅應辰奏其不便者四止之趙不􅖊宋宗室為成都轉運判官適歲飢不􅖊行抵瀘南貸官錢五萬緍分糴比至下令曰米至矣富民爭發粟米價遂平永康軍歲治都江堰吏盜金減役堰易圮故屢飢不􅖊躬視操版築繩吏以法乃出令民業耕者田主貸之事末作者富民振之老幼疾患者官為鬻視全活數百萬已而攝制司吐蕃酋豪夢束畜列入寇不􅖊遣軍赴沈黎且密檄諸蕃部許以重賞遂大破之於漢源斬豪首京鏜豫章人孝宗時為四川安撫制置使兼知成都府到官首罷征斂弛利以豫民范成大吳人孝宗時除四川制置使謂西南諸邊黎為要地增戰兵五千奏置都監路分吐蕃入寇之路十有八悉築柵分戍白水寨將王文才私取蠻女導之寇邊成大擒文才斬之蜀北邊舊有義士三萬本民兵也監司郡守雜役之都統司又俾與大軍更戍成大力言其不可詔遵舊法蜀知名士孫松夀年六十餘樊漢廣甫五十九皆挂冠不仕表其節蜀士由是歸心李蘩晉原人孝宗時提點成都路刑獄兼提舉常平嵗凶先事發廩蠲租所活百七十萬人知興元府安撫利州東路又總領四川財賦廷臣上言四川歲糴軍糧名為和糴實科糴也詔范成大同蘩相度以聞乃書利民十一事上之前後凡三年蘩上奏疏者十有三而降詔問難者凡八訖如其議民始知有生之樂梁洋間繪像祠之留正永春人淳熙初四川制置使兼知成都府平折稅價歲減酒課三十八萬以簡素化民歸裝僅書數簏人服其清趙汝愚餘干人淳熙間制置四川兼知成都府諸羌蠻相挺為邊患汝愚至以計分其勢孝宗謂其有文武威風邱崈江陰軍人光宗時擢四川安撫制置使兼知成都府崈素以吳氏世掌兵為慮挺死崈即奏乞選他將代之仍置副帥以殺其權其後郭杲繼詔復兼利西路安撫杲死韓托胄復以兵權付曦曦反識者乃服崈先見劉甲龍遊人纍官利東安撫使吳曦屢招中援大義拒之且以帛書告變朝廷稱忠臣者再曦誅除宣撫使未幾金自鶻嶺關進屯八里山甲守諸關截潼川戍兵駐饒風以待之移知潼川府權四川制置司事首罷互送禮廢茶鹽柴邸等法命屬吏討論田稅一府歲減百六十萬緡米麥萬七千石邊民感泣崔與之廣州人開禧中成都叛卒大擾命與之知成都府本路安撫使至即帖然時安丙握重兵久亦忌蜀帥之自東南來者至是獨推誠相與丙卒詔盡護西蜀之師拊循將士人心悅服吳獵醴陵人開禧中以四川安撫制置使兼知成都府嘉定六年召還家無餘資蜀人思其政畫像祠之丁黼成都制置使嘉熙中元兵將至黼先遣妻子南歸自誓死守元兵自新井入詐豎宋將李顯忠之旗直趨成都黼以為潰卒以旗榜招之既審知其非領兵夜出城南迎戰至石筍街兵散力戰而死黼帥蜀為政寬大蜀人思之事平賜額立廟孟珙棗陽人嘉熙四年為四川宣撫使兼知夔州釐蜀政之弊為條頒諸郡縣曰不擇險要立寨柵則難責兵以衛民不集流離安耕種則難責民以養兵乃立賞格以課殿最俾諸司奉行之尋兼夔路制置大使兼屯田大使大開屯田調夫築堰募農給種首秭歸尾漢口為屯二十為莊百七十為頃十八萬八千二百八十上屯田始末與所減劵食之數降詔褒諭余玠蘄州人理宗時授四川安撫制置使兼知重慶府四川總領兼夔路轉運使玠大更敝政遴選守宰築招賢館於府之左供張如帥府播州冉氏兄弟璡璞有文武才聞玠賢詣府上謁更闢别館以處之遂用其策徙合州城於釣魚山又築青居大獲等十餘城皆因山為壘碁布星分為諸郡治所屯兵聚糧為必守計又開屯田於成都蜀以富實用揚成計誅利司都統王夔後卒蜀之人莫不悲慕如失父母玠之治蜀也任都統張實治軍旅安撫王惟忠治賦財監簿朱文炳接賓客皆有常度至於修學養士輕徭薄征蜀既富實乃罷京湖之餉邊關無警又撤東南之戍自寶慶以來蜀閫未有能及之者陳隆之為四川制置使淳祐元年成都被圍守彌旬弗下部將田世顯乘夜開門元兵突入隆之舉家數百口皆死檻送隆之至漢州命諭守臣王夔降隆之呼曰大丈夫死爾毋降也遂見殺贈徽猷閣待制賜諡立廟張珏鳳州人寶祐末元兵攻蜀圍合州珏與王堅協力戰守攻之九月不能下王堅入朝珏治合練士卒修器械信賞必罰碇舟斷江中為水城元兵數萬攻之不克德祐元年為四川制置副使知重慶府元軍合兵圍重慶援絶糧盡珏遣張萬以巨艦載精兵斷內水橋入重慶元兵會重慶遣瀘州降將李從招降不從率兵與伊蘇岱爾戰兵潰帳下韓忠顯開門降珏率兵巷戰不支執送京師解弓弦自經伊蘇岱爾舊作也速䚟兒今改正張桂為四川都統劉整引兵襲桂營桂及統制金丈德戰死納溪曹贑闔門死之蒲東卯為四川轉運副使元兵至死之楊大異醴陵人除四川制置司參議官元兵入成都大異從制置使丁黼巷戰身被數創死闔門皆遇難詰旦復蘇其部曲負以逃獲免元廉希憲中統初並四川京兆為一道以希憲為宣撫使進平章政事奏四川降民皆散處山谷宜申敕軍吏禁止俘掠違者千户以下與犯人同罪又禁毋販易生口四川遂安宋將劉整以瀘州降盡繫前歸宋者數百人請誅以戒希憲與商挺奏釋之賽音諤德齊沙木思迪音回回人至元元年置四川行中書省出為平章政事蒞官三年增户九千五百六十五屯田糧九萬七千二十一石搏節和買鈔三百三十一錠七年分鎮四川與宋將咱萬夀對壘一以誠意待之不為侵掠及召還萬夀請置酒為好竟往不疑酒至左右言未可飲笑曰若等何見之小咱將軍能毒我其能盡毒我朝人乎萬夀嘆服賽音諤德齊沙本思迪音舊作賽典赤瞻思丁今改正王利用通州潞縣人中統中授四川提刑按察使土豪有持官府長短者問得其實而當以罪民賴以安都元帥達哈抑巫山縣民數百口為奴民屢訴不決利用承檄覆問盡出為民達哈舊作答海今改正李德輝潞縣人至元中奉命為四川總帥初憲宗惡合州久不下遺命克城盡屠其民宋守王立為元兵所逼乃間行至成都請降德輝乃單舸詣合受其降安集其民罷置其吏民德之建祠以祀談澄德興懷來人至元中四川僉省葬暴骸修焚室賑飢貧集逋亡民心稍安汪良臣鞏昌鹽州人至元十年授樞密副使西川行樞密院事平蜀之日禁焚掠發粟賑飢民大悅尋行四川中書省事陳治蜀十五事世祖喜納瘡痍之餘極意拊循蜀人安之汪惟正良臣猶子至元十七年遷中書左丞行秦蜀中書省事以省治遠在長安乃命惟正分省於蜀蜀土荐罹兵革民無完居聞馬嘶輒竄匿惟正留意撫循人便安之張庭瑞臨潢全州人世祖時成都總管蜀平升諸蠻夷部宣慰使碉門羌與婦人老幼入市爭價殺人碉門魚通司繫其人羌酋怒謀入劫之左丞汪惟正問計庭瑞請遣使往諭禍福惟正曰無以踰君庭瑞往酋果從命乃論殺人者而遣其餘且約交市以碉門為界又更官買茶法每引納二緡而付文劵與民聽其自市於羌羌蜀便之復立屯田以避陽山泝江運糧覆陷人得免患喇勒智喇斡唐古鄂摩克氏成宗時再遷四川行省參知政事進左丞蜀大飢親勸分以賑之所活甚衆有死無算者以己錢買地使葬且修寬政以撫其民部內以治喇勒智喇斡舊作立智理威唐古鄂摩克舊作唐几烏密今俱改正趙世延庸古特族人祖阿勒楚爾以蒙古漢軍征行大元帥鎮蜀至大元年世延除四川肅政廉訪使蒙古軍事科差繁重而軍士就戍往來者多害人且軍官或抑良為奴世延皆除其弊西正其罪又修都江堰民尤便之庸古特族舊作雍古族阿勒楚爾舊作按竺邇今俱改正張圭范陽人大德三年奉使巡行川陜問民疾苦賑恤孤貧罷冗官黜貪利趙資順帝時任行省參政守嘉定時右丞鄂勒哲依圖鎮重慶為明玉珍所敗因會平章隆和岱與資謀復重慶屯嘉定之大佛寺玉珍圍嘉定遣其黨明三奴輕兵襲陷成都虜隆和岱及資妻子以歸隆和岱妻自沈於江以資妻子徇嘉定招資降資引弓射殺妻俄城破擒資及鄂勒哲依圖隆和岱歸於重慶館諸治平寺欲使為己用三人執不可乃斬於市以禮葬之蜀人謂之三忠鄂勒哲依圖舊作完者都和隆岱舊作朗革歹今俱改正結當布元統中僉四川廉訪司事請罷鹽運司正鹽法撫流寓使安耕鑿時灌州都江堰厯年蕩齧結當布鑄鐵龜以鐵柱貫其中鎮之諸堰如制工成揭徯斯為之記結當布舊作吉當普今改正王守誠陽曲人至正五年宣撫四川廉訪某誣宣使蘇伯延行賄致瘐死重慶府官以私怨誣銅梁尹張文德縱盜罪加等守誠皆為直其事小民田婚之訟百十計亦為詳讞平反請復文翁石室為書院風采聳動天下論功居諸道最明茹太素澤州人洪武初擢四川按察使以平允稱朱守仁徐州人洪武十年進四川布政使治尚簡嚴多善政丁玉河中人洪武十年為右御史大夫威茂土酋叛以玉為平羌將軍討平之十二年平松州玉言松為西羌要地請立軍衛遂設官築戍會四川妖人彭普貴為亂焚掠十四州縣命玉移軍討滅之帝手敕褒美蔡運南康人建文時厯官四川參政徑直不諧於俗方法桐城人建文時以舉人授四川都司斷事永樂改元諸藩表賀法不署名被逮至望江投江死十一年本朝乾隆四賜諡忠節陳漣番禺人永樂初任蜀按察使務存大體不屑科條以誠感人人自不忍欺之耿九疇盧氏八永樂間任四川布政使性周詳綜理有法雖不事刑威而衆務修舉李敬宜興人素以材武稱宣德初授四川都指揮十三年保縣羌民黑大作亂敬直搗賊巢悉殲其衆生擒黑大送京升右都督府同知仍留守蜀龔璲南昌人宣德初任按察使守正不阿洞察民隱厯官四十餘年蕭然如寒士李斆涿州人宣德初任參議西戎叛圍松茂威壘都督陳懷總大軍征之棧路飛挽甚艱斆任轉運均其勞逸獲成功焉遷右布政使居蜀近十年不攜妻子唯一蒼頭供役朱與言萬安人宣德中為四川按察副使合州盜起督吏目馮鼎斬六十餘人賊勢遂衰雅州妖人為亂與言執送京師境內以安陳員韜臨海人宣德中出按四川黜貪奬廉雪死囚四十餘人王質太和人宣德末為四川參議疏陳十事咸切時弊行部惟啖青菜人呼為青菜王王翺鹽山人宣德五年巡按四川松潘蠻竊發都督陳懷駐成都不能制翺請移懷松潘而松潘軍糧於農隙起運護以官軍毋專纍百姓致被劫掠又請州縣土司遍設社學禁吏蠧事允行而遷蠧吏北京正統四年松潘都指揮趙諒誘執國師商巴掠其財誣以叛其弟怒聚衆剽掠命翺征之翺悉其枉出商巴於獄遣人招其弟撫定餘黨而劾誅諒松潘遂平邢旭金華人正統初四川布政使茂州土豪王永等聚衆讐殺官軍征之不克旭單騎撫之即歸附西鄙以安荆湘大祲流民萬餘入廣安等處剽掠僉議加兵旭堅持不可遣官馳諭移文所在賑濟之周濟洛陽人正統時巡按四川威州土官董敏王允相讐殺詔濟督官兵進討濟曰朝廷綏安遠人宜先撫而後征馳檄遂解李匡黃巖人正統初進士為按察司副使奉例録囚巡行郡縣平反數十事名大著及草塘大壩弗靖擢副都御史巡撫四川內理雕敝外調師徒頻年討平之羅俊安福人景泰中巡按四川有廉聲著有理冤録行世何洪全椒人景泰末以都指揮使掌四川都司事與平東苗憲宗即位擢都督僉事巡撫汪浩乞留洪四川許之德陽人趙鐸反連番衆數陷城殺將吏遣其黨何文讓及僧悟升掠安嶽諸縣洪斬悟升生擒文讓鐸將逼成都官軍三路分討洪偕都指揮安用趨彰明賊引去追至梓潼朱家河力戰賊少卻洪乘勝陷陳後軍不繼為賊所圍左右逃蕩殺賊甚衆力竭而死洪勇敢善撫士號令嚴蜀將無及之者詔贈都督同知劉雄臨淮人四川都指揮僉事為人剛徑遇敵輒前嘗捕賊漢州生擒七十餘人及趙鐸之亂追之羅江大水河馘數人賊連敗千户周鼎傷雄前救之徑奔賊陳叢刺死詔贈都指揮同知張瓚孝感人成化中巡撫四川會松茂番寇邊西鄙驛騷命瓚兼督松茂安綿建昌軍務瓚帥師破滅五十二寨殲其魁撒哈等餘一百五寨悉獻馬納款諸番悉平名著西蜀王軾公安人成化時為大理寺右丞録囚四川平反百餘人尋擢四川副使歲凶發廩賑貸請官銀十萬兩為糴費後按嘉定同知盛崇仁贓罪為其所搆下吏宏治初復擢四川按察使彭韶莆田人成化九年任四川按察使有扈氏曹氏殺人獄久不決韶至一詢得實撤境內淫祠王府祭葬舊遣內官公私繁費奏罷之夏塤天台人成化中巡撫四川苗獠時為寇塤立互知會捕法賊為之戢古州苗萬餘居爛土久時議逐之塤謂非計塤剛介善聽斷所至民不冤在蜀三年民夷畏服黃紎平越人成化中四川左參政崇慶州州西寺倚山為巢後臨巨塘僧夜殺人沈塘分其資且多藏婦女於窟中紎按部得其狀誅僧毁寺倉吏倚皇親乾沒官糧巨萬紱追論如法威行部中厯左右布政使奏閉建昌銀礦洪鐘錢塘人宏治初為四川按察使馬湖土知府安鼇恣淫虐土人婦女將婚必請命或至老不敢嫁殺無辜數百人掘塜墓焚廬舍甚衆讐家訐奏有司利其金遷延二十年僉事曲鋭請巡按御史張鸞按治鐘贊決捕鼇送京師置極刑安氏自唐以來世有馬湖至是改流官一方始靖謝士元長樂人宏治初巡撫四川土番有大小娃者將煽亂士元䚰行邊馳詣其地賊恐羅拜道左徐慰遣之歲大祲流民趨就食士元賑恤有方全活者數萬童軒鄱陽人宏治初以右副都御史提督松潘軍務值歲飢開倉賑貸資遣流移還業禁令所出軍民稱便南路鎮番素苦蠻賊出沒歲減軍餉充犒軍多逃亡軒易以官帑銀布軍乃無乏潘蕃崇德人宏治九年巡撫四川兼提督松潘軍務宣布威信番人畏服歲罷假道金千計捍禦撫輯積五年朝廷無西顧憂張昺慈溪人宏冶中厯四川僉事有富豪殺人屢以賄免御史檄昺治果得其情尋進副使守備中官某將進術士周慧於朝昺即擒慧治罪徙之極邊周瑛莆田人宏治中任四川參政遷右布政勵風節布袍瓦器意淡如也於民一介不取時論重之崔升安陽人四川右參政宏治丙辰監營夀王宫於保寧役者數萬人費核而力舒每行部勾稽既詳又喜廉臧否與僉事曲鋭齊名蜀人語曰崔參曲僉屹如雪山鋭萊陽人吳景南陵人正德中任四川僉事時流賊藍鄢之黨逼江津景率典史張俊迎擊城陷俱死王源五臺人正德中任四川僉事值賊藍廷瑞等作亂源巡厯營山賊己逼率典史鄧俊禦之顧兵無可用以死自誓城陷皆被殺彭澤蘭州人正德時總督川陜諸軍討四川賊時廖麻子喻思俸猖獗澤偕總兵官時源數敗之擒麻子於劒州思俸竄通巴間督諸軍圍之卒就擒以次討平內江榮昌諸賊並平成都亂卒之執知州指揮者詔留保寧鎮撫林俊莆田人正德四年巡撫四川時閬中賊藍廷瑞鄢本恕廖惠勢張甚俊督軍擊敗之擒廖惠以次擊瀘州賊曹甫破之復與總制洪鐘共擒本恕廷瑞而益發土兵擊剿甫黨方四纍功進右都御史中貴子弟欲冒軍功輒禁止去官之日士民號哭追送馬昊寧夏人正德時官四川僉事洪鐘討方四曹甫久無功昊知兵擇健卒千人教之從林俊敗甫江津又平方四及甫降而其黨廖麻子並其衆勢復熾鐘召還巡撫高崇熙仍主撫許以開縣臨江市處之昊力爭不從明年賊果叛詔逮崇熙以昊代與彭澤平廖麻子及內江賊駱松祥等羣盜悉靖王廷相儀封人正德中任四川提學僉事經品題者率以名著創建大益書院以祀前代諸賢嘉靖六年巡撫四川條陳川蜀利弊卓有經濟之略馮傑涿鹿衛人正德中官四川副使賊麻六兒逼川東傑率兵追擊於蒼溪俘斬頗衆日晡移營鐵山關賊乘夜衝突兵潰傑死之贈按察使諡恪愍盧翊常熟人正德八年任僉事成都之田皆資灌口堰水近源淤塞民稱病翊採衆議濬之澤潤數百里盛應期吳江人正德末巡撫四川討平天全六番招討使高文林會泉江蠻普法惡作亂富順姦民謝文義文禮附之應期督指揮何卿等先後討誅之胡世安仁和人正德末巡撫四川松潘所部熟番將吏久不能制率輸貨以假道世安陳方略請選將益兵立賞罰格嚴隱匿修烽堠時巡徼以振軍威通道路詔悉施行又劾副總兵張傑中官趙欽貪虐皆罷去吕翀永豐人正德時遷四川副使修都江堰以資灌溉水利大興薑寶丹陽人嘉靖時四川提學僉事能鑑識才器與諸生倡明道學一時蜀士彬彬文教翔洽余珊桐城人嘉靖初為四川副使分巡威茂律已清嚴居官威惠並施士民祀之顧珀晉江人嘉靖初為四川副使威茂二州地連松潘番人時出沒為患珀修城堡募材勇核賞番餘銀得萬兩雇民鑿石崁開衢路以通往來初番人入貢多挾刀乘間剽掠珀禁毋挾諸番帖然胡東皋餘姚人嘉靖初為四川副使分巡建昌前使多駐節雅州東皋親駐其地申嚴約束軍民帖然番賊入寇殲之無敢牧境上者平越巂嶺道使寇不得依據建昌有大渡水湍悍多覆溺為相山勢移其處人號胡公渡及去立祠祀之蔣信常德人嘉靖時為四川水利僉事播州土官以重賄饋於途叱去之盡心民瘼民無不得以情言者有道士以妖術愚衆後奪人資他司遣人往攝莫敢近信召之置諸法嚴清雲南後衛人嘉靖時官四川按察使右布政並有清望隆慶初巡撫四川清久宦川中僚吏憚其風采相率勵名行少墨敗者罷郡縣卒團操成都番人入貢裁為定額痛絶強宗悍吏大學士趙貞吉稱其約已愛人省事任怨當歲荒民流無不倚清如父母楊守禮蒲州人嘉靖中巡撫四川烏都鵓鴿諸番為亂與副將何卿討破之因進兵破遮花高黃脊魚二部又破鵝兒刁農雞公諸部降其餘寨番人震讋劉顯南昌人冒蜀籍為武生嘉靖中宜賓苗亂顯從巡撫張杲軍手格殺五十餘人擒首惡三人隆慶末敘州都掌蠻為亂其酋阿大阿二方三據九絲山僭稱王姦民阿茍為賊耳目巡撫曾省吾屬顯軍事往討諸軍集敘州誘執阿句鑿灘通餉擊斬賊黨阿墨遣間諜誘遂進逼九絲乘夜賊無備斬關而入二酋以次就擒録功進顯都督同知又擊西川番沒舌丢骨人荒諸寨斬其首惡撫餘衆而還建昌傀厦洗馬諸番咸獻首惡西陲以安曾省吾承天人四川巡撫都掌蠻據險剽掠時議征之萬厯元年省吾調兵攻拔淩霄都都九絲城巢穴盡獲其酋凡克寨六十拓地四百餘里劉綎顯子萬厯初從顯討九絲蠻勇冠諸軍尋以總兵官討播酋楊應龍賊聞綎至懼據洞堅守諸將憚其險綎左持金右挺劒督戰大呼曰用命者賞不用命者齒劒連克三洞賊盡鋭來攻綎設伏殲之乘勝追逐奪諸險隘後又討平建昌逆猓分八道督諸將進攻諸猓巢穴一空郭子章泰和人萬厯四年官四川提學副使聞來知德隱居著述遂單騎造廬知德款以粗糲瓦盆相對竟日忘返時人兩重之王廷瞻黃岡人萬厯五年巡撫四川番屢犯松潘令副使楊一桂總兵官劉顯剿之殲其魁羣蠻納款風村白草諸番久踞二十八寨率男婦八千餘人來降復命顯討建昌傀厦洗馬姑宰鐵口諸叛番皆獻首惡沈瑞臨仁和人萬厯中川東兵備僉事公廉有方略播州楊應龍煽動瑞臨撫攝應龍憚服威信終其任不敢叛以終養歸部中有羡金屬吏致贐瑞臨正色卻之歸囊不攜蜀中一物王象乾新城人萬厯中總督四川湖廣貴州軍務兼巡撫四川楊應龍初平分其地為遵義平越二府改設流官其遺黨吳洪結連水西為亂計平之李化龍長垣人楊應龍反化龍以兵部右侍郎總督湖廣川貴軍務兼巡撫四川討之分兵八道並進凡百有十四日而賊平播自唐乾符中入楊氏八百餘年至應龍而絶崔景榮長垣人巡按四川播州亂監劉綎吳廣軍會李化龍憂去景榮為請蠲蜀一歲租恤上東五路罷礦使敘監軍功晉太僕少卿周嘉謨漢川人萬厯十年為四川副使分巡瀘州窮治大猾楊騰霄置之死建武所兵燔總兵官沈思學廨單車諭定之尋撫白草番督兵邛州灌縣皆有方略李應祥九溪衛人萬厯十三年為四川總兵官討平松茂叛番明年平建昌越巂諸猓又明年平邛部逆酋以其地置屏山縣三巨寇積為蜀患至是悉定威振西南論功纍加都督同知被劾罷職會征播州再起合諸軍滅楊應龍仍留鎮蜀討其遺孽盡平之朱燮元山陰人萬厯末官四川副使尋遷左布政天啓初奢崇明父子反巡撫徐可求參政孫好古下東道李繼周下南道駱日升重慶知府章文炳總兵黃守魁皆遇害圍成都朝廷擢燮元右副都御史巡撫四川賊多方攻城燮元隨機應擊賊計無所施其將羅象乾降燮元與同卧起象乾感激誓報巳而諸軍至象乾內應賊遁去圍解復州縣衛所四十賊尚據永寧進克之殺奢寅崇明乞降拓地千餘里立屯制賦蜀中遂安徐如珂吳人天啓元年川東兵備副使擊殺奢崇明黨樊龍復重慶劉可訓澧州人恤刑四川會奢崇明反困成都可訓佐城守有功擢僉事監軍討賊崇明走龍場壩可訓督諸將進剿功最多總督朱燮元彚奏文武將吏功盛推可訓遷威茂兵備參議崇禎元年改敘瀘副使仍監諸軍與總兵侯良柱破賊十萬衆於五峯斬崇明及安邦彥御史毛羽健言可訓將孤軍久經蠻煙瘴雨五路大戰十道並攻皆抱病督師誓死殉國宜卑以節鉞帝頗納其言林兆鼎福建人天啓初為四川參將奢崇明作亂兆鼎進攻容仲壩直抵龍場擒崇明妻及弟蜀亂稍定擢副總兵馬如蛟和州人崇禎初出按四川安邦彥奢崇明為四川將士所馘而貴州軍與爭功如蛟劾巡撫蘇炎冒功罪蜀中姦民率以他人田産投勢家如蛟列上十事永革其弊施邦曜餘姚人崇禎時四川按察使有政聲或餽之朱墨竹者不受曰受之彼即得以乘間嘗我我則示以可欲之門矣性好山水或勸之遊峩眉曰上官遊覽動繁屬吏支應傷小民幾許物力矣其潔己愛民如此陳良謨鄞人崇禎十二年巡按四川張獻忠羅汝才猖獗楊嗣昌議盡驅入蜀蹙而殲之檄諸將集於鄖襄良謨曰是將以蜀為壑也躬閲關隘嚴飭文武將吏為堵剿計期滿當還詔留任專護蜀王良謨飭守具檄屬城堅壁清野數調諸將出擊賊犯成都良謨遣將列要害為掎角勢一再戰賊始奔潰優旨賜銀幣明末殉難本朝乾隆四十一年賜諡恭潔綏力請緩賦省刑獻忠陷蜀之勃被執賊以其同鄉欲用之之勃勸以不殺百姓改邪歸正輔立蜀世子賊不從大罵而死本朝乾隆四十一年賜諡忠烈本朝孟喬芳漢軍鑲紅旗人順治元年總督陜西二年冬遣總兵范蘇等入蜀討張獻忠克復龍安疏陳蜀地守戰之計多見施行尋總督川陜三邊軍務卒諡忠烈李國英漢軍正紅旗人順治三年從肅王取蜀殲獻賊大兵凱旋留國英鎮保順間剿平餘賊代王遵坦為巡撫治兵閬中軍旅之後飢疫頻仍國英勸農桑備戰守禮賢興學士民復業劉文秀逼閬中漢沔震動國英舉兵破之尋總督川陜康熙元年詔帥湖廣陜西河南四川四省兵會剿茅麓山賊李來亨袁宗第等國英師次夔府伐榛莽道以進遂奪羊耳山敗宗第於茶園坪追及巫山據其城宗第又合郝永忠劉體純引衆數萬來攻我兵出戰體純潰自殺乘勝追至黃草坪永忠宗第以次授首遂進兵圍來亨於茅麓山來亨窮蹙偕妻子自經死寇孽悉平國英鎮蜀凡二十有一年以勞瘁卒於宫賜諡勤襄入祀賢良祠郝浴定州人順治八年以御史巡按四川時巨寇劉文秀等踞滇黔吳三桂握重兵屯川南七年無功部下尤淫殺不法既而兵敗三桂遁至綿州會浴在保寧監省試賊騎且抵城下浴撫安士民一晝夜七馳檄邀三桂還泱䇿固守賊勢張甚浴遍厯行間以忠義激發將士與賊戰遂大破之浴疏陳蜀事即密言三桂縱兵焚掠陰蓄異志諸姦狀三桂銜之誣以他事坐降調歸康熙十二年三桂反起用張椿陽城人順治八年巡按四川時保順二府初隸版圖椿請撥牛種五萬給兵民資耕稼是歲除供軍儲外仍貯粟六千八百有奇又疏請振興文教整肅吏治蜀人德之陳安國沔縣人以僉事監軍四川會巨寇攻保寧甚急安國詣西安乞兵總督孟喬芳應之圍遂解又嘗降姚黃賊衆數萬尋以事下獄後得白擢井陘道張所志漢軍正黃旗人順治十一年巡按四川時土廣人稀道路榛莽所至招輯流遺各令復業疏陳全川事宜多蒙采納佟鳳彩漢軍正藍旗人康熙元年巡撫四川疏請修復都江大堰民田被其利卒入祀名宦祠張松齡莆田人康熙元年為四川參議蜀當雕敝之後民多逃竄松齡招徠之給以牛種民復其業張德地漢軍鑲藍旗人康熙三年巡撫四川初總督苗澄以蜀省額兵四萬欲抽撥七千人屯田計一歲所獲可資軍餉德地恐兵不習耕土不宜人獨持不可欲度防禦稍輕之地量為裁汰歲計所減亦當屯田收獲之數疏聞報可又請定夔關總稅裁越巂會川鹽井梅嶺安寧大壩諸處雜稅商旅德之郎廷相漢軍鑲黃旗人康熙三年官四川布政使綏集流移給廬舍耕具營廨舍建學校兵大之餘百廢具興民不知擾擢河南巡撫遠近攀留者遮道號泣李翀霄絳州人康熙三年為四川按察使蜀亂初定鞫治脅從株連者三百人翀霄止殲渠魁三人餘盡開釋又請罷陜西茶馬以除蜀民之纍音泰滿洲鑲紅旗人康熙十三年隨征逆藩吳三桂叛黨談宏等屢敗賊兵十九年進征四川克保寧敘州授驍騎校四十八年遷川陜總督四十九年斡偉番蠻羅都等劫掠建昌衛提督嶽升龍疏請往勦上命巡撫年羮堯偕往羮堯至升龍已擒羅都等三人羮堯光還升龍同總兵郝宏勳招降番蠻十餘萬音泰即請以降酋為土司分隸其衆因劾年羮堯不偕往並先還罪狀諭曰音泰潔清自持不徇情面乃實心任事人也卒諡清端杭愛滿洲正白旗人康熙十三年吳逆叛杭愛以陜西巡撫督運糧餉十九年調四川巡撫會逆鎮談宏叛將軍噶爾漢等往剿命杭愛與將軍吳丹等慰撫夔州諸路以安反側明年建昌土司安泰平陰蓄亂謀杭愛申諭禍福泰平懼來降先是吳逆倡亂四川郡縣悉為賊踞百姓逃亡辨兵強占民田抗賦不納至是杭愛疏言方今逆孽漸平逃亡漸復請急行清理占種民田者令即給還違者論罪若開墾年久無原主者仍聽佃種得旨允行諡勤襄入祀名宦祠趙良棟寧夏衛人康熙十力年以勇略將軍討吳三桂破賊帥吳之茂於石峽由陰平間道入成都衆奔潰旬日間郡邑傳檄而定明年擊賊黨胡國柱等克關山象嶺黎州諸地於是建昌諸道相率歸款良棟行軍有紀律所過秋毫無犯蜀人德之卒諡襄忠楊茂勳漢軍鑲紅旗人康熙十九年總督四川吳三桂偽總督王公良率偽將軍王鳳岐劉之衛等據夔州茂勳統兵由楚江峽路逆流而上破巫山帆風直進不二日抵夔城兵刃未交羣賊宵遁王之鼎漢軍正紅旗人官四川提督康熙十九年駐節永寧吳三桂偽將胡國柱等圍城急之鼎堅守彌月援兵未至城陷被執不屈死贈太子少保賜諡忠毅王騭福山人康熙十九年分巡松茂道蜀中甫定騭招徠撫馭嘗築都江堰隄以導水利民多賴之姚締虞黃陂人康熙二十四年巡撫四川時蜀之宦遊者多以故土荒殘逗留異地締虞具疏請令還籍以實地方並核勘田畝均徭賦户口日增凡利弊之切於民者悉心調劑李輝祖漢軍鑲白旗人康熙二十七年官四川布政使時歲供蠟料棧道險阻民多以為病輝祖力請於巡撫奏罷之綏流民闢荒土按畝徵賦民以為便人祀名宦祠嶽升龍莊浪衛人康熙三十七年官四川提督時建昌涼山諸番蠢動升龍率勇敢士直逼賊巢番衆震懾棄戈投款者凡十萬九千户陳璸海康人康熙四十八年督學四川屛絶請託以甄拔人才為心蒞官之日止一蒼頭隨侍襆被蕭然衡校每至夜分不輟黃廷桂漢軍鑲紅旗人雍正二年任四川提督奏請速製軍械别建馬廠禁士卒驕奢嚴番蠻防範疏聞報可時建昌蠻新隸版籍屢肆竊掠廷桂擒治之番蠻畏服乾隆初再任四川總督飭通省勘修塘堰山田悉成腴壤打箭爐外孔撒麻書兩土司搆釁撫馭解散全活無算卒諡文襄圖形紫光閣入祀賢良祠班第蒙古鑲黃旗人乾隆初署四川巡撫十四年以副都統銜西藏辦事時西藏郡王謀叛駐藏都統傅清以計誅之旋為逆黨所害勢甚紛囂班第抵藏撫馭衆番誅逆衆西藏遂定傅恆滿洲鑲黃旗人乾隆十三年以協辦大學士經略大金川時小金川土司澤旺之弟良爾吉與大金川土酋莎羅奔相結為亂至則偵知良爾吉之惡以其方握兵柄謀以其弟小郎素代之乃説令來見梟其首而授小郎素為副土司一時兵辨番民凛然聽命遂由黨壩進剿揚言攻康八達而暗襲跟雜復臨勒烏圍隘口斬殺甚衆土酋懼乞降金川平卒諡文忠晉贈郡王阿桂滿洲正白旗人乾隆三十六年授四川總督偕副將軍溫福剿金川命為定邊左副將軍三十八年索諾木誘小金川降蠻襲控卡後路溫福兵潰小金川美諾相繼陷命為定邊將軍攻破布朗郭宗諸寨别遣將由北山西下賊不能支遂克美諾收占古七日而小金川全復明年冒雪克喇穆等處連戰至該布達什各路兵俱乘勝進明年遂據刮耳崖偵知索諾木之母往河西收餘衆因選兵間道下河邊賊信隔絶懼甚我兵圍賊益急索諾木詣營乞降大小金川平封一等誠謀英勇公卒諡文成入祀賢良祠費元龍歸安人乾隆間由知縣洊升四川按察使司副便在蜀十餘年整躬率屬潔己愛民為綿州開翥鶴堰灌下遊田數萬畝盡為膏腴為潼川創立文峯書院與諸生辨論經旨多所造就陳奉兹江西德化人乾隆間官四川按察使勤政愛民釐姦剔弊所至俱有名顧光旭金匱人乾隆三十七年署四川按察使扶善抑姦吏民肅然以總理軍儲出南徼事竣回成都百姓以香盆花燭迎者數萬人時塞外軍興而腹地民不知兵光旭之力也後終養歸百姓送者亦數萬人劉棨諸城人乾隆間官四川布政使有治績上詢九卿以本朝清介大臣數人求可與倫匹者九卿舉四人棨與焉後因籌畫兵備勤勩致疾卒於官德楞泰蒙古正黃旗人嘉慶三年以副都統銜偕尚書惠齡剿白蓮教匪於營山縣之箕山大破之擒首逆羅其清等五年春餘孽嘯集渡嘉陵江勢張甚授四川總督與總統勒保分路會剿由廣元出江油扼龍安要隘使與甘省賊不得合轉戰至馬蹄岡獲其黨復進至劒州連破之賊狂奔渡潼河躡賊後五晝夜不少息至蓬溪縣殲其渠潼河東西肅清掃除餘孽三省蕩平封一等侯卒入祀昭忠祠詔川省建立專祠俾得常欽威略云方積定遠人嘉慶間纍遷四川按察使時馬邊熟夷赤夷與峩眉嶺夷結梁山生番寇邊積偕提督豐紬由馬邊三河口鑿山深入克六拔夷巢遂由赤夷間道進攻嶺夷十二地浹旬之間每戰皆捷官蜀二十餘民措注有方用兵能獨當一面初今梁山時教匪滋擾首行堅壁清野法他邑流民依集者三十餘萬人萬縣賊起越境平之又於望牛埡殲賊首林廷相屢奉諭旨褒嘉卒入祀名宦祠前總纂官臣李九涵恭纂輯提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣沈維鈺恭覆校
