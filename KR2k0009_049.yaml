front:
  text: 心薛善汾陰人爲汾陰令幹用强明一郡稱最太守王羆美之令兼督六縣事柳帶
  hash: sha256:faceeca29f36cc569e7f80fe6d0ce070a21cea0978ba355acd441ed02ad87f36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_049-1a}
body:
  text: 韋解人魏末爲汾陰令發摘姦伏百姓畏而懷之周李遠成紀人時河東初復人情未安文帝以河東爲國之要鎭乃授河東郡守遠敦奬風俗勸課農桑肅遏姦非兼修守禦之備未期月百姓懷之隋楊處綱高祖族父拜蒲州刺史吏民悦之楊宏高祖從祖弟拜蒲州刺史時河東多盗賊宏奏爲盜者百餘人投之邊裔州境恬然號爲良吏在官十餘年風敎大洽楊尚希宏農人高祖時拜蒲州刺史甚有惠政引瀵水立隄防開稻田數千頃民賴其利辛仲龕狄道人爲猗氏令以政績著榮毗無終人自華州長史轉蒲州司馬漢王諒反河東豪傑以城應諒刺史邱和覺變遁歸關中長史渤海高義明謂毗曰河東要害國之東門城中非悉反但收桀黠者十餘人斬之自當立定毗然之義明馳馬追和將與恊計至城西門爲反者所殺毗被執諒平拜治書侍御史堯君素湯陰人大業末從屈突通拒唐師于河東通引兵南遁以君素署領河東守唐遣將攻之不克及通軍敗至城下呼君素與俱降君素以名義責之通慚而退唐賜之鐵券待以不死君素卒無降心其妻至城下謂之曰隋室已亡君何自苦君素引弓射之應弦而倒君素亦知事必不濟然守死不易善于統領下不能叛歲餘糧絶為左石所害唐唐臨長安人武德𥘉出為萬泉丞有輕囚久繫方春農事興臨説令可且出囚使就畎畝不許臨曰有所疑丞執其罪令移疾臨悉縱歸與之約囚如期還薛萬徹咸陽人太宗時為蒲州刺史于虞鄉縣北十五里開涑水渠自聞喜引涑水下入臨晉遷代州都督宇文士及長安人太宗時為蒲州刺史政尚寬簡人皆宜之杜楚客杜陵人太宗時進蒲州刺史政有能名蔣儼宜興人高宗時進蒲州刺史户産充夥訟獄積年不平前刺史踵以罪去儼至發隱禁姦號良二千石徐有功偃師人高宗時𥙷蒲州刺史叅軍為政仁不忍杖罰民服其恩更相約曰犯徐叅軍杖者必斥之訖代不辱一人徐彦伯瑕邱人蒲州司兵叅軍時司户韋暠善判司士孝亘工書而彦伯善屬辭時稱河東三絶齊澣宜豐人為蒲州司法叅軍有父子連坐論死者澣曰條落則本枯奈何俱死議貸其父太守不聽固爭辛得免陸象先呉人明皇時徙為蒲州刺史兼河東按察使小吏有罪誡譴之大吏白爭以為可杖象先曰人情大抵不相遠謂彼不曉吾言耶必責者當以汝為始大吏慚而退嘗曰天下本無事庸人擾之為煩耳第澄其源何憂不簡耶故所至民吏懷之姜師度魏人明皇時為河中尹安邑鹽池涸廢師度大發卒疏水導流置鹽屯公私收利不貲裴寬聞喜人明皇時為蒲州刺史州久旱寬入境輒雨李麟唐宗室明皇時為河東太守有清政李尚隱萬年人明皇時為蒲州刺史浮屠懷照者自言母夢日入懷生己鏤石著驗尚隱劾其妖妄詔流懷照播州趙復肅宗時為永樂尉安祿山亂使其將崔乾祐守河東復與河東司士徐炅等陷賊中相與密謀為内應郭子儀引兵來攻復斬守陴者納之乾祐遁去顔真卿萬年人至德中轉蒲州刺史李模唐宗室至德中為猗氏令史思明陷洛陽賊帥掠諸縣模率衆拒卻之王翃晉陽人代宗時為河中少尹領節度悍將凌正數干法不逞約其徒夜斬關逐翃翃覺之陰亂漏刻以差其期衆驚不敢發俄禽正誅之三軍惕息李鄘江都人初補秘書省正字李懷光辟致幕府懷光反河中鄘與高郢刺賊虚實及所以攻取者白諸朝徳宗手詔襃答懷光覺嚴兵詔二人問之鄘詞氣不撓三軍為感動懷光囚之河中平馬燧破械致禮表佐其府高郢衞州人為猗氏丞會李懷光萌反意將還河中郢勸以西迎乘輿不聽既又悉兵欲西郢誓死止之懷光子琟來候因喻以大義琟懼流涕時因事亟郢謀閒道逃歸事洩引郢詰誚抗詞無隱諌議大夫孔巢父使河中遇害郢撫而哭之事定李晟表其忠焉裴行立稷山人初為衞尉少卿自陳願治民試一縣自效除河東令寬猛時當李承高邑人德宗時擢拜河中尹晉絳觀察使廉正有雅望以才顯于時張圓偃師人憲宗時河中府法曹叅軍攝虞鄉令進攝河東令皆有能名王起揚州人穆宗時厯河中節度使方蝗旱粟價騰踴起下令家得儲三十斛斥其餘以市神䇿軍士怙勢不從寘之法由是廥積咸出民賴以生五代周王仁鎬龍岡人顯德中由永興節度使移河中㑹殿中丞上官瓚使河中還言河中民多匿田租遂遣瓚按視百姓苦之多逃亡仁鎬抗論其事乃止宋柴成務濟陰人太宗時知河中府時銀夏未安蒲津當餽輓之衝事皆辦集得脱戸八百家以附籍府城街陌狹隘成務廣之其後祀汾陰留蹕河中衢路顯敞咸以為便狄棐長沙人真宗時知河中府有中貴人過郡言將援棐于上前棐答以他語其為政愷悌不為表暴死之日家無餘貲王濟饒陽人景德初徙知河中府契丹南侵上幸澶淵詔縁路斷橋梁毁船舫稽緩者論以軍法濟曰陜西有關防隔閡舳艫遠屬軍儲數萬一旦沈之可惜又動摇民心因密奏寢其事上深嘉歎遣使襃諭周起鄒平人從真宗祀汾陰留權知河中府有風烈賜書襃諭范仲淹呉縣人天聖中通判河中府政尚忠厚有恩于民楊偕坊州人仁宗時知河中府元昊反劉平石元孫戰沒偕聞乃偽為書馳告延州曰朝廷遣救兵十萬至矣命傍郡縣大具芻糧什器以俟比書至賊已解去夏竦為陜西經畧使請増置土兵易戍兵歸衞京師偕言方關中財用乏復増土兵徒耗國用今賊勢方盛雖大増土兵亦未能減戍兵東歸第竦懼敗事欲以兵少為解耳竦奏偕沮邊計偕爭愈力錢晦臨安人至和中知河中府守典故明詔條約吏處民率有常節筵饌具禮而已民甚安之趙瞻盩厔人仁宗時為萬泉令捐圭田修學宫士自遠而至朱選天長人仁宗時知河中府忠厚自守稱為長者顔太初彭城人顔子四十七世孫仁宗時補臨晉主簿有能名王闢之臨淄人為河東令吏治精敏毁淫祠作夷齊廟祀之趙尚寬河南人神宗時徙知河中府神勇卒苦大校貪虐刊匿名書告變尚寛命焚之曰妄言耳衆乃安已而奏黜校分士卒隸他營范純仁仲淹子神宗時知河中府諸路閲保甲妨農論救甚力錄事參軍宋儋年暴死口鼻血出獄疑純仁按得其妾與小吏姦因會毒殺之遂正其罪游師雄武功人紹聖初知河中府時久旱雄入境即大雨民歌咏之又自中條山下立渠堰引倉陵谷水注之城中民便溉汲孫載崑山人紹聖初為河中府戸曹更三守皆尚威嚴載獨與之爭曲直不肯詭隨後除河東轉運判官時稱循吏晁補之鉅野人徽宗時知河中府修河橋以便民民畫其像祀焉從弟詠之工于文亦嘗為河中敎授楚建中洛陽人知榮河縣民苦鹽税不平建中約田多寡以為輕重公私便之閻詢天興人以集賢殿修撰知河中府大河漲壞浮橋詢易為長橋焉郝仲連昌元人建炎元年金兵至河中守臣席益遁去仲連節度河東兵馬屯河中就權府事金將羅索以重兵壓城仲連率衆力戰外援不至度不能守先自殺其家人城陷及其子皆遇害後贈明州觀察使羅索舊作婁宿今改正金牛德昌定安人為萬泉令屬蒲陜薦饑羣盗充斥城門晝閉德昌到官開城門縱出入牓曰民苦饑寒剽掠鄉聚以偷旦夕之命甚可憐也能自新者亦不問賊皆感激解散縣境以安呉鑄長春人大定三年爲榮河令撫民有方蝗不入境旱禱即雨民刻石頌之晁㑹高平人厯臨晉虞鄉猗氏三縣令善訓誨勤撫字分俸以給貧乏累遷至節度使張萬公東阿人明昌六年知河中府時軍興調發繁劇悉爲寛假使民力易辦人爲繪像于薰風樓又建去思堂李復亨河津人承安中調臨晉主簿護送官馬入府宿逆旅有盜殺馬復亨曰不利而殺之必有讐者盡索過客得同邑人槖中盛佩刀謂之曰刀衊馬血火煅之則刀青其人款服果有讐完顔宗道上京司屬司人承安中知河中府有惠政民立像于層觀以時祭之完顔伯嘉北京路人興定元年知河中府明年權行尚書省元帥府于河中控制河東南北路三年廷議欲棄河東徙其民以實陜西伯嘉上書切諫忤宰執意召還元光二年權行尚書省于河中率陜西精鋭與乎陽公史詠共復河東博豁哩元光元年知河中府事權安撫使廉直忠孝公家之利知無不爲以薦召爲大司農博豁哩舊作把胡魯今改正完顔額珂内族也時有兩額珂一曰草火額珂一曰板子額珂正大入年九月元主攻河中哀宗以兩額珂將兵二萬守之元軍命築松樓高二百丈下瞰城中穴地百道並進攻甚急兩額珂軍士殊死鬬力盡城陷草火額珂復戰數十合被擒見殺板子額珂奪船走轉戰至閿鄉將佐責以不能死車載入陜西杖死識者冤之額珂舊俱作訛可今改正元劉天孚大名人知河中府視事兩月陜西行省丞相阿斯罕爲亂渡河入城坐府治號令諸軍天孚佩刀直前衆遏之不得進乃出時河冰堅天孚拔刀砍冰開北望爲國語再拜祝謝遂投水中郡人咸哀痛之阿斯罕舊作阿思罕今改正伊烈什特穆爾威烏人泰定間爲萬泉尹通經重道公廉有爲嘗請免税以濟民饑民爲立石頌德伊烈什特穆爾舊作月輪失帖木兒威烏舊作畏兀今並改正石正卿河南人泰定間爲萬泉尹政尚廉平訟無冤濫李好文東明人錄囚河東有李拜拜者殺人而兇仗不明十四年不決好文立出之王傅素達拉以足蹋人死好文曰怙勢殺人甚于用刃况因有所求而殺之其情尤重乃置之死河東為之整肅素達拉舊作撒都刺今改正靳克忠潞州人通經術精吏治知河中府天厯元年額森特穆爾叛軍河西岸克忠併力守禦及城陷被執抗論不屈遂遇害贈陜西行臺叅知政事謚忠愍額森持穆爾舊作鐵木兒今改正巴克扎喀威烏人河中府達魯噶齊與靳克忠俱死巴克扎喀舊作八扎海牙達魯噶齊舊作達魯花赤今並改正明康茂才蘄州人洪武初守禦蒲州造浮梁于蒲津以渡師又請以官鹽易米公私兩便發倉粟賑饑全活甚衆曹端澠池人宣德中為蒲州學正修明聖學諸生服從其敎州人皆化之張廉咸寕人正統中蒲州判官部民狀其賢能擢知州事剗刮積弊日課吏讀律曰使民知法且不暇游惰毛鳳來西平人成化中知臨晉縣歲大饑盡發倉粟以賑又勸富民出貸存活甚衆盜竊發立捕斬之人謂寬嚴並濟侯祁鄲城人嘉靖中知榮河縣時當地震後井里蕭條祁卹民弭盗一邑安謐凡城池學校皆所建置又創大安書院設師儒其中公餘時親誨之士興于學宋訓新蔡人隆慶初知蒲州州城舊土築悉易甎石増置樓櫓他所興舉皆有益士民史邦直樂陵人隆慶中知臨晉縣數微行境内室廬田畝皆能識其處晉軍素驕邦直裁之以法莫不帖服李廷諫淶水人隆慶中知萬泉縣興學校均税糧頗多惠政修復薛通城尤有保障功趙岸盩厔人萬厯九年知臨晉縣廉明善斷雖大獄不移時決鄰邑質成者甚衆歲旱禱雨輒應陳經濟禹州人萬厯十三年知猗氏縣歲大饑捐俸設粥厰全活甚衆解州七郎堰壞延二十里知州請役十縣夫築之經濟曰城隄非鹽隄可比奈何徴役各縣乎卒不應郭有涇陽人萬厯中知猗氏縣有慈母神君之譽所張縑蓋縷裂弗易以憂歸再補猗氏邑人歡迎塞道朱之馮大興人崇禎三年河東副使駐蒲州所部鄰秦豫冦警日至大猾朱全宇潛通秦賊之馮令廢將謝鳴進執殺全宇部内以安本朝林天擎奉天人順治二年以貢生知蒲州招集流亡寬夫伇安插兵民具有幹畧州人胥頌之錢法裕遼東籍仁和人順治三年知蒲州姜瓖之亂城陷𬒳執不屈死贈布政司參議祀忠烈祠陳素抱鐵嶺人順治二年知猗氏縣陳蠻子脅衆為亂素抱曰愚而詐人必不附已而果為鄉勇所殺姜瓖之亂陜督來剿素抱已備兵潼關向制府渡河力陳猗氏民必不應賊請以其子佩從令先馳至縣召士民出迎制府慰勞大兵遂不入境呉自肅海豐人康熙中分守河東道賊張化金者據中條山為州縣患自肅招降之又疏河渠廣學校設粥以救餓者乾隆十八年祀名宦許嗣興奉天人康熙十一年知蒲州葺廟學復河中書院治豪猾為民害者時檄民運米西安嗣興請至陜界而止客兵往返境内不敢肆民皆德之陶自悦武進人康熙戊辰進士知猗氏縣性敦厚為政寛嚴並濟有古循吏風邑士為文導以先正舊法一時科第輩出莫不感頌陳騰章賀縣人康熙五十三年以舉人補授猗氏縣知縣慈惠廉平時值用師哈密軍需車仗等設法供辦不責里甲卒于官貧不能殮二年始克歸葬葉佩蓀歸安人乾隆閒任河東道三十八年蒲州河水泛溢捐俸賑卹全活無算清釐鹽政力行保甲治績卓然嘉慶二十五年祀名宦人物漢胡建字子孟河東人孝武天漢中守軍正丞貧無車馬與走卒起居甚得其心時監軍御史為姦穿北軍壘垣以為賈區建約其走卒斬之乃具奏以聞制曰可由是顯名按諸史列傳有稱人而但舉其郡者有舉其郡而兼及其縣者如尹翁歸河東平陽人此兼郡縣言之者也若胡建惟以郡言之者也漢地理志河東郡聞喜平陽皆在後而先列蒲人則知諸傳但言河東者大抵皆蒲阪人耳暴勝之字公子河東人武帝命為直指使者衣繡衣持斧逐捕盗賊威鎮州郡素聞雋不疑賢表薦之大始元年遷御史大夫姚平河東人受焦延夀易于京房為郎博士由是易有京氏之學三國魏樂詳字文載河東人少好學建安初聞南郡謝該善左氏傳步涉詣該問疑難諸要七十二事既了而歸時杜畿為太守署詳文學祭酒使敎後進于是河東學業大興黄初中徴拜博士五業並授牽譬引類至忘寢食又善推步與定律書轉拜騎都尉正始中以年老罷歸門徒數千人王蔚猗氏人漢京兆尹尊九世孫世修儒史之學中領軍曹義作至公論蔚善之更著至機論辭意甚美官至夏陽侯相按漢王尊涿郡人晉書稱蔚爲其九世孫而云猗氏人蓋尊後人而遷于此焉晉王接字祖游蔚之子居父母喪柴毁骨立廬墓積年裴遐鄧攸等皆與友善後爲郡主簿累遷征虜將軍司馬蕩陰之役侍中嵇紹爲亂兵所害接議山東方欲大舉宜加紹致命之賞以厲天下朝廷從之年三十九卒接博通衆書尤精禮傳以何休釋公羊大體乖硋更註之多有新義又論定衞恒等所考正汲冢書又撰列女後傳七十二人喪亂盡失長子愆期流寓江南緣父本意更注公羊又集列女後傳云薛興汾陰人尚書右僕射冀州刺史封安國公卒諡曰莊子濤襲父爵梁州刺史卒諡忠惠晉室傾覆父子皆以義烈著聞薛强字威明汾陰人㓜有大志懷軍國籌畧與北海王猛友善桓温入關中與猛皆署軍謀祭酒欲與俱南强察温無成功乃勸猛止先是中原傾覆强父陶與同族薛祖薛洛分立部衆世號三薛强領父衆兼統三營善撫綏為民所歸及苻堅如河東與數百騎馳至壘下求與相見强慷慨言曰此城無生降之臣有死節之將耳乃捨之後堅伐晉軍敗强遂總宗室强兵威震河輔破慕容永于陳秦川姚興聞而憚之重加禮命年九十八卒南北朝魏薛辯字允白强之子俶儻多大畧豪傑多歸慕之初仕姚興後歸魏立功于河際位平西將軍東雍州刺史賜爵汾陰侯在鎮務農敎戰恒以數千之衆摧抗赫連氏除并州刺史徴授大羽真泰常七年卒薛謹字法順辯之子貌魁偉高才博學隨宋武帝渡江位府記室參軍歸魏授河東太守所治與屈丏連接結士抗敵甚有威惠襲爵汾陰侯始光中討赫連昌剋蒲坂遂以新舊百姓并為一郡復為太守神䴥三年除使持節秦州刺史討山胡白龍平之封汾陰郡公征吐沒骨又平之謹在州郡並著威惠風化大行真君元年徵入輔政車駕臨幸數四深見賞重諡曰元公薛洪祚謹之子世祖賜名𥘉古拔沈毅有器識從太武討平蓋呉薛永宗除中散賜爵永康侯又討及氐仇傉檀强免生平之後除南豫州刺史有善政太和六年改爵河東公卒諡曰康長子允襲父爵位河北太守洪祚弟洪隆位河東太守長子驎駒中書博士驎駒子慶之位廷尉丞慶之弟英集以軍功累官散騎常侍薛湖洪祚弟少有節操德義服人鄉閭化其風敎咸以敬讓為先為本州中從事别駕除河東太守復為仇池都將薛聰字延智湖之子闇室矜莊博覽墳籍遭父憂廬墓篤睦諸弟而家敎甚嚴遷治書侍御史彈劾不避强禦累遷直閣將軍深為孝文所知動輒匡諫事多聽允而重厚沈密外人莫窺其際每進位輒苦讓不受帝曰卿天爵自高非人爵所能榮也後除都督齊州刺史卒諡簡懿薛孝通字士達聰之子博學有儁才蕭寶夤引參驃騎大將軍府事禮遇甚隆及寶夤有異志孝通求歸寶夤果為逆從爾朱天光平關中賜爵汾陰侯莊帝幽崩密贊天光冊立廣陵王為帝即節閔也以首創大義拜散騎常侍封藍田縣子尋遷中書郎深為節閔所知重賀拔岳鎮關西孝通為行臺右丞太昌初因使至鄴為高歡所留興和二年卒于鄴柳崇字僧生解人有學行舉秀才高第解褐太尉主簿轉尚書右外兵郎中孝文遣檢斷河北河東二郡爭境事上下息訟屬荆郢新附南軍窺擾詔崇持節與州郡經畧慰諭累遷河中太守郡中畏服卒官贈岐州刺史謚曰穆子慶加性沈靜不競于時位給事中本郡中正卒慶加弟楷字士則善草書涉文史位撫軍司馬裴佗字元化本聞喜人六世祖詵仕晉為太常卿避亂梁州苻堅平河西東歸因居解縣佗魁偉有器望舉秀才以高第除中書博士景明初累遷趙郡太守威惠甚著轉荆州刺史加平南將軍撫慰蠻首闔境清晏遷中軍將軍以疾乞還佗性剛直不與俗人交清白任真不事家産宅不過三十步無田園暑不張蓋寒不衣裘其貞儉如此子讓之諏之謀之納之俱以文行知名裴俠字嵩和解人七歲始能言聰慧異常十三遭父憂哀毁有若成人州辟主簿舉秀才正光中為東郡太守帶防城别將時孝武與高歡有隙宇文泰在關中亦擅權孝武徴兵俠率所部赴洛陽謂武衞將軍王思政曰圖歡有立至之憂西巡有將來之慮且至關右日慎一日徐思其宜耳思政遂進俠于帝授左中郎將及孝武西遷俠不顧妻子從入關賜爵清河縣伯大統三年領鄉兵戰沙苑先鋒陷陳進爵為侯薛憕字景猷汾陰人早喪父家貧躬耕以養祖母暇則覽文籍普泰中拜給事中周文引為記室叅軍孝武西遷授中散大夫封夏侯縣男文帝踐阼拜中書侍郎加安東將軍進爵為伯時儀制多闕憕與盧辯檀翥等實叅定之令狐任猗氏人兄弟四人早喪父泣墓十載奉養其母孝著鄉邑而力田積粟博施不已皇甫奴河東人沈屈兵伍而操尚彌高奉養繼親甚著恭孝之稱景明𥘉畿内大使王凝奏請標異詔從之荆可猗氏人性質朴苦身勤力供親甘㫖母喪悲號絶而復甦者數四負土成墳榛蕪獨宿與禽獸雜處哀感遠近大統中鄉人上言表異之北齊裴謁之字士敬佗第六子少有志節好直言文宣末年昏縱朝臣罕有言者謁之上書正諫言甚切直文宣將殺之白刃臨頸謁之辭色不變楊愔救之乃遣出齊亡卒壺關令樊遜字孝謙北猗氏人父衡性至孝喪父負土成墳朝夕號慕遜少好學專心典籍天保中舉秀才第一七年詔令校定秘府書籍左僕射楊愔重其文特奏為員外將軍遷員外散騎侍郎卒薛元潁汾除人廉謹有義信起家永安王叅軍行秀容縣事有清名累轉定州别駕舉清平勤幹除漁陽太守周皇甫遐字永賢汾陰人少喪父事母以孝聞遭喪廬墓負土為墳食粥枕土形容枯瘁營墓之初有鴟烏各一徘徊悲鳴不離墓側若助遐者遠近競以米麪遺之受而不食以營佛齋郡縣表上其狀詔旌異之薛端字仁直有志操勵精篤學年十七司空高乾邕辟為叅軍㝷棄官歸里魏孝武西遷文帝引端同行累遷吏部郎中端性强直不避權貴文帝嘉之久處選曹有人倫之鑒擢用皆得其才進授吏部尚書加侍中開府儀同三司爵為侯孝閔帝踐祚進爵為公卒諡曰質薛慎字伯護聰弟和之子好學能屬文善草書起家丞相府墨曾叅軍文帝于行臺省置學以慎為學師又為宜都公侍讀六官建累遷御伯中大夫保定中出為湖州刺史政聲大著尋為蕃部中大夫卒裴祥俠之子性忠謹有理劇才官司倉下大夫居父憂以毁卒樊深字文深猗氏人事繼母甚謹從師于河西講習五經晝夜不倦魏永安中以軍功累遷中散大夫孝武西遷樊王二姓舉義為東魏所誅深父保周叔歡周並被害深墜崖傷足絶食再宿得一簞餅念繼母老癉乃弗食夜中匍匐尋得母以饋改姓易名游學汾晉閒習天文算法之術文帝平河東贈保周及歡周官深歸葬其父負土成墳文帝置學東館以深為博士累官縣伯中大夫加開府儀同三司後乞骸骨歸朝廷有疑義常召問焉樂遜字遂賢猗氏人㓜從徐遵明受經文帝召遜敎授諸子閔帝踐祚除秋官上士轉小師氏下大夫自譙王檢以下並行弟子之禮天和中復命在露門敎授皇子大象初累遷開府儀同大將軍授東揚州刺史進爵崇業郡公遜性柔謹寡交遊立身以忠信為本通經術善訓導有牧人理務才然不自矜尚學者以此稱之柳遐字子昇解人篤文好學動合規矩仕梁為尚書功論郎岳陽王蕭詧于襄陽承制授吏部郎及詧踐帝位于江陵以襄陽來歸遐辭詧還鄉守墳墓文帝明帝頻徴固辭以疾及詧殂遐舉哀行舊臣之服保定中又徴之遐始入朝授驃騎大將軍開府儀同三司霍州刺史以德敎導羣下化之遐事親有至行性温𥙿無喜愠容亦不論人之短尤尚施與家無餘財有十子靖莊最知名柳敏字白澤解人九歲而孤事母以孝聞性好學起家員外散騎侍郎累遷河東郡丞統御鄉里甚得時譽文帝克復河東見而器異之曰今日不喜得河東喜得卿也即拜丞相府叅軍事累遷大都督遭母憂居喪旬日閒鬚髮半白為司宗方正恭勤明練故事近儀皆案據舊章刊正武帝平齊封武德郡公薛温字尼卿孝通子沈敏有器局博覽墳典尤善隸書厯官燕郡太守以簡忠稱賜爵齊安縣子子邁嗣字宏仁長于詞辯隋大業中為刑部選部二侍郎柳靖字思休仕梁正員郎隨父遐入周授大都督厯河南廣德二郡守皆有政術秩滿還鄉閉門自守子弟奉之若嚴君其有過者靖必下帷自責于是長幼相率拜謝靖然後見之勗以禮法鄉里亦慕而周初為天官府史累擢為内史中士父艱去職哀毁骨立文帝受禪授大理丞處法平允遷大理少卿適刑部侍郎辛亶衣緋禪上以為厭蠱將斬之綽曰法不當死上怒命將綽並斬之至解衣當斬上使人謂綽曰竟如何對曰執法一心不敢惜死上良久乃釋之其剛毅皆類此後進開府仁夀中卒官上為流涕薛道衡字元卿孝通子專精好學甚有才名齊武平初詔與諸儒修定五禮除尚書左外兵郎後主世與侍中斛律孝卿叅預政事道衡具陳備周之䇿孝卿不能用齊亡仕周至邛州刺史文帝受禪除内史舍人八年伐陳與高熲論事成敗熲欣然曰本以才學相期不意籌畧乃爾後為内史侍郎加上儀同三司進上開府才名益顯煬帝即位深忌之賜死族弟儒有才思開皇中為侍御史方直自處終襄城郡掾柳莊字思敬靖之弟仕蕭詧為鴻臚卿高祖在周輔政蕭巋令莊奉書入關及高祖踐阼莊又入朝帝深慰勉之梁國廢除給事黄門侍郎莊明習舊章雅達政事凡所駮正帝莫不稱善蘇威稱其于學業世務獨能兼之後為饒州刺史卒于官裴肅字神封祥弟貞亮有才藝周天和中舉秀才隋初授膳部侍郎仁夀中皇太子勇蜀王秀左僕射高熲俱廢黜上書論諌上曰肅憂我家事如此亦至誠也乃徴入朝諭以勇不可復收之意煬帝嗣位肅杜門不出後執政者以嶺表遐遠希㫖授肅永平郡丞卒官夷獠思之柳儉字道約解人有局量立行清苦為州里所敬仕周至畿伯大夫文帝時出為廣漢太守以仁明著稱擢拜蓬州刺史徙邛州大業初拜宏化太守五年入朝郡國畢集帝謂蘇威牛宏曰其中清名天下第一者為誰威等以儉對賜儉帛二百疋令天下朝集使送至郡邸以旌異焉官至上大將軍卒陳茂猗氏人質直恭謹為州里所敬文帝引為寮佐後從帝與齊師戰于晉州齊師甚盛文帝挑戰茂固止不得因捉馬鞚帝忿之拔刀砍其額流血被面詞氣不撓帝感而謝之厚加禮敬及受禪拜給事黄門侍郎封魏城縣男進爵為伯子政字宏道善鍾律便弓馬官至兵曹承務郎敬肅字宏儉蒲坂人少以貞介知名開皇初為安陵令有能名擢拜秦州司馬轉豳州長史仁夀中為衞州司馬俱有異績煬帝嗣位遷潁州郡丞清名亞于柳儉賜帛百疋每欲擢為太守輒為宇文述所毁不行大業末乞骸骨去家無餘財敬釗字積善蒲坂人仁夀中為繁畤令有能名漢王諒陷城偽將喬鍾葵署為代州總管司馬釗以死拒之會鍾葵敗得免終朝邑令張文詡河東人父琚開皇中為洹水令以清正聞文詡博覽羣書特進三禮文帝時遊太學名儒莫不推伏之仁夀末學廢文詡歸灌園為業州郡頻舉皆不應命事母孝以德化人鄉黨頗移風俗州縣賑恤輒辭不受時人方之閔子騫原憲焉陳孝意河東人大業中為魯郡司法書佐太守蘇威甚加禮敬及威為納言奏孝意為侍御史以父憂去職居喪過禮有白鹿馴擾其廬尋起授雁門郡丞在郡菜食齋居朝夕哀臨柴毁骨立見者哀之馬邑劉武周作亂攻城孝意拒之每致克捷百餘日糧盡為校尉張倫所殺唐吕子臧河東人隋大業末為南陽郡丞高祖入京師遣馬元規慰輯山南獨子臧堅守隋亡子臧為故君發喪訖送𣢾就拜鄧州刺史封南陽郡公武德初朱粲圍城會霖雨城壞子臧率麾下數百人赴敵死之薛收字伯襃汾陰人道衡子事王通為師以父不得死于隋不肯仕高祖興挺身歸國秦王問方畧合㫖授府主簿時方討王世充收為書檄露布馬上占辭該敏如素搆竇建德來援諸將爭言斂軍以觀賊勢收獨請王親督精鋭據成臯邀建德路二賊不得連固遂擒建德降世充授天䇿府記室叅軍從平劉黒闥封汾陰縣男嘗上書諌獵賜黄金四十鋌卒時年三十三薛大鼎字重臣汾陰人高祖兵興謁龍門挾䇿説帝帝奇之授察非掾累遷滄州刺史有治名永徽中遷行荆州大都督長史卒諡曰恭子克搆有器識官至麟臺監薛元敬汾陰人隋選部侍郎邁子與收及族兄德音齊名世稱河東三鳳武德中收與房杜處心腹之寄更相結附元敬謹畏未嘗申𣢾曲尋除舍人掌文翰號稱職卒于官張元素虞鄉人仕隋為景城縣户曹太宗拜侍御史遷給事中貞觀四年詔發卒治洛陽宫乾元殿且東幸元素上書力言五不可且曰民力未及隋日而役殘創之人襲亡國之弊臣恐陛下之過甚于煬帝帝即詔罷役魏徴歎曰張公爭事有回天之力可謂仁人之言累遷右庶子太子承乾有過惡數上書極諫太子廢坐除名終鄧州刺史敬播河東人貞觀初擢進士第時顔師古孔穎達撰隋史詔播叅纂兼修國史又與令狐徳棻等撰晉書凡例皆播所發永徽後厯諌議大夫給事中播與許敬宗撰高祖實録又撰太宗實錄房元齡稱播爲陳夀之流爲安州刺史卒羅道琮虞鄉人慷慨尚節義貞觀末上書忤㫖徙嶺表有同斥者死荆襄閒臨殁悲泣道琮曰吾若還終不使君獨留此瘞路左去歲餘遇赦歸會霖潦積水失其殯處道琮號諸野波中忽沸道琮曰若尸在可再沸水果復湧乃得尸負之還鄉尋擢明經仕至太學博士爲時名儒薛元超收之子好學善屬文高宗即位爲給事中數陳當世得失帝嘉納轉中書舍人宏文館學士省中有盤石其祖道衡常據以草制元超見輒流涕所薦士皆以才自名于時上元中拜中書令帝幸東都留輔太子監國太子稍怠政事元超力諌帝遣使厚賜慰其意及政出武后因佯喑乞骸骨卒柳沖莊曹孫父楚賢貞觀中為都督刺史沖好學多所研總中宗時為左散騎常侍修國史及姓系録厯昭文館學士致仕唐興言姓譜者以路敬淳為宗沖與韋述次之薛稷字嗣通道衡曽孫擢進士第累遷中書舍人與從祖兄曜更踐兩省俱以辭章自名景龍末為昭文館學士稷外祖魏徴家多藏虞世南褚遂良書稷鋭精臨倣遂以書名天下畫又絶品睿宗踐祚封晉國公遷禮部尚書張嘉貞字嘉貞猗氏人長安中御史張循憲使河東命嘉貞草奏武后以為能循憲對皆嘉貞所為因召見拜監察御史遷兵部員外郎時功狀盈几嘉貞詳處不閲旬庭無稽牒累遷中書令居位三年善傳奏敏于裁遣封河東侯卒諡恭肅子延賞博涉經史通吏治徳宗時拜中書侍郎同平章事卒諡成肅子宏靖雅厚信直元和中以檢校吏部尚書同平章事時號三相張家吕諲河東人開元末第進士調安陵尉哥舒翰節度河西表度支判官勤總吏職翰敗潼關諲西趨靈武肅宗拜御史中丞陳事無不順納乾元二年擢同中書門下平章事知門下省累封須昌縣伯上元中拜荆州長史灃朗峽忠等五州節度使諲為治不急細務決大事剛果不撓始在河西悉知諸將能否及為荆州奏取材者數十人總牙兵故威惠兩行以善治聞于當時卒贈吏部尚書諡曰肅張介然猗氏人本名六郎性慎愿長計畫始為河隴支郡太守厯衞尉卿安祿山反授河南節度採訪使守陳留不三日賊已渡河城陷被殺薛愿汾陰人安祿山反愿為潁川太守賊阿思那承慶攻之自正月盡十一月城陷愿不肯降賊縛至東京將礫解之有説祿山曰義士也殺之不祥乃繫于洛水之濵一夕凍死封常清猗氏人初為高仙芝傔從會仙芝追擊達奚禽馘畧盡常清于幕下潛作捷布仙芝取讀之皆意所欲出乃大駭即用之由是知名常清才而果胸無疑事為仙芝節度判官杖殺郎將鄭德詮及有罪大將二人軍中莫不股慄性勤儉耐勞苦賞罰分明天寶末為范陽節度副大使討祿山兵敗斬于軍人多哀之敬括字叔弓河東人進士及第遷殿中侍御史楊國忠惡不諧己外除果州刺史志簡澹在職不求名遷同州刺史拜御史大夫持重弗以私害公大厯中卒薛播寳鼎人擢進士第累授殿中侍御史遷武功萬年令温敏而裕與人交有常李栖筠崔祐甫並器之以禮部侍郎卒子公達進士第佐鳳翔軍帥常集射設的高數十尺一軍莫能中公達三射連中之帥不喜乃自免去終國子助敎裴冕字章甫河東人王鉷為京畿採訪使表署判官明鋭果于事衆號稱職明皇入蜀詔皇太子為天下兵馬都兀帥拜冕御史中丞兼左庶子副之從至靈武力勸太子正位號以安社稷太子即位進中書侍郎同中書門下平章事兩京平封冀國公後坐法徙灃州大厯中以郭子儀言還冕于朝拜左僕射仍輔政卒贈太尉配享肅宗廟董晉字混成虞鄉人大厯中李涵送崇徽公主于回紇署判官回紇恃功見使者倨因貴問歲市馬而歸賄不足涵懼目晉晉對詞直衆皆南面拜不敢有言還遷秘書少監德宗時以國子祭酒宣慰恒州至河中李懷光應朱泚反晉説之懷光喜且泣遂不助泚累遷門下侍郎同平章事出為宣武節度副大使知節度事謙愿儉簡無所更張軍以麤安卒諡恭惠孫居中善詩為張籍所稱薛珏字温如寶鼎人以蔭為懿德太子廟令累遷楚州刺史為觀察使所惡左授峽州刺史建中初命使者巡察官吏李成狀珏之簡趙贊言其廉盧翰稱其肅于是拜中散大夫厯司農卿時詔舉堪刺史縣令者百人宰相欲校以文辭珏曰求良吏不可責文學宜以愛察之心為本宰相多其計所用皆稱職終嶺南觀察使子存慶字嗣德及進士第為給事中與韋宏景封駮詔書時稱其直樊澤字安時河中人舉賢良方正擢左補闕有武功喜兵法累遷山南東道節度使數與李希烈角禽其驃將賊氣沮縮遂取唐隨二州貞元中加檢校尚書右僕射卒謚曰成柳晟解人敏六世孫父潭尚和政公主官太僕卿晟年十一居父喪以孝聞代宗時拜檢校太常卿德宗立親信用事朱泚反從帝至奉天自請入京帥説沮賊黨謀洩泚捕繫獄夜半坎垣毁械亡歸奉天帝為流涕累遷山南西道節度使入為將作監使回鶻冊立可汗責以無禮棄信可汗及諸貴人皆跪伏成禮還遷左金吾衞大將軍封河東郡公晟敏于辯下士樂施憲宗嘗稱其賢云盧綸字允言蒲人大厯中與耿湋等十人皆以詩名號大厯十才子湋河東人寶應中擢進士第官至右拾遺范希朝字致君虞鄉人初從邠寕軍為别將德宗在奉天以戰守功累兼御史中丞治軍整毅遷振武軍節度使貞元末請朝時諸鎮不以事自述職者希朝而已帝悦拜金吾衞大將軍以太子太保致仕卒諡宣武楊巨源蒲州人貞元中進士初為太常博士禮部員外郎出為鳳翔少尹召拜國子司業巨源以能詩訓後進多成其藝太和中致仕以為河東少尹不領職務歳給祿以終其身暢當河東人擢進士第貞元初為太常博士招德皇后崩詔議太子服當曰既葬除服而心喪三年帝以為至論仕至果州刺史衞次公字從周河東人舉進士第累擢翰林學士德宗崩皇太子久疾禁中或傳更議所立衆失色次公曰皇太子雖久疾冢嗣也内外繫心久矣必不得已宜立廣陵王議遂定順宗立王叔文等用事次公多所持正知禮部貢舉斥華取實不為權貴侵撓累官檢校工部尚書淮南節度使卒諡曰敬其節尚蓋始終完潔云柳登字成伯河東人父芳上元中史館修撰登淹貫羣書年六十餘始仕宦元和初為大理少郷與許孟容等刊正敕格改散騎常侍卒弟冕為太常博士吏部郎中每議禮輒當上意終福建觀察使柳璟字德輝登之子寳厯初第進士宏詞三遷監察御史論郊廟告祭不得以雜品攝上公開成初為翰林學士詔璟綴成其祖芳所撰永泰新譜遷中書舍人璟為人寛信好稱人之長㳺其門者他日皆顯于世終郴州刺史盧簡辭字子䇿綸子以進士厯左帥府入遷侍御史習知法令及臺閣舊事累擢工部尚書坐事貶卒盧宏正字子彊簡辭弟有文名第進士拜侍御史會昌中出為武安節度使時吏卒驕沓銀刀軍尤不法宏正戮其尤者終宏正治不敢譁後從宣武卒於鎮贈尚書右僕射盧簡求字子臧宏正弟有文名第進士厯蘇夀二州刺史大中九年拜涇原渭武節度使徙義武鳳翔河東三鎮簡求為政長權變文不害居邊善綏御人皆安之後以太子少師致仕卒贈尚書左僕射薛存成字資明寶鼎人中進士第累官給事中遇事不可輒執敕不下憲宗悦遣使勞之拜御史中丞劾浮圖鑒虚關通姦狀得贓數十萬當以大辟詔釋之存成以死爭卒抵罪性和易于人無所不容及當官毅然不可奪子廷老及進士第累官給事中在公卿閒偘偘不干虚譽推為正人薛苹寶鼎人父順奉天尉與楊國忠有舊及用事將引之輒謝絶苹以長安令厯虢州刺史憲宗時擢湖南觀察使徙浙東以治行遷浙西加御史大夫封河東郡公所居守法度務在安人所衣綠袍更十年至緋衣乃易聲樂不聞於家得祿即分散親故而無餘藏除左散騎常侍致仕卒諡曰宣子膺太和初為右補闕内供奉其弟齊佐興元李絳幕府絳遇害齊死于難膺聞不及請馳赴之哀甚聞者垂泣後厯工部員外郎胡証字啟中河東人舉進士第累官諌議大夫元和中黨項屢擾邊而單于都護府累更武將職事廢証以儒而勇選拜振武軍節度使太和公主嫁回鶻以檢校工部尚書為和親使舊制行人有私覿官証請檢受省費以絶鬻官之濫回鶻屢欲屈脅之証固不從訖不辱命拜嶺南節度使卒趙匡字伯循河中人與陸淳啖助同解春秋後學宗之薛戎字元夫寶鼎人客毗陵陽羡山劉冕為福建觀察使辟佐其府馬總貶泉州别駕冕欲陷總附倖家使戎攝刺史按其罪戎不從冕怒囚之他館環兵脅辱之累月戎終不為屈㑹冕死得解累遷浙東觀察使戎為吏不尚約束詭名譽有善歸之所部故居官時無灼灼可驚者已罷則懷之悉俸廪賙濟内外親無疏遠皆歸之弟放端厚寡言第進士累擢兵部郎中穆宗為太子拜侍讀既即位常問學經安得其要對曰論語六經之菁華孝經人倫之本人知孝慈則氣感和樂也帝然之終江西觀察使謚曰簡樊宗師字紹述澤之子始為國子主簿擢軍謀宏逺科厯緜絳二州刺史皆有德于民進諌議大夫未拜卒宗師家饒于財悉散施婣舊賓客妻子告不給宗師笑不答力學多通解所著述甚多韓愈稱宗師議論平正有據嘗薦其材云馬存亮字季明河中人元和時累擢左神策中尉軍所籍凡十餘萬料練尤精伍無罷士部無冗員敬宗初張韶之變上驚入左軍存亮出迎捧帝足泣負而入以五百騎往迎二太后比至而賊已斬關入清思殿存亮遣神䇿諸軍討殺賊遲明盡捕餘黨車駕還宫一時功最高乃推委權勢求監淮南軍太和中以右領軍衞上將軍致仕封岐國公存亮逮事德宗更六朝資端畏善訓士始去禁衞衆皆泣唐世中人以忠謹稱者西門季元嚴遵美及存亮三人而巳敬晦字日彰括之孫進士及第累擢諫議大夫武宗時趙歸真飾詐以罔天子御史平呉湘獄得罪宰相晦皆上疏極言不少回縱大中中遷御史中丞以太子賓客分司卒謚曰肅司空圖字表聖虞鄉人父輿有風幹大中時户部郎中圖咸通末進士累官禮部郎中黄巢陷長安將奔不得前圖弟有奴段章者陷賊執圖手曰我所主張將軍喜下士可往見之無虚死溝中圖不肯往章泣下遂奔咸陽間關至河中昭宗遷洛陽柳璨希賊臣意誅天下才望詔圖入朝圖陽堕笏趣意野耄璨知無意人世乃聽還圖本居中條山王官谷有先人田遂隱不出時冦盜所過残暴獨不入王官谷土人依以避難朱全忠已篡召爲禮部尚書不起及哀帝弑圖不食而卒薛廷珪河東人父逢進士第厯侍御史尚書郎持論鯁切廷珪進士及第累官尚書左丞朱全忠兼四鎮廷珪以官告使至汴客將先見諷其拜廷珪佯不曉曰吾何德敢受令公拜乎及見卒不肯加禮五代唐裴皥字司東河東人唐光化中進士事後唐為禮部侍郎喜議論毎陳朝廷闕失多斥權臣改太子賓客晉高祖時拜右僕射致仕宰相馬引孫桑維翰皆皡禮部所取士晉楊彦詢寶鼎人高祖鎮太原以為太原節度使天福中徙鎮國㑹歲大飢為政有惠愛民賴以甦以疾罷為金吾衞大將軍卒贈太子太保宋苗訓河中人素善天文占候之術周顯德末從太祖北征日上復有一日久相摩盪指曰此天命也既受禪累擢檢校工部尚書子守信少習父業太平興國中詔造乾元占騐書頗精袁彦河東人少以趫勇應募從周世宗討淮南有功累官彰信軍節度使宋初加檢校太尉薛顔字彦回萬泉人舉三禮中第為嘉州司戸叅軍累遷金部員外郎改河東轉運使真宗祀汾陰徙陜西河中浮橋歲敗顔即北岸釃上流為支渠以殺水怒因取渠水溉其旁田民利之官至光祿卿分司西京卒劉綜字居正虞鄉人雍熙二年進士由邛州軍事推官厯任中外累官右諌議大夫强敏有吏才所至抑制豪右振舉文法毎上疏言事輒見嘉納上倚賴焉姚宗明永樂人十世祖棲雲唐貞元中戌邊棲雲之父代兄役戰殁塞上棲雲三歲母再嫁養于伯母伯母亡棲雲葬之又招魂葬其父廬墓終身至宗明十世同居仁宗詔復其家宗明生用和用和生士明士明生德又三世五十餘年孝睦不衰姚氏世為農家聚族百餘人厯三百餘年無異辭者李興河東人咸平閒契丹内侵真宗狩魏興以東班殿侍隨節度使康保裔赴敵軍陷興死之詔其子桓為西班殿直薛田字希稷河東人少師事种放與魏野友善性和厚第進士起家丹州推官以幹敏數為大臣所稱累遷至右諌議大夫知同州薛向字師正萬泉人以祖顔任為太廟齋郎永夀主簿元豐元年累官同知樞密院向幹局絶人尤善論兵厯内外任皆展奮材業卒諡恭敏子紹彭有翰墨名穆衍字昌叔河中人第進士調華池令轉知淳化從韓絳宣撫陜西遇慶卒潰亂衍念母在耀州亟謁歸信宿走七驛比至慶卒知衍名不敢近後考課為一路最累遷陜西轉運使金麻秉彝字仲常虞鄉人性純孝㓜敏悟八歲能屬文皇統九年進士調河中府寺丞厯大興府推官岳陽縣令終兵部侍郎秉彝為政主仁濟以强明所莅人畏愛之孫革字信之樂道不仕以詩文自娛其名與元好問相上下云王庭筠字子端河東人大定進士第調恩州軍事主簿有政聲累官翰林修撰泰和二年卒詔求平主詩文藏之秘閣又以御製詩賜其家庭筠詩律深嚴兼善書法其薦引及從政者皆一時名士世以知人許之子曼慶亦能詩並書仕至行省右司郎中李獻能字欽叔河中人貞祐三年賜詞賦進士廷試第一授翰林應奉文字累遷修撰應機敏捷號為得體趙秉文李純甫嘗曰獻能天生翰苑材故每薦之不令出館事母以純孝稱年四十三為趙偉所害李獻甫字欽用獻能從弟博通書傳有幹局興定五年登進士第累辟行臺令史正大初夏使來請和有口辨議者不能折往復數日至以歲幣為言獻甫不能平屢折之夏使語塞和議乃定朝廷錄其功授慶陽總帥府經厯官累遷鎮南節度副使死于蔡州之難年四十陳賡臨晉人累官行中書省叅議有才名與元好問相倡和及卒大同儒學敎授房祺錄其詩與麻革段成巳等八人號河汾諸老詩强伸本河中射糧軍子弟膂力過人後客洛下署中京警巡使時中京元帥任守真敗死人推伸為府簽事甫三日元兵圍之東西北三面多樹大礮伸括衣帛為幟立之城上率士卒赤身而戰以壯士五千人往來救應所至必捷三月不能拔哀宗降詔襃諭以為中京留守願以死自効未幾行總帥府事糧盡兵散城不能守乃突東門出轉戰至偃師力盡被執擁迫見大帥語不遜左右力持使北面卒南向遂殺之侯小叔河東人為河津水手貞祐初籍充鎮威軍以勞補官元光元年遷河中府判官權河東南路安撫副使遷治中樞密院奉小叔才能可用權位輕不足威重乞假符節詔權元帥左都監有撫定功元光二年正月元軍騎十萬圍河中無援城破小叔死之南仲猗氏人有孝行元兵至先士卒死之元劉哈喇巴圖魯河東人世業醫至元中召見世祖謂其目有火光異之留侍左右錫勒吉叛布哩特穆爾奉命往討帝諭從行將行聞母疾請歸省既見不敢以逺役告母諭使遠行遂辭去忍淚不下而鼻血暴出數里不止既獲錫勒吉獻俘行宫帝輟羊胾以賜割其美者懷之曰母幸存請以遺之帝嘉其志命自今賜食必先其母官至御史中丞劉哈喇巴圖魯舊作劉哈喇八都魯錫勒吉舊作昔里吉布哩特穆爾舊作别里鐵穆爾今並改正察罕本西域人父布圖訥來歸授河東民賦總管因居河中猗氏縣後徙解州察罕生于河中博覽强記通諸國字書鄂勒郭齊叅政湖廣進平章移治江西察罕為掾屬出入兩省二十餘年多著勲績大德中除武昌路冶中以治最聞仁宗即位拜中書叅知政事總持綱紀不屑細務識者謂得大臣體皇慶元年進榮祿大夫平章政事乞歸解州卒察罕天性孝友田宅之在河中者悉分與諸昆弟貧來歸者復分與之縱奴為民者甚衆人多稱長者布圖訥舊作伯德那鄂勒郭齊舊作奥魯赤今並改正樊珪臨晉人有孝行至大閒任大都提舉母思之哭泣喪明珪聞即告歸以舌䑛母目七日復明事聞詔旌為孝感之門杜昭萬泉人㓜失母繼母呉撫之及長事呉至孝呉卒廬墓側朝夕哭奠終三年王廷祥猗氏人事父母孝謹毎飲食必拜獻父病背癰以口吮膿而愈母失明舌䑛復明事聞旌表其門明丁玉初名國珍河中人有文武才由九江知府厯守永州為平羌將軍討賊守城屢著功績太祖手敕褒美官至左都御史蔡瑄榮河人洪武中以學行貢于廷授儀禮司序班有賢聲累擢通政司使出納以公劾正乖謬百僚肅然㝷以疾還卒于道太祖御製文以祭之賜賻復其家三年袁泰萬泉人洪武進士累官右都御史處心亷直執事不撓良善獲安姦邪不得肆志及卒上遣使致祭焉王約猗氏人母疾病二十餘年不離左右及卒廬墓躬自負土苫塊成喪正統閒旌表荆詡猗氏人正統舉人與兄志生于涿郡受業于薛瑄之門瑄以詩授至今邑弟子業詩者皆宗其説楊瑩蒲州人天順進士官四川叅政瑩為人清介絶俗有古風初仕行人使蜀蜀王餽之金不受及仕參政歸王贐之又不受韓文在政府與瑩為同鄉素交以書問瑩瑩不答其素節如此謝廷桂蒲州人景泰中鄉舉第一㑹試時曹石軰爭館之廷桂拒曰君危如朝露欲浼我耶成化初同知常州亷明果斷治行為江左第一升河南知府未任上十餘章被謫景佐蒲州人宏治進士知東安縣有惠政遷都察院經厯忤劉瑾下獄㝷謫開州判官累升河南叅政所至執法吏民莫敢犯從子溱正德進士與兄瀾相友愛嘗途遇盜兄弟爭代死以免于難鄭岳字汝華蒲州人宏治進士授戸部主事厯湖廣僉事廣西副使調廣東所至有異政升江西布政使以事為宸濠所陷罷歸嘉靖初擢右副都御史巡撫江西請賑恤受兵郡縣論次討逆軍功贈禮死事諸臣皆報可累遷兵部左侍郎大同兵變議令首領官各舉首惡事立定後以議大禮奪俸乞歸黄連字續之萬泉人正德初以監生授湖州府檢校居官清謹升大興縣主簿㑹流賊犯境帥民兵暨家僮追剿之斬殺頗多賊怒益兵援絶死之贈大興知縣王璽字荆玉猗氏人正德進士除行人冊封藩府纎毫無所受累遷寕夏道飭戎政繕邊防時慶王官校横甚璽䋲以法遣戍五十餘人復監兵榆林以疾乞歸李軏字大器萬泉人親死廬墓側三年正德中授江西南康府照磨值流賊陷郡城守城皆遁軏獨與妻子死節幕下楊守禮字秉節蒲州人正德進士嘉靖初厯湖廣僉事有平賊功巡撫四川累破諸番改撫寕夏進右都御史總督軍務以功加兵部尚書太子少保守禮才器敏達而有節操廷臣舉邊才以守禮為稱首云楊博字惟約蒲州人嘉靖進士厯職方郎中累拜右僉都御史巡撫甘肅尋以兵部左侍郎總督薊遼保定所至有功擢尚書嚴嵩父子竊柄博不為撓巳出鎮宣大山西召還先後條議數十萬言帝倚為左右手隆慶初為吏部請錄建言諸臣死者皆贈恤㝷謝病歸復起兵部終吏部尚書博有識量遇事安閑文臣知兵者一時無出其右高拱欲危徐階博救得解及張居正逐拱博爭尤力時稱長者卒贈太傅謚襄毅子俊民嘉靖進士萬厯中厯官户部尚書數請罷礦稅内臣核減加增邊餉卒贈少傅兼太子太傅張四維字子維蒲州人嘉靖進士嫻文辭倜儻有才智累擢吏部侍郎神宗時代張居正為首輔以憂歸卒贈太師謚文毅王光宇字德潛臨晉人嘉靖進士性孝友母目盲光宇禱于天復明厯官戸部郎中督糧甘肅擢陜西按察僉事分巡隴右治民禦敵皆有異績王崇古字學輔臨晉人嘉靖中進士厯常鎮兵備副使三遷至僉都御史巡撫寕夏崇古少喜談兵具知諸邊險要又身厯行陳習兵事至是内修戰守外納降附視他鎮獨强尋總督陜西寕夏甘肅軍務前後獲首功甚多改督宣大山西納俺答孫巴罕内齊降力持封貢議自是邊境休息累官少保兵部尚書卒贈太保諡襄毅子謙萬厯初進士官工部主事榷税杭州羅木營兵變脅執巡撫呉善言謙馳諭乃解終太僕少郷巴罕内齊改見統部賈仁元萬泉人嘉靖進士由厯城知縣厯外内任累官兵部尚書清潔著聞多立功績卒後遣官祭葬給墓田七十畝何東序猗氏人嘉靖進士厯徽州知府剛毅有執力鋤豪强調衢州綜理精密剖決若流吏民畏服累擢右僉都御史巡撫延綏申嚴紀律將士劾命出紅山塞大捷以母喪歸哀毁廬墓服闋遂不出及卒門人私諡曰文欽周有光字賔岡榮河人隆慶進士授户部主事厯陜西僉事核軍糧之冒濫者葺邊牆自皁􅈨溝至喜鵲溝二百餘里西鄙獲安終漢南西夏監司張庭蒲州人萬厯進士授戸部主事張差梃擊事起上言奸人狙擊青宫陛下宜立窮主謀乃廷臣交章一無批答何也不報再遷郎中引疾歸天啓初贈光祿少卿荆州土字至元臨晉人萬厯進士除臨胊知縣有殊政擢山東道御史巡按南京以便宜發賑全活災黎為徳於三吳甚鉅累官僉都御史巡撫河南下車即請寛逋賦招集流亡事無大小必躬為經理竟以積瘁卒官韓爌字象雲蒲州人萬厯中進士累官禮部侍郎光宗立進尚書兼東閣大學士與方從哲劉一燝同受顧命輔熹宗竭誠翼衞中外倚重累加吏部尚書建極殿大學士楊漣劾魏忠賢二十四罪忠賢懼求援於爌爌不應忠賢深街之尋代業向高為首輔每事持正而忠賢勢益張竟矯㫖削籍歸莊烈帝立以原官召還與李標錢龍錫共定逆案踰年引疾歸李自成陷蒲州憤悒而卒馮守禮猗氏人早有志操舉於鄉厯官萊蕪知縣致仕家居崇禎十五年與二子攄奇拱奇並殉難本朝賈道醇蒲州人以貢生為太谷敎諭順治五年署縣事適姜瓖之變殉難贈國子監助敎左成名永濟人順治閒以貢生為岳州府經厯署慈利令山賊攻破慈利成名不屈死之事聞厚卹其家馮臯强永濟人順治乙未進士同知漢中府吳三桂反隨大軍進討至雷鼓臺為賊所獲誘之降不屈囚古寺五年漢中復以原官起用王巖楨字惟肖猗氏人順治初土寇倡亂縣令將委城遁巖楨曰官猶心也民猶體也心靜則體安公第坐鎮之賊當立敗耳竟如其言已丑寇大起城陷令突圍入秦請兵將屠城巖楨單騎要之途具言令家室無恙猗人無罪狀禍乃解又請釋軍中被繫子女若干人巖楨篤行好古學者宗之衞既齊字伯巖猗氏人父紹芳順治初進士累任漳南僉事轉川北道𠫭議所至有平賊功既齊康熙初以進士入翰林外補覇州州判攝固安永清平谷三縣俱有治績累擢山東布政使居官亷潔署巡撫事釋無辜數百人官至右副都御史巡撫貴州後督工高家堰卒呉雯字天章蒲州人事母暨祖母以孝聞嗜讀書康熙十七年舉博學宏詞劉養德臨晉人家貧傭力奉母甘㫖不少缺人稱其孝後歳凶負母走豫道遇賊揮刃及其母養德以身捍母刃忽折為二賊相顧錯愕去母子俱獲全韓啓芳臨晉人性至孝鬻子葬父終三年不入内母病危禱于扁鵲祠跪七晝夜血流濺地夢神賜藥而愈比殁廬墓三年嘗冒雪夜行有狼導之至塋塋中有異草高八九尺春花冬萎至啟芳終制乃已邵嗣堯字子昆猗氏人康熙進士知臨淄縣又補柏鄉落職後以薦授清苑知縣入為監察御史調直隷守道卒於江南學政嗣堯性亷介遇事霆發機激勢要憚之厯三縣皆有善政及督學江南試三郡清名大著卒自製布衣以殮諸生建祠祀之令狐言東猗氏人康熙中舉于鄉居家孝友博學能文值歲祲按戸給粟里人賴之乾隆十一年入祀鄉賢崔效林永濟人雍正七年同邑髙世澤遺金珠于道拾而還之世澤願分其半堅不納鄉人義之事聞恩給八品服楊奉時榮河人事繼母至孝兄分居而殁奉時迎嫂與姪合炊焉鄉里高之乾隆十八年旌劉步月永濟人孝行著聞嘉慶元年旌荆道乾臨晉人乾隆二十四年由大挑知縣厯官安徽巡撫實心任事清操著聞嘉慶七年卒賜祭一壇潘克升榮河人孝行著聞嘉慶五年旌流寓唐李商隱河内人㑹昌中嘗移家寓河中永樂縣故集中多永樂之咏太原温庭筠名與商隱齊大中間商隠節度河中庭筠依之亦僑河中有蒲州河亭陪節度讌遊之作按商隱集有寄劉韋二前軰詩自註云二公嘗于此縣寄居不知其何人也蕭遘蘭陵人宰相寘子中和初厯兵部侍郎同平章事累遷尚書左僕射襄王僭立召作冊苦辭罷為太子太保遘移疾以弟蘧為永樂令往依之僖宗還賜死于永樂遘為大臣有峻望逢時不幸不以令終士人惜之王徽杜陵人厯拜戸部侍郎同平章事廣明之亂徽奔赴行在為賊所得迫授偽命不屈乘間竄之河中遣人間道奉絹表入蜀詔守兵部尚書充東面宣慰排陳使賊平累遷檢校司空御史大夫知京兆尹事忤權臣罷使務授太子少師移疾退去蒲州與司空圖遊襄王煴偽制至河中詔徽赴闕託以風疾不行煴逼内外臣寮署誓狀徽稱病竟不署名元李純夫燕山人弱冠登進士不樂仕進棄官為黄冠卜隱王官谷搆菴貽溪之上自號孤雲子大德二年卒年五十八列女南北朝魏姚氏女字女勝河東人少喪父無兄弟年六七歲人言其父輒唾泣正光中母死女勝年十五哭泣數日不勝哀遂死太守崔㳺請立碑製文表其門閭比之曹娥改其里曰上虞里墓在郡城東六里大道北今名孝女冢郭牙妻崔氏解人牙為金州刺史留崔養姑姑病方劇牙訃適至崔忍哀奉侍不令姑知姑卒牙喪亦至崔治二喪營葬畢不食死鄉人表為孝節之門隋襄城王恪妃柳氏河東人父旦循州刺史妃姿儀端麗為妃未幾恪廢妃事之愈敬煬帝嗣位恪徙邊帝令使者殺之于道恪與辭決妃曰王死妾誓不獨生恪棺殮訖妃謂使者曰妾誓與楊氏同穴若身死得不别埋君之惠也遂自經而卒裴倫妻柳氏河東人少有風訓大業末倫為渭源令薛舉之亂城陷遇害柳時年四十有二女及兒婦三人皆有美色柳氏謂之曰我門風有素義不受辱我將與汝同死其女等垂泣曰唯命柳氏遂投井女及婦相繼而下皆死井中唐敬氏河東人字象子適樊氏生子㑹仁而夫死事舅姑能順家以其少欲嫁之潛約婚于里人至期敬伺隙遁去家追及半道以死自守乃罷㑹仁未冠卒敬母又終既葬曰母死子亡何生為不食數日卒林氏寶鼎人薛播伯母通經史善屬文躬授諸子經及播兄弟開元天寳閒播兄弟七人皆擢進士第為衣冠光元薛圭妻王氏猗氏人年二十適圭生子璧甫週歲圭卒養姑育子守節弗渝璧妻杜氏從戍殁杜氏年二十六父母勸更適杜曰妾姑守節妾忍棄姑失節耶卒不能奪璧從弟珍娶趙氏年二十珍亡無子亦守志不他事姑彌謹至元閒俱旌表明解輝妻董氏蒲州人年二十二輝亡子㓜家貧父母諷之嫁董泣曰夫死易節貧富二心非人也况舅姑老子弱奚忍棄之終身蓬首垢面力績以奉舅姑舅姑殁哭泣盡哀與其子親負土穿壙以葬天順五年旌表牛貞女蒲州人牛仲明女劉愷未婚妻愷客外先娶衞衞卒遺一子愷父母為聘女預迎以歸無何愷死中途櫬及遺孤抵里女撫孤若已出事舅姑至孝服禫父母勸之嫁曰汝未配非改節也女曰身既歸劉即劉婦矣親老子㓜尚奚適耶父兄陰納施氏聘女泣愷神主前五日不食死楊聨芳妻令狐氏猗氏人少有至性從父鎧受列女傳芳舉干鄉㝷卒氏方二十七父母勸之嫁不從守節二十餘年卒田民皥妻雷氏蒲州人崇禎十五年冬流賊任國奇兵過蒲雷被擄投井死又盧世臣妻田氏亦與母雷氏結衣投井死韓于宣妻薛氏蒲州人崇本朝葛振盛妾趙氏永濟人姜瓖之亂趙與夫並被擄密以簮珥投夫曰勿認我為婦懼為汝害兵欲亂之抽刃以脅趙引頸迎刃而死同被害者張述善妻李氏王浩元妻李氏張翄妻韓氏皆投崖死展奇弟妻王氏𬒳挾上馬力墜者再賊怒殺之孫烈女臨晉諸生孫永徽女字孟某于歸前五日夫卒女日夕泣遘危疾未幾死衞大垣妻馬氏臨晉人年十七夫亡方娠勺水不入口者數日後生子宏撫之十有二歳偶至外氏有諷之嫁者馬泣曰孤巳長吾生固為贅疣攜孤還家備言身後事潛自縊年二十八王貞女虞鄉人王業建女許字魏述基將嫁夫死女絶飲食三日請往弔父許之至則持服奉姑撫族子為嗣邑令旌之張五綱妻崔氏榮河人姜瓖之亂潛匿高窑賊入牽之崔投百尺崖死年二十楊月蘭妻解氏萬泉人性貞淑年十八守正被戕邑令旌其墓衞中夏繼妻王氏猗氏人夫殁守志笑嚬不苟及年當旌闔學議請王曰守節分也命子芳謝止之後芳為副使孫既齊官翰林王猶紡績夀七十七荆天福妻張氏猗氏人年十七夫亡生子甫三月值歲饑翁欲嫁之堅不從翁避荒異地遺七旬祖姑張紡績資養後數年翁歸見母㓜孫巳成立乃大慟曰吾負孝婦矣邑令旌之荆起瑞妻王氏猗氏人夫亡遺一子一女貧甚夫弟將奪而嫁之王投井死同縣史書妻張氏夫卒父勸其改適潛受人聘張聞自縊死岐烈女猗氏人字李軒之子軒子與人戯悞中箭死女聞取聘帛自縊王貞女萬泉人王昌祉之女年十六守正𬒳戕康熙年間旌郭琛妻荆氏猗氏人生子不育琛病革荆慟哭於母曰願及其未瞑先死以博一顧母止之不得遂吞毒腸斷背裂見者雨泣琛亦㝷卒康熙年間旌尚苗姐永濟人尚正基女守正𬒳戕雍正年閒旌張大志妻秦氏永濟人守正捐軀同縣烈婦吉無偽妻李氏甯孝妻李氏仝大義妻石氏又節婦劉加武妻崔氏李萬緡妻楊氏張育藩妻樊氏姚津妻劉氏翟萬禧妻胡氏楊朔妻姚氏李薫芳妻張氏趙懷瑾妻劉氏李作舟妻吕氏侯法妻鄭氏王樞妻陳氏齊宗德妻荆氏荆養棟妻雷氏周昌耀妻陳氏李本固妻楊氏楊若棠妻王氏韓經祖妻楊氏韓啓瑜妻鄧氏樊世韡妻韓氏吳學敏妻史氏崔大將繼妻楊氏張育英妻馮氏李廣増妻周氏張鐸妾龔氏趙氏王景清妻李氏高廣妻吉氏王廷桂妻郭氏趙宗臣妻高氏李曾繼妻田氏劉芳聲妻王氏薛大豐妻劉氏王大安妻蒲氏楊翹相妻王氏劉元恕妻尉氏張璸妻姚氏張綸妾楊氏尚允執妾張氏孟梃妻王氏杜濂妻劉氏李希正妻馮氏薛大紀妻王氏楊珏妻吳氏劉倬妻任氏石廣寶妻尚氏俱乾隆年閒旌陳義妻王氏臨晉人守正捐軀同縣貞女徐氏節婦譚大學妻段氏黄剛妻鄧氏姚格妻王氏王信妻郝氏馬有才妻衞氏宋歩旦妻吳氏妾高氏任天祥妻屈氏任廷琇妻王氏吳志高妻劉氏梁邦妻程氏王肅鑒妻荆氏朱文英妻樊氏許爾璋妻曹氏俱乾隆年閒旌韓維葉妻侯氏虞鄉人守正捐軀同縣貞女王柏英節婦任德英妻劉氏李近計妻姚氏麻世僑妻翟氏杜世玉妻景氏杜明珍妻吳氏羅九法妻張氏張清妻陳氏胡允德妻高氏汪石妻李氏薛鵬妻戈氏朱葉妻葉氏王國儲妻楊氏安瑨妻韓氏雒司煊妻汪氏麻懷祖妻顔氏程立學妻張氏俱乾隆年閒旌郭鍢妻周氏榮河人守正捐軀同縣節婦范鐄妻史氏黄廷蘭妻賈氏張瑞凝妻趙氏聶夢麟妻薛氏孫一元妻杜氏王夢熊妻樊氏姚登第妻張氏高登雲妻張氏張明德妻陳氏張大鯤妻甯氏屈鳳祥妻楊氏史瑄妻王氏薛國瑚妻李氏馮明耀妻王氏吳克温妻薛氏范承烈妻賈氏李運隆妻賈氏王詠妻韓氏陳永昌妻暢氏王無疆妻賈氏俱乾隆年閒旌李君治妻張氏萬泉人守正捐軀同縣節婦薛如蘭妻王氏郭侯垣妻張氏潘德涵妻聶氏潘善繼妻趙氏武燕妻楊氏潘一青妻李氏李久泰妻薛氏范衞彦妻李氏范囘林妻陳氏王鍴妻尉氏王庚茂妻謝氏高正妻馮氏潘河榮妻楊氏孫秉直妻竹氏樊楩妻王氏王治民妻崔氏陳大有妻閻氏陳建基妻王氏潘大擅妻武氏楊繼藩妻王氏盧安仁妻郭氏范文妻于氏崔有年妻盧氏竹大建妻蔡氏黄君夀妻蔡氏王炷妻張氏武新政妻樊氏薛威妻李氏潘吕嵩妻李氏張多載妻聶氏樊培洛妻郭氏茹秉禮妻張氏王維祺妻閆氏王若義妻竹氏薛允盛妻王氏柴民治妻賈氏張崇妻武氏余文元妻王氏俱乾隆年間旌予蒲妻李氏猗氏人夫亡守節同縣節婦王舍宏妻令狐氏衞維璣妻李氏張中侯妻陳氏亷超睿妻李氏管文蘭妻趙氏喬學愚妻介氏陳萬妻喬氏杜丕振妻郭氏喬淯崐妻郭氏雷