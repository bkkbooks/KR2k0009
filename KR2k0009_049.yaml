黨太守加建威將軍討石勒屢有戰功南北朝魏吕温幽州人世祖時上黨太守善勸課有治名隋柳昂解人文帝初潞州刺史昂見天下無事上表請勤學行禮自是天下州縣皆置博士昂在州甚有惠政唐崔元靖樂平人貞觀間長子縣令公直亷介發奸摘伏民不敢欺時有虎傷人元靖祈諸神遣使追虎殺之姚崇硤石人睿宗時厯潞州刺史專務徳化政條簡肅潞人爲立碑記之薛僅河東人開元間上將巡潞藩僅以拾遺出宰屯留諸事克辦次年嵗饑出公私米賑救所活以百萬計又堤防水患嵗漸豐稔程千里萬年人天寳末安祿山反遷上黨長史至德二載賊將蔡希德圍上黨輕騎挑戰千里率百騎欲直擒之希德幾得而救至會橋壞馬顛爲賊所執仰首勅諸騎還曰爲我謝諸將可失帥不可失城軍中皆爲泣下増備固守賊不能下乃還囚千里至東都見害王䖍休梁人澤潞李抱真授兵馬使抱真卒元仲經等謀樹其子緘䖍休正色語衆曰軍王軍士王士帥亡當禀天子何有妄謀徳宗嘉之擢潞州左司馬領留後號令撫循軍中大治二歲遷昭義節度使始屬城州縣守宰多署他職不親政故治苟簡䖍休悉增俸廪遣就部人以妥安䖍休性恪敏節用度既沒所部帑廪皆可支數歲孔戡孔子三十八世孫巢父子以大理評事佐昭義節度使李長榮幕長榮死盧從史代之留署掌書記從史稍得志益驕與王承宗田緒陰相結欲久連兵以固其位戡始隂爭不從則于會肆言以折之從史卒偃蹇不軌戡遂以疾歸洛陽烏重允張掖人為潞牙將兼左司馬節度使盧從史奉詔討王承宗隂與賊連吐突承璀將圖之以告重允乃縳從史帳下士持兵合讙重允叱曰天子有命從者賞違者斬士無敢動李殷鋭僖宗時為潞州刺史中和三年李克用陷潞州殷鋭死之五代梁牛存節博昌人潞州都指揮使梁王攻鳳翔使召存節存節為將法令嚴整而善得士心潞人送者皆流泣任圜三原人李嗣昭節度昭義辟圜觀察支使梁兵築夾城圍潞州危甚圜勸嗣昭堅守以待不可有二心巳而莊宗攻破夾城聞圜為嗣昭畫守計甚嘉之宋王祐莘人太祖征太原巳濟河諸州饋集上黨城中車乘塞路上以祐能治劇令知潞州及至饋餉無乏路亦無壅柴禹錫大名人太宗時知潞州州民乞留三載詔獎之王曙河南人仁宗時知潞州州有殺人者獄巳具曙獨疑之既而提點刑獄杜衍至事果辦曙為作辦獄記以戒官吏郭諮平棘人仁宗時知潞州言懐保二郡旁山可以植稻定武唐河抵瀛莫間可興水田又作鹿角車陷馬槍請廣獨轅弩于他道詔諮置弩千分給并潞劉絢常山人神宗時為長子令督公家逋賦不假鞭扑而集歲大旱府遣吏視傷所蠲財什二絢力爭不得封還其揭請易之富弼歎曰真縣令也苗時中宿州人調潞州司法叅軍郡守欲入一囚于死執不可守怒責甚峻時中曰願歸田里法不可奪守悟而聽之邵伯温洛陽人元豐間調長子尉有德政去監永興軍民思之朱光庭偃師人哲宗時知潞州隣境旱饑流民入境者踵接光庭日為食以食之常至暮不暇食遂感疾猶力視事出禱雨拜不能興再宿而卒梁燾須城人哲宗時知潞州歲饑不待命發常平粟賑民流人聞之來者不絶燾處之有條人不告病明年以左諫議大夫召甫就道民攀援不得行踰太行抵河内乃巳李昭玘濟南人哲宗時通判潞州潞民死多不葬昭玘斥官地畫兆竁具棺衾作文風曉之俗為一變劉汲丹稜人通判隆德府時方士林靈素用事郡人班自改易繫辭為妖言以應靈素汲攝守下自獄靈素薦自有道命轉運使陳知存按騐掾史懼欲變獄汲責數掾史知存憚之卒以實聞韓昭許昌人宣和二年知隆德府單車之任勸農桑恤孤獨通泉貨巨蠧宿奸一旦芟薙又請免輸邊税在郡便納民為勒碑頌德張確宜祿人知隆德府金兵圍太原忻代降平陽兵叛確言敵既得叛卒勢必南下潞城百年不修築將兵又皆戌邊臣願得秦兵十萬人以抗敵不報明年金兵至確拒守或獻謀自東城潰圍出確怒叱曰確守土臣當以死報國乃戰而死贈述古殿直學士金沈璋永興人太行賊陷潞州官軍討平之命璋權知州事璋至招復逋逃賑養困饑民頗安輯初賊據城潞之軍卒緣坐者七百人帥府牒璋盡誅之璋不從帥怒責之且欲殺璋璋從容對曰此輩爲賊所脇初無叛心故招之復來殺之是殺降也茍利于衆璋死何憾帥怒解召潞軍曰汝使君活爾皆感泣去朝庭聞而嘉之拜左諫議大夫知潞州事百姓爲之立祠蕭仲宣遼人皇統初厯昭義軍節度使爲政平易小吏不敢爲奸賄賂禁絶奴婢入郡人莫識其面潞之百姓爲立祠刻石頌之李晏高平人大定間黎城縣令時民奉佛敎燃指灼背無所不至晏修崇學校行鄉飲酒禮使民知義俗漸革元周幹臣長清人至元中以河東肅政廉訪司知事守潞州時親王索薩爾奉命牧馬潞沁間牧人有奪民田爲牧地者幹臣詣王啟其事王令悉還其田潞無賴民好解牛以規利幹臣作詩化之民罔敢犯者索薩爾舊作小薛今改郅朗肥鄉人至元間壺關縣尹政平訟簡百廢具興尤加意學校遇旱蝗禱雨輒應蝗不爲災後陞本州同知張鵬翼大梁人至正間屯留縣尹時盜賊徧起鵬翼親當矢石爲百姓禦患又以計擒借盜爲姦者性淡薄亦無饋遺上官怒廷爭不屈去明張三同阜城人洪武初潞州同知以勤恪著創州治修廟學定在城二十四坊尤加意作人多治績崔鳳項城人洪武初知黎城縣時當兵燹後井廬盡墟官廨秩祠僅存壁址鳳招復流移撫恤如子暇即修舉頺廢邑漸以治喬育章邱人仁宗時襄垣縣主簿九年考滿詣京耆老言育持已廉謹撫下仁慈乞還襄垣終惠百姓詔進二秩還任燕雲咸寕人正統中巡撫于謙薦擢知潞州慈祥寛簡理公事如家事未嘗輕施鞭撻坐事被逮民詣闕乞留令還任徐兖商河人正統末知長子縣募壯勇造兵器以給邊備民不知勞遇歲歉賑濟境無流移以憂去民多頌之李崙臨潼人成化中知屯留縣有姦民持官府短長指使掾吏横一縣崙廉得十餘輩立捶殺之吏民大驚諸豪猾皆股慄乃興學校正風俗時婚娶平徭賦歲饑役民鑿河河治而民不饑治行爲山西最馬知縣陳思忠遼陽人壺關敎諭崔珩絳縣人俱抗節死又孫光耀者屯留知縣孫奎之父以討賊戰殁李雲起昌黎人知黎城縣姜瓖之亂大兵南下賊崩潰土寇趙聯芳胡尚文煽亂雲起死之薛起鳳韓城人順治十一年知黎城縣造耕織具敎民請豁免荒糧民利賴之金光昊全椒人康熙五年以舉人知長子縣嚴正不妄接人懲胥吏之作姦者不少貸豪猾皆聞風遠遁勸農巡阡陌間與野老狎語俾得各言疾苦大旱雩祀膝行數十里為民涕泣請命甫一年卒民為修勸農坊以志遺愛李時謙大興人康熙中以進士知潞城縣給牛種及紡織具勸民耕織清積年逋賦勤課諸生治行推山右第一曹有光績溪人康熙十二年以進士知壺關縣性澹泊食不兼味用苞苴竿牘進者直斥之以嚴濟寛盜賊斂迹卒官無以為殮老稚胥為流涕人物漢令狐茂壺關人為三老武帝末治巫蠱獄急戾太子斬江充發兵兵敗亡不得上怒甚羣下憂懼不知所出茂上書明太子無邪心天子感悟凡害太子者俱伏罪馮奉世字子明潞人馮亭之後後徙杜陵明春秋大義習兵法昭帝時前將軍韓増舉奉世以衞尉使持節送大宛諸國客發兵擊莎車威震西域為光祿大夫水衡都尉元帝時累遷執金吾永光二年秋隴西羌反奉世討擊大破之斬首數千級賜爵關内侯居爪牙官前後十年為折衝宿將功名次趙克國長子譚為校尉隨父從軍有功未拜職病死馮野王字君卿奉世子通詩少以父任為中庶子以功次補當陽長元帝時遷隴西太守以治行高入為左馮翊有威信遷大鴻臚行能第一以昭儀兄避嫌不得為三公然甚見器重有名當時成帝時拜琅邪太守病免弟逡字子產通易官至隴西太守立字聖卿通春秋厯五郡太守所至有績馮參字叔平奉世子通尚書少為黄門郎給事中宿衞十餘年行誼敕備以嚴見憚終不得親近出為守令輒病免綏和中以關内侯奉朝請五侯敬憚之丞相翟方進亦甚重焉鮑永字君長屯留人父宣哀帝時任司隸校尉為王莽所殺永少有志操事後母至孝𥘉爲郡功曹更始二年遷尚書僕射徴行大將軍事持莭安集河東并州朔部因擊青犢大破之更始封爲中陽侯光武即位徴永不從巳知更始亡乃發喪罷兵幅巾詣河内時攻懷未拔拜永諫議大夫至懷說河内太守開城降帝大喜賜永洛陽商里宅辭不受累以功封關内侯建武十一年爲司隸校尉以事劾趙王良朝廷肅然尋出爲東海相終兖州牧鮑昱字文泉永子有智畧署守高都長以平劇賊知名後爲泚陽長政仁爱境内清靜中元元年拜司隸校尉奉法守正有父風累遷司徒建初元年大旱榖貴請還諸徙者家屬蠲除禁錮以消災眚帝納其言拜太尉薨子德修志節有名稱累官南陽太守在職九年吏人悦服徴拜大司農卒于官鮑昂字叔雅德子有孝義節行初德被病數年昂俯伏左右衣不解帶及處喪毁瘠三年抱負乃行服闋遂潛於墓次不關時務舉孝廉辟公府連徴不至卒于家馮胄字世威上黨人奉世之後李郃門人郃卒胄獨制服心喪三年時人異之常慕周伯况閔仲叔之爲人隱處山澤不應徵辟晉崔遊字子相上黨人恬靜謙退不言財利魏末察孝廉除相府舍人出為氐池長甚有惠政泰始初武帝錄文帝故府僚屬就家拜郎中年七十餘敦學不倦撰喪服圖行於世劉淵僭位命為御史大夫固辭不就卒年九十三續咸字孝宗上黨人性孝謹敦重師京兆杜預專春秋鄭氏易敎授常數十人又修陳法律明達刑書永嘉中厯廷尉平劉琨以為從事中郎著遠遊志異物志汲冢古文釋行於世南北朝魏堯暄字辟邪長子人本名鍾葵後賜名暄為千人軍將太武以其恭謹擢為中散後兼比部尚書暄前後從征及出使檢察三十許度皆有克已奉公之稱賜爵平陽伯轉大司農卿卒於平城孝文為舉哀贈相州刺史堯雄字休武暄孫初為瀛州刺史平城縣公義然後取接下以恩吏人懷之孝武入關雄為大都督隨高昂破賀拔勝於穰城仍除豫州刺史累有戰功加驃騎大將軍儀同三司雄性質寛厚為政舉大綱在邊十年屢有功績愛人利物多所施與興和四年卒贈司徒謚武恭楊引襄垣人三歳喪父母年九十三卒引年七十五哀毁過禮三年服畢恨不識父追服斬衰食粥麤服誓終身命經十三年哀慕不改郡縣鄉里三百餘人上狀稱美有司奏聞詔復其一門假以散員之名李業興長子人祖蚪父元紀並以儒舉孝廉業興師事徐遵明博渉百家圖緯風角天文占候無不討練尤長算學延昌中為戊子元厯上之正光三年奏行之賜爵長子伯除通直散騎常侍武定元年遷國子祭酒官至中外諮議叅軍子崇祖能傳父業年十二與盧景𥙿講易論難往復景裕憚之後封屯留縣侯隋馮世基上黨人明悟有幹畧開皇中為兵部尚書顯名于世唐苗晉卿字元輔壺關人擢進士第累官河北採訪使厯憲部尚書致仕明皇入蜀晉卿間道走金州肅宗召赴行在拜左相京師平封韓國公改侍中代宗時吐番犯京師晉卿以病卧家賊輿致脅之噤不肯語賊不敢害帝還拜太保晉卿所至以惠化稱秉政七年小心謹畏練達事體百官簿最一省無遺議者比漢胡廣肅宗欲以李輔國為常侍奏曰常侍近密非賢不可居罷之卒諡文貞配享肅宗廟廷宋李崇矩字守則上黨人幼有至行史宏肇署為親吏宏肇誅崇矩盡籍財產以付其母弟福周祖嘉之宋初李筠叛崇矩屢破其衆累拜樞宻使大平興國初為瓊崖儋萬四州都巡檢使麾下憚行崇矩厚給之黎賊擾動崇矩悉撫慰之遺以巳財莫不悦附卒贈太尉諡元靖李處耘上黨人父肇仕後唐從討王都戰死周顯德中隸太祖帳下補都押衙會太祖出征駐軍陳橋處耘臨機決事謀無不中從平澤潞遷羽林大將軍朗州軍亂以處耘為都監入辭帝命并圖荆南遂假道江陵襲其城即發江陵卒萬餘人并其師趨朗州大破賊於三江口朗州潰遂入潭州盡得荆湖之地卒贈宣德軍節度檢校太傅開寶中太祖為太宗納其次女為妃即明德皇后也李繼昌字世長崇矩子䕃𥙷西頭供奉官太祖欲選尚主繼昌不願至道二年掩殺賊酋喻雷曉進西京左藏庫使咸平中王均亂蜀受詔與雷有終等討破之嚴戒部下無擾民獲婦女童幼悉遣還家以功領獎州刺史累官左神武軍大將軍出知涇州卒繼昌為治尚寛所至民懷之李繼隆字霸圖處耘子太祖器重之乾德中討平江南遷莊宅副使太平興國中累以戰功改定州駐泊都監李繼遷叛率兵出銀州北破錫里諸族俘獲萬計和綽囉納十四族不下復擊破之夏州趙保忠與繼遷連謀命繼隆討之擒保忠以獻景德初禦遼有功加開府儀同三司卒贈中書令諡忠武配享真宗廟廷繼隆好讀春秋左氏傳賔禮儒士能謙謹保身明德后寢疾欲見之終不入錫里舊作悉利和綽囉納舊作岌伽羅膩今並改正李繼和字周叔與兄繼隆友愛繼隆請城鎮戎軍後復不守咸平中繼和以為言乃命繼和知其軍兼領涇原儀渭鈐轄隴山外諸族皆恐懼内附繼和好談方畧所至幹治卒贈鎮國軍節度邢濬潞州人八世同居真宗時旌表仍蠲其課調李昭亮字晦之繼隆子四歲補東頭供奉官累遷真定路都總管保州兵叛昭亮招降之拜殿前副都指揮使昭亮將家子習軍中事既統宿衞政尚嚴帝祠南郊騎卒亡所挾弓會赦當釋昭亮曰宿衛不謹不可貸卒配隸下軍禁兵自是頓肅拜同中書門下平章事仁宗書昭亮親賢勲舊命其子惟賢持賜之卒諡良僖惟賢字寶臣累遷至四方館使善宣詞令習朝儀仁宗愛之李用和字審禮章懿皇太后弟由三班奉職累拜同中書門下平章事仁宗以太后不逮養故外家襃寵特厚卒諡恭僖用和列位將相小心靜黙推遠權勢論者稱之子璋字公明累官殿前都指揮使仁宗書忠孝李璋並秘書賜之厯知澶鄆二州皆有治績卒諡良惠李遵勖字公武繼昌子舉進士尚萬壽長公主累官康州團練使會繼昌暴感風眴遵勖馳省不俟命既還上表自劾帝慰諭之屢遷鎮國軍節度使天聖間章獻太后屏左右問人言遵勖曰人言天子既冠太后宜以時還政耳太后乳母林氏干預國事遵勖宻置之别院出入伺察之其補助多類此嘗師楊億為文億卒為制服與劉筠相友善筠卒存恤其家卒諡和文子端懿字元伯性和厚喜問學厯外任有治迹官至安遠軍節度使端愿字公謹亦善為政神宗時河東城勒福端愿手寫趙普諫太宗北伐疏以聞官至太子太保卒端慤字守道東上閤門使勒福舊作囉兀今改正苗授字受之潞州人父京慶厯中死守麟州抗元昊授少從胡翼之學䕃供備庫副使多戰功遷西上閤門使鬼章寇河州一戰克撒宗論功第一遂知州事屢破巨盗累官保康節度使授遇事持議不苟合卒諡莊敏子履知蘭州有破羌功官至都指揮使宇文光字仲明黎城人博極羣書尤好春秋左傳曰不讀此不足以斷大事崇寕初詔天下以三舍取士光以文學取重靖康中金兵南下見執不屈而死王彦字子才上黨人徽宗時為清河尉金人攻汴京彦棄家赴闕張所異其才擢為都統制與金師戰敗之彦撫愛士卒與同甘苦未幾兩河響應忠義民兵皆附之衆十餘萬屢破大敵威聲震河朔時稱名將累官浙西淮西淮東沿海制置副使彦事親孝居官廉子弟有戰功不與推賞將死召其弟姪以家產均給之金王良臣潞州人承安中進士能詩授翰林修撰興定二年為潞州元帥府參議官元兵至與元帥納赫布魯都死之贈孟州防禦使元任志潞州人歸穆瑚黎充元帥數與金人戰有功金人擒其長子以招之志曰我為大朝帥豈愛一子親射殪之穆瑚黎召議事志道經武安其縣巳反為金志死之子存襲與金將武善戰死穆瑚黎舊作木華黎武善舊作武仙今並改正宋子貞字周臣長子人工詞賦與族兄知柔同補太學生俱有名金末潞州亂子貞歸東平行臺嚴實為幕府詳議官兼提舉學校於政治裨益最多世祖南伐召問方畧對曰投降者不殺脅從者勿治則郡縣可傳檄而定世祖善其言尋拜右三部尚書裁定省部制度上書陳便宜十事次第施行至元中拜中書平章政事復陳時務之切要者十二策以年老求退敕中書有大事即其家訪問子貞聞朝廷事不便亦必封疏上奏愛君憂國不以進退異其心焉子渤字齊彦有才名官至集賢學士宋衟字宏道長子人善記誦中統初擢翰林修撰數辟趙璧幕有功入為太常少卿太子以其耆德召見侍講幄開諭為多終太子賓客有秬山集十卷李孟字道復上黨人父唐厯仕秦蜀因徙居漢中至元中孟隨父入蜀臺省薦辟皆不就成宗立時武宗仁宗皆未出閣求名儒輔導有薦孟有宰相才宜為太子師傅大德初武宗撫軍北方仁宗留宫中孟日陳正道多所進益其後仁宗入靖内難敬事武皇篤孝母后文物典章號為極盛皆自孟啟之仁宗監國孟叅知政事損益庶務悉中利病仁宗嗣立真拜中書平章政事以國事為巳任節賜與重名爵貴戚近臣惡其不便于巳而心服其公終無間言累封韓國公卒諡文忠明杜斆字致道壺關人通五經尤深于易元末舉鄉試第一累官陜西儒學提舉洪武初召見拜四輔官兼太子賓客勸帝治天下當法堯舜時國子祭酒缺斆舉宋訥上稱其得人暴昭潞州人洪武中由大理寺司務累官刑部尚書布衣麻履以清儉知名建文初充北平採訪使得燕邸不法狀宻請預為備燕兵起設北平布政司於真定昭以尚書掌司事平安諸軍敗召歸金川門陷被執不屈磔死連楹字子聰襄垣人性至孝刻厲進修洪武中官翰林改御史糾彈無所避及燕兵破南都楹叩馬欲犯成祖被殺植立不仆後追贈詹事諡剛烈李昱字文昭長治人授光祿寺署丞正統十四年英宗土木之變扈從陷敵額森欲用之昱曰主辱臣死今日固吾死所也遂遇害額森舊作也先今改正阮勤字必成本交趾人父河爲長子典史遂占籍焉勤舉景泰中進士授大理寺評事厯知台州府清慎有惠政成化時由陜西巡撫爲兵部侍郎調南京刑部皆有治稱張倫潞州人母喪廬墓負土葺墳穿井不得泉焚香拜泣水湧出成化中旌表韓錦潞城人敦孝讓與同邑李昇俱六世同居成化八年旌表王佐字汝弼潞州人舉於鄉正德中爲西平知縣流賊攻城佐手殺數十人矢斃其賊帥賊忿怒急攻三日佐力屈被執罵不絶口賊懸諸竿而支解之事聞贈卹如禮任環字應乾長治人嘉靖中進士厯知黄平沙河滑縣並有能名遷蘇州府同知倭寇起長吏莫嫻兵革環獨身任之累以破倭功擢右叅政整飭蘇松兵備環慎名檢敦行誼在行間與士卒同寢食得賜予悉分給之嘗書姓名于肢體曰戰死庶得收葬將士皆感激故所向有功卒贈光祿卿建祠蘇州仇大長治人六世同居先後出節烈婦貞女共二十三人萬厯中旌表程正巳字道先長治人萬厯中進士厯官吏部郎中掌計典太宰趙南星深倚之累遷僉都御史巡撫保定魏忠賢以部民納交拒弗納楊漣罷官歸道出恒山正巳獨殷勤旅次忠賢益銜之遂削奪遣戌崇禎初起兵部侍郎卒贈尚書馬鏜潞城人以純孝稱母張氏守節失明鏜朝夕籲天母目復明後官靈山衞敎授李養裕黎城人崇禎六年大寇邢紅狼盤據黎城西北養裕鬻產募兵禦之一日賊逼城下先登力戰矢盡被執不屈死兵雖失利然城賴以全本朝王鼐字允調長治人順治進士累官監察御史在朝敢言疏辨潞安焚機罷市事夙弊遂除邑人賴之原良長治人姜瓖之亂母秦氏為賊兵所執欲犯之良奮挺擊賊賊割其脣罵愈厲母子俱罹害又同邑王運隆及弟運興奉母朱氏避天橋寨中兵攻寨母自縊兄弟拜泣畢並投崖死林茂楠長治人姜瓖之亂負母跣行四十里遇賊驚散痛哭行求得母于保定得父于西安走壺關復得少弟時有幼婦求為配力却之馬之迅字敏仲長治人順治中授福建守備遷廣東都司僉書俱有平寇功再遷彝陵遊擊呉三桂反川寇集城下之迅拒守間出奇兵擊之追殺數十里之迅亦被創卒贈昭勇將軍馬聲字正希之迅子父追川寇被創聲割股以療訖不起誓殺賊報讐尋授援剿右路逰擊率部下二千人轉戰楚粤間功最遷副將遂帥師抵昆明賊帥郭壯圖開門突戰聲力禦之賊死亡畧盡滇平擢雲南永北鎮總兵在鎮十五年兵民俱安王阜成長治人以孝義稱乾隆四十六年旌崔兆祥長子人諸城令自晉養子自晉被論家屬坐流徙時自晉子兆瑞年幼兆祥涕泣求代行不許後遇赦攜兆瑞歸鬻田產復徒步往諸城迎自晉柩返葬王三聘潞城人父病亟三聘憂甚夢人語曰虎肉可愈泣曰安得虎巳而悟曰虎者股也割股以進父立愈秦學珍壺關人以孝義稱乾隆三十三年旌流寓漢鮑宣高城人徙之上黨以為其地宜田牧又少豪俊易長雄遂家于長子王莽秉政風州郡以辠法案誅漢忠直臣不附巳者宣竟死三國魏常林温人避地上黨耕種山阿當時旱蝗林獨豐收盡呼比隣升斗分之張臶鉅鹿人不應辟命移居上黨并州牧高幹表除樂平令不就宋黄庭堅分寕人嘗寓襄垣有像贊等石刻咸寶重之明謝榛臨清人以詩歌名諸王爭相延致瀋府王將軍中尉多工詩皆由榛啟之列女漢馮昭儀上黨人奉世女平帝祖母也元帝選入後宫生男拜倢伃建昭中上幸虎圈熊佚出圈攀檻欲上殿左右貴人傅昭儀等皆驚走馮倢伃直前當熊而立左右格殺熊上問人情驚懼何故前當熊倢伃對曰猛獸得人而止妾恐熊至御坐故以身當之元帝嗟歎以此倍敬重焉鮑宣妻桓氏字少君宣嘗就少君父學父奇其清苦以女妻之裝送資賄甚盛宣不悦曰少君生富驕習美飾吾實貧賤不敢當禮妻曰既奉承君子惟命是從乃悉歸侍御服飾更著短布衣與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之隋陸讓母佩女鷹菊賊迫上馬投地奮罵俱見殺王川妻平氏被驅抱幼女投井死事聞旌為四貞建祠致祭李曉妻焦氏長治人東阿主簿焦鉦女字李曉將娶而曉卒女欲臨其喪父母不許縊于室幾死母因偕往哭盡哀姑牛氏老且盲女願留養曲盡孝敬姑大喜目復明事聞旌表壽八十九卒郝淮妻孔氏長治人淮存時有友寄白金數百淮殁或勸弗與孔正色曰不義之行可玷夫于地下耶悉還之孔年二十八而寡撫子繼英有成壽八十卒馮王擢妻常氏屯留人年二十夫亡里中少年悦其色願娶之常挾利刃自矢曰吾頭可斷此志不可奪卒完節以夀終萬厯間旌表崔濟妻常氏襄垣人年二十七夫亡豪家有強婚者常遂自縊救甦翦髪訴之當事卒全其志郝思仁妻栗氏襄垣人生一子不育夫亡守節事孀姑三十年姑殁負土封墓不櫛髪不茹葷以哀毁終巡按御史旌之郗自省妻郝氏襄垣人族無賴某逼汚不從自刎死事聞建坊旌表程萬里妻袁氏長治人萬里被賊殺袁抱幼子暨二女趨赴井長女徘徊袁推入之轉顧幼者巳逸去袁即抱子自沉死朱綱妻賈氏長治人被賊掠欲汚之大罵不屈賊縱火賈投烈焰死趙惟徴妻秦氏長治人賊迫之不屈截十指俱斷投火死惟徴子學會妻璩氏投窖死張氏三烈生員張于京母袁氏妻李氏從兄于正妻李氏皆長治人孀居遭亂袁攜三女避土洞中賊搜獲袁罵賊被殺又繫于京妻于馬項不從馳馬曳死繫于正妻于店大罵投火死劉守倉妻韓氏長治人賊執守倉將殺之韓奔救伏守倉身哀懇曰願殺我母殺夫賊俱殺之張斗熙妻程氏長治人崇禎中偕姊妹避難于縣南高家坨賊至被獲牽之馬上投地大罵賊立殺之姊投厠妹投繯皆死焉楊烈女字穿羅長子人諸生學程女年十四未字崇禎中為流寇所執迫以刀鋸不懼至刺腹斷背仍罵不輟賊怒遂解其屍任肯堂妻劉氏長子人崇禎間被寇掠大罵不屈賊斷其左股罵愈厲賊碎其頭死而復甦時抱娠越三月生男任相事繼母以孝聞邢宗齊妻張氏襄垣人崇禎中流寇至一門被執張紿賊曰若釋我翁與夫我當汝從賊果釋之翁與夫去遠張大罵投深溝死又申承文妻侯氏為流寇所執厲罵不屈賊立殺之張隆妻張氏潞城人崇禎中流寇破城被虜不屈遂遇害李嘉妻崔氏黎城人崇禎中流賊掠境被執詈罵不屈賊强載之馬上臨絶險而墮本朝張克儉妻王氏長治人克儉以副使監軍襄陽殉城死王孀居于家姜瓖之亂避故縣土洞中賊攻垂破王曰我命婦也義不受辱投懸崖死申嘉行妻程氏長治人姜瓖之亂與一子三女俱被執繫安城營伍中程挽三女同墜營旁井中月餘汲出之顔色如生又楊大任妻宋氏任憲妻李氏郭永安妻彭氏俱殉節死景光大妻李氏長治人姜壤之亂光大被害李謂其子星曰婦人被擄而死棄骸道路非禮也可穿穴井中匿我後賊用火爇之李破面流血變形投繯死又申周翰妻朱氏朱翰桓妻阮氏俱投井死杜大莊妻張氏觸石死趙龍鱗妻李氏長子人姜瓖之亂避難西山路遇游騎刦之李罵不絶口賊裂體剖心死同縣馮景星妻曹氏范鵬程妻李氏俱被執不汚赴井死李名鬨妻鄭氏襄垣人年十九夫亡矢死或紿之曰墓封未百日不敢啟縱死不得同穴也鄭諾之及期浣衣沐浴祭夫墓奠畢挂樹而死劉加義妻向氏壺關人姜瓖之亂與叔加廷妻牛氏俱被掠同聲詈罵賊露刃脅之皆延頸掠髮夷然就戮月餘收其屍形骸不毁同縣皇甫德妻晉氏年十八避寇紅嶺寇攻急矢不辱身遂遇害劉才妻石氏黎城人才貧甚石操作奉姑無間言才病篤與妻訣曰我死擇勝我者事之石嘿然才殁三日乘間投繯死宋近臣妻田氏長治人年十七守正被戕雍正五年旌武某妻賈氏長治人守正被戕鮑委妻袁氏長治人守正捐軀又同縣烈婦馮成貴妻崔氏靳全德妻韓氏原本利妻劉氏李照妻郭氏節婦王秉義妻賈氏閻聘妻牛氏陳廷佐妻王氏楊舒妻康氏郝正巳妻劉氏車三聘妻賈氏閻克寛妻胡氏胡鼎妻王氏宋鴻儒妻梁氏栗培先妻周氏郭之屏妻王氏王建極妻路氏馮文生妻楊氏胡建寅妻杜氏孟律妻張氏申永惠妻王氏胡廷梅妻王氏胡涵妻趙氏廉世舉妻郭氏趙文焯妻楊氏馮天寵妻劉氏袁天植妻李氏郭崑妻牛氏韓翰臣妻王氏王克禮妻張氏李業妻常氏翟飛妻宋氏俱乾隆年間旌侯同來妻常氏長子人守正捐軀同縣節婦趙復晉繼妻康氏許清妻原氏李八孩妻田氏俱乾隆年間旌程錫礽妻李氏屯留人夫亡守節乾隆年間旌李八孩妻王氏襄垣人守正捐軀同縣節婦郝秀銀妻許氏李桓妻張氏鄭爲仁妻劉氏崔均妻趙氏王夢說妻路氏俱乾隆年間旌武經文妻王氏潞城人夫亡守節同縣節婦牛葆中妻郭氏吳晉妻賈氏牛宿財妻劉氏子可金妻秦氏俱乾隆年間旌趙氏壺關人夫亡殉節同縣節婦郝氏郭世金妻岳氏俱乾隆年間旌王聚海女王氏黎城人守正捐軀乾隆四十二年旌和安東妻王氏長治人守正捐軀同縣烈婦栗從秀妻常氏貞女高建昌聘媳王氏節婦秦錦妻張氏楊光耀繼妻陳氏郭秉精妻殷氏俱嘉慶年間旌崔攀桂妻王氏長子人夫亡守節嘉慶年間旌馮聽第妻王氏屯留人夫亡守節同縣節婦馮福元繼妻楊氏俱嘉慶年間旌武占鼇妻李氏襄垣人守正捐軀嘉慶二十三年旌胡聚則妻舒氏潞城人守正捐軀同縣節婦常恒妻張氏常淵妻曹氏侯五常妻陳氏申事天妻郭氏俱嘉慶年間旌王鼐妻段氏壺關人夫亡守節同縣節婦王瑾妻張氏郭躋妻宋氏俱嘉慶年間旌馬三多妻楊氏黎城人夫亡殉節嘉慶二十三年旌仙釋漢王真字叔經上黨人孝武帝時為郡史年且百歲面有光澤似未五十者自云周流登五岳名山能行胎息胎食之方嗽舌下泉咽之趙瞿上黨人病癩垂死家人棄置山穴中有仙人賜以囊藥服之而愈仙人曰此松脂也瞿服之不輟體輕而齒不落髪不白乃上抱犢山仙去郝孟節上黨人能含棗核不食可至五年十年又能結氣不息身不動摇可至百日半年有室家為人質謹不妄言似士君子魏武使領諸方士晉鮑元上黨人南海太守有内學逆占將來葛洪師事之傳其業唐樂氏二女屯留人母楊氏感仙光而生繼母吕氏御之甚酷冬月單衣跣足使採茹二女性至孝泣血侵土化為苦苣其葉有赤斑若血痕然得一筐以歸奉母母意終不釋移家壺關紫團鄉又令拾麥弗能得畏母捶楚仰天號訴忽感黄龍下降二女俱升仙樂異音經宿不散土人立廟祀之宋崇寕間賜諡冲惠中淑真人元子晏壺關人關天慶之子幼師慧冲精禪理後于鳳凰山建道場寺無水嘿祝噀巖甘泉隨湧詔賜袈裟紫縧玉環魏文昌壺關人能隱形變化人以左慈方之後亦尸解土產綢出府境明統志州境俱出長理石出長治等縣明統志州境俱出石脂壺關縣出有赤白等色不灰木出黎城壺關等縣明統志州境俱出按唐書地理志潞州土貢石蜜墨元和志潞州賦麻布寰宇記潞州土産紫草寰宇通志州出鐵磁噐明統志州境出銅今並未聞又府志載產人參考郡故上黨地蓋即今所稱黨參者地氣既殊質味並薄不堪與神區靈草同名通志不載爲是纂修官臣馮芝恭纂總纂官臣顧蒓許應藻恭覆輯校對官臣劉咸恭校
