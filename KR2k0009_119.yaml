body:
  text: 臨江府在江西省治西南二百二十里東西距二百三十里南北距二百六十里東至南昌府豐城縣界八十里西至袁州府分宜縣界一百五十里南至吉安府吉水縣界一百七十里北至瑞州府高安縣界三十里東南至撫州府樂安縣治二百里西南至吉安府廬陵縣界一百九十里東北至豐城縣界一百里西北至瑞州府上高縣界七十里自府治至京師五千二百三十五里分野天文斗分野星紀之次建置沿革禹貢揚州之域春秋屬呉戰國屬楚秦為九江郡地漢置新淦縣屬豫章郡為南部都尉治後漢以後為豫章郡地隋為廬陵郡地唐為吉州地五代南唐置清江縣屬筠州宋淳化三年始置臨江軍屬江南西路元至元十四年升為臨江路隸江西行省明洪武元年改曰臨江府屬江西布政使司本朝因之屬江西省領縣四清江縣附郭東西距一百三十三里南北距五十五里東至南昌府豐城縣界八十里西至新喻縣界五十三里南至新淦縣界二十五里北至瑞州府高安縣界三十里東南至新淦縣界二十里西南至新喻縣治一百十五里東北至南昌府豐城縣治一百三十里西北至瑞州府上高縣治一百三十里漢置新淦縣屬豫章郡為都尉治後漢以後因之隋徙廢為新淦縣地南唐昇元元年始置清江縣屬洪州保大十年改屬筠州宋淳化三年於縣置臨江軍元為臨江路治明為臨江府治本朝因之新淦縣在府東南六十五里東西距一百里南北距七十里東至撫州府樂安縣界八十里西至新喻縣界二十里南至峽江縣界三十里北至清江縣界四十里東南至撫州府樂安縣治一百三十里西南至峽江縣治八十里東北至南昌府豐城縣治九十里西北至清江縣治六十五里本漢豫章郡新淦縣地隋開皇十一年移置新淦縣屬廬陵郡唐屬吉州宋淳化三年屬臨江軍元屬臨江路元貞元年升爲州屬臨江路明洪武初仍爲縣屬臨江府本朝因之新喻縣在府西南一百二十里東西距一百三十里南北距一百五十里東至新淦縣界七十里西至袁州府分宜縣界六十里南至吉安府廬陵縣界七十里北至瑞州府上高縣界八十里東南至峽江縣治九十里西南至袁州府治二百三十里東北至清江縣界八十里西北至瑞州府上高縣治一百十里漢豫章郡宜春縣地三國呉孫皓析置新渝縣屬安成郡晉以後因之隋開皇初屬袁州大業初屬宜春郡唐日新喻屬袁州宋淳化三年屬臨江軍元元貞元年升爲州屬臨江路明洪武初仍爲縣屬臨江府本朝因之峽江縣在府南一百三十里東西距七十里南北距九十里東至吉安府永豐縣界四十里西至新喻縣界三十里南至吉安府吉水縣界四十里北至新淦縣界五十里東南至吉安府永豐縣治一百四十里西南至吉安府治二百里東北至新淦縣治八十里西北至新喻縣治九十里漢新淦縣地三國呉分置巴邱縣屬廬陵郡晉以後因之隋省入新淦縣明嘉靖五年分置峽江縣屬臨江府本朝因之形勢當南粤䖍吉舟車四會之衝南唐呉鸞建清江縣議北有蒙山南臨渝水明統志扼嶺襟潭掖袁控瑞通閩粤帶䖍吉形勝足恃明郭子章郡邑表說風俗君子尚禮崇德小人勤力知分明統志風俗淳厚文物雅飭在楚越之間謂之樂土明敖英清江縣題名記城池臨江府城周八里二百五十四步門十濠廣一丈五尺宋淳化初土築明正德中甃甎本朝順治八年重築康熙六年修乾隆二十五年重修清江縣附郭新淦縣城周四里八十六步門七濠廣六丈明正德中築本朝順治康熙年間相繼修葺乾隆二十七年重修新喻縣城周五里一百三十步門七明正德中因舊址土築嘉靖中甃甎本朝康熙初重築乾隆十年修峽江縣城周三里三百歩有奇門四明嘉靖五年創築本朝乾隆十二年修學校臨江府學在府治東南舊在府治南瀕江明嘉靖中遷今所本朝順治康熙年間相繼修葺入學額數二十名清江縣學在府城東門外舊在縣治東北宋嘉定中建明萬厯中遷今所後燬本朝順治康熙年間重修入學額數二十名新淦縣學在縣治東南明洪武初因舊址重建本朝順治康熙年間相繼修葺入學額數十二名新喻縣學在縣治南虎瞰山宋崇寕中建元末燬明洪武初重建本朝順治康熙年間相繼修葺入學額數十二名峽江縣學在縣治東百餘步明嘉靖五年建崇禎中改建於按察司行署本朝順治年間仍遷舊址入學額數十二名樂育書院在府治東南本朝順治八年建明經書院在府學旁明隆慶中建雲巖書院在府城西本朝康熙二年建龍岡書院在府城西章山之麓本朝康熙六年建蕭江書院在清江縣治南本朝順治八年建章山書院在府城章山之麓本朝嘉慶二十二年知府朱淥建高峯書院在新淦縣治東宋建明隆慶中改建儒學内為勉齋祠本朝康熙四年移建惜陰書院舊址惜陰書院舊在新淦縣治東一里晉陶侃讀書處明成化中建書院本朝康熙元年改建縣之北門外金川書院在新淦縣治東北明正德中建祀練安按舊志載清江書院在清江縣治東宋建金鳳書院在金鳳洲宋國子司業黎立武建仰高書院薌林書院並明嘉靖中建明宗書院明崇禎中建今俱廢謹附記户口原額人丁五萬六千二百八今滋生男婦大小共一百二十七萬八百四十二名口計二十五萬二千八百三十六户又前左衛屯軍男婦大小共八千三百六十八名口計一千四百七十六户田賦田地二萬八千八百九十六頃四十一畝四釐有奇額徴地丁銀一十五萬六千九百五十九兩四錢七分米九萬二千七百二十二石六斗八升八合山川白牛岡山在清江縣東三里山勢平坦如臥牛上有雷祠俗呼雷廟嶺紫淦山在清江縣東四十里周二十餘里高數十丈淦水經其下相映作金紫色寰宇記作子淦山閤皂山在清江縣東六十里連互二百餘