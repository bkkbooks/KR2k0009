州代還密敎貫陰佐遼以圖金人貫不能用及貫收復燕山邈嘆曰禍自兹始矣出為河北西路制置使拜青州觀察使仍知府事金兵至城被圍相持四旬城破巷戰不克幹里雅布脅邈拜不拜乃拘於燕山府命邈降邈憤詆毁金人撾其口猶吮血噀之遂遇害將死顏色不變南向再拜端坐就戮贈招化軍節度使諡忠壯幹里雅布舊作幹離不今改正向子諲臨江人敏中元孫宣和間累官京畿轉運副使建炎初金兵至亳州約日索戰諸道畏縮不進時康王次濟州子諲獻金帛及本司錢穀之在濟州者以助軍費張邦昌僭位使其甥劉達齎手書來子諲不啟封焚之繫達於獄遷直龍圖閣尋罷以素為李綱所善故黄潛善斥之後除户部侍郎以徽猷閣直學士知平江府忤秦檜致仕退間十五年自號所居曰薌林蕭燧臨江軍人高祖固皇祐初為廣西轉運使知儂智高凶狡條上覊縻之䇿於樞府不果用智高後果叛燧生而穎異幼能屬文紹興中擢進士第授平江府觀察推官時秦檜當國其黨密告燧秋試必主文漕臺丞相有子欲屬公燧怒曰初仕敢欺心耶檜懷之調靜江府察推而歸淳熙初累遷國子司業除左司諫時宦官甘昇之客胡與可都承㫖王抃之族叔秬皆持節於外有所憑依無善狀燧皆奏罷之擢右諫議大夫尋出知嚴州移知婺州皆有治聲累官叅知政事卒諡正肅子逵登淳熙進士官至太常謝諤新喻人紹興進士攝樂安尉樂安多盜諤條二十䇿大要使其徒相紏而以信賞隨之羣盜果解散選行縣事改吉州錄事叅軍知分宜縣所至有聲擢監察御史奏減分宜華亭月樁錢上所創義役法一書詔行於諸路民以為便光宗立擢工部尚書請祠而歸卒贈通議大夫諤初居縣南之竹坡名其燕坐曰艮齋人稱艮齋先生所著有聖學淵源錄孝史艮齋集經解講義諫垣奏議諸書共九十餘卷劉清之臨江人紹興進士調萬安丞知宜黄縣周必大薦之於孝宗召對首論民困兵驕大臣退托小臣苟媮又言用人四事論皆切摯改太常主薄通判鄂州改衡州光宗即位起知袁州而疾作猶貽書執政論國事初清之欲應博學宏詞科及見朱子盡取所習焚之慨然志於義理之學吕伯恭張栻皆神交心契汪應辰李燾亦敬慕之母不逮養展閲手澤涕泗交頤宗族有流寓者皆迎養之嘗序范仲淹義莊規矩勸大家隨力行之叅取先儒禮書定為祭禮所著曾子内外雜篇訓蒙新書外書戒子通録墨莊總錄祭儀時令書續説苑文集農書徐夢莘臨江人紹興進士累官知賓州以前議鹽法罷官夢莘恬於榮進網羅舊聞會萃同異自政和海上之盟訖紹興完顔亮之斃上下一十五年為三朝北盟會編三百五十卷帝聞而嘉之擢直秘閣平生所著集𥙷會錄讀書記志集醫錄集仙錄皆以儒學冠之弟得之字思叔淳熙進士以通直郎致仕安貧樂分著左氏國紀作具敝篋筆畧鼓吹詞郴江志史記年記從子天麟開禧進士官終廣西運判所至興學明敎有惠政著西漢㑹要漢兵本末西漢地理疏山經凡百餘卷章穎臨江人以兼經中鄉薦孝宗立為萬言書附驛以聞召為太學錄遷太常博士光宗初除左司諫屢疏請上問安重華宫寕宗即位擢兵部侍郎乞降詔宣諭趙汝愚無聽其去御史劾穎阿黨罷後除集英殿修撰遷禮部尚書丐祠穎操履端直生平風節窮達不移方黨論之興朱子嘗遺以書曰世道反覆已足流涕而握其事者恕猶未已然宗社有靈公論未泯異日必有任是責者非公誰望耶卒贈光祿大夫諡文肅彭龜年清江人七歲而孤及長得程氏易讀之至忘寢食登乾道進士厯祕書郎起居舍人極諫光宗不朝重華宫而幸玉津園紹熙五年壽皇不豫疾寢革龜年連疏伏地叩額血漬甃甓請即日過宫寕宗立除吏部侍郎條數韓侂冑之姦以煥章閣待制致仕龜年學識正大議論簡直善惡是非辨析甚嚴其愛君憂國之忱先見之識敢言之氣皆人所難贈寶謨閣直學士諡忠肅著經解祭儀五致録奏議外制曾三復臨江人乾道進士紹興初厯監察御史進起居舍人兼權刑部侍郎致仕性耿介恥奔競故位不速進在臺餘二年持論不隨不激其没也士論惜之曾三聘新淦人乾道進士累遷軍器監主簿光宗不朝重華宫而欲幸玉津園三聘疏言今人心既離大亂將作陛下安意肆志而弗聞萬一敵人諜知馳一介之使問安北宫何以荅之及壽皇病革復上疏言恐不幸有狂夫姦人託忠憤以動衆悔之何及帝意為動寕宗立兼考功郎會韓侂冑為相指為趙汝愚腹心追兩官侂胄誅諸賢相繼召用三聘禄不及終不自言嘉熹間特贈三官直龍圖閣賜諡忠節張洽清江人從朱子學自六經傳註而下皆究其指歸朱子謂黄幹曰斯道之傳如二三君者不數人也時行社倉法洽請於縣貸常平米二百石建倉里中六年而歸其本於官鄉人利之嘉定元年中第授松滋尉改袁州司理叅軍尋知永新縣復通判池州皆有善政袁甫提點江東刑獄聘為白鹿書院長端平初除直秘閣致仕洽少用力於敬以主一名齋平居不異常人至義所當為則勇不可奪間居不言朝事或因災變輙顰蹙不樂聞一君子進用士大夫直言則喜見顔色所著春秋集注集傳左氏蒙求續通鑑長編事畧厯代地理沿革表及文集元范梈清江人早孤母熊氏守志長而敎之梈克自樹立無苟賤意持身亷正不可干以私呉澄以道學自任少許可嘗曰若亨父可謂特立獨行之士為文志其墓以東漢諸君子擬之黄贇臨江人父延祐間之京師贇既長聞父置妾居永平往省父殁已三年矣庶母聞其至盡挾其貲更嫁拒不見贇贇哭語人曰吾來為省父也不幸父殁思奉其柩歸窆之莫知其墓得見庶母示以葬所死不恨久之聞庶母居海濱亟裘糧往往拒不納庶母之弟憐之與偕至永平屬縣樂亭求墓又弗得哭禱於神一夕夢老父以杖指葬處明日就其弟求之庶母之弟曰真是已殮時有某物可驗也啓朽棺得父骨以歸周自强新喻人以文法推擇為吏泰定間廣西峒猺反自强徃説以禍福中其要害酋立罷兵納款超授廣西兩江道宣慰司都事厯義烏縣尹周知民情而性度寛厚不為刻深民畏且愛部使者數以亷能譽於朝為江州路總管致仕杜本清江人博學善屬文浙江行省丞相呼喇珠得其所上救荒䇿大奇之薦於武宗被召至京未幾歸隱武夷山中文宗即位以幣徴不起至正中右丞相托克托以隱士薦稱疾固辭本湛静寡欲無疾言遽色與人交尤篤於義有貧無以養親無貲以為學者皆濟之平居書册未嘗釋手天文地理厯律度數靡不通究著四經表義六書通編十原等書學者俱稱為清碧先生呼喇珠舊作忽刺术托克托舊作脱脱今改正明梁寅新喻人世業農家貧自力於學淹貫五經百氏辟集慶路訓導以親老辭歸太祖徵天下名儒修述禮樂寅就徵已六十餘矣在禮局中討論精審諸儒皆推服書成賜金幣將授官以老病辭還結廬石門山四方多士從學稱石門先生趙壎新喻人洪武初將修元史命宋濓王禕為總裁官徵山林遺逸之士為纂修官壎與焉書成賜賚遣歸而順帝朝猶未備乃命歐陽佑等往北平采其遺事重開史局仍以濓禕總裁徵四方文學士為纂修先後兩局並與壎一人而巳書成諸儒多授官壎不授尋召修日厯授翰林編修命與宋濓同職史館濓兄事之出為靖江王府長吏卒曾魯新淦人七嵗暗誦五經稍長日取三史記之尋及其餘凡數千年制度沿革無不能言者洪武初召修元史書成留編禮書授禮部主事常遇春薨高麗王遣使來祭黄帕文不著洪武年號魯讓曰納貢稱藩而不奉正朔君臣義安在使者謝易去安南陳叔明篡位懼討遣使入貢以覘朝廷意魯取副封視之詰使者曰前王曰熞今何驟更名使者具言其實帝命卻其貢由是器重即日超拜禮部侍郎尋引疾歸未抵家而卒淳安徐尊生嘗曰南京有博士二人以舌為筆者曾得之以筆為舌者宋景濓也練安新淦人洪武十八年廷試第二授修撰丁母艱力行古禮累遷工部侍郎建文初與方孝孺特見信用改吏部左侍郎以賢否進退為巳任拜御史大夫燕師起李景隆北征屢敗召還安執數其罪請誅之不聽憤激叩首曰壞陛下事者此賊也臣備員執法不能為朝廷除賣國之姦死有餘罪因大哭求死帝為罷朝燕王即位執安至語不遜遂磔死族其家婣戚俱逮戍邊從子大亨時官嘉定知縣開變同妻赴劉家河死安善文章其遺文曰金川玉屑集福王時贈太保諡忠貞本朝乾隆四十一年賜諡忠肅徐子權新淦人洪武十八年進士官刑部主事聞練安死慟哭賦詩自經死福王時贈光祿卿諡忠慤本朝乾隆四十一年賜諡節愍謝子襄新淦人永樂中處州知府郡有虎患歲旱蝗禱於神大雨二日蝗盡死虎亦遁去叛卒呉米據山谷為亂朝廷發兵討之一郡洶洶子襄力止軍母岀而自以計掩捕之獲其魁餘悉解散厯官三十年不以家累自隨金幼孜新淦人永樂初翰林檢討與解縉等同直文淵閣累遷諭德兼侍講從幸北京帝北征所過山川要害輒命記之有㫖屬起草據鞍立就自後出塞必扈從遷翰林學士尋拜文淵閣大學士仁宗立進户部右侍郎尋加太子少保兼武英殿大學士專典内制賜繩愆糾繆銀章諭政有闕失密疏奏聞用此為識洪熙初遷禮部尚書兼官如故命與楊士奇楊榮等會讞囚幼孜善律法多平反後為總裁官修兩朝實錄宣德時卒贈少保諡文靖黎恬清江人天性孝友儀度端凝永樂進士授御史三殿災詔求直言上疏斥大臣不法岀知交阯南靈州尋以楊士奇薦擢諭德與修宣宗實錄進講經筵以展墓歸卒著觀過稿胡器新淦人由國子生為泉州知府有善政詔修永樂大典士民泣送書成詔還任尋推貴州按察使寛而有法民夷愛之張固新喻人宣德進士正統初授刑科給事中號敢言帝將北征偕同官疏諌不從景泰初遷大理寺少卿鎮守四川建昌督捕山東盜所至謹於其職英宗復辟固卒帝追念其忠遣行人劉恕諭祭廕一孫傅瀚新喻人天順進士選庶吉士授檢討遷諭德直講東宫宏治中累官禮部尚書保定獻白鵲疏斥之巡撫熊􆃬以縣民所得白玉璽來獻瀚言帝王受命在德不在璽京師星變請躬行節儉以先天下又言光祿寺供億之濫帝悉嘉納卒贈太子太保諡文穆彭綱清江人成化進士授武選司主事遷員外郎上封事劾妖僧繼曉出知汝州鑿渠引水灌田數千畝世為民利擢僉事遷雲南提學副使以明公稱著有雲田集涂楨新淦人成化進士初為江陰知縣正德初巡鹽長蘆劉瑾縱其黨侵奪商利楨據法裁之還朝遇瑾長揖瑾恕矯㫖下詔獄江陰人在都下者謀賂瑾解之楨喟然曰死耳豈汚父老哉竟勿許遂杖三十戍肅州創重死獄中瑾誅復官賜祭干顯偲新淦人六歲失怙踰年求父像時拜且哭家貧事母能盡養及卒水漿不入口者數日比葬廬墓所虎馴其側人咸異之正德三年旌表子鳳領宏治甲子鄉薦授高淳合肥敎諭誨諸子敦實行清約有古人風遷知桃源縣命下而卒無以為殮正德間督學僉事邵鋭既祠於鄉賢仍書孝亷以表其宅張文新喻人宏治進士授給事中中官李興請備元夕燈火文切諫命減之出覈湖廣貴州軍儲會普安米魯作亂條上邊計數事劾巡撫錢鉞總兵曹愷喪師失律報可復劾外戚慶雲侯周壽罪帝不問然心知其直一時言路倚之為重正德時多弊政文先後率同官極諫至奉嚴㫖執奏如初未幾卒於官張芹新淦人宏治進士正德中擢御史疏劾李東陽以顧命大臣不能救逆瑾之亂及寕夏平又欲冒功受賞乞賜罷斥詔奪俸三月帝嘗馳馬墜失上疏切諫岀為徽州知府終浙江右布政使宿進峽江人正德進士厯刑部員外郎奏列六事一言忤逆瑾死者如許天錫周鑰輩暨中官王岳等並宜加恤一請斥附瑾大臣王敞輩察治内侍中餘黨餘四事俱切時政帝怒廷杖為民世宗立贈光祿少卿胡連新喻人正德進士厯刑部郎中初諫武宗南巡受杖嘉靖初以伏闕爭大禮再受杖創死穆宗立贈太常少卿曾櫻峽江人萬厯進士授工部主事厯遷常州知府織造中官李實廹知府行屬禮櫻獨如故天啓中高攀龍繆昌期李應昇𬒳逮櫻助昌期應昇貲而經紀攀龍死後事毛士龍孫慎行坐忤魏忠賢當戍皆緩庇之崇禎初以叅政分守漳南九蓮山賊犯上杭募壯士擊殱之改湖廣按察使分守湖南時賊已殘十餘州櫻薦蘇州同知晏日曙歸德推官萬元吉兩人方坐事以櫻言署用一方遂安遷山東右布政累擢南京工部右侍郎乞假歸唐王時以薦起工部尚書東閣大學士掌吏部福州破櫻自縊死十一年本朝乾隆四賜諡忠節施天德新喻人萬厯進士為武選郎中三疏諫熹宗内操再疏詆魏忠賢廷辨三案甚力崔魏嫉之出觀察淮徐以疾歸逆璫矯㫖勘問謫戍死崇禎初給諫薛國光疏請卹詔贈大理卿郭裕清江人崇禎中郷薦知棗陽縣張獻忠兵至左良玉屯近邑裕單騎邀與共禦賊郤去十五年冬李自成犯襄陽賊將劉福攻棗陽裕發砲石擊傷甚衆賊憤攻益力城陷𥙿身被數槊大罵賊支解之閤門遇害本朝乾隆四十一年賜諡忠烈楊廷麟清江人崇禎進士授編修京師戒嚴疏劾兵部尚書楊嗣昌恃款忘備嗣昌欲假軍機殺之詭薦廷麟知兵改職方主事贊畫盧象昇軍及廷麟督餉真定而象昇戰死嗣昌欲中以危法帝察其無罪貶秩外調都城失守廷麟慟哭募兵勤王福王召之而宗室朱統􅠳誣廷麟召健兒有不軌謀因散所募兵南都破江西都郡僅存贛州唐王手書加廷麟吏部右侍郎與國子祭酒劉同升督師吉安臨江尋入贛招峒蠻四營降之大兵圍贛與萬元吉共守城破督士民拒戰久之力不支赴水而死本朝乾隆四十一年賜諡忠節萬發祥新喻人崇禎進士改庶吉士京師陷發祥絶粒飲藥不死聞馬世奇呉麟徵殉節往哭之𬒳執賊脅之降搒掠亡完膚臨以刃不為動賊敗得間歸在贛州與楊廷麟萬元吉等同死本朝乾隆四十一年賜諡烈愍胡若坦峽江諸生崇禎間流寇至邑若坦奉母奔避母年老行遲為賊獲被殺苦坦呼號慟哭乘閒奪賊刃與賊格不勝賊劌若坦耳昏仆地復醒起立又與賊搏且搏且罵遂被害本朝邊勲峽江人少從施閏章講學於吉州康熙中舉於鄉平生質直言行一出於至誠著集蓼山房詩古文雜著四卷施聖揆新喻人十嵗喪母擗踊絶食終喪盡禮如成人事父雖貧必覔甘脆奉膳及殁廬墓三年有白鶴飛繞悲鳴又繪二親像每食必薦岀告反面年七十餘事之如一日雍正八年旌其門曾寅清江人順治庚子鄉試第一康熙進士由庶吉士為山西道御史多所建白累官至陜西甘山道副使宣布威惠邊人懷之以老告歸入祀鄉賢祠傅克生清江人康熙進士厯知瀘溪武康等縣以振興文敎為務聖祖仁皇帝南巡大吏以循良上聞特賜額清慎勤褒異之擢禮部主事致仕囊無餘物惟購書數百卷而巳卒入祀鄉賢祠楊錫紱清江人雍正丁未進士授吏部主事累官廣西湖南巡撫禮部尚書漕運總督性怙淡聲色貨利一無所好厯任封疆清操自矢屬吏有片長亟於嘉奬故人得盡其才事因以辦晉太子太保卒于官謚勤慤入祀鄉賢祠晏維旭新喻廪生躬循榘矱學溯淵源門内死爾軰亦不久屠戮語絶而仆鄉人義而葬之號廖節婦墓歐陽昌邦妻嚴氏新喻人素嫻於禮處娣姒最為和順姒汪氏先卒未葬而嚴得疾臨终謂其夫曰我與姒睦死得合葬無恨姻族難之昌邦曰吾將以風天下妯娌之不和者自我作古可也遂合葬赤石岡題曰妯娌阡鄒迪母楊氏新淦人涉獵書籍畧知大指蚤失父事母以孝既嫁生迪敎之不以恩克義迪九歲以文顯有司稱神童吕祖謙志楊墓曰賢淑嫓陶母張氏女新淦人年十六母疾二月治弗愈一日望北焚香祝天以刀開右肋取肝如指大以食母母頓愈女亦無恙人以為孝感云元劉氏女名懿文新淦人字趙國祥子未嫁夫卒父將以女他適女曰曩許趙氏義不可再竟投井死鄉人名其里曰懿文鄉呉輗妻黎氏新喻人為賊所執義不受辱投井死明范氏清江人梈孫女博通經史洪武初召為女史授孺人為宫中姆師一日高后問前代何后最賢家法何代最正對曰唯趙宋諸后為最命錄進更誦聽之詔賜歸老於家張均海妻袁氏新喻人均海試官浙古以母梁年踰八旬不得省視歸袁於家而梁嬰風疾伏枕月餘袁刲股食之疾即愈石門梁寅為文以志皮氏女名能貞清江人㓜字新喻諸生符敬及筓敬卒臥泣數日父母欲奪之乃密以衾履遺敬父母曰妾受符氏聘雖未歸其義惟均恐早晚不諱無以自明是夕自縊死張元璽妻袁氏新淦人年十八歸元璽越三嵗夫死家貧無子父母欲奪其志匍匐齧芻曰芻食獸類也得無以獸畜我乎自是衆不復言侍養舅姑以終元璽弟元芳妻龍氏元鳳妻邊氏俱早寡三人始终相持勵節不變黄體堅妻陳氏新淦人㓜納黄聘後體堅謫吏金陵父母欲絶之陳曰吾命也遂遣歸體堅以詿誤被戮陳累訴不得白徒步收其屍瘞之自縊柩側蕭惟學妻袁氏峽江人姑為虎嚙袁奔救擊虎負姑歸虎躡其後噬袁而死鄒濟泰妻簡氏新喻人年二十一而寡父母欲令改嫁簡誓死不從服除復强之簡持刀向木主哭斷二指示不再適父母乃止李厚載妻彭氏新淦人年十七歸李二十而寡父母欲奪之誓言從一而終婦人之義遂以鍼刺毁一目紡績以敎遺孤宏治間詔旌熊斐妻彭氏清江人正德中華林賊入城彭被執不辱死之督學李夢陽聞於朝命立石旌表時同縣劉清渭妻熊氏劉清澈妻邵氏鄧介妻易氏劉淮妻翁氏陳廷瓚女及其嫂杜氏俱遇華林賊義不受辱而死唐戊妻陳氏新淦人