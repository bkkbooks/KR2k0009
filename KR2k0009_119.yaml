萬載人考南唐時始分高安縣地置萬載縣屬筠州唐時無萬載縣史家從後書之耳宋易延慶筠州上高人父贇仕南唐至淮州刺史周師克淮南贇歸朝授道州刺史延慶亦授大名府兵曹參軍後知臨淮縣乾德末贇卒葬臨淮延慶居䘮摧毁廬於墓側手植松柏數百本旦出守墓夕歸侍母墓生玉芝十八莖州將表其事徵之以母老不就母卒復廬墓數年母嗜栗延慶樹二粟墓側成連理後知瑞州卒子綸大中祥符元年及第蔡嵩鹽歩鎮人與弟岑議曰鎮去高安之西百里而遥其林壑盤紆川原廻遠且南與蒙山爲隣不置縣恐非所以便民而戢姦也願竭力以佐公家費遂相率以聞于州州請于朝太平興固中乃置新昌縣用資保障後人義其所爲立祠祀之劉恕筠州人父渙爲穎上令以剛直不能事上官棄去家於廬山之陽恕少頴悟未冠舉進士詔講試經義皆第一遂賜第調鉅鹿主簿和川令發强摘伏一時能吏不及恕篤好史學司馬光編資治通鑑遇紛錯難治者輒以委恕考證差謬最為精詳王安石欲引寘三司條例恕以不習金穀為辭因言宜恢張堯舜之道以佐明主不應以財利為先安石變色不少屈尋以親老告歸著十國紀年四十二卷通鑑外紀十卷龔端新昌人元符進士靖康中極論時事之失除將作監時金師大入以端為河東路奉使參議官京畿戒嚴憂恚成病及聞兩宫北狩憤惋而卒幸元龍高安人慶元進士通判郢州忤史彌遠劾致仕紹定中京師灾元龍自家上封事論彌遠竊威福願戮其首籍其家以謝天下然後斷臣首以謝彌遠則灾自弭矣子溥嘉定進士亷介有父風幸當時元龍弟授光化軍司户襄帥趙范􅊾徃唐州時武守郭勝叛當時不從𬒳殺事聞贈京秩官其一子陳仲微高安人嘉泰進士厯江西提點刑獄忤賈似道罷久之起太府丞時國勢危甚仲微上封事言失襄之罪不專在於庸閫疲將孩兵君相當分受其責詞極激切出為江東提點刑獄徳祐初遷秘書監益王立拜吏部尚書厓山兵敗走南安卒劉應龍高安人嘉熙進士景定時提舉常平以救荒功遷知隆興府兼江西轉運副使奏免和糴二十萬石擢權户部侍郎以直言忤賈似道出知建寕府南海冦作為廣東經畧安撫使寇聞應龍至遁去南海大治德祐初遷江西兵馬鈐轄青海軍節度使力辭隱九峯子元高亦舉進士知侯官縣殁洪天錫歎曰朝廷失一御史矣胡仲雲高安人入太學率諸生上書論罷京尹余晦蔡適為祭酒仲雲與弟仲霖師之盡得朱氏之學寶祐登進士時丁大全用事欲鈎致以館職不就以江萬里薦除太學正忤賈似道出倅臨江厯樞密院編修官攝尚書右司後以母憂去姚勉新昌人寶祐中進士第一時太學生有因論丁大全𬒳逐者勉上言斥逐學宫之士以禁天下之言此蔡京秦檜所為遂歸及呉潛入相召為校書郎帝過東宫勉講否卦因指斥權姦忤賈似道似道使孫附鳯劾之免歸李長庚新昌人調湘潭丞元兵至同官皆遁長庚獨攜諸司印居守被執不屈死之元李明德上高人讀書有志操孝行篤至至正時亂兵陷袁州掠上高執其父欲殺之明德泣告曰子豈不能代父乎願勿害我父也兵遂殺明德而免其父呉起孫高安人九世同居至正中表為義門毛忠吾新昌人至正中紅巾賊陷新昌張子忠李子鈞克復州治越五日復陷子忠罵賊死忠吾保逍遥山招郭克敬合兵援州治復之未幾歐陽祥復陷上高忠吾退守古陽寨七年間大小百餘戰皆㨗州境賴以保全明陳鑑高安人宣德進士擢御史出按順天極言京師風俗澆漓章下所司格不行改按貴州麓川思機發自大軍再征窮竄屢乞通貢王振不許復大舉逺征時雲貴軍民疲敝苗乘機煽動鑑抗章言賊酋遠遁不為邊患宜專責雲南守臣相機剿滅無遠勞禁旅振大怒欲囚之改雲南參議使招賊已又令兵部劾之逮繫獄景帝時赦授河南參議致仕歸卒袁彬新昌人正統中以錦衣校尉扈駕北征及帝蒙塵從官奔散獨彬隨侍左右夜則與帝同寢天寒恒以脅温帝足居漠北期年猶骨肉也天順復辟累擢指揮使掌衛事以平曹欽功進都督指揮僉事時門達恃寵勢傾朝野廷臣多上之彬獨不爲屈達誣以罪鍜鍊成獄頼漆工楊塤訟冤得解調南京錦衣衛閒住及達得罪召彬復職官終前軍都督傅興高安人性至孝父疾感夢乃徒跣百里外得撫州絶嶺古井水調藥服之而愈祖母曹氏爲華林賊所掠渡水徃救賊用巨鐙壓之鐙忽斷賊驚異釋之事聞詔表其門謝麟高安人正徳中華林賊刦其家麟負母以避追且廹家人速之走麟曰母在顧棄之可乎既而賊執其母麟奮奪之母得免麟爲所殺呉山高安人嘉靖中進士及第累官太子太傅禮部尚書嚴嵩子世蕃介大學士李本欲與爲婚不可裕景二邸並建國本未定帝忽諭禮部具景王之藩儀嵩知帝激於郭希顔疏欲覘人心諷山留王山立具儀以奏王竟之藩後當日食微隂不見帝喜嵩趨部急賀山仰首曰日方虧將誰欺耶救䕶如常儀帝怒責山賣直詔致仕穆宗即位召爲南京禮部尚書堅辭不赴卒贈少保諡文端范㒞高安人萬厯進士厯御史帝久不視朝㒞陳時政十事言甚剴切先是慈寕宮灾給事中鄒元標疏六事忤帝意而㒞疏適入帝怒將各子杖是夜大雷雨明日朝天門外水三尺餘帝怒稍解乃斥為民自是屢薦不起里居數十年卒朱崇遂高安人萬厯中郡饑疫破産賙恤免流亡者二千餘家撫按將疏於朝力辭早嵗艱嗣鄉人共為禱遂連舉二子皆有文譽朱吾弼高安人萬厯進士授御史奏請建國本簡閣臣𥙷言官罷礦税又以雷震皇陵極言孝敬疏於郊廟惕勵弛於朝講土木盛於宫苑榛蕪遍於殿庭羣小横於中外正士困於囹圄閭閻以礦稅竭郵傳以輸輓疲流亡以水旱增郡縣以徴求困公卿不能補牘臺諫無從引裾不可不深察遂為沈一貫所惡移疾去召為大理右丞累遷南京太僕卿陳邦瞻高安人萬厯進士厯右副都御史巡撫廣西土官黄德勲弟徳隆叛襲破上林邦瞻請討㑹光宗嗣位即擢總督軍務移師討擒之海寇林莘老嘯聚萬餘人侵掠海濵邦瞻扼之不得逞嶴夷築室青州奸民與通侵内地邦瞻燔其巢召拜兵部左侍郎天啓初疏言客氏忤㫖譙讓尋兼户工二部侍郎專理軍需卒贈尚書邦瞻好學敦風節服官三十年吏議不及鄒維璉新昌人萬厯進士天啓時為職方郎中極論債帥之弊譏切中官吏部尚書趙南星知其賢調稽勲郎中楊璉劾魏忠賢被㫖切責維璉杭疏繼之及南星去國維璉亦枚歸後削籍復搆入汪大言獄戍貴州崇禎初起南京通政參議累遷右僉都御史代熊文燦巡撫福建海寇劉香猖獗擊破之紅夷陷厦門發水陸進援焚其舟連戰銅山敗去在事二年勞績甚著叙功召拜兵部右侍郎遘疾不赴卒於家呉甘來新昌人與兄泰來同舉鄉試崇禎初甘來成進士後三年泰來亦成進士甘來擢刑科給事中抗直敢言累遷户科都給事中賊薄都城兄泰來已官禮部員外甘來屬歸事母而已誓必死城陷作絶命詞正衣冠北向拜投繯死福王時贈太常卿諡忠節本朝乾隆四十一年賜諡莊介陳泰來新昌人崇禎進士擢户科給事中都城成嚴自請假兵一萬肅清輦轂帝壮之改兵科岀視諸軍戰守方畧至軍中奏界嶺失事狀劾副將柏承鎮論死遷吏科乞假歸唐王時擢右僉都御史李自成敗走武昌其部下散掠新昌泰來大破之後與上高舉人曹志明等起兵俱敗死本朝乾隆四十一年賜諡忠節本朝劉欽鄰新昌人順治進士知廣西富川縣吳三桂叛廣西帥脇州縣應之欽鄰獨守孤城陷被執賊誘以官爵不屈賦絶命詩自盡事聞贈太僕卿黄鼎彝上高人性孝友剛方順治二年江西平首倡瑞屬諸生呈乞汰減浮糧永甦重困舉廉能署哀州推官袁城空無人揭榜招集民皆歸舍安業旋加監紀督兵平寇叙功將擢用不赴家居以理學經濟訓誨後進著有周易四書金鍼卒祀鄉賢毛逵新昌人順治進士厯官文選郎中性安淡泊茹苦自甘知有國而不知有身以憂勤卒於官祀鄉賢朱軾高安人康熙甲戍進士授庶吉士改知潛江縣入為刑部主事累遷至通政使巡撫浙江雍正初擢左都御史入直上書房尋授文華殿大學士時興營田水利以軾視事凡設施籌畫悉合地宜乾隆初疏言直省大吏爭以開墾為功寳就熟田加增税額虚報升科小民不勝苦累請清查核實以革厥弊又言法吏多逞鍛鍊之長希著明斷之號宜加警黜吏治煥然一新卒謚文端入祀賢良祠遺疏謂理財以斥浮言為要用人以辨邪正為先語極懇至所著有周易注解儀禮節畧春秋詳解厯代名臣名儒循吏傳軺車録廣惠編諸書朱極光高安人㓜孤家貧事母甚孝為人寛厚雖犯不校敬宗祀恤貧族修塜墓之無主而圯及道路梁筏之傾壞者以篤行著於鄉徐日暄高安人康熙進士選庶吉士累官至國子祭酒在成均七年整飭科條甄奬人才不遺餘力厯興順天山西鄉試一秉公慎號稱得人性至孝痛父母殁寓居書停雲二字以誌永思著有停雲齋集敬齋稿行世卒祀鄉賢毛渾新昌㧞貢仕至思南知府居官因俗布化政簡刑清為養為教無不贍舉致政卒祀鄉賢毛懋諫新昌人克敦孝弟志切匡時立義學義田士林依頼之經傳子史無不精貫卒祀鄉賢漆扶助新昌人雍正五年親身營田議叙第一官至普洱知府以母老乞養改知浙江全華府扶助誼篤綱常才優幹濟卒祀鄉賢熊迎龍新昌人孝行著聞與同縣胡祖武監生蔡孙薦生員陳觀光均乾隆年間旌劉大成新昌人居鄉廉直事繼母以孝聞由進士知湖北竹山縣嘉慶元年教匪滋事率兵捍禦竹山故無城賊勢日張兵寡不敵乃嘆曰吾官斯上與為存亡分也旋正衣冠佩卬綬自縊事聞贈知州諡忠節䕃一子恩騎尉袁鳳翔新昌廩生孝行著聞與同縣職員鄒恩名蔡啓沃貢生劉應嘉武生熊莛職員鄒世濬均嘉慶年間旌流寓宋滕元發東陽人以翰林侍讀學士言新法之害貶居筠州或以為復有後命元發談笑自若曰天知吾直上知吾直吾何憂哉吕祖儉婺州人祖謙弟以薦除藉田令寕宗時韓侂冑用事正言李沐論罷趙汝愚祖儉上封事極論之安置韶州遇赦量移高安三年卒詔令歸葬祖儉在謫所讀書窮理賣藥以自給嘗言因摧折失其素履者固不足言因世變而意氣有所加損亦私心也著大愚集列女元李馬兒妻袁氏瑞州人李病殁袁年十九誓不再嫁以養舅姑有王成者聞袁有􅐾色挾勢欲娶之袁曰吾有死而已遂往夫墓痛哭縊死樹下張立試妻高氏高安人紅巾之亂賊欲辱之高詈不絶口至風源投廖家井而死明張榮一妻蕭氏高安人年二十七孀居正德時爲華林賊所執罵曰我誓不爲賊狗所辱乃斬之數斷同縣黎玉亮妻殷氏孀居十年賊脇以刃不屈投河賊刺其胷背以死熊武六妻胡氏罵賊不從賊剖之况夔妻瘳氏名足貞賊執之不受辱削其鼻斫其額而死朱丑四妻熊氏罵賊而死黄暧妻卒氏投塘賊連砍數刃而死朱治一妻梁氏名應貞賊擁之行堅撲淖中不起賊殺之俱題旌祀貞烈禄按舊志載姜榮安竇氏名善忠京師人榮通判瑞州正德中華林賊猝至榮以印屬竇急出募兵竇理印於池塘城破被執時有盛老者亦被虜竇紿賊釋之密令白印於榮盛老去強行至花塢村乘間投井死榮得印募兵四至繕修城池屹成保障知府鄺璠上其事詔旌曰貞烈建祠祀之謹附記朱應恢妻胡氏高安人年十九䘮夫撫遺腹子厯三十七年華林賊經其居走匿為所執罵曰我四十年老寡婦也賊奴敢爾耶賊怒斬首分身而去熊烈女名貴貞高安人少而艶華林賊經其居女投河賊追至河中執之女捽賊入深潭旁賊來援女并曳溺之越三日三屍浮江下女執賊衣髮尚未釋手詔旌其門王恪妻黄氏高安人華林賊亂隨恪渡河恪遇兵黄以身冒夫被刃而死恪得免立坊旌節聶端冕妻丁氏上高人為華林賊所執不肯行挾至黄耇嶺殺之時年二十七同縣廖啓仁妻王氏亦死其地人稱雙節嶺晏廷相妻李氏名敏貞上高人為華林賊所執紿以取金自贖逸入牀下憤罵賊叢槊殺之易氏女高安人許字南昌儀賓楊漳子鐶鐶早卒女聞訃墜樓幾死泣請於母欲歸楊母以未親迎辭乃柬其姑迎之女麻衣徒跣登舟至則拜夫木主行合卺禮如生時次日舉奠以首觸棺瀕死姑嚴防之女卒乘間自經事聞賜祭旌其閭黄雲齊妻鍾氏名妙節上高人夫亡守節壽百歲王彦常妻朱氏新昌人年二十四夫亡撫孤守節壽九十一而终羅中權妻余氏新昌人年二十五夫亡撫孤守節壽九十見五世孫李九華妻劉氏新昌人崇禎中九華官井陘兵備駐獲鹿縣劉隨任是年賊廹獲鹿劉守死不去城陷少子投井死劉與第三子亮俱投烈焰死招魂歸葬呉甘來表其墓本朝諶日昇妻陳氏高安人順治初為金聲桓遊兵所獲欲汚之氏詈不絶口賊怒刳之况紹修妻鄭氏上高人順治初倭賊陷城鄭抱女隨老嫗避北門為賊所執欲犯詬不從遂殺其女詬益厲賊怒禠其衣抉目以死李簡慶妻劉氏新昌人順治初寇亂先紉其内衣防猝變及𬒳執不辱斃於刃焦遇春妻黄氏高安人壽百歲康熙年間旌劉守發妻呉氏新昌人順治初為寇所掠至里門外潭水深處躍入水中厲聲罵賊死雍正六年旌梁文英妻陳氏高安人夫亡守節同縣姜汝淮妻曾氏劉發房妻梁氏呉杰妻李氏陳文炳妻諶氏呉朝宇妻羅氏陳守功妻宋氏蕭吾槐妻李氏胡世德妻黄氏徐大吾妻易氏黄瑞禄妻鄧氏徐永命妻唐氏江采蔡妻陳氏戴懿明妻朱氏梅百盛妻彭氏朱澍妻何氏主事何郁妻呉氏陳必輔妻姚氏高賢妻呉氏朱國相妻王氏劉泗清妻諶氏黄燕瑞妻朱氏諶友瑎妻劉氏鄭道行妻郭氏梅繼盛妻陳氏傅代仙妻周氏范用栩妻陳氏謝謨講妻孫氏沈世英妻歐陽氏呉成鑄妻何氏武舉禇逺新妻諶氏傅代福妻陳氏朱國器妻李氏幸琳妻童氏徐慶長妻鄭氏均乾隆年間旌黄德明妻戴氏上高人夫亡守節四十餘年不出户庭雖至戚子姪罕覩其面者同縣黄于象妻陳氏嚴廷瓉妻黄氏黄光翔妻傅氏任慶妻况氏均乾隆年間旌李伯竒妻胡氏新昌人伯竒素貧力學以勞瘵終氏年二十四矢志撫孤備嘗艱苦嵗荒啜水窮餓鄉里或賙之皆不受壽九十餘同縣熊應臣妻鄒氏毛天駟妻幸氏熊善寵妻蔡氏胡天位妻鄢氏鄒鐘祥妻李氏易書妻劉氏劉英妻蕭氏劉式妻蔡氏胡廷俊妻漆氏劉應濚妻寗氏劉璣妻張氏陳楚高妻劉氏胡廸民妻蔡氏胡世㨗妻蔡氏胡捷登妻李氏劉鉁世妻鄔氏李秉憲妻蔡氏胡世校妻閔氏熊章妻胡氏呉達澄妻劉氏姚為庫妻龔氏劉烱世妻胡氏趙徳煐妻易氏熊拔妻漆氏李英妻周氏劉維宿妻鄒氏漆啓仁妻蔡氏傅廷相妻陳氏李維斐妻毛氏李景綱妻謝氏毛仰聖妻陳氏蔡維翰妻熊氏劉樹勲妻呉氏毛天鳯妻冷氏呉民端妻李氏劉敷成妻蔡氏張崇映妻陳氏熊克妻蔡氏晏彰任妻周氏鄒揆祖妻陳氏熊繡崇妻張氏劉紋士妻萬氏戴𢡟德妻熊氏熊學洵妻毛氏傅彪妻藍氏邢珊妻熊氏劉應儀妻羅氏劉崇芳妻胡氏熊文景妻朱氏蔡禾順妻羅氏漆日杜妻戴氏廖英豪妻陳氏蔡湘妻漆氏胡敏妻熊氏鄒櫎祖妻劉氏蔡雱龍妻傅氏胡成紹妻羅氏張大榮妻毛氏劉騰蛟妻蔡氏陳型文妻劉氏劉大榮妻張氏劉祖興妻張氏任貦學妻李氏高宗探妻毛氏鄒世偉妻劉氏劉應妻呉氏冷貞倫妻張氏呉逹恒妻鄒氏劉靖世妻蔡氏張烽成妻龔氏熊濤景妻漆氏冷安易妻張氏烈婦晏封妻袁氏貞女廖氏均乾隆年間旌陳紀週妻鄧氏高安人夫亡守節同縣冷志孝妻况氏陳高茂妻熊氏幸守仁妻鄭氏何大興妻幸氏張允煥妻冷氏楊輯瑞妻何氏朱淳熙妻涂氏傅于佐妻陳氏武生龔倚妻李氏彭永安妻汪氏均嘉慶年間旌陶明德妻章氏上高人夫亡守節同平羅縣丞冷嵩齡妾趙氏盧來鳯妻江氏杜文江妻朱氏鄭際亨妻李氏胡廷詩妻潘氏嚴繼述妻李氏黄永慶妻李氏鄭集錦妻趙氏均嘉慶年間旌彭燝妻伍氏新昌人夫亡守節同縣劉秉蘭妻蔡氏劉秉珍妻郭氏劉鉉芳妻漆氏張啓代妻李氏張啓基妻朱氏漆緝美妻李氏劉開甲妻廖氏劉楟芳妻陳氏劉大發妻蔡氏漆纉美妻李氏熊善香妻易氏劉綑芳妻黄氏高承奎妻劉氏胡可徴妻劉氏毛受禧妻廖氏高元銓妻龔氏蔡有柏妻劉氏毛宗譽妻胡氏胡世珍妻鄢氏熊崇瓊妻李氏李福啓妻徐氏彭遴仁妻劉氏熊秉毅妾彭氏劉恕妻胡氏熊善映妻朱氏胡乆源妻蔡氏熊嗚瑞妻陳氏黄任傑妻羅氏彭行俟妻盧氏陳會檜妻張氏呉洪懿妻漆氏陳伯慶妻吕氏謝崇汪妻陳氏熊志巨妻江氏熊楚材妻蔡氏趙㬦吉妻席氏蔡松亭妻劉氏張啓閥妻李氏朱廷颺妻李氏熊探崇妻劉氏鄒挺立妻李氏李森清妻朱氏張彬成妻席氏妄張氏毛大中妻熊氏熊福全妻蔡氏彭行佟妻劉氏廩生盧峯繼妻蔡氏熊快景妻劉氏冷向榮妻席氏劉大鈗妻熊氏劉耀芳妻陳氏胡開朗妻蔡氏漆香盛妻袁氏劉綵士妻鄔氏胡天迎妻曾氏周學海妻陶氏貞女漆耀徵未婚妻胡氏均嘉慶年間旌仙釋晉黄仁覽建城人有道術嘗為青州從事每夕取竹杖噀水化龍騎之歸省旦復騎去後舉家上仙里人於騎杖處立廟祀之李明香蜀人李八百之妹初修道於華林山之元秀峯後於峯南六十里五龍岡設壇醮祭道成冲舉丁義建城人精醫術嘗以神方授呉猛義女名秀英鍊丹於白鶴山猛女彩鸞嘗就學焉及仙去後人於其地置崇元觀今石圃中有丹井唐良价㑹稽俞氏子年二十二詣嵩山具戒遊方首謁南泉次參潙山後造雲巖問無情說法因過水睹影大悟前指大中末於