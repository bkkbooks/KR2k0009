以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣兩手據地終不肯俯帝因敕強項令出賜錢三十萬悉以班諸吏由是搏擊豪強莫不震栗卒於官索盧放東郡人建武六年徵為洛陽令政有能名虞延泉昏人建武中為洛陽令時陰氏客馬成者為姦盜延收考之陰氏屢請獲一書輒加篣二百信陽侯陰就訴帝帝親録囚知延不私謂成曰汝犯王法身自取之竟伏誅於是外戚斂手莫敢干法祭彤潁陽人光武時為偃師長彤有權略視事五載縣無盜賊課為第一周澤安邱人中元初遷澠池令奉公尅已矜恤孤羸吏人歸愛之袁安汝陽人永平中為河南尹政號嚴明然未嘗以贓罪鞫人曰凡學仕者高則望宰相次則希牧守奈何錮人於聖世聞者感勵在職十年京師肅然名重朝廷周紆徐人肅宗時拜洛陽令下車先問大姓主名吏數閭里豪強以對紆怒曰本問貴戚若馬竇輩豈能知此賣菜傭乎於是貴戚局蹐京師肅清張酺細陽人和帝時為河南尹執金吾竇景家人擊傷市卒吏捕得之景怒遣緹騎侯海等五百人毆傷市丞酺部吏楊章等正海罪景忿怒移書辟章等六人為執金吾吏欲因報之章等恐酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣王渙郪人永元十五年為洛陽令平正明察得寬猛之宜其冤嫌久訟法理難平者莫不曲盡情詐厭塞羣疑又能發摘姦伏京師稱歎以為有神算卒官民為立祠安陽亭西任峻渤海人自王渙後選令皆不稱職永元中以峻輔之擢用文武吏皆盡其能紏剔姦盜不得旋踵一嵗斷獄不過數十周暢安成人永初二年為河南尹時夏旱久禱無應暢因收葬洛城旁客死骸骨凡萬餘人應時澍雨歲乃豐稔祝良長沙人順帝時為洛陽令聰明博學有才幹以廉明見稱李膺襄城人延熹二年為河南尹時河內張成善説風角推占當赦遂教子殺人膺督促收捕既而逢宥膺愈懷憤疾竟案殺之宛陵大姓羊元羣罷北海郡贓罪狼籍膺表欲案其罪元羣賂宦豎膺反坐輸作左校司隸校尉廬奉上疏救之帝納其言即拜膺為司隸校尉劉祐安國人延熹中為河南尹轉司隸校尉時權貴子弟入京師者至界首輒改易輿服隱匿財寶威行朝廷羊陟梁父人靈帝時拜河南尹計日受奉常食乾飯茹菜禁止豪右京師憚之李燮南鄭人靈帝時為河南尹時既以貨賂為官詔書復橫發錢三億以實西園燮上書陳諫辭意深切帝乃止朱俊上虞人獻帝時拜河南尹時董卓擅政數請公卿會議徙都長安俊輒止之卓惡其異己表遷太僕俊不受及卓入關留俊守洛陽與山東諸將通謀為內應既而懼為卓所襲乃棄官奔荆州三國魏賈逵襄陵人除澠池令時縣寄治蠡城城塹不固張炎叛應高幹逵陽與同謀求兵修城諸欲為亂者盡誅之遂修城拒炎炎敗魏武征馬超至宏農曰此西路之要以逵領宏農太守王昶晉陽人文帝時為洛陽典農時都畿樹木成林昶斫開荒萊勤勸百姓墾田特多司馬芝溫人黃初中為河南尹抑強扶弱私請不行為教與羣下吏莫不自勵曹洪乳母與臨汾公主侍者繫獄卞太后遣黃門詣府傳令芝不通敕洛陽獄考竟上疏論之居官十一年數議科條所不便者傅嘏泥陽人正始中為河南尹河南俗黨五官掾功曹典選職皆授其本國人無用異邦人者嘏各舉其良而對用之官曹分職而後以次考核之治以德教為本持法有恆簡而不可犯晉杜預杜陵人武帝時為河南尹預以京師為王化之始自近及遠凡所施論務崇大體王恂東海人為河南尹建立二學崇明五經鬲令袁毅餽以駿馬恂不受時太原諸郡以胸奴為田客多者數千武帝詔禁募客恂明峻其防所部莫敢犯者樂廣淯陽人武帝時為河南尹愍懷太子廢詔故臣不得辭送衆官不勝憤歎皆冒禁拜辭司隸校尉滿奮敕河南中部收縛拜者送獄廣即便解遣為政無當時功譽然去職遺愛為人所思曹攄譙人為洛陽令仁惠明斷百姓懷之時天大雨雪宫門夜失行馬攄使收門士衆咸謂不然攄曰宫掖禁嚴非外人所敢盜必門士以燎寒耳詰之果服以病去官復為洛陽令魏浚東阿人永嘉末與流人數百家東保河陰之硤石及洛陽陷屯於洛北石梁塢撫養遺衆漸修軍器歸者甚衆其有恃遠不從者遣將討之不加侵暴於是遠近感悅假河南尹劉曜忌浚得衆率衆圍之浚夜遁走為曜所得死之沈徑武康人井平中慕容恪侵逼山陵冠軍將軍陳祐守洛陽徑自表補冠軍長史募壯士擊賊頻以寡制衆糧盡城陷遇害辛恭靖狄道人隆安中為河南太守會姚興來寇恭靖固守百餘日以無救而陷𬒳執興將任以東南之事恭靖厲色曰願為國家鬼不為羌賊臣興怒幽之别室三年踰垣遁歸安帝嘉之南北朝魏寇讚上谷人姚泓滅秦雍人千餘家推讚為主歸魏拜綏遠將軍秦雍之民來奔河南滎陽河內者户至萬數拜讚南雍州刺史治於洛陽立雍之郡縣以撫之流民自遠而至者三倍於前讚在州十七年甚獲公私之譽甄琛母極人世宗𥘉遷河南尹時多冦盜琛以里正乃流外四品職輕任碎不能督察使盜得容姦百賦失理請少高里尉之品又奏以羽林為遊軍於諸坊巷司察盜賊於是京邑清靜後皆踵焉高崇蓚人景明中為洛陽令為政清斷吏民畏其威風每有摘發不避強禦縣內肅然宋翻列人人世宗初為河陰令順陽公主家奴為劫攝而不送翻將兵圍主宅執主壻馮穆步驅向縣時正炎暑立之曰中流汗霑地縣舊有大枷時人號曰彌尾青翻置南牆下以待豪右於是威振京師孝莊時除司徒左長史撫軍將軍河南尹北齊獨孤永業中山人乾明初洛州刺史時宜陽深在敵境周人於黑澗築城戍以斷糧道永業亦築鎮以抗之治邊甚有威信久在河南善於招撫歸降者萬計巽二百人為爪牙每先鋒以寡敵衆周人憚之隋樊子蓋廬江人大業中為檢校河南內史車駕至高陽追詣行在帝勞其留守東都之功曰昔高祖留蕭何於關中光武委冦恂於河內公其人也唐賈敦頤冤句人永徽中遷洛州刺史洛多豪右占田類踰制敦頤舉沒者三千餘頃以賦貧民發姦摘伏下無能欺弟敦實為洛州長史亦寬惠人心懷向洛陽令楊德幹杖殺人以立威敦實喻止曰政在養人復生過多不足貴也德幹為衰減始洛人為敦頤刻碑大市旁及敦實入為太子右庶子人復為立碑於其側故號棠棣碑焉張仁願下邽人神龍中檢校洛州長史會穀貴多盜仁願一切捕殺畿甸震懾無敢犯李傑滏陽人先天中為河南尹精於聽斷雖行坐食飲省治不少廢由是府無淹事人吏愛之河汴之交舊有梁公埭廢不治南方漕弗通傑調丁男復作之不費而利李朝隱三原人開元中擢河南尹政嚴清姦人不容息太子舅趙家奴怙勢橫閭里朝隱執而搒辱之帝賜書慰勉裴寬聞喜人開元中為河南尹不屈附權貴郡中大治子諝代宗時以河南府參軍遷河南尹寬厚和易為治不鞫人以贓李憕文水人天寶中為河南少尹尹蕭炅骫法殖私憕裁抑其謬後改東都留守安祿山陷東都死之盧奕涓州人以御史中丞留臺東都安祿山兵薄城下奕與李憕堅守城陷朝服坐臺被執即數祿山罪徐顧賊徒曰為人臣者當識逆順我不陷失節死何恨臨刑罵賊不空口逆黨為變色蔣清天寶十四載為河南府判官祿山陷東都死之喬潭梁縣人天寶中為陸渾尉時元德秀隱居陸渾貧無甔石潭每分奉周之及卒庀其葬顧少連吳人德宗時為登封主簿邑有虎孽少連命塞陷阱移文嶽神虎不為害鄭珣瑜滎澤人為河南尹未入境會德宗生日當獻馬吏白珣瑜視事且內贄􅨈瑜曰未到官而遽事獻禮歟不聽性嚴重少言未嘗以私託人人亦不敢謁以私清靜惠下賤斂貴發以便民時韓全義伐蔡河南主餽運珣瑜密儲之陽翟以給官軍百姓不知僦運勞有所取非詔約者珣瑜輒挂壁不酬及軍罷凡數百封有諫者珣瑜曰茍以為罪尹宜坐之終不為萬人産沴也韓愈南陽人元和初權知國子博士分司東都邙拜河南令李紳譙人元和間為河南尹河南多惡少或危帽散衣擊毬官道車馬不敢前紳治剛嚴皆望風遁去白居易太原人太和初以太子賓客分司東都踰年拜河南尹復以賓客分司李德裕贊皇人文宗時以太子賓客分司東都政尚寬和得士庶心柳仲郢華原人拜京兆尹宣宗時周墀薦為河南尹以寬惠為政或言不類京兆時答曰輦轂之下先彈壓郡邑之治本惠養烏可類也張全義濮州人僖宗時為河南尹時黃巢兵火之後城邑殘破户不滿百全義披荆棘勸耕殖躬載酒食勞民畎畝之間築南北二城以居之數年人物完盛人甚賴之五代晉楊昭儉長安人為河南少尹時河決數郡發丁夫塞之昭儉董其役少主欲立碑昭儉諫曰陛下刻石記功不若下哀痛之詔少主嗟賞從之宋韓琚安陽人大中祥符中知永寧縣時寺僧大起浮圖通邑騷然琚抗疏罷之政為畿邑最歐陽修廬陵人仁宗時為四京推官時尹洙為府户曹參軍梅堯臣為主簿修從洙遊為古文議論當世事迭相師友與堯臣遊為歌詩相倡和遂以文章名冠天下陳堯佐閬中人後家於濟源初為西京轉運使有治聲天聖初知河南府人稱其政范祖述華陽人仁宗時知鞏縣開南山導水入洛縣無水患文彥博稱其能桑懌雍邱人仁宗時為澠池尉時宿盜王伯為民患巡檢偽牒懌招致之懌不知其偽也挺身入賊中與伯同卧起十餘日共至山口為巡檢伏兵所執懌曰巡檢懼無功耳即以伯與巡檢使自為功朝廷知之為黜巡檢擢懌右殿班直孫鼛錢塘人知偃師縣蒲中優人詭僧服隱民間以不語惑衆相傳有異法奔湊其門鼛收按姦狀立服辜范致虛建陽人徽宗時知河南府中人規萬華苑欲奪故相富弼宅致虛言弼和戎有大功乃不保數畝之居即得不取阮駿興化人為河南少尹金兵入京師駿帥所隸兵擁護神御殿抱神御罵不絶口卒被害孫昭遠眉山人建炎初為河南尹西京留守至洛收集散亡得義兵萬餘柵伊陽使民入保金兵來攻戰不利叛兵反擊之隨遇害贈徽猷閣待制金張特立東明人正大初為洛陽令時軍旅數起郡縣窘迫東帥赫舍里永謙移鎮陜右道經洛陽責令治糗具三日足後期如軍法縣素賢特立爭輸於庭帥大奇服赫舍里永謙舊作紇石烈牙兀解今改正元閻從覃懷人為新安縣尉有鬻麥客為人所害莫知主名從集衆鞫之衆皆跪有一人隱樹而立命卒引之前服罪後嘗於道中遇貴遊車馬僕從甚盛飲嬉布肆從顧從者曰此巨盜也邏得之果服人以為神布占宣陽令開宣利渠導疏入胭脂潭東厯七里河下楊店民賴其利布占舊作蒲察今改正明王俊邠州人洪武末知嵩縣屏貪吏恤貧乏濬順陽濟民二渠溉田民賴其利李守義平度州人永樂初為偃師主簿縣北有山水為害守義修白虎堰以障之害遂息兼資灌溉之利吳祥蠡縣人永樂中知嵩縣為政寬和流民自歸者二百餘户績最當遷民乞留詔增秩還任閲三十二年而卒邑人莫不哀痛陶鎔洪熙末知新安縣上言縣在山谷土瘠民貧民食方艱采拾不給公私無措驛傳頗有儲粟謹貸粟千七百餘石帳給俟秋成償官宣宗謂夏原吉曰縣聽行良是鎔能稱任使勿拘以文法李驥郯城人宣德中知河南府時境內多盜驥令一户𬒳盜一甲坐之犯者署其門曰盜賊之家又為勸教文振木鐸以徇之人咸改行陳宣永夀人宏治中知河南府留心學校加意民瘼創建伊洛淵源祠及觀德亭修復諸渠多嘉惠實政劉敏寬安邑人萬厯中知宜陽縣時洛水嚙田損賦有司議均田更張太甚民多棄業而逃敏寬惟課墾荒公輸不足則稅逃田之見墾者足之由是逃亡日復徐日泰金溪人崇禎中知偃師縣流賊陷城日泰罵不屈為賊臠割死陳顯元蘄州人崇禎中知新安縣率民保闕門寨拒守月餘力竭而陷賊大殺寨中人厲聲曰守寨者我也百姓何辜賊怒支解之鄢廷誨永福人崇禎十四年知登封縣流寇至廷誨抗節死典史王大璧從死劉禋中部人崇禎末知登封縣時土寇據山為亂禋練兵備禦賊不敢近及李自成陷城死之武大烈臨潼人崇禎末知永寧縣時萬安郡王居永寧宗校馮藉為橫大烈悉置之法流寇薄城下大烈拒守凡三晝夜城陷與主簿魏國輔教諭任維清守備王正已百户孫世英俱死之李邁林崇禎末知澠池縣流賊陷城死之本朝武攀龍交城人順治四年知洛陽縣時兵火初靖一意安民修舉廢墜善迹尤多洛志亦推攀龍始事云張朝瑞廣寧人順治五年知登封縣洞悉民隱招徠流亡遷御史巡按湖北瀕行父老追送百餘里蔣應泰大興人康熙初知河南府寬朴簡易端已率屬救荒課士除暴禁貪凡獄有冤者秋毫立辨期年病沒於官士庶感慟祀名宦盧道悅德州人知偃師縣簡易不擾值歲歉後流亡未復撫綏十年荒蕪盡墾民以安集嘗築亭潯溪上為遊息地既去人懷其澤就亭為祠以祀之汪楫江都人知河南府為政清平持大體絶干謁豪右憚之歲飢賑濟活飢民數萬俞汝翼寧夏人康熙時授偃師知縣下車時即革邑中陋規剖決詞訟案無留牘歲荒親詣藩司面陳洛偃鞏孟登五縣困苦尤甚因得并販尤留意造士興復兩程書院調任祥符送者絡繹於道曾汝為合江人康熙五十四年知洛陽縣悃愊無華吏民安之數斷大獄不為煩擾後以積歲荒歉虧糧罷官洛民為設義匱爭先輸納前總纂官臣張琴恭纂輯提調官臣王廣蔭恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校大清一統志河南府四人物漢賈誼洛陽人年十八以能誦詩書屬文稱於郡中文帝詔為博士超遷至大中大夫諸法令所更定及列侯就國其説皆誼發之天子議以誼任公卿之位絳灌之屬盡毁誼於是出為長沙王太傅歲餘徵入見帝宣室問鬼神事至夜半帝為之前席拜梁王太傅數上疏陳政事多所欲匡建梁王勝墜馬死誼自傷為傅無狀歲餘亦死孫二人至郡守賈嘉最好學世其家劇孟洛陽人以俠顯吳楚反條侯為太尉乘傳東將至河南得孟喜曰吳楚舉大事而不求劇孟吾知其無能為也孟母死遠方送喪千乘及孟死家無十金之財卜式河南人武帝時上書願輸家財半助邊又持錢二十萬與河南太守以給徙民召拜為中郎令牧羊上林歲餘羊肥息上過其羊所式曰治民亦猶是矣惡者輒去毋令敗羣拜式緱氏令遷成皋令齊王太傅轉為相會吕嘉反式上書願與子男及臨災習弩博昌習船者請行死之以盡臣節帝賢之賜爵關內侯元鼎中為御史大夫言郡國不便鹽鐵而船有算可罷貶秧太子太傅以夀終周王孫雒陽人受易於杜陵田何後丁寬復從受古義號周氏傳賈捐之誼曽孫元帝初上疏言得夫召待詔金馬門珠崖屢叛捐之建議棄之遂罷珠崖郡桑欽河南人受古文尚書毛詩於平陵塗惲子真又著水經郭賀洛陽人祖堅伯交遊君並修清節不仕王莽賀能明法建武中為尚書曉習故事多所匡益拜荆州刺史有殊政永平中徵拜河南尹以清靜稱在官三年卒孫堪緱氏人明經學有志操建武中仕郡縣公正廉潔奉祿不及妻子皆以供賓客及為長史所在有迹厯官光祿勳數有直言多見納用慶鴻洛陽人慷慨有義節與杜陵廉范為刎頸交位至琅邪會稽二郡太守所在有異迹龎參緱氏人舉孝廉拜左校令坐法輸作將軍鄧隲討涼州叛羌參上書言宜養衆以侍其疲御史中丞樊準薦參卓爾奇偉高才武略有魏尚之風召拜謁督三輔諸軍屯纍官漢陽太守在職能抑強扶弱以惠政得民元初元年遷護羌校尉畔羌懷其恩信入為大鴻臚虞詡薦參有宰相器能順帝時以為太尉録尚書事是時三公之中參名忠直吳雄河南人順帝時為廷尉斷獄平後拜司徒子欣孫恭三世廷尉為法名家种皓洛陽人舉李廉順帝末為侍御史自以職主刺舉志案姦違乃劾諸為八使所舉太守劉宣等罪惡又請敕條舉近臣父兄及知親為刺史二千石尤殘穢不勝任者擢監太子於承光宫中常侍高梵從中單駕出迎太子皓手劎當車曰太子國之儲二今常侍來無詔何以知非姦耶梵馳奏之詔報太子乃得去帝嘉其持重出為益州刺史在職三年宣恩服遠開曉殊俗桓帝時為度遼將軍誠心懷撫信賞分明羌胡皆來順服纍遷司徒推達名臣皇甫規等為稱職長子岱好學養志不應徵辟次子拂為太常李傕郭汜入長安百姓多避兵拂揮劒出戰死拂子邵官侍中與馬騰等攻傕汜軍敗死之尹勳鞏人家世衣冠獨持清操不以地勢尚人州郡連辟察孝廉三遷邯鄲令政有異迹五遷尚書令桓帝誅梁冀參建大謀封都鄉侯遷汝南太守上書解釋范滂等黨議禁錮拜大司農坐竇武等事下獄自殺杜密陽城人為人沈質少有厲俗志為司徒胡廣所辟纍遷北海相宦官子弟為令長有姦惡者輒捕案之後去官還家桓帝時徵拜尚書令轉太僕黨事起免歸與李膺名行相次故時人亦稱李杜焉三國漢孟光洛陽人獻帝時入蜀博物識古無書不覽尤鋭意三史長於漢家舊典昭烈定益州拜為議郎與許慈等並掌制度後主時纍遷大司農常於衆中責大將軍費褘每直言無所回避郤正偃師人安貧好學博覽墳籍弱冠能屬文為祕書令轉令史淡於縈利依則先儒假文見意號曰釋譏後主七年遷洛陽蜀之大臣無翼從者惟正舍妻子單身隨侍後主賴正相導宜適舉動無闕乃歎息恨知正之晚位終巴西太守魏杜夔河南人以知音為雅樂郎因亂住依劉表入魏為軍謀祭酒參大樂事令創制雅樂夔善鐘律聰思過人紹復先代古樂自夔始吳徵崇本姓李河南人治易春秋左氏傳隱於會稽躬耕求志人來從學所教不過數人輒止欲令其業必有成也嚴畯薦崇初見大子以疾賜不拜東宫官屬皆從咨訪趙達河南人治九宫一算之術究其微旨應機立成無不中效孫權行師征伐每令推步皆如其言南北朝魏胡小虎河陰人正光末為統軍於晉壽梁將樊文熾犯邊益州刺史邴蚪遣長史和安固守小劒文熾圍之蚪命小虎同往防拒文熾掩襲擒之逼使誘和安降小虎謂安曰努力堅守魏遣將已至賊以刀毆擊言不能終遂害之趙肅洛陽人孝昌中起家殿中侍御史大統十六年除廷尉卿肅久在理官執心平允凡所處斷咸得其情廉慎自居不營産業時人以此稱之北齊房謨洛陽人少淳厚深沈內敏正光末厯位昌平代郡太守所在者廉惠除太寧太守爾朱榮之黨徵兵謨不應京都淪覆被執賊黨見謨莫不遙拜爾朱世隆嘉之捨其罪魏孝武帝入關神武以謨忠貞徵為丞相右長史以清直甚被賞遇厯官兖徐二州刺史神武與諸州書敘其清能以為勸勵後除晉州刺史卒於州世稱清白子恭懿沈深有局量達於從政入隋仕終海州刺史元文遙洛陽人父晞有孝行文遙敏慧夙成起家員外散騎侍郎纍官尚書左僕射齊因魏宰縣多用厮濫至於士流恥居百而文遙以縣令為字人之切遂請革選士人為縣自此始也初文遙自洛遷鄴有地十頃有人冒相侵奪即與之及貴其人將家逃竄文遙追加撫慰還以與之愧而不受遂相讓為間田周于謹洛陽人沈深有識量好孫子兵書廣陽王元深引為長流參軍特相禮接周文赴平涼謹曰關右古稱天府今若據其要害招集英雄足觀時變且天子在浴逼迫羣凶請都關右挾天子而令諸侯千載一時也周文大悅厯遷大丞相府長史拜司空恭帝元年除雍州刺史命出討梁振旅而旋進封燕國公遷太傅以為三老賜延夀杖薨諡曰文配享文帝廟廷謹有智謀善於事上名位雖重愈存謙挹朝參往來不過從兩三騎而已朝廷凡有軍國之務多與謹決謹亦竭其智能故功臣中特見委信始終無間言于翼謹之子有識度為渭州刺史夷夏感悅遷司會中大夫武帝以翼有人倫之鑒皇大子及諸王相傅以下並委翼選置時論僉謂得人後為安州總管武帝將東伐遣盧韞詣翼問策翼贊成之除陜州刺史大軍復東討翼自陜入徑到洛陽即除河陽總管大象初徵拜大司徒除幽州總管素有威武兼明斥堠笑厥不敢犯塞性恭儉與物無競常以滿盈自戒故能以功名終弟義少矜嚴有操尚篤志好學厯官潼州總管賀若敦洛陽人少有氣幹周文授都督纍遷驃騎大將軍討平岷蜀荆州諸蠻武成初為軍司馬陳將侯瑱等圍逼湘州令敦赴救時秋水泛溢江路遂斷糧援既絶相持歲餘鎮等不能制全軍而返保定五年遷中州刺史鎮幽谷建德初追贈大將軍趙剛洛陽人少機辨有幹能魏孝武與齊神武搆隙剛奉旨召東荆州刺史馮景昭景昭集府僚議司馬馮道和請據州待北方處分剛抽刀投地曰公若為忠臣可斬道和景昭遂率衆赴闕論功封臨汝縣伯又詔剛使三荆聽便宜從事使還稱旨進爵武城侯除潁川太守洛陽不守剛遠隔敵中侯景别帥來寇大破之時有流言傳剛東叛齊神武因設反間剛露板言狀太祖知其無一乃加賞賚屢遷驃騎大將軍開府儀同三司孝閔帝踐阼進浮陽郡公出為利州總管隋元景山洛陽人少具器局幹略過人從周武帝平齊有功拜大將軍封平原郡公高祖為丞相尉遲逈作亂宇文胄與逈通以書諷景山景山執其使封書詣相府高祖受禪大舉伐陳以景山為行軍元帥大著威名甚為敵人所憚元暉洛陽人好學涉獵書記周太祖見而禮之命與諸子遊處纍官武伯下大夫使突厥致其名王隨獻方物隋開皇初拜都官尚書兼領太僕奏請決杜陽水灌三畤原溉舄滷之地數十頃民賴其利拜忠州刺史有惠政子仁器性明敏官至日南郡丞宇文慶洛陽人沈深有器局周初受業東觀頗涉經史文州民夷相聚為亂慶應募從征襲破之以功授都督誅宇文護慶有謀焉及破高緯拔高壁克並州下信都禽高湝功並居最進大將軍封汝南郡公高祖與慶有舊甚見親待開皇初拜左武衛將軍除涼州總管元褒洛陽人十歲而孤性友弟諸兄議别居褒泣諫不得家素富褒一無所受脫身而去為州里所稱開皇初拜安州總管徙原州有商人訟同宿者劫其金褒察其冤捨之商人訟褒受金縱賊褒即引咎坐免後盜發他所帝歎異之稱為長者終齊郡太守長孫平洛陽人有器幹博覽書記仕周纍遷小司寇開皇三年拜度支尚書奏令民間每秋家出粟麥儲之閭巷以備凶年名曰義倉自是州里豐衍轉工部尚書名為稱職突厥可汗相攻使平持節宣諭遂各解兵進位大將軍判吏部尚書卒諡曰康長孫晟洛陽人性通敏善彈射年十八為司衛上士高祖一見異之謂人曰長孫即後之名將使突厥察山川形勢部衆強弱皆盡知之開皇中突厥患邊攝圖謀南侵晟口陳形勢手畫山川定其虛實皆如指掌拜車騎將軍又為受降使者突厥大畏威行域外晟好奇計務功名性至孝居憂毁瘠為朝士所稱終右驍衛將軍諡曰獻賀若弼敦之子少慷慨有大志驍勇便弓馬博涉書記文帝陰有并江南志高熲薦弼有文武才幹拜吳州總管獻取陳十策開皇九年以弼為行軍總管軍令嚴肅秋毫不犯督厲將士擒陳將蕭摩訶陳平帝迎勞曰剋定三吳公之功也加位上柱國進爵宋國公煬帝嗣位與高熲宇文弼等私議得失為人所奏坐誅于仲文謹之孫少聰敏及長氣調英拔厯官河南道行軍總管討尉遲逈擒其將席昆羅河南悉平入隋拜行軍總管統十二總管擊胡可汗見仲文軍容整肅不戰而退及還令仲文勘録省中事帝嘉其明斷後進位光祿大夫撰漢書刋繁三十卷略覽三十卷元巖洛陽人好讀書不治章句剛鯁有器局仕周為內史中大夫宣帝時京兆郡丞樂運輿櫬詣朝堂陳帝八失將戮之以巖切諫乃免將誅烏丸軌巖復脫巾頓顙切諫帝怒使閹豎搏其面遂廢於家入隋封平昌郡公益州總管府長史河北道行臺右僕射巖性嚴重明達世務正色廷諍上及公卿皆敬憚之趙軌肅子少好學有行檢周蔡王引為記室以清苦聞文帝時為齊州别駕有能名在州四年考最徵入朝與牛宏撰定律令格式授原州總管司馬人吏莫不改操數年遷陜州刺史撫輯萌夷甚有恩惠尋轉壽州總管長史秩滿歸子宏安宏智並知名唐長孫無忌晟子高祖兵渡河授渭北道行軍典籖從太宗征討有功及即位封齊國公進司空知門下尚書省事久之進位司徒定議立晉王與褚遂良同受顧命高宗欲立武昭儀為后無忌固言不可后既立許敬宗搆無忌反狀安置黔州初無忌與遂良悉心奉國以天下安危自任故永徽之政有貞觀風上元初追復官爵長孫操無忌從父弟有學術高祖辟相國府全曹參軍檢校虞州刺史從太宗征討與聞祕謀徙陜州長老守闕頌遺愛為齊揚益三州刺史課皆最下詔褒揚又無忌族叔順德擊屈突通於潼關執以獻進驍衛大將軍後為澤州刺史稱良吏趙宏智新安人事父篤孝通書傳太宗時纍遷宏文館學士永徽初為陳王師講孝經於百福殿智舉五經諸儒更詰辨隨問悉酬舌無留語進國子祭酒曾孫矜客死柳州踰十七年子來章始壯往求父喪歸葬時人皆哀其孝劉允濟鞏人少孤事母孝工文詞與王勃齊名舉進士纍遷著作佐郎采魯哀公後十二世接戰國為魯後春秋獻之尋為來俊臣聽搆當死以母老丐餘年會赦免後修國史除青州長史有清白稱畢構偃師人擢進士第居顔喪毁瘠甚神龍初為中書舍人敬暉等表諸武不宜為王構當讀表抗聲析句左右皆曉三思疾之出為潤州刺史政有惠愛景龍末召為左御史大夫會平諸韋治其黨構詳比輕重皆得其情出為益州長史政清嚴睿宗嘉之賜璽書𫀆帶再遷吏部尚書授河南尹卒諡曰景子炕天寶末為廣平太守拒安祿山城陷覆其家贈戶部尚書張説洛陽人永昌中䇿賢良方正纍擢鳯閣舍人張易之誣陷魏元忠援説為助説廷對元忠無不順言忤后旨流欽州睿宗時同中書門下平章事明皇即位太平公主引蕭至忠崔湜等為宰相罷説為東都留守説因使以佩刀獻帝請先決䇿及至忠等伏誅召為中書令封燕國公出為并州長史會王晙誅降虜阿布思九姓疑懼説輕騎慰安之纍遷左丞相卒諡文貞説敦氣節喜推籍後進君臣朋友大義甚篤朝廷大𫐠作多出其手明皇尊尚經術開館置學士修太宗之政皆説倡之徐有功名宏敏以字行偃師人舉明經纍遷司刑丞時武后畏唐大臣謀巳周興來俊臣等揣旨置諸獄相鈎連朝野震恐莫敢正言有功輒犯顔爭枉直后厲語折抑有功爭益牢嘗曰天理人命所係不可阿旨詭詞以求茍免故常持平守正凡三坐大辟將死泰然赦之亦不喜酷吏為少哀轉司刑少卿改司僕少卿卒賈曾洛陽人少有名明皇為太子遴選宫僚以曾為舍人諫請罷正採女樂開元初與蘇晉同掌制誥皆以文詞稱時號蘇賈子至從明皇幸蜀拜起居舍人知制誥撰傳位肅宗册帝嘆其繼美元行沖名淡以字行洛陽人博學尤通訓故擢進士第纍遷通事舍人狄仁傑器之曰君吾藥籠中物不可一日無也以系出拓跋撰魏典三十篇事詳文約學者尚之開元中為宏文館學士明皇自注孝經詔行沖為疏立於學宫卒諡曰獻劉知幾河南人與兄知柔俱以善文辭知名擢進士第纍遷鳳閣舍人兼修國史擢太子率更令介直自守著史通內外四十九篇又别撰劉氏家乘及譜考議者高其博嘗言史有三長才學識世罕兼之時以為篤論盧鴻洛陽人博學善書籀廬嵩山開元初備禮徵不至五年復詔齎束帛聘之召升內殿置酒拜諫議大夫固辭還山將行賜隱居服官營草堂恩禮殊渥鴻到山中廣學廬聚徒至五百人陸堅洛陽人初為汝州參軍坐事貶涪州再遷通事舍人纍官至給事中兼學士初名友悌明皇嘉其剛正賜名曰堅從封泰山封建安男帝侍之甚厚圖形禁中親製贊以褒之卒贈吏部尚書諡曰懿元德秀河南人少孤事母孝舉進士不忍去左右自負母入京師既擢第母亡廬墓側食不鹽酪藉無茵席自以不及親在而娶遂不肯婚家貧求為魯山令歲滿去職愛陸渾佳山水乃定居不為墻垣扄鑰家無僕妾歲飢日或不㸑陶然彈琴以自娛房琯每見歎息曰見紫芝眉宇使人名利之心都盡蘇源明常語人曰吾不幸生衰俗所不恥者識元紫芝耳天寶中卒家惟枕履簞瓢而已天下高其行不名謂之元魯山房琯河南人少好學風度沈整以廕輔宏文生厯官憲部侍郎天寶末明皇狩蜀琯馳至普安上謁帝喜甚即拜文部尚書同中書門下平章事奉册靈武言當時利病辭吐華暢帝為改容琯既有重名帝傾意待之後以賀蘭進明之讒請自將平賊敗於陳濤斜廢不復振元結德秀族弟少不羈十七乃折節向學擢上第復舉制科蘇源明薦結可用肅宗召詣京師上時議三篇為山南西道節度參謀募義士於唐鄧汝蔡降劇賊五千命屯沁陽守險全十五城代宗立丐侍親歸樊上授著作郎益著書自稱漫士更曰聱叟拜道州刺史進授容管經略使民樂其教罷還京師卒獨孤及各陽人天寶末舉高第補華陰尉代宗以左拾遺召既至上疏陳政要改太常博士厯豪舒二州刺史以治課加司封即中徙常州卒諡曰憲及喜鑒拔後進性孝友為文彰明善惡長於論議韋應物河南人性高潔所至輒掃地焚香工於詩永泰中厯滁江二州刺史召為左司即中貞元初又厯蘇州刺史世號韋蘇州有集十卷蕭昕河南人中博學宏詞科厯禮部侍郎從代宗狩陜權國子祭酒請崇太學以樹教本大厯中持節使回紇回紇恃功廷讓昕昕徐曰僕固懷恩我之叛臣爾與連禍又引吐蕃暴我郊甸非天子恤舊功則隻馬不得出塞回紇大慚厚禮約和德宗出奉天昕年八十餘步出城僅至行在以太子少師致仕卒昕薦張鎬來瑱擢杜黃裳高郢裴垍其後並為名相云盧坦洛陽人纍遷侍御史時赦令後諸道獻錢一切禁止山南節度使柳晟浙西觀察使閻濟美格詔輸獻坦劾奏再遷户部侍郎判度支河毁西受降城宰相李吉甫議徙天德坦以為城當磧口得制北敵之要奈何以一時省費墮萬世策吉甫不悅出為東川節度使李渤洛陽人隱居少室山元和初以右拾遺召渤上書謝不拜韓愈遺書勸之始出家東都每朝政有闕輒附章列上九年以著作郎召遂起歲餘遷右補闕以直忤旨分司東都渤雖處外然志在朝廷表疏凡四十五獻太和中召拜太子賓客卒元稹河南人元和初舉制科對策第一拜左拾遺性明鋭遇事輒舉始王叔文王伾蒙幸太子宫撓國政稹獻書請選正人輔導又自以職諫諍不復數召見條上十事拜監察御史按獄東川劾奏節度使嚴礪分司東都舉劾按故事追攝長慶初厯工部侍郎進同中書門下平章事稹尤長於詩與白居易名相埒天下傳諷號元和體李中敏潁陽人元和中擢進士第性剛峭拜侍御史因旱上書請斬鄭注不省以病告歸注誅召氏茂鄉死牢自洛陽走常山號伏叛壘讐意感解以尸還之單縗冬月往來太行間東膚皸瘃銜哀雨血行路人為牢泣後擢進士第五代晉桑維翰河南人進士及第晉主辟為掌書記常以自從滅唐興晉維翰力也遷中書侍郎同門下平章事天福中出為相州節度使出帝即位拜中書令事無巨細一以委之數月之間百度寖理遼兵入京師左右勸維翰避禍維翰曰吾為大臣安所逃死耶安坐府中不動張彥澤使人縊殺之宋王審琦洛陽人乾祐初隸周祖帳下性純謹甚親任之從世宗征劉崇力戰有功厯官殿前都虞候領睦州防禦使宋初領泰寧軍節度建隆中出為中正軍節度為政寬簡開寶六年加同平章事審琦厚重有方略尤善騎射子承衎頗涉學曉音律厯知夀州何繼筠河南人晉初補殿直周祖討三叛表繼筠從行仕至行營都監宋開寶二年太祖親征晉陽遼兵來援召授方略令赴石嶺關拒之謂曰翼日亭午侯卿奏捷也至期繼筠子承睿果來獻捷以功拜建武軍節度繼筠前後備邊二十年與士卒同甘苦得其死力善揣邊事邊人畏服多畫像祠之子承矩開寶五年知河南府奏罷橫役厯知潭滄二州及緣邊屯田使請於順安寨西開易和蒲口貯水為屯田遼兵南侵屢遣內侍以密詔問禦遏之計終齊州團練使劉保勳河南人少好騎射習刑名之學頗工詩仕周至工部員外郎宋初拜户部徙雲安監鹽制置使歲餘出羡餘百萬轉運使欲以狀聞保勳曰貪官物以為已功可乎厯官至幽州行府事保􅈴性純謹精於吏事不憚繁劇常語人曰吾受君命未嘗辭避接同僚未嘗失意居家積資未嘗至千錢聶崇義洛陽人少舉三禮善禮學漢乾祐中纍官國子禮記博士校定公羊春秋周顯德中纍遷太常博士命摹畫郊廟祭器以聞建隆間考正三禮圖表上之下工部尚書竇儀俾之裁定三禮圖遂行於世郭忠恕洛陽人七歲能屬文舉童子科及第尤工篆籕周初為周易博士太宗召為國子監主簿令刋定厯代字書坐罪流登州所定古今尚書並釋文並行於世石熙載洛陽人疏俊有量居家嚴謹有禮法太宗尹京邑表為開封府推官後即位纍擢天尚書右僕射卒上為悲歎謂其事君之心純正無他熙載性忠實遇事盡言無所顧避人有善即推薦之時論稱其長者子中立景祐中拜參知政事練習臺閣故事喜賓客及卒至不能辦喪种放洛陽人奉母隱終南豹林谷之東明峯以講習為業從學者衆得束修以養母咸平四年張齊賢薦放孝行純至可勵風俗簡朴退靜無謝古人召對崇政殿詢以民政邊事對曰明王之治受民而已惟徐而化之即日授左司諫直昭文館後復表徙居嵩山天封觀側就興唐觀基起第賜之吕蒙正河南人大平興國中進士弟一纍擢中書侍郎兼户部尚書平章事蒙正質厚寬簡有重望以正道自持遇事敢言每論時政有未允者必固稱不可上嘉其無隱至道初判河南府政尚寬靜委任僚屬事多總裁而已咸平六年授太子大師封蔡國公改封許景德二年歸洛帝謂曰卿諸子孰可用對曰有姪夷簡宰相才也冨弼年十餘歲蒙正一見驚曰此兒他日名位與吾似而勳業遠過於吾知人類如此卒諡文穆錢若水新安人雍熙中登第纍擢諫議大夫同知樞密院事真宗時從幸大名陳禦敵安邊之策知開封府時北邊未安內出手札訪若水以策陳備邊之要五事出知天雄軍纍拜并代經略使若水有器識能斷大事事繼母以孝聞所至推誠待物委任僚佐總其綱領無不稱治陳太素緱氏人第進士纍遷判大理事任刑法二十餘年朝廷有大疑獄必召與議太素推原人情以傅法意泉自以為不及終尚書兵部郎中范雍河南人舉進士為洛陽主簿纍官樞密使進資政殿學士趙元吳反出知延州永興軍終尚書左丞雍為治尚恕喜寬每虛懷薦士子宗傑為兵部員外郎厯陜西轉運使富弼河南人少篤學有大度舉茂才異等慶厯初知制誥遼遣使求關南地弼奉使與遼主力爭反覆陳必不可狀遼主欲增幣曰當稱獻納弼爭之聲色俱厲遼人氣折還拜樞密副使上當世之務十餘條及安邊十三策出知青州至和二年召拜同中書門下平章事封鄭國公弼為相守典故行故事而傅以公議百官任職天下無事神宗時王安石用事雅不與弼合稱疾求退出判河南遂請老以司空致仕封韓國公弼雖家居朝廷有大利害知無不言卒贈太尉諡文忠尹洙河南人仁宗朝舉進士遷太子中允會范仲淹貶洙奏仲淹臣之師友仲淹被罪臣不可苟免出監唐州酒稅西北久安洙作敘燕息戍二篇以為武備不可弛為韓琦所深知琦知秦州辟洙通判州事官至起居舍人洙內剛外和博學有識度尤深於春秋自唐末厯五代文格卑弱洙為古文振起之其為文簡而有法有集二十七卷世稱河南先生兄源亦以文章知名世稱河內先生滕宗諒河南人舉進士纍官刑部員外郎知涇州范仲淹薦以自代擢天章閣侍制終知蘇州府宗諒尚氣倜儻自任好施與及卒家無餘財著有諫疏二十餘篇种世衡放之兄子少尚氣節家資悉推與昆弟惟取圖書厯簽書同州鄜州判官纍官至環慶路兵馬鈐轄在邊數年積穀通貨所至不煩縣官益兵增餉善撫士卒能得人死力子古諤診皆有將才關中號為三种邵雍河南人事李之才受河圖洛書八卦六十四卦圖象探賾索隱妙悟神契多所自得及其學益老德益劭與人言無貴賤少長一接以誠故賢者悅其德不賢者服其化卒贈祕書省著作郎元祐中諡康節所著書曰皇極經世觀物內外篇漁樵問對詩曰伊川擊壤集程皓河南人父珦大中大夫文彥博表其清節皓舉進士熙寧初為御史裏行神宗數召見皓前後進説大約以正心窒欲求賢育才為言務以誠意感悟主上王安石執政議更法令言者攻之甚力皓被旨議事安石方怒言者厲色待之皓徐曰天下事非一家私議願平氣以聽安石為之愧屈皓得不傳之學於遺經以興起斯文為已任辨異端闢邪説使聖人之道煥然復明於世孟子之後一人而已及卒文彥博題其墓曰明道先生程頤皓弟與兄同受學於周茂叔年十八遊太學著顏子好學論胡瑗大驚異之即延見處以學職哲宗初擢崇政殿説書每進講色甚莊繼以諷諌出勾管西京國子監頤學本於誠以大學語孟中庸為標指而達於六經動止語默一以聖人為師著易春秋傳世稱伊川先生李籲洛陽人從程伊川學登進士第元祐中為祕書省校書郎卒伊川謂其才識可以大受張繹夀安人家微年長未知學傭力於市聞邑官傳呼聲心慕之人曰此讀書所致耳即發情力學謂科舉之習不足為會程伊川還自涪乃往受業頤賞其穎悟嘗言吾晚得二士謂繹與尹焞也尹焞洛陽人少師事伊川嘗應舉發䇿有誅元祐諸臣議不對而出遂終身不就舉靖康初召至京師不欲留賜號和靖處士紹興初召為崇政殿説書兼侍講移書秦檜言和議一成彼日益強我日益怠不報乞放歸田里遂出為提舉江州太平觀焞質直宏毅實體力行著有論語解朱光庭偃師人父景厯光祿卿病革自占遺表請上咨訪闕失無一語求恩澤光庭始學於胡瑗瑗告以為學之本在於忠信終身行之以父蔭擢第哲宗初司馬光薦為左正言首乞罷保甲青苗等法又論蔡確章惇罪宣仁后嘉其守正遷左司諫河北飢持節行事即發廩賑民後出知潞州卒孟厚河南人從伊川學伊川之葬門人畏禍莫敢至獨厚與尹焞張繹范棫邵傳送焉時號曰高義孟公种師道世衡孫少從張載學纍遷至涇原都鈐轄童貫握兵權見者皆旅拜師道長揖而已欽宗時廢居南山豹林谷金兵南下拜太尉請緩給金幣使彼惰歸扼而殱諸河不聽金兵退請合關河卒屯滄衛孟滑以備之又揣敵必大舉亟上疏請幸長安召還卒諡忠憲种師中厯知環邠秦州全師大至詔提兵入援師中度河即上言欲由邢相間捷出上黨搗其不意不川尼雅哈圍太原詔與姚古犄角進屯正定知樞密院許翰督之出戰師中約古及張皓俱進失期不至敵悉衆來攻軍潰師中獨以麾下死戰力疾鬬死師中老成持重為時名將諸軍自是氣奪詔贈少師諡莊愍尼雅哈舊作粘罕今改正陳與義河南人天資卓偉政和初登上舍甲科官太學博士紹興初召為兵部員外郎纍遷翰林學士知制誥拜參知政事與丞相趙鼎同心輔政務尊主威而振綱紀以疾授資政殿學士知湖州終提舉洞霄宫與義容狀儼恪不妄言大平居維謙以御物然內剛不可犯其薦士於朝退未嘗以語人尤長於詩上下陶謝韋柳間有簡齋集行世張玘澠池人建炎中以家財募軍禦金兵於白浪口積功補成州刺史董先為制置司前軍統制玘佐之每戰冒矢石為諸軍先後從嶽飛復京西六州厯官至都統救海州圍中流矢卒子世雄沒於符離之戰贈武節大夫翟興伊陽人少以勇聞以保衛陵寢功補承信郎纍官至忠州團練使劉豫遣蔣頤持書誘興以王爵興斬頤焚其書豫乃屬其裨將楊偉害之事聞贈節度使弟進官至西北路制置使死於賊金辛願福昌人博極書史作文有繩尺詩律精嚴有自得之趣性野逸不修威儀雅負高氣不能從俗俯仰正大末沒於洛下許古伊陽人明昌中登第厯遷監察御史上章請起任耆舊又請明敕中外盡言不諱授右司諫元兵越潼關而下古請選募鋭卒并力擊之哀宗初致仕居伊陽郡守為起伊川亭古每乘舟出村落間老稚爭為挽舟其為時人愛慕如此元秦長卿洛陽人性倜儻世祖素聞其名及即位以布衣徵至京師長卿好論事與劉宣同在宿衛以氣岸相高時尚書省立阿哈瑪專政長卿上書比之趙高董卓阿哈瑪大恨除長卿知鐵冶事誣以折閲課額籍其家使獄吏殺之阿哈瑪舊作阿合馬今改正李鑄洛陽人為孟州同知歲旱徒跣詣濟源神祠禱之少頃果雨蝗忽集鑄至田畔焚香祝天蝗悉去泉皆異之以為誠感比代郡民遮道挽留不忍其去張恭偃師人以兵部符署鷹房府案牘親老辭歸侍養墾理先墓身負水灌松柏事母馬氏尤謹歲凶夫婦采野菜為食而奉甘旨無乏天厯初西兵至河南居民悉竄恭守視母病項中一劒不去母殁居喪盡禮人稱至孝楊朴河南人早以文學推擇為吏仕滁州全椒縣尹縣陷於賊朴度必死盡殺其妻女朝服坐堂上賊欲降之朴指妻女曰我已戕我屬矣正欲死官守耳乃連唾之賊繫朴倒懸樹上割肉至盡猶大罵勿絶而死蔡子英永寧人至正進士察罕開府河南辟參軍事纍遷至行參政元亡子英單騎走關中亡入南山明太祖求得之館於儀曹大哭不止人問故曰思舊主耳乃命有司送出塞令從故主於和林明魏敏鞏縣人性至孝博通經史洪武時登進士厯官通政母病告歸省未至而母卒敏廬墓三年哀毀如初旌其門祀鄉賢宋禮永寧人性沈毅有大略精於河渠水利之學洪武中以諸生貢入禮部授山西按察僉事永樂中纍遷工部尚書開會通河至今賴之周濟洛陽人博學強記居家以孝稱素為人推重永樂中舉於鄉厯任御史時鎮大同中官僭橫遣濟往察之乃微行入郭宅盡得罪狀朝廷嘉之又按四川威州土官董敏王允讐殺纍年不解濟至慰諭之敏等歸服終安慶知府在職多惠政曹端澠池人永樂間授霍州學正父喪五味不入口服闋復任霍州卒於官州人為罷市巷哭端博通諸經雅慕伊洛之學師事宜陽馬子才太原彭宗石弦誦寒暑不間所著有孝經述解四書詳説太極圖西銘通書解家規輯略存疑録夜行燭儒宗統譜等書學者宗之稱月川先生閻禹錫洛陽人從河東薛瑄受濂洛之學躬行深造以明道淑人為務正統中由舉人授昌黎訓導聞母訃徒步奔歸廬墓三年服闋為開州訓導纍擢御史督畿內學政取濂洛遺書親為講説士多興感劉健洛陽人從事伊洛之學天順四年舉進士纍遷少詹事孝宗時進文淵閣大學士時四方洊災健屢陳時宜皆嘉納之武宗時劉瑾等導為盤遊入諫不聽遂致仕歸既去位瑾猶銜之不已尋以他事矯詔落職瑾誅復其官卒諡文靖孫應奎洛陽人正德進士擢兵科給事中疏參桂萼作威福納財賄勢侵六官氣制言路又劾吏部尚書方獻夫帝頗納其言後應奎為張璁劾奏下詔獄尋釋還職既又以奏參汪鋐謫高平縣丞纍官户部尚書董相嵩縣人正德進士授御史守居庸江彬擅啓關鑰相執之武宗至命釋彬相疏陳彬二十四罪謫徐州同知後武宗南巡過徐州知其名拜按察副使子遂選俱成進士遂為給事中坐劾鄢懋卿出為山西副使王邦瑞宜陽人正德進士纍官至吏部侍郎京師戒嚴命邦瑞總督九門兼督團營見營務廢弛極陳其弊請罷十二團營歸三大營又條上興革六事請盡撤中貴監軍㺟兵部尚書與仇鸞忤落職鸞敗起故官卒尤時熙洛陽人弱冠舉嘉靖元年鄉試讀王守仁傳習録恨不獲師事之聞郎中劉魁得其傳遂師事焉厯官元氏章邱教諭入為國子監博士六館士咸取法焉尋以戶部主事榷稅滸墅不私一錢以母老乞終養遂不出日以修己淑人為務學者從之孟化鯉新安人年十六慨然以聖賢自期登萬厯進士授户部主事榷稅河西務改吏部厯文選郎中時內閣權重每銓除必先白化鯉獨否中官請託復不應以故多不悅尋以建言斥為民既歸築書院與學者講習從遊者恆數百人喬允升洛陽人萬厯進士纍官刑部尚書執法不撓多所平反魏忠賢以為趙南星黨逐之崇禎初復官以禁囚越獄謫戍邊允升端方廉直以詿誤獲重譴天下惜之吕維祺新安人萬厯進士崇禎中厯官兵部尚書溝學敦氣節罷官居洛陽流賊陷城被執不屈遇害諡忠節本朝乾隆四十一年賜諡忠敬同時以薦紳死難者待詔郭顯星平陽推官黨克念昌樂知縣劉芳奕皆洛陽人以舉人死難者􆀪民表洛陽人王翼明嵩縣人以布衣死難者孫挺生孟津人馬明山李登藝新安人年均本朝乾隆四十一豫入忠義祠姚若時登封人官鳳陽通判流賊陷城死之子城請兵報父仇亦死本朝乾隆四十一年子入忠義祠來秉衡洛陽人舉於鄉為賊將劉宗敏所執令易服欲官之不可並其母劉妻吳暨切子皆遇害張育粹偃師人以諸生佐有司守城城陷死之本朝乾隆四十一年豫入忠義祠其妻簡子女切孫六人俱死馬足輕宜陽人孝友好義賊至與其三子皆罵賊𬒳殺女三人慮為賊汚投崖死足輕於十一年本朝乾隆四豫入忠義祠阮秦洛陽人以廣靈知縣家居聞京師失守不食死妻朱氏殉之裴君合偃師人有孝行聚衆保沙岸寨賊攻之力竭遇害李佩玉嵩縣人語寨衛鄉土與鄰境數寨相犄角賊憚之後賊大舉圍别寨佩玉往救戰死本朝乾隆四十一年豫入忠義祠劉君培新安人攜從孫出避賊遇賊將殺其從孫君培曰此遺孫幸合之而殺我賊殺君培從孫獲免傅世濟嵩縣人與兄世舟俱為土寇所執寇欲釋其一世濟奪刃自剄兄乃免屈動嵩縣人崇禎進士官吏科給事中上疏通蠲賑補額欠疏錢法舉朝奉為昌言又薦方震孺方嶽貢等一時號為得人本朝武君烈嵩縣人少力田奉母避流寇居山中遇土賊將殺其母君烈願以身代賊義而釋之順治初由行伍屢擢至荆州都司時土寇王進才以二十萬衆犯澧州君烈往剿身光士卒宇入賊營斬首數十級賊驚潰降者數萬人以功升遊擊鎮襄陽康熙七年鄖陽山賊竊發君烈剿之戰死西山下事聞子恤王無黨孟津人崇禎末李自成破孟津難民奔河北北岸疑其為寇不納無黨大聲叩軍門願以百口保無虞即乘巨艦至南岸濟衆全活數十萬國初授山西平陽道薑瓖以大同叛圍平陽無黨誓死守援至夾擊賊大潰以功晉山東濟東道未至卒弟無咎順治進士仕至太常寺卿善詩文史良植洛陽人順治丙戌進士知吳縣盜破城死之郭一鶚洛陽人順治已丑進士選庶吉士改給事中厯官府東左布政使值海寇警議徙濱海居民一鶚先僚屬出俸安插全活甚多祀鄉賢孫養翼孟津人順治已丑進士由刑部主事厯升川北道僉事時獻賊初靖養翼招徠遺黎歸而受廛者億萬戶遷荆南道會討李來亭督糧運功尤著祀鄉賢耿介登封人順治壬辰進士由檢討出為福建巡海道所部肅清以憂歸里詹事湯斌薦之授少詹事旋乞休以昌明絶學為己任遠近學者咸師宗之聽著有理學要旨中州道學編李經易知敬恕堂存稿魏鎔孟津人明舉人官青州府推官當順治壬辰秋開釋株連七十餘人皆與撫臬固爭乃得報撫臬亦重其骨鯁薦擢瓊州同知王無忝孟津人順治辛丑進士任金華知府地為七閩咽喉時耿逆甫平城郭榛蕪無忝招徠安集輕徭薄賦除苛解網與民更始祀鄉賢傅性良登封人順治中以恩貢授永夀知縣時賀珍作亂擁衆數萬􅊳圍永夀百姓惶懼思竄性良諭以大義設法死守邑人獲全升蘇州同知濬河修堰開三吳水利攝長洲嘉定縣事多惠政尋引疾歸里祀鄉賢魏灝孟津人順治中以拔貢任杭州通判取與不茍攝新城篆潔已愛民浙人德之吕履恆新安人康熙甲戌進士授寧鄉知縣甫下車即訪蠧吏置之法歲飢民多逃亡減徵改以蘇民困其有不能完課者輒捐俸以代之厯擢户部侍郎履恆孝友性成居官清介雖貴顯不異寒素弟復恆以孝友力學稱官儀封教諭並祀鄉賢劉芳永寧人康熙已己歲洛水泛溢芳父為巨浪所漂疾流如矢芳追哭里許躍入水援之父子俱獲免知縣佟賦偉表其里曰孝子村李學裕洛陽人雍正丁未進士厯檢討御史出為四川建昌道時大小金川暨雜谷等土司相仇殺學裕輕騎往諭頑梗革心官江蘇糧道賑淮揚災親厯郡邑均查户口芟除浮冒民沾實惠終安徽布政使祀鄉賢任天篤偃師人自四世祖光玉至四世孫瑞豐九世同居家庭聚順雍睦可風乾隆五十一年旌吳端嵩縣人嘉慶二年教匪滋事端率子樂孫科拒賊同時被害又同縣周培周文漢父子罵賊被戕武億偃師人乾隆庚子進士任博山縣知縣興利除弊廉潔自矢後被劾鐫職民以為冤嘉慶四年億去官事聞論調來京而已先一月卒矣億優於學著録甚富有經讀考異羣經義證等書數百卷張士俊洛陽人嘉慶元年投效湖北軍營隨勦教匪立功賞外委銜十八年派剿河南教匪在滑縣東門擊賊陳亡賞邱如例前總纂官臣張琴恭纂輯提調官臣王廣蔭恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校大清一統志河南府五流寓漢周黨太原廣武人建武中將妻子居澠池被徴不得巳乃著短布單衣穀布綃頭光武引見伏而不謁自陳願守所志賜帛四十匹遂隱居澠池著書上下篇而終邑人賢而祀之班超平陵人兄固被召詣校書郎超隨母至洛陽家貧常為官傭書以供養久勞苦嘗投筆嘆曰大丈夫當立功異域以取封侯安能久事筆硯間乎後封定逺侯永元中上疏乞歸洛李膺襄城人舉考廉厯漁陽太守以母老乞不之官居緱氏教授常千人桓帝時拜司隸校尉及遭黨事下獄免歸居陽城山中三國魏胡昭潁川人居陸渾山中躬耕樂道以經籍自娛晉王尼城陽人寓居洛陽初為護軍府軍士胡母輔之等齎羊酒詣護軍門門吏疏名呈護軍護軍嘆曰諸名士持羊酒來將有以也尼時給府養馬輔之等入坐馬廄下與尼炙羊飲酒竟不見護軍護軍大驚即與尼長假因免為兵陸機雲間人吳亡同弟雲入洛王公聞二人才略皆迎致之董京不知何郡人與隴西計吏俱至洛陽嘗宿白社中時乞於市得殘碎繒絮詰以自覆全帛隹綿則不肯受或見推排罵辱曾無怒色孫楚就社中載與俱歸後數年遁去於其所寢處惟有一石竹子及詩二篇夏統永興人以母病詣洛市藥會三月上已洛中王公子以下並至浮橋士女駢填車服燭路統在船中曝所市藥並不之顧賈充就船與語其應如響欲使之仕即俯而不答為歌河女之章及小海唱清激慷慨充欲耀以文武鹵簿又使妓女之徒繞其船三匝統危坐如故充曰此吳兒是木人石心也南北朝魏馮亮南陽人博覽諸書隱居嵩山詰架巖林得棲遊之適宣武召為羽林監領中書固辭不出唐徐文遠名曠以字行客偃師貧不能自給兄文林鬻書於肆文遠日閲之因博通五經性方正舉動純重大業初為國子博士高祖幸國學曠發春秋義論難風生隨方占對人莫能屈帝異之田遊巖三原人入箕山居許由祠旁自號由東鄰頻召不出高宗幸嵩山親至其門遊巖野服出拜儀止謹朴曰臣所謂泉石膏肓煙霞痼疾者拜冼馬尋放還山武攸緒武后姪恬淡寡欲好易及莊周書棄官隱於嵩山盤桓龍門少室間冬蔽茅椒夏居石室市田潁陽使家奴雜作自混於民睿宗時召拜太子賓客不就詔賜嵩山舊居令州縣存問武平一名甄以字行潁川郡王載德子博學通春秋工文詞武后時隱嵩山學浮屠法屢詔不應中宗復位強起為起居舍人景龍初兼修文館直學士時外戚強盛平一自請裁抑帝慰免之盧同濟源人居東都韓愈為河南令愛其詩厚禮之同自號玉川子嘗為月蝕詩以譏切元和逆黨愈稱其工賈島范陽人初為浮屠名無本來東都時洛陽令禁僧午後不得出島為詩自傷韓愈憐之因教其為文遂去浮屠舉進士元杜瑛信安人金末避地河南緱氏山中時亂後文物凋喪瑛搜訪諸書盡讀之杜門著書屢徵不就遺命表其墓曰緱山杜處士列女漢樂羊子妻河南人樂羊子嘗行路得遺金一餅還以與妻妻曰志士不飲盜泉之水廉者不受嗟來之食况拾遺金求利以汚其行乎樂羊子大慚乃捐金於野遊學一年來歸妻引刀斷機曰夫子中道而歸何異斷其織乎樂羊子感其言復遊七年不返妻躬勤養姑後盜有欲犯妻者先劫其姑妻聞操刀而出盜曰釋汝刀從我者可全不從者則殺汝姑妻仰天而嘆舉刀刎頸而死盜亦不殺其姑太守聞之即捕殺盜賜縑布以禮葬之號曰貞義晉愍懷太子妃王氏太尉衍女字惠風貞蜿有志節劉曜王彌寇洛陽將諸后妃去妃乃拔刀向賊曰我司徒之女皇太子妃死則死耳終不為賊婦賊殺之其侍兒名六出者曰主既死矣何以生為亦赴水死隋華陽王楷妃元氏河南人元巖女性婉順楷被幽廢事之愈謹江都之亂楷遇宇文化及之難以妃賜其黨元武達武達因醉逼之妃誓不屈自毀其面血淚俱下武達釋之妃曰不能早死致令將見侵辱我之罪也因不食而卒韓顗妻于氏洛陽人字茂德周大夫輔實女顗從軍殁氏哀毀骨立慟感行路其父以其幼少無子欲嫁之誓不許以夫孽子世隆為嗣愛同巳生訓導有方卒能成立自孀居以後蔬食布衣不聽聲樂以此終身隋文帝聞而嘉歎詔表門閭劉昶女河南長孫氏婦昶與文帝有舊其子居士不遵法度數得罪女每垂泣誨之不改至破家産女時寡居每言歸躬勤紡績以致甘脆後居士坐斬昶賜死女絶而復蘇遂布衣蔬食以終其身唐王蘭英獨孤師仁之母師仁父武都謀歸唐王世充殺之師仁始三歲免死禁錮蘭英請髠鉗得保養許之遊丐道路以食師仁身啖土飲水後詐為採薪竊師仁歸京師高祖嘉其義封蘭英永壽鄉君盧氏狄仁傑之姨居午橋别墅仁傑因往候姨適表弟挾弓矢攜雉歸顧揖仁傑意甚輕之仁傑啓曰某忝為宰相弟有所欲幸以相告姨曰相自貴耳老姨止此一子不欲其事女主仁傑慚而退竇烈婦河南人相邑令畢某妻同州軍亂令匿望仙里不知所舍乃讐家也夜半盜入捽令首欲殺之竇泣蔽捍苦持賊袂至中刀不解令得脫走賊亦去竇幾死而愈宋种放母長安主簿洛陽种翌之妻與放隱終南結草為廬淳化間放被召母曰常勸汝勿聚徒講學果為人知而不得安處放稱疾不起母盡取其筆硯焚之轉入窮谷帝嘉之詔賜以緡錢養母及母卒又賜錢帛助喪程子母侯氏治家有法不喜鞭笞奴婢諸子或加訶責必戒之曰貴賤雖殊人則一也二程子在襁褓即教以經史常飲食置二子於坐或絮羹即叱止之故程子兄弟飲食衣服細微悉當皆母教然也尹焞母朱氏焞應舉不對歸告其師程伊川曰焞不復舉進士矣伊川曰子有母在歸告其母母曰吾知汝以善養不知汝以祿養伊川曰賢哉母也元趙彬妻朱氏名錦哥洛陽人天厯初西兵掠河南氏被執逼與亂度不能脫給兵曰幸釋我舍復井旁有瘞金當發以遺汝兵信之乃隨之行氏得近井即抱三歲女投井死齊關妻劉氏河南人關應募為千夫長戰死劉氏貧無所依守志不奪有議婚者劉氏紿之曰吾三月三日有心願償畢當從汝是日竟往天安寺登浮屠絶頂祝天曰妾夫已死不敢失節也遂投地死王氏名安哥偃師人從父避兵邙山丁家洞賊搜獲欲污之不從投澗死秦氏二女宜陽人父有危疾醫云不可攻姊閉户默禱鑿巳腦和藥進飲遂愈久後復病欲絶妹刲股肉置粥中父小啜即蘇明張景輝妻賀氏登封人元末夫死於寇賀抱子俊求夫骨於積尸中手聚土掩之其弟諷改醮賀剔去一齒示不二節洪武初俊官主簿坐事罰工自慚纍其母上疏陳狀因嘉賀節復俊官仍命禮部榜示天下以勵風俗真邱郡主伊王女下嫁蔡升卒觸牆而死詔旌其墓曹昂妻張氏􅏖陽人正德中為流賊所執抱子投濠水死詔旌其門時鞏縣常自省妻李氏談思妻張氏劉麟妻韓氏並死賊難戴濬妻王氏澠池人濬亡氏欲殉之救免會姑馬氏卒遂縊馬亦以孀居著節者王自選妻張氏永寧人未嫁而殉事聞立祠祀之郡之以殉夫著者馬通妻李氏嵩縣人王鑑妻張氏宜陽人王盤妻唐氏河南衛人董維翰妻葉氏董大河妻莊氏洛陽人李之臣妻王氏鞏縣人楊讓妻張氏新安人張希蘭妻陳氏澠池人閻氏女洛陽人鄰少年欲逼之不從見殺康流來妻趙氏鞏縣人流來墮水死趙聞趨投水中越三月二尸相抱浮出張邦才妻左氏澠池人夫卒事姑以孝聞姑死縊於姑側詔為建烈孝祠李清標妻王氏澠池人明末遇賊自縊賊剖其腹子儀罵賊死時死賊難者郭永祚妻左氏溫廷柳妻于氏子婦金氏張彥珩妻賈氏董景行妻敦氏杜敦孝妻喬氏董維正妻李氏徐育淳妻董氏董正妻王氏皆洛陽人李永悅妻宋氏偃師人喬作霖妻李氏鞏縣人李麟正妻馬氏孫養翼妻李氏皆孟津人馬雲錦妻鎖氏張世延妻史氏程某其康氏皆永寧人傅之恕妻孫氏嵩縣人節婦焦一霑妻周氏子復亨妻楊氏謙亨妻牛氏皆登封人吕維禧妻郭氏其姒張氏范聲國妻燕氏陳明廷女劉中桂女雷躍龍女陳善女樊從儉女同憂國女同希曾女皆新安人魏氏鞏縣人張讚妻郭氏永寧人城陷罵賊死妾趙氏盧氏子婦程氏史氏暨其二女皆死李氏永寧人明末寇劫之上馬罵不絶口自墮馬數四賊刳其雙目女曰早殺我我必不從汝賊腰斬之本朝吕維禔妻楚氏新安人明季寇逼夫殉難氏自縊死同縣杜昆妻溫氏守正被戕俱順治年間旌孫得盛妻張氏鞏縣人得盛死於獄張白其冤得雪後投井死同縣鄭慈妻李氏守正被戕俱順治年間旌李宗沆妻王氏孟津人夫亡殉節順治年間旌劉誠妻楊氏登封人夫亡殉節同縣靳爾順妻田氏俱順治年間旌張論妾石氏永寧人眀季寇逼石曰吾誼不可辱投井死同縣張璿妻郭氏亦因寇逼投水死俱順治年間旌劉含章妻王氏澠池人夫亡氏甫生女撫之三歲營葬畢即自縊死同縣節婦王熙妻杜氏俱順治年間旌范九玉妻康氏洛陽人饁夫於田遇強暴堅拒被殺康熙年間旌張景齡妻韓氏洛陽人景齡殁生遺腹子逾年母家欲令改適絶粒死雍正年間旌高金曰聘妻張氏澠池人夫亡殉節雍正年間旌郭如莪妻曹氏洛陽人夫亡守節同縣節婦郭致太妻鄧氏郭繼曾妻何氏張于默妻徐氏董九苞妻劉氏周繹文妻黃氏于依仁妻武氏陳謙妻徐氏董嘉賴妻杜氏馬璐妻周氏廖唐臣妻朱氏胡瑜妻張氏秦偉妻王氏郭允紵妻孫氏宫瓊區妻谷氏胡顯令妻張氏王錫爵妻張氏王宏毅妻胡氏王㦀妻李氏苗穗妻孫氏朱麟妻馬氏廖爾濬妻黨氏裴汝翼妻王氏胡敬聖妻王氏郭贊妻胡氏邢僐妻李氏謝君愛妻蘇氏胡朝用妻吳氏嶽定妻王氏伏文鑄妻王氏來迎祉妻張氏許育珵妻張氏董䇿妻李氏董爾性妻百氏畢星妻張氏劉賓妻王氏淩選妻王氏張文明妻苗氏畢思聰妻陳氏王者賓妻黃氏苗觀生妻姚氏王士俊妻胡氏馬永正妻張氏宋際升妻曹氏董樂天其張氏孫應辰妻楊氏郭琈妻高氏曹朴妻于氏倪肇本妻趙氏劉景星妻趙氏王蘭妻李氏趙生蕙妻曹氏閻耀妻王氏吕