front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_076-1a}
body:
  text: 河南府二古迹隋東都城今洛陽縣治隋書煬帝紀大業元年詔營建東京二年東京成五年改為東都舊唐書地理志東都城北據邙山南對伊闕洛水貫都有河漢之象南北十五里二百八十步東西十五里上十步周圍六十九里三百二十步都內縱橫各十街街分一百三坊二市每坊縱橫三百步開東西二門唐書地理志東都王城曲折象南宮垣名曰太微城宮城象北辰藩衛曰紫微城都城武后號曰金城宋史地理志西京皇城周回十八里五百二十八步京城周五十二里九十六步顧爽武肇城記今洛陽城乃隋唐東南一隅新城故城在洛陽縣南古戎蠻子國戰國時為韓邑戰國䇿張儀曰秦攻新城宜陽以臨二周之郊史記秦昭襄王十三年白起攻新城漢二年漢王至雒陽新城三老董公遮説漢王為義帝發喪皆此地也漢惠帝四年置新城縣屬河南郡後漢至晉因之東魏天平初置新城郡屬北荆州魏書地形志郡治孔城後陷徙治州城隋開皇初郡廢十八年改縣曰伊闕以伊闕山為名大業初屬河南郡唐因之元和志縣北至河南府七十里宋熙寧五年廢為鎮入河南六年改隸伊陽後仍屬洛陽元統志伊闕故城在嵩州東北九十里河南故城在洛陽縣西五里即故洛邑王城也書序成王在豐欲宅洛邑使召公先相宅周公曰我乃卜澗水東􅬖水西惟洛食即此其後平王徙都之是為東周亦曰王城左傳莊公二十一年鄭虢同伐王城見也敬王始遷成周後更名王城曰河南帝王世紀考王封弟揭於河南是為西周公時又以成周為東周也漢為河南縣屬河南郡博物記王城方七百二十丈郛方一十里南望雒水北至陜山地道記河南城東去洛城四十里後魏太和中都洛陽仍以河南縣屬河南尹東魏天平初遷鄴改縣曰宜遷置河南郡後周復曰河南隋大業初改營新都移河南入郭下故城廢括地志河南故城在今縣北九里苑內東北隅舊唐書地理志河南縣隋舊武德四年權治司隸臺貞觀元年移於大理寺二年徙理金墉城六年移治都內育德坊永昌元年改為合宮縣神龍元年復為河南三年復為合宮景龍元年後為河南宋亦曰河南縣金始省入洛陽穀城故城在洛陽縣西北春秋周邑也左傳定公八年單子伐穀城漢置穀城縣屬河南郡後漢因之晉省水經注城西臨榖水故名括地志故城在河南縣西北十八里苑中寰宇記故穀城在穀水之東岸西晉併入河南北齊天保中常山王演使裨將嚴略增築以拒周俗亦謂之嚴城隋大業二年又於此置青城宫北隔苑城與榆村店相對洛陽故城在今洛陽縣東北三十里即故成周城也書序召公既相宅周公往營成周作洛誥曰我又卜瀍水東亦惟洛食即此其後遷殷頑民于此春秋昭公二十六年天王入于成周又左傳昭公三十二年晉魏舒韓不信如京師合諸侯之大夫于狄泉令城成周公羊傳曰成周者何東周也其後更曰洛陽顯王三年秦敗韓魏之師干洛陽是也秦莊裏王元年滅東周置三川郡封呂不韋為文信侯食河南洛陽十萬户漢元年項羽立申陽為河南王都洛陽二年屬漢五年帝即位初都洛陽尋西都長安以縣為河南郡治後漢更始元年都洛陽二年遷長安世祖建武元年幸洛陽却非殿遂定都焉改洛為雒三國魏復故魚豢魏略曰漢火行也火忌水故洛去水而加佳魏於行次為土土水之牡也故除佳而加水變雒為洛晉書地理志魏氏受禪即都漢宫司隸所都置司州晉仍居魏都遂定名司州河南郡置尹洛陽置尉五部三市東西七里南北九里東有建春東陽清明三門南有開陽平昌宣陽建陽四門西有廣陽西明閶闔三門北有大厦廣莫二門司隸校尉河南尹及百官列城內永嘉五年為劉聰所破聰以洛陽為荆州咸和三年石勒以洛陽為南都成康元年石虎分河南等郡為洛州永和中石氏亂十二年桓溫入洛陽興寧三年陷於慕容暐太和五年燕荆州刺史慕容築以洛陽降於苻秦太元五年苻堅以苻暉為豫州牧鎮洛陽九年秦亂洛陽歸晉隆安三年姚興陷洛陽以子紹為豫州牧鎮之義熙十二年劉𥙿伐秦姚洸以洛陽降後魏太常八年于密磾克洛陽以為豫州刺史鎮之太和十七年幸洛陽定遷都之計經始洛京仍改洛州為司州十九年新都始立景明二年從司州牧廣陽王嘉請築洛陽三百二十坊東魏天平初遷鄴仍改洛州置洛陽郡周平齊置東京隋開皇初郡廢大業初移洛陽入新都郭下故城廢括地志洛陽故城在今縣東北二十六里舊唐書地理志隋自故洛城西移十八里置新都仍曰洛陽縣武德四年權治大理寺貞觀元年徙治金墉城六年移治都內之育德坊即今治也偃師故城今偃師縣治漢置縣晉省大安二年成都王穎引兵內向帝幸偃師舍於豆田即故縣也隋復置元和志縣西南至河南府七十里武王伐紂於此築城息偃戎師因以為名緱氏故城在偃師縣南二十里春秋滑國春秋莊公十有六年會滑伯同盟於幽僖公三十三年秦人入滑左傳成公十三年晉吕相絶秦曰殄滅我費滑杜預注滑國都費今緱氏縣後為周緱氏邑左傳昭公二十二年子朝作亂晉荀躒帥師軍于緱氏是也戰國策張儀曰塞轘轅緱氏之口史記秦二世二年沛公將曹參下轘轅緱氏絶河津漢置緱氏縣屬河南郡後漢至晉因之後魏太和十七年併入洛陽天平初復置屬洛陽郡隋開皇十六年廢仍屬河南郡寰宇記縣在府東南六十里晉宋前緱氏縣在今縣東南二十五里東魏天平元年復於洛陽城中置緱氏縣周建德六年又自洛陽移於今縣北七里鈎鎖故壘隋開皇四年又移於今縣北十里洛陽故郡城大業元年復移於今縣東南十里十年又移縣據公路澗西憑岸為城唐貞觀十八年省上元二年又置今回向南近孝敬陵西置宋史地理志熙寧八年省緱氏為鎮偃師舊志有故縣村在今偃師縣西南十五里又有府店在縣南三十五里古滑城在其北二里許夀安故城今宜陽縣治相傳為周時召伯聽政之所水經注甘水發於鹿蹄山山曲中世人目其所為甘棠隋書地理志河南郡壽安復魏置縣曰甘棠仁夀四年改舊唐書地理志河南府夀安隋縣義寧元年移治九曲城貞觀七年移於今治屬洛州元和志縣東北至河南府七十六里宋史地理志河南府夀安慶厯二年廢為鎮四年復續文獻通考金改壽安為宜陽舊志夀安故城在今縣東南二十里隋縣治也興泰故城在宜陽縣西南隋大業初置興泰縣屬河南郡隋末廢唐長安四年立興泰宮因復置縣神龍元年併入壽安舊志在縣西南四十五里萬安山下舊址尚存福昌故城在宜陽縣西本故一全塢城亦曰一泉塢晉永嘉中魏浚屯洛北石梁塢族子該聚泉據一泉塢水經注洛水又東徑一合塢南城在川北原上高二十丈南北東三箱天險峭絶惟築西面即為合固一合之名起於是劉曜之將攻河南也晉將軍魏該奔於此故于父邑也後周明帝二年於此置宜陽縣兼置熊州隋大業初州廢義寧二年唐公淵子世民等救東都復置宜陽郡唐武德二年改縣曰福昌取縣西隋宫為名元和志縣東至河南府一百五十里縣城即魏一合塢城後周置重兵於此以備髙齊五代後唐避諱改為福慶宋初復故元省入宜陽縣志今有福昌集在縣西六十里按諸書皆作一合塢以晉書别作一泉之文考之一合當作一全宜陽故城在今宜陽縣西戰國時韓邑也戰國策東周君曰宜陽城方八里材士十萬史記韓昭侯二十四年秦拔我宜陽秦武王三年欲通三川使甘茂伐韓茂曰宜陽大縣其實郡也今倍數險行千里攻之難王卒使茂將兵伐宜陽五月而不拔因大起兵擊之遂拔宜陽漢置縣後漢建武三年幸宜陽降赤眉於此晉永和十年秦苻健以趙俱為洛州刺史鎮宜陽後魏置宜陽郡東魏置陽州天平三年陽州刺史是云寶以州降於西魏武定初復高齊武平元年斛律光救宜陽築統關豐化二城而還周平齊此城遂廢括地志故韓城一名宜陽城在洛州福昌縣東十四里韓宜陽城也金史地理志福昌縣有韓城鎮舊志在今縣西五十里中州故城今新安縣治漢新安城在今澠池縣界今縣即後周通洛防也周保定五年改函谷關城為通洛防置中州建德六年州廢置新安郡隋改榖州後廢義寧二年復置新安郡唐貞觀元年移州治澠池移新安入廢州城元和志新安縣東至河南府七十里縣城本名通洛城周武帝將東封令陜州總管尉遲綱築此城以臨齊境東垣故城在新安縣東晉太元十一年秦苻王與慕容永戰敗奔東垣為馮該所殺元熙元年晉宗室司馬道恭自東垣年三十人屯金墉城西宋書州郡志武帝北平關洛河南郡有東垣西東垣二縣魏書地形志惟東垣縣屬新安郡隋大業初改東垣為新安唐貞觀初移縣入穀州故城而此城廢又唐武德云年復析新安置東垣縣屬榖州其地在今孟津縣界寰宇記宋東垣縣在河清縣西二十五里蓋即唐縣也鞏縣故城在今鞏縣西南周鞏伯邑國語景王田於鞏左傳昭公二十六年晉師克鞏逐王子朝史記周惠公封其少子于鞏以奉王號東周惠公秦莊襄王元年使蒙驁伐韓韓獻成皋鞏漢書地理志鞏縣東周所居水經注洛水東徑鞏縣故城南元和志鞏縣西南至河南府一百四十里大業十三年李密自潁州率羣盜十餘萬襲破洛口倉因據鞏縣仍築城斷洛川包南北山周回三十餘里屯營其中後為王世充所破縣本與成皋中分洛水西則鞏東則成皋後魏併焉舊志故城在今縣西南三十里周五里餘城址尚存永安故城在鞏縣西南宋初以太祖父永安陵所在因割鞏偃師二縣地置鎮以奉陵寢景德四年升鎮為縣九城志在西京東八十五里金貞元元年改曰芝田元廢縣志今有芝田鎮在縣西南四十里偃師縣東南二十里平陰故城在孟津縣東左傳昭公二十二年子朝作亂晉籍談荀躒帥師軍於平陰二十三年晉師在平陰史記秦二世三年沛公北攻平陰漢二年南渡平陰津至洛陽漢置平陰縣應劭曰在平城南故曰平陰孟康曰魏文帝改曰河陰後魏太和二十年營方澤于河陰隋太業初縣廢唐開元中復置平陰縣在今開封府界括地志河陰故城在洛陽縣東北五十里寰宇記城東有平川謂之河陰川北枕黃河西抵邙山北址後魏移縣理於故洛城西皇女臺側隋開皇三年又移於壽安縣東北嚴明城舊志有古城在縣西牛莊周四里其北面崩於河或是其處河清故城在孟津縣東唐武德初置大基縣後改曰河清在今懷慶府孟縣界宋開寶元年移治白波鎮九域志縣在西京北四十五里明統志金徙治孟津渡改為孟津縣舊志白波鎮在今縣東南二十里即古溫川驛金時移於古渡口桃花店西一里栁林濱河為縣元初因之後以瀦水浸城徙治西二里永安堤北枕黃河南臨漸池無城郭今為舊縣鎮明嘉靖壬辰河決復移舊治西二十五里聖賢莊即今治也平縣故城在孟津縣東漢高六年封工師喜為平侯後為平縣屬河南郡後漢初廢水經注河水又東徑平縣故城北俗謂之小平有高祖講武場括地志故平縣城在偃師縣西北二十五里通典小平縣城在鞏縣西北有津曰小平崈高故城今登封縣治漢書武帝紀元封元年行幸緱氏登嵩高御史乘屬在廟旁吏卒咸聞呼萬歲者三令祠官加增太室祠以山下户三百為之奉邑名曰崈高顔師古曰崈古崇字後漢省水經注崈高縣俗謂之嵩陽城隋大業初改輪氏置嵩陽於此唐萬歲登封元年武后因封嶽改縣為登封元和志縣西北至河南府一百三十五里舊志有故城在縣西北一里陽城故城在登封縣東南孟子禹避舜之子於陽城世本夏后居陽城史記鄭君乙十一年韓伐鄭取陽城秦二世三年沛公戰洛陽東還至陽城漢置