body:
  text: 池州府在安徽省治東少北一百二十里東西距三百七十里南北距二百三十五里東至寧國府南陵縣界一百五十里西至安慶府望江縣界二百二十里南至徽州府祁門縣界二百二十里北至安慶府桐城縣界十五里東南至寧國府太平縣界二百里西南至江西九江府彭澤縣界二百里東北至太平府繁昌縣界二百里西北至安慶府懷寧縣界一百二十里自府治至京師二千八百里分野天文斗分野星紀之次建置沿革禹貢揚州之域春秋時吳地後屬越戰國屬楚秦屬鄣郡漢為丹陽郡之石城縣晉改屬宣城郡宋齊因之梁屬南陵郡陳置北江州隋為秋浦縣仍屬宣城郡唐武德四年始置池州貞觀元年州廢仍屬宣州永泰元年復置亦曰秋浦郡舊唐書地理志水泰元年江西觀察使李勉以秋浦去洪州九百里請復置池州屬江南西道五代初屬楊吳後屬南唐置康化軍丈獻通考南唐為康化軍節度後為軍事尋復為池州宋曰池州建炎四年置江南東路帥府尋罷還屬建康元至元十四年升為池州路屬江浙行省明曰池州府直隸南京本朝初屬江南左布政使司康熙六年分屬安徽省領縣六貴池縣附郭東西距一百七十里南北距一百三十五里東至青陽縣界五十五里西至東流縣界一百十五里南至石埭縣界一百二十里北至安慶府桐城縣界十五里東南至青陽縣界六十五里西南至建德縣界一百二十里東北至銅陵縣界八十里西北至東流縣界一百里漢置石城縣屬丹陽郡後漢因之建安中孫䇿徙丹陽都尉治此晉初改屬宣城郡宋齊以後因之隋開皇九年廢入南陵縣十九年復置改曰秋浦仍屬宣城郡唐武德四年於縣置池州貞觀元年州廢還屬宣州永泰元年復為州治五代楊吳順義六年始改名貴池仍為州治宋因之元為池州路治明為池州府治本朝因之青陽縣在府東八十里東西距九十里南北距一百十四里東至寧國府南陵縣界六十五里西至貴池縣界二十五里南至石埭縣界六十九里北至銅陵縣界四十五里東南至寧國府涇縣界六十里西南至貴池縣界四十里東北至南陵縣界五十里西北至貴池縣界十五里漢陵陽涇二縣地三國吳赤烏中分置臨城縣晉屬宣城郡宋齊以後因之隋平陳廢入南陵縣唐天寶元年分涇南陵秋浦三縣地置青陽縣屬宣城郡永泰元年割屬池州五代南唐改屬升州宋開寶八年還屬池州元屬池州路明屬池州府本朝因之銅陵縣在府東北一百二十里東西距一百里南北距一百五十里東至寧國府南陵縣界八十里西至廬州府無為州界二十里南主青陽縣界七十里北至太平府繁昌縣界八十里東南至南陵縣界八十里西南至貴池縣界四十里東北至繁昌縣界八十里西北至無為州界二十里漢陵陽春穀二縣地三國吳臨城縣地東晉後為定陵縣地梁為南陵縣地唐末分南陵置義安縣屬宣州尋廢為銅官治南唐保大几年始置銅陵縣屬升州宋開寶八年改屬池州元屬池州路明屬池州府本朝因之石埭縣在府東南一百六十里東西距一百三千五里南北距四十五里東至寧國府太平縣界五里西至貴池縣界一百三十里南至太平縣界三十里北至青陽縣界十五里東南至太平縣界三十里西南至徽州府祁門縣界一百三十里東北至青陽縣界十五里西北至青陽縣界八十里漢置陵陽縣屬丹陽郡後漢因之晉初改屬宣城郡咸康四年改曰廣陽宋齊以後因之隋平陳廢入涇縣唐永泰二年割秋浦青陽涇三縣地置石埭縣屬池州五代宋因之元屬池州路明屬池州府本朝因之按元和志云割秋浦青陽涇三縣池置石埭縣而舊唐書地理志云割秋浦浮梁黟三縣地置新唐書地理志云析青陽秋浦二縣地置今從元和志者據隋書志云涇有蓋山陵陽山今蓋山陵陽山皆在石埭縣境內則石埭之兼有涇地可知建德縣在府西南一百八十里東西距八十里南北距一百六十里東至貴池縣界六十里西至東流縣界二十里南至江西饒州府鄱陽縣界一百二十里北至東流縣界四十里東南至饒州府浮梁縣界九十里西南至江西九江府彭澤縣界六十里東北至東流縣界三十里西北至東流縣界四十里漢石城縣地唐初為秋浦縣地至德二載始分置至德縣屬江州乾元元年改屬饒州永泰元年始屬池州五代楊吳順義初改曰建德宋因之元屬池州路明屬池州府本朝因之東流縣在府西少南一百八十里東西距一百十里南北距一百二十里東至貴池縣界七十里西至安慶府望江縣界四十里南至江西九江府彭澤縣界八十里北至安慶府懷寧縣界四十里東南至建德縣界二十里西南至彭澤縣界四十里東北至懷寧縣界八十里西北至安慶府潛山縣界二百里漢豫章郡彭澤縣地梁置晉陽和成二縣屬太原郡隋平陳仍廢入彭澤唐會昌初置東流場於和城舊縣五代南唐保大十一年升為東流縣屬江州宋太平興國三年改屬池州元屬池州路明屬池州府本朝因之形勢依貴池之美據石城之固唐裴度池州廳壁記浸以秋浦鎮以齊山南唐徐鉉天慶觀記俯瞰大江仰倚崇嶠宋李虛己記清溪南來九華東引洪流環繞沃野彌望宋盛約中和堂記江山千里襟帶六朝宋曾會池州門樓記風俗井邑平曠風土清和宋李虛己記民淳氣和衆貨畢集雖人物稠多而有訟不嚚雖租賦浩穰而聞令必集盛約中和堂記城池池州府城周七里三百三十六步門七明正德中仍舊址築本朝康熙十年重建通逺門大觀樓乾隆二十九年重修貴池縣附郭青陽縣城周四里二百二十四步門四水門二明嘉靖中創築本朝乾隆二十九年修銅陵縣城周三里三百四十步門四明萬厯中創築本朝順治二年修乾隆二十九年重修石埭縣城周三里前後濵溪門五水門一宋立土城明嘉靖中甃以甎本朝雍正十年修乾隆二十九年重修建德縣城周五里南憑河北倚山門四明嘉靖中創築本朝順治六年重建東流縣城周三里半門五明萬厯元年創築本朝順治六年修乾隆二十八年重修學校池州府學在府治西北舊在城東南隅明隆慶中遷建本朝順治七年康熙十六年雍正四年乾隆四十年屢修八學額數二十五名貴池縣學在縣治東舊在縣治西南明宏治十三年遷於此本朝順治康熙雍正乾隆間屢修入學額數二十名青陽縣學在縣治東南宋隆興二年建元大德中遷縣西明洪武初還故址本朝順治康熙雍正乾隆間屢修入學額數二十名銅陵縣學在縣治東宋淳熙中建明正德時遷縣西嘉靖十七年還故址後燬本朝順治間重建康熙十年乾隆十三年屢修入學額數十六名石埭縣學在縣西門外舊在縣南門外明嘉靖十六年遷建本朝順治康熙間屢修乾隆二十年重修入學額數十六名建德縣學在縣治西北明初因宋故址建崇禎四年遷西門外本朝康熙元年復還故址四十八年乾隆四十一年重修入學額數二十名東流縣學在縣治東明洪武初建成化中移建縣治東北後燬本朝順治間重建康熙六十一年始遷今所入學額數十六名池陽書院在府學西南本常平倉址本朝康熙二十年知府喻成龍創建集六縣諸生肄業其中講誦極盛齊山書院在貴池縣南五里壽字崖下平塢中元設山長貢奎嘗為之陽明書院在青陽縣九華山化城寺右明嘉靖初縣令祝增為王守仁建紫陽書院在銅陵縣城西祀朱子紫潭書院在石埭縣西九十里紫潭上明成化中縣人吳必顯建費宏為記廣陽書院在石埭縣西舒溪之濵本名陵陽書院本朝乾隆三十八年重建易今名五經書院在建德縣東南玉峯山阿蘭臺書院在建德縣北三里天然書院在東流縣祝家磯回龍山本朝乾隆十年建戶口原額人丁三萬七千八十四今滋生男婦二百七十五萬四千六百二十二名口田賦田地七千一百三十四頃九十三畝有奇額徵地丁銀九萬二千一百五十兩四錢一分一釐雜項銀七百十四兩三錢三分二釐米五萬一千九百九石四升五合豆七千八百一石二斗五升六合八勺山川碧山在貴池縣東十里瀕湖蒼崖翠巘倒影沈碧又東五里曰江通山相傳上有泉與江通故名鐵劵山在貴池縣東六十里相傳黃巢就降受劵於此按唐書巢曾詣天平軍乞降無於此受劵事俗傳妄也黃老山在貴池縣東南二十五里唐時康軿隱居於此渚湖山在貴池縣東南四十里絶頂有田淵泉旁出澄浤如練蒹葭魚鷺若渚湖然其田歲不憂旱五山在貴池縣東南六十里孤峯獨出其下散為五支聨絡相屬巍然為羣峯長齊山在貴池縣南三里唐社牧有九日齊山登高詩寰宇記山在縣東南六里有齊山祠上有九頂山洞秋浦新志有十餘峯其高齊等故名周二十里泉大小九十一亭臺二十餘其西有湖曰齊山湖中有小山曰珠兒山一名石洲按方輿勝覽謂山因唐刺史齊映得名本於吳中復詩周必大記考映傳未嘗刺池州世系表有齊照為池州蓋因之而訛也太朴山在貴池縣南二十里盤亘三十里許山腰深邃其半有西峯禪堂堂下有龍池萬羅山在貴池縣南二十里以圎峯孤突羣山羅列而名上有邏人石李白詩邏人橫鳥道江祖出魚梁即此相近曰六峯山大樓山在貴池縣南四十里孤撑碧落若空中樓閣然又東數里曰古仙山有古仙洞七井山在貴池縣南八十里石埭縣西七十里延袤數十里上列七峯湧泉七穴四時多寒小黃山在貴池縣南九十里高一百餘丈唐李白有贈黃山胡公詩按舊志貴池有兩黃山考吳非九華發源黃山辨曰九華西南支出為小黃山九十里至郡城則小黃山與黃山實為兩山今據補入石門山在貴池縣南九十里上有青尖唐高霽隱居之地有春臺巖桃花塢李白與霽同遊處盧子庫山在貴池縣南九十里上有伏龍巖相近有魁山江祖山在貴池縣西南二十五里有一石突然出水際其高數丈上有仙人迹名曰江祖石其下有江祖潭大雄山在貴池縣西南三十里一名感鐘山羣峯排戟雄峙一隅白面山在貴池縣西南六十里雪崖拱北如傅粉然烏石山在貴池縣西南七十里元和志烏石山在秋浦縣西百四十里廣德初為賊陳莊方清所據郎山在貴池縣西南七十里下有玉鏡潭水經注貴長池水出縣南郎山又相近有姥山一曰母山有宋陶亮寨址秀山在貴池縣西南八十里寰宇記貴池水源出秀山府志重嶂如屏煙蘿延蔓石埭縣櫟山水經此滙為蒼隼潭穿山在貴池縣西南九十里有穿山洞相近曰雙溪山城山有二一在貴池縣西南一百里明初羅友賢寨址在焉一立西南僅通一在銅陵縣東四十徑宛如城門其上里四圍石壁峭平坦約數十畝又有井雖旱不竭遇隂晦輒雲氣湧出昔人恃以避冦謂之寨城魚載山在貴池縣西南一百里石壁斷崖三級每級寒潭淵徹湧泉飛瀑中有石如魚一名鯉魚山相近者曰西巖山周數十里黃山在貴池縣西南接徽州府祁門縣界有三十六峯其最高者曰古牛岡縣境諸山無高於此有水曰大剡溪亦曰大演直下高田至香口相近曰靈山黃山之支也上有田百畝水泉四時不竭古源山在貴池縣西南一百二十里一名源頭山有恭川水出此專景山在貴池縣西二十五里俗名磚井山圭峯山在貴池縣西二十五里瀕後湖城子山寰宇記城山在貴池縣西七十五里其山周回如城府志城子山在府西七十里即古石城縣治一在青陽縣南五里與舊臨城相對故名一在石埭縣西九十里環繞如城前有紫潭石橋山在貴池縣西九十里西峯山之東兩峯對峙一石橫其上廣數丈袤十丈天然成橋橋下有泉水奔流入穿山洞而出百牙山在貴池縣北半里許府冶主山也東麓旋繞曲水曰落篷灣相傳貨船湊集牙行百輩登隴