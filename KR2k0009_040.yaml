之伊蘇岱爾舊作也速答兒今改正周應極鄱陽人至大中同知池州案牘無留滯散羡賦還民姦吏為之縮手徐泰亨至順二年青陽縣尹青陽舊有荒田千四百頃民輸其租泰亨募人墾闢其纍始除鄰縣銅陵人爭魚池三十年不決就讞於泰亨數語立剖上官凝邵武人至正中為銅陵尉秩滿去有十數叟送之饋藥數器至前路發視之皆白金也追召其人語之曰吾奉法循理非私汝也詎義始而以私終乎李宗可蘄州人至正中為池州路判官陳友諒陷安慶余闕死宗可謂其妻曰余相公死國吾亦義不屈汝等母為賊所辱遂拔劍無大小盡殺之自刎死明夏霖洪武初知建德縣時方兵燹後學宫盡燬霖即宋學舊址創建焉他政事俱忠而能力監察御史劉天錫廉其實名其堂曰忠勤並記之孟常鄱陽人洪武末知建德縣邑多逋租為撙節區畫以償又力請於朝得減賦額萬數翟溥福東莞人永樂初知青陽縣有惠愛近九華山虎恆為患溥福齋戒移檄山神虎即殄黃金蘭永豐人永樂中任貴池典史理繁劇有敏斷才洪熙間擢貴池知縣洞悉民間利病為次第興除之民親之如父母前後凡十八年商賓洛陽人洪熙初謫知銅陵縣邑有荒田不為民業者賓請聽民開墾既熟而後賦之獲允自此增額田以數千計秩滿百姓赴闕請留厯三考皆以最聞王政易州人成化中知青陽縣四鄰多盜為嚴緝捕民賴以安大葺學校制祭器購書籍邑東五阡墟多水溢為建橋三座以濟行者祁司員山陰人宏治中知池州府吏氏畏懷百廢具舉錢瓚斳縣人宏治中知青陽縣庭無姦吏獄無繫囚士農各安其業會遷秩老幼遮道攀號不忍其去何紹正淳安人正德中知池州府築銅陵五十餘墟以備旱潦宸濠反攻安慶池人震恐紹正誓士民登陴固守事定遷秩去池人為立祠與宋包拯並祀詹萊常山人嘉靖中池州同知有幹略大盜章九五等嘯聚江中劫掠為害萊以計擒之池賴以安茅坤歸安人嘉靖中知青陽縣按豪強姦黠者置重法民用怗然劉孜江夏人嘉靖中知銅陵縣時景王就國道江上供億浩繁孜經理夫役每裁抑之民以不擾田登年忠州人嘉靖中知青陽縣有幹略時創築縣城登年令民照丁田自購甎石一月工具至今賴之陳萬言南海人嘉靖中池州推官有風采景王之國閹寺驛騷萬言每裁抑之署銅陵尤多惠政葉明元同安人萬厯初知石埭縣為民省浮費清滯獄請上官裁減差役以節夫馬民為建祠王頤沔陽人萬厯中以給事中出為知府公餘不休私署於堂左搆琴鶴堂寢處其內嘗為里甲除公費之項人佐副使繕城堞築十柳隄卒無以為殯士民泣賻之徐一科弋陽人萬厯中知銅陵縣歲大水諸墟盡潰乃創築都埂長八十餘里以時疏濬水道民德之名曰徐公隄王家柱江陵人崇禎中知青陽縣不務催科民賦自辦調知貴池連值水旱日講荒政以食飢者江北寇警修葺城堞訓士儲糧以艱去邑人立祠祀之王化澄金溪人崇禎中知青陽縣時軍需孔亟上官嚴檄催徵化澄於正供外悉汰羡餘勸民輸納上不誤餉下不纍民以最報葉幹金華人崇禎間知石埭縣左良玉以舟師東下江上騷然幹親率涇縣太平青陽石埭四縣鄉兵扼龍口以備不虞四縣賴之胡鯤化鹿邑人崇禎間知銅陵縣時沿江戒嚴過兵索餉鯤化以身當之遂不敢縱及左夢庚兵水陸並至親冒矢石城破被害死同時有程九萬者以府知事署知東流縣夢庚兵至城下乘城守禦猝遇亂兵死本朝馬宏良昌平人順治中知池州府存撫備至復學校勸耕桑並約東守兵使不為民擾調知嶽州池人泣送數百里蔣應仔山陰人順治二年知銅陵縣時方被兵城郭俱毁應仔隨方修築招集散亡流民復業梁應元遼東人順治六年知池州府首葺學宫以次修舉廢墜遷大名道去民為立祠顏敏宛平人順治十一年知池州府時有兵馬使命之役絡繹過郡每多不輯敏以法繩之民賴以安嶽申沔縣人康熙中知貴池縣敝衣疏食一介不取嘗公出署中絶糧以德化民訟獄漸少卒於官不能殮同官葬之姚子莊歸善人康熙中知石埭縣首條錢糧六弊六法行之編里甲均徭役置義孰十二所以訓民人咸德之李燦奉天人康熙中知池州府飭六邑減耗羡嚴保甲倡修府學又築貴池黃屯阪埂開銅陵洋山磯路重建城南濟川橋城東回瀾書院趙衍金華人康熙癸丑進士知貴池縣邑多積逋行為按戶清注俾以實田辦實賦宿弊頓除城中舊多火患為作水德亭於城東此後大患遂息裘君弼新建人康熙進士知建德縣八年清儉明決聽斷民神建書院修橋梁禁溺女贖鬻子貧不能嫁娶者捐俸助之以卓異內擢刑科給事中吳節民溫陵人雍正間知池州府勤恤民隱嘗築金斗墟於三台墩至今利之李祖謨南豐人乾隆五十三年知貴池縣懲猾役嚴緝捕在任二載編戶晏安尤愛養士後以緝匪殉難人物唐胡楚賓秋浦人厯右丞屬文敏甚必酒中然後下筆高宗命作文常以金銀杯㪺酒飲之文成輒賜焉與元萬頃等同召入禁中選列女傳等書朝廷有疑議表疏皆密使參決性重慎未嘗語禁中事人及其醉問之亦孰視不答尋兼崇賢直學士卒高霽秋浦人隱居石門山桃花塢李白嘗遊其地與同遊眺作九華聯句費冠卿青陽人元和進士聞母病革馳歸而母已葬遂廬墓終喪隱於少微峯下御史李行修舉其節孝拜右拾遺歎曰得祿養親耳親喪何以祿為再詔不起康軿秋浦人乾符中登第有文名著劇談録行世張祐家南陵鄉稱才子一時賢俊多與之遊客遊潤州遂僑寓焉著詩三卷顧雲池州人虞部郎中為淮南從事所著有顧氏編遺苕川總載纂新文苑等集張喬秋浦人咸通中寓居長安試月中桂詩京兆解試首薦大順初登進士會黃巢兵起遂棲隱九華山不出有集二卷何澄粹池州人親病澄粹割股肉進親疾為瘳後親殁以毁卒當時號青陽孝子士為作誄甚衆周繇至德人咸通進士僕射王徽稱其孝友可以表俗奏為全德令與弟繁俱以奏賦得名時稱至德二周姚顯義安人乾符中黃巢祀潼關顯拒戰被害頭已斷猶䇿馬歸營而殞僖宗嘉其忠立廟祀之杜荀鶴石埭人景福進士官學士以詩名五代殷文圭秋浦人居九華山苦學硯為之穿登乾寧間進士後歸江南仕吳為翰林學士子崇義幼潁敏嘗夢飛星墜水盤中吞之文思日進仕南唐入宋改姓名湯悅嘗奉敕撰江南録又同修太平御覽等書宋樊知古其先京兆人父潛任石埭縣令因家池州知古本名若冰嘗舉進士不第遂謀北歸乃漁釣采石江上數月載絲繩維南岸疾棹抵北岸以度江之廣狹開寶中詣闕上書言江南可取狀太祖遣郭守濬等率丁匠營之三日橋成不差尺寸金陵平擢拜侍御史厯知均州卒按曾鞏隆平集太祖嘗問若冰名何典記對曰臣慕唐右丞倪若冰太祖惡其音近弱兵命改名知古然唐右丞相乃倪若水非若冰也夏中正貴池人嘗知本縣以鄉黨非刑威所宜施每面訓誨人皆悅服纍遷職方員外郎李植建德人熙寧進士元祐間為尚書度支郎與司馬光吕公著諸人善哲宗初蔡卞用事斥為黨人罷之方綱青陽人八世同爨家屬八百口每旦鳴鼓會食嘗出稻五千賑貸貧民景德中詔旌其門天僖中韓億安撫江南請蠲其户雜科從之曹緯貴池人以文名元祐間與劉燾崔執柔劉正夫號四傑官翰林學士所著有秋浦集湯允恭貴池人宣和進士判常州鄰州有叛卒轉掠城邑將及境允恭單騎詣賊營曉以禍福寇即解去纍擢兵部侍郎高允文貴池人清流主簿會里人張連忤蔡京卒於客邸京欲檢視允文力為保免京謂曰君高節尚義當加旌賞授定邊軍教授實黜之也湯巖起貴池人知營道縣以廉稱嘗自朂曰清而死豈不愈於濁而生耶秩滿奉祠還里所著有論語義十卷詩集五十卷葉楠貴池人為鄱陽尉值歲潦楠力請蠲祖恤之後為績溪令多惠政邑人為之歌曰前有蘇黃門後有葉令君蘇黃門者轍也所著有知非集精金訓鑑童蒙記檀固建德人熙寧進士紹聖初極言朝廷罷吕大防蘇轍范純仁用章惇曾布蔡卞之失書奏報罷胡舜元銅陵人嘉祐進士厯遷著作郎新法行以書詆王安石致仕舜元素與安石友善人服其不阿葉諒建德人開僖中金兵分道南侵諒集義兵拒之中流矢卒事聞贈武經大夫程端中頤之子南渡後徙家貴池知六安軍當金兵南攻端中竭力守禦城陷死之程九萬青陽人淳熙進士知武康縣有善政厯司農簿太府丞充兩淮鐵錢使改鑄鐵具有規畫尋擢待制安撫襄陽齊天覺青陽人家貧好讀書倦則隱兒而卧三十年未嘗就寢經史子集靡不淹貫舉於州授溫州天富知監秩滿遷知襄陽宜城二縣改奉議郎贑州僉判陳敏石埭人父皓建炎末以破贑賊功至承信郎紹興末金主亮來攻敏説成閔曰金精騎在淮汴必無守備若由陳蔡搗大梁此救江淮之䇿也不聽後守高郵城楚州北使遇者觀其雉堞堅新號鐵鑄城丁黼石埭人淳熙進士厯官成都制置使為政寬大蜀人德之嘉熙中元兵趨成都黼率兵夜出城南迎戰至石筍街力戰死事聞詔立廟祀之華嶽貴池人為武學生上書請誅韓伌胄下大理貶建安圜土中郡守傳伯成憐之命獄卒使出入無繫托胄誅放還復入學登第為殿前司官屬謀去丞相史彌遠杖死東市鄭舜臣建德人紹定中江西寇猖獗趙范知池州聞舜臣名牒充民兵副將防守江淮又嘗董軍饋輸財用朝命褒之江應洪青陽人有器識慶元進士知德安府決數十年疑獄以剸劇稱擢淮東提刑兼知楊州元兵太至多方禦之力屈死蘇劉義貴池人景定中以鄂州戰守及城鄂常澧州功賜緡錢知吉州軍事元兵至臯亭山劉義與張世傑等扶益廣二王出嘉會門渡浙江去崖山敗續世傑劉義等以三十餘艘乘潮而遁劉義至海洋為其下所殺元李鵬飛池州人生母姚氏為嫡母不容改嫁為朱氏妻鵬飛不知也年十九思慕哀痛誓學醫以濟人願早見母行求三歲至羅田縣得焉時朱氏家方疫鵬飛起之遂迎還奉養久之復歸朱氏時渡江省覲既卒歲時攜子孫同往祭墓以終其身馮勉建德人幼有文筆天厯中對䇿清廟瑟賦為時所傳至順中登進士第授韶州路僉判著有土苴集明錢清青陽人元末集義旅衛鄉邑民多賴之常遇春遣趙忠下青陽清率衆來歸擢萊州衛指揮使吳元年調征張士誠戰死黃觀貴池人洪武中會試廷試皆第一授修撰纍遷禮部右侍郎建文初更官制遷禮部侍中與方孝孺等並親用燕王舉兵觀奉詔募兵至安慶燕王已入京觀聞投江死本朝乾隆四十一年賜諡忠節陳敬宗貴池人洪武進士建文立為刑科給事中永樂初有詔授敬宗官敬宗上書請成祖退位詔收之腰斬於市鄭景曜名拱南以字行建德人永樂進士授江西道御史按遼東有元時故吏儲欽等為姦利有司不敢問景曜假微行縛治之民以安尋擢貴州左參政湖廣筸子坪苗亂命監總兵官蕭授進兵剿堵苗平晉階中大夫以年七十致仕歸事母極孝善兄弟白首無間言胡本惠銅陵人永樂舉人以户部員外出為南昌知府有善政纍遷右副都御史巡撫遼東涖軍持重著聲績柯暹建德人幼穎異能文章永樂中以舉人預修永樂大典為解縉胡若思所賞識尋選入翰林中會試乙榜入內閣預機宜文字擢戶科給事中疏陳時政忤尚書李慶出知歡州未至復有譖之者追還繫獄三載宣德時以楊士竒等薦特擢浙江按察使母憂歸廬於墓側有雞互哺雛冬竹茁笋之異著有東岡集檀凱建德人幼貧好學永樂舉人預修永樂大典尋成進士觀政都察院命與御史一體僉事慮因為一時異數尋授思州府通判秩滿當遷思民相率走京師請留凱乃加正五品俸還任宣德中擢應天府治中思民涕泣送之凱素廉潔以應天府丞致仕孫仁貴池人敦孝友親疾每禱天願以身代景泰中進七纍官陜西右參政有惠政晉右副都御史巡撫四川平松潘黑虎寨賊以户部左侍郎致仕所著有東山奏議東山稿檀觀東流人宣德中以貢授永川令以廉靜稱當遷民詣闕請留滿九載以治行最擢雲南按察司僉事不赴歸囊止一石人號之曰清白石張廷瑞貴池人天順初任江西龍泉知縣以清惠稱滿九載擢南御史清理屯田籍中人侵占田畝還之軍致仕歸貧無以自給龍泉人多遺以金卻之縣人為立卻金亭張輝石埭人宏治進士纍擢福建按察使僉事以介直忤劉瑾勒令休致瑾敗朝士交薦之以年老不出進一階李嘉祥貴池人宏治進士授北直開州知州剔姦袪弊動中機宜州城北舊有淫祠嘉祥毁之巫風遂絶擢南户部郎中督賦蘇州性慷慨喜論事嘗具疏語侵權宦人尤壯之桂鏊貴池人以文名正德中授江西廣信府同知時宸濠蓄逆謀結山中三巨寇為支黨巡撫孫燧檄鏊以次剿平之嘉靖中尚書王守仁總督兩廣諸軍平思州斷藤峽鏊與軍事論功擢思恩府知府致仕歸粵人祀守仁以鏊配焉汪珊貴池人正德進士授監察御史時林有年以諫迎活佛送詔獄珊申救之嘉靖初疏陳十漸奏上不報出為河南副使纍遷右副都御史復以言事落職會貴州凱口賊作亂廷推起珊往平之復原官晉南户部侍郎柯相貴池人正德進士知江西永新縣宸濠反南昌巡撫王守仁舉兵討賊相集其縣民兵從躬自居守宸濠平守仁以首功六級與相辭不受後擢南吏科給事中劾去官邪數輩奏裁內府暨諸司庫藏以巨萬計纍升右副都御史巡撫陜西築皋蘭邊牆三百里改督兩廣不赴歸所著有奏議公移諸稿李嵩祥貴池人正德進士厯河南布政司參政上黨青陽山賊作亂以嵩祥有辦賊才調總四道兵入山討賊平之議析壺關等縣地置平順縣以扼山之要害得旨允行遷四川布政使世廟多營建蜀民困採木之役嵩祥抗疏止之因忤用事者致仕歸陳應期青陽人嘉靖中任廣西永寧州知州為政廉恕勸化鄰州羣猺清各衛屯田却千金饋以論薦加一級乞歸李一元建德人嘉靖進士厯官兵部右侍郎巡撫江西引疾歸一元所厯皆著勞績而廉潔自持却一切問遺饋贐嘉隆間在朝有四君子一元以清得與胡大武貴池人嘉靖中貢入太學聞母瞽馳歸朝夕不離母側者八年母目復明人以為至孝所感後為永定知縣踰年歸施宗誼青陽人嘉靖中任廣西梧州府同知有劇賊張廉等劫掠為民害宗誼討平之梧人立祠以祀所著有五經類語諸書章時鸞青陽人嘉靖中授鄒縣知縣勸課農桑邑大治時河決病漕時鸞請於河道尚書朱衡開南陽新河果底績纍擢河南副使時鸞性行醇篤居官不以家纍自隨每去官襆被蕭然有古循吏風施堯臣青陽公嘉靖進士授蕭山知縣時浙有倭寇蕭山故無城堯臣為創築之城甫完而寇大至邑賴以不陷纍擢順天府尹致仕畢鏘石埭人嘉靖進士纍官應天府尹海瑞廉其治行與相善厯南京戶部尚書因風霾陳九事厯指庫帑侵漁軍匠冗食之弊忤近習意不行遂乞歸卒諡恭介佘毅中銅陵人萬厯進士授工部都水司主事治泉南旺為通月河治汶築洸濟以裨運道總河潘季馴以最聞適黃淮失故道漕河中阻勢漸迫泗州晉毅中署郎中事駐中河理徐邳一路毅中承季馴指畫塞崔鎮決口築隄一萬二千丈有竒河工成詔以京堂用而毅中竟以瘁卒於河贈太僕卿劉光謨貴池人萬厯中以處州府通判署青田縣事多惠政民無逋賦治造漕艘於杭州計材程工遍恤軍匠人咸德之桂應蟾石埭人萬厯中衡州府推官治獄詳慎修葺湘江中鼓山書院集諸生以課致仕歸結廬先墓旁隱迹十五年以終王一楨青陽人萬厯進士授鄒縣知縣課民農桑設官莊百餘所以處民之無恆業者歲大祲安集流移賑恤備至厯官湖廣布政使禦苗靖盜以勞卒官吳一元青陽人萬厯中任江西星子縣知縣中人李道以監稅至江西過江擾甚一元力與之抗道怒誣以阻撓國稅逮下刑部獄星子民哀號詣闕為一元申辨得釋天啓中贈尚寶少卿鄭三俊建德人萬厯進士持身峻潔天啓中纍官至户部侍郎極陳魏忠賢客氏之罪奏行足儲數事及趙南星等罷官三俊遂乞歸崇禎元年起南京户部尚書兼掌吏部明年京察魏黨澄汰一空考績入都留為刑部尚書進吏部罷歸章一恆貴池人少孤奉母以考萬厯間族人誣其兄殺人獄雖白仍擬遣戌一恆詣有司請代行有司義而許之數歲遇赦還友愛彌篤居里中力行善事鄰家失火延其居忽雷雨反風滅火人以為孝友所感李可受青陽人自幼勵志節崇禎中授陜西澄城縣主簿時流賊攻劫可受佐其令以死守或勸其棄城走可受曰位雖卑死吾分也走將奚之城陷不屈死事聞加贈恤蘇瓊石埭人任四川瀘州知州時流寇張獻忠寇蜀屢犯瀘瓊守禦甚固後以力屈被執大罵不屈死妻舒氏亦自裁事聞贈太僕寺卿妻贈淑人四十一年本朝乾隆賜諡忠烈佘銅陵人任湖廣隨州州判署州事會流寇突至破州城索印不與罵賊死本朝乾隆四十八年賜諡節愍湯文瓊石埭人性至孝父母殁廬墓終喪讀書曉大義以貧走京師時流寇日熾文瓊以布衣憤切時事並疏陳備禦之䇿不報及聞賊陷京師乃大書報國二字於館壁又書位無文丞相之位心有文丞相之心二語自經死福王時以給事中熊汝霖疏奏贈中書舍人本朝乾隆四十一年敕賜入祠陳公誥貴池人幼工文崇禎十七年五月聞變自經死本朝乾隆四十一年敕賜入祠吳應箕貴池人與同邑劉城齊名並負用世才博覽羣書應箕北遊汶潁南渡吳越所至戶外屨恆滿寓金陵督師侯恂辟為監紀不就阮大鋮居南京倡流言鼓煽人心應箕為南都防亂公揭討之南都不守竟慷慨就死本朝乾隆四十一年賜諡忠節城崇禎中膺薦不就著嶧桐全集古今名賢年譜等書吳大榴吳世煜俱青陽人大榴父喪力不克葬厝淺土萬厯時山溪驟漲大榴捍父棺隨漂去至死棺鐶猶在手世煜父大揩福王時左兵肆掠獲大楷將殺之世煜請以身代乃釋大楷而脅世煜徇富家不從遂遇害兩孝子祔祀家祠標其主曰孝烈馬應魁貴池人初為小將史可法拔為副總兵每戰披白甲大書盡忠報國四字於背大兵南下應魁從帥援可法於高郵戰死本朝乾隆四十一年賜諡烈愍又同縣人總兵曹大鎬總兵汪思誠俱福王時殉節本朝乾隆四十一年賜大鎬諡忠節思誠諡節愍桂有煃石埭人以歲貢授江西撫州府學訓導大兵入撫州有煃自縊死又池州諸生吳稚明亦福王時聞節本朝乾隆四十一年大兵南下殉敕賜入祠本朝曹誠青陽人以貢厯寧州知州勤於其職康熙三年土司昌言作亂寇寧州誠盡力守禦城陷被害蘇汝霖石埭人順治壬辰進士授寧波府推官長於聽斷時大兵征舟山有轉餉功厯遷廣西提學僉事康熙十三年叛帥孫延齡據桂林脅汝霖索印峻拒之懷印走赴廣督軍前兼蒼梧道隨署廣西布政使以瘁卒官方祥美貴池人性孝友有幼弟為母所鍾愛喜依之居每膳祥美輒負其母來食巳仍負之返積十數載以為常後其弟坐盜誣繫獄祥美盡鬻已産雪之陳萬升貴池人與弟嘉蔭從弟萬鵾同就外傅康熙巳酉盜掠近村嘉蔭萬鵾𬒳執萬升請代死盜並殺之章世德貴池人康熙壬戌進士知南平縣縣素苦里長當役世德至即除其纍值編審悉豁虛丁百姓德之縣治及城外浮橋皆世德所修造卒官喪車還日縣民號哭遠送吳襄青陽人為諸生負盛名聖祖仁皇帝南巡召試入髙等纂修厯代詩餘康熙癸巳成進士厯官禮部尚書供奉內廷襄持身端謹督學順天陳奏滏水事宜及民間利弊俱見采納工詩文學行為時所重卒諡文簡子慶禖康熙庚子舉人工書畫尤精于醫兆雯雍正甲辰進士官編修直史館勤於其職後以病歸郎思誠貴池人幼孤事母孝嘗刲股療母疾母卒啜粥廬墓其地多虎自廬墓後虎遂絶迹郡守顏敏欲舉思誠純孝以老疾辭雍正五年旌王懿修青陽人乾隆丙戌進士授編修入直上書房洊擢少詹事五十四年以病乞假回籍嘉慶元年高宗純皇帝舉十叟晏懿修與焉七年病痊補通政使司副使尋擢侍郎左都御史官至禮部尚書提督廣西湖北順天三省學政充經筵講官上書房總師傅加太子少保銜十八年致仕懿修學問優長持躬端謹供職數十年厯受兩朝知遇年八十一卒賜祭葬諡文僖浦寶光東流人乾隆三十九年援例授湖北宣恩縣乾壩司巡檢署利川縣丞因邪匪滋擾殺賊陳亡蒙恩賜恤給雲騎尉世職入祀昭忠祠流寓漢高獲字敬公新息人少遊學京師與光武有舊三公爭辟不應太守鮑昱每行縣輒式其閭獲遂遠遁江南卒於石城石城人思之共為立祠唐李白字太白隴西人天寶中供奉翰林放還浮遊四方嘗由金陵上秋浦更名九子山為九華遍遊青溪白笴桃湖陂玉鏡潭江祖石大樓山苦竹嶺黃山桃花塢五松陵陽之勝輒留題咏池人於所遊厯處立祠祀之李昭象字化文池州刺史方元子方元罷池州遂留家秋浦黃巢兵起昭象入九華結屋碧雲峯下龍紀中屢召不赴羅隱字昭諫餘杭人父則為池州鐵官隱遂家於梅根浦上及去池有憶九華諸詩許棠字文化宣州人以詩名與張喬俞垣之輩號咸通十哲仕涇縣尉退隱九華五代宋齊邱字子嵩豫章人楊吳徐知誥當國將以為相齊邱避居九華山知誥遣其子景通親詣山中起為中書侍郎及南唐保大元年罷為浙西節度使遂歸九華舊隱賜號曰九華先生山中徵賢寺機謀山沉機石皆隱居故迹宋范仲淹蘇州人生二歲而孤隨其後母謝鞠於朱文瀚家讀書長山土人因號所居長山曰范塘其讀書處曰讀山滕宗諒字子京河南人以左司諫屢貶池州榷酤嘗愛池之九華於是葬其親於山之金雞原築書堂為終隱計沈遼字睿達錢塘人熙寧中忤王安石流永州更赦徙池州見九華喜曰使吾自擇不過爾耳即築室於齊山之上名曰雲巢孔武仲字常父新喻人坐元祐黨奪職居池州曹清寧晉人天聖中謫知彭澤縣過貴池愛東源山水遂棄官築室於其地陳邦光政和間為太子詹事以忤蔡京安置池州朱夢説宣和間布衣也上書論宦寺權太重詔編管池州列女三國吳孝娥大帝時其父為池州鐵官鐵入冶不鎔法當死娥憂之遽躍入冶骨化鐵遂鎔浮其履爐面時人號曰聖姑立廟以祀唐桂金叉石埭人父盛築七里􅮥路禦黃巢巢寇里中女被獲欲汚之女紿賊出户投井死里人號其井曰金叉井春秋祀之宋黃奉先貴池人父官大尉陷西涼女年十八憫其父陷賊挺身入西涼挾之返朝命進其父秩並加賚焉元寧天驥妻胡氏青陽人夫死舅姑欲嫁之不可守節六十年殁朝命旌之明黃觀妻翁氏貴池人建文末觀奉詔出募兵翁及二女在京邸成祖起兵至京城命收觀妻女給配象奴翁乘間攜二女並家屬十餘人投通濟門橋下死方投水時嘔血石上成小影沃之以水影愈明後移至黃觀祠名翁夫人血影石章佳英貴池人幼孤依兄嫂兄以逋賦竄死遺孤在抱佳英令其嫂攜之匿外族終身不字陰護其姪長致家政焉桂智妻李氏石埭人夫亡子幼舅姑欲嫁之乃斷髮截耳守節不渝成化中旌表朱彥明妻唐氏貴池人有富商見其色悅之賂其姑姑誨婦淫弗聽痛杖之繼以炮烙體無完膚終不從乃以不孝訟於官受刑楚毒或詰其實曰全吾名而汚吾姑不孝也乘夜自經其家梅樹下楊慎有傳嘉靖初祀忠烈祠相延薌妻黃氏建德人年二十二夫亡無子毁容截髮守節終身宏治中旌表康清姑貴池人年十七父老兄病正德中流賊劉七等掠江上執父刃其背血流及踵清姑泣請釋父願以身從