緣為姦夔龍力行一條鞭法聽民自輸未嘗以符伇勾攝民皆爭先輸納尋擢御史民立祠祀之李紹箕雲南人萬厯中知平江縣愛民如子三年獄無繫囚張明儒冮陰人萬厯中知臨湘縣建義倉廣社學蠲除逋賦後令眉州張大齡亦務德化遇旱禱雨立至人稱為前張後張云孫春芳揭陽人萬厯間知華容縣值歲歉春芳請罷征斂復請移旁郡粟親厯窮鄉散之旋調去百姓惜焉蔣元敬無錫人萬厯中為平江令作敬事堂以聽政教民表德定賦圴徭息訟獄捐義冢比代士民歌思之李雲階閩人萬厯中知華容縣大修隄防宏奬士類購書儲之學宮歲飢賑活無算陶宗孔全州人崇禎中任嶽州府推官九年狷介廉正始終如一日郡人祀之四賢祠稱五賢林不息莆田人崇禎末知臨湘縣張獻忠陷城𬒳執索印不肯與遂遇害楊如雲紹興人崇禎間平江主薄張獻忠陷城欲授以偽職如雲不從罵不絶口賊怒投之石壁潭本朝王國英奉天人康熙中知巴陵縣瀕湖多水災國英以時賑濟清理墾荒豁無著田千七百餘頃歲減糧萬三千石伍士琪阿迷州人知平江縣縣多逋賦士琪寬與之期使民感愧自輸平訟牒必俟兩造意解乃止甚得民心建倉汨水之涯人民成聚曰伍公市以趙申喬薦擢知桂陽州平江民祠祀之王國祐奉天人康熙中知華容縣縣利病以時條陳上官諸垸潰請修復日履工所教役者歌以忘勞犒之餅餌隄成士民為建碑蘭第錫吉州人乾隆中知嶽州府屏供帳罷燕會躬行節儉苞苴不敢至其門宗霈會稽人嘉慶中知華容縣禁械鬬斥淫祠設五田渡船築萬庾諸垸以便民力行保甲大吏檄他邑以為法捐置沱江書院膏火田士皆感勵人物唐裴隱臨湘人居白馬磯與李白相友善官侍御挂冠歸與岫道人鼓琴自娛李白亦嘗至其處相與倡和宴遊宋黃誥平江人神宗初進士授長沙簿章惇開梅山請增畝稅誥力請罷之後知益陽縣中使採木至益陽遣二卒勾典押而無引牒誥杖而遣之丁父憂廬墓三年芝生墓前凡六十餘本哲宗時賜帛五十匹官至太府卿李黻臨湘人博學通經性至孝葺養浩園隱居不仕自號默堂居士授徒數百人晚年尤精內典著詩文五千篇名兌齋編李璠平江人朱子帥長沙璠往受業李祀平江人從朱子遊輯池州語録李儒用平江人長於春秋朱子帥長沙時與邑人吳雄同受業於門往復辨難今語類中多其問答學者稱練溪先生吳雄平江人居臨安師朱子深明性命之學歸建陽坪書院日講學於其中平江之知學者皆雄教之學者稱陽坪先生毛友誠平江人聞康叔臨得伊洛之傳避地嶽陽因徙家巴陵往從之時李璠分教嶽陽極為敬禮學者稱竹簡先生方暹平江人李璠弟子與饒伯輿張元蕑同門相善元簡極重暹嘗遺書曰伯輿明理而達於事明甫見事而中於理吾以斯道望伯輿以斯世望明甫學者稱連雲先生許炳平江人嘉定進士通春秋好學不倦篤志力行及卒無以為殮魯仕能平江人淳祐進士厯官監利令從饒魯學終身不見喜愠之色歸講道寶潭時稱寶潭先生萬鎮平江人學於方暹饒魯與魯仕能齊名饒魯謂仕能曰天下讀書者伯易第一子靜次之子靜鎮之字伯易鄱陽人亦魯弟子也鄒輗平江人朱子帥長沙道出平江以書謁者甚衆輗獨見禮甘貧悅道力學不事生産其卒也方輗為之棺殮方輗平江人受業李璠與饒伯輿友善安貧樂道前後徴聘皆不赴魏了翁題其所居曰學齋方興臨湘人宋亡與張世傑文天祥共圖恢復以功加招討使死崖山之難徐偉臨湘人宋末舉孝廉事母至孝有司纍辟不赴去之野潭山中隱居教授依以居者三百餘家歲荒貧不舉子者悉資給之人感其惠子多以徐為名有子八人後皆知名時號徐氏八龍嚴珽華容人纍官劒南節度使僚宷服其能兵民懷其惠文章政事咸著於時元張琦臨湘人生二歲母劉遭亂陷於兵父必達不復娶琦稍長思其母輒歔欷泣下及冠請於父往求其母遍厯湖南北淮東西後求得之貴池迎歸奉養其後十餘年父母相繼歿終喪猶蔬食事聞旌其門曰孝義胡天遊平江人博學高志元季隱居不仕養晦巖谷著有傲軒吟稿明蕭授華容人以千户從成祖起兵積功至都督僉事永樂中充總兵官鎮守湖廣貴州在鎮二十餘年討平苗蠻數十部威信大行進左都督卒贈臨武伯諡靖襄方廷玉巴陵人父必夀洪武進士厯官按察使以政績著廷玉永樂進士改庶吉士遷工部郎中時燕京創造上莭儉休養二疏擢浙江右布政使致仕楊溥稱其質實而文和易有守魏文昌華容人事親至孝洪武時父獲罪繫武昌獄文昌詣闕上疏願以身代報可臨刑謂其弟曰謹事二親如吾生存時也遂伏法時年十有八劉仁宅華容人永樂舉人知瑞昌縣蠲赤湖課二萬緡免沿江之逋米十餘萬減民稅之耗於巨室者數千石晉廣西按察副使景泰中思明都指揮黃􅎫殺其兄珊仁宅廉得狀􅎫懼使人奉十金為夀且擁兵數萬相挾制仁宅至南寧􅎫子來謁伏甲縛之論􅎫死􅎫陰遣人京師營幹得釋罪既益橫乃捃托他事中仁宅仁宅委政去歸裝惟七金楊榮過其家見牀上只蒲席布被喜曰所操若是可稱真御史矣以子大夏貴贈兵部尚書李嶲華容人宣德中由鄉貢厯官彰德知府趙王每出郭禱祀遊獵數百里嶲上疏言之上遣內使逮治并賜敕褒奬解綬歸卜居黃湖山足迹不入城中鄧廷瓚巴陵人景泰進士知淳安縣有惠政遷太僕丞擢知貴州程番府政令平和民苗感悅宏冶初纍遷右副都御史巡撫貴州有平苗功進右都御史掌南院尋提督兩廣軍務兼巡撫亦有聲績復召掌南院廷瓚有雅量世稱長者其所設施動中機宜屢督軍務出必成功卒贈太子少保諡襄敏董廷圭華容人景泰進士拜監察御史守白羊口劾守帥橫暴者清軍河南檢出逋伍五萬人又疏陳弭災十事升山東副使清理滯獄廉正持躬家無長物黎淳華容人天順初進士第一官至南京禮部尚書為人捐介寡合鮮所依附敦倫紀崇節儉其所樹立即幽隱無愧有門生知華亭遺以紅雲布淳郤之題其緘曰古之為令植桑拔麻今之為令織布添花人服其操卒諡文僖劉大夏仁宅子天順進士纍轉兵部職方司郎中時汪直開邊欲乘間取安南憲宗命索永樂討安南故牘大夏亟匿之事得寢宏治初為兵部尚書孝宗方鋭意太平屢被宣召大夏忠誠懇篤忘身徇國所陳時政立兄施行羣小深嫉之武宗立數上章不用遂乞歸劉瑾用事逮下詔獄戊肅州瑾誅復官大夏常曰居官以正己為先不獨當戒利亦當遠名朝鮮安南使至輒問劉尚書安否其為外邦所重如此卒贈太保諡忠宣楊一清本雲南安寧人父景從家巴陵成化進士厯山西提學副使轉督陜學凡八年宏治中擢左副都御史督山西馬政十七年河套告急尚書劉大夏薦一清撫陜經略防禦劍紅古等城以捍之一清有謀善斷所居之處時演習營陳安化王置鐇反拜陜西總制與太監張永共出師置鐇就擒與永計誅劉瑾入內閣加少傅尋致仕遂依婦家居鎮江久之世宗嗣位詔以故相行邊後復入閣上方勵精圖治中外事一咨委焉八年請老賜金帛明年削籍卒諡文襄贈太保王儼華容人成化進士授工部主事統理呂梁洪鑿石開渠便舟楫徙居民瀕河者數百家升四川成都知府治行為天下第一厯官陜西右布政寇逼西固城儼督餉區畫旬日得芻粟九十餘萬擢戶部右侍郎攝太倉事革中官常例錢崇王訟民田又請黃河退灘及凝陵免稅地上命儼往核田當為民者咸歸之復疏河灘實民産免稅非祖訓不可許皆如其議轉左侍郎核外戚侵民官地數萬畝奏戍其監奴於邊武宗即位儼上疏乞致仕得歸居無何劉瑾亂政捕繫詔獄鍛鍊無所得矯詔謫遼東戍瑾誅赦還嚴永濬華容人成化進士授户部主事督餉宣大陜西大飢奏蠲稅四十萬接濟邊儲全活數萬人擢郎中出守西安府以禮化導俗漸循謹文案立剖庭無宿牃先是西安歲織絨服進用中官橫取百姓苦之永濬疏論其害不報擢浙江參政卒胥文相巴陵人宏治進士知漳浦縣蝗螟為災禱之越境去歲更稔又疏罷銀坑之稅纍遷南戶部郎中厯汀州柳州知府多政續子焯官鄱陽知縣有惠政工詩文黃昭道平江人宏治進士知長山縣歲蝗禱於神雨雹立作蝗盡死遷南京御史正德中論劉瑾廷杖除名瑾誅擢江西僉事宸濠招亡命劫彭蠡諸處昭道捕獲數百人訊治如法旋遷雲南參政諭曉緬甸諸蠻咸懼修貢分守普安討賊有功遷布政使顏頤夀巴陵人宏治進士授寶蚳令改淇縣拜監察御史宸濠謀不軌副使胡永清發其姦上命崔元偕頤夀往勘會師事平遷刑部侍郎進禮部尚書改户部尋遷左都御史掌刑部隆慶初加太子太保白起旦華容人由貢生知雞澤縣有廉幹名興起文學濬開井渠民賴焉比入覲坐卧一牛車不宿旅舍夜大雪盈車中晨起敝簏短衾皆沾溼起旦無忤色孫繼芳華容人正德進士授刑部主事東廠獲數人誣為盜下刑部論法繼芳白其冤改兵部員外武宗將南巡繼芳偕武選郎黃鞏率諸部寺屬百餘人諫止捕繫廷杖武庫郎陸震笞死繼芳裏瘡力治震喪官終雲南提學副使子宜為文千言立就舉於鄉以父喪哭泣損目遂不復會試自號洞庭漁人構亭著書興至把筆書所為詩奇逸飛動所著詩三四百卷宜子斯億七歲能賦詩年十四為諸生事祖母及母以孝聞以著述自任隱元石山中誅茅蔬食充然自得學使董其昌稱之曰德􅚘如太邱豪俠如朱遊云蕭一中華容人正德進士知新城縣擢監察御史疏援馬録逮繫詔獄謫廣西按察使照磨遷分宜知縣忤大學士嚴嵩幾罹禍遷東昌同知厯南刑部郎中復以在新城時劾夏良勝火禮疏草再貶饒州府通判後厯官石副都御史巡撫四川周廷用華容人正德進士知宜黃縣拜監察御史倜儻豪岸言事多觸時忌未一載備兵四川進江西按察使請囑不行入覲汪鋐摘黜之著有八崖集傅尚文華容人正德進士任大理評事武宗南巡與同舍郎上疏諫浦繫錦衣獄跪午門廷杖左遷户部照磨嘉靖初還舊職纍遷江西副使方鈍巴陵人正德進士由華亭令纍官户部尚書時邊費浩繁苦心節濟在部六年題疏數十萬言嚴嵩中之詔改南乞歸卒贈太子少保諡簡肅薑廷頤巴陵人嘉靖進士知餘干縣擢御史按通州京師告警與都御史王杼乘城三日疏七上遷淮揚兵備副使是時江北取民無制廷頤行一條鞭法遂為善政纍官兵部侍郎謝登之巴陵人嘉靖進士纍官工部尚書立朝清介自持同列咸憚之艾穆平江人嘉靖舉人纍遷刑部主事録囚陜西時政尚嚴苛詔決不如額者罪穆據爰書情確者決二人張居正奪情穆與主事沈思孝抗疏極論忤旨廷杖遣戍久之起員外郎纍進僉都御史巡撫四川有平寇功薑性廷頤子萬厯進士厯刑科給事中居諫垣兩歲前後疏凡百八上皆切中時弊又請於清泥灣水次置倉廒免湖南歲兌武昌蘄州漕費鄉里稱便唐世柱巴陵人少孤事母至孝萬厯舉人知濟寧州歲旱步禱雨立降增先賢仲氏祭田振興名教官終戶部負外郎蕭露豐臨湘人張獻忠陷城與妻沈氏奉父母走避其父為賊所執露豐挺身救父賊釋其父而執之沈氏聞夫𬒳執亦奔救俱為賊所害劉希文華容人天啓中以貢生授興文教諭流賊陷城人不勝病因詣縣官白其事謂此皆湖岸荒餘十常八九浸於水宜凖湖湘下地倒畝糧一升縣官知召華素長者以其言申報華容人至今蒙其利許伯泰巴陵諸生康熙中父聖行客長沙病疫伯泰奔侍湯藥嘗糞以驗瘥劇父少愈母復病疫於家伯泰兼程馳歸值水漲溺死是夜其母猶夢伯泰以藥飲之乾隆四年旌何一獻臨湘人乾隆中由貢生知黔江縣時土寇初平戶口