body:
  text: 為長沙郡地漢屬長沙國後漢屬長沙郡三國屬吳晉始置巴陵縣屬長沙郡宋元嘉十六年分長沙置巴陵郡屬湘州尋屬郢州齊因之梁兼置巴州隋平陳郡廢改巴州曰嶽州大業初又改羅州尋曰巴陵郡唐武德四年復置巴州六年仍曰嶽州天寶元年改為巴陵郡乾元元年復曰嶽州屬江南西道五代屬楚後屬周行逢宋曰嶽州巴陵郡嶽陽軍宋史地理志宣和元年賜軍額屬荆湖北路紹興二十五年改曰純州華容軍三十一年復故元至元十二年為嶽州路屬湖廣行省明洪武二年改為嶽州府九年降為州十四年復為府隸湖廣布政使司明統志嶽州府領州一縣七巴陵縣臨湘縣華容縣平江縣澧州石門縣慈利縣安鄉縣本朝因之康熙三年屬湖南省治雍正七年升澧州為直隸州領縣四巴陵縣附郭東西距二百五十里南北距一百五十里東至湖北武昌府通城縣界一百四十五里西至華容縣界一百二十里南至長沙府湘陰縣界一百二十里北至湖北荆州府監利縣界三十里東南至平江縣治二百四十里西南至湘陰縣治二百四十里東北至臨湘縣治七十里西北至監利縣治一百五十里古麇子國漢長沙郡下雋縣地晉太康元年置巴陵縣仍屬長沙郡南北朝宋元嘉十六年為巴陵郡治齊因之梁為巴州治隋為巴陵郡治唐為嶽州治宋因之元為嶽州路治明洪武九年省入州十四年復置為嶽州府治本朝因之臨湘縣在府東北九十里東西距一百二十五里南北距一百五十里東至湖北武昌府蒲圻縣界九十里西至湖北荆州府監利縣界二十五里南至巴陵縣界六十五里北至武昌府嘉魚縣界七十里東南至武昌府通城縣界一百二十里西南至巴陵縣治七十里東北至嘉魚縣界七十里西北至監利縣界十五里漢下雋縣地晉以後為巴陵縣地五代唐清泰中馬氏於此置王朝場宋淳化五年升為王朝縣屬嶽州至道二年改臨湘縣元屬嶽州路明屬嶽州府本朝因之華容縣在府西一百八十里東西距一百里南北距一百三十里東至巴陵縣界四十五里西至澧州安鄉縣界六十里南至常德府沅江縣界九十里北至湖北荆州府石首縣界四十里東南至已陵縣治一百六十里西南至常德府龍陽縣界一百六十里東北至荆州府監利縣治一百二十里西北至荆州府公安縣治一百八十里古雲夢地漢孱陵縣地屬武陵郡三國吳置南安縣屬南平郡南北朝宋曰安南齊因之梁置南安湘郡尋廢隋開皇十八年改縣曰華容屬巴陵郡大業初屬羅州尋屬巴陵郡唐屬嶽州垂拱二年更名容城神龍元年復曰華容宋至和元年徙治屬嶽州元屬嶽州路明屬嶽州府本朝因之平江縣在府東南二百四十里東西距二百四十里南北距一百四十里東至江西南昌府義寧州界一百一十里西至長沙府湘陰縣界一百二十里南至長沙府瀏陽縣界六十里北至巴陵縣界七十里東南至江西義寧州界一百里西南至長沙府瀏陽縣界一百九十里東北至湖北武昌府通城縣治一百六十里西北至巴陵縣治二百四十里古羅子國漢長沙郡羅縣地後漢末分置漢昌縣三國吳改吳昌縣仍屬長沙郡晉及宋齊因之梁屬嶽陽郡隋開皇九年省入羅縣唐武德八年又省羅縣入湘隂神龍三年復分湘隂置昌江縣屬嶽州五代唐改曰平江宋因之屬嶽州元元貞初升為平江州屬嶽州路明洪武初復為縣屬嶽州府本朝因之形勢左洞庭右彭蠡史記吳起傳兼有江湖之勝馬子嚴嶽陽志北通巫峽南極瀟湘宋范仲淹嶽陽樓記重山復水視他區為勝元張崇德修華容城記風俗刀耕火種網罟為業郎蔚之圖經人性悍直士習禮義俗尚朴不事華麗明統志士知義而好文俗信巫而尚鬼府志城池嶽州府城周七里門四三面有濠西濱大湖宋元嘉中因吳舊址築唐天寶中重築明洪武中又加拓築本朝康熙五十一年修乾隆五年二十九年重修巴陵縣附郭臨湘縣城周五里門四明成化十一年築本朝康熙二十四年雍正二年屢修華容縣城周三里有奇門四明成化十三年因舊址築二十年覆以甎本朝康熙初年修乾隆二十五年重修平江縣城周五里有奇門四明成化八年築本朝康熙七年修學校嶽州府學在府治東南宋治平中建胡寅為之記本朝順治中修熊伯龍有記康熙乾隆中重修入學額數十五名巴陵縣學在縣治西南明洪武中建本朝康熙雍正中屢修乾隆十年十八年三十三年重修內有五賢堂宋建祀宋儒周子二程子張子朱子入學額數二十名臨湘縣學在縣治西南明洪武中建本朝康熙中屢修乾隆三年重修入學額數十五名華容縣學在縣治北明洪武四年建本朝康熙雍正中屢修乾隆十二年重修入學額數二十名平江縣學在縣治東百步宋紹興中建本朝康熙雍正乾隆中屢修嘉慶十五年重修入學額數十二名天嶽書院在府治東宋建嶽陽書院在府治東南本朝康熙五十九年建湘湄書院在臨湘縣南門外本朝乾隆五年因人文書院舊地建易今名龍峯書院在華容縣東十五里明黎淳劉大夏讀書處沱江書院在華容縣學北本朝乾隆二十五年建昌江書院在平江縣城西五龍山舊名天嶽書院在小天嶽峯康熙五十九年建乾隆十一年遷建城東四十年改遷城西嘉慶九年遷建今所易今名陽坪書院在平江縣東鳳棲鄉宋邑人吳雄從朱子遊建此講學戶口原百額人七十丁九萬九千六千四百九十一百九十七今名滋生男口計二婦共一十九萬四千七百千六百六三户嶽十二名州衛屯口計八戶男千八婦共六百六十萬八八户田賦田七地山塘二萬二釐額徵地丁正千雜三十銀八七頃萬三九十千八一畝八分百六十二兩九二錢三升三合分三釐南糧二萬二零漕糧二千八百八千一十石百九三十斗五九石升四合又嶽州衛屯一釐額徵銀三田五百一十一千二百四十九頃一兩一十八錢九畝分二分一釐山川巴邱山在府城內西書禹貢過九南江隅亦至於名巴東陵陵又名天嶽蔡傳曰東陵巴陵也水經湘水右岸元湘水又北至巴和志昔羿屠巴邱蛇山入於於洞庭江注山在其骨若陵故曰肅以已陵府志三國吳魯萬人屯巴邱即此青岡山在四巴陵縣東十五里千聚山在亘巴陵縣數十里東百衆山里蟠拱聚福聖山在巴百十陵縣東一里一名福聖臺松柏暢茂宋元時兵過伐其木斧斤不能入人以為神異相思山在巴陵縣東一百三十里上有仙人搗藥池及四面石相近有風雨山雲起輒有風雨白鶴山在巴陵縣東南方輿勝覽巴陵縣白鶴山山南有兩池有吕翁仙迹又有紫荆臺江叟吹鐵苗響震林谷有兩女子出授神藥方輿紀要山在城南二里與巴邱相峙舊志山在縣東南三里又二里為九龜山九山相連形如龜濱洞庭以形似名黃茅山在巴陵縣東南三十里盤亘數里壁立干霄五龍山在已陵縣東南五十里亦名烏石山嶽陽風土記云溪下有石如墨可愈喉疾亦可代墨作書下有石墨溪南流入遊港黃龍山在已陵縣東南一百五十里接平江縣界上産藥草旱可禱雨金鶚山在巴陵縣南二里相傳有異鳥飛集於山其色如金九馬嘴山在巴陵縣南四十里有九峯出湖上舟行甚險鹿角山在巳陵縣南五十里洞庭湖濱明成化中置哨於此石城山在巴陵縣南六十里亦名石磯山宋楊么嘗結寨其上艑山在巴陵縣南水經注洞庭湖中有艑山多箎竹嶽陽風土記湘人以吳船為艑山形類之故名上有啞女塔舊傳有商女祟病至此忽能言指其山可置塔其家為之置塔因以名焉上有神人迹其下有龍窟君山之東艑山之西名黃石灣有石伏江中舟人危之甑篳山在已陵縣西南七里濱洞庭以形似名君山在巴陵縣西南洞庭湖中一名湘山亦稱洞庭山方輿紀要山方六十里狀如十二螺髻道書君山第十一福地史記黃帝南至於江登熊湘即湘山也山海經洞庭之山帝之二女居之史記秦始皇二十八年浮江至湘山祠逢大風問湘君何神博士曰聞之堯女舜之妻葬此始皇大怒使刑徒三千人伐湘山樹赭其山水經注洞庭湖中有君山山有石穴漝通吳之包山郭景純所謂巴陵地道者也是山湘君之所遊處故曰君山漢武帝登之射蛟於是山山東北對艑山兩山相次去數十里回峙相望孤影若浮元和志君山在巴陵縣西三十里府志君山上有酒香山即漢武求仙酒處嶽陽風土記庾穆之湘州記云君山上有美酒數斗得飲之即不死為神仙寺僧云春時往往聞酒香尋之莫知其處又君山後有響沙躡足聽之有聲樊駝山在巴陵縣西北一百二十里接華容縣界有泉可雩雷轟山在巴陵縣北三里楓橋湖畔相傳為吳孫權祖鍾葬處七里山在已陵縣北七里故名宋嶽飛討楊么屯兵於此九峯山在巴陵縣東北一百里東接大雲山勢甚高聳有九峯並峙可南望洞庭湖大雲山在已陵縣東少北一百五十里高亘數百丈連接七十餘峯上有雞子石高四百丈周圍險峻惟一面可登頂上有井明末民多保此其北接臨湘縣界黃皋山在臨湘縣東十五里峯巒聳拔林木蔥蒨一名黃岡山又應科山在山東五里黃岡之支屬也金雞山在臨湘縣東三十里其山盤礴峻麗中有洞穴深邃相傳有金雞出入其中又南有一石狀如鷹俗呼為鷹石金竹山在臨湘縣東三十里上有小竹枝幹純黃遇冬愈鮮潤色黃類金相傳神人所種石珠山在臨湘縣東四十里一名石龜山相近有道觀山兩山勢甚峻拔草木蓊翳樓閣山在臨湘縣東七十里羣峯疊出秀拔如樓閣登眺可盡洞庭諸景上有神祠旱禱多應藥姑山在臨湘縣東九十里最高峻雲幕其巔則雨天井山在臨湘縣東一百二十里接巴陵縣界旋風山在臨湘縣東南九十里髙峻多林木風至此則旋轉相近有尖山一峯特出上有石洞龍窖山在臨湘縣東南輿地紀勝引嶽陽志云其山峻極上有雷洞石門洞山猺居之府志在縣東南百里為邑鎮山跨通城崇陽蒲圻三縣界上有龍湫魚梁山在臨湘縣南一里山下有湖産魚特美石灰山在臨湘縣南二十里山石黑可以燒灰望城山在臨湘縣南四十里登之可望郡城下有泉溉田千頃鳯凰山在臨湘縣南六十里高秀盤礴亦名太微宫山寡姑山在臨湘縣南八十里髙峻侵雲響山在臨湘縣南九十里四山環聳有響則應又十里有龍潭山崖壁嶄絶有龍潛焉漿山在臨湘縣南一百里響山東上有泉旱可溉田俗呼為漿水下流為黃荆港萬峯山在臨湘縣南一百十里峯巒層疊其最高者俗名雷打尖象骨山在臨湘縣西南三十里嶽陽風土記山海經云巴蛇吞象暴其骨於此象骨港出其下團山在臨湘縣西南三十五里瀕江山下舊有鼉嗚驛今沒水中冬春猶倣佛可見天螺山在臨湘縣北二里如山在臨湘縣東北八里水經注江水自彭城磯東徑如山北即此元子山在臨湘縣東北十五里楊圻湖之下口東山在華容縣東十里明統志峯巒秀麗連亘百餘里古松夾道驛路經其中縣志有白竹圻在縣東南二十里其北為東山茂林修竹多故家居址舊志有石伏山在縣東七里多巨石一名石佛山又龍峯山在縣東十里二峯卓立最秀有竹圻山在縣東二十里有徑通墨山統名曰東山云黃湖山在華容縣東三十里下臨華容河産蕨薇多雉兔其上隆然一峯曰章華臺相屬者為小爾山墨山在華容縣東四十五里接巴陵縣界嶽陽風土記墨山謂之元石山楚辭曰驅豫車兮元石步豫馬於洞庭桃花山在華容縣東五十里縣志山延袤數十里甚高峻有水碓可造紙産蘭茝杜蘅等藥草又五里有石龍山山有獅子崖水簾洞石門山在華容縣東南三十里亦名仙廬山甚幽邃傍有七女峯最高層山在華容縣東南四十里屹峙水中非舟莫能至鼓