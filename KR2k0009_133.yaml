front:
  text: 大清一統志嶽州府在湖南省治東北三百里東西距三百八十里南北距一百五十里東至湖北武昌府通城縣界一百四十里西至澧州安鄉縣界一百八十里南至長沙府瀏陽縣界二百九十里北至湖北荆州府監利縣界三十里東南至江西南昌府義寧州界三百六十里西南至常德府龍陽縣界三百十五里東北至湖北嘉魚縣界二百一十里西北至湖北石首縣界二百里自府治至京師三千二百八十五里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州之域為三苗國地通典今長沙衡陽皆古三苗國地春秋時屬楚亦為麇羅二國地戰國為楚秦
