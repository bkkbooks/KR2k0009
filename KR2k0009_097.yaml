body:
  text: 鄯善鎮孝昌二年改置鄯州見元和志後周又置樂都郡隋開皇初郡廢大業初復改州曰西平郡唐武德二年復曰鄯州儀鳳二年置都督府開元二年置隴右節度使方鎮表作五年蘇冕唐會要作元年今從通鑑天寶初曰西平郡乾元初復曰鄯州屬隴右道上元二年沒於吐蕃宋元符二年收復復置鄯州隴右節度三年棄之崇寧三年收復建隴右都護府改鄯州為西寧州賜郡名曰西平升中都督府三年加賓德軍節度屬熙河路後屬西夏元仍曰西寧州屬甘肅行省明洪武六年通志作十九年今從實録改置西寧衛屬陜西行都司本朝初因之雍正二年改置西寧府屬甘肅省置西寧縣為府治改碾伯千户所為碾伯縣又開置大通衛乾隆二十六年改置大通縣屬西寧府西寧縣附郭東西距一百六十里南北距二百九十八里東至碾伯縣界七十里西至青海番夷界九十里南至黃河二百一十八里北至大通縣界八十里東南至南山後番界二百四十里西南至番夷界二百三十里東北至番夷界一百二十里西北至大通縣界八十里漢金城郡臨羌縣地後漢建安中分置西都縣為西平郡治晉因之後魏廢隋為湟水縣地唐儀鳳三年分置鄯城縣屬鄯州上元後沒吐蕃宋初曰青唐城崇寧三年收復置西寧州及倚郭縣五年罷縣屬熙河路元屬甘肅行省明初改置西寧衛屬陜西行都司本朝雍正二年改置西寧縣為西寧府治碾伯縣在里府治南北東一距五百百三五十十里里東東西距至涼一州百府七平十番五縣界州一府百河三州十三里百西九至十西里寧縣北至界番四夷十五界一里百南六至十蘭里東界南八至十河里州黃河東北至界番三百界一七百十五里十西南里西至北西至寧縣番界一漢百因七之十晉里省漢神為安爵二夷縣年地置破東晉羌末縣後屬金梁吕城光郡置後樂都置郡南西都涼縣秃為髮鄯烏孤州治都隋此開後魏初皇十八郡廢孝昌年改曰湟中水改為西號平邈郡治川城唐元為符鄯州二年治收上復元置後湟隨州州建沒中吐靖蕃宋國元初年棄之三年崇加寧嚮二德年軍又復節度三宣年和置倚元年郭縣改曰五樂年州罷大屬熙觀河路後碾伯屬西衛後夏元廢成廢化為中西置寧碾州伯地守明禦洪千武户十所一年本置朝初屬改置西碾寧衛雍正伯縣屬西二年寧府大通縣在里府北東西一百距一二百十八十里二十南北里西距一百至黑林五口十暗五里門六東十至西里南寧至縣西界一寧縣百界三十里北至大雪山一百二十五里東南至西寧縣界九十里西南至西寧縣界七十里東北至大雪山二百二十里西北至甘州府張掖縣界三百九十里古西羌所居漢為臨羌縣北塞唐為鄯州北境開元中嘗置威戎軍於此明為西番地本朝雍正二年以番族歸附開置大通衛駐大通城屬西寧府又設總兵鎮守亦曰西大通鎮乾隆九年移駐白塔城二十六年改置大通縣屬西寧府形勢萬山環抱三峽重圍紅崖峙其左青海瀦其右明統志甘肅涼莊之右背河州洮岷之前户萬山回合諸番羅列明鄭洛奏疏水包西北山阻東南衛志風俗俗崇釋士業儒人專孳牧童習彎弧明石檟西平賦夏秋少暑冬春多寒毳毛為衣酥湩煎茶番人以皮馬為禮畜牧為業舊鎮志城池西寧府城周八里有奇門四濠深一丈廣二丈五尺東關外有郭周里許門三明洪武十九年因舊改築本朝康熙四十八年修雍正十一年乾隆三十一年重修西寧縣附郭碾伯縣城即舊碾伯堡明初築周三里有奇門三濠廣二丈五尺本朝乾隆二十九年因舊址復築大通縣城周五百五十八丈門二本朝雍正三年築乾隆三十一年修學校西寧府學在府治東即西寧衛學明宣德三年建入學額數十二名本朝乾隆六十年添設又貴德廳學入學額數四名西寧縣學在縣治西本朝乾隆二十六年建入學額數八名碾伯縣學在縣治西本朝雍正三年建入學額數八名大通縣學在縣治東本朝乾隆二十六年建入學額數四名約禮書院在西寧縣治西本朝乾隆四年建樂都書院在碾伯縣本朝乾隆二十四年建河陰書院在貴德廳本朝乾隆十二年建户口原額民丁共二萬七千九百二今滋生民丁男婦大小共二十萬八千六百三名口屯丁民婦大小共五十萬二百二十六名口計九萬二千八百五十七户田賦田地共六千一百九十三頃六畝一分有奇番地共十六萬一千三百七十三段額徵糧共三萬八千九十五石四斗七升山川峽口山在西寧縣東二十里漢書神爵元年趙充國屯田金城奏治湟狹以西道橋明統志峽口山在衛城東地極險阻為湟鄯往來咽喉地漢時名湟狹唐人嘗修閣道宋築省章城控制要害又有綏遠關行都司志峽口山在衛東三十里石山對峙亦名小石峽半山有風波巖每大風檮之則息與大石峽西石峽謂之三峽紅崖子山在西寧縣東八十里其土赤因名山腰有石洞積石山在西寧縣東南隋書地理志龍支縣有唐述山元和志積石山在龍支縣西九十八里南與枹罕縣分界舊志小積石山在西寧衛東東南一百七十里即古唐述山也拔延山在西寧縣東南隋書大業五年帝西平大獵於拔延山長圍周亙二十里地理志化隆有拔延山元和志拔延山在化成縣東北七十里多麋鹿舊志即今衛南之雪山也雪山在西寧縣南一百里高出羣山之上積雪四時不消延亙東北與碾伯縣蘿蔔山相接南禪山在西寧縣西南三里崖洞有佛像又有北禪山在縣西北五里土樓山在西寧縣西水經注湟水東徑土樓南樓北倚山原峯高三百尺有若削成樓下有神祠雕牆故壁存焉今在西平亭東北五里隋書地理志湟水有土樓山元和志山在湟水縣西一百三十里下有土樓神祠又曰鄯城縣西即土樓山日月山在西寧縣西川口外元史憲宗四