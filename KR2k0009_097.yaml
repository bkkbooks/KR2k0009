節度使務耕力農聚糧二十萬斛號良將宋陳貫河陽人真宗時知涇州督察盜賊禁戢不肖子弟簿書管庫賦柤出入皆自檢核嘗謂僚曰視縣官物如己物容有姦乎州人憚其嚴王沿館陶人仁宗時為涇原路經略安撫招討使改涇州觀察使元昊入冦副都總管葛懷敏率兵出捍沿教懷敏率兵據瓦亭待之懷敏進兵鎮戎沿以書戒勿入第背城為寨以羸師誘賊賊至發伏擊之可有功懷敏不聽進至定川果敗賊乘勝犯渭州沿率州人乘城多張旗幟為疑兵賊遂引去尹洙河南人仁宗時知涇州又知渭州兼領涇原路經略公事王堯臣虞城人仁宗時再安撫涇原初曹瑋開山外地置籠竿等四寨募弓箭手給田使耕戰自守其後將帥失撫御稍侵奪之衆怨怒遂劫德勝寨將姚貴據城叛堯臣適過境上作書射城中諭以禍福衆遂出降乃為申明約束如舊而去既還因論沿邊城寨控扼要害賊徑通屬及備禦輕重之䇿為五事上之又請涇原五州營田益置弓箭手皆報可蔣偕鄭縣人仁宗時厯知涇州徙原州邊民苦屬户為鈔盜偕得數輩腰斬境上盜為息遷本路鈐轄明珠康奴諸族數為寇偕潛兵伺之斬首四百擒酋豪焚帳落獲馬牛羊千計趙珣歸信人為緣邊巡檢使涇原路招討都監屯涇州兼治籠竿城麻氈黨留百餘帳處近塞為暴珣引兵自靜邊襲擊俘獲數千計瞎氈居龕谷無所屬珣與書招之瞎氈聽命元昊大入府檄珣會葛懷敏於瓦亭珣曰夏恃衆遠鬬鋒鋭盍依馬欄城布柵以扼其路守鎮戎城以便餉道俟其衰擊之否則必為賊所屠懷敏不聽珣戰沒滕宗諒河南人仁宗時知涇州葛懷敏軍敗於定川諸郡震恐宗諒顧城中兵少乃集農民數千戎服乘城又募勇敢諜知寇遠近及其形勢檄報旁郡使為備會范仲淹自環慶引蕃漢兵來援宗諒乃大設牛酒犒師又籍定川戰沒者祭酹之厚撫其孥於是邊民稍安狄青西河人為涇原路副都總管經略招討副使仁宗以青數有戰功欲召見問以方略會賊寇渭州命圖形以進李及之濮州人仁宗時知涇州吏事精明居官稱職王圭開封人為涇州駐泊都監康定𥘉元昊寇鎮戎軍圭將三千騎為先鋒自瓦亭至師子堡敵圍之數重圭奮擊披靡獲首級為多語其下曰兵法以寡擊衆必在暮我兵少乘其暮擊之可得志也復馳入有驍將持槍直圭胸傷右臂圭左手以杵碎其腦繼又一將以槍進圭挾其槍以鞭擊殺之一軍大驚遂引去是歲改涇原路都監明年為本路行營都監尋至黑山焚敵族帳獲首級馬駝甚衆會敵大入以兵五千從任福屯好水川連戰三日福陷圍中圭獨入殺數十百人鞭鐵撓曲手掌盡裂奮擊自若矢中目乃還夜中卒邊人立祠祀之武英太原人仁宗時為涇原行營都監與任福合諸將戰張家堡斬首數十百敵棄牛羊偽遁諸將皆趨利爭進英以為前必有伏衆不聽伏發福等既敗英猶力戰自辰至申矢盡遇害贈邢州觀察使桑懌雍邱人為涇原路兵馬都監屯鎮戎軍與任福遇敵好水川力戰而死贈解州防禦使劉永年并州人仁宗時出知涇州帝賜詩寵之郡兵歲以香藥為折支三司不時輦致振武卒素驕譁通判廳事請以他物代給永年召至庭下數其罪斬為首之人餘不敢動高敏登州人為涇原指揮使數與西夏戰遭重傷范仲淹韓琦皆薦之為閣門祇候和斌鄄城人仁宗時為德順軍指揮使凡五年數捍敵被重創十餘神宗時徙涇原鈐轄渭部飢帥王廣淵命賑給斌擇地營居養視有法所活以萬計安俊太原人仁宗時徙涇原鈐轄條上禦戎十三事遷原州刺史知涇州俊久在邊羌人畏之張守約濮州人主原州截原寨招羌酋水令通等十七族萬一千帳神宗時知涇州涇水善暴地每春必增治隄堰費不資適嵗飢罷其役或曰如水害何守約曰歉歲勞民甚於河害吾且徐圖之河神祠故在南壖禱而遷諸北以殺河怒一夕雷雨明日河徙而南其北遂為沙磧張吉延安人為涇原將解宣威城圍力戰死之劉仲武成紀人熙寧中為涇原將夏人謀犯天聖寨渭帥檄諸將會兵約曰過某日賊不至即去仰武諜得的期乞緩分屯帥不樂但留一將及仲武軍如期而敵至力戰卻之李復圭緱氏人神宗時知涇州始時二稅之入三司移折已重轉運使又覆折之復圭為奏􅊵民立生祠种古洛陽人神宗時知原州羌人犯塞古禦之斬級數百築城鎮戎之北以據要害與弟診破環州折薑會斬首二千級民有損直鬻田於熟羌以避役者古按其狀得良田二千頃丁四千悉刺為民兵姚麟五原人元豐中為涇原副總管夏人修貢且乞蘭會壤土麟言蘭會不可與願戒將帥飭邊備示進討之形以絶其望從之督諸將討堪哥平經略使盧秉上其功賜金帛六百王恩開封人哲宗時為涇原將嘗罄軍出萬惠嶺士飢欲食恩倍道兼行衆洶洶已而遇敵數萬引兵先入壁井竈皆具諸將始服羌扣壁願見恩單騎徑出遙與語一夕羌引去遷涇原副都總管城西安築臨羌天都十餘壘羌圍平夏恩設伏敗之徽宗時改知渭州括隱地二萬三千頃分弓箭士耕屯為三十一部以省餽餉朱友恭西安人為涇原第一副將將步兵捍金人於華亭數有功會金兵大集友恭力戰為所得渭帥既降誘以草言許優進官秩不肯從更詆辱之帥不勝忿斷其脛以徇經日乃斬之贈敦武郎金張行信日照人興定二年為彰化軍節度使兼涇州管內觀察使上書論事多採納明徐鏞興國州人成化間以御史謫知鎮原縣歲飢請於上官移民就食全活萬計修倉得錢數十萬緡以賑貧乏蠲宿逋流亡多復業者尋調臨潼鎮原民數千泣送之龎瑜公安人崇禎七年以歲貢生知崇信縣縣故無城會大雨土垣盡圯賊掩至瑜急解邙令家人齎送上官率家丁持梃巷鬬𬒳執不屈大罵而死贈固原知州婁琇湘陰人崇禎中知涇州賊陷城死之贈太僕寺少卿本朝馮明雨鎮原縣典史康熙十四年王輔臣之變城破遇害人物漢李恂臨涇人少習韓詩教授諸生常數百人太守潁川李鴻請署功曹未到州辟為從事會鴻卒恂不應州命而送鴻喪還鄉里後拜侍禦史持節使幽州宣布恩澤所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之拜兗州刺史遷張掖太守徵拜謁者使持節領西域副校尉西域數遺恂奴婢宛馬金銀香罽之屬一無所受北胸奴數斷西域道使命不通恂設購賞遂斬敵世祖覽之歎美召為中書博士錫爵臨涇子遷侍郎與遊雅等改定律制司徒崔浩及當時朝賢並愛重之清貧守道以夀終韓茂安定安武人膂力過人尤善騎射從太武討赫連昌破統萬平平涼又從征蠕蠕録前後功拜散騎常侍殿中尚書進爵安定公文成踐阼拜尚書令加侍中征南大將軍茂沈毅篤實雖無文學每議論合理為將善於撫衆勇冠當世為朝廷所稱子均少善射有將略襲父爵厯定清冀三州刺史甚有譽終定州刺史鄧彥海安定人祖羌苻堅車騎將軍父翼慕容垂趙郡內史彥海性真素言行可復博覽經書長於易筮道武定中原擢為著作郎再遷尚書吏部郎明解制度多識故事與尚書崔宏參定朝儀律令音樂及軍國文記詔策多彥海所為賜爵下博子席法友安定人初仕南齊以膂力自效任安豐新蔡二郡太守後歸魏拜豫州刺史苞信縣伯淮南克定法友有力焉恬靜自安不競世利宣武末除濟州刺史廉和著稱隋牛宏安定鶉觚人性寬𥙿好學博聞開皇初授祕書監宏以典籍遺逸上表請開獻書之路上納之進爵奇章郡公拜禮部尚書奉敕修撰五禮除太常卿詔與姚察許善心何妥虞世基等正定新樂議置明堂宏條上故事上甚重之時楊素恃才矜貴輕侮朝臣見宏未嘗不改容自肅尋拜吏部尚書選舉審愼並多稱職纍進上大將軍右光祿大夫卒諡曰憲宏榮寵當世而車服卑儉事上盡禮待下以仁隋室舊臣始終悔吝不及惟宏一人而已有文集十三卷子方大亦有學業官至內史舍人唐吕向涇州人少隱陸渾山工草隸強志於學開元十年召入翰林兼集賢校理侍太子及諸王為文章時帝歲遣使採擇天下姝好內之後宫向因奏美人賦以諷又獻詩規校獵從帝東巡帝因蕃夷酋長入伏內射禽向又諫正之官至工部侍郎嘗以李善釋文選為繁釀與吕延濟等五人更為詁解時號為五臣注皇甫鏞臨涇人第進士兄鎛為相時任河南少尹見權寵太盛每極言之鎛不悅乃求分司為太子右庶子鎛敗朝廷賢之授國子祭酒開成初以太子少保卒鏞工詩文為人寡言正色衣冠甚偉不屑世務所交皆知名士著書數十篇牛仙客鶉觚人初為縣小史積功纍遷洮州司馬清勤不懈以蕭嵩薦遷太僕少卿開元末為朔方總管嗇事省用倉庫積實遷工部尚書同中書門下三品卒諡貞簡牛僧孺隋奇章宏之裔元和初以賢良方正對策第一穆宗時徙御史中丞按治不法內外澄肅以户部侍郎同中書門下平章事敬宗立封奇章郡公時政出近幸僧孺數表去位授武昌節度使文宗立復相時以議吐蕃維州事僧孺挾素怨沮李德𥙿䇿帝以為不直罷為淮南節度宣宗時終太子少師子蔚第進士由監察御史為右補闕大中初屢條切時政纍官山南西道節度使以尚書右僕射致仕蔚弟叢亦第進士任輔闕數言事稱旨咸通末拜劒南西川節度使僖宗時終吏部尚書牛徽蔚子皋進士纍擢吏部員外郎乾符中選濫吏多姦歲調四千員徽治以剛明柅杜干請法度復振父蔚避地於梁道病徽扶藍輿厯閣路盜擊其首血流面持輿不息徽拜曰人皆有父今親老而疾幸無驚駭盜感之乃止及前谷又逢盜輒相語曰此孝子也共舉輿舍之家進帛裹創以饘飲奉蔚留信宿去拜諫議大夫固辭乞還侍親後為刑部侍郎崔引忌其正換左散常侍以刑部尚書致仕宋胡順之臨涇人登進士第試祕書省校書郎厯知休寧縣青州從事皆有聲仁宗即位遷太常博士天聖明道間再上宰相書乞太后還政纍遷屯田員外郎其後數論朝廷事范仲淹愛其才以目失明廢楊政臨涇人父忠戰沒政甫七歲哀毀如成人建炎間從吳玠擊金兵九戰九捷紹興初大破金兵於箭筈關又從吳玠拒金兵於仙人關入蜀連日百餘戰敵遂遁去授環慶路經略安撫使改經略安撫涇原兼帥環慶利路徙知熙州利州興元金人渝盟政為都統制凡大戰七斬獲甚多纍拜太尉卒諡襄毅政守漢中十八年凡利於民者不敢以軍旅廢故為吳璘禆將及與璘分道建帥執門下之禮益恭世頗賢之明巨敬靈臺人初為御史建文中改户部主事充史官清愼有聲燕王入京不屈死夷其族後諡節愍仇鉞鎮原人襲江都仇理世職為寧夏前衛指揮同知正統中定安化王置鐇之亂擢寧夏總兵官論功封咸寧伯己拜平賊將軍討平劉惠趙鐩等於河南復移師會陸完共滅劉七等於江北進世侯大同有警命充總兵官統京兵禦之卒諡武襄張麟靈臺人以明經授榮河縣丞性恭願動止有則執喪三年未嘗與妻言適邠州遇盜劫所乘騾及行裝其騾弗行麟語盜曰是騾非鞭不行吾尚有鞭以豫汝盜驚曰此必靈臺張古人也遂拜還所劫本朝楊可立靈臺人淹貫羣書殫心理學以明經歲薦授廣文為士林所宗設義田以周窮乏鄉人尤稱之順治十年入祀鄉賢祠張紹敬鎮原人力行善事鎮邑自乾隆五年至十七年厯年民屯積欠紹敬出資代完又捐田八百畝入學宫為寒士讀書之需義重一鄉乾隆四十四年入祀鄉賢祠李必智涇州人養母盡孝及喪哀毁逾節廬墓三載又同州人閭閻城早歲失怙為繼母李氏撫育李偶有小病寢不解衣輒籲天請代歿後亦廬墓三年又崇信縣生員王爾公關巒鎮原縣民張惺貢生張峯事親並以孝聞於乾隆年間先後旌表又涇州人魏興旺鎮原縣捐都司銜慕典貢生張繼孔生員張炳英張漢並以孝聞嘉慶年間旌表列女南北朝魏貞女兕先氏涇州人字彭老生為妻既聘未及成禮兕先氏率行貞淑居貧常自舂汲以養父母老生輒往迫之不肯從老生怒而刺殺之臨死謂老生曰我所以執節自固者正欲奉給君耳今反為君所殺言終而絶老生論死太和七年詔曰女守禮履節沒身不改其標墓旌善號曰貞女宋楊政母涇州人政官涇原母留敵境間遣人省視之母惟勉以忠義和議成始得迎歸詔封其母感義郡夫人明雷氏名秀貞涇州人年十八家貧採蔬於野有惡少方鉏迫而求通女憤以𬞞刀刺之被鉏擊死巡按疏表其門魯氏涇州人嘉靖初西寇劫掠魯氏罵賊死之梁自立妻蒲氏崇信人崇禎末避亂山穴中賊掠得將逼之氏不從遇害其子婦關氏聞寇至方自縊為賊所持罵不絶口賊怒殺之張國珍妻朱氏崇信人國珍為賊所掠三年未還氏茹苦自守姑謀令他適聘已定氏泣曰婦去誰事姑且兒歸奈何不聽遂入室自縊死多氏烈女靈臺人父卒未聘女避寇於隱形山北窰窨內被賊搜獲舁上馬不從躍下者三賊以美言誘之女遮面大罵賊斷其手而殺之又王氏女適隴州民未一月因元夕歸寧被賊掠去女涕泣罵詈且求斃賊感其節烈釋之女歸家以為身雖全手已受辱適夫至佯慰之即自縊死本朝脫海龍妻趙氏鎮原人順治初同夫避賊崖窟夫為賊所殺氏遂投崖死又涇州民婦蘇氏李氏相繼沈河死杜起周妻史氏涇州人夫亡守節織紝自給撫子成立乾隆六年旌又同州節婦喬永泰妻楊氏張玉顯妻史氏常際熙妻史氏王琮妻景氏李秀妻張氏李生文妻牛氏史業久妻景氏薛永喜妻王氏楊成千妻曹氏閭魏生妻李氏生員史惟經妻白氏景爾沼妻李氏生員王希朱妻張氏王玠妻牛氏劉行周妻路氏俱乾隆年間先後旌表史記言妻楊氏王化普妻尚氏均於嘉慶年間旌表關鞏妻馬氏崇信人夫亡守節乾隆六年旌又同縣節婦貴婉成妻關氏杜朝柄妻朱氏朱萼妻關氏田吉祥妻郭氏生員李增長妻關氏生員梁穆康妻李氏黃登彥妻王氏梁居正妻李氏梁元第妻張氏馬廷騏妻白氏劉世昌妻王氏王品之妻張氏俱乾隆年間先後旌表生員梁朝瑜妻朱氏生員王咸順妻李氏梁有常妻黃氏俱嘉慶年間先後旌表于景凱妻高氏靈臺人夫亡守節乾隆六年旌又同縣節婦史養正妻趙氏王子哲妻蔡氏鄧福妻王氏劉育秀妻仇氏田奉祿妻孟氏姚杰妻多氏張大功妻李氏劉自恭妻宋氏劉德燦妻孫氏馬斌妻王氏郭鎮妻張氏王相妻張氏張光書妻孫氏俱乾隆年間先後旌表生員于四知妻苟氏武生劉善繼妻王氏韓朝惠妻王氏生員楊運花妻楊氏王得益妻任氏練起文妻鄭氏俱嘉慶年間先後旌表陳偉經妻朱氏鎮原人夫亡守節乾隆六年旌又同縣節婦沈景泰妻朱氏趙爵妻高氏張思明妻章氏包名世妻賀氏許遂妻路氏劉􅓨妻羅氏賈亦逵妻張氏張柱妻章氏生員張泰吉妻許氏杏杰妻賈氏杏勉妻馬氏生員張文英妻杜氏張榮妻薑氏段峴妻張氏賀理妻張氏張銀妻高氏劉福應妻曹氏張永昌妻席氏段寧正妻張氏李文正妻馬氏張穟妻陳氏趙元妻李氏李萬智妻張氏李國棟妻張氏張庶吉妻杜氏張鐈妻鄭氏張付妻劉氏張夀仁妻馬氏折鳯樓妻段氏焦俊儒妻張氏張紹禮妻常氏張紹章妻趙氏劉自前妻段氏茍遴妻張氏張崇海妻段氏許溥妻脫氏賈師有妻張氏生員張詠妻包氏朱文炳妻常氏廪生秦祿妻劉氏李仲長妻和氏范光芮妻劉氏孫順妻陳氏朱可言妻董氏慕容英妻謝氏段崇妻席氏俱乾隆年間先後旌表段岷妻盧氏劉鑄國妻張氏許恆妻段氏賀體元妻劉氏段碧妻賈氏張穩妻席氏路本清妻張氏慕廷輔妻劉氏焦登甲妻劉氏田步均妻馬氏監生田步正妻路氏張社妻賈氏賀室妻路氏段存科妻賀氏吳宗禮妻段氏張應躔妻許氏武生張啓緒妻章氏李元貞妻盧氏劉懷璽妻張氏張復禮妻劉氏祁學吉妻賈氏張願妻劉氏段凝逺妻張氏焦俊貴妻姚氏張國瑚妻苟氏席大賓妻張氏武生段唐珍妻盧氏黃文舉妻朱氏韓長生妻白氏袁一德妻秦氏謝儒妻段氏劉月桂妻秦氏鄭大魁妻李氏鄭宗叩妻張氏許秉元妻張氏俱嘉慶年間先後旌表仙釋宋朱有涇州人少竄名五符宋元豐初瀘賊犯塞詔起秦卒征之軍次資中郡有醮壇山李阿試仙臺有往來臺上俄二鳥飛鳴爭食墜地若松肪者有取食之即䐜脹且渴求池水飲焉遇一道士指松曰食此葉可療也忽不見有如其言渴遂止自覺心爽神清有始不知書不飲酒至是高吟劇飲脫五符而仙去土産羊馬寰宇記涇州土産羊馬氈涇州出唐書地理志原州貢覆鞍氈寰宇記涇州土産駝毛氈九域志涇州貢紫茸毛麻布鎮原涇州出元和志涇州原州賦麻布龍鬚席涇州出元和志涇州貢唐書地理志涇州原州貢藥寰宇記涇州産秦芄紅花黃蓍原州産白芍明統志崇信出天南星
