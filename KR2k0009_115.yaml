front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_115-1a}
body:
  text: 饒州府二古蹟鄱陽故城在今鄱陽縣東漢縣也後漢書雷義傳注鄱陽縣城在今饒州鄱陽縣東寰宇記故鄱陽縣即吳芮所居之城也在彭蠡湖東鄱水之北舊志鄱陽舊縣在今縣東六十里今名故縣鎮民居稠密按宋書州郡志孫權立鄱陽郡治鄱陽縣赤烏八年徙治呉芮故城據此則漢時所置巳非故地至呉時乃復呉芮之舊隋唐以來不言遷徙可知今縣即吳芮故城元和志云饒州城即呉芮所居是也在東界者蓋漢縣寰宇記謂故城為呉芮城疑誤鄡陽故城在鄱陽縣西北漢置縣屬豫章郡後漢因之三國呉屬鄱陽郡晉因之劉宋省寰宇記廢鄡陽縣在鄱陽縣西北一百二十里按鄱陽記云漢高帝六年置宋永初二年廢廣晉故城在鄱陽縣北三國呉置廣昌縣晉太康元年改曰廣晉移鄱陽郡來治宋因之蕭齊仍移郡治鄱陽以縣屬之梁因之陳時廢唐武徳四年復置屬浩州八年省入鄱陽寰宇記廢廣晉縣在鄱陽縣北一百五十里名勝志在鄱陽縣西北一百八十里今名廣晉鄉有城基按晉初改廣曷爲廣晉非改鄱陽也晉宋齊三志鄱陽廣晉兩縣並見梁書陸襄傳鄱陽郡民鮮于琛殺廣晉令王筠可知此縣在梁時尚存隋志不言蓋陳時廢耳元和志謂晉武帝改鄱陽爲廣晉隋開皇九年改廣晉爲鄱陽與諸史不合明統志又謂宋省亦誤餘汗故城在今餘干縣東北本春秋時越西界干越地漢置爲縣自後因之淮南子秦始皇使尉屠睢爲五軍南征一軍結餘干之水漢書地理志豫章郡餘汗注應劭曰汗音干又嚴助傳淮南王安上書曰越人欲爲變必先由餘干界中元和志饒州餘干縣東至州一百里漢餘汗縣開皇九年去水存干名曰餘干縣志故城在縣東北四都又縣東冕山縣南瓜畬村縣北管櫪市皆有故城按明統志載白雲城在餘干縣治西相傳隋末林士宏所築劉長卿詩孤城上與白雲齊蓋即餘干古城也與縣志不同其遷徙不可考又元和志舊唐書皆謂隋時去水為干而宋書州郡志巳作餘干漢書嚴助傳亦作餘干或傳寫譌也樂平故城在今樂平縣東南唐初以樂安廢縣改置樂平縣在今德興縣界後徙於此元和志饒州樂平縣西至州一百四十里南臨樂安江北接平林因曰樂平縣志故城在今縣東南桐山鄉長樂水口按樂平縣唐時遷於長樂水口不知何時又移今治縣志乃云唐乾符五年為黄寇所毁中和間移今治此臆説也遷治若在唐時寰宇記必詳及之而今不載當是宋後所移又元和志謂後漢靈帝置樂平縣蓋誤以樂安為樂平也新平故城在浮梁縣東北唐武德四年析鄱陽縣置八年省開元四年復改置新昌縣後改名浮梁即今縣也寰宇記廢新平縣在饒州東三百三十里李大亮析鄱陽縣置常季武併入鄱陽浮梁縣志新平故城在今縣北百里化鵬新定二鄉之間按明統志云新平廢縣在浮梁縣東三百二十里唐開元初置誤新昌故城在浮梁縣東南昌江口之左唐開元初置後移今治改名浮梁元和志饒州浮梁縣西南至州二百二十里寰宇記唐武德五年析鄱陽東界置新平縣後廢開元四年改置新昌縣於昌水之北因鄉名焉其年又移在新昌江口西岸正東臨江地當江衝二十四年鄧􅌔為縣令因移於舊城正北一百步縣志新昌故城在縣東南昌江口之左今顯教寺是也又昌江之南有城曰南城唐末黄巢之亂縣令金安嘗徙百姓居此尋復故治樂安故城在徳興縣東三國吳孫權置晉宋齊因之陳廢唐初嘗置樂平縣於此寰宇記後漢樂安縣在銀城今樂平縣東水路三百二十里按輿地志陳天嘉元年廢唐建樂平縣亦在銀城後因歙寇程海亮剽掠兼山勢險峻隴地高下權移常樂水口德興縣志樂安廢縣在今縣東百里樂平鄉按宋志云樂安呉立呉志建安八年使程普討樂安韓當領樂安長其立縣當在是時元和志以為靈帝時置寰宇記引豫章記又云永元中置然郡國志不載難以為據安仁故城在今安仁縣東南寰宇記安仁故城在餘干縣東南一百五十里按鄱陽記晉永嘉七年分餘干置興安縣尋廢陳天嘉中復於興安故地置安仁縣至隋開皇九年併入餘干今故城猶存按九域志開寶八年以餘干縣地置安仁場端拱元年升為縣在饒州南二百里即今縣也陳時安仁縣隋志失載以寰宇記所記道里考之當在今縣之東南玉亭廢縣在餘干縣東南唐武德四年析餘干地置屬饒州七年省入長城八年又省長城入餘干銀城廢縣在徳興縣東陳置隋廢入鄱陽縣明統志在德興縣東一百二十里縣志今名銀冶堡長城廢縣在安仁縣南唐初與玉亭同置尋省名勝志今安仁縣長城鄉是其廢址英布城在鄱陽縣西北一百五十里相傳漢吳芮築以居布又有呉芮觀獵城在鄱陽故城西十八里童敏城在鄱陽縣東北永平關東隋末邑人袁贇率衆避寇保此彭綺城在樂平縣東明統志吳黄武中鄱人彭綺所築舊志今縣東十里翥山麓有綺城遺址一名翥山寨呉闡城在德興縣南七里明統志世傳吳芮嘗馳馬於此又有呉王鑄印堆鳳凰臺走馬隄淬劍池大小花山宋張燾居此石港城在安仁縣東南十里元至正中邑人王溥就所居依山臨溪築城以自固明洪武初歸附置税課局今為石港市荷溪城在萬年縣東北四十里去樂平之仙鶴鎮十里許明正德中因姚源賊起總制秦金築土城移仙鶴巖巡司戍此事平汰巡司其城尚存古武陽亭在鄱陽縣境漢書地理志鄱陽縣武陽郷右十餘里有黄金采史記索隱白沙東南八十里有武陽亭縣志在縣東五十里萬年鄉即今萬年縣治本餘干縣地明正德三年民余乾七等以知縣潘泰為政暴横與其黨入姚源谷中相聚為盜官兵討之累年七年陳金議行招撫割餘干之萬年新政二鄉鄱陽之文南文北二鄉樂平之新進豐樂二鄉貴溪之歸桂鄉置縣鎮之治萬年鄉因以為名永平監在鄱陽縣東元和志饒州永平監置在郭下每嵗鑄錢七千貫九域志在州東四里縣志今為永平關在縣東門外南鄱江北東湖居民繁盛鄧公場今德興縣治寰宇記德興縣在饒州東一百八十里本饒州樂平縣之地有銀山出銀及銅唐總章二年邑人鄧遠上列取銀之利上元二年因置場監令百姓任便採取官司什二税之其場即以鄧公為名隸江西鹽鐵都院至南唐升為德興縣四面皆水金場在徳興縣南二十里宋時冶金處又銀場在縣東六十里唐冶銀處又硃砂硔在縣東三十里高數百仞硔石槎牙罅間產硃今湮没吳芮舊居在浮梁縣東北寰宇記在縣東北六十里鄱陽記云鄱陽源水呉芮所居處鄉人立為祠堂東有石澗深三尺鄉人將牲牢告啟擊鼓三通其水衝出隨用並足輿地紀勝芮宅有馬跡石有龍泉泉出石壁四時不絶漢梅鋗宅亦在其處文翁宅在鄱陽縣東寰宇記在縣東一百五十里基址俱存東帶鄱陽南連溪水西接望夫岡有井清澄隴前栽桐樹洪皓故宅在樂平縣東北洪巖下薛仁輔宅在樂平縣清泰坊明統志宋岳飛獄成大理少卿薛仁輔不署奏牘明飛無罪秦檜怒謫饒州仁輔卜居樂平宅旁有一塘後人因名薛塘饒魯宅在萬年縣東若源村又遷於縣北石子村延賓坊在府城内蕭家港輿地紀勝相傳為陶侃故居侃友范逵嘗過侃倉卒無以為待侃母截髮以易酒肴故名按侃傳呉平徙家尋陽是侃少時巳家尋陽矣又云鄱陽范逵過侃及逵去侃追送百餘里若同在鄱陽何必如此遠送周訪傳訪為尋陽縣功曹時陶侃為散吏是又侃家尋陽之明證也此延賓坊及舊志所載縣南四十里有陶母墓疑皆屬附會洪遵别墅在鄱陽縣北名勝志郡北朝天門外有洪遵别墅名曰小隱又名盤州庵又有雲竹莊瓊花圃皆諸洪别墅柳公樓在府城寰宇記在州城西北角梁柳惲為鄱陽守所創憑眺顯豁實江國之勝境唐大厯中第五琦以為望歸樓貞元十九年李吉甫復其名曰柳公樓循舊迹也鄱江樓在府城南城上唐錢起有陪使君叔鄱江樓宴鄭中丞詩明統志諸樓觀皆屢更名惟此不改聚遠樓在徳興縣南宋神宗時余士隆建王拱辰蘇洵與子軾轍黄庭堅皆有詩雲錦樓在安仁縣前下瞰錦江宋縣令崔同亨建看雲樓在安仁縣西明統志元吳全節伏老之所順帝書扁賜之遺書閣在樂平縣儒學講堂後明統志宋楊簡嘗為邑令既去門人袁公輔提刑江東命肖像藏其遺書於此登瀛閣在樂平縣東南永善鄉明統志宋程通叔建聚書教宗族子孫因名登瀛勉之馬存記賜書閣在浮梁縣宋元豐七年神童朱天申年十二背誦十經神宗召見賜五經出身仍賜餞五萬貫買書因建閣於家藏書其上從弟天錫年十歲亦能誦七經並蒙恩賜飽山閣在浮梁縣治前明統志宋尚書程瑀建四面多山爲一邑登覽之勝慶朔堂在府治内明統志宋守范仲淹建取古諸侯藏朔之義堂前有手植九松府治後有得心堂取呉芮得江湖間民心之義九賢堂在府治内明統志九賢呉周魴晉虞薄梁陸襄隋梁文謙柳莊唐馬植李復顏真卿宋范仲淹皆治郡有徳政者圖像其中識山堂在府治内輿地紀勝望廬山於三百里外最爲楚東絶勝三善堂在餘干縣治西偏明統志宋令沈度政有三善一曰田無廢土二曰市無間居三曰獄無宿繫民謳歌之堂成父老請以爲名景蘇堂在德興縣治西宋蘇軾子邁嘗爲縣尉後人思之故名綵衣堂在安仁縣輿地紀勝周氏之居也熙寕六年楊傑爲之記曰龍塘周氏五世同居子養其父而逮養其祖之祖父鞠其子而及鞠其孫之孫州閭鄉黨推爲令族云魯公亭在鄱陽縣薦福山明統志山有唐歐陽詢所書薦福寺碑顏真卿嘗覆以亭後人因名秋香亭在府治内明統志宋提點鑄錢使魏廉於廳旁作亭培菊數本故名范仲淹爲作賦蜀錦亭在府治慶朔堂右明統志范仲淹植海棠二株其後鄒柯築亭題曰蜀錦王十朋詩亭廢名猶在春來花自芳猶餘蜀中錦愛惜比甘棠五老亭在鄱陽縣北芝山巔因范仲淹有五老夕陽開之句故名溪山風雨亭在餘干縣西一里懸崖處多古梅曰梅巖有宋理宗御書梅巖二字刻於石有溪山風雨亭是趙忠定公讀書處四望亭在府城上四望豁然宋范仲淹建止水亭在鄱陽縣北芝山後明統志宋江萬里罷相還居此鑿池創亭扁曰止水及元兵陷城萬里赴水死干越亭在餘干縣東南寰宇記在縣東南三十歩屹然孤嶼古之遊者多留題焉明統志在羊角山前瞰琵琶洲唐劉長卿施肩吾皆有詩省志唐初縣令張俊彥建白雲亭在餘干縣南寰宇記在縣西南八十步對干越亭跨古城之危瞰長江之深劉長卿題詩曰孤城上與白雲齊因以為名煑泉亭在餘干縣餘干山下輿地紀勝陸羽嘗汲水煑茶於此乘風亭在餘干縣餘干山為一邑絶覽之地天氣清明望見廬山浮碧亭在浮梁縣昌江南明統志宋縣令張景修詩一泓秋水不見底十里曉山無盡頭舒嘯亭在德興縣治東雷山巔旁有崖曰香石崖有洞曰黄龍右有天池闊僅尋尺盛夏隆冬其水不竭左有涸池深數尋雖久雨不注勺水蘇軾詩云勝覽雷山舒嘯亭即此觀魚臺在鄱陽縣西寰宇記在州西門外鄱陽記云番君至此觀魚下有池闊九十歩池内有走馬埓又名落照池釣臺在樂平縣樂安鄉一巨石可坐以釣上有二膝迹玉石臺在安仁縣北三十里明統志唐碑稱玉石雲岫崖巒甚奇沙堆在浮梁縣東北五十里寰宇記其形狀如覆船鮮淨特異鄱陽記云每年豐稔其沙即堆積如舊若移上岸即年儉關隘石門鎮巡司在鄱陽縣北一百八十里廣晉鄉宋元明時站路今仍要道白沙鎮巡司在德興縣東一百二十里明置巡司今因之石頭街巡司在萬年縣北四十里石鎮市臨洎河通鄱陽樂平明正德中置巡司今因之棠陰鎮在鄱陽縣西七十五里立德鄉其地當鄱陽上下驛津明