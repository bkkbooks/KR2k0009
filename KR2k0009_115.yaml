士厯治郡縣有古循吏風官至禮部尚書寶文閣學士劉孝榮言統元厯差命執羔釐正撰厯議厯書五星測驗各一卷上之在經筵二年歸上稱其忠執羔立朝無朋比勸孝宗辨忠邪納諌諍尤重請卹災平生手不釋卷尤通於易申孝童鉛山人紹興六年潘達兵襲鉛山父俞年七十遇賊欲殺之世安年未冠引頸願代父死賊兩全之汪應辰玉山人初名洋年十八舉紹興進士第一賜今名授鎮東軍簽判趙鼎為帥幕府事悉咨焉召為祕書省正宇以論和議忤秦檜出判建州流轉嶺嶠十七年檜死始還朝進權户部預建儲以議太上尊號出外薦朱熹自代㑹朝廷謀蜀帥乃以敷文閣直學士為四川制置使知成都府治甚有聲除吏部尚書在朝多革弊事中貴人皆側目應辰力求去出知平江府復被譖請祠歸剛方正直敢言不避少從吕本中胡安國遊張栻吕祖謙深器許之卒諡文定施師點上饒人十歲通六經弱冠遊太學尋授學職乾道中除給事中賜對上曰觀卿所奏公輔器也累除參知政事州郡上供立嵗終稽考法或請不待歲終先期行之師點追寢其議惓惓搜訪人才手書置夾袋中嘗謂諸子曰人窮達有命不在巧圖忠孝乃吾事也卒贈光禄大夫徐元杰上饒人師事真徳秀嘉熙初厯校書郎論皇子竑當置後不合力請外累崇政殿説書時久不雨極論洪範天人感應之理及古今遇災修省之實拜國子祭酒杜範入相延議軍國所言皆朝廷大政邊鄙逺慮每至宗社隱愛處輒閣筆揮涕書就隨削稿暴卒諡忠愍徐宗仁永豐淳祐進士為國子監主簿開慶元年伏闕上書言今通國之謂佚罰者不過丁大全袁玠之徒而首惡則董宋臣若誤國之罪不誅則用兵之士不勇又極論邊事謂惠䙝而威不振累官權禮部尚書兼益王府贊讀衞益王走海上厓山兵敗死焉謝枋得弋陽人寶祐進士對䇿極攻丞相董槐與宦官董宋臣五年彗星出東方枋得考試建康摘賈似道政事為問且言兵必至國必亡漕使陸景思上其稿於似道追兩官謫居興國軍宋亡元集賢學士程文海首薦不起尚書留夢炎又薦終不行福建行省參政魏天祐強之而北即日絶粒至燕京問太后瀛國公所在慟哭而卒其世父徽明以特恩奏為當陽尉攝縣事元兵奄至徽明戰死二子趨抱父屍亦死之元陳受信州人巴延布哈徳濟知受有膂力募為義兵尋戰敗為賊擒痛罵不屈賊焚殺之明陳修上饒人洪武初從平浙東授理官律令悉本寛厚盡改元季苛政累遷濟南知府兵燹之後大加撫綏流亡復業召拜吏部尚書時選除考課猶未畫一修詳考舊典參以時宜按地劇僻為設官繁簡凡庶司黜陟及課功覈實之法皆精心籌畫銓法秩然李奎弋陽人永樂中舉於鄉擢御史亷勤多建白按蘇松諸府政嚴而明去贓吏甚衆正統末以大理寺丞巡撫河南及京西四府奏蠲畿内軍需三之一免大名順徳廣平户口鹽鈔發臨清倉以賑饑民民甚徳焉進右少卿景泰元年命專撫畿輔諸府以疾歸高明貴溪人景泰進士授御史諫内苑造龍舟劾尚書陳汝言罪成化時累遷南京右僉都御史討揚州鹽寇盡平之就命理鹽課宿弊大釐上杭盜發奉命剿捕盜盡絶奏析上杭地置永定縣一方以靖婁諒上饒人少從呉與弼遊景泰中舉於鄉除成都訓導尋告歸著書成日録四十卷三禮訂訛四十卷春秋本意十二篇其學以收放心為居敬之門以何思何慮勿忘勿助為居敬要㫖王守仁少時常受業於諒子忱傳父學從者甚衆夏尚樸永豐人正統初㑹試赴京見劉瑾亂政歎曰時事如此尚可干進乎不試而歸六年成進士授南京禮部主事嵗饑條上救荒數事嘉靖時厯南京太僕寺少卿尚樸少師婁諒傳主敬之學後與魏校湛若水輩日相講習學者宗之著中庸語及東巖文集吕盛永豐人由進士厯南京刑部郎中父喪廬墓白烏巢樹成化中旌表費瑄鉛山人成化進士宏治時為兵部員外郎貴州巡撫謝昶總兵呉經等奏爛土苗反乞發大軍征討命瑄及御史鄧庠往勘苗實無反狀撫定之劾昶經等罪官終貴州參議費宏鉛山人成化中進士第一授修撰正徳中累進户部尚書武英殿大學士宸濠謀復䕶䘙宏不可倖臣錢安等黨宸濠搆罷之世宗即位召入輔政持重識大體數勸帝革武宗弊政帝委任甚至尋復為張璁桂萼搆罷再起承璁萼操切之後易以寛和朝士皆慕樂之卒贈太保諡文憲弟寀正徳進士授編修宸濠蓄異志屢以意屬寀寀隂折之宸濠賂中貴出内批勒致仕後起至禮部尚書卒諡文通姜綰弋陽人成化進士宏治初擢南京御史劾中官蔣琮十事謫桂揚州判厯慶逺知府劇賊韋七旋等數萬衆攻城綰堅守檄民兵夾擊破走之東蘭諸州蠻悉歸侵地總督劉大夏薦為右江兵備副使土知府岑濬叛思恩綰合兵討之遂條二府形勢請以流官代土官從之遷河南按察使汪俊弋陽人宏治六年㑹試第一授編修正徳中與修孝宗實錄以不附劉瑾焦芳調南京員外郎嘉靖初累遷禮部尚書時興獻王已加帝號桂萼復請稱皇考俊集廷臣上議爭之既又諭建室奉先殿側俊復力爭不聽抗疏乞休俊行誼修潔立朝光明端介學宗洛閩人稱石潭先生隆慶初贈少保諡文莊汪偉俊弟宏治進士授檢討以忤劉瑾調南京禮部主事瑾誅復官厯南京祭酒武宗南巡率諸生請幸學不從江彬矯㫖取玉硯偉曰獨有秀才時故硯可持去乃己嘉靖初厯吏部侍郎數爭大禮尋為陳洸劾罷吕翀永豐人宏治進士為刑科給事中武宗初閣臣劉健謝遷去位翀抗章乞留語侵劉瑾廷杖削籍後起雲南僉事遷四川副使修成都江堰以資灌溉水利大興詹軾玉山人正徳進士授行人諫武宗南巡杖死福王時追諡忠潔從父瀚以進士為刑部主事亦以諫受杖嘉靖初爭大禮再受杖終刑部侍郎夏言貴溪人正徳進士由行人擢給事中世宗初覈親軍及京衞冗員汰三千二百人出按莊田悉奪還民產貧民盡復業㑹帝鋭意禮文言贊成二郊及配享諸議累進吏部尚書華葢殿大學士後為嚴嵩所陷遂棄市隆慶初復官諡文愍徐九思貴溪人嘉靖中鄉薦知句容縣為治於單赤務加恩而御豪猾特嚴積九載遷工部主事厯郎中治張秋漕河築減水橋於沙灣遂為永利時趙文華以工部尚書視師東南九思不出迎㑹遷高州知府文華修舊怨坐致仕吕懷永豐人嘉靖進士由庶吉士厯官南京太僕少卿受業於湛若水有學行在師門與洪恒並稱楊時喬上饒人嘉靖進士授主事隆慶初上時政要務中外傳誦萬厯時累南京太常卿請議建文帝諡祀死事諸臣晉吏部左侍郎秉銓凡五年卒箧餘一敝裘同列賻襚以殮詔贈吏部尚書諡端潔徐貞明九思子隆慶進士萬厯初為給事中上水利軍班二議皆下所司已而順天巡撫張國彥行之薊州永平豐潤玉田皆有效乃進貞明尚寶少卿兼御史領墾田使未數月開水田三萬九千餘畝將大疏濬而奄人勲戚之占間田為業者爭言不便竟諭停役貞明識敏才練慨然有經世志為浮議所撓論者惜之費曽謀鉛山人少師宏裔崇禎末以鄉舉知通許縣纔四旬賊猝至曾謀召父老曰我死若輩以城降可免屠戮北向再拜抱印投井死本朝乾隆四十一年賜諡忠烈詹兆恒永豐人崇禎進士知甌寕縣多善政徴授南京御史福王時進大理寺丞阮大鉞起兆恒力爭之己請告歸唐王召爲兵部左侍郎與黄道周協守廣信城破奔懷玉山聚衆數千人進攻衢之開化縣兵敗戰死本朝乾隆四十一年賜諡忠烈胡夢泰鉛山人崇禎進士除奉化知縣吏部㑹廷臣舉天下賢能有司十人夢泰與焉唐王時授兵科給事中奉使旋里本朝順治三年城破與妻李氏同縊死乾隆四十一年賜諡節愍本朝周元上饒人任雲南騰越副將呉三桂叛署元偽總兵不就退居永昌官兵至蜀與永昌偽將軍田進學偽總兵李鍾秀同謀反正鍾秀舉兵北勝元與進學舉兵永昌恢復順寕府雲龍州賊兵壓境衆寡不敵被執不屈遇害流寓唐呉勔延陵人徙貴溪好學善文元和間爲水曹郎年四十即致仕讀書五面山學者稱爲潛谷先生子武陵陸羽復州竟陵人拜太子文學徙太常寺太祝不就寓居信城北三里自號東岡子性嗜茶環居多植茶因號茶山御史宋曾幾河南人高宗時請閒得崇道觀復為廣西運判固辭僑居上饒辛棄疾厯城人罷秘閣修撰寓居鉛山縣期思渡之匏泉書院後遂改名為稼軒書院趙暘鄭州人直龍圖閣以提點坑冶鑄錢行提舉江州太平觀來居信州玉山智門寺列女宋舒氏二女玉山人紹興中苗傅作亂二女被執將逼與俱乃佯許之行至崖側執手投崖而死盧孝孫妻郭氏貴溪人侍郎郭元徳女嫺禮敎通詩書孝孫編次四書集義叢稿如山郭博覽精究手抄類集功實半之謝枋得母桂氏弋陽人枋得逋播婦與孫幽逺方處之泰然人問之曰義所當然也人稱為賢母枋得妻李氏美而慧通女訓諸書事舅姑奉祭待賓皆有禮萬户武良弼購捕之根及其家李攜二子匿貴溪山荆棘中採草木而食兵至令曰不獲李氏屠而墟李曰豈可以我故累人遂就俘徙囚建康謂二子曰若幸生還善事吾姑吾不得終養矣即自縊死詹氏鉛山人其夫以逋租匿去詹依其姊數年夫不歸姊議嫁之泣曰夫以他去猶當守死況門户事耶姊弗諒受聘婦赴水死元程植妻王氏名靜婉餘干人歸植五載植疾篤與王訣曰吾父母老不得終養奈何王泣曰所不畢志以養無以見夫子於地下夫殁事舅姑愈婉順至元中盜至將刃姑王以身翼始願代死盜義而兩釋焉鄭琪妻羅氏名妙安弋陽人能闇誦列女傳琪同居百餘口羅執婦道無間言琪以軍功擢鉛山州判至正末信州陷羅取所佩刀淬令銛琪問何為對曰萬一遇難為自全計耳已而兵至羅自刎死夀安妻楊氏貴溪人至正中夀安監玉山縣寇逼信領兵拒之中流矢卒楊聞之不食數日死明樊靜妻葉氏名淑慧貴溪人年十六歸樊五月而寡守節五十年麻衣不去身初病目母欲療之曰未亡人亟死無憾何以療為遂喪明平時紡績養姑姑殁葬祭如禮楊仕榮妻倪氏貴溪人榮病革倪截髪示之榮遂瞑目鄰嫗諷之他適倪泣曰妾髪固在也背舅姑不孝棄孤不仁食言不信何以見吾夫於泉下聞者凛然傅崗妻祝氏鉛山人崗殁姑欲奪而嫁之泣辭不可聘至祝佯為檢飾狀抱石赴水死是秋大旱知縣張昺禱雨不應有以祝氏節義告者昺即具牲醴為文親詣死所奠之是夕大雨祝死節處水深莫測後湧塞成洲俗呼為節婦洲孫景雲妻鍾氏浙之上虞人景雲知玉山縣宏治中卒於官鍾哀悼迫切自縊以殉提學邵寶為之立亭記於石汪芳妻劉氏上饒人芳病廢且貧甚謀更遣之劉泣曰妾命也敢以死從紡績以給夫正徳中姚源賊至劉䕶芳不忍去賊欲辱之不從斬芳首以脅之罵益厲遂遇害鄭贄妻團氏上饒人姚源賊至團度難兼免使夫舁其姑先走自負子從之不及被執欲汚之紿求緩乃并其子俱赴水死萬登妻謝氏弋陽人姚源賊攻寨投崖死聞一貫妻危氏名鳳英貴溪人正徳中姚源賊至被執不從殺其㓜子脅之愈厲罵遂遇害同縣畢侃卿妻姚氏夫亡守節厯二十餘年避姚源賊至九圳投水死李鴻妻孫氏名義姑玉山人流寇袁三剽掠孫與側室俱被執側室有娠孫謂曰爾死如李宗何乃紿賊請以所藏金贖之賊許之既脱側室遂抱橋柱厲聲罵賊賊怒磔之事聞旌表施氏三烈婦永豐人施廷翊妻王氏廷翔妻周氏廷栩妻呉氏嘉靖中廣寇搜掠男子皆亡命去三婦扶其姑裴氏匿巖中被執各脱簪珥救姑賊釋姑驅婦行婦誓不辱至雙塘王抱二歲兒先赴水死周呉相繼死賊憤亂槍刺之塘水盡赤萬厯中敕建三節坊李時育妻謝氏鉛山人時育以貢試卒於場謝年十九翦髪入殮矢死不貳紡績以養舅姑撫遺孤數年舅姑與子俱殁父母欲其改適遂投井死潘肇薦妻夏氏永豐人夫亡無子父母欲易其志夏乃佯為擇吉裁衣而密製殮服屆期夜半自縊鄭某妻徐氏名鳳英上饒人為兵所掠急以稚子邦祚授其弟曰為我視此去數武從馬上躍入龍潭碎身而死本朝吳氏名桂英廣豐人㓜喪父母哀毁不欲生許字周天賜天賜逼女兄悔盟希得厚金呉以禮無再受人聘縫衣投水而死劉覲光妻李氏鉛山人家貧麋粥奉舅姑自採草食或終日枵腹覲光殁撫遺孤敎以大義子嘗獲遺金令持還曰勿希非義物也孫朝選妻熊氏上饒人年十八歸孫為廣西參將夫故扶柩歸厯洞庭鄱陽之險歸後家業蕩然父兄逼奪其志破容翦髮訴官乃免同縣汪爌妻鄭氏姜雲錦妻劉氏張文壇妻鄭氏鄭養沛妻汪氏紀其年妻管氏余瑾妻尤氏周作楫妻徐氏舒國鈞妻徐氏烈婦張廷鉅妻王氏均乾隆年間旌祝夢蘭妻毛氏玉山人夫亡守節同縣程儔妻余氏蔡朝聘繼妻馬氏吳伯挺妻黄氏王仲輝妻姚氏童明煥妻祝氏姜天祈妻徐氏吳憲麟妾丁氏葉良材妻周氏魏芳通妻余氏吳欽厚妻羅氏潘祖球妻鄭氏均乾隆年間旌葉士樽妻劉氏廣豐人夫亡守節同縣紀微洙妻湯氏徐齡妻鄭氏紀鏘元妻俞氏俞振妻劉氏劉介祈妻俞氏鄭潤妻俞氏王廷獻妻鐵氏葉士貴妻方氏劉􅖌妻周氏劉勲妻王氏吕衞圻妻陳氏劉翼培妻傅氏紀壤酬妻王氏陳景唐妻范氏程士行妻周氏陳岐妻解氏劉圻妻張氏劉舟楫妻鄧氏江松來妻劉氏聶道偉妻戴氏解文焯妻陳氏吕徵妻周氏朱之璘妻周氏俞鴻昌妻張氏謝高妻周氏何世球妻呉氏徐衮煥妻俞氏傅大坦妻徐氏程毓秀妻劉氏蔣朝鏜妻吕氏夏永康妻蔣氏王式穀妻劉氏夏汝器妻鄭氏毛在高妻王氏王克玟妻劉氏烈婦周夢悦妻吕氏貞女潘人珴未婚妻徐氏均乾隆年間旌任廷樑妻江氏鉛山人夫亡無子艱難苦節四十九年事繼姑以孝聞同縣江大斌妻李氏諸逺妻張氏祝如栢妻李氏詹光燾妻祝氏彭大機妻劉氏烈婦傅上達妻林氏江秀里妻顔氏林科生妻楊氏均乾隆年間旌黃大用妻萬氏弋陽人年十六適黄生子甫一齡夫亡撫孤守節同縣吕恩明妻范氏吕成錦妻王氏葉之軫妻周氏謝大紳妻畢氏吳存仁妻趙氏張琮妻倪氏吳呈鸞妻汪氏翁漯妻呉氏均乾隆年間旌詹接濟妻曾氏貴溪人年二十一夫亡毁容誓死姑鄒老病侍養極謹同縣童師賢妻夏氏毛文錦妻李氏璩曡妻徐氏江衡妻張氏蔡元焜妻張氏何三奇妻陳氏江繩妻徐氏黄廷材妻蔡氏裴宗雲妻呉氏江鴻儒妻許氏徐迪玉妻詹氏徐天培妻吳氏王元資妻桂氏邵惠蒲妻周氏翁天華妻董氏程道逺妻張氏陳其韜妻黃氏楊映桂妻潘氏顏良徳妻李氏童能賦妻周氏童碧光妻周氏黄子弼妻張氏璩曰照妻王氏毛偶蓮妻蔡氏江蒸之妻曾氏方名得妻嚴氏楊淸士妻徐氏周蒲楩妻璩氏徐益思妻劉氏楊子讓妻江氏方成之妻朱氏江廉孫妻呉氏魯兆魁妻李氏江一鵬妻朱氏李尚彩妻蔣氏方忠文妻徐氏方鼎新妻江氏徐岸若妻楊氏聶綸文妻林氏熊日輝妻鄧氏張誥妻劉氏桂游妻錢氏璩如鏡妻黄氏熊林妻鄧氏陳澄妻龔氏童祥衍妻徐氏汪西來妻楊氏呉士傑妻夏氏黃應科妻劉氏侯宗逺妻李氏烈婦傅䕶妻薛氏徐敬典妻蔣氏烈女席亷思未婚妻項氏蕭定南未婚妻龔氏均乾隆年間旌童惠妻陳氏興安人夫亡守節與同縣藍璧崑妻倪氏均乾隆年間旌鄭飛鶚妻羅氏上饒人夫亡守節同縣汪福逺妻劉氏楊永傑妻葉氏楊永偉妻林氏徐熊飛妻丁氏盧澍妻陳氏翁象鵬妻郭氏均嘉慶年間旌雷徳脩妻周氏玉山人夫亡守節同縣呉士仰妻蘇氏吳永發妻周氏邱貴山妻譚氏呉文鏡妻顔氏呉文瑶妻郭氏均嘉慶年間旌許蜚龍妻李氏弋陽人夫亡守節同縣江文龍妻桂氏汪之貞妻李氏徐雲紅妻舒氏嚴俊妻方氏呉檠妻蒲氏余添賜妻汪氏均嘉慶年間旌單映藻妻夏氏貴溪人夫亡守節同縣蔡守盈妻璩氏彭尚禄妻江氏毛炯妻王氏徐天繡妻符氏烈女徐一經未婚妻潘氏黃步香妻彭氏毛綱妻余氏汪逢堯妻程氏葛維淳妻夏氏朱化宣妻蔡氏應養先妻張氏毛上翔妻童氏張懋明妻林氏蔡韶暉妻王氏蔡調暉妻江氏劉贊臣妻汪氏劉漢成妻鄭氏余含彥妻廖氏徐明開妻祝氏均嘉慶年間旌潘乾學妻許氏鉛山人夫亡守節同縣劉宗尚妻徐氏周為梯妻楊氏祝之鑣妻夏氏祝之鍑妻傅氏費徽昭妻張氏任光陵妻林氏胡師李妻貢氏吳家鏻妻程氏張蕙櫺妻詹氏周昇健妻楊氏烈婦王兆松妻彭氏均嘉慶年間旌劉文鴻妻葉氏廣豐人夫亡守節同縣俞錡妾徐氏余氏張紹緒妻劉氏祝仰洙妻周氏潘學淵妻朱氏徐士枚妻王氏徐瑞杭妻夏氏夏大汌妻周氏周孟䥓妻俞氏程遇曽妻汪氏徐璈山妻吕氏張汝棠妻徐氏周維岸妻俞氏徐詩昌妻胡氏周型妻王氏俞馭侖妻柴氏程曰増妻劉氏蔣朝緗妻周氏郭正英妻胡氏劉徳聚妻郭氏徐延淇妻夏氏潘徳錦妻俞氏潘紀玷妻俞氏王洪聲妻蔣氏沈立䄉妻周氏潘必蘭妻葉氏潘必苕妻周氏潘紀聰妻徐氏均嘉慶年間旌張曰安妻周氏興安人夫亡守節同縣方之洛妻鄭氏均嘉慶年間旌仙釋漢張道陵留侯九世孫建武時生於天目山永平時拜江州令棄官隱洛陽北邙山章帝和帝累召不就杖䇿遊龍虎山修煉道成入蜀居陽平山永夀時遷渠亭山出其經籙印劍授子衡使世世相傳乃於南隆雲臺峰乘雲上昇是爲漢天師第一世衡傳子魯魯傳子盛盛復居龍虎山元世祖賜三十六世天師宗潢號曰靈應沖和真人大徳中加授嗣天師與材為正一敎主兼領三山符籙至今世襲宋徐若渾上饒人政和中命林靈素講道寶籙宫士大夫咸㑹徐越次起曰傾河之辯貴當於理終日不言貴會於道林曰子所學者何道徐曰孝於親忠於君居仁由義調喜怒正好惡安時處順樂天知命如是而己詔授以爵不受隱玉虛之西不知所終王道堅貴溪人政和中赴闕館於太乙宫徽宗訪以修煉之術奏曰清靜無為軒黄所以致治多欲求仙漢武所以罔功修煉非天子之事時徽宗預知國當有厄命禳之對曰修徳可以回天禬禳之説不敢誤國請還山元張與材道陵三十八世孫襲掌道敎時潮囓鹽官海鹽兩州為患特甚與材以術治之一夕大雷電以震明日見有物魚首龜形者磔於水裔潮患遂息張留孫貴溪人少入龍虎山為道士有相者曰神仙宰相也至元十三年從天師張宗演入朝留侍闕下世祖嘗親祠幄殿忽風雨暴至衆駭懼留孫禱之立止昭睿順聖皇后得危疾召留孫請禱既而后夢有朱衣長髯從甲士導朱輦白獸行草間者覺而異之以問留孫對曰甲士導輦獸者臣所佩法籙中將吏也朱衣長髯者漢祖天師也行草間者春時也疾其及春而瘳乎后命取所事畫像以進果夢中所見者本朝覺浪名道盛柘浦張氏子因見瑞巖識公遂求薙棲夢華山後至天界毘盧閣休夏忽命移錫禪堂停午書偈擲筆而逝土產鐡唐書地理志上饒有鐵寰宇記上饒縣有鐵山通志玉山貴溪弋陽三縣皆有鐵久罷惟上饒永樂鄉場尚存鉛唐書地理志上饒有鉛寰宇記鉛山縣有鉛山郡志鉛山縣招善鄉有楊梅山場今罷採青碌寰宇記鉛山縣出綿元和志信州貢綿藤紙元和志信州貢藤紙府志上饒縣有黄白表紙亦有連四紙俱不甚佳又鉛山貴溪二縣有白録紙煮竹絲為之鉛山者佳又有高簾紙俗名蓬紙又玉山縣東北鄉有楮皮紙今廣豐東鄉亦有之其楮皮出自湖廣葛粉唐書地理志信州土貢省志各縣出茶省志七邑俱產瓷器明統志弋陽縣出省志弋陽縣湖西馬坑窰皆以陶器爲業郡邑多資之按舊志載唐書地理志上饒有金弋陽玉山有銀又上饒有銅今俱無謹附記前總纂官臣許應藻恭纂輯提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣宗稷辰恭覆校
