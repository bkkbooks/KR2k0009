晉建名雙溪宋宣和𥘉賜今額妙元觀在德興縣東晉昇平初建唐名仙鶴宋政和初改今名崇文宫在安仁縣治西元大德中呉全節建名宦秦吳芮鄱陽令甚得江湖間民心號曰鄱君漢唐䝉建元中為鄱陽令後拜郎中通夜郎置犍為郡三國呉步騭臨淮淮陰人建安十五年出領鄱陽太守韓當遼陽令支人從孫權破黄祖還討鄱陽領樂安長山越畏服周魴呉郡陽羡人黄武中鄱陽大帥彭綺作亂攻没屬城乃以魴為鄱陽太守與胡綜戮力致討遂生擒綺送武昌賊帥董嗣負阻刦鈔豫章臨川並受其害魴遣間諜授以方策誘殺嗣嗣弟怖懼詣武昌降由是數郡無憂在郡十三年卒賞善罸惡恩威並行晉虞溥高平昌邑人除鄱陽内史大修庠序廣招學徒移告屬縣俱為條制於是至者七百餘人溥乃作誥以奬訓之為政嚴而不猛風化大行有白烏集於郡庭南北朝齊柳惲河東解人試守鄱陽相聽吏屬得盡三年喪禮著之文教百姓稱焉梁陸襄呉郡呉人大通七年出為鄱陽内史先是郡民鮮于琛為亂有衆萬餘將出攻郡襄先率民吏修城隍為備禦及賊至連戰破之生獲琛時鄰郡豫章安成等守宰案治黨與因求賄貨皆不得其實惟襄郡部枉直無濫民歌曰鮮于平後善惡分民無枉死賴陸君又有彭李二家因忿爭遂相誣告襄引入内室和言解之為設酒食令其盡歡同載而還民又歌曰陸君政無怨家鬬既罷讐共車在政六年郡大治隋柳莊解人開皇十一年徐璒等反於江南以行軍總管長史隨軍討之璒平即授饒州刺史甚有治名梁文謙安定烏氏人煬帝即位轉饒州刺史歲餘為鄱陽太守稱為天下之最唐顏真卿京兆萬年人至德中貶饒州刺史李復宗室建中初為饒州刺史築隄以捍江水民德之李吉甫趙人貞元中厯饒州刺史會前刺史繼死咸言牙城有物怪不敢居吉甫命菑除其署以視事吏由是安誅破奸盜窟穴治聲流聞馬植扶風人太和中為饒州刺史鄱陽東北有馬塘北有土湖皆植所築穆贊河内人以御史中丞貶饒州别駕久之拜刺史贊質性强直進觀察使卒於官鄭珣瑜榮澤人貞元間為饒州刺史性嚴重少言未嘗以私託人而人亦不敢謁以私清靜惠下賊歛貴發以便民盧知猷河中蒲人僖宗時為饒州刺史以政最聞顏標乾符中為饒州刺史王仙芝將王重隠陷饒州標死之宋馬亮合肥人太宗時知饒州州豪白氏多執吏短長嘗殺人以赦免愈驁横為閭里患亮發其奸誅之部中畏懾州有鑄錢監匠多而銅錫不給亮請分其匠之半别置監於池州歲增鑄緡錢十萬范正辭齊州人太平興國中出知饒州州多滯訟至則夙繫皆決遣之會詔領料州兵送京師有王興者懷土燀行以刃故傷其足正辭斬之興妻詣登聞上訴太宗召見正辭廷辦其事正辭曰東南諸郡饒實繁盛人心易動興敢扇摇苟失控馭則臣無待罪之地矣上壯其敢斷特遷江南轉運副使范仲淹呉縣人仁宗時出知饒州歲餘徙潤州蔣靜宜興人第進士調安仁令俗好巫疫癘流行病者甘死不服藥靜悉論巫䤵聚其所事滛像得三百軀毁而投諸江蔣興祖宜興人以蔭調饒州司錄睦州盜起旁郡皆震興祖白州將糾吏卒緝戰具盜不敢謀郭僎祥符人建炎中權浮梁宰未行時有賊張頂花巳逼縣境衆止之僎曰安逸則就艱危則辭非我所學逕至縣約束吏士誓以死戰賊入邑官竄伏僎曰吾為宰義不可去端坐公署遂遇害詔贈承義郎錄其後二人葉義問夀昌人高宗時為饒州教授攝郡嵗旱以便宜發常平米賑民提刑黄敦書劾之詔勿問樞密使徐俯門僧犯罪義問繩以法俯嘗舉義問怒甚乃袖薦書還之唐文若眉山人紹興中知饒州興學宫減田租奇耗二萬石又請歲糶常平倉之儲什三與民平市農末俱利而栗不腐因以著令餘干有劇盜巡尉不能制文若遣牙兵捕而戮之王十朋樂清人孝宗時知饒州饒濱湖盜出没其間聞十朋至一夕遁去時久旱入境雨至丞相洪适請舊學基益其圃十朋曰先聖所居十朋何敢予人移知䕫州詹體仁浦城人隆興初調浮梁尉郡上體仁獲盜功狀當賞體仁曰以是受賞非吾之願也謝不就李舜臣井硏人乾道中知德興縣專尚風化民有母子昆弟相訟連年不決為陳慈友孝恭之道遂為母子兄弟如初間詣學講説邑士皆稱蜀先生罷百姓豫貸償前官積逋踰三萬緡民病差役舜臣勸糾諸鄉以税數低昂定役期久近為義役期年役成民大便利銀坑罷雖久小民猶負銀本錢官為償之天申大禮助賞及軍器所需皆不以煩民婁機嘉興人孝宗時通判饒州平反冤獄程迥餘姚人孝宗時調德興丞盜入縣民齊匊家平素所不快者皆罥絓逮獄迥辨其冤者縱遣之後以奉祠寓居鄱陽之蕭寺劉爚建陽人孝宗時調饒州錄事通判黄奕將以事汙爚而巳自以贓抵罪都大坑冶耿某憫遺骸暴露議用浮屠法葬之水火爚遺書曰使死者有知禍亦慘矣請擇高阜為叢冢以葬楊簡慈谿人知樂平縣興學訓士諸生聞其言有泣下者楊石二少年為民害簡寘獄中諭以禍福咸感悟願自贖由是邑人以訟為恥夜無盜警路不拾遺紹興五年召為國子博士二少年率縣民隨山境外呼曰楊父洪咨䕫於潛人寕宗時試饒州教授作大冶賦樓鑰賞識之馬光祖金華人寶慶中知餘干縣程元鳳徽州人淳祐七年知饒州郡初罹水灾元鳳訪民疾苦夙夜究心修城堞置義阡寛誅求察誣證進江淮荆浙福建廣南都大提點坑冶仍兼知饒州冶司歲有冬夏帳銀悉以補郡積年諸税斂之不足者芝生治所衆以治行所致元鳯歎曰五穀熟則民蒙惠此不足異也羅必元進賢人理宗時知餘干縣趙福王府驕横前後宰貳多為擠陷至是以汝愚墓占四周民山竟為直之人益壯其風力唐震㑹稽人咸淳十年知饒州時興國南康江州諸郡皆巳歸元元兵畧饒饒兵止千八百人震發州民城守上書求援不報元兵使人入饒取降款通判萬道同諷震降震叱之城中少年感震言殺使者明年二月兵大至衆遂潰震入府中玉芝堂兵入執牘使震署降震擲筆於地不屈遂死之凡椿與家人俱死贈華文閣待制諡忠介元齊秉節蒲臺人至元二十三年鎮饒州安仁劇賊蔡福一叛秉節與有司會兵討之擒福一餘黨悉平王都中福寕州人武宗時遷饒州路總管年饑米價翔踊都中以官倉米定價三等言於行省以為須糶以下等價民乃可得食禾報又於下等價減十之二使民糴時宰怒其專擅都中曰饒去杭州二千里比議定往還非半月不可人七日不食則死安能忍死以待乎時宰聞之乃罷郡歲貢金而金戸貧富不常都中考得其實乃更定之包銀法户不過二兩而州縣徵之加十倍都中一以詔書從事以内憂去郡民為立生祠卜天璋洛陽人皇慶中以更田制授饒州路總管既至聽民自實事無苛擾民大悦版籍為清時省臣董田事妄作威福郡縣爭賂之覬免譴饒獨無有省臣銜之將中以法求其罪無所得縣以饑告天璋即發廩賑之僚佐持不可天璋曰民饑如是必俟得請而後賑民死矣失申之責我獨任之民賴全活火延饒之東門天璋具衣冠向火拜勢遂息境有虎為害天璋移文山神立捕獲之以治行第一升廣東廉訪使韓鏞濟南人至正七年授饒州路總管饒俗尚鬼有覺山廟者自昔為妖以禍福人為盜賊者事之尤至將為盜必卜之鏞至即撤其祠宇沉土偶人於江凡境内淫祠不合祀典者皆毁之人初大駭巳而皆歎服鏞知民可教俾俊秀入學宫求宿儒為五經師月必考訂課試以示勸勵鏞自奉澹泊僚屬亦皆化之先是朝使至外郡者官府奉之甚侈一不厭其欲即騰謗於朝其出使於饒者鏞供以糲飯退皆無有後言魏中立濟南人至正時守饒州賊陷湖廣分攻州郡官軍疲懦不能拒所在無賴子乘間竊發不旬日衆數萬中立聞警即率丁壯分塞險要戒守備賊至以義兵擊却之巳而賊復合遂為所執以紅衣被其身中立叱之鬚髯盡張大罵不巳遂被害明陶安當塗人知饒州陳友定兵攻城安督吏民拒守援兵至賊敗去諸將欲屠從寇者安曰民為所脇奈何殺之不許太祖賜詩褒美鄭選靈壁人以武畧將軍守禦饒州度營制訓士卒甚有法度逋寇唐丑人等作亂選擊平之李安知餘干材敏有斷盜起攻城安率鄉兵擒其渠復搜山澤散匿者三百人正其罪修築決圩三十餘里民懷其惠胡維孝定遠人知樂平縣方國華入寇被執不屈死之辜臯江夏人知德興縣招撫流亡賊至聚民保障又奏罷採銅之役民德之郎敏洛陽人洪武中知饒州府樂平奸民詣闕訴大姓五十餘家謀逆敏力為奏辯詔誅奸民盡釋被誣者其他政績甚著李益洪武中為饒州府通判後遷知府在任十有八年習知民情性寛大不事苛細以故兵者欲以金錢啗賊德剛曰民困安可重斂遂身入賊巢諭以義誘致賊黨數十人戮之賊引去歲大饑請於朝得蠲三年賊李俊饒州守禦千户正德五年姚源賊次梁山坂官兵行伍未集賊乘虚入衆潰俊獨奮身直前手射十餘人力屈被執與弟李二遠同遇害祁敕正德中知饒州府斥舞文吏讞獄務得情増築鄱陽白馬隄浮梁胡白渠將鑿井以濟囚渇忽泉湧出人名之曰應德泉與諸生講授置籍以紀善惡延社學師以所没官田為館榖資且下其法於屬縣馬津滁州人正德中知餘干宸濠反偕進賢知縣劉源清起兵討賊以功擢監察御史孫天佑正徳中任龍津驛丞會宸濠反天佑起兵拒賊賊七殿下者奪運舟於龍津天佑與戰殺數人賊黨募兵過龍津天佑又追殺之焚其舟賊黨婁氏家衆西下亦為天佑所遏擒七十餘人賊兵不敢經東湖者天佑力也劉安慈谿人嘉靖中以御史謫餘干典史能勤於職築決隄數十丈人稱為劉公隄陳吾德歸善人萬厯中知饒州府廉潔果斷申嚴保甲禁民間溺女以忤張居正免官王如春黄巖人天啟中知餘干縣自龍津築隄數十里民稱王公隄成勇山東樂安人天啟中授饒州推官謁鄒元標於吉水師事之中使至知府以下皆郊迎勇獨不往且捕笞其從人中使將愬之魏忠賢會敗獲免本朝翟鳳翥聞喜人順治六年知饒州府兵燹後鳳翥招集流亡請蠲荒蕪糧税八萬有奇郡學圯移建故淮藩遺址又建芝山錦雲東山諸書院講學課士民風丕變在任五年遷本省興屯道僉事王起彪錢塘人順治六年知德興縣時寇氛未息德興在羣山中賊猝至起彪率民兵禦之衆寡不敵遂遇害婁維嵩直隸人順治七年知浮梁縣兵燹之餘居民四散維嵩設法招徠浮梁歲漕萬餘石每石徵銀五錢令里民赴南昌辦買後以米價騰貴吏縁為姦維嵩請徴於縣出資建倉民賴以甦編審汰逃亡萬餘口除實荒田二千餘頃至今民頌其德程瀚上元人順治中知安仁縣地連撫州之東鄉其民置田縣界曰寄莊為官民病者數百年瀚至别立寄莊單頭徵其賦自是縣民無代賠之苦寄莊亦免頑抗之累鄭邦相咸寕人順治中知鄱陽縣天資明敏無滯獄無遺賦邑素多盜屢獲屢脱邦相嚴行緝捕悉置之法民甚賴之王臨元平山衞人康熙九年知浮梁縣十三年七月山賊陷城臨元自縊贈按察使司僉事郭萬國許州人知饒州府康熙十四年五月耿逆陷城萬國死之贈光祿寺卿同時殉難者同知范文英奉天人萬年知縣王萬鑑臨海人並贈參政鄱陽縣丞陸之蕃㑹稽人贈僉事石門巡檢翁鳳翥鄞縣人饒州税課司大使李崇道清苑人均贈經厯前總纂官臣許應藻恭纂輯提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校大清一統志饒州府三人物漢雷義豫章鄱陽人初為郡功曹嘗濟人死罪罪者後以金謝之義不受金主伺義不在黙投金於承塵上後葺屋宇得之金主巳死義乃以付縣曹後舉茂才讓於陳重刺史不聽義遂佯狂出走鄉里為之語曰膠漆自謂堅不如雷與陳三府同時俱辟二人義遂為守灌謁者使持節督郡國行風俗太守令長坐者凡七十人旋拜侍御史除南頓令卒於官唐吉中孚鄱陽人官户部侍郎與盧綸韓翃錢起司空曙苗發崔峒耿湋夏侯審李端皆能詩齊名號大厯十才子陳饒奴饒州人年十二父母亡寠弱居喪又歲饑或教其分弟妹可全性命饒奴流涕身丐訴相全養刺史李復異之給資儲署其門曰孝友童子張讚鄱陽人與樂平謝維勤沈普姜崌並以孝聞宋馬遵饒州樂平人累官直龍圖閣性樂易善議論其言事不為激訐故多見推行杜衍范仲淹皆稱道之熊本鄱陽人慶厯進士熙寕六年瀘州羅晏夷叛詔本察訪梓蘷本發軍進討諸夷皆從風而靡願世為奴渝州南川獠木斗叛詔本安撫䕫路木斗以溱州地五百里來歸為四砦九堡建南平軍累遷吏部侍郎知洪州杭州卒有文集奏議共八十卷彭汝礪鄱陽人治平二年舉進士第一神宗用為監察御史裏行首陳十事指摘利害多人所難言者王中正李憲主西師汝礪言不當以兵付中人元祐中遷中書舍人詞命雅正有古人風進權吏部尚書出知江州卒汝礪居家孝友讀書為文志於大者言動取舍必合於義與人交必盡誠敬所著易義詩義詩文五十卷彭汝方汝礪弟以汝礪䕃為榮陽尉遷臨城主簿汝礪卒棄官歸葬豐稷宣和初知衢州方臘叛汝方獨守孤城城陷罵賊而死贈龍圖閣直學士諡忠毅洪彦昇樂平人元豐登第厯殿中侍御史論蔡京假紹述之名敗壞先朝法度朋姦誤國公私困敝願早賜英斷遣之出京何執中徳薄位尊願解其機政以全晚節及吕惠卿鄧洵仁蔡薿之流皆條摭其過一不為回隱厯徽猷閣待制知吉州卒張根德興人第進士調遂昌令當改京秩乞恩封及四親遂致仕屏處十年曾布等及本道使者上其行義徽宗召詣闕為帝言願陛下清心省欲以窒禍亂之原遂請罷錢塘製造局提舉江西常平屢建言詔皆從之改淮南轉運使上書條列茶鹽常平等利病之數遂極言土木花石綱之弊忤權倖坐貶根性至孝父病蠱戒鹽根為食淡母嗜河豚及蟹母終根不復食張樸根之弟以進士厯官太常少卿侍御史鄭居中去位樸言朋黨分政非朝廷福又劾郎員庸繆者十六人斥諸外升秘書少監馬存樂平人元祐進士授鎮南節度推官有文集二十卷行世金極樂平人紹聖進士宰分宜上書乞斬蔡京以謝天下坐是入元祐黨後以市隱自號紹興初贈太常博士程振樂平人少有軼才徽宗時為太子舍人靖康元年進吏部侍郎金兵至河北振請合諸道兵犄角擊之帝不能用拜開封尹改刑部侍郎金騎在郊邀車駕出城振為何㮚言宜思所以折之之策㮚不從遂為金人所害從子庭訪得其首歸葬之初王黼使其客沈積中圖燕振戒以後禍既而振乃用是死聞者痛之振尹京時兩宫方困於惎間振極意彌縫不使有纎芥可指高宗即位贈端明殿學士端平初賜諡剛愍程瑀浮梁人欽宗時除左正言即極言時病復請黜免徐處仁吳敏唐恪等高宗即位遷給事中時建修政局瑀條上十四事皆切時務權邦彦簽書樞密院瑀言其五罪累遷兵部尚書瑀在朝無詭隨有奏議六卷汪藻徳興人中進士第時胡伸亦以文名人為之語曰江左二寶胡伸汪藻王黼與藻同舍素不咸終黼之世不得用高宗踐祚召試中書舍人累拜翰林學士屬時多事詔令類出其手常論所以待將帥者三事後卒如其策紹興中知湖州上所修日厯凡六百六十五卷升顯謨閣學士藻通顯三十年無屋廬以居博極羣書老不釋卷工儷語所為制詞人多傳誦洪皓鄱陽人政和進士建炎三年擢徽猷閣待制為大金通問使至雲中尼雅哈廹使仕劉豫皓曰萬里銜命不得奉兩宫歸恨力不能磔逆豫忍事之耶尼雅哈將殺之旁一酋跪請得流遞冷山金主欲以為翰林學士不能屈留北中凡十五年乃還忠義聞於天下除徽猷閣直學士以忤秦檜出知饒州尋安置英州後徙袁州至南雄州卒乆之復徽猷閣學士諡忠宣皓久在北庭不堪其苦然爲金人所敬既歸使者至必問皓爲何官居何地性急義當艱危中不少變后戚貴族流落微賤者皆力拔以出博學強記有文集五十卷及帝王通要姓氏指南松漠紀聞等書子适遵邁尼雅哈舊作粘罕今改正李椿年浮梁人政和進士厯官司農丞度支郎中後知婺州致仕初母喪於中都徒步䕶喪歸葬有甘露之祥所著有易傳十卷文集十卷張燾根之子宣和進士建炎初通判湖州明受之變賊矯詔使燾撫諭江浙燾不受紹興中權吏部尚書金使至朝議欲上拜金詔燾不可施廷臣等力贊和議燾復上疏力詆遣詣河南朝八陵及歸所言皆切中時病秦檜恐忤敵意出燾知成都府累官資政殿大學士卒諡忠定燾外和内剛帥蜀有惠政論和議朝野歸重焉朱嗣孟樂平人宣和進士爲廣德司户兼司理叛卒戚方兵破鎮江犯廣德守倉黄遣招安無敢往者嗣孟直詣賊壘為陳逆順禍福使自擇所處方以其迕己殺之贈宣教郎官其子汪澈浮梁人其先新安人第進士高宗時除殿中侍御史時邊防寖弛澈陳養民養兵自治預備之說數千言左相湯思退不協人望澈劾罷之厯湖北京西宣諭使召入為參知政事與陳康伯同贊内禪孝宗時累遷樞密使卒澈為殿中日薦陳俊卿王十朋陳之茂為臺官在樞府孝宗密訪人材薦百十八人自奉清約雖貴猶布衣時有文集二十卷奏議十二卷王剛中樂平人紹興進士秦檜怒其不詣己授洪州教授檜死遷著作佐郎孝宗為普安郡王剛中兼王府教授每侍講極陳古今治亂之故君子小人忠佞之辨遷中書舍人言禦敵必先自治帝韙其言擢知成都置制四川恩烕並行得將士歡心孝宗立召赴闕金兵逼淮陳戰守之策除禮部尚書同知樞密院事奏開屯田省浮費選將帥汰冗兵四事剛中無他嗜好公退惟讀書著文為樂有易說春秋通義等書凡百餘卷洪适皓長子皓使朔方适甫十三能任家事紹興十二年與弟遵同中博學宏詞科高宗曰父在達方子能自立此忠義報也後三年弟邁亦中是選由是三洪文名滿天下孝宗時拜中書門下平章事卒諡文惠所著有盤州文集洪遵皓仲子與适同試博學宏詞科中魁選擢為秘書省正字秦檜子熺為官長遵恬然不附麗皓還與朝論異遵遂乞外免喪召對極陳父冤拜起居舍人修邇英記注累遷翰林學士兼禮部尚書金人由海道窺二浙命遵制平江助副總管李寶禦之有功孝宗初同知樞密院事卒諡文安洪邁皓季子紹興十五年中第孝宗初拜中書舍人兼侍讀直學士院厯知贛州建寕府婺州皆有善政拜翰林學士上四朝史淳熙初以端明殿學士致仕卒諡文敏邁以博洽受知孝宗手書資治通鑑凡三有容齋五筆夷堅志行於世趙善應丞相汝愚父官江西兵馬都監性純孝親病嘗刺血和藥以進居喪哭泣毁瘠與諸弟篤友愛聞四方水旱輒憂形於色聘故人孤女為子婦葬同僚之不克葬者道見病者必收恤歳饑輟食以飼饑者及卒丞相陳俊卿題其墓曰篤行姜䕫德興人工詩詞號白石道人甞請於朝欲正頌臺樂律以議不合而罷紹興間秦檜當國遂隱箬坑之丁山參政張燾累薦不起以隠逸終著有白石道人詩集詞集趙汝愚漢恭憲王元佐七世孫居餘干早有大志擢進士第一始見即陳自治之策帥福建制置四川孝宗謂有文武威風紹熙二年召為吏部尚書除知樞密院事孝宗崩光宗疾不能執喪丞相留正懼欲去汝愚度不得辭其責乃遣韓侂胄以内禪意請於憲聖太后遂奉嘉王即皇帝位即喪次命朱熹待制經筵悉收召士君子之在外者進右丞相侂胄忌之誣以謀危社稷謫寕遠軍副使永州安置至衡州為守臣錢鍪所窘暴卒天下冤之侂冑誅復原官諡忠定配享寕宗廟庭追封周王所著詩文十五卷諸臣奏議三百卷趙崇憲汝愚長子淳熙八年對策第一越三年復以進士擢甲科汝愚貶死崇憲闔門自處數年復汝愚故官升籍田令厯知江州提舉江西常平兼權興隆府又知靜江府所至有惠政崇憲天性篤孝居父喪月餘始食小祥始茹果實終喪不飲酒食肉柴中行餘干人紹熙進士嘉定初為博士首論主威奪而國勢輕次論士大夫寡廉隅乏骨鯁宜養天下剛毅之氣末論權臣用事苞苴成風宜行先朝痛繩贓吏之法出知光州遷京西轉運使改知襄陽提點湖南刑獄皆有治行入為吏部郎官遇事持正不為勢屈銓綜平允擢宗正少卿調崇政殿說書屢上直言以右文殿修撰卒所著有易擊集傳書集傳詩講義論語童蒙記程端䝉徳興人朱子門人淳熙中𥙷太學生時禁洛學持書上諫議大夫王月然責其斥正學以對䇿不合去自是不復應舉所著有性理字訓毓䝉明訓學則等書曹建餘干人少從程迥陸九淵兄弟遊學有所得淳熙間朱子過餘干見建與語大奇之建家貧事母孝待弟姪盡友愛其卒也朱子表其墓董銖德興人朱子門人注周易性理行於世劉伯正餘干人開禧進士官監察御史有事於明堂雷電忽至執事者皆離次伯正立殿下紳笏儼然聲色不動帝遂以大任期之遷左司諫疏言銓選財計刑獄之弊帝善其言累拜參知政事卒時論謂其以靜重鎮輕浮不求名譽云趙必愿崇憲子嘉定進士知崇安縣厯知處泉台婺等州皆有惠政遷度支郎中請以汝愚配享寕宗三京兵敗必愿言十事皆切於邊要又論濟王及國本事火災大水連上對事累官權户部尚書以華文閣學士知福州卒必愿才器周博心平量廣而又早聞家庭忠孝之訓故所立卓然可稱余安行德興人以經學為里中所宗官至大中大夫所著春秋新傳至言集記等集有詔藏之秘閣李伯玉餘干人端平二年進士第二召試館職厯詆貴戚大臣直聲暴起改校書郎奏言臺評迎合上意論罷尤焴楊棟盧鉞三人度宗時權禮部尚書帝以伯玉舊學欲用參大政賈似道忌之不果趙汝騰嘗薦八士各有品目於伯玉曰銅山鐵壁立朝風節似之所著有斛峯集洪芹适曾孫登進士第累遷將作少監時詞臣無當帝意丞相程元鳳言當今地望無踰洪芹者進兼翰林開慶元年權中書舍人屬兵興帝悟柄任非人詔書所至聞者奮激芹所草也丁大全罷相典郡芹奏乞從諫臣所請追官遠竄以仲國法沈炎承帝怒攻丞相吳潛芹獨慷慨敢言天下義之朱貔孫浮梁人淳祐進士擢史館校勘時丁大全執政使其黨許以驟用貔孫力拒之遷監察御史首疏論大全誤國之罪累擢殿中侍御史所論皆當世急務董宋臣復出朝論紛然貔孫力斥其姦卒奪祠賈似道擅命貔孫隨事進諫不肯阿附度宗即位遷吏部尚書不拜以華文閣學士知寕國府似道諷言者論罷久之復官有文集奏議行世馬廷鸞樂平人淳祐進士遷秘書省正字初丁大全雅慕廷鸞欲鈎致之廷鸞不為動及當輪對欲劾大全大全瞷知之以御史朱熠劾罷由是名重天下咸熙中拜右丞相罷歸所著有六經集傳語孟會編楚詞𥙷記諸書湯漢安仁人與其兄干巾中皆知名柴中行見而奇之真德秀在潭致漢為賓客江東提刑趙汝騰薦於朝淳祐中充國史實録院檢勘㑹大水火災兩上封事授太學博士皇太子冠進冠箴詔令太子拜謝升秘書郎轉對極言邊事度宗時以端明殿學士致仕有文集六十卷饒魯餘干人幼從黄幹游性行端醇學術精邃累薦不起以所居前有兩峯因號雙峯及卒門人私諡文元所著有五經講義語孟紀聞春秋節傳學庸纂述等書董鼎德興人自幼力學受業於黄幹著書傳纂疏行世同邑余芭舒亦潛心程朱之學所著有書傳解等書鍾季玉樂平人淳祐進士厯知萬載縣建昌軍遷江西轉運判官皆有治行改都大提點坑冶北兵渡江季玉徙寓建陽兵至不屈死之陳學心安仁人淳祐進士厯知高州謝枋得起兵復安仁命學心守之元兵至戰死陳羍安仁人咸淳進士少與謝枋得游枋得起兵安仁首拔入幕執安仁令李景聲其罪斬之引兵趨信州就攝郡事益王即位入覲領江東安撫使出上饒所部才千餘人屯火燒山戰潰被執遁去後三年復起兵敗入積煙山自刎死所著有鶴心集弟年同時被執死焉趙良淳汝愚曾孫累世以學行名良淳少學於郷先生饒魯知立身大節及仕所至以幹治稱三遷至淮西運轄馬光祖李伯五范丁孫交薦辟之咸淳末廷議衆建宗室於内郡以為屏翰除知安吉州元兵至良淳率衆守城夜舍陴上不歸援將吳國定開門納外兵衆散去良淳閉閣自經兵士解救之良淳火呼曰爾輩欲為亂耶衆涕泣出復投繯而死馬端臨廷鸞仲子博極羣書以䕃𥙷承事郎宋亡隱居教授鄉里逺近師之所著有大學集傳多識錄文獻通考等書元呉廷浮梁人博學明經隱居著書有四書語録五經發明春秋記聞等書黄鎰鄱陽人親喪明以舌舐之復能視至大中旌表朱公遷樂平人得雙峯饒魯之傳至正初為處州學正兵亂轉徙無定巳而寓婺源後歸家卒所著有詩經疏義四書通㫖約說性理等書李存安仁人延祐初一試不第遂杜門著書秘書李孝先舉以自代不果用葺書室曰俟齋人稱鄱陽先生有俟齋集三十卷許則祖樂平人性剛習武事至正兵起則祖倡義兵恢復德興縣後屢戰勝追賊馬陷泥淖中遂遇害事聞賜諡忠顯周伯琦鄱陽人至正初為宣文閣授經郎每進講輒稱㫖帝嘗呼其字而不名累官翰林直學士兵部尚書改浙西廉訪使招諭張士誠留平江十餘年士誠滅得歸鄱陽伯琦儀觀温雅粹然如玉博學工文章尤以篆隸真草擅名當時著六書正譌說文字原有詩文若干卷明許瑗樂平人元末放浪呉越間太祖駐婺州瑗謁曰四方鼎沸足下欲定天下非延攬英雄難以成功太祖喜置幕中參軍事未幾命守太平陳友諒以舟師來寇城破被害張琬鄱陽人洪武初以貢入太學試高等為給事中改戸部主事一日帝問天下財賦户口之數口對無遺帝悦立擢左侍郎謹身殿災上言時政歳饑請蠲民租百餘萬石俱見嘉納琬才敏有心計卒年二十七時人惜之周湞鄱陽人洪武初為大理丞與定律令為江西十才子之一官至刑部尚書費震鄱陽人洪武初以賢良徴為吉水知州擢漢中知府後坐事被逮太祖以其有善政釋為寶鈔提舉超拜户部侍郎尋進尚書奉命定丞相御史大夫以下歳禄之制出為湖廣布政使致仕鎦炳鄱陽人官中書典籖出為大都督府掌記工詩楊維楨宋濂皆極稱之江西通志作劉昺胡閏鄱陽人洪武中授都督府都事遷經厯建文初選右𥙷闕進大理少卿燕師起與齊黄輩晝夜畫軍事燕王入京首召方孝孺草詔繼召閏及高翔三人至則衰絰慟哭聲徹殿陛乃趨閏先入諭今更服閏曰死即死耳服不可更也以族誅恐之不動命武士舉金瓜擊其齒齒盡抗聲不絶遂族誅之福王時贈刑部尚書諡忠烈孫原貞德興人永樂進士授禮部主政厯郎中英宗初擢河南右參政初成祖徙江南富戸於北京逃且絶即於其鄉僉𥙷原貞請令官吏大户犯死罪者免其運甎𥙷富户數從之遷浙江布政使正統末閩浙盜叛遂拜兵部左侍郎鎮守浙江搗其巢斬賊首分兵剿平餘寇景泰三年進兵部尚書尋改鎮福建巳復移鎮浙江罷歸原貞所至有勞績在浙江名尢著王逢樂平人淹貫經史精研理學累徴不就宣徳初復以明經召見辭歸著言行志諸書學者稱松塢先生何英鄱陽人性警敏學於王逢得其傳累薦不起所著有四書釋要詩經增釋易經發明洪信文浮梁人性至孝將葬母值雨雪攀柩號慟雨雪為止廬於墓刻木為像朝夕哭奠事死如生者十有三年宣德中旌表胡居仁餘干人聞吳與弼講學崇仁徃師之築室梅溪山中事親讀書之外不涉人事居喪哀毁骨立三年不入寢其學以主忠信為先求放心為要謂聖學始終在於敬因以敬名齋端嚴凝重對妻子如嚴賓手置一冊詳書得失用自程考四方來學者日衆至築室居之常曰學以為己不求人知與羅倫張元楨友善數會於弋陽之龜峯餘干之應天寺證明所學督學李齡鍾成相繼聘主白鹿書院過饒城淮王請講易待以賓師之禮以布衣終身所著有居業録人以為薛瑄之後粹然一出於正居仁一人而己萬厯中從祀孔廟追諡文敬童軒鄱陽人景泰進士授南京吏科給事中詔採翠毛魚魫諸物軒諫止之擢雲南提學僉事校士公明以素諳厯法遷太常卿掌欽天監事宏治時厯南京禮部尚書極言東南歳辦西北差徭之困為人廉介寡合篤於内行好學問至老不倦卒贈太子少保戴珊浮梁人天順進士擢御史督南畿陜西學政厯浙江按察使福建布政使終任不攜一土物宏治二年擢右副都御史撫鄖陽討平劇盜厯南京刑部尚書召為左都御史帝晚年召對大臣珊與劉大夏晏見尢數一日侍坐帝曰時當述職諸大臣皆杜門如二卿雖日見客何害出白金賚之曰少佐而廉以老疾求退不許珊徳性和粹洞達無城府然往往不苟合不可以非義奪正德初卒贈太子太保諡恭簡董子仁樂平人成化進士擢兵科給事中偕同官陳鶴胡智疏劾大學士商輅尚書姚夔等帝不悅復與御史鄭巳等合詞攻之下獄廷杖復官又疏參李希安以羽流不宜侍經筵遂寢其命厯臾科都給事中尋以事謫石白知縣孝宗朝官至四川參議舒清徳興人成化進士授工部主事厯營繕郎中裁抑浮費忤宦官不顧擢河南參議有政績再遷四川布政使立遞減法以便民宏治中改廣西益有聲先是清在四川憲宗遣中使取銅鼓諸物及是孝宗亦索古琴皆抗疏切諫尋以疾歸正德中姚源賊過其里相戒曰此廉吏家斂兵而去祝瀾德興人成化進士授兵科給事中以直言忤㫖廷杖謫安州判遷國子監丞上孔廟祀儀以顔曽思既配於殿而其父尚列於廡先師父母未襃封請别立廟以無繇點鯉配享並罷公伯察荀况從祀部議不合再謫雲南經厯後其議皆采行瀾為人多大節為諸生時聘舒氏女無何盲其父母欲罷婚瀾不可竟娶瞽女與之終身孫需原貞孫成化進士為常州府推官擢南京御史偕同官劾僧繼曉忤㫖予杖出為四川副使宏治中累官右副都御史巡撫河南改撫陜西鄖陽所至有善政正德中累遷南京工部尚書改刑吏二部疏陳修政弭災戒游畋抑權倖諸事乞休歸卒諡清簡張憲德興人成化進士授考功主事厯郎中凡十四年廉慎如一日尚書王恕賢之遂擢山東左參政累官南京工部尚書致仕憲與孫需同里同舉進士相代為尚書又同以明德稱張吉餘干人成化進士授工部主事時李孜省僧繼曉以左道進㑹星變吉上疏請親賢圖治修徳遠姦遂極言孜省繼曉之罪忤㫖謫景東通判以禮義教民土官遣子受學宏治中厯肇慶同知梧州知府廣西兵備副使終貴州布政使咸以善政聞吉學宗洛閩不喜陸象山為陸學訂疑以正之晚歲涵養益粹疾甚猶衣冠正坐學者稱古城先生蘇章餘干人成化進士為兵部武選主事以星變言事謫姚安通判再遷延平知府有政績終浙江參政彭程鄱陽人成化進士授御史巡視京城降人雜處多為盜事發則投戚里閹豎程每先幾制之有發輒得廵鹽兩浙嚴毅莫敢干代還巡視光禄以諫造皇壇器忤㫖下錦衣獄並家屬戍邊余祐鄱陽人年十九師事胡居仁居仁以女妻之宏治十三年登進士為南京刑部員外郎以事忤劉瑾落職瑾誅起為福州知府有治行後遷徐州兵備副使忤中官進鮮過徐者復調南寕同知嘉靖初厯雲南布政使遷吏部右侍郎未至卒祐學務有用不事空言常舉誠敬以教學者為得居仁之傳余廷瓚鄱陽人正徳進士授行人司副武宗將南巡廷瓚上疏陳十不可下獄杖死世宗立贈太常寺丞福王時追諡忠愍史桂芳鄱陽人嘉靖進士性耿介宗陳獻章之學初知歙縣廉直愛民督師趙文華檄取萬金犒師不應厯知延平汝寕二府專以德化民遷兩浙運使老幼送者數千人緼𫀆糲食始終廉介一節云李頤餘干人隆慶進士萬厯初擢御史清軍湖廣廣西請免士民遠戍祇充傍近衛所軍忤張居正出為湖州知府累擢右僉都御史巡撫順天諾音酋長昂屢擾邊頣設伏擒其心腹七人又督將士敗伯牙于羅文谷在鎮十年威望大著二十九年以工部右侍郎管理河道議上築决口下疏故道為經久計以勞卒諾音舊作朶顔伯牙舊作巴雅爾今俱改正羅伏龍餘干人崇禎庚午舉人福王時參史可法幕為江都知縣大兵圍揚州可法謂伏龍亟去伏龍曰大丈夫豈可臨難苟免城破死之乾隆四十一年賜諡節愍本朝揚鼎臣樂平人順治十七年父明由為盜所執索金取贖罄家不能得鼎臣毅然以身易父還遂被害彭允升安仁人為縣諸生康熙十四年盜入安仁允升團結鄉勇禦之被執令招降所部不從遂遇害沙坤瑞餘干人性至孝年十六喪父貧無資典身以殮種蔬養母母年八十餘衰病不能起朝夕奉侍無怠及殁廬墓三年致馴虎伏蟒之異戴如芹樂平諸生孝行著聞乾隆四十一年旌王傳鄱陽人康熙進士厯官國子祭酒孝友性成品誼醇篤居官尢甘氷蘖杜絶苞苴督學山左以公明稱雍正甲辰世宗憲皇帝臨雍進呈大學講義精微貫徹理學章明卒於官賜祭葬入祀鄉賢祠張時餘干􅮇生居家孝友無間博通經史以詩詞見稱於時入祀郷賢祠范文程樂平人瀋陽籍順治甲申以翊戴功晉内秘書院大學士贊襄治理整飭紀綱悉以寛六行之無不合節晉太師諡文肅入祀鄉賢祠范承謨樂平人瀋陽籍順治進士官内翰林秘書院學士授閩浙總督被逆所執殉節諡忠貞入祀鄉賢祠李思謨浮梁人知溧陽縣清慎廉明縣以治稱後退居林下好善樂施扶危濟困孜孜志倦入祀鄉賢祠鮑文宏浮梁人授惠州推官治稱平允設計討平巨寇釋脅從田程輩百餘人查盤肇慶氷蘖自勵入祀郷賢祠流寓唐盧綸河中蒲人大厯十才子之一嘗避天寶亂客鄱陽宋顧臨會稽人紹興初知河南府忌者譖為黨人斥饒州居住蘇昞武功人常從張載學後復師事二程元祐末吕大中以布衣薦為太常博士坐元符中上書言事入邪籍編管饒州卒薛仁輔河東人官大理少卿時秦檜搆岳氏父子獄仁輔冤之不署奏牘檜怒編管遇赦移饒因卜居樂平之安巷今薛家塘即其遺址張運貴溪人高宗時以親老還江東寓居鄱孝宗時請老復祠祿鄱大饑運首發粟二千石以賑之自是民爭出粟以濟江萬里都昌人為右丞相與賈似道不合求退僑居饒州聞襄樊失守鑿池芝山後圃扁其亭曰止水人莫喻其意及聞警執門人陳偉器手曰大勢不可支余雖不在位當與國為存亡城破赴止水死趙崇榞為郴州守元兵破饒州崇榞寓居城中死之元張翦晉寕人父為安仁縣典史翥少受業於李存道徳性命之說多所研究至正之亂僑居雲錦山中列女唐程烈女樂平人肅宗時女父兄為盜所殺因掠女去隱忍十餘年手刃盡誅其黨刳其肝心以祭父兄宋程迥取春秋復讐之義頌之曰大而得其正者也表為英孝程烈女饒娥宇瓊真樂平人生小家勤織絍頗自修整父勣漁於江遇風濤舟覆屍不出娥年十四哭水上不食三日死俄大震電水蟲多死勣屍浮出鄉人異之具禮葬勣及娥於鄱水之隂縣令魏仲光謁其墓建中初黜陟使鄭叔則旌其閭河東柳宗元為立碑宋王袤妻趙氏樂平人建炎中袤監上高酒税金兵至袤棄官走趙從行遇金人縛以去繫袤夫婦於劉氏門而入剽掠趙宛轉解縳并解袤謂曰君速去俄而兵出問袤安往趙他指以誤之兵追之不得怒趙欺已殺之元劉楫妻趙氏饒州人早寡不忍獨生以死從夫事聞褒表明徐德安妻陳氏樂平人年二十夫病革曰汝年少無子善事他人陳泣曰既為君婦忍事二姓乎即割耳剪髪為誓夫亡纳之棺中終身守節胡閏女名郡奴鄱陽人閏死時女甫四歳没入功臣家為爨婢收養稍長識文義髪至寸即截去塗面垢形積二十餘年至洪熙初遇赦還鄉誓不嫁死時年五十六郷人私諡曰貞姑嘉靖中提學副使邵銳立祠祀閏以女附福王時賜諡孝貞夏璞妻江氏餘干人正徳中賊至江抱方晬弟走不得脫賊將縛之紿曰願與將軍俱顧父年老惟此一弟幸得全之賊以為信縱令置所抱兒出候橋頭至橋遂大罵投橋下死同縣康萬欽妻彭氏為賊所執投水死夏二祥妻董氏曹旺七妻齊氏俱為賊所執抱樹不行罵賊被害易鎮妻蔡氏安仁人賊掠其家執之度不得脫紿曰我有金釵匿窖中願往取賊不疑解其縛遂投池死葉梁妻吳氏萬年人正德中盜起梁被創埀死屢目呉呉知夫意以爪碎其容又斷二指纳棺中後母家欲他遣遂不食死胡氏名貴貞樂平人生時父母欲不舉其鄰曾媪抱之歸與子天福同乳欲俟其長而配焉天福年十八父母繼亡家甚落女父欲奪以配富家女曰我於曾分姑婦恩母子可以饑寒棄之耶乃依從姑以居華舍單淺外人未嘗識其面其兄乘天福未婚強曳以歸出示求聘者金寶笄􅎖女知不免潛入房縊死董琪妻張氏樂平人年二十六夫殁以節自勵時姚源盜猖獗母懼為盜所汚遣其弟諷之改嫁張泣曰從一而終婦人之義也麾其弟去一夕忽自縊張烈女名桂秀浮梁人張啓明女有殊色許聘凌氏子凌日貧落父母欲改嫁會祁門少年鄭天祐以星術止其家未有室父母私許之懼女素剛乃俱佯出屬天祐誘之女紿曰俟沐浴以從浴竟執槌奮擊天祐中其額昏暈仆地遂自縊李介妻劉氏安仁人正徳九年寇至擁之以行劉憤罵曰為婦人而辱於賊生何以見夫死何以見祖宗於地下乃投池中賊殺之祝瓊妻程氏德興人正德中姚源賊起程與瓊及二子俱被執程紿曰但得二子還惟汝命賊許之釋瓊攜長子歸程度夫男已脫大罵不絶口遂遇害數日族人見幼孩銜死人乳者乃程氏也收葬之山曜妻鄭氏鄱陽鄭松女夫殁屢欲從死救免母覘其家寥落強受聘鄭紿就浴室自縫其裏衣投繯而死夏立夫妻倪氏安仁人年二十六立夫病革屬曰吾死子幼汝無所依宜改適倪泣下即截左耳以誓葉文光妻嚴氏樂平人年二十二而寡刺一目以誓終身不見婣黨崔繼勲妻黎氏名罕壁樂平人年十八歸崔越四年夫死無子黎不食七日祖姑王姑戴諭曰汝死吾誰依遂斷髪守節玉瞽且齒落乃嚼食進之戴患瘋七年竭力奉侍及兩姑殁治喪事盡禮一飲食必薦夫至老衰絰不去體胡士達妻鄒氏樂平人年十九孀居姑病割股以進兄弟以無子欲嫁之鄒自殺董球妻汪氏德興人球與弟珖皆早卒有子俱幼注謂珖婦程氏曰董氏一綫在我與汝當同心撫孤慮有奪程志者一日披衰服各抱孤詣族長前曰門衰祚薄僅存二黄口兩嫠義在存後有死無二惟尊長扶植聞者流涕及二孤成立汪目久盲聞姪舉子喜甚趨視目忽明三日竟如故人以為積誠所致郭氏鄱陽人崇禎時同夫王某避亂被執紿曰釋吾夫惟汝命夫得脱郭躍入水挽之出終不從支解之同縣陳某妻金氏胡肇鳳妻主氏羅欽相妻鄒氏周繼曾妻李氏方如珪妻黄氏方思溪女張氏女俱被掠不從見殺陳某妻嚴氏李開先妻胡氏史古乘妻姜氏邱學舜妻王氏徐徳八妻伍氏計雪崧妻毛氏凌俊妻朱氏查太初妻程氏黄裳吉妾陳氏俱遭亂投水死江𥙿妻嚴氏程洞妻胡氏俱自縊死按舊志載鄱陽訓導王化廣女河南人被賊掠至百花洲刃交胸腹而死謹附記包氏女浮梁人包墊女年十七為亂兵所獲不從自以手掠腦後髪延頸就刃時甚暑屍暴數日如生同縣汪榮祖妻程氏名端姫年二十而寡兵亂被執與從姊徳仙同赴溪水死黄家棟妻金氏亦為亂兵所掠強載舟中跳入水死王捷妻黄氏𬒳執不從剖身死夏士祥妻吳氏安仁人為流寇所掠大罵赴河死董若玠妻張氏德興人生子甫週與乳姆江氏俱被寇執不從曳之行至河濱張抱子躍起與姆俱投水死是夜漁人見嬰兒浮水隨流而號視之乃一女屍載兒於腹救兒而屍始沉本朝鄭有位妻張氏名仙春浮梁人為賊所獲奮罵不從賊持刃威逼即奪刀自刎死曹丹赤妻葉氏萬年人順治八年土寇起氏避入馬耳山為賊所執欲辱之不從奪刀自刎死十四年旌劉成立妻張氏浮梁人早寡與妾邱氏同心撫孤守節康熙十三年賊掠縣中張懼辱投崖下死邱亦自縊李廣生妻陳氏安仁人里豪欲汚之不從身死康熙四十三年旌程新益妻王氏鄱陽人幼􅈺姆訓年二十有四而寡撫孤成立永矢貞操乾隆五年旌同縣汪日焜妻袁氏江鏐妻史氏程藎臣妻陳氏黄秀楊妻方氏鄭孝儀妻彭氏程飛鶴妻陳氏李仁求妻王氏陳材慶妻史氏左文彬妻馬氏鍾秀妻黄氏金學澄妻姜氏程雲鵬妻徐氏閔原妻汪氏計書冊妻吳氏李材士妻余氏烈婦李正照妻葉氏監生陳國謨妻陳氏貞女張邦憲未婚妻劉氏呉肇茂未婚妻周氏金有璧未婚妻胡氏烈女陳凖弟均乾隆年間旌呉其幹妻張氏餘干人年二十餘而寡事姑以孝聞守節數十年如一日同縣袁天象妻魏氏洪含妻張氏章臺妻姜氏周惟恒妻唋氏盧有震妻舒氏周振萬妻齊氏李履祥妻吳氏徐崇章妻高氏余有章妻鄒氏余永凝妻張氏李師熺妻張氏鄒首倫妻胡氏洪鑾妻張氏舒溡妻傅氏張嘉美妻周氏胡學宗妻艾氏萬瑆妻吳氏萬畦妾洪氏呉金璽妻張氏李承謨妻呉氏戴攻士妻虞氏均乾隆年間旌朱保穀妻方氏樂平人少秉孝德父母病割股以救年二十有二適朱踰年夫亡遺孤纔三月氏殷勤鞠育以承宗桃苦守三十八年建坊旌同縣何雲騰妻張氏徐夢熿妻蔣氏楊錠妻戴氏朱廷鵠妻黄氏劉鏕妻邵氏余有