叔茂皆海内名士充還教授鄉里嘗言圖緯非聖人之學不以為教察孝廉為郎卒三國漢杜微涪人任安弟子劉璋辟為從事先主定蜀常稱聾闔門不出建興二年丞相亮領益州牧選為主簿輿而致之亮引見與書誘勸欲使以德輔時微固辭疾篤亮表授諫議大夫從其所志尹默涪人少與李仁俱受學司馬徽宋宗等博通五經專精左氏春秋自劉歆條列鄭衆賈逵諸注略皆誦述以左傳授後主後主立拜諌議大夫丞相軍祭酒子宗傳其業亦為博士李譔涪人父仁字德賢與尹默俱游荆州從司馬徽宋忠等學譔具傳其業又從黙講論義理五經諸子無不該覽延熙初為太子中庶子右中郎將著古文周易尚書毛詩三禮左氏註解皆依準賈馬異於鄭康成與王肅初不見其所述而義歸多同景耀中卒秦宓綿竹人少有才學州郡辟命輒辭疾不往先主定益州夏侯纂請宓為師友祭酒領五官掾稱曰仲父宓稱疾在茅舍纂將功曹古朴等即宓第宴談宓臥如故益州辟宓為從事祭酒先主將東征呉宓陳天時不利坐下獄貸出建興二年丞相亮領益州牧選為别駕中郎吳使張温來聘百官往餞温聞宓博學欲以辯窮之宓荅問如響應聲而出温大敬服遷大司農卒文恭梓潼人以才幹為州牧諸葛亮治中從事丞相參軍李福涪人先主初為成都令建興初遷巴西太守為江州督入為尚書僕射封平陽亭侯延熙初以前監軍領司馬福為人精識果銳敏於從政諸葛亮於武功病篤後主遣福省視問以國家大計福還奉使稱旨晉李驤福之子有才名為尚書郎與成都杜軫齊名一時每有議論朝廷莫能折時稱蜀有二郎司馬勝之綿竹人通毛詩三禮舉秀才厯廣都新繁令政理尤異徵為散騎侍郎以疾辭去即家拜漢嘉太守固讓不之官閒居清靜訓化鄉閭以恭敬為先南北朝宋范柏年梓潼人初為梁州將劉亮使出都咨事見明帝帝言次及廣州貪泉因問柏年卿州復有此水否答曰梁州唯有文川武鄉廉泉讓水又問卿宅在何處曰臣所居在廉讓之閒帝嘉其善答因見知厯任内外終於梁州刺史梁李膺涪人有才辯初為涪令益州刺史劉季連反召膺膺拒之鄧元起討季連軍乏糧或言巴西新附二萬餘家檢籍罰粟所獲必厚膺諌曰前有嚴敵後無繼援小民始附於我觀德若糾以刻薄衆心必離雖悔無及膺乃躬勸富民上軍資米得三萬斛後為州主簿使至都武帝悦之厯太僕卿著益州記三卷魏李苗膺之子出後叔父畎有文武才幹除散騎侍郎孝昌中為西北道行臺平汾絳賊及爾朱世隆反苗奮然曰今朝廷有不測之危正忠臣效命之日臣雖不武請以一旅徑斷河橋魏主壯而許焉苗乃募人從馬渚上流以舟師夜下縱火船焚橋賊兵爭橋没水死者甚衆苗泊於小渚以侍南援官軍不至力戰而死帝哀傷之贈車騎大將軍儀同三司諡忠烈唐李白唐宗室其先隋末以罪徙西域神龍初還客巴西白十嵗通詩書既長隱岷山天寶初至長安賀知章見其文歎曰子謫仙人也言於上召見賜食詔供奉翰林帝欲白為樂章召入白已醉援筆文成白驁放不自修懇求還山因浮游四方後至江州永王璘辟為府僚佐璘起兵逃還彭澤璘敗當誅初白游并州見郭子儀奇之嘗犯法白為救免至是子儀請解官以贖詔長流夜郎會赦還終於采石馬冬梓潼人與同縣王秦舉王興嗣及巴西韋士宗文博熒文詮皆以孝行著旌表賜粟帛宋楊允恭綿竹人乾德中王師平蜀羣盜竊發允恭為賊所獲以計逃歸客省使丁德裕討賊允恭以策干之賊平補殿前承㫖太平興國中為廣連都巡檢使以招捕海寇功轉洛宛副使眞宗即位改西京左藏庫使極言川陜鐵錢之弊又為荆湖江浙都巡檢使卒於昇州允恭有膽幹王小波之亂李順兄自榮據綿竹士人多被脅從允恭兄允升弟允元率鄉里子弟併力破之又為王師鄉導執自榮詣劒門以獻詔授允升本縣令允元什邡令允恭子可咸平元年進士善屬文有吏幹官至都官員外郎楊告允恭次子允恭死賜告同學究出身調廬江尉累遷開封府推官使趙元昊不屈拜右諫議大夫知江寕府時號能吏李誼伯綿竹人皇祐五年進士幼孝謹長通六經厯威卭果漢四郡守贈金紫光祿大夫有詩賦三十卷雜文二十卷楊繪綿竹人少奇警登進士為開封府推官仁宗愛其才欲超寘侍從執政以其年少不用以母老請知眉州神宗立召知諌院擢翰林學士御史中丞時王安石用事賢士多謝去繪言老成之人不可不惜當今舊臣如范鎭歐陽修富弼司馬光王陶多引疾求去陛下不可不思其故免役法行繪陳十害安石使曾布疏其説詔繪分折固執前議遂罷為侍讀學士知亳州再為翰林學士議者欲加孔子帝號繪以為非禮從之元祐初知杭州卒繪性疎曠然表裏洞達一出於誠為范祖禹所器重為文立就有文集八十卷宇文之邵綿竹人舉進士為文州曲水令神宗即位求言上疏論時政不報遂致仕以太子中允歸自强於學不易其志日與交友為經史琴酒之樂司馬光曰吾聞志不行顧祿位如錙銖道不同視富貴如草芥今於之邵見之矣范鎭亦謂之邵位下而言高學富而行篤其為兩賢推重蓋如此張紘綿竹人至和元年知雷州瓊黎弗靖紘熟兵事比至冦息暇日延父老授諸生條教悉更舊習又增治城壘闢田瀦水為久遠計雷人戴之張咸綿竹人元豐進士元祐初詔復六科哲宗親擢第一官至成都節度判官其學六藝百家厯代文史無不該貫為文長於序事張浚咸之子第進士靖康初為太常主簿張邦昌僭立逃入太學中聞高宗即位馳赴南京官侍御史上言中原天下根本願修葺東京關陜襄鄧以待巡幸遷御營使司參贊公事浚度金人必來攻請預為備皆笑其過巳而金人果南侵命浚於吳門節制軍馬會苗傅劉正彥作亂浚招張俊韓世忠同起兵平難高宗欲相浚浚以晚進不敢當浚謂中興當自關陜始慷慨請行詔以浚為川陜宣撫處置使屢挫金兵扼於吕頤浩朱勝非以本官提舉洞霄宫居福州金兵南下召浚除知樞密院赴江上視師將士勇氣百倍旋除尚書右僕射同中書門下平章事與趙鼎輔治務在塞倖門抑近習奏遣岳飛屯荆襄以圖中原每奏對必反覆言讎恥之大上改容流涕出為福建安撫使治海舟為直指山東之計秦檜怒之謫居連州徙永州誣以大逆必欲殺之檜死乃免金兵南侵起浚判建康府乘輿臨幸衛士見浚無不以手加額車駕將還勞浚曰卿在此朕無北顧憂矣孝宗即位召浚入見浚言人主之學以心爲本一心合天何事不濟孝宗悚然除少傅江淮東西路宣撫使封魏國公親督諸將伐金進克宿州中原震動尋拜同平章事議進幸建康詔浚行視江淮金人聞浚來亟撤兵歸復爲湯思退等所毀凡八章乞致仕浚去遂決和議後得疾手書付二子曰吾甞相國不能恢復中原死不當葬我先人墓左葬我衡山下足矣卒贈太師諡忠獻所著有易解及雜說十卷文集十卷奏議二十卷張栻浚之子長師胡宏宏一見即以孔門論仁親切之㫖告之拭退而思若有得焉宏曰聖門有人矣拭益自奮勵以古聖賢自期作希顔錄以蔭除直祕閣孝崇即位浚開府治戎栻内贊密謀外參庶務幕府諸人皆自謂不及閒以軍事入奏因言陛下以復讎爲心即天理之所存也願益加省察無或稍息則功可必成孝宗異其言浚没後朝議講和栻力言其非不報起知嚴州召爲吏部侍郎宰相謂敵勢衰弱可圖上以問栻栻言國家兵弱財匱敵雖可圖而我實未足圖敵上默然栻因出所奏疏上嘉歎面諭當以卿為講官除左司員外郎知閣門事張說除簽書樞密院事栻極言其不可命得中寢栻在朝未期嵗召對至六七所言大抵皆修身務學畏天恤人抑僥倖屏䜛諛後去職提舉武夷沖佑觀病且死猶手疏勸上親君子遠小人信任防一己之偏好惡公天下之理天下傳誦之張枃栻之弟以父蔭通判嚴州厯知袁衢二州兩知臨安府俱以能稱孝宗觀湖枃以彈壓伏謁道左孝宗止輦問勞賜以酒炙進端明殿學士知建康府乞祠卒枃天分高爽吏材敏給遇事不凝滯多隨宜變通所至以治辦稱南渡以來論尹京者以枃為首張洽栻之孫嘉定中揚州司理參軍有獄囚久不決洽鞫得其情杖殺之有弟兄爭財者洽諭之曰訟於官祇為吏胥計且冒法以求勝孰若各全手足之愛乎辭氣懇切訟者感悟後為白鹿洞書院長選諸生好學者日與講論務發明理奥云張梲綿竹人紹興二年進士夔州路提點刑獄為政一本忠厚下教禁戢四事合一路之獄凡六十餘所令下踰月以獄空聞者三十八所又夔恭二州欠經制錢一萬七千有餘棁言於朝併得免張忠恕枃之子以祖任監樓店務嘉定中累遷司農丞後入對極言邊事寶慶初詔求直言忠恕陳八事朝紳傳誦魏了翁歎曰忠獻有後矣眞德秀聞之更納交焉忠恕又因輪對引伯父栻語曰當求曉事之臣不求辦事之臣欲求仗節死義之臣必求犯顔敢諌之臣語益愷切力請外𥙷出知贛州後提舉沖佑觀卒何充德陽人秘書監耕之孫通判黎州元兵破卭崍關自刺不死軍帥許以高位充曰吾三世食趙氏祿為趙氏死不憾自是絕食敵知不可强殺之男士麟孫駒行從子仲桂皆死之王讚諦梓潼人少喪親負土成墳二十年不脱麻衣黜陟使韋正奏劒南孝子十六人讚諦為首元鄧文原綿州人年十五通春秋至元中為杭州路儒學正擢應奉翰林文字皇慶初為國子司業至官首建白更學校之政當路因循重於改作論不合移病去至治𥘉召為集賢殿學士因地震陳弭災之道時不能用泰定二年拜翰林侍講學士天厯初卒文原内嚴而外恕家貧而行廉初客京師有一書生病篤出槖中金囑文原以歸其親既死而同寓生竊金去文原買金償死者家終身不以語人有文集内制集若干卷至順五年諡文肅明霍繼宗安縣人永樂時貢生擢御史剛正不阿巡按山東摘姦除弊風采赫然祀鄉賢王志恭綿州人天順甲申趙鐸肆掠州境志恭倡義討賊率衆二萬戰於德陽賊潰單騎追之爲矛所中洞脅腸出以手捫之麾衆前進力絕而死事聞贈始信校尉廕其子百户羅應祥綿州人趙鐸之變應祥率衆拒剿爲賊所刺腸出裂帛裹之轉戰二十里賊潰去至家乃卒趙珊綿竹人趙鐸叛德陽珊與同縣吳瓊學倡義討賊賊潰極力追之同時遇害均詔錄其子恤其家金獻民綿州人成化進士宏治初授御史按雲南順天並著風裁世宗立累擢左都御史以災異修省條上時政五事多報可遷刑部尚書改兵部初大禮議起獻民偕廷臣疏爭及左順門哭諌帝不悅罷歸羅世守德陽人以明經令江州嘗書狀尾曰做官受私賄虧心又害理敢因一飱飯喫盡子孫米尋歸民像祀之何光裕梓潼人嘉靖進士由庶吉士除給事中巡視京營劾罷尚書路迎建議節財穴費大省及仇鸞開馬市尚書史道主之光裕與御史龔愷等劾道并及鸞忤㫖死杖下隆慶初贈太常少卿易以巽安縣人萬厯甲戌進士雲南按察使決獄明允加大理寺卿祀鄉賢趙宗普安縣人由鄉貢令潛山當流寇要衝宗普抵任冒死請命正供悉免流亡漸集尋𥙷宿松令舉清廉第一升議部郎卒入祀名宦鄉賢李廣生安縣人監生中丞鑑之子獻賊據蜀催廣生赴監歎曰吾大臣子也肯為賊屈乎偕妻董氏投繯死趙鴻偉安縣人貢生教子晟成進士獻賊據成都逼晟赴監不應全家殉難本朝乾隆四十一年予入忠義祠劉宇揚綿竹人崇禎時以户部郎中任關南道時漢中巨寇羣起兼以饑饉宇揚辦餉賑晝夜乘城督守者一年兵荒後多方懷撫以勞卒於官贈太僕寺卿刁化神綿竹人官户部郎中崇禎十七年獻賊陷城死之本朝乾隆四十一年賜諡忠愍周紹孔綿竹人與弟繼孔述孔奉母文氏並以孝稱流賊亂蜀母子兄弟俱𬒳執賊欲刃其母紹孔延頸曰勿殺母但殺我賊殺之仍不舍其母繼孔曰但活母再殺我又殺之復將及母述孔前曰併殺我勿殺母亦殺之卒憐而舍其母焉楊可賢綿竹人貢生崇禎末獻賊執可賢挾之曰汝子國柱守城令以城降免汝死可賢佯諾之及臨城語子曰賊兵不滿千汝堅守勿念我也賊殺之國柱率士民數百迎戰力盡而死本朝乾隆四十一年予入忠義祠本朝邱希孔綿州諸生爲人倜儻負氣節初避兵漢南順治六年寕夏巡撫偉其材令署寕武同知治花馬池姜瓖賊將劉登棲陷城希孔踞坐罵賊賊怒斷其頭尸端拱生上不爲動賊懼以爲神羅拜之乃仆張舜舉綿竹人順天進士順治六年知陜西蒲城縣時蒲當王永强竊據之後城市如墟舜舉至百廢俱興治績甚著劉修賢德陽人康熙壬子舉於鄉滇藩吳逆屢徴不赴遁迹深山養親全身吳逆敗官雲南富民令招墾捐積以甦民因莅任七年舉廉能第一擢御史入祀鄉賢祠白良玉梓潼人素有幹濟才時土賊為害良玉籌畫捍圉鄉里咸蒙其庇中順治甲午舉人康熙七年知山西高平縣有惠政在官七載以廉幹行取抵京而卒王任閎梓潼人康熙壬子舉人吳三桂僭竊屢徴不至隱遁山中窮約終身沈溶安縣人官貴州咸寕鎭千總乾隆四十年隨征金川陣亡卹廕如例張大斌梓潼人官川北鎭標把總嘉慶元年隨剿教匪於東鄉縣陣亡卹廕如例陳泰綿州人官把總嘉慶三年隨剿敎匪擊賊陣亡卹廕如例曾彰泗德陽人嘉慶十年署陜西洋縣有循聲時五郎關新兵糾衆殺將備聞警方繕城堞而賊已至督軍民分守彰泗自守西門城潰率衆巷戰力竭被執賊挾至城隍廟縛於柱以湯灌之糜爛而死從死者家丁韋升謝清二人事聞賜祭葬以知州卹廕並建祠於城隍廟春秋享祀楊奇龍德陽人少孤母喜食魚隆冬盛雪亦躬取之母病衣不解帶者八載流寓漢邊韶浚儀人博學多文時人語曰邊孝先腹便便流寓梓潼教授生徒常百餘桓帝時徴為大中大夫今縣西有邊孝先臥游亭碑碣尚存列女漢文季姜梓潼人將作大匠王敬伯之妻少讀詩禮前後八子愛育親繼如一堂子孫雖二千石猶杖之内門相化服姑之教任安母姚氏綿竹人雍睦閨門早寡立義資安事大儒安所授弟子毎為字恤以勉其志姜詩妻龎行詩別有傳行事姑晝夜紡績以給養姑好飲江水命子往汲溺死祕不使姑知託言遣詣學常作冬夏衣投水中詭謂寄子云詩呼妻為春應稍遲見遣不敢遠去採蘆芽取魚因鄰母致姑姑乃飭還子名安安所居後為祠祀焉司馬雅妻姜嬪綿竹人父穆為狄道長徙朔方往尋父母喪夫亡守義以終天子閔悼焉郭孟妻楊氏涪楊文女也失母八嵗父為人所殺依外祖鄭行年十七適孟殺父者數來孟家女涕泣謂孟曰家無男昆大讎未報不能一日忘也父子恩深恐卒狂惑益君禍患尋杖殺之將自殺孟與俱逃涪令聞而止之中平四年表其門人尊為敬楊與文杜稱三媛虞顯妻杜慈巴郡人杜季女年十八適顯顯亡無子季欲與改嫁慈曰受命虞氏虞氏早亡妾之不幸當生事賢姑季知不可奪密謀逼之慈縊而死宋張氏女羅江人母楊氏寡居其典庫乙死於庫莫知殺者提點刑獄命石泉軍劾治楊言與女同榻實無他逮女拷掠無實謂母曰吾今死將訟冤於天言終而絕石泉地大震三日天雨雪勘官李志安疑其獄具衣冠禱於天俄偵得張女饋食之夫袁大一訊即伏楊得免郡榜其所居曰孝感坊張浚母綿竹人紹興十六年彗星出西方浚將極論時事恐貽母憂母訝其瘠問故浚以實對母誦其父對策之語曰臣願言而死於斧鉞不忍不言以負陛下浚意乃決何充妻陳氏德陽人充通判黎州適關破充自刺不死敵斬其首陳罵不絶口東望再拜曰臣夫婦雖死可以對趙氏無愧矣衆以石擊殺之明白氏綿州人正德閒鄢藍賊至被執誓死不從遇害事聞旌表同州髙王政繼妻鄒氏三十而寡守節至八十卒劉繼魁妻安氏德陽人魁死安年二十四有謀娶安者安即登樓閉户不下者三年後守節五十八年年八十二卒同縣閆氏名成哥里豪金海聘爲媳海妻瞽子幼欲逼之百計不從數加捶楚三年餘不少屈海恚甚一日入氏室逼之不從海竟殺之訟於官驗之猶處子也官爲捐金立祠祀之又張氏因死父難天降紅雨事聞建坊祠祀之同知范鵬妾趙氏年十八鵬故水漿不入口尋赴葬所嗚咽而絕高邦智妻杜氏守節厯數十年教二子成名庠生王大化妻潘氏年十八守節持己甚嚴雖至親罕見其面事聞得旌吕淑英德陽貞女終身勤於女紅晚年出十指所積剏修三寸口石橋正德閒邑令勒石紀之又同邑黃貞女蓮姑事迹略同劉延齡妻曹氏綿竹人萬厯閒從延齡自歸化縣任歸道涪州遇寇氏偕女瓊姐投水死後其子宇揚以其事聞奉㫖建祠又延齡子關南道宇揚妻李氏與侍郎宇烈妻張氏大學士宇亮妻宋氏獻賊寇蜀三人皆以未亡人避西山白崖溝賊將劉文秀抵綿竹將抵溝訪氏所在三人相謂曰吾姑昔日涪水遇盜懼辱投水吾輩若受汚異日何以見姑與夫於地下遂同縊死又劉裔盛妻王氏宇亮子婦也獻賊獲裔盛於成都誘以官使回邑移家王不從遂自縊死又顧天澤妻雷氏崇禎末賊至城氏曰死有遲早無可免者此身不可辱遂抱幼女投井而死又楊元吉妻蕭氏賊至簫語元吉曰祖宗不可無後我力難行君宜遠避同死無益元吉泣去賊執蕭蕭紿曰素貧苦今相從吾願也賊信爲然行數武遇井躍入死之又貢生施奇才妻姜氏崇禎丁丑奇才北上流寇犯蜀姜避西山賊將至姜拔簪授婢曰吾不能逃汝速避萬一得生持此語若主吾不爲家門羞也遂投崖死蘇蒙宗妻史氏早寡撫子成立舉人陶以忠妻楊氏守節撫遺腹子成材膺選貢以孝聞詔建子孝母節坊庠生王鐸妻趙氏崇禎十年賊攻綿竹執鐸令跪不屈殺之復脅趙氏亦大罵賊又殺之黃守學母柳氏賊圍城柳氏自縊死王相妻某氏廖賊掠境氏與其女爲賊所執母女同聲罵賊遂遇害曹烈妻姚氏廖賊掠四鄉氏抱乳女潛林中爲賊所獲欲逼姚姚不可賊掖之行姚咬斷賊指賊怒殺之王宗道妻袁氏宗道嘗割股以逾父病及獻賊屠綿見袁美逼之行袁憤罵不從賊殺之文仕舉妻勾氏崇禎末賊至被執迫從勾不屈賊環碎其衣勾大罵賊怒分解其尸陶修吉妻龎氏崇禎末賊陷城夫婦𬒳執中途語賊曰我願往何用縛為賊寛之夫婦遂投崖死李資生妻董氏安縣人夫太學生適獻賊至資生誓不屈願以身殉氏從之共投繯死同縣張心法妻皮氏夫殁守節教子成立張玉卿妻徐氏夫卒撫二子守節二十年貞節如一日後死於賊趙節妻魏氏梓潼人崇禎十年李賊破城為所執魏紿賊曰家有積金藏之江邊願取以行賊喜同至圍子潭魏奮身投水死同縣蒲先春妻趙氏獻賊至被驅罵賊投江死又魏元良妻趙氏亦被執以甘言紿賊乘閒投繯死庠生尚聘妻雒氏聘早逝苦節四十餘年經旌表諸生王子儁妻某氏夫殁氏勤紡績奉姑教子本朝夏之華妻嚴氏綿竹人吳三桂兵至被執持刃脅汚之不從沈淵以死王之翰妻裴氏梓潼人吳逆之變為賊所逼投潼水死吳肖辰妻何氏綿州人與同縣徐成際妻董氏均以夫亡守節俱雍正年閒旌倪攀桂妻馬氏德陽人夫亡守節養姑訓子以終雍正年閒旌胡繼鳳妻王氏綿竹人夫亡守節厯年八十有餘疾革子大振割股肉以進及卒廬墓盡哀時人稱其一門節孝同縣節婦王允迪妻梁氏夫亡守節教子一正成名均雍正年閒旌陳儒先妻李氏安縣人夜半山水暴漲鄰居男婦呼氏同升屋氏衣為水漂去守死不出曰露體求生勿為也翌日尸深埋沙土中惟首露外邑人神之祀節孝祠白良玉繼妻吳氏梓潼人通書史隨良玉任高平令嘗刲股以療夫病良玉卒扶櫬歸葬教子嵋成名苦節四十五年何紳妻王氏綿州人夫亡守節同州節婦鄭之產妻張氏邱嵩妻楊氏張含妻周氏魏禮麟妻蕭氏余益友妻黄氏仇秉巂妻何氏烈婦陳國遠妻青氏均乾隆年閒旌何金鏏妻李氏德陽人夫亡守節同縣節婦王添文妻蘇氏黎茂檜妻侯氏唐維翰妻邵氏曾國幹妻黃氏劉洪理妻王氏馬𢡟修妻酆氏鄧陽瑡妻劉氏胡永達妻張氏王雲崑妻曾氏烈婦余上仁妻宋氏申瑺妻馮氏貞女曹良美未婚妻蕭喬姑均乾隆年閒旌曾應玳妻馬氏羅江人夫亡守節訓子昌曙孫世愷皆登鄉科厯八十嵗終李梅妻郭氏安縣人夫亡守節同縣節婦吳道逵妻鄧氏劉紳妻龎氏均乾隆年閒旌文旭妻袁氏綿竹人夫亡守節同縣節婦詹聯桂妻張氏馬騂妻王氏張鳳翼妻勾氏趙麟妻李氏袁康妻楊氏楊其英妻胡氏張文佩妻羅氏徐永溢妻黃氏何元珠妻王氏楊新彩妻歐陽氏殷俸富妻傅氏周夢熊妻徐氏李思朝妻曾氏李彥鳯妻鄒氏李思忠妻潘氏烈女歐良純女歐氏均乾隆年閒旌張廷才妻冉氏梓潼人守正捐軀同縣烈女吳專女吳氏吳興女吳氏均乾隆年閒旌賈玉祥妻陳氏綿州人夫亡守節嘉慶初教匪犯境被執不從遇害同邑劉先禦妻汪氏避賊公子山賊破寨全家遇害嫂遺幼子氏抱於懷賊挾氏上馬兒哭賊攫兒撲殺之氏墮地哭曰我不死者為劉氏此子耳今何望遂觸石死袁安榮女二英許字樊氏聞賊過楊家灘攜利翦自隨避麥隴中爲賊搜出以翦刺賊臂賊碎其首而去安然女二姑然攜子橋娃與二姑避賊白家壩賊漸近姑謂父急逃生女不能隨當先投溪水以免辱言畢躍下橋娃偕死羅光庭妻梁氏朱朝相妻梁氏安啓基妻李氏妾姜氏安全妻裴氏安且豫妻常氏梁秀元妻王氏余順健妻魏氏敬泰妻安氏梁岳妻某氏子婦羅氏梁繪典妻陳氏安啓元妻高氏安祐妻楊氏王仕倫妻張氏張耀妻楊氏王文新妻董氏王正儒妻常氏胡天柱妻王氏楊有良妻黄氏劉國清妻熊氏徐鳳宣妻崔氏任國清妻蔡氏俆相元妻周氏王敬典女金蓮王世達女秀姑唐酉姑蒲朝隆女巖姑林中瓚女寅姑均遇賊不屈死節葉大魁女綿州人名滿姑許字陳氏年十六陳子卒父母爲擇配一痛而絕同州鄒國公女卯姑許字雷映悌未嫁夫卒女悲泣投井死何人表妻劉氏綿州人夫亡守節同州貞女陳氏均嘉慶九年旌申思敏妻車氏德陽人夫亡守節同縣節婦鐸文星妻李氏李遇陽妻張氏廖琮妻彭氏張永祿妻舒氏胡應善妻吳氏李培儒妻向氏李培宗妻鄧氏楊溍妻帖氏方應農妻曾氏尹順佩妻曾氏李蓉妻曾氏均嘉慶年閒旌徐光遠妻吕氏安縣人夫殁守節同縣節婦魏光輝妻韓氏黃郁妻張氏唐朝俊妻張氏魏光廷妻牟氏魏光輔妻陳氏周之聘妻黃氏均嘉慶年閒旌詹廷誾妻張氏綿竹人夫亡守節同縣節婦陳大志妻阮氏蔣良萬妻王氏李興妻蕭氏烈女劉楊氏均嘉慶年閒旌張鑑妻章氏梓潼人夫亡守節同縣節婦白橋妻陳氏金鼎妻陳氏均嘉慶年閒旌仙釋宋黃鹿眞人州人馬氏女名道興七嵗時遇異人授以鉛汞要術及笄將受聘攜囊杖䇿而去卜地修煉久之前異人復至授以黄白之術後道成乘黃鹿騰空而去異香終日不散明妙虛綿竹人自幼出家投禮鰲山和尚後游江西謁海禪師得其心印叢林爭歸之洪武初將辭世說偈畢端坐瞑囙衆悲泣良久妙虛開目曰為汝輩再住三年後如期而化江老軍名添富州人嘗從軍寕夏遇異人授以修養之術髪白反黒齒落復生能一食斗米鄉人毎請禱雨必驗風雨中屢日不動冬寒剖冰而浴年至九十九尸解去土產金唐書地理志綿州貢麩金銀唐書地理志巴西有銀鐵唐書地理志巴西魏城西昌有鐵鹽隋書地理志巴西有鹽井唐書地理志巴西魏城羅江鹽泉神泉有鹽漆寰宇記綿州產錦唐書地理志綿州土貢綾唐書地理志綿州貢紗唐書地