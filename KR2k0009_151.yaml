二縣分境之所故曰東西鹽井在州界元和志陽下鹽井在鹽泉縣西一里舊志熊家青家梁家劉家四井皆在州南三十里王家阮家二井皆在州東六十里統志今綿州鹽井有中井十一所下井十所旌陽丹井在德陽縣東關内相傳許遜浴丹於此其水香冽暑飲尤宜月波井在綿竹縣治東一里漢嚴君平鑿每朝霞霽月井中波紋盪漾掩映交輝古蹟涪縣故城在州東五里漢置屬廣漢郡東晉後為梓潼郡治梁魏改曰巴西為巴西郡治隋為金山郡治元省入州華陽國志涪縣去成都三百五十里水通於巴為蜀東北之要區蜀時大將軍鎭之元和志綿州西南至漠州一百八十里東南至梓州一百三十里西至茂州取松嶺路三百七十里北至龍州二百二十里州理城漢涪縣也東據天池西臨涪水為蜀東北之要衝梁天監中張齊為太守更造樓櫓卻敵有東門西門東門久塞富樂山氣所衝門開州亂宋元嘉初王懷業開之果至覆敗爾後還塞陽泉故城在德陽縣西蜀漢分綿竹縣置屬廣漢郡晉廢後復置宋齊因之後周移晉熙郡治此隋𥘉郡還治晉熙此城遂廢舊志陽泉與雒郪什邡新都五城諸縣宋書州郡志同屬廣漢郡皆在今德陽縣南界而德陽之北為南陰平郡今綿竹在其西北為晉熙郡陽泉既屬廣漢不應越兩郡而更在晉熙之北也縣志謂陽泉在綿竹縣北非是南陰平故城在德陽縣西北晉永嘉後以陰平流民僑置南陰平郡及陰平縣寄治萇陽齊因之後周廢南陰平郡為南陰平縣尋廢入雒縣舊志寰宇記德陽縣北浮中山西有南陰平鄉即故郡也萇陽故城在德陽縣西北漢綿竹縣地晉安帝置萇陽縣屬晉熙郡又以南陰平郡寄治於此齊廢後復置後周併入晉熙舊志按縣初與南陰平縣同治蓋自齊時廢其後復置因别為一城在南陰平之西故萇陽入晉熙陰平入雒也綿竹故城在德陽縣北漢置後漢中平五年黃巾亂益州從事賈龍迎州牧劉焉移治綿竹三國漢炎興元年諸葛瞻拒鄧艾至涪前鋒破退住綿竹遂戰死即此元和志綿竹故城在綿竹縣東五十里寰宇記在德陽縣北三十五里按縣自古為由涪入成都必經之要道又為涪江所經當在今綿州德陽之閒隋改雒縣為綿竹皆非故地也萬安故城在羅江縣西晉置屬梓潼郡唐改為羅江隋書地理志金山郡萬安舊曰孱亭西魏改名置萬安郡開皇初郡廢寰宇記羅江縣在綿州西南七十八里本漢涪縣地晉於梓潼水尾萬安故城置萬安縣晉末亂移就孱亭今縣城是也唐天寶元年改為羅江方輿勝覽今為萬安驛在羅江縣西舊志萬安驛在縣西一里晉時縣置於此西昌故城在安縣東三十里晉孝武帝置益昌縣屬巴西郡隋開皇三年省入金山唐永淳元年復置以與利州之益昌同名改此為西昌屬綿州宋初因之後省為鎭屬龍安元和志縣東至綿州五十六里舊志今名花街鎭神泉故城在安縣南五十里漢涪縣地晉孝武僑置西充國縣屬巴西郡宋齊因之隋開皇六年改曰神泉屬金山郡唐屬綿州宋改屬石泉軍元中統五年省安州元和志縣東北至綿州八十四里因縣西神泉為名寰宇記梁武陵王改為平川後魏恭帝移於今所舊志今白塔寺即縣舊址龍安故城在安縣東北晉平蜀置晉興縣屬巴西郡宋齊因之西魏省入益昌後周天和六年别置金山縣隋大業三年廢唐武德三年復置改曰龍安屬綿州宋宣和初改縣曰安昌尋復故寶祐中移石泉軍治於此元中統五年改置安州省縣入之明𥘉降州為縣移於今治元和志縣東南至綿州七十八里武德三年於廢金山縣城置因龍安山為名縣志龍安故城在今安縣東北九十里德陽故城舊志在梓潼縣北後漢初分梓潼縣置屬廣漢郡後移於今遂寕縣故廣漢界廢比為亭魏景元四年鄧艾從陰平由斜徑經漢德陽亭趨涪出劒閣西百里即此蓋魏晉時廣漢之德陽尚存故謂此爲漢德陽也故城正當馬閣山下去龍安府二百里今縣乃唐分雒縣置取漢晉故名耳按蜀志張飛自荆州由墊江入定巴西蜀將張裔拒之德陽陌下其時德陽己在廣漢華陽國志梓潼廣漢二郡皆有德陽縣屬梓潼者有劒閣道三十里至險晉志梓潼有漢德廣漢有德陽元和志寰宇記皆謂後漢分廣漢置德陽在遂州界在劒州界者有漢德故城一名黃蘆城厯考諸書如此疑後漢本分廣漢置德陽縣未嘗遷徙其在梓潼郡界鄧艾傳謂之漢德陽者自是季漢時所置亭名晉以後爲漢德縣即華陽國志梓潼郡之德陽實與廣漢之德陽無涉也然舊志考據頗細仍存之以備一說晉熙故縣今綿竹縣治晉置爲晉熙郡治齊廢郡以縣屬南新巴郡隋改今名隋書地理志蜀郡綿竹舊志置晉熙郡及長楊武都二縣後周併二縣爲晉熙後又廢晉熙入陽泉開皇初郡廢十八年改縣曰孝水大業二年改曰綿竹元和志綿竹縣南至漢州九十里隋改孝水以縣境有孝子姜詩泉爲名寰宇記綿竹縣隋開皇三年徙晉熙郡城梓潼故縣即今梓潼縣治華陽國志建安二十二年先主分廣漢置梓潼郡治梓潼縣寰宇記華陽國志云漢武元鼎元年置以縣東倚梓林西枕潼水為名西魏於此置潼川郡移縣於郡南三十里改為安夀縣隋開皇三年廢郡移縣復舊治猶以安夀為名大業三年還名梓潼鹽泉廢縣在州東唐置元省元和志鹽泉井在魏城縣東南四十五里即鹽泉縣理也西至綿州五十六里本漢涪縣地後魏禪帝元年割涪縣置魏城縣武德三年分魏城置鹽泉寰宇記在綿州東八十五里以地有鹽井為名九域志在州東一百二十里魏城廢縣在州東北漢涪縣地西魏置魏城縣屬巴西郡隋屬金山郡唐屬綿州宋因之元至元二十年省元和志縣西南至綿州六十五里隋大業十二年自鹽泉井移魏城縣理此州志明置巡司於此今改為驛南武都廢縣在綿竹縣西北劉宋僑置武都郡領武都下辯漢陽略