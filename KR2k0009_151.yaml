爲幹上出井口垂綆而下方能及水嵗久幹敗欲易之而陰氣騰上入者輒死佐教工人以水盤貯水穴竅灑之如雨滴然謂之雨盤如是累月井幹一新利復如舊楊師錫紹興中知資州時置力耕田募民就耕以廣官莊師錫言有司奉行失當田畝不分腴瘠市民丈尺隙地亦充税產於是降詔害民者與追正姚仲孫商水人爲資州推官按富順監疑獄全活數十人資州更二守皆惛老事多決於仲孫元劉湛江西人爲仁夀教官明玉珍入蜀棄官隱瀘州明李充簡融縣人嘉靖中爲内江知縣有廉聲嵗旱歩禱令兒童歌曰旱既太甚治非其人願禍其身勿病其民三日果大雨劉三䇿鄱陽人崇禎末知仁夀縣流賊寇蜀誓死守城每對士民曰事迫矣我惟有不動心三字力竭域陷死之贈尚寶司丞十一年本朝乾隆四賜諡烈愍顧繩貽長洲人崇禎庚午舉人獻賊猖獗西川失守或來説降繩貽厲聲叱之馳馬至學宫從容禮拜自縊本朝乾隆四十一年賜諡節愍程化春貴陽人知仁夀縣崇禎末流賊陷城正衣冠向闕再拜自縊本朝乾隆四十一年賜諡節愍唐鳳翥宿松人知仁夀縣以慈得民崇禎末禦賊力戰陣亡一年本朝乾隆四十賜諡節愍賀應選丹陽人知資陽縣崇禎末獻賊陷城罵賊死闔門十七人皆遇害本朝乾隆四十一年賜諡節愍本朝習全史同官人順治十八年知内江縣當兵燹之餘築城垣繕祠廟綏輯流播殫心撫字者七年士民懷之葉新金華人雍正七年知仁夀縣民故多訟下車匝月案無滯牘治聲翕然宋祐無為人雍正九年知内江縣性廉潔愛民造士有政簡刑清之頌劉熾韓城人乾隆五年知資陽縣廉明仁恕建書院捐廉以給修脯利民之事多所修舉鄭章武易水人乾隆二十二年知資陽縣勤於政治胥吏奉法士民懷德許椿浙江人辛酉舉人知内江縣博學有斷才乾隆三十八年從軍金川賊遮於路不屈死賜祭葬卹廕如例人物漢王襃資中人宣帝時益州刺史王襄聞襃有俊材使作中和樂職宣布詩轉而上聞刺史因奏襃有軼材帝乃徵襃詔為聖主得賢臣頌令與張子僑等並待詔擢襃諌大夫又詔襃等侍太子宫朝夕誦讀竒文及所自造作太子喜襃所為甘泉及洞簫頌令宫人左右誦讀之後方士言益州有金馬碧雞之寶可祭祀致也使襃往祀焉襃道病死上憫惜之王延世資中人成帝初河決館陶及東郡泛濫兖豫凡灌四郡三十二縣遣延世為河隄使者使塞以竹落長四丈大九圍盛以小石以兩船夾載而下之三十六日河隄成上嘉延世長於計策功費約省用力日寡以為光祿大夫賜爵關内侯改建始五年曰河平後二嵗河復決平原復遣延世治之六月廼成再賜黄金千斤董鈞資中人元始中舉明經為廩犧令建武中舉孝廉博通古今數言致事永平中為博士時草創五郊祭祀及宗廟禮樂多釣所參議當時稱為通儒累遷五官中郎將常教授門主百餘人趙旂資中人初臨甘陵宏農郡甚善治民徵尚書遷司隸校尉時梁冀子弟放恣旂以法繩之不敢為非京師肅清桴鼔不鳴三國漢王嗣資中人延世之後舉孝廉為汶山太守加安逺將軍綏集羌戎咸悉歸服雖素桀惡者皆來首降境以安靜大將軍姜維每出北征輒出馬牛羊氈眊及義榖以助軍糧遷嗣鎮軍仍領郡後從維北征為流矢所傷卒羌戎㑹葬贈送數千人號呼涕泣後見嗣子及孫皆如骨肉或結兄弟恩至於此唐李鼎祚資州人官著作郎祕閣學士常集子夏孟喜至孔穎達三十餘家為周易集解十七卷以經術稱于時州舊有鼎祚讀書臺趙光寓黄昇俱資陽人皆事親居喪以至行著宋孫光憲貴平人少好學游荆渚為高從誨從事後歸太祖累官檢校祕書監光憲勤學聚書或自抄寫校讐自號葆光子所著有荆臺集鞏湖編玩筆傭集橘齋集北夢瑣言𧖟書黄德輿資州人祥符初葬父母負土成墳甘泉湧其側降詔旌表龍昌期籍縣人祥符中注易詩書論語孝經陰符道德篇韓琦使蜀奏授國子四門助教慶厯中文彦博奏授校書郎府學講説後以明鎬薦任太子洗馬致仕支漸資陽人年十七持母喪既葬廬墓側負土成墳蓬首垢面三時號泣哀毁瘠甚白蛇貍兎擾其旁白雀白烏日集於壠木五色雀至萬餘囘翔悲鳴若助哀者鄉人句文鼎自娶婦即與父母離居覩漸至行深自悔責號慟而歸孝養盡志鄉閭觀感而化者甚衆陳祐仙井監人元符末拜右正言上疏徽宗言紹聖人材比肩於朝攻擊元祐之人是朝廷之上公然立黨也遷右司諌言林希慢上不敬又論章惇蔡京蔡忭郝隨鄧洵武忤㫖出判滁州後入元祐黨籍編管澧州韓駒仙井監人政和初以獻頌補假將仕郎除秘書省正字遷制作郎校正御前文籍言國家祠祭樂章詞多牴牾於是召三館士分撰親祠明堂圜壇方澤等樂曲五十餘章多駒所作宣和中遷中書舍人兼直學士院制詞簡重為時所推㝷補外紹興中卒於撫州何㮚仙井監人與兄棠弟榘俱有文名號為三鳳㮚登政和進士累官御史中丞論王黼姦邪專横十五罪出知秦州欽宗立復召進尚書右丞中書侍郎時朝議割三鎮以緩金師㮚力言其不可㮚解政事以資政殿大學士領開封府金兵復至城下拜㮚尚書右僕射兼中書侍郎請以康王充天下兵馬大元帥從之後從欽宗幸金營遂留不遣仰天大慟不食而死高宗時贈大學士官其家七人郭贊内江人元符末應詔上書慷慨言天下事不報後為汝陽縣丞建炎二年金人陷蔡州守臣乗間而逃獨贊朝服詬叱不肯降遂見殺喻汝礪仁夀人第進士有氣節工詩文靖康中為祠部員外郎不附割三鎮之議金人議立僑楚汝礪捫其滕曰不能為賊臣屈遂挂冠去因號捫膝先生有捫膝集李舜臣井研人紹興末張浚視師江淮舜臣應詔上書言乘輿不出無以定大計宜從幸武昌又言江東六朝皆嘗取勝北方但不肯乘機以爭天下宜為今日殷鑒因著江東勝鑒十篇上之累官宗正寺主簿舜臣邃於易著本傳三十篇朱子晚嵗每為學者稱之又有羣經義書小傳及文集三十卷趙逵資州人紹興二十二年對䇿擢第一秦檜不悅即罷知舉王曮授逵簽書劒南東川帝兩問檜趙逵安在乃除祕書郎既就職未嘗私謁檜檜欲以賄致又不答於是檜愈怒欲擠之未及而檜死帝乃遷逵著作佐郎引見上殿帝迎謂之曰卿知乎始終皆朕自擢秦檜日薦士未嘗一語及卿以此知卿不附權貴真天子門生也詔充普安郡王府教授逵奏言路不通乞賜開納帝嘉納之俄除中書舍人先是逵嘗薦杜莘老唐文若孫道夫皆蜀名士至是奉詔舉士又以馮方劉儀鳳李石郯次雲應詔後皆為名臣逵嘗謂司馬公不近非色不取非財吾雖不肖庶幾慕之帝謂逵文章似蘇軾稱為小東坡有棲雲集三十卷虞允文仁夀人六嵗誦九經七嵗能屬文丁母憂哀毁骨立既葬朝夕哭墓側有枯桑兩烏來巢登紹興進士通判彭州權知渠州趙逵首薦允文召對極論四川財賦科納之弊上嘉納之累遷禮部郎官上疏言金必敗盟願預思備禦未幾金兵至佐樞臣葉義問督江淮軍犒師采石適新帥李顯忠未至敵騎充斥允文立招諸將勉以忠義敵疑援兵至始遁允文䇿敵必復來夜半部分諸將因其來夾擊之捷聞召入對上慰籍嘉歎曰虞允文公忠出天性朕之裴度也充川陜宣諭使至蜀與大將吳璘議經畧中原紹興三十二年知䕫州百務整肅孝宗時宣撫四川閲實諸軍第其壯怯汰兵凡萬人減緡錢四百萬修荒政凡六十五事捐宣撫司錢三十萬增給軍米立户馬七條修守禦之具累拜右僕射中書門下平章事封雍國公允文多薦知名士及為相籍人才為三等號材官錄胡銓以臺評去奏留之經筵又薦朱熹云不在程頤下尋授特進左丞相御史蕭之敏劾允文允文力請外除四川宣撫使淳熙元年薨贈太傅賜諡忠肅允文磊落有大志以文學致身臺閣出入將相二十年忠勤無二子三人公亮公著杭孫孫八人剛簡易簡最知名剛簡終利州路提點刑獄易簡嘗知富順監有治績趙雄資州人隆興元年省試第一虞允文薦於朝乾道初召見便殿孝宗大竒之手詔除正字進見極論恢復孝宗大喜累除中書舍人時金將起河南之役議盡以諸陵梓宫來歸上令雄出使止奉遷陵寢及正受書儀雄見金主爭辨數四辭益力卒得請乃已淳熙初累拜右丞相紹興帥張津獻羨餘四十萬緡雄乞下紹興以其錢為民代輸和買身丁折帛錢之半以見聖主之德乞外出知江陵府光宗受禪召雄雄上萬言書陳修身齊家以正朝廷之道言甚剴切紹熙中卒贈少師諡文定陳咸仁夀人淳熙進士調内江縣尉吏受賄賦民不均咸為均其賦知資州值久旱請於帥臣發粟以賑咸厯官於蜀所至有政績累遷利州路轉運判官吳曦叛咸不受偽命自髠其髮㬢平安丙等奏咸總蜀賦兵政財計合為一家咸晝夜精勤調度有方軍儲以給召為司農少卿卒賜諡勤節李性傳舜臣子嘉定中登進士進對言有崇尚道學之名未遇其實帝曰實者何在對曰在陛下格物致知以為出治之本累官吏部尚書淳祐中拜參知政事同知樞密院事致仕卒贈少保李道傳性傳弟讀河南程氏書至忘寢食慶元初登進士為蓬州教授吳曦反道傳痛憤遺書安撫使楊輔論其必敗曦黨以曦意脅道傳道傳以義折之竟棄官歸曦平累遷祕書郎著作佐郎上書乞下明詔崇尚正學取朱熹論語孟子集註中庸章句或問四書頒之太學仍請以周惇頤邵雍程顥程頤張載五人從祀孔子廟廷時宰相有不樂道學者以語侵道傳道傳不為動厯兵部侍郎出知果州卒諡文節道傳篤於踐履氣節卓然嘗以疾謁告真德秀造焉卧榻屏間大書喚起截斷四字其用功慎獨如此三子達可當可獻可李心傳道傳弟慶元初下第絶意不復應舉閉户著書晩因雀與之許奕魏了翁等薦為史館校勘修中興四朝帝紀踵修十三朝會要後遷工部侍郎言致旱之由願修六事以囘天意理宗從之後以言事奉祠卒心傳有史才通故實所著有高宗繫年錄學易編誦詩訓春秋考禮辨讀史考朝野雜記道命錄西陲泰定錄辨南遷錄詩文一百卷牟子才井研人少從其父客陳咸咸張樂大宴子才閉户讀書若不聞見者咸異之學於魏了翁楊子謨虞剛簡及李方子嘉定中對䇿詆丞相史彌逺為史館校閲言大臣不公不和六事次陳備邊三䇿理宗諭宰相曰人才如此可峻擢之為史嵩之所抑通判吉州遷太常博士又請為濟王立後以囘天意子才隨事奏陳舉朝誦其奏疏皆曰有德之言也俄兼直舍人院賈似道海州之捷子才草奬諭詔第述軍容之盛不言其功似道不樂又言首蜀尾吳幾二萬里今兩淮惟賈似道荆楚惟李曽伯二人宜别立制置且於漣楚光黄均房諸要害郡或築城或增戍似道怒出知太平州又知温州召入度宗時以資政殿學士致仕子才事親孝所薦士後為忠義任吉州文天祥以童子見即期以逺大家無餘資賣金帶乃克葬所著有存齋集子巘官大理寺少卿鄧若水井研人博通經史為文章有氣骨吳曦叛若水仗劒徒步如武興欲手刃之中道聞曦死乃止登嘉定十三年進士時史彌逺柄國久若水對䇿極論其姦請罷之考官置之下等䇿語播行士爭誦之理宗即位應詔上封事復劾彌逺陰害濟王挾恩陵上乞并其黨數人悉除之制置使不敢以聞却還之嘉熙間召為太學博士當對草奏數千言將上之丞相喬行簡知之亟奏補外若水遂不復仕隱大湖之洞庭山後歸蜀陳寅咸之子紹定初知西和州元兵入境寅誓與民共守北兵十萬攻城東南門寅自執旗鼓激厲將士迎敵矢石如雨師退詰旦復來寅帥忠義民兵與敢死士力戰退之制置司以寅功徧告列郡北兵伐木為攻具增兵圍州城寅晝夜死戰乆之援兵不至城遂陷妻及二子子婦飲藥死寅斂而焚之乃朝服望闕再拜伏劒死事聞贈賜立廟加贈華文閣待制諡襄節黄申井研人開慶進士授德安尉攝主簿兼提點江西刑獄司簽廳獄事多所辨明丞相江萬里提刑黄震交薦之調樂安丞申為政廉謹有治聲以恩升從事郎蒙古兵拔撫州下諸縣索降狀樂安令率其僚聯署以上申初聞變悉遣家人逺避獨抗不往佯狂隱巴山中元黄澤資州人生有異質慨然以明經學道為志好為苦思屢以成疾疾止復思久之如有所見作顔淵仰高鑽堅論嘗夢見孔子以為適然最後乃夢見孔子手授所較六經字畫如新由是深有感發始悟所解經多徇舊説為非是乃作思古吟十章大德中授江州景星書院山長秩滿即歸閉門授徒以養親嵗祲家人採木實草根以度朝夕澤晏然年八十卒所著有易春秋解三禮祭祀述畧虞集仁夀人編修汲之子性孝友博學累遷奎章閣學士日取經史中切於天德王道者陳進經筵凡顧問隨事規諫論薦人材必先器識一時大典冊咸出其手著有道園學古錄卒諡文靖弟槃亦有文名明李蕃内江人永樂舉人博涉羣書授漢中訓導不就洪熙改元上端本十六䇿宣宗即位擢兵科給事中巡視沿邊城堡還言關堡空虚請城獨石等處清軍河南獻安養軍民十餘事所著有奏議詩文十餘卷吳儼内江人性耿介以明經貢太學嘗督賦河南清理戎伍查印綬監勘合人咸稱之永樂間升工部員外郎宋有文資陽人天順間官巡按激濁揚清發姦摘伏不事鈎距翕然稱神明厯官甘肅巡撫劉元仁夀人天順庚辰進士任布政使廉靜寡欲以節儉為羣僚先鄧本端資縣人天順進士拜監察御史剛直有文武材成化間劉千斤等據荆襄叛本端討平之又平陜西賊土達等升陜西按察副使汪藻内江人成化進士由翰林厯參政首劾汪直王越開邊釁立西厰章上罷厰朝宁肅然李裕中資陽人授湖廣荆州推官涖政廉明豪强斂跡厯雲南副使擒剿夷寇邊徼晏然李芳資陽人拜監察御史論劾無所避按貴州會訃河等寨苗民叛一鼓平之撫其脅從諸苗化服蕭翀内江人由成化進士總督兩廣軍務厯官四朝聲望赫奕居家儉素鄉閭重之李充嗣蕃之孫成化進士任岳州通判正德時厯江西僉事討華林賊有功為雲南按察使舉治行卓異巡撫河南應天皆有聲進秩工部尚書修蘇松水利閲六月訖工尋改南京兵部尚書充嗣好學有器局居官以嚴辨稱祿入輒散之親故而身布袍蔬食不厭卒贈太子太保諡康和馬炳然内江人成化辛丑進士由嘉魚令巡按貴州才明懋著升至總督為流賊所執挾刃迫作書退軍不從遇害妻女俱赴水死贈右都御史諡毅愍弟自然由進士任貴州右參政剛毅不撓王一言内江人宏治間任臨安兵備凡城池軍旅糧餉之事井井有條軍民利病悉興除之鄭裕内江人宏治壬戌進士任户科給事中武宗朝直言動聽甚有建白著有奏議稿金陵集小峩眉集張元電資陽人任御史彈劾無所避忤閹瑾改刑部主事後知處州黄巖賊起諭以禍福賊即遁去郡人感而祀之劉端内江人宏治進士授檢討以火炎疏陳時事甚切闕里廟成請更定先師封諡武宗立疏陳端本九事請召章懋王鏊林俊雍泰等由是諸臣多獲進用既劉瑾肆虐即謝病瑾榜鍴為奸黨除其名瑾誅以副使督學浙江正身率物士風大振嘉靖時厯南京禮部右侍郎因災異偕同官條十六事大禮議起復偕九卿合疏力爭卒贈尚書隆慶初諡文肅高公韶内江人宏治進士授撫州推官正德中為御史按河東劾總兵官郭勛罪托音華入寇又劾總兵官陳鏸罪鏸坐免官巳劾尚書王瓊險愎誤邊計為瓊所搆謫富民典史世宗立召復官厯官户部右侍郎托音華舊作朶顔花今改正梅友松内江人厯升延綏巡撫嚴守備勤訓練諸番懾服總督三邊上十二事皆報聞鄧繼曾資縣人正德進士世宗即位以乆雨進讜言擢兵科給事中劾宦官䆄權忤㫖下獄謫金壇縣丞厯遷至徽州知府卒余才内江人正德進士官至光祿寺少卿執守堅定以議大禮死於杖隆慶初贈太常少卿楊祐内江人嘉靖乙未進士授行人奉使藩封請謝絶宴餞轉工部員外郎議省公費出榷杭税盡除夙弊劉養直内江人嘉靖戊戌進士任刑科給事中能直言都城增築羅城更建九廟大司農告乏養直獨上封事省費數十萬嚴嵩初相與同官連疏論列銜之後升稽􅈴司主事以識拔才賢為務厯官至户部侍郎陰武卿内江人嘉靖進士以刑部曹郎為關中提學冰鑑照人分守江右盜藪一空著有月溪文集何起鳴内江人嘉靖己未進士厯官工部尚書初以盩厔令徵入禮垣掌科事請蠲逋賦帶徴者以萬計奉使入蜀請改南江茶減川西溢額桑梓賴之屢疏乞歸至家二親望於門下車入謁里人以為榮父祥以理學崇祀趙貞吉内江人嘉靖進士授編修時方士進用貞吉請求真儒以贊大業為司業以知本率性之學教士諳達薄都城貞吉廷議合上㫖擢左諭德監察御史奉㫖宣諭諸軍會嚴嵩以事中之廷杖謫官後累遷至户部侍郎復忤嵩奪職隆慶初起官厯禮部尚書文淵閣大學士尋與高拱不協乞休歸卒贈少保諡文肅諳達舊作俺答今改正晏鋭内江人以吏員授高郵衛經厯嘉靖丙辰倭冦揚州鋭部兵戰於東水關被執不屈死周冕資縣人嘉靖進士擢御史重建太廟成帝將遣官代祭冕上章爭之帝大怒下獄終以其言直釋還職疏請東宫講學以端國本謫雲南通海典史尋升兵部郎中劾嚴嵩父子冒濫軍功力救楊繼盛冤直聲震朝廷復下獄拷訊斥為民隆慶初起太僕少卿遭母憂未任卒鄧林喬内江人嘉靖進士巡撫大同勞苦著績龔茂賢内江人隆慶戍辰進士擢御史按東粤懲貪訓廉京師旱詔求直言上五少三多疏報聞馬鳴鑾内江人萬厯甲戌進士總督宣大卒於官敭厯中外偉績甚多弟鳴鎏賊破内江罵賊