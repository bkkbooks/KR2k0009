body:
  text: 資州直隸州在四川省治東南三百四十里東西距四百三十里南北距五百里東至敘州府隆昌縣界一百五十里西至眉州界二百八十里南至嘉定府樂山縣界三百二十里北至成都府簡州界一百八十里東南至嘉定府威逺縣界八十里西南至眉州界二百九十里東北至潼川府安岳縣界八十里西北至簡州界二百二十里本州境東西距一百三十五里南北距一百三十里東至内江縣界四十五里西至仁夀縣界九十里南至威逺縣界五十里北至安岳縣界八十里東南至内江縣界五十里西南至威逺縣界六十里東北至内江縣界七十里西北至資陽縣界四十五里自州治至京師六千五十里分野天文井鬼分野鶉首之次建置沿革禹貢梁州之域秦為蜀郡地漢為犍為郡資中縣地西魏屬資州時州治陽安即今簡州周武成二年自陽安移州治資陽縣并置資中郡保定中於此置盤石縣隋開皇七年始自資陽移州來治大業初改州為資陽郡唐武德元年復曰資州天寶元年復曰資陽郡乾元元年復曰資州咸通二年徙治内江七年復故屬劒南道唐書地理志咸通六年州徙治内江七年復治盤石五代屬蜀宋亦曰資州資陽郡屬潼川路元時州縣俱廢至正末明玉珍復置資州明洪武四年改州為縣屬成都府本朝雍正六年升直隸州屬四川省領縣四資陽縣在州西北一百三十里東西距一百三十五里南北距一百三十五里東至本州界九十五里西至仁夀縣界四十里南至本州界八十五里北至潼川府樂至縣界五十里東南至本州界九十里西南至仁夀縣界五十里東北至潼川府安岳縣界一百二十里西北至成都府簡州界八十里漢置資中縣屬犍為郡後漢晉及宋齊因之周武成二年改置資陽縣為資州及資中郡治隋開皇初郡廢七年又徙州於盤石以資陽為屬縣大業初屬資陽郡唐屬資州宋因之元省入簡州明成化元年復置資陽縣屬成都府正德中改屬簡州本朝初屬成都府雍正五年改屬資州内江縣在州東南九十里東西距一百五里南北距一百三十里東至重慶府榮昌縣界六十里西至本州界四十五里南至敘州府富順縣界五十里北至潼川府安岳縣界八十里東南至敘州府隆昌縣界五十里西南至嘉定府威逺縣界四十里東北至榮昌縣界六十里西北至本州界五十里漢資中縣地周天和二年置漢安戍尋改置中江縣屬資中郡隋避諱改曰内江屬資陽郡唐屬資州宋因之元初省明洪武初復置屬成都府本朝雍正五年改屬資州仁夀縣在州西二百里東西距一百三十里南北距一百三十里東至資陽縣界八十里西至眉州彭山縣界五十里南至井研縣界六十里北至成都府簡州界七十里東南至井研縣界九十里西南至眉州界六十里東北至簡州界六十里西北至成都府雙流縣界七十里漢犍為郡武陽縣東境晉置西城戍梁置懷仁郡西魏置陵州又置普寕縣為州郡治隋開皇三年郡廢十八年改縣曰仁夀大業初改州為隆山郡唐武德元年復曰陵州天寶元年改曰仁夀郡乾元元年復曰陵州屬劒南道五代屬蜀宋熙寕五年廢州為陵井監宣和四年改仙井監隆興初又改曰隆州屬成都府路元至元二十年州廢以仁夀縣屬成都路明屬成都府本朝雍正五年改屬資州井研縣在州西南二百四十里東西距六十里南北距三十五里東至嘉定府威逺縣界四十里西至眉州青神縣界二十里南至嘉定府樂山縣界十五里北至仁夀縣界二十里東南至嘉定府榮縣界六十里西南至樂山縣界二十里東北至本州界六十里西北至仁夀縣界七十里漢犍爲郡武陽縣地井研鎮晉安帝僑置江陽郡亦曰西江陽郡宋齊因之西魏置蒲亭縣後省隋大業元年置井研縣屬隆山郡唐屬陵州宋屬仙井監南渡後屬隆州元至元二十年并入仁夀縣後明玉珍復置明洪武十年又省入仁夀縣後復置屬成都府本朝雍正五年改屬資州形勢秀山層出資水環流舊志風俗民性質實安於耕讀舊志城池資州城周五里有奇門九外環以池西魏築明宏治中甃石本朝康熙初修乾隆三十八年重修資陽縣城周八里一分門四外環以池明成化中築嘉靖中甃石本朝乾隆五年修二十八年三十五年重修内江縣城周九里三分門八舊土築明成化中甃石本朝順治十七年修外環以池乾隆三十五年五十二年嘉慶二年重修仁夀縣建五十三年遷建今所雁江書院在資陽縣城西本朝乾隆五年建二十九年修漢安書院在内江縣城内本朝乾隆初建鼇峯書院在仁夀縣跨鼇山麓本朝乾隆二十九年建來鳳書院在井研縣治東來鳳山明建本朝康熙八年重建五十七年修又崇正書院在縣南龜山明嘉靖中建久廢六愚義學在仁壽縣城内明萬厯中建按舊志載崇正書院在井研縣南龜山明嘉靖中建今廢謹附記户口原額人丁一萬二千三百十一今滋生男婦共九十五萬三千七百三十八名口計一十八萬六千五百五十五户田賦田地三萬五百二十六頃三十四畝一分有竒額徴地丁正雜銀三萬四千五百五十五兩八錢四分八釐山川東皋山在州東二里蘭山在川東十五里寰宇記高三里上有八面懸崖壁聳金紫山在州東南二十里銀山在州東南三十里山形如錠古今集記唐田游巖入蜀居於銀山聚弟子歌雅詩以為樂今山有雅歌臺蜀時曾以名縣鶴鳴山在州南五百歩寰宇記古老傳云張道陵乘白鶴飛鳴於此石人山在州南十五里寰宇記隔中江高八丈金鑪山在州西南二十里玉京山在州西南五十里一名玉清山峭嶮壁立插天連雲上有觀曰太霄天馬山在州西南六十里醮壇山在州西二里名勝志山為李阿修煉處平岡山在州西唐志盤石縣有平岡山舊志在城西二里相傳傅仙宗所宅四明山在州西北一里盤石山在州西北