以名寺太平興國寺在懷寕縣西正觀門外萬松山麓元創明洪武間重修本朝康熙八年拓舊制增建谷林寺在桐城縣東十五里魯硔山舊名清泉寺明建本朝康熙四十六年勅賜今額勝因寺在桐城縣北二里投子山明嘉靖間廢本朝雍正十二年奉㫖重建太平寺在潛山縣北太平山晉咸和中創元余闕有登太平寺詩山谷寺在潛山縣西北二十里寺東北隅有三祖璨大師塔寰宇記梁大同二年以山谷為名明統志相傳梁僧寳誌卓錫之地二祖寺在太湖縣北百二十里縣志二祖慧可神光也有卓錫石傳衣石太霞宫在桐城縣西城外舊志晉裴既郭三仙遊此邑人見彩霞燭天因祀之稱為太霞福地明季燬本朝順治七年重建真源萬壽宫在潛山縣北二十里明統志真源萬夀宫乃梁白鶴道人鶴止之所宋賜號靈仙觀後改今名舊志中有鶴鳴泉四時不竭又有應夢井唐元宗嘗夢遊於此因賜名名宦漢朱邑廬愛江利舒爲人行爲未舒嘗桐笞鄉辱嗇夫人存廉問平耆不老苛孤以寡遇死之屬有其恩子所曰部我吏故民爲愛桐敬鄉焉吏後官至大其民愛我司農病且必葬我桐鄉桐後鄉世西子郭孫外奉民嘗我果共不爲如起桐鄉冢立民祠及嵗死時其祀子祭葬不之絶三國呉吕蒙汝進南奇富計陂佐人呉拜定偏皖將即軍拜領尋廬江陽太令守數晉陶侃鄱郵陽領人樅徙陽家令尋陽有能廬名江遷太主守簿張㑹夔州召部爲從督事至繩郡欲不宜有相所逼按侃若不曰以若禮鄙我郡能有禦違之自從當事明即憲退直唐張鎮周舒戚人相武與德酬中拜飲如舒布州衣都時督凡甫十至日置既酒而召分親贈金舒帛州泣都與督之治别百曰姓令耳日自猶是得親與戚故故人人飲犯酒法明一日無則所縱肅境然内張萬福魏州州節元度城崔人圓大令厯萬中福賊攝陳舒莊州陷刺舒史督淮南盜賊窮破株黨獨孤及洛陽人代宗時舒州刺史嵗飢旱鄰郡逋亡什四以上舒人獨安以治課如檢校司封郎中賜金紫麴信陵呉縣人貞元初為望江令有仁政嵗亢旱以鐵板丹書沈江禱於神曰必也私欲之求行於邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移於人而害其嵗禱畢雨立降及代民遮道留得再任卒官白居易作秦中吟哀之韓震元和中桐城令邑自開元中徙治山城地多猛虎毒蛇震焚薙草木其害遂除宋李炳肥鄉人太祖時以殿中侍御史出知舒州時進征金陵緣淮供億惟舒不匱以勞加御史馮瓚齊州厯城人太祖時知舒州境内有菰蒲魚鼈之饒居民採以自給防禦使司超盡征其入瓚奏請蠲除之劉沆吉州永新人天聖中通判舒州有大獄厯歲不決沆數日決之章獻大后建資聖浮圖内侍挾詔命督役嚴峻沆奏罷之李迪濮州人仁宗時知舒州王琪舒人仁宗時通判舒州歲饑奏發廩救民永報可先賑以公租守以下皆不聽琪挺身任之李孝基迪孫通判舒州舒吏受賂鬻獄以殺人罪加平民孝基劾治得其情廼抵吏罪楊希元元豐中知舒州近城有大澤出灊山注北門外暴水漂居民希元築捍水隄一千一百五十丈置洩水斗門二遂免淫潦入城之患璽書獎諭李師中楚邱人神宗時知舒州去之日民擁道遮泣馬不能行黄庭堅分寕人徽宗時知舒州以德化民不事箠楚嘗游山谷寺石牛洞樂其林泉之勝因自號山谷道人孫知微通判舒州紹興初賊劉忠入境執以去不屈賊臠而食之喻樗南昌人建炎中言議和非便忤秦檜出知舒州懷寕縣趙師傳紹興中知望江縣創純孝亭於南臺寺側合祀王祥孟宗俆仲源三孝子以風勵民俗後淳熙中趙思循為令更繪三賢像祀之在官亦有嘉改蕭服廬陵人望江令治以教化為本訪古跡得王祥卧冰池孟宗泣筍臺皆為築亭又刻唐縣令麴信陵文於石碑民知所向游酢建州建陽人知舒州黄幹閩縣人知安慶府至則金兵破光山民情震恐乃請城安慶以備戰守不俟報即日興工城成後二年金兵破黄州沙窩諸關淮東西皆震獨安慶安堵如故繼而霖潦月餘巨浸暴至城訖無虞舒人相謂曰不殘於兵不蹈於水生汝者黄父也夏椅安慶通判瀛國時兵至仰藥死元戴昌以舉人為宿松尹立縣治建學校築壇壝闢田野庶政修舉翟居仁汴人至正間為太湖尹縣北多水民田盡汚萊居仁築隄障之田大稔遂名翟公隄程宗傑淝川人至正間為望江尹立學宫表徐仲源墓建麴大夫祠杜行田騷擾之弊立差役五等法邑民永賴余闕廬州人至正十三年闕為淮西副使僉都元帥府事分兵守安慶於時南北隔絕兵食俱乏抵官十日而冠至拒却之乃議屯田戰守計浚隍增陴引江植柵時羣盜環布闕居其中屹然為江淮保障如是五年陳友諒兵簿城下闕簡死士力擊屢却之賊志甚復來攻四面蟻集闕徒步提戈為士卒先斬賊無算身亦被十餘創城陷引刀自剄墮清水塘中妻雅卜氏及子德生女安安皆赴井死甥福童亦從死雅卜氏舊作耶卜氏今改正韓建遼西人至正中知安慶路陳友諒破城一家被害建方卧􅔂罵賊賊執以去不屈死同時不從賊而死知名者萬户李宗可紀守仁陳彬金承宗元帥府都事特穆爾布哈萬户府經厯段桂芳十户和斯布哈李廷王葛延齡邱卺許元炎奏差阿都瑪勒百户黄寅孫安慶推官黄多倫台經厯楊恒知事余中懷寕尹陳巨濟凡十八人特穆爾布哈舊作帖木𥙷化和斯布哈舊作火失不花阿都瑪勒舊作兀都蠻多倫台舊作秃倫歹今俱改正明胡儼南昌人建文初知桐城縣鑿桐陂水溉田爲民利邑有虎傷人儼齊沐告於神虎遁去桐人祀之朱邑祠俞益餘姚人永樂中知潛山縣地僻陋鮮學者益親爲敎督勤於民事而持巳以廉卒於官貧無以斂民助給之謝驥成都人永樂中知宿松縣於城東黎協橋西開濬小河注學宫几四境渠堰有資灌溉者次第修舉周濟洛陽人正統中知安慶府時歲比不登民間鬻子女充衣食方舟而去者相接齊借漕糧以賑而禁鬻子女者且上疏請免租詔許之全活甚衆又爲定婚喪制禁侈費愆嫁葬期者有罸風俗一變卒於官民皆罷市巷哭云陳恪歸安人成化中知宿松縣募民墾荒得田四百九十三頃粟二千七百餘石悉以償虛賦又積谷三萬二千石修塘堰數百區由是逃亡歸籍者五百餘户袁慶祥雩都人成化中知潛山縣山民多負固梗法慶祥諭之以義皆帖然不敢動懲豪右之呑噬貧民者日進父老於庭諮以利弊後遷官民遮留不得去宗信平度州人成化中潛山縣丞縣西有高地五萬餘畝小旱輒無獲信率其民鑿河三十餘里引吳塘水以溉之乃獲屢豐孫衍餘姚人成化中知宿松縣邑多荒田積逋賦不能償衍請按實悉蠲除之姚岳長興人宏治中知宿松縣豪民逋賦岳捕坐如法正德時中璫用事有司入覲率以賄行多取諸民間岳獨秋毫無擾民有道獻者悉却之張夔黄巖人宏治中任望江教諭立企德亭於學嘗督築西圩盡心籌畫民咸德之張文錦安邱人正德中知安慶府度宸濠必反預爲備禦敵計及宸濠果反浮江文錦慮其攻南都令軍士登城詬之宸濠乃留攻卒不能克始解去璽書褎美擢太僕少卿王誥霸州人正德中知懷寕縣淮官甫十日宸濠來攻城誥鼓勵士氣獨守城北面賊攻城輒先犯城北晝夜督戰數設奇擊敗之賊解圍去城賴以全楊鋭其先蕭縣人正德時守備安慶與知府張文錦治戰艦日督士肄水戰及宸濠反奄至城下鋭率衆禦之江滸巳收兵入城被圍鋭軍城西尤要衝晝夜拒戰却之賊悉衆號十萬來攻宸濠自督戰鋭等殊死戰焚其攻具襲殺過當旬有八日而圍解累功擢都督僉事沈教慈谿人正德中知桐城縣邑正糧外有羨米三千餘石教奏蠲之建桐溪書院置學田定祭器及古鄉射禮編為風教錄胡纘宗泰安人正德中知安慶府境内嘗苦旱纘宗為築龍壩開呉塘烏石堰以備蓄洩民享其利建射圃進諸生行鄉射禮一時文教興焉李遜新建人嘉靖中知安慶府桐城民以陂池為業後屬之官且加課又蘆課亦於常額外嵗増千金遜力請於官悉免之石簡寕海人嘉靖中知安慶府地當衝要民苦供億簡為裁損嵗省費四萬遂為定式民立祠祀之陳于階遵化人嘉靖中知桐城縣邑城久圯于階重築甎城陳家洲沃衍濱大江于階曰此可障而耕也築隄成田歲獲萬計文階南充人嘉靖中知望江縣時景王就邸湖廣過望江供億甚繁階裁以定式中官憚之戢其部弗敢譁蔡幾漢陽人嘉靖中知望江縣修築西圩甚賴其利邑苦田賦不均幾履畝清文民始免無田之税于廷采萊陽人萬厯中知潛山縣甃西隄挽南河以㑹東流修築石閘民賴其利陸元錫仁和人萬厯中知潛山縣幹理精敏尤留心水利築沙河清涼二堤歲乃常稔至今稱為陸公堤呉之才新昌人萬厯中知懷寕縣嵗苦蝗之才遣人分捕計石給銀未以為賞格捕者爭赴蝗患立除縣嘗被水力請蠲賑民賴以甦張廷拱同安人萬厯中知懷寕縣縣苦徭役田賦不均多為貧民累廷拱始定畝四丁一之制著為令咸服其平常自裕鄢陵人天啟中安慶府推官時三王之國議拆毁河漘民居以開縴路又取縴夫數千名民間騷動自裕抗言力爭皆得免吳暢春漢陽人崇禎中為潛山縣天堂寨巡檢時流賊正熾暢春練鄉兵悉力防禦被執不屈死贈府經厯本朝乾隆四十一年賜謚烈愍潘可大江寕人崇禎中懷寕縣守備隨總兵陳龍勦賊遇流寇於豐家店以三千當賊數萬困守一月矢盡可大自刎死龍亦自焚年本朝乾隆四十一賜諡節愍楊爾銘筠連人崇禎中知桐城會流寇渡河城被圍爾銘以民兵格之賊退亡何賊勢愈熾圍城歲以為常爾銘率士民登陴警柝繕壘七年如一日孤城卒完張利民侯官人崇禎中知桐城縣賊張獻忠百道來攻凡四十晝夜利民揮涕登陴率士民死守援兵至圍解又城中駐兵三千民既苦賊復苦兵利民委曲調劑始獲安堵李孕嘉沈邱人崇禎中知潛山縣流賊賀一龍等攻陷城執孕嘉及典史沈所安去索賄以贖孕嘉曰死即死耳以賄免是辱朝廷也賊索其印繫之腰間罵不絶口與所安父子俱被害本朝乾隆四十一年賜謚烈愍金應元山陰人崇禎中知太湖縣流賊犯境據大濠以守姦人導賊渡濠應元被執死本朝乾隆四十一年賜謚烈愍李盛英榆林人崇禎中知太湖縣流賊餘孽萬餘掠縣之西北盛英率守備徐際相禦之許家寨初多斬獲尋賊勢益衆與際相俱力戰死本朝乾隆四十一年賜謚烈愍扈永安霍邱人崇禎中太湖訓導賊犯城或勸其去永安不從賊至猶聞誦讀聲遂遇害本朝乾隆四十一年賜入祠施元緒浙江人崇禎中宿松縣丞城新破於賊加之蝗疫兩災積尸盈野存者食樹皮幾盡元緒方奉檄征漕嘆曰嗟此孑遺其何能堪願以一死代萬民命遂具衣冠自縊倉署中事聞其年漕糧獲免朱萬年浙江人崇禎中宿松縣典史流寇犯境初無城守官吏俱逃萬年獨以獄庫爲已任不肯去賊至被殺於堂上本朝乾隆四十一年賜入祠張起陽山隂人崇禎中望江縣典史築隄守城頗有機畧夜半流賊來攻雲梯巳及城下起陽邏察守兵甚嚴知賊至擊走之王治心沂州人崇禎中爲安慶同知性狷介巡撫王配元薦爲廉吏第一後左良玉兵潰入城治心朝服坐㕔事賊至大罵之遂被害本朝黄熙瓚晉江人順治中為安慶府推官精習吏事豪猾斂手民無冤獄嘗攝知府事㑹海賊大至以偽檄招之熙瓚縛置之獄衆感其義同心堅守援兵至賊遁去熙瓚率水師追擊大破之常大忠太原人順治中知潛山縣邑苦田賦不均大忠履畝清文以田均里積弊頓清建三立書院以來學者置學地贍之每鄉立眺臺以備守望由是􅍉苻無警絃誦不絶高攀桂錢塘人康熙中知桐城縣革除陋規力行善政以被誣去官縣人泣送市為之空安清翰垣曲人乾隆二十三年知潛山縣以儒術飭吏治葺書院濬城河水澇有備至今利賴之
