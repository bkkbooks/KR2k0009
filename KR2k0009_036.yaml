body:
  text: 安徽統部安慶府為省㑹在京師南二千七百里東西距七百三十五里南北距六百六十六里東至江蘇江寕府溧水縣界三百九十五里西至湖北黄州府黄梅縣界三百四十里南至江西九江府彭澤縣界一百七十里北至江蘇徐州府睢寕縣界四百九十六里東南至浙江杭州府昌化縣界五百十里西南至江西九江府界四百一十里東北至江蘇江寕府江浦縣界五百二十里西北至河南歸德府鹿邑縣界九百六十里分野天文斗牛女分野星紀之次兼魯地奎婁分野降婁之次今鳳陽府之懷遠及泗州五河是宋地房心分野大火之次今鳳陽府之宿州靈壁及潁州府是建置沿革禹貢揚州及徐豫二州之域按今境内皆揚州地推鳳陽府之懷遠及泗州五河為徐州之域潁州府及鳳陽府之宿州靈壁為豫州之域春秋時分屬吳楚亦兼魯宋之疆後越滅呉分屬楚越戰國時為楚地秦置九江鄣郡及泗水潁川郡漢初置准南國改泗水為沛郡文帝改淮南置六安國增置廬江郡武帝改鄣郡置丹陽郡又置臨淮郡元封五年置十三部刺史分屬揚州及徐豫二州為揚州部之丹陽廬江九江郡及六安國徐州部之臨淮郡豫州部之沛郡汝南郡後漢因之揚州刺史初治厯陽後治夀春廢六安國改臨淮郡為下邳國建安中於豫州增置譙郡三國時分屬吳魏俱置揚州為呉揚州之丹陽等郡魏揚州之淮南等郡其徐豫二州屬魏徐州之下邳郡豫州之汝陰郡譙郡安豐郡晉亦為揚州初治壽春平吳後徙治建業並增置宣城厯陽二郡改新都為新安郡及徐豫二州東晉揚州為王畿僑置豫州於淮南郡劉宋仍為揚領宣城淮南新安等郡徐領鍾離濟隂馬頭等郡豫領譙汝陰陳留等郡三州改晉之僑豫州曰南豫州領厯陽南譙平昌廬江南汝隂南梁晉熙安豐潁川等郡其後徐豫入北魏又僑置徐州於鍾離郡宋書州郡志徐州泰豫元年移治朐山元徽元年還治鍾離蕭齊改徐州曰北徐州時北魏於鍾離以北亦别置揚州南兖州渦州潁州後次第入梁梁初爲揚徐南豫諸州天監中增霍州豫州五年置於合肥改置西徐譙合等州大通初改北魏渦州爲西徐州四年改北魏南兖州爲譙州南豫州爲合州後又置南豫州於姑孰而淮表屬東魏武定六年復克渦陽七年克鍾離夀春改梁徐州爲楚州西徐州爲譙州大寶以後江北盡入於高齊先有揚合楚北徐渦潁譙等州改楚州爲西楚州天保二年置和州陳承梁緒僅保江南亦爲揚州及南豫等州而江北地屬齊陳大建五年伐齊克合州譙州北徐州霍州及廬江厯陽馬頭夀陽等郡置南豫州於厯陽改夀陽為豫州旋屬後周天和四年滅齊大象元年取陳豫霍南兖譙北徐等州及盱眙厯陽等九郡改豫州復曰揚州南兖州曰亳州隋開皇初罷郡以州領縣大業初復改為同安丹陽宣城新安鍾離淮南廬江厯陽以上屬揚州彭城屬徐州譙汝陰以上屬豫州等郡唐武德初又改諸郡為州貞觀初分屬江南及淮南河南道開元二十一年又分江南為東西道宣歙池三州屬江南西道採訪使舒夀廬滁和五州屬淮南道採訪使濠宿亳潁泗五州屬河南道採訪使乾元以後改採訪使為觀察使又兼為淮南及鎮海軍武寕軍節度使所轄五代初屬楊吳後屬南唐周顯德五年克淮南十四州以江為界宋開寶八年分江南准南二路熙寕中分屬江南東路寕國府徽州池州太平州廣德軍屬江南東路淮南東西二路亳州宿州泗州滁州屬淮南東路安慶府夀春廬州和州濠州六安軍無為軍屬淮南西路及京西北路順昌府屬京西北路按舒州以慶元元年升為安慶府宣州以乾道二年升為寕國府歙州以宣和三年改為徽州夀州以政和六年升為夀春府乾道三年復改夀春府為安豐軍潁州以政和六年升為順昌府宋末淮北地入於金潁亳夀宿泗等州别屬南京路山東西路元分屬河南江北及江浙行中書省廬州安豐安慶三路潁宿亳滁泗五州屬河南江北行省太平池州廣德寕國徽州五路屬江浙行省明初改路為府直隸京師正統六年定北京為京師以應天府為南京府七安慶徽州寕國池州太平廬州鳳陽州三滁和廣德皆直隷南京本朝改置江南省順治十八年分屬江南左布政使司寄治江寕兼領淮安揚州二府徐州一州康熙元年設安徽巡撫六年改江南左布政使司為安徽布政使司專領安慶等七府三州其淮安等二府一州分屬江蘇省雍正二年升鳳陽府之潁亳泗三州廬州府之六安州並為直隸州十三年升潁州為府仍改亳州為屬州乾隆二十五年以安徽布政使司自江寕還治安慶領府八州五安慶府徽州府寕國府池州府太平府廬州府鳳陽府潁州府滁州直隸州和州直隸州廣德直隸州六安直隸州泗州直隸州形勢上控全楚下蔽金陵扼中州之咽喉依兩浙為脣齒洪流沃野甲於東南故六代以來皆為重鎮其名山則有皖山龍眠大鄣黄山齊雲敬亭九華青山梁山采石霍山其大川則有大江皖水涇水丹陽湖巢湖肥水滁水淮水潁水渦水其重險則有集賢關一名脊現關馬領關陡巖關東關清流關昭關石門關柳林關金雞關作藩南服據吳上游誠江界之要衝淮南之雄鎮也文職官總督轄江蘇安徽江西三省駐江蘇江寕府順治十八年設巡撫駐安慶府康熙元年設提督學政駐太平府順治初設江南提督學政後分設上江下江學道二人康熙元年裁併歸一雍正三年復分設安徽學政布政使司布政使順治初設江南左右布政使各一人俱駐江寕府康熙六年改江南左布政使為安徽布政使仍駐江寕乾隆二十五年移駐安慶府經厯庫大使長盈康熙六年設安徽布政使司理問經厯照磨檢校副理問倉大使庫大使各一員三十九年裁照磨副理問檢校雍正二年裁理問乾隆二十五年裁倉大使以經厯及庫大使