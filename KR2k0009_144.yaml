判官陳榷茶買馬五害朝廷是其言令總理四川財賦兼利州路都漕善理財大變酒法鹽法不加賦而軍用足郭浩隴干人紹興中知利州金人破和尚原進窺川口抵殺金坪浩與吳玠大破之朱勇利州統制與金人戰于瓦亭被執臨死罵不絶口廟祀賜名忠節李蘩晉原人孝宗時為隆州判官攝綿州報活十萬人劍外和糴在州者獨多蘩嘗匹馬行阡陌間訪求民瘼有老嫗泣曰民所以飢者和糴病之也蘩奏免之民大悅陳升卿仁壽人乾道間御史出知劒州恤民修學士民咸悅於學宫旁立祠祀之楊震仲成都人淳熙中知新井縣以惠政名陳咸升卿子開禧中厯利州路轉運判官吳曦叛人情大駭咸督軍糧檄守楊震仲賑流民備姦盜衆稍安曦以咸名士欲首脅之檄咸議事咸不往抵利州城偽都運使徐景望已挾兵入居臺治遇諱日大合樂以享咸力拒之欲結賊將以誅景望不果曦招之急咸遂削髮披緇曦既誅安丙奏以咸總蜀賦時帑藏赤立咸商榷利病兵政財賦合為一家晝夜精勤調度有方不二歲諸倉各贏數十萬劒州地險咸增饋米以實之未幾金人攻上津守賴以固曹彥約都昌人為利州路轉運判官兼知利州關外乏食彥約悉發本司所儲減價遣糶勸分免役通商蠲稅民賴以濟曹友聞栗亭人寶慶中利州都統屢敗元兵端平三年蜀帥趙彥呐強檄守大安與弟萬友諒部將劉虎齊發禦敵友聞入龍尾頭萬出雞冠隘口內外兩軍殊死戰元以鐵騎四面圍繞一軍盡殁贈龍圖閣學士諡曰節賜廟褒忠王佐理宗時知利州堅守孤城降將南永忠以兵薄城下佐罵之永忠流涕而退詔奬諭進官一秩蹇維之通泉人理宗時利州通判王宣辟行參軍事迎敵力戰而死何震之理宗時權知巴州守城死於兵詔贈官三秩鄭炳孫理宗時隆慶教授不從南永忠降先縊殺妻女亦朝服自縊贈朝奉郎直祕閣趙廣閬州推官元兵破城死之楊禮理宗時知隆慶府以守安堡功官兩轉開慶元年以堅守城堡歿於王事與段元鑑各贈奉國軍節度使封二字侯立廟賜額又寶祐初利州統制呂達戰殁贈官四轉元汪德臣鹽州人憲宗時命城益昌益昌為蜀喉襟蜀人憚其威名諸郡環視莫敢出門帝親征蜀至嘉陵白水交會勢淘急帝問船幾何可濟德臣曰大軍百萬非可淹延當别為方略即命繫舟為梁一夕而成如履坦途帝顧謂諸王曰汪德臣言不虛發也楊文安中統五年充閬州路安撫使閬州纍遭兵革户口雕耗文安乃教以耕桑鰥寡不能自存願相配偶者併為一户充役民始復業暢師文至元中為保寧路同知治尚平簡反側以安明李宗信洪武中知保寧府亷幹正直賦役必親檢册驗户高下遂得均平劉撝謙德州人宣德二年知保寧清勤仁恕尤加意學校士論歸之李璧廣西武緣人正德中鄢藍亂後知劎州百廢俱興新學校正風俗修城池塘堰復射圃建書院刻名儒録以教諸生士民祀之羅明南昌人正德中劒州判官遇鄢藍之寇偕其子介拒守孤城力竭被執父子死之朱導山陰入正德中知通江時蜀寇初平庶務方殷導諳治體百廢聿興九載致政民為立廟子簠知順慶孫變元厯布政巡撫總督蜀中世著其德焉徐尚卿南平人知劒川州崇禎十年李自成由漢中入四川尚卿泣語衆曰若輩宜速去我封疆吏誓死於此及城陷遂投繯死贈布政使司參議本朝乾隆四十一年賜諡節愍王時化江陵人崇禎中知昭化縣李自成陷城死之贈光祿丞年本朝乾隆四十一賜諡節愍王永年崇禎中通江指揮禦寇戰死同時守備郭震辰指揮田實擊賊廣元縣百丈關亦被執不屈死本朝乾隆四十一年均賜諡烈愍鄭夢眉金溪人崇禎末知南部縣張獻忠破城夢眉夫婦並縊死本朝乾隆四十一年賜諡節愍劉喬陜西人知昭化縣崇禎十一年拒獻賊被執大罵死之又中江教諭攝劍州事單之賓十七年獻賊陷城罵賊死本朝乾隆四十一年均賜諡烈愍詹嘉言松陽州人蒼溪教諭流賊猝至被執不屈死又劒州吏目李英俊隨徐尚卿擊賊兵敗死之通江巡檢郭纘化賊陷巫山纘化陳殁巴州同知張連曜建德人崇禎十四年獻賊圍城晝夜死守及陷罵賊死十一年均本朝乾隆四子入忠義祠本朝郭嶷然朝邑人康熙初知昭化縣邑有黜婦為衆盜主前令多被挾制嶷然至首捕下獄斃之餘盜解散境內以安其地嘗産金民爭以獻悉却之去官蕭然李向榮冀州人康熙二十六年知劒州治稱最吳三桂偽將談宏復叛屢加迫脅向榮不屈死之吳邦熉仁和人乾隆十九年知昭化縣清勤自矢治獄明決是非曲直各得其意以去歲有餘俸輒出以葺書院治橋梁不以一錢纍民邑人德之陳道濟望江人乾隆二十六年知閬中縣輕徭恤民興學造士一時有政簡民安之樂王贊武普安人嘉慶二年署南部知縣時邪匪不靖贊武嚴為備賊首羅其清盤踞蒼溪孫家坪不敢犯邑境戕邑民贊武意其可以義動單騎親往諭之賊羅拜呼青天即率衆去五年匪衆至猶好語假道贊武怒奮往追剿遇害於富村驛賜祭葬恤廕如例塗陳䇿都勻人嘉慶二年知通江縣教匪陷城死之賜祭葬恤廕如例朱射斗貴陽人官川陜鎮總兵撫戢兵民恩威並著嘉慶二年征剿邪匪纍著奇勳會攻逆首羅其清等於黑於閬中五年賊匪魚洞生竊渡嘉擒之陵江擊斃逆首包正而北射斗星馳洪追賊至西充賊支解之老虎巖遇伏被圍力事聞恤廕加戰死等前提調官臣鄭紹謙恭纂輯提調官臣張日章恭覆輯前校對官臣沈苐恭校校對官臣沈維鈺恭覆校大清一統志保寧府三人物漢范目閬中人有恩信方略高祖將定三秦月率賨人為前鋒秦地定封閬中慈鄉侯洛下閎閬中人明曉天文隱於洛下武帝徵待詔太史拜侍中不受譙隆閬中人為上林令武帝欲廣苑囿隆固諌後遷成臯令厯侍中以忠正稱又涼州刺史趙宏字溫柔有雋才京兆尹徐誦字子産有文學皆閬中人任文公閬中人父文孫明曉天官風星袐要文公少修父術州辟從事王莽篡位挈家奔子公山公孫𫐠時蜀武擔山石坼文公曰西州智士死我乃當之自是常會聚子孫設酒食後三月果卒益部語曰任文公智無雙譙元閬中人少好學能説易春秋成帝時對策高第拜議郎數上疏切諫故久稽郎官平帝時遷中散大夫王莽居攝變易姓名歸家隱遁公孫述僭號徵之不起遂隱藏田野終𫐠之世建武十一年卒明年天下平定光武詔祀以中牢子瑛善説易以易授顯宗為北宫衛士令楊仁閬中人習韓詩仕郡為功曹舉孝廉除郎太常上仁經中博士仁自以年未五十不應舊科顯宗時補北宫衛士令引見問當世政迹對以寬和任賢抑黜驕戚為先又上便宜十二事帝嘉之厯官什邡令寬惠為政勸課掾史子弟悉令就學墾田千餘頃後為閬中令卒於官嚴遵閬中人為揚州刺史惠愛在民每當遷官吏民塞路攀轅詔遂留之居官十八年卒遠近爭賻之齎錢以百萬計其子羽固辭弗受送吏乃散以為食食行客羽官徐州刺史三國漢程畿閬中人劉璋時為漢昌長巴西太守龎羲以天下擾亂郡宜有武備頗招合部曲有讒羲於璋者羲懼遣畿子郁索兵自助畿勸羲盡誠並規郁效力先主辟為從事祭酒隨征吳敗績泝江而還或告之曰後追巳至解船輕去可免畿曰吾在軍未曾為敵走泥從天子而見危哉乃死子祁與犍為楊戲並知名早卒姚胄閬中人諸葛亮駐漢中辟為掾並進文武之士亮稱曰掾並存剛柔以廣文武之用可謂博雅矣願諸掾各希此事稍遷為尚書僕射時人服其真誠篤粹黃崇閬中人父權漢鎮北將軍降魏崇為尚書郎隨諸葛瞻拒鄧艾屢勸瞻宜速行據險母令敵得入平地瞻未納崇至於流涕瞻卻戰至綿竹崇帥厲軍士期於必死臨陳見殺馬忠閬中人建安末舉孝廉巴西太守閻芝發諸縣兵五千人以輔遺缺遣忠送往先主與語稱之建興八年諸葛亮召為參軍南中劉胄反以忠討之遂斬胄平南土封博陽亭侯開復建寧越嶲舊郡延熹中加拜征南大將軍平尚書事忠寬濟有度量忿怒不形於色然處事能斷威恩並立蠻夷畏而愛之及卒立廟祀之馬勳閬中人劉璋時為州書佐先主定蜀辟為左將軍屬後轉州别駕從事馬齊閬中人太守張飛功曹飛貢之先主為尚書郎建興中從事丞相掾遷廣漢太守復為飛參軍後拜尚書與馬勳皆以才幹顯句扶漢昌人忠勇寬厚數有戰功功名亞於王平官至左將軍封宕渠侯張嶷南充國人為越巂太守蠻夷服其恩信在郡十五年徵拜蕩寇將軍隨薑維伐魏於狄道臨陳隕身嶷初見大將費禕待信新附太過以書戒之禕果為降人所害吳諸葛恪大興兵圖攻取嶷與諸葛瞻書曰太傅受寄託之重而離少主履敵庭非良算恪竟以此夷族嶷識見多如此類晉譙秀西充國人性靜默不交於世郡察孝廉州舉秀才皆不就及李雄據蜀略有巴西雄叔父驤驤子壽皆慕秀名具束帛安車徵之皆不應常冠皮辨敝衣躬耕山藪桓溫滅蜀上疏薦之朝廷以秀篤老兼道遠故不徵遣使敕所在四時存問及蕭敬文叛亂避難宕渠鄉里宗族憑依者以百數年九十餘卒譙登西充國人為梓潼內史李驤攻涪城登食盡援絶驤攻之益急登不屈死之龔壯巴西人潔己白守與鄉人譙秀齊名父叔為李特所害壯積年不除喪力弱不能復仇及李壽戍漢中與李特孫李期有隙壯欲假壽以報乃説夀稱藩於晉遂率衆討期克之壽襲偽號欲官之壯誓不仕遂詐稱聾終身不復至成都壯每嘆中夏多經學而巴蜀鄙陋兼遭李氏之難無復學徒乃著邁德論南北朝齊陽黑頭華陽人疏從四世同居並共衣食又同縣郝道福纍世同爨建武三年皆詔表門閭蠲租役按其時華陽縣在今廣元縣地陳侯瑱西充國人父宏遠梁益州刺史蕭範命討白崖山賊張文萼宏遠戰死瑱固請復讐每戰必先鋒陷陳遂斬文萼由是知名範委以將帥之任纍遷至馮翊太守入陳以功授湘州刺史封零陵郡公魏沓龍超晉壽人永熙中梁將樊六熾寇益州攻圍既久刺史傅敬和遣龍超夜出請援於漢中為文熾所得許以封爵使告城中曰外無援軍宜早降龍超乃告刺史曰援軍數萬近在大寨文熾大怒火炙殺之至死詞氣不撓唐李叔明新政人本鮮于氏賜宗姓乾元中除司勳員外郎副漢中王瑀使回紇回紇慢叔明讓曰大國通好使賢王持節可汗唐之壻恃功而倨可乎可汗為加禮厯洛陽令號能吏拜東川節度使兵盜之餘撫接有方子升從德宗幸梁州有扈衛功官太子詹事宋羅承之巴州清化人幼稚特好兵略乾德中文協率衆攻閬巴承之竭資募士擒文協太祖召見賜感義軍節度使兼知巴州曾孫士堯事母至孝家産盡遺宗族子姪之貧孤者以孝友旌表陳省華閬中人事孟昶為西水尉蜀平歸宋授隴城主簿厯櫟陽樓煩令端拱三年太宗親試進士伯子堯叟登甲科占謝辭氣明辨太宗顧問此誰子王沔以省華對即召省華為太子中允纍遷殿中丞知鄆州蘇州潭州智辨有吏幹入掌左藏判吏部南曹擢至左諫議大夫贈太子少師裴莊閬中人為高陵主薄雷德􅋮稱其有守遷太子中允端拱初通判真定纍遷祠部郎中至光祿卿卒莊有吏幹好為規畫慷慨敢言太宗奬其忠讜多聽納晚年喜接賓客終日無倦子煥咸平進士陳堯叟省華長子端拱進士授祕書丞再遷工部員外郎廣西西路轉運使會加恩黎桓為交州國信使初將命者必獲贈遺數千緡桓責斂於民堯叟卻之又悉捕亡命歸桓桓感捕海賊為謝纍遷樞密直學士簽署院事真宗幸澶淵命先赴北寨視戎事許以便宜景德中擢知樞密院事加尚書左丞進太傅同平章事卒贈侍中諡文忠録其孫知章知言為將作監主簿子師古賜進士出身後為都官員外郎希古至太子中舍陳堯佐堯叟弟進士及第厯魏縣中牟尉作海喻一篇人奇其志通判潮州有治績纍遷諫議大夫為翰林學士拜參知政事晉同平章事集賢殿大學士以太子太師致仕卒贈侍中諡文惠堯佐少好學父授諸子經其兄未卒業堯佐竊聽已成誦初肄業錦屏山後從种放於終南山及貴讀書不輟善古隸八分尢工詩有集三十卷又有潮陽編野廬編愚邱集遣興集陳堯咨堯佐弟舉進土第一授將作監丞通判濟州纍擢右正言知制誥判吏部流內銓舊格選人用舉者數遷官而寒士無以進堯咨進其可擢者帝特遷之以學士知永興軍入為翰林學士徙知天雄軍卒贈太尉諡康肅堯咨以氣節自任工隸書善射號小由基子述古太子賓客博古篤學能文為館閣校勘卒陳漸堯佐從子少以文學知名淳化中與其父堯封皆以進士試廷中太宗擢漸第輒辭不就願擢其父許之咸平初始仕為天水尉纍遷隴西防禦推官坐法免歸蜀中學者多從之遊後召至京師授潁州長史遷耀州節度推官卒有文集十五卷號金龜十鮮于侁閬州人舉進士為江陵右司理參軍慶厯中侁條當世之失有四其語剴切唐介稱其名於上官交章論薦侁盛言左參軍李景楊枝江令高汝士之美乞移與之介益以為賢通判綿州綿吏狃貪成風侁至一切勿取趙抃使蜀薦於朝未及用神宗詔求直言侁應詔上書論時政專指安石安石怒毁短之神宗曰侁有文學可用除利州路轉運通判部民不請青苗錢安石遣吏詰之侁曰民自不願豈能強之會詔諸路各定所役緡錢轉運使李瑜定四十萬侁爭之曰利路民貧地瘠半此可也瑜不從各以其事聞神宗從侁議擢京東西路轉運使徙知揚州哲宗立以東國困於役復以侁使京東士民聞其重臨如見慈父母召為太常少卿拜右諫議大夫首言君子小人消長之理甚備又請廓言路宜復六科之舊以疾求去出知陳州卒侁刻意經術著詩傳易斷尤長於楚詞蘇軾謂近屈原宋玉自以為不可及蒲卣閬州人登進士厯提舉湖北京西常平再提點潼川路刑獄俱有治績纍官中大夫馬涓南部人元祐時進士及第為秦州簽判從謝良佐講修身為己之學後為臺官有聲以元祐黨罷宇文百之新井人性孝友數世不異居庭前六燕共巢紫荆異本同幹人以為孝友之應雍孝聞新井人元符末有聲太學徽宗時省試奏名第一廷試策力詆二祭及時政未便者坐竄海外宣和末上思其忠特授修武郎已卒黃裳普成人乾道進士調巴州通江尉時和糴病民裳賦詩以諷總領李蘩為罷糴纍官國子博士光宗登極裳進對論中興規模遷嘉王府翊善作八圖以獻每進讜言帝詔勞裳光宗不朝重華宫裳請甚切一日抗聲諌上起入宫裳挽裾隨之至宫門揮涕而出慶元初改禮部尚書勸上愼終如始懇懇數千言為先事之憂卒贈資政殿學士諡忠丈裳簡易端純推賢樂善出於天性篤孝友與人言傾盡底藴所論天人性命皆發明伊洛之旨子瑾大宗正丞兼刑部郎官孫子敏刑部郎官楊巨源昭化入倜儻有大志善騎射涉獵諸書劉光祖薦以右職監興州合江倉吳曦叛巨源結義士誅之功第一輔承事郎安丙與爭功尋殺巨源聞者流涕事白贈寶謨閣直學士諡忠愍郭靖高橋土豪巡檢吳曦叛盡遷驚移之民使還金靖亦在遣中至白崖關告其弟端曰我家世為宋民願死於此為趙氏鬼遂赴江死嚴大猷蒼溪人吳曦叛大猷詩云笏未到身難擊泚兵如入手易擒吳後以特奏名授隆慶府司理參軍著補闕蜀都賦有方山集四卷明何澄劒州舉人正統中知安福縣築寅陂浚渠道復密湖以溉民田秩滿民乞留詔還任及去邑民爭饋金帛一無所受李毅南部人宣德正統間儲榖數千石賑貸貧民嵗荐飢悉焚其券仍納穀數百斛於賑濟倉中人稱其義袁璋南江人正德間流賊倡亂都御史林俊橔令討賊璋所向有功力竭為賊所獲子襲挻身救父連殺七賊𬒳擒襲死三日目猶瞪視其父總制彭澤嘉其忠節祀於忠義祠雷應通廣元人正德初流賊衝百丈關知縣何漙禦之應通父子七人踊躍倡衆誓以死戰經旬無援為賊所執父子俱罵賊死按明史附見吳景傳作嘉州人疑因廣元舊名嘉川而訛如同傳袁璋亦訛南江作江南也徐旻保寧千户所百户奉檄討鄢藍賊多斬獲功副使馮傑被圍於鐵山關旻往救為賊執不屈死彭澤為奏聞贈正千户其時死寇難者利州指揮蔡高劒州冠帶散官李開之蒼溪生員陳表俱以督戰禦賊𬒳執不屈死通江楊輔政戰死巡撫林俊以聞立忠烈坊旌之楊上林通江人父簡病篤上林祝於天斷一指和藥簡立愈後復病上林又割股以進及卒哀毁幾絶者數次趙炳然劒州人嘉靖進士為御史核宣大山西兵餉劾前後督撫樊繼祖等一百七十七人侵冒罪坐謫有差厯遷浙江巡撫廉潔率下召為兵部尚書協理戎政尋復督宣大山西邊防甚飭召還部乞休去炳然厯官三十餘年清徑練達所至有聲卒贈太子太保諡恭襄賈棲鸞巴州人嘉靖中知大冶縣時盜賊縱掠棲鸞簡徒親率入山擒巨寇十餘人盜自是不敢犯境謝東陽保寧千户所人嘉靖進士為人忠信端方居官廉潔自矢母族甚貧分俸給之事凡極愛敬撫孤姪成人讓以産祀鄉賢陳敏巴州諸生事母至孝崇禎七年賊破巴州闔城逃散時敏母病篤不忍舍去賊至欲殺其母敏引頸乞代賊義而釋之李元扶劒州諸生流賊陷州城入宅執其母徐氏欲殺之元扶哀求全母賊許之殺元扶吳宇英廣元人官至户科給事中家居崇禎末舉義兵討賊不克死十一年本朝乾隆四賜諡忠愍楊于鼎劒州舉人崇禎十年流寇至衆潰于鼎率子姪楊令青等與州守徐尚卿守城城陷尚卿被執于鼎率衆巷戰奮臂擊賊賊怒支解死子姪並被殺本朝乾隆四十一年豫入忠義祠楊于陛劒州舉人厯官雲南武定府同知普名聲之亂巡撫王伉令監紀軍事兵敗被執死之贈太僕