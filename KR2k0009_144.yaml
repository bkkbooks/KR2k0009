front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_144-1a}
body:
  text: 保寧府二古迹閬中故城在今閬中縣西華陽國志巴子後治閬中秦置縣後漢建安六年劉璋徙龎義為巴西太守是為三巴之一通典閬中城名高城前臨閬水却據連岡舊唐書地埋志閬水迂曲經郡三面故曰閬中寰宇記閬居蜀漢之半當東道要衝今郡城即古閬中城宋立北巴西郡梁天監中又於此置南梁州及北巴郡西魏廢帝二年平蜀改為隆州取其地勢連岡高隆為名尋又立盤龍郡以郡中有盤龍岡為名唐改閬州以閬水為名輿地紀勝圖經云貞觀十一年徙於州東咸亨二年又徙盤龍山側載初元年又徙張儀故城即今治也宋史地理志閬州淳祐三年移治大獲山城邑考府城舊為土城在嘉陵江北岸與錦屏山相峙相傳漢建安中劉璋所築元末明玉珍始移而西按水經注閬水經閬中縣東漢城本在漢水之東蓋自宋末移治之後元雖移還故縣不益州大同六年乂克之改為黎州武陵王蕭紀僣號於蜀以席嶷為黎州刺史嶷反州屬魏復改為西益州三年改為利州隋大業三年改為義城郡唐武德元年又改利州綿谷縣郭下本漢葭萌縣地晉孝武分晉夀縣置興安縣隋開皇十六年改為綿谷縣因縣東南綿谷為名州城西臨嘉陵江周大象二年王謙據子城南北起土山援益州叛遣達奚惎攻利州於軍至惎敗走今太城內東西南北有大池達奚惎取土處也寰宇記齊明帝永泰二年分晉夀郡之興安縣置東晉夀郡於烏奴城北一里即今利州是也平蜀故城在廣元縣東南元和志裔山縣西北至利州一百十五里漢葭萌縣地後魏於今縣西南十五里置義城縣隋義寧二年改名義清縣天寶元年改名裔山以縣北三十里有可裔山為名縣城治北崖山上武德四年築惟三西有城皆臨絶險南面因險不更築城九域志乾德三年改裔山曰平蜀熙寧三年省入嘉川益昌故城今昭化縣治元和志縣東北至利州四十五里漢葭萌縣地舊唐書地理志後魏分晉夀置京兆縣後周改為益昌按宋齊二志白水郡皆領益昌縣而魏志南白水郡領京兆縣蓋宋分晉壽置益昌魏改益昌為京兆耳舊唐志得之猶未甚悉寰宇記謂本岐坪縣誤晉夀故城在昭化縣南古苴侯國秦漢葭萌縣也華陽國志昔蜀王封其弟葭萌於漢中號曰苴侯命其邑曰葭萌苴侯與巴王為好巴與蜀讐故蜀王怒伐苴侯苴侯奔巴永救於秦秦遂滅蜀因取苴巴分置郡縣漢建安十八年劉先主自葭萌南攻劉璋留中郎將霍峻守葭萌城璋遣將由巴閬水改峻歲餘不能拔為峻所敗成都既定先主更葭萌曰漢壽晉書地理志泰始三年改漢壽為晉壽後孝武分置晉壽郡水經注西晉壽郡蜀王弟葭萌所封為苴侯邑故遂城為葭萌矣元和志晉壽故城在益昌縣東南五十里輿地紀勝益昌東南沿江有平田號黃金壩即故晉壽故城基按宋齊志皆作晉夀郡而水經注謂之西晉壽魏書地形志益州有西晉壽郡領隂平一縣蓋因當時分東界為東晉壽遂以此為西晉壽也白水故城在昭化縣西北漢置白水縣屬廣漢郡蜀漢分屬梓潼郡晉屬晉壽郡宋置白水郡後魏為南白水郡梁置平興郡兼置北益州隋開皇初郡廢縣改名平興十八年又改曰景谷屬義城郡唐武德四年又於縣置沙州貞觀元年州廢屬利州寶厯元年省尋復置五代時廢水經注白水東南徑白水縣故城東即白水郡治也元和志景谷縣東南至利州六十六里漢白水縣地宋元嘉十七年氐人楊難當軍克葭萌關因分白水置平興縣周置沙州隋改為景谷大業二年廢沙州縣屬利州縣城本平興城楊難當所築削山為城城三角中有井傅豎眼所穿九域志昭化縣有白水鎮明統志沙州城在昭化縣白水鎮周回五里縣志景谷廢縣在今縣西北一百里漢白水縣又在其北諾水故城今通江縣治舊唐書地理志漢宣漢縣地梁分宣漢置始寧縣魏分始寧置諾水縣後省武德八年復分始寧東境置壁州及諾水縣今州所治寰宇記壁州西至巴州一百五十里漢宕渠縣地後魏大統中於今州理置諾水縣屬遂寧郡隋開皇三年省諾水縣入始寧縣大業三年以始寧屬巴州唐武德八年於後魏諾水城再置諾水縣仍於縣理立壁州天寶元年以邑枕巴江改為通江縣文獻通考宋開寶五年廢壁州尋復熙寧五年廢州以通江隸巴州舊志元志云宋為上通江下通江二縣蓋宋末所分元至元二十年併入曾口後復置舊治趙口坪明洪武中徙今治有廢通江縣在今縣東九十里蓋即宋末之下通江也又有大城在縣東百里許白石廢城之上四圍石壁可容萬人其建置無考難江故城在南江縣治梁置難江縣西魏改盤道在今縣南巴州界周復置難江縣及集州平桑郡於此寰宇記集州正南微西至巴州一百八十里西至利州三百里北至興元府二百七十里漢宕渠縣地後魏景明中於巴嶺南置洋州其章平桑三沒梁大同中又於巴嶺側立安郡大統中山南覆寧敬水平南三郡仍立東巴州領之州理為木馬按木馬地名在今洋州界無復遺址魏恭帝二年改東巴州為集州以東北集川水為名人户寡少寄理梁州周天和五年移集州於巴嶺南又置難江縣為州理因江水難涉故以為名隋大業二年廢集州以難江屬漢川郡仍於廢州城置公山鎮唐武德元年廢鎮復於難江縣置集州宋史地理志巴州難江縣舊隸集州熙寧五年來屬舊志元至元二十年省入化成明正德十一年復於故址置縣改名南江漢德故城在劒州東北蜀漢置屬梓潼郡晉宋齊因之後省元和志漢德故城一名黃蘆城在普安縣東北四十六里三面並阻絶澗惟西面少平周回百五十步新巴廢郡在劒州西北舊志按沈約宋志梁州有新巴郡晉安帝分巴西置領新安晉城晉安三縣又益州有南新巴郡元嘉十二年於劒南置領新巴晉城晉安漢昌桓陵綏德六縣南齊志新巴郡亦治新巴而南新巴郡寄治陰平魏收志益州新巴郡治新巴隋志後魏新巴郡治晉安在今昭化縣界蓋周時移治廢新巴入之也新得廢州在巴州東元史地理志保寧路初領新得小寧二州後併入閬中縣按元統志蓬州東北至新得州三百里又儀隴縣東南至小寧州一百五十里蓋皆在今巴州東南界蒼溪故縣即今蒼溪縣治寰宇記縣在閬州西北五十七里漢閬中縣地後漢永元中於今縣北巴嶽山側置漢昌縣隋開皇四年移理曲肘川即今縣是也十八年改漢昌縣為蒼溪因縣界蒼溪谷為名按晉志巴西郡領蒼溪縣舊志宋元嘉八年併入漢昌有廢縣在今縣西南今考宋書州郡志無此縣而隋志舊唐志寰宇記皆言隋改漢昌為蒼溪疑修晉志者以隋縣誤入後人又因此附會然不可考矣南充國故縣今南部縣治譙周巴記後漢初平四年分充國為南充國縣隋書地理志巴西郡統南部縣舊曰南充國梁曰南部西魏置新安郡後周郡廢寰宇記南部縣在閬州東南七十里漢充國縣地梁於此置南部郡周閔帝元年罷郡立南部縣屬盤龍郡以地居閬中之南改曰南部舊志宋端平兵亂縣無定治寶祐中嘗移治縣南跨鼇山元復還故治按寰宇記此條與隋志不同今建置從隋志思恭廢縣在閬中縣東南唐武德元年折閬中縣置屬隆州七年省入閬中舊志在今縣東南思恭山側岐坪廢縣在蒼溪縣東北一百里寰宇記縣在閬州東北一百六十里漢葭萌縣地宋分置宋安縣屬宋熙郡後魏廢帝三年改宋安為岐坪隋開皇三年以縣屬利州唐平州貞觀二武德七年又割岐坪及義清縣置西年州廢屬利州開元二十三年割屬閬州唐書地理志岐坪縣寶厯元溪天復中王建復表置九域志熙年省入奉國蒼寧三年省岐坪縣入為鎮奉國新政廢縣在南部縣東南唐書地理志閬州新政縣本新城武德四年析南部相如一百四十置避隱太子名更寰宇記在閬州東南里漢充國縣地輿地紀勝元豐五年徙治晉安政入南元史地理志至元二十部縣舊志在縣東南五年併新十里新井廢縣在南部縣西縣北武德元舊唐書地理志閬州新井縣漢充國年分南部晉安二縣置寰宇記在閬州西南九十里地理志至元二縣界頗有鹽井因名元史十年併新井入南部縣晉安廢縣在南部縣西北曰西國縣屬北晉置西充國縣屬巴西郡巴西郡西魏改晉城唐改劉宋晉安宋省隋書地理志梁置木蘭郡西魏巴西郡統晉城縣舊曰西充國廢郡改縣名寰宇記晉安縣在閬州西七十里本閬耽四夷縣道記云梁中縣晉於此置晉安縣按於此置金遷戍周閔帝改賈為金遷郡仍置晉安晉城西水三縣屬焉郡理晉安隋開皇三年罷郡仍省晉安縣自今縣東十四里移晉城縣於晉安舊理唐武德四年改晉城為晉安縣即今理也九域志熙寧三年省晉安縣為鎮入西水舊志晉安廢縣在今南部縣西北四十里按寰宇記此條亦與隋志不同西水廢縣在南部縣西北隋書地理志巴西郡統西水縣梁置掌天郡西魏改曰金遷隋開皇初郡廢寰宇記縣在閬州西一百二十里亦漢閬中縣地梁大同中於今縣西北三十五里置掌天戍後魏廢戍周閔帝元年改為西水縣以界內西水為名隋大業元年移於今理輿地紀勝圖經云大業中以水泛漲徙治彭定故宅元史地理志至元二十年併西水入南部舊志在縣西北一百四十里嘉川廢縣在廣元縣東宋書州郡志梁州宋熙郡太守徐志新置領與樂歸安宋安元壽嘉昌五縣魏書地形志益州宋熙郡領興樂元壽二縣隋書地理志義城郡嘉川縣舊置宋熙郡開皇初廢寰宇記嘉川縣在集州西一百五十里漢葭萌縣地宋武帝於此置宋熙郡及興樂縣後魏恭帝元年改為嘉川縣取嘉陵江所經為名隋開里三年罷郡以縣屬利州唐貞觀二年改屬靜州十七年復屬利州永泰元年割屬集州九域志咸平五年改屬利州在州東一百十里縣志元省入綿谷縣今名嘉川鄉按齊書州郡志郡治興平即興樂之訛也通平廢縣在廣元縣東南唐置寰宇記廢通平縣在集州西一百十五里梁大同六年於此置池川縣屬木門郡隋開皇初省為池川里唐武德元年復分清化西北界置狄平縣屬靜州二年改為地平縣取天成地平之義七年以靜州自木門故城移理於此貞觀十七年廢靜州以縣屬集州永泰元年改為通平縣乾德五年併入嘉川舊志廢縣在今縣東南一百六十里按唐書地理志通平寶厯元年省與寰宇記不合蓋其後復置宋始廢也華陽廢縣在廣元縣北隋書地理志綿谷縣有華陽郡梁置華州西魏並廢按宋書州郡志梁州有華陽郡徐志新置寄治州下領華陽與宋宕渠嘉昌四縣蓋劉宋置郡本在南鄭齊梁時徙而西南也葭葫廢縣在昭化縣南宋書州郡志南新巴郡領晉安縣舊志晉安帝置隋書地理志義城郡葭萌縣後魏曰晉安置新巴郡開皇初廢十八年縣改名焉元和志縣北至利州一百五十里漢葭葫縣地東晉於今縣南置晉安縣隋改為葭萌取漢舊縣名也九城志在利州南八十五里元史地理志元初併葭萌縣入昭化按此縣乃漢葭萌南境隋始名為葭萌元和志明白可證或以為即漢葭葫者誤魚盤廢縣在昭化縣西北梁時置魚石洞戍大寶初揚乾運攻楊法琛於平興法琛退保魚石洞即此西魏置魚盤縣隋大業初省入景谷縣唐書地理志景谷縣西北有魚老鎮城即故魚盤也化成廢縣今巴州治寰宇記巴州西至閬州二百十里東南至達州二百七十里西南至蓬州二百十里漢宕渠縣地後漢分置漢昌縣即今州理也四夾縣道記云李壽時為獠所據至宋末乃於巴嶺南置歸化郡齊因之梁置歸化木門二郡後魏正始元年於漢昌縣理置大谷郡帶防兵以鎮撫之延昌三年於大谷郡北置巴州取古巴國為名隋改清化郡唐後為巴州理化成縣本後漢漢昌縣梁普通六年於梁大