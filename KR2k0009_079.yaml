front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_079-1a}
body:
  text: 汝寕府二古蹟古懸瓠城即今汝陽縣治本漢上蔡縣地晉時謂之懸瓠城東晉移汝南郡治此興寕二年燕李洪等攻汝南敗晉兵於懸瓠是也為南北朝相爭要地屯兵置戍宋泰始三年入於魏為豫州刺史治梁天監七年降梁尋復為魏取太清初仍入於梁尋又没於東魏水經注汝水東逕懸瓠城北今豫州刺史汝南郡治城之西北汝水枝别左出西北流又屈西東轉又西南會汝形若垂瓠隋開皇初郡廢大業初置郡改縣曰汝陽唐因之元和十二年李愬定襲蔡之謀因夜半至懸瓠城擒吳元濟即此地元和志蔡州理城古懸瓠城也汝水屈曲形若垂瓠故城取名焉寰宇記亦名懸壺城平輿故城在汝陽縣東南六十里故沈國戰國時為楚邑春秋文公三年晉人伐沈注平輿縣北有沈亭又定公四年蔡滅沈史記秦始皇二十一年李信伐楚攻平輿二十三年王翦取陳以南至平輿是也漢置縣爲汝南郡治後漢晉因之東晉徙郡治懸瓠而平輿爲屬縣後魏因之水經注汝水逕平輿縣故城南舊沈國也北齊縣廢隋大業初重置仍屬汝南郡唐武德中屬豫州貞觀元年廢天授二年重置元和志故城在汝南縣東北六十里寰宇記在今汝陽縣東汝水南今新蔡縣西九十里有故城即隋縣也安成故城在汝陽縣東南漢置縣建始元年封王崇爲安城侯國屬汝南郡後漢曰安城建武初又封銚期爲侯三國魏爲豫州治晉仍屬汝南郡後魏因之北齊廢括地志安成故城在汝陽東南七十里宜春故城在汝陽縣西南漢置縣武帝元朔五年封衛伉爲宜春侯國屬汝南郡後漢曰北宜春安帝永初三年封后父閻暢爲侯國晉亦曰北宜春宋省水經注溱水逕北宜春縣故城北豫章有宜春故加北矣括地志故城在汝陽縣西南六十七里白狗故城在正陽縣東南梁置西淮州又置淮川郡治白狗堆爲北面重鎮東魏天平二年豫州刺史堯雄攻白狗堆陷其城擒北平太守苟元廣是也北齊廢州置齊興郡旋又廢為白狗縣隋開皇初改曰淮川大業初省入真陽唐武徳四年復置淮川縣屬息州貞觀初仍廢入真陽唐書李愬禆將閻士榮下白狗柵即白狗城也寰宇記白狗城在縣西南七十里安陽故城在正陽縣西南漢文帝八年封淮南厲王子㪍為安陽侯國屬汝南郡後漢建武中封吳漢兄子彤為侯國晉太康元年改曰南安陽劉宋復曰安陽後漢屬義陽郡隋省縣入真陽唐初復置屬豫州後廢括地志安陽故城在新息縣西南八十里慎陽故城在正陽縣北四十里漢高帝十二年封欒説為侯國元狩五年國除為縣屬汝南郡顏師古漢書注慎字本作滇闞駰云永平五年失印更刻遂誤以水為心也劉宋改為滇陽水經注慎水東逕慎陽縣故城南縣取名焉元和志真陽縣北至蔡州一百里明移今治武津故城在上蔡縣東劉宋置縣屬汝陽郡泰始四年魏將趙懐仁寇武津豫州刺史劉勔遣將擊破之魏書地形志汝陽郡武津有武津城隋改臨汝為武津而縣廢上蔡故城在上蔡縣西故蔡國叔度所封十八世平侯徙新蔡遂以此為上蔡邑後屬楚左傳昭公十一年楚靈王滅蔡使公子棄疾為蔡公是也漢屬汝南郡安帝永初元年封鄧騭為上蔡侯水經注汝水東南過上蔡縣西九江有下蔡故加上也劉宋徙上蔡縣治懸瓠城而此城廢元和志上蔡縣南至蔡州七十里本漢舊縣後魏神龜三年於此置臨汝縣高齊廢隋開皇十二年移於今理為上蔡縣寰宇記上蔡故城在今縣西南十里按隋志大業初改上蔡為汝陽因復改武津為上蔡元和志作開皇十二年誤新蔡故城今新蔡縣治左傳昭公十三年楚平王歸蔡隱太子之子廬於蔡是為平侯漢志汝南郡新蔡蔡平侯自蔡徙此故名後漢建武二十八年封吳漢子國為新蔡侯晉惠帝時封弟清河王子籥為新蔡王元和志縣西北至蔡州一百五十里葛陵故城在新蔡縣西北五十里以近葛陂而名後漢建武十五年徙封銚期子丹為葛陵侯水經注鮦陽縣有葛陵城城之東北有楚武王冢民謂之楚王瑟城鮦陽故城在新蔡縣東北七十里漢置縣屬汝南郡應劭曰鮦水之陽後漢永平元年封陰慶為侯邑晉屬汝陰郡後屬新蔡郡咸康二年省入新蔡後復置劉宋因之後魏永安中陷武定中復齊廢隋開皇十一年復置屬淮陽郡唐初屬沈州貞觀初廢章懐太子曰鮦陽城在新蔡縣北定潁故城在西平縣東漢安帝永初二年分上蔡縣置屬汝南郡延光中封尚書令郭鎮之為侯邑晉仍屬汝南郡劉宋省武陽故城在西平縣西南後魏置武陽縣屬襄城郡隋開皇十八年改曰吳房大業初省西平故城在今西平縣西漢置縣屬汝南郡後漢更始初封李通為西平王建初七年徙封廣平王羨為西平王章和二年除永初元年又封鄧宏為西平侯應劭曰西平故栢子國也水經注潕水東過西平縣北其西有吕壚即西陵亭也西陵平夷故曰西平唐貞觀元年省天授元年分郾城復置寰宇記故城在縣西七十里舊志在縣西北四十五里吳房故城今遂平縣治故房子國左傳楚靈王遷房於荆昭公十三年平王復之漢書高帝八年封功臣楊武為吳房侯注孟康曰吳房本房子國以吳夫㮣封此故曰呉房元和志縣東南至蔡州九十里後魏置遂寕縣隋改灈陽大業初又改吳房唐書元和十二年李愬討吳元濟攻吳房克其外城而還既而元濟平因改縣曰遂平按縣志高宗南渡後廢縣為吳房鎮設尉司屬西平縣後没入金仍為遂平縣元初省入汝陽大德八年復置明仍元舊本朝因之灈陽故城在遂平縣東南漢置縣屬汝南郡後漢建武二十八年封吳漢孫旦為侯邑晉因之宋志作瞿陽後魏因之北齊省章懷太子曰其地在吳房東朗陵故城在確山縣西南三十五里漢置縣屬汝南郡後漢建武十五年封臧宫為侯邑三國魏咸熙初封何曾為朗陵侯晉武帝即位進爵朗陵公皆即此地劉宋縣廢後魏延興二年拜大陽酋長桓誔為東荆州刺史治朗陵後徙比陽改置安昌縣於此元和志朗山縣東北至蔡州九十里本漢安昌縣地後魏太平真君二年於朗陵故城復置隋開皇三年移於今理屬豫州十六年改為朗山縣寰宇記故城在今朗山縣西南三十五里陽安故城在確山縣東北漢置縣屬汝南郡綏和二年封丁明為陽安侯元始元年除為縣後漢及晉因之東魏兼置陽安郡領永陽一縣北齊郡縣皆廢義陽故城在信陽州南四十里亦曰仁順城東晉自石城移郡治此水經注溮水逕仁順城南故義陽郡治是也初魏置義陽郡治安昌後省晉初又置義陽郡治新野後移從不一晉末始移治於仁順城劉宋又移置司州於此齊因之南朝諸王多以義陽為封號梁天監三年入後魏改置郢州大通二年仍入梁改曰北司州東魏武定七年復入魏北周改為永安郡隋初郡廢復改平陽縣曰義陽唐為申州治舊唐志晉自石城徙居仁順即今州理也宋避諱始改曰信陽元志宋端平閒信陽軍地荒凡四十餘年至元十四年改立信陽府尋降為州二十年徙州治羅山縣而此城廢按元以前信陽軍治信陽縣即舊義陽縣也元改軍為州始别置羅山縣而移州治於羅山縣故地然猶領羅山信陽二縣至明信陽州則有羅山縣無信陽縣當是舊信陽並省入州矣鍾武故城在信陽州東南漢宣帝元康初封長沙頃王子度為侯國屬江夏郡後漢書建武三年臧宫將兵狗江夏擊鍾武下之注故城在今申州鍾山縣西南劉宋復置屬義陽郡後魏省水經注淮水東逕鍾武故城南本江夏之屬縣也環水故城在信陽州東南劉宋置縣屬義陽郡齊屬北義陽郡後魏廢宋書州郡志義陽太守環水長明帝泰始三年屬永安郡後省永安還此鍾山故城在信陽州東南十八里漢鄳縣地隋置縣屬義陽郡隋志鍾山舊曰鄳後齊改曰齊安仍置郡開皇初郡廢縣改曰鍾山是也唐屬申州元和志鍾山縣西至申州四十里宋開寶九年省入信陽寰宇記廢鍾山縣在申州東南十八里平春故城在信陽州西北後漢建初四年封子全為平春王後為侯國屬江夏郡晉太元中避諱改曰平陽尋移治仁順城而故城廢劉宋孝建中仍析平陽置平春縣屬義陽郡蕭齊屬南義陽郡後魏廢水經注淮水逕平春縣故城南漢章帝子全國也淮源故城在信陽州西北隋置縣屬義陽郡隋志淮源後齊置曰慕化屬淮安郡開皇初郡廢大業初縣改名焉唐省輿地紀勝淮源城在信陽城西北六十五里成陽故城在信陽州東北漢高帝十一年封奚意爲成陽侯國屬汝南郡後漢省後魏太和三年置城陽郡水經注淮水東逕城陽縣故城南魏城陽郡治也後入於梁置城陽義興二縣兼置楚州尋没於東魏置西楚州北齊改置永州隋開皇九年州廢縣屬汝南郡大業末縣廢又州北六十里有楚王城亦曰楚城梁大通二年夏侯䕫遣别將屠楚城中大通二年樊毅克齊楚子城唐元和十二年李愬攻蔡别將王義破楚城皆即此地舊傳楚文王破申時所築鄳縣故城在羅山縣西南九里即春秋楚冥阨之地戰國䇿楚弋者對襄王曰王出寶弓涉鄳塞而待秦之倦淮南子天下九塞楚有鄳阨是也漢置鄳縣屬江夏郡後漢建武初封鄧邯爲鄳侯後魏正始初改屬齊安郡水經注溮水逕鄳縣故城南元和志羅山縣本漢鄳縣梁武帝置西汝南郡於此開皇三年併入鍾山十六年於鍾山析置羅山縣寶城故城在羅山縣西劉宋孝建三年置寶城縣屬義陽郡南齊改寶城屬北義陽郡後魏屬齊安郡北齊省保城廢縣在汝陽縣南三十里劉宋孝武置縣屬汝南郡後魏因之隋志汝陽大業初廢保城入焉金史汝陽鎮一保城永康廢縣在新蔡縣東南隋志新蔡後齊置永康縣後改名澺水大業初廢入焉舒城廢縣在新蔡縣北隋志開皇十六年置舒州及舒城縣大業初州廢縣省入新蔡唐書武德四年以新蔡褒信舒城置舒州貞觀元年廢省舒城入沈邱義綏廢縣在遂平縣北後魏置縣屬襄城郡北齊省入遂平安昌故縣在確山縣西漢河平四年封張禹爲安昌侯國屬汝南郡後漢省宋志豫州初有初安綏城二郡綏城郡領安昌招遠二縣尋俱廢後魏改置於朗陵而故縣廢馬鄉城在汝陽縣南六十里魏書地形志平輿有馬鄉城按水經注溱水逕馬鄉城北疑即此城也今爲馬鄉店臨淮城在正陽縣南八十里今朱家店即其故址晉王城在上蔡縣東北八十里内有晉王井井水深綠有門甚邃人不敢入相傳爲李克用屯兵處四望城在新蔡縣東二十五里後魏新蔡郡治四望城太和十一年豫州刺史王肅於四望陂南築之以禦梁梁太清二年豫州刺史羊鴉仁以二魏交逼糧運懸斷乃棄懸瓠歸於義陽仍留夏紹等停四望城防備即此城也元和志在朗山縣東南七十里壺邱城在新蔡縣東南左傳文公九年楚侵陳克壺邱水經注汝水東南徑壺邱城北故陳邑也毛城在新蔡縣西梁大通二年義陽來降以夏侯夔為司州刺史鎮義陽夔進拔魏毛城逼新蔡即此櫟城在新蔡縣北二十里亦曰櫟亭今呼野櫟店左傳昭公四年吳伐楚入櫟注汝陰新蔡縣東北有櫟亭水經注汝水東逕櫟亭北春秋之棘櫟也城在新蔡故城西北半淪水按信陽州北五十里亦有櫟城齊建武二年魏寇司州之櫟城戍主魏僧珉拒破之州志櫟城即長臺關也冶鑪城在西平縣西七十五里戰國韓王鑄劒處漢置鐵官於此晉亦置鐵官别領户今城址猶存漢書地理志西平有鐵官唐書李愬傳愬别將馬少良等下嵖岈山又進取西平之冶鑪城棠谿城在西平縣西北百里古房國地亦作棠谿左傳吳夫㮣奔楚為棠谿氏戰國策蘇秦曰韓之劒㦸出於棠谿孟康曰吳房縣棠谿亭是也後漢光武建武十年封泗水王子煇為棠谿侯水經注吳房縣西北有棠谿城元和志今西平縣界有棠谿村道城在確山縣東