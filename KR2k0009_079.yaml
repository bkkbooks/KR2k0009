南四十里射犬城在州城水經注潩水又南逕射犬城東即鄭公孫射犬城也寰宇記長社縣大城鄭公孫射犬地洧倉城在州城東北晉永嘉五年東海世子毗東下至洧倉爲石勒所執水經注洧水又東入汶倉城内俗以是水爲汶水故有汝倉之名非也蓋洧水之邸閣耳黃連城在臨潁縣東南二十里有上下兩城接郾城西華二縣界相傳曹魏築去今縣二十里大陵城在臨潁縣北三十里亦名巨陵亭左傳莊公十四年鄭厲公自櫟侵鄭及大陵注大陵鄭地水經注宣梁陂水東南入許昌縣逕巨陵城北鄭地也京相璠曰臨潁縣東北二十五里有故巨陵亭古大陵也寰宇記大陵城乃陳蕃為亭長所辱處御龍城在臨潁縣北十五里亦名豢龍城左傳襄公二十四年范宣子曰昔白之祖在夏為御龍氏昭公二十九年蔡墨曰劉累學擾龍於豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後寰宇記臨潁縣豢龍城在縣西四十里即古豢龍氏之邑也商城在臨潁縣東北三十里相傳商髙宗廵狩時築西不羮城在襄城縣東南二十里左傳昭公十一年楚大城陳蔡不羹漢書地理志襄城有西不羹史記注韋昭曰三國楚别都也潁川定陵有東不羹襄城有西不羹水經注汝水東南逕西不羮城南括地志故城在縣東三十里舊志今呼為堯城又縣東有襄亭傅俊迎光武處汜城在襄城縣南一里春秋鄭汜邑左傳僖公二十四年王出適鄭處於汜注南汜也在襄城縣南疏南汜在襄城縣南南近於楚西近於周故王處於汜及楚伐鄭師於汜皆南汜其東汜在中牟縣南三十年秦晉圍鄭秦軍氾南故為東汜各隨其所近而言也鄭莊公城在襄城縣北四十五里相傳為莊公見母處汾邱城在襄城縣東北左傳襄公十八年楚伐鄭治兵於汾戰國策楚北有汾陘之塞史記秦昭王四十三年攻韓汾陘拔之杜預左傳注襄城東北有汾邱城水經注潁水東南厯罡邱城南故汾邱城也論城在襄城縣東北魏武行營也中有論事臺鄧城在郾城縣東南三十五里春秋桓公二年蔡侯鄭伯會于鄧注潁川召陵縣西南有鄧城水經注汝水又東南流逕鄧城西蔡侯鄭伯會於鄧者也道州城在郾城縣西南五里隋開皇十六年置道州築此裴城在郾城縣西五十里舊志裴度伐蔡時所築今為裴城鎮又溵亭在縣溵水南亦裴度建青陵城在郾城縣西北五十里唐元和十二年李光顔討吳元濟度溵水圍青陵以絶郾城歸路即此東西二城在長葛縣東左傳隱公十一年鄭伯使許大夫百里奉許叔以居許東偏人使公孫獲處許西偏寰宇記今有東西兩城又縣北二十里有鳳凰城漢黄霸治潁川時有異政鳯凰來集因築此亦東西二處基址猶存棘城在長葛縣東接新鄭縣境左傳襄公二十四年楚子伐鄭以救齊盟于東門次于棘澤水經注稟水又東南逕棘城北左傳所謂楚子次于棘澤者也許昌宫在州城東北魏太和中建三國魏志太和六年治許昌宫水經注許昌城内有景福殿基魏明帝造準價八百餘萬元和志宫殿基址今在許昌故城内西南隅玉海洛陽宫殿簿有魏太極九龍芙蓉承光諸殿時曲柵在郾城縣西北四十里唐李光顏破淮西兵處高陽里在州城内後漢書荀淑有子八人時人謂之八龍初荀氏舊里名西豪潁陰令范康改曰高陽里注今許州城内西南有荀淑故宅相傳云即舊西豪里也寰宇記高陽里在州城西門内道南時同郡人陳寔為太邱長往詣荀門元方為御季方從後孫長文尚㓜抱之於膝荀使叔慈應門慈明行酒自餘六龍侍側孫文若猶小坐之於懷言話三日德星爲之聚因名荀里曰德星鄉今郡城西南故宅是也舊志有德星亭在州西湖上陳寔故里在長葛縣西五十里紫荆山之南後人即其故址建德星觀以祠之關忠義故邸在州城南今即其地立廟曲水園在州城北舊志有大竹二十餘畝潩水灌其中以達西湖最爲佳處宋文彥博爲守時買得之賈昌朝來代一日往遊題詩壁上潞公聞之即以地劵歸賈文元亦不辭而受長嘯堂在州城内誠齋雜記范蜀公居許下於長嘯堂前作荼䕷架每春季花時宴客其下有花墮酒中者飲一大白微風過則舉坐無遺時謂之飛英會梅花堂在州治北宋蘇軾建展江亭在州城西西湖中宋韓維建聽水亭在州城西西湖上宋蘇軾嘗卜宅其南轍有詩岸亭在州西北二十八里一作岑門史記魏哀王五年秦伐我走犀首岸門後漢書郡國志潁陰有岸亭水經注潩水又東逕武亭間兩城相對疑是古之岑門史遷所謂走犀首於岑門者也括地志岸門在長社縣西北十八里今名西武亭城皋亭在臨潁縣南春秋定公四年公及諸侯盟于皋鼬注繁昌縣東南有城皋水經注潁水又東南逕澤城北即古城皋亭春秋經書公及諸侯盟于皋鼬者也皋澤宇相似名與字乖耳讓王臺在州城東寰宇記在許昌縣南三十里漢獻帝禪位百官送之於此因名灌臺在州城南漢潁陰侯嬰故宅永始臺在州城東北三國魏志郭皇后傳黄初五年帝東征后留許昌水始臺時霖雨百餘日城樓多壞有司奏請移止后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不去卒殁今吾未有是患而便移止柰何羣臣莫敢復言尚書臺在臨潁縣東南十五里亦名講武臺唐書地理志臨潁有講武臺本尚書臺馬融講書之地顯慶二年高宗大閲於此更名寰宇記臨潁尚書臺即魏文帝受禪有黄鳥舍丹書集於尚書室即此繁昌臺在臨潁縣東南二十里繁昌城内述征記繁昌有臺高七尺方五十步南有臺高二丈方三十步即魏受終壇水經注繁昌城内有三臺時人謂之繁昌臺壇前有二碑寰宇記二碑並鍾繇書鍾繇臺在長葛縣治前臺址尚存望嵩臺在襄城縣城内唐時建劉禹錫送廖彥謀詩望嵩樓上忽相見即此關隘椹澗鎮在州城西南三十里舊傳漢孝子蔡順採椹供母處金史地理志長社鎮二椹澗許由許由鎮在州城東北五十里石固鎮在州城西北五十里接長葛縣界繁城鎮在臨潁縣西北三十里金史地理志臨潁鎮二合流繁城潁橋鎮在襄城縣北二十里金史地理志襄城鎮一潁橋高橋鎮在郾城縣東二十五里又縣東四十里有歸村鎮沱口鎮在郾城縣東南二十里即古鮑口後魏永平初邢巒討懸瓠叛卒兼行至鮑口唐元和十二年裴度討淮西築連城於沱口金史地理志郾城鎮二沱口新寨五溝鎮在郾城縣東南五十里又新店鎮在縣西三十五里小商橋鎮在縣北三十五里董村鎮在長葛縣東十五里又石相鎮在縣東南十八里和尚橋鎮在縣西南十八里會河鎮在縣西三十里又西十里為後河鎮潘將軍寨在臨潁縣南十里潁水環抱獨一面可入宋潘美伐南唐道經臨潁屯田於此賈店在郾城縣東南十里唐元和中李光顏等與淮西兵戰於賈店即此許州驛在州治西南臨潁驛在臨潁縣治西襄城驛在襄城縣治北郾城驛在郾城縣治西北津梁大石橋在州城東南三十里跨石梁河上與臨潁縣接界椹澗橋在州城西三十里跨潩河八龍橋在州城北一里跨潩河通洧川縣潩水橋在州城東北七里跨潩河通鄢陵縣小商橋在臨潁縣南二十五里隋開皇四年始建下臨小溵河與郾城縣接界宋楊再興與烏珠戰死於此五吉橋在臨潁縣東北跨石梁河惠政橋在襄城縣南門外有三十六空跨汝河本朝乾隆三年重修潁橋在襄城縣東北四十里與州接界唐德宗時哥舒曜及李希烈戰於潁橋敗之即此本朝康熙四十年修乾隆十年重修三里橋在郾城縣南三里跨澧河又縣南三十里有石界橋跨石界溝縣北二十五里有䩐勒橋跨土壚河濟衆橋在長葛縣西南十五里跨潩河明嘉靖四十四年建本朝順治十八年重修虹梁在襄城縣東南四十里潁河渡處高橋渡在襄城縣西二十里溵江渡在郾城縣南一里陵墓漢愍帝陵在州東十三里楚六王墓在襄城縣西十三里六王川周徐君墓在襄城縣北十七里墓旁有靈樹相傳呉季子挂劒於此潁考叔墓在襄城縣東北四十里皇甫鑒城冢記潁考叔墓在許州城北二十里一在登封縣未詳孰是漢鼂錯墓在州東關外寰宇記在長社縣東北三里灌夫墓舊志在州南潁陰故宅舊有灌臺荀爽墓在州城北魏書地形志潁隂有荀爽墓寰宇記在長社縣東北七里地名荀村明統志有八龍墓在州北五里荀爽兄弟八人俱葬此徐庶母墓在州城東北七十五里有廟李膺墓在襄城縣北二十里許慎墓在郾城縣東三十五里召陵城下陳寔墓寰宇記在長葛縣西三十五里舊志長葛縣西有太邱長陳寔冢蔡邕撰銘陳氏家傳云紀諶以下八十六墓三十六碑並在長葛縣西陘山之陽唐房元齡墓在襄城縣西北房村白居易墓在長葛縣南三十八里白家村一在洛陽未詳孰是宋韓億墓在州西三十里州志億葬許其子綱綜絳繹維縝緯緬皆有顯名號八鳳俱葬州北三十里與億相望名八鳳冢范鎮墓在襄城縣北四十里蘇軾撰墓銘元博都里翀范墳詩序宋開國公范鎮其葬在襄城汝安鄉推賢里博都里翀舊作孛术魯翀今改明五女冢在州東四十里州志五女者齊梁時人失其姓氏寇攻其宅五女盡自經死賈詠墓在臨潁縣西五里李敏墓在襄越縣東三里黄紱墓在長葛縣北三十里馬陵岡祠廟七先生祠在州學内祀宋儒周程張來五子及司馬光邵雍元至大三年建陳公祠祀陳寔有二一在州治東南明宏治五年建一在長葛縣西四十里明萬厯七年修每嵗以五月五日祀之蔡孝子祠在州西南椹澗鎮祀漢孝子蔡順每歲四月十五日祭葢取椹熟時也潁考叔祠在襄城縣治西南三賢祠在襄城縣東北四十里祀春秋潁考叔後漢李膺宋范純仁五老祠在郾城縣學内祀金麻九疇張瑴張從正王予可山堂老人明成化間建忠臣祠在郾城縣東一里祀明主事劉校子產祠在長葛縣西陘山上晉書李矩傳劉聰遣從弟暢討矩矩未暇為備令郭誦禱鄭子產祠使巫揚言東里有教當相助將士皆踊躍爭進魏書地形志廣武郡苑陵有子產祠張桓侯廟在州東三十里亦稱西鄉侯祠舊傳漢張飛曾守此商高宗廟有二一在臨潁縣東南三十里一在郾城縣北四十里楊統制廟在臨潁縣南小商橋東祀宋將楊再興裴晉公廟有二一在郾城縣西裴城鎮明成化間修有知州邵寶碑記一在縣東五里郝家潭相傳裴度宣慰駐師之處寺觀文明寺在州東南二里有塔十三層層高丈許明萬厯中建開元寺在臨潁縣北唐開元中建乾明寺在襄城縣南三里首山之後五代唐清泰元年建本朝順治五年重修今為裏城勝境西寺在郾城縣城内名勝志韓昌黎集云元和十二年愈與李正封聯句詩刻於寺壁按即今之西寺也時裴晉公伐蔡屯郾城愈為行軍司馬王孟寺在郾城縣紫雲岡宋太平興國三年王孟二商人創建故名端壁寺在長葛縣東門外宋祥符五年建明洪武成化宏治正德嘉靖萬厯天啟年間相繼修葺本朝康熙二十九年重修留村寺在長葛縣西五十里始建未詳明成化間修本朝順治十三年康熙二十五年重修前總纂官臣張琴恭纂輯提調官臣王廣蔭恭覆輯校對官臣陶際堯恭校校對官臣章詒燕恭覆校
