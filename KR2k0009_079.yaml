焉王堂郪人永建中遷汝南太守搜才禮士不苟自專憲章朝右簡覈才職委功曹陳蕃匡政理務拾遺𥙷闕任主簿應嗣庶自是委誠求當郡内稱治宗資安衆人桓帝時為汝南太守署范滂為功曹委任政事范滂征羌人汝南太守宗資請署功曹滂任職嚴整疾惡其有行違孝悌不軌仁義者皆掃迹斥逐顯薦異節抽拔幽陋滂外甥西平李頌為郷曲所棄中常侍唐衡以頌請資用為吏滂寢而不召資遷怒捶書佐朱零零曰范滂清裁猶以利刃齒腐朽甘受笞死滂不可違資乃止尹勲鞏人桓帝時遷汝南太守上書解釋范滂袁忠等黨議禁錮劉陶定陰人舉孝廉除慎陽長縣多姦猾陶募剽輕劒客之徒過晏等十餘人貰其先過要以後效使各結所厚少年得數百人皆嚴兵待命於是覈案姦軌所發若神以疾免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民荀淑潁陰人建和中補朗陵侯相莅事明理稱為神君後淑卒縣為立祠張熹武城人靈帝時為平輿令大旱躬雩未獲嘉應乃積柴自焚火既燎即澍雨楊奇華陰人靈帝時為汝南太守持身㢘介專以慈祥為政郡中稱治許劭平輿人徐璆為汝南太守所在化行劭為郡功曹璆甚敬之府中聞劭為吏莫不改操飾行滿寵昌邑人獻帝時為汝南太守袁紹門生賔客布在諸縣擁兵拒守寵募其服從者五百人攻下二十餘壁誘其未降渠帥於坐上殺十餘人一時皆平得户二萬兵二千人令就田業趙儼陽翟人建安中為朗陵長縣多豪猾儼取其尤甚者收縛案驗皆當死而表府解放之自是恩威並著時豫州諸郡多附袁紹惟陽安郡不動而都尉李通急錄户調儼以書與荀彧請垂慰撫以勸忠節彧既白曹操悉以綿絹還民上下歡喜郡内遂安三國魏田豫漁陽人文帝時為汝南太守所在有治聲後罷官居魏縣會汝南遣健步詣征北感豫宿恩過拜之愍其貧羸流涕而去還為故吏民説之汝南為具資數千匹遣人餉豫豫一不受鄧艾棘陽人明帝時為汝南太守開闢荒野軍民並豐南北朝宋李熙國元嘉初鮦陽令在事有方人思其政陳憲元嘉中為汝南太守魏太武圍汝南懸瓠城憲相拒四十餘日殺傷魏人萬計汝水為之不流魏人燒攻具而退梁蔡道恭冠軍人梁初為司州刺史天監三年魏圍司州時城中衆不滿五千人食裁支半嵗魏軍作大車載土四面俱前欲以填壍道恭於壍内列艨艟鬬艦以待之魏又潛作伏道以決壍水道恭載土㹠塞之相持百餘日軒獲不可勝計魏大造梯衝攻圍日急道恭於城内作土山多作大槊施長刃使壯士刺魏人登城者魏軍將退會道恭疾篤乃呼兄子僧勰屬以死固節令取所持節曰稟命出疆憑此而巳即不得奉以還朝方欲攜之同逝可與棺柩相隨衆皆流涕遂卒鄭紹叔開封人天監四年為司州刺史時義陽為魏所陷司州移鎮關南紹叔創立城隍繕兵積穀招納流民百姓安之又能頃心接物多所薦舉士以此歸焉陳慶之國山人中大通二年除南北司二州刺史破魏潁州刺史婁起等罷義陽鎮兵停水陸轉運江湘諸州並得休息開田六千頃二年之後倉廩充實高祖毎嘉勞之魏張萇年漁陽人明元帝時為汝南太守郡人劉崇之兄弟分析家貧惟一牛爭不能決訟於郡庭萇年謂曰汝曹當以一牛故致此競脱有二牛必不爭乃以已牛一頭賜之於是境中各相戒約咸敦敬讓韋珍杜陵人太和中為郢州刺史有聲績朝廷嘉之遷龍驤將軍賜驊騮二匹帛五十疋榖三百斛珍乃召集州内孤貧者謂曰天子以我能撫綏卿等故賜以穀帛吾何敢獨當遂以所賜悉分與之辛穆狄道人為汝陽太守值水澇民饑上表請輕租賦帝從之遂勅汝陽一郡聽以小絹為調北齊元景安魏昭成五世孫天統四年除豫州刺史綏和邊鄙人物安之又管内蠻多華少景安被以威恩咸得安輯郎茂新市人為保城令有能名百姓為立清德頌周薛端汾陰人孝閔時為蔡州刺史為政寛惠民吏愛之轉基州刺史蔡州父老請留端者千餘人隋麥鐵杖始興人大業中為汝南太守羣盜屏跡唐狄仁傑太原人高宗時為豫州刺史時越王兵敗支黨餘二千人論死仁傑釋其械密疏申理有詔悉謪戍邊囚出寕州父老迎勞曰狄使君活汝耶因相與哭碑下囚齋三日乃去至流所亦為立碑初宰相張光輔討越王多暴索仁傑拒之光輔怒曰州將輕元帥耶仁傑曰亂河南者一越王公董士三十萬乃縱使暴横是一越王死百越王生且殺降以為功冤痛徹天如得上方斬馬劒加君頸雖死不恨光輔還奏仁傑不遜左授復州刺史潘好禮宗城人第明經為上蔡令治在最開元中遷豫州刺史勤力於治清廉無所私盧從愿臨漳人開元中左遷豫州刺史政嚴肅奏課為天下第一寶書勞問賜絹百疋裴度聞喜人元和中拜門下侍郎平章事彰義軍節度淮西宣慰招討處置使討呉元濟入對延英曰主憂臣辱義在必死賊未授首臣無還期帝壯之度屯郾城勞諸軍宣朝廷厚意士奮於勇時諸道兵悉中官統監奏罷之使將得顓制號令李愬夜入懸瓠城之即相率歸命王質單父人以館職出知蔡州清靜慈惠蔡人德之吳育建安人慶厯中知蔡州設伍保法以檢制盜賊時京師有告妖人千數聚確山者詔遣中使往招捕者十人至則以巡檢兵往索之育曰使者欲得妖人還報耶曰然曰育在此雖不敏聚千人境内毋容不知此特鄉民用浮屠法以利錢財耳一弓手召之可致也令以兵往人相驚疑請留毋往中使以爲然頃之召十人者至械送闕下皆無罪釋之而告者服辜富弼河南人皇祐中除禮部侍郎徙知蔡州不以名位自驕專意民事有情必達魯有開譙人仁宗時知確山縣大姓把持官政有開治其最盛者遂以無事興廢陂溉民田數千頃富弼守蔡薦之以爲有古循吏風孫瑜博平人仁宗時知蔡州毁呉元濟像以其祠祀裴度大水縁城隙入瑜使囊沙數千扞其衝城得勿壞黃好謙嘉祐中調新蔡令嵗饑嬰兒多棄道上好謙勸富民賑恤令小兒給壯者之半全活甚衆吕公著夀州人英宗時由龍圖閣直學士出知蔡州丁諷治平中知蔡州設法賑饑活者六十萬人籍為兵者又數千詔移知亳州蔡人攀慕號呼事聞復還任及代去閉城斷橋不得行者累日范純仁吳人神宗時加直龍圖閣知慶州黜知信陽軍劉安世魏人元祐中知信陽軍有治行葛書舉江陰人神宗時知正陽縣有惠政民思之歐陽修廬陵人神宗時改宣徽南苑使判太原府辭不拜徙蔡州凡厯數郡不見治跡不求聲譽寛簡而不擾故所至民便之劉攽新喻人哲宗時出知蔡州給事中孫覺胡宗愈中書舍人蘇軾范百祿言攽博記能文章政事侔古循吏宜留京師至蔡數月召拜中書舍人歐陽棐廬陵人元符末知蔡州蔡地薄賦重轉運使又為覆折之令多取於民民不堪命會有詔禁止而佐吏憚使者不敢以詔㫖從事棐曰州郡之於民詔令苟有未便猶將建請今天子知覆折之病民手詔止之若有憚而不行何以為長吏命即曰行之向宗囘開封人神宗時知蔡州擒劇賊殲其黨類歲饑發廪興力役饑者得濟而官舍帑廩一新趙士真宋宗室權知信陽軍建炎二年寇劉滿至士真拒之兵潰過害後贈右朝奉大夫郭贊内江人建炎二年為汝陽丞金人陷蔡州守臣為所執乘閒而逃獨贊朝服詬叱不肯降遂見殺舒繼明羅山人紹興閒守信陽偽齊劉豫襲郡城繼明奮身與敵矢盡被擒不屈死金劉肅洺水人金末調新蔡令先時縣賦民以牛多寡為差民匿不耕肅至命樹畜蕃者不加賦民遂殷富瀕淮民有竄入宋境籍為兵而優其糧閒有歸者頗艱於衣食時出怨言曰不如渡淮告者以謀叛論肅曰淮限宋境一水耳果欲叛不難往也口雖言而心無寶準律當杖八十奏可徹伯爾不知其所始哀宗時為忠孝軍元帥天興二年自息州入援哀宗度蔡城不守傳位承麟羣臣入賀徹伯爾不拜謂所親曰事至於此有死而已安能更事一君乎遂戰死徹伯爾舊作蔡八兒今改正毛佺思州人貞祐中為盜宣宗南渡率衆歸國署為義軍招撫哀宗遷蔡以佺為都尉圍城之戰佺力居多城破自縊其子先佺戰死温屯察遜衛尉七十五之子哀宗幸蔡授殿前左副檢點圍城中數引軍潛出巡邏時尚食須魚城西有積水曰練江往捕必軍衛乃可察遜常自領兵以往所得重千餘斤分賜將士後知其出左右設伏伺而邀之力戰死温屯察遜舊作温敦昌孫今改正完顏講善哀宗之奉御也蔡城破哀宋傳位承麟即自縊於幽蘭軒内族色勒從死遺言講善使焚幽蘭軒火方熾子城破元兵突入獨講善留不去為兵所執問講善以名對曰吾君終於是吾候火滅灰寒收瘞其骨耳兵笑曰若狂者耶汝命且不保能瘞而君耶講善曰吾君有天下十餘年身死社稷忍使暴露遺骸與士卒等耶吾逆知君輩必不遺吾吾是以留果瘞吾君之後雖寸斬吾不恨矣兵以告其帥本展曰竒男子也許之乃掇其餘燼裹以敝衾瘞於汝水之旁再拜號哭將赴汝水死軍士救之得免後不知所終完顔講善巳見哀宗陵注色勒舊作斜烈本展舊作弃盞今並改正元棟阿達什威烏爾人任正陽縣達魯噶齊教民於窪下田改種禾稻民獲有秋縣距朱皋倉三百餘里民苦輸納為請於省府以金代輸民便之棟阿連什舊作朶阿達實威烏爾舊作畏元兒逹魯噶齊舊作達魯花赤今並改正張昇其先定州人後徙平州至大中知汝寕府民有告寄東書於其家者逾三年取閲有禁書一編且記里中大家姓名於上昇亟呼吏焚其書曰妄言誣民且再更赦矣勿論同列懼皆引起既而事聞廷議謂昇脱姦軌遣使窮問卒無迹可指乃詰以擅焚書狀昇對曰昇備位郡守為民父母今斥誣訴免冤濫雖重得罪不避乃坐奪俸二月旁郡移文報呉人侯君遠占有兵寇應在呉分野同列欲召屬縣為備禦計昇曰此訛言也久當自息毋庸惑民聽衆論韙之部使者舉治行為諸郡最明萬孟雅南昌人洪武初為汝寕知府廉公有威吏民畏服時天下初定戸籍脱漏里胥因緣為奸孟雅奏請之於是賦役始得其平錢鉞仁和人成化中為汝寕知府持身清謹事至皆自剖決吏胥無所用其奸開固始水田置文廟雅樂在職九年流移歸附增户八十有奇張子麟藳城人宏治中為汝寕知府有巨猾爭河灘退地殺人獄久不決子麟至一訊立服值饑疫施醫藥興水利全活萬計又創建連厫百二十楹儲榖二十萬石荒饉賴之霍恩茂山衛人正德中為上蔡知縣流賊趙燧等陷城恩被執賊脅之跪罵曰吾此膝肯為賊屈乎賊日殺人於前以懾之罵益厲賊以刃挾其舌支解之恩妻劉氏亦自縊未絶復以簪刺心死事聞贈光祿少卿劉氏宜人建忠節坊旌之王佐潞州人正德中為西平知縣流賊趙燧攻城佐手殺數十人矢斃其渠帥賊忿急攻三日佐力屈被執罵不絶口賊懸諸竿殺而支解之贈光祿少卿立祠致祭時縣丞毛秀教諭程輔徳訓導彭輔皆不屈死詔從祀佐廟石瓚介休人正德中為羅山知縣流賊猝至瓚親與賊戰面中一矢自拔去賈勇更進賊遂退羅山獲全民因號其城為石公城主簿王續宗寕州人助瓚城守追賊至牢山遇害贈羅山知縣王崇古蒲州人嘉靖中為汝寕知府舉節孝祀忠烈摘發墨吏奸胥崇藩有中貴人怙寵恣睢憚崇古威嚴輒避匿不敢出時横山盜任秦等嘯聚為亂崇古密調兵出不意一鼓擒之閭東内江人嘉靖中為新蔡知縣以田賦不均倣古方田法履畝定税積弊一清縣地窪下多水患東開九溝疏洪汝注於淮民不憂潦岳和聲嘉興人萬厯中為汝陽知縣歲荒民疫乃條上災狀蠲逋賦廣儲備極補救之法汝水毎當泛溢百里内田廬淹没和聲築堤汝水東岸逶迤五十里水患遂息魏廷相嘉善人萬厯進士授汝陽知縣汝民治田無桔橰廷相示工人以式令倣為之至今號魏公車又開運河便漕輓特詔褒之陳幼學無錫人萬厯中授確山知縣政務惠民積粟備荒墾萊田八百餘頃給貧民牛具覈黄河退地百三十餘頃以賦民里婦不能紡者授以紡車置屋分處貧民建公𪠘以居六曹吏節公費代正賦之無徵者栽桑榆諸樹三萬八千餘株開河渠百九十八道布政司劉渾成弟燦臣助妾殺妻治如律行太僕卿陳耀文家人犯法立捕治之胡來進諸城人萬厯末為遂平知縣先是石洋河水無所洩嵗受淹没來進别開一渠長二里有奇引水南入沙河由是水患遂息王建和貴池人崇禎初為汝寕知府屬邑旱澇不均建和勘災輕重力請蠲緩民困以蘇崇藩戚畹鍾振家倚勢恣行有司莫敢問建和白於王申之學使者窮治其罪一郡稱快王世琮逹州人崇禎中為汝寕推官討土寇流矢貫耳而不動時號王鐵耳上官薦為兵備僉事分巡其地十五年李自成陷城被執厲聲大罵賊用礮擊殺之李燦韓城人崇禎中為汝寕知府㑹土賊嘯聚謀盡刈田閒麥使城中饑困燦乃偽授賊渠殷守祖等為十總賊喜入城邀賞燦先伏力士於壁後盡殲之民賴以安王信寕州人崇禎中為正陽知縣單騎出撫土寇會流賊數萬猝至被執不屈死賊攜其首以去邑諸生田育性率鄉勇追至淮南始奪歸面如生閲四日其子來覓屍猶舒指握子手若相訣者詔贈光祿寺丞建祠祀之嚴栻常熟人崇禎中為信陽知州時流寇充斥栻賈勇登陴悉力守禦賊興世王犯州栻自製火器擊殺之賊相戒不敢犯境官篆膠州人崇禎十五年上蔡既陷篆以汝寕通判署縣事時民舍盡燬篆廣招流亡會左良玉駐城南兵日肆淫掠篆入良玉營以大義奪還之民獲完家室者甚衆後賊黨賀一龍掠地上蔡篆出禦之䧟陣死許永禧曲沃人崇禎中為上蔡知縣有惠政十五年李自成遣數騎抵城下大呼曰今日不迎降明日屠爾城衆懼永禧歎曰賊勢如此彈丸邑豈能保吾一死盡職而巳明日賊果大至永禧具𫀆笏北靣再拜據案秉燭端坐賊入遂自刎高斗垣繁峙人崇禎中為西平知縣性孤鯁以清慎得民十五年流寇陷城不屈死時遂平知縣劉英貴州人亦誓衆死守城陷罵賊死郝瑞日陜西人崇禎中以固始朱皋鎮巡檢署羅山縣事時當殘破之後瑞日單騎攜二童至縣止僧寺闖賊遣偽官至土寇萬朝勲潛與之通劫瑞日於家瑞日乘閒殺朝勲懷印奔鳳陽為雨阻復見執賊愛其勇欲留之瑞日大罵不屈賊臠之井殺其僕二人傅汝為江陵人崇禎末為汝寕知府流寇薄城汝為拊循士卒嬰城固守城陷赴北河死汝陽令文師頤廣西人亦死之高孝誌江都人崇禎末為信陽知州流賊來犯城或勸以他避孝誌曰死社稷君命也安所逃乎與訓導李逢旭陳所聞里居靜海知縣張映宿俱死之孝誌贈㕘議餘贈卹有差本朝線縉廣寕人順治二年守汝寕時值亂後郡無太守者數年初下車城中居民不滿數十家縉省刑薄賦與民更始乃修學宫勸開墾流亡漸集遺黎始有安堵之樂至今稱國初賢守云許應鯤褒城人順治十年知汝陽縣性慈惠視民如子是冬大兵征楚牧馬汝寕勢且入城内百姓驚恐應鯤往力爭以受侮自經兵將亦遂拔營去郡人感其以死衛民建祠尸祝焉金鎮山陰人康熙時為汝陽知縣汝陽舊賦每畝四分國初知縣行權宜之法增至九分因請上官疏聞於朝仍依正供民困頓舒後值嵗荒乃捐俸築城貧民籍以全活者甚衆以擢仕去士民追送境外有垂泣者何顯祖義州人康熙二十六年知汝寕府仁慈爽亮政事練達下車日十四城利弊即時興除吏畏民懷聲名籍甚後有陜西運米之役極言汝寕地瘠民貧不可例他郡上官卒從其議去任後民立祠祀之吳琠沁州人知確山縣性明決每興利除弊惟恐不及清賦役伸冤抑鋤豪强閭里肅清及去士民建鋼川書院以誌遺愛祀名宦朴士秀漢軍鑲黄旗人康熙四十年知確山縣聴訟明決革除火耗及一切陋規剏建義學督課生徒祀名宦前總纂官臣張琴恭纂輯提調官臣王廣蔭恭覆輯校對官臣潘式恭校大清一統志汝寕府三人物漢尹更始汝南人宣帝時從沛郡蔡千秋受穀梁春秋官至諌大夫長樂户將又受左氏傳取其變理合者以為章句傳子咸及翟方進瑯琊房鳳桓寛汝南人治公羊春秋舉為郎遷廬江太守丞博通善屬文推衍鹽鐵之議增廣條目極其論難著數萬言翟方進上蔡人父翟公好學為郡文學方進年十二三失父孤學給事太守府為小史從汝南蔡父相蔡父大竒其形貌曰小史有封侯骨當以經術進乃西至京師從博士受春秋積十餘年經學明習以射䇿甲科為郎累為丞相封高陵侯方進知能有餘兼通文法吏事以儒雅緣飾法律號為通明相子宣亦明經篤行君子人也官南郡太守翟義方進少子以父任為郎累遷東郡太守王莽居攝義心惡之乃謂姊子上蔡陳豐曰新都侯必代漢家其漸可見吾身守大郡父子受漢厚恩義當為國討賊欲舉兵西誅設令時命不成死國埋名猶可以不慚於先帝今欲發之乃肯從我乎豐年十八勇壯許諾遂與嚴鄉侯劉信等舉兵移檄郡國言莽鴆殺孝平皇帝矯攝尊號兵敗亡至固始界莽捕得義尸磔陳都市周嘉安成人高祖父燕宣帝時為郡決曹掾太守欲枉殺人燕諌不聴後囚家守闕稱冤詔遣覆考燕代太守繫獄當下蠶室不食而死燕五子皆至刺史太守嘉仕郡為主簿王莽末從太守何敝討賊敝為流矢所中賊圍繞數十重白刃交集嘉乃擁敝以身扞之仰天號泣賊兩相視曰此義士也給其車馬遣送之後舉孝廉拜尚書侍郎光武引見問以遭難之事嘉對曰太守被傷命懸寇手臣實駑怯不能死難帝曰此長者也詔尚公主嘉稱病篤不肯當遷零陵太守卒吏民為立祠焉從弟暢性仁慈位至光祿勲王琳汝南人年十餘歲喪父母因遭大亂百姓奔逃惟琳兄弟獨守冢廬號泣不絶弟季出遇赤眉將為所捕琳自縛請先季死賊矜而放遣之由是顯名鄉邑後辟司徒府薦士而退許揚平輿人少好術數王莽輔政官酒泉都尉及莽篡位變姓名為巫醫逃匿他界莽敗方還鄉里建武中太守鄧晨欲修復鴻郤陂聞揚曉水脈署為都水掾揚因高下形勢起塘四百餘里數年乃立百姓得其便初豪右大姓因緣陂役競欲辜較在所揚一無聽遂共譖揚受取賕賂晨收揚下獄而械輒自解晨驚曰果濫矣太守聞忠信可以感靈今其效乎即夜出揚時天大陰晦道中若有火光照之及卒晨為起廟圖畫形像百姓皆祭祀之戴慿平輿人習京氏易舉明經徵拜侍中光武謂曰侍中當匡輔國政勿有隱情憑對曰陛下嚴伏見前太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之訴遂致禁錮帝怒憑出自繫廷尉有詔勅出後勅尚書解遵禁錮正旦朝賀帝令羣臣能説經者更相難詰義有弗通輒奪其席以益通者慿遂重坐五十餘席京師語曰解經不窮戴侍中鄭敬新遷人為郡門下掾與郅惲厚隱弋陽山中惲從敬留數十日别去敬清志高世光武連徴不到新遷都尉逼為功曹􅈦事前樹時有清汁以為甘露敬曰明府政未能致甘露此青木汁耳辭病去隱處精學蛾陂中與同郡鄧敬折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娱郅惲西平人年十二失母居喪過禮王莽時上書言劉氏享天命陛下取之以天還之以天可謂知命若不早圖不免於竊位莽大怒收繫詔獄脅惲自告狂病恍惚惲瞋目罵曰所陳皆天文聖意非狂人所能造遂繫須冬會赦得出光武時舉孝廉為上東城門候帝嘗出獵夜還惲拒關不開帝乃廻從東中門入明日惲上書諌賜布百匹後令惲授皇太子韓詩侍講殿中及郭后廢太子意不自安惲乃説太子引愆退身奉養母氏太子從之帝竟聽許惲再遷長沙太守坐事左轉芒長免歸避地教授卒郅夀惲子善文章以廉能稱三遷尚書令朝廷每有疑議嘗獨進見肅宗竒其智䇿擢京兆尹後為尚書僕射時大將軍竇憲威傾天下嘗使門生齎書詣夀有所請託夀即送詔獄上書陳憲驕恣又因朝會譏刺憲等辭㫖甚切憲怒䧟以事自殺唐羌汝南人和帝時辟公府補臨武長棄官還家不應徵召著唐子三十餘篇周磐安成人少遊京師好禮有行居貧養母儉薄不充廼就孝廉之舉和帝初拜謁者除任城長遷陽夏重合令皆有惠政後思母棄官還鄉里母殁哀幾毁滅服終遂廬冢側敎授門徒常千人公府三辟皆不應將卒命二子編簡寫堯典一篇置棺前示不忘聖道廖扶平輿人習韓詩歐陽尚書敎授常數百人父為北地太守永初中坐羌没郡下獄死扶感父以法喪身遂絶志世外專精經典尤明天文讖緯風角推步之術州郡公府辟召皆不就逆知嵗荒聚穀數千斛悉用給宗族姻親又斂葬疫死不能自收者常居先人冢側未曾入城市人因號為北郭先生子孟舉偉舉並知名張劭汝南人少遊太學與山陽范式為友二人並告歸鄉里式謂劭曰後二年當還過拜尊親見孺子焉乃共剋期日後期方至劭具以白母請設饌以候之母曰二年之别千里結言爾何相信之審耶對曰巨卿信士必不乖違母曰若然當為爾醖酒其日巨卿果到升堂拜母盡歡而别後劭寢疾臨盡歎曰恨不見吾死友㝷卒見夢於式式往奔喪未及到而喪已發引至壙將窆而柩不肯進移時見式素車白馬號哭而來其母望之曰是必范巨卿也式因執紼引柩扵是乃前遂留止冢次為修墳樹然後去蔡順安成人少孤養母嘗出求薪客卒至母望順不還乃噬指順卽心動馳歸跪問其故母曰有急客來吾噬指以悟汝耳母終未及葬里中災火將逼其舍順伏棺號哭叫天火遂越燒他室順獨得免母平生畏雷亡後每有雷震順輒圜冢泣曰順在此後舉孝廉順不能遠離墳墓遂不就薛包汝南人好學篤行喪母以孝間父娶後妻而憎包分出之包日夜號泣不去被杖廬於舍外旦入灑掃父怒又逐之乃廬於里門晨昏不廢嵗餘父母慚而還之旣而弟子求分財異居包不能止乃中分其財奴婢引其老者田廬取其荒頓者器物取朽敗者弟子數破其産輒復振給建光中公車徵拜侍中稱疾不起詔賜告歸加禮如毛義周燮安成人決曹掾燕後生而醜狀駭人其母欲棄之父不聽曰吾聞聖賢多異貌興我宗者乃此兒也始在髫鬌而知廉讓十歲通詩論語及長專精禮易不讀非聖之書不修賀問之好結廬岡畔非身所耕漁不食延光二年安帝以纁幣聘宗族勸之燮曰夫修道者度時而動動不以時焉能享乎因自載到潁川辭疾而歸戴良慎陽人曽祖父遵平帝時為侍御史王莽篡位稱病歸鄉里好施尚俠食客常三四百人時人為之語曰關中大豪戴子高良少誕節母憙驢鳴良常學之以娱樂焉良才旣高達議論尚奇多駭流俗辟司空府不至悉將妻子逃入冮夏山中優游不仕許峻平輿人善卜占之術多有顯驗方之前世京房所著易林行於世孫曼少傳峻學顯名桓帝時黄憲慎陽人年十四潁川荀淑與語移日不能去曰吾之師表也同郡戴良才高倨傲見憲未嘗不正容陳蕃周舉嘗相謂曰時月之間不見黄生則鄙吝之萌復存於心太守王龔在郡禮進賢達卒不能屈憲郭林宗少遊汝南稱叔度汪汪若千頃波澄之不清淆之不濁不可量也初舉孝廉又辟公府人勸其仕憲亦不拒之暫到京師而還竟無所就年四十八終天下號曰徵君魏桓安陽人桓帝時數被徵鄉人勸之行桓曰夫干祿求進所以行其志也今後宫千數其可損乎廏馬萬匹其可減乎左右權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出袁著汝南人年十九為郎中見梁冀凶縱不勝其憤詣闕上書冀密遣捕著著乃變易姓名後託病偽死結蒲為人市棺殯送冀廉知其詐陰求得笞殺之陳蕃平輿人年十五閑處一室庭宇蕪穢父友問之蕃曰大丈夫當掃除天下安事一室乎徵拜議郎厯遷大鴻臚以救白馬令李雲免復徵拜議郎遷光祿勲時封賞踰制内寵猥盛蕃上疏諌帝頗納其言後代楊秉為太尉時中常侍復𬒳任用排陷忠良李膺等皆以忤㫖抵罪蕃因朝㑹固理膺等請加原宥又諌請劉瓆成瑨等宦官由此疾蕃彌甚猶以蕃名臣不敢加害及竇后臨朝以蕃為太傅蕃與后父大將軍竇武同心盡力徵用名賢謀誅曹節王甫等事泄節等矯詔害之子逸蕃友人陳留朱震匿之得免後大赦黨人乃追還逸官至魯相袁閬女南人為郡功曹閬數辭公府之命不修異操而致名當時周乘安成人天資聰明高峙岳立非陳蕃黄憲之儔不交也蕃常歎曰周子居真治國之器譬諸寶劍則世之干將舉孝廉為泰山太守甚有惠政郭亮朗陵人李固弟子梁冀誣殺固露其屍於四衢令有敢臨者加其罪亮年始成童遊學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞收固屍不許因往哭臨遂守喪弗去夏門亭長呵之亮曰義之所動豈知性命何為以死相懼太后聞而不誅亮由此顯名又鄭遂汝南人亦固弟子與趙承等共論固言迹以為德行一篇李咸西平人孤特自立家貧母老躬耕奉養舉茂才累經州郡以廉幹知名建寕三年拜太尉在朝清忠權倖憚之熹平初竇太后崩宦官欲議别葬時咸病扶輿而起搗椒自隨謂妻子曰若太后不得配食桓帝吾不生還矣上疏力爭從之尋以老乞歸悉還所賜物乘敝牛車使子男御晨發京師家舊貧狹庇蔭草廬卒王雋汝南人少為范滂許章所識與南陽岑晊善為人外静而内明不應州郡三府之命公車徴不到避地居武陵躬自耕釣歸雋者百餘家獻帝都許復徴為尚書不就伍孚吳房人質性剛毅勇壯好義獻帝時為越騎校尉忿董卓凶毒志手刃之乃朝服懷佩刀以見卓孚語畢辭去卓送至閤以手撫其背孚因出刃刺之不中卓呼左右執殺孚孚大言曰恨不得磔裂姦賊於都市以謝天地言未畢而斃許劭平輿人少峻名節好人倫多從賞識與從兄靖俱有高名好共覈論郷黨人物每月輒更其品題故汝南俗有月旦評司空楊彪辟舉方正敦樸皆不就後避地豫章而卒兄虔亦知名汝南人稱平輿淵有二龍焉劭子混清醇有識鑒仕魏至尚書三國漢許靖平輿人少與從弟劭俱知名察孝廉除尚書郎典選舉董卓秉政靖懼誅出奔至會稽孫䇿渡江走交州靖身坐岸邉先載附從疏親悉發乃從後去劉璋使使招靖入蜀為巴郡廣漢太守昭烈克蜀以靖為左將軍長史及即尊號拜司徒年逾七十愛樂人物誘納後進清談不倦丞相諸葛亮皆為之拜陳到汝南人自豫州隨先主名位常亞趙雲俱以忠勇見稱建興初官至永安都督征西將軍封亭侯費禕鄳人少遊學入蜀會先主定蜀禕遂留益土仕為太子舍人後主踐位為黄門侍郎丞相亮南征還羣僚於數十里逢迎年位多在禕右而亮特命禕同載由是眾人莫不易觀使呉辭義不屈孫權每視其醉問以國事并論當世之務禕輒辭以醉退而撰次所問事事條答無所遺失權甚器之謂禕曰君天下淑德必當殷肱蜀朝建興中代蔣琬為尚書令禕識悟過人省讀書記舉目暫視已究其意㫖終亦不忘常以朝晡聽事其間接納賓客飲食博戯盡人之歡事亦不廢遷大將軍錄尚書事當國功名畧與琬比子恭為尚書令顯名當世費觀鄳人先主時為巴郡太守江州都督建興初加振威將軍楊戲贊曰當官理任衎衎辦舉張通汝南人後主時為殿中督後主東遷洛陽時擾攘倉卒蜀之大臣無翼從者惟郤正及通捨妻子單身随侍魏和洽西平人舉孝廉大將軍辟皆不就魏武定荆州辟為丞相掾時毛玠崔炎選用先尚儉節洽言曰古之大敎務在通人情而已凡激詭之行則容隱偽矣文帝踐阼為光祿勲封安城亭侯明帝太和中高堂隆奏時風不至洽言消復之術莫大於節儉轉太常清貧守約至賣田宅以自給子適才爽開濟官至吏部尚書吳陳化汝南人博覽衆書氣幹剛毅仕吳為郎中使魏善應對大帝嘉其奉命光國拜犍為太守遷太常兼尚書令正色立朝勸子弟廢田業絶治產仰給官廪不與百姓爭利子熾有志操屈晃汝南人吳大帝時爲尚書僕射帝幽閉太子和晃率諸將吏泥頭自縛詣闕固諌帝大怒牽入殿杖一百後孫皓即位詔曰故僕射屈晃志匡社稷忠諌忘身其封晃子緒爲東陽亭侯蔡珪汝南人爲吳將守林陵弟敏守沔中時南北爲互市諸將多相襲奪以爲功珪與敏書曰軍國固當舉信義以相高聞疆場之上往往有襲奪互市甚不可行弟慎母爲小利而忘大備也候者得書以呈周浚浚曰君子也及渡江求珪得之問其本曰汝南人也浚戲曰吾固疑吳無君子而卿果吾鄉人孟宗鄳人性至孝母病冬節思食筍時地凍無筍宗入竹林哀泣有頃出筍數莖作羹供食母病㝷愈人以爲至孝所感官至呉司空晉李秉平春人有儁才官至泰州刺史秉嘗答司馬文王問因以爲家誠曰昔侍坐於先帝時有三長吏俱見臨辭出上曰爲官長當清當慎當勤並受詔上又問必不得已於斯三者何先或對曰清固爲本次復問吾對曰清慎之道相須而成必不得已慎乃爲大夫清者不必慎慎者必自清張光鍾武人以牙門將伐呉有功遷江夏西部都尉初光以百餘人戍馬蘭山北兵圍之百餘日光以兵少路遠自分敗没會梁王肜遣兵迎光遂還長安肜表光處絶圍之地有耿恭之忠宜加甄賞以明奨勸於是擢新平太守後鎮魏興爲楊難敵所圍嬰城固守自夏迄冬憤激成疾佐吏及百姓咸勸光退光按劒曰吾受國厚恩不能翦除寇賊何得退還也聲絶而卒遠近傷惜之子二炅邁炅少辟太宰掾邁多才畧有父風李重鍾武人少好學有文辭早孤與羣弟居以友愛著稱爲尚書吏部郎務抑華競不通私謁特留心隱逸由是羣才畢舉子式有美名官至侍中和嶠洽孫少有盛名朝野許其能整風俗理人倫起家太子舍人庾顗見而歎曰和嶠森森如千丈松施之大厦必有棟梁之用武帝時爲黄門侍郎遷中書令帝深器遇之舊監令共車入朝時荀朂爲監嶠鄙朂爲人每同乘高抗專車而坐乃使監令異車自嶠始也惠帝時拜太子太傅加散騎常侍卒弟郁以清幹稱厯官尚書令周浚安成人性果烈以才理見知有人倫鑒識初仕魏為尚書郎後隨王渾平呉封成武侯移鎮秣陵有威德武帝問浚卿宗後生稱誰為可浚曰臣叔父子恢稱重臣宗從父子馥稱清臣宗帝並召用恢與同郡和郁等號三十四友馥少與成公簡齊名起家為諸王文學累遷吏部郎選舉精密論望益美惠帝時以功封永安伯馥自經世故毎欲維正朝廷忠情懇至以東海王越不盡臣節毎言論厲然越深憚之後以建䇿遷都為越所搆卒子密性虚簡時人稱為清士周顗浚子少有重名元帝時為尚書左僕射領吏部顗性寛裕而友愛過人王導甚重之及敦搆逆顗奉詔詣敦敦憚其辭正不知所答長史郝嘏等勸顗避敦顗曰吾備位大臣豈可復草間求活耶俄被收路經太廟顗大言曰天地先帝之靈賊臣王敦傾覆社稷神祇有靈當速殺敦語未畢收人以㦸傷其口血流至踵觀者皆為流涕遂遇害後追贈左光祿大夫儀同三司謚曰康周嵩顗之弟狷直果俠毎以才氣陵物元帝朝累遷御史中丞時帝以王敦勢盛漸疏忌王導等嵩上疏諫帝感悟導等獲全及敦既害顗使人弔嵩嵩曰亡凡天下人為天下人所殺復何所弔敦甚銜之密使妖人李脱誣嵩及周筵潛相署置遂害之畢卓新蔡鮦陽人少希放達為胡母輔之所知干寶新蔡人少勤學博覽書記以才器召為著作郎平杜􅌢有功賜爵關内侯累遷散騎常侍著晉記二十卷稱良史性好陰陽術數撰集古今神祇靈異人物變亿名為搜神記及雜文集皆行於世孟嘉宗曾孫少知名太尉庾亮領江州辟部廬陵從事後為桓温參軍温甚重之九月九日温宴龍山風吹嘉帽墮落嘉不之覺温命孫盛作文嘲嘉嘉即答之其文甚美四座嗟歎轉從事中郎遷長史卒南北朝齊周彥倫顗七世孫初仕宋入齊厯中書郎兼著作工散隸書法毎賓友會同辭韻如流聽者忘倦兼善老易清貧寡欲終日長蔬雖有妻子獨處山舍王儉謂曰卿山中何所食彦倫曰赤米白鹽綠葵紫蓼後轉國子博士著四聲切韻行於世梁周捨彦倫子幼聰穎既長博學善誦詩書音韻清辨從兄綿為剡縣贓汚籍没資財捨推宅助焉武帝時拜尚書祠部郎禮儀損益多自捨出時王亮得將軍耆老遮道後遷湖南觀察使累封淮陽郡公卒滋性寛易與之接者皆自謂可見肺肝薄居處衣食能爲春秋工篆隸有古法周墀汝南人少孤事母孝及進士第官集賢殿學士屬詞高古文宗雅重之武宗朝累拜義成節度使宿將暴驁不循令者墀命鞭其背一軍大治進同中書門下平章事河東節度使王宰求領宣武駙馬都尉韋讓求爲京兆墀持不與由是妄進者少衰會帝召宰相議河湟事墀對不合旨罷爲劎南東川節度使鄭顥言於帝曰世謂墀以直言相亦以直言免帝悟加檢校尚書右僕射卒趙匡凝蔡州人嗣父德諲爵由唐州刺史爲山南東道節度使以威惠聞天祐元年封楚王時諸道不上供惟匡凝嵗貢賦天子朱全忠遣人諭止之匡凝流涕曰吾爲國屏翰敢有他志遂絶全忠全忠怒出兵攻之因敗自殺宋孫何汝陽人父庸周顯德中獻贊聖䇿九篇世宗奇其言宋初爲河南簿太平興國中厯殿中丞知龍州何十嵗識音韻十五能屬文篤學嗜古王禹偁雅重之淳化三年舉進士解褐將作監丞累遷右司諌真宗初獻五議帝覽而善之咸平二年舉入閤故事何次當待制獻疏請罷掊克之臣復周官唐式是冬從幸大名詔訪邊事疏上真宗嘉之景德初知制誥賜金紫掌三班院卒何樂名教勤接士類好學著駮史通十餘篇有集四十卷孫僅何弟少勤學與何俱有名於時咸平元年舉進士兄弟連冠貢籍時人榮之解褐舒州團練推官㑹詔舉賢良方正之士趙安仁以僅名聞擢光祿寺丞累遷給事中天禧元年卒僅性端慤中立無競篤於儒學士大夫推其履尚有集五十卷王美蔡州人十世同居咸平中有司請加旌表詔從之仍蠲其課調祖士衡上蔡人少孤博學有文楊億謂劉筠曰祖士衡儒學日新後生可畏也舉進士授大理評事累遷起居舍人知制誥為史館修撰士衡兒時有僧相之曰是兒神骨秀異他日有名於時若年過四十當位極人臣年三十九卒祖無擇上蔡人進士高第厯官廣南轉運使入直集賢院時封孔子後為文宣公無擇言以祖諡加後嗣非禮也於是議改為衍聖公神宗時王安石諷求其罪謫忠正軍節度副使尋知信陽軍卒無擇為人好義篤於師友少從孫明復學經術又從穆修為文章兩人死力求其遺文彚次之傳於世以言語政事為時名卿因小累放棄士論惜之謝良佐上蔡人與游酢吕大臨楊時在程門號四先生登進士第建中靖國初官京師以口語繫詔獄廢為民良佐記問該贍對人稱引前史至不差一字事有未徹則顙有泚與程頣别一年復來見問其所進曰但去得一矜字爾頤喜曰是子力學切問而近思者也所著論語説行於世朱勝非蔡州人以上舍登第靖康初為東道副總管建炎改元試中書舍人兼權直學士院時方草創勝非慿敗鼓草制辭氣嚴重如平時總制使錢蓋進職勝非言蓋棄師誤國封還貼黄蓋遂罷諌官衛膚敏坐論元祐太后兄子徙官勝非言以外戚故去諌臣非所以示天下累遷尚書右僕射兼御營使苗劉之亂保䕶功居多太后語高宗曰賴相此人元高興蔡州人少慷慨多大節力挽二石弓嘗步獵南陽山中遇虎跳踉大吼衆皆驚走興神色自若發一矢斃之至元間屢立戰功嘗召入朝悉獻江南所得珍寶帝曰卿何不少留以自奉對曰臣素貧賤今幸富貴皆陛下所賜何敢隱俘獲之物帝曰直臣也累官左丞相卒封公諡武宣張桓藁城人父木知汝寕府因家焉桓以國子生累官陜西行臺監察御史以言事不合去未幾汝寕盜起桓避之確山賊久知桓名襲獲之羅拜請為帥弗聽囚六日擁至渠魁前桓直趨據榻坐與之抗論逆順其徒捽桓起跪桓仰天大呼詈叱彌厲且屢唾賊面賊猶不忍殺謂桓曰汝但一揖亦恕汝死桓瞋目曰吾恨不能手斬逆首肯聽汝誘脅而折腰哉賊遂刺之後賊語人曰張御史真鐵漢害之可惜事聞贈禮部尚書諡忠潔明趙好德汝陽人洪武初由户部尚書改吏部帝嘉其典銓平明嘗召與四輔官坐論治道命畫史圖像禁中終陜西參政子毅性孝善屬文工草書累官詹事府少詹事孫顯信陽人父喪廬墓三年鄉里推重之洪武中領鄉舉入太學太祖臨幸説書稱㫖授給事中累陞工部尚書後廷諍忤㫖謫戍雲南籍其家止牛一頭茅屋數間使者還報帝嘉歎召復原職在途卒梁銘汝陽人以廕補燕山前衛百户洪武末北平𬒳圍銘戰甚力屢建奇功積官後軍都督同知鎮守寕夏封保定伯宣德初為左副總兵征交趾卒銘處心坦易臨事寛簡而勇敢精悍能撫恤士卒時論重之衡岳西平人洪武末舉於鄉時詔選諸生詣詹事府議事岳敷陳時政切直不迂擢潮州府同知厯西安慶陽知府永樂十年朝覲入京以言事忤㫖謫戍交趾洪熙初以薦起南城知縣改南豐常於官舍種蔬以自給家人或有愠色岳曰不猶愈於謫戌時耶後擢知桂林府前後厯四郡及歸貧無以為養士論莫不高之趙敏毅子能文章工書畫以鄉舉授兵部主事擢吏部郎中正統十四年扈從土木失車駕所在衆欲南奔敏曰昔嵇紹蕩陰之事諸君猶不聞耶乃易服躍馬而北䧟陳死焉贈奉直大夫廕一子尚禠羅山人正統進士除行人甞上書請毋囚繫大臣擢南院御史以劾周銓下獄謫雲南驛丞又因灾異上書陳數事悉格不行量移豐城知縣成化初擢湖廣僉事有司上其治行賜詔旌異徐廷璋羅山人景泰進士授給事中嘗陳時政七事劾罷四巡撫直聲振中外成化初錦衣都指揮門達有罪廷臣會鞫皆畏達不敢問廷璋怒叱加刑達乃伏辜厯右僉都御史巡撫延綏改甘肅又撫寕夏皆有聲朱儉上蔡人幼孤每逢父忌日輒臥冢大慟向母問父形容繪像事之母卒貧不能葬茇舍於野負土爲墳隆冬盛雪不少輟及葬羣鵲來巢枯木復榮天順中旌表梁珤銘子襲父爵正統中征鄧茂七有功破貴州叛苗擒其王韋同烈進封保定侯㝷討平清浪蠻寇擊敗凉州賊兵成化中掌都督左軍府事卒贈蠡國公諡襄靖尹冕西平人爲諸生母劉氏殁悲號廬墓側形容枯槁墓旁産紫芝十六莖復有雙柳交幹而生父聰殁復廬墓三年成化中旌表劉政確山人父母相繼殁廬墓六載嵗大旱獨周其墓田五六里得雨有不肖數火其廬火皆自息王賓亦確山人冬月母病思筍不可得賔日夕號泣竹忽生笋母食之而愈及殁廬墓芝產於側並成化中旌表曹鳳新蔡人成化進士授祁門知縣宏治初用廉能擢御史多所論建出知蘇州府舉治行卓異正德初厯右副都御史巡撫延綏鳳雅操方正數與鎮守中官忤召理院事以憂歸劉瑾銜其不通饋問屢陷之遂卒明年瑾誅遣官諭祭仍給金營葬李遜學上蔡人成化進士改庶吉士授檢討厯浙江陜西山東學政所至務從寛厚㝷陞户部侍郎滿考當廕子乃廕弟之子爲國子生正德間累遷禮部尚書敭厯中外三十餘年忠清端亮始終靡閒徐文英西平人成化進士厯官苑馬寺少卿致仕家居正德六年流賊掠境文英率鄉勇禦之兵敗遇害贈太僕寺卿同時與難者生員徐固輪戚壽義官賈得山等六十四人趙時中羅山人成化中舉鄉薦厯官御史正德初忤劉瑾廷杖落職遭父喪廬墓有白鳩來巢事聞詔旌其門呉文紳正陽人天性至孝成化十一年母楊氏遘疾文紳朝暮侍湯藥及卒結廬墓側林中枯木復榮人咸異之何景明信陽人生有異質八嵗能詩古文登宏治進士授中書舍人正德初劉瑾竊柄遂謝病歸坐罷瑾誅起故秩九年乾清宫災疏言義子不當畜邉軍不當留番僧不當寵宦官不當任留中㝷進吏部郎官至陜西提學副使景明志操耿介尚節義與李夢陽並有國士風海内號曰何李所著詩歌雜文行世孟洋信陽人有文學與何景明崔銑輩稱十才子登宏治進士授行人遷御史正德中疏論大學士靳貴不恊人望梁儲縱子殺人並宜罷下詔獄謫桂林敎授稍遷汶上知縣嘉靖中擢僉都御史督儲南京聞母病即解印馳歸抵家甫月餘而母殁服闋拜南京大理卿尋卒貧不能殮僚友醵金賻之張來儀遂平人正德初為四川羅江知縣以廉能稱會蜀寇青頭保為亂府檄來儀於劍州禦之兵敗被執賊欲跽之大罵不屈遇害方珤汝寕千户所人貌魁梧力能舉鼎並挽雙弓正德六年流賊至汝珤隨都指揮余英拒賊韓莊英先奔衆潰珤獨奮力戰手刃數十人矢盡刀折下馬撤屋椽復戰賊圍繞數匝攢射死戴璜新蔡人諸生正德七年流寇猝至璜方與其子奎讀書村墅賊得璜欲用之不從脅以刃璜瞋目譽賊賊怒殺之掠其子入壘賊帥詢其故歎曰壯士也何為害之遂斬害璜者釋其子令葬璜面如生熊應周新蔡人正德七年流寇掠邑境應周隨父絃匿村舍為賊所得將殺絃時應周年十六長跪哀號以身翼蔽其父求以死代賊大感動俱舍之張杰羅山人正德十五年貢太學爲齊東知縣事親孝後父母相繼殁廬墓六年墓地高故無水一日墓傍湧泉清冽不竭縣令楊鉞賈璘皆詣廬旌禮焉馬錄信陽人正德進士授固安知縣擢御史嘉靖初按江南諸府有聲中官黄錦誣劾高唐判官金坡逮繫五百餘人錄力爭得少解移按陜西汚吏聞風遁去繼按山西治妖賊李福達獄武定侯郭勛移書爲解錄不從劾勛庇姦亂法勛己伏罪㑹廷臣交劾勛勛與張璁桂蕚合謀爲蜚語聞上遂大反前獄錄謫戌廣西南丹衛竟卒戍所隆慶初追贈太僕少卿羊可立汝陽人父傑嘉靖間舉人厯榆社府谷知縣遷鄜州歸隱城南柳塘村人稱爲南溪先生卒祀鄉賢可立萬厯進士由安邑知縣擢御史劾張居正以私憾搆遼庶人憲㸅獄按鹺兩浙定鹽法條例累擢太常卿言壽宫事彈申時行時居正私人乘間謀中之謫大理評事出爲天雄推官移瑞州通判卒趙賢汝陽人嘉靖進士爲户部主事出監臨清倉治遼東餉皆勵清操厯荆州知府以治行聞遷右僉都御史巡撫湖廣畫便宜十事上之復奏行救荒四事時張居正綜覈吏治諸司振飭賢特爲巡撫㓂再撫山東奏免積逋銀米七十萬賢敏於政事受知居正以知府驟遷巡撫人不以爲私終南京吏部尚書曹亨鳳孫嘉靖進士授刑部主事權貴請託皆不納遷兖州知府討平部内積盜政嚴治肅課爲山東冠擢湖廣副使遼王憲㸅素驕恣憚亨爲斂戢穆宗立擢右僉都御史巡撫真定有聲隆慶時厯南京工部尚書劾織造中官嵗冒水衡錢不貲忤㫖致仕歸趙謨信陽人諸生父卒於廣西之南丹謨徒步六千里扶櫬歸廬墓三年蝗不入境盜不敢犯嘉靖中獲旌後爲景州訓導李本固汝陽人萬厯進士由知縣擢御史巡視十庫力糾大璫出按三秦懲貪墨抑驕帥壓强藩復按雲南豪右屏跡報命入都疏請册立東宫削籍歸光宗立召起厯南京大理寺卿卒傅振商汝陽人萬厯進士選庶吉士改御史按畿南惡少劉應第煽亂當時有借事倖功者振商檄所司不得株連得解者千餘家累遷右副都御史巡撫南贛以計縛巨寇邱囊等遷南京兵部侍郎時魏黨懐寕侯孫承廕毒軍蠧民道路以目振商彈之崇禎時進兵部尚書卒諡莊毅秦鎬汝陽人性至孝家貧絶意仕進肆力古文辭御史李日宣薦於朝與劉伯宗萬茂先譚元春同被徵命鎬堅不就後流寇陷城脅之不從絶粒死時年八十二先甞自題墓石云人間貧孝子地下老書生著有頭責齋集八卷髣園銷夏錄四卷袁永基汝陽人世襲汝寕所千户闖賊攻汝登陴永基手刃數賊度勢不能支歸與母訣束甲出短兵巷戰身被數創死郭正諤汝陽人諸生流寇破汝居民奔竄其母老不能行正諤負之賊至令置其母正諤不從俱被害劉時寵上蔡人有孝行崇禎中流寇陷城其父宗祀年老不能行命之速避遂自殺時寵慟哭刺死一子三女夫婦並自剄其妹適歸亦從死楊士英西平人由恩貢任懷仁知縣居官廉能母老乞歸養崇禎九年流寇抵境被執誘之降士英大罵賊怒殺之媳王氏亦罵賊死本朝乾隆四十一年賜諡烈愍張士傑信陽人流寇至欲殺其父士傑求以身代賊遂殺士傑而貸其父時年十八聞者皆為流涕朱榮祖汝陽人崇禎末累立戰功授遊擊團練鄉勇值土寇為亂知府李燦密授計紿賊人城殺之榮祖力居多後城陷其妻孫氏登樓自焚死劉璧確山人崇禎末任岳州府通判破闖賊於洞庭陞漢陽知府未之任獻賊攻岳州各官逃散惟璧與巡按劉熙祚堅守三月糧盡城䧟被執至長沙脅之降不屈賊因以嚴刑酷逼至死罵不絶口子泰年十四亦死焉本朝乾隆四十一年賜諡烈愍本朝王猷著新蔡人順治元年貢士四年選漢中府推官時四川用兵漢中為西蜀之要南送川餉東迎楚米西理茶法兼詰兵戎猷著悉身任其勞撫按交疏薦之陞寕波府同知嵗饑捐俸施米全活萬計十一年遷黄州知府政繁民劇又當戎馬倥偬之際更有湖課蘆洲之害猷著日則治兵暮則籌餉一切厲民之事無不痛革以病告歸凡隣里有昏葬急難貧乏者悉推解周卹人皆感之劉士蘭羅山人順治丙戌進士任肥城知縣厯刑部主事員外治獄多所平反出守東昌擢陜西驛傳道厯左右通政皆有異政卒祀鄉賢張沐上蔡人順治戊戌進士授内黄知縣再知資縣行古敎化皆以慈惠著稱後乞歸與孫竒逢湯斌往来講學巡撫聘主遊梁書院晚年闢白龜圃草宇土壁以受四方學者李若梓遂平人順治卒卯舉人兄弟同㸑寸帛不人私槖子孫守其規同居數世傅鶴祥汝陽人廕授户部主事厯員外出為德安知府時三逆背畔供億繁重應山令不善督催致民變吏求請兵鶴祥曰民不堪命耳單騎馳諭即散轉福建運使晉參政以漕糧十九萬餉臺灣而漕艘少一時不及營造乃請提八府官船又偕商艘齊集漳州挽運直抵厦門海外兵餉無缺署臬篆却暮夜金釋延平疑獄無辜者三百餘人卒祀郷賢傅鸞祥鶴祥弟廕授通政司經厯累擢寶慶知府寶屬武岡州嵗貢芽茶因山賊盤踞缺解甚多賊平追比積逋民無以應鸞祥詳請蠲免屬邑苗徭雜處俗獷悍喜劫殺鸞祥結以恩義終其任無敢猖獗者洊升天津道副使卒祀鄉賢程元章上蔡人康熙辛丑一甲進士授編修視學福建拒絶請託一無瞻徇洊擢浙江巡撫時竈地可墾者以無塘禦水遂致淪棄元章勸諭場丁築塘建閘墾地萬有餘畞官至吏部侍郎龍淳遂平人貢生嘉慶二年教匪入境率鄉勇堵禦被執逼脅不從罵賊被害同時死者其弟洛浩子應斗應基應庚羅山則歲貢黄中理及黄子家黄棟父子兄弟皆死事梁國幹新蔡人任把總縁事罷職嘉慶十八年投効滑縣軍營在施家寨擊賊受傷旋卒賞恩騎尉世職流寓漢董永千乘人少失母漢末奉父避兵寓居汝南何伯求襄鄉人陳蕃李膺之敗伯求與蕃膺善遂為宦官所陷乃變姓名亡匿汝南所至親其豪傑有聲荆豫閒袁紹慕之私與往来結為奔走之友晉祖逖范陽人永嘉末京師大亂逖率親黨數百家避地淮泗以所乘車馬載同行老疾躬自徒步藥物衣糧與衆共之又多權畧是以少長咸宗之推逖為行主唐蕭穎士蘭陵人客汝南卒門人共諡曰文元先生宋任諒眉山人徙汝陽九嵗而孤舅欲奪母志諒挽衣泣曰豈有為人子不能養其親者乎母為感動而止金麻九疇易州人弱冠有文名南渡後寓居郾蔡閒入遂平西山始以古學自力列女漢翟方進母方進少微賤為小史數為掾吏所詈辱因辭其後母欲西至京師受經母憐其幼隨之長安織屨以給方進既富貴而後母尚在方進内行修飭供養甚篤戴氏五女皆戴良女並賢每有求姻輒便許嫁疏裳布被竹笥木屐以遣之五女能遵其訓皆有隱者之風焉晉周顗母李氏汝南人字絡秀顗父浚出獵遇雨止絡秀家㑹其父兄不在絡秀與一婢於内宰猪羊具數十人饌甚精辦而不聞人聲浚使覘之獨見一女子甚美因求為妾其父兄不許絡秀曰門户殄悴何惜一女若連姻貴族將來庶有大益矣父兄許之遂生顗及嵩謨顗等既長絡秀謂之曰我屈節為汝家作妾門户計耳汝不與我家為親親者吾亦何惜餘年顗等從命由此李氏遂得為方雅之族南北朝宋徐元妻許氏新蔡人年二十一喪夫子甄年三嵗父攬愍其年少以更適同縣張買氏自誓不行父逼載送買氏自經氣絶家人奔赴良久乃蘇買知不可奪夜送還攬氏歸徐氏養元父季元嘉中年八十餘卒唐董昌齡母楊氏世居蔡昌齡事呉元濟為呉房令母嘗密戒曰逆順成敗兒可圖之昌齡未決徙郾城楊復曰逆賊欺天神所不福當速降無以我累兒為忠臣吾死不憾會王師逼郾城昌齡乃降憲宗喜即拜郾城令兼監察御史昌齡謝曰母之訓也臣何能帝嗟歎元濟囚楊欲殺者屢矣蔡平而母在陳許節度李遜表之封北平郡太君李湍妻某氏湍籍吳元濟軍元和中自拔歸烏重允妻為賊縛而臠食之將死猶號湍曰善事烏僕射觀者歎泣重允請以其事屬史官詔可明李思齊妾鄭氏思齊羅山人元末思齊率義兵屢復郡縣拜太尉降明為中書省平章政事卒鄭即自縊死事聞追贈淑人諡貞烈雷某妻田氏上蔡人正德六年流賊䧟上蔡執而欲汚之大罵曰吾名家女許為雷黄門兒婦肯從爾狗彘耶賊剖其腹以死事聞詔旌表之賈某妻程氏名蘭香上蔡人正德中為流賊所執大罵不從賊怒殺之程英姐蘭香之族適李長春八年而長春死有少年圖娶之父母已受幣英姐縊於夫柩側與蘭香並旌同縣王尚得妻邱氏正德中流賊陷城投井死夫死而殉者李芬妻張氏王應期妻魏氏楊佐妻李氏新蔡人正德七年流賊犯境氏被執不從死賊裂其屍同縣韓珙妻李氏史秀妻袁氏皆以拒賊死獲旌魯聯芳妻鍾氏新蔡人聯芳死所親勸更嫁不應後漸迫之遂縊於夫柩側又袁祚昌妻王氏未嫁而殉王氏女遂平人名九斤以誕時重九斤也正德六年流寇亂氏被執不辱脅之刃曰將剜汝目氏大罵曰吾目可剜而身不可汚賊怒遂剜其目殺之死三日猶以兩手據中衣其父母至呼其名曰賊已退父母來為汝整衣手方釋事聞旌為貞烈從祀貞烈祠同縣唐氏女福惠楊氏女王仲和妻張菊花任昻妻張氏張袁妻周氏皆以死拒賊並旌其門張氏女妙秀西平人少許字同邑尹琳琳卒妙秀請於母送葬葬己遂歸琳室終身不嫁先是母疾甚思鹿羹求之不得妙秀密刲左臂肉紿母曰鹿肉也和羮以進母食而甘之疾遂愈有司署其門曰節孝周采蘋西平人許字王某未嫁而王氏子卒遂歸王氏留養姑二十年正德中流賊陷城氏與姑俱被執賊欲毁其節氏紿賊曰能脱姑於難即從汝及姑得釋卒拒不從賊支解之時又有同邑李氏女明良為流賊所掠不從賊斷其舌猶怒目不已賊復刳其目比死身無完膚賈氏女慧姿父為流寇所殺女罵不絶口賊以好言慰之女遂奪刀自刎毛選妻劉氏為流賊所掠不從遇害以刀解其屍夏古淵妻左氏城䧟自縊死事聞賜旌並祀貞烈祠李某妻陳氏西平人夫卒母憐其早寡欲嫁之氏潛出城西北隅水涯自經於短桑之上横山烈婦不知其姓氏家於正陽之横山嘉靖三十三年盜任泰據横山流劫州縣官兵會勦適烈婦夫荷鋤田間為兵所執送之縣杖殺之烈婦覓夫辨其屍於積屍中負歸哭六日不絶聲乃死後二十年推官趙南星作横山烈婦詩弔之田一方妻張氏遂平人夫卒長號三日觸棺死時年二十一事聞獲旌又有王民仁妻趙氏夫卒自縊嘉靖十年詔旌其門周基妻藺氏汝陽人夫卒自縊隆慶三年旌劉氏二女汝陽人父玉生七女家貧力田嘗至隴上歎曰生女不生男使我扶犂不輟其第四第六女聞之惻然誓不字人著短衣代父耕作日以菽水承歡及父母繼殁二女哭之慟無力營葬即屋為邱不離親側隆慶四年督學副使楊俊民知府史桂芳詣其舍請見年皆逾六十椎髻而前形容憔悴兩人為泣下題其門曰孝節雙清李守貴妻孔氏遂平人守貴病革氏先夫卒一日投繯死又同縣郭維藩妻祝氏亦夫亡自縊死王瓚妻寇氏止陽人事姑孝謹瓚卒氏自經者三為姑救得不死㑹有議婚者姑念家貧陰許之氏托病不食死崇禎中旌温引厲妻韓氏汝陽人早寡崇禎八年為流賊所執不受汚見殺又同縣吕氏三女長適楊聖化仲適張芳遠崇禎十二年寇至二夫逃去二婦遂同縊季適李華壬午冬賊破郡城亦自縊門琳照妻桂氏以拒賊爲所殺王居一妻明氏上蔡人崇禎中流賊攻寨氏奉姑及諸女登樓避之賊舉火焚樓呼曰下樓者釋汝死胡曰下樓受辱不如死抱兒及姑俱死焉時甥女李氏年十五墜樓欲死賊執之以頭觸石血濺賊衣亦遇害同縣死賊難者李卓妻梁氏劉淵妻王氏温國器妻李氏李世纘妻金氏王引賜妻高氏及李氏女黄氏女楊士選妻劉氏西平人流寇至劉與二女義不受辱母子爭死賊先殺劉二女赴火死同縣丁進科妻左氏夫死寇難將葬令廣其壙勿封遂縊於棺前里人同穴葬之劉天眷妻戴氏城破自焚死杜中德妻張氏孀居二十餘載罵賊死張瓚妻魏氏力拒賊罵不絶口賊怒刃之李翼倫妻高氏信陽人流寇陷城高與三女度不能免皆投井死李呈章妻柯氏妾高氏㩦手墮城死又蔡人俊妻辛氏夫死絶粒殉焉尚