front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_060-1a}
body:
  text: 兗州府三名宦漢田叔陘城人景帝時為魯相初至官民以王取其財物自言者百餘人叔取其渠率二十人笞怒之曰王非汝主耶何敢自言主王聞大慚發中府錢使相償之相曰王自使人償之不爾是王為惡而相為善也魯王好獵相常從入苑中王輒休相就館相嘗暴坐苑外曰吾王暴露獨何為舍王以故不大出遊數年以官卒魯人以百金餉其少子仁不受曰義不傷先人名鮑永屯留人光武時董憲裨將屯兵於魯侵害百姓乃拜永為魯郡太守擊討大破之降者數千人惟别帥彭豐虞休皮常等不肯下頃之孔子闕里無故荆棘自除永異之謂府丞及魯令曰方今危急而闕里自開豈夫子欲令太守行禮助吾誅無道耶乃會人衆修鄉射之禮請豐等會觀手格殺豐等擒破黨與帝嘉其咯封為關內侯鍾離意山陰人建武時除瑕邱令吏有檀建者盜竊縣內意屏人問狀建叩頭伏罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞有道之君以義行誅子罪命也遂命建進藥而死顯宗時為魯相出私錢萬三千文付户曹孔欣修夫子車身入廟拂几席劍履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主薄安置几前孔子教授堂下牀首有懸甕人莫敢發意發之中得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥會稽鍾離意璧有七張伯懷其一意即召問伯果服焉鄭宏山陰人顯宗時拜騶令勤行德化部人王逢等得路遺寶物懸於通衢求主還之魯國當春大旱五穀不登騶獨致雨偏熟永平十五年蝗起泰山流被郡國過騶界不集郡以狀聞詔書以為不然遣使按行如言也謝夷吾山陰人為夀張令求平十五年蝗發泰山流徙郡國薦食五榖過夀張界飛逝不集汝郁陳國人和帝時纍遷為魯相以德教化百姓稱之流人歸者八九千户王堂郪人永建中拜魯相政存簡一至數年無詞訟公沙穆膠東人桓帝時遷繒相時繒侯劉敞所為多不法廢嫡立庶傲很放恣穆到官謁曰臣始除之日京師咸謂臣曰繒有惡侯以弔小相明侯何因得此醜聲之甚也朝廷使臣為輔願改往修來自求多福乃上汲敞所侵官民田地廢其庶子還立嫡嗣其蒼頭兒客犯法皆收考之因苦諫敞敞涕泣為謝多從其所規朱俊上虞人靈帝時除蘭陵令政有異能為東海相所表三國魏孫禮容城人太祖時遷滎陽都尉魯山中賊數百人為民作害乃徙禮為魯相至官出俸榖發吏民募首級招納降附使還為間應時平泰晉江統圉人東海王越為兗州牧以統為别駕委以州事統舉高平郗鑒為賢良陳留阮修為直言濟北程收為方正時以為知人南北朝魏遊明根任人獻文時都督兗州諸軍事瑕邱鎮將尋就拜東兗州刺史為政清平新民樂附之李崇頓邱人高祖時除兗州刺史兗舊多劫盜崇乃村置一樓樓懸一鼓盜發之處雙捶亂擊四面諸村始聞者撾鼓一通次復聞者以二為節次後聞者以三為節各擊數十捶諸村聞鼓皆守要路俄頃之間聲布百里其中險要悉有伏人盜竊始發便爾擒送諸州置樓懸鼓自崇始也張應延興中為魯郡太守履行貞素聲績著聞妻子樵採以自供高祖深嘉其能遷京兆太守按北史作張膺房謨洛陽人魏末為兗州刺史選用廉清廣布恩信寮屬守令有犯必知百姓安之北齊張華原代郡人神武時為兗州刺史人懷感附寇盜浸息州獄先有囚千餘人華原皆決遣至年暮唯有重罪者數十人亦遣歸家申賀依期至獄先是州境素有猛獸為暴自華原臨州忽有六駮食之咸以為化感所致鄭述祖開封人天保初纍遷兗州刺史時穆子容為巡省使歎曰古人有言聞伯夷之風貪夫廉懦夫有立志今於鄭兗州見之矣初述祖父道昭為兗州刺史於城南小山起齊亭刻石為記述祖時年九嵗及為刺史往尋舊迹得一石銘云中嶽先生鄭道昭之白雲堂述祖對之嗚咽有入市盜布者其父執之以首述祖原之境遂無盜人歌之曰大鄭公小鄭公相去五十載風教猶尚同隋薛胄汾隂人髙祖受禪除兗州刺史到官繫囚數百胄剖斷旬日便了囹圄空虛有陳州人向道力者偽作高平郡守將之官胄遇諸途察其有異遂往收之道力懼而引偽其發姦摘伏皆此類也先是兗州城東沂泗二水合而南流泛濫大澤中胄遂積石堰之使決令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兗渠鄭善果滎澤人開皇時纍轉魯郡太守母崔賢明曉政治嘗坐閣內聽善果處決或當理則悅有不可則引至牀下責愧之故善果所至有績號清吏唐陸亘吳人憲宗時為兗州刺史對延英具陳節席分兵屬州刺史不能制故易亂帝因詔屯士得隸刺史五代晉程羽陸澤人天福中授陽榖主簿有政績周崔周度鄢陵人為泰寧節度判官慕容彥超反周度諌曰魯詩書之國也自伯禽以來未有能霸者然以禮義守之而長世者多矣公若量力相時而動可以保富貴而終身李河中安裏陽杜令公近嵗之龜鑑也彥超大怒害之兗州平贈祕書監宋楊瓊西河人景德初知兗州有州卒自言得神術能飛行空中州人頗惑瓊捕之折其足奏戮之張禹圭河朔人景德初知兗州會河隄決溢禹圭率衆塞之宰相王旦使兗州還言其狀優詔褒之王臻汝陽人真宗時以殿中丞知兗州特遷監察御史剛毅善決事所至有賢聲蔡齊萊州膠水人真宗時通判兗州恃太守王臻政治嚴猛齊濟之以寬訟獄為之不冤陳太素緱氏人真宗時知兗州有治迹崔立鄢陵人真宗時知兗州嵗大飢募富人出榖十萬餘石以賑飢者所全活甚衆徐起鄄城人真宗時知兗州有都巡檢虐所部部兵百餘人持兵至庭下州人大恐起不為動以禍福開諭之衆感泣聽命因按致其首奏罷都巡檢杜衍山陰人慶厯中以尚書左丞出知兗州時州縣官有纍重而素貧者以公租及帑均給之量其大小咸使自足有侵漁者責之李師中楚邱人仁宗時知濟兗二州濟水堙塞久師中訪故道自兗城南啓鑿之魏濤彭城人元祐間知氶縣政治明毅所至無冤獄氶人思之邵潛陽羡人元祐八年知氶縣兼兵馬監押敦篤化民庭訟日虛吕由誠開封人御史中丞誨之子靖康中知襲慶府拊循有方士樂為留在任二十九年卒朱珤龍溪人永樂中知鄒縣明敏有吏幹雖洞悉民隱而性寬厚有容刑用鞭中貫以綿嵗凶解銀帶簪珥易米賑飢每巡行郊野勸民耕種秩滿以民請留再任卒於官孔公朝樂清人永樂中知寧陽縣清廉有幹後坐事遣戍民屢叩閽不許宣德初詔求賢或以公朝薦寧陽人聞之又相率請再任帝謂廷臣曰公朝去寧陽巳二十年民猶奏乞不已非良吏耶遂與之黃瑜臨桂人正統中授兗州府同知發倉賑飢築隄捍水以治行髙等即擢本府知府房嵒滑縣人宣德間知鄒縣至正統中閲二十餘年卒吏民皆愛戴之龔宏嘉定人成化中知兗州府府有借兌糧寄養馬相沿為常課宏力請上官得捐糧萬石馬八千匹民困大蘇許進靈寶人成化中知兗州府蒞政明敏摘伏若神張泰肅寧人成化中知鄒縣明於聽斷訟無留滯囹圄遂空御史按曲阜獨鄒無録心疑之按畢由鄒取道至滕突入縣署索獄門鑰泰曰無鎖安得鑰御史自往視之門大啓入視竟無一人於是改容歎息而去惠儒長安人正德時為兗州通判屬有閹宦索逋致斃民命者所司下儒鞫問閹懼以金一罈遺儒覆之以醬儒即摘發以聞遂如法論抵僚屬皆敬服章時鸞青陽人嘉靖中知鄒縣鄒土瘠民散時鸞招集流亡勸耕織邑大治時河於漕阻朝廷遣尚書朱衡經理其事令沿河官集議時鸞首創開南陽新河漕運復通張鏜武功右衛人嘉靖中知滕縣時邑多流亡計其所蓄以定徭役舊輸賦者皆姦胥無賴先期斂收及不能償任責本户鏜選有業願民為之簿正躬閲所納由是民無逋賦鏜明習法令獄訟一鞫即決誣訴者必窮其指使刁民悉逃匿他境境內大治姬文允華州人天啓二年知滕縣視事甫三日白蓮賊徐鴻儒來薄城吏卒多散走文允登陴與賊語賊見文允身長面赤鬚髯奮張皆羅拜及城潰文允嚼齒罵賊械繫三日終不屈自經死贈太僕少卿立祠祀之俞起蛟錢塘人由貢生厯官魯府左長史惠王欲易世子起蛟力諌乃巳世子嗣位值凶嵗勸王賑貸自出粟二千石佐之大盜李青山率衆來犯偕在籍給事中范淑泰擊破其衆崇禎十五年城破起蛟率親屬二十三人抗禦死之鄧蕃錫金壇人崇禎十五年知兗州府時中州殘破已盡兗與接壤蕃錫繕完守具與監軍參議王維新死守及城陷被執不屈死妻攜稚子亦赴井死郝芳聲欣州人崇禎十五年知滋陽縣有政聲城破死之前令樊吉人元城人以才擢兵部主事再擢山東兵備僉事未行會城破自刎死吳良能蓋州人崇禎中知滕縣有武略捍禦山賊邑賴以安十五年城被圍將破良能殺其家屬拜母而出力戰死本朝李可愛滿洲人順治初知陽榖縣下車即值土寇丁惟嶽之亂可愛嬰城固守力盡城陷死之楊奇逢正紅旗漢軍康熙二十四年知滕縣滕為運道咽喉工役繁多民甚勞瘁奇逢詳免彭口嵗挑夫二百名均其值為雇役又罷派民運柳令種植官地公取公用民甚便之李世敬大興人康熙三十八年知兗州府郡薦飢奉詔發栗以賑世敬按厯州邑窮鄉僻壤皆手籍而面稽遇有遺亡後至者則出己俸以償之陳安䇿泰和人康熙四十二年知嶧縣有吏才諸廢興舉前此社户紛雜特為釐正使甲比户聯滚單易行民無擾纍婁一均會稽人康熙四十八年知鄒縣勸農勤政寒暑不敢少懈決訟立判民無久候杜絶里長私派人咸德之楊文熹正紅旗漢軍雍正十三年知嶧縣廉明正直滑吏斂迹設義孰勤教化士夙丕振厯任八年士民至今思之沈齊義知夀張縣乾隆三十九年逆匪王倫倡亂齊義謀捕之不密賊日夜攻城城陷被狀女二姑聞父死投繯自盡劉希燾廣東長樂人乾隆三十九年任陽榖縣阿城鎮縣丞聞夀張賊警赴援至柴家莊遇害典史方光祀率從子義守監獄賊至俱被戕人物漢叔孫通薛人拜博士號稷嗣君漢王為皇帝去秦儀法為簡易羣臣飲爭功醉或妄呼攏劍擊柱上患之通説上徵魯諸生共起朝儀為縣蕞野外習之漢七年長樂宫成諸侯羣臣朝莫不震恐肅敬竟朝置酒無敢歡譁失禮者於是高帝曰吾乃今日知為皇帝之貴也拜通為奉常徙太子太傅高帝欲易太子通諫上遂無易太子志孝惠即位徙通為奉常定宗廟儀及稍定漢諸儀法皆通所論著也高堂生魯人漢初傳士禮十七篇唐時從祀孔廟宋封萊蕪伯徐生魯人善為頌孝文時為禮官大夫漢書注蘇林曰漢舊儀有二郎為此頌貌威儀事徐氏後有張氏不知經但能盤辟為禮容天下郡國有容史皆詣魯學之按頌讀作容穆生魯人少與楚元王交及白生申公俱受詩於浮邱伯元王既至楚以穆生白生申公為中大夫初元王敬禮申公等穆生不嗜酒元王常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂謝病去申公白生獨留王戊稍淫暴二人諫不聽胥靡之白生魯人詳見上按漢書注服虔曰白生魯國奄里人申公名培魯人少與楚元王交俱事浮邱伯受詩吕太后時浮邱伯在長安元王遣子郢客與申公俱卒業文帝時聞申公為詩最精以為博士始為詩傳號魯詩元王薨郢客嗣令傅太子戊戊不好學及戊立為王胥靡申公申公愧之歸魯退居家教弟子自遠方來受業者千餘人蘭陵王臧代趙綰武帝初請立明堂以朝諸侯不能就其事乃言師中公於是上使使束帛加璧安車以蒲裏輪駕駟弟子二人乘軺傳從至見上問治亂之事中公時巳八十餘老對曰為治者不在多言顧力行何如耳上以為大中大夫舍魯邸議明堂事後病免歸繆生蘭陵人申公弟子長沙內史闕門慶忌鄒人申公弟子膠東內史王臧蘭陵人從申公受詩景帝時為太子少傅免去武帝初即位臧上書宿衛纍遷一嵗至郎中令公孫宏薛人少時家貧牧豕海上年四十餘乃學春秋雜説武帝初宏年六十以賢良徵為博士免歸元光五年復徵賢良上䇿詔諸儒時對者百餘人太常奏宏第居下䇿奏天子擢為第一召入見拜為博士一嵗中至左內史數年遷御史大夫元朔中代薛澤為丞相時上方興功業屢舉賢良宏於是起客館開東閣以延賢人與參論議宏身食一肉脫栗飯故人賓客仰衣食俸祿皆以給之年八十終丞相位江公瑕邱人受榖梁春秋及詩於魯申公傳子至孫為博士孔安國孔子十一世孫少學詩於申公受尚書於伏生武帝時以治尚書為博士官至臨淮太守𥘉魯共王壞孔子舊宅於壁中得古文尚書及傳論語孝經皆科斗文字時人無能知者安國以所聞伏生之書考論文義以隸古字寫之送之官府安國承詔作傳引書序冠其篇首定為五十八篇會巫蠱事起不得奏上私傳其業於都尉朝謂之尚書古文之學又為古文孝經傳論語訓解唐時從祀孔廟宋封曲阜伯許生魯人從中公受詩守學教授韋賢王式皆事之周霸魯人受易東武王同子中以易至大官亦能言尚書褚大蘭陵人從胡母生受公羊春秋至梁相蕭奮瑕邱人以禮至淮陽太守眭宏魯國蕃人從嬴公受春秋以明經為議郎至符節令榮廣魯人能傳江公詩春秋高才敏捷與公羊大師眭孟等論數困之故好學春復受榖梁沛蔡千秋少君梁周慶幼君丁姓子孫皆從廣受夏侯始昌魯人通五經以齊詩尚書教授自董仲舒韓嬰死後武帝得始昌甚重之始昌明於陰陽先言柏梁臺災日至期日果災時昌邑王以少子愛上為選師始昌為太傅年老以夀終韋賢魯國鄒人為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒徵為博士給事中進授昭帝詩遷大鴻臚宣帝即位以先帝師甚見尊重本始三年代蔡義為丞相封扶陽侯地節三年以老病乞骸骨賜黃金百斤罷歸丞相致仕自賢始卒諡曰節侯丙吉魯國人治律令為魯獄吏武帝末巫蠱事起吉以故廷尉監徵詔治巫蠱郡邸獄時宣帝生數月以皇曾孫坐繫吉哀曾孫無辜擇謹厚女徒命保養曾孫置間燥處後元二年武帝遣使者分條中都官詔獄繫者皆殺之內謁者令郭穰夜到郡邸獄吉閉門拒不納穰還以聞因劾奏吉武帝寤因赦天下郡邸獄繫者獨賴吉得生宣帝即位掖庭宫婢則自陳常有阿保功辭引吉知狀然後知吉有舊恩而終不言上大賢之封博陽侯後代魏相為丞相吉居相位尚寬大好禮讓務掩過揚善知大體卒諡定侯龔遂南平陽人以明經為官至昌邑郎中令事王賀遂為人忠厚剛毅有大節內諫爭於王外責傅相引經義陳禍福至於涕泣王廢羣臣坐誅遂以數諫得減死宣帝即位渤海左右郡嵗飢盜起上選能治者丞相御史舉遂可用上以為渤海太守時年七十餘矣遂單車獨行至府郡中翕然盜賊悉平數年徵至京師上以遂年老拜為水衡都尉甚重之孟喜蘭陵人父號孟卿善為禮春秋授后蒼疏廣世所傳后氏禮疏氏春秋皆出孟卿孟卿以禮經多春秋煩雜乃使喜從田王孫受易得易家候陰陽災變書喜舉孝廉為郎曲臺署長病免為丞相掾喜授同郡白光少子沛翟牧子兄皆為博士由是有翟孟白之學顏安樂薛人眭孟姊子家貧為學精力官至齊郡太守丞後為仇家所殺安樂初與嚴彭祖俱事眭孟質問疑誼各持所見孟曰春秋之意在二孟矣孟死彭祖安樂各顓門教授由是公羊春秋有顏嚴之學疏廣蘭陵人少好學明春秋地節三年立皇太子廣為少傅數月徙為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭敬敏而有辭頃之拜受為少傅太子每朝太傅在前少傅在後父子並為師傅朝廷以為榮在位五歲皇太子年十二通論語孝經廣與受俱上疏乞骸骨許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人設祖道供帳東都門外車數百輛道旁觀者或歎息為之下泣既歸鄉里廣子孫竊謂其昆弟老人勸買田宅廣曰我豈不念子孫顧自有舊田廬足以供永食今又增益之但教子孫怠惰耳又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜於是族人悅服皆以夀終韋元成皆子少好學修父業尤謙遜下士永光中代于定國為丞相遂繼父相位封侯故國榮當世焉元成為相七年守正持重不及父賢而文采過之卒後諡曰共侯蕭望之蘭陵人徙杜陵好學治齊詩地節三年夏京師雨雹望之因上疏欲陳災異宣帝下少府宋崎問狀望之對陰陽不和是大臣任政一姓擅執之所致天子拜望之為謁者後霍氏誅望之寖益任用宣帝寢疾望之受遺詔輔政領尚書事元帝即位望之以師傅見尊重多所匡正宦官中書令宏恭石顯久典樞機望之以為中書政本白欲更置士人由是大舉恭顯忤恭顯奏望之欲專擅權勢請逮捕望之飲鴆自殺上為之漾泣哀動左右孔霸孔子十三世孫治尚書事太傅夏侯勝宣帝時以選授皇太子經遷詹事高密相元帝即位賜爵關內侯為人謙退不好權勢上欲致霸相位霸讓位自陳至三上深知其至誠乃弗用卒諡烈君鄭宏剛人兄昌字次卿亦好學皆明經通法律政事次卿為太原涿州太守宏為南陽太守皆著治迹次卿用刑罰深不如宏平遷淮陽相以高第入為右扶風京師稱之代韋元成為御史大夫匡衡氶人好學諸儒為之語曰無説詩匡鼎來匡説詩解人頤元帝即位史高薦衡於上為郎中遷博士給事中為太子少傅數上疏陳便宜建昭三年代韋元成為丞相封樂安侯成帝即位上疏戒妃匹勸經學威儀之則復奏正南北郊罷諸淫祀子咸亦明經列位至九卿朱雲魯人徙居平陵從博士白子友受易又事蕭望之受論語皆能傳其業好倜儻大節成帝時上書求見公卿在前雲曰臣願賜尚方斬馬劍斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比千遊於地下足矣未知聖朝何如耳於是左將軍辛下公用以給私門非所以示四方也上不悅頃之傅太后使謁者買諸官婢賤取之復取執金吾官婢八人隆奏言賈賤請更平直左遷沛郡都尉王莽少時與隆交隆不甚附莽秉政使大司徒孔光奏隆前為冀州牧冤陷無辜免官徙合浦夏侯敬魯人受慶氏禮孔子建魯人少遊長安與崔篆友善及篆仕王莽為建新大尹嘗勸子建仕對曰吾有布衣之心子有衮冕之志道既乖矣請從此辭遂歸終於家王良蘭陵人習小夏侯尚書王莽時寢病不仕教授諸生千餘人建武三年徵拜諫議大夫數有忠言以禮進止朝廷敬之六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器後以病歸卒於家曹充薛人持慶氏禮建武中為博士從巡狩岱宗定封禪禮還受詔議立七廟三雍大射養老禮儀顯宗即位上言當制禮以示百世拜侍中作章句辨難於是遂有慶氏學寒朗薛人博通書傳舉孝廉永平中以謁者守侍御史考案楚獄顏忠王平等辭連及隧鄉侯耿建朗陵侯臧信護澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及無敢以情怒者朗上言建等無姦專為忠平所誣疑天下無辜類多如此乃召朗入問帝意解建初中詔以朗納忠先帝拜易長遷濟陽令以母喪去官百姓追思之永元中再遷清河大守坐法免曹褒充子少傳充業搏雅疏通尤好禮士常憾朝廷制度未備慕叔孫通漢禮儀晝夜研精寢則懷抱筆札行則誦習文書舉孝廉徵拜博士會肅宗欲制定禮樂褒上疏陳禮樂之本制改之意拜侍中敕於南宫東觀盡心集作褎乃撰禮制百五十篇上之褒博物識古為儒者宗作通議十二篇演經雜論百二十篇又傳禮記四十九篇教授諸生千餘人慶氏學遂行於世孔僖子建曽孫自安國以下世傳古文尚書毛詩僖習春秋拜蘭臺令史元和二年帝幸闕里以太牢祀孔子大會孔氏男子二十以上者六十三人僖因自陳謝帝曰今日之會於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道陛下崇禮先師增輝聖德至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言遂拜僖郎中使校書東觀卒官臨晉令子長彥季彥長彥好章句學季彥守其家業門徒數百人戴封剛人年十五詣太學師東海申君申君卒送喪到東海道經其家父母豫為娶妻封拜親不宿而去還京師卒業後遇賊財物悉被掠奪遺縑七匹封追以與之賊驚曰此賢人也盡還其器物詔書求賢良方正極言之士封對䇿第一擢拜議郎遷西華令永元十二年徵拜太常卒於官王龔髙平人為青州刺史劾奏貪濁二千石數人安帝嘉之徴拜尚書建光二年遷汝南太守政崇溫和好才愛士引進郡人黃憲陳蕃等永和元年拜太尉在位公慎自非公事不通州郡書記其所辟命皆海內長者龔深疾宦官專權志在匡正乃上書極言其狀請加放斥諸黃門恐懼各使賓客誣奏龔罪順帝命亟自實前掾李固奏記於大將軍梁商商即言之於帝事乃得釋王輔平陸人學公羊傳援神契隱居野廬以道自娛辟公府舉有道對䇿拜郎中陳災異甄吉凶有驗拜議郎以病歸安帝公車徵不行卒於官王暢龔子以清實著稱無所交黨大將軍梁商辟舉茂才四遷尚書令厯轉漁陽太守所在以嚴明稱坐事免官太尉陳蕃薦暢清方公正復為尚書尋拜南陽太守奮厲威猛豪右大震功曹張敞奏記諌暢更崇寬政教化遂行建寧元年遷司空數月策免明年卒何休樊人精研六經世儒無及尤好公羊春狄不仕州郡進退必以禮為太傅陳蕃所辟蕃敗坐廢錮乃作春秋公羊解詁又與其師博士羊弼追述李育意以難二傳作公羊墨守左氏膏肓榖梁廢疾黨禁解拜議郎屢陳忠言再遷諫議大夫光和五年卒劉梁寧陽人宗室子孫少孤貧賣書於市常疾世多利交以邪曲相黨乃著破羣論又著辨和同之論桓帝時舉孝廉除北新城長大作講舍延聚生徒儒化大行召拜尚書郎孫楨字公幹亦以文才知名張儉高平人初舉茂才以刺史非其人謝病不起延熹八年太守翟超請為東部督郵舉劾中常侍侯覽及其母罪惡請誅之覽遏絶章表不得通由是結仇覽鄉人朱並素佞邪為儉所棄遂上書告儉與同郡二十四人為黨於是刋章討捕儉得亡命望門投止莫不重其名行破家相容㙏流轉東萊止李篤家篤因緣送儉出塞以故得免中平元年黨事解辟徵皆不就獻帝初百姓飢荒儉傾竭財産與邑里共之賴其存者以百數建安初徵為衛尉見曹氏巳萌不豫政事嵗餘卒孔昱魯人霸七世孫少習家學梁冀辟不應遭黨事禁錮靈帝即位徴拜議郎輔洛陽令以師喪棄官卒於家檀敷瑕邱人少為諸生家貧而志清舉孝廉連辟公府皆不就立精舍教授遠方至者常數百人靈帝時舉方正再遷議郎補蒙令以郡守非其人棄官而去蕃嚮魯國人官至郎中名在八廚年八十卒於家戴宏剛人父為膠東縣丞宏年十六從在丞舍膠東侯相吳祐每行園常聞諷誦之音遂與結友卒成儒宗知名東夏官至酒泉太守劉表高平人魯恭王之後初平元年為荆州刺史時江南宗賊大盛表遣人誘宗賊帥斬之江南悉平李傕等入長安表遣使奉貢以表為鎮南將軍荆州牧封成武侯開土遂廣地方數千里帶甲十餘萬威懷兼洽大小悅服學士歸者千數遂立學校博求儒術愛民養士從容自保及曹袁相持於官渡紹求助表許之不至亦不援曹操建安十三年曹操自將征表表疽發背卒二子琦琮琮舉州降操操以為青州刺史封列侯後劉備表琦為荆州刺史孔融魯國人孔子二十世孫幼有異才年十嵗造李膺膺目為偉器十三喪父哀悴過毁州里歸其孝性好學博涉多該覽山陽張儉與融兄褒有舊亡抵於褎不遇時融年十六因留舍之事泄掩捕一門爭死由是顯名厯官虎賁中郎將董卓廢立輒有匡正以忤卓旨轉為議郎尋出為北海相袁曹方盛融無所協附負其高氣志在靖難而才疏意廣迄無成功獻帝時拜大中大夫性寬容少忌薦達賢士多所獎進知而未言以為己過故海內英俊皆信服之曹操既積嫌疑而郗慮復搆成其罪遂令路粹枉狀奏融下獄棄市妻子皆被誅仲長統高平人少好學博涉贍文辭性俶儻敢直言不矜小節默語無常為樂志論又作詩二篇以見志尚書令荀彧聞統名奇之舉為尚書郎後參丞相曹操軍事每論説古今及時俗行事恆發憤歎息著昌言三十四篇卒年四十一三國魏王粲髙平人魏初拜侍中時舊義廢弛興造制席粲恆典之初粲與人共行讀道邊碑背誦不失一字觀人圍棋局壞粲為覆之不誤一道其強記默識如此善屬文舉筆便成無所改定時人嘗以為宿搆然正復精意覃思亦不能加也著詩賦論議垂六十篇建安二十二年卒繆襲蘭陵人有才學多所述敘官至尚書光祿勳正始六年卒晉唐彬鄒人有經國大度敦悅經史尤明易史泰始初賜爵關內侯詔監巴東諸軍事上征吳之䇿甚合帝意後與王濬共伐吳應機制勝多所擒獲吳平以彬為右將軍都督諸軍事改封上庸縣侯鮮卑侵掠北平以彬為使持節監幽州諸軍事於是鮮卑並遣侍子入貢邊境獲安元康四年卒於官諡曰襄馬隆平陸人少而智勇好立名節泰始中兗州舉隆才堪良將稍遷司馬督初涼州刺史楊欣失羌戎之和隆陳其少敗俄而欣為虜所沒河西斷絶帝每有西顧之憂乃以隆為武威太守奇謀間發出敵不意轉戰千里前後誅殺及降附者以萬計涼州遂平太熙初封奉高縣侯加授東羌校尉積十餘年威信震於隴右卒於官王沈髙平人少有俊才出於寒素不能隨俗沈浮為時豪所抑仕郡文學掾鬱鬱不得志乃作釋時論讀之者莫不歎息焉繆播蘭陵人播才思清辨有意義懷帝立以播及從弟允等有公輔之量又盡忠於國故委以心膂東海王越懼為己害以兵入宫執播於帝側遂害之朝野憤惋繆允播從弟與播名譽略齊後為東海王越所害孔衍魯國人孔子二十二世孫衍少好學年十二能通詩書弱冠公府辟本州舉異行直言皆不就元帝引為安東參軍掌記室中興初補中書郎明帝在東宫領太子中庶子練識舊典朝儀軌制多取正焉王敦惡之出衍為廣陵郡時人為之寒心而衍不形於色大興三年卒於官衍博覽過於賀循凡所傳述百餘萬言子啓廬陵太守與宗人夷吾並有美名檀憑之髙平人少有志力閨門雍肅從兄子韶兄弟五人稚弱而孤憑之撫養若己所生義旗建與劉毅俱以私艱墨絰而赴為皇甫敷軍所害義熙初加增散騎常侍追封由阿縣公蒯恩承人膽力過人從伐廣固破盧循追斬徐道覆與王鎮惡襲江陵隨朱齡石伐蜀又從伐司馬休之武帝録前後功封新寧縣男武帝北伐留恩侍衛世子命朝士與之交益自謙損撫士卒甚有綱紀衆咸親附之厯官輔國將軍淮陵太守入關迎桂陽公義真義真為佛佛所追恩斷後力戰死孔淳之魯人少有高尚愛好墳籍為太原王恭所稱居會稽剡縣性好山水每有所遊必窮其幽峻除著作佐郎太尉參軍並不就居喪至孝廬於墓側與徴士戴禺王宏之及王敬宏等為人外之遊元嘉初復徵為散騎侍郎乃逃於上虞縣界弟默之為廣州刺史注榖梁春秋齊李安民氶人少有大志髙帝即位為中領軍封康樂侯國家密事上惟與安民論議謂曰署事有卿名我便不復細覽也纍遷尚書左僕射尋上表求退為吳興太守卒於官年五十八諡曰肅侯子元履有操業嫺政體仕梁為刺史桓康氶人隨武帝起兵摧堅陷陳膂力絶人江南人畏之以其名怖小兒畫其形以辟瘧無不立愈高帝鎮東府除武陵王中兵寧朔將軍帶蘭陵太守建元元年封吳平縣侯大破魏軍於淮陽武帝皍位卒於驍騎將軍周盤龍北蘭陵人膽氣過人尤便弓馬髙帝即位進號右將軍建元元年以盤龍為軍主助桓崇祖拒魏大破之明年魏攻淮陽盤龍與子奉叔單馬率二百餘人陷陳魏軍萬餘騎張左右翼圍之父子兩騎榮攪數萬人魏軍大敗名播北國進爵為侯尋卒唐張公藝夀張人九世同居髙宗有事泰山臨幸其居問本末書忍字以對按夀張本漢故縣在今泰安府東平州至隋以後始有今縣境地故名宦人物俱斷自唐始而前此皆從略焉徐彥伯瑕邱人名洪以字顯七嵗能為文對䇿高第調永夀尉蒲州司兵參軍時司户韋皓善判司事查亘工書而彥伯屬辭時稱河東三絶纍擢修文館學士工部侍郎厯太子賓客開元二年卒彥伯事寡嫂謹撫諸姪同己子秉筆纍朝後來翕然慕倣始武后時王公卿士以語言為酷吏所引死徙不可計彥伯著樞機論以戒世云儲光羲兗州人登開元中進士第又詔中書試文章厯監察御史安祿山反陷賊自歸著正論十五卷集七十卷孔巢父孔子三十七世孫少好學隱徂徠山永王璘辟署幕府不應德宗出狩擢給事中為河中陜華招討使纍上破賊方略未幾兼御史大夫為魏博宣慰使見田悅與言君臣大義利害逆順數日田緒殺悅與大將邢曹俊等聽命巢父即以緒權軍中務紓其難李懷光據河中復令巢父宣慰罷其兵為亂軍所害帝聞震悼贈尚書左僕射諡曰忠李自良泗水人天寶末從戰積閥至殿中監事節席薛訓為牙將及訓徙太原鮑防代總節度事會回紇入寇防遣大將焦伯瑜等擊之自良曰寇遠來難與爭鋒請築二壘扼歸路堅壁勿出師老而惰其勢易乘防不聽伯瑜戰百井大敗由是知名馬燧代防表為軍候貞元三年德宗罷燧以自良代之自良以事燧久不敢當帝謂曰卿於進退豈不有禮然守北門無易卿者勉為朕行乃以檢校工部尚書充河東節席居治九年舉不愆法簡儉易循民不知有軍上下諧附卒於官贈尚書左僕射孔戣巢父從子擢進士第為侍御史纍擢諫議大夫條上四事憲宗異其言又劾李涉結近幸罔上宦寵側目論正李少和崔易簡獄事再遷尚書左丞出為華州刺史厯拜嶺南節席使交廣晏然大治穆宗立還為左丞以老自乞韓愈疏言在朝如戣輩不過三數人宜留之不報以禮部尚書致仕卒諡位進司空加司徒封魯國公後屏居華陰再擢吏部尚書以司空門下侍郎復輔政卒贈太尉五代梁王彥章夀張人少為軍卒事梁纍遷澶州刺史驍勇有力持一鐵槍騎而馳突如飛軍中號王鐵槍晉軍破澶州虜彥章妻子歸之太原間遣使者招彥章彥章斬其使者以自絶龍德三年夏晉取鄆州宰相敬翔入見末帝曰事急矣非彥章不可乃召為招討使帝問破敵之期對曰三日彥章馳兩日至滑州引精兵數千趨德勝急擊南城城遂破蓋三日矣唐兵攻兗州彥章死戰被擒莊宗愛其驍勇欲全活之彥章謝曰臣受梁恩死不能報朝事梁而暮事晉生何面目見天下之人乎莊宗又遣明宗往諭之彥章創卧不能起仰顧明宗呼曰我豈苟活者遂見殺周顏衎曲阜人顏子四十五世孫開運末拜御史中丞執憲有風采顯德初以尚書致仕衎守章句學無文藻然直諒孝悌為時所推宋田告纂禹元經十二篇時稱為東魯逸人太祖聞之召至闕下詢以治水之道善其言將授以官以親老固辭歸養從之孔宜曲阜人孔子四十四世孫乾德中為曲阜主簿厯知星子縣後代還獻文賦數十篇太宗嘉之襲封文宣公張進曲阜人拳勇善射挽強及石咸平中纍遷天雄軍部署會河決鄆州王陵口發數州丁勇寒之命進董其役凡月餘畢詔褎之移并代副都部署李繼遷寇麟州州將遣單介間道乞師太原諸將以無詔猶豫未決進獨抗議發兵赴援既至而圍解手詔褎美景德元年卒張茂直瑕邱人父延升以經術教授鄉里茂直弱冠勵志於學開寶中登進士第纍秩著作佐郎扈蒙薦其才改祕書丞真宗即位選用舊臣以茂直知制誥後出知頴州卒童升兗州人五世同居真宗時旌表仍蠲其課調東野宜曲阜人合居五六世有節行大中祥符初東封泰山即行在所降詔裦美優賜栗帛孔道輔初名延魯孔子四十五代孫幼端重舉進士第厯知仙源縣召為左正言受命日論奏曹利用羅重勳竊弄威柄宜早斥去太后可其言乃退權御史中丞性鯁挺特達遇事彈劾無所避天下皆以直道許之後出知鄆州行至韋城病卒顏復魯人顏子四十八世孫父太初以名儒為國子監直講嘉祐中詔訪遺逸京東以復言試於中書歐陽修奏復第一賜進士元祐初為太常博士請會萃古今典範為五禮書又請考正祀典朝廷多從之拜中書舍人兼國子祭酒卒孔中翰道輔子登進士第知仙源縣厯陜揚洪兗州皆以治聞元祐初召為司農少卿遷鴻臚卿言孔子之後自漢以來有褒成奉聖宗聖之號皆賜實封以奉先祀至於國朝世龍公爵然兼領他官不在故郡於名為不正請白今襲封之人使終身在鄉里詔改衍聖公為奉聖公不領他職以寶文閣待制知徐州卒孔宗旦魯人為雍州司户參軍席儂智高必反以書告知州陳珙珙不聽後智髙破橫州即載其親往桂州口吾有官守不得去無為俱死也既而州破被執賊欲任以事宗旦叱賊且大罵遂被害事聞贈太子中允孔傳孔子五十代孫建炎初知邠州又知陜州平鼎灃寇有功進續白氏六帖文樞要記等書王師道兗州人為人沈勇任吉州栗傳寨巡檢紹興中與盜戰於吳村每射輒斃追擊數里遇賊有伏於民居者挺身力戰遂死立廟其地部使者以聞官其二子畢再遇兗州人開禧二年北伐金兵見其騎呼曰畢將軍來矣功第一纍除驍衛大將軍嘉定十年以武信軍節度使致任卒贈太師諡忠毅再遇姿貌雄傑武藝絶人屬邊事起諸將望風奔衄再遇獨稱名將云金孔端甫孔子四十八代孫明昌初學士黨懷英薦其年德俱高讀書樂道該通古學特召至京師賜王澤榜及第除將仕郎小學教授以主簿奉祀致仕元張昉汶上人性縝密遇事敢言確然有守嚴實行臺東平辟為掾鄉人有執左道惑衆謀不軌者事覺逮捕詿誤甚衆諸僚佐莫敢言昉獨别白出數百人實才之進幕職有將校死事以弟襲其職者至是革去昉辨明復之持金夜饋昉昉卻之慚謝而去同里張氏以絲五萬兩寄昉家而他適俄而昉家被火家人惶駭走避資用悉焚昉力完所寄絲付張氏厯拜兵部尚書致仕卒諡莊憲中屠致遠其先汴人徙居夀張致遠與李謙孟祺等齊名世祖南征以薦為經略司知事多所謨畫後拜江南行臺監察御史江淮行省宣使郤顯李兼訴平章莽古特不法詔付莽古特鞫之必抵以死致遠知其冤縱之桑格當國治書侍御史陳天祥使至湖廣劾平章嶽蘇穆桑格誣以不道致遠按部湖廣纍章極論之江西行省美合等橫征牟利致遠并劾之又言占城日本不可涉海遠征銓選限以南北優苦不均宜考其殿最量地遠近立為定制大德二年以淮西江北道廉訪司行部至和州卒致遠清修苦節恥事權貴聚書萬卷名曰墨莊著書甚富莽古特舊作忙兀台桑格舊作桑哥嶽蘇穆舊作要束木美合舊作馬合今俱改正楊桓兗州人幼警悟讀論語至宰子畫寢章慨然有立志由是終身非疾病未嘗畫寢弱冠為郡諸生一時名公咸稱譽之成宗即位疏上時務二十一事帝嘉納之升祕書少監預修大一統志秋滿歸兗州以資業悉讓弟楷鄉里稱焉桓為人寬厚事親篤孝博覽羣籍尤精篆籒之學者六書統六書泝源書學正韻皆行於世孔思晦孔子五十四世孫資質端重而性簡默受業於導江張䇓家貧躬耕以為養雖劇寒暑而為學未嘗懈居母喪勺水不入口者五日至大中舉茂才為范陽學教諭延祐初調寧陽學先是兩縣校官率以廩薄不能守職而思晦儉約自將教養有法比去學者皆不忍舍之後襲衍聖公元統元年卒曹元用世居阿城後徙汶上資稟俊爽幼嗜書一經目輒成誦以鎮江路儒學正考滿遊京師翰林承旨閻復見而奇之薦為國史院編修官御史臺辟為掾史元用初不習吏事而見事明決吏反師之纍遷翰林直學士至治三年八月特史之變賊黨徹辰特穆爾遽至京師趣召兩院學士北上元用獨不行曰吾有死不能從也未幾賊果敗人皆稱其有先見之明厯拜翰林侍講學士兼經筵官卒追封東平郡公諡文獻特史舊作鐵失徹辰特穆爾舊作赤斤鐵本兒今俱改正王思誠嵫陽人天資過人中至治元年進士第至正元年遷國子司業二年拜監察御史纍上疏言時政朝廷多是其議鞫獄松州豐潤多所平反出籖河南山西道肅政廉訪司事陜西行臺言欲疏鑿黃河三門立水陸站以達於關陜思誠度其不可作詩厯敘其險執政采之遂寢其議厯拜通議大夫國子祭酒卒諡獻肅李泂滕州人生有異質姚燧薦於朝授國史院編修官厯遷奎章閣承制學士告歸泂骨格清峻神情開朗秀眉疏髯目瑩如電顏如冰玉唇如渥丹望之者疑為神仙中人為文章奮筆揮灑思熊疊出意之所至臻極神妙每以李太白自擬人亦以是許之尤善書篆隸真草皆為世所珍愛卒年五十九有文集四十卷李稷滕州人泰定四年中進士第纍官户部尚書山果廉訪司卒諡文穆稷為人孝友恭儉廉慎忠勤處家嚴而有則與人交一以誠恪尤篤於鄉黨朋友之誼中丞任擇善陳思謙既沒皆撫其遺孤出入臺省二十年始卒無疵為時名卿顏瑜曲阜人顏子五十七代孫以行誼舉為鄒及陽曲兩縣教諭至正十八年田豐起山東瑜攜家走鄆城道遇賊執使寫旗瑜大詬曰我腕可斷豈能為爾寫旗從逆乎賊以槍刺瑜至死罵不絶口妻子皆為所害田改住汶上人父病不能愈禱於天去衣卧冰上一月又同縣王住户母病卧冰上半月明賈諒嶧縣人永樂中以鄉舉入太學擢刑科給事中宣德間劾清軍侍郎金庠受賄又劾陽武侯薛祿朋比不敬廷中肅然尋拜右副都御史巡視四川江西湖廣按治豪強不少假正統二年江北河南大水命諒往賑芒碭山盜為患諒捕獲甚衆四年還至德州卒白英汶上人永樂九年尚書宋禮開會通河英獻䇿築壩戴村遏汶水全流使盡出於南旺四分南流達於淮泗六分北流達於漳衛禮用其䇿由是會通復始魏紳曲阜人事母孝母沒廬墓三年成化中舉進士厯南京大理丞讞獄詳明纍擢都御史巡撫山西築偏頭關迤西邊牆四十里增墩堡四十餘又拓寧武關城建營舍二千楹募土兵實之改蘇松巡撫嵗大飢議止織造省力役督有司賑濟武宗立進刑部右侍郎卒殷雲霄夀張人宏治進士官給事中武宗納有娠女子馬姬於宫中雲霄偕同官切諫不報雲霄為人峭直堂邑穆孔暉雅重之王杲汶上人正德進士知臨汾縣以治最擢御史巡視陜西茶馬帝遣中官分守蘭靖杲極言其纍民不報嘉靖間遷户部侍郎賑飢河南全活無算尋以右都御史總督漕運故事運艘軍三民七杲請改折兩年漕運十之三以所省轉輸費治運艘軍民便之入為户部尚書上制財用七事帝咸納之後以譖謫雷州卒隆慶初進贈太子太保吳嶽其先東阿人後徙居汶上嘉靖進士厯户部郎中督餉宣府卻羡金數千纍擢保定巡撫疾嚴嵩害政引疾歸嵩敗起貴州巡撫遷南京吏部尚書致仕嶽方正耿介廉靜自持不尚苛細卒諡介肅賈三近嶧人隆慶進士選庶吉士萬厯初為户科都給事中時海運多覆舟三近言漕渠巳通奈何舍易就險乃罷之時又令州縣徵賦以八分為率不及者議罰三近言素號凋敝者宜量減一分從之中官溫泰請天下關稅鹽課俱輸內庫三近爭之議遂寢張居正當國言官論事俱先白三近曰吾不能以天子耳目為相門白事吏厯巡撫保定以親病乞歸召為兵部侍郎未行而卒孟承光鄒人孟子裔孫襲職五經博士天啓二年妖賊徐鴻儒陷鄒城承光被執罵賊不屈見殺贈尚寶少卿范淑泰滋陽人崇禎進士授行人遷給事中上陳時政五事又言搜括借助之非又強兵之法皆切中時弊疏救給事中莊鼇獻章正宸劾大學士王應熊吏部侍郎張捷言皆切直典試浙江還家值兗州被圍竭力固守城破死之贈太僕少卿王大年夀張人萬厯進士纍官太僕少卿出按甘肅任滿還家崇禎十五年城陷不屈死劉宏緒滕人崇禎進士官兵部郎中以忤權要罷歸城陷不屈死顏引紹曲阜人顏子六十五代孫崇禎進士知鳳陽縣調江都以廉幹聞遷大名同知升河間知府城陷闔門舉火自焚孔貞璞曲阜人孔子六十三世孫崇禎中知伊陽縣流寇攻其城堅不下乃解去後有事汝陽道遇賊被殺黃世清初名祖年滕人崇禎進士授户部主事厯商洛參議癸未流賊圍城世清率衆堅守城陷被執不屈死贈太常卿本朝寧之鳳寧陽人順治丙戌進士由部郎遷知河南府以廉正稱有流寇遺黨鼓惑兵民剋期襲城之鳳知之集丁壯二百許人伏城濠乙夜賊果至之鳳躍馬突出伏兵皆起賊驚遁追殱真魁朱克配寧陽人勇而有義知名齊魯間順治初土寇蜂起克配練鄉壯捍禦每遇敵必身先之鄒魯汶泰間恃為保障從大軍平江南徐邳諸州傳檄而定攝邳州六安霍山等篆草竊輩皆輸伏蕩平之後即投劾歸郭震櫆汶上人以廩貢任陵縣訓導旋攝縣篆當土寇蜂起與紳士登城守禦寇不敢犯居家事母至孝母病目震櫆虔禱雙瞽復明路允釐汶上人天性純孝好善樂施時汶境土寇猖獗皆相戒勿犯路善人家允釐性朴素耽書史晚年尤精醫理拯恤疾苦遠近頌之周仔世寧陽人父爰訪翰林院編修殁於京邸宦槖蕭然仔世年十四與兄治世徒跣扶櫬還鄉以儉勤自力事母至孝值嵗飢有鬻妻以奉母者仔世傾資完聚之趙增汶上人順治戊戌進士授山西安邑知縣再補福建閩縣時閩寇初平增力求綏輯拊循備至旋擢兵部督捕主事以安靜為本株連之纍一蘇何廣汶上人天性至孝年九齡值嵗祲躬負米以奉親父殁事母及兄益謹順治己亥成進士授江西豐城令剔弊鋤姦士民懾服母殁遂終身不仕顏光猷曲阜人康熙癸丑進士以翰林改刑部郎中出為安順守安順猺獞雜處不可齊以法光猷曲意拊循郡大治轉河東鹽運使時山西河南行引鹽引尾各州縣俱設關防境壤相錯跬步罹法光猷疏請通省設一關防民以永利著有易經説義水明樓詩集乾隆十年祀鄉賢祠弟光敏考功郎中以詩名光斆翰林督學浙江屏絶干請文風為之一振時稱為曲阜三顏孔興範曲阜人康熙十九年知山西孟縣在官六年寬猛並濟盂人懷之孫象燦嶧人生而孝友能曲體親心父殁哀號盡禮幾不欲生弟象炳亦孝行著聞楊兆立滋陽人莘縣把總乾隆三十九年奉檄赴陽榖禦賊至南門戰死殷逢春滋陽人由行伍洊擢陜西略陽營遊擊嘉慶三年隨剿教匪受傷死贈雲騎尉王徵藴滕縣人孝行著聞嘉慶十五年旌流寓漢李善濟陽人本同縣李元蒼頭建武中疫疾元家相繼殁惟孤兒續始生數旬而資財而千萬諸奴婢欲謀殺續分其財産善深傷李氏不能制乃潛負續逃去隱山陽瑕邱界中親自哺養乳為生湩續雖孩抱奉之不異長君續年十嵗善與歸本縣修理舊業告奴婢於長吏悉殺之時鍾離意為瑕邱令上書薦善行狀光武詔拜善及續並為太子舍人善官至九江太守續至河間相列女漢王良妻蘭陵人良為大司徒司直妻子不入官舍時司徒史鮑恢以事到東海過候其家而良妻布裙曳柴從田中歸恢告曰我司徒史也故來受書欲見夫人妻曰妾是也苦掾無書恢乃下拜歎息而還聞者莫不嘉之張雨夀張女子早喪父母年五十不肯嫁撫恤二弟教之學問各得通經皆成善士雨為聘娶縣令謝夷吾薦於州府使各選舉表復雨門户晉鄭袤妻曹氏薛人袤先娶孫氏早亡聘為繼室事舅姑甚孝及袤為司空其子默等又顯朝列曹氏深懼盛滿每默等升進輒憂形於色初孫氏瘞於黎陽及袤卒議者以久喪難舉欲不合葬曹氏曰孫氏原配理當從葬不可使孤魂無所依於是備吉凶導從之儀迎之聞者莫不歎息唐鄭孝女瑕邱人父神佐為官兵戰死慶州時母巳亡又無兄弟女時二十四即翦髮毁服身護喪還鄉里與母合葬廬墓下手樹松柏成林初許適牙兵李元慶至是謝不嫁大中中兗州節席使蕭俶狀於朝有詔旌表其閭宋董氏女滕人許適劉氏子建炎元年盜李昱攻剽滕縣悅其色欲亂之誘諭再三曰汝不從當銼汝萬段女終不屈遂斷其首劉氏子聞女死狀大慟曰烈女也葬之為立祠元李如忠繼妻馮氏汶上人初如忠娶蒙古氏生子任妻亡乃續馮生子伏一嵗而如忠卒時如忠任浙之山陰尹族人盡取其遣資及子任以去馮不與較鬻衣厝二柩於蕺山下攜伏廬墓側時年二十二為女師自給教伏成學卒護喪歸葬汶上明周氏汶上人洪武中御史劉福姑也福奉詔籍藍氏遣一嬰兒於地窖中遂論死周持刀被髮訟福忠清奉法必無枉縱請自死以嗚福冤福遂得減死戍鳳陽衛孔氏女曲阜人孔子五十八代孫公晉女年十七未醮正德六年為流賊所執義不受辱賊支解之同時有孔公田妻顧氏孔彥臣妻王氏孔宏憲妻賈氏孔公雷妻張氏孔公揚妻尋氏孔彥霄妻胡氏孔德澤妻陳氏孔彥琳妻宋氏陳思道妻孔氏劉拱辰妻傅氏並守節遇害詔旌其門王襲芳妻張氏汶上人年十七嫁襲芳無子夫得狂疾家人多避去氏日夜不離於側久之夫憊甚食難齒決乃嚼而哺之積十餘年終不懈及夫亡遂絶食而死劉仲妻林氏滕人有美色仲死少年謀娶之氏恐不能免適煮豆湯沸歎曰為孽者此面也以首埋釡中而死高誠妻張氏滕人誠父朝用山西賈人也客於滕張生二嵗父以字誠後朝用貧不能納聘自請罷婚張執不從父乃贅誠於家甫一載誠還鄉里不來久之傳言誠死誠兄論素無賴欲嫁之張翦髮以誓富人鄧謹欲娶之曰無髮亦可張復截其耳謹懼乃止論又隂許賈人謝鳳娶之夕張始知之乃沐浴更衣懷其夫遺鏡謂所親曰所以斷髮截耳不死者以誠存亡未可知也今巳矣遂縊而死李勝任妻褚氏嶧人勝任為縣諸生既殁氏事舅姑孝教諸子嚴宗親皆敬之崇禎壬午兵至其子在門勸母逃避氏曰姑喪在殯義不可去與其僥幸以求生不若守正而無憾城破伏姑柩前以死在門亦從死李氏女嶧人生員李在門女年十三崇禎壬午城陷為兵所掠不屈遂見殺閻翼經妻楊氏汶上人崇禎壬午之難以不屈被殺同邑生員髙熊妻祝氏高良棟妻王氏寓居夀張壬午城破皆投井死孫正心妻朱氏滋陽人正心死崇禎壬午之難氏盡歸奩具於姑所佯請歸母家行至途中入尼庵自縊佛座下同邑郭璉繼室萬氏于歸後璉病卒氏縊死柩旁劉之芹妾楊氏寧陽人崇禎壬午城破氏與從姑古氏各抱幼子奔逃中途乏窘古氏偕子投井氏以子囑婢曰劉氏絶續在此一子爾速遠避吾當佑汝言訖亦投井死秦生鋌妻張氏鄒人崇禎壬午之難氏與生鋌弟生鑰妻賈氏同時抗節死本朝劉光傳妻孫氏鄒人夫亡撫一子至十嵗白於姑曰吾向之不死者以此子未長成耳今巳十嵗願遂初志閉户自縊死薄子溫聘妻杜氏鄒人許字子溫婚有日矣氏忽得病數年弗起父見其難療乃為壻另娶王氏未幾子溫與王相繼病殁氏病反愈乃易衰往弔守節四十餘年馮秉謙聘妻李氏鄒人許字秉謙未婚而秉謙卒女聞訃自縊死張璵妻劉氏滕人夫亡自縊死同縣王四妻任氏李如崑妻周氏种士禎妻褚氏生員侯士亨妻王氏喬偉之妻沈氏馮昌儒妻李氏張藹妻李氏貢生李文祥妻張氏李德溥妻黃氏彭勃妻胡氏殷夀眉妻鄭氏劉君弼妻孫氏馬應麟妻楊氏俱夫亡盡