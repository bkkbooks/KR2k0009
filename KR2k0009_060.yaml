宋時黃河北流之故道也至金明昌五年河決陽武由南北清河分流入海遂不由府境古屯氏河在府境故道自館陶縣東北流徑臨清州界又東北流徑清平縣之北夏津縣之南又東北徑高唐州及恩縣界漢書地理志魏郡館陶河水别出為屯氏河東北至章武入海過郡西行千五百里又溝洫志屯氏河東北徑魏郡清河信都渤海入海廣深與大河等元帝永光五年河決靈鳴犢口而屯氏河絶成帝初清河都尉馮逡請間屯氏河使分流殺水力水經屯氏河徑館陶縣東又東北别河出焉又東徑甘陵之信鄉縣故城南又東徑甘陵縣故城北徑靈縣北又東北徑鄃縣與鳴犢河故瀆合又東徑清河郡北又東北徑陵鄉南又東北徑東武城縣故城南又東北徑東陽縣故城南元和志屯氏河俗名毛河在館陶縣西二里夏津縣北府志今冠縣館陶邱縣茌平高唐俱有屯氏河故道又有熙河在茌平縣北七十里北流至高唐州入濟南府禹城縣界其源無考蓋即屯氏河也按元和志謂永濟渠南自汲郡引清淇二水東北入臨清此渠蓋漢屯氏故瀆也後人緣此為説清淇屯氏遂混而為一而以水經注考之屯氏河自大河決出徑館陶清淵之東而東出清河縣之南清淇水經館陶清淵之西而出清河之北今考衛河所行自臨清以上則皆古清淇也自臨清以下行清河縣南則古屯氏也與元和志之言頗合然今衛河自武城以下又皆清淇所行非屯氏所能至矣古漯河黃河支流也俗名大士河亦曰徒駭故道自曹州府朝城縣流人徑莘縣東又東北徑堂邑縣東南又東徑府城北又東北徑博平縣南又北徑清平縣西又東徑高唐州西又東北至濟南府禹城縣界水經注漯水自高唐城北徑東武陽縣故城南又東北徑陽平縣之岡城西又北徑莘道城之西北又東北徑樂平縣故城東又北徑聊城縣故城西又東北徑清河縣故城北又東北徑文鄉城東南又東北徑博平縣右與黃溝同窪川澤又東北徑援縣故城西又徑髙唐縣故城北胡渭禹貢錐指漯首受河自黎陽宿胥口始不起東武陽也水經窪所敘河水自宿胥口至委粟津皆古漯水也自周定王五年河徙從宿胥口東行漯川至長壽津始與漯别其津以西漯水之故道悉為河所占而上遊較短矣然河之故瀆不經東武陽亦不徑高唐逮漢成帝建始末河決館陶由東武陽絶漯水而東北至高唐又絶漯水東北至千乘入海雖嘗塞治而故道猶存王莽始建國三年復決於此莽為元城冡墓計不隄塞明帝永平中王景修之遂為大河之經流自是委粟津以西漯水之故道又為河所占上遊益短矣漯水一出於武陽再出於高唐據成帝後之言耳水經注所言漯水乃自西漢末以迄後魏漯川之原委也馬頰河自曹州府朝城縣流入東北流徑莘縣西五十里又北徑堂邑縣西十二里又北徑清平縣西十二里又北徑夏津縣東三十里又東北徑高唐州西北二十里又東北徑恩縣南二十里津期店亦名津期河又徑縣東十二里東北入濟南府平原縣界按禹貢九河之馬頰故道久湮與今郡境無涉唐時有馬頰河出澶州清豐縣界東北流至平昌合篤馬河即此河也宋至和二年李仲昌議開六塔河引歸橫隴故道歐陽修言六塔止是别河下流己為濱棣德博之患是宋之六塔實行唐之馬頰惟李仲昌所開引商胡決流使之東南入橫隴故道為異耳至嘉祐五年河流派别於魏之第六掃曰二股河自魏恩東至德滄入海當時馬頰故道又為二股河所行今此河或斷或續故道雖存但因運河身高水難􅚈入遂至棄為平地募種升科無藉疏濬之力矣湄河在博平縣境今湮府志以為即古漯河非是又有小湄河在縣南十五里明景泰間鑿循城東而北入鳴犢河今亦湮七里河在博平縣西南自府城東南七里受漕河減水閘之水北流入縣界又北徑縣西北鄧家橋入鳴犢河成化間漕河減水泛漲奏請開鑿以泄之鳴犢河在博平縣北又東北徑高唐州南漢書地理志清河郡靈河水别出為鳴犢河東北至蓚入屯氏河溝洫志元帝永光五年河決清河靈鳴犢口水經鳴犢河故瀆上承大河故瀆於靈縣南東北徑靈縣東東入鄃縣而北合屯氏瀆鄧里渠在茌平縣東自陽榖縣流入古瓠子河瀆也水經注鄧里渠自臨邑縣北徑茌平縣東臨邑縣故城西北流入河泄水渠在恩縣西北長二十里明萬厯二十年河水漲溢知縣孫居相開渠泄水歸河黃溝在聊城縣東古漯水支渠水經注黃溝承聊城郭水水泛則津注水耗則輟流自城東北出徑清河城南又東北徑攝城北唐公溝在髙唐州東門外明成化中知州唐稹因東比地下濬溝注董固河水患遂息龍湫在清平縣西南二十五里東南去博平縣四十里縣志秋當漕河之東漯水之上流汪洋百頃波濤洶湧即宋時河決清平故城處也明嘉靖間風雨雷電移於下流五十餘里夏津縣之馬頰橋今又移恩縣界不絶如帶而巳龍灣在恩縣東十二里冬夏不涸龍潭在茌平縣南十五里方百畞又縣北六十里亦有龍潭黑龍潭在恩縣南二十里津期橋東其深不測橋西亦有白龍潭大溪陂在荏平縣東南三十五里環二十餘里文泉在博平縣城內學舍東南古井也明正德中泉自湧而甘冽又有甘泉在縣治西南亦古井相傳嘗飲萬馬不竭靈泉在博平縣西三十里莎隄北明永樂中疏會通河泉堙雙井在聊城縣東關泉清味甘又南關外有濟衆寒泉東關寺內有隆興寒泉水皆甘冽玉環井在聊城縣西南一名玉井井中甃石如玉樓兒井在高唐州城內西南隈水清甘夏月久貯不變古迹武水故城在聊城縣西南五十里漢陽平縣地屬東郡隋開皇中析置武水縣唐初屬莘州貞觀初改屬博州元和志縣東北至州六十里在武水溝之南故名寰宇記周廣順二年為河決衝壞顯德二年割屬聊城宋大觀三年置武水巡司於此舊志故城內有石柱後魏孝文帝所立為鄴東之表水經云武水東流從古石柱北是也聊城故城在聊城縣西北十五里本齊聊攝地左傳晏子曰聊攝以東戰國䇿燕將守聊城漢置聊城縣屬東郡後漢因之晉改屬平原國後魏為郡治魏書地形志平原郡太和十一年分屬濟州治聊城縣後罷并郡有王城郡又有西聊縣孝昌中分聊城置治聊城水經注黃溝水徑王城北魏泰常七年安平王鎮平原所築世謂之王城太和二十三年罷鎮立平原郡治此隋開皇初郡廢兼廢西聊以聊城屬武陽郡唐武德四年置博州治聊城蕭德言括地志聊城故城在今縣西四十里按水經注後魏太和二十三年立平原郡與魏志不合存以俟考清縣故城在堂邑縣東南春秋時齊邑左傳成公十七年齊侯使國勝告難于晉待命于清杜預注今樂平也漢置清縣屬東郡後漢為樂平侯國仍屬東郡晉改屬陽平郡後魏因之北齊省元和志樂平故城在堂邑縣東三十里發千故城在堂邑縣西南漢置縣屬東郡元狩五年封衛青子登為侯邑後漢建安十七年割屬魏郡晉屬陽平郡南燕時僑置幽州於此後魏仍屬陽平郡北齊省括地志發干故城在堂邑縣西南二十三里博平故城在今博平縣西北三十里本齊之博陵邑史記齊威王十六年晉伐我至博陵注徐廣曰東郡之博平是也亦謂之博關張儀曰趙兵至清河指博關漢置縣宋徙今治金史地理志博平縣有博平鎮即古治也茌平故城在今茌平縣西漢置縣漢書地理志東郡茌平注應劭曰茌山名縣在山之平陸故曰茌平昔石勒之隸師灌屯耕於茌平聞鼓角鞞鐸之聲於是縣也魏書地形志茌平縣治鼓城有茌平城蓋巳移治也元和志茌平故城在聊城縣東五十三里于欽年改清河國亦曰甘陵水經注屯氏故瀆東徑甘泉縣故城北晉改國縣俱曰清河後齊移郡治於信城改此為貝邱縣隋開皇六年改曰清陽仍屬清河郡唐屬貝州舊唐書地理志清陽縣舊治甘陵城永昌中始移縣治於今直隸清河縣界貝邱故城在清平縣西南漢置縣屬清河郡應劭曰即左傳齊侯田于貝邱是也後漢屬清河國晉因之後魏屬清河郡北齊省入清河縣元和志貝邱城在臨清縣東南五十里城內有邱高六丈周回六十八步城因此名寰宇記後魏初移於故城東北十里今縣東有貝邱城即後魏治所陽平故城今莘縣治漢置陽平縣後漢為侯國隋大業初改曰莘縣元和志魏州莘縣西至州一百里寰宇記莘縣在魏府東七十五里有武陽城在縣南後周置郡於此莘亭故城在莘縣北春秋時衛地左傳桓公十六年宣薑與公子朔搆急子公使諸齊使盜待諸莘注陽平城西北有莘亭屬陽平縣隋於此置莘縣大業初廢唐武德四年復置屬博州五年併入莘縣元和志莘亭在莘縣北十三里冠氏故城在冠縣北春秋時晉冠氏地左傳哀公十五年子贛曰齊為衛故伐晉冠氏注冠氏即陽平館陶縣水經注喬亭城去館陶十五里春秋冠氏也隋因置冠氏縣元和志縣西去州六十里今移於今治館陶故城在館陶縣西南漢置更始二年蕭王追擊銅馬於館陶晉永和七年冉閔追後趙將劉顯於陽平時陽平郡治館陶也元和志縣西至魏州五十里有陶邱在縣西北趙時置館於側因為縣名金移於今治金史地理志館陶縣有館陶鎮即古縣也厯亭故城在恩縣西四十里隋開皇十六年分武城縣置唐武德六年移貝州治此八年仍還舊治而縣屬之元和志縣西南至貝州一百里本漢東陽縣地後漢省東陽其地屬鄃縣隋改置厯亭縣遙取漢厯縣為名寰宇記隋置縣於今縣之東永濟渠南後以其地下濕鹹鹵移龍盤河在古厯城西七十里即今縣也金初移恩州治此明洪武二年降為縣七年移縣治東四十里許官鎮即今治也今故城俗呼為舊縣城址猶存東陽故城在恩縣西北春秋時晉地左傳昭公二十二年晉荀吳略東陽戰國時為衛地後屬趙戰國䇿國子曰兼魏之河南絶趙之東陽漢為東陽侯國後漢省水經注應劭曰東武城東北三十里有東陽鄉故縣也隋開皇六年復置東陽縣屬貝州十八年改為漳南縣大業十一年竇建德起兵漳南元和志東陽故城在厯亭縣西十八里又貝州漳南縣西南至州一百一十里本漢東陽縣地寰宇記隋分棗強於今縣東北二十二里置東陽縣後改名唐武德七年移於今理宋至和元年省為鎮入厯亭金史地理志厯亭有漳南鎮故縣也舊志鎮在今縣西北六十里衛河南岸靈縣故城在高唐州西南與博平縣接界即齊靈邱邑漢置靈縣屬清河郡後魏置南清河郡治此齊廢隋開皇六年復置大業初省入博平唐武德初復置尋省入博平寰宇記故靈城在高唐縣西二十里齊天保七年省今博平縣為河所壞曽寄理於此金史地理志博州高唐有靈城鎮即故縣也堂邑舊城在今堂邑縣西十里漢為發干縣地隋開皇六年置堂邑縣大業末宇文化及掌屯兵於此築臺於城南唐屬博州天寶十五載平原太守顔真卿遣兵擊賊邀袁如泰於堂邑西南元和志堂邑縣東至州六十里本漢清發干二縣地宋熙寧中圯於水因東徙今治焉清平舊城在今清平縣西四十里隋開皇六年置貝邱縣十六年改曰清平屬清河郡唐屬博州元和志縣東南至州八十里隋自臨清縣界移貝邱縣於此後改名也宋初改屬大名府寰宇記縣在府東北一百四十里宋史地理志熙寧二年割博平之明靈寨來屬移縣治之齊乘舊治在縣西四十里清平鎮元豐間漯河決壞城徙治明靈寨即今治也索盧廢縣在恩縣北魏書地形志長樂郡領索盧縣晉屬廣川神瑞二年併廣川太和二十二年復置有索盧城隋書地理志清和郡漳南有後魏索盧城隋并入棗強開皇十六年來屬高唐廢縣今高唐州治春秋時齊有高唐邑漢置高唐縣在今濟南府禹城縣界後魏景明三年始改置縣於此元和志縣西南至州一百一十里夷儀