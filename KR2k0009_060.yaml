徒侣通於滄海瓊所部人連接村居無相染纍鄰邑於此服其德瓊性清慎不發私書郡人趙潁得新瓜一雙來奉苦請遂便為留乃置於廳事梁上竟不剖人遂競貢新果至門問知潁瓜猶在相顧而去有百姓乙普明兄弟爭田積年不斷瓊召對衆人諭之莫不灑泣遂還同住每春總集大儒衛覬隆等講於郡學胥吏文案之暇悉令受書當時州郡無不遣人至境訪其政術在郡六年人庶懷之宋世良廣平人除清河太守在郡未幾聲聞甚高郡東南有曲隄成公一姓阻而居之羣盜多萃於此世良施八條之制盜奔他境天保初大赦郡無一囚率羣吏拜詔而巳及代至傾城祖道有老人丁金剛泣而前謝曰巳年九十記三十五政君非唯善治清亦徹底今失賢者民何濟矣莫不攀轅涕泣崔伯謙博陵安平人天保初除濟北太守恩信大行縣公田多沃壞伯謙咸易之以給人又改鞭用熟皮為之不忍見血示恥而巳有朝貴行過郡境問人太守政何似對曰府君恩化古者所無因誦民歌曰崔府君能臨政退田易鞭布威德人無爭客曰既稱恩化何因復威對曰長吏憚威民庶蒙惠故兼言之徴赴鄴百姓號泣遮道數日不得前隋房恭懿洛陽人仕齊厯平恩令有能名韋夀京兆杜陵人髙祖時遷毛州刺史有治名樂運清陽人開皇五年轉毛州高唐令有聲績劉仁恩開皇時為毛州刺史治績為天下第一擢拜刑部尚書魏德深宏農人煬帝時為貴鄉長轉館陶長將赴任傾城送之號泣之聲道路不絶既至館陶闔境老幼皆如見其父母有猾人員外郎趙君實與郡丞元寶藏深相交結前後令長受其指麾自德深至君實屏處於室逃竄之徒歸來如市貴鄉父老詣闕請留德深許之館陶父老復詣郡相訟以貴鄉文書為詐郡不能決會持節使者韋霽杜整等至乃斷從貴鄉貴鄉吏人歌呼滿道館陶衆庶合境悲哭因而居住者數百家唐裴耀卿絳州稷山人睿宗時為濟州刺史濟當走集地廣而户寡會天子東巡耀卿置三梁十驛科斂均省為東州知頓最封禪還次宋州宴摐官帝謂張説曰濟州刺史裴耀卿上書數百言至曰人或重擾即不足以告成朕置書座右以自戒此其愛人也俄徙宣州前此大水河防壞諸州不敢擅興役耀卿曰非至公也乃躬護作役未訖有詔徙官耀卿懼功不成弗即宣而撫巡飭厲愈急隄成發詔而去濟人為立碑頌德李棲筠趙人舉進士第調冠氏主簿太守李峴視若布衣交五代晉羊使君名無考開運二年守博州河溢城將沒使君投水死水遽止民立祠祀之宋馬知節薊人雍熙間護兵博州完城繕甲儲積芻粟吏民以為生事既而遼兵果至以有備引去劉筠大名人真宗時為館陶縣尉臨事明達治尚簡嚴郭申錫魏人知博州州兵出戍有欲脅衆為亂者申錫戮一人黥二人乃定奏至仁宗曰小官臨事如此豈易得即為御史臺推直官鄭瑾徐州彭城人仁宗時遷冠氏令河決府西檄夜下調夫急瑾方閲保甲盡籍即行先他邑至決遂塞時河朔飢盜起獨冠氏無之且不入境地邑獲盜詰治之盜因言鄭冠氏仁故相戒不犯耳蔡挺宋城人仁宗時河北多盜精擇諸郡守以挺知博州申飭屬縣嚴保伍得居停姦盜者數人弛其宿負補為吏使之察警盜每發輒得均博平聊城二縣稅嵗衍巨萬三司下其法於四方耿幾父神宗時知堂邑縣持正不阿時縣治近馬頰河數有水患為徙置縣東十里按耿幾父不見史傳相傳神宗時縣有河患有耿令者始遷今治考黃庭堅集有過新堂邑寄贈耿幾父詩極稱其事然名不可得而詳矣王詔鎮定人知博州魏俗尚椎剽姦盜相囊槖詔請開反告殺并贖罪法以攜其黨元祐初朝廷起回河議未決而開河之役遽興詔言河朔秋潦水淫為災發廪賑飢思稍蘇其生未可以力役傷也從之宗澤義烏人元祐中為館陶尉縣令檄令同視河掃澤適喪長子奉檄遽行適朝廷大開御河時方隆冬役夫僵仆於道中使督之急澤曰濬河細事乃上書其帥曰時才凝寒徒勞民而功未易集需至春初可不擾而辨上聞從之陳遘永州人知莘縣為治有績魏尹蔣之竒馮京許將交薦之劉長孺耀州人建炎初為博州簽書判官劉豫僭號長孺與豫書勸令轉禍為福豫怒囚之不屈死金璞薩忠義上京巴爾古河人皇統四年除博州防禦使在郡不事田獵燕遊以職業為務郡中翕然稱治忽一夕陰晦囚徒謀為反獄倉卒間將校皆惶駭失措忠義但使守更史撾鼓嗚角囚徒以為天且曉不敢出自就桎梏及考郡民詣闕願留詔從之璞薩舊作朴散巴爾古舊作拔盧古今俱改正王庭筠辰州熊嶽人登大定進士第調恩州軍事判官臨政有聲郡民鄒四謀為不軌事覺連捕千餘人而鄒四竄匿不可得朝廷遣火理寺直王仲柯治其獄庭筠以計獲鄒四分别詿誤坐豫謀者十二人而已再調館陶主簿元張好古冀州南宫人中統元年兼恩州刺史訪民瘼革吏弊立為條約徐世隆陳州西華人至元九年為東昌路總管至郡專務以德率下不事鞭箠吏不忍欺民亦化服期年而政成郡人頌之耶律伯堅桓州人至元中為恩州同知有循良之政民親戴之張照濟南人至元二十一年為東昌路總管蒞政二年吏民畏服以治最稱張養浩濟南人成宗時授堂邑縣尹人言官舍不利居無免者竟居之首毁淫祠三百餘所罷舊盜之朔望參者曰彼皆良民飢寒所迫不得已而為盜耳既加之以刑猶以盜目之是絶其自新之路也衆皆感泣相戒曰毋負張公有李虎者嘗殺人其黨暴戾為害舊尹莫敢詰問養浩至盡置諸法民甚快之王結易州定興人仁宗時為東昌路總管境有黃河故道而會通隄遏其下流夏月潦水壞民麥禾結疏為斗門以泄之民獲耕治之利劉天孚大名人為東平總管府判官厯知冠州所至有治績明宋守忠延津人嘉靖間知東昌府濮州瀕河腴田豪家藉口水患移賦貧民守忠躬行勘視遂絶其弊觀城富人恃嚴嵩私交侵漁小民守忠按治其罪坐調溫州戴浩鄞縣人宣德中為東昌府通判有清操力行惠政民為謡曰戴别駕公實惠吾儂廉慎忘躬克致年豐王德永嘉人嘉靖間為東昌府推官年僅弱冠而聽斷明決人皆折服後死於倭難贈太僕少卿諡忠愍沈錬會稽人嘉靖中由溧陽知縣調茌平縣多豪橫錬甫至悉捕其人置之法值嵗祲力請賑貸飢民朔望召諸生講學行禮見民家子弟讀書者即訓誨之於是爭尚學業後以憂去范景文吳橋人萬厯中除東昌府推官以名節自勵苞苴無敢及其門嵗飢盡心振救闔郡賴之以治行高等擢為吏部郎本朝彭可謙奉天人順治五年知堂邑縣時土賊寇犯甚亟可謙訓練民兵廣設方略獲其渠魁奪還被虜男女七百餘人事平敘功而部故以催徵不力難之可謙曰遲我十年升轉待民力全復何如部知其不可動為疏請得免新舊稅糧擢為本府屯田同知劉德芳正紅旗漢軍知東昌府府西南地窪秋水泛漲每為民害德芳請開臨清下河以泄潦水郡人賴之遲維坤奉天人康熙十九年知聊城縣公暇即詣隴畝勸民力作兼咨訪利弊長幼皆得盡言故所興革悉中肯綮尋卒於官楊朝徴鑲白旗漢軍康熙二十一年知東昌府向各屬例徴臨清倉米折價大為民擾朝徴請歸入條編總徴分解聊城縣挑淺夫役偏纍不均朝徴公之甲遞郡西南瀦水為行李患首捐資建石橋三座凡所設施皆為民謀久遠至今郡人感頌曹煜金壇人康熙二十三年知莘縣勤於政事繕修城垣清查保甲魯隄水決淹灌莘田煜力請堵塞詳詞剴切蒞任八年卒於官程鵾化莆田人康熙五十年知東昌府聊城為郡首邑尚有學而無廟春秋丁祭皆將事於郡學鵾化下車即以建廟為已任閲二年而告成凡禮樂祭器悉備焉陳枚全州人乾隆三十九年以試用知縣署堂邑縣事夀張逆匪王倫倡亂犯堂邑枚與弟武舉元榤把總楊兆相訓導吳瑮守城城陷兆相巷戰枚元梁被執不屈死瑮遇賊於西門與從子文秀僕王忠同時被害枚贈道街元梁兆相俱廕把總瑮廕主簿人物漢胡常清河人從膠東庸生受古文尚書以明榖梁春秋為博士王青東郡聊城人祖文翁與前太守翟義起兵攻王莽及義敗餘衆悉降翁獨守節力戰莽遂燔燒之父隆建武初為都尉功曹青為小史與父俱從都尉行縣道遇賊隆以身護全都尉遂死於難青亦被矢貫咽音聲流喝前郡守以青身有金傷竟不能舉太守張酺見之嘆息曰豈有一門忠義而爵賞不及者乎遂擢右曹乃上疏薦青三世忠義宜蒙顯異奏下三公由此為三公所辟劉儒東郡陽平人郭林宗嘗謂儒口訥心辨有圭璋之質察孝廉舉髙第三遷侍中桓帝時數有災異下詔博求直言儒上封事十條極言得失辭甚忠切帝不能納出為任城相頃之徵拜議郎會竇武事下獄自殺賈琮東郡聊城人舉孝廉為京兆令有政理迹中平元年交址屯兵反靈帝特敕三府精選能吏有司舉琮為交址刺史琮到部斬渠帥為大害者簡選民吏使守諸縣百姓以安在事三年為十三州最徵拜議郎詔以琮為冀州刺史諸贓過者望風解印綬去州界翕然大將軍何進表琮為度遼將軍卒於官三國吳潘璋東郡發干人為孫權將積功封溧陽侯權稱尊號拜右將軍璋為人粗猛禁令肅然所領兵馬不過數千而其所在帝如萬人征伐止頓便立軍市地軍所無皆仰取足南北朝魏王榮世館陶人為三城戍主方城縣子梁師攻圍力窮知不可全乃先焚府庫後殺妻妾及賊陷城以不屈被害明帝下詔褎美進爵為伯贈齊州刺史孟信索盧人永業末除奉朝請從孝武帝入關封東州子趙平太守及去官居貧無食惟有一老牛其兄子賣之擬供薪米劵契巳訖信知之告買牛人曰此牛有疾小用便發君不須也杖兄子二十買牛者周文帝帳下人周文嘆異舉為太子少師遷太子太傅特加車騎大將軍儀同三司散騎常侍以老請退卒於家唐馬周博州茌平人少孤家寠狹嗜學善詩春秋資曠邁至長安舍中郎將常何家貞觀五年詔百官言得失何武人不涉學周為條二十餘事皆當世所切太宗怪問何何曰此家客馬周教臣言之客忠孝人也帝即召見與語大悅詔直門下省明年拜監察御史奉使稱職上疏言事帝善其言除侍御史擢拜給事中轉中書舍人周善敷奏機辨明鋭動中事會帝每曰我暫不見周即思之岑文本謂所親曰馬君論事會文切理無一言可損益聽之纚纚令人忘倦纍拜中書侍郎兼太子右庶子十八年遷中書令帝征遼留輔太子定州及還攝吏部尚書進銀青光祿大夫周病消渴帝躬為調藥太子問疾疾甚周取所上章奏悉焚之曰管晏暴君之過取身後名吾不為也卒陪葬昭陵子載咸亨中為司列少常伯與裴行儉分掌選事稱裴馬焉吕才清平人貞觀時祖孝孫增損樂律與音家王長通白明逹更質難不能決太宗詔侍臣舉善音者中書令溫彥博白才天悟絶人聞見一接輒究其妙侍中王圭魏徵盛稱才製尺與律諧契即召直宏文館參論樂事帝嘗覽周武帝三局象經不能通試問才退一夕即解具圖以聞由是知名纍擢太常博士帝病陰陽家傳説多謬世益拘畏命才與宿學老師刪落繁訛掇可用者凡百篇詔頒天下又詔造方城圖及教飛騎戰陳圖屢稱旨擢太常丞麟德中卒子方毅七嵗能誦經太宗召見奇之賜東帛長為右衛鎧曹參軍母喪以毁卒布車從母葬世共哀之王少元聊城人父隋末死亂兵遺腹生少元甫十嵗問父所在母以告即表泣求尸時野中白骨覆壓或曰以子血漬而滲者父胔也少元鑱膚閲旬而獲遂以葬創甚彌年乃興貞觀中州言狀拜徐王府參軍王志愔聊城人擢進士第神龍中為左臺侍御史以剛鷙為治所居人吏畏讋遷大理正嘗奏言法令者人之隄防不立則無所制今大理多不奉法以縱罪為仁持文為苛臣執刑典恐且得謗遂上所著應正論以見志因規帝失凡數千言帝嘉之景雲初遷大理少卿封北海縣男太極元年兼御史中丞內供奉出為魏州刺史改揚州長史所至令行禁信境內肅然孫逖武水人幼有文屬思警敏年十五見雍州長史崔日用令賦土火爐援筆成篇理趣不凡日用駭嘆遂輿定交舉手筆俊拔哲人奇士隱淪屠釣及文藻宏麗等科開元十年又舉賢良方正擢左拾遺以起居舍人入為集賢院修撰改考功員外郎取顏真卿李華蕭穎士趙驊等皆海內有名士遷中書舍人開元間蘇頲齊浣蘇晉賈曾韓休許景先及逖典詔誥為代言最而逖尤精密張九齡視其草欲易一字卒不能也居職八年判刑部侍郎以病風乞解卒諡曰文子成字思退推蔭仕纍洛陽長安令兄宿為華州刺史因悸病瘖成請往視不待報輒行代宗嘉其悌不貢也為信州刺史徙蘇州改桂管觀察使卒張鎬博州人儀狀瓌偉有大志好王霸大略天寶末釋褐拜左拾遺厯侍御史明皇西狩鎬徒步扈從俄遣詣肅宗所數論事擢諫議大夫拜中書侍郎同中書門下平章事尋詔兼河南節度使都統淮南諸軍事賊圍宋州張巡告急鎬倍道進檄濠州刺史閭邱曉趣救曉逗留不進鎬怒杖殺曉帝還京師封南陽郡公詔以本軍鎮汴州捕平殘寇史思明提范陽獻順款鎬揣其偽密奏思明包藏不測不宜以威權假之又言滑州防禦使許叔冀狡獪宜追還宿衛書入不省時宦官絡繹出鎬境未嘗降情結納毁鎬無經略才遂罷宰相授荆南大都督府長史思明叔冀後果叛如鎬言召拜太子賓客左散騎常侍代宗初更封平陽郡公鎬起布衣二期至宰相居身廉不殖資産善待士性簡重議論有體在位雖淺而天下之人成推為舊德云路泌陽平人通五經以孝悌聞建中末為長安尉德宗出奉天棄妻子奔行在扈狩梁州排亂軍以出再中流矢裂裳濡血以䇿説渾瑊召至幕府東討李懷光奏署副元帥判官從瑊會盟平涼為吐蕃所執死焉路隋泌子泌死時隋方嬰孺以恩授八品官逮長知父被執吐蕃日夜號泣坐必西嚮不食肉母告以貌類父終身不引鏡貞元末舉明經授潤州參軍李錡欲困辱之使知市事隋怡然坐肆不為屈元和中吐蕃歀塞隋五上疏請修好冀得泌還詔可而泌以喪至帝愍惻驓絳州刺史官為治喪服除擢左補闕史館修撰以鯁亮稱穆宗立纍遷翰林學士每除制出以金幣來謝者隋却之曰公事而當私貺耶文宗嗣位以中書侍郎同中書門下平章事監修國史初韓愈撰順宗實録書禁中事為切直宦豎不喜訾其非實帝詔隋刋正隋建言改修非是請條示甚謬誤者付史官刋定餘不復改册拜太子太師李德裕貶袁州長史不署奏為鄭注所忌罷為鎮海節度使卒諡曰貞崔咸博平人元和初擢進士第又中宏辭為侍御史處正特立風采動一時敬宗將幸東都裴席在興元憂之自表求覲與章偕來時李逢吉當國畏度復相使京兆尹劉棲楚等十餘人悉力拒卻之他日度置酒延客栖楚曲意自解附耳語咸舉酒讓度曰丞相乃許所由官囁嚅耳語願上罰爵坐上莫不壯之纍遷陜虢觀察使入拜右散騎常侍祕書監咸素有高世志造詣嶄遠諸文中歌詩最善路羣冠氏人通經術善屬文性志純潔親殁終身不食肉纍官中書舍人翰林學士承旨文宗優遇之循循謙飭若不在勢位者所與交雖褐衣之賤必待以禮始終一節孫揆逖五世從孫第進士辟户部巡官厯中書舍人刑部侍郎京兆尹昭宗討李克用以揆為兵馬招討制置宣慰副使既而更授昭義軍節度使以本道兵會戰克用伏兵刀黃嶺執揆厚禮而將用之揆大罵不屈克用怒使以鋸解之至死詈聲不輟昭宗憐之贈左僕射宋張瓊館陶人少有勇力善射隸太祖帳下周顯德中大祖從世宗南征擊十八里灘寨為戰艦所圍一人甲盾鼓譟而前衆莫敢當瓊射之一發而踣淮人遂卻及攻夀春太祖乘皮船入城濠城上車弩遽發瓊亟以身蔽太祖矢中瓊股鏃著髀骨堅不可拔瓊急索杯酒滿飲破骨而出之血流數升神色自若太祖壯之及即位纍遷都虞侯嘉州禦防使為史圭石漢卿所誣死太祖後甚悔之咱居潤高唐人善書計初為檢校太尉建隆三年拜義武軍節度在鎮數年得疾還京師卒居潤性明敏有節概篤於行義嘗薦沈倫於太祖以為純謹可用後至宰相世稱其知人王祐莘縣人少篤志詞學性倜儻有俊氣太祖受禪纍遷殿中侍御史知制誥轉户部員外郎太祖征太原命知潞州饋餉無乏會符彥卿鎮大名頗不治太祖以祐代之俾察彥卿動靜祐以百口明彥卿無罪彥卿由是獲免故世謂祐有陰德繼以用兵嶽表徙知襄州移潭州召還攝判吏部銓時盧多遜惡祐不比已遂出為鎮國軍行軍司馬太平興國初入為左司員外郎拜中書舍人未幾知開封府以病請告太宗謂祐文章清節兼著特拜兵部侍郎月餘卒初祐知貢舉多拔擢寒畯畢士安柴成務皆其所取也子懿字文德勵志為學舉進士嘗知袁州有政績劉謙堂邑人曽祖直以純厚聞於鄉有盜其衣者置不問州將廉知召詰盜衣者俾還之直紿云衣乃自以遣少年非竊也州將義之賜以金帛不受謙少慷慨應募從軍補衛士至道初授東宫親衛都知真宗時纍遷權殿前都虞侯振武軍節度江北屯兵常以八月給冬衣謙上言邊城早寒請給以六月後以為例移領保靜軍節度卒王旦祐次子祐嘗手植三槐於庭曰吾之後世必有為三公者此所以志也旦幼沈默好學有文祐器之曰此兒當至公相太平興國五年進士及第為大理評事知平江縣厯通判鄭州入遷集賢殿修撰知制誥真宗即位為翰林學士帝素賢旦嘗曰為朕致太平者必斯人也咸平中以工部侍郎參知政事從幸澶州命馳還權留守東京事厯官太尉兼侍中凡柄用十八年為相一紀帝久益信之言無不聽旦與人寡言笑默坐終日及奏事羣臣異同旦徐一言以定遼人奏請嵗給外别假錢幣旦曰東封甚近車駕將出彼以此探朝廷之意耳止當以微物而輕之乃以嵗給三十萬物內各借三萬仍諭次年額內除之遼人得之大慙西夏趙德明言民飢求糧百萬斛旦請敕有司具粟百萬於京師詔德明來取之德明奉詔慙且拜曰朝廷有人旦為相賓客滿堂無敢以私請察可與言及素知名者數月後召與語詢訪四方利病或使疏其言而獻之觀才之所長密籍其名其人復來不見也凡所薦人皆未嘗知卒諡文正旦事寡嫂有禮與弟旭友愛甚篤婚姻不求門閥被服質素家人未嘗見其怒不置田宅曰子孫當各念自立何必田宅徒使爭財為不義爾王旭旦弟嚴於治內恕以接物尤篤友義以廕補大祝嘗知緱氏雍邱二縣真宗尹京時素聞其能及踐阼三遷至殿中丞自旦居宰府旭以嫌不任職王矩嘗薦旭材堪治劇判國子監出知潁州荒政備舉旦既卒敡厯中外卓有政績由兵部郎中出知應天府卒張質高唐人少隸兵房為趙普曹彬所知太宗征河東還駐鎮陽彬方典樞務一夕議調發屯兵時軍載簿領阻留在道質潛計兵數部分軍馬及得兵籍較之悉無差謬厯右神武軍右衛二大將軍大中祥符七年轉都承旨在樞要五十年練習事程精敬端慤未嘗有過嘗召問五代洎國初軍籍更易之制且命條其利害質纂為三篇目曰兵要上覽而稱善好養生術多接隱人方士然語不及公家事天禧元年卒靳懷德高唐人太平興國中明法解褐廣安軍判官纍遷虞部員外郎知德州咸平中遼兵至懷德固守城壁轉運使劉通言其善政詔褎之徙知密州卭州滄州大中祥符中選為益州鈐轄加領長州刺史厯官以強幹稱在劍外軍民甚畏愛之入拜西上閣門使知澶州著政績後歸闕而卒李垂聊城人咸平中登進士第上兵制將制書纍遷著作郎館閣校理又上導河形勝書三卷欲得九河故道時論重之丁謂執政垂未嘗往謁或問其故垂曰謂恃權怙勢觀其所為必遊珠崖吾不欲在其黨中謂聞而惡之罷知亳州遷潁晉絳三州明道中還朝李康伯謂曰舜工文學議論稱於天下諸公欲用為知制誥但宰相以舜工未嘗相識盍一往見之垂曰我若昔謁丁崖州則乾興初己為翰林學士矣今已老大焉能看人眉睫以冀推挽乎執政知之出知均州卒王沿館陶人少治春秋中進士第張知白薦其才擢著作佐郎遷太常博士上書論河北為天下根本請罷諸坰牧以其地為屯田募民復十二渠以灌溉數郡帝嘉之遷監察御史多所彈奏天聖五年安撫關陜厯河北轉運使因詣闕奏事上所著春秋集傳十六卷纍官陜西河東都轉運使知并滑虢等州徙河中府卒有文集二十卷唐志二十一卷王質旭子少謹厚淳約師事楊億億歎以為英妙伯父旦見具文嘆賞之以廕補太常寺奉禮郎後獻文召試賜進士及第纍遷尚書祠部員外郎丁父憂與諸弟飯脫粟茹蔬終喪通判蘇州還判尚書刑部吏部南曹厯知蔡州夀州盧州泰州徙湖北路轉運使纍擢天章閣待制出知陜州卒質家世富貴而克巳好善自奉簡素如寒士不喜蓄財至不能自給范仲淹貶饒州治朋黨方急質獨載酒往餞或以誚質質曰范公賢者得為之黨幸矣世以此益賢之王素旦季子賜進士出身為侍御史出知鄂州仁宗思其賢擢知諫院素遇事感發嘗請省中外無名之費適皇子生將進百僚以官惠諸軍以賞素爭曰今西夏畔渙契丹要求宜留爵秩以賞戰功貯金繒以佐邊費議遂已京師旱請帝禱於郊王德用進二女子素論之立命遣出擢天章閣待制淮南轉運按察使改知渭州以樞密直學士知開封府復出知定州成都府厯澶州青州觀察使熙寧初以學士知太原府入轉工部尚書致仕卒子鞏有雋才長於詩從蘇軾遊厯官宗正丞王鼎沿子以進士纍遷太常博士數上書論時政得失提點江東刑獄摘發無所貸厯知深州建州徙提點河北刑獄遷淮南兩浙荆湖制置發運使入為三司鹽鐡副使遷河北轉運使徙河東卒鼎性廉不欺嘗任其子族人欲增年以圖速仕鼎不可父死分諸子以財悉推與其弟事繼母孝教育孤姪甚至自奉儉約當官明敏強直不可撓所薦士多知名自終身不識者王巖叟清平人仁宗初置明經科巖叟年十八鄉舉省試廷對皆第一調欒城簿韓琦留守北京以為賢辟管勾國子監後知定州安喜縣會有詔近臣舉御史舉者意屬巖叟而未識或謂可一往見巖叟笑曰是所謂呈身御史也卒不見哲宗即位用為監察御史入臺之明日即上書論社稷安危之計在從諫用賢不可以小利失民心遂言役錢斂民太重河北榷鹽法尚行民受其弊又極陳時事時宰相蔡確以定䇿自居巖叟言確敢貪天自伐章惇讒賊很戾罪與確等豈宜容此大姦猶在廊廟於是相繼退斥纍遷侍御史進權吏部侍郎湖北諸蠻擾邊巖叟請專委荆南唐義問諭以勿為徼幸功賞之意後遂安輯夏人侵定西之東通遠之北壞七崖巉堡掠居人轉侵涇原及河北鄜府州朝議欲以七巉經毁之地皆以與夏巖叟力言不可請築定遠以據要害拜中書舍人復為樞密都承旨權知開封府元祐六年拜樞密直學士簽書院事因入謝奏哲宗當深辨邪正君子小人無參用之理劉摯為御史鄭雍所擊嚴叟連疏論救御史遂指為黨罷知鄭州徙河陽卒巖叟為文語省理該深得制誥體有易詩春秋傳行於世孫搆博平人善功名勇於建立中進士第為廣濟軍判官厯知黎州真州遷度支判官夔州部彝梁承秀等導生獠入寇搆督軍討平之以其地建南平軍徙河北轉運使諭降懿洽二州納歸附州十四交址入寇拜右諫議大夫知桂州寇聞引去以疾改大中大夫卒廉公諤堂邑人嘗為萊蕪令民歌曰甑釡生塵魚境內安以樂昔聞范史雲今見廉公諤纍遷司農少卿出知滑州王倫旭元孫建炎元年選能專對者使金假倫刑部侍郎充通問使七年復使金至睢陽劉豫移文取國書倫報曰國書須見金主面納九年復充迎梓宫奉還兩宫交割地界使金拘倫遷之河間欲以為平灤三路轉運使脅以威倫曰受命而來非降也遂冠帶南鄉再拜而死詔贈通議大夫諡愍節王柟倫之孫倫使北死孝宗訪求其孫之未祿者三人官之柟其一也調通州海門尉韓托胄以恢復起兵端天子思繼好息民遣方信孺往將有成矣坐忤托胄得罪欲再遣使近臣以柟薦擢監登聞鼓院假右司郎中使持書北行柟至金和議遂決柟奏和約之成皆方信孺將命之功臣因人成事乞録信孺功朝論多之厯官太府卿告歸卒金張琪莘縣人有盜掠財琪負母而逃猝遇盜衆欲害之盜首曰此孝子也害之不祥遂獲免後以武力選校尉纍官顯武將軍賈鉉博乎人性純厚好學大定進士補尚書省令史章宗為右丞相深器重之纍遷侍御史改右司諫上疏論邊戍利害上嘉納之遷左諌議大夫與黨懷英同修遼史上書言親民之官任情立威決杖不如法式願下州郡申明舊章復論山東采茶一切護邏執誣小民嚇取貨賂宜令按察使約束從之遷禮部尚書時有詔凡奉敕商量照勘公事皆期日奉聞鉉言如此恐官吏姑務苟簡反害事體泰和三年拜參知政事後出為安武軍節度使致仕卒孫鐸恩州厯亭縣人性敏好學遼陽王遵古一見器之期以公輔登進士第章宗即位除同知登聞檢院事鐸言凡上訴者皆因尚書省斷不得宜若復送省則必不行矣乞自宸衷斷之上以為然遷户部尚書鐸因轉對奏曰比年號令更張太煩百姓不信乞自今凡將下令再三講究有益於治則必行無恤小民之言與張復亨議交鈔詰難久之復亨議咒上顧謂侍臣曰孫鐸剛正人也雖古魏徵何加焉泰和七年拜參知政事左司郎中劉昂等十餘人坐私議朝政下獄鐸進曰昻等非敢議朝政但如鄭人遊鄉校耳上悟乃薄其罪貞祐三年致仕卒閻詠髙唐人承安中擢詞賦魁選士論厭服素慕張詠為人氣節豪邁以第一流自負應奉翰林文字居翰苑十年終於河南治中有後軒集行世元趙天錫冠氏人金季兵起父林保冠氏有功授冠氏令後天錫歸行臺東平嚴實從征上黨以功授冠氏令俄遷元帥左都監兼令如故破宋將彭義斌於其定授左副元帥李全在大名結其帥蘇椿納金河南從宜鄭倜日以取冠氏為事天錫每戰輒勝倜自將萬人來攻天錫乘城力戰倜不能下遁去朝行在所上便民事優詔從之子賁享字文甫龍行軍千户至元間纍以功授虎符懷遠大將軍處州路管軍民州路管軍民萬户嶽存冠氏人初歸東平嚴實承制授存武德將軍帥府都總領保冠氏會金從宜鄭倜復據大名自將萬人來攻存擊走之從嚴實及武仙戰於彰德西敗之遷冠氏主簿又擊敗金將張開遇於開州升本縣丞移治楚邱數年有惠政以疾卒子天禎襲父職從圍襄樊戰焦山平奉化賊録功升管軍千户江南平授福州路總管改吉州厯贑州建康首定救荒之政民立碑以紀齊榮顯聊城人九嵗代父旺為千户從外舅嚴實來歸屢立戰功攻濠州宋兵背城為陳榮顧薄之所向披靡進拔五河口權行軍萬户守宿州墮馬傷股改本路諸軍鎮撫兼提控經厯司從實入朝授東平路總管參議兼領博州防禦使謁告侍親間居十年卒閻復髙唐人性簡重美丰儀七嵗讀書穎悟絶人弱冠入東平學時嚴實領東平行臺招諸生肄業迎元好問校試其文復為首用王磐薦為翰林應奉扈駕上京賦應制詩寓規諷意纍升翰林學士成宗即位除集賢學士上疏言京師宜首建宣聖廟用釋奠雅樂從之後詔賜孔林灑揥二十八户祀田五千畝皆復之請也三年上疏請定律令頒封贈增俸給通調內外且言郡守以徵租受杖非所以勵廉隅江南公田租重宜減以貸貧民拜翰林學士承旨武帝踐作復首陳三事言皆剴切進階榮祿大夫授平章政事卒諡文康有靖軒集五十卷樊楫冠州人元初從下鄂江陵定廣西攻崖山以功纍擢僉荆湖古城行中書省事至元二十四年征交址進楫行中書省參知政事將舟師入海與賊舟遇安邦口擊破之遂進攻交址陳日煊棄城走師還為賊邀遮力戰殁贈上黨郡公諡忠定焦養直堂邑人夙以才器稱至元十八年召對稱旨超拜典瑞少監入侍帷幄陳説古帝王政治帝聽之每忘倦成宗幸柳林命養直進講資治通鑑因陳規諫之言遷集賢侍講學士詔傅太子於東宫啓沃誠至至大元年授集賢大學士告老歸卒梁宜茌平人延祐中舉進士為國子助教嚴考課剔宿弊知邳嶧二州判大名府俱有惠政遷河南總管拜禮部尚書卒張本茌平人篤孝事伯父叔父皆甚謹伯父嘗病本晝夜不去側復載以巾車步挽詣岱嶽禱之詔旌其家孫希賢高唐人母病痢希賢閲方書有曰血溫身熱者死血冷身涼者生希賢嘗之其血溫乃號泣告天求身代之母遂愈明林英聊城人建文時為御史燕軍逼江上英出募兵知事不可為自縊死妻宋氏下獄亦自縊死同時有丁志方者亦聊城人為御史燕兵至令妻韓氏攜幼子還家志方被執不屈死郭敦堂邑人洪武中由舉人授户部主事知衢州府厯河南陜西參政擢禮部右侍郎改户部宣德初進尚書出鎮陜西召還卒敦性平恕臨事不苟合居官儉約始終一節趙巖堂邑人母早亡事父甚謹家貧常稱貸供甘旨不使父知父殁合葬建祠墓側廬居三年肖象事之如生夏月大雨雹摧傷禾稼至墓而止永樂中詔旌其門許通冠人幼侍父病晝夜不離久而不懈及卒負土成壠廬居三載正統中旌表朱舉聊城人景泰中舉人性至孝母殁身操畚插治塋域廬居三年有四燕共巢兔蛇交馴之異詔旌其門李志莘人父早卒刻木為像事之母喪廬墓三年志卒其子忱亦如之俱成化中旌表許路平山衛人宏治進士為刑部郎中正德間諫武宗巡狩廷杖嘉靖初議大禮再杖遷陜西副使兵備招服洮民番彝四十族改廣西兵備病歸穆孔暉堂邑人宏治進士授翰林院檢討忤劉瑾調南京禮部主事瑾誅復原官進南京國子司業左庶子充經筵講官嘉靖初進學士掌院事又忤權貴改南京尚寶司卿遷南京太常寺卿致仕孔暉初工古文辭有聲已乃棄去研精六籍潛心理學著讀易録尚書困學諸史通編大學千慮居官三十年茅茨僅蔽風雨性溫和無疾聲遽色卒諡文簡張後覺茌平人事親至孝居喪哀毁骨立以嵗貢生授華陰訓導提學副使鄒善為建願學書院遠近師事之孟秋茌平人隆慶進士知昌黎縣有善政遷大理評事轉職方員外郎守山海關時關政久弛秋嚴稽察裁供億為前官所忌以京察調外後升刑部主事進尚寶司少卿卒秋少有志於聖賢家貧力學晚年益進謫官之日與妻共駕一牛車許孚遠過其廬見茅屋數椽書史縱橫嘆曰大江以南無有也天啓初追諡清憲王汝訓聊城人隆慶進士授元城知縣厯兵部主事纍遷光祿少卿疏劾吏科都給事中陳與郊忤政府改調南京孟秋饗廟帝不親行上章極諫三遷右副都御史巡撫浙江進工部右侍郎卒諡恭介逯中立聊城人萬厯進士由行人遷吏科給事中遇事敢言行人高攀龍等以救趙用賢忤王錫爵被黜中立上疏劾錫爵罪文選郎顧憲成獲譴又上疏言舉錯倒置忤旨謫陜西按察司知事家居講學二十餘年天啓初追贈光祿少卿申一琴冠人與弟一攀俱幼孤家貧竭力養母母殁廬墓三年萬厯中並旌表王宏恩人與同邑宋曰智談訓俱親殁廬墓負土築臺詔旌其門耿如𣏌館陶人萬厯進士天啓時纍官遵化兵備副使以不拜魏忠賢像逮下詔獄搒掠擬以大辟崇禎初復官尋擢太僕少卿再遷右僉都御史巡撫山西會京師戒嚴率兵入衛抵都門三日屢易泛地衆軍飢且怒譟而歸坐下獄論死如𣏌通敏有才更以氣節顯為士所重子章光由進士仕至尚寶寺卿以父死非其罪為刺血明心一疏福王時追贈如𣏌右僉都御史袁愷聊城人崇禎進士由推官入為給事中陳時弊五事請罷首輔薛國觀繼發其納賄行私事語侵僉都御史宋之普國觀遂獲罪而愷為之普所傾亦貶秩調外本朝傅以漸聊城人順治丙戍進士第一厯官祕書院大學士以漸自諸生時嗜學無異寒署不釋卷及貴食不重味尋以疾歸凡七年卒張其抱高唐人順治丙戌進士事母至孝每焚香告天願以已年益親夀母卒哀毁盡禮與兄共爨終身官虞城知縣民安吏治尋以勞瘁回籍卒朱昌祚高唐人由宗人府啓心郎授浙江巡撫浙東西土寇未靖昌祚撫剿悉當機宜未幾杭紹台寧等處災荒疊告即連疏請賑飢民賴以全活者數十萬又清查積逋條晰律例酌定兵餉在任三載旋遷閩督未之任再遷直隸河南山東總督釐姦剔弊加意撫綏卒賜祭葬祀名宦祠朱宏祚高唐人順治戊子舉人知盱眙縣以卓異擢刑部郎發姦摘伏冤獄多所開釋纍遷至僉都御史巡撫兩粵首革庾嶺役夫請裁粵東芻茭扉屨浮徴至百餘萬上鹽法八疏悉中機宜改督浙閩復奉修南河卒於工所王臨元聊城人順治已丑進士選授江西浮梁知縣康熙十三年饒州參將程鳳叛附耿逆陷浮梁奪臨元印脅降不屈自縊死王功成拔聊城人由武舉從征荆州奉使慈利探賊直入巢穴與賊力戰洞庭躬冒矢石及征四川由巫夔抵重慶賊望風逃竄事平振旅而還仕至潮州總兵官卒祀鄉賢祠沙亮冠人雍正丁未武進士由三等侍衛洊升西安城守營參將乾隆十二年調征金川亮領延綏兵攻格什戎岡奪據碉卡被矛傷卒蔣瑶聊城人為邑諸生天性純孝乾隆十五年旌王興宗清平人孝行著聞同邑孝子齊卜年俱乾隆年間旌劉湄清平人乾隆已丑進士由翰林厯官左副都御史平時渾厚和平不矜氣節遇職守所當言則侃侃然不肯遷就卒祀鄉賢祠楊治安高唐人由藍翎侍衛授廣西梧州協中軍都司洊擢湖北武昌城守營參將嘉慶元年剿捕邪匪奮勇出力受槍傷卒同邑曹州營把總劉忠孝擊達州邪匪力戰遇害俱贈雲騎尉流寓元袁裕洛陽人幼孤從兄避難聊城因家焉稍長嗜學中統初由聊城縣丞辟中書右司掾纍拜刑部侍郎列女三國魏王經母清河人經坐高貴鄉公事誅始經為郡守經母謂之曰汝田家子今仕至二千石物太過不祥可以止矣經不能從及經被收辭母母顏色不變笑而應之曰人誰不死恐不得其所也以此并命何恨之有哉宋王柟母莘人初柟祖倫使北死孝宗復遣柟北行歸白其母母曰而祖以忠死故恩及子孫汝其勉旃母以吾老為念柟乃拜命疾驅和議遂決元趙氏女名玉兒冠州人嘗許為李氏婦未婚夫死遂誓不嫁以養父母父母殁負土為墳鄉里稱孝馬明李茂妻王氏堂邑人宏治間茂以輸稅入京師同行縣吏焦讓臧克儉利其財誘茂飲酣夜分殺之匿其尸王怪夫久不歸單身至京擊登聞鼓詔命錦衣邏刺得二吏殺茂狀捕抵罪出其尸於牆側舁歸斂葬守節終身劉氏女博平人正德間從其父諸生劉俊自村舍入城賊殺俊擁女上馬女痛哭不行賊挺刃逼之女瞋目大罵賊怒遂殺之彭氏李氏俱清平人彭年十七許嫁千户所軍李成未婚成征交址成妹李氏獨輿母居迎彭至家共養親成陳亡成母欲嫁彭彭泣曰已是李家婦當作李家鬼李氏念母無子亦不嫁成母死二女俱廬墓紡績為生死俱葬墓側人呼為姑嫂墓張氏李氏俱清平人張氏贅楊厥未婚厥父充河南吏與厥俱死於途父母議再嫁女曰雖未成婚已合兩姓豈可更適遂誓死自守其弟婦李氏年二十餘夫張泰死子甫七月亦誓不再嫁與張共養貞女節婦同出一門當時稱之孟氏女高唐州人名崇梅年十八正統六年流賊入境執女欲汙之紿云渴甚乞汲水飲及井遂投入同里劉氏女名瑞兒年十七亦為流賊所掠強之行女厲聲曰死耳豈肯從賊耶賊遂害之事聞並旌表碑曰二貞本朝李元芬妻劉氏聊城人其姊先適元芬生一子一女卒氏繼室甫兩月而元芬病亡氏矢志撫孤人以非已所出喻之氏曰吾子女有二母吾姊妹惟知一夫也守節五十餘年傅沛之妻田氏聊城人順治初土寇起氏聞其入境攜婢小春投水死同縣柳應武妻劉氏滿旺妻王氏俱被難不屈死許繼嶽聘妻鄧氏聊城人甫議婚而繼嶽患瘋痺成痼疾許遣媒退婚女聞之告父母曰兒命不辰改議何益將與此約偕亡父母憐而厚資遣之氏盡撤其環瑱延醫而竟不愈繼嶽亡遂自縊同縣王好學妻盧氏夫病革先期投井遇救得免及夫殁殮畢遂自縊死相有法妻許氏堂邑人少事父母以孝稱年十七歸有法三載而寡值嵗屢祲許黽勉操作以精饌進姑而自厭粳粃撫孤成立李思貞妻趙氏堂邑人夫亡𠢐面毁容既終喪遂投繯死同縣朱岱妻權氏欒廷相妻李氏俱夫亡殉節劉叔奎妻朱氏博平人順治初土寇奄至叔奎已被殺氏倉卒埋舅姑二主於堂地趨破屋自經梁折屋摧竟不受壓至暮復起二主負之奔母家賊平經營葬其夫為已作生壙納夫主於其中袝舅姑二主於神廟以所居宅地贍之因無子也氏卒鄉里欽其志為合葬夫墓焦朴妻李氏茌平人順治初土寇奄至撲舉家逃難賊追朴刃既及氏以身蔽之遂被害而朴得免張明賓妻楊氏茌平人順治初為土寇所掠不從罵賊而死祁鑑妻李氏茌平人年二十一夫亡撫子成立娶媳焦氏生孫而子亡復撫孫孫婦某氏生曾孫而孫又亡三世孤嫠相守邑人哀之王振宜妻劉氏茌平人夫亡年十七子女俱無而舅姑年甚高氏曰吾當代夫供子職也生養死葬無不如禮守節四十餘年王東周妻李氏莘人年二十三夫亡無子績紡自供守節終身陳煌聘妻劉氏冠人許配未婚而煌卒女聞訃自縊同縣劉景瞻繼妻戴氏彭萬善妻孫氏俱守正捐軀劉氏女名玉高唐人年十六守正捐軀同州姚某妻張氏夫亡守節鄰有無賴子強欲娶之氏不從遂被殺李暹女高唐人年十四值母病親侍湯藥三年每夜焚香告天願以身代母卒一慟而絶楊昌裔妻宋氏高唐人歸昌裔三年無所出昌裔從戎登鎮因娶王氏生子甫三嵗而昌裔病亡扶柩歸葬與王相依而守無何子夭有豪慕王欲強娶之宋曰王異鄉女子為吾夫而來吾不保其節何以見夫於地下以死拒聘未幾宋殁王氏卒能守節朱緗妻王氏高唐人年十七適朱值翁遠宦浙閩姑病親侍湯藥衣不解帶居三年姑卒哀毁幾至滅性夫亡亦如之其後守節夀終王氏女小存聊城人守正捐軀雍正年間旌鄭氏女博平人名莊姐年十五守正捐軀雍正年間旌于氏女清平劉興旺養媳年十六未婚守正捐軀同縣董氏女名三姐亦守節不汚死均雍正年間旌李振秀妻任氏聊城人年二十九夫亡守節同縣鄭玉妻邱氏竇克豐妻鄧氏苗琫妻梁氏武經妻紀氏李珩妻郭氏任化美妻胡氏任士璸繼妻丁氏靖王柱繼妻陳氏靖煌璧妻陳氏黃元林妻張氏馮宗京妻韓氏朱光藴妻鄧氏鄧汝襄妻朱氏商美廷妻賈氏蔣琮妻雲氏李希聖繼妻王氏傅自明聘妻李氏展培桂聘妻雲氏李士英妻陶氏烈婦楚小四妻徐氏趙扁頭妻某氏均乾隆年間旌李道坦妻許氏堂邑人年二十五夫亡孝養舅姑訓育幼子子早卒撫孫二人皆成立同縣黃運繼妻田氏黃體乾妻韓氏黃連芳妻王氏王全孝繼妻劉氏黃之柱妻許氏李德普妻徐氏陳八妻勞氏劉祥妻蘇氏張季妻梁氏解大咸妻王氏李璞妻路氏薑義泗妻丁氏熊大成妻王氏均乾隆年間旌高德成妻王氏博平人守正捐軀同縣烈婦李天章妻喬氏節婦耿熺妻任氏楊沖錫繼妻常氏楊沖斗妻謝氏侯儀妻高氏侯運璋妻徐氏劉尚仁妻蘇氏烏踆烏妻謝氏王好問妻楊氏謝忠賢妻王氏刁鎮妻張氏均乾隆年間旌邵俊才妻馮氏荏平人夫亡守節同縣楊書有妾張氏楊元瑞妻孫氏袁元美妻李氏袁士夏妾李氏路夢氏妻李氏吳在新妻張氏楊允揩妻祁氏王希賢妻李氏張交泰妻馬氏張士聰妻何氏均乾隆年間旌高尚素妻翟氏清平人夫亡守節同縣吳錫恩妻陳氏郭在廂妻黃氏郭順妻郭氏王經妻李氏均乾隆年間旌張心朴妻王氏莘人夫亡守節父母欲其改適不從自縊同縣節婦魏之屏妻王氏周明綱妻裴氏王得己妻彭氏虞茂良妾陳氏曹簡繼妻劉氏王錫辛妻周氏李本貞妻楊氏張有才妻趙氏王瑀妻田氏林應孔妻孔氏臧辰妻胡氏劉居所繼妻孫氏楊泳洄妻鄒氏劉圻繼妻張氏賈維煌妻郭氏武緯妻吳氏孫純嘏妻毛氏劉及第繼妻寧氏鄭永久妻王氏趙小妻陳氏耿秋喜妻賈氏均乾隆年間旌劉氏女冠人名桂姐許字未嫁年十五守正捐軀同縣節婦杜重慶繼妻戴氏劉應選妻馬氏尹文煌妻張氏尹文烺妻趙氏張璽妻趙氏張培妻徐氏武起貴妻楊氏劉德輝女趙儉女張文東妻董氏均乾隆年間旌薑基渭妻紀氏恩人夫亡守節同縣李士貞妻張氏宋爾敏妻霍氏胥桐妻鴻氏劉志玘妻張氏關廉妻賈氏郭煥妻宋氏郭可翰妻李氏烈婦桑吳氏均乾隆年間旌張文選妻鄭氏高唐人夫亡守節子號早卒媳梁氏亦矢志不嫁同州李作杼妻劉氏李採妻黃氏張溥妻司氏王功敘繼妻林氏林育坤繼妻邢氏林耐風妻管氏朱懷連妻張氏許𣏌妻王氏徐照妻杜氏均乾隆年間旌蔣續勳妻竇氏聊城人夫亡自縊同縣李赫氏守正捐軀節婦左文炳妻鄭氏傅維􅕠妻高氏鄧汝賢繼妻黃氏傅文浩妻任氏燕東衡妻張氏袁純繼妻劉氏李運逹妻郭氏臧琳妻丁氏李運貴妻張氏葉繼祀妻任氏裴天剛妻孫氏朱衍祿安徐氏喬興祿妻袁氏陳廣祿妻衣氏翟玫妻王氏郎彬妻李氏郎振海妻李氏朱衍韶妻李氏烈婦王代公母季氏均嘉慶年間旌王氏女堂邑人名三姐守正捐軀同縣烈女王紳女節婦趙有吉妻王氏趙上逹繼妻蘇氏范天崇妻王氏楊