body:
  text: 雷州府在廣東省治西南一千四百二十二里東西距一百六十里南北距三百九十五里東至高州府吳川縣界二十里西至廉州府合浦縣界一百四十里南至瓊州府瓊山縣界一百八十里北至高州府百城縣界二百十五里東南至海岸二百里西南至瓊州府臨高縣界二百二十里東北至吳川縣界一百六十里西北至合浦縣界二百里自府治至京師九千五百五里分野天文牛女分野星紀之次建置沿革禹貢揚州南境秦為象郡地漢元鼎六年開置合浦郡治徐聞縣後漢為合浦郡地時移郡治合浦即今廉州府晉宋因之南齊仍移合浦郡來治梁普通四年分置合州太清元年曰南合州隋平陳復曰合州治海康縣大業初州廢仍屬合浦郡唐武德四年復置南合州貞觀元年更名東合州八年改雷州天寶元年曰海康郡乾元元年復曰雷州屬嶺南道五代屬南漢宋曰雷州海康郡屬廣南西路元至元十五年置雷州路安撫司十七年改總管府置海北海南道宣慰司隸湖廣行中書省明洪武元年改曰雷州府隸廣東布政使司本朝因之屬廣東省領縣三海康縣附郭東西距九十里南北距一百五里東至髙州府吳川縣界二十里西至遂溪縣界七十里南至徐聞縣界八十里北至遂溪縣界二十五里東南至徐聞縣界一百八十里西南至海岸一百六十里東北至遂溪縣界十五里西北至遂溪縣界六十里漢置徐聞縣為合浦郡冶後漢屬合浦郡三國吳改屬珠崖郡晉還屬合浦郡宋因之蕭齊仍為郡治梁為南合州治隋改置海康縣為合州治唐為雷州治五代宋因之元為雷州路治明為雷州府治本朝因之遂溪縣在府北一百八十五里東西距一百二十里南北距一百八十里東至高州府吳川縣界三十里西至海岸九十里南至海康縣界一百六十里北至高州府石城縣界二十里東南至海岸一百四十里西南至海岸二百里東北至吳川縣界七十里西北至石城縣界六十里漢徐聞縣地梁析置扇沙縣椹縣隋開皇十年又分置鐵杷縣十八年改椹縣曰椹川縣大業初省以扇沙鐵杷二縣屬合浦郡唐武德初省扇沙復置椹川與鐵杷皆屬南合州天寶元年併二縣改置遂溪縣屬雷州五代因之宋開寶五年省入海康縣紹興十九年復置仍屬雷州元屬雷州路明屬雷州府本朝因之徐聞縣在府南一百六十里東西距一百六十里南北距一百三十里東至海岸九十里西至海岸七十里南渡海至瓊州府澄邁縣界五十里北至海康縣界八十里東南至海岸六十里西南渡海至瓊州府臨高縣界八十里東北至海岸一百里西北至海康縣界八十里漢徐聞縣地南齊置樂康縣為齊康郡治隋廢郡改縣曰隋康屬合浦郡唐初屬南合州貞觀二年改曰徐聞屬雷州五代因之宋開寶五年省乾道七年復置仍屬雷州元屬雷州路明屬雷州府本朝因之形勢地濱炎海寰宇記州居海上之極南多平田沃壤三面並海有海道可通閩浙宋圖經窮東嶺而並南海宋張栻州學記四州之人以徐聞為咽喉宋蘇軾伏波將軍廟碑風俗州雜黎俗有官語客語黎語官語可對州縣官言者也客語則平日相與言也黎語雖州人或不能辨氣候倍熱除夜納涼寰宇記風俗頗淳人多嚮學宋余靖州學記城池雷州府城周五里門四池周六里南漢時土築明洪武中甃石本朝順治十三年修康熙十年乾隆五十九年嘉慶十四年重修海康縣附郭遂溪縣城周四百七十丈門三池周七百一十四丈明洪武七年土築正統四年甃石本朝康熙三年修二十一年重修徐聞縣城周六百餘丈門四池周八百九十二丈明正統三年土築宏治十四年甃石本朝康熙三十五年修雍正七年乾隆五年三十七年重修學校雷州府學在府治西宋乾道六年建本朝康熙四年修雍正三年乾隆二十八年重修入學額數二十一名海康縣學在縣治東明嘉靖三年由珠池遷建本朝康熙四年修雍正元年乾隆十五年嘉慶二年重修入學額數十二名遂溪縣學在縣治西北明洪武十七年由縣西遷建本朝順治十七年修康熙二十三年雍正元年乾隆二十八年嘉慶四年重修入學額數八名徐聞縣學在縣治西元大德元年建明洪武後屢遷宏治十四年復建舊所本朝康熙九年修三十六年雍正二年乾隆五十四年重修入學額數八名雷陽書院在府城內高樹嶺雍正中由西門外移建乾隆十一年重建濬元書院在海康縣城西舊名平湖書院元至元中建本朝嘉慶二十三年重建改今名遂良書院在遂溪縣城內西北乾隆四十五年建文明書院在遂溪縣西南樂民所相傳宋元符三年蘇軾自儋州經此云此地當有文明之祥既去月餘果有瑞芝生其地邑人因建書院於此徐陽義學在徐聞縣城內乾隆四十六年建昌明社學在海康縣南關乾隆九年建嘉慶十年重建英利社學在徐聞縣城外嘉慶七年建按舊志載貴生書院在徐聞縣城內明萬厯十九年建今廢謹附記户口原額人丁一萬四千七百五十四今滋生男婦大小共六十五萬四千二百五十六名口又屯民男婦共二萬八千一百八十九名口田賦田地山塘共七千九百九十四頃八十三畝四分有奇額徵地丁正雜銀二萬七千九百五十八兩四錢二分四釐遇閏加徵銀四百三十二兩九錢九分六釐米一千六百五石八斗二升二合屯田一百六頃一十九畝六分有奇額徵屯米九百四十三石一斗二升七合五勺山川虎頭山輿地紀勝在海康縣東七十里枕海舊志在縣東南四十五里時禮山輿地紀勝在海康縣東南八十里四望之最高舊志謂之時禮嶺周五里巖穴深邃上有泉歲旱禱雨於此擎雷山在海康縣南九域志為府治案山擎雷水出其下寰宇記謂之驚雷山在縣南八里雷震破成水徒會山輿地紀勝在海康縣南一百三十里下步村之西海中山巔有石奇怪萬狀巖