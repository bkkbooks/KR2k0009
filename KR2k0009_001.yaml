body:
  text: 御製大清一統志序我大清之受天命有天下增式廓而大一統者於今二百年洪惟列祖列宗威惠滂流聲名懿鑠幅員之廣教化之洽地理物華之盛官方名事之詳且備羲繩軒駕以來未之有也聖祖仁皇帝始命纂修一統志世宗憲皇帝重加編輯至高宗純皇帝御極之八年甫獲竣事嗣以天威震疊開拓西域地二萬餘里因於四十有九年續有成書疊矩重規經緯翔實皇考仁宗睿皇帝命史館重修未及告蕆爰洎朕躬荷神器付託之重撫茲區宇祗繹乎體國經野設官分職之大溯惟我皇祖皇考所以因時順地變通斟酌者日不輟書使非及時編定俾舊典有所承而後事有所起朕實愧且懼焉茲全書告成沿述於開國之初增輯至嘉慶二十有五年為卷五百有六十非務為繁富以侈示後嗣也我祖宗以仁義中正治天下凡所損益如權衡之於輕重度量之於長短大小即一州郡之升降一官職之分合一臣一民之豫奪彰疸無非本單心之宥密垂為律度布為官禮除繁存質扶條就幹始獲成書實闕略是虞而何繁富之有稽昔禹貢九州為後世方志之祖周禮大司徒以天下土地之圖周知地域廣輪之數漢書郡國志以下紀載日詳唐宋而還若元和郡縣志元豐九域志始專詳地理自為一編顧政教所及皆弗克進及於古惟我朝祖德宗功上繼五帝三王之盛信乎心法治統不異地異民而理攬斯編也即其迹而道載焉矣朕惟乾惕震恐冀迪前光深知守成之難不殊於創始願與內外百執事勉固封守而阜兆民繼自今無疆惟休亦無疆惟恤續有編録視此典型是朕之厚望也夫道光二十二年壬寅十二月二十二日國史館總裁大學士臣穆彰阿等謹奏為接纂大清一統志全書告成恭摺奏聞請旨事竊臣館於嘉慶十六年經方略館奏請將大清一統志移交補纂臣等現已督飭在館各員將全書纂輯繕校完竣共五百六十卷凡例目録二卷陸續恭進伏思纂輯大清一統志卷帙浩煩與臣館常行功課不同恭查嘉慶十七年四月內欽奉諭旨嗣後各館纂辦書籍至一百數十卷以上準其奏請優敘等因欽此欽遵在案此次書成除臣等總裁不敢仰邀議敘外前任提調總纂官今任江南河道總督臣潘錫恩等前任總纂纂修官工部尚書廖鴻荃等均係一二品大員另繕清單恭呈御覽所有應得議敘伏候欽定至在館之提調總纂纂修協修校對收掌翻譯謄録供事等官等臣等核其功課多寡分別一二等咨部給豫優敘其中悉心校勘尤為出力之漢校對內閣中書宗稷辰賀式韓沈維鈺三員可否敕下吏部酌給升班以示鼓勵之處出自皇上格外天恩為此謹奏是否有當伏乞聖鑒謹奏道光二十二年十二月日大清一統志凡例一舊志原成於乾隆八年續成於乾隆四十九年今纂至嘉慶二十五年國家幅員日闢户口日蕃田賦日充人官物産之華日者謹確稽部院寺監並各直省來册詳載以昭重熙纍洽久道化成之盛一志中編次首京師次直隸次盛京次江蘇安徽山西山東河南陜西甘肅浙江江西湖北湖南四川福建廣東廣西雲南貴州次新疆次蒙古各藩部次朝貢各國凡五百六十卷一志自京師以下每省有統部總敘一省大要各府廳直隸州自有分卷凡所屬之州縣入焉蒙古各藩統部分卷悉照各省體例其中間有新增者謹另標出一列聖繼承德威洪鬯遐荒朔漠咸隸版圖其間聖製詩文有關地理者敬謹備載一採用羣書自國史外如日下舊聞考熱河志盛京通志平定準噶爾方略西域同文志西域圖志平定金川方略天下輿地全圖等書旁搜博採確切參稽並照體例登入用光册府一直省列聖巡蹕所經均建行宫惟直隸承德府行殿歲當秋獮駐鑾較久謹按前志特標行宫一門今於興京并仍其例餘就各省疆界山川所在分晰恭載一府廳州縣有升如縣升州州升直隸州廳直隸州廳升府之類降如府降州州降縣之類分如一府中析數縣益他府一縣中割一隅益彼縣之類合如原係二縣今併為一原分屬各府今合為一直隸州廳之類者府與直隸州廳自立專部即於建置沿革門敘清源流及升降分合年分其各州縣除於所轄府州下詳載外仍於本條兼注一直省修葺及新建之城池學校並海嶽江河神廟與諸寺觀等凡在嘉慶二十五年以前奉旨建修及賜名者均據各省來册備載外其各書院及津梁隄堰等有經某官某人增建增修者亦載入一續志學校門各學之下以一書院為綱餘用小注未免有統屬軒輕之分兹仍照乾隆八年前志平列至各府廳州縣入學額數除定額照舊纂入外其有增裁者據各省來册分別記載一舊志統部田賦後不立鹽課關稅專條蓋仿前明李賢所撰統志之例前代鹽法關稅弊竇叢生征求無藝本無成額我朝法制修明恤商輕稅超越前古規條詳備按册可稽今增稅課一門列於各統部田賦之後以昭美善一職官有增設裁汰者於本條下注明舊若干缺某年裁幾缺舊若干缺某年增幾缺本無是缺而新設者注明某年新設亦有既裁而復設者注明某年裁某年復設移駐亦然以類相從旁注於下若無類可歸則於相近之官下注明如舊有通判今裁去者即於本府同知下注舊有通判某年裁之類一四川廣西貴州等省向設有土司官員厯年有裁汰停襲續志悉仍前志今從嘉慶二十五年以前詳悉咨查各省照來册備載一河工海塘事宜謹遵嘉慶二十五年以前所奉諭旨及督撫河臣奏疏所陳節載於各省河海條下一山川古迹關隘等續志以四正四隅為序每致重復混淆今悉照乾隆八年前志先東次東南次南次西南次西次西北次北次東北地勢相接條理較為分明一陵墓除續志所載照舊存録外其自乾隆元年以後至嘉慶二十五年有賜祭葬者一一查核載入至其人事迹己登名宦人物概不重載一名宦人物凡續志所載照舊纂入外其新增者以嘉慶二十五年以前奉旨入名宦鄉賢祠者為據照時代序入一名宦順天府卷中自嘉慶二十五年以前己故之文武大臣有治行卓著曾經奉旨褒嘉入祀賢良昭忠二祠者俱遵查國史載入至諸王及八旗大臣等事迹己詳八旗通志兹不重載其八旗大臣中有職任封疆政績懋著者仍載入各省名宦中一名宦凡統轄全省及轄數府者載入統部知府以下暨武職等官專管一郡一邑者分載各府部間有一人而各省俱載者止就本省本任政績紀録不牽敘別省別任之事以清眉目至名宦人物二門有一人而彼此互見者名宦撮舉政績人物厯序生平自不重復一列女前志從名宦人物之例每人各立專條續志則有專條有附注今核各省來册名數實繁既不能刪此録彼以意棄取亦不能連篇纍牘致乖體裁謹將前志所載貞女烈女烈婦合之續志及新來文册人數尚簡仍舊各立專條注明事實外其節婦人數較多每縣以奉旨旌奬者最先一人為綱注明事實而以其餘彙注於下一新疆涵濡聖教所設安西州鎮西府迪化州等皆督臣所轄既隸甘肅省至伊犂之東西路回部準部自伊犂至和闐舊志已有新疆一門其新疆慕化各藩左右哈薩克等部舊次於蒙古各藩部之後者今悉編附新疆後以類相從便於省覽一外藩各部自內扎薩克察哈爾至喀爾喀青海西藏諸境俱詳核其山水形勢之迹及封爵旗分添設移改并世襲傳次之數照理藩院册籍登記一烏里雅蘇台設有將軍一參贊二統轄唐努烏梁海科布多喀爾喀四部官兵會辦庫倫以西事務并設辦事司員舊志未經晰載今詳考晷度山川卡倫臺站自為二卷附於新疆志之末一外域朝貢諸國均照禮部册籍詳考史志諸書甄載一援引各書各省均於首見之條載明著書人姓氏其再引此書即不重載姓氏以歸簡易一遼金元史中人名地名見於志者均遵新譯改正並注明某某舊作某某今改正等語於各條之下間有一人一地疊見者最先一條業已注明其後見者即注明某某改見前至奉天及蒙古西域等山川地名各土音並照新譯字樣登載大清一統志總目表圖疆域分野建置沿革形勢風俗城池學校戶口田賦稅課職官見直省統部山川古迹關隘津梁隄堰陵墓祠廟寺觀名宦人物流寓列女仙釋土産大清一統志目録上卷一京師卷二京師卷三京師卷四京師卷五直隸統部卷六順天府卷七順天府卷八順天府卷九順天府卷十順天府卷十一順天府卷十二保定府卷十三保定府卷十四保定府卷十五保定府卷十六保定府卷十七保定府卷十八永平府卷十九永平府卷二十永平府卷二十一河間府卷二十二河間府卷二十三河間府卷二十四天津府卷二十五天津府卷二十六天津府卷二十七正定府卷二十八正定府卷二十九正定府卷三十順德府卷三十一順德府卷三十二廣平府卷三十三廣平府卷三十四廣平府卷三十五大名府卷三十六大名府卷三十七大名府卷三十八宣化府卷三十九宣化府卷四十宣化府卷四十一宣化府卷四十二承德府卷四十三承德府卷四十四承德府卷四十五遵化州卷四十六遵化州卷四十七易州卷四十八易州卷四十九冀州卷五十冀州卷五十一趙州卷五十二趙州卷五十三深州卷五十四深州卷五十五定州卷五十六定州卷五十七盛京統部卷五十八興京卷五十九奉天府卷六十奉天府卷六十一奉天府卷六十二奉天府卷六十三奉天府卷六十四錦州府卷六十五錦州府卷六十六錦州府卷六十七吉林卷六十八吉林卷六十九吉林卷七十吉林卷七十一黑龍江卷七十二江蘇統部卷七十三江寧府卷七十四江寧府卷七十五江寧府卷七十六江寧府卷七十七蘇州府卷七十八蘇州府卷七十九蘇州府卷八十蘇州府卷八十一蘇州府卷八十二松江府卷八十三松江府卷八十四松江府卷八十五松江府卷八十六常州府卷八十七常州府卷八十八常州府卷八十九常州府卷九十鎮江府卷九十一鎮江府卷九十二鎮江府卷九十三淮安府卷九十四淮安府卷九十五淮安府卷九十六揚州府卷九十七揚州府卷九十八揚州府卷九十九揚州府卷一百徐州府卷一百一徐州府卷一百二徐州府卷一百三太倉州卷一百四太倉州卷一百五海州卷一百六通州卷一百七海門廳卷一百八安徽統部卷一百九安慶府卷一百十安慶府卷一百十一安慶府卷一百十二徽州府卷一百十三徽州府卷一百十四徽州府卷一百十五寧國府卷一百十六寧國府卷一百十七寧國府卷一百十八池州府卷一百十九池州府卷一百二十太平府卷一百二十一太平府卷一百二十二廬州府卷一百二十三廬州府卷一百二十四廬州府卷一百二十五鳳陽府卷一百二十六鳳陽府卷一百二十七鳳陽府卷一百二十八頴州府卷一百二十九頴州府卷一百三十滁州卷一百三十一和州卷一百三十二廣德州卷一百三十三六安州卷一百三十四泗州卷一百三十五山西統部卷一百三十六太原府卷一百三十七太原府卷一百三十八平陽府卷一百三十九平陽府卷一百四十蒲州府卷一百四十一蒲州府卷一百四十二潞安府卷一百四十三潞安府卷一百四十四汾州府卷一百四十五澤州府卷一百四十六大同府卷一百四十七寧武府卷一百四十八朔平府卷一百四十九平定州卷一百五十欣州卷一百五十一代州卷一百五十二保德州卷一百五十三霍州卷一百五十四解州卷一百五十五絳州卷一百五十六絳州卷一百五十七隰州卷一百五十八沁州卷一百五十九遼州卷一百六十歸化城六廳卷一百六十一山東統部卷一百六十二濟南府卷一百六十三濟南府卷一百六十四濟南府卷一百六十五兖州府