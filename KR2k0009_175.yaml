建隆初劉鋹據五嶺渭脱身北走上書言時務太祖召試稱㫖累官至殿中侍御史改兩浙益州轉運使賜金紫真宗嘉其清節陶紹宗平樂人開寶間從潘美擒劉鋹以功授龍平縣令除鋹苛政境内大治太祖聞其賢擢光祿卿林通富川人仁宗時為御史棄官歸素工詩隱居豹山邑人名其山曰隱山巖曰潛德韓迥昭州人仕至太子中舍嘉祐中引疾歸轉運使李師中高其氣概以詩贈之元光昭平人隱居樂道不求仕進崇寕中鄒浩謫居昭州與光游有贈詩林勲賀州人政和進士為廣州教授建炎三年獻本政書十三篇大要因古井田約税錢米及賦兵馬更番之數婦貢絹綿非蠶鄉者以布麻代書奏擢桂州節度掌書記又上比校書二篇厯指桂地當墾田出穀之數張栻得其書寄朱子謂勲一生用功於此所至有惠政乃廣中人材之卓然者陶致完平樂人紹興進士拜監察御史立朝方正為秦檜所忌解綬歸毛士毅富川人高宗時知石城縣賊李接攻城士毅與尉曰當以死衞百姓遂糾合義丁與賊戰衆寡不敵被執罵賊死贈承事郎毛炳富川人性倜儻不覊乾道中以平寇功授横貴廉三州都巡檢使後交寇犯境死難贈太尉毛温富川人為欽州靈山簿時交阯寇陷欽廉白三州守吏皆望風遁温糾合土豪與戰輒勝賊勢遂挫而遁事聞召對加職明陶秀昭平人事親孝盡以家産付弟知㑹昌縣有以賄入者輒峻却決獄無留滯李時敏平樂人成化時知信宜縣以材武稱嘗與孔鏞共平猺賊以功遷知化州粤人並稱孔李蔣璣恭城人宏治舉人知連城縣縣初無城璣築城鑿濠工甫就而武平賊劉隆鄉亂鄰縣多被剽掠惟連城得全後檄搖它賊輕入被執不屈遇害贈府同知莫駿平樂人正徳舉人累官南京戸部員外郎以廉介稱為諸生時猺賊掠其村母齊氏遇害駿請兵深入俘其賊首以獻仍上兵食戍守之宜為久遠計昭人誦其功李安富川人常熟主簿李昭宗養子嘉靖中倭航海來犯安從昭宗為前鋒屢殺賊後以力寡不支遇害唐世堯平樂人萬厯進士授寕波推官擢吏部主事佐冡宰陸光祖推舉萬國欽饒坤皆以國本建言得罪者隨鐫秩歸中人有採榷於昭者官吏莫敢誰何世堯以大義力折之諸璫側目世堯亦不復出仕居家以孝友稱蕭曰高平樂人崇禎中任峨嵋縣主簿流賊張獻忠圍城日高悉力拒守城破殉難死本朝乾隆四十一年賜諡節愍唐鍾祚平樂人流寇肆虐鍾祚募團練仙迴廣東陳恩兵突入仙迴剽掠鍾祚佩劍率二僕往諭之被執罵不絶主僕皆罹害本朝乾隆四十一年入祀忠義祠本朝張宗璠恭城生員事親以孝聞父没未葬值偽兵至鄉人逃匿璠守父喪不去兵欲毁棺璠以身蔽之刀刃交加幾死不避賊為感動康熙二十年旌甘受調平樂人家頗饒悉以與兄弟甲寅吳三桂之亂晦迹猺山有捧偽檄招之者峻拒之亂平築别業於桃竹山池名曰宛在從遊者皆繞池而舍父疾清夜黙禱乞以身代里有貧而病者割館穀以助駱之塤恭城人同母莫氏避難北流母為兵所執塤哀懇救母兵露刃脇之再四不免母子俱被害袁啟翼平樂人居昭平銅鼓峽閉戸讀書著隱居志恒言五卷詩論序記二卷葩經約㫖歌一卷子景星官翰林提督四譯館太常少卿贈啟翼如其官歐日榮平樂人幼失父兄無賴子奪其産及長貧甚母死不能厚葬每過墓哀號不忍去雖當燕㑹一念及親輒復流涕撫其幼弟倍至嘗著勉學三十餘則以垂為家訓歐陽榛平樂廩生鄉人有逋賦鬻其妻子者榛代贖之又捐金以助婚備棺以恤死饑年則傾資以賑無所惜病篤時焚夙逋舊券而沒毛上習賀縣人康熙二十九年知諸暨縣捐俸賑饑斷事無苛征糧有法立義學邑中寒士若坐春風一時號為清白慈祥在任三年疾卒奠送者塞道吳元琪其先雲南昆明人父􅊹官平樂府經厯父卒遂籍平樂中乾隆辛卯進士由郎中除歸德知府治河有能聲尋降同知簡發福建㑹林爽文亂元琪䕶軍餉助臺灣城守招降莊錫世升浙江知府元琪少孤其友關上達恒周之後官歸餽上達金上達為買田而籍其歲所入之數元琪卒悉以卑其子上達篤於信義附載黃啟宗富川人年二十偕其父拾成鋤地山中虎突出噬拾成啟宗執鋤奮擊虎逡巡舍其父去流寓唐陶英青州人累官太尉天祐初上書指斥時政忤朱全忠以太尉拜征南將軍領兵出鎮昭州蓋逺之也明年全忠篡位英懼解兵柄隱於誕山家焉同時有李尉者以避地來世為婚姻門閥相高居東樂仁里人稱其居為陶李洞宋范祖禹華陽人哲宗時貶昭州别駕安置賀州鄒浩晉陵人徽宗時竄昭州僦居仙宫嶺下所居有清華閣得志拱北二軒五年始得歸黃葆光黟人蔡京使言官論其附㑹交結泄漏密語詔以章揭示朝堂安置昭州洪興祖丹陽人秦檜當國坐嘗作程瑀論語解序語涉怨望編管昭州胡銓盧陵人紹興八年上書力排和議編管昭州周宏易崇寕間佐武郎擢武德大夫由遂寕徙居恭城見縣西平坡中一山亭亭直上遂卜居讀易名曰翠微峯即今之西嶺塞也明鍾行旦筠連人崇禎間知荔浦縣流寇猖獗募丁壯守禦民賴全活㑹親卒遂卜居荔浦之筆村人號筆山先生列女隋鍾騫妻蔣氏臨賀人歸鍾生二子士雄士畧士雄仕陳持節帥嶺南陳主慮其反復執蔣氏於都隋平陳遣歸臨賀既而虞子茂作亂遣人召士雄蔣謂之曰汝若背德忘義我當自殺士雄不敢從亂隋主聞而異之封安樂縣君宋周渭妻莫氏恭城人名荃渭北走時荃尚少父母欲改嫁之荃立誓曰渭非久困者避難遠適必能自奮於是親蠶績碓舂以給朝夕二子皆畢婚娶凡二十六年太平興國初乃復見渭朱昂作莫節婦傳明周祐妻黄氏恭城人祐任龍門敎諭令氏歸侍養老姑舟至曰沙冲口遇寇欲汚之不從與妾李氏僕婦阿㑹俱罵賊被殺林棟女富川人名閨善為賊所刦欲汚之不從被害陳仲鑑妻雷氏賀縣人正德間上下峒猺賊肆行見雷擁之行欲汚之雷罵不絶口賊以刃脇之罵愈厲被殺唐鍾祚妻孫氏平樂人鍾祚團練仙迴崇禎末廣東流賊突入剽掠鍾祚率二僕往諭之皆遇害孫氏偕妾馬氏往收屍為賊所執欲汚之並罵賊死劉鸞妻黃氏荔浦人鸞早卒氏撫孤矢志以夀終按舊志載劉辰秀銅仁人正德中父仁官梧州通判卒辰秀偕庶母張氏郭氏及從兄時復等奉柩過昭平堡值猺賊聚衆刦掠辰秀指江曰萬一不免死此而已賊至辰秀乘間投水死張抱幼女祁秀繼之郭復繼之辰秀時年十六張年二十郭年二十八賊去家人索其尸藁葬昭平江上嘉靖間旌表立祠曰三烈本朝平樂婦不詳姓氏順治七年官軍下平樂婦被執欲汚之婦指所攜二子紿之曰此累我不便次第投二子城下隨以身墮母子俱斃土人即其地瘞之表曰貞節烈婦祝紹煐妻陳氏平樂人夫亡子宏壇甫六月陳撫養成立娶李氏逾年殁殁三日生子華李氏矢志撫孤邑令黃大成旌其門曰雙節存孤後其孤又夭雙婺矛牙凍餒黄給租養之終身焉陳廷禮妻諸氏平樂人事姑以孝聞廷禮早亡撫遺腹子齊孟齊孟又早卒聘貢生林榮女年二十往哭奠執婦禮事孀姑亦以孝聞陳詩妻歐陽氏恭城人值吳逆亂避難山林未幾詩卒詩父及弟亦相繼歿氏年二十三子甫三月又數遭兵火室廬蕩然事病姑撫弱息及遺姪皆成立康熙五十九年旌王文曦妻楊氏富川人夫亡守節與同縣王廷瑄妻熊氏均康熙年間旌陳聖敬妻羅氏賀縣人夫亡守節撫子成立訓孫成名康熙五十九年旌陸九姑荔浦人字劉未婚劉死守志不嫁年至耄耋雷萬春妻黃氏荔浦人年十九守節同縣文鳯奇妻徐氏何龍先之母莫氏蔣暎璧之母向氏妻曹氏葉惠元妻邱氏姚舜裔妻胡氏朱錦菲妻徐氏皆撫孤守節何氏女昭平人治十一順年避兵至思庇冲有卒見女少艾追之幾及女即赴水死黃九英妻李氏昭平人吳逆之變氏避亂至淮灘石磢兵至欲汚之氏襁負幼女紿之曰莫驚吾女因解襁乘間投石磢死董永煌妻徐氏昭平人夫早亡氏年二十一苦志撫孤同縣王大楷妻宋氏王仕煃妻黄氏皆夫亡守節龍騰雲妻莫氏永安人夫早亡攜孤避亂山中備嘗艱苦寇平而歸教子成立同州姚承業妻莫氏妾陸氏同居守節撫孤二子俱列宫牆周氏女富川人馬平教諭何鈴妻未嫁時值兵亂父老母病族人皆逃氏侍父母守志勿去兵感其孝相戒勿驚雍正三年旌熊夢弼妻唐氏富川人年二十夫亡鬻匳歛葬後遂自經以救免雍正八年旌唐美烜妻藍氏永安人姑病篤氏年十九割股作羮以進姑得愈雍正三年旌林鵬雲妻王氏平樂人夫亡守節乾隆二年旌同縣盧瀛妻容氏陳之屏妻閏氏蕭上玉妻袁氏蕭露湛妻閏氏林燽妻吳氏莫聯昇妻廖氏王士達妻徐氏陳齊遵妻胡氏莫大組妻李氏均乾隆年間旌傅肇序妻周氏恭城人夫亡守節乾隆二年旌同縣傅肇元妻張氏張淮南妻周氏容而泰妻龍氏常禮端妻莫氏蔣佐妻葉氏烈婦周奇章妻李氏均乾隆年間旌王廷表聘妻汪氏名粹玉富川人幼讀書喜忠孝節烈事字廷表表年十八卒氏臨尸哀哭納髪棺中曰他日黄泉以相質也終身足不履庭年七十二卒同縣莫尚信聘妻鍾氏王世澤妻義氏汪本淮妻李氏周吉士妻陳氏均乾隆年間旌李挺三妻伍氏荔浦人夫亡守節與同縣蔣増蘭妻楊氏均乾隆二十九年旌獞婦羅氏荔浦人早喪夫誓不易志獞俗少閨範尚聲歌人或以歌誘之正色不為動事姑盡孝撫子成立苦節五十餘年潘士成妻潘氏荔浦人守志捐軀與同縣徐呈裴妻諸葛氏均乾隆年間旌呉維南妻陶氏昭平人夫亡守節乾隆六年旌同縣黎丈第妻莫氏廖存美妻鍾氏黎接三之母董氏均乾隆年間旌馮殿魁妻金氏永安人夫亡守節乾隆四年旌同州陳詩妻伍氏乾隆二十一年旌莫大璣妻蕭氏恭城人夫亡守節嘉慶二十五年旌伍倫修妻梁氏修仁人夫亡守節嘉慶十年旌陳本善妻莫氏永安人夫亡守節同州陳本直妻覃氏陳光典妻陽氏楊遂榮妻黄氏蔣掄達妻杜氏均嘉慶年間旌仙釋宋安昌期恭城人皇祐間舉進士官永淳縣尉解印後即棄家縱㳺山水善歌治平間攜一童往峽山廣慶寺入不復返後見石壁題詩有丹竈非無藥青雲别有梯之句人傳為羽化云明姚二仔平樂人生不茹葷年十五登火𦦨山中峯頂立片篷為起居山頂有池産金絲犬鯉二尾池南有桃一枝結實取啖之時歲旱禱雨司理唐邦教聞其有道行請之果得雨反山後訪之惟餘片篷而已土產金元和志蒙州貢麩金宋史孝宗時廣西提點刑獄李椿奏罷昭州金坑銀元和志昭州賀州富州俱貢銀九域志臨賀縣有太平銀場銅唐書地理志臨賀縣有銅冶在橘山鐵元和志賀州桂嶺縣東南程崗北朝崗並有鐵􅑭錫唐書地理志賀州馮乘縣有錫冶三富川縣有錫元和志臨賀縣北有東游龍中二冶百姓採沙燒錫以取利鍾乳元和志平樂縣東有陽里穴那溪穴皆出鍾乳又恭城縣東銀殿山下有鍾乳穴十二所蕉布寰宇記昭州產紅蕉明統志平樂縣有紅蕉布竹布元和志賀州貢竹布富州貢班布寰宇記昭州產夀竹明統志平樂恭城出筋竹縣婦能以竹作衫充暑服花簟寰宇記賀州貢龍鳳花紋簟弓元和志賀州貢班竹彈弓面千金籐元和志賀州貢蚦蛇膽元和志賀州貢石斛元和志賀州貢白蠟寰宇記賀州寶城場出黎母汁寰宇記賀州貢觜􅏲寰宇記賀州大障山都貴源出夷人取其血以解毒鉛粉寰宇記出富州城北白土坑降香平樂縣出苗蠻猺在平樂府散處林麓貯粟巖竇男女服飾與桂林獞同性耐饑日啖鹽數顆草木皆可食在恭城有三十有五村習俗與平樂畧同在富川有四種曰七都上九都一六都畸零皆來自黔中五溪散處三十六源賦而不役種棉花豆