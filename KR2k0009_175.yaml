梧州上復古要道三篇真宗異而召之郎簡臨安人真宗時知藤州興學養士一變其俗藤自是始有舉進士者梁適東平人康定中知梧州五嶺自南漢時民間折税已重轉運使以調不足復欲折之適為奏免李亨伯龍溪人紹聖二年知梧州興學勸士有政聲蕭盤宣和間權知梧州軍事課農桑興學校百廢具舉暇則引諸儒飲射讀法有古循吏風陳宇莆田人紹興間知梧州歲旱手寫救荒十餘事行之屬縣商米四集人以不饑郡留六萬餘斛建炎盜起増額且半宇累疏得仍舊流亡來歸􅍹獞帖然蔣南金呉郡人嘉定中知容州興學校立貢院在任三年日以敎養為事未嘗有逸遊之舉譚惟寅高要人淳祐中知容州建思賢堂紀元結等五賢善政效其行事趙若銑咸淳中知容州叛賊楊先攻城若銑與戰力屈死之元朱國寶寶坻人至元間以管軍萬户鎮守梧州路安撫司事開誠示義招降黎民蠻峒文魁衡陽人至順中知藤州時經寇亂城邑蕩然魁始立州治修城隍建學校政化大行馮思賢樂城人至正間知藤州律身廉潔御下寛簡民為立德政碑明王清洪武初容州同知時經寇亂民不聊生清繕城隍立學校勸農桑升本州知州何源呉江人洪武十年知梧州府歲饑僚屬議請賑源曰自梧達京師八千里待請民死久矣即發廩賑濟全活者衆龍韜曲江人成化間知容縣容自洪永間屢經寇變民病額輸得韜奏請蠲舊額五之三民困稍蘇翁萬達揭陽人嘉靖中知梧州府時咸寕侯仇鸞鎮兩廣縱部卒為虐萬達縛其尤横者杖繫之閲四年聲績大著陳鑑石屏人萬厯四十五年知梧州府梧城大火公私俱燬民皆露處鑑徒步賑卹申法令以戢姦宄民得復所修龍隄浚鱷魚池瀦水以便民李邦才鶴慶人萬厯中任懷其縣值猺寇謝龍崖作亂邦才單騎入嘉峒營以計擒斬之本朝沈倫景陵人順治八年知梧州府時梧疆初闢倫招徠安集大兵經由郡邑悉心經理纖毫不擾民間後值李定國寇梧力竭城陷不屈而死張繼曾貴州人順治十三年以儀制司郎中為梧州府知府擯絶餽獻時兵戈未靖事日殷繁繼曾請免雜派減差役民困得甦三年卒於官僕從僅二人囊篋蕭然閻玫正定人順治十四年任梧州推官巡按田昇龍行部知玫剛正檄與相隨按逮積蠧論如律時鎮標占據城中民屋玫言之昇龍疏請給還民得復業劉廣國潛江人順治十四年知岑溪縣地經土鎮殘害頻年不耕民採蕨充食廣國為給牛種俾墾荒田縣糧不滿五百石而逋者皆窮民廣國不忍催科遣家人歸取金代償之陳緯臨胊人順治十八年知蒼梧縣慈惠廉潔精敏敢為有巨豪以姦事行毒殺一儒生緯鞫得其實獄具尋為有力者賄釋之緯立取置之法人皆稱快再期卒於任篋笥蕭然楊廷耀遼東人康熙四年任梧州通判土賊唐三蠻等屢刧官餉廷耀捕斬之盜患遂息分榷梧關刋定税貨則例按往來船户人給一紙吏役乃不敢苛索署容縣事李定國餘黨竄踞大榮山連接猺獞廷耀以計擒逐遠近帖然羅文舉永定人梧州守備康熙十四年寇犯藤縣奉調應挼奮勇殺賊陷陣死事聞詔贈官予祭葬余鑲紹興人任容縣大峒司巡檢康熙丁丑廣東賊禾倉二烏肉蛇嘯聚岑溪六垢山甫約期㑹勦而賊刦古例村鑲率兵追至六垢殺四賊賊設伏山間鑲力戰死之張義新興人康熙四十三年知岑溪縣廉介自持革排門月夫諸例以除民累訟者即日剖斷胥役無能為弊張若霈桐城人康熙六十年由同知治中遷梧州府知府團練鄉勇嚴飭保甲盜賊屏迹梧州有榷税之廠往往因縁為姦若霈處膏不潤商賈稱便雍正十年祀名宦人物漢陳元蒼梧廣信人父欽習左氏春秋元少傳父業為之訓詁建武初與桓譚杜林鄭興俱為學者所宗時議欲立左氏傳博士范升以為左氏淺末不宜立元詣闕上疏與升相辨難凡十餘上卒立左氏學元以才高著名辟司空李通府時大司農江馮上言宜命司隸校尉督察三公事下三府元上疏言不宜使有司有察公輔之名帝從之通罷元復辟司徒歐陽歙府數陳當世便事及郊廟之禮以病去子堅卿有文章丁密岑溪人性清介非家織布不衣非已耕種不食毫髪之饋不受於人父喪廬墓有雙鳬遊廬旁小池見人馴伏後遭母喪復廬墓三年雙鳬復至人以為孝感頓琦蒼梧氏居母喪獨身築墳厯年乃成手植松柏成行哀毁踰制有飛鳬白鳩棲息於廬間申朔蒼梧人性廉慎終身不綺紈舉孝廉為九真都尉後擊賊有功鄧盛蒼梧氏為秭歸令聞母病解印綬決去及歸母卒居喪盡禮太尉馬日殫嘉其孝行尋為太尉諸曹掾時彭城相左尚以贓獲罪三府椽屬考驗踰年不竟更選盛覆考盛至獄沐尚解械賜席尚感盛至意即引筆具對時人語曰淑問得竟臯陶鄧盛衡毅蒼梧氏少員勇畧與同郡錢博皆為太守吳巨所信用建安末巨為步騭所殺毅念部曲舊恩且騭之來非漢命乃興軍逆騭於蒼梧高要峽口與戰騭幾敗㑹毅少却騭乘之遂潰毅與衆千餘人皆投水死三國吳士燮蒼梧廣信人父賜桓帝時為日南太守燮少游學京師事潁川劉子奇治左氏春秋察孝廉厯遷交阯太守獻帝賜燮璽書進綏南中郎將督七郡領守如故時道路斷絶而燮不廢職貢詔拜安遠將軍封龍度亭侯建安十五年孫權遣步騭為交州刺史加燮左將軍復遷衞將軍封能編侯燮體氣寛厚謙虛下士中國士人往依避難者以百數耽玩春秋為之注解在郡四十餘年卒士壹燮弟初為郡督郵辟司徒府黄琬為司徒甚禮遇董卓作亂壹亡歸鄉里燮表壹領合浦太守次弟䵋九真太守弟武海南太守兄弟並為列郡當時貴重百蠻震服唐李堯臣鐔津人貞觀中進士累官至交州刺史賜其里門曰登俊宋陳坦然蒼梧氏景德中宜州兵殺守將脅判官盧成均以叛攻象州坦然以成均同郡單騎射書賊圍為陳禍福賊分黨南掠趨容縣境坦然復抵賊壘諭降之後佐桂州幕仕至殿中丞潘盎蒼梧人皇祐中儂智高陷邕乘勝至蒼梧召盎問曰吾欲奄有嶺南為王何如曰殄滅不久何王之有智高大怒遂害之盎容色不改李用謙藤縣人紹興初厯侍御史司諫著直聲上時政十六事切中利病後官國子祭酒諸生服其學行從子奉政知和州論割棄唐鄧海泗四州與金人和不可累官翰林學士元封履孫容縣人天厯間進士為藤州學正遷知邕州以廉明著子盛甫善古文詞著有容州人物記熊天錫岑溪人博學多才以賈似道當國不應試明李觀智蒼梧人永樂中由舉人累官至廣東嶺西道景泰中蠻寇起巡撫王翺以觀智諳土俗委之撫諭大藤諸寇悉降宋欽蒼梧人永樂間由舉人累官至湖廣叅議正統十四年麓州亂尚書王驥西征欽督餉不避艱險厯官湖廣布政致仕天順六年寇陷梧州欽罵賊遇害吳廷舉蒼梧人成化進士正德初厯廣東副使條奏太監潘忠二十事語侵劉瑾詔下獄幾死戍雁門瑾誅復官擢副都御史時寕王宸濠蓄異志廷舉陳江西軍政六事為豫防計世宗初累升南京工部尚書卒諡清惠弟廷弼宏治舉人廷舉下獄瑾禁勿通飲食廷弼竊饋餉之廷舉荷校吏部前廷弼卧其械下刑部主事宿進為奏記張綵乃得釋甘思忠蒼梧氏性至孝母卒廬墓三年聞陳獻章講學往從遊都御史林廷選薦授藤縣丞余全藤人性至孝成化間賊陷城執其母去全持金贖之賊索無厭全乞以身代母遂被殺而母得脫霍榮藤氏正德間舉於鄉廬墓盡禮娶瞽婦終身不置妾置義田以恤宗族知陽江縣以禮義諭賊賊為解散本朝曽士揚蒼梧人性聰穎少舉於鄉潛心程朱之學訓迪後進肅然有規矩雖燕居必盛服端坐隆冬酷暑手不停披郡邑乘多其手輯張爾修蒼梧人性至孝父早卒以力養母折節讀書固窮不墮康熙十三年呉三桂叛偽鎮蜂起其壻高熊徴屢以鄉兵破賊賊恨之岑溪陷爾修絶粒死高熊徵岑溪人順治副貢康熙十三年呉三桂搆亂孫延齡叛據廣西遠近震讋熊徴為平滇三䇿并討賊檄獻總督金光祖偽總兵陳士龍據岑熊徵集鄉勇斬之遊擊唐鳳來鎮守請熊徵共商機宜屢破賊兵擒斬偽總兵林萬勝孫容客等又隨鳳赴肇破賊於封川擒偽總兵呉天偉大將軍傅宏烈復梧州署熊徵團練同知尋補授桂林府敎授繼調思明後擢知井陘縣㑹廣西巡撫彭鵬至廉知熊徵守城破賊事特疏薦之授兩浙鹽運使李茂岑溪人康熙十三年吳逆叛亂茂鼓勵鄉勇殺偽總兵陳士龍民賴以安後賊踞岑溪茂被執奮恨而死覃石長懷集氏康熙時其母被虎攫去石長奮擊虎虎棄去復回顧以身當之母子得全鍾大器懷集人庠生父早故母李氏多疾躬事湯藥不假手僮婢三十餘年如一日及母卒建祠屋測肖父母像祀之廖標岑溪人舉於鄉有孝行居喪三年不飲酒食肉時鬱北遭兵後難民無所歸標輙收食之并贖還子女之被掠者流寓宋秦觀高郵人徽宗立由雷州放還至藤州出遊華光寺為客道夢中長短句索水欲飲水至笑視之而卒高登漳浦人以忤秦檜編管容州謫居授徒家事不以介意列女明廖紹祿妻阮氏蒼梧人少寡家貧紡績撫孤鄰舍火起延燒及夫柩氏慟哭願與俱焚天忽反風火至門而滅高翀妾覃氏岑溪人崇禎末從翀避寇岑溪翀與妻相繼卒遺孤幼弱覃孑身守志紡績課讀子得成立鄉里稱其志節潘聰妻傅氏懷集人夫客死氏誓曰吾必從地下遺骸歸潛縊於寢邑人為建節婦祠譚氏女懷集人名顯姑山寇刦其家見顯姑有殊色掠之去投石橋下死李洪嗣妻梁氏懷集人崇禎末賊破寨氏被掠引頸就刃不受污時稱其烈本朝陳齊孟妻諸氏蒼梧人未嫁而夫卒氏奔喪誓死不再字一日迎其母至家曰兒死在旦夕恨未遂孝養之志耳言畢入室端坐而逝距其夫死八年及葬櫬至夫墓忽自墜遂合窆羅文燦妻馮氏名秀瓊蒼梧氏幼喜讀書未嫁夫卒瓊易服求奔喪父不許瓊退泣私語婢曰我志已決湘君招我矣是夕出門投大江死蘇祚灝妻甘氏蒼梧人夫亡守節康熙二十一年旌譚清祥妻吳氏藤縣氏夫亡守節與同縣蘇嗣陸妻胡氏均雍正十三年旌羅二酉妻蘇氏岑溪氏夫卒無子氏勤織絍養舅姑雖菜羮疏食每旦必攜至夫墓所同縣李蕃春妻高氏廖言恒妻李氏均雍正年間旌譚現茂妻李氏蒼梧人年二十四守正捐軀乾隆三十一年旌同縣梁豆祚妻易氏蘇汝梗妻覃氏黄贊妻黎氏均乾隆年間旌黄懋文妻陸氏藤縣人守正捐軀乾隆五十五年旌同縣陳汝瑾妻蘇氏陳嗣實妻唐氏均乾隆年間旌陳成宇妻黄氏容縣人守正捐軀乾隆五十七年旌梁上珍妻羅氏岑溪人夫亡守節乾隆十九年旌同縣高若攀妻蘇氏李章妻鍾氏周尚顯妻張氏鍾連振妻馮氏馮天位妻林氏高若廉妻李氏凌厲恭妻高氏廖鳳林妻呉氏曾作志妻雷氏李秀春妻廖氏均乾隆年間旌黄文朝妻韋氏藤縣人夫亡守節嘉慶六年旌車惠文妻祝氏容縣人守正捐軀與同縣節婦陳宏庠妻周氏均嘉慶年間旌土產桄榔木嶺表録異如竹紫墨色皮中有屑如麪可為餅食龍眼荔枝婆羅蜜白石英元和志梧州貢蚦蛇長十丈以婦人衣投之則蟠互嘉魚嶠南瑣記出蒼梧火山下丙穴杜甫詩魚知丙穴由來美即此體圓小多脂十月間始出又藤江出鯖魚膽石羊血桑寄生金志出蒼梧長洲者佳金楛欖府志出藤縣苗蠻猺府境皆有之在蒼梧居大山中居止無常伐木為業性淳樸在藤縣居永順永化二鄉耕作采樵性悍嗜利在容縣椎髻短𥜗穿耳炙蹠性好遷徙家無蓋藏在岑溪言語坳僻山棲露宿畏痘疹中者輒徙家避去在懷集皆盤姓刋木畬禾居高山者生不蕃而性稍淳居牛欄古城銅鏟金鵞湖必諸山者其性悍無禮而易亂獞在蒼梧縣俗輕悍椎髻炙蹠刻本以契男女裙衫以絨繡在藤縣居大黎里楊峒里大任里習俗與猺同在容縣與􅍹雜處風俗服飾亦同在懷集素獷悍明萬厯十二年姑知畏法黎本出廣東蒼梧鬱林諸郡間亦有之俗貪愚而悍不爱骨月重牛不盡耕作常屠食之求人貸牛以妻為質或易其子又一種性俗頗與獞同而重信約商人出入貿易與之無欺則款如戚有所稱貸亦不至吝蜑其種未詳何出以船為家以魚為業性粗蠢不諳禮數入水不沒每為客泅取遺物性耐寒隆冬單衣跣足畏見官府有訟之者即飄竄不出在蒼梧縣計二百九十八有蜑頭二名領户之纂修官臣李紹昉恭纂臣蔣立鏞恭纂提調官前總纂臣鄭紹謙恭覆輯校對官臣呉廷珠恭校
