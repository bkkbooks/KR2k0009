body:
  text: 平樂府在廣西省治南少東一百八十里東西距一千四十里南北距二百七十里東至廣東連州連山縣界五百六十里西至潯州府平南縣界三百八十里南至梧州府蒼梧縣界二百六十里北至桂林府陽朔縣界十里東南至梧州府懷集縣界二百里西南至梧州府藤縣界四百七十里東北至湖南永州府永明縣界一百里西北至陽朔縣界六十里自府治至京師七千六百四十里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州之域周為百越地秦為桂林郡地漢為蒼梧郡荔浦富川馮乘謝沐臨賀等縣地三國吳分置平樂縣屬始安郡晉因之宋屬始建國齊仍屬始安郡梁陳隋因之唐武德四年於平樂縣置樂州貞觀八年改曰昭州元和郡縣志取境内昭潭為名天寶初曰平樂郡乾元初復曰昭州屬嶺南道五代初屬楚周廣順元年屬南漢宋仍曰昭州平樂郡屬廣南西路元大德中改平樂府屬廣西道明屬廣西布政使司本朝因之屬廣西省領州一縣七平樂縣附郭東西距八十里南北距一百里東至昭平縣界七十里西至桂林府陽朔縣界十里南至昭平縣界七十里北至陽朔縣界三十里東南至昭平縣界一百十里西南至荔浦縣界五里東北至恭城縣界六十五里西北至陽朔縣界六十里漢蒼梧郡荔浦富川二縣地三國吳甘露元年分置平樂縣屬始安郡晉至隨因之唐武德四年於縣置樂州後為昭州治五代及宋因之元明為平樂府治本朝因之恭城縣在府東北一百七十六十里東西距里南北距一百四十五里東至富川縣界一百二十里西至桂林府陽朔縣界五十里南至平樂縣界十五里北至湖南永州府永明縣界一百三十里東南至平樂縣界三十里西南至平樂縣界五里東北至湖南永明縣界六十里西北至桂林府臨桂縣界一百四十里漢富川縣地三國吳以後為平樂縣地唐武德四年始析置恭城縣屬樂州後屬昭州五代及宋因之元明屬平樂府本朝因之富川縣在府東少北二北距一百七十百六十里東至里東西距六十三里南湖南永州府江華縣界六十二里西至恭城縣界一里南至賀縣界九十里北至恭城縣界八十里東南至湖南江華縣界五十里西南至昭平縣界一百三十里東北至湖南永明縣界七十里西北至恭城縣界八十里漢置富川縣屬蒼梧郡後漢因之三國吳改屬臨賀郡晉及宋齊以後因之隋初屬賀州大業初改屬始安郡唐武德四年仍屬賀州天寶初改曰富水㝷復故五代宋元因之明洪武九年改屬平樂府本朝因之賀縣在府東南三百七十里東西距二百九十里南北距一百八十里東至廣東連州連山縣界一百九十里西至昭平縣界一百里南至梧州府懷集縣界一百十里北至富川縣界七十里東南至廣東肇慶府開建縣界一百八十八里西南至梧州府蒼梧縣界一百七十里東北至湖南永州府江華縣界二百四里西北至昭平縣界七十里漢置臨賀縣屬蒼梧郡後漢因之三國吳黄武五年置臨賀郡晉因之宋泰始五年改曰臨慶國齊復故隋平陳廢郡置賀州大業初州廢又廢縣入富川縣十二年復置臨賀縣仍屬蒼梧郡唐武德四年復於縣置賀州天寶初改臨賀郡乾元初復曰賀州屬嶺南道五代因之宋亦曰賀州初屬廣南東路大觀二年割屬廣南西路元曰賀州屬廣西道明洪武二年省臨賀縣入州十年改州為賀縣屬平樂府本朝因之荔浦縣在府西少南七十五里東西距九十里南北距六十一里東至平樂縣界六十五里西至修仁縣界二十五里南至永安州界十五里北至桂林府陽朔縣界四十六里東南至平樂縣界四十五里西南至永安州界三十里東北至平樂縣界五十五里西北至桂林府永福縣界九十里漢置荔浦縣屬蒼梧郡三國吳改屬始安郡晉以後因之唐武德四年於縣置荔州貞觀十二年州廢縣屬桂州五代宋元因之明宏治四年改屬平樂府本朝因之修仁縣在府西少南一百二十里東西距一百二十五里南北距二十五里東至荔浦縣界十里西至柳州府雒容縣界一百十五里南至大峒諸猺界二十里北至荔浦縣界五里東南至永安州猺界七十五里西南至柳州府象州界一百十里東北至荔浦縣界五里西北至桂林府永福縣界一百十里漢荔浦縣地三國吳分置建陵縣屬蒼梧郡晉因之宋屬始建國齊曰建陵左縣屬始安郡梁置建陵縣隋因之唐初屬桂州貞觀元年於縣置宴州十二年州廢還屬桂州長慶元年改曰修仁五代因之宋熙寕四年省為鎮入荔浦元豐初復置仍屬桂州元因之明初屬桂林府宏治四年改屬平樂府本朝因之昭平縣在府南一百二十里東西距二百十里南北距一百九十五里東至賀縣界一百八十里西至永安州界三十里南至梧州府蒼梧縣界一百四十里北至平樂縣界五十五里東南至賀縣界一百七十里西南至梧州府藤縣界一百八十里東北至富川縣界一百四十里西北至永安州界九十里漢臨賀縣地梁分置龍平縣兼置靜州及梁夀靜慰二郡隋初郡並廢大業初州廢以縣屬始安郡唐武德四年復於縣置靜州貞觀八年改曰富州天寶初改開江郡乾元初復曰富州屬嶺南道五代因之宋開寶五年州廢以縣屬昭州熙寕八年改屬梧州元豐八年還屬昭州宣和中改曰昭平淳熙六年復曰龍平元屬平樂府明洪武十八年省入平樂縣萬厯四年復置昭平縣仍屬平樂府本朝因之永安州在府西南一百八十里東西距一百二十里南北距一百八十八里東至昭平縣界三十里西至修仁縣界九十里南至梧州府藤縣界一百十里北至荔浦縣界七十八里東南至昭平縣界三十里西南至潯州府平南縣界二百里東北至昭平縣界六十里西北至荔浦縣界四十里漢荔浦縣地隋開皇十年分置隋化縣屬始安郡唐武德四年改曰立山於縣置南恭州貞