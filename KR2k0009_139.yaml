都中煦之以恩懾之以威乃皆悦服郴民染蠻俗喜鬬爭都中乃大治學舍作禮樂器延宿儒敎學其中以義理開曉之俗為之變鄰州茶陵富民譚乙死無子惟一妾及其贅壻妾誣壻拜屍成婚藏隱玉杯夜明珠株連八百餘人宣撫委都中窮治悉得其情而正其罪州長吏而下計贓至一萬五千餘緡人以為神明社堅洪武初知興寕縣時當草創城亦榛蕪堅至撫輯離叛削除草萊官廨以次建立數年百廢具舉民安物阜戴用洪武中知興寕縣政尚體要歲大旱率僚屬禱於仰竈龍潭石燕飛集冠上俄而大雨境内霑洽年榖遂登呉志盛永樂中知興寕縣境多虎害志盛誠心告神虎遂遁去吕棠濟寕人宣德中知郴州政聲著聞凌樂化州人宣德中知桂陽縣善於造士諸生讀書至夜分嘗微行訪之見篤志者輙加奬勸或攜茗粥供之學宫基狹割俸買地擴而廣之林廷贊象山人天順中知永興縣練達吏事剛正不憚權勢以詢訪物害爲急曰除害所以安民也程瓊永豐人正德中知興寕縣時猺寇大作瓊悉心捍禦七晝夜寇遁去瓊改作舊城高厚各倍之又慮城中無水不可守開渠引水入城民甚賴焉鄧文靖州人爲郴桂守備有勇名後家居正徳間賊寇桂陽巡撫檄文討賊時賊衆甚盛文力戰於雙魚嶺至太平援兵不至見執不屈罵賊死周珮廬陵人正德中知永興縣創築城垣身任勞瘁顧斌華亭人正德中知興寕縣專務德化不事𫾣扑趙恂馬平人嘉靖間知郴爲政寛平二年乞休民拜泣車下者以萬計幾不得行徐兆先番禺人嘉靖間知桂陽縣嘗開三龍水道以殺其險辨鑛砂之妄禁止採冶劉應魁曲江人隆慶間知興寕縣時峒猺弗率議欲剿之應魁建議招撫活千餘人李敎吉水人萬厯中知宜章縣莅任七載清慎如一發倉賑饑修學課士創三星橋亭治龍邨山路之險者具棺瘞遺殍去任四十餘年士民追思其德興後令朝邑薛蓁沐陽鄭希程南海梁必登太原劉珍銅仁楊􅖌東莞羅宏諭並祀號七賢祠周朝重富順人萬厯中知興寕縣政尚嚴明豪猾斂迹調任零陵民祠祀之崔世召福建人天啟中知桂東縣培養士氣體察民情文學政事藉藉人口謝承任崇禎四年以指揮守桂陽縣粵賊鍾霖陷城知縣傅大聲逃去承任拒賊被執抗不屈膝賊剜其膝支解之楊本厚䳽慶人崇禎中知宜章縣臨藍礦賊作亂四省㑹剿之師雲集宜章本厚供資糧飭守禦賊三犯宜章擊卻之按坑寇紀略作楊守厚劉熙祚武進人崇禎中知興寕縣姦民啖斷腸草脅人財物熙祚令民以是草贖罪因草致死者勿問草以漸少弊遂止課最爲御史復巡按湖南死難諡忠毅閻廷諭甘肅人崇禎中知興寕縣修繕城垣撫卹猺獞民立祠祀之稱閻侯祠馬士達和州人崇禎中知興寕縣張獻忠陷城士達治叛黨數十人復之母崇正四川人崇禎中知桂東縣十六年張獻忠陷衡郴遣賊狥桂東衆皆竄走崇正曰吾為朝廷守土敢愛死乎賊至執之不屈死焉本朝汪震元歙縣人順治初知桂東縣時新被苗寇居民無百家震元捐資葺茅屋招徠逃户貧不能耕者給牛種躬攜酒肉履畝餉勞之由是流移漸集荒畝盡墾民得蘇息范廷謀鄞人康熙中知郴州修學校建濓溪祠置義冢城南火禱之反風而滅苗民傳頌之楊蒧犍為人康熙中知宜章縣有善政邑人建祠清水灣與明楊本厚合祠號二楊祠耿念劬𣏌人康熙中知興寕縣招逋逃給牛種屏去陋規請豁荒糧六百石與民休息謝乃實福山人康熙中知興寕縣重修學宫建二業書院力行保甲法以弭盜李欽遼東人康熙中知桂東縣當呉逆平後百計招徠流亡給以牛種民喜復業軍事已息一切供億不急者悉請罷之值大旱患疫欽為施糜及藥全活無算卒於任無以為殮民爭輸粟殮之縞素泣送境外數百里何矞雲錢塘人康熙中知桂東縣築問雨莊以勸農敎民廣植麻芋以備旱建義學貯經史月課生童修城浚隍百廢具舉胡星高密人雍正中知宜章縣以廉恥勵士行士或涉爭訟皆感愧相戒擢知郴州政蹟愈著沈維基海寕人乾隆中知永興縣以勤吏治得民尤喜造就著課士錄攝州事亦有善政人歌思之徐祖昌路南州人乾隆中知桂東縣嚴明善斷課士克勤捐俸購田為諸生膏火調任永明卒於官至無以殮李允性翼城人乾隆中知興寕縣改建學宫創立書院聽訟明決訟牘一空歲旱步禱雨立應衞詠猗氏人乾隆中知桂東縣設里保投匭法獲盜若神江右逆匪不敢入境胡純慤黄陂人乾隆中知桂陽縣修學校試院政尚慈惠及去任即濓溪祠祔祀之羅紳蒼梧人乾隆中知桂東縣值歲大祲開倉以賑不足則捐俸為之倡率富民平糶義榖民賴全活為建坊表其德劉爾芊昌樂人乾隆中知瀏陽縣以敎飬得民著聞擢知郴州首清積案勤課農桑捐置東山書院膏火州多荒山作歌辭勸民種植不數年成沃土奉檄撫辰永難民以積勞卒士民悼之袁珥寕都人乾隆中知永興縣土俗輕生圖􅊣人以為利珥為窮治屍屬不輕驗俗遂變捐置安陵書院膏火田在任八年亷儉如一民至今思之叢之鍾如皋人乾隆中知桂東縣劇賊郭鳳臺兇而狡徒黨甚衆胥役多為之耳目獲輒逸去之鍾至有愬者陽不理嗣出其不意捕之置于法合邑稱快凡訟涉倫紀必反復譬喻聽者悦服後調知零陵長沙以勞勩卒縣人不遠千里賻之熊德慎新建人嘉慶九年知桂陽縣倡修山店江橋改拓義學禁礦冶開采以勞瘁卒貧不能歸士民爭賻之祔祀濓溪祠人物晉谷儉桂陽人少有志行寒苦自立博涉經史湘州刺史甘卓備禮舉為秀才儉辭不獲命州厚禮遣之諸州秀才聞當考試皆憚不行惟儉一人到臺遂不復䇿試儉恥其州少士乃表求試以高第除中郎於時南土凋荒經籍道息儉不能遠求師友惟在家研精雖所得實深未有名譽又耻衒耀取達遂歸終身不仕南北朝梁廖沖桂陽人以儒術知名仕爲主簿西曹祭酒時武帝好儒學嘗命賦詩稱上意嘉賞之湘東王就國請沖爲常侍沖以根本撥天下不能久治挂冠歸田里唐孟琯郴州人元和五年試洪鐘待撞賦舉進士第爲韓愈所器重嘗送以序稱其年甚少禮甚䖍於文無所不能琯所著有嶺南異物志劉瞻其先出彭城後徙桂陽舉進士博學宏詞皆中徐商辟署鹽鐵府累遷太常博士咸通十一年以中書侍郎同中書門下平章事同昌公主薨懿宗捕太醫韓宗紹等送詔獄逮繫宗族數百人瞻上疏固爭罷爲荆南節度使路巖韋保衡從爲譖言貶驩州司戸叅軍天下謂瞻鯁正特爲讒擠舉以爲寃僖宗立復以中書侍郎同平章事瞻爲人亷約所得俸以餘濟親舊之窶貧者家不留儲無第舍四方獻饋不及門行已終始完潔弟助性仁孝姿穎悟㓜時與諸兄游至飲食取最下者及長能文辭喜黄老言年二十卒宋曹靖郴縣人内行孝友當官所至有政績嘉祐中爲益陽令邑多虎所在設機穽靖至命盡去之引為已罪踰月虎遂遁去先時仕家與吏攬納為姦民輸粟者多倍征靖令民以數自納有舊令客死其子貧甚為人傭書靖與資令納婦後病死又殮之民間有家產而無子者瀕死以二女屬其弟令撫嫁之後弟悉背其言靖聞之杖其弟而壻其二女朱輅桂陽人紹聖進士授湘陰尉詔開監鼓鑄使者欲改嶽麓書院為之輅抗言鄉校不可毁使者困之輅不為懼遷長垣宰羣盜屏跡未幾判邵州統制長倩殺江華叛蠻降者百餘人以首級分賣將士又舉人唐貢引叛蠻至戮錦田一千三百餘家民因蠻叛羣起為盜兩獄株連千人潭帥橔輅往推治鞫留三十八人餘悉保釋擢知郴州有甘露降於州廨松下踰月地猶潤人以為善政所感改知邵州有私酤家率同惡人擊尉傷足鞫勘獄具而遇赦輅曰承平日久頑民强横不可長復收繫以聞詔令刺配河北既得代以母老不仕母勸勉之出不得已乞近家便養授桂陽監使之任十月即致仕歸何先覺桂陽人建炎二年進士判横州軍弭盜除姦勸農訓士著有耕桑治要備二卷過洪崖嶺途遇巨石馬蹄齧不前令人掘起乃呉道子所畫夫子立顔子從二石像舁至横州學為之記陞連州太守治行尤著士民愛戴如父母黄觀象興寕人居父喪未嘗見齒啟窆封樹皆親為之墓側有芝草生人以為孝感所致服闋猶廬墓郡守上其事賜粟帛蠲徭役以旌之雷應春郴州人嘉定進士分敎岳陽除監行在都進奏院輪對稱㫖擢監察御史疏忤時相罷歸築亭北湖上曰鷗盟隱居九年除知臨江軍至郡以臨江不可築城欲城新淦緩急可以當吉袁之衝當道難之後臨江卒為敵破人服其先見有詩集傳於世元彭若舟永興人至正間賊四起攻縣官吏棄印遁歸都帥以若舟攝縣事若舟度縣南山險曰飛鵞砦四面甃石築室其中令民避冦者入居之又於金陵鄉王相山下築石堰障水灌田萬餘頃號相公堰至今利之明鄺子輔宜章人以薦舉為本學及長泰訓導清慎有學諳知政體薦擢安福知縣不就改句容敎諭子埜為聗西副使嘗寄子輔紅罽一子輔貽書責曰汝司刑當洗冤澤物以無忝厥職何從得此罽乃以汚我耶黄茂性桂東人剛直有治才洪武中為應天府尹疏剔沈滯應接如流時稱神明歐必永桂陽人由歲貢官吏部主事永樂間告歸適寇陷桂陽罵賊不屈死鄺埜子輔子永樂進士授御史成祖在北京或奏南京鈔法為豪民沮壞遣埜亷視衆謂將起大獄埜執一二市豪歸奏事遂已營造北京投夫鉅萬多病疫埜稽省存恤全活甚衆時有言秦民聚衆謀不軌者擢埜陜西按察副使勅以便宜調兵剿捕埜白其誣詔誅妄言者正統中累遷兵部尚書額森入寇王振主親征埜力諫不聽車駕次宣府埜請急驅入關嚴兵為殿不報師覆于土木埜死之詔贈少保成化初謚忠肅額森舊作也先今改正王庭桂郴州人景泰中任江西贑州府同知時流賊掠境庭桂率民禦戰死贈布政司右叅議朱英桂陽人正統進士授御史景泰間議易儲英泣陳不可弗聽總督兩廣兼巡撫英首薦陳獻章膺辟召時將臣多張賊勢以邀功黷武英加意撫綏購首惡誅之全活者萬計招撫諸山猺獞歸化復業増户口二十餘萬加右都御史再平田州黄明之叛戢安交阯令修職貢還朝掌都察院事加太子少保卒官贈太子太保正德中追謚恭簡李端興寕人天順進士知固安縣築甄家口除水患流亡復業者七百餘户擢知灤州政治益進民為謡曰大户怕小户喜再過一二年家家有餘米累遷知杭州府所至有異績曽鑑桂陽人天順進士授刑部主事通州民十餘輩坐刼盜鑑辨以誣宏治初累遷工部尚書内府供奉請改造龍毯素毯一百有奇針工局乞收㓜匠千人鑑皆力諌又請罷上元煙火以水旱乞停龍虎山上清宫諸營繕並從之正德初請罷蘇杭諸府織造與吏部尚書韓文疏請誅劉瑾時有詔拓皇親夏儒第賜鎮守鳳陽中官黄準旗牌鑑皆引義力爭卒官贈太子太保鄧庠宜章人成化進士授行人屢使諸藩餽遺一無所受擢御史巡按陜西錄囚多所平反貴州苗賊為患命庠往勘庠至亷得苗人爭地讐殺狀單騎詣賊巢諭以禍福降之巡撫河南疏糾鎮守太監廖堂兄弟不法事上即逮捕朝野快焉仕終南京户部尚書曾䡵永興人成化進士授刑部主事平陽府有訟田者久不決薊州衞有被誣坐殺人罪者繫獄十年命䡵往訊皆得其情擢知紹興府政尚寛簡李邦憲端子弱冠領鄉薦第一上春官不第歎曰科第可以榮身不可以治心遂棄舉子業專意性命之學奉母以孝聞待異母弟無間言著五行日補奚囊雜韻諸書崔巖郴州人成化進士性鯁介由戸部主事累遷江西河南左右布政練達勤慎卓有清操巡撫大同奬率士卒奏捷者再晉工部侍郎正德中羣璫用事奢泰不經巖抗疏力爭卒以此忤權倖兩繫詔獄劉瑾敗乃得釋曾全䡵子成化進士授户部主事時彗星爲變全抗疏陳時政四事且言都御史屠滽不法遂以他事繫獄被放居家二十餘年著有尋樂槁高應先宜章人成化進士授行人奉伙朝鮮餽遺一無所受擢御史巡按大同多所建白會劉瑾擅柄以病告歸瑾敗累詔起復官至四川參政喻江郴州人官百户正德間峒寇爲亂江營宜章之章橋遇賊死之何孟春郴州人少頴異稱奇童宏治進士厯官兵部郎中嘗使山西清馬政還上五事並劾撫臣不職朝廷韙之累擢太僕少卿究極馬政利害兵部著爲例武宗朝嘗欲取馬價他用孟春立言不可竟止巡撫雲南諸蠻據險爲叛有妖蟒能爲霧孟春爲文祭之蟒遂飛去因進兵克捷奏設永昌府嘉靖初爲禮部侍郎世宗用張璁言更議大禮尊興獻王爲皇考孟春前後三上疏力爭又偕百官伏闕號泣上怒奪俸調南京工部遂引疾歸孟春博究經史臨事敢言隆慶初贈禮部尚書謚文簡歐陽春郴州人㓜孤事母孝母病躬湯藥達旦弗寐以歲貢任全州訓導薦轉魯府伴讀春性忠厚不彰人過嘗有盜竊其家春見之卻立不進亦終不發其事范輅桂陽人正德進士授行人擢御史清理江西軍伍因言宸濠并鎮守太監畢真過惡被逮下詔獄謫龍州宣撫司經厯宸濠敗起厯福建按察布政二使並有惠政范永鑾桂陽人正德進士督福建學政又改山西兵備副使厯四川右布政使所至有聲致仕歸念桂陽僻邑書籍罕至購春秋諸書兩漢書朱子大全大事記等書二十種貯學以備諸生觀覽崔士英巖子以父廕讓季弟士亷後以歲貢任龍泉敎諭陶鑄多士貧者多捐俸濟之李顯桂郴州人嘉靖四十二年賊入其家執父及繼母去顯桂率弟追賊擒一人斬二人餘驚散父母得還而顯桂竟遇害有司旌其門曰孝勇李之經永興人由貢生為應城敎諭崇禎末值張獻忠亂衆議避去之經曰吾職在師儒義不可去率民固守城破死焉子應泰以身殉父忠孝萃一門云袁從諤郴州人崇禎舉人官中書舍人明亡自焚死妻陳氏亦守節終身本朝胡懋敬宜章人篤行好學康熙中以貢生知鎮原縣操守亷介干請不行卒於官士民德之為留葬焉李璞永興人康熙進士因母老不仕家居授徒以正心誠意為敎一時宗之鄧存忠郴州人父患足疾存忠年方十二遠往粵東求醫治之得愈又母病痢誠禱北斗求以身代夜母夣子負而歸疾遂瘥母目失明存忠又日禱蘇仙觀觀前枯橘忽發枝葉取葉並汲橘井水煎洗三日復明人以為孝感雍正十一年旌何瑞彥桂東人父某為紅寇所掠瑞彥延頸請代賊義而釋之由歲貢任保康訓導致仕歸闢鍾山草堂潛心著述卒年九十朱世新桂陽人遭時䘮亂負母避山谷奉養維謹而自采野䔩充饑兩弟早卒撫其子女若已出雍正九年旌李名甌永興諸生七歲䘮母哀毁如成人十九䘮父益無違禮嘗奉繼母避亂巖洞洞有蛇名甌爲文禱之蛇遽徙去雍正十二年旌謝尚儒永興人七歲見父病危即知禱神覓醫後父母相繼殁廬墓號泣五載不飲酒食肉乾隆九年旌黄鼎玉桂東人康熙戊午滇寇陷縣父母俱被掠鼎玉詣賊請代賊義而釋之當亂離中與親采蕨易米奉養備至乾隆十一年旌呉德漢宜章人乾隆鄉舉任善化敎諭敦奬節義倡明文敎皆知所先務祀鄉賢流寓宋秦觀揚州高郵人紹聖中爲羣小所嫉以謁告寫佛書爲罪削秩徙郴州陳瓘南劒州沙縣人徽宗時以直言竄郴州陳師錫建州建陽人徽宗時坐黨論削官置郴州張根饒州徳興人徽宗時權倖言根詆常平法以搖紹述之政貶濠州團練副使安置郴州曹輔南劒州人政和中徽宗數微行輔以祕書省正字上書切諫編管郴州處郴六年王黼當國不得移輔怡然不介意折彥質雲中人紹興中累官僉書樞密院事初趙鼎爲相屢薦彥質後秦檜專政以彦質爲鼎所引謫郴州安置彥質居郴自號葆真居士列女明李淳妻王氏郴州人時遭流賊突入其居欲汚之不從遂遇害黄爵妻戴氏郴州人爵卒戴年二十二守志不二有求婚者引刀自刺其面苦節敎子皆有文譽年八十餘終高天霖妻谷氏郴州人年十八夫死嘗置利刃於榻莫敢有奪其志者黄烈女宜章人成化間大羅山㓂發女年十七被執女齧舌出血罵賊不從賊怒刃於年塘石上石􅘧出泉至今水色尚赤後人立祠祀焉歐端妻蔡氏宜章人遷居永興舅姑殁時夫己死蔡哀痛盡禮殯未舉鄰家失火蔡抱柩號慟誓與俱燬俄而反風滅火咸謂孝感所致黄灝妻李氏宜章人李易之女灝卒投井以殉何沖孚妻李氏興寕人嘉靖間猺賊迫之罵賊遇害王文宰女興寕人念父母無子終身不嫁以侍養年七十卒鄉人呼其冡為孝女墳朱守良妻鄧氏桂陽人宏治間賊邱子高等陷縣城罵賊不屈死袁文萃妻蒙氏桂陽人正德間猺賊陳賓作亂侵晨猝至欲犯之罵曰吾豈為汝獠辱耶遂見殺袁文璽妻蒙氏桂陽人文璽繼室年二十而寡撫前妻子如己子守節終身朱永湯妻宋氏桂陽人年二十永湯卒母命改嫁不從姑嘗病目宋䑛之復明何應舜妻朱氏桂陽人崇禎中賊鍾林秀陷城被執躍入浙波潭死本朝鄧志熙妻劉氏宜章人夫亡守節康熙年間旌樊文詩妻黄氏興寕人夫亡守節同縣節婦李繼周妻段氏樊文化妻何氏均康熙年間旌周士偀妻楊氏郴州人夫亡守節同州節婦周爝妻曾氏賀子羨妻李氏何萬鍾妻李氏鄧治冀繼妻張氏陳學禮妻谷氏黄良藩妻楊氏譚朝仕妻曹氏均雍正年間旌楊復燦妻陳氏宜章人夫亡守節同縣節婦李錡妻楊氏藍性孝妻呉氏李遠珠妻鄭氏藍可行妻歐氏彭必椘妻藍氏蔡宗第妻黄氏陳才任妻黄氏均雍正年間旌何明旭妻袁氏興寕人夫亡守節同縣節婦蔣玉妻段氏黎世璜妻何氏何香節妻宋氏黄如組妻唐氏曹世佳妻李氏曹逢祚妻焦氏朱俊侣妻袁氏曹繼興妻李氏均雍正年間旌唐仲蘭妻范氏桂陽人順治八