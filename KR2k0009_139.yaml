body:
  text: 郴州直隸州在湖南省治東南六百八十里東西距三百四十里南北距二百三十里東至江西吉安府龍泉縣界三百里西至桂陽州界四十里南至廣東韶州府乳源縣界一百里北至衡州府安仁縣界一百三十里東南至江西南安府治三百里西南至廣東連州治二百五十里東北至吉安府永寕縣界四百里西北至衡州府冶三百里本州界東西距八十五里南北距九十五里東至永興縣界四十里西至桂陽州界四十五里南至宜章縣界四十五里北至永興縣界五十里東南至桂陽縣治二百四十里西南至桂陽州臨武縣界一百四十四里東北至永興縣界八十里西北至永興縣界四十里自州治至京師四千二百七十五里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州之域春秋戰國屬楚秦爲長沙郡之郴縣漢高帝置桂陽郡治郴屬荆州後漢因之三國屬吳三國蜀志先主傳建安十二年先主南征四郡桂陽太守趙範降二十年孫權遣吕蒙襲奪桂陽縣晉初因之元康初分屬江州永嘉初改屬湘州咸和三年還屬江州南北朝宋屬湘州齊因之隋平陳廢郡置郴州大業初復曰桂陽郡唐武德四年仍置郴州天寶初改曰桂陽郡乾九初復曰郴州屬江南西道五代時爲馬氏所據晉天福初改曰敦州漢乾祐初復曰郴州周廣順初屬南唐未幾屬南漢通鑑周廣順元年南漢主遣潘崇徹謝貫攻郴州唐邊鎬發兵救之崇徹敗唐兵於義章遂取郴州按五代史職方考郴州漢周時俱屬南漢馬希廣希萼時未聞郴州已為南漢所取恐誤宋仍曰郴州桂陽郡屬荆湖南路元至元十三年置安撫司改州治郴縣曰郴陽十四年改郴州路總管府屬湖廣行省明洪武初改為郴州府九年降為州以州治郴陽縣省入屬湖廣布政使司本朝因之為直隸州領縣五永興縣在州北八十里東西距七十里南北距七十五里東至興寕縣界三十里西至衡州府耒陽縣界四十里南至本州界二十五里北至衡州府安仁縣界五十里東南至興寕縣治九十里西南至桂陽州界八十里東北至衡州府􅌕縣治一百里西北至耒陽縣治九十里漢置便縣屬桂陽郡後漢及晉因之南北朝宋省陳復置隋又省唐開元十三年改置安陵縣天寶元年改曰高亭屬郴州宋熙寕六年改曰永興屬郴州元屬郴州路明屬郴州本朝因之宜章縣在州南九十里東西距一百三十里南北距四十五里東至桂陽縣界八十里西至桂陽州臨武縣界五十里南至廣東韶州府乳源縣界十里北至本州界三十五里東南至韶州府樂昌縣界三十五里西南至廣東連州界一百里東北至興寕縣治一百七十里西北至本州界十里漢郴縣地隋大業末蕭銑分置義章縣唐武徳七年省八年復置長夀元年分置高平開元十三年廢高平移義章來治仍屬郴州宋太平興國初改曰宜章屬郴州元屬郴州路明屬郴州本朝因之興寕縣在州東八十里東西距一百里南北距一百四十里東至桂東縣界六十里西至本州界四十里南至桂陽縣界一百里北至永興縣界四十里東南至桂陽縣界八十里西南至宜章縣界六十里東北至衡州府􅌕縣界八十里西北至永興縣界四十里漢郴縣地後漢永和元年析置漢寕縣屬桂陽郡三國呉改曰陽安晉太康元年改曰晉寕宋齊以後因之隋初省開皇十一年改置晉興縣唐貞觀八年省咸亨三年復置改名資興屬郴州宋太平興國後省嘉定二年復置資興縣後改曰興寕屬郴州元屬郴州路明屬郴州本朝因之桂陽縣在州東南一百六十五里東西距一百九十五里南北距一百九十里東至江西南安府大庾縣界一百二十里西至宜章縣界七十五里南至廣東韶州府樂昌縣界一百里北至南安府崇義縣界九十里東南至韶州府仁化縣界七十里西南至樂昌縣界六十里東北至桂東縣界六十里西北至興寕縣治一百四十里漢郴縣地後漢漢寕縣地東晉分置汝城縣屬桂陽郡宋齊因之陳天嘉元年改曰盧陽兼置盧陽郡隋初郡廢以縣屬桂陽郡唐屬郴州天寶初改曰義昌移治後唐改曰郴義宋太平興國初又改曰桂陽屬郴州元屬郴州路明屬郴州本朝因之桂東縣在州東二百七十里東西距一百五十里南北距八十里東至江西吉安府龍泉縣界六十里西至興寕縣界九十里南至江西南安府崇義縣界六十里北至衡州府􅌕縣界二十里東南至南安府上猶縣界四十里西南至桂陽縣治一百二十里東北至吉安府永寕縣界二百里西北至興寕縣界九十里漢郴縣地唐義昌縣地宋初桂陽縣地嘉定四年析置桂東縣屬郴州元屬郴州路明屬郴州本朝因之形勢地益高山益峻水清而益駛唐韓愈送廖道士序南接五嶺西接九疑東南距湖北距衡山圖經州在百重山内宋張舜民南遷録環山而州在海嶠之北衡湘之南宋練亭甫靈夀山記風俗郡濱南州風俗脆薄後漢書許荆傳土著希鮮好尚紛異地瘠民貧州志城池郴州城周三里有奇東西南三門舊有北門久塞有濠漢太守楊璆築厯代増修明嘉靖中甃石本朝乾隆三十一年嘉慶十六年重修永興縣城周二里有奇門五舊有城垣明正德間修築本朝順治十三年康熙十九年乾隆十一年屢修宜章縣城周二里有奇門四有濠明成化八年因舊址築本朝康熙二十四年雍正九年嘉慶十六年重葺興寕縣城周一里有奇西南門二有濠舊屬土垣明洪武初甃磚本朝乾隆二十四年修増東門一桂陽縣城周二里有奇門三有濠明宏治八年築本朝康熙十一年修桂東縣城周一里有奇門三有濠明成化初築本朝順治十年修康熙二十五年重築學校郴州學在州西門外宋時在州治西南張栻有記元明因之本朝康熙二十四年遷州治西四十九年復遷今所乾隆二十二年四十七年嘉慶二十二年屢修入學額數二十名新童一名永興縣學在縣治西北隅明成化中因宋元舊址建本朝順治康熙中屢修乾隆三十年増修入學額數十五名宜章縣學在縣城外東北舊在縣治東宋淳熙五年建陸九淵爲之記自宋至明遷徙無常本朝順治康熙中又屢遷乾隆四十七年遷建今所嘉慶十九年重修入學額數十五名新童三名興寕縣學在縣城西明洪武中因宋元舊址建本朝順治康熙雍正乾隆中屢葺入學額數十二名新童三名桂陽縣學在縣城内明洪武初建本朝康熙七年重建後屢修嘉慶十五年増修入學額數十五名新童三名桂東縣學在縣治東舊在縣東門外明洪武初建本朝順治十年重建康熙年間遷建今所雍正嘉慶中復葺入學額數八名東山書院在州城東郊唐宰相劉瞻讀書故址本朝康熙五十八年建景賢書院在州治城隍廟東舊名韓昌黎祠後易名景賢祠本朝康熙五十八年改建白蓮書院在州西北乾隆十八年建安陵書院在永興縣治西舊在縣治東乾隆十七年建四十年遷建今所玉溪書院舊在縣治西本明鄺璽玉溪精舍乾隆四十二年遷建縣南育才書院在宜章縣西康熙二十二年建漢安書院在興寕縣城西北隅舊名文昌書院雍正十一年建朝陽書院在桂陽縣城内乾隆十四年建濂溪書院在桂東縣乾隆二十三年建又舊志載桂陽縣有濂溪書院興寕縣有觀瀾書院北宋曹靖建附識於此戸口原額人丁三萬三百五十五今滋生男婦共九十九萬七千二十一名口計十八萬七千五百八十四戸田賦田地塘一萬一千六百七十四頃九十一畝七分九釐有奇額徵地丁正雜銀五萬九千二百四十六兩一錢三分二釐有奇山川東山在州東一里唐劉瞻讀書於此州志形勢雄傑可望一州之勝上有一覽亭魚山在州東三十里郴陽圖經白水出其南碧崖銀瀑大似匡山香鑪峯周茂叔書堂在焉明統志宋秦觀嘗遊有記謂其形勝大類華山之陰而沃潤過之上有柳毅祠歲旱於此禱雨寶葢山在州東四十里其傍為寶雲巖雷溪山在州東六十里高五里雷溪水出焉黃相山在州東南九里一名相山又名王相嶺其北為東山其南為東嶺自此至魚山共七十一峯名勝志其山巔上有池地多鳥方乳時人取輒迷路置之乃可去五葢山在州東南六十里高二十里周圍一百八十里湘中記山有五峯望之如葢鄉人每歲以雪占年諺云五葢雪普米賤如土雪若不均米貴如銀文明山在州南一里明統志上有塔又有亭名第一江山香山在州南五里有香木香泉泉味甘冽黄岑山在州南六十里接宜章縣界一名上嶺山一名客嶺山一名黄箱山又名騎田嶺後漢書郡國志桂陽郡上嶺山又郴有客嶺山水經注黄岑山騎田之嶠五嶺之第二嶺括地志黄岑山在郴州城南郴水所出通典郴州有騎田嶺今謂之臘嶺寰宇記黄岑山其東為仰天湖其北郴江水出焉其同出者為桂水為寒溪水輿地紀勝上有浪井三日一湧一名潮井明統志為楚粤之關與諸嶺連屬横絶南北寒燠氣候頓殊靈夀山在州西南三十里本名萬歲山周圍三十七里水經注萬歲山有石室中有鐘乳山上悉生靈夀木谿下即千秋水也隋書地理志桂陽郡郴有萬歲山輿地紀勝萬歲山在郴縣南天寶六年改曰靈夀方輿勝覽山有冷煖二泉八角山在州西南三十里與靈夀山相連山中小石皆八角故名坦山在州西南三十里明統志有萬華巖内有石田石倉石鐘之類澗水自巖而出龍渡山在州西九十里上有泉歲旱禱雨多應名勝志其麓有泉分流郴桂之境鳳梧山在州西北三十里明統志昔真人伯慈煉丹於此丹竈尚存又興寕縣北三十里亦有鳳梧山雲秋山在州北三十里一名天飛山又名仙臺山上有蓮池其水清冽四時不涸山後石穿如橋上下俱通往來有仙壇為蘇耽修煉處華山在州北六十里一名華石山或訛為話石山山有孤石聳立水經注耒水又西逕華山之陰亦曰華石山孤峯特聳枕帶雙流東則黄溪耒水之交㑹也馬嶺山在州東北五里一名蘇仙山一名牛皮山又名白馬嶺亦名龍頭嶺後漢書郡國志桂陽郡郴注縣南十數里有馬嶺山水經注黄溪東有馬嶺山高六百餘丈廣圓四十許里漢末有郡民蘇耽棲遊此山方輿勝覽輿地志謂晉蘇耽入山學道其母往窺之見其乘白馬飄然故又謂之白馬嶺明統志上有白鹿洞仙人壇有巨石曰沉香小石曰仙桃仙桃色赤黄有核研飲之可以愈疾石井山在州東北八十里元和志山有風母獸既死張口向風則生三台山有二一在永興縣城内儒學後一名大魁山三峯連屬如珠中峯獨高聳一在桂東縣南一里三峯拱峙為縣朝山仙母山在永興縣東一里相傳蘇耽母居此故名金箱山在永興縣東一里相近有玉印山天寶山在永興縣東八十里土富山在永興縣東南三十里輿地紀勝土富山有銀井人鑿之轉深忽見三老翁授之以杖悉是銀故名三翁井晶岡山在永興縣南五里峯尖如筆聚寶山在永興縣南二十里金魚山有二一在永興縣西南一里即學前之文筆峯一在桂東縣東南一里亦名木魚山天馬山有二一在永興縣西一里一在宜章縣南石臺山在永興縣西五里龍耳山在永興縣西二十里雙峯如龍耳故名其下有金華燕子二巖後有龍潭相近有天竹山甚高聳高亭山在永興縣西三十里九域志永興縣有高亭山元和志高亭縣以縣東高亭山為名白鶴山在永興縣西七十里明統志上有泉並盤山王廟歲旱禱雨多應金湖山在永興縣西八十里下有龍泉旱禱多應白豹山在永興縣西九十里與桂陽州接界金鵞山在永興縣西北二十里上有九仙亭華葢山在永興縣北半里縣治之倚山也玉鼇山在永興縣北二里石囷山在永興縣北二十里四十八峯山在永興縣北九十里山有四十八峯拱峙攢簇因名桄榔山在宜章縣東一里舊產桄榔樹名勝志桄榔山下多怪石名