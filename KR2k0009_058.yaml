front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_058-1a}
body:
  text: 濟南府二古迹東平陵故城在厯城縣東春秋齊平陵邑劉向説苑齊桓公之平陵見家人有年老而自養者漢置東平陵縣以右扶風有平陵故此加東也濟南郡治焉晉永嘉後移郡治厯城以東平陵為屬縣後去東字劉宋因之酈道元水經注武原水徑東平陵縣故城西故陵城也後乃加平周省隋末土人李義滿據堡自守武德二年歸唐於堡復置平陵縣及談州以滿為總管封平陵郡公貞觀元年州廢以縣屬齊州十七年齊州都督齊王祐叛滿及男君球固守賊平縣廢有詔重置改名全節以旌其功縣西南至州七十里元和十五年併入厯城太平寰宇記平陵城在縣東七十五里廢全節縣在平陵西北十五里齊乘東平陵故城在濟南東七十五里周二十餘里厯下故城在今厯城縣治西春秋時齊邑也史記晉世家平公元年伐齊齊靈公與戰靡下徐廣曰靡一作厯又田儋傳漢三年韓信襲破齊厯下軍三齊記厯下城南對厯山城在山下故名厯下城也郭緣生述征記曰厯城到營城三十里自城以東水瀰漫數十里南則迫山實為險固于欽齊乘金亂土人阻水立邑號曰水寨歸元後始移置今縣臺縣故城􅏅厯城縣東北春秋齊邑晏子春秋公為之封邑使田無宇致臺與無鹽漢為侯國屬濟南郡安帝延光三年濟南上言鳳凰集臺縣丞霍收舍樹上晉省宋時僑置魏郡及聊城縣後魏立東魏郡理臺魏書地形志東魏郡宋孝武置後自厯城徒治臺城又領聊城縣有臺城是也北齊郡縣俱廢章懷太子曰臺縣故城在平陵縣北寰宇記臺城在廢全節縣北十三里又齊天保七年改濟南郡還冶厯城臺城遂廢陽邱故城在章邱縣東南漢文帝四年封齊悼惠王子安為陽邱侯國於此後為縣屬濟南郡後漢省水經注百脈水西北徑陽邱縣故城中世謂之章邱城非也元和志章邱縣本漢陽邱縣也高齊天保七年自高唐故城移高唐縣理於此隋開皇十六年以博州亦有高唐縣改為章邱取縣南章邱山為名寰宇記高唐故城在今章邱縣東南十五里亭山故城在章邱縣西南劉宋僑置衛國縣屬頓邱郡後魏改屬束魏郡隋開皇六年改曰亭山屬齊郡唐屬齊州元和志縣西北至州九十里本漢平陵縣地縣東南有亭山隋因以為名元和十五年省入章邱齊乘故城在縣東南六十里菅縣故城在章邱縣西北漢文帝四年封齊悼惠王子罷軍為菅侯國於此後為縣屬濟南郡後漢至晉因之劉宋省晉書慕容德載記南陽太守閭邱羡師次菅城魏書地形志東魏郡聊城縣有菅城隋開皇六年改置朝陽縣於此十六年改曰臨濟唐武德元年於縣置鄒州八年州廢屬談州貞觀初仍屬齊州元和志臨濟縣西南至齊州一百二十里本漢菅縣隋移朝陽縣理此後改臨濟宋咸平四年省入章邱金史地理志章邱有臨濟鎮肇域志故菅城在今章邱縣西北二十五里今名水寨朝陽故城在章邱縣西北漢置縣為侯國屬濟南郡應劭曰在朝水之陽後漢曰東朝陽以南陽郡有朝陽故此加東也晉改屬樂安國宋仍曰朝陽還屬濟南郡後魏因之齊周時省隋開皇六年改置朝陽於故菅縣十六年改曰臨濟仍分置朝陽縣於此大業初仍廢入臨濟縣寰宇記朝陽故城在臨濟縣東四十里齊乘在章邱縣東二十五里猇縣故城在章邱縣北漢征和元年封趙敬肅王子起為侯國屬濟南郡後漢省蘇林曰今東朝陽有猇亭平原故城在鄒平縣東宋武帝置平原縣屬平原郡後魏因之寰宇記坰齊天保七年自今長山縣界移平原縣於今鄒平縣理東南三十五里漢梁鄒故城屬廣川郡周不改隋開皇三年復自梁鄒城移平原入鄒平城舊志平原城在今鄒平縣東十二里今為平原莊鄒平故城在今鄒平縣北漢置鄒平縣屬濟南郡晉永嘉後省魏書地形志臨濟有鄒平城元和志鄒平縣東南至淄州一百二十里本漢舊縣隋開皇三年自梁鄒城移平原縣入鄒平城十八年改為鄒平寰宇記鄒平故城俗名趙臺城在縣西南十五里唐武德二年築八年移於今理舊志有故城在今縣北孫家鎮去齊東縣東南四十里唐時所治也宋景德元年移治濟陽城而此城廢俗訛為梁鄒城濟南故城在鄒平縣北隋開皇十六年分長山置濟南縣大業初仍省入長山元和志隋於後漢梁鄒城地置濟南縣齊乘隋濟南城在鄒平東北十五里舊志又有濟南郡城在縣北十八里未詳般陽故城今淄川縣治漢置縣應劭曰在般水之陽晉縣省而城存宋書沈文秀傳王元貌據盤陽城魏書地形志東清河郡治盤陽城元和志淄川縣本漢般陽縣也萊蕪故城在淄川縣東南漢置縣屬泰山郡後漢及晉初因之後省應劭曰即魯萊柞邑昭公七年季豫所以與孟氏臣謝息者水經注淄水出泰山萊蕪縣原山東北流徑萊蕪谷屈而西北流徑其縣故城南從征記曰城在萊蕪谷當路阻絶兩山間道由南北門漢末有范史雲為萊蕪令言萊蕪在齊非魯所得引舊説云齊靈公伐萊萊民播流此谷邑落荒蕪故曰萊蕪元和志萊蕪故城在今淄州東南六十里按魏書地形志東清河郡貝邱縣有萊蕪城即漢縣也又泰山郡牟縣亦有萊蕪城蓋漢晉間已嘗西徙於今萊蕪縣界也土鼓故城在淄川縣西漢置縣屬濟南郡後漢因之晉省宋復置後魏因之又地形志東魏郡博平縣有土鼓城蓋嘗徙治也北齊併入平山逢陵故城在淄川縣西北宋永初中置屬濟南郡後魏因之又地形志東魏郡博平縣亦有逢陵城蓋嘗徙治也北齊省寰宇記故城在淄川縣西北四十里齊大夫逢丑父之邑齊乘商諸侯逢伯陵封於此逢丑父其後也昌國故城在淄川縣東北古齊邑亦名昌城史記趙世家惠文王二十五年燕周將攻昌城取之樂毅傳燕昭王封樂毅於昌國號為昌國君漢置昌國縣屬齊郡後漢及晉宋魏皆因之魏孝昌三年清河民房頃作亂據昌國城時東清河郡治盤陽又所領武城縣有昌國城蓋縣嘗徙治也高齊時廢括地志故城在淄川縣東北四十里武強故城今長山縣元和志長山縣東南至淄州六十四里本漢於陵縣地宋武帝於此立武強縣開皇十八年改武強為長山縣取長白山為名於陵故城在長山縣西南本齊於陵邑漢置縣屬濟南郡為都尉治後漢建武中嘗改封侯霸子昱侯於此宋永初後省魏書地形志逢陵有於陵城元和志齊記曰於陵城西三里有長白山陳仲子夫妻所隱也寰宇記於陵故城在長山縣南二十五里舊志在縣西南二十里濟南郡城史記齊悼惠王世家高后立其兄子吕台為吕王割齊之濟南郡為吕王奉邑正義引括地志云濟南故城在淄州長山縣西北二十五里後漢書章帝紀元和二年進幸濟南章懷太子注縣名今淄州長山縣西北按兩漢止有濟南郡並治東平陵在今厯城縣距此百餘里而無濟南縣不知括地志後漢書注皆何所據也高苑故城有二俱在今新城縣漢高帝六年封丙倩為高苑侯又文帝十六年分齊為膠西王國史記表都宛水經注高苑有東西二城東城則膠西王都西城則丙倩侯國劉宋時縣省魏書地形志東平原郡鬲有高苑城括地志高苑故城在淄州長山縣北二十四里參考道里今新城縣當即西高苑又縣志有古城在縣東十二里牆址猶存蓋即東高苑也延鄉故城在新城縣東漢置縣為侯國屬千乘郡後漢省魏書地形志樂陵郡濕沃有延鄉城水經注蓋野溝水源導延鄉城東北世人謂故城為從城延從字相似讀隨字改所未詳也平安故城在新城縣東北漢置平安侯國屬千乘郡後漢省水經注濟水又東北迤為淵渚謂之平州濕沃側有平安縣故城俗謂之會城非也應劭曰博昌縣西南三十里有平安亭故縣也世尚存平州之名矣唐武德初復置平安縣屬青州八年省入博昌舊志會城在縣東北四十里與高苑縣接界或謂之高會城即古平安也著縣故城在濟陽縣西南漢書曹參傳從下齊收著漯陰顏師古注詩齊風俟我於著乎而即著縣也寰宇記著城在臨邑縣東南五十里相傳地生蓍草每年上貢故名齊乘著本音竹庶韋昭誤以為蓍蔡之蓍後人緣此有貢蓍之説阿陽故城在禹城縣東亦曰陽阿漢置縣屬平原郡後漢省水經注河水經陽阿縣故城西應劭曰漯陰縣東南五十里有陽阿鄉故縣也寰宇記阿陽城在廢禹城縣西北五十里今縣南去七里瑗縣故城在禹城縣南即齊轅邑也左傳哀公十年夏趙鞅帥師伐齊取犂及轅注祝阿縣西有轅城漢書地理志平原郡有瑗縣後漢省寰宇記瑗城在縣南一百里一作援杜預曰轅即瑗也源陽故城在禹城縣南唐武德元年置縣屬齊州貞觀元年省入禹城寰宇記源陽城在縣南一百里隋末喪亂縣令桓孝才立墅於家側率宗親共守不屬諸賊唐武德初大使崔同就築城奏授孝才為縣令城在源陽河側因以為名六年廢禹城故城在今禹城縣西南舊曰祝阿隋唐間自長清縣界移治此天寶元年改曰禹城元和志在齊州西北八十五里寰宇記乾元二年史思明侵河南守將李銑於長清縣邊家口決大河東注縣因淪陷移理遷善村即今治也舊志有祝阿故城在今縣西南十七里蓋即唐初遷治處高唐故城在禹城縣西南春秋齊邑左傳襄公十九年齊夙沙衛奔高唐以叛哀公十年趙鞅帥師伐齊取犂及轅毁高唐之郭史記齊威王曰吾臣有盼子者使守高唐趙人不敢東漁於河杜預左傳注高唐在祝阿縣西北寰宇記古高唐邑在禹城縣南五十里是也漢時於其地置縣屬平原郡應劭十三州記在平原郡南五十里晉廢後改置於漢靈縣界舊志高唐城在今縣西四十里即漢縣也按齊高唐邑在今禹城縣南漢縣在今縣西二地雖殊界實相近至今東昌府之高唐州乃漢靈縣地取古名耳漯陰故城在臨邑縣西本齊之犂邑亦曰犂邱又名曰隰左傳哀公十年趙鞅帥師伐齊取犂及轅二十三年晉荀瑶伐齊戰於犂邱知伯親禽顏庚二十七年陳成子召顏涿聚之子晉曰隰之役而父死焉杜預注犂邱隰也漢置漯陰縣屬平原郡應劭曰縣在漯水之南因名後漢因之晉省水經注漯水又東北徑漯隂故縣城北故犂邑也厯北漯陰城南伏琛謂之漯陽城地理風俗記曰平原漯陰縣今巨漯亭是也寰宇記漢濕陰廢城在今臨邑西十里宋武平齊移理於縣西北五十里北濕陰城亦謂漢城為南濕陰城按後漢志作濕陰地形志有濕陰城蓋傳寫之訛臨邑故城在臨邑縣北漢置臨邑縣屬東郡在今茌平縣界劉宋孝建二年僑置於此後魏至隋唐皆因之元和志縣南至齊州六十里宋史地理志建隆元年河決公乘渡口城壞三年移治孫耿鎮即今治也盧縣故城在長清縣南春秋齊邑左傳隱公三年齊鄭盟於石門尋盧之盟襄公十八年晉伐齊趙武韓起以軍圍盧漢初置盧縣屬泰山郡都尉治焉文帝封東牟侯興居為濟北王都盧和帝後分泰山置濟北國亦都此後魏改屬太原郡魏書地形志太原郡盧縣晉後自濟北改屬有盧城蓋縣嘗徙治也孝昌二年又移東太原郡治此隋書地理志長清縣有東太原郡齊廢蓋縣隨郡廢也寰宇記盧城在長清縣南五十里內有隔城舊志在今縣南二十五里按漢書濟北王傳國除為北安縣而地志不載長清故城在長清縣西南本盧縣地隋開皇五年置鎮十四年廢鎮置縣宋史地理志長清至道二年徙城於縣之刺榆店即今治也舊志故城在今縣東南三十里山茌故城在長清縣東北漢置茌縣屬泰山郡應劭曰茌山在東北後漢因之三國魏改曰山茌魏明帝紀景初元年山茌縣言黃龍見是也晉升平三年慕容雋以賈堅為太山太守屯山茌劉宋永初後省元嘉十年復置并僑置太原郡治焉孝建元年改屬濟北後魏仍屬太原郡隋大業初廢入厯城唐武德元年復置屬齊州天寶元年改曰豐齊元和志縣東北至州四