敬德監造淳熙寺在平原縣城西宋嘉祐五年僧義海創建長春觀在厯城縣西邱處機修真處殿後一洞蜿蜒數十里一名大庵三陽道觀在章邱縣北女郎山上縣志葆光子姓郭不知何許人嘗居三陽洞學煉神服氣之術土人相傳於此成仙慶雲觀在新城縣東四十五里縣志相傳宋時慶雲出因建迎祥宫在厯城縣北元張起巖作碑記名宦漢蕭望之蘭陵人以諫大夫出為平原太守匡衡承人初除太常掌故調補平原文學溫夀祁人父序為隗囂别將苟宇所拘劫伏劍死光武聞而憐之除夀為鄒平侯相伏湛東武人更始時為平原太守時天下驚擾湛獨晏然教授不廢建武三年為大司徒賊徐卿等據富平帝知湛為青徐所信向遣到平原徐卿等即日歸降趙喜宛人光武時遷平原太守時平原多盜賊喜捕斬其渠帥餘黨數千人奏一切徙京師近郡帝從之於是擢舉義行誅鋤姦惡後青州大蝗侵入平原界輒死嵗屢有年百姓歌之何敞平陵人濟南王康尊貴驕甚竇憲出敞為濟南太傅敞至國輔康以道義康敬禮焉劉寵牟平人除東平陵令以仁惠為吏民所愛母疾棄官去百姓將送塞道車不得進乃輕服遁歸史弼考城人桓帝時為平原相時詔書下舉鈎黨弼獨無所上詔書前後切責弼曰他郡自有平原自無胡可相比若誣陷良善相有死而已所不能也會黨禁中解濟活者千餘人弼為政特挫抑強豪小民有罪多所容貸後弼被陷平原吏人奔走詣闕訟之滕延北海人桓帝時為濟北相時小黃門段圭與侯覽並立田業近濟北界侵犯百姓劫掠行旅延一切收捕殺數十人陳尸路衢延坐免陳紀許人獻帝時拜侍中出為平原相三國魏司馬芝溫人太祖以芝為管長時郡主簿劉節賓客千餘出為盜賊入亂吏治芝差節客王同等為兵節藏同等芝乃馳檄濟南陳節罪太守即以節代同行青州號芝以郡主簿為兵晉阮种尉氏人元康中遷平原相為政簡惠百姓稱之南北朝魏拓拔平原河南王曜孫顯祖時齊州刺史善於懷撫邊民歸附者千有餘家鹿生乘氏人顯祖時為濟南太守前後在任十年時三齊始附人懷茍且蒱博終朝頗廢農業生立制斷之聞者嗟善韓麒麟棘城人孝文時拜齊州刺史在官寡於刑罰以新附之人未階臺宦士人沈抑乃表請守宰有闕宜推用豪望廣延賢哲朝議從之臨終之日惟有俸絹數十匹其清貧如此薛聰汾陰人宣武即位除都督齊州刺史政存簡靜卒於州吏人追思留其所坐榻以存餘愛路雍陽平人宣武時除東魏郡太守蒞政清勤經年儉日出家粟賑賜貧窘靈太后下詔褒美辛穆狄道人正光中除平原相善撫導長子子馥亦除平原相父子並為此郡吏民懷之拓拔子華高涼王孤平之後孝莊初除齊州刺史先是州境數經反逆邢杲之亂人不自保子華撫集豪右委之管鑰衆皆感悅境內帖然隋韋藝杜陵人高祖初拜齊州刺史為政清簡士庶懷惠趙軌洛陽人高祖時為齊州别駕在州四年考績連最徴入朝父老相送者各揮涕曰公清若水請酌一杯水奉餞軌受而飲之房恭懿洛陽人開皇初遷德州司馬在職嵗餘政為天下之最上甚異之因謂諸州朝集使曰房恭懿志存體國愛養我百姓卿等宜師斆也王伽章武人開皇末為齊州行參軍送流囚七十餘人詣京師悉脫其枷與期曰某日當至如致前却吾當為汝受死流人感悅依期而至上聞召見與語稱善久之公孫景茂阜城人仁夀中拜淄州刺史有德政稱為良牧大業初卒於官人吏赴喪者數千人張須陀閿鄉人大業中為齊郡丞會嵗飢將開倉賑給官屬咸曰須待詔敕須陀曰待報至當委溝壑矣吾以此獲罪死無所恨先開倉而後上狀帝知之不責也時賊寇掠郡境須陀悉討平之威振東夏以功遷齊郡通守唐陽嶠雒陽人儀鳳中授將陵尉李雍江都人開元中為淄州刺史著有聲譽李隨元宗時拜濟南太守安祿山反隨與單父尉賈賁濮陽人尚衡起兵討賊顏真卿京兆萬年人元宗時為平原太守安祿山逆狀芽蘖真卿度必反陽託霖雨增陴濬隍料丁壯儲廩實日與賓客泛舟飲酒以紓祿山之疑祿山反河朔盡陷獨平原城守俱備募士得萬人大饗城西門慷慨泣下衆感勵賊破東都遣使傳李憕盧奕蔣青首來徇真卿紿其衆曰我素識憕等其首皆非是乃斬賊使藏三首他日結芻續體殮而祭為位哭之殷侑陳州人文宗時拜義昌軍節度使時痍荒之餘墟里生荆棘侑單身之官安足粗淡與下共勞苦以仁惠為政嵗中流戶襁屬而還遂與營田丐耕牛三萬詔度支賜帛四萬匹佐其市戶口滋饒廥儲盈腐上下便安曹全晸昭宗時為淄州刺史韓簡率衆寇州城陷死之五代唐張錫福州人同光末為淄川令不畏強禦專務愛民刺史有所徴不答馮道知錫介直奏為監察御史劉遂清安邱人明宗時除淄州刺史淄俗尚強悍少親遜風遂清教以孝悌躬行督率嘗迎養其母及郊親執轡行數十里州人咸感其孝晉翟進宗天福時為淄州刺史平盧節度使楊光遠反以騎兵數百脅取至青州進宗不屈而死周郭瓊盧龍人世宗時為齊州防禦使民飢瓊以已俸賑之人懷其惠相率詣闕頌其德政詔許立碑張藏英范陽人世宗即位授德州刺史請於深州李晏口置寨及誘境上亡命者以隸軍從之遂築城李晏口募得徑兵數千人會王彥超為遼兵所圍藏英率新募兵馳往擊之遼人解去宋尹崇珂天水人太祖時為淄州刺史有善政民詣闕請刻石頌德太祖命李穆撰文賜之李漢超雲州雲中人太祖時齊州防禦使在郡十七年政平訟理吏民愛之詣闕求立碑頌德太祖詔徐鉉撰文賜之王貴并州太原人太宗時為淄州刺史從潘美北征頗立戰功又從楊業為遼兵所圍射殺數十人矢盡又擊殺數人遂遇害張藴范陽人咸平初監淄州兵遼兵至青間州人棄城藴拔刀遮止於門力治守備遼兵引去郡守掠為已功反陷以罪藴受而不校靳懷德博州高唐人咸平中知德州遼兵至懷德固守城壁有詔褒之韓琦安陽人仁宗時授將作監丞通判淄州留心民事凡所咨謀預儲經濟唐介江陵人仁宗時通判德州轉運使崔嶧取庫絹配民而重其估介留牒不下且移安撫使責數之嶧怒馳檄按詰介不為動曾鞏南豐人嘉祐中知齊州曲隄周氏雄里中州縣莫敢詰鞏取置於法章邱民聚黨號霸王社鞏配三十一人又屬民為保伍使譏察出入自是外戶不閉河北濬河齊當給夫二萬鞏括其隱漏省費數倍又弛無名渡錢為橋以濟往來人皆以為利范純仁吳人神宗時知齊州齊俗凶悍人輕為盜劫西司理院繫囚常滿純仁盡呼至庭下訓使自新即釋去期嵗盜減大半蘇轍眉山人神宗時以陳州教授改著作郎齊州掌書記沉靜簡默文學頗著李常建昌人神宗時知齊州齊多盜論報無虛日常得黠盜刺為兵使在麾下盡知囊括處悉發屋破柱拔其根株姦無所匿趙叔皎秦悼王四世孫元豐中纍遷至德州兵馬都監劉順等相繼謀叛叔皎皆設方略捕擒之建炎元年金人圍城叔皎率兵禦之前後六戰勢窮被執怒罵不屈遂遇害朝補之巨野人哲宗時知齊州羣盜晝掠塗巷補之默得其姓名一日宴客召賊曹以方略授之酒行未竟悉擒以來一府為撤警向崇道哲宗時知淄州修明學校增益生徒以勵風教王巖叟清平人哲宗時知齊州先是巖叟言河北榷鹽法尚行民受其弊至是請以所言鹽法行之京東張叔夜開封人大觀中知濟南府羣盜猝至叔夜度力不敵乃取舊赦賊文俾郵卒傳至郡盜聞少懈叔夜發卒五十人擊之盜奔潰趙不羣太宗六世孫靖康初宰章邱縣縣當山東河北之衝不羣募五千人增城浚濠為戰守備敵攻圍兩月不能下金李瞻玉田人天會中遷德州防禦使為政寬平民懷其惠相率詣京師請留者數百千人梁肅奉聖州人世宗時為濟南尹上疏曰漢文除肉刑罪至徒者帶鐐居役嵗滿釋之家無兼丁者加杖準徒今取遼季之法徒一年者杖一百是一罪二刑也臣實痛之未幾召拜參知政事楊閏之香河人大定中為齊河縣主簿剖決如流庭無留訟張萬公東阿人大定中為長山令時土寇至城下者幾萬人萬公登陴諭以鄉里親舊意衆感悟相率去邑人賴之後知濟南府山東路安撫使時連歲旱蝗萬公慮民飢盜起上陳豫備賑濟及督責有司禁戢盜賊之方上皆從之王擴永平人明昌中同知德州防禦使被詔賑貸山東西路飢民擴輒限數外給之泰和中山東盜起擴行章邱道中遇一男子舉止不常捕訊果厯城大盜也衆以為神完顏守貞泰和中知濟南府事上以山東重地須大臣鎮撫守貞久遷謫故移授之齊鷹揚淄州軍事判官貞祐初元兵取淄州鷹揚募兵備禦城破率衆巷戰創甚被執欲降之鷹揚伺守者少怠即起奪槊殺人不屈死贈嘉議大夫淄州刺史立廟於州以時致祭梁昱宣宗時以判官攝淄州遭李全亂昱率軍民力田徴科有度餽餉不乏轉運使田琢奏其功遷同知淄州舒穆魯元懿州路胡圖瑚明安人宣宗時同知淄州軍事劇盜劉奇久為民患一日捕獲方訊鞫聞赦將至亟命杖殺之閣郡稱快後移知濟南府舒穆魯元舊作石抹元胡圖瑚明安舊作胡土虎猛安今俱改正元趙炳灤陽人中統時濟南妖民作亂命炳為濟南路總管炳至止罪首惡餘黨解散嵗凶發廪賑民而後以聞朝廷不之罪趙孟俯湖州人至元中同知濟南路署總管府事官事清簡有元掀兒者役於鹽場不勝艱苦因逃去其父求得他人尸遂誣告同役者殺掀兒既誣服孟俯疑其冤留弗決踰月掀兒自歸郡中稱為神明杜世昌嘉州人至元中為長清尹時大軍南下所在騷擾世昌出迎撫之秋毫無犯民賴以安田夀燕人至元中任臨邑尹􅊩政廉明豪猾斂手先是防兵在邑以芻牧為名占民膏腴地二萬餘畝壽為申請得奉詔檢核悉歸於民高伯溫上都人至元中為長清尹教民植桑一十七萬株立義倉百所招撫流民五百餘戶境內瀦水浸田乃開渠泄水民樂其業立石頌之王構東平人成宗時為濟南路總管諸王從者怙勢行州縣民莫敢忤視構聞諸朝徙之北境學田為牧地所侵者理而歸之官貸民粟嵗飢而責儻不已構請輸以明年李惟肅正定人大德中授章邱尹廉恕剛斷先教後刑常指繡江語人曰吾惟飲此耳因築亭曰飲江趙𣏌南宫人至正中為禹城尹時河決金隄調夫役急禹城去曹州千有餘里民不堪役𣏌親詣州請免民役州允之獨留𣏌董河事一年而還杜翺至正中知長山縣設常平法翺思民力弗堪不事折配聽其自輸民賫糧至者相望不半年建縣廨廟學社稷壇社學皆以次修葺明崔亮洪武初濟南太守修城堞建倉庾撫綏得宜士民感服陳修上饒人洪武初濟南太守時兵燹之後民物凋瘵修招集流亡令其服業嘗上墾田之策帝嘉納之鄧瑜洪武時為濟南衛指揮同知將從征囑其妻扈氏曰我為人臣當盡忠汝為人妻當盡節瑜果殁於陳扈民守節終身王省吉水人建文時濟陽教諭會燕兵至省被執不降既而釋之乃集諸生於堂曰此堂曰明倫今日之倫安在言訖痛哭隨觸柱死薛慎山陽人永樂時知長清縣有惠政以親喪去民知慎服闋詣闕乞再任吏部尚書蹇義言長清已别除令更易不便帝曰置令以為民也但得民心屢易何害竟復任侯宣封邱人天順間知厯城縣有威信勤於吏治賑飢弭盜民立碑頌之白行順清澗人成化間知濟南府訪求治原緩刑罰興學校勸耕種招流亡尋升山西參政士民遮道留之劉鎰羅山人成化間知鄒平縣時有蝗食禾稼狼噬人鎰禱於神害皆息李興嵩縣人成化間知鄒平縣廉介自守政稱第一王縉山陰人成化間知臨邑縣旁邑民為盜誣服直指以屬縉縉訊無左證乃極為囚原直指復屬他令治是獄論死者如千人遂劾罷縉未幾真盜坐他事發前獄各有據乃直縉時稱縉為慈且明云楊武岐山人宏治間授淄川令民幾無訟囹圄中惟種園蔬先是淄水悍決為民患武隄防疏道曲盡機宜民甚賴之以治行第一擢監察御史李恕富平人宏治間知德平縣剛明果斷吏不敢欺積穀備荒全活甚衆俞諫桐廬人宏治間知長清縣嘗憫流民失業境內凡有河壖地課民耕種貧者貸以牛籽嵗徴租儲倉凶年即以是賑之喬遷岐正德中知長山縣流賊入境官民廬舍焚燬殆盡遷岐任甫一月竪柵堅守賊不能入盧恭萍鄉人正德間知平原縣積榖二萬石以備凶荒種樹萬株以蔭行役時稱循吏張淑勵太原盂人嘉靖間知厯城縣值災荒之後輕徭薄斂與民休息朔旦集諸生設俎豆論詩書士民戴之茅世亨溧水人嘉靖間知禹城縣邑人苦徭役不均至有破家者世亨下車即編審均役民便之嵗值大水世亨親帥隄防屢陳災祲是年夏稅得免王九儀長安人萬厯間為淄川令會民苦田不均九儀善度田竟無敢欺者尤善摘發盜不敢犯淄川境南拱極安邑人萬厯間知陵縣時方大旱妖民程章煽動飢民將約期為亂拱極乘其未發捕獲之搜得旗幢印信徒衆朋籍悉對衆焚之人心以安尋獲雨是嵗有秋茅國縉歸安人萬厯間知章邱縣邑中苦徭役民多鬻産轉徙國縉立條鞭法一切富戶里甲歸之召募數年以後閭閻殷富董復亨元城人萬厯間知章邱縣博學有文譽重修章邱縣志三十四卷士大夫皆善之王上聞祥符人萬厯間知齊河縣行條鞭法罷里牌牌甲戶頭之役在任數年夜戶不閉民甚安之白鯤南和人萬厯間知齊東縣鄒平令欲分漯水由淺水入大清河邑人懼有漂泊之患鯤力爭乃罷嵗大飢廣設粥厰以食餓者政聲甚著張安豫華亭人崇禎時知齊河縣飢饉之後􅍉苻多警安豫給牛種蠲荒稅募兵緝盜甃治城垣民至今思之史能仁鹿邑人崇禎時知新城縣值大旱蝗為災能仁單騎巡行鼓勵捕逐自暴烈日中三日忽有馬蜂數萬自北來螫蝗蝗盡蜂亦不見調淄川民攀轅號泣者萬人車不能行苟好善醴泉人崇禎時知濟南府城破死之同死者同知陳虞卿通判熊列獻厯城知縣韓承宣本朝馮祥聘山海衛人順治初知齊河縣時流賊逼城祥聘捍禦有方城賴以全王用體高平人順治初知齊河縣時凋瘵之後頻值嵗飢民間逋賦纍萬用體毁家代償民甚德之牛友月隰州人順治初知長清縣在任五年凡徴收銀米耗羡一無所取悉貯倉庫人莫識其意也後值嵗儉賑粟不敷察荒使者有難色友月曰吾籌之稔矣悉籍以助羅文瑜廣寧人康熙初知濟南府時軍務旁午文瑜部署一切度支徭役民庶所擾嘗奉撥軍餉三十萬兩恐所屬催科病民乃親厯州邑勸諭之劉國楨福清人知德州得士民心後以罣悮免官歸士民留之不可去任之日雖婦稚亦哀號道左崔懋遼陽州人康熙中知新城縣時水旱頻仍民多逋逃懋力請蠲赦墾荒捐給牛種召募耕種民皆樂其故業值小清河溢頗為邑患懋修築隄堰一切資費並不取之民間又修濬孝婦河以利民田居職十二年政簡刑清老幼咸德之原遜志蒲城人乾隆庚子進士選授臨邑俸滿題升德州訪知河水為患春夏之交雇夫增築隄岸民得安居兩次採買倉榖穀雖昂貴照市價給發姦民冒充浮橋橋夫苛索商旅下車即禁革政暇訪疾苦勸耕耘懸賞捕蝗蝗不為災州有繁露書院生息銀虧缺捐俸資諸生膏火成材者衆購馬應臺灣兵差民有未領價先預備者事後懇求充公堅拒之曰民用情我更當好信提調官前總纂臣鄭紹謙恭纂并覆輯校對官臣林𣏌材恭校大清一統志濟南府三人物漢田何淄川人自魯商瞿受易孔子傳六世至何漢興言易者本之伏勝濟南人秦博士孝文時求能治尚書者天下亡有聞伏生能治欲召之時伏生老不能行於是詔龜錯往受之楊何淄川人從王同受田何易頓邱京房師之元光初徵官大中大夫終軍濟南人少好學能屬文年十八至長安上書言事武帝異其文拜為謁者給事中初軍步入關關吏豫軍繻軍曰大丈夫西逰終不復傳還棄繻而去後建節東出關關吏識之曰此棄繻生也纍擢諫大夫後使南越卒時年二十餘故世謂之終童王欣濟南人遷被陽令武帝未御史暴勝之過被陽欲斬欣欣巳解衣伏質仰言曰使君威振郡國殺一欣不足以增威不如時有所寬以明恩貸令盡死力勝之壯其言貰不誅還薦欣徴為右輔都尉昭帝時為丞相封宜春侯薨諡曰敬侯林尊濟南人事歐陽高為博士論石渠後至太子太傅授平陵平當梁陳翁生徒衆尤盛高詡般人世傳魯詩以清操知名不仕王莽光武即位徴拜大司農禮震平原人受業歐陽歙受尚書歙下獄當死震年十七自繫上書求代光武嘉其行義拜郎中牟長臨濟人少習歐陽尚書不仕王莽建武初拜博士遷河南太守自為博士及在河內諸生講習者常有千餘人著録前後萬言著尚書章句俗號為牟氏章句復徴為中散大夫子紆亦以隱居教授門生千人肅宗聞而徵之徐巡濟南人師事東海衛宏後從扶風杜林受學以儒顯光武以為議郎成翊世平原人為郡吏深明道術安帝初諫和熹鄧后歸政鄧氏誅徴為尚書郎延光中皇太子廢翊世連上書訟之詔免歸順帝立以虞詡等薦為尚書在朝正色百僚敬之所輔平原人為縣小吏時劇賊舉豪入界縣令劉雄與戰被執賊將刺之輔願以身代賊縱雄刺輔貫心洞胸而死事聞詔書追傷之魏劭平原人平原相史弼遷河東太守檻車徵劭毁變形服詐為家僮瞻護於弼弼受誣當棄市劭與同郡人賣郡邸行賂侯覽得減死論陶邱洪平原人清達博辨文冠當代時譏平原人行賂以免史弼洪曰昔文王羑里閎散懷金史弼遭難義夫獻寶亦何疑焉舉孝亷不就辟太尉府掾年三十卒王君公平原人明易為郎數言事不用乃免歸儈牛自隱時人語曰避世牆東王君公襄楷平原人好學博古善天文陰陽之術桓帝時災異尤數楷詣闕上疏收送洛陽獄靈帝即位大傅陳蕃舉方正不就鄉里宗之每太守至輒致禮請中平中以博士徴不至卒於家劉瓆平原高唐人有經術處位敦直言厯官太原太守以忤閹官下獄死禰衡般人少有才辨而氣尚剛傲孔融愛衡才數稱述於曹操操欲見之衡不肯往操懷忿以其才名不欲殺之送與劉表復侮慢於表表恥不能容以江夏太守黃祖性急故送衡與之黃祖大會賓客衡言不遜遂令殺之時年二十六三國魏王烈平原人漢末與管幼安邴原等至遼東名聞在幼安原之右辭公孫度長史商賈自穢太祖命為丞相掾徵事未至卒於海表管輅平原人清河太守華表召為文學掾安平趙孔曜薦於冀州刺史裴徽曰輅雅性寬大與世無忌仰觀天文則同妙甘公石申俯覽周易則齊思季主宜蒙陰和之應得及羽儀之時徽辟為文學從事徙部巨鹿遷治中别駕正元二年為少府丞明年卒年四十八劉惇平原人明天官達占數尤明太乙皆能推演其事窮盡要妙著書百餘篇晉劉實平原高唐人博通今古清身潔巳以世多進趣亷遜道闕著崇讓論以矯之後拜司空轉太傅太安初以老疾遜位薨年九十一諡曰元實自少至老篤學不倦尤精三傳辨正公羊又撰春秋條例二十卷劉智實弟貞素有兄風少貧窶每負薪自給誦讀不輟以儒行稱厯遷侍中尚書太常著喪服釋疑論多所辨明太康末卒諡曰成汜育盧人奕世儒素敦睦九族時人號其家兒無常父衣無常主育少履高操安貧有志業武帝召之不就凡所述造七萬餘言華表魏太尉華歆子表年二十拜散騎黃門郎纍遷侍中泰始中拜太子少傅遷太常卿以老病乞骸骨司徒李允司隸王宏等並嘆美表清淡退靜以為不可得貴賤親疏也卒年七十二諡曰康華廙表于宏敏有才義泰始初纍遷南中郎將都督河北諸軍事緣有違忤之咎免官削爵土棲遲家巷垂十載教訓子孫講誦經典集經書要事名曰善文行於世太康初大赦得襲封惠帝即位加恃中遷太子少傅動遵禮典得傅道之義進位開府儀同三司年七十五卒諡曰元華嶠廙弟少有令聞武帝以嶠博聞多識凡治禮音律天文數術南省文章門下撰集皆典統之嶠以漢紀煩穢改作之名後漢書文質事核有遷固之規元康三年卒追贈少府諡曰簡華混廙子泰始中免廙官混以世孫當受封逃避斷髮陽狂病瘖不能語故得不拜世咸稱之及嗣父爵清貞簡正厯位侍中尚書華恆混弟博學以清素稱尚武帝女拜駙馬都尉元康初選為太子賓友纍遷散騎常侍咸和𥘉以討王敦功封苑陵縣侯蘇峻之亂恆侍帝左右從至石頭備履難厄困悴踰年及帝加元服又將納后寇難之後典籍靡遺恆推尋舊典撰定禮儀并郊廟辟雍朝廷軌則事並施用卒年六十九贈侍中諡曰敬解系著人父修魏琅邪太守梁州刺史考績為天下第一系清身潔巳甚得聲譽厯官散騎常侍會氏羌叛與佂西將軍趙王倫討之倫信用佞人孫秀與系爭軍事系表殺秀以謝氏羌不從倫秀譖之系坐免官遂害之永寧二年追贈光祿大夫弟結少與系齊名結弟育名亞二兄以系故俱被害華軼歆之曾孫也少有才氣聞於當世泛受博納衆論美之初為博士纍遷散騎常侍永嘉中厯振威將軍江州刺史甚有威惠時天子孤危四方瓦解軼每遣貢獻入洛不失臣節淳于智盧人有思義能筮易善厭勝之術消災轉禍不可勝紀而卜筮所占千百皆中南北朝魏房法壽繹幕人少好射獵輕率勇果為平遼將軍與韓麒麟對為冀州刺史性好施親舊賓客率同飢飽卒贈青州刺史諡敬侯曾孫豹拜西河太守遷博陵樂陵二郡太守風教修理稱為美政房士達法夀從弟三益子起家濟州左將軍府倉曹參軍孝昌中其鄉人劉蒼生等作亂士達率州郭之人二千餘東西討擊悉破平之武泰初就家拜平原太守抑挫豪強境內肅然時邢杲寇亂憚其威名越郡城西度不敢攻逼永安末轉濟南太守士達不入京師而頻為本州郡時人榮之房景伯法夀族子家貧傭書自給養母甚謹除齊州輔國長史會刺史亡敕行州事政存寬簡百姓安之後除清河太守郡民劉簡虎曽失禮於景伯即署其子為西曹掾命喻山賊賊以景伯不念舊惡一時俱下論者稱之孝昌三年卒贈左將軍齊州刺史房景先景伯弟幼孤貧無資從師其母自授毛詩曲禮晝則樵蘇夜誦經史遂大通瞻太和中解褐太學博士時太常劉芳侍中崔光當世儒宗歎其精博奏兼著作佐郎修國史纍遷步兵校尉領尚書郎齊州中正所厯皆有當官稱景先沉敏方正事兄恭謹卒贈洛州刺史諡曰文房景遂景伯幼弟重然諾好施與事二兄至謹撫養兄孤恩訓甚篤益州刺史傅豎眼慕其名義啓為昭武府功曹參軍以母老不應卒於家崔承宗齊州人父於宋世仕漢中母喪因殯彼後青齊歸魏遂為隔絶承宗性至孝萬里投險偷路負喪還京師黃門侍郎孫惠蔚聞之曰吾於斯人見廉范之情矣於是弔贈盡禮如舊相識齊劉懷珍平原人漢膠東康王寄之後也辟豫州主簿元嘉中討平司馬順則讓功不肯當時人稱之齊高祖輔政徴為都官尚書建元𥘉轉左衛將軍改霄城侯卒遺言薄葬諡敬侯子靈哲懷珍卒當襲爵以兄子在魏固辭朝廷義之劉善明懷珍族弟宋元嘉末青州飢善明開倉救鄉里百姓呼其家田為續命田魏克青州善明因母在代哀戚如持喪元徽初贖母還沈攸之反善明獻計平之高帝踐阼拜淮南宣城二郡太守封新塗伯建元二年卒家無遺儲惟有書八千卷劉懷慰平原人父喪不食醯醬冬月不絮衣養孤弟妹事寡叔母皆有恩義仕宋為齊郡太守著廉吏論以達其志及卒明帝曰劉懷慰若在朝廷不憂無清吏也明僧紹鬲人明經有儒術宋時隱長廣郡嶗山齊建元元年徴為正員郎不就聞沙門僧遠風德往侯定林寺高帝欲出寺見之僧遠間僧紹曰天子若來居士若為相對僧紹曰山藪之人正當鑿坯以遁若辭不獲命便當依戴公故事耳永明元年詔徴國子博土不就卒梁劉峻懷珍從父弟峻好學聞有異書必往祈借人謂之書淫安成王秀好峻學引為户曹參軍給其書籍使撰類苑未成以疾去因遊東陽紫巖山築室居焉𥘉武帝招文學之士峻率性而動故不任用乃著辨命論以寄其懷普通三年卒諡曰元靖先生劉霽懷慰子九歲能誦左氏傳十四居父憂有至性每哭輒嘔血既長博涉多通天監中起家奉朝請出補西昌相入為尚書主客侍郎未期除海鹽令前後宰二邑並以和理稱母疾霽年巳五十衣不解帶者七旬及亡廬於墓哀慟過禮未終喪而卒劉杳霽弟十三丁父憂每哭哀感行路杳博綜羣書沈約任昉以下有遺忘皆訪問焉大通元年為步軍校尉兼東宫通事舍人纍遷尚書左丞卒杳清儉無所嗜好自居母喪便長斷腥羶臨終遺命不得設靈筵祭醊其子遵行之劉歊杳弟幼有識慧及長博學有文才不娶不仕以山水書籍相娛而已奉母凡以孝弟稱著革終論年三十二卒人以為知命諡曰貞節處士劉訏懷珍從孫幼稱純孝父母卒為伯父所養事伯母及昆姊孝友篤至本州刺史張稷辟為主簿乃挂檄於樹而逃卒年三十一宗人至友諡曰元貞處士北齊張買奴平原人經義該博門徒千餘人諸儒咸推重之厯太學博士國子助教天保中卒趙彥深名隱避齊廟諱以字行平原人幼孤貧事母甚孝安間樂道不雜交遊為雅論所歸服齊神武徵補大丞相功曹參軍專掌機密文翰多出其手神武崩祕喪事文襄巡撫河南委彥深後事既而內外安靜彥深力也纍遷司徒卒年七十彥深厯事纍朝常參機近溫柔謹慎喜怒不形於色子仲將沉敏有父風學涉羣書善草隸位吏部郎隋明克讓鬲人少好儒雅博涉書史三禮禮論尤所研精龜算厯象咸得其妙年十四釋褐湘東王法曹參軍厯官散騎侍郎高祖受禪拜太子內舍人轉率更令進爵為侯詔與太常牛宏等修禮議樂當朝典故多所栽正卒年七十王孝籍平原人少好學博覽羣言遍治五經頗有文翰開皇中召入祕書助修國史後歸鄉里以教授為業注尚書及詩房彥謙法夀元孫通涉五經工草隸仕齊為齊州主簿清簡守法齊亡歸於家開皇中韋藝薦之不得已應命纍遷秦州總管録事參軍煬帝嗣位遂去官後徴授司隸刺史為執政者所嫉出為涇陽令卒於官唐秦瓊厯城人始為隋將來護兒帳內後歸王世充世充多詐因降高祖拜馬軍總管破尉遲敬德走宋金剛從討世充竇建德劉黑闥先鋒鏖陳前無堅對進封翼國公纍拜左武衛大將軍卒贈徐州都督陪葬昭陵後改封胡國公圖形凌煙閣羅士信厯城人隋大業時長白山賊攻齊郡士信年十四擊賊濰水上賊懼無敢亢後討王世充身被重創見獲世充厚遇之士信恥與邴元真等伍來降高祖拜陜州道行軍總管賊平封郯國公從秦王擊劉黑闥得一城士信願守之城陷不屈而死高君狀齊州人貞觀中齊王祏反引騎徇邑聚君狀曰上親平寇難土地甲兵不勝計今王以數千人為亂如一手搖泰山其如君父何祏擒之愧其言不能殺詔擢榆社令時有羅石頭刺祏不克被殺李君求房繼伯據縣不從抗表以聞太宗嘉之賜敕曰縣依舊置改名全節員半千全節人羇丱通書史舉童子高第咸亨中調武陟尉歲旱勸令發粟賑民不從及令謁州率千悉發之下賴以濟除棣豪蘄三州刺史所至禮化大行纍封平原郡公半千事五君有清白節年老不衰樂山水自放卒年九十四吏民哭于野何彥先齊州人武后時位天官侍郎初與員半千同事王義方義方死行喪種松檟墓側三年乃去邵貞一鄒平人以武后革命終身不仕隱於長白山郭虔瓘厯城人開元初為北廷都護突厥默啜子同俄特勒圍北廷虔瓘斬之以功授冠軍大將軍安西副大都護封潞國公崔從全節人少孤貧與凡能偕隱太原山中會嵗飢拾橡實以飯講學不廢擢進士第纍官尚書左丞長慶初領鄜坊節度羌不敢犯境卒諡曰正從為人嚴偉立朝有風望內無聲妓娛玩士大夫賢之子慎由聰警強記有父風由進士第纍官吏部尚書卒贈司空慎由弟安濳進士擢第纍遷太子太傅卒贈太子太師安濳於吏事尤長雖位將相閲具獄未嘗不身聽之孟簡平昌人舉進士宏辭連中纍遷倉部員外郎王叔文任户部簡以不附離徙他曹官終常州刺史太子賓客分司簡工詩尚節義與之交者雖殁視恤其孤不少衰五代梁田敏鄒平人少通春秋之學詳明禮樂博涉典墳梁舉進士至周纍官工部尚書以太子少保致仕子章官至殿中丞周景範長山人顯德中官至中書侍郎同平章事出鎮魏郡并人來寇贊世宗北征世宗優詔褒之宋王杲齊州人宋初征澤潞平揚州杲從行獲戰功乃拔遷散指揮使雍熙中遼兵至杲率衆拒之上召見問狀命監河北有能聲李順亂杲敗賊斬首萬級咸平五年出為亳州水城縣都監𬒳召將入見以疾卒范正辭齊州人治春秋公羊榖梁登第遷國子監丞厯知淄州饒州知上壯其敢斷纍遷河東轉運使兼侍御史知雜事劾李昌齡輩貪墨舉吳奮等任大郡卒年七十五子諷字輔之辨論激昻喜為名聲然亦操持在巳人不敢欺舉進士第通判淄州嵗旱蝗諷至鄒平發官廩貸民比秋民皆先期而輸纍遷光祿卿李惟清章邱人開寶中以三史解褐纍官刑部侍郎惟清倜儻自任有鈎距臨事峻刻所至稱強幹卒贈户部尚書盧錫圭淄州人太平興國中進士咸平中纍遷河北轉運使時北鄙未靖調發軍儲糧道不絶以職務修舉召入遷秩刑部拜右誎議大夫錫圭勤吏職所至以幹集聞韓贄長山人登進士第為侍御史知諫院舉劾無所諱出知州府政簡而治以吏部侍郎致仕贄性行淑均平居自奉至約所得祿賜買田贍族黨退休十五年謝絶人事讀書賦詩以自娛年八十五卒崔遵度江陵人徙淄州之淄川純介好學太平興國中舉進士出知忠州李順之亂遵度領甲士百餘背城而戰賊入投江中州兵援之得免景德初引對崇政殿改太常丞直史館遵度與物無競口不言是非淳淡清素於勢利泊如也善鼓琴喜讀易卒年六十七子拜官者二人張揆其先范陽人後徙齊州擢進士第厯大理寺丞以疾解官十年不出户讀易因通楊雄太元經陳執中薦揆經明行淳召為國子監直講纍遷龍圖閣直學士進言妃族太盛不可不裁損使保其家帝嘉納之後加翰林侍讀學士知審刑院出知齊州卒贈尚書禮部侍郎揆性剛狷少容好讀書老而不倦張掞幼篤孝舉進士纍遷龍圖閣直學士知成德軍宦者閻士良為鈐轄多撓帥權掞劾之纍官户部侍郎事凡揆如父理家必咨而行為鄉黨矜式王樵淄川人博通羣書尤善老子周易咸平中舉家被遼兵所掠樵棄妻入遼訪父母纍年不獲還宋山刻木以葬服喪六年哀動行路又為屬之尊者次第成服北望嘆曰身世如此自比於人可乎遂與俗絶自稱贅世翁晚年遊塞下畫䇿求滅遼不用乃壘石自環謂之繭室病革入室自掩户卒趙自化平原人以醫術稱撰四時養頤録獻真宗又喜為篇什有漢沔詩集五卷周起鄒平人父意知衛州坐事削官起才十三詣京師訟父冤父逎得復故官舉進士通判齊州知開封河中府所至有風烈纍官樞密院副使卒諡安惠起性周密凡奏事及答禁中語隨輒焚草故其言外人無知者劉庭式齊州人舉進士通判密州後監太平觀以高壽終𥘉庭式約取鄉人女及舉進士女以疾盲且貧甚其家不敢復言庭式卒娶之及婦死哭之甚哀程頤蘇軾皆歎以為不可及單煦平原人舉進士知洛陽縣厯知昌濮合州皆有政績纍官光祿卿煦友愛兄熙嘗毆人至死煦曰家貧親老仰凡以事義當代死即詣闕待捕巳而死者蘇驚問之煦以情告其人感歎遂輟訟李格非濟南人幼時俊警異甚有司方以詩賦取士格非獨用意經學著禮記説至數十萬言登進士第為鄆州教授入輔太學錶以文章受知於蘇軾遷禮部員外郎以黨籍罷李昭玘濟南人少與朝補之齊名為蘇軾所知擢進士第纍遷太常少卿崇寧初入黨籍中間居十五年自號樂靜先生寓意法書圖畫貯於十囊命曰燕遊十友𥘉昭玘校試高密得侯蒙蒙執政使人致巳意昭玘惟求祕閣法帖而已靖康初復以起居舍人召而已卒吕頤浩其先樂陵人徙齊州中進士第纍官吏部尚書建炎二年車駕南渡鎮江頤浩願留為江北聲援金人去揚州改江東安撫置使兼知江寧府時苗傅劉正彥為逆逼高宗避位頤浩寓書張浚遂以兵發江寧舉鞭誓衆士皆感厲高宗復辟頤浩秉政屢請興師復中原九年金人歸河南地高宗欲以頤浩往陜西以老病辭且條陜西利害卒贈太師諡忠穆頤浩有膽略善鞍馬弓劍當國步艱難之際人倚之為重辛棄疾厯城人少與黨懷英同學號辛黨耿京聚兵山東棄疾為掌書記勸京奉表歸宋會張安國殺京降金棄疾趨金營縛之以歸獻俘行在厯官樞密都承旨棄疾豪爽尚氣節所交多海內知名士嘗同朱熹遊熹殁偽學禁方嚴獨為文往哭之雅善長短句有稼軒集行世卒贈光祿大夫德祐初加贈少師諡忠敏王衣厯城人中明法科遷大理少卿韓世忠執苗傅劉正彥獻俘檻車幾百兩先付大理獄將盡尸諸市衣奏自傅正彥妻子外皆釋之刪雜犯死罪四十七條成書帝嘉其議法詳明纍除刑部侍郎衣質直和易持法不阿議者賢之金周馳厯城人以策論魁天下貞祐間濟南破不肯降攜一孫赴井死馬驤禹城人登進士厯官有聲貞祐三年為濟隂令元兵克曹州𬒳執不屈死之贈朝列大夫張順淄州士伍淄州被圍行省遣兵救之順往覘兵勢為所執使宣言行省軍敗宜速降順陽許諾乃呼城中曰外兵無多節度軍且至堅守無降敵兵刃交下遂死淄人知救至以死守城賴以全後贈宣武將軍楊敏中淄州人貞祐初元兵取淄州敏中與判官齊鷹揚及州民張乞驢等募兵備禦城陷率衆巷戰鷹揚戰死敏中與乞驢被執亦不屈而死元嚴實長清人略知書志氣豪放授東平路行軍萬户約束諸將母敢妄有殺掠會大飢逃亡無所託實作糜粥置道傍全活者衆卒年五十九遠近悲悼野哭巷祭旬月不巳中統初追封魯國公諡武惠劉伯林濟南人好任俠善騎射金末為威寧防城千户入元以功纍遷西京留守兼兵馬副元帥伯林在威寧十餘年務農積榖與民休息鄰境凋瘵而威寧獨為樂土卒纍贈太師封秦國公子黑馬名嶷驍勇有志略弱冠隨父征伐大小數百戰出人行陳略無懼色襲父職為萬户佩虎符兼都元帥中統三年命兼成都路軍民經略使瀘州被圍時巳屬疾猶親督轉輸不輟左右諫其少休嶷曰國事方急以此死無憾遂卒年六十三贈太傅盄忠惠子十二人元振元禮顯張榮厯城人授山東行尚書省兼兵馬都元帥知濟南府事時民爭發墓劫銀榮下令禁絶朝廷議取汴榮請先六軍以清蹕道汴梁下河南民北徙至濟南榮令分屋與地居之俾得樹畜且課其殿最曠野闢為樂土是嵗中書考績為天下第一世祖即位封濟南公卒年八十二孟德濟南人由鄒平令纍官至同知濟南路事尋領濟南軍攻宋徐光濠蘄黃等州積有戰功以老告歸子義襲為萬户領兵守沂郯數戰有功纍授昭勇大將軍招討使張均濟南人父山從軍伐宋以功為百户戰死均襲父職世祖時纍立戰功加宣武將軍升松江萬户大德初為和林等處都元帥鎮國上將軍劉通齊河人從嚴實歸元為齊河總管尋授鎮國上將軍濟南知府宋將彭義斌攻齊河率衆夜登通與六七人鼓嗓而進宋人驚懼墜溺死甚衆義斌以數騎免遷德州等處二萬户軍民總管卒子復亨襲為行軍千户中統初進武衛軍副都指揮使李璮叛遣使招復亨復亨斬之時兵集濟南乏食復亨盡出私蓄以濟師世祖嘉之至元中加奉國上將軍卒子五人浩澤澧淵淮劉斌厯城人少孤有勇力從張榮起兵屢立戰功升濟南新舊軍萬户移鎮邳州宋將憚之病作謂其子曰居官當廉正自守毋黷貨以喪身敗家語畢而逝諡武莊子思敬襲職立功授濟南武衛軍總管纍遷江西行省參知政事卒諡忠肅張照濟南人幼頴悟力學世祖時辟為中書省掾尋知兗州事改授淮西等路行中書省左右司郎中時元軍進攻瓜州鎮江照運糧儲給戰具贊畫之力居多揚州未下照躬往招諭皆望風欵附厯官揚州鎮江東昌三路總管所至吏民畏服以治最稱卒封清河郡侯諡敬惠劉敏中章邱人幼卓異不凡嘗言其志曰自幼至老相見無愧色乃吾志也至元中拜監察御史劾桑格姦邪不報辭職歸復起厯集賢學士商議中書省事上疏陳十事纍遷翰林學士承旨敏中生平身不懷幣口不論錢義不苟進進必有所匡救每以時事為憂中夜歎息淚溼枕席著有中菴集卒贈光祿大夫封齊國公諡文簡桑格舊作桑哥今改正楊文郁濟陽人兒時讀書過目輒成誦平生沖淡寡欲授闕里教授四方來學者多所成就遷祭酒移疾歸大德初特詔乘傳入京厯翰林承旨卒諡文安張養浩濟南人幼有行義讀書不輟授堂邑尹民為立碑頌德拜監察御史疏時政萬餘言後拜禮部尚書參議中書省事會元日欲張燈為鼇山上疏罷之以父老棄官歸尋丁父憂纍召不起天厯初關中飢特拜陜西行臺御史中丞聞命即到官夜則禱於天晝則出賑飢民終日不少怠遂得疾不起卒封濱國公諡文忠張起巖章邱人弱冠為福山縣教諭攝縣事聽斷明允嗣中延祐進士除同知登州事改集賢修撰轉監察御史拜禮部尚書文宗親郊起巖充大禮使步武有節望之如古圖畫中所覩帝甚嘉之轉燕南廉訪使搏擊豪強不少容貸滹沱河水為真定害起巖移文責河神水患遂息積階至榮祿大夫卒諡文穆起巖美髯眉外和中剛名聞四裔性孝友卒之日家無餘財先是太史奏文昌星明明日仁宗生起巖亦生後仁宗設科取士起巖第一論者以為非偶然也韓鏞濟南人延祐中進士纍除僉浙西廉訪司事擊姦暴黜貪墨郡縣肅然拜侍御史以剛介為時所忌乃罷去復起授饒州路總管厯遷西行臺中丞卒於官鮑興鄒平人至正間隨父宦遊浙值兵避難於淞母喪三年守墓哀毁骨立置一船載父隨寓為家父名隱號漁樵主者潘昻霄濟南人號蒼崖雄文博學為當時推重官至翰林侍讀學士著有蒼崖類稿金石例子詡為江西提刑理問魏中立濟南人由國子伴學厯官陜西行臺御史中丞遷守饒州徐夀輝陷湖廣分攻州郡中立以義兵擊却之巳而賊復合遂為所執以紅衣被其身欲屈之大罵不巳遂𬒳害訾汝道齊河人居父喪以孝聞母嘗寢疾晝夜不去側母卒哀毁終喪不御酒肉性友愛二弟將析居悉以美田廬讓之里中嘗大疫或曰癘氣能染人勿入也不聽益周行問所苦嘗出粟貸人至秋無以償聚其劵焚之縣令李讓為請旌其家劉琮厯城人父久病盡賣妻女養父資竭無措乃焚書請代父死書牒坎地埋之遂得錢一窖出錢水涌父飲即愈因名其處曰孝感泉張名德淄川人官至般陽路總管毛貴攻城名德死之贈河南行省右丞諡忠襄許輔臨邑人至正中授青州路總管受詔勤王戰殁於陳明王漣長山人師事金華宋濂學問精邃洪武中擢史館選入文華堂肄業尋攝御史按河南回奏稱旨太祖稱之曰宰相才也宋性德州人洪武中以貢入國學嘗代所知草疏上奇其文召見除刑部主事永樂初位至四川右參政進北京刑部右侍郎因病告歸被讒籍其家無餘資上知其廉賜地十頃免其租高咸安濟南人建文時貢士燕兵攻濟南城咸安心非之乃作周公相成王論射營中軍士執以見成祖欲官之不可遂遣還卒年九十七耿通齊東人洪武中領鄉薦永樂𥘉擢刑科給事中屢有彈劾朝端憚之遷大理寺丞漢王高煦謀奪嫡通數言太子無過以開帝意帝怒假他事磔死天下惜之張惠德州人永樂中任監察御史巡按雲南有御史張善以蛇妖病卧惠往視頃之妖蛇挾風雨而至惠射之風雨止而蛇匿於樹焚其樹蛇墜善病尋愈過沅陵見居民延燒數百家皆言有惡鳥銜火惠為文檄城隍神翼日惡鳥投死於江拜禮部尚書天順三年卒於官張謹長清人長於文藝纂成祖實録徴入史館臺省薦擢為刑科給事中彈劾不避權貴時交南叛謹知思南府兼提督軍務至則單騎詣壘諭以威福酋皆畏服民以安堵子剛天順進士纍遷僉都御史以邊功奏捷憲宗曰西有王鉞北有張剛朕何憂哉王允厯城人正統進士任御史有直聲父母殁並廬墓三年有烏集兔馴之異詔旌其門李綱長清人天順進士纍官僉都御史綱性剛直與物寡合平江侯陳豫素與綱有隙聞其殁即館檢其笥惟敝衣圖書而已乃嘆曰不意有此鐵御史也李森厯城人天順進士授給事中有直聲成化初日食地震森疏陳十事時有貴幸侵民田率諸給事劾之不問後諫萬貴妃專寵謫定州同知張鼐厯城人成化進士授監察御史抗疏劾李孜省出為彬州判官尋起河南僉事纍升都御史巡撫遼東詔入掌院忤劉瑾削職歸瑾敗復官學者稱為柏山先生徐以貞長山人成化進士知晉寧縣發姦􅎥伏聽訟明察服闋復任政治益勵纍升都御史巡撫陜西有戰功後忤劉瑾左遷鳯翔府以病乞歸王坦平原人成化進士官給事中上疏切諫皆中時弊外戚王源占地一千二百二十餘頃坦又以為言尋坐事貶北流主簿宏治户兵二科執法嚴明卒於官劉珂齊河人正德中流賊攻城城陷執珂及其子鎛賊以刃恐之使索婦女珂不從賊先斷其子臂憤罵益力賊併殺之王廷輔德平人善騎射正德間流賊倡亂廷輔與宋珏等三百餘人捍賊賊走追之賊反攻衆潰乃下馬步射矢盡遇害葛守禮德平人嘉靖進士授彰德推官有聲遷禮部郎中會有行賂請繼封者事聞籍記遺賂無守禮名帝由是重其廉纍遷户部尚書奏定國計簿式夙弊以清時徐階高拱張居正更用事交相軋守禮周旋其間正色獨立人以為難卒贈太子太傅諡端肅李開先章邱人嘉靖進士能詩文善填詞與唐順之趙時春等稱八才子纍升太常少卿時邑人袁崇冕謝九容龔最並以詩詞名世葉洪德州衛人嘉靖進士擢給事中性剛毅遇事敢言疏凡數十上皆軍國大事巳極論吏部尚書汪鋐姦忤旨奪俸尋貶寧國縣丞盧宗哲德州衛人嘉靖進士選庶吉士嚴嵩秉政欲籠致之不可纍官南太僕寺卿有贖金三千或謂例當取宗哲笑曰豈有懷金盧濬卿哉入為光祿卿時上供值不時豫賈人苦之宗哲悉發羡金償之後推升户部侍郎為嵩所格罷官歸王崇義淄川人十嵗通易傳毛詩小戴禮舉嘉靖進士授刑部主事會曹妃宫婢楊金英等謀逆上怒欲族之崇義抗論曰外家安與知內庭猝發事律止坐其家長餘可無問也所全活七十餘人奉命恤河南獄録可矜者數百人以聞出守寧波致仕歸李攀龍厯城人嘉靖進士厯陜西提督學副使居家十年復出纍遷河南按察使好讀書工詩文高自標置築白雪樓於鮑山華不注之間曰他無所溷吾目也與王世貞齊名世稱王李又與徐中行宗臣梁有譽謝榛吳國倫稱嘉隆七子劉祿章邱人嘉靖進士除給事中疏救尚書王杲忤嚴嵩廷杖七十謫荔浦尉隆慶初詔復職升太常少卿劉中立禹城人嘉靖進士任給事中張居正當國中立抗疏劾之出為陜西參政轉山西時溫峪有山賊嘯聚發兵平之父喪徒跣至家號痛感疾而卒陳孟珂禹城人父守用為光山典史時牢山寇發被執賊刃脅之大罵不屈遇害侯承恩齊河人父仲舉通渭縣典史賊至仲舉出敵被擒承思後至奮力擊賊救父父走脫賊復合圍磔承思撫臣嘉其忠孝立祠神仙嶺殷士儋厯城人嘉靖丁未進士改翰林纍官大學士高拱專政屢加排擠遜避以歸築廬濼水之濱以經史自娛卒諡文莊學者稱曰棠川先生耿鳴世新城人隆慶進士初知邢臺請減重稅三之一引水灌城西田百頃嵗增穀萬石按河西甫二月逐三墨吏餘者皆望風去纍官隴右參議再按應天以忤張居正左遷趙世卿厯城人隆慶進士萬厯初授南京兵部主事陳匡時五要忤張居正意落職歸居正死纍遷户部尚書請停礦稅又請發帑濟邊前後疏纍上署吏部推舉無所私世卿素厲清操當官盡職帝重之而不能用後連章乞去不報乘柴車徑去亦不罪王象乾新城人祖重光嘉靖進士纍官貴州右參議父之坦由進士纍官户部侍郎象乾舉隆慶進士厯僉都御史巡撫宣府在任七年邊境無事以功加兵部侍郎總督川湖貴州軍務時楊應龍初平播州銅仁諸寇相繼為亂悉討平之尋總督薊遼朵顏結諸部頻抄掠象乾至遣使諭之乃納𣢾秩滿進兵部尚書兼署吏部事疏薦鄒元標趙南星等不報崇禎初瑚敦圖大入山西時象乾年八十三即家起總督宣大山西軍務瑚敦圖受約束如故象乾權警有膽略前後厯官督撫威名著九邊纍加太子太師以病乞歸卒弟象晉字康宇萬厯進士由中書厯遷河南按察使時宗室蘭陽王起大獄象晉力持之全活甚衆遷浙江右布政使亦有聲績年七十引歸著書凡數十種象晉子與蔭崇禎進士由翰林庶吉士改御史李自成陷京師與妻于氏子諸生士和同縊死瑚敦圖舊作虎墩兔今改正張一元鄒平人隆慶進士纍升右僉都御史巡撫河南嵗飢疏請留贖金借鄖餉河北漕米請發內帑上悉從之大盜自省挾飢民為亂一元計擒之巡按希旨請開礦一元執奏不可事得寢姪延登萬厯進士厯縣令擢給事中以副都御史巡撫浙江首毁閹祠討平閩賊周三老等纍官工部尚書改左都御史卒諡忠定邢侗臨邑人萬厯進士初授南宫知縣邑大治擢為御史按三吳捕大俠急荒政及代吳民夾江泣送以親老乞休詩文書法擅妙一時有來禽館集及手書法帖傳于世孫止孝厯城人萬厯進士備兵密雲以忤權貴歸巳卯城陷自縊死同時死者舉人劉敕穆遠劉化光賈槐張元英稽嵐胡顯宗米嘉珠徐暉吉劉汝通丁振王啓亨貢生張允文劉檄史臣贊總兵吳安邦武進士王敬賢京營副將費克讓指揮陳光先等數十人程紹德州人萬厯進士擢户科給事中再疏請撤礦使不報轉吏科多所劾奏謫歸光宗即位以副都御史巡撫河南儀封宗人為盜窟紹列上其狀廢徙高牆會玉璽出臨漳紹言國之所寶在德不在璽因薦鄒元標馮從吾等疏上忤魏忠賢意嗾御史劾之遂引疾而歸畢自嚴淄川人萬厯進士厯天津巡撫厲兵核餉公私賴之數忤魏忠賢意引疾去崇禎中進户部尚書綜核各鎮額餉客餉之數甚悉所條奏事宜悉報可時京師被兵旨中夜數發自嚴奏答無滯不敢安寢頭目臃腫事幸無乏屢加太子太保致仕歸王浩萬厯進士署户部河南司篆有大璫銜上命索珠寶直溢額三十萬浩執不與曰貴人第云臣浩不可竟得寢知潞安府有惠政升河南副使老幼擁車轍而泣至三日不得行焦馨章邱人萬厯進士厯官巡撫寧夏道過堂邑聞魏璫建祠事馨曰吾頭可斷祠不可建及抵任將吏頻言馨曰倘有禍我獨當也卒不為建尋解組歸搆一别業曰余香園蒔花植卉與親友笑歌卒祀鄉賢王象復象乾從弟厯官保定府同知以不拜魏璫生祠罷歸崇禎辛未年李九成兵變象復時方屬疾語其子曰吾家世受國恩義不可去與其子與夔率蒼頭數十人守南門而亂兵已焚北門入父子皆被執死之尸相抱不可解事聞各贈恤有差高舉淄川人萬厯進士知完縣蒲圻皆有惠政徵為御史時內璫張德毆死平人衆莫敢問舉抗疏致璫於法河決淮泗舉按其地築塞形勢卒如其言後巡撫浙江省軍需萬緡捐贖鍰數千金築南湖隄王三遷臨邑人幼孤事母孝母卒殯茅屋鄰火延燒茅已焦三遷抱柩大呼曰兒在此風應聲折而南火熄柩無恙葬之日匍匐哀號路人釋負而嘆夜有甘露降墓柏有司一其事題其門曰節孝盧世㴶德州人九嵗而孤哀毁如成人事母及兄申之變世姊以孝弟聞舉天啓進士纍官御史甲㴶與其鄉人擒斬偽官倡義討賊後數年卒於家世㴶好賦詩即家創一亭祀杜少陵擁書萬卷客至飲酒其中隤然自放有文集行世本朝焦育慶章邱人順治初由貢生授江西永新令清白自誓會金聲桓為逆育慶罵賊而死妾劉氏并僕劉治張乾皆盡節死趙尹振齊河人性倜儻尚節氣順治丙戌進士任阜城令有循聲尋調衡山時闖賊餘黨突陷湘潭或勸棄城去尹振不可城陷死之董振秀平原人性警敏倜儻有志明末土寇蜂起乃練鄉勇為守禦值嵗飢施粥活數萬人本朝順治中由貢生通判太平瀕湖多盜振秀伏壯士舟中命羸弱者擊棹為商賈狀盜望見遽登舟伏甲突出盡擒之纍遷福建副使會建寧兵薄城下振秀完守備率死士擊敗之獲糧數萬斛兵民以安劉開文鄒平人初任江西南瑞道調湖北下荆南道順治三年總兵王光恩結流寇叛劫襄陽府府庫及光恩被逮其弟光泰成遂復煽衆寇鄖陽開文率城內衆官力禦之城陷遇害贈光祿寺卿廕子鵬翀知州索應運德州人任陜西白水知縣順治三年流寇劉文丙攻城應運悉力捍禦城陷殺胥役劉廷漢等應運巷戰遇害贈按察司僉事王士正新城人順治戊戌進士任揚州推官以才名內遷部曹改翰林纍遷左都御史刑部尚書以詩文領袖藝林所著凡三十二種乾隆三十二年賜諡文簡兄士祿順治乙未進士官考功員外郎亦工詩與士正齊名于覺世新城人順治己亥進士除歸德府推官改知巢縣禁巫風賑飢饉威惠甚著巨寇宋某起安廬謀據焦湖應滇逆揚帆自大江東下覺世偵知之設伏於南門之浮橋身率甲士邀擊之殱其魁安廬之盜遂絶官至參議致仕歸奉繼母甚謹鄉黨稱孝焉田雯德州人康熙甲辰進士由中書舍人厯户部員外郎請以白糧附漕艘運費不煩而民力省著為定例纍督江南學政由鴻臚卿出撫江寧濬京口運河公私便之調撫貴州時苗狆猖獗粵省力議會剿雯移書制府謂制苗之法犯則治之否則防之而巳議遂寢以户部左侍郎督河工歸雯博綜史學詩文名一時董訥振秀孫康熙丁未進士由編修纍官左都御史尋總督兩江新屯蠧政訥奏罷之改督漕運設易知小單剔弊釐姦漕政肅清王俟長山遷曲人康熙庚戌進士知興國州靖府同知苗蠻時劫敓俟單騎入山委曲開導苗人皆帖服升知重慶府尤有善政何世璂新城人康熙己丑進士入史館十餘年出督浙江學政尋改兩淮運使潔巳奉公纍官直隸總督卒諡端簡朱士含平原縣諸生幼以孝稱事繼母頗得歡心父遘疾延醫數百里外藥必親嘗經年不解衣帶及父殁喪禮兼至既葬廬墓三年哀慕終身乾隆四年旌袁承寵長山人父景文户部主事承寵七齡母卒盡禮如成人閲三載父殁繼母李氏于歸方二載每欲身殉承寵百計防範任官後迎養備至嗣李氏患癰瘓病亟時侍湯藥衣不解帶者九十餘日承寵由湖北德安同知洊擢至臬司旋簡太常廉介之操終始如一至周恤戚族修造橋梁人尤稱之袁守俰長山人乾隆庚寅舉人厯官户部刑部郎中少有至性常依依父母之側及長最得兩親歡父官戶部郎中其卒也兩兄皆遠宦守俰親視舍斂哭絶者屢母卒盡哀目疾遂劇不復出仕長兄守侗於保定節署往返營護次兄守仲蘭州同知以疾歸不能動履謹視湯藥一載有餘官刑部時留意平反有好司官之目邑令謀修邑志守俰力贊成之後鳩捐重修郡學其他倡義之舉不可勝數劉永泰臨邑人由藍翎侍衛授廣東增城營守備乾隆五十三年隨征安南擊賊於黎城遇害廕恩騎尉龔殿安厯城人四川重慶鎮中營守備乾隆三十一年緬甸滋擾殿安擊賊猛密力竭遇害周禮厯城人署長清營千總嘉慶元年隨剿賊匪力竭遇害廕雲騎尉張齡霞臨邑人由武舉洊擢山西大同鎮守備嘉慶四年勦捕教匪賊敗而復合齡霞力戰身死廕雲騎尉姚國棟厯城人由武舉洊擢湖北興國營參將嘉慶六年防守竹溪賊匪攻城國棟督兵堵禦並督催糧運時戴家營賊黨又會合青藍號大股賊衆滋擾國棟奮勇迎擊路仄米凌馬力難施遂遇害廕雲騎尉胥泗起厯城人由行伍洊升河南南陽鎮中營遊擊隨勦湖北賊匪多著戰功嘉慶七年擊賊於馬鬃嶺山徑陡險墜崖卒廕雲騎尉流寓周扁鵲渤海人善醫嘗居濟州盧縣遂號盧醫漢鄭康成北海高密人嘗寄居陽邱之黌山山有草如薤土人名曰鄭公書帶南北朝魏溫子升太原人家於濟南始為廣陽王深賤客在馬坊教奴子書熙平初射䇿高第輔御史齊文襄引為咨議參軍五代唐張易未詳其籍少讀書長白山苦學自勵食無鹽酪者五嵗齊有高士王遠靈居海上博學精識少許可易從之遊數年元李泂滕州人僑居濟南有湖山花竹之勝作亭曰天心水面文宗敕虞集製文以記之列女晉解結女濟南著人惠帝時結被戮女適裴氏明日當嫁而禍起裴氏欲認活之女曰家既若此我活何為亦坐死朝廷遂議革舊制女不從坐由結女始南北朝魏孫氏女名男玉平原鄃縣人夫為靈縣民所殺女追執仇人以杖毆殺之有司處死以聞顯祖特恕之苟金龍妻劉氏平原人世宗時金龍為梓潼太守梁遣衆攻圍金龍疾不能任事劉修戰具一夜悉成城乏水劉集衆訴於天俄而雨澍人得以濟後援至賊退事聞世宗嘉之北齊趙彥深母傅氏平原人彥深三嵗傅便孀居家人欲使改適自誓以死彥深五嵗傅謂之曰家貧而汝小何以能濟對之流涕及彥深拜太常卿還不退朝服先入見母跪陳幼小孤露蒙訓得至此母子相泣久之然後改服後為宜陽國太妃唐盧惟清妻徐氏淄川人惟清貶播州尉徐還鄉里糲食斥鉛膏采絺不御會赦徐間關迎至荆州聞惟清死二髯奴將劫徐歸下江徐數其罪不敢逼劫其資去徐倍道行至播州足繭流血迎尸還葬宋崔志女禹城人事母孝政和中母病忽思食魚不得女聞古有王祥事竟往河中卧凡十日得魚三尾鱗鬛稍異歸以遺母食之病頓愈或問方卧時何如女曰以身試冰不覺寒也元劉公翼妻蕭氏厯城人頗通書史至正中聞毛貴兵將壓境豫與夫謀願作清白鬼居無何城陷蕭解絛自縊死李伍妻張氏鄒平人伍死戍所張飬舅姑及死喪葬無遺禮既而歎曰夫骨暴遠土妾敢愛死乎乃行四十日至戍所見夫從子零詢夫葬地則榛莽不可識張哀慟欲絶夫忽降於童指骨所在如其言得之遂與零護喪還吕彥能妻劉氏陵州人至正中賊犯陵州彥能與家人謀所往其姊曰吾喪夫又無後不死何為遂赴并死劉語彥能曰君可自往妾入井矣二女子婦王氏二孫女一門死者七人明逯經生妻于氏章邱人經生殁足不出户門內草生若無人嘗三日不舉火鄰人餽之粟却不受縣令武金過其里聞之武故遺腹子重苦節造門求一見于辭曰孀居以來誓不見男子武拜於門外嘆息而去韓震吉妻楊氏章邱人震吉少業儒忽遘疾呼楊語曰若能從吾地下否揚泣應曰能後一日韓竟不起楊一痛而絶逮夜蘇告舅姑曰新婦業許亡人死不得復事舅姑止之不從復召其母兄諭之氏佯許逮夜乘間自縊死薑守身妻楊氏章邱人守身死楊號泣忽絶絶而復蘇者數四涕泣向母曰兒欲從亡人地下義不得為母留母防間甚嚴越四月命諸侍女往墓祭留一侍女盛兒者侍諸侍女甫出即浴身理髮自縊盛兒亦自縊楊氏傍有司請於朝賜廟曰雙烈申記兒章邱人舊軍鎮民家女也記兒生而艷年十六端莊沉靜不茍言笑正德中山東盜起記兒被執賊百計誘之不從遇害敕表其門曰烈女坊韓汴妻胡氏淄川人年十七適汴越明年汴病卒胡哭之痛絶而蘇復自縊王象節妻畢氏新城人象節為翰林檢討時畢從宦京師象節病不起畢氏請以象節弟子亮為後悉以管錀付嗣于閉户自縊按舊志載新城典史玉天民女年十二崇禎末遇兵變赴火死謹附記劉應熊妻趙氏齊河人知縣趙鑑孫女應熊病殁趙潛入寢室自縊宋氏女齊河人許宇杜永實未娶永實病殁女聞之不食欲以身殉父母阻之未幾有求配者父母欲許之女夜潛起佩永實原聘叉梳自縊於寢門崔瑞妻吳氏濟陽人正德間從夫往萊蕪道遇賊欲汚之不從賊怒支解之并殺其夫馬拯妻邢氏臨邑人名慈靜拯為貴州布政使值苗亂盡瘁卒邢痛絶復蘇扶夫柩歸遇風濤輒大號曰柩存與存柩亡與亡耳後得歸氏自赴闕上言夫勞績上憫之贈拯太常寺卿氏博學工詩文兼妙書畫與兄侗齊名王繼宗妻張氏長清人正德間流賊剽掠清邑與張禮妻劉氏俱為賊所執欲汚之罵不絶口賊怒張被槊貫心死劉被刀削面死趙一楠妻劉氏陵縣人萬厯間遇土寇一楠妾吳氏以刀自刺死吳妹亦一楠妾刺頸未斷延數日亦死劉氏自母家歸而寇復至罵不絶口遇害時稱一門三烈周光烈妻謝氏德州人御史廷䇿女通女範女則諸書十八嵗適光烈克盡婦道光烈卒大慟整衣辭姑及母屏漿絶粒誓以身殉母凡諭之觸階求死越五日卒許氏女德州人邑人上選女也崇禎末女年十四城破藏地窖中及被發度不能免曰身不可辱也即自縊蘄佑妻李氏德平人佑病篤與李訣曰豫病在旦夕三子尚幼能守乎李敬諾潛自語曰與其後夫而死以致疑孰若先夫而死以示信遂自縊本朝焦育慶妾劉氏章邱人育慶令永新氏隨夫抵任時逆鎮金聲桓㺯兵豫章育慶抗節遇害氏聞變自縊死馬驌妾趙氏鄒平人驌任靈壁縣知縣卒於官氏扶柩歸葬自經死董其纕妻王氏臨邑人夫亡誓以死殉不食死順治九年旌趙明徴妻楊氏厯城人年二十五夫亡守節六十年同縣趙士琦妻吕氏張幼智妻楊氏均康熙年間旌王延英妻張氏章邱人夫亡守節撫孤毁家紓變康熙年間旌張憉居妻劉氏鄒平人憉居早亡氏撫孤守節姑死貧不能葬氏勤勞織紡日積數文積二十五年與夫喪並舉康熙年間旌劉應蛟妻胡氏淄川人年十九夫亡姑老于幼又遭歲祲備嘗艱苦順治四年山賊竊發氏豫於崖側潛鑿一洞寇至匿姑及子於洞中藉以得免苦節五十餘年同縣孫延齡妻袁氏與二女為賊所迫俱赴井死同時抗賊死節高玫妻翟氏張泰瑞妻談氏泰瑞子譜妻高氏唐之傑妻馬氏韓茂椿妻賈氏丁郕妻吕氏薛觀妻張氏韓茂樞妻畢氏王泮繼妻殷氏均康熙年間旌王楨妻韓氏長山人楨厯仕太常寺少卿順治三年山寇入城婦女皆驚避氏曰我命婦也不可先去以為民望翼日被掠罵賊而死同縣高尹妻郭氏遇山寇掠城郭坐不為起賊掖之大罵被殺又烈婦沈鼎妻王氏許光妻李氏李可與妻張氏總兵王應統繼妻劉氏均康熙年間旌王與玫妻沈氏新城人崇禎壬午與玫殉難氏守節撫孤三十餘年同縣耿宏烈妻鄭氏侯爵妻周氏均康熙年間旌韓春魁妻杜氏齊東人夫亡無子取外甥為韓後曰是亦一線可寄也苦節六十餘年同縣趙榮妻劉氏淄川山寇劫掠縣境氏拒賊死之就其地瘞焉越三年備棺改葬顔色如生參政張惟養妾毛氏惟養卒不食而死均康熙年間旌魏宏度妻紀氏禹城人年二十夫亡嗣子相繼夭殁氏守節四十餘年康熙年間旌邢王允妻王氏臨邑人年十九夫亡遺孤方在襁褓氏守節撫孤四十年如一日康熙二十年旌韋守官妻梁氏長清人自幼許字守官年飢其父攜氏就食河南鬻於富室及笄養主為之謀聘氏泣以幼許韋姓不願改適乃使人達韋韋往迎歸巳而守官病殁親族謀嫁之氏曰吾