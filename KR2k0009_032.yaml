豪商占利方論奏未見報爲恨性寡欲門無餽餉淮南人德之立碑刻其遺爱贈司空諡貞穆五代周朱昂潭州人北遊江淮世宗南征韓令坤統兵至揚州昂謁見陳治亂方畧令坤奇之署權知揚子縣適兵草之際昂便宜綏輯復逋亡者七千餘家令坤卽表授本縣令向拱河内人顯德初拜淮南節度使時周師久駐淮揚都將驕恣横暴拱至戮不奉法者數輩軍中肅然荆罕儒信都人顯德中拜泰州刺史修築羅城增子城營州治世宗幸泰州以爲團練使軍吏耆艾詣闕請留恭帝詔襃之宋李處耘上黨人太祖時知揚州大兵之後境内凋弊處耘勤於綏撫奏減城中居民屋税民皆悦服建隆二年詔歸京師老幼遮道涕泣累日不得去張觀毘陵人太宗時知揚州有善政劉綜虞鄉人太宗時知建安軍先是天長軍及六合縣民輸賦非便綜奏請降天長軍為縣隸揚州以六合縣隸建安軍自是民力均濟王禹偁鉅野人太宗時知揚州每政暇遊覽名勝所至多有吟咏范仲淹吳人真宗時監泰州西溪鹽税謀於發運張綸修捍海堰又置閘以通漕滷地復為良田唐肅錢塘人真宗時徙泰州司理參軍有商人寓逆旅而同宿者殺人亡去商人夜聞人聲往視之血染商人衣為捕吏所執州趣獄具肅探知其冤持之後數日得殺人者賈宗天禧中為江淮發運使議開揚州古河繚城南接運渠毀龍舟新興茱萸三堰鑿近堰漕路以均水勢役旣成而水注新河與三堰平漕船無阻公私大便韓琦安陽人仁宗時知泰州後復以資政殿學士知揚州增學田請蠲無名之斂置常平倉米以備賑民肖像祀之尹洙河南人韓琦知泰州辟為通判州事杜衍山陰人仁宗時知揚州有司奏衍辨獄法當賞遷刑部章獻太后遣使安撫淮南使還未及他語問杜衍安否使者以治狀對太后歎曰吾知之久矣王琪華陽人調江都主簿上時務十二事請建義倉置營田減度僧罷鬻爵禁錦綺珠貝行鄉飲藉田復制科興學校仁宗嘉之沈起鄞人監真州轉般倉聞父病委官歸侍以䘮免有司劾其擅去終䘮薦書應格當遷用帝謂輔臣曰觀過知仁今由父疾而致罪何以厚風教而勸天下之為人子者乃特遷之王珪華陽人仁宗時通判揚州吏民皆少珪有大校嫚不謹捽置之法王倫犯淮南珪議出郊掩擊之賊遁去孔道輔孔子四十五代孫郭皇后廢道輔率諌官伏閣請對出知泰州包拯合肥人以喪子乞便郡知揚州舊制訟訴不得徑造庭下拯開正門使至前陳曲直吏不敢欺唐介江陵人仁宗時知揚州有善政胡宿晉陵人仁宗時為揚子尉縣大水民𬒳溺宿率公私船活數千人孫構博平人擢知真州凶嵗得盜令名指黨伍悉寘諸法境内為清劉敞新喻人仁宗時知揚州揚之雷塘漢雷陂也舊為民田其後官取瀦水而不償以它田主皆失業然塘亦破決不可漕復用為田敞據塘舊劵悉以還民天長縣鞫王甲殺人旣具獄敞見而察其冤相傳以為神明余靖曲江人仁宗時監泰州税張綸汝陰人權知泰州築漕河隄二百里於高郵北修捍海堰復逋户二千六百州民利之為立生祠文彥博介休人仁宗時知泰州有惠政歐陽修廬陵人仁宗時知揚州寛簡不擾蒞政再閲月官府閒於僧舍嘗曰吾寛不為苛急簡不為煩碎非廢事也富弼河南人英宗時判揚州吕公著壽州人元豐中為揚州安撫使性勤勵秉燭視牘尤詳於聽覽轉運使輦乳香萬觔配賣郡中悉停之庫不為強配民尤德之鮮于侁閬州人元豐二年命知揚州神宗曰廣陵重鎮久不得人今朕自選卿往宜善治之蘇軾自湖州赴獄道揚侁往見臺吏不許通或曰公與軾往來書文宜焚之不然且獲罪侁曰欺君負友吾不忍為以忠義分譴則所願也羅適寕海人元豐中知江都濬大石湖漑田千餘頃興復水利五十五處灌漑田桑甚衆民繪像祀之毛漸江山人元祐初知高郵軍留心水利郡有水門石䃮及運鹽河洩水涵管皆漸所建遂爲永利蘇軾眉山人元祐中知揚州舊發運司主東南漕法聽操者私載物貨征商不得留難故操舟者輒富厚所載率速達無虞後禁而不許多盜所載以濟饑寒公私皆病軾請復舊從之章縡吳人徽宗時提點淮南東路刑獄權知揚州兼提舉茶鹽事時方鑄崇寕大錢令下市區畫閉縡飭市易務致百貨以小錢收之且檄倉吏糴米以大錢予之盡十日止民心遂安陳瓘鄞人徽宗時出知泰州石公弼新昌人徽宗時知揚州羣不逞爲俠於閭里自號亡命社公弼取其魁傑痛治社遂破散江賊巢藏菰蘆中白晝出剽吏畏不敢問公弼嚴賞罰督捕盡除之王漢之常山人徽宗時知真州時詔諸道經畫財用上諸朝漢之言所在無都籍是以不能周知而校其登耗以待用願令郡縣先置籍總之諸道則天下如指掌矣從之吕好問公著孫崇寕中為揚州儀曹時蔡卞為帥欲扳附善類待好問特異好問以禮自持卞不得親吕頤浩齊州人高宗即位除知揚州劇賊張遇衆數萬屯金山縱兵焚掠頤浩單騎與韓世忠造其壘説以逆順遇等釋甲降薛慶建炎中守高郵尋遷承州天長保寕鎮撫使金人屯天長六合間慶率衆擊之得牛數百悉賤估分卑民之力田者金人㑹兵攻楚州慶迎敵轉戰十餘里倉皇墜馬為追騎所獲金人殺慶承州陷訃聞贈保寕軍承宣使張大經南城人紹興中知儀真時兩淮監司帥守多興事邀功大經獨以平易近民民咸德之洪興祖丹陽人紹興中知真州州當兵衝瘡痍未瘳興祖請復二年租自是流民復業墾闢荒田七萬餘畒解元德清砦人紹興四年韓世忠趨揚州命元屯承州時城中兵不滿三千金萬户黒頭虎直造城下元匿其兵以微服岀偽若降者金人稍懈俄伏發擒黒頭虎未幾金兵四集元戰却之追北數十里金人赴水死者甚衆莫𪷟歸安人高宗時知揚州陛辭上以城圯命𪷟増築𪷟至州規度城闉分授諸將各刻姓名甃堞間懸重賞激勸閲數月告成陳俊卿興化人高宗時詔治淮東保砦屯田所過安輯流亡鄭興裔開封人孝宗時知揚州揚有重屯糧乏例糴他境興裔搜括滲漏以補之食遂足民舊皆茅舍易焚興裔貸之錢命易以瓦又奏免其償民甚德之修學宫立義冢定部轄民兵升差法郡大治洪适番陽人總領淮東軍馬錢糧孝宗即位海州解圍符離用兵饋餉繁夥适究心調度供億無闕晁公武鉅野人乾道中知揚州奏朝廷以㳂淮荒殘之久未行租税民復業與創户者雖阡陌相望然聞之官者十纔二三咸懼後來税重望詔兩淮更不加賦庶民知勸詔可陳敏石城人孝宗時為神勁軍統制兼知高郵軍事與金人戰射陽湖敗之焚其舟追至沛城復敗之升都統制仍知高郵板築高厚皆增舊制作石䃮十二所自是運河通泄無衝突患詔與楚州守臣左祐同城楚州北使過者觀其雉堞堅新號銀鑄城周淙長興人孝宗時帥維揚時兩淮經踐蹂民多流亡淙極力招輯安堵如故勸民植桑柘開屯田上亦専以屬淙屢賜親札淙奉行益力陳損之建陽人紹熙中為淮東提舉淮田多沮洳損之築隄六百餘里捍之置石埭十二斗門八盪水河三十五涵管四十五得良田數百萬頃奏聞除直秘閣淮東轉運判官劉穎西安人光宗時淮東總領務場以額鈔抵賞陰耗餉計二十年無知此弊者穎究覈得之以所賣數論賞而總餉增羡趙彥倓宋宗室改揚州司户攝獄掾有告主藏吏盜錢餘千萬治之急吏泣請死彦倓察其情屏人問則諸吏共貸也乃許自首免罪一日而畢劉宰金壇人調真州司法詔仕者出身狀稱非偽學不讀周敦頤程頤等書才得考試宰喟然曰生平所學者何首可斷此狀不可得卒弗與崔與之廣州人權發遣揚州事主管淮東安撫司公事濬濠廣十有二丈深二丈西城濠勢低因疏塘水以限戎馬揚州兵久不練分彊勇鎮淮兩軍月以三八日習馬射今所部兵皆倣行之浙東饑流民渡江開門撫納所活萬餘開月河置釣橋易夾土城以甓李道傳井研人慶元時知真州城圯弗治道傳甓之築兩石壩以䕶沿江居民益濬三濠又隄陳公塘有警則決之以為阻人心始固汪綱黟人慶元時知高郵軍先是興化田濱海范仲淹築堰以障舄鹵守毛澤民置石䃮涵管以疏運河水勢嵗久皆壞綱增修之畢再遇兗州人慶元時兼知揚州淮東安撫使揚州有北軍二千五百人再遇請分隸建康鎮江軍每隊不過數人使不得為變更造輕甲兠鍪馬甲車牌務便㨗不使重遲敢死一軍本烏合亡命再遇能駕馭得其用趙范蒲圻人嘉定中知揚州淮東安撫副使别籍民為半年兵春夏在田秋冬教閲官免建砦而私不廢農陳韡侯官人嘉定中為淮東制置司幹辦公事再如盱眙見劉琸調卞整張惠范成進夏全諸軍應援擣虚皆行韡之策遂有堂門之捷賈涉天台人提點淮東刑獄兼楚州節制本路京東忠義人兵涉亟遣傅翼諭石珪揚德廣等逆順禍福自以輕車抵山陽珪德廣等郊迎伏地請死誓以自新金人數十萬大入涉亟遣陳孝忠向滁州數日孝忠捷至珪屢破金人李全挾布薩萬忠以歸金不敢窺淮東者六七年遂收登萊濟沂等州自是恩博景德至邢洛十餘州相繼請降淮西大振布薩萬忠舊作僕散萬忠今改正趙葵范弟紹定中提點淮東刑獄李全攻揚州葵親出搏戰與兄范同殺全詔授淮東制置使兼知揚州前後留揚八年墾田治兵邊備益謹飭高夢月理宗時為泰州教授李全寇泰州獨夢月不汚詔贈三官葉秀發金華人紹定間知高郵軍時三十六湖水高田下秀發建石埭以疏水勢蓄洩有方州人祀之樊良堤上王霆東陽人理宗時知高郵軍流民聚衆為盜霆剿其渠魁餘黨悉散時議出師和者甚衆霆謂莫若先探敵情如不得已然後行之諸軍畢行惟高郵遲之境賴以安孫子秀餘姚人理宗時辟淮東總領所中酒庫檄督宜興縣圍田租既還白水災總領恚曰軍餉所關而敢若此獨不為身計乎子秀曰何敢為身計甘罪去耳力爭之遂免楊文仲彭山人理宗時通判揚州牙契舊額為錢四萬緡累增至十六萬開告訐以求羨文仲曰希賞以擾民吾不為也時有沙田使者欲舉行之文仲力爭事遂不行馮去非都昌人淳祐中幹辦淮東轉運司李庭芝應山人開慶初朝議擇守揚者帝曰無如李庭芝乃奪情主管兩淮制置司事再破李璮兵璮降徙三城民於通泰之間庭芝初至揚時揚新遭火廬舍盡燬州賴鹽爲利而亭户多亡公私蕭然庭芝悉貸民負逋假錢使爲屋免其償凡一歲官民居皆具鑿河以省車運鹽利大興平山堂瞰揚城元兵至則搆望樓其上張車弩以射城中庭芝乃築大城包之又大修學爲詩書俎豆興士行習射禮郡中有水旱即命發粟不足則以私財賑之民德之如父母德祐初蕪湖兵潰李虎張俊皆持書招降庭芝率所部守城誅戮虎等日調苗再成戰其南許文德戰其北姜才施忠戰其中宋亡謝太后及瀛國公爲詔諭降庭芝登城言曰奉詔守城未聞有詔諭降也阿珠使者持詔來招降庭芝斬之焚詔陴上𬒳執死之揚民皆泣下方信儒興化軍人理宗時遷淮東提刑知真州即北山水㙺築石隄袤二十里人莫知其所爲後金人薄儀徴守將決水㙺以退敵城乃獲全杜庶邵武人理宗時權知真州太修守禦具後授兩准制置使知揚州射陽湖饑民嘯聚庶曰吾赤子也遣將招諭得丁壯萬餘戮止首惡數人陳蒙鄞人理宗時為淮東總管賈似道誣以貪汚貶建昌軍簿録其家惟有青氊耳趙淮葵從子李全之叛屢立戰功累官至淮東轉運使德祐中戍銀樹壩兵敗與其妾俱被執至瓜洲元帥使招李庭芝許諾至揚城下大呼曰李庭芝男子死耳毋降也元帥殺之其妾抱准骸骨赴江死苗再成德祐初知真州與文天祥謀以舟師擣鎮江事不果元兵來攻城䧟不屈死之趙孟錦宋宗室德祐初以軍功為將佐北兵攻真州每戰輒為士卒先北兵重艦駐江上孟錦乘大霧襲之俄霧解日高北兵見其兵少逐之登舟失足墮水身荷重甲溺焉宋應龍為泰州諮議官德祐二年兵至禆校開門迎降應龍與其妻自縊於圃中褚一正廬州人為提刑司諮議置司高郵德祐二年督戰高沙被創竟没於水孫虎臣德祐元年守泰州元兵至自殺雷大震為揚州都撥官元兵至揚子橋出戰死胡拱辰德祐中知興化縣有惠政元兵至自殺元郝彬信安人世祖初擢揚州路治中鄞縣賊顧閏聚衆海島侵揚州境彬討擒之焦德裕雄州人至元十四年改淮東宣慰使淮西賊保司空山檄淮東四郡守為應元帥特爾格邏得其檄即械郡守使承反狀德裕言四人者方誓報効安有他覬奈何以疑似殺四守盡復其官謝仲温豐縣人至元二十二年為淮東宣慰使歲旱仲温導白水塘溉民田公私賴焉張孔孫隆安人至元中擢淮東道肅政廉訪司使因讞獄鹽場民尹執中兄弟誣㐲為強盜平反之高睿河西人世祖時除淮東道肅政亷訪使盜竊真州庫鈔三萬緡有司大索追逮平民數百人吏因為奸利睿躬自詳讞而得其情即縱遣之未幾果得真盜史弼博野人至元中為淮東宣慰使凡三官揚州有惠政民刻石頌之號三至碑詹士龍固始人至元中令興化修築捍海堰三百餘里數郡賴焉後隱興化葺草堂於德勝湖鄂勒哲巴圖其先彰德人至元十一年總管高郵軍達嚕噶齊以興學勤農為務四方則之郡有虎傷人手格殺之吳師道蘭溪人至治中高郵縣丞明達文法吏不敢欺李齊廣平人元統間知高郵府有政聲至正中張士誠爲亂齊出守甓社湖已而有詔凡叛逆者赦之詔至高郵不得入賊紿曰李知府來乃受命行者強齊往至則下齊獄中官兵諜知之乃進攻城士誠呼齊使跪叱曰吾膝如鐵豈肯爲賊屈士誠怒搥碎其膝而咼之張禎汴人元統中除高郵縣尹門無私謁縣民張提領尚任俠武斷鄉曲一日至縣有所屬禎執之盡得其罪狀杖而徙之人以爲快守城千户狗兒妻崔氏爲其小婦所譖虐死其鬼憑七歲女詣縣訴禎備言死狀禎拘狗兒及小婦鞫之皆伏辜人以爲神明焉石普徐州人至正中張士誠據高郵普抵城遇賊與戰賊不能支遁入城普先士卒躡之縱火燒關門賊懼謀棄城走援軍忌普功按壁不進遂爲賊所蹂踐普奮擊直入賊壁陣中賊衆攢鎗刺死之盛昭歸德人淮南行省照磨張士誠叛詔使往高郵不得達而還謬稱賊已迎拜但乞名爵耳行省遣昭授士誠官士誠拒不聽拘諸舟中既而官軍逼高郵士誠授昭以兵使出拒官兵昭叱曰吾奉命招諭汝汝拘留詔使罪不容斬又欲吾從汝為賊耶大罵不絶口賊怒先剜其臂肉而後磔之趙槤穎川人至正中鎮真州會張士誠為亂招諭之士誠請降遂移鎮泰州士誠復反夜四鼔縱火登城槤力疾捫佩刀上馬與賊鬬市衢賊圍槤邀至其船槤詰之曰朝廷何負於汝乃既降復反耶即馳騎奮擊賊賊以槊撞槤墜地故舁登其舟槤瞋目大罵遂死之其僕楊兒以身蔽槤亦俱死及亂定民收殯於真州納蘇拉廸音大名人辟掾淮東宣慰使擊泰州真州賊屢有功張士誠復為亂以舟師會諸軍討之距三垜鎮賊衆猝至又麾兵挫其鋒賊繚船於背盡力來攻諸軍皆遁走遂與三子布勒圖哈魯丹西山驢皆死之贈淮西元帥府經厯明繆大亨定遠人元末張明鑑據揚州太祖命大亨亟攻降之以大亨緫制揚州大亨有治畧寛厚不優而治軍嚴肅禁暴除殘民甚悦之崇剛揚州衛指揮燕兵至剛與廵按王彬協力固守守將王禮開門降剛與彬俱不屈死耿九疇盧氏人正統初為兩淮鹽運司同知務革宿弊條奏便宜五事著為令母䘮去官場民數千人詣闕乞留乃起為都轉運使節儉無他好焚香讀書亷聲益振婦孺皆知其名王思閔黄岡人正統中為泰州判官職專馬政善其職會同知缺民乞用思閔帝從之王恕三原人正統中知揚州府發粟賑饑不待奏報作資政書院大興文教天順四年以治行最超遷江西右布政使雍泰咸寕人成化中廵鹽兩淮䆴丁無妻者泰為婚配幾二千人劉廷瓚成化間知興化縣邑堰久廢歲苦旱潦瓚糾工築之踰月而竣民號曰劉堤陸愈平湖人成化中知江都縣鑿花園港蓄洩水利溉田無數増築邵伯湖隄蔣瑶歸安人正德時知揚州府武宗南廵瑶供御取具無所贈遺諸嬖幸皆怒江彬欲奪富民居為威武副將軍府瑶執不可彬閉瑶空舍挫辱之脅以帝所賜銅瓜不為懾府故有瓊花觀詔取瓊花瑶言自宋徽欽北狩此花已絶今無以獻又傳㫖徵異物瑶具對非揚產帝曰苧布亦非揚產耶瑶不得已獻五百疋駕旋瑶扈至寶應中官用鐵絚繫瑶數日始釋揚人無不感泣後建祠祀之吳悌金谿人嘉靖中視兩淮鹽政海溢没通泰民廬悌先發漕賑之而後奏聞晏鋭四川人嘉靖中高郵衛經厯倭寇至鋭率兵禦之所統皆新募兵猝與倭遇遂奔潰鋭䧟陣亡吳顯漳浦人萬厯中知高郵州修築老隄又濬越河慮河勢衝徙徧植楊柳于左右岸州人賴之王徵涇陽人天啟中揚州推官徽州横山獄興其富人多行賈於揚主者大肆羅織徵曰吾在必不使無辜受冤保全甚衆大吏建魏忠賢祠惟徵與監司三原來復不與時稱關西二勁姜埰萊陽人崇禎時知儀徵縣清介自持不畏強禦真邑故掣鹽地御史使之掣諸商或以羡例進輒斥去時軍需旁午埰獨留心撫字流寇至境捍禦有方卒不敢犯民皆安堵吳羽文南昌人知江都縣民間向苦追攝羽文刻木為胥令訟者抱而去鞫則抱之來向任追攝者日植立於門無所事一時有木化為人人化為木之謡史可法大興人福王立南京可法以兵部尚書請督師淮揚時高傑兵淫掠請以瓜洲屯其衆大兵下揚州可法自守舊城西門險要處城破自刎不死為我兵所執志不屈殺之本朝乾隆四十一年賜諡忠正任民育濟寕人南渡後知揚州府為史可法所倚任大兵至佐城守及城破不屈見殺闔門俱赴井死本朝乾隆四十一年賜諡忠節同知遼東曲從直佐城守與其子俱死同時死者兩淮鹽運使臨海揚振熙同知鄞王纘爵江都知縣鄞周志畏新喻羅伏龍監餉知縣餘姚吳道正江都縣丞孝豐王志端並賜諡節愍時從可法軍城破投井死者上海員外郎何剛石門庶吉士吳爾壎俱賜諡忠節戰没者同知劉肇基賜諡節愍副將馬應魁莊子固樓挺汪應龍李豫參將陶國祥許謹馮國用陳光玉李隆徐純仁遊擊李大忠孫開忠都司姚懷龍解學曾等俱賜諡烈愍本朝王宇春奉天人順治五年知揚州府為政虛已和衷諮詢民閒疾苦勾稽㑹計皆手自考定不假掾吏趙汲錦州人順治八年知泰州下車卽首擒劇盜游三游四等一境肅然州被水災田禾盡没力請蠲恤牟文龍錦州人順治九年為儀徵令機警有幹才征戍往來多索牽挽夫役文龍應付有力民賴不憊請增士額得如大縣數王士禎新城人順治十七年任揚州推官公正嚴肅不畏强禦每遇疑獄據案立決文藻贍麗暇則筍輿雀舫與四方名彦高㑹蜀山虹橋之畔授簡賦詩傳為盛事陳洪諫德州人康熙七年知興化縣時河水為災力請蠲賦流民剽掠洪諫練鄉勇嚴保甲守禦有方又厚加撫循民賴以安張可立奉天人康熙十六年知興化縣開濬市河設立藥局水旱災傷必奔籲上臺得所請而後巳遷秩去邑人垂泣送之崔華平山人順治進士初令福建開化即捐建義學課文校藝士風丕振閩寇亂作防兵吳正通賊陷城露刄相逼華齎印從閒道岀檄召十六都義勇涕泣開諭立聚萬人躬冒矢石閲五日城得恢復未幾再陷遭掠尤慘民無叛志洎亂平流亡初集積逋尤多華繪圖上督臣請命盡蠲其賦擢揚州知府康熙二十三年命九卿舉清廉各官華與范承勲張鵬翮陸隴其同在舉中卒官兩淮鹽運使熊開楚石首人康熙二十四年知江都縣徵輸立易知由單以杜胥吏包攬之弊邑遶大江蘆洲坍漲不常開楚履洲清丈賦均訟息歲祲力請賑卹為貧民贖還所鬻子女署高郵及儀徵篆皆著政績白雲上河内人其先山西汾陽人乾隆辛未武進士任揚州遊擊整肅營規嚴捕盜賊不遺餘力所屬驛堠墩堡悉令種栁夏藉遮蔭冬資樵採至今人享其利又設義塾令兵丁子弟讀書其中俾消桀驁之氣值飛蝗入境竟日立炎酷中率兵役併力撲滅並於冬日預揠遺蝻以免後患人物漢劉瑜廣陵人少好經學尤善天文厯算之術延熹八年太尉楊秉舉賢良方正及到京師上書陳事特詔瑜問災咎之徵指事案經䜟以對執政者欲瑜依違其辭而更䇿以他事瑜復悉心以對八千餘言帝不能用拜議郎及帝崩大將軍竇武欲誅宦官引瑜為侍中武敗被殺宦官悉焚其所上書以為妖言子琬傳瑜學明占候舉方正不行三國吳張紘廣陵人為㑹稽東部都尉權初承統太夫人付屬以輔助之義紘輒拜牋答謝思惟補察每有異事密計及章表書記常令紘與張昭草制權呼張昭曰張公紘曰東部重之也吳普廣陵人從華佗學多所全濟佗語普曰人體欲其勞動但不當使極耳譬猶户樞不朽是也吾有一術名五禽之戲一曰虎二曰鹿三曰熊四曰猿五曰鳥體中不快起作一禽之戯范慎廣陵人竭忠知己之君纒綿三益之友著書二十篇名曰矯非仕至太尉皇象江都人幼工書時有張子並陳梁甫能書象斟酌其閒甚得其妙人謂象章草入神八分隸入妙篆入能吕岱廣陵人拜交州牧屢著戰功時年巳八十體素精勤躬親王事張承與岱書曰文書鞅掌賓客終日罷不舍事勞不言倦又知上馬輒自超乘不由跨躡如此足下過廉頗也孫亮即位拜大司馬清身奉公所在可述晉劉頌廣陵人少能辨物理爲時人所稱文帝辟爲相府掾累遷議郎守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以比張釋之轉任河内太守百姓歌其平惠元康初上疏論律令事為時論所美及趙王倫害張華頌哭之甚慟倫黨張林聞之大怒憚頌持正而不能害孫秀等推崇倫功宜加九錫頌獨曰非先王之制九錫請無所施頌為光祿大夫卒永康九年追封梁鄒縣侯頌弟彪參安東軍事伐吳獲張悌累官積弩將軍厯荆州刺史次弟仲厯滎陽太守戴淵廣陵人有風儀性閒爽少好遊俠不拘操行舉孝廉累官豫章太守加振威將軍領義軍都督以討賊有功賜爵秣陵侯王敦舉兵進驃騎將軍築壘於大桁之北尋王師敗績敦素忌若思害之四海之士莫不痛惜焉賊平贈右光祿大夫儀同三司諡曰簡按若思淵字華譚廣陵人好學不倦太康中舉秀才武帝親䇿之時九州秀才䇿無逮譚者尋為鄄城令薦廷掾張延又舉周訪為孝亷時以為知人遷廬江内史加綏遠將軍討平石冰之黨陸珪等又擊冰都督孟徐獲其驍卒以功封都亭侯元帝時為鎭東軍諮祭酒著書三十卷名曰辨道上牋進之太興初轉秘書監及王敦作逆譚疾甚不能入省坐免卒二子化茂化為征虜司馬討汲桑戰没茂嗣父爵戴邈淵弟好學尤精漢史為元帝征南軍司於時凡百草創學校未立邈疏奏納焉於是始修禮樂王敦作逆淵遇害邈坐免官敦誅後拜尚書僕射卒官諡曰穆高悝廣陵人少孤事母以孝聞年十三值歲饑悝菜蔬不饜每致肥甘於母撫幼弟以友愛稱厯顯位至光祿大夫高嵩悝子除太學博士初悝以納妾致頌被黜嵩乃自繫廷尉訟冤停喪不葬表疏數十上帝哀之特聽傳爵由此見稱為豫州都督陳刑政之要謝萬常呼嵩小字曰阿􅌕故有才具耶盛彦廣陵人母王氏疾失明彦不應辟召躬自侍養母疾久婢使數見捶撻婢忿恨伺彦暫行取蠐螬炙飴之毋食以為美藏以示彦彦見之抱母慟哭絶而復蘇母目豁然卽開從此遂愈韓績廣陵人其先避亂居於吳之嘉興績少好文學以潛退為操布衣蔬食不交當世東土並宗敬焉南北朝梁吕僧珍范陽人世居廣陵武帝命為中兵參軍委以心膂及兵起以僧珍為輔國將軍步兵校尉出入卧内宣通意㫖大軍次江寕東昏將李居士來戰大破之武帝受禪封平固縣侯尋拜南兗州刺史從父兄子先以販蔥爲業僧珍至乃向求州官僧珍曰汝等自有常分當速反蔥肆僧珍旣有大勲任總心膂性甚恭慎卒諡忠敬來嶷廣陵人幼有奇節兼資文武侯景陷臺城嶷說廣陵太守祖皓舉兵討景及皓敗并兄弟子姪遇害者十六人陳杜僧明廣陵臨澤人有膽氣善騎射從陳武帝累功封臨江縣侯領晉陵太守卒諡曰威周劉璠沛人徙居廣陵九歲而孤居喪合禮少好讀書兼善文章爲上黄侯蕭煜所器重後隨煜在淮南璠母在建康遘疾璠忽一日舉身楚痛尋而家信至云其母病卽號泣戒道絶而又蘇當身痛之辰卽母死之日居喪毁瘠服闋後一年猶杖而後起及煜終於毘陵故吏多分散璠獨奉喪還都墳成乃退隋來䕶兒江都人好立奇節賀若弼鎮廣陵令爲閒諜平陳有功進上開府從楊素擊高智慧於浙江追至泉州智慧遁走進大將軍屢有功大業十年帥師渡海至卑奢城高麗舉國來戰䕶免大破之江都之難宇文化及忌而害之子整尤驍勇官武賁郎將討擊羣盜所向皆捷賊甚憚之化及反遇害唐曹憲江都人仕隋為秘書學士於小學尤邃自漢杜林衞宏以後古文亡絶至憲復興煬帝令與諸儒譔桂苑珠叢又註廣雅貞觀中以宏文館學士召不至即家拜朝散大夫太宗常遣使就問難字憲以梁昭明太子文選授諸生所撰音義為當時所重來濟䕶兒少子高宗時累遷中書令帝將以武氏為后濟疏諌后銜之尋坐褚遂良事貶庭州突厥入寇濟拒之不介胄而馳入没焉濟兄恒上元中為黄門侍郎同中書門下三品俱以學行稱李邕江都人父善淹貫古今為文選注邕少知名以張廷珪薦拜左拾遺宋璟劾張昌宗武后不應邕為言即可璟奏鄭晉思以方技幸中宗邕力諫不納坐善張東之累貶富州司戸叅軍事韋氏平召拜左臺殿中侍御史後厯淄滑二州刺史上計京師邕重義愛士久斥外不與士大夫接旣入朝阡陌聚觀後生望風内謁門巷填溢以讒媢不得留出為北海太守為吉溫等所誣杖死於郡杜甫為作八哀詩讀者傷之李鄘邕從孫李懷光辟至幕府懷光反紿以兄病送母妻歸與高郢刺賊虛實白諸朝懷光覺嚴兵召二人問之鄘詞不撓懷光囚之河中平馬燧破械致禮張建封卒兵亂囚監軍鄘爲宣慰使持節直入其軍喻以禍福出監軍桎梏使復位衆不敢動憲宗時改戸部尚書以太子少傅致仕孫磎黄巢陷洛挾尚書八印走河陽留守劉允章爲賊脅就磎取印拒不與允章悟亦不臣賊乾寕元年進禮部尚書同中書門下平章事爲李茂貞等所害磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及注解書傳之闕疑僅百餘卷經亂悉亡王起揚州人釋褐校書郎元和末累遷中書舍人數上疏諌穆宗游畋厯户部尚書判度支靈武邠寕多曠土奏爲營田以省餽輓武宗時四典貢舉所舉士皆知名者終山南東道節度使同中書門下平章事起嗜學書經目不忘性孝友兄播喪哀戚加於人子龜性高簡仕至浙東觀察使王式起子以廕爲太子正字擢賢良方正科大中中爲晉州刺史河曲大歉式勞䘏之活數千人徙安南都䕶忠武戍卒夜圍城合譟式盡捕斬之咸通三年徐州銀刀軍亂式徙武寕節度使視事三日悉以計誅亂兵㑹詔降武寕為團練罷歸終左金吾大將軍王鐸式子㑹昌中禮部侍郎所取多才實士為世稱挹進同中書門下平章事拜司徒後從入蜀加侍中時招討大計悉屬高駢鐸感慨王室毎入對必噫嗚流涕出為義成節度使諸道行營都統移檄天下黄巢戰數蹙士氣皆起爭欲破賊宦者田令孜知賊必敗欲奪其功乃搆鐸於帝徙義昌節度使過魏為樂從訓所害天下痛之宋徐鉉廣陵人十歲能屬文與韓熙載齊名江東謂之韓徐仕南唐李煜為吏部尚書宋師圍金陵遣鉉求援兵煜欲止上江援兵鉉勸弗止以圖決戰後隨煜入覲太祖責之厲鉉曰臣為江南大臣國亡罪當死不當問其他太祖歎曰忠臣也命為太子率更令太平興國初直學士院從征太原軍中書詔填委援筆無滯辭理精當時論能之遷左常侍後被誣貶靜難行軍司馬卒鉉性簡淡寡欲精小學著文集二十卷新定説文質疑論弟鍇能自知書累官内史舍人李穆使江南見其兄弟文章歎曰二陸之流也沈正海陵人端拱初其父為屯田院衙官毆平人死正卽褫衣就毆其屍廵警者捕送官獄具怡然就死陳知微高郵人咸平中進士知制誥淮南饑遣知微廵撫所至按視儲糧察諸官吏能否使還判吏部銓有集三十卷柳植真州人少貧自奮為學舉進士甲科累官吏部侍郎平居畏慎寡言笑所至官舍蔬果不輒採家無長物時稱其廉喬竦高郵人敎諭州里倡明孔孟之敎從遊者多以文行知名孫覺其最著也卒贈朝奉大夫胡瑗海陵人以經術敎授吳中景祐初范仲淹薦瑗白衣對崇政殿授秘書省校書郎敎授湖州科條纎悉備具慶厯中興太學下湖州取其法著為令皇祐中更鑄太常鐘磬遂典作樂事歲餘授光祿寺丞國子監直講瑗居太學其徒益衆禮部所得士瑗弟子十居四五後以太常博士致仕諸生與朝士祖餞東門外時以為榮孫長卿揚州人以外祖朱巽任為秘書省校書郎厯江東淮南河北轉運使時將弛茶禁而收其征召長卿議條所不便十五事神宗時轉兵部侍郎卒長卿性潔廉無文學而長於政事孫洙廣陵人未冠擢進士包拯等舉應制科進䇿五十篇指陳政體明白剴切韓琦讀之太息曰今之賈誼也知太常禮院治平中求言洙疏時弊要務十七事後多施行同知諌院凡有章奏輒焚其稿王安石主新法力求補外擢翰林學士洙博聞强識明練典故文詞典麗有西漢之風王令廣陵人偉節高行特立於時王安石奇其才妻以夫人之女弟令詩學韓孟識度高遠潘及甫江都人博通經史厲志文行往湖從胡瑗學瑗妻以女弟慶厯中與兄希甫同登進士為懷仁尉筠州判官及知分寕霍邱壽春皆有政績遷秘書丞充楚王宫太學敎授律宗室以禮法神宗嘉之吕溱揚州人進士第一直集賢院儂智高寇嶺南詔奏邸毋得輒報溱言一方有警使諸道聞之共得為備今欲人不知此何意也為翰林學士疏論宰相陳執中姦邪累官樞密直學士溱開敏善議論一時名輩皆推許然自貴重在杭州接賓客不過數語時目為七字舍人云周孟陽其先成都人曾祖敬述知泰州遂家海陵英宗即位遷同知太常禮院數引對訪以時務神宗初拜天章閣待制孫覺高郵人從胡瑗學神宗時知諌院青苗法行覺條奏其妄哲宗即位遷右諌議大夫論宰相蔡確韓縝罷之仕終龍圖閣學士覺有德量所著文集奏議六十卷春秋傳十五卷弟覽神宗時爲司農主簿舒亶判寺欲引覽自助拒不答累拜戸部侍郎與蔡京論役法不合出知太原頻立邊功議論多觸執政屢遭絀削孫升高郵人第進士簽書泰州判官哲宗立爲御史朝廷更法度逐姦邪升多所建明時翰林承㫖鄧温伯爲臺臣所攻升與賈易論之尤力紹聖初以果州團練副使汀州安置卒秦觀高郵人少豪雋慷慨溢於文詞見蘇軾於徐爲賦黄樓軾以爲有屈宋才軾勉以應舉爲親養始登第調臨海主簿蔡州敎授元祐初軾以賢良方正薦於朝除太學博士尋坐黨籍徽宗立復宣德郎有文集四十卷觀長於議論文麗而思深二弟覿覯子湛皆能文曹仁熙高郵人善畫水米芾畫史云高郵半壁水乃仁熙畫一筆長丈餘水勢分激如崩劃有聲張表臣詩曹生畫水信有神毫端風雨生淵沄波濤不合來翻屋鯨鰐何須欲噬人喬執中高郵人擢進士調須城主簿元祐初進中書舍人邢恕遇赦甄復執中言恕深結蔡確鼓唱扇摇今復其官懼疑中外紹聖初以寶文閣待制知鄆州執中寛厚有仁心屢典刑獄雪活以百數張汝明世爲廬陵人徙居真州兄侍御史汝賢元豐中以論尚書左丞王安禮與之俱罷汝明少嗜學刻意屬文入太學有聲登進士第厯杭州司理參軍母病疽刺血調藥傅之而愈大觀中擢御史劾政府市恩招權以蔡京爲首帝奬其介直京頗憚之後知岳州卒於官汝明學精研象數貫穿經史百家所著有易索書張子巵言大究經沈錫真州人徽宗初爲講議檢討蔡京方銓次元符上書人欲定罪錫曰恐非敦世厲俗之道尋以徽猷閣待制知應天府徙江寕張懷素誅朝廷疑其黨有脱者江淮閒往往以誣告興獄錫具疏於朝皆得釋後以通議大夫致仕卒呉敏真州人爲給事中徽宗將内禪定計東幸命尚書李棁先出守金陵敏詣都堂曰朝廷便爲棄京師計何理也此命果行雖死不奉詔税遂罷行皇太子除開封尹上去意益決敏因奏對遂薦李綱帝召綱議命敏草傳位太子詔欽宗旣立遷知樞密院拜少宰請罷元祐學術之禁開諌官言路以通下情又言王安石用材能急功利風俗以壞近年以來有御錢朝廷錢有司錢人材有親擢有大臣薦引不宜分别若此帝嘉納焉王居正揚州人少嗜學工文辭黄齊同知貢舉欲擢為首他考官持之置次選范宗尹薦於朝除太常博士帝方鄉規諫居正次前世聽納事為集諌十五卷以廣帝意除兵部侍郎尋知温州時秦檜專國忌之奪職奉祠檜死復故職居正學根据六經有詩書周禮辨學行於世李衡江都人登進士第授吳江主簿累官侍御史㑹外戚張説以節度使掌兵柄不當以母后肺腑為人擇官廷爭移時改除起居郎衡曰與其進而負於君孰若退而合於道章五上請老以秘閣修撰致仕後定居崑山聚書踰萬卷號曰樂菴牛大年揚州人慶元進士厯官將作監主簿入對言人主要以天命人心之所繫致念又言士氣久靡宜振起之後以寶章閣待制提舉太平興國宫卒大年清操懍然所至以廉潔自將夏世賢高郵人七世同居度宗時詔署其門元李茂大名人徙家揚州父興夀卒奉母孟氏益謹母嘗病目失明茂禱於泰安山三年復明又願母夀每夕祝天乞損己年益母母孟氏年八十四殁茂居喪哀慟聞者傷之大德九年揚州再火延燒千餘家火及茂廬皆風返而滅卜勝榮高郵人母痢不能藥日嘗痢以求愈兄疾禮北辰乞減已年以延之並痊明顧成其先湘潭人徙江都成少魁岸膂力絶人善馬槊文其身以自呉太祖渡江來歸為帳前親兵從攻鎮江被執躍起斷縛仆持刀者脱歸導衆攻城克之授百户大小數十戰皆有功燕王即位封鎮遠侯食禄千五百石予世券鎮貴州臺羅苗作亂成討之威鎮百蠻蠻人為立生祠王鼎儀徴人洪武𥘉守太平陳友諒來犯力戰死之贈太原郡侯高穀興化人永樂進士選庶吉士累進謹身殿大學士英宗復位穀謝病英宗為榖長者賜勅獎諭榖美丰儀樂儉素位至台司敝廬瘠田而已徐政儀徵人永樂閒都指揮同知從征交阯奪賊船於三帶江以濟大軍拔西都戰鹹子關皆有功陳季擴反盤灘地最要張輔遣政守之賊來攻與戰飛鎗貫脇猶督兵力戰竟敗賊賊退腹潰而死蔣貴江都人以燕山衞卒從燕王起功至昌國衛指揮同知正統初兵積阿勒坦寇甘涼命佩平虜將軍印討之疾馳至鄂囉納縱騎蹂擊大敗之轉戰百餘里西邊悉平封定西伯給世券宣德六年征麓川及馬鞍山象陣功皆第一進封定西侯八年復討平之時貴子雄乘敵敗深入敵扼其後自刎贈懷遠將軍貴起卒伍天性樸實忘己下人能與士卒同甘苦臨陣輒身先之故所向有功許貴江指都人永新伯成子襲職為羽林衞揮使守備大同西路英宗北狩邊城悉殘貴當敵衝激戰士以副總兵鎮守松潘未抵以忠義敵來擊敗鎮而山都掌蠻叛之尋貴抵其巢連破四十餘砦貴亦感嵐氣卒賜祭葬許宗道貴子正統末自以軍功為錦衣千戸貴殁嗣指揮使成化時累官都督同知宗道束髪從軍大小百十餘戰身被二十七創威名聞異域性沈毅守官廉待士有恩不屑干進曹義儀真人襲職為燕山左衛指揮僉事累功至都督僉事義數與烏梁海戰斬百餘人旣又岀廣寕敗寇禽百餘人英宗特封義豐潤伯卒贈侯諡壯武蔣琬貴義子嗣侯成化中帥京軍防秋大同宣府陳機宜十餘事皆報可佩將軍印出禦邊寇寇退班師加太保兼太子太傅卒諡敏毅子􅥴嗣官中外二十年家無餘貲再傳至孫傅以平海賊及慶遠猺功加太子太保儲巏泰州人九歲能屬文母疾刲股療之卒不起家貧力營墓域旦哭冢夜讀書不輟成化中鄉㑹試皆第一授南京吏部考功主事厯戸部左侍郎改吏部卒官巏淳行清修介然自守工詩文好推引知名士避遠非類不惡而嚴嘉靖初賜諡文懿冒政泰州人成化進士厯官右副都御史廵撫寕夏守官廉劉瑾覬賄不得遂假邊事逮之罰米至三千石瑾誅復職致仕卒顧溥成元孫年十三嗣侯宏治二年拜平蠻將軍鎮湖廣都勻蠻作亂溥討之斬首萬計加太子太保卒諡襄恪溥清慎守法卒之日囊無餘貲子仕隆嗣侯正德初岀爲漕運總兵鎮淮安十餘年以清白聞武宗南廵江彬横甚折辱諸大吏惟仕隆不爲屈嘉靖初加太子太傅掌中軍都督府事尋以病解營務卒子寰嗣侯厯僉中左二府事守備南京奉詔讞獄多所平反移鎮兩廣安南莫宏瀷當襲都統莫正中謀篡之寰送宏瀷還國安南遂定移鎮淮上有禦倭功加太子太保致仕卒贈太傅諡榮僖自溥至寰三世皆寛和廉靖内行飭謹曉文藝通賓客寰父子世為督漕善於其職寰無子從子承先嗣侯僉書前府事亦好文藏書萬卷傳子至孫肇跡京師陷為賊所殺福王立贈鎮國公楊果興化人宏治進士厯刑部員外郎讞獄原情比律不為世撓嘉靖時至南京户部侍郎果天性孝友以養母家食居半厯官兩京未嘗挈妻子常曰吾自視缺然惟不識劉瑾江彬諸人差可免愧耳朱應登寶應人才思泉湧落筆千言宏治中進士厯雲南提學副使遷參政中飛語罷歸子曰藩嘉靖進士知九江府能文章世其家著山帶閣集二十卷胡獻興化人宏治進士改庶吉士授御史踰月極論時政數事言内戚中官泄憤報怨謫藍山丞武宗即位擢廣西提學僉事遷福建提學副使未任卒葉相江都人宏治進士為給事中首劾劉瑾又上建儲及漕運犀藏等十餘疏言皆剴切擢貴州巡撫討平芒部亂賜鏹幣以刑部侍郎予告歸趙鶴江都人宏治進士知建昌府以忤劉瑾謫官終山東提學僉事生平嗜學不倦晚註諸經考論厯代史正其謬誤有書經㑹註維揚郡乘具區文集金華文統諸書王玉泰州人自玉以上八世同居宏治中旌為義門徐蕃泰州人宏治進士授南京吏科給事中正德初奏畱劉健謝遷且劾中官高鳳被逮削籍後仕至工部侍郎景暘儀真人正德進士授編修時劉瑾陵轢朝士暘不為屈進司業與諸生講説不避寒暑典簿念暘貧給官廩私益其斛暘知歸所益米譲之曰奈何汚我乞便養改中允掌南京司業卒暘與鄉人蔣山卿趙鶴朱應登為詩古文稱江北四子撰前溪集王艮泰州人父竈丁役於官艮出代父役入定省惟謹謁王守仁從之學王氏弟子遍天下艮以布衣抗其閒聲名出諸弟子上四方延主講席其敎大行子襞制行嚴謹學者稱艮心齊先生襞東崖先生韓貞興化人業陶從學於王艮及艮之子襞有得遂以化俗為任隨機指道從之遊者數百人朱恕泰州人為樵夫日採薪養母每樵歸必造王艮講堂竊聽有監司知其賢召之不往以事役之短衣跣足入監司與成禮而去宗臣興化人嘉靖進士由刑部主事調考功謝病歸尋起判官進稽勲員外郎嚴嵩惡之岀為福建參議倭薄城與主者共擊退之遷提學副使卒官士民皆哭桑喬江都人嘉靖進士由主事改御史請蠲徭賦劾總兵官魯綱等失機逮治雷震謹身殿下詔求言喬偕同官陳三事末言嚴嵩及林庭㭿張瓚張雲上負國恩下乖輿望尋廵按畿輔引疾嵩因搆其罪廷杖戍九江卒隆慶初贈光祿少卿所著有廬山記真詮詩文若干卷沈良才泰州人起家庶吉士厯兵部侍郎嚴嵩附批南京科道拾遺疏中落其職曾銑浙江黄巖籍江都人嘉靖進士知長樂縣厯總督陜西三邊軍務寇十萬餘騎入掠銑搗寇巢斬首百餘級寇始遁銑喜功名念寇居河套久為中國患上疏條八議又上方畧十八事欲為一勞永逸之䇿時嚴嵩極言套不可復㑹仇鸞嘗以驕恣為銑所劾疏誣銑掩敗不奏論斬隆慶初贈兵部尚書諡襄愍李春芳興化人嘉靖中進士第一除修撰厯禮部尚書時宗室蕃衍歲禄苦不繼春芳考故事上之諸吉凶大禮及嵗時給賜皆嚴為之制帝嘉之賜名宗藩條例尋兼武英殿大學士春芳恭慎不以勢臨人居政府持論平不事操切隆慶元年詔修鳳翔樓春芳曰上新卽位遽興土木可乎遂止後加少師改中極殿疏請歸養卒贈太師諡文定孫思誠萬厯進士授編修累官禮部尚書加太子太保忤魏忠賢為所搆矯㫖奪職中外冤之林春泰州人受業王艮聞良知之學意發則以朱墨筆識臧否自考動有繩檢尺寸不踰嘉靖中㑹試第一除戸部主事進又選郎中慎擇監司守令以端吏治著有東城文集陳輔堯江都人萬厯舉人厯官永平同知轉餉出關駐瀋陽天啟元年瀋陽破輔堯方奉命查馬左右以無守土責勸之去輔堯曰孰非封疆臣何去為望闕拜拔刀自刎贈按察司僉事諡忠烈本朝乾隆四十一年賜諡烈愍張伯鯨江都人萬厯進士崇禎中為戸部主事督延寕二鎮軍儲備兵榆林屢著戰功厯任廵撫延綏插漢等部入犯雙山魚河二堡泊鯨督總兵王承恩等擊破之由戸部督餉侍郎調兵部以疾歸揚州城陷自經死本朝乾隆四十一年賜諡忠節劉永澄寶應人萬厯進士官至兵部職方司主事講學東林以名節自期倪可大儀真人天啟中以貢授霍邱訓導崇禎末流寇圍城可大率民兵拒戰城陷被執罵賊遇害贈國子學錄妻戴氏與女皆自縊本朝乾隆四十一年賜諡烈愍王道隆江都人天啟中知濱州寇至城陷道隆身被數創不屈死家屬十餘人俱被難本朝乾隆四十一年賜諡節愍喬可聘寶應人天啟進士師事劉宗周黃道周而善倪元璐馬世奇陳龍正相與切磋問學由中書舍人改授御史廵按浙江風裁甚著後掌河南道事持論侃侃為羣小所憚姚思孝江都人崇禎進士官戸科給事中熹宗實録未成禮部尚書曽楚卿與筆削思孝疏言楚卿舊為要典總裁不宜用時議肆赦刑部尚書馮英以魏黨逆案入之思孝力駮其非遷兵科給事中極言張獻忠之詭降熊文燦之輕信果如其言韓如愈興化人崇禎進士厯兵科給事中劾子鳴鸞力敵萬夫與守備楊道選授兵登陴且守且戰閲五日賊多死指揮張三錫啟北門揖汝才入城陷景春不屈與鳴鸞俱被殺僕陳宜亦死之贈太僕寺少卿本朝乾隆四十一年賜諡忠烈韓鼎新江都人崇禎中以明經授浙江某縣敎諭城破自經死本朝乾隆四十一年賜諡節愍梁于涘江都人能文負大節崇禎中知萬安縣白之裔叛入城于涘正衣冠投水死本朝乾隆四十一年賜諡節愍王道淑儀真人崇禎中任廣東按察使經厯廣州破殉節死子棫瑞從之本朝乾隆四十一年入祀忠義祠高孝纘江都諸生揚州城破書衣襟曰首陽志睢陽氣不二其心古今一致入學宫自經於先聖前又諸生王士秀設莊烈帝位泣拜與其弟同縊死指揮高二麟自刎死本朝乾隆四十一年入祀忠義祠王纘江都諸生弟績續城破兄弟並自縊死同時醫者陳天拔畫士陸喻武生戴之藩義兵張有德市民馮應昌舟子徐某皆自盡本朝乾隆四十一年入祀忠義祠宋祥遠江都生員乙酉城破偕妻縊死同邑生員韓默墜井死妻蕭氏子彦超皆死本朝乾隆四十一年入祀忠義祠王元輔興化生員寓居永平崇禎三年大兵破城元輔不屈死本朝乾隆四十一年入祀忠義祠鄭元勲江都人崇禎進士甲申聞變破產招義旅守土貽書當道謂宜建大帥統精鋭以守河北時高傑來鎮揚州掠城下元勲舊與相識單騎入傑營曉以大義傑為心折曰前事副將楊成為之出令退舍且誅楊成揚人誤傳楊成為揚城㑹元勲走城上將訟言於公府集議所揚人露刄圍之遂及於難督師史可法斬倡亂者三人首以祭元勲後三日而授兵部職方主事之報始至鄭為虹元勲弟崇禎進士知浦城縣擢御史巡仙霞關大兵入閩死之本朝乾隆四十一年賜諡忠烈本朝陳錡揚州人順治閒武進士任荆州副總兵領前鋒㑹剿山賊李來亨深入遇伏從騎皆没錡奮擊力竭自剄死事聞賜葬廕一子千總董潾江都人恩貢以軍功知沙縣順治四年山賊羅某與妖僧米逢年爲亂攻圍厯三月多方拒却之已而縣丞黎某納賊潾被執罵賊甚厲賊叢射之割其首去子亦舒壻張思治死焉事聞贈潾按察司僉事陳卓江都人順治丁亥進士由刑部郎中提學四川時屬新定文學荒廢卓岀經籍令傳寫敎授文風日振擢陜西臨鞏副使道復官商分茶之法辨部民受逆回偽劄者再擢荆南參政道鄭爲旭江都人順治辛卯拔貢授中書屢遷御史請選官加驗看視學遣詞臣分進士舉貢授例班選俱次第舉行從弟爲光順治巳亥進士選庶吉士改御史請剔揚州關鈔積弊清江都加派税粮節鳳米浮費皆如所請尋卒王相吕泰州人以舉人授睢寕敎諭順治九年海賊陷城被執不屈死事聞贈國子助敎劉欽鄰儀徵人順治辛丑進士知富川縣孫延齡叛城陷被執不屈守以兵欽鄰北向拜闕東向拜母遂自經死事聞贈光禄少卿諡忠節陳嘉謨興化諸生順治初父宏道爲怨家所誣繫府獄獄卒絕其槖饘嘉謨乞一見不許知羣小計必殺之乃痛哭於城隍之神作血書懷之而出是夜蒼頭守舍候嘉謨不歸忽聞哭聲且叩門甚急起視無人心怪之及明有白運使得一函於關口啟視則嘉謨訟冤血書也運使大驚蒼頭亦來訴求其尸七日岀自鈔關河屹立風浪中髪俱上指遂岀宏道於獄收葬嘉謨抵誣告者罪吳嘉紀泰州人安貧樂道嗜古工詩著有陋軒集吳綺江都人能詩尤工駢體順治中拔貢生授中書擢知湖州府罷歸為春江花月社所著有林蕙堂集宋金元詩永等書汪懋麟江都人康熙丁未進士授秘書院中書舍人朱方旦以邪術傾動一時懋麟著辨道論詆其妄以主事銜與修明史擢刑部主事罷歸社門著書有百尺梧桐閣集喬萊寶應人康熙進士授内閣中書舉博學鴻詞科試列一等授編修遷侍讀㑹御史奏濬海口瀉積水而河臣靳輔上言濬海口不便請於邵伯高郵閒置閘洩水復築長隄抵海口以束所洩之水使水勢高於海口則趨海自迅下廷臣議適萊入直上問萊陳四不可行議遂寢所著易俟二十卷李柟興化人春芳來孫康熙癸丑進士選庶吉士累官左都御史疏論督撫覆奏不當詆言官請運江南近海糧儲以賑山東請遇水旱預蠲新租毋貸舊欠使胥吏不得以巳徵飽私槖掌憲五年持大體務平恕著有律令牋註大遠堂集汪楫儀徵人康熙己未舉博學宏詞授檢討與修明史充冊封琉球正使累官福建布政使著有中山沿革志琉球奉使録悔齋詩聞正續集觀海集卜明元江都人為平越推官以剿土寇死崔思唯江都人官連州知州康熙九年明桂王由榔遣李定國寇兩廣攻連州思唯設城守十月馬寶王之邦合力攻城守益固寶等遁去思唯旋以勞卒吳世杰高郵人康熙乙丑進士讀書期實用三逆亂後損鏹贖被掠婦女資送還里邑大水躬率民夫拯生瘞死療其病者郵苦役重有公正排年等名世杰陳於巡撫悉蠲除之著有甓湖草堂詩文行世王式丹寶應人康熙癸未進士第一人官修撰績學砥行老而始遇著有樓村集孫箴輿康熙壬辰進士知衛輝府有孟亭詩文集陳厚耀泰州人康熙進士以李光地薦改中書授國識其冤悉縱之越日而真盜得察吏舉劾不苟每曰官數易則民不靜而吏滋姦且大吏平昔董戒何事也官至吏部尚書諡文肅夏之蓉高郵人兄之芳官御史巡察福建臺灣兼督學政刻海天玉尺編以示程式更奏立臺字號俾應試者得進取之路之蓉自幼從學乾隆丙辰考取博學鴻詞授檢討屢掌文衡請託苞苴不行風清弊絕所拔士皆端廉通博為時人所共知者弟廷芝亦同年成進士官翰林張和江都人乾隆十年武進士授藍翎侍衞洊升陜西河州鎮總兵官四十二年調雲南普洱鎮總兵因車里土司刁士苑報有猛勇頭人召齋與投誠安插之喇鮓占烘有仇糾集夷匪至境報復和聞信帶兵往援冒瘴染病身死事聞賜卹如例賜祭葬李道南江都人乾隆辛卯進士性耿介絶攀援尤究心於濂洛關閩之學為文力追先正不為風氣轉移家居授徒雖老生宿儒皆受業焉嘉慶十三年入祀鄉賢祠丁光國江都人湖南排補美巡檢乾隆六十年黔楚逆苗滋事光國擊賊陣亡事聞賜卹廕雲騎尉前提調官臣張日章恭纂輯提調官臣賈克慎恭覆輯林士鉁校對官臣呉士楨恭校校對官臣賀式韓恭覆校
