body:
  text: 揚州府在江蘇省江寕府東北二百十里蘇州府西北四百四十五里東西距四百七十里南北距三百里東至海岸通州如臯縣界三百六十里西至江寕府六合縣界一百十里南至大江鎮江府丹徒縣界四十里北至淮安府山陽縣界二百六十里東南至通州泰興縣界八十里西南渡江至江寕縣界三百里東北至淮安府鹽城縣界三百十三里西北至安徽盱眙縣界二百五十一里自府治至京師二千二百七十五里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋時屬吳後屬越戰國屬楚為廣陵邑秦屬九江郡項楚時為東陽郡漢高帝六年屬荆國十一年屬吳國漢書高帝紀六年以呉東陽等郡為荆國注張晏曰東陽今曰廣陵郡景帝四年改為江都國元狩三年改廣陵國北境為臨淮郡地元封五年屬徐州刺史部新莽改曰江平後漢建武十八年為廣陵郡三國初屬魏繼屬吳呉志五鳯二年使衞尉馮朝城廣陵拜吳穰為廣陵太守晉太康元年仍為廣陵郡初治淮隂後治射陽東晉還治廣陵縣東晉元帝時僑置青兖二州玉海晉末以廣陵控扼三齊故青兗同鎮安帝又分廣陵地置海陵山陽二郡劉宋元嘉八年改立南兖州齊梁因之北齊改東廣州增置江陽郡與廣陵郡並治陳太建中復為南兖州後周改為吳州隋開皇九年始改曰揚州置總管府大業初府廢立江都郡隋書紀大業十二年幸江都制江都太守秩與京尹同唐武德三年復曰南兖州置東南道行臺七年改曰䢴州九年復曰揚州置大都督府按唐書紀是年以襄邑王神符檢校揚州大都督始自丹陽徙州府及居民於江北由此廣陵專有揚州之名貞觀元年隸淮南道天寶元年曰廣陵郡至德元年兼置淮南節度使於此乾元三年復曰揚州五代初楊吳都此改江都府後屬南唐以爲東都時李昪徙都建康周顯德中復曰揚州仍置大都督府宋初曰揚州廣陵郡淳化四年屬淮南道至道三年爲淮南東路治建炎元年升元帥府元至元十三年建大都督府置江淮等處行中書省十四年改揚州路河南江北行中書省明曰揚州府明太祖實錄丁酉改淮海府辛丑改淮揚府丙午改揚州府直隸南京本朝屬江蘇江寕布政使司領州二縣六按國初因明之舊府統州三縣七康熙十一年海門縣圮於海併入通州雍正三年分通州直隸江南省以泰興如臯屬之九年始析江都置甘泉同治郭下乾隆三十二年析泰州置東臺縣江都縣附郭東西距一百里南北距五十里東至大江通州泰興縣界八十里西至甘泉縣界十里南至大江鎮江府丹徒縣界四十里北至甘泉縣界十里東南至鎮江府丹徒縣界四十里西南至儀徵縣界二十里東北至泰州界九十里西北至甘泉縣界半里戰國楚廣陵邑秦置廣陵縣屬九江郡漢初為荆國治十一年改置呉國景帝四年為江都國治兼置江都縣元狩三年為廣陵國治元封五年又析廣陵江都二縣置輿縣後漢為廣陵郡治三國時魏移郡治淮隂江都城圮於江縣省入廣陵晉太康六年復立江都縣東晉省江都入輿縣尋置仍以廣陵縣為郡治劉宋元嘉八年以縣為南兖州治十三年者輿縣入江都南齊析江都置齊安縣梁仍省入北齊江都隸江陽郡陳仍與廣陵縣同屬廣陵郡隋開皇十八年改廣陵縣曰䢴江大業初又改曰江陽為江都郡治仍領江都縣後徙江都縣入郡郭十年分江陽置本化縣尋廢後省江陽縣入江都唐武德中以江都為揚州治貞觀十八年又分置江陽縣與江都分理州郭五代時南唐又改江陽曰廣陵宋熙寕五年省廣陵入江都為揚州治元為揚州路治明為揚州府治本朝因之甘泉縣附郭東西距六十一里南北距七十六里東至江都縣界半里西至安徽天長縣界六十里南至江都縣界半里北至高郵州界七十五里東南至江都縣界一里西南至江寕府六合縣界九十里東北至高郵州界九十里西北至天長縣界七十里本江都縣地本朝雍正九年析置與江都並為府治儀徴縣在府西南七十里東西距八十里南北距七十八里東至江都縣界四十里西至江寕府六合縣界四十里南渡江至江寕府句容縣界十八里北至安徽天長縣界六十里東南渡江至鎮江府丹徒縣治一百里西南渡江至江寕府上元縣治一百三十五里東北至江都縣界四十里西北至六合縣界五十里漢江都縣地唐永淳元年析置揚子縣地為揚子縣白沙鎮五代時楊吳以白沙為迎鑾鎮南唐改曰永貞縣屬江都府宋乾德二年升迎鑾鎮為建安軍雍熙二年以永貞縣屬焉後復改曰揚于縣大中祥符六年升軍為真州始移揚子於州郭屬淮南東路政和七年賜名儀真郡旋升軍州元至元中升真州路二十一年復曰真州屬揚州路二十八年移揚子縣治新城明洪武二年改真州為儀真縣以揚子縣省入屬揚州府本朝因之雍正元年改儀徴縣高郵州在府北少東一百二十里東西距二百里南北距九十里東至興化縣界八十里西至安徽泗州天長縣界一百二十里東至甘泉縣界三十里北至寶應縣界六十里東南至泰州治二百五十里西南至安徽天長縣界八十里東北至淮安府鹽城縣治二百四十里西北至泗州盱眙縣治二百五十里秦置郵亭因名秦郵漢置高郵縣屬廣陵國後漢屬廣陵郡三國時廢晉太康元年復置屬臨淮郡劉宋仍屬廣陵郡析置臨澤縣齊因之梁析竹塘三歸二縣置廣業郡尋改神農郡隋開皇初郡廢屬江都郡省臨澤竹塘三歸三縣唐屬揚州五代因之宋開寶四年置髙郵軍熙寕五年改為縣元祐元年復為軍建炎四年升為承州紹興五年復改爲縣三十三年復為高郵軍屬淮南東路元至元十四年置高郵路二十一年改府屬揚州路明洪武元年改為州屬揚州府本朝因之興化縣在府東北一百六十五里東西距一百六十五里南北距九十五里東至東臺縣界一百二十里西至高郵州界四十五里南至泰州界三十五里北至淮安府鹽城縣界六十里東南至泰州界一百三里西南至江都縣治一百六十里東北至鹽城縣界一百二十里西北至寶應縣治一百六十里戰國楚將昭陽食邑漢海陵縣地五代時楊呉始置興化縣屬揚州南唐改廢縣為屬泰州宋建炎四年改屬承州紹興五年昭陽鎮入海陵十九年復為縣仍屬泰州乾道二年屬髙郵州改屬高郵軍元屬高郵府明隸揚州府本朝屬揚州府寶應縣在府北二百四里東至淮十安里東西距一百九十里南北距八十府鹽城縣界七十里西至安徽泗州盱眙至淮縣界一安府山百二十里南陽縣界二十至高郵州里東南至界六十里北興化縣治一百六十里西南至泗州天長縣治一百北至鹽城縣治一百二十里西北至山六十里東陽縣界一百里漢置平安縣屬廣陵國新莽改曰杜鄉後漢復名屬廣陵郡晉廢蕭齊改置安宜縣屬陽平郡梁為陽平石鼈縣隋郡開治兼置東莞郡北齊因之北周析置皇初郡廢省石鼈入安宜屬江都郡唐武德四年年改曰寶應置滄州七五代因之年州廢縣屬楚州上元三宋寶慶三年升州尋改為軍元至元十屬高郵府明六年改置安宜府二十年府廢以縣屬高郵州隸揚州府本朝屬揚州府泰州在府南北東一距一百二十里東西距一百五十里百二十里東至東臺縣界一百二十里西至江都縣界三十里南至通州泰興縣界三十里北至興化縣界九十里東南至通州治三百里西南至江都縣界三十里東北至東臺縣治一百四十里西北至高郵州治一百五十里戰國楚海陽地漢置海陵縣屬臨淮郡後漢屬廣陵郡三國時廢晉太康二年復置屬廣陵郡義熙七年於縣置海陵郡僑置建陵寕海蒲濤三縣屬焉劉宋移郡治建陵縣以海陵縣屬廣陵郡齊因之梁移郡還治海陵縣隋開皇初郡廢縣析置江浦大業時省入屬江都郡唐武德三年改縣曰呉陵於縣置呉州七年州廢復曰海陵屬揚州景龍二年析置海安縣開元十年復省入五代時南唐於縣置泰州領縣宋改泰州軍屬淮南東路元至元十四年置泰州路二十一年復為州屬揚州路明洪武初省海陵縣入焉屬揚州府本朝因之東臺縣在府東二百四十里東西距二百十里南北距一百六十里東至海一百二十里西至興化縣界九十里南至泰州界七十里北至興化縣界四十里東南至通州如臯縣界一百六十里西南至泰州界八十五里東北至淮安府鹽城縣門二環城有濠宋乾德中築明初改築本朝順治十一年修康熙五年五十三年重修高郵州城周十里有奇門四水門二環城有濠宋開寶四年築明初甃甎本朝順治十五年修雍正二年重修興化縣城周六里有奇門四水門四濠廣二丈五尺宋寶慶元年築明初甃甎本朝順治十二年修康熙二十三年五十二年重修寶應縣城周九里有奇門五水門一宋嘉定中築元至正中甃甎本朝康熙七年修二十七年雍正九年重修泰州城周十二里有奇門四水關二南唐時築明初改築本朝康熙十三年修東臺縣城舊係土城明隆慶間築門四水關二本朝嘉慶四年修築學校揚州府學在府治北牧愛坊明洪武中建本朝康熙十九年修二十二年乾隆元年重修入學額數二十五名江都縣學在縣治北彚俊坊明洪武七年建本朝康熙十九年修二十三年乾隆元年重修入學額數十三名甘泉縣學與江都縣同入學額本朝雍正十二年改今嘉慶十三年修并建㑹文名堂樂儀書院在儀徵縣治本朝乾隆三十三年建嘉慶七年修珠湖書院在髙郵州治西本朝乾隆四十九年自州北門長生庵移建晝川書院在寶應縣治東北本喬萊縱棹園地本朝嘉慶初建西溪書院在東臺縣治按舊志載江東南本朝嘉慶十年建都有維揚書院資正書院甘泉有謝公書院虹書院泰州有胡公橋書院興化有昭陽書院今俱廢謹附記户口原額人丁二十六萬六千七百九十四今滋生男婦大小共三百二十六萬七千五百二十二名口田賦田地共七萬四百五十頃二十五畝八釐有奇額徵地丁正雜銀二十二萬八千一百六十三兩四釐又雜辦銀六百六十一米麥九萬七千八百二十石一兩三錢四釐斗七升二勺山川康山在江都縣土所成府治東南隅志其上構通志相傳濬河時積堂董其昌題曰康山草堂為康海與客燕飲彈琵琶處十五年高宗純皇帝南巡本朝乾隆四御製遊康山即事詩御書康山草堂額四十九年御製遊康山詩倣董其昌書對山樓因成口號時隨扈仁宗睿皇帝御製康山詩浮山在江都縣治西五十步舊志有石出地高三尺二寸長四丈五尺以其浮於土上故名輿地紀勝其狀似鐵不生草木又縣南門外西隅有土山功德山在甘泉縣西平山之東一名功德林本朝乾隆二十二年三十年四十九年御製功徳山詩高宗純皇帝南巡俱有仁宗睿皇帝隨扈御製功德山詩金匱山在甘泉縣西七里語溪集有仙人溝盤古山在甘泉縣西三十里府志上有盤古廟俗呼廟山北洋山在甘泉縣西三十里一作白洋山九龍山在甘泉縣西南十五里下接湖水一作九龍岡席㡌山在甘泉縣西北十二里狀如席㡌俗呼㡌兒墩又馬鞍山在縣西北三十五里狀如馬鞍故名得勝山在甘泉縣西北三十里高七丈周二十五里宋紹興初韓世忠敗金人於大儀還軍駐此因名甘泉山在甘泉縣西北三十五里高二十餘丈周二里山有七峰聯絡如北斗平地錯落又有圓岡二十八如列宿之拱北上有井泉甚甘故名舊志或謂厲王冢在此按郡國志廣陵厲王胥冢歲旱鳴鼔造之輒致雷雨本朝乾隆七年築靈雨臺於其上小金山在甘泉縣北門外神山在儀徵縣西南二十五里產細石五色皆具青山在儀徵縣西南二十五里南臨大江雞留山在儀徴縣西三十五里舊志伍子胥欲報浣紗女馮氏而不知其家乃留雞於此祀之横山在儀徴縣西三十五里接江寕府六合縣界輿地紀勝與方山丫山鼎峙舊志魏於此置横山縣其陽有昭明太子讀書堂又有小横山與横山相近俗名飯包山丫山在儀徴縣西四十里舊志以兩峰相對而名俗呼奶山唐光啟中蔡州賊將孫儒嘗屯於此今寨址猶存方山在儀徵縣西四十里與江寕府六合縣分界其巔四面平正故名舊志隋六宫曽居此遂置方山府茅家山在儀徵縣西北三里與北山相對宋郡守袁申儒嘗築塘其下小山在儀徵縣西北十五里方輿勝覽宋祥符中以山有王氣即其地鑄玉皇聖祖太祖太宗像因建天慶儀真觀又縣西北四十里有烏山與江寕府六合縣馬鞍山相對銅山在儀徴縣西北二十五里寰宇記銅山小銅山並在永貞縣西北八十里舊志東麓有小銅山皆産銅宋時淮南鼓鑄莫盛於真州舊有廣陵丹陽二監又置冶官於小銅山西北五里按寰宇記江都有大銅山在縣西七十二里即漢書呉王濞即山鑄錢處今志無此山疑即儀徴之大小銅山而互載也冶山在儀徴縣西北四十里林巒秀麗山産磁石色多青緑相傳亦吳王濞鑄錢所城子山在儀徴縣北六里與北山相連形如城岡阜靡迤三十餘里西迎大江北走天長宋兩京故道也舊志魏文帝嘗築東巡臺立馬賦詩於此臘山在儀徵縣北三十里上有天井池冬夏不竭池旁有白龍廟禱雨輒應北山在儀徴縣北蜀岡中處岡形至此稍凹而北故名宋嘉定閒築塘其下滙水注濠城守賴焉其西俗傳為康王墩焦家山在儀徴縣東北五里舊志昔有焦姓居山下故名宋開禧二年金人至真州總轄唐璟決陳公塘水𬒳真東北境敵登焦家山望之知不可越引退神居山在高郵州西六十里石山戴土一名土山寰宇記上有石井石臼山下人時見人著朱高冠徘徊井側或云古列仙之宅焉宋志南齊亘公嘗結庵於此煉丹仙去一云謝安煉丹之所輿地紀勝在縣西南六十里秦觀曰山不甚廣而股趾盤礴甚大傍占數墟遂為州境之望舊志有煉丹井井大可五尺深倍之一名石塘又有排牙石人記其數輒忘東山在高郵州東北隅上種松柏昭陽山在興化縣西四里輿地紀勝有昭陽府君廟相傳即楚懷王令尹昭陽墓也箕山在寶應縣東六十里輿地紀勝有射陽阜東臨射陽湖其邱千數蓋即此今惟有土阜百餘周四十里雲山在寶應縣西南一百二十里上有龍潭雲起即雨故名舊志接安徽旴𣅿縣界有仙人洞吕城山在泰州東三十里形如城相傳昔有吕姓者居此因名天目山在泰州東四十五里寰宇記海陵縣天目山土山也在縣東六十里有雙井相對其水清冽呼為天目輿地紀勝元豐二年發運使蔣之奇於天目井中得鹿角至數十丈又獲金龍玉璧通志在泰山西四十里相傳有王仙翁嘗居此鳳山在泰州東一百二十里形如翔鳯山前谿路環繞上有泰山宫觀泰山在泰州西舊志宋紹興時開東西市河壘土而成因州為名登山眺遠京口諸峯隱約可見寶慶二年州守陳垓浚山下湖為往來泊舟之次羅浮山在泰州西北五里輿地紀勝在澤藪中水不能沒望之若羅浮茅山在泰州東北六十里嘗產香茅因名中洲山在泰州東北一百二十里西谿鎮之北宋范仲淹監鹽倉時壘土為山今漸平坦梅花嶺在甘泉縣廣儲門外縣志明萬厯中州守呉秀濬河積土而成因樹以梅故名今建書院其地駱駝嶺在甘泉縣治北開明橋西其形巃嵸如駱駝脊故名今縣儒學在其上蜀岡在府城西北四里延亙四十餘里西接儀徵及江寕府六合縣界東北抵茱萸灣宋鮑照蕪城賦軸以崑岡即此寰宇記岡有茶園其味甘如蒙頂輿地紀勝自揚子縣西胥浦至江都並謂之蜀岡與金陵相對舊傳地脉通蜀側有蜀井舊志崑崙岡在江都縣西北八里又曰阜岡與蜀岡連接葢即蜀岡之異名又通志有夾岡在府城東北七里東接灣頭鎮淮子河口與蜀岡相屬按廣陵本以此岡得名曰蜀岡曰崑岡曰夾岡實一岡耳桃花岡在江都縣南十五里寰宇記上有呉王墓龍岡在高郵州西南九十里新開河西與安徽天長泗州接界褚廟岡在寶應縣西百里東西六里南北一里舊築大堰於此以蓄洩白水塘之水松岡在寶應縣北門外狀元峯在寶應縣儒學尊經閣後蒙谷在甘泉縣東北五里竹西亭北宋歐陽修有詩虎墩在東臺縣西北小海場府志宋范仲淹築捍海隄起虎墩即此海在府東北自淮安府鹽城縣界南經興化泰州東北又南入通州界寰宇記在海陵縣東二百二十里南接江口北接楚州鹽城縣界舊志州境煮鹽之利為大大江一名揚子江自江寕府六合縣東流入經儀又徴東縣經南江有都上江縣南下四江十舊里江瓜三口洲鎮對渡岸口為對句岸容為縣鎮江府道江丹水徒東縣南又東至江入通都入州海泰興縣三國魏界黃漢初書志湔五年六氐年兩天幸之廣所陵以故限城南臨北江也觀元兵和望見志西江北濤洶自六湧合歎縣曰此界流入江京口都舊晉闊祖四邈十擊檝餘里中今流闊自十誓之八里所方南輿對紀丹要徒之唐初江五面里闊宋四時十洲里渚其益後廣沙紹壅興為瓜中猶洲闊開十元八中里闊明二十嘉靖以十來餘僅里闊舊七志八自里六通合志瓜瓜步洲山與入鎮儀江徴相縣對境江經面黄闊天蕩又江口東與五江十心里天經安縣南洲相上江對其口東去十下五江里口為一舊里下江口西口北與至江縣心十金里山與江寺相心對新東洲十相八對江里為都沙縣河瓜港洲其渡東南芒與稻江二心河焦俱山寺相為洩水對通亦江謂處之又沙東􅄵五河里舊曰與深白港塔又五亦十曰餘新里港曰又寶東塔至灣周又家東橋南四四十十里五與里曰圌山三相江對口章思蕩在寶應縣東南四十里西北接城子河南通廣洋湖黄昏蕩在寶