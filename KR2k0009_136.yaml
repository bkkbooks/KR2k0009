body:
  text: 沅州府在湖南省治西一千一百三十五里東西距二百八十里南北距二百五十五里東至辰州府辰溪縣界一百三十五里西至晃州廳界八十三里南至靖州會同縣界一百二十五里北至鳳凰廳界一百三十里東南至靖州會同縣界一百九十里西南至貴州鎮遠府天柱縣界八十里東北至辰州府瀘溪縣界二百二十里西北至貴州思州府黃道土司界八十里自府治至京師三千九百八十里分野天文翼軫分野鶉尾之次建置沿革漢武陵郡地後漢以後因之梁為南陽郡地陳及隋為沅陵郡地唐貞觀八年置巫州天授二年改曰沅州長安四年析置舞州開元十三年復沅州曰巫州亦名潭陽郡屬江南西道又改舞州曰鶴州二十年又改曰業州天寶元年為龍溪郡大厯五年改巫州曰敘州又改業州曰奬州五代後唐長興三年楚馬希範置懿州漢乾祐三年馬希萼又改曰洽州宋乾德三年復洽州曰懿州遂為羈縻州屬荆湖路熙寧七年收復置沅州潭陽郡元豐中屬荆湖北路元至元十二年立沅州安撫司十四年改沅州路總管府屬湖廣行省明初改為沅州府洪武八年復為州隸辰州府屬湖廣布政使司天啓二年設偏沅巡撫於沅州本朝初因之康熙三年移巡撫駐長沙府乾隆元年升沅州為府於府治置芷江縣分辰州府之黔陽麻陽二縣隸焉領縣三芷江縣附郭東西距二百七十里南北距一百一十五里東至辰州府辰溪縣界一百三十五里西至晃州廳界八十三里南至黔陽縣界四十五里北至麻陽縣界七十里東南至辰州府辰溪縣界一百四十里西南至貴州天柱縣界一百一十里東北至麻陽縣界一百三十里西北至貴州思州府黃道土司界八十五里漢置舞陽縣隸武陵郡後漢省晉太康間復置舞陽縣義熙中徙治故鐔成縣今為黔陽縣境梁陳隋為龍檦縣地唐初為龍標夜郎縣地天授中析置渭溪縣先天中又析置潭陽縣屬沅州大厯五年屬敘州五代時楚以潭陽縣為懿州治後改洽州治宋熙寧中置盧陽縣為沅州治元為沅州路明洪武八年省縣入州本朝乾隆元年置縣曰芷江為沅州府治黔陽縣在府南九十里東西距一百六十五里南北距一百里東至寶慶府武岡州界二百四十里西至芷江縣界四十五里南至靖州會同縣界三十五里北至辰州府辰溪縣界一百八十里東南至寶慶府武岡州界百六十里西南至貴州鎮遠府天柱縣治一百八十里東北至辰州府漵浦縣治二百里西北至沅州府治九十里漢置鐔成縣隸武陵郡後漢因之晉義熙中省移舞陽縣治於此齊改曰潕陽梁改為龍檦縣隋屬沅陵郡大業以後縣廢唐武德中復置改名龍標縣屬辰州貞觀八年為巫州治又析置朗溪縣天授二年為沅州治開元十三年仍為巫州治大厯五年為敘州治五代沒於蠻宋熙寧七年置黔江城元豐三年併鎮江寨入為黔陽縣隸沅州元屬沅州路明隸沅州屬辰州府本朝乾隆元年屬沅州府麻陽縣在府北一百二十里東西距一百七十里南北距一百里東至辰州府辰溪縣界一百三十里西至貴州銅仁府銅仁縣界五十里南至芷江縣界五十里北至鳯凰􅈦界五十里東南至芷江縣界百二十里西南至芷江縣界百三十里東北至辰州府瀘溪縣界九十里西北至鳯凰廳界五十里漢沅陵辰陽二縣地陳天嘉三年置麻陽戍唐武德三年置麻陽縣屬長州垂拱三年析置錦州兼設盧陽縣為州治又置招諭縣四年又祈置龍門縣尋省五代廢錦州為寨宋熙寧七年麻陽改屬沅州八年併錦州寨及招諭縣入麻陽元屬沅州路明隸沅州屬辰州府本朝乾隆元年屬沅州府形勢連接溪洞扼塞羣蠻西南一隅仰此氣息方輿紀要深谷峻嶺而阻塞可恃枕山帶水而明秀堪觀固雲貴之通衢辰常之藩障也明侯加地志綰轂四省控馭五溪山水竒秀之地袁廓宇學記風俗嗜好居處與巴渝同俗隋書地理志雜以蠻夷率多徑悍唐梁載言十道志君子勤乎耕學婦女愼乎閨門藹然中土之風明辰州府志城池沅州府城周五里有奇門四水門一明洪武初因宋址築土城嘉靖中甃石本朝順治康熙間屢葺乾隆十八年二十九年重修芷江縣附郭黔陽縣城周三里有奇門四明正統間築成化中甃石本朝康熙年間屢修雍正六年乾隆四十六年重修麻陽縣城周三里有奇門五明洪武初築正德中甃磚本朝康熙雍正年間屢葺乾隆七年五十三年重修學校沅州府學在府治東舊為州學在州東南宋大觀中建明嘉靖萬厯中屢遷本朝康熙二年重建四十一年改建州城北乾隆二年升州為府改州學為芷江縣學別建府學於今所二十一年四十五年嘉慶十一年屢修入學額數十四名舊額十五名嘉處二十三年割芷江縣地設晃州廳分撥一名歸入廳學芷江縣學在府城南舊在城北乾隆二年升州為府設縣附郭即州學改設嘉慶二年遷建今所入學額數十五名黔陽縣學在縣治東舊自宋立學後厯元明屢遷本朝康熙四十九年遷建西門外乾隆十二年移建今所四十四年五十五年嘉慶十二年屢修入學額數十二名新童三名麻陽縣學在縣西舊在縣西南宋慶元間建元明屢遷本朝順治十二年遷同天寺旁康熙三年復遷城南乾隆二十年遷於今所嘉慶二年修入學額數八名明山書院在府城西舊名文清書院在明山南明嘉靖中建後遷城北本朝乾隆八年遷建今所易今名耀文書院在府城外五里明建金繼震有記秀水書院在芷江縣治北乾隆五十三年建嘉慶二十三年重建寶山書院在黔陽縣城東舊在赤寶山麓宋寶慶中縣令饒敏學建明成化中知縣陳鋼重建以祀敏學並祀唐義士張抃後人遷建城東增祀鋼焉龍標書院在黔陽縣西門外舊在縣北康熙五年建乾隆十二年遷建今所錦江書院在麻陽縣南門內舊在院西乾隆二十年建四十二年