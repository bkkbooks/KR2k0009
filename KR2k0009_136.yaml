知黔陽縣性慈愛鞫訟諭以理不忍笞撲以事至鄉必進父老勸以孝弟力田民感其化去之日皆揮涕送之孫萬備寧海人知麻陽縣乾隆六十年逆苗滋事縣城猝𬒳賊擾萬備親督義勇力疾防守又奉檄管轄三站急公盡瘁以勞卒事聞議恤照例人物宋向貞麻陽人神宗時為峽州軍衙頭指揮使會蠻叛貞奮然曰大丈夫當捐軀報國垂名汗青豈可碌碌人後耶乃身先士卒前驅力戰被執脅降矢詈不屈遂遇害事聞贈內殿崇班詔立廟祀之按貞為宋歸明溪洞人後隸麻陽其峽州今黔陽縣西江鎮也楊潄黔陽人兄弟三人並稱英勇屢禦苗寇民多賴焉邑人立廟祀之明劉有年沅州人洪武中為本州訓導擢御史激揚有聲出知太平府永樂中上儀禮逸經十有八篇官終交址按察僉事蔣奎沅州人洪武進士官給事中性剛介在諌坦雅著直聲屢上封事切中時弊當時憚之周拱元沅州人少讀兵書建文中應募入京試騎射對䇿稱旨授錦衣衛鎮撫軍前差遣占候輒中主將令引步兵防餉舟靖難後不屈死之向文敏沅州人永樂鄉舉任湖口訓導清修自好士類賴其成就卒於官與陳質林純合祀稱三先生趙彬沅州人宣德九年御史薛瑄以賢良薦除都察院檢校胡􅌔沅州人宣德間以貢入南監選書誥敕授安慶府通判攝府事奏豁忠臣余闕元孫先戍籍田子義麻陽人有浦口人宿其家遺金席下子義物色歸之謝以半固辭龔潮沅州衛人正德七年討鎮筸叛苗潮效力軍前無所撓避人莫不義之李仲謙麻陽人正德間苗叛仲謙奉檄倡義從征捍禦有功事上當道給以冠帶侯以凝沅州衛人事每至孝母患氣疾痛欲絶以凝日夜禱籲願減己算益母夀仍刲股為羹疾忽愈後葬母天雨連旬泣禱竟霽人以為至孝所感楊啓貴麻陽人正德中苗掠其里啓貴守母喪苗欲斫其柩抱棺跪泣以身衛之苗感其孝釋之且遺以布有誣以通苗者將按其事邑諸生以孝狀白冤始雪奬異之田豐麻陽人嘉靖中令廣西天河縣擒右江劫蠻却那地州餽金遷建縣治尋調南江廉介有擊馬元吉沅州人涉獵經史沈潛理學為湛若水髙弟子初官國子監助教遷徽府長史歸隱明山即無水南闢耆院祀薛瑄學者稱明山先生沒祀於鄉楊茂沅州人官沅州衛指揮僉事屢立軍功擢湖廣都指揮使天順五年朝廷廉其才敕授參將協總兵鎮守淮安成化元年晉前府都督僉事充總兵官挂漕運印六年加都督同知賜玉帶茂督漕有方廉能茂著年七十一致仕歸卒賜祭葬侯位沅州人正德進士令無錫判斷如神邑當水陸衝位性剛毅有不畏強禦聲行取兵部主事轉員外郎諫武宗微行廷杖直聲大震後擢操江巡撫奏浮糧清海防纍官兵部左侍郎危嶽黔陽人嘉靖進士以春秋啓迪後學任吉安府推官廉慎律身明允斷獄屬邑安福田糧數為豪強所欺匿嶽往覆丈量盡祛隱弊時方行取以疾卒於官士民哀之立祠以祭滿朝薦麻陽人萬厯進士令咸寧稅監梁永縱其下劫諸生槖朝薦捕治之後永遣人蠱巡按余𢡟衡朝薦捕獲其人永益怒誣劾朝薦劫上供物殺人詔獄長繫後用葉向髙請釋歸邱式耔黔陽人為諸生鼎革後鎮帥械送武昌幽拘數年死本朝乾隆四十一年豫入忠義祠單之賓沅州人官劍州學正崇禎時流寇陷城從容就死贈國子監學録本朝乾隆四十一年賜諡節愍本朝龍霖沅州人順治初流寇未靖負二親逃巖谷間猶日求甘旨奉養親沒居廬枕塊危階黔陽人為諸生順治初餘寇潰入黔沅間階掖母走避會同山中負米百里外遇虎默禱虎竟去持未歸母賴以生雍正六年旌劉星沅州人為人傭作積資以葬父負母避寇山中越險墜崖母子並全雍正七年旌張世正沅州人性純孝父病禱於神遂愈著家範十四條教諭族人每授生徒訓以先器識而後文藝鄉里不能婚葬者助之邑有通衢阻河造舟以濟雍正九年旌田仁德沅州人雍正十三年貴州苗叛仁德以把總隨征屢著功績苗匪據寨章諸險要以敵官軍仁德奮勇深入援軍不至力竭死事聞賜祭葬張可智沅州貢生弱冠遭吳逆亂奉親避山谷中負米供㸑而自掘茅根以噉親沒家漸𥙿終身惟食粗衣人官守備嘉慶元年甘肅逆回滋事派赴剿捕擊賊於近鳳山受傷殁於陳事聞議恤蔭雲騎尉趙盛朝芷江人性敦孝行樂善好施其子安松亦事親竭力又黔陽監生羅昌教持躬端謹克敦孝友均嘉慶二十四年旌流萬宋李明黔陽人本籍河南祥符來家於安江髙宗時官廣勇衛指揮使金兵南下從宣撫使楊存中遏之外援不繼力戰死焉事聞詔以其子守中為武校尉明方以智桐城人崇禎進士授檢討避亂至沅州結茅蘭地山中有離草蘧菴集蘭溪曉月吟列女明周冕妻張氏芷江人為指揮周冕繼室永樂間苗寇沅州冕從征死焉氏聞慟絶復蘇堅志守節撫孤承襲辰州府同知茆大綬妻陳氏芷江人大綬卒時氏年十八孀居十六年潰兵作亂懼為所辱携一子一女投江死向春妻張氏黔陽人適春時年十七甫數月春卒七日後自縊柩旁彭猋妻胡氏漢陽人明末隨夫避亂黔陽王進才作亂氏被執強之渡河不可罵賊被斫身無完膚一男一女同死張烈女黔陽人字周成年二十成殁謂其母曰兒雖未嫁受聘即其妻也周死我何生也是夜自縊死向氏四烈麻陽人一向明室女名晚女一向明女名焦女張明儒妻一向明子廷表妻田氏一向明姪廷相妻田氏嘉靖中蠟爾苗叛四人走入岩穴為賊搜得逼之驅至甕泡灘湍流深處同赴水死苗退求尸悉獲靣如生邑令為建四節祠鄭命賢妻黃氏麻陽人鄭以廩應選沒於鄂氏年十九閗訃誓死襯歸斂祭畢自縊死本朝徐雲清妻陶氏芷江人夫亡守節同縣節婦祁文明妻劉氏鄧鍾喬妻陳氏均雍正年間旌潘浚妻李氏黔陽人夫亡守節同縣貞女向安聘妻廖氏均雍正年間旌滿世聲妻張氏麻陽人夫