陵縣東北百餘里其深莫測庳灘在道州北州志從州治東行沿江而下四十里地名江村即庫亭其下曰漫潭舟行至此便謂之入瀧宋嘉定問太守林致祥命工沿瀧鑿山開道自庳亭達之雷石行者遇險則舍舟趨陸去州治八十里有麻灘流灘大家灘皆舟行所戒青澗在寧遠縣東南王韶之神境記九疑山半其路皆植松竹夾路有青澗澗中生黃色蓮花香氣盈谷大塘蕩在寧遠縣北五里大富山下九井同流上湧灌田四百餘頃相近又有山陂蕩其泉湧出分左右流灌東西二洞之田鈷鉧潭在零陵縣西三里中有小泉合愚溪入瀟水唐柳宗元記鈷鉧潭在西山西其始蓋冉水自南奔注扺山石屈折東流旁廣而中深其清而平者且十畝有樹環焉有泉懸焉小石潭在零陵縣西小邱之西唐柳宗元記從小邱西行百二十步下見小潭水猶清冽泉石以為底潭西南望斗折蛇行明滅可見其岸勢犬牙參互不可知其源沈香潭在東安縣東十五里岸壁上舊有沈香南池在零陵縣東南唐柳宗元有宴南池序名勝志池當南山之缺設自神功無容工鑿隨山周旋可容巨艦望岡池在祁陽縣北六十里山岡上可半畝許愛蓮池在道州學西濂溪書院之北寒泉在祁陽縣西南唐元結銘序湘江西峯直平陽江口有泉出於石穴為其當暑大寒故命曰寒泉甘泉在祁陽縣北一里許隨汲隨滿贍足一方宋鄒浩有銘濫泉在祁陽縣東北七十里冬溫可浴定田泉在東安縣西二十五里源出衆山連通五竅凝流蓮花峯下溉田萬計七泉在道州東唐元結銘序道州東郭有泉七穴皆澄流清漪旋沿相湊又有叢石欹缺為之島嶼殊怪異相不可名狀命五泉曰潓􅪙涍汸淔欲來者飲漱其流而有所感發矣一泉命曰漫泉蓋欲自矜漫浪不厭歡醉者也一泉出山東故命之曰東泉各刻銘以記之州志在州東北狀類七并五泉相連屬二泉稍離亦脈理相連流為溪入沱知時泉在道州城南鑿石象龍以導其流夏至則盈秋分則涸麗澤泉在永明縣東又雲從泉在縣東里許不老泉在江華縣南三十里洄溪之旁其地産蘭謂之洄溪蘭龍泉在江華縣西北三里源流不竭極灌溉之利龍井在祁陽縣西南八十里寬二里許不溢不涸崇柏井在永明縣東南四十里澄徹甘美汲飲不渴鵝井在新田縣東南石羊下漕二洞間舊名鵝安蕩泉出最清灌溉極溥
