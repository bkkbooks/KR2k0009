為士子科舉之費又置萬卷樓使合郡士誦習其中高其勳字懋功初襲馬龍所千户後舉武鄉試洊擢參將守武定沙定洲來攻固守月餘城陷服毒死邵元齡陸涼人世襲指揮沙定洲餘黨趙應元攻陸涼城陷罵賊死尹大任陸涼人定番學正孫可望入滇大任語人曰明倫堂我之西山也冠帶拜闕自縊本朝乾隆四十一年入忠義祠錢士用南寧人任千户流冦入滇罵賊𬒳殺皇甫信羅平人知銅梁縣流冦陷城與子皆殉難本朝李瀚南寧人康熙中嶍峩教諭猓賊犯境瀚理諭之賊遂退知南昌縣有黑魚為崇焚檄驅之患遂息繆以正南寧人康熙丙午舉人不受吳逆偽職後知南和縣丁運亨南寧人康熙巳酉舉人事親孝吳逆強官之不就後任景東教授查奉璋馬龍人康熙巳卯與人以孝聞工書善詩任路南學正父喪廬墓不復出督學蔣炯旌其廬鄒旦宣威人孝事繼母待後母弟極友愛王國卿尋甸人魯甸把總雍正八年隨征烏蒙力戰不支投崖死奏入賜祭恤蔭二子朱服逺南寧人積書萬卷日以考定為事著有聖門言行録楊氏南寧人年少夫亡苦節自矢同縣林宜春妻伯氏夫亡子幼苦節五十餘年段尚雲妻周氏南寧人流冦之亂為賊所執欲汚之奮身投井賊提其髮氏以瓜傷賊手賊怒以石擊之乃死同縣王民瞻妻朱氏曽刲股救父母疾賊至與父母弟妹共死燕山壁下李士升妻周氏夫隨父任卒氏聞哀毁而死錢士用妻莊氏南寧人夫任千户流冦入滇夫語之曰吾分當守城汝可遠避氏曰願在城同死耳及城陷攜幼女投井死夫亦罵賊被殺陳蕃妻任氏曲靖衛人夫客死他郡氏年甚少生女甫一歲翁姑迫令改適氏紿之曰媳既失所天但得失葬不敢以子女重纍翁姑也數日夫柩歸葬遂負女投瀟湘江王家冠妻潘氏霑益人流冦陷城氏年二十七𬒳虜至海家閘奮身投水死俞嘉言妻王氏陸涼衛人夫任本衛指揮使流冦入滇奉調赴越州防禦氏聞賊至州境恐𬒳辱率妾方氏及幼女投并死皇甫信妻魏氏羅平人夫任銅梁知縣流冦陷城夫及子被害氏聞之泣曰父死忠子死孝吾死節可也遂投井死阮元聲妻杜氏馬龍人夫以稽勛郎典陜西試氏隨翁居曲靖流冦陷城氏罵賊而死李萬年妻李氏鳯梧所人夫亡苦節安賊臨城恐身𬒳玷自縊死同所袁謙妻蘇氏夫亡守志為安賊所逼以刀引決賊感而釋之王愛妻徐氏木密所人夫及姪王立與安銓戰死氏欲以身殉姑泣止之忍死事姑夀八十九臺使旌其門李文妻戴氏平夷衛人年十九夫亡遺一女尚幼姑欲遣嫁之自縊死同衛繆昌運妻談氏夫亡守志流冦之亂子以貞𬒳虜氏冒死尋之遇賊斷其右手死而復蘇母子獲聚苦節終身董祖舒妻李氏平夷人土酋叛城陷祖舒在省考選氏與長幼七人闔門自焚死本朝浦聫泗妻劉氏霑益人年少夫亡孝慈兼至雍正間旌董履義妻李氏南寧人年二十五夫亡守志與同縣龍文妻王氏張理妻尹氏均乾隆間旌方之益妻李氏陸涼人年少夫亡苦節終身與同州蕭會之妻邵氏陳玿妻黃氏李松妻張氏均乾隆間旌亞受羅平夷婦守正被戕乾隆間旌楊均妻張氏尋甸人夫亡守節事親撫孤與同州潘志廣妻趙氏黃位中妻張氏均乾隆間旌杜雙得妻普氏尋甸人守正𬒳戕乾隆間旌朱級妻范氏宣威人夫亡守節與同州包文用妻王氏均乾隆間旌吳仲傑妻芮氏南寧人夫亡守節與同縣鄧聨洲妻趙氏均嘉慶間旌駱伏氏霑益人夫失名𬒳翁誘嫁自縊嘉慶十九年旌李根深妻耿氏羆平人夫亡守節事親撫孤嘉慶間旌吕開元女尋自人遇暴自盡與同州楊德華妻尹氏均嘉慶間旌吳傑妻吕氏平􅉓人夫死於廣南氏遠涉扶櫬歸事姑教子苦節終身與同縣賀朝宣妻郭氏龍在乾妻沙氏均嘉慶間旌仙釋唐阿闍黎南寧人段姓人呼段長老驅龍不事符牒凡有禱輒應人自遠方來迎者第令先往其人抵家則巳先至矣明鏡中長老南寧人正統間住真峯寺苦行四十餘年夜常以念珠撒地一一探之仍搯貫成串竟夜不寢侍者問何苦如是曰不苦不真吾以伏魔耳一夜有盜入室勒取衣鉢與飲食遣之比曉尚旋繞廊廡下相率膜拜還其物後建寺卜地得一龍潭祝曰爾龍借我地汝亦有功次日泉果遷於山巔今泉溜樹極繞寺廊焉所庵名真澄曲靖人年十五慕玉龍發光和尚思見之適園中柿熟欲取作供甫登樹輒墮地昏昏如夢中赴光座下光日汝事辧否曰辧及蘇仍仆墮處遂悟生死不在色身裏乃禮光受五戒年十八謁古梅於曲江為剃髮且令遍參天下真澄至北都厯參諸宿久之至千佛寺依循融多所發明遂嗣融後常住五臺復遷雞足大千大同人七歲出家來滇居曲靖玉龍庵年五十夜誦經虎常守户後百嵗無疾而逝土産鐡陸涼霑益二州出石緑土名銅緑出羅平霑益二州棉花出羅平州石總纂官臣顧蓴恭纂并覆輯校對官臣師長治恭校
