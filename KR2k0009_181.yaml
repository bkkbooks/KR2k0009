body:
  text: 澄江府在雲南省治東南一百二十里東西距二百三十六里南北距一百七十五里東至廣西州彌勒縣界二百里西至雲南府晉寧州界三十六里南至臨安府寧州界一百二十里北至雲南府呈貢縣界五十五里東南至彌勒縣界二百五十三里西南至臨安府嶍峩縣界二百一十五里東北至雲南府宜良縣界七十里西北至呈貢縣界一百三十里自府治至京師八千三百二十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢梁州荒裔戰國時為滇國地漢置俞元縣屬益州郡按明史漢為牂牁郡地隋牂州後漢因之三國漢屬建寧郡晉增置新興縣宋因之齊為建平晉寧二郡地梁屬南寧州隋屬昆州唐武德元年隸戎州都督府七年析南寧州二縣地置西寧州貞觀八年更名黎州天寶末入於蠻後南詔取其地置河陽郡宋段氏時為羅伽部元志唐天寶末麼些蠻居之號羅伽甸後為僰蠻所奪南詔蒙氏為河陽郡明統志段氏析麼些蠻為三部曰強宗曰休制曰步雄其步雄後居羅伽甸號羅伽部又黑爨蠻之裔居路甸號落蒙部元初內附置羅伽萬户府至元三年改為中路十六年升為澄江路隸雲南行省明洪武十五年改為澄江府隸雲南布政使司本朝因之屬雲南省領州二縣二州二十年降為縣屬澄江路明屬澄江府本朝因之新興州在府西一百二十里東西距七十里南北距一百里東至江川縣界二十里西至雲南府昆陽州界五十里南至臨安府嶍峩絲界五十里北至昆陽州界五十里東南至臨安府河西縣界四十四里西南至嶍峩縣界四十七里東北至雲南府晉寧州界五十里西北至昆陽州界四十里漢益州郡地晉置新興縣屬建寧郡宋因之齊屬建平郡梁末土酋爨瓚居之分為西爨地唐貞觀中置求州屬戎州都督府蒙氏改為溫富州宋段氏時麼些蠻據其地號休制部元初置千户所至元十三年改為新興州隸澄江路明屬澄江府本朝因之路南州在府東一百三十里東西距一百二十里南北距一百十五里東至廣西州彌勒縣界八十里西至雲南府宜良縣界四十里南至臨安府寧州界九十里北至宜良縣界二十五里東南至廣西州彌勒縣界八十里西南至河陽縣界七十八里東北至曲靖府陸涼州界六十里西北至曲靖府馬龍州界一百八十里漢益州郡地蜀漢為建寧郡地唐屬昆州蠻名路甸天寶末為黑爨蠻落蒙所據號落蒙部元初置落蒙萬户府至元十三年改為路南州屬澄江路明屬澄江府本朝因之形勢北倚會城南接臨安襟水負山土田饒沃通志金蓮玉筍卓兀東西撫仙星雲瀠洄內外挾湖山之勝號魚稻之鄉府志崎嶇崖石地鮮平夷明統志風俗士知尚學民務耕織勤生力本以徑特相慕效恥為委蛇通志其性質野其俗豪強蠶衣耕食不事逐未明統志城池澄江府城周五里有奇門四池深五尺引東西泉注之明隆慶五年建本朝康熙五十一年乾隆元年修二十五年人修江川縣城周一里有奇門四有池明崇禎七年築本朝康熙五十六年修乾隆二十五年又修新興州城周三里門四有池明正德二年築土城萬厯六年易以磚本朝康熙四十七年修乾隆三十六年又修路南州城周二里有奇門四有池明宏治中築隆慶六年易以磚本朝雍正七年十一年修乾隆二十六年又修學校澄江府學舊在金蓮山麓明隆慶中遷建於舞鳳山萬厯三十一年復遷於金蓮山本朝康熙三十年修四十一年又修入學額數二十名河陽縣學在府治西北明天啓六年建入學額數二十名江川縣學在縣治東舊在城南本朝康熙三十二年改建入學額數十二名新興州學在州治東南舊在城東三里本朝康熙四十八年改建入學額數二十名路南州學在州治東關外明嘉靖三十五年建本朝順治十七年康熙五十年屢修入學額數十二名河陽書院在河陽縣西北本朝康熙五十七年知府柳正芳修建玉溪書院在新興州治本朝康熙五十年知州任中宜建敬一書院在路南州治本朝康熙二十四年知州徐瀛翥建舊志河陽縣澄心書院在縣東明隆慶中建點蒼書院在縣西明嘉靖中建並久廢户口原額人丁共八千四百三今滋生男婦大共三十萬三千四百四十五名口計四萬四户又屯民男婦大小共二十六萬一千九百四名口計三萬三千一百五十一户田賦田地六千一百二十一頃七十七畝九分有奇額徵地丁正雜銀一萬三千三百二十七雨四錢六分八釐米一萬三千六百九十五石六升八合二勺山川金蓮山在河陽縣東五里明統志一名龜山高圓平正若蓮花然又有重珠山在縣城東五里一名倚鐸山闕摩山在河陽縣東五里巖穴幽勝又縣東五里有暘浦山雲龍山在河陽縣東六里相傳諸葛亮盟蠻於此一名訂盟山繡毬山在河陽縣東七里金蓮山之南回龍山在河陽縣東南十里明統志一名象鼻嶺上接暘浦下吸撫仙湖山勢蜿蜒如龍盤通志又有赦文山在撫仙湖口天馬山在河陽縣東南十里兩山夾護山形如馬陟其巔東見大池江南望撫仙湖西連梁王山北覩湯池有流泉環繞如帶南峯山在河陽縣南十里磅礴高厚中峯秀拔龍爬山在河陽縣西南十五里撫仙湖西相傳龍鬬於此如爪爬迹故名玉筍山在河陽縣西南三十里舊名湧拔山兀立撫仙湖上高峯獨秀狀如玉筍其旁為誥軸山虎山在河陽縣西七里雄峭如虎踞橫亘百里舞鳳山在河陽縣北勢自羅藏山中支逶迤而來左右兩山夾峙如鳳展翼為一郡之鎮山府治建於其麓羅藏山在河陽縣北十里後漢書郡國志俞元裝山出銅明統志漢志云裝山後誤為藏又蠻云虎柵為羅藏昔有虎自碧雞渡滇池至此土人造柵取之故名通志山有龍湫時興雲霧元梁王幹爾密聞曲靖破走入羅藏山結寨其上亦名梁王山其南有泉流為羅藏溪北有泉流為錦溪西有泉流為