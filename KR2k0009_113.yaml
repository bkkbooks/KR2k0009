為營以舍軍嵗旱募人就工厚與直給其食為衢夾兩營東西七里以廢倉為新廄馬息不死築隄扞江長十二里凡為陂塘五百九十八所灌田一萬二千頃宣宗時詔刻功於碑王仲舒并州祁人穆宗初除江西觀察使初江西榷酒利多他州十八民私釀嵗抵死不絶穀數斛易斗酒仲舒罷酤錢九十萬吏坐失官息錢五十萬悉産不能償仲舒焚簿書脫械不問水旱民賦不入為出錢二千萬代之卒於官殷侑陳州人寶厯元年為江西觀察使以潔廉稱沈傳師吳人為江西觀察使所涖以廉靖聞周墀汝南人武宗時徙江西觀察使劾舉部刺史翦捕劇賊出兵戍彭蠡湖禁止剽劫韋宙丹之子宣宗時拜江西觀察使政簡易南方以為世官宋張齊賢曹州人太平興國六年為江南西路轉運使至官詢知饒信虔州土産銅鐵鉛錫之所推求前代鑄法取饒州永平監所鑄以為式歲鑄五十萬貫先是諸州罪人多錮送闕下路死者十常五六齊賢道逢所送索牒視之率非首犯悉伸其冤因力言於朝後凡送囚至京請委強明吏慮問不實則罪原問官自是江南送罪人者減大半凡江南前代弊政悉論免之齊賢居使職勤究民弊務行寬大江左人思之不忘王濟饒陽人大中祥符三年徙知洪州兼江南西路安撫使屬歲旱民飢躬督官吏為糜粥日親嘗而給之録飢民為州兵全活甚衆凌䇿宣州涇人真宗時授江西轉運使饒州産金嘗禁商市鬻或有論告逮繫滿獄䇿請縱民販市官責其算人甚便之張士遜陰城人為江西轉運使辭王旦求教旦曰朝廷榷利至矣士遜迭更是職思旦之言未嘗求利識者以為知大體周湛鄧州穰人仁宗時為江南西路轉運使州縣簿領案牘混淆無紀且多亡失民訴訟無所質至久不能決湛為立號以日月比次之詔下其法於諸路又以徭賦不均百姓巧於避匿因條詭名挾佃之類十二事且許民自言凡括隱户三十萬蔡挺宋城人仁宗時提點江西刑獄制置鹽事江閩鹽賊率千百為州縣害挺諭所部與期使首納器甲原其罪得兵械萬計於是賊黨破散歲增賣鹽四十萬程師孟吳人為江西轉運使盜發袁州州吏為耳目久不獲師孟械吏數輩送獄盜即成擒張洞祥符人英宗時為江西轉運使江西薦飢徵民積歲賦洞為奏免之又民輸絹不中度者舊責以滿匹洞命計尺寸輸錢民便之張根德興人徽宗時提舉江西常平言本道去嵗蠲租四十萬而户部責儥如初祖宗立法運上供額給本錢數百萬緡使廣糴以待用比希恩者獻為羡餘故嵗飢不足至為無名之斂詔貸所蠲祖以糴本錢還之六路政和中為江南西路轉運副使歲漕米一百二十萬石給中都江南州郡僻遠官吏難於督趣根常存三十萬石為轉運之本以寬諸郡時甚稱之盧知原德清人徽宗時為江西轉運副使先是綱運阻於重江吏卒並緣為姦知原悉意經理故先諸道上京師嶽飛湯隂人紹興元年張俊請飛同討李成成將馬進犯洪州連營西山飛自為先鋒率所部潛軍出賊右突其陳進大敗走筠州又設伏敗之降八萬餘人引兵至朱家山又斬其將趙萬李成自引兵十萬來飛於樓子莊大破之遂平江淮加神武右軍副統制留洪州彈壓盜賊建寇范汝為陷邵武江西安撫李回檄飛分兵保建昌及撫州飛遣人以嶽字幟植城門賊望見相戒勿犯後平嶺表又屯江州平虔吉盜授江南西路沿江制置使陳槖餘姚人紹興二年除江西運判瑞昌令倚勢受賂槖首劾罷之期年所按以十數至有望風解印綬者李綱邵武人紹興中除江西安撫制置大使兼知洪州張守晉陵人紹興中知洪州兼江南西路安撫使江西盜賊未息至部揭榜郡邑開諭禍福約以限期許之自新不數月盜悉平劉珙崇安人孝宗時改知隆興府兼江西安撫使至鎮首蠲稅務新額及罷苗倉大斛屬邑奉新有復出租稅窮民不能輸相率逃去反失正稅并奏除之龔茂良興化軍人孝宗時為江西運判兼知隆興府帝以江西連嵗大旱知茂良精忠以一路荒政付之茂良戒郡縣免積稅上户止索逋發廩賑贍以右文殿修撰再任疫癘大作命醫治療全活數百萬程大昌休寧人孝宗時為江西轉運副使會嵗歉出錢十餘萬緡代輸吉贛臨江南安夏稅折帛清江縣舊有破坑桐二堰以捍江護田及民居地幾二千頃後堰壞嵗罹水患且四十年大昌力復其舊辛棄疾厯城人乾道中提點江西刑獄劇盜賴文政有功加祕閣修撰平陸遊山陰人孝宗時遷江西常平提舉江西水災奏撥義倉賑濟檄諸郡發粟以豫民沈作賓歸安人寧宗時除江西安撫兼知隆興府奏部內南安南康龍泉三縣迫近溪洞三縣令尉及近洞之寨曰秀洲曰北鄉曰蓮塘并永新縣之勝鄉寨宜就委師憲兩司擇才辟置量加賞格在郡撙錢二十餘萬緡僚屬請獻諸朝作賓謂平生未嘗獻羡以半歸帥司犒師半歸本府張杓綿竹人寧宗時知隆興府兼江西安撫使奉新縣舊有營田募民耕之畝賦米斗五升錢六十其後議臣請鬻之始征兩稅和買且加折變民重困杓悉奏蠲之趙希懌太祖子燕王德昭八世孫寧宗時遷江西茶鹽提舉嵗飢惡少聚劫希懌身自臨給擒首謀者治之其黨遂散升本路帥按發粟賑兼漕事黑風洞羅世傳寇郴陽姦民潛通賊陰濟以糧希懌捕治之賊乏食乃去未幾李元礪陳廷佐寇南安復誘世傳與合劫掠至龍泉有何光世者能知賊動息希曎授光世計俾誘世傳誅元礪以自贖後世傳果縛元礪以獻廷佐勢孤亦降趙汝讜太宗子商王元份八世孫慶元時提點江西刑獄懲土豪雪冤獄民甚德之趙崇憲餘干人寧宗時提舉江西常平兼權隆興府及帥曹司事遷轉運判官仍兼帥事初父汝愚捐私錢百餘萬創養濟院俾四方賓旅之疾病者得藥與食歲久寖移為他用崇憲至尋修復立規約數十條以愈疾之多寡為賞棄兒於道者亦收鞠之社倉久敝訪其利害而更張之史彌鞏鄞人提點江西刑獄嵗大旱饒信南康三郡大祲彌鞏釐户為五甲乙以等弟賑糶丙為自給丁糴而戊濟全活一百十四萬有奇饒州兵籍溢供億不繼汰冗兵令下營門大噪彌鞏呼諸校曰汰不當者許自陳敢譁者斬諸營帖然李燔建昌人寧宗時添差江西運司幹辦公事洪州地下異時贛江漲隄壞久雨輒潦燔白漕帥修之自是田皆沃壤漕司以十四界會子新行價日損欲抑民藏之以增價慢令者黥籍燔人劄爭之漕司即弛禁又念社倉之置僅貸有田之家遂倡議裒穀以貸佃人陳韡侯官人紹定六年知隆興府贛寇陳三槍據松梓山寨出沒江西廣東所至屠殘韡謂盜賊起於貪吏劾其尤者二人詔節制江西廣東福建三路捕寇軍馬兼知贛州端平元年進文華閣待制江西安撫使至贛斬將士張皇賊勢及掠子女貨財者所至克捷分兵守大石堡截賊糧道遂破松梓山三槍與黨縋崖而遁韡親督諸將夾擊縱火燒賊巢賊首張魔王自焚三槍就擒斬隆興市初賊跨三路數州六十寨至是悉平吳淵宣州人理宗時知隆興府江西安撫使兼轉運副使會嵗大祲講行荒政全活者七十八萬九千餘人後再為安撫使兼知江州尋為沿江制置副使提舉南康軍兵甲公事湖南洞寇蔓入江石袁洪大震淵命將調兵擒其渠魁亂遂平姚希得潼川人理宗時提舉江西常平役法久壞臨川富室有賂吏求免者希得竟罪之遂提點刑獄移治贛州盜有偽號崔太尉者據石壁連結數郡劉老龍等聚衆焚掠希得指授方略不五旬平之劉應龍高安人理宗時知隆興府兼江西轉運副使奏免和糴二十萬石黃申井研人理宗末提點江西刑獄司簽廳獄事多所辨明密佑廬州人咸淳十年為江西都統明年十一月元兵逼撫州佑逆之進賢坪麾兵突戰自辰至日昃佑面中矢拔之復戰身被四矢三槍衆皆死僅餘數十人佑乃揮雙刀砍圍南走渡橋馬踏板斷遂被執元將都木達欲降之不屈以金符遺之許以官不受自解其衣請刑遂死都木達舊作宋都䚟今改正米立淮人江西制置使黃萬石署為帳前都統制元兵略江西立迎戰於江防被執不降行省遣萬石諭之立曰立一小卒何足道但三世食趙氏祿趙亡何以生為再三説之不屈遂遇害元李恆西夏人至元十二年為江西宣慰司文天祥攻贛州急或言天祥墳墓在吉州若遣兵發之則必下矣恆曰王師討不服耳豈有發人墳墓之理乃分兵援贑自率精兵潛至興國天祥走追至空坑降其衆二十萬達春至元十四年為江西宣慰使尋授中書左丞行中書省事初江西甫定帝命隳其城達春表言豫章諸郡瀕江為城霖潦泛溢無城必至墊溺帝從之有謀叛者既敗獲達春謂同僚曰撫治乖方所致中間豈無詿誤止誅渠魁盡釋餘黨瑞州張公明訴左丞吕師夔謀不軌達春廉知其誣斬公明而後聞帝是之達春舊作塔出今改正許楫欣州人至元中為江西提刑按察副使行省命招討郭昂討叛賊董旗兵士俘掠甚衆楫詢究得良民六百口遣還鄉里賈居貞獲鹿人至元十五年為江西行省參知政事時逮捕民間受宋二王文帖者甚急坐繫巨室三百餘居貞至悉出之投其文帖於水火士卒有挾兵入民家誣為藏匿以取財并取人子女為奴妾者皆痛懲以法大水壞民廬發廩賑之南安李梓發作亂居貞慮兵擾民親往諭之賊衆聞居貞至皆散匿不復為用梓發閉妻子一室自焚死比還不戮一人杜萬一亂都昌居貞調兵擒之有列巨室姓名云與賊連居貞火其牒朝廷再征日本造戰艦於江南居貞極言民困必致亂將入朝奏罷其事未行以疾卒張宏略定興人至元十六年遷江西宣慰使饒州盜起犯都昌宏略以為饒雖屬江東與南昌止隔一湖此寇不滅則吾境必有相煽者乃使人直搗其巢生縛賊酋磔於市餘黨潰散劉思敬厯城人至元十七年授冮西行省參知政事治吉贛盜民賴以安管如德黃陂人至元二十四年授江西行省參知政事破豪猾去姦吏居民大悅時贛汀二州盜起如德指揮諸將討平之脅從者多所全宥二十六年遷江西行尚書省左丞時鍾明亮以循州叛命如德統四省兵討之如德遣使諭以禍福賊感其誠信即詣石城縣降蒙古岱蒙古人塔塔兒氏至元二十七年以丞相兼樞密院事出鎮江西謹約束鋤強暴尊卑殊服軍民安業威德並著蒙古岱舊作忙兀台塔塔兒氏舊作達達兒氏今俱改正葉仙鼐蒙古人至元時為江西行省平章政事巨盜鍾明亮積年為害仙鼐討擒之舊作畏吾人今改正董士選藁城人成宗時拜江西行省左丞贛州盜劉六十聚衆至萬餘朝廷遣兵討之士選請自往即日就道不求益兵但率掾史李霆鎮元明善二人持文書至贛境捕官吏害民者治之至興國縣去賊巢不百里命擇將校分兵守地待命察知激亂之人悉置於法復誅姦民之為囊橐者於是民爭請自效不數日遂擒賊魁餘衆歸農遣使以事平報但請黜贓吏數人不言破賊事廷議歎其知體不伐士選在江西以元明善為賓友又得吳澄師之延虞汲於家孰遷南行臺又招汲子集及范梈等與俱皆以文學顯元明善大名清河人董士選為江西左丞辟為省掾贛州賊劉貴反明善從士選討之擒賊三百人明善議緩詿誤得全活者百三十人一日將佐白宜多戮俘獲以張軍聲明善固爭既又得賊所書贛吉民丁十萬於籍者有司喜欲滋蔓為利明善請火其書二郡遂安臧夢解慶元人大德元年遷江西肅政廉訪副使有臨江路總管李倜素狡獪又附大臣勢以控持省憲夢解按其贓罪一道澄清郭貫保定人大德五年遷江西道賑恤民有惠政敬儼易水人皇慶二年拜江西行省參知政事舊俗民有爭往往越訴於省吏得緣為姦利訟以故繁儼下令非有司不得侵民訟事遂簡詔設科舉儼薦臨川吳澄金陵楊剛中為考試官得人為多約珠輝和爾人至順二年除江西行省平章政事時有誣告富民負永寧王官帑銀八百餘錠者中書遣使諸道徵之約珠曰事涉誣罔不可奉命民惟邦本傷本以斂怨亦非宰相福也令使者以此意復命丞相雅克特穆爾聞其言感悟命刑部詰治得誣罔狀罪誣告若干人帝嘉之約珠舊作嶽往輝和爾人舊作畏兀人雅克特穆爾舊作燕帖木兒今俱改正納琳河西人天厯二年為江西廉訪使南昌歲飢行省難於發粟納琳曰朝廷如不允我當以家資償之乃出粟賑民全活甚衆平章政事巴克實呼圖克貪縱不法納琳劾罷之納琳舊作納麟巴克實呼圖克舊作把失忽都今俱改正王艮諸暨人除江西行省左右司員外郎吉之安福有小吏誣民欺隱詭寄田租九千餘石初止八家前後數十年株連至千家行省遣官按問吏已伏其虛誑而有司復勒其民報合徵糧六百餘石艮到官首言是州之糧比前已增一千一百餘石豈復有欺隱詭寄行省用其言悉蠲之桑節河西人至正中為江西行省平章政事詔令守江州時江州已陷賊據池陽太平官軍止有三百賊號百萬衆皆欲走桑節貸錢募兵一日得三千人具舟直趨銅陵克之又破賊白馬灣擒其渠魁奪船六百艘軍聲大振遂復池州又大破賊於清水灣復進湖口縣克江州留兵守之命王惟恭柵小孤山自據鄱陽口以圖恢復時湖廣已陷江西被圍日久無援士卒咸困或請他圖桑節曰吾奉命守江西必死於此賊乘大船四集來攻軍死且盡從子布哈與親兵數十人死之桑節猶堅坐不動賊發矢射之乃昏仆賊素聞其名不忍害舁置密室至旦乃蘇賊羅拜饋食桑節斥之遂不復食凡七日而死桑節舊作星吉布哈舊作伯華今俱改正道通高昌人至正十一年以平章政事行省江西賊起蘄黃陷湖廣道通與左右司郎中布延布哈等分門各守賊圍城兩月民無離志道通召死士數千人面塗以青額抹黃布衣黃衣為前鋒又選精鋭數千為中軍募助陳者殿後半夜開門伏柵下黎明奮擊大破之嵗大旱道通移咨江浙行省借米數十萬石鹽數十萬引約三日人糴官米一斗入昏鈔二貫又三日買官鹽十斤入昏鈔二貫民皆便之十八年陳友諒攻江西道通退保撫州歎曰吾為大臣城陷不守復何面目見人乎遂死之道通舊作道童布延布哈舊作普顔不花今俱改正額琳沁巴勒西夏人至正十二年移江西行省左丞時妖寇由蘄黃陷饒州饒之安仁與隆興接境民皆相延為亂額琳沁巴勒道出安仁駐兵招之來者厚加賞賚不從者攻之餘干久為盜區亦聞風順服威聲大振所在羣盜咸謀歸款以疾卒於官所部為之喪氣額琳沁巴勒舊作亦憐真班今改正都哩布哈蒙古人陳友諒陷江南詔拜江西行省平章政事與阿爾和碩等分道進討遂泛海南下趨廣東駐師揭陽降土寇金元祐由海嶺圖江西會元祐叛變起倉卒都哩布哈與參政楊泰元拒戰為槍所中創甚其子達蘭布哈率麾下力抗死之都哩布哈被執擁至太平橋罵不絶口遂為賊殺其妻布延氏妾高麗氏皆遇害部將哈竒爾布延阿拉克布哈迪延布哈等俱戰死都哩布哈舊作朵里不花阿爾和碩舊作阿里渾沙達蘭布哈舊作達蘭不花布延氏舊作卜顔氏哈竒爾舊作哈乞布延舊作吳普顔阿拉克布哈舊作阿刺不花迪延布哈舊作歹不花今俱改正明鄧愈虹人太祖取江西以愈為行省參政守之陳友諒寇南昌愈固守三月太祖親征解圍使率兵徇江西未附州縣與常遇春悉平沙坑麻嶺諸寨進取吉安克贛州諸路悉下進江西右丞愈持軍嚴肅卒有虜掠立斬以徇軍中所得子女盡遣還其家民大悅趙德勝濠人洪武初為統兵元帥與朱文正鄧愈守南昌平羅友賢破漢將復臨江吉安撫州及陳友諒大舉圍南昌晝夜攻城德勝率諸將死戰為流矢所中遂死黃彬江夏人從歐普祥攻陷袁吉勸普祥納款太祖至龍興令普祥守袁而以彬為江西行省參政普祥故殘暴彬盡反其所為民甚安之陶安當塗人洪武初為江西行省參政諭曰江西上遊地撫綏莫如卿至江西政績益著韓宜可山陰人洪武初出為江西按察使僉事時官吏犯笞罪以上悉謫屯鳳陽多至萬計宜可請分别論遣又極論罪人不當沒妻孥為奴婢皆報可劉辰金華人永樂初遷江西布政司左參政奏蠲九郡荒田糧嵗飢勸富民貸飢者蠲其徭役以為之息官為立劵期年而償辰居官廉勤以與同官數爭坐免顧佐太康人永樂初遷江西按察副使剛直不撓吏民畏服邵玘蘭溪人永樂中以御史巡按江西所過人不敢犯林瑜龍巖人永樂中為江西按察使僉事升副使袁州流民為寇殱其魁撫定餘黨居江西二十餘年及去民爭挽留之于謙錢唐人宣德初授御史出按江西雪冤囚數百人賈諒嶧人宣德五年以右副都御史巡視江西按治豪強不少假石璞臨漳人英宗初年出為江西按察使坐逸囚降副使善斷疑獄民娶婦三日歸寧失之婦翁訟壻殺女誣服論死璞禱於神夢神示以麥字璞曰麥者兩人夾一人也比明械囚趣行刑囚未出一童子窺門屏間捕入則道士徒也叱曰爾師令爾偵事乎童子首實果二道士匿婦稿麥中立捕論如法在江西數年風紀整肅雖婦豎無不知石憲使者夏時錢塘人正統初為江西僉事奏守令多刻刑無辜傷和干紀乞令御史按察遍閲罪囚釋冤滯逮按枉法官吏從之遷參議奏恤民六事多議行王翺鹽山人正統𥘉以右僉都御史鎮江西懲貪抑姦吏民畏愛楊安歙人正統中閩浙盜起安以刑部侍郎出鎮江西賊至輒擊敗之暇則詢民瘼士民嚮服韓雍長洲人正統中以御史巡按江西黜會墨吏五十七人廬陵泰和盜起設伏捕誅之景泰二年巡撫江西嵗飢奏免秋糧請宋文天祥謝枋得諡首行均徭嵗辦法民皆便之原傑陽城人正統中以御史巡按江西捕誅劇盜姦宄斂迹景泰時擢江西按察使發寧王奠培淫亂事革其護衛治行聞賜詔旌異成化中江西盜起以傑嘗再蒞其地得民詔往治之捕戮六百餘人餘悉解散夏塤天台人天順初以御史清軍江西發鎮守中官葉達恣橫狀達為斂迹纍遷江右左布政崔恭廣宗人景泰中厯江西左布政使有廣濟庫官吏乾沒五十萬恭白於巡撫韓雍典守者咸獲罪定均䍃法酌輕重十年一役遂為定例寧王奠培不法恭劾之削其護衛王稍戢王恕三原人天順四年遷江西右布政使平嶺寇贛州陳選臨海人天順中以御史巡按江西盡黜貪殘吏時人語曰前有韓雍後有陳選廣寇流入贛州奏聞不待報遣兵平之夏寅華亭人成化初為江西副使堤督學校其教務先德行士經激勸者多為聞人林鶚浙江太平人成化初遷江西按察使讞獄必麗情法不妄徇人有犯大辟賄達官求生者鶚持之愈堅廣東寇剽贛州急調兵禦之遁走廣信妖賊妄稱天神惑衆捕戮其魁立解散厯左右布政使嵗飢奏減民租十五萬石趙敔武進人成化三年以御史出按江西值南昌諸府大飢盡心賑救奏蠲逋賦免鹽鈔停運一年以所徵米十九萬石留賑民賴以濟敔周知利弊吏民畏愛當代去民上章乞留就遷按察使夏時正仁和人成化六年以南京大理寺卿巡視江西災傷除無名稅十餘萬石汰諸冗役數萬奏罷不職吏二百餘人增築南昌濱江隄及豐城諸縣陂岸民賴其利閔圭烏程人成化中以右僉都御史巡撫南贛諸府多盜率強宗家僕圭請獲盜連坐其主尹直輩謀之李孜省取中旨責圭不能弭盜左遷廣西按察使楊守隨鄞人成化中授御史巡按江西所至以風采見憚楊守隅守隨從弟厯官江西參政有政績寧府祿米石徵銀一兩後漸增十之五守隅入請於王裁減如舊邵寶無錫人宏治七年遷江西提學副使廣白鹿書院學舍以來學者其教以致知力行為本江西俗好陰陽家言有親死數十年不葬者寶下令親未葬不得試於是舉葬者千計宸濠索詩文峻却之後宸濠敗有司校勘獨無寶迹林俊莆田人宏治中以右僉都御史督操江江西新昌民王武為盜巡撫韓邦問不能靖命俊巡視俊榜賊許自新而身入武巢武驚率衆出迎請自效賊黨悉就擒詔即以俊代邦問乃更定要約均糧平役立義學義倉義冢庶務一新王府徵歲祿率倍取於民以俊言大減省宸濠貪暴俊屢裁抑之王怒伺其過無所得尋以憂去王哲吳江人宏治中以御史巡按江西時大旱親録罪囚出數百人翼日雨嵗大稔有大家被盜誣其怨家賂鎮守論死哲訊釋之後果得真盜民為之謡曰江西有一哲六月飛霜雪天下有十哲太平無休歇吳一貫海陽人正德初遷江西副使討華林賊有功進按察使行軍至奉新卒士民立忠節祠祀焉蔡清晉江人正德初為江西提學副使取士先德行而後文藝宸濠驕恣凡朔望諸司先朝王後謁文廟清不可先文廟而後王王生辰令諸司朝服賀清曰非禮也去蔽膝而入王求復護衛已得請清有後言王怒欲誣以詆毁詔旨遂引疾去陳金武昌人正德六年江西盜起詔金以左都御史總制軍務許便宜從事時撫州則東鄉賊王鈺五等南昌則姚源賊汪澄二等瑞州則華林賊羅光權陳福一等而贛州大帽山賊何積欽等又起官兵數年不能克金以屬郡兵不足用奏調廣西狼土兵遂進兵東鄉移師姚源華林又擊大帽山賊半歲間俘斬殆盡即於東鄉立縣並立萬年縣以降人居之俞諫桐廬人宏治中厯江西參政議平大帽山賊鍾志高正德八年姚源降賊王浩八叛諌以右副都御史代陳金督諸軍剿平之又討擒東鄉萬年餘賊亂乃定命兼巡撫凡臨川新淦諸賊悉就擒劇賊徐九齡者出沒江湖間積三十年諸郡咸被其害諫討斬之羣盜悉平周南縉雲人正德中以右副都御史督南贛軍務南贛巡撫之設自南始汀州大帽山賊張時旺等聚衆稱王攻剽城邑延及江西廣東之境官軍討之輒敗南集諸道兵擊之於龍牙擒時旺等先後斬獲五千人復移師會總督陳金共平姚源諸賊境內遂安吳廷舉梧州人正德中擢江西右參政敗華林賊於連河從陳金大破姚源賊其黨走裴源復從俞諌破之賊首浩三既撫復叛廷舉往諭為所執居三月盡得其要領誘使攜二及廷舉得還賊果內亂遂擒之周憲安陸人正德中為江西副使華林馬腦賊方熾憲督兵進剿先後斬獲千計進逼華林移檄會師夾擊諸將多觀望憲攻北門與子幹先登賊下木石如雨軍潰憲中槍幹前救之力戰墮崖死憲被執大罵為賊支解贈按察使諡節愍旌幹門曰孝烈張嵿蕭山人正德中擢江西參政進右布政使舉行卓異遷左宸濠欲拓地廣其居嵿執不可宸濠大恚使人餽之發視則棗梨薑芥也未幾吕為光祿卿李夢陽慶陽人正德中為江西提學副使振作士氣風教大行胡世安仁和人正德中遷江西副使與都御史俞諫畫䇿討平王浩八以暇城廣昌南豐新城三縣寇警益稀時宸濠有異志人莫敢言世安上疏發其驕橫狀宸濠大怒列世安罪遍賂權幸必殺之逮捕下獄謪戍瀋陽鄭嶽莆田人正德時為江西按察使就遷左布政使數與宸濠忤被誣奪官世宗初擢右副都御史巡撫江西歲飢發廩賑貸奏以公帑一十二萬兩代民輸京師民深德之范輅桂陽人正德中以御史清軍江西宸濠寵伶人秦榮僭擬如王居輅劾治之又極論鎮守太監畢真罪條其貪虐十五事宸濠令諸司以朝服見輅不可抗章爭之廷議如輅言宸濠既怨輅而真銜之次骨托他事誣之逮下詔獄謫龍州宣撫司經厯嘉靖初厯江西副使右布政使孫燧餘姚人正德十年以右副都御史巡撫江西宸濠有逆謀燧遣妻子還鄉止攜二童入南昌時南昌洶洶左右皆為宸濠耳目燧防察甚密託禦他寇曲為備先城進賢次城南康瑞州以建昌縣多盜割置安義縣以弭之請復饒撫二州兵備九江當湖衝最要害請重兵備道權以便控制廣信橫峯青山諸窯地險人悍請復通判駐弋陽又恐宸濠劫兵器假討賊盡出之他所於是密疏宸濠必反章七上輒為宸濠遮獲不得達會宸濠生日宴諸司伏兵縛燧斷左臂罵不絶口與副使許逵同遇害是日天陰慘烈風驟起尸上常有黑雲蔽之蠅蚋無敢近者贈禮部尚書諡忠烈與逵並祠南昌賜額旌忠許逵固始人正德中為江西副使時宸濠橫甚逵每繫其黨繩以法巡撫孫燧知其忠勇每事與密議及宸濠反縛燧逵爭之宸濠素忌逵問許副使何言曰副使惟赤心耳肯從汝反乎宸濠怒遂並縛逵曳出斫其頸屹不動賊衆共推抑令跪卒不可得遂死世宗即位贈左副都御史諡忠節黃宏鄞人正德中為江西左參議按湖西嶺北二道王守仁討橫水桶岡賊宏主餉賊閔念四既降復恃宸濠勢剽九江宏發兵捕之走匿濠祖墓中盡得其輜重以歸宸濠反被執宏憤怒以手梏向柱蹙項卒贈太常卿又馬思聰莆田人督糧江西宸濠反被執不屈絶食六日死贈光祿少卿俱祀旌忠祠王守仁餘姚人正德十一年擢右僉都御史巡撫南贛時盜賊蜂起攻剽郡縣守仁至檄閩廣會兵先破大帽山賊進兵大庾討橫水左溪桶岡諸賊悉破之設崇義縣於橫水以控諸猺還討浰頭連破上中下三浰擒殺無遺乃於下浰立和平縣置戍而歸自是境內大定十四年六月奉命勘福建叛軍行至豐城聞宸濠反即趨吉安起兵勤王宸濠襲下九江南康出大江攻安慶守仁率衆直搗南昌宸濠聞南昌破自安慶還兵再戰皆大敗遂就擒凡三十五日而賊平時帝已親征自稱威武大將軍命安邊伯許泰太監張忠將京軍赴南昌諸嬖幸欲令縱宸濠待帝自擒守仁先俘宸濠至錢塘付太監張永以獻忠泰不得已班師當是時微守仁東南事幾殆嘉靖初論功封新建伯唐龍蘭溪人正德中以御史巡按江西宸濠已擒張忠許泰率京軍駐南失額罪小殃民罪大嚴嵩秉政親黨多強奪民田太初治之不少貸鄭世威長樂人嘉靖中為江西副使嚴嵩柄國其族黨有犯者世威抵以重法副使熊楫抑買廢寺田千頃世威估平直鬻田以賑飢民楫持嵩書屬之不聽汪一中歙人嘉靖中遷江西副使鄰境賊薄太和一中列陳拒之賊至左右軍皆潰一中躍馬當賊鋒與指揮王應鵬千户唐鼎皆死之贈光祿卿諡忠愍王宗沐臨海人嘉靖中厯江西提學副使修白鹿書院引諸生講習其中胡松滁州人嘉靖中以右副都御史巡撫江西時所部多盜州縣殘破松悉心經畫奏設南昌南豐萬安三營遣將討捕以次削平會討廣東巨寇張璉及援閩破倭皆有功俞大猷晉江人嘉靖四十年為南贛參將時廣東饒平賊張連數攻陷城邑積年不能平詔大猷合閩廣兵討之大猷以潛師搗其巢執連等散餘黨二萬不戮一人擢副總兵協守南贛汀漳惠潮諸郡乘勝征程鄉盜平之李佑貴州清平衛人嘉靖中為江西副使程鄉賊溫鑑梁輝等奔瑞金佑邀擊之三戰皆捷又敗廣東賊吳志高下厯賊賴清規進右參政與總兵官俞大猷大破劇賊李亞元擢僉都御史巡撫江西周如斗餘姚人嘉靖末以右都御史巡撫江西知民困更徭創行一條鞭法躬自校勘積勞得疾浹嵗而卒其所創法後遍行之天下公私稱便吳百朋義烏人嘉靖末巡撫南贛討平河源賊李亞元程鄉賊葉丹樓兵威大振先是三巢賊據下厯高砂岑岡積十年廣東和平龍川興寧江西龍南信豐安遠咸受其害而下厯賊賴清規尤桀黠百朋籌兵食選練將卒擒清規於苦竹嶂羣賊震懾改設定南縣境內以安劉光濟江隂人隆慶初巡撫江西先是周如斗議一條鞭法未就而卒光濟鋭意奏行自是徭役之困永除張翀柳州人隆慶二年以右僉都御史巡撫南贛南椎劇盜黃朝祖流劫諸縣尋徙湖廣勢甚熾翀討平之陳有年餘姚人萬厯中以右僉都御史巡撫江西尚方所需陶器多竒巧難成後有詔許量減既而如故有年引詔旨請乃免十之三南畿浙江大祲詔禁鄰境閉糴商舟皆集江西而江西亦嵗儉有年疏陳濟急六事中請稍弛前禁令江西民得自救坐違詔奪職陸萬垓平湖人萬厯中以右僉都御史巡撫江西行社倉法貯穀千萬石嵗祲發賑全活甚多濱江墟壞令有司以時修築居官寬易不苛及卒民為立祠朱鴻謨益都人萬厯中以御史巡撫江西奏蠲水災賦請減饒州磁器又疏薦建言削籍者忤旨奪俸謝杰長樂人萬厯中以右副都御史巡撫南贛屬吏被薦者多賄謝杰曰賄而後薦干戈之盜薦而後賄衣冠之盜人以為名言王佐鄞人萬厯中為南昌知府以節儉先僚屬鋤強扶弱興學校浚河渠甚有聲厯提學副使督糧參政按察使右布政使並在江西後由廣東左布政復升巡撫民聞其來皆喜寇盜頓息稅使潘相李道為民害佐以利害諭相使自請減稅五千而劾道為民害得撤還歲大水設䇿賑救民困為蘇所在祠祀焉吳達可宜興人萬厯中以御史巡按江西稅使潘相毆折輔國將軍謀圮肢並繫宗人宗達誣以劫課又劾上饒知縣李鴻主使帝切青謀圯等奪鴻官達可言宗人無故受刑將使天潢人人自危鴻無辜不當黜願亟正相罪弗聽相又請開銅塘山采大木鑿泰和斌姥山石膏達可復極言不可閣臣亦爭之乃寢葛寅亮錢塘人萬厯中為九江兵備湖口稅監李道擾民寅亮至痛繩其下執首惡論罪分謹守者百餘人為二番更聽約束虐𦦨為息嵗飢遣官告糴湖襄以平價糶創陽明書院選諸生肄業其中置社學以教貧民子弟築隄建橋設西城閘蓄水以制火患政績甚著方大美桐城人萬厯中巡按江西抗稅監飭吏治尤加意士風造就甚衆蔡懋德崑山人崇禎初為江西提學副使頒王守仁拔本塞源論於諸生自著管見臆説數千言發明良知之學士多興起解學龍揚州興化人崇禎五年以右僉都御史巡撫江西疏言所部州縣官七十人坐逋賦降罰者至九十人由數歲之逋責於一嵗數人之逋責於一人終無及額之日也請别新舊酌多寡立帶徵之法報可四方賊盜蜂起江西獨無重兵學龍以為言詔增置千人都昌萍鄉盜發討平之封山妖賊張普薇等橫行合閩兵剿滅之林日瑞詔安人崇禎中為江西右參政分守湖東鉛山界閩妖人聚山中謀不軌圍鉛山日瑞擊敗之搗其巢侯洞曾嘉定人崇禎中遷江西提學參政益王勢方熾嵗試黜兩宗生王怒使人誚讓洞曾不為動江右頌其公明謂數十年所未有王養正泗州人福王時為副使分巡建昌大兵下江西列城望風潰養正與布政夏萬亨知府王域推官劉允浩起兵拒守城破被執械至武昌死之乾隆四十一年俱賜諡烈愍夏萬亨崑山人為江西布政使大兵至南昌失守避建昌與王養正同被執死之乾隆四十一年賜諡烈愍彭期生海鹽人官湖西兵備道與楊廷麟萬元吉同守贛州城破冠帶自縊死乾隆四十一年賜期生諡節愍廷麟元吉均諡忠節本朝金震出江陵人順治三年分守嶺北道時大兵甫定贛州居民十無一二震出加意撫綏禁止兵卒拷詰財物釋歸難婦出已資瘞埋露骸虔民至今頌之劉武元漢軍鑲紅旗人順治四年巡撫南贛時下贛禆將二十餘人皆桀驁武元申明令甲俾嚴輯部伍殘黎漸次安集五年提督金聲桓副將王得仁反攻圍贛州武元與總兵胡有升堅守數月民無叛志會援兵至聲桓退走出竒師襲其後敗之於大湖港李成棟自廣東擁衆來攻武元密遣將出其不意擊之斬首萬計成棟遂潰分遣諸將擊諸郡餘賊皆平之張鳳儀漢軍正白旗人順治四年分巡嶺北全聲桓圍贛與巡撫劉武元總兵胡有升竭力守禦城中糧匱諸將或言老弱徒糜軍食不若殺之并食固守鳳儀曰諸君欲反耶凡守土以為民也王者之師攻城猶不敢妄殺况守城而屠我民乎武元是其言未幾援至一郡獲全蔡士英漢軍正白旗人順治九年以右副都御史巡撫江西勘實荒田請免逋賦五十八萬有奇缺丁五十九萬有奇又請減瑞州浮糧十萬餘石袁州糧率每畝浮一斗六升有奇士英請減之視新喻九斗三合為定額以蘇積困疏上皆報可郎廷佐漢軍鑲黃旗人順治十一年巡撫江西一切秕政釐剔務盡未期年境內大治尋擢兩江總督佟國器漢軍正藍旗人順治十二年巡撫南贛劇賊曾拱辰據興國之梅窖坑剽掠吉贛二郡國器遣將討平之長寧黃鄉賊楊興再叛據大帽山國器殱其渠魁招安餘衆又平寧化白扇坑三村黃素禾諸盜由是江廣閩楚之賊略盡先是贛州漕米輸南昌而贛州兵食又自南昌撥運舟行灘險人病轉輸國器疏請留贛漕以給鎮兵即以南昌饋贛之米抵漕兵民兩便時重兵駐贛日久議興屯田佐軍食國器曰政貴因地制宜屯於贛無益遂罷之許世昌漢軍正紅旗人順治十四年巡撫江西廉平不苛釐軍屯辨冤獄聲績甚著湯斌睢州人順治十六年為嶺北參政海寇鄭成功犯江寧遣諜至贛斌捕得立斬之大盜李玉廷聚衆萬餘斌諭降之甫約而海警至斌謂巡撫蘇宏祖曰玉廷詐降非心服也度必變變必先窺南安南安城空無兵宜亟往守之既設備賊果至遂擒滅之平南軍過南安殺人有司以鬭殺論斌曰力侔者謂之鬬軍無寸傷而民以兵死與律不應卒抵軍於法施閏章宣城人順治十八年為江西參議分守湖西重建袁州昌黎書院及吉安白鷺書院以課諸生愛民禮士崇奬風教遠近為之興起劉楗大城人康熙九年為江西布政使嵗祲南康九江九甚楗親往散賑全活甚衆前此皆私收帑藏羡餘至是屏不納十三年入覲疏請蠲南昌浮賦明年升太常卿在道聞江西寇亂疾驅而返時人心恟懼見楗至歡呼迎馬首即日仍視事調兵籌餉悉心經畫卒賴以安李光座祥符人康熙十二年為江西按察使值吳三桂叛郡邑煽動上變者多株引無辜為姦利光座廉得其狀擲主名者置於理所全活不可勝計故事對簿訖獄詞皆具於掾吏光座綜次爰書一皆手勘必求無憾乃已以疾卒於官哲爾肯漢軍鑲紅旗人暢曉軍務以世職授贛南總兵時耿逆黨踞會昌雩都以計襲破之又大破吳逆兵於吉安收復萬安泰和二縣通江西餉道王繼文漢軍鑲紅旗人康熙中分巡饒南九道時遣部員清丈蘆洲頗作威福繼文日單騎走烈日中陰為調劑多所寬減民感悅白色純漢軍鑲紅旗人康熙十三年巡撫江西時閩粵煽亂南贛騷動賊得民率割其辮我兵遇輒戮之由是民陷賊者不敢自拔又賊多營城外百姓不得逸出兵至賊先散走顧以民為賊俘其妻女民益駭色純時駐贛州愀然曰民其胥化為賊矣上疏請除其禁得報可民脫身歸者相屬賊勢遂孤甫一嵗卒於官士民為之痛哭高璜漢軍鑲黃旗人康熙二十一年任江西提學道時文風卑靡璜力振起之即以江西先正陳羅章艾之文砥切諸生風氣為之丕變捐俸修南昌府學及郡邑學之廢壞者善政甚多士民立碑祀之宋犖商邱人康熙二十七年巡撫江西時湖廣兵亂江西民有與賊應者人情恟恟犖聞命星馳赴任密訪通賊者置之法全省乃安劉蔭樞韓城人康熙丙辰進士三十八年分巡南贛道冰蘖自矢鋤豪強抑奢華贛俗為之大變舊有牙帖銀協濟定南頗為民纍蔭樞計嵗入置田以租充額牙稅永除修鬱孤臺建講堂尊經閣於山下以課士人稱頌焉李基和奉天鑲紅旗人康熙四十三年由湖北布政使升江西巡撫時方大祲基和在武昌聞命之下豫貸藩庫銀過湖口遇賈艘載粟下江即買之又邀之轉左蠡入南昌米價頓平乃以所買粟遍發諸郡煮粥以賑飢者於是剗積弊禁耗羡平鹽價數月中善政具舉劉炎陽穀人康熙中為江西提學副使杜絶私請以實學敦行朂勉諸生各郡文廟禮器樂舞缺略者修舉之秩滿去幾不能治裝白潢漢軍鑲白旗人康熙五十六年巡撫江西革陋規禁耗羡除弊蘇困善政具修湖口榷關商船候驗者多苦暴風潢請於武曲港濬塘築隄令船