body:
  text: 戰國屬楚秦屬九江郡漢初置豫章郡屬長沙國按漢書高帝紀四年立黥布為淮南王布傳豫章屬焉又高帝紀五年以長沙豫章等郡立番君芮為長沙王紀傳不同其先後分割之故不可考元封中屬揚州部刺史後漢因之三國屬吳後漢興平元年分置廬陵郡建安十五年分置鄱陽郡孫亮太平二年置臨川郡孫皓寶鼎二年置安成郡晉初亦隸揚州太康三年增置南康郡元康元年分揚荆二州地置江州晉書地理志割揚州之豫章鄱陽廬陵臨川南康建安晉安荆州之武昌桂陽安成十郡因江水之名置江州永興元年又分置尋陽郡按十郡中建安晉安二郡今屬福建武昌桂陽二郡今屬湖廣初治豫章後治武昌咸康六年徙治尋陽按宋書州郡志江州初治豫章咸康六年移治尋陽參考王敦溫嶠諸傳江州皆治武昌李吉甫元和郡縣志云元帝時江州自豫章移理武昌自後或理湓城或理尋陽宋齊以後因之按梁大寶元年以豫章置豫州承聖二年以鄱陽置吳州太平元年分江州之巴山臨川安成豫章四郡置高州二年又移江州治豫章以尋陽置西江州臨川置寧州新吳置南江州之類不可勝紀然皆不久廢省不為經制隋平陳置洪州總管府及江饒撫吉虔袁等州大業初府廢復為豫章九江鄱陽臨川廬陵南康宜春七郡唐武德初改諸郡為州復置洪州總管府貞觀初屬江南道開元二十一年分為江南西道初置採訪使後改觀察領洪饒虔吉江袁信撫八州咸通六年置鎮南軍節度使唐書方鎮表乾元元年置洪吉都防禦團練觀察處置使兼莫徭軍使治洪州廣德二年更號江南西道都防禦團練觀察使建中四年升為節度使貞元元年廢節度復置都團練觀察使咸通六年升為鎮南軍節度使乾符六年又廢為江南西道觀察使龍紀元年復升鎮南軍節度使五代初屬楊吳後屬南唐保大中增置筠州交泰初建南都宋置江諒所據明初討平之洪武九年置江西等處承宣布政使司治南昌府本朝因之為江西省乾隆十九年升贛州府之寧都縣為直隸州領府十三直隸州一南昌府饒州府廣信府南康府九江府建昌府撫州府臨江府瑞州府袁州府吉安府贛州府南安府寧都直隸州形勢東通浙閩廣信府東境接浙江衢州府界南境接福建建寧府界建昌贛州亦與閩之邵武汀州接界南盡大庾在南安府南過嶺即廣東南雄州界西連荆楚九江南昌袁州吉安南安諸郡皆與湖廣接界北至大江大江橫亘九江府北廣二十里江之北岸西入湖廣黃蘄東接安徽安慶其名山則有廬山在南康府北九江府南西山在南昌府西懷玉山在廣信府玉山縣北其大川則有九江即九江府北之大江自湖廣興國州東流百二十里經潯陽驛又百七十里入安徽望江縣界亦名潯陽江贛水因章貢二水合流而名自贛州府城北會流北注經吉安臨江南昌三府匯鄱陽湖出湖口縣西入大江鄱陽湖即彭蠡湖在南昌府東北百五十里饒州府西四十里南康府東五里九江府東南九十里重險則有梅關在大庾嶺湖口在湖口縣文職官巡撫駐南昌府兼提督銜舊有鹽政乾隆四十三年裁提督學政駐南昌府布政使經厯理問庫大使廣濟按察使總理驛務經厯兼管驛鹽庫務知事兼管南浦驛司獄督糧道駐南昌府兼巡南撫建三府庫大使廣裕鹽法道駐南昌府管理全省鹽法統轄瑞袁臨三府分巡廣饒九南兵備道駐九江府兼管水利事分巡吉南贛寧兵備道駐贛州府督理贛關稅務兼管水利事南昌府知府同知二員督捕一員駐府城水利一員雍正七年由南康府移駐吳城鎮乾隆三十年改屬通判府學教授訓導經厯照磨兼管司獄事知州義寧舊為寧州嘉慶六年改州同駐渣津州判州學學正訓導吏目巡檢二員一駐八疊嶺一駐排埠塘知縣七員南昌新建豐城進賢奉新靖安武寧縣丞七員南昌新建豐城進賢奉新靖安駐縣城武寧駐木高縣學教諭七員訓導七員主簿二員南昌駐三江口新建駐吳城鎮巡檢六員南昌屬市汊新建屬生米渡豐城屬大江口進賢屬㙁莊奉新屬羅坊武寧屬高坪典史七員饒州府知府同知駐景德鎮通判府學教授訓導經厯照磨知縣七員鄱陽餘干樂平浮梁德興安仁萬年縣丞七員鄱陽樂平浮梁德興萬年俱駐縣城餘干駐瑞洪安仁舊駐縣城嘉慶十六年移駐鄧埠市縣學教諭七員訓導七員巡檢四員鄱陽屬石門浮梁屬景德鎮德興屬白沙萬年屬石頭街典史七員廣信府知府同知舊駐府城乾隆三十六年移駐河口鎮通判府學教授訓導經厯照磨知縣七員上饒玉山弋陽貴溪鉛山廣豐興安縣丞六員上饒玉山鉛山廣豐駐縣城弋陽駐西鄉大橋貴溪駐江滸山縣學教諭七員訓導七員巡檢七員上饒屬鄭家坊八房場玉山屬太平橋貴溪屬上清鎮鷹潭鎮鉛山屬湖坊鎮廣豐屬洋口典史七員南康府知府通判舊有同知乾隆三十年裁府學教授訓導經厯知縣四員星子都昌建昌安義縣丞三員建昌安義駐縣城都昌駐張嶺縣學教諭四員訓導四員巡檢三員星子屬青山渚溪都昌屬周溪典史四員九江府知府同知通判乾隆三十八年由瑞州府改屬府學教授訓導經厯照磨知縣五員德化德安瑞昌湖口彭澤縣學教諭五員訓導五員巡檢五員德化屬大姑塘小池口城子鎮瑞昌屬肇陳口彭澤屬馬當鎮典史五員驛丞德化屬通遠兼巡檢建昌府知府同知通判府學教授訓導經厯舊有照磨乾隆四十三年裁知縣五員南城新城南豐廣昌瀘溪縣丞四員南城新城南豐瀘溪俱屬縣城縣學教諭五員訓導五員巡檢六員南城屬新豐新城屬極高同安南豐屬龍池羅坊廣昌屬白水鎮典史五員撫州府知府通判府學教授訓導經厯照磨知縣六員臨川金溪崇仁宜黃樂安東鄉縣丞四員臨川東鄉駐縣城金溪駐許灣崇仁駐南城