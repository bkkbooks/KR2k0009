秩滿縣三百餘人詣闕請留敕許焉陳王勱臨沂人梁武帝時位晉陵太守時兵飢之後郡中雕弊勱為政清簡吏人便安之太建初東境大水勱復為晉陵太守在郡甚有威惠郡人表請立碑頌政德詔許之孔奐山陰人永定三年除晉陵太守清白自守妻子並不之官惟以單船臨郡所得秩俸隨即分贍孤寡郡中號為神君王猛臨沂人宣帝立遷晉陵太守威惠兼舉姦盜屏迹郡人歌之以比漢之趙廣漢唐李元道鄭州人貞觀中厯常州刺史風績清簡下詔褒美姚崇硤石人神龍時厯常州刺史嚴挺之華隂人調義興尉號才吏姚崇為州刺史異之李栖筠趙人肅宗時出為常州刺史歲旱死徙踵路栖筠為浚渠通江流灌田遂大稔宿賊張度保陽羡西山纍年吏討不克至是發卒捕斬支黨皆盡里無吠狗乃大起學校堂上畫孝友傳示諸生為鄉飲酒禮登歌降飲人人知勸為刻石頌德獨孤及洛陽人代宗時徙常州刺史甘露降其庭孟簡平昌人元和中出為常州刺史州有孟瀆久淤閼簡治導溉田凡四千頃五代南唐陸昭符常州刺史吳越時城邑荒殘昭符為政寬簡遂富實一日坐廳事電光如金蛇繞案吏卒皆震仆昭符撫案叱之雷電頓止得鐵索重數百斤命置之庫中李處厚義興令從王茂章為軍鋒與後梁苦戰被執瞑目大罵遂𬒳害宋馬亮合肥人至道中通判常州吏民有因緣亡失官錢籍其資猶不足償妻子連逮至數百人亮縱去緩與之期不踰月盡輸所負羅處約使江東以亮治行聞擢知濮州李若谷豐人景德中知宜興縣官市湖洑茶歲約户稅為多少率取足貧下若谷始置籍備勾檢茶惡者舊沒官若谷使歸之民許轉貿以償其數崔立鄢陵人真宗時知江隂軍屬縣冇利港久廢立教民濬治既成溉田數千頃又開橫河六十里通運漕吳遵路丹陽人仁宗𥘉知常州嘗預市米吳中以備歲儉已而果大乏食民賴以濟自他州流至者亦十全八九王罕華陽人寶元初知宜興縣縣有湖田歲訴水輕重失其平罕躬至田處列高下為圖明年訴牒至按圖示之某户可免某户不可免衆皆服范仲淹在潤奏下其式於諸道西方用兵科箭羽於東南價踊貴罕白郡守倍其直市之而令民輸錢旁州聞之皆願如常州法許恢慶厯中知晉陵勤恤民隱濬申港戚墅竈子三港以資灌溉司馬旦洓水人嘉祐中知宜興縣俗多嚚訟旦痛繩之民稍以詆冒為恥長橋圯勸民修治不勞而成阮洪嘉祐間宜興縣尉深明水利時邑苦潦洪屢上書監司乞開百瀆得允遂疏導四十九瀆民賴其利徐的建安人通判常州屬歲飢出米為糜粥以食餓者陳襄侯官人英宗時知常州運渠橫遏震澤積水不得北入江為常蘇二州病襄度渠之丈尺與民田步畝定其數授以浚法未幾遂削望亭古堰水不復積賈易無為人調常州司法參軍自以儒者不嫻法令歲議獄惟求合於人情曰人情所在法亦在焉訖去郡中稱平郭申錫魏人為晉陵尉民訴弟為人所殺申錫察其邑懼而哭不哀曰吾得賊矣非汝乎執而訊之果然于大觀中江陰丞悉心水利於黃田蔡涇諸處建上下閘又導申利二港民皆賴之楚執柔政和中江隂丞嘗治橫河市墩新河諸港使水有蓄泄田皆大稔朱倬閩縣人宣和中調宜興簿金將侵邊居民求避地倬為具舟給食衆賴以濟未幾民告潦於郡郡檄倬考實乃除田租什九守怒不能奪方允武衢州人為宜興巡檢建炎三年金人入縣之金泉鄉允武率土軍鄉民迎敵殺獲數級後遇金兵梅嶺村刀戰而殁詔贈兩官嶽飛湯隂人建炎間金烏珠攻常州宜興令迎飛移屯焉盜郭吉聞飛來遁入湖飛遣王貴傅慶追破之又遣辨士馬皋林聚盡降其衆有張威武者不從飛單騎入其營斬之避地者賴以免圖飛像祠之金人再攻常州飛四戰皆捷葉容仙遊人紹興中屬常州逋緡錢四十萬守坐免移容知常州容初至郡無旬月儲未一年餘緡錢二十萬或勸獻羡容曰名羡餘非重征則橫斂是皆民之膏血也以利易賞心實恥之葉衡金華人紹興中知常州時水潦為災衡發倉為糜以食飢者疫大作衡單騎命醫藥自隨遍問疾苦活者甚衆陳謙永嘉人孝宗時知常州開孟瀆河溉田數十萬頃歲屢豐袁燮鄞人調江陰尉浙西大飢常平使羅點屬任賑恤燮命每保畫一圖田疇山水道路悉載之而以居民分布其間凡名數治業悉書之合保為都合都為鄉合鄉為縣徴發爭訟追胥披圖可立決以此為荒政首趙彥倓宋宗室攝宜興縣縣自中興後預借民明年稅民挾此得慢其令彥倓請禁預借邑遂易治趙彥橚宋宗室慶元初知晉陵縣嵗飢彥橚賑恤有方所活幾二十萬又以羡錢為五等户代輸唐璘古田人紹定間知晉陵縣鄰州田訟至有泣訴諸使願送晉陵可否者孫子秀餘姚人理宗時檄督宜興縣圍田租既還白水災總領恚曰軍餉所關而敢若是力爭之遂免徙浙西提點刑獄兼知常州淮兵數百人浮寓貢院給餉不時死者相繼子秀請於朝創名忠衛軍置寨以居截撥上供贍之盜劫吳大椿前使者諱其事誣大椿與兄子焴爭財自劫其家子秀廉得其實悉平反之王安節德祐初劉師勇復常州以安節與張詹守常已而王良臣導元兵攻常常城素惡安節等築柵以守相拒兩月不下元丞相巴延自將攻之破其南門安節揮雙刀率死士巷戰臂傷被執降之不得乃殺之姚訔知常州入常甫十餘日元兵攻常城破死之贈龍圖閣待制阮應得知無錫縣元兵至出戰一軍皆沒應得赴水死元曹伯啓碭山人至元中遷常州路推官豪民黃甲恃財殺人賂佃客誣伏伯啓讞得其情遂坐甲殺人罪劉溶平原人為武進縣尹至正中寇陷常州官軍潰散溶獨率民兵戰於葛城南死之明楊國興定遠人太祖初以右翼元帥守宜興常州人陳保二既降復叛屢來寇國興執斬之吳良定遠人太祖初良從徐達攻克江陰即以良為指揮使守之張士誠大舉來寇良與弟楨擊敗其衆良夜宿城樓枕戈達旦訓將練兵常如寇至暇則延儒生講論新學宫立社學大開屯田均徭省賦在境十年封疆晏然太祖詣江隂勞軍周巡壁壘歎曰良吾之吳起也洪武三年封江隂侯趙泰潞城人永樂中為常州府同知有廉惠聲濬孟瀆得勝二河作魏村閘諸所興築民無言勞者周忱撫江南與況鍾議減重糧泰亦請減常州官田租莫愚臨桂人宣德中常州知府皎皎著名績張宗連吉水人宣德中謫常州同知朝遣御史李立理江南軍籍檄宗連自隨立受黠軍詞多逮平民實伍宗連數爭之宗連務廉恕見立暴橫心積不平疽發背卒民白衣送喪者千餘人為建祠君山周斌昌黎人天順時知江陰縣有德政民歌曰旱為災周公禱甘露來水為患周公禱隂雨散袁道吉水人成化中知宜興縣民苦西九之險乃鑿夾河至洴浰三十餘里舟行既便水得宣泄金洪鄞人宏治初知靖江縣時逋賦日積有田已圮而賦未除者為賦他田之新漲者以充其額又勸民墾荒墾多者得贖罪由是邑無曠工張曰韜莆田人正德中授常州推官武宗南巡江彬縱其黨橫行將抵常州曰韜兼綰府縣印召父老豪傑約曰彬黨至若等力與格又釋囚徒令與丐者各具瓦石待已彬黨果纍騎來父老遮之境上曰常州比歲災府中惟一張推官一錢不入即欲具芻秣亦無以辦彬黨稍退曰韜即上書巡按御史言狀由是常以南諸府得安曰韜力也孫顯華州人知靖江縣開七十二港以納江潮民資灌溉之利李畫林縣人嘉靖中知武進縣邑賦役款目煩冗吏緣為姦畫條列輕重使民易曉弊遂革歲大祲白巡按請行折兌民賴以安開浚後河計田徴力分六曹而籍之名曰毗陵掌故王其勤松滋人嘉靖中知無錫縣邑城久壞其勤甫下車即議修築三月城成倭寇突至登陴以守邑賴以全又丈田定賦釐剔欺隱捐無名糧數千石邑人立祠祀之趙錦餘姚人嘉靖中知江陰縣巨盜許貴出沒為患錦設䇿摛之歲飢勸民相假貸上宫行部有責供張不辦者錦從容言曰民飢且死忍復朘削之耶其人赧而罷江陰人德之為立祠丁謹澤州人嘉靖中知宜興縣明初武宜二縣額賦倍於他邑謹入覲奏請均之得旨以府屬餘米補額於是田賦就輕錢錞鍾祥人嘉靖中知江隂縣初授官倭巳熾三十三年入犯鄉民奔入城者萬計兵備道王從古不納錞曰民死不救守空城奚為遂開門縱入而身自摶戰於斜橋三戰卻之明年倭分衆犯塘頭錞提狼兵戰九里山薄暮雷雨大作伏四起錞戰死贈光祿少卿建祠致祀歐陽東鳳潛江人萬厯中知常州府布帷瓦器吏胥不能牟一錢擒姦人劇盜且盡顧憲成輩講學為建東林書院居四年謝事歸廖惟俊新建人萬厯中知靖江縣開東北河達孤山港民賴其利劉五緯萬縣人萬厯中知無錫縣案無留牘摘發如伸邑冇天授青城萬安三鄉墟田千頃遇潦皆成巨浸五緯躬率衆墟民併工挑築及成遂為沃壤甃官塘五十里邑稱為劉公塘曾櫻峽江人天啓二年知常州府持身廉為政愷悌公平不畏強禦織造中官迫行屬禮卒不屈無錫高攀龍江陰繆昌期李應升被逮櫻助昌期應升資而經紀攀龍死後事出其子及僮僕於獄宜興毛士龍坐忤魏忠賢遣戍櫻奉天人順治三年知常州府時山湖藪澤尚多伏莽一鶚悉心勞來威惠並著盜賊皆為良民崔宗泰奉天人順治十二年知常州府惠貧弱抑強豪發摘姦伏吏民驚若神明十三年征閩大兵駐郡有遊騎逐婦女二人溺死宗泰白將軍按法治之麾下肅然民得安堵鄭重建安人康熙初知靖江縣濬柏城石定等五港以資蓄泄復疏七十二支港匯灌團河吳興祚漢軍正紅旗人康熙三年知無錫縣均甲役丈田畝清漕兊時積逋甚多興祚捐資代償駱鍾麟臨安人康熙八年知常州府為政簡易近民有訟者懇惻誨諭九年大水遍歷窮鄉勸賑十年旱葛衣草履步禱日食糲飯一孟引咎自責興延陵書院尋以艱去郡人思之包括錢塘人康熙十五年進士由刑部員外郎知常州府著有政績入祀名宦祠祖進朝奉天人康熙二十三年由廕生除知常州府操持廉介蒞事愼勤其減徭輕耗興學正俗戢姦除暴息訟安民均有惠政以失察法寶一案降調民呼籲於巡撫湯斌請留斌上其事特旨開復以勸廉吏進朝由老是益自勵加意振作病乞免民懷思之不未幾以置云總纂官臣王廣蔭恭纂輯前提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校大清一統志常州府三人物漢許武陽羡人太守第五倫舉為孝廉武以二弟晏普未顯欲令成名於是割財産為三分自取肥田廣宅二弟所得並悉劣少鄉人皆稱弟克讓而鄙武貪婪晏普以此並得選舉武乃會宗親理産所增三倍悉以推二弟郡中翕然稱之位至長樂少府虞俊無錫人少以孝友稱哀帝時為御史遷丞相司直王莽召為司徒俊飲藥卒光武即位表其墓許荆武孫少為郡吏舉孝廉和帝時稍遷桂陽太守在事十二年父老稱歌以病自上徴拜諫議大夫荆孫􅖢靈帝時為太尉彭修毗陵人年十五父為盜所劫修拔刀前持盜盜相謂曰此童子義士也辭謝而去後仕郡為功曹張子林等作亂修守吳令與太守俱出討賊中流矢死賊素聞其恩信即殺中修者悉降散曰自為彭君故降高彪無錫人舉孝廉試經第一除郎中校書東觀數奏賦頌奇文因事諷諌靈帝異之後遷內黃令帝敕同僚祖於上東門詔東觀畫彪像以勸學者彪到官有德政上書薦縣人申屠蟠等卒於官子岱亦知名三國吳周魴陽羡人少好學舉孝廉厯鄱陽太守討彭綺生擒送詣武昌遣人齎箋七條誘魏大司馬曹休休信魴帥步騎十萬入皖魴合衆隨陸遜橫截休斬獲萬計事捷軍旋賜爵關內侯在郡十三年卒賞善罰惡恩威並行華核武進人以文學自典農都尉為祕府郎厯東觀令領右國史與韋曜薛瑩等並撰吳書孫晧時屢陳便宜書百餘上皆有禆益晉周處魴子膂力絶人勵志好學有文思志存義烈言必忠信仕吳為東觀左丞入洛遷新平太守厯遷御史中丞凡所糾劾不避寵戚及氐人齊萬年反朝臣惡處強直使隸夏侯駿西征軍無後繼力戰而殁贈平西將軍處著默語及風土記并撰集吳書元帝為晉王加處諡曰孝周玘處子強毅沈斷有父風名重一方舉秀才除議郎張昌陳敏錢璯反玘率合鄉里義衆俱討平之三定江南開復王略封烏程縣侯帝以玘頻興義兵勳誠並茂乃以陽羡及長城之西鄉丹陽之永世别為義興郡以彰其功焉卒諡忠烈周筵處次子靖子卓犖有才幹拜征虜將軍徐馥亂筵族兄績亦聚衆應之詔筵輕騎還陽羡殺之及王敦作難王師敗績筵聞季父札開城納敦憤叱慷慨形於辭色尋遇害顧愷之無錫人博學有才氣桓溫引為大司馬參軍義熙初為散騎常侍愷之有三絶才絶畫絶癡絶所著文集及啓矇記行於世南北朝宋華寶無錫人父豪晉義熙末戍長安寶年八歲臨别謂寶曰須我還當為汝上頭長安陷豪殁寶年至七十不婚冠或問之輒號慟彌日不忍答也同郡薛天生母遭艱菜食天生亦菜食母未免喪而死天生終身不食魚肉又同郡劉懷允與弟懷則年十歲遭父喪不衣絮帛不食鹽菜齊建元三年并表門閭蕭思話南蘭陵人父源之厯徐兖二州刺史永初元年卒贈前將軍思話有令譽襲爵封陽縣侯後拜郢州刺史加都督卒諡曰穆侯思話厯十二州仗節監督者九愛才好士人多歸之子惠開少有風氣涉獵文史雖貴戚而居服簡素丁父艱居喪有孝性襲封封陽縣侯再遷御史中丞百僚憚之尋除少府加給事中卒弟惠明亦有時譽泰始初出為吳興太守卒蔣恭義興臨津人元嘉中晉陵蔣崇平為劫見禽云與恭妻弟吳晞張為侣晞張妻息移居恭家時録晞張不獲收恭及兄協科罪恭協並款舍住晞張家口而不知劫情恭列晞張妻息是婦之親親今有罪恭身甘分求免兄協協列是戶主求免弟恭郡縣上詳州議以為並不合罪後除恭義成令協義招令許昭先義興人叔父肇之坐事繫獄七年不判昭先為料訴無日在家餉饋肇之莫非珍新無有懈怠沈演之嘉其操行事由此得釋昭先父母老病家無童役竭力致養宗黨稱之刺史辟為參軍以親老不就余齊人晉陵人少有孝行為邑書吏大明二年父殖在家病亡信未至齊人謂人曰比肉痛心煩必有異故信尋至以父病報之四百餘里一日而至方知父死號踊慟絶良久乃蘇問父所遺言母曰汝父恨不見汝齊人號呌殯所須臾便絶有司奏改其里為孝義里齊蕭嶷高帝第二子寬仁宏雅有大成之量封豫章王武帝以事失旨高帝頗有代嫡之意而嶷事武帝恭悌盡禮未嘗違忤故武帝友愛尤深高帝崩哭泣過度眼耳皆出血為政寬厚得朝野歡心進位大司馬嘗戒諸子曰凡富貴不驕奢以約失之者鮮矣薨詔喪儀一依漢東平王蒼故事諡文獻蕭鈞高帝子封衡陽王有孝行所生區貴人卒居喪盡禮尫羸骨立性好學善屬文嘗手自細寫五經為一卷置於巾箱中以便檢閲諸王聞而爭效巾箱五經自此始蕭鑑高帝第十子封始興王年八歲喪所生母哀號過成人永明中為益州刺史巴西蠻夷望風降附性甚清在蜀十年未嘗有所營造王儉嘗歎曰始興王雖尊貴而行履都是索士蕭鋒高帝第十二子封江夏王工書能屬文嘗著修柏賦以見志蕭鏗高帝第十六子封宜都王三歲喪母及有識自悲不識母常祈請幽冥求一夢見至六歲遂夢見母向左右説容貌衣服皆如平生聞者莫不欷歔蕭子良武帝第二子封竟陵王少有清尚禮才好士天下才學皆遊集焉上親視政子良啓陳寬刑息役輕賦省徭正位司徒集學士抄五經百家依皇覽例為四部要略千卷蕭子懋武帝第七子封晉安王廉讓好學七歲時母阮淑媛病篤有獻蓮花供佛者子懋流涕願花不萎七日花更鮮紅人稱孝感永明八年撰春秋例苑三十卷奏之武帝敕付祕閣延興初起兵遇害陳元子義興人建元三年大使巡行天下奏義興陳元子四世同居一百七口詔表其閭蕭睿明南蘭陵人母病風積年沈卧睿明晝夜祈禱時寒下淚為冰如筯額上叩頭血亦冰忽有一人以小石函授之曰此療夫人病睿明受之忽不見函中有三寸絹丹書日月字母服之即平復永明五年居母喪不勝哀卒吳達之義興人嫂亡無以葬自賣為十夫客以營冢槨從祖弟敬伯夫妻荒年被略賣江北達之有田十畝貨以贖之與同財共宅建元三年詔表門閭蕭惠基思話孫仕齊為都官尚書永明中遷太常加給事中立身退素朝廷稱為善士蕭文䎦蘭陵人竟陵王子良嘗夜集學士刻燭為詩四韻者則刻一寸以此為率文䎦曰頓燒一寸燭而成四韻詩何難之有乃與邱令楷江洪等共打銅鉢立韻響滅則詩成皆可觀覽蕭懿少有令譽厯晉陵太守以善政稱崔慧景入冦懿率鋭卒入援慧景衆潰追斬之授中書令時東昏肆虐舊將並見誅夷徐曜甫勸令西奔不從曰古皆有死豈有叛走中書令耶尋賜藥殞天監六年追封長沙郡王諡宣武梁蕭景武帝從父弟八歲隨父在郡居喪以毁聞及長好學才辨有識斷武帝踐祚封吳平縣侯南兖州刺史吏人畏敬如神遷都督郢州刺史卒於州蕭秀文帝第七子與同母弟始興王憺並以孝聞居母喪纍日不進飲文帝親取粥授之秀美風儀性方靜雖左右近侍非正衣冠弗之見天監元年封安成郡王厯江州荆州郢州刺史遷雍州刺史在路薨四州人裂裳為白帽哀哭以送迎之贈司空諡曰康秀於武帝布衣昆弟及為君臣小心敬畏過於疏賤者帝益以比賢之蕭偉文帝第八子天監元年封建安王有惡疾所生母陳太妃薨毁頓過禮水漿不入口纍日惡疾轉增十七年改封南平郡為中書令大司馬薨諡元襄偉性端雅持軌度少好學篤誠通恕趨賢重士常若弗及由是四方遊士當時知名者莫不畢至梁藩邸之盛無過焉而性多恩惠尤愍窮乏朝廷得失時有匡正子恪折節學問所厯以善改稱恪弟恭封衡山縣侯除雍州刺史政績有聲子靜有文才而篤志好學位給事黃門侍郎蕭恢文帝第十子七歲能通孝經論語天監元年封鄱陽郡王再遷開府儀同三司都督荆州刺史薨諡忠烈恢有孝性所生母費太妃有目疾空中忽見聖僧及道人慧龍下針豁然開朗咸謂精誠所至恢性通恕輕財好施凡厯四州所得俸祿隨而散之蕭憺文帝第十一子天監元年封始興郡王詔徴還朝人歇曰始興王人之爹赴人急如水火何時復來哺乳我後為開府儀同三司薨諡忠武子映封廣信侯居太妃憂泣血三年為北徐州刺史吏人懷之厯廣州刺史卒諡寬侯映弟昱封上黃侯名盛海內為宗室推重陳慶之義興國山人幼隨武帝甚見親賞恆思立效除奉朝請屢破魏兵以功封永興侯除南北司二州刺史加都督卒諡曰武慶之性祗慎儉素不衣紈綺不好絲竹善撫軍士能得其死力蕭子顯齊豫章王嶷子天監初為太尉録事參軍好學工屬文為沈約所稱撰齊史書成表奏詔付祕閣厯侍中吏部尚書蕭子雲子顯弟勤學有文藻性沈靜不樂仕進年三十方起家為祕書郎中大通中為臨川內史人吏悅之善草楷為時楷法官至侍中國子祭酒陳昕慶之子為臨川太守太清二年為雲騎將軍侯景渡江昕説其儀同范桃棒歸降事泄景邀得之逼昕令更射書城中云桃棒且輕將數十人先入景欲裹甲隨之昕不從遂見害蕭勵景子仕太子洗馬母憂去職殆不勝哀每一思至徒步至墓或遇風雨仆卧中路起而復前家人不能禁景薨於郢鎮勵不進水漿者七日廬於墓所親友隔絶後襲封吳平侯勵性率儉而器度寬𥙿聚書至三萬卷披玩不倦卒諡光侯弟勸少以清靜自立封西鄉侯大寶元年謀誅侯景事發遇害勸弟勔封東鄉侯及勸同見害勔弟勃封曲江鄉侯陳武禪代之際舉兵不從尋敗遇害蕭視素思話孫天監中位丹陽尹丞武帝賜錢八萬一朝散之親友性靜退好學能清言後為諸暨令十餘日挂衣冠而去獨居屏事非親戚不得至其籬門卒諡曰貞文先生蕭洽惠基子幼敏悟及長好學博涉善屬文位南徐州中從事清身率職饋遺一無所受後拜司徒左長史卒於官有文集二十卷行於世蕭琛蘭陵人少明悟有才辨梁武帝在西邸與琛有舊天監中纍遷平西長史琛頻蒞大郡不事産業特進金紫光祿大夫卒蕭業文帝長子懿子天監二年襲封長沙王厯南兖州刺史徙湘州尤著善政零陵舊有二猛獸為暴無故相枕而死郡人見猛獸旁一人曰刺史德威神明所以猛獸自斃言訖不見衆並異之業性敦篤所在留意為侍中薨諡曰元王子孝儼除祕書郎從幸華林園獻頌甚美帝深賞異之蕭藻懿子封西昌縣侯性謙退不求聞達善屬文尤好古體頻蒞州鎮大吏咸稱之侯景亂或勸奔江北藻曰吾國之台鉉正當同死朝廷耳因不食而薨蕭介南蘭陵人少穎悟有器識大同中為揚州府長史以清白稱會侍中闕帝用介為之應對左右多所匡正太清中侯景入夀陽帝納之介極言不可帝不能用介性高簡惟與諸兄弟文酒賞會時人以比謝氏烏衣之遊武帝嘗置酒賦詩介染翰便成文不加點蕭象長沙宣武王第九子衡陽宣王暢無子詔象嗣象生長深宫始親庶政舉無失德朝廷稱之遷祕書監薨蕭咨恢子位衛尉卿封武林侯簡文即位之後侯景周衛轉嚴咨不忍離帝朝覲無絶賊惡之令人刺殺於廣莫門外蕭修咨弟封宜豐侯性至孝年十一丁所生徐氏艱自荆州反葬中江遇風修抱柩長號血淚俱下終得無他葬訖廬墓次野鳥馴狎武帝嘉之以班告宗室敬帝立遙授修太尉遷太保時王室浸微修雖圖義舉力弱不能振遂發背嘔血而薨蕭嗣恢世子範子性驍果有膽略傾身養士皆得死力範薨嗣猶據晉熙城中食盡侯景遣任約攻嗣時賊方盛咸勸且止嗣曰今日之戰蕭嗣效命死節之秋也及戰遇流矢中頸帶箭手殺數人賊退氣絶陳周文育義興陽羡人本性項氏從武帝纍軍功封夀昌縣公討平蕭勃授開府儀同三司後為熊曇朗所害諡忠愍蕭摩訶蘭陵人年十三單騎出戰軍中莫有當者從侯安都拒齊軍隨吳明徹北征纍功封廉平縣侯後主初授驃騎大將軍陳亡賀行儼奮然請行為莫離支所囚以兵脅之不屈納窟室中高麗平乃得歸帝奇其節高宗時遷殿中少監數陳時政利病尋封義興縣子以太子詹事致仕卒高智周晉陵人登進士第初授越王府參軍遷費令民安其化刻石頌美入擢祕書郎拜夀州刺史治尚文雅厯黃門侍郎儀鳳初進同中書門下三品與郝處俊監蒞修國史後以散騎常侍致仕卒諡曰定劉禕之晉陵人父子翼李百藥嘗稱之曰子翼詈人人都不恨巡察使表所居為孝慈里禕之文辭華敏武后擢至中書門下三品嘗私語鳳閣舍人賈大隱曰后能廢昏立明盍反正以安天下大隱表其言后怒或告禕之罪鞫治以敕示褘之禕之曰不經鳳閣鸞臺何謂之敕后以為拒制賜死薛登義興人通貫文史善議論調閬中主簿天授中纍遷左補闕時選舉濫甚乃上疏極言為常州刺史屬宣州賊鍾大眼亂百姓潰震登嚴勒守備闔境賴安景雲中為御史大夫僧慧範怙太平公主勢登將治之或勸以自安答曰憲府直枉朝奏暮黜可矣遂劾奏反為主所搆出岐州刺史開元初再為太子賓客詔給致仕祿卒蕭嵩晉陵人父瓘為渝州長史居母喪以毀卒嵩貌偉秀姚崇稱以遠到開元初擢中書舍人俄為相封徐國公帝委嵩擇相嵩推韓休尋拜太子太師請老卒許景先義興人少舉進士詣闕獻大像閣賦擢拜左拾遺開元初與張九齡等同知制誥以文翰稱張説稱其屬辭豐美有中和之度蕭穎士晉陵人梁鄱陽王恢七世孫觀書一覽即誦通百家譜系書籀學開元中舉進士對䇿第一天寶初補祕書正字召詣史館待制李林甫見疾俄免官山南節度使源洧辟掌書記賊攻南陽洧欲退保江陵穎士説而止後授揚州功曹參軍去官穎士樂聞人善以推引後進為己任所奬目皆為名士與李華齊名世稱蕭李子存亮直有父風能文辭厯比部郎中張滂主財賦辟存留務京師裴延齡與滂不協存疾其姦去官王遇常州人至德間與弟遐俱為賊執將釋一人兄弟相讓死賊感其意乃盡釋之蕭復嵩孫廕為宫門郎厯拜吏部尚書同中書門下平章事嘗言宦者權望太重又言楊炎盧杞穢盛德𣏌對上或諂諛復厲言𣏌詞不正後廢居饒州卒復望閥高華厲名節不通狎流俗及為相臨事嚴方數咈帝意故居位亟解然性孝友既貶晏然口未嘗言所纍蕭俯嵩曽孫貞元中及進士第又以賢良方正對䇿異等拜右拾遺穆宗立進拜門下侍郎王播賂權幸求宰相俯劾播纖佞不可汚台宰帝不許自請罷移病分司東都性簡潔以聲利為汚疾邪太甚故輕去位無所籍文帝即位纍召不起以夀卒母韋賢明治家嚴俯雖宰相侍左右如褐衣時居喪哀毁既老家於洛自放山野優遊窮年蕭倣嵩曽孫太和中擢進士第除給事中時推其直懿宗引桑門人禁中倣諌以為天竺法割愛取滅非帝王所尚慕進中書侍郎再遷司空封蘭陵縣侯子廪第進士遷尚書郎為人退約少合廣明初以諫議大夫知制誥內外畏讋五代江景防常州人吳越以一隅捍四方賦稅之額加舊數倍宋平諸國定稅悉仍舊籍錢氏納土景防當上圖籍歎曰豈可使民困無巳吾以一身任之遂沈圖籍於河自劾失亡狀吳越減稅由景防為之宋張觀毗陵人太平興國中拜監察御史會三司言劒外賦稅輕詔觀按行稍增之疏言遠民不宜輕動撓因留不遣又諫罷治佛寺不報後移廣南西路轉運使卒觀廣覽漢史雅好論事辭理切直有古人之風焉杜鎬無錫人幼好學博貫經史舉明經解褐集賢校理太宗觀書祕閣詢鎬經義進對稱旨改虞部員外郎大中祥符中進秩禮部侍郎卒鎬性和易清素有懿行士類推重之杜𣏌鎬子蔭補將作監主薄厯天章閣待制𣏌性強記博覽書傳通隂陽術數之學有奏議十二卷兄植以文雅知名終少府弟樞亦強敏為比部員外郎陳思道江隂人事母兄以孝悌聞鬻醯以給晨夕母病思道衣不解帶者數月母喪既葬袞鬻醯之利奉其兄結廬墓側夏日種瓜以待過客白兔馴狎虎豹環廬而卧咸平元年詔賜束帛旌其門葛宫江隂人舉進士授中正軍書記善屬文上太平雅頌十篇真宗嘉之治平中轉工部侍郎卒宫性敦厚恤録宗黨撫孤嫠賴以存者甚衆宫弟密仕至太常博士天性恬靜年五十致仕子書思踵登第調建德主簿時密巳老欲迎之官密難之遂投劾歸養居父喪哀毁骨立終禫不忍去冢舍後至朝奉郎歸休子勝仲孫立方皆以學業至侍從世為儒家蔣堂宜興人擢進士第為楚州團練推官後以尚書禮部侍郎致仕卒堂為人清修純飾遇事毅然不屈貧而樂施好學工文辭延譽晚進至老不倦尢嗜作詩有吳門集二十卷從子之奇為部使者十二任六典會府以治辦稱胡宿晉陵人登第為揚子尉召修起居注知制誥慶厯六年京東兩河地震登萊尤甚宿兼通隂陽五行災異之學疏言恐有內盜起於河朔明年王則果以貝州叛李仲昌開六塔河民被害宿請斬以謝河北仲昌由是南竄拜樞密副使治平中以太子少師致仕薨諡文恭宿為人清謹忠實內剛外和臨事重慎不輒發發亦不可回止居母喪三年不至私室其當重任尤顧惜大體子宗炎哲宗崩遼使來弔祭宗炎以鴻臚少卿迓境上使者不易服宗炎以禮折之須其聽命乃相見從子宗愈舉進士甲科同知諫院王安石用李定為御史宗愈爭之元祐初進御史中丞哲宗嘗問朋黨之弊具君子無黨論以進遷吏部尚書卒從子宗回厯樞密直學士單鍔宜興人嘉祐進士博學志經濟著吳中水利書錢公輔武進人第進士甲科為集賢校理進知制誥英宗即位陳治平十議神宗立拜天章閣待制拂王安石意出知江寧府徙揚州改提舉崇福觀卒錢顗無錫人初為寧海軍節度推官治平末為殿中侍御史許遵議謀殺案顗以為遵所見迂執不從二年而貶將出臺於衆中責同列孫昌齡媚事王安石後徙秀州蘇軾遺以詩有烏府先生鐡作肝之句世因目為鐵肝御史袁默無錫人登進士第官司農簿獻無逸傳纍遷河北轉運判官弟點元豐乙丑進士工詩蘇軾以為有驚心駭目之奇時號二袁張􅘏常州人登進士甲科閉户著書元豐中近臣薦其高行元祐時大臣復薦之起教授潁州辭不就復詔拜祕書省校書郎敕郡縣致禮􅘏孝弟修於家忠信行於友聲名聞於人蹈中守常從容不迫為當時名流所慕徽宗時賜諡曰正素先生鄒浩晉陵人第進士調潁昌府教授哲宗親擢為右正言有請以王安石三經義發題試士者浩論其不可陜西奏邊功中外皆賀浩獨言持勝為難章惇用事浩數其不忠侵上之罪賢妃劉氏立浩請停册禮惇詆其狂妄削官徽宗立召還蔡京用事再謫嶺表稍復直龍圖閣疾作楊時省之猶眷眷以國事為問語不及私高宗時諡曰忠張守晉陵人登進士第擢監察御史建炎初議南渡守上防淮渡江利害六事權樞密院事張浚欲以吕祉往淮西撫諸軍守以為不可浚不聽遂有酈瓊之變建康謀帥上曰用大臣有德望者惟張守可至鎮數月薨蔣璨宜興人之奇從子知平江臨江二府鋤刈強梗豪黠畏之有景坡堂詩卷蔣興祖之奇孫以蔭纍調饒州司録遷知武陽縣積雨河溢興祖躬救護露宿其上四旬隄以不壞靖康初金兵攻京師道過縣或勸走避興祖曰吾世受國恩當死於是金遣騎來攻不勝去明日師益至力不敵死焉贈朝列大夫胡交修晉陵人登進士第授泰州推官進直學士院論天下大勢請修政事選將帥搜補卒乘以張國勢撫綏疲瘵以固國本朝論欲以四川交子行之諸路交修力陳其害後除端明殿學士知合州卒交修簡重寡言進止有度在詞苑為稱職事繼母以孝聞撫二弟極友愛胡唐老宿曽孫登進士第厯南京國子博士靖康元年擢殿中侍御史金人再犯京師唐老請就拜康王大元帥俾召天下兵入援又疏乞命范致虛為宣撫使節制諸路進徽猷閣待制知鎮江府潰卒戚方等欲犯臨安唐老不從遂遇害詔贈徽猷閣直學士諡忠愍胡世將唐老弟登進士第為監察御史紹興中金人入世將復隴州破岐下諸屯又取華虢兵威稍振除資政殿學士致仕卒周葵宜興人宣和中進士調徽州推官高宗時除御史在職兩月言事至三十章且厯條所行不當事凡二十條孝宗時參知政事加資政殿大學士致仕李熙靖晉陵人擢第為右司員外郎忤王黼貶秩靖康初提舉醴泉觀張邦昌使直學士院熙靖固拒憂憤廢食卒蔣芾之奇曽孫紹興中進士第二孝宗時纍遷起居郎簽書樞密院事首奏加意邊防及拔將材於行伍又採泉論參已見為籌邊志上之拜同平章事兼樞密使再提舉洞霄宮卒尤袤無錫人紹興中擢進士第為泰興令遷著作郎張説入西府袤率三館上書諫遷太常少卿南渡來恤禮散失高宗崩上下罔措每有討論悉付之光宗即位除給事中極論廢法用例之弊進禮部尚書袤少從喻樗汪應辰遊方乾道淳熙問忌程氏學者目為道學將攻之袤言此名一立賢人君子入其中俱無得免非盛世所宜有識者以為知言有遂初小藁六十卷內外制三十卷邱崈江隂軍人隆興元年進士知慶元府韓托胄議北伐崈力論金人未必敗盟中國當示大體後拜同知樞密院卒崈嘗慷慨謂人曰生無以報國死願為猛將以滅敵其忠義性然也李祥無錫人隆興進士為錢塘縣主簿厯國子祭酒丞相趙汝愚以言去國祥上疏爭之為言者所劾太學諸生上書留之俱得罪主沖佑觀再請老以直龍圖閣致仕蔣重珍無錫人嘉定中進士第一答判建康軍遷校書郎進為君難六針端平初入對上五事乞召真德秀魏了翁用之兼崇政殿説書務積精誠以悟上意每草奏齋心盛服有密啓則手書削藁帝稱其平實後官刑部侍郎致仕卒諡忠文向士璧常州人紹定五年進士纍官湖北安撫副使進直龍圖閣合州告急士璧赴援數立奇功升湖南制置副使解潭州圍進兵部侍郎賈似道疾其功誣死德祐初詔復官立廟潭州吳載堅宜興人寶祐進士授四川提刑按察使疏陳親賢遠佞選將練兵四事不報後與文天祥起兵敗歸築土室居之家人罕見其面陳照常州人登第為丹徒縣尉丁母憂歸北兵至常照率義兵戰禦自夏徂冬不能下丞相巴延自將圍其城照與姚訔固守矢盡城破訔死之照猶巷戰死焉追贈訔龍圖閣待制照直寶章閣包圭晉陵人性沈毅有籌略元兵圍常州郡守姚訔聞圭名引與共戰守城陷訔遇害圭猶斂兵巷戰被執罵賊死元王彬武進人早孤事母盡孝天厯歲旱鄉鄰絶食彬假之粟不納其券郡縣將上聞彬力乞寢陸垕江隂人幼以孝友聞至元間巴延師南下垕率其鄉人見議論有合兵遂不涉其境鄉人義之巴延奏授同知徽州路總管府事纍遷浙西廉訪使所至以黜贓吏洗冤獄為已任嘗奏免儒役及舉行浙西助役法陸文圭江隂人幼而穎悟讀書過目成誦博通經史百家及天文地理律厯醫藥算數之學延祐設科再中鄉舉文圭為文融會經傳縱橫變化莫測其涯際東南學者皆宗師之朝廷數遣使馳幣聘之以老疾不果行卒文圭為人剛明超邁以奇氣自負有牆東類稿二十卷梁益江陰人博洽經史工文辭其教人以變化氣質為先務學徒不遠千里從之所著有三山稿詩緒餘史傳姓氏綦又有詩傳旁通發揮朱子之學為精倪瓚無錫人強學敦行工詩善書畫所居幽迥絶塵藏書數千卷手自勘定古鼎名琴陳列左右自號雲林居士性好潔盥濯不離手俗客造其廬去輒洗滌其處家故雄於資一日盡散給親故人咸怪之未幾兵興富家悉被禍而瓚扁舟往來自若張士誠鈎致之逃以免士信致幣乞畫又斥去士信恚一日出遊聞異香出葭葦疑為瓚也物色漁舟果得之抶之幾斃迄無一言以夀終王逢江隂人元末避亂華亭徙上海張士誠辟之不就洪武中以文學徴以老病辭有梧溪詩集明謝應芳武進人自幼篤志好學以道義名節自勵至正初知時不可為隱白鶴溪上搆小室曰龜巢因以為號郡辟教鄉校子弟先質後文諸生皆循循雅飾及江南底定徙居芳茂山達官縉紳過郡者必訪其廬應芳議論必關世教切民隱德望重於東南吳雲宜興人為湖廣行省參政太祖議再遣使招諭元梁王雲請行時梁王遣鐵知院輩使漠北為大軍所獲太祖令與雲偕行既入境鐵知院等謀誘雲詐為元使改制書給梁王雲不從被殺梁王送給孤寺殯之詔馳傳返葬宏治中贈刑部尚書諡忠莭俞德惠無錫人洪武初官行人奉使廣西不屈節以死有祠施武無錫人洪武中舉明經擢御史以言事謫渾源州亂嶺關巡檢死於謫所張籌無錫人父翼方張士誠據姑蘇時其將莫天佑守無錫明太祖命胡大海討士誠翼説天佑降城得全籌於洪武中薦授翰林厯禮部尚書有文學記誦淹博厯代禮文沿革無不通曉更定社稷祀典最當帝意儲福無錫人建文時為燕山衛卒燕兵起挈妻逃去永樂初捕亡卒編福曲靖衛仰天哭曰福雖一介賤卒義不為從逆之臣日夜號泣竟不食死陳濟武進人博學無所不通成祖修永樂參政大著聲績宣德時擢南京戶部右侍郎尋調刑部令考察南京百官廉介端謹及卒無以為殮諡襄介胡濙武進人建文二年進士授兵科給事中厯進禮部尚書加少傅卒濙節儉寬和喜恕不形於色一時稱其德量其智能周身遇事無矯激故厯事六朝十知貢舉立朝六十餘年榮遇不衰趙鉉江隂人生六歲祖父俱以遇賊死隨母吳氏避難又相失育於祖父之故人稍長展轉訪求得母於鄞縣迎歸養及卒廬墓三年洪熙元年旌表倪敬無錫人舉正統進士擢御史景泰中上言請罷桑門之供輟宴佚之娛止興作之役寬直臣之囚帝不懌謫廣西宜山典史英宗復辟詔授祥符知縣安遠侯柳溥器敬西征請以自隨遂改督府都事踰年師還遽卒士類惜之杜宥江隂人景泰五年進士擢御史時多災異與同官倪敬等言事帝不懌謫典史尋遷英德知縣賊至死守移龍州通判謝病而歸趙敔武進人景泰進士授御史成化初為于謙訟冤乞復官遣祭從之按河南時荆襄賊擾南陽敔賑荒弭變治甚有聲帝將遣中官造紙浙江以歲歉民困止之按江西值大飢盡心賑救秩滿就遷按察使專撫飢民後改山西徐溥宜興人景泰中進士及第授編修尋參機務宏治末加少師乞休卒諡文靖溥性凝重度量宏遠居內閣十二年務守成法與同列協心輔冶事有不可輒共爭之性至孝嘗再廬墓自奉甚薄好施豫置義田八百畝贍宗族盛容無錫人景泰進士為御史天順初劾石亨曹吉祥諸違法事下獄降束鹿知縣有善政厯知邵武延平民皆愛之纍遷刑部右侍郎遇重獄務求其生改左副都御史巡撫山東亦有惠澤秦永孚無錫人與弟仲孚刺心血以療父病及父殁同廬墓三年成化中旌表王沂武進人父㒜南京吏部尚書諡文肅沂成化進士厯禮部郎中西域貢獅子又有貢刀劒至二萬者沂言是求且無厭宜損其賚豫從之宏治中以右副都御史巡撫保定諸府時賦役煩重力為裁損滹沱河溢壞真定民田廬築隄捍之奏免雜辦二年民賴其利楊璿無錫人舉進士厯山西參政檢核民户立三等法均徭役成化三年以副都御史撫治荆襄移撫京畿修八府荒政又撫河南所在奏績吳儼宜興人成化進士改庶吉士厯侍講學士劉瑾竊柄聞儼家多資啖以美官儼峻拒之罷官瑾誅復職拜南京禮部尚書武宗北巡儼切諌不報卒諡文肅邵寶無錫人成化進士知許州遷江西提學副使宸濠索詩文峻却之正德初厯擢右副都御史總督漕運劉瑾擅政寶至京絶不與通瑾怒勒致仕去瑾誅起貴州巡撫拜南京禮部尚書以母老辭卒諡文莊寶事母至孝學以洛閩為的嘗曰吾願為真士大夫不願為假道學所著學史簡端二録定性書説漕政舉要諸集學者稱二泉先生徐問武進人宏治進士授廣平推官厯巡撫貴州獨山州賊蒙鉞殺父為亂問督兵誅之遷戶部尚書引疾去問清標絶俗居官四十年敝廬蕭然田不滿百好學不倦粹然深造為士類所宗史良佐江隂人宏治進士擢御史正德初與同官貢安甫等劾劉瑾請留劉健謝遷下詔獄前後杖九十不死削籍歸瑾誅起雲南僉事平苗亂大興農田之利秦金無錫人宏治進士授户部主事纍擢巡撫湖廣郴州桂陽猺龔福全稱王金先後破寨八十餘禽福全改戶部左侍郎中旨仍置皇莊金乞勘正德間額外侵占者悉歸其主而盡徹管莊之人帝從其議金為人樂易及居官一以廉正自持在戶部尤孜孜為國尋加太子太保改南京兵部尚書致仕歸卒孫柱授中書舍人忤張居正罷官湯沐江隂人宏治進士授御史以不附劉瑾謫武義知縣嘉靖中人為大理卿給事中陳洸罪死帝持宥為民沐爭之不聽坐讞李福達獄罷歸卒沐居官三十載屏絶餽遺以廉潔稱葛嵩無錫人宏治進士擢禮科給事中閲薊州軍儲核貴戚所侵地歸之民武宗時以釐營弊力抗權幸又請出先朝宫人罷馳騁射獵因劾魏國公徐俌已又偕九卿請誅奄豎劉瑾斥為姦黨罷歸毛憲武進人正德進士為給事中數有論劾奉使湖南見民流離馳疏請帝憂勤以保天命忤旨停俸復言邇者穴官穴兵穴匠耗費無紀乞盡行釐革帝再巡邊偕同官屢諫并乞早建皇儲皆不報嘉靖初致仕憲性孝為人敦行誼矜名節其學主不欺以敬義為要學者多宗之貢安甫江隂人正德初為南京御史兵部尚書劉大夏為中官所扼而罷疏乞留之又偕同官乞留劉健謝遷罪劉瑾馬永成遂被逮為民起山東僉事楊淮無錫人正德進士授户部主事遷郎中監京倉革胥徒積弊殆盡後監內庫奄人例有供餽淮悉絶之公勤廉慎為尚書孫交秦金所重嘉靖三年伏闕爭大禮受杖月餘卒後贈太常少卿周衝宜興人以鄉舉知應城縣有惠政嘉靖初為唐府紀善上書陳修德裕後十二事王重之薦於朝加五品俸衝初受業王守仁後復從湛若水遊與蔣信集師説為新泉問辨録唐順之武進人嘉靖八年會試第一改庶吉士尋調吏部主事請朝太子削籍歸倭躪江南北召為職方郎中命往南畿浙江視師順之以禦賊上策當截之海外倭泊崇明三沙督舟師邀之斬馘一百二十沈其舟十三擢右僉都御史條上海防善後九事順之於學無所不窺為古文洸洋紆折卓然大家子鶴徵厯官太常卿亦以博學聞席上珍靖江人邑諸生強力有膽嘉靖中倭寇薄城上珍率壯士百餘從東門鼓噪而出殺賊數十人至秦家橋賊衆悉至力竭遇害萬士和宜興人嘉靖進士改庶吉士厯江西僉事分巡饒州歲裁上供磁器千計進湖廣參政撫納叛苗二十八寨殿工採木旁午士和經畫曲至民賴以安萬厯初進禮部尚書災祲屢見奏乞杜幸門容戅直汰穴員抑干請多犯時忌積忤張居正遂謝病去居正殁起官不赴卒諡文肅陳可達靖江人與父佾渡江覆舟可達先登操櫓入江救父遂同溺三日後抱父尸出顔色如生王問無錫人嘉靖進士厯南京車駕郎中有詔清武職冒濫按籍論黜請託不得行出為廣東按察僉事乞養歸父卒不復仕築室寶界山讀書三十年不履城市清修雅尚海內慕之子鑑進士知武定州有治行進太僕卿致仕張選黃正色皆無錫人同登嘉靖進士選為戶科給事中時享太廟遣郭勛代選言祫享不親行迹涉怠玩帝怒杖八十已死復蘇正色為南京御史劾中官鮑忠駙馬都尉崔元禮部尚書溫仁和所過納饋忠等因譖之下詔獄遣戍遼東正色與選相友善先後以直節顯穆宗初起選通政參議召正色為太僕卿俱致仕卒薛應旗武進人嘉靖進士知慈溪縣厯浙江提學副使應旗工文字與王鏊唐順之瞿景淳齊名天下稱王唐瞿薛其閲文所品題百不失一所編有宋元資治通鑑考亭淵源録甲子會紀四書人物考高士傳薛子庸語周子義無錫人嘉靖進士改庶吉士厯國子祭酒訓士有方暇則兀坐未嘗造執政門厯吏部左侍郎掌詹事府研窮經術及濂洛關閩之説學日邃卒贈禮部尚書諡文恪子炳謨萬厯進士厯禮部右侍郎協理詹事府魏忠賢招炳謨將置之政地正色拒之崇禎初贈禮部尚書諡文簡蔡元鈗無錫人嘉靖中倭冦入犯與弟元鐸負父逃匿賊執元鈗令言其父所在不從見殺元鐸不知挾重資往贖並遇害後獲旌吳中行武進人隆慶進士萬厯時官編修張居正遭父喪舉朝乞留中行獨憤然首疏論之自是趙用賢艾穆沈思孝鄒元標相繼疏入皆杖戍中行受杖時隂雲蔽空天鼓大震氣絶復蘇居正死薦起卒為執政所抑終侍讀學士施策無錫人隆慶進士授禮部主事乞南就養補吏部考功會考察策攝郎中事一秉至公尚書為請不能奪後復補禮部定宗藩則例務持大體有宗室乞恩夀千金不納遷尚寶卿故事勳衛入直詣尚寶領符牌法久弛䇿疏請申行禁地乃肅纍遷太僕寺卿乞歸結茅大池山中日事吟詠厯三十年卒著有崇正文選唐詩類選勵菴詩集行世孫元徴萬厯進士崇禎初官國子監助教疏劾魏崔餘黨徐時泰孫之獬陳其慶等厯湖廣福建副使以清節著顧憲成無錫人萬厯進士補驗封主事大計上疏語侵執政謫桂陽州判官厯考功員外郎三皇子並封憲成言九不可議遂寢尋遷文選郎中會推忤帝意削籍歸卒崇禎初贈吏部右侍郎諡端文憲成有志聖學暨削籍里居益覃精研究一以程朱為宗學者稱涇陽先生顧允成憲成弟性耿介勵名節萬厯中殿試對策言張居正罔上行私執政駭且恚置末第都御史海瑞為南學臣所詆允成偕同年抗疏劾之奪冠帶還家尋以教授用遷禮部主事力詆閣臣張位謫光州判官乞假歸不復出張納陛宜興人萬厯進士由刑部主事改禮部與顧憲成等爭三王並封又爭拾遺事謫鄧州判官乞假歸生平尚風節顧憲成講學東林書院納陛與焉又為麗澤大會東南人士爭赴之錢一本武進人萬厯進士知廬陵縣徵御史入臺即發江西巡按貪墨狀出按廣西上論相建儲二疏言詞最戇直帝銜之斥為民與顧憲成輩分主東林講席學者稱為啓新先生史孟麟宜興人萬厯進士授庶吉士改吏科給事中三王並封議起孟麟爭之覩梃擊事請册立皇太孫且救御史劉光復帝怒謫官熹宗立擢太僕卿卒劉元珍無錫人萬厯進士授主事進南京職方郎中抗疏言沈一貫比昵憸人錢夢臯以朋黨之説空善類帝怒除其名光宗即位起光祿少卿卒薛敷教應旗孫萬厯進士以名教自任會御史王藩臣劾巡按周繼不具揭都察院為其長所劾藩臣坐停俸敷教上言請更易兩都臺長詔歸省過三年起鳳翔教授遷國子助教尋以救趙南星謫光州學正省母歸與顧憲成高攀龍輩講學卒高攀龍無錫人萬厯進士授行人疏劾輔臣王錫爵力詆鄭材楊應宿讒諂宜黜謫揭陽縣典史歸熹宗立起光祿丞遷少卿疏劾戚畹鄭飬性及閣臣方從哲交結罪狀拜左都御史發崔呈秀穢狀為魏忠賢所惡削籍歸璫復矯旨逮問肅衣冠草遺表投水死崇禎初贈太子少保諡忠憲攀龍操履篤實涵養邃密粹然一出於正為當代大儒安希范無錫人萬厯進士授行人遷吏部主事改南京吏部主事疏請斥楊應宿鄭材為小人媚竈之戒復高攀龍吳宏齊以奬忠良并嚴諭閣臣王錫爵無挾私植黨仇視正人帝怒斥為民熹宗嗣將起官先卒葉茂才無錫人萬厯進士除刑部主事厯南京工部右侍郎謝病歸茂才恬淡寡嗜好以醇德稱及官太僕清流盡斥邪議益棼遂奮身與抗人由是服其勇繆昌期江陰人萬厯進士官檢討天啓初魏忠賢逐輔臣劉一璟昌期詣輔臣葉向高言重臣不可輕逐內傳不可奉一璟乃得善去遷左贊善進諭德楊漣劾忠賢會有言漣疏乃昌期代草者忠賢怒甚及趙南星高攀龍輩斥逐昌期皆具疏懇留忠賢益怒遂落職後今緹騎逮治死獄中崇禎初贈詹事諡文貞李應升江陰人萬厯進士除南康府推官士民服其公廉天啓初拜御史抗疏譏切近習魏忠賢惡之已復言宜罷內操楊漣劾忠賢得嚴旨應升憤即抗疏繼之并劾魏廣微萬璟之死也應升言廷杖不可再又代高攀龍草疏劾崔呈秀呈秀暮夜就邸乞哀正色拒之已而璫惡愈熾嗾黨誣論削籍又入之織奄李實疏中與繆昌期周順昌等同被逮死獄中崇禎初贈太僕卿諡忠毅孫繼臯無錫人萬厯甲戌殿試第一厯吏部侍郎萬厯二十四年陳太后梓宫發引帝嫡母也當送門外以有疾遣官代行繼臯言之帝怒抵其疏於地及三殿災致仕去卒王就學武進人萬厯進士授戶部主事三王並封議起就學詣王錫爵規之為流涕遂反並封之詔尋以清望調吏部員外陳太后梓宫將發詔遣官代行就學疏奏非禮帝不省而心甚銜之後斥為民王道濟武進人萬厯武進士初授江隂把總以五百人殺倭江上江水盡赤擢鹽城守備厯遷廣東總兵黎蠻叛道濟戰敗之追至九星洋斬其渠俘數百人黎蠻平授都督同知以憂歸聞京師己失不食而卒浦邵無錫人賊縛其父虞將殺之邵以首迎刃而死父得免陳幼學無錫人萬厯進士知確山縣政務惠民開河渠百九十八道調繁中牟政績茂著遷刑部主事中官殺人棄其尸幼學具奏逮置之法恤刑畿輔出矜疑三百餘人遷湖州知府一郡大治升九江兵備副使告終養歸卒中牟湖州並祠祀之湯兆京宜興人萬厯進士知豐城縣徴授御史時礦稅繁興姦人爭言利兆京偕同官力諌不聽吕圖南為周永春劾棄官歸兆京為圖南申雪帝稍奪兆京俸兆京以不得其職拜疏徑歸兆京居官廉正遇事慷慨其時黨勢己成屢遭排擊卒無能一言汚之者天啓中贈太僕卿吳達可宜興人萬厯進士以知縣最擢御史巡視長蘆歲飢繪圖請賑稅使馬堂議加鹽稅户部己許之達可力爭得已改按江西稅使潘相請開廣信山採大木鑿泰和山石膏皆以達可諌而止厯升通政使奏請正疏式屏讒邪重駮正懲姦宄皆嘉納焉乞休卒沈應奎武進人萬厯中由鄉舉知裕州歲大旱飢民嘯聚山谷上官遣兵剿之不克應奎單騎入其壘曉以褐福衆即解散嘗作文驅虎虎悉遠遁尚書孫丕揚道其境不迎謁丕揚突入其署應奎方焙餅炙韭邀與共食丕揚異之入朝稱其廉召為刑部員外郎厯汀州知府終南京光祿少卿孫慎行武進人萬厯中進士第三授編修擢禮部右侍郎時郊廟大享帝不躬親東宫輟講皇長孫九齡未就外傅瑞王未婚楚宗人久錮代王廢長立幼久不更正慎行並切諌熹宗立拜尚書初光宗大漸李可灼以紅鉛丸藥進俄帝崩廷臣劾之大學士方從哲令引疾歸慎行請討從哲誅可灼後謝病去慎行學既深造其操行皭然不滓為一時縉紳冠卒贈太子太保諡文介侯先春無錫人萬厯進士除太常博士時張居正柄政朝士爭附之先春獨不與通已轉禮科給事中再轉兵科厯吏科奉命閲遼鎮上因革利弊三十餘事回朝囊槖蕭然後以憂去服除補兵科都給事中以遼璫恣橫劾罷大帥上疏極爭之謫按察司知事遂不出吳桂森無錫人父汝倫官給事中桂森與顧憲成高攀龍講學東林書院同郡錢一本善易從之遊盡得其旨要所著有周易象述書經説曲禮説息齋筆記同邑許世卿少孤事祖及母以孝聞舉萬厯鄉試東林之會攀龍以前輩事之陸大受武進人萬厯進士授行人厯遷户部郎中福王將之藩詔賜莊田四萬頃大受請大減田額因劾鄭國泰驕恣亂法尋出為撫州知府以清節著天啓初補韶州卒何士晉宜興人萬厯進士授寧波推官擢工科給事中首疏請通章奏緩聚斂及張差梃擊事起咸疑謀出鄭國泰士晉疏劾之帝怒出為浙江僉事光宗立遷太僕卿天啓中總督兩廣軍務魏忠賢大熾除名卒莊烈帝立復官賜恤萬象春無錫人萬厯進士選庶吉士屢遷禮科都給事中前後七十餘疏多關軍國計厯山東巡撫引疾歸起南京工部右侍郎未至卒陳于廷宜興人萬厯進士由知縣徵授御史即疏詆閣臣朱賡尚書王紀被斥特疏申救厯吏部左侍郎忤魏忠賢斥為民崇禎初起南京右都御史召拜左都御史以議罪援引不當削籍歸卒福王時贈少保子貞達官順天府知事甲申賊陷都城死之蔣允儀宜興人萬厯進士天啓中擢御史疏張鶴鳴罪力詆方從哲崇禎四年以右僉都御史撫治鄖陽諸府流賊大至中官陳大金來援副使徐景麟見其多攜婦女疑為賊炮擊之大金訴諸朝逮允儀下獄戍邊論薦未及用而卒華允誠無錫人天啓二年殿試極陳奄寺之害授都水司主事崇禎中厯職方司員外郎憤溫體仁閔洪學亂政疏陳三大可惜四大可憂以省親歸事母色養備至母卒哀毁骨立允誠踐履篤實晚年涵養益粹不以功名利祿動其心盧象升宜興人父國霖以孝聞象升舉天啓進士授戶部主事歷大名廣平順德兵備舉卓異進按察使象升善射􅈺將略能治軍山西賊入畿輔連破之以右僉都御史撫治鄖陽與總督分道擊賊皆捷漢南寇幾盡威名為賊所憚進兵部侍郎賜尚方劒李自成勢甚盛象升大破之會京師警召入衛尋總督宣大山西大興屯利後至嵩水橋與大兵遇象升炮盡矢窮猶奮鬬身中四矢三刃手格數十人乃死贈太子少師兵部尚書福王時追諡忠烈本朝乾隆四十一年賜諡忠肅弟象晉象升既殉難或誣以不死棺不得斂象晉訟於朝并請祭葬及國變為僧以終劉熙祚武進人天啓四年舉人崇禎中厯巡按湖南張獻忠破蘄黃巡撫王聚奎撤守長沙遁走沿途焚劫熙祚奉吉惠二王走廣西已返永州拒守俄賊騎追至執見獻忠不屈見殺本朝乾隆四十一年賜諡忠烈弟永祚知興化大兵入城仰藥死弟綿祚知永豐縣鄰境九蓮山賊窟其中綿祚大破之以勞卒錢春一本子萬厯進士授御史甚有聲厯遷光祿卿魏忠賢黨劾春倚東林父作子述削籍歸崇禎初纍遷南京戶部尚書疏請改折白糧忤旨歸陳震亨江隂人以都指揮守泗陵流寇陷盱眙率部下五百人往禦殺賊無算殲其魁力盡被執罵賊死贈昭勇將軍立祠死所張瑋武進人少孤貧以學行聞舉進士授戶部主事調兵部職方厯郎中杜請託絶苞苴清望甚著出為廣東提學僉事大吏建忠賢祠欲瑋撰上梁文遂投劾歸授徒自給崇禎朝起官終僉都御史瑋貞介廉潔一時鮮儷後贈左都御史諡清惠薛聞禮武進人以吏員授黃陂典史張獻忠陷城愛其才挾與俱去即亡歸率民殺偽令賊復大至罵不絶口死本朝乾隆四十一年賜諡烈愍王章武進人崇禎元年進士知諸暨縣擢御史有直聲賊薄都城與給事中光時亨守阜城門及城陷時亨乞降章不屈攢槊刺死猶一手據地張口怒目若叱賊狀妻薑氏在籍聞之一慟而卒後贈大理寺卿本朝乾隆四十一年賜諡節愍王之栻章次子唐藩授兵部司務彈劾不避權貴擢兵部職方主事兼金衢監軍道奉命宣諭江上會大兵至不屈死本朝乾隆四十一年賜諡忠節兄之柯博學工文章以廕授錦衣衛指揮僉事痛父死節終身不仕馬世奇無錫人幼頴異嗜學有文名舉崇禎進士改庶吉士進左庶子都城陷肅衣冠捧所署司經局印望朝拜畢自縊死二妾朱李亦自經福王時贈禮部右侍郎本朝乾隆四十一年賜諡文肅世奇砥礪名行居館閣最有聲好推引後進不妄取與金鉉武進人少以聖賢自期崇禎戊辰進士厯國子博士工部主事中官張彝憲總理戶工二部檄諸曹謁見如堂官禮鉉憤抗疏爭忤旨尋落職十七年春起兵部主事巡視皇城京師陷鉉哭趨入朝知帝崩解牙牌北向四拜投金水河死母章氏妾王氏弟錝並同日死本朝乾隆四十一年賜諡忠潔王孫蘭無錫人崇禎進士授刑部主事厯遷廣東副使分巡南雄韶州連州猺賊為亂馳湟川進剿三戰皆捷猺遂降張獻忠陷長沙衡州韶士民聞之空城逃賊所設偽官傳檄將至自縊死朝廷憫其忠命豫贈恤莫可及宜興人官長沙府照磨崇禎末攝寧鄉縣事賊破城不屈死二子若鼎若鈺俱遇害薛應玢武進人崇禎末以監生署隴州同知流寇攻城勒兵固守城陷詈賊死本朝乾隆四十一年賜諡節愍王音武進人崇禎武進士授廣東惠州碣石都司以平海寇功授海南樂安參將甫一月黎蠻叛結諸洞兵圍之數重音力戰而死王行儉宜興人崇禎進士由刑部員外郎知重慶府重慶宿重兵撫馭有方張獻忠陷城被執臠死本朝乾隆四十一年賜諡忠烈盧象觀象升弟崇禎進士英略視其兄而文采過之後殉國難赴水死本朝乾隆四十一年賜諡忠烈其從兄象同與故將陳安俱抗節殉難吳鍾巒武進人受業顧憲成高攀龍為心性之學及門數百人江隂李應升為最應升罹璫禍被逮過郡交遊莫敢通鍾巒獨迎至館談論如平生崇禎中舉進士為桂林推官城破自焚死本朝乾隆四十一年賜諡忠烈戚勳江隂人由國子生授中書崇禎末命督餉福建甫竣事旋里城破舉火自焚本朝乾隆四十一年賜諡烈愍從者二十餘人同邑城破殉難者舉人夏維新諸生王華吕九韶時貢生黃育祺與門人徐趨逸去偵江隂無備襲之不克趨被執死育祺繫獄死本朝乾隆四十一年俱豫入忠義祠許用江隂諸生南京亡列城皆下用昌言城守逺近應者數萬人大兵從祥符寺後城入用舉火自焚本朝乾隆四十一年豫入忠義祠龔廷祥無錫人崇禎十六年進士福王時為中書舍人知國祚必移作書與子以死自誓城陷投武定橋水死本朝乾隆四十一年豫入忠義祠吳炳宜興人萬厯進士厯江西提學副使江西地失流寓廣東走靖州為大兵所執送衡州炳不食自盡於湘山寺堵允錫宜興人崇禎進士以戶部郎中知長沙府督鄉兵破滅山賊名知兵為湖北巡撫駐常德撫降賊李錦之衆三十萬軍聲頗振後死於潯州本朝顧樞無錫人憲成孫斂迹不入城市淹貫五經尤深書易著易藁折衷衆説不尚文辭心體力行而巳顧宸無錫人有文名蓄書尤富晚輯宋文選杜律注解孫夢簡宜興諸生篤孝友隱居教授生徒以紫陽山學規為式邑令欲識其面謝不可雅慕倪瓚為人莊應會武進人順治初補江西參政計殲逆賊金聲桓遷右布政使郡城以從逆當屠應會所救免者數萬人癸己入覲疏除袁瑞二郡浮糧官至刑部侍郎卒弟應詔知興寧縣時山賊竊發惠潮諸郡縣皆不守應詔募兵堅拒不解甲者百五十餘晝夜援兵至賊乃退時工西有金聲桓之變大將軍談泰聞其能疏擢瑞州府推官與謀平賊興寧人思其功立祠祀之陳貞慧明少保于廷子少在復社有名阮大鋮以逆案久錮謀復用貞慧與池州吳應箕無錫顧杲等草檄攻之後大鉞起南都侍郎乃以他事屬鎮撫司逮治尋得脫屏居故里不入城市十二年而卒高世泰無錫人以東林先緒為己任葺道南祠麗澤堂於梁溪祁州刁包等相與論學時有南梁北祁之稱大學士熊賜履講學出世泰門下莊冏生武進人工詩古文兼善繪事順治丁亥進士厯官右庶子兼侍讀邵長蘅武進人少稱奇童十歲為諸生長工詩古文性坦易著有青門集宋犖序刻之王襄武進人父道洽從族叔於廣東戎幕久無耗襄出門尋父經百艱比至則父與叔俱前卒遇父友指葬處扶柩歸母疑非真命異日勿合葬忽棺蓋裂窺見道洽鬚眉如生襄授徒養母在館忽心動疾馳六十里省母適鄰火延燒母悸不能起襄負母出烈焰中人以為孝感吕宫武進人順治丁亥一甲一名進士官至宏文院大學士常請停織造及江浙白糧以蘇民困又薦江東耆舊有文行者引疾歸卒所著有五經辨訛羣書通解行世馮達道武進人順治丁亥進士官戶部主事時江西布政莊應會疏除袁瑞二州浮糧章下所司同列者難之達道力爭得報可出守漢中有帥府吏請為責債者達道叱曰吾為太守乃當為若輩役耶遂求去帥府撻其吏謝焉乃出視事尋擢河東鹽道更先封後掣例為先掣後封商人德之劉幬靖江人順治丁亥進士知建安縣時閩疆未靖建安賊據山為固勢尤張幬親率官兵進剿誅其渠魁而赦其餘黨全活數萬人周維翰武進人以照磨署巨鹿縣事順治六年河南賊黨掠巨鹿死難薛信辰無錫人順治己丑進士知潮州府發守將郝尚久姦謀已而尚久果叛信辰抗不從賊賊下之獄乃潛遣其子約總兵吳六奇進兵謀泄尚久將害之會官兵進討賊敗乃免擢副使備兵并陘時有圈地之令信辰調劑得宜兵民悅服厯官浙江布政使所至以惠政聞顧煜無錫人順治己丑進士知象山縣清勤自飾邑以大治失上官意罷歸邑人歌思之所著有尚書講義經濟巨文古文粹諸書儲曾宜興人順治己丑進士知永豐縣豐多盜擒其渠魁餘悉解散戍卒奪民財曾置之獄其黨詐稱提標官持檄索還曾并執訊論如法驕兵斂迹以徴賦不及額免歸子振官右庶子掄官臨川知縣俱有名潘瀛選宜興人順治己丑進士知河間府營兵以餉不時給夜譁炮聲四起瀛選升堂召諸升約束之諸辨素服瀛選立為解散質明而餉亦辦人服其應變才侯杲無錫人順治己丑進士知宣平縣宣平民多逋賦杲輸家資補之辦軍興供億未嘗擾民亦不廢事後以刑部郎中督九江關悉罷額外征商旅德之丁外艱歸遂不出邵廷紀宜興人父席為盜所執廷紀年十九請代父盜釋其父炙廷紀至死趙起芳武進人官沭陽縣訓導順治八年山東寇賊襲城與其子殉難事聞議恤如例徐之龍江隂人知神木縣順治庚寅春逆賊王永強哨黨陷城之龍死之子廷綸寵綸皆遇害事聞贈僉事鄒忠倚無錫人順治壬辰廷對進士第一為人孝友謙謹無聲色貨利之好子卿森與從兄顯吉俱以詩畫擅名路遴宜興人順治壬辰進士知永平府捐俸築灤河石隄數百丈水患得息俗多獷悍遴治之以嚴訟清俗易三年上官交薦治行第一卒於官民立祠祀之周季琬宜興人順治壬辰進士選庶吉士尋改御史極言漕政之弊積蠧惕息康熙五年聖祖仁皇帝猶未親大政季琬因議祀典請躬承匕鬯以發其意疏入留中明年季琬卒前疏忽奉俞旨因賜驛歸其柩蓋異數也張令憲無錫人知香山縣順治壬辰滇寇陷城死之子丹翰亦遇害事聞贈僉事華鍾本姓秦無錫人知富川縣順治中滇寇至被執投水死事聞贈僉事秦鉽無錫人順治乙未會試第一廷對第三人授編修出為廣東參議備兵杭嚴有告無為邪教者牽繫多人其教戒飲酒食肉鉽即於堂下各食以酒肉散遣之按察江西有叛人久未獲所司得姓名相似者鍛鍊誣服鉽訊釋之賊亦旋獲秦松齡無錫人順治乙未進士入翰林罷歸康熙己未召試博學鴻詞厯官諭德嘗與睢州湯尚書斌講求性命之學工詩古文與同邑嚴繩孫齊名而詩格尤高所著有毛詩日箋蒼峴山人集行世弟松岱講學東林尤邃於易著有周易析微二十卷許之漸武進人順治乙木進士任户部主事擢御史疏救科臣楊雍建參革義王孫可望懲莊頭劉七皆著風采旋巡視陜西茶馬歸鄒祇謨武進人順治戊戌進士事母以孝聞母教之極嚴祇謨以讀書娛其母日記萬言工詩古文侯曦無錫人順治戊戌進士注選推官先是曦父鼎鉉令黃岡母以寇氛未赴留曦侍養曦聞警兼程二千里省父於危城中寇退始歸父有田三頃命諸子得第者與之曦不專受分給其弟董文友武進諸生少與鄒祇謨齊名工詩古文於天文厯象樂律方與之旨多所發明晚年悉棄去專事窮經尢長於周易春秋著有正誼堂集周宏無錫人郡邑鄉飲賓入祀鄉賢祠公謨子康熙甲辰進士廷試第三人授編修己酉典試山西時制舉始復八股宏一以光正為法所得士皆夙有文譽者榜發三晉翕然官至侍講學士旋以親老乞終養歸居官恪勤為人清介生平好讀書多著作宏父病與弟宜振侍奉湯藥衣不弛帶者凡三閲月及父卒擇地安葬結廬守墓服闋後賦詩志慟哀幸溢詞外行讀者悲之四十四年宫有宏書扇上翠華南覽見之極稱賞查問宏履厯敦本集淨緣居宏因病自陳尋卒著有集弟宜振康熙二十一易通廣義年進士厯任浙江錢塘太知縣所至有政平聲趙申喬武知進商人康熙邱縣治庚戌進士事不假幕客部民一見不海塘土以石祭忘擢刑部主江神潮不逼事厯官浙江巡撫岸工遂竟改撫湖易南禁私派重耗貪墨屏書為人清介剛直不息入為左都御史進户部尚可干以私每九卿會議意有不合者輒别奏申季丁丑進士任聞遷江令卒諡恭毅祀賢良祠弟革除科派禁輯獞蠻劫掠及豪強債利自矢評文不假舉卓異改手幕友以授編修督學山東廉慎勞卒官申喬子熊詔康熙己丑進士官侍讀有四第一人香堂集嵇永仁無錫人廪生閩督范承謨聞其賢延之幕康熙甲寅耿銜之既叛幽精忠將叛永仁承謨百計脅永勸承謨早為備賊尤仁降不屈獄守以炭畫壁作詩與承謨遙倡和後死贈國子監助教雍正中聞承謨遇害遂自經敕建祠賜忠節流芳扁額杜嶠無錫人為廉州守備康熙十四年吳三桂偽將王宏勛率賊犯廉州城陷不屈死事聞恤廕如例儲方慶宜興人博學工詩文康熙丙午鄉試第一登進士知清源縣山水數漲為城害歲修堰民至破産方慶禱白龍神水竟徙流南去城十里因移建神廟以鎮之清源人歎為神異任宏嘉宜興人康熙丙辰進士授行人擢御史厯左通政負氣不畏強禦遇事敢言一時重其風采嚴繩孫無錫人六歲能作徑寸大字工詩古文康熙己未以布衣舉博學鴻詞試日因目疾僅成一詩特命授檢討蓋異數也在明史館纂隱逸傳官至中允有秋水集二十卷陳維嵩貞慧子工詩詞古文尤長儷體康熙己未舉博學鴻詞授檢討文名冠館閣著湖海樓集行世陶自悅武進人康熙戊辰進士知猗氏縣減耗羡歲二千餘金擢知澤州捕鹽梟卻商人規例減鹽價十之四告歸研精宋五子書教八言動皆有法則高愈無錫人攀龍從孫學有淵源孝友肫懇尤嚴於取與年七十門弟子以新冠為夀猶卻之邃經績學植行鄉後學尤精周禮同時華學泉劉齊並學以九經著録者朱宗洛華玉淳王千仭秦鳴雷侯鳳苞向璿江隂人始為姚江之學繼讀龍人譜遂幡然從之著有志攀學録儲欣宜興經史人年少孤率兩弟讀書嘗至夜分博通六十始領康熙庚午鄉薦一試禮闈不姪大利遂絶文在文意仕進杜門著書有在陸堂文郁文雄文並以能文名於時在集子文康熙己丑皆康熙進士辛丑官編修進士大大文文官郁文雄文庶吉士楊名時江人隂康熙辛未進士授編修洊官吏正六年罷職乾隆九年起禮部尚書總督雲貴雍部尚書直上書房卒於官優詔軫惜以名時學問醇正端方贈太子太傅賜諡文定入祀品行賢良祠劉於義武進人康熙壬辰東巡撫擢吏部尚進士由翰林厯官山書總督直隸尋移陜甘以軍需洊厯中外案落職起直恪著忠勤加隸布政使再任吏太子太保協辦大部尚書學士卒諡文恪杜詔無錫人康熙間以詩受賜進士官庶吉士乞知壬辰養歸不復出有雲川閣集並選唐詩叩彈集行於世顧棟高無錫人康熙六十年進士授中書以事罷乾隆十五年舉經明行修之士棟高與焉年老授司業銜尋奉特旨召見奏對首以三吳俗敝請崇節儉風示海內製七律二章二十二年嘉之賜御高宗純皇帝南巡召見加祭酒銜賜御書傳經耆碩四字卒年八十一棟高所學合宋元明諸儒而一之著大儒粹語二十八卷毛詩類釋二十一卷春秋大事表百三十一篇討論精核多前人所未發時同邑吳鼎同舉經學官侍讀鼎兄主事鼐均有經説著於世潘思矩陽湖人雍正甲辰進士改庶吉士厯官安徽福建巡撫所至皆著政績卒諡敏惠祀賢良祠惲夀平名格以字行武進諸生自號南田草衣卓有詩名尤工繪事鄒一桂無錫人雍正丁未進士厯官內閣學士兼禮部侍郎工花卉禽鳥可匹南田任啓運荆溪人精心力學著作斐然雍正癸丑進壬對稱詔求通性理者啓運膺首薦廷旨授翰林厯官宗人府丞總裁三禮館朝夕恪勤研尤邃於三禮學摩經義老而彌篤諸經皆有纂述者稱釣臺先生子翔乾隆壬戌進士能以經學世家官吏部郎中其卒秦蕙田松齡孫乾隆丙辰進士第三人厯官刑部尚書加太子太湛深經術保久嘗慨任西禮經曹綜核名法為時所重為學名物制度諸儒詮解互異因精考古今因革按周官吉凶通考二百六十二卷又周官軍賓嘉之日撰五禮家義若干卷卒諡文恭入鄉賢祀祠劉綸武進人乾隆元一以諸生授編年修舉博學鴻詞科第厯官户部侍郎兼順天府尹文淵閣大遇事精飭入直樞禁尢清慎自將晉學士卒贈太子太傅諡文定祀賢良祠從上弟星煒乾書房升工隆戊辰進士部侍郎卒星由編修洊厯學士直煒文筆博贍尤工駢體有思補堂年一甲三名集子躍雲乾進士官至兵隆三十一部侍郎程景伊武進人乾隆己未進士改庶吉士厯吏學士景伊美髯雅量處貴顯部尚書文淵閣大淡泊若儒生服官恪勤清慎始節卒諡文終一恭周金紳無錫人乾隆己未進士任四川新寧知縣崇文廟葺書院講學課文利金紳叱還之增修邑志鹽緦某餽白金欲專鹽聽訟明允以疾卒官祀名宦祠著有握蘭詩鈔錢維城武進人乾隆乙丑進士第一人厯官工部侍郎調刑部深鬯律意剖悉必歸精審視奉命讞學浙江黜浮靡崇經術士風一變貴州獄適古州逆苗香要倡亂維城偕巡撫倍道會擒磔首惡撫馳赴檄兵勦捕指示翕張動中機定餘衆兼通聲律工繪事著有茶山詩文集三十卒贈尚書諡卷行世文敏華希閔無錫人由博學鴻詞舉人應科乾隆十六年高宗純皇帝南巡賦遜志録經史質疑各一帙希閔獻廣事類恩賞知縣希閔天性純孝篤志窮經平生著述頗多卒祀鄉賢祠周曰萬無錫人年與父雍正十永禧同舉鄉試乾隆十六知縣諸弊肅清改年與弟曰安慶教授贊同致仕登進士任景寧歸主講東林學者奉為模楷卒祀鄉賢祠弟曰贊由庶吉士改戶部主事遷員外郎視學雲南河南性沈毅典試山西秋暑甚曰贊肅衣冠升堂閲卷至夜分房考官列坐不敢平視從弟掞乾隆三十六年進士任浙江縉次時雲鄞縣知仍資硯田縣取士公明以養屢主講所拔皆宿學需席成就尤衆臧琳武進人記三十縣諸卷尚生書治經以漢注集解一百二唐疏為主著經十卷於詩禮二義雜經王肅私隱閻竄以難若璩見鄭其者尤書以推見為精至確管幹貞原名幹珍陽湖人乾隆丙戌進士由編官貴州順天修鄉洊升試主吏部考己侍酉郎厯充鄉會試副總會試同裁皆稱考得人擢漕運總軍丁疲敝設督策多所疏劾調劑屢次又疏陳江西督運有功嵇承志無錫人乾隆年馬家口一間由帶隄舉人工又中書洊於北倉擢長蘆鹽運使搶一帶水漲修築土築埝捐資趕黃沁廳辦得屬水保無勢陡虞漲嘉慶七妥速堵年署河東河道總築衡工大壩告成督後以年老遷京職王日杏無錫人由刑進征金川乾部主隆三事隨十八將軍溫福年值木果木師潰死贈光祿寺之事少卿廕恤如聞例徐瓚陽湖人知乾隆三十新繁縣八年隨將軍溫潰死之福進事征金川聞值木議恤果木贈道師銜楊夢槎金知匱人酆都縣乾隆三十八年隨將軍溫福進征金川死木果木之難事聞議恤贈道銜顧光旭金匱人由户曹擢御史乾隆三十九年攝四川按察使督餉金川冰雪中轉運厯碉笮五百里居民不擾旋軍日遮道臚歡方論功時以養親乞歸修東林遺矩著有響泉集梁溪詩鈔秦震鈞金匱人乾隆三十九年以州判權山東臨清州篆時逆犯王倫滋事震鈞團民勇與州屬官吏分堞嚴守賊攻城急震鈞悉力抵禦固守二十日事聞特升臨清知州洊擢濟東道卒祀鄉賢祠從子瀛由中書道樞廷厯官刑部侍郎著有小峴文詩集湯大奎武進人知鳳山縣乾隆五十一年臺匪林爽文滋事陷彰化復攻鳳山大奎聞警自刎子荀業被賊戕死事聞廕恤如例孫永清金匱人由中書直樞廷厯官廣西巡撫乾隆五十三年安南阮黎爭嬗叩關輸款永清撫讋之粵徼率服楊揆金匱人由中書直樞廷乾隆五十六年從征廓爾喀擢川北道嘉慶初協勦川楚教匪升四川布政使督餉緩急洞中機要揆少與兄芳燦齊名芳燦以伏羌守城卻逆回功擢升户曹郎各靈著川有牧集杭世隆何欲行俱陽湖人並以孝聞均乾間隆旌年王銑陽陜湖人任教匪滋華隂縣丞嘉事銑赴鎮安慶二縣大年川甕溝運送事軍糧遇聞賊賜坪化溝恤廕雲力戰陳亡騎尉世職邵志桂宜以興人孝聞嘉慶間年旌徐思直荆嘉溪慶人以年間孝聞旌流寓唐薛戎寶江鼎人西按客毗察使陵陽李衡羡山年四十辟署幕府三餘不仕反乃肯應杜牧咸陽寧人羡因厯卜官居中書舍人焉元張雨剛直有題水榭奇節殖詩序曰産水榭興在義東郭宋蘇軾眉山蘇軾人神黜居宗手札思咎閲移軾汝州有曰歲滋深人材實難願不忍終得居之棄軾未朝奏入至夕汝報上可書自建中言飢寒有田在靖國元年卒於常常州李綱邵以武論人以事貶論水道由災去義興國水居宜興時李光亦驛網自出呼曰非越州李司留數日定封交船而乎别王居正揚召州至人謂范宗尹宗尹曰薦於朝時危如此公不極寇陽羡山所學拔元勉出見公元塗炭一道此中尚誰待居正避意耳宗尹愧謝胡松年懷仁人卜和糴科斂居防陽羡雖居秋利害帝間不忘朝皆嘉納紹廷事屢言興十六年病革呼其就枕鼻息子曰如雷大化有頃推穆有卒人謂所不免乃不死也吕祖泰婺州人寓洽遍常之遊江宜興淮交有氣誼當世知學問該名士總纂官臣王廣蔭恭纂輯前提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校大清一統志常州府四列女南北朝蕭矯妻羊氏晉陵人性至孝居父喪哭輒吐血母疾中夜祈禱忽見一人自稱枯桑君曰夫人無恙今泄氣在亥西南求白石鎮之言訖不見明日如言而疾果愈吳康之妻趙氏晉陵人父亡弟幼遇歲飢母老病篤趙詣鄉里告乞鄉里憐之各分升米遂得免及嫁康之未幾夫亡家欲更適誓言不二蔣俊之妻黃氏義興人夫亡不重嫁家逼之欲自殺乃止詔表門閭唐蕭俯母韋氏賢明治家嚴俯雖宰相侍左右如褐衣時鄒待徴妻薄氏從待徴官江隂袁朝亂薄為賊所掠將污之不從語家媪使報待徴曰我義不辱即死於水賊去得其尸義聲動江南南唐何氏江隂人為江賊所掠欲污之何氏曰當修容以見須臾盛飾以出立船頭罵賊赴水而死宋鄒浩母張氏晉陵人初浩除諫官恐貽親憂母曰貌能報國無愧於公論吾顧何憂及浩兩謫嶺表母不易初意胡淑修晉陵胡宿女嫁李之儀讀書善文之儀母死氏負上封穴哭泣不輟手植松柏遂成茂林蔣氏江隂僉判李易母建炎中金人入夏港守臣胡魴謂易曰吾曹有死城郭之義公母宜少避易歸告其母母曰我去則汝決不肯守願與汝同死聞者皆泣下謝天與妻鄧氏晉陵人其姑以哭子喪明氏竭力侍養元兵至火其廬急扶姑避後圃氏被獲乘間赴水死元姚臨妻金少安宜興人至正中兵亂臨挈家入太湖追兵至氏度不免赴水死儲氏二女宜興人一嫁薛執中一未字為紅巾賊所掠過馬塘渡口二女相抱赴水死鄒珙妻華氏無錫人至正十七年隨夫避賊賊追及顧謂夫曰我義不受辱君善自保遂赴水死趙氏二女江隂人至正中廣德寇掠江除其姊抗節死越三年盜起妹亦赴水死同縣陳惠妻曹氏朱道存妻費氏俱被掠不辱遇害明陳存信妻程氏武進人明兵攻常州存信為百户死之氏號慟幾絶行求其尸葬之子夀嗣為百户征閩為盜所殺氏食貧守節終其身詔旌之儲福妻范氏無錫人福死既葬范時年二十居貧奉姑甚謹每悼其夫則走山谷中大哭不欲聞之姑也偶見澗邊草取織席鬻以奉姑及姑殁盧墓旁年八十餘卒後席草不復生土人即其廬為祠祀之陳旭妻臧氏武進人旭亡自經死詔旌其門曰貞烈華源長妻鄒氏無錫人源長疾革以孤託母而不及婦氏歎曰靡他之志夫不我信遂自縊越二日夫亡劉玉妻龔氏江隂人夫死貧不能殮有少年欲資之棺氏不受既而欲強娶之氏縱火自焚抱夫尸而死惲某妻巢氏許字未嫁夫死父母欲為擇配遂自縊吳氏三節江隂人吳宗傑妻周氏宗道妻木氏宗善妻花氏宗傑兄弟俱以行役死殊方三婦相與謀歸夫骨祔葬守節終其身詔旌其門曰三節孫氏馬氏靖江人正德中為流賊所掠不屈死華禕妻吳氏江隂人正德中賊犯城氏為所逼堅拒不從磔其尸投之江中尤輔妻成氏無錫人從輔寓靖江江水夜溢家人倉猝登屋氏整衣欲上問爾等衣乎衆謝曰不暇氏曰安有男女祼而與之俱生者我則死耳厥明水退氏端坐死榻上孟元卿妻李氏武進人夫卒守節養姑姑復卒葬畢自縊死朱某妻顧氏名玉潔靖江人夫死舅欲奪其志氏不從會流賊掠其境抱夫木主自縊死陸子才妻蔡氏無錫人嘉靖中倭寇至為所獲赴水死陳鸚兒靖江人陳雲家婢嘉靖間年十六抱雲幼子避倭賊掠之女紿曰以此兒送鄰家當從汝賊信之女送兒去即隨賊行賊不疑忽躍入江死余彥昭妻楊氏無錫人彥昭戍滇南卒氏年二十一子甫期家貧誓不他適養姑以天年終既而子婦俱早卒氏又撫其孤志益厲詔旌之陸氏任氏吳氏三人皆邵氏婦明末並死於兵同里黃氏蘇氏皆不辱遇害王育才妻姚氏武進人御史章母育才早世章甫八齡姚夜課每至漏盡家貧甚漚麻紡織向市易升斗粟以為常及章為諸暨令醉歸姚命杖之曰朝廷以百里付酒人乎章伏地不敢仰視其嚴憚如此崇禎年間旌華曠度妻王氏無錫人王母家江隂華墅明末忍死脫夫亂兵中本朝周魁妻何氏武進人夫墮河死氏沿河號泣兩晝夜始得夫尸翁令改適自經死同縣蔣九逮妻嶽氏李某妻朱氏俱夫亡自盡許之濬妻吳氏遇暴不從死海烈婦武進人陳有量妻運丁林顯瑞以銀誘氏夫婦入糧船遣夫他往百計誘脅氏堅拒自經死官勘實林伏辜邑人立祠於西門外運河旁沈士珍妻馬氏無錫人夫亡自盡以殉同縣諸士蘭妻葉氏張錫妻朱氏亦夫亡自盡又朱某聘妻曹氏金兆聘妻王氏俱未婚聞訃各自盡邢烈婦江陰人失其姓適邢某值城破氏據井欄坐見一男子來欲投井氏叱曰汝輩易覔死所留此以為我婦人盡節地兵近乃踴身入焉同縣徐步妻許氏闔門赴井許國棟妻李氏挈媳女自焚倪春岡妻高氏殷華石妻吳氏曹氏女皆為兵所迫不辱死潘寀宏妻李氏夫亡自盡以殉戴川妻張氏江隂人川以事謫戍陜西娶氏生二子川殁氏籲當事請歸江隂守節督撫哀其志賞給驛馬移咨江蘇巡撫氏以驛中廩給供口糧徒步攜二子歸同邑人士義之為裒金供其饘粥尹佐妻陳氏宜興人遇強暴不汚死同縣邵國初妻任氏邵齊薑妻陸氏邵璽妻任氏邵遂祖妻吳氏丁佳妻黃氏丁明妻黃氏毛里泰妻史氏沈伯芳妻黃氏蘇氏女任氏女皆為兵所掠不辱死萬文彪繼妻曹