body:
  text: 稽郡地漢為會稽郡毗陵縣北境為臨淮郡地後漢永建四年分屬吳郡三國吳分置典農校尉晉太康二年省校尉置毗陵郡永嘉五年以毗陵郡封東海王世子毗因避諱改曰晉陵郡徙治丹徒永興元年析置義興郡東晉太興初又徙治京口義熙九年還治晉陵宋齊以後因之隋開皇九年郡廢置常州大業初復曰毗陵郡唐武德三年復曰常州天寶初復曰晉陵郡乾元初復曰常州屬江南東道五代屬南唐宋仍曰常州晉陵郡屬浙西路元至元十三年升常州路屬江浙行省明初曰長春府尋復為常州府直隸南京本朝屬江蘇省領縣八武進縣附郭東西距五十一里南北距六十五里東至陽湖縣界一里西至鎮江府丹陽縣界五十里南至陽湖縣界十五里北至通州泰興縣界五十里東南至陽湖縣界五里西南至鎮江府金壇縣界六十里東北至陽湖縣界十五里西北至丹陽縣界八十里春秋吳延陵邑漢置毗陵縣屬會稽郡後漢屬吳郡晉太康二年為毗陵郡治又分置武進縣永嘉五年改昆陵曰晉陵宋齊以後因之隋仍為毗陵郡治唐武德初復置武進縣為常州治八年省入晉陵縣垂拱二年復分置武進縣五代宋因之元為常州路治明洪武初省晉陵入武進為常州府治本朝因之陽湖縣附郭東西距四十六里南北距一百二十里東至無錫縣界四十五里西至武進縣界一里南至宜興縣界七十里北至江隂縣界五十里東南至宜興縣界一百里西南至武進縣界二十五里東北至江隂縣界五十里西北至武進縣界一里本武進縣地夲朝雍正二年析置陽湖縣與武進縣分治郭下無錫縣在府東南九十里東西距五十里南北距一百十里東至金匱縣界半里西至陽湖縣界五十里南至蘇州府長洲縣界七十七里北至江隂縣界三十三里東南至長洲縣界四十三里西南至陽湖縣界五十一里東北至江隂縣界五十一里西北至陽湖縣界五十一里漢置無歸縣屬會稽郡後漢改屬吳郡三國吳分置興農校尉省縣屬焉晉太康元年復置屬毗陵郡後屬晉陵郡宋齊以後因之隋屬毗陵郡唐屬常州五代宋因之元元貞初升為無錫州隸常州路明洪武初復為縣屬常州府本朝因之金匱縣在府東南九十里東西距七十里南北距一百十里東至蘇州府常熟縣界七十里西至無錫縣界半里南至蘇州府長洲縣界七十七里北至江陰縣界三十三里東南至長洲縣界四十里西南至無錫縣界十五里東北至常熟縣界七十里西北至江隂縣界三十三里本無錫縣地本朝雍正二年析置金匱縣江陰縣在府東七十里東西距一百六十里南北距七十四里東至蘇州府常熟縣界九十里西至武進縣界七十里南至無錫縣界五十四里北至靖江縣界二十里東南至常熟縣界八十里西南至武進縣界七十里東北至常熟縣界七十五里西北至武進縣界七十二里秦時為暨陽鄉漢毗陵縣地晉太康二年析置暨陽縣屬毗陵郡尋屬晉陵郡宋齊因之梁太平三年析置江隂縣兼置江陰郡隋開皇九年郡廢縣屬毗陵郡唐武德三年置暨州九年州廢縣屬常州五代南唐升元中置江陰軍宋熙年廢三十一寧四年軍廢建炎四年復置二十七年復置屬兩浙西路元至元十四年升江隂路後降為州屬常州路改曰連洋州尋復為江隂州洪尋直隸行省明初武初改州為縣屬常州府本朝因之宜興縣在府南一百二十里東西距一百六十里南北距六十里東至蘇州府吳江縣界九十里西至鎮江府溧陽縣界七十里南至荆溪縣界半里北至陽湖縣界六十里東南至荆溪縣界三十里西南至荆溪縣界九十里東北至陽湖縣界七十里西北至鎮江府金壇縣界七十里漢置陽羡縣屬會稽郡後漢屬吳郡三國吳分屬吳興郡晉永興元年於縣置義興郡宋齊以後因之隋初郡廢改縣曰義興屬毗陵郡唐武德七年置南興州八年州廢仍屬常州五代因之宋太平興國初改曰宜興縣宋末改置軍元至元十五年升宜興府二十年仍降為縣二十一年又升為府兼置宜興縣為府治元貞𥘉府縣俱廢改為宜興州隸常州路明洪武初復曰宜興縣屬常州府本朝因之荆溪縣在府南一百二十里東西距一百八十里南北距八十里東至蘇州府吳江縣界九十里西至鎮江府溧陽縣界九十里南至浙江湖州府長興縣界八十里北至宜興縣界半里東南至長興縣界七十里西南至安徽廣德州界一百里東北至宜興縣界三十里西北至鎮江府溧陽縣界九十里本宜興縣地本朝雍正二年析置荆溪縣靖江縣在府東北一百五十里東西距一百二里南北距五十二里東至通州如臯縣界六十里西至通州泰興縣界四十二里南至江陰縣界三十五里北至泰興縣界十七里東南至江隂縣界五十里西南至武進縣界五十里東北至如臯縣界七十里西北至泰興縣界五十里漢海陵縣地唐為海陵吳陵二縣地屬泰州宋為泰興縣地元改屬江隂縣明成化七年析置靖江縣屬常州府本朝因之形勢三江之雄闊五湖之腴表風土記岡阜相屬林麓鬱然毗陵舊志川澤沃衍有海陸之饒物産豐阜足衣食之供隋志大江橫其北太湖處其東宋政和河溝記北抵江淮東連海道宋圖經三吳襟帶之邦百越舟車之會寰宇記山長水遠氣秀地靈元宜興圖册土厚水深山澤清曠元路學興造記風俗秀而多文願而循理君子尚義庸庶厚龎隋志承泰伯之高蹤由季子之遺烈居英賢之舊地雜吳夏之語音人性佶直黎庶淳讓敏於習文寰宇記事簡易治民醇相安食服之度漸靡禮義之風寖盛舊志城池常州府城周十里有奇高二丈五尺門七水門四池廣十六丈深二丈明洪武二年改築本朝雍正八年修武進陽湖二縣附郭無錫縣城周十八里高二丈一尺門四水門三池廣一丈七尺深二丈宋乾興中築本朝康熙七年修金匱縣城與無錫縣同江陰縣城周九里有奇高二丈五尺門四池廣四丈二尺深七尺明正德中築宜興縣城周九里有竒高二丈五尺門四池廣三丈深一丈五尺明永樂中增築荆溪縣城與宜興縣同靖江縣城周七里有奇高一丈八尺門四池廣六丈五尺深一丈八尺明成化中築嘉靖中甃甎學校常州府學在府治西宋太平興國初建德祐時燬於兵元至元間重建本朝康熙年間數二修入學額十五名武進縣學在縣治東南元大厯年間重建本朝順治康熙年間屢修入學額數十三名陽湖縣學與武進縣同入學額數十二名無錫縣學在縣治南宋嘉祐間建本朝康熙年間修入學額數十三名金匱縣學與無錫縣同入學額數十二名江陰縣學在縣治西南宋崇寧間建本朝順治年間屢修入學額數二十五名宜興縣學在縣治西南宋景德中建本朝順治康熙年間屢修入學額數十三名荆溪縣學與宜興縣同入學額數十二名靖江縣學在縣治西南明成化中建本朝康熙七年修入學額數二十名道南書院在府治朝京門內宋楊時嘗講道於此紹興初立祠祀後燬於兵明正德中即毗陵驛址建延陵書院在府城雙桂坊季子祠西本朝康熙十年建龍城書院在府治明隆慶間建本朝乾隆十九年修東林書院在無錫縣治東宋楊時講學處久圮明成化中建於泰伯瀆上本朝康熙年間重建二泉書院在無錫縣慧山寺明正德間建本朝順冶年間修暨陽書院在江隂縣治本朝乾隆二十三年建東坡書院在宜興縣蜀山明宏治間建夲朝康熙年間修蜀山書院在荆溪縣治夲朝乾隆二十四年建正誼書院在靖江縣治本朝乾隆八年建馬洲書院在靖江縣南門外明知縣陳函輝建户口原額人丁五十九萬三千七百八十六今滋生男婦大小共三百八十九萬五千七百七十二名口田賦田地五萬五千七百九十二頃六十四畝四分有奇額徴地丁正雜銀五十六萬七千四百三十九兩四錢四分一釐又雜辦銀四千五百二十二兩九錢一釐米三十五萬五千一百七十石二斗合三一升勺三山川黃公山在相武進傳為縣楚東黃南歇八所十封里地去有太龍湖泉十灣五其里東南南有有龜梅山堂又山黃山在俯武瞰進大縣江西南北有七孤十陳里山孟東河北東有小又山東入有江九謂龍之山吳自尾孤以陳羣至山此自有西九來小至山此相而連盡屬也故名燧又之江所北今六曰里黃亦山有門黃山為江上防有要石津室江楊防吳時考黃置山烽門在二包港郡之江交心上水下流瞭湍望悍幾盜及賊百出里沒之地實京口又之當門常户鎮也孟城山在嘉武嘗進隱縣於北此八孟十河里經俯其瞰下大入江大相江傳又晉西孟有嘉人山歲上旱有禱白雨龍於潭此鄉橫山在里武延進袤縣二東十北餘三里十舊五名芳二茂橫山山晉有右二將山軍相曹連橫續葬此風土因記易又今謂名之寰宇記大橫峴作其北士五誠里遣曰兵三寇山常三州峯吳相良連自中江一隂峯尤取間峻道拔殲明其初援張兵於無錫之三山即此馬迹山在陽湖縣東六十里輿地紀勝在州東太湖中巖壁間有馬迹隱然世傳秦始皇遊幸馬所踐舊志在縣東南九十里周百二十里與津里山相接其西麓曰西青石壁峭立多石窟圓如馬迹因名明初下常州俞通海以舟師略太湖入馬迹山破張士誠水寨即此夾山在陽湖縣東南七十里太湖中南北五里夾秦陽二小山中峽有馬鞍嶺津里山在陽湖縣東南唐邵偃記曰山連馬迹夫椒峯巒回合波影映帶實為奇觀輿地紀勝在縣東南一百三十里太湖中一名泰履山相傳秦始皇嘗自夾山登此通志江陰縣西南二十里有秦望山俗稱茶岐山即此山也皇山在無錫縣東五十里劉昭後漢志注上有泰伯冢寰宇記引輿地志云泰伯宅東九里有皇山舊志相傳梁鴻居於此又名鴻山獨山在無錫縣西南十八里錫山之脈西南來至此中斷北與管社山相望為浦嶺門南與充山相對峙為獨山門果溪之水由二門入太湖又有三山在獨山門外屹立太湖中與獨山相望橫山在無錫縣西南二十里東與龍山勢若相附中斷為平疇通華利口路耿山在無錫縣西南二十五里前臨長廣溪後負太湖據諸山之勝巖巒重疉上有石池冬夏不盈涸青山在無錫縣西南三十五里一名章山亦曰青山灣面太湖其西有韓灣孟灣諸山閭江山在無錫縣西南四十里相近曰歸山下有闔閭城又有閭江亦太湖之别浦也軍將山在無錫縣西南四十里近太湖下有龍潭南唐時屯兵於此以備吳越惠山在無錫縣西一名慧山縣志西域僧慧照居之故名隋志無錫縣有九龍山寰宇記九龍山一名冠龍山又曰惠山在縣西北七里一名九隴山通志古名華山又曰厯山又名西神山有九峯下有九澗有慧山寺第二泉在焉泉之上有方圓二池其中相通而圓池最佳相傳隋大業末上有龍鬬又名龍鬪山本朝乾隆十六年高宗純皇帝南巡有御製登惠山寺詩二十二年二十七年三十年四十五年四十九年俱有御製惠山疊前韻詩三十年御製泛丹遊惠山即景雜詠詩錫山在無錫縣西五六十界又五名里三一名界山東顧山上有龍接常熟及潭通志亦江陰謂之二縣香山金匱山在金匱之鎮也縣城縣以中邑此名膠山在金九里匱縣有滌東四十里硯寶乳二長泉芙蓉山在金故名匱上縣東北有天乙二十五里峯為歲旱芙蓉湖在其祈禱處又名下龍泉峯綺山在江至此陰見縣東野花十里輿地紀勝昔繁盛如綺因名俗吳訛王泛為啓舟山上利有善泉定山在江法響陰縣東二十五禪師駐錫於此里一有五名女山乳泉一唐名虎跑泉香山在採江隂縣香徑府東二志又十九里名香灣輿地左岡紀勝上中發一有泉紆西回而七里下夾為盤澗有桃龍山一名桃花名蛟山澗其西為鳳凰山唐垂拱中有黃龍又蟠其上故名沙山在江志相陰縣東四十傳初本平地五里頂有金鵝石晉宋間江水泛漲舊涌沙山成白鹿山在江隂東五十縣五東五里相十里輿地紀勝在傳吳王出獵得白縣鹿於此由里山在江隂勝四面縣東南十皆九里又五里名九輿地紀里山白龍山在江陰縣東南五十里形如龜俗呼為龜山上有白龍洞君山在江隂縣北澄江門外縣鎮山也其巔有松風亭通志在縣北一里一名瞰江山突起平野俯臨大江宋南渡後置營寨於山麓為戰守要地又北五里曰黃山與君山皆以春申君名蕭山在江陰縣東北十五里以蕭氏世居其下而名一名小山上有祭江臺其東有彭公山真山在江隂縣東北十五里輿地紀勝在縣東十八里又祥符圖經作甄山又名石牌山浮山在江陰縣東北掦子江中西臨石磴東控巫門為江海門户穿石山在宜興縣東南二十里一名蛟山有石穴受許陂長流民田藉以灌溉又名洞山産茶唐貢山在宜興縣東南三十五里東臨罨畫溪産茶唐時入貢因名金沙泉在其下蘭山在宜興縣東南五十里輿地志石蘭山斗入太湖五里有石麓如岸者二南曰大蘭山北曰小蘭山相連二里通志一名香蘭山接浙江安吉長興二縣界張公山在宜興縣東南中有洞郭璞云洞中南北二堂相傳張道陵居此因名水流入圻溪府志高六十仞尋遊麓者周秉五炬里達洞燒深香五臺十可餘坐仞百北人向一行約竇三廣里踰四許南望洞小白洞鶴通徹洞皆道有書水第五出合十流八入福罨地盡也溪洞西後有南曰白佛馬窟洞湫有五又西女曰潭水又西犀洞南洞三凡里三許曰穴亦天曰窟君洞陽有洞龍煙山在魚宜磯興下縣臨西深南淵三相十傳里吳諸孫峯堅環峙上嘗釣於有此釣小坯山在石宜室興北縣流西入一百圻溪里通寰志宇記一名在白長塘石山湖稍中北水為底大有坯山壇接溧鎮江陽二府縣金界􅖘山在十宜里興縣有奇西北按七廣十韻里􅖘周三烏后切府山山名川詳門見山鎮山江注柚山在湖宜上興與縣湖西中北八大坯十山里對洮峙多産巨林石木不計山在有宜池興其縣西東北峯曰二金十五鵝山里唐通初志嘗巔置鵝興州故於名義陽山在山宜興縣多縱石東而北有三大十橫五峴里一以承名㟄流泉下陽為溪頤山在荆聲隱溪於縣此東南三嘗著十十七五詠里志通臺志唐陸池泉石希林木之勝蜀山在荆溪縣東南三十八里屹然特立旁無附麗本名獨山宋蘇軾愛其風景類蜀改今名義山在荆溪縣東南六十里東臨太湖南接浙江長興縣界荆南山在荆溪縣南縣主山也高而大巖洞絶勝上有龍池歲旱禱雨輒應其北為南嶽山孫皓既封國山遂以此山為南嶽其地為古陽羡産茶處小心山在荆溪縣西南三十五里即君山西峯也有金泉出此通志一名敷金嶺國山在荆溪縣西南五十里三國吳孫亮五鳳二年陽羡離里山大石自立孫皓天璽元年陽羡山有石空裂十餘丈成室名曰石室表為天瑞乃遣司徒董朝至陽羡封禪國山以明年改元天紀以協石文梁天監八年或請封會稽禪國山不果寰宇記引輿地志云本名離里山有九峯相連亦名九斗山又名升山吳孫皓封禪為中嶽改為國山東北有兩重石洞土人呼為石室周幽王二十四年忽開可容千人又有石柱呼為五柱水流注章溪輿地紀勝有善卷洞周幽王時所舊志延袤三十六開里龍池山在荆溪縣西南七十里高五里南巖曰白治北八十東抵江隂東北餘里靖江縣志與通舊自州泰州相對行郡境百郡北迤東至今縣西分為二派繞縣南北以入海縣居江海之交中流屹立明天啓以來潮沙壅積縣北大江竟為平陸江防沙考江中哨守之又東為唐沙三處為青草沙沙之中巫山自是而東北門在焉亦曰有蒲巫子門後河在府城內一名龍塘河經大市市河宋史郡守李餘慶穿引惠明河東注出裏虹橋與河運合運河自城蘇州東又府吳縣界西西北流經武北流入經無進縣城南又錫縣西北流入鎮江府錫縣界流經丹陽縣界通志在府南自望亭入無郡治西北抵奔牛鎮達於孟河行百七十餘杭餘里吳夫差所鑿隋大擬通龍舟此其故道也業中自京口穿河至自唐武德後纍濬遂為江南之水縣境又北二驛云河十里曰渠志望新安又亭北為北三十常州府無錫里經縣城南引而西北十里至高里經洛社又北二十橋合里經江隂橫林縣運河又北二為武進縣境又十東北十里經丁堰二十戚墅堰十里經里達常州府城西蠡河在武進縣西南亦名南運河自高橋河鴨城河在無錫縣東二十里源自運河東行至甘露鎮分為二沠一南流入蠡湖一北出至河東北三十五里為漢塘河北貫興塘港與新河接新河南宋時所開北通大江今塞雙河在無錫縣北五里亦曰雙溪自運河分流南出分為二派一南流合於梁溪一西流達直湖港入武進縣界五瀉河在無錫縣北十四里宋熙寧宋郟僑議治常潤之水莫若決五瀉堰使水徑入江通志源出芙蓉湖南枕運河宋元祐間治芙蓉湖為田因開堰置閘後架石梁其上名曰高橋通江隂運河橫河在江隂縣東輿地紀勝引長編云宋乾興元年知軍崔立開橫河六十里通漕運舊志自城中接黃田港東流七十里經常熟縣界入大江長河在江隂縣東南十里一名東河自縣南門運河分流東南入無錫縣界匯入新河滆湖在武進縣西南三十五里郭璞江賦具區洮滆酈道元以滆為五湖之一通志一名西滆又名沙子湖東西三十五里南北百里中與宜興分界東連太湖西通蕪浦港陽湖在陽湖縣東五十里以近陽山得名在無錫湖之東東西八里南北三十二里北通茭饒臨津二湖共為三湖東南入太湖芙蓉湖在陽湖縣東無錫縣西北江隂縣南一名上湖又曰射貴湖越絶書無錫湖者春申君治以為陂周萬四千頃其一千三頃毗陵上湖也水經注