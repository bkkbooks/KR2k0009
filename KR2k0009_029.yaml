front:
  text: 大清一統志常州府在江蘇省蘇州府西北二百三十里江寧府東南二百七十里東西距一百九十里南北距二百八十五里東至蘇州府常熟縣界一百四十里西至鎮江府丹陽縣界五十里南至浙江湖州府長興縣界二百里北至大江北岸通州泰興縣界八十五里東南至蘇州府長洲縣界一百四十里西南至安徽廣德州界二百三十里東北至通州如臯縣界一百七十里西北至揚州府江都縣界一百二十里自府治至京師二千五百三十五里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋吳地史記吳世家季札封於延陵按太康地理志武進縣故延陵邑季札所居後屬越戰國屬楚秦為會
