夀武城人周時拜幽州總管高寶凝反引突厥攻圍北平夀率騎數萬出盧龍塞討之諸縣悉平寶凝走契丹為麾下所殺北邊遂安于翼洛陽人大象初詔巡長城立亭鄣西自雁門東至碣石創新改舊咸得其要害仍除幽定七州六鎮諸軍事幽州總管先是突厥屢為寇抄居民失業翼素有威武兼明斥堠自是不敢犯塞百姓安之隋李崇成紀人開皇三年除幽州總管突厥犯塞崇輒破之奚霫契丹等懾其威畧爭來内附後突厥大為寇掠崇率步騎拒之轉戰十餘日死亡畧盡乃挺刀突賊卒於陣周摇洛陽人開皇初突厥寇邊上思所以鎮之臨朝曰無以加周揺者拜為幽州總管六州五十鎮諸軍事修鄣塞謹斥堠邊民以安柳彧解人高祖時持節巡省河北五十二州奏免長吏贓汚不稱職者二百餘人州縣肅然莫不震懼竇抗平陸人高祖時為幽州總管以寛惠聞唐狄仁傑太原人聖厯初突厥侵掠趙定等州詔仁傑為河北道行軍元帥便宜從事更拜安撫大使時民多脅從於賊賊去懼誅逃匿仁傑上疏請曲赦諸州一不問罪制從之薛季昶龍門人武后時為河北道按察使初夏官郎中侯味虚將兵討契丹不利妄言賊行有蛇虎導軍季昶至斬味虚威鎮北方藁城尉呉澤射殺驛使髠民女髪為髢州不能劾季昶杖殺之然後布恩信甄表善艮韓琬南陽人監河北軍兼按察使先天中賦絹非時於是榖賤縑貴人多徙亡琬曰御史乃耳目官知而不言尚何賴又上言須報則弊已甚移檄罷督乃聞詔可裴懷古夀春人為幽州都督綏懷兩蕃將舉部落内屬監軍韓琬稱其取士信臨財廉為國名將云張守珪陜州河北人開元中為幽州長史河北節度副大使加採訪處置等使契丹奚達年梗邊前長史不能制守珪至每戰輒媵帝喜詔有司告九廟契丹酋屈刺及突于遣使詐降守珪得其情遣右衞騎曹王悔詣部計事屈刺宻引突厥衆將殺悔以叛契丹别帥與突于不協悔因閒誘之斬屈刺及突于盡降其黨守珪次紫蒙川大閱軍實賞將士傳屈刺突于首於東都詔立碑紀功裴寛聞喜人天寶初拜范陽節度使時北平軍使烏承恩與中人通數冒賄寛以法繩治檀州刺史何僧獻生口數十寛悉歸之夷夏感附李光弼柳城人天寶末為河北採訪使以朔方兵東救常山次真定史思明來攻擊敗之遂收藁城等十縣張仲武范陽人武宗時為幽州節度副大使回鶻特勒那頡啜擁赤心部七千振逼漁陽仲武率銳兵三萬破之獲馬牛橐駝旂纛不勝計回鶻由是不敢犯塞詔李德裕為銘揭碑盧龍以告後世宋潘美大名人太平興國中知幽州行府事兼三交都部署畱屯以捍北邊三交西北三百里地名固軍為北邊咽喉美潛師襲之遂據有其地因積栗屯兵以守之北邊以安田錫洪雅人太平興國中為河北轉運副使驛書言邊事帝嘉之索湘鹽山人太宗時為河北轉運副使經度供餽以能幹聞遼兵入寇將趨鎮州湘為田重進畫謀乘其無備破走之真宗時為河北轉運使德州舊賦民馬以給驛又役民為步遞湘代以官馬兵卒人皆便之時議於靜戎威虜兩軍置埸鬻茶以資軍用湘言非便遂止有詔修復定州新樂蒲陰兩縣湘以其地迫窄非屯兵之所奏罷之何承矩河南人太宗時遼人擾邊承矩上疏請於順安砦西開易河蒲口導水東注於海資其陂澤築隄貯水為屯田可以遏敵騎之奔軼俟期歲閒關内諸泊悉壅闐卽播為稻田其縁邊諸軍臨塘水者止畱城守軍士不煩發兵廣戍太宗嘉納之乃以承矩為制置河北綠邊屯田使俾董其役由是自順安以東瀕海廣袤數百里悉為稻田有莞蒲蜃蛤之饒民賴其利向敏中開封人咸平初為河北河東安撫大使以陳堯叟馮拯為副發禁兵萬人翼從所至訪民疾苦宴犒官吏莫不感悦宋準雍邱人太宗時為河北轉運使有治聲張士遜陰城人真宗時為河北轉運使河侵棣州詔徙州陽信議者患糧多不可遷士遜視瀕河數州方艱食卽計餘以貸貧者期來歳輸陽信公私利之盧炎淄川人真宗時為河北轉運副使時北鄙未靖調發軍儲糧道不絶以職務修舉遷秩刑部賜金紫㑹城祁州命專董其役寇瑊臨汝人真宗時為河北轉運使天禧中河決澶淵瑊視役河上隄墊數里衆皆奔潰而瑊獨畱自若須臾水為折去衆異之李仕衡京兆人真宗時為河北轉運使建言河北歲給諸軍帛七千萬而民艱於得錢悉預假於里豪出倍償之息以是工機之利愈薄方春民不足請户給錢至夏輸帛則民獲利而官用足矣詔優其直仍推其法於天下進都轉運使棣州汙下苦水患仕衡徙州西北七十里既而大水沒故城丈餘明年旱蝗發積粟賑民又移五萬斛濟京師陳貫河陽人真宗時為河北轉運使請疏徐鮑曹易四水興屯田劉元瑜河南人提舉河北便糴㑹永寕雲翼軍士謀為變吏窮捕黨與謀刼囚以反百姓竊知多逃避元瑜馳至斬為首者其餘皆釋不問民感其徳王彬固始人為河北轉運使部吏馬崇正倚章獻太后姻家豪横不法彬發其姦贓下吏忤太后意徙京東楊偕中部人仁宗時為河北轉運使按知定州夏守恩贓數萬守恩流嶺南王沿館陶人天聖中體量河朔饑民所至不俟詔發官廩濟之就除轉運副使上言請教河北強壯以代就糧禁卒之闕罷招廂軍以其冗者隸作屯田後又為河北轉運使奏罷二牧監以地賦民導相衛邢趙之水下天平景祐諸渠溉田數萬頃杜衍山陰人仁宗時河北乏軍費選為都轉運使不增賦於民而用足包拯合肥人仁宗時遼兵近塞邊郡稍警命拯往河北調發軍食拯曰漳河沃壞人不得耕邢洺趙三州民田萬五千頃率用牧馬請悉以賦民從之後為河北都轉運使請罷河北屯兵分之河南兗鄆齊濮曹濟諸郡設有警無後期之憂不報歐陽修廬陵人仁宗時保州兵亂以修為龍圖閣直學士河北都轉運使賊平大將李昭亮通判馮博文私納婦女修捕博文繫獄昭亮懼立出所納婦兵之始亂也招以不死既而皆殺之脅從二千人分隸諸郡富弼為宣撫使恐後生變將使同日誅之夜半屏人告修修曰楇莫大於殺巳降况脅從乎弼悟而止田京鹿邑人仁宗時提㸃河北路刑獄事上言請擇要官守滄衞鑿西山石臼廢道以限戎馬用竒正法訓兵徙戰馬内地以息邊費九十餘事帝嘉納之姚仲孫商水人為河北都轉運使大修城壘兵備仁宗詔襃之鄭驤河南人為河北轉運使王則反討平之除天章閣待制先是皇甫泌夏安期皆為轉運使泌先謫去安期後至不及賞驤固辭不受願推功與二人韓絳雍邱人仁宗時河決商胡用李仲昌議開六塔河而患滋甚命絳宣撫河北時宰執多主仲昌人莫敢異絳劾其蠧國害民罪不可貸仲昌遂竄嶺表呉公弼夀州人仁宗時為河北轉運使自寶元慶厯以來宿師備邊既西北撤警而屯如故民疲餽餉公弼始通御河漕栗實塞下冶鐡以助經費移近邊屯兵就食京東增城卒給版築蠲冗賦及民遖數百萬趙抃西安人為河北都轉運使初有沼募義勇過期不能辦官吏當坐者八百餘人抃被㫖督之奏言河北頻歲豐故應募者少請寛其罪以俟農隙從之坐者獲免而募亦隋足張問襄陽人仁宗時提㸃河北刑獄大河決議築小呉問言築小呉則南岸且決水並京畿為害詔付水官議久不決小呉卒潰後為河北轉運使所部地震河再決議者欲調京東民二十萬自澶築隄抵乾寕問言隄未能為益災害之餘力役勞民非計也神宗從之王鼎館陶人仁宗時提點河北刑獄所劾舉不避貴勢張希一開封人仁宗時為河北縁邊安撫副使請徙邊兵内地以寛糴費每州歲為市平以糴邊榖使人不能高下其價戍卒之孥給糧先軍士一月使其家為伍保坐以逃亡之累皆著為法王臨成安人治平中為河北沿邊安撫都監上備禦數十䇿遼刺人為義軍來歸者數萬或請遣還臨曰彼歸我而遣者必為亂不如周而撫之詔從其請自是來者益多劉庠彭城人神宗時為河北都轉運使遼侵霸州土場或言河北不可不備庠上五䇿料其必不動巳而果然大河東流議者欲徙而北内侍程昉希功請益兵濟役庠請遲以歲月徐觀其勢而順導之朝廷是其議吕大忠藍田人元豐中為河北轉運判官上言生財養民十二事沈括錢塘人神宗時為河北西路察訪使先是銀冶轉運司置官收其利又賦近畿户出馬備邊括皆言其非便如是者三十一事詔皆可之韓贄長山人神宗時為河北都轉運使河決商胡贄言開魏金隄使分注故道支為兩河可紓水患詔遣使相視如其策才役三千人幾月而畢滕元發東陽人神宗時河北地大震命元發為安撫使時城舍多圯吏民懼壓皆幄寢茇舍元發獨處屋下曰屋摧民死吾當以身同之痊死食饑除田租修隄障察貪殘督盜賊北道遂安杜純鄄城人元祐初除河北轉運判官初更役書司馬光稱其議論詳盡予之書曰足下在彼朝廷無河北憂唐義問江陵人元祐中為河北轉運副使屬邑尉因捕盜悞遺火盜逸去民家被焚訟尉故縱火郡守執尉抑使服義問辨出之方旱而雨虞奕錢塘人崇寕中提舉河北西路常平洺相饑徙之東路入對徽宗問行期對曰臣退卽行流民不以時還則來歲耕桑皆廢矣既而西部盜起復使奕提㸃刑獄時朝廷將遣兵逐捕奕條上方畧請罷勿用而自計討賊不閱月可定轉運使張摶以為不可宰相主摶策數月不效卒用奕議悉降之任諒汝陽人徽宗時為河北轉運判官著河北根本籍凡户口升降官吏增損與一歲出納之數披籍可見上之朝張商英見其書謂為天下部使之最遼室昉南京人保寕閒為南京副畱守決獄平允人皆便之耶律休哥迭刺部人統和初總南面軍務以便宜從事均戍兵立更休法勸農桑修武備後宋人來侵休哥再敗之於沙河及南北和好休哥以燕民疲弊省賦役恤孤寡戒戍兵無犯宋境雖牛馬逸於北者悉還之逺近向化邊鄙以安耶律仁先迭刺部人咸雍中為南京畱守恤孤惸禁姦慝宋人聞風震服議者以為自耶律休哥之後惟仁先一人而巳金梁肅奉聖州人大定初除河北東路轉運副使時初經寇亂兵食不足詔肅措置沿邊兵食移牒肇州北京廣安鹽埸許民以米易鹽兵民皆得其利通檢東平大名兩路户籍物力稱其平允伊拉道伊什部人世宗以其清廉有幹局自翰林直學士改同知中都路轉運使是歲以廉升者及治狀不善下遷者廉察悉當伊拉道舊作伊刺道伊什舊作乙室今改正劉仲洙宛平人明昌初除中都西京路提刑副使先是田瑴等以黨罪廢錮者三十餘家仲洙知其寃上書力辨帝從之乃復瑴官爵黨禁遂解張大節五臺人章帝時擢中都路轉運使言河東賦重宜減議者或不同大節以他路田賦質之遂命減焉裴莫亨臨潢府人承安中為中都西京等路按察使時世襲家豪奪民田亨檢其實悉還正之裴莫亨舊作裴滿亨今改正孟奎遼陽人泰和中同知中都轉運使事時旱詔錄中都路寃獄多所平反任天寵定陶人貞祐初為中都路轉運使時京師戒嚴糧道艱阻天寵悉力營辦曲盡勞瘁出家資以濟饑者全活甚衆高霖東平人宣宗時為中都畱守兼本路兵馬都總管平章政事莫呢盡忠棄中都南奔霖與子義傑率其徒追之不及謂義傑曰汝可求生吾死於此矣霖死義傑伏羣屍中以免贈翰林學士承㫖莫呢盡忠舊作抹然盡忠今改正元鄂敦碩永女真人太祖時以元帥領真定保定順德諸道農事凡闢田二十餘萬頃鄂敦碩永舊作奥敦世英今改正賽音達齊扎斯丁回人憲宗時為燕京路總管多惠政賽音達齊扎斯丁舊作賽典赤贍思丁今改正高天錫遼陽人授燕京諸路鄂魯總管語丞相博洛左丞張文謙曰農桑者衣食之本不務本則民衣食不足教化不可興古之王政莫先於此丞相以聞帝為立司農司鄂魯舊作奥魯博洛舊作孛羅今改正張恵新繁人世祖卽位授燕京宣慰副使為政寛簡奏免分數錢罷硝碱局李德輝通州人中統元年為燕京宣撫使燕多劇賊造偽鈔結死黨殺人德輝捕誅之令行禁止徐世隆陳州人中統元年擢燕京等路宣撫使以新民善俗為務中書省檄諸路養禁衛之羸馬數以萬計芻秣什器前期戒備世隆曰國馬牧於北方往年無飼於南者上新臨天下京畿根本地煩擾之事必不為之馬將不來吏白此軍需也其責勿輕世隆曰責當我坐遂弗為備果不至清滄鹽課前政虧不及額世隆綜核之得增羨若干圖朗哈雅威烏人世祖時僉燕南道肅政廉訪司事務存大體不事苛察在任六年黜汙吏百四十有奇圖朗哈雅舊作脫烈海牙威烏舊作畏吾今改正達爾瑪高昌人至治二年為燕南道廉訪副使行唐縣民斫桑道側有人借斧削其杖其人夜持杖刼民財事覺并逮斧主與盜同下獄達爾瑪原其未嘗知情卽縱之達爾瑪舊作答里麻今改正張起巖濟南人順帝時轉燕南廉訪使搏擊豪強不少容貸貧民賴以吐氣滹沱河水為真定害起巖論封河神為侯爵而移文責之復修其隄防瀹其湮鬱水患遂息蘇天爵真定人至正五年充京畿奉使宣撫究民所疾苦察吏之姦貪其興除者七百八十有三事其糾劾者九百四十有九人都人有包韓之譽成遵南陽人至正十一年出為大都河閒等處都轉鹽運使初汝汴二郡多富商運司賴之是時汝盜起侵汴境朝廷調兵往討括船運糧以故舟楫不通商販遂絶遵隨事處宜國課皆集崔敬惠州人至正十一年遷同知大都路總管府事直沽河淤數年中書省委敬浚治之給鈔數萬錠募工萬人不三月告成咸服其能明劉崧泰和人洪武中為北平按察副使以廉慎為先輕刑省事招集流亡民咸復業創立文天祥祠於學宫之側勒石學門榜示府縣勿以徭役溷諸生嘗請減僻地驛馬以益宛平帝可其奏顧謂侍臣曰驛傳勞逸不均久矣崧能言之牧民不當如是耶初之任止攜一僕後并遣還官舍蕭然吏退明燈讀書而已張昺澤州人建文初為北平布政使受密令伺察燕事至則王稱疾久不出謀甚祕昺知必為變乃部署在城七衞及屯田軍士列九門防守會朝廷遣人逮燕府官校燕王偽縛官校置庭中將付使者紿昺入至端禮門為伏兵所執不屈死楊繼宗陽城人成化中以僉都御史巡撫順天畿内多權貴莊田有侵民業者卽奪還之按行關塞武備大飭屠勳平湖人宏治中以副都御史巡撫順天整飭薊州邊備分兵屯險築城增戍塞垣加固以京邑役重民貧奏減舊設庫夫壇户旛夫數千人昌平奉諸陵供億浩穰請免計丁養馬民深徳之洪鐘錢塘人宏治十一年以副都御史巡撫順天整飭薊州邊備建議增築塞垣自山海抵居庸延互千餘里繕復城堡凡二百七十所悉城緣邊州縣因奏減防秋兵六千人歳省輓輸犒賚費數萬計徐問武進人正徳時為長蘆鹽運使運司故利藪自好者咸不樂居問曰官能汚人耶吾請身試之終任不取一錢劉麟南京廣洋衛人嘉靖初以右都御史巡撫保定六府中官耿忠守備紫荆多縱麟劾奏之后父陳萬年乞武清東安二縣地詔給七百五十頃復爭之天津三衛屯田舊止千餘頃後增至五倍田多斥鹵不能輸課麟請盡蠲除軍民德之呉嶽汶上人嘉靖中以僉都御史巡撫保定六府畿輔徴發四出嶽素知其凋敝為奏請裁減十六七民力以寛楊博蒲州人嘉靖中總督薊遼保定軍務把都兒及打來孫十萬騎犯薊鎮百道攻墻博擐甲登陴督總兵官周益昌等力禦卻之論功進右都御史後再莅鎮畫地爲十區令諸將監司分守自居庸距山海旌旗千里礮聲相屬諸酋震懼終歲不能近塞譚綸宜黄人隆慶初以兵部侍郎總督薊遼保定軍務疏請設薊鎮真定大名井陘及督撫標兵三萬爲三營分駐密雲遵化三屯而以戚繼光總理之遂與繼光圖上方畧築敵臺三千自居庸東至山海斥堠相望邊備大飭戚繼光登州人隆慶初爲總兵官鎮守薊州永平山海諸處初至見將卒不足用請兼用浙兵建烽臺千二百座乃立車營制拒馬器設輜重營以南兵爲選鋒衞兵主策應本鎮兵專戍守節制精嚴軍容爲諸邊冠自嘉靖庚戌諳達犯京師至隆慶丙寅邊將易置者十人卒不獲善去繼光在鎮十六年薊門晏然居民得安耕牧諳達舊作俺答今改正李繼貞太倉州人崇禎十二年以兵部侍郎巡撫天津時畿輔被兵薊遼軍餉六月猶未開運繼貞至悉心籌畫八月而運畢城中無井率取水城外繼貞特穿水門引流入之軍民稱便銳意興屯躬巡相視白塘葛沽數十里閒禾黍彌望及罷歸以所節省及俸金七千金貯之官庫民畱之不得羣為建祠徐標濟寕人崇禎十六年擢僉都御史巡撫保定陛見請重邊防擇守令用車戰禦敵招流民墾荒帝深嘉之李自成陷山西警日逼加標總督畿南山東河北軍務仍兼巡撫移駐真定以遏賊賊遣使諭降標毁檄戮其使中軍謝加福伺標登城畫守禦策鼔衆殺之本朝張存仁奉天正黄旗人順治七年總督直隸山東河南三省駐節大名榆園賊擾畿南發卒討平之嘗奉詔考試屬員文藝有不能者降調之存仁曰我武臣不諳文事且諸君不皆由科目授官徒論一日長恐沮能吏心乃并考其居官能否第之時以為識大體云李䕃祖奉天正黄旗人順治十一年總督三省初畿北歲饑民多流亡至是來歸強半道殣䕃祖疏請安集全活甚衆朱昌祚奉天鑲白旗人康熙四年總督三省遇事執法無所偏徇輔臣鼇拜以鑲黄正白二旗分地瘠薄遣部臣會同督撫重易善地他旗多不樂從民地𬒳圈者咸泣訴失業昌祚上疏極陳其弊鼇拜怒坐以撓法罪立絞死旗民哀之八年追復原官諡勤愍王登聯奉天鑲紅旗人康熙初擢保定巡撫時海宇初定伏莽尚多官吏艱於捕緝共相容隱登聯請嚴縱盜之法重窩主之律厚捕首之賞由是盜賊漸息以撥換旗地事擾民密疏請令各安舊業忤鼇拜意與總督朱昌祚同論死八年復原官諡恪愍甘文焜奉天正藍旗人康熙初為順天府尹以法繩下貴幸家皆斂迹崇文門稅苛露章奏之遷直隸巡撫禁暴䘏民緝姦除盜知無不為單騎巡所部以保定四部水災奏免本年賦金世德奉天正黄旗人康熙八年巡撫直隸畿内自明以來不置兩司世德請設守道理錢榖巡道理刑名如外省藩臬之職由是二者始有專司以畿北諸郡旗民雜處易於容姦請立屯長以治之漳水滹沱桑乾諸流漲溢淹沒民田八萬餘畝田主猶困徴輸世徳再疏請免吳三桂叛四方用兵禁卒援剿供億繁急世徳單騎行營中躬料芻糗軍無横索吏無侵漁市肆晏然巳未庚申連歲旱饑力請賑救又截畱漕米以濟四十邑賴以全活以疾卒於官熊伯龍漢陽人康熙初督學畿輔崇尚實學鑑别精審丁思孔奉天鑲黄旗人康熙八年為直隸守道出納平允吏胥不能為姦大兵南征供億填委思孔措辦有方毫不擾民于成龍永寕州人康熙十九年巡撫直隸奏免宣化水衝田糧禁屬員告訐上官賑䘏饑民核定驛站兵餉清保甲嚴偵緝四境無盜賊之患良法善政多為後來遵守魏象樞蔚州人康熙二十一年以刑部尚書巡察直隸所至咨訪民瘼糾貪吏鋤姦惡畿内肅然于成龍奉天鑲紅旗人康熙二十五年巡撫直隸政嚴明貴近有犯必繩以法事有不便於民者悉除之任縣水荒地數千頃産去尚徵其糧至是奏請豁免遷河道總督去三十七年復以總督管直隸巡撫事民聞其來無不歡躍尋又遷河道總督去成龍所至有聲與前永寕于成龍並著人稱大小于公以别之郭世隆奉天鑲紅旗人康熙二十九年擢直隸巡撫大兵將征噶爾丹部檄預備軍需刻期止四日世隆以便宜發帑五十萬用飛車裝載三日卽達宣府不以擾民京城巡捕三營向供各衙門驅使世隆陳其弊始隸九門提督歲饑卽發穀平糶渾河隄壞水漸北徙霸州上下時受其害詔令修築世隆言舊隄地勢北高南下修隄則北水愈泛不若濬永清東北舊河使順流歸海霸州等處被淹宜修子牙河隄至五官淀之東隄以禦之皆見施行贊皇縣西有大峪名子午套爲盜藪五十餘年世隆招其渠魁二人使自效餘皆釋歸農李光地安溪人康熙中督學畿輔以經術造士文體一軌於正三十七年巡撫直隸正身率下奬進賢能畿内桑乾滹沱滱易諸水悉㑹直沽達海下流填淤多潰決爲民害光地次第經理引渾河别從柳岔口出築子牙河隄使滹沱不得横溢棄土盡爲沃壤馬廠經界與民地相錯詔遣八旗都統㑹勘光地以方田少廣法籌之一夕而定疏請以其地與民耕種田賦以清邵嗣堯猗氏人康熙三十年爲直隸守道清介絶俗僚吏憚之李成龍奉天正藍旗人由涿州知州洊升直隸巡道勤於吏事案無畱牘鳩工治河匀派里甲民無怨而事集乾隆七年入祀名宦祠那前提調官臣沈兆澐恭纂輯提調官臣王廣䕃恭覆輯校對官臣黄佳杞恭校校對官臣章詒然恭覆校
