  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_003-1a}
body:
  text: 直隸統部東西距一千二百二十八里南北距一千六百二十八里東至盛京錦州府寕逺州界六百七十八里西至山西大同府廣靈縣界五百五十里南至河南開封府蘭陽縣界一千四百三十里北至邉城一百九十八里東南至海岸四百四十里西南至河南衛輝府濬縣界一千二百九十里東北至藩部界六百二十里西北至大同府天鎮縣治五百六十里自京師至盛京一千四百七十餘里分野天文尾箕室壁昴畢虛危分野燕地尾箕分野屬幽州自尾十度至斗七度爲析木之次今順天永平宣化當其地衛地營室東壁分野屬并州自危十七度至奎四度爲娵訾之次今大名當其地趙地昴畢分野屬冀州自胃七度至畢十一度爲大梁之次今正定順徳廣平保定及易冀趙深定諸州河閒天津之北境當其地滄州錦州所屬則在虚危元􅑎之次青州之宿為齊分也建置沿革禹貢冀兖二州之域舜肇十有二州分冀州為幽州晉地道記舜以冀州南北廣大分燕地北為幽州因幽都以為名夏省幽州仍為冀兖之域爾雅燕曰幽州郭璞曰此蓋殷制周禮職方東北曰幽州春秋時為燕晉衞齊諸國地戰國時為燕趙齊魏四國地按正定順德廣平河閒春秋時晉地後屬趙大名春秋時衛地後屬魏又戰國時齊地直至滄州與燕分界故通典曰滄州為齊趙二國之境秦并天下置上谷漁陽右北平遼西邯鄲鉅鹿東郡等郡漢元封五年置十三部刺史為幽冀兖三州地幽州領上谷漁陽右北平遼西涿郡勃海六郡廣陽一國冀州領魏郡鉅鹿常山清河四郡趙國廣平正定信都中山河閒六國而東郡則屬兖州後漢因之幽州刺史治薊以勃海改屬冀州冀州刺史治高邑省廣平國屬鉅鹿真定國屬常山改信都曰安平建安十八年省幽州入冀州三國屬魏復置幽州晉初仍屬三州幽州治涿增領廣􅑔郡改涿郡曰范陽國冀州治房子增領章武高陽博陵三國又改兖州之東郡曰濮陽國兼屬司州司州分領廣平郡及陽平頓邱二郡永嘉後為石勒慕容儁苻堅慕容垂所據永嘉三年石勒陷冀州建興二年又陷幽州大興二年僭號於襄國稱趙永和六年慕容儁僭號於薊稱燕太和五年苻堅滅燕太元九年堅敗慕容垂復取之後魏幽冀二州之外兖州移治滑臺後罷增置定皇始二年置安州天興三年改名相天興四年置東魏天平初改名司州平太平真君中徙置安皇興二年置瀛太和十一年置燕太和中置天平中徙置東燕州滄熙平二年置殷孝昌二年置南營永熙二年置九州共領四十二郡相州治及别領之四郡入今河南省界北齊置東北道行臺仍分置幽冀定瀛滄安趙本殷州天保二年改名東燕南營北燕天保八年置等州後周置幽州總管府仍分置冀定瀛滄平趙南營元本安州燕本北燕州安樂史太平寰宇記建德六年置洺貝恆三州俱宣政元年置魏大象二年置等州隋開皇初仍置幽州總管府三年罷郡存州大業初府廢改諸州為涿郡本幽州上谷開皇元年置易州漁陽開皇六年徙置元州北平本平州安樂本元州開皇十六年改置檀州河閒本瀛州博陵本定州恆山本恆州信都本冀州趙郡開皇十六年置欒州大業三年復為趙郡襄國開皇十六年置邢州大業初復為郡武安本洺州清河本貝州己上十三郡屬冀州武陽本魏州勃海本滄州已上二郡屬兗州等郡唐武德初復改諸郡為州三年置幽州總管府時邢洺魏定等州皆置總管府尋罷貞觀初分屬河北道開元中置採訪使治魏州領幽薊檀媯平涿瀛莫易定滄景鎮冀深趙邢洺恵貝澶二十一州後又增祁州順州其蔚武新等州則屬河東道開元二年置幽州節度使天寶以後改為范陽盧龍又分置成德魏博義武横海四節度唐書方鎮表幽州節度使治幽州天寶元年更為范陽節度使寶應元年復為幽州及平盧陷又兼盧龍節度使是年又置成德軍節度使治恒州廣德元年置魏博節度使治魏州建中三年置義武軍節度使治定州貞元三年置横海軍節度使治滄州太和三年罷横海軍節度更置齊滄節度使五年賜號義昌軍節度使天祐元年賜魏博節度號天雄軍節度二年更成德軍節度號武順軍節度五代後唐時平州入遼石晉天福初割幽涿瀛莫檀薊順媯新儒武蔚等州入遼周顯德二年廢景州六年取瀛莫等州克三關增置雄霸二州於是與遼以白溝河為界宋雍熙四年分河北為東西兩路端拱二年併為一路熙寕六年復分兩路東路治大名府領閒徳河閒等府滄冀莫雄霸恩清等州永靜乾寕信安保定等軍西路治正定府領中山信德慶源等府洺深磁祁保等州安肅永寕廣信順安等軍其幽順等州入遼㑹同元年建為南京道治析津府領順檀涿易薊景平等州其奉聖歸化可汗儒宏蔚等州則屬西京道宣和四年歸宋置燕山府路按宋史地理志作四年而本紀作五年蓋改名在未歸之前也七年屬金建炎初河北東西二路皆入於金金天㑹七年仍分河北為東西路貞元元年遷都燕京改為中都路正隆二年又分置大名府路中都路治大興府領通薊易涿順平濼雄霸保安遂安肅十三州河北東路治河聞府領蠡莫獻冀深清滄景八州西路治真定府領中山府及威沃邢洺磁祁六州大名府路領開州其德興府宣徳蔚宏武等州仍屬西京路元初改中都為燕京至元初仍曰中都九年改大都二十一年置大都路又分為永平保定真定順徳廣平大名河閒共八路皆屬中書省謂之腹裏大都路領涿靈通薊漷順檀東安固安龍慶十州永平路領灤州保定路領易祁雄安遂安肅完七州真定路領中山府趙冀深晉蠡五州廣平路領磁威二州大名路領閒州河閒路領滄景清獻莫五州其順寕府保安州蔚州則屬上都路明洪武初改諸路為府九年置北平等處承宣布政使司洪武元年克元都改為北平府與諸府分屬河南山東行省二年置北平行中書省三年置燕山大興永清等六衞九年革行省置北平布政使司永樂元年以北平為北京禮部尚書李至剛等請立為京都乃改曰北京稱行在以北平府為順天府罷布政使司以所領隸北京行部十九年改北京為京師罷北京行部以各府州直隷京師領順天保定河閒真定順德廣平大名永平八府隆慶保安二州宣德五年又置萬全都指揮使司領宣府左右前萬全左右懷安保安保安右懷來蔚州隆慶左右永寕開平龍門等十五衛本朝順治元年世祖章皇帝定鼎建都順天等八府二州及宣府鎮仍直隸京師康熙三十二年改宣府鎮為宣化府雍正元年改真定府為正定府二年升正定府之定冀晉趙深五州為直隸州三年改天津衞為直隸州升河閒府之滄州為直隸州九年升天津州為府以滄州為屬州十一年於熱河建承德州十二年晉州仍屬正定府升保定府之易州為直隸州以山西之廣昌縣來屬乾隆七年於熱河改設同知裁承德州八年升順天府之遵化州為直隸州四十三年升熱河廳為承德府凡府十一直隸州六順天府保定府永平府河閒府天津府正定府順德府廣平府大名府宣化府承德府遵化直隸州易州直隸州冀州直隷州趙州直隸州深州直隸州定州直隸州形勢東濱海山海關以南與盛京接界滄州以南與山東接界皆瀕渤海元行海運以直沽海道為咽喉要地明初亦嘗通運於此南控三齊燕齊之地犬牙相錯東南諸省職貢京師者山東實車馬梯航之㑹西阻太行太行中分冀州之界圍環數千里唐宋河北河東皆以太行為限蔽北屆沙漠漠南舊大寕開平一帶明代淪於邉外今並列為外藩自漠以北喀爾喀諸旗亦皆内附幅員廣遠振古未有其名山則有恒山在正定府曲陽縣即北岳也地記恒山北臨代南俯趙東接河海之閒天下形勢處太行太行首起河内北至幽州今由廣平順德正定保定之西回環至京師之北引而東直抵海岸延袤二千餘里從鎮定澤潞諸州而言則曰山東西自燕雲十六州而言則曰山前後今界内諸山爭奇競險拱翼畿甸者皆太行之支峯别阜也碣石在永平府昌黎縣禹貢太行恒山至於碣石爾雅釋名碣石者碣然而立在海旁也其大川則有桑乾河自山西大同府流逕宣化府入順天府境古名濕水燕人謂之盧溝河以其流濁而易淤亦曰渾河本朝康熙三十七年隄濬下流改名永定河滹沱河自山西太原府流入經正定保定河閒天津之境漢志滹沱河東至文安過郡六行千三百七十里今下流曰鹽河亦曰子牙河衞河自河南衞輝府流入經大名及河閒之境即古清淇水亦謂之白溝隋大業初引白溝為永濟渠謂之御河自是衛河兼有御河之名元初漕運由㑹通入御河蓋用衛河之全自明至今則用衛河之半易水在易州古為并州之浸有中南北三水出易州西者謂之中易出州西北者曰濡水謂之北易出州西南者曰雹水謂之南易自宋興唐濼故道多湮漳水自河南彰德府流入經廣平順德冀州河閒之境禹貢覃懷底績至於衡漳周禮職方冀州其川漳漢志漳水東北至阜成入大河過郡五行千六百八十里自大河南徙漳水遂經河瀆入海其支流從河南臨漳縣東入大名府魏縣境分新舊二漳入山東館陶縣界合於衛河元以來常資漳河為轉輸之助明萬厯初漳河北徙入滏陽河而館陶之流幾絶近年又全注衞河白河源出邊外自宣化府入順天府境至天津與衞河合古名沽河今亦謂之北運河漕艘由天津抵通州皆由此灤河在永平府境源出宣化府獨石口外屈曲流千餘里入邊由樂亭入海即古濡水也其重險則有井陘在正定府井陘縣其西屬山西平定州境四面高平中窪如井故名吕氏春秋天下九塞井陘其一亦曰土門關山海在永平府撫寕縣與盛京寕遠州接界舊名渝關宋歐陽修曰渝關東臨海北有兔耳覆舟山山皆陡絶竝海東北有路狹僅容車其旁可耕植唐置東硤石西硤石淥疇米甎長楊黄花黄䝉白狼城以扼之居庸在順天府昌平州地記太行八陘其第八陘為軍都即居庸也紫荆在易州西廣昌縣東地記太行八陘其第七陘為蒲陰即此倒馬諸關在保定府唐縣其北屬廣昌縣即戰國時鴻之塞也明初以居庸紫荆倒馬為内三關分列重戍喜峯在永平府遷安縣其北有松亭關即遼金時入中京之道明時以喜峯為朶顏三衛貢道本朝為喜峯路古北在順天府密雲縣兩岸壁立昔時止通人馬不可行車稱為絶險今於口外設州於口内設重鎮獨石在宣化府赤城縣元上都故道明初移開平衛於此為陡絶之地今為獨石路張家諸口在宣化府萬全縣明季為互市之所今曰張家路與山海喜峯獨石皆為外藩朝貢要道文職官直隸總督駐保定府舊設巡撫雍正二年升爲總督兼管巡撫事舊有副總河一員乾隆元年裁以總督兼管河務提督學政巡視長蘆鹽政駐天津府督理長蘆鹽課轄山東河南開封歸徳彰德衛輝懷慶等處鹽務兼管天津鈔關税務理刑司司官二員俱駐承德府辦理本府合屬䝉民事件隸熱河都統轄嘉慶十五年設理藩院差官四員一駐平泉州管理八溝等處税務乾隆十七年設一駐赤峯縣管理烏蘭哈達税務一駐建昌縣管理塔子溝税務嘉慶十五年設一駐朝陽縣管理三座塔税務乾隆十三年設布政使駐保定府經厯理問庫大使按察使駐保定府統轄全省驛傳事務經厯司獄欽命監督二員一駐永平府專管山海鈔關税務一駐宣化府專管張家口税務分巡霸昌道駐昌平州轄大興宛平覇州保定文安大城涿州房山良鄉固安永清東安香河昌平順義懷柔密雲平谷十八州縣兼管屯田驛傳事分巡通永道駐通州轄通州三河武清寶坻薊州寕河六州縣及永平府遵化州兼管河務庫大使通濟分巡清河道駐保定府轄保定