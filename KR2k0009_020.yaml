front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_020-1a}
body:
  text: 奉天府三名宦漢祭肜潁陽人建武十七年拜遼東太守時胸奴鮮卑及赤山烏桓連和強盛數入塞殺略吏民肜勵兵馮廣斥堠冦至數破走之二十一年秋鮮卑萬餘騎冦遼東肜率數千人迎擊之自被甲陷陳斬首三千餘級獲馬數千匹鮮卑震怖不敢復窺塞肜乃離其黨與撫以恩信威聲暢於北方西自武威東盡元菟及樂浪皆來內附野無風塵在遼東幾三十年顯宗徴為太僕及卒烏桓鮮卑每朝賀京師常過冡拜謁號泣乃去遼東吏人為立祠四時奉祭焉耿夔扶風茂陵人拜遼東太守元興元年貊人寇郡界夔追斬其渠帥建光中拜度遼將軍陳禪巴郡安漢人安帝時為遼東太守邊人憚其威強退還數百里襌不加兵但使吏卒往曉慰之單于隨使還郡禪於學行禮為説道義以感化之懷服而去龎參緱氏人河南尹龎奮舉為孝廉厯官遼東太守恩信大著後遷度遼將軍蔡諷拜遼東太守元初五年高句驪王宫與􅐮貊寇元菟諷乃與元菟太守姚光等將兵出塞擊之捕斬􅐮貊渠帥後貊人復以八千人攻遼地殺掠吏人諷等追擊於新昌戰殁功曹耿耗兵曹掾龍端兵馬掾公孫酺以身捍諷俱殁馮緄巴郡宕渠人順帝末鮮卑寇邊以緄為遼東太守曉諭降集寇皆弭散段熲武威姑臧人桓帝時為遼東屬國都尉鮮卑犯塞熲即率所領馳赴恐賊驚去乃使驛騎詐齎璽書詔熲熲於道偽退潛於還路設伏敵以為信然乃入追熲熲因大縱兵悉斬獲之种皓河南洛陽人桓帝時為遼東太守烏桓望風率服迎拜界上公沙穆北海膠東人永夀中遷遼東屬國都尉善得吏人歡心度尚山陽湖陸人桓帝時為遼東太守數月鮮卑率兵來攻尚與戰破之邊人憚畏公孫域永康初為元莵太守扶餘王寇元菟域擊破之耿臨靈帝時為元菟太守貊王伯固犯遼東臨討之斬首數百級伯固降服乞屬元莵公孫瓚遼東令支人靈帝時為遼東屬國長史寇憚其勇遠竄塞外遼耶律隆先義宗子封平王留守東京薄賦稅省刑獄恤鰥寡數薦賢能之士後與統軍耶律舒嚕同討高麗有功蕭孝穆欽皇后族為南京留守改東京留守為政寬簡撫納流徙其民安之尋復為南京留守耶律博諾太祖弟蘇之四世孫太平中為東京統軍使蒞政嚴肅諸部懾服耶律博諾舊作耶律蒲古今改正王棠涿州新城人重熙進士遷東京户部使大康二年遼東飢民多死請賑恤從之大公鼎渤海人咸雍中為瀋州觀察判官時遼東雨水傷稼北樞密院大發瀕河丁壯以完隄防有司承令峻急公鼎獨曰邊障甫安大興役事非利國便民之道乃疏奏其事朝廷從之役罷水亦不為災瀕河千里人莫不悅天祚時為東京户部使時盜殺留守蕭保先始利其財因而創亂民亦互生猜忌家自為鬬公鼎單騎行郡陳以禍福衆皆投兵而拜曰是不我欺敢不聽命安輯如故金高昌福宛平人天會十年進士同知東京留守以治最遷山東西路轉運使工部尚書完顏齊穆宗曾孫大定初授同知復州軍事先是復州哈斯罕關地方七百里因圍獵禁民樵捕齊言其肥衍令富民開種則公私有益上然之為弛禁即募民以居田收甚利因名其地曰哈斯罕明安哈斯罕改見前明安舊作猛安今並改正承暉本名福興章宗初置九路提刑司承暉為東京咸平等路提刑副使豪猾屏息伊喇富森東北路烏爾呼河明安人充遼東宣撫副使歲大飢富森出沿海倉粟先賑其民而後奏之優詔獎諭伊喇富森舊作移刺福僧烏爾呼河舊作烏連苦河今並改正明安改見前梁持勝絳州人纍官咸平路宣撫司經厯官興定初宣撫使布希萬努有異志欲棄咸平徙海蘭路持勝力止之萬努怒杖之八十持勝走上京告行省太平是時太平已與萬努通謀口稱持勝忠而心實不然署持勝左右司員外郎既而太平受萬努命焚毁上京宗廟執元帥承充奪其軍持勝與提控咸平治中費摩薩布萬户韓公恕約殺太平復推承充行省事共伐萬努事泄俱被害費摩薩布舊作裴滿賽不今改正李晏澤州高平人任遼陽推官有政績伊喇子敬遼五院人除同知遼州事舊本廰自有占地嵗入數百貫子敬曰已有公田何為更取民田竟不取伊喇改見前元逹春蒙古札拉爾氏初授東京等路總管府達嚕噶齊以廉勤進開元等路宣慰使東京行中書右丞遼東道宣慰使納延叛力戰却之軍懿州州人羅拜道傍泣曰非公吾屬無遺種矣至遼西討擒餘黨禁止俘掠復領軍討哈坦帝嘉其功賜珍珠上服拜遼陽等處行中書省平章政事逹春舊作塔出札拉爾舊作扎刺兒哈坦舊作哈丹今並改正唐仁祖輝和爾人至元中授翰林學士承旨遼陽飢奉旨偕左丞實都往賑實都欲如户籍口數大小給之仁祖不可曰昔籍之小口今己大矣皆以大口給之民賴活者無數輝和爾舊作畏兀實都舊作欣都今並改正王結易州定興人性敏悟從董朴受經深於性命之學憲使王仁見之曰公輔器也泰定帝元年拜遼陽行省參知政事遼東大水穀價翔踴結請於朝發粟數萬石賑之結平生非聖賢之書不讀非仁義之言不談晚邃於易著易書一卷及卒公卿唁于朝士大夫弔于家曰正人亡矣卒贈資政大夫追封太原郡公諡文忠有詩文十五卷行於世趙洙至正間為遼陽儒學提舉紅巾賊陷遼陽洙與妻許氏避資善寺賊至不屈厲聲叱之遂見殺許氏罵不絶口亦遇害寺僧收其尸葬之明吳立鳳陽宿州人洪武初以人都督府斷事官招撫遼東遷蓋州衛指揮僉事再破納克楚屢有軍功守蓋二十餘年治城郭練兵甲課農興學勤勞夙夜由是兵食饒足政事修舉人多頌之納克楚舊作納哈出今改正房皓仕元為遼陽行省左丞洪武初力贊平章劉益奉表歸款及益被王保保所害皓與右丞張良佐勒兵悉捕其黨馬彥翬等斬之迎吳立鎮撫軍民攝遼東衛事太祖以立與良佐皓俱為指揮簽事共守蓋州後調東寧衛皆有勞績未幾納克楚至見城有備越蓋州至金州敗還皓等乘勝追擊斬獲甚衆張良佐元遼陽行省右丞洪武四年屯兵金州壘土為城與左丞房皓力贊劉益歸附詔以良佐為蓋州衛指揮僉事攝遼東衛事納克楚至良佐擊敗之獲鼐爾布哈於火焰山調復州衛僉事改金州衛上嘉其功賜蟒衣四襲侍卒三人大學士解縉為撰耆德記年九十五卒鼐爾布哈舊作乃兒不花今改正韋富黃岡人洪武八年為金州衛指揮其冬納克楚率衆圍金州時城池未完富與指揮王勝督士卒樹柵補城分守諸門敵蟻附欲登富令城中男女以瓶盛沸惡於城上擲之著人無不糜爛敵驍將鼐喇呼率精騎數百挑戰城下中伏弩仆獲之富縱兵追擊遂敗走乃完城郭繕甲兵創衛治置屯戍宣布恩信撫綏勞來功績甚著鼐喇呼舊作乃刺吾今改正關忠河南獲嘉人洪武中以功升瀋陽中衛指揮僉事創治之𥘉能以撫恤為事政理民安家給人足莊鑑遼東人成化初襲定遼右衛指揮使驍勇有膽決遇敵輒奮數有功官至都督同知鄧佐遼東人定遼前衛指揮使儀表魁梧天資剛勇善騎射有膽力提督軍務王翺薦之擢署都指揮僉事成化三年春隨總兵施英按奉集堡遇敵二千餘佐率五百騎為前鋒奮擊敗之追至蘇珠埒峻山四壁復殺數人鼓戰而前敵併力鏖戰久之有一校策馬西走衆遂潰惟餘五十騎佐悉令下馬扼其歸路督戰益急右手拇指剔弦見骨餘卒死傷略盡佐知不可為遂引佩刀自刎五卜人無一生還者報未至遼人遙見佐乘馬挾弓鼓吹前導自東而回僚屬皆出迎竟不至佐家亦聞鼓吹聲入門老少驚惶逆之竟不見事聞詔自司立祠致祭蘇珠埒舊作樹遮里今改正許進河南人成化初為山東副使分巡遼東威名震懾中官屏息辨疑折獄人稱神明許逵固始人正德間分巡遼海東寧道禮賢愛民聽獄詳明潘宗顏保安衛人萬厯中以户部郎中督餉遼東擢開原兵備僉事四十六年總兵官馬林將出師宗顔上書經略楊鎬曰林庸懦不足當一面乞易池將以林為後繼不然必敗鎬不從命宗顔監林軍出三岔口營稗子峪夜聞杜松敗林軍遂譁及旦大兵大至林恐甚一戰而敗策馬先奔宗顔殿後奮呼衝擊膽氣彌厲自辰至午力不支與遊擊竇永澄守備江萬春贊理通判量爾礪等皆死焉事聞贈大理卿諡節愍立祠奉祀一年與竇永澄等俱本朝乾隆四十賜諡節愍何廷魁威遠衛人天啓初以副使分巡遼陽袁應泰納降廷魁爭不聽及瀋陽破同事者遣孥歸廷魁曰吾不敢為民望大兵渡濠廷魁請乘半濟急擊俄薄城圍未合又請盡鋭出擊應泰並不從遼陽破廷魁懷印率其妾高氏金氏投井死婢僕從死者六人都司徐國全亦自經公署事聞贈大理卿諡忠節本朝乾隆四十一年與徐國全俱賜諡節愍崔儒秀陜州人天啓初為開原兵備僉事時開原已失儒秀募壯士攜家辭墓而行經略袁應泰以兵馬甲仗不足侍為憂儒秀曰恃人有必死之心耳遼陽被圍分守東城矢集如雨不少却會兵潰儒秀痛哭戎服北向拜自經事聞贈大理卿賜祠曰愍忠本朝乾隆四十一年賜諡節愍陳輔堯揚州人萬厯末為永平同知以轉餉出關駐瀋陽天啓元年審陽破輔堯方奉命印烙左右以無守土責勸之去輔堯曰孰非封疆臣何為去望闕拜拔刀自剄贈按察使僉事夲朝乾隆四十一年賜諡烈愍段展涇陽人為自在州知州駐瀋陽天啓元年日暈異常展牒袁應泰言天象示警宜豫防踰月而瀋陽破展死之本朝乾隆四十一年賜諡節愍本朝張尚賢遼東人順治十一年知遼陽府郡方新設地廣人稀尚賢善拊循居一二年人民遂衆後升府尹新設州縣皆遵教令户口日增及去遼陽人建祠祀之范時崇漢軍鑲黃旗人忠貞公承謨子康熙二十三年知遼陽州時議撥屯田時崇以本州屯種有餘請不他徙遼陽民得安生業徐廷璽漢軍正白旗人康熙三十四年為奉天府丞尋遷府尹抑姦暴扶善良振興禮讓旗民皆服人物漢李久遼東人安帝時海賊張伯路寇東萊為青州刺史法雄所破逃至遼東久率鄉勇等共斬之遼地以安李敏襄平人初為河內太守去官還鄉里公孫度欲強用之敏乘舟浮海莫知所終李信敏子敏去後信追求積年浮海出塞竟無所見欲行喪制服則疑父尚存情若舉喪而不聘娶燕國徐邈以不孝莫大於無後勸使娶妻既生子遂絶房室恆如居喪禮不堪武監國以同為佐輔及即位進爵高陽公安難同子有巧思初從杜超南伐以功為淸河太守世祖時諸將頻征和龍皆以難為長史鑿山堙谷省力兼功遷給事中復以軍功賜爵清河子安原同次子雅性矜嚴沈勇多智明元時鎮雲中寬和愛下甚得衆心蠕蠕犯塞輒摧破之賜爵武原侯子頡亦有將略高道悅遼東新昌人孝文時為諫議大夫正色當官不憚強禦詔嘉其謇諤以為主爵下大夫車駕將幸鄴又兼御史中尉留守洛京時宫殿初基廟庫未構車駕將水路幸鄴巳詔回營構之材以造舟楫道悅表諫遂從陸路轉太子中庶子宫官上下咸畏憚之卒贈散騎常侍諡曰貞侯竇瑗遼西遼陽人系出扶風平陵漢大將軍武曾孫崇為遼西太守遂家焉瑗仕魏為太常博士從爾朱榮東平葛榮封容城伯乞以封讓兄叔珍宣武時為廷尉卿及釋奠開講與溫子升魏季景李業興並為摘句天平中除廣宗太守有清白稱轉中山太守為吏民所懷纍遷至大中正兼廷尉卿貧窘如布衣齊獻武王頒書州郡嘗稱瑗政績以為勸厲卒諡曰明朝清遼東人祖暉魏濟州刺史潁川公清襲爵例降為伯為梁城戍將梁師攻圍糧盡城陷清抗節不屈被殺宣武褒贈樂陵太守諡曰忠高崇遼東人少聰敏以端謹稱為尚書郎家資富厚而崇志尚儉素景明中遷洛陽令為政清斷吏民畏其威風縣內肅然卒贈滄州刺史諡曰成高謙之崇子少事後母以孝聞及長專意經史該涉羣書襲父爵孝昌中行河隂縣令先是有人囊盛瓦礫指作錢物詐市人馬因逃去謙之偽枷一囚於馬市宣言是前詐市馬賊密遣腹心察市中私議者有二人相見欣然曰無復憂矣執問具伏悉獲其黨舊制畿縣令得面陳得失時佞幸惡其有所發聞遂奏罷謙之上疏諫為寵要所疾除國子博士修涼書十卷後為李神軌所讒賜死朝士莫不冤之著文章百餘篇行於世永安中贈營州刺史諡曰康高恭之謙之弟學涉經史所交皆名流俊士幼孤事兄如父母御史中尉元匡引為御史糾摘不避權豪正光中出使相州前刺史李世哲尚書令崇之子貴盛一時多有非法恭之發其贓貸具以表聞孝莊時除黃門侍郎遷御史中尉仍兼黃門恭之出秉直繩內參機密凡是益國利民之事必以奏聞諫諍盡言無所顧憚選用御史皆當世名輩後為爾朱世隆所害太昌中贈雍州刺史隋李衍襄平人父弼為周太師行少專武藝慷慨有志略仕隋以行軍總管討叛蠻平之進位柱國拜安州刺史有惠政唐李謹行靺鞨人父突地稽初事隋及唐武德初奉朝貢授總管以戰功封耆國公貞觀初進右衛將軍賜姓李謹行偉容貌勇冠軍中纍遷營州都督高宗時破高麗于發盧河之西妻劉氏亦以伐胸奴功封燕國夫人上元元年發兵討新羅以謹行為安東鎮撫大使三戰皆捷新羅乃入貢謝罪三年破吐蕃于青海封燕國公卒贈幽州都督侯希逸營州人天寶末為州禆將安祿山叛以其親將為平盧節度使希逸率兵與安東都護王元志斬之數擊賊有功以孤軍無援浮海保青州寶應初平史朝義加檢校工部尚書圖形淩煙閣李澄遼東襄平人隋蒲山公寬之裔德宗時為滑州刺史李希烈陷汴滑州亦降興元𥘉澄自永平遣盧融間道奉表謁行在德宗嘉之署帛詔納蠟丸授澄刑部尚書汴滑節度使澄密勒訓士馬以計誅希烈養子之戍白馬者及希烈悉衆圍陳州澄遂引兵歸國貞元初遷檢校尚書左僕射義成軍節度使封隴西王卒贈司空遼高模翰一名松渤海人有膂力善騎射好談兵太祖平渤海模翰避地高麗後亡歸卞獄太祖知其才貰之唐師五十萬攻太原石敬塘求救太宗遣模翰與唐師戰敗之太原圍解上諭曰朕自起兵百餘戰卿功第一授上將軍及晉叛盟出師南伐模翰為前驅殺獲甚衆降杜重威車駕入汴加特進應厯初召為中臺省右相至東京父老歡迎曰公起自戎行致身富貴為鄉里榮相如買臣輩不足過也遷左相卒耶律休格少有公輔器乾亨𥘉將兵救南京與宋戰于高梁河及瓦橋關皆有功聖宗即位太后稱制今休格總南面軍務休格均戍兵立更休法勸農桑修武備省賦役恤孤寡戒戍兵無犯宋境雖馬牛逸于北者悉還之遠近向化邊鄙以安休格智略宏遠料敵如神每戰勝讓功諸將故士卒樂為之用身更百戰未嘗殺一無辜及卒詔立祠南京休格舊作休哥今改正大康乂渤海人開泰間纍官南府宰相出知黃龍府政善撫綏東郡懷服夏行美渤海人大平間總渤海軍于保州大延琳使人説與俱叛行美執之復殺其黨延琳謀沮嬰城自守數月而破超遷行美平章事忠順軍節度使纍遷至副部署致仕卒賜祭于家張琳瀋州人幼有志節壽隆末為祕書中允天祚即位厯遷至南府宰相及中京陷天祚幸雲中留琳與李處溫佐魏王耶律淳守南京處溫父于欲立淳為帝琳阻之曰王雖帝胄初無上命攝政則可即真則不可處溫卒立淳琳不與政鬱悒而卒綽爾齊遼陽人為桂州觀察使高永昌據東京率衆力戰不勝死之綽爾齊舊作雛訛只今改正金王伯龍瀋州雙城人天輔初授世襲明安太祖攻臨潢伯龍以兵護餉擊敗遼兵從攻下中京為靜江軍節度使從宗望伐宋破汴州拔北平取保州及下青州功第一還攻莫州降之積功至延安尹寧昌軍節度使天德中封廣平郡王卒贈特進王政長州熊嶽人當遼季亂浮沈州里高永昌據遼東知政材略欲用之政度其無成辭不就永昌敗渤海人爭縛以為功政獨逡巡引退吳王棟摩聞而異之言於太祖授盧州渤海軍穆昆及伐宋滑州降留政為安撫使前此數州既降復殺守將及是人以為政憂政從數騎入州䆁繫囚發倉廪民皆悅不復叛改權侍衛親軍都指揮使兼掌軍資是時管庫綱紀未立政獨明會計金帛山積而出納無錙銖之失厯保靜軍節度使卒棟摩舊作闍母穆昆舊作謀克今並改正高彪辰州渤海人斡魯攻東京父祿格率其鄉人迎降以為榆河州千户彪代領其衆屢從戰有功天會五年授靜江軍節度使夀州刺史攻城克敵數被重賞彪勇健絶人能日行三百里臨敵身先士卒大小數十戰以少擊衆無不勝捷正隆時厯官樞密副使封舒國公卒諡桓壯性機巧通音律人無貴賤皆溫顔接之祿格舊作六哥今改正托卜嘉遼陽人天會中從宗望破汴京有功為河間路都統已克河間棟摩縱軍大掠托卜嘉諫止之後為揚州都統經略淮海高郵之間皇統中拜右副元帥海陵時進尚書右丞相後請老為東京留守拜太傅纍封漢國王卒贈太師晉國王托卜嘉舊作撻不野今改正趙隇遼陽人仕遼為太子左衛率歸金後以功纍遷檢校尚書右僕射厯宿州防禦使隇重義喜接儒士以事至汴有故人子負官錢百萬以槖金贈之其子悉為私費復代輸之後坐事罷海陵時起為太子詹事鎮沁南卒高松澄州析木人年十九從軍有力善戰宗弼聞其名召置左右世宗即位充管押東京路渤海萬户兵部尚書克實謀反前同知延安尹李老僧欲與松共謀説松曰君有功舊人至今不得大官何也松曰吾一縣令也每念聖恩纍世不能報尚敢他望乎老僧遂不敢言從征斡罕以功遷咸平少尹官至崇義軍節度使卒克實舊作可喜斡罕舊作窩斡今並改正高楨遼陽渤海人少好學嘗業進士斡魯破高永昌以楨同知東京留守事海陵時厯遷御史大夫䇿拜司空封冀國公楨久在臺彈劾無所避每進對必以區别流品進善退惡為言及疾革書空獨語曰某事未決某事未奏死有餘恨卒年六十九楨性方嚴家居無聲伎之奉雖盛暑未嘗解衣緩帶對妻孥危坐終日不一談笑其簡默如此盧克忠貴德州奉集人斡魯克東京高永昌走長松島克忠追獲之後定燕伐宋皆有功厯登州澧州刺史及同知保大軍節度使能察冤獄大定二年除北京副留守會民艱食令民有蓄積者計留一歲悉平其價糶之由是無捐瘠之患後以靖難軍節度使致仕張浩遼陽渤海人天輔中以策干太祖太祖以浩為承應御前文字天會八年進士及第厯遷禮部尚書行六部事簿書叢委決遣無留人服其才改平陽尹郡中大治纍拜太傅尚書令世宗即位拜太師封南陽郡王致仕初近侍有欲罷科舉者浩入見上曰自古帝王有不用文學者乎浩對曰秦始皇上顧左右曰豈可使我為秦始皇乎事遂寢卒諡文康明昌中配享世宗廟庭五子汝為汝霖汝能汝方汝猷皆貴顯而汝霖尤聰慧好學浩嘗稱為千里駒貞元中進士大定九年授太子諭德進禮部尚書後拜平章政事明昌元年卒諡文襄張元素與浩同曽祖以廕得官天眷初知涿州察亷最纍遷興平軍節度使正隆末天下盜起元素發民夫增築城郭同僚諫止之不聽未幾寇掠鄰郡皆無備而興平獨安遷户部尚書出鎮武定致仕元素厚重剛毅人畏憚之高德基遼陽渤海人皇統二年進士為尚書省令史海陵為相專愎自用人莫敢拂其意德基每與之詳辨大定九年遷刑部尚書有犯罪當死者宰相欲從末減德基曰法無二門失出猶失入也不從上召諸尚書諭曰自朕即位以來以政事與宰相爭是非者德基一人而己改户部尚書上書乞免軍需房稅等錢減農稅及鹽酒等課未報後降蘭州刺史大懷貞遼陽人皇統五年除閣門祇候纍遷彰國安武軍節度使縣尉獲盜得一旗上圖亢宿詰之有謀叛狀株連萬人懷貞請誅首亂者十八人餘皆釋之嘗以私忌飯僧數人一僧異常懷貞問曰汝何許人也對曰山西人復問曾為盜殺人否曰無之後三日詰盜果引此僧人皆服為明察改彰德軍節度使卒李石遼陽人世宗母貞懿皇后弟敦厚寡言器識過人天眷中纍官景州刺史海陵時托疾還鄉里大定元年以定策功為户部尚書拜參知政事尋為御史大夫圖克坦子溫平章政事喀齊喀之姪也贓濫不法石劾奏之聞者悚然九年領尚書事拜太保進封廣平郡王致仕卒諡襄簡石以勳戚久處腹心之寄內廷獻替多有足稱明昌五年配享世宗廟庭圖克坦舊作徒單喀齊喀舊作合喜今並改正納喇綽奇咸平路雅哈河明安人契丹科里使人招之綽奇不從瓜里兵且至綽奇遂團結旁近村寨為兵出家馬百餘匹給之教以戰陳擊刺之法相與拒瓜里於改渡口由是賊衆月餘不得進既而瓜里兵四萬人大至綽奇拒戰賊兵十倍遂見執臠而殺之超贈官兩階二子皆得廕用納喇綽奇舊作納蘭綽赤惟哈舊作伊改瓜里舊作括里今並改正明安改見前鈕祜祿額特埒蓋州明安人大定七年授吏部主事厯右補闕修起居注纍遷刑部尚書參知政事世宗嘗曰擇材最難如額特埒所舉者頗稱朕意委提控代州阜通監進尚書右丞兼樞密副使為上京留守還朝拜平章政事封芮國公卒諡成肅性溫厚藴藉在相位十餘年甚見寵遇鈕祜祿額特埓舊作粘割斡特刺今改正伊喇道本名趙三其先伊蘇部人徙咸平為人寬厚有大志以篤孝著名通女直契丹漢字為户部郎安撫山東招諭盜賊事平還京師遷翰林直學士世宗曰道清亷有幹濟宜翰林文雅之職改同知中都路都轉運事厯西北路招討使諸部獻駝馬皆却之進尚書右丞除南京留守入拜平章政事二十三年罷為咸平尹封莘國公上曰咸平卿故鄉地涼事少老者所宜明年卒是歲上幸上京道過咸平遣使致祭詔圖像藏袐省伊喇伊蘇俱改見前高衎遼陽渤海人敏而好學自少有能賦聲同舍生欲試其才使一日賦十題未暮十賦皆就登進士調補漷隂丞世宗時為吏部尚書銓事修理選人便之沃哷忠蓋州人習女直契丹字厯兵部樞密院尚書省令史轉大理寺知法遷右三部司正練達邊事嘗奉使北歸致馬四千餘匹詔褒之章宗時纍官武寧軍節度使性敦慤通法律以直自守不交權貴時譽歸之沃哷舊作斡勒今改正王庭筠蓋州熊嶽人父遵古官至翰林直學士庭筠生未期視書識十七字七歲學詩登大定十六年進士調恩州軍事判官臨政即有聲明昌元年詔試館職中選坐論事罷卜居彰德讀書黃華山寺因以自號三年召為應奉翰林文字遷修撰泰和元年扈從秋山應制賦詩三十餘首上甚嘉之明年卒詔求其平生詩文藏之祕閣庭筠儀觀秀偉外若簡貴人初不敢接既見和氣溢於顏面少有可取極口稱道從遊及所薦引者皆一時名士世以知人許之為文能道所欲言暮年詩律深嚴七言長篇尤工險韻善書法及山水墨竹子曼慶亦能詩并書仕至行省右司郎中自號淡遊云孟奎遼陽人大定進士調黎陽主簿纍遷同知中都路都轉運使值旱詔審録冤獄多所平反大安初除博州防禦使凡屬縣事應赴州者不得泊於逆旅以防吏姦人使之官至北京臨潢府等路按察轉運使諡莊肅瓜爾佳衡咸平人原名河爾布色天定十三年設女直進士衡舉第四人補東平府教授明昌二年拜參知政事四年詔諭之曰卿忠實公方審其是則執而不回見其非則去而能果度其事勢有若權衡可賜名衡胥持國言區種法衡曰若苟有利古巳行之且用功多而所種少恐復荒廢土田無益勞民也承安二年轉上京留守以修完封界詔褒之四年拜平章政事封英國公卒諡貞獻瓜爾佳舊作夾谷阿爾布色舊作阿里不山今並改正瓜爾佳守中咸平人本名阿多古大定二十二年進士厯官通遠軍節度使後移彰德軍未行夏兵數萬入鞏州守中乘城備守兵少不能支城陷不屈夏人壯之載至平涼要以招降府人守中佯許至城下大呼曰夏兵矢盡且遁矣慎勿降夏人交刃殺之詔贈東京留守瓜爾佳改見前阿多古舊作阿土古今改正富察哲魯東京路斡爾逹畢喇明安人大定二十二年進士纍遷北京臨潢按察副使改順義軍節度使西京人李安兄弟爭財府縣不能決哲魯不問會釋奠孔子廟乃引安兄弟與諸生列坐會酒陳説古之友悌數事安兄弟感悟誓不復爭禁遊食簡兵衛盜息獄空大定二年知慶陽夏人犯邊哲魯擊走之至寧元年知平涼府夏人復來攻哲魯招潰卒為禦守計乃退貞祐二年改東京留守致仕及卒取奏稿盡焚之富察哲魯舊作蒲察鄭留斡爾達畢喇舊作斡底必喇今並改正費摩亨其先世居遼東天輔間徙居臨潢大定間亨充奉職世宗謂曰聞爾業進士其勿忘為學也二十八年擢第世宗嘉之升為奉御亨性謹密出入宫禁數年讜論忠言多所禆益未嘗顯示於人一日上問以上古為治之道亨奏陛下欲興唐虞之治要在進賢退不肖信賞罰薄徵斂而巳章宗即位擢監察御史內侍梁道喇驕橫亨劾奏之先是大名府豪猾縱肆亨同知府事宣明約束境內肅然承安中遷中都西京等路按察使時世襲家豪奪民田亨檢其實悉還正之泰和五年改安武軍節度使歲大雪民多凍餒捐俸賑恤又勸僚屬大姓共濟之轉河東北路按察使卒於官費摩亨舊作裴滿亨今改正高守約遼陽人大定進士纍官觀州刺史貞祐元年元兵徇河朔郭邦獻已歸順從至城下呼守約當計全家室守約不顧至再三守約厲聲曰吾不汝識也城破被執不屈遂死詔贈崇義軍節度使諡忠敬高仲振遼東人其兄領開封鎮兵仲振依之以居既而以家業付其兄挈妻子入嵩山博極羣書尤深易皇極經世學安貧自樂不入城市山野小人亦知敬之完顏閭山蓋州明安人明昌二年進士纍官沁南軍節度使入為工部尚書尋改知鳳翔復移平涼屢敗宋兵召為吏部尚書廷議選户部官多舉聚斂苛刻以應詔閭山曰民勞至矣復用此輩將何以堪識者稱之溫特赫達蓋州按春明安人性敦厚寡言笑初舉進士廷試搜閲官易達藐小謂之曰汝欲求作官耶達曰取人以才學不以年貌衆皆異之明昌五年中第遷監察御史轉太常少卿攝侍御史上疏言遼東興王之地當專守以繫一方之心又言宰相繫天下輕重不宜權攝宰相高琪高汝礪惡其言俄充陜州行樞密院參議官仕終集慶軍節度使溫特赫舊作溫迪罕今改正李英遼陽人明昌五年進士調通遠令遷監察御史右副元帥高琪辟為經厯官乃上書高琪曰中都之有居庸猶秦之崤函蜀之劍閣也邇者撤居庸兵我勢遂去今土豪守之朝廷當遣官節制琪奏其書即除工部員外郎充宣差都提控居庸等關隘悉隸焉召還遷翰林侍制因獻十䇿頗施行之為御史中丞督糧運救中都與元兵戰敗死之烏庫哩仲溫本名呼喇蓋州按春明安人大定進士貞祐初為鎮西軍節度使中都被圍以鄉兵馳救不能進還鎮元兵大至城破不屈而死贈資德大夫博索路兵馬都總管諡忠毅烏庫哩舊作烏古論呼喇舊作胡刺今並改正博索改見前高錫德基子以廕補官貞祐初纍遷河北東路按察轉運使城破自投城下而死蒙古綱本名呼爾根咸平府明安人承安五年進士興定初知東平府二年拜右副元帥權行省參知政事遣將平賊於曹濟詔以綱忠貞保完城邑進官二階賜金帶重幣時益都張林據險為亂綱遣右監軍王庭玉討擒之後改兼靖難軍節度使行省邳州綱御下嚴賞罰必信卒為經略使祿格所害呼爾根舊作胡里綱今改正祿格改見前完顏弼蓋州明安人充護軍從丞相襄戍邊功最除同知德州防禦使入為武衛軍副都指揮使尋遷右副都點撿是年東京不守弼為元帥左監軍捍禦遼東請自募二萬人為一軍以應京師衛紹王怒謫為雲內州防禦使貞祐初召赴中都厯知東平府事山東西路宣撫副使招降劉二祖餘黨孫邦佐張汝楫等已而汝楫復謀作亂弼伏甲殺之手詔褒諭封密國公元光末纍官知東平府事山東西路兵馬都總管元兵圍東平弼百計應戰久之乃解圍去尋病疽卒弼生平好讀書延儒士治東平愛民省費井邑之間軍民無相訟有古良將之風焉龎鑄遼東人少擢第仕有聲南渡後為翰林待制遷户部侍郎卒官京兆路轉運使鑄博學工詩文造語奇健不凡世多傳之伊喇阿里哈遼人興定間纍遷霍州刺史四年移霍州治好義堡元兵至阿里哈力戰不能敵兵敗𬒳執誘使降阿里哈曰吾有死無二叱使跪但向闕而立於是叢矢射殺之贈龍虎衛上將軍伊喇改見前阿哈舊作阿里合今改正舒穆嚕元毅本名舒蘇咸平路人以廕補吏部令史纍官彰德府治中前後著績尋以邊警授撫州刺史會邊將失守元毅率吏卒三十餘人出州經畫軍􆄗猝與敵遇州倅暨從吏堅請還元毅曰我輩責任邊守遇賊而奔如百姓何縱使自安復何面目見朝廷衆感其忠爭為效死鏖戰久之衆寡不敵遂遇害贈信武將軍元毅性沉厚武勇過人每讀書見古人忠義事未嘗不嗟歎賞慕故臨難能死所事云舒穆嚕舊作石抹今改正鈕祜祿資祿本姓張氏咸平府人從軍有功興定五年厯金安軍節度使將兵救鄜州城破被執不肯降遂死贈中京留守鈕祜祿改見前高憲遼東人為博州防禦判官後遼陽破死於難圖們色埒默咸平路明安人知彰德府事貞祐四年元兵取彰德色埒默死焉圖們色埒默舊作陀滿斜烈今改正元舒穆嚕額森遼人祖格哷勒誓不食金祿父推勒博奇爾亦不仕額森年十歲問其父宗國之所以亡即大憤及長勇力過人多智略聞太祖起朔方匹馬來歸首言東京可取太祖悅命從穆呼哩取東京額森為先鋒諜知金人新易留守將至獨與數騎邀而段之懷其所受誥命至東京入據府中夜下令易置其將佐部伍三日穆呼哩至不費一矢得地數千里定城邑三十二移師圍破北京將屠之額森以上聞得赦進上將軍以御史大夫提控諸路元帥府事從穆呼哩攻蠡州先登中石死舒穆嚕改見前額森舊作也先格哷勒舊作庫烈兒推勒博奇爾舊作脫羅畢察兒今並改正高宣遼陽人太宗元年詔宣為元帥從睿宗攻大名宣進曰奉命出師伐罪弔民願勿嗜殺人以稱上意睿宗召元帥綽諾諭之下令軍中如宣言及城破兵不血刃民心悅服四年從破金兵三峯山降宣者三千餘户籍以獻以宣為鷹坊都總管賜金符仍令子孫世其職卒封營國公諡簡僖綽諾舊作术乃今改正高天錫宣子事世祖潛邸甚見親幸中統二年授父官為鷹坊都總管尋改燕京諸路總管按察副使天錫語丞相博囉左丞張文謙曰農桑者衣食之本不務本則衣食不足教化不興古之王政莫先於此願留意焉丞相以聞帝悅命立司農司以天錫為中都山北道巡行勸農使尋遷司農少卿進兵部尚書卒諡莊懿封營國公子諒官至兵部尚書亦封營國公諡宣靖博囉舊作索羅今改正耶律有尚遼東丹王十世孫祖父官東平因家焉有尚篤志好學受業許衡邃于性理而尤以誠為主至元十年衡還鄉里朝廷乃以有尚為助教嗣領其學事久之出知薊州以寬簡得民召為詹事長史復除國子監司業時學館未建師弟子皆寓居民屋有尚屢以為言二十四年朝廷乃大起學舍始立國子監及監官而增廣弟子員于是有尚升國子祭酒儒風為之丕振厯昭文館大學士前後五居國學其立教以義理為本而省察必真以恭敬為先而踐履必端身為師表數十年海內宗之猶昔之宗衡也以年致仕卒年八十六諡文正塔斯布哈高天錫孫諒子成宗命世其祖父官以居喪辭纍遷至大司農英宗居東宫塔斯布哈撰集前代嘉言善行名曰承華事略并畫豳風圖以進帝覽之獎諭曰汝能輔太子以正朕甚嘉之命置圖書東宫俾太子時時觀省後退居於家卒塔斯布哈舊作塔失不花今改正李希賢遼東人延祐間為臨武令愛民禮士獄訟清明常語人曰君子學道則愛人自然生明能斷去任後邑人立石頌德題其額曰學愛郭全遼陽人幼喪母哀戚如成人及壯父庭玉又卒居廬三年啜粥面墨事繼母唐古氏甚孝唐古氏生四子皆幼全躬耕以奉養既長娶婦各求分財異居全不能止凡四廬器物悉自取朽敝者奉唐古氏以居甘旨無乏唐古氏卒全年六十餘哀痛毁瘠廬其墓終喪狀聞褒表之明吳成遼陽人從成祖起兵有功遷都指揮僉事永樂初授都指揮使三從出塞洪熙元年以功進左都督宣德𥘉以成嘗宿衛東宫録舊勞封淸平伯三年帝北征從敗賊於寬河進侯卒贈渠國公諡壯勇張升定遼中衛人幼聰悟善屬文嘗謁巡撫王翺試諭寇檄援筆立就辭氣沛然翺大驚異舉正統十二年鄉薦授都司學訓導坐詿誤謫置隆慶州用薦復為萬全都司學訓導學舍有井向苦味鹽升濬之遂甘冽士人呼為張先生井陳鑑蓋州衛人正統十三年進士及第遷翰林學士使朝鮮還撰皇華集為人所稱厯官祭酒禮部侍郎顧能定遼前衛人天順元年進士授户部主事有清操不妄受人一錢嘗監收通州糧盡革諸弊再往淮安收錢計一歲所入九倍於昔尋遷本部員外郎至京卒成化初天下淸官四員能居都御史楊繼宗之次憲宗刻其名於便殿柱上惜不及大用云耿賢定遼前衛人由指揮升都指揮僉事掌都司印備禦金復鐵嶺尋守備寧遠轉右參將分守開原善撫士卒不妄交際致仕歸所屬憫其清苦各饋金幣賢悉分之軍士後卒葬城東杏林山與其師顧能墓相近詩人弔之以為師弟雙清云胡深定遼後衛人早孤育於伯父登天順八年進士授監察御史剛正嫉邪不避權幸成化初與同官鄭已等爭慈懿太后山陵事彗星見復與同官言大本未建異端太盛進退賞罰未公財用工役未省賑濟無䇿備禦無方凡八事帝優詔答之又上疏請斥姦邪痛詆大臣不納深嘗巡按陜西諸大臣既被劾惡之坐以按陜時杖殺人謫黔陽縣丞稍遷鬱林知州卒於官劉旺三萬衛人為都指揮使成化間敵入邊與其子塔斯於古城堡設伏伺之敵至出戰授絶矢竭突圍不得出父子俱殁於陳塔斯舊作答厮今改正蘭英蓋州軍成化初調廣寧守備役於總兵歐信九年春隨信追敵於小黑山敵因風縱火軍潰信馬中箭死英以已馬授信得出英遇害巡撫李貢刻辭於墓以表之劉鼎東寧衛人成化中為鴻臚序班母姚殁鼎負土為墳廬墓三年又有定遼左衛人劉定成化中亦以廬墓旌表孫磐定遼右衛人少有氣節登宏治九年進士初觀政即上疏言近日諌官以言為諱請定建言者為四等最上不避禍患抗彈權貴者其次楊清激濁能補闕拾遺又其次建白時政有禆軍國皆分别擢敘而粉飾文具循默不言者則罷黜之庶言官知警不至曠􅘃時不見用尋擢吏部主事正德元年宦官漸用事磐復上疏言今日弊政莫甚於內臣典兵乞盡撒各鎮中官還京專以兵務責將帥不從及劉瑾得志斥磐為姦黨勒之歸瑾誅起河南按察使僉事坐纍罷張經瀋陽中衛人正德六年進士授新樂縣知縣擢監察御史按宣府劾鎮守太監丁喜貪肆罪為喜所訐逮繫詔獄都御史彭澤及兩京監官論辨其誣謫河南河內縣典史憂憤卒於途妻子扶柩歸葬嘉靖改元贈光祿少卿范鏓其先江西樂平人遷瀋陽舉正德十二年進士授二部主事遷員外郎嘉靖三年伏闕爭大禮下獄廷杖遷河南知府歲大飢巡撫潘塤駮諸請賑文牒候勘實乃發鏓不待報輒開倉賑之全活十餘萬厯遷右副都御史巡撫寧夏鏓為人持重有方略既蒞鎮不上首功一意練步騎廣儲蓄繕治關隘亭障寇為遠徙居數年引疾歸起故官撫河南尋召為兵部右侍郎奉詔總理邊關厄隘奏上經略潮河川居庸關諸處事宜帝才鏓甚即命為兵部尚書鏓以老辭帝怒削其籍時嚴嵩當國而鏓本由徐階薦天下推為長者惜其去不以罪久之乃卒隆慶元年復官閻懋官定遼右衛人嘉靖中為中路遊擊三十五年達喇蘇以卜餘萬騎入廣寧總兵殷尚質急率懋官禦之塔兒山敵先突懋官營不為動乃馳攻尚質懋官馳救遂戰死初懋官父振先為參將陳亡懋官繼之世濟忠義事聞贈都督同知廕子立祠達喇蘇舊作打乘孫今改正應時盛遼陽人起自小校立功至山西副總兵為巡撫蔡懋德所信任賊李自成來攻城城破懋德欲自刎為其下所救時盛呼曰出西門懋德不行時盛曰公不負國家時盛安敢負公懋德遂就縊時盛俟其既絶再拜訖抽弓絃自絞死本朝乾隆四十一年賜諡忠烈趙允植遼陽人仕盧龍教諭品行端方勤於訓士崇禎庚午大兵破盧龍允植與妻欽氏並殉難其女亦殉難死高應詔遼東人以指揮同知分防水冶鎮流賊東下應詔率兵連戰破之賊大舉入寇復拒之於倪村孤軍援絶遂戰死水冶卒全賊退民求得其尸瘞鎮之東源本朝乾隆四十一年賜諡烈愍王世泰遼東人崇禎時知內邱縣流寇掠西山與其弟禦之戰死四十一年本朝乾隆賜諡烈愍吳良能蓋州人崇禎時知滕縣十五年城破良能拜辭其母單騎犯陳死本朝乾隆四十一年賜諡忠烈何可綱遼東人天啓中為守備典袁崇煥寧遠道中軍亷勇善撫士卒以功纍遷署寧遠副將事崇禎初崇煥再出鎮仍以可綱為中軍加都督僉事進右都督三年永平灤州失守可綱連戰有斬獲尋復永平加太子太保已而錦州被圍督諸將赴救立功郵馬山復進秩與祖大夀監護築城大淩河工甫竣大兵十萬攻之可綱堅守不下糧絶援盡諸將皆欲降不從大夀令二人掖出城外殺之可綱顏色不變亦不出一言含笑而死本朝乾隆四十一年賜諡忠節黃龍遼東人初以小校從復錦州纍官至參將崇禎初從復灤州功第一遷副總兵登萊巡撫請龍鎮東江充總兵官從之龍抵皮島部將反陷登州龍急遣將撫定諸島誅叛黨焚賊舟擊走賊高成友移駐旅順大治兵賊拘龍母及妻子以脅之龍不顧勒兵攻賊斬賊魁十六人奪還婦女無算明年大兵攻之龍被圍力盡自刎死贈左都督賜祠曰顯忠本朝乾隆四十一年賜諡忠烈李輔明遼東人纍官副總兵崇禎八年從祖寬南伐屢敗賊衆明年追破之於滁州加都督僉事擢山西總兵官𬒳劾罷復官十六年大兵攻寧遠輔明力戰殁於陳贈右都督賜祭葬列壇前屯祀之本朝乾隆四十一年賜諡烈愍祖寬遼東人少從軍有功纍官寧遠參將勇敢善戰部卒多塞外降人所向克捷崇禎五年叛將李九成圍萊州詔發關外兵討之寬為前鋒率五百騎遇賊兵於沙河寬殊死戰賊退走解萊州圍進都督僉事八年為總兵官討流賊挫張獻忠於焦村復遇汝州賊擊敗之伏尸二十餘里李自成圍滁州寬率軍至大敗之十二年被逮棄市寬敢戰有功稱良將性剛使氣不為文吏所喜卒致大辟莫為論救人頗謂失刑云劉肇基遼東人崇禎末加都督同知提督南京大教場及史可法督師淮揚屢加左都督太子太保及大兵南下自白洋河入援抵揚州分守北門城破率所部巷戰死之本朝乾隆四十一年賜諡忠烈莊子固遼東人官副總兵屯徐州歸德間聞揚州被圍率衆馳救城破死之本朝乾隆四十一年賜諡烈愍曲從直遼東人官揚州府同知大兵圍揚州分守東門城破不屈被殺一年本朝乾隆四十賜諡烈愍黃得功開原衛籍其先合肥人少負奇氣膽略過人時邊事起得功持刀雜行伍中隸經略為親軍纍功至遊擊崇禎九年遷副總兵分管京衛營十一年以禁軍從總督熊文燦擊賊於舞陽又從擊賊馬光玉於淅川之吳村王家寨大破之詔加太子太師署總兵銜十四年以總兵護鳳陽泗州陵駐定遠張獻忠攻桐城得功與劉良佐合兵擊之賊敗遁追斬賊將馬武王興國得功箭傷面愈自奮轉戰十餘日所殺傷獨多十七年封靖南伯福王立江南進封侯命移家鎮太平一意辦賊論功加柱國時大兵巳渡江福王潛入其營得功泣曰願效死得功戰荻港傷臂幾墮以帛絡背督麾下八總兵前迎戰忽飛矢中其喉偏左得功知不可為擲刀拾所拔箭刺喉死其妻聞之亦自經得功忠義出天性聞以國事相規誠者輒屈己改不旋踵其軍行紀律嚴下無敢犯所至人感其德本朝乾隆四十一年賜諡忠桓本朝武功郡王禮敦景祖翼皇帝長子興祖直皇帝創業禮敦所向克敵時有二強族曰額色納曰嘉瑚皆輕悍不服禮敦同寧古塔諸貝勒討之破滅二族盡收五嶺迤東蘇克素護河迤西二百里內諸部尋卒崇德間追封為王配享太廟慧哲郡王額爾衮景祖翼皇帝第二子順治十年追封為王十一年配享太廟宣獻郡王齋堪景祖翼皇帝第三子順治十年追封為王十一年配享太廟誠毅貝勒穆爾哈齊顯祖宣皇帝第二子也驍勇無前以功猝至賜號誠毅常隨征哲陳部略地深入敵兵太祖高皇帝率穆爾哈齊延布祿烏凌阿直前衝擊敵衆敗走追至吉林岡立其巔潰卒十餘人忽趨上太祖高皇帝射一人貫其脊顛穆爾哈齊又射一人殪之餘驚悉墜崖死順治十年追封多羅貝勒諡勇壯通達郡王雅爾哈齊顯祖宣皇帝第四子太祖高皇帝同母弟也順治十年追封為王十一年配享太廟乾隆十九年與武功慧哲宣獻三郡王並入祀賢王祠四十三年並命國史館立四王專傳廣略貝勒褚英太祖高皇帝第一子也初同巴雅喇台吉等征安楚拉庫路有功賜號洪巴圖魯尋封貝勒瓦爾喀斐悠城人民苦烏拉國布占泰之虐願聚族來歸丁未春禇英等率兵收其屯寨五百户布占泰以萬人要諸路禇英與弟代善策馬前擊破之布占泰棄甲而逃以功賜號廣略戊申春復征烏拉圍宜罕山城俘其衆以歸乙卯年薨禮親王代善太祖高皇帝第二子也忠果英勇從征哈達輝發葉赫等國論功授貝勒瓦爾喀斐悠城人苦烏拉國布占泰之虐乞移家歸附丁未嵗太祖高皇帝命與貝勒舒爾哈齊禇英等率兵往徙之乘夜隂晦行見大纛之上有光衆以為異取視無有復樹之光如初舒爾哈齊疑之欲回兵代善曰或吉或凶兆已定吾等何所見而遽還耶遂決意進兵盡收環城屯寨五百户令侍衛扈爾漢護之先行布占泰邀諸路不得進次日諸貝勒至代善及禇英各率兵五百分路夾擊大敗之代善從馬上攫貝勒博克多胄而斬之並斬其子生擒貝勒瑚哩布及常住父子太祖高皇帝嘉其功賜名古英巴圖魯癸丑年正月太祖高皇帝征布占泰代善從時烏拉三萬人越富勒哈城而軍諸貝勒大臣皆願戰太祖高皇帝猶未欲加兵將遣使申諭代善進曰我士飽馬騰利在速戰所慮者布占泰不出且今彼兵既出平原曠野可一鼓擒也舍此不戰厲兵秣馬將何為耶太祖高皇帝曰我用兵以來無不身先搏戰但恐貝勒諸大臣或致有一二被傷實深惜之耳衆志既孚即可決戰因命進兵代善隨太祖高皇帝親突陳大敗其兵遂克其城布占泰遁走天命元年太祖高皇帝即帝位授大貝勒四人以代善為首三年四月從太祖高皇帝伐明會天雨代善固請進兵太祖髙皇帝善其言遂下撫順等城及堡寨五百餘處大軍已出關明廣寧總兵張承廕等來追時太宗文皇帝為四貝勒與代善率兵迎擊之盡殲其衆四年正月命往守扎喀關二月明大發兵四路來侵太祖高皇帝率師親征代善先行遂過扎喀關集兵以待太宗文皇帝以祀事後至謂界藩山築城夫役宜急防衛代善遂同督兵赴界藩山斬敵衆百人復敗明總兵杜松等於薩爾滸山又明總兵馬林營尚間崖潘宗顔營斐芬山互為掎角太祖高皇帝命步兵接戰方傳諭敵兵自西突至代善呼曰兵已進矣即怒馬迎戰直入其陳遂敗敵兵明總兵劉綎由寬甸路來犯太宗文皇帝督兵登岡從上衝擊代善率左翼兵自西夾攻之敵衆披靡劉綎殁於陳六年三月大軍取明瀋陽明總兵李秉誠以兵來援太宗文皇帝擊敗之代善及貝勒嶽託共逐四十里斬馘甚衆十一年八月太祖高皇帝上賓代善在諸子最長而我太宗文皇帝功德隆茂衆望尤屬代善遂與子嶽託薩哈璘等作議書言紹承大統必得聖君始能戡亂致治以成一統自顧德薄願共推戴四貝勒嗣位入朝遍示諸貝勒大臣等衆皆喜太宗文皇帝辭讓再三代善言益懇切衆議亦堅太宗文皇帝乃從之崇德元年四月封功臣晉代善為和碩兄禮親王十二月從太宗文皇帝征朝鮮受其降以歸三年太宗文皇帝征喀爾喀同鄭親王濟爾哈朗等留守並監築遼陽都爾弼城八年八月太宗文皇帝上賓世祖章皇帝嗣位郡王阿達禮及貝子碩託謀立睿親王多爾衮代善發其謀俱伏誅碩託為代善第二子阿達禮則其孫也順治元年朝元旦世祖章皇帝命上殿母拜以優異之五年十月薨子滿達海襲是年新定諸王葬費親王例給銀五千世祖章皇帝以代善功德懋著特賜萬兩立碑紀功康熙十年五月追諡曰烈復立碑以表於墓乾隆四十三年特奉諭旨以禮親王誠心推戴勤勞王室懋著壯猷克昭駿烈其後改封為康親王親賢世胄竟改初封嘉號何以垂詒奕祀示酬庸追本之義著仍復原稱封號並配享太廟鎮國公阿拜太祖高皇帝第三子也天命十年與弟塔拜巴布泰統兵征呼爾哈部俘其衆以還以功授備禦升三等副將崇德間任吏部承政尋封鎮國將軍復率兵往錦州南乳峯山駐防順治四年晉二等鎮國將軍五年卒追封鎮國公諡勤敏塔拜以征呼爾哈功授遊擊世職纍封三等輔國將軍卒順治間追封輔國公諡慤厚饒餘親王阿巴泰太祖高皇帝第七子也初以戰功封台吉天命四年六月隨伐明克撫順八年四月太祖高皇帝命與諸台吉往征喀爾喀札嚕特部昻安以其執我使送葉赫故昻安傷我前鋒統領岱穆布阿巴泰大怒斬昻安父子並從者俘其孥以還以功晉封貝勒天聰元年五月太宗文皇帝伐明阿巴泰與貝勒杜度居守二年五月命與嶽託等率兵墮錦州城三年十月太宗文皇帝親統師伐明命與貝勒阿濟格率兵攻龍井關克之又擊斬明三屯營哨卒抵漢兒莊會大貝勒莾古爾泰等降明守將李豐等十二月與濟爾哈朗等率兵略通州焚其船攻張家灣克之復與大貝勒代善率護軍往略薊州破山海關援兵五千餘人五年初設六部命理工部事七年六月詔問貝勒大臣用兵宜先伐何國阿巴泰言宜選精兵襲明邊牆則關門可得大軍屯於邊外擇諸貝勒將兵分路馳入若獲可用之人送至大寨遣入內地則消息愈通錦州無足過慮我兵既入是天時己至令祖大壽入山海關便可與我兵相會合也八月同薩哈璘豪格等略明山海關俘獲無算崇德元年四月敘功封為饒餘貝勒六月伐明至安州凡克十二城凱旋太宗文皇帝親往迎之十二月太宗文皇帝親征朝鮮命駐防噶海城三年二月太宗文皇帝親征喀爾喀令留守盛京併監築遼陽等城五月修治盛京至遼河大路與多爾衮董其役四年九月略明錦州寧遠五年六月與多爾衮等於義州築城屯田七月刈錦州城西禾敗錦州兵與杜度截明運糧兵獲其米千石牲畜百餘而還十二月同多爾衮豪格杜度率兵往代濟爾哈朗等圍錦州六年六月擊敗關內援兵于松山七年三月同濟爾哈朗等攻杏山以炮擊墮其城降之十月特授奉命大將軍率師伐明直抵兖州府下樂陵等處自濟以東州縣望風降附八年六月班師賜銀萬兩是月人令與諸貝勒分道伐明會師延慶州順治元年四月世祖章皇帝念開國宗勛晉封多羅饒餘郡王二年正月命為總統率官兵代豪格剿土賊於山東二月遣凖塔等擊賊於徐州賊衆奔潰赴河死者無算三年三月薨賜諡曰敏尋以子嶽樂晉封親王贈如其爵睿親王多爾衮太祖高皇帝第十四子也生而聰慧多智略天聰二年三月從太宗文皇帝征察哈爾大捷特賜號墨爾根岱青貝勒三年九月從伐明逼燕京五年八月從設六部太宗文皇帝攻克大淩河是年初命掌吏部事八年五月從太宗文皇帝伐明分道入邊略朔州至五臺山而還崇德元年四月以功封和碩睿親王六年八月大兵圍錦州明經略洪承疇以兵十三萬來援軍容甚盛太宗文皇帝聞之親統大軍渡遼河疾馳六日至七家堡多爾衮請進軍駐松山杏山之間太宗文皇帝從之明松山諸將見黃幄羽葆軍逼山而營大懼謀夜遁多爾衮率兵趨塔山大路橫擊之潰兵沿山至海死者相枕藉明總兵吳三桂等單騎奔入杏山乃率兵還七年三月復同濟爾哈朗圍錦州明總兵祖大壽力竭以城降四月又破塔山杏山關門以東盡入版圖八年世祖章皇帝即位代善等集諸貝勒大臣議以多爾衮與濟爾哈朗同輔政順治元年將大舉南征世祖章皇帝御篤恭殿賜多爾衮大將軍敕印時流賊李自成巳破燕京山海關總兵吳三桂遣其將郭雲龍等致書請兵多爾衮以書報之吳三桂復請速進兵多爾衮得書率兵夜馳踰寧遠次沙河距山海關十里三桂報賊已出邊立寨柵多爾衮隨令諸王等率精兵迎擊之敗賊將唐通於一片石師至山海關三桂開關親出迎多爾衮謂三桂曰爾歸營令爾兵繫白布為識恐與賊混致誤殺也使之先驅遂入關時李自成所率賊二十餘萬皆久厯戰陳殊剽悍恃其衆陳於關內自北山亙海我兵少對賊布陳不能橫及海岸多爾衮集諸王貝勒大臣謂曰流賊橫行久獷且衆不可輕擊也吾觀其陳大相去遠首尾不能顧可鱗次集我兵對賊陳尾伺其氣衰突擊之必勝努力破此則大業成矣勿越伍躁進違節制陳既列令三桂居右翼之末先悉其衆搏戰賊力鬬圍開復合戰良久我兵從三桂陳右突出衝賊中堅萬馬騰躍飛矢雨墮天大風沙石飛走擊賊如雹自成方登高岡觀戰知為我兵膽盡落急策馬下岡走我兵無不一當百追奔四十里賊衆大潰自相踐踏僵尸遍野溝水盡赤自成奔還五月整兵入京師遣武英郡王阿濟格等分道追自成連破之自成走西安燕京附近各城俱納款畿輔肅清乃定議迎世祖章皇帝都燕京時明南京諸臣擁立福王朱由嵩稱帝號其大學士史可法督師揚州多爾衮致書招之可法遣人報書多爾衮得書知不能屈遂定議下江南九月世祖章皇帝車駕至京師加封多爾衮為叔父攝政王七年十二月薨於喀喇城世祖章皇帝率王貝勒大臣等迎其喪於東直門外八年二月蘇克薩哈等首告多爾衮薨時其侍女烏爾庫尼將殉呼近侍羅什博爾惠等告以多爾衮曽製八團龍補黃袍等衣屬令潛置棺內羅什等如其言以殮又多爾衮欲於永平圈房率衆移駐與和洛會羅什等密議巳定特以出獵稽遲未行事聞經王大臣等定議追削王爵並黜宗室乾隆四十三年特奉諭旨以睿親王首先統衆入關定國開基厥功最著顧以誣告謀逆經諸王定罪除封其時我世祖章皇帝尚在沖齡未嘗親政也朕每覽實録見王之立心行事實能篤忠藎感厚恩深明君臣大義為史册所罕覯乃令王之身後久抱不白之冤於泉壤心甚憫焉假令當時王之逆迹稍有左驗削除之罪果出我世祖聖裁朕亦寧敢復翻成案乃實由宵小姦謀搆成冤獄而王之政績載在實録皆有大功而無叛迹又豈可不為之昭雪著加恩復還睿親王封號追諡曰忠輔入玉牒補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭並配享太廟用昭彰闡宗勛至意豫親王多鐸太祖高皇帝第十五子也初授貝勒天聰二年三月從征察哈爾多羅特部大捷太宗文皇帝往賜號額爾克楚呼爾五年九月太宗文皇帝親率軍擊錦州多鐸從以二百人敗錦州兵七千於城下七年六月詔問羣臣伐明與朝鮮察哈爾宜何先多鐸言宜伐明直入長城圖久長之計八年五月太宗文皇帝親伐明多鐸從率兵入龍門口敗明兵克保安州九年征山西太宗文皇帝以明必調寧遠錦州兵援山西命多鐸率精兵入廣寧以遲其救援敗祖大夀等兵太宗文皇帝以多鐸初專閫外能出奇取勝嘉獎之崇德元年四月晉封和碩豫親王六月命掌禮部事十二月從太宗文皇帝征朝鮮戰皆有功三年緣事降貝勒四年八月命掌兵部事五年三月奉命為左翼總統與濟爾哈朗往修義州城駐師屯田六年三月代多爾衮圍錦州松山繞錦州城立壕為久駐計城中惶懼守門蒙古諾木齊武巴什縋書約降祖大夀知有異志欲以計擒之諾木齊等即執兵拒外城蒙古亦執兵助既接戰聲聞關外多鐸與濟爾哈朗至城下援之關內蒙古縋援兵入與明兵戰於城上明兵敗大軍遂入關徙其民義州捷奏至太宗文皇帝大悅八月明經略洪承疇以八總兵十三萬衆來援錦州太宗文皇帝親統大軍征之簡精兵付多鐸令設伏遂夾擊總兵吳三桂等兵敗之尋又奉命圍松山城內夜出兵來犯擊敗之斬首千餘級十二月承疇自松山率兵夜出來犯多鐸令沿濠射之悉敗去城中益困七年二月松山副將夏承德密遣約降為內應以其子舒出質夜半諸將士舉梯登城城遂克生擒承疇及巡撫邱民仰等七月敘功晉封多羅豫郡王順治元年四月從多爾衮入關破流賊定燕京十月晉封和碩豫親王時明福王朱由嵩自立於南京遣兵扼淮徐為割據計而李自成尚據陜右多鐸奉命為定國大將軍率師南征由河南進趨潼關大敗自成之衆自成精鋭略盡遁至西安二年正月多鐸度潼關師破西安自成奔商州南走湖廣二月捷聞世祖章皇帝以流賊既竄西安平定關中綏撫事宜付英親王阿濟格等命多鐸率大軍由河南趨淮揚討江南四月渡淮趨揚州招諭守揚閣部史可法等降不從攻克其城獲可法等斬之五月南京平擒福王於蕪湖捷聞皇帝嘉悅遣侍臣赴軍中勞之七月世祖章詔以貝勒勒克德渾為平南大將軍代多鐸還十月凱旋晉封和碩德豫親王三年五月蘇兄特部騰機思等叛奔喀爾喀詔以多鐸為揚威大將軍往征七月多鐸等至營阿爾察克山聞騰機思在衮噶嚕台星夜疾進三日追及於諤特克山獲其妻子及牲畜喀爾喀土謝圖汗以兵二萬碩雷汗以兵三萬先後邀大軍於扎濟布喇克之地多鐸俱擊敗之各追逐數十里十月凱旋世祖章皇帝出安定門迎勞四年七月晉封輔政叔德豫親王賜金十兩銀萬兩鞍馬二册文稱定鼎中原以來所建功勳卓越等倫云六年三月薨命立碑紀功九年三月鄭親王濟爾哈朗等會議多鐸係多爾衮同母弟追降郡王康熙十年五月追諡曰通乾隆四十三年特奉諭旨以豫親王從睿親王入關肅清京輦即率師西平流寇南定江浙實為開國諸王戰功之最乃以睿親王誣獄株連降其親王之爵後又改封信郡王以王之勛績超邁等倫自應世胙原封以彰殊眷著仍追復親王還號為豫並配享太廟鄭親王濟爾哈朗舒爾哈齊第六子也幼育於太祖高皇帝宫中號和碩貝勒天命十一年四月從禮親王征蒙古五部有功天聰元年正月同貝勒嶽託等伐朝鮮及明皮島帥毛文龍大軍薄義州克之遂進拔安州定州搗毛文龍所居鐡山直逼朝鮮平壤城朝鮮遣使來請和議未決嶽託與濟爾哈朗議濟爾哈朗曰兵不可深入聞去此三十里有平山城者可駐兵以待和議之成遂引軍駐平山朝鮮王李倧遣使至議歲貢許之遂定盟振旅歸五月從太宗文皇帝伐明至寧遠城與明總兵滿桂兵遇力戰被創氣彌奮大敗其衆三年九月同嶽託等率兵往略明錦州寧遠焚其積聚而還十月太宗文皇帝親統大軍伐明命同嶽託攻大安口毁其水門乘夜進兵明馬蘭營參將率兵來援我前鋒軍擊走之比明見明援兵立營山上濟爾哈朗先縱兵往敗其衆追至馬蘭營既而嶽託復敗遵化州援兵自辰迄巳五戰皆捷十二月同貝勒阿巴泰等率兵往焚明通州船遂攻張家灣克之五年七月初設六部命理刑部事七年五月與杜度等往迎明降將孔有德耿仲明於江上獲明及朝鮮降人以歸八年五月太宗文皇帝征察哈爾留守盛京十年四月改元崇德晉封和碩鄭親王十二月太宗文皇帝征朝鮮復留守四年五月往略明錦州松山與明兵遇九戰九敗之俘獲甚衆五年九月同阿濟格等率兵伐明代睿親王圍錦州松山師至錦州敵伏兵皆驚遁六年三月復同阿濟格多鐸等克錦州捷聞太宗文皇帝大悅令八門擊鼓召衆於篤恭殿宣捷五月又敗明經略洪承疇兵六萬於松山八月洪承疇等率兵十三萬來援錦州太宗文皇帝親統大軍征之命留守九月復從圍錦州十二月承疇以兵六千夜犯正紅正黃兩旗營濟爾哈朗令軍各依汛地沿濠射之敵敗去會松山城門閉不得入盡降其衆七年四月同多爾衮等率兵攻塔山克之進攻杏山城中懼開門降七月賜鞍馬一蟒緞百八年八月世祖章皇帝嗣位以濟爾哈朗與多爾衮輔理國政順治元年十月晉封信義輔政叔王賜金千兩銀萬兩緞千匹五年三月貝子屯齊等訐告兩旗大臣謀立豪格濟爾哈朗知而不舉議罪降多羅郡王閏四月復爵九月命為定遠大將軍討湖廣流賊李錦等收復府州縣六十餘城擒斬偽王以下文武官以百計湖南貴州悉平七年正月振旅還四月賜金二百兩銀二萬兩嗣以與多爾衮不合罷輔政九年二月晉封叔和碩鄭親王十二年二月上疏言政事大略言無蔽言路無弛武備恤滿洲官兵疾苦立史官起居注官世祖章皇帝嘉其言五月病劇有遺言乎泣對曰臣受車駕臨問問三朝深恩未能仰答不勝感痛惟願以取雲貴滅吳三桂統一四海為念且滿洲甚少而能破流寇取京都者應加撫恤世祖章皇帝垂涕曰天何故不令朕叔長年耶言巳大慟詔畫工往圖其像留宫中及薨輟朝七日賜祭葬所給銀兩視定例倍之十四年立碑紀功稱忠冠當時功昭後世云康熙十年六月追諡曰獻乾隆四十三年特奉諭旨以鄭親王後改封簡親王親藩世胄改易原封不足以昭彰闡宗勛襲慶承家至意著仍復原封稱號並配享太廟貝勒芬古舒爾哈齊第八子鄭親王弟也天聰初任都統從征大凌河芬古圍城之西南斷其出入太宗文皇帝幸松山營城中兵突出芬古等夾擊敗之又令軍士偽為援兵自錦州至者以誘城內兵而伏兵於山腹以待祖大夀望見果統衆出芬古偕諸將又擊敗之敵不敢復出八年與貝勒德格類入明獨石口取長安嶺攻赤城克其郭九年從多鐸駐師寧錦制明援兵崇德元年從武英郡王阿濟格入長城破敵又同征朝鮮入其城以功封固山貝子緣事革爵尋復封輔國公六年從圍明松山明兵遁追擊大破之七年從貝勒阿巴泰征明至薊州克其城八年卒順治十年追封貝勒諡靖定肅親王豪格太宗文皇帝第一子也英毅多智略從征蒙古諸部功最著授貝勒天命十一年四月隨大貝勒代善征蒙古五部有功天聰元年五月太宗文皇帝伐明豪格同諸貝勒往衛塔山糧運前軍猝與明兵遇時明兵二萬我兵以八十人擊敗之三年十月從太宗文皇帝伐明大兵進逼北京大貝勒莾古爾泰率諸貝勒迎接明援兵於廣渠門外敵以重兵設伏於右莾古爾泰令諸貝勒擊其右豪格如命衝敵右敗其伏敵遂潰四年正月與嶽託還守瀋陽六年五月太宗文皇帝征察哈爾遂伐明豪格從略歸化城等處有功六月晉封和碩貝勒七年八月與阿巴泰等略明山海關有功八年七月伐明太宗文皇帝親統兵由宣府趨朔州豪格同揚古利毁邊墻入大兵遂由尚方堡分道進旋同貝勒多爾衮略朔州及五臺山而還復從攻大同擊敗明援兵九年二月命與多爾衮嶽託薩哈璘統兵往收察哈爾林丹汗子額哲帥至錫喇珠爾格遇察哈爾汗妃及台吉索諾穆等以千五百户降遂抵託哩圖託哩圖者額哲所駐地也會天大霧乘其無備遣葉赫貝勒錦台什之孫南楚等先往見額哲母蘇泰福晉諭以奉命招撫意額哲母命額哲率衆迎諸貝勒入遂定盟次日率所部降額哲以古玉璽獻文曰制誥之寶元順帝奔應昌時所失後林丹汗得之者也崇德元年四月晉封和碩肅親王兼攝户部五年六月同多爾衮等屯田義州尋以多爾衮輕違諭旨豪格亦坐罪降郡王六年六月同多爾衮等圍錦州敗洪承疇兵九月還守盛京十一月復命圍松山七年二月松山副將夏承德密遣人請降太宗文皇帝許之用為內應時豪格同貝勒等率兩翼兵梯城南先登遂克松山擒承疇等四月同濟爾哈朗攻塔山克之七月敘功復原封順治元年以語侵多爾衮為人訐告坐言詞悖妄削爵世祖章皇帝定鼎燕京大封諸王念豪格從定中原有功仍復原封是冬山東土寇竊發奉命往征土寇悉平三年正月命為靖遠大將軍西征盡復所陷州縣陜西平十一月整兵入蜀至南部偵知賊首張獻忠據西充縣隨統大軍進抵西充獻忠來拒麾兵奮擊斬獻忠於陳復分兵搜剿餘賊破賊營一百三十餘處四年八月奏分定諸郡縣蜀寇悉平五年二月凱旋世祖章皇帝御太和殿宴勞之三月多爾衮以豪格有徇隱等事議罪下獄卒七年世祖章皇帝親政念其枉復封和碩肅親王立碑表之十三年追諡曰武乾隆四十三年特奉諭旨以肅親王後改封顯親王著仍復原封稱號並配享太廟安平貝勒杜度貝勒禇英之子也初授台吉以功封貝勒天聰元年從征朝鮮李倧乞和大貝勒阿敏欲弗許杜度不從卒定盟還三年從征明至北京略通州克張家灣還至薊州遇明援兵杜度陷陳殲之尋奉命駐師遵化明兵來犯擊敗之七年明叛帥孔有德耿仲明來降杜度逆之於鎮江岸追兵不敢近崇德元年封安平貝勒防守海州復從征朝鮮二年偕多爾衮取江華島敗朝鮮水帥克其城三年從嶽託伐明由墻子嶺入明境嶽託薨于軍遂代將西抵山西南抵濟南降城克敵四年秋同貝勒濟爾哈朗等略明錦州五年屯田義州屢敗明兵六年敗明兵於松山七年六月薨豫祭葬雍正二年立碑紀其功克勤郡王嶽託太祖高皇帝孫禮親王代善第一子也有謀勇授台吉天命六年二月大軍略明奉集堡將旋有厮養卒指言明兵所在嶽託同諸台吉追擊之摩其壘而還三月攻明瀋陽城我師追敗明總兵李秉誠等援兵於白塔鋪嶽託會兵同逐北四十里十一年八月太祖高皇帝上賓嶽託與弟薩哈璘以太宗文皇帝有聖德密議推戴告其父代善曰國不可一日無君邦家大事宜早定䇿四貝勒才德冠世深契先帝聖心衆皆悅服當速繼大位代善曰此吾夙心也遂夜作議書翼日以書遍示諸貝勒大臣於朝遂定議奉太宗文皇帝嗣位十月同弟薩哈璘貝勒豪格隨父代善征蒙古五部有功是歲封貝勒天聰元年五月從太宗文皇帝代明有功二年五月率兵略明邊墮錦州杏山高橋三城毁十三站以東墩臺二十一處乃引還三年九月同諸貝勒略明錦州境焚其積聚十月太宗文皇帝伐明師次喀喇沁之青城代善莽古爾泰見上請班師退太宗文皇帝意不懌嶽託同諸貝勒見告之故因力贊進兵至午夜議定遂同濟爾哈朗攻大安口毁水門入乘夜敗馬蘭營援兵於城下比明遵化援兵來營於山之林木間顧謂濟爾哈朗曰吾當獨往取之遂馳擊大破之五戰皆捷馬蘭營馬蘭口大安營三城皆相繼降四年正月與豪格還守瀋陽五年七月攻明大淩河太宗文皇帝親統大軍自白土場趨廣寧嶽託率兵二萬别由義州進八月會大軍於大淩河圍其城祖大夀遂以其城降翼日命同諸貝勒統兵四千偽作漢裝偕大夀作潰奔狀夜襲錦州會大霧止是夜錦州聞炮聲謂大淩河守兵潰圍出分路來迎遇我師敗之是年初設六部命攝兵部事崇德元年正月晉封和碩成親王旋以徇庇莽古爾泰碩託且有離間濟爾哈朗及豪格於上之心論死太宗文皇帝特寬之降多羅貝勒罷兵部任十一月復命領部事如故三年十一月命為揚威大將軍貝勒杜度副之統右翼兵與左翼奉命大將軍睿親王多爾衮分道伐明嶽託兵至墻子嶺毁邊墻入明密雲總督以兵六千入保墻子嶺堡外立三寨為掎角我師攻其寨拔之復連敗明兵獲敵卒知堡堅且有重兵不易技嶺東西高處有間道可越於是分兵兩路攻其前以牽敵師潛以兩路從間道踰嶺入克臺十有一處所向皆捷尋以疾薨于軍四年三月多爾衮捷奏至太宗文皇帝覽奏無嶽託名驚問知病卒慟哭久之令且勿使禮親王知為輟飲食者三日四月喪還駕至沙嶺設幄遙奠還御崇政殿命王以下及諸大臣往奠封為多羅克勤邵王賜馬五駝二銀二萬兩是年九月子羅洛渾襲封貝勒康熙二十七年聖祖仁皇帝為立碑以紀其功乾隆八年十九年四十三年高宗純皇帝巡幸盛京俱親酹其墓又四十三年正月特奉諭旨以克勤郡王後改封平郡王著仍復原稱封號並配享太廟嘉慶十年二十三年仁宗睿皇帝巡幸盛京亦親酹其墓穎親王薩哈璘太祖高皇帝孫禮親王代善第三子也天姿聰敏通滿漢蒙古文義屢從征伐所向有㓛天命十一年封貝勒八月太祖高皇帝上賓薩哈璘與兄嶽託以太宗文皇帝聖德神武深得人心密議擁戴告其父大貝勒代善代善曰此我夙心也遂與諸貝勒定議奉太宗文皇帝即位十月隨父代善北征喀爾喀扎嚕特部斬獲甚衆天聰元年五月太宗文皇帝親伐明薩哈璘與兄嶽託貝勒豪格率精騎為先鋒至寧遠城敗明總兵滿桂兵追至城下諸貝勒繼至分兵剿殺敵衆是役也薩哈璘被創戰彌厲三年十月大軍次喀喇心之青城代善莾古爾泰詣御幄密議班師太宗文皇帝不懌薩哈璘與兄嶽託及諸貝勒進見勸決計進取十一月從太宗文皇帝伐明逼北京同諸貝勒擊敗明袁崇煥祖大夀援兵又南略通州焚其船克張家灣還攻克香河縣敗明三河縣山後之蒙古兵進克永平府五年七月初設六部命理禮部事是月太宗文皇帝親率大軍伐明薩哈璘與貝勤杜度豪格留守都城七年六月詔問用兵何先蕯哈璘言當寬朝鮮拒察哈爾而專征明并陳方略是年八月同貝勒阿巴泰等往略明山海關八年二月同貝勒多爾衮往迎明降將尚可喜次廣鹿長山二島俘獲不可勝計九年二月同貝勒多爾衮嶽託豪格等統兵往收察哈爾途遇察哈爾汗妃及台吉等率其屬來降遂盡收額哲全部還師又同略山西邊地諸州縣縱兵出入無敢當者凱旋太宗文皇帝親率諸貝勒大臣往迎之先是諸貝勒大臣以遠人歸附國勢日隆合詞請太宗文皇帝進稱尊號太宗文皇帝卻之至是復請太宗文皇帝仍不允薩哈璘乃令內院大臣希福等奏曰臣等屢次陳請未蒙伏思皇上俞允夙夜悚惶罔知所措皇上不受尊號其咎實在諸貝勒諸貝勒不能殫竭忠誠為久大之圖徒勸上早正大號是以皇上不肯輕受今諸貝勒誓圖改行竭忠輔國皇上宜受尊號太宗文皇帝善之曰貝勒薩哈璘為朕深謀欲善承皇考開創之基開陳及此實獲我心爾身任禮部當主之諸貝勒果誓圖改行尊號之受與不受朕當再思翼日薩哈璘集諸貝勒於朝各書誓詞以奏太宗文皇帝以內外諸貝勒勸進之誠難以固讓而朝鮮通好之國應與共議因命使往朝鮮薩哈璘乃與諸貝勒遣人偕使臣同往告以內外勸進之誠并陳示各國來附兵力強盛之實崇德元年正月有疾太宗文皇帝親視再三四月議薩哈璘功擬加封多羅郡王五月薨詔追封和碩頴親王六月太宗文皇帝在翔鳯閣夢人請曰頴親王乞賜牛一如是者再寤以問內院大臣希福等皆未知所謂後閲會典凡親王薨初祭例賜一牛始大異之以聞太宗文皇帝即命禮部致祭賜以太牢康熙十年五月追諡曰毅前纂修官臣賈楨恭纂輯總纂官臣邵燦恭覆輯校對官臣張榮組恭校校對官臣賀式韓恭覆校大淸一統志奉天府四夲朝人物費英東滿洲鑲黃旗人姓瓜爾佳國初從其父索果率所部來歸授一等大臣其姊壻兑沁巴顔常懷逆志費英東擒誅之從征瓦爾喀取噶家路殺其部長阿球又與褚英等收安楚拉庫路屯寨二十餘處悉降其村落嵗丁未偕貝勒舒爾哈齊收斐悠城尸口烏拉國布占泰勒兵萬人扼我前軍於路費英東率兵繼至大敗之是年及辛亥年兩討東海窩集部克其五路癸丑從征烏拉拔其城天命三年從征明取撫順明兵來援費英東馬驚炮逸諸軍欲退乃策馬大呼麾衆直入大破之太祖高皇帝曰此萬人敵也四年以夲旗兵破明兵於薩爾滸山巔八月攻葉赫城守陴者飛石投火太祖高皇帝命之退對曰勢垂克不可退也遂拔其城費英東為人忠直敢強諫奬善黜惡畢智殫力佐成大業以功封三等子世襲及卒太祖高皇帝親臨其喪崇德元年追封直議公配享太廟順治十六年晉世爵三等公康熙三十七年聖祖仁皇帝東巡親酹其墓雍正九年加封號曰信勇乾隆八年十九年四十三年四十八年高宗純皇帝巡幸盛京俱親酹其墓有御製賜奠詩又四十三年特奉諭旨以信勇公費英東為開國功臣之冠所襲尚係三等公不足以昭酬庸茂典著加恩晉封一等公嘉慶十年二十三年仁宗睿皇帝巡幸盛京俱親酹其墓有御製賜奠詩額亦都滿洲鑲黃旗人姓鈕祜祿世居長白山父母為仇家所害年十三手刃其讐避依其姑家太祖高皇帝過其地額亦都識為真主辭姑從行初令討尼堪外蘭於圖倫城先登又攻塞克濟城取之還督兵攻取舒爾格布瞻城丁亥年取巴勒達城會軍河漲以繩聯軍士而度乘夜登城城上飛矢貫股著於雉垣被五十餘創不退卒拔之賜號巴圖魯薩克齋入寇率數人敗之夜更襲取其城進攻尼瑪蘭城破之復克章嘉諸城寨貝琿己顔謀叛墓有御製賜奠詩安費揚古滿洲鑲藍旗人姓覺爾察父完布祿有忠節安費揚古克繼父志自弱冠從征竭誠效力討兆嘉城攻瑪爾墩寨皆為軍鋒征哲陳部拔其城攻洞城及章嘉尼瑪蘭赫徹穆等城取香潭寨皆著功績從略哈達富勒嘉齊寨師還太祖高皇帝親殿迎射追兵後騎乘間來犯安費揚古盡斬之從討訥殷克佛多和山寨從攻哈逹城先登從征東海窩集部破其二路再征烏拉擊達拉穆台吉兵擢其陳奮勇登城樹大纛於上大兵繼至遂滅烏拉天命元年偕扈爾漢征薩哈連部至烏勒間河水陸並進取河南北諸寨並取薩哈達部內十一寨三年從攻明取撫順先擊破其左營援兵安費揚古性貞亮有勇略與額亦都等俱為開國功臣之首大祖高皇帝嘉其功績賜號碩翁科囉巴圖魯列五大臣順治十六年追諡敏壯子阿爾岱以忠節著次子逹爾岱孫都爾德遜塔並著有功勳為名臣扈爾漢滿洲正白旗人姓佟佳國初從其父扈喇虎來歸賜姓覺羅丁未年奉命遷斐悠城之衆以兵三百護之先行烏拉遣萬人邀諸路扈爾漢結寨山嶺分百人衛之身率二百人拒敵敵不能犯次日諸將皆至大破其衆從征東海窩集部有功己酉年率兵一千再征之降瑚葉路收二千户以歸賜號達爾漢辛亥年征呼爾哈路圍扎庫塔城克之天命元年偕安費揚古征東海薩哈連部進師黑龍江岸招降甚多四年從擊明劉綎兵大破之扈爾漢每戰輒為先鋒奮不顧身積功封三等子卒其第三弟薩木什喀第七弟雅賚並著戰功厯加世職何和里滿洲正紅旗人其先居棟鄂為部長因以地為氏何和里幼而凝重志量寬和年二十六即長其部太祖高皇帝納妃哈達身率甲士護行遂率所部來歸尚固倫公主授一等大臣從征烏拉及呼爾哈路圍扎庫塔城皆有功癸丑年再征烏拉布占泰拒戰何和里與費英東等力請進兵遂滅烏拉天命六年從取遼陽何和里自來歸後特蒙眷注與費英東額亦都扈爾漢安費揚古為五大臣推誠宣力勤勞王室封世職三等子卒順治十二年追諡溫順雍正中進封勇勤公揚古利滿洲正黃旗人姓舒穆嚕父郎柱為庫爾喀部長命揚古利入侍郎柱為部人所害揚古利之母攜幼子屬鞬佩刀突圍來歸庫爾喀部衆尋亦內附揚古利逆其仇家殺之時年甫十四太祖高皇帝異之以女妻焉從征輝發取訥殷部及珠舍哩路安楚拉庫路皆有功從討哈達蒙格布祿先登拔其城擒其酋以歸收斐悠城户口烏拉以萬人邀諸路揚古利戰甚力從取烏拉金州城城中迎射外兵揚古利冒矢攻克之再征烏拉敵勢鋭甚太祖高皇帝欲少退揚古利獨麾衆薄城疾攻拔之擊明兵於界藩先馳敵被傷裹創奮擊大破之天命六年取瀋陽乘勢進取遼陽皆先登以功授一等子世職命位次八貝勒下十年明毛文龍夜入耀州揚古利擊之殱其衆天聰三年從征明敗明總兵滿桂於都城北明兵援薊州我偏師少却揚古利直前奮擊敗之八年晉超品一等公復從攻宣武大同拔靈邱崇德元年與武英郡王阿濟格入邊城克昌平等十二城俘獲十餘萬二年從征朝解有敗卒竄伏崖間竊發鳥鎗揚古利傷重而卒揚古利自弱冠從軍衝鋒挫鋭大小百餘戰被創滿身戰功最著而持身敬慎厯事兩朝恩遇殊絶殁之日太宗文皇帝親臨喪次追封武勳王以子塔贍襲超品公順治中配享太廟康熙三十七年聖祖仁皇帝東巡親酹其墓三十九年有御製碑文表其墓雍正九年加封號曰英誠乾隆八年十九年四十三年四十八年高宗純皇帝巡幸盛京俱親酹其墓有御製賜奠詩嘉慶十年二十三年仁宗睿皇帝巡幸盛京懼親酹其墓有御製賜奠詩西喇布滿洲鑲紅旗人世居完顔以地為姓國初率所部來歸列理事十大臣太祖高皇帝富勒佳齊之役西喇布翼衛大營哈逹錫特庫連發兩矢西喇布以身當飛鏑中傷而殁贈三等輕車都尉世職順治十二年追諡順壯子瑪拉希從入關破賊又從征江南曰川湖廣廣東屢著戰功纍晉至二等男卒賜祭葬諡忠僖赫臣滿洲正黃旗人姓伊爾根覺羅天命初征烏拉有功奉使葉赫抗節不屈被害子克宜福以勇著天聰初從攻永平崇德時從圍錦州皆有功楊書滿洲正藍旗人姓郭絡羅國初率其族自沾可來歸尚公主為額駙從征皆有功卒時太租高皇帝親臨奠之阿蘭珠滿洲鑲紅旗人姓棟鄂國初從其父阿格巴顔率所部來歸初授佐領尋擢理事大臣從征烏拉被創奮勇衝入遂殁於陳贈三等輕車都尉世職順治十二年迢諡順毅其從弟永順客爾瑚齊姪和託皆屢從征討著有戰功厯加世職巴篤禮滿洲正白旗人世居佟佳以地為姓天命初來歸有才能列十大臣屢立戰功授三等輕車都尉世職十年攻明旅順口克之十一年敗明毛文龍兵於薩爾滸城天聰初從攻遵化先登八年攻王家莊被創不退中矢死贈三等男順治十三年追諡敏壯弟蒙阿圖亦以軍功顯博爾晉滿洲鑲紅旗人世居完顔以地為姓國初率户口來歸授佐領尋授侍衛天命八年從征扎嚕特昻安貝勒斬昻安及其子降其部衆十年授副都統率兵征東海呼爾哈部降五百户尋列理事十大臣天聰初擢都統從征朝鮮又從征錦州以功纍封至一等男尋卒康熙三年其子特錦具陳父績追諡忠直特錦初授騎都尉世職從入關破賊征叛鎮薑瓖剿平山西又征雲南貴州皆有功晉二等男官至都統卒諡襄壯孫瑪沁亦著有軍功哈哈納滿洲鑲紅旗人姓那木都魯國初從其父明安圖巴顔來歸以佐領從征烏拉身被數創猶力戰天命四年從破明四路兵取開原鐵嶺皆有功六年從征遼陽敗敵援兵天聰初列十六大臣八年略錦州敗明兵於城下復進擊明兵所乘馬仆於陳步戰益力尋援耀州敗明兵於渾河崇德元年入長城攻克昌平涿州二城尋以創發致仕覺羅拜山鑲黃旗人景祖翼皇帝第五弟寶朗阿之曾孫天命六年從攻明瀋陽斬其驍將號秃尾狼者明兵自城南來迎戰拜山當之又斬一副將遂克遼東授三等輕車都尉世職天聰初復從征錦州有功後殁於陳贈三等男納爾察滿洲鑲黃旗人姓鈕祜祿國初來歸授騎都尉世職戊申年從征烏拉攻伊罕阿林城先登擢副都統列十六大臣尋攻沙嶺以不待集師奮勇獨進殁於陳順治十二年追諡端壯子瑚沙亦著有戰功古爾布什滿洲鑲黃旗人姓博爾濟吉特天命六年來歸授三等子尚公主為額駙天聰五年圍大淩河崇德初從征朝鮮攻皮島皆有功六年圍錦州七年再圍錦州屢敗明兵順治元年入關擊敗流賊李自成九年晉一等子卒賜祭葬諡敏襄法談滿洲正紅旗人姓他塔喇初以護軍校從滅葉赫取遼陽擢佐領天聰崇德間取旅順口下山東克郯城征呼爾哈克雅克薩城圍錦州克前屯衛中後所皆有功順治元年從入關討流賊二年追敗賊黨於荆州宜昌連戰皆捷以功纍晉世職至一等輕車都尉兼一雲騎尉康熙三年卒賜祭葬佟飬性漢軍正藍旗人世居撫順為商販養性有識量天命初密輸欵於我為明所獲從獄中逃出來歸妻以宗女授三等男尋從克遼陽晉二等子時漢人歸附者日衆以養性統轄之天聰五年從攻大淩河克之復敗明援兵以炮克魚子章臺降之復克馬家湖臺盡毁諸𤇺堠六年大閲養性軍容整肅賜賚有加卒順治十三年追諡勤惠雅希禪滿洲鑲黃旗人姓馬佳父尼媽禪任佐領雅希禪自其父時屢從征有功天命初列理事十大臣從征界藩超伍先進破明總兵馬林於尚聞崖六年從征遼陽以功晉三等男八年從征扎嚕特昻安貝勒同逹音布先陳破敵尋卒順治十二年追諡敏果次子訥爾特屢著戰功從征明戰三河攻山東克武定城後殁於陳贈三等輕車都尉世職布顏岱滿洲鑲紅旗人姓博爾濟吉特尚公主為額駙天命十一年取覺華島殱其衆天聰元年從征朝鮮三年入龍井關克大安口取遵化四戰皆捷五年從圍大淩河身被創戰益厲六年略宣府大同降察哈爾部衆順治元年入關擊流賊再蹙之潼關二年從征江南遇敵於黃河岸所乘馬蹶身中數創猶殪敵不退尋以創發卒於軍圖們滿洲鑲藍旗人姓西林覺羅父屯台初自旺沁率族來歸太祖高皇帝以覺羅瓦爾哈女弟妻之初設佐領即以屯台統其族屬及圖們襲父職屢從五大臣征有功天聰五年從征明大淩河首摧敵鋒明監軍道張春率衆數萬來援圖們復身先迎敵炮中股筋絶而未殊猶奮勇不退大軍繼進遂破明兵太宗文皇帝親臨撫問奏言臣創雖深然觀敵勢剽輕易滅也尋復命鄭親王視問謂王曰吾不能殺敵丐王奏請截吾股以油炙之猶堪為國司閽是夕竟卒特賜騎都尉世職俾其子圖延圖襲焉仍帶參領本秩圖延圖於順治元年從睿親王入關擊流賊有功遷户部郎中五月追賊至慶都縣斬獲甚衆尋病卒以長子圖拜襲雍正三年建昭忠祠祀死節諸臣圖們與焉吉斯哈滿洲鑲白旗人姓烏蘇與弟吉巴克達來歸天命四年從征明有功六年從圍遼陽先登天聰八年偕武巴海征東海呼爾哈部九年偕巴奇蘭等征黑龍江皆有功崇德元年從征朝鮮有明兵濳入鹻場擊走之復敗朝鮮平壤兵再征瓦爾喀大捷以功纍晉世職至一等輕車都尉弟吉巴克達天命六年從攻奉集堡遇明總兵李秉誠來援敗之追至城濠中炮殁贈二等輕車都尉穆克坦滿洲鑲藍旗人姓戴佳世居哈逹部之杭澗國初率屬來歸每從征必前驅扎海瑚色叛歸哈達穆克坦從其父及兄追之父兄俱殁於陳從子額爾訥亦叛穆克坦隻身追擊殺之天命元年我師征瓦爾喀舒賽阿爾琥達進戰不利蒙庫噶哈二人先走穆克坦怒同延布理等八人直入賊陳賊皆披靡舒賽阿爾罅逹得免師還以蒙庫噶哈所獲賜穆克坦六年從征明耀州先登克其城遂駐防焉時有蒙古人叛去我兵追及之戰不利穆克坦策馬大呼殺首逃者海色餘皆潰敘功授二等男世職天聰初擢列十六大臣從征朝鮮兩以先登獲賞五年從圍錦州穆克坦徑抵城濠舍騎步戰敵兵矢炮齊發穆克坦鏖戰死贈一等男世職順治十二年追諡忠勇康古禮滿洲正白旗人姓那木都魯嵗庚戌以綏芬屯長率其民人來歸得壯丁千餘太祖高皇帝妻以弟穆爾哈齊之子授三等子世職天命三年從取撫順六年從攻遼東瀋陽先登天聰初列十六大臣授護軍統領後緣事免五年卒弟喀克篤哩亦授三等子天聰元年從征朝鮮三年從攻明遵化五年征明南海島及圍大淩河城皆有功八年卒康古禮第四子賴塔崇德時屢立戰功順治初從平江南福建湖廣南粵晉三等男康熙十三年為平南將軍厯著懋功卒賜祭葬諡襄毅雍正五年追封一等公八年入祀賢良祠九年加封號曰褒績綽和諾滿洲鑲紅旗人姓那木都魯父明安圖巴顔國初來歸綽和諾從征呼爾哈部克扎庫塔城復以克瀋陽遼陽功授三等輕車都尉世職列十六大臣任副都統天聰五年從征大淩河力戰殁於陳贈一等輕車都尉世職雍正七年入祀昭忠祠楞額哩滿洲正黃旗人揚古利次弟屢從征有功授騎都尉世職任副都統天命九年從破明將毛文龍島中兵焚其糧復偕阿山入喀爾喀巴林地俘獲甚多天聰元年從征朝鮮克義州三年海島漢人踞朝鮮鐵山率精兵剿之五年征南島復從征大淩河皆有功纍晉至一等子八年卒順治十二年追諡武襄納穆泰滿洲正黃旗人揚古利第三弟天聰初擢授都統從征明攻遵化城克之駐防灤洲移守遵化擢兵部承政授三等輕車都尉世職復略錦州松山八年略朔州抵上方堡攻王家莊先登九年統右翼兵自應州趨平衛破明兵敘功晉三等男是年十月卒多積禮滿洲正紅旗人何和里次子從征烏拉及明俱著戰功授三等輕車都尉世職崇德元年征瓦爾喀部俘獲甚多凱旋命禮官迎宴擢副都統四年緣事革世職仍任副都統六年圍錦州戰松山皆殱敵有功尋以年老罷其第五弟都類天聰時任都統屢從征討所向有功順治元年入關追破流賊尋從征四川克平川北州郡以功纍晉至二等伯十三年卒和碩圖滿洲正紅旗人何和里第四子襲父三等子世職通漢文太祖高皇帝愛之以禮親王女妻焉封和碩額駙天聰元年任都統從征朝鮮及明錦州等處著有勞績二年略錦州克杏山松山征察哈爾敗其兵晉三等公三年征明攻大安口屢敗援兵進取遵化戰盧溝橋敗明四總兵於永定門外軍還取永平四年駐防灤州敵兵掠我臺站擊走之七年卒贈恤有加順治十二年追諡端恪雍正九年加封號曰勇勤舒賽滿洲鑲藍旗人姓薩克達生而勇敢天命初從征哈逹又征瓦爾喀皆有功授二等輕車都尉世職天聰初列十六大臣從征朝鮮駐防義州八年從鄭親王濟爾哈朗留守盛京舒賽每攻城衣棉甲奮身直前先後攻克十六城晉三等男卒順治十二年追諡壯敏子西蘭從入關追討流賊李自成克潼關三戰皆捷又從征江南福建皆有功孫席特庫從征明前屯衛及討流賊李自成於延安追剿至安陸並著戰功逹珠瑚滿洲正藍旗人姓兆佳初授佐領從征葉赫烏拉諸部落俘獲甚多敘功晉三等男天聰間擢列十六大臣又從征東海瓦爾喀部落斬獲甚衆軍還為俘卒所害順治十二年追諡襄敏子翁阿岱亦屢以軍功顯崇德六年戰殁松山贈恤甚厚晉一等男寧完我漢軍正紅旗人天命初來歸兼通蒙古漢文任事文館天聰四年偕達海招諭永平從征大淩河招撫察哈爾部以功授騎都尉世職六年疏陳伐明策後緣事罷革世職順治元年起為學士二年擢宏文院大學士六年修太宗文皇帝實録充總裁官授二等輕車都尉世職八年晉議政大臣十三年加少傅兼太子太保十五年致仕康熙元年擢其子為學士四年卒賜祭葬立碑諡文毅雍正二年入祀賢良祠逹爾漢滿洲正藍旗人揚舒子亦尚公主為額駙兼管佐領從征葉赫錦台什以功授一等男天聰初擢都統列八大臣征扎嚕特單騎擒一台吉復征棟奎破其衆擒固穆楚庫爾等父子又從征朝鮮及明永平大淩河皆有功九年征明山西奉命分兵列營牽制明師道遇敵擊敗之崇德元年攻克順義以功纍晉至一等子後緣事削世職偉齊滿洲鑲黃旗人費英東第九弟征呼爾哈部收獲五百户有功並以其父索果歸附功授騎都尉天聰三年從征明略遵化屢敗敵兵晉三等輕車都尉嘗令留守盛京提督八門尋卒順治十三年追諡端勤子卓布泰巴哈穆里瑪皆著戰功武訥格蒙古正白旗人姓博爾濟吉特先居葉赫國初來歸有勇略通蒙古文及漢文賜號巴克什從征烏拉有功授三等男天命十一年别將兵擊明覺華島破之天聰三年春從征察哈爾降二千户是年冬從征明入龍井關克遵化袁崇煥等援師至左翼蒙古兵先進卻武訥格率右翼進戰敗之賜俘獲物以半犒其軍五年復從征明圍明兵於大淩河明兵欲􅊳圍出敗之八年敘功晉三等公復從征明率蒙古左右翼兵與諸貝勒俱進獨石口攻撫悉稱旨尋自得勝堡收蒙古之逃入陽和者四百七十人九年卒喀三滿洲鑲藍旗人姓納喇世居葉赫蘇完天命初來歸授佐領六年從取瀋陽遼陽授三等輕車都尉世職九年明島帥毛文龍部將來犯康古禮額駙莊喀三往援盡殱其衆天聰六年從征察哈爾偕吳拜等屢敗敵以目疾辭職以功纍晉至二等子順治十二年卒諡敏壯武巴海滿洲鑲藍旗人姓瓜爾佳天命初從征明有功授佐領天聰元年從征朝鮮以登城功受賞從征錦州敵兵來犯武巴海殿力戰敗之五年偕蒙阿圖征瓦爾喀有功賜號巴圖魯六年征烏扎拉俘獲甚多七年征呼爾哈部又征瓦爾喀皆以凱旋九年從嶽託駐歸化城偵知上默特部長博碩克圖子茂罕隂通於明武巴海擒斬茂罕及明使人崇德二年敘功晉三等子賜衣服僕馬莊田尋卒巴奇蘭滿洲鑲紅旗人姓納喇早從征伐嘗以所部兵攻覺華島破之天聰初列十六大臣三年從征明七年從征旅順口巴奇蘭與薩穆什喀並舟先入中數創號於軍曰孰能超躍先登者於是永順珠瑪喇躍而登巴奇蘭率兵繼之時我兵少動復號於軍曰敵敗矣整兵復入遂克之八年將兵征呼爾哈諸部俘獲甚多所俘盡以賜之以前征旅順口被創至是潰卒贈三等子武善滿洲鑲黃旗人姓伊爾根覺羅父噶蓋國初來歸授理事大臣後以牽連坐罪誅武善初任佐領天命九年明毛文龍渡鴨緑江入島屯田武善與楞額哩襲之破其島擊斬及墜水死者無數焚其糧而還天聰初列十六大臣崇德元年瑪福塔使朝鮮偵知明兵潛入鹻場奏聞命武善偕吉斯哈等率兵助瑪福塔於鹻場大破之三年緣事革職尋授工部參政順治元年卒弟布善亦以戰功授騎都尉世職庫爾禪滿洲鑲紅旗人姓鈕祜祿父索塔拉尚公主生子四庫爾禪其次也好學問天命初召直文館四年結喀爾喀五部盟誓九年結好科爾沁部授佐領天聰元年從征朝鮮其王遁居海島遣庫爾禪往議約誓定嵗幣朝鮮讋服三年命同在庭儒臣編輯國史四年從征明灤州摧鋒陷陳五年命往責諭朝鮮入貢愆期六年因遣諭明邊臣罷兵息民逾期始至又以力保逃將劉興祚罪論死庫爾禪通習漢文與達海齊名順治元年擢其子瑪拉為户部郎中弟庫拜屢以戰功授二等輕車都尉圖魯什滿洲鑲黃旗人姓伊爾根覺羅天命九年任佐領天聰三年從征明攻大安口先至城下力戰克其城大兵營京城西南隅復偕副都統阿山覘明帥滿桂等以四萬衆列營永定門南還報圖魯什請乘其不虞擊之先馳入明營遂斬滿桂等五年從征大淩河又從攻錦州大敗之與明援兵監軍道張春決戰凡三晝夜聞敵渡河圖魯什領兵衝擊敗之是夕再戰圖魯什先進大破明兵八年五月擢前鋒統領加三等男六月從征察哈爾七月至歸化城收其降人一千二百户是月毁明邊墻入至宣化攻懷遠圖魯什設伏於左衛城擊敗明總兵曹文詔兵又遇明總兵祖大弼兵圖魯什以單騎衝入矢中腹力戰我兵繼至敵敗去圖魯什以創重卒於軍賜號碩翁科囉巴圖魯贈三等子世爵順治中追諡忠宣滿逹爾罕滿洲正黃旗人姓納喇父雅琥有功官佐領列理事十大臣滿達爾罕屢從征討招降呼爾哈部天聰五年使朝鮮八年從征大同以㓛授騎都尉世職擢禮部承政崇德二年從攻皮島有功賜裘馬銀幣在禮部任職六年恪恭匪懈纍晉世職至二等輕車都尉卒諡敬敏弟瑪福塔初任佐領後擢户部承政與兄滿達爾罕分掌户禮二部人以為榮景固勒岱滿洲正白旗人世居扎庫塔以地為姓屢從征有功天聰八年奉國初來歸授佐領命再征東海瓦爾喀部收獲丁莊馬牛甚多以功晉至三等男卒順治十二年追諡忠直齊爾格申滿洲鑲白旗人姓寧古塔初任佐領明人攻耀州率所部往援敗之淤泥河明錦州兵來犯引軍迎敵面被創戰益力天聰六年鎮守蓋州多俘獲崇德元年從征大同再敗明兵以功纍晉至三等男卒賜祭葬弟多尼喀以勇稱亦著有戰功勞薩滿洲鑲紅旗人姓瓜爾佳屢從征敗明兵於德勝門外天聰八年奉命率兵沿彰武臺河駐劄保守外藩蒙古並扼敵兵數年敵不敢設伏敗敵八年卒順治十二年追諡襄壯武賴滿洲鑲黃旗人費英東第五弟烏爾罕之子天聰初從征大淩河及朝鮮皆有功崇德三年從貝勒嶽託攻山東連戰皆捷授騎都尉世職八年從征明至渾河敗其衆師旋至密雲遇明兵列火炮以待奮勇衝突破之順治元年從入關擊敗流賊以功纍晉至二等男尋卒諡康毅子固德知名伊勒慎滿洲鑲黃旗人姓費莫世居薩齊庫率衆來歸其族悉為烏拉所害太祖高皇帝憐之授騎都尉世職從征明有功天聰五年守海州屢敗明兵襲奪敵船七年從征旅順口有功先後守海州十餘年捕獲甚多明兵不敢犯以功纍晉至三等男後緣事削職旋復鎮守海州順治二年卒喀勒塔拉滿洲鑲白旗人姓章佳襲父圖爾坤煌詹佐領崇德三年擢護軍參領從入明邊屢敗敵兵順治元年從入關擊破流賊復從定山西河南五年從征江西屢著戰績九年擢護軍統領以功纍晉世職至一等輕車都尉十年從征湖南至衡州奮勇擊賊殁於陳贈三等男諡忠壯徹爾格滿洲鑲黃旗人額亦都第三子幼從征討屢建功績授騎都尉世職晉三等輕車都尉征東海瓦爾喀部大捷凱旋晉三等子天聰元年設八大臣理政事徹爾格與焉是年從征朝鮮其王李倧懾服納貢五年任兵部承政崇德二年以攻皮島違軍令更緣事罷任革世職三年起授工部左參政五年擢户部承政八年授騎都尉世職順治二年卒長子辰泰五子拉哈達俱知名圖爾格滿洲鑲黃旗人額亦都第八子幼從征積功授一等輕車都尉世職天聰初列十六大臣從攻遵化錦州大同山西昌平雄縣皆有功崇德五年攻錦州身著二十餘創猶殿後力戰授內大臣六年從圍松山明兵犯御營甚急軍中侍衛守營大臣俱未至圖爾格奮呼發矢殺二人敵乃遁七年征明敗敵三十九次至山東陷陳下城降獲無算以功纍晉至三等公圖爾格才氣過人有父風效力行間勳伐尤異順治二年卒九年追諡忠義配享太廟雍正九年追加封號曰果毅伊爾登滿洲鑲黃旗人額亦都第十子幼侍宫中長以侍衛從征天命初築城界藩及薩爾滸有功晉三等男賜蟒衣列十六大臣天聰三年率兵剿獐子島及攻明薄燕京克永平灤州等城皆有功晉一等男又攻明旅順口及山西保安等州皆俘獲無算崇德元年緣事削世職三年復為護軍統領四年為內大臣從征敗明祖大壽軍六年攻錦州洪承疇以師赴援諸將失利伊爾登突入陷陳身被十餘矢轉戰若無所見四戰皆捷復加三等男世職纍晉至二等伯順治十三年以老致仕命乘騎入朝並圖其像康熙二年卒諡忠直三十七年遣官祭墓超哈爾滿洲鑲黃旗人額亦都第十三子屢以戰功授騎都尉世職崇德元年從征明轉戰至盧溝橋擒斬無算二年擢議政大臣三年征山東攻城克敵屢建奇功時任禮部參政五年轉兵部六年從攻錦州力戰陳亡贈二等輕車都尉世職順治十二年追諡果壯范文程瀋陽人隸鑲黃旗漢軍天命初以明生員來歸參贊帷幄天聰三年解大安圍敗明兵授三等輕車都尉世職五年招降大淩河城西山一臺六年陳進取計是時初設八旗都統廷議首推文程太祖文皇帝曰此職一軍耳朕方資為心膂其別議之尋授祕書院大學士每入對必漏下數十刻始出凡詔敕宣諭皆出其手順治元年流賊李自成陷明都明將吳三桂乞師文程勸進兵大兵遂發入關草檄人心帖然至京疏請撫遺黎起廢斥定册籍減賦額皆舉行五年賜巴克什號六年修詔太宗文皇帝實録充總裁官纍晉至一等子任議政大臣疏請興軍屯嚴保甲皆舉行加少保兼太子太保以病乞休特晉太傅兼太子太師俟病起召用康熙五年卒賜祭立碑諡文肅五十二年御書元輔高風額其祠阿濟格尼堪滿洲正白旗人姓他塔喇父達音布纍積戰功授三等輕車都尉世職天命八年從征扎嚕特部殁於陳阿濟格尼堪襲父職年少奮勇陷陳所至有功崇德六年從圍錦州大破明兵於松山杏山八年取中前所等城順治元年從入關進擊流寇復破賊西安從平江南浙閩六年以參贊大臣從征湖廣督兵轉戰下寶慶破邵陽拔湘潭以功纍晉至三等伯授議政大臣卒諡勇敏石廷柱漢軍正白旗人先世為遼東武辨父翰始家焉天命七年來歸授三等輕車都尉世職十一年從征囊努克天聰三年率兵剿明故將毛文龍所屬諸島有俘獲六年從征察哈爾七年從克旅順口崇德四年戰松山屢破敵兵六年奏取錦州策再圍松山乘夜破敵順治元年從入關從平山西河南十四年乞休加少保兼太子太保以功纍晉至三等伯致仕尋卒贈少傅諡忠勇葉赫珠瑪喇滿洲鑲白旗人姓碧魯自葉赫來歸初任佐領天聰三年從征明入邊屢攻遵化張家灣永平昌黎下之以功授騎都尉世職五年圍大淩河敗援兵六年征察爾哈部獲布顔圖台吉七年攻旅順口裹創先登拔其城九年圍錦州崇德元年征朝鮮擊開平斬獲無算三年復圍錦州招降大淩河北山寨七年征呼爾哈部屢戰有功順治元年從入關破流賊二年駐防杭州敗方國安水軍征福建屢敗賊將五年征江西叛鎮金聲桓大破之八年擢吏部尚書十一年授靖南將軍征廣東破李定國軍戰三水保新會擊興業俱大勝再敗賊於橫州追躡定國三戰三捷高雷廉州郡邑悉平以功纍晉至三等子十五年致仕康熙元年卒諡襄敏蘇嚕邁滿洲正藍旗人姓嵩佳天命六年授佐領從攻遼陽瀋陽先登搏戰取之天聰元年征朝鮮三年征明克紅山口授騎都尉世職四年圍永平力戰被創卒克之賜號巴圖魯崇德元年攻雕鶚堡飛炮傷其口獨戰未嘗反顧竟破之以殘廢辭職以功纍晉至三等男康熙元年卒諡勤勇逹海滿洲正藍旗人姓覺爾察祖博囉國初來歸父愛密禪任散秩大臣達海九嵗即通滿漢文義召直文館每草詔令稱旨旋承命譯明會典素書三略諸書天聰四年從征明克永平令達海立城上執黃纛諭降其民是年譯書成授三等輕車都尉世職五年賜號巴克什征大淩河使招總兵祖大夀反覆善諭大夀遂降六年病篤太宗文皇帝遣侍臣諭慰賜以蟒綺卒諡文成康熙八年追立碑石希福滿洲正黃旗人姓赫舍里天命初