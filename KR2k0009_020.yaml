部侍郎國史院大學士纍晉至三等男卒康熙三十一年遣官祭墓努山滿洲正黃旗人姓扎庫塔以功授前鋒參領天聰八年從征大同擒明哨卒崇德三年從征明擊敗明總督吳阿衡兵六年偵喜峯口從圍錦州攻杏山以功纍晉世職二等輕車都尉順治元年追擊流寇至陜州大捷二年從征江南三年從征浙江福建五年征湖廣流賊皆有功六年趨湘潭擒何騰蚊攻馬進忠連戰皆捷纍晉至二等男任內大臣十五年卒安達哩滿洲正紅旗人姓納喇天命初遣兵刈鐡嶺田禾有降明之蒙古拒阻安逹哩擊走之天聰中戌牛莊追斬逃兵攻永平同猛士胃炮先登克其城擢前鋒參領尋率兵攻崞縣拔其城還伏欣口敗敵兵多虜獲崇德元年授騎都尉世職任副都統三年由墻子嶺入攻略地至山東五年圍錦州明兵自松山來犯安達哩連戰皆捷六年復圍錦州有功七年卒子阿濟賚以追破流賊從征山西湖南皆有功晉世職至一等輕車都尉錫特庫滿洲鑲藍旗人姓佟佳父努顔國初率屬來歸任佐領錫特庫襲父職天聰五年擢前鋒參領敗明兵之犯耀州者從征大淩河七年殱降明蒙古兵百人於西喇穆倫河崇德三年攻真定三敗敵兵於運河六年圍錦州戰松山敗其遊兵七年克松山追明兵於連山多俘獲復入邊破明總兵白廣恩授前鋒統領順治元年入關破流賊從定山西二年從征湖廣追賊至安陸獲其戰艦三年從征騰機思斬獲無算以功纍晉至一等男康熙五年卒舒里琿滿洲正黃旗人姓棟鄂初任護軍校天聰五年從征大淩河順治二年從追流賊至延安七戰皆捷三年從追騰機思斬獲無算六年從討叛鎮薑瓖擊敗賊衆十五年從征雲南破賊將李成蛟營多斬俘以功纍晉至三等男官至副都統卒岱松阿滿洲正紅旗人姓佟佳初授佐領天聰八年以克副任使授騎都尉世職九年從征黑龍江崇德元年從征明昌平皆有功二年自蓋州躡敵蹤至旅順口斬俘甚衆六年卒子阿納海順治初從征陜西四川山西𢡟著戰功十八年從征山東土賊于七中創卒贈三等男宜永貴遼陽人隸止白旗漢軍初任佐領兼參領崇德五年從圍錦州以炮攻克涼馬山等處六年復圍錦州戰松山克髙橋南三臺七年克塔山附近各臺及其城順治元年任兵部理事官從征江南進克揚州六年破土賊杜全等九年任都統尋授倉場侍郎十年授南贛巡撫十二年調福建會海寇鄭成功率衆猝薄城下時官兵俱赴漳泉城守單弱永貴竭力拒守乘間出城斬俘無算賊鋒頓挫一月解圍康熙四年致仕以功纍晉世職至一等輕車都尉卒賜祭葬金世德漢軍正黃旗人父維城任兵部侍郎世德以廕生補內院博士康熙初纍遷都察院左副都御史尋授直隸巡撫清白自矢多惠政十九年卒諡淸惠王克寬漢軍正白旗人兼通滿漢文國初選授尚陽堡四品官凡以罪徙者皆隸焉克寬除科派濟貧苦流人德之及率天建郡縣流人俱赦為民克寬改授佐領尤善其職後子孫遂世襲佐領錫罕滿洲正白旗人姓棟鄂隨征朝鮮攻義州先登取其城後遇敵於三塔力戰身亡贈三等輕車都尉子鄂碩屢立戰功晉三等伯卒贈侯賜祭葬諡剛毅勞翰滿洲正藍旗人姓他塔拉在行間十四年大小五十餘戰攻拔數十城皆獲全勝天聰元年圍義州久不下值夜雲密布城上寂無聲勞翰乃潛迹緣城將登伏發矢如雨下重創而死贈騎都尉逹素滿洲鑲黃旗人姓章佳初為護軍校天聰五年從征明擊敗明參政張春兵於長山擢護軍參領崇德中從圍錦州者再攻呼爾哈部並有功順治初從定山西湖廣四川屢破流賊五年從討叛鎮薑瓖敗賊右衛已而賊大至達素直前搏戰被重創裹創奮呼而進賊披靡九年討李定國等於湖廣十六年剿海賊鄭成功於福建並著懋勳以功纍晉世職至一等輕車都尉康熙初卒額色赫滿洲鑲白旗人姓富察初為護軍校以功授兵部理事官天聰九年從征黑龍江崇德七年大軍克錦州祖大夀降額色赫宣諭招撫其衆八年從征明至山東下兖州順治九年修太宗文皇帝實録充總裁官列議政大臣纍晉世職至一等輕車都尉厯官至保和殿大學士洊加少師兼太子太師康熙十八年卒賜祭葬諡文恪徐大貴漢軍正白旗人初任佐領崇德五年從圍錦州屢敗松山杏山兵克高橋南三臺七年克塔山杏山二城八年取中後所前屯衛皆有功順治初從定山西河南江南九年破海賊鄭成功於海澄十三年敗舟山賊多斬獲以功纍晉至二等男加太子少保卒賜祭葬諡勤果金礪遼東人隸鑲紅旗漢軍天命七年來歸天聰五年任兵部承政以訓練有方賜鞍馬崇德八年攻前屯衛中後所有功順治元年招撫山西攻克太原三年從征湖廣敗賊於武昌進師衡州長沙皆奏捷六年授平南將軍鎮守浙江七年破明魯王朱以海於舟山九年剿海賊於萬松關七戰皆捷以功纍晉至一等男兼一雲騎尉加太子太保卒賜祭葬趙廷臣漢軍鑲黃旗人姓至孝由江南山陽令厯官至貴州巡撫清幹廉直多惠政民間稱為趙佛晉雲貴總督時兵燹初定力救殘黎於湯大康熙初調浙閩總督去之日士民擁道攀號者萬人及之浙撫馭有方海洋綏靖八年卒賜祭葬諡清獻馬國柱遼陽人隸正白旗漢軍天聰八年直內院崇德三年授都察院理事官順治元年巡撫山西馘土賊閻汝龍等境內悉平四年擢江南江西總督厯剿江北諸巨寇皆就擒復剿叛鎮金聲桓賊黨江西江北以次撫定先是偽國公張名振奉明魯王朱以海竄舟山偽侯吳凱據大蘭山助之國柱招凱降之名振勢遂孤十一年名振犯崇明等處國柱橔水師擊敗之靖江又湖廣賊賴龍等犯江西國柱會祖澤遠搗其巢斬之加太子太保卒賜祭葬祀名宦祠王國光漢軍正紅旗人初任佐領崇德中以副都統兼户部參政八年從克前屯衛中後所二城順治初剿流賊孫守法等於西安討平叛鎮薑瓖擊敗李定國等於永州破海賊於舟山皆著戰功十三年授兩廣總督加太子太保為政嚴明果斷十八年授鎮海將軍駐防潮州康熙三年馘碣石叛將蘇利等以功纍晉至一等男卒賜祭葬諡襄壯子永譽任提督屢戰有功祀河南名宦祠趙國祚漢軍鑲紅旗人崇德八年從征黑龍江有功順治初從征江南克江隂十五年總督浙江十六年剿海賊鄭成功於溫州尋以疏防罪奪嵗俸康熙十三年逆藩吳三桂反以提督駐九江會逆藩耿精忠叛應三桂移師駐南昌屢敗賊兵及精忠降轉剿三桂十五年連敗賊於長沙寶慶武岡尋以創發卒賜祭葬諡敏壯姪槤亦著有軍功卒諡襄勤車克滿洲鑲白旗人姓瓜爾佳天聰八年入大同薄左衛城敗明將曹文詔騎兵略地至代州五臺山還遇明將祖大弻兵敗之崇德六年從圍錦州破洪承疇三營兵順治五年隨剿逆鎮薑瓖分兵援太原有功纍官祕書院大學士卒賜祭葬諡文端祝世昌遼東人隸鑲紅旗漢軍天聰五年從征大淩河六年以訓練有方得優賞順治五年巡撫山西時叛鎮薑瓖作亂世昌力請殄滅理餉數十萬民不見擾賊平疏請豁逋賊並省徭丁晉民獲安卒於官百姓巷哭贈兵部侍郎賜祭葬諡僖靖祀名宦祠柯汝極遼陽人隸鑲紅旗漢軍天命六年克遼陽有降人欲叛汝極發其謀獲間諜十四人順治初纍晉世職一等輕車都尉駐防杭州卒嗣子永蓁以都統討明偽伯阮思等於衡水洋定舟山敘功晉三等男從子永盛崇德中從圍錦州克杏山塔山前屯衛中後所皆有功順治初厯平山東江西湖廣諸巨寇進師衡州屢破賊厯官膠州南贛總兵湖廣山西提督康熙五年加左都督太子少保卒賜祭葬永盛弟永升康熙中巡撫湖廣殉難雍正中入祀昭忠祠察哈泰滿洲鑲紅旗人姓薩克逹天聰時屢從征有功授佐領崇德元年征朝鮮敗敵於納穆山三年從攻明山東下濟南六年圍錦州敗洪承疇於松山八年從取前屯衛中後所順治初入關破流賊進師西安從平福建江西皆有功六年剿獻縣任邱諸賊平之尋征山東土賊于七搗平賊巢康熙初加太子少保進剿逆藩吳三桂卒於軍賜祭葬根特滿洲鑲藍旗人姓瓜爾佳父尼努國初率衆來歸以功授雲騎尉世職根特襲職順治元年從入關敗賊將唐通於一片石追剿至望都六年剿逆鎮薑瓖叛黨於山西皆有功十年剿賊於寶慶武岡十三年隨剿浙江舟山賊復舟山以功纍晉至一等男康熙三十二年卒賜祭葬諡襄壯雍正十年入祀賢良祠羅繡錦奉天人隸鑲藍旗漢軍天聰時為國史院學士順治元年擢河南巡撫有剿撫功二年總督四川湖廣時湖南請寇叛服不常繡錦疏請分置諸降人於腹地以防餘孽煽誘詔嘉納其言九年卒賜祭葬贈兵部尚書覺羅郎球正黃旗人景祖翼皇帝兄索長阿之曽孫崇德六年從圍錦州設伏髙橋截擊明兵追敗之塔山殱其衆順治二年從征湖廣有功纍官禮部户部尚書加少保兼太子太保康熙初卒賜祭葬雷興遼陽人隸正黃旗漢軍崇德間由祕書院擢都察院理事官順治元年授天津巡撫剿土賊李聯芳平之並請設戰船等於大沽口以備海防二年遷陜西巡撫陜地甫經流賊擾亂後興拊循綏緝與民休息得旨嘉奬賜冠服襲馬尋會肅親王破走叛鎮賀珍請於隴洮鞏昌設鎮分屯以防要害十一年卒賜祭葬祀陜西名宦祠劉宏遇遼東人隸正藍旗漢軍天命初與弟奇遇來歸崇德時任宏文院副理事官順治元年任山西朔州道二年擢陜西藩司四年考績稱最五年擢安徽巡撫剿英山等縣賊平之七年巡撫山西恤民救災多惠政卒祀名宦祠李國英奉天人隸正紅旗漢軍順治三年從平四川留鎮保順間治兵閬中為政有體剿賊黨談洪等平之十四年以兵部尚書總督川陜興屯田之利康熙初會剿茅麓山賊其渠李來亨授首寇孽悉平國英前後鎮蜀二十有一年以勞卒於官晉二等男賜祭葬諡勤襄雍正十年入祀賢良祠徐勇遼東人順治二年以總兵鎮長沙五年流寇犯安仁勇一鼓殱之是冬賊黨一隻虎等率衆薄長沙勇勒兵與戰賊益衆乃嬰城堅守賊攻不下遁去尋調辰常總兵賊黨張光翠等犯辰州勇與參將張鵬等力戰城陷死之妻曹氏子祚泰闔門三十九人遇害事聞贈太子太傅爵一等男諡忠節乾隆三十二年上念緑旗官辨致命疆場者於世職襲滿時特豫恩騎尉世襲罔替徐勇與焉陳啓泰蓋平人隸鑲紅旗漢軍任福建巡海道值逆藩耿精忠叛啓泰密與海澄公黃梧拒守會梧病事不可支妻劉氏及女先自縊婢妾二十餘口相繼死啓泰從容引僚屬入視皆相顧失色啓泰慷慨陳義無異平時具朝服再拜乃自盡纍贈至工部侍郎諡忠毅雍正中入祀昭忠祠乾隆十七年特豫恩騎尉世職李曰芃遼東人隸正藍旗漢軍順治初由永平府知府厯遷至操江六年攝安慶巡撫事十年剿平徽州等處巨盜十一年屢敗偽安西侯張名振兵名振遁入海纍官兵部尚書太子太保十二年卒諡忠敏李懋祖奉天人順治初官湖廣郴桂兵備道僉事署廣西巡撫駐永州明何騰蛟兵逼之城破懋祖及其子廷賡殉難甘體垣奉天人順治初守海澄縣死鄭成功之難又黃巖令劉登龍甌寧令王紹基曹縣教諭蔡廷棟東平知州李芝桂俱奉天人以殉難著林中瑜遼陽人順治初協鎮太平奉檄剿撫麻姑巷口兩建膚功郡東小醜竊發中瑜領兵搗賊馬陷深塹死之郭之秀藩陽人順治三年任福建知縣時寇方熾之秀竭力禦撫會明末餘寇聚衆焚掠督兵與戰為流矢所中死張必科蓋平人隸鑲黃旗漢軍順治四年知慶雲縣甫兩月宿弊盡革遇寇至即聚步騎親逐之會寇猝集勵衆戰且守必科箭無虛發忽弦斷手傷擲其弓曰命矣提戈下城至一書齋自焚死李向禹鐵嶺人隸正黃旗漢軍順治五年任陵川令薑瓖之亂禹妻王氏謂禹曰君職守土宜竭力報國勿以家為念禹出禦賊王氏與二女先自縊城破禹死之又兄向堯任助馬路參將合門盡節兄向舜官參領攻揚州中炮死弟向日官遊擊征湖廣罵賊死又遼東人佟養升養馬大同薑瓖之亂巷戰死之王昌齡遼陽人官冀寧道薑瓖之叛殉於難又寧武兵備道金光祥潞安知府楊致祥汾州知府黃廷柏井坪參將佟國仕臨縣令張耀祖定襄令祝文光垣曲令李榮宗繁峙令崔尚賢襄垣令佟學詩屯留令陳思忠河東鹽運同知鄭禹圖皆遼東人俱殉薑瓖之難王來覲遼東人任河東分守道降霍州知州薑瓖之亂以霍為南北孔道攻益力來覲督兵以守城陷血戰死又長子令李允升文水令曹之賢岢嵐兵備僉事徐淳俱殉薑瓖之難宋賢都奉天人順治五年知城武縣時李化鯨變賢都猝不及備先以甘言怠其謀化鯨遂攻曹縣賢都募死士夜薄其營化鯨覺還攻城武賢都力戰死闔門二十八人皆𬒳屠戮朱衣助遼東人順治五年知深州時土寇未盡𬒳堅執鋭為士卒先捍衛撫循士民德之厯任操江為海賊鄭成功兵所獲不屈而死吳國用遼東人順治六年知霍邱縣時陳伯紹倡亂擁衆入城國用揮刀躍馬率甲士巷戰力盡自刎塗廓遼東人任河南河北兵巡道順治六年寇陷隆平延及武安廓親率剿捕馬蹶陳亡王希舜遼陽人順治六年任河西分巡道寬簡愛民王永強作亂不屈死之李文學奉天人順治六年知定陶縣時李化鯨餘黨邢可觀猶負固榆園文學蒞任三月遇賊於白塔坡挺身與戰身被數創而死唐士傑遼東人順治間除南漳縣時土賊盤踞西山出沒無常士傑每挺身勦戰賊勢蜂擁力不能支自焚死徐大用奉天人厯任參議道分守萊州順治十年膠州總兵官海時行嗾兵為逆逼勒大用同入海不從𬒳害劉登科奉天人知黃巖縣順治十四年海冦陷城脅降不從遂縛投三江水中死文運亨遼東人順治十六年任新田令值猺賊犯城運亨率兵拒守賊衆大至城陷𬒳害范承謨漢軍鑲黃旗人文程次子康熙七年巡撫浙江有惠政十一年總督福建會耿精忠反欲脅承謨降承謨不屈囚之罵不絶口卒為所殺贈兵部尚書加太子少保諡忠貞雍正中入祀昭忠祠承謨被幽時有畫壁吟自述人多傳之馬雄鎮漢軍鑲紅旗人由廕生任廣西巡撫康熙十二年逆藩吳三桂反孫延齡叛應之雄鎮密檄提督馬雄會剿雄遷延不至因蠟疏具狀並遣其子世濟世永間道入京乞師後賊擁之脅降罵不屈闔門死賊者百餘人贈太子太保兵部尚書諡文毅雍正中入祀昭忠祠乾隆十六年特豫恩騎尉世襲甘文焜遼東人隸正藍旗漢軍康熙八年任雲貴總督密陳吳三桂不法狀十二年三桂反提督李本深以安順應之文焜以省城不可守馳赴鎮遠思招集楚兵扼險至則守將江義先自從賊各屬鄉應文焜知不可為赴吉祥寺自刎其子國城及筆帖式和善雅圖從死贈兵部尚書諡忠果時按察使李興元貴陽府同知楊應鶚皆以不屈死皆遼東人李成功遼東人任參將隸湖鎮劉進忠麾下康熙十三年耿精忠叛密授進忠偽職成功謀與于國連共誅之機泄𬒳執不屈死于國連遼東人康熙十三年授防禦職與參將李成功謀誅叛鎮劉進忠事泄進忠擊連連射進忠中臂力戰三晝夜死之魏萬侯奉天人武進士任浙江溫鎮左營遊擊康熙甲寅夏閩冦圍瑞安縣萬侯率師援擊至北湖嶺斬馘甚衆以後軍不至退保慈湖既而羣賊蜂集勢不能支力戰死之長子棟亦殁於陳廖有功瀋陽人官福州千總康熙甲寅三月耿逆會文武諸僚脅制府為亂有功不從手刃十數賊力盡死滕天成漢軍正白旗人承襲佐領康熙十五年征浙閩力戰海澄豬兒山死之王忠孝遼東人康熙十五年署左翼鎮總兵進剿滇南衝鋒破敵身先士卒引兵逼城深入陷陳死段應舉遼陽人隸鑲藍旗漢軍以功纍遷至福建提督康熙十五年從征耿精忠克復全省誓師戒殺秋毫無犯十六年剿海賊鄭錦屢著戰功十七年以失利退保海澄調副都統會賊衆併力犯之食盡援絶城陷自縊死入祀昭忠祠王之鼎漢軍正紅旗人康熙十九年以定海將軍提督四川恢復全蜀提兵進援永寧為賊所困三閲月糧盡援絶猶率兵挑戰士卒益奮賊以火藥轟城陷被執拔刀自刎未絶舁至貴陽賊黨百方勸脅不屈遂與總兵何成德等十二人同時遇害贈太子少保諡忠毅廕其子三等伯世襲雍正七年入祀昭忠祠高天爵鐵嶺人初隸鑲白旗漢軍後改鑲黃旗知建昌府耿精忠之變出募丁壯固繕城垣躬擐甲胄與賊戰𬒳執不屈死贈太僕寺卿諡忠烈雍正四年加禮部尚書銜喻三畏遼東人任建寧同知耿精忠難作與福州守王之儀侯官令劉嘉猷同𬒳害于成龍奉天人隸鑲紅旗漢軍康熙初知江寧府興利除弊知無不為斷獄尤明允二十五年巡撫直隸政治嚴明貴近有犯必懲事不便於民者悉除之遷河南總督去三十七年復以總督管直隸巡撫事民聞其來無不歡躍成龍所至有聲與永寧于公並稱於世繆鴻業海城人親殁廬墓鐵範金承德人康熙丁丑進士官翰林院檢討母疾篤範金割腕肉以進母立蘇祁祖西奉天正白旗人素有孝行母殁廬墓三年康熙年間旌王瓚漢軍正白旗人拔貢生素行純篤其母病殁廬墓三年哀毁盡禮乾隆六年旌
