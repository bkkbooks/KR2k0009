body:
  text: 嘉定府在四川省治南三百九十里東西距四百里南北距二百十里東至資州内江縣界二百里西至夷界二百里南至敘州府宜賓縣界一百六十里北至眉州青神縣界五十里東南至宜賓縣界一百六十里西南至夷界二百十里東北至資州井研縣界六十里西北至雅州府名山縣界一百七十五里自府治至京師六千一百里分野天文井鬼分野鶉首之次建置沿革禹貢梁州之域秦屬蜀郡漢為犍為郡南安縣地梁末為青州地周武帝保定元年置平羌郡大成元年分置嘉州元和志以境接漢之漢嘉舊縣為名隋開皇初廢郡大業二年州併入眉州尋置眉山郡元和志八年改郡蓋眉州初治通義至八年改郡始徙龍游也唐武德元年復曰嘉州天寶初改犍為郡乾元初仍曰嘉州屬劒南道五代屬蜀宋初因之慶元二年升為嘉定府開禧元年置嘉慶軍屬成都府路元至元十三年置嘉定路總管府屬四川行省明洪武四年仍為嘉定府九年降為州屬四川布政使司本朝初因之雍正十二年復升為府屬四川省嘉慶十三年置峩邊廳屬之領縣七廳一樂山縣附郭東西距一百三十里南北距一百三十里東至榮縣界八十里西至峩眉縣界五十里南至犍為縣界八十里北至眉州青神縣界五十里東南至犍為縣界六十里西南至敘州府里屏山縣界一百六十里西北至夾江縣界四十東北至青神縣界三里漢犍爲郡南安縣十地周保定元年置平改曰峩眉九年改羌縣爲平羌郡治隋開皇三名青衣十年又改曰龍游爲年嘉州治大業二年州爲嘉州治宋宣和廢屬眉州後復爲眉山元年改曰嘉祥後復曰郡治唐龍游爲嘉定府治本朝雍元爲正十嘉定路治二年復置明洪武九年省縣樂山縣爲嘉定府入州治峩眉縣在府西七十里東西距一距一百二十里東至樂山百六十里南北縣界二十里西至雅州府清溪縣夷界一百四十道南至夷界一百里北至夾江縣里山界二箐不十里通大東南至犍爲縣東北至夾五十江縣里西南至峩邊㕔界四十里西北至界一百洪雅縣二十里界四十里漢南安縣地周平羌縣地隋開皇初爲峩眉縣地尋爲青衣縣地十三年别置峩眉縣屬眉山郡唐宋屬嘉州元屬嘉定路明屬嘉定州本朝雍正十二年屬嘉定府洪雅縣在府西北一百三十里東西距七十五里南北距八十里東至眉州丹稜縣界十五里西至雅州府雅安縣界六十里南至夾江縣界三十里北至丹稜縣界五十里東南至夾江縣界二十五里西南至雅州府榮經縣界一百二十里東北至丹稜縣界三十里西北至雅州府名山縣界四十五里漢南安縣地周置洪雅鎮隋開皇十三年分置洪雅縣屬眉山郡唐武德九年於縣置犍州貞觀元年州廢屬眉州開元七年復於縣置義州八年州廢仍屬眉州宋初因之淳化四年改屬嘉州元至元二十年省入夾江縣明成化十八年復置屬嘉定州本朝雍正十二年屬嘉定府夾江縣在府西北八十里東西距四十里南北距六十里東至眉州界二十里西至峩眉縣界二十里南至樂山縣界四十里北至眉州丹稜縣界二十里東南至樂山縣界八十里西南至峩眉縣界三十里東北至眉州青神縣界三十里西北至洪雅縣界三十里漢置南安縣屬犍為郡後漢及晉宋齊皆因之後廢周為平羌縣地隋開皇三年分置夾江縣屬眉山郡唐屬嘉州宋屬嘉定府元屬嘉定路明屬嘉定州本朝雍正十二年屬嘉定府犍為縣在府東南一百二十里東西距一百十里南北距一百二十屏山縣界五里東至榮縣界六十里西至敘州十里南至敘州府宜賓縣界六十府里北至樂山縣界六十里東南至宜賓縣界四十里西南至屏山縣沐川司界六十里東北至榮縣界六十里西北至樂山縣界六十里漢南安縣地周置沈犀郡并置武陽縣隋開皇三年郡廢改縣曰犍為屬犍為郡唐初屬戎州上元二年改屬嘉州宋屬嘉定府元屬嘉定路明屬嘉定州本朝雍正十二年屬嘉定府榮縣在府東一百五十里東西距一百二十里南北距一百七十里東至威遠縣界四十里西至樂山縣界八十里南至敘州府宜賓縣界一百四十里北至威遠縣界三十里東南至敘州府富順縣界九十里西南至犍為縣界六十里東北至資州界九十里西北至資州井研縣界六十里漢犍為郡南安江陽二縣地隋開皇十三年置大牢縣屬資陽郡唐武德元年分置公井縣兼置榮州六年徙州治大牢貞觀元年又分置旭川縣屬之永徽二年移榮州治旭川天寶初改和義郡乾元初復曰榮州屬劒南道宋分屬潼川路治平四年改旭川縣曰榮德紹熙中升為紹熙府寶祐後廢元末復置榮州屬嘉定路明洪武九年降州為榮縣屬嘉定州本朝雍正十二年屬嘉定府威遠縣在府東二百六十里東西距六十里南北距六十里東至敘州府富順縣界三十里西至榮縣界三十里南至榮縣界四十里北至資州界二十里東南至富順縣界三十里西南至榮縣界四十里東北至資州内江縣界六十里西北至資州井研縣界二十里漢犍為郡資中縣地隋開皇三年置威遠戍後改戍為縣屬資陽郡唐武德元年改屬榮州宋因之元初省後復置明洪武十年省入榮縣十三年復置屬嘉定州本朝康熙六年併入榮縣雍正六年復置屬嘉定州雍正十二年屬嘉定府峩邊廳在府西二百六十里東西距二百里南北距二百四十八里東至赤夷界六十里西至雅州府清溪縣界一百四十里南至赤夷界八里北至峩眉縣界二百四十里東南至敘州府馬邊廳界一百八十里西南至寕遠府夷地界五十里東北至樂山縣界一百三十里西北至清溪縣夷地界一百里漢南安縣地隋初為峩眉縣地唐分置沐州及羅目綏山樂都三縣廳即羅目舊縣也沐州及樂都尋廢宋初又省羅目綏山入峩眉元因之本朝乾隆五十五年設主簿分駐嘉慶