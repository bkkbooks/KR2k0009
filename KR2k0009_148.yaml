陽會赦還至靜海卒隆慶初贈左僉都御史宿進夾江人正德進士官刑部員外郎劉瑾亂政庶獄隨意出入進守法不回瑾誅張永用事又上六患三本䟽請汰内臣逐番僧義子停差出官校語甚剴切廷杖遞歸卒年四十二嘉靖初贈光祿寺少卿建專祠安磐嘉定州人宏治進士改庶吉士正德時厯吏兵二科給事中乞假去嘉靖初起故官帝頻興齋醮磐抗疏極諫永福長公主下嫁磐言舊儀駙馬見公主行兩拜禮公主坐受乖夫婦之分宜革正錦衣革職旗校王邦奇屢乞復職磐言邦竒貪饕酷虐宜絶禍源帝不從其後邦竒卒爲大厲轉兵科都給事中以議大禮伏闕被杖落職爲民程啓充嘉定州人正德進士厯御史極論嬖倖子弟家人濫冒軍功有買功冒功寄名竄名併功之弊都督馬昻進妊身女弟啓充抗疏極諌嘉靖議大禮復力陳啓充數以謇諤忤帝㫖張璁桂萼亦惡之緣此謫戌邊衛十餘年赦還卒隆慶初贈光祿少卿王表嘉定州人幼孤正德中舉於鄉以養母不赴會試有司强之去行百里而返三赴始抵京試畢即兼程返母病割股以療趙時犍爲人正德舉人知耀州勸墾闢復流亡三年増户千二百改治學舍祠宋守范文正公館諸生而教之徙乾州平妖賊樊紳再補商州新洞礦徒知爲破樊賊者衆即散去秦嶺卒斃於虎時爲文告神明一日虎自道死遷大理同知署府事罷採石之役與郡之取非其有者大夷相殺傷爭久不決檄時往勘夷餉金一䭾卻之遂無不服擢知廣南府土官儂氏自相攻入寨土舍龍的亦叛大吏並以討請時謂相噬不足煩兵親往諭儂氏皆泣聽命八寨猶旅拒因使儂承恩以其兵閒道破龍的於是招輯誨誘治爲諸郡最升太僕少卿諸夷泣送馬幾不得前子正學嘉靖進士厯河南按察亦有治績彭汝實嘉定州人父鏡通判池陽士庶德之進大理同知多善政以疾卒於官汝實正徳進士授南京吏科給事中嘉靖初吕柟鄒守益以爭大禮下詔獄汝實抗章論救既以災異切指時政姦人王邦竒訐楊廷和彭澤復䟽爭之數忤當事遂奪職奉親結廬山中講授生徒與同里程啓充徐文華安磐並以敢言著稱嘉定四諌張奇述嘉定州人性至孝嘉靖中進士厯浙江僉事廉介不阿以忤鄢𢡟卿歸著有梓里資談雲樵記諸書錢貴峩眉人萬厯中由明經知富民縣以廉平著邑人李義為盜所誣獄成貴廉白其冤義以三百金謝叱之去楊可陶嘉定州人萬厯中為平越同知性嚴重果於任事時改設府州縣治諸頼綜理勞績甚著朱祚増嘉定州人崇禎進士官襄陽推官李自成䧟襄不屈舉家殉難從弟祚遠在署賊偉其貌欲生之亦大罵自刎死祀鄉賢楊展嘉定州人崇禎武進士授遊擊升參將甲申獻賊據成都展起兵犍為攻復敘州城次第收嘉戎諸邑遺民潰卒多歸之衆至數萬大敗賊并令其子璟屯田峩眉嵗獲粟數千蜀南頼之獻賊怒川人不服己大殺成都居民率衆百萬蔽江而下展起兵迎之戰於彭山以火焚賊艘數千麋爛幾盡所掠金玉寶珠悉沈水底獻從别道逃奔展之威名大振蜀人起兵拒賊者皆倚為長城尋為降賊所忌與巡撫李乾德謀殺之年四十五羅國瓛嘉定州人崇禎進士巡按雲南孫可望等破曲靖國瓛方按部其地被執不屈至昆明自焚死一年本朝乾隆四十賜諡忠烈余飛洪雅人獻賊至飛誓於里中集衆萬餘先設伏自迎戰於花皆䧟田中斬馘無溪口偽北以誘之伏發賊步騎算後以戰殁本朝乾隆四十一年予入忠義祠黎應大夾江人獻賊䧟夾江應大潛結鄉鄰之倡義者以圖恢復事露賊支解之子照斗照逵照鸞罵賊同日遇害王運開夾江人崇禎舉人為永昌推官孫可望入雲南士民號泣於運開門乞納款紓禍運開不從自經死賊嘉其死節求其弟運宏聘之行至潞江謂其僕曰吾兄弟可異趣耶若收吾骨與兄合葬遂躍入江而死本朝乾隆四十一年賜運開諡節愍陳天祐犍為舉人獻賊據蜀以偽官召不至賊將孫可望駐縣南虎吼壩執至正亦為賊執營罵賊死闔門殉節時同縣拔貢周欲授以官不從與天祐同罵賊死正子成儒奔賊營抱父屍痛哭賊並殺之又有周正選者為孫可望所執脅降不屈死本朝乾隆四十一年俱予入忠義祠按犍為縣志周正選拔或云舉人舊通志載周正選事與周正同其或本一人而誤連選字遂分為二人耶今據殉節諸臣錄仍兩載之簡仁端榮縣人由舉人厯官西安同知遷平涼知府崇禎十六年流賊入關諸王宗室及監司以下官謀遁走仁端謁韓王曰殿下輕棄三百年社稷欲何之縱賊壓境延寕甘凉諸軍足相援必不能支同死社稷亦不辱二祖列宗王不從斬關出奔仁端乃撤居民入城為死守計未幾賊抵城下守陴皆哭士民草降書乞僉名仁端厲聲責之正衣冠自經堂上本朝乾隆四十一年賜諡節愍李亨吉榮縣人獻賊䧟成都榮亦被兵偽官執亨吉見賊帥不屈膝賊割亨吉耳以授亨吉曰父母遺體嚼吞之㩜送成都罵不絕口與父國柄兄元吉俱罹難本朝潘登貴嘉定人順治二年知江南懷遠縣時兵戈甫定民氣未復登貴寛和鎭靜一以撫綏為治境内安焉鄭居廣嘉定人康熙舉人性孝友官湖廣枝江知縣有惠政夏包子之亂城䧟死之著有靜存集杜廷玉嘉定人康熙舉人性孝友文行高卓善誘後進好義樂施州人慕之請祀鄉賢祠朱曙蓀嘉定人康熙進士授翰林檢討兩為會試同考官出典廣西試厯山西陜西提學識拔多知名士轉通政告歸曙蓀工文章多著述尤精藻鑑其為廣西考官也桂林陳宏謀卷己被斥曙蓀力爭寘之首選陳次年遂入詞館後為名宦常自述為知己鄒玵榮縣人康熙舉人官福建建陽縣知縣少喪母能盡哀慕繼母舒生季弟於玵等衣食故從豐反踰己子玵不敢辭而陰均之友愛備至母屢窺見信其誠由是一視諸子述玵孝友於族黨乾隆元年入祀鄉賢祠黃中色夾江人奉