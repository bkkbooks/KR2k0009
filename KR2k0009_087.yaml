州團練使兼緣邊巡檢濠寨橋道使暉盡得山川險易密疏陳之太祖大悅及大軍西下暉督軍開大散開路躬撫士卒且役且戰人忘其勞李穆陽武人宋初為洋州通判剖決滯訟無留獄安守忠晉陽人乾德中蜀平太祖知遠俗苦苛虐南鄭為走集之地特命守忠知興元府以撫綏之周渭恭城人乾德中通判興州州領罝口寨多戍兵監軍傲狠縱其下為暴居人苦之渭馳往諭以禍福斬其軍校衆皆懾服詔書褒嘉命兼本寨鈐轄開寶初鳯州主吏盜隱官銀擇渭往代周歲羡課數倍趙安易薊人太平興國中知興元府先是兩川民輸稅者以鐵錢易銅錢安易言其非便請許納鐡錢詔從之韓億雍邱人真宗時知洋州州豪李甲凡死迫嫂使嫁因誣其子為他姓以專其資嫂訴於官甲輒賂吏掠服之積十餘年訴不已億視舊牘未嘗引乳醫為證召甲出乳醫示之甲無以為辭冤遂辨楊繪綿竹人仁宗時知興元府吏請攝穿窬盜庫縑者繪就視之蹤迹不類人所出入呼戲沐猴者詰於庭一訊具伏府中服其明在郡獄無繫囚文同梓潼人皇祐中知興元府治庠序擇行藝之秀者掌之風諭境內遣子弟就學暇日躬閲訓導褒斜間道多剽竊吏不能禁同治之盜不敢犯後徙知洋州有惠政盧士宏新鄭人知洋州先是圭田多虛藉士宏考校令隨實以輸自部使者而下皆十損七八文彥博包拯皆以亷能薦楊文廣太原人治平中為興州防禦使韓琦使築篳篥城文廣聲言城噴珠率衆急趨篳篥比暮至其所部分已定遲明敵騎大至知不可犯而去文廣遣將襲之斬獲甚衆种世衡洛陽人通判鳳州州將王蒙正章獻后姻家也所為不法嘗千世衡以私不聽蒙正怒乃隂搆之坐謫劉子羽崇安人建炎中吳玠戍河池五彥戍金州皆飢興元帥臣閉糴二鎮病之張浚承制拜子羽知興元府子羽至漢中通商輸粟二鎮遂安郭浩隴干人紹興初金人破饒風嶺侵梁洋入鳳州攻和尚原浩與吳璘往援斬獲萬計徙知興元府飢民相聚米倉山為亂浩討平之王庶慶陽人紹興中知興元府庶以士卒單寡籍興洋諸邑及三泉縣強壯兩丁取一三取二號義士日閲於縣月閲於州厚犒之不半年有兵數萬王夢易滎州人常攝興州改川陜茶運置茶鋪免役民嵗課亦辦吳璘隴干人紹興中為利州西路安撫使浩興州時和議方堅而璘治軍經武常如敵至二十六年改判興州從拜四川宣撫使乾道初又改刺興元府修復褒城古堰溉田數千頃民甚便之楊政臨涇人紹興二年知鳳州十年徙知興元府會金渝盟政建迎敵之䇿斬獲甚多明年政出和尚原屢敗金兵和議成帝召政還軍民詣部使者借留還鎮屯興元府守漢中十八年六堰久壞失灌溉之利政為修復漢江水決為害政築長隄捍之凡有益於民者不敢以軍旅廢故將士上下安之唐文若眉山人高宗時通判洋州洋西鄉縣産茶亙陵谷八百餘里山窮險賦不盡括使者韓球將增賦以市寵園户避苛斂轉徙飢饉相藉文若力爭之賦訖不增吳拱璘兄玠之子乾道中知興元府漕使王炎委修復山河堰盡修六堰濬大小渠六十五里凡溉南鄭褒城田二十三萬三千畝有奇下詔獎諭虞允文仁夀人乾道中為四川宣撫使至漢中金洋興元歸正人二萬遮道訴繫縲之苦允文分給官田俾咸振業李蘩晉原人孝宗時知興元府安撫利州東路漢中久飢劍外和糴在州者獨多蘩訪求民瘼有老嫗進曰民所以飢者和糴病之也蘩感其言奏免之民大悅吳挺璘子淳熙初為興州都統初軍中置互市於宕昌羌馬騎兵雄天下自張松典榷牧奏絶互市所得多下駟挺至首陳利害詔許歲市七百匹始武興所部就餉諸部漫不相屬挺奏以十軍為名營部於是井然四年除知興州利州西路安撫使密修皂郊堡增二寨繕戎器儲於兩庫敵終不覺成州西和歲大祲挺力為賑恤全活數十萬郡東北有二谷水挺作二隄捍之紹熙中水暴發入城挺既賑被水者復增築長隄以為障詔問僃邊急務即建增儲之䇿由是糧糗不乏民賴以安張詔成州人趙汝愚為從官時每奏吳氏世掌蜀兵非國家之利請以詔代領武興之軍汝愚既知樞密府力辭不拜白於光宗曰若武興朝除帥則臣夕拜命帝許之乃以詔為成州團練使興州諸軍都統制詔在興州甚得士心楊震仲成都人開禧初辟興元府通判權大安軍吳曦叛馳檄招之震仲辭疾不行時軍教授史次秦亦被檄謀於震仲震仲曰大安自武興來為西蜀第一州若首從其招則諸郡風靡矣顧力不能拒義死之曦遣郭鵬飛代震仲趣其行益急震仲飲毒死闔郡為之流涕明年曦伏誅安丙為興州安撫使以震仲死事聞贈朝奉大夫史次秦眉山人為大安軍教授吳曦叛招次秦甚遽次秦遷延固避曦迫之乃以石灰桐油塗兩目末生附子傅之比至目益腫次秦母年高而賢聞次秦為曦所招即命家人以疾篤馳報曦乃聽還曦誅蜀帥上其事改秩利州路主管文字安丙廣安人慶元間知大安軍歲旱民艱食丙以家財糴米數萬石以賑開禧二年程松為四川宣撫使吳曦副之丙陳十可憂於松言曦必誤國松不省既而曦奏丙為隨軍轉運使居河池曦僭號稱臣於金丙與楊巨源李好義等誅曦加丙知興州安撫使時方議和丙獨戒飭將士以攻為守威名甚著李好義下邽人開禧初為興州正將吳曦叛好義自青坊聞變亟歸謀誅之以所謀告李貴遣人約楊巨源等夜饗士麾衆授甲與兄好古好仁拜訣家廟入偽宫遂斬曦首馳告安丙宣詔軍民好義請乘時取關外四州十戰至山寨高堡七日至西和以少擊衆前無留敵金西和節度使完顔欽遁好義整衆而入軍民歡呼迎拜籍府庫以歸於官楊巨源益昌人為鳳州堡子原倉官傾財養士沿邊忠義咸服其才移監興州合江贍軍倉吳曦叛巨源陰有討賊志結義士三百人給其衣食與李好義會好義率其徒入偽宫巨源持詔乘馬自稱奉使入內曦啓户欲逸李貴執殺之以曦首徇三軍推安丙權四川宣撫使巨源權參贊軍事丙奏功於朝以巨源第一詔補承宣郎劉甲龍遊人開禧中知興元府利東安撫使金立吳曦為芻王曦以書致甲甲援大義拒之欲自拔歸朝先募二兵持帛書遺參知政事李璧告變璧袖帛書以進上覽之稱忠臣者再召甲赴行在後再知興元府權四川制置司事先是大臣撫蜀者諸將有互送禮實賄賂也甲下令首罷之凡安丙所立茶鹽柴邸俱廢之又乞復道吳氏莊歲收租四萬有奇錢十三萬以禆總計從之丙增多田稅甲歲減凡百六十萬緡米麥萬七千石邊民感泣高稼蒲江人寶慶中桂如淵鎮蜀辟稼通判沔州兼幕職創山寨八十有四募義兵為守禦計元兵由東道入如淵辟稼知洋州及漢中陷沔州破稼率遺民駐廉水縣以保巴山制置使趙彥呐以參議官辟之稼言漢中蕩無藩籬宜經理仙人原乃繕營壘峙芻糧比器甲開泉源守禦之規罔不僃具尋知沔州葺理創殘招聚流散民皆襁負來歸後元兵自泉關入衆潰城陷遂死焉曹友聞栗亭人端平中權知沔州節制屯戍軍馬引兵扼仙人關元兵大至制置使趙彥呐檄友聞控制大安以保蜀口友聞馳書曰沔陽蜀之險要吾重兵在此敵有後顧憂必不能越沔陽入蜀大安無險可守豈可以平地控禦彥呐不從一日來速者七友聞引兵夜出遇元兵與弟萬血戰俱死贈龍圖閣學士諡曰節胡世全景定四年為沔州都統護糧運至虎象山遇元兵戰敗死之楊世威宋末為忠義副總管元兵破大安世威堅守魚孔隘孤壘不降詔以世威就知大安軍元暢師文南陽人至元間為漢中道巡行勸農副使置義倉孝民種藝法改僉本道提刑按察司事黜姦舉才咸服其公姚燧柳城人至元中除陜西漢中道提刑按察司副使録囚延安逮繫詿誤皆縱釋之人服其明決王利用潞縣人大德初為興元路總管減職田租額站户之役於他郡者悉除之民甚便焉有婦毒殺其夫問藥所從來吏教婦指為富商所貨獄上利用曰家富而貨毒藥豈人情哉訊之果冤明金興旺洪武初守興元明升將吳友仁以三萬衆來攻城中兵止三千興旺迎敵面中流矢拔矢復戰敵益衆乃斂兵入城傅友德來援友仁敗走興旺出兵躡之蜀兵墜崖石死者無算威震隴蜀費震鄱陽人洪武初知漢中府歲凶盜起震發倉粟十餘萬斛貸民俾秋成還倉易陳為新盜皆來歸令占宅自為保伍得數千家秋大熟民盡償前栗太祖聞而嘉之方孝孺寧海人洪武中除漢中府教授日與諸生講學不倦蜀獻王慕其賢延為賓師每日陳説道德王尊以殊禮孝孺嘗以遜志名齋王改曰正學王黼武進人宣德中知洋縣奏最當遷民詣闕乞留者數千人詔加秩還任張仕隆安陽人嘉靖初以御史為關南副使時漢中為民害者有五狼八犬一虎一彪之謡按得其實即置於法嚴禁苛索一時貪墨望風解去礦徒為盜召而諭之即時解散趙鯤壽張人知漢中府大盜故海珠依山險為寇父子相繼四十餘年鯤下車即選練民兵以計擒之餘黨奔潰境內悉平李用中杞縣人萬厯中知洋縣多惠政百姓立祠祀之姚立誠安邑人萬厯中知洋縣惠政及民瑞麥嘉禾疊見徵應張兆曾雲南人天啓中以隴右參議署關南道道上聞哭聲詢之曰貪辨科役貧無措懼嘻耳曾按得其實時巨蠧謂為代庖官曰五日京兆耳曾曰去蠧如鋤莠除治務盡旬餘肅清吕大器遂寧人天啓中任關南道時關南稱盜藪大器招募以俸金鑄錢為的射中即賞之由是人皆競奮精於射念陽平關為秦蜀咽喉繕葺之寇盜聞之皆逃遁潘文太原人天啓中知漢中府案無留牘時礦寇肆掠丈設策招安令充牙兵未一載殺人如故文以計殱滅之民獲安堵馮上賓獲嘉人崇禎初知漢中府不避權貴每有寇警上賓多方豫僃城保無虞司五教內黃人崇禎末知城固縣山民據險稱亂五教率兵擒斬之闖賊至且戰且守城陷不屈遇害周應泰湖廣人崇禎間知寧羌州巨寇陷城罵賊遇害胡上進稿城人崇禎中知鳯縣巨寇陷城罵賊遇害吉永祚輝縣人崇禎末為鳳縣主簿將去任會賊至縣今棄城遁永祚倡義拒守城陷與二子士樞士模皆死之教諭李之蔚鄉官魏炳亦不屈死永祚贈漢中衛經厯餘贈恤有差本朝楊可經順天通州人順治初知漢中府賀珍犯境與同知董應徵李芳徵原體蒙峙備芻糧協力固守城賴以完李天敘安陽人順治中知洋縣時吳三桂駐漢中邑苦騷擾天敘每與力爭民以獲蘇衣璟如棲霞人順治中任漢中府推官吳三桂駐漢中兵民錯處豪猾依倚為姦璟如蒞政嚴明豪民皆相戒曰各自愛母犯衣君令尤長於聽斷雖詞涉兩端獄稽數載者以片語折之皆屈服劉澤霖直隸人順治中任漢中府同知吳三桂駐漢中其黨重利剝民及移駐雲南索逋甚急質民子女號泣遍野澤霖以法逮治其尤者仍率屬捐金贖男婦數百口民皆安堵南鄭有柳邊堰為沙所衝澤霖疏鑿得宜沿邊栽栁以障沙民利賴之吳樹聲江寧人知略陽縣時冠氛未靖邑當衝要樹聲設計防禦以勞勩卒於官汪化鼇涇縣人康熙中任漢中府同知吳三桂據漢南逼受偽職化鼇不從自經死又馮臯強永濟人亦漢中同知吳三桂叛隨征至沔縣陷賊中導之降不從賊幽之古寺中厯五載不易節後漢中平督臣哈占疏其節於朝費雅達滿洲人康熙中授漢中鎮總兵先是漢中失守官兵退屯南山之麓費雅達至約東軍士沿山村堡民不知兵及大兵復漢中費雅逹帥師進征居民爭挈壺漿囊糗􅖲以送之滕天綬遼陽人康熙中知漢中府諳練精敏修復廟學倉廒漢南素饒水利天綬相視地形築隄建閘啓閉有期蓄泄有界自是爭端永杜柯棟建德人康熙初知洋縣時華陽多盜棟恩威兼濟且捕治之山境悉清招徠復業捐給牛種山民頌德不衰劉􅙺諸城人康熙中知寧羌州州處羣山中無宿儲值漢南大飢艱於挽運乃貸於他邑約能負斗粟至者子三升不十日挽三千石奉檄賑洋縣民即先馳赴偏厯審勘移粟借糶數日而畢山産槲葉而民不習于蠶乃募善蠶者教之蠶民賴其利稱為劉公繭始寧羌頗形雕攰􅙺為均田額完逋賦補棧道修旅次安輯招來期年而廬舍萃集户口倍增王穆婁縣人康熙五十一年知洋縣時徴賦不符原額官民俱病穆招民墾荒授田者數千家又洋阻山多虎患穆禱于神募人射之患以息修洋縣城固兩縣志均稱詳備范昉會稽人雍正中知略陽縣時西口用兵昉運馬赴軍營即留辦軍糧六年積功加布政使銜卒于官民為建祠祀之嶽禮滿洲正白旗人乾隆初任漢興道守正不阿以作育人材為務偕郡守朱間聖創建漢南書院捐置膏火講論性命之學士林至今頌之郭愈博解州人乾隆中知略陽縣修理城垣凡四年而竣一椽一索不以纍氏隄防堅固城垣高峻嘉慶二三年賊寇略陽數來城下窺探曰此不可攻遂去鄧蘿琴浮梁人乾隆中知漢中府修復城固洋縣五門堰定引水章程以利灌溉勘罷略陽縣舊銅廠遊民屏迹閃煜龍保安人乾隆中任寧羌營遊擊嘉慶元年剿賊殁于陳又慶陽人陳載德二年任寧羌營遊擊剿賊奮勇殁於陳王行儉溧陽人乾隆中知南鄭縣修縣志徵文考獻燦然明備嘉慶二年在白土關剿賊殁於陳事聞賜恤給雲騎尉世職齊默慎蒙古鑲紅旗人任留壩廳同知嘉慶三年賊匪張漢潮攻城默慎率司獄黃定一禦之力竭俱死之又漢鳳營遊擊蘇維龍勦賊至唐藏殁於陳汪銓彭澤人任留壩廳同知嘉慶六年從剿賊匪於城固縣之小河口死之事聞贈太僕寺卿周湖本清泉人知略陽縣嘉慶三年賊匪竄至軍需糧運不以纍民捐修望房集勇守禦城賴以完積勤卒於官朱集才寧夏人任西江口營遊擊嘉慶八年從剿賊匪於鄖西縣殁於陳又漢中城守營都司劉勝祥松桃廳人亦從征剿賊匪於大寧縣之松木坪奮勇殺賊殁於陳班逢揚崞縣人嘉慶五年知南鄭縣清介自矢勤於吏治時諸軍剿賊供億無誤修東關堡城九百餘丈引冷水河灌田數千畝民德之曰班公堰定遠初設廳治以才升任甫至官卒曾彰泗德陽人知洋縣嘉慶十一年寧陜兵叛彰泗登城守禦寡不敵衆遂遇害事聞照知州例賜恤同時大興劉錫名以乾州吏目署華陽縣丞卸篆過洋協同堵禦亦為賊所害張掖人田得任西江口守僃叛兵竄至戰死周鳴球瀘溪人嘉慶十二年知沔縣潔清自守慈惠愛民橋梁道路郵政無不修飭嚴懲訟棍黑河為姦匪叢藪設卡房二十四處姦匪相戒不敢入以積勞卒於官人物漢鄧公城固人景帝時以謁者僕射為校尉擊吳楚帝問曰道軍所來聞鼂錯死吳楚罷兵不鄧公曰吳為反數十歲矣以誅錯為名其意不在錯也錯患諸侯強大不可制故請削之以尊京師計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也拜為城陽中尉建元中為九卿一年謝病免歸其子章以修黃老言顯諸公間張騫城固人建元中為郎應募使月氏徑胸奴留十餘歲乃還後以校尉從衛青擊胸奴封博望侯張猛騫孫師事周堪元帝時為光祿大夫給事中與周堪同心輔政為右顯所譖自殺李法南鄭人博通羣書性剛而有節永元九年應賢良方正對策除博士遷侍中光祿大夫歲餘上疏以為宦官權重椒房寵盛又譏史官記事不實下有司免為庶人在家八年徵拜諫議大夫正言極詞無改於舊出為汝南太守李郃南鄭人通五經善河洛風星縣召署幕門候史和帝分遣使者微行觀採風謡使者二人當到益部投郃候舍時夏夕露坐郃仰觀問曰二君發京師時豈知朝廷遣二使耶二人驚問郃曰有二使星入益州故知之耳後舉孝亷五遷尚書令拜太常代袁敞為司空數陳得失有忠臣節李固郃之子少好學常步行尋師不遠千里遂究覽墳籍結交英賢陽嘉二年以災異對䇿順帝覽其對多所納用即時出宋阿母還舍諸常侍悉叩頭謝罪朝廷肅然以固為議郎而阿母宦官疾固言直因詐飛章以陷其罪出為廣漢雒令厯荆州刺史泰山太守沖帝即位以為太尉及沖帝崩質帝遇弒固與杜喬欲立清河王蒜梁冀竟立桓帝誣固下獄遂見害二子基兹皆死獄中李厯郃弟子清白有節博學善交與鄭康成陳紀等相結為新城長政貴無為官至奉車都尉樊志張南鄭人博學多通隱身不仕嘗遊隴西破羌將軍段熲出征西羌請見志張其夕熲軍為羌所圍因留軍中夜謂熲曰東南角無復羌宜乘虛引出住百里還師攻之可以全勝熲從之果破賊於是以狀表聞有詔特徴會病終李燮固少子固既遇害時燮年十三姊文姬以燮託父門生王成成將燮入徐州界內變姓名為酒家傭十餘年冀既誅始還鄉里後徴拜議郎亷方自守靈帝時拜安平相先是安平王續為張角賊所掠贖還燮奏續不宜復國已而續竟歸藩未滿嵗果坐不道誅乃擢燮河南尹時以貨賂為官燮上書陳諫辭義深切帝乃止在職二年卒時人感其世忠正咸傷惜焉程包漢中人靈帝時為郡上計時巴郡板楯蠻寇掠三蜀及漢中諸郡帝問益州計吏征討方略包對曰板楯立功先世復為義人自永初以來忠功屢著本無惡心愁苦賦役困罹酷刑以致叛戾但選明能牧守自然安定帝從其言即皆降服三國漢陳術漢中人博學多聞著釋問七篇益都耆舊傳及志南北朝南齊陽黑頭華陽人疏從四世同居建元三年大使奏表門閭蠲租稅郝道福華陽人纍世同㸑建武三年明帝詔表門閭蠲其調役周趙文表南鄭人世為二千石父珏性方嚴有度量位御史中大夫文表少修謹志存忠節為周文親信纍遷車騎大將軍儀同三司天和中除梁州總管有長史所管地名恆稜者方數百里恃險固常懷不軌文表率衆討平之遷蓬州刺史政尚仁恕人皆懷之大象中拜吳州總管唐強循鳳州人仕纍雍州司户參軍華原無泉人畜多暍死循教濬渠水以浸田一方利之號強公渠詔書褒子甚厚厯大理少卿右庶子為政辦給不為威嚴遇人盡信不疑宋張伯威大安軍人紹熙初武進士調神泉尉時大母黃年九十八伯威不忍之官黃得疾瀕殆伯威剔左臂肉食之遂愈繼母楊因姑病篤驚成疾伯威復剔臂肉作粥以進疾亦愈事聞詔與升擢伯威不赴遂隱號無辨居士張珏鳳州人年十八從軍釣魚山以戰功纍官中軍都統制號為四川虓寶祐末元兵圍合州珏與王堅協力戰守攻之九月不能下尋以珏為合守德祐元年升四川制置副使知重慶府元兵圍重慶城中糧盡部將趙安開門降珏巷戰不支東走涪被執至安西自經死元李孟漢中人博學強記通貫經史成宗時武宗仁宗皆未出閣孟以薦為師傅大德初武宗撫軍北征仁宗留宫中孟日陳善言正道成宗聞而嘉之至大三年拜中書平章政事仁宗嗣立進階光祿大夫纍封魏國公孟宇量宏廓才略過人三入中書民間利害知無不言引古證今務歸至當進拔賢士遊其門者後皆知名卒諡文忠明王信南鄭人生半歲父忠北征戰殁母嶽氏苦節育之正統中襲千户成化初積功至都指揮僉事守僃荆襄平大盜劉千斤移湖廣平永順保靖二宣慰及荆州武岡蠻纍遷都督同知總督漕運帥府舊有湖擅為利信開以泊漕艘勢要壅水一裁以法漕務修舉信沈毅簡重厯大鎮不營私産子繼善從善皆舉進士張羽南鄭人性至孝宏治末進士武宗時以御史巡按山東時宰以故人為託至部按其人則山東大害也立劾去之中官導帝遊幸羽上疏力諫出為廣平知府調河間甚著聲績嘉靖中擢貴州布政使吏以羡金進郤不納為籍記於官厯南京工部侍郎石可礪城固人萬厯中舉於鄉知寶豐縣寶豐有舉人牛金星肆虐可礪執法按之遂逃去後從流賊陷西安或縛可礪獻之備受慘毒不屈死李遇知洋縣人萬厯中進士知東明縣以亷正稱擢兵科給事中疏月凡十上忤魏忠賢削籍崇禎初厯官吏部尚書都城陷自縊於紅廟賊解縊執之迫之仕不屈遂遇害一門同死者七人何百戶缺名沔縣人崇禎九年流賊小紅娘夜半入城百戶與柳指揮合戰均死之時有孫教諭者夫婦同罵賊死歐植褒城人崇禎中舉於鄉以教諭攝知長葛縣流賊寇河南城破被執罵賊不屈賊怒縛於柱觸柱死吉孔嘉洋縣人幼時訴父冤於巡按御史獲釋時稱其孝崇禎初舉於鄉知寧津縣有善政遷順德同知調真定尋擢順德府大兵至悉力捍禦城陷與妻張氏長子貢生惠迪次子婦王氏並死之贈太僕寺少卿妻子子婦並獲旌本朝乾隆四十一年賜諡忠節妻子並入忠義祠張鳳翮城固人天啓中進士崇禎中官御史極論四川巡撫王維章貪劣請召還給事中章正扆纍官右僉都御史巡撫江西十六年流賊陷城固脅之降不從遇害本朝乾隆四十一年賜諡忠節本朝張兆熊洋縣人明末舉人性至孝居父喪哀毁踰禮流賊寇洋兆熊偕縣令郭一龍募鄉勇數百剿之賊遁城得不陷順治中擢御史厯淮徐郴桂參政所至有聲周基昌城固人順治初從大兵至延安招撫諸寨有功賀珍寇漢中基昌單騎潰圍赴省乞救賊平授保定通判厯敘州知府劉文秀自滇窺蜀城陷不屈死妻王氏守節撫孤厯五十餘年陳國安沔縣人順治初以僉事監軍四川時姚黃賊衆猖獗安國招降之厯井陘九江道致仕歸修黃金峽險道三百里建連雲棧坍塌橋梁數十處邑多賴之吉允迪洋縣人順治中進士知信豐縣剿賊寇屢著軍功厯雲南參政貴州學道皆有實績張勇洋縣人幼孤落拓不羈善騎射初隸總督孟喬芳剿賊南北山平河西叛􅉰所至有功授甘肅總兵從經略洪承疇取滇黔進雲南提督康熙初復調甘肅吳三桂據雲南叛蔓延關涼勇以靖逆將軍率兵圍蘭州復臨洮下鞏昌降岷州及川賊出秦州勢甚熾勇分兵四應以麾下數百騎駐伏羌與賊相持數月三戰敗賊大兵至賊遂遁以收復全秦功授一等侯世襲纍進太子太師卒贈少師諡襄壯勇身經大小數百戰拔郡五州縣數十擒偽王一人斬偽將軍以下數百人每臨陳身先士卒料敵制勝能以寡擊衆紀律嚴明將吏不敢犯居恆恂恂退讓賓禮文士有古儒將風王憲南鄭人乾隆初舉武鄉試授松潘鎮千總與同縣大通協營千總淡明志均從征金川陳亡賜恤又鳳縣王應舉由行伍拔補千總從征金川戰於三滕溝死之朱之茂南鄭人性至孝避寇山中賊欲劫其父之茂涕泣哀求賊脅以刃不懼歎曰孝子也釋之父得無恙乾隆八年旌又城固李天植劉鴻澤洋縣梁杲鳯縣王天章略陽封爾燕俱乾隆件間以孝行旌談福南鄭人由行伍拔補二郎壩把總嘉慶七年禦賊於盩厔之黃柏園同縣馬萬春以華陽營外委禦賊於洋縣之茅坪均奮勇當先身被數創陳亡賜恤又武舉范瑞星貢生霍顯周廩生張漢升生員李天宇黃列五李思白文在中席思誠龍淩雲吳爾舉義民進忠孝何玉林邦銘張桂張宗德范瑞名范瑞璽褒城武生瞿景元生員李祥雲義民門廷獻趙章傅世錦城固武生傅煥王增印張某貢生衡起鳯尚希誠廩生韓拜彥王際虞義民李野趙晉卿孫承祖洋縣生員任䇿勳張友直吕筌白雲翰貢生王國棟武生姚文德監生田榮宗義民吕笙亢玳李譜李光桂楊應華李光貴白廷英白廷才白廷揚白文翠西鄉生員劉赤舄武生周文臨外委吳文學寧羌生員閔德言林挺生林逢春郭鮮修貢生陳希正武生馬世泰宋啓祥義民彭登諡沔縣廩生杜立基武生劉文振略陽生員王殿元劉思謙黨北海敬潛修義民張埰定遠廳武生王國英李玉庭張菊生員馬呈瑞馮時貴張瑄留壩廳廩生羅浮鳳生員羅光遠汪掄元均以團練義勇防堵教匪或臨陳捐軀或受執不屈死白鳳翠洋縣人少孤事母孝常奉母歸省路遇虎暴鳳翠以身蔽虎大呼虎即去母殁廬於墓所嘉慶十五年旌楊森南鄭人性至孝能以色養善醫有求輒應不計其值弟鑣選拔貢生與同縣張全理俱嘉慶十六年以孝行旌晏文質沔縣人諸生與同庠晏騰霄曹應新武生晏經邦黃永凝俱堵禦賊匪力戰死嘉慶十九年入祀忠義祠又略陽顔士貴禦賊被十七創猶力戰死亦於十九年旌流寓漢承宫姑幕人新莽時將諸生避地漢中列女漢陳文矩妻李氏漢中人李法之姊字穆薑有二男而前妻四子文矩為安衆令喪於官四子以母非所生憎毁日積而穆薑撫字益隆衣食資供皆倍所生長子興遇疾困篤親調藥膳恩情篤密興疾久乃瘳自知過惡遂將三弟詣南鄭獄陳母之德狀己之過乞就刑辟縣言之於郡郡守表異其母蠲除家徭遣散四子許以修革自後訓導愈明並為良士穆薑年八十餘卒趙伯英妻李氏南鄭人太尉李固女字文姬賢而有智固既策罷文姫密與二兄謀預藏匿弟燮有頃難作二兄受害文姫乃告父門生王成曰君執義先人有古人之節今委君以六尺之孤成感其義將變亡命徐州後遇赦還鄉姊弟相見悲感旁人既而戒燮曰先公正直為漢忠臣今弟幸而得濟豈非天耶宜杜絶衆人勿妄往來慎無一言加於梁氏唯引咎而已燮謹從其誨趙宣妻杜氏南鄭人字泰姫教子有法度子元圭雅圭並有聞望七子皆辟命察舉牧守其教子也曰中人情性可上下也昔西門豹佩韋以自寬宓子賤帶弦以自急故能改身之恆為天下名士宋崔均妻張氏大安軍人張伯威妹其姑王疾甚張剔左臂肉作粥以進達旦即愈事聞賜束帛劉當可母王氏當可為利州路提舉常平司幹辦公事紹定三年王氏就養興元元兵屠興元王氏義不辱投江死其婦杜氏及僕婢五人咸及於難當可奔赴江滸得母喪歸詔贈和義郡太夫人明陳情妻李氏南鄭人正德中蜀寇自青石關來氏從夫入城避寇至漢江未渡忽傳寇至衆皆逃匿氏與夫相失遂偕幼子投水死同縣強振妻田氏二十守節甘貧撫孤嘉靖中旌馮朝江妻傅氏夫亡撫育遺腹劬勤成立又朱永臨女年十六字宋氏子未婚而宋亡女聞信七日不食死馬安然妻余氏褒城人與同縣許襄隆妻李氏均二十餘夫亡撫育遺孤成諸生又早卒撫育孤孫又克見其成立又張雲鵬妻張氏年二十夫亡守節終身湯銘妻劉氏城固人年十九苦節撫孤六十三年同縣韓仲才妻王氏亦以苦節著又烈婦李為範妻張氏夫亡殉節段平妻張氏洋縣人年二十夫亡撫育遺孤自訓以詩書同縣吳天爵妻王氏夫亡無子孝養舅姑舅姑殁廬墓三年均嘉靖中旌又楊仕妻王氏年十八夫亡家貧撫遺腹子竭力以事舅姑黃錫極妻賈氏曹宗武妻何氏樊維禎妻亢氏李作樞妻白氏薛琦妻強氏均以苦節著又烈婦杜春輝妻王氏杜春芳妻康氏張兆祿妻周氏均夫亡殉節閻朝順妻張氏西鄉人與同縣許天祥妻王氏均夫亡守節撫遺腹子成立符鉞妻陳氏夫亡守節孝事舅姑又烈婦符廷瑀妻王氏夫亡殉節劉曇妻某氏鳯縣人夫病調治極誠篤殁即自縊以殉同縣梁雲高妻劉氏夫亡子枚生甫七月苦節教育枚後成諸生有聲鈕尚忠妻張氏寧羌人年十五夫亡守節孝事舅姑嘉靖中旌同縣王以諌妻靳氏夫亡子夭將從死姑曰吾惟汝是依何忍棄我氏感泣從命曲盡孝養姑殁殯殮畢即自縊萬厯中旌張講妻許氏夫亡撫遺腹子克底成立駱文彥妻蔡氏楊國楨妻王氏趙洛妻孫氏均以苦節著錢一貫妻金氏沔縣人年十八夫亡子在襁褓紡織自給苦節五十二年卒陳悌妻賈氏略陽人強暴欲汚之躍身入漢江死同縣王世業妻劉氏年十九夫亡撫遺腹子甘貧自勵嶽氏女城固人許字諸生王棐子賊至欲辱之不從遇害同縣張拱夀妻李氏年十八罵賊不從被磔死又嶽中衡女先賊未至自刎死段際昌妻李氏洋縣人賊殺其夫氏罵不絶口被殺同縣王延緒妻薛氏罵賊死又王貴女許字程姓未婚賊暴至忿罵不從被磔死馬義女鳳縣人城破賊欲挾之去女閉目不從鞭之終不應賊碎其身而死又盧效先妻來氐賊至觸樹自絶曹良輔妻靳氏寧羌人賊至與同縣谷自登妻張氏均自縊死沈文斗妻蔡氏夫婦均被執賊欲害沈蔡請以身代不從遂罵賊死梁賓妻趙氏沔縣人聞流賊至因夫病不忍遠避賊索得欲驅之去氏厲聲罵曰我清白婦肯從汝賊耶賊斷其兩手罵不絶口又斷其兩足而死同縣蔡一仕妻胡氏同次女渡江避賊女曰即得渡江賊從馬上追之亦不免何若葬此江之為愈女先躍入水氏從之時稱母子雙烈徐士選妻王氏略陽人賊至氏被執誘之不從脅以刃不從賊怒剖其腹而死同縣王康安妻王氏遇賊不屈寸磔死本朝李彥碩妻武氏褒城人孀居賀珍之亂賊黨欲汚之氏引刀自刎不得死尋翦髮毁容以免苦節終身同縣何謙妻徐氏康熙十八年逆寇潰走氏避寇為遊騎所掠縛馬上誓死不從遂被害又何邦海妻謝氏歐材妻張氏均以苦節著李挺女南鄭人許字田應朝未歸而應朝亡女聞訃哀號絶食數日欲隨母往弔不遂乃自縊同縣李式禎妻朱氏年二十守節教子成立又傅永鴻聘妻朱氏李漢翔母劉氏均以節著王爾麟妻黨氏城固人年十九而寡有賊將欲娶之不從將劫之遂自縊死同縣張士英妾閻氏遇賊義不受辱投崖死劉振祚妻饒氏與夫相失抱兒投水死周公輔妻王氏洋縣人為賊所逼不從被創十餘置之去斃而復蘇同縣李國士妻王氏夫亡賊將欲妻之氏斷髮毁容以免張兆驄妻李氏被掠投崖死李躍龍妻周氏與夫同被執罵賊死又李回知妻王氏年二十守節順治年間旌高映碧妻李氏略陽人孀居有豪右欲強妻之氏翦髮毁面誓死以拒同縣梁天培妻張氏吳逆變起賊將欲逼之氏引刀毁容以免撫孤成立守節五十餘年李應登妻潘氏王丹所妻王