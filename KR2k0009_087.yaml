  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_087-1a}
body:
  text: 漢中府在省治西南一千七十里東西距八百十里南北距六百五十里東至興安府石泉縣界三百十里西至甘肅階州界五百里南至四川保寧府南江縣界一百四十里北至鳳翔府寶雞縣界五百十里東南至興安府紫陽縣界三百二十里西南至四川保寧府廣元縣界三百四十里東北至西安府盩厔縣界三百六十里西北至甘肅秦州兩當縣界四百八十里自府治至京師三千五百里分野天文翼軫分野鶉尾之次漢書地理志楚地翼軫之分野也漢中楚分建置沿革禹貢梁州之域春秋時為蜀地戰國初秦楚之境後屬秦置漢中郡史記秦惠王十三年攻楚漢中取地六百里置漢中郡華陽國志周赧王二年秦惠文王置郡因水名也漢初為漢國後仍為漢中郡屬蓋州後漢因之三國屬蜀通典後漢末張魯改漢中為漢寧魏武復曰漢中郡後蜀先主有其地以為重鎮魏景元四年克蜀兼置梁州王隱晉書魏末克蜀分廣漢巴涪陵以北七郡為梁州治沔陽晉因之晉書地理志泰始三年立粱州於漢中南鄭宋書州郡志李氏據梁益江左於襄陽僑立梁州李氏滅復舊東晉隆安中又僑置秦州宋兼置南秦州梁天監三年入於魏曰梁州漢中郡大同初還屬梁西魏廢帝元年復克之隋開皇元年郡廢大業三年州廢改為漢川郡唐武德元年復曰梁州開元十三年改曰褒二十年復故舊唐書地理志開元二十一年分置山南西道探訪使理梁州天寶元年曰漢中郡乾元元年復曰梁州興元元年升興元府為山南西道治唐書方鎮表至德元載置山南西道防禦守捉使廣德元年升為節度使治梁州尋降為觀察使建中元年復升為節度使興元元年節度使兼興元尹五代屬蜀文獻通考王蜀改興元府為天義軍後復故宋曰興元府為利州路治宋史地理志興元府次府梁州漢中郡山南西道節度紹興十四年分為利州東路治輿地紀勝利州東西路乾道四年合為一淳熙二年復分三年復合五年復分紹熙五年復合慶元二年復分嘉定三年復合十一年復分尋復合元為興元路屬陜西行省明洪武三年改為漢中府領州二縣十四九年屬陜西布政司萬厯二十三年升興安州直隸陜西布政司割平利石泉洵陽紫陽漢陰白河六縣屬焉本朝因之隸陜西省乾隆三十八年設留壩廳嘉慶七年設定遠廳今領州一縣八廳二南鄭縣附郭東西距五十里南北距一百六十里東至城固縣界二十里西至褒城縣界三十里南至四川保寧府南江縣界一百四十里北至褒城縣界二十里東南至保寧府通江縣界一百二十里西南至保寧府巴州界一百九十里東北至城固縣界四十里西北至褒城縣界二十里本秦南鄭邑漢置縣為漢中郡治後漢至南北朝因之隋為漢川郡治唐為興元府治宋因之元為興元路治明為漢中府治本朝因之褒城縣在府西北四十里東西距五十五里南北距三百四十里東至南鄭縣界二十五里西至沔縣界三十里南至四川保寧府南江縣界二百里北至留壩廳界一百四十里東南至南鄭縣界二十里西南至寧羌州界一百八十里東北至城固縣界六十里西北至沔縣界七十里古褒國秦置褒縣屬漢中郡漢置褒中縣後漢因之晉義熙中改曰苞中劉宋省後魏永平四年復置褒中縣兼置褒中郡隋開皇初郡廢改縣曰褒內仁壽元年又改褒城屬漢川郡義寧二年又改褒中唐貞觀三年復曰褒城興元元年屬興元府宋因之元屬興元路明屬漢中府本朝因之城固縣在府東少北七十里東西距六十里南北距二百二十里東至洋縣界十里西至南鄭縣界五十里南至西鄉縣界七十里北至留壩廳界一百五十里東南至西鄉縣界五十里西南至南鄭縣界一百四十里東北至洋縣界六十里西北至南鄭縣界五十里秦置成固縣屬漢中郡兩漢及晉因之劉宋曰城固齊及後魏因之隋屬漢川郡唐武德二年改曰唐固貞觀二年復故興元元年屬興元府宋因之元屬興元路眀屬漢中府本朝因之洋縣在府東一百二十里東西距二百里南北距一百六十里東至興安府石泉縣界一百六十里西至城固縣界四十里南至西鄉縣界六十里北至西安府盩厔縣界一百里東南至西鄉縣界九十里西南至西鄉縣界七十里東北至盩厔縣界二百四十里西北至城固縣界八十里秦漢城固縣地晉置興道縣屬漢中郡劉宋廢後魏延昌三年里興勢縣屬晉昌郡西魏分置儻城郡隋開皇初郡廢縣屬漢川郡唐初屬洋州貞觀二十三年改曰興道天寶十五載移洋川郡來治乾元初復改郡曰洋州屬山南西道五代時孟蜀改曰源州宋復曰洋州屬利州東路元至元二年以州治興道縣省入屬興元路明初降州為縣屬漢中府本朝因之西鄉縣在府東南二百四十里東西距三百四十里南北距三百九十里東至興安府石泉縣界一百八十里西至城固縣界一百六十里南至定遠廳界二百七十里北至洋縣界一百二十里東南至定遠廳界一百七十里西南至四川保寧府通江縣界三百三十里東北至寧陜廳界二百五十里西北至洋縣界六十里秦漢成固縣地三國漢置南鄉縣晉改曰西鄉屬漢中郡宋齊因之後魏改置豐寧縣西魏兼置洋州及洋川郡隋開皇中郡廢大業初州廢縣復曰西鄉屬漢川郡唐武德元年復於縣置洋州天寶元年曰洋川郡十五載徙郡治興道以西鄉屬焉宋亦屬洋州元屬興元路明屬漢中府本朝因之鳳縣在府西北三百八十里東西距一百七十里南北距二百五十里東至鳳翔府寶雞縣界一百十里西至甘肅秦州兩當縣界六十里南至留壩廳界一百七十五里北至兩當縣界八十里東南至留壩廳界一百二十里西南至沔縣界一百四十里東北至寶雞縣界一百十里西北至兩當縣界七十里秦置故道縣屬隴西郡漢屬武都郡後漢及晉因之永嘉後沒於氐羌後魏太和元年改置涼泉縣兼置固道郡尋改縣曰梁泉孝昌中又置南歧州西魏廢帝三年改州曰鳳州郡曰歸真隋開皇初郡廢大業三年改州為河池郡唐武德元年復為鳳州天寶元年曰河池郡乾元元年仍曰鳳州屬山南西道五代初屬岐後屬蜀宋仍曰鳳州屬秦鳳路元至元五年以州治梁泉縣省入屬興元路明初降州為縣屬漢中府本朝因之寧羌州在府西南二百八十里東西距三百九十五里南北距二百六十里東至沔縣界一百二十里西至四川龍安府平武縣界二百七十五里南至四川保寧府廣元縣界一百五十里北至沔縣界一百十里東南至保寧府南江縣界二百五十里西南至廣元縣界六十五里東北至沔縣界一百五里西北至甘肅階州文縣界一百二十里秦蜀郡葭萌縣地漢屬廣漢郡晉為梓潼郡晉夀縣地隋為義成郡綿谷縣地唐武德四年分置三泉縣兼置南安州八年州廢縣屬梁州天寶元年改屬漢中郡興元元年屬興元府宋乾德三年以縣直隸京師至道二年建為大安軍三年軍廢縣仍屬京師紹興三年復置大安軍屬利州路元初為大安州至元二十年降州為大安縣屬沔州又省三泉縣入之明洪武二十九年省大安入沔縣改置寧羌衛成化二十二年升為寧羌州屬漢中府本朝因之沔縣在府西一百十里東西距一百里南北距一百七十里東至褒城縣界六十里西至略陽縣界四十里南至寧羌州界七十里北至鳳縣界一百里東南至褒城縣界六十里西南至寧羌州界七十里東北至褒城縣界五十里西北至略陽縣界六十里秦蜀郡地漢置沔陽縣屬漢中郡後漢晉及宋齊皆因之後魏析置嶓冢縣並屬華陽郡隋初省沔陽縣大業初改嶓冡曰西縣屬漢川郡唐武德三年於縣置褒州八年州廢縣屬梁州興元元年屬興元府宋乾德中以縣直隸京師後屬興元府至道二年改屬大安軍三年還屬興元府元初屬沔州至元二十年省西縣入略陽改置鐸水縣移沔州來治後又省鐸水縣入州明初降州為縣屬漢中府成化二十二年改屬寧羌州本朝仍屬漢中府略陽縣在府西北二百九十里東西距二百四十里南北距二百十里東至沔縣界一百三十里西至甘肅階州界一百十里南至寧羌州界八十里北至甘肅秦州徽縣界一百三十里東南至寧羌州界四十里西南至階州界一百六十里東北至沔縣界一百三十里西北至階州成縣界一百九十里秦蜀郡地漢置沮縣屬武都郡後漢及晉因之永嘉後沒於氐羌宋升明元年楊氏自號為武興國後魏正始三年置武興鎮尋改置東益州及武興郡武興縣正光後復沒於氐梁大同初復曰東益州尋置武興國西魏大統十一年復曰東益州廢帝二年改州曰興州郡曰順政縣曰漢曲隋開皇三年郡廢十八年更縣名曰順政大業三年州廢復置順政郡唐武德元年復為興州天寶元年復曰順政郡乾元元年仍曰興州屬山南西道五代屬蜀宋仍曰興州屬利州路紹興十四年分置利州西路治此開禧三年改州曰沔州縣曰略陽嘉定三年仍屬利州路元至元十四年改屬廣元路二十年移沔州治鐸水縣以略陽縣屬焉明初屬漢中府成化二十二年改屬寧羌州本朝仍屬漢中府定逺廳在府東南四百八十里東西距三百八十里南北距二百一十五里東至興安府紫陽縣界一百四十里西至四川保寧府通江縣界二百四十里南至四川太平廳界一百四十里北至西鄉縣界七十五里東南至紫陽縣界一百五十里西南至通江縣界一百七十里東北至西鄉縣界八十五里西北至西鄉縣界一百里秦漢成固縣地唐洋州地明西鄉縣地本朝嘉慶七年分西鄉縣設定逺廳同知屬漢中府留壩廳在府西北一百九十里東西距三百四十里南北距一百五十里東至西安府盩厔縣界二百四十里西至鳳縣界一百里南至褒城縣界五十里北至鳳縣界一百里東南至城固縣界一百里西南至略陽縣界一百九十里東北至鳳縣界二百二十里西北至鳯縣界一百三十五里秦漢故道縣地唐鳳州地明鳳縣地初置留壩巡司後廢本朝乾隆三十八年分鳳縣地設撫民通判四十年改設留壩廳同知嘉慶十三年移駐太平嶺屬漢中府形勢東接南郡南接廣漢西接隴西陰平北接秦川華陽國志秦之坤蜀之艮連高夾深九州之險唐歐陽詹棧道銘序氐羌接軫為威禦之鎮寰宇記秦蜀出入之衝宋文同集前瞰三秦後蔽巴鎮宋孫道夫奏議風俗其民質直好義士風朴厚有先民之遺華陽國志質朴無文不甚趨利性嗜口腹多事畋漁好祀鬼神尢多忌諱隋書地理志俗多醇謹不尚浮華寰宇記君子精敏小人勇悍元一統志城池漢中府城周九里有奇門四池廣十丈宋嘉定十三年建本朝順治十三年康熙二十七年乾隆三十年修嘉慶十九年重修南鄭縣附郭褒城縣城周三里有奇門四池深七尺明宏治十二年土築正德四年甃甎本朝康熙二十六年修乾隆十二年重修城固縣城周七里有奇門四池廣二丈明正德七年因宋舊址改建本朝康熙四十六年修乾隆十四年重修洋縣城周七里有奇門五池廣三丈宋熙寧中土築崇禎中甃石本朝順治九年康熙二十七年乾隆三十一年嘉慶十四年屢修西鄉縣城周六里有奇門四元末土築明正德中增築東關新城嘉靖初甃甎池廣三丈本朝順治七年修康熙五十五年乾隆十三年嘉慶二十四年屢修鳳縣城周四里有奇門三元至正二十八年土築明嘉靖中甃甎本朝順治十一年乾隆三十年五十六年屢修寧羌州城周四里有奇門四因河為池眀洪武二十九年建成化二十三年增建本朝雍正八年乾隆二十四年修嘉慶十八年重修沔縣城周三里有奇門三池深一丈明洪武四年土築萬厯元年甃甎本朝順治十二年康熙三年乾隆三十年修嘉慶二十一年重修略陽縣城周五里