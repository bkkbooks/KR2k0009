front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_104-1a}
body:
  text: 湖州府二名宦三國呉駱統烏傷人年二十試為烏程相民戸過萬咸嘆其惠理晉賀循山陰人以茂才為武康令俗多厚􅌾及有拘忌迴避歲月停喪不􅌾者循皆禁焉政敎大行鄰城宗之顧袐呉郡呉人大安二年為呉興太守時李辰起兵江夏與南平内史王矩前秀才周玘倡義傳檄州郡以討之賊黨悉降周玘陽羡人元帝初為呉興太守時㓂亂之後百姓饑饉盜賊公行玘甚有威惠百姓敬愛之期年之内境内安謐孔愉山陰人建興初以駙馬都尉㕘丞相軍事討華軼有功封餘不亭侯累遷呉興太守有美政孔坦愉從子咸和中為呉興内史歲饑運家米以賑窮乏百姓頼之陶囘丹陽人咸和中為呉興太守時人饑穀貴三呉尤甚囘上疏請賑不待報輒便開倉及割府郡軍資數萬斛米以救乏絶由是一境獲全既而下詔并敕會稽呉郡依囘賑恤二郡頼之陸納呉郡呉人爲呉興太守至郡不受俸祿頃之徴拜左民尚書將應召外白宜裝幾船納曰私奴裝糧食來無所復須也臨發止被襥而已餘並封以還官孔嚴山陰人太和中拜呉興太守加秩中二千石善于宰牧甚得人和又甄賞才能之士論者美焉謝安陽夏人廢帝時除呉興太守在官無當時譽去後爲人所思王藴晉陽人𥙷呉興太守甚有德政屬郡荒人飢輒開倉賑恤主簿執諌請先列表上待報藴曰今百姓嗷嗷路有饑饉若表上須報何以救將死之命乎于是大賑貸之頼藴全者十七八焉朝廷以違科免藴官士庶詣闕訟之特左降晉陵太守謝邈安從子安帝初爲吳興太守孫恩之亂爲賊胡桀郜驃等所執逼令北面邈厲聲曰我不得罪天子何北面之有遂害之殷康爲呉興太守開城南荻塘溉田千頃民飫其利裴松之聞喜人義熙初爲呉興故鄣令在縣有績南北朝宋袁湛陽夏人高祖時爲呉興太守蒞政和理爲吏民所稱朱齡石沛人武帝時遷武康令縣人姚係祖專為刦掠郡縣畏不能討齡石偽與厚召為叅軍係祖恃强乃出應召齡石斬之掩其家悉殺其兄弟由是一部得清江秉之考城人少帝時為烏程令以善政著名東土張岱呉人泰始末為呉興太守以寛恕著名傅炎北地靈州人為武康令著能名邑人稱為傅聖齊張瓌呉人建元中出為呉興太守瓌以既有國秩不取郡俸高帝勅上庫别藏其俸以表其清謝卄瀹陽夏人建元初為呉興太守在邵稱為美績孔琇之山陰人武帝時出監呉興郡尋拜太守政稱清嚴徐孝嗣東海郯人永明中出為呉興太守在郡有能名李安人蘭陵承人武帝時為呉興太守於家載米往郡時服其清何敬叔東海郯人為長城令有能名在縣清亷不受禮遺夏節至忽榜門受餉數日中得米二千餘斛他物稱是悉以代貧民輸租袁昂陽夏人永元末為呉興太守梁武帝起兵州郡望風皆降昂獨拒境後帝使豫州刺史李元履巡撫東土勅元履曰袁昂道素之門世有忠節天下須共容之勿以兵威凌辱元履至宣㫖昂亦不請降梁蔡撙考城人為呉興太守惟飲郡井齋前自種白莧紫茄以為常餌詔褒其清天監九年宣城郡吏呉承伯挾妖道聚衆攻宣城轉宼呉興吏人並請避之撙堅守不動命衆岀戰斬承伯餘黨悉平謝覽卄瀹子武帝時為呉興太守時中書舍人黄睦之家居烏程子弟專横前太守皆折節事之覽未到郡睦之弟迎覽覽逐去其船杖吏為通者自是睦之家杜門不岀郡境多刦為東道患覽下車肅然與父卄瀹東海徐孝嗣並為呉興名守卒于官張稷瓌之弟武帝時為呉興太守下車存問遺老引其子孫置之右職政稱寛恕柳惲河東解人天監中為呉興太守為政清静民吏懷之於郡感疾自陳解任父老千餘人拜表陳請事未施行卒夏侯亶譙人武帝時為呉興太守在郡有惠政吏民圖其像立碑頌美焉何遠東海郯人武帝時為武康令厲亷節除淫祀正身率職人甚稱之太守王彬巡屬縣諸縣盛供帳以待至武康遠獨設糗水而己彬去遠送至境進斗酒隻鵝而别高祖聞其能擢為宣城太守張纘范陽方城人大通中為呉興太守治郡省繁苛務清靜民吏便之張嵊稷子為呉興太守侯景圍建業嵊遣弟伊率兵赴援城䧟御史中丞沈浚勸舉義於是收集士卒繕築城壘賊行臺劉神茂攻破義與遣使説嵊嵊斬其使仍遣軍破神茂侯景遣其中軍侯子鑒助神茂擊崍嵊軍敗乃釋戎服坐聽事賊臨以刃終不屈乃殺之殷不佞陳郡長平人承聖初為武康令時兵荒饑饉百姓流移不佞撫循招集襁負至者以千數到仲舉彭城人仕梁為長城令政號亷平陳文帝為呉興太守以仲峯為郡丞唐韋承慶鄭州人儀鳳中為烏程令政化流行民為刻石頌徳李適之恒山愍王孫始名昌開元初為湖州判儒雅清矌决獄無滯獨孤及洛陽人天寶末為武康令嘗作亭于烏囘山後人思其澤因名其山曰獨孤山顏真卿萬年人代宗時遷湖州刺史李清大厯間為烏程令任二歲流民復者六百餘家廢田墾者二百餘頃種桑畜養溢數萬于頔洛陽人德宗時為湖州刺史部有湖陂異時溉田三千頃久廞廢頔行縣命修復隄關歲獲秔稻蒲魚無慮萬計州地庳薄塟者不掩柩頔為坎瘞枯骨千餘人賴以安辛秘系出隴西憲宗時為湖州刺史李錡反遣大將先取支州蘇常杭睦四刺史咸戰敗或拘脅獨秘以儒者賊易之未及至秘召牙將邱知二夜開城收壯士數百逆賊大戰斬其將進焚營堡錡平賜金紫范傳正順陽人為湖州刺史有殊政杜牧萬年人大中間為湖州刺史有惠政嘗建碧瀾堂宋刁衍昇州人太平興國中通判湖州上疏請定天下酒税額修郡縣城隍條約牧宰除兩浙丁身錢禁汴水流尸凡五事滕宗諒河南人仁宗時知湖州宗諒倜儻自任所蒞州喜建學而湖州最盛一時學者傾江淮間林槩福清人仁宗時知長興縣歲大飢富人閉糴以要價㮣出俸粟庭下誘土豪輸數千石以飼飢者胡宿晉陵人知湖州前守滕宗諒大興學校費錢數十萬宗諒去通判僚吏皆疑以為欺不肯書厯宿誚之曰君輩佐滕侯久矣苟有過盍不早正仍俟其去而非之豈昔人分謗之意坐者大漸謝其後湖學為東南最宿之力為多築石塘百里捍水患民號曰胡公塘胡瑗海陵人景祐中為湖州敎授瑗敎人有法科條纖悉備具以身先之雖盛暑必公服坐堂上嚴師弟子之禮從遊常數百人慶厯中興太學下湖州取其法著為令高子潤蒙城人為烏程主簿疏三十二漊達于湖復晉宋舊蹟民賴其利許遵泗州人知長興縣水災民多流徙遵募民出米賑濟竟以無患益興水利溉田甚溥邑人便利立石紀之錢顗無錫人知烏程縣以治行聞滕元發東陽人英宗時通判湖州孫沔守杭見而異之曰奇才也後當為賢將授以治劇守邊之畧後神宗時復知湖州孫覺高郵人熙寕中知湖州松江隄没水為民患覺易以石高丈餘長百里隄下化為良田蘇軾眉山人熙寕中徙知湖州到任謝表有云魚鳥之性既自得于江湖呉越之人亦安臣之敎令陳師錫建陽人熙寕中調昭慶軍掌書記郡守蘇軾器之倚以為政軾得罪捕詣臺獄親朋多畏避不相見師錫獨出餞之又安輯其家文同梓潼人元豐初知湖州在任多善政世稱文湖州葛勝仲丹陽人徽宗時知湖州時羣盜縱横勝仲修城郭作戰艦閲士卒賊知有備引去歲大飢發官廪賑之民賴以濟張燾德興人建炎初通判湖州明受之變賊矯詔俾燾撫諭江浙燾不受汪藻饒州德興人紹興二年知湖州以顏真卿盡忠唐室曾守是郡乞表章之詔賜廟忠烈又言古者有國必有史今踰二十年無復日厯何以示來世乞即臣所領州許臣訪尋故家文書纂集元符庚辰以來詔㫖為日厯之備蕭振平陽人紹興中知湖州振至州秦檜欲取羨餘振遺檜書謂財用在天下如血氣之在一身移左以實右則病矣檜屬以私事不從趙師夔秀安僖王後隆興中知湖州時歸附從軍而廪於湖者衆師夔請増廪仍别給僦屋錢以安其心帝稱善詔諸郡行之王十朋樂清人孝宗時知湖州召對劉珙請留之上曰朕豈不知王十朋顧湖州被水非十朋莫能鎮撫至郡積霖入境即霽會户部責虛逋三十四萬命吏持劵往辨不聽即請辭去去之日老稚攀留涕泣越境以送思之如父母余端禮龍游人孝宗時知烏程縣民間賦丁絹錢率三氓岀一縑不輸絹而折其估一縑千錢後増至五千民不勝病端禮自詣中書陳便宜歲蠲緡錢六萬王信麗水人孝宗時知湖州據案剖析敏如流泉薛季宣永嘉人孝宗時知湖州會户部以厯付場務錙銖皆分隷經總制諸郡束手無䇿季宣言於朝曰自經總制立額州縣鑿空以取贏若復額外征其强半郡調度顧安所岀殆復巧取之民民何以勝戸部譙責愈急季宣爭之愈强乃收前令吕午歙人嘉定中授烏程主簿郡守致之幕下事一决于午守張忠恕丞相浚之孫薦午尤力時忠恕之母就養而時時躬至簿㕔迎午二親入郡與午皆衣綵衣奉觴上夀郡人榮之袁甫鄞人寕宗時通判湖州攷常平弊源以増積貯覈隱產増附嬰兒局王霆東陽人理宗即位差充浙西副都監湖州駐劄時潘甫等起兵事甫定霆因綏撫之趙與懽燕懿王八世孫知安吉州郡計仰榷醋禁網峻密與懽首捐以予民設銅鉦縣門欲愬者擊之冤無不直有富民愬㓜子亷之乃二兄强其父析業與懽曉以法開以天理皆忻然感悟又婺媪僅一子亦以不孝告留之郡廳日爲饌俾親饋晨昏以禮未周月母子如初二家皆畫像事之李芾衡州人理宗時知德清縣屬浙西飢芾置保伍賑民活數萬計遷主管酒庫所德清有妖人煽民爲亂至數萬人遣芾討之盜聞其來衆立散趙良淳餘干人咸淳末知安吉州歲飢民相聚爲盜良淳以義諭之衆投兵散歸因勸富人岀粟賑之皆傾囷以應元兵至軍其東西門良淳率衆城守夜就苃舍陴上不歸先是朝廷遣將呉國定戍安吉已而國定開南門納外兵兵入城衆悉散去良淳歸府閉閣自經有兵士解救之復甦衆羅拜泣曰逃之猶可求生良淳叱曰我豈逃生者衆環守不去大呼曰爾輩欲爲亂耶衆涕泣岀復投環而死元史樞永清人至元中署安吉州安撫使時新附之民所在依險阻自保樞以威信招懷之復業爲民者以千萬計宋文懿真定人至兀中爲烏程丞首建學校勵風俗築青塘堤以捍民田干文傳平江人延祐時授烏程縣尹有富民張甲之妻王無子張納妾于外生子王逐妾殺兒焚之文傳聞而發其事王厚賄妾之父母買鄰兒為妾所生兒初不死文傳令妾抱兒乳之兒啼不就乳妾之父母吐實乃呼鄰婦至兒見之躍入其懷乳之即飲王遂伏辜文傳長于治劇所至有善政楊景行太和州人轉湖州路歸安縣尹奉行省命理荒田租民無欺弊明高彬洪武初為歸安丞有德于民以詿誤連坐部民詣闕訟冤帝遣還之趙登祥符人宣德間為湖州知府勵清操鋤豪横勸大户納粟義倉定出入之法以備水旱考滿去官民乞留增秩還任在官十七年政聲大著岳璿與趙登同里天順間繼登為知府奏定官田正耗之則遂為定制時為之謡曰賢守趙岳治行卓犖梁材南京衛人宏治中知德清縣勤敏有異政在任七載遷刑部主事申良高平人正德中知安吉州錦衣葉瓊倚錢安勢奪民曰良讞還之民瓊因嗾奸人誣奏良事白遷常州同知劉天和麻城人正德中為湖州知府多惠政戚賢全椒人嘉靖初知歸安縣省㕑饌平徭役躬行郊野問民疾苦悉知閭里奸豪有犯輒窮治縣有蕭總管廟報賽無虛日賢取木偶沈之河一日舟過其地木偶自水躍入舟左右皆驚賢笑命焚之陰誠健隷伺水中人岀械以來已而果然葢姦民募善泅者為之也由是遠近畏服陶亷曲靖人嘉靖中知德清縣多善政嘗籍廢寺田四百畝給諸生廪餼修楊灣塘以資灌溉民甚賴其利歸有光崑山人嘉靖中授長興知縣用古敎化為治每聽訟斷訖遣去不具獄大吏令不便輒寢閣不行有所擊斷直行已意大吏多惡之石有恒黄梅人萬厯中知長興縣時葉天生餘黨竄入邑境有恒捕之急遂于元日詭裝入縣執有恒索印及庫餘不可得挾之行不從被害搜其槖僅葛一疋俸二兩盜相顧驚歎事聞贈太僕寺少卿陳幼學無錫人萬厯中知湖州府奸豪為民患者論敎十數輩疾惡如讐而于細民人人得進見言情為去煩苛務求所以安全之遇孝子節婦善人悉為旌揚一郡大治霪雨害稼力舉荒政活饑民三十四萬有奇築南塘障郭西諸水旱潦有備御史列其治行以聞詔加按察副使仍視郡事周宗建呉江人萬厯中除武康知縣以能調繁仁和譚元禮景陵人崇禎間知德清縣省追呼簡訟牒南糧折銀為巨蠧所蝕申請十年帶徴夏税絹疋積欠萬餘金力請大司農得蠲免本朝劉璽朝邑人順治四年知烏程縣寛以撫民嚴以治盜每歲暮量賑貧士必面給士民建祠於便民倉王業久平凉人康熙十年知歸安縣政尚淳簡徵收有方請於上官免門攤課鈔編里均平私派悉為屏除蒞任二載卒官士民醵金以殮羅為賡南充人康熙十年授孝豐知縣值歲荒禁革煩苛蠲賑饑民存活甚衆公餘集士子講明理學性嚴謹人無敢以私干者高必騰奉天人康熙十四年知烏程縣聽訟明允不狥干謁值編審釐剔積弊官民一則徭役均平蒞任九年擢守新寕士民遮送至填街巷潘麒甡溧陽人康熙中知湖州府政尚寛而嚴治奸匪催科有法差役無擾民甚安之蔣洪澍貴州人康熙間知湖州府不攜家眷蕭然入署讞决如神案無留牘自奉儉約日供止蔬腐為兩浙循良第一卒於官湖人罷市巷哭韓逢庥新城人康熙中知武康縣剔蠧除奸歲歉設法捐賑全活無算溪東有盜百餘人掠村落逢庥腰弓矢率兵擊之斬三人餘悉定境内以安高崇徽武威人雍正十年知安吉州廉介安靜有長者風初下車禁一切餽遺陋規胥役舞文悉繩以法蒞任八載有吏瘠民肥之頌劉守成寕河人乾隆中知武康縣愛民如子時行村落勸農桑建前溪書院以課士設孟東野周季侯神主於中前溪水迅激濬後溪以通溝洫灌田數千頃民賴之人物漢沈瑜烏程人與弟儀少有志行瑜十歲儀九歲居父喪毁瘠過於成人外祖盛孝章撫慰之曰汝兄弟黄中通理終成奇器何遽逾制自取滅性耶瑜早卒儀篤學有才屬漢末晦黙守道風操貞整州郡禮請二府公車徴辟並不屈三國呉朱治字君理故鄣人從孫堅討賊有功已勸孫䇿平江東領呉郡太守建安中孫權表為九真太守征討夷越佐定東南擒獲黄巾餘類拜安國將軍封故鄣侯治憂勤王事性儉約雖在富貴車服惟供事子才字君業少為校尉從征伐屢建功更折節爲恭輕財尚義聲名聞於遠近朱然字義封治姊子本姓施年十九爲餘姚長遷山陰令權奇其能以爲臨川太守吕蒙病篤權問誰可代者蒙以然對假節鎮江陵拜征北將軍魏攻圍然六月不能克退還由是名震敵國封當陽侯赤烏中拜左大司馬右軍師然内行修潔終日欽欽常在戰場臨急膽定雖世無事每朝夕嚴鼓兵在營者咸行裝就隊以此玩敵使不知所備故戰輒有功子績字公緒以父任爲郎厯遷至左大司馬五鳳中表還爲施氏姚信字元直武康人精于天文易數之學三國呉時太常卿造昕天論有周易注十卷按阮孝緒云信字元直陸德明云信字德祐吾粲字孔休烏程人孫河舉爲曲阿丞遷長史治有名迹累官㕘軍校尉黄武初與吕範等拒魏將曹休於洞口值大風諸船綆絶軍多溺水攀粲船請援左右以爲船重必敗粲曰船敗當俱死耳人窮奈何棄之所活者百餘人累遷太子太傅遭二宫之變抗言執正明嫡庶之分以譖𬒳誅晉戴洋字國流長城人善風角好道術妙解占候卜數呉末爲臺猛獸輒下道避之期年成七墓葬十三棺時有賻贈一無所受太守王韶之擢補功曹吏逵以門寒辭不受南北朝宋潘綜烏程人孫恩之亂綜與父驃走避賊驃年老行遲賊轉逼驃語綜我不能走汝走可脱勿俱死綜迎賊叩頭曰父年老乞賜生命賊斫驃綜抱父于腹下被斫四創一賊從旁來謂曰殺孝子不祥賊乃止父子並得免廷尉沈赤黔以綜異行薦補左民令史除遂昌長歲滿還家元嘉四年有司奏改其里為純孝里邱傑字偉時烏程人十四遭喪以熟菜有味不嘗于口歲餘忽夢見母曰死止是分别耳何事乃爾茶苦汝敢生菜遇蝦蟇毒靈床前有三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升邱氏世保此甌大明七年火焚失之孫法宗呉興人父隨孫恩入海澨被害屍骸不收母兄並餓死法宗年十六單身勤苦霜行草宿營辦棺槨造立冡墓葬母兄畢入海尋求父尸聞世間論是至親以血􅅹骨當凝乃操刀沿海見枯骸則刻肉灌血如此十餘年臂脛無完皮血􅍺枯竭終不能逢遂衰絰終身常居墓所終身不娶餽遺無所受孝武辟為文學從事不就卒沈巑之武康人仕宋為丹徒令性疎直清亷不事左右浸潤日至遂鎻繫尚方上召問曰欲何陳對曰臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰巑之以手板四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至上知其無罪重除丹徒令沈道䖍武康人好老易居縣北石山下與諸孤兄子共釜庾之資困不改節郡州府凡十二命皆不就文帝遣使存問賜錢三萬米二百斛悉供孤兄子嫁娶年老菜食恒無經日之資而琴書為樂孜孜不倦帝勅郡縣隨時資給卒子慧鋒修父業不就州辟沈演之字臺真武康人父叔任以平蜀功封寕新縣男出為益州刺史家世為將而演之折節好學以義理業尚知名舉秀才為嘉興令元嘉中累遷尚書吏部郎雅仗正義與殷景仁盡心朝廷帝甚嘉之尋掌禁旅叅機密厯位吏部尚書領太子右衛率性好舉才申濟屈滯而謙約自持卒贈金紫光祿大夫謚曰貞侯沈慶之字宏先武康人孫恩㓂武康慶之未冠隨鄉族擊之屢捷由是以勇聞永初二年除殿中員外將軍北侵隷檀道濟道濟稱其忠謹曉兵元嘉中命為建威將軍討平湖沔蠻㓂威震諸山羣蠻畏之號曰蒼頭公元凶劭弑逆慶之佐孝武討劭旬日間内外整辦時謂神兵孝武即位論功封始興郡公竟陵王誕反又討平之進爵司空厯侍中太尉廢帝凶暴誅戮大臣慶之盡言諫爭帝遣其從子攸之齎藥賜死明帝即位追贈侍中司空謚曰襄長子文叔位侍中以父死凶暴乃飲藥自殺文叔子昭明位秘書郎聞父死曰何忍獨生亦自縊死沈文秀字仲達慶之弟子也遷青州刺史太始三年號右將軍封新城縣侯魏圍青州久文秀外無援軍日夜戰鬪甲胄生蟣蝨城䧟之日執至魏將慕容白曜前令拜文秀曰各二國大臣無相拜之禮遂鏁送桑乾文秀在桑乾凡十九年病卒沈懷文字思明武康人少好元理善為文章孝武時為侍中前後多所陳諫屢經犯忤後以事免官禁錮十年仍收付廷尉賜死弟懷遠頗閑文筆撰南越志及懷文文集並傳于世沈曇慶武康人初辟主簿出為餘杭令遷尚書右丞時歲有水旱曇慶議立常平倉以救民急世祖踐阼遷祠部尚書卒曇慶謹實清正所蒞有稱績王文殊字令章故鄣人父没于魏文殊思慕泣血終身蔬食服麻不婚不交人物歲時伏臘月朝十五北望長悲如此三十餘年太守孔琇之表其行詔榜門改所居為孝行里齊邱靈鞠烏程人少好學舉秀才累遷員外郎泰始初黨銦數年禇淵為呉興謂人曰此郡才士唯有邱靈鞠及沈勃耳乃啟申之領東觀祭酒入齊遷大中大夫著江左文章錄序起太興訖元熙文集行世沈文季字仲達慶之次子以寛雅正直見知𥘉慶之之死也沈攸之以被掩殺之攸之反高帝加文季冠軍將軍督呉興錢塘軍事遂收殺攸之宗族以復舊怨仕齊累遷侍中左僕射時東昏肆行殺戮文季託老疾不豫朝機未幾召入華林省見害朝野冤之兄子昭畧字茂隆累官侍中與文季俱被召入華林省茹法珍等進藥酒昭畧言笑自若了無懼容弟昭光聞收兵至家人勸逃去昭光不忍捨母入執母手悲泣遂見殺時昭明子曇亮已得逃去聞昭光死乃曰家門屠滅獨用生何為又絶吭而死時人嘆其累世孝義邱冠先字道元烏程人少有節義永明中位給事中奉使蠕蠕蠕蠕逼令拜冠先執節不從以刃臨之辭色愈厲冠先曰能殺我者蠕蠕也不能以天子使拜戎狄者我也遂見殺武帝以不辱命賜其子雄錢一萬布三十疋雄不受上書乞申哀贈書奏不省邱寂之字德元烏程人年十七為州西曹兼直主簿刺史王彧行夜還前驅巳至寂之不肯開門曰不奉墨㫖彧于車中為敎然後開彧嘆曰不意郅君章近在閣下即轉為主簿後為故鄣令以亷潔著稱沈沖字景緯武康人舉秀才建元初轉黄門郎世祖即位轉御史中丞沖兄淡淵並厯御史中丞兄弟三人皆為司直晉宋未有也世祖方欲任之而卒惜之詔曰沖貞詳閑理志局淹正誠著蕃朝績彰出納追贈太保謚曰恭沈憲字彥章演之從祖弟子少有幹局仕宋為駕部郎補烏程令甚著政績太守禇彥囘嘆美以為方員可施以吏能累遷少府卿後為晉安王冠軍長史廣陵太守當時稱為良吏憲同郡邱仲起字子震為晉平太守清亷自立位至廷尉邱國賓呉興人以才志不遇著書以譏揚雄竟陵王子良開西邸招文學國賓以善辭藻及同郡邱令楷輩與焉沈顗字處黙武康人幼清靜有至行讀書不為章句著述不尚浮華常獨處一室人罕見其面事母兄孝友為鄉里所稱徴著作郎太子舍人俱不起兄昂亦退素以家貧為始安令兄弟不能分離相隨之任及昂卒逢齊末兵荒顗與家人并日而食或有饋梁肉者不受惟樵採自資怡怡然不改其樂梁沈麟士字雲禎武康人幼俊敏長博通經史居貧織簾誦書口手不息鄉里號為織簾先生常苦無書因游都下厯觀四部畢歸不與人物通養孤兄子義著鄉曲隐居餘干呉羗山講經教授從學者數百人時為之語曰呉羗山中有賢士開門敎授居城市齊永明中沈約表薦不就著周易兩繫莊子内篇訓註孝經喪服老子要畧數十卷天監初與何點同徴又不就卒于家沈約字休文武康人篤志好學博通羣籍善屬文武帝受禪為尚晝僕射遷尚書令卒謚曰隐約厯仕三代該悉舊章善為詩又工于筆所著有晉書宋書齊紀梁武紀及文集百卷又撰四聲譜窮其妙㫖自謂入神之作孫衆好學有文才梁武帝剙千字詩衆為注解召見文德殿令為竹賦帝手勅答曰卿文體翩翩可謂無忝爾祖邱仲孚字公信烏程人令于湖有能名遷山陰長于撥頻善適權變吏民敬服號稱神明治為天下第一擢為衞尉卿儀遷豫章内史在郡更勵清節卒贈給事黄門侍郎沈瑀字伯瑜武康人父昶坐罪繫獄瑀詣臺陳請得免由是知名齊竟陵王子良引為叅軍轉揚州部從事齊明帝使修湖熟縣方山埭就作三日立辨復築赤山塘減費數十萬後仕梁為尚書右丞累遷潯陽太守瑀性崛强忤刺史蕭頴達後于路被殺子績累訟不白乃布衣蔬食終其身邱遲字希範靈鞠之子遲八歲善屬文謝超宗何點並見而異之仕齊厯殿中郎武帝踐阼遷中書侍郎尋出為永嘉太守遲辭采麗逸時有鍾嶸著詩評云范雲婉轉清便如流風迴雪遲點綴映媚似落花依草沈峻字士嵩武康人家世農夫至峻好學師事宗人沈麟士遂博通五經尤長三禮仕為國子助敎時吏部郎陸倕與僕射徐勉薦峻精于周官大開講肆羣儒劉嵒沈宏之徒並執經下坐尋補西省學士奉勅助賀琛撰梁官儀書成入兼中書舍人出為武康令卒官太史叔明烏程人呉太史慈之後少善莊老兼通孝經論語而尤精于三禮每講説聽者常五百餘人為國子助敎邵陵王綸好其學及出為江州攜叔明之鎮所至輒講授江州人士皆傳其學呉均字叔庠故鄣人好學有俊才天監初柳惲為呉興召𥙷主簿日引與賦詩均文體清㧞有古氣好事者斆之謂為呉均體武帝召見賦詩悦焉待詔著作累遷奉朝請卒沈崇傃字思整武康人六歲丁父憂哭踊過禮及長家貧傭書以養母母卒行乞經年始完葬事廬于墓側自以初行喪禮不備葬後更行服三年久食麥屑不噉鹽酢坐卧單薦因虛腫不能起梁武帝聞遣使慰勉詔令釋服擢補太子洗馬崇傃涕泣固辭乃除永寕令哀思不自堪未至縣卒沈浚字叔源憲孫少涉學有才幹太清中厯山陰建康令累遷御史中丞時臺城為侯景所圍外援並至景表請和還江北及許盟景復緩去期簡文使浚往景所景横刀瞋目叱之浚乃正色責其翻背徑去不顧景嘆曰是真司直也然密銜之义勸張嵊起義卒被殺沈君理字仲倫呉興人博涉經史尚會稽長公主高祖受禪拜駙馬都尉封永安亭侯出為呉郡太守是時兵革未休百姓荒弊君理招集士卒修治器械民下悦附深以幹理見稱世祖嗣位為左民尚書遷右僕射卒贈開府儀同三司謚貞憲陳沈洙字宏道武康人少方雅好學不妄交游通三禮春秋左氏傳精識强記五經章句諸子史書問無不答仕梁為尚書祠部郎武帝受禪累官至尚書左丞沈恪字子恭武康人深沈有幹局仕梁為廣州㕘軍除員外散騎侍郎侯景圍臺城恪晝夜拒戰及武帝討景恪起兵相應賊平監呉興郡武帝受禪令恪勒兵衛敬帝如别宫恪謝曰恪身經事蕭家來今不忍見此事分受死耳决不奉命帝嘉其意不復逼後官廣州刺史綏懷安輯嶺表賴之卒年七十四謚曰元章昭達字伯通武康人性倜儻輕財尚氣文帝為呉興太守因委以將帥討平王僧辯杜龕張彪天嘉四年討陳寶應遂定閩中累功授開府儀同三司江州刺史封邵陵郡公宣帝即位歐陽紇據嶺南反又詔昭達督征擒紇送都廣州平進位司空太建初征梁于江陵卒于軍昭達每出征所剋必推功將帥㕑膳飲食並同羣下將士以此附之胡頴字方秀東遷人偉姿容性寛厚隨武帝征伐屢立戰功武帝受禪累官呉興太守卒謚曰壯錢道戢字子韜長城人少以孝行著聞及長有材幹初從文帝平張彪于會稽封永安縣侯天嘉初為臨海太守後以討賊功累官都督郢州刺史卒謚曰肅沈炯字初明武康人少有俊才為當時所重梁元帝時領尚書左丞魏剋荆州被虜甚見禮遇以母在東恒思歸國常經漢武通天臺為表奏之陳已思鄉之意尋獲東歸厯御史中丞武帝受禪加散騎常侍有集二十卷行世沈文阿字國衡峻子少習父業研精章句又博采先儒異同自為義疏通三禮三傳梁紹泰初為國子博士兼掌儀禮自太清之亂臺閣故事無有存者文阿斟酌裁撰為當時所宗文帝即位文阿議謁廟禮詔可施行遷通直散騎常侍所撰儀禮八十餘卷經典大義十八卷並行于世沈不害字孝和武康人㓜孤好學天嘉初除衡陽王記室叅軍兼嘉德殿學士自梁季喪亂至是國學未立不害上書請崇建儒宫又表改定樂章後為國子博士勅修五禮掌䇿文謚議等事位終光祿卿不害通經術善屬文博綜經術而家無卷軸每製文操筆立成會無尋檢著五禮儀一百卷文集四十卷子志道少知名安東新蔡王記室㕘軍章華字仲宗呉興人家本農人至華獨好學通經史善屬文侯景之亂遊嶺南居羅浮山寺專精習業後主時除大市令非其所好乃辭以疾禎明初上書極諌後主大怒即日斬之後周沈重字子厚武康人博覽羣書尤明詩及左氏春秋事梁武為五經博士武帝奉禮徴之累遷都官尚書保定末至京師詔討論五經并校定鍾律天和中復于紫極殿講三敎義聽者至二千餘人授露門博士建德末表請還梁重學業該博為世儒宗著周禮義三十一卷儀禮義三十五卷禮記義三十卷毛詩義十八卷喪服經義五卷周禮音儀禮音各一卷禮記音毛詩音各二卷隋沈德威字懷遠呉興人少有操行梁太清末遁于天目山築室以居雖處亂離而篤學無倦隋天嘉初徴至累遷尚書祠部郎開皇中官至秦王府主簿姚察字伯審武康人父僧垣醫術高妙遠聞邊服仕周位驃騎大將軍察勵精學業聞見日博陳太建初爲通直散騎常侍報聘于周沛國劉臻竊訪漢書疑事十餘條並爲剖晣皆有經據臻謂所親曰名下定無虚士累遷度支吏部尚書入隋授秘書丞勅成梁陳二史未畢臨亡戒子思亷續撰姚最字士會察弟博通經史尤好著述年十九隨父僧垣入關開皇初除太子門大夫以父憂去官哀毁骨立既免喪襲爵北綘郡公兄察先在陳及陳平察至最自以非嫡讓封於察爲蜀王秀府司馬秀陰有異謀文帝令公卿窮治慶整郝瑋等並推過于秀最獨曰凡有不法皆最所爲王實不知也榜訊數百卒無異辭竟坐誅論者義之沈光字總持呉興人少驍捷陳滅家長安慕立功名不拘小節大業中徴天下驍果之士伐遼光預焉從帝攻遼以衝梯擊城竿長十五丈光升其端臨城戰短兵接殺十數人帝壯異之以爲折衝郎將及江都之難潛搆義勇將為帝復仇語洩被害麾下數百人皆鬪死無降者唐錢九隴字永業長城人善騎射從高祖起兵征薛仁杲劉武周累擢右武衞將軍又從平洛陽佐太子建成討劉黒闥于魏川力戰破賊以功最封郇國公卒謚曰勇姚思亷本名簡以字行察之子察在隋常修梁陳二史未就死以屬思亷思亷表父遺言有詔聽續煬帝又詔與崔祖濬修區宇圖志遷代王侍讀高祖定京師府僚皆奔亡獨思亷侍王帝義之聽扶王至順陽閣泣辭去秦王為皇太子遷洗馬改著作郎宏文館學士詔與魏徵共撰梁陳書徐齊𣆀字將道長城人八歲能文太宗召試賜所佩金削刀高宗時為宏文館學士修書于芳林門進西臺舍人在職屢進讜言帝以其善文誥命侍皇太子及諸王屬文後坐貶卒睿宗時贈禮部尚書沈千運呉興人攻苦詩文力追作者元結篋中集序云千運獨挺于流俗之中强攘于己溺之後窮老不惑五十餘年凡所為文皆與時異徐堅字元固齊𣆀子㓜有敏性舉秀才及第為萬年主簿聖厯中東都留守楊再思王方慶共引為判官堅屬辭典厚再思每目為鳳閣舍人様與徐彥伯劉知幾張説同修三敎珠英書成遷給事中時太平公主用事屢邀請堅不許又妻以岑羲女弟固辭後羲敗不染于惡元宗改麗正院為集賢院以堅充學士堅于典故多所諳識凡七當撰次高選卒謚曰文沈景筠烏程人性至孝母生前懼雷及卒葬宅西每雷發必奔至墓前號泣云景筠在此賀知章為撰孝德傳錢起呉興人天寶中舉進士能詩與郎士元齊名時語曰前有沈宋後有錢郎終考功郎中孟郊字東野武康人少隱嵩山性介少諧合韓愈一見為忘形交年五十得進士第調溧陽尉鄭餘慶鎮興元軍奏署為叅謀卒張籍謚曰貞曜先生錢徽字蔚章起子中進士第初辟樊澤崔衍府二人卒俱賴徽以安其軍厯翰林學士三遷中書舍人加承㫖懇諌罷無名貢獻憲宗密戒後有獻毋入右銀臺門以避學士後拜禮部侍郎叚文昌李紳各以所善諉徽求第徽不能如二人請文昌奏徽取士以私與紳共擠之貶江州刺史或勸出二人私書自直徽曰苟無愧于心安事辨證太和初以吏部尚書致仕沈亞之字下賢歸安人居小敷山下學于韓愈之門與皇甫湜詩文往來太和初登第官至殿中侍御史五代沈韜文烏程人父攸常州刺史韜文性介潔好學能屬文呉越時為元帥府典謁叅畫軍務有所禆益後為湖州刺史甚著清名沈顏字可鑄德清人少有詞藻時人為之語曰下水船言為文精速無不載也沈承禮烏程人呉越錢元瓘以女妻之掌親兵俶命知威武軍充兩浙都鈐轄使王師征江南俶遣水陸數萬人助平毘陵李煜歸朝錄其功授福州節制太平興國初俶盡獻浙右地徙承禮鎮密州卒贈太子太師宋劉述字孝叔湖州人舉進士神宗時為侍御史授吏部郎中常言去奢當自後宫始章辟光宜誅高居簡宜黜張方平不當叅大政王拱辰不當除宣徽使皆不報王安石叅知政事述兼判刑部與安石爭謀殺刑名述執奏不已復偕率御史劉琦錢顗等疏論安石姦詐專權之人豈宜處之廟堂以亂國紀願早罷逐以慰天下安石欲置之獄司馬光與范純仁爭之乃貶知江州紹興初贈秘閣修撰盧革字仲辛德清人少舉童子杭州守馬亮異之秋貢士密戒主司勿遺革革聞去弗就後二年登第年才十六慶厯中知龔州累官福建湖南轉運使神宗謂其亷退宜與嘉郡遂為宣州以光祿卿致仕子秉字仲甫中進士甲科為兩浙淮東制置發運副使奏請罷獻羨餘後知渭州討夏人有功乞解官終養帝數賜詔慰勉時以為榮張先字子野烏程人康定初進士詩格清麗尤長于樂府官至都官郎中俞汝尚字退翁烏程人為人議論不苟澹于勢利擢進士第厯簽書西川判官王安石當國或言汝尚清望可置之御史使彈擊異已者召詣京師既知所以薦用意力辭得免還家苦貧又從趙抃于青州以屯田郎中致仕蘇軾蘇轍孫覺等皆賦詩美之元孫􅊹字子清以清介自持官至刑部侍郎求退放意泉石間陳舜俞字令舉烏程人博學强記登進士又舉制科第一熙寕中知山陰縣青苗法行舜俞不奉令上疏自劾謫監南康軍酒税卒蘇軾為文哭之稱其學術才能兼百人之器朱服字行中烏程人熙寕進士甲科為監察御史裏行㕘知政事章惇遣所善者見服道薦引意以市恩服舉劾之紹聖中拜禮部侍郎後坐與蘇軾游安置蘄州卒沈畸字德侔德清人第進士崇寕中擢監察御史詣匭上十事言花石擾民土木敝國及論當十夾錫錢最為剴切進殿中侍御史蔡京興蘇州錢獄䧟章綖兄弟遣御史鞠之株逮至千百罪死者甚衆帝遣畸往代京啖以顯仕畸至蘇即日决釋無佐證者七百人歎曰為天子耳目司而可附會權要殺人以苟富貴乎遂閲實平反以聞京大怒貶監信州酒税建炎初贈龍圖閣直學士費若字如川烏程人少從胡瑗學登進士第直史館闢林靈素忤上意適朱勔進花石綱言湖州多奇石若爭之遂落職高宗時起直院學士充崇政殿説書以薦李綱宗澤忤汪伯彥棄官歸卒謚文端曹清烏程人父嘗殺人清詣吏自誣曰手刃者清也非父罪遂代刑有司上其事詔旌之劉士英字仲發武康人政和進士宣和初為温州敎授方臘陷處州士英治兵峙糧拒守四十餘日賊潰去靖康初通判太原金兵入境士英與郡將王禀力謀守禦及賊䧟禀赴火死士英持短兵接戰死之盧知原字行之德清人以父任累官梓州路轉運副使忤王黼罷去後為江西轉運副使過關入奏徽宗勉之曰卿在蜀道功效甚休遂賜三品服高宗即位知温州帝東幸知原繇海道轉粟及金繒十餘萬召見稱奬官至徽猷閣待制盧法原字立之知原弟自知雍邱縣積官為吏部尚書以官秩次第履厯總為一書功過殿最開卷暸然吏不能欺紹興中累進端明殿學士川陜宣撫副使金人攻關輔法原視山川險阻分地置將前後屢捷上所倚重與兄知原皆以才見稱于世劉珏字希范長興人登崇寕進士第欽宗時除中書舍人陳十開端之戒建炎中遷吏部侍郎以久雨求言珏疏論消天變收人心數事并陳荆陜江淮守禦之畧進尚書同知三省樞密院事紹興初以朝散大夫分司西京卒官所著有呉興集二十卷集議五卷兩漢蒙求十卷沈與求字必先德清人政和進士高宗時為侍御史請都建康以圖恢復遷御史中丞凡厯御史三院知無不言前後幾四百奏其言切直自敵已以下有不能堪者除叅知政事金人將入犯贊高宗親征且言和親不足信當遣岳飛自上流乘虛擊之彼必有反顧之憂累官知樞密院事卒謚忠敏劉一止字行簡歸安人登進士第紹興初為監察御史擢起居郎極言堂吏宦官之蠧執政植私黨無憂國心累遷給事史封駁不避權貴居鎖闥百餘日繳奏不已為用事者所忌奏罷落職秦檜死進敷文閣直學士卒一止性冲淡寡欲博學無不通為制誥有體一日數十輒辦詩自成家有類藳五十卷劉安止字無虞一止從弟登宣和進士甲科建炎中為兩浙轉運判官累官顯謨閣直學士提舉太平觀安止有文名慷慨喜論事當艱難時上疏言闕失指切隱微多人所難言朱蹕安吉人知錢塘縣建炎三年金人䧟杭州守臣康允之退保赭山蹕率弓箭土軍前後拒敵兩中流矢左右掖至天竺山猶率鄉兵禦敵後數日遇害周淙字彥廣長興人以父任為郎厯官通判建康紹興三十年金渝盟邊事方興淙守濠梁有保障功張浚視師見淙謀輒稱嘆且曰有急公當與我俱死孝宗即位知臨安府上言風化必自近始陸下躬履節儉而貴近奢靡殊不知革乃條上禁止十五事上嘉納之積階至右中奉大夫李彥頴字秀叔德清人紹興進士累官皇子恭王府直講尋兼左諭德首論建置官僚錄司馬光論讀講官奏疏以進皇太子尹臨安兼中書舍人張説再登樞筦彥頴論説無寸長此命復岀恐六軍解體又廷臣多以中批斥去彥頴極言非盛世事累除吏部尚書叅知政事在東府三歲實攝相事内除繳囘甚多以觀文殿大學士致仕家居自奉淡約蕭然永日卒贈少保謚忠文王克明字彥昭烏程人紹興乾道間名醫精診脈士大夫皆與㳺名聞北方張子葢救海州戰士大疫克明時在軍中全活者幾萬人子蓋上其功力辭之克明頗知書好俠尚義常數千里赴人之急芮煜字國器烏程人紹興進士為仁和尉因和沈長卿詩為秦檜所忌竄化州乾道中提舉浙西常平江西轉運使以右文殿修撰致仕所著易傳詩文奏議若干卷莫𪷟字子𪷟歸安人為大理寺正屢釋疑獄嘗假工部尚書使金賀正旦金庭賜宴濛以本朝忌日不敢簪花聽樂金遣人趣赴𪷟堅執不從竟不能奪葛邲字楚輔呉興人高祖密至邲五世登科第大父勝仲至邲三世掌詞命邲登進士第孝宗時除正言論征榷歲増之害復條陳六事皆切中時病光宗受禪除㕘知政事勸上專法孝宗正風俗節財用振士氣恤民力選將帥收人才擇監司明法令上嘉納之紹熙四年拜左丞相專守祖宗法度薦進人物博采公論卒贈少師謚文定配享光宗廟庭有文集二百卷詞業五十卷倪思字正甫歸安人乾道進士光宗時累官禮部侍郎上久不朝重華宫思疏十上言多痛切寕宗時爲言者論去復召還試禮部侍郎時赴召者未引對先謁韓侂胄思曰私門不可登矧未見君乎逮入見言士大夫寡亷鮮恥匍匐權勢門竇侂胄聞之大怒思退謂侂胄曰人言平章騎虎不下此李林甫楊國忠晚節也及侂胄誅史彌遠用事思言樞臣獨班恐䧟往轍宗社豈堪再壞宜親擢臺諌以革權臣之弊並任宰輔以鑒專擅之失彌逺懷恚思力請去出知鎮江府尋鐫職卒謚文節沈作賓字賓王歸安人以父任入仕所至有聲慶元中知平江府招降盗黨海道無警召為户部侍郎時軍興力耗見存金榖僅支旬日作賓考逋負柅吏姦閱三月即有半年之儲厯江西安撫兼知隆興府在郡撙錢二十餘萬緍僚屬請獻諸朝作賓謂平生未常獻羡以半歸帥司犒師半隷本府以顯謨閣學士致仕朱震字震之安吉人幼頴異從父官清陽朱子見而奇之長學于袁潔齊之門義理該洽持敬存誠有益泉集二十卷子應元右文殿修撰朱泰武康人家貧鬻薪常適數十里外易甘㫖以奉母一日入山遇虎博攫負之而去泰己瞑眩行百餘步忽稍醒厲聲曰虎為暴食我所恨母無託爾虎忽棄泰于地走不顧泰匍匐歸不踰月如故鄉里聞其孝感率金帛遣之人目為朱虎殘元牟應龍字伯成其先蜀人後徙呉興祖子才仕宋贈光祿大夫父巘為大理少卿應龍擢宋咸淳進士宋亡留夢炎事世祖以書招之不答已而起家敎授溧陽晚以上元縣主簿致仕初應龍父巘退居時一門父子自為師友討論經學以義理相切磨應龍為文長于敘事以文章大家稱于東南學者稱曰隆山先生趙孟頫字子昂宋太祖子秦王德芳之後因賜第湖州故為州人㓜聰敏讀書過目成誦為文操筆立成至元間程鉅夫奉詔搜訪遺逸以孟頫入見才氣英邁神采煥發如神仙中人世祖顧之喜使坐右丞葉李上仁宗即位官至翰林學士承㫖卒贈封魏國公謚文敏孟頫所著有尚書注有琴原樂原得律吕不傳之妙詩文清邃奇逸讀之使人有飄飄出塵之想篆籕分隸真行草書無不冠絶古今畫山水木石花竹人馬尤精緻史官楊載稱孟頫之才頗為書畫所掩知其書畫者不知其文章知其文章者不知其經濟之學人以為知言云妻管氏子雍奕並以書畫知名張復亨字剛父烏程人力學博文仕至泰州同知與趙孟頫牟應龍蕭子中陳無逸陳仲信姚式錢選皆以能詩名時號呉興八俊錢選字舜舉呉興人景定間鄉貢進士善畫趙孟頫早歲從之問畫法孟頫入朝諸人皆附以取官選獨流連詩畫以終其身黄公望謂舜舉呉興碩學貫串經史人品甚高宇文公諒字子貞呉興人通經史百氏言弱冠有操行登至順進士第為國子助敎日與諸生辨析諸經六館之士資其陶成者往往出為名臣官至嶺南亷訪使僉事平居雖暗室必正衣冠端坐晝有所為暮則書之其不可書者即不敢為也所著有折桂觀光諸集門人私謚曰純節先生明嚴震直字子敏烏程人洪武初以富民推擇糧長歲部糧至京師無後期帝才之特授通政司叅議累遷工部尚書時朝廷事營建集天下工匠于京師凡二十餘萬户震直請户役一人人書其姓名所業于官有役則按籍更番召之役者稱便坐事降御史數雪冤獄命修廣西興安縣靈渠審度地勢浚渠建閘漕運悉通歸奏帝稱善尋復為工部尚書已而致仕成祖即位命以故官巡視山西至澤州病卒牟魯烏程人洪武初為莒州同知青州民孫古朴等為亂襲州城執魯欲降之魯大罵不屈遂遇害賊平詔恤其家郎理字子中安吉人洪武中舉人授户部主事山西歲歉多逋賦命理往徵之會赦悉免天下逋賦尋詔止免三分理陛見言曰陛下布大信而復更之如天下何臣不敢奉詔詞甚切直上怒椎擊之弗為動已復命往徵辭益堅上大怒令棄市尋悔之賜祭葬理妻沙氏聞理死哭曰夫為忠臣吾獨不能為烈婦乎遂自經事聞上嘉歎仍諭祭給驛歸其喪閔珪字朝瑛烏程人天順末進士授御史岀按河南以風力聞成化中巡撫江西忤强宗左遷廣西按察使孝宗時為左都御史以灾異與都御史戴珊共陳時政八事又陳刑獄四事多報可珪久為法官議獄皆會情比律歸于仁恕帝之親鞫呉一貫也將寘大辟珪進曰一貫推案不實罪當徒帝不允珪執如初帝怒令更擬珪終以原擬上卒如珪議及劉瑾用事九卿伏闕固諌韓文被斥珪亦連章乞休卒贈太保謚莊懿陳恪字克謹歸安人成化進士知宿松縣以治行聞授御史厯按貴州畿輔皆有聲正德初遷江西副使忤劉瑾除名瑾誅起故官累進左布政使數忤宸濠至逮其胥吏恪不為動擢大理卿恪居官盡職性篤實和易而中有定守天啟初追謚簡肅陸崑字如玉歸安人宏治進士授青豐知縣以亷幹徴拜南京御史武宗即位疏陳重風紀八事尋劾中官李榮高鳳等因請汰南京増設守備内臣廣開言路屏絶宴游騎射帝不能從時八黨竊柄朝政日非崑偕十三道御史薄彥徽等上疏極諫請屏太監馬永成魏彬劉瑾谷大用輩以絶禍端疏至朝事已變劉健謝遷皆被逐復上公疏乞留之瑾怒逮下詔獄榜掠除名及瑾誅復官致仕卒呉珫長興人家世高資珫獨退約不近聲利隱蒙山五十餘年窮獵經史百家自號甘泉子嘗輯三才廣志史類文編凡千卷蔣瑶字粹卿歸安人宏治進士授行人正德時厯南京御史陳時弊七事被詰責岀為荆門知府有善政調揚州適帝南巡所在大擾瑶獨持正嬖倖要求皆不應中官用鐵絙繋瑶數日始釋民皆感泣嘉靖時累遷工部尚書時京師營建大工頻仍嵗募民充役費二百餘萬瑶因請停不急者募值大減以老致仕瑶端亮清介既歸僻處陋巷與尚書劉麟顧應祥輩結文酒社徜徉峴山間卒贈太子太保謚恭靖臧應奎字賢徴長興人正德進士授南京車駕主事進貢中官索舟踰額應奎力裁損之父所生母卒法不得承重執私喪三年入為禮部主事以諫大禮廷杖創重卒應奎受業湛若水之門見義必為以聖賢自期常過文廟慨然謂其友曰吾輩殁亦當爼豆其間其立志如此隆慶初贈光祿少卿張永明字鍾誠烏程人嘉靖進士除蕪湖知縣擢南京刑科給事中首劾兵部尚書張瓚黷貨悞國又偕同官劾大學士嚴嵩及子世蕃貪汚狀已又劾南京祭酒龔用卿兵部尚書戴金等中外憚之岀外累遷刑部尚書改左都御史條上飭勵撫按六事復吏部郎考滿報名庭謁禮以整飭綱維為已任朝論重之乞休歸卒贈太子少保謚莊僖韋商臣字希尹長興人嘉靖進士授大理評事時大禮初定廷臣下吏貶謫者無虚日商臣上疏諌帝責以沽名賣直謫清江丞量移德安推官遷河南僉事討平巨㓂伊王虐殺其妃商臣論如律會以他事考察落職歸言官戚賢戴銑輩交章救不納卒于家蔡汝楠字子木德清人兒時聽湛若水講學輒有悟舉嘉靖進士授行人尋進南京刑部員外郎擢知歸德府有惠政以母憂去厯江西布政使巡撫河南終南京工部侍郎汝楠始好為詩有重名中年好經學及官江西與鄒守益羅洪先游學益進唐樞字惟中歸安人嘉靖進士授刑部主事妖賊李福達獄起言官交劾郭勛而不得獄辭要領樞上疏千言謂無可疑者六乞明正其罪以示天下疏入帝大怒斥為民樞少學于湛若水深造實踐以自得為宗四方從游者衆監司為創一庵書院居之學者稱一庵先生又留心經世畧九邊及越蜀黔滇險阻阨塞無不親厯躡蹻茹草至老不衰隆慶初復官潘季馴字時良烏程人嘉靖進士擢御史巡撫廣東行均平里甲法廣人大便萬厯中累官刑部侍郎時河决崔鎮全河南徙命季馴總理河漕經營相度條六事上之詔如議兩河工成進太子太保工部尚書季馴凡四奉命治河前後二十七年習知地形險易增築設防置官建閘總理纖悉積勞成病屢疏乞歸所著河防一覽行于世徐中行字子與長興人嘉靖進士授刑部主事入李攀龍王世貞等詩社稱七子厯汀州知府湖廣僉事江西左布政使中行性好客無貴賤應之不倦卒于官人多哀之所著有青蘿天目二集沈節甫字以安烏程人嘉靖進士厯祠祭司郎中詔建祠禁中令黄冠祝釐節甫持不可尚書高拱恚甚遂移疾歸萬厯初召為尚寶丞累遷工部侍郎攝部事疏請省浮費覈虚冒止興作減江浙織造停江西磁器帝為稍減織造數中官傳奉節甫持不可且上疏言之嘗曰朝廷有不可輕之大臣則能重朝廷人以為不愧其言卒贈右副都御史天啟初以子㴶柄用賜謚端清呉維嶽字峻伯孝豐人嘉靖進士授刑部主事慮囚江西得末減者萬五百人累遷僉都御史巡撫貴州有平蠻功維嶽在郎署時與李先芳輩攻詩甚有名許孚遠字孟中德清人受學同郡唐樞登嘉靖進士授吏部主事出為廣東僉事招降大盗擒倭黨有功萬厯初知建昌府尋擢陜西提學副使皆以講學化導擢僉都御史巡撫福建治績大著終兵部侍郎卒贈工部尚書謚恭簡孚遠學行高潔居官所至有聲從游者馮從吾劉宗周丁元薦皆為名儒茅坤字順甫歸安人嘉靖進士善古文又好談兵自負文武才累官廣西兵備僉事破猺賊十七砦一方以安遷大名副使常提兵戍倒馬闗總督楊博視其營壘嘆為奇才薦于朝為忌者所中落職歸坤論文心折唐順之所選唐宋八大家文鈔行于世其集曰白華樓藏稿玉芝山房藳耄年稿