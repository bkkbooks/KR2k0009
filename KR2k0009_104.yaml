應制詩文悉稱㫖丁艱歸服闋未起奉命赴揚州校定全唐詩特令在籍補原官一體食俸葢異數也三曾恭謹恬退不妄交一人家居伏處荒村經年不入城市敦本睦族子孫能守家法人稱為懷庭先生蔡升元字方麓德清人康熙壬戍進士廷試第一授修撰少禀異敏讀書纘言極根體要入直館閣含英羣籍矢音六義麗以則清以越言暢意美卓絶一時官至禮部尚書朱鼎字冠英長興人少失怙哀毁骨立事大母及母以孝聞祖姑父三柩在殯值鄰舍火鼎號泣籲天風焰頓息營窆山中忽遇虎奮𬒮前行虎為之歛跡母殁廬墓十年巡撫朱昌祚表其門嚴廷瓚烏程人震直九世孫父遜修為姪某所殺瓚甫二齡母朱氏撫之稍長為述父冤死狀瓚泣血嚙指即蓄利刃自隨念力弱未能即報徒居避之家貧授徒養母或勸之婚以他故辭間歸故里佯與仇暱共飲食至康熙己未瓚年二十八會春社演劇仇在儔伍中瓚乃拔刃奮擊之中腦復斫其頭以死遂入郡自首縣官嘉其志欲上間省之未果死獄中費金吾字曉亭烏程人康熙癸酉舉人授桂林府同知芟除積弊及筦搉陋規厯升永昌鳳陽知府晉江西糧儲道時養亷未有定識向例日用取給漕項耗羡及兑發餘平弊竇百岀金吾悉除之擢山東布政署巡撫事雍正四年黄河衝齧民居捐俸二千餘金設法賑濟疏排山左淤淺河道如張孤山十字河等處不數月而訖工升湖北巡撫之任中途疾卒沈涵字度汪歸兵人康熙丙辰進士由翰林厯内閣學士督學福建入仙霞嶺誓于神曰涵如徇一私不能歸度此關既至革除餽遺杜絶請寄以實學砥礪諸生閩人服其敎肖像祀之呉浩字天濤歸安貢生性孝友四世百口同居讀書淹貫古今工詩古文著書凡數十種胡會恩字孟綸德清人康熙丙辰進士廷對第二人由翰林官至刑部尚書以勤慎稱歸葬其親并及親屬十七棺人咸義之卒賜祭葬費俊字慧先歸安人康熙戊辰武進士任温州遊擊賊王大順出没海上為民害俊隻身招之遂就撫餘黨立散累功至福寕鎮總兵卒贈左都督賜祭葬沈炳震歸安人雍正間舉博學鴻詞著有九經辨字讀蒙排比文字銁稽訓詁有禆經學又進所著新舊唐書合抄詔付書局其精粹者已采入唐書考證中同縣葉佩蓀乾隆甲戍進士官湖南布政使著易守四十卷於易中三聖人所未言者不加一字故曰守呉廣生烏程人嘉慶十六年旌表孝子流寓晉陳達漢太邱長寔之後世居頴川達為長城令悦其山水遂家焉曰此地山川秀麗後當有異人岀我子孫必鍾斯運南北朝宋呉慶之濮陽人寓居呉興江夏王義恭守揚州召為西曹書佐及義恭誅慶之自傷為吏無狀不復肯仕終身蔬食後王焜為呉興太守欲召為功曹答曰走素無人世情直以明府見接有禮所以奔走歲時若欲見吏則是畜魚于樹栖鳥于泉耳不辭而退唐張志和金華人肅宗時待詔翰林後坐事貶南浦尉赦還居江湖自稱烟波釣徒顏真卿刺湖州志和往來苕霅間陸龜蒙呉江人嗜茶置園顧渚山下時號江湖散人今長興有别業在陸羽竟陵人上元初隱苕溪自稱桑苧翁闔門著書嘗獨行野中誦詩擊木或慟哭而歸時謂今接輿也宋葉夢得呉縣人累官尚書左丞以與宰相朱勝非議論不協歸湖州居弁山紹興中起官後以崇信軍節度使致仕卒湖州姜夔德興人少從父宦古沔時蕭千岩與䕫相得遂攜過苕霅以兄之女妻之遂家武康牟子才井研人理宗時謁告還安古州寓舍時相丁大全與宦官董宋臣以私怨誣劾之帝密問安吉守呉子明子明奏曰臣嘗至子才家四壁蕭然人咸知其清貧事乃解又李文靖道傳劉學士光祖俱以蜀人寓居呉興元敖繼公長樂人寓居烏程日事經史從游者甚衆趙孟頫師事之有儀禮集説十七卷張羽潯陽人元季領鄉薦授安定書院山長卜居呉興遂家烏程之戴山明劉麟本安仁人徙南京正德初以紹興知府罷歸湖州人呉珫施侃高其風迎之遂偕孫一元龍霓為苕溪五隱後奉父柩卜葬湖州遂家焉嘉靖時由工部尚書致仕歸守令為築堂臺始有游息之所晚好樓居力不能搆輒懸籃輿于梁曲卧其中名曰神樓文徵明繪圖貽之孫一元字太初自言秦人嘗據太白之巔故號太白山人善為詩風儀秀朗踪跡奇譎烏巾白帢攜鐵笛鶴瓢遍游中原涉江淮厯荆楚抵呉越所至賦詩談神仙論當世事往往傾其座人鉛山費宏罷相訪之杭州南屏山值其晝寢就卧内與語送之及門了不酬對時劉麟龍霓罷官並客湖州與郡人陸崑呉珫相友善因招一元入社稱苕溪五隱一元于是買田溪上老焉卒葬道場山列女南北朝宋羊緝之女名佩任烏程人母亡晝夜號哭不食三日死鄉里號曰女表齊乘公濟妻姚氏建武中呉興乘公濟妻姚氏生二男而公濟及兄公願乾伯並卒各有一子姚養育之賣田宅為娶婦自與二男寄止鄰家明帝詔為其二子婚表門閭復徭役元伊喇氏耶律呼圖克布哈妻夫殁割耳自誓既葬廬墓側悲號不食而絶伊喇氏舊作移刺氏呼圖克布哈舊作忽都不花今俱改正朱甲妻郎氏安吉人朱仕浙東以氏從至元問朱殁氏䕶喪還至玉山里留居避盜勢家柳氏欲强聘之氏誓不從夜棄裝奉柩遁柳邀之中途復死拒得免家居養姑甚謹姑常病禱天刲股肉進啖而愈大德間詔旌其閭邵某妻沈氏德清人至正間張士誠兵亂沈為張萬户所獲逼之不可投于水兵士急救之閉之舟中夜半俟守者稍懈陰取束箸納之口中力觸舟箸入喉以死邱巖妻盛氏烏程人元末㓂盗充斥巖挈家避于官澤沈家兜㓂至氏與巖妹多奴卯奴同赴水死又同邑楊某妻呉氏年二十五為兵所掠攜二子自沈于苕溪明蔡孝女武康人天順間隨母入山採桑有虎宇至攫其母女挺身赴之攀樹枝格門行三百餘步女愈奮擊虎舍其母傷女血上噴高丈許竹葉盡赤虎竟舍之而去尋病創死潘順妻徐氏字守貞烏程人年十六嫁順未期而順病革謂徐曰我母老女年少奈何徐泣下即引刀斷左手一指以死誓順殁布衣長齋終其身臨終命取所斷指置棺中呉忠妻王氏安吉人家甚貧正德初夫疫死氏無所依有欲收之者氏不應乃為麥飯瘞夫塚前痛哭良久以草簀裹身沈溪而死錢欽妻茅氏烏程人嘉靖中避㓂安固村遇㓂刦之茅不從抱㓜男自投于河㓂怒復抽刀剖其腹事聞詔旌其閭路氏安吉人年二十美姿容其夫貌甚寢多病有富人欲買為妾厚賄其父令諭意路知勢不可止佯許之比來迎路曰少緩須臾當整容以待入卧内自徑死匡霞妻汪氏烏程人嫁逾年霞殁無子獨與姑俱族奪其夫遺產氏不與爭父憐而召歸氏以姑辭躬紡績以衣食之姑卒持喪畢謂父曰吾事畢矣遂絶食而死周貞女長興人許字姚光𥙿光𥙿殁女剪髪毁服泣告父母欲臨姚喪父母知不可奪乃治縞車輦女歸姚及門後獨居一室高牖深扃蔬食十餘年岀其織絍所積購巨材為槨葬光𥙿于唐興山事竣請嗣一慟嘔血不藥而逝又德青車氏女許聘房煥如煥如卒女年十五即奔喪立嗣娶婦後絶粒死又武康沈氏許聘盛某未婚而盛夭父母更字于章姓女間亦不食而死嚴正度妻施氏歸安人早孀里中有無行者隔垣窺之施大聲絶呼遍告宗黨自刎死時方炎暑越三日始殮顏色如生范氏湖州人從夫張問達戍温州聞達挾惡少逼令從姦范堅拒問達笞之身無完膚一日設酒肉生祭脅之日不從且死范泣求速問達大怒持鐵錘奮擊死三日顔如生邑人葬于白塔山石門丐婦湖州人莫詳其姓氏正德初湖大飢婦隨夫及姑走崇德石門市乞食一日夫姑相失婦有色市人爭挑之與之食不顧誘之財亦不顧寓東高橋上俟夫與姑不至及二日聚觀者益衆婦乃從橋上躍入水中而死王氏二節楊氏孝豐人王萬妻年二十三夫亡守節足跡不踰户外一子希賢復早世婦章氏誓奉姑守志楊曰汝年方艾奈何以我累汝不如他適章泣曰姑所仗惟一媳忍離姑側耶姑婦抱持而哭後楊卒章治喪事畢哀毁踰月而終嚴烈婦烏程人歸陸某容貌莊妍事姑以禮苦家貧無以給姑性頑狠百計挫辱里中年少瞰姑隙欲私之氏垢面毁容愈拂姑意日肆搒掠遂夜半自沈于河李大元妻龍氏長興人年十六歸大元不數月大元客死氏聞訃歎曰我生不辰安知夜臺非白日乎夜半紉衣裳自經死又德清沈萬鍾妻章氏陳大章妻談氏安吉李茂妻高氏孝豐施之華妻呉氏章雲祺妻潘氏皆殉夫而死以節烈稱馮聖源妻朱氏長興人值㓂亂被掠觸刀斷一臂朱罵賊益厲又斷一臂遂寸臠以死又同邑李世彩妻徐氏欽授袞妻孫氏揚發妻梁氏孫昇妻濮氏胡駿妻韋氏胡端妻過氏胡毓秀妾柏氏馮遵祖妻陳氏皆被掠不從赴水死又楊亨妻周氏王撰妻孫氏劉國美妻施氏並女秀大俱不屈𬒳殺汪逢源妻邱氏烏程人年二十餘夫亡矢志遭㓂亂扃户自縊又同邑潘汝升妻趙氏汝升被㓂殺氏奪刀自刎仲烈女湖州人隨父賈漢陽崇禎中漢陽陷從羣婦將岀城賊守門者止之有頃賊大肆滛掠見女色美首執之女𠢐面𬒳髮大罵賊命二賊挾之上馬連墜傷額終不肯行賊露刃迫之曰身往何如頭往女曰頭往善遂被害温璜妻茅氏烏程人崇禎末璜任徽州推官徙家屬于村民舍城破璜趨村舍語氏同死氏無難色乃匿㓜子女他室而急呼長女起女方寢問何爲曰死爾女即延頸就帨未絶復刃之氏整衣以卧璜刀截其喉有頃氏呼曰未也再刃而絶本朝王法妻沈氏德清人年二十順治間㓂亂避匿林莽中爲盜所迫以手格刃投河死同邑呉允培妻沈氏遇盜以弓弦扣其頸躍入深淵以死又歸安茅允旗妻周氏性至孝順治初羣盜入室氏恐見汚潛赴水死長興姚雲妻金氏遇遊騎牽其臂恚甚遽引刀自斷投池中死烏程張伯慶妻沈氏爲强暴所逼自縊死沈元復妻徐氏德清人適沈一載夫卒無子舅姑皆亡家貧鬻女紅自給常終日不舉火或以富室諷之再行氏憤而呼天齒指自誓家人陰謀奪其守氏聞投清潭而死又歸安孫龍行妻李氏年十八夫亡絶粒而死王燾妻吴氏燾病醫藥罔效以言偵婦志婦以死自誓燾没赴池水死嚴氏女烏程人名麒姑許字盛世瑞未婚而世瑞卒訃至即登樓自縊父母救之甦許令之盛乃従容禮祖廟辭母氏與父偕往至則登堂拜舅姑畢即易服扶柩哀慟請立伯氏子宣和爲嗣遂絶粒吞磁而逝時年十八同邑沈秀姑許字丁彥昭彥昭亡秀姑聞訃坐卧一小樓足不踰閫期年父母爲之改聘遂投繯而死又歸安姚氏許字楊文德清沈氏許字阮淳皆未婚而夫殁聞訃自經張翼妻戴氏烏程人翼爲張韜側室子憐其㓜為䏂同里王某女以翼託婦家委以資為置產後韜殁翼長婚未幾王氏殁續娶戴王某子謀奪其產誘翼至家毆之垂斃擠水中戴在家心動使人往求之舁歸已不能語但瞠目視戴戴泣曰君如不起我一弱女子勢不能為君復仇且無子當以死從翼死戴服滷呑磁家人救之不死作絶命詩三章乘間自經時年二十一夏開衡妻姚氏烏程人年二十三歸開衡生子女各一開衡成進士官翰林氏在家奉舅姑未幾子痘殤念夫無子為買妾同赴京甫至開衡病殁氏視殮後欲自經既而瞿然曰吾死如夫柩何乃强起既歸里入拜舅姑訣别俟家人防守稍懈奠夫畢從容自縊死蔡新婺妻韓氏德清人年二十夫故堅貞自矢後姑逼之嫁迎娶者至門氏潛自縊雍正四年旌表賈大姑歸安人年二十許配高成龍未嫁浣衣水濱惡少李二經過調之大姑盖忿歸訴其母遂扄戸自經雍正十一年旌表沈文元妻呉氏烏程人夫亡守節又同縣生員姚源妻歸氏陳士斌妻俞氏姚亷妻邵氏生員呉宸妻葉氏潘頴新妻錢氏朱世榮妻楊氏李遜如妻曹氏沈雒新妻徐氏簡宏如妻沈氏孟怡臣