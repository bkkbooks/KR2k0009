斬􅀗甚多李繼遷所部康奴族往􅀊鈔劫靈州援糧尤桀黠難制復與秦翰等合衆進討窮其巢穴曹瑋靈夀人年十九知渭州馭軍嚴明賞罰立決善用閒周知虜動靜舉措如老將徙知鎭戎軍李繼遷虐用其國人瑋知其下多怨移書諸部諭以朝廷恩信由是康奴等族請内附以鎭戎軍據平地便於騎戰非中國之利請自隴山以東循古長城塹以為限又以弓箭手皆土人習障塞蹊隧耐寒苦未與資糧無以責死力遂給以境内閒田春秋耕斂州為出兵護作而蠲其租繼遷死西延家妙俄熟魏數大族請自歸瑋即日受其降德明不敢拒後復為涇原路都鈐轄兼知渭州與秦翰破章埋族於武延州分兵滅撥臧於平涼於是隴山諸族皆來獻地盧鑑金陵人眞宗時知儀州州有制勝關最號險惡李繼遷欲乘虛襲取之放言將由此大入諜者以告有詔徙老幼芻粟於内地鑑曰此姦謀也且示虜弱搖民心臣不敢奉詔卒不徙已而賊亦不至王仲寶高密人天聖初知鎭戎軍破康奴族獲首領百五十羊馬七千詔奬其功後為涇原路總管安撫副使兼管勾秦鳳路軍馬事與西羌戰六盤山俘馘數百人時任福大敗好水川别將朱觀被圍於姚家堡仲寶以兵救之拔觀出圍諸將皆沒獨仲寶與觀得還范祥三水人通判鎭戎軍元昊圍城急祥率將士拒退之請築劉璠堡定川砦從之夏安期德安人仁宗時知渭州􅂤弓箭手得驍勇萬人為步兵騎又半之敎以戰陳法由是士兵勝他路又籍塞下閒田募人耕種􅀊得穀數萬斛以備賑發名曰貸倉張亢臨濮人仁宗時為涇路總管知渭州㑹給郊賞州庫物良而估賤三司所給物下而佑高亢命均其値以便軍人程戡陽翟人仁宗時知渭州陜西有保毅軍人苦其役戡奏曰保毅在鄉兵外不黥而有籍所以佐邊備也已隸保捷而保毅籍如故州縣以供力役率困憊至破析財產售田者猶數戸出一夫民不勝苦因詔私役保毅者以計傭律坐之劉兼濟祥符人仁宗時知籠竿城夏人寇邊衆號數萬兼濟將兵千餘轉戰至黒松林敗之尋知原州屬戸明珠族叛諸將欲急討兼濟縱飲擊鞠謬為不知以疑其意既而叛者自潰乃追襲之射殺其酋長收餘衆以歸景泰普州人仁宗時知原州元昊衆十萬分二道逾平涼至潘原泰率兵五千從閒道赴原先鋒張迴逗遛不進泰斬以徇遇敵彭陽西乃依山而陣陰遣三百騎分左右翼張旗幟為疑兵敵欲遁去將校請進擊泰止之遣士搜山果得伏兵與戰斬首千餘級薛奎正平人為儀州推官嘗部丁夫運糧至鹽州會久雨粟麥潰腐奎白轉運盧之翰請縱民還州而償所失之翰怒欲劾奏之奎徐曰用兵久人疲轉餉今幸兵食有餘安用此陳腐以困民哉之翰意解凡民所失悉奏除之曹潁叔亳州譙人仁宗時通判儀州韓琦文彥博交薦其才王素莘縣人仁宗時知渭州初原州蔣偕建議築大蟲巉堡宣撫使聽之役未具敵伺閒邀擊不得成偕懼來歸死素曰若罪偕乃墮敵計責使畢力自效偕卒城而還治平初復知渭州三鎭涇原番夷故老皆歡賀拓渭西南城濬湟三周積粟支十年屬羌奉土地來獻悉增募弓箭手行陳出入之法身自督訓其居舊穿土為室寇至老幼多焚死為築八堡使居之其衆領於兩巡檢人莫得自便素聽散耕田里有警則聚故士氣咸奮精悍他道莫及劉滬堡塞人康定中為渭州瓦亭砦監押權靜邊砦擊破黨留族等斬獲萬計時任福敗邊城晝閉居民畜產多為賊所掠滬獨開門納之又破穆寕生氏城章川水洛以通秦渭之路内附築水洛城功未半會鄭戩罷涇原路尹洙令罷築滬不聽日増版趨役尹洙恕械滬下獄氐衆驚為亂朝廷遣使往視氐衆請以牛羊及壯丁助工役復以滬權水洛城砦主及卒居人號泣請留葬水洛立祠祀之經略使言得熟戸蕃官牛裝等狀願得滬子弟王其城乃命其弟淳為水洛城兵馬監押趙滋開封人仁宗時為涇原儀渭鎭戎軍都巡檢㑹渭州得勝砦主姚貴劫宣武神騎卒千餘人叛攻羊牧隆城滋馳至諭降八百餘人貴窮走出砦招討使令滋給賜降卒及遷補降吏滋以為如是是誘其為亂藏其牒不用范仲淹韓琦舉滋可將領為鎭戎軍西路都巡檢任顓夀光人仁宗時知渭州時四路以邊警聞渭獨無所上朝廷疑斥候不密顓力言無他虞帝使覘之始信蔡挺宋城人神宗初知渭州舉籍禁兵悉還府不使有隱占建勤武堂五日一訓之甲兵整習又分義勇為伍番三千人參正兵防秋與春以八月正月集四十五日而罷歲省栗帛錢纊十三萬有奇括並邊生地冒耕田千八百頃募人佃種以益邊儲取邊民闌市蕃部田八千頃以給弓箭手又築城定戎軍為熙寕砦開地二千頃募卒三千人耕守之周永清靈州人神宗時為渭州鈐轄渭兵勁而陳伍不講永清訓以李靖法帥蔡挺嘉其整圖上之詔推於諸道知德順軍夏衆入寇擊擒其酋呂効忠又募勇士夜馳百里擣賊巢穴斬首三百級俘數千人獲駝馬萬計城中無知者並砦禁地三百里盜耕不可禁永清拓籍數千頃置射士二千聲聞敵廷降者引入帳下待之不疑多得其死力蔡延慶膠水人神宗時知渭州夏人禹臧苑麻疑邊境有謀使人入塞賣馬吏執以告延慶曰彼疑故來覘執之是成其疑約馬􅀡授之使去疆吏入敵境攘羊馬得而戮諸境上且告之人曰兩境不相侵則安故戮以戒若有之亦當爾也夏人悅服盧秉德清人神宗時知渭州五路大出西討惟涇原有功夏境胡盧川距塞二百里恃險遠不設備秉遣將姚麟彭孫襲擊之俘斬萬計夏酋仁多嵬丁舉國入寇犯熙和定西城秉治兵瓦亭分兩將駐靜邊砦遲明縱擊之皆奔潰孫覽高郵人神宗時知渭州夏人入邊檄大將苗履禦之履稱疾移告二按正其罪竄諸房陵轅門肅然游師雄武功人神宗時授爲德順軍判官鄜延將劉琯與主帥議戰守策欲自延安入安定黒水師雄以地薄賊境懼有伏請由他道既而諜者言夏伏精騎於黑水傍琯謝曰微君言吾不返矣劉昌祚眞定人哲宗時知渭州渭地宜牧養故時弓箭手人授田二頃有馬者復増給之謂之馬口分地其後馬死不補而據地自若昌祚按舉其法不二年耗馬復初又括隴山田得數萬頃募士卒五千别置將統之勁悍出諸軍右景思立普川安岳人主渭州治平砦以功知德順軍䇿應王韶取熙州過洮築當川堡克羌香子珂諾城遂定河州呂大忠藍田人紹聖中知渭州付以秦渭之事奏言關陜民力未裕士氣沮喪非假之􅀊月未易支吾因請以職事對意欲以計徐取横山自汝遮殘井迤􅆔進築不求近功章楶浦城人哲宗時知渭州至即上言城胡蘆河川據形勝以逼夏乃以四路之師陽繕理他堡壁數十所示怯而陰具板築守戰之備帥師築二城於石門峽江口好水之陰二旬有二日成賜名平夏城靈平砦方興役時夏衆來乘楶迎擊敗之夏主遂奉其母合將數十萬兵圍平夏疾攻十餘日不能克一夕遁去夏統軍嵬名阿埋西壽監軍妹勒都逋皆勇悍善戰楶諜其弛備遣折可適郭成輕騎夜襲􅀡入其帳執之盡俘其家虜馘三十餘獲牛馬十萬夏主震駭楶在涇原四年凡創州一城砦九薦拔徧裨不閒厮役夏人降者折可適李忠傑朱智用咸受其馭功為西方最种師道洛陽人徽宗時知渭州督兵城席葦平方庀工而敵至堅壁葫蘆河師道陣於河滸若將決戰陰遣偏將曲充出橫嶺揚言援兵至敵方駭顧楊可世潛軍軍其後姚平仲以精甲哀擊之敵大潰卒城而還金張中孚張義堡人天㑹九年知渭州兼涇原路經略安撫使齊國建以什一法括民田籍丁壯為鄉軍中孚以為涇原地瘠無良田且保甲之法行之已久今遽紛更人必逃徙竟執不行任天寵定陶人明昌中再遷威戎縣令縣故堡塞無文廟學舍天寵以廢署建有兄弟訟田者諭以禮義委曲周至感泣而去商衡曹州人辟威戎令興定三年􅀊饑民無所糴衡白行省開倉賑貸全活者甚衆地震城圮夏人乘釁入侵衡率蕃部土豪守禦應敵得無虞秩滿縣人為立生祠石嘉紐勒緷興定三年行平涼府元帥府事上言鎭戎赤溝川東西四十里地無險阻當夏人來往之衝明年當城鎭戎彼必岀兵來撓乞徵旁郡兵聲言防護示進伐之勢以掣其肘臣領平涼之衆由鎮戎而入攻其心腹彼自救不暇則鎭戎可城彼亦不敢來犯又言鎭戎土壤肥沃且平衍臣裨將所統幾八千人每以遷徙不常為病若授以荒田使耕且戰則可以禦備一方上嘉約焉石嘉紐勒緷舊作石盞女魯歡今改正愛申正大閒為德順節度使行元帥府事四年元兵西來德順無軍人甚危之愛申識鳳翔馬肩龍可與謀事乃遺書招之或勸肩龍勿往肩龍曰愛申平生未嘗識我一見許為知己雖明知德順不可守我雷為知己死耳冒險而去至不數日為元兵所圍城中惟義兵鄉勇八九千人愛申假肩龍鳳翔總管府判官共守禦二十晝夜力盡乃死肩龍以劒自刎元何榮祖廣平人平涼府言有南人二十餘輩叛歸江南安西行省欲上聞會榮祖來爲參政止之曰何必上聞朝廷此輩去者皆人奴耳今聞江南平遁往求其家移文招捕之可也已而逃者俱獲果人奴也治以本罪而付其主其明決多􅀋此明元善洪武時爲靜寕州判官以善政超擢僉都御史陶炎絳州人宏治中爲固原兵備副使練士卒繕器械廣芻粟厯九年部内晏如張守亨潁川衞人正德閒知華亭縣縣依山險多盜守亨設計擒其魁盜遂息每春秋巡行郊野勸民耕作月朔召耆民訪問閭閻利病次第興除嘗大旱步檮應時即雨􅀊以大稔于玼東阿人嘉靖閒同知靜寕州事􅀊祲請賑臺省未許乃私發倉按籍賑貸活數萬人韓府宗室不法聚衆毆擊通判囚之别室玼至以法曉譬悚懼而解大猾高良據清平萬安二苑牧地投獻慶府橫莫能制玼單車入壘誘良出見縛之論如法郡守上其治行范立朝臨川人天啓中知平涼府韓王出所藏故敕云有舊賜屯地凡數里盡􅀒郭腴壤欲奏請臺司已從獨立朝不可王召宴從容微語立朝即正色起曰某爲朝廷守土身可死不敢以寸壤許人事遂沮􅂤仁瑞榮縣人崇禎中知平涼府十六年李自成陷潼關諸王宗室皆謀出奔仁瑞說韓王同死社稷不聽是夜郡兵大譟挾諸藩斬關而出并脅仁瑞行仁瑞曰吾去誰與守集少年技勇撤四關居民盡入城以土石塞門為死守計未幾賊傳檄至仁瑞盡岀其橐散給厮役召所活冤囚數輩謂曰吾義與此城存亡但不可使先人無後吾有一子能為我衞送岀城乎皆泣應曰諾詰晨賊騎薄城下士民皆降仁瑞衣冠自經於堂上何相劉乾州人崇禎時為華亭訓導寇至教諭鄒某援曾子居武城之義欲去相劉止之曰吾等受命司鐸是臣也安可以賓師自待城陷與教諭俱死贈國子監學錄陸夢龍㑹稽人崇禎七年以右參政分守固原援靜寕州所將止三百人賊大至圍之數重夢龍大呼奮擊手馘數人而死顏日愉上虞人崇禎時為靜寕知州玀賊亂馳請固鎭五道兵會􅁹而先率敢死士招撫之夜至賊弛備遣精卒搗其營賊潰斬首數百級至旦五道兵繼至復大破之夲朝郝全善固原提標游擊從奮威將軍王進寶討吳三桂戰於永寕被執不屈絕食六日而死楊榮允山西陽城人順治四年知華亭縣性坦易民訟立判宿弊盡除先是民苦戍弁騷擾榮允至召諸升舉觴勸諭自此弁不擾民招集流亡民漸安堵愛之如父母時叛弁所在劫掠至華亭約衆曰令廉能毋相驚擾銜枚而過舉卓異第一遷主事民立祠祀焉海柱滿洲正藍旗人知華亭縣乾隆四十九年逆回滋事海柱登城嚴守半月賊不敢犯城中安堵民皆德之卒為立祠祀焉佟希堯遼東人順治十年知華亭縣葺城署學宫創修縣志甘珠頭蒙古人知華亭縣除害安民以瓦亭驛距城二百餘里民有奔走供億之苦請於大吏併入固原民咸利之人物漢梁統烏氏人性剛毅好法律更始二年召􅀘中郎將使安集涼州拜酒泉太守赤眉入長安統與竇融及諸郡守起兵保境謀共立帥初以位次咸推統統辭遂推融為河西大將軍以統為威武太守建武八年光武自征隗囂統與融等將兵會車駕及囂敗封統為成義侯同產凡巡從弟騰並為關内侯悉遣還河西十二年統詣京師以列侯奉朝請拜大中大夫在朝廷數陳便宜後出為九江太守定封陵鄉侯梁松統子為虎賁中郎將博通經書明習故事與諸儒修明堂辟雍郊祀封禪禮儀光武崩受遺詔輔政永平元年遷太僕子扈亦敦詩書永初中為長樂少府梁竦松弟少習孟氏易坐事徙九眞厯江湖濟沅湘感悼子胥屈原作悼騷賦顯宗後詔聽還本郡閉門自養以經籍為娯著書數篇名曰七序性好施不事產業建初中為竇氏所陷死獄中梁商竦子雍之子襲父封乘氏侯順帝選商女及妹入掖庭陽嘉元年女為皇后妹為貴人加位特進拜執金吾三年為大將軍商自以戚屬居大位毎存謙讓虛己進賢辟漢陽巨覽上黨陳龜為掾屬李固周舉為從事中郎京師翕然稱為良輔帝委重焉檢御門族未嘗以權盛干法皇甫規朝那人有兵略羌衆攻燒隴西規上疏求自效不用舉賢良方正對䇿梁冀忿其刺己以規為下第拜郎中託疾免歸以詩易敎授門徒後梁冀誅公車徵拜太山太守延熹四年叛羌寇關中舉規為中􅀰將持節監關西兵討零吾等破之諸羌慕規威信降者十餘萬明年討隴右東羌乞降涼州復通論功當封中常侍徐璜等欲從求貨規終不荅璜等陷以事下吏論輸左校太學生張鳳等三百人詣闕訟之會赦歸徵拜度遼將軍及黨事起規自以西州豪傑恥不得與乃自上言宜坐朝廷不問時人以為賢規在事數􅀊北邊威服永康初徵為尚書遷宏農太守再轉為護羌校尉卒皇甫嵩規凡子少有文武志介好詩書習弓馬靈帝徵為議郎遷北地太守㑹黃巾賊起天下嚮應京師震動以嵩為左中郎將與右中郎將朱雋共討賊連破之旬日閒賊衆悉平拜嵩為左車騎將軍領冀州牧封槐里侯初平元年拜太尉嵩為人愛愼盡勤前後上表陳諫五百餘事皆手書毀草不宣於外折節下士門無留客子堅夀亦顯名徵為侍中辭不拜晉皇甫謐嵩曾孫年二十餘始就學居貧躬自稼穡帶經而農遂博綜典籍百家之言沈靜寡欲有高尚之志以著述為務自號元晏先生武帝時累徵不起自表就帝借書帝送一車書與之所著詩賦誄頌論難甚多又撰帝王世紀年厯高士逸士列女等傳元晏春秋並重於世皇甫方回謐子少遵父操兼有文才永嘉初博士徵不起避亂荆州閉户閒居未嘗入府城尊賢愛物南土人士咸崇敬之刺史陶侃毎造之著素士服望門輒下而進王􅛫代侃以方回侃所敬收斬之荆土華夷莫不流涕皇甫重朝那人性沈果有才用為司空張華所知元康中華版為秦州刺史時河閒王容鎭關中其將李舍與重有隙重露檄上尚書以容信任李含將為亂召集隴上士衆以討含為名容遣金城太守游楷等攻之重堅守城内知無外救遂共殺重張軌烏氏人少明敏好學有器望與同郡皇甫謐善隱於宜陽女几山張華與軌論經義及政事損益甚器之累遷散騎常侍征西軍司軌以時方多難永寕初求出為涼州刺史威著西州化行河右時天下亂所在使命莫有至者軌遣使貢獻􅀊時不替朝廷屢降璽書慰勞建興二年拜􅁤太尉涼州牧西平公軌固辭在州十三年卒諡曰武南北朝魏皇甫和朝那人年十一而􅀌母夏侯氏才明有禮則親授以經及長深沈有雅量尤明禮儀卒於濟陰太守弟亮九歲喪父哀毁若成人仕齊為尚書殿中郎周田宏高平人敢勇有謀略周文統衆宏求謁見論時事即處以爪牙之任累功授原州刺史平蜀後詔宏討平信州又討西反羌及鳳州叛氐等並大破之毎臨陣摧鋒􅀡前身􅀍百餘箭破骨者九馬被十矟朝廷壯之孝閔踐阼進爵雁門郡公後厯任大司空少保襄州總管蔡祐高平人性聰敏有行檢年十四事母以孝聞及長有膂力周文在原州召為帳下親信及遷夏州以祐為都督侯莫陳悅害賀拔岳諸將迎周文周文將赴之夏州首望彌姐元進等陰有異計周文召元進計事祐持刀􅀡入叱元進斬之並其黨伏誅一坐皆戰慄於是諸將同心誅悅從禽竇泰復宏農戰沙苑又從戰河橋皆有功累封懷寕郡公拜司馬以本官權鎭原州卒祐少與鄉人李穆布衣齊名及從征伐為士卒先軍還諸將爭功祐終無所競性節儉所得祿秩皆散宗族身死之日家無餘財隋皇甫績朝那人三歲而􅀌爲外祖韋孝寬所鞠養專精好學初仕周累遷御正下士隋初轉晉州刺史將之官言陳可滅狀帝嘉之陳平拜蘇州刺史高智慧作亂與楊素合擊破之旋拜信州總管梁睿烏氏人父禦西魏太尉睿少沈敏有行檢周閔帝時拜大將軍進爵蔣國公從齊王憲拒齊將斛律明月於洛陽毎戰有功遷小冢宰高祖總百揆代王謙爲益州總管謙反命睿爲行軍元帥討謙擒斬之劒南悉平惟南寕酋爨震恃遠不賓睿䟽請略定後遣史萬􅀊討平之因睿之䇿也高祖受禪復上平陳䇿時突厥方强并陳鎭守十餘事帝並善之徵還京師卒梁毗烏氏人性剛謇有學識開皇􅀄拜治書侍御史轉大興令遷雍州贊務􅀡道而行無所迴避岀爲西寕州刺史徵爲大理卿處法平尤左僕射楊素貴重擅權毗恐爲國患上封事極言其罪帝大怒親詰之毗發言謇謇帝無以屈素自是恩寵漸衰煬帝即位遷刑部尚書奏劾宇文述私役部兵帝議免述罪毗固爭因忤㫖憂憤而卒梁彥光烏氏人少有至性父遇篤疾醫云餌五石可愈時求紫石英不得彥光憂痒忽於園中見一物怪而持歸即紫石英也仕周累封華陽郡公拜柱國隋初為岐州刺史奏課為天下第一轉相州風俗大改卒諡曰襄子文謙宏雅有父風遷鄱陽太守徵拜户部侍郎田德懋平涼長城人周大司空宏之孫父仁㳟隋初拜太子太師爵觀國公德􅅷少以孝友著名丁父艱哀毀骨正廬於墓側􅀒土成墳文帝聞而嘉之璽書存問賜縑二百匹米百石表其門閭大業中位尚書駕部郎皇甫誕安定烏氏人父璠周隨州刺史誕少剛毅有氣局開皇中累遷治書侍御史朝臣無不肅憚後為尚書左丞漢王諒為并州總管上以誕公方拜總管司馬煬帝即位諒謀作亂誕數次諫止諒怒而囚之及楊素將至諒屯清涼以拒之主簿豆盧毓岀誕於獄協謀閉城拒諒諒襲擊破之並􅎨節遇害詔贈柱國封安義公諡曰明子無逸嗣尋為淯陽太守甚有聲名宋向寶鎭戎軍人為涇原秦鳳鈐轄積勞厯眞定鄜延副總管累遷嘉州團練使寶善騎射年十四與敵戰斬首二級及壯以勇聞有虎踞五原卑邪州東西百里斷人迹寶一矢殪之道過潼關巨盜郭邈山多載關中金帛子女寶射走之盡得其所掠神宗稱其勇比之薛仁貴曲珍隴干人世為著姓以材武雄邊珍好馳馬試劒從秦鳳都鈐轄劉温潤拒寇有功洮西遷内殿崇班郭逵趙􅾽南征為第一將進自右江撫接廣原三州十二縣降偽守以下百六十人功最諸將擢鄜延鈐轄元祐初為環慶路副總管進忠州防禦使珍善撫士卒得其死力雖不知書而忠樸好義本於天性郭成德順中安堡人從軍得供奉官朝廷築平夏城置將戍之章楶問可守者諸將皆曰非郭成不可遂使往守夏人空國入爭連營百里成與折可適乘勝深入俘其大酋進雄州防禦使涇原鈐轄成輕財好施名震西鄙既殁廉訪使者王孝竭白於朝徽宗手書報曰郭成盡忠報國有功於民宜載祀典榜其廟曰仁勇郭滸德順中安堡人從軍積官至武經郎為涇原第八副將金兵至陜西渭帥以下叛降獨滸守義不從被殺建炎三年贈忠州刺史郭浩成之子徽宗時充渭州兵馬都監擊敗夏人建炎初知原州金兵取長安郡人已降浩至郡所將止二百人得金人不殺縱之使還曰爲語汝將我郭浩也欲戰即來決戰金兵遂引去厯知涇州秦州鳳翔府金兵抵和尚原下浩與呉玠隨方捍禦蜀以安全累遷永興路經略安撫使後拜檢校少保樞密院都統制屯金州卒諡恭毅劉錡德順軍人瀘州節度仲式第九子性慷慨深毅美儀狀善射高宗初爲隴右都護與夏人戰屢勝紹興十年充東京副留守將駐汴金兵圍順昌錡邀擊大敗之又以計令金人終夜自戰積屍盈野後烏珠自來錡又大破之死者萬數累加太尉爲江淮浙西制置使卒諡武穆烏珠舊作兀术今改吳玠德順軍隴干人徙永洛城少沈毅有志節知兵善騎射建炎初以戰功累遷涇原路副總管徙秦鳳張浚合五路兵與金人戰大潰玠收散卒保和尚原烏珠合諸道兵十餘萬來攻玠大敗之四年敵復大入攻仙人關玠又敗之金兵自是不敢動累遷四川宣撫使卒贈少師諡武安玠善讀史凡往事可師者錄置左右用兵本孫吳務遠略不求近利故能保必勝御下嚴而有恩故士樂爲之死金人一意睨蜀玠身當其衝西人至今思之淳熙中追封涪王吳璘玠弟從玠攻戰積功至閤門宣贊舍人紹興元年遷統制和尚原軍馬烏珠大入與兄玠以死守之金兵十萬至仙人關下璘血戰連日金兵大敗自是不敢窺蜀累遷秦鳳路經略安撫使厯知熙秦二州節制陜西軍馬安撫利州路四川宣撫使孝宗時拜太傅封新樂安郡王卒追封信王子挺累從征伐有父風官至西路安撫使加太尉卒贈少師曲端鎭戎人父渙任左班殿􅀡戰死端警敏知書善屬文長於兵略厯涇原路將夏人入寇力戰敗之金兵攻陜西端治兵涇原招流民潰卒道不拾遺張浚宣撫川陜承制拜端宣州觀察使知渭州後浚畏端難制下恭州獄死士大夫惜之明陳敏華亭人宣德時為茂州知州遭喪去官諸長官司及番民請留任正統中進成都府同知視茂州事尋加右參議景泰初進右參政仍視州事在州二十餘年威信大行衞青華亭人有孝行洪武中起軍伍為薊州衞百户從燕兵積功至濟南衞指揮使改山東備倭永樂十八年蒲臺妖婦唐賽兒反攻安邱青馳救大敗其衆賊遂滅進山東都指揮使英宗立進都督僉事次子潁正統初襲濟南衞指揮使土木變作奉詔入衞累進都督同知天順元年以奪門功封宣城伯予世劵尋充總兵官鎭甘肅卒贈侯元孫時春崇禎時掌後府事京師陷闔門十七人皆赴井死楊諶華亭人有謀略善騎射永樂閒舉於鄉正統閒爲工部郎中寕德等縣礦賊反官軍失利英宗命諶討之諶宣布恩意招徠王孟等千一百四十九戸渠帥崇悅不肯降諶率衆􅀡抵其寨悉擒之俘獲婦女財貨不可勝計令曰敢私者斬散遣婦女餘悉籍奏詔嘉之遷本部侍郎王續宗靜寕州人善騎射授羅山縣主簿正德七年流賊大至攻之不能下都御史彭澤檄將民兵數千㑹􅁹連戰皆捷復與信陽衞指揮沈鏜合兵追賊至牢山鏜先遁賊衆乘之續宗率十餘騎格鬬殺數十人復挺身深入血戰不支賊誘之降叱曰吾奉命􅁹賊肯從狗彘同生耶遂被殺事聞贈羅山知縣建祠祀之官其子趙時春平涼人性慷慨善騎射嘉靖五年㑹試第一選庶吉士厯兵部主事時都御史汪鋐進甘露副都御史徐讚等進瑞麥時春疏劾其罔上要君復陳當今之務最大者四最急者三帝怒下獄除名後復起編修兼司經局校書與羅洪先等請東宮受朝賀復黜為民尋以知兵起兵部主事贊理京營務統民兵訓練累擢僉都御史巡撫山西本朝慕天顏靜寕州人順治進士知錢塘縣厯興化府知府興泉道遷江蘇布政使條陳八事多切時政康熙十五年擢江蘇巡撫大興水利請免荒田賦額二百餘萬皆議行坐事去官後起湖北巡撫遷漕運總督康熙四十七年入祀賢良祠馬從龍固原州人性孝友以禮讓化鄉黨官工部屯田司主事康熙年閒入祀鄉賢祠陳蕣固原州人十世同居乾隆五十四年旌聖製詩章襃寵並賜聚順延祺扁額又同州孝子姫漢文耆民海伏棠五世同堂並嘉慶年閒旌汝謐平涼縣人嘉慶三年以孝旌流寓明河西傭不知何許人聞燕兵入京走至金城行乞市中邊地極寒身常衣葛明年過河西依莊浪豪魯家為傭力作倦時自吟哦或夜聞其􅂘泣聲永樂中有留都官至識傭欲與語傭走避南山中留都官去乃還在莊浪數年病死列女漢皇甫規妻安定人不知何氏女善屬文能草書時為規答書記規卒董卓欲聘之妻詣卓門自陳辭甚酸倉卓使侍者拔刀圍之妻知不免罵曰君羌胡之種毒害天下猶未足耶妾之光人清德奕世皇甫氏文武上才為漢忠臣君其趨使走吏敢欲行非禮於爾君夫人耶卓乃引車庭中以其頭懸軛鞭扑交下妻謂持杖者曰速盡為惠遂死車下後人圖其像號曰禮宗明甘忠妾彭氏平涼衞人忠為指揮僉事正統八年忠死氏哀戚不絶自縊於室事聞旌表趙廷璧妻彭氏平涼人年二十三夫亡子雲漢稍長亦客死氏撫幼孫守敗屋年八十餘飢餓而死梁思聰妻張氏平涼人氏年二十一夫亡家極貧二子俱幼女紅自給苦節五十年萬厯中旌表張化龍妻謝氏平涼人夫痼疾氏侍湯餌惟謹夫死三日自縊於柩前又同邑朱朗釿妻孫氏夫亡遺子託翁姑七日不食未死以刀自剄朱復初妻張氏平涼人夫亡守節撫子景李自成陷平涼氏恐見逼投井死子亦從死楊氏女平涼人字孝姊崇禎末避賊匿薔薇叢中以泥塗面賊搜得脅之行大罵不從遂被殺薛銓妻閻氏華亭人夫亡守節撫􅀌成立又同縣柴安慶妻李氏辛永康妻劉氏俱􅀌貧守節死張經妻劉氏華亭人正德十年寇至被掠氏及女春姐咸罵賊死馬選魁妻陳氏華亭人崇禎七年夫以縣令入京謁選氏聞賊警攜幼子與侍兒匿山中賊索急氏知不免乃以子付侍兒藏短刃出紿賊若欲吾從幸勿傷吾子賊許之縱侍兒去氏從至蕭氏莊度侍兒去遠即瞋目大罵持刀自剄死又同縣紀言妻李氏寇入其家欲汚之李紿賊稍近以刀刺殺之俄數賊入殺氏碎其屍石起鳳妻趙氏流賊陷城恐受辱自縊死王氏女華亭人甫筓寇陷城執之女大罵不絶賊怒加箠楚罵益属以首觸石尋見殺同時有潘氏女亦投井死馮宣妻趙氏固原人夫亡守節又同州趙欽妻葉氏周繼妻張氏徐效妻張氏均夫亡守節彭珏妻楊氏固原衞人夫亡守節又同衞黃淮妻夏氏梁輔妻王氏陳琮妻郭氏翟元妻白氏俱夫亡守節李子友妻温氏固原人子友卒氏以死殉天啓中旌表又同州景可樂妻李氏夫亡以哀毀死單養棟妾趙氏韓􅂎聘妻徐氏俱夫亡殉節馬應麟妻婁氏靜寕人夫亡守節撫􅀌成立同州周塘妻沐氏張琔妻陳氏方向妻唐氏俱夫亡守節曹氏女靜寕人曹福女許字王守正未嫁而夫死懼再婚不食死司恩妻陳氏静寕人事翁姑以孝聞恩父正繫獄氏􅀒米詣府採薪拾菜以養三年無缺獄具將決氏訴於大府願以身代哀號懇至得從減釋歸正謂人曰吾三子不如一婦能生我老無以報但祝天願多生子孫如其孝後氏果舉五子皆以孝稱又同州吳應正妻党氏爲女時父病目氏割股以進父目果愈人以爲至孝所感云李淳妻王氏靜寕人崇禎七年寇亂被執氏憤罵不從睨其旁有井即奮身躍入賊怒曳出支解之又同州邵騰鳳妻霍氏亦被掠以頭觸石死何自新妻仇氏賊至自縊賈德友妻陳氏寇掠罵賊剖腹死齊廷珪妻張氏隆德人夫亡氏年十九一子在襁褓中撫􅀌成立守節終身又同縣楊文奎妾劉氏齊恩妾張氏剡英妻王氏劉鉞妻靳氏劉棟妻辛氏趙應科妻范氏董三秦妻于氏許登海妻張氏閻榮妻董氏雍學易妻孫氏王信妻董氏俱夫亡守節李思芳妻董氏隆德人夫亡不食死又同縣李成梁妻閣氏閻汝化妻王氏俱夫亡哀毀死杜老女隆德人杜曰山女曰山老無子家甚貧同縣民梁宰求聘爲妻父將許之女曰女去父母何依遂自誓不嫁拮据刀作以養父母父卒營葬畢復竭力養母越十八年母卒既葬女遂曰吾已許父母不嫁矣今復嫁是渝言也且父母墳墓何託乎遂不嫁煢苦自守年七十餘卒鄉人感其孝呼曰杜老女王厯妻董氏隆德人崇禎七年寇陷城氏率二女赴池溺死三日屍浮岀顔色如生又同縣段氏女字同里李氏崇禎八年爲賊所執逼之囓其左臂女力拒賊殺之時年十六又雍氏女亦被賊執不從見殺又方大儒妻雍氏夫亡守節賊至自縊張士俊妻齊氏從夫攜三子赴井死杜汝楫妻朱氏莊浪人夫亡守節撫􅀌成立又同縣楊文英妻岳氏􅀩冠妻蔣氏俱夫亡撫􅀌守節杜繼美妻崔氏莊浪人崇禎末寇入其莊舍欲犯之氏抗罵不屈遂遇害又同縣王篤妻失姓氏賊欲汚之氏假事誑賊投崖死本朝紀成妻閻氏平涼人甫嫁為賊所逼投崖挂樹枝賊退家人援之三日復甦年二十一夫殁遺腹生子撫􅀌守節終身又同縣祁化普妻崔氏夫亡守節文理妻王氏固原人理以守備從征巴里坤病卒氏俟喪歸自縊以殉又同州楊嘉玥妻柳氏黎天祿妻吳氏俱殉夫死又吳承恩妻韓氏姑病刲股和藥以進劉琯妻夏氏靜寕人夫亡無子氏年二十六歸母家守節㑹父兄繼逝養母撫姪終身無二志王傅妻王氏靜寕人與同州常能妻張氏俱避賊自縊死又張標妻楊氏自剄死張爾紳妻齊氏隆德人又同縣杜偉妻程氏莊浪楊盛業妻李氏俱夫亡撫􅀌守節姚永福聘妻何氏平涼人為强暴所逼力拒見殺康熙年閒旌王宏綱妻柴氏固原人夫亡孝養翁姑撫􅀌成立又同州趙國凝妻尚氏節孝撫孤至九十三􅀊俱康熙年閒旌王應亨妻沈氏平涼人應亨逺出有郭鍾者排入其室戲誘之氏正色叱出遂羞忿自縊雍正年閒旌馬志啓妻李氏固原人夫亡守節又同州陳段氏守正􅀍戕俱雍正年閒旌制恭默妻楊氏平涼人夫亡守節又同縣節婦趙仕捷妻謝氏陳志妻王氏連