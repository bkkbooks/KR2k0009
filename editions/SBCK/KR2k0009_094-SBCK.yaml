front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_094-1a}
body:
  text: 鞏昌府三名宦漢陳立臨邛人天水太守勸民農桑為天下最樊煜新野人建武中拜天水太守政嚴猛善惡立㫁吏人及羌胡畏之道不拾遺行旅至夜聚衣裝道傍曰以付樊公馬棱茂陵人永元二年轉漢陽太守有威嚴稱趙博永初五年為漢陽太守漢陽人杜琦王信叛與先零諸種羌合攻陷上邽城博遣故吏杜習刺殺琦龎參緱氏人永初中拜漢陽太守抑强扶弱以惠政得民橋元睢陽人桓帝時為漢陽太守上邽令皇甫禎有贓罪元收拷髠笞死於冀市一境皆震种暠洛陽人桓帝時為漢陽太守化行羌戎禁止侵畧傅燮靈州人靈帝時為漢陽太守叛羌懷其恩化並來降附乃廣開屯田列置四十餘營金城賊王國韓遂等進圍漢陽城中兵少糧盡燮猶固守時北胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里燮子幹年十三從在官舍知燮性剛有高義恐不能屈志以免勸燮棄郡而歸燮慨然歎曰汝知吾必死耶蓋聖達節次守節世亂不能養浩然之志食祿又欲避其難乎吾行何之必死於此遂麾左右進兵臨陣戰殁蓋勲燉煌廣至人光和中爲漢陽長史時武威太守倚勢貪橫從事蘇正和案致其罪涼州刺史梁鵠畏懼貴戚欲殺正和訪於勲勲素與正和有讐或勸勲可因此報隙勲曰不可謀事殺良非忠也乘人之危非仁也鵠從其言正和得免中平初叛羌圍校尉夏育於畜官勲以兵救育爲賊所執羌戎服其義勇不敢加害送還漢陽後刺史楊雍卽表勲領漢陽太守時人饑相食勲調穀廪之先出家糧以率泉存活者千餘人三國魏梁習柘人爲漳長有治名南北朝周元定洛陽人明帝初拜岷州刺史威恩兼濟甚得羌豪心先時生羌據險不賓者至是並出山谷從征賦焉及代還羌豪等咸戀慕之劉璠沛人明帝時左遷同和郡守璠善於撫御涖職未幾生羌降附者五百餘家秋毫無所取妻子並隨羌俗食麥衣皮始終不改洮陽洪和二郡羌常越境詣璠訟理于翼洛陽人為渭州刺史翼兄實先涖此州頗有惠政翼又推誠布信事存寬簡夷夏感悦比之大小馮君豆盧勣徒河人武帝時拜渭州刺史甚有惠政華夷悦服大致祥瑞鳥䑕山俗呼為高武隴絶壁千尋由來乏水諸羌苦之勣馬足所踐飛泉湧出又有白鳥翔至廳前民為之謡曰我有丹陽山出玉漿濟我民夷神鳥來翔因號其泉曰玉漿泉隋辛公義狄道人開皇中為岷州刺史土俗畏病一人有疾卽合家避之父子夫妻不相看養由是病者多死公義欲變其俗因分遣官人巡檢部内凡有疾病皆以牀輿來安置廳事公義親設一榻獨坐其間市藥迎醫療之躬勸飲食於是悉差乃召其親戚諭之諸病家子孫慚謝而去此風遂革合境呼為慈母皮子信為洮州刺史開皇三年吐谷渾寇臨洮信死之高勱蓚人開皇中拜洮州刺史下車大崇威惠民夷悦附生羌相率詣府稱謁豪猾屏跡路不拾遺慕容三藏燕人開皇十五年授曡州總管黨項羌時有反叛三藏隨便討平之部内夷夏咸得安輯宋高遵裕蒙城人神宗初主管西路羌部駐古渭砦分所部羌兵為三寺教以軍法尋以古渭為通遠軍命知軍事持附順羌部圖籍及繪青唐武勝形勢入獻俾歸治師帥至野人關􅆧人旅拒引親兵一鼓破之進營武勝城下羌衆遁去遂據其城詔建為鎭洮軍又命知軍事從王韶取岷州下之令士衆曰生獲老幼與得級同全活數萬加岷州刺史羌圍河岷二州岷城軍缺守者恐遵裕登西門命將縱擊别選精騎由南門噪而出合擊之羌敗走時朝廷以岷城遠難守議棄之詔至賊巳潰矣以功進􅇛練使張守約濮州人神宗時鬼章圍岷州守約以熙河鈐轄提敢死士鳴鼓張幟高山上賊驚顧而遁遂知岷州降其首領千七百人种諤洛陽人熙寕中知岷州董氊將鬼章聚兵於洮岷新羌多叛諤討襲誅之又從李憲出塞收洮州下逋宗講珠東宜諸城斬首七千級种誼洛陽人元祐初知岷州􅀑章誘殺景思立後益兵入寇結屬羌為應誼與姚兕合兵出討羌迎戰擊走之追奔至洮州誼急進攻鬼章就執姚雄五原人知岷州紹聖中渭帥章楶城平夏雄部熙河兵䇿援夏人傾國來爭雄大破之斬首千餘俘虜數萬諸道始得并力城成擢秦州刺史王淵熙州人知鞏州寕逺砦諸羌入寇經畧司討之表淵總領岷山番兵將興師城澤州羌衆來爭淵奮擊大破之何灌祥符人徽宗時知岷州引邈川水漑閒田千頃湟人號廣利渠呉玠隴干人任川陜宣撫事智勇兼全金人畏之卒諡武安晉封涪王呉璘玠弟秦州防禦使以防金卒贈太師追封信王王彥上黨人宣撫川陜郭振掠西和彥力拒之强霓為環慶路總制兼沿邊安撫使金兵掠擾堅守􅀌城抗節不屈呉挺璘子為檢校少保逢西和􅀊饑分軍儲賑恤全活無數詔加太尉李好義下邽人為興州正將因金人據西和率衆攻城親犯矢石金奔遁軍民歡呼迎拜後以中軍統制知西和州卒於官贈檢校少保諡忠壯趙彥呐彭州人嘉定十二年􅀜外西和州新被兵制使安丙檄使經理金人再至戰卻之在州五年得軍民心陳寅紹定初知西和州元兵入境寅自執旗鼓激勵將士迎戰兵退制置使以寅功徧告列郡元兵增至數十萬圍城寅率兵民晝夜苦戰援兵不至城遂陷朝服登戰樓望闕焚香號泣再拜伏劎而死賓客同死者二十八人贈右文殿修撰諡襄節賈子坤懷安軍人理宗時為西和州推官與郡守陳寅誓死守城城陷子坤朝服與其家十二口死之贈承議郎封其父崧承務郎官其子仲武宣教郎金喀爾庫守中咸平人大安二年遷通遠軍節度使至寕未移彰德軍未行夏兵數萬入鞏州守中乘城備守兵少不能支城陷官吏盡降守中獨不屈夏人壯之且誘且脅守中益堅遂載而西至平涼要以招降府人守中佯許至城下卽大呼曰外兵矢盡且遁矣愼勿降夏人交刃殺之喀爾庫守中舊作夾谷守中今改烏庫哩長夀臨洮度府第五將圖們族人興定中為通遠軍節度使夏人攻定西時弟世顯已降夏人夏人執世顯至定西城下謂長夀曰若不速降卽殺汝弟長夀不顧奮戰夏兵退世顯旣降二子當緣坐宣宗嘉長夀功釋之未幾夏人復至攻甚急長夀乘城拒戰矢石如雨夏兵死者數千被傷者衆乃解去烏庫哩長夀舊作烏古論長夀圖們舊作突門今並改完顏哈達正大二年駐兵陜西鞏州田瑞反哈達討之諸軍進攻哈達移文諭之曰罪止田瑞一身餘無所問不數日瑞弟濟殺瑞以降哈達如約撫定一州民賴以安完顏哈達舊作完顏合達今改完顏仲德海蘭路人正大六年移知鞏昌府兼行總帥府事時陜西諸軍已殘仲徳招集散亡得軍數萬依山為柵屯田積穀人多歸焉一方獨得小康號令明肅路不拾遺海蘭路舊作合懶路今改明于光都昌人洪武初鎭鞏昌烘郭襲蘭州光以兵赴援至馬蘭灘戰敗執徇城下光大呼曰我不幸被執公等堅守大軍旦夕至矣遂被殺贈懷遠將軍祀功臣廟烘郭譯見前孫亶江陰人永樂中知鞏昌府均徭省刑民懷其惠遭喪將歸民詣闕乞留奪情還任後兩遇考滿皆進秩視事李達定遠人永樂初以都指揮僉事鎭洮州厯四十年為番漢所畏進都督僉事正統中致仕郭完宣德中知㑹寕縣廉潔正􅀡以被誣就逮民伏闕乞還許之戴浩鄞人正統中知鞏昌府嵗大祲卽發邊儲三萬七千石賑貸上疏待罪曰願以臣一人之命易千萬人之命詔原浩而令民償所貸上官檄浩趣之浩曰瘡痍未復而速征不如無賑約三􅀊遞償關山孔道寇時劫掠商旅浩設方畧殲之道路無虞民為之歌曰君侯守邊惠政無前我行我道蕩蕩便便朱廷鄣晉府宗室崇禎中為鞏昌府通判暑秦州事為人廉􅀡政尚嚴十六年流賊陷秦州擁見賊帥使跪叱曰吾天朝宗室頭可㫁斷不可屈大呼曰今日惟求一死神色自若遂見殺應昌士臨海人崇禎末知安定縣流賊陷城昌士不屈為賊磔死郝敏夀陽人由舉人知西和縣公慎廉明勤於撫字本朝杜懋哲􅀡隸人順治四年官岷州同知立法嚴整諸􅁦悉除囘賊作亂執懋哲欲降之懋哲罵不絶口被害同時有道標中軍守備劉繼祖與賊巷戰死龔佳育仁和人康熙二年授安定知縣縣自明末兵燹後流移未復民多逋賦佳有盡以所入耗羡代之前令被劾者皆得釋歸聽斷明決獄無繫囚初上官胥役持檄到縣多索民財執而杖之無敢干法者温模長樂人通渭縣典史乾隆四十九年逆冋田王作亂城陷死之事聞照知縣例議卹加道銜人物漢任棠漢陽人有奇節隱居教授龎參爲太守先往候之棠不與言但以薤一大本水一盂置户屏前自抱孫兒伏於户下主簿白以爲倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊强宗也抱兒當户欲吾開門恤􅀌也歎息而還三國蜀姜維冀縣人建興六年詣諸葛亮亮辟爲倉曹掾加奉義將軍封當陽亭侯亮與蔣琬書曰姜伯約忠勤時事思慮精密其人涼州上士也亮卒遷衞將軍與費禕共錄尚書事維自以練西方風俗兼􅀒其才勇每欲興軍大舉費禕常裁制不從禕卒加維督中外軍事屢出隴西狄道破魏兵於洮西進爲大將軍宦官黃皓弄權維疑懼往沓中不復還成都魏鍾㑹兵至漢夀維守劒閣拒之後並降於鄧艾敕維詣會於涪維密耒後主圖殺會以復蜀土爲魏兵所殺魏龎徳南安貆道人初平中從馬騰擊氐羌數有功遷校尉建安中拒袁譚將於平陽大破之拜中郎將毎戰常陷陣卻敵勇冠騰軍太祖定漢中素聞其驍勇拜立義將軍封關門亭侯後敗於樊下不屈而死賜諡壯侯薛夏天水人博學有才黃初中爲袐書丞帝每與夏推論書傳未嘗不終日呼薛君而不名楊阜冀縣人初爲涼州刺史韋康别駕太祖追馬超至安定將東還阜說曰超有信布之勇甚得羌胡心若大軍還不嚴爲之備隴上郡縣非國家有也超果率諸戎擊隴上郡縣攻降冀城殺刺史太守阜與外兄姜敘等合謀擊超超遂南奔張魯隴右平以功賜爵關内侯明帝時累遷將作大匠每朝廷㑹議阜嘗侃然以天下爲已任數諫爭不聽乃屢乞遜位及卒家無餘財趙昂冀縣人馬超攻冀城昂與尹奉戮力討超功聞朝廷遷益州刺史晉朱沖南安人少有至行閑靜寡欲好學而貧常以耕藝爲事咸寕四年詔補博士稱疾不應每聞徴書至輒逃入深山時人以爲梁管之流沖居近夷俗以禮讓爲訓邑里化之路不拾遺猛獸皆不爲害南北朝魏楊機冀縣人祖伏恩徙居洛陽因家焉機少有志節世宗詔選清􅀡之士機見舉為京北王愉國中尉愉甚敬憚之厯洛陽令司州别駕清河内史河北太守並有能名永熙中除度支尚書方􅀡之心久而彌厲奉公正己為時所稱家貧無馬多乘小犢車時論許其清白趙善南安人少好學涉獵經史初為爾朱天光長史孝武時厯位尚書左右僕射性温恭有器局雖位居端右而愈自謙退時人稱其有公輔量從戰邙山為敵所獲卒於東魏周趙㫤南安人以材力聞魏孝昌中拜都督太祖擢為相府典籖積功封章武縣伯累驃騎大將軍開府儀同三司時氐羌數反㫤悉平之世宗錄前後功進爵長道郡公賜姓字文氏唐趙憬隴西人志行峻潔不自衒賈寶應中天下薦饑憬褐衣上疏請殺禮從儉李泌薦之對殿中占奏明辨通古今拜給事中貞元中累進中書侍郎同中書門下平章事憬精治道常以國本在選賢節用薄賦寬刑懇懇為帝言之又陳前世損益當時之變獻審官六議帝皆然之輔政五年卒諡貞憲李晟臨潭人幼􅀌奉母孝年十八事王忠嗣以功累遷試太常卿大厯初李抱玉署晟右將軍吐蕃寇靈州授以五千兵擊之晟曰以泉則不足以謀則多以千人往執其帥慕容谷鍾虜乃解建中二年為神䇿先鋒圍朱滔將鄭景濟於清范決水灌之又擊破田悦王武俊引兵戰白樓㑹帝幸奉天召拜神䇿行營節度使與朔方李懷光聯壘屯咸陽懷光陰通朱泚晟徙屯東渭橋繕甲兵治陴隍以圖恢復諸將皆從晟懷光始懼奔河中帝加晟兵馬副元帥遂自東渭橋薄都城大破賊將張廷芝等來勝入光泰門賊驚潰朱泚率殘兵西走晟遣吏分慰居人秋毫無擾露布至梁德宗泣曰天生李晟以為社稷非為朕也拜司徒兼中書令尋拜鳳翔隴右涇原節度使行營副元帥封西平郡王帝後惑張廷賞之譖進太尉中書令罷其兵貞元九年薨贈太師諡忠武李憲晟子性仁孝長喜儒以禮法自矜制太和初遷嶺南節度使所厯皆以吏能顯李愬晟子有籌畧善騎射幼喪母為庶母王夫人所鞠王卒晟以非嫡敕諸子服緦愬獨號慟不忍晟乃許服縗晟薨與憲廬墓側厯坊晉二州刺史進詹事憲宗討呉元濟以愬為隨唐鄧節度使入蔡擒元濟以功進檢校尚書左僕射山南東道節度使封涼國公李師道反詔愬帥武寕軍與賊戰凡十一遇擒其隊帥五十俘馘萬計淄青平進同中書門下平章事徙帥魏博長慶初幽鎭亂殺田宏正愬素服令軍勒兵以俟㑹疾以太子少保還東都卒贈太尉諡曰武宋王君萬寕遠人以殿侍為秦鳳指揮使斬别羌新羅結及藥厮逋復破北關南市功最多累官客省使李彥仙鞏州人有大志所交皆豪俠士每出必陰察山川形勢常為种師中部曲入雲中獲首級補校尉金兵至郡縣募兵勤王遂率士應募補承節郎以兵事見陜州守臣李彌大與語壯之留為裨將戍殽澠間後復陜州卽命知陜州兼安撫使金再攻陜城陷投河死贈彰武軍節度使諡忠威官其子彥仙以信義治陜犯令者雖貴不貸與下同甘苦士樂為用關東皆下陜獨存以􅀌城扼其衝再踰年大小二百戰金兵不得西城陷民無二心婦女亦升屋以瓦擲敵哭李觀察不絶王德通遠軍熟羊砦人以武勇應募隸熙帥姚古嘗從十六騎入隆德府治執偽守姚太師古械姚獻於朝時呼為王夜义從劉光世平濟南寇李昱池陽寇張遇敗李成斬苗瑀又平信州賊王念經秀州賊邰青紹興中累遷左護軍都統制隸張俊解潁昌圍取宿州乘勝入亳州以功封隴西郡侯金兵自合淝入德追至柘臯與戰敵大敗劉琦曰昔聞公威畧如神今果見之請以兄禮事卒贈少傅二子珙順亦以驍勇聞馬堃宕昌人家世以忠勇為名將堃與六郡鎭撫使守咸淳府元將楊文安與堃同里閈諭使降元堃不從文安乃列柵攻城潛遣勇士躡雲梯宵登斬關納外兵堃悉力巷戰兵敗力屈而死馬墍堃弟咸淳中知欽州徙邕州撫諸蠻及治關隘皆有條理邊陲晏然宋亡墍因留静江總屯戌諸軍守城元將阿里哈以兵夾攻兵敗使人招降墍發弩射之攻三月前後百餘戰城破墍率死七巷戰被執殺之斷其首猶握拳起立踰時始仆阿里哈舊作阿里海牙今改元汪世顯鞏昌鹽川人仕金屢立戰功官至鎭遠軍鞏昌便宜總帥金亡世顯獨守城皇子闊端至始降從征蜀有功拜總帥泰鞏兵備僉事陳故賊衝􅀊被蹂躪永傑繕城修備李自成賊數十萬衆來攻遣使説降斬其頭懸城上賊怒攻破之永傑格殺數賊身中數刀大罵而死贈光祿卿本朝王雄寕遠人順治五年河西囘變征􅁹有㓛授遊擊領兵征川擒郝揺旗恢復武隆等八州縣累官至西寕總兵孟家棟隴西人順治初授萊州通判始入境憩於新興鎭有賊數百騎􅀡逼旅次居民各散家棟獨坐從容語賊曰我若公祖官當撫汝若果改前吾為汝謀不至汝失所賊皆下馬羅拜去及抵任賊果率衆來歸家棟為白於憲司安插得所自是境無盜嗣值軍需旁午家棟調劑緩急民不至困軍需不乏尋晉開封府同知値兵燹後招徠撫字民有生聚之樂會河决金龍家棟寢食河干與役者同勞苦河工始成升知河間府汰猾吏革驛􅁦調和兵民修葺學校去官之日士民泣送年八十六終黃虞再伏羌人任江西奉新令時吏骫民疲積負甚多冊籍混淆前令坐累者數人虞再密訪得積胥某俾鍵户造籍以報曰成則賞否則杖死胥惴惴奉酉明經任巴州牧治續大著時賊擾保寕紳為主帥畫䇿曰盍以輕騎三千分三隊進以一隊截其歸路一隊分布險道一隊􅀡搗賊巢主帥從其計賊潰事聞擢兵備道駐綿州踰年賊圍綿中軍某微露勸降意紳大怒曰今日之事惟有退寇全城以告無罪否則當以死繼之敢言降者斬中軍乘夜入帳中斬紳首降於賊魏作幹伏羌監生幼失怙恃孝事祖母乾隆三十年地震作幹棄其家室負祖母而逃及歸村鄰廬舍多傾圯惟作幹之屋如故妻子亦無恙人咸以為孝行所感云又同縣監生張慕載生員宋孔昭事母以孝稱俱乾隆年間旌表楊琯㑹寕生員與同縣監生董開疆楊珣俱以孝稱乾隆年間旌又舉人呉錫綬貢生董聯壁俱孝友性成嘉慶年間先後旌表李南暉通渭人任四川威遠令乾隆四十九年逆囘滋擾禦賊死贈太僕寺卿入祀鄉賢祠李思沆通渭貢生與同邑監生師沆於乾隆四十九年因囘變隨叔父李南暉禦賊遇害五十一年旌陳國華通渭人職州同嘉慶四年賊入室與子步雲步瀛步霄步漢姪玉麟姪女珍兒守父柩不去遇害嘉慶十二年旌張學載通渭武生嘉慶四年聞賊匪至與弟武生慕載率莊人潛於夾巷内置坑藏弩箭斃賊賊不敢進越莊後牆入縛其父張杰學載同弟與賊鬭奪父囘令弟􅀒以逃自以死禦賊力竭被執賊叱使跪學載以足蹴賊面且罵賊賊大怒以滚水灌其頂罵益甚賊拨舌剜睛碎其屍而去嘉慶十二年旌又監生閻俊監生閻晫及其子光祖罵賊不屈死武生李萃附生楊被春増生楊二雅里民趙前俱賊至不屈被害嘉慶十二年旌入本籍忠義孝弟祠列女三國魏姜敘母楊氏天水人建安中馬超攻冀害涼州刺史韋康敘為撫夷將軍擁兵屯厯敘姑子楊阜至厯候敘説康被害及冀中之難敘母曰咄伯奕韋使君遇難亦汝之負汝無顧我但當速發因勅叙從阜議定與