body:
  text: 延平府在福建省西三百六十里東西距二百七十五里南北距三百里東至建寕府建安縣界五十里西至汀州府清流縣界二百二十五里南至福州府古田縣界一百二十里北至邵武府邵武縣界一百八十里東南至福州府古田縣界二百二十里西南至永春州德化縣界三百九十里東北至建寕府甌寕縣界一百三十里西北至汀州府歸化縣界二百六十里自府治至京師五千二百九十三里分野天文牽牛須女分野星紀之次建置沿革禹貢􅀭州之域周爲七閩地後屬越秦爲閩中郡地漢爲㑹稽郡冶縣地後漢爲㑹稽南部都尉地建安初分置南平縣三國呉屬建安郡晉太元四年改曰延平仍屬建安郡宋省自齊至隋皆因之唐武德三年置延平軍上元元年改劒州五代晉開運初王延政改名鐔州南唐復以爲延平軍尋仍改劒州宋太平興國四年更名南劒州屬福建路元至元十五年升爲南劒路大德六年改曰延平路屬福建道宣慰司明洪武元年改延平府屬福建布政使司本朝因之屬福建省領縣六舊領縣七雍正十二年割大田縣屬永春直隸州南平縣附郭東西距一百六十里南北距一百六十里東至福州府古田縣界一百里西至順昌縣界六十里南至尤溪縣界六十里北至建寕府甌寕縣界一百里東南至古田縣治二百二十里西南至沙縣界六十里東北至建寕府建安縣治一百三十里西北至建寕府甌寕縣界一百里漢冶縣地後漢建安初置南平縣屬㑹稽南部三國呉屬建安郡晉太元四年改曰延平宋泰始四年省唐武德三年置延平軍後改為永平鎮五代時閩王延政以鎮置龍津縣為鐔州治南唐保大四年州廢復置延平軍六年改置劒浦縣為劒州治宋為南劒州治元大徳初復曰南平為延平路治明為延平府治本朝因之順昌縣在府西少北一百二十里東西距一百里南北距一百二十里東至南平縣界五十里西至將樂縣界五十里南至沙縣界二十里北至建寕府甌寕縣界一百里東南至沙縣界二十里西南至沙縣治一百里東北至甌寕縣治二百十里西北至邵武府邵武縣治一百八十里漢冶縣地後漢末為建安縣地三國呉以後為將樂縣地唐貞觀三年置將水場後改將水鎮屬建州五代時南唐置順昌縣屬劒州宋屬南劒州元屬延平路明屬延平府本朝因之將樂縣在府西二百二十里東西距一百五十五里南北距一百四十里東至順昌縣界五十五里西至邵武府泰寕縣界一百里南至沙縣界四十里北至邵武府邵武縣界一百里東南至沙縣治一百二十里西南至汀州府歸化縣治一百三十里東北至邵武縣界一百二十里西北至邵武縣治一百六十里漢冶縣地後漢末為建安縣地三國呉永安三年分置將樂縣屬建安郡晉及宋齊以後因之隋開皇十二年省入邵武縣唐武徳中復置屬建州七年省􅂷拱四年又析邵武及故綏城縣地置仍屬建州元和三年省五年復置五代因之宋屬南劒州元屬延平路明屬延平府本朝因之沙縣在府西南一百二十里東西距一百五十里南北距一百四十里東至南平縣界七十里西至永安縣界八十里南至尤溪縣界六十里北至順昌縣界八十里東南至尤溪縣治一百四十里西南至永安縣治一百六十里東北至順昌縣治一百里西北至將樂縣治一百二十里漢冶縣地晉延平縣地劉宋元嘉中分置沙村縣屬建安郡齊以後因之隋開皇中改曰沙縣尋廢唐武徳四年復置屬劒州後省入建安永徽六年復置大厯十二年割屬汀州五代南唐保大六年還屬劒州宋屬南劒州元屬延平路明屬延平府本朝因之尤溪縣在府南一百六十里東西距二百三十里南北距一百九十里東至福州府閩清縣界一百里西至永春州大田縣界一百三十里南至永春州徳化縣界一百三十里北至沙縣界六十里東南至福州府永福縣界一百七十里西南至德化縣治二百二十里東北至南平縣界八十里西北至沙縣治一百四十里漢冶縣地晉延平縣地劉宋以後為沙村縣地唐開元二十五年置尤溪縣屬福州五代南唐保大六年割屬劒州宋屬南劒州元屬延平路明屬延平府本朝因之永安縣在府西南三百里東西距一百八十里南北距一百五十里東至永春州大田縣界一百里西至汀州府清流縣界八十里南至龍巖州寕洋縣界六十里北至沙縣界九十里東南至大田縣治一百七十里西南至汀州府連城縣治二百里東北至沙縣治一百六十里西北至汀州府歸化縣界一百里漢冶縣地晉延平縣地劉宋以後為沙村縣地唐以後為沙尤溪二縣地明景泰三年析置永安縣屬延平府本朝因之形勢􅀒山阻水為七閩咽喉宋延平郡志劒溪環其左樵川帶其右宋余良弼雙溪樓記山川清明偉麗為東南最宋楊中立乾明修造記崇山峻嶺為郛郭驚湍激流為溝池楊中立資聖院記占溪山之雄當水陸之㑹宋黄裳雙溪閣跋語風俗民儉嗇而尚氣義質直而不為姦詐諸儒講明道義遺風餘教猶未泯家樂教子朝誦暮絃宋延平郡志勤於耕耨婦女雖至貧紡績不出户民重遠出無商賈之贏俗頗紛華少千金之積府志城池延平府城周九里一百八十步門八東南臨建溪西臨樵川西北臨山澗東北環高岡宋時建十八年修本朝乾隆五南平縣附郭順昌縣城周四里三百二十六步門五明正德元年建本朝順治五年修康熙二十年四十五年重修將樂縣城周九里有竒門六元至正四年建本朝雍正六年修沙縣城周六里有竒門五水門四東西門俱臨太史溪明宏治四年建本朝雍正八年修尤溪縣城周八里門六明宏治四年建嘉靖六年改建本朝康熙四十九年修雍正八年重修永安縣城周五里三十步門四􅀒山阻溪獨南門鑿池注水爲濠明正統十四年建本朝雍正六年修學校延平府學在府治東明萬厯四十六年建本朝順治十六年修康熙八年二十二年重修入學額數二十名南平縣學在縣西虎頭山麓明洪武三年建本朝雍正二年修乾隆二年重修入學額數二十名順昌縣學在縣治左明崇禎四年建本朝順治四年修康􅄉二十二年雍正九年乾隆三十一年重修入學額數十五名將樂縣學在縣治東南宋建在卞山之麓明天啟中遷今所本朝順治十三年重建雍正六年修入學額數十五名沙縣學在縣治東宋慶厯間建明嘉靖中改建於福聖寺基萬厯間復還舊址本朝康􅄉十一年修二十二年三十七年重修入學額數十五名尤溪縣學在縣西門璠山之麓宋建在縣城内明萬厯中移建今所本朝康熙十八年修乾隆二十四年重修入學額數十一名永安縣學在縣治東明景泰中建本朝順治初修雍正四年重修入學額數十五名延平書院在南平縣南九峯山麓宋嘉定二年郡守陳宓建祀先儒李侗端平間賜額本朝順治十四年重建道南書院在南平縣北龍山阿明正德間建祀宋儒楊時以羅從彦李侗配亦名道南祠本朝乾隆十一年修龜山書院在將樂縣東北封山之麓一名道南祠宋咸淳二年建賜額本朝順治十三年修鳳岡書院在沙縣南鳳凰山宋淳熙間邑人黄顥建豫章書院在沙縣西洞天巖麓元至正初建祀宋儒羅從彦開山書院在尢溪縣舊學宫前本朝乾隆三十一年建正學書院在尤溪縣畫錦坊本朝康熙四十八年建南溪書院在尤溪縣公山宋鄭義齊故館地朱子生於此嘉熙初建祠以祀咸淳初增置書院於其右徳祐元年賜額明永樂中修戸口原額人丁二十二萬三千七百二十八今滋生男婦大小共八十五萬三千三百四十七名口計二十萬一千四百四十五户又屯民男婦共二百六十名口計八户田賦田地九千八百二十頃九十畝九分六釐有奇額徴地丁正雜銀一十萬八千二百九十四兩五錢七分二釐米一萬五千九百六十八石七斗三升四合八勺屯田二頃九十七畝二分六釐有奇額徴丁糧銀一十九兩六錢一分七釐山川梅山在南平縣城内府志在城東隅以上多梅樹故名龍湖山在南平縣東八十里四山環峙中為平原下有龍湖相近有虎掌山以形似名又有虎掌巖南山在南平縣東二十里宋羅從彦家其下屏山在南平縣東南七十里形如畫屏故名又羣山在縣東南四十里以羣峯競出故名金山在南平縣東南一百里閩志山側有石洞名金鐘相傳昔有仙居之九龍山有二一在南平縣東南一百二十里閩書九峯蜿蜒如龍右有獅子巖巖左有石壁立聳峭曰禪巖石一在順昌縣北六十里九峯山在南平縣南峯巒九疊環繞縈􅅆為府境諸山之寇眞徳秀紀畧云延平據山為州後枕崇阜前挹大溪溪南九峯森羅雄峙天表是也溪源鳳山在南平縣西南十五里上一井泉有龍居焉􅀊旱禱雨輒應金鳳山在南平縣西南二十里山形如鳳高出羣山上有井泉閩書云半據南平半臨沙邑磅礴􅏭嵲數都可見葢一山界於兩縣者也天柱山在南平縣西南五十里屹立凌空如柱又西南有天馬山山勢騰驤形若天馬虎頭山有二一在南平縣西形如虎踞縣學在其下一在沙縣西南七十里閩志一名虎峯高入雲際下視沙城如在履舄蓮花山在南平縣西北六十里又將樂縣東五里將樂縣西百里皆有蓮花山俱以形似名寳雲山在南平縣西北八十里山􅀔秀拔時出雲氣篔簹山在南平縣西北百里多竹故名龍山有二一在南十縣北山勢凌雲長松蓊鬱又名龍騎山一在順昌縣南三里縣志登其巔可盡一邑之勝上有龍頭巖怪石礧砢有泉出石罅間演仙山在南平縣東北寰宇記在州北十里故老相傳云演氏煉丹於此丹竈餘基猶存宋呉致堯紀畧延平號山水佳處衆峯連屬鳳騫鼇峙望之蔚然神刓天盡者演仙也輿地紀勝山東面畧通人跡山中産橘可以就食不可攜出府志演仙水出此山當城北為大河下穿暗竇入城流出劍潭閩書舊名含源山漢梅福時時往來此山方輿勝覽含源山即演仙山在縣東北十里潛􅃀􅀋書山有文峯巖中一石端拱如佛又名石佛山百丈山有二一在南平縣東北六十里有石鼓嶺聳絶方圓凡數丈中心數尺以石叩之其聲如雷方與勝覽在劍浦縣北越王於此建臺榭一在將樂縣西北建安記百丈山有鳥道與江西南豐縣分界上有古蘭若存焉寰宇記在縣北一百八十里其山三面南將樂北邵武西泰寕皆懸巖絶壁有越王較獵臺榭遺址板山在順昌縣東南十里相近又有魚袋山高峯山在順昌縣西南二十五里其峯拔出羣嶺下即交溪又西五里有寳山峭拔奇秀大明山在順昌縣西南三十里􅀌峯特立日升光照其頂故名山左有巖曰白鶴巔有石高丈餘曰石馬相屬者曰金龍山鳳山在順昌縣西二十里五峯疊翠高數百仭景靈山在順昌縣西三十三里與鳳山對峙時有雲霧䝉其頂山左有耳珠巖多生異草上有黄家洞芹山在順昌縣西四十里泉甘木茂多産香芹幹山在順昌縣西五十里周迴二十里巔有石洞可容數百人清泉出焉魚山在順昌縣西北五十里二水夾流山形如魚故名超華山在順昌縣西北六十里周圍甚廣西北接邵武界幽曠處有田園池塘居民數十家中有嶺曰寳嶺時出光焰人以為寳氣山頂有泉出石罅中分為五澗七臺山在順昌縣西北七十里寰字記在縣西四十八里府志山有巨石高數丈空洞可居樹頂皆秃積苔若垂髪徑皆縁山脊行左右無依附每苔厚處若施茵褥明統志高峯峭壁幾至千丈山有微雲即雨人以為侯洪山在順昌縣西北一百五十里􅀔極雄壯華陽山在順昌縣北三十里三峯並列山半有石門高廣數丈中峯頂有烏石巖有水一􅇦旱潦不盈涸名曰仙水壇梅仙山在順昌縣北七十里接甌寕縣界山巔平坦廣袤數里相傳梅福嘗煉丹於此故名有巖曰藥石巖金泉山