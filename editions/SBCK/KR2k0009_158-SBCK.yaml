建州遣葉徹擁衆寇南劍時統制官任士安不肯力戰觷獨率州兵與戰分為數隊命城中殺牛羊豕作肉串仍多具飯將戰則食第一隊遣之入陣次便食第二隊度所遣兵力困即遣往代更迭交戰徹中流矢死衆敗走觷知士安懼無功即函徹首與之州兵皆憤觷曰賊必再至非與大軍合力不能破士安得之大喜未幾徹子引衆聲言復父讐縞素來攻於是士安與州兵夾攻大敗之城賴以全俞偉寕波人元祐中知順昌縣民生子多不舉作戒殺子文召諸郷父老列坐廡下親酌而侑之出其文使歸勸鄉人歳月間活者千計轉運判官曹輔上其事朝廷嘉之就改一官仍令再林用中來掌教事而増其弟子員親率佐吏賓客往臨之因爲陳說聖賢修已治人之學講求義理至當之歸聞者興起鄉豪據險不輸租賦墪爲榜諭即斂手聼命歳大疫多治藥餌遣醫散之村落賴以活者甚衆及代去民像祀之宋南强山東人淳熙間知沙縣專尚德化解官去民立甘棠碑於縣東南强受學於朱子嘗貽之書曰聽道塗士友之言具知執事一意撫摩民不勞苦官不廢事是可尚也余嶸龍游人嘉定間知南劍州治事明決有訟者諭若家人父子嘗以錢贖楊時宅而廩其後於學宫時楊宏中教授南劍州嶸與之相得甚歡陳宓莆田人嘉定中知南劍州時大旱疫蠲逋賦十數萬且弛新輸三之躬率僚吏持錢粟藥餌戸給之創延平書院悉倣白鹿洞之規趙汝造宋宗室嘉定中知南劍州博學通敏剖斷如流沙縣巖前鄉山僻民悍盜賊竊發汝造據險立寨置兵防之患頓息陳韡侯官人紹定二年冬盜起閩中以寳章閣􅀡學士知南劍州兼福建路招捕使親提兵至沙縣順昌將樂清流宣化督捕所至克㨗進攻五賊營砦平之破潭瓦磜賊起之地夷其巢穴誅汀州叛卒諭降連城七十有二砦汀境皆平徐元杰上饒人淳祐元年知南劍州㑹峽陽寇作擒渠魁八人斬之餘釋不問父老相語曰侯不來我輩魚肉矣郡有延平書院時與博士㑹諸生親為講説民訟率呼至以理化誨多感悦而去輸苗聽其自㮣闔郡徳之黄去疾邵武人咸淳中知將樂縣創龜山書院集簡册政暇與士子講習其中取龜山紀年訂正之題曰年譜行於世朱士宏固始人宋末知南劍州節制諸軍時屬邑不靖從容撫諭誓不妄殺民賴以全巳而扈少帝入海竟死於難元李鉉至正間襲兄釣萬户守延平平寕化寨寇魏梅受復擊福安寇於泗洲政和橋弗克死之追贈隴西郡公曲惠正定人至正中為尤溪尉攝縣事紅巾賊壓境恵誓以死守倡勇敢拒戰邑賴以全後承閫檄率兵抵晉安死於賊聞者痛悼明唐鐸虹縣人洪武元年湯和克延平以鐸知府事撫輯新附政尚寛平士民安之胡子琪吉水人洪武間知延平府時廰事側有滛祠數為妖前守徙舍以避琪燬之更作居室其上飭教勵士以禮化民卒於官張縉澤州人洪武初知順昌縣公平廉恕開渠引龍興巖水以灌民田民名爲張公渠陳善夏邑人洪武間知沙縣捕滅馮谷堡寇黨興禮重士吏民悦服倪俊無錫人洪武末知沙縣先是郡五邑税糧悉從海道轉翰鎭東衞山民不能駕舟多致覆溺俊奏改輸福州延平二衞民懷其德朱孟常餘姚人永樂中知南平縣爲政不尚苛嚴有古循吏風西芹河泊所漁戸凋殘魚課常逋孟常奏蠲之江西民兵採木過縣饑餓瀕死賑粟全活焉中官督木刻期至縣期廹而木未集知孟常才委之從容集事而民不擾陳仕淵紹興人永樂間爲尤溪英果寨巡檢邑盜呉十師寇徳化諸縣仕淵率衆捕戮之餘黨復起力戰於羅畬場兵敗死焉李秉曹州人正統間授延年推官沙縣豪誣良民爲盜而滛其室秉捕抵罪豪訝秉坐下獄副使侯軏論豪如法由是知名徴入都察院理刑張敏徐川人正統間爲尤溪薄沙寇犯縣敏率衆禦之或告以賊勢猖獗敏曰吾書吾職死何憾賊據險敏先登與戰力盡而死徐昇貴溪人正統間襲正千戸鎮將樂值沙縣賊鄧茂七攻城昇運籌戰守賊造吕公車攻城將陷昇設大木抵之又鎔鐵潑車乘􅀔破賊邑賴保全丁瑄正統間爲御史時鄧茂七爲亂黨數萬人陷二十餘縣命瑄往招討瑄令通判倪冕據要害而身與都指揮雍埜等屢殲其魁遂斬茂七招脅從復業尤溪賊鄭永祖攻延平復擒斬之餘黨潰散丁泉汶上人爲延平衛指揮同知正統間􅁹沙寇有功升行都指揮僉事以􅁹上抗盜死於行間孫衍華亭人宏治中知延平府有惠政盜殺人刼財縣以良民抵罪衍捕得正盜出良民於獄以禱雨勞瘁卒郡人祀之李震來賓人宏治間知順昌縣沙寇胡天秀倡亂邑境騷動震率子姪李文李武統民兵追􅁹於大勝菴民賴以安陳大經上虞人宏治中知將樂縣縣􅀊漕以給莆莆又漕以給縣風濤湍悍覆溺相望大經請各留本縣民便之李熙上元人宏治中知將樂縣廉勤果毅不避權貴立義倉建浮橋重祀典在任六年百廢具舉擢監察御史歐陽鐸泰和人正德中為延平知府毁􅁋祠數十百所以其材葺學宫司禮太監蕭敬家奴殺人立置之辟羅􅃢南海人正德中知永安縣時牟利者訛言縣西南忠洛鄉有銀鑛其地去縣六十里密邇大帽山舊為盜藪􅃢抗言禁阻事乃得止陸相儒秀水人嘉靖中知延平府値兵燹後首省坊里供億庫役病民多至破産相儒為條其事改徴折銀募人守庫全閩著為令陸深上海人嘉靖中厯國子祭酒充經筵講官言講官撰進講章閣臣不宜改􅇡忤輔臣謫延平同知較閲簿書鈎稽奸蠧不以出自講帷怠於郡政林元倫台州人嘉靖中通判延平府平尤溪盜有功析置大田縣之議元倫發之徐階華亭人嘉靖中為翰林編修以論事忤張孚敬斥為延平府推官連欇郡事出繫囚三百人毁滛祠剏鄉社學捕劇盜百二十人遷黄州府同知去海瑞瓊山人嘉靖中署南平教諭御史詣學宫屬吏咸伏謁瑞獨長揖曰臺謁當以屬禮此堂師長教士地不當屈也鄒維連新昌人萬厯中授延平推官耿介有大節巡撫袁一驥以私憾摭布政竇子偁罪維連以去就爭監司欲為一驥建生祠維連抗詞力阻行取授南京兵部主事傅宗臯豐城人萬厯中知將樂縣廉靜果斷弭盜戢奸至於夜戸不閉徵入為御史解學夔揚州人天啟間知沙縣慈祥樂易待士有禮㑹大旱親步禱􅀨甘霖立沛人呼為解公雨立亭紀績王士和金谿人崇禎中舉於鄉唐王時擢延平知府王在延平寄託甚重及仙霞關破王走汀州士和居守警報疊至士和召父老曰吾雖一月郡守當與城存亡若等可速出勿膏斧鑕衆泣士和退入内署從容整衣冠閉户投繯死本朝錢嘉倫仁和人順冶三年以舉人從征入閩知順昌縣四年土寇攻城嘉倫同典史周世榜生員劉元鼎悉力拒守城陷世榜元鼎俱死嘉倫踞坐大罵賊割其舌支解之董潾江都人順治三年從征入閩知沙縣時邑初闢民多流亡潾次第安集四年土寇攻城守禦三月糧乏無援城破潾􅇥率子亦舒壻張思治及家丁五十三人巷戰皆死潾被執厲罵賊怒叢射之斷其首而去高咸臨錢塘人順治三年以貢生從征入閩知永安縣寛惠得民心四年土寇攻城招漳平教諭呉之璜設䇿率從弟其翰從子顯宗迎戰相持四閲月城破俱死咸臨被執脅降不屈罵賊死錢楞嘉善人順治三年以拔貢從征入閩四年署將樂縣事㑹土寇呉長丈謝七寳等竊發圍城城中弁兵俱調援順昌未歸楞與縣丞方抗督鄉勇拒守九月城陷楞猶率家丁巷戰墜馬見殺闔署被害雍正六年追贈按察司僉事祀忠義祠柴自新濟南人順治三年以署守備駐防延建汀邵四郡屢立戰功十年將樂呉賽娘聚衆拒險為亂自新單騎入其寨曉以禍福賊懷疑未決因於小樓上置酒與之結誓犒其將領於樓下至二更自新斬賽娘首以衣裏之下樓突圍出賊黨遂平宋可發膠州人順治六年知將樂縣値巨寇嘯聚保禦無失嘗著興革條議六事至今頒為全閩定式張國柱奉天人鎭守延平副總兵官時土寇蜂起延平城􅀌兵寡國柱從容守禦衝圍陷陣每以身先賊望風披靡曰小張飛來矣遂遁去余光辰福清人順治八年署南平教諭耿逆叛義不從賊忿恚嘔血而卒傅登瀛蓋州人康􅄉三年知沙縣首革加派之弊民感之時歸城弁兵屯境上為量地以居之民不滋擾邑人立祠祀焉謝􅁚超安邑人康熙九年知沙縣邑初田賦混淆民多賠累相率逃亡象超從田起賦豁絶除盧衆始復業耿逆之亂奸民乗機竊發象超歩行戸曉督令自守邑賴以安李塤湯陰人康熙九年知尤溪縣勸農課士以清介得民心耿逆之亂賊黨至縣塤不屈被執百姓號泣擁䕶不得前遂遇害妻傅氏殉贈按察司僉事祀忠義祠張陛山陰人任延平同知康熙十六年攝沙縣篆時邑初脱兵燹老弱流亡陛多方招集又置大塜收􅄟暴骴以勞卒於官祀名宧祠蕭來鸞吉安人康熙間知延平府與士民相接必以孝友仁愛為訓嘗條陳徴輸良法十六則行之官民交賴胡寳琳歙縣人乾隆十三年由邵武調知延平府讞獄多所平反鄰郡奸民魏現聚衆滋事寳琳偵知之率將吏擒􅀗焉事定白於上官脅從者概與末減全活甚衆擢山東鹽運使去之日百姓遮道攀留數十里不絶人物五代南康廖澄順昌人仕南唐累官大理評事宋曹彬取江南圍金陵甚􅇥校書郎林特勸之降澄曰吾久仕唐君臣之義不可廢也乃豫以死事遣蒼頭歸報其家城陷從容引決宋陳世卿字光遠沙縣人雍熙進士再調東川節度推官㑹李順寇兩川同幕謀自全計世卿正色曰食君禄當委身報國奈何欲他圖耶賊引去景德初授福建轉運使厯荆湖北路轉運使蠻人侵地命領兵討之標正經界取其要領置澧州武口等砦以控制之自是平定還朝召對眞宗器其材授秘書少監知廣州加賜金紫卒贈吏部尚書錄其子南安主簿儼為太祝張若谷字德繇沙縣人淳化進士為巴州軍事推官拒寇有功調全州入見眞宗識其名顧曰是在巴州禦賊者耶特改大理寺丞累官至尚書左丞所至有循良蹟不激訐取名廖正古字明遠將樂人治平進士知西安縣有惠政屢言青苗不便遂乞歸著有歸田集弟正一字明畧元豐進士元祐中召試館職蘇軾得其䇿擊節歎賞名亞四學士常居言路著􅀡聲出知常州後入元祐黨籍有白雲集八卷楊時字中立將樂人熙寕九年中進士第調官不赴以禮謁見程顥於潁昌其歸也顥目送之曰吾道南矣又見程頤於洛張載著西銘時疑其近於兼愛與頤辨論往復聞理一分殊之説未嘗求聞達而德望日重四方之士不遠千里從之遊號曰龜山先生有使高麗者國王問龜山先生安在使囘以聞召為秘書郎遷著作郎朝廷方圖燕雲時陳時政之弊金人圍京城勤五之兵四集時言當立統帥一號令又言童貫梁方平何灌當正典刑除右諫議大夫兼侍講議者欲割三鎭以講和時極言不可靖康中兼國子祭酒疏王安石邪説之害安石遂降從祀之列建炎改元除工部侍郎致仕卒諡文靖時浮沉州縣四十有七年晚居諫省僅九十日凡所論列皆切於世道朱子張栻之學得程氏之正其源委脉絡皆出於時子迫力學通經亦嘗師程頤云馮夢得字初心將樂人篤志嗜學博洽經史登嘉祐進士厯給事中累官至禮部尚書居官不私薦拔嘗奏立龜山書院請賜田養士復其後以主祀時謂扶植道南一脈夢得之力居多周諝尤溪人熙寕進士知新會縣時行新法郡縣風靡諝獨持不可上書力陳其弊乞歸著有孟子解義學者宗之陳瓘字瑩中世卿孫少好讀書元豐中中甲科調湖州掌書記判官蔡卞每事加禮瓘知其心術屢引疾求歸徽宗時為左司諌極言蔡卞章惇安惇邢恕之罪權給事中書論曾布過出知泰州崇寕中除名􅇡袁州廉州移郴州稍復宣徳郎子正彚告蔡京有動摇東宫迹事下制獄併逮瓘獄具正彚流上海瓘安置通州瓘嘗著尊堯集謂紹聖史官專是王安石日錄改修神宗史變亂是非不可傳信張商英為相取其書既上而商英罷瓘徙台州宰相命石悈知州事窘辱百端終不能害屢移楚卒瓘論京卞皆披摘其處心發露其情慝最所忌恨故得禍最酷靖康初贈諌議大夫召官正槖紹興中賜諡忠肅正彚官􅀡秘閣志節不忝其父黄裳字冕仲劍浦人博學宏詞尤􅃉禮經元豐五年進士第一政和間知福州累遷端明殿學士禮部侍郎晉尚書方三舍法行裳謂宜近不宜遠宜少不宜老宜富不宜貧不如遵祖宗科舉之制人以為􅃀論年八十七卒著有演仙集六十卷呉儀字國華劍浦人清修力學榮利不入於心大為楊時所重羅從彥常師事之從弟熙字秀明博學勵操時稱雙璧曹輔字載德沙縣人元符進士厯秘書省正字政和後帝多微行臣僚阿順莫敢言輔上疏切諫上令赴都堂審問少宰王黼令吏從輔受辭輔操筆曰區區之心一無所求愛君而已遂編管郴州處郴六年怡然不介意靖康中累官簽書建炎改元仍舊職未幾卒弟中字久徳與輔同舉進士知永州靖康中聞京城失守積憤成疾卒羅從彥字仲素沙縣人聞同郡楊時得程氏學遂往學焉曰不至是幾虛過一生矣嘗與時講易至乾九四爻云伊川説甚善從彥遂鬻田走洛見頤問之既而築室山下絶意仕進嘗采祖宗故事為尊堯錄擬獻闕下㑹國難不果朱子謂龜山倡道東南士之遊其門者甚衆然潛思力行任重詣極仲素一人而巳學者稱曰豫章先生淳祐間諡文質李侗字愿中劍浦人聞郡人羅從彦得河洛之學以書謁之從之累年授春秋中庸語孟之説從彥極稱許焉既而退居山中謝絶事故四十餘年食飲或不充而怡然自適事親孝謹親戚有貧不能婚嫁者則為經理振助之其接後學雖隨人淺深施教而必自反身自得始既閒居若無意當世而傷時憂國論事感激動人朱松雅重侗遣子從學卒得其傳朱子嘗稱侗充養完粹無復圭角平日恂恂於事無甚可否及酬酢事變斷以義理則截然不可犯又謂自熧侗學辭去復來則所聞益超絶其上達不已如此子友􅀡信甫皆舉進士信甫仕至監察御史以特立不容於朝云鄧肅字志宏沙縣人少警敏能文李綱奇之相倡和為忘年交居父喪哀毁踰禮入太學時東南貢花石綱肅作詩十一章言守令搜求擾民用事者見之屏出學欽宗嗣位召對便殿力詆權臣人以為狂欽宗容之補鴻臚寺簿金人犯闕肅被命詣諸敵營留十五口而還張􅀖昌僭位肅義不屈奔赴南京擢左正言遇事感激不三月杭二十疏言皆切至㑹李綱罷肅奏辯執政怒罷歸病卒廖剛字用中順昌人少從陳瓘楊時學登崇寕進士宣和初擢監察御史時蔡京當國剛論奏無所避紹興初盜入順昌剛遣長子遲諭賊賊知剛父子信義散去召爲吏部員外郎請經營建康親擁六師往爲固守計以杜金人窺何厯拜御史中丞知無不言秦檜銜之金人叛盟剛乞起舊相之有徳望者檜聞之曰是欲置我於何地耶改工部尚書致仕卒子四人遲過遂遽仕皆秉麾節􅀖人號爲萬石廖氏張致遠字子猷沙縣人宣和進士紹興中除殿中侍御史時江西帥胡世將請增和買絹折納錢致遠疏罷之又請罷􅅦福建鹽除戸部侍郎再爲給事中以顯謨閣待制致仕卒致遠鯁亮有學識厯臺省侍從言論風㫖卓然可觀趙鼎嘗謂致遠有士望他日所守當不渝識者謂鼎爲能知人范旺順昌人巡檢司軍校也順昌盜俞勝等作亂土軍陳旺與射士張衮謀舉砦應之旺叱之曰吾等父母妻子皆受國家廪食以活今力不能討反更助爲虐是無天地也凶黨忿剔其目而殺之子佛勝年十二以勇聞賊詐以父命召之至則俱死賊既平旺死迹在地隱隱不没邑人驚異爲設像城隍廟􅀊時祭享紹興中詔贈承信郎馮安國字彦修順昌人力學能文行誼尤高建炎中范汝為據富沙籍民降附安國不屈死陳淵字知黙瓘從孫受學程門紹興中廖剛胡寅朱震張致遠等薦充樞密院編修官李綱辟為制置司機宜文字詔侍從舉􅀡言極諫之士胡安國以淵應除監察御史尋遷右正言面對論程頤王安石學術同異秦檜姻黨鄭億年復資政殿學士淵言億年有從賊之醜乞寢其職名檜怒嗾何鑄論罷之廖德明字子晦順昌人受業朱子登乾道中進士累遷吏部左選郎官嘗語人以仕學之要曰德明自始仕以至為郎惟用三代􅀡道而行一句而已有槎溪集行於世黄復字乾叟劍浦人寳慶進士通判滁州與守陳廣中協力拒金廣中中礟死復攝州事八十餘日援不至前後數百戰而殁制帥趙葵上其事特為立祠著書凡三十卷子垕廣皆為從事郎元郭居敬尤溪人性至孝事親左右承順得其歡心既殁哀有過而與禮稱嘗摭虞舜而下二十四人孝行之概序而詩之用訓童􅀩虞集歐陽元欲薦於朝居敬固辭不起呉文讓將樂人至正間為龍溪縣尹漳州李志甫反文讓散儲募兵往擊之力戰而死陳君用字子材南平人少􅀒氣勇猛過人紅巾賊起閩閫授君用南平縣尹給錢募兵君用散家財繼之復建陽浦城等縣以功授同知建寕路事賊圍福州君用率兵往援大敗賊衆權同知副都元帥引兵至連江率壯士六十人徒步斬殺賊潰復合君用大呼轉戰中槍而死贈懷遠大將軍潁川郡侯諡忠毅張昇字伯起順昌人累官江西儒學提舉至正末陳友諒陷豫章索昇所署印昇歎曰吾自㓜􅀩被國恩今年幾七十可違義苟生墮先世而辱名教耶遂投印井中不食死明張智字原畧昇之子洪武初以明經舉授夷陵州學正才識卓異召為禮部右侍郎凡禮樂制度多所建明鄧文鏗字德聲永安人洪武進士知茂名縣治最内擢厯都御史風栽凛凛不畏强禦出往四川陜西巡茶貴戚犯禁者劾置之法葉宜字守義南平人永樂進士除銅仁府同知厯遷衞輝知府升浙江參政致仕居官盡職寛嚴適宜在衞輝時蝗為災宜禱於城隍怱有羣鳥飛食之蝗盡而鳥死宜命穿穴葬焉祭之以文人號為鳥􅊘蕭原字本初順昌人永樂四年官監察御史坐事謫交阯新安府推官單騎之任屬交阯復反欲降之不屈死李文殊字宗禮將樂人永樂中用薦除工科給事中左遷縣丞後厯刑曹知廣信府持身廉介布素疏食若寒士乞休歸會沙尤寇犯縣文殊贊畫城守邑賴以全又減糧差甦民困置永安縣皆有力焉廖文昌字克盛沙縣人永樂舉人厯官御史巡按兩廣風裁甚著致仕歸值鄧寇破縣被執罵賊而死上官儀字必達沙縣人家貧役於縣坐逋賦繫獄題鬬鳩詩於圜戸知縣見而奇之命再賦應聲而成遂資令讀書成永樂辛丑進士授咸寕知縣三載擢知州民扶攜老稚泣留當道聞於朝以知州復署縣事六年改任滄州致仕歸黄琛字廷獻將樂人正統進士為戸部主事督儲蘇於有聲旱禱輙應人呼為主事雨厯員外郎中被命張淮北全活甚衆擢江西布政政務寛簡㑹峒寇作夜攻其砦俘其酋餘黨悉平厯官南户部侍郎巡撫四川還京卒劉璋字廷信南平人天順進士厯户部郎中㑹計精核吏不能欺成化中擢山東參政厯總督漕運巡撫鄖陽四川政績甚著宏治時累遷工部尚書有詔求善造銅鼓及能擊者璋言四方告災正徹樂減膳之時豈宜為此又言不宜興大工動大衆徴財賄帝皆納之以太子少保致仕羅明字文昭南平人成化進士授御史巡按廣西時密詔鎭守中官貢禽鳥抗疏止之帝範白金為眞武像遣使送武當山又疏諌嘗陳修省事宜言鑾輿遊幸南城西苑賜賚無度非敬天弭災之道遷陜西副使屢遷右副都御史巡撫甘肅所至有聲宏治二年召拜工部右侍郎卒廖中字用中順昌人成化進士官刑部員外郎擢山東按察僉事築張秋隄岸以勞進副使力請致仕中㓜喪母事繼母以孝聞異母弟四人睦之如同産在刑部時莆田林俊言事逮獄中日使人存恤其家俊謫官中令其弟晟偕行又命一僕送至貶所人咸義之廖得金南平人世業農自曾祖迄得金昆弟諸孫几五世同居共爨每晨起婦女聚一堂以次列坐治女工男子出治農桑長者荷畚鍤前行諸子姪各執田器隨之無敢凌躐人謂其家有古禮教之遺胡瓊字國華南平人正德進士由慈谿知縣入為御史厯按貴州浙江有聲嘉靖初席書以中㫖拜尚書瓊抗疏力爭尋偕廷臣伏闕爭大禮下獄廷杖卒隆慶初贈光禄少郷黄焯字子昭南平人正徳進士厯永州知府嚴禁親喪不葬及破産飯僧俗為丕變九溪蠻叛服不常師興率賦諸民焯取郡鹽引錢貯庫備軍需以紓民賦遂著為令擢湖廣參政致仕歸蕭崑字叔岡將樂人嘗從蔡清受業正德丁卯舉於鄉教諭績溪聘入粵闈途次為宸濠所執欲降之崑慷慨言曰殿下違祖訓干天命復欲辱義士乎卒不屈死田頊字希古尤溪人正德進士有文章名厯兵禮二部郎中出督湖廣學政闢濂溪書院教飭諸生與講性命經濟之學遷貴州副使以母老乞養歸母至九十七􅀊而殁頊攀號躃踊水漿不入口人稱其孝游居敬字行簡南平人嘉靖進士改庶吉士授御史巡按應天紏劾豪惡風采肅然出為折江僉事累遷副都御史巡撫雲南黔國公沐朝弼故恣横居敬栽之以法弼銜之㑹東川酋阿堂作亂居敬請合川貴三省兵􅁹之尋伏其辜升兵部侍郎未代朝弼嗾言者論其喜功生事下獄杖戍碣石隆慶初赦歸薦起刑部侍郎尋乞歸卒居敬學務實踐甘貧茹苦衣麤食糲一蓆十年高風直節一時鮮儷陳潮永安千戸陳燦子嘉靖中流寇入境燦督兵禦之潮從行賊忽奄至燦被創仆地賊將加兵潮以身蔽父血流被體佯死仍忍痛􅀒父歸以免李富字尚禮將樂人邑諸生以母多病絶意仕進居常非慶弔不履市􅒡年六十喪母廬墓號􅂘釋服謂其子曰吾早喪父未能為服遂設位而􅂘三載如母喪之儀徐尚卿字師臣南平人萬厯舉人任劍州知州崇禎十年李自成恚登相等以數十萬衆入四川尚卿聚士民謀曰城必不能守若輩速去吾死此衆泣請偕去尚卿不可閲二日城陷投繯死贈布政司叅議本朝乾隆四十一年賜諡節愍本朝鄒儀周字西齊南平人順治中由舉人任丹徒知縣以清節著致仕歸耿逆之變􅀍拘存􅀍執死之事聞贈右都督廖騰煃字占五將樂人康熙舉人初令休寕氷蘗自守斷決無滯俗多以人命誣陷株累者騰煃痛懲其弊刁風始息庚午充江南鄉試同考官所薦拔稱得人乙酉典試江南得人尤盛厯官户部侍郎致仕歸徐日森將樂人糿以孝稱比長貿遷於外忽夢父病即馳歸父果呻吟牀褥尋就愈後父母俱年至八旬生平所置産悉署父名均分諸弟雍正六年旌廖悦將樂人性至孝年未冠父為奸民所執悦奮身奔救罄資以贖得免二親殁廬墓終身雍正九年旌羅基沙縣人年六􅀊母疾躬侍湯藥晨夕不離母卒􅂘泣拜奠如成人事繼母曲得其歡心兄弟八人友愛雍睦為鄉閭所重高俊沙縣人七􅀊喪母􅂘奠如成人事繼母無異於所生十五􅀊父攜俊賈江西尋命歸娶數年父無音耗俊往江西尋覔不得轉江南至浙江兩足腫潰道病絶粒不得巳奔囘省母又數年弟稍長乃與母泣訣誓不得父不返復由廣東至湖南逢人訪問卒遇父於四川萬縣時父囊澀不歸十年矣因奉與俱歸孝養備至父以夀終嘉慶十六年旌陳賓順昌人嘉慶二十三年以孝旌流寓宋朱子婺源人父松任尤溪尉寓延平鄭氏而朱子生後遭父喪徙崇安依父友劉子羽居焉趙師檟淮右人以罪拘管西外宗正司紹定中福建提刑王夢龍以智勇可用屬製軍器㑹寇逼尤溪師檟統卒數百往戍大書於旗曰不與賊俱生人皆壯之迎敵於林嶺身為先鋒戰十餘合所乘馬適陷田中賊斷其左臂師檟以右手拔背刀斬七級力盡仰天呼曰師檟報國死於此矣遂殁尤溪民為立廟戰處贈武節郎明艾南英東鄉人明末兩京繼覆江西郡縣盡失南英乃入閩唐王召見陳十可憂疏授兵部主事尋改御史明年八月避地西郊興化寺卒彭君選不知何許人寓永安文昌橋生祠内丙戍八月衣巾北向叩頭畢赴水死留題壁間有逃來閩地又如此之句王孫蕃雄縣人崇禎時為御史兩疏劾監軍中官劉元斌殺掠罪狀並陳剿寇方畧帝御中左門手其疏示百官暴元斌罪下之理後為馬士英黨修隙落職隱居延平坐卧布衾簞小樓不食儀範通款謁凛然列女宋小常村民婦南平人建炎劍州道出小中叛卒楊勍寇南常村掠一民婦欲與亂􅙁屍誓死不受汚遂遇害棄屍道旁賊退人為取所枕籍處跡宛然不滅每雨則乾晴則濕削去則他土復見其跡覆以愈明范旺妻馬氏順昌人旺軍校與子為巡檢司佛勝俱為賊黨行且陳望􅂘賊等所殺馬氏聞之脅污不從節解之廖氏沙縣歌舞人性慧解紹定三年為賊恨不所掠磔汝命之歌舞廖罵曰我肯悅汝耶賊怒殺之元劉國美妻林氏名愈娘沙被掠至安縣人至正間江西寇鄧克明破縣愈娘濟橋謂同行諸婦曰吾雖死不受辱痛􅂘而投於河施九泰妻卓氏尤溪人夫卒卓少有志操嫁未幾誓不二志遺腹生一子紡織教其子成勤劬以供衣食立至正間旌明彭阿積妻張氏名陂娘尤溪人洪武中夫溺死氏年十九誓撫遺􅀌後舅姑强之嫁遂自縊同邑黄喬如妻某氏遇賊不屈死王文珍聘妻糜氏名曹婢延平衞人許聘未婚文珍卒喪過其門氏登樓於牕間泣送遂自縊死徐氏名冬使南平人少適黃瓊瓊蕩子也鬻徐於富商徐泣請死商驚異歸之瓊又誘惡少娶之徐度不能脱奔與母訣遂自縊死張文宗妻陳氏順昌人正統初為山寇所執將獻之賊首至西渡陳謂賊曰若欲獻我於帥而尚繫我後必􅀗譴矣賊釋之遂投水死同邑葉周安妻呉氏偕媳高氏遇寇不辱死朱廷堦聘妻熊氏夫亡殉節張氏女名貴娘將樂人正統中沙寇入境女年十八為所執將舁去紿曰請歛衣飾以隨潛至屋後自縊又潘氏女年十六被掠不屈賊殺之松下同邑沙成文妻熊氏揭瓊芳妻蕭氏先後遇亂自盡温敬妻余氏夫亡殉節祐溪貞女沙縣人失其姓名正統中鄧茂七破沙邑女匿草間為二賊所􅀗過溪橋女紿賊曰扶我過當從一人二賊爭趨挽至橋半女視溪流急拽二賊共投俱溺死陳氏婢沙縣陳仕進使女也仕進三􅀊失怙恃氏撫之遇鄧茂七之亂乃􅀒仕進攜其家簿劵匿於山谷竟存陳氏之門胡貴妻陳氏沙縣人年十六夫亡撫子宗旺長娶姜氏生子斯祐三􅀊而宗旺卒姜矢志如姑斯祐娶呉氏生二子復亡呉守之成立三世苦節人以為難林鳳妻黃氏名怡姐南平人嘉靖中為流寇所􅀗至臨溪高橋奮身投水死七日收屍顏色如生時年十七羅舉妻張氏沙縣人嘉靖中為寇所執賊首悦其羙欲留之張罵不絶口賊怒割乳剖心棄其首河中同邑鄧琳祥妻林氏姜成起妻鄧氏鄧斯謹妻練氏羅聘吾妻鄧氏俱罵賊死陳師衡妻朱氏陸文諒妻林氏張從傳聘妻高氏俱夫亡殉節王珣妻黃氏沙縣人嘉靖中寇刼其鄉與衆婦乘舟避賊衆匿艙中氏獨坐於外衆曰不虞賊見乎氏曰正恐賊來不及死耳巳賊至氏急投水死何應科妻蔡氏沙縣人年十六夫卒遺腹四月誓志以守足不履閾鄰火延及於庭泣而禱天俄風返火滅人謂誠節所感嚴師訓妻鄧氏永安人賊執欲污之大罵不從賊裂其口殺之同邑郭茂賢妻林氏鄧林彩妻陳氏林安居妻及殁女􅂘曰前以父老故不得死今何用生為遂閉户自經同邑伍其清妻蕭氏夫亡殉節楊成久妻廖氏將樂人夫死於寇時年二十五與伯姊乘舟入城鳴官報仇舟至常口灘月昏波激舟幾覆氏禱曰我娠三月幸留一綫以延夫後俄而風順得濟官為捕寇置之法後生子嗣武撫之成名守節五十餘年雍正五年旌廖啟烘妻黃氏將樂人年十九夫殁苦節五十一載雍正八年旌王仲仁女沙縣人年十六獨處遇暴强執其手羞忿自經雍正十三年旌邵弼勲妻曾氏尤溪人隨夫避亂入山夫為賊執割去左耳氏於林莽中見之遽出紿賊曰幸釋吾夫願以身從賊信之氏見夫去遠遂大罵求死賊怒殺之同邑黄季儒妻林氏徐􅄏淑妻呉氏遇寇不辱死俱雍正五年旌蕭應正妻林氏尤溪人夫亡年二十三誓志撫􅀌厯五十餘年雍正五年旌張可表妻賴氏永安人年十八適張未幾夫卒氏遍書烈女不事二夫六字服滿閉門自經死同邑黄者定妻王氏陳道遠妻程氏鄧元英聘妻曾氏俱夫亡殉節鄧頤妻黄氏永安人年二十四歸頤生二子頤卒抽刀自刎舅姑急救得甦迨長子麟生遊於庠仲漸成立一日謂二子曰吾偷生已十六年矣將見汝父於地下遂託疾不服藥而逝麟生妻陳氏嫁未幾麟生卒陳投繯以殉邢曰都妻羅氏永安人年二十五夫亡守節八十五􅀊卒雍正七年旌黄衮妻林氏永安人年二十八而寡事百􅀊姑以孝稱撫子錫祚長娶張氏未幾復亡張年二十三􅀊與姑相依一門雙節同邑羅世綬妻賴氏林崇妻陳氏俱雍正十年旌鄒國恩妻呉氏南平人年二十夫殁慟􅂘欲絶奉姑命勉自存課子周謨成名篝燈紡績孝事姑嫜姑卒氏哀毁七日而殁人稱節孝兼全同邑李某妻管氏萬應海妻黄氏生員王武妻張氏俞大本妻張氏生員徐一德妻駱氏練韜妻陳氏生員何仕雲母徐氏王錫璋妻陳氏邱易妻嚴氏魏一廉妻盧氏魏伯􅁢妻張氏上官椿妻黃氏應嗣灝妻翁氏俱乾隆年間旌高洪逵妻任氏順昌人年二十六夫殁守節五十七年子如峯妻羅氏亦以節著同邑楊元榕妻呉氏孟孔衷妻王氏孟雲棟妻張氏周高生妻陳氏江廷桂妻任氏謝文光妻范氏游德鏞妻廖氏張廷臣妻孫氏朱爲敬妻俞氏任紹釗妻高氏章士仁妻廖氏呉日湖妻楊氏呉占千妻高氏張熺妻余氏饒鍾妻林氏張陽廉妻王氏俱乾隆年間旌林人鳳妻廖氏將樂人年二十二夫殁翁姑年老二􅀌穉幼氏孝事舅姑紡績課子艱苦備嘗同邑王平之妻鄭氏廖永齡妾林氏俱乾隆年間旌李思國妻王氏沙縣人年十七夫殁遺腹得男鄰婦勸其他適力拒之毁形自誓勤女紅課子年躋大耋同邑陳元治繼妻黄氏生員林日曜妻鄧氏羅粹生妻李氏長媳姜氏姪媳許氏鄧光興妻楊氏高裕達妻廖氏鄧奎郎妻魏氏羅文錦妻陳氏林一鳳妻王氏黄守愍妻余氏楊叔蕡妻􅀺氏李克壯妻鄧氏盧蕚妻張氏林長祺妻張氏曹有慶妻樂氏羅正吾妻鄧氏羅肇鼎妻鄧氏林大櫸妻魏氏黎其德妻林氏鄧州文妻林氏俱乾隆年間旌陳滄妻王氏尤溪人年二十八夫殁撫􅀌守節年六十六卒同邑胡紹治妻張氏蔣聿崝妻胡氏烈女陳必喜聘妻鍾氏俱乾隆年間旌賴大成妻陳氏永安人年二十三夫殁守節五十六年嗣子伯禩復殁妻江氏奉姑守志撫子五十二年人稱雙節同邑賴世績妻鄧氏陳湯道妻鄭氏王廷桂妻廖氏邢錫爵妻陳氏邢燦英妻朱氏李騰璘妻陳氏許増信妻鄧氏劉廷坦妻黄氏朱世求妻聶氏馬學海妻劉氏俱乾隆年間旌楊添崙妻連氏順昌人夫亡守節同邑廖天明妻黄氏蔡深九妾李氏俱嘉慶年間旌廖漢耀妻林氏將樂人夫亡守節同邑生員王者觀繼妻葉氏俱嘉慶年間旌鄧世光妻蕭氏沙縣人夫亡守節同邑龔光剛妻潘氏俱嘉慶年間旌程􅀖定妻蕭氏尤溪人夫亡守節同邑陳聖祥妻李氏葉芹水妻王氏俱嘉慶年間旌陳漢瓊妻趙氏永安人夫亡守節同邑賴兆昺妻范氏張朝經妻劉氏俱嘉慶年間旌土産銅唐書地理志尤溪有銅明統志尤溪沙二縣出府志南平沙二縣東皆有銅場久廢鐵唐書地理志尤溪將樂有鐵明統志有冶在南平縣者四尤溪縣者十七稻寰宇記延平稻有十種曰金黍赤鮮白稌先黄金牛虎皮女兒挾糖黒林先白茶宋史地理志南劍州元豐貢茶府志出南平半巖者佳寰宇記延平茶有六種曰白乳金字蠟面骨子山挺銀字九域志劍浦縣有五焙茶白苧布明統志白苧布諸縣俱出將樂尤佳􅁓閩書延以竹為􅁓府志順昌有猫竹取其筍將成竹者浸為竹絲造各色紙石明統志南平縣有滷水石可為硯又有花紋石色青紋素有山水禽魚形狀可為硯為屏府志花紋石一名花孜石出黯淡灘下急流處故不易得葉夢得硯譜滷水石細潤而不甚發墨黯淡石宜墨而膚理不逮金橘明統志南平沙縣出茴香宋史地理志南劍州貢土茴香明統志南平等縣出折筍府志一名接筍大如指長四五寸出南平縣高山上山下有澗泉土人取筍浸泉中一夕色白味佳為筍之最協修官臣許􅀖光恭纂總纂官臣廖鴻藻恭覆輯校對官臣王式和恭校
