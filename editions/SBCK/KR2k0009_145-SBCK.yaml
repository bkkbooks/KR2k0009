所藴涇陽人乾隆二十年知西充縣勤於撫字加意學校一時士風丕變致仕歸邑人思之羅允文金谿人乾隆四十九年知西充縣勸課農桑民人殷富訟獄有黠桀者輒反覆開導俱斂迹不敢為奸一時仁愛著聞黃克顯上高人乾隆十七年知岳池縣決獄明斷實心教養士民立祠祀之人物漢張翕安漢人為越嶲太守政化清平在郡十七年卒夷人愛慕如喪父母安帝元初六年夷叛張喬遣楊竦討平之天子以翕有遺愛乃拜其子湍為太守夷人歡喜奉迎後湍頗失其心有欲叛者諸者老相曉語曰當為先府君故遂以得安按湍華陽國志作璊陳禪字紀山安漢人仕郡功曹舉善黜惡為􅀖内所畏察孝廉州辟治中從事鄧騭聞其名而辟焉舉茂才時漢中蠻反以禪為漢中太守賊數聞其名聲即時降服遷左馮翊入拜諌議大夫永寕中拜遼東太守單于懷服順帝即位遷司隸校尉子澄有清名官至漢中太守曽孫寶亦剛壯有禪風為州别駕從事顯名州里三國漢龔禄安漢人先主定益州為郡從事牙門將建興三年為越巂太守隨丞相亮南征為蠻夷所害晉陳夀安漢人少好學師事同郡譙秀仕蜀為觀閣令史及蜀平司空張華愛其才舉為孝亷除左著作郎出補陽平令撰蜀相諸葛亮集奏之除著作郎領本郡中正撰蜀魏吳三國志凡六十五篇杜預薦為御史治書又撰古國志五十篇益部耆舊傳十篇夀兄子莅符皆文詞燦麗當世馳名閻纘安漢人博覽墳典慷慨有大節為太傅楊駿舍人轉安復令駿誅棄官葬駿而去為西戎校尉司馬有功封平樂鄉侯後屢上疏直言朝廷善其忠烈擢為漢中太守卒於官南北朝魏淳于誕其先泰山博人後家安固恒陵縣父興宗齊南安太守誕年十二隨父向揚州父於路為羣盜所害誕哀感奮發傾資結客旬朔之内遂得復讐唐李文素漢初人光啟中喪母廬墓芝草生虎鹿馴其側刺史以聞賜粟三百石錢二十萬宋成􅁚流溪人以詩書訓授里中事父母以孝聞淳化中李順據郡縣象父母驚悸而死象號泣營葬廬墓側每慟聞者戚愴虎豹環廬而卧燕百餘集廬中禾生墓側吐九穗逺近目為成孝子何涉南充人汎覽博古六經諸子百家傍及山經地理醫卜之術無所不學仁宗時登進士第范仲淹一見奇之辟彰武軍節度推官用龎籍奏遷著作佐郎管勾鄜延路招禮記經學三十一卷行世仲鴻其從子也游仲鴻南充人淳熙進士知中江縣紹熙四年赴召趙汝愚在樞密謂仲鴻直諒多聞訪以蜀中利病汝愚欲親出經畧西事仲鴻諫而止光宗久不朝重華宫仲鴻遺書汝愚陳宗社大計改監登聞鼓院㑹朱熹以論事去上疏願亟還之後知嘉定府擢利州路提􅀧刑獄政平民悦乞休去諡曰忠安丙廣安人淳熙進士調大足主簿秩滿詣闕陳蜀利病十五事言甚剴切通判隆慶府嘗大水丙白守發常平賑之又鑿石徙溪自是無水患厯知大安軍有惠政以誅呉􅬞功授四川宣撫使遷知潭州紅巾賊張福等叛四川大震詔起丙為安撫使擒福斬之進少保卒諡忠定所著有皛然集杜源蓬州人事親孝開禧中蜀大疫沿路貧民流離死者棄屍滿野源於龍章山作二塜别男女骸骨葬之義塚碑刻今猶存陳霖果州人嘉定中為瑞金尉盜起江閩霖迎敵力戰被執不屈死游似仲鴻子嘉定進士厯官吏部尚書侍經幄理宗問唐太宗貞觀治效何速如是似乃摭太宗事以陳淳祐中拜右丞相兼樞密使十上章乞歸不許進爵國公卒贈少保元范均保儀隴人至正中割股愈母疾詔立孝感坊陳君節廣安人生甫數􅀊元末兵起母被俘幾三十年君節寢食不安攜資尋覓卒得之奉母以歸孝養不衰明羅茂英儀隴人洪武中由太學生厯官勤慎聲譽著聞終河南按察司副使范循南充人永樂初進士授御史陞貴州僉事耿介直樸克持憲紀有古人風王鐸岳池人宣德進士厯刑科給事中遇事敢言陞順天府尹卒官馬驤西充貢生官都察院都事正統中陣亡賜祭葬􅄻子惟善入監惟善後知湖廣臨武縣以清節聞張永南充人景泰進士天順中知嚴州府為政嚴明墾田興學治績丕著璽書褒羙吳伯通廣安人天順進士官大理評事轉寺副時鄉人萬安當國絶不一往厯浙江提學河南僉事雲南按察振肅憲度奸貪畏懾平生學務躬行所至以振起士􅀋為先學者翕然從之人稱石谷先生楊統鄰水人成化進士任監察御史巡撫貴州㫁決如流任滿百姓乞留一年上許之民謡曰鄰水楊但願年年巡貴陽貪汚畏法軍民安康升陜西副使去之日黎獠遮道攀留何秉良廣安人事親孝居喪盡禮先後廬墓事聞旌表李華營山人貢入太學思親歸養事異母兄撫弟遺􅀌始終不懈出粟為族人輸納兼濟貧乏同縣貢生王宗舜撫異母弟及􅀌姪不畜私財俱祀鄉賢魏必通儀隴人成化中賊犯境父成率衆禦之被執必通入賊營以身代父賊乃釋仍留必通以不屈遇害王秉良西充人宏治進士由刑部郎知雷州沈毅有為修海隄湖隄時采珠中官趙蘭多不法秉良每與之抗民恃以安為蘭誣搆逮京下獄嘉靖初誣始白復知長沙府以忤權要去官韓士英南充人正徳進士授主事榷税江西時宸濠不軌士英持正不與通出守岳州弭盜賑饑備兵畢節引水便汲俱有異政厯陞都御史尚書聲譽不減母德統南充人正德進士厯大理寺正以議禮戌鄖陽後復職陞尚寶卿吏部尚書楊博疏言德純爭論國事力劾權姦衡困既深緩急可用賈雄西充人為寕州衞百户正德間鄢藍賊亂雄以􅀌軍擊賊於花牌樓力戰死賊亦敗去時死鄢藍賊難者蓬州費宏道隨僉事王源至營山􅁹賊王被執衆潰獨宏道躍馬格鬬殺數十人力屈死之詔䘏其家營山醫官馬仁城陷死難營山張添夀追賊至富順三母灘戰死事聞旌曰義勇俱入祠儀隴何本清值賊來攻縣本清當先陷陣力屈死之旌曰忠義南充孫仲玉與衆守李灘禦鄢藍賊為賊所􅀗令探水仲玉示不可渡且呼衆固守賊斬之而去石天柱岳池人正德進士厯都給事中武宗北巡欲幸宣府天柱刺血書疏以進遂止尚書王瓊欲殺都御史彭澤天柱力白其無罪瓊怒中㫖出為臨安推官嘉靖初詔復前職陞大理寺丞任瀚南充人嘉靖進士廷對獻替剴切名動天下與羅洪先唐順之相上下己而自吏部主事補春坊司直兼翰林院檢討引疾歸瀚少懷用世志既家居研究六經闡明聖學晚游心於易深有所得為古文有西漢風文階南充人嘉靖中知望江縣時景王就邸湖廣過望江供億甚繁階裁以定式中官憚之戢其部弗敢譁陳以勤南充人嘉靖進士授檢討陞洗馬侍講讀於穆宗潛邸九年啟沃最多移宗立手詔以禮部尚書兼文淵閣大學士上謹始十事又陳時務因循之弊見同列多黨比力疾求去進太子太師馳傳歸家居十年卒贈太保諡文端張鑑南充人嘉靖進士授會稽知縣有治績擢御史出守建寕厯陞山西按察使巡撫山東政爲諸省最引疾歸用薦起總督糧儲八年夙弊盡革卒時囊無一金所著有皇極經世衍義賦役法屯操奏案諸書王廷南充人嘉靖進士授御史疏劾吏部尚書汪鋐謫亳州判官厯蘇州知府有政聲累遷户部右侍郎兼左僉都御史總督漕運巡撫鳳陽時倭冦未靖廷建議以江南屬鎮守總兵官專駐呉淞江北屬分守副總兵專駐狼山遂爲定制遷左都御史隆慶初中官許義挾刃脇人財爲巡城御史許學道所笞羣璫伏左掖門外邀擊學道廷上其狀論戌有差尋以忤高拱斥爲民萬厯初四川巡撫曽省吾言廷守蘇州時人比之趙清獻直節勁氣始終無改宜復官詔以故官致仕仍以高年特賜存問卒諡恭節何子明南充人嘉靖進士爲御史多所彈劾尋遷廣東僉事龍門從化賊倡亂􅀔猖獗當事者計莫知所出子明時以少參授節鉞招撫之嚴督將裨非生擒不為功由是人無倖㓛渠魁授首及紀平冦績晉憲副而子明已卒李夀營山人少有文行任褒城令恤民隱革弊政舉循良第一卒祀鄉賢祠陳于陛以勤子隆慶進士授編修厯侍講學士擢禮部尚書請修國史備一代紀載詔為副總裁及入㕘大政疏陳親大臣錄遺賢􅅄外吏核邊餉儲將才擇邊吏六事優詔答之帝以軍政失察斥言官三十餘人于陛申救至再俱不納累官文淵閣大學士進太子太保諡文憲譙由龍南充人隆慶中知通山縣擢興國知州又嘗攝崇陽縣民並愛戴之侯文才營山人萬厯中知楚雄府郡人不知紡織文才始教之蠶桑王德完廣安人萬厯進士擢兵科給事中甫半載章數十上皆邊防大計厯户工二科上籌畫邊餉議極陳採木礦税及播州用兵之害備言國計匱乏之由尋以爭國本廷杖除官後起户部侍郎陳桂楝鄰水舉人任内黄知縣有惠政陞知徐州崇禎八年闖賊圍州城殉節本朝乾隆四十一年賜諡節愍楊文岳南充人萬厯進士崇禎初厯官右副都御史巡撫登萊十二年擢兵部右侍郎總督保定山北河北軍務十四年李自成陷洛陽詔文岳赴救困於汝寕被執大罵不屈死賊以其死忠備禮歛之其後里人易棺改歛顏色如生本朝乾隆四十一年賜諡忠烈張鵬翼西充人崇禎中由選貢授衡陽知縣張獻忠逼衡州巡撫監司以下皆遁鵬翼獨守空城城陷脅降㦸髯罵賊賊怒而投諸江妻子赴水死本朝乾隆四十一年賜諡忠愍王蘋南充武生崇禎間獻賊至語其父曰食國家水土力不能報畢命可耳父然之賊至其父拔刀殺數賊死蘋被擒亦罵賊死又同縣武生陳懷西獻賊誘以官罵曰甘作明朝武生豈為逆賊元老賊斬之懸首東門時西充廩生馬孫鸞營山諸生王光先均與賊力戰被執罵賊不屈死儀隴王爾讀王皋家僕也獻賊破城縣令被賊追將及爾讀奮身擊賊被殺本朝乾隆四十一年子入忠義祠樊明善南充諸生聞闖賊陷京師大慟時巡撫龍文光駐順慶乃衰服詣軍門曰鼎湖新去臣子不共戴天公聞變三日矣而無所施為那龍深謝之後破家募士與獻賊屢戰死之一年本朝乾隆四十予入忠義祠李沁營山諸生善屬文倜儻多智畧崇禎壬午春姚黄賊自秦流入沁與同庠李晟督邑衆悍禦有功後屢破流賊復縣城殺偽令丙戌秋賊大至圍守二月沁巡城中礮卒晟亦􅀍殺死營山諸生泉應厚泉應化冉良富李尚聰儀隴諸生席雙楠劉義國楊正道當姚黃之亂率衆守寨力竭被執均不屈遇害又儀隴楊若楹為叔純道嗣賊執純道至達州若楹馳赴賊營請代被害本朝乾隆四十一年俱予入忠義祠龎昌允西充人崇禎進士授青陽知縣南京覆走匿九華山謀舉兵事洩被執夜死旅店中本朝乾隆四十一年賜諡節愍李乾德西充人崇禎辛未進士累官偏沅巡撫蜀亂奉命聨江上兵將恢復地方時黔滇稱王一時靡然從之無敢一言抗犯乾德獨拒不從書詞凜厲後孫可望䧟嘉定被執載舟中不食者數日屆月波澤與其弟御史升德俱赴水死本朝乾隆四十一年賜諡忠節升徳諡節愍李完西充人天啟進士授西平知縣調南陽唐藩驕蹇縣北有布商被刧盜為唐邸䜿人完究治如律以薦擢御史出巡兩淮忤大璫楊顯名左遷遂辭歸崇禎甲申夏獻賊躪蜀完潛結義勇㑹上賊鮮于洪偽令高淩雲馳告賊環兵遽攻之不屈死本朝乾隆四十一年賜諡節愍鄧士廉廣安人初為廣東海陽知縣厯官至吏部侍郎從桂王入緬死難本朝乾隆四十一年賜諡節愍同州王瑨知順寕府死國難其子有文書姓名官秩置父屍又自書一􅁓納懷中刎頸死於父側本朝羅為賡南充人順治甲午舉人知孝豐縣民人德之後以行人致仕祀湖州府名官祠趙心抃西充人知山西太平縣擢兵科給事中章數十上條陳蜀省事宜尤中時弊解官歸杜門􅁍掃鄉人忿爭者輒以婉言開導多所感悟高儀坤西充人性孝友順治甲午舉人知平陽縣有惠政祀温州府名宦祠馮