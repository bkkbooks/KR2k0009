body:
  text: 順慶府二古蹟安漢故城在南充縣北漢置華陽國志初平元年征東中郎將安漢趙穎建議分巴為二郡穎欲得巴舊名故白益州牧劉璋以墊江以上為已郡治安漢建安六年改為巴西郡徙治閬中隋書地理志巴西郡南充舊曰安漢置宕渠郡開皇初郡廢十八年縣改名焉舊唐書地理志宋於安漢故城置南宕渠郡隋改安漢為南充寰宇記後魏平蜀於今州北三十七里石苟壩置南宕渠郡其縣亦移就郡理隋廢郡仍移縣理安漢城改為南充縣以古充國縣為名舊志舊郡治在今城北五里北津渡明洪武初徙今治按明統志安漢城在府城北三十五里宕渠城在府城北四十里即石苟壩又有充國城在府南三十五里其説舛錯恐皆誤儀隴故城在今儀隴縣北寰宇記儀隴縣在蓬州西北六十里漢閬中縣地梁天監元年於此置隆城郡及儀隴縣因隴城山爲名隋開皇三年郡廢以縣屬蓬州唐武徳三年割屬方州八年廢方州復屬蓬州縣城原在金城山頂四西南稍通人面懸絶石壁高八十丈周迴五里惟馬開元二十六年移於山下平溪即今理也九域志縣在蓬州西北九十里元統志自蜀多難此縣人民隨州徙於雲山城保聚元初復還舊治縣至蓬州一百五十里東至永睦縣西至閬中縣南至營山縣東至小平州皆一百五十里西南至南部縣一百三十里東北至㑹口縣一百一十里鄰水故城在今鄰水縣北寰宇記縣在渠州東南一百三十里漢宕渠縣地梁大同三年置鄰州因山水以名之􅀉理州城隋開皇三年自州城移於岳池溪今縣北九里是故城也唐武徳二年自故城移於今理寶厯中山南西道節度使裴度奏廢之大中初又改置與地紀勝乾徳四年移縣治崑樓鎮在州東南一百五十里按九域志縣有鄰水鎮葢即故縣也相如故縣今蓬州治隋書地理志巴西郡相如縣梁置梓潼郡後魏郡廢舊唐書地理志漢安漢縣地寰宇記縣在果州東八十五里梁天監六年置即漢司馬相如所居之地因以名縣元統志宋淳祐三年四川制置使余玠以相如縣接近蓬州營山縣界旁有雲山近去嘉陵江十有五里其山崇峻乃營立砦柵俾縣民附入雲山保聚寶祐六年郡守張大悦以城歸附遂以相如縣撥屬蓬州至元十五年蜀定令毁雲山砦復以軍民還舊理然此州從昔依山為治距相如縣嘉陵江一百餘里不當水陸舟車之㑹乃徙州於此為理所建宣撫征南都元帥府並蓬州總管軍民府二十年並廢按周隋蓬州在今營山界唐宋蓬州在今儀隴界元時始治相如前後凡三徙也岳池故縣在今岳池縣西北舊唐書地理志果州岳池縣萬􅀊通天二年分南充相如二縣置初治思岳池開元二十年移治今所寰宇記在廣安軍西北一百二十里明統志在廣安州西六十里舊志舊治伏江里洪武初移治翔鳳山南漢初廢縣在南充縣南隋志涪陵郡漢初梁置新興郡西魏改郡曰清居名縣曰漢初開皇初郡廢元和志縣東南至合州一百九十四里本漢墊江縣地後魏於此置漢初縣屬合州寰宇記梁大同中於以臨古朗池為名寶應元年租庸使徐演奏自果州割屬蓬州大厯五年遭賊焚燒自後權置行縣未立城壁貞元元年移於營山歇馬館為理即今縣也唐志朗池縣寶厯元年省開成二年復置九域志大中祥符五年改曰營山在蓬州南六十里元統志宋淳祐初余玠移縣治雲山至元十五年蜀定復還舊治西至相如縣五十里明統志在蓬州東六十里按通典新唐志九域志元統志皆作朗池而舊唐志寰宇記作郎池未知孰是良山廢縣在營山縣東北漢宕渠縣地東晉後為獠所據地名恒陵梁置安固縣同置蓬州於此周書梁州所管地名恒陵者方數百里並生獠所居恃其險固常懷不軌天和三年獠叛總管長史趙文表討平之除文表為蓬州刺史隋書地理志清化郡安固縣梁置周置蓬州大業初州廢寰宇記良山縣在蓬州東七十二里梁大同元年分宕渠縣地置安固縣取安靜永固為名屬伙虞郡隋開皇三年罷郡以縣屬蓬州大業中州併入宕渠唐武徳元年於縣理置蓬州開元二十九年州自此移理蓬池縣改安固縣為良山縣元和中廢大中中又置宋史地理志熙寕五年省良山縣為鎮入伏虞建炎二年復置元史地理志至元十二年併入營山舊志營山故城在今縣東北八十里宕渠廢縣在營山縣東北漢縣在今渠縣界梁改置於此隋書地理志宕渠郡宕渠縣梁置並置景陽郡開皇初郡廢舊唐書地理志縣舊治長樂山長安三年移治羅穫水寰宇記廢宕渠縣在蓬州東一百里梁太清元年於此置景陽郡及宕渠縣因縣界山為名唐寶厯元年併入蓬山大中中又置宋乾德三年併入艮山伏虞廢縣在儀隴縣東隋書地理志清化郡伏虞縣梁置曰宣漢又置伏虞郡開皇初年郡廢十八年改焉寰宇記縣在蓬州東北六十里漢宕渠縣地梁大同中於今縣東三十里置宣漢縣屬義安郡隋置蓬州改為伏虞縣以界内伏虞山為名大業三年屬清化郡武德元年復屬蓬州移理於山頂開元末百姓請去險就平遂西南移於消水側今縣是也元志至元二十年併伏虞入儀隴舊志廢縣在儀隴縣東八十里蓬池廢縣在儀隴縣東南隋書地理志巴西郡大寅縣梁置唐書地理志蓬州武徳元年以巴州之安固伏虞蓬州之儀隴大寅渠州之宕渠咸安置開元二十九年移治廣德元年更大寅為蓬池後省開成元年復置舊唐書地理志縣舊治斗子山後移治鬬壇口寰宇記蓬州東至達州三百二十里南至渠州一百九十里西至閬州二百里北至巴州二百十里治蓬池縣漢閬中縣地梁天監元年分置大寅縣取大寅山為名元統志宋淳祐三年制置使余玠以蓬州舊治經兵革廢移治於營山縣界雲山上以蓬池屬之至元二十年併入儀隴舊志蓬池故城在今儀隴縣東南六十里渠江廢縣在廣安州