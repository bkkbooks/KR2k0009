寇征討弗克諸夷曰趙尹來即降於是辟彥至諸夷皆納款事聞詔增彥秩後卒於官歐陽選衡陽人正德中知筠連縣三江蠻叛與守備何卿併力禦之邑賴無恙時總兵欲議招撫選力辯其非又白去大田增稅邊民稱便嚴清雲南後衛人嘉靖中知富順縣公廉恤民治聲大起杜傑黄岡人萬厯中知長寕縣適􅀊歉賑活甚衆時九絲初定􅀧酋内訌拮据調劑卓有鴻勛後採木山中値水涸露禱於天忽大雨如汪木遂出先是西南夷騷動喜功者多議􅁹傑曰不可民方疲於力役又驅以戰吾恐邊地險阻徒勞罔績也當事弗聽卒致覆敗人服其先識徐大禮㑹稽人官長寕主簿興文知縣張振德來署縣事與之善天啟元年奢崇明反振德還死興文長寕亦陷大禮曰吾不可負張公一家四人仰藥死贈同知鄭朝棟湖廣人知馬湖府奢賊亂朝棟率士與參將王懋官軍龍湖山長寕高珙諸縣俱穫安全又招降瀘部夷數百家俾歸侵地部屬黄蝍磨波諸夷俱感畏安謐念郡民兵役煩困多所蠲免平奢賊有功總督朱燮元與李仙品劉可訓盧安世並列上升任去民建祠祀之盧安世貴州赤水衞人為富順教諭奢崇明反遣其黨來取縣印知縣棄城遁安世收兵率壯士擊斬賊無何賊數萬猝至安世赴鬬手馘數人詣上官請兵復其城擢僉事監軍討賊屢戰有功進參議王碩輔貴州人南溪知縣奢崇明陷其城死之贈尚寶卿龔萬禄貴州人建武所守備奢崇明反衆推萬禄主兵事與指揮李世勛戮力固守殺賊無算及城陷世勛率家屬自焚死萬禄手刃兩妾兩孫自刎不死大呼馳出賊不敢逼走至敘州乞師於巡撫朱燮元復建武㑹官軍敗於江門賊四面攻之與子崇學力戰死贈都督僉事立祠祀之本朝乾隆四十一年賜諡烈愍張振德崑山人興文知縣奢崇明反與妻錢氏及二女俱伏劍死一門死者十二人贈光禄卿諡烈愍立祠祀之劉希文興文教諭張振德死代縣事甫半載賊復攻城誓死不去妻白氏亦慷慨願同死城破夫婦並罵賊死艾吾鼎漢川人興文知縣署宜賓縣事崇禎中張獻忠陷城死之闔門被難四十一年本朝乾隆賜諡烈愍徐餘慶新城人珙縣知縣崇禎十七年流賊陷蜀守􅀌城被執不屈死子文斗請以身代並遇害本朝乾隆四十一年賜諡節愍本朝薛起元韓城人順治初知筠連縣惟蒼頭一人掃除執爨事皆親理不假手吏胥人服其清正卒官貧無以殮邑人祠之趙家駿忻州人康熙十一年知南溪縣時蜀省初定城郭未修値吳三桂叛家駿自度守禦無具而􅕄司守土不可委去遂自經死錢紹隆海鹽人康熙十九年知富順縣盡心保障安戢殘黎調協軍伍周貧乏掩遺骸乆而人益思之祠名宦顏斆宛平人康熙二十年知敘州府時滇寇未殄戎馬倥偬斆捍禦有方保障􅀌城民賴以安堵何源濬丹徒人康熙二十一年知馬湖府値進􅁹滇冦源睿身親輸輓民不􅅰而軍食足百姓逸散者給牛種招徠之後夷猖獗源濬嘗單騎撫勞生夷懾服陳聶恒武進人康熙中知長寕縣撫字有方聽斷明敏課士子興文教捐置後江渡口義田並造清溪橋邑人懷惠焉房度貴筑人雍正十二年知隆昌縣多惠政聽訟明敏隣邑爭來赴愬政聲翕然陳九齡福建人乾隆四年知珙縣能以寛服民親訓士子多所成就李兆錦鍾祥人乾隆十三年知高縣實心實政不事矯激遺愛在人久而彌彰王采珍濱州人乾隆十七年知南溪縣創建義學置義田以供脩脯政簡刑清一時稱循吏焉熊葵向安邑人乾隆十八年知富順縣居官以崇化善俗為務創建書院置學田資膏火去官士民祠之魯華祝新城人乾隆四十七年官馬邊通判有幹濟才令民墾種黑河等地人􅀩其利惠民興學百廢修舉潘邦和仁和人乾隆五十一年知富順縣澹泊廉靜與民休息加意學校人材蔚興人物漢隗相僰道人養母至孝母食欲江中正流水相冬夏汲之一朝有橫石生正流中哀帝世察孝廉平帝世為郎石在馬湖江人謂之孝子石任永僰道人好古博學公孫述連徵命侍以高位託青盲以避世述誅光武聞而徵之㑹病卒吳順僰道人事母至孝赤烏巢其門甘露降其户察孝廉官水昌太守宋李英恪富順人嘗與丁處榮誅王均擢知冨順監子見讀易於神􅀛山著易樞五卷天禧中詔附驛以聞見終隱不起丁處榮富順人咸平間王均叛圍富順處榮以計擒斬之殺其餘黨擢榮州刺史劉孝誠富順人性至孝親喪廬墓百芝草之祥李見紀其行於學之雁塔李夔富順人既葬父母廬墓有白虎白烏馴擾之異廖翰宜賓人少以孝義聞嘗有蠻叛翰與戰於馬鳴溪敗陷溪中數里不沒時皆異之廖琮翰子嘉祐進士官至朝議大夫未五十即致仕教授鄉閭多所成就搢紳高之子有衡亦由進士官朝議大夫黃庭堅與善呼為緑荔枝廖氏斗葢長寕人嘉祐二年夷謀入寇葢先以其事來告淯井監引兵趨之捕斬七千餘級事聞詔賜葢錢三十萬并錦袍銀帶尋補長寕州刺史李文淵富順人治平進士官至朝議大夫蔡京奇其才欲招致之乃謝病歸王默僰道人治平進士授什邡主簿時調夫築洛口堰其功十萬默酌民言而賦省不閲月告成遷通泉令適􅀊饑甚不待報而發廩遂太雨邑有十頃渠久堙為民病因决其原注之江􅀊以大熟民畫像祀之神宗時從計乞弟師還以瘴癘不能歸者數萬人默請以運糧虛舟載還分令將護以卒之存亡為殿最全活者十七八程公許宣化人與兄公說公碩俱登嘉定進士為綿州教授制置使崔與之大加器賞改知崇寕縣人甚徳之淳祐中為起居郎右史徐杰暴亡請盡情研究公論韙之中批復鄭清之子士昌官職公許繳奏寢其命章言等以論執政出公許又力爭之公許沖淡寡慾蜀有兵難族姻奔東南者多依以居所著有塵缶文集後致仕卒贈宣奉大夫官其後司馬夢求敘州人温國公光之後景定中進士咸淳末調江陵沙市鹽鎭沙市地利險固恃水為防德祐中水忽涸元兵來攻乘南風縱火都督程文亮戰敗降夢求朝服望闕縊死明喻良高縣人洪武中厯官太僕卿廣東按察使寛平明允有聲於時鮮源馬湖泥溪人永樂初由國子生知階州奉公守法勸民勤農治生多善改遷山東鹽運同知熊宗魯南溪人由貢生厯官勤能升山西參議永樂中遷交阯參政皆有政聲李從智宜賓人永樂進士任大理評事讞獄無􅁈升知蘇州府以廉能著郡多淫祀家署小廟於門從智見之一日毁去後謝病歸遂不出晏鐸宜賓人永樂中進士厯按兩畿山東所至有聲坐言事謫上高典史鄰境盜發官兵不能討鐸捕滅之歸所掠於民與劉溥等號景泰十才子著有青雲集馬虎馬湖平夷人永樂進士官翰林持身清介孝養祖母損産惠族鄉評重之張益南溪人景泰初知京山縣積穀萬餘石􅀊饑盡發以賑貧民全活者數萬周洪謨長寕人正統進士授編修景泰元年疏勸帝親經筵勤聽政因陳時務十二事再遷侍讀憲宗嗣位復陳時務言人君保國之道有三曰力聖學曰修内治曰攘外侮帝嘉納焉成化改元廷議討四川都掌蠻洪謨上方畧六事詔付軍帥行之進尚書加太子少保卒諡文安著四書五經論疑及南皋子箐齋集子汝瑞成化間舉人厯中府經厯劉瑾伏法條上五事俱見嘉納出守銅仁興學撫叛民皆懷服升參政歸李人儀隆昌人景泰進士授御史以忤石亨曹吉祥謫襄陽知縣尋擢荆州知府守臣上其居縣時治行特賜封誥吳道宏宜賓人天順進士在諫垣時上言星變詞甚切成化中厯南大理卿出撫鄖陽綏輯流移民賴以安左明善富順人天順進士成化間知臨安府廉敏有為民皆畏愛交人寇邊榜諭以禍福即退去馬成長寕人知祁陽縣秩滿應遷百姓赴闕請留憲宗命復任三年鄉民中至老不見官府者偶至縣庭長揖不跪左右叱之成嘆曰使吾民皆如是胥與葛天氏遊矣禮而遣之劉忠南溪人成化進士厯户部郎守正不阿見萬安當國引病而歸事母至孝子孫兄弟相斷登科劉景寅南溪人宏治進士厯户部員外郎莅政廉謹劉瑾招致不從勒為民瑾誅升陜西參政武宗北狩諸吏皆趨行在景寅坐鎭城中日理煩劇卒於官楊璞南溪人宏治進士授户部王事早􅀌事母以孝聞友愛伯兄甚至母喪畢赴部候期忤劉瑾即引歸居家二十餘年不入公門祖産悉以讓兄又資嫁族女之無依者鄧萬斛富順人宏治進士知寕鄉縣民籍多詭入寄莊以避役萬斛正之民徭用省晁必登宜賓人宏治進士任徽江通判守貪暴必登以廉佐之政暇好與諸生講易郡民充板橋江川驆籍者多破産流亡必登請征銀解馹迄今賴之攝廣西曲靖武定同知皆有惠政厯雲南右參政李傅珙縣人宏治進士知襄陽府時土賊合鄢賊寇諸縣督兵悉擒捕之尋以憂歸再知惠州除徵役加派請蠲􅀍水田租民困蘇息升巡海副使􅁹平海寇吏部奏天下卓異第一轉貴州參政權布政使事年餘致仕歸代者視庫得羡金七百餘送宅傅笑曰義可取則取之矣固􅁍不受熊過富順人嘉靖進士選庶吉士厯禮部郎中著周易􅁚旨春秋明志録行世謝廷􅉅富順人嘉靖進士知新喻縣治最擢給事中御史胡鰲建言被謫抗䟽救之雷震謹身殿疏陳修省數事既而偕同官諫帝南巡詔下獄謫雲南典史累遷浙江僉事侍養歸遂不出隆慶􅀄吏部奏起遣佚不赴萬厯初巡撫曾省吾奏廷􅉅隱居三十年家徒四壁樂道著書宜特加京秩風勵士林詔即家進太僕少卿范懋和富順人兵備潼關嚴除蠧役建城鋪五十一所韓邑山寇蒲渭桀盜華雒礦徒悉就蕩平祀名宦蘇奎章筠連人嘉靖中諸生從父入山猝遇虎奎章倉惶泣告願舍父食己虎曳尾徐去後爲岷府教授郭成敘南衞人由世職厯官蘇松副總兵倭掠崇明三沙成擊沈其舟隆慶初遷廣東總兵官破海寇曾一本擒叛將周雲翔平潮州盜林明等萬厯元年副劉顯征都掌蠻先登九絲山生縶阿大初成父爲蠻所殺乃以所斬首及生擒諸蠻置父墓前割心致祭鄉人壯之總兵於銅仁每苗出掠潛遣人入其穴斬馘出苗以爲神嘗挺身入林箐察賊苗一日三四驚相戒莫敢犯劉季體宜賓人萬厯中知竟陵縣􅀊饑捐俸三百緡代完逋賦襄鄧水漲大璫欲曲防有害於縣季體毅然爭之遂罷歸陳暹富順人萬厯中知鄖陽縣時中官爲礦使所在大擾至鄖暹言礦脈已絶鄖得報罷胡一夔興文人官龍陽縣丞罷歸里居樊龍之亂被執不屈死尹伸宜賓人萬厯進士授推官厯升蘇松兵備參政公廉强􅀡不事媕阿三任皆投劾去天啓時起故官厯湖廣左右布政以失禦流賊罷歸張獻忠攻陷敘州罵賊不屈死之本朝乾隆四十一年賜諡忠節聶繩昌富順人天啓中奢崇明之亂毁家募義勇禦賊戰死廕其子方明棟富順人天啓初為平越府同知監軍進討水西賊遇害贈按察使僉事又隆昌李師聖天啓時大同推官遇流賊陷城闔家死難宋世第富順人奢酋叛世第寓建武賊將至安邊郡丞適他出世第矯丞檄發庫金以給兵守城賴以全事定自陳請納鏹伏罪丞聞之撫軍朱燮元燮元曰此有用才也徵詣軍門贊機務口不言功而自以拔貢資格入都選新建丞升雲南新平令擢知彌勒州皆有惠政朱芹富順人萬厯進士以右參政分守平越安邦彥圍平越芹歃血誓衆募兵堅守城乃安後升布政使劉時俊隆昌人萬厯進士厯江南數縣令有能名於吳江尤著治績下車即令民具沿門冊就冊摘大憝具數其隱罪人以為神徵輸先分緩急賦辦而民不困修湖塘路八十里民稱為劉公隄升南給事晉太僕卿告歸適奢酋叛據重慶乃上疏請討朝命贊畫督兵加兵部右侍郎崇禎初追録復渝功再贈尚書劉之綸宜賓人天啓初舉鄉試値奢崇明反倡父老守城上書監司請拒賊歸路監司不能用賊得渡瀘逸去崇禎元年第進士改庶吉士與同館金聲友善相與結賢豪養死士備國家緩急用明年冬都城􅀍兵數上書陳方畧帝壯之金聲薦之綸知兵即超擢兵部右侍郎副尚書閔夢得協理京營戎政製木為大小礮百餘具又製獨輪火車偏廂車獸車皆輕㨗利用請精兵為進攻計㑹大兵拔遵化永平援軍觀望獨之綸奮前兵交時礮炸營中自亂之綸慨然曰受天子厚恩捐軀以報戰不㨗死耳敢言退者斬乃再戰自辰至酉矢盡短兵接之之綸知不可為大呼曰死不􅀒天子恩解所佩印付家人曰持此歸報朝廷俄身􅀍兩矢遂死天子稱其忠進贈兵部尚書録一子入國學本朝乾隆四十一年賜諡忠烈袁樑珙縣人萬厯選貢任荆州府通判升同知子向科天啓舉人厯懷慶同知旋里値獻賊亂父子兄弟闔家殉難本朝乾隆四十一年賜向科諡烈愍楊爾銘筠連人崇禎進士授桐城知縣㑹流賊圍城爾銘以民兵格之賊退無何賊勢愈熾躬率士民防守不懈孤城卒完擢御史樊一蘅宜賓人崇禎進士授襄陽知縣有聲入為銓部郎人不敢干以私後為寕夏巡撫歸里値蜀亂諸鎭將跋扈一蘅正色責之咸懾服年七十八卒弟一若生平言行不茍居父母喪六載不入私室後為劍州知州卒於官王信宜賓人崇禎中知呈貢縣土酋普名聲叛撫鎭令信為監軍敗績罵賊死加僉事本朝乾隆四十一年賜諡節愍魚嘉鵬宜賓人篤學力行獻賊遣偽官至郡嘉鵬倡義殺之城破賊搜獲究其黨厲聲曰我自為之恨不能殺獻賊耳他人何與賊磔之同縣舉人周元孝諸生李師武王應世晏正寅熊兆桂劉苞均罵賊不屈死本朝乾隆四十一年俱予入忠義祠李合宗宜賓人寕夏巡撫樊一蘅之壻獻賊陷蜀搜執之意藉以招一蘅合宗不從械至成都罵賊被害又諸生梁為憲亦一蘅壻與合宗同志並死於成都本朝乾隆四十一年俱予入忠義祠曾印昌宜賓人敘州衛世襲指揮同知升遊擊守白水江獻賊圍成都死之本朝乾隆四十一年賜諡烈愍張祖周慶苻人有學行獻賊陷蜀語其友曰百年有盡貪生何為遂赴潭水死同縣貢生何察獻賊陷城自縊死察子五􅀊拊棺號痛不食卒本朝乾隆四十一年俱予入忠義祠董我前富順人崇禎中知衡山縣􅀊旱祈雨暴行烈日中十六年獻賊陷衡山死之年本朝乾隆四十一賜諡節愍本朝樊敘倫宜賓貢生幼􅀌奉母避吳三桂亂為賊所執迫以書記敘倫以母老泣告賊為感動縱之母死哀毁骨立何瑞圖南溪人呉逆亂居人盡逃已獨留侍父病賊憐而釋之兄被賊掠瑞圗追挽之賊推瑞圖墮水附斷木得不死事繼母以孝聞後任郫縣訓導卒祀鄉賢祠李之藻珙縣人順治庚子舉人任合州教職勤於訓士動必以禮吳逆亂引歸不出卒祀鄉賢祠樊澤達宜賓人康熙乙丑進士累官翰林院侍讀値寇亂奉親避兵越溪家貧􅀒米百里外徒跣供爨嘗於僧寺授徒往來水道一日駕筏至漁窩沱觸石落水聞水中有人呼曰此孝子也若有掖之出者得不死弟澤迥四􅀊失母哀慟不離喪次八􅀊能屬文與兄􅀒米養父寒署不輟鄧乾宜賓人諸生家貧授徒養親父病篤乾質子以備喪具李謨富順人康熙甲子舉人慷慨好義嘗數千里歸友人之喪知太康縣有廉名致仕歸授徒講學學者稱峑山先生張奇星屏山人康熙十九年吳逆餘孽據馬湖百姓驚逃奇星結親族鄉勇百餘人擊賊走之郡賴以安范嗣鎭珙縣人康熙壬午舉人侍養父母無違志以親老不赴選及殁葬祭悉如典禮乾隆二年旌郭克廣隆昌人父忠懿官監紀通判殉節於黔克廣年十二自黔奉祖寓播晝􅀒薪夜讀書祖殁哀毁逾禮吳逆亂隱居教授敘瀘問從學者百餘人李宏鑒未詳官秩里居康熙間以將備征吳逆餘黨力戰死賜祭葬贈都督僉事曾竒宜賓人官外委乾隆十年隨征金川陣亡同縣千總何其勲三十七年陣亡千總魏元相三十八年陣亡䘏􅄻各如例楊元龍富順人官外委乾隆三十六年隨征金川陣亡卹廕如例向朝選長寕人官把總乾隆間隨征金川陣亡卹廕如例傅正伸興文人官把總乾隆間隨征金川陣亡卹廕如例朱煜屏山人官外委乾隆間隨征金川陣亡卹廕如例趙廷梁馬邊人官外委乾隆三十七年與同廳外委胡永華俱征金川陣亡卹廕如例杜倫宜賓人官外委嘉慶元年與同縣戰兵權安邦隨征黔楚逆苗陣亡卹廕各如例何勝華屏山人官守備嘉慶元年與同縣把總王竒英俱隨征黔楚逆苗陣亡卹􅄻各如例吕廷超馬邊武生嘉慶元年與同縣􅄻生趙璠俱隨征黔楚逆苗陣亡卹廕各如例張永清雷波人官千總嘉慶元年與同廳千總余海外委秦申俱隨征黔楚逆苗陣亡卹廕各如例流寓宋黃庭堅分寕人神宗時實録檢討官章惇蔡卞論實録多誣貶涪州别駕黔州安置言者猶以為處善地遂移戎州泊然不以遷謫介意蜀士多從之遊講學不倦凡經指授下筆皆可觀列女漢張貞妻黃帛僰道人貞受易於學士韓子方去家三十里船覆死貞弟求尸不得帛往沒處自投水中積十四日持夫手浮出時人語曰苻有先絡僰道張帛相登妻周度僰道人年十九登亡中牟令吳厚求之斷髪以誓志後人猶欲求之乃割其鼻養子早亡其妻左亦年十九遂俱守義以終尹讓妻韓姜僰道人年二十讓亡資中董臺為弟求妻不許臺門生左習王蘇教姜家言母病迎還因逼成婚姜聞故自殺太守巴郡龔揚哀之為殺習蘇宋司馬夢求母程氏敘州人于歸及門夫死誓不他適旌其門曰節婦夢求其族子取以為後明張奎妻何氏宜賓人早寡事姑撫子以節終洪武中旌王伯英妻蹇氏慶符人早寡守節洪武中旌杜高賓妻劉氏宜賓人夫溺死劉入水從之以救免乃密取夫故巾襪繫肘間以毒和餅食之姑驚視猶持半餅大言曰今日得為杜門鬼矣遂絕年二十五同縣張閙妻陳氏張文星妻廖氏樊斗卯妻文氏均夫亡守節車軫妻張氏長寕人守節六十一年年八十五卒宏治中旌同縣李繪妻沈氏蹇文卿妻李氏馬純妻龎氏李元勲妻楊氏侯啓雍妻朱氏均以夫亡守節周孟端女富順人正德癸酉遭賊亂女匿巖穴中賊搜得之女投江死時年十九賊去父母哭於江濱屍忽浮水出劉福夀妻魏氏富順人夫殁守節丁承教誨後登科甲嘉靖中旌同縣楊炌妻陽氏萬鼒妻徐氏周衡妻楊氏甘芹妻駱氏均夫亡守節談本立妻楊氏南溪人年十八適談未一月夫亡翁姑繼殁夫弟方二􅀊楊撫之成立同縣羅秉禮妻劉氏夫亡中節張仲雍妻韓氏珙縣人嘉靖丙午土賊刼掠仲雍􅀍殺韓抱女投崖賊引藤下援韓罵賊死羅氏女冬兒長寕人萬厯中山都夷阿苟之亂被執不屈賊支解之郭懋宏妻楊氏富順人通書史工文翰適隆昌庠生郭懋宏未踰年懋宏卒氏書誓詞於帶曰妾心一片鐵不與紅爐滅㷀㷀未亡人茹苦肱九折一死輕鴻毛豈受風塵紲妾髪可剪頭可截趙二年夫弟生次子亟請於舅姑立爲嗣名孝懿至七􅀊氏曰可以死矣遂自縊天啓年間旌魏天威妻何氏高縣人天啓中奢酋犯縣何攜二妾何氏張氏避匿三角巖遇賊聯袂同赴水死詔建三烈坊同縣陳徵女三姑幼許聘王應昌流賊至避絡角硐中賊破硐欲犯之投水死彭儒妻郭氏筠連人年二十二守節孝事舅姑同縣李霖妻詹氏夫亡守節李永年妻蘇氏筠連人天啓中奢賊至掠以行至鳴鳳岡墜崖死同縣蘇亮工妻母氏崇禎乙酉流賊破城被獲亦墜鳴鳳岡死陳登産妻尹氏陳臺妻羅氏同避流賊於落瓦硐賊破硐被執不汚俱投崖死瞿蕙妻張氏馬湖人年二十一守節至八十􅀊終沐川土司方太平妻安氏早寡守節養姑撫子逾二十年姑歿安哀毁成疾不數日卒樊一若妻李氏宜賓人樊一蘅弟婦事舅姑以孝著崇禎中獻賊至􅀍執時一蘅為總督賊繫李於郡以招之李呼曰總督奉命討賊必殄汝􅀋乃止繜我何為大罵遇害妾夏氏同時被執賊百計誘之終不從罵益厲賊懸其髪於梁叢射死樊一蓬妻張氏為賊執訊其夫所在曰死矣爇火熾之至死不吐實時樊家死難者男女凡二十五人同縣尹伸妻邵氏妾夏氏尹恩妻楊氏尹妻樊氏劉之綸妻楊氏余智妻李氏均遭賊不屈死劉堯銓妻熊氏富順人堯銓病熊割股以救竟不起孀居數載張獻忠破城罵賊被殺袁梁妻胡氏珙縣人獻賊至與子向科妻楊氏闔門殉節范璵妻胡氏隆昌人獻賊至隨夫避於明通寺賊並執之胡攜女同罵賊死劉兹妻盧氏隆昌人獻賊至兹被殺執盧迫之行盧曰必見夫屍埋之乃去及至抱屍痛􅂘罵賊死本朝蕭參將妻劉氏富順人順治己亥蕭出鎭雅黎劉寓雲南楚雄吳逆亂泣將七􅀊子付家丁送蕭所手刃㓜女取壁間驛梅驚别意隄柳暗離愁句用離合體賦詩十絕遂自經陳士仁妻晏氏富順人流賊擾境氏被執不從厲聲以詈賊怒縛之投諸烈火焚死王子蕃妻尤氏富順人守節養姑姑肓尤毎晨起跪而舐之目復明又嘗為姑吮癰得愈樊澤迥妻尹氏宜賓人嫁四載夫卒欲以死殉姑泣諭乃已孝奉翁姑撫子成立同縣節婦趙發祥妻袁氏趙喧妻吳氏趙士先妻張氏黃道開妻張氏夏之璜妻李氏俱康熙年間旌楊師震妻蔡氏富順人夫亡欲殉宗族以親老子㓜勸事姑撫子苦節以終同縣涂朝卿妻郭氏夫病禱以身代竟不起守節事姑康熙年間旌李天樞妻陳氏富順人夫亡哀毁臨窆觸石以求同穴姑曰爾死如遺􅀌何乃止繼喪姑子亦旋逝又撫數月孫成立康熙年間旌張文富女南溪人及筓未字同鄰女避寇江濱寇波江衆女􅀍執女奮身躍江中賊相顧駭散執者皆得脫因共祠之侯鼎妻胡氏南溪人年二十夫殁或勸他適截髮自誓撫二􅀊􅀌成立與同縣節婦王如玉妻翟氏均康熙年間旌董世俊妻何氏筠連人夫亡守節事孀姑養葬如禮撫夫兩妹得所歸課子勤耕里人呼其田曰節婦田同縣節婦羅邦傑妻陳氏陳夢筆妻詹氏郝蕘妻詹氏均康熙年間旌張服仲繼妻蹇氏屏山人張官崇慶訓導蹇留養七旬舅姑張卒氏孝養愈謹撫前妻子與己子辛勤如一康熙年間旌丁元卿妻胡氏富順人夫早亡孀姑六旬藐􅀌八月辛苦養侍撫子成立同縣節婦李九河妻王氏王夢卜妻李氏均雍正年間旌楊師文聘妻羅氏冨順人夫亡匍匐奔喪事姑誠孝姑殁數十年言輒流涕任覺民妻李氏南溪人夫亡養姑撫弱息節孝著聞雍正年間旌曾茂先聘妻王氏屏山人未婚守志勤女紅以養父母雍正年間旌權世魁妻王氏興文人權爲建武營兵戌金沙江暴疾亡氏聞自縊以救免數日不食􅂘奠喪前徧延鄰里託以三􅀊孤夜復縊死方如川妻王氏宜賓人夫亡守節同縣節婦毛應第妻單氏李萬詔妻熊氏韓元龍妻文氏韓元鳳妻張氏樊炳妻胡氏阮仁蒟妻李氏劉汝梅妻樊氏胡世芝妻趙氏媳朱氏王璪妻孫氏彭大泌妻李氏曾洪美妻李氏林安榮妻李氏李天佐妻宋氏均乾隆年間旌王德溥妻郭氏慶符人夫亡守節同縣節婦梁光順妻牟氏均乾隆年間旌唐珩妻楊氏富順人夫亡守節同縣節婦王紀肅妻陳氏張映妻蕭氏王劻妻楊氏胡宗任妻龔氏李仁修妻陳氏李璞妻王氏王近仁妻周氏王瑶妻徐氏蕭和永妻徐氏張鉞妻黃氏李兆鳳妻李氏張錫圖妻王氏周紹濂妻汪氏李苯妻黃氏烈婦萬世晟妻倪氏朱文斌妻倪氏廖文祥妻趙氏郭萬珠妻傅氏田如志妻李氏烈女郭殿榮女二姑均乾隆年間旌郭維墉妻雷氏南溪人夫亡守節同縣節婦葉芃妻高氏徐世貞妻劉氏周應祥妻彭氏張懋民妻羅氏帥以葉妻黄氏高瑾妻沈氏張仁達妻劉氏侯瓊妻周氏譚誠妻張氏趙信琴妻李氏黃寶訓妻鄧氏劉子明妻胡氏尹世弟妻李氏均乾隆年間旌熊良才妻李氏長寕人夫亡守節同縣節婦胡劍妻程氏均乾隆年間旌毛一鳳妻周氏高縣人夫亡守節同縣節婦魏作舟妻詹氏段希舜妻李氏均乾隆年間旌應琳妻鞠氏筠連人夫亡守節同縣節婦傅英妻葉氏楊蒼植妻詹氏陳易妻張氏王良柱妻劉氏魏思敬妻胡氏文必顯妻向氏何籛妻詹氏劉淮妻張氏尹至愼妻程氏詹紹思妻杭氏貞女賈尚璧女均乾隆年間旌譚永錫妻王氏珙縣人夫亡守節同縣節婦李兆鼎妻袁氏均乾隆年間旌張懷義妻李氏興文人夫亡守節同縣節婦李石璠妻袁氏羅璵妻茍氏羅文彬妻陳氏均乾隆年間旌王文明妻李氏隆昌人夫亡守節同縣節婦雷首魁妻劉氏郭復新妻吳氏晏恔妻喻氏楊維信妻邱氏均乾隆年間旌任應孝妻李氏屏山人夫亡守節同縣節婦任國相妻李氏均乾隆年間旌陳宗富妻彭氏馬邊人年十八夫亡無子矢志不二爲翁逼嫁自縊死同廳烈婦許世泰妻李氏早寡撫孤夫兄受聘逼其嫁自戕遇救免復投繯死均乾隆年間旌張信弼妻黃氏雷波人守正捐軀乾隆年間旌歐文亮妻劉氏宜賓人夫亡守節同縣節婦柴萬尺妻龔氏樊選妻張氏樊鵬妻楊氏李政妻尹氏彭家模妻杜氏張宣祖妻羅氏胡世文妻方氏劉奎林妻楊氏郭宣立妻尹氏張鳳騰妻王氏雷暲妻俞氏胡承緒妻陳氏蔣宗恒妻劉氏烈婦葉某妻董氏貞女謝秀英均嘉慶年間旌嚴太鴻妻李氏慶符人夫亡守節同縣節婦鄭國祥妻簡氏烈婦嚴某妻陳氏均嘉慶年間旌李英妻王氏富順人夫亡守節同縣節婦李兆端妻王氏趙如鵬妻郭氏張其轍妻羅氏王詠仁妻宋氏張學源妻田氏袁明舉妻李氏王卉芳妻李氏向德潮妻黄氏蔡瓊妻李氏蔡爲敬妻郭氏王清蕙妻汪氏林開萬妻羅氏張品輝妻黃氏蕭上㰴妻王氏烈婦晏時春妻黃氏烈女王五姑均嘉慶年間旌傅友松妻劉氏南溪人年二十一夫亡孝飬祖姑鞠育穉子苦節五十年嘉慶年間旌胡君聘妻葉氏長寕人夫亡守節同縣節婦曾澤溥妻羅氏謝代孟妻黃氏雍大成妻李氏劉元魁妻韋氏均嘉慶年間旌田元相妻閔氏高縣人夫亡守節同縣節婦魏作霖妻嚴氏均嘉慶年間旌楊鐸妻詹氏筠連人夫亡守節嘉慶年間旌王言綸妻周氏珙縣人夫亡守節同縣節婦趙尚乾妻楊氏武彭齡妻許氏烈女宋姑均嘉慶年間旌胡日煌妻蕭氏興文人夫亡守節同縣節婦張妻石氏石鑾妻曹氏均嘉慶年間旌李春漋妻粟氏屏山人夫亡守節同縣烈婦李文明妻王氏貞女李癸姑均嘉慶年間旌游開科妻趙氏馬邊人開科贅於趙氏母兄皆厭憎氏因脫簪珥賃屋而居雖嘗絕糧不肯向母兄乞升合一日歸母家方食夫至氏以食餉母兄詬誶逐之禁女勿歸氏悲憤自經死仙釋南北朝周劉眞人武帝時隱戎州山中得道按此即劉珍又見瀘州宋彥室敘州人紹興中嘗行山中遇道人款語以腹枵告歸道人笑以肘捫其腹者三室􅉐覺具常歸即辟榖踰年復夢見道人啖以􅀥呼之過溪室曰吾有親在乃止後隱去不知所終法眞敘州人自㓜好道術延祐間往龍虎山受籙得法歸禳災治疾皆有竒效既卒鄉人立廟明王守中泥溪司人自㓜學仙於後山鑿洞調息十餘載一日有異人來訪因引之去後十八年復還家曰來救兄死時凡已入棺命取出以水浸之復甦後與兄共引去土産葛唐書地理志戎州貢葛纖宋史地理志敘州富順有葛麻布元和志戎州貢鹽寰宇記富順監有鹽井人享厚利故曰富世唐改為富義井深二十五尺鑿石以達鹽泉口笻竹明統志府境出苦筍明統志宜賓長寕二縣出黃庭堅云僰道苦筍冠冕兩川荔枝蜀都賦注南裔志云荔枝出南康縣僰道縣唐書地理志戎州貢荔枝煎元和志僰道縣出荔枝一樹可收五十斗寰宇記僰道有荔枝園僰童多以此為業園植萬株藥寰宇記戎州產半夏升麻府志有金星草紫背龍牙仙侣山出仙茅狨皮暖座寰宇記郡國志云僰道有獸名獑猢似猿而四足騰如迅鳥之飛取此皮為狐白之用盈百方成又段氏蜀記云戎人進猓􅛊褥皂褐碧三色相間出馬湖江石門兩路蠻界内銅鼓府境出前提調官臣鄭紹謙㳟纂輯提調官臣張日章恭覆輯前校對官臣沈苐㳟校校對官臣沈維鈺㳟覆校
