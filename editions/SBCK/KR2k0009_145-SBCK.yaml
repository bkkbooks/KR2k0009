五里五龜潭在富順縣治西崖上有突出如龜形者五每陰雨則水面湧沸若有物焉禱􅀨輒應荔枝灘在慶符縣西北二十里即南廣水所經也古崖旁多荔枝樹故名銅鼓灘在南溪縣東明統志在縣學東縣學舊未利近嵗灘之上流生石磧高數十丈壅水自巽方而去自是文物稍振舊志在縣東十里又縣東三里有九龍灘石磧凡九皆狀如龍頭石筍灘在南溪縣西三十里江漲險甚窮冬水落岸有石長數丈如筍鷄公灘在屏山縣東二里崖石如鷄竦立又有鷄肝石灘在縣西四十里結髪灘在屏山縣西十五里灘水縈􅂞狀如結髪故名鐵鎖灘在屏山縣西四十五里馬湖江中夾江兩岸石壁峭立每夏秋水漲舟楫不通用鎖縣於江之北岸舟行至此數人攀緣岸上拽舟而過故名魚符津在南溪縣西寰宇記南溪縣西三十里有魚津津南有鴛鴦圻陳夀益部耆舊傳曰􅈎道張貞過江覆没其妻黃氏求尸不得於溺所自此乃挾夫尸出於灘下因名為鴛鴦圻孟密淵在屏山縣西沐川司界即夷都溪下流至此積而成淵大龍渦在屏山縣西平夷司南二十里流􅚈紋溪合馬湖江鹽井渦在屏山縣北四里半山有池其水鹽鹵相傳舊嘗以之煎鹽故名嘉魚泉在長寕縣東方輿勝覽去城一里馬鞍山之西激石湧出有小魚四時如一不增不長故名釀酒極甘下流入東溪温泉在筠連縣南五十里龍泉在珙縣建武城北關外泉水甘冽一鄉田畝資其灌漑金魚井在宜賓縣南明統志黄庭堅寓居時酷喜茶令人徧汲井泉試之惟此水品爲第一鹽井在富順縣西華陽國志江陽有富義鹽井元和志富義鹽井在縣西南五十步月出鹽三千六百六十石劒南鹽井惟此最大其餘又有井七所舊唐書地理志俗呼爲玉女泉寰宇記井深二百五十丈鑿石以達鹽泉其餘又管大小六井通志今富順縣鹽井上井五十六中井二十下井二百五又長寕縣三井隆昌屏山二縣各一井月巖井在富順縣西凌雲山下清冷芳冽煮茗尤佳葫蘆井在南溪縣西北五十里劉景􅛃嘗取水煉丹鑿井口如葫蘆故名龍女井在長寕縣治西昔人見小女出入井間坐石上理髪故名淯井在長寕縣北泉有二脈一鹹一淡取以煎鹽塞其一則皆不流又謂之雌雄井唐淯州宋淯井監皆置於此前提調官臣鄭紹謙恭纂輯提調官臣張日章恭覆輯前校對官臣沈苐㳟校校對官臣沈維鈺㳟覆校大清一統志敘州府二古蹟僰道故城今宜賓縣治漢書地理志犍爲郡僰道注應劭曰故僰侯國也地理風俗記僰於夷中最仁有人道故宇從人華陽國志僰道縣在南安東四百里距郡百里高后六年城之治馬湖江㑹舊本有僰人故秦紀言僰僮之富漢民多漸斥徙之元和志戎州即僰道縣李雄竊據此地空廢梁大同十年使先鐵討定夷獠乃立戎州即以鐵爲刺史後遂不改僰道縣郭下本漢舊縣地唐㑹昌三年馬湖江水漂蕩隨州移在北岸即今理所其犍爲郡故城在青衣江南七里謂之舊州崖元史地理志唐戎州冶僰道在蜀江之西三江口宋咸淳三年城登高山爲治所元至元十三年復徙治三江口舊志圖經云縣故址有三漢址在府西南中方鄉接慶符縣界一即今治唐太宗時所移一在江北謂之舊州城唐㑹昌中所移也南溪故城在今南溪縣西元和志縣西至戎州五十里本漢僰道縣地梁於此立南廣縣屬廣漢郡隋仁夀二年改為南溪縣避煬帝諱也唐書地理志戎州有奮戎城乾符二年置宋史地理志南溪縣乾德中移治舊奮戎城寰宇記縣在州東一百二十里以在僰溪之南為名按舊志有奮戎州在今縣西七十里舊置李莊驛於此葢即唐時縣治以其嘗為州治故名今治即奮戎城也或謂奮戎城在府南誤又舊唐志寰宇記謂本漢南廣縣周於廢縣置南武戍隋改龍源戍後置為縣與隋志元志皆不同未知何據南廣故城在珙縣西南漢置屬犍為郡晉宋齊皆置南廣郡後沒於蠻隋以後為協州地華陽國志南廣縣漢武帝太初元年置元光五年為犍為郡治孝昭元年郡移僰道蜀漢延熙中置南廣郡晉建武元年省元帝世刺史王遜移朱提郡治南廣後刺史尹奉卻還舊治及李雄定寕州復置南廣郡元和志協州即漢犍為郡之南廣縣也其後蠻夷内侵郡廢隋開皇四年於此置協川大業三年省入開邊縣武德元年開南中復置管縣三東安縣郭下西女縣東南至州二十七里湖津縣南至州六十里寰宇記協州在戎州西南八百里石門路天寶中因雲南破移在州西南四百九十三里馬湖故城在屏山縣西唐書南詔傳乾符元年高駢築戎州馬湖沐源川等城通鑑乾符二年高駢築城於馬湖鎮號平夷軍元史地理志馬湖路古牂柯屬地漢唐以下名馬湖部宋時蠻主屯湖内元至元十三年内附後立總管府遷於夷部溪口瀕馬湖之南岸創府治其民散居山箐無縣邑鄉鎮領長寕軍及戎州舊志元設馬湖路分其地置長官司六曰雷坡曰泥溪曰平夷曰蠻夷曰夷都曰沐川遂創路治於蠻夷司夷都溪口之南岸後因江灘險惡舟楫多艱大德九年遷治泥溪司萬福鄉即今治也至正元年併六司為三二十三年明玉珍復分三司為五明洪武四年土總管安濟歸附改路為府復設五長官司使安氏世守其地五􅀓至安鼇而叛宏治九年討平之改土官為流官按華陽國志云越巂郡有馬湖縣又在元馬湖路西别見雷波廳故高州在高縣南唐書地理志羈縻高州領縣三柯巴移甫徒西隸瀘州都督府元史地埋志高州古夜郎屬境鄰烏蠻與長寕軍相接均為西南羌俗唐開拓邊地於本部立高州宋設長寕軍十州族俱效順元至元十五年雲南行省遣官招諭内附十七年知州郭安復行州事蠻人散居村囤無縣邑鄉鎭舊志唐高州故址在今縣南一百二十里元至元間知州張景移治懷逺砦明洪武中知州王旭復徙治今所故鞏州在珙縣西南唐書地理志鞏州