行聞人稱為河朔三令劉安世魏人為洺州司法參軍杜紘鄄城人神宗時為永年令􅀊荒民􅀅他往召諭父老曰令不能使汝必無行若留能使汝無饑皆喜聽命乃官給印劵使稱貸於大家約􅀊豐為督償於是咸得食無徙者宗澤義烏人靖康元年知磁州時太原失守官兩河者率託故不行澤曰食祿而避難不可也即日單騎就道從羸卒十餘人磁經敵騎蹂躪之餘人民逃徙帑廩枵然澤至繕城壁浚隍池治器械募義勇始為固守不移之計金兵直叩磁州城澤以神臂弓射走之開門縱擊斬首數百級金劉敏行平州人天㑹中遷肥鄉令􅀊大饑盜賊掠人為食諸縣老弱入保郡城不敢耕種􅅵畝荒蕪敏行白州借軍士三千䕶縣民出耕多張旗幟為疑兵敏行率軍巡邏日暮閲民入城由是盜不敢犯耕稼滋殖巴逹喇木布奚王五族人天會中同知磁州捕􅀗太行羣盜元帥府以磁相二川屯兵屬之擒王會孫小􅁲苗清等羣盜遂平天德中起復洺州防禦使正隆盜起州縣無兵不能禦洺舊有河附於城下巴達喇木布乃引水注濠中以為固盜弗能近州賴以安巴逹喇木布舊作伯德特離補今改正黃久約須城人世宗時授磁州刺史磁並山素多盜旣􅀗而款伏者審錄官或不時至繫者多以杖殺或死獄中久約惻然曰民雖為盜而不死於法可乎乃請盡讞之而後行賀揚庭濟陰人明昌二年除洺州防禦使時􅀊歉民饑􅀭庭諭蓄積之家令出所餘以糶之饑者􅀗濟洺人立石頌德完顏齊穆宗曾孫章宗時為磁州刺史治以寛簡未嘗留獄磁名郡刺史皆朝廷遴􅃟郡人以前政有聲如劉嶽柔程輝高德裕皆不及齊元張礎通州人世祖時知威州有婦人乘驢過市者投下官阿齊之奴引鳴鏑射婦人墜地匿阿齊家礎將以其事聞阿齊懼乃出其奴論如法阿齊舊作暗赤今改正劉容雲京人世祖時出為廣平路總管富民有同姓爭財産者訟久不決容至取籍考二人父祖名字得其實立斷之爭者遂服明詹後當塗人洪武初授磁州同知值兵革初定招徠流移撫卹備至州有蝗為文􅈼天蝗悉岀境􅀊旱俊作歌自貴􅀨隨至包宗達金華人洪武中磁州知州以廉能著濬五爪渠引􅇭水漑田民多利之熊懷豐城人天順中知廣平府搏豪强興水利賑饑荒治為畿輔冠比去民立祠秦民悦舒城人成化中知廣平府雪死囚十九人清牧馬地三千餘頃招集流亡六千户考績稱最九載去任民立生祠祀之李進曲沃人成化中知廣平府遇􅀊旱修理民閘灌田數千頃疏渠引流皆有成法民受其賜張羽南鄭人正德中知廣平府勤於政事懲豪猾恤鰥寡興學校治甚有聲以調任去士民泣送攀輿不得行高汝行太原人嘉靖初知廣平府有豪猾為民害前守不能禁汝行至即按以法郡城西南有隙地蕪􅁾不治汝行鑿渠修堰引􅇭水灌之悉成良田民建祠渠側祀焉瞿晟黄梅人嘉靖中知廣平府鑿長渠三百里引水爲四閘灌田數千頃有盜掠富人貲晟禱於神從衆中呼盜名誅之一郡皆伏唐音武進人嘉靖中知雞澤縣才贍力勤爲民興革必行其志尤盡心獄訟朝議市馬他縣多威取於民音不忍上官督之急即投劾請去民間爭出馬半日而足馬肥好更爲諸縣最卒於官橐無餘貲馬翰如陳留人萬厯中知永年縣時有水患翰如決孟家口洩之復築堰以障洺水増稻田數百頃改條鞭革種馬大戸皆稱惠政本朝塗廓遼東人任河南河北兵巡道駐磁州順治六年賊陷隆平逼武安廓率兵奮擊馬蹶爲賊所害麾下蘇某亦力鬬死亊聞贈廓光祿寺卿建祠以祀沈志禮漢軍鑲黄旗人磁州知州􅀊旱開渠引澤水漑田秋禾乃登徴收賦税不差一役而賦亦無虧民德之華士捷江南人知廣平縣漳水舊經邑界泛濫不時士捷疏濬上流水患遂息城隍廨宇廟學久前提調官臣沈兆澐恭纂輯提調官臣張日章恭覆輯校對官臣李萼恭校校對官臣章詒燕恭覆校大清一統志廣平府三人物漢毛公趙人治詩爲河間獻王博士貫公趙人從賈誼受左氏傳訓爲河閒獻王博士子長卿受詩於毛公爲湯陰令吾邱夀王趙人從董仲舒受春秋高材通明遷侍中中郎後爲光祿大夫侍中丞相公孫宏請禁民不得挾弓弩夀王爲書難宏宏屈服焉張禹清河人與蕭望之同時爲御史數爲望之言左氏望之善之上書數以稱說後望之爲太子太傅薦禹于宣帝徴禹待詔未及問㑹疾卒胡常清河人以明穀梁春秋爲博士部刺史又傳左氏李雲甘陵人性好學善陰陽舉孝廉遷白馬令桓帝時中常侍單超等五人以誅梁冀功封侯專權用事雲上書切諫帝震怒送黄門北寺獄陳蕃楊秉等上疏救俱免歸田里雲遂死獄中沮授廣平人少有大志多權畧仕州别駕舉茂才厯二縣令又爲韓馥别駕袁紹領冀州表爲奮武將軍使監䕶諸軍及紹攻曹操授數以䇿説紹不能用官渡之敗為操軍所執操釋而厚遇之尋謀歸袁氏乃見殺三國魏劉劭邯鄲人黄初中為散騎侍郎受詔集五經羣書以􅀋相從作皇覽明帝即位拜騎都尉與議郎庾嶷荀詵等定科令作新律一十八篇著律畧論遷散騎常侍景初中受詔作都官考課七十二條正始中執經講學凡所撰述法論人物志之􅀋百餘篇卒贈光祿勲晉程衞曲周人少立操行彊正方嚴劉毅聞其名辟為都官從事毅奏中䕶軍羊琇犯憲應死武帝與琇有舊遣齊王攸諭毅衞正色以為不可徑自馳車入䕶軍營收琇屬吏考問先奏琇所犯狼籍然後言于毅由是名振遐邇百官厲行遷尚書郎侍御史在職皆以事幹顯厯安定頓邱太守劉遐易陽人性果毅便弓馬值亂為塢主毎擊賊率壯士陷堅推鋒冀州刺史邵續深器之壁于河濟之間賊不敢逼間道遣使受元帝節度朝廷嘉之以為龍驤將軍平原内史太寕初平王含以功封泉陵公遷徐州刺史卒贈安北將軍南北朝魏宋隱列人人性至孝專精好學轉行臺右丞㝷以母道武平喪歸旣中山拜尚書吏部郎葬被徴乃棄妻子匿于長樂數年而卒臨順父兄出悌鄉黨仕終郡謂其子經曰汝等苟能入幸而至功曹史以忠清奉之則足汝不能矣不勞遠詣富貴徒延門臺閣恐户累耳程駿曲安人居喪以少􅀌貧孝稱性機敏好令詔賜學晝夜無倦仕魏為著作佐郎累拜祕書帛以旌其儉德駿悉散之親舊性介直不競時榮卒史曲安侯贈兗州刺諡曰憲宋瓊列人人病季秋少以孝行稱母之月思瓜不已瓊夢想見母终州郡之求而遂􅀗屢辟皆不就時人稱異卒于家宋弁列人人初至京師見尚書李除尚書沖言論移日殿中郎中孝沖異之退曰此人王佐才也文因朝㑹次厯訪治道弁年少官微知遇車自下而駕南征對聲姿清亮進止可觀因是大被以弁爲東道副將軍有盜為靽者斬而徇之于軍兼祠部尚是三軍振懼莫敢犯法書攝七兵事弁劬勞王累遷右事恩遇衞將亞于李沖卒諡貞順宋翻弁族弟少有操行宣武時為河陰令摧抑豪右威振京師孝莊時除河南尹弟毓字道和敦篤有志行卒于大中大夫宋世景翻弟少自修立博覽羣言尢精經義舉秀才上第遷司徒法曹行參軍著律令裁決疑獄剖判如流轉尚書祠部郎兼領數曹深著稱績左僕射源懷引為行臺郎巡察州郡十有餘所黜陟賞罰莫不咸允後為伏波將軍行滎陽太守發姦摘伏有若神明坐弟道璵事除名世景孝友過人道璵死哭之哀切􅀊餘母喪遂不勝哀而卒北齊慕容儼成安人貌奇偉學兵法尒朱氏敗歸神武天保初以功厯授開府儀同三司梁陸法和以郢州城内附議求忠勇過人者守之衆推儼遂遣鎮郢州梁都督侯瑱任約率水陸軍并力攻正月至六圍糧運阻絶儼信賞必罰分甘同苦自月人無異志後還帝執其手歎息久之進爵義安王卒贈司徒尚書令宋世良毓子年十五便有膽氣隨伯父翻在南兗州屢有戰功為殿中侍御史詣河北括户大􅀗浮惰還見汲郡多骸骨移書州郡收􅄟後拜清河太守在郡未幾聲聞甚高除東郡太守卒官世良强學好屬文􅁧字畧五篇宋氏别錄十卷宋世軌世良弟好法律天保􅀄厯官都郎中遷廷尉少卿洛州民聚結欲刼河橋吏捕按之連徒黨千七百人崔暹以為反數年不斷及世軌為少卿判其亊為刼毅魁首餘從悉捨時大理正蘇珍之亦知名寺中為之語曰決定嫌疑蘇珍之視表見裏宋世軌時人以為寺中二絶南臺囚到廷尉世軌多雪之及卒諸繫囚皆哭尉死我等豈有曰宋廷生路荀士遜廣平人好學有思理為文清典武定末舉司州秀才迄天保十年不調馬敬德薦為主書轉中書舍人以文辭見重累遷中書侍郎號為稱職與李若等撰典言行于世隋房山基清河人開皇中為考功稱為明幹唐王及善邯鄲人父君愕有沉謀果遷左武衛將軍從太宗征遼戰死贈邢國公及善以父死事襲爵武后時拜内史來俊臣繫獄及善曰俊臣兇狡不道天下疾當死后欲釋不誅之不勦絶元惡且指亂貽禍憂未旣也后納謀旣為皇太子又請出外之廬陵王之還密贊其朝以安羣臣及善不甚文而清正自持臨事不可奪有大臣節時二張怙勢數栽抑之后不悅改文昌左相同鳳閣鸞臺三品卒諡曰貞宋慶禮永年人擢明經武后時以習識邊事拜河東河北營田使奉詔與姜師度等築營州城三旬而畢兼營州都督開屯田八十餘所追拔漁陽淄青沒户還舊田宅不数年倉廥充居人蕃輯卒贈工部尚書諡曰敬潘好禮宗城人第明經拜侍御史徙岐王府司馬居後母喪詔奪服固辭不出開元初為邠王府長史王為滑州刺史好禮兼府司馬王每遊獵好禮必諫諭禁切遷豫州刺史勤力于治徙温州别駕卒好禮博學能論議節行修整無所傾附未嘗自列階勲居室服用麤茍至終身傅良弻清河人初為王承宗將使守樂夀王廷湊叛良弻堅壁為國固守者累年擢忻州刺史率衆力戰乃得去天于以良弻忠賜奴婢服馬寶厯初擢夏綏銀節度使蕃酋懐惠終横海節度使崔彥昭清河人淹貫儒術擢進士第数應帥鎮辟奏吏治精明所至課最累進户部侍郎僖宗立同中書門下平章事百職修舉察不至苛遷門下侍􅀰彦昭雖宰相退朝侍母膳與家人齒順色柔聲士人多其孝累拜兼尚書右僕射以疾去位卒五代梁霍存曲周人驍勇善騎射仕梁累立戰功官曹州刺史兼諸軍都指揮使張歸霸清河人仕梁戰數有功嘗與張晊戰中流矢歸霸拔其矢反以射賊一發而斃奪其馬而歸累拜右龍虎統軍左驍衞上將軍弟歸厚善用弓槊能以少擊衆累拜鎮國軍節度使晉王清曲周人仕晉為奉國都虞侯以戰功加檢校司徒從杜重威拒遼力戰死漢高祖立贈清太傅宋范質宗城人舉後唐長興進士晉宰相桑維翰深器之周廣順初拜平章事建議以律條繁冗輕重無据世宗特命詳定為刑統宋初加兼侍中奏請封建子弟并薦吕餘慶趙普堪受台司討論舊典定南郊行禮圖由是禮文始備進封魯國公質力學强記手不釋卷以廉介自持身沒家無餘眥子旼能屬文以父任厯官知邕州鄧存忠劫衆攻城七十餘日旼堅壁固守賜璽書􅅄之累遷給事中有集十卷邕管記三卷解暉臨洺人少有勇力仕周為奉國軍指揮使宋初以功累遷雲應寰忻代等州都巡檢使暉􅋧猛木强每受詔征伐常身先之頻立戰功金創滿體時稱驍將王明成安人初爲藥元福從事多所規正乾德初召爲左拾遺開寳初南征以明爲隨征轉運使山路險絶舟車不通但以丁壯轉遞供億不􅀜賀州未下明率所部堙其塹城中懼遂納款抵廣州與潘美等逆擊大㨗劉鋹遂降以功擢祕書監爲嶺南轉運副使七年伐南唐屢破其軍擒其將朱令贇金陵平詔明安撫諸郡太宗時累遷禮部侍郎知正定府卒子扶挺並進士及第皆知名張美清和人仕周爲三司使强力有心計周知利病以幹敏稱世宗連􅀊征討糧餽不乏宋初加檢校太尉李筠征上黨美度其必反陰積粟懷孟間後筠叛太祖討之大軍十萬出太行經費無闕美有力焉厯官左驍尉上將軍元達雞澤人􅀒膂力善射太宗時累遷京城巡檢卒贈昭化軍節度達厯職戎署交士大夫能折節盡禮人是以稱之郭密經城人軀幹雄偉膂力絶人初隸晉王帳下淳化間累遷貝州駐泊兵馬部署㑹夏人寇邊以密有武畧充靈州兵馬都部署夏人畏服邊境賴以靖謐卒贈保順軍節度李沆肥鄉人少好學器度宏遠太平興國中舉進士甲科累遷翰林學士咸平初拜平章真宗北幸命流留守京師肅然累加門下侍郎尚書右僕射卒諡文靖沆性直諒内行修謹識大體居位慎密人莫能于以私真宗嘗問治道所宜先沆對曰不用浮薄新進喜事之人此最為先帝怪沆獨無密啟沆對密啟者非讒即佞臣嘗惡之豈可效之李繼遷久叛咸謂靈州不可失沆獨以為宜棄未幾靈州果陷沆為相王旦參政事沆日取四方水旱盜賊奏之旦以為不足上聽沆曰人主少年當使知四方艱難不然不留意聲色犬馬則土木甲兵禱祠之事作矣後旦思沆先識歎曰李文靖真聖人也仁宗即位詔配享真宗廟廷李維沆弟第進士累官翰林學士承㫖仁宗􅀄遷工部尚書嘗兩使遼遼主隆緒重維名館勞加禮維博學少以文章知名至老手不廢書嘗豫修續通典冊府元􅀛性寛易喜愠不見于色好􅅄借後進旣沒家無餘貲田祚貝州人十世同居詔表其門閭張君平􅇭陽人以父丞訓與遼戰死補黔州指揮使累擢閤門祗侯管勾汴口天聖初議塞滑州決河命以左侍禁簽書滑州事兼修其尢也厯數其五事罵不絶口監軍者撾破其脣噀血罵愈切至以刃裂頸㫁舌而死高宗即位詔贈觀文殿學士諡忠毅粘罕舊作粘黙合今改正孟忠厚元曾孫隆祐太后兄累官開府儀同三司封信安郡王忠厚避逺權􅀔不敢以私干朝廷明受之變太后垂簾忠厚乞栽節本家恩澤秦檜當國親姻扳援以進忠厚獨與之忤以此見廢帝以太后故眷遇特優李椿永年人父升進士起家靖康之難升翼其父以背受刃與長子俱辛椿奉繼母南走竭力以養以父故補迪功郎厯官寕國軍推官吏村精强張浚辟以自隨椿奔走淮甸綏流民布屯戍察軍情相視險要周密精審所助爲多孝宗時累除吏部侍郎進敷文閣直學士致仕樁年三十始學易其言于朝廷措諸行事皆易之用尢惡佛老朱子嘗銘其墓謂椿逆知得失不假蓍龜不阿主好不詭時譽云金董師中洺州人皇統進士補尚書省令史右相唐古額爾古尢器重之撫其座曰子議論呉發襟度開朗他日以居此座明昌中累進尚書左丞師中通古今善敷奏練達與憲處事精敏常言宰相不當事細務要在知人才振綱紀但一心正兩目明足矣卒諡文定唐古額爾古舊作唐括訛魯古今改正李慶嗣洺州人舉進士不第棄而學醫讀素問諸書洞曉其義大德間􅀊大疫廣平尢甚慶嗣攜藥與米遺之全活者衆所著傷寒纂􅀋四卷改證活人書二卷傷寒論三卷鍼經一卷傳於世趙秉文􅇭陽人大定進士累官禮部尚書哀宗即位改翰林學士自㓜至老未嘗一日廢書著述甚多其文長於辨析詩尢精絶為人至誠樂易仕五朝官六卿自奉養如寒素楊雲翼常與秉文代掌文柄時人號楊趙云劉政洺州人性篤孝母老喪明政每以舌䑛母目逾旬母能視物母疾晝夜侍側衣不解帶刲股肉啖之者再三母死􅀒土築墳葬之日飛鳥哀鳴翔集廬于墓側者三年防禦使以聞除太子掌飲丞元劉肅洺州人金興定初詞賦進士為尚書省令史嘗辨折􅁈獄出十一人于極刑金亡依東平嚴實中統初授右三部尚書官曹典憲多所議定未幾兼議中書省事致仕肅性舒緩有執守嘗集諸家易説曰讀易備忘累贈邢國公諡文獻王磐永年人父禧金進義副尉元兵破永年將屠之禧罄家貲􅂇軍衆賴以安磐擢正大經我進士第授歸德府錄事判官不赴肆力于經史百氏文辭宏放東平總管嚴實興學養士迎磐爲師受業者常數百人世祖召拜翰林直學士累遷太常少卿進資德大夫致仕磐資性剛方閒居不妄言笑每奏對必以正不肯阿意承順帝嘗以古直稱之卒追封洛國公諡文忠竇黙肥鄉人初隱大名與姚樞許衡朝暮講習繼還肥鄉以經術教授世祖在潛邸嘗召之旣至問治道首以三綱五常誠意正心爲言一日凡三召與語奏對皆稱㫖自是敬待加禮不令暫去左右世祖即位召問欲求如唐魏徵者乃薦許衡史天澤帝以黙爲翰林侍講學士時平章王文統用事黙力詆其學術不正久居相位必禍天下文統深忌之黙謝病歸未幾文統伏誅乃召還國有大政輒以訪之加昭文館大學士卒黙爲人樂易平居未嘗評品人物至論國家大計而折廷諍人謂汲黯無以過累贈太史封魏國公諡文正劉恩洺州人徙威州幼知讀書勇而有謀以管軍總管從入蜀與宋􅀅戰有功授成都管軍副萬户後同僉行樞密院事招降夔府等州邑授四川西道宣慰使石高山洺州人中統中以管軍總管鎮思州軍令嚴肅􅁁境晏然至元中從取光州克􅀥陽進攻襄樊皆有功從下江南下令無擄掠秋毫無犯至焦山與宋將孫虎臣等戰殺􅀗甚多累遷顯武將軍侍衛親軍都指揮使何榮祖廣平人狀貌魁偉以吏遷中書省掾擢御史臺都事始折節讀書日記數千言累官參知政事時桑格尃政亟于理算錢穀人受其害榮祖數請罷之同僚止勿言榮祖執愈堅未踰月而弊皆聞帝召問所宜榮祖請于􅀊终立局考校人以為便立為常式桑格敗改中書右丞奏行取定至元新格累加平章卒諡文憲榮祖身至大官而僦地以居中宫常賜銀鈔以旌其廉所著書有大蓄集學易記載道集觀物外篇諸書桑格改見正定府人物劉賡肅之孫幼有文名至元間用薦者授國史院編修官累遷翰林學士承㫖兼國子祭酒國學故事伴讀生以次出補吏莫不爭先出時有一生親老且貧同舍生有名在前者請讓之先賡從其讓别為書薦其人朝廷久先用之自是六館之士皆知禮讓加光祿大夫卒賡久典文翰當時大製作多出其手以耆年宿德為朝廷所推重云呉元珪廣平人父鼎燕南提刑按察副使元珪簡重好深沉之思凡征謀治法律令章程皆得于家庭所授世祖時以後衞經厯擢樞密都事江南旣定樞密奏栽定官屬均俸祿給衣桑設學校置屯田多元珪所論建大德初除吏部尚書選曹銓注多有私其鄉里者元珪曰此風不可長川黨朔黨之興宋之所由衰也請謁悉皆謝絶武宗即位拜樞密副使詔議政中書所建白皆切於世務卒追封趙國公諡忠簡元明善清河人穎悟絕出讀書過目輒記諸經皆有師法而尢深於春秋仁宗居東宫擢為太子文學及即位升翰林直學士詔節尚書經文譯其􅀜政要者以進書成每奏一篇帝必稱善累拜湖廣行省參知政事後入為翰林學士眷遇之隆當時莫並卒諡文敏明善早以文章自豪出入秦漢間晚益精詣有文集行世秦起宗洺水人辟武衛譯史幼生長兵間學書無從得􅁓父順削柳為筍寫以授之成誦削去更書文宗時累拜中臺御史劾中丞化勝受人婦人賤買官屋不報起宗又奏不罪化勝無以正國法化勝服辜帝曰為御史當如是矣出為撫州路總管以兵部尚書致仕卒諡曰昭肅化勝舊作和尚今改正李齊廣平人元統􅀄進士第一知高郵府有政聲至正十三年泰州民張士誠為亂行省以左丞竒齊也勒圖鎮高郵以齊守甓社湖高郵陷㑹有詔赦叛逆者賊紿曰請李知府來乃受命行省强齊往諭至即下齊獄中􅀄無降意官軍諜知之乃進攻城士誠呼齊使跪齊叱曰吾膝如鐵豈㫖為賊屈立而詬詈士誠搥碎其膝而剮之奇齊也勒圖舊作契哲篤今改正明賈銓邯鄲人永樂末進士授刑科給事中英宗即位命讞在京重囚多所原宥出為大理知府就擢左布政使治行為一時冠遷副都御史巡撫山東河南清靜不自表暴民亦安之成化􅀄召署院事卒官諡恭靖羅綺磁州人宣德進士授御史有能名正統中擢大理右寺丞參贊寕夏軍務以忤王振謫戍遼東景帝立復官進右少卿使衛拉特上皇駕還以勞擢刑部左侍郎㝷鎮守松潘累有破賊功在鎮七年威名甚震天順初召爲左副都御史復忤石亨坐貶衞拉特舊作瓦刺今改正張憲成安人爲諸生父母相繼沒並廬墓毎哭泣烏鵲羣繞哀鳴景泰中旌表傅海威遠人父喪廬墓有虎至海叱之曰我爲父母生死何惜虎即去景泰中旌表劉玉磁州人生有膂力天順成化間數以偏將征慶遠蠻討東苗平固原賊有功厯官左都督玉勇決過人善撫士所至未嘗挫衂卒贈固原伯諡毅敏馬子聰廣平人成化進士宏治初爲南京禮科給事中時僉都御史錢鉞以中㫖晉秩移撫河南中官蔣琮守備南京肆爲兇暴子聰皆劾之孝陵災偕同官極諫復陳土木繁興并傳奉冗員之弊前後數十疏多排斥近倖終工科都給事中石永威縣人嘉靖進士厯御史巡山海􅀜按淮揚四川皆振風紀爲陜西副使濬泉溉田民甚德之巡撫延綏禦寇于環慶有功總督川湖貴州軍務擒苗酋沈亞當等累擢户部左侍郎厯官以清節稱旣卒妻子不免寒餒贈右都御史張學顏肥鄉人嘉靖進士由曲沃知縣累遷薊州兵備副使隆慶五年擢僉都御史巡撫遼東與總兵李成梁破土蠻卓山進右副都御史萬厯初召理戎政進户部尚書奏列清文諸弊以祛姦慝太監馮保傳諭多所徴索學顏爭之得減免改兵部抗疏請停内操以老乞致仕卒贈少保李已磁州人嘉靖進士厯禮科給事中隆慶中頻詔户部有所徵索已屢爭執旣復詔市珍寶再疏極諫帝怒杖之百錮刑部㝷釋歸神宗立起兵科給事中論傳奉之弊劾兵部尚書譚綸平江伯陳王謨時號敢言累遷右僉都御史巡撫保定罪歸王􅀖直磁州人生而駢脅有神力人稱王千觔弱冠補諸生好􅀐射窮韜畧嘉靖中詔舉天下武勇給事中戴夢桂薦之詔送大同立功總督翁萬遠遇以國士寇數萬騎犯鵓鴿峪同故叅將張鳳等遇之大呼入敵陳敵皆辟易已見軍無後繼圍之數重鳳等皆力戰死􅀖直猶揮大刀斬數十人力竭遇害贈都指揮僉事官爲建祠賈待問威縣人隆慶進士厯懷慶知府築堤以禦沁河人稱賈公堤累擢陜西巡撫中官以􅅦採肆横待問力爲節制在任七年甚有威惠卒贈太子太保兵部尚書王世揚廣平人萬厯初進士為御史巡視陜西茶馬開成七監大災奏發茶課賬濟蠲餉邊銀二年免課馬七千餘匹巡按浙江減御衣織造三之一擢撫宣府復許順義王濟里克貢市款約益堅􅄣督宣大山西敵服其威信邊境無事仕至戎政尚書加太子太保濟里克舊作撦力克今改正路振飛曲周人天啟進士除涇陽知縣流賊入境擊却之徴授御史疏劾首輔周延儒卑汚姦險尚書閔洪學結權勢樹私人侍郎劉宇烈􅁹叛無功廷推謝升為僉都御史振飛力詆其醜狀遂不果用厯按福建蘇松温體仁修郄謫官累遷右僉都御史巡撫淮揚圑練鄉兵得勁卒二十餘萬李自成已陷京師遣其黨吕弻周來代勒兵擒之軍聲大振㑹馬士英欲用其所親田仰乃罷振飛唐王時召為大學士卒鍾希顏字心卓清河人天啟進士由户部郎中升冀北道歸里崇禎十一年遇亂城陷不屈死同時有靈璧知縣王茂遠貢生解嗣昇皆殉難本朝乾隆四十一年賜希顔諡節愍餘並予入忠義祠申為憲永年人由進士厯官山東副使崇禎十五年大兵破城為憲時家居殉節死本朝乾隆四十一年賜諡節愍李昌期永年人由進士為兗州府推官嘗監軍破土寇萬餘人推其才崇禎十五年大兵破城死之贈僉事本朝乾隆四十一年賜諡節愍申佳允永年人崇禎進士由知縣擢文􅃟主事厯太僕丞出近幾閲馬聞居庸陷疾馳入都京師不守歎曰吾起徴賤食祿十三年國事至此敢愛死乎遂入井死本朝賜諡端愍乾隆四十一年子入忠義祠王之統成安人多義行以􅀊貢任趙州訓導闖賊破城死於明倫堂本朝乾隆四十一年予入忠義祠宋湯濟肥鄉人崇禎間為諸生聞京師陷與諸生郭珩王拱辰等起兵討李自成為自成將張汝行所殺本朝乾隆四十一年並予入忠義祠殷淵雞澤人父大白崇禎間為關南監軍副使楊嗣昌陷以失機論死淵上書請代跪朝門外五日奉㫖詰責遂棄舉子業􅀮山中淵負奇氣從父兵間善技擊嘗欲報父讎及賊破雞澤謀起兵復之饿聞京師陷號慟即約山中壯士誅賊所置官偽令㤗植踉蹌走乃入城發喪製服行哭臨禮義聲大振為姦人所乘被殺屍暴烈日中十餘日不壞有黄犬守之不去土人以神祀之本朝乾隆四十一年予入忠義祠張蓋永年人為諸生性􅀌介家貧力學崇禎末以次當貢太學不就母老饘粥不繼授徒以養甲申後自閉土室中七年穴而進食􅀊時一出拜母雖妻子不見也本朝劉璇永年貢生善為詩順治初由沁源知縣遷鄖陽同知值王光泰叛城陷罵賊死詔贈按察司副使李芳澂永年人順治初由貢生授漢中通判賀珍寇漢中芳􅊹佐理軍餉有功擢知鄜州王永強之亂竭力拒守城破不屈死詔贈按察司僉事宋永譽永年人順治二年由舉人授郿縣知縣賀珍作亂永譽為戰守備以死自誓賊遣人誘降永譽因其使賊怒攻圍五晝夜城陷被執罵不絶口遇害詔贈按察司僉事申涵光佳允子博學工詩文與殷岳張渭稱畿南三才子聞父殉難哀毁不欲生遂絶意仕進晚年名益重有文集四卷聰山詩八卷及荆圍小語諸晝弟涵盼順治進士官檢討亦以文學著殷岳淵兄父大白忤楊嗣昌死獄中上疏爲父請骸骨比歸而京師已䧟遂入西山與其弟淵謀舉義兵亊􅂥淵被害岳匿申涵光家得免順治初吏部按舊籍選人除岳睢寕知縣抵任未幾即告歸輿涵光相唱和滕運昌清河人父病爲嘗糞侍母疾五年無怠母嗜雞及没遂終身不食雞順治六年旌安居曲周諸生父明圍病殁廬墓三年日夜哀思年未四十􅂡髮盡白家貧事母甘㫖無缺同縣路允升康熙進士官檢討父殁哀毁卒均康熙年間旌張榕端磁州人少聰穎能文康熙進士授編一時能文修視學江南衡鑑精審凡所識拔皆之士官至内閣學士卒入祀鄉賢祠任培元邯鄲人性至孝父殁哀毁幾絶旣葬廬墓三年家貧母老人有貸之資本使貿易以養者培元力辭與弟躬耕奉飬甘㫖不缺雍正三年旌流寓漢陳逸平輿人父蕃死獄中蕃友人朱震匿逸于甘陵界中後大赦黨人乃還唐李崿趙人客清河安祿山亂清河太守使崿乞師于平原太守顏真卿一郡􅀗全列女晉劉遐妻邵氏曲梁邵續女驍杲有父風遐嘗為石季龍所圍妻將數􅀐拔遐出于萬衆之中隋鄭善果母清河崔氏女適鄭誠誠討尉遲迴戰死善果以父死王事授魯郡太守母性賢通曉治方方聽事于障後察之剖斷合理則悦否則終日不食恒自紡績至夜分自初寡不御脂粉非祭祀賓客酒食不妄陳姻戚有吉凶事但厚贈遺不詣其家非自手作及莊圍祿賜所得雖親戚禮遺悉不入門善果歴任州郡凡公􅅟所供皆不許受由此號為清史趙元楷妻崔氏清河人家有素範宇文化及反元楷歸長安遇益僅以身免崔氏為賊所拘將凌之崔取賊佩刀倚樹立曰欲殺我任加刀鋸若覔死可來相逼賊怒射殺之元偕後得殺妻者支解以祭崔氏唐宋若昭貝州清陽人父廷芬生五女皆警慧善屬文長若莘次􅀂招若倫若憲若荀莘昭文尢高皆性素潔不願歸人欲以學名家若莘誨諸妹如嚴師著女論語十篇推明婦道所宜若昭又為傳申釋之貞元中節度使李抱貞表其才德宗召入禁中試文章並問經史大誼帝諮美悉留宫中高其風操不以妾侍命之呼學士詔若莘總領秘禁圖籍若莘卒穆宗以若昭尢通練拜尚宫嗣若莘所職厯憲穆敬三朝皆呼先生后妃與諸王主率以師禮見卒贈梁國夫人若憲代司秘書文宗尚學以若憲善屬詞粹論議尤禮之太和中為李訓鄭注譖死訓注敗帝悟其讒追恨之崔彥昭母彥昭與王疑為外昆弟凝先顯而彥昭未仕嘗見凝疑倨不􅃣帶嫚言曰不若從明經舉彥昭為憾反彥昭相母勅婢多製履襪曰王氏妹必與子皆逐吾將共行彦昭聞之泣且拜不敢為怨凝竟免宋趙氏貝州人王則反聞趙有殊色刼致之欲納為妻趙知不脱乃紿曰必欲妻我宜擇日以禮聘賊信之使歸其家具聘帛盛輿從來迎趙與家人訣涕泣登輿至州􅅟已自縊輿中死矣劉淑貞威州人許聘李御史子未歸而夫卒泣告子父母送夫殯至葬所遂縊于􅃁後因合葬馬元王時妻安氏名正同磁州人至正十九年時以參知政事分守太原安氏從之賊兵寇太原城陷衆皆逃安氏與妾李氏同赴井死贈梁國夫人諡莊潔明李氏女曲周人年十七正德六年遇流賊逼使上馬女不從誘脅萬端大罵不屈賊支解之事聞為築墳立碑旌異之曹炒兒妻霍氏曲周人炒兒繼母强氏性毒而行醜氏不從遂惡之逐氏依窮孀諸母家仍督以紡績井臼之事氏晝供姑役夜作餬口計糧不盈缶姑輒取去氏絶糧數日夜投井死馬尚良妻李氏肥鄉人尚良染惡瘡年餘不起氏朝夕不離側疾革許以從葬及卒屢欲自盡姑防守甚嚴一日防者稍疎距戸自縊死陳氏女廣平人字王養威養威卒女年十五父母議改適女誓不從遂絶飲食臨殁屬母以喪歸王氏父母哀其志合葬焉彭大義妻李氏邯鄲人大義娶時疾己篤甫七日而殁及􅉎氏觸棺祈死不得後舅姑欲奪其志遂自縊張鵬翼妻劉氏成安人事舅姑兄妹無間言鵬翼殁氏不欲生姑與母令諸姑姊日夜伺之少得間即自經死田藴璽妻李氏雞澤人遇亂藴璽兄弟被殺李抱女同姒王抱男而逃王足創難行令李速去李曰良人兄弟俱死當存此子以留田氏後遂棄已女抱具子赴城得無恙李氏雞澤人嫁曲周郭某崇禎十一年之亂舉家走匿翁姑旅被殺李攜㓜男及夫弟方七􅀊者共逃力罷不能俱全或教之舍叔而抱男李曰翁姑死矣叔豈能再得乎子雖難割然吾夫在外或未死尚可期也竟棄男􅀒叔而逃王氏女永年人字李球􅉓㑹兵至姑姊謀避女曰死作李氏􅀑何避為城陷死之兵退面色如生胡廷器妻吳氏永年人崇禎末值兵至執氏并其父母氏紿之曰二親老不如遣之去兵許之氏度去遠即赴水兵挽之不得死遂大罵兵怒支解之韓氏二女永年韓䇿女姊妹皆及笄未嫁避亂臨洺鎮兵至被執不屈皆遇害呉復澄妻徐氏雞澤人事繼始盡孝為兵所掠逼之以行氏憤罵自刎死宋應試妻劉氏廣平人避寇伯氏樓中寇攻樓急氏曰我何為累伯氏與諸婦縋而下􅀒幼子而逃寇將追及氏曰若吾子有託當以一死救衆人衆挾其子而行氏乃回顧大罵賦怒殺之衆得脱王山妻常氏成安人流賊入境為所􅀗逼之厲聲罵賊遂投井死本朝郝氏女永年人字李芳潤芳潤病危迎女歸未及門而芳潤殁守節六十餘年陳彤瑞妻柴氏雞澤人年十七而寡遺􅀌􅂊月餘貧窭無依父母勸之改適氏髠髮示不可奔順治年閒旌楊之孚妻馬氏廣平人年二十二夫亡舅姑欲强嫁之服毒死同縣􅋟國顯妻胡氏夫早亡父母强以改適引刀自毀其面守節六十餘年又張盈妻趙氏李合天妻張氏皆絶食殉夫死張文玉妻王氏遇暴逼汚不從而死邱運至妻解氏清河人夫亡守節撫子芝香為娶妻高氏芝書死高即自縊以殉均順治年閒旌程啟芳妻楊氏曲周人遇暴不辱守正捐軀賈藥性妻張氏邯鄲人為武生冀璞逼汚不從自經死張崑妻賈氏威縣人遇强逼汚不從而死董三節妻李氏雞澤人早寡家貧甚翦髮葬姑撫孤子拾薪桃菜以自給苦節五十九年雍正年閒旌劉廷璋妻王氏永年人夫亡事舅姑盡禮舅姑歿每食必祭哀泣終日撫遺􅀌得成立同縣節婦王于燕妻趙氏王于洛妻崔氏趙昌梁妻解氏宋忠妻郝氏郭兆麟妻李氏冀如鏡妻王氏姜璽妻崔氏李克鎔妻秦氏楊敦禮妻趙氏楊智妻郝氏趙丞妻王氏甯儀妻夏氏劉源妻韓氏曹慧妻賈氏李如蘭妻郭氏張秀妻李氏靳逢源妻葉氏李求條妻劉氏趙先型妻武氏劉登美妻趙氏孫芬妻婁氏劉可忠繼妻賈氏楊正妻時氏申覲宸妻董氏王治妻杜氏劉妻姚氏張淳妻祁氏杜斯羡妻盧氏李籐妻楊氏李之茂妻孔氏李徽妻董氏劉崇儒妻李氏張維垣妻曹氏妾徐氏楊端妻霍氏楊士傑妻張氏程維新妻顏氏孫光烈妻時氏饒士義妻李氏貞女臧存姐均乾隆年間旌劉進福女貴姐曲周人遇暴不促守正捐軀同縣烈婦張克纘妻李氏司兆通妻耿氏吉三基妻尹氏節婦劉稽妻王氏吉升妻張氏揚芝瑞妻趙氏䘙綽妻王氏孫開先妻霍氏張擢妻雒氏李翹才妻冀氏賈成龍妻申氏均乾隆年間旌馬秉寛妻張氏廣平人夫亡守節同縣烈婦趙小妻陳氏張三妻張氏均乾隆年間旌田士秀妻王氏肥鄉人夫亡守節同縣節婦劉増貴妻翟氏呉養粹妻楊氏均乾隆年閒旌秦三妻申氏雞澤人遇暴不汚投井死同縣節婦李皖妻王氏齊青雲妻蘇氏宋秉衡妻胡氏梁怡妻胡氏侯以節妻薛氏張進才妻郝氏賈天與妻田氏劉雲鳯妻安氏梁焕妻高氏馮自修妻李氏均乾隆年間旌宋文奎妻張氏邯鄲人夫亡守節同縣節婦張英望妻劉氏師五典妻王氏張大鵬妻姚氏安世德妻張氏張行選妻劉氏劉奉朝妻薛氏王景福妻陳氏賀執中妻趙氏姚岑妻賈氏郭元夔妻張氏連淦萱妻韓氏崔懷濱妻邱氏王祚茂妻牛氏均乾隆年閒旌劉作楫妻暴氏成安人夫亡守節乾隆年間旌翁題元妻王氏威縣人夫亡截髮自矢守節終身同縣節婦薛瑨妻王氏潘蓮妻賈氏李曰琚妻鮑氏張培興妻王氏夏際祥妻王氏烈婦能來七妻周氏均乾隆年閒旌顧勉學妻馬氏清河人夫亡子甫五􅀊氏孝事孀姑撫􅀌成立苦節終身又顧勤學妻謝氏顧篤學妻張氏皆夫亡守志一門四節均乾隆年間旌陳烺然妻孫氏磁州人烺然為諸生早亡氏守節翁病篤割股和羮以求翁愈同州烈婦董有成妻楊氏霍登子妻王氏烈女朱二孩李大孩節婦許銘妻張氏姜棫妻馬氏田義妻王氏張堉妻劉氏均乾隆年間旌閻思敬妻王氏永年人夫亡矢志守節聞穢語投繯死同縣烈婦李閻氏裴武氏張景印妻張氏武起才妻李氏武好妻李氏張有功女張氏節婦酆永盛妻李氏霍桂妻劉氏均嘉慶年間旌郭廷海妻李氏曲周人守正捐軀同縣節婦李全德妻籍氏王􅝥妻丁氏周偉妻張氏張藎妻王氏高添幅妻蘇氏顔鳴鶴妻岳氏均嘉慶年閒旌李大倫妾薛氏肥鄉人夫亡守節同縣節婦王名福妻武氏均嘉慶年閒旌郭寶山妻郭氏邯鄲人遇暴不污見殺同縣烈婦馮起才妻姚氏均嘉慶年閒旌弓氏女愛姐雞澤人守正捐軀同縣烈婦霍有才妻王氏李起元妻慕氏范珣妻閻氏均嘉慶年間旌􅆇存姐廣平人守正捐軀嘉慶年閒旌秦廷選妻朱氏成安人遇暴不從被害同縣烈婦魏五皃妻李氏楊言媳李氏烈女李氏女巧姐均嘉慶年間旌張宇和妻宓氏威縣人夫亡守節同縣節婦余若思妻劉氏烈婦張三妻劉氏段讓妻侯氏張崇本妻楊氏均嘉慶年閒旌欒氏女清河人守正捐軀嘉慶年間旌羅長金妻張氏磁州人守正捐驅同州烈婦李才妻索氏節婦蘇鑰妻高氏烈女楊四女楊氏均嘉慶年間旌仙釋唐潘師正宗城人少以孝聞事王遠知爲道士得其術居逍遥谷高宗幸東都召見問所須對曰茂林清泉臣所須也旣不乏矣帝尊異之詔即其廬作崇唐觀時太常獻新樂帝更名祈仙望仙翹仙曲卒年九十八諡體元先生金寶公姓武氏磁州人慧性超絶胸次不凡大定初于􅇭陽造仰山寺殿宇華麗柱上作金龍像蟠之忽有題詩于柱上曰人道斑鳩拙我道斑鳩巧一根兩根柴便是