  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_011-1a}
body:
  text: 順德府二一關隘一黄榆關在邢臺縣西北黄榆嶺上據險築堡自黄榆南為馬嶺口清風嶺口夫子巖中莊兒口貨郎口明正統末皆設兵防守燒梁關在内邱縣西晉地道記中邱縣有燒梁關西黄村巡司在邢臺縣西七十里舊曰西黄社明崇禎六年設巡司於此本朝因之綦陽鎮在沙河縣西四十里九域志沙河縣有綦村鎮鐵冶務舊志綦陽鎮在縣西四十里宋皇祐四年置鐵冶司於此有冶神祠常河鎮在平鄉縣東北又高阜鎮在縣東又東有節固鎮皆明嘉靖二十一年築堡團城鎮在鉅鹿縣東北四十里九域志鉅鹿縣有新店團城二鎮金史地理志鉅鹿有團城鎮舊志民居環繞如團故名新店鎮在任縣東三十五里九域志鉅鹿縣有新店鎮金時改屬任縣大嶺口在沙河縣西一百七十里黄背巖北上有邊牆舊與黄背數道二巖皆置戍鶴度嶺口在内邱縣西一百七十里其北二十五里爲錦繡堂口形􅀋􅀛坼故云又北十里爲雲凹口皆接山西平定州界黄寺堡在邢臺縣北四十里石婆山後又有宋家村堡在縣西北百餘里俱明時大名兵備道防秋處原莊堡在鉅鹿縣西南十五里往來所經商旅輻湊舊有小城可以守禦又有張王疃堡在縣東午時村堡在縣南上疃村堡在縣北孝路堡在廣宗縣南二十里周二里濠廣一丈又有版臺堡在縣北二十五里周二里有奇濠廣二丈五尺俱明嘉靖二十一年置金提堡在内邱縣東十里又有官莊堡在縣東南尹村堡在縣北清修堡在縣西北皆明嘉靖二十五年置腰水砦在邢臺縣西北黄榆嶺口地極高峻其上平闊惟一徑可通山半有水故名香鑪砦在邢臺縣西北黄榆嶺北峯巒高峻狀如香鑪亦止一徑可通又北卽正定府贊皇縣界戴家寨在沙河縣西一百里形􅀔高峻止通一徑其上平原廣闊中有一池雖旱不固梁原店在内邱縣南三十里龍岡驛在邢臺縣東關外中邱驛在内邱縣治東南津梁鴛水橋在府城北四里俗呼為板橋一名廣濟橋又名豫讓橋本朝乾隆十四年鴛水二源俱濬匯流於此改今名並於橋畔建亭以為冠蓋讌餞之所高莊橋在邢臺縣東三里又有先干橋在縣東七里俱跨達活水樓下橋在邢臺縣東南十里跨百泉水灃水橋在南和縣西十里俗名土橋跨百泉河通濟橋在南和縣東三十里張村西洺河上明宏治五年建宗義橋在南和縣南狼溝河上明萬厯十三年縣人李宗義建因以其名為名又名南寒橋夏莊橋在平鄉縣東北七里女兒橋在唐山縣西南十六里馬河橋在唐山縣西六里又一在縣南十五里又一在任縣北二十里尹村橋在内邱縣北二十五里泜水上當往來要道大宋橋在任縣東八里本朝康熙二十五年重建灃河橋在任縣東二􅁲里百泉橋在任縣東南十里蔡河橋在任縣北十里隄堰珍珠隄在邢臺縣東南明嘉靖四十年知府劉應節建引水自百泉村至樓下村溉田二十餘頃又東為流珠隄萬厯間知縣朱誥建引清水等泉舍珍珠隄水漑田五十餘頃􅇭陽西隄在平鄉縣界明正統二年築起縣東南界循􅇭水西岸北入任縣安東隄在平鄉縣東南以禦漳水迤西有奠中隄鎮西隄以禦􅇭陽落漠水皆明宏治十六年築落漠東隄在平鄉縣西明正統六年築起縣西南界循落漠東岸北抵南和縣大隄在廣宗縣西一里舊築以䕶城者起縣西南繞城西北至小平臺村止互三十里又有小隄在縣西五里明宏治十四年築起縣西南至大平臺村止亙二十里以禦漳水永澤閘在邢臺縣東南七里明萬厯十八年引百泉水為渠建閘築隄以漑民田又東一里為小龍泉堰亦萬厯中建百泉閘在邢臺縣東南永澤閘南三里明嘉靖間知府劉應節建其東一里有盛流閘又東一里有黒龍潭閘又東南七里有明沙泉閘又東三里有晉祠閘又東一里有武家莊閘又東二里有關家灣閘又東二里有永立閘一名東汪閘又東一里有大賢閘接南和界又東有永濟閘又東南一里有龍興閘又南數步有廣潤閘皆明時所建引百泉水漑田小汪閘在邢臺縣西北五里其東一里有翟村閘又東二里有水磨閘又東四里有呉家莊閘又東北四里有張村閘又東六里有祝村閘又東五里有河曲閘皆明嘉靖萬厯間建引野狐達活水自呉家莊閘以下萬厯間野狐泉涸俱廢本朝乾隆十四年達活泉溢因其順流之勢修建翟家莊二閘以漑民田普潤閘在沙河縣北明萬厯十九年建引百泉水漑田四十餘頃永賴閘在南和縣西南沙河縣界明嘉靖三十九年劉應節建又有博濟閘明萬厯七年建皆引狼溝河水漑田大賢閘在南和縣西二十里接邢臺縣界亦名均利閘其東南數里有均濟閘又北有永濟閘又灃水橋北八里有濟民閘亦曰通濟閘其東北又有救濟閘亦曰通惠閘又東北有賈宋閘亦曰通利閘俱元縣尹尹泰所建又有惠民閘邵家閘賈宋新閘俱明劉應節所開永賴閘明萬厯中知府王守城建並引百泉水漑田偏閘在鉅鹿縣西本朝乾隆十年知縣張文莊建引􅇭陽河水灌漑民田咸賴其利永濟閘在任縣東北三十里明萬厯中知縣徐璘建又建子閘數座曰天口閘田家莊閘呉家口閘鄧家口閘王家灣閘賈家閘邊家莊閘引􅇭陽河水溉田大賢壩在邢臺縣東接南和縣界本朝雍正五年知縣李相因大賢閘故址接築壩三十丈又東為東汪壩乾隆四年知縣劉蒸雯因東汪閘之舊加築為壩長八十餘丈陵墓周邢侯夫人墓在府城北寰宇記邢臺縣有邢侯夫人冢史記云齊武平初有掘古冡得銅鼎腹有銘作蝌蚪書云邢侯夫人姜氏墓内邱縣志在今縣東十五里衞靈公墓在平鄉縣南莊子衞靈公葬沙邱舊志在平鄉縣南五里柴口村又見長垣觀城二縣漢馮唐墓在内邱縣西馮唐村大覺寺之左有古塔時苗冢在平鄉縣東北寰宇記在平鄉縣東北二里晉石勒冢在邢臺縣西南寰宇記在龍岡縣西南十五里偽號高平陵張賓墓在南和縣西元和志在南和縣西十二里舊志又有鐵頂墓在内邱縣南十三里周圍皆鐵高三丈餘或以為卽張賓墓南北朝魏游雅墓在任縣東北十餘里唐宋璟墓在沙河縣西北八里五代周郭王墓在邢臺縣西六十里焦山嶺俗呼為郭上皇墓蓋郭氏祖塋也元劉秉忠墓在邢臺縣西南十里賈村郭守敬墓在邢臺縣西北三十里張文謙墓在沙河縣南十五里孔璠墓在唐山縣西北八里劉德淵墓在内邱縣西程家灣林起宗墓在内邱縣南永安村明朱裳墓在邢臺縣南五里陳村趙孔昭墓在邢臺縣南十五里王本固墓在邢臺縣南二十里百泉村賜葬李若珪墓在南和縣東二十里崔恭墓在廣宗縣北蘇村祠廟豫讓祠在府學後三文貞公祠在府治東元延祐中祀魏徴宋璟於府學宫東南又祀劉秉忠於府治東明萬厯中合祀於此改今名本朝康熙六年修雙烈祠在府城南關祀烈女王玉梅張端荘宋文貞祠在沙河縣西北八里祀唐丞相宋璟墓亦在焉有顔真卿書墓碑本朝乾隆十四年重修十五年高宗純皇帝巡幸中州清蹕經此特命大臣致祭有文及宋璟祠詩樹碑祠内按南和縣御製祭文廟西亦有宋文貞祠明靖遠伯王驥作贊勒石本朝以來厯任知縣屢為修葺盧公祠在南和縣西河頭郭村祀明兵備道盧象昇銅馬祠在鉅鹿縣北水經注漳水逕銅馬祠東漢光武廟也更始三年光武追銅馬於館陶大破之降其衆數十萬關西號世祖曰銅馬帝祠取名焉寰宇記祠在鉅鹿縣北七里縣志今祠在縣北銅馬鎮祀漢將馬武張相祠在任縣見魏書地形志蓋祀張賓也怡賢親王祠在任縣北北留寨廣源廟在邢臺縣西北逹活水北祀龍神元至正間建賜額禱􅀨卽應光武廟在唐山縣南二十五里旁有繫馬臺祖傅光武避王郎兵繫馬於此寺觀開元寺在府治東北唐開元中建元世祖兩幸此建大聖塔有萬安師者能著神異詔改塔名圓照明洪武中重修按廣宗縣亦有圓照塔萬安本洺水人也天安寺在府治西北唐建元至正中重修興福寺在邢臺縣城北太平村唐開元時建建福寺在沙河縣南三十里唐天寶中建又延慶寺在縣西南三十里亦唐天寶間建汎愛寺在沙河縣治西北唐建漆泉寺在沙河縣廣陽山上廣聖寺在南和縣城東十里村有碑鐫佛像及題唐宋年號元明以來遞有修葺慧炬寺在南和縣城北古隄内元魏間建北齊天保年修有碑勒石佛鐫經唐元和年重修明成化正德間增修庭種嘉樹幽深清爽清泉寺在南和縣城東北十五里葭里村金大定年間建明正統景泰間重修寺後有泉清澈岸多蘆荻福勝寺在平鄉縣東北趙村本元大德中三皇閣明正德九年修建一名福勝禪林寺中有唐開元三年石塔本朝康熙四年卽三皇故址重建大悲閣又有西福勝寺在縣西柴村北齊時建寺碑規制甚古三明寺在鉅鹿縣治南宋建知縣李桓記曰隋改南欒置鉅鹿縣於縣建三明寺後因水患人不奠居寺亦隨廢垂拱元年徙舊縣於東南十有一里之新城乃今邑地有釋智艮復乞地創建大觀二年秋河決舊隄流行邑中寺幾圯没宣和二年重建隆勝寺在唐山縣宣務山後周太祖代漢後卽山建寺鑿山爲龕刻佛像佛經於上賜名隆勝寺極華麗中有千佛堂同聲堂在千佛堂下鑿石而成硜然有聲響堂在千佛堂東有響卽應經閣寺在内邱縣治南宋元祐間建清涼寺在任縣東臺南鎮隋開皇中建明正統嘉靖年間增修通真觀在府治西南元至元間建太子觀在府城西三十五里世傳趙襄子爲太子時射獵於此掘井得水後人肖像記之邑人趙孔昭有記朝元觀在唐山縣南關西街王德用趙州人真宗時為邢洺磁相巡檢盜張宏霸相聚界上吏不能捕德用以氊車載勇士詐為婦人飾過邯鄲賊果來邀勇士奮出悉擒之邊肅楚邱人真宗時知邢州會遼兵大入先是地屢震城堞摧圯無守備帝在澶淵密詔肅若州不可守聽便宜南保他城肅匿詔不發督丁壯乘城而闢諸門悉所部兵陣以待之騎薄城下肅與鄲小勝遼人莫測也居三日引去時鎮魏深趙磁洺六州閉壁不出老㓜趨城者肅悉開門納之王沿館陶人仁宗時知邢州復為河北轉運使奏罷二牧監以地賦民導相衛邢趙水下天平景祐諸渠以漑民田初沿建議時論者以為無益已而邢州民有爭渠水相殺者始知沿所建為利劉從廣并州人仁宗時知邢州籍鄉軍之罷老者聽引子弟自代著為令金石琚定州人天眷中為邢臺縣令邢守貪暴屬縣掊取民財以奉琚獨一物無所與旣而守以贓敗他令佐皆坐累琚以廉辨稱富察世傑貿蘇館瓦都河人正隆中同知安國軍節度使事時徴發不巳民不堪命犯法者衆獄囚積四百餘人世傑到官月餘決遣畧盡富察世傑舊作蒲察世傑貿蘇館瓦都河舊作曷速館斡篤河今並改正孫德淵興中州人大定間為沙河令有盜秋桑者主逐捕之盜以刃自刺其足面日秋桑例不禁採汝何得刺我主懼賂而求免盜不從訴之縣德淵曰若逐捕而傷創必在後今在前乃自刺也盜遂引服後遷昭義軍節度使潞州破被執俄有拜於前者皆沙河舊民也密䕶德淵由是得免李復亨河津人為南和令盜割民家牛耳復亨盡召里中人至使牛家牽牛徧過之至一人前牛忽驚躍詰之乃引服賈益通州人大安􅀄安國軍節度使調民夫修完城郭為戰守備按察司止之不聽曰治城守臣事也按察何預旣而兵至以有備解去元劉肅洺水人世祖居潛邸以為邢州安撫使興鐵冶行楮幣公私賴焉趙良弻女直人元初立邢州安撫司擢良弻為幕長邢久不得良吏且當要衝使者旁午民多流移良弼區畫有方事或掣肘則謮諸藩邸閲嵗凡六往反所請無不從托克托以斷事官鎮邢其屬撗甚動相阻撓時帝征雲南良弻馳驛白其事遂黜托克托罷其屬郡以大治托克托改見正定府名宦謝仲温豐縣人至元九年授順德路總管時方用兵江淮有寡婦鬻子以償轉輸之直仲温出俸金贖還之袁裕洛陽人至元十九年為順德路總管郡有鐵冶提舉張鑑無子買妾其妻妬而殺之􅁉捕其妻訊之服辜裕執法平允而疾惡不少貸如此王結定興人仁宗時為順德路總管教民務農興學孝親弟長戢姦禁暴悉登於書俾朝夕閲習之屬邑鉅鹿沙河有唐魏徴宋璟墓乃祀二公於學表其言論風㫖以勵多士尹泰唐山人至正中為南和縣尹涖政公勤大興水利建閘濬渠漑田數百頃民感其惠立石頌之明馬旭宣德中知内邱縣九年奏最當遷民乞留詔加秩還任邱陵蘭陽人宣德中知平鄉縣創立城垣築隄四十里民得播種無水患號邱公隄山西饑民流入境拊循之授以閒田歸者千餘户鄉有十二社各立社學􅃶誦之聲達巷陌曲亷蓬萊人正統間知鉅鹿縣初縣東濱漳水田被漂没民多流亡亷先決其流次築隄障之水旣涸躬率墾闢樹以桑􅀥嵗既豐稔復勸民出贏餘捐糴本斂散以時儲粟至萬石立社學定三等科差流亡者皆歸業在職九年獄無重囚民尸祝之張繼鳳翔人成化間知順德府境内河渠地髙水下灌漑不及繼爲製水車運水日漑田數百頃比穫常數倍集桑椹數十石發各縣給民種之嵗増桑數百株蠶繅以興有盜刧民財巡捕官執疑似者拷掠皆誣服當斬繼按問疑似悉釋之已而果􅀗真盜潘中矩􅃆池人正德間知廣宗縣流賊入境中矩率吏民固守都御史甯杲督兵至索賄中矩曰知縣貧安所得錢杲大怒故留老弱兵三百人於縣中矩處置得宜兵皆畏服民亦不擾丁憂歸百姓泣送遮道後杲敗按驗郡邑獨廣宗無餽遺士論美之韓璧陽曲人正德中知内邱縣時李逵子宗智結姻江彬恣横莫敢詰璧下車卽按殺之彬矯㫖逮繫錦衣獄㑹彬服誅璧復職李攀龍厯城人嘉靖中知順德府部内有種馬塲監司増課至二千七百攀龍請悉蠲之又請減嵗輸工部額徵増永年兩縣驛遞以寛民力何岑扶溝人嘉靖中知邢臺縣邢臺多瘠磽而賦稅與他邑沃壤等岑請於上官得嵗減徴銀九百餘兩罷冗役錢數百千邢故不知種稻岑就百泉諸水灌田數百頃遂為永利又覈得欺隱田六百餘畝為學田以贍貧士及遷去百姓泣留遮道朱誥南陽人萬厯中知邢臺縣修隄閘勸農樹桑躬履深山窮谷曲為經畫邢人思之不忘焦源溥三原人萬歴中知沙河縣會嵗歉賑濟有方請蠲嵗額五百兩時親藩發粟賑饑詔下各邑自運他邑皆役大姓有車牛者源溥曰欲救民而先􅅰民吾不忍也遣吏以官錢雇運吏胥舞文卽一錢必置之法至窮巷細民每温言接之調濬縣去民皆流涕有送至數百里外者吉孔嘉洋縣人崇禎中知順德府十五年大兵臨城悉力捍禦力屈城破與妻張氏長子惠迪次子婦王氏並死焉贈太僕寺少卿唐一中全州人崇禎中為鉅鹿縣教諭城陷死之杜前鹿邑人崇禎中知平鄉縣城破前懷印至庫中自縊死教諭潘希朗訓導李愈芬閻慎行皆同時殉節死本朝連登奉天人順治四年知順德府嵗饑力為賑救全活甚多有猾吏以練習乆任事登一日三發其姦吏惕息改行擢山東登州兵備道有瞽者數十當轍卧曰吾輩不能覩公顔色請撫摩以志去思再拜痛哭而去其感人如此錢國琦奉天人順治四年知廣宗縣六年土寇攻城國琦率弟國璞等奮擊賊敗走邑賴以全方戰時國琦中流矢手拔鏃裏創復戰血縷縷漬衣甲民為立碑紀事朱玉漳浦人為平鄉典史驍勇善騎射順治六年土寇大至玉以公事還自永平聞警不入私廨坐城上待旦出禦之戰於王固村頗有斬􅀗馬蹶被害邑人為建烈士亭以祀王原祁太倉人康熙中知任縣邑當大陸澤下流遇水潦田俱浸没原祁力請永免田賦三千餘金民德之人物漢路温舒鉅鹿人父為里監門使温舒牧羊温舒取澤中蒲截以為牒編用寫書稍習善求為獄小吏因學律令縣中疑事皆問焉又受春秋通大義舉孝廉為山邑丞宣帝卽位温舒上書言宜尚德緩刑帝善其言遷廣陽私府長内史舉温舒文學高第厯臨淮太守治有異跡卒於官侯芭鉅鹿人楊雄弟子受太元法言雄卒為起墳心喪三年張禹襄國人性篤厚節儉父歆為汲令卒吏人賻送數百萬悉無所受又以田宅推與伯父身自􅀉止舉孝廉拜揚州刺史親録囚徒多所明舉遷下邳相引蒲陽陂水漑田民用贍給入為大司農拜太尉延平元年遷太傅鄧太后以殤帝初育詔禹舍宫中五日一歸府朝見特贊與三公絶席永初元年以定䇿功封安鄉侯田豐鉅鹿人天姿瓌傑權畧多奇為袁紹别駕勸紹迎天子紹不納後紹敗於官渡軍將皆拊膺而泣曰向令田豐在此不至於是紹還謂左右曰不用田豐言果為所笑殺之三國魏張臶鉅鹿人少逰太學學兼内外後歸鄉里袁紹前後辟命不應移居上黨并州牧高幹表除樂平令不就徙適常山門徒數百人遷居任縣太祖為丞相辟不詣卒時年一百五歳南北朝魏游雅任縣人太武時與高允等俱知名徵拜中書博士厯散騎侍郎進侯詔定律制出為東雍州刺史亷白有惠政徴為秘書監高允作徴士頌有云孔稱游夏漢美淵雲遐哉伯度出􅀋離羣其推服如此游明根雅從祖弟年十六於白渠坎為窟讀書積嵗太武擢為中書學生孝文時累遷儀曹尚書大鴻臚卿參定律令屢進讜言以年老表求致仕帝行禮辟雍以明根為五更卒諡靖侯明根歴官内外五十餘年處身仁和接物禮讓時論貴之游肇明根子孝文初累遷太子中庶子以父老求解官扶侍岀為本州南安王鎮北府長史帶魏郡太守甚有聲績厯太府廷尉卿兼御史中尉明帝卽位再遷尚書右僕射元又廢靈太后將害清河王懌集公卿會議莫不失色順㫖肇獨抗言不可終不下署卒諡文貞肇外寛内剛躭好經傳手不釋書善周易毛詩尤精三禮為易集解撰冠婚禮儀白圭論詩賦表啟凡七十五篇謙亷不競清平寡欲為廷尉時宣武嘗勅肇有所降恕執不從曰陛下自能署之豈可令臣曲筆也其執意如此隋游元明根裔孫仕周厯夀春令譙州司馬俱有能名煬帝時累遷尚書度支郎宇文述等九軍敗績帝令元按其獄述時貴幸遣家僮請屬元不見他日按述愈急仍以屬請狀劾之帝嘉其公正奉使黎陽督運楊元感作逆元以正義責之元感怒囚之脇以兵竟不屈遇害贈銀青光禄大夫李孝貞柏仁人好學能屬文齊時射策甲科厯事周隋閒以美詞令與内史參典文翰所著文集二十卷唐李元愷邢州人博學善天歩律厯性恭順未嘗敢語人宋璟嘗師之既當國厚遺以束帛將薦之朝拒不答洺州刺史元行冲邀致之問經義畢贈衣服辭曰吾軀不可服新麗懼不稱以速咎也卒年八十餘宋璟南和人耿介有大節好學工文詞舉進士中第累遷鳳閣舍人居官鯁正張易之誣魏元忠引張說為驗璟教說以實對元忠乃免復遷左臺御史中丞有飛書告張昌宗者璟固請下吏明國法數忤太后㫖神龍初為黄門侍郎武三思怙寵數有請於璟璟厲聲答曰今復子明辟正宜以侯就第安得尚干朝政獨不見産禄事乎帝怒韋月將告三思事已詔誅死璟請付獄按而後刑帝益怒璟曰請先誅臣不然死不奉詔乃流月將嶺南睿宗立拜吏部尚書銓總平允開元初累封廣平郡公與姚崇同心輔政以尚書右丞相致仕卒贈太尉諡文貞璟風度凝遠人莫涯其量為宰相務清政刑使官人皆任職唐世輔弼前稱房杜後稱姚宋云李嗣真柏仁人多藝數中明經為始平令風化大行擢太常丞知五禮儀太常缺黄鐘嗣真居崇業里疑土中有之道逢一車鐸聲甚厲嗣真曰此宫聲也市以歸振於空地若有應之者掘之得鐘衆樂遂和永昌中以右御史中丞知大夫事來俊臣獄方熾嗣真上書諫不納俊臣誣以反流藤州久得還卒贈濟州刺史諡曰昭武后嘗問嗣真儲貳事對曰程嬰杵臼存趙氏􅀌古人嘉之后悟中宗乃安李懷遠柏仁人少􅀌􅄝學宗人欲藉以高䕃懷遠辭退而曰因人之勢高士恥之擢四科第累官至同中書門下三品爵趙郡公懐遠久貴益素約不治居室嘗乘欵段馬僕射豆盧欽望謂曰公貴顯顧當然耶懷遠曰吾幸其馴不願它駿卒贈侍中諡曰成子景伯景龍中為諫議大夫中宗宴侍臣酒酣命各為迴波辭或以諂言媚上景伯獨為箴規語帝不悅中書令蕭至忠曰真諫官也終散騎常侍魏傳弓鉅鹿人為監察御史嫉中人輔信義欲勘奏其姦竇懐貞曰是安樂主所信任者奈何繩之傳弓曰王綱壊矣正坐此屬殺之即死無悔終司農丞宋陳薦沙河人舉進士從韓琦定州河東幕府性木彊簡澹琦每語人曰亷於進勇於退嫌疑間毫髮不處與人交久而不變如彦升者無幾也神宗時累遷資政殿學士屢求退以為本州命兩省燕餞資善堂擢其子厚御史臺主簿卒贈光禄大夫王覺邢州人六世同居真宗時旌表仍蠲其課調元劉秉忠邢州人生而風骨秀異志氣英爽不羈八嵗入學日誦數千百言年十七為邢臺節度使府令史以養其親㝷棄去隱武安山中為僧後逰雲中世祖在潜邸海雲禪師被召過雲中聞其博學多材藝邀與俱行旣入見應對稱㫖遂留藩邸上書數千百言皆天下大計世祖征大理雲南及伐宋每以天地好生力贊於上所到全活不可勝計至元初拜太保參領中書省事旣受命以天下為巳任知無不言每因顧問輒推薦人物他如頒章服舉朝儀給俸禄定官制皆自秉忠發之為一代成憲卒贈太師諡文貞仁宗時進封常山王劉秉恕秉忠弟好讀書年弱冠受易於劉肅與兄同事世祖㩴禮部侍郎邢州安撫使厯彰德等五路總管所至有惠政召除禮部尚書终平陽路總管張文謙沙河人元初以劉秉忠薦召對稱㫖命掌王府書記邢州當要衝初分二千户為勲臣食邑嵗遣人監領徴求百出民弗堪命文謙言之世祖擇人往治洗滌蠧敝革去貪暴流民復歸不期月户增十倍世祖征大理欲屠其城文謙力諫止之中統元年立中書省以文謙為左丞建立綱紀講明利病以安國便民為務詔令一出天下有太平之望累官樞密副使卒贈太師追封魏國公諡文宣郭守敬邢臺人大父榮通五經精於算數水利使守敬從劉秉忠學中統初張文謙薦之世祖面陳水利六事授銀符副河渠使興復西夏唐來漢延諸渠灌田九萬餘頃至元十二年造授時厯使掌測驗推歩首言厯本在於測驗而測驗莫先儀表乃盡考舊儀之失創作簡儀候極儀玲瓏儀仰儀諸式拜太史令比次厯書數百卷表上之㝷遣相度灤河又陳水利十一事渠成漕極便賜名通惠河再遷至昭文館大學士卒年八十有六仁宗嘗謂宰相曰郭太史神人也馬亨南和人少􅀌事母孝太宗時河北東西路使王晉辟為掾以才幹稱歴擢轉運司副使世祖在潛邸以劉秉忠薦召見甚器之授京兆􅅦課所長官凡五年民安而課裕中統初授都轉運使上言便宜六事至元初進户部尚書為兀里馬所誣免官㝷還京師卒兀里馬舊作阿里馬今改正孔璠聖裔父天祐遷唐山為唐山人璠識度不凡至元中授陜西規措河渠副使鑿鄭國渠溉田四千五百頃遷徽州路總管府判官讞獄平恕民自不􅁈董朴順德人皇慶初以翰林院修撰致仕朴學自六經及孔孟微言與凡先儒所以開端闡幽者莫不研極其㫖而會通之事親孝與人交智愚貴賤一待以誠或有犯之者夷然不與校家近龍岡學者稱龍岡先生云明侯泰南和人洪武末由禮部員外郎超擢刑部侍郎建文中進尚書出督軍餉京師失守泰被執不屈死劉準唐山人邑諸生父喪廬墓野燒將及準悲號而火止正統中旌表劉鏞邢臺人邑諸生父為五臺訓導與母卒於官鏞扶櫬歸葬廬於墓種􅀲其旁風雹不為害正統中旌表崔恭廣宗人正統進士除户部主事督餉延綏有能聲以楊溥薦擢知萊州府居府六年萊人以比漢楊震遷湖廣右布政使調江西天順初巡撫蘇松諸府所興革皆便民浚儀真漕河治呉淞江修曹家港蒲匯塘新涇諸水利進吏部侍郎拜尚書恭亷靖自守不為矯飾在吏部尤知大體能愛人材一時善􅀋歸心焉卒贈太子少保諡莊敏朱裳沙河人正德進士授御史按山東前御史王相忤鎮守中官黎鑑被誣下獄裳抗疏直相劾鑑八罪帝還自宣府裳請下罪巳詔以收人心不報及幸南都久裳又極陳小人熒惑之害出為鞏昌知府嘉靖初以治行卓異遷浙江副使累官右副都御史總理河道數條上方畧裳有學行攻苦食淡二十年如一日隆慶中追贈户部侍郎諡端簡趙孔昭邢臺人嘉靖進士授鄢陵知縣以治行徴為御史有直聲出按浙江尚書趙文華討陶宅倭敗績孔昭劾之文華欲委罪蘇松巡撫曹􅀖輔孔昭力爭乃止隆慶時督漕運㑹淮徐大水力請蠲賑招商平糶全活甚衆終兵部侍郎孔昭亷毅自持遇權倖不易操故所至皆克樹立王本固邢臺人嘉靖進士授御史按浙江賊民汪直導倭為亂胡宗憲誘致欲官之本固執不可卒置重辟宗憲倚嚴嵩􅀔傾中外本固勘事輒具實大忤嵩意復出為陜西副使厯進南京吏部尚書張居正屬去所惡言官二人本固不從遂歸本固性強毅屢不合於柄臣時服其鯁正云趙文炳任縣人隆慶舉人由知縣擢御史出按湖廣奏緩木綱之役再按山西首疏劾中使殃民八事有姦民倚藩為虐賄奪官地有司莫敢問文炳下檄親文之積弊一清陳登雲唐山人萬厯進士授御史按山西會大祲疏請賑濟後按河南毁淫祠立常平倉為備荒計是嵗薦饑登雲以民所食雁糞函封具疏以聞帝發帑金十萬賑之民賴以全傅梅邢臺人萬厯舉人由登封知縣入為刑部主事張差挺擊之獄司官胡士相等受賄將飾以瘋癲梅力爭之獄乃成及差棄市猶慮其潛易請自監刑自是羣小疾之以京察奪官崇禎中由台州知府里居十五年大兵至與知府吉孔嘉在籍中書舍人孟魯鉢皆殉節贈梅太常卿魯鉢工部主事一年並本朝乾隆四十賜諡節愍趙智鉅鹿人與弟慧並有孝行盜至􅀅殺其母智與慧爭代死賊俱釋之張夢齡平鄉人崇禎舉人授任邱教諭戊寅城陷不屈死之年本朝乾隆四十一予祀忠義祠趙唐山人明末以􅄻授商河知縣後棄官歸父母喪俱廬墓本朝順治年間旌本朝智懷行内邱人邑諸生少家貧為傭以養父母父病思甘泉時久旱泉竭禱於家之古井清泉迸溢嫂没遺子在襁褓懷行令妻舍己子孔之巳子㝷死無怨尤明末流寇薄城下懷行以母兄皆在外縋城出求之為賊所執具以情告賊義而釋之旣得母􅀒以入城復往㝷兄賊方縛兄樹上懷行伏地請代並得釋方遇賊時賊帥問城中强弱懐行盛言兵衆糧多賊信之竟解圍去及親喪廬墓三年順治十七年旌夏謨平鄉人順治􅀄授崇仁知縣值寇亂謨往撫諭為賊所拘脅降不屈死之欒養重任縣人天性淳樸順治初父爲賊所得將殺之養重請以身代賊憐其孝得釋將祈産盡讓之伯仲一無所受年逾耄耋未嘗入城市蘇奇英廣宗人明末大饑父客死山東鉅野奇英求之不得晝夜號泣聲徹原野忽遇一老人指其處齧指􅄋血驗之果是遂􅀒骨歸葬又司縣劉漢儒甫周嵗父游於外流離至遼海再娶梁氏生子不通音問者二十年漢儒後訪至父母已俱没弟爲豪冢奴乃哀求主人贖其弟徒歩千里負骸骨歸與已母合葬姬登第邢臺人爲廣武營遊擊雍正二年進勦棹子山逆番死於陣事聞議卹如例劉典生南和人事親以孝聞父病二十餘年每有所嗜輒負薪入市雖數十里外無不求之必得而後歸值河冰堅凍父思食魚典生卽持網河濱叩頭黙禱冰忽解竟􅀗巨鱗乾隆七年旌張奇邢臺人嘉慶二年由把總隨征川匪擊賊於達州之大神山力竭死之事聞議䘏􅄻雲騎尉列女南北朝魏盧元禮妻李氏柏仁人趙郡太守李叔允女范陽盧元禮之妻性至孝父卒號慟幾絶者數四及元禮亡氏追亡撫存禮無違者事姑以孝敬著母崔氏終於洛陽凶問至舉聲慟絶一宿乃蘇往奔喪攀櫬號踊遂卒有司以狀聞詔追號貞孝女宗易其里為孝德里明張氏女名端莊邢臺人正德六年流賊至其家女奔投井中賊出之逼令易衣女大罵被殺事聞旌表王氏女名玉梅沙河人諸生王得時女正德六年流賊至得時多力奪賊刀傷二賊賊怒復率衆焚其家時女年十七賊驅之行女且行且罵賊殺之三斷其屍事聞旌表吕堂妻范氏南和人正德六年流賊至掠婦女數十於冀家屯氏在掠中泣告同執者曰今日之事有死而已至賊營賊衆環坐命氏行酒不應則命引出斬之氏度不可脫以頭觸賊賊怒剉殺之同邑師萬妻牛氏亦為賊所掠罵賊被殺陳氏女鉅鹿人許聘諸生王弼正德七年流賊至女被擄乘間逃匿賊復索得之厲聲罵賊遂遇害時年十七李氏女鉅鹿人年十六許聘朱秉衡未嫁為亂兵所執逼之大罵不從支解而死陶恒妻楊氏廣宗人正德七年流賊刧掠匿草莽中賊搜得欲汚之氏堅拒賊縛於樹露刃脅之終不屈遂被害劉氏女任縣人字諸生李口茂未嫁夫死女年十七往視歛成服痛哭幾絶旣歸取服飾焚之自縊而死張彦方妻趙氏唐山人産方病卒氏號泣終日扄户自縊本朝樊時薪妻張氏邢臺人年二十五而寡守節至九十九嵗順治初旌呉氏女邢臺人年十六未字鄰人王謨伺其父岀持刀逼之女罵詈不從被殺陳振兹妻王氏邢臺人年十四歸振兹方三日土寇掠其家逼之氏以甎擊破賊首遂遇害同縣段其妻趙氏值兵變夫為所害氏罵賊不已亦見殺魏國輔妻祝氏邢臺人年十六夫亡誓以身殉舅姑百計防之遂不食死同縣王國柱妻張氏夫亡痛哭三日自經柩側張奉先女廣宗人奉先夫婦相繼殁遺二子俱幼穉女晝夜勤織絍鞠兩弟成立遂终身