也抃相地開渠濬陳灣陂引西郊水又築隄達星洋溉田數千畝累官參知政事謚清獻方偕莆田人知建安縣縣産茶每􅀊先社日調氏數千鼓譟山旁以達暢氣偕以為害農奏罷之王鼎館陶人皇祐間知建州其俗生子多不舉鼎為條教禁止盜犯茶鹽者衆一切杖遣之監司數以為言鼎弗為變陳襄侯官人大觀中為浦城主簿攝令事縣多世族以請託脅持為常令不能制襄盡革其俗賊曺捕偷兒至數輩襄語之曰某廟鐘能辨盜犯者捫之輒有聲乃遣吏先引以行自禱鐘所隂塗以墨命羣盜往捫少焉呼出獨一人手無所汚叩之乃為盜者遂服罪朱松婺源人政和間同上舎出身授政和尉制治有方民賴以安建雲根星溪二書院以訓邑之子弟民多溺子為文戒之俗稍變他日邑民謂其所育子孫曰活汝者新安朱先生也父森迎養官舍卒貧不能歸葬於縣東賃居以守世稱韋齊先生辛次膺萊州人政和中閩冦范汝為陷建州宰相吕頤浩以次膺宰浦城遏賊衝比至冦黨熊志齡已焚其邑於是披荆􅁄坐瓦礫中安輯吏民料丁壯治器械扼險阻號令不煩邑民便之馬彦博為統制官賊冦浦城縣夾溪而屯據險設伏以邀官軍彦博死之趙善俊宋宗室居邵武淳熙中知建州建俗生子不舉善俊痛繩之捐俸以助再知建州􅀊飢民羣發富家廪監司欲調兵掩之善俊曰是趣亂也諭許自新平米價民乃定邑尉入盜死罪以希賞善俊辨出之洪邁鄱陽人淳熙中知建寕府豪民有睚眦殺人衷刃篡獄者久拒捕邁正其罪任希夷邵武人淳熙中調浦城簿從朱子學篤信力行朱子器之曰伯起開濟士也陳居仁莆田人紹熙中知建寕府􅀊飢出儲粟平其價弛逋負以巨萬計代輸畸零繭税沈作賓歸安人慶元中知建寕府入覲乞申嚴詭户之禁傅伯成晉江人嘉定中知建寕府華岳忤韓􅇑胄下大理貶建寕圜土中伯成憐之命獄卒出入無繫子壅以宣教郎知崇安縣増學田築舊隄創廣惠倉亦多政績趙必愿宋宗室居餘干嘉定中知崇安縣剖判如流吏不能困修學政立催科法列户各爲三等以三期爲約足者旌之未足者寛以趣之踰期不納者里胥程督之民皆感悦願輸革胥吏鬻鹽之􅁦擅發光化社倉活飢民舊有均惠倉無所儲心愿捐緡錢増糴二千石力主義役之法陳韡侯官人紹定中提􅀧福建刑獄招捕使兼知建寕府衢州冦汪徐來二破常山開化勢張甚韡命淮將李大聲提兵七百出賊不意夜薄其砦賊出迎戰見旗驚曰此陳招捕軍也皆大􅂘急擊之衢冦悉平孫夢觀慈谿人紹定中知建寕府蠲租税省刑罰郡人徐清叟蔡抗以爲有古循吏風袁甫鄞縣人端平中知建寕府兼福建轉運判官閩鹽隸漕司例運兩綱供費後増至十有二吏卒並縁爲奸公私苦之甫奏復舊例丁米錢久爲泉漳興化民患㑹知漳州趙以夫請以廢寺租爲民代輸甫並捐三郡􅀊解本司錢二萬七千貫助之包恢建昌人建寕守袁甫辟爲府學教授監虎翼軍募土豪討唐石之冦淳祐中提􅀧福建刑獄兼知建寕守洪天錫晉江人淳祐中通判建寕府大水不俟報發常平倉賑之葉夢鼎寕海人開慶中知建寕府作橋梁置驛舎建大安關決疑獄元陳君用南平人以功授同知建寕路事賊圍福州君用率兵往援大敗賊衆亷訪僉事郭興祖佩君用明珠虎符使權同知副都元帥遂引兵踰北嶺至連江阻水而陣君用曰今日不盡殺賊吾不復生還矣乃率壯士六十人徒涉斬殺賊稍潰既而復合君用大呼轉戰中槍死鄒伯顔高唐人爲崇安縣尹邑有趙清獻陂溉民田數千頃􅀊久溝湮而田廢伯顔修長溝十里繞植楓樹累石爲固田穫常稔民賴其利彭庭堅瑞安人至正間爲崇安縣尹十四年盜侵政和松溪江南行臺中丞呉鐸督軍建寕檄庭堅至時鎮撫萬户岳煥隸麾下煥素悍縱卒為暴庭堅欲繩以法煥懼使步卒乘其不備詐為賊兵突入交鋒衆皆潰庭堅獨留不去遂遇害孔楷曲阜人至正間為崇安尹以陳友定冦亂拒戰而死遂葬將村之游嶺葉景仁松溪人至正間由政和尉升浦城尹奉檄討政和西里寨冦值􅀊飢出家資餉兵擊破之乘勝深入後援不繼為所執不屈而死掲汯豐城人元末以亷訪僉事治建寕陳友諒兵下杉關圍建寕汯部勒散卒千人命總管阮德柔督戰屢捷城外有黃華山高瞰城内汯作層樓蔽之又鍛鐵為鐮鉤儲水櫃於樓下及冦據山以火攻樓曳以長鉤水沃火滅復備薪䕸萬束於城下冦穿隧入燎烟薰死者甚衆相持十旬乘冦怠出戰親冒矢石自寅至午焚其三柵㑹援兵至賊太奔諸將上其功於朝明芮麟宣城人洪武末為建寕知府􅀊飢發廩賑濟勸富民分粟出貸民以得全新學宫及考亭書院親與諸生講肄政教大行張準崑山人永樂中知建安縣持已端潔􅀊飢乞以鈔代賦大疫乞蠲征徭朝㫖皆報可卒於官張瑛建德人正統中知建寕府時鄧茂七作􅅍逼城結砦瑛率民乘霧襲破其砦進參政仍知府事餘黨林拾得等復轉掠城下瑛與從父敬禦之乘勝逐北陷伏中敬戰殁瑛被執大罵不屈死贈福建按察使宏治中命有司立祠奉祀何俊金溪人初爲浦城丞廉平果斷正統中處州盜屢侵縣境俊築城塹備器械率民兵拒之賊不敢入既而奉檄往崇安賊乘隙來攻俊馳間道歸捕斬百餘人以功擢知本縣修西山精舎擇真氏子孫賢者奉祀薛宗鎧揭陽人嘉靖初知建陽縣求朱子後復之以主祀事俗生女多不舉宗鎧力禁之􅀊飢賑倉栗先發後聞全活無算周尚友貴溪人嘉靖間知政和縣值倭冦攻城尚友躬蹈鋒刃督民堅守援兵不至城陷死之一家遇害事聞贈寺丞鄭爲虹江都人崇禎末知浦城縣有廉聲唐王入閩召爲監察御史部民詣闕乞留有十不可去之疏乃命以御史巡視仙霞關駐浦城尋命巡撫上游四府丰裁卓然時鄭芝龍有異志盡撤守關兵大兵長驅而入爲虹還浦城縱士民出走自守空城被執死之崔攀龍臨潁人明末知建陽縣視民如子明亡死之本朝殷應寅滕縣人順治中知崇安縣壬辰冦圍城七晝夜設法固守民賴以全後升任赴都猶爲崇民請減鹽引民迄今德之沈孚建錢塘人順治初知政和縣值山冦陷城被執不屈罵賊死喻三畏奉天人康熙八年任建寕府同知十三年耿逆變作不屈被害沈鱄嘉善人康熙八年知建安縣時兵燹後土田荒蕪蠧胥巧爲影射鱄廉其實窮治不少貸藩厮以錢貸窮民勒息數倍私禁榜掠官莫能制鱄曰愛一官而脅於輿隸使民無告吾恥焉捕置之法民心大悦李元璂德州人康熙四十五年知浦城縣廉明强毅奸蠧屏跡浦俗命案屍親肆掠仇家璂嚴緝之􅁦乃絶捐俸移學於皇華山麓士民頌之趙孔起長山人雍正三年知浦城縣造士有方諸生赴省試分俸給行資貧士逋糧不令胥役勾攝其最貧者代輸之嚴禁䑕竊幾於夜不閉户杜昌丁青浦人雍正七年知浦城縣盡革無名科斂宿􅁦一清勤於課士優禮其賢者以最擢知永春州人物五代南唐江文蔚字君章建陽人唐長興中舉進士博學工屬文與韓熙載齊名官至翰林學士禮部侍郎南唐立國設科取士自命文蔚知貢舉始林仁肇建陽人為南唐留守軍中謂之林虎子多得士心宋太祖忌仁肇名取仁肇像懸别室時後主子從善質於汴引觀之曰仁肇行且降先持此為信指空館曰將以此賜後主聞之酖殺仁肇唐遂以亡宋楊徽之字仲猷浦城人㓜刻苦為學嘗肄業潯陽廬山太宗謂宰相曰徽之儒雅操履無玷置於館閣宜矣咸平初為禮部侍郎多識典故唐以來士族人物悉能詳記有集二十卷楊澈字晏如浦城人㓜聰警周宰相李穀器異之建隆初舉進士竇儀謂澈文詞敏速可當書檄之任事親以孝聞官至兵部郎中楊億字大年徽之從孫年十一太宗聞其名詔送闕下試詩賦授祕書省正字真宗即位詔錢若水修太宗實錄奏億參預凡八十卷而億獨草五十六卷書成乞外補就養知處州召還知制誥母疾請歸省不待報而行上親緘藥劑加金帛以賜億文格雄健尤長典章制度喜誨誘後進所著括蒼武夷潁隂韓城退居汝陽蓬山冠鼇等集凡一百九十四卷李虚已字公受建安人父寅有清節虛已舉太平興國進士官工部侍郎分司南京寅事親孝治家有法虚已及弟虛舟又以孝友清慎世其家虛舟之子寛定皆有能名虛已喜為詩數與曾致堯及其婿晏殊唱和有雅正集二十卷黃震字伯起浦城人端拱進士累遷都官員外郎在真宗朝數論事既卒詔進其官一等章頻字簡之浦城人咸平間與弟頔皆試禮部預選㑹詔兄弟毋並舉頻即推其弟棄去後舉景德進士厯官三司度支判官詔鞫邛州牙校訟鹽井事皇城使劉美依倚后家受賕使人市其獄頻請捕繫忤㫖出知宣州遷刑部郎中章得􅁚字希言頻從子咸平進士為人莊重楊億以為有公輔器薦之累拜同中書門下平章事封郇國公得象在翰林十三年章獻太后臨朝宦官方熾每遣内侍至學士院得􅁚必正色待之卒贈太尉諡文憲曹修古字述之建安人大中祥符進士為監察御史上四事曰行法令審故事惜材力辨忠邪詞甚切至時崇建塔廟費不可勝計修古極陳其不可太后兄子劉從德死錄其姻戚至於厮役修古與楊偕輩交章論列修古慷慨有風節當太后臨朝遇事輒言無所囘撓弟修睦性廉介與修古同舉進士累官都官員外郎恬於仕進不待老而歸徐奭字武卿甌寕人大中祥符五年進士第一天聖初為兩浙轉運使蘇州多水患奭度赤門以東築隄架梁以濟不通詔書襃美劉夔字道元崇安人大中祥符進士累官太常少卿知廣州所至有廉名桂陽監唐和冦邊夔為湖南安撫使舉兵擊敗和於銀江源進破其巢穴蠻逃遁遠去以户部侍郎致仕英宗即位遷吏部卒年八十三徐陟字公明浦城人未冠挾所為文入京師見孫何何大歎賞上其奏議五十卷時丁謂當國陟不肯見有止渴湏擇水暫憩須芳隂之句登大中祥符二年進士累官永州判官黃鑑字唐卿浦城人少敏慧過人舉大中祥符進士同郡楊億善其文詞延置門下累擢直賢院以母老出通判蘇州卒黃亢字清臣浦城人少奇頴年十五以文謁翰林學士章得象得象奇之遊錢塘以詩贈處士林逋逋尤激賞時王隨知杭州奏禁西湖為放生池亢作詩數章以諷士人爭傳之既卒鄉人􅀋其文為十二卷號東溪集徐的字公準甌寕人天禧進士區希範蒙趕冦衡湘命的招撫之既至蠻酋相繼出降以郊祀近召還蠻復叛除荆湖南路安撫使至桂陽討平欽景石硋華隂水頭諸峒斬其酋熊可清等千餘級卒於桂陽阮逸字天隱建陽人天聖進士景祐初知杭州鄭向上其所􅁧樂論十二篇并律與胡瑗俱召赴闕同校鐘管十三律分造鐘磬各一簴康定元年上鐘律制議并圖三卷皇祐中更鑄太常鐘磬召瑗逸與近臣太常議祕閣遂典樂事遷屯田員外郎著有易筌王制井田圖等書吳育字春卿浦城人天聖時試禮部第一知太常禮院奏定禮文名太常新禮慶厯祀儀拜參知政事在政府遇事敢言性明果所至多條教易行而不可犯有集五十卷陳升之字暘叔建陽人景祐進士知諫院張堯佐緣後宮親為三司使唐介斥嶺南升之皆極諫遷侍御史知雜事凡任言職五年所上數十百事神宗時拜中書門下平章事封秀國公柳永字耆卿初名三變字景莊崇安人景祐進士工詞章擅名樂府仕至屯田員外郎兄三復三接皆工文藝號柳氏三絶張詵字樞言浦城人寶元時累官正議大夫性孝友廉於財平生不殖田業吳充字沖卿浦城人寶元中與兄育京方皆高第充為吳王宫教授以嚴見憚作六箴以獻熙寕元年知諫院充與王安石連姻而心不善其所為數為帝言政事不便代安石為中書門下平章事因乞召還司馬光呂公著韓維蘇頌薦孫覺李常程顥等數十人卒贈司空諡正獻徐復字退之建州人舉進士不中退而學易通流衍卦氣法慶厯初與布衣郭京俱召見命為大理評事因以疾辭賜號沖晦處士黃晞字景徽建安人少通經聚書數千卷學者多從之游石介在太學遣諸生以禮聘召晞走匿不出樞密使韓琦表薦之謝麟字應之甌寕人嘉祐進士神宗時由太常博士改西上閤門使詔使經制宜州獠降其種落四千八百人納思廣峒民千四百家得鎧甲二萬陳軒字元輿建陽人嘉祐進士徽宗時為兵部侍郎論監司守臣數易之􅁦又力陳青苗遺害章衡字子平浦城人嘉祐二年進士第一知審官西院使遼燕射連發破的遼稱其文武兼備嘗纂厯代帝系曰編年通載章望之字表民得象從子為文辨博長於議論上書論時政凡萬言丁母憂毁瘠過制官大理評事歐陽修等薦其才望之宗孟子言性善著救性七篇明統三篇禮論一篇共集三十卷章楶字質夫頻孫以䕃為孟州司户叅軍治平二年試禮部第一元祐初以直龍圖閣知慶州哲宗訪以邊事命知渭州在涇原四年凡創州一城砦九立邊功為西方最徽宗立拜同知樞密院事卒贈太師諡莊簡楶七子縡綡最知名縡疏言鈔法誤民降兩官綡贊劉逵復元祐之政為蔡京黨所攻出知湖州陳師錫字伯修建陽人熙寕進士為侍御史時詔進士習律師錫請退寢其制徽宗立與陳瓘同論蔡京蔡卞時號二陳周常字仲修浦城人熙寕進士元符中擢起居舎人鄒浩得罪常於講席論救坐貶後為禮部侍郎蔡京用事奪職居婺州游酢字定夫建陽人與兄醇俱以文行知名程頤見之謂其資可進道程顥令扶溝設庠序教人召酢職學事元豐五年第進士調蕭山尉近臣薦其賢召遷博士以奉親求知河陽縣范純仁入相復為博士晚得監察御史知漢陽軍和舒濠三州卒何去非字正通浦城人累舉不第元豐五年廷對用兵之要神宗異之問何以知兵對曰臣聞文武一道古之儒者未嘗不知兵神宗喜授武學教諭使校七書兵法元祐中蘇軾見其文曰此班馬匹也薦於朝詔加承奉郎出為徐州教授厯判廬州卒有文集二十卷備論四卷司馬法講論三卷三畧講義三卷子薳有春渚紀聞十卷劉韐字仲偃崇安人紹聖進士欽宗時累拜資政殿學士京城不守遣使金營金人命僕射韓正館之僧舎曰國相知君今用君矣韐仰天大呼書片紙使親信持歸報諸子沐浴更衣酌巵酒而縊燕人嘆其忠􅄟之寺西岡山凡八十日乃殮顔色如生胡安國字康侯崇安人紹聖中廷試推明大學以漸復三代為對哲宗稱善親擢第三為太學博士足不躡權門父沒終喪遂不仕築室墓旁耕種取給宣和末李彌大等薦除起居郎欽宗召見令勉受命建炎二年張浚薦安國可大用以時政論二十一篇獻除給事中朱勝非再相安國竟歸春秋傳書成帝謂深得聖人之㫖累進寶文閣直學士卒詔贈四官賜田十頃恤其􅀌諡文定謝良佐語人曰康侯如大冬嚴雪百草萎死而松柏挺然獨秀王安石廢春秋安國濳心是書二十餘年曰此傳心要典也有文集十五卷資治通鑑舉要補遺百卷章誼字宜叟浦城人崇寕進士紹興中為侍御史獻戰守四策充奉表通問使誼至雲中與尼瑪哈烏克新論事不少屈累官端明殿學士諡忠恪尼瑪哈烏克新舊作粘罕兀室今改正葉廷珪字嗣忠甌寕人政和進士建炎中厯官太常寺丞知泉漳二州著有煮鹽利害圖書海錄碎事行世鄭㲄字致剛建安人重和進士累遷諫議大夫苗劉逆亂㲄庭立面折二㐫遣所親謝嚮至平江見張浚等具言城中事以為嚴設兵備大張聲勢持重緩進使賊自遁無驚動三宫浚等聞之皆感激奮勵為赴難計苗劉敗進簽書執政甫百日而卒帝甚悼之諡忠穆吳棫字才老建安人舉進士除太常丞通判泉州著書禆傳詩補音論語指掌考異續解楚辭釋音韻補又作字學補韻朱子據其説以叶三百篇之㫖胡寅字明仲安國長子宣和進士除祕書省校書郎楊時為祭酒寅從之受學金人南侵寅上書願下詔號召四海罷絶和議紹興二年詔内外臣各言事寅以十事應詔議遣使入雲中寅疏寢罷使命徽宗訃至寅疏願降詔㫖服喪三年衣墨臨戎以化天下累除徽猷閣直學士有斐然集三十卷胡宏字仁仲寅弟幼事楊時侯仲良傳其父學優游衡山下三十餘年張栻師事之著書曰知言張栻謂其言約義精道學之樞要制治之蓍􅀛也有詩文五卷皇王大紀八十卷弟和仲安國之傳春秋修纂檢討盡出其手又著春秋通㫖以羽翼父書云范如圭字伯逵建安人建炎進士紹興中遷校書郎秦檜建和議如圭責以忘仇辱國檜死入對請籍荆江曠土傚古助法别為科條役法時儲位未定如主請斷以至公勿疑詔立普安郡王為皇子如圭忠孝誠實其學根於經術有集十卷魏行可建安人建炎中假禮部侍郎充河北通開使金留不遣紹興六年卒張邵來歸言行可執節没於王事贈祕閣修􅁧魏孝友字移可甌寕人入太學應詔論時政語皆鯁切傅亮檄爲幕府從事建炎中授迪功郎令定遠郡冦犯境孝友死之贈朝奉郎劉子羽字彦修韐長子建炎中張浚宣撫川陜辟參軍事金人窺江淮浚合五路兵以進子羽爭之浚雖衂師卒全蜀子羽功居多吳玠未知名子羽獨奇之以不附秦檜和議奉祠歸與弟子翬並爲朱子所師事卒贈少傅諡忠定劉子翬字彦沖韐仲子韐死靖康之難子翬痛憤致羸疾以不堪吏事丐閒局主管沖祐觀家屏山下自號病翁獨居危坐意有所得則筆之於書間數日輒走謁父墓涕泗嗚咽事繼母及兄子羽盡孝友朱子師事之嘗問入道次第自言於易得入德之門所爲不遠復者吾之三字符也子翬學深於易家有東西二齋東以復名西以蒙名學者稱屏山先生蕭覬字子莊浦城人少􅀌以孝聞母喪廬墓有靈芝之異與李郁陳彦羅從彦同受業楊時之門後為清流簿終􅀊而歸朱松嘗師事之吕祉字安老建陽人紹興中為兵部尚書酈瓊與王德不協命祉往廬州節制之瓊叛祉為所執瓊降劉豫擁祉至三塔祉曰豫逆臣我豈可見之死則死於此遂遇害熊克字子復建陽人紹興進士好學善屬文郡博士胡憲器之嘗以文獻曾覿覿白於朝以為校書郎權直學士院克自以見知於上數有論奏召草明堂赦書帝嘉其識體劉勉之字致中崇安人元祐中蔡京用事伊洛之書不行勉之求得其書潛鈔而黙誦之聞譙定從程頤遊邃易學遂師事之見劉安世楊時皆請業焉與胡憲劉子翬相往來講論切磋人號白水先生朱子之父病革屬朱子曰籍溪胡原仲白水劉致中屏山劉彦沖三人學有淵源吾所敬畏汝往事之而惟其言之聽及卒屬以後事勉之經理其家以女妻朱子胡憲字原仲安國從子紹興中伊洛學有禁憲獨與劉勉之誦習其説力田賣藥以奉其親從父安國稱其有隱君子之操從遊者日衆稱籍溪先生廷臣交薦以母老辭乃授迪功郎添差建州教授日與諸生接訓以為已之學郡人程元以篤行稱龔何以廉節著皆迎致俾參學政學者自是大化起祕書省正字與王十朋馮方查籥李浩相繼論事太學生為五賢詩以歌之卒諡靖肅劉珙字共父子羽長子紹興十二年中進士乙科累遷禮部郎官秦檜欲追諡其父召禮部㑹問珙不至檜怒逐之孝宗朝拜參知政事奏除福建鈔鹽􅀊額罷江西和糴廣西折米鹽錢及蠲諸路積年逋欠及卒手書訣張栻朱子以未能為國雪恥為恨吳玠字晉卿崇安人未冠出隸涇陽軍遂為德順軍人少沉毅有志節讀書通大義用兵本孫呉務遠畧不求小利御下嚴而有恩士樂為之死紹興中官至特進開府儀同三司四川安撫使卒贈少師諡武安淳熙中追封涪王弟璘字唐卿從玠攻戰有功代為將守蜀二十餘年隱然為方面之重威名亞於玠乾道初拜太傅封新安郡王卒贈太師諡武順追封信王詹體仁字元善浦城人隆興進士為太常少卿紹熙五年夀皇不豫率同列抗疏請駕詣重華宫趙汝愚定策援立天下晏然體仁與諸賢密贊之力也少從朱子學以存誠慎獨為主周必大當國體仁薦三十餘人皆當世知名士郡人真德秀亦早從之遊袁樞字機仲建安人乾道初除太學錄輪對三疏張説簽樞密樞與學省同僚共論之嘗取司馬光資治通鑑區别其事而貫通之號通鑑紀事本末孝宗讀而嘉嘆所著又有易傳解義辨異童子問等書魏掞之字子實建陽人師胡憲與朱子遊築室讀書人稱艮齋先生孝宗時宰相陳俊卿薦以布衣入見極陳當世之務上嘉納之守太學錄日進諸生教誨之不半載歸居家謹喪祭重禮法依古社倉法請官米以貸民斂散如常民賴以濟劉爚字晦伯建陽人與弟炳受學於朱子呂祖謙登乾道進士為國子司業乞罷偽學之詔又請以朱熹白鹿洞規頒示太學取四書集註刊行之又言兩淮藩蔽江南宜加經理必於招集流散之中就為足食足兵之訃帝嘉納之累官工部尚書卒諡文簡徐應龍字允叔浦城人淳熙進士知瑞州時呂祖儉以言事忤韓􅇑胄謫死應龍經紀其喪且為文誄之朱子稱其義風凛然厯官刑部尚書兼侍讀在講筵多指陳時政史彌遠聞而惡之卒贈太師魏國公諡文肅子榮叟清叟同舉嘉定進士以直節相尚官俱至參知政事榮叟諡文靖清叟諡忠簡童伯羽字蜚卿甌寕人師事朱子性況黙以道自任時學禁方厲遂閉户不出朱子扁其樓曰醉經堂曰敬義人稱敬義先生時建陽邱義與朱子友善其從弟膺亦從受業朱子亟稱之蔡元定字季通建陽人父發博覽羣書號牧堂老人朱子稱其教子不於利祿而開之以聖賢之學非世人所及元定早承父教既長辨析益精聞朱子名往師之朱子大驚曰此吾老友也尤袤楊萬里薦之以疾辭韓􅇑胄禁偽學謫元定道州州縣捕元定甚急元定不辭家即就道至舂陵遠近來學者日衆貽書訓諸子曰獨行不愧影獨寢不愧衾勿以吾得罪故遂懈􅇑胄既誅贈廸功郎賜諡文節學者尊之曰西山先生著有大衍詳説律吕新書燕樂原辨皇極經世太元潛虛指要洪範解八陣圖説朱子為之序子淵沆沈並躬耕不仕淵紹其易學著有周易訓解等書沆紹其春秋學著有春秋五論學者稱復齋先生蔡沈字仲黙元定季子從朱子遊受父師之託著書傳年僅三十屏去舉子業一以聖賢為師隱居九峯當世名卿物色將薦用之沈不屑就人稱九峯先生卒諡文定真德秀字景元改字希元浦城人慶元進士為禮部郎疏言金有必亡之勢亦可為中國憂理宗即位人見奏霅川之變非濟王之志屢進鯁言史彌遠嚴憚之既歸修讀書記召為户部尚書入見進大學衍義復陳祈天永命之説上嘉納德秀立朝不滿十年奏疏無慮數十萬言韓􅇑胄立偽學之名以錮善􅀋德秀慨然以斯文自任黨禁間而正學明於天下後世多其力也著有西山甲乙稿對越甲乙集經筵講義端平廟議翰林詞草四六獻忠集江東救荒錄清源雜志星沙集諸書蔡模字仲覺沈長子隱居篤學嘗為續近思錄及易傳集解河洛探賾大學衍論語孟子集疏等書淳祐中以薦補廸功郎添差本州教授疏言敬義為萬世帝王心學大㫖价人大師等六者為國家守􅀖要道又請頒白鹿洞學規於天下學者稱覺軒先生蔡抗字仲節沈次子紹定進士厯諸王教授奏對論正心及内降斜封之􅁦又言權奸不可復用國本不可不早定帝善之官至參知政事致仕卒諡文肅朱在字敬之建安人朱子三子以䕃補官寶慶中厯官工部侍郎進對論人主學問之要因奏閔子以下九人並封公爵獨曽子為侯乞並封公揚雄王雱乞去其像程顥程頤張載乞從祀廟廷帝嘉納之兄子鑑字子明累官湖廣總領嘗葺朱子所著為易説詩傳遺説鑑于浚字深源累官吏部侍郎尚理宗公主元兵下建州浚入福州與知府王剛中死守剛中降浚謂公主曰君帝室王姬吾大儒世胄不可辱遂飲藥死贈朝散大夫熊禾字去非建陽人有志濓洛關閩之學從朱子門人遊舉咸淳進士授汀州司户參軍入元不仕謝枋得聞禾名自江右來訪又嘗與江西胡庭芳論學著有三禮考異春秋論考經序學解元雷機字子樞建安人延祐進士授古田丞厯調興化尹察豪强數家置之法賦役不均率吏民首實而品第之民呼為雷神終朝散大夫著有龍津龍山鄴川環中黃鶴磯梅易齋碧玉環七稿父德潤邃於易機及弟栱弟杭俱以易名有周易註解行於世稱雷門易楊載字仲宏浦城人僑居錢塘博渉羣書年四十不仕以薦召為國史院編修延祐初應試登進士第授承務郎其文章以氣為主愽而敏直而不肆於詩尤有法與虞集揭奚斯范梈齊名有集八卷行世明楊榮字勉仁建安人建文進士授編修永樂初簡入文淵閣榮年最少而警敏通練渥受帝知每北巡及出塞必令扈從十八年進文淵閣大學士洪熙中累進太子少傅謹身殿大學士遷工部尚書宣德中加少傅正統中進少師卒贈太師諡文敏榮厯事四朝有謀能斷三楊中最以才見稱李黙字時言甌寕人正德進士由庶吉士厯驗封郎中累進吏部尚書時嚴嵩竊政黙持已意無所徇嵩搆之奪職尋復用忤趙文華為所訐下獄死隆慶中復官萬厯時諡文愍徐彪字叔傑浦城人親喪廬墓三年歸刻木為二像日上食出入必告忌日則素服哭泣鄰有被負鬻妻者為代償而返之萬厯中被旌黃大鵬字文若建陽人崇禎進士初授龍游知縣㑹義烏兵叛來薄城大鵬單騎解散遂調知義烏縣唐王入關召為兵科給事中與鄭為虹共守仙霞嶺為大兵所執死之本朝乾隆四十一年賜諡烈愍本朝鄭重字山公建安人順治戊戍進士為靖江令縣瀕大江與秦興如臯接壤重濬柏城石碇等五港以洩水又疏七十二支港以匯灌團河三邑永無水患擢行人選吏部主事厯四司郎中嚴明簡要中外推之終刑部左侍郎檢閲諸司案牘多所矜檡居官三十年清白如一著霞園文集京華草秦游草越使吟文選集註等書行世祀郷賢祠黃學朱甌寕人性孝友父早喪弟允芳幼凡衣食必先母弟而後及妻子賊冦其鄉與弟同被掠紿賊曰􅇚弟歸變業可以贖我賊信之弟歸而學朱竟死於賊徐昌崇安人潛心理學以明經訓導莆田親喪囘籍服闋或勸之仕昌泣曰吾為升斗祿冀養親也今親不逮養奚仕為遂築室武夷山與子孫講學不輟年七十餘卒暨警盤崇安人性至孝母年八十九警盤年已六十六兵主母老不能行警盤跪為母乞全而身遇害鄭方坤字則厚建安人雍正癸卯進士由邯鄲令厯知登州武定兖州府事登州嚴禁人口出海至奉天者方坤謂東民覓食遼陽縣以數千計司牧者但當嚴匪􅀋之防不必閉其謀生之路請於上官奏弛其禁值武定􅀊飢請撥登萊穀八萬石由海運接濟復截留漕米五萬石并銀五萬兩兼賑全活無算生平篤學嗜書著述宏富所著有經稗五代詩話全閩詩話古文詞望古集諸書袁光朝建陽人竭力事親數十年如一日乾隆年間與同邑孝子劉齊元先後被旌董睿思崇安人端純有學行賊劫其父及弟睿思冒險救之以哀泣動其渠魁賊􅇚其父還又設法贖弟歸親柩在堂鄰火延及睿思抱柩痛哭誓與俱燼火為之返周急濟貧羣推仁孝又同邑孝子暨世治潘廷雲吳炳正童進先俱乾隆年間旌祖之望字載璜浦城人乾隆戊戌進士由庶吉士厯刑部郎中以太常寺少卿出為山西按察使遷湖北布政使嘉慶元年孝感縣教匪竊發之望於檄到江西官兵内派撥進􅁹並募鄉勇防堵賞戴花翎擢湖南巡撫入為刑部侍郎召對陳永綏廳􅀌懸苗地請將廳署移駐花園協營移駐茶洞於沿邊安設碉卡四面防維上是之旋授山東巡撫調陜西督辦商州匪徒捜捕南山太白等處餘匪尋調廣東復以刑部侍郎乞養歸十七年授刑部尚書十八年以疾奉㫖開缺尋卒流寓宋豐稷鄞縣人為御史中丞嘗論蔡京曽布姦佞後京得政修故怨除名徙建州趙士㒟宋宗室言事忤秦檜及岳飛被誣以百口保其無他檜大怒謫建州居住朱子婺源人少依父友劉子羽寓建之崇安後徙居建陽之考亭簟瓢屢空晏如也登第五十年仕於外者僅九考立朝纔四十日蹤跡在閩日居多名山勝蹟杖屨殆遍閩之人士從學者甚衆孫鑑寶慶間隨季父在遷居建安之紫霞洲後裔遂家建安焉祝穆新安人祖􅃀以女妻朱松穆因得受業朱子隨寓建陽隱於南溪築室樟樹下著有性理大全方輿勝覽四書附錄事文􅀋聚諸書學者稱樟隱先生鍾季玉樂平人北兵渡江徙寓建陽兵至不屈死之謝枋得弋陽人德祐中除江東制置使元兵攻信州與戰不利乃變姓名入建寕唐石山日麻衣躡屨東向而哭不識者疑其病狂後賣卜建陽市委以錢不受宋亡奉母居閩元使人聘之廹至燕不食死元孔克和曲阜人父楷元至正間為崇安尹卒於官克和與弟克遜卜宅武夷建孔子祠今其地名小孔林列女五代練寯浦城人章仔鈞妻仔鈞為將欲以失期斬二校寯隂遣之仔鈞死寯居建州建州破二校實在行間密令人遺以白旗曰吾欲殲城願夫人植此旗於門夫人反之曰若念舊恩當全此郡人否則吾不獨生二校感其言而止後累封賢德夫人子孫皆顯貴余敬洪妻鄭氏建安人敬洪為建州將南唐下建州禆將王建封得鄭氏脅之刃不屈轉獻之上將查文徽欲納之氏大罵曰王師弔伐當􅅄錄節義君為上將安得􅀂是查大慚訪還其家宋章惇妻張氏浦城人甚賢惇之入相張病且死屬之曰君作相幸勿報怨既祥惇語陳瓘曰悼亡不堪奈何瓘曰與其悲傷無益曷􅀂念其臨絶之言惇無以對吕祉妻吳氏建陽人祉遇害時有得祉括髪之帛歸吳中者吳氏持帛自縊以殉葬聞者哀之真德秀母吳氏浦城人德秀十五而􅀌吳氏力貧教之元李智貞浦城人父子明無子智貞七􅀊能讀書九􅀊母病侍奉甚謹及卒哀痛欲絶不茹葷三年治女工供祭祀奉父甘㫖不乏父嘗許為鄭全妻未嫁從父客邵武邵武豪陳良悦其慧强納采求聘智貞斷髪拒之且數自求死良不能奪卒歸全事舅姑以孝聞泰定間全病殁智貞悲泣不食數日而死徐彩鸞浦城人適李文景為妻畧通經史每誦文天祥六歌必為感泣至正十五年青田賊冦浦城徐氏從父嗣源逃山谷賊持刀欲害嗣源徐氏前曰此吾父也願殺我賊捨父而止徐氏徐氏語父曰兒義不受辱今必死父可速去至桂林橋拾炭題詩壁間有惟有桂林橋下水千年照見妾心清之包乃厲聲罵賊投於水賊出之既而乘間復投水死明林端娘甌寕人許字陳廷䇿聞廷䇿死遂往哭奠自剋死期理帛自縊而絶陳故家青陽山下婦將盡時山鳴三晝夜時同邑孫氏許字吳廷桂夫死亦奔喪自縊本朝楊偉妻齊氏建安人順治戊子冦變謂其女曰事勢至此逃將安避與其被執受辱盍先死全節與女俱投井死黃震妻馮氏甌寕人賊破大樂馮語賊曰母傷我姑賊捨姑執馮復紿之曰我有所藏取以奉汝入室自刎死同邑黃以緯妻陶氏夫為賊殺陶罵不絶口賊怒並殺之劉昌仁妻張氏建陽人年二十一冦至被執罵曰死則死耳豈肯受汚遂遇害同邑江有祿母何氏遇賊不屈死王權妻黃氏夫溺自刎死范庸妻吳氏建陽人夫死土豪欲强娶之姑懼哀泣氏紿姑曰媳去姑有餘資盍許之遂改妝藏刃於衣帶辭姑入賊門抽刃殺賊不中跳躍而死後人始知其改妝時已服藥矣藍繡妻謝氏崇安人避冦於鼓子巖為賊所掠逼之行不從手抱三􅀊兒奮身躍鼓子巖下母子俱死今有碑書謝烈婦殉節處時同邑周吉甫妻林氏暨丙妻王氏童光聲妻范氏岳堯時妻邱氏邱世振妻周氏皆遇賊不屈死黃化治妻謝氏政和人冦亂與夫避山谷被執投巖而死賊怒拔刀斷其右臂張志縉妻陳氏建安人夫病刲股以療及殁毁容延喘孝事舅姑課子成立乾隆中旌同邑毛肇禮妻李氏周允健妻鄭氏林元彩妻翁氏陳文鋒妻張氏蔡堦妻王氏陳大銘妻吳氏俱乾隆年間旌周廷謨妻侯氏甌寕人年十九夫殁遺腹生子撫之五􅀊又殤氏投繯死乾隆元年旌同邑節婦詹登賢妻周氏吳廷採妻陳氏謝培乾妻滕氏李口恭妻雷氏陳樹星妻毛氏何鋒妻徐氏賴際雲妻藍氏張元素妻祖氏陳朝機妻林氏俱乾隆年間旌趙鐤妻彭氏建陽人夫殁撫􅀌有成乾隆三年旌同邑劉韜遠妻黃氏王德明妻李氏梁大順妻黃氏李振尤妻沈氏謝必種妻吕氏俱乾隆年間旌陳貴恒妻虞氏崇安人夫殁苦節七十一年敎子訓孫年百有一􅀊乾隆中旌同邑衷漣源妻倪氏衷天潢妻彭氏彭士瑋妻衷氏彭慎謨妻張氏彭宙謨妻黃氏劉觀賜妻連氏潘廷雲妻吳氏邱允恭妻鄭氏倪元甲妻丁氏林希穆妻辛氏李潘德妻徐氏陳士傑妻廖氏暨復耀妻衷氏暨文棟妻汪氏方升之妻吳氏吳子棟妻程氏吳夢龍妻周氏吳亨泰妻衷氏丁志顯妻黃氏貞女王氏俱乾隆年間旌關良微妻夏氏浦城人為强暴所逼服毒死乾隆元年旌姚永治妾周氏浦城人夫殁遺一􅀌嫡􅂝資他適氏與姑女紅自給未幾姑復殁母屢勸嫁不可苦節數十年乾隆五年旌同邑孫為極妻徐氏湯肇域妻徐氏孫大鎬妻周氏任作梁妻楊氏練天章妻張氏金履亨妻李氏王定妻李氏姚咨臣妻蔡氏詹士鈞妻祝氏吳聖銘妻劉氏虞正南妻崔氏李履觀繼妻陸氏烈婦王廷椒妻周氏貞女徐氏俱乾隆年間旌范斐然妻陳氏松溪人夫殁事姑撫子苦節三十五年同邑陳虞淳妻嚴氏俱乾隆年間旌胡士龍妻趙氏政和人夫亡守節同邑馮士章妻寅氏馮如光妻劉氏范鴻翥妻胡氏徐聘妻胡氏俱乾隆年間旌章公輔妻李氏建安人夫亡守節同邑丁廷梅妻陳氏陳森妻謝氏丁天高妻魏氏彭世明妻白氏吳元通妻馮氏丁聖梅妻陳氏烈婦吳廷益妻李氏俱嘉慶年間旌楊科捷妻湯氏甌寕人夫亡守節同邑周卓茂妻龔氏俱嘉慶年間旌黃梅魁妻應氏建陽人夫亡守節同邑盧廷章妻陳氏王綱妻丁氏蕭應馥妻黃氏梁魁桂妻吳氏倪朝壆妻王氏丁志墉妻傅氏烈婦游元淇妻李氏俱嘉慶年間旌衷楠林妻彭氏崇安人夫亡守節同邑翁正春妻程氏詹良傑妻羅氏俱嘉慶年間旌徐道臨妻周氏浦城人夫亡守節同邑吳金銓妻姚氏姚挺松妻周氏姚捷芳妻陳氏劉名登妻張氏祖捷妻湯氏張爾衡妻祝氏胡忠茂妻沈氏李履豐妻全氏蘇泰望妻周氏蘇泰雍妻祖氏生員詹鐸妻周氏黃恩蔚妻鄧氏生員王恒妻郭氏蘇成勲妻蔡氏周樹橒妻繆氏周樹梧妻孟氏季鴻賓妻吳氏姚􅁉年妻祖氏章九錫妻翁氏劉朝選妻張氏生員葉搢妻詹氏俱嘉慶年間旌楊光巨妻魏氏政和人夫亡守節同邑楊學慎妻吳氏生員葉飲和妻張氏魏振韜妻吳氏俱嘉慶年間旌仙釋魏王子騫訪道入武夷繼而張湛等亦以修鍊來山推子騫為地主相與棲隱於此其十二人張湛孫綽趙元彭令昭劉景顧思遠白石先生馬鳴主胡氏季氏二魚氏也唐行儒景福初菴居山中有虎嚙人鄉人集衆捕之行儒騎虎出迎衆驚異之因號伏虎禪師今中峯寺有伏虎壇石迹猶存宋李陶真熙豐間訪武夷山好吹鐵笛因臘節諸道各招飲陶真皆赴諸房笛聲一時並發衆駭之後過建通仙巖留詩别衆曰毛竹森森自剪裁試吹一曲下瑶臺當途不遇知音聽拂袖白雲歸去來衆聞笛聲隱隱不知所適澡先建寕新豐翁氏子初居温嶺後居將軍巖二虎侍側學者爭集常謂衆曰古聖修行全憑苦節夏則布楮冬則入溪扣冰而浴故人號扣冰古佛祖鑒宣和間翁仲丞彦國請住瑞巖院至東嶺猛省曰此地重來矣扣冰禪師遺袈裟長丈餘鑒披之適稱人以松門讖考之正二百年白玉蟾瓊州人或云姓葛名長庚閩清人善草書為文頃刻萬言足跡半天下遇泥丸真人陳翠虛授以丹訣又於黎姥山中遇仙人授洞元雷法禱雨響應後居武夷山嘉定中詔徴入朝封紫清明道真人館太乙宫忽一曰不知所往土産鐵建安甌寕松溪政和四縣出練布各縣俱出元和志貢金花練蕉葛布新唐志貢蕉花練竹布茶寰宇記産茶九域志貢龍鳳等茶明統志鳳凰武夷二山出茶按武夷茶至蔡君謨始著謂其味過於北苑龍團今其所産者品􅀋極多槩之曰武夷云烟草出浦城縣者為佳按新唐志建安縣有銀建陽縣有銅九域志建安建陽浦城政和四縣皆有銀場今俱廢又元和志建州賦綿絹及偃䑕皮方輿勝覽嘉禾縣出紅棉松溪縣出紙被甌寕縣出􅈷毫琖今皆未聞附識於此
