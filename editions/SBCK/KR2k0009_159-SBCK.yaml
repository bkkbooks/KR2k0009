body:
  text: 建寕府在福建省治西北四百八十里東西距四百九十五里南北距四百三十里東至福寕府夀寕縣界三百四十里西至邵武府邵武縣界一百五十五里南至延平府南平縣界八十里北至浙江衢州府江山縣界三百五十里東南至福州府古口縣界二百五十里西南至延平府順昌縣界一百十五里東北至浙江處州府龍泉縣界二百二十五里西北至江西廣信府鉛山縣界三百四十五里自府治至京師五千七百五十五里分野天文牽牛須女分野星紀之次建置沿革禹貢揚州之域周爲七閩地秦屬閩中郡漢爲㑹稽郡冶縣地後漢屬會稽南部都尉建安八年爲南部都尉治三國吳永安三年置建安郡按此建安郡治今建安縣晉及宋齊以後皆因之寰宇記晉初郡廢屬晉安郡東晉復置而晉宋志皆不載隋平陳郡廢爲縣屬泉州大業三年屬建安郡按此建安郡治今福州府唐武德初置建州天寶初曰建安郡按此建安郡治今建安縣乾元初復曰建州屬江南東道五代時屬王閩置鎮武軍節度使見九域志石晉天福八年王延政據州稱殷國開運三年屬於南唐改永安軍尋又改忠義軍俱見九域志舊志作周顯德三年改忠義軍宋仍曰建州端拱元年改置建寕軍節度使屬福建路紹興二十三年升建寕府元至元二十六年改建寕路明洪武元年仍爲建寕府屬福建布政使司本朝因之屬福建省領縣七舊領縣八雍正十二年割夀寕縣屬福寕府建安縣附郭東西距一百一里南北距八十一里東至政和縣界一百里西至甌寕縣界一里南至延平府南平縣界八十里北至甌寕縣界一里東南至福州府古田縣治二百五十里西南至南平縣界七十五里東北至松溪縣界一百十里西北至甌寕縣界三里漢冶縣地後漢侯官縣地建安初分置建安縣屬㑹稽南部都尉三國吳為建安郡治晉及宋齊以後因之隋省郡屬泉州唐為建州治五代因之宋為建寕府治元為建寕路治明為建寕府治本朝因之甌寕縣附郭東西距一百一里南北距一百六十一里東至建安縣界一里西至延平府順昌縣界一百里南至建安縣界一里北至浦城縣界一百六十里東南至建安縣界三里西南至順昌縣界一百八十里東北至松溪縣界一百里西北至建陽縣界八十里漢治縣地三國以後為建安建陽吳興三縣地宋治平三年分置甌寕縣熙寕三年省元祐四年復置元為建寕路治明為建寕府治本朝因之建陽縣在府西北一百二十里東西距一百三十五里南北距七十五里東至甌寕縣界三十五里西至邵武府邵武縣界一百里南至甌寕縣界三十五里北至崇安縣界四十里東南至甌寕縣界七十里西南至延平府順昌縣界一百里東北至浦城縣治二百二十里西北至邵武縣界一百三十里漢冶縣地後漢建安十年吳分置建平縣屬建安郡晉􅀄因之太元四年改曰建陽宋齊以後因之隋開皇十年省入建安唐武德四年復置屬建州八年省入建安垂拱四年復置五代因之宋景定元年改曰嘉禾元復曰建陽屬建寕路明屬建寕府本朝因之崇安縣在府西北二百四十里東西距一百九十里南北距一百五十里東至浦城縣界七十里西至江西廣信府鉛山縣界一百二十里南至建陽縣界八十里北至廣信府上饒縣界七十里東南至建陽縣治一百二十里西南至建陽縣界八十里東北至廣信府廣豐縣治一百三十里西北至鉛山縣治一百三十里漢冶縣地晉以後為建陽縣地南唐分置崇安場宋浮化五年升為縣屬建州元屬建寕路明屬建寕府本朝因之浦城縣在府東北二百七十里東西距一百七十里南北距一百六十五里東至浙江處州府龍泉縣界九十里西至崇安縣界八十里南至甌寕縣界九十里北至浙江衢州府江山縣界七十五里東南至松溪縣界九十里西南至崇安縣界七十里東北至江山縣界九十里西北至江西廣信府廣豐縣界九十里後漢侯官縣地建安初分置漢興縣屬會稽南部都尉三國吳永安三年改曰吳興屬建安郡晉及宋齊以後因之隋開皇九年省入建安唐武德四年復置改曰唐興屬建州天授二年改曰武寕神龍元年復曰唐興天寶元年更名浦城五代因之宋屬建寕府元屬建寕路明屬建寕府本朝因之松溪縣在府東一百六十里東西距九十里南北距一百里東至浙江處州府慶元縣界四十五里西至政和縣界四十五里南至政和縣界二十五里北至浦城縣界七十五里東南至政和縣界四十五里西南至建安縣界四十五里東北至慶元縣治八十里西北至浦城縣治一百三十里漢冶縣地三國以後為建安縣地五代南唐保大中置松源縣屬建州宋開寶八年改曰松溪屬建州元屬建寕路明屬建寕府本朝因之政和縣在府東一百四十里東西距一百十五里南北距一百二十里東至福寕府夀寕縣界八十里西至建安縣界三十五里南至福州府古田縣界一百里北至松溪縣界二十里東南至福寕府寕德縣治二百五十里西南至建安縣界三十五里東北至浙江處州府慶元縣治一百二十里西北至松溪縣界四十五里漢冶縣地三國以後為建安縣地宋初為關隸鎮咸平三年置關隸縣屬建州政和五年改曰政和紹興中屬建寕府兀屬建寕路明屬建寕府本朝因之形勢碧水丹山梁江淹自序東閩劇地唐權德輿序保界閩越緜地八百宋楊億集東接括蒼北距上饒西南抵延平西北帶建溪宋建安志南望鐵獅紫芝羣峯以次相連黃華白鶴之秀爲東南勝地建安志風俗建備五方之俗宋張叔椿記家有詩書户藏法律貢籍甲東南宋韓无咎記山多田少溪峻水湍其民尚氣而喜節易鬬而輕生處市井者尚侈而好浮居田里者勤用而樂業宋郡志農力甚勤桑麻被野建安志城池建寕府城周十一里一百九十八步門九正北依山西南濱大溪濠長五百三十一丈廣五丈五尺元至正十二年因故址建明洪武初増建本朝康熙元年修乾隆五十八年重修建安縣甌寕縣附郭建陽縣城周十里九十六步門四濠廣二丈元至正中因故址土築明宏治元年甃石崇安縣城周五里有奇門四明隆慶二年建本朝順治十五年修康熙二年重修浦城縣城周十里門五元至正二十三年土築明正統十四年増築成化六年甃石本朝順治四年修乾隆七年嘉慶十五年重修松溪縣城周五里一百十步門四水門二明嘉靖六年建本朝順治十六年修康熙二年二十五年重修政和縣城周四里二百四十六步門五水門四明萬厯四年建本朝康熙三年修學校建寕府學在府治東北黃華山之麓宋建在府治南明永樂初遷今所本朝順治七年重建康熙十一年修入學額數二十名建安縣學在府城内中和坊宋建在郭門外明嘉靖元年遷今所本朝康熙三年重建十一年修入學額數二十名甌寕縣學在府城内叢桂坊明正統十二年建本朝康熙三十一年重建入學額數二十名建陽縣學在縣治東同由里明初建在城西萬厯間遷今所本朝康熙二十年重建乾隆三十二年修入學額數二十名崇安縣學在縣治西北牛氏巷明崇禎閒建本朝康熙二十九年修入學額數二十名浦城縣學在縣治北皇華山之麓宋建在東南隅龍頭山左明正德間遷今所本朝康熙三十一年還龍頭山左四十七年仍遷今所乾隆六年重建二十一年修四十九年嘉慶四年重修入學額數十五名松溪縣學在縣治東明嘉靖二十四年建本朝康熙二年修十六年重修入學額數十二名政和縣學在縣治東明萬厯八年建本朝順治十四年重建入學額數八名建安書院在府治北宋嘉熙中郡守王埜建本朝康熙三十二年重建屏山書院在甌寕縣治南紫芝上坊宋劉珙故宅又崇安縣東屏山之麓亦有屏山書院宋劉子翬故宅考亭書院在建陽縣西南三桂里宋紹興中朱子築室於此淳祐四年改為書院理宗親書考亭書院扁於門本朝康熙中重建紫陽書院在崇安縣南武夷山大隱屏下舊為武夷書院宋朱子建本朝康熙二十五年重建改今名御書扁曰學達性天南浦書院在浦城縣越王山之麓本朝乾隆二十八年知縣吳鏞建五十八年修嘉慶八年重修按舊志載鼇峯書院在建陽縣崇泰里唐尚書熊祕建同文書院在建陽縣崇化里雲谷書院在崇泰里俱宋朱子建橫渠書院在建陽縣永忠里宋寶祐間橫渠九世孫張德建廌山書院在建陽縣禾平里宋紹興中游酢讀書於此乾道中建瑞樟書院在建陽縣永忠里宋嘉定中劉中建文肅書院在崇安縣西南宋游酢六世孫德馨建陽明書院在崇安縣武夷一曲溪右明王守仁講學處星溪書院在政和縣南正拜山下雲根書院在縣西俱宋朱松建謹附記户口原額人丁二十五萬一千八百九十今滋生男婦大小共三百一十九萬三千四百一十名口計五十一萬二千二百九十三户又屯民男婦共三萬四千四百九十五名口計五千九百二十九户田賦田地二萬一千一百八十四頃五畝八分一釐有奇額徴地丁正雜銀二十萬七百五十四兩五錢四釐米一萬六千二百七十七石一斗九升四勺屯田一百五十八頃一十三畝二分五釐有奇額徴丁糧銀一千四百六十二兩四錢五分六釐山川白鶴山在建安縣東寰宇記在郡東郡圖云晉時望氣者言此山有異氣命工斷之乃有二白鶴冲天而去因名方輿勝覽在建安縣東二里中有靈泉通志東為天馬山山巔有峯東分白鶴西接黄華中有白鶴山房鳳凰山在建安縣東一名茶山五代晉天福三年王延政據建州福州兵來攻延政敗之于茶山寰宇記茶山在郡東北民多植茶於此其山涉冬翠茂俯瞰城郭宋紹興二年韓世忠聞賊帥范汝為入建州水陸并進直抵鳳凰山大破之方輿勝覽鳳凰山在縣東二十五里通志山形如翔鳳當鳳咮處有石蒼黒堅緻如玉太原王頤取以為硯蘇東坡名之曰鳳咮即此是也龍山在建安縣東與鳳凰山對峙上有泉宋咸平間丁謂監茶嘗於御茶亭前引龍鳳二山之泉為池其中為島四面植海棠曰紅雲島響山在建安縣東五里其山空洞枕於溪側傳聲若谷前有洞曰浮石水泛不沒方輿勝覽在縣南三里壑源山在建安縣東南鳳凰山南高百丈産茶為外焙冠俗名壑源茶一名捍火山又名望州山又曹高山在縣東南有茶場象山在建安縣東南三里山形肖象其鼻迴轉抱水一泓冬夏不涸俗名白象捲湖又縣西隊羊山隊魚山俱以形名梨山在建安縣東南十五里奇秀峭拔為諸山最唐刺史李頻雅好遊覽於此虎頭巖山在建安縣南山多奇石前聳一峯若虎頭然上有石如人拱立又名石人山雞足山在建安縣南三十里三峯如雞足又南有三門山王氏據閩時嘗置柵防守於此相近又有龍池山相傳有龍居山頂池中遇旱觸以物即雨仙人山在建安縣西南七十餘里璜溪自甌寕郭巖發脉髙聳而下至此始平黃華山在建安縣東北二里縣志山脉自括蒼來延亘六七百餘里止於此山五代時王延政嘗建太和殿於山下宋建炎初韓世忠討范汝為嘗屯兵其上元至正二十年陳友諒入寇列營於此守將阮得柔築城山巔下屬舊城禦之明洪武十九年改拓郡城山遂包在城中馬鞍山在建安縣東北三里一名瑞峯山郡之主山也雞籠山在建安縣東北五里與馬鞍相屬竹木蓊鬱狀若雞籠蘇口山在建安縣東北二十里亦名東山嶔崖邃谷奇變層出為武夷之亞相接者曰盤山以山勢寛平如盤得名辰山在建安縣東北一百四十里洋坂府境之山此為最高登其巔可望海日初出有逍遥飲坑牛頭三峯上有牛心洞下有蘆竹洞有蛟窟深不可測禱雨即應覆船山在甌寕縣南寰宇記形若覆船陳太守駱丈廣嘗移郡於此山之北舊志在縣西南三里與鐵獅