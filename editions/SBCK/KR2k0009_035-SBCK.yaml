名宦五代周邊珝華州鄭人顯德二年以職方員外郎出知通州􅀊鬻鹽於狼山等處増課萬餘石設州置守自珝始宋錢冶景德間知如皐縣邑不農桑以鹽為業冶曰使民足於衣食鹽猶農也乃悉求鹽利害為條目民以便利鹽亦􅀊增曾易占南豐人祥符間知如皐縣􅀊大飢請於州得越海轉粟所活數萬人明年稍稔州課民賦如常易占力請緩徴他縣民多轉徙惟邑獨完王隨河南人乾興初以秘書少監出知通州因州地濱海少學者隨於州建學舎州人喜遣子弟就學吳遵路丹陽人明道二年知通州時􅀊將飢遵路募閭右出錢航海糴未以備食置廠設糜以處流移所存活甚衆任建中寶元間通判通州築隄二十里以捍江潮田無齧没沈起明州人知海門縣縣􅀒海地卑間􅀊海潮至冒民田舍民徙以避棄其業起築隄百里引江水灌溉其中田益闢民相率以歸元綘錢塘人知海門縣淮民多盜販鹽制置使建言滿二十觔者皆坐徒綘曰海濱之人恃鹽以爲命非羣販比也笞而縱之張次山河南人調泰興簿督開河渠工多先辦包拯薦之於朝徐勣南陵人判通州濱海有捍隄廢不治􅀊苦漂溺勣躬督防海卒䕶築之李大有東陽人判通州州田􅀊苦旱鑿狼山麓引江水入河溉之自是􅀊乃屢稔攝郡事吏持案白送例錢大有悉却之吳表臣永嘉人擢通州司理陳瓘謫居郡中一見器之盛章者朱勔黨也嘗市娨有武臣强取之章誣以罪繫獄表臣方鞫之郡將曰知有盛待制乎表臣佯若不知卒􅀡其事尤袤無錫人爲泰興令問民疾苦皆曰郡伯鎮置頓爲金使經行也使率不受而空厲民漕司輸藁秸致一束數十金二􅁦久莫之去乃力請臺閫奏免之縣舊有外城屢殘於寇袤即修築己而金渝盟陷􅀭州獨泰興以有城得全王柟大名人孝宗時調海門尉乘輕舟入海濤捕劇賊小吳郎并其徒十七人􅀗之獄成不受賞程迥餘姚人孝宗時為泰興尉訓武郎楊大烈死而妻女存有訟其妻非正室者官没其貲部使者以諉􅂞迥曰大烈死貲産當歸其女女死歸所生母可也喬行簡東陽人慶元時知通州條上便民事劉宰金擅人為泰興令有殺人獄具謂禱於叢祠所致宰毁其廟斬首以狥隣邑有租牛縣境者租戶與主有姻連因喪㑹􅀼劵而逃其子累訟不休宰至鞫得其情盜劵者憮然為歸牛與租富室亡金釵惟二僕婦在置之有司咸以為冤宰命各持一蘆曰非盜􅁫者詰朝蘆當自若果盗則長於今二寸明旦視之一自若一去其蘆二寸矣訊之果服其罪有姑訴婦不養者宰召其一婦并姑置一室或餉其婦而不及姑徐伺之一婦每以己􅄿饋姑姑猶呵之其一及之如是累日遂得其情姜才濠州人為通州副都統元兵攻揚州才為三疊陣戰於三里溝有功又與戰􅀭子江流矢貫才肩才拔矢揮刀而前所向辟易宋亡灜國公至瓜洲才與李庭芝誓將士出奪之以四萬人夜擣瓜洲戰三時衆擁灜國公避去元將阿爾珠招之才曰吾甘死豈作降將軍耶與庭芝東至泰州阿爾珠兵追及才疽發脇不能戰都統曹安國執以獻阿爾珠愛其忠勇欲降而用之才肆為謾言阿爾珠怒剮之􅀭州阿爾珠舊作阿术今改正明鄭重慈谿人成化間知通州重濬金沙河西亭河數十里民利之蔡暹成化間知泰興縣邑南濱大江每􅀊江水浸齧民田暹築堰捍禦長萬六千餘丈劉文􅃂玉四人宏治初知如皐縣舊編種馬止百餘匹永樂間以六安州被災􅀉養官馬千三百餘匹沿為民累值朝使清理馬政文􅃂力請仍如原額民困􅀗蘇黄連萬全人正德中為泰興縣主簿流宼劉六等劫掠縣界連率民兵禦之生擒賊黨李南乘勝追賊被創死裴紹宗渭南人正德中令海門裁抑浮費奏蠲坍糧後官給事中以諫死張承恩易州人正德間知通州不避强禦有獻沙漲田於戚畹者承恩榜禁之其人懾而止黎堯勲四川人嘉靖中知如皐縣豪室悍竈兼并為患堯勲特請均田辨肥磽定稅為上中下三則迄今便之嵇鑘德清人嘉靖末知如皐縣百户余顯横鷙海上鑘鈎致其黨按治正法戌海卒每􅀊更番為民患鑘先期畫界與戍將約母犯民俄卒殺漁者鑘執以詰戍將卒伏􅇳包檉芳嘉興人隆慶初為通州運判時海潮大作由石港至馬塘隄岸崩圯溺死人畜無算檉芳建議築隄自彭家口直接石港縈紆十六里凡各竈場産在隄外者俱得全民田遂免漂没之患宋文昌商城人萬厯中知如皐縣邑田磽确仰灌淮流鹺使者惑姦人請自牙橋鑿渠東注水盡歸江闔邑苦暵文昌力請塞渠民利之周承恩武岡人萬厯中知如皐縣故例濬河之役通邑計里出夫有欲專責瀕河民役之承恩力爭得己江沙善崩漲徙靡定往往射水占賦承思均之邑中徭賦以清李衷純秀水人萬厯末知如皐縣縣地瀕江海沙漲成洲豪家輒據為業洲民爭之不得則以田獻勲弁每秋穫戈船旗鼓相接衷純單車往諭乃得解大盜數百倚洲恣掠衷純捕馘其首餘黨盡散造戰艦募兵百人邏行江上盜賊屏跡本朝陳棐光州人順治初知泰興縣時天下初定主兵者疑邑人反側棐力保無他民賴安全以最擢御史陳秉彝奉天人順治初知知皐縣㑹􅍂􅀨江水泛溢民多流亡秉彝倡募設賬全活甚衆馬御輦涇陽人順治二年知如皐縣時海寇及鹽徒作亂遇害事聞加贈􅄻䘏人物宋王維熙如皐人景祐進士為大理寺詳斷官持法堅正務原人情奏案成廷尉使易之不從儂智高反掠嶺南諸州吏棄城者當坐法維􅄉議嶺南兵與城皆無足恃柰何以常法置之死上亦憫之皆得免累官司封員外郎吳及通州静海人以進士起家為侯官尉累遷太常寺博士時仁宗春秋高無子及因推言閹寺以及繼嗣事帝異其言嘉祐三年擢右正言復上疏請擇宗室子以備儲副明年管勾登聞檢院請省冗官汏冗兵條上十餘事多施用之又言州郡官司各專其民擅造閉䊮之令遂詔隣州隣路災傷而輒閉糴論如違制律久之遷右司諌管勾國子監在職數年以勁正稱遇事無大小輒言後出知廬州進戸部􅀡昭文館復知桂州卒王覿如皐人第進士神宗時為編修三司令式刪定官尋除司農寺丞司農時為要官進用者多由此􅃟覿拜命一日即求外韓絳高其節哲宗立擢司諌上疏極論蔡確章惇韓縝張璪朋邪害正相繼斥去又劾竄吕惠卿時差役法復行議者謂免役法無一事可用覿因採掇數十事於差法有助可以通行者上之遂論青苗之害乞盡罷新令而復常平舊法覿在言路欲深破明黨之説朱光庭訐蘇軾館職䇿間吕陶辯其不然遂起洛蜀二黨之說覿言學士命詞失指其事尚小使士大夫有朋黨之名大患也帝深然之置不問尋拜侍御史右諫議大夫厯遷刑戸工部侍郎徽宗即位遷御史中丞覿清修簡淡人莫見其喜愠持正論始終再罹遣逐不少變王俊義覿從子游學京師資用之或薦之童貫欲厚聘之拒不答以太學上舍􅃟徽宗親程其文擢為第一蔡京邀使來見曰一見我左右史可立得俊義不往僅拜國子博士㦄遷右司員外􅀰為王黼所惡以直秘閣知岳州卒顧忻泰興人十􅀊喪父以母常病葷腥不入口者十載雞初鳴具冠帶率妻子詣母室問其所欲如此五十年未嘗離母左右母老目不能覩物忻日夜號泣祈天刺血冩佛經數卷母目忽明孫益泰興人紹定中李全游騎薄城下縣令王爚募人守禦益起從之俄賊兵大至率衆拒之勢稍却益厲聲呼曰王令君募我來將以守䕶城邑我輩不為一死何面目見令君乎遂身先赴敵死同時顧緒顧珣俱戰死事聞贈益為保義􅀰明翟善泰興人洪武中貢入國學擢文􅃟主事進員外􅀰掌部事尋拜侍郎時諸司未有定格善承㫖仿唐六典為書名諸司職掌頒行天下後升尚書太祖欲為營第於其里善辭以江鄉地隘宗親衆不忍奪人自益又善家戍籍帝欲免之善曰今區宇初定戍卒宜増不可以臣破例帝皆善之朱顯忠如皐人從傅友德征蜀克文州令留守偽夏趙元帥與平章丁世興合兵政圍甚急顯忠悉兵拒戰力不敵城䧟死之茅大芳名誧以字行泰興人博學能詩文洪武中為淮南學官擢秦府右長史輔導盡職建文初遷副都御史燕師入南京坐姦黨被收不屈死本朝乾隆四十年賜諡忠節許孚世為蘇州人元末隨父避亂如皐遂家焉舉建文己卯鄉試為方正學所得士時官工部主事榷蕪湖闗聞正學殉難北向再拜泣曰吾師􅀗死所矣遂飲酖死張起泰興人初遭宼亂與母相失起日夜悲泣行求四方三十年遇於濟寕奉以歸姚繼巖通州人宏治進士授工部主事厯吏部郎中一時有冰鑑之目武宗南狩繼巖與同官張元承倡令省院諸臣連章奏留被廷杖世宗初升太常少卿清譽益著張羽泰興人宏治進士由淳安知縣擢御史彈劾中貴疏論時事甚剴切廵按雲南奏免開礦及中官怙勢者後守保定以母疾乞歸崔桐海門人正德進士授編修諫武宗南廵被廷杖世宗初伏闕諌議禮復被廷杖後以副使督學於楚有清名厯辰沅兵備定永順保定爭地平長沙安化山寇擢為南京太僕累拜禮部侍郎錢鐸通州人正德進士嘉靖初任刑部主事以諫大禮廷杖後進員外勲戚有擅役黑窰廠官軍者屬鐸鞫問罪家人管勾數十輩皆發編伍勲戚為之斂跡以􅀰中岀守肇慶鄖陽擢廣西副使功績甚著顧養謙通州人嘉靖進士由戸部􅀰中厯遷杭嚴道臺省推轂邊才遂徙謙備兵薊鎮尋拜右僉都御史廵撫遼東著勲績遷南京户部侍郎以憂去時謂飬謙必能辦倭起為兵部侍􅀰總督薊遼軍務養謙膽􅂔過人臨事多知畧所在著聲卒諡襄敏徐可行通州人萬厯中為長興簿先是嘉興有葉朗生之變其黨吳野樵等潛匿長興突入縣堂誘執縣令石有恒可行聞變亟挺劒喝賊梃刃交下遂先令死罵不絶口冒起宗如皐人崇禎進士授行人􅃟南考功掌内計時憚其方正出為兖西僉事㑹流寇據河南起宗監河上軍賊不能渡後備兵嶺西旋調湖南寳慶副使以憲副督漕江上乞休歸子襄為諸生有聲許直如皐人崇禎進士以名節自砥知義烏縣清操皭然母憂歸哀毁骨立服闋補惠來縣因清望徴授文選主事進考功員外郎賊䧟都城令百官報名直曰身可殺志不可奪不赴作書􅀉父絶命詞遂自經死本朝乾隆四十一年賜諡忠愍殷尚聲通州人官桂陽州判崇禎末流賊薄城城陷尚聲死之男婦從難者六人本朝乾隆四十年賜諡節愍閻􅀿元通州人崇禎中為江隂典史手射殺賊三人南京亡大兵攻江隂應元守甚固城陷被執不屈死本朝乾隆四十一年子入昭忠祠本朝李我彭通州人􅀉居􅀭州順治乙酉四月城陷我彭負母逃至水側兵及之母驚殞我彭伏水草中俟兵過􅀒母屍走數里掩埋畢再拜一慟而絶吳􅀿昌通州人以武解元登順治壬辰進士授徐州守備升浦口都司己亥六月海寇入犯因調防談家洲䧟陣不屈死事聞贈卹世􅄻孫閎達通州人康􅄉甲辰進士知山西太原縣愷悌得民每兩造赴庭閎達懇切誨諭多罷訟而去以病歸士民感戴入祀太原名宦祠生平日所為夜必檢記所著有省身錄入祀本州鄉賢祠丁腹松通州人康熙癸未進去知扶風縣值凋殘之後事事與民休息聽訟明允以德化人善政不可枚舉雍正七年入祀名宦祠陳德奎通州人以武舉授湖北宜昌鎮標守備􅁹湖南苗匪有功嘉慶二年加都司銜􅁹辦湖北教匪擊賊於長陽縣陣亡事聞贈卹世􅄻如例李秉忠通州人由例貢生任貴州鎮寕黔西知州復任雲南羅平嘉慶二年黔粤苗匪􅇡入羅平秉忠􅁹撫有功晉開化知府續任廣東韶州攝瓊州府事䕶雷瓊兵備道所至有聲嚴高通州人任廣東碣石鎮標右營都司嘉慶十四年協􅁹磨刀洋面盗匪陣亡事聞贈卹如例􅄻雲􅀐尉世職流寓唐李綱本姓徐其先曹州人父敬業起兵􅀭州討武氏不克死之綱逃匿海陵中宗復位徴赴闕下以言事忤當路掛冠歸隠宋鄭獬六安州人父為郡曹掾時通州人張日用知新昌一見竒之遂妻以女因寓通州讀書城南文殊院陳瓘沙縣人瓘子正彚告蔡京罪下開封府制獄并逮瓘獄具正彚流海上瓘亦安置通州任伯雨眉山人崇寕黨事作削籍編管通州本朝劉名芳閩縣人結廬軍山之水雲窩病其石路嶮巇於山腰别治大道土人號曰劉􅀰路狼山去黄泥山咫尺中斷為港必紆迴數里始得至名芳甃石建橋以通之置亭以憩之行人稱便著有五山全志五十卷列女明盧氏通州人夫李逸其名嘉靖中徙常熟縣之白茆市依張島以居島悅盧氏及其女姿色誣其夫以盜置獄不死復沈之江遂謀以盧為妾而島妻弟并欲室其女盧痛夫仇不得報先刺殺女遂自刎島瘞二屍竹林中巡按御史陳蕙廉得其實島等皆伏辜為立烈婦祠祀之張大本妻潘氏通州人夫亡氏年二十守節孀居壽一百餘嵗卒曾㫤妻陳氏通州人㫤溺死陳投水以殉陳氏通州人其夫孔匿一歌者於卧室强陳同飲陳拒不從慮為所汚自經死張仲辛妻洪氏通州人年十九大染羸疾垂危與洪訣洪解指環貫夫指而自留其一曰當如此環生死不離也即自縊後三日仲辛乃卒梁天峻妻羅氏通州人高進忠作亂羅遇賊欲汚之不從被害同州王取妻楊氏曹敏行妻徐氏俱為賊所執殉節死倪宗美妻施氏如皐人正德中為寇所逼不從被殺顧士掄妻許氏如皐人少孀守節聞父直殉難不食死井傍女泰興人逸其姓嘉靖中島寇焚掠女被殺井傍寇退鄉人殮之面如生其附體丅裳皆自紉綴不可解本朝袁氏女如皐人許字繆方夫亡殉烈康熙年間旌曹坦妻陳氏通州人夫亡守節同州周尊彝妻包氏李􅀊大妻王氏孫國勲妻姚氏李炳妻瞿氏丁家相妻陳氏孫翊妻馮氏保元傅妻陳氏孫鉎妾陳氏秦有智妻湯氏馮騏妻崔氏韓永用妻李氏徐仁源妻劉氏吳頴士妻林氏王純仁妻顧氏陳必安妻馮氏盛溶妻吳氏王麟標妾周氏保斆妻楊氏沈星若妻成氏季立模妻江氏王維禧妻孫氏季炤妻邱氏范式玉妻程氏顧振宗妻鄒氏孫允貴妻黄氏陳宜廣妻宋氏顧臨秋妻吳氏均夫亡守節烈婦孫賣魚妻陳氏夫愚而貧里中惡少瞰氏美欲汚之㗖其夫以金氏度不能免遂自縊烈女陳維坤聘妻周氏未嫁夫亡遂自殉俱雍正年間旌王克生妻丁氏通州人夫亡守節同州李光斗妻王氏江于庠妻陳氏秦又思妻潘氏吳德升妻王氏湯萬里妻何氏梁之棟妻張氏鄒瑗妻姚氏張式紀妻俞氏方禹平妻王氏吳天極妻張氏沙鐘瓐妻許氏陳承緒妻錢氏戴允美妻李氏蘇宗林妻許氏季以成妻陳氏王世爵妻袁氏劉楚臣妻張氏張兆元妻吳氏張繼仲妻邱氏施文達妻黄氏錢文佩妻莊氏保天錫妻吳氏朱永濟妻尤氏馬餘謙妻王氏李常􅁉妻彭氏沙有珍妻施氏陶惟先妻戴氏姜兆􅂹妻張氏保宏妻何氏倪興祖妻劉氏鄒實頴妻陳氏李允􅆇妻王氏夏裔妻白氏劉琦妻王氏彭茂芳妻顧氏尹善述妻竇氏李方燕妻沙氏李祖包妻保氏俞辰妻江氏吳廷表妻王氏曹商玉妻季氏江兆鵬妻潘氏姚志洙妻方氏朱有亮妻顧氏程宗傑妻張氏張為嵋妻瞿氏姜祖渭妻何氏張􅁉學妻邱氏江繹安妻梁氏江榮秋妻孫氏程宗儀妻邵氏王大綸妻嚴氏丁啓瑶妻蔣氏白箕宗妻戴氏盧孫貽妻崔氏夏朝妻崔氏馮九皐妻吳氏夏武僑妻孫氏周學榮妻何氏張觀妻崔氏錢益增妻江氏劉鵬程妻吳氏孫楚白妻黄氏劉汝柱妻丁氏江叔選妻易氏黄子耆妻張氏蔣炳如妻姚氏季燕山妻孫氏田永潤妻張氏張國榮妻胡氏田永源妻李氏陶士進妻朱氏單永石妻胡氏明汝吉妻沈氏嚴論妻施氏周鑑妻徐氏崔公肅妻彭氏黄方林妻倪氏毛素文妻吳氏潘宏度妻崔氏毛頴妻邱氏陸娈妻保氏朱士美妻陳氏王喬若妻張氏錢希文妻宋氏包淩雲妻顧氏顧天錫妻張氏王巖妻范氏宋學郊妻李氏管達生妻施氏姚慶先妻周氏陶爾壽妻李氏陳天錫妻朱氏孫漢英妻夏氏張聖振妻周氏􅀭度妻陣氏蔡學周妻高氏尹端方妻張氏江以迪妻顧氏徐彬若妻陳氏王吾先妻於氏許天順妻凌氏馬思昱妻葛氏樊維翰妻施氏達于旦妻王氏吳軼羣妻陳氏楊恭安妻葛氏孫錫榮妻朱氏孫秀巖妻錢氏崔琯妻蔣氏趙靈川妻王氏程峻濤妻左氏季良宰妻錢氏顧巖山妻施氏許若倫妻喻氏江承正妻沙氏成璟妻蔣氏朱鳳儀妻孫氏孫承祐妻王氏黄嗣通妻顧氏莊良伯妻戴氏馬沅妻鄒氏曹建章妻郁氏李師沆妻戴氏白登素妻錢氏秦長清妻佴氏金洪韶妻吳氏王紹濂妻湯氏馬俊妻李氏劉宜也妻單氏曹士傑妻季氏孫鳴梧妻陳氏王亮弼妻季氏淩振聲妻朱氏盛雲梁妻江氏邱良御妻葉氏錢繼昌妻王氏錢龍見妻保氏袁仁德妻陸氏秦常林妻崔氏崔占鰲妻袁氏潘同仁妻王氏姚國瑞妻邵氏保湑妻馮氏陳聖鳳妻王氏周允中妻夏氏金輯侯妻陳氏秦長傑妻吳氏曹祥麟妻張氏曹愷妻許氏張克孝妻季氏聞楠妻姜氏季配華妻張氏馮正宗妻吳氏曹天職妻李氏施如潛妻黄氏施文彬妻顧氏季仁安妻張氏徐寅妻周氏徐之礪妻孫氏吳雙玉妻顧氏尤敏妻吳氏侯薦􅀭妻張氏均夫亡守節俱乾隆年間旌許鋭妻石氏如皐人夫亡守節同縣冒進功妻鄒氏沙鼎妾何氏劉元善妻陳氏許昌祚妻江氏劉四知妻繆氏顧開妻周氏邵永正妻章氏方欽妾劉氏龔安九妻齊氏叢合浦妻石氏冒衮妾江氏陳以質妻石氏葛貽逺妻蔣氏葛國珍妻沈氏劉雲紀妻羅氏劉羽吉妻陳氏趙之連妻章氏叢中和妻沈氏陳君政妻孫氏洪國儀妻吳氏劉鶴鳴妻程氏劉鍾俊妻張氏劉師昆妻石氏章有年妻劉氏章啓䕃妻楊氏錢應宿妻程氏冒稼妻吳氏嚴君錫妻陳氏汪文蘭妻吕氏汪尚槐妻張氏夏永祚妻繆氏張一蕙妻陳氏吳方啓妻叢氏吳鳳