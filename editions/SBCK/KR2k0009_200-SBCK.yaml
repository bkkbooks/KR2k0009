body:
  text: 大清一統志南掌在雲南省東南東至水尾界南至安南界西至安遠界北至車里界其貢道由雲南以達於京師建置沿革古越裳氏地自周以來不通中國其夷佩雕瓜為飾俗呼為撾家明永樂三年始備方物入貢置老撾軍民宣慰使司嘉靖間緬人破其東之纜掌亦名南掌葢老撾部屬之最荒遠者本朝雍正八年南掌國遣頭目叭猛花等奉表貢象二隻請定貢期奉㫖五年一貢賜之敕諭並文綺等物令使臣齎奉回國九年奉表入謝乾隆元年上以南掌僻處天末遠道致貢未免煩勞定爲十年一貢二十六年南掌國王准第駕公滿遣使齎表慶祝萬夀與例貢馴象二隻同進三十六年亦如之四十六年南掌國王召翁遣使臣呈進年貢並慶祝聖夀進馴象四隻五十八年以例進象隻爲數已多檄知南掌等國免其呈進以省該國購覓之勞六十年南掌國王召温猛恭逢國慶遣使祝釐特頒敕諭並允所請賞駱駝馬騾各二召温猛於乾隆五十九年請封已在播遷之際祇受敕印後仍未能返其國都流寓越南昭晉州地方嘉慶十四年越南國王阮福映遣員恭繳敕印邊臣查明情形具奏上以召温猛懦弱不振在外流徙遺棄敕印豈能復掌國事聽其在越南居住内地不應收留二十四年南掌國長召蟒塔度腊遣使進貢􅈼懇封號上准所請錫之敕印先是召温猛流徙越南時其伯召蛇榮執掌國事嘉慶四年十二年䖍修職貢十四年越南國王表稱召温猛流寓該國十有餘載不敢歸國繳呈敕印上以召温猛懦弱不振念其流離不加聲責該國事聽其以召蛇榮代辦兹召蛇榮之子召蟒塔度腊復修職貢敬懇封號奉㫖著加恩俯允所請再行頒給敕封以示懷柔嗣後貢期如前風俗民皆百夷性獷悍身及眉目皆刺花明統志其酋長有三等大曰招木弄次曰招木牛又次曰招化而為宣慰者即招木弄也居高樓其上寛廣見人不下樓部屬見即所至之地各為等限使客亦然而設通使引之以至其地不差又寸云官長紅巾紅衣老撾黑帽青衣老撾俗呼撾家南掌夷民也皇清職貢圖貴者披髪覆肩紅巾紅衣婦人則挽髪束以紅帛短衣長裙老撾帶黒漆帽著青衣以疋布繞下體婦女以白布抹額繫花布桶裙跣足啖生肉知耕種勤紡織土產象入貢海貝犀牛乳香西木香訶子大清一統志蘇祿在東洋海中地近浡泥闍婆其貢道由福建以達於京師建置沿革自古荒服之地不通中國相傳其國分東西峒三王而以東王為尊續文獻通考明永樂十五年其國東王巴都噶叭哈刺西王麻哈刺叱葛刺麻丁峒王妻叭都葛巴都刺卜並率其家屬頭目來朝貢進金鏤表文獻珍珠寶石玳瑁諸物因並封為國王賜印誥襲衣冠帶及鞍馬儀仗器物居二十七日三王辭歸其東王次德州卒於館帝遣官賜􅀕命有司營葬勒碑墓道諡曰恭定留妻妾傔從十人守墓畢三年喪遣歸乃遣使齎敕封其長子都馬含為蘇祿國王十八年西王遣使入貢十九年東王母遣王叔叭都加蘇里來朝貢大珠一其重七兩有奇二十一年東王妃還國厚賜遣之明年入貢自後不復至本朝雍正四年福建廵撫奏蘇禄國王母漢末母拉律林遣使喇嗻祿達臣襲廷綵副使巴祿達臣阿石丹航海奉表貢獻方物五年其貢使至京因欽頒敕諭一道給賜國王即令來使齎奉還國定例五年一貢十一年該國王以伊祖東王德州墳墓及其子孫存留賙恤之處奏懇修理給復上允之禮部議蘇祿國東王巴都噶叭哈刺於明永樂間來朝貢歸至徳州病故賜諡恭定長子都馬含歸國襲封次子安都禄三子温哈喇留居守塋其子孫以祖名為安温二姓今該國王陳詞懇切應如所請飭查王墓所有神道享亭脾坊修理整飭於安温二姓中各遴一人奉祀給頂帶永為例疏入報可乾隆五年該國遣番丁䕶送遭風商人回内地諭㫖嘉奬八年貢使馬明光等至奏請三年後復修朝貢奉㫖仍遵舊定五年一貢之例十九年該國請以户口人丁編入中國圖籍二十七年國王蘇老丹麻末案柔噒遣使入貢蘇祿之西為吉里問又西為朱葛噍喇皆在息力山之北息力山廣大不可測人跡恒不至焉風俗地瘠寡粟麥民率食魚蝦煑海為鹽釀蔗為酒織竹為布明史其國氣候常􅀬有珠池夜望之光浮水面土人以珠與華人市易大者利數十倍啇船將返􅂺留數人為質冀其再來尤侗外國傳云今賈舶所至城頗據天險疑峒王所都聚落不滿千家所食魚蝦螺蛤織竹帛為業短髪纒皂綫腰圍水印花布男以絳帛繫腰女以幅錦披肩皇清職貢圖人情强悍以取蚌珠為業不食豕肉翦髪裹頭去鬚留髯衣袴俱短絳帛繫腰露脛而著屨女椎髻跣足短衣長裙以幅錦披肩土產珍珠玳瑁描金花布金頭牙薩燕窩白洋幼布蘇山竹布龍頭花刀夾花標槍滿花番刀藤席猿以上俱入貢大清一統志日本在東海中建置沿革古倭奴國後改名日本以近東海日出而名也地環海惟東北限大山相傳有五畿七道三島共一百十五州統五百八十七郡其小國數十皆服屬焉魏志自拘邪韓國渡一海千餘里曰對海國又南渡一海千餘里曰瀚海國又渡一海千餘里曰末盧國東南陸行五百里曰尹都國又東南百里曰奴國又東百里曰不彌國又南水行二十日曰投馬國又南水行十日陸行一月至邪馬臺國即大倭王所都自是而東而南曰斯馬國已百支國伊邪國郡支國彌奴國好古都國不呼國姐奴國對蘇國蘇奴國呼邑國華奴國􅀑為吾國奴國邪馬國躬臣國巴利國支維國皆倭所屬後漢建武中元二年始入貢安帝永初元年倭國王帥升等獻生口桓靈間倭國大亂更相攻伐三國魏明帝景初二年倭女王卑彌呼遣大夫詣京都貢獻魏以為親魏倭王假金印紫綬隋文帝開皇二十年遣使詣闕通典倭王姓阿每名目多利思比孤其國號阿覃雞彌華言天兒也遣使詣闕其書曰日出處天子致書日没處天子無恙云云文帝覽之不悦謂鴻臚卿曰蠻夷書有無禮者勿復以聞唐貞觀五年命新州刺史高仁表持節撫之浮海數月方至仁表與其王爭禮不宣朝命而還由是遂絶武后長安二年遣其大臣朝臣真人貢方物通典真人猶中國地官尚書也頗讀經史解屬文冠進德冠其頂百花分而四散身服紫袍以帛為腰帶容止温雅朝廷異之拜為司膳員外郎開元初又遣使來朝因請儒士授經詔四門助敎趙元黙就鴻臚寺敎之嗣後朝貢不絶宋雍熙元年日本國僧奝然與其徒五人浮海而至太宗召見存撫之甚厚賜紫衣館於太平興國寺宋史其國多有中國典籍奝然之來復得孝經一卷越王孝經新義第十五一卷皆金鏤紅羅褾水晶為軸孝經即鄭氏注者越王為唐太宗子越王貞新義記靈㕘軍任希古等撰也奝然復求詣五臺許之令所過續食又求印本大藏經詔給之元世祖至元八年祕書監趙良弼奉使日本諭令入朝不受命乃命實都實都舊作折都今改正范文虎等帥舟師十萬征之至五龍山遭􅁀風軍盡没後屢招不至終元世不相通明洪武初往往入㓂遣行人楊載詔諭其國日本王良懷不奉命三年遣萊州府同知趙秩責讓之四年日本國王良懷遣其僧祖朝進貢詔賜文綺答之未幾復入㓂海上諸郡十四年命禮官移書責之良懷答書不遜帝怒甚然終以道遠不遽加兵二十年命江夏侯周興往福建海濱四郡相視形勢築城一十六又命信國公湯和行視浙東西諸郡築城五十九整飭海防自是海上之警漸息永樂以後日本雖屢遣入貢然其各島諸倭􅀊常侵掠嘉靖中内地奸民汪直徐海陳東麻葉等窟宅海島誘之入㓂江南浙江福建廣東沿海諸郡數被其害總督胡宗憲設計􅁹誘擒滅諸奸漸以平定至萬厯十四年其關白平秀吉者益治兵征服國旁諸小國所向無敵并欲滅朝鮮而有之明史日本故有王其下稱關白者最尊時以山城州渠信長為之信長偶出獵遇平秀吉乃薩摩州人之奴雄健蹻捷有口辯信長悦之令牧馬後漸用事為信長畫䇿奪并二十餘州遂為攝津鎮守大將有㕘謀阿奇支者得罪信長命秀吉統兵討之俄信長為其下明智所殺秀吉方攻滅阿奇支聞燮與部將等乘勝還兵誅之盛名益振尋僭稱關白又以威脅琉球吕宋暹羅佛郎機諸國皆使奉貢二十年遣其將清正等將舟師由對馬島渡海乗勝直入遂偪王京朝鮮王李昖奔義州遣使告急乃以兵部侍郎宋應昌為經略都督李如松為提督統兵討之互有勝敗久之秀吉死諸倭兵退朝鮮之患始平而東南之害亦稍息然終明之世通倭之禁甚嚴云緒文獻通考其城池附山城築四座名聚快樂院每城周圍三四里大石高聳河濶二十餘丈内大樓閣九層糚黄金下隔睡房百餘間嘗東西逰卧令人不知以方陰害其國有天王者自開闢以來相傳至令不與國事不轄兵馬惟世享國王供奉而已有大國者受國事掌兵馬盛衰强弱更替不常大國猶言國王也有官名關白者即丞相代相史替專國政兵馬本朝順治二年其國番民一十三人遭風飄至内地諭守臣支給衣糧隨朝鮮使臣津發回國康熙三十二年五經書及佛經唐白居易集無盜賊少爭訟寰宇記婚嫁不娶同姓初喪禁用酒肉寰宇記其國主世以王為姓羣臣亦世官明史黥面文身輕生好鬬尤侗外國傳男子魁頭斷髪黥面文身婦人則㧞其眉黛其額冶容者并黑其齒衣如單被穿其中以貫首皆跣足亦間用屨坐卧席地以蹲踞為恭搓掌為悦喜啜茶道旁每設茶店如漢人入酒館也戰鬬則裸身舞刀輕儇跳躍為蝴蝶陣以揮扇吹海螺為號獄訟或置小石沸湯中令所競者探之云理曲者即手爛或置蛇甕中令取之云曲者即螫手矣土產金東粤所岀銀西别島岀銅大清會典商賈有願航海市銅者官給符為信聽其出洋於東南日本諸國往市舟回司關按時值收之以供國用琥珀水晶有青紅白三色水銀白珠青玉䟽黄鐵丹土冬青木多羅木細絹花布螺鈿扇漆俱見明統志馬出產峒馬地者最良鰒魚龍涎香見皇朝文獻通考大清一統志吕宋在東海中建置沿革自古不通中國明洪武五年始遣使偕瑣里諸國來朝永樂三年遣官齎詔撫諭其國八年與馮嘉施蘭入貢自後久不至萬厯四年官軍追海㓂林道乾至其國國人助討有功復朝貢尋為佛郎機所并然與中國貿易仍稱吕宋明史萬厯時佛郎機强與吕宋互市久之見其國弱可取乃奉厚賄遺王乞地如牛皮大建屋以居王不虞其詐而許之其人乃裂牛皮聯屬至數千丈圍吕宋地乞如約王大駭然業已許諾無可奈何遂㕔之而稍徴其税如國法其人既得地即營室築城列火器置守禦具為窺伺計巳竟乘其無備襲殺其王逐其人民而據其國名仍吕宋實沸郎機也三十年礦税方行有奸徒言吕宋機易山素有金開之􅀊可得金巨萬帝納其説遣官往勘吕宋人大駭盛兵衞迓之欲殺朝使久之乃􅀗釋歸守臣以聞奏請治妄言者罪事遂止而吕宋人終疑天朝欲襲取其國華人流寓者為内應設謀殺之死者無算閩中守臣告變帝驚悼移檄吕宋責以擅殺之罪而不能討也其後互市如故明史先是閩人以其地近且饒富商販者至數萬久居不返佛郎機既奪其國遣一酋来鎮慮華人為變多逐之留者悉被侵尋其時礦税使者爭起言利有閻應龍張嶷者言吕宋機易山有金開之嵗可得金十萬兩銀三十萬兩萬厯三十年奏聞帝即納之廷臣交章力爭不聽即遣嶷等往勘吕宋人大駭盛兵衛以迓留嶷等欲殺之得諸華人解乃釋歸吕宋人終自疑謂天朝將襲取其國諸流寓者為内應聲言發兵侵旁國厚價市鐵器華人貪利盡鬻之家無寸鐡酋發兵攻之死者二萬五千人巡撫徐學聚告變帝驚悼下法司議嶷等罪移檄吕宋責以擅殺之罪而不能討也其後華人復稍稍往而蠻人利中國互市亦不拒本朝順治三年福建平吕宋前遣使明貢臣尚留閩未還守臣送其使入京師上賜以服物遣歸本國康熙五十六年吕宋等國口岸多聚漢人諭令禁止南洋貿易雍正五年復通市如故十三年吕宋以麥收歉薄附洋船載榖二千石來厦門欲以易麥邊臣以五榖出洋久有例禁奏入上特沛殊恩飭地方官均平糶糴使原船載歸以濟其乏時提臣王郡以例禁五榖出洋奏請奉上諭曰朕統御寰區内外一體吕宋雖隔重洋朕心並無歧視國家所以嚴禁五榖不許出洋者乃杜奸商匪類暗生事端若該國缺少末糧以實情奏聞朕尚酌量豐餘以濟之今載榖易麥更為情理當從著轉飭有司均平糶糴俾番船載回以濟其用吕宋隔海對峙有五島曰班愛曰堊黨曰速巫曰猫務曰煙島各有王其東南又有萬老高島人物土產與吕宋相􅀋按吕宋自故明時為佛郎機所據今之通市大率佛郎機人居多然佛郎機本國自在西北海中不得以西北舊名名其東來盤踞之地故仍名吕宋焉風俗地近中華人多貿易明史去漳州甚近商販久居至長子孫禮佛誦經淳樸無訟尤侗外國傳人淳樸無爭訟衣衫袴皮屨出入佩刀自衞亦時禮佛誦經長身高鼻服飾與西洋同皇清職貢圖夷人長身高鼻猫睛鷹嘴服飾與大小西洋同婦盤髻施簪珥方領露胸短衣長裙裙裏襯藤圏二三層常執帕以葢髻土產金銀前纂修官臣金光杰恭前提調官臣許應藻恭校對官臣閻學海恭大清一統志􅃡甸在雲南騰越關外南至海西至孟養北至孟密所屬有木􅀖等十三路其貢道由雲南以達於京師建置沿革古稱朱波國其酋居阿瓦城地舊有五城明統志舊有江頭太公馬來安正國蒲甘緬王五城宋慶元時進白象始通中國明史宋慶元時􅃡甸波斯等國進白象緬甸通中國自此始元至元中屢討之後於蒲甘􅃡王城置邦牙等處宣慰使司明洪武時入貢方物置􅃡中宣慰使明史洪武二十六年八百國使人入貢因言緬國近其邊以地遠不能自達帝乃令西平侯沐春遣使至八百國王所諭意於是􅃡國始遣使來貢方物永樂中賜􅃡甸冠帶印章信符令三年一朝貢嘉靖初緬甸為孟養木邦孟密所破訢於朝不報其後復稍稍雄制諸蠻明史緬甸舊隣孟養正統時孟養有思任發者據麓川以為亂總兵沐昂遣人諭緬禍福今獻賊酋緬甸遂與木􅀖函思任發首獻之孟養以故怨緬嘉靖初孟飬糾木􅀖孟密共擊破緬殺宣慰使莽紀􅀊永昌知府嚴時泰往勘之孟養縱兵鼓譟焚驛舍殺千户一人朝廷以安鳳之亂未暇究其事莽紀􅀊有子名瑞體少匿洞吾母家其酋養為已子既長有其地諸蠻皆畏服之因假途孟密攻孟養以復前仇仍招致隴川千産南甸諸土官欲入冦覘知中國有備乃遁歸朝議以荒服之外治以不治瑞體遂萌自王之志萬厯元年金騰副使許天琦招諭孟養孟養受檄拒緬天琦卒署副使羅汝芳調漢土兵馬至騰越為援絶其糧道緬兵大敗後孟養復為瑞體所并巡撫饒仁侃遣人招緬不應瑞體死其子應襄遂起象兵數十萬分道内侵萬厯時􅃡甸分道内侵騰越遊擊劉綎永昌㕘將鄧子龍大破之率兵出隴川孟密直抵阿瓦時諸部咸殺􅃡使來歸旋復解散陰附於􅃡巡撫陳用賓於騰衝築八關留戍募人至暹羅約夾攻􅃡􅃡勢頓衰阿瓦木邦相率入貢而暹羅連􅀊攻緬為所殘破自是不敢内犯然諸近􅃡部附􅃡如初天啟後職貢遂絶本朝順治十六年大兵平定雲南永明王朱由榔逃入􅃡􅃡人居之赭硜以兵守之十八年大兵以􅃡人執永明王送軍前乾隆十六年􅃡酋蟒達喇遣使具表納貢上頒敕奬諭並賜銀幣器物持􅃡國内亂其頭目甕藉牙􅀅謀自立㑹貢使還至􅃡境蟒達喇已被害甕藉牙代立其子懵駮與沿邊土司滋釁總督劉藻楊應琚先後經理不善三十四年上命􅀅督師前往􅁹辦由戛鳩進兵收取猛拱孟養於新街大㨗進次老官屯㑹懵駮專遣頭目奉蒲葉書詣軍門乞降上以其地水土惡劣不值久駐官軍遂諭令班師嚴飭邊關示以禁絶懵駮死子贅角牙立其國頻年内亂殺贅角牙迎孟隕立之五十三年孟隕遺其頭目業渺瑞洞細哈覺控等款關納貢悔罪輸忱總督富綱以聞許之齎至金葉表文金塔馴􅁚及其他方物上於避暑山荘宣見􅃡使宴賚甚渥特敕嘉奨並頒賜佛像如意朝珠銀幣諸物至京師令􅃡使詣闕隨班行禮畢遣令歸國五十五年國長孟隕差頭目等敬備表貢叩祝萬壽懇賞封號並求開騰越關禁上皆允所請錫之敕印先御書詩章以賜國王尋備馴􅁚土物遣使齎表入謝復以内地民人羈留在􅃡者各給路費咨送進關上嘉其敬順優賚之嗣後定例十年一貢五十八年六十年皆遣使赴京祝釐宴賞如例嘉慶元年恭逢國慶特遣使臣齎表稱賀總督勒保率行截囬上命撫臣檄諭國王特賞蟒錦四端以釋其向化未伸之誠十二年􅃡甸與暹羅搆爭力不能敵遣使求援督臣遵㫖駮之二十三年􅃡甸與普洱府屬邊外土司搆釁經邊吏札諭􅃡夷畏懼即將􅃡目撤囬邊圉安靖焉風俗居有屋廬濟用舟筏乘􅁚馬識文字元史􅃡人有城郭屋廬以居有􅁚馬以乘舟筏以濟其文字進上者用金葉寫之次用紙又次用檳榔葉綰髪文身以為飾明統志􅃡人形陋體黒性柔而詐其酋號曰卜刺浪男子善浮水夏􅀬穿白單衣冬寒穿白兜羅棉衣其富者出入著大袖白布衫男子綰髻於頂前用青白二色布􅆞之婦人綰髻於後不施脂粉男女皆和白檀麝香當歸薑黄末塗於身及頭面以為奇其酋長出入乘平轎或騎象坐則在前從者圍後皆席地事佛敬僧明統志􅃡人專事佛敬僧立阿瓦刹城􅀖啞直根等寺荘嚴甚整有大事則抱佛說誓質之僧然後決吉事用樂其樂有皮鼓笙籥銅鑼瑣之屬國中設樂人肄習惟奉上用之土產寳石有紅藍桃紅及他雜色􅁚檀香白㲲布皆貢品錦綢絹大呢吉祥寳樹木化石元猴皮犀角孔雀頗幹盒以皮為之飾以髹漆以上俱入貢椰子兜羅棉樹頭酒明統志樹􅀋㯶髙六丈結實大如掌土人以麯納罐中以索懸罐於樹下劃其實取汁以為酒或不用麯惟取其汴熬為白糖其葉即貝葉􅃡書用之石油明統志自石縫流出􅆨惡而色黒可塗毒瘡蘇木翠羽大清一統志􅟖咭唎在西北海中距廣東界計程五萬餘里其貢道由海道至天津赴京師建置沿革􅟖咭唎一名英圭黎國南近荷蘭紅毛番種也國中土地平衍左有那村右有加釐皮申村皆設立礮臺二村中皆有大海駕船往來王所居名蘭崙有城距村各百餘里王姓名世系遠者不可考其近者為弗氏京也治傳子昔斤京也治昔斤京也治傳子非立京也治本朝康熙間􅟖咭唎始來通市後數年不復來雍正七年後互市不絶乾隆七年􅟖咭唎巡船遭風漂至澳門遣夷目至粤東省求濟地方官給貲糧修整船隻令俟風便歸國先是其互市處或於廣或於浙二十二年部議􅟖咭唎不准赴浙貿易於是皆收泊廣東每夏秋交由虎門入口二十四年嚴絲斤出洋之禁御史李兆鵬奏請禁止絲斤出洋嗣後凡私販絲斤出洋者照偷運米穀例治罪兩廣總督李侍堯復奏綢緞綿絹出洋應否與絲斤一并定議處分亦經奏准照例科斷是年􅟖咭唎夷商洪運輝妄控粤海關陋弊訊有徽商汪聖儀者與運輝交結擅領其國大班銀一萬三百八十兩按交結外夷互相買賣借貸財物例治罪二十七年􅟖咭唎夷商白蘭等懇求照前通市兩廣總督蘇昌據情入奏請照東洋銅商搭配綢緞之例酌量配買高宗純皇帝特沛殊恩每船准買土絲五千斤二蠶湖絲三千斤其頭蠶湖絲及綢綾緞匹仍如舊禁止後又准帶綢緞成匹者二十斤自是􅟖咭唎來廣互市每船如額配買􅀊以為常五十八年􅟖咭唎國遣使臣嗎嘎呢等恭進表貢貢品天文地理音樂大表地理運轉全架共二十九種上御萬樹園大幄次宣召正副使宴賞有差賜國王文綺珍玩特頒敕諭譯出表文内有懇請派人留京照管買賣一節又使臣禀請大臣轉奏該國貨船或到浙江以及天津廣東地方收泊交易又該國夷商懇求在京城另立一行收貯貨物又求相近珠山地方小海島一處夷商在此停歇及撥給附近廣東省城小地方一處居住夷商或准令澳門居住之人出入自便又該國夷商自廣東下澳門由内河行走貨物或不上税或少上税又該國所奉之天主教欲任聽夷人傳敎係更張定制高宗純皇帝以所請皆命大臣向使臣嚴加駮斥復將所駮各條邊臣鈔錄敕諭該國王永遠遵奉並令敕諭二道入於交代以便遵照妥辦五十九年及嘉慶元年􅟖咭唎國附進表貢皆􅀩賞收賜以敕書並錦緞等物十三年􅟖咭唎國夷船帶兵擅入澳門據夷目云該國與大西洋隣好今大西洋國地方為法蘭西占踞該國恐大西洋人來澳門貿易者被法蘭西欺阻因派夷目帶兵幫護經地方官奉㫖嚴飭夷目畏懼即行退囬外洋二十一年􅟖咭唎國遣使入貢賜國王白玉如意一柄翡翠朝珠一盤敕諭一道以示懷柔二十三年上以撫馭外夷之制示兩廣督臣兩廣總督阮元奏豫防􅟖咭唎事宜一摺上諭軍機大臣曰國家撫馭外夷具有一定規制遵守者懷之以德干犯者示之以威􅟖咭唎在粤貿易其貨船及謢貨兵船停泊處所乆有定例若該夷人不遵定制有違禁令先當剴切曉諭宣示德威以杜其覬覦之心倘竟敢恃其强悍擅越界址則不能不開礮轟擊使之懾我兵威總之懷遠之道當先以理勝斷不可孟浪從事先啟兵端亦不可過示怯弱使彼無所畏懼也將此諭令知之􅟖咭唎距廣東計程五萬餘里又有千絲臘國與􅟖咭唎相近風俗相同每􅀊駕夾板船來廣互市焉風俗奉天主敎禮拜誦經皇朝文庶通考其俗信奉天主每七日一禮拜誦經不食齋不理事女贅男而居不置妾媵皇朝文獻通考男女不問年少長以相悦而成㛰婣或有媒合者女率贅男而居婦亡則更贅於女不置妾媵男子著哆囉絨婦人短衣重裙皇清職貢圖男子多著哆囉絨喜飲酒婦人未嫁時束腰欲其纎細披髪垂肩短衣重裙出行則加大衣以金縷盒貯鼻煙自隨色尚紅綠握手為禮居喪即日營殯葬不設位斷煙火皇朝文獻通考色以紅綠白為吉青為凶相見脱㡌握手為禮多佩刀飲食用金銀器喪即日營殯葬所親送葬相與握土而歸男女閉户號泣不設位斷煙火所親饋之食則食七日後始開門舉火焉土產麥禾果豆黒鉛有一山名間允產黒鉛民為開採輸税入官火石紫檀大小絨嗶嘰羽紗玻璃鏡時辰鐘表大清一統志整欠在九龍江邊外距雲南普洱府千餘里建置沿革自古不通中國其所屬大猛養等十數寨統大頭目十六其一曰先萬巖第乾隆三十四年内附請修職貢上念其地僻遠令六年一貢四十年其頭目召敎齎􅁚牙犀角來獻命豫朝正班末宴賞如例其頭目被紅􅄄錦衣草鞋不冠以紅帕抹首有景海者距整欠又數百里統大小頭目共二十餘其頭目曰先綱洪乾隆四十年與整欠同修職貢其物產服飾亦與整欠相􅀋大清一統志葫蘆國在雲南省永昌府東南徼外建置沿革葫蘆國一名卡瓦厯古以來未通中國地近􅃡甸不為􅃡所屬本朝乾隆十一年其酋蚌筑願以其地茂隆山銀厰抽課報解作貢解課三千七百九兩零赴雲南省投誠據稱境内茂隆山銀厰自厰目中華人呉尚賢開採以來礦砂大旺厰地人民各守天朝法度等語廷臣議却之仍令雲南督臣將吳尚賢等違例出境查明具奏上依其議尋葫蘆國夷目復禀請仰懇聖恩收受厰課俯順夷情雲督張允隨奏請減半收受仍以所收課銀之半賞給酋長以慰該國歸順之意上允之其後茂隆課長呉尚賢將厯年恩賞酋長之銀侵肥入巳十六年雲督碩色等㕘奏治其罪其國地方二千里北接耿馬宣撫司西接木邦南接生卡瓦東接孟定土府距永昌府十八程其傳國世次不可考分地而治者皆其族姓云風俗刀耕火種造炭為業皇朝文獻通考其地山多田少刀耕火種以木為城索綯為屋牲畜繁孳人多造炭為業山居穴處􅌁衣短袴以布􅆞頭婦女曳裠衣短衣以紅藤大清一統志馬辰在東南海中建置沿革即文郎馬辰在息力大山之南相傳漢馬援南征士卒之裔一名馬留人皇朝通典漢馬援遣兵留寓彼中號馬留人者即其苗裔按寰宇記後漢遣馬援討林邑蠻援自交趾尋海隅開側道以避海難從蕩昌縣至九真郡自九真以南隨山刋木開陸路至日南郡又南行四百餘里至林邑國又南行二千餘里有西屑夷國援至其國鑄二銅柱於象林南界與西屑夷分境以紀漢徳之盛其時以不能還數十人留於銅柱之下至隋乃有三百餘家南蠻呼為馬留人國中以木為城其半依山酋蓄繡女數百人出乘􅁚則繡女執衣屨刀劍及檳榔盤以從或泛舟則酋趺坐牀上繡女列坐其下與相向或用以刺舟威儀甚都地多水惟夷目陸處民多縛木水上築室以居有村名烏籠里憚地饒沙金商人以貨往市者擊小銅鼓為號明史其深山中有村名烏籠里憚其人盡生尾見人掩面走避然地饒沙金商人持貨徃市者擊小銅鼓為號置貨地上即引退丈許其人乃前視當意者置金於旁主者遥語欲售則持貨去否則懷金以歸不交言也始其酋有賢德待商人以恩信子三十一人恐擾商舶不令外出其妻乃買哇柔酋長之妹按明史買哇柔乃馬辰之隣境其人性兇很每夜半盜斬人頭以去裝之以金故商人畏之夜必嚴更以待生子襲父位聽其母族之言務為欺詐多􅀒商人價直自是赴者亦稀本朝雍正七年後通市不絶其國距厦門水程三百二十更風俗􅆞頭用布蕉葉為食器明史用五色布􅆞頭腹背多袒或著小袖衣􅀩頭而入下體圍以幔初用蕉葉為食器後與華人市漸用磁器尤好磁甕畫龍其外死則貯甕中以葬俗惡淫奸人知畏法明史其俗惡淫奸者論死華人與女通輒削其髮以女配之永不聽歸婦女苦髮短問華人何以致長紿之曰我用華水沐之故長耳其女信之競市船中水以沐華人故靳之以為笑端女或悦華人持香蕉甘庶茉莉相贈遺多與之調􅀏然憚其法嚴無敢私通者敬信釋敎出入佩刀皇清職貢圖俗尚釋敎而性強悍出入必佩刀劍拾椒為業戴瓶以汲皇清職貢圖男女以採藤拾椒為業男翦髪勒以紅帛腰圍花罽􅀒竹筐以盛椒女袒身跣足繫布裙過􅂰間披幅帛於胸背汲水則戴瓦瓶於首土產犀牛孔雀鸚鵡鶴頂沙金降香蠟藤蓆萪藤蓽撥血竭獐皮以上見明史胡椒番錫丁香燕􅌪荳蔻見皇朝通典前纂修官臣金光杰恭纂前提調官臣許應藻恭覆輯校對官臣閻學海恭校大清一統志港口在西南海中建置沿革前史不載今越南暹羅附近國也王鄭姓皇朝通典王鄭姓名天錫國多崇山所轄地纔數百里以木為城宫室與中國無異自王居以下皆用甎瓦服物制度畧倣前代皇朝文獻通考王蓄髪戴網巾紗帽身衣蟒􅂁腰圍角帶以鞾為􅋰民衣長領廣袖有喪皆衣白平居以雜色為之國中建孔聖廟王與國人皆敬禮之又立義學選國人子弟之秀者及貧不能具脩脯者􅃶誦其中漢人僦居其地有能曉句讀文義者則延以為師子弟皆彬彬如也本朝雍正七年後通市不絶經七洲大洋到魯萬山由虎門入口其國距廣東界計程七千二百里距厦門水程一百六十更風俗重文學好詩書相見以合掌拱上為禮皇朝通典地氣常暖人多裸體皇朝文獻通考其地常暖雖秋冬不寒人多裸而以裳圍其下體土產海參魚乾蝦米牛脯大清一統志廣南海南國在西南隅建置沿革古南交地王阮姓本中國人自古未通職貢其國東接越南西隣占城南濱海北至緬甸西北距暹羅國中有大山海包其外形如半月名曰廣南灣皇朝文獻通考國人善泅紅毛國夾板船風漂入廣南灣者國人即遣小舟數百雲集其處人􅀒一竹筒納長縷没水而釘縷於船下還掉小舟曳船以行於是奪其貨而焚之故紅毛國人以不見廣南山為幸云本朝康熙八年廣東都司劉世虎等遇風漂至國境廣南國王遣其臣趙文炳送歸並帶貨物船隻來粤部議趙文炳雖奉廣南印文遣來實係中國之人或留或遣請㫖定奪其帶來之物現奉海禁不便貿易應入户部奉㫖廣南國王送劉世虎等囬粤殊為可嘉著給以照驗遣歸廣南船貨不必入官仍給來使嗣後往來商船由厦門至廣南過越南界厯七洲洋取廣南外之占畢羅山即入其境焉風俗國無城郭栽䓶竹以自固他國商船入境税物加倍以為常皇朝通典大清一統志柔佛在西南海中建置沿革一名烏丁礁林或言即東西竺明史永樂中鄭和遍㦄西洋無柔佛名或言和曾經東西竺山今此山正在其地疑即東西竺明萬厯時其酋好搆兵鄰國丁機宜彭亨屢被其害蓋西洋强國也明史列木為城環以池無事通商於外有事則召募為兵稱强國焉地不產穀常易米於隣壤華人販他國者多就之貿易時或邀至其國國中崇山峻嶺樹木業雜野獸縱横天時雖秋冬亦暖王柳葉為衣左袵跣足下裳密綴小花為之蓄髪長二三寸􅀩以金花無城郭王府即建於海濱府治非甎瓦所成支以竹木葢以茅葉民皆環山而居亦竹木茅葉為之本朝康熙年間柔佛國番人利哈等五十三人遭風漂至廣東地方官給以貲糧其原船巳壞時閩粤二省亦無該國船隻請給内地船遣歸奏入上從之雍正七年弛南洋商販之禁自後通市不絶厯海洋九千里達廣東界距厦門水程一百八十更其屬有單呾國亦來中國互市風俗土產與柔佛同風俗以刀為佩字用茭蔁葉明史男子薙髪徒跣佩刀女子蓄髪椎髻其酋則佩雙刀字用茭蔁葉以刀刺之食無􅍰筯死則火葬明史王用金銀為食器羣下則用磁無􅍰筯俗好持齋見星方食節序以四月爲􅀊首居喪婦人薙髪男子則重薙死者皆火葬輕生好殺出海劫掠皇朝文獻通考俗輕生好殺尚佛教喜鬬雞伐烏木拾海菜時出海劫掠忌猪肉嗜煙衣袴皆短織席爲業皇清職貢圖婚婣亦論門閥男子帽如覆椀銅絲爲胎􅇈以白布衣袴皆短圍花巾於腰婦短衣長裠披錦繒於肩善織席土產犀􅁚玳瑁片腦没藥血竭錫嘉文簟木棉花㯽榔海菜燕􅌪西國米蛬吉柿以上見明史降香烏木氷片胡椒皇朝通典大清一統志彭亨在西南海中建置沿革一名湓亨又稱彭坑在暹羅之西明洪武十一年其王麻哈刺惹遣使齎表貢番奴及方物永樂中屢入貢鄭和亦至其國萬厯時為柔佛所破王奔浡泥後命其長子攝國旋為次子所篡明史萬厯時有柔佛國副王子娶彭亨王女將婚副王送子至彭亨彭亨王置酒親戚畢㑹婆羅國王子為彭亨王妹壻舉觴獻副王而手指有巨珠甚美副王欲之許以重賄王子靳不與副王怒即歸國發兵來攻彭亨人出不意不戰自潰王與婆羅王子奔金山浡泥國王王妃兄也聞之率衆來援副王乃大肆焚劫而去當是時國中鬼哭三日人民半死浡泥王迎其妹歸彭亨王隨之而命其長子攝國已王復位次子素凶悍遂毒其父殺其兄而自立其國與柔佛連山相枕内地商民有附番舶至其境者按皇朝文獻通考雍正七年弛南洋之禁内地商民往柔佛國有轉附番舶至彭亨國貿易者風俗煑海為鹽釀椰漿為酒明史其國土地肥沃氣候常温煑海為鹽釀椰漿為酒俗惑鬼神􅀕賽祈福明史上下親狎無冦賊然惑於鬼神刻香木為像殺人􅀕賽以釀災祈福土產􅁚牙片臘乳香速香檀香胡椒蘇木大清一統志丁機奴在西南海中建置沿革即丁機宜􅀲哇屬國也自古不通職貢幅員甚狹僅千餘家明時柔佛黠而雄丁機奴與接壤屢被其害後以厚幣求婚稍免侵侮其國以木爲城酋所居旁列鐘鼓樓出入乘􅁚以十月爲􅀊首四時皆暖雖隆冬無霜雪崇山峻嶺蜿蟺相望其國人終身不出境無航海來中國者華人往市交易甚平自爲柔佛所破往者亦稀本朝雍正七年後通市不絶每􅀊冬春間粤東本港商人以茶葉磁器色紙諸物往其國互市乾隆二十九年准帶土絲及二蠶湖絲浙閩人亦間有往者及夏秋乃歸必經七洲大洋至魯萬山由虎門入口達廣東界計程九千里按皇朝文獻通考七洲洋中有神鳥狀如海雁而小長喙色紅脚短而綠尾羽如箭長二尺許能導人水程是則飛去否則仍飛而來獻紙謝神翺翔不知所之矣風俗性好潔酒禁甚嚴明史性好潔酋所食啖皆躬自割烹酒禁甚嚴有常税然大家皆不飲惟細民無籍者飲之其曹偶咸非笑男贅於女喪用火葬明史婚者男往女家持其門户故生女勝男喪用火葬土產胡椒其美甲於他番沙金氷片沙藤速香見皇朝文獻通考大清一統志􅳆國在西北海中建置沿革古史不載今為荷蘭屬國其國王姓名世系遠者不可稽近為土的亞多傳子非里地力非里地力傳子亞敦非里地力王所居名仕的哥盧國人㑹聚之地名乙頓巴梨距王居七百餘里國中四面皆大澤汪洋千頃國人之散處者非駕船不能往來乙頓巴梨蓋泊船總匯處也凡市鎮貿易之期則有官司若古司市者故市鎮皆設館􅃕以供駐宿置班衞以供使令國有大山三產紅銅民為開採納於王皇朝文獻通考國中土地平衍有大山三一曰庇高天牙禮花閲三四年輒有光燭天望之若煙火四面巉巖壁立千仭人跡不能到一曰布農故巴黎自山麓達於頂俱白沙童然無一草一木一曰化倫仕高勞華山中產紅銅民為開採納於王明世諸番互市無􅳆國名本朝雍正十年後通市不絶乾隆二十七年特㫖准外洋各國配買絲斤􅳆國夷商以該國不諳織作久乏綢緞呈懇准帶綢緞成匹者二千斤以濟服用邊臣據情入奏上准所請以示優卹是年九月􅳆國商棉是呾等呈稱夷等外洋各國雖有絲斤不諳織作以不能自織之國若止准帶絲斤仍屬無由服用現在該國巳缺乏綢緞二三年懇先准帶綢緞成匹者二千斤由兩廣總督蘇昌代奏以聞並請嗣後每􅁝千斤止准帶綢緞八百斤毋得額外多求至現在􅳆國懇先帶綢緞二千斤爲數無多業准其帶往奏入上從之其國夷商載貨來廣貿易由虎門入口至初冬囘國風俗信奉天主俗同英吉利皇朝文獻通考脱帽爲禮與荷蘭相􅀋皇清職貢圖􅳆亦荷蘭屬國貿易於粤其脱帽爲禮與荷蘭相􅀋短衣革帶常執藤鞭衞身夷婦方領露胸衣外束裙摺袖舒袂以革爲屨底綴方木似屐喜以金縷盒貯鼻煙時時吸之土產黒鉛紅銅粗絨洋酒葡萄乾大清一統志嗹國在西北海中建置沿革自古未通職貢明代諸番互市無嗹國名國中土地平衍王所居名顛地墨皇朝文獻通考王所居土名顛地墨王名非厘德厯王父名奚成王祖名奚厘成其遠者無考王城五十里外有一山名士嗹前濱大海左右設礮臺國人皆從此出入本朝雍正間有夷商來廣通市後􅀊以爲常厯海洋六萬餘里始達廣東界每夏秋之交由虎門入口易買茶葉瓷器絲斤諸物至初冬風信到時駕船而歸粤省本港商人無至其國者風俗信奉天主同英吉利皇朝文獻通考土產黒鉛琥珀白金大青葡萄乾大清一統志嘛六甲在占城南建置沿革即滿刺加或云即古頓遜唐哥羅富沙明永樂三年其酋拜里迷蘇刺遣使貢方物封為滿刺加國王賜誥印綵幣其使者言王慕義願同中國列郡􅀊效職貢因請封其山為一國之鎮帝從之九年其王率妻子陪臣五百四十餘人來朝宴賜有加禮及歸又賜宴龍潭驛以餞之至王子母幹撒于的兒沙襲封亦賜金幣後屢為暹羅所侵入訴於朝明史永樂十七年王率妻子來朝訴暹羅見侵狀帝為賜敕諭暹羅宣德六年遣使者來言暹羅謀侵本國王欲入朝懼為所阻欲奏聞無能書者令臣三人附蘇門答刺貢舟入訴帝命附鄭和舟歸國因令和齎敕諭暹羅責以輯睦隣封母違朝命成化中滿刺加又為安南所侵陵明史成化十七年貢使言安南已據占城又欲吞本國本國以皆為王臣未敢與戰適安南貢使亦至滿刺加使臣請與廷辯帝乃因安南使還敕責其王并諭滿刺加安南復侵陵即整兵待戰正德三年遣使臣端亞智等入貢後佛郎機强横海上舉兵侵奪其地國王蘇端媽末出奔遣使告難朝廷敕責佛郎機令還其故土又諭暹羅諸國王以救災恤鄰之義迄無應者滿刺加竟為所滅後改名嘛六甲今則為荷蘭所屬按皇清職貢圖嘛六甲明初服屬暹羅後為佛郎機所侵奪嘉靖時敕還其地迄無應者今則為荷蘭所屬云風俗淘沙取錫捕魚為業明史有山出泉流為溪土人淘沙取錫田瘠少收民皆捕魚為業氣候朝􅀬暮寒男女椎髻身體黝黒間有白者唐人種也俗喜邀劫商舶稀至明史俗淳厚市道頗平自為佛郎機所破其風頓殊商舶稀至多直詣蘇門答刺然必取道其國率􅀍邀刧海路幾斷性情機巧器用精緻皇清職貢圖性情機巧器用精緻男以色布􅆞頭長衣短袴露脛曳屨女椎髻跣足垂珠於項短衣長裠頗工縫紉大清一統志宋腒朥在西南海中建置沿革古無所考今為暹羅屬國按暹羅國西南有大山延亘由暹羅沿山海而南為宋腒朥國其國人以耕漁為業性情褊急其齋僧飼􅁚與暹羅相􅀋本朝雍正七年後來粤通市距厦門水程一百八十更旁有仔六崑大呢諸國皆屬暹羅仔東北與宋腒朥接六崑東與仔接大呢一名大年東北與六崑接三國風俗物產不殊其來粤通市距厦門水程仔與宋腒朥同六崑大呢則一百五十更云風俗男蓄髪去其髯首插雉尾腰束匹帛短衣而窄袴無屨韈常佩刀劍女椎髻跣足短衣長裠披帛於肩能知紡績見皇清職貢圖土產牛鹿蝦米海參番錫􅁚牙棉花黄蠟大清一統志合貓里在東海中建置沿革又名貓里務自古不通中國明永樂三年遣使附瓜哇使臣朝貢其國近呂宋商船往來漸成富壤凡華人入其國者不敢欺陵市法最平故華人爲之語曰若要富須往貓里務後有網巾礁老者最兇悍常寇掠其地人多死傷遂至貧困商人慮爲礁老所刼鮮有赴者風俗地瘠多山人知稼穡明史土瘠多山山外大海饒魚蟲人知稼穡土產胡椒蘇木烏木大清一統志美洛居在東海中建置沿革俗訛爲米六合自古不通中國明初以其地有香山雨後香墮沿流滿地居民拾取不竭其酋委積充棟以待商舶之售故華人多徃市易萬厯中佛郎機與紅毛番互爭其地每􅀊搆兵人不堪命華人流寓者遊説兩國令各罷兵分國中萬老高山爲界山以北屬紅毛番南屬佛郎機始稍休息而美洛居竟爲兩國所分云按明史萬厯時佛郎禨來攻其酋戰敗請降乃令復位􅀊以丁香充貢不設戍兵而去紅毛番撗海上知佛郎機巳退乘虛抵城下執其酋語之曰若善事我我爲若主殊勝佛郎機也酋不得巳聽命復位如故紅毛番雖據美洛居率一二􅀊率衆返國既返復來佛郎機值紅毛番巳去興兵破美洛居殺其酋立己所親信主之無何紅毛番至又破其城逐佛郎機所立酋而立美洛居故王之子自是􅀊搆兵人不堪命華人流寓者說兩國罷兵中分其地按美洛居爲兩國所分其所立酋長仍係美洛居故王之子雖分境服屬而其國猶存未滅也故仍稱美洛居云風俗人知敬上貲用富饒明史其俗男子削髮女椎結酋出入威儀甚備所部皆合掌伏道旁尤侗外國傳其國多市中國酒器豪飲席間設二大盒盛酒人手一器飲之長者起舞年少環視遜不敢登塲也土產丁香明史東洋不產丁香獨此地有之可以辟邪大清一統志汶菜在東海中接近西洋建置沿革即婆羅國在息力大山之西北東洋盡處西洋所自起也唐高宗時常入貢明永樂三年遣使者齎璽書彩幣撫諭其王四年其國東西二王並遣使奉表朝貢至萬厯時其爲王者閩人也或言鄭和使婆羅有閩人從之因留居其地後人遂據其國而王之其王有金印一篆文上作獸形言永樂朝所賜民間嫁娶必請此印印背上以爲榮其國距厦門水程一百八十更本朝雍正七年後通市不絶風俗崇釋教惡殺喜施禁食豕肉犯者罪死明史王裹金繡巾佩雙劍出入有禮拜寺每祭用犠同上伐木採藤翦髮去鬚皇清職貢圖以伐木採藤爲業男翦髮裹絳帛去鬚留髯與蘇禄相似女散髪垂肩結巾於項著衣裾而跣足土產玳瑁瑪瑙硨磲珠見續文獻通考白焦布花焦布降真香黄蠟黒小厮明史大清一統志榜葛刺在西海中建置沿革即漢時身毒國從月氏高附國以西南至西海東至磐起有别城數百城置長有别國數十國置王雖各小異而俱名身毒通典身毒有都臨恒河一名迦毗黎河靈鷲山亦名耆闍崛山山有青石頭似鷲鳥後漢稱天竺明帝遣使問佛法於其國後漢書天竺國一名身毒世傳明帝夢見金人長大頂有光明以問羣臣或曰西方有神名曰佛其形長丈六尺而黄金色帝於是遣使天竺問佛道法遂於中國圖畫形像焉按此書明帝時已稱天竺舊志云和帝時始改名天竺誤今改正和帝時天竺遣使入貢後西域反畔乃絶桓帝二年頻從日南徼外來獻方物魏晉世絶不復通梁書魏晉世絶不復通惟呉時扶南王范旃遣親人蘇物使其國到天竺江口逆水行七千里乃至焉天竺王驚曰海濱極遠猶有此人乎即令觀視國内仍差陳宋等二人以月氏馬四匹報旃四年方至時呉遣中郎康泰使扶南見陳宋等具問天竺土俗云佛道所興國也宋文帝元嘉五年天竺伽毘黎國王月愛遣使奉表獻金剛指環摩勒金環寶物赤白鸚鵡各一明帝泰始二年又遣使貢獻梁天監初天竺王屈多遣長史竺羅逹奉表獻琉璃唾壺雜香吉貝等物隋煬帝時命裴矩應接西番諸國惟天竺不通唐貞觀十五年天竺國王尸羅逸多遣使入貢舊唐書天竺國或云婆羅門地在葱嶺之南周三萬里其中分五天竺一曰中天竺二曰東天竺三曰南天竺四曰西天竺五曰北天竺地各數千里城邑數百南天竺際大海北天竺距雪山四周有山爲壁南面一谷通爲國門東天竺東際大海與扶南林邑鄰接西天竺與罽賓波斯相接中天竺據四天竺之㑹其都城周􅂞七十餘里北鄰禪連河中天竺王姓乞利咥氏或云刹利氏世有其國不相簒弑稻􅀊四熟又有栴檀鬱金諸香通於大秦故其寶物或至扶南交趾貿易焉人皆深目長鼻致敬極者舐足摩踵家有奇樂娼妓其王與大臣多服錦罽上爲螺髻於頂餘髪翦之使卷貞觀十五年其王尸羅逸多遣使朝貢太宗降璽書慰問尸羅逸多大驚問諸國人曰自古曾有摩訶震旦使人至吾國乎皆曰未之有也戎言中國為摩訶震旦乃膜拜而受詔書因遣使朝貢其四天竺國王咸遣使朝貢五天竺所屬之國數十亦累遣使來朝云開元中南天竺獻五色能言鳥乞師討大食吐番丐名其軍元宗詔賜懷德軍晉天福中滄州僧道圓詣西域在途十二年住五印度凡六年五印度即天竺也宋乾德二年命沙門三百人入天竺求舍利及貝多葉書范成大吳橋錄有繼業三藏姓王氏耀州人預遣中至開寶九年始歸寺所記西域行程雖不甚詳然地里大約可考云自階州出塞西行由靈武西河甘肅瓜沙等州入伊吳高昌焉耆于闐疏勒大食諸國度雪嶺至布路州國又度大葱嶺雪山至伽濕彌羅國西登大山有薩埵太子投崖飼虎處遂至健他羅國謂之中印度又西至庶流波國及左欄陁羅國國有二寺又西過四大國至大曲女城南臨滔牟河北負洹河塔廟甚多而無僧尼又西二程有寶階故基又西至波羅柰國兩城相距五里南臨洹河又西北十許里至鹿野苑塔廟佛跡最夥又南行十里渡洹河河南有大浮屠自鹿野苑西至摩羯提國館於漢寺寺多租入八村隸焉僧徒往來如歸南與杖林山相直巍峯巋然山北有擾波掬多石室及塔廟故基西南百里孤山名雞足三峯云是迦葉入定處又西北百里有菩提寶座城四門相望金剛座其中東向又東至尼連禪州東岸有石柱記佛舊事自菩提座東南五里至佛苦行處又西三里至三迦葉村及牧牛女池金剛座之北門外有獅子國迦藍又北五里至迦耶城又北十里至迦耶山云是佛説寶雲經處又自金剛座東北十五里至正覺山又東北三十里至骨磨城業館於鰕羅寺謂之南印度諸國僧多居之又東北四十里至王舍城東南五里有降醉象塔又東北登大山細路盤紆有舍利子塔又臨澗有下馬迎風塔度絶壑登山頂大塔廟云是七佛説法處山北平地又有舍利本身塔其北山半曰鷲峯云是佛説法華處山下即王舍城城北山趾有温泉二十餘井又北有大寺及伽蘭陁竹園故跡又東有阿難半身舍利塔温泉之西有平地直南登山腹有畢鉢羅窟窟西復有阿難證果塔去新王舍城八里城中有蘭若隸漢寺又有樹提迦故宅城其西有輪王塔又北十五里有那蘭陁寺寺之南北各有數十寺門皆西向其北有四佛座又東北十五里至烏巔頭寺東南五里有聖觀自在像又東北十里至迦濕彌羅寺寺南距漢寺八里許自漢寺東行十二里至郤提希山又東七十里有鴿寺西北五十里有支那西寺古漢寺也西北百里至花氏城育王故都也自此渡河北至毗耶離城有維摩方丈故跡又至拘尸那城及多羅聚落踰大山數重至尼波羅國又至磨逾里過雪嶺至三耶寺由故道自此入階州太平興國七年益州僧道遠至天竺以其王沒徙曩表來上文獻通考太宗令天竺僧施䕶譯云近聞支那國内有大明王至聖至明威力自在每慚薄幸朝謁無由遥望支那起居聖躬萬福今以釋迦舍利附光遠上進又譯其國僧統表詞意亦與没徙曩表同施䕶言烏填曩國屬北印度西行十二日至乾陁羅國又西行二十日至曩誐羅賀羅國又西行十日至嵐婆國又西行十二日至誐惹曩國又西行至波斯國得西海自北印度行百二十日至中印度中印度西行三程至呵囉尾國又西行十二日至迦囉拏俱惹國又西行十二日至摩羅尾國又西行二十日至烏然泥國又西行二十五日至羅囉國又西行四十日至蘇羅荼國又西行十一日至西海凡中印度行六月程至南印度又西行九十日至供迦拏國又西行一日至海自南印度南行六月程得南海皆施䕶之所述云雍熙中有婆羅門僧永世與波斯外道阿里煙同至京師永世自言本國名利得國王姓牙羅五得名阿喏你縛衣黄衣戴金冠以七寶爲飾出乘􅁚或肩輿以音樂螺鈸前導多遊佛寺博施貧乏其妃曰摩訶你衣綢縷金紅衣􅀊一出多所賑施人有冤抑俟王及妃出遊即迎隨申訴署國相四人庶務並委裁制五穀六畜果實與中華無異市易用銅錢文漫圓徑如中國之制但實其中不穿貫耳其國東行經六月至大食國又二月至西州又三月至夏州阿里煙自云本國王號黒衣姓張名哩里沒用錦綵爲衣每遊獵三二日一還國署大臣九人治國事無錢貨以雜物貿易其國東行經六月至婆羅門元太祖定西域至東印度地明永樂六年榜葛刺國王靄牙思丁遣使來貢正統後不復至續文獻通考榜葛刺即東印度地也國最大從蘇門答刺海西北行二十日抵淛地港自港至瑣納兒江有城池街市聚貨通市再行至板獨哇酋長居焉城郭甚嚴其國殿宇廣大内門三重九間殿柱皆黄銅包飾雕琢花獸左右長廊内設明甲馬隊千餘外列巨漢甲胄執鋒刃弓矢丹墀左右列孔雀翎扇蓋數百又置象隊王正殿高座嵌八寶王箕踞坐其上横劍於膝王及諸官皆回回人男祝髮白布􅆞頭圓領長衣束彩帨躡金錦羊皮鞾婦人不施脂粉耳垂寶釧項掛纓絡又有沼納樸兒其國在榜葛刺之西永樂十年亦遣使敇諭其國然以去中國絶遠朝貢竟不至續文獻通考沼納樸兒在榜葛刺迤西古天竺國也居印度之中又名金剛寶座國乃釋迦得道之所風俗修浮圖道不殺生後漢書人敦龎土饒沃見梁書天竺傳又云其王號茂論所都城郭水泉分流繞於渠壍下注大江其宫殿皆雕文刻鏤街曲市里屋舍樓觀鐘鼓音樂服飾奢華水陸通流百賈交㑹器玩珍瑋恣心所欲左右嘉維舍衛葉波等十六大國去天竺或二三千里共尊奉之以為在天地之中也百姓殷樂俗無簿籍耕王地者輸地利以齒貝為貨舊唐書俗皆徒跣衣重白色舊唐書無喪紀重刑罰善天文推算之術舊唐書死者或焚屍取􅁅以為浮屠或委之中野以施禽獸或流之於河以飼魚鼈無喪紀之文謀反者幽殺之小犯罰錢以贖罪不孝則斷手足截耳割鼻放流邊外有文字善天文推算之術其人皆習學曇章云是梵天書法書於貝多樹葉以紀事俗尚信義田豐美一􅀊二收男女勤耕織續文獻通考地大物阜繁華􅀋中國明史地大物阜城池街市聚貨通商繁華􅀋中國俗淳龎有文字官司上下亦有行移醫卜陰陽百工技藝悉如中國明史皆前世所流入也敬迎朝使宴贈盡禮明史其王敬天朝聞使者至遣官具儀物以千騎來迎王宫高廣威儀甚壯朝使入令拄銀杖者二人來導五步一呼至中則止又令拄金杖者導如前其王拜迎詔叩頭手加額開讀受賜訖設毧毯於殿宴朝使不飲酒以薔薇露和香蜜水飲之贈使者金盔金繫腰金瓶金盆其副悉用銀其從者皆有贈土產鹽文獻通考天竺國臨大江源出崑崙分為五江總名洹水其水甘美下有真鹽色正白如水晶金剛舊唐書似紫石英百鍊不消可以切玉高伱布兜羅綿翠羽琉璃良馬鶴頂犀角烏爹泥紫膠烏木蘇木麒麟金銀青花白瓷鸚鵡洗白苾布撒哈刺糖霜乳香熟香烏香麻藤香藤竭胡椒粗黄自麒麟以下俱見明史大清一統志拂菻在西海中建置沿革即漢大秦國又名犂靬後漢延熹初始通中國通典其國在西海之西亦云海西國其王理安都城宫室皆以水晶爲柱從條支西渡海曲萬里去長安蓋四萬里其人長大平正有􅀋中國故謂之大秦云晉武帝太康中其玉遣使貢獻晉書其地東西南北各數千里有城邑其城周迴百餘里屋宇皆以珊瑚爲棁栭琉璃爲牆壁王有五宫相去各十里每旦於一宫聽事終而復始若國有災異輒更立賢人放其舊主有官曹簿領而文字異習亦有白葢小車旌旗之屬及郵驛制置一如中州以金銀爲錢銀錢十當金錢之一安息天竺人與之交市於海中其利百倍鄰國使到者輒廩以金錢途經大海海水不可食商客往來皆齎三􅀊糧是以至者稀少至唐時改名拂菻貞觀十一年其王波多力遣使入貢開元七年又遣大德僧來朝舊唐書拂菻國一名大秦地方萬餘里列城四百邑居連屬有貴臣十二人共治國政常使一人將囊隨王車百姓有事者即以書投囊中王還宫省發理其枉直其王冠形如鳥舉翼冠及纓絡皆綴珠寶衣錦繡前不開襟坐金花牀有一鳥似鵞毛緑色常在王側倚枕上坐每進食有毒其鳥輒鳴其都城曡石爲之絶高峻凡有十萬餘户南臨大海城東面有大門其高二十餘丈自上及下飾以黄金光輝燦爛連曜數里自外至王室凡大門三重列異寶雕飾第二門樓中懸一金秤以金丸十二屬於衡端以候日之十二時一金人立於側每至一時其金丸輒落鏗然發聲引唱以紀日時毫􅁵無失其殿以瑟瑟爲柱黄金爲地象牙爲門扇香木爲棟梁其俗無瓦擣白石爲末羅之塗屋上其堅密光潤還如玉石至盛暑之節人厭囂􅀬乃引水潛流上徧屋宇機制巧密人莫之知觀者惟聞屋上泉鳴俄見四簷飛溜懸波如瀑布激氣成涼風其巧妙乃如此嗣後無聞至元末其國人有􅑃古倫者入市中國不能歸明洪武四年召見命齎詔書還諭其王復命使臣普刺等齎敕書綵幣招諭其國乃遣使來貢後不復至萬厯時西洋人利瑪竇至京師言天主耶蘇生於如德亞蓋即古大秦國云風俗其人質直市無二價穀食常賤國用富饒魏書俗多奇幻魏書有幻人能額上爲炎燼手中作江湖舉足而珠玉自墮開口則旛眊亂出披帔右袒錦爲頭巾舊唐書其男子披帔右袒婦人不開襟錦爲頭巾土產金珠玉夜光璧琥珀瑪瑙硨磲赤玻璃緑金精珊瑚魏書西南漲海中可七八百里行到珊瑚洲水底有盤石珊瑚生其上大秦人常乘大舶載鐵網令水工先投入視之可下網乃下初生白漸似苗坼甲厯一載許出網目間變作黄色枝格交錯高極三四尺大者圍尺餘三年色乃赤好復沒視之知可採便以鐵鈔發其根乃以索繫網使人以舶上絞車舉出還國理截恣意所作若失時不舉便蠧敗木難魏書碧色珠也出翅鳥口中結沫所成土人珍之蘇合香晉書㑹合諸香煎其汁爲之火浣布錦罽海西布魏書大秦有織成細布言用水羊毛名曰海西布作􅉊毾㲪罽帳之屬其色鮮于海東諸國所作駭雞犀獅子魏書大秦地多獅子遮害行旅不百餘人將兵器輒爲所食羊羔舊唐書生於土中其國人候其欲萌乃築牆以院之防外獸所食也然其臍與地連割之則死惟人著甲走馬及擊鼓以駭之其羔驚鳴臍遂絶大清一統志古里在西海中建置沿革西洋大國也自柯枝舟行三日可至自錫蘭山十日可至爲諸番要會自古不通中國明永樂元年命中官尹慶奉詔諭其國其酋沙米的喜其酋沙米的喜舊志作其王馬那必加刺滿今改正遣使入貢因封爲國王賜印誥及文綺遂比年入貢十四年偕瓜哇彭亨等國入貢是時諸番使臣充斥於廷以古里大國序其使者於首宣德八年其王比里麻遣使偕蘇門答刺等國使臣入貢其使久留都下正統元年乃命附瓜哇貢舟西還自是不復至風俗其人淳厚行者讓道路不拾遺續文獻通考敬浮屠崇回教明史人分五等如柯枝其敬浮屠鑿井灌佛亦如之每旦王及臣民取牛糞調水塗壁及地又煅爲􅁅抹額及股謂爲敬佛國中半崇回教建禮拜寺數十處七日一禮男女齋沐謝事午時拜天於寺未時方散王老不傳子而傳甥無甥則傳弟無弟則傳於國之有德者國事皆決於二將領以回回人爲之刑無鞭笞重者斷手足輕者罰金珠鞫獄不承則置其手指沸湯中三日不爛即免罪免罪者將領導以鼓樂送還家親戚致賀蔬果畜產多􅀋中國明史其國山多地瘠有穀無麥富家多植椰子樹至數千其嫩者漿可飲亦可釀酒老者可作油糖亦可作飯幹可構屋葉可代瓦殻可製杯瓤可索綯煅爲􅁅可鑲金其他蔬果畜產多􅀋中國土產寶石珊瑚珠琉璃鐵龍涎香蘇合油花氊單伯蘭布苾布大清一統志柯枝在西海中建置沿革相傳即古盤盤國其國與錫蘭山對峙中通古里東界大山三面距海自小葛蘭西北行順風一日夜可至宋元嘉中始通中國梁隋皆入貢唐貞觀九年來貢永徽中獻鸚鵡明永樂六年命鄭和使其國九年國王可亦里遣使入貢使者請賜印誥封其國中之山爲鎮國之山勒碑其上系以銘宣德八年王可亦里復遣使偕錫蘭山諸國來貢正統元年遣其使者附瓜哇貢舶還國風俗崇釋教俗甚淳舊唐書盤盤傳人皆尊婆羅門敬佛法明史其王瑣里人崇釋教佛座四旁皆水溝復穿一井每旦鳴鐘鼓汲水灌佛三浴之始羅拜而退俗頗淳築室以椰子樹爲材取葉爲苫以覆屋風雨皆可蔽呼僧爲比邱呼道士爲貪舊唐書僧尼讀佛經食肉而不飲酒道士不食肉國不甚重人分五等明史一曰南毘王族􅀋二曰回回三曰哲地皆富民四曰革全皆牙儈五曰木瓜木瓜最貧爲人執賤役者屋高不得過三尺衣上不得過臍下不得過膝途遇南毘哲地人輒伏地俟其過乃起氣候常熱田瘠少收明史氣候常熱一􅀊中二三月時有小雨國人皆治舍儲食物以俟五六月間大雨不止街市成河七月始晴八月後不復雨􅀊􅀊皆然田瘠少收諸穀皆產獨無麥諸畜亦皆有獨無鵞與驢云土產胡椒續文獻通考地產胡椒通商販賣鸚鵡唐永徽中常入貢大清一統志錫蘭山在西海中建置沿革自古不通中國明史錫蘭山傳或云即古狼牙修梁時曾通中國自蘇門塔刺順風十二晝夜可達明永樂中鄭和使西洋至其地其王亞烈苦奈兒欲害和和覺去之他國及和歸經其地復誘和至國中發兵五萬塞歸路和乃率步卒二千由間道攻拔其城生擒亞烈苦奈兒及妻子頭目獻俘於朝帝憫其無知皆釋之且給以衣食命擇其族之賢者立之有邪把乃那者諸俘囚咸稱其賢乃遣使齎印誥封爲王其舊王亦遣歸自是遂屢入貢至天順後不復至其國地廣人稠貨物多聚亞於瓜哇東南海中有山三四座總名曰翠藍嶼大小七門門皆可通舟中一山尤高大番名梭篤蠻山明史其人皆巢居穴處赤身髠髮相傳釋迦佛昔經此山浴於水或竊其袈裟佛誓云後有穿衣者必爛其皮肉自是寸布罣身輒發瘡毒故男女皆裸體但紉木葉蔽其前故又名裸形國自此山西行七日見鸚哥嘴山又二三日抵佛堂山即入錫蘭國境明史海邊山石上有一足跡長三尺許故老云佛從翠藍嶼來踐此故足跡尚存中有淺水四時不乾人皆手蘸拭目洗面曰佛水清淨山下僧寺有釋迦真身倒卧牀上旁有佛牙及舍利相傳佛涅槃處也其寢座以沈香爲之飾以諸色寶石王所居側有大山高出雲漢其巔有巨人足跡入石深二尺長八尺餘云是盤古遺跡此山產紅大清一統志西洋瑣里在西海中建置沿革自古不通中國明洪武三年其王别里提始遣使奉金葉表獻方物永樂元年又遣使來貢附載胡椒與民市命有司勿徵其税二十一年偕古里阿丹等十五國來貢又有瑣里者近西洋瑣里而差小洪武五年其王卜納的亦遣使奉表朝貢按瑣里本一小國乃占城暹羅錫蘭柯枝諸大國王舊志皆云係瑣里人故特存之風俗無可考土產兜羅綿白苾布大清一統志啞齊在西南海中建置沿革古蘇門答刺在滿刺加之西或言即漢條枝唐波斯大食二國地西洋要會也續文獻通考又云即古蘇文達那明洪武中遣使奉表入貢永樂三年其酋宰奴里阿必丁巳遣使入貢詔封爲蘇門答刺國王比年入貢終成祖世不絶鄭和凡三使其國續文獻通考其國與花面國相接先是蘇門王與花面王戰中矢死王子年幼不能復讐其妻令曰孰能復此讐者我以爲夫與共國事有漁翁聞之率衆往擊殺花面王而還遂稱爲老王既而王子年長率部衆殺之漁翁子蘇幹刺奔峭山思復父讐王子遣使來訴乃命太監鄭和往捕蘇幹刺以歸獻闕下國乃安迨萬厯間國兩易姓易國名曰啞齊明史啞齊王者其始本人奴也奴之主爲國大臣握兵柄一日隨主入朝出謂主曰王左右侍衛少請乘間刺殺之奉主爲王猶反掌耳主從之遂篡王位任奴爲心腹委以兵權未幾奴復殺主而代之乃大爲防衛拓其宫建六門不得䦨入雖勲貴不得帶刀上殿出乘象象駕亭而帷其外如是者百餘俾人莫測王所在云内地商船每附番舶至其地互市其國近爲英吉利所屬云風俗商賈輻輳市道稱平明史其國俗頗淳出言柔媚貨舶至貿易稱平地本瘠無麥有禾禾一􅀊二稔四方商賈輻輳華人往者以地遠價高􅀗利倍他國其氣候朝如夏暮如秋夏有瘴氣婦人裸體惟腰圍一布其他風俗􅀋滿刺加白布􅅶頭束腰佩劍皇清職貢圖白布􅆞頭蓄鬚髮著素衣肩披花帛束腰佩劍婦披髪不筓頷下胸前多飾金珠家居常喜現體跣足出行仍以大布􅀩首至踵土產䟽黃賄爾馬果外皮甚臭剖開取囊如酥油香美俺拔果其味酸甜香冽寶石瑪瑙水晶石青回回青馬犀龍涎香沈香木香丁香速香降真香斗錫胡椒蘇木大清一統志南渤利在西南海中建置沿革亦稱南浡里自古不通中國相傳自蘇門答刺而西順風三日夜可到王及居民皆回回人僅千餘家其國境西北有山甚高峻曰㡌山山西大海即西洋也番名那沒黎洋往來洋船俱望此山爲準山下亦有居人二三十家皆自稱爲王問其姓名則曰阿􅀌喇揸或問其次則曰阿􅀌喇杳屬南渤利國所轄明永樂十年其王馬哈麻沙遣使附蘇門答刺使入貢宣德五年鄭和遍賜諸國南渤利亦與焉風俗俗樸實地少穀人多食魚蝦明史土產降真香犀牛黒珊瑚續文獻通考㡌山近海水内生黒珊瑚樹大者高二三尺如墨之黒如玉之潤有枝婆娑可愛大清一統志占城在西南海中建置沿革即周越裳地秦為林邑漢為象林縣屬日南郡後漢末區連據其地始稱林邑王傳數世無子外甥范逸代立晉成帝咸康二年逸死其奴文篡位南史林邑傳范文本日南西卷縣夷帥范稚家奴常牧羊於山澗得鱧魚化為鐵因以鑄刀刀成文向日咒曰若斫石破者文當王此國因破石如斷芻藁文心異之及逸死遂篡其位乃攻旁國幷之有衆四五萬至穆帝永和三年文率其衆攻陷日南還據其地告交州刺史朱蕃求以日南北鄙横山為界又襲九真害士庶十八九文死子佛立猶屯日南九真太守灌􅃉率兵討走之乃復還林邑唐貞觀中其王頭黎卒子鎮龍嗣為摩訶慢多伽獨所殺范氏遂絶國人立頭黎之姑子諸葛地更號環王明史唐時或稱占不勞或稱占婆至德後改國號曰環元和初入冦驩愛等州安南都䕶張丹擊敗之遂棄林邑徙國於占號占城周顯德中宋乾德中皆入貢明統志周顯德中其王釋利因德漫遣其臣莆訶散來貢宋乾德中其王悉利因陁盤遣使因陁玢等貢方物元至元間惡其阻命大舉兵擊之終不能定明洪武二年太祖遣官以即位詔諭其國其王阿答阿者先已遣使奉表來朝貢象虎方物乃命中書省管勾甘桓㑹同館副使路景賢齎詔封阿答阿者爲占城國王二十三年阿答阿者失道大臣閣勝弑王自立明年遣太師奉表來貢帝惡其悖逆卻之永樂元年其王占巴的賴奉金葉表朝貢且告安南侵掠請降敕誡諭許之嗣後朝貢不絶然安南與占城以壤地相接故互相侵掠搆兵不巳至成化七年安南大舉兵破占城執其王槃羅茶全遂據其地改爲交南州尋立前王孫齋亞麻弗菴爲王以國南邊地予之十四年遣使請封於朝方命使而齋亞麻弗菴已卒其弟古來請襲位安南又立其國人提婆苔爲王竊據其地朝議傳諭古來詣廣東受封遣都御史屠滽傳檄安南存亡繼絶迎吉來返占城安南以滽大臣奉特遣䕶古來還國不敢抗古來乃得入宏治元年遣使入貢而安南仍肆侵陵焉始占城所立土地凡三千七百餘里最爲殷庶宋史占城國在中國之西南東至海西至雲南南至真臘北至驩州其地東西七百里南北三千里南曰施備州西曰上源州北曰烏里州所統大小州二十八自殘破以後民物蕭條貢使亦漸稀矣又有賓童龍者與占城接壤或言如來入舍衞國乞食即其地其氣候風土亦相􅀋明史賓童龍國人皆穴居巢處食菓實魚蝦無室廬井竈風上頗􅀋占城惟遭喪能持服葬以僻地設齋禮佛婚姻偶合酋出入乘象或馬從者百餘人前後讚唱民編茅覆屋貨用金銀花布國境有崑崙山屹然大海中與占城及東西竺鼎峙相望其山方廣而高其海即曰崑崙洋諸往西洋者必待順風七晝夜始得過故舟人爲之諺曰上怕七州下怕崑崙針迷舵失人船莫存云風俗胸纒㲲布腦垂髽髻宋史外國傳土無絲繭以白㲲布􅅶胸垂至足衣衫窄袖撮髮爲髻散垂爲髾於後其王腦後髽髻散披吉貝衣戴金花冠七寶妝纓絡爲飾脛股皆露躡革履無襪婦人亦腦後撮髻無筓梳其服及拜揖與男子同王每日午坐禪椅官屬謁見膜拜一而止白事畢復膜拜一而退或出遊看象採獵觀漁皆數日方還近則乘輭布兜遠則乘象或乘一木杠四人舁之先令一人持檳榔盤前導從者十餘輩各執弓箭刀槍手牌等其民望之皆膜拜驅象逐邪殺牛祭祀宋史占城傳其風俗於正月一日牽象周行所居之地然後驅逐出郭謂之逐邪四月有遊般之戲定十一月十五日爲冬至人皆相賀每年十二月十五日城外縛木爲塔王及臣民以衣物及香置塔上焚之以􅀕天地又其國有山牛不任耕耨但殺以祭祀將殺令巫祝之曰阿羅和及拔譯云早教他托生也人性兇悍果於戰鬬文獻通考市用金銀飲無茶酒文獻通考市無緡錢止有金銀較量錙銖地不產茶亦不知醖釀之法止飲椰子酒兼食檳榔民以漁爲業力穡者少明史其國無霜雪四時皆似夏草木常青民以漁爲業無二麥力穡者少故收穫薄國人皆食檳榔終日不離口無紙筆不解朔望明史其俗但以月生爲初月晦爲盡不置閏分晝夜爲十更非日中不起非夜分不卧見月則飲酒歌舞爲樂無紙筆用羊皮槌薄薰黒削細竹蘸白􅁅爲字狀如蚯蚓性很而狡飲食汚􅁾明史人性很而狡貿易多不平户皆北向民居悉覆茅檐高不過三尺部領分差等門高卑亦有限飲食􅁾汚魚非腐爛不食釀不生蛆不美人體黒男蓬頭女椎髻俱跣足其王􅀊時采生人膽入酒中與家人同飲且以浴身曰通身是膽國人采以獻王又以洗象目每伺人於道出不意殺取之崇釋教重刑罰明史王在位三十年避位入深山以兄弟子姪代持齋受戒告於天曰我爲君無道願狼虎食我或病死居一年無恙則復位如初國人呼爲昔嚟馬哈刺乃至尊至聖之稱有鰐魚潭獄疑不決者令兩造騎牛過其旁曲者魚輒躍而食之直者即數往返不食也續文獻通考刑禁亦設枷鎖小過以藤杖鞭之當死者以䋲繫於樹用槍舂喉而殊其首土產金南史林邑國有金山石皆赤色其中生金金夜則出飛狀如螢火火珠唐書貞觀四年林邑王范頭黎遣使獻火珠大如雞卯圓白皎潔光能照數尺狀如水晶正午向日蒸之即火燃犀大者八百觔象烏木降香伽南香獨產其地一山酋長遣人守之民不得採犯者斷手觀音竹長丈八尺節二三寸色如鐡矮腳雞結遼鳥能解人語見唐書林邑傳五色鸚鵡唐書貞觀四年林邑獻五色鸚鵡太宗異之詔右庶子李百藥爲之賦玳瑁孔雀菩薩石薔薇水猛火油宋史占城有薔薇水灑衣經􅀊香不歇猛火油得水愈熾二者皆貯以琉璃瓶吉貝明統志樹名其花成時如鵞毳抽其緒紡之可以作布白㲲布大清一統志東埔寨在西南海中建置沿革古真臘國本扶南屬國亦名占臘其後倂扶南而有之明統志真臘本扶南屬國其王姓刹利名質多斯那者始倂扶南而有之隋大業中始通中國隋書真臘傳其王三日一聽朝坐五香七寶牀上施寶帳其帳以文木爲竿象牙金鈿爲壁狀如小屋懸金光焰有同於赤土前有金香爐二人侍側王戴金寶花冠被珍珠纓珞足履革屣耳懸金鐺常服白㲲以象牙爲屩若露髪則不加纓珞臣下服製大抵相􅀋有五大臣一曰􅀌落支二曰高相憑三曰婆何多陵四曰舍摩陵五曰髯多婁及諸小臣朝於王者輒於階下三稽首王命上階則跪以兩手自抱膊遶王環坐議政事訖跪伏而去唐自武德至聖厯凡四來朝神龍以後國分爲二其南近海多陂澤爲水真臘其北多山阜爲陸真臘後復合爲一宋政和中遣使來貢宣和初封爲真臘國王與占城等慶元中其王大舉兵伐占城破之而立真臘人爲占城王故當時占城亦爲屬國其屬國又有參半真里登流眉蒲甘等國所領聚落六十餘地方七千餘里明洪武四年國王忽兒那遣其臣柰亦吉郎等表獻方物永樂間嘗再入貢使者以其國數被占城侵擾久留不去帝遣中官送之還幷敕占城王罷兵修好至景泰後貢使不至明史真臘傳其國城隍七十餘里國中有金塔金橋殿宇三十餘所王􅀊時一㑹羅列玉猿孔雀白象犀牛於前名曰白塔洲盛食以金盤銀椀故有富貴真臘之諺其國自稱甘孛智後訛爲甘破蔗萬厯後改爲東埔寨按皇朝通典東埔寨國無城池王即山而建府架竹木爲之覆以茅葉民居亦然每冬春間浙閩粤商人往彼互市及夏秋乃歸舟必經七洲大洋到魯萬山由虎門入計程七千三百里距厦門水程一百七十更其旁有伊代嗎國風俗與東埔寨同風俗東向爲上右手爲潔太平寰宇記國俗東向開户以東爲上男婦悉卷髮垂耳以右手爲淨左手爲􅁾尚華侈崇釋教不知喪葬不識􅁞織明史民俗富饒天時常熱不識霜雪禾一􅀊數稔男女椎髻穿短衫圍梢布刑有劓刖刺配盜則去手足番人殺唐人罪死唐人殺番人則罰金無金則鬻身贖罪唐人者諸番呼華人之稱也凡海外諸國盡然婚嫁兩家俱八日不出門晝燃燈人死則置於野任烏鳶食俄頃食盡者謂爲福報居喪但髠其髮女子則額上翦髪如錢大曰用此報親文字以麂鹿雜皮染黒用粉爲小條畫於上永不脱落以十月爲􅀊首閏悉用九月夜分四更亦有曉天文者能算日月薄蝕其地謂儒爲班詰僧爲苧姑道爲八思班詰不知讀何書由此入什者爲華貫生時頂掛一白線以自别既貴曳白如故俗尚釋教僧皆食魚肉或以供佛惟不飲酒尤侗外國傳其俗不識蠶織後暹人來居得蠶與桑種織紝縫補率請暹婦爲之禦敵以象入山取犀皇清職貢圖人情柔弱喜飼象演之爲陣用以禦敵常帶劍入山取犀角獻於夷目男翦髮裹頭身衣僅蔽下體女挽髻露肘臂惟蔽其乳圍裙跣足能採桑飼蠶亦能織蓆土產犀牛象牙翠羽寶石金顔香明統志香乃樹脂有淡黄色者有黒色者以剖開雪白者爲佳夾砂石爲下其氣能聚衆香番人以之和香塗身篤耨香明統志樹如杉檜香藏於皮老而脂自流溢者名白篤耨冬月因其凝而取之者名黒篤耨盛之於瓢碎瓢而􅋹之亦有香名篤耨瓢沈香速香明統志伐樹去木而取香者謂之生速香樹仆木腐而香存者謂之熟速香其樹木之半存者謂之暫香黄而熟者謂黄熟通黒者謂夾箋降香烏木蘇木麝香木氣似麝臍婆田羅樹花葉及實畧似棗歌畢佗樹花似林禽葉似榆而厚大實似李昆野樹花似木瓜葉似杏實似楮菴羅樹花葉似棗實似李白荳蔻胡椒黄蠟建同魚隋書海中有建同魚四足無鱗其鼻同於象吸水上噴高五六十尺浮胡魚隋書其形似䱉嘴如鸚鵡有八足大清一統志噶喇巴在西南海中建置沿革本瓜哇故地即古闍婆國又名莆家龍亦曰下港曰順塔劉宋文帝元嘉中始通中國其後復絶至宋淳化中其王穆羅茶遣使來朝貢大觀中復貢元時稱瓜哇為西南諸番之衝要續文獻通考東抵古女人國西抵三佛齊南抵古大食國北抵占城其在海外視占城益遠自泉南登舟海行者先至占城而後至其國按元史至元二十九年十二月發泉州明年正月即抵其國相去止月餘似亦不為遠也世祖至元中大出師伐之竟不能克其水有八節澗上接杜馬班王府下通莆奔大海乃瓜哇咽喉必爭地元史弼高興嘗會兵於此其國分東西二王明洪武中各遣使入貢永樂中東王為西王所滅宣德七年嘗入貢表書一千三百七十六年蓋漢宣帝元康元年乃其建國之始也自宏治後貢使鮮有至者萬厯時荷蘭築土庫於大澗東佛郎機築於大澗西􅀊􅀊互市中國商旅亦往來不絶明史其國有新村最號饒富中華及諸番商舶輻輳其地其國後為荷蘭所倂本朝初年閩海華人浮海為業者利其土產多流聚於此皇朝文獻通考噶喇巴為荷蘭所佔漢人居之者以數萬計生長其地曰上生仔司漢人貿易者曰甲必丹康熙五十六年以噶喇巴口岸多聚漢人恐寖長海盜禁止南洋往來雍正五年弛洋禁嗣後通市不絶乾隆二十四年禁絲斤出洋後經邊臣奏准噶喇巴諸國酌帶土絲及二蠶粗絲以一千六百斤爲率由是南洋等國皆得衣被章采奉職彌謹焉風俗室宇壯麗飲食豐潔宋史乘輭兜吹横􅅇宋史其俗以五月遊船十月遊山有馬可乘跨或乘輭兜樂有横􅅇鼓板亦能舞穀米富饒民不爲盜明統志其田膏腴地平衍穀米富饒倍於他國民不爲盜道不拾遺諺云太平闍婆者此也地多流寓刑無鞭扑續文獻通考其國四鄉初至杜板僅千家二酋主之流寓多廣東漳泉人又東行半日至厮村中國之人客此成聚落遂名新村約千餘家村主廣東人番舶至此互市金寶光溢人民富饒又南水行可半日至淡水港乘小艇行二十餘里至蘇魯馬益亦千餘家半中國人港傍大洲林木蔚茂有長尾猱數萬又水行八十里至漳沽登岸西南陸行半日至王所居王宫磚墉高三丈方三十餘里王蓬頭頂金葉冠胷縈嵌絲帨腰束錦綺佩短刀跣足跨象或乘牛民男蓬頭女椎髻上衣下帨男必腰刀刀極精巧刑無鞭扑罪不問輕重藤繫刃殺之市用中國古錢衡量倍於中國尚氣好鬬寢食汚􅁾續文獻通考國人大抵三種西番賈居久者服食皆雅潔中國流寓者尚回回教持齋受戒曰唐人土人有名無姓尚氣好鬬顔色黝黒猱頭赤腳坐卧無椅榻飲食無匙箸啖蛇蟻蟲蚓與犬同寢食不爲􅁾也婚姻男造女家後五日迎婦金鼓刀盾前後甚多婦裸披髪跣足縈嵌絲帨戴被金珠綵飾寶妝喪有水葬火葬犬葬惟死者所欲好甲兵無紙筆明史性兇悍男子無少長貴賤皆佩刀稍忤輒相賊故於兵甲爲諸番之最字􅀋瑣里無紙筆刻於茭蔁葉氣候常似夏稻􅀊二稔工巧多謀器具精緻皇清職貢圖性工巧饒謀慮器具精緻夷人花帛纒頭短衣束腰統布幅爲裙跣足手持木棒有爵者鐫字於上以爲别夷婦垂髻施簪珥以花布􅅶上體短衣長裙露胷跣足善裁製縫紉性嗜啖果土產金銀真珠犀角番名低密象牙番名家囉玳瑁諸名香烏爹泥金剛子蓽澄茄明統志其藤蔓衍春花夏實花白而實黒鶴頂鳥名大於鴨外黄内赤火雞大於鶴輭紅冠毛如青羊食炭倒掛鳥形似五色雀吉貝桄榔木蝦蝚樹宋史其酒出於蝦蝚丹樹青鹽綵鳩白猿五色鸚鵡明統志瓜哇有鸚鵡山以岀鸚鵡得名大清一統志浡泥在西南海中建置沿革本闍婆屬國前代無可考宋太平興國中始遣使入貢明洪武三年命御史張敬之往使自泉州航海閲半年抵闍婆又踰月始至其國國王乃遣使奉表箋來貢表用金箋用銀字近回鶻皆鏤之以進帝宴賚甚厚八年命其國山川附祀福建山川之次永樂六年八月其王麻那惹加那泛海入朝十月王卒於館葬於安德門外石子岡樹碑神道諡曰恭順賜敕慰其子遐旺命襲封國王又從國王請封其國之後山爲一方鎮御製碑文系之以詩勒碑山上至萬厯中其王卒無嗣乃立其女爲王後遂不復朝貢然商人猶往來不絶其國統十四洲在舊港之西自占城四十日可至初屬瓜哇後屬暹羅改名大泥華人多流寓其地嘉靖末閩粤海寇遺孽逋逃至此積二千餘人萬厯時紅毛番强商其境築土庫以居其入彭湖互市者所攜乃大泥國文也風俗以板爲城以銅鑄甲宋史其國以板爲城王所居屋覆以貝多葉民舍覆以草王坐繩牀出則擁大布單坐其上衆舁之名曰阮囊戰鬬則持刀披甲甲以銅鑄狀若大筒穿之於身䕶其腹背盛食無器皿喪葬有棺斂婚聘先以椰子酒宋史國人以十二月七日爲􅀊節凡宴會鳴鼓吹􅅇擊鈸歌舞爲樂無器皿以竹編貝多葉爲器盛食食訖棄之喪葬亦有棺斂以竹轝載棄山中二月始耕作則祀之踰七年則不復祀俗尚奢侈愛敬中國明統志男女椎髻以五采帛繫腰花錦爲衫尤愛敬中國人每見中國人醉者則扶之以歸土產片腦明統志樹如杉檜取之者必齋沐而往其成片似梅花者爲上其次有金腳腦速腦米腦蒼腦扎聚腦又一種如油者名腦油象牙鶴頂吉貝西國米檀香玳瑁把雜爾獸名腹中一石能療百病西洋布降真香俱見明史貝多樹加􅀩樹續文獻通考有貝多加􅀩二樹心可爲酒大清一統志麻葉甕在西南海中建置沿革又名麻葉凍自古不通中國明永樂三年遣使齎璽書賜物招諭迄不朝貢相傳自占城靈山放舟順風十晝夜至交欄山其西南即麻葉甕也交欄山甚高廣饒竹木元時史弼高興伐瓜哇遭風至此山下舟多壞乃登山伐木重造遂破瓜哇其病卒百餘人留養不歸後益蕃衍故其地多華人云風俗氣候稍熱俗尚節義續文獻通考山峻地平氣候稍熱田禾倍收俗尚節義婦人喪夫則􅙃面薙髪絶粒七日多有死者得甦亦不再嫁煮海爲鹽釀蔗爲酒續文獻通考男女椎結衣長衫圍之以布明史貨用銅鼎鐵塊五色布絹續文獻通考土產玳瑁木棉黃蠟檳榔花布大清一統志舊港在西南海中建置沿革古名三佛齊南蠻别種或云即干陀利與占城爲鄰居真臘闍婆之間所管五十州從廣州府汎海使風二十日可至其王號詹卑其國居人多蒲姓唐天祐元年始遣使入貢宋太平興國五年其王夏池遣使茶龍眉來貢咸平六年復來且言本國建佛寺以祝聖夀願賜名及鐘乃詔以承天萬壽爲寺額幷鑄鐘以賜之嗣後朝貢不絶明洪武四年其王馬哈刺札八刺卜遣使入貢九年命使者齎印敕封爲三佛齊國王時瓜哇强已威服三佛齊而役屬之聞封爲國王與已埓則大怒遣人誘朝使邀殺之尋破三佛齊據其國改其名曰舊港然亦不能盡其地華人流寓者往往起而據之明史有梁道明者廣州南海縣人久居其國閩粤軍民泛海從之者數千家推道明爲首雄視一方永樂三年以行人譚勝受與道明同邑命偕千户楊姓等齎敕招之道明及其黨鄭伯可隨入朝貢方物受賜而還四年舊港頭目陳祖義遣子士良道明遣從子觀政並來朝祖義亦廣東人雖朝貢而爲盗海上貢使往來者苦之五年鄭和自西洋還祖義潛謀邀劫有施進卿者告於和祖義來襲被擒獻於朝伏誅因命設舊港宣慰司以進卿爲使錫誥印及冠帶自是屢入貢然進卿雖受朝命猶服瓜哇其地狹小非故時三佛齊比也嘉靖末廣東大盜張連作亂官軍已報克􅀗萬厯五年商人詣舊港者見連列肆為番舶長漳泉人多附之本朝雍正七年粤省商船載瓷器紙果諸物往彼互市乾隆二十九年准加市絲斤其國至廣東計程一萬一千餘里風俗香油塗身椰葉覆屋宋史其人用香油塗身又曰累甓為城周數十里用椰葉覆屋土沃宜稼民皆水居明史土沃宜稼語云一年種穀三年生金言收穫盛而貿金多也俗富好淫習於水戰鄰國畏之地多水惟部領陸居庶民皆水居編筏築室繫之於樁水漲則筏浮無沈溺患欲徙則拔樁去之下費財力國無城池地氣多暖皇朝通典地方袤延數千里國無城池隨民居所聚以為村落傍山建王府以磚瓦為之地氣多暖土產紅藤紫礦見宋史貓睛石腽肭臍薔薇水龍腦香沈香金銀香神鹿如巨豕高三尺蹄三跲鶴頂火雞黒熊白獺五色鸚鵡龜筒苾布兜羅綿胡椒棉花大清一統志法蘭西在西南海中建置沿革一名弗郎西即明之佛郎機也自古不通中國相傳在西南海中近滿刺加明正德中據滿刺加地逐其王明史滿刺加在占城南或曰即古頓遜地十三年遣使臣加必丹末等貢方物請封始知其名嘉靖二年其將别都盧既以巨礮利兵肆掠滿刺加諸國横行海上復率其屬疏世利等入寇新會之西草灣指揮柯榮百户王應恩禦之轉戰至稍州向化人潘丁茍先登衆齊進生擒别都盧疏世利等􅀗其二舟賊敗遁官軍得其礮即名爲佛郎機副使汪鋐進之朝九年秋鋐累官右都御史上言今塞上墩臺城堡未嘗不設乃寇來輒遭蹂􅏳者蓋墩臺止瞭望城堡又無制遠之具故往往受困當用臣所進佛郎機其小止二十斤以下遠可六百步者則用之墩臺每墩用其一以三人守之其大至七十斤以上遠可五六里者則用之城堡每堡用其三以十人守之五里一墩十里一堡大小相依遠近相應寇將無所容足可坐收不戰之功帝悦即從之火礮之有佛郎機自此始其後廣東巡撫林富上言粤中公私諸費多資商税番舶不至則公私皆窘今許佛郎機互市有四利祖宗時諸番常貢外原有抽分之法稍取其餘足供御用利一兩粤比􅀊用兵庫藏耗竭藉以充軍餉備不虞利二粤西素仰給粤東小有徵發即措辦不前若番舶流通則上下交濟利三民以懋遷爲生特一錢之貨即得展轉販易衣食其中利四助國裕民兩有所賴此因民之利而利之非開利孔爲民梯禍也從之自是佛郎機得入香山嶴壕鏡爲市築室建城雄據海畔壕鏡在廣州府香山縣南虎跳門外先是暹羅古城瓜哇琉球浡泥諸國互市俱在廣州設市舶可領之正德時移於高州之電白縣嘉靖十四年指揮黄慶納賄請於上官移之壕鏡􅀊輸課二萬金佛郎機遂得混入高棟飛甍櫛比相望閩粤商人趨之􅀂騖久之其來益衆諸國人畏而避之遂專爲所據萬厯中又破滅吕宋遂盡擅閩粤海上之利本朝順治初准法蘭西番舶仍與粤商互市惟禁入省會自後每􅀊通市不絶焉皇朝通典其國都地名巴離士國王姓無盧􅀩名雷士堅治父石雷士吉多治祖名雷士爹利治亦紅毛番種也我朝順治四年廣督佟養甲疏言法蘭西國人明季寓居壕鏡澳與粤商互市後因䦨入省㑹遂飭禁止請嗣後仍准番舶通市上從之自後通市不絶惟禁入省會耳風俗好經商奉佛教明史其人長身高鼻貓睛鷹嘴卷髪赤鬚好經商恃强陵轢諸國無所不往衣服華潔貴者冦賤者笠見尊長輒去之初奉佛教後奉天主教市易但伸指示數雖累千金不立約契有事指天爲誓不相負尤侗外國傳其國人身著衫袴垂至脛皮屨衣服用瑣袱西洋布每六日一禮佛先三日食魚爲齋至禮拜日雞豕牛羊不忌手持紅杖而行飲食不用匙箸富首食麪貧與奴僕食米婚娶無媒妁佛前相配以僧爲証謂之交印國有大故亦多與僧謀人死貯布囊以葬所蓄半入僧室白巾黒氊脱帽爲禮皇清職貢圖夷人冠白巾加黑氊帽亦以脱帽爲禮土產犀象珠貝
