body:
  text: 南陽府在河南省治西南六百一十里東西距五百八十里南北距三百四十里東至汝寕府遂平縣界二百六十里西至湖北鄖陽府鄖縣界三百二十里南至湖北襄陽府襄陽縣界一百七十里北至汝州魯山縣界一百七十里東南至汝寕府信陽州界三百八十里西南至湖北襄陽府均州界二百五十里東北至許州襄城縣界二百七十里西北至陜西商州商南縣界四百二十里自府治至京師二千一百四十五里分野天文柳星張分野鶉火之次兼角亢氏分野壽星之次建置沿革禹貢豫州之域春秋為申鄧二國地文獻通考申在南陽宛縣鄧在南陽新野戰國分屬楚韓秦始置南陽郡史記秦本紀昭襄王三十五年初置南陽郡注今鄧州也通鑑注秦置南陽以在南山之南漢水之北也漢因之郡治宛三國魏置荆州晉書地理志南陽襄陽南鄉屬魏而荆州之名南北雙立晉爲南陽國南北朝宋仍曰南陽郡南齊因之後魏屬荆州州治府西南境穰縣隋開皇初郡廢大業初屬南陽郡時復置南陽郡移治穰縣唐武德三年改置宛州貞觀八年州廢屬鄧州時東境置唐州五代宋皆因之金未於南陽縣置申州與鄧州俱屬南京路元至元八年升爲南陽府屬河南江北行省明屬河南布政使司本朝因之屬河南省領州二縣十一南陽縣附郭東西距八十里南北距一百二十里東至唐縣界五十里西至鎮平縣界三十里南至新野縣界七十里北至南召縣界五十里東南至唐縣界三十里西南至鄧州界四十里東北至􅁉州界七十里西北至河南府嵩縣界一百六十里周初申國春秋楚宛邑漢置宛縣為南陽郡治三國魏及晉因之後魏分置上陌縣周省宛縣入上陌改曰上宛隋開皇初改南陽縣屬鄧州大業初屬南陽郡唐武徳三年置宛州貞觀八年州廢縣仍屬鄧州五代及宋因之金末置申州於此元明俱為南陽府治本朝因之南召縣在府西北一百二十里東西距二百五十五里南北距九十五里東至裕州界三十五里西至内鄉縣界二百二十里南至南陽縣界五十里北至魯山縣界四十五里東南至南陽縣界一十五里西南至鎮平縣界二百里東北至魯山縣界九十里西北至嵩縣界一百九十里本漢西鄂雉縣地明初置巡檢司成化十二年置南召縣本朝順治十七年省入南陽縣雍正十二年復置屬南陽府唐縣在府東一百二十里東西距一百二十里南北距一百六十里東至泌陽縣界七十里西至南陽縣界五十里南至湖北襄陽府棗陽縣界八十里北至􅁉州界八十里東南至桐栢縣界四十里西南至新野縣界六十五里東北至泌陽縣界一百十里西北至南陽縣界一百二十里本漢棘陽縣地後魏分置襄城郡上馬縣隋郡廢屬舂陵郡唐武德四年屬湖州貞觀元年廢開元十六年復置上馬縣天寶元年改曰泌陽屬唐州天祐三年自比陽移唐州來治改曰泌州五代後唐復曰唐州晉又曰泌州漢復曰唐州宋曰唐州淮安郡屬京西南路金曰唐州屬南京路元屬南陽府明初省縣入州後廢州為唐縣屬南陽府本朝因之泌陽縣在府東二百里東西距一百三十里南北距一百六十里東至汝寕府確山縣界一百里西至唐縣界三十里南至桐柏縣界三十里北至舞陽縣界一百三十里東南至桐柏縣界七十里西南至唐縣界三十里東北至汝寕府遂平縣界一百二十里西北至􅁉州界一百一十里漢置比陽縣屬南陽郡後漢晉因之宋屬廣平郡齊因之後魏太和中於縣置東荆州西魏改州為淮州隋開皇初又改顯州大業初改為淮安郡唐武德四年復曰顯州置總管府貞觀元年府罷九年改曰唐州天寶初曰淮安郡乾元初復曰唐州屬山南東道天祐三年徙州治泌陽以比陽為屬縣五代宋金因之元至元三年省入州治泌陽縣明初省泌陽縣入州洪武十四年改置泌陽縣於故比陽縣屬南陽府本朝因之桐柏縣在府東南三百里東西距二百三十里南北距一百二十里東至汝寕府信陽州界一百二十里西至唐縣界一百十里南至湖北德安府隨州界二十里北至泌陽縣界一百里東南至隨州界二百八十里西南至襄陽府棗陽縣界二百七十里東北至汝寕府西平縣界一百五十里西北至唐縣界一百四十里漢置平氏復陽二縣屬南陽郡後漢因之晉省復陽以平氏屬義陽郡宋省梁置淮安縣又置華州及上川郡西魏初改州曰淮州廢帝三年又改純州尋廢隋開皇初郡廢改縣曰桐柏大業初屬淮安郡唐武德初於縣置純州貞觀元年州廢縣屬唐州五代及宋金因之元至元三年廢明成化十二年復置屬南陽府本朝因之鎮平縣在府西七十里東西距九十里南北距九十里東至南陽縣界四十里西至内鄉縣界五十里南至鄧州界五十里北至南陽縣界四十里東南至新野縣界四十里西南至淅川縣界九十里東北至南召縣界一百六十里西北至内郷縣界九十里漢置涅陽縣屬南陽郡後漢晉以後因之隋開皇初改曰淉陽大業初仍屬南陽郡唐武德初屬鄧州貞觀元年省入穰縣金末始置鎮平縣屬申州元屬南陽府明洪武十年省入南陽縣十三年復置仍屬南陽府本朝因之鄧州在府西南一百二十里東西距一百五十五里南北距一百四十里東至新野縣界五十五里西至淅川縣界一百里南至湖北襄陽府襄陽縣界九十里北至鎮平縣界五十里東南至新野縣界五十里西南至襄陽府光化縣界六十里東北至南陽縣界六十里西北至内鄉縣界九十里春秋鄧國地戰國秦穰邑漢置穰縣屬南陽郡後漢因之晉初屬義陽郡後改屬新野郡宋齊因之後魏太和中移置荆州於此隋開皇初改曰鄧州大業初改南陽郡唐武德二年仍曰鄧州三年置總管府四年府廢天寶初復曰南陽郡乾元初仍曰鄧州屬山南道五代梁置宣化軍節度唐改威勝軍周改武勝軍宋亦曰鄧州南陽郡武勝軍節度屬京西南路金曰鄧州武勝軍節度屬南京路元為鄧州屬南陽府明洪武初省穰縣入州仍屬南陽府本朝因之淅川縣在府西南二百四十里東西距一百二十五里南北距二百里東至鄧州界几十里西至湖北鄖陽府鄖縣界三十五里南至湖北襄陽府均州界六十里北至内鄉縣界一百四十里東南至襄陽府光化縣界一百三十里西南至鄖縣界一百九十里東北至内郷縣界一百二十里西北至陜西商州商南縣界三百里本漢析縣地後魏始置淅川縣屬淅川郡後周省入中鄉唐武徳初復置淅州領淅川縣貞觀八年州縣皆省入内鄉五代梁置淅川縣宋屬鄧州金因之元初復并入内鄉明成化八年仍分内鄉置淅川縣屬鄧州本朝屬南陽府新野縣在府東南五十里東西距五十五里南北距九十里東至唐縣界四十里西至鄧州界十五里南至湖北襄陽府襄陽縣界五十里北至南陽縣界四十里東南至襄陽府棗陽縣界四十里西南至襄陽府光化縣界五十里東北至泌陽縣界五十里西北至鎮平縣界四十里漢置新野縣屬南陽郡後漢因之晉初為義陽郡治後改置新野郡宋齊及後魏因之後周郡廢改縣曰棘陽隋開皇初復曰新野大業初仍屬南陽郡唐武德四年於縣置新州旋廢縣屬鄧州乾元後省入穰縣宋金為新野鎮元復置縣屬鄧州明因之本朝屬南陽府内鄉縣在府西一百九十里東西距八十里南北距四百八十里東至鎮平縣界四十里西至淅川縣四十里南至鄧州界三十里北至河南府盧氏縣界四百五十里東南至新野縣界一百九十里西南至浙川縣界一百二十里東北至南陽縣界二百里西北至陜西商州商南縣治五百里春秋楚析邑漢置析縣屬宏農郡後漢改屬南陽郡晉屬順陽郡劉宋省魏置西析陽縣為析陽郡治西魏改内鄉後周改中鄉隋避諱復曰内鄉大業初屬析陽郡唐武德二年改置析州於此貞觀八年州廢縣屬鄧州五代及宋金元明因之本朝屬南陽府裕州在府東北一百二十里東西距一百四十里南北距一百三十里東至舞陽縣界六十里西至魯山縣界八十里南至唐縣界七十里北至葉縣界六十里東南至泌陽縣界一百六十里西南至南陽縣界一百二十里東北至葉縣界六十里西北至南召縣六十里春秋楚方城地秦置陽城縣漢改堵陽縣屬南陽郡後漢因之晉屬南陽國劉宋改為赭陽後魏改置方城縣屬襄城郡西魏為襄邑郡治隋開皇初郡廢縣屬淯州大業初屬清陽郡唐武德初於縣置北灃州貞觀八年改曰魯州九年州廢縣屬唐州五代因之宋慶厯四年省入南陽元豐元年復置仍屬唐州金泰和八年始置􅁉州屬南京路元屬南陽府明洪武初省方城縣入州仍屬南陽府本朝因之舞陽縣在府東北二百七十里東西距六十五里南北距一百五十里東至汝寕府西平縣界四十五里西至葉縣界二十里南至泌陽縣界八十里北至許州郾城縣界七十里東南至汝寕府遂平縣界七十五里西南至裕州界四十里東北至許州襄城縣界七十里西北至葉縣界一十里戰國魏舞陽邑漢置武陽定陵二縣屬潁川郡後漢因之晉屬襄城郡劉宋省魏皇興初改定陵置北舞陽縣永安中置定陵郡隋開皇初郡廢改縣曰北舞大業初屬潁川郡唐初屬道州貞觀􅀄廢開元四年復置舞陽縣屬仙州二十六年改屬許州五代因之宋屬潁昌府金泰和八年改屬裕州元至元三年首入葉縣後復置仍屬裕州明因之本朝屬南陽府葉縣在府北一百三十里東西距七十五里南北距九十里東至舞陽縣界五十里西至汝州魯山縣界二十五里南至􅁉州界六十里北至許州襄城縣界三十里東南至舞陽縣界七十里西南至鄧州界一百二十里東北至許州襄城縣界三十里西北至汝州寶豐縣界十八里春秋楚葉邑漢置葉縣屬南陽郡後漢因之晉屬襄城郡劉宋大明元年省魏復置北齊移襄州來治後周州廢置南襄城郡隋開皇初郡廢大業初縣屬潁川郡唐武徳四年於縣置葉州五年州廢縣屬北灃州貞觀中屬許州開元四年置仙州二十六年州廢縣屬汝州大厯四年復置仙州五年又廢縣仍屬汝州五代及宋因之金泰和八年改屬裕州元明因之本朝屬南陽府形勢西通武關鄖關東南受漢江淮宛亦一都會也史記武關瞰其西桐柏揭其東疏滄浪而爲隍廓方城而爲墉湯谷湧其後淯水盪其胸推淮引湍三方是通張衡南都賦北連中原東通呉會西接巴蜀南控蠻越宋熊剛大義鄧爲襄漢樊籬南陽又爲鄧州樊籬古形勝之國虞允文奏議風俗政尚忠樸有先王遺風史記南陽好商賈召父富以本業漢書被召杜韓黃之化易商賈爲本業轉爭訟爲篤厚玊海俗有武斷之風人勤農桑之務方輿勝覽惇樸尚農俗以殷富舊志城池南陽府城周六里有奇門四池廣一丈明洪武三年建本朝康熙二十三年修乾隆七年重修南陽縣附郭南召縣城周二里門四池廣二丈明成化中建本朝雍正十二年重築乾隆十年修二十八年重修唐縣城周六里門四池廣二丈明洪武三年建正徳十二年重建嘉靖中增築本朝順治九年修康熙二十五年雍正八年乾隆十年十八年二十三年二十八年重修泌陽縣城周五里門四池廣一丈立尺明成化五年建正徳六年崇禎十四年増建本朝順治六年修康熙二十四年五十四年乾隆十八年二十七年重修桐柏縣城周四里門四池廣一丈五尺明成化十三年建嘉靖中重建本朝順治康熙中修乾隆二十七年重修鎮平縣城周五里有奇門四池廣一丈五尺明正徳九年建本朝康􅄉二十七年修乾隆十八年重修鄧州城内城周四里有奇門四池廣一丈五尺外城周十五里有奇門五池廣六丈引刁河水注之明㓋武二年建嘉靖三十二年三十五年復營葺外城萬厯中増濬外城河崇禎七年十年重建本