易生者不拘亾命姦贓於是剽輕劒客之徒過晏等十餘人皆來應募陶責其先過要以後效使各結所厚少年得數百人皆嚴兵待命於是覆按姦宄所發若神以病免吏人思而歌之曰悒然不樂思我劉君何時復來安此下民种拂􅏖陽人桓帝時拜宛令時南陽郡吏好因休沐游戯市里爲百姓所患拂出逢之必下車公謁以愧其心自是莫敢出者政有能名楊彪華陰人光和中爲南陽太守以仁愛爲政既去百姓思之秦頡中平初為南陽太守黃巾張曼成攻殺前郡守頡擊斬之羊續平陽人中平三年為南陽太守時江夏兵趙慈叛續入郡界乃羸服問行採問風謡今長貪潔吏民良猾悉逆知其􅃺郡内驚竦乃發兵擊趙慈斬之餘賊並詣續降賊既平乃班宣政令候民病利百姓勸服府丞常獻生魚續受而懸於庭後又進之續乃出前所懸者以杜其意續妻與子祕俱往郡舎續閉門不内妻自將祕行其資藏惟有布衾敝祗裯鹽麥數斛而己顧敕祕曰吾自奉若此何以資爾母使與母俱歸應余建安中為南陽郡功曹時宛將侯音叛余與太守東里衮迸竄得出音遣騎追逐相及賊便射衮余身當箭被七創謂追賊曰我以身代君因涕泣血淚俱下賊見其義烈釋衮不害賊去之後余亦命絶三國魏田豫雍奴人獻帝時遷南陽太守先時郡人侯音反衆數千人在山中為盜前太守收其黨餘五百餘人奏表皆當死豫開其自新之路破械遣之諸囚皆叩頭願自効即相告語羣賊一朝解散郡内清淨楊浚􅀗嘉人獻帝時為南陽大守宣德教立學校吏民稱之晉杜預杜陵人咸寕中守南陽修召信臣遺蹟引􅓳淯諸水灌田萬餘頃分疆刋石使有定分公私同利衆庶賴之號曰杜父吾彥吳人為順陽内史清身率下威刑嚴肅衆皆畏懼潘尼中牟人為宛令在任寛而不縱恤隱勤政厲公平而遺人事劉璠相人為順陽内史江漢之問翕然歸心魏該東阿人為順陽太守王敦謀逆梁州刺史甘卓不從欲觀該去就試以敦㫖動之該曰我惟忠於國王公舉兵向天子非吾所宜與也及蘇峻叛率衆救臺城病卒丁穆譙國人孝武時為順陽太守㑹符堅遣衆來寇穆戰敗被執至長安稱疾不仕堅又傾國南寇穆與關中人士倡義謀襲長安事泄遇害南北朝齊劉思忌新野太守魏主引兵至新野思忌拒守攻之不克築長圍守之城陷不屈遂遇害魏韋珍杜陵人孝文初以桓誕為東荆州刺史令珍為使與誕招慰蠻左珍至桐柏山窮淮源宣楊恩澤凡所招降七萬餘户置郡縣而還韋孝寛杜陵人普泰中除淅陽郡守時獨􅀌信為新野郡守與孝寛情好款密政術俱美荆部吏人號爲連璧周薛慎汾陰人保定初爲湖州刺史時界雜蠻夷恒以刼掠爲務慎乃集諸豪帥具宣朝㫖殷勤戒諭一年之問翁然向化又蠻俗婚娶之後父母雖在即與别居慎親自誘導示以孝慈有數户蠻别居數年遂還侍養風化大行樂遜猗氏人天和初爲湖州刺史人多蠻左未習儒風遜勸厲生徒加以課試數年之間化冾州境隋李孝貞柏人人開皇中爲􅀩州刺史吏民安之蘇孝慈扶風人開皇中爲析州刺史有惠政柳旦解人開皇中爲析州刺史有能名張奫清河人高祖時爲顯州刺史有能名皇甫無逸京兆萬年人大業中爲淯陽太守治爲天下最唐吕子􅆇河東人武徳初拜鄧州刺史與馬元規並力擊朱粲時粲新衂復張臧嬰城守會霖雨雉堞摧剝或勸其降曰我天子方伯肯降賊乎率麾下數百人赴敵死馬元規安陸人持節下南陽與吕子􅆇擊朱粲爲所圍城䧟不屈死之雷四􅀰鄧州總管武德三年王世充陷鄧州死之陳君賓貞觀初爲鄧州刺史州承喪亂之後百姓流冗君賓加意勞徠不期月皆還業明年四方霜潦獨君賓所治有年倉儲充羨蒲虞二州民就食其境太宗下詔勞之魯炅薊人明皇時為南陽太守㝷遷山南節度使保南陽賊使哥舒翰招下不從田承嗣繼至被圍凡一年晝夜戰人至相食城中一鼠直四百卒無救至至德二載五月乃率衆􅊳圍走襄陽承嗣尾擊旲殊死戰賊引去初賊欲剽亂江湖賴炅適扼其衝故南夏以完趙矜德宗時為舞陽簿吳少誠反矜誓不從叛以縣來歸張嘉瑜貞元十五年吳少誠陷唐州嘉瑜時為守將死之狄兼謨太原人文宗時為鄧州刺史嵗飢發粟賑濟民不流􅑫盧祥會昌人為唐州刺史興復召信臣陂堰甚有勞勣宋蘇易簡桐山人淳化初知鄧州以詩書飭吏事甚得人心趙延進頓邱人淳化中知鄧州飛蝗不入境下詔襃之寇準下邳人至道初知鄧州以寛慈待民民甚德之張知白清池人咸平中知鄧州㑹關右流傭至境知白既發倉廩又募民出粟以濟謝絳富陽人真宗時知鄧州距州百二十里有美陽堰引湍水溉公田水來逺而少利不及民濱堰築新土爲防嵗數壞輒調民増築奸人蓄新茭以時其急往往盜決絳按召信臣六門堰故迹距城三里壅水注鉗廬陂溉田至三萬頃范仲淹呉人仁宗時知鄧州後徙荆南鄧人遮使者請留仲淹亦願留鄧許之趙尚寛河南人嘉祐中知唐州州經五代亂土曠民稀尚寛乃按視圖記得漢召信臣陂渠故迹益發卒復疏三陂一渠溉田萬餘頃又教民自爲支渠轉相浸灌四方之民來者請以􅂽田計口授之又貸民官錢買耕牛比三年榛莽復爲膏腴増户萬餘三司使包拯上其事進秩賜金民圖像以祠王安石蘇軾作新田新渠詩以美之高賦中山人繼趙尚寛知唐州益募兩河流民計口給田使耕作陂堰四十四再滿再留比其去田増闢三萬一千三百餘頃户增萬一千三百八十嵗増税二萬二千二百五十有奇璽書哀諭宣布治狀以勸天下民爲立生祠劉蒙渤海人神宗時知湖陽縣議免役法䝉以爲不便不肯與議退而條上其害即投劾去燕若沖无豐中知南陽縣政治清平修陂堰闢土田比屋殷富歲資豐稔董敦逸永豐人元祐初知穰縣提舉官調民鑿馬渡港云可溉田二百頃敦逸言於朝以為利不􅀘害核實如敦逸言免役夫十六萬全舊田三千六百頃劉汲丹稜人建炎初以直龍圖閣知鄧州金兵來攻汲暮得敢死士四百人禦之力不敵遂死之金光庭羅源人知南陽縣建炎初金人陷南陽不屈死吕由誠開封人監鄧州酒税臨事精敏老吏不能欺㑹營兵􅀼發聚衆閉城守貳逃匿由誠親往招諭賊斂兵聽令以功遷秩李道相州人為武勝軍承宣使武興蠻楊再興連歲寇掠道破其衆擒再興及其二子金舒穆魯兀毅明昌中同知武勝軍節度事别郡有殺人者屢鞫不伏兀毅訊不數語即具服河東北路田多山坂磽瘠大比時定為上賦民力久困朝廷命相地更賦兀毅以三壤法平之民賴其利舒穆魯兀毅舊作石抹兀毅今改王劉從益渾源人大安􅀄知葉縣修學勵俗有古良吏風葉自兵興户減三之一田不毛者萬七千畝有奇其歲入七萬石如故從益請於大司農為減一萬流亾歸者四千餘家被召卒葉人立石頌徳以致哀思烏庫里黒漢天興間權唐州刺史行帥府事鎮防軍有歸宋之謀獨裕州聶都統一軍在州黑漢與之固守宋兵攻益急求救不至城中糧盡人相食黑漢殺愛妾啖士士爭殺其妻子總領趙醜兒開四門納家軍黑漢率兵巷戰軍敗被􅀗不屈死之烏庫里黑漢舊作烏古論黒漢今改正元梁曾中統十六年除南陽知府南陽在宋末為邊鄙桑柘未成而歲賦絲民甚苦之曾請折輸布以便民尚野滿城人至元二十八年南陽縣尹初至官獄訟充斥野裁决無留滯涉旬遂無事喜同河西人為南陽縣達魯噶齊居二歲妖賊起抵南陽南陽無城無兵喜同見賊勢盛與家人訣策勵義兵奮力與賊搏賊退明日復至知無後援戰愈急南陽遂陷喜同􅊳圍身被數創見執被害達魯噶齊舊作達魯花赤今改正莊文昭至正間為南陽府尹勸民耕種興水利置義倉建燕居堂以教郡子弟民既殷富教化大行明段堅蘭州人成化中為南陽知府召州縣學官具告以古人為學之指使轉相􅂆誘創志學書院聚秀民講説古今要義及濂洛諸儒遺書建節義祠祀古先烈女去豪强貪墨必盡而訟獄徭賦務底於平居數年大治郁采山陰人正徳中為裕州同知流賊率衆來攻采與都指揮詹濟在籍御史任賢共堅守斬􅀗甚多城陷被執采罵賊不輟賊碎其輔頰而死濟賢亦不屈被害唐天恩常熟人正德中為葉縣知縣流賊陷城死之岳鍾秀山陽人萬厯中知新野縣部内多豪猾持長吏短長鍾秀課農桑省徭役月朔集父老以孝友勉其子弟久乃化其至誠即豪猾亦自斂比歸士民泣送數百里署中古木多巢烏亦隨車飛噪數日乃還縣人作義烏傳紀之何騰蛟黎平衞人崇禎中授南陽知縣地當羣盜往來騰蛟戰守有備賊來輒挫從巡撫陳必謙破賊安􅆏山斬首四百餘級又討平土寇益知名艾毓初米脂人崇禎中授内鄉知縣毓初生長邊陲習戰事六年冬流賊來犯埋大礟於外城中燃線發之賊死無算遂解去厯官右參議分守南陽與知府顔日愉郤賊有功賊復至偕總兵猛如虎劉光祚堅守食盡援絶自縊死如虎光祚亦死之孫澤盛掖縣人爲鄧州知州崇禎十年張獻忠破其城澤盛與同知薛應齡皆戰死顏日愉上虞人崇禎􅀄除葉縣知縣後以南陽要衝命爲知府大治守具十四年賊猝至登城日愉擊殺之幾盡城􅀗全日愉亦􅀒重傷殞於城上贈大僕卿潘宏山陽人崇禎十三年爲舞陽知縣明年李自成羅汝才攻陷南陽縱兵覆所屬川縣民慮賊屠城請委曲紓禍宏叱曰吾守土吏當與土存亾豈能降賊求活耶賊薄城發礟擊之多斃城中人潛與賊灼降縛宏以獻宏怒罵不屈死子登瀾亦赴井死劉振世豐潤人崇禎中爲鄧州知州十四年流賊陷城振世與吏目李國璽千户余承蔭李錫皆抗節死姚運熙山東人崇禎中爲南陽知縣十四年賊攻陷南陽運熙與主簿門迎恩訓導楊氣開皆死之鍾其碩成縣人崇禎中爲鎮平知縣城陷被執罵賊死龔新南昌人崇禎中爲内鄉知縣流賊陷城不屈死王士昌起亦投戈來附招集流亾民復業者相繼胡養素直隸人順治三年知内鄉縣多善政流寇餘黨攻城死之張光祁歙縣人順治四年知鄧州治尚嚴明而居心寛厚鄧自明季以來僉里長解糧當其役者家輒破光祁中請更制立官解法州人感徳若更生祀名宦任克溥平山衞人順治七年除南陽府推官摘奸伏革積弊官吏肅然奉法許鴻翔榆林人順治十一年知葉縣時拐河土寇作亂鴻翔練鄉兵躬擐甲胄削平之張蓋濮州人順治十五年知舞陽縣值歲凶民飢盗起藎區畫賑濟捕緝有方民無流離而盜以息境内戴之如父母云張三異漢陽人順治間任南陽府同知時烽烟初靖郡邑彫敝三異安輯流移勸開磽壤又創興水利蓄洩有方旱澇無患祀名宦田介京山人康熙三年知唐縣時邑民為錢糧所累多逃竄者介募新墾以抵􅂽糧編現户以補逃丁民困盡除任事三年凡城池公署學校修理咸備祀名宦高以永嘉興人知内鄉縣招民開墾􅂽蕪貸給牛種兼督令樹桑麻棗栗自是田疇彌望時大兵駐襄陽鄰内郷南鄙將吏多出金誘民為奴僕逃則繫縲其家室以永莅任甫三日有二悍卒奪門稱將軍命縛人於市以永械送巡撫正其罪邑人􅀗安祀名宦李之性商邱人任歸徳營把總值吳逆變檄調南陽守禦康􅄉十五年攻魏家寨陣殁詔加優卹廕二子祀名宦前總纂官臣張琴恭纂輯促調官臣王廣蔭恭覆輯校對官臣李孚忠恭校校對官臣章詒燕恭覆校
