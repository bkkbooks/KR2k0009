front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_025-1a}
body:
  text: 江寕府二古蹟丹陽郡故城在上元縣東南三國志建安二十五年孫權以吕範為丹陽太守治建業元和志丹陽郡故城在縣東南五里寰宇記郡城在今長樂橋東一里南臨大路城周一頃晉太康元年所築也黄元之金陵記今武定橋東南有長樂巷是其地陳沂南畿志東城角之内外皆是郡治湖熟故城在上元縣東南漢縣屬丹陽郡武帝封江都易王子胥行為侯邑後漢興平中孫䇿破劉繇別將於海陵轉攻湖熟江乘皆下之尋省晋復置縣義熙九年罷臨沂湖熟脂澤田以賜貧民宋元嘉二十二年浚淮起湖熟廢田千餘頃陳太建十年以湖熟縣屬建興郡隋廢元和志湖熟故縣在上元縣東南七十里建康志今在丹陽鄉去縣五十里淮水北古城猶存白下故城在上元縣西北本名白石陂晉咸和三年陶侃討蘇峻至石頭從部將李根言於白石築壘宋元嘉二十年閱武於白下昇明中蕭道成使李安民鎭白下冶城隍齊書南琅邪郡本冶金城小明元年徙冶白下世祖以白下地帶江山故徙郡治之也又永兀二年崔慧景率軍征夀陽頓白下帝出琅邪城送之舊唐志武徳九年改金陵爲白下移治白下故城建康志今靖安鎭北有白下城故基去府城十八里胡三省通鑑注蓋即今之龍灣懷德故城在上元縣北晉書元帝紀太興三年詔曰先王君臨琅邪四十餘年今珢邪國人在北者近有千户其立爲懷德縣統丹陽郡以爲湯沐邑優復之宋書志南琅邪郡所領無懷德永初郡國有費縣治宫城之北元嘉十五年省費併建康臨沂寰宇記費縣故城在上元縣西北九里南徐州記云即懷德縣􅀉建康北境及置琅邪郡割潮溝爲界陳亡廢建康志實錄云懷德縣舊置於宫城南七里後改爲費縣移於宫城西北三里今在鍾山鄉江乘故城在句容縣北秦縣史記始皇三十七年自㑹稽還過吳從江乘渡即此漢屬丹陽郡後漢興平間孫䇿渡江自秣陵轉攻江乘尋省晉太康元年復立咸康元年改屬南珢邪郡陳書紀太建十年以江乘屬建興郡隋平陳縣廢括地志故城在句容縣北六十里南琅邪故城在句容縣北晉書志元帝以江乘置琅邪郡金陵新志上元縣金陵鄉舊名金城戍為其故址晉太康八年謝安勞師於金城即此咸康元年桓温為琅邪内史鎭江乘之浦洲金城上求割丹陽之江乘立郡去南徐州水二百陸一百去京都水一百六十寰宇記琅邪城在上元縣東北六十里建康志琅邪城在江乘南岸今句容縣取有琅邪鄉即其地按此晉宋之琅邪郡冶也及齊永明六年徙治白下所謂琅邪城在今上元縣西北溧水故城即今凓水縣治元和志縣南至宣州二百二十五里開皇十一年宇文述割溧陽之西丹陽之東置寰宇記在昇州東南一百二十里堂邑故城在六合縣北春秋時楚棠邑後又屬吳左傳襄公十四年楚子囊師於棠以伐吳又伍尚為棠邑大夫史記刺客傳專諸吳棠邑人是也漢高帝六年封陳嬰為堂邑侯國後置縣晉時升為郡又改置尉氏而縣廢建康舊城在上元縣南秦漢秣陵縣地三國吳志建安十六年孫權徙治秣陵明年改秣陵曰建業因置縣二十五年權都武昌以吕範領丹陽太守冶建業黃龍元年權遷都建業晉書志武帝平吳以為秣陵太康三年分秣陵北為建業又改業為鄴愍帝立避諱改建鄴為建康元帝紀永嘉初鎭建鄴建武元年立宋廟社稷於建康元和志建康舊城在上元縣南三里寰宇記建康縣初置在宣陽門内晉咸和三年燬移入苑城六年又徙岀宣陽門外御街西唐貞觀七年移江寕縣還舊郭上元二年以童謠改為上元光啓三年徙於鳳臺山西南一里今移在司㑹府輿地紀勝建康舊城在北去秦淮五里楊溥時徐温改築稍遷近南夾淮帶江以盡地利建康志上元縣宋初遷司㑹府今府治之東建炎初徙今治在城東隅建鄴故城在吳冶城東景定元年太守馬光祖繞城浚濠明初建為京師益廓而大之舊志南朝故都城周二十里有門十二正南曰宣陽門晉王敦將沈充錢鳳渡淮突犯宣陽門梁太清二年侯景渡朱雀航入宣陽門是也宣陽之東曰平昌門又東曰開陽門正東曰東陽門東陽之南曰清明門北曰建春門後改曰建陽門齊明帝宋王敬則起兵以奉南康侯子恪為名子恪從吳郡自歸達建陽門是也正西曰西明門一名白門宋元嘉二年徐羨之承詔至西明門外梁敬帝時徐嗣徽逼建康陳霸先出西明門大敗之是也西明之南曰廣陽門西明之北曰閶闔門北面之東曰廣莫門晉咸康初石虎逰騎至厯陽帝觀兵於廣莫門以備之齊崔慧景之亂自鍾山西巖而下入廣莫門是也西曰大夏門又自晉以來於秦淮南北雨岸設籬門五十六所謂之郊門亦曰籬門齊永元初始安王遙光舉兵東府城詔左興盛屯東籬門明年崔慧景作亂復遣左興盛拒之於北籬門又肅衍東下至新林分遣陳伯之等據西籬門是也隋平陳盡廢五代徐知誥復廣金陵城為八門建康志府城八門由尊賢坊東岀曰東門由鎭淮南岀曰南門由武衞橋西出曰西門由清化市而北曰北門内武定橋泝秦淮而東曰上水門由飲虹橋沿秦淮而西出折柳亭前曰下水門由斗門橋西出曰龍光門由崇道橋西岀曰柵寨門按晉自元帝渡江以後諸城門皆用洛陽舊名建康實錄都城三重外門六宣陽廣陽津陽清明建陽西明後増十二門李昉宫苑記南四門最西曰陵陽後改廣陽正門曰宣陽稍東曰開陽後改津陽最東曰清明東面二門南曰東陽北曰建春後改建陽西面二門南曰閭闔北曰西明北四門西曰大夏中曰元武齊時改曰宣平稍東曰廣莫陳改北捷最東曰延熹與諸書所載門名互異今並存之臨沂舊城在上元縣東北漢縣在今山東沂州府東晉僑置於此宋書志咸康元年分江乘縣地立屬南琅邪郡又永初郡國有陽都費即邱三縣皆割臨沂及建康為之元嘉八年省即邱併陽都大明五年又省陽都併臨沂陳書紀太建十年以臨沂縣屬建興郡隋初廢寰宇記臨沂城在縣東北三十里臨沂山西北臨大江建康志實錄云縣城在江寕縣北四十里獨石山西臨大江今上元縣長寕鄉攝山之西白常邨蓋即其地距縣三十八里秣陵舊城在江寕縣東南秦置漢武帝元朔元年封江都易王子緾為侯邑元鼎四年為縣屬丹陽郡後漢建安中改置建業而故縣廢晉太康三年分淮水南復置秣陵縣宋書志秣陵縣本治去京邑六十里今故治邨是也義熙九年移治京邑在鬬場隋書志平陳省秣陵縣入江寕括地志秣陵舊城在江寕縣東南五里元和志在縣東南四里寰宇記舊城在縣南五十五里秣陵橋東北山謙之建康實錄秣陵城在故臺城南八里建康志秣陵縣更名凡六秦改金陵為秣陵在舊江寕縣東南六十里秣陵橋東北晉太康初復以建業為秣陵即今上元縣三年分淮水南為秣陵義熙中移於鬬場柏社在江寕縣東南廢長樂橋古丹陽郡是也元熙初又移治揚州參軍廨在宫城南八里一百步小長干巷内梁末齊兵軍於秣陵故治跨淮立柵當是其地景德二年置秣陵鎭在今江寕縣東南五十里江寕舊城在江寕縣西南六十里宋書志晉太康初分秣陵立臨江縣二年更名江寕寰宇記江寕縣隋開皇十年移於冶城唐武德九年移白下貞觀七年移還冶城九年復曰江寕後改曰上元天祐十四年楊吳析上元當􅂗復置江寕縣與上元縣皆在州郭舊城在縣南七十里王存九域志縣有江寕鎭即舊縣也建康志南唐復置縣在州城西偏又西即吳冶城宋初移郭下在城西北距行宫三百步句容舊城即今句容縣冶漢置武帝元光六年封長沙定王子黨為侯邑章懷太子曰縣近句曲山山有所容故名元和志縣東北去潤州一百里晉元帝興於江左為畿内第二品縣九域志在江寕府東九十里縣志有南城在縣南五里又北城在縣東北八里皆北朝時築廢魏郡在上元縣界晉書志咸康四年僑置魏郡廣川高陽堂邑等諸郡及所統縣並􅀉居京邑義熙元年劉􅁉以弟道憐領堂邑太守戍石頭十二年以高陽内史劉鍾領石頭戌事屯冶亭宋初道憐子義欣厯青州刺史魏郡太守戍石頭顧野王輿地志晉僑立魏郡領肥鄉元城二縣後省元城又廣川郡領廣川一縣宋􅀄省為縣屬魏郡又高陽郡領北新城博陸二縣堂邑郡領堂邑一縣後省堂邑併高陽又省高陽併魏郡元嘉二十年以其民併建康又義熙初劉􅁉弟道規為并州刺史義昌太守四年道憐代諸葛長民為并州刺史義昌太守戌石頭地志晉咸和後僑立青并等四州後以青并合兖建興廢郡在江寕縣東南梁書天監四年置建興苑於秣陵建興里陳書太建十年罷義州及琅邪彭城二郡立建興郡領建安同夏烏山江乘臨沂湖熟六縣輿地紀勝建興苑在秦淮南岸建康志南苑在瓦官寺東北梁改名建興苑按隋志不言建興郡所以廢當時平陳後省入丹陽郡也臨滁廢郡在江浦縣西北梁末置屬譙州尋入東魏魏書志郡治􅁑城陳廢輿地紀勝古臨滁郡在清流縣東南五十五里之葛城俗呼爲羅城明初割屬今縣舊志有東葛城在江浦縣西北三十五里西􅁑城在縣西北四十里廢齊郡在六合縣東南蕭齊置齊書志建元初徙齊郡治􅀲步仍置臨淄縣爲治梁廢陳太建五年伐北齊克秦郡􅀲步城即齊郡城也舊志􅀲步城在􅀲步山側瓦梁廢郡在六合縣西陳書太建五年北伐石梁城降隋書志六合有後齊置瓦梁郡陳廢舊志南唐時於滁水上立東西瓦梁城即今之瓦梁壘在縣西五十五里西北距滁州八十里東西二城餘址尚存輿地紀勝云有吳王城在縣瓦梁高岡之上有四壁即孫權分兵屯守之城也同夏廢縣在上元縣東梁書武帝紀宋大明八年生於秣陵之同夏里三橋宅陳書大建十年以同夏縣屬建興郡隋平陳省入江寕寰宇記輿地志云梁大同三年分建康之同夏里置建康志圖經云縣東十五里同夏浦舊有城今上元縣長樂鄉是其地通鑑注梁武以三橋舊宅爲光宅寺在同夏里懷德廢縣在江浦縣西劉宋置宋書志秦郡懷德令孝武大明五年立又以厯陽之烏江并此爲二悓立臨江郡前廢帝永光元年省臨江郡懷德即住郡治府志今懷德鄉在縣西按此係宋所置之懷德屬秦郡蕭齊屬臨江郡東魏改屬臨滁郡後廢與東晉大興三年所置懷德縣在今上元縣北者不同方山廢縣在六合縣東隋書志開皇四年改尉氏曰六合省方山縣入焉舊志蓋齊周時所置在六合縣方山下安業舊縣在江寕縣南新唐書志武德三年析江寕縣置丹陽安業二縣八年省安業建康志安業析江寕溧水置又小丹陽路在縣南與當塗縣接界舊志丹陽故縣在縣南八十里又西南至當塗八十里舊紫禁城在上元縣城内東偏明太祖建當鍾山之陽宋元東城外二里燕雀湖之地其西安門以北宫牆即都城故址東岀青谿橋處也本朝聖祖仁皇帝南巡年御製金陵舊紫禁城懷古詩乾隆四十五高宗純皇帝南巡御製江寕舊宫城歌故宫城在上元縣城内亦曰皇城五代史晉天福二年吳徐知誥建號以子城為宫城陸游南唐書先主即金陵府為宫惟加鴟尾欄檻而已入宋仍為府治紹興二年命即府舊治修為行宫八年始設行宫留守輿地紀勝在天津橋北即南唐宫也建康志皇城在府城中周四里二百八十步紹興二年即舊子城基增築有東南西三門舊志宋行宫在京城内大中街元至元十五年拆故宫材木輸之大都遺址僅存二十三年改為御史臺治至正十六年明太祖入金陵建軍府於此尋為土府又建為皇宫後又改築皇城於東偏稱此為舊内東府城在上元縣東晉􅂤文為王時舊第後為㑹稽王道子宅太元中道子領揚州以為治所使嬖人趙牙築山穿池列樹竹木帝嘗幸之義熙中劉􅁉自石項還鎭