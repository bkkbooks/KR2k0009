食意聽廣歸家殯殮丞掾皆爭意曰罪自我歸義不累下遂遣之廣殮母訖果還入獄意密以狀聞竟得減死論三國吳黃蓋零陵人為丹陽都尉抑强扶弱山越懷附晉周浚汝南安城人揚州刺史吳平明年移鎭秣陵浚賓禮故老捜求俊乂甚有威德吳人悅服范廣南陽順陽人元帝承制以為堂邑令丞劉榮坐事當死郡劾付縣榮即縣人家有老母至節廣輒聽還榮亦如期而反後大旱廣散私􅂖振譏至數千斛遠近流寓歸投之户口十倍顧和吳郡人王導為揚州辟從事既而導遣八部從事之部和為下傳及還導問和卿何所聞荅曰明公作輔縱使漏網吞舟何緣採聽風聞以察察為政導咨嗟稱善太寕初導復請為別駕所厯有賢聲劉超琅邪臨沂人元帝時補句容令推誠於物為百姓所懷常年賦稅主者常自四岀詰評百姓家貲至超作大函村別付之使各自書家產投函中訖送還縣百姓依實投上課輸所入有踰常年温嶠太原人為丹陽尹奏王敦逆謀請先為之備及王含錢鳯奄至都下嶠燒朱雀桁以挫其鋒自率衆與賊夾水戰擊王含敗之復追錢鳳於江寕事平封建寕縣開國公禇翜河南陽翟人成帝時為丹陽尹時京邑焚蕩人物彫殘翜收集散亡甚有善政庾龢鄢陵人升平中尹丹陽表除重役六十餘事劉惔沛國相人累遷丹陽尹為政凊整時百姓頗有訟官長者惔歎曰居下訕上此弊道也輒寢不問南北朝宋劉義慶宋宗室元嘉中為丹陽尹有百姓妻趙殺子婦遇赦應徙送避孫仇義慶以為骨肉相殘宜求之法外禮有過失之宥律無讎祖之文宜共天同域無虧孝道劉秀之東莞莒人元嘉中再除建康令政甚有聲遷丹陽令孫謙莒人為句容令清愼强記民頌神明顧憲之吳郡人元徽中為建康令於欋要請託長吏貪殘據法􅀡繩無所阿縱性清儉强力為政甚得人和都下飲酒者醇旨輒號為顧建康齊劉懷慰平原人高帝置齊郡於􅀲步以懷慰為太守至郡修城郭安集居人墾廢田二百頃決沈湖灌溉不受禮謁人有送新米者懷慰出所食麥飯示之曰食有餘幸不煩此著廉吏論以達其意王摛東海郯人為秣陵令清􅀡請謁不行羽林隊主潘敞有寵二宫勢傾人主婦弟犯法敞為之請摛投書於地更鞭四十敞怒譖之明日見代梁江革考城人武帝時遷建康令為政明肅豪强燀之王志琅邪臨沂人天監初為丹陽尹政務清靜有寡婦無子姑亡舉債以殮葬既而無以還之志愍其義以俸錢償焉年饑每旦為粥於郡門以給百姓衆悉稱惠孔休源山陰人普通中監揚州事剖斷如流旁無私謁每車駕巡幸以軍國事委之陳司馬申温縣人太建九年除秣陵令以清能見紀有白雀巢縣庭唐楊延嘉麟德中為句容令因梁故隄置絳巖湖以溉田王昕大厯中為句容令復置絳巖湖周百里為塘立二十門以節旱暵開田萬頃白季康太原人令溧水温恭誠信貞白威嚴邑人祀之宋薛映蜀人眞宗時知昇州言官有牛賦民出租牛死租不得蠲帝覽章矍然曰此豈朝廷所知耶因令諸州條奏悉蠲之馬亮合肥人知昇州屬嵗旱民饑湖湘漕米數十舟適至亮移文守將發以振貧民因奏瀕江諸郡皆大歉而吏不之救願罷官糴令民轉粟相賙張詠鄄城人眞宗時知昇州州民以詠秩滿借留就轉工部尚書令再任時江左旱歉命充并宣等十州安撫使薛顏萬泉人知江寕府邏者晝劫人反執平人以告顏視其色動曰若眞盗也械之果引伏王隨河南人知江寕府嵗大饑轉運使移府發常平倉米計口日給一升隨置不聽曰民所以饑者由兼并閉糴以邀高價也乃大出官粟平其價李宥青州人知江寕府民有告人殺其子者人自誣服宥疑召問卒伸其枉楊告緜竹人通判江寕州盗殺商人鑿舟沈屍江中有被誣告者笞服獄具告疑其無狀後數日果得眞盜包拯合肥人仁宗時知江寕府程顥河南人爲上元主簿茅山有池產龍如蜥蜴而五色民俗嚴奉顥捕而脯之元絳錢塘人調江寕推官攝上元令置豪惡王豹子於法甲與乙被酒相毆擊甲歸臥夜爲盗斷足妻稱乙告里長執乙詣縣而甲已死絳敕其妻曰歸治而夫䘮乙已伏矣陰使信謹吏迹其後望一僧迎笑切切私語絳命取僧繫廡下詰妻姦狀果吐實劉湜彭城人仁宗時知江寕府奏運蘇州米五十萬斛以貸饑民蘇頌丹陽人知江寕縣詳定户籍剗剔夙蠧􅂤而易行民有忿爭頌喻以鄉黨宜相親善民往往謝去王琪華陽人仁宗時知江寕府先府多火災戓託以鬼神人不敢救琪召令廂邏具爲作賞捕之法未幾得姦人誅之火患遂息李迪濮州人仁宗時知江寕府李若谷徐州人仁宗時知江寕府卒挽舟過境寒瘠甚者留養視之須春温遣去民匄於道者以分隸諸僧寺助給舂爨吳中復永興人仁宗時知江寕府郵兵告巡轄官苛刻縶而鞭之獄具法不至死中復以便宜戮首惡流其餘入奏爲令陸佃山陰人哲宗時知江寕府句容人盗嫂害其兄別誣三人同謀既皆訊服一囚父以寃訴通判以下皆曰彼怖死耳獄已成不可變佃爲閱實三人皆得生沈錫眞州人徽宗時知江寕府張懷素誅朝廷疑其黨有脱者江准閒往往以誣害興獄錫至郡有告者按之則妄也具䟽於朝由是他郡繫者皆得釋蔣靜宜興人知江寕府茅山道士劉混康以技進賜號先生其徒倚爲姦利奪民葦場强市廬舍詞訟至府吏觀望而不敢治靜悉抵於法李彌遜吳縣人靖康中建康府牙校周德叛殺官吏嬰城自守彌遜以江東判運領郡事單騎扣賊以蠟書射城中招降賊通款開門迎之彌遜諭以禍福勉使勤王時李綱行次建康共謀誅首惡五十人撫其餘黨一郡帖然葉義問壽昌人知江寕府召秦檜所親役同僚不可義問曰釋是則何以服他人卒役之權􅀖彥河閒人建炎中知建康府劇盜張琪擾徽州􅀖彥遣禆將平之吕祉建陽人紹興三年除􅀡龍圖閣知建康府祉到官與通判府事吳若安撫司凖備差遣陳充共議作東南防守利便三卷上之張燾德興人紹興二十五年知建康府民積􅀊􅀒錢帛鉅萬悉為奏免三十一年復知建康府時金人窺江建業民驚徙過半聞燾至人情始安趙鼎聞喜人高宗時知建康周必大廬陵人紹興中教授建康張浚緜竹人紹興三十一年判建康府兼行宫留守浚至建康即牒通判劉子昂辦行宫儀物請乘輿亟臨幸明年車駕幸建康迎拜道左浚起廢復用風采隱然軍民皆􅀝以爲重車駕將還臨安勞浚曰卿在此朕無北顧憂矣陳俊卿興化人嘗權建康府事淳熙中除特進判建康府俊卿去建康十五年父老喜其再來爲政寬􅂤罷無名之賦洪遵鄱陽人孝宗時知建康府江東安撫使兼㣔宫留守至則揭榜民苗米惟輸正不輸耗聽民自持斛槩庾人不能輕重其乎有營卒妄言搖衆斬於市三軍無敢譁李植臨淮人乾道元年知建康軍府兼本路安撫使上書言江防十䇿疏上帝嘉其言辛棄疾厯城人乾道中通判建康劉珙崇安人淳熙二年知建康府江東安撫使行宫留守㑹水且旱首奏蠲夏稅錢六十萬緡秋苗米十六萬六千斛禁止上流稅米遏糴得商人米三百萬斛貸諸司錢三萬遣官糴米上江得十四萬九千斛籍主客户高下給米有差起是年九月盡明年四月數十萬人無一人捐瘠流徙者范成大吳縣人帥金陵㑹􅀊旱奏移軍儲米二十萬振饑民減租米五萬水賊徐五竊發捕戮之黃榦閩縣人倅建康江淮豪傑皆歸心焉葉適永嘉人慶元時知建康府兼沿江制置使請節制江北諸州創三大堡緩急應援首尾聯絡流民漸歸黃度新昌人寕宗時知建康府兼江淮制置使至金陵罷科糴輸送之􅅰活饑民百萬除見稅二十餘萬擊降盜卞整斬盜胡海首以獻招歸業者九萬家徐誼温州人寕宗時知建康府兼江淮制置使初金攻廬楚不下留兵綴濠州以待和時時鈔掠誼晝夜撫循益嚴備禦史彌鞏嘉定中知溧水縣嚴庠序之教吳從龍官建康府統制紹定兵難爲先鋒援不至被擒使至泰州城下誘降不屈死之董槐定遠人淳祐中爲江東安撫使兼知建康府軍玫弛弗治乃爲賞三等以教射春秋教肄士卒坐作進退擊刺之技嵗餘盡爲精兵馬光祖金華人端平初知建康府兼和州無爲安慶三郡屯田使始至官即以常例公用器皿錢二十萬緡支犒軍民減租稅養鰥寡招兵置砦給錢助諸軍婚嫁屬縣嵗折收絲綿絹帛倚閣除免以數萬計興學校禮賢才辟召僚屬皆極一時之選拜端明殿學士再知建康士女相慶蠲除前政逋􅀒錢百餘萬緡魚利稅課悉罷減予民修建明道南軒書院及上元縣學公田法行光祖移書賈似道言公田法非便乞不以及江東必欲行之罷光祖乃可姚希得潼川人理宗時為沿江制置使知建康府按行江上慰勞士卒衆皆歡悦溧陽饑發廩勸分全活者衆創寕江軍自建康太平至池州列營置屋二萬餘閒屯戊七千餘人杜杲邵武人淳祐中擢沿江制置使知建康府節制安慶和無為三郡杲罷楊林堡以其費備厯陽淮民寓沙上者護以師置貢士莊蠲民租二萬八千石謝枋得弋陽人寶祐中舉進士除撫州司户參軍即棄去五年彗星出東方枋得考試建康摘賈似道政事為问目言兵必至國必亡漕使陸景思銜之上其槀於似道謫居興􅀦軍德祐元年元兵屯駐建康杤得以江東提刑江西招諭使知信州明年吕師夔兵下安仁進攻信州不守宋亡杤得變姓名賣卜建陽市中元至元閒程文海留夢炎屢薦不行魏天祐强之而北不食死胡巖起瀛國公時與貝寶月為銅關將攻溧水死贈寶武翼郎巖起朝奉即葛邲吳興人為上元丞時金兵至江上元當敵衝調度百出邲不擾而辦留守張浚王綸皆器重之趙壘之為上元丞金人過江帥鄉兵迎敵死之贈奉議郎汪立信六安人元兵大舉以立信為沿江制置使俾就建康府庫募兵以援江上渚郡即以妻子託愛將金明既至則建康守兵悉潰立信知事不可成乃置酒召賓佐與訣手為表起居三宫與從子書屬以家事夜分扼吭而卒巴延入建康金明以其家人免巴延求其家厚恤之曰忠臣之家也巴延舊作伯顔今改正程洙休寕人淳祐時為上元主簿撫字一本經術及代民遮㽞不得發元兵入建康沐浴自經死元張珪定興人至元十七年珪年十六攝管軍萬户十七拜招勇文將軍鎮建康世祖親撫之奏曰臣年幼軍事重聶禎者從臣父祖久列行陣幸以副臣帝歎曰求老成自副常兒不知出此厚賜而遣之十九年太平宣徽羣盜起行省檄珪討之悉平岳天禎冠氏人屢遷建康路總管首定救荒之政民立碑以記遺愛焉明顧佐太康人永樂時為應天尹公廉威重一時勲貴豪猾皆為斂手時方之包拯云檀凱池州人宣德時為應天府治中大者聲績民千餘人乞即用為府丞朝議不許及九載滿當遷巡撫周忱再申前請乃擢為丞凱練習民事所張弛咸當人心故人愛之不忘龎嵩南海人厯官應天府治中疏江寕葛仙永豐二郷之水立惠民莊招復流移集諸生講習新泉書院嵗時單騎行縣以壺漿自隨一蔬片楮不以煩民王弻黃巖人成化中知栗水縣巨猾席勢武斷捕獲論死境有湖可田督民築隄遂為良田寇天敘榆次人正德時為應天府丞時武宗駐蹕南京江彬等求索無厭天敘攝府事力抑之與尚書喬宇募拳勇屢與禁軍相􅅮使不得逞駕駐九月民不至大困者天敘之力為多程㸅南城人嘉靖中知上元縣民居近孝陵者以誤殺苑中獸當死㸅爭之法官得末成時霍韜官南京尚書有惠政民為歌云禮部霍韜天有日上元程㸅月無雲考滿入都攜兩蒼頭跨驢而行民醵金追贈笑而卻之海瑞瓊山人穆宗時巡撫應天墨者多自免去中人監織造者為減輿從瑞素疾大户兼并力摧豪强撫窮弱豪有力者至竄他鄉徐九思貴谿人嘉靖中知句容縣訟者至必命與親識議和和之不得則以理諭遣然於豪猾輩不盡法不止生平不嗜肉惟啖菜嘗繪一菜於堂及九載遷去父老置酒請敎九思曰惟勤儉忍三字可乆耳士言於上民因鏤所繪菜而曰此徐公三字經書三也徐必達秀水人萬厯中知溧水縣石􅍫湖水數為患必達築隄萬餘文植柳固之邑人當永樂閒坐尚書齊泰姻戚戍開平者三十餘家必籍為令四達奏除其于孫戍年民懷德祠祀焉董岐鳳石屏人萬厯中知高淳縣時大水田圩盡沒乃力請於京尹許孚遠得疏請帑金三千兩修築又買當塗湖灘作遮浪埂以捍南蕩圩田萬七千餘畝至今賴之本朝李正茂順天人順治二年知江寕府時百務草創加意綏理民以安息趙廷臣遼東人順治初授江寕江防同知兼理運務盡心職掌酌定運值請著為令軍衞無擾尤加意生儒優其家屬不以僉運嘗攝知府事時當編審更以精覈著稱郭士賢遼東人順治六年為上元令嘗請上官捐贖鍰以充倉糧蠲民之困於嵗者邑人德之崔掄奇夏邑人順治中為高淳令邑舊困虚糧賠累掄奇至請於巡按題復永折淳人大悅閔派魯祥符人順治中知溧水縣邑民素苦賦役不均派魯至計糧分里刋為成書曰均里平徭冊民甚便之又力請題折濱湖􅀍水虚糧之田溧自是無賠累之患饒應元蘄水人順治中為溧水令性長厚而有執持有妖婦曹氏以邪敎惑人應元發其姦戮之邑户役不均應元定三十八户為一排兩户為一丁自是輕重不畸邑人稱便劉澤嗣吳橋人康熙中知高淳縣臨政嚴肅萑苻屏迹于成龍漢軍鑲紅旗人康熙中知江寕府興利除弊知無不為時徐州有姦民某走京師以左道惑衆誣人上告事下制府檄江寕鎮江兩守㑹鞫成龍力白寃狀制府疑故縱詰責甚厲成龍持之愈力姦民卒坐誣瀕江蘆洲多為豪强隱佔成龍以有課而無洲者為坍江立予豁除有洲而無課者為欺隱升課而薄其罰人皆服其平允總纂官臣王廣䕃恭纂輯前提調官臣張日章恭覆輯校對官臣王允灌恭校校對官臣宗稷辰恭覆校大清一統志江寕府四人物漢李南句容人少篤學明於風角永元中太守馬稜坐事徵詣廷尉吏民不安南特進謁賀稜曰旦有善風明日中時應有喜聞明日果有驛使齎詔書原停稜事後舉有道辟公府不行終於家晉陶璜秣陵人仕敕璜歸順吳累建功績孫晧既降晉璜流涕數日遣使送印綬詣洛陽璜弟濬濬弟抗濬子湮皆有名薛兼丹陽人清介有才少與紀瞻閔鴻顧榮賀循齊名號五雋初入洛張華見而奇之曰皆南金也紀瞻秣陵令父人祖亮吳尚書陟光祿大夫膽少以方直知名元帝引為軍諮祭酒以討周馥華軼功封都鄉侯又論討陳敏功封臨湘縣侯尋轉尚書上疏忠亮雅正諫諍多所匡益瞻才兼文武朝廷稱其俄轉領軍將軍王敦之逆帝使謂瞻曰卿雖病但為朕卧䕶六軍所益多矣乃賜布千匹賊平自表還家詔以為驃􅀐將軍遣使就拜止家為府卒贈開府儀同三司諡曰穆王鑒堂邑人少以文筆著稱初為元帝琅邪􅀦侍郎中興建拜駙馬都弟濤及弟子尉文集傳於世戭並有才筆南北朝齊陶季直秣陵人五􅀊喪母哀若成人及長好學淡於榮利徵召不起時人號曰聘君宋末為望蔡令以疾免齊時厯東莞北海建安太守為政清靜百姓便之梁臺建辭疾還里卒季直素清苦絶倫及死無以殯殮聞者傷其志事云梁陶子鏘秣陵人兄尚宋末為幸臣所怨􅀍繫子鏘公私緣訴流血稽顙行路嗟傷兄得釋初子鏘母嗜蓴母殁後以供奠梁武師至此年冬營蓴不得慟絶久乃常蘇遂長斷蓴味陶宏景秣陵人幼得葛洪神仙傳便有養生之志讀書萬餘卷齊高帝引為諸王侍讀雖在朱門閉影不交外物永明十年上表辭祿乃遍厯名山尋訪仙藥特愛松風每聞其響欣然為凶征討大樂性好著述尚奇異武帝即位每有吉事無不諮請時人謂之山中宰相子籍厯餘杭錢塘令工詩紀少瑜秣陵人本姓吳養於紀氏因而命族早􅀌有志節才藻新拔嘗夢陸倕以一束青鏤管筆授之其文因此遒進年十九始遊太學備探六經博士東海鮑皦雅相欽悦大同七年引為東宫學士吏部尚書到漑嘗曰此人有大才將拔之後除武陵王記室參軍北齊蕭放建業人梁武帝弟南平王偉之孫隨父祗至鄴父卒居䘮以孝聞所居廬室前有二慈烏來集各據一樹為巢自午以前馴庭飲啄午後更不下樹每臨時舒翅悲鳴時以為至孝之感陳吳明徹秦郡人幼􅀌性至孝感祖父墳塋未修家貧無以取給乃勤力耕種時天旱苗枯明徹每至田中號哭訴天田苗忽更生秋而大穫足充葬用初武帝鎮京口明徹詣之厯有軍功及武帝受禪授安南將軍太建三年議北征明徹決䇿詔加侍中總衆軍進克仁州封南平郡公逼夀陽擒王琳等詔以為車騎大將軍進攻彭城又大破齊軍進位司空都督南兗州刺史隋耿詢丹陽人從高智受天文算術創意造渾天儀又作為馬上刻漏世稱其妙煬帝即位進敧器以詢守太史丞宇文化及弑逆詢欲去之為所殺唐王昌齡江寕人官龍標尉工詩緒密而理精時號爲王龍標云劉鄴句容人父三復仕至刑部侍郎宏文館學士鄴少倚李德裕厯官中書舍人其􅁈世高其遷承㫖德􅁉以朋黨抱誣死鄴申直義以禮部侍郎同中書門下平章事後爲鳯翔節度使黄巢方熾帝西狩追乘輿不及賊捕急不屈見殺許叔牙句容人䆳於詩禮貞觀間拜宏文館直學士獻詩纂義十篇子子儒高宗時議北郊禮以博學名家宋孫繼鄴金陵人祖謙事李昇戰死父承睿憤將兵者不如期致其父殁刺殺之太宗授繼鄴三班奉職宜州陳進反曹利用辟以自隨爲前驅破賊於大烏嶺晁迥薦爲閤門祗候上禦戎䇿數十事秦傳序江寕人淳化中充䕫峡巡檢使李順之亂傳序督士卒晝夜拒戰嬰城既久危蹙日甚出囊槖服玩盡市酒肉以犒士卒衆皆感泣力戰傳序度力不能支乃爲蠟書遣人間道上言誓不降賊城陷赴火死於忠子死死子奭溯峽求父屍溺死人以爲父於孝奏至太宗嗟惻久之錄其次子煦爲殿直以錢十萬賜其家洪湛上元人舉進士有聲咸平中試舍人院復直史館使荆湖密議優禮備至既成帝業累授翰林學士禮部侍郎皆不受帝終始敬信稱為先生而不名學者稱為靜誠先生端復初溧永人洪武初授磨勘司令案牘填委勾稽無遺性嚴峭不可干以私超遷刑部尚書用法平元出為湖廣參政令民來歸者便其賦一年流亡畢歸子孝文孝思先後使朝鮮並著清節朝鮮人為立雙清館孫炎句容人能詩負經濟太祖下集慶召見與語大悦命為中書者掾預計謀從征浙東授處州總制禮致劉基章溢葉琛送至京師苗兵亂執之炎大罵賊怒拔刀解衣炎曰此紫綺裘主上所賜吾當服以死遂見害贈丹陽縣男周琬江寕人洪武中父為滁州知州坐罪論死琬年十六詣闕請代帝疑為人所教命斬之琬顏色不變帝異之命宥父謫戍邊琬復請就刑以贖父戍帝怒命縳赴市曹顏色甚喜帝知其誠赦之題御屏曰孝子周琬尋授兵科給事中齊泰溧水人洪武進士厯兵部侍郎太祖器之臨崩受顧命輔皇太孫太孫立進兵部尚書建削奪諸王之策及燕王人京泰被執不屈死魏澤高淳人洪武中官刑部尚書建文時謫寕海縣丞文皇誅方孝孺族黨孝孺幼子德宗甫九􅀊澤百計匿之得免丁璿上元人永樂進士由御史督大同宣府軍儲麓川蠻叛乘傳往視言用兵便宜遂命撫雲南督餽餉麓川平召為左副都御史所至有政聲楊洪六合人嗣祖職為漢中百户調開平勇敢善戰撫士有恩嘗從成祖北征至鄂諾河􅀗人馬還帝曰將才也宣德正統間以敢戰知名厯左都督充總兵官鎮宣府迤北亦憚之稱為楊王景帝監國封昌平伯額森逼京師率所部入衞追至紫荆關進侯還鎮宣府卒贈潁國公諡武襄洪久居宣府御軍嚴肅士馬精强為一時冠從子能屢樹邊功封武强伯鄂諾舊作幹難額森舊作也先俱改正揚信洪從子幼從洪擊賊興州賊將躍馬出陣信直前搏戰擒之以是知名景泰中為副總兵鎮宣府天順初擊賊有功封彰武伯卒贈侯諡武毅洪父子兄弟皆佩將印一門三侯伯威名震邊陲巫凱句容人由百户積功至都指揮同知永樂中從平交阯屢遷都督僉事宣宗立以總兵官鎮遼東凱饒智略御下嚴而有恩在鎮三十餘年威惠並行前後守遼者皆莫及張益江寕人永樂進士選庶吉士改中書舍人預修太宗仁宗宣宗實錄􅀶學强記詩文操筆立就累遷侍讀學士正統十四年入直文淵閣扈駕北征歿於土木贈翰林學士諡文僖龎景華上元人九􅀊喪父極哀毁奉母訓力學母疾刲股嘗糞鄰火將及抱母號呼火遂息及卒廬於墓盗聞哭聲而去天順中旌表王貞慶上元人駙馬都尉永春侯子貞慶以貴胄世族折節好士有詩名以文雅著景泰閒十才子貞慶其一也時稱金粟公子王徽上元人天順進士除南京給事中憲宗初請開言路敬大臣乞罷兵部尚書馬昂禁中官無預政事帝頗納之其冬皇后廢極陳中官牛玉交搆罪備論宦寺干政之禍帝大怒謫普安州判官終陜西參議盧雍江寕人由進士厯福建參議父喪廬墓產芝十三本成化中旌表戴睿句容人同居七世成化中旌表張瑄江浦人正統進士厯刑部郎中有能聲景泰時賜敕為吉安知府擢廣西布政使皆有善政成化中以右副都御史巡撫福建時滅賊黨降敕􅅄勞改撫河南亦有聲終南京刑部尚書倪岳上元人天順進士改庶吉士授編修宏治中累官尚書有詔召國師領占竹於四川岳極言不可事竞寢每遇修省輒陳軍國弊政剔抉無疑改南京吏兵二部還為吏部尚書岳有文武才善斷大事既秉銓請託不得行尤嚴邪正之辨天下想望其風采踰年卒贈少保諡文毅岳父謙官南京禮部尚書諡文僖明世父子官翰林俱諡文自岳始莊㫤江浦人成化進士改庶吉士授檢討興編修章懋黄仲昭疏諌元夕張燈忤㫖廷杖先羅倫亦以言事􅀍黜時稱翰林四諫改南京行人司副以􅁨去卜居定山三十年安貧樂道學者稱定山先生宏治中奉詔起終南京吏部郎中㫤持身慕伊川接人慕明道生平不尚著述有自得輒見之於詩天啟中追諡文節邵清江寕人宏治中由鄉貢教諭擢御史正德初巡長蘆鹽課興中官忤劉瑾矯詔杖之闕下削籍去世宗朝厯廣西僉事歸無室廬依外氏以居疾革謂其子曰為已謹獨甚難兢兢業業至葢棺無過心始釋耳鄭瓛江寕人宏治進士由刑部郎中出為南昌捕之知急府濠時宸濠蓄異誣奏瓛捶殺志招納王府校巨尉益潛刼搆中官江淮矯㫖瓛撫按究於小問船濠使令先械入府卒圍守之忽辱之風吹萬船狀濠開見反因鄰船械舊繫之卒密諭以從者禍千福人卒為感斬濠將動共范成釋其等馳縛赴圍解瓛登岸一贛撫王守仁備呼陳賊􅀔守十餘人仁濠使平為巡徼俘賊擢山東鹽運三使楊鋭其先蕭縣人衞籍家土元以正德置中署指湖口戍揮乃僉事守安慶以九江為繪圖呈樞臣宸濠反鋭鄱陽上先引軍游宜設鉤距登於江側鋭發矢寇皆船抵岸輒斃之濠怒破壞率衆濠黨凌分攻五十一父城鋭設子方先畧力拒督僉之焚事厯溺鎮無算乘勝遼東淮安捕斬罷歸賊大驚􅅰濠卒囊無餘貲平進典衣都營葬顧璘上吏元人宏治能正德初進士除廣平知知開封府忤鎮縣善摘發守中官王有宏謫官悉除下獄巡撫嘉湖靖時厯浙廣尤著政江績左布政使不踰年蠧章聖太后崩以工部弊侍郎功督山進尚陵書宫改殿諸役南京刑程工節財事集部璘當官守法而民不困善詩古文論一時名士咸歸之劉麟本安仁人先世為南户因家焉宏治進士京廣洋衞副千適言官龎泮等言事下獄麟偕同年生陸崑抗疏論救正德初厯紹興知府劉瑾銜之罷為民瑾誅起官嘉靖時累擢工部尚書初四司所用請特除一郎官主之又上財物司官動多侵漁麟節財十四事内府諸監局冒破金錢減汰十四五小大恨及卒贈太子少保羣梁材南京金吾右衞人宏治進士授德清知縣勤敏有異上節財數事多報可政嘉靖時累擢户部尚書議經費大省中官麥福請盡徴牧馬草場租材不可又請禁勲戚陳乞土田帝襃納命並清覈已賜者積患稍除材守章程慎出納部政肅然以母喪去服除起故官時修建兩宫七陵數與郭勲忤罷歸已復召用凡三掌􅀖計砥節如一日卒贈太子太保諡端肅王韋上元人少有器識林俊儲巏並愛重之與同里顧璘陳沂相劘為詩古文宏治末舉進士性耿介厯官有聲仕至南京太僕少卿丁母􅁨哀毁卒李熙上元人宏治進士官南京御史正德元年以災異偕同官陳十事多切時弊尋與同官葛浩等乞留劉健謝遷罪劉瑾馬永成等下詔獄子杖除名世宗立起饒州知府遷浙江副使以清操聞張英金吾衞都指揮武宗將南巡禁苑水涌橋柱折如斬英曰此變徵也駕出必不利乃肉袒㦸刃於胸囊土數升持諌疏當蹕道跪哭刺血流地衞士奪刃縳送詔獄問囊王何為曰恐汚帝庭灑土揜血耳詔廷杖八十遂死世宗立賜祭至福王時追諡忠壯何遵南京欽天監人正德進士為工部營繕主事時江彬導武宗遊幸徧祀名山遵􅅦木荆南還疏言淫祀無福彬匿不以聞遵復輿同官林大輅蔣山卿上疏乞罷遊幸勿為姦邪蠱惑彬矯㫖下遵等於獄復荷校暴午門外五日杖五十罷遣遵體素羸又㥽所言不達瘡潰三日卒嘉靖初贈尚寶卿􅄻一子入太學詔禮部􅌹祠祀之王鑾錦衣衞籍正德進士觀政吏部著治原二篇太宰楊一清異之補文選主事不通請謁人無有識其面者厯驗封郎中武宗南巡上疏力諌廷杖幾斃踰年卒顧瑮磷從弟正德進士厯南京兵部郎中有清操所親坐事屬瑮父為解瑮不可竟正其罪魏國公子以冒濫得錦衣嘉止盜民甚安之劉璽南京龍驤衞人幼有孝行為諸生能自力學襲世職指揮同知嘉靖中厯督漕總兵官清慎自持莅事五年軍民懷德罷歸行李蕭然書數卷而已金琮上元人為人高簡粹白公卿貴人非先施不造其門工詩善書文徵明極喜之得其片紙裝潢成卷題曰積玉許穀江寕人好詩書博涉精詣以文名嘉靖進士官至南京尚寶卿罷歸所著有歸田諸集武暐溧水人官台州知事嘉靖三十一年倭入犯暐追至釣魚嶺力戰死上官不以聞其子尚實訴于朝贈太僕丞焦竑江寕人學於耿定向羅汝芳舉嘉靖鄉試定向遴十四郡名士讀書崇政書院竑為之長萬厯十七年殿試第一官修􅁧時皇長子出閣擇講官六人竑與馬嘗講次羣烏飛鳴皇長子仰視竑肅立輟講皇長子斂容聽乃復講如初講畢備陳先朝典制及閭閻疾苦為養正圖説採古儲君事可為法戒者擬進之同官沮之遂止所注有易筌禹貢解遜國忠臣錄澹園集葛至學高淳人父病刲股以療母目失明以舌舐之遂能視父母歿並廬墓三年天啟中旌表何棟如江寕人萬厯進士授襄陽推官值苗亂棟如遣將王一桂討平之中官陳鳯開青山礦棟如以顯陵發脈地繪圖疏聞事得寢復開榖城宜城其黨縱掠棟如執其爪牙二十人當以大辟璫布飛語激上怒逮棟如下詔獄在繫益讀易習兵法以星變釋歸天啟中遼報日至棟如上書請自效因募兵得七千人以太僕少卿行邊魏璫黨以冒餉劾之遂逮下詔獄許顯純為鎮撫鍛鋉考掠屢􅅸而蘇久之戍滁陽崇禎初復職梁志仁江寕人舉於鄉授衡陽知縣調羅田崇禎八年流賊羅汝才攻城陷志仁持長矛巷戰殺六賊力屈􅀍縶大罵賊碎其支體而焚之妻唐氏亦不辱􅀍殺事聞贈蘄州知州本朝乾隆四十一年賜諡烈愍姚九疇江寕人為浦口守禦崇禎八年冬賊圍江浦九疇從遊擊汪之斌赴援五戰皆㨗城賴以完之斌議搜山阻之不聽中賊伏九疇率所部救圍賊悉衆擊之援絶矢盡誘降不出之斌于重屈罵賊死張可大上元人世為南京羽林左衞千户舉武進士厯都司僉書分守􅀲洲儀真淮撫李三才使錄稅監魯保遺貲却其家十金之餽葉向高嘗稱之曰此不獨良將且良吏也厯都督僉事鎮登萊都城戒嚴率師入衞以守城功進右都督孔有徳陷登州不屈死之贈太子少傳諡莊節建祠旌忠本朝乾隆四十一年賜諡節愍袁繼登南京人崇禎末由選貢知安化縣流賊李自成陷城被執求速死賊殺之黄金璽江寕人崇禎中舉武鄉試南京不守大書于壁曰大明武舉黄金璽一死以愧人臣懷二心者遂自經本朝乾隆四十一年予入忠義祠陳士達南京布衣南京破士達投水死本朝乾隆四十一年予入忠義祠馬純仁六合人為邑諸生南郡失守純仁與友人約同死友人背約純仁走水濱題銘於橋柱抱石而死年十八後友人登第為湖廣知縣謁城隍神儼若純仁坐殿上遂嘔血死本朝乾隆四十一年予入忠義祠本朝李敬六合人祖雲鵠有隱德敬中順治丁亥進士授行人擢御史多所建白出按湖廣請免租稅改折黄絹犒師必身至行閒征戰屢有功厯升刑部侍郎胥廷清上元人順治丁亥進士知餘姚縣時餘寇未靖廷清單騎入山撫之四境以安擢工部主事􅅦龍江關盡􅁍羡餘家居兄弟子姪百口共爨時稱其孝友史允琦上元人幼􅀌事母撫弟有至性順治丁亥進士兩為福建推官屢雪寃滯厯山西提學道士多頌之蔡祖庚上元人順治已丑進士授甘泉令以政最升户部郎厯守太原正定二府遷河南副使吕公義江寕人撫標把總順治十年署崇明營千總時海寇張名振等犯崇明公義誓死殺賊陣亡事聞賜䘏如例劉斌上元人順治武進士為竹滛營參將時吳三桂賊黨攻城斌七戰皆㨗擢副將後仍戰歿於竹溪事聞賜卹如例劉從勛江寕人為連江遊擊順治十七年鄭成功出􅅰郡縣從勛禦之受創陣亡事聞賜卹如例卜世儼上元人康熙武進士為鎮遠衞守備時吳三桂賊黨馬寶陷鎭遠力戰不支自縊死事聞贈都司僉書卹􅄻如例白夢鼐江寕人康熙庚戌進士官大理評事少與兄夢鼎俱崇尚志節罹黨獄幾不免時有二白之目及居官多所平反都御史魏象樞亟稱之康熙庚申􅀘行福建鄉試夢鼐為考官得士極盛張藴江寕人知山西汾陽縣姜瓖叛藴守西闕賊破東關入逼印綬藴妻柴氏及長子璋自殺瓖誅收撫殘黎仍前職兼理府事董三策江寕人康熙癸丑武進士萬州逰擊奉檄􅁹賊定安轉戰百餘里所向無前遂恢復縣城恃勇復深入黎洞中毒矢死王應憲上元人少􅀒奇氣以文行推重於鄉隱居著述有河漕水利鹽鐵諸考顧來鶴上元人為寕夏中衞守備康熙十五年王屏藩賊黨據固原欲渡河來鶴諭民沿河防守叛民焦得才等倡亂死之事聞贈遊擊卹􅄻如例倪燦上元人康熙丁巳舉人薦舉博學鴻詞授檢討與修明史以淹雅著名張自超高淳人康熙癸未進士博極羣書研究經史期於躬行實踐釋􅄄後授經講學文行日著所著有春秋宗朱辨義黄虞稷江寕人康熙閒以薦授翰林纂修明史假歸卒於家虞稷工詩文才思飇發家有千頃堂藏書最富吳錦江上元人由武舉效力兵部期滿授四川提標守備洊升遊擊乾隆三十七年隨征金川以功擢參將嗣因坐事革職留於軍營效力贖罪旋隨攻當噶爾拉山梁陣亡事聞照參將例議卹賜祭葬􅄻守備胡鐘江寕人乾隆丁酉舉人除授雲南太和知縣升貴州遵義知府杜絶苞苴痛黜奢靡發姦摘伏莫不服其精明卒祀鄉賢祠哈國瓏江寕人乾隆戊申武舉補授河南許州營千總隨征川楚敎匪屢戰有功洊升甘肅涼州鎭右營遊擊時甘肅􅁹敗戴家營等股匪由竹溪竄􅀥嶺􅀒嵎抗拒國瓏隨經畧額勒登保分路抵禦殱斃甚衆馳入賊隊猝受矛傷陣亡事聞議卹如例􅄻雲騎尉世職謝子庶溧水人孝行著聞乾隆年閒旌吳運鎮高淳人同縣吳翥南周良遇均孝行著聞俱乾隆年閒旌張瑛上元人捐職從九品分發陜西嘉慶元年投效軍營時邪匪滋事參將鍾岳在西牛槽防堵賊越山竄瑛直前撲拏騎馬賊月中矛傷陣亡事聞賜卹廕雲騎尉司馬騊江寕人嘉慶中由山陽縣生簿洊擢河東河道總督辦理河務洞悉機宜曹工睢工經理俱臻穩固卒賜卹如例流寓三國吳諸葛瑾琅邪人避亂江東孫權用爲司馬使蜀通好與其弟亮公㑹相見退無私言子恪亦知名晉周彥倫汝南人居鍾山下清貧寡欲後應詔出仕累官國子博士南北朝齊明僧紹平原鬲人明經有儒術建元初徵爲正員不就隱江乘攝山高帝謂其弟慶符曰卿兄高尚其事亦堯之外臣朕夢想幽人固已勤矣所謂徑路絶風雲通賜竹根如意荀籜冠時以爲榮陳馬樞扶風郡人六􅀊能誦孝經論語長而博極經史隱於茅山陳文帝徵爲度支尚書辭不􅀿命鄱陽王爲南徐州刺史固請乃行王别築室以居之樞惡其崇麗乃於竹林閒自營茅茨而居有白燕巢其庭樹馴狎几案春來秋去凡三十年唐李白山東人崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自采石達金陵白衣宫錦􅂁於舟中顧瞻笑傲旁若無人蕭穎士晉陵人客金陵永王璘召之不見宋鄭俠福清人隨父官江寕閉户苦學王安石知其名邀與相見稱􅅄之明黄宏鄞人著籍孝陵衞宏治進士厯江西左參議賊閔廿四既降復恃宸濠􅀔剽掠九江上下宏發兵捕之宸濠反􅀍執宏憤怒以手梏向柱蹙項是夕卒賊義而棺殮之子紹得其棺以偽命治殮非父志亟易之扶文奔赴求柩歸濠誅贈太常寺少卿祀忠烈祠列女漢李南女為由拳縣人妻南明於風角女盡得其術嘗晨詣爨室卒有暴風婦從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風卒起先吹竈突及并此禍為婦女主爨者妾將亡之應因著其亡日乃聽還家如期病卒南北朝宋㑹稽長公主武帝女適徐逵之身居長嫡為文帝所禮家事大小必諮而後行每有不得巳輒號哭上甚憚之􅀄徐湛之為大將軍彭城王義康所愛及義康得罪事連湛之主號泣乞命乃得全齊蕭嶷妃庾氏有女工婦徳宋時武帝及嶷位官尚輕家又貧薄庾氏徹巳損身以相營奉兄弟晚還飢疲未嘗不迎時先辨嶷夢後亦亡五代南唐聶氏太平鄉民女也父早歿興母居隨母採薪母為虎攫去蹲踞方食聶持柴刀自虎後躍登其背按項連割之虎斃因收母屍時年十三元闞文興妻王氏建康人文興從軍漳州王氏與俱行至元十七年陳弔眼作亂攻漳州文興率兵與戰死之王氏被掠義不受辱乃紿賊曰俟吾葬夫即汝從也賊許之遂負屍積薪焚之火既熾即自投火中死曹子英妻尤氏溧水人夫死嚙指血誓不再醮袁氏􅀌女溧水人年十五其母嚴氏孀居貧病卧牀數年女事之至孝至正十二年火延其里鄰婦强攜女出避女泣曰我何忍舍母去同死而巳遂入室抱母共焚而死花山節婦失其姓氏至元閒為兵所逼至崇賢鄉碑亭嚙指出血題詩碑上有遥望花山何處是之句遂自經死劉彥陽妻孫氏至正末彥陽為平江倉官卒於任值兵亂孫輿一子二女守櫬邸舎城陷子死於兵孫􅀍掠犯之不從遇害長女貞年十八次女㓗年十六兵脅之行二女紿之曰願相從但得埋父母􅦡骨免暴露兵從之遂至江濱皆赴水死明楊氏上元人安陸侯吳復之妾復守黔陽卒於官楊自經以殉太祖手詔襃之追封貞烈夫人朱約妻石氏句容人歸約甫一􅀊約病奉侍湯藥三年不懈約卒守節終身洪武中旌表鄭􅉗妻郭氏六合人􅉗不得於父恒悒悒不樂氏曰子弟盡孝何患不慈翁欲以非禮加婦氏厲色拒之嚙指出血曰遭遇若此惟有死耳遂沉於河宋濂為之傳鄭瓘妻袁氏六合人年十八未婚而瓘疾氏告父母歸鄭侍湯藥二年不懈瓘歿求自盡家人救之得不死守節終身武定橋烈婦失其名姓永樂初誅戮臣僚妻子發教坊或配象奴烈婦