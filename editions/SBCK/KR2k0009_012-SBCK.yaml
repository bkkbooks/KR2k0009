粥及去糗糧送之吏為立碑五代周魏丕相州人世宗鎮澶淵辟司法參軍有盜五人獄具丕疑其冤緩之不數日果獲真盜世宗嘉其明慎辛仲甫汾州孝義人顯德初郭崇出鎮澶淵署仲甫掌書記崇所親吏為廂虞候部民有被劫殺者訴陰識賊魁即捕盜吏也官不敢詰仲甫請自捕逮鞫之吏故稽其獄仲甫曰民被寇害而使自誣服蠧政甚矣焉用僚佐為請易吏以雪冤憤崇悟移鞫之乃得實狀宋王祐莘人符彦卿鎮大名頗不治太祖以祐代之俾察彦卿動靜祐以百口明彦卿無罪彦卿由是獲免陳恕南昌人太宗時知大名府時遼人内寇受詔増浚城隍其器用取于民者不時集恕立擒府中大豪一人械之以徇民皆悚慄無敢後期者數日功就王承衍洛陽人雍熙中知天雄軍府兼都部署時遼兵擾鎮陽鄰境戒嚴城市大恐屬上元節承衍下令市中及佛寺燃燈設樂與賓佐宴遊達旦人賴以安後再知天雄軍吏民千餘詣監軍請為本道節帥詔褒之趙昌言汾州孝義人淳化中知天雄軍大河貫府境豪民峙芻茭圖利誘姦人潛穴隄􅀊仍決溢昌言知之一日隄吏告急命徑取豪家廥積以給用自是無敢為姦利者屬澶州河決流入御河溢浸府城昌言籍兵􅀒土増隄不浹旬城完太宗手詔襃諭之呉元扆太原人真宗時知澶州咸平三年轉運使劉錫上其治狀詔書嘉􅅄之張進曲阜人咸平中徙天雄軍部署㑹河決鄆州王陵口發數州丁男塞之命進董其役凡月餘畢詔襃之何承矩河南人景德元年出知澶州承矩自守邊以來常欲朝廷懷柔遠人為息兵之計及是車駕按巡本部卒與遼和益加歎賞張旦趙州人真宗時知德清軍景德中遼兵入寇陷軍壁旦與其子利涉率衆奮擊並戰没帝聞之驚悼錄其四子官時虎翼都虞候胡福副指揮使尚祚指揮使張睿劉福都頭輔能等皆力戰而死真宗嘉歎其忠勇周起鄒平人真宗時徙知天雄軍所至有風烈數賜書襃諭陳􅀂拙盧龍人真宗時知澶州蝗旱之餘勤於政治郡民列狀乞留靳懷德高唐人真宗時知澶州州居水陸之要懐德悉心撫治頗著政績張禹珪河朔人景德中知澶州勤於政治以瑞麥生獄空連詔嘉􅅄會河隄決溢禹珪率徒塞之宰相王旦使兗州還言其狀優詔襃之王㑹益都人天禧中知天雄軍仁宗初以彰信軍節度使復知天雄軍遼使者往還斂車徒而後過無敢譁者人樂其政為畫像而生祠之曹瑋靈壽人仁宗初知天雄軍遼使過天雄部勒其下曰曹公在此毋縱騎馳驅也王德用趙州人仁宗時遼遣劉六符來求復關南地以兵壓境乃改德用知澶州􅀊大熟六符見德用拜曰此公仁政所及也趙及偃師人仁宗時知魏縣厯通判大名府所治有聲吏民安之李京趙州人仁宗時知魏縣奉法嚴正吏不便欲以苛中京遂相率遁去監司果議以苛刻斥京知府任布曰如此適墮吏計中京賴以免程琳博野人仁宗時知天雄軍後又判大名府持重不擾前後守魏十年度要害繕壁壘増守禦備值雜木數萬曰異時樓櫓之具可不出于民矣人愛之為立生祠陳執中南昌人皇祐中判大名府河決商胡走大名程琳欲為隄不果成而去執中乘年豐調丁夫増築二十里以障横潰賈昌朝獲鹿人仁宗時判大名府時河決商胡昌朝請復故道不從六塔功敗賓棣德博民多水死昌朝振救之甚力杜衍山陰人仁宗時知天雄軍衍為治謹密不以威刑督吏然吏民亦憚其清整張問襄陽人仁宗時通判大名府郡牧地在魏􅀊久冒入於民有司按舊籍括之地數易主劵不明吏茍趣辦持詔書奪人田至毁室廬發邱墓問至則曰是豈朝廷意􅁘具以上聞仁宗諭大臣曰吏用心悉如問何患赤子之不安也立罷之張觀絳縣人仁宗時徙知澶州河壞孫陳埽及浮梁州人大恐或請趨北源以避水患觀曰太守獨去如州民何乃躬率卒徒増築之隄完水亦退李肅之濮州人仁宗時監大名府軍資庫大河溢府檄修冠氏隄隄功就弗擾民悦之通判澶州遼使將過郡而樓堞壊圯肅之謂郡守曰吾州為景德破敵之地當示雄強遂鳩工搆城屋凡千區已而中貴人銜命來視規置一新驚賞嗟異陸詵餘杭人仁宗時僉書北京判官貝州亂給事不乏賊平又條治其獄無濫者韓綜雍邱人仁宗時通判天雄軍河溢金隄民依邱冢者數百家綜令曰能濟一人予千錢民爭操舟栰以救之已而邱冢多潰傅求考城人仁宗時通判大名府府守吕夷􅂤委以事夷簡入相薦其本張燾臨濮人仁宗時提􅀧河北刑獄攝領澶州七日而商胡決燾振溺捄饑所全活者十餘萬姚仲孫商水人仁宗時權知澶州河壊明公埽絶浮橋仲孫親總役堤上埽一夕復完權知大名府夜領禁兵塞金隄決河是􅀊澶魏雖大水民不及患李遵勗上黨人仁宗時知澶州河水潰將壊浮梁遵勗督工徒七日而隄成康德輿洛陽人仁宗時厯大名府路鈐轄提舉金隄至和中河決小呉埽破東隄頓邱口居民避水者趨隄上而水至不得達德輿以巨船五十順流以濟之遂免墊溺劉渙保塞人治平中知澶州河北地震民乏粟率賤賣耕牛以供朝乆渙盡發公錢買之明年民無牛耕價増十倍渙復出所市牛以原值與民澶民賴不失業程顥河南人英宗時僉書鎮寕軍判官程昉治河取澶卒八百虐用之衆逃歸羣僚畏昉欲勿納顥曰彼逃死自歸弗納必亂若昉恕吾自任之即親往拊勞約少休三日復役衆歡踊曹村埽決顥謂郡守劉渙曰曹村決京師可虞臣子之分身可塞亦所當為盍盡遣廂卒見付渙以鎮印付顥立走決所激諭士卒命善泅者渡決口引巨索濟衆兩岸並進數日而合韓琦安陽人熙寕元年徙判大名府王安石用事出常平使者散青苗錢琦亟言之帝出其疏以示宰臣曰琦真忠臣雖在外不忘王室朕始謂可以利民今乃害民如此當是時青苗法幾罷琦在魏郡久遼使每過移牒必書名曰以韓公在此故也魏人為立生祠文彥博介休人仁宗時判大名府熙寕中復判大名府身雖在外而帝眷有加初治河者為濬川杷王安石遣都水丞范子淵行其法彥博言河非杷可濬臣不敢雷同罔上黄庭堅分寕人熙寕中敎授北京國子監留守文彥博才之留再任鄭僅彭城人熙寕中為大名府司户參軍留守文彥博以為材部使者檄往他郡彥博曰如鄭參軍詎可令數出奏改司法薛向河中萬泉人神宗時論河北糴法之􅁦朝廷是向計始置使糴司於大名以向為提􅀧刑獄兼其事武強有盜殺人而逸尉捕平民抑使承向覆其冤脱六罪囚於死王拱辰開封咸平人元豐􅀄判大名時三路籍民為保甲日聚而敎之禁令苛急往往去為盜拱辰抗言其害主者指為沮法拱辰上章不已帝悟於是第五等户得免韓璹汲人神宗時知澶州河決晝夜捍禦帝念其勞遷大中大夫璹吏事絶人厯案牘終身不忘澶州民懷思之他日郡守或欲有所為民必曰此巳經韓大中矣以故輒止章衡浦城人元豐中知澶州至部會官立法禁民販鹽衡言民恃鹽以生生之所在雖犯法不顧徒令扞獄日繁請如故便韓絳雍邱人哲宗初為北京留守河決小呉都水議傍魏城鑿渠東趨金隄役甚急絳言功必不成徒耗費國力而使魏人流徙非計也三奏訖罷之徐處仁穀熟人河北盜起徙大名尹前尹王革慘而怯盜無輕重悉抵死小有警輒閉城以兵自衞處仁至即大開城門徹牙内人情遂安在官以剛廉稱黄友温州平陽人通判澶州金人敗盟郭藥師以常勝軍叛燕士響應友獨領數千人與之戰躬冒矢石破裂脣齒欽宗即位召對問狀為之稱歎金梁肅奉聖州人以山東西路轉運副使攝大名少尹正隆末境内盜起驅良民陷賊中不能自辯者數千人皆繫大名獄肅到官考驗得其情讞出者十八九楊伯仁藁城人世宗時改大名少尹郡中豪民横恣民受其害伯仁窮竟渠黨四境為之帖然徒單公弻河北東路孫卓貨明安人章宗時知大名府事是時伐宋軍興有司督逋租及牛頭税甚急公弻奏軍士從戎民亦疲􅁦可緩徴以紓民朝廷從之孫卓貨明安改見順天府名宦裴莫亨臨潢府人章宗時同知大名府事先是豪猾縱横前政莫制莫亨下車宣明約束闔境帖然徒單銘特赫塔臘人大安三年知大名府荐饑重困銘乞大出交鈔以振之特赫塔臘舊作忒黒闢刺今改正王毅大興人官東明令貞祐二年東明圍急毅率兵民欲戰者數百人拒守城破猶率衆抗戰力窮􅀍執與縣人王八等四人同驅之郭外先殺二人王八即前跪將降毅以足踣之厲聲曰忠臣不佐二主汝乃降乎驅毅者以刃斫其脛毅不屈而死贈曹州刺史元張宏範定興人至元二年守大名􅀊大水漂沒廬舍租税無從出宏範輒免之朝廷罪其專擅宏範入見曰臣以爲朝廷儲小倉不若儲之大倉帝曰何說也對曰今􅀊水潦不收而必責民輸倉庫雖實民死亡殆盡明年租將安出曷若活其民使不至逃亡則􅀊有恒收非陛下大倉乎帝曰知體其勿問張孔孫隆安人至元中以廉訪使莅大名以所沒贓糴粟賑饑民尋除大名路總管兼府尹大興學校有獻故河隄三百餘里於太后者即上章請還于民從之明焦昉定興人永樂初為長垣知縣任滿當去百姓詣闕請留詔許之以知州秩仍理縣事政績益著宣德中卒于官民為營葬于邑城東南隅且築室居其妻子賀禎仁宗時為大名縣丞勵廉隅三考當遷民乞留即擢知本縣閻禹錫洛陽人景泰中任開州訓導從學者如市人士化之有不率輒曰吾無以見閻先生李瓚臨汾人成化中知大名府河決長垣東明瓚築長隄延袤二百餘里植榆柳數萬株沿隄置鋪夫遇衝刷輒補葺又于元城築衞河隄工費不擾世享其利民有不事生業者督命紡織遠近革化在官十二年民尸祝之韓福天長人宏治中知大名府自罷兵戍盜稍起福定諸州縣番上之法躬親團操又時詢察盜賊屏跡道不拾遺鼔樓下置認物亭命境内有見道上所遺物一錢以上悉齎投亭中許亡者認取諸州縣吏民以事詣府者率投衣囊亭中事畢各持去間有過旬者吏民不敢取也在任八年治行為天下第一賜宴光祿兩入覲朝中吏士夾道指曰此大名韓知府也時以比宋包拯云鮑琦麻城人宏治中知魏縣值漳水決漂沒田廬琦築隄一百三十里捍之不三月而成水患以息至今稱鮑公隄劉鸞白水人正德中知東明縣時流賊攻東門二日幾陷鸞乘城督戰悉力拒守項中二槍神色不變縱火燒賊營圍始解張謙慈谿人嘉靖中知大名府以廉馭吏終謙之治無敢受一錢者故事養馬常課外復徴餘地錢百姓苦之謙請豁免值􅀊旱蝗為減徴派緩馬價蠲田租凡事不便民者悉加酌濟流亡多來歸諸偁秀水人嘉靖中知大名縣政尚寛􅂤邑有水患築隄障之至今稱諸公隄甄敬平定州人嘉靖中知大名縣漳衞河決敬築樓底埽口以牛種給民均畝定則􅀊以豐稔流亡歸業朱湘義烏人嘉靖末知大名縣初至首築䕶城隄創應龍書院會士人月三試之置學田二百餘畝建社學十四所􅃟塾師分訓之文敎大興盧象昇宜興人天啟末知大名府擒大盜馬翩翩崇禎三年擢大名兵備副使嘗追賊于小西天山又敗之青龍岡前後斬首數千象昇每臨陣身先士卒與賊格鬬刃及于鞍弗顧失馬即步戰以是賊甚畏不敢窺大名本朝乾隆八年入祀名宦祠朱廷煥單縣人崇禎中以兵備副使分巡大名流賊逼畿輔偽檄至怒而碎之及城破被執不屈死本朝方元啟開化人順治間知南樂縣時民多逃亡徭役無所出居者重困元啟按籍清審減免丁銀六百餘兩來歸者給以牛種農具不數年増户口萬六千有奇高文鑑江陵人順治十八年知清豐縣先是縣多雜徵􅀊責數千兩文鑑至悉除之爭訟者立為剖決未嘗留滯以病去民立祠祀之耿介登封人康熙初分巡大名道介故清正為下所服及去父老相送數百里范明德壽州人康熙六年為大名府通判制府幕士犯罪明德按治之其人走愬制府明德曰某守法吏敢以上官撓法􅁘卒于官貧不能殮士民傷之來謙鳴蕭山人雍正中知魏縣甫至督民築漳河隄嚴明條約在工者無敢作奸乾隆二十二年魏圯于漳民避居護城隄上隄為謙鳴増築者屢囓不圯陳睿長壽人乾隆十九年知大名縣二十二年大水邑故有護城隄睿躬率民夫晝夜補築水猛溢入隄急招民避城上先是水將至魏汜沁水挾淇漳注衞衞高數丈徹數十里民情倉皇睿豫運米貯城樓至是以所儲米煮粥徧給數日水稍平開倉出粟牒請不俟報可及奉㫖賑濟睿詳查戸口撫卹周至後移疾歸士民為之流涕王沛生山東人乾隆二十二年知魏縣時魏城新沒于水奉㫖賑卹沛生加意撫循嘗乘小舟躬至各鄉查勘不避寒暑明年以裁缺去茹敦和㑹稽人乾隆二十九年知南樂縣南樂地故卑下當豬龍河之衝敦和審地形高下因􅀔利導水不為患縣地多茅沙鹽堿教以周禮土化之法多種雜樹􅇤田皆變沃壤邑人以麥稭編笠為生率荒本業敦和勸令種桑勒碑記以示民民獲其利調大名縣地濱漳河水患尤劇漳之旁有梁河敦和謀開渠以殺其􅀔議甫定内遷大理寺評事不及上請履勘乃勸民興修刻期集河干親為指示形􅀔民具畚鍤來者以萬計及旬而渠成嘉慶十年入祀名宦祠趙綸仁和人嘉慶十六年知長垣縣十八年教匪滋事綸入縣屬葦園村搜捕匪黨被賊戕害事聞賜卹前提調官臣沈兆澐恭纂輯提調官臣張日章恭覆輯校對官臣徐堉恭校校對官臣沈維鈺恭覆校大清一統志大名府三人物漢汲黯濮陽人孝景時為太子洗馬以嚴見憚武帝即位為主爵都尉亦以數直諫不得久居位帝問嚴助曰汲黯何如人也曰使黯任職居官無以踰人至其輔少主守成雖自謂賁育弗能奪也帝曰然古有社稷之臣至如汲黯近之矣後拜淮揚太守居十􅀊而卒京房頓邱人治易事梁人焦廷壽其説長于災變分六十四卦更直日用事以風雨寒温為候各有占驗房用之尤精好鍾律知音聲以孝廉為郎永光建昭間數上疏所言屢中石顯五鹿充宗疾之出為魏郡太守後卒為所中下獄死王閎元城人平阿侯譚之子哀帝時為中常侍倖臣董賢為大司馬寵受貴盛閎屢諌忤㫖帝臨崩以璽綬付賢閎白元后請奪之即帶劒至宣德後闥舉手叱賢賢不敢拒乃跪授璽綬閎馳上太后王莽忌閎出為東郡太守莽敗漢兵起閎獨完東郡三十餘萬户歸于更始索盧放東郡人以尚書教授千餘人初署門下掾更始時使者督行郡國太守有事當斬放願以身代使者義而赦之由是顯名建武六年徵為洛陽令徒諌議大夫數納忠言後以疾去復徴不起光武使人輿之見于南宫雲臺賜穀二千斛遣歸呉祐長垣人父恢為南海太守欲殺青簡以冩經書祐諫曰海濱舊多珍怪此書若成則載之兼兩嫌疑之間誠宜慎也恢撫其首曰呉氏世不乏季子矣及年二十喪父居無擔石而不受贍遺舉孝廉遷膠東侯相為政仁􅂤爭訟自息梁冀表為長史冀誣奏李固祐爭之不聽時扶風馬融為冀章草祐因謂融曰李公之罪成于卿手卿何面目見天下之人乎遂自免歸躬灌園蔬以經書教授長子鳳樂浪太守少子愷新息令鳳子馮鮦陽侯相皆有名于世秦周平邱人名在八廚官至北海相謝弻濮陽人中直方正為鄉邑所宗建寕二年詔舉有道之士弻對䇿除郎中時青蛇見前殿大風拔木弻上封事言竇氏之誅太后幽隔空宫愁感天心陛下以桓帝為父豈得不以太后為母又故太尉陳蕃勤身王室而見陷羣邪宜還其家屬解除禁網徴故司空王暢長樂少府李膺並居政事庶災變可消左右惡其言出為廣陵府丞去官歸家中常侍曹節從子紹為東郡太守忿疾于弻遂收拷掠死獄中三國魏毛玠平邱人少為縣吏以清公稱太祖辟為治中從事嘗為東曹掾與崔炎並典􅃟舉所舉用皆清正之士務以儉率人由是士莫不以廉節自勵太祖平柳城班所獲器物特以素屏風素馮几賜玠曰君有古人之風故賜君古人之服玠居顯位常布衣蔬食賞賜即賑施貧族家無所餘魏國初建為尚書僕射後卒於家晉杜友東郡人魏正元中為侍御史母邱儉之誅黨與七百餘人友治其獄惟舉首事十人餘皆奏散後仕晉厯冀州刺史河南尹成公􅂤東郡人性樸素不求榮利潛心道味張茂先每言簡清靜比楊子雲默識擬張安世官至散騎常侍束晳元城人漢疏廣之後王莽末避難因改姓晳博學多聞察孝廉舉茂才皆不就太康中郡界大旱為邑人請雨三日而雨注衆為作歌性沈靜不慕榮利作元居釋以擬客難張華見而奇之召為掾累遷尚書郎趙王倫請為記室辭疾罷歸教授門徒及卒元城市里為之廢業門生故人立碑墓側所著五經通論發􅀩記補亡詩文集數十篇行於世南北朝魏李崇頓邱人襲爵陳留公孝文初為荆兗二州刺史俱有稱績後行梁州刺史討平叛民楊靈珍宣武初魯陽蠻柳北喜等叛詔崇進討諸蠻悉降延昌初都督淮南諸軍事在州十年寇賊侵邊所向摧破號曰卧龍累遷尚書令加侍中在官和厚明于決斷卒謚武康李平崇從弟涉獵羣書有文才宣武時累官相州刺史徴拜度支尚書京兆王愉反于信都平都督諸軍討平之孝明時遷尚書右僕射卒諡文烈平自在度支至於端副夙夜在公孜孜匪懈凡處機密十有餘年有獻替之稱子諧風流文辨孝靜時厯中書侍郎魏梁和好諧為聘使甚為梁武所重唐李勣離狐人本姓徐初從李密武德二年密歸唐其地勣統之未有所屬乃錄郡縣户口以啟密請自上之高祖喜曰純臣也詔授􅀺州總管封英國公賜姓附宗正屬籍從秦王征伐平竇建德俘王世充又從破劉黒闥徐圓朗貞觀初拜并州都督降突厥破薛延陀屢有功高宗立拜尚書左僕射進司空率兵討高麗平其國卒贈太尉諡貞武孫敬業少從勣征伐襲爵英國公為眉州刺史坐事貶客楊州武后擅命敬業起兵稱匡復檄州縣疏武氏過惡復廬陵王天子位後以兵敗死張公謹繁水人為王世充洧州長史挈城歸唐貞觀初為代州都督數言時政得失太宗多所採納後副李靖經畧突厥敗頡利璽詔慰勞追封鄒國公改襄州都督以惠政聞卒官太宗不避辰日哭之馬嘉運繁水人少為沙門還治儒學長議論貞觀初累除越王東閣祭酒退隱白鹿山受業至千人召拜宏文館學士以孔穎達正義繁醸掎摭其疵當世諸儒服其精終國子博士谷那律昌樂人淹識羣書褚遂良嘗稱為九經庫貞觀中累遷諌議大夫孫倚相為秘書省正字讎覆圖書多所刋定倚相孫從政涉儒學有風操事孫寶臣厯定州刺史及惟岳與田悦謀拒天子命從政諌不納即仰藥死杜正倫洹水人隋世重舉秀才天下不十人而正倫一門三秀才皆高第為世歆羨貞觀中累進中書侍郎論事稱㫖顯慶元年進同中書門下三品遷中書令封襄陽縣公李義府同執政不能下出補為横州刺史卒正倫工屬文與董思恭夜直論文章思恭歸謂人曰與杜公論文章日覺吾文頓進矣張文瓘昌樂人幼􅀌事母兄以孝友聞貞觀初第明經補并州參軍時李勣為長史歎曰稚圭今之管蕭吾所不及乾封二年同東西臺三品遂與勣同為宰相改黄門侍郎兼大理卿不句日斷疑獄四百抵罪者無怨言時以執法平恕方戴胄後拜侍中諸囚聞其遷皆垂泣性嚴正未嘗囘容諸司奏議悉心糾駮新羅叛帝將出兵討之文瓘請息兵修德以懷異俗詔可卒贈幽州都督諡曰懿四子潛沛洽涉皆至三品時謂萬石張家文瓘兄文琮好自寫書筆不釋手永徽初獻文皇帝頌優制襃美官終建州刺史從父弟文收終太子率更令善音律著新樂書數十篇李義炎昌樂人及進士第補太原尉李勣為都督甚禮之累遷中書侍郎上元中同中書門下三品高宗欲使武后攝國政義炎固爭得寢帝毎顧問必鯁切不回宅無正寝弟義璡為市堂材送之義炎曰處貴仕又廣居宇非有令德必受其殃卒不許致仕歸公卿以下悉祖餞通化門外時人比漢疏廣解琬元城人中幽素科厯追侍御史安撫烏質勒及十姓部落景龍中遷御史大夫兼朔方行軍大總管前後守邊積二十年務農習戰華夷安之終同州刺史郭元振貴郷人名震以字顯少有大志年十八舉進士武后用為奉宸監丞吐蕃請和其大將論欽陵請罷四鎮兵乃以元振充使還上疏具言所以制御之策后疑之後數年吐蕃君臣猜攜卒誅欽陵而其弟贊婆來降拜元振為涼州都督置和戎城及白亭軍拓境千五百里于甘州闢屯田食支數十年神龍中遷安西大都護睿宗立召為太僕卿安西酋長有􅋇面哭送者先天二年以兵部尚書同中書門下三品元宗誅太平公主諸宰相走伏外省獨元振提兵護帝進封代國公元振少雄邁及貴居處儉約手不置書人莫見其喜愠姜師度魏人擢明經神龍初為河北道巡察使厮溝于薊門以限契丹並海鑿渠以通餉路累遷河中尹引安邑鹽池置鹽屯公私取利不貲徙同州刺史又派洛灌朝邑河西二縣閼河以灌通靈陂收棄地二千頃為上田置十餘屯進將作大匠卒師度喜渠漕所就必為世利呉保安魏人睿宗時姚嶲蠻叛拜李􅀩為姚州部督郭元振弟子仲翔為判官時保安罷義安尉未得調仲翔以同里力薦之􅀩表掌書記保安復往􅀩已戰歿仲翔被執蠻聞仲翔貴胄必千縑方許贖保安留嶲則力居貨十年得縑七百都督楊安居義之助其乏贖仲翔歸後保安以彭山丞客死喪不克歸仲翔為服縗經囊其骨徒跣􅀒歸葬魏州廬墓三年乃去後為嵐州長史迎保安子為之娶而讓以官杜暹濮陽人自高祖至暹五世同居暹尤恭謹事繼母孝擢明經第􅀘婺州參軍厯鄭尉俱以清節顯開元四年以監察御史覆屯磧西會郭䖍瓘與劉遐慶更相訟詔暹即按突厥以金遺暹暹受焉陰埋幕下巳出境乃移文俾取之突厥大驚度磧追不及去十四年同中書門下平章事進禮部尚書封魏縣侯卒諡貞孝族子鴻漸第進士為朔方判官祿山亂迎肅宗至靈武密贊大計累官門下侍郎南霽雲頓邱人安祿山反促張巡守雎陽賊將尹子奇來攻巡使霽雲射一發中其左目既而被圍久城中食盡時賀蘭進明屯臨淮許叔冀尚衡次彭城皆觀望莫肯救巡使霽雲如叔冀請師不應復遣如臨淮告急引精騎三十冐圍出賊萬衆遮之霽雲左右射皆披靡既至進明初無岀師意人愛霽雲壯士欲留之為大饗樂作霽雲泣曰昨出雎陽時將士不食月餘日矣義不忍獨食因拔刀斷一指一座大驚為出涕即馳去復冒圍入城陷被執賊欲降之廵呼曰南八男兒死耳不可為不義屈霽雲笑曰欲將以有為也公有言敢不死遂死之贈􅀭州大都督圖形淩煙閣劉晏南華人明皇封泰山晏始八􅀊獻頌行在即授太子正字肅宗代宗時兩為户部侍郎領度支鹽鐵轉運鑄錢租庸使拜吏部尚書同中書門下平章事使如故兼領東都河南江淮轉運租庸鹽鐵常平使通江淮漕渠􅀊致四十萬斛上勞曰卿朕酇侯也又兼益湖南荆南山南東道與第五琦分領天下金穀􅅦利益廣民不告勤大厯時軍國皆仰晏德宗立又加關内河東三川及諸道青苗使楊炎執政搆之貶忠州刺史賜死天下冤之晏兄暹爲汾州刺史天資疾惡建中末召爲御史大夫盧􅂎憚其嚴更薦于欣代之終潮州刺史晏孫􅄥舉進士累官給事中以才爲李德裕所知暹孫潼擢進士厯京兆尹山南有劇賊潼直叩其壘諭降之累遷西川節度使南詔懼其威信不敢犯邊呉漵濮陽人章敬呉皇后之弟建中初遷金吾大將軍朱泚反詔大臣持節慰曉德宗顧左右無敢行漵曰陛下不以臣無能願至賊中諭天子至意即日賫詔見泚汎留漵不遣卒被害贈太子太保諡曰忠子士矩文學早就喜與豪英遊開成初爲江西觀察使呉湊漵弟累進左金吾衞大將軍湊才敏鋭而謙畏自將帝尤委信時令狐彰田神功等繼歿其下揺亂湊持節至汴滑委曲慰諭軍中驩附元載當國久帝召湊圖之收載賜死貞元十四年拜京兆尹進兼兵部尚書卒諡曰成湊任中外未嘗有過爲外戚表張萬福元城人三世明經止縣令州佐萬福乃學騎射從征遼東有功累攝壽濠舒三州刺史代宗召見曰欲一識卿面後以利州刺史鎮咸陽李正已反屯兵埇橋江淮漕船不敢踰渦口德宗乃以萬福為濠州刺史漕遂通改泗州為杜亞所忌召拜右金吾將軍圖形淩煙閣陽城等論裴延齡事伏閣不去帝震怒左右懼不測萬福大言曰國有直臣天下無慮矣吾年八十與見盛事徧揖城等勞之天下益重其名以工部尚書致仕卒年九十王栖曜濮陽人性謹厚善騎射累授試金吾衞將軍袁鼂亂浙東栖曜與戰日十餘遇生擒鼂授浙西都知兵馬使李希烈陷汴州將襲宋州栖曜以強弩三干涉水夜入希烈遂不敢東貞元初終鄜防節度使子茂先累官河陽節度使柏良器魏州人父造以獲嘉令死安祿山難乃學擊劒欲報賊父友王奐薦之李光弻遷左武衞中􅀰將年二十四更戰陣六十二李希烈圍陵寕遏水灌之期翌日拔城良器以救兵至擇善射者沿汴渠夜入及旦伏弩發乘城者皆死錄功封平原郡王圖形淩煙閣終左領金吾衞大將軍子耆有縱横學王承宗叛耆詣裴度言願得天子一節馳入鎮掉舌下之乃以左拾遺往既至以大義動承宗至泣下乃請獻二州以二子入質由是聲震一時杜羔洹水人貞元初及進士第有至性父死河北母更兵亂不知所之羔憂號終日及從兄兼為澤潞判官鞫獄有媪辯對不凡乃羔母因得奉養而不知父墓區處晝夜號慟他日舍佛祠觀柱間有文字乃其父臨死記墓所在因是乃得葬元和中為萬年令後厯振武節度使以工部尚書致仕卒諡曰敬子中立開成初尚真源長公主累官司農卿義武節度使居官精明吏下畏服韓宏匡城人莊重寡言沈謀勇斷由大理評事累官宣武節度使憲宗用兵淮西拜為諸軍行營都統使呉元濟平以功加兼侍中封許國公子公武以討蔡功為鄜坊節度使宏弟充累官宣武節度使性節儉厯三鎮居處服玩如儒生乘機決䇿無餘悔世推善將谷感德南樂人又毛仁魏縣人皆以孝行被旌五代梁龎師古南華人太祖鎮宣武得馬五百匹為騎兵以師古將之從破黄巢秦宗權皆有功又破徐州斬時溥表為徐州留後師古自微時事太祖謹甚未嘗離左右及為將出兵必受方畧以行遣攻淮南營清口或請就高為柵師古以非太祖命不聽淮人決水浸之遂見殺唐劉贊魏州人舉進士明宗時累遷刑部侍郎守官以法權豪不可干以私時秦王從榮握兵而驕多過失拜贊秘書監為秦王傅秦王府官屬類多浮薄傾險之徒日獻諂諛以驕王獨贊從容諷諫率以正道及王敗屬官多坐贊得免死晉馬全節元城人晉高祖時累遷廣晉尹留守鄴都全節為人謙謹事母至孝臨政決事必問法如何初徙廣晉過元城衣白襴謁其縣令州里以為榮子令琮少善騎射從其父屢戰有功由是知名宋初累官昭義兵馬鈐轄周馮暉魏州人晉天福中拜義成軍節度徙鎮靈武撫綏邊部凡十餘年恩信大著官至中書令封陳留王暉卒子繼業代領其衆宋開寳二年拜定難軍節度使改鎮定國軍吏民立碑頌其遺愛太平興國初封梁國公宋潘美大名人開寶二年為行營諸軍都部署征嶺南擒劉鋹送京師八年征江南為昇州道行營都監金陵平拜宣徽北院使太平興國四年平并州留屯北邊累官忠武軍節度使封韓國公卒諡武惠子惟􅄉女即章懷皇后也從子惟吉累官天雄軍駐泊都監敭厯中外以勤敏稱趙延進頓邱人姿狀秀整涉獵經史周世宗征淮南延進獻萬縑以助軍授濠州兵馬鈐轄宋初厯知河中府梓相青三州太平興國初討幽薊詔督造礮具八百期以半月延進八日成遼人擾邊命將兵禦之三戰大破之獲人馬牛羊鎧甲數十萬以功遷右監門衞大將軍知鎮州田仁朗元城人宋初爲西頭供奉官從討李重進有㓛還浚五丈河以通漕運乾德中從破蜀秋毫無犯累拜右神武軍大將軍部修河北東路諸州城池數月而就仁朗性沈厚有謀畧頗涉書傳所至有善政宋白大名人年十三善屬文豪俊尚氣節建隆二年擢進士甲科乾德初獻文百軸試拔萃高等累官翰林學士雍熙中與李昉纂文苑英華一千卷凡三知貢舉所得士如蘇易􅂤王禹偁胡宿李宗諤輩皆其人也真宗時官至吏部尚書白贍濟親族世稱其雍睦聚書數萬卷嘗􅀋故事號建章集後進有文藝者必極意稱􅅄如胡旦田錫皆出其門有集百卷柳開大名人幼穎異有膽勇既就學喜討論經義慕韓愈柳宗元爲文開寶六年舉進士累官殿中侍御史雍熙中抗疏願任河北用兵之地以為崇儀使知靖邊軍厯全邠代等州皆有政績有集十五卷作家戒千餘言以訓諸子性倜儻重義嘗過酒肆飲有士人至自京師以貧不克葬親將丐王祐問所費曰二十萬開即罄所有遺之臧丙大名人弱冠好學性剛果有吏幹太平興國初舉進士釋􅄄大理評事淳化初厯知江陵府王延德大名人少給事晉邸遷供奉官高昌國遣使朝貢太宗以遠人輸誠遣延德使焉自夏州渡河經沙磧厯伊州望北庭萬五千里雍熙二年使還撰西州程記以獻真宗時厯左千牛衞上將軍致仕劉筠大名人舉進士詔試􅃟人校太清樓書擢筠第一為祕閣校理預修圖經及冊府元龜累進翰林學士嘗草丁謂罷相制既而謂復留令别草制筠不奉詔曰姦人用事安可一日居此請􅀘外知廬州復召為翰林學士承㫖再知廬州卒筠文辭善對偶尤工詩初為楊億所拔後遂與齊名時號楊劉凡三入禁林三典貢舉性不苟合臨事明達而治尚簡嚴劉越大名人少􅀌貧有學行舉進士知襄城固始二縣有能名遷秘書丞㑹禁中火詔劾火所從起越與殿中丞滕宗諒上疏諫仁宗為罷詔獄又請章獻太后還政太后崩擢嘗言還政者越巳卒贈右司諌官其一子陳伯玉臨河人舉進士丁父喪哀毁墳木連理累遷殿中侍御史天聖五年祀南郊中外以為丁謂復還伯玉上疏曰丁謂因縁險佞私結要權冀移善地請勿原赦帝然之官至尚書工部郎中潘夙美從孫天聖中上書論時政授仁壽主簿累遷湖南轉運使破邵州蠻圍峒九十後知河中府章惇察訪荆湖討南北江蠻猺陳夙憂邊狀以知潭州再知荆南鄂州閻守恭榆次人徙家大名府明道中為并代路兵馬鈐轄守恭性沈勇御軍嚴雖家居如對賓客所得俸祿悉散與人鄧中和長垣人仁宗時舉三禮喪親廬墓終其喪定省往來如事生者二十年􅀒土累墳高三丈郭申錫魏人舉進士仁宗時為侍御史知雜事屢詆權倖無所避种諤取綏州申錫曰邊患將自此始及諒祚反請捐前故聽其子襲爵且言但得重將守邊不要功生事則善矣著邊鄙守禦策以給事中致仕王獵長垣人累舉進士不第慶厯中范仲淹薦為藍田主簿徙林慮令吏民愛信入為諸王侍講英宗在邸尊禮之及即位拜天章閣待制兼侍講方議濮王稱以問獵獵不可帝曰王待侍講厚亦持此説耶對曰臣荷恩厚不敢以非禮名號加于王所以報也帝大悟自是不復議神宗立自工部郎中為本曹侍􅀰致仕張田澶州人登進士歐陽修薦其才通判廣信軍厯知湖州廬州桂州廣州皆有治迹田伉直自喜臨政以清嘗作欽賢堂繪古昔清刺史像日夕師拜之蘇軾讀其書以侔古廉吏李清臣魏人七􅀊知讀書日數千言韓琦聞其名以兄之子妻之舉進士應材識兼茂科歐陽修壯其文以比蘇軾為兩朝國史編修官撰河渠律厯諸志文直事詳人以為不減史漢累官尚書右丞門下侍郎劉航魏人第進士厯知虞城犀浦縣為政寛猛不同兩縣皆治知宿州押伴夏使使者執禮不遜航皆折正之持節冊夏主凡例所遺寶帶名馬卻弗受上禦戎書為河北西路轉運使熙寕大旱求言航論新政不便者五請祠去起知涇相二州終太僕卿劉安世航之子登進士第不就􅃟從學於司馬光光薦為秘書省正字擢右正言進諌議大夫論事剛直一時敬懾目之曰殿上虎章惇惡之安置英梅等州凡投荒七年甲令所載遠惡地無不厯之徽宗即位超知鄆州真定府蔡京既相又七謫至峽州覊管稍復承議郎卜居宋都卒安世儀狀魁碩音吐如鐘家居未嘗有惰容不好聲色貨利其忠孝正直皆則象司馬光郭永元城人少剛明勇決以祖任為丹州司法參軍厯知大谷縣調東平司錄參軍所在有聲遷河東提􅀧刑獄宗澤守京師以大名當衝要檄永守之不數日聲振河朔劉豫來寇大名􅀌城無援永率士晝夜堅守城陷怒罵不絶一家皆遇害永博通今古家藏書萬卷為文不求人知見古人立名節者未嘗不慨然掩卷終日聞兩宫北狩號絶仆地不食者數日其忠義蓋天性然紹興初贈資政殿學士諡勇節金王汝梅大名人始由律學為伊陽簿秩滿遂隱居不仕性嗜書動有禮法生徒以法經就學者兼授以經學諸生咸服其教無敢為非義者同業憫其貧時周之皆謝不受張特立東明人泰和進士厯宣德州司正大初拜監察御史首言世宗諸孫不宜幽囚又言尚書右丞顏扎舒魯與小民爭田失大臣體參知政事徒單武丹諂事近習皆宜罷黜當路者忌其直遂罷歸田里教授諸生元世祖降璽書賜號中庸先生所著有易集説厯年係事記顔扎舒魯舊作顏盞世魯徒單武丹舊作徒單兀典今並改正元王鶚東明人幼聰悟日誦千餘言長工詞賦金正大元年中進士第一厯左右司郎中蔡州陷萬户張柔救之輦歸保州世祖在藩邸遣使聘至進講孝經書易及治道每夜分乃罷及即位首授翰林學士承㫖制詔典章皆所裁定阿哈瑪欲取相位大臣復助之衆莫敢言鶚獨不附卒諡文康有詩文四十卷曰應物集王珍南樂人慷慨有大志金末與楊鐵槍以兵應太祖行營率安濟按已署珍軍前都彈壓宋將彭義斌侵據大名珍棄其家間道走還軍中及元兵擊走義斌珍謂其妻子曰吾非棄汝軰誠不以私愛奪吾報國之心耳後以軍功累授本路行軍萬户子文幹襲爵累遷江南建康道提刑按察使卒於官貧不能歸葬人以此稱之安濟舊作按只今改正靳德進大名人父祥師事陵川郝温兼善星厯金未與母相失母悲泣而盲祥訪得之䑛母目百日復明人稱其孝元初太祖命劉敏行省于燕敏辟祥寘幕下時藩帥得擅生殺無辜者多賴祥以免德進爲人材辯讀書通大義尤精星厯之學世祖命劉秉忠􅃟太史官屬德進以􅃟授天文星厯卜筮三科管勾兄交蝕􅄤次六氣侵移所言休咎輒應時因天象以進規諌多所裨益累遷秘書監掌司天事從征叛王那彥揆度日時率中機會諸將欲剿絶其黨德進獨陳天道好生請待其降從之成宗即位厯陳世祖進賢納諌咨詢治亂之原帝深嘉納授中書右丞累官昭文館大學士知太史院預議中書政事卒贈大司徒諡文穆那顔舊作乃顏今改正張立道大名人年十七備宿衞從世祖北征未嘗去左右至元中使安南並黒水至其國定􅀊貢之禮授大理等處廵行勸農使治昆明池得地萬餘頃皆爲良田教㸑僰蠶桑之法雲南由是富庶又建孔子廟置學舍風化大行累拜雲南行省參政卒于官所著有効古集平蜀總論安南錄熾􅀌城無援賊脅之降嘉開門逐賊力戰以死贈河南江北等處行省左丞太原郡公諡忠烈劉天孚大名人由中書譯史為東平總管府判官厯知寇州許州所至有治績後知河中府陜西行省阿斯罕為亂舉兵至河中天孚日夜治戰守具􅃟丁壯分守要害及阿斯罕入城脅天孚使附已天孚謂幕僚曰吾荷上恩與其辱於賊手不如蹈河以死時河冰方堅乃拔佩刀斫冰北望再拜投水死事平贈護軍彭城郡侯諡忠毅阿斯罕舊作阿恩罕今改正巴顏一名師聖哈喇魯氏隸軍籍􅀩古萬户府世居開州濮陽縣自弱冠即以斯文為己任至正四年徵至京師授翰林待制預修金史既畢辭歸四方來學者千餘人其學務真知力踐不屑事詞章士出其門不問而知其為巴顏氏學者十八年河南賊蔓延河北巴顔渡江北行􅀖人從之者數十萬家至磁與賊遇賊知巴顔名士生劫之將誘以富貴巴顏罵不屈引頸受刃與妻子俱死之贈奉議大夫諡文節巴顏改見順天府人物卞琛大名人游學京師􅀘國子生丁母憂家居至正十二年盜起琛統丁壯數百人擊賊衆潰散被擒賊素知琛脅之降琛唾罵曰我國子生也雖至死不從賊大罵不止賊屢脅不聽乃殺之明周武開州人從太祖定江南征陳友諒平張士誠俱有功累官都督僉事以破西番功封雄武侯卒贈汝國公諡勇襄康祥南樂人母患瘋疾祥晨夕䖍禱疾遂愈繼患瘡癬又禱欲以身代忽徧體皆癬母疾亦愈及卒􅀒土成墳廬其側三年宣德中旌表楊鐸南樂人少􅀌養母至孝及卒廬墓三年身容毁瘁宣德中旌表甘澤開州人正統進士厯御史巡按陜西與武清侯石亨不協謫常熟知縣奔父喪與弟潤俱廬墓三年澤卒潤居母喪復廬墓宏治中旌表侯英開州人天順進士厯官江西按察僉事遭母喪與弟侃俱廬墓三年有白鳥數千繞樹成化中旌表馬宗範開州人爲國子生父喪廬墓盜不敢犯宏治中旌表王鼐長垣人爲諸生父喪有白蛇烏鳥之祥宏治中旌表翟唐長垣人宏治進士擢御史正德四年出按湖廣奏言四川賊首劉烈僣號設官將爲大患宜切圖豫備之策時劉瑾竊柄言路久閉而唐疏中有壅蔽語瑾怒切責久之遷寕波知府有善政以裁抑市舶中官崔瑶被誣下獄謫嵩明知州終陜西副使王綖開州人宏治進士厯户部員外郎署郎中事劉瑾竊政羣閹多請託綖悉格不行遷衞輝知府湖廣副使中官谷大用以迎立興世子至安陸驕恣甚綖不屈棄官歸嘉靖中起河南副使轉山西參政皆有討賊功累擢大理卿綖正直鯁亮居官布衣蔬食如寒士左遷山東參政卒于官石星東明人嘉靖進士官吏科給事中隆慶初以帝任用宦官不親政事上疏極諌詔杖六十絶而復甦星妻鄭誤聞星斃遽觸柱死神宗初起故官累遷工部尚書以四方災傷而織造不巳數有論諌改户部覈邊計建白十四條尋改兵部倭入朝鮮星力主封貢後事壞下獄論死天啟初復官李化龍長垣人萬厯初進士累遷右僉都御史巡撫遼東時泰寕巴圖爾入寇化龍與總兵官董一元伏兵破之邊塞讋服進兵部侍郎播州楊應龍作亂以化龍總督湖廣川貴兼撫四川發兵討平之父喪服除起為工部侍郎總理河道奏開泇河二百六十里以避黄河吕梁之險為漕渠永利厯戎政尚書條上兵食戰守之䇿言甚切至加少傅兼太子太保卒贈襄毅加贈太師巴圖爾舊作把􅈷兒今改正魏允貞南樂人萬厯進士授荆州推官大學士張居正家奴犯法執而杖之擢御史劾兵部尚書呉兑結納權閹不可典中樞又陳時􅁦四事忤執政謫許州判官累遷右僉都御史巡撫山西政聲大著進兵部侍郎卒諡介肅弟允中有雋才舉鄉試第一中進士官吏部主事允中弟允孚舉進士官刑部􅀰中亦有名世稱南樂三魏崔景榮長垣人萬厯進士擢御史劾東廠太監張鯨罪巡按甘肅湖廣河南後按四川播州亂景榮監劉綖呉廣等軍賊平奏蠲蜀一􅀊租卹上東五路罷礦使擢右僉都御史巡撫寕夏申威信省市費邊陲宴如累遷兵吏二部尚書忤魏忠賢奪職崇禎中贈少保朱爵開州人萬厯進士厯吏科給事中嘗論時政闕失因疏趙志皋張位罪三王並封制下爵又切諌謫山西按察司知事天啟中贈太僕少卿董漢儒開州人萬厯進士厯官江南糧儲參政税監陳増恣横其胥役為盜漢儒捕殺之擢湖廣按察使㑹楚宗人華越訐嗣王華奎以王姓子冒襲下撫按勘諸宗以巡撫趙可懷左袒華奎伺而撲殺之時變起倉猝人心恟懼漢儒獨鎮靜故緩其獄已而首惡抵法餘悉平反累遷宣大總督天啟初入為兵部尚書魏忠賢矯㫖欲廕其弟姪為錦衣僉事漢儒上疏力爭言極鯁直㑹丁母憂歸崇禎初進太子太保未及赴召卒諡肅敏成基命大名人萬厯進士改庶吉士授編修累遷禮部侍郎魏忠賢用事絶弗與通及楊漣獄起忠賢指為黨矯㫖奪官崇禎初復起吏部侍郎召見平臺咨方畧力薦舊輔孫承宗尋拜禮部尚書東閣大學士日夜籌畫邊事奏疏數十上咸中機宜以疾歸卒諡文穆李其紀清豐人萬厯進士授工部主事調吏部厯升郎中典􅃟事帝嘉其廉直後以事左遷行人司副遂還里崇禎十五年城陷不屈死本朝乾隆四十一年賜諡烈愍張三傑魏縣人天啟中舉於鄉厯官户部員外郎崇禎末李自成陷京城三傑為賊所執不屈死本朝乾隆四十一年賜諡節愍張力東明人崇禎進士為萊州府推官罷歸李自成陷京師遣偽官至縣力偕同邑紳士誅之為賊將所執大罵而死一年本朝乾隆四十賜諡節愍楊希震長垣人崇禎進士知堂邑縣時􅀊大旱請蠲積逋四萬八千有奇李自成遣偽官至希震結壯士謀誅之事洩被酷刑令供同謀者希震忍死不言賊斷其頭身仆復躍起若擊賊狀賊大驚擲之城外忽白氣亙天久之方散本朝乾隆四十一年賜諡烈愍劉永錫魏縣人崇禎舉人授長洲學教諭明亡後隱居於陽澄湖巡撫欲薦之以疾固辭家貧衣食或不給淡如也常自鼔枻出至中流作歌歌竟而返及卒其友與門人共葬之又大名舉人夏道一明亡不仕率婦子耕績作紡車以自給人以為永錫之亞焉本朝成克鞏基命子順治初授檢討累官内秘書院大學士疏請定曹銓置簿之條以覈功過嚴督撫考察之例以勵法廉立劇邑久任之規以課成效嚴誣告反坐之例以社刁風切中時要悉見施行康熙元年乞休歸優游林下者三十年卒年八十四祀郷賢子光廕補工部員外􅀰出為武昌守道方正自持不惑鬼神之説時妖人朱方旦傾動一時其徒挾􅀔横鄉里光立斃之崔九圍長垣人順治初奉母及妻子館從祖濬縣教諭署中寇至持刅脅母九圍突前救護以頭觸壁身受三刃髪截指落瀕死復甦母賴以全妻劉氏為賊所逼不屈死九圍登辛卯鄉試官白水知縣崔崶長垣人順治進士知山東􅀩陰縣有政聲青兗盜起崶督鄉兵竭力守禦城陷望闕再拜抱印投井死賊至署中索金不得唯圖書數卷而巳郜炳元長垣人順治進士知湖北孝感縣時楚方用兵有賊踞山􅀒固久不下炳元至單騎馳赴賊壘開諭之呼酒劇飲既醉就臥賊感悦遂出降制府奇其才更令招降餘黨先是有吏侵盜庫金炳元窮治之吏亡走賊中言炳元將誘殺降者賊信之聚衆來攻時城無守禦具或勸之逃炳元曰我受國恩不幸墮賊手有死而巳遂死之妻李氏亦遇害閻祚茂祚盛長垣人順治中河決兄弟奉母避水至劉家口舟覆母溺二人呼天呌號同躍入水出沒波濤間數里竟􅀒母而出皆無恙張延禔大名人貢生仕郃陽知縣輕刑薄賦移易風俗會寇起城陷延禔罵賊賊壯其直不加害尋卒祀鄉賢胡鑣南樂人順治中武進士累官浙江遊擊康熙十四年耿精忠叛山寇應之鑣謹斥堠嚴巡緝寇不敢犯未幾賊分犯台州賊渠脅鑣降鑣以一矢傷其額賊渠盡驅其衆來攻鑣復手刃二十餘人力竭赴海死事聞贈參將張可久魏縣人順治中武進士累官廣東水師營遊擊值賊犯境可久率所部兵迎戰力竭死之事聞議卹魏體仁南樂貢生官永清訓導母谷氏病癰症體仁侍奉十三年未嘗解衣而寢性廉介不茍取予知縣田慶曽重其人嘗貽銀五十兩力辭弗受善書法亦能詩同縣民李立春事親至孝父母歿俱廬墓三年康熙年間旌于世俊長垣人父南極為于光毆死世俊時年幼欲報未能時懷刅以伺越數年遇於酒家誘之醉擊碎其首詣縣自首有司嘉其孝奏釋之王士本大名人邑諸生性篤孝七􅀊時母病􅈼天求代母尋愈後母卒廬墓三年歸省其父足未嘗至私室雍正年間旌閃文繡大名人由武進士累官河北鎮總兵居官二十年廉潔自矢惟以練兵核餉爲務戎政肅然雍正年間晉階議政大臣奉噶爾卒於軍事聞命征準賜􅀕葬張貽忠長垣人廩生嘉慶十八年教匪滋事遇賊被􅆷同縣武生崔清彪東明縣生員戴丙寅監生何庠元俱遇賊捐軀先後賜卹流寓漢王賀東平陵人與東陵終氏爲怨乃徙魏郡元城委粟里爲三老魏郡人德之鄭均任城人常稱疾家居不應州郡辟召郡將欲必致之既至卒不能屈於是客於濮陽建初三年司徒鮑昱辟之後舉直言並不詣晉祖逖范陽遒人僑居陽平年二十四陽平辟察孝廉司隸再辟舉秀才皆不行唐王義方漣水人客於魏􅀌且窶事母甚謹後官侍御史以劾李義府貶萊州司户參軍􅀊終不復調往客昌樂聚徒教授隱居不出宋高頔雍邱人爲天雄軍掌書記以病免居於魏符彥卿待之甚厚及彥卿罷鎮其故時將吏賓客無敢復遊魏者惟頔清苦守法魏人愛之在魏三十年無一人言其非者元竇黙肥鄉人元兵至南走渡河又走德安謝憲子以伊洛性理之書授之適中書楊惟中奉㫖詔集儒士黙乃北歸隱於大名與姚樞許衡朝暮講習至忘寢食列女唐劉元佐母滑州匡城人元佐貴母尚月織絁一端示不忘本數教元佐盡臣節見縣令走廷中白事退戒曰長吏恐懼卑甚吾思而父吏於縣亦當爾而據案當之可安乎元佐感悟待下益加禮宋劉安世母安世初除諫官未拜命入白母曰朝廷不以安世不肖使在言路須明目張膽以身任責脫有觸忤禍譴立至主上方以孝治天下若以老母辭當可免母曰不然吾聞諌官為天子諍臣汝父平生欲為之而弗得汝幸居此地正當捐身以報國恩得罪流放無問遠近吾當從汝所之於是受命元王德政妻郭氏大名人少􅀌事母張氏孝謹以女儀聞於鄉及筓富貴家慕之爭求聘張氏不許時德政教授里中年四十餘貌甚古陋張氏以貧不能教二子欲納德政為婚使教之宗族皆不然郭氏慨然願順母志既婚與德政相敬如賓屬教二弟有成未幾德政卒郭氏年方二十餘勵節自守甚有貞名大德間表其家馮淑安字靜居大名宦家女山陰縣尹山東李如忠繼室也如忠初娶􅀩古氏生子任數年而卒大德五年如忠病篤馮引刀斷髪誓不他適既沒兩月遺腹生一子名伏李氏及􅀩古氏之族至山陰盡取其貲及子任以去馮不與較一室蕭然朝夕哭泣久之鬻衣權厝如忠􅀩古氏兩柩攜子廬墓側時年二十二􅀊羸形苦節為女師以自給父母憐其􅀌苦欲使更事人馮爪面流血不肯從居二十年始護喪歸葬汶上齊魯人聞之莫不歎息明楊善妻劉氏魏縣人生一女幼有志操正德六年流賊至執女而去劉追奪賊并欲執劉劉曰吾雖死不受辱賊殺之挾女上馬女奮手擊賊面流血賊怒刳其腹而死同縣閻氏女閻蘭妻韓氏皆以罵賊不屈見殺張妻房氏大名人與母避亂相失遇寇掠之紿曰有母在前俟覓得從汝寇遣之遂赴井死姜從仁妻王氏清豐人賊至抱一􅀊兒避難賊將追及即投井死賊怒射之後出其屍身貫數矢同縣楊布娥張金臺孔穿臺三女皆以罵賊不屈見殺郜仁妻邵氏長垣人仁卒遺二􅀌長甫三􅀊幼在襁褓氏紡絍自給事姑羅氏盡孝訓二子皆成立次子永春登進士隆慶中詔旌其門同縣毛秀妻王氏流寇至不屈見殺麻鐩繼妻和氏大名人年十七適鐩四年而寡子甫一􅀊前子甫六􅀊和拜其母飲毒死崔氏女魏縣人幼字張魯及笄魯以罪繫獄女聞内自傷悼麤衣素食每夕焚香􅈼天祈免魯罪母兄數欲令改適女誓死不從厯五年魯得免