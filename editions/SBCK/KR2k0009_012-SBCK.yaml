front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_012-1a}
body:
  text: 大名府在直隸省治西南八百里東西距一百二十里南北距三百六十里東至山東東昌府冠縣界四十里西至河南彰德府臨漳縣界八十里南至河南開封府儀封廳界三百一十里北至東昌府館陶縣界五十里東南至山東曹州府定陶縣治三百里西南至彰德府内黄縣治九十里東北至山東臨清州治一百五十里西北至廣平府成安縣治八十里自府治至京師一千一百二十里分野天文室壁分野娵訾之次按唐書天文志營室東壁娵訾也自危十三度至奎一度今大名府以及開州境内正當其地爲衞分野建置沿革禹貢冀兗二州之域府地屬冀開州以南屬兗春秋屬晉衞二國戰國屬魏衞二國秦屬東郡漢分屬魏郡南境為東郡及陳留郡地後漢建安十八年分魏郡置東部都尉三國魏黄初二年以東部置陽平郡晉因之元和志前燕慕容暐於今州理置貴鄉郡尋廢後魏為陽平郡地時郡徙治館陶今屬山東東昌府元和志作石趙時徙郡東魏天平初改屬魏郡後周大象二年始分相州置魏州隋大業初改為武陽郡唐武德四年復曰魏州龍朔二年改曰冀州置大都督府咸亨三年罷府復曰魏州開元二十一年置河北採訪使天寶元年改曰魏郡乾元元年復曰魏州廣德元年置魏博節度使建中三年田悦嘗改州為大名府尋罷天祐元年賜號天雄軍節度五代唐同光元年升為東京興唐府三年改為鄴都晉天福初改為廣晉府漢乾祐元年始改曰大名府周顯德元年罷都仍為天雄軍節度宋初因之慶厯二年建為北京熙寕六年分為河北東路金初為散府正隆二年升為總管府置大名府路貞祐二年置行尚書省元志金改安武軍而金志不載元曰大名路屬中書省明曰大名府直隸京師本朝初因之領州一縣十雍正三年以内黃縣改屬河南彰德府以濬滑二縣改屬河南衞輝府乾隆二十三年裁魏縣分屬大名元城今領州一縣六大名縣附郭在府治南偏東西距九十二里南北距九十里東至元城縣界二里西至河南彰德府臨漳縣界九十里南至清豐縣界七十里北至元城縣界二十里東南至南樂縣界十八里西南至河南彰德府内黃縣界六十里東北至元城縣界八里西北至廣平府廣平縣界五十里本治府南少東八里南樂鎮漢為元城縣地東魏以後為元城貴鄉二縣地宋政和六年移大名縣來治金廢為南樂鎮元至元九年復移來治明洪武初省三十一年復置於府郭永樂九年復移來治屬大名府本朝乾隆二十三年移治府城元城縣附郭在府治北偏東西距七十七里南北距七十五里東至山東曹州府朝城縣界七十五里西至大名縣界二里南至南樂縣界三十里北至山東東昌府館陶縣界四十五里東南至南樂縣三十里西南至大名縣界八里東北至東昌府冠縣界三十五里西北至廣平府廣平縣界五十里漢置元城縣屬魏郡後漢因之三國魏為陽平郡治晉因之後魏移郡治館陶以元城為屬縣東魏天平初改屬魏郡又析置貴鄉縣北齊省元城入貴鄉後周於貴鄉縣置魏州隋開皇六年復置元城縣大業初以貴鄉為武陽郡治唐初復十二里南北距四十里東至山東曹州府觀城縣界三十七里西至河南彰德府内黄縣界二十五里南至開州界十五里北至南樂縣界二十五里東南至曹州府濮州治六十里西南至開州治四十里東北至南樂縣治四十里西北至大名縣治九十里漢置頓邱縣屬東郡後漢建安十七年割屬魏郡晉泰始二年於縣置頓邱郡後魏因之北齊郡縣俱廢隋開皇六年復置頓邱縣屬武陽郡唐初屬魏州武德四年於縣置澶州貞觀元年州廢還屬魏州大厯七年復置澶州又析置清豐縣屬之五代晉天福三年州徙德勝寨縣隨州徙廢舊州為頓邱鎮四年改鎮置德清軍宋慶厯四年徙清豐縣治德清軍屬開德府金屬開州元仍舊明初改屬大名府本朝因之東明縣在府南二百二十里東西距六十里南北距八十五里東至山東曹州府界三十里西至長垣縣界三十里南至河南開封府儀封廳界六十里北至開州界二十五里東南至山東曹州府定陶縣治一百里西南至長垣縣治七十里東北至山東濮州治一百五十里西北至開州治九十里漢置離狐縣屬東郡後漢建初四年改屬濟陰郡晉魏因之隋仍屬東郡唐屬曹州天寶元年改曰南華五代宋因之金初為河所圮省入冤句尋移東明縣來治仍屬曹州元太宗七年改屬大名路至元三年改屬開州明洪武初省入長垣宏治四年復置屬大名府萬厯中屬開州本朝仍屬大名府開州在府南一百二十里東西距一百二十五里南北距一百里東至山東曹州府濮州界五十五里西至河南衞輝府滑縣界七十里南至東明縣界六十五里北至清豐縣界三十五里東南至東明縣治九十里西南至河南衞輝府濬縣治九十里東北至清豐縣治四十五里西北至河南彰德府内黄縣界十五里古顓頊之墟夏時為昆吾國春秋曰帝邱為衞國都戰國曰濮陽仍為衞都秦始皇五年置東郡漢以濮陽縣為東郡治後漢因之晉咸寕三年改置濮陽國仍治濮陽縣東晉後郡治移鄄城以濮陽為屬縣後魏因之隋屬東郡唐屬濮州五代晉天福三年改置澶州四年移濮陽縣入州治開運元年升為鎭寕軍節度宋曰澶州澶淵郡鎮寕軍節度崇寕四年建為北輔五年升為開德府宣和二年罷輔郡屬河北東路金仍曰澶州皇統四年改曰開州屬大名府路元屬大名路明洪武􅀄以州治濮陽縣省入仍屬大名府本朝因之長垣縣在府西南二百五十里東西距七十里南北距六十五里東至東明縣界四十里西至河南衞輝府滑縣界三十里南至河南開封府蘭陽縣界四十里北至滑縣界二十五里東南至開封府儀封廳治一百里西南至開封府封邱縣界三十里東北至東明縣治七十里西北至滑縣治九十里春秋衞地戰國魏首垣邑漢置長垣縣屬陳留郡後漢為長垣侯國晉復為縣屬陳留國後魏太平真君八年併入外黄景明五年復置屬東郡隋開皇十六年改曰匡城仍屬東郡唐屬滑州五代梁復曰長垣屬開封府後唐復曰匡城宋建隆元年避諱改曰􅛃邱尋復曰長垣仍屬開封府金泰和八年以限河不便改屬開州元初屬大名路至元二年仍屬開州明因之本朝屬大名府形勢屹屹魏土山河之固宋劉攽魏京詩矗如巨防扼為要舊土城周二十四里門四濠廣一丈宋時舊址明宏治以來相繼修築長垣縣城周八里有奇門四濠廣四丈六尺明正統十四年築崇禎十年甃甎本朝康熙年閒修雍正九年築䕶城隄學校大名府學在府治東南明永樂元年建本朝康熙十一年修入學額數二十名大名縣學舊在縣治西南明洪武三年建本朝乾隆二十三年縣移附府城學署併入元城縣學入學額數十五名又大名鄉學在舊魏縣東南本魏縣學本朝乾隆二十三年裁改入學額數十六名元城縣學在縣治西北明永樂元年建入學額數十五名南樂縣學在縣治東南明洪武三年建入學額數十五名清豐縣學在縣治北明洪武七年建入學額數二十三名東明縣學在縣治東南明洪治中建入學額數二十三名開州學在州城東門内元大德間建入學額數二十三名長垣縣學在縣治西明洪武元年建入學額數二十三名以上各學本朝俱屢修天雄書院在府治本朝康熙十年建乾隆二十三年大名縣移治郡城以書院改為縣署以舊通判署移建書院仍名天雄元城書院在府治西南明正德中建祀宋劉安世繁陽書院在南樂縣治本朝康熙二十四年建廣陽書院在清豐縣治本朝乾隆二十二年建扶義書院在東明縣治明隆慶中建本朝順治八年圯于水乾隆二十九年重建明道書院在開州治明嘉靖中建祀程子寡過書院在長垣縣治本朝康熙五十九年建户口原額人丁四十一萬七千六百二十八今滋生男婦大小共一百九十六萬四千八百七十二名口計四十四萬二千五百一十五戸田賦田地六萬五千八百六十七頃七十七畝一分有奇額徵地丁正雜銀三十三萬八百三十四兩一錢三分三􅁵粟未四十二石一斗二升七合小麥四十二石一斗二升七合山川愜山在大名縣北元和志貴鄉縣古堰今名愜山在縣西九里漢成帝時河決金隄河隄使者王延世募人運土塞河之處以其愜當人情故謂之愜山明統志愜山在大名縣北十五里舊志土阜突然卉木周鬱沙麓山在元城縣東舊作沙鹿春秋僖公十四年沙鹿崩公羊傳沙鹿者何河上之邑也穀梁傳林屬於山為鹿沙山名也漢書元后傳王翁儒既徙魏郡元城委粟里元城建公曰昔春秋沙鹿崩晉史卜之曰後六百四十五年宜有聖女興其齊田乎今翁儒徙正直其地日月當之元城郭東有五鹿之墟即沙鹿地也後八十年當有貴女興焉後元后厯漢四世為天下母水經注周穆王喪盛姬東征舎於五鹿其女叔㛗届此思哭是曰女㛗之邱為沙鹿之異名也元和志沙鹿在縣東十二里明統志沙麓山在府城東四十五里方山在南樂縣北七里舊有二上山並峙其形正方宋嘉祐以後大河經縣境蕩決不時遂為平陸其地名方山村秋山在清豐縣西元和志在頓邱縣西北三十五里今無攷龍光山在東明縣東南三十里以雲氣如龍而名歲旱禱雨有應白雲山在東明縣東北二十里郊原平衍土山突起相傳張良辟穀於此其里曰白雲里相近又有懐良村金沙山在開州治東迤北宋建炎閒楊棣守開德金師來攻棣與弟彭年力戰死之人為􅄟骨立冢如山因以沙名又有雞鳴山在州城内蓮花沼後洪洋山在開州東南五里土岡綿亙數里山南有浮翠橋即澶水所經寰宇記有衞陽山在濮陽縣東南二十里居衞之陽又鮒鰅山在頓邱縣西北三十里今名廣陽山山海經云顓頊葬其陽九嬪葬其陰今皆不知所在按鮒鰅山海經作務隅又作附禺五霸岡在東明縣東南五十里相傳春秋時會盟處亦名霸王岡黄陵岡在東明縣東南八十里接山東曹縣界元時賈魯治河始此詳見曹縣大岡在長垣縣東五十里雄隄環抱形勢屹然荆岡在長垣縣東南四十里荆岡集岡項當集之中岡畔有琉璃井青岡在長垣縣西二十里平地突起土皆青色故名岡頂有寺下有白蓮池學堂岡在長垣縣北十里平廣突兀近岡土皆赤色相傳孔子嘗過此講學今有廟明天順中建其前又有小岡形勢連互又金哀宗興定二年濟河至蒲城次漚麻岡應在今縣界古黄河有三道一自河南滑縣流入經開州西北又東北經清豐縣南又東北經南樂縣西北又東北經元城縣東又東北入山東館陶縣界此西漢以前黄河經行之故道也漢書武帝紀元光三年春河水徙從頓邱縣南流入勃海夏河水決濮陽汜郡十六發卒十萬救決河溝洫志河至大伾禹釃二渠以引其河北載之高地過洚水元光中河決瓠子後二十餘歲乃塞之道河北行二渠復禹舊迹孟康曰二渠其一出貝邱西南南折者也其一則漯川河自王莽時遂空惟用漯耳水經注河水自涼城又東北爲長夀津故瀆出焉一則漯川今河所流一則北瀆王莽時空故俗名是瀆爲王莽河東北逕戚城西又逕繁陽縣故城東又北逕陰安縣故城西又東北逕昌樂縣故城東又東北逕平邑郭西又東北逕元城縣故城西北而至沙邱堰自堰南分屯氏河出焉元和志王莽河西去昌樂縣十六里去貴鄉縣三里寰宇記王莽河在頓邱縣北十里接清豐入南樂縣界又在德清軍城西南五里一自滑縣流入經開州西南又東北經清豐縣南又東北入山東觀城縣界此東漢以後及唐時故道其自開州又東北岀逕大名元城之東者宋時北流故道也水經河水東逕鐵邱南東北流逕濮陽縣北為濮陽津又東北逕衞國縣南元和志黄河