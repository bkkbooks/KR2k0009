body:
  text: 俱為蠻獠地按明統志唐元和中置藺州而唐志不載宋為瀘州江安合江二縣地元初置西南番總管府至元二十五年改為永寕路按元史本紀是年改後又見二十七年郭子章黔記作中統元年改為路而元志皆不詳隸四川行省至正中改永寕宣撫司見天順統志黔記作元統元年改為永寕鎮邊都元帥軍民宣撫司明洪武四年改為永寕安撫司又增置永寕衞分屬貴州都司八年復升安撫司為宣撫司隸四川布政使司天啟三年置同知轄之隸敘州府時宣撫司已廢本朝因之康熙初以永寕衞隸貴州威寕府二十六年改衞為縣仍隸威寕府雍正五年併為永寕縣改屬四川敘州府八年復設同知乾隆元年升為敘永直隸廳屬四川省領縣一永寕縣在廳治西東西距七十里南北距一百八千里東至本廳界十里西至雲南昭通府鎮雄州界六十里南至廳界三十里北至瀘州納谿縣界一百五十里東南至貴州大定府畢節縣界一百里西南至廳界四十里東北至廳界十里西北至敘州府興文縣界百二十里建置與廳同形勢環城皆山曡翠如屏馬口崖鎮其北漁漕溪横其南明統志東連貴播西接敘瀘南距芒部北抵合江水陸交通黔蜀分界黔記風俗習俗鄙陋性格野樸不事商賈惟務農桑明統志城池敘永廳城有東西二城東城在永寕河東舊爲永寕縣治周二里四分有竒水門一西城在河西舊爲永寕衞治周三里七分有竒門五水門二皆明洪武五年建本朝康熙四年修乾隆三十三年三十六年重修以東城爲廳治西城爲縣治學校敘永廰學在􅆹治西舊在治東明爲宣撫司學本朝康熙七年設廳學建於西城外二十二年遷建今所三十六年修乾隆四十一年重修入學額數十二名永寕縣學在縣治東即舊衞學明正統八年建本朝順治十七年修康熙二十五年修雍正年間改隸敘永廳始設縣學入學額數十二名丹山書院在廳治北門外本朝乾隆三十年建四十三年修蓬萊書院在廳治南門舊在學宫側本朝乾隆七年建嘉慶六年遷建今所户口原額户一萬八百六十六今滋生男婦共二十萬三千八十八名口計七萬一百五十六户田賦田地二千五百七十八頃四十四畝五分有竒額徵地丁正雜銀五千八百九兩六錢八釐山川天馬山在廳城東門外又有文筆山亦在城東獅子山在廳東南明天啟初永寕逋賊奢崇明借兵水西安邦彦遣兵過赤水河道獅子山即此青龍山在廳南二里形如青龍寶真山在廳西二里烏降山在廳西北五十五里林木蓊鬰紅崖山在廳東北十里山多赤石如列錦屏旁有紅崖砦明天啟初川兵追奢崇明連克紅崖天台二砦三年貴州總兵魯欽自遵義直入賊巢進營紅崖砦山即此土保山在永寕縣城内昔有夷人土保居此因名西珠山在永寕縣城内山形圓瑩如珠黔記城内有寶珠山又有鐘鼓二山雪山在永寕縣東一百里赤水衞北二十里明統志高峻巉巖幽隱莫測方冬積雪春盡始消秀林山在永寕縣東南廢普市所南二里竹樹蔚然森秀又所北有錦屏山木案山在永寕縣東南十五里上多林木下平如案縣志在普市所東二里海漫山在氷寕縣西五十里延袤八十餘里如海之汗漫匹絹山在永寕縣西七十里山頂瀑布飛流宛如匹絹馬口崖在廳西南又有南華崖在廳西一百六十里又西二十里為梅子坎龍洞在廳西一百里禱雨有􅀿相近又有魚洞灘高二丈許春夏之交魚多躍出關索石在廳南二十里大道旁舊志相傳關索惡此石截路以戈擊之一留道旁一飛墮道東刀痕宛然羅付大河在廳東接貴州遵義府界其下流東南入烏江永寕河在廳西南一名水東九姓司西南五十里舊志相傳昔有天鵞羽如黄金游池内至暮飛去因名明成化三年都掌蠻為亂議者欲分兵三路南路從金鵞池進攻大壩既而督臣程信分遣别將羅秉忠由金鵞池進搗都掌蠻陶公灘在廳東南即羅付大河所經也靈湫泉在廳西五十里有山洞深二丈許泉出其中四時不竭雙井在廳南四十五里又有古井在普市所城内古蹟永寕舊城在今縣西黔記永寕舊治在城西八十里馬口崖漁漕溪之間即元永寕舊址明洪武五年李文忠遷於今治廢藺州在廳東九十里唐元和初置有碑在唐朝壩今剥落宋乾徳二年廢赤水廢衞在永寕縣東一百八十里明洪武中置屬四川都司本朝康熙間裁太平廢司在廳西地名大壩廣二百餘里元置大壩軍民府明初廢成化四年改大壩為太平川設太平長官司後廢今為大壩營界首茶課廢司在廳西北二里明洪武六年建後廢普市廢所在永寕縣東南五十里舊志明洪武二十二年普定侯設普市守禦所於木案山下因士民曾為市貿易於此故以為名本朝康熙二十六年省入永寕縣米利城在廳北八十里有大田常無水旱憂米穀成熟故名關隘魚浮關在廳東三里明洪武四年建又有箐口關在廳東箐口嶺上赤水河關在廳東一百五十里雪山關在廳東一百里吼西關在廳南一百二十里與鎮雄州接壤青岡關在廳西三十里亦曰青岡坪明天啟初巡撫朱變元討奢崇明敗賊於青岡坪直抵城下一鼓拔之又有猫兒關在廳西五十里舊為苗人出沒處三塊石關在廳西北六十里鄢家關在廳西北八十里江門關在廳西北一百里即江門水驛也道出瀘州納谿縣梯口關在廳北九十里又有大鬬坎口關在廳北百里舊皆為戍守處鎮逺關在永寕縣西古藺州巡司在廳東一百九十里古藺州地本朝雍正七年置赤水鎮在永寕縣東二百四十里舊赤水䘙本朝雍正七年移縣丞駐此大壩營在廳西六十里有城周三里有竒明置太平長官司本朝設都司駐防嘉慶二十四年改設守備赤水營在永寕縣東南本朝設守備駐防舊名龍場營乾隆四十年移駐赤水河改今名永安驛在廳南又普市驛在普市赤水河驛在赤水鎮俱設馬站津梁上橋在廳城東南隅今名蓬萊橋下橋在廳西南隅今名永和橋通濟橋在廳東南二里永福橋在廳北十五里陵墓元梁王墓在永寕縣東赤水城西三十里明宋球諸人墓在廳治明末死流賊難諸生宋球等數十人合葬於此邑人謂之積骸墓祠廟昭忠祠在廳治北本朝嘉慶八年建寺觀崇福寺在廳南半里水中山上亦名定水寺明洪武中建萬夀寺在廳西一里明永樂元年建名宦明周敦吉佚其籍天啟元年官遊擊大兵戰於渾河死之本朝乾隆四十一年賜諡烈愍本朝周尚功豐城人康熙年間官永寕遊擊賊將胡國柱陷城被執不屈罵賊而死一家二十口俱罹害魯明芝鍾祥人康熙十一年官永寕中營守備以不從吳三桂棄官家永寕十九年賊將胡國柱圍城明芝􅁬勇率士卒登陴守禦城陷死之費雅達滿洲正白旗人官陜西漢羌鎮總兵康熙十九年調守永寕賊將圍城同提督王之鼎協力固守􅀌軍乏援城陷與賊戰殺賊無算力盡死之郝全善佚其籍康熙初官固原提標遊擊從將軍王進寶討呉逆被執不屈絶食六日而死人物明侯良柱永寕衞人天啟初累官四川副總兵討奢崇明父子復遵義城崇禎二年敗崇明等於鵞頂嶺俘其黨數千人積年巨寇平後為總兵官流賊入寇拒於綿州陣亡子天錫捐貲繕甲請與賊血戰授逰擊本朝乾隆四十一年賜諡忠烈張令永寕衞人初為奢崇明土目崇明叛令斬崇明子寅首以獻擢為副總兵官崇禎末調守䕫關守川北毛浴隘統領通巴五路賊不敢近川境者數年一日流賊擁衆猝至令徒歩戰於下關城力盡死之本朝乾隆四十一年賜諡忠烈劉佐聖永寕衞人奢崇明叛佐聖曉以大義賊刃之楊興旺永寕衞人崇禎末為獻賊將孫可旺所􅀗罵賊死妻徐氏及三子俱被害李忠臣永寕衞人官松潘參政家居奢崇明之亂募死士約總兵官楊愈懋令大兵薄賊已為内應事洩闔門遇害胡縝永寕衞人預䇿奢崇明必反上書當事當事不為意後賊起被執嚴刑錮獄中弟緯傾家救免之乃糾義徒潛結張令等執偽相何若海部勒行陣自當一面數有斬馘賊甚畏之既而為火藥焚死宋球永寕衞人明末諸生流賊犯境球與同庠費國柱桑毓日唐一䕫何天寵等密約總兵王應熊外援事露􅀍害應熊收骸合葬焉本朝閻有貴永寕人康􅄉十九年呉三桂犯境城陷被執不屈死陳琳敘永人官永寕協把總乾隆間從征金川陣亡䘏廕如例劉俸永寕人乾隆閒由行伍從征金川累功擢松潘營守備攻克美諾賞戴花翎金川平以戰功擢松潘鎮總兵並駐懋功治屯田四十九年以金創乞病歸卒賜祭葬􅄻祀如例同縣外委鍾鄰孫洪緒孟倫戴之禮把總陳起龍孟以仁黃世貴游耀鯤守備張芸俱於金川陣亡均䘏廕如例姜敏功敘永人􅀉籍綿州官貴州參將嘉慶二年隨􅁹敎匪於合州楊家崖陣亡又外委羅永春亦是年於巴州陣亡䘏廕均如例羅尚仁永寕人官把總嘉慶四年隨􅁹教匪陣亡䘏􅄻如例同縣遊擊張明外委李進王儆俱􅁹教匪陣亡卹􅄻均如例列女明聞克明妻樊氏永寕宣撫司人少寡苦節教子道立領􅀸薦周登順妻張氏永寕宣撫司人夫亡守節教子于用成名出仕楊興旺妻徐氏永寕衞人崇禎末興旺罵賊死氏及三子俱被害本朝江姑永寕人普市所官江之鴻女年十六未字亂離失散守正捐軀康熙三年旌又張問達妻李氏吳逆掠境氏恐被厚赴水死劉勷妻呉氏永寕人夫亡守節雍正年間旌劉澤遠妻解氏敘永人夫亡守節同廳節婦李茂莊妻孟氏魯長發妻張氏王縉妻魯氏均乾隆年間旌李其進妻彭氏永寕人夫亡守節同縣節婦台相臣妻路氏烈婦張其信妻羅氏均乾隆年間旌蒲文衡妻李氏敘永人夫亡守節同廳節婦龍鼎璠妻胡氏胡峻妻何氏王有萬妻曾氏胡居恒妻姚氏陳調妻彭氏陳瑫妻􅀽氏賈維珍妻朱氏烈婦呉光祖妻廖氏均嘉慶年間旌又胡氏女許字未婚夫卒誓死守貞以終入祀節孝祠官懋績妻周氏永寕人夫亡守節嘉慶年間旌土産黃精笻竹㯶竹冬笋月竹高徑尺餘每月出一笋苦練子以上俱見舊志前提調官臣鄭紹謙恭纂輯提調官臣張日章恭覆輯校對官臣鄧遇辰恭校校對官臣宗稷辰恭覆校大清一統志松潘直隸廳在四川省治北九百五十里東西距二百七十七里南北距二百二十里東至小河營八十七里西至生番界一百九十里南至曡溪營界一百九十里北至漳臘營界三十里東南至平番營界七十六里西南至雜谷土司界二百里東北至南坪營界三百里西北至黄勝關草地界八十里自廳治至京師六千十里分野天文井鬼分野鶉首之次建置沿革禹貢梁州之域周氐羌地秦置湔氐道漢屬蜀郡後漢因之晉改置升遷縣屬汶山郡宋廢後魏為吐谷渾地周天和元年置扶州總管府及龍涸郡嘉誠縣隋開皇初府廢三年郡廢七年州廢以縣屬同昌郡唐武德元年復于嘉誠縣置松州貞觀二年置都督府督羈縻二十五州後多至一百有四州皆生羌部落屬隴右道永徽後改屬劒南道天寶初改交川郡乾元初復曰松州廣德初陷於吐蕃宋仍為吐蕃地元屬吐蕃等處宣慰司明洪武十一年置松州潘州二衞尋併為松潘衞二十年改松潘等處軍民指揮使司隸四川都司嘉靖四十二年復改松潘衞本朝因之屬龍安府雍正九年改設撫民同知乾隆二十五年改為松潘直隸廳屬四川省形勢東南雪嶺西北洮河雨雪多寒山川險峻松潘志風俗刻木契以成交易炙羊膊以斷吉凶番多漢少松潘志城池松潘廳城周九里七分門五東南面平西北枕山大江貫其中城南有外城周二里門三明洪武十七年建本朝乾隆三十六年修學校松潘廳學在廳治東明景泰三年建本朝康熙中修入學額數六名户口原額人丁一萬二十四今滋生男婦共七萬九千二百五十八名口計