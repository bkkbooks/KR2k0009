front:
  text: 大清一統志敘永直隸廳在四川省治東南九百九十里東西距二百五十里南北距三百里東至貴州遵義府仁懷縣界二百里西至敘州府界五十里南至雲南昭通府鎮雄州界二百二十里北至瀘州納谿縣界八十里東南至貴州大定府畢節縣界一百五十里西南至鎮雄州界七十里東北至仁懐納谿二縣界一百二十里西北至敘州府界八十里自廳治至京師八千七百八十里分野天文井鬼分野鶉首之次建置沿革禹貢梁州南境漢為犍為郡地晉宋及唐
