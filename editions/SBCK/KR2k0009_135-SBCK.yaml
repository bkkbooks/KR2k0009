軍政事確實不阿權貴州守李燾薦之於朝姚孳知桃源縣興利除害知無不為縣有虎患孳默禱於社諭以文三日虎自死於社祠劉龜年祥符人淳熙中知武陵縣境多荒田冒耕者衆展轉訴訟龜年予奪公平訟為少息邑有淫祠曰潘仙人惑之龜年命撤屋毁像部使者以治行聞詔注姓名中書龜年竟不肯謁時相歸王銖紹熙元年知常德府言沿􅁁城寨官廩祿既薄給不以時􅀌寒小吏熟視姦猾狥私受賕弓手土軍戍卒傭値糧食累月不支致迫於饑寒侵漁蠻獠乞嚴飭州軍按月廩給如其未支守倅即不得先請己俸俾城寨官兵有以存濟安邊弭盗莫此為急林夢英臨川人紹熙元年知武陵縣寛愛黎民嚴戢姦宄武陵舊無學夢英創立之嘗誨諸主曰今之士涉獵以為博組繪以為工不知治心非學也聞者感發稱房山先生吕午歙縣人嘉定中知龍陽縣豪民陶守忠殺人正其獄誅之以循吏稱桂萬榮理宗朝以朝散大夫􅀡寶章閣知常德府盡心民事尤精刑獄龔曰昇咸淳五年知常德府除苛政寛徭賦修學校遇旱禱雨甘霖隨至尹穀長沙人為常德府推官廉正有聲元倪德政蘇州人至元間以常德路總管兼尹事朝廷命造戰艦三百餘艘仍令運餉千餘萬斛德政委官輦材於所產造丹如數又私僱賈人巨艘以運餉事集而人不告勞必特雅乃蠻部人至元十六年為常徳路副逹嚕噶齊㑹李明秀作亂以單騎往招􅀡抵賊壘諭以朝廷恩德使為自新計明秀素畏服遂與俱來因聞於朝明秀伏誅賊遂平必特雅舊作别的因達嚕噶齊舊作達魯花赤今改正哈商常德府判官開北門外至潛水十五里使濟旱利民至今賴之苗益知龍陽州嵗洊饑峒寇侵掠益請於朝以所受宣命貸鈔三十餘錠賑濟後擢常德路總管明張子俊洪武初知常德府興學延師選俊秀入學教育之舉郷飲酒禮使民知禮義青文勝四川人洪武閒龍陽縣典史邑濱大江田成巨浸催科額凡三萬七千餘石民不堪命文勝詣闕請免章凡三上不報遂自縊登聞鼓下因得盡免積逋定額一萬三千石民立廟祀焉萬厯閒詔名為惠烈祠應履平奉化人永樂中知常德府嵗苦麥稅履平以非土產請易以米詔許之嵇都建昌人宣德中知桃源縣寛徭緩賦民樂其平易王績華亭人成化中知常德府持身峻潔人不敢干以私􅀊大旱禱於龍門洞洞幽邃績縋而下必窮其處乃大雨士民感悅考滿入覲卒於途妻子貧不能歸同知胡琮率民賻之乃得還胡琮長洲人成化間常德府同知邑罹旱澇而龍陽圍隄尤甚琮倍加賑恤奏免稅租什之七黃珂遂寕人成化閒知龍陽縣興學校理冤滯嵗饑請於主者得銀萬餘兩賑恤之以治行擢御史狄雲漢太倉人成化閒授沅江縣縣俗樸野雲漢尚寛靜民愛信之巡撫嘗按部至無一人訟者歎其德化而去秩滿行槖蕭然應龍西安人宏治間知武陵縣有治劇才時藩封初建龍供億精辦民忘其役每邨設義囤積穀備賑考績最士民赴闕奏留詔增其秩令復任王禾宛平人正德中知常德府質􅀡嚴明榮王始之藩内侍多所求索少拂意則加窘辱禾曰府庫皆財欲則取之剝民以悦人吾不能也竟不能奪張鉞平度人嘉靖中知沅江縣性剛􅀡有清操時世宗南巡臺省委令支應􅃏精辦詳嚴宦官不敢橫索去任日破釜木筯檢給還民後知常德府黃鳳翔雲南人嘉靖中知桃源縣政先德化聴訟不事箠楚或涉倫理輒自引責民皆感愧時陵工急鳳翔為民代輸及去皆流涕送之張澤桐城人嘉靖中知沅江縣境多曠土招民耕墾給牛種時巡阡陌省民疾苦兼攝武陵縣事峒蠻為患以竒兵擣賊巢生縶其魁朱國柱雲南安寕人崇禎末同知常德府流賊由長沙來寇國柱力不能禦正冠帶而死蔣道亨永明人崇禎末常德府學教授攝武陵縣事賊陷城抱印罵賦死本朝劉舜濬桂林人順治七年知常德府招撫殘黎守城有功百姓德之為建祠祀焉胡向華兩當人康熙閒知常德府修葺學宫及壇宇陂隄􅁵剔徵收招撫流亡盡心經畫境内乂安王興禹奉天人康熙元年常德府推官置義冢廣賑濟居官廉正民建祠以祀王許蓬溪人康熙中知常德府嵗旱竭誠露禱及饑加意賑恤値提督出撫苗城中兵譟許大呼曰朝廷􅀒若耶知府與民一體欲傷民知府先當之譟者立解散事後祇誅首亂者平時課農興學周饑寒茹疏飲水以民事留心郭連城福建人康熙中知龍陽縣清愼自矢嵗旱歩禱大雨隨至吳逆寇縣誓以死守人稱一時砥柱吕又祥沭陽人乾隆中知常德府敏於吏事訟至立予讞結以循理二宇揭於堂戒屬勿操切學門講院修治一新士民祀之沈華呉縣人乾隆中知武陵縣郡隄潰居人震恐華親督甃石捍之隄固如初課書院士夏結棚障日冬致鑪炭有文行者尤優禮之行保甲恤罪囚置義冢七所河街火率役撲滅傷足未幾南門火復躬救之投品服火中願以身代火頓熄祀名宦祠王永芳寶坻人乾隆中知武陵縣沅水泛溢民居多漂沒永芳極力賑救請修塞之曰諱災病民吾不忍也半邊街水勢尤急甃石岸為禦至今賴之應先烈宜黃人嘉慶十三年知常德府修學宫築石隄募捐書院膏火育嬰堂經費民德之郡多火災鑿火星池建水星樓以厭之吏才敏給日理數十訟發姦摘伏如神卒祀名宦祠人物三國漢廖立臨沅人昭烈帝領荆州牧辟為從事擢長沙太守帝入蜀諸葛亮鎭荆土孫權遣使於亮因問土人誰相經緯亮荅曰龎統廖立楚之良才當贊興世業者也權遣吕􅀩掩襲南三郡立脱身歸帝以為巴郡太守帝為漢中王徴為侍中後主襲位徙長水校尉坐怨望亮奏廢為民徙汶山郡立躬率妻子耕植自守聞亮卒垂涕歎息後終徙所吳潘濬漢壽人荆州牧劉耒辟為江夏從事時沙羡長贓􅁾不修濬按殺之一郡震悚後為湘鄉令治甚有名孫權并荆上拜輔軍中郎將授以兵遷􅁬威將軍累封瀏陽侯遷太常五溪蠻叛權假濬節督軍討之斬首􅀗生葢以萬數自是羣蠻衰弱一方安靜與陸遜俱駐武昌共掌軍事子祕權以姊女妻之調湘鄉令後為尙書僕射代習温為荆州大公平甚得州里之譽晉潘京漢夀人弱冠辟郡主簿有機辯後舉秀才至洛與尚書令樂廣共談累日深歎其才謂京曰君天才過人若學必為一代談宗京感其言勤學不倦時武陵太守戴昌亦善談論與京共談以為不如己笑遣之令過其子若思京方極其言論昌竊聽歎曰才不可假遂父子俱屈焉厯巴邱邵陵泉陵三令明於政術路不拾遺遷桂林太守不就歸家伍朝漢夀人少有雅操閒居樂道不修世事性好學以博士徵不就刺史劉宏薦為零陵太守朝復不就終於家龔元之漢夀人州舉秀才公府辟不就孝武帝下詔徵之苦辭疾篤不行弟子元嘉亦有徳操舉秀才及川辟召並稱疾不就孝武帝以太學博士散騎侍郎給事中累徵不起卒於家南北朝宋龔祈漢夀人從祖元之父黎民並不應徵辟祈風姿端雅容止可觀中書郎范􅄒見之歎曰此荆楚仙人也自少及長徵辟一無所就齊邵榮興武陵人八世同居州縣交辟不就宋明帝時刺史劉悛表其廬建元三年復表門閭蠲租稅文獻叔武陵人八世同居冋郡范安祖李聖伯范道根五世同居建元三年大使巡行天下俱表門閭蠲租稅梁伍安貧武陵人博雅嗜學梁屢降元纁之禮聘之固以疾辭嘗撰武陵圖志黃閔武陵人博學能詞藝嘗撰沅江志唐章懐太子注郡國志取以爲證唐韓約武陵人本名重華志勇決略涉書有吏幹厯兩池榷鹽使䖍州刺史交阯叛領安南都護再遷太府卿太和九年代崔鄯爲左金吾衛大將軍與李訓謀誅宦官仇士良等不克死之五代周周行逢武陵人事馬希萼爲軍校别將兵破益陽殺李景兵二千餘人擒其將李建期王進逵爲武安軍節度使拜行逢集州刺史爲進逵行軍司馬顯德元年拜武清軍節度使權知潭州軍府事行逢能儉約自勉勵而性勇敢麾下將吏素恃功驕慢者一以法繩之一境畏服宋陳起沅江人景祐進士調寕鄉令厯秭歸湘鄉萍鄉等縣皆有政聲在秭歸日疏鑿新灘舟行以安歐陽修銘其功於石柳拱宸其先青州人避地荆楚爲武陵人通判鄂岳州有惠政年六十即有掛冠之志創亭於青陵館名橋曰歸老曾鞏爲之記管師復武陵人經明行修陳襄嘗稱之與程頤同薦於朝號白雲先生弟師常亦知名人稱二管張頡桃源人第進士調江陵推官􅀊旱饑朝廷遣使安撫頡獻十事活數萬人知益陽縣有善政累遷廣西轉運使時建廣源爲順州將城之頡謂無益朝廷從其議後知桂州海南黎人請出兵自効命頡處其事頡使一介往呼之出補牙校喜而去尋罷兵海外訖無事厯官河北都轉運使徙知瀛州湖北溪􅍹叛朝廷以頡素望復徙知荆南至都門暴卒鍾正甫武陵人治平進士與李芾友善後爲廣東轉運使有美政蔡京置其名黨籍中坐謫楊縯武陵人志在泉石棄官隱桃源山徽宗時賜號沖眞處士王在武陵人治周禮端平初眞德秀知貢舉擢冠本經成進士後攝施州倅城陷死之丁易東龍陽人咸淳進士官編修入元屢徵不仕築石壇精舍教授生徒捐田千畝以贍之著周易傳䟽事聞授以山長賜額沅陽書院明馬汝舟武陵人元末四方兵起團聚義兵以爲保障明初歸附總兵徐達令權知府事汝舟收集流亡勸課耕稼興建學校民獲安堵蘇彬桃源人以縣多􅂽田科額累民上疏請蠲不報洪武二十八年擊登聞鼓自縊其下得疏懷中詔免糧二萬二千石併里爲五十六萬厯閒有司立廟以祀馮貴武陵人洪武進士性剛􅀡官給事中不避權幸厯遷交阯參議勤設方略黎利叛貴力戰兵少不支曰忠臣事君有死無二今力屈矣當死何疑卒為賊所害洪熙元年建忠臣祠以祀之郝敬沅江人永樂舉人知永寕縣濬萬箱等渠溉田千餘畝民賴其利李顯桃源人成化進士授户部主事監庫督倉俱以清愼著聞出知南康府倣朱子白鹿洞規興學勸士後乞休歸劉璟武陵人成化進士知霑化縣禁戢豪强請囑不行邑無逋賦民困亦蘇進監察御史出按山西貪吏望風􅄙綬去宗藩奪民田璟判還之貴戚斂手代去士民號泣以送楊禠武陵人宏治進士厯四科給事時外藩以方士進禠上言羽流幻術不宜蠱惑聖心不報忤劉瑾歸構聞山精舍講明正學瑾敗起吏科終太僕卿陳洪謨武陵人宏治進士正德時知漳州府有惠政累擢雲南按察使神采嚴重不畏彊禦嘉靖初巡撫西江節財愛民終兵部侍郎冀元亨武陵人正德舉人受業王守仁命主濂溪書院宸濠貽書守仁問學守仁欲曉以大義使元亨往報旣見宸濠以語桃之元亨佯不喻獨與之論學宸濠厚贈遣之不受及宸濠敗張忠許秦欲誣守仁與通謀捕元亨搒掠終不承世宗初事白岀獄蔣信武陵人嘉靖進士厯四川僉事盡心民事遷貴州提學僉事迪士以實行不事虚談學者咸信從之陳仲錄武陵人嘉靖進士知新城縣有廖氏兄弟爭訟十年仲錄取二人手足共械之出入與俱閲月兄弟情好如初葬暴骨數百棺厯官山東按察使唐鍊武陵人嘉靖進士知寶坻縣有守城功擢工部主事岀董吕梁洪鍊相水勢豫築鯉魚山缺口衝激􅀔漸衰捍防遂減約省帑金萬餘以才改御史官至徐州兵備副使鄧璽龍陽人事母盡孝嘉靖中舉於鄉官户部員外郎治孝烈皇后喪力排中貴裁冗費遷工部郎中浚清河四十里奏減額設夫若干致仕家居足跡不入公府王佐武陵人萬厯進士授吉安府推官擢給事中䟽諫剴切光宗立召為太僕卿江盈科桃源人操行純篤推遺田以與兄弟授徒自給萬厯中成進士知長洲縣擢吏部主事厯官四川提學僉事著雪濤閣集史贊舜龍陽人清端有德量萬厯進士官户部郎當安藺交訌湘沅之閒疲於奔命贊舜䟽減辰常沅靖加餉四萬二千有奇運夫三萬餘名厯遷川東副使治兵松潘恢疆三百四十餘里官至南京太常卿卒贈侍郎楊鶴武陵人萬厯進士授雒南令擢御史極言京營虚耗人才摧折公私匱乏東方羣盜數事且曰陛下宜令東宫知勞知危知􅁨知懼安可與宦官宫妾處而不見士大夫乎䟽不省岀巡貴州還朝乞停皇稅釋纍臣登遺逸納諌諍發内帑收人心不報乃引疾去崇禎初拜左僉都御史上書言圖治在培元氣一切民生國計宜遵祖宗成法語極詳懇拜兵部右侍郎總督陜西三邊軍務卒贈太子少傅劉汝林武陵人年十嵗父病篤母亦抱疾汝林夜禱於天刲股以進父母俱瘥胡永順武陵人萬厯進士授太平推官入為兵科給事中屢上䟽言時政得失􅀡聲大振魏忠賢初竊柄永順劾其必為國患以疾歸里崇禎初起禮科給事中唐紹堯武陵人天啓進士知高陽縣其地建魏忠賢生祠日奏樂上食紹堯下車禁之中官姪冉世魁與叔爭產相屠紹堯因籍其貲充餉忠賢積恨乃逮紹堯下獄搒掠幾斃崇禎初起武選郎中累遷户部侍郎柳三錫武陵諸生流寇張獻忠至脅之降三錫厲聲曰讀書明理豈向汝求活掣梃擊賊賊怒剖其腹死時同鄉紳士楊鷺萬國凝李嗣先楊時生王大年丁昌期周笏柳之彥羅三十張維翰楊夢鼎俱同時罵賊死年俱本朝乾隆四十一予入忠義祠段光啓武陵諸生偕弟光遠避流賊賊騎數十追之光遠手利刃歩鬭連殺數賊賊反走光啓追之被執光遠奔救遇他賊格戰不能前光啓罵不絶口遂􅀍殺光逺見兄遇害痛憤戰益力力不支乃還保其孥遁去熊應鵬武陵諸生有瞽母年八十二爲賊穫應鵬懇以身免其母遂見殺而母獲全本朝劉體安武陵人嵗貢爲黄陂訓導著祀典輯要具言禮器樂舞之制改茶陵値草寇陳丹書爲亂體安唾賊大罵自刎不殊賊遁復蘇羅人琮桃源人順治進士知朝邑縣行取四川道御史有禁重耗策備荒勵風節立勸懲籌鼓鑄薦舉人才纂修前史諸疏尋告歸年九十卒篤於内行為鄉人所稱彭之鳳龍陽人順治進士改庶吉士遷監察御史厯户禮刑科給事中丰采端凝練達時務議靖西山賊籌積貯奏緩征禁獄中塵羹土飯及獄卒拷掠諸疏奏入從之晉光祿寺少卿楊超曾武陵人康熙進士授編修由侍講學士任奉天府尹晉刑部侍郎巡撫粤西厯兵吏二部尚書總督兩江􅆒厯中外端己率屬以丁外艱歸卒於家賜祭葬諡文敏祀鄉賢祠陳養元武陵人康熙舉人居家孝友鄉里稱之任寕國縣知縣悉心奉職著有勞績以治最内擢主事邑人感其惠立祠祀之唐祚培武陵人選貢奉孀母左右就養惟謹遭明季家蕩析一門􅀌寡皆藉以衣食康熙三十五年旌譙衿沅江諸生自明正德時至衿凡七世同居合爨親支一百十九人衿以祖命主家事每食男女異席終事無譁積二百餘年喪祭無失禮値鄰家火起衿兄弟先入祠堂抱神主避火火隨息家蓄耕牛每岀入亦以齒先後在牧地行列不亂作家訓二十條子孫咸遵守之雍正十年建坊旌表賜額世篤仁風文鴶桃源人穎異博學早嵗以通五經補諸生後授永興訓導課士必先德義士林則之祀鄉賢子志鯨康熙進士授檢討督學浙江典廣西順天鄉試得人稱盛累官順天府尹羅江鱗桃源人乾隆武舉由貴州千總從征大小金川累官主鶴麗鎭總兵嗣逆回不靖調赴蘭州攻賊營生擒六十人盡殲餘黨尋以積年創發卒於官事聞廕一子祀昭忠祠陳長鎭養元子雍正中舉孝廉方正乾隆中舉博學鴻詞成進士改庶吉士乞假省視至家聞母喪大慟嘔血數升卒長鎭㓜篤學博覽羣書與人處有囬規無後言卒之日識與不識俱悼惜之朱景英武陵人乾隆庚午鄉試第一少精文選之學已而窺尋夾漈伯厚諸書著作甚夥官至臺灣同知撰海東日札於習俗移易利弊因革之原尤拳拳致意鄔翼麟武陵人乾隆三十八年由候補守備隨征金川殁於陣同縣人官黃平營把總郭􅡠官右營把總姚應鳳均以奮力殺賊受傷陣亡事聞議卹如例葉攀鳳武陵人由外委升守備乾隆六十年隨勦黔楚逆苗攻砲木山􅀡入賊寨獲賊頭目因功擢升都司攻克烏隴巖進抵楊柳坪受傷陣亡同城守備朱慶錦擊賊於夯尚千總彭正綱擊賊於潭江河口把總王得鳳周上友楊方進擊賊於喜鵲山梁外委劉大升何四海擊賊於墨寨俱力戰殁於陣事聞議卹均廕雲騎尉王萬岱武陵人嘉慶二年由外委隨征黔楚邪匪􅁬勇有功洊升守備六年隨􅁹川省賊匪於竹山縣衝入賊隊以傷重陣亡同縣人官都司吳經國守雙泉子卡隘力戰為賊所害事聞議卹均廕雲􅀐尉鄭憲恩武陵人嘉慶七年由守備隨􅁹楚北邪匪賊日蒲家寶盤踞鮑家山憲恩奮勇攻擊擒斃甚多後營卡為賊衝破遂遇害同縣人把總王朝宗黄勝照俱以力戰陣亡事聞議卹均廕雲騎尉唐世皞武陵人少敦孝弟母殁哀毁過人事繼母能得親歡郷里俱重之嘉慶二十五年旌流寓後漢王儁汝南人少為范滂許章所知公車徴之不至避地武陵歸之者百餘家獻帝都許徵為尚書復辭終於武陵曹操之下荆州自臨江迎其喪改葬江陵宋劉安世魏人紹聖中為章惇所陷謫居鼎州張庭堅廣安軍人以不附蔡京列黨籍編管鼎州列女晉羅氏父羅均用令曲陵溺水死羅氏尋屍不􅀗亦赴水死宋嘉其孝賜號孝烈靈妃立廟祀之五代楚馬希萼妻苑氏楚王馬殷子希萼與弟希廣爭立苑氏諌曰兄弟相攻勝􅀒皆為人笑希萼不聽苑泣曰將禍及予不忍見也赴井死周行逢妻嚴氏行逢性勇敢果於殺戮民過無大小皆死嚴氏諫曰人情有美惡安得一概殺之行逢怒曰此外事婦人何知嚴氏紿曰家田佃户以公貴頗不力農多恃􅀔侵民請往視之至則營居以老􅀊時衣青帬押田户送租入城行逢往就見之勞曰吾貴矣夫人何自苦嚴氏曰公思作户長時乎民租後時常苦鞭朴今貴矣宜先期率衆安得遂