body:
  text: 常德府在湖南省治西北四百十五里東西距四百二十里南北距六百二十里東至長沙府益陽縣界一百六十里西至辰州府沅􅁜縣界二百六十里南至長沙府安化縣界一百二十里北至澧川界九十里東南至益陽縣界一百三十五里西南至沅陵縣治三百八十里東北至岳州府治四百五里西北至澧州石門縣治二百二十里自府治至京師三千二百六十里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州之域春秋戰國時屬楚秦黔中郡地漢高帝置武陵郡後漢因之三國屬吳晉屬荆州南北朝宋齊屬郢州梁置武州後廢陳天嘉元年復置武州大建七年改曰沅州武陵郡隋平陳郡廢改曰朗州大業初仍曰武陵郡唐武德四年平蕭銑置朗州開元中屬江南西道天寶初仍曰武陵郡改屬山南東道乾元初復曰朗州五代時屬楚升州爲永順軍後周行逢據其地改武平軍五代史楚世家梁太祖時馬殷请升朗州爲永順軍又周廣順三年劉言請升朗州爲武平軍宋建隆間爲朗州武陵郡大中祥符中改曰鼎州政和七年置常德軍節度宋史地理志建炎四年升鼎澧州鎮撫使紹興元年置荆湖北路安撫使治鼎州領鼎澧辰沅靖州三十二年罷乾道元年升爲常德府宋史地理志以孝宗潛藩升府八年依舊提舉五州屬荆湖北路元爲常德路屬湖廣行省明復曰常德府屬湖廣布政使司本朝因之康熙三年屬湖南省領縣四武陵縣附郭東西距一百里南北距七十五里東至龍陽縣界四十里西至桃源縣界五十里南至長沙府安化縣界一百二十里北至澧州界九十里東南至龍陽縣界四十里西南至桃源縣界九十里東北至澧州安郷縣界一百三十五里西北至澧州石門縣治二百二十里漢置臨沅縣屬武陵郡後漢為武陵郡治順帝更名漢夀縣三國呉更呉夀縣晉復名漢夀宋齊因之隋改置武陵縣仍為郡治唐為朗州治宋為鼎州治後為常德府治元為路治明復為府治本朝因之桃源縣在府西八十里東西距二百四十里南北距四百里東至武陵縣界五十里西至辰州府沅陵縣界二百里南至長沙府安化縣界一百八十里北至澧州慈利縣界二百一十里東南至安化縣界二百五十里西南至沅陵縣治三百里東北至澧州治二百二十里西北至澧州慈利縣治二百里漢臨沅縣地後漢建武二十六年分置沅南縣屬武陵郡晉以後因之隋省入武陵宋乾德元年析武陵地置桃源縣屬鼎州後屬常德府元元貞初升為州屬常徳路明洪武二年復降為縣屬常徳府本朝因之龍陽縣在府東少南八十里東西距五十五里南北距一百八十里東至沅江縣界七十里西至武陵縣界三十里南至長沙府益陽縣界八十里北至澧州安鄉縣界一百里東南至沅江縣治一百二十里西南至長沙府安化縣治二百三十里東北至華容縣治一百六十里西北至武陵縣界三十五里漢索縣地後漢漢夀縣地三國吳析置龍陽縣屬武陵郡晉以後因之唐屬朗州宋初屬鼎州大觀中改曰辰陽紹興三年復故五年置軍使三十年復為縣屬常德府元元貞初升為州屬常德路明洪武九年復降為縣屬常德府本朝因之沅江縣在府東北二百七十一里東西距一百里南北距一百四十里東至長沙府湘隂縣界七十里西至龍陽縣界三十里南至長沙府益陽縣界七十里北至龍陽縣界四十里東南至湘陰縣治一百一十里西南至益陽縣治一百一十里東北至岳州府巴陵縣界四十里西北至龍陽縣治一百二十里漢益陽縣地梁置藥山縣兼置郡隋開皇中郡廢改縣曰安樂十八年又改曰沅江屬巴陵郡唐屬岳州乾寕中改曰橋江五代時改屬朗州宋乾德元年復曰沅江仍屬岳州南渡後還屬鼎州乾道中復屬岳州尋屬常德府元元貞初改屬龍陽州明洪武十二年併入龍陽十三年復置仍屬常德府本朝因之形勢沅水演迤陽山雄峙宋袁申儒三亭記南楚上游重湖舊壤方輿勝覽荆渚唇齒元統志左包洞庭之險右控五溪之要武陵志山林蓊鬱湖水濬闊武陵集風俗民食魚稻以漁獵山伐為業漢書地理志人氣和柔多淳樸少宦情有虞夏遺風梁伍安貧武陵記信鬼而好巫宋朱子九歌注居民務本勤於耕織元統志城池常德府城周九里有奇高二丈五尺門六南臨大江東西北三面有濠明洪武時因元舊址築本朝康熙九年修乾隆三十一年重修武陵縣附郭桃源縣城土城門四明成化中築龍陽縣城周八百八十七丈門五北瀕江東西南三面有濠明成化中因元舊址築本朝康熙十二年重建城樓乾隆三十一年重修沅江縣城土城周五里門四明成化中築本朝嘉慶十二年修學校常德府學在府治西南宋咸淳八年建本朝順治中重建康熙乾隆中修嘉慶五年増修入學額數二十名武陵縣學在縣治西北隅宋紹熙二年建陸九淵有記明洪武初重建本朝康熙五年又重建雍正乾隆中重修入學額數二十名桃源縣學在縣城南宋慶厯中建明洪武六年重建本朝康熙三年又重建嘉慶四年九年又増修入學額數二十名龍陽縣學在縣城東明洪武初因宋元舊址建本朝康熙七年重建乾隆十二年嘉慶八年重修入學額數十二名沅江縣學在縣治東舊在縣西明洪武二年遷建縣東萬厯中復遷縣右本朝順治十六年重建雍正八年遷建縣西乾隆十九年遷建今所嘉慶元年増修入學額數八名朗江書院在府城南本朝乾隆十六年建沅陽書院在府城東北宋丁易東建龍川書院在桃源縣南三十里舊名桃溪書院本朝乾隆十九年重建改今名沅南書院在桃源縣治西舊名漳江書院本朝嘉慶九年改今名龍津書院在龍陽縣西南宋周德元建龍池書院在龍陽縣西滄港上本朝乾隆十一年建名滄浪書院乾隆四十四年改建東關外鎮龍閣嘉慶二年重修改今名瓊湖書院在沅江縣治西本朝乾隆四十五年建戸口原額人丁三萬五千七百五十四今滋生男婦一百二十一萬九千七百五十五名口計二十萬四千一百一十二户田賦田地塘三萬五百七十二頃三畝四分八釐額徴地丁正雜銀十萬七百七十六兩五錢七分二釐山川木瓜山在武陵縣東十五里李白流夜郎經此有詩善德山在武陵縣東南十五里一名枉山亦名枉人山水經注枉渚東里許便得枉人山山西帶循溪一百餘里茂竹便娟披溪蔭渚長川逕引逺注於沅唐書地理志武陵郡有枉山元和志善德山在縣東九里本名枉山開皇中刺史樊子蓋以善卷嘗居此改名善德明統志山有白龍井古城山在武陵縣南七十里前有古隄城蹟宛然蓋即古沅南縣霞山在武陵縣南八十里一名金霞山有淘金場滄山在武陵縣南一百二十里與霞山相對滄水所出塔山在武陵縣西南九十里亦有淘金場花山在武陵縣西二十里多杜鵑花平山在武陵縣西三十里一名武山一名太和山又名武陵山一名河洑山水經注沅水又東逕平山西南臨沅水寒松上蔭清泉下注寰宇記武山頂有耆闍寺道德觀其下有德勝泉名勝志武山旁有西山仙井白雲洞遺跡即張虚白醉卧處高吾山在武陵縣西三十里一名西山接桃源縣界其下即武陵溪入沅水處鹿山在武陵縣西三十里下有鹿穴善濟山在武陵縣西八十里山昔有妖女祠唐袁暎焚之妖遂息後人因名山曰善濟而立袁烈士祠長坡山在武陵縣北二十里前臨諸河背枕陽山為諸山之秀名勝志其坡特長而秀陽山在武陵縣北三十里水經注澹水出漢夀縣西陽山方輿勝覽梁山舊名陽山唐天寶六年改名漢梁松廟食於此故名名勝志山前有池其下有靈泉寺旁有飛泉瀑布觀者忘暑府志陽山有風雷雨三洞大龍山在武陵縣北三十里山􅀔蜿蜒若龍風門山在武陵縣北三十里鮑堅武陵記山有石門去地百餘丈將欲風起此門隱隱有黒氣上須臾黒風競起又黃閔武陵記山上有葱畦隴成行人欲取者先禱山神乃取氣味甚美府志即陽山之風洞茶林山在武陵縣北三十里一名茶山以多產美荈故名龍山在武陵縣北六十里隋書地理志武陵縣有龍山紱紫山在武陵縣北七十里鼇山在武陵縣北七十里一名虎齒山武陵記虎齒山形如虎齒民常六月祭之不然輙有虎害文殊山在武陵縣北八十里雁門村舊有雙松亭七姑山在武陵縣北八十里又十里有藥山相近有浮山又有龍巖山中有石橋崖壁嵌空白乳如筍行可五里許至其穴泠然水流不可俯視禱􅀨輙應綠蘿山在桃源縣南十五里下有潭水經注沅水東帶綠蘿山綠蘿􅀩􅇈頽巖臨水實釣渚漁詠之勝地其迭響若鐘音信為神仙之所居牯牛山在桃源縣南一百里接長沙府安化縣界一名古溶山怡望溪出此桃源山在桃源縣西南三十里有桃源洞相傳即陶潛所記桃花源也武陵記武陵山中有秦避世人居之號曰桃花源舊志山周三十二里西南有桃源洞一名秦人洞洞口流泉瀑布千丈落石壁下流里許伏地不見至北三里與桃花溪合流入沅按今桃源山在烏道村孔道之側所指為桃源洞者未必晉時遺跡也聞山在桃源縣西南三十五里下臨桃花溪欽山在桃源縣西南六十里瀕江其東為漁仙洞有寺名勝志山如屏壁其下有二石室相傳馬援避暑所鑿穿石山在桃源縣西南七十里下有大竇東西洞達春夏氷溢江水自中流過相傳馬援征五溪蠻會暑甚士卒多困乃穿岸為室以避炎暑於此按明袁宏道遊記由漁仙寺數里至穿石石三面臨江鋒稜怒立突出諸峯上石腹南北穿如天闕據此穿石山在欽山西數里明統志以為在縣西一百五十里者誤夷望山在桃源縣西南一百二十里沅江中今名水心崖水經注沅南縣西有夷望山􅀌竦中流浮險四絶昔有蠻民避寇居之隋書地理志武陵縣有望夷山疑即夷望之譌府志水心崖南逼江岸夷望溪横齧其趾兩峯骨立高數千丈竒險難登焦林山在桃源縣西南一百四十里羣山周遭有如城􅆣巷陌厯厯高崖山在桃源縣西三十里延溪水出此萬陽山在桃源縣西一百二十里一名安陽山又名蘇黃山雲氣開合可占晴雨相近有九首山在大敷溪上上有九峯故名九溪水出此又有了柱山小敷溪水出焉壺頭山在桃源縣西二百里接辰州府沅陵縣界詳見辰州府關下山在桃源縣西今名腳底岩水經注沅水又東得關下山靈巖山在桃源縣北七十里蘇溪村山有五洞相連洞中有小河並龍潭水清可鑒石壁上有天然大士像昔人評桃源勝景首推靈巖方山在桃源縣北八十里頂有石洞相近有仙人山莫溪港水岀焉又十里有纛旗山又十里有觀穀山軍山在龍陽縣東八十里明統志吳潘濬討武陵都尉樊伷屯兵於此金牛山在龍陽縣南六十里上有仙翁洞風洞下有龍池龍陽山在龍陽縣南九十里九域志龍陽縣有龍陽山明統志舊名横山唐天寶中改名浪山在龍陽縣西南九十里與武陵縣滄山相連下有水與滄山水合謂之滄浪水按明統志載龍陽縣西南九十里有良山良水出焉葢即浪山之誤寶臺山在龍陽縣北十五里前對橘洲後連内隄看竈山在龍陽縣東北一百二十里鼎港口相傳黃帝鑄鼎其竈在此故名又西十里有團山在洞庭湖中裨牛山在龍陽縣境酉陽雜俎龍陽縣禆牛山南有青草槐叢生高尺餘花若金燈赤山在沅江縣東北近洞庭湖邊一名赤山嶺綿互數十里上有范蠡廟下有金雞山唐天寶間改名蠡山赤山廟碑記唐光宅二年立以祀范蠡者山上有白鶴池山色純赭映入湖水相近有明山接長沙府湘陰縣界湘山在沅江縣東北接岳州府巴陵縣界漢書地理志益陽湘山在北括地志湘山在洞庭湖中倒水巖在桃源縣西南六十里欽山之東甕子灘上龍家溪自北出流其下水經注沅水東厯三石澗