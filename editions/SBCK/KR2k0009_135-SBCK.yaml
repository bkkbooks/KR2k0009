行方田令均平戸口民服其公張後甲江寕人辰州府推官有諸生以事忤豪右文致傅獄亟釋之姦民斃其女以誣人大辟立白其􅁈侯加地解州人萬厯中辰州府推官纂修郡志留意邊防利弊皆條奏興剔彭先儁平鄉人天啟中知盧溪縣時逆苗刦掠先儁與遊擊鄧祖禹多方剿撫民賴以安爲立德政碑樊良樞江西人崇禎中分守湖北道駐辰州重建薛瑄王守仁祠朔望集諸生講道勸學士皆向風林龍采同安人崇禎中知漵浦縣值獻賊攻掠龍采躬率民兵死守恢復安化新化二縣以功擢寶慶知府王祚久平越人崇禎末知漵浦縣時四方不靖軍儲缺乏將帥恣爲剽刦有何將軍者領衆萬人駐其境祚久以已貲八百金布八百疋及米芻牲酒遣使犒軍何乃整衆去一城􅀗全本朝劉昇祚陜西人順治九年任湖北參議駐辰州黔寇犯城與總兵遼東徐勇悉力拒守城陷一門百口死之勇亦殉節死王任􅂎大興人順治中知辰州黔中告警任􅂎與戰克之擢兵備副使越二年寇復大至力屈城陷闔門殉節事聞贈太僕寺卿蔭一子楊來鳳四川人順治九年知沅陵縣黔寇來攻城陷死之同時瀘溪令李之秀亦拒叛苗死周晉英仁和人順治中知瀘溪縣奉檄招撫土寇率子之簠入賊巢諭以大義不應與其子及僕十三人俱被害江維新歙人順治中知瀘溪縣亂定大旱招徠安戢以勤死官百姓感泣劉應中井陘人康熙十九年隨大將軍蔡毓榮征吳三桂克辰龍關拊循黎庶還集流亡增造甕子洞鐵索以挽舟尋有紅苗之警檄攝辰沅靖道僉事安戢三十餘砦應中廉介有守為政條理秩然辰民至今德之李慶祖奉天人康熙中知辰州府表貞除􅁀革驛遞派累勤於課士豐其飲饌四載政聲卓然卒於官民建祠祀之翁煌侯官人康熙中知辰溪縣清浪衞一田兩賦煌力請豁免薦循良第一民􅃒留數十里不絶余繩武鄱陽人康熙中知辰溪縣編都甲建河橋除驛累興起邑士請廣學額民咸鼓舞潘眉宜興人康熙中知漵浦縣時大軍勦滇逆縣境江口民以協濟辰溪驛遞甚苦眉繪圖卒請免之民爲祀之縣左張佳晟廣濟人康熙中沅陵教諭教士以河津姚江爲法袪故習挽頽波以期至於古其平昔論學十議士皆尊信之陳家穀江寕人乾隆中知辰州府訟無巨紉必親爲剖決捐俸延師教士虎谿書院郡人德之卒於官爲祀於書院側顧奎光無錫人乾隆中知瀘溪縣􅀊歉設法救荒徴税悉除火耗修志興學遇士有禮政暇博覽羣書曰以補政之不及也人物宋秦再雄猺人武健多謀在周行逢時屢以戰鬬立功蠻黨皆服之太祖召至闕下察其可用特擢辰州刺史官其子爲殿直賜子甚厚乃使自辟屬吏予一州租賦再雄感知遇之恩誓死報効至州日訓練土兵得三千人皆能披甲渡水厯山飛塹捷如猿猱又選親校二十人分使諸蠻宣朝廷懷來之意於是蠻黨悅服莫不從風而靡各得降表以聞太祖大喜復召至􅆣面加􅅄激改辰州團練使又以其門客王允成為辰州推官再雄盡瘁邊圉五州連袤數千里不増一兵不費帑庾終太祖世邊境無患張翹辰州人神宗時上言南江諸蠻雖有十六州之地惟富峽敘僅有千户餘不滿百土廣無兵加以洊饑近向水晤與繡鶴敘諸州蠻自相讐殺衆苦之咸思歸化願先招降富峽二州蠻俾皆納土來歸則餘州不煩加兵而自投順詔下知辰州劉策商度策請如翹言明年富州向永晤來歸順繼而敘峽諸州舒光銀光彥等亦降元向良嗣漵浦人至正中縣人王七作亂煽惑居民一時遠近多蠭起從賊獨良嗣守正不肯附逆賊恚憤於是糾黨縱火燒其廬忽大雨滅火賊乃釋之遂得免於難明夏銘善漵浦人洪武進士擢御史善論事守正不阿凡有大政上輒謂左右召夏御史來後坐事死帝嘆曰失吾直臣乃命有司治殮歸􅁙荆政芳漵浦人永樂進士任交阯僉事分巡沱江繖員山有神常見怪民祈走如騖政芳為勒碑禁止其怪乃息李震瀘溪人宣德中御史薛瑄以賢良方正薦固辭不起嚴秀漵浦人正統十四年貴州香鑪苗叛命將征討募敢死士縣令以秀應秀為軍前鋒累􅀗賊級聞於朝將官之秀曰吾為地方驅亂耳豈以軀命博一官耶不就歸胡璁沅陵人正德中推官剛方耿介執法不阿厯二嵗以疾致仕歸道經巫峽水漲舟幾危仰天誓曰吾行李蕭然無長物止室人金環在耳得無此物為祟乎令投水中舟遂濟比及黃陵廟買魚祀神剖魚腹金環在焉人咸異之鄧顯芳盧溪人為縣諸生正德七年鎮筸叛苗肆侵掠衆皆避匿顯芳戀母棺不去苗至挾顯芳為導不從苗怒殺之碎其尸於母柩前聞者哀之潘棠辰州衞人宏治進士上疏請以鎮筸為州控治苗獠寝不行後鎮筸苗猖獗因設守備用棠議也授懷慶推官㩴南吏科給事中寕藩請益䕶衞棠疏言其有異志尋叛舉朝服其先見厯官雲南僉事宋瑛沅陵人由貢生為平樂通判正德八年郴州諸洞苗猖獗撫臣洪範檄瑛討捕至楊頭砦苗合九砦餘黨攻之身􅀍數創越二日援兵不至遂遇害宋儒瑛子痛父陣亡奮身隨官軍剿賊搗其穴轉戰三日擒其渠魁􅀒父尸還力盡死時人哀之蕭璆辰州衞人嘉靖進士吏部主事典試中州督學黔省為當事模範唐愈賢沅陵人嘉靖進士授寕海令擢御史因抗言時政乞養歸袁鳳鳴沅陵人嘉靖進士擢御史巡視居庸申飭邊防劾將帥弗戢兵者再巡四川建議征白草苗平之以戅直為時所忌岀知潮州尋謫思州潮民立祠祀之李棟盧溪人嘉靖進士累官文選員外郎二十九年北兵入京師戒嚴令選百僚才猷宣著練達老成者疏名以聞大學士徐階首以棟應分守正陽門有功以忤當路謫兩淮運判厯雲南兵備苗蠻讋服向淇沅陵人嘉靖進士累官南户部郎聚四方同志講學於甘泉書院以體認為宗後遷廣西參議分守潯州時桂林苗肆刦淇董兵攻散之厯雲南兵備號令嚴明諸蠻懾服張文燿沅陵人萬厯進士厯任四川布政使平貴州銅仁土蠻余永鸞辰溪人由貢生授巴縣知縣清介無私有饋遺永鸞盡郤之厯三年免歸力田授徒以老本朝瞿應頡沅陵人順治四年爲本道中軍守備值瀘溪姦民姚啟唐等煽亂應頡單騎直入賊巢招撫四十六寨賊恨以計擒之罵賊不屈死米元倜辰谿人康熙中與弟元侗同膺鄉貢杜門著書足不踰塾者數十年德行文詞爲一邑冠劉恂辰谿人康熙進士淹貫經史所著作多可傳性篤孝通籍後痛父母不及見涕零如雨其積德務善自先世萬橒以來至恂四世曾無異焉龔世遠沅陵人㓜嗣叔父國鳴後國鳴曾以酒後笞之惟抱杖慟泣事母至孝母卧病八載日夕侍側哀禱祈代及事繼母俱孝謹爲鄉閭矜式雍正十一年旌張齊歐瀘溪人母喪哀毁骨立三年未嘗見齒雍正十二年旌楊鴻謹瀘溪庠生家貧課徒以供子職三十餘年色養不懈乾隆二年旌晉啟祥沅陵人九􅀊失怙母哀痛失明啟祥以舌餂之母目復明母病求以身代病遂愈毛國芳沅陵人年十五父卒追摹父像設奉書室數十年哀慕不忘母病痢嘗糞以驗差劇乾隆六年旌謝純臣沅陵人乾隆八年􅀊貢值鄰家火母病在牀純臣號泣􅈼天風返火息嘗作十二􅃘辭以化導家人故家近百口猶不析箸卒年八十五羅廷弼沅陵人由武進士洊陞副將嘉慶元年甘肅逆囘滋事派赴西安剿捕駐兵衆山之尾奮勇攻擊嗣因賊衆直撲糧臺力戰陣亡事聞議卹􅄻雲騎尉流寓宋王廷珪盧陵人秦檜黨羅汝楫誣劾胡銓編管新州廷珪以詩贈行爲人所訐流辰州明宋昌裔唐州人洪武中寓居沅陵善書畫人得其墨蹟皆藏弆之列女明鮑氏名賽賽辰州衞人從父之良斫畬遇虎攫之良去賽賽舉畬刀追及虎與相持虎傷刀折賽賽亦死於虎潘燿卿妻賈氏沅陵人賈瀾女燿卿父棠官南畿燿卿挈賈省父至湖口卒賈抵南畿絶食累日聞家衆來取夫喪遂自剄死遺詩一絶事聞旌表李太麒妻張氏沅陵人張新寡而其姊死父母將以張改適其姊夫張聞之縊死李宏妻陳氏沅陵人許字李宏聞宏訃至不食死武玉瑾妻賀氏沅陵人夫卒賀年十八兄公欲嫁之賀自縊救之得免以節終李棟妾張氏盧溪人棟官至按察副使張年二十棟卒張無子毁容守節年七十餘終事聞旌表舒宏謨妻向氏辰溪人年二十二夫殁含殮畢自盡死余永鸞妻辰溪人亡其氏永鸞為廉吏一日偶受人􅀲妻恚曰君苦節自勵一􅀲雖細亦損清操永鸞欣然曰人謂予清不知汝乃過予王允明妻蔣氏辰溪人年十八值土寇亂賊入其門蔣連殺三賊乃自剄夏學程妻丁氏名美音漵浦人未嫁學程死美音齧指出血誓不他適當事奬之賚以銀幣百金美音鬻田事舅姑孝養終身鄉人名其田曰貞女田向達妻文氏漵浦人達為邑諸生早卒文年甫二十富家争謀娶之遂自割其鼻守志終身年八十卒本朝廖縉妻尹氏沅陵人夫亡守節康熙年間旌李枝魚妻張氏瀘溪人枝魚弟枝英枝衍枝永枝晟相繼卒張偕娣張氏龔氏劉氏楊氏均同志守節康熙年間旌姜文煥妻張氏沅陵人夫亡守節同縣貞女舒愗聘妻余氏顔三台聘妻吳氏均雍正年間旌李躍龍妻石氏瀘溪人夫亡守節同縣節婦龔錫球妻麋氏石祚煥妻張氏石祚煜妻文氏均雍正年間旌劉䖍妻朱氏辰溪人夫亡守節雍正年間旌郗某聘妻張氏漵浦人順治四年潰賊掠縣女隨父避山中為賊所執驅之行父往阻賊脅以刃女以身蔽父罵不絶口賊怒殺之同縣貞女向俊民聘妻張氏均雍正年間旌李維屏妻郭氏沅陵人夫亡守節洞縣節婦吳應兆妻韓氏吳應元妻黄氏李國儒妻姜氏李開膺妻鄧氏鄒啟旟妻印氏姚天明妻周氏其子婦熊氏陳上表妻戴氏常尚勲妻王氏張德旋妻楊氏朱大國妻李氏張珗妻唐氏及子婦鄧氏冉俊德妻張氏顔國輝妻李氏劉子賢妻向氏熊容生妻梁氏龔景孳妻彭氏劉星祖妻張氏陳大用妻程氏向淞妻唐氏子婦唐氏晉之綱妻張氏袁世茂妻陳氏唐朝坤妻胡氏偕其姒蔣氏石昭妻謝氏烈婦張士奇妻蕭氏均乾隆年間旌李文命妻黃氏瀘溪人夫亡守節同縣節婦劉文明妻鄧氏胡啟科妻李氏文炳國妻蔡氏譚世揆妻羅氏周之緒妻陳氏唐宣學妻吳氏宋文標妻熊氏金先賢妻楊氏先聖妻吳氏張榮斗妻李氏龔錫侯妻楊氏李潭妻宋氏劉永桂妻曾氏均乾隆年間旌李自瓊妻劉氏辰溪人夫亡守節同縣節婦米云苾妻朱氏其子繼妻姚氏麻昌佑妻潘氏均乾隆年間旌舒爾傑妻鄧氏漵浦人夫亡守節同縣節婦梁以燦妻龔氏其子建基妻吳氏建基子婦周氏項勝光妻向氏其子婦彭氏烈婦舒德潮妻賀氏貞女舒爾謨聘妻武氏吳光乾聘妻徐氏均乾隆年間旌熊維周妻石氏沅陵人夫亡守節同縣節婦姚世浚妻黄氏姜正傑妻劉氏貞女唐某聘妻張氏汪德寛聘妻萬氏均嘉慶年間旌唐上球子婦張氏陳氏瀘溪人暨女酉姑乾隆六十年殉苗難死嘉慶年間旌蕭某妻舒氏辰溪人里人偪汚之不從被毆死嘉慶年間旌張文燮妻舒氏漵浦人夫亡守節同縣節婦戴尚絅妻向氏夏澤濟妻舒氏烈婦蕭氏婦張氏貞女鍾毓宗聘妻陳氏張宗教聘妻陳氏易紹俊聘妻唐氏均嘉慶年間旌仙釋唐瞿夫人豫章人隋末兄爲辰州刺史有黄元仙者亦自豫章來刺史高其行以夫人妻之後薦其才德以自代隋亡元仙棄官與夫人隱於州西之羅山貧甚夫人爲人傭織以養其姑如此者十年一日忽謂元仙曰昨日聞帝命當與君别俄頃翀舉宋陳崇政修道於辰溪大酉觀有奇術能致雷雨辟穀不食者三十年惟飲清泉或瓜果年八十行走如飛政和中往遊衡岳委蜕於祝融峯其徒舉其尸輕如蟬蜕葢尸解云元妙鑠大德中自袁州至沅陵風彩神異有度世禁氣之術建普安寺於縣東厯三年功始畢乃著袈裟躡芒屨遶寺行三日人莫測其故至夜投寺前井中其徒宗寶急入井覓之不可得後怡溪人報妙鑠尸在清浪灘往視之果然解其袈裟得一頌曰三十三年無道無禪空空盡在水底生蓮乃歸葬之越數日人見其在巴東其走如飛追之不及而止土產鐵瀘溪辰溪漵浦三縣出丹砂沅陵縣出元和志辰州貢光明砂藥砂水銀沅陵瀘溪二縣岀絹辰溪縣出黃蠟沅陵縣出白蠟瀘溪縣出葛辰溪縣出蜂蜜沅陵縣出茶漵浦縣岀漆漵浦縣出桐油沅陵縣出黃精辰溪縣出茜草漵浦縣岀前總纂官臣李光涵恭纂輯提調官臣張日章恭覆輯校對官臣王式和恭校校對官臣沈維鈺恭覆校
