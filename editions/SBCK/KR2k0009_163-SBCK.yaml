body:
  text: 大清一㳘志廣東統部在京師西南七千五百七十里東西距二千五百里南北距一千八十里東至福建漳州府詔安縣界一千里西至廣西南寕府宣化縣界一千五百里南至大海三百里北至湖南郴州桂陽縣界七百八十里東南至大海二百八十里西南至崖州大海二千四百里東北至江西贛州府長寕縣界八百里西北至廣西平樂府賀縣界七百三十里分野天文牛女翼軫分野星紀鶉尾之次史記天官書牽牛婺女楊州翼軫荆州唐書天文志翼軫鶉尾也初張十五度中翼十二度終軫九度得長沙武陵逾南紀盡鬱林合浦之地斗牽牛星紀也初南斗九度中南斗二十四度終女四度得蒼梧南海逾嶺表自韶廣以西珠崖以東爲星紀之分唐書地理志嶺南道廣康端封梧藤羅雷崖以東爲星紀分桂柳鬰林富昭􅀩龔繡容白廉爲鶉尾分按今廣韶以西瓊崖以東爲牛女分野連州及欽廉以東為翼軫分野建置沿革禹貢荆揚二州之南裔周為藩服通厯武王滅殷乃正九服徹法以南海地在東南揚州之裔定為藩服戰國時為百越亦曰揚越史記吳起傳吳起相楚南平百越又南越傳秦并天下畧定揚越張晏曰揚州之南越也按越字史記作越漢書作粤音義並同今從史記秦時號陸梁地始皇三十三年取其地置南海郡史記秦始皇本紀三十三年發諸嘗逋亡人贅壻賈人畧取陸梁地為桂林象郡南海以􅃴遣戍正義嶺南之人多處山陸其性强梁故曰陸梁漢初為南越國元鼎六年平其地置南海蒼梧合浦珠崖儋耳等郡漢書武帝紀元鼎六年定越地以為南海蒼梧鬱林合浦交阯九真日南珠崖儋耳郡按地理志珠崖儋耳二郡置在元封元年今廣東地得漢南海蒼梧合浦珠崖儋耳五郡餘屬廣西安南元封五年屬交阯部刺史始元五年省儋耳郡初元三年省珠崖郡後漢建安中徙交州治南海郡王範交廣春秋交州治嬴􅖮縣元封五年徙治蒼梧廣信縣建安十五年治番禺縣宋書州郡志漢武帝開百越交阯刺史治龍編獻帝建安八年改曰交州治蒼梧廣信縣十六年徙治南海番禺及分為廣州治番禺交州還治龍編按二書紀年不同水經注又作建安二十二年遷州番禺未知孰是三國呉黄武五年分交州置廣州尋罷廣州併屬交州永安七年復分置廣州按呉黄武中廣州領南海蒼梧鬰林高涼四郡其合浦郡别屬交州赤烏中復置高興珠崖二郡亦屬交州永安後廣州領南海高涼高興等郡甘露元年析桂陽南部置始興郡别屬荆州晉太康中平吳仍為廣州及荆湘交三州地晉書地理志廣州太康中平吳以荆州始安始興臨賀三郡來屬統南海始興蒼梧高涼高興等共十郡武帝後省高興郡永嘉元年又以臨賀始興始安三郡為湘州成帝分南海立東官郡以始興三郡還屬荆州穆帝分蒼梧立晉康新寕永平三郡太和中置新安郡安帝分東官立義安郡恭帝分南海立新會郡按晉時合浦郡仍屬交州其珠崖郡省入合浦南北朝宋初亦為廣州泰始七年分交廣二部置越州宋書州郡志廣州領南海蒼梧晉康新寕高涼新㑹東官義安等郡元嘉九年分立宋康郡十三年立綏化郡十八年立宋熙郡皆屬廣州泰始七年分立越州領隴蘇臨漳合浦宋夀等郡其合浦郡仍屬交州齊因之齊書州郡志廣州領南海東官義安新寕蒼梧高涼晉康新會廣熙宋康宋隆綏建樂昌齊康等郡越州領臨漳合浦龍蘇高興等郡梁天監六年分湘廣二州置衡州普通四年分置成州合州建州五年分置東揚州自後州郡滋多隋書地理志梁大通中割合浦立高州又有東衡東瀛新瀧崖安羅等州皆梁置陳因之隋開皇十年平陳置廣循二州總管府領洭岡潮高羅端新瀧建封越合崖欽連等州二十年廢洭州仁壽元年改廣州為番州大業初府廢三年改諸州為南海龍川義安高涼信安永熙蒼梧合浦珠崖寕越熙平等郡隋書地理志諸郡皆屬揚州惟熙平郡屬荆州元和志大業六年置臨振郡隋志不載隋末陷於蕭銑唐武德四年復改諸郡為州置廣州總管府貞觀元年置嶺南道唐書地理志嶺南道領廣韶循潮康瀧端新封潘春勤羅辨高恩雷崖瓊振儋萬安欽連竇廉陸等州天寶元年又改諸州為郡至德元載置嶺南節度使乾元元年復改諸郡為州咸通三年分為嶺南東道乾寕二年賜號清海軍節度唐書方鎮表至德元載升五府經畧討擊使為嶺南節度使領廣韶循潮康瀧端新封春勤羅潘高恩雷崖瓊振儋萬安藤二十二州治廣州乾元元年置韶連郴三州都團練使治韶州元和元年嶺南節度復領潘辯二州咸通三年分嶺南節度為東西道改嶺南節度為嶺南東道節度乾寕二年賜嶺南東道節度號清海軍節度五代為南漢寰宇記十國春秋劉龑建國改廣州為興王府析韶州置英雄二州析循州置禎州析潮州置敬州餘仍唐舊宋置廣南東路又分屬廣南西路宋史地理志廣南東路治廣州領肇慶一府韶循潮連梅南雄英賀封新康南恩惠十三州其化高欽廉雷瓊六州南寕萬安吉陽三軍屬廣南西路元至元十五年置廣東道宣慰司及海北廣東道肅政廉訪司治廣州路隸江西行中書省十七年又分置海北海南道宣慰司三十年又置海北海南道肅政廉訪司俱治雷州路隸湖廣行中書省分領諸路元史地理志廣東道宣慰司海北廣東道肅政廉訪司領廣韶惠南雄潮德慶肇慶七路及英德梅南恩封新桂陽連循八州海北海南道宣慰司肅政廉訪司領雷化高欽廉五路乾寕南寕萬安吉陽四軍明洪武初改諸路為府置廣東行省叅政九年改置廣東等處承宣布政使司統十府廣州韶州南雄惠州潮州肇慶高州廉州雷州瓊州一州羅定本朝因之為廣東省雍正五年升連州為直隸州十一年升程鄉縣為嘉應直隸州嘉慶十一年降南雄府為直隸州升嘉應州為府十六年復升南雄州為府降嘉應府為直隸州置佛岡直隸廳十七年仍降南雄府為直隸州二十一年置連山直隸廳共領府九州四廳二廣州府韶州府惠州府潮州府肇慶府高州府廉州府雷州府瓊州府南雄直隸州連州直隸州嘉應直隸州羅定直隸州佛岡直隸廳連山直隸廳形勢東引甌越惠潮二府與福建之汀漳山谿相錯南濱大海省治南去大洋僅三百里自潮州府之東南與福建之漳州洋接廉州府欽州之西南與交阯洋接東西相距二千四百餘里而瓊州四面孤懸以海為境西距安南欽廉以西與安南分界而欽州又當海道之衝北據五嶺在省治北境史記秦有五嶺之戌水經注五嶺者天地以隔内外最東曰大庾第二曰騎田第三曰都龎第四曰萌渚最西曰越城今大庾在南雄州北騎田都龎在韶州府及連州北湖南之境餘二嶺屬廣西内鎮蠻蜑蠻有數種曰猺獞黎岐皆盤互窟穴於山谷中在廣州府屬者百五十四山在韶州府屬者六山在肇慶府屬者五百四十二山在高州府屬者二百四十二山在廉州府屬者二十六山在瓊州府屬者千二百山而惠州之山猺潮州之畬猺皆巖棲谷飲延亘數百里又寰宇記新會縣有蜑户生江海居於舟船隨潮往來捕魚為業又有盧亭户在海島上乘舟捕魚海族為業外控諸番唐韓愈送鄭尚書序海外雜國若躭羅流求毛人夷亶之州林邑扶南真臘于陀利之屬東南際天地以萬數或時候風潮朝貢蠻中賈人舶交海中其名山則有黄嶺在東筦縣唐十道志嶺南第一名山靈洲在南海縣唐十道志嶺南道名山之一羅浮在増城博羅二縣界廣袤五百里高三千六百丈峰巒四百三十有二嶺十五洞壑七十有二谿澗瀑布之屬九百八十有九其大川則有西江在省治南即漢之牂牁江亦名鬱水以泿水入焉又名泿水自廣西入肇慶府封川縣㑹賀江又東過肇慶府至三水縣西南會北江又東南過廣州府城南會東江入海又瀧水源出西寕縣南界東北流經羅定州至德慶州南入西江亦曰南江北江在省治北即古溱武湞洭諸水自湖南臨武東南流至曲江縣亦曰北江與始興水合有始興大江之名又過英德與洭水合又南過清遠至三水入西江東江在省治東自江西贛州府安遠縣流入惠州府龍川縣為龍江又西南經河源縣博羅縣又西南入廣州府東莞增城二縣至府之南境會西北江入海謂之三江海海環廣東南界濱海諸郡分三路東路惠潮西路高雷廉而廣州居中其重險則有梅關在省治北南雄州北六十里大庾嶺上文職官兩廣總督舊駐肇慶府乾隆十一年移駐廣州府轄廣東廣西二省巡撫駐廣州府提督學政舊有廣韶肇高兩學政乾隆十六年裁併為一粤海關監督駐廣州府庫大使粤盈布政使經厯照磨庫大使廣豐按察使經厯司獄舊有知事照磨兩缺均乾隆二十八年裁鹽運使運同駐潮州府舊有運判乾隆七年裁經厯知事駐潮州庫大使廣盈批驗所大使駐西滙關乾隆五十年由東滙關移駐其東滙關事改歸廣糧通判兼管鹽課大使十二員白石博茂大洲招收淡水東界電茂􅠏白小靖石橋茂暉隆井共十二場舊有海矬場一員嘉慶二十年裁分巡糧儲道駐廣州府轄廣州並佛岡廳舊有倉大使乾隆三十年裁分巡南韶連兵備道駐韶州府分巡惠潮嘉兵備道駐惠州府分巡肇羅道駐肇慶府分巡高廉兵備道駐高州府庫大使廣濟乾隆三十年設分巡雷瓊兵備道駐瓊州府庫大使廣裕乾隆三十年設廣州府知府理事同知駐廣州府佛山同知駐佛山海防同知駐前山寨乾隆八年設糧捕通判駐新城永寕通判駐沙茭坑頭村乾隆四十六年設府學教授訓導經厯司獄知縣十四員南海番禺順德東莞從化龍門増城新會香山三水新寕清遠新安花縣丞九員南海駐十三行番禺駐南村順德駐容竒鄉東莞駐石龍新會駐江門香山駐澳門三水駐西南鎮新寕駐那骨堡新安駐大鵬縣學教諭十四員訓導十四員主簿三員舊設二員南海駐九江堡増城駐沙貝村嘉慶二十二年增新寕一員駐廣海寨巡檢三十七員南海縣屬神安金利黄鼎江浦三江五斗番禺縣屬沙灣鹿步慕德里茭塘順德縣屬紫泥江村都寕馬寕東莞縣屬缺口鎮京山中堂從化縣屬流溪龍門縣屬廟子角增城縣屬茅田新會縣屬沙村牛肚灣潮連香山縣屬小黄圃香山黄梁都淇澳三水縣屬胥江三水新寕縣屬上川清遠縣屬潖江濱江􅂞岐新安縣屬官富福永花縣屬獅嶺水西舊有新寕縣屬廣海寨一員嘉慶二十二年裁典史十四員河泊所官二員南海番禺舊有五仙西南安遠驛丞三員乾隆七年裁韶州府知府舊有理猺通判乾隆四十六年裁府學教授訓導經厯司獄舊有通濟倉大使乾隆三十年裁知縣六員曲江樂昌仁化乳源翁源英德縣丞一員曲江縣學教諭六員訓導六員巡檢十員曲江縣屬平圃濛􅪘樂昌縣屬九峯羅家渡仁化縣屬扶溪乳源縣屬武陽翁源縣屬桂山磜下鄉英德縣屬象岡洸口典史六員舊有芙蓉湞陽驛丞二員乾隆七年裁惠州府知府海防同知駐碣石衞舊有通判嘉慶十六年裁府學教授訓導經厯司獄舊有受納倉大使乾隆三十年裁知州連平州學學正吏目巡檢二員長吉里忠信里知縣九員歸善博羅長寕永安海豐陸豐龍川河源和平縣丞二員舊設歸善一員乾隆二十一年増海豐一員駐汕尾縣學教諭八員歸善博羅長寕永安海豐龍川河源和平訓導八員歸善博羅長寕永安陸豐龍川河源和平巡檢十九員歸善縣屬碧甲内外平政平山平海博羅縣屬善政里石灣蘇州長寕縣屬坪永安縣屬寛仁里馴雉里海豐縣屬鵞埠嶺陸豐縣屬黄沙坑河田甲子龍川縣屬通衢十一都老龍河源縣屬藍口典史九員潮州府知府海防同知駐南澳同知駐黄岡通判駐庵埠鎮府學教授訓導經厯司獄舊有永豐倉大