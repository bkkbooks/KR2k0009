訪使時崖振五州首領更相掠民苦於兵使者至輒苦瘴癘莫敢往慶禮身到其境諭首領大誼皆釋仇相親州土以安罷卒戍五千人李琨太宗孫聖厯中為嶺南招慰使安輯反獠甚得其宜宋璟南和人為廣州都督教民陶瓦築堵自是鮮火患恩州苗帥作亂諭以恩信種落大安召拜刑部尚書廣人為立遺愛頌璟上言臣治績不足紀廣人以臣當國故為溢辭宜釐正之請自臣始詔許之自廣州入朝帝遣内侍楊思朂驛迓之竟不交一言思朂訴之帝益嗟重焉李尚隱萬年人開元中遷廣州都督五府經畧使及還人或裒金以贈尚隱曰吾自性分不可易非畏人知也柳澤解人開元中以殿中侍御史監嶺南道時市舶使右威衛中􅀰將周慶立雕製詭物以進澤上書言慶立作竒器淫巧揺蕩上心禁典不赦書奏帝稱善李勉京兆人代宗時拜嶺南節度使番禺賊負險為亂殘十餘州勉遣將討斬之五嶺平西南夷舶􅀊至􅂊四五勉廉潔不暴征明年至者四百餘柁居官久未嘗裝飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中部人叩闕請立碑頌德李復京兆人德宗時轉嶺南節度使時安南經畧使卒其佐李元度胡懷義等阻兵脅州縣肆爲姦贓復至誘懷義杖死流元度南裔肅然教民作陶瓦鑴諭蠻獠收瓊州置都督府以綏定其人杜佑萬年人德宗時爲嶺南節度使開大衢疏析􅒡閈以息火災朱崖黎氏三世保險不賓佑討平之徐申萬年人憲宗初爲嶺南節度使前使死吏盜印署府職百餘員畏事泄謀作亂申覺殺之挂誤一不問遠俗以攻刼相矜申禁切無復犯外番􅀊以珠瑇􅈘香文犀浮海至中於常貢外未嘗賸索商賈饒盈楊於陵宏農人元和初爲嶺南節度使辟韋詞李翺等在幕咨訪得失教民陶瓦易蒲屋以絶火患監軍許遂振者悍戾貪肆憚於陵不敢撓以私則爲飛語聞京師詔罷歸遂振領留事笞吏剔抉其贓吏呼曰楊公尚拒他方賄遺肯私官錢耶宰相裴垍爲帝别白之乃授吏部侍郎遂振終得罪孔戣曲阜人憲宗時拜嶺南節度使既至免屬州逋負十八萬縟米八萬斛黄金税􅀊八百兩先是屬刺史俸不時給皆取部中自衣食戣乃倍其俸約不得為貪暴南方掠人為奴婢戣峻為之禁士之斥南不得歸與有罪之後百餘族皆收錄其才而廪其無告者女子為嫁遣之番舶泊步有下碇税始至有閲貨宴所餉犀琲下及僕隸戣禁絶無所求索舊制海商死者官籍其貲滿三月無妻子詣府則没入戣以海道􅀊一往復苟有驗者不為限客桂二管請合兵討洞蠻戣固言不可帝不聽兵死者不可勝計獨戣不邀一旦功交廣晏然大治李憲臨潭人太和初由江西觀察使遷嶺南節度使以吏能顯善治律令性明恕詳正大獄活無罪者數百人廬鈞藍田人文宗時擢嶺南節度使海道商舶始至異時帥府爭賤售其珍鈞一無所取番獠與華人錯居相婚嫁多占田營第舍吏或撓之則相挺為亂鈞下令禁之闔部無敢犯貞元後流放衣寇其子姓窮弱不能自還者為營棺槥還葬有疾䘮則給醫藥殯殮以俸廪資􅂇孤稚凡數百家南方服其德不懲而化韋正貫萬年人宣宗時擢嶺南節度使南海舶賈始至大帥必取象犀明珠上珍而售以下直正貫獨無所取土俗右鬼正貫毁淫祠教民無妄祈㑹海水溢人爭咎之正貫登城沃酒以誓曰不當神意長吏任其咎無逮下民俄而水去民乃信之韋宙萬年人宣宗時遷嶺南節度使南詔陷交阯撫兵積備以才幹聞蕭倣南蘭陵人宣宗時拜嶺南節度使南方珍賄叢夥不以入門家人病取槁梅於厨以和劑倣知趣市還之鄭從讜滎陽人咸通中為嶺南東道節度使先是林邑蠻内侵召天下兵進援會龎勛亂不復遣而北兵寡弱從讜募土豪署其酋右職為約束使相捍禦交廣晏然劉崇􅀛滑州胙人為清海軍節度使有大賈約妓女夜集而他盜殺女遺刀去吏捕賈崇􅀛廉知其􅁈方大饗軍悉集宰人日入陰以遺刀易一雜置之詰朝羣宰即庖取刀一人不去曰此非我刀乃某人刀也因得其主名往視其人則亡矣崇龜取他囚殺之聲言賈也亡宰歸捕誌具伏其精明􅀋此姻舊或干以財率不答但寫茘支圖與之李知柔京兆人昭宗時為清海軍節度使在鎮廉潔為宗室冠宋潘美大名人開寶三年征嶺南以美為行營諸軍都部署進拔韶州長驅至廣州擒劉銀送京師即日命知廣州兼市舶使五年兼嶺南道轉運使土豪周思瓊聚衆􅀒海為亂美討平之嶺表遂安尹崇珂大名人開寶中征嶺南以崇珂為行營馬步軍副都署克廣州擒劉鋹即日詔與潘美同知廣州兼市舶轉運等使未幾樂範鄧存忠等據五州之地以叛崇珂討之數月盡平其黨王明成安人開寳中為嶺南轉運副使徧厯部内視民疾苦舊無名科歛悉條奏除之嶺表遂安曹光實百丈人開寶中平交廣羣盜未息以光實為嶺南諸州都巡檢使既至捕逐羣盜海隅以安賈黄中南皮人開寶中嶺南平以黄中為採訪使廉直平恕遠人便之還奏利害數十事皆稱㫖邊珝鄭人太宗時充廣南轉運使初至適桂州守張頌卒藳葬城外舊制不許以族行僕人乃分匿其家財珝召官吏悉追取之送其柩歸濰州原籍周渭恭城人太平興國二年為廣南諸州轉運副使奏去劉鋹時税算之繁者重定田賦興學校屬有事交阯渭先移書諭朝廷威信黎桓懼即遣使入貢就加監察御史許仲宣青州人太平興國中為廣南轉運使會征交州其地炎瘴士卒死者十二三大將孫全興等失律仲宣因奏罷其兵不待報即以兵分屯諸州開庫賞賜草檄書以諭交州交州即送款内附遣使修貢仲宣復上章待罪帝嘉之楊允恭綿竹人太平興國中為廣連都巡檢使以海鹽盜入嶺北民犯者衆請建大庾縣為軍官輦鹽市之詔建為南安軍自是冐禁者少賊有葉氏者衆五百餘往來海上允恭集水軍襲斬之賊寇每遇風濤遯止洲島間允恭領衆涉海捕之殆盡又抵漳泉賊所止處盡奪先所刧男女還其家詔書嘉􅅄謝德權福州人咸平二年宜州溪蠻叛命陳堯叟往經度之德權預行以單􅀐入蠻境諭以朝㫖衆咸聽命堯叟以聞加閤門祗候廣韶英雄連賀六州都巡檢使曹利用寕晉人真宗時劉永規知宜州馭下殘酷軍校乘衆怨殺永規叛嶺南騷動以利用為廣南安撫使遂斬賊首以徇嶺南平薛顔萬泉人真宗時宜州陳進反命勾當廣南東西路轉運司事賊平遷金部員外郎黄震浦城人真宗時爲廣東轉運使廣南歳進異花數千本至都下枯死者十八九道路苦其煩擾震奏罷之袁抗南昌人提􅀧廣南東路刑獄時浙東叛卒鄂鄰抄閩越轉南海與廣州兵逆戰海中值大風有告鄰溺死者抗獨曰是日風􅀔趨占城鄰未必死後果得鄰於占城張昷之清河人仁宗時徙廣南東路轉運使先是夷人有犯其酋長得自治多􅆭酷昷之始請一以漢法從事周湛穰人仁宗時提􅀧廣南東路刑獄初江湖民畧良人鬻嶺外爲奴婢湛至設方畧搜捕又聽其自陳得男女二千六百人給飲食還其家孫􅃆會稽人皇祐中儂智高反沔入見曰賊勢方張官軍朝夕當有敗奏明日聞蔣偕死帝諭執政曰南事誠如􅃆所料以沔爲湖南江西安撫使加廣南東西路安撫使沔􅁨賊渡嶺而北乃檄湖南北曰大兵且至宜繕治營壘多其宴犒賊疑不敢北侵㑹狄青與智高戰智高敗走青還沔留治後事張忠開封人儂智高反爲廣東兵馬鈐轄領英州團練使素驍勇智高圍廣州不介騎而前㑹先鋒遇賊奔忠手拉賊帥二人馬陷淖不能奮遂中標鎗死玉罕華陽人爲廣東轉運使儂智高入寇罕行部在潮廣州守仲簡自圍中遣書邀罕遂還惠州罕發里民補壯丁得六百人又令邑尉增弓手三干染庫帛爲旗割牛革爲盾斷苦竹數千銛其末使操爲兵悉出公私戎器檄告屬城倣而行之數日衆大振乃簡卒三千方舟建旗伐鼓作樂順流而下將至廣悉衆登岸斬本爲鹿角積高數仭營於南門智高見已嚴備不敢犯罕徐開門而入智高遂解去元絳錢塘人儂智高叛嶺南宿軍邕州而􅀊漕不足絳以直集賢院爲廣東轉運使建瀕江水砦數十以待逋寇繕治十五處樓堞器械皆備軍食有餘范師道長洲人仁宗時爲廣南東路轉運使舊􅀘攝官皆委吏胥無先後遠近之差師道爲置籍次第之蔡抗宋城人仁宗末爲廣東轉運使岑水銅冶廢官給虚劵爲市久不償人無所取資衆因私鑄抗盡給之人得值以止番禺􅀊運鹽英韶道遠多侵竊雜惡抗命十舸爲一運擇攝官主之􅀊終會其殿最增十五萬緡時弟挺提舉䖍州監自大庾嶺下南至廣驛路荒遠室廬稀疏往來無所庇抗乃相與謀課民植松夾道以休行者榮諲任城人仁宗末為廣東轉運使廣有版步古河路絶險林箐瘴毒諲開湞陽峽至洸口古徑作棧道七十間抵清遠趨廣州遂為坦途王靖萃人為廣南轉運使熙寕初廣人訛言交阯且至老幼入保事聞中外以為憂神宗曰王靖在彼可無患即拜太常少卿直昭文館知廣州周敦頤營道人熙寕初為廣東轉運判官提􅀧刑獄以洗冤澤物為已任行部不憚勞苦雖瘴癘險遠亦緩視徐按以疾求知南康軍曽開河南人建炎初為廣東經畧安撫使奉詔駐湖陽招捕䖍寇訖事乃之鎮居二年羣盜盡平張致遠沙縣人高宗時為廣東轉運判官招撫劇盜曽衮等賊衆悉平季陵龍泉人紹興中以徽猷閣待制帥廣先是惠州有狂男子聚衆數千僭號作亂陵入境誘其徒曽衮令以功贖罪不旬日擒之龔茂良興化軍人孝宗時除廣東提刑就知信州即番山之址建學又置番禺南海縣學既成釋奠行郷飲酒禮以落與之家居肩輿登城曉以逆順其徒皆釋甲而首謀數人懼事定受禍遂相率遁入古端州至是與之間命即家治事屬提刑彭鉉討捕潛移黙運人無知者俄而新調諸軍畢集賊戰敗請降桀黠不悛者戮之其餘分隸諸州楊大異醴陵人理宗時提㸃廣東刑獄兼常平時常平司逋􅀒山積械繫追索姦蠧百出大異與之約悉縱遣之􅀒者如期畢輸吏無所容其姦唐璘古田人理宗時爲廣東經畧安撫使梅州寇作璘示以威信寇尋息江淮旱議下廣右和糴璘言公家赤立糴本無所辦終恐日取於民撥本召釁重朝廷憂尋乞致仕召還胡穎湘潭人理宗時爲廣東經畧安撫使潮州僧寺有大蛇能驚動人前後仕於潮者皆信奉之前守未嘗詣已而旱州人咸咎守後守不得已詣焉蛇乃蜿蜒而出守大驚得疾旋卒穎至檄潮州令僧舁蛇至殺之毁其寺劉應龍高安人景定時南海寇作朝廷患之命以顯謨閣待制知廣州兼經畧安撫使寇聞其至遁去應龍􅁹逐之南海大治冷應澂分寧人景定中提舉廣東常平兼轉運使劾守令貪横不法十餘人列郡肅然最聞就陞直寶章閣知廣州主管廣南東路經畧安撫使公事馬步軍都總管領漕庾如故五司叢劇應澂分時理務不擾不勌聞襄樊受圍日繕器械􅁉財粟以備倉猝後卒賴其用屢平大寇未嘗輕殺笞杖以降亦加審慎至其臨事輒斷雖勢要不為撓奪趙逢龍鄞人理宗時提舉廣東常平每至官有司例設供帳悉命撤去日具蔬飯坐公署事至即決遣為政務寛恕民不􅃘欺自常奉外一介不取民賦有逋􅀒悉為代輸尤究心荒政以羨餘為平糴本洪天錫晉江人理宗時為廣東轉運判官決疑獄劾貪吏治財賦皆有法元哈喇布哈囘鶻人世祖時為廣東都轉運鹽使兼領諸番市舶時盜梗鹽法陳良臣煽東莞香山惠州􅀒販之徒為亂江西行省命討捕之先驅斬渠魁躬抵賊巢招誘餘黨復業仍條言鹽法之不便者悉除其害按察使托歡為姦利奏罷之羣盜歐南喜僭王號衆號十萬因圖上山川形勢及攻取之䇿遂與都元帥固爾班哈雅等分兵搤之未幾右丞唆都督兵征占城交阯屬䕶餉道北至東莞博羅二界中遇劇賊歐鍾等横絶石灣其鋒甚鋭哈喇布哈身先士卒且戰且行矢竭馬創徒步格􅃲殺數十人勇氣益厲以衆寡不敵為所執賊欲奉之為主不屈遂遇害於中心岡哈喇布哈舊作合刺普華托歡舊作脱歡固爾班哈雅舊作課兒伯海牙今並譯正羅璧鎮江人大德三年除廣東道宣慰使都元帥山海獠夷不沾王化􅀒固反側乃誘諸洞蠻酋長假以官位曉以禍福由是咸率衆以歸卜天璋洛陽人皇慶時以饒州路總管陞廣東廉訪使先是豪民瀕海堰專商舶以射利參政以賂置不問天璋至發卒決去之嶺南素無氷至是始有氷人謂其政化所致云范梈清江人擢海北海南道廉訪使司照磨巡厯遐陬不憚風波瘴癘所至興學教民雪理􅁈滯甚衆明周禎江寕人洪武九年出為廣東行省參政時省治初開正官多缺吏治鮮勸懲香山丞沖敬興縣治招流移以勞卒官禎為文祭之因奏上郡邑良吏雷州同知余騏孫惠州知府萬迪乳源知縣張安仁清流知縣李鐸揭陽縣丞許德等聞者皆感奮楊卓泰和人洪武五年為廣東行省員外郎有田家婦獨行山中遇雨代木卒欲亂之婦不從遂殺婦婦家得尸訴參政拷同役者二十人皆引服吏抱具獄請署卓列二十人庭下熟視久之指兩卒曰殺人者汝也兩卒大驚服罪參政曰員外何以知之卓曰卒二十人必善惡異二十人遇一婦亂且不能况殺之乎參政曰然遂釋十八人王綱餘姚人洪武中潮民弗靖除廣東參議督兵餉綱時年七十餘以書訣家人攜子彦達行單舸諭降諸亂民還抵増城遇海寇曹真劫之為帥綱不從遂遇害彦達年十六罵賊求死賊欲并殺之其酋曰父忠子孝殺之不祥令綴羊革裏父尸而出花茂巢縣人洪武中為廣州左衞指揮僉事屢立戰功遷都指揮同知數􅁹諸猺賊上言廣東南邊大海姦宄出没蜑户附居海島飄忽不常難於訊詰籍以為兵庶便約東又請設沿海依山廣海碣石神電等二十四衞築城浚池收集隱料仍於山海要害立堡屯軍以備不虞皆報可進都指揮使後卒子英亦以軍功為廣東都指揮使有聲永樂中王溥桂林人洪武末為廣東參政以廉名其弟自家來省屬吏與同舟贈以布袍溥命還之曰一衣雖微不可不慎此汙行辱身之漸也先是糧運由海道多漂没溥身至庾嶺相度形􅀔命有司鑿石填塹修治橋梁教民車運民甚便之梁觀當塗人永樂中為廣東僉事剛介廉平有盜聚潮州山中衞將欲􅁹之觀曰此貧民耳馳檄諭之皆解散潮人德之比殁為肖像祀之於昌黎祠朱鑑晉江人永樂中以御史巡按廣東奉命錄囚多所平反招撫逋叛甚衆熊概豐城人永樂中為廣東按察使明敏剛決獄無冤滯呉揚新淦人宣徳中擢廣東布政使勸農桑興學校凡所設施皆有次第彭遠南昌人正統中擢廣東布政使勤慎寛和政績甚著有親死久不葬者限以葬期民悉從化楊信民浙江新昌人正統中擢廣東左參議清操絶俗景帝監國廣東賊黄蕭飬圍廣州􅇥以信民巡撫其地士民聞之歡呼相慶至則發倉廩賑恤民始有更生望益厲甲兵激勸將士招降解散賊勢漸衰乃使使持檄諭以恩信蕭養曰得楊公一言死不感剋期請見信民單車詣之賊黨争羅拜有泣下者㑹暴卒軍民聚哭賊聞之亦曰楊公死吾屬無噍􅀋矣未幾董興帥兵平賊所過多殺掠民仰天號曰楊公若在豈使吾曹至是成化中賜諡恭惠命有司􅀊時祭之陳員韜臨海人正統末擢廣東右參政值黄蕭養亂後拊循備至得士民心王翺鹽山人景泰三年潯梧猺亂于謙請特遣一大臣督軍務乃命翺以左都御史往兩廣有總督自翺始翺至鎮將吏讋服推誠撫諭猺人嚮化項忠嘉興人景泰中由郎中遷廣東副使按行高州謀告賊攜男女數百剽村落忠戒諸將曰賊無攜家理勿妄殺已訊所􅀗俘果良民被掠者盡釋之從征瀧水猺有功增俸一秩朱英桂陽人景泰中為廣東右㕘議撫凋瘵招流亡立均徭法十嵗一更民稱便天順初兩廣賊熾諸將多濫殺冒功參將葉盛檄信班范信誣民師一方始為賊任意屠戮英請巡撫靖又破平潮州賊羅劉安等在廣十年政績甚著成化十一年以右副都御史總督兩廣自韓雍大征以來將帥喜邀功利俘掠名為鵰􅁹英至鎮以安静約飭將士毋得妄請用師招撫猺獞効順者定為編户給復三年自是諸蠻歸附日衆劉煒慈谿人天順初為廣東參政分守惠潮二府潮有巨寇招之不從煒㑹兵進􅁹誅其魁改莅南韶會大軍征兩廣以勞瘁卒官葉盛崑山人天順二年以右僉都御史巡撫兩廣瀧水猺肆掠督諸將生擒之尋與總兵官顔彪屢破賊砦八百所疏請廣東鹽商計鹽多寡入粟餉邊公私咸利夏壎天台人天順初擢廣東按察使時用師􅀊久役民守城壎至悉遣之成化初奏猺獞弗靖由有司撫字乖方賊因得誘良民為徒黨進則驅之使前退則殺以抒憤害常在我利常在彼請慎選監司守令撫綏遺民彼被脅之衆自聞風來歸帝深納其言毛吉餘姚人天順五年擢廣東僉事分巡惠潮二府痛抑豪右民大悦程鄉賊楊輝等為亂擊斬其黨生擒輝進副使移巡高雷廉三府時民遭賊蹂躪數百里無人煙諸將悉閉城自守吉不勝憤以平賊為巳任成化元年二月新㑹告􅇥吉合軍至大磴破賊乘勝追至雲岫山復戰軍潰賊持槍趨吉吉且罵且戰手劍一人斷其臂力䊼遂􅀍害贈按察使追諡忠襄張瑄江浦人天順中擢廣東右布政使廣西賊莫文章等越境陷連山瑄擊斬之又破陽江賊周公轉新興賊鄧李保等按行所部督建預備倉六十二修陂塘圩岸四十六百增築廣州新會諸城垣一十二民徳瑄惟恐其去既轉左會滿九載軍民乞留仍復故任久之始遷韓雍長滿人成化元年廣西猺獞流剽廣東殘破郡縣以雍為左僉都御史贊理軍務分兵五道並進先後破賊三百二十四砦生擒賊魁餘黨悉平遷左副都御史提督兩廣軍務雍以兩廣地大事殷請東西分設兩巡撫而雍專理軍事尋以憂歸盜復起僉事陶魯言兩廣地勢錯互不可離折乞仍命大臣總督便乃罷兩巡撫起雍右都御史總督如故蠻民素懾雍威寇盜寢息中官黄沁憾雍抑已與廣西布政使何宜等共搆竟致仕去兩廣人念雍功為立祠祀焉陶魯鬰林人成化二年由廣州同知擢為僉事專治新會陽江陽春瀧水新興諸縣兵屢破劇賊廖婆保黄公漢等以兩廣寇盜不息奏請建設制府於梧州遂為永制秩滿進副使九載課最進湖廣按察使治兵兩廣如故鬱林陸川賊黄公定等為亂大破之宏治四年以平德慶猺進湖廣右布政使魯言身居兩廣而官以湖廣為名於事體非便乃改湖廣左布政使兼廣東按察副使領嶺南道事人稱之為三廣公十一年卒魯善撫士多智計謀定後戰所向克捷厯官四十五年大小數十戰凡斬馘二萬一千四百有竒奪還被掠及撫安復業者十三萬七千有竒然不専尚武每平賊率置縣建學以興教化兩廣人􅀝之如長城孔鏞長洲人成化五年以高州知府擢按察副使分巡高雷二府招劇賊梁定侯大六鄧辛酉等處之内地分田與耕遂為官備他盜廣西賊犯信宜岑溪皆擊敗之治績聞賜誥命旌異歐磐滁人成化中擢廣東都指揮僉事屢􅁹寇有功遷廣西右參將彭韶莆田人成化十四年為廣東左布政使時中官奉使紛還鎮守則顧恒市舶則韋眷珠池則黄福皆以進奉為名民不勝擾韶先後論奏梁方弟徳以錦衣鎮撫歸采禽鳥花本進獻為害尤酷韶抗疏極諫方怒搆之帝調貴州士民號泣追送陳選臨海人員韜子成化中厯廣東左右布政使鎮守中官擾民選嚴條約力禁之肇慶大水具􅃺不待報輒發粟以賑有詔減省貢獻而市舶中宦韋春奏乞均猺户六十人添辦方物選持詔書爭帝命與其半番人馬力麻詭稱使臣入貢春利其厚賄將許之選立逐之去眷積憾卒為所搆被徵至南昌病卒秦紘單人宏治初以右副都御史總制兩廣軍務奏言中官武將總鎮兩廣者率縱私人櫌商賈賊殺不辜交通土官為奸利請嚴禁絶廣潮南韶多盜當設社學編保甲教誨而要束之俾絶盜源帝悉從其請恩州知州岑欽逐田州知府岑溥與泗城知州分據其地紘入田州逐走欽還溥於皆平以劾府亂遂定遣將討黎賊陵水猺賊德慶總兵官安遠侯柳景貪暴為景誣訐被逮軍民號泣追送周南縉雲人宏治初官柳景風紀肅巡按廣東劾總兵然正德九年以右都御史總督兩廣軍務有聲於時劉大夏華客人宏治二東右布政使田年遷廣州泗城不靖大賊必生夏往諭遂順命後山賊起承檄討之令􅀗致驗實乃坐得生者過半十三年即家起右都御史總制兩廣軍務勅使及門攜二僮遂行廣人故思大夏鼓舞交慶大夏為清吏治捐供億禁内外鎮守官私役軍土法嚴令具盜賊衰止瞿俊常熟人宏治四年爲廣東按察副使黎人時出寇掠俊戒約羣吏修軍政遂讋服不敢出嘗暮至瓊州官舍從吏白内有怪夜半光如匹練起庭樹上俊伐其樹怪遂絶周孟中廬陵人宏治中爲廣東左布政使中官採珠者􅀊僉大户解納輒肆朘削孟中曰我在敢復爾耶即移牒詰之中官氣懾而止民間嫁娶後期喪􅁙不舉者皆有禁風俗爲變呉廷舉梧州人宏治中擢廣東僉事從潘蕃討平南海清遠諸盜正德初厯副使發總鎮中官潘中二十罪忠亦訐廷舉他事逮擊詔獄戌雁門後爲廣東右布政使亦有平賊功熊繡道州人正德元年以右都御史總督兩廣盡裁幕府供億秋毫無所取劉瑾深嫉之乃召掌南京都察院事張嵿蕭山人嘉靖初以右都御史總督兩廣軍務明號令繕甲兵簡武勇與總兵官朱麒討廣西上思州賊黄鏐擒之又破平廣東新寕恩平賊蔡猛三嚴阮等爲嶺南戰功第一魏校崑山人嘉靖初爲廣東提學副使黜異端盡毁諸佛寺曹溪有大鑒衣鉢取而焚之曰無使惑後人梁材南京金吾右衞人嘉靖四年為廣東左布政使時俗尚侈靡材獨布衣糲食用節儉先僚佐同官林富家市肉多材召其家人誠約之富怒詬而出材治簿書自如富慚謝吏民輸課令自操權衡吏不得預時天下布政稱極廉者二人材與姚鏌也姚鏌慈谿人嘉靖五年以右都御史提督兩廣軍務兼巡撫田州土官岑猛謀不軌鏌令都指揮沈希儀等統兵八萬分道討平之遂請改設流官陳善後七事制可會猛黨盧蘇王受等復叛而鏌以奪霍韜方獻夫所占田還之民為所排竟罷去徐問武進人嘉靖初為廣東左布政使中使採珠不中程巡按御史憂之將責諸商問爭曰民採珠有禁若爾不趣商為盜􅁘乃止陶諧會稽人嘉靖中以兵部右侍郎總督兩廣軍務降海寇許折挂討平陽春賊趙林花與德慶賊鳯二全等瓊山沙灣洞賊黎佛二等為亂諧復􅁹之戰功甚著時張璁用事諧不屑附麗功多不錄人咸為諧不平諧自若也張岳惠安人嘉靖中以右副都御史總督兩廣軍務兼巡撫盡汰督府供億檄文武將吏非召不得至軍門討破封川獞蘇公樂等平廣西馬平諸縣猺賊連山賊李金與賀縣賊倪仲亮等出没衡永郴桂積三十年不能平岳大合兵討之賊渠授首莅鎮四年視民如子邊防吏治綜覈無遺部内巨寇以次削平周延吉水人嘉靖中為廣東參政撫安南征黎寇皆有功三遷廣東左布政使商大節鍾祥人嘉靖中為廣東僉事撫綏猺獞遣其子弟習禮學宫期年而蠻俗變海南黎叛督檄分哨凌水搗其巢俘斬千餘人増秩賜金帛項喬永嘉人嘉靖中為廣東左參政撫定大羅猺犵翦博羅羅浮逋寇數百人按部至韶州卒吏民哀悼若喪所親俞大猷晉江人嘉靖中為廣東都司安南叛臣范子儀入寇大猷擊破之窮追至海東雲屯檄其國王斬子儀函首來獻瓊州諸黎反开大猷參將進􅁹斬􅀗甚衆餘乞降大猷單􅀐入峒與定要約海南遂安饒平賊張連數陷城邑積年不平詔大猷為南贛參將合閩廣兵討之大猷潛師搗其巢誘連戰執之擢副總兵協守南贛汀漳惠潮諸郡乗勝征程鄉盜平之由南贛總兵改鎮廣東時倭寇與潮州大盜呉平相犄角諸峒應之剽掠惠潮間大猷至圍倭鄒塘一日夜尅三巢大破之於海豐移師至潮吳平懼乞降尋逸去大猷坐奪職尋以􅁹擒河源賊李亞元還職改鎮廣西討平海賊曽一本大猷為將廉潔馭下有恩先後任粤中數平巨寇建大功威名震於南服潘季馴烏程人嘉靖中巡按廣東行均平里甲法廣人大便臨代去疏請飭後至者守其法帝從之萬士和宜興人嘉靖中遷廣東左布政使司政故專治於左士和曰朝廷設二使如左右手非有軒輊乃約右使分日治事廣民萬里輸課京師其費不貲士和稍徴道里費使吏領之民稱便王鈁奉化人嘉靖中以兵部右侍郎提督兩廣軍務討平肇慶山賊馮天恩等置廣寕縣設戌兵控要害一方遂安後倭寇自閩犯揭陽禦却之復討瀧水陽春劇賊擒其魁餘黨悉解吳桂芳新建人嘉靖末以兵部右侍郎提督兩廣軍務兼巡撫時羣盜河源李亞元程鄉葉丹樓連􅀊為患潮州舊倭屯據鄒塘而新倭寇福建者復流入境桂芳以次討平降賊王西橋吳平已撫復叛皆撲滅之郭應聘莆田人嘉靖末轉廣東參政從提督吳桂芳平李亞元别擊賊首張韶南黄仕良等遷廣西按察使萬厯十年以右都御史總督兩廣軍務餽遺一無所受李佑貴州清平人嘉靖末以右僉都御史巡撫廣東屢平海寇林道乾山寇張韶南等時初設巡撫百務新創佑綜理周密規模遂定熊桴江夏人隆慶初以右僉都御史巡撫廣東撫循士民發金賑貸罷魚鹽逋課檄州縣行保甲造戰艘百有六十區畫周悉海寇曾一本犯福建會兵擊敗之已復大發兵偕總督劉燾等討擒一本餘黨悉平張元勲浙江太平人隆慶時惠廣韶三郡土寇劫掠郡縣以元勲為總兵官勒軍進􅁹賊皆授首肇慶諸峒復有三巢十寨十三村皆積年巨寇勢甚張元勲與總督殷正茂計令諸將鵰􅁹亦得敘功諸路爭奮破大小巢七百餘撫定餘黨不數月巨寇皆靖已而倭陷銅鼓口雙魚城元勲大破之萬厯五年以大征羅旁功進都督世􅄻錦衣千户元勲在鎮大小百十戰威鎮嶺南與廣西李錫並稱良將李材豐城人隆慶中為廣東僉事羅旁賊猖獗材襲破之周高山設屯以守賊有三巢分兵三道進討燬其巢募人田之後以破倭功進副使凌雲翼太倉州人萬厯初以兵部左侍郎提督兩廣軍務羅旁在德慶州上下江界東西兩山間延袤七百里成化中韓雍經畧西山頗安輯惟山東猺阻深箐剽掠時發雲翼乃大集兵令總兵官張元勲李錫將之四閲月克巢五百六十招降四萬二千八百餘人鄰境猺獞皆懼求撫雲翼奏設官戌之乃改瀧水縣為羅定州設監司參將積患頓悉呉文華連江人萬厯中以兵部右侍郎總督兩廣軍務巡撫廣東岑岡賊李珍江月照􅀒險拒命垂三十餘年前巡撫呉百朋欲討不果至是益毒虐文華討平之王鳴鶴淮安衞人萬厯中為廣東總兵官崖州黎人羅活抱宥二峒為亂督臣􅁹撫失宜總兵參將皆戰殁羣黎蜂起鳴鶴親督諸將分七道直抵其巢抱宥破羅活焚營遁進􅁹平之招撫一十六峒而還為建城置戌一方遂安梅之煥麻城人萬厯中以副使分巡惠潮所部多滯囚應時決遣摘發姦宄强宗無所縱舍豪民沈烈女於水擒得就其所扑殺之海寇袁進掠潮州之煥嚴兵扼海道招散其黨進窘夜遁去洪雲蒸攸縣人崇禎五年為廣東副使討平九連山餘賊遷廣西右參政復調廣東總督熊文燦遣撫海盜劉香香留之不遣還八年鄭芝龍合廣東兵進擊香香脅雲蒸出止兵雲蒸大呼曰我矢死報國急擊勿失遂遇害香亦覆滅方震孺夀州人崇禎中為嶺西參議有裨將據廉州叛單􅀐諭降之陳鵬崇禎間官廣東參將技勇絶倫居官廉待士卒有恩連平猺賊作亂從總兵施王政進􅁹鵬奮勇先登一鼓破馬箭巢焚其積聚殆盡賊乞撫不允􅀌軍深入遂戰死本朝佟養甲佟佳氏漢軍正藍旗人順治二年擢兩廣總督時朱聿鐭僭號養甲同提督李成棟進􅁹擒聿鐭及朱肅眔等又平高雷廉三府降朱由棪及總兵官李志連誅陳􅀖彦等兩粤畧定五年􅀊大飢人相食養甲設法賑卹通糴存活甚衆李成棟叛養甲死之贈太子少保銜李率泰漢軍正藍旗人順治十年為兩廣總督與靖南將軍撃破李定國於新會遂復高雷先是新㑹被圍食盡守者將殺城中婦女率泰力言於平藩釋者千人民立祠祀焉王國光漢軍正紅旗人順治十三年總督兩廣廉明果斷時土冦充斥國光力行保甲嚴連坐之法萑苻寖止康熙三年海盜蘇利復叛據潮郡加鎮海大將軍銜往討平之兵不血刃粤賴以安李棲鳯漢軍鑲紅旗人順治六年以僉都御史撫粤􅁹撫並用動合機宜尋陞總督在粤十二年杜請託絶饋遺省刑薄歛勞來安集粤人思之卒祀名宦董應魁奉天鑲黄旗人順治十八年巡撫廣東值靖藩移鎮閩省督行糧甚急應魁曰吾不􅃘諉罪於下請身任其咎遂左降部民立祠以祀蓋一鵾本姓孫富平人順治五年為水師總兵十一年李定國圍新㑹戰殁於陣林嗣環晉江人順治七年為雷瓊道先是海賊羅成基踞民田民代輸税及賊平田入官税仍在民嗣環清出之瓊向有派役例嗣環令均其役鄔象鼎仁和人順治七年為羅定兵備道十年六月死吳子聖之難趙廷標錢塘人順治三年以諸生從軍歴官廣肇南韶道兩廣八排諸盜聞廷標至立解連州冦起鎮臣以􅁹捕方畧委之廷標冦即就撫粤中分巡使者舊有柴薪錢悉屏下受卒祀名宦馮偀慈谿人順治進士六年李成棟叛偀以副使巡視海道會同大帥統師平南韶等郡旋平廣州未幾范承恩據城叛偀遣人恫喝之並發礮雜以鼓聲承恩遂潰廣州復安卒祀名宦施起元福清人順治進士隨平藩入粤七年授廣東參議道時惠州新復哀鴻未集起元勞來安集力行十二事境内以安辛卯攝學政所拔悉當卒祀名宦呉嵩仭真定人順治進士十五年授廣東分巡驛傳道甫下車督戰艦籌兵餉修隄防葺學校花山盜魁王興􅀒固率師掃除之及攝鹺政釐剔錮􅁦商民兩便卒祀名宦呉興祚漢軍正紅旗人康熙二十一年總督兩粤部署廢藩綠旗官兵分左右翼左鎮廣右鎮韶制軍坐鎮上游控禦全粤逆藩尚之信遺孽擅鹽鐵重利悉釐剔之時錢法壅滯設局鼓鑄錢布流通卒於官粤人德之郭世隆漢軍鑲紅旗人康熙三十年總督兩廣革無名征額三十餘萬海島叢奸劫奪世隆宻防要口督造戰艦出洋搜逐擒斬五六百人降二千餘人海警遂息石琳漢軍正白旗人康熙三十二年總督兩廣粤東告飢解俸給粥存活甚衆瀧江羚羊峡暴水潰堤琳朝服立隄上刑馬沈王禱干江躬􅀒薪塞隄水遂退嘗決黎讞於瓊南殲渠魁釋株連民用大安猺人肆擾窟穴在萬山中琳提師深入悉平之兩粤之民肖貌以祀王來任奉天正黄旗人康熙四年巡撫廣東時粤屢經冦盜軍民未安來任至撫集流亡諮詢疾苦復陳六大害力請禁革平反積案囹圄一空劉秉權漢軍正紅旗人康熙七年巡撫廣東招徠安插男婦十六萬有竒墾田二萬五千餘頃甲寅秋潮鎮劉進忠叛親赴潮城與都統提鎮籌畫軍機積勞病卒朱宏祚高唐州人康熙二十七年巡撫廣東題減衞所屯四税額並免高瓊二郡逋糧十餘萬惠潮多劇盜捕得悉投諸江盜遂息楊宗仁漢軍正白旗人康熙五十八年巡撫廣東攜十數人赴任除貪蠧嚴保甲卹貧民興學校粤人深感之李士正奉天人康熙二十年巡撫粤東時藩焰方息民間田廬店舍多為三旗馬步閒丁所據士正量地盡界還給於民布寛大之政二十四條兵民便之並於海疆扼要處分汛設戍􅁹捕花山沙潭諸盜奏請立縣今花縣所自始也卒杞石宦彭鵬莆田人康熙四十年撫粤東勤敏視事劾墨吏無少徇者時仲坑開採聚衆幾二十萬鵬驅散之惠潮隂受其福􅀊旱跣足禱雨甘霖立應卒祠名宦陳肇昌江夏人順治進士康熙十七年督學廣東值兵燹士多流亡肇昌加意招來秉公甄拔所至申明條約士習以淳雍正三年祀名宦李坤鎮平人以總兵調征廣西與呉三桂戰梧州敗之次日復大戰馬蹶陣亡諡忠烈又副將王承業林廷燏守備羅文舉翟永昌林文璚等俱死呉三桂之難王忠孝遼東人康熙十九年署左翼鎮總兵死呉三桂之難贈都督同知銜朱鴻祚陜西人康熙十六年守東莞石龍鎮征海冦力戰死都司蕭萬竒高有功黄勝並死之張仲德奉天人康熙十七年官廣東布政使革􅁦政禁刁風時值南韶二郡盜起仲德運籌有方上不虧賦下不病民卒祀名宦江起龍徽州人為水師副將康熙五年出洋捕盜舟覆死累著靈異雍正九年賜號英佑驍􅀐將軍之神黄相龍溪人為兩廣督標副將康熙十三年檄討高明瓏泔賊死之文天壽安塞人康熙十五年為左翼鎮標中軍游擊領兵守江門賊孫楷宗誘以叛天夀叱曰背主不忠吾錚錚丈夫豈鼠輩可脅哉遂被殺沉屍海中程大畢孝感人康熙五十二年授兩廣鹽法道定引七帑三之例凡鹺政積􅁦悉釐剔之公餘觀風造士所拔皆知名五十七年還里攀轅􅃒道夜始得行卒祀名宦白璧琛漢軍正勺旗人康熙五十一年擢廣南韶道墨吏望風引遁江灣向為奸藪琛攻滅之西山猺相􅃲單􅀐厯險諭降之歳旱禱雨輒應轉荒為豐莽吉圖滿洲鑲白旗人康熙十三年以副都統守肇慶尚之信叛偽將馬雄圍肇急吉圖潰圍走江右請援賊躡之轉戰二千餘里踰三月始達信豐屢破賊將捷書至加佩鎮南大將軍印平兩粤十六年七月呉三桂偽將馬寶胡國柱等冦韶州吉圖急馳入州増築土城於北賊晝夜力攻不得入吉圖先遣軍駐白土村衞餉道飛檄促江寕將軍額楚赴援援至適與賊遇賊殊死鬬吉圖出城中兵夾擊之賊遁去韶城􅀗全陳大受祁陽人雍正進士乾隆十五年總督兩廣時海康遂溪海陽等處隄壞於風雨疏請令民自修民甚便之卒諡文肅祀賢良祠班第博爾特氏蒙古鑲黄旗人乾隆十八年任兩廣總督緝􅀗增城東莞奸民王亮臣等寘之法創製水車分發廉州所屬州縣各鄉引水甚易廉民至今便之後死爲蘭庫圖之難祀昭忠祠諡義烈王安國高郵人雍正進士第二十二年督學廣東令諸生重廉恥長氣節乾隆五年巡撫粤東奏裁穴缺計最察吏不苟舉劾向例江西撥廣東漕糧十萬石度灘越嶺挽運維艱請改撥湖南官民稱便卒諡文肅潘思榘陽湖人雍正進士官廣東布政使卓著政績吏民便之卒諡敏惠祀賢良祠阿里衮鈕祜祿氏滿洲鑲黄旗人乾隆十六年授兩廣總督東莞縣民莫信豐等同逆百正亮臣糾黨謀不軌事覺阿里衮馳赴增城搜捕逆匪二百七十餘人置之法師旅無驚居氏安堵德保索綽絡氏滿洲正白旗人乾隆進士三十四年巡撫廣東奬勵人才嚴課書院三十六年兼署兩廣總督修軍械肅吏治省巡船粤民咸懷其惠卒諡文莊李湖江西南昌人乾隆四十五年任廣東巡撫粤東素多盜而番禺之沙灣茭塘地近大洋尤稱盜藪湖莅任即會同總督巴延三嚴密訪緝擒誅盜首二百餘人復條奏安輯章程以重防禦海濱􅀗安堵焉卒諡恭毅祀賢良祠朱珪大興人乾隆進士五十八年廵撫廣東嘉慶元年總督兩廣清操亮節人皆仰之後官户部尚書值廣東布政使奏升濱海沙地賦珪駮曰與民計微利大非政體卒諡文正協修官臣許應藻恭纂總纂官臣廖鴻藻恭覆輯校對官臣陸以潤恭校
