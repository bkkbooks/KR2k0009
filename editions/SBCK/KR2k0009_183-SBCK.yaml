姚州東流經元謀縣境又流入州北界又東達四川㑹理州界之舊黎溪州􅀩氏封為四瀆之一沿江多嵐瘴行人以雨中及夜渡可無虞元李京詩五月渡瀘即此地三月九月瘴霧起西溪河即楚雄府之龍川江也一名紀寶溪自楚雄府定遠縣北流入州界又西北經元謀縣西入金沙江烏􅀩河在州治北五里源出祿勸縣之烏􅀩山繞流經此溉田數百頃下流入金沙江按烏􅀩山之泉流為烏􅀩河者非此水普渡河在祿勸縣之廢石舊縣東南即螳螂川下流也源自雲南府富民縣流入㑹掌鳩河之水入金沙江鷓鴣河在撤甸南五里南流入祿勸縣界龍橋水在州北流經府城南合於掌鳩水勒洟水在州東北源自廢南甸縣與東溪洟皆分流而東北注金沙江掌鳩水在祿勸縣廢石舊縣元史地理志掌鳩甸有溪繞其三面凡數十渡舊志水自府境北流入禄勸州東南與欵莊樂宰二水合又東入普渡河以達於江其合處形如獅子名獅子口惠嫋湖在州西北八十里湖方五里茂林掩映水深不測葉落湖中鳥輒􅋦去應元溪在元謀縣南源出本州虚仁驛流經馬頭山入縣縣中田畝皆資其灌溉下流合於西溪河香水泉在州南二里舊志其泉春時則香土人於二三月祭之然後汲取又州西十五里亦有香泉冷泉在州西六里其水清潔寒氣徹骨温泉在元謀縣法納禾村其沸如湯可燖羊豕又祿勸縣温泉有二一在縣南五里一在小輯麻村昔鳳氏所甓今變為寒泉甘龍泉在祿勸縣城内自石崖流岀居人汲飲所資石泉在祿勸縣東一百二十里灑交營坡不溢不涸蓮花井在州東北水頗甘冽常清不涸鹽井井有二滇志只舊井距州一百六十里草起井距州二百里俱産鹽本朝康􅄉十年二井俱封閉者吉村渠在祿勸縣有二一在縣東北一在縣前又有桃源村永平村納吉村等渠俱在縣境有灌溉之利古蹟和曲故城元史地理志和曲州在武定路西南蠻名叵簉甸僰􅢱諸種蠻所居蒙氏時白蠻據其地至段氏以烏蠻阿􅝮併吞諸蠻聚落分兄弟子姪居之皆隸羅婺憲宗六年改叵簉甸曰和曲至元二十六年升為州明統志和曲州在府西南三十里舊志州舊治在府東十五里後改附府城故治遂廢按明統志和曲州在府治西南之十里今州城去舊城七里則舊和曲州或當在城南而舊志作府東十五里未知何據南甸故城在州東元史地理志南甸武定路治本縣蠻曰瀼甸又稱洟陬籠至元二十六年改為縣通志南甸縣本置於郭下明嘉靖末土酋鳳繼祖作亂縣廢隆慶三年賊平移建府治于獅山之麓即今府治也東去舊府城七里四年移和曲州於郭下遂不置縣石舊故城在祿勸縣東五里元置縣屬祿勸州元史地理志石舊縣在州東有四甸曰掌鳩曰法塊曰抺捻曰曲蔽掌鳩甸訛名石舊至元二十六年立縣明統志縣在州治東五里明正德中省入州易籠故城在祿勸縣北一百八十里元置縣屬祿勸州元史地理志易籠城在州北地名培場縣境有二水蠻語謂洟為水籠為城因此為名昔羅婺部大酋居之為羣酋㑹集之所至元二十六年立縣明史元以蠻部洪農祿券甸置祿勸州領易籠石舊二縣洪武中省易籠縣諸葛城在州東二里相傳諸葛亮曾駐兵于此今遺址猶存龍隱臺在州西八里獅山之嶺􅀌峯入雲兩石相抱中容數人世傳明建文帝隱此故名凌泉亭在州西獅山之頂明巡撫劉維建有古松二株如虬龍形藤蘿數百尺􅅶之懸女石在禄勸縣石舊廢縣南十里俗傳古有二女牧織山下有飛蟲來集麾之不去撲殺之俄而烈風大作吹二女懸于崖下化為石關隘小甸關在州南五十里有堡龍街關在州西北七十里明永樂五年建二關俱有巡檢司今皆廢石關在祿勸縣境又有石門關亦在州境撤甸同知在州城北一百九十里本撤甸土酋地本朝康熙五十七年土酋常應運叛伏誅以其地屬武定移同知駐焉乾隆七年裁金沙江廵司在州西二百五十里金沙江南岸明永樂五年建今仍舊又有羅摩耳廵司在州北八十里明宏治十九年建乾海子巡司在州西北六十里永樂五年建萬厯四十一年二司俱裁普渡河巡司在祿勸縣北一百八十里普渡河岸明永樂五年置廵司又有撤里廵司在州城南二百里明初建後俱裁和曲驛在州東門外又州南八十里有利浪驛州西二百九十里有姜驛州西北五十里有虚仁驛二百八十里有環川驛明洪武中俱置驛丞後皆裁津梁通㑹橋在州東大路明天啟中遷於東城之左以鎮水口舊又名迎祥橋大營橋在州東南一里明宏治中建又東南四十里冷村有濟溪橋亦宏治中建惠民橋在州西北一里有澗極深又二里有便民橋俱明萬厯中建通遠橋在州西北路通元謀縣明宏治中建龍潭橋在州城東北二里兩岸崖壁峭立跨以木橋下有龍潭大板橋在元謀縣西一里明正統中建萬厯間重建魯虚橋在祿勸縣西北十里明宏治中建陵墓漢冡在州境元史地理志和曲州地多漢冡或謂漢人曽居此元安慈冡在州境龍三藏去州城三十里烈婦墓在州境舊和曲州名氏無考祠廟忠烈祠在州東門外祀明死難僉事張澤同知袁俸知州秦健吏目劉瑀照磨張成知事高心巡檢俞伯官教授當存仁生員楊忠誨吕公祠在和曲州西祀明廵撫吕光洵昭忠祠在州治舊於忠勇祠内設牌本朝嘉慶八年建寺觀正續寺在州西五里元時建明末重修寺後有藏經閣舊為明建文閣設建文遺像旁列從亡臣十一人法林寺在元謀縣東北雷應山西林寺在祿勸縣南十里翠華山文殊寺在祿勸縣北門外舊廢明萬厯中復建五龍寺在祿勸縣東北五十里撤馬邑林木深密石隙玲瓏周圍出清泉數處故云五龍近寺田畝賴以灌溉仙臺觀在祿勸縣南十里名宦元安慈武德將軍與子弄積俱有功於武定明董敏樂平人成化中官給事中以直言謫石舊知縣時土酋猖獗盜賊􅉕起敏練民兵使遠近各為保䕶遂至萑苻絶警土酋畏服以循良遷去張敬清江人宏治中知和曲州存心慈愛政善民安州人感戴秦健廣西人嘉靖初知祿勸州鳳朝文叛健分地監守賊攻圍甚急力不能支遂遇害同時武定府同知袁俸四川人率妻子一門盡節又敎授常存仁祿勸州吏目劉瑀知事高心照磨張成巡檢俞伯官均死之鄧世彥湖廣人隆慶間爲武定府同知值鳳繼祖倡亂世彥輓運軍糈盡心贊畫得以次􅁹平遂創建府治城垣地方賴以保障金守仁武定守禦指揮萬厯中阿克之亂與千户王應爵魏守恭張斗梅應時黄桂鎮撫金榮高百户楊應祖陳宰生員董漢英俱殉難王應期湖廣人萬厯末任武定知府土酋沙大金作亂應期出竒制勝討平之胡其慥湖廣人天啟二年任武定知府阿歹叛其慥竭力捍禦城賴以全趙紓山西人天啟間任武定知府廉正自持修學崇文勸農息訟教民齒讓民懷其德皆呼爲趙青天去之日有送至數百里外者楊于陛劍州人舉于鄉厯官武定同知建書院教士以理學崇禎六年死普名聲之亂高其勲以叅將守禦武定沙定洲來攻其勲固守月餘城陷服毒死人物明楊尭年和曲人嘉靖以前未設郡學堯年􅀉學大理發憤讀書歸教里人郡人知學自堯年開之楊忠惠和曲人􅀉學雲南府嘉靖中鳳繼祖之亂軍門議遣人招降無敢前者忠惠奮義請行為賊所害死甚激烈楊春震和曲人萬厯中舉人授湖廣夷陵州知州夷陵有􅀔宦挾官害民春震除之聞父病即歸侍湯藥守喪哀毁庶母弟二人春霖春霽相繼卒春霽妻辛氏守節遺一女春震恤之倍已岀事庶母盡禮杜門殺授著述甚富楊元祐春震子以副貢任趙州學正孫可望據滇迫以官力拒不受士論稱之陳此丹和曲人崇禎末奉母避兵山中偶相失此丹號泣追尋不􅀗渴甚將所􅀒米囊置道旁覓水澗中比反母坐囊上問母何以至此母言黑夜行荆􅁄中力疲暫息不知為已囊也人以為孝義所致藍碧元謀人割股以愈母疾施穀以賑民飢又立義倉儲穀以佐官乏上官嘉其孝義特旌其門武恬和曲人或稱武風子善以火炭繪竹箸作禽魚花鳥狀孫可望入滇見其箸繫之来命作箸不應以刃脅之無懼色遂緃之自此佯狂市中後不知所徃本朝徐升曜元謀人官副將入蜀招撫王屏藩不屈遇害贈左都督流寓明謝秉􅉗山隂人明末守武定勇於為民不避權貴解官後貧不能歸民愛之迎居和曲西村後􅁲居祿勸尋卒元謀令馬之鵬表其墓列女明張節妻李氏和曲人年十八許聘未嫁節死誓不更字嘉靖七年兵變途遇一男子執其手即以刀自斷其手而死李含英女名五娘和曲人矢志養母不適人嘉靖七年鳳朝文叛刎頸死成乃貞妻李氏和曲人嘉靖七年鳳朝文之變為賊所執撞地而死州守為之立墓何天相妻高氏和曲人萬厯中阿克鄭舉為亂天相令同走避難氏知無所避乃曰今日之事吾與若有死而已抱㓜女俱投井死同邑夏某妻趙氏同時自縊死楊春霽妻辛氏和曲人性貞靜通經史春霽死氏年二十一歳守節集古今烈女事作小囊佩之年八十五有疾却藥不進曰六十四年清白可隨夫於地下矣含笑而卒魏守恭妻胡氏祿勸人守恭為千户遠岀萬厯中值阿克之變氏聞城陷率二子望闕叩首自縊死居之敬妻趙氏元謀人崇禎末土賊陷城氏投井死本朝陳璿妻李氏武定人年二十七夫卒子㓜氏守節事舅姑以孝聞後子亦病殁又撫孫成立厯六十餘年雍正間旌楊又清妻何氏元謀人夫亡氏號泣不巳目失明守節五十餘年教四子成名雍正間旌楊玉正妻徐氏武定人夫亡守節與同州太恂妻劉氏閻維剛妻李氏李素衛妻祿氏均乾隆間旌康藩錫妻張氏元謀人夫亡守節與同縣康宏妻藍氏楊琮妻楊氏拜起龍妻安氏包景運妻趙氏均乾隆間旌楊多夀妻朱氏祿勸人苦節終身乾隆間旌仙釋明補鍋匠無姓名以啞稱永樂間常憩獅山徃來村落間業補鍋有從學者不索謝但令負擔前行數載人不識也一日於南門外獅山道上揀柴枝作三字云要南下奄然而逝雪舫和尚永樂時常於極高處朗誦咏嘆人以為梵典也就探見袖中一冊不知何書見人至輒貯䄂中避他處深秋薄暮每登眺盤陀石上亦取䄂中冊讀之住獅山或經年後不知所往土產明礬元謀縣岀礪石金沙江出龍腦石出獅子山有花紋質微脆五色石斛岀祿勸普渡河紺紅者佳梭羅木州境岀巖羊禄勸縣出
