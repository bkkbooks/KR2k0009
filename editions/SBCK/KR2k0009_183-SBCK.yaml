front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_183-1a}
body:
  text: 開化府在雲南省治東南七百一十里東西距一千一百四十五里南北距四百二十里東至交趾界四百六十里西至臨安府建水縣界六百八十五里南至交趾界二百四十里北至廣南府界一百八十里東南至交趾界二百三十里西南至交趾界四百一十里東北至廣南府界二百二十里西北至阿迷州界一百八十里自府治至京師一萬二千五百里分野天文東井輿􅀑分野鶉首之次建置沿革禹貢梁州荒裔漢為句町國地唐初屬越巂郡後没於南詔為强現牙車教化三部宋為段氏所據元為强現三部隸臨安等處宣慰司明初改强現三部為教化三部隸臨安府本朝康熙六年以教化王弄安南三長官司地置開化府隸雲南省領縣一文山縣附郭本朝雍正八年裁開化府通判并經厯二缺改設縣治賜名文山安平同知附郭嘉慶二十四年移文山縣屬之東安逢春永平三里屬之形勢萬山林立帶水縈迴控交趾之上游為滇南之屏障府志風俗倚山緣箐而居支木結茆為屋言語不一文字鮮通喜鬬輕生巫􅀑是尚改土設流以後學校既開習俗漸改府志城池開化府城周四里有竒以盤龍河為池本朝康熙六年築土城乾隆十年易以甎學校開化府學在府城東本朝康熙七年建雍正十二年修乾隆二十年二十一年二十三年累修入學額數二十名文山縣學未建入學額數附府學内開陽書院在府城西門外本朝康熙三十三年建雍正十二年修乾隆十一年二十年累修開文書院在府城西舊名文山書院雍正八年建並設義學乾隆四十六年改今名户口人丁無原額今滋生男婦大小共二十五萬九千二百十六名口計五萬五千九百二十三户田賦田地八百一十二頃六十八畝八分有奇額徵地丁正雜銀六百二十四兩七錢六分四釐米八千四百二十一石九斗七升六合七勺山川東文山在文山縣東登臨其上水光山色映帶左右阿香山在縣東八十餘里府志每久晴不雨山上隱有雷聲如鳴鼔三日而大雨降雷女名阿香聳翠山在縣東百五十里與交趾老君山隔河對峙南北横亘千餘里獅子山在縣西南危巒突起其狀崢嶸山車山在縣南百里南交扼要之地西華山在縣西南横列三十六峯層巒曡翠連絡如屏與東文山對峙拱翼郡城龍馬山在縣西南百四十里府志山嶺有石壁可占陰晴相傳上出龍馬因以得名天洞山在縣西南一百五十餘里頂有石洞瀑布懸流阿得山在縣西南二百里府志盤旋無際古木幽深杳無人跡惟見雲飛霧繞莫測其中所有波些山在縣西四十里􅀌峯削出冠於羣山秀石山在縣西四面如削林本森蔚老君山在縣西百里府志登之蕭然象外輒具出塵之思蓑衣山在縣西百里山勢高峻一重幾三十里化乙山在縣西百里府志上有天池雖旱不涸連雲山在縣西百五十里一名大黑山府志林木蒼翠四時猿聲不絶六詔山在縣西北山形旋折雲烟環繞白虎山在縣西北府志昔有牧者見一物白質黑文行動頗馴遇牛馬不噬搏衆奔避以為虎越三日復見擬共迹之忽不見有識者曰白質黑文似虎而馴不踐生草不傷畜􅀋考之圖經是為騶虞因名白虎山霧露結山在縣西北一百二十里蒼峯插天雲霧沈􅄥九牛山在縣西北一百五十餘里九峯雄峙勢極險絶八戛山在縣西北二百餘里削壁峭崖俯視諸山鳳凰山在縣北形如飛鳳郡鎮山也諸􅁑山在縣北迤􅆔五十里􅀌峯插天羣峯横衛府志上有武侯駐兵處城栅濠塹猶存最高峯在縣西北一百五十餘里高數百丈土人聽猿鳴以占晴雨二臺坡在縣東延亘百餘里鳴舊石洞在縣西百八十里府志入洞一石扣之蓬蓬有聲再進石乳滴成纓絡下墜宛如蓮臺土人塑大士像於上期烏石洞在縣西北南安里夾澗穿流即儂人河源也猛奔河在縣東三百五十里來自漫江那樓下流入交趾普牢河賭咒河在縣南二百四十里與交趾接界舊志孫蠻夷立誓各不相侵之處濟熱河在縣南東安里烟瘴燥熱居民浴水解毒通志有綠水塘在江那里水如碧玉可鑒毛髪魯部河在舊教化三部長官司西南三十里明統志源自禮社江經司境下流入臨安府蒙自縣之梨花江三坌河在縣西南中流自安南東流至葛布山左自永平積流成河向西南流至葛布山下與中流㑹右自王弄里大山下流至葛布山下與中左二流㑹故名盤龍河在縣西北源出期烏洞流府城北開化里為儂人河又流經府城繞城盤曲瀠洄如龍因名盤龍河異龍潭在縣西府境諸流多匯於此本朝康熙七年經厯李鳳昌引流灌田民􅀍其利又府境龍潭甚多此外尚有六十五所皆資灌溉曰茶庵曰水磨曰熱水寨曰紅石崖曰和尚莊曰者安曰平壩曰杜孟曰錫板曰靈秀曰牛羊曰南坵曰韮菜坪曰革基曰者莊曰接鶯坡曰南抽曰召布比曰斗嘴曰山車曰阿覺曰灑戛曰泥處曰龍嶺曰别革曰腰姑曰老梅曰馬灑曰以那底曰戛迭曰革乃曰白果曰革普曰腊哈曰灑得曰舍迷烏曰馬歇曰阿黑曰矣坡曰革灑曰革母曰下寨曰戛達曰馬白曰壩地曰法支革曰多羅曰阿峩曰矣額曰布足曰以則期曰八寨石洞曰霧露者口玀莫曰烏木曰耶革白曰紅舍卡石洞曰著租革城址或即其處部夷曰馬喇曰沙人曰玀曰儂人曰野蒲曰喇記多和泥餘種北宋時狄青征儂智高寓人龍海基鄉導有功始命領其地土名阿雅又名謹耳即强現部别名明洪武􅀄土司和泥人蕎乍歸附授副長官傳至張明本朝平滇張長夀仍授世職康熙四年長夀以附逆誅六年即其地設開化府七年始築土垣王弄山廢長官司在縣境元為大小二部明洪武中改長官司授阿額為副長官萬厯中屬沙氏明末屬王氏舊屬臨安府本朝廢入開化府安南廢長官司在縣西一百四十里元捨資千户後為安南道防送軍千户明改置長官司元史地理志捨資千户在􅀩自縣東阿僰蠻所居地昔名褒古又曰部嫋踵甸傳至裔孫捨資因為名内附後隸蒙自千户至元十三年改􅀩自為縣其地近交趾遂以捨資為安南道防送軍千户隸臨安路通志明洪武初改為長官司正德六年省入蒙自縣天啟二年復給司印以王弄掌官司沙源掌管令阻截交州明末源子定洲謀叛據㑹城討誅之其兵頭王朔遂撫王弄及安南之地本朝平滇仍授王朔世職康熙四年朔與祿昌賢等叛官兵攻破之朔自焚今其地俱入開化府關隘馬白關在文山縣南賭咒河内與交趾接壤本朝雍正六年設洪衣關在縣境明交趾黎利叛成山侯王通帥師還黔國公沐晟以土司龍宜有勇畧令設關防守其地今廢大窩關在新現交岡之上明置今廢楊柳河關在縣境今廢牛羊箐在縣南有酋長守其地府志由教化三部而南地名枯木箐亦有酋長戌守又南為斗嘴三關險固可守自三關而南即抵牛羊箐與交趾接壤處也木底河箐在舊王弄山司境又有梭羅洞銷狸城洞黒打洞王弄山箐皆設險處也津梁永濟橋在文山縣南本朝康熙九年建鎮西橋在縣西本朝康熙十一年知府劉訢建天生橋有二俱在縣境飛石陡崖兩山相接盤龍河流其下人艱於行本朝康熙四十一年别建木橋年乆傾圯乾隆二十一年知府湯大賓復開舊道以便往來三板橋在縣北本朝康熙五十二年土經厯周應龍建祠廟昭忠祠在文山縣本朝嘉慶八年建寺觀西華寺在文山縣西乾天觀在縣西吉祥庵在縣西名宦本朝李道泰福建人康熙二十三年任知府興學育才臨民慈愛賢聲茂著宗師祁直隸人康熙二十二年任府同知剛方正直果毅有為嵗饑平糶全活甚多時里甲科􅂀擾累夷民難堪師祁為懲猾吏民賴以濟稱為神明人物明龍上登三部長官司性嗜學穎悟警敏萬厯間至京師遍訪名宿歸至家而學問益進始興學校建文廟朔望禮拜愚夷化之時沙定洲父沙源與上登聯姻覘交岡武氏兵􅀔甚盛屢為邊患約上登附武氏上登厲聲叱之本朝楊守士郡人性純孝年八嵗父遘篤疾刲股療之母疾亦然人咸稱異焉王九人郡人任臺灣鎮左營遊擊康熙六十年朱一貴叛九人斬擒一百三十餘人及臺灣陷躍海死恩賜􅀕葬賞卹楊天階郡人任烏蒙右營守備雍正八年祿萬福叛力戰陣亡列女本朝段楊氏文山人夫失名病死殮畢自縊康熙間旌楊天階妻聞氏文山人隨夫任烏蒙守備賊至天階戰死氏謂二女曰我命婦義不可辱汝姊妹宜自為脱計二女泣曰父死兄不知存亡何生為氏自刎二女整衣修容對縊於䆳室中雍正間賜􅀕葬加贈恭人乾隆十年入祠王大周妻李氏文山人夫亡自殉以救免撫􅀌守節雍正間旌李良才女名七妹文山人守正捐軀乾隆間旌王九人妾范氏文山人九人於臺灣討賊殉節時九人妻已故遺一子曰慎氏方欲自盡聞曰慎哭聲轉念曰此子不生我之罪也於是扶柩歸典衣鬻釵以教曰慎承􅄻乾隆閒旌張奇彩妻楊氏文山人夫亡自盡以救免撫􅀌守節與同縣董泰妻馮氏陳顯璲妻潘氏杜昶妻楊氏劉淵妻陳氏均乾隆閒旌李英妻王氏文山人夫亡自縊馬氏文山人夫失名守正捐軀嘉慶間旌劉正龍妻郭氏文山人年十五聞正龍死整容自縊孫有富妻張氏文山人既受聘夫隨征至黔病殁柩歸經氏門氏心動詢得其實遂歸孫事姑以孝姑殁哀毁成疾卒與同縣貞女張氏均嘉慶間旌楊仲麟妻湯氏文山人夫亡自殉以救免撫孤守節與同縣趙成載妻朱氏趙成文繼妻何氏萬晫妻張氏汪國璸妻唐氏王衘棟妻劉氏殷秀妻李氏曹士英妻趙氏盧耀宗妻郭氏吳際昌妻張氏李丕基妻喻氏趙致中妻鄭氏均嘉慶間旌土産馬金囊府境出味甘除熱可治瘡毒桄榔鱗蛇膽俱府境岀大清一統志東川府在雲南省治北五百三十里東西距四百二十五里南北距四百六十里東至貴州大定府威寕州界二百里西至四川寕遠府會理州界二百二十五里南至曲靖府㝷甸州界二百五十里北至昭通府界二百一十里東南至曲靖府宣威州界一百三十里西南至武定州祿勸縣界一百七十里東北至昭通府界一百九十里西北至會理州界四百五十里自府治至京師九千七百九十七里分野天文參井分野鶉首之次建置沿革禹貢梁州荒裔漢置堂琅縣屬犍為郡蜀漢分犍為地立朱提郡縣屬朱提晉宋齊因之後入於蠻唐時入南詔宋段氏時置東川郡太都督後烏蠻閟畔據之號閟畔部元初内附置萬户府至元中改閟畔軍民總管府隸烏撒烏􅀩等處宣慰司尋改東川路明洪武十四年開置東川土府屬雲南布政使司十六年改隸四川為東川軍民府本朝因之為東川府雍正四年仍改隸雲南省領縣一會澤縣附郭本朝雍正五年置縣治巧家汛六年移治附郭形勢地控金沙臨昭通之南面山高雲弄綰省治之東門内􅀒江山之雄外連黔蜀之􅀔通志風俗俗尚戰爭居多板屋明統志氣剽悍而性猜疑服食婚喪尚多夷習通志城池東川府城周三里門四舊築土城本朝雍正九年改築石城乾隆十一年二十五年屢修學校東川府學在府治南門外夲朝康熙四十二年建入學額數十五名㑹澤縣學未建入學額數附府學内西林書院在府治東門外本朝雍正五年知府黄士傑始設義學十年知府崔乃鏞擴為書院户口向因蠻民雜處未經編丁田賦田地二千二百四十頃四十五畝七分有奇又地改田一頃五十七畝三分額徵地丁正雜銀二千四百七十九兩八分有奇米四千九百五十九石七斗四升九合山川翠屏山在㑹澤縣東南一里為縣主山層巒疊翠環峙如屏上有九峯九箐九龍靈泉山嶂如璧又名靈璧山其東麓别名玉獸山府志歳豐則石現異獸狀白如玉近視則無白婆山在縣東南山頂有泉四時無盈縮南山在縣東南六十里福在山在縣西南一百五十里二