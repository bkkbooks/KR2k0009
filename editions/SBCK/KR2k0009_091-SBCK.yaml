德時在城中率勁軍千餘人突圍破之夏人復陣有出陣前據鞍嫚罵者懷德引弓一發而踣敵乃去復進圍延州懷德夜遣禆將出不意撃之斬首二百級圍遂觧夏隨榆次人仁宗時為鄜延路副都總管元昊為書及錦袍銀帶投境上以遺金明李士彬約與同叛候人得之諸將皆疑士彬獨隨曰此行間耳乃召士彬與飲厚撫之士彬感泣後數日果擊賊斬首虜􅀗羊馬自効司馬里夏縣人仁宗時通判鄜州州將武人不法里平居與之驩甚臨事正色力爭不少􅖍借郭逵洛陽人神宗初鎮鄜延种諤受嵬名山降取經州夏人遂殺楊定朝論以邊釁方起詔焚棄綏州逵匿而不下詗得殺楊定者姓名夏人執獻之王安禮臨川人應河東唐介辟熙寕中鄜延路城囉兀河東發民四萬􅀒餉宣撫使韓絳檄使佐投後帥吕公弼將從之安禮爭曰民兵不習武事今敺之深入此不為宼所乘則凍餓而死耳宜亟罷遣公弼用其言民得歸而他路遇敵者全軍皆覆公弼執安禮手曰四萬之衆皆君生之薛向萬泉人知鄜州大水冒城郭沈室廬死者相枕郡卒戍延安詣主將求歸視弗得皆亡奔至則家人無在者聚謀為盜民大恐向遣吏曉之曰亟往收溺尸貰汝擅還之罪衆泣謝一境乃安林廣萊州人神宗時為鄜延路鈐轄攻踏白城功最曲珍隴千人神宗時擢鄜延鈐轄進副總管從种諤攻金湯永平川斬首二千級賈逵藁城人神宗時總鄜延兵鄜州舊有夾河兩城始元昊入宼據險城幾不能守逵相伏龍山九州臺之間可容窺覘請於其地築堡障與城相望人以為便种誼洛陽人哲宗時知鄜州夏人犯延安趙卨使誼統諸將敵聞誼至皆潰延人謂得誼勝精兵十萬燕達開封人擢鄜延都監數率兵深入敵境九戰皆以勝歸劉涇楊安人紹聖末知坊州專以仁厚為政土産龍鬚席涇常貢外不以奉權貴錢即錢唐人政和中經畧鄜延言鐵錢復行與夾錫並用慮奸民妄作輕重欲維持推行俾錢物相值非欲以威力脅制百姓頓減物價於一兩月之間今宣撫司栽損米穀布帛金銀之價殆非人情坐貶官然錢害亦寢劉延慶保安軍人為鄜延路總管破夏人成德軍擒其酋首郭浩隴千人建炎中權主管鄜延路經畧安撫時鄜延之東皆金人西北即夏境其屬朝廷者惟保安一軍德静一鎮浩間道之德靜置司招收散亡與敵對壘一年敵不能犯金盧克忠鳳集人天德中同知保大軍節度綏德州軍卒數人道過鄜城求宿民家是夜有賊剽主人財去有司執假宿之卒繋獄榜掠誣服克忠察其冤獨不肯署未幾果得賊完顔魯爾錦中都路額特赫格們明安人遷保大軍節度使興定五年鄜州破自投崖下死魯爾錦舊作六斤額特赫格們明安舊作胡土割蠻猛安今並改赫舍哩鶴壽河北西路􅃢沁明安人興定初權元帥府於鄜州五年鄜州破赫舍哩鶴夀與數􅀐􅊳出城元兵追及之赫舍哩鶴夀據土山力戰而死諡果勇赫舍哩鶴夀舊作紇不烈鶴夀􅃢沁明安舊作山春猛安今並改富察羅索東北路按春噶爾罕明安人興定中遥授孟州坊禦使權都監將兵救鄜州轉戰而至城破死之富察羅索舊作蒲察婁室按春噶爾罕明安舊作按出虎割里罕猛安今並改鈕祜禄資禄本姓張氏咸平府人興定中為金安軍節度使詔將兵救鄜州鄜州破被執不肯降遂死鈕祜禄資禄舊作女奚烈資禄今改明朱新鍱晉恭王棡七世孫崇禎時知中部縣會有事他邑土寇乘間陷其城坐免尋復任時李自成已破潼關傳檄至新鍱怒而碎之謀守禦䇿然邑新遭寇人無固志乃屬父老速去巳誓必死妻盧氏妾薛氏馮氏及幼女皆先縊乃書表封印使人馳送京師冠帶自縊士民葬之社稷壇側妻女祔焉劉光先直隸人崇禎中為中部縣丞寇陷城光先力戰被創遂自刎本朝賈廷璋山東人順治初知宜君縣王永彊叛兵至城陷遇害時典史方一御亦死於難林鑛慈谿人康熙中知宜君縣縣當南北孔道郵傳往來向取之民鑛大為裁省編審丁賦豪猾率以賄免鑛精心鈎考酌定科則積弊一清人物南北朝周秦族洛川人祖白父雚並有至性族性至孝父喪哀毁過禮與弟崇先尤篤友愛未幾母又殁哭泣無時終喪之後猶疏食不入房室二十餘年榮先亦至孝遭母喪以毁卒邑里化其孝行世宗嘉之詔贈滄州刺史以旌之宋楊偕中部人與進士為殿中侍御史郭皇后廢偕與孔道輔范仲淹力爭道輔仲淹既出偕止罰金乃言願與道輔等皆貶富民陳氏女選入宫將以為后偕上疏諫止嘗論八陣圖及進神楯劈陣刀帝下其法於諸路其後用以敗元昊於兔毛川累官兵部侍郎卒遺奏兵論一篇偕性忠直敢言數論天下事尤喜古今兵法有兵書十五卷集十卷子忱慥皆有雋才元王士宏中部人父有疾士宏傾家資求醫見醫即拜遍禱諸神叩額成瘡父殁哀毁盡禮廬墓三年廬上有竒鵲來巢飛鳥翔集與士宏若相狎衆咸異之終喪復建祠於塋前朔望必奠祭雖風雨不廢有司上其事於朝旌表之何從義洛川人大父母偕亡從義廬墓旦夕哀慕不脫絰帶不食菜果事父母孝養尤至伯叔祖父母皆無子比亡從叢咸為治葬築墳祭奠以禮時人義之王克巳中部人父母同殁克巳􅀒土築墳廬於墓側貊高縱兵暴掠縣民皆逃竄克巳獨不去家人呼之避兵克巳曰吾誓守墓三年以報吾親雖死不可棄俄而兵至見其身衣衰經形容憔悴曰此孝子也遂不忍害竟終喪而歸劉思敬宜君人事繼母沙氏杜氏孝養備至父年八十喪明會亂兵剽掠其鄉思敬􅀒父避巖穴中兵至欲殺之思敬泣曰我父老矣又無目我死不足惜使我父何依乎賊憐其孝父子皆免於難明劉􅄾洛川人正徳中進士嘉靖初授兵科給事中以災異陳親賢去邪仁民恤軍選將信賞明罰七事且請􅀝大臣為腹心任言路為耳目時給京軍冬衣布棉恒過期以琦請即命􅄾立給妖人李福達逃洛川琦知之甚悉因疏陳顛末並劾郭勛黨逆又與御史張問仁劾勛侵盜草場租銀皆不問既以福達事下獄謫戍瀋陽越十年赦還卒劉仕中部人正德中進士授刑部主事以爭大禮廷杖後與定李福達獄下吏遣戌穆宗即位起太僕少卿年老不就張士竒宜君人由恩貢選知永清縣潔巳愛民不憚權貴擢知通州罷運皇木車歲省民費三萬金修築舊城疏通運河賜璽書襃􅅄擢開封郡丞霍宗鄜州人正德中囘賊寇州境宗以鄉兵獨當其衝手刃賊數人力絀死之州守禮葬題其墓曰義勇張應辰士竒孫正德中舉於鄉知肅寕縣時籍魏忠賢株連頗衆應辰多所平反擢知宛平民苦役煩多奏罷之察巨室為民害者按以法豪强肅然轉户部主事劉爾璽中部人崇禎二年賊至三河口母驚匿爾璽聞變手戈馳追不介而前或曰不濟曰死不避難吾猶及踐難焉臨賊從者震怖不前爾璽犯堅而入殺賊數人未得母處身中大創兵盡力折死之又同邑杜夀春崇禎四年盜攻城陷或呼夀春曰母老焉忍舍之亦遇害劉禋仕之孫父爾完厯知商邱名山縣有學行禋性剛介事親孝母殁於名山四千里扶襯過劍閣雲棧以肩任之崇禎四年賊陷中部禋􅀒父走免後由鄉舉授知登封縣土寇李際遇申靖􅀖據山為亂禋練壯士數百且戰且守寇不敢近李自成陷城禋被縛賊以同郡故欲降之禋叱曰豈有奕世清白吏肯降賊耶賊義之遣其將反覆說以數百言禋執彌厲乃見殺贈僉事齊大臣鄜州人諸生流賊掠西安衣冠入文廟不食而死本朝楊素藴宜君人順治中進士知東明縣考最擢御史劾呉三桂被謫後三桂叛起官督學山西厯順天府尹出為安徽巡撫值夏逢龍作亂調撫湖廣時武昌新經兵燹加意拊循以勞勩卒於官牛光斗中部人仇家搆其父通賊繋獄光斗訟冤於大帥願以身代會烈日中忽大雨雹帥廉其冤釋之順治中成進士知諸暨縣以政績著孫繩宜君人仁厚好義宜君屢經兵荒繩捐貲賙卹順治元年大兵征􅁹流寇駐營七里鎮時霖雨四十餘日餉不繼繩遣其子枝秀運糧三百石餉軍枝秀亦諸生樂善好施有父風劉綋洛川人順治中進士知松滋縣時姚黄􅅶頭賊張甚綋團結鄉勇屢敗之江隄屢潰綋不分畛域晝夜督率民資其利邑賴以安張占鼇洛川人由拔貢生判荆州府督餉至房縣之七連坪遇賊不屈死贈按察司僉事長子超以難䕃知宜陽縣宜陽瀕洛而苦旱超開渠灌溉近洛之地旱不為灾居五載多善政擢知西隆州楊愈勲宜君人六歲喪母號泣不欲生父復娶李氏愈勲先意承志備極孝敬官華州訓導課諸生必先德行比歸里當兵燹之後戸口凋敝每丁賦二兩一錢民不堪其苦愈勲率同邑士民請於大府􅀗輕減焉流寓唐杜甫襄陽人安禄山亂甫家寓鄜州彌年艱寠孺弱有至餓死者肅宗許甫往省視列女隋覃氏上郡鐘氏婦夫死時年十八事後姑以孝聞數年間姑及伯叔皆相繼死家貧無以葬於是躬自節儉晝夜紡績蓄財十年而葬八喪州里上聞賜米百石表其閭唐范氏宜君人夫死不嫁事姑孝姑患病久不痊忽聞肉香欲食甚急氏割左膊肉深至骨以奉姑病隨愈事聞旌表鄉人以割骨名其村金康珠珠鄜州人夫早亡服闋父取之歸家許嚴沂為妻康誓死弗聽欲還夫家不可得遂投崖而死詔有司祭其墓康珠珠舊作康住住今改完顔長樂妻富察氏字明秀鄜州人納恰之女哀宗遷歸德以長樂為總領將兵扈從將行屬明秀曰無多言夫人慎勿辱此身明秀曰君第去無以妾為念妾必不辱長樂一子幼出妻柴氏所生明秀撫育如巳出崔立之變驅從官妻子於省中明秀聞之以子付婢僕與之金親具衣冠祭物與家人訣自縊而死富察氏舊作蒲察氏納恰舊作納甲今並改張慥妻馮氏字妙真刑部尚書延登之女適進士張慥興定五年慥為洛川主簿元兵入鄜延守臣以西路輸芻粟不時至檄慥詣平涼督之時延登為平涼行省員外郎慥欲偕妙真往妙真辭曰舅姑老矣雖有叔姒妾能安乎子行妾留奉養洛川破妙真攜三子赴井死元康德明妻王氏鄜州人年二十夫亡撫遺腹子守節至正中旌同州孫世昌妻關氏中部王仲泰妻党氏皆以節著洛川賀敏妻張氏夫亡自縊以殉明賀谷榮妻康氏鄜州人夫亡苦節其父逼令改適氏投崖死洪武中旌劉孝女中部人父準以諸生死無辜女年十六抱父屍而死有司為營葬旌表賀恩妻田氏宜君人夫病篤氏毁容侍湯藥晝夜不懈及卒自縊以殉又王氏夫採薪死於火其姑痛子不食氏多方勸慰赴夫死所尋骨歸葬墓成自刎俱被旌張敏道妻趙氏洛川人年二十夫亡自縊同葬又李從義妻張氏年十七夫亡守節均洪武中旌柳輴女鄜州人嘉靖中寇至父輴他往女年十六罵賊死母王氏投崖死後輴還收葬面皆如生又吉孝妻王氏為賊所掠罵賊不屈死党爵妻程氏中部人年十九夫亡撫遺腹子漢成立娶婦王氏漢又早卒姑婦同心守節撫􅀌孫繼芳母道婦儀鄉里稱焉又劉侃妻忽氏李元凱妻任氏劉爾榮妻李氏子袨妻李氏劉煜華妻楊氏皆以苦節著趙彬妻張氏宜君人夫亡無子苦節終身同縣郭鍾奇妻楊氏夫早卒自縊以殉郝聚女洛川人字拾翠父聚許字諸生何三近年十七巳納采而三近死女聞訃以所納幣製衣裳服之自縊萬厯中旌宋承矩妻劉氏鄜州人與同縣高俯妻任氏均年二十夫亡孝養舅姑撫遺腹子成立被旌又羅璜妻柳氏年十九夫亡以苦節著有宋吕者妻早死他妾中有遺腹吕臨終嘆曰縱生子疇克守而撫之妾王氏慨然以撫􅀌自誓吕亡四月子生其生母他適王鞠之守節四十年孟自務妻申氏洛川人與自務佃於趙順宰家趙悦其色屢挑不從夜乘孟出强入室氏怒刃之反被殺縣令禱神得其情上聞被旌邢其藴妻何氏鄜州人崇禎中賊陷城殺其夫欲逼之氏憤罵以石撃賊怒刃之至死罵不絶口又張國