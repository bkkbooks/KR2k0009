  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_091-1a}
body:
  text: 邠州􅀡隸州在省治西北三百二十里東西距二百九十里南北距九十五里東至西安府耀州界一百八十里西至甘肅涇州界一百十里南至乾州永夀縣界三十五里北至甘肅慶陽府寕州界六十里東南至西安府涇縣界一百七十里西南至鳳翔府麟遊縣界七十五里東北至鄜州宜君縣界一百五十里西北至寕州界一百二十里本州境東西距一百二十五里南北距九十五里東至淳化縣界八十五里西至長武縣界四十里南至永壽縣界三十五里北至寕州界六十里東南至淳化縣界八十里西南至麟遊縣界七十五里東北至三水縣界三十五里西北至寕州界一百二十里自州治至京師三千里分野天文井鬼分野鶉首之次建置沿革禹貢雍州之域秦置漆縣屬内史漢屬右扶風後漢因之興平元年以縣置新平郡晉屬雍州後魏改置白土縣仍爲新平郡治西魏置􅃎州隋開皇三年郡廢四年改縣曰新平大業三年州廢縣屬北地郡義寕三年復置新平郡唐武德元年復曰􅃎州開元十三年改􅃎曰邠天寶元年曰新平郡乾元元年復曰邠州屬關内道唐書方鎮表乾元二年置邠寕節度使治邠州大歴三年罷十四年復置光啓元年賜號靜難軍節度五代因之初屬岐後屬梁宋亦曰邠州屬永興軍路宋史地理志邠州緊新平郡定難軍節度金屬慶原路元曰邠州屬陜西行省明省新平縣入州屬西安府本朝雍正三年􅀡隸陜西布政司領縣三三水縣在州東北六十五里東西距九十里南北距一百里東至西安府耀州界六十里西至本州界三十里南至淳化縣界五十里北至甘肅慶陽府正寕縣界五十里東南至耀州界七十里西南至本州界四十里東北至鄜州宜君縣界九十里西北至正寕縣界六十里古豳國為周郇國秦置栒邑縣屬内史漢屬右扶風後漢因之晉曰邠邑屬新平郡後廢後魏改置三水縣仍屬新平郡西魏置恒州尋廢隋屬北地郡義寕三年屬新平郡唐屬邠州五代宋金因之元至元七年併入淳化縣明成化十四年復置仍屬邠州統於西安府本朝雍正三年屬邠州淳化縣在州東少南一百四十里東西距八十五里南北距八十五里東至西安府耀州界四十里西至本州界四十五里南至西安府醴泉縣界四十里北至三水縣界四十五里東南至西安府涇陽縣界四十里西南至醴泉縣界五十里東北至耀州界四十五里西北至三水縣界四十里秦置雲陽縣屬内史漢屬左馮翊後漢因之晉廢後魏以後為雲陽縣地宋淳化四年始分置淳化縣屬耀州宣和元年改屬邠州金元因之明屬邠州統於西安府本朝雍正三年屬邠州長武縣在州西北八十里東西距七十里南北距六十五里東至本州界四十里西至甘肅涇州界三十里南至涇州靈臺縣界三十五里北至甘肅慶陽府寕州界三十里東南至靈臺縣界四十里西南至涇州界三十里東北至本州界三十五里西北至寕州界四十里秦漢北地郡鶉觚縣地後魏置東陰槃縣屬趙平郡西魏改曰宜祿北周省入鶉觚隋為新平縣地唐貞觀二年復置宜祿縣屬邠州五代宋金因之元廢入邠州明萬厯十一年始置長武縣屬邠州統於西安府本朝雍正三年屬邠州形勢涇水遶其北邠崖峙其南倚山為城地勢雄壯元統志風俗土宜殖物人務稼穡元微之表其俗質而厚其人樸而易理業尚播種畜牧唐鄭處誨節度使廳記尚勇力習戰備寰宇記城池邠州城周九里有奇門四城南又有山城與州城相連周五里環二城俱有池深二丈元末因唐舊址建明時屢修本朝乾隆二十八年修三水縣城周五里有奇門四池廣二丈五尺西北枕山東南臨谿明成化十四年建本朝康熙九年乾隆二十九年屢修淳化縣城周四里有奇門三池深一丈廣五尺宋淳化四年建明嘉靖九年修本朝順治五年康􅄉三十九年乾隆二十九年屢修長武縣城周五里門五東南有池深二丈明萬厯中因唐舊址建本朝乾隆二十二年三十年五十一年屢修學校邠州學在州治西舊在東門外宋慶厯中建明洪武六年移建今所本朝順治十六年修入學額數八名三水縣學在縣治東明成化十四年建本朝康熙十年修入學額數十二名淳化縣學在縣治西北舊在縣治東南明洪武中建正德中移建今所本朝康熙二十五年修入學額數八名長武縣學在縣治西南明萬歴中建入學額數八名石門書院在三水縣乾隆三十六年建户口原額人丁三萬七千三十三今滋生民户共男婦二十五萬七千七百十九名口田賦民地九千二百八十二頃四畝八分五釐額徵地丁銀四萬六百二十四兩四錢九分糧四百六十一石一斗四升一合五勺山川夀山在州城東南山高頂平州志上有居民及茂林修竹之勝􅃎山在州治南城垣所依亦名鳳凰山俗傳周初鳳凰所棲之地左列壽山前依澗水巖壑􅏟嶔委曲百折亦謂之􅃎巖一名安定巖紫微山在州城内西南隅連跨外郭上有宋金時屯兵故砦明岨山在州西十里其麓有水簾洞洞中有水流出相傳唐貞觀中鑿山為連珠小竅形肖飛閣每􅀊元宵居民率張燈於此以祈年相近有白土崖亦曰白土原又曰白􅈷巖龍柏山在州北三十里山形高聳上多叢柏雞阜山在三水縣東里許石壁高聳俯視城隍肖墖山在三水縣東七里縣志峻聳干雲形似浮圖下有麻峪義峪窑峪石觜山在三水縣東十五里三面壁立惟一徑可通亦名馬闕石門山在三水縣東接淳化縣界史記秦獻公二十一年與晉戰於石門雲陽宫記東北有石門山岡巒糾紛干霄秀出有石巖容數百人水經注五丈渠水出雲陽石門山元和志山在三水縣東五十里舊志山在縣東六十里高峻插天對峙如門一名石闕其北爲戴家山林木蔭翳千巖環拱又南爲攢天嶺峻矗干雲神林山在三水縣東七十里因上有舊建英公祠得名吞雲吐霧靈氣往來翠屏山在三水縣治南縣城踞其上亦名豳山俗名掛榜山又謂之南岡縣志翼蔽縣治如屏障然鳳凰山在三水縣城西北縣志岡巒如鳯舊有阿陡堡在其上蟠龍山在三水縣東北三十五里蜿蜒盤礴邠之名勝大唐山在淳化縣東四十里接西安府耀州界亦名長頭嶺嵳峩山在淳化縣東南五十里卽巀嶭山西南屬涇陽東南屬三原為三縣接界處其西有仲山亦與涇陽縣接界俱詳見西安府巴山在淳化縣西南十五里縣志山下有石將雨則湫出五鳳山在淳化縣西三十五里縣志五峯如鳳一名五鳳谷甘泉山在淳化縣西北史記封禪書黃帝接萬靈明廷明廷者甘泉也又范雎傳睢説秦昭王曰北有甘泉谷口括地志甘泉山一名石鼓原俗名磨石嶺在雲陽縣西北九十里元和志甘泉山周迴六十里縣志山在今縣西北五十里夀峯山在淳化縣北二里俗呼為三楞山或謂卽甘泉賦所云椽巒也蝎子掌山在淳化縣北四十里冶谷水出此迴龍山在長武縣東四十里因峯勢回顧而名宜山在長武縣南十里縣志有隋牛宏别業故址猶存靜山在長武縣南十五里一名翔雁山神龍山在長武縣北十五里縣志其山産小蛇長寸許頭有兩角故名堡嶺在三水縣東三十里後秦姚襄嘗築砦其上故名絶頂有泉名龍泉亦名天池又中嶺在堡嶺之右巖覆數丈可蔽風雨其麓有官家洞亦名飛雲洞峭壁危巒下臨汃水高下各數十窟可容數百人其左又有桑村洞俗以為卽古公之陶復陶穴也分水嶺在三水縣東北九十里與鄜州宜君縣接界其嶺上連子午嶺嶺東為鄜州西為甘肅慶陽府秀峯在長武縣南二十里縣志層峯秀麗望之如畫龍􅅶峯在長武縣西南十五里前川河中峯高百餘丈頂二畝餘形似蟹筐又名􅈉峯黑石巖在三水縣東南五十里巖石如漆壁立萬仭林木蔭翳人跡罕到又觀音巖在縣東北二十五里中有靈湫深不可測旱禱輒應亦謂之觀音湫石崖在州西二十里其崖壁立百餘仭無階可陟石佛嵌空而坐其崇八丈唐貞觀二年開鑿前起層臺飛閣閣底竅通中寒泉冽凄澈及肌骨張果老崖在淳化縣東北七十里與耀州接界其西南麓屬縣境蒲里谷在州東七里一名蒲澤谷相傳宋潘邠老讀書處泉流如帶石洞尚存甘峪在三水縣南十里路出長安為孔道又柳峪在縣南三里後峪在縣北十里白虎峪在三水縣西北十五里卽唐鄭谷詩所云谷評白虎蔵巖洞也冶谷在淳化縣東南仲山嵳峩山之間縣志谷口有石形似二龜對立如門詳見西安府盤谷在長武縣西三十里三峯交峙二水分流為邑中之勝五龍原在州南唐武德初突厥奄至豳州城西陳於五龍坂秦王撃却之卽此元和志五龍原在新平縣南三里原側有五泉水因名陳陽原在州西南元和志後魏於新平縣西南十里陳陽原上置白土縣淺水原在長武縣西北卽鶉觚原魏書神䴥三年古弼等攻平涼赫連定從鶉觚原救平涼與弼相遇魏書地形志鶉觚縣有鶉觚原元和志淺水原卽今宜祿縣理所武德元年薛舉寇涇州太宗親征會舉死其子仁杲統衆挑戰上遣總管龎玉自此原南出賊右因高而陳上自原北出其不意賊遂大潰寰宇記鶉觚原卽淺水原縣志縣治北有集賢岡迴谿巨壑盤旋險峻或稱四鼇山又名五鳳巢蓋卽淺水原也又縣北五里有淺水墩為烽堠之所蓋亦以原而名黄萯原在長武縣北唐大歴八年吐蕃寇涇邠二州渾瑊拒戰於宜祿登黄萯原望敵舊志原在縣北接甘肅慶陽府寕州界車箱坂在淳化縣南元和志在雲陽縣西北三十八里縈紆曲折單軌纔通上坡卽平原宏敞樓觀相屬亦名車盤嶺卽趨甘泉宫道也金史地理志淳化縣有車箱坂履跡坪在州南門外俗傳姜嫄祀郊禖履大人跡處又州東三十里有凌陰為公劉藏冰處蓋皆好事者傳疑也白石洞在三水縣東七里縣志山麓多絳桃又趙家洞在縣東北二十五里一名琅天洞其巖深䆳寛平可以眺遠内有石室又流石洞在琅天之右石谷環繞如城漆水在州西詩大雅民之初生自土沮漆傳沮水漆水也史記周本紀古公去豳度漆沮漢書地理志漆水在漆縣西元和志漆水在新平縣西九里北流注於涇今麟遊縣東南亦有漆水與此異寰宇記水經注云漆水自宜祿界來又東過漆縣北卽邠州所理也今新平縣西九里有白土川東北流逕白土原東陳陽原西又東北注涇水恐是漢之漆水但古今異名耳通志有水簾河在州西十里北流入涇卽漆水也又安化河在州西二十里又洪龍河在州城西或以為詩之過澗南河在州城東或以為卽詩之皇澗又大峪河在州東三十里俱入於涇涇水在州北自甘肅涇州流逕長武縣北又東南逕州北又逕淳化縣西入乾州永夀縣界元和志新平縣涇水西北自宜祿縣界流入又涇水在雲陽縣西南二十五里通志水自平涼縣笄頭山東南流入長武縣界又東逕長武縣北二十里泥水入之又東逕停口鎮入邠州界黑水河東河入之又東安化河水􅄕河洪龍河俱北流注之又東逕州北三里南河水北流注之又勅修川梁渠川俱西南流注之又東南汃水入焉又東南太谷河東北流注之又東南流為九曲入淳化縣界七里川及通澗溝水南流注之又東南逕淳化縣南三十里出九􅉄仲山之間謂之谷口入西安府醴泉界汃水在三水縣南源出鄜州宜君縣競窩山西南流逕縣城南又西南流四十里入涇水一名師水又名三水河灌漑所資也又連家河在縣東十里源發石門繞中嶺北流入汃水東泉又東南流逕縣南合葫蘆河流逕涇陽縣至三原縣與清谷水合流入冶谷水五龍水在淳化縣西隋書地理志雲陽縣有五龍水寰宇記水經注云五龍水出雲陽宫西南縣志在縣西四十里流入涇水甘泉水在淳化縣北隋書地理志雲陽縣有甘水長安志十道志曰甘泉出石鼓西原縣志水在縣北四十