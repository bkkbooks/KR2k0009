成賜名清澗遷内殿崇班知城事開營田二千頃募商賈貸本通貸贏其利城遂富實間出行部族慰勞酋長羌屬率皆樂為用种諤世衡子知清澗城夏將嵬名山部落在故綏州其弟夷山先降諤因夷山誘降之舉衆從諤而南次懷遠敵四萬衆傅城而陣至晉祠合戰追撃二十里俘馘甚衆遂城綏州後為經畧安撫副使敵屯夏州諤攻米脂三日未下夏兵八萬來援諤禦之無定河伏發斷其首尾大破之趙卨依政人郭逵宣撫陜西辟掌機宜文字种諤納綏州降人朝廷以其生事議誅諤反故地以釋兵卨為逵移書執政請存綏州以張兵勢先規度大理河川建堡砦畫稼穡之地三十里以處降者活降者數萬為東路捍蔽熙寕初夏人請納塞門安遠二砦易綏州卨言綏實形勢之地宜存以觀其變神宗然之後用卨策以綏為綏德城李稷邛州人元豐中為陜西轉運使制置解鹽生事貶為判官永樂既城受圍急稷守之以及于難元聿思敬晉寕人泰寕初清澗尹先是邑旱逃徙甚衆思敬招撫復業嵗復祲他郡民率歸之思敬發粟賑且告厚積者貸全活數萬人訟以理遣囹圄空虚課績為陜西之最明丁碧嘉靖時為延綏勦援游撃寇大入延綏碧以􅀌軍數百遏其前鋒於馬家窊大呼突陣死贈都督同知諡節愍霍文玉武岡人萬厯初知清澗縣縣素不通水利文玉攜一僕荷鍤巡行郊陌間相其可田者經畫之開西南二渠引灌數千頃濬其餘流為蔬圃又于高田可汲者制轉輪汲之􅀊益粟十數萬石民以富饒唐思周磁州人萬厯中知清澗縣􅀊大饑請賑蠲租減賦役招流移飭驛傳治邑六年百務俱舉陳王道寕鄉人萬厯中知清澗縣獄不踰宿剖決如流咸得其情他邑控􅈼者皆假籍以希聽斷適綏德延川俱缺長吏臺司命兼攝之循聲大起擢正定同知劉廷傑綏德人為延綏撫標參將以防寇駐綏德闖賊至廷傑囘鎮激以大義固守城陷被執賊欲降之廷傑怒曰為朝廷守城者我也有死不貽君父羞賊支解之父􅃔鼎聞之嘆曰吾有子矣周瑚行唐人崇禎中知清澗縣剖決疑事如習知流寇逼城數月瑚守禦多出奇畫危城得完簡國凝石阡人崇禎中知呉堡縣時值兵荒請輕徭賦多方賑給活數萬人在官五年布衣蔬食去之日不能具舟車本朝王廷議翼城人順治中任清澗縣時叛逆未靖大兵駐府谷人心皇皇廷議計安反側調度軍需整頓有法聽斷如流不事鞭朴五年之間盜息民安臺司交章薦之擢户部主事人物宋高永能清澗人少有勇力善騎射以供奉官從取綏州先馳入囉兀五戰皆㨗轉供備庫副使治綏德城闢地數千頃增户三千三百即知城事元豐初為鄜延都監秋大稔夏人將取稼永能簡精騎突過其營騎卒驚潰􅀗鈐轄二人擢本路鈐轄四年西討永能為前鋒圍米脂城邊人十萬來援永能嚴陣待其至鏖戰於無定河斬􅀗甚多降其首將累進榮州團練使永樂之役城陷戰死詔贈房州觀察使録其子世亮為忠州刺史李顯忠清澗人初名世輔南歸時賜名父永奇世襲蘇尾九族巡檢金兵陷延安授永奇及顯忠官永奇泣曰我宋臣世受國恩乃為彼用􅁘與顯忠密謀以兵取延安歸朝挈家出城至馬翅峪口為金兵所及永奇並家屬三百口皆遇害顯忠奔夏率驍勇擒其害父母弟姪者皆斬之引軍赴行在呉玠撫之曰忠義歸朝惟君第一高宗勞賜再三命為招撫司前軍都統制與李貴同破靈壁縣金兵至合肥詔顯忠禦之敵素畏其勇避去尋加保信軍節度使浙東副總管屢破金兵顯忠生長邊陲熟悉山川險易每用兵必先計而戰時稱為真關西將軍孝宗立除威武軍節度奇其狀貎魁傑命畫像於閣下及卒贈為開府儀同三司諡忠襄明郝志義清澗人成化中進士授評事進寺副奉命審録河南時久旱志義定疑獄三十五人釋無辜者三百七十人專取服罪者十人戮於市天即雨厯官湖廣巡撫志義素性嚴毅所至以廉慎稱劉寛綏德衛人以世職厯官都指渾同知成化四年從征滿四於石城先登後軍不繼為賊所執不屈死子羊兒為指揮次子珍以百户署清平堡把總羊􅅜隨游擊高極禦敵力戰殁於陣珍往救亦死之時稱一門忠烈綏德衛指揮劉釗亦隨寛死石城之難馮禎綏德衛人起卒伍累功擢副總兵協守綏延正德六年盜起詔以所部千五百人赴討遇于阜城逐北數十里俘斬八百有奇進解曹州圍録功進都督僉事明年劉惠趙鐩連陷河南郡縣禎撃敗之賊潰而西復招屯洛南覘官軍飢疲迎戰禎方列陣後哨參將姚信所部忽馳前失利先遁陣亂賊齊進禎下馬力戰援絶死焉贈洛南伯建祠􅀊祀安國綏德衛人世㰍職爲指揮僉事正德三年舉武會試第一進署指揮使赴三邊立功劉瑾索賄不與乃編之行伍瑾誅以故官分守寕夏西路累遷右副總乒徙延綏敵二萬騎分掠偏頭關諸處國馳敗之岢嵐州進都督同知寕夏總兵官國以材武致大將端謹練戎務所至盡職推將材者必歸焉在鎮四年卒特諡武敏杭雄綏德衛人世爲總旗雄積首功六遷至指揮使正德中􅁹賊四川尋守備西寕擢綏延游擊從都御史彭澤經畧哈密偕副將安國破敵岢嵐累擢都督同知拜大同總兵官嘉靖初小王子萬餘􅀐入沙河堡戰却之召僉書後軍都督府出鎮寕夏吉農大入擊破之進都督同知雄遇敵敢戰與士卒同甘苦嘗以數􅀐行邊敵麕至乃下馬積鞍爲壘跪而射之敵退解衣腋凝血乃知中飛矢少役延綏巡撫行臺既貴每至臺議事不敢正席坐正嘉間西北名將馬永下稱雄云吉農譯見前馬汝驥綏德州人正德中進士改庶吉士武宗南巡汝驥偕舒芬等切諫帝怒跪闕五日又杖之調知澤州州多藩府府人虐民汝驥一繩以法改聲大著世宗立召授編修厯南京􅀦子祭酒擢禮部右侍郎帝愛其才加侍講以寵之卒贈尚書諡文簡雷子堅綏德州人正德中舉於鄉知廣州剛介不畏强禦值流賊刼掠繕城池治兵器賊不敢犯民賴以全因抗論將帥失利當路惡之遂落職將行出所貯金幣於官其廉潔如此王成綏德州人萬厯時任延綏參將從征河套火挫賊衆進右都督鎮大同訓兵飭邊在邊五十年九佩將印以功名終成祖孫父子兄弟三世為將者二十四人薛永譽呉堡人􅀊貢崇禎三年賊犯呉堡之川口永譽先奉母居城中率衆守虎頭二砦力不能支永譽促老幼渡河自斷後禦賊賊衆蝟集天石如雨遂入河死艾萬年米脂人由武生從軍積功至神木參將崇禎四年從曹文詔復河曲􅀧燈子入山西萬年力敗之桑落鎮花帝窊霧露山從討平不沾泥山西告警隸文詔東征與李􅂌一月奏五捷又與賀人龍敗八大王掃地王兵明年賊東遁連破之延家山亢義村賈砦村擢副總兵山西土寇不散巡撫戴君恩因迎春召其渠王剛宴殺之萬年亦捕殺其魁王豹五領兵王等加署都督僉事尋授􅀌山副總兵戍平涼後戰死于寕州之襄樂本朝乾隆四十一年賜諡忠烈劉廷傑綏德州人任榆林參將崇禎十六年流賊李自成傳檄秦中廷傑與在籍總兵尤世威王世欽等誓死守戰七晝夜城陷被執奮罵不屈為賊支解死事聞贈都督僉事本朝順治二年予祀忠義祠白慧元清澗人崇禎中進士知任邱縣善祛蠧吏民畏之大兵臨城堅守有功命減俸行取會與大奄有隙摭其罪逮治之未行而兵抵城下乃與代者李廉仲共守廉仲縋城遁慧元防禦甚力及城破一門俱死贈按察司僉事本朝乾隆四十一年賜諡節􅉖艾毓初米脂人崇禎中進士知内鄉縣生長邊陲習戰事流賊來犯薶大礮於城外城内燃線發之賊死無算遂解去屢遷右參議分守南陽李自成大衆來寇食盡援絶毓初題詩城樓自縊本朝乾隆四十一年賜諡忠節惠顯清澗人由步卒積功至延綏副將闖賊至激勵將士閉城固守城破被擒賊曰若能從我則以權將軍相授顯不屈死之從子漸時為撫邊守備亦罵賊死漸縣志作濟本朝乾隆四十一年賜惠顯諡忠烈漸諡烈愍赫崇德綏德州諸生聞偽官至即具衣冠自縊於文廟為門斗救免掖至學宫觸柱而死本朝乾隆四十一年予祀忠義祠郝允曜清澗人以祖廕􅀘南國學典簿厯刑部郎中以清獄忤旨謫上林簿尋復户部主事闖賊至不屈死之本朝乾隆四十一年予祀忠義祠李振聲未脂人由進士知郾城縣厯官至湖廣巡按勤於其職崇禎末間都城陷死之盧之苓清澗人性至孝父死於蜀匍匐乞食抵西川􅀒骸歸葬與同邑李􅀖鎮皆以孝行旌本朝馬綏德州人諸生闖賊陷西安欲授以偽官抱先人木主逃寕鄉山中兄企被掠死會大兵至􅀗免一意奉親粗糲恒不能飽師友招之食不就親殁時年幾七十廬墓三年嚴冬每伏冢哀號手足皴􅏿拓文運清澗人諸生以多智稱順治六年叛將王永彊陷清澗欲引為巳用文運叱之曰吾恨力寡不能盡殲汝等耳遂遇害白鼇辰清澗人順治中以拔貢判平樂府有治績攝知賀縣以戇􅀡忤上官鐫秩事白復判温州康熙十三年耿逆叛圍其城總兵官祖宏勲通賊六月殺副使陳丹赤永嘉知縣馬琾鼇辰為賊斷右臂遂同遇害馬如龍綏德州人康熙􅀄舉於鄉會朱龍陷延安州城失守如龍糾集鄉勇力戰􅁍之大兵至如龍謁軍門陳方畧因統前鋒追賊復大破之以功授知灤州厯遷江西巡撫淮揚饑具未十萬移賑存活無算李毓采清澗人康熙十四年朱龍變起縁邊城堡皆潰毓采以把總率兵逆戰於綏德州死之傅汝友清澗人康熙十九年以總兵隨定海將軍王之鼎救永寕為賊所執不屈遇害贈都督同知白補宸清澗人康熙中舉於鄉官三原縣教諭關涼弗靖督騾運甚亟三原令佐俱赴軍補宸代行邑事設法飛輓擢寕夏衞教授督濬秦漢舊渠開水田數百頃民德之白濬清澗人由􅀊貢授咸陽縣教諭擢知桐城縣復擢知象州所莅多善政廉介不苟取性至孝以不能迎養自奉惟粗糲訓子弟有法五世同居族人貧者周卹之邑有大利害必盡言於邑宰未嘗干以私張璨綏德州人康熙中進士授檢討轉御史修高陽城如式又監賑宛平稽查滄青河工績最著擢兩淮鹽運使洊开湖南布政使列女宋李氏女清澗人顯忠族妹依顯忠父永奇在鄜城永奇挈之南歸為金兵所執欲犯之女罵不從乃縛其手於樹攢射而死明王淑妻時氏綏德衛人淑以都指揮守備寕夏戰殁氏聞訃自縊其從孫婦趙氏亦殉其夫人稱為一門雙節又千户沈湸妻賀氏賊破城以子大中託妾高氏從容投繯死又衛人高俊妻李氏年二十夫亡自縊以殉成化中旌又陶輔妻郭氏余林妻柳氏白麒妻蘇氏皆以節孝著姜耀妻李氏米脂人耀早卒無子家貧姑欲嫁之氏泣曰婦去誰事舅姑乃織作以供養舅姑殁葬祭盡禮荼苦終身同縣艾某妻高氏年十六夫亡撫遺腹子守節又李應元妻陶氏夫亡自縊以殉張鳳妻郝氏清澗人年十八夫亡守節教子成立與王􅃠妻張氏並宏治中旌同縣苗實妻郝氏白延慶妻劉氏張彦昻妻孫氏白似玉妻劉氏子賁妻李氏鮑璽妻惠氏王永祥妻白氏均以苦節著又惠道昌妻白氏惠及科妻李氏均夫亡殉節張如愚妻王氏呉堡人年十八夫殁母憐其少欲令改適氏抱遺􅀌辰夜號泣欲以死殉母乃止氏勵志守節孝養舅姑卒八十七同縣宋名儒妻劉氏張志賢妻樊氏寇善妻丁氏皆以節著馮觀祥妻王氏米脂人崇禎􅀄􅀊荒流賊起夫死氏無依恐受辱投河死同縣高建鼎妻賈氏為流賊所掠氏紿之曰我有私積攜之從汝賊信而從之入室取刀自刎死劉興女清澗人名貴姐崇禎中流賊起攻神崖砦擄婦女五十餘獨貴姐抗節不從以帕􅀩靣投崖死巡按御史呉甡鐫其崖曰烈女崖同縣康盛運妻吕氏偕夫避賊母家賊至􅂝其妹投塹死本朝馬啟周妻任氏綏德州人夫亡誓死守節朱龍之變大肆焚掠獨相戒不入馬氏門欽其節也雍正九年旌同州馬驂龍妻柳氏馬繼俊妻李氏馬彭齡妻劉氏馬徴易妻張氏李如膺妻田氏王善福妻楊氏馬士俊妻慕氏延自璽妻高氏汪生瑾妻王氏馬彪妻葉氏陸法愷妻李氏張充善妻李氏張國璽妻馬氏張隆軒妻賀氏均雍正年間旌艾穆妾金氏米脂人年二十五穆為明參將穆亡隨嫡馬氏避兵玉華山中本朝定鼎穆仲子懷英歸誠官鑲藍旗牛彔章京居京師未幾殁季子懷元往省及歸有指為逃旗官捕繫之檄行原籍取家屬甚急馬氏年邁慮不測欲自盡氏慷慨請代與懷元妻姜氏同就道比至事得雪姜氏舉一子乃謀西歸懷元方南遊閲􅀊不返值秦中僕至遂歸時秋雨積潦千里金氏􅀒㓜子攜姜氏兩月餘始抵家明年馬氏卒氏憂勞傷慟而逝時年六十三姜氏􅂘盡哀喪葬逾常禮久之懷元致書與姜氏訣曰母死不奔喪不可為子吾誓畢此生不歸矣姜氏驚怛不欲生家貧子幼茹苦四十餘年至六十九􅀊卒懷元竟不知所終雍正六年以雙節旌同邑馮震妻高氏亦雍正年間旌艾懷光妻王氏以節孝著高國祥妻韓氏清澗人為賀三兒所廹投崖死知縣吳其炎置三兒於理事聞被旌馬朂妻丁氏吳堡人年二十一夫亡守節雍正八年旌同縣樊恭妻馬氏以節孝著又丁泰妻李氏李應賢妻史氏同為賊所刼二氏登樓以避賊焚樓廹之二氏堅拒不從並死之霍士建妻卜氏綏德州人矢志守節日勤紡績同縣賀進喜妻王氏崔萬善妻張氏羅士煜妻何氏李若梓妻馮氏李修齡妻高氏周郁文妻王氏折有信妻馬氏雷建妻劉氏馬鳳國妻延氏馬曰瑞妻劉氏劉元吉妻李氏劉傑吾妻王氏李桂芝妻李氏葉生桂妻閻氏魚躍淵妻高氏陸班妻張氏閻天中妻王氏薛志清妻趙氏高占龍妻王氏均乾隆年間旌高文彩妻杜氏未脂人夫亡守節撫􅀌成立同縣艾永齡妻王氏陳有才妻吕氏馮通妻常氏高文明妻常氏艾元泰妻高氏艾琇品妻常氏拓有福妻萬氏高世俊妻艾氏馬九親妻陳氏常天佑妻李氏俱乾隆年間旌拓文運妻惠氏清澗人夫亡守節同縣師自恩妻蕭氏郝熺妻惠氏李應禄妻楊氏李雷妻楊氏任宗皇妻惠氏惠受祺妻師氏惠可揚妻師氏陳發祥妻劉氏韓龍妻劉氏白瓚妻張氏師宣藝妻白氏白璠妻惠氏白子仁妻劉氏邱育世妻張氏劉鐸妻惠氏王士甲妻師氏薛士雄妻白氏米俊妻張氏惠明世妻馬氏白子權妻褚氏王曰漣妻朱氏李通吾妻惠氏賀國用妻王氏高大雄妻馬氏白綡妻艾氏白士靜妻柏氏白虞璋妻高氏郝人敘妻米氏俱乾隆年間旌又惠正心妻師氏康程虞妻雷氏惠所和妻賀氏武全孟妻康氏白光輝妻惠氏劉壯圖妻李氏未萬箱妻王氏高得貞妻白氏李友梧妻惠氏媳醮氏白成美妻呼氏白恩妻惠氏惠得鵬妻張氏劉萬軍妻馬氏惠所靜妻霍氏韓思温妻李氏惠公義妻張氏白琮妻李氏任許因妻白氏劉估璜妻惠氏康鵬翼妻白氏任國卿妻賀氏白環妻劉氏薛壁妻韓氏賀士俊妻馮氏賀文瑞妻呉氏陳鼎妻劉氏陳檙妻師氏武統九妻孫氏王叔通妻陳氏惠永博妻雒氏惠三傑妻白氏惠和奇妻白氏楊宗鳯妻劉氏楊密妻惠氏白霍妻李氏米維城妻白氏陳恭妻白氏惠本吾妻王氏惠遐敷妻楊氏任奠􅀖妻白氏李榮貴妻惠氏鄧士瓏妻賀氏賀永祐妻郭氏李大用妻季氏邱有孔妻拓氏惠施妻王氏惠可當妻王氏張宏魁妻李氏張宏夀妻白氏白增康妻柏氏王漣妻徐氏白騰妻李氏劉四節妻白氏張能遠妻陳氏白當仁妻李氏惠廷琪妻李氏任久志妻白氏任耀妻王氏折統元妻白氏惠尚志妻馬氏李偉妻惠氏王鴻妻任氏朱錡妻陳氏李作樑妻劉氏張漣妻陳氏朱之漣妻李氏張選妻馮氏武琳妻賀氏張元臣妻楊氏惠作霦妻白氏惠大年妻劉氏惠士玠妻劉氏皆先後以節聞王妻吳氏呉堡人孝事舅姑撫育􅀌子敎並嚴師同縣慕生芳妻宋氏薛詮妻白氏賈玫妻王氏薛欽公妻高氏宋業妻李氏又烈婦藺鳳儀妻師氏均乾隆年間旌張國珠妻姬氏綏德州人夫亡守節嘉慶三年旌同邑雷作楷妻馮氏折長義妻曹氏馬逢安妻霍氏劉天德妻王氏安士華妻田氏薛精業妻辛氏白逢源妻王氏李廷詔妻李氏宫爾閣妻李氏韓衣香妻王氏霍天德妻郝氏張曰義妻何氏葉逢泰妻馬氏又烈婦郝成才妻蘇氏均嘉慶年間旌艾質同妻張氏米脂人夫亡守節嘉慶元年旌同邑常敬業妻李氏姜潛修妻馮氏姜益妻吕氏馮質源妻高氏高威鳳妻康氏艾恒兑妻高氏杜質妻高氏馮榮妻申氏張天祐妻吳氏姫逢年妻李氏又烈婦杜貴􅅜妻姜氏均嘉慶年間旌劉士炳妻武氏清澗人夫亡守節嘉慶三年旌同縣賀登科妻高氏蕭志毅妻劉氏蕭連登妻惠氏蕭珍妻師氏白師憲妻惠氏徐有福妻白氏王倬妻賀氏李琳妻季氏白連妻李氏又烈婦高中􅇠妻馬氏均嘉慶年間旌慕希閔妻霍氏吳堡人夫亡守節與同縣宋􅀖安妻郝氏均嘉慶年間旌土産布唐書地理志綏州土貢胡女布銀州土貢女稽布蠟元和志綏州貢蠟黄鼠清澗縣出藥寰宇記丹州土産香子苦參本草柴胡以銀州為勝府志綏德州出甘遂木賊兎絲又芎藭出未脂遠志出清澗
