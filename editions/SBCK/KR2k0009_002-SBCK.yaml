恩殿神道南為碑亭高宗純皇帝御製世宗十有三年聖德神功碑序述建中立極更化砥俗以成繼述之大凡數千言碑扁皆御筆親書亭之南為龍鳳門外為紅門繚垣長四千三百九十九丈界周一百五十二里乾隆元年封太平峪為永寕山從祀地壇謹按永寕山勢來自太行巍峩聳拔脈秀力豐峻嶺崇山遠拱於外靈巖翠岫環衞其閒前則白㵎河旋繞而清滱沙滋諸水會之後則巨馬河瀠流而胡良琉璃大峪諸水會之信天設之吉地也孝聖憲皇后泰東陵在制度倣泰陵東殿宇孝東陵妃園寢在泰陵之東北高宗純皇帝裕陵在昌瑞山右麓之勝水峪孝賢純皇后孝儀純皇后同安地宫慧賢皇貴妃哲憫皇貴妃妃祔焉殿宇制度悉準泰陵淑嘉皇貴神道南為碑亭仁宗睿皇帝御製碑文序述高宗六十年聖德神功十全巍煥為文數千言碑扁皆御筆親書妃園寢在裕陵之西仁宗睿皇帝昌陵在永寕山太平峪孝淑睿皇后同安地宫殿宇制度悉準裕陵序述神道南為碑亭仁宗二十五年皇上御製碑文聖德神功憂勤恭儉為文數千言碑扁皆御筆親書妃園寢在昌陵之西南以上陵寢各設總管一員副總管二員禮部工部内務府郎中員外郎主事筆帖式及雲騎尉世職八旗防禦等員東西兩陵設馬蘭泰寕二鎮總兵以下等官兵守䕶並特遣貝勒貝子公一人承辦事務三年更換總纂官臣邵燦恭纂輯總纂官臣邱建猷恭覆輯校對官臣黄樹勲恭校恭覆校大清一統志京師二山川景山一名萬􅀊山在神武門北為大内屏扆高十四丈七尺山有五峯上各有亭中峯亭曰萬春左曰觀妙又左曰周賞右曰輯芳又右曰富覽俱乾隆十六年建白塔山在西苑内為西苑鎮山即金瓊華島元名萬壽山亦曰萬􅀊山明時則互稱之或又謂之大山子本朝順治八年建白塔於山巔更名白塔山有高宗純皇帝御製白塔山總記及塔山四面記勒石萬夀山在圓明園西三里許本名甕山本朝乾隆十六年恭逢孝聖憲皇后六旬大慶並高宗純皇帝於山麓建寺祝釐賜山名曰萬夀因山為園曰清漪舊志土色黒而兼赤童無草木山下有圓靜寺寺後石壁百尺步磴而上皛庵在焉亦名雪洞俯視湖曲平田遠村延互無際山西北越横嶺有白石如幢曰白鹿巖相傳遼時有仙人騎白鹿於此玉泉山在萬壽山西五里許靜明園在焉王衡緱山集穿青龍橋得玉泉山土紋隱起作蒼龍鱗其下為池池上有亭曰望湖明宣宗駐蹕處其南為上下華嚴寺有華嚴七真洞又西為補陀寺有吕公洞又北為金山寺有七寶洞上有芙蓉殿舊傳為金章宗避暑行宫區懷瑞游業玉泉山麓有寺所謂玉泉寺也西山在京西三十里太行山支阜也巍峩秀拔為京師右臂衆山連接山名甚多總名曰西山金圖經西山亦名小凊涼張鳴鳳西山記西山内接太行外屬諸邊磅礴數千里林麓蒼􅉳谿㵎鏤錯神臯奥區也明統志每大雪初霽千峯萬壑積素凝華􅀂圖畫然為燕京八景之一曰西山積雪按燕京八景為金明昌遺事曰瓊島春陰太液秋風玉泉垂虹西山積雪薊門飛􅀨盧溝曉月居庸㬪翠金臺夕照明永樂中改薊門飛􅀨為薊門煙樹本朝高宗純皇帝有燕京八景詩改玉泉垂虹為玉泉趵突西山積雪為西山晴雪並各有御書八景碑亭詳志中各卷及後順天府志香山在為京西北三十里今靜宜園礀掩壑重松蘿薈蔚琳宫梵宇隱現諸天實勝攬之奥區修真之祕府劉侗帝京景物略香山多名蹟有葛稚川丹井金章宗祭星臺䕶駕松感夢泉又有棊盤蟾蜍香鑪諸石泡子河在崇文門内孫國敉燕都游覽志河前有長溪後有廣淀兩岸多高槐垂柳最為清曠玉河源出玉泉山匯為昆明湖分流而東南入德勝門西水關為積水潭入皇城為太液池環繞紫禁城經金水橋出玉河橋達正陽門東水關東流少北至東便門東水關下注大通河亦名御河元曰金水河以其自西門入故名前湖在圓明園之南乾隆二十八年高宗純皇帝以園之南岸地勢窪狹多積水命濬湖以便遵陸之車馬工竣賜名前湖有御製前湖詩昆明湖在萬壽山下乾隆十六年導西山玉泉之水即舊所謂西湖者廣為疏濬周三十餘里賜今名有御製昆明湖記閒置橋閘以時節宣其西為蓄水湖水勢稍高即昆明湖之上流也夾岸開稻田百頃資以灌漑彌望青疇宛然水鄉風景中有戰艦設水師營統之其經流自繡綺橋入長河引流入京城繞紫禁城而出歸大通河通濟漕渠灌漑田畝萬世永賴之利也酈道元水經注西湖東西二里南北三里蓋燕之舊池也淥水澄澹川亭望遠為遊矚之勝所舊志玉泉之水出石罅閒瀦而為池廣三丈許東流匯為西湖周十餘里荷蒲菱芡沙禽水鳥稱為佳勝明季南人興水田之利盡決諸窪隄塍菑畬宛似江南湖之滸有佛寺十俗名西湖十寺又太湖在京城西南四十五里廣袤十數畝傍有泉湧出經冬不凍裂帛湖在玉泉山望湖亭下泉從石根出溢為湖渟浤方廣數丈泉涌湖底狀如裂帛其水澄鮮􅃞沙金色乾隆年閒時加疏濬屢有御製詩一畝泉發源南苑西北隅大畝許雖旱不竭東流過德壽寺後涼水河自西北來入之水流漸壯至東紅門又南過半邊橋出苑牆折而東北主馬駒橋又東至大石橋達張家灣入北運河本朝乾隆三十二年重加疏濬並添建閘座以資蓄洩玉泉在玉泉山泉出石罅瀦而成池渟浤淨瑩舊名玉泉垂虹為燕京八景之一本朝乾隆十六年御題八景詩以其歕出水面􅀋濟南之趵突因改為玉泉趵突勒碑泉上又以泉味清洌品其輕重定為天下第一泉御製有玉泉山天下第一泉記蔣一葵長安客話玉泉山以泉名泉出石罅瀦而為池廣三丈許水凊而碧細石流沙綠藻紫荇一一可辨池東跨小石橋水經橋下東流入西湖燕都游覽志玉泉山沙痕石隙隨地皆泉山陽有巨穴泉歕而上淙淙有聲或名之曰噴雪泉戴洵司成集京城西三十里有石洞泉自洞中出洞門刻玉泉二字泉味甘洌其在山之陽者浤澄百頃合流而入都城逶迤曲折宛若流虹魚藻池在崇文門外西南俗呼金魚池帝京景物略金故有魚藻池舊志池上有瑶池殿今遺址不可考居人界池為塘植柳覆之􅀊種金魚以為業每端午日走馬於此飛放泊即永定門外南苑亦名南海子元史兵志冬春之交天子親幸近郊縱鷹隼搏擊以為遊豫之度謂之飛放明統志南海子舊為下馬飛放泊又北城店黄埃店俱有飛放泊廣三十頃滿井在安定門外東五里井徑五尺餘清泉涌出冬夏不竭好事者鑿欄以束之水常浮起散漫四溢古蹟薊邱在德勝門外戰國䇿樂毅報燕王書曰薊邱之植植於汶篁水經注薊城内西北隅有薊邱因邱以名邑也猶魯之曲阜齊之營邱矣長安客話今都城德勝門外有土城關相傳古薊門遺址亦曰薊邱舊有樓館並廢但門存二土阜旁多林木蓊翳蒼翠燕京八景有薊門煙樹即此瓊華島在西苑太液池上金史地理志西園有瑶光臺瓊華島蔣一葵堯山堂外紀金章宗為李宸妃建梳糚臺於都城東北隅今瓊華島即其故蹟目為遼后梳糚臺誤輟耕錄萬􅀊山在大内西北太液池之陽金時名瓊華島元中統三年修至元八年賜今名其山皆㬪玲瓏石為之峯巒隱映松桂隆鬱秀若天成引金水河至其後轉機運至山頂出石龍口注方池至仁智殿後從石龍頭噴出入太液池左右皆有登山之徑縈紆萬石中洞府出入宛轉相迷至一殿一亭各擅一景之妙故老言朔漠有山形勢雄偉金時發卒鑿掘運至幽州城北積累成山因搆宫殿以為遊幸之所明宣宗廣寒殿記萬􅀊山石宋之艮嶽也金徙於此司成集自山麓至巔百三十餘步周二百餘丈皆㬪石而成頂有廣寒殿四隅各有亭左曰玉虹曰方虹右曰金露曰瀛洲山半有三殿中曰仁智東曰介福西曰延和山上常有雲氣浮空氤氲五采變化翕怱莫測其妙為燕京八景之一曰瓊島春陰元故宫在皇城内即明西苑也元世祖至元十年建王士􅀧禁扁大明門殿正門也旁有掖門繞為長廡左右為文武樓與廡相連門之左為日精門右為月華門大明殿乃朝會正殿也殿十一閒殿後有寢宫宫後連抱長廡廡後横互道以入延春宫寶雲殿在寢殿後東廡為鳯儀門西廡為麟瑞門後廡東曰嘉慶門西曰景福門延福門在寶雲殿後左為懿範門右為嘉則門内為延春閣閣九閒後有寢殿香閣文思殿在大明寢殿東紫檀殿在大明寢殿西又有慈福殿曰東煖殿明仁殿曰西煖殿左為景輝門右為清灝門玉德殿在清灝門外東為東香殿西為西香殿宸慶殿在其後又有隆福宫皇太后所居在大内之西興聖之前光天門乃光天殿之正門也左為崇華門右為膺福門殿七閒左廡為青陽門右廡為明暉門翥鳳樓在青陽之南驂龍樓在明暉之南又有夀昌殿曰東暖殿嘉禧殿曰西暖殿鍼綫殿在寢殿後又有枏木殿一名文德殿鹿頂殿在光天殿西北興聖宫在大内之西北宫内建小直殿後有禮天臺高跨殿上興聖門乃興聖殿之北門也左為明華門右為肅章門殿七閒東廡為宏慶門西廡為宣則門凝暉樓在宏慶之南延灝樓在宣則之南又有嘉德殿寶慈殿山字門在興聖宫後乃延華閣之正門也閣五閒圓亭在延華閣後芳碧亭在圓亭東徽清亭在圓亭西東鹿頂殿在延華閣之東西鹿頂殿在延華閣之西此宫闕制度之大畧也明燕王府仍元宫遺址永樂十五年始建造焉萬夀宫沈德符野􅀗編萬夀宫在太液池西明成祖舊宫也嘉靖初名永壽宫自壬寅從大内移蹕此中至四十年災凡乘輿一切服御及先朝異寶盡燼復以三殿大工之餘木重建名曰萬夀宫後寢曰夀源宫玉熙宫高士奇金鼇退食筆記玉熙宫在西安門内街北金鼇玉蝀橋之西明神宗始建莊烈每宴於此作過錦水嬉之􅃧遼故宫在京城南遼太宗㑹同元年建王士􅀧禁扁宫名曰永興曰積慶曰延昌曰睦曰永昌曰延章敏曰長安曰慶曰長春曰太崇德曰和曰延興聖曰敦和殿名曰清涼曰元和曰嘉安堂名曰天善樓名曰五花曰五鳳曰迎月閣名曰乾文長春宫在遼故宫内遼史聖宗統和七年二月幸長春宫十三年正月如長春宫十五年二月如長春宫皆此地按朱彝尊日下舊聞引北平古今記云遼有二長春宫一在南京一在長春州􅀂統和五年三月幸長春宫十二年三月如長春宫十七年正月如長春宫則非南京之長春宫也又日下舊聞考按云統和十三年正月壬子幸延芳淀庚午如長春宫十五年正月庚午幸延芳淀二月丙申朔如長春宫延芳定在東京其地與上京之長春宫較近此二條似指上京之長春宫而言今按遼史聖宗本紀統和十二年十二月丁未幸南京十三年正月壬子幸延芳定庚午如長春宫十四年十二月甲子幸南京十五年正月庚午幸延芳淀二月丙申朔如長春宫丁未至壬子僅六日甲子至庚午僅七日不應即至東京考延芳淀在南京漷陰縣為遼國君臣弋獵之所詳載遼史地理志班班可考又遼史考証引北平古今記云統和四年命皇族廬帳駐東京延芳淀是東京亦有延芳淀但以月日計之此延芳淀自應指南京而言則此二條自應仍指南京之長春宫而言也金故宫在京城西南金貞元元年建大金國志應天門内殿凡九重殿三十有六樓閣倍之正中曰皇帝正位後曰皇后正位位之東曰内省西曰十六位乃妃嬪居之金史地理志應天門内有左右翔龍門及日華月華門前殿曰大安殿之東北為東宫正北列三門中曰粹英為壽康宫母后所居也西曰會通門門北曰承明門又北曰昭慶門東曰集禧門尚書省在其外其東西門左右嘉㑹門也門有二樓大安殿後門之後也其北曰宣明門則常朝後殿門也北曰仁政門後有仁政殿常朝之所也又大定二十五年宰相入見於香閣其後承安泰和閒遂為轉對召見之所外有乾元泰和慶安紫宸慶和廣仁神龍太和厚德埀拱崇政清暉慶春天香瑶光睿思蓬萊長生浮玉長樂皆殿名也啟慶聖壽翠微慶安景明坤安光春磐安仁壽隆慶長春建春興德慶元光興集慶坤儀㑹聖皆宫名也明統志府西南有舊燕城蓋即其遺址奎章閣在元故宫興聖殿西輟耕錄元文宗天厯二年建置大學士等官以侍燕閒左右藏祕書書畫等物設官掌之至正初改為宣文閣崇文閣在東直門内元延祐六年建呉澄撰碑即今國子監彝倫堂址也晾鷹臺在永定門外南海子内臺高丈餘元之舊也有聖祖仁皇帝御製晾鷹臺詩恭值大閲之典例於晾鷹臺舉行天主堂在宣武門内東城隅大西洋奉天主教者明萬厯中利瑪竇自歐邏巴國航入中國神宗命建第於此其左建天主堂祀耶蘇本朝以來西洋人之來京師者授為欽天監監正監副等官居此又西安門内光明殿後亦有天主堂潄芳亭在朝陽門外元道士呉全節建輟耕錄初燕地未有梅花呉全節從江南移至䕶以穹廬扁曰潄芳亭道士張伯雨造其所不覺熟寢於中夢􅁴賦詩有風沙不憚五千里將身跳入仙人壺之句婆娑亭在廣安門内元馬文友別墅又有飲山亭亦文友所築鰕菜亭在德勝門水􅀜西明戴大圓建杏花園在東直門外元董宇定建植杏千餘株至順二年王用亨與華陰楊廷鎮高安張質夫莆陽陳衆仲讌集於此虞集為之記鹿園在東便門外大通橋東方廣十餘里地平如掌古樹偃仰傳是金章宗時故址今曰藍靛廠韋園在左安門外二里明正德中太監韋霦建水木清幽為當時勝地同樂園在金故宫西大金國志西出玉華門曰同樂園瑶池蓬瀛柳莊杏林盡在於是師拓趙秉文皆有同樂園詩按金史又有蓬萊院熈春園廣樂園芳苑環秀亭建春宫南苑東園西苑北苑後園之名俱載本紀諸傳中今無考奇太保園在德勝門外元延祐四年詔作林園於健德門外賜太保奇齊耶趙孟頫名其堂曰賢樂亭曰燕喜奇齊耶舊名曲出且今改正東苑在皇史宬之西明觀心殿址稍南即南城也明雷禮大政記成祖時率太孫洎羣臣觀擊毬射柳於此呉伯與内南城紀略自東華門進至麗春門凡里餘經宏慶殿厯皇史宬門至龍德殿隙地皆種瓜蔬注水􅀒甕宛􅀂村舍過此則飛虹橋石刻羆虎禽鳥􅃺傳為西洋僧載而來橋之南北柱石題曰戴鼇曰飛虹有洞嵌石壁壁上刻秀巖二字石磴數十級有方邱焉最上為乾運殿古松大柏覆之按明英宗所居南内亦曰南宫謂之小南城以其近東苑之南城也其地在禁垣内之東隅御苑輟耕錄御苑在元隆福宫西厚載門北有香殿在石假山上有圓殿在山前圓頂上後有流杯池歇山殿在圓殿前東西水心亭在歇山殿池中池引金水注焉棕毛殿在假山東偏苑西有翠殿又有花亭毬閣金殿苑外重繞長廡廡後出内牆東連海子以接厚載門元掖庭記元建内殿制度精巧極一時之麗有光天玉德七寶瑶光通雲凝翠廣寒等殿不能一一數也大内有德夀宫翠華宫擇勝宫連天樓紅鸞殿入霄殿五華殿又有迎涼之所曰清林閣又有温室曰春熙臺曰九引臺者七夕乞巧之所也曰刺繡亭緝衮堂者冬至候曰之所也九龍墀延香亭春時宫女傳杯於此拱璧亭又名夜光亭探芳徑旁有逍遥市又有集賢臺集寶臺眺遠閣留連館萬年宫並在禁苑神木廠在廣渠門外二里許有大木偃側於地高可隱一人一􅀐明初構宫殿遺材也相傳其木有神因名本朝乾隆年間高宗純皇帝經臨其地有御製神木謡津梁東安橋在東安門内橋北又有騎河橋橋上有亭曰涵碧今遺石礎二玉蝀橋在西華門西一名御河橋又名金海橋明人題詠俱稱玉蝀橋跨太液池上廣約二㝷修數百步下列九門兩崖闌楯皆白石鐫鏤為禁苑往來大道玉河橋在正陽門内御河上凡三一跨長安東街一跨文德坊一近城垣銀錠橋在地安門西北一名玉河橋為城中水際看西山最勝處橋東西皆水多芰荷菰蒲南望宫闕北有琳宫西眺城外諸峯遠近畢露德勝橋在德勝門内積水潭東水注橋下東行正陽橋在正陽門外又崇文門宣武門外均有橋跨護城河上普濟橋在廣安門外本朝康熙年閒建又各門外皆有橋今舉其最著者載之高梁橋在西直門外半里跨高梁河橋上坊楔文東曰長源曰永澤西曰廣潤曰資安旁有倚虹堂高宗純皇帝聖駕經行傳膳於此麥莊橋在昆明湖之南與長春橋相接高宗純皇帝有御製麥莊橋記隄堰高梁閘在西直門外迤北一里元至元二十九年建一名西城閘本朝時加修築廣源閘在西直門外七里元至元二十六年建本朝時加修築惠山園閘在惠山園東北本朝乾隆十八年建昆明湖閘在清漪園湖隄本朝乾隆十五年建玉泉新閘在玉泉山下本朝康熙二十二年建祠廟奬忠祠在地安門内東嘉慶二年建祀贈郡王銜貝子大學士諡文襄福康安御書額曰北猷壯弼每春秋二仲月致祭雙忠祠在崇文門内乾隆十六年建合祀都統一等伯諡襄烈傳清左都御史一等伯諡壯果拉布敦高宗純皇帝御書額曰勇烈􅀟垂昭忠祠在玉河橋東南雍正二年敕建祀本朝王公大臣官員之全忠盡節者高宗純皇帝御書額曰表奬忠勲旌勇祠在地安門外之西乾隆三十三年建祀一等承恩毅勇公將軍明瑞都統扎拉豐阿護軍統領觀音保總兵李全王玉廷德福有御製碑記襃忠祠在地安門外西嘉慶十年建祀御前大臣三等公額勒登保仁宗睿皇帝御書額曰􅀭武抒忠並御製碑文賢良祠在地安門外之西雍正八年世宗憲皇帝敕建額曰崇忠念舊祀王公大臣之有功御書國家者王二人怡賢親王和碩超勇裏親王䇿凌公八人愛星阿哈世屯圖海福善費揚古賴塔尹德兆惠侯三人李國翰張勇施琅大學士四十二人范文程達海額色黑甯完我魏