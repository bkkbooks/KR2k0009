front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_002-1a}
body:
  text: 京師一京師形勝甲天下民俗樸淳土地深厚滄海環其東太行擁其西喜峯古北諸關衞其北兗豫荆􅀭襟帶南服都會雄固無過於此在周為燕召公封國漢初為燕國都昭帝元鳳元年置廣陽郡唐為幽州范陽郡遼會同初升為南京始建都焉金為中都元為大都明初為燕王封國永樂元年建北京稱行在十九年稱京師洪熙初復稱行在正統中始定為京師本朝世祖章皇帝統一寰區撫有九域聲教廣被靡遠弗屆幅員所曁東包朝鮮南越瀛海北抵大漠西踰流沙而定都京師宫邑維舊德化聿新懷柔外藩亭育中夏列祖列宗丕昭神武繼繼承承平定朔漠青海臺灣兩金川曁準夷回部拓新疆二萬餘里日淵月竁絡繹尊王皇上纘承列聖之志居中馭外遠肅邇安如海朝宗如星拱極以道里遠近計之在古伊洛為九州之中今京師宅萬國之中重譯同文八維奉朔自虞夏以來未有􅀂斯之盛者也卜世卜年斯萬斯億猗歟盛矣城池京城周四十里高三丈五尺五寸門九南曰正陽南之東曰崇文南之西曰宣武北之東曰安定北之西曰徳勝東之北曰東直東之南曰朝陽西之北曰西直西之南曰阜成按遼史地理志南京析津府城方三十六里八門東曰安東迎春南曰開陽丹鳳西曰顯西清普北曰通天拱辰金史地理志燕城門十三東曰施仁宣曜陽春西曰麗澤顥華彰義南曰景風豐宜端禮北曰㑹城通元崇智光泰宇文懋昭大金國志都城四圍七十五里陶宗儀輟耕錄元至元四年於中都東北置京城方六十里分十一門正南曰麗正南之右曰順承南之左曰文明北之東曰安貞北之西曰健德正東曰崇仁東之右曰齊化東之左曰光熙正西曰和義西之右曰肅清西之左曰平則明洪武九年徐達經理元都縮其城之北五里廢光熙肅清二門其九門倛仍舊尋改安貞曰安定健德曰德勝崇仁曰東直和義曰西直永樂元年為北京城十九年營建宫殿成乃拓其城周圍四十里正統二年修城樓四年工成乃改麗正曰正陽文明曰崇文順承曰宣武齊化曰朝陽平則曰阜成本朝鼎建以來修整壯麗其九門之名則仍舊焉世祖章皇帝於京師分列八旗拱衞皇居於是正黄旗居德勝門内鑲黄旗居安定門内並在北方正白旗居東直門内鑲白旗居朝陽門内並在東方正紅旗居西直門内鑲紅旗居阜成門内並在西方正藍旗居崇文門内鑲藍旗居宣武門内並在南方各有定居分為左右二翼又按城濠之水源出昌平州白浮村之神山泉通榆河會一畝馬眼諸泉匯為七里濼東流環繞都城曰玉河又西山之玉泉從水關經銀錠橋流入西苑繞宫禁自玉河橋入城濠合流至大通橋入漕河明嘉靖中工部尚書雷禮以外城濠池淺狹請悉深濬水乃自城西北隅環城東注厯九橋九閘從城東南隅流入大通橋皇城在京城中周十八里有奇繚牆袤三千六百五十六丈五尺高一丈八尺正南曰大清門少北曰門西曰長安左門曰長安右門東曰東安西安門正北曰地安門舊爲北安門順治九年改今名大清門之内曰天安門舊爲承天門順治八年改今名天安門之内曰端門端門之内左曰闕左門右曰闕右門紫禁城在皇城中周六里南北長二百三十六丈二尺東西長三百有二丈九尺五寸高三丈南曰午門左曰左掖門右曰右掖門午門内爲太和門左曰昭德門右曰貞度門其東曰協和門西曰太和殿六朝正殿也熙和門太和門内爲太和殿前東爲體仁閣西爲宏義閣體仁閣之北曰左翼門宏義閣之北曰右翼門由太和殿入爲中和殿保和殿左有中左門後左門右有中右門後右門保和殿之後爲乾清門左曰曰内左門右曰内右門其東曰隆宗門景運門之東爲景運門西寕壽宫乾隆三十七年曰皇極殿敕葺四十一年落成其正殿隆宗門之西爲慈寕宫又西爲夀康宮後爲皇太后萬壽聖節及長至元旦夀安宫皇上率王公大臣於此行朝賀禮自協和門出爲東華門自熙和門出爲西華門城之正北曰神武門文華殿在東華門内箭亭之南殿後爲文淵閣以庋四庫全書設官掌之東北有石橋三過橋爲三座門正北有殿宇三所覆以綠瓦爲皇子所居武英殿在西華門内南薰殿在武英殿南自乾清門以内殿廷之制度中禁嚴密不敢詳載按遼史地理志皇城在南京析津府西南隅大内門曰宣教外三門曰南端左掖右掖西曰顯西設而不開北曰子北又聖宗本紀統和二十四年八月改南京宣教門爲元和外三門爲南端左掖門爲萬春右掖門爲千秋大金國志宫城周圍凡九里三十步自天津橋之北曰宣陽門過門有兩樓曰文曰武文之轉東曰來安館武之轉西曰㑹同館正北曰千步廊東西對焉廊之半各有偏門向東曰太廟向西曰尚書省宫城之正南門曰應天樓高八丈朱門五東西相去一里餘又各設一門左曰左掖右曰右掖城之正東曰宣元宫城周圍九華正西曰玉華北曰拱辰輟耕錄里三十歩東西四百八十步南北六百十五步分六門正南曰崇天崇天之左曰星拱右曰雲從東曰東華西曰西華北曰厚載角樓四據宫城之四隅自大明門由日精月華二門以内皆元之宫闕諸門也明初燕王府建於元之皇城舊址即今西苑門四東曰體仁西曰遵義南曰端禮北曰廣智至永樂十五年乃改建皇城於東去舊宫一里許時以東華門之外逼近民居喧囂之聲至達禁籞宣德七年乃加恢廓移東華門於河之東遷民居於灰廠西之隙地正陽門内曰棋盤街府部對列街之左右孫承澤春明夢餘錄紫禁城門凡八曰承天門曰端門曰午門東曰左掖門西曰右掖門再東曰東華門再西曰西華門向北曰元武門蓋皇城自遼金以來遞經改徙至元明二代而制度乃備本朝順治康熙閒重建諸宫殿各門規模益宏整云外城包京城南面轉抱東西角樓計長二十八里高二丈亦曰外羅城門七南曰永定曰左安曰右安東曰廣渠西曰廣安在東西隅而北向者東曰東便西曰西便按外城建於明嘉靖三十二年先是成化十二年定西侯蔣琬言宜倣南京舊制築土城嘉靖二十一年都御史毛伯温等言成祖遷都金臺當時内城足居所以外城未立今城外之民殆倍城中宜修築外城時以給事中劉養直言而止至是給事中朱伯辰復言四郊咸有土城故址環繞如規周可百二十餘里宜仍舊貫修築因命都督陸炳平江伯陳珪等相度京城四面計當築外城約七十餘里因條上其規制已允行尋又以工費重大止築南面四十一年添築永定等七門甕城至四十三年六月城始成壇廟天壇在正陽門外南郊按春明夢餘錄明嘉靖九年定分祀天地之制遂於大祀殿之南建圜丘後屢有修葺本朝因之重加繕治乾隆十六年又修每年冬至大祀天於圜丘奉大祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝高宗純皇帝月星辰仁宗睿皇帝以配日雲􅀨風雷分四從壇其制三成南嚮第一成寛徑五丈九尺高九尺二成徑九丈三成徑一十二丈皆高八尺一寸其墁石皆按九九陽數周圍石欄四出陛各九級白石為之内壝圓牆牆瓦舊皆用黄色琉璃乾隆十六年改天青色琉璃櫺星石門四面各三外壝方牆櫺星門制同壇之東為神庫神廚祭器庫宰牲亭壇之西為神樂署犧牲所鑾駕庫壇之北為皇穹宇藏神版翼以兩廡藏從祀神牌其前建三門又其外繞牆為方牆門四東曰泰元南曰昭亨西曰廣利北曰成貞其西為齋宫祀之前一日皇上親詣皇穹宇拈香齋宿以致昭祀之誠地壇在安定門外北郊按春明夢餘錄明嘉靖九年建方澤壇本朝因之重加繕治乾隆十六年又修每年夏至大祀太祖高皇帝地於方澤奉太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝高宗純皇帝仁宗睿皇帝以配五嶽五鎭啟運山四海天柱山四瀆分四從壇以隆業山昌瑞山永寕山從祀五鎭之次其制二成北嚮第一成方六丈高六尺第二成方十丈六尺高六尺其墁石皆按六六陰數四出陛各八級周壇為水渠内壝方牆牆瓦皆用黄色琉璃櫺星門六正北三東西南各一外壝方牆亦如之壇之南為皇祇室藏神版外為方牆壇之西南有神庫齋宫又西北為神廚樂器庫宰牲亭西北為鑾駕庫又外圍方牆惟西南三門其西石坊曰廣厚街祈穀壇在天壇内明永樂中合祀天地建此殿曰大祀殿嘉靖九年分為北郊遂於其南建天壇而此殿專以祈穀改名大享本朝因之每年正月上辛恭祀上帝以祈年穀奉太祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝高宗純皇帝年重修改名仁宗睿皇帝以配乾隆十六祈年殿殿制圓象天周十有二柱中柱四圓頂三檐用天青琉璃瓦殿陛三級臺三成周以石欄前後三出陛東西一出陛上中二成九級下一成十級前廡九楹後廡七楹左右廡各五楹周以方牆南爲祈年門北爲皇乾殿藏東爲神庫神版牆外神􅌮宰牲亭朝日壇在朝陽門外東郊其制一成西嚮每年春分卯時祭遇甲丙戊庚壬年皇上親祭餘年遣大臣攝祭夕月壇在阜成門外西郊其制一成東嚮每年秋分酉時祭遇丑辰未戌年皇上親祭餘年遣大臣攝祭按金史禮志朝日壇曰大明在施仁門外東南夕月壇曰夜明在彰義門外西北明洪武中以日月星辰從祀天地罷朝日夕月禜星之祭嘉靖九年旣建南北郊始於東郊祭日西郊祭月本朝順治元年罷八年復建朝日壇制方廣五丈高五尺九寸四出陛九級圓壝内櫺星門六乾隆二十一年重修夕月壇制方廣四大高四尺六寸四出陛六級方壝内櫺星門亦六乾隆二十二年重修神庫神􅌮宰牲亭祭器庫俱在壇右齋宫在壇左壇門外甬道舊俱曰禮神街雍正二年名朝日壇之街曰景升夕月壇之街曰光恒壇内牆瓦皆綠琉璃太嵗壇在正陽門外之西故山川壇之内明嘉靖八年建本朝因之乾隆十九年重修每年於正月上旬吉日十二月杪恭祀太􅀊月將之神恭遇太廟日致祭皇上行耕耤禮致祭先農禮成詣太􅀊壇拈香壇内正殿七楹南嚮東西兩廡各十一楹又南為拜殿東為齋宫西為神庫神􅌮祭器庫宰牲亭先農壇在太􅀊壇西南明嘉靖中建本朝因之乾隆十九年重修制一成方廣四丈七尺高四尺五寸四出陛東為齋宫乾隆二十年改為􅂟成宫東為鑾駕庫東北為神倉東南為具服殿殿前為觀耕臺臺之南即世祖章皇帝順治十一年耤田也聖祖仁皇帝康熙十一年俱親享先農行耤禮世宗憲皇帝雍正二年耕親祀先農舉行躬耕禮三推畢又加一推遂為常例每􅀊以季春吉亥皇上躬行祀禮親御耒耜若遇巡省之年則遣官致祭順天府尹率屬代耕按明嘉靖十年改耕耤壇後之神倉為天神地祇壇隆慶元年禮官議罷之本朝順治初復於先農壇之南立天神壇南嚮設雷神位於雲師􅀨師大神壇之西立風伯地祇壇北嚮設五嶽隆業山五鎮昌瑞山啟運山永寕山天柱山四海四瀆神位凡祈􅀨於此分祭􅀨應則報祭而明建山川壇在正陽門南之右者省焉先蠶壇在西苑東北隅乾隆七年敕建其制一成方四丈高四尺四出陛壇東南為先蠶神殿壇之東為觀桑臺臺之前為桑園每􅀊以季春吉巳皇后親祀行躬桑禮或遣妃代行禮社稷壇在皇城内午門之右北嚮明永樂八年建本朝乾隆二十一年因舊制重修每年春秋二仲月上戊日致祭異壇同壝社以句龍氏配稷以后稷配壇制二成上廣五丈下廣五丈三尺俱高四尺四出陛築以五色上色如其方壝垣四面各有櫺星門飾垣亦各如其方之色壇北為祭殿乂有拜殿俱南嚮其西為神庫神􅌮宰牲亭太廟在皇城内暮祫祭廟制午門之左南嚮每􅀊四孟月時享􅀊前殿十一楹中殿九楹同堂異室奉後殿九楹奉列聖列后神龕祧廟神龕前殿兩廡各十五楹東廡配享功王位