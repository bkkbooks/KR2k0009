殿額勤政東偏為心鏡軒北為敷春堂西為清夏齋後湖東偏為涵秋館西偏為四宜書屋園北平湖百頃殿宇五楹額曰鳳麟洲有仁宗睿皇帝御製綺春園記清漪園在圓明園西開濬西湖萬夀山之麓乾隆十六年賜名昆明臨湖建園名曰清漪橋亭軒閣雲布繡錯正殿曰勤政乾隆二十五年宴安集延拔達克山入覲陪臣於此園之北為惠山園内有景凡八曰載時堂墨妙軒就雲樓澹碧齋水樂亭知魚橋尋詩逕涵光洞並有製詩又墨妙軒中恭嵌高宗純皇帝御三希堂續摹法帖靜明園在圓明園西玉泉山下康熙十九年建初名澄心三十一年改名靜明聖祖仁皇帝世宗憲皇帝嘗隆十八年重加修葺為景十六曰閱武於此乾廓然大公芙蓉晴照玉泉趵突竹鑪山房聖因綜繪繡壁詩態溪田課耕清涼禪窟采香雲徑峽雪琴音玉峯塔影風篁清聽鏡影涵虚裂帛湖光雲外鐘聲翠雲嘉䕃並有御製詩靜宜園在香山去圓明園十餘里即址聖祖仁皇帝於此置香山寺故行宫乾隆十年秋重加修葺既成賜名靜宜有御製靜宜園記為景二十有八曰勤政殿麗矚樓綠雲舫虚朗齋瓔珞巖翠㣲亭青未了馴鹿坡蟾蜍峯栖雲樓知樂濠香山寺聽法松來青軒唳霜􅆏香嵓室霞標磴王乳泉絢秋林􅀨香館晞陽阿芙蓉坪香霧窟栖月崖重翠崦玉華岫森玉笏隔雲鐘並有御製詩南苑在永定門外二十里方一百二十里元為下馬飛放泊明永樂中増廣亦名南海子本朝設總尉防禦等官守之内有新衙門舊衙門南紅門三處行宫周圍繚以垣牆九門環列麋鹿雉􅈷蕃育其中時乾隆四年十一月命禁旅行圍以肄武事高宗純皇帝大閱於此二十三年十一月右部哈薩克及塔什罕衆歸誠入覲亦於此大閱俾得與觀仁宗睿皇帝有御製南苑記按苑中有一畝泉經苑之東紅門由張家灣入北運河又有團河源出團泊在黃村門内六里許乾隆四十二年重加疏濬出南苑牆爲團河又入鳳河又東南流與永定河合官署内閣在午門内東南門西嚮按春明夢餘錄明初閣制甚隘入門一小坊過坊即閣嘉靖十六年始以文淵閣中一閒奉孔子四配像旁四閒互爲閒隔開戸於南爲閣臣辦事之所閣東誥敕房構小樓以貯書籍閣西制敕房南面隙地構房三閒以處官吏而閣制始備其右石臺宣德中種澹紅芍藥後爲玉堂賞花之地本朝初改爲祕書國史宏文三院後大學士俱集昭德門内東南隅直房辦事惟新授時内閣一設公案康熙二十八年復舊制今閣中堂三楹爲大學士内閣學士治事之所乾隆九年御書調和元氣額嘉慶二十年御製内閣箴賜懸堂内其南為本房專譯章奏東為滿漢票簽房又有典籍庫藏祕書圖籍閣後門東為紅本庫又東為尊藏華門外東南實錄庫又實錄皇史宬在東玉牒起居注藏焉皆内閣掌管皇史宬記閣後門之北為仁宗睿皇帝有重修國史館外如四庫文穎諸館書成即撤不備載稽察欽奉上諭處在太和門外東廡之北南為内閣誥敕房西廡北為繙書房南為起居注館為日講官恭繕記注之所内務府在武英殿後司七廣儲㑹計掌儀都虞慎刑營造慶豐庫六曰銀皮磁緞衣茶院三曰奉宸武備上駟及織染局藥房皆各有分署世宗憲皇帝御書額曰職司綜理咸安宫官學在西華門内雍正七年建以敎八旗及内務府三旗子弟之俊秀者六科在西午門外東西相嚮吏戸禮在東兵刑工在按明初六科直房在掖門之西與内閣相對謂之六科廊後遷今處又舊制六科無所統雍正二年世宗憲皇帝命隸都察院中書科在午門外之西按明初遇大朝㑹中書舍人與翰林宫坊六科官冋為侍從之臣上殿東西班對立東宫朝賀文華殿導駕侍班今制統於内閣止掌書寫誥敕其直房則仍舊焉又有尚寶司亦在午門外西兵科之上今裁光祿寺在東安門内南嚮署四大官珍饈良醖掌􅊽世宗憲皇帝御書堂額曰敬慎有節按光祿寺明初為宣徽院尚食尚醴二局後改光祿寺景山官學在景山北上門兩旁康熙二十五年設以敎三旗子弟翰林院在長安左門外王河西岸北嚮聖祖仁皇帝御書堂額曰道德仁藝乾隆九年重修落成御書稽古論思集賢清秘二額顏其堂臨幸賜宴分韻賦詩用唐臣張說東壁圖書府詩全首土神祠祀唐韓愈其餘存者敬一瀛洲寶善原心四亭及劉井而已又敎習庶常館在正陽門之東雍正十一年世宗憲皇帝特建以為新科庶吉士讀書之所乾隆三十三年重修高宗純皇帝御書額曰芸館培英詹事府在嚮皇城東玉河東岸西聖祖仁皇帝御書堂額曰德業仁義仁宗睿皇帝御書額曰立誠居業堂左為左右春坊堂右為司經局堂後為先師祠有碑恭鐫聖祖御書存誠二字祠前有古松二株署中舊有一枝軒乾隆中葺府得明王穉登石刻按明初詹事以勲舊大臣兼領不另置官後設詹事院更名府隆慶後始以翰林官序􅀘又明時坊局最重春坊之長閒設大學士雖列署詹事而官不隸本朝以翰林升補附於詹事焉宗人府在皇城東西嚮左為經厯司迤南為左司迤北為右司其後為黄檔庫玉牒庫銀庫帝御書堂額曰敦崇孝弟世宗憲皇仁宗睿皇帝御製宗人府箴懸堂内吏部在皇城東宗人府之南西嚮司四文選考功驗封稽勲司務廳一世宗憲皇帝御書堂額曰公正持衡仁宗睿皇帝御製吏部箴懸堂内堂後有明侍郎呉寛手植紫藤今名藤花廳其南火房為水鏡堂又署中許公祠祀賜諡忠愍明考功員外郎許直按吏户兵工四部鴻臚寺欽天監太醫院等衙門明永樂時皆仍舊官舍為之散處無序正統七年始以次營建本朝因之戸部在吏部南西嚮司十四江南浙江江西福建湖廣山東山西河南陜西四川廣東廣西雲南貴州而順天直隸及奉天所屬州縣則以福建山東二司分理之司務廳一額曰九式經􅀖世宗憲皇帝御書堂仁宗睿皇帝御製戸部箴懸堂内大庫在署東北緞疋庫在東安門内顏料庫在西安門内為三庫又甲乙二庫火倉在署西舊設寶泉局在城東四牌樓街北今為公署别設四廠建鑪鼔鑄又總督倉場公署在城東世宗憲皇帝御書堂額曰慎儲九榖通州亦有倉場公署京城通州各設有倉其在京者海運舊太南新祿米北新興平富新太平萬安在通州者大通中大通西舊有南倉今裁併又有本裕倉在會清河禮部在戸部南西嚮司四儀制祠祭主客精膳司務廳一鑄印局㑹同四譯館附焉世宗憲皇帝御書堂額曰寅清贊化高宗純皇帝諭㫖一道仁宗睿皇帝御製禮部箴俱懸堂内按禮部公署明宣德五年建時諸署未立以禮部所典皆國家大禮故先之既成賜什器百六十二刻禮部公用字於上分南禮部藏書百二十部實之嘉靖中御書視日儀刻石於署内寅清堂前兵部在皇城東宗人府後西嚮司四武選職方車駕武庫司務廳一世宗憲皇帝御書堂額曰整肅中樞仁宗睿皇帝御製兵部箴懸堂内按兵部舊有督捕公署本舊行人司署在長安右門外本朝順治十一年特設康熙三十八年裁工部在皇城東吏部後西嚮司四營繕虞衡都水屯田司務廳一世宗憲皇帝御書堂額曰敬飭百工仁宗睿皇帝御製工部箴懸堂内節慎庫在署之東舊傳廳前有鐵甎庫中有玳瑁簾席今佚製造庫在長安右門外丙丁戊三庫在西安門内皆屬焉寶源局在朝陽門内西南新増一廠在崇文門内泡子河又琉璃廠在宣武門外皇木廠在通州張家灣惜薪廠在廣安門大街鴻臚寺在工部南西嚮世宗憲皇帝御書堂額曰肅贊朝儀欽天監在鴻臚寺南西嚮世宗憲皇帝御書堂額曰奉時敬授按監所司觀象臺在城東南隅一名瞻象臺元至元十六年建司天臺於人都先是儀象之器猶用金舊而規環不協至是太史郭守敬出所製􅂤儀仰儀及諸儀表皆臻精妙明洪武中取至南京正統中復造儀器置臺上有渾天儀􅂤儀銅球量天尺諸器儀年久多不可用本朝康熙十一年以舊御製新儀凡六一天體儀一赤道儀一黄道儀一地平經儀一地平緯儀一紀限儀陳於臺上至今遵用其舊儀移藏臺下又時憲書局在宣武門内天主堂東即明天啟二年都御史鄒元標副都御史馮從吾所建首善書院後尚書徐光啟借院修厯名曰厯局本朝令西洋人居此治理時憲書太醫院在欽天監南西嚮按院内有明堂針灸銅人金時安撫王檝使宋時所進􅀊久闕壞元至元二年尼博囉國人阿爾尼格修之􅀜鬲脈絡皆備又針炙經石刻其題篆乃宋仁宗御書至元間自汴移此會同四譯館在玉河橋西明永樂五年建名四夷館本朝改設會同館按舊制設會同館以待外國貢使設四譯館以習各國文字乾隆十三年以四譯館歸併禮部會同館更今名又以原設譯字八館酌量裁併因合回回高昌西番西天為一館曰西域館合暹羅緬甸百夷八百並蘇祿南掌為一館曰百夷館原設譯字生九十六人酌留八人以備體制又宣武門内瞻雲坊正陽門外南横街向有官房兩所為安南琉球等國館舍嘉慶五年奏交内務府收管理藩院在玉河橋之東長安街之北南嚮本朝特設司六典屬王㑹旗籍柔遠徠遠理刑司務廳一銀庫附焉世宗憲皇帝御書堂額曰宣化遐方仁宗睿皇帝御製理藩院箴懸堂内按院署舊在刑部北後移今所太僕寺在正陽門内東中心臺世宗憲皇帝御書堂額曰勤字天育貢院在京城東南隅觀象臺之北元禮部舊址也明永樂時改為貢院萬厯初因故址拓地重建本朝屢加増葺乾隆元年增廣號舍二千餘閒九年十月高宗純皇帝臨幸閲視公堂並御製詩四章刻石至御書扁額曰旁求俊乂大理寺在刑部南東嚮執法持平世宗憲皇帝御書堂額曰仁宗睿皇帝御製大理寺箴懸堂内刑部在皇城西東嚮司十八直隸奉天江蘇安徽浙江江西福建湖廣山東山西河南陜西四川廣東廣西雲南貴州督捕司務廳一司獄司附焉外有贓罰庫律例館世宗憲皇帝御書堂額曰明刑弼敎仁宗睿皇帝御製慎刑論慎刑續論刑部箴懸堂内按明刑部在長安街西内有白雲樓甘露軒今無考又按今刑部及鑾儀衞署即明錦衣衛故址也垣東大榆樹相􅀓為明員外郎楊繼盛手植都察院在刑部北東嚮道十五京畿河南江南浙江山西山東陜西湖廣江西福建四川廣東廣西雲南貴州都事經歴司附焉掌河南道别有公署在其西本京畿道署也曰都俞吁咈並聖祖仁皇帝御書堂額御製臺省箴勒石仁宗睿皇帝御製都察院箴懸堂内署中舊有明徐階題名記本朝謝濟世題名記又巡視五城御史公署俱在正陽門内迤西太常寺在都察院北東嚮世宗憲皇帝御書堂額曰祗肅明禋外有神樂署犧牲所署中有仙蝶一色黄大如茶盌有高宗純皇帝御製太常仙蝶詩恭懸堂内鑾儀衞在太常寺北東嚮所五左右中前後旗手衞一司十四鑾輿馴馬擎葢弓矢旌節旛幢扇手斧鉞班劒戈㦸東西左右世宗憲皇帝御書堂額曰恪恭輿衞鑾駕庫在長安左門外馴象所在宣武門内按明初以鑾儀司改設錦衣衞職掌鑾儀其後專理詔獄任寄日重掌衞官率皆五府都督本朝改名鑾儀始專典儀衞通政司在西長安街南北嚮喉舌世宗憲皇帝御書堂額曰慎司仁宗睿皇帝御製通政司箴懸堂内又舊設登聞鼓廳在長安右門外每日滿漢科道輪流監直康熙六十年停差科道併於通政司宗學左右翼各一雍正三年建以敎宗室子弟左學舊在大市街之東今在燈市口右學舊在瞻雲坊之北今在絨綫衚衕步軍統領衙門在地安門外帽兒衚衕本禮部會同館乾隆二十一年改建書堂額曰風清輦轂世宗憲皇帝御仁宗睿皇帝御製步軍統領衙門箴懸堂内按步軍舊制止設三營乾隆四十六年詔於京師設南北左右四營圓明園舊為南營是年改為中營共五營各有分署順天府在地安門外鼓樓東即元大都路總治舊署堂左有元劉賡碑明為順天府本朝因之世宗憲皇帝御書堂額曰肅清畿甸仁宗睿皇帝御製順天府尹箴懸堂内所屬大興宛平二京縣亦各有署國子監在安定門内文廟西南嚮堂曰彝倫聖祖仁皇帝御書賜額又有世宗憲皇帝御書文行忠信額堂後為敬一亭恭勒聖祖訓飭士子文並御書四碑又刻宋儒程頤視聽言動四箴范浚心箴明敬一箴最後為御書樓尊藏列聖御製集版十三經二十二史版皆貯焉堂左右為繩愆博士二廳率性修道誠心正誼崇志廣業六堂門曰集賢門街曰成賢街按監地本金之樞密院元至元六年始立國子學八年命集賢大學士國子祭酒許衡敎䝉古生二十四年設國子監今彝倫堂古槐相傅衡手值也明洪武初改北平府學永樂初改國子監宣德四年以金吾衞草場二所爲諸生構房舍正統九年太學成幸學行釋奠禮御彝倫堂自後累朝有幸學禮世祖章皇帝幸學本朝順治九年御彜倫堂講書賜賚有加四氏子孫隨班觀禮者俱送監讀書廣監生鄉試額十五名康熙八年聖祖仁皇帝幸學亦準順治九年例雍正二年世宗憲皇帝詣學御彝淪堂講書廣監生鄉試額十八名郡縣學量增入學名數薄海内外聞風嚮化琉球國自康熙二十七年遣子弟入監讀書後至是復遣就學而俄羅斯亦遣子弟入監讀書乃另設助敎於㑹同館以訓課之尋以六堂助敎兼攝其事後以四方抜貢入監者多於國于監南構房舍數百閒謂之南學􅀊發帑銀六千兩給諸生膏火乹隆三年正月親詣釋奠御彝倫堂講書高宗純皇帝賜賚有加特廣中額五年學四十八年二月奉御製碑文賜南特㫖創建辟雍於彝倫堂之前酌古準今規制皆由御定正殿穹崇飛簷四出汲井引泉環以圜河建石橋四欄楯周列前建琉璃坊一碑亭二鐘亭鼔亭各一正殿懸御書辟雍扁額牌坊鐫御書學海節觀圜橋教澤二扁額東北亭内鐫御製國學新建辟雍園水工成碑記西北亭内刻御製三老五更説並於彝倫堂懸御書福疇攸敘扁額五十年二月仲丁御新建辟雍講學行禮自衍聖公王公大臣以下暨諸紳士觀禮􅃪講者三千餘人各以次恩賚有差嘉慶三年二月上丁仁宗睿皇帝臨雍講書廣是年監生鄉試中額八年頒敕諭一道又乾隆三年以來釋奠皆有御製詩又有御製國子監瑞槐詩繪圖勒石辟雍左右恭刋高宗純皇帝欽定石經碑一百九十通彝倫堂左右恭刋御製説經文碑十六通又置定武蘭亭序石版於壁恭勒嘉慶三年御製蘭亭石本詩八旗都統衙門國朝定鼎之􅀄滿洲􅀩古漢軍八旗禁旅分駐京城分左右翼各設都統副都統參領佐領等官領之其治事之地未設專署雍正元年始建鑲黄旗滿洲都統署在安定門交道口􅀩古都統署在北新橋南漢軍都統署在安定門大街正黄旗滿洲都統署在德勝門橋南䝉古都統署在徳勝門石虎衚衕漢軍都統署在西直門丁家井正白旗滿洲都統署在朝陽門老君堂衚衕􅀩古漢軍都統署俱在東四牌樓南報房衚衕正紅旗滿洲都統署在阜城門錦石坊街䝉古都統署在水車衚衕漢軍都統署在宣武門内鷲峯寺街鑲白旗滿洲都統署在燈市口􅀩古都統署在王府大街甘􅀨衚衕漢軍都統署在燈草衚衕鑲紅旗滿洲䝉古漢軍都統署俱在石駙馬大街正藍旗滿洲􅀩古漢軍都統署俱在崇文門内本司衚衕鑲藍旗滿洲都統署在華嘉寺衚衕䝉古都統署在宣武門内太僕寺街漢軍都統署在堂子衚衕寛街各署中恭懸世宗憲皇帝御書堂額曰公忠勤慎旗箴八旗都統箴仁宗睿皇帝御製八訓諭八旗簡明語俱恭繕懸各署堂内又䕶軍統領前鋒統領及内外火器營香山健鋭營皆有公署覺羅學八旗各一鑲黄旗在安定門大街正黄旗在西直門内正白旗在朝陽門南小街鑲白旗在東四牌樓正紅旗在阜成門内鑲紅旗在宣武門内正藍旗在東安門内鑲藍旗在阜成門内均雍正十年建以敎覺羅子弟八旗官學在八旗分地雍正五年以就學者衆即各旗官房容百人誦講者建為官學隸國子監又有義學亦在八旗分地雍正三年别建課幼學屬禮部侍衞敎埸鑲黄旗在東安門内之北正黄旗在西安門内之北正白旗在東安門内之南為上三旗侍衛習藝之所其八旗分列所居各門外亦各有敎埸以為官兵操練之所崇文門監督署在崇文門外街東又左右翼監督各有公署俱在城内五城兵馬司並在外城乾隆三十一年以五城所轄道里遼闊改副指揮駐劄外城各門之外敎場在徳勝門外順治十三年置為八旗官兵會操之所每科兵部㑹試武舉順天府武鄉試俱於此分圍校試算學在初暢春園􅀩飬齋康熙二十五年建雍正世宗憲皇帝御製序文設教習以敎八旗世家之資質明敏者總纂官臣邵燦恭纂輯總纂官臣邱建猷恭覆輯校對官臣黄樹勲恭校恭覆校
