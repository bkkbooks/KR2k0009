詩殿制仿正定府隆興寺重宇三層上層恭懸御書額曰大雄寶殿中曰極樂世界下曰福田花􅀨嘉慶二十三年修其東為澄觀堂宏仁寺在太液池西南岸本明清馥殿本朝康熙五年改建迎供旃檀佛像有聖祖仁皇帝御製碑文又六十年御製旃檀佛西來厯代傳祀記勒石乾隆二十五年修有御製碑文並妙相嘉慶二十三年重修有御書額曰祇林御製碑文仁夀寺在宏仁寺東乾隆二十五年建為孝聖憲皇后祝釐於此御書額曰總持壽世内田宇殿嘉慶十五年修福佑寺在西華門北街東雍正元年建正殿恭奉陳設聖祖仁皇帝大成功德佛牌東案御製文集西設寶座殿額曰慈容儼在前殿額曰慧燈朗照皆世宗憲皇帝御書柏林寺在國子監東元至正中建本朝康熈五十二年恭逢聖祖仁皇帝六十萬壽世宗憲皇帝就藩邸近寺施檀重修以為祝釐之地聖祖仁皇帝賜額曰萬古柏林乾隆二十二年重修有御製碑文及詩御書殿額曰覺行俱圓回寺在長安右門外西南乾隆二十八年建回部各城平定後其伯克霍集斯霍什克等入覲並授封王公賜居邸舎餘衆願居京師者編設佐領於建營房以居之並因其土俗長安右門西敕建回寺以為㑹聚拜禮之所有御製碑記德夀寺在南苑舊衙門東順治十五年建規制崇麗聖祖仁皇帝行蒐南苑時常臨幸瞻禮有御製德壽寺詩後燬乾隆二十年重加修葺燈圓照有高宗純皇帝御題額曰慧御製碑文及詩寺内金鼎笵冶精緻高宗純皇帝御製古鼎歌方之周彝虞敦云永慕寺在南苑舊衙門西康熙三十年建為孝莊文皇后祝􅁵之所聖祖仁皇帝御書額曰香雲法􅀨乾隆二十九年修有高宗純皇帝御製詩海會寺在左安門外明嘉靖間建本朝順治十三年修十四年世祖章皇帝幸寺與寺僧憨璞論佛法大意乾隆二十二年復加繕葺帝御書額曰覺海津梁又有高宗純皇御製詩天安寺在廣安門外元魏光林舊刹隋為宏業唐為天王金為大萬安明宣德中更今名本朝乾隆二十一年修有高宗純皇帝御製碑文並御書殿額曰常清淨法曰覺路慈緣寺中浮圖高十餘丈隋開皇時建今尚存大慈觀音寺在廣安門外西南一名海㑹禪林寺創於金明成化中重建本朝雍正十一年修有御製碑文寺樓恭懸聖祖仁皇帝御書額曰寄興高遠殿額曰慈雲甘露為世宗憲皇帝御書廣通寺在西直門外本元法王寺門額為本朝聖祖仁皇帝御書又御書殿額二曰息心淨行曰慈燈普照雍正十一年修有世宗憲皇帝御製碑文並御書額曰福佑升恒乾隆七年有高宗純皇帝御製詩門外臨流西挹山翠郊􅀜勝蹟也萬夀寺在西直門外燕都游覽志萬壽寺丹樓紺宇與大内等明萬厯五年建本朝乾隆十六年修二十六年重修俱有御製碑文為於此殿内恭懸孝聖憲皇后祝釐世宗憲星帝御書額曰慧日長輝寺右為行殿寺内假山松柏皆數百年物有明永樂時所鑄大鐘一内外勒華嚴經全部今移置覺生寺正覺寺在西直門外亦名真􅁴寺俗名五塔寺燕都游覽志寺乃蒙古人所建夾道垂楊綠陰如幕緱山集真覺寺浮圖高五六丈許上為塔五陟其頂山林城市之勝收焉明永樂初年建御製碑文為本朝乾隆二十六年修有孝聖憲皇后祝釐於此高宗純皇帝御書額曰心珠朗瑩殿後為塔院院東為行殿覺生寺在西直門外雍正十一年建世宗憲皇帝御書額曰慈照澄心高宗純皇帝御書額曰妙明正覺殿前有世宗憲皇帝御製碑文碑陰恭勒高宗純皇帝御製詩乾隆八年命移萬夀寺大鐘於此鐘樓前恭立御製大鐘歌碑恩佑寺在暢春園東垣雍正元年建恭奉仁皇帝御容以時展謁乾隆八年移奉聖祖安佑宫此寺遂專為佛地殿内恭懸世宗憲皇帝御書額曰心源統貫又内外門額皆御書龕額曰寶地曇飛為高宗純皇帝御書恩慕寺在暢春園東垣乾隆四十二年建為聖憲皇后廣資慈福兼恩佑孝永慕二寺名以誌紹承之意曰福應天人門額皆御書有御書殿額御製恩慕寺瞻禮詩聖化寺在暢春園西聖祖仁皇帝御書殿額曰香界連雲觀音閣額曰海潮月印高宗純皇帝御書簷額曰能仁妙覺大報恩延夀寺在清漪園萬夀山北前臨昆明湖明時舊有圓靜寺本朝乾隆十六年恭逢孝聖憲皇后六旬萬壽特建兹寺於其地祝釐頌嘏有高宗純皇帝御製碑文寺内額曰度世慈緣曰作大吉祥曰華海慈雲曰真如曰妙覺皆高宗純皇帝御書寺西為羅漢堂塑五百羅漢像有笵銅為宇御製記勒石堂後為寳雲閣御題額曰大光明藏山陰有多寶塔塔下有石恭勒御製多寶佛塔頌塔東西為善現雲㑹二寺聖緣寺在靜明園函雲關之北康熙中敕建香嚴寺在靜明園内山上乾隆二十三年修建寺後有八方塔一座高七層有御書玉峯塔影初地殊標二力勝果三摩慈䕃四智無遮五藴皆空六度圓成七寶莊嚴徧法界觀同参最上諸額妙喜寺在靜明園西門外乾隆二十三年修建御書殿内額曰香海同源功德寺在玉泉山東麓本元大承天護聖寺規制宏麗明宣德時改今名嘉靖時廢本朝乾隆三十五年重修為孝聖憲皇后祝釐殿内御書額曰智珠心印殿前恭立御製重修功德寺碑亭碑陰恭勒御製詩寺前有古臺三相傳為元時看花釣魚臺今廢按帝京景物略謂寺僧板庵能役木毬使者出外募金説本荒唐今寺内木毬尚存御製碑文内為辨正之洵足祛萬世之惑矣香山寺在香山靜宜園内依巖架壑為殿五層金碧輝映徐善泠然志寺址為遼中丞阿勒彌所捨又云寺即金章宗之㑹景樓也金史大定二十六年香山寺成賜名大永安寺都穆南濠集香山永安寺亦名甘露帝京景物略寺始金大定正統中太監范宏拓之本朝康熙十六年修乾隆八年重修高宗純皇帝御書殿額曰圓靈應現寺門内娑羅樹一有聖祖仁皇帝御製娑羅樹歌乾隆十一年有高宗純皇帝御製娑羅樹恭依皇祖元韻詩寺北為觀音閣後為海棠院院東為挹山川之秀軒内恭懸來青軒遠眺絶曠盡聖祖仁皇帝御書額曰普照乾坤山之巔為靜室即香霧窟後為竹鑪精舍北巖閒高宗純皇帝御書西山晴雪石刻在焉洪光寺在靜宜園内燕都游覽志穿洪光寺柏徑而上即香山藏經殿遊業洪光寺古刹巨璫鄭同重修寺内圓殿千佛各座寶蓮制極精巧南濠集寺據山頂短垣遶門地悉甃以石寛平可坐山之勝一覽而盡帝京景物略洪光寺徑上指玉華寺再上指玉皇閣下指碧雲寺再下指宏法寺十有八盤而徑盡至寺門香山乃在其下本朝康熙中重加修葺聖祖仁皇帝御書圓殿額曰光明三昩正殿額曰慈雲常䕃乾隆十年修建靜宜園並葺此寺高宗純皇帝御書額曰香嵒淨域又寺東有碧雲寺壯麗與香山相埒乾隆十三年修有高宗純皇帝御製碑文及詩按洪光寺東有玉華寺碧雲寺北有玉皇閣宏法寺今無考宗鏡大昭廟在靜宜園外垣北亦名昭廟前後凡五殿肖衞地古式為之乾隆四十五年後藏班禪額爾德尼遠來祝靜宜園外垣建廟以居之為柔逺也釐因即高宗純皇帝御書前殿額曰清淨法智後四殿額皆御書並有御製昭廟六韻詩實勝寺在靜宜園西舊名表忠寺乾隆十四年修先是設石碉於西山之麓􅂤佽飛之士以習之為征金川計至是奏績因葺新之名曰實勝又立健鋭雲梯營並於寺之左右建屋居之高宗純皇帝御書殿額曰顯大雄力有製碑文及詩二十六年平定回部有御御製實勝寺後記及詩寺南梵香寶諦諸寺皆有高宗純皇帝宸章又乾隆二十七年巡幸五臺還御寫殊像寺文殊像而係以贊於寶諦寺旁建寶相寺肖像其中御書殿額曰旭華之閣並有御製碑文香界寺在香山迤南舊名平坡寺不知其所由始蓋古刹也本朝康熙十七年修皇帝賜名聖感有御製碑文及聖祖仁賜僧海岫詩乾隆十三年高宗純皇帝敕定今名御書前殿額曰現清淨身正殿額曰智鏡周圓有寶珠洞有御製碑文及詩寺上一里為高宗純皇帝御製詩碑山右為龍王堂其東為大悲寺有高宗純皇帝御書額又御製大悲寺詩及賜僧古梅詩十方普覺寺在香山東北之壽安山本唐兜率寺元名昭孝以窣堵波為門泉石清幽層巖夾峙殿前有二娑羅樹相傳來自西域元至治元年重建更名夀安有卧佛二一旃檀像唐貞觀中造一銅像明憲宗時造俗名卧佛寺門前有明胡濙碑本朝雍正十二年重建世宗憲皇帝賜今名有御製碑文高宗純皇帝御書額曰得大自在寺東爲五華閣普福庵今並廢按卧佛銅像雖傳成化時造而碑記未詳考元史英宗紀至治元年十二月冶銅五十萬斤作壽安山寺佛像據此則銅像爲元時所造今尚存寺内其旃檀像已無存又按朱彝尊日下舊聞以夀安山爲即五華山考陳循寰宇通志五華山即香山之分支也白雲觀在廣安門外天安寺西北金太極宫故址元改建祀長春真人邱處機本朝乾隆二十一年重修殿内恭懸聖祖仁皇帝御書額曰駐景長生又七真殿玉皇閣俱有聖祖仁皇帝高宗純皇帝御書額觀東偏爲斗姥閣聖祖仁皇帝御書額曰大智寶光邱真人殿内有木鉢一乃刳木癭爲之可容五斗内塗以金恭鐫高宗純皇帝御製詩其中都人正月十九日致酹祠下謂之燕九節觀西土阜相傳爲真人弟子潘沖和琴臺按朱彝尊日下舊聞載王惲清明日遊長春宫詩朱昆田云元之長春宫在太液池上非今之白雲觀也考李道謙甘水仙源錄元世祖命處機居瓊華島賜名萬安宫其賜名長春者乃天長觀即金之太極宫在今白雲觀西非太液池也又考仙源錄長春宗師旣逝嗣其道者尹公乃易其宫之東甲第爲觀號曰白雲據此則可知改宫爲觀之所由始而長春宫之爲金太極宫遺址無疑矣總纂官臣邵燦恭纂輯總纂官臣邱建猷恭覆輯校對官臣黄樹勲恭校恭覆校大清一統志京師三職官宗人府宗令一員宗正二員左右宗人二員左右以上並宗室王公為之府丞一員漢堂主事四員宗室二員漢二員經厯二員宗室理事官四員左右二司各二員副理事官四員左右二司各二員主事四員左右二司各二員委署主事四員左右二司各二員以上並宗室為之筆帖式二十四員宗室效力筆帖式二十四員宗室内閣大學士四員滿漢各二員協辦大學士二員滿漢各一員學士兼禮部侍郎銜十員滿洲六員漢四員侍讀學士八員滿洲四員䝉古漢各二員侍讀十六員滿洲十員䝉古漢軍漢各二員典籍六員滿洲漢軍漢各二員中書一百二十四員滿洲七十員􅀩古十六員漢軍八員漢三十員中書科稽察科事内閣學士二員滿漢各一員中書六員滿二員漢四員筆帖式十員滿洲翰林院掌院學士二員滿漢各一員於大學士各部尚書侍郎内特簡侍讀學士五員滿洲二員漢三員舊設滿洲三員乾隆五十年裁一員侍講學士五員滿洲二員漢三員舊設滿洲三員乾隆五十年裁一員侍讀五員滿洲二員漢三員舊設滿洲三員乾隆五十年裁一員侍講五員滿洲二員漢三員舊設滿洲三員乾隆五十年裁一員修撰編修檢討庶吉士均無定員典簿二員滿漢各一員孔目二員滿漢各一員待詔四員滿漢各二員筆帖式四十四員滿洲四十員漢軍四員詹事府詹事二員滿漢各一員少詹事二員滿漢各一員庶子四員左右春坊滿漢各一員洗馬二員司經局滿漢各一員中允四員左右春坊滿漢各一員贊善四員左右春坊滿漢各一員主簿二員滿漢各一員筆帖式六員滿起居注館主事三員滿洲二員漢一員筆帖式十六員滿洲十四員漢軍二員吏部尚書二員滿漢各一員侍郎四員左右滿漢各一員堂主事五員滿洲四員漢軍一員司務二員滿漢各一員繕本筆帖式十二員滿洲郎中十三員文選司滿洲三員䝉古一員漢一員考功司滿洲