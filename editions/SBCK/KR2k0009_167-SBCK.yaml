懷中印章授其從卒曰我且死若求間道以此上官賊知其無降意害之事聞贈太常少卿妻劉氏避賊死於林峒追封彭城郡君包拯合肥人知端州􅊩事明察不遺隱伏人稱神明端土産硯前守緣貢率取數十倍以遺權貴拯命製者才足貢數歳滿不持一硯歸趙師旦武城人皇祐中知康州儂智高破邕順流東下賊薄城師旦止有兵三百開門迎戰殺數十人會暮賊梢缷與監押馬貴部士卒固守城破無一人逃者矢盡與貴俱還據堂而坐智高麾兵入脅師旦師旦大罵賊怒并貴害之贈光祿少卿同時有王從政者以東頭供奉官閤門祗候與智高戰於太平場被執罵賊不已賊以沸湯沃之終不屈而死贈信州刺史郭祥正當塗人熙寕中知端州留心政術以靖蠻方民樂其化梁立則分宜人熙寕中知新州興修水利於州西南一里得白蟮坑決其水溉田民被其利呉與漳浦人元豐中知四㑹縣興學省罰有循良風李朴䖍州興國人徽宗時爲四㑹令有奸民言邑東地産金寶遂立額採買破田疇發墟墓大爲民害朴至請罷之張䕫海陽人高宗時知新州時學校自舍法罷士習委靡䕫修郡庠厚加餼廪暇日與諸生徒執經問難學者聞風而至又築陂瀦水灌田民䝉其澤稱張侯陂云王冶太原人紹興初知南恩州值歳荒發粟賑濟存活甚衆暇則詣學課勵生徒以厚風俗殁後州人立祠祀之孔元勲番禺人父粹熙寕中知封州有善政元勲於紹興中復知封州值寇亂薄城率屬力守每事以身先之募善射士連斃賊酋餘黨奔潰轉知新州撫字有聲黄公度莆田人紹興中通判肇慶府復攝南恩守尤留心學校增學廪擇秀民與之登降揖讓士風大振邦人肖像以祀黄濟靜江人紹興中新州守時多盜賊濟令種刺竹圍城一千三百餘丈又新子城樓興利􅀘弊户口覈實賦役均平民以不擾胡寅為記稱其政績甚詳留正永春人紹興中陽江尉先是邑之下田木折錢深為民病正白於漕司請罷之時龔茂良守番禺正語之曰在法劫盜贜滿五貫死海盜加等小民餌利率身陷重辟請鏤梓海上使戸知之民始知避劉爚建陽人孝宗時知德慶府大修學校奏便民五事乂嘗奏罷兩縣無名租錢李維泉州人淳熙時守南恩弟綸提舉廣東常平酌别江濬兄弟相朂以清白矢言曰儻員君民有如此水投杯於江杯停不流者久之民為作歌冷􅀿澂分寕人景定中知德慶府前守政不立縱豪吏漁獵峒獠遂大為變偪城六十里而營應澂未入境馳檄諭之獠感悟欲自歸惑謀主不果衆稍引去應澂知其􅀔解即厲士馬出不意一鼓擒之乃請諸監司誅豪吏之潡禍者初屬縣租賦諉道阻久不至郡應澂為之期曰首輸者與減分末至則償所減民惟恐後不一月訖事凡諸綱官廪稍軍券前政積不得者悉補還之上下欣附應澂亦極力摩撫與為簡便期年報政奏罷抑配鹽法及乞用楮劵折銀綱等五事以紓民力詔就升本道提舉常平兼轉運使元高芝濟南人大德中知新州愛民禮士修整學校嘗於驛路栽松以便行人風流善政久而猶存倉振真定人延祐中知新州時猺賊蠭起振諭以威福羣猺帖然暇日名諸生講解經義又於驛路夾植松榕先是高芝守新州有善政及振繼之故州人歌曰高松倉榕一道清風韓元善太康人為新州判官明達政體明裴源籍未詳洪武初肇慶府經厯以公事赴新興遇山賊執之脅使跪不屈遇害贈官二等梁潛泰和人洪武中知四㑹縣縣有瀧橋河相傳吏廉平則水清自潛至迄去河水澄清可鑑改陽江又調陽春猺獠環處潛待之如子民皆盡誠供命每去任無不遮道攀留徐均籍未詳洪武中為陽春主簿以强直知名猺洞酋莫大老家居不法均廉得其實捕繫獄以金珠餽均不一視械送之府民猺懾服顔寶龍溪人永樂中知四會縣寛猛得宜奏除詭名田糧九百石克鹽鈔十二萬貫王瑩鄞縣人宣德中知肇慶府興利除弊切於愛民於獄訟尤矜恤民皆頌之饒秉鑑廣昌人景泰中為肇慶府同知時兩廣多盜秉鑑什伍其民日加訓練盜侵軼其境輙破走之奸民羣聚為亂秉鑑單􅀐譬曉即時解散以征瀧水猺功増秩一級黃瑜臨桂人天順中知肇慶府時蒼梧鎮未建猺寇猖獗堬練民兵城屬邑曉示諸蠻許自首服境内􅀗安在任十五年剔蠧釐好政無不舉士民戴之黄瑜南城人天順中為開建知縣邑無城嘗有寇患瑜改建甎城親挾弓矢禦寇邑賴以安范鑣㑹稽人成化中知封川縣始至家僮治圃得遺金亟掩之縣猺獞雜居鑣孚以恩信慈惠邑以不擾黄琥豐城人宏治初知肇慶府府舊有漁利三百緍以供守土中貴琥奏罷之積粟備荒至萬餘石又築隄二百里以捍潮㝷擢廣東叅政張吉餘干人宏治中為肇慶府同知地當蒼梧下流仍歳苦澇吉築長隄三載乃成甚為民利總督秦紘為總兵官柳景所誣被逮吉抗疏代辨紘卒得白時議壯之蕭棟宣化人嘉靖初知高要縣廉明莅衆愷悌作人舊志稱卨要賢令以棟爲最林恭章莆田人萬厯中知陽江縣以教化爲光每至折獄多哀矜盛暑必躬閲囚日夕存恤及去任泣送者塞道韓國藩江寕人萬厯中知高明縣公平廉介市無奸宄獄無繫囚本朝鮑之竒浙江人順治七年以明經知恩平縣縣先爲賊據遂即任於凹頭村單騎入城宣布德政賊憚之竒得民殺之祀名宦張至隆漢軍鑲紅旗人康􅄉三十二年知肇慶府郡當牂牁下流歳三四月西流􅁀漲豐樂長圍一決其害更甚至隆親駕小舟躬先負土日夜督率隄以永固黄江厰税胥吏多横索至隆悉裁抑之商民立碑記焉蘇浵汲縣人康熙五十九年知陽春縣民毎以假命誣人動至傾家浵重懲反坐其弊得息辛丑三月偶旱奸民倡亂搶奪立治其魁餘黨消散奉檄丈田不事紛擾民立生祠祀之張國誠舒城人康熙進士十三年授高明令視民如子甫下車遇隣寇恣擾國誠請兵滅賊安全甚衆在任二年辭職去攀轅者不絶於道卒祀名宦鈕琇呉江人康􅄉三十七年知高明縣縣境曹暮鹿峒諸山羣盜出没琇招致盜魁二十四人請於上官使守禦贖罪由是諸盗斂跡邑賴以安尤好奬勵士􅀋設義塾教之爲課其甲乙士皆振拔至今頌之黃大鵬上元人知平遠縣雍正十年析置鶴山縣以才調任始至無城郭􅅟署僑止土屋百務蝟集悉心區畫其年冬築城明年建學宫立祠廟創官署邑故盜區也民流亡田汙萊攘除安集襁至者如市請豁雙橋都墟賦四百餘兩并積年逋賦一千九百有竒邑人就雙橋立祠祀之郭大鐸旌德人任鶴山縣藥逕司巡檢乾隆三年夏霖潦颶風衝擊古勞圍址幾陷大鐸披笠冐風雨率鄉人力禦之卒無虞上官嘗因私繫人大鐸亷其無辜輒釋去卒於官貧不能斂民醵金助之有十數人襄糧送櫬至庾關而後返者人物漢陳元字長孫廣信人傳父欽業習左氏春秋建武初與桓譚杜林鄭興俱爲學者所宗時議立左氏傳博士范升奏以爲淺末不宜立元乃詣闕上疏爭之與升辨難凡十餘帝卒立左氏學後辟司空李通府大司農江馮上言宜今司􅀠校尉督察三公元又上疏以為不宜帝從之後以老病击卒於家三國呉士爕字彦威廣信人少遊學京師師事潁川劉子竒台左氏春秋察孝廉補尚書郎後舉茂材除巫令遷交趾太守燮體器寛厚謙虚下士中國士人避難往依者以百數是時道路阻絶夑不廢貢職後建安十五年孫權遣步騭為交州刺史燮率兄弟奉承節度變耽玩春秋為之注解時人稱其學問優博達於從政處大亂之中保全一郡二十餘年人􅀩其慶雖竇融之保河西何以加之唐何如瑛新興人從江右觀察便李勉為折衝都尉以平盜功遷左威將軍充桂州防遏使吕太一之亂􅁬勇先登擒其禆將嶺表遂平及楊慎徾代勉如瑛以讒死後觀察使徐浩為訟冤代宗下詔褒贈厚恤其家莫宣卿字仲節封川人大中五年對䇿第一授台州别駕以母老乞歸養賜其鄉名錦衣云五代南漢陸光圖四㑹人劉鋹時為郴州刺史撫恤窮民招輯士卒境賴以安及宋師來伐光圖樹柵􅀐田嶺以拒之㑹大雨黄溪水瀘潘美順流破其柵遂取郴州光圖與大將暨彦斌力戰敗績被執抗罵不屈俱死之宋李英字子厚高要人天聖中同學究出身厯任欽州推官夏人攻城陷之一家死者十三人贈比部郎中錄其子弟梁順孫字景樞高要人元豐問厯桂州觀察判官監邕州横山田州等峒金坑撫以恩信不較其金諸酋長聽服歸之如市州人徳之卒於官詔官其一子李積中四㑹人元豐進士厯官御史以直言入元祐黨籍綦母慮字深之高要人宣和五年提舉廣東西路茶鹽事再除轉運判官奏令税户買町户鹽田依原竈額送納由是歳額無虧町戸復業譚惟寅字子欽高要人紹興進士讀書一覽终身不忘嘗夜入衢州祥符寺閲古碑待燭不至以手摸之歸錄所記不差一字後官至江西提刑李大性字伯和積中子以父任入官累遷太府寺丞時陳傅良彭􅀛年等以直言相繼去國大性抗疏論諫遷户部尚書朝議將用兵於金大性條論利害忤輯􅇑冑遂出外尋引病丐祠卒於家贈開府儀同三司諡文惠明李質字文彬徳慶人元末兵起質募民二萬餘保障鄉里洪武􅀄同何真歸附授中書省斷事累官刑部尚書斷獄平恕出為浙江行省參政有惠愛终靖江王府右相質好書史其文學為時所稱梁軫高要人永樂中由鄉薦授御史肅清風紀巡按直隸有指揮抵法餽以金珠不受按湖廣劾臬司匿賊及武臣不法事後為忌者所中謫雲南典史陳鼎字重器新興人永樂進士擢監察御史宣徳中出知建昌府蒞政明斷民不敢欺升右僉都御史進刑部右侍郎留心刑獄務崇矜恤卒於官賜祭葬梁致育字遂初高要人洪武中鄉薦為紹興建昌訓導致仕家居天順二年流賊掠蓮塘被執令講書厲聲罵曰蠻奴若曉禮義必不為此時年九十有六賊不忍害以竹輿舁之行語舁者曰至徑口深淵即白我遂投淵死時有楊楚者高明人素負氣聞之曰梁先生人望也率衆往救戰不敵亦死葉禎字夢吉高要人宣德中舉於鄉任慶遠府同知天順三年賊至指揮與知府方酣飲禎獨督兵抵㧕青鋪遇賊力戰不勝與子公榮從子官慶民兵璩用和等三百人俱死之事聞贈朝列大夫廣西布政司右叅政詔立忠義祠祀之盧宅仁字伯居四㑹人宏治進士授都水主事時劉瑾專權有所需同列皆曲徇宅仁獨不應厯福建廣西桉察使善決冤獄以父憂歸終喪遂不起李津字濟之四㑹人宏治進士知寕海州時劇賊劉七流劫本境津先繕守備夜遣卒四出張疑兵以懼之賊遂引去擢南京刑部郎中厯守南寕鄖陽俱有治績遷兩淮都轉運使搜剔釐正一裁以法國課倍昔而羡餘悉歸於公爲權貴所忌罷歸南海呉允禎繼任亦以廉介稱每自訟曰得母愧吾鄉濟之否其爲人敬服如此區益字叔謙高明人少力學博覽羣籍嘉靖中由鄉薦厯都昌泰順知縣皆有惠政遷慶遠同知從征古田賊有功改温州以抗直忤上官歸益生平孝友清廉自持去官篋無長物子大樞萬厯中舉於鄉大相大倫並萬厯進士大相官中允大倫擢御史以諫神宗不親郊祀坐削籍里居後起爲光祿丞厯南京户部右侍郎爲魏忠賢所忌罷歸卒嚴相字汝弼高明人嘉靖間厯興安荔浦知縣厲清操三十年賊掠豸岡戒曰母入嚴荔浦家莫如士字子元恩平人嘉靖進士厯官監察御史端直敢言嘗竒張岳翁萬逹有用世才遂疏薦之後俱以功業顯仇鸞將為不利劾之㑹鸞病卒復偕臺省諸臣追論其罪直聲動海内遷大理丞理冤決滯人以為有于公風羅成功字惟一高要人萬厯舉人崇禎時為永平推官時兵餉叢􅄂成功綜核廉平三輔􅀝以為重城破自縊死乾隆四十一年賜謚節愍陳立字子綱德慶人父宗錫以事之遼不返立七歳自知讀書後告其母曰父久去不訪天地一罪人也襄糧書情狀於背至開平中屯衛一父老攜至家出其父遺稿因􅀗殯所齧指滴血負歸本朝蘇􅀿夢新興諸生順治七年值賊亂􅀿夢率勇敢士殺其魁里黨藉以安全雍正六年祀忠義祠江子勉陽春人順治七年白毛氊賊為亂挾子勉使呼陽春縣城佯􅀿之及金雞岡賊藏伏令呼北門乃大呼我後皆賊伏從幸固守我不以一身誤衆人城􅀗全遂為賊害龔􅀿霖四㑹舉人嗜學甘貧獨傳横渠之學知寕鄉縣創書院設義學内擢給事中疏請舉人准考中書厯陳學政叢弊卒祀鄉賢甘怡新興諸生康熙十四年邑為盜騷擾怡奉父母奔匿山谷晝伏夜出母病􅈼天請代及殁哀毁骨立廬墓三年父喪亦如之友于兄弟雍正四年舉孝子建坊卒祀孝弟祠李苑芝新興人長大有膂力豪俠好義因地方多故破家募士衛鄉里康􅄉十四年偽逆寇新興逕口寨貢生陳桐遷告急苑芝以衆至大呼曰八老在誰得至此賊方縱火焚樓急擊滅火救出男婦甚衆復追賊中礮死賊亦大創不敢復犯逕口至今人稱李義士不衰顧天顯新興諸生由教習任廉州府教授訓育英髦粹然師範滇逆之變被擒不屈篤於友愛置宗祠義田卒祀忠孝祠劉啟銘陽春貢生㓜失怙事母孝友于兄弟教子弟以禮法䰞田供祭施槥成梁康􅄉六十年祀鄉賢蔡廷標高要人官督標右營把總雍正十三年隨征貴州古州苗連破高婆高表色同清江八妹九董各寨奮不顧身㑹病將領今其少休對曰等死耳裹馬草不愈於斃床策乎馳入敵賊攢矛刺之鉛子如雨洞其袴復瞋目大呼斬一人賊辟易乃還病益甚遂卒同官有藍文彩亦高要人勇與廷標埒並積勞成病先後没事聞均􅀩恩􅄻李震時新興諸生性孝友館榖養親善事後母誨育諸弟雍正六年祀孝弟祠鄭獻圖恩平貢生有志畧邑多土寇獻圖密訪賊中虛實及出没要隘上􅁹賊策於當事賊聞惡之攻殺獻圖卒祀鄉賢莫愈光陽江人春江協把總乾隆五十三年隨征安南陣亡同邑陳志勇為香山協把總出洋捕盜溺於海均于邮廕何曰佩德慶人乾隆進士由檢討官大理寺少卿久居臺誎有鐵面御史之稱嘉慶二十一年祀鄉賢祠彭朝勝陽江人署香山協守備嘉慶十四年岀洋緝盜陣亡同邑外委雷常振亦死之均予邮廕岑現佩德慶人官貴州提標右營守備嘉慶三年隨征川匪陣亡事聞䘏􅄻流寓唐張柬之襄陽人神龍二年武三思誣與王同皎謀逆貶新州司馬後流瀧州劉幽求武彊人睿宗時為尚書右僕射謀誅太平公主事泄流封州太平既誅即日召復舊官郭元振貴鄉人先天二年以兵部尚書同中書門下三品封代國公明皇講武驪山坐軍容不整流新州宋劉摰東光人哲宗時官尚書右僕射紹聖四年陷邢恕之議貶鼎州副圑練使新州安置惟一子從家人涕泣願侍皆不聽至數月以疾卒余爽分寕人元祐末章惇憾其不附已以瀛州防禦推官除名竄封州崇寕中入黨籍鄒浩晉陵人哲宗時為右正言章惇用事浩上章劾其慢上不忠之罪不報賢妃劉氏立浩言天子為天下擇母所立安得不審章惇詆其狂妄乃削官覊管新州胡寅崇安人紹興初為中書舍人秦檜當國責授果州團練副使新州安置即日就道在謫所著讀書管見數十萬言及論語詳説行於世胡銓盧陵人紹興中為樞密院編修秦檜決策主和銓抗䟽言檜可斬乃除名編管新州周勣閩人張浚帥福建辟勣幕官時趙鼎貶潮州人莫敢相顧勣為挈家寓居福之外邑坐貶封州鄭剛中金華人紹興中為四川宣撫副使秦檜怒其在蜀專權罷責桂陽軍居住再責濠州團練副使復州安置再徙封州卒列女唐文貞女四㑹人許嫁鮑生貞元三年生斃於虎女匍匐赴喪服衰三年事公姑甚謹邑人名其所居為貞里宋李以達妻陳氏開建人少寡無子父母欲奪其志慟哭引刀自誓乃止元李從輪妻梁氏恩平人元末賊掠舉家被害與妾麥氏被擄至舟中賊欲犯之大罵相繼赴水死又同縣吕師賢妻楊氏亦以寇刧赴水死明陳鼎妻鄧氏新興人以鼎貴封淑人正統問流賊犯新興被掠使之跪大罵曰我為命婦顧屈滕於賊耶遂遇害劉英妻彭氏德慶人名亞光天順問流賊攻城時翁夫俱在外姑屬亞光曰吾老不能去汝亟去之亞光曰姑在此婦何之寇至亞光出財物求脱寇悦其色并姑繫之亞光紿之曰姑老且病若欲我去當釋我姑賊信之見姑去遠乃以頭觸石流血被面自投於河寇援之起罵不絶口遂遇害張寅妻蘇氏開平人景泰􅀄黄蕭養賊黨周三為亂寅全家被殺睨氏美獨留大罵赴水而死林相妻歐陽氏四㑹人生子世遠而相卒或諷以他適氏矢節甚厲撫世遠成進士宏治二年旌蘇州王鏊為立傳蕭秀清新興人蕭能女正德間為賊所掠其父往贖女私謂父曰速懷金以歸賊必不釋我我必死不辱父潛去賊逼之秀清觸石流血賊怒殺之汪英妻鄧氏陽春人正徳中西山賊攻城執鄧不屈罵賊而死陳積祿妻鍾氏高要人嘉靖中浪賊入境積祿被執鍾冒刃往救􅀗脱賊因執鍾氏强欲犯之厲色罵曰吾有死而已決不􅠭辱賊怒斷其臂而死時年二十有二提學副使蔡克廉旌其門梁立妻麥氏陽江人嘉靖中為賊所得不辱遇害同時有鄭念雲女亦以罵賊死馮氏二女高明人馮麗女年二十麗弟華女年十六俱未字嘉靖中浪賊攻寨麗妻李氏謂二女曰賊􅀔大盛奈何二女曰被辱求活亦復何顔李氏躍身入井二女相繼俱死之黎輔妻梁氏高明人夫亡無子紡績以供舅姑嘉靖中浪賊流刼梁扶姑匿池側遇賊將執之梁出其不意推賊入池賊怒亂刃殺之莫疑妻朱氏恩平人疑為錦衣衛中所總旗卒於京邸朱氏守節撫􅀌如善無異嚴父嘉靖十九年旌後如善成進士官兗州知府又庠生杜拱陽女許字同里高氏子夫殤斷髮自誓往哭成服止夫家事舅姑後夫族奪其贍田一不與較守節終身李䕫