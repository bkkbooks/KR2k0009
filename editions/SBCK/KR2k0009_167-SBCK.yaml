front:
  text: 大清一統志肇慶府在廣東省治西二百九十里東西距四百九十里南北距七百七十里東至廣州府三水縣界九十里西至廣西梧州府蒼梧縣界四百里南至海岸四百七十里北至廣西梧州府懷集縣界三百里東南至廣州府新會縣界三百二十里西南至高州府電白縣界五百三十里東北至三水縣界二百五十里西北至廣西平欒府賀縣界四百六十里自府治至京師七千四百二里分野天文牛女分野星紀之次建置沿革禹貢揚州南徼春秋戰國為百越地秦為
