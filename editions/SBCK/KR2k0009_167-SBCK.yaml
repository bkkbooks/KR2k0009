body:
  text: 南海郡地漢為蒼梧郡南海郡合浦郡屬地元鼎六年平南越置蒼梧郡領縣十内有高要端溪廣信封陽四縣又南海郡之四㑹合浦郡之高涼臨允皆今郡屬三國呉分屬廣交二州晉因之宋永初二年改屬南海郡齊因之梁大同中置高要郡隋平陳廢郡開皇九年置端州府志開皇九年省高要郡為縣置端州大業初改州為信安郡唐武徳四年復曰端州見元和志舊唐書地理志作元年天寶元年復曰高要郡乾元元年復曰端州咸通三年屬嶺南東道五代屬南漢宋初仍曰端州高要郡屬廣南東路元符三年置興慶軍節度重和元年升為肇慶府元曰肇慶路屬廣東道元史地理志至元十六年隸廣西十七年仍屬廣東道明洪武元年復曰肇慶府屬廣東布政使司本朝順治六年析廣州之新會縣及新興恩平二縣地增置開平縣雍正十年析新會開平二縣地增置鶴山縣共領州一縣十二高要縣附郭東西距一百七十里南北距一百六十里東至廣州府三水縣界九十里西至徳慶州界八十里南至高明新興兩縣夾界四十五里北至四會縣界一百十五里東南至高明縣界五十里西南至羅定州東安縣界一百里東北至四會縣界九十里西北至廣寕縣界一百四十里漢置高要縣屬蒼梧郡後漢及晉因之宋改屬南海郡齊因之梁為高要郡治隋平陳為端州治大業三年為信安郡治唐復為端州治五代因之宋為肇慶府治元為肇慶路治明為肇慶府治本朝因之四會縣在府東北一百三十里東西距一百二十里南北距一百三十三里東至廣州府三水縣界六十里西至廣寕縣界六十里南至高要縣界一十三里北至廣寕縣界一百二十里東南至三水縣界七十里西南至高要縣界二百里東北至廣州府清遠縣界九十里西北至廣寕縣界一百六十里漢置四會縣屬南海郡後漢及晉因之宋元嘉中改屬綏建郡齊以後因之隋大業初還屬南海郡唐武徳五年于縣置南綏州貞觀八年更名湞州十三年州廢屬廣州宋重和元年改屬肇慶府元屬肇慶路明屬肇慶府本朝因之新興縣在府南一百三十里東西距一百二十里南北距一百二十里東至鶴山縣界七十里西至羅定州東安縣界五十里南至恩平縣界七十里北至東安縣界五十里東南至開平縣界七十里西南至陽春縣界八十里東北至高明縣界五十里西北至東安縣界二十里漢置臨允縣屬合浦郡後漢因之三國呉改屬蒼梧郡晉初因之東晉永和七年置新寕郡又置新興縣與臨允皆屬焉宋因之齊更縣名新城梁復名省臨允入移新寕郡來治兼置新州隋平陳郡廢大業初州廢屬信安郡唐武德四年復置新州天寶元年改曰新興郡乾元初復曰新州屬嶺南道宋曰新州新寕郡屬廣南東路元至元十六年置新州路總管府十九年降為散州屬廣東道明洪武初廢州以新興縣屬肇慶府本朝因之陽春縣在府西南三百二十里東西距一百八十里南北距一百七十里東至陽江縣界九十里西至高州府電白縣界九十里南至陽江縣界五十里北至新興縣界一百二十里東南至陽江縣界一百二十里西南至高州府茂名縣界二百五十里東北至新興縣界九十里西北至羅定州東安縣界一百七十里漢合浦郡高涼縣地晉分置莫陽縣屬高興郡太康後屬高涼郡宋齊因之梁改置陽春郡陽春縣隋平陳郡廢屬高涼郡唐武德四年于縣置春州天寶初曰南陵郡乾元初復曰春州屬嶺南道宋初因之大中祥符九年并入新州天禧四年復置􅄉寕六年廢春州以縣屬南恩州元因之明洪武初改屬肇慶府本朝因之陽江縣在府南四百四十里東西距二百五十里南北距九十里東至恩平縣界九十里西至高州府電白縣界一百六十里南至海三十里北至陽春縣界六十里東南至廣州府新寕縣界九十里西南至高州府電白縣界一百四十里東北至恩平縣界九十里西北至陽春縣界六十里漢置高涼縣屬合浦郡後漢建安二十五年孫權置高涼郡又分高涼置安寕縣爲郡治晉因之宋省高凉縣移郡治思平以安寕屬馬齊復來治梁大通中置高州改縣曰高涼隋平陳郡廢大業二年州廢復爲高涼郡治蕭銑時又分高涼置陽江縣唐武德四年復曰高州兼置總管府五年改高涼曰西平貞觀二十三年府州及西平縣俱廢以陽江縣屬恩州大順二年移恩州治陽江宋亦曰恩州屬廣南東路慶厯八年曰南恩州元至元十七年改南恩州爲南恩路總管府十九年降爲散州屬廣東道明洪武二年廢州以縣屬肇慶府本朝因之高明縣在府東南七十里東西距一百二十里南北距四十里東至廣州府南海縣界五十里西至新興縣界七十里南至鶴山縣界二十里北至高要縣界二十里東南至鶴山縣界四十里西南至新㑹縣界五十里東北至高要縣界四十里西北至高要縣界五十里漢蒼梧郡高要縣地晉置平興縣屬新寕郡尋省宋元嘉十八年置宋􅄉郡二十七年更名宋隆析高要置平興縣孝建中復郡名宋􅄉齊建元三年仍改宋隆俱治平興縣隋平陳郡廢以縣屬信安郡唐屬端州五代因之宋開寶五年省入高要重和元年屬肇慶府明成化十一年分置高明縣屬肇慶府本朝因之恩平縣在府南二百七十里東西距一百五十里南北距一百七十里東至開平縣界五十里西至陽春縣界一百里南至陽江縣界七十里北至新興縣界一百里東南至海八十里西南至陽江縣界七十里東北至新興縣界一百二十里西北至新興縣界八十里漢合浦郡高涼縣地三國呉置思平縣屬高涼郡晉因之劉宋時移郡來治南齊徙郡治安寕縣仍屬焉尋改縣曰齊安兼置齊安郡隋平陳郡廢開皇十八年改縣曰海安仍屬高涼郡唐武德五年復曰齊安屬高州貞觀二十三年于縣置恩州天寶初曰恩平郡至德二載改縣曰恩平乾元初復