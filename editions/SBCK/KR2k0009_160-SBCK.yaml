  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_160-1a}
body:
  text: 邵武府在福建省治西北六百七十里東西距二百六十里南北距一百八十里東至延平府順昌縣界一百二十里西至江西建昌府新城縣界一百四十里南至延平府將樂縣界一百十里北至建寕府建陽縣界七十里東南至將樂縣界一百四十里西南至汀州府寕化縣界三百四十里東北至建陽縣界六十里西北至建昌府新城縣界一百六十里自府治至京師五千七百五十七里分野天文牽牛須女分野星紀之次建置沿革禹貢揚州之域周七閩地後屬越秦為閩中郡地漢為㑹稽郡冶縣地後漢為㑹稽南部都尉地三國呉永安三年分置昭武綏安二縣屬建安郡晉太康三年改昭武為邵武尋又改邵陽義熙元年改綏安為綏城宋永初元年仍改邵陽為邵武齊梁因之隋開皇九年並廢十二年復置邵武縣屬臨川郡唐武德三年復置綏城縣與邵武並屬建州貞觀三年省綏城縣五代屬王閩宋太平興國五年置邵武軍屬福建路元至元十三年升邵武路明洪武元年改邵武府屬福建布政使司本朝因之屬福建省領縣四邵武縣附郭東西距一百九十里南北距一百四十里東至延平府順昌縣界一百二十里西至光澤縣界七十里南至泰寕縣界七十里北至建寕府建陽縣界七十里東南至延平府將樂縣界一百四十里西南至泰寕縣界一百二十里東北至建陽縣治六十里西北至光澤縣界五十五里灘冶縣地後漢末爲建安縣地三國呉永安三年置昭武縣屬建安郡晉太康三年改曰邵武太寕元年又改曰邵陽劉宋永初元年復曰邵武齊梁因之隋開皇九年廢十二年復置屬撫州大業初屬臨川郡唐武德七年改屬建州五代晉天福初王閩復改曰昭武漢初復故宋太平興國五年於縣置邵武軍元爲邵武路治明爲邵武府治本朝因之光澤縣在府西北八十里東西距九十五里南北距一百五十里東至邵武縣界二十五里西至江西建昌府新城縣界七十里南至邵武縣界十里北至江西廣信府鉛山縣界一百四十里東南至邵武縣界八十里西南至泰寕縣治一百六十里東北至邵武縣界七十五里西北至建昌府新城縣治一百二十里漢冶縣地晉以後爲邵武縣地宋太平興國六年分置光澤縣屬邵武軍元屬邵武路明屬邵武府本朝因之建寕縣在府西南二百十里東西距一百十里南北距一百十五里東至泰寕縣界三十里西至江西建昌府廣昌縣界八十里南至汀州府寕化縣界六十五里北至建昌府南豐縣界五十里東南至寕化縣界六十里西南至寕化縣界一百里東北至建昌府新城縣界八十里西北至南豐縣六十里漢冶縣地三國呉永安三年析置綏安縣屬建安郡東晉義熙元年改曰綏城宋齊因之隋開皇中省入邵武唐武德四年復置屬建州貞觀三年仍省入邵武垂拱四年爲將樂縣地宋建隆二年南唐分置建寕縣屬建州太平興國五年改屬邵武軍元屬邵武路明屬邵武府本朝因之泰寕縣在府西南一百四十里東西距一百十里南北距一百二十里東至邵武縣界七十里西至建寕縣界四十里南至延平府將樂縣界四十里北至邵武縣界八十里東南至將樂縣治一百二十里西南至汀州府寕化縣界一百里東北至邵武縣界七十里西北至建寕縣界五十五里漢冶縣地東晉以後爲綏城縣地隋爲邵武縣地唐爲將樂縣地五代周顯德五年南唐分置歸化縣屬建州宋太平興國五年改屬邵武軍元祐元年改曰泰寕元屬邵武路明屬邵武府本朝因之形勢前據重岡後帶鹿水甌閩之西户宋胡寅軍治記東抵富沙西抵旴江南抵臨汀北抵廣信三峯峙其南一水界其北居四州之上游其土夷曠其勢蜿蜒抱負如在碧玉環中地狹山多田高下百曡宋郡志風俗人性獷直尚氣治生勤儉力農重穀宋郡志喜以儒術相高所至村落皆聚徒教授家有餘財則輕齎健往賈售他州郡志其俗儉嗇安於食稻而茹蔬閩書人尚理學彬彬乎道德文物有鄒魯遺風武陽志城池邵武府城周十一里一百六十六歩門四濠東西南深一丈五尺有奇北臨大溪廣四十二丈元至正十二年建本朝順治五年修康熙六年雍正九年嘉慶十八年重修邵武縣附郭光澤縣城周三里二百二歩門四水門四明嘉靖三十九年建本朝康熙五年修雍正六年乾隆十四年嘉慶十八年重修建寕縣城周四里一百四十六歩門六水門四宋咸淳二年建本朝康熙五年修乾隆八年十三年十八年重修泰寕縣城周三里三百三十八歩門四三面距河明嘉靖中建本朝乾隆二十四年修學校邵武府學在府治南樵溪五曲之上舊為樵溪書院明洪武二年改建本朝康熙十五年重建雍正七年修乾隆十一年重修入學額數二十名按樵溪書院舊在城東門外宋景定中知軍事錢謙孫建以祀丞相李綱元時移此邵武縣學在縣治南九龍觀故址宋紹興中建本朝康熙四年修雍正三年乾隆十九年重修入學額數二十名光澤縣學在縣治孝感坊元至正六年建於縣城外東南明萬厯十二年遷建今所本朝康熙四年修乾隆二十一年重修入學額數八名建寕縣學在縣治南宋嘉祐中建明天啟五年重建本朝康熙九年修二十一年乾隆六年重修入學額數十五名泰寕縣學在縣治西宋慶元中建於罏峯山麓明萬厯中遷建今所本朝康熙五十一年重建雍正八年修乾隆七年重修入學額數八名邵武書院在府城西市魁善坊本朝雍正十三年知府任煥建九曲書院在邵武縣治寶嚴坊舊在功德坊邵公祠内明萬厯間建本朝乾隆二十年移建今所杭川書院在光澤縣治汀洲倉舊址本朝乾隆二十六年縣令王瑤建濉川書院在建寕縣北門本朝乾隆二十年建三賢書院在泰寕縣治鼔樓西本朝康熙四十八年建乾隆三年重建按舊志載福山書院在邵武縣三井􅡉明正德十五年郡守張羽建白渚書院在邵武縣舊稅課司明嘉靖十二年縣令曹察建崇賢書院在邵武縣下水寨明嘉靖十二年建雲巖書院在光澤縣南三里雲巖山工宋李方子講學之所元天厯二年建崇仁書院在光澤縣北十五里崇仁市元至正二十三年邑人龔永建雲谷書院在建寕縣南宋待制俞豐讀書之所後致政歸改為雲谷書院南谷書院在泰寕縣南五里宋鄒應龍休官時所居謹附記户口原客人丁一十一萬九千五百七十七今滋生男婦大小共六十三萬九百九十七名口計一十一萬五千九百五十户又屯民男婦共七千四百八十二名口計三千六百八户田賦田地九千三百三十三頃三十八畝一分有奇客徵地丁正雜銀八萬一千二百二兩二錢二分二釐米一萬二千二百七十七石八斗三升二合三勺屯田一百八十三頃九十畝九分一釐有奇額徴丁糧銀二千一百五十兩五錢四分六釐米一十九石三斗六升二合六勺山川石峽山在邵武縣城東有南北二山互抱若龍盤然丹臺山在邵武縣東一名靈臺山相傳隋盧真人唐樊真人宋支離子黄希旦皆煉丹於此元黄鎮成有詩雞鳴山在邵武縣東二十五里方輿勝覽宋開寶初盧絳叛入閩人不知避夜半忽山頂雞鳴人皆起而賊適至遂得免害因以名山三臺山在邵武縣東五十餘里與建陽縣接界自武夷磅礴而來上有三級如臺故名一名楊源山天湖山在邵武縣東八十里上有兩湖不涸雲巖山在邵武縣東九十里高岀羣岫俯瞰長川其中有巖吞吐雲氣故名又光澤縣南三里亦有雲巖山龍鬚山在邵武縣東一百十里周三十里接建陽順昌二縣界多産藥品每冬則燕子羣聚其上約以萬數白水山在邵武縣東一百二十里山勢高聳上有瀑布泉飛流數十丈入下黄溪對峙者有九臺山亦有瀑布泉天池山在邵武縣東一百二十里山高大而頂寛平有池方廣數畝冬夏不涸密溪出此浮潭山在邵武縣東南二十五里一名老君山三峯聳秀相近有鶴冲山鶴冲溪出焉寶山在邵武縣東南一百六十里舊産鐡鑛相接者曰東山高百餘丈上有瀑泉福山在邵武縣南舊名鷲峯疊嶂相連又名腰帶山高蟠山一名高㜑山在邵武縣南三十里旁有高㜑嶺一名風門嶺東通道峯南通泰寕縣上有風洞深不可測時有風出其中南午山在邵武縣南三十里山有三峯俱當午位與郡治相對故名又名葉寮山道峯山在邵武縣南少東六十里跨泰寕縣及延平府將樂縣界舊名道人峯方輿勝覽在邵武縣南八十里􅀒長溪面樵水秀峙於數十里外其險處名曰羅漢峯舊志周八十里危峯峭拔矗入霄漢為羣山冠中有池不涸側有羅漢巖深數丈俯視羣山出其下明周文通有詩七臺山在邵武縣南一百五十里方輿勝覽在縣東百里上有七級峯巒相比故名舊志南跨將樂北接順昌高二十餘里上有七臺前有洞曰百花洞泉石皆竒勝有水下入桃溪明呉國倫有詩樵嵐山在邵武縣西少南十里一名金蓮峯宋右正言孫諤居此一名三諫山俗名鍾家岐樵溪水出焉潭山在邵武縣西南四十餘里平疇中一名古山白渚溪出焉錦嶂山在邵武縣西南六十里端平蒼翠望之如玉几然一名覆船山中有七寶坑其泉清冽閩書有兩錦嶂山具一山陰界光澤雲錦山在邵武縣西南八十里有三十六峯殊山在邵武縣西南一百里雙峯聳立直插雲霄亦名文筆山泰和溪出此西為桃花嶺其植多竹可製為􅁓其前為小殊山視珠山雖小而竒峻更勝潮魚山在邵武縣西南百里殊山之西三峯鼎立旁有飛猿嶺翠雲山在邵武縣西南一百二十里上有石泉明初張三丰居此登高山在邵武縣西嵯峨聳峙下瞰城郭為􅀖人歳時遊觀之地舊志謂之熙春山以上有熙春臺也少南為金鼇山俗名西塔山龍湖山在邵武縣西五十里絶頂有湖溉田三萬餘頃相傳有老蛟穴其中舊志在縣西北三澗溪出此天馬山在邵武縣西北六十里山勢如天馬從空而下一起一伏周十餘里元黄清老有詩雞籠山在邵武縣西北六十里以形似名南為玉龍峯泉山在邵武縣東北十五里山之麓曰􅀩谷谷口僅容單騎循澗而入中深邃平曠有田數頃澗水曲折山勢環抱宋黄中築室居此愛其泉石名曰蒙谷相近又有旱山上有田數頃仙亭山在邵武縣東北三十五里諸山環列挺然特秀山巖深􅃉中有龍湫管蜜山在光澤縣西南六十里山深而磅礡縣之主山也上有兩峯相望前後皆石壁中有巖曰洞光巖横闊數丈餘石螺山在光澤縣西北八十里兩山相合大石犄角對峙溪上曰石門僅通單􅀐有石如獅子昂踞溪中旁有石如螺其水奔激至水口入西溪大和山在光澤縣西北一百二十里與江西瀘溪縣接界上有鐵牛嶺舊置􅀜於此相接者曰小和山舊置大寺寨巡司於山上交椅山在光澤縣北山形九巘為縣治屏障昂山在光澤縣北一百二十里高峻峭拔烏君山在光澤縣東北十五里寰宇記在邵武縣西北百里高二千二百丈秦漢之代有徐仲山者於此遇仙妃假烏皮為羽飛走上下山上有五雲樓舊志一名烏珮山頂有兩石各高二十丈俗稱雙石筍元江通有詩相接者曰烏石嶺高二千六百六十丈有奇東山在建寕縣東門外一名何山少東北瀕溪曰平山山形如􅀛其巔平坦可容百餘人又東五里曰西山上有戰坪相傳南唐宋齊邱督戰處屏山在建寕縣東二十里俗名平坑山山方而高狀若翠屏對峙者曰雞籠峯鄒家峯二峯壁立中通鳥道長數十里曰大源硿達泰寕將樂二縣界多巨木怪石金鐃山在建寕縣南三十里九域志邵武軍有鳴鐃山越王無諸嘗校獵於此鳴鐃載旗因名縣志謂之金鐃山跨泰寕寕化二縣界一名大弋山又名大厯山山有八十四面周亘四百餘里石磴縈迴而上絶頂有仙池不竭南折而下為黄楊坪坪東有龍潭廣數尺深不可測引為瀑布萬丈又南有石燕