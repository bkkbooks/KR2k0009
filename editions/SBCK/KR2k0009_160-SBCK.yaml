汚於賊當悉焚棄吳阿勒坦布哈惻然曰民為賊脅耳置不問呉阿勒坦布哈舊作吳按攤不花今改正耶律惟一至正間任邵武縣達魯噶齊興學奬士後以其學敷教成均阿勒達爾台􅀩古扎拉台人至正間知邵武縣性凝重處公事如家事視同僚如昆季阿勒達爾台舊作安荅兒秃扎拉台舊作札兒台今並改正孔公俊曲阜人至正間知邵武縣時邑新被寇公俊存恤勞徠輕徭薄賦重惜民力大修學宫民不知勞明周時中江南人洪武初知邵武府時承元季兵革之餘民皆流離時中拊循安輯民遂生養之樂夏祥鳳嘉興人洪武間知邵武縣嘗曰廉為士之大節居官而不能廉大節虧矣雖有政事何足尚哉及代去囊篋蕭然林興祖潮州人永樂間官常豐倉大使郡饑慨然詣巡撫夏原吉懇言民命危急詞色迫切遂檄郡發廩所活數萬衆鄒良樂安人永樂中知邵武縣多惠政宣德末考績當遷邑民乞留命増秩再任楊衡岢嵐州人正統間知邵武府時沙賊倡亂奄至城南衡勒兵討之郡境晏然李春鳯陽人正統間任檢校鄧茂七黨為亂至城南垓嶺春率民兵出戰親冒矢石連發輒中賊却去盛時望無錫人成化間知邵武府因糧起科延名儒以教諸生以除奸弊興教化為務馮孜南充人成化間知邵武府慎徵輸平徭役民投牒訴訟一訊而決時建陽賊為亂孜發兵直抵其穴平之王佐瓊州人成化中邵武府同知泰寕遭寇佐往招諭降其脇從者數十人餘賊悉散去劉俊深州人成化中知光澤縣以戢奸植善為首務毁淫祠禁師巫葺學宮人稱其得為政之體王拯東莞人成化間知邵武縣公廉愛民嘗以公事出郊民具雞黍拯止茹蔬夏英德化人宏治間知邵武府躬循阡陌襃孝揚善凡公署學校水利橋梁一一修舉鄭鑾縉雲人宏治中任邵武縣丞臨政毅然不可干以私值大造黄冊除飛詭諸弊以三則縞徭役民頌其平葛浩上虞人正德中知邵武府量屬邑闊狹更定賦役俗尚巫男女聚㑹無别下令嚴禁入覲疏陳利弊五事悉見施行居六年民戴若慈母王鈁奉化人嘉靖中知邵武府為政簡靜公庭寂然不煩鞭朴御史行部銜鈁亢直伺隙不得已察治行知其廉吏乃薦之朝江一桂婺源人嘉靖閒知建寕縣制黠胥剷粃政建東山書院置曰以贍諸生何孟倫新㑹人嘉靖閒知建寕縣扁其堂曰節愛凡有益於疆圍士民者一一具舉時稱賢令陳激衷南海人嘉靖中建寕縣學教諭率諸生習冠射禮巡按聶豹聘主五經書院激衷言笑不苟尤精於樂律許繕臨清人嘉靖閒任建寕巡檢慷慨有膽力時汀寇侵掠夜半聞警進追之寇伏猝起從兵皆遁繕䧟池中死焉民哀之為立祠鄭宣化應天人萬厯中知邵武府操履貞素卒特祠祀之表曰真清司馬祉㑹稽人萬厯閒知邵武府政先文教時有虎噬人祉為文以禱虎立斃程寰歙縣人萬厯間知光澤縣立義倉義學教養備至王道焜錢塘人崇禎中由南平知縣升南雄府同知㑹光澤寇發父老以道焜令南平有聲請於撫按改知光澤縣事至則撫􅁹兼施部内底定太朝趙之連洛陽人順治初知邵武縣㑹山寇起與江右寇􅀿泉數萬屢薄城下駐防兵少外援不至之連簡閲民壯得二千餘親冒矢石所向披靡卒於官温光涵清源人順治中知建寕縣時軍需孔亟光涵設法供應四郊安堵徐登第奉天人順治間署建寕駐防守備計擒土寇黄黑等殺之寇焰遂熄王銗湖廣人康熙􅀄任邵武副總兵值土寇亂銗大張筵宴令部將誘降尋皆就擒東路以平李化龍榆林人康熙初建寕防禦遊擊嘗延紳士詢民間疾苦有古儒將風值江右寇入境化龍率兵奮擊遇伏而死張瑞午漢軍鑲藍旗人康熙中知邵武府耿逆之變隂與同知高舉副將王進謀討逆事泄皆遇害瑞午子玘瑛珍珖玳瑜六人及媳王氏李氏舉子登選皆殉事聞瑞午贈太常寺卿舉贈福建按察司副使王興禹廣寕人康熙中權知府事時冦盜剽掠之後城邑為墟興禹一意招集驅逐悍卒諸所徵發不事追呼胥吏作奸必置之法柯永新襄平人康熙中知光澤縣邑有豪猾引江右寇入境為亂永新詣府鎮請兵密設竒計直搗其穴擒之賊黨解散謝紹仁銅陵人知光澤縣嵗饑發賑全活萬餘人雍正十三年奉文清丈軍田昭仁力為請免升户部主事人為立祠王瑶渭南人乾隆二十五年知光澤縣愛民訓士暇輒便服詣田閒勸課邑有陂泉相其形勢䟽濬之分定某陂某泉可以灌田若干畝而無有餘不足之患倡建書院考棚重修洪濟水口二橋士民賴之人物唐黄桓邵於武墓人母林邑丧舊廬無墓三鶴人年芝生墓側鶴因稱其地為鶴巢林坪貞觀母丧俱中旌廬墓閭其後十三年永觀淳察初有張巨使奏蠲其籛呉海家徭賦上官洎邵武破饒人乾吉䖍符信末為等州鎮刋將時黄山開道巢自直趨浙東踰江建州洎與西子蘭領戰父兵拒子皆賊力被害陳巖字間夢黄臣建巢掠寕福人有建諸智州畧乾所至符殘破邑巖為聚黄衆數連鎮千保鄉巖表為里屢義寕敗軍巢中衆遠和四近賴年代為固鄭鎰時為福校建為觀察使巢焚蕩為治幾盡有威巖悉惠力先是城完輯閩壁中公遂府安學宋龔慎儀字世則刺史宜邵春武盧人開絳領寶兵初除數千駕陷部郎中歙且趨為歙閩欲州引慎援儀為肯從謀賊主慎耶絳儀厲怒殺聲曰之子吾極已受字日宋拔命雖一日官至樞密失使直得言從無隱子穎真宗字同常顧謂秀大中李祥迪符曰人臣間官至如銀極豈可青光祿多大夫著立有朝正慷己慨箴李巽字仲平興權光國八澤人博年進士學能任江文舉西提太刑明恕第一遷兩浙運使郡人登進士自巽始上官凝字成叔邵武人慶厯進士為銅陵尉秩滿有老叟十數人餽藥數器發之皆金追而反之厯知安邱縣治豪右無所撓終尚書職方員外郎子塏官至廣東轉運判官治有異績呉處厚字伯固邵武人博學能詩文登皇祐進士為大理丞厯官知衛州卒以元祐黨人追貶歙州别駕著有青箱雜記游烈字晉光邵武人從胡瑗學官至職方員外郎郡人知經學自烈始謝詗字誠甫建寕人治平進士初令臨川人稱為謝冰壺後守汀州卒子黻字彦章提舉河北常平倉值改鑄大錢黻言不可忤蔡京謫監漳州税後除吏部郎中知興化軍以親老歸上官均字彦衡凝次子熙寕進士第二任北京留守推官為竇莘等明冤謫知光澤縣哲宗初為御史論罷青苗復常平法又論蔡確及張璪李清臣擊去之徽宗立遷給事中時相欲盡循熙豐法度為紹述均言法度惟是之從後入黨籍久之復龍圖閣待制致仕卒孫諤字正臣邵武人熙寕進士官右正言守正不阿力論楊畏偷合詭隨始終三變又言役法不均忤蔡京出知廣德軍後入元祐黨籍謝皓字德夫詗從子元豐進士擢金部郎厯建昌南劍絳州三郡考績皆最黄中美字文昭邵武人紹聖進士知衛縣以修河功轉真定府錄事移信德軍宣和末金兵攻信德中美􅁬死守城金人退宣撫使俾行軍事撫摩瘡痍民復安堵靖康初卒於官子永存字堅叟紹興進士官至正議大夫孫公紹咸淳進士著有韻㑹黃伯思字長睿邵武人幼警敏嘗夢孔雀於庭覺而賦之詞采甚麗元符中進士高等好古文竒字初淳化中命待詔王着續正法帖伯思病其乖雜考引載籍作刋誤二卷伯思學問慕楊雄詩慕李白文慕柳宗元有文集五十卷次子䚮裒伯思平日議論題跋為東觀餘論三卷危翁一光澤人家貧業樵聞徽欽北遷􅂘三日骨立死李綱字伯紀邵武人父夔為華亭尉有政聲終龍圖閣待制綱登政和二年進士累遷起居郎宣和元年京師大水疏言當以盜賊外患為憂七年金兵日迫綱刺臂血上疏内禪之議乃決靖康初金兵渡河宰執守避敵之議綱力陳不可去上感悟命綱為親征行營使以便宜從事綱治戰守之具身自督戰殺其衆數千金兵乃退未幾謫建昌軍金兵再守建炎初拜尚書右至起用入援未至而都城失僕射力陳十事薦張所為河北招撫傅亮為河東經制宗澤為開封留守後黄潛善汪伯彦沮所及亮綱乞歸田吾知盡事君之道不可則全進退之節患禍非所恤也尋落職紹興二年除觀文殿學士上條六事賜詔褒諭除江西安撫制置大使兼知洪州九年除知潭州荆湖南路安撫大使力辭次年卒年五十八贈少師諡忠定綱􅀒天下之望以一危忠誠義氣動乎遠邇每身用舍為社稷生民安宋使至燕山必問李綱趙人鼎安否其為遠所畏服如此何兑字太和邵武人宣和進士授廣西提刑檢法官東平馬仲宣慰諸道辟置幕下紹興中秦檜自陳其有存趙之功兌列上馬伸事狀言伸有移書偽楚斥使避位之節檜怒下兌獄削官檜死乃復子鎬字叔京有學行與朱子友善學者稱臺溪先生著有易論語説臺溪集上官悟字仲達均季子建炎中留守東京劉豫叛城䧟死焉李郁鍪上其治行遷提點鑄錢檢討官任希夷字伯起邵武人自眉州徙家從朱子學朱子器之曰伯起開濟士也登淳熙進士開禧中為禮部尚書奏周敦頤程顥程頤張載為百代絶學之倡乞定議賜諡累官權叅知政事卒贈少師諡宣獻鄒應龍字景􅀄泰寕人慶元二年進士第一厯遷起居舍人與韓􅇑冑不合出知贑州侂胄誅擢中書舍人寶慶初抗疏請留真徳秀魏了翁為當路所忌諷言者擠之嘉熙初權叅知政事舉賢才抑近小夙夜以天下為念以老請歸卒贈少保諡文靖李吕字濱老郁從子晚見朱子於廬阜遂為講學之友子閎祖字守約從朱子學篤志精思朱子留之家墪編中庸章句或問輯畧登嘉定進士辟古田令改廣西經幹諸司論薦改秩未赴卒弟相祖朱子命編書説三十餘卷辨質詳明用心精切幼弟壯祖同年進士調閩清尉朱子嘉其有志真德秀稱其為人物典型嚴粲字明卿邵武人精毛詩嘗自註詩名曰嚴氏詩輯朱子詩傳多採其説嚴羽字儀卿邵武人自號滄浪逋客有滄浪集二卷行世同族有嚴仁字次山嚴參號三休居士皆博學好古世稱三嚴劉剛中字德言建寕人初喜讀老莊荀楊書及登朱子門問讀何書以所業對朱子曰老莊壞人心術自是篤志正道朱子易其字曰近仁既歸築室講學􅀖人士翕然從之登嘉定進士丞蘭溪卒杜杲字子昕邵武人以父䕃授海門買納鹽場未上辟江淮帥幕金人圍滁州杲登陴中矢益自奮勵卒全其城知安豐與元兵大戰御書慰諭之擢淮西及沿江制置使屢立戰功進龍圖閣學士卒杲淹貫多能為文麗密晚歳專意理學嘗言吾用兵無悖謀無左畫皆得之四子書子庶字康侯㓜倜儻有大志通宋典故從父行閒習邊事立戰功進直秘閣移淮西兼廬州安撫副使人懽迎如見慈父治績甚多尋直寶文閣卒葉武子字成之邵武人與李方子友善同受學於朱子補太學生時議函韓􅇑冑首與金請和武子曰奸臣首不足惜如國體何率同舍力爭嘉定中登進士擢知處州進秘閣修撰李方子字公晦吕之孫初見朱子語曰觀公為人自是寡過但寛大中要規矩和緩中要果決遂以果名齋嘉定中廷對第三調泉州觀察推官故事秩滿必先通書廟堂乃除方子曰以書通是求也丞相史彌遠聞之怒踰年始除國子錄方子不少貶以求合彌遠以為真德秀黨罷之既歸學者畢集嘗語人曰吾幸於大本有見處此心常覺泰然高談字景遂光澤人紹定中旁郡盜作諸子請避談曰有廟祏在將焉之賊至執諸庭曰我欲東破武陽得耆老如爾者率是鄉子弟吾其齊乎談唾賊大罵遂遇害而里人賴以免談平居言動必由禮法故鄉人敬而附之丁從龍泰寕人紹定中以擊賊功授保義郎端平二年領兵克復淮安轉忠翊郎八月遇盜於廣西懷集縣力戰死朝命褒贈廟祀危昭德邵武人寶祐進士為秘書郎條上厲民四弊遷侍御史諌作崇陽宫權工部侍郎同修國史致仕昭德在經筵以易春秋大學衍義進講規正甚多元李應龍字玉林郁之後博學有節操至元間兩薦俱不起所著有春秋纂例孝經集注黄鎮成字元鎮邵武人以聖賢之學自勵授江西儒學提舉未仕卒所著有尚書通考陳士元邵武人與黄鎮成以文為友隱居不仕有武陽志畧武陽耆舊詩宗號暘谷先生郭回邵武人素貧年六十無妻奉母􅀉宿神祠中營養甚艱母年九十八卒回傭身得錢葬之每旦詣墳􅂘祭十四年不輟州上狀命給衣糧贍濟仍表異之陳道邵武人父樵為虎所噬道􅁬前縱擊虎舍父噬道啖之鄉人悼焉明曾伯輿建寕人養志山林洪武初以明經署本縣儒學事著有鳴缶集何伯清泰寕人洪武末為大理評事永樂初起廣東按察僉事修雷州壞閘溉田七十萬頃張誠字自明建寕人永樂進士任監察御史遇事敢言巡按交趾彈劾鎮守大臣及中貴之不法者繼巡浙江湖廣風節凜然陳泰字吉亨邵武人永樂舉人除訓導用薦擢監察御史巡按貴州大軍征麓川嵗取土兵為鄉導戰失利輒殺以冒功泰奏罷之景泰中以左僉都御史督治河道自儀徵至淮安濬渠百八十里塞決口九築壩三厯撫蘇松四川淮揚所至民皆德之鄒允隆名昌以字行泰寕人正統進士授太常博士改太僕丞奉使安南時安南經黎季犁之亂久昧朝儀允隆據禮裁正丰度肅然江安宗泰寕人正統中與兄安祖奉父母避寇安祖出求糧為賊所縛索財不得欲殺之安宗聞之即奔往請代安祖曰吾有子弟亟歸善養父母安宗曰弟㝠頑蠢愚養父母非兄不可乃紿賊曰家財悉掌於兄嫂兄去乃可得也賊聽安祖歸踰日無耗遂為所殺余志字志學建寕人天順進士官刑部主事陳備􅁁策有言其越職詔下吏鞫狀乃斥言者志亦出判廣州升石阡知府致仕歸朱欽字懋恭邵武人成化進士授寕波推官治行最擢御史所至著風節宏治中遷山東副使欽有清望屬吏聞聲斂戢十五年吏部舉天下治行卓異者僅六人欽與焉正德中厯右副都御史巡撫山東疏斥劉瑾瑾銜之因事逮問斥為民瑾誅復官甯堅字永直邵武人事母至孝成化間領鄉薦任鳳陽同知呉從周字宗文邵武人嘉靖中以貢授慶元訓導署邑篆以城西北當山之下易窺探改築外城六十餘丈於山上民呼曰呉公城擢國子學正致仕郭冕字宗周光澤人家貧父病癱親吮膿血日夕祝天願以身代母患日舌䑛之復明陳孟温建寕人父殁廬墓三年有黑􅈷白鴉集墓所有司為立孝子坊從子翰一父病篤嘗糞驗瘥劇母日久盲舌䑛之明如故李春熙字皥如建寕人萬厯進士授太平推官決獄平允改肇慶監軍征交趾釋俘􅀗平民千餘遷刑部主事以執奏代藩爭立事謫彰徳稍遷南户部乞終養歸江日彩字光素泰寕人萬厯進士初令金谿升御史疏釋纍臣廣枚􅁲糾貪横三事奉命督遼餉清覈侵冒數十萬晉太僕寺少卿卒王顯字希文邵武人性孝友母病盲以舌䑛之復明人以為孝感江振鵬字翼雲泰寕人天啟舉人崇禎末授懷遠知縣明亡不食死妾張氏子白龍懷龍俱從死本朝乾隆四十一年賜諡節愍李翔字飇舉邵武人崇禎間以貢入京值詔求言翔慷慨上書語侵權貴幾不測選新城令密設方畧平鄉民之亂明亡與同邑守備元體中死之本朝乾隆四十一年俱賜諡節愍邱嘉彩字白夫泰寕人崇禎舉人挈家奉母入山足跡不至城市二十餘年工書畫標其所作曰兼山邱園本朝鄧鳳梧邵武人順治丁亥山寇起繫鳳梧令先導索山中富室鳳梧弗從寇磔之一鄉皆免於難張仕縉邵武人順治八年以貢知黟縣時海氛猖獗逃兵乘機爲亂仕縉集鄉勇抵祁門斬渠魁五人又生擒賊將郡守嘉其忠勇請題敘在任興利除害育士愛民卒於官龔貴巽字首元光澤人順治中曹寇逼致之授以偽劄貴巽入郡請發兵殲之身爲先導擒其賊首郡守題其門曰義士聶芳字桂侯建寕人順治十一年以貢知巢縣與民休息追呼不擾刑罰未嘗濫及嘗招撫湖南流民復業上官課吏治以芳爲江北諸令冠黃金鉉字守正邵武人家貧事母余菽水承歡康熙六年舉孝子已酉領鄉薦耿逆變逼脇受職拒之幾不測後以母老絶意仕進母卒哀毁骨立陳洪字宏九郡武人康熙舉人知新化縣嵗不登發倉賑貸罷供億時鹽價昂力請淮鹽貯長沙聽民轉販邑有三虎洪焚牒於社虎出境尋署湘潭以憂去毛錦生光澤人康熙十三年耿逆蹂􅏳村邑錦生爲練總大兵進􅁹身先鄉導手格殺賊時賊有不怕官兵千千萬只怕練總一個毛之謡因設伏誘錦生出戰以衆寡不敵􅀍擒死之謝􅀖協字克一建寕人康熙舉人甲寅耿逆之雙逼令受職義不屈避僻村土城中丙辰逆黨以火攻逼令出仍不屈闔門遇害江瑞愷字泉叟泰寕人以捐粟助賑授散秩方啟元邵武人十嵗喪母家貧􅀒販以爲父甘㫖娶王氏事舅亦甚謹雍正二年舉孝行鄧成珠泰寕人家貧父早卒傭於廖距家數里日乞米趨送母所旋返供役已而母盲􅀒依主旁舍自減餐飯母廁牏必親母卒日夜長號葬畢不知所之朱仕琇字斐瞻建寕人乾隆申子舉鄉試第一戊辰成進士選庶吉士授山東夏津縣以至誠撫字其民改福寕府學教授尋乞歸養母主鼇峯講席十一年造就人才甚衆仕琇治古文自晚周以迄元明百餘家悉究其利弊而一以荀况司馬遷韓愈爲大宗大興朱筠推其文謂足成名一家所著有梅崖居士文集三十卷外集八卷流寓宋范如圭建安人僦舍邵武以居學者多從之質疑季陵括蒼人居於邵武建炎中除太常少卿金兵南下車駕倉卒趨杭陵獨奉九廟神主以行紹興中以徽猷閣待制知廣州卒明傅冠進賢人官大學士崇楨末避地於泰寕之汾水人士多從之遊列女宋龔氏二女邵武人父慎儀為盧絳所殺二女被擄以行至王堂香巖寺絳置酒飲二女遂自縊於寺後小墩後人名其所曰烈女臺去臺百餘歩有