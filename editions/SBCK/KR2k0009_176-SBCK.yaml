body:
  text: 潯州府在廣西省治西南九百五十里東西距四百十里南北距五百二十里東至梧州府藤縣界一百九十里西至南寕府横州界二百二十里南至鬱林州界一百九十里北至柳州府象州界三百三十里東南至鬱林州北流縣界二百八十里西南至鬱林州興業縣界二百二十里東北至平樂府永安州界二百六十里西北至柳州府來賓縣界二百八十里自府治至京師八千四百十里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州南裔周百越地秦為桂林郡地漢為鬱林郡地郡治在今府境晉及宋齊因之梁分置桂平郡隋平陳郡廢仍屬鬱林郡唐武德四年屬南尹州五年屬鷰州七年分置潯州治大賓縣見元和志尋廢貞觀七年始於桂平縣置潯州元和志取潯江為名十二年省入龔州長夀元年復置見元和志天寶初改潯江郡乾元初復曰潯州屬嶺南道邕管五代屬南漢宋開寶五年廢入貴州六年復置仍曰潯州潯江郡屬嶺南西道元至元十六年置潯州路總管府屬廣西道明洪武三年改潯州府屬廣西布政使司本朝因之屬廣西省領縣四桂平縣附郭東西距一百五十里南北距三百七十里東至平南縣界七十里西至貴縣界八十里南至鬱林州界一百九十里北至武宣縣界一百八十里東南至梧州府容縣界一百八十八里西南至貴縣界一百二十里東北至平南縣界七十五里西北至貴縣界八十里漢鬱林郡布山阿林二縣地梁分置桂平郡隋平陳郡廢為桂平縣屬鬱林郡唐貞觀七年為潯川治五代宋因之元為潯州路治明為潯州府治本朝因之平南縣在府東一百里東西距一百二十里南北距二百八十里東至梧州府藤縣界六十里西至桂平縣界六十里南至梧州府容縣界一百五十里北至平樂府永安州界一百三十里東南至容縣界一百五十里西南至桂平縣界一百四十里東北至藤縣界六十里西北至柳州府象州界一百三十里漢蒼梧郡猛陵縣地晉初分置武城縣屬鬱林郡後省宋元嘉二年改武林縣屬永平郡齊以後因之唐初屬藤州貞觀三年於縣置鷰州七年改置龔州都督府又分置平南縣尋移州治之天寶初改臨江郡乾元初復曰龔州屬嶺南道五代屬南漢宋開寶五年省武林縣入平南政和元年州廢屬潯州三年復置紹興六年復廢屬潯州元屬潯州路明屬潯州府本朝因之貴縣在府西南一百四十里東西距一百四十里南北距二百二十里東至桂平縣界六十里西至南寕府横州界八十里南至鬱林州興業縣界八十里北至柳州府來賓縣界一百四十里東南至鬱林州界八十里西南至廣東廉州府合浦縣界一百三十里東北至桂平縣界八十里西北至思恩府賓州界一百二十里古西甌駱越之地漢置鬱林郡治布山縣後漢及通四年於郡置南定州隋平晉宋齊皆因之梁普陳廢郡置鬱林縣改州曰尹州大業初省布山入州尋復為鬱林郡唐武德四鬱林縣又改州曰鬱年曰南尹州貞觀八年改貴州天寶初改懷澤郡乾元元年復曰貴州屬嶺南道五代屬南漢宋亦曰貴州懷澤郡屬廣南西路元曰貴州屬廣西道大德九年以州治鬱林縣省入明洪武三年降州為縣屬潯州府本朝因之武宣縣在府西北二百里東西距一百十五里南北距一百八十里東至桂平縣界九十里西至柳州府來賓縣界二十五里南至貴縣界九十里北至柳州府象州界九十里東南至桂平縣界一百八十里西南至貴縣界八十里東北至平樂府荔浦縣界八十里西北至來賓縣界四十里漢鬱林郡中留縣地後漢曰中溜隋為桂林縣地唐武德四年析置武仙縣屬象州五代宋元因之明宣德六年始改為武宣縣仍屬象州本朝雍正三年分屬賓州八年改屬潯州府形勢封域廣袤實有三州之地方輿勝覽左黔右鬱限以二江山水奇秀郡志風俗僻處山間地瘠民貧宋趙善奏狀力耕為業不產􅁞絲人物淳和不事諂詐風土記城池潯州府城周七里有奇門六東西開濠南北際江宋嘉祐間土築明洪武二十九年增建成化三年甃甎本朝乾隆二十七年修桂平縣附郭平南縣城周一里有奇門二南臨大江池廣二丈明初土築天順間甃甎貴縣城周三里有奇門五元至正間因唐址建明萬厯間増建本朝康熙二十五年五十九年重修武宣縣城周二里有奇門四池廣一丈五尺明宣德間上築成化間甃甎本朝乾隆三十一年修學校潯州府學在府城西隅明正統三年遷建本朝順治十五年重建康熙二年雍正二年乾隆四十六年重修入學額數二十名桂平縣學在縣治西本朝康熙六年遷建雍正三年乾隆九年重修入學額數十五名平南縣學在縣治東本朝康熙初重建雍正十一年乾隆五十八年修入學額數十二名貴縣學在縣東門外本朝康熙五十六年重建雍正八年乾隆四十五年重修入學額數十五名武宣縣學在縣治東明洪武中建本朝康􅄉七年五十年雍正七年嘉慶三年重修入學額數八名潯江書院在府學左明萬厯間以分守别署改建本朝乾隆七年易名潯陽書院三十九年增修復舊名思靈書院在桂平縣學左本朝乾隆三十八年因桂邑書院改建武城書院在平南縣本朝乾隆十三年建懷城書院在貴縣本朝乾隆二十四年因學宫舊址修建四十四年改建學宫旁仙城書院在武宣縣本朝乾隆三十四年建户口原額人丁一萬六千九百五十五今滋生男婦大小共六十四萬七百五十四名口計九萬七百二户四賦田地九千三百二頃三十畝一分有奇額徵地丁正雜銀三萬二千七百十八兩八錢六分六􅁵遇閏加徵銀九百九十九兩五錢九分一􅁵米四萬七百七十四石三斗四升六合六勺山川白石山在桂平縣南寰宇記阿林縣有白石山色潔白四面懸絶上有飛泉瀑布方輿勝覽在潯州南六十里下有白石洞天可達容州勾漏洞天世傳