卿約束轉輸軍需克濟居民無擾王濟烏程人嘉靖中為横州判攝州事訪問俗尚利弊召父老庭下集議可否而從革之於是民知向方盗亦潛弭霍與瑕南海人隆慶中駐節左江土酋黄金彪背逆督撫方議進􅁹與瑕翦其羽翼一矢不遺縛致之遂定以四都叛服不常致南太二府道路阻絶請於朝開建新寕州治本朝劉天福順治初知永淳縣潯州土賊陳􅀖賦圍縣城天福率衆拒守城陷被害莽吉圖滿洲人康􅄉中以鎮南將軍率師度嶺克復南雄還復韶州叛將張星耀不戰而竄所至秋毫無犯及抵南寕擊賊帥吳世琮盡殲其衆軍威益振以疾卒於南寕百姓肖像以祀梁鳳翔咸寕人康熙四十二年知上思州手書訓語四條正男女内外之别嚴師巫邪術之禁廣闢荒田重禁私販風俗一改時有禾生兩歧之瑞凌森美定遠人拔貢生康熙五十二年知永淳縣邑地高水下民不知灌溉森美敎以種旱稻遂為永利編保甲嚴窩主而姦息十三屯徵糧舊無額冊吏得増斂欺民森美創圖冊詳書其民户實徵之數及期榜示之尤加意學校署有柳園暇則退處考文獻輯為永淳志乾隆六年祀名宦人物宋石鑑宣化人舉進士有文武才皇祐中挾䇿干余靖以平儂賊功授大理寺丞升忠州刺史尋知桂州充本路經畧安撫使官至尚書梁世基横州人由攝官補登仕郎厯潯州司户叅軍熙寕中特授大理寺丞用法平允元鄧祖勝宣化人以右丞守永州聞楊璟師至約全桂守者互相應援全桂援絶璟督師四面攻之祖勝仰藥死明楊名横州人永樂中舉於鄉性至孝父喪京毁逾禮既葬廬墓側三年有白龜出於廬次人咸以為孝感任榖横州人成化進士授南京户部主事厯福建叅議奏罷銀礦之役為同官所忌調廣東屢著聲績張翺宣化人成化中舉於鄉性剛直知龍門縣有聲績劉瑾遣使至縣索金翺廉貧無以應有富民願貸出金翺堅拒之遂罷歸黄竇上思州人與弟績一乳而生正德八年黄鏐攻州城兄弟勇敢赴敵同日死時同州凌安亦拒敵死陳琚宣化人嘉靖中任德慶州判時羅旁宼熾流毒郡縣衆推琚材武提偏師撫􅁹遂殲渠降服為分什伍定約束俾與州人互市時有槖宼者嫉琚密攝琚於宼衷甲害之後王守仁擒宼魁殺之祭告其墓鄧洪震宣化人嘉靖進士隆慶初厯兵部郎中疏請減田租之半俾蘇民困帝嘉納之尋以疾歸神宗立屢薦不起蕭雲舉宣化人萬厯進士厯官禮部尚書人謂其甘陵之黨不附君子逆璫之禍不附小人平居嗜古著書有青蘿集行世卒諡文端楊汝名永淳人父病目以舌䑛之目疾復明父卒廬墓三年由􅀊貢任陸川訓導厯署太平邑篆稱廉吏郡志作汝明陳文燦永淳人與弟文炳皆補邑弟子員有武畧渌里宼發部兵征逐軍北兄弟為殿燦馬陷於淖炳不忍去皆遇害田鎛永淳人嘉靖舉人杜門養母足不履公庭遭􅀊歉靈竹聚衆三百人剽掠時議􅁹之鎛急白縣令請無用兵單騎往諭皆詣縣謝罪倅岳州洞庭湖宼出没以計擒渠魁餘黨解散林青陽新寕人事桂王官員外郎時孫可望謀禪代青陽與胡士瑞等發其姦王議密勅李定國統兵入衞青陽請行佯乞假歸葬由間道駝至定國所許以奉迎青陽至南寕為守將常榮所留密遣劉吉告王王喜改青陽給事中再撰勅令吉還付青陽賜李定國事洩被殺本朝乾隆四十一年賜諡烈愍本朝劉履吉宣化人順治五年偽帥陳􅀖傳遣子會禹統賓遷思明兵數千攻南寕久不破縱兵大掠履吉居城外遇害妻亦死李夀椿宣化人順治七年土賊李啞滋擾夀椿被擄不屈死劉章宣化人母賴氏守節育且敎中康􅄉癸卯鄉試痛父早亡已不及事事母以孝聞黄起忠宣化人乾隆五十三年由外委千總隨征安南於黎城擊賊陣亡同時遇害者千總張坤把總賴起勝李如棟額外外委黄起智盧崇耀楊輔恒楊振德均賜卹如例倪聯清宣化人由行伍洊升守備嘉慶二年隨􅁹黔苗論功賞戴藍翎七年隨征湖北邪匪墜崖而死又平樂協守備陸世元擊賊於霧渡河陣亡梧州協千總王勝龍擊賊於竹葉坡陣亡均廕雲騎尉鄧金保上思州人嘉慶二年由把總隨􅁹黔苗與外委徐明同遇害均廕雲騎尉流寓宋秦觀高郵人紹興初編管横州多所題咏列女唐衡方厚妻程氏宣化人方厚為邕州錄事㕘軍招討使董昌齡治無狀方厚數爭事昌齡怒害之程懼並死不敢哭徒行至闕下陳􅁈下御史鞫實昌齡乃得罪詔封程武昌縣君明程清妻劉氏宣化人夫亡守節敎子琚以貢仕廣東德慶判官死於宼難時稱忠臣節母蕭相妻李氏宣化人相官貴州卒於任氏引刀自刎死事聞旌表陳蕭氏南寕衞人夫亡守節坐卧一樓足不履地者數十年事聞旌表鄧遵素妻朱氏新寕人值莫逆之亂遵素先出城賊勢漸逼氏度不免投水死楊端妻蕭氏横州人于歸未期而寡姑欲嫁之蕭曰若再醮以遺不孝不義之名非人􅀋也守節五十餘年事聞旌表徐銓妻楊氏横州人歸銓三載生子澋方五月而銓卒楊年十九撫􅀌守節以終子澋哀毁逾禮人稱其能報焉龍居德妻羅氏永淳人景德中為盜所掠羅投崖下不死賊驅之行不從遇害黄敏妻劉氏上思州人敏以州兵從征古田死軍中劉聞之哀不自勝恪守婦道操履冰霜訓二子勤學後相繼殁復敎其孫正德間旌表本朝馬之騶妻蕭氏隆安人尚書蕭雲舉女夫死無子自製棺衾絶食七日死順治三年旌顔于􅂜妻覃氏永淳人于􅂜早卒氏孝養翁姑撫遺腹子食廩餼後子卒晚節愈苦邑人哀之康熙五十七年旌黄亞兒妻李氏宣化人歸自母家遇􅁀不辱墮水死雍正五年旌鍾士璠妻楊氏横州人士璠早卒氏孝事翁姑撫兩子成名雍正三年旌同州葉煜妻陳氏楊鏤妻李氏均雍正年間旌何庭桂妻錢氏宣化人年十六于歸逾年夫卒孝養撫􅀌乾隆元年旌同縣馮朝臣繼妻李氏徐淑衡妻鄧氏鄧王臣妻謝氏黄紹達妻雷氏李元和妻盧氏均乾隆年間旌李廷鼐妻莫氏新寕人夫亡守節乾隆九年旌同州廖俊妻黄氏盧全忠妻王氏譚應秋妻李氏均乾隆年間旌陸祖尚妻陳氏隆安人夫亡守節乾隆二十八年旌􅀩殷賚妻吳氏横州人年二十三而寡賚棺嘗被火吳以身殉天忽雨人以為苦節所感與同州鄧蕃妻吳氏陳任幹妻黄氏侯銘鼎妻翁氏吳若純妻黄氏黄夢龍妻陳氏陳翊妻吳氏均乾隆年間旌盧象煌妻譚氏永淳人夫亡守節乾隆五年旌陳堯英妻趙氏上思人年二十二而寡孝養撫􅀌甲生甲生生二子卒與媳林氏撫􅀌孫成立年七十餘卒與同州黄洵妻林氏均乾隆年間旌韋氏獞人夫姓名失傳守正不污為强暴所殺乾隆年間旌陳廷甫妻劉氏宣化人捐軀明志嘉慶三年旌仙釋晉董京元帝時避居横州登高嶺秋夜泛舟於江滸一仙乘槎而來枝幹扶疎光采照人京謁之賜以食宋紹定間郡守張垓構仙槎亭於上羅秀不知何許人聞萬洪寓羅浮山棄家往久之慨丹不成復於宣化青山洞巖中修煉一日危坐尸解去土產金唐書地理志邕州横州皆土貢金邕州有金坑九域志有慎乃金場在邕州西北四百里銀唐書地理志邕州横州皆土貢銀苧麻荔枝桄榔橄欖寰宇記皆邕州土產又有木威象明統志近交阯界山谷間出馬明統志宋時置司市馬於横山寨今諸土州皆貢馬貆豬明統志宣化縣出身有􅁄刺能振以禦人常百十為羣以傷苗稼鼓公寰宇記邕州土產大如犬而色白黒明統志府產蠻犬性警而猘蠻人攜以自防盜莫敢近越鳥寰宇記邕州產越鳥又有飛生鳥又有青鵲如雞名鵲姑明統志府產孔雀又有秦吉了形如鸜鵒敎之能言又有倒挂緑毛嘗倒掛於樹故名又有錦雞能吐錦久復收之皆宣化武縁縣出蚦蛇膽寰宇記邕州土產蟲絲明統志横州出楓始生多有食葉之蟲似􅁞而赤黒四月熟如􅁞之將絲州人擘取其絲為琴絃其聲清越海濱蜑人鬻之作釣緡蛤蚧金志岀横州里人采之為藥能治肺疾苗蠻苗在新寕州語言侏離男括髪以布女椎髻垂額俱跣足飲食屈滕就地啜冷咽生疾病歌舞禳鬼屠狗罄食而散廣源蠻在邕州鬱江之源地產黄金丹砂俗椎髻左袵輕生好亂其先首領韋黄周儂四姓相刦殺唐邕管經畧使徐申厚撫之黄氏納質三部蠻皆定西原蠻在廣容之南邕桂之西依阻峒穴綿地數千里有􅇞氏相承為豪又有黄氏居黄橙峒其屬也地產金銀銅鉛絲丹砂翠羽峒緂練布苗香草果諸藥各逐其利不困乏酋長或娶數妻皆曰媚娘馬人相傳漢伏波將軍馬援征蠻北還留十餘户於銅柱處至隋有三百餘户悉姓馬土人以為流寓號曰馬流輋客在宣化縣有槃藍雷鍾四姓自謂狗王後男女椎髻跣足結茆而居刀耕火種不供賦役猺在隆安縣無版籍穴處巖竇耕樵獵獸而食性愿謹風俗與民無異在上思州居那懶墟及那標上下洒三村好㔄竊在歸德土州有隴板猺耕山種畬男女喜歌唱無樂器以巾帕蹁躚而舞在果化土州架木為屋曰欄房男耕女樵言語不可辨在土忠州居剥咘渌燕郝章郝佐諸村習俗與果化同獞在宣化縣男子髠髪留大髻以笠空其中覆於頂男女衣皆青或以薯染紅盛服則錦兜花裙綴以古銅錢丁當自喜富女以銀作大圈圍領上長裙細摺綴五色絨於禖袂間在横州佃田與民雜處在永淳飲食不擇毛腥在上思與猺雜居風俗習尚畧同山子在上思州十萬山中不入版籍男衣青首著線網女長裙結五采於帽出入佩刀必繫綱囊便攜貯也蜑左宣化縣有麥濮吳蘇何五姓詳見梧州府纂修官臣李紹昉恭臣蔣立鏞恭纂纂提調官前總纂臣鄭紹謙恭覆輯前校對官臣彭作􅀖恭校
