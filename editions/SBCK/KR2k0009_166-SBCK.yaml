body:
  text: 惠州府在廣東省治東少南三百里東西距六百七十里南北距六百七十里東至嘉應州長樂縣界五百四十里西至廣州府東莞增城龍門三縣連界一百三十里南至海岸一百二十里北至江西贛州府龍南縣界五百五十里東南至潮州府惠來縣界四百四十里西南至廣州府新安縣界一百七十里東北至贛州府長寕縣界六百七十里西北至韶州府翁源縣界四百八十里自府治至京師八千四百八十五里分野天文牛女分野星紀之次建置沿革禹貢揚州南境春秋戰國為百越地秦為南海郡地漢為南海郡博羅縣地東晉分屬東宮郡南齊移東官郡治懷安梁改置梁化郡隋平陳郡廢置循州總管府元和志隋開皇十年置循州取循江為名大業初府廢㝷改為龍川郡治歸善縣唐武德五年復曰循州置總管府貞觀二年府廢天寶元年改海豐郡乾元元年復曰循州屬嶺南道五代屬南漢乾亨元年改曰禎州十國春秋南漢置禎州于歸善徙循州治龍川宋天禧五年改曰惠州宣和二年改博羅郡屬廣南東路元至元十六年置惠州路屬海北廣東道明洪武元年曰惠州府屬廣東布政使司本朝因之屬廣東省領州一縣九歸善縣附郭在府東南隔江三里東西距二百七十里南北距一百四十里東至海豐縣界一百七十里西至廣州府東莞縣界一百里南至海港一百二十里北至博羅縣界二十里東南至海豐縣界二百里西南至廣州府新安縣界一百七十里東北至永安縣界一百二十里西北至東莞縣界八十里漢南海郡傅羅縣地劉宋分置安懷縣屬東官郡齊曰懷安為東官郡治梁改置梁化郡隋平陳置歸善縣為循州治後為龍川郡治唐復為循州治五代南漢為禎州治宋為惠州治元為惠州路治明為惠州府治本朝因之博羅縣在府西北三十里東西距二百八十里南北距一百二里東至永安縣界一百八十里西至廣州府増城縣界一百里南至歸善縣界二里北至廣州府龍門縣界一百里東南至歸善縣界十里西南至廣州府東莞縣界一百里東北至河源縣界一百里西北至増城縣界一百里漢置博羅縣屬南海郡後漢晉及宋齊以後因之隋改屬龍川郡唐屬循州五代南漢屬禎州宋屬惠州元屬惠州路明屬惠州府本朝因之長寕縣在府北少西四百里東西距一百七十里南北距一百二十里東至連平州界五十里西至韶州府英德縣界一百二十里南至廣州府龍門從化兩縣夾界五十里北至韶州府翁源縣界七十里東南至河源縣界一百三十里西南至佛岡㕔界一百里東北至連平州界三十里西北至翁源英德兩縣夾界一百五十里漢南海郡博羅縣地南齊分置新豐縣仍屬南海郡隋開皇十八年改曰休吉大業初省入河源縣明隆慶三年分河源及韶州府英德翁源二縣地置長寕縣屬惠州府本朝因之永安縣在府東少北二百里東西距二百二十里南北距一百三十里東至嘉應州長樂縣界一百里西至博羅縣界一百二十里南至海豐縣界八十里北至河源長樂兩縣夾界五十里東南至陸豐縣界一百二十里西南至歸善縣界一百二十里東北至長樂縣界九十里西北至河源縣界一百十里漢南海郡博羅龍川二縣地隋唐為歸善興寕二縣地宋元為歸善長樂二縣地明隆慶三年析置永安縣屬惠州府本朝因之海豐縣在府東少南三百里東西距二百五十里南北距二百二十里東至陸豐縣界一百二十里西至歸善縣界一百三十里南至海岸八十里北至永安縣界一百四十里東南至潮州府惠來縣界一百五十里西南至海岸六十里東北至陸豐永安兩縣夾界一百四十五里西北至歸善縣界八十里漢南海郡龍川縣地東晉分置海豐縣屬東官郡宋齊以後因之隋改屬龍川郡唐屬循州五代南漢屬禎州宋屬惠州元屬惠州路明屬惠州府本朝因之陸豐縣在府東三百五十里東西距一百里南北距二百里東至潮州府惠來縣界七十里西至海豐縣界三十里南至碣石衞大海五十里北至嘉應州長樂縣界一百五十里東南至甲子所城大海一百里西南至海豐縣界三十里東北至潮州府揭陽縣界一百五十里西北至永安縣界一百五十里漢龍川縣地自晉至明爲海豐縣地本朝雍正九年析置陸豐縣屬惠州府龍川縣在府東北四百二十里東西距一百三十五里南北距一百五十里東至嘉應州長樂興寕兩縣夾界七十里西至河源和平兩縣夾界六十五里南至長樂河源兩縣夾界三十里北至和平縣界一百二十里東南至長樂縣界三十五里西南至河源縣界四十里東北至工西贛州府長寕縣界一百二十里西北至和平縣界一百里秦置龍川縣屬南海郡漢及晉宋齊以後因之隋開皇十一年省入河源縣唐天授二年改置雷鄉縣屬循州五代南漢乾亨元年移循州來治仍改縣曰龍川宋為循州海豐郡治屬廣南東路宣和三年改縣曰雷江紹興元年復故元至元十三年立循州路總管府二十三年降為散州屬廣東道明洪武二年州廢以縣屬惠州府本朝因之連平州在府北四百里東西距一百四十里南北距一百三十里東至和平縣界六十里西至長寕縣並韶州府翁源縣夾界八十里南至長寕縣界七十里北至江西贛州府龍南縣界六十里東南至河源縣界一百三十里西南至長寕縣界一百里東北至和平縣界七十里西北至翁源縣界一百里漢南海郡龍川縣地南齊以後為河源縣地明正德隆慶中分為和平長寕二縣地崇禎六年割和平河源長寕及韶州府之翁源縣地置連平州屬惠州府本朝因之河源縣在府北一百五十里東西距二百七十里南北距一百四十里東至永安龍川並嘉應州長樂三縣夾界一百四十里西至廣州府龍門縣界一百三十里南至博羅永安兩縣夾界三十里北至連平州界一百一十里東南至永