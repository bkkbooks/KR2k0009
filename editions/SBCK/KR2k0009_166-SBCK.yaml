坐是失産㟽奏罷之又置田以供養士之費許應龍閩縣人理宗時知潮州時盜陳三槍起贛州出没江閩廣間與盜鍾全相挺為亂逼境上應龍調軍分扼要害㸃集民兵日加訓閲横岡桂嶼相繼捷聞江西招捕司遣統領官齊敏率師由漳趨潮截贛寇餘黨應龍諭曰鍾寇將窮陳寇猖獗若先破鍾則陳不戰擒矣敏惟命於是諸寇皆平距州六七十里曰山斜峒獠所聚禁兵與閧應龍平決之其首感悦率父老詣郡謝去之日合郡遮道攀送洪天錫晉江人理宗時調潮州司理勢家奪民田天錫言于郡守還之孫叔謹龍溪人寶慶中知潮州公勤自勵創橋築堤又奏罷貧民監役潮人立祠祀之文天祥吉水人衞王立天祥進屯潮陽縣潮州盜陳懿劉興數叛附為潮人害天祥攻走懿執興誅之元安圖􅀩古人元統間為潮州路同知溪水暴漲漂没居民圖默禱願以身代民死須㬰水息人嘗暴炎日中禱雨雨遂大至安圖舊作安童今改正明衡岳汝寕人洪武中為潮州同知約巳惠民常祿外一無所私許德籍未詳洪武初為揭陽丞有興學建城功行省叅政奏加旌賚王源龍巖人宣德十年知潮州府亷明愷悌政敎兼舉嘗刻藍田吕氏鄉約擇民為約正約副約士講肄士民化之陳獻章嘗言吏於潮有功者前惟韓愈後則王源楊昱會稽人成化中以舉人知饒平縣政尚嚴肅有建城興學闢田均賦之功陳琳莆田人正德初以言事謫潮陽縣丞毁滛祠興學校士􅀋向方會調海豐兵赴程鄉道出潮陽突至城下居民驚擾琳即控馬出諭之導出境民乃安諸燮餘姚人嘉靖中以兵部主事謫判潮州署惠來縣政平訟簡南城向逼縣治民苦湫隘猝遇海宼突至城外天無以為守夑乃集父老議拓城數十丈民由此得免疾疫㓂賊之苦李桂金州人嘉靖中為大埔知縣善決獄縣多僧田例以給軍餉􅀊苦重徵桂為請減之并革三河壩税愛民育士有古循良風侯必登江州人隆慶中知潮州府威惠並著羣盜望風惕息嘗以事之省城道經賊巢賊相率羅拜馬首肅隊前驅高攀龍無錫人萬厯間以行人言事謫揭陽添註典史勤于職業嘗集程朱諸子要語以示揭之學者多所裁正萬元吉南昌人崇禎間爲潮州推官洞悉民情摘發隱伏雖老吏弗如許直如臯人崇禎末補惠來令流寇陷城闔户自經死本朝劉正新鄭人康熙四年爲潮州司理精明果斷絶苞苴清夙􅁦殫心積貯旱澇有備民利頼焉卒祀名宦李成功奉天人由武進士官潮州鎮中軍遊擊加叅將銜康熙十三年劉進忠叛成功陰與城守遊擊張善繼等謀誅之不克被執罵賊遇害張善繼防禦于國連署都司白虎千總何亮把總羅華黄良俱圮之事聞贈副將張善繼等各贈卹有差閆奇英奉天人康熙初爲潮州判官署府篆劉進忠叛奉委没其家執逆婦周氏囚之手刃悍僕十餘人餘黨悉散平藩討逆功績最著後聞海㓂陷漳州憂憤成疾卒潮人哀之魏櫆祥柏鄉人康熙初知潮州府劉進忠叛以刃脅櫆祥從逆櫆祥曰我惟一死報國耳幽之一室櫆祥拍案大罵不食而死張克嶷聞喜人康熙進士知潮州府清亷慈惠屬邑奸民為亂邑令閉門治守具克嶷曰第登白葉􅄮山豎旗鳴鼔聲言大兵且至彼將自潰何用張皇為如其言賊黨果斬渠魁以獻守潮五載吏治肅清僚屬奉法維謹張應詔五開衛舉人康熙間知潮州府有惠政廉潔自矢内遷江南道監察御史民咸思之乾隆十年祀名宦王岱湘潭舉人康熙二十二年為澄海令清謹自持捐俸備飢墾闢土田興修水利戢奸禁暴訟牒鮮少卒祀名宦陳嘉謨三原舉人康熙中知澄海縣禦海寇有功擢御史張實含山人雍正十三年知澄海縣綜練治理案無留牘蒞政八載諸廢咸修邑有套子河常決壞民田實築隄障之一方恃以無虞民至今頌之卒祀名宦崔見田永濟人乾隆四十七年由鶴山調澄海令亷儉正直邑有漁船新仕至當輸倒金却不受嘗與諸生講學有勤於誦讀者奬賞甚厚以是􅃶歌遍境内云人物漢呉碭字叔二十山揭陽人舉孝亷為安成長建安年呉吕岱取長沙碭偕永新攸茶陵三縣吏共入陰山城合衆拒岱孫權遣魯肅攻之碭突圍走曰碭知有漢不知有呉也後權統有交廣終不仕唐陳元光揭陽人儀鳳中隨父征戌閩中父死代為將永隆二年提兵平潮盜伐山開道潛襲㓂壘俘馘以萬計嶺表率平還軍奏請增七閩為八創置漳州詔從之命元光鎮撫其地後賊復起力戰而没贈右豹韜衛大將軍立廟漳浦開元四年追封潁川侯諡昭烈趙德海陽人沈雅專靜通經有文章韓愈刺潮州置鄉校牒請德攝海陽縣尉為衙推官惠領學事自是潮士篤於文行宋林從周海陽人景德二年進士厯官屯田員外郎充開封府推官痛絶私謁得權貴書輒投之火常對扆奏事莊獻太后指以語仁宗曰此林從周也民有覬兄產而賊其二子長被創死幼走免事發獄成以母年八十例當留侍從周議曰使無頼子居老母側以凌其幼􅀌必無全理且􅀌孫雖穉使侍可也太后讀奏未畢遽頷之曰人情當如此命配海外後轉度支員外卒壻余靖曾銘其墓許申字維之潮州人大中祥符初舉賢良授校書郎厯官江西等路轉運使終刑部侍郎嘗因災異言事切直無所囘忌林巽字巽之海陽人天聖中應舉對䇿以忤權貴不錄慶厯間投匭論事仁宗異之授徐州儀曹不就歸著易範八篇盧侗字元伯海陽人皇祐五年釋褐為本州長史嘉祐中余靖蔡襄交薦調歸善簿治平初蔡抗復薦召對授國子直講熙寕初力言新法不便乞外補知柳循二州以太子中舍人致仕劉允字厚中海陽人紹聖四年進士為循州户曹改知程鄉􅀊旱州督租如故允力爭之以狀聞得免復權知化州􅀊市玳瑁翠羽以萬計允至悉罷之呉川鹽户以蓄戎器坐盜為辨其冤活者五十餘人子昉官至龍圖閣學士張夔字致尭饒平人政和八年進士宰茂名以薦擢判亷州遷知新州前後皆以清節著高宗常書於屏曰南有張䕫北有周昕王大寶字元􅀛其先由温陵徙潮州建炎初舉進士第二趙鼎謫潮州從講論鼎嘆曰吾居此知交寥落君獨肯從吾遊耶後厯官國子司業兼崇政殿說書請委監司覈江南月樁錢爲定其制減折帛錢以惠小民孝宗即位除禮部侍郎上言四方日俟恢復願陛下果斷擢右諫議大夫首論朱倬沈該之罪劾王澈督師荆襄坐視敗􅗮疏再上謫澈台州會張浚復起爲都督大寶贊其議未幾湯思退復請講和大寶力陳不可章三上不聽隆道元年陞禮部尚書㝷致仕卒鄭南升潮陽人紹熙中從朱子遊於語孟多所發明郭叔雲字子從揭陽人初見朱子求格致之要又質禮經所疑二十餘條退而彚諸家之說定爲一編藏於家胡斌海陽人爲殿前司從童德興提禁卒戍紹武紹定三年江閩寇大至他將皆遁斌獨與官軍數十人巷戰而死尸僵不仆事間贈武節大夫錄其後陳夢龍潮陽人開慶進士由主簿改司法二王浮海奉命招撫潮寇㑹文天祥被執夢龍伏兵海口謀奪之不克力戰死趙嗣助字衍􅅄潮陽人咸淳進士官至朝奉大夫後佐文天祥討斬劉興宋亡不仕馬發海陽人德祐中爲摧鋒寨將署州事元兵逼潮城守令懼走發獨慰勞士卒堅守不屈戰敗仰藥死後人哀其忠立祠祀之張達饒平人景炎間端宗至泉州駐蹕紅螺山下達率衆䕶蹕後從陸秀夫等俱死厓山之難明蕭鑾字景和潮陽人宣德進士授行人使甘肅却哈密饋擢監察御史雪冤獄百餘人為都御史王文所格鑾爭之愈力事竟得白岀為廣西提學終山西副使姚瑗潮陽人天順舉人厯官武選司郎中中官蔣琮專恣特疏劾其十罪忤㫖逮繫王恕救之得免呉一貫字道夫海陽人成化進士由上高知縣入為御史宏治中厯按浙江福建南畿以强幹聞擢大理右寺丞畿輔河南饑請發粟二十萬石以賑又别請二萬石給京邑及昌平民㝷以忤劉瑾謫嵩明州同知厯遷江西副使討華林賊有功進按察使行軍至奉新卒士民立忠節祠以祀焉鄭一初字朝朔揭陽人幼以高節自負登成化進士有以千金求為居間一初曰名義至重吾豈能知若事正德中授御史會王守仁講學京師一初受業不怠時已病或勸少休曰朝聞道夕死可矣㝷竟卒周鑰字希準海陽人宏治進士由邑令擢給事中往勘淮獄劉瑾私人挾之不聽仍疏瑾逆狀自刎死莊琠字惇夫揭陽人宏治進士授安福知縣㝷擢德府長史宸濠挾借禄米琠持不與又嚴絶其私交濠銜之陰謀搆害琠挺身往見詞色俱厲遂被杖下獄不食三日衣冠危坐而死嘉靖初贈太常少卿周孝揭陽人少􅀌問母曰兒何名曰生子望其孝孝即汝名喜曰孝吾能之稍長力田養母朝出必整冠肅揖暮歸亦如之正德中􅀊旱為有司禱雨而騐遂有秋人稱為孝子粟謝君錫海陽人以貢生為福安訓導嘉靖乙未倭寇破城君錫召集諸生申明大義具衣冠拜廟觸石死林大春字井丹潮陽人嘉靖進士除行人累擢副使督學浙江致高拱所私於法拱銜之言官希指論罷後張居正當國雅知大春且與拱有隙或勸其一通不屑也薛侃字尚謙揭陽人正德進士以侍養歸師事王守仁嘉靖初授行人時議學宫祀典侃請以陸九淵陳獻章從祀又勸帝擇親藩賢者居京師慎選正人輔導以待皇嗣之生帝震怒下獄廷鞠究主使張孚敬欲陷夏言太常卿彭澤令侃引言侃正目叱之并發其奸孚敬與澤遂得罪侃亦斥為民歸家益力於學從遊者百餘人隆慶初復官贈御史薛宗鎧字子修揭陽人侃從子嘉靖進士授貴溪知縣調建陽求朱子後復之以主祀􅀊饑賑倉粟先發後聞召為户科給事中駙馬都尉鄔景和占奪武清草場奏歸之官佃充賦尋以劾吏部尚書汪鋐肆奸植黨擅作威福被杖下獄死隆慶初贈太常少卿翁萬達字仁夫揭陽人嘉靖進士厯梧州知府仇鸞鎮兩廣縱部卒為虐萬達縛其尤者杖之會朝議將討安南擢為廣西副使以計誅土舍趙稭李寰等軍聲大振後移師攻斷籐峽破之作平峽八議己而毛伯温進􅁹用其計莫登庸恐懼遂乞降累擢兵部右侍郎總督山西宣大保定軍務左右都御史修築宣大邊牆八百餘里寇不敢犯帝深倚之進兵部尚書召理部事以丁憂歸安達入犯丁汝䕫得罪詔起萬逹代之嚴嵩仇鸞讒搆於帝斥為民尋復以故官召未聞命卒萬達事親孝為人剛直勇於任事臨陣身先士卒尤善御將士邊臣稱職者達為首隆慶中追謚襄毅安達舊作俺答今改正林熙春字志和海陽人萬厯進士厯工部都給事中神宗惡言官以無罪貶斥者三十餘人熙春抗疏極諫謫茶陵州判官天啟初累遷大理卿以老乞罷詔加户部右侍郎致仕唐伯元字仁卿澄海人萬厯進士知萬年泰和二縣並有惠政累遷吏部文選考功郎中佐尚書孫丕揚澄清吏治苞苴不及其門尋乞歸卒鄭同元字黄中潮陽人崇禎進士為六合知縣以詿誤戌台州放還明末遯跡梧桂間值容縣兵叛與長子振芳同日殉難郭之奇字仲常揭陽人崇禎進士改庶吉士厯官詹事府詹事後遁跡南交山中殉節死楊開字悦之大埔人崇禎末由舉人授湘陰知縣時張獻忠䧟長沙被執誘之降不應授以長沙知府大罵曰恨不能為國殺賊豈受賊官耶乃同妻子沉湘江而死本朝呉六奇字鑑伯海陽湯田坑人少豪俠有膽畧稔知關河阨塞明季寇亂偕弟標集鄉勇捍衞閭里本朝順治七年大兵下韶州六奇謁帥於軍門備陳諸郡形勢請給遊劄數十通散其土豪所至皆下帥上其功授潮州副將十二年升碣石鎮總兵募水師造戰艦會剿鷺門招降南澳及銅山偽將杜輝等一百八十七人投誠兵一千三百五十四名安卹難民三萬餘口􅀗大小賊艦九十七屢著奇功晋左都督疏言碣石既平無須設鎮且臣乃潮人亦不宜久官鄉土事下藩帥議議未上而六奇卒賜祭􅁙謚順恪子啟爵康􅄉五年以廕官侍䘙隨將軍施琅征臺灣克澎湖有功擢山西太原鎮總兵調瓊州鎮二十八年陵水黎人王國臣為亂封平之既而生黎母葵母贊等復出刼掠啓爵率本部兵斬其渠羣黎懾服遂自請畧定黎地添設州縣為久安計調天津鎮總兵道卒入祀名宦祠按湯田坑今為豐順縣治謹附記謝名選潮陽人為揭陽諸生順治初九軍賊據其家去母妻及其妹俱投繯死經宿母忽蘇潛逸歸而名選不知也詣賊營哭且詈賊怒支解之林鴻冕揭陽人為邑諸生順治初九軍賊圍其鄉鴻冕率鄉人固守以計殺賊千餘賊乃去海寇鄭成功據揭陽伺執鴻冕百計誘之卒不屈鄉人醵金贖歸終鴻冤世鄉中無貳志者謝運開饒平人侍父疾十三年寢食不離側父殁未􅁙寇至以死䘙柩賊感而釋之順治初海氛未靖築堡堅守鄉人恃以為固康熙二年入祀鄉賢祠李亞五饒平人父病癰醫言得生人骨敷之可愈亞五自截一指磨水以進果瘳高廷煥字華湖惠來人順治五年劇賊羅英圍邑援不至廷嶼集子弟計曰邑殘何以家為即出資募鄉勇破賊堅守四月圍乃解張涇惠來人涇府志作經順治五年惠來被寇圍城中食盡涇出家資倡衆餉軍城賴以存康熙庚戌登進士第林爾張字四維惠來人順治初為靖州知州滇寇圍城守禦三月城陷不屈死之一家殉難十餘人民立祠以祀謝廷詔惠來人順治五年羅寇圍邑出資募義勇康熙癸卯舉於鄉為湖廣新田令有惠政謝病歸童叟攀送者相屬卒祀郷賢祠楊州俊字人俊大埔人順治辛卯舉人九年郝尚久叛與同年生黄標義不汙賊黨棄家奔廣州至鐵江遇賊同死之嘉慶八年均入祀忠義祠陳復平澄海人嵗貢生海寇據邑復平誓不為屈囚之八日以計脱載木主及孀母逃金沙寨寨破賊殺其妻蔡氏以脅之終不動賊乃舍去楊鍾岳澄海人順治進士官戸部郎中鹽通州倉復督屯務於鳳陽釐清夙弊丁憂歸里邑值水災力濟窮乏督學八閩講學明倫士風丕振卒祀鄉賢祠林銘璽字玉書普寕人順治辛卯舉人郝尚久叛招之不赴郝怒脅以兵銘璽集鄉勇守東山寨寨破死之闔門被害丁壯同難者八十餘人方鼎爵字毅正普寕人順治四年為邑守備土寇刦掠鼎爵集衆禦之鄉賴以安八年寇復犯界帶兵出􅁹殁於陣同時貢生方紹伯字燕祚亦率僮僕禦賊城陷遇害賴心台豐順鎮人順治二年九軍賊攻其所守寨心台突圍出赴饒鎮呉六奇請援返為賊執令誘開寨門以免死心台大呼曰援兵且至務堅守寨門不可開也賊怒斷手足然後殺之焚其屍黄新德海陽人由吏員為梧州竇家寨巡檢攝藤縣尉康熙十四年山寇至衆議棄城新德諭以大義願死守城陷被執罵賊死闔家五口俱被害事聞贈南寕䘙經厯陳添桂海陽人為諸生莊涖僕海寇林道乾攻東溝寨寨破莊舉家匿重垣中賊􅀗添桂詰主所在添桂紿以遠避賊斷其左手不吐復斷其右手終不吐遂斷其首去莊出為殮􅁙如禮今墓在畸溝田人呼為義僕冡謝紹舉海陽監生少􅀌事母孝母殁親負土成墳康熙十三年劉進忠叛與其子􅰣捷俱從征屢著勞績建祖祠置祭田正己勵俗鄉人推為約正卒祀鄉賢祠林廷燏海陽人康熙十七年以守備隨征雲南中箭陣亡賜祭葬􅄻子周同俊潮陽諸生時土寇猖獗同俊年九􅀊侍父疾不離側父殁含殮如禮哀慟過人不知其在危城中也卒祀鄉賢祠姚奪標潮陽舉人康熙中為武功令澹泊自矢食無兼蔬􅀊歉設厰賑粥條理精密上官奇其才欲引薦之竟告休歸攀轅者不絶於道卒祀鄉賢祠王玉振揭陽􅀊貢生内行修飭講濓洛關閩之學從學者衆所得修脯盡助貧乏康熙七年祀鄉賢祠謝謙揭陽人康熙中海宼楊二聯等犯儋耳謙與瓊山縣令茹鉉協􅁹設伏敗之焚巨艦五既而賊復聚數萬寇擾東西路陷海口所暨澄邁定安諸邑將逼郡城謙率七舟鏖戰一晝夜身被數十創力窮被執不屈死之謝如晦揭陽人自傷父母早世不及養徧遊名山擇吉壤負土成墳廬其側鄉鄰慕其行誼有事輒往質焉卒祀鄉賢祠許茂繁揭陽人事繼母孝撫兄子慈捐田置義冡施棺以給貧乏卒祀鄉賢祠方廣益惠來諸生事親以孝聞推産與諸弟姪賑粥施藥治塗􅄟骼日無虚晷郡將李某北還販子女以歸廣益捐金贖還無德色耄年猶敎授生徒人稱謙之先生卒祀鄉賢祠陳正運澄海人康熙十三年劉進忠叛脅之不屈時軍興旁午徵賦亟正運獨先輸納宗族有逋負者悉代完之兄患沈疴禱以身代兄愈而正運果卒祀鄉賢祠歐亮豐順鎮人康熙十三年劉進忠黨據揭城亮時為中軍率兵恢復駐磐溪都逆黨夜襲死之王國充潮陽貢生值海寇擾掠國充募丁壯儲芻糧為官軍聲援亂平課子弟讀書置祀田嵗饑助賑施棺卒之日鄉鄰為之泣下雍正六年入祀鄉賢祠張奕靈大埔人少以孝稱修學舍置義田築堡寨建橋梁終身不倦卒祀鄉賢祠余良佐澄海諸生侍親疾衣不解帶居喪哀毁幾殆廬墓三年􅀊歉捐產賑饑卒祀鄉賢祠蘇權普寕人少􅀌家貧母病走數百里求藥家稍裕以不逮養為憾􅀊饑指囷以濟又捐􅚉都烏洋田租近千石以供宗祀卒祀孝義祠鄭大進揭陽人乾隆元年進士由直隸肥鄉令厯升山東濟東道時高唐茌平諸縣積潦阻道大進徧厯相度宣􅂥得宜擢兩淮鹽運使四十四年以湖北巡撫署總督值江水夏漲大進以安陸荆州二府地濱大江藉隄為衛修築不可不固鍾祥潛江荆門江陵等處隄並應審地勢高下寛狹改築月隄俾水發江寛不致地逼受衝又疏言楚省敎匪貽􅊣風俗自今牧令宜據實聞之院司覈辦其諱匿徇縱者劾之上韙其言尋授直隸總督奉命查勘永定河工及陳奏保定九龍河各事宜皆稱於官㫖加太子少傅衝卒賜祭􅁙謚勤恪黄壯畧揭陽人乾隆武進士任貴州安籠都司從征金川屢立戰功以勞卒於軍祀昭忠祠許斌澄海人官閩督標叅將乾隆三十四年隨征緬甸戰於老官屯中礮陣亡事聞贈總兵世襲雲騎尉子祀昭忠祠麥逢春澄海人乾隆五十二年以把總隨征臺灣升千總帶兵援諸羅遇賊於大崙庄圍之數匝逢春奮勇衝突刅賊無􅈫力竭陣亡恩予雲騎尉世職洪日陞澄海人嘉慶十三年以把總隨總兵林國良追賊張保仔於新安至鴉洲洋礮矢俱盡援兵不至衆有退心日陞大呼殺賊麾舟前逼手刅三人與國良俱殁於陣恩予雲騎尉世職流寓宋趙鼎聞喜人為秦檜所忌謫清遠軍節度副使潮州安置在潮五年杜門謝客時事不挂口有問者但引咎而已李心傳井硏人理宗時以言事去奉祠居潮州明林興祖福州人洪武初從父宦遊遂家海陽為人􅂤重苦學不輟事母至孝以才行舉厯官工部即中廣西叅議調交阯卒列女宋張達妻陳氏名璧娘饒平人達從端宗於紅螺陳送之洲上今名辭郎洲又作平元曲寄達後得達屍􅁙之不食死明周瑶妻郭氏名真順潮陽人少通五經工詩文元末大亂衆推瑶為寨主真順諫止之得免禍明初指揮俞良輔征嶺南真順作詩上之舉寨悉宥三子彦敬彦作彦器皆以儒生被薦得官彦敬妻莊氏遭亂自刎林崇鳳妻王氏潮陽人值流寇肆掠王抱子出避為所執欲犯之且曰不從當先刄而子王紿曰此㓜穉無知待哺乳而後可俄見旁有嫗得釋陰以子寄之曰為吾還夫善視此兒吾死不恨矣遂遇害林恭伯妻楊氏名金惜揭陽人天順中海寇魏崇輝為亂金惜為賊所掠義不受辱投水死時同縣林廷明妻全氏年十七亦被掠自刎死呉喜妻陳氏潮陽人正德中賊首曾鈀頭等流刧陳被執欲犯之不從脅以刄曰吾有死耳刄何足云罵愈勵賊怒至碎頰剖胸終罵不絶口賊去得其尸曠野中猶怒目上視兩手堅持其衣不解見者皆嘆息流涕馮兆亨妻閔氏海陽人嘉靖中倭寇破城閔為所執不屈剖腹而死同時與難者邱氏二女行過萬里橋投水死又有呉氏以罵賊􅀍殺余廷瀚妻陳氏海陽人年二十五而寡甘贫守志撫􅀌鼎既娶而夭媳葉氏年二十痛姑少寡夫又無後竭力事姑節孝並著嘉靖十七年詔旌其門曰雙節謝澍妻陳氏海陽人年二十一澍卒遺􅀌亦死姑蘇氏病癰氏爲䑛癰病目爲䑛目姑病隨愈嘉靖二十年旌余衍年妻黄氏海陽人夫病卒黄不食旬日伺守者懈登樓自縊時年三十洪有執妻張氏饒平人嘉靖戊午倭破南洋張爲所擄以手攀樹不行倭斫其手猶挺身倚樹而死同邑陳思鳴女陳懋女俱以罵賊死又有鄭以興女賊至度不免先投井死陳氏女饒平人嘉靖中爲海寇所掠以刄迫之行遇柱堅抱不去賊斫之血流徧地罵益甚死柱下林東奇妻黄氏澄海人嘉靖乙丑白峭賊夜劫其家黄竄身池中賊搜得以刀脅之大罵不屈死同邑杜一命妻王氏土寇朱良寶聞其美率黨掠之王自經死又陳氏女爲海寇所執亦以罵賊不屈被殺黄頊妻方氏惠來人年十九而夫亡及􅁙令治二壙自經死張公宰妻李氏年二十一夫亡亦自經章漠妻蔡氏海陽人夫為史道卒蔡年三十事姑甚謹姑女婿張某欲犯之不從反誣愬於姑姑信之蔡遂夜投河隣婦救以歸將旦伺守者稍懈遂自刎戴􅀖玉妻鄭氏海陽人隆慶􅀄海寇林道乾掠邑鄭時歸母家舟發而寇舟奄至鄭度不免遂襁􅀒其嬰兒投韓江死羅宗達妻鄭氏大埔人為巨寇藍松山所掠義不受辱噀血罵賊而死又有巫曰清女年十七為海寇張連所掠自度不免乃解釵珥授親屬使遺其母自投水死呉欽藩妻藍氏大埔人夫亡及􅁙藍攀輀而泣曰夫柩往我何依遂扃户自經家人入救投以酏漿齒噤不受越五日死時年十九唐閔妻陳氏饒平人年二十歸閔為土賊張阿賀所掠罵曰奴輩安得無禮亟自投於水賊援之起罵不絕口遂遇害本朝楊某妻曾氏海陽人順治三年為賊所執欲載之歸曾不從乃先取他婦縳置碓上􅋹以示曾曾不為動賊縳曾復解之者三曾罵愈厲遂焚死于碓旁同邑呉元會妻陳氏順治七年兵掠彩塘鄉陳間變偕其女三娘與從女大娘同投井死兵退出其尸顔色如生陳某妻翁氏海陽人夫卒閉户自經陳阿戍妻張氏名順娘海陽人阿戍入山樵採死于虎氏走拾殘骸歸入室刺喉垂斃姑救之甦􅁙夫畢夜縊於床時年十七楊鍾蘲妻謝氏海陽人年十七歸楊二十五而寡至七十而卒有婢感其節亦相守不嫁同邑劉茂􅔘妻梁氏年十八歸劉二十四而寡卒年七十有六苦節與謝相似云曾敬妻黄氏掦陽人順治三年九軍賊破城氏閉户自經同邑郭用章妻曾氏為賊劉公顯所掠不屈遇害魏學銓聘妻呉氏揭陽人年十五未嫁而學銓卒女聞訃即奔喪守志迄大祥扶病撫棺哀泣遂卒謝名選母李氏揭陽人值亂舉家為賊所擄把石自沈名選救之得不死俟閒偕女純玉及子婦陳氏俱自經明選死之賊解李繯己氣絶棄屍城下經宿李忽甦得歸事定收三屍衣履猶在顔色如生楊良宏女饒平人順治十五年海冦破大埕所女被掠罵賊自刎時年十六林曰覲妻方氏惠來人年十九歸林夫亡殉節同邑鄭俊臣妻林氏夫卒視含殮畢入室一慟而絶饒希關妻李氏大埔人順治六年江龍入寇為所掠投河死同時范志安妻連氏城破同九􅀊􅀌擄至賊舟負子投水死林紹錝妻周氏海陽人夫亡守節康熙二十一年旌同邑曾良在妻陸氏梁省潛妻楊氏薛馨源妻莊氏陳振河妻呉氏均康熙年間旌蘇齊軾妻陳氏潮陽人夫亡守節康熙五十一年旌其娣蘇齊轍妻楊氏同邑姚爵士妻陳氏均康熙年間旌郭天稠妻楊氏揭陽人夫亡守節康熙四十五年旌同邑郭經妻陳氏陳用行妻洪氏周洪瓊妻陳氏陳晋啓妻林氏李衍淳妻林氏郭日紹妻紀氏陳萬穎妻蔡氏均康熙年間旌王元長妻楊氏普寕人夫亡守節康熙四十五年旌林元貴妻黄氏海陽人夫亡守節雍正四年旌同邑丁達春