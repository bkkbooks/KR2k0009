武初詔授惠州路同知陳敬祥符人洪武中知龍川縣時盜起為患都司官欲統兵來􅁹敬密遣人誘其首擒之不遺一矢民頼以安鄧文張寕都人洪武中知河源縣縣經兵荒民多流徙虚税幾及六千石悉奏免之鄭述莆田人宣德中為府通判民居率茅茨竹椽易致火患述教民陶瓦構木環之以堵火患遂息正統七年按察使郭智等薦其行謹才優擢南雄知府邵銅閩縣人天順時以御史劾曹吉祥石亨下獄謫博羅知縣莅政嚴明能釐宿弊嘗督造冊籍括為易見圖至今式之方良節莆田人正德初知惠州府有中官奉使索賄所至奉命惟謹良節獨不為寇猖獗四省㑹􅁹未克惟日單騎招撫感動投誠復條陳固守機宜設兵駐防岑岡氏得安業未幾卒於官陪祀王守仁祠潘好讓濟寕人康熙進士二十六年任龍川縣修邑乘興義塾邑多服毒誣命居奇好讓立重禁嚴反坐在任四年以病休卒祀名宦人物宋古成之字亞奭河源人端拱初進士淳化間李順亂蜀張詠辟知魏城縣亂俗一變咸平五年蜀又警詠再辟令綿竹初道由潭州遇異人韓泳邀以仙術答曰親老祿仕長生非所願及登第泳復勸之不為動至是嘆曰親没何以仕為慨然賦思羅浮詩未幾卒於官四世孫革紹聖初進士教授瓊州招諭蠻洞叛黎擢守潮州有惠政翟逢亨歸善人博學事母至孝居白鶴峯東蘇軾謫惠時嘗與往還易青歸善人為都督行府摧鋒軍紹興六年經畧使連南夫與統制韓京督兵討曽兗京遣青夜刧兗營為所執賊驅至後軍趙續砦外聲言大軍俱已就擒青呼曰勿聽所擒者我耳賊又言吾不殺汝第令經畧來招撫青又呼曰任賊殺我我以一死報國賊焚之青罵不絕口事聞贈保義郎閣門祗候張宋卿字恭甫博羅人紹興間擢進士第除秘書省正字遷校書郎正色立朝不通權貴胡銓張浚薦之終知肇慶府潘預字晉卿博羅人善易嘗著易範八篇三山林東少許可抵羅浮聞預論易遂為之屈乾道中以特科授宜州司法叅軍明王度字子仲歸善人洪武末舉明經授御史靖難兵起方孝孺與約死社稷及成祖嗣位謫戍賀州抗詞不遜遂被殺劉簡字以忠歸善人永樂中由鄉舉為交趾諒江州判官洪熙元年黎利叛攻劫郡邑所在皆奔降獨簡城守數月援兵不至城遂陷被執不屈而死其弟及妻子七人皆赴井而死王佐海豐人永樂中舉於鄉擢吏科給事中器宇凝重奏對詳雅為宣宗所知超拜户部右侍郎正統七年進尚書調劑國用節縮有方後死土木之難贈少保諡忠蕳李容字思誠博羅人正統進士由户部主事厯山東右布政以治平卓異聞成化中召為工部右侍郎治河蘆溝天津築隄錢塘皆有功績姚祥字應龍歸善人成化進士由縣令擢御史有政聲正德初遷雲南按察副使以忤劉瑾謫戍鐵嶺瑾誅復官卒於道張津字廣漌博羅人成化進士由大城知縣擢御史數有論諫出為泉州知府以忤劉瑾削職瑾敗復官累擢右副都御史巡撫江南時有詔蠲逋租數十萬工部以歳瓣物料非所宜蠲征之如初津執奏謂朝廷不宜失大信於天下人疏言織造内臣二人歳計供應不貲宜令守備臣兼理取囘新差内官以甦民力又以國本未定請擇宗室之賢者育之宫中不報㝷卒於任贈南京户部尚書何宇新字子完博羅人㓜􅀌事母至孝母亡廬墓其師陳獻章貽以詩曰遶舍烏成陣終年虎卧門山梅初並蒂冬竹又生孫葢紀其實也宏治中舉鄉試官至宗人府經厯葉夢熊字男兆歸善人嘉靖進士由縣令屢擢御史以諫受把漢那吉隆貶郃陽丞屢遷山東右布政萬厯十七年擢右僉都御史巡撫陜西進右副都御史移甘肅夢熊有贍決敢任事㑹哱拜反上疏自請討賊尋代為總督寕夏平以功進右都御史加太子太保兵部尚書陳吾德字懋修歸善人嘉靖進士隆慶中厯給事中以歲首日月並食請帝屏一切玩好應天以實詔遣中官督織造偕同官嚴用和切諫己復偕給事李巳諌市珍寶被斥為民神宗立起官數有論諫以忤張居正出為饒州知府後終湖廣僉事陳大禮永安人為藩司掾嘉靖末賊起告歸築壘積粟訓練什伍扞保鄉里備兵使者檄率鄉兵同千户討曽廷鳳戰於黄沙官兵􅁍大禮奮罵曰公等糜􅅒食欺朝廷我敢惜死以辱國􅁘力戰死之督府賜金祭葬為立祠徐春芳和平人嘉靖末痛祖父為賊所殺會縣兵擊賊謂友人曰吾行矣友以其未有子止之不聽赴敵死焉訃至妻曽氏自收簪珥遺姑抱女痛􅂘而絶葉春及字化甫歸善人隆慶初由鄉舉授教諭上書陳時政三萬餘言都人傳誦遷惠安令民感其德政㝷引歸以太常卿艾穆薦起鄖陽同知入為户部郎中卒春及剛方亷介位雖不達時論重之黄讓永安人其兄為賊所掠罄囊贖之賊又掘其父母塜責贖以金讓以身質賊壘易親骨歸旋脫身復率其二子啟魯啟愚將鄉兵殺賊隆慶五年擒賊蘇允山啟愚死焉又明年從監軍道為先鋒擊賊賊據險堅壁讓深入賊巢誘之官兵乘間而進啟魯以父陷賊大呼先登奪讓歸而身被創死萬厯中旌其門曰一門三孝楊起元字貞復歸善人萬厯進士改庶吉士授編修奉命冊封崇藩取道盱江就羅汝芳論學證悟有得曰吾乃今如客得歸矣因繪汝芳像懸之出入必告清修姱節雅為士大夫所重官至吏部左侍郎卒諡文懿張萱字孟竒博羅人萬厯中舉於鄉官至平越知府好學博識經史百氏靡不淹通其平生著述甚富為時所重本朝龔克孝歸善人少􅀌哀毁如成人事所後父母如所生墲兄姊之􅀌不異已子順治戊子已丑荐飢減已飱以食甥姪從兄克修赴都道卒克孝匍匐數千里迎其喪以歸常以惠民凋瘵陳之當道夫役得減其半人德之卒祀鄉賢黄易字子參海豐人順治進士知歸化縣康熙十三年三山變起易修隍栅為守禦計既而不支遂徽服間道乞援於贛已復走粤竟以勞卒事聞贈按察司僉事李逢祥字瑞其龍川人順治甲午領鄉薦性至孝慷慨仗義當賊孽肆虐籌機應變多出事先康熙甲寅潮郡大亂逢祥以鎮靜處之安堵如故水寨為邑門户白頭賊脅衆數萬逢祥推誠招撫守禦並嚴遠近賴之鄺奕垣河源人順治進士知聞喜縣善奬育人材以憂歸廬於門左終喪不入内寢補碣石知縣治如聞喜清操朗識上官韙之黎允吉河源人遇事有膽畧國初王師至擒􅀗土賊誣其邑到吉砦民為同黨帥將發兵屠砦允吉與其弟造帥營力白之帥鑒其誠乃止全活者數百家捐金掩骼煮粥賑飢周宗族之貧者卒祀鄉賢嚴淑虞永安人康熙六十年以孝子旌又同邑孝子甘怡何以平並雍正五年旌湛上錫河源副榜性至孝父殁哀毁三年不見齒任順德訓導捐俸修學宫勤講課並有功績順德人士為建湛公書院卒祀名宦李常茂博羅人提標外委補把總征苗有功乾隆元年六月陣亡入祀昭忠祠羅定貴歸善人南雄把總嘉慶三年隨征川匪陣亡八祀昭忠祠劉光時博羅諸生嘉慶七年賊匪陳爛屐四恣擾光時團練鄉勇為固守計賊攻之恵光時出戰死同邑諸生朱錫光亦爲賊所脅不屈死俱入祀節義祠流寓隋柳述河東解人以尚主拜開府儀同三司襲爵建安郡公攝兵部尚書煬帝嗣位坐除名與公主離絶徙於龍川宋蘇軾眉山人紹聖初貶寕遠軍節度副使惠州安置居三年泊然無所蔕芥人無賢愚皆得其歡心蘇轍軾弟紹聖初落職謫雷州安置移循州唐庚丹稜人以張商英薦提舉常平商英罷相庚坐貶安置惠州陳次升仙遊人徽宗時爲侍御史極論章惇蔡卞曽布蔡京之惡崇寕初除名編管循州政和中始復舊職陳鵬飛永嘉人紹興中官侍講以言事忤㫖謫惠州所居面湖吟詠自適有羅浮集十卷留正永春人少游惠州歸善處士徐敦實以女妻之因家焉後舉紹興進士拜左丞相封魏國公呉潛寕國人理宗時爲左丞相元兵渡江極論奸臣誤國落職謫循州安置賈似道使武臣劉宗申守循以毒潛潛豫知死日語人曰吾將逝矣夜必雷風大作已而果然時景定三年也循人聞之咨嗟悲痛列女明郭觀妻侯氏歸善人正統間觀任廣西平南訓導猺賊劫縣氏與子紹輝俱被掠賊方飯以飯授氏氏擲於地賊怒以矛鏦紹輝死焉氏大呼曰何不殺我使母子骨肉一處遂遇害事聞旌表姚氏女博羅人世居公莊峝宏治中寇掠其郷女走山谷間寇追至欲犯之女厲聲罵賊投崖死黃佩妻謝氏和平人正德中賊張文昌之亂謝年十九抱女奔竄賊逼汚不從先殺其女謝大罵賊殺之時同邑徐昇女年十六亦被執罵賊遇害周德高妻李氏博羅人嘉靖間河源賊李亞元流劫被擄至元岡欲汚之李紿以汲水赴井死潭氏三女博羅人諸生光旦女嘉靖中賊破沙上村光旦挈家樓居賊攻樓急女度不免相率墜樓死黄氏女永安人隆慶初賊破貴峯寨女時年十六與父君庸皆被執紿賊曰若釋父歸當相從賊喜從之女睨旁有刀遂自刎而死周氏二女龍川屯軍周應良女隆慶中賊鄒嘉儒破屯長女年十八厲聲罵賊賊刃之次女年十六逃鄰家縊於僻室時稱雙烈朱自省妻方氏歸善人年十六被賊擄負之以去方噬賊背齒肉俱脫賊怒臠斬之郭于襄聘妻嚴氏字鳳姑歸善人初許字郭後其父以郭家貧欲别字富室女泣諫不從將受聘潛出投江死徐亞孫海豐人徐子明女年二十三未嫁為海宼所掠不從賊支解之鄭世逢妻盧氏海豐人為流賊所掠義不受辱絶粒數日嘔血而死陳某妻呉氏海豐人夫早夭舅姑欲令再嫁呉堅執不從遂自縊李棠妻卓氏海豐人海宼薄甲子城棠被執百計贖之不得卓乃自往賊營易棠歸乘間投水死鄒士第妻黄氏龍川人峝寇焚劫其家氏踰垣走賊追之遽投井賊復曳出大罵不屈死又同邑傅天祐妻陳氏夫亡二日自經以殉羅辛叔妻張氏連平人為賊陳萬所擄欲汚之不從先斷其髪次斬其手指堅拒罵賊而死葉彦榮女河源人年十七為賊所擄行至磨刀石險甚行者皆下馬女顧曰此吾死所矣投身崖下越句日得其尸面如生時人因名其石為烈女石本朝陳貞女歸善人名年姐許字李花結順治二年賊陷城懼為所汚密紉衣裾自縊死張燾妻韓氏博羅人順治三年遭賊亂韓先匿複壁中聞欲殺其母驚呼出救觸刃死兵釋其母而去同邑黄良豫妻張氏被掠不屈死韓如琬妻劉氏扶姑藏匿鄰舍賊捜􅀗之欲殺其姑劉奪刃被害其姑得免張天定妻謝氏年二十三而寡賊執其舅張鯨謝力救死之徐基妻呉氏海豐人順治初為兵所京不屈被害林􅁚鎔妻陳氏海豐人順治三年為隊兵所掠抗節自盡總督佟養甲廉得其實戮隊卒給扁旌之黄鼎甲妻藍氏龍川人流賊陷城藍負其㓜子满㓜女淑英赴深淵死王某妻呉氏連平人名美孃順治初為賊所掠不屈遇害陳慶公妻林氏河源人夫亡守節順治十年旌同邑李琮妻江氏十七年旌王應曾妻陳氏歸善人為盜所掠經赤沙渡投水死鍾氏永安人失其夫名遇賊不屈被害康熙六十一年旌同邑謝永昇聘妻葉氏未嫁夫亡殉節黄子奇妻曾氏海豐人康熙十四年海賊滋擾曾年二十餘被擄露刃脅之不屈被害黎允吉繼妻尹氏河源人夫亡守節康熙二十五年旌徐章鈖妻姚氏歸善人夫亡守節雍正四年旌同邑黎元巽妻汪氏葉自生妻張氏李滋妻姚氏均雍正年間旌余濂友聘妻毛氏博羅人未嫁夫亡守節雍正四年旌謝錫川聘妻張氏海豐人未嫁夫􅶨詣夫家泣拜舅姑請為立後求葬地既得曰事畢矣遂自經雍正五年旌同邑節婦鄭廣禮妻陳氏潘乃垣妻呉氏戴廷佐妻梁氏張惟清妻陳氏戴學敏妻呉氏烈婦黄允欽妻陳氏均雍正年間旌黄繼茂妻郭氏陸豐人夫亡守節同邑黄寅日妻蔡氏均雍正年間旌崔星述妻鄭氏龍川人夫亡守節同邑羅廷櫆妻張氏均雍正年間旌何多藝妻羅氏連平人夫亡守節雍