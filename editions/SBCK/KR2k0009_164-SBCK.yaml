安南舟數百泊海中􅀅為寇嶺徼驚揺士宏灼其非是日從賓客宴遊為樂民賴以安劉夔建州崇安人仁宗時知廣州有廉名劉湜彭城人仁宗時知廣州儂智高初平湜練土兵葺器械作鐡鎖斷江路有盜據山招之不下湜知山民資之食即徙民絶餉盜困蹙乞降民乃安程師孟呉人仁宗時知廣州大修學校日引諸生講解負笈來者甚衆在廣六年威愛並行初州城爲儂冦所燬方伯踵至皆言土疏惡不可築師孟作西城廣十二里及交趾陷邕管聞廣守備固不敢來時師孟己召還朝廷念前功擢爲給事中集賢殿修撰蘇緘晉江人仁宗時調廣州南海主簿州領番舶每商至則擇官閲實其資商皆豪家大姓習以客禮見主者緘以選往商樊氏輒升階就席緘詰而杖之樊訴於州州召責緘緘曰主簿雖卑邑官也商雖富部民也邑官杖部民有何不可州不能詰張田澶淵人熙寕初知廣州廣舊無外郭民悉野處田始築東城環七里賦功五十萬旬日而成初役人相驚以白虎夜出田迹知其偽召戒邏者曰今夕有白衣人出入林閒者謹捕之如言而􅀗田有女弟聘馬軍帥王凱欲售珠犀於廣田曰南海富諸物但身爲市舶使不欲自汚耳作欽賢堂繪古昔清刺史像日夕師拜之周諝尤溪人熙寕閒知新會縣時青苗諸法方急郡縣望風諝獨不奉行且上書政府力陳其弊因求歸田里蔣之奇宜興人元祐中知廣州妖人岑深聚黨二千人謀取新興畧番禺包踞嶺表其􅀔張甚之奇討擒之南海饒寶貨吏多貪聲之奇取前世牧守有清節者繪其像建十賢堂祀之以變其習陶節夫鄱陽人哲宗時為廣州錄事叅軍揚元寇暴山谷閒捕繫徵屢越以逸且不承為盜既累年節夫詰以數語元即吐服􅀅適市與諸囚訣曰陶公長者雖死無憾李巖臨安人元祐初知東莞縣有東江隄夏潦暴漲瀕江之田多罹害巖築長隄捍之復築鹽潮隄十有二以禦海潮至今賴之王渙之衢州常山人崇寕中知廣州番客殺奴市舶使据舊例止送其長杖笞渙之不可論如法陳槖餘姚人紹興閒知廣州自兵興後廣東盜賊無寕嵗十年九易牧守橐盡革弊政以恩先之留鎮三年民夷悅服林勲賀州人為廣州教授建炎三年獻本政書十三篇朱子甚愛其書胡銓廬陵人高宗時以忤秦檜謫監廣州鹽倉葉容仙遊人紹興中為南海主簿攝尉盜發州檄巡尉同捕巡檢􅀗盜十餘人歸其勞於容容曰掠美欺君倖賞三者皆罪不忍為也帥曾開大喜之方信孺興化軍人寕宗時為番禺尉盜刦海賈信孺捕之盜方沙聚分鹵􅀗惶駭欲趨舟信孺己使人負盜舟去矣乃悉縛盜不失一人洪天錫晉江人寶慶中授廣州司法長吏盛氣待僚屬天錫糾正為多曾逢龍寕都人咸淳末為新㑹令以節㮣自許政務化民有古循良風明道同河間人洪武中知番禺縣時永嘉侯朱亮租出鎭所為多不法豪民䘙卒怙勢横行同數與爭事積迕被誣太祖遣使誅同會同奏至急命赦之同己死邑人為建祠祀之彭豫㳟和人洪武中為香山縣丞邑在海島間地僻俗囂為政者多以猛豫獨以寛久而民皆化服常延集生徒親為講授誘掖不倦陶魯鬰林人景泰中以􅄻除新會丞時年弱冠從知縣王重受學晨侍講授畢然後出視事己代重攝縣吏事精敏吏民敬其威信滿秩當遷會􅍹寇入犯民詣府乞留天順七年就擢本縣令設守破賊以功進廣州同知仍知縣事高瑤閩縣人成化中知番禺縣多異政市舶中宫韋眷私造巨舟通番瑤發其事没其貲鉅萬眷憾甚誣奏於朝被逮士民泣送者塞道丁積寕都人成化中知新會縣師事邑人陣憲章為政一以風化為本良家子不事生産者聚之廡下使誦小學親為解説毁淫祠定禮制均􅍹役抑權豪士民戴之嵗大旱築壇於圭峯頂昕夕壇下八日兩大降由是得疾遂卒士民相聚􅂘於途呉廷舉梧州人宏治初知順德縣總督屠庸屬修中貴先祠廷舉不可市舶中官出銀市葛意責其贈遺廷舉即市二葛與之曰不可則請還銀中官怒持銀去御史汪宗器亦惡之會廷舉毁淫祠二百五十所改葺學宫書院崇器欲坐以侵盜下獄按問終無所得乃慚而止鄒守愚莆田人嘉靖時為廣州知府不私一錢辨誣獄釋滯囚至數百人新會人激於徵逋聚海舶為變監司招之不應曰必鄒府君來守愚單騎往諭遂就撫胡友信德清人隆慶中知順德縣邑多盜友信為立四應社一鄉有警三鄉鼔而援之自是盜息其始慮民輕法涖之以嚴後令行禁止更為寛大或旬日不撻一人縣故土城屢遭寇毁友信改築石城日臨畚鍤間以勞卒官民立祠祀之董應舉福州人萬厯時為廣州府學教授以古學倡諸生製學宫祭器教學習射諸廢具興税璫李鳳欲得學旁壖地上官議子之應舉爭之不得􅀅投劾諸生固請事􅀗止本朝汪永瑞徽州人順治時知廣州府革弊釐奸政平訟理卒於任粤人哀思之楊交泰江南人順治七年知番禺縣時粤中甫定大役浩繁軍需雜派交泰多方措置不􅃘苦民涖任三載以廉潔著田家修鳳陽人順治時知從化縣時兵燹之後家修力為撫綏安集流亡勸今開墾輕刑減訟殘黎以安孫繩臨淄人順治中知從化縣下車詢問疾苦上十事當事嘉其議花山盤古諸盜流劫近郊請兵􅁹之降其渠魁七人黨三百餘人販給石榼漢田諸村流亡日返以治行薦去劉象震霍邱人順治七年知新會縣時盜陳德貴作亂象震請兵擒滅之嵗饑行糜粥食民婦孺不能來者計口給米多所存活十一年春擢西安同知己辦裝值西逆犯城遂協力守禦八月圍解乃去張令憲無錫人順治中知香山縣因俗為理不事更張壬辰秋饑土寇梁於直陷城令憲父子不屈死之贈太僕寺卿沈蘭德清人順治時知香山縣時兵荒後貧富交困蘭加意撫循嚴汰供應差費禁戢悍兵市易流棍土豪一時斂跡土民始有生意蘇嵋汲縣人順治進士八年任三水縣邑當衝車馬絡繹嵋力紓之修􅓺宫興義塾催科不擾人甚德之康熙六十一年祀名宦李君柱黄岡人順治七年知新安縣潔已愛民嚴戢營兵之暴城守王守祖虐民爭之不得君柱移署城外竟棄官去上官廉得其實乃糾王去之馬以懋乾州人順治中知新安縣時經兵燹田地荒蕪民苦賦累以懋為之區别虚實邑以無擾婁君玉京䘙人為番禺縣茭塘巡司康熙二年沙灣賊周玉李榮因遷海作亂事平上官令開報賊黨姓名君玉屬鄉民曰此身可戮此民必不可枉力為分别一人不使株連賴以保全者無算陳璠京衞人康熙十九年為順德鎮中營遊擊海寇謝昌犯境璠率舟師力戰死守備馮俊千總岑嗣恪王起龍黄德貴赴援均死之徐勍鄴縣人康􅄉進士二十九年授順德令禁雜派免浮糧絶苞苴清保甲涖任四年始終勿渝雍正三年祀名宦楊熚漢陽人順治進士康熙二年授龍門令革濫徴修廢墜年飢設糜粥食民山寇肆虐率兵親􅁹民賴以安卒祀名宦王授位漢軍正黄旗人康熙四十三年授龍門令建義學練鄉兵值山發蟄水壞民居授位飢者食之死者殮之卒祀名宦黃日炌慈谿人康􅄉中知增城縣未至賊數千遮道不許進日炌單騎直前論利害遂散去增故盜窟尋皆自悔改行焉常罷供億省刑蠲耗悉心益民令行禁止胥吏不敢為惡邑常有虎患日炌誓於神患遂寢後有為虎所噬者皆盜賊也其亊尤奇龍之繩公安人康熙三年知新會縣時再定邊界人民流離之繩入境值餘禾棲畝即請聽民刈穫窮黎少蘇比視亊唯務休息常勸訟者曰吾與爾等生長干戈幸存性命百念俱當灰冷何暇復競强弱偶以傕科笞一里甲退即榜門自責人皆感泣顧嗣協長州人康熙四十六年由貢生出宰新會因俗成化薄賦輕徭清風弊勤聽訟至誠披示民以不欺卒祀名宦姚啟聖會稽舉人康熙三年知香山縣海盜出没不常啟聖率士卒親􅁹值再遷西北諸鄉界民挈妻孥號於路督遷之營弁猶􅔤掠聖挾刃前曰是皆吾赤子也顛連至此尚忍然耶弁感之悉還所掠暇則循行阡陌勸課農桑去官日士民涕泣奔送卒祀名宦樊翰桐柏人康熙中知三水縣甘澹泊勤撫字嘗曰正供外悉民脂膏何敢剝民自奉也每課士必告曰先立品母㒒僕謁上官遇邑有水災力請捐租民咸感之入祠祀焉史藻華州人乾隆進士五十六年知東莞縣嚴禁嚇索械鬬囂風一時豪猾斂迹六十年重攝邑篆清釐海邊沙坦嘉慶二年卒於肇慶知府任士民號泣往奠者不絶於道袁名器興軍舉人乾隆三十三年知新會縣勤於民亊有訟者立爲判斷不半載舊案一清一時戴若神明愛如父母嘗值大風覆獄牆囚犯無一逃逸解任日民懇切攀留􅂘聲載道侯學詩江寕人乾隆四十六年以進士授三水縣性廉慎勤案牘絶苞苴撫恤黎庶時有召杜之稱卒後民思其德立祠祀之李大根榆次人乾隆進士四十五年知新安縣勞心撫字待士以禮值歲飢糜粥以賑民賴存活者甚衆人物晉洗勁南海人世為部曲至勁讀書勵節為廣州中兵叅軍海寇盧循攻廣州帥兵出戰城陷被執循欲釋用之叱賊而死義熙中贈始興太守曲江縣侯諡忠義王範南海人讀書有識鑒常搜羅百粤典故為書名曰交廣春秋文獻賴之以存黄恭字義仲南海人教授生徒不就徵辟補廣州大中正蒐緝王氏交廣春秋補其遺漏意重倫紀多所發明後復廣為十三州記唐黄舒寶安人性至孝里人慕之比於曾參名所居為參里宋馮元字道宗南海人幼從崔頤正孫奭受五經大義與樂安孫質呉陸參譙夏侯圭羣居講學號四友大中祥符中登進士第累官崇文院檢討兼國子監直講真宗試進士殿中召元講易元進説曰天地為泰者以天地之氣交也君道主尊臣道主卑惟上下相與則可以輔相天地財成萬物帝悅詔與内朝仁宗時判國子監士議悅服後官至户部侍郎卒諡章靖丁連字玉甫番禺人元豐進士由司戸厯遷朝議郎元祐六年夏人侵靈州廷議討之連謂夏敢跋扈效契丹耳能先制契丹則膽落矣忤宰執意出為桂林教授後至朝散大夫致仕卒蔣之奇嘗歡其學之精博崔與之字正子増城人紹興進士授潯州司法叅軍厯升金部員外郎時諸郎多養資望不治事惟與之鉅細躬決猾胥不敢為姦全人遷汴朝議慮其進迫特進直寶謨閣令安撫淮東比至因滁阻山創五砦集義兵守之選練士卒教以陣法金人入境宰相三遺書令議和與之曰彼勢方張而遽議和必遭屈辱今山砦相望麥榖盡刈野無可掠諸軍并力敵能久駐耶金人卒深入無切而去擢秘書監權工部侍郎厯官渙章閣待制知成都兼安撫使即家拜命定摧鋒軍之亂尋徵為叅知政事踰年拜右丞相䈴樞密使皆力辭乃訪以政亊得失人才用食與之極言君子小人消長之機亟稱真德秀洪咨䕫魏了翁之賢勸帝求直言遠近習語甚切至嘉熙三年以觀文殿大學士致仕卒贈少師諡清獻與之厯任四十七年未嘗一玷彈墨論者謂其屹然大臣風節與張九齡齊軌云梁百揆字宗盛番禺人嘉定進士初授從事郎厯奉議大夫職非言路而直諫有聲退隱禺山闢異端學者稱端懿先生李昴英字俊明番禺人寶慶進士厯官不畏强禦史嵩之賈似道丁大全等俱爲听劾理宗嘗謂其南人無黨官至龍圖閣待制吏部侍郎歸隱文溪卒諡忠簡郭閶字開先番禺人淳祐進士擢監察御史論廣州置買銀場以鹽科配暨征榷諸弊罷之既没廣人以配事崔清獻黄俊南海人德祐中元兵陷臨安廣東經畧遣李性道等拒之俊從征至石門力戰援絶不屈死之熊飛東莞人景炎初元軍入廣州飛倡義勤王出奇計斬其將姚文虎盡殲其軍又以兵應制置使趙晉復韶州元軍度梅嶺飛與新會令曾逢龍禦之逢龍戰死飛退保韶州守將劉自立以城降飛巷戰死許之鑑東莞人與熊飛同起義兵飛死走從文天祥於汀州力戰五坡嶺被執不屈死石文光增城人景炎二年元兵下廣二王航海文光從陳宜中供兵占城察其無還意遂率所部兵囘廣時盜蜂起民賴其捍禦之功既沒立廟號爲石神馬南寶香山人景炎二年端宗航海過邑獻粟供軍拜權工部侍郎廣州陷諸將募兵以行南寶慷慨激烈酌酒勵之宋亡悲憤不食後聞帝昺猶在占城乃與黎德梁起莘起兵迎駕起莘萌二心奔還德反攻之戰敗南寶被執死之元陳韶孫番禺人父劉以罪流肇州韶孫年十嵗不忍父遠謫號泣從之跋涉萬里過遼陽平章達春見而憫之曰天子寛仁罰不及嗣吾返汝故鄉韶孫曰既不能以身代父當死生以之歸非所願也及劉死韶孫哀慟見者皆為泣下韶孫還鄉里乃旌異之達春舊作搭出今澤改明王佐字彦擧先河東人占籍南海與孫著齊名何真使掌書記參其謀議佐勸真招致文學之士一時嶺南人文號為極盛洪武六年官給事中李德字仲修番禺人好學工詩文洪武中厯官漢陽義寕教諭晩好洛閩之學謂誠意為古聖傳心之要嶺南人稱聖學必首推之孫蕡字仲衍順德人性警敏於書無所不窺詩文援筆立就洪武初官翰林典籍為宋濂樂韶鳳詹同輩所稱與修洪武正韻所著有通鑑前編綱目孝經集善理學訓䝉西庵集和陶集多散佚不傳番禺趙純稱其究極天人性命之理爲一時儒宗云唐豫順德人父奎洪武中舉經明行修爲增城教諭遭寇不屈死豫痛父非命作蓼莪亭絶意仕進與同邑周祖生周祖念劉子羽劉子高何淮號六逸皆德行醇謹衣冠嚴偉爲人所欽子璧亦有文行動遵禮法亊母孝縉紳欲薦之以母老辭何真字􅀖佐東莞人元末大亂真起兵據廣東安輯軍民一方賴之後以其地歸明太祖封東莞伯黎光東莞人以御史出巡蘇州民罹水災乏食請於朝得賑貸全活甚衆巡鳳陽陳時政極剴切太祖嘉之擢刑部侍郎執法不阿陳敬增城人洪武中以賢良舉授禮部郎中左遷雲南曲靖府幕官尋署劍川州事值鄰寇竊發來攻州城敬親率壯士禦之以衆寡不敵力戰而死周新南海人永樂中爲御史剛介多彈劾貴近畏之號爲冷面寒鐵巡按福建及畿輔風紀大振超擢浙江按察使聲績益著爲奸人所誣逮至御前新抗辯成祖怒立棄市後深悔之陳諤字克忠番禺人永樂中由鄉舉爲刑科給事中性剛介聲如洪鐘彈劾不避懽貴成祖器之呼為大聲秀才厯官順天府尹陳連東莞人由進士知滁州宣德中以有學行由四州控察使召為通政使掌國子監事終禮部左侍郎博學工文操履誠篤嶺南奉為師表羅亨信字用實東莞人由進士授工科給事中英宗立擢右僉都御史練兵平涼復巡撫宣府大同土木變作有議棄宣府城者亨信杖劍坐城下令曰敢出城者斬人心始定後以守邊功進左副都御史盧祥字仲和東莞人正統進士厯吏科給事中好議論識大體雅以風節自持同官中獨與林總善凡有獻納多協成之故名稱亦相埒天順時屢遷僉都御史巡撫延綏留心邊務數上封事多合機宜陳獻章字公甫新會人性至孝偶出外母有念輒心動馳歸正統間吳與弼倡道臨川從之遊歸築陽春臺静坐其中不越閾者數年其學貴自得而後傳之以典籍教人但令端坐澄心於靜中養出端倪布政司彭韶總督都御史朱英先後論薦特授翰林檢討令歸終養學者稱白沙先生萬厯中從祀文廟追諡文恭張詡字廷實南海人力行好古莆田彭韶見其詩美之曰嶺海􅀌鳳也受業陳獻章登成化進士請告歸無仕進意有司趣之赴部授戸部主亊再遭親喪遂隱居不出御史賈鎧等先後疏薦不起即其家拜南京通政司叅議辭不赴李孔修南海人受業陳獻章好讀書尤善周易家貧糲食不給不肯投合於時嘗著朱子深衣入夜不違二十年不入城市學者稱子長先生陳庸字秉常南海人舉成化閒鄉試師亊陳獻章羅倫莊昶望重一時少所許可遇庸輒心服授荆門同知到官五日棄歸足不履城郭病革沐浴更衣設師像再拜而卒彭誼字景宜東莞人正統中鄉舉厯官右僉都御史提督紫荆諸關成化四年以右副都御史巡撫遼東誼好古博學通厯律占象水利兵法之屬平居謙厚簡黙臨事毅然能斷鎮遼八年軍令振肅年未老四疏告歸家居四十餘年卒林光字緝􅄉東莞人好學博綜經史得呉澄論學諸書大感悟舉成化元年郷試遇陳獻章於京師與語大悦從歸江西為弟子己而築室欖山往來叩擊者十餘年除平湖教諭勉學者探本窮源反身修行一時士習丕變上敦風化養亷恥疏言甚懇切以古道正學薦擢國子監博士尋擢襄陽府左長史倫文敘字伯疇南海人宏治己未會試殿試皆第一授修撰進諭德孝友好學德器粹然館閣共推之子以諒鄉試第一成進士厯南京通政叅議以訓正德十二年會試第一官南京國子監􅀕酒以詵進士官南京兵部郎中海内傳為盛亊梁景行字宗烈順德人宏治時由舉人為崇明知縣歲饑請粟賑之存活數萬人除鎮江府同知相國楊廷和假子殺人論死楊一清時寓鎮江為請減一等罪不聽官終夀府長史梁焯字曰乎南海人正德進士為禮部主亊偕同官諫南巡杖闕下佛郎機使臣入貢至四夷館不跪焯執而杖之土魯番使臣冩亦虎仙等由江彬見帝帝顧之厚以是卑侮朝官焯獨約之以法官終職方員外郎張泰字叔亨順德人成化進士除沙縣知縣擢御史諫萬貴妃干政廷杖幾斃督京㡬學校巡按雲南俱有聲勘亊甘肅劾鎮守太􅁥傅德巡撫馮續等罪請逮治又言甘州膏腴地悉為中官武臣所據城北草湖舊資戍卒牧馬今亦被占請悉歸之軍且推行於延寕二鎮詔皆從之再遷大理少卿清理薊州屯牧復民侵地九百二十餘頃正徳初官南京右都御史劉瑾專權惡其不附己令以南京户部尚書致仕梁儲字叔厚順德人成化戊戌會試第一選庶吉士授編修正德時累擢吏部尚書華蓋殿大學士時多營建輒偕同官切諫又請早建儲貳不報秦藩請益封嬖倖儲承命草勅以危詞動帝事竟寢宸濠反與蔣冕扈從南征數危言苦諫世宗即位被劾乞歸卒贈太師諡文康王縝字文哲東莞人宏治進士由庶吉士改兵科給事中劾三邊總制王越巨猾老奸不可玷節鉞復列時政十四事正德中以副都御史巡撫蘇松上疏請育宗室子以定根本罷新増内官以省供億召還建言被黜諸臣以廣言路不報終南京户部尚書容師偃香山人正德中􅀒父避寇被執將灼其父師偃泣請代父得釋而師偃竟焚死年二十一鄺清隱新寕人正德閒温邊白石羣盜起兵備遣清隱等九人同往招撫賊抗命清隱等仗義聲罪遂皆被難兵備旌爲九節云方獻夫字叔賢南海人宏治進士正徳中爲吏部員外郎謝病歸讀書西樵山中者十年嘉靖初還朝以議大禮稱㫖累官吏部尚書武英殿大學士卒贈太保諡文襄獻夫雖錄議禮驟貴然視張璁桂萼性寛平遇事亦閒有執持不盡與附桂萼反陳珖獄請逮問官以獻夫言多免逮思恩田州亂獻夫請專任王守仁而罷鎮守中官思田既平王守仁議築城建邑萼痛詆之獻夫力陳守仁功狀城乃得築史稱其立身本末與所言是非固兩不相掩云霍韜字渭先南海人正德甲戌會試第一嘉靖初除職方主亊厯官南京禮部尚書禁喪家宴飲毁淫祠散僧尼置社學表忠節雖以議禮驟貴居官頗有所建樹時論爲優卒贈太子太保諡文敏張祐字天祐南海人襲世職爲廣州衞指揮使正德中累立戰功擢副總兵鎮守廣西敗臨桂灌陽諸猺破古田賊嘉靖時以王守仁薦鎮思田屢破劇賊祐馭軍有方不營私産性好書每載以隨暇即延儒生講論焉梁有譽字公實南海人嘉靖進十授刑部主事與李攀龍徐中行王世貞宗臣呉國倫謝榛等結爲詩社號七子嚴嵩柄國其子世蕃欲延納之有譽恥為所狎遂謝病歸所著有比部集弟有貞綿州守亦能詩王漸逵字用儀番禺人正德進士除刑部主事以母老請歸杜門讀書卜居蘿嶂山樹藝自給嘉靖中起原官上疏指切大臣當事惡之奪官歸穆宗時贈光祿少􅀸張澯字景川順德人正德進士厯禮部主事監督㑹同館會尚書王瓊欲假遣使土魯番為都御史彭澤罪嗾番人在館者􅁀澤過惡誘澯署牒且曰事成當有顯擢澯力拒卒不署進員外郎嘉靖三年伏闕爭大禮受杖被創死追贈太僕寺少卿鍾善經字理夫順德人正德進士由興化推官擢為御史屢諫武宗北巡嘉靖初給事中劉最以劾中官崔文謫外善經等抗疏論救且劾文不納遂告歸侍養親殁廬墓三年不御酒肉衰服未嘗去身劉士奇字􅀖正順德人正德進士授刑部主事錦衣千户陶淳枉法殺人言官請逮治不聽士奇再請竟正其罪遷員外嘉靖初議禮與諸臣伏闕哭諌杖幾死出守梧州超拜陜西叅政平七山寇擢江西按察使遷山東右布政未幾乞歸歐大任字楨伯順德人讀書纘言確有元本嘉靖時以貢生厯官國子博士終南京工部郎中王世貞品為廣五子之一有虞部集行世祁敕字惟允東莞人正德進士授刑部主事嘉靖初伏闕爭大禮廷杖厯郎中善決疑獄官終饒州知府黎貫字一卿從化人正德進士由庶吉士授御史嘉靖初請復起居注之制從之帝欲於承天立興獻帝廟貫疏爭之不聽既張孚敬議改學宫制損籩豆佾舞之數貫率同官力爭褫為民以夀終於家黎民表字惟敬從化人少從黄佐學詩復學書於文徵明得其家法由鄉舉官司務執政知其能文用為制勅房中書始王世貞主文盟進退天下士有續五子之目民表其一也其詩文曰瑶石山人稿北游稿弟民懷亦善詩有清居集湛若水字元明增城人少從陳獻章遊宏治末登進士由庶吉士授編修母喪廬墓三年授徒講學從者日盛嘉靖初厯南京吏部右侍郎進所撰格物通一百卷八年召為禮部右侍郎改南京兵部尚書條奏兵民便宜十事皆報可又禁火葬毁淫祠躬巡􅅵畝勸民農桑以其暇與門人講學四方賢士多出其門學者稱為甘泉先生卒年九十五贈太子太保諡文簡黄佐字才伯香山人嘉靖進士選庶吉士授編修厯廣西僉事累擢少詹亊與内閣夏言論河套亊不合尋罷歸佐學以程朱為宗抵家日與諸生論道學者因其自號稱泰泉先生及卒穆宗詔贈禮部右侍郎諡文􅁉岑用賓字允穆順德人嘉靖進士厯南京戸科給亊中考選軍政偕同官劾英國公張溶豐城侯李儒遂安伯陳鏸三人皆罷去隆慶中大計又劾尚書黄光昇錢􅀖彦等及大學士高拱殃民悞國為衆所忌出為紹興知府高拱再相挾前憾謫宜州縣丞卒鄧師孟新安人隆慶時父被海寇掠執師孟詣賊舟懇以身代寇釋父將别曰有諸弟勿念兒也遂沈海死何維柏字喬仲南海人嘉靖進士由庶吉士授御史因陳修省請罷沙河行宫金山功德寺工作并請撤安南問罪之師帝頗嘉納既疏劾大學士嚴嵩奸貪下詔獄廷杖除名隆慶時復官累遷左副都御史萬厯初厯吏部左右侍郎陳振飭百官八事極論鬻官之害張居正遭父喪詔吏部慰留維柏持不可出爲南京禮部尚書尋罷歸卒諡端恪龎尚鵬字少南南海人嘉靖進士由知縣入爲御史偕給事中羅嘉賓出覈南京浙江軍䬲并勘胡宗憲失律狀盡發宗憲貪淫及趙文華阮鶚輩侵盜罪厯按河南浙江所至搏擊豪强吏民震慴隆慶時擢僉都御史出理屯鹽躬厯九邊講求利弊凡所建置不爲勢豪所奪尋落職歸里萬厯初起撫福建進左都御史忤張居正罷歸天啟中卒諡惠敏歐陽暉字伯㬢從化人萬厯舉人知臨賀縣擢南京刑部主亊改調香河再調南京錦衣衞知亊以忤魏璫繫詔獄杖譴放歸尋聞同繫知府劉鐸致法辭家抵飛來峽赴水死黃公輔新會人萬厯進士初知浦城縣薄歛省刑民甚德之擢南京山西道御史疏劾魏忠賢削職歸璫敗起湖廣叅政駐長沙賊犯城設伏擒斬千餘復擊藍臨賊於寶慶殱其渠魁會推都御史以病辭歸起太僕寺卿轉左通政刑部侍郎兵部尚書皆不拜陳子壯字集生南海人萬厯進士授編修天啟中以忤魏忠賢奪職崇禎中厯官吏部右侍郎又以議宗室除名永明王稱號授東閣大學士大兵入廣州子壯起兵九江村戰敗死之本朝乾隆四十一年賜諡忠穆韓上桂字孟都南海人萬厯中舉於鄉少諳兵法倭人躪朝鮮上書請以奇兵出海道不報妖賊亂山東願以儒生往峴形勢亦不用官永平通判時關内屯兵十萬飛芻輓粟積有勞伐上桂天才超軼與人宴飲探題次韻援筆立就時目為嶺南才士之最明亡殉節本朝乾隆四十一年賜諡烈愍霍子衡字􅁴商南海人舉萬厯鄉試崇禎中厯官袁州知府解職歸己而復從唐王於廣州授太僕卿大兵克廣州謂三子曰臨難毋茍免三子齊聲曰惟大人命子衡因大書忠者節烈之家六字懸之中堂朝服北向拜赴井而死妾莫氏子應蘭及妻梁氏一女應荃及妻徐氏應芷及妻區氏俱從死本朝乾隆四十一年賜諡烈愍劉士斗字瞻甫南海人崇禎進士授成都推官署府蒃綢繆撫緝􅁨勤備至甲申八月闖賊破成都士斗罵賊遇害妻張氏偕其幼子及闔門二十餘人皆死之本朝乾隆四十一年賜諡節愍鄺露南海本朝乾隆四十一年賜諡節愍陳􅀖彦字令斌順德人少慷慨喜大節走南都上政要十三策不用舉崇禎末鄉試廣州肇慶俱破􅀖彦起兵高明約陳子壯共攻廣州敗還已而清遠指輝白常璨來迎遂入城固守城破不屈死本朝乾隆四十一年賜諡忠烈袁崇煥字元素東莞人萬厯進士慷慨有膽智初為邵武知縣以薦授職方主事升按察僉事監山海關外軍創議守寕遠善撫將士皆樂為盡力樞輔孫承宗深倚重焉尋擢右僉都御史巡撫遼東崇禎元年以兵部尚書督師薊遼二年我大兵越薊州而西崇煥引兵入援都城朝士誣其通和議􅀅為城下之盟縛下詔獄磔於市籍其家無餘貲天下寃之本朝嘉慶元年予祀賢良祠陳象明字麗南東莞人崇禎進士厯官按察副使分巡上湖南道所至以清操聞桂王時廣東地盡失象明調土兵東下至梧州榕樹潭遇大兵戰敗不屈死本朝乾隆四十一年䑗諡節愍張家玉字元子東莞人崇禎進士大兵至廣東家玉聚衆入東莞戰敗走西鄉其祖母陳氏母黎氏妻彭氏妹石寶俱死之家玉自投於水本朝乾隆四十一年賜諡節愍鍾鼎臣字彝公新㑹人崇禎進士厯嘉興知府大兵至浙鼎臣與紳士沈輝辰等朝服北面再拜自經死本朝乾隆四十一年賜諡節愍廖翰標龍門人天啟舉人知新城縣廉介自守解組歸不持一物丙戌大兵入城以二幼子託其叔耀龍自縊而死妻陳氏年二十四矢志撫􅀌人謂夫忠妻節云本朝梁佩蘭字藥亭南海人順治十四年領郷薦第一戊辰擢會魁改翰林庶吉士假還遊名山與諸文人詠歌風雅作述宏富世多傳誦陳恭尹字元孝順德人父􅀖彦死義恭尹博學工詩與梁佩蘭為嶺南詩人大家時名士多宗師之李作楫東莞人順治進士授溧陽令胥吏不敢干以私嵗荒設賑活民去官日民􅈼院司請留尋補九江同知土寇為民害親抵賊穴縛渠盜以歸升鶴慶知府值地震開倉借賑災􅀺皆得復業卒祀鄉賢莫士秀字彦升東莞人性至孝祖母病篤祝天願以身代病果愈母卒哀毀骨立臨葬傷足流血不止半曰始甦謂二子曰葬事畢吾􅀅從母地下大慟而絶譚六經龍門人積學篤行順治四年山寇破城殺典史汪熊六經罵賊死之戴覺龍門諸生性至孝順治四年賊破城擄其父欲殺之覺跪泣求釋願以身代賊憐之乃械其父覺又乞代賊乃兩釋之廖觀龍門人順治進士深究性理之學闡發陳獻章宗㫖四方來學者甚衆事親以孝聞樂行善事周急賑饑卒祀鄉賢姚􅱼增城人順治間山賊恣掠父憙被擄􅱼奔賊叩頭出血請以身代乃囚􅱼釋憙令以金贖金至得歸後賊餘黨復流劫各鄉邑令議撫之賊曰必得孝子姚􅱼來乃降􅱼遂招降徐其等四十六人分插各鄉開墾邑賴以安林宜逢新會諸生順治甲午與母同居圍城中有悍卒欲烹其母宜逢求以身代許之及解衣见其瘦將置之其黨不從宜逢妻陳氏曰子代母妻豈不可代夫乎遂就烹時人稱曰孝子義婦之門葉夢稷新㑹人少􅀌事母孝順治丁酉舉賢書戀母不赴公車崇尚正學曠懷安遇卒祀鄉賢繆志和香山人順治貢生事父母以孝聞值年荒收養棄孩母病􅈼天願以身代己有疾必强起行坐恐貽母􅁨也以母老不仕年七十孺慕彌篤卒祀鄉賢勞翀南海貢生性孝友􅃉理學康熙壬戌授廣寕教諭㑹海寇内攘翀作書詳諭招其子弟投戈講藝悍氣遂醇歸家時邑有水災傾橐以賑全活三百餘家卒祀鄉賢張權順德人康熙武舉任恩平守備癸巳冬賊周廣生等焚劫城南權領兵出敵被礮死祀忠李祠羅良會順德人嘗以母病市藥囘遇賊將殺之良會請進藥而後就死賊釋之謝昌之亂良會􅀒父而逃賊追及欲並殺之良會出腰金以贖賊嫌其少請活父而殺子賊感其孝乃俱免焉馮天載增城諸生少􅀌性至孝母卒廬墓五年每疾風暴雨必繞基悲號聞者酸楚初母在時日走數十里市肉以供母殁終身不肉食卒因哀泣過多致枯雙日黄騰五新會人事父及繼母至孝兄騰三為舟子所􅆷騰五廉得賊所􅀌身往殺之竟復其讐時族人黄隆光亦以孝友聞韋元懿香山人康熙五年海賊襲翠微村元懿招衆擊之遇於老鴉口吼聲如雷復以頭觸賊胸仆地賊衆驚潰次年庵山被寇率衆赴敵賊聞其勇遮道擊之遂遇害鄉人感其義祀於西社同縣楊必名遇賊脅降不屈死鄭九琨香山人前山寨把總康熙中海寇鍾吉生劫翠微村擄男婦而出九琨忿曰為朝廷守土縱賊横行何以生為率親丁十一人擊賊中火鎗九琨揮衆退猶挺立作擊殺狀賊不敢近良久乃仆地死湯命䕫新寕人康熙舉人年十四父殁哀毁骨立任新貴令革陋規四十條民情歡戴旋里教授生徒儼同寒素卒祀鄉賢黄士龍花縣人康熙舉人孝友篤學花邑先隸番禺從化界多寇盜有貧而被掠者士龍出金贖之倡議陳請建城官從之仕蒼溪令簡賦恤民興學造士卒於官橐無長物祀鄉賢何良浤順德庠生繼母患癰良浤口吮之䖍禱於神母遂愈友兩弟嫡庶無異疊遭嵗歉捐賑不吝人稱孝義同邑有薛洞翔歐象壯者並以孝聞乾隆中旌馮雅玉增城人幼􅀌性至孝母殁廬墓三年遇􅄓風拔木幾盡燭其母墓無恙人以為至孝所感乾隆三年旌陸兆泰三水人性至孝得父母歡親病衣不解帶居喪哀毁倍至殯葬盡禮結廬墓側宗族稱之乾隆四年旌劉斌全花縣人官把總乾隆五十二年從征臺灣陣亡嘉慶八年祀昭忠祠謝朝陞番禺人官外委嘉慶元年從征川匪陣亡於白巖山同邑何振剛官平樂營都司嘉慶四年陣亡於雲臺山八年俱祀昭忠祠呉振亮番禺人官都司嘉慶七年隨征川匪陣亡同邑黄遇龍以把總隨營􅁹匪於湖北亦以是年陣亡八年俱祀昭忠祠楊貴順德人新塘營外委嘉慶三年隨征教匪力戰陳亡祀昭忠祠同時張永成三水人以都司隨征亦死是役世襲雲騎尉李自明新㑹人官連陽營守備嘉慶四年與同邑順德協千總張耀新㑹營把總鄧國祥順德營把總陳士英隨征川匪並力戰陣亡俱祀昭忠祠何定鼇香山人乾隆武舉嘉慶十四年洋匪入内河滋擾奮激投効擊賊被􅆷子雲騎尉世職程尚德清遠人官千總嘉慶三年隨征蜀寇陣亡於雲臺山祀昭忠祠流寓南北朝陳袁敬陽夏人魏克江陵敬流寓嶺表髙祖受禪敬在廣州依歐陽顔頠卒其子紇有異志敬累諌不改紇敗朝廷義之徵爲通直散騎常侍唐賈直言河朔人父道代宗時坐亊賜鴆直言紿其父曰當謝四方神祇輒取鴆代飲毒潰足而出帝憐之減父死俱流嶺南直言由是跛躄後劉悟辟署義成府悟有過必爭悟死子從諫不發喪表求襲位直言仰天哭曰爾父提十二州地歸朝廷爲功臣郎今日乃欲反耶從諫拜曰惟大夫教之直言乃自攝留後軍中遂安太和九年卒贈工部尚書宋何時撫州楽安人宋末削髪爲僧竄迹嶺南賣􅁲自給變姓名自號堅白道人明鄒智合州人以直言責授石城主簿與陳獻章爲忘年友往來順德知縣呉廷舉建樓居之恊修官臣許應藻恭纂總纂官臣廖鴻藻恭覆輯校對官臣陳鴻墀恭校
