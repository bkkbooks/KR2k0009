body:
  text: 廣州府廣東省治東西距四百二十里南北距五百二十二里東至惠州府博羅縣界二百二十里西至肇慶府髙要縣界二百里南至海三百一十二里北至佛岡廳界二百十里東南至海四百里西南至肇慶府陽江縣界五百四十里東北至佛岡廳界二百四十八里西北至連山廳界七百八十里自府治至京帥八千一百八十五里分野天文牛女分野星紀之次建置沿革禹貢揚州南境春秋戰國爲百越地漢書地理志注自交趾至會稽七八千里百越雜處各有種姓秦始皇三十三年置南海郡漢初爲南越國元鼎六年復置南海郡元封五年屬交州後漢末移交州來治後漢書郡國志注交州建安十五年治番禺縣詔書以州邊遠使持節并七郡三國呉黄武五年改置廣州晉曰廣州南海郡宋齊以後皆因之隋􅄏皇九年郡廢仁夀元年改為番州大業三年復曰南海郡屬揚州唐武德四年復曰廣州置總管府舊唐書地理志七年改大都督府貞觀七年改中都督府天寶元年復曰南海郡至德元載置嶺南節度乾元元年復曰廣州咸通三年分為嶺南東道乾寕二年改清海軍節度五代為南漢國都改興王府宋復曰廣州中都督府南海郡清海軍節度為廣南東路治輿地紀勝景德二年清海軍領廣南東路兵馬鈐轄大觀元年升為帥府祥興元年升翔龍府元至元十五年改為廣州路兼置海北廣東道肅政廉訪司屬江西行中書省明洪武元年改廣州府為廣東布政使司治本朝因之屬廣東省領縣十四南海縣附郭東西距一百一十二里南北距一百二里東至番禺縣界二里西至三水縣界一百十里南至順德縣界五十里北至花縣界五十二里東南至番禺縣界二里西南至新會縣界一百五十里東北至番禺縣界三里西北至三水縣界一百二十里秦置番禺縣為南海郡治漢及晉以後皆因之隋開皇十年改置南海縣仍為南海郡治唐為廣州治南漢析置咸寕長康二縣宋開寶六年省二縣仍置南海元為廣州路治明為廣州府治本朝因之番禺縣附郭東西距一百四里南北距一百五十八里東至增城縣界一百二里西至南海縣界二里南至香山縣界一百里北至花縣界五十八里八十里西南至南海縣界二十東南至東莞縣界里東北至從化縣界一百四十里西北至南海縣界五十里秦漢以後為番禺縣地隋為南海縣地唐長安三年置番禺縣屬廣州宋開寶五年省入南海皇祐三年復置元為廣州路治明為廣州府治本朝因之順德縣在府西南一百里東西距九十五里南北距一百五十里東至番禺縣界四十五里西至新會縣界五十里南至香山縣界五十里北至南海縣界一百里東南至番山縣界九十里西南至新會縣界六十里東北至番禺縣界七十里西北至南海縣界一百里秦漢為番禺縣地隋以後為南海縣地明景泰三年析置順德縣屬廣州府本朝因之東莞縣在府東南一百八十里東西距二百五十里南北距一百二十里東至惠州府歸善縣界一百五十里西至香山縣界一百里南至新安縣界六十里北至增城縣界六十里東南至新安縣界一百二十里西南至香山縣界一百里東北至惠州府博羅縣界六十里西北至番禺縣界一百里漢南海郡博羅縣地東晉為東官郡寶安縣地唐為東莞縣地宋開寶六年移置東莞縣於今治屬廣州元屬廣州路明屬廣州府本朝因之從化縣在府北一百三十里東西距一百一十里南北距一百六十里東至増城縣界六十里西至清遠花縣兩夾界五十里南至番禺增城兩縣夾界四十里北至佛岡廳界一百二十里東南至増城縣界六十里西南至番禺縣界六十里東北至龍門縣界一百里西北至清遠縣佛岡廳夾界八十里漢番禺縣地明宏治二年析置從化縣屬廣州府本朝因之龍門縣在府東北二百一十里東西距二百里南北距二百里東至惠州府河源縣界九十里西至從百里北至化縣界一百一十里南至增城縣界一惠州府長寕縣界一百里東南至惠州府博羅縣界六十里西南至增城縣界一百里東北至河源縣界八十里西北至從化縣界一百一十里治六漢番禺縣地後漢以後為増城縣地明宏年析置龍門縣屬廣州府本朝因之增城縣在府東一百六十二里東西距一百三十里南北距一百四十里東至龍門縣惠州府博羅縣夾界七十里西至番禺縣界六十里南至東莞縣界六十里北至龍門從化兩縣夾界八十里東南至東莞博羅兩縣夾界六十里西南至番禺縣界一百三十里東北至龍門從化兩縣夾界九十里西北至從化縣界七十里漢番禺縣地後漢分置増城縣屬南海郡梁移東官郡來治隋初郡廢仍屬南海郡唐屬廣州五代宋因之元屬廣州路明屬廣州府本朝因之新會縣在府西南二百三十里東西距一百二十里南北距一百九十里東至香山縣界八十里西至肇慶府鶴山縣界四十里南至香山縣界一百十里北至南海縣界八十里東南至香山縣界一百五十里西南至新寕縣界一百二十五里東北至順德縣界一百五十里西北至鶴山縣界五十里漢南海郡四會縣地三國呉分置平夷縣晉太康元年改曰新夷屬南海郡東晉元熙二年分置盆允縣劉宋永初元年置新會郡以盆允縣為治隋平陳廢郡為新會縣置封州開皇十一年改曰允州又改為岡州大業初州廢屬南海郡唐武德四年復置岡州貞觀十三年州廢其年復置開元二十三年州廢還屬廣州五代宋因之元屬廣州路明屬廣州府本朝因之香山縣在府南二百二十里東西距二百里南北距二百一十二里東至新安縣界一百里西至新會縣界一百里南至海岸九十二里北至番禺縣界一百二十里東南至新安縣界一百四十里西南至新寕縣界一百八十里東北至東莞縣界一百十里西北至順德縣界三十五里漢番禺縣地晉以後為