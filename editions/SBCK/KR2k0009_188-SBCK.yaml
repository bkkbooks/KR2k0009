body:
  text: 黎平府在貴州省治東南一千里東西距四百七十里南北距四百四十里東至湖南靖州界一百八十里西至都勻府獨山州界二百九十里南至廣西柳州府懷遠縣界一百六十里北至鎭遠府天柱縣界二百八十里東南至靖州通道縣界一百六十里西南至都勻府荔波縣界二百三十里東北至靖州會同縣界九十里西北至鎮遠府屬卭水司界八十里自府治至京師七千里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州荒裔秦屬黔中郡漢為武陵郡地梁置龍檦縣唐武德七年改龍標貞觀八年置巫州析龍標置思微縣先天元年復析置潭陽縣尋並廢為巫敘二州地五代没於蠻宋為誠州地宋史蠻夷傳誠徽州宋初楊氏居之號十峒首領太平興國五年楊通寶始入貢命為誠州刺史元置上黎平長官司隸新添葛蠻安撫司明永樂十一年改置黎平新化二府隸貴州宣德十年以新化省入黎平萬厯二十八年改隸湖廣三十一年還隸貴州布政司本朝因之屬貴州省領縣一雍正五年改五開銅鼓二衞為縣今領縣三土司十開泰縣附郭東西距一百一十里南北距一百二十里東至湖南靖州界九十五里西至本府屬潭溪司界十五里南至永從縣界五十里北至本府屬龍里司界七十里東南至湖南靖州通道縣界一百二十里西南至潭溪司界五十里東北至錦屏縣界九十里西北至本府屬亮砦司界三十里元為上黎平長官司地明洪武十八年置五開衞隸湖廣都司本朝雍正五年改置開泰縣為黎平府治錦屏縣在府城東北一百二十里東西距二百十五里南北距三十五里東肚湖南靖州界一百八十里西至永從縣界三十五里南至開泰縣界二十五里北至鎮遠府天柱縣界十里東南至本府屬亮砦司界三十里西南至本府屬湖耳司界十七里東北至靖州界五十八里西北至湖耳司界三十里漢武陵郡地宋為銅鼓團明洪武三十年置銅鼓衞尋廢建文四年復置隸湖廣都司本朝雍正五年改置錦屏縣屬黎平府永從縣在府城南六十里東西距五十三里南北距九十五里東至本府屬洪州司界二十五里西至本府屬八舟司界二十八里南至廣西柳州府懷遠縣界八十九里北至洪州司界六里東南至本府屬龍額砦界一百里西南至本府屬潭溪司界一百五十里東北至開泰縣界六里西北至潭溪司界六十里唐置溪洞福祿州宋改福祿永從軍民長官司元因之屬思州安撫司明初改永從蠻夷長官司屬思州宣慰司永樂十一年改屬黎平正統七年改為永從縣仍屬黎平府本朝因之洪州泊里長官司在府城東一百五十里元置洪州泊里等洞軍民長官司屬思州安撫司明為洪州泊里長官司屬思州宣慰司永樂十年屬黎平府本朝因之正長官李姓副長官林姓潭溪長官司在府城西南三十里宋置元因之明洪武中屬思州宣慰司永樂十年改屬府本朝因之正副長官俱石姓新化長官司在府城西北六十里明初置屬思州宣慰司永樂十年屬新化府府廢來屬本朝因之長官歐陽姓古州長官司在府城西北八十里元置古州八萬洞長官司屬思州安撫司明初改今名永樂十年屬府本朝因之長官楊姓龍里長官司在府城西北九十里元置龍里等砦長官司屬管番民總管明初屬思州宣慰司永樂十年屬新化府府廢來屬本朝因之長官楊姓中林長官司在府城西北一百里明置中林驗洞長官司屬思州宣慰司永樂十年屬新化府府廢來屬本朝因之長官楊姓八舟長官司在府城北二十里明洪武中置屬思州宣慰司永樂十年改屬府本朝因之長官吳姓歐陽長官司在府城北九十里明初置屬思州宣慰司永樂十年屬新化府府廢來屬本朝因之正長官楊姓副長官吳姓亮砦長官司在府城北一百里元置屬思州安撫司明永樂十年改屬新化府府廢來屬本朝因之長官龍姓湖耳長官司在府城東北一百二十里明初置屬思州宣慰司永樂十年改屬新化府府廢來屬本朝因之正副長官俱楊姓形勢東連靖州西控生苗南通交廣北達辰沅明皇輿考山勢森遶明統志據荆湖上游藏百蠻之窟穴通一線之羊腸府志風俗苗蠻雜處人性樸茂尚義重信不事紛華府志城池黎平府城周六里有奇門四明洪武十八年建本朝乾隆十二年修開泰縣附郭錦屏縣城即銅鼓衞舊城周五里有奇門四明洪武三十年建本朝雍正五年修永從縣城周一里門四明萬厯二十一年建本朝乾隆十年修學校黎平府學在府治東明永樂十一年建本朝順治十八年修康熙二十四年重修入學原額二十名嘉慶十二年増一名共二十一名開泰縣學在縣城東舊為五開衞學本朝雍正五年改為縣學入學原額十二名嘉慶十二年増一名共十三名錦屏縣學在縣城東北舊為銅鼓衞學本朝雍正五年改為縣學入學額數八名永從縣學在縣城北本朝康熙五十七年建入學原額八名嘉慶十二年裁二名定為六名戸口原額人丁共十三萬七千四百三十五今滋生男婦大小共二十七萬二千八百九十八名口計六萬六千二百四十二户又古州左衞男婦共八千五百三十七名口計二十一百五十四戸古州右衞男婦共四千七百二十二名口計一千二百八十一戸田賦田地山塘共一十三萬七千三百四十四畝有奇額徵地丁正雜銀三千九十兩九錢六分七釐米三千九百七十二石八斗五升六合五勺又古州左衞屯田一萬一千四百七十二畝額徵米一千三十石八斗八升古州右衞屯田六千七百四畝額徵米五百三十六石三斗二升山川五龍山在府治高不踰數仭而山勢連延有五二澗夾山西北流中央黄龍山府治在其上城南曰赤龍山北曰黒龍山其旁二山僅培塿耳府志黄龍山一名騰蛟山錦屏山在府城東一里府志為郡鎮山旁列二鳯山萬福山在府城東二里一