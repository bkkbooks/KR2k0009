胡廷樟海陽人乾隆六十年知邛州均徭役減陋規除盜安民姦宄斂迹人物漢陳立臨邛人初爲連然長不韋令蠻夷畏之遷金城司馬成帝和平中夜郎王興與句町王禹漏卧侯俞更舉兵相攻朝議道遠不可擊迺遣使持節和解興等不從命刻木象漢吏立道旁射之於是以立爲牂牁太守立至諭告興興又不從迺請誅之立從吏數十人行縣至且同亭召興興將數千人至亭從邑君數十人入見立立數責因斷興頭邑君曰將軍誅無狀爲民除害願出曉士衆以興頭示之皆釋兵降立還郡興妻父翁指與興子邪務迫脅旁二十二邑反據阨爲壘立使奇兵絶其饟道縱反間以誘其衆時天旱立攻絶其水道蠻夷共斬翁指降徴詣京師會巴郡有盜賊復以立爲太守徙天水太守勸民農桑爲天下最入爲左曹䘙將軍䕶軍都尉卒官鄭厪臨邛人仕至漢中太守博學洽聞嘗作巴蜀耆舊傳林閭臨邛人善古學古者輶車之使劉向不詳其義閭與嚴君平知之曰此使人君居髙堂知天下風俗也唐樊漪依政人事親居喪著至行天子旌表門閭賜束帛梁震依政人唐末登第歸蜀過江陵荆南節度使高季興愛其才識留之欲奏為判官震恥之欲去恐及禍乃請以白衣侍樽俎震終身止稱前進士不受高氏辟署季興甚重之以為謀主震多所裨贊晚退居土洲披鶴氅自稱荆臺隱士宋李絢依政人兄綯教之書一過輒誦數千言稍長善屬文舉進士累官起居舍人龍圖閣學士仁宗春秋高未有繼嗣絢因祀高禖還奏賦大抵言遠嬖寵近賢良則神降之福子孫繁衍仁宗嘉納之子稷厯官陜西轉運使督餉築永樂城輦致金帛其中夏人圍城急稷守之不去卒死於難趙卨依政人第進士累遷直龍圖閣知延州詔問方畧卨審形勢為破夏人䇿以獻又聽民募丁占田充兵訓練以時神宗嘉之擢天章閣待制交阯叛詔卨副郭逵宣撫厯知慶州上撓夏計俘馘千餘生擒其將遷龍圖閣直學古帥延安拜端明殿學士紹聖中繫名元祐黨籍常安民邛州人年十四入太學王安石稱其文欲見之堅不肯往熙寕中登進士為成都府教授與安惇同寮惇嘗語安民曰􅀡道還君富貴輸我安民應之日處厚貴天下事可知我當歸山林豈與君校是非耶元祐初以薦擢大理鴻臚丞紹聖初拜御史論章惇蔡京姦狀章數十上謫監滁州酒稅列入黨籍高宗贈諫議大夫呉時邛州人中甲科厯官太僕少卿提舉河東常平童貫經畧北方時因進對言取燕事必速亂王黼怒斥為腐儒尋以徽猷閣待制奉祠時敏於為文未嘗屬稿人目為立地書廚常同安民子政和進士厯官太常博士建炎中錄安民後遂召同為大宗正丞乞郡得郴州召還首論朋黨之禍除殿中侍御史論吕頤浩十事金使入見同言先振國威則和戰常在我若一意議和則和戰常在彼除起居郎史館修撰同嘗疏稱神哲二史悉出姦人之論至是命同修撰擢御史中丞言江浙困於月樁錢民不聊生帝為減數千緡後以寶謨閣􅀡學士知湖州復召請祠提舉江州太平觀卒魏了翁蒲江人慶元進士厯武學博士韓侂胄謀開邊了翁勸急内修補外知嘉定府呉曦叛了翁䇿其必敗曦誅奉親還鄉里史彌遠入相力辭召命築室白鶴山下以所聞于輔廣李燔者開門授徒蜀人盡知義理之學差知漢州以化民善俗為治徙知眉州興讓教民俗為之變嘉定四年擢潼川路提􅀧刑獄公事遷轉運判官戢吏姦詢民瘼舉刺不避權右風采肅然知潼川府約已裕民被召累遷起居舍人理宗立疏請求碩儒闡正學又請厚倫紀以弭人言最為切至降外紹定五年知瀘州修武備養民興學百廢具舉復與真德秀並召進權禮部尚書兼􅀡學士院累進簽書樞密院事力辭改福建安撫使卒贈太師諡文靖所著有鶴山集九經要義周易集義易舉隅周禮井田圖説圖史雜抄等書學者稱鶴山先生魏文翁了翁之弟舉進士為眉山尉後知敘州嘗讀禮將為善思貽父母令名必果句日諷詠不能釋自號果齋高稼蒲江人嘉定進士真德秀一見以國士期之知綿谷縣歲大饑捐貲全活甚衆厯利州提􅀧刑獄葺理創殘招集流民元兵入漢沔力戰卻之後知沔州㑹北兵大至事迫屬官力請少避稼不為動城既陷衆擁稼出户稼叱之不能止兵􅀐四集圍之遂死焉詔進稼七官為正議大夫龍圖閣􅀡學士諡曰忠高定子稼之弟嘉泰進士授郪縣主簿呉㬢叛乞解官養母知夾江縣寛􅅦弛征歲饑發縣廩平糶四川總領所辟主管文字利州倚酒􅅦以佐軍用吏姦盤錯定子躬自究詰酒政遂平制置使鄭損誤謂總領所擅十一州小㑹子之利奏請廢之令下民疑而罷市定子力爭乃得存其半知長寕軍蠲重賦百姓賴之知緜州以收捕張鉞功進三官以防遏招收潰兵功又進一官召入奏事極言時弊累遷翰林學士兼吏部尚書進簽書樞密院事並參知政事尋改知潭州湖南安撫使力辭退居呉中日以著述自娱卒贈少保鄧得遇邛州人淳祐進士厯知昭州遷廣西提􅀧刑獄攝經畧事兼知靜江府德祐二年元兵破靜江得遇取幅紙書云宋室忠臣鄧氏孝子不忍偷生自甘溺死遂朝服南望拜辭投南流江而死常楙同之曾孫淳祐進士厯官簽書臨安府判官不為權􅀔撓厯御史知無不言厯兩浙轉運使築海晏塘遷刑部侍郎拜吏部尚書首言巴陵之􅁈德祐二年拜參知政事卒高斯得稼之子紹定進士授利路推官李心傳修國朝㑹典辟為檢閲文字端平二年稼死事於沔斯得潛往其處奉遺骸以歸見者感泣理宗時厯史館校勘時史嵩之柄國上封事忤之叔父定子亦領史事嵩之使其黨言叔父兄子不可同朝出判紹興召為秘書郎因日食極言時政遷浙東提􅀧刑獄厯拜參知政事斯得忠憤激烈指陳時事無所遺著有詩膚説儀禮合抄增損刋正杜佑通典恥堂文集明劉綱邛州人祖文恂孝子父應辰舉鄉試不仕亦以孝義聞