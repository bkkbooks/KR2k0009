設方畧堅壁固守賊力屈解圍去師頏内黄人真宗時知眉州簡靜為治蜀人便之張逸榮陽人天禧中知青神縣縣東南有松柏灘夏秋暴漲多覆舟逸禱江神不逾月灘為徙五里時人異之馮仲􅋫佚其籍知丹稜縣呉㬢叛入眉州死之明胡彥祥徽州人永樂初知眉州重農事新學宫修蟆頤堰以廣水利梁楹江寕人知眉州玻瓈江勢暴悍善徙侵齧城址楹截江築隄百八十丈導使中流城乃不危至今賴之何大衢武岡人任彭山知縣崇禎時獻賊陷城不屈死本朝乾隆四十一年賜諡節愍蔡馨明黄岡人知眉州流寇至守禦力竭題詩大雅堂闔門殉節本朝趙蕙芽淶水人康熙元年知眉州築隄堰修水利􅂌民耕具盡力甽畮又建義學以課士時稱良牧金一鳳直隷人康熙三十七年知眉州潔己愛民興學造士開渠堰鑿險灘造孔道橋梁民懷其惠劉公渭湄潭人雍正十二年知青神縣興利除弊訓士有方治績稱最林鴻浦城人乾隆十年知青神縣浚鴻化堰不辭勞瘁利民之事多所修舉張鳳翥上虞人乾隆二十一年知彭山縣修復通濟堰灌溉眉彭田數萬畝新學宫置學田祭器莅政實心士民懷之王承爔番禺人乾隆二十六年知青神縣修城池復浚鴻化堰鑿松柏灘水利以興人物漢朱遵武陽人公孫僭號遵為犍為郡功曹領軍拒戰於六水門衆少不敵乃埋輪絆馬固守不屈死光武嘉之追贈復漢將軍杜撫武陽人受業於薛漢定韓詩章句歸里敎授沈靜樂道舉動必以禮弟子千餘人後為東平王蒼所辟及蒼就國掾吏皆自劾歸而撫為大夫不忍去建初中為公車令所作詩題約義通學者傳之曰杜君注云張晧武陽人留侯六世孫永寕元年徴拜廷尉辨正疑獄延光三年安帝將廢太子為濟隂王晧廷諍之順帝即位拜司空多薦達天下士時趙騰因灾變坐謗訕當伏重法所引八十餘人晧諫曰騰本欲盡忠正諫如當誅戮塞諌諍之源非所以昭德示後也帝悟減騰死罪張綱晧子司徒辟以高第為御史與杜喬等八人受詔持節分按天下七人皆出綱獨埋輪都亭曰豺狼當路安問狐狸遂劾梁冀等姦惡時廣陵賊張嬰寇亂冀諷尚書以綱為廣陵太守綱單車竟造嬰壘慰安撫恤南州晏然天子欲擢用而嬰等上書乞留在部二年卒詔拜綱子績為郎中賜錢百萬三國漢楊洪武陽人先主定蜀以洪為蜀部從事及征漢中丞相亮表為蜀郡太守衆事皆辦先主征呉不克還往永安召亮東行漢嘉太守黄元反洪啟太子遣其親兵使將軍陳曶鄭綽討之生獲元封關内侯後為越騎校尉領郡如故洪忠清款亮􅁨分如家事繼母至孝張翼綱曾孫以討劉胄功進封都亭侯征西大將軍延熙十八年與大將軍姜維西征大破魏雍州刺史王經於狄道經衆死洮水者以萬計景耀二年遷左車騎將軍領冀州刺史為鍾㑹亂兵所殺子微篤志好學官至廣漢太守楊戲武陽人二爲丞相亮主簿蔣郡太守入爲射聲琬校辟爲東曹掾厯建尉所在清約不煩寕梓後以潼忤姜維於故意免爲庶舊居誠存人􅃧性厚有識簡畧未嘗以者貴之延熙甘言間著加人篤季漢輔臣贊晉程瓊犍爲人故蜀立深交晉武尚帝書雅聞其有德業與臨名以問立對江文曰臣至知其不以上人但聞耳年垂八十瓊聞之曰禀性廣休謙可退無復謂不黨當時之望矣故吾善夫人也李密武陽人父早孝謹劉有疾亡則養於涕泣祖母劉側息未氏密奉事嘗解衣飲膳湯藥必周門人方先之嘗後進有暇則游夏太始初徴講學忘疲爲太子洗師事譙周馬密以祖母年徙尚高上表書郎出固辭武帝覽之乃停召後爲河内温令遷漢中太守劉終服卒於家闋子賜能亦有屬文文才興楊邠武陽人少好官衡陽内史學志古淬遏流民叛厲名亂攻行没長沙湘圖進取東􅀗邠㑹眺降邠走收餘衆投賊邠􅀌軍固城湘州刺史賊攻圍之苟眺共誓死不移遂帝嘉卒城中其忠節楊倉太始八夜亂不年刺史皇甫晏知所爲倉時爲討汶兵曹山從事彎弓力戰射百餘發矢盡見殺楊渙犍為郡人太安二年李雄大破羅尚軍入少城渙守義而死宋朱台符眉山人十嵗能屬辭太宗朝以尺晷成一賦登進士厯西京轉運副使時北邊為梗台符請擇使以修和好又自請往使時論韙之咸平二年旱求直言台符厯疏時務優詔褒答厯工部員外􅀰陜西轉運使台符好學喜延譽後進有集三十卷陳希亮青神人好學勵志不治生業天聖中進士厯知數州郡遷京東轉運使英宗立遷太常寺少卿以才幹剛直名王公貴人皆嚴憚之見義勇發不計禍福至奸民猾吏易心改行不改者必誅然出於仁所恕故嚴而不殘子慥嘗與蘇軾論用兵及古今成自謂一時豪士稍壯折節讀書晚年遯於光黄敗間庵居蔬食徒步往來山中不與世相聞其所著帽方屋而高曰此古方山冠之遺人因謂之方山子孫抃眉山人六世祖長孺喜藏書號書樓孫氏抃登進士皇祐中為御史中丞數言事不為矯激帝欲除内侍王守忠節度使抃奏罷之温成皇后喪議建陵立廟抃固爭帝為改容又劾罷宰相梁適陳執中改翰林學士承㫖厯官參知政事卒諡文懿石揚休眉山人少􅀌力學舉進士第累官刑部員外郎知制誥遷工部􅀰中喜間放與家人言未嘗及朝廷事及卒發楮中得所上封事十餘章皆有補於時者賣醬薛翁逸其名時袁滋入洛間易於程頤頤曰易學在蜀耳滋入蜀訪問見賣醬薛翁於臨邛間與語大有得蘇洵眉山人年二十七始發憤為學通六經百家之説下筆頃刻數千言至和嘉祐間與二于軾轍俱至京師翰林學士歐陽修上其所著書二十二篇既出士大夫爭傳之宰相韓琦奏於朝除恔書􅀰與姚闢同修建隆以來禮書為太常因革禮百卷卒贈光祿寺丞有文集二十卷諡法三卷傳於世桂堂彭山人熙寕中守威州時羈縻保霸二州交惡堂自攜牛酒至通化軍㑹二州酋長諭以禍福乃降蘇軾洵長子十歳母程氏授以書問古今成敗軾能語其要比冠博通經史嘉祐二年試禮部歐陽修擢置第二修曰吾當避此人出一頭地尋對制䇿入三等治平二年召直史館熙寕中王安石欲變科舉軾上議神宗即日召對軾曰陛下求治太急聽言太廣用人太鋭願鎮以安靜神宗懐然聽受時安石創行新法軾上書論其不便安石怒使御史謝景温論奏其過窮治無所得軾遂請外通判杭州再徙知湖州李定等摭其詩語為謗訕隸赴獄欲置之死神宗獨憐之以黄州團練副使安置軾築室東坡號東坡居士移汝州元和元年遷中書舍人尋除翰林學士兼侍讀每進讀反復開導冀有所啟悟嘗召對便殿撤御前金蓮燭送歸院厯官禮部尚書兼端明殿翰林院侍讀學士以龍圖閣學士知杭州有德於民家有畫像哲宗親政乞外補以兩學士知定州紹聖中屢貶瓊州别駕居昌化軾以著書為樂若將終身元符三年大赦復朝奉郎提舉成都玉局觀建中靖國元年卒年六十六所著有易書傳論説奏議内外制東坡集凡數百卷高宗即位贈資政殿學士諡文忠三子邁迨過皆善為文過字叔黨任右承務郎性至孝軾帥定武謫英州惠州遷儋州徙廉永獨過侍凡生理晝夜寒暑所須者一身百為不知其難初至海上為文曰志隐軾卒常州過葬之汝州郟城小峨嵋山遂家潁昌營湖隂水竹數畝號斜川居士有斜川集二十卷世稱為小坡孫符高宗時為禮部尚書蘇轍年十九與兄軾同登進士料又同策制舉以直言置下等授商州軍事推官神宗朝轍上書言事召對咸和殿坐兄軾以詩得罪謫監筠州鹽酒税哲宗召為右司諫蔡確韓縝章惇等在位窺伺得失轍皆論去之又論竄吕惠卿夏人遣使入境轍明決利害朝廷遂許還五砦夏人悅服累遷御史中丞吕大防欲稍引用元豐舊黨轍面斥其非疏論君子小人不可並處調停之説遂已拜尚書右丞進門下侍郎紹聖初廷試進士李清臣撰䇿題即為紹復邪説轍疏諫哲宗不悦落職知汝州累謫雷州循州安置徽宗立徙永州岳州再復大中大夫致仕作室於許號潁濱遺老不復與人相見終日黙坐幾十年卒年七十諡文傳古史老子解欒城集並行於定所著詩春秋世子遲适遜蘇元老轍之族孫幼􅀌力學長於春秋善屬文第進士通判彭州政和閒茂州蠻叛元老移書成都帥周燾陳破蠻之䇿燾皆不能用竟得罪後帥至如元老䇿蠻􅀔蹙乃降厯太常少卿外和内勁不妄與人交梁師成欲因緣見且求其文拒不答言者遂論元老蘇軾從孫且為元祐邪說罷與祠元老歎曰吾以家世坐累榮矣卒年四十七有詩文行於世王當眉山人著春秋列國名臣傳五十卷元祐中蘇軾以賢良方正薦廷對慷慨不避權貴調龍游縣尉蔡京知成都舉為學官不就京相遂不復仕當邃於經學易春秋皆為之傳又有經㫖二卷史論十二卷兵書十二篇弟賞舉進士累官禮部侍郎兼直學士忤秦檜出知利州賞子偁學問博洽初除直祕閣知龍州有美政後為吏部􅀰中著東都事畧一百二十卷巢谷眉山人傳其父中學舉進士谷素多力棄其學學古兵法遊西邊與河州將韓存寶相善後存寶坐罪死谷逃避江淮間㑹赦乃出紹聖初二蘇謫嶺海谷徒歩往訪見轍又欲往海南訪軾至新州病死轍聞哭之失聲任伯雨眉州人父孜字遵聖名與蘇洵等仕至光祿丞孜弟伋字師中亦知名時稱大任小任伯􅀨邃於經術登進士徽宗初擢右正言首擊章惇章八上繼論蔡卞广大罪上書皇太后乞暴蔡京之惡召還陳瓘居諫省半載所上一百八疏黨事作徙昌化長子象先調秦州户曹掾聞父謫棄官歸養仲子申先以布在特起中書舍人高宗詔贈伯􅀨官後賜諡文敏家愿眉山人父勤國與蘇軾兄弟為同門友王安石久廢春秋勤國憤之著春秋新義譏熙寕元豐諸人而元祐諸賢矯枉過正勤國􅁨之為築室作室喻愿登紹聖進士李清臣擬進䇿問極詆元祐之政愿對與之異遂居下第元符三年以正陽日食求言愿對十事凡萬言不報崇寕初入黨籍禁錮凡十年大觀初起知雙流高宗擢知閬州移彭州有論邊防書名曰罪言初蘇轍讀愿䇿謂少年能不為進取計當以直道顯至是果驗唐庚丹稜人第進士為宗子博士除提舉京畿常平厯承議郎庚為文精密通於世務作名治察言閔俗諸篇時人稱之有文集二十卷長兄瞻後名伯虎治易春秋皆有家法元祐三年其父彦通遊瀘南伯虎兄弟居母喪於丹稜山夜半蹴庚曰吾夢收父書發之得亟來二字吾心動矣即起裹糧黎明走洪州僦舟遇江漲舟皆艤岸不敢動伯虎超人漁艇中叱僕夫解維漁者不得已從之三日半至瀘南父果病甚見伯虎大驚具告其故父歎曰天告汝也疾少間具舟侍父歸居數日疾復作遂卒楊恂丹稜人登進士知廣都縣與家愿同時上書語甚切直同入黨籍邪下第五等程之邵眉山人曾祖仁霸治獄有隂德之邵以􅄻為新繁主簿時更募設法常平使者欲㮣州縣民力以羨乏相補之邵曰此成周均力遺意當各以一邑之力供一邑豈宜以此邑助彼邑哉使者愧恨元祐初為䕫路轉運判官大寕井出鹽前議者輒儲其半供公上餘鬻於民使先輸錢鹽不足給民以病告之邵發所儲與之商賈既通税增數倍徙知鄭州除主管秦蜀茶馬公事􅀊有増羨進熙河都轉運使徽宗時秦鳳出師命之邵經制擢顯謨閣待制敵犯熙河攝帥事敵人聞風遁去任諒眉山人少􅀌力學舉進士厯河南户曹以兵書謁摳密曾布既見不能合徑去布為相諒予書規以李德裕事布始怒由懷州教授累官徽猷閣待制忤蔡京徽宗將有事於燕諒曰中國其有憂乎乃貽書宰相謂師出不可無名又言郭藥師必反帝不聽大臣以為病狂予祠後皆如諒言乃復起為京兆未幾卒孫昭遠眉山人元祐間進士調長沙尉有能名建炎元年為河南尹西京留守收集散亡得兵萬餘人栅伊陽使民入保金兵來攻昭遠命將奉啟運諸殿神御閒道走行在金兵益熾昭遠戰不利其下欲擁之南還昭遠罵曰若等平日衣食縣官不以此時報國南去何為叛兵怒反擊昭遠遂遇害追贈徽猷閣待制劉汲丹稜人紹聖四年第進士厯通判隆德府開封推官忤王黼謫監蓬州税欽宗召對汲奏願馳驅外服以䘙京師遷京師轉運副使尋攝帥捐金帛饗士為戰守計高宗立進安撫使金兵急攻汲集將吏謂曰吾受國恩恨未得死所金兵來必死孰能與吾俱死者乎皆流涕曰惟命敵大至汲死之贈大中大夫諡忠介唐重彭山人少有大志徽宗親䇿士問以制禮作樂重對事親從兄為仁義禮樂之實累擢右諫議大夫乞斬蔡京父子以謝天下高宗即位上疏論急務有四大患有五上詢可守關中者劉岑以重對乃以天章閣直學士知京兆府金兵圍城外援不至城陷重以親兵百人血戰中流矢死贈資政殿學士諡恭愍孫逢眉山人官太學博士張􅀖昌􅆫立堅卧不起賊迫之發疾而卒唐文若庚之子高宗時為祕書郎獻文思箴遷起居郎勸上收用西北人材以固根本金兵入邊首建大臣節制江上之議師維藩眉山人精春秋學杜莘老青神人杜甫之後紹興進士累官殿中侍御史後以直顯謨閣知遂寕府嘗歎曰臺諫當論天下第一事若有所畏姑言其次是欺其心不敬其君者也及任言責直言無隱聲振一時都人稱骨鯁敢言者必曰杜殿院云李燾丹稜人紹興進士調華陽簿改秩雙流縣有治績知榮州榮因溪為隍率苦水潦燾築防捍之除潼川府路轉運判官時多聚斂燾括一路財賦額通有無酌三年中數定為科約上之朝頒之州縣燾恥讀王氏書獨博極載籍慨然以史自任本朝典故尤悉力研覈倣司馬光資治通鑑例為宋編年之書名曰續資治通鑑長編乾道中遷祕書少監兼實錄院檢討官出為湖北轉運副使陛辭以欲速變古為戒尋帥潼川兼知瀘州首葺石門堡以扼夷人奏乞戒茶馬司市敘州羈縻馬毋溢額戒官民毋於禁山伐木以開夷人入寇之路皆報可進權禮部侍􅀰以雷震建言上嘉其讜直子垕中制科遷著作郎兼國史院編修官父子同主史事次子塾以閣試不中程黜垕偶考上舍發䇿問制科為御史所劾燾垕皆罷㑹垕塾繼亡上欲以吏事紓燾􅁨起知遂寕府張栻嘗曰李仁甫如霜松雪柏長編一書用力四十年孝宗謂無愧司馬遷葉適謂春秋以後纔有此書孫道夫丹稜人高宗召對言欲進兵陜右當先措置荆南遷吏部􅀰中言蜀事二税鹽酒茶額之弊充賀金正旦使金將敗盟詰秦檜存亡及關陜買馬非約道夫隨事折之嘗知資州宣撫鄭剛中薦治行第一知蜀州盜不敢入境遇事明了人皆頌之道夫居官愛民不可干以私仕宦三十年俸給置書籍楊大全青神人乾道中進士調温江尉有政聲除監登聞鼓院光宗以疾久不省重華宫大全為書以諫力請過宫三上疏不報慶元嘉泰中累遷司農寺丞韓侂胄私臺諫為羽翼有力薦大全者屬一往見之大全笑謝不往明日遂丐外知金州李壁燾子淳熙進士慶元初累遷禮部侍郎兼直學士院韓侂胃建議恢復壁革出師詔進禮部尚書拜參知政事與史彌遠誅韓侂冑以端明殿學士知遂寕府卒諡文懿壁嗜學搜抉羣經於典章制度尤綜練所著有雁湖集清塵錄中興奏議内外制臨汝閑書凡數百卷李􅐉燾子淳熙進士入為館職有文名班對忠讜厯官禮部尚書淳祐元年奏請周程張朱從祀而黜王安石帝從之終資政殿學士諡文肅史次秦眉山人舉進士為大安軍教授呉㬢之叛招次秦甚遽乃以毒藥傳兩目比至目益腫母年高而賢命家詐以訃聞乃聽還㬢誅改利州主管文字仕至合州太守楊泰之青神人少刻志於學慶元中知嚴道縣有能聲安丙薦之以親老辭知普州呉㬢反安居安岳二縣受禍尤烈請蠲其賦移知果州踦零錢病民泰之以一年經費儲其贏為諸邑對減上尚書省按為定式理宗即位趣入對言法天行健奮發英斷總攬威權無牽於私無奪於邪説土竒其對以為工部尚書著克齋文集論語解老子辭春秋列國事目等書凡二百九十七卷楊棟青神人紹定進士厯樞密院編修官除宗正少卿進對帝曰只是正心修身之説乎棟對曰臣所學三十年止此一説至為簡易累拜參知政事棟學本周程氏􅀒海内重望所著有崇道集平舟文集家大酉愿曾孫舉進士初授昭化縣主簿呉曦叛大酉不受其招淳祐中侍講經筵累官工部侍郎與宰相史嵩之論不合罷去大酉為人方直累屈守死不變諡文節楊文仲彭山人淳祐中以胄試第一入太學升内舍時言路頗壅因季冬雷震帥同舍叩閽極言時事寶祐初登進士第累官至崇政殿説書在講筵毎以積誠感動㑹盛夏建宗陽宫畿甸騒然文仲疏諫懇至又薦陳存等十八人名士二人金華王柏天台車若水也德祐時元兵渡江朝士率多棄去者侍從班惟文仲一人史克恭丹稜人登進士第佐王師有功命攝本邑後死於國事封忠佑侯廟祀之家􅉗翁大酉孫學問該博尤邃於春秋累官端明殿學士簽書樞密院事元兵次近郊丞相檄告天下以城降􅉗翁獨不署奉命使元留館中聞宋亡旦夕哭涕不食元欲官之􅉗翁義不二君詞無詭對成宗即位放還賜號處士賚金帛不受以壽終於家明余子俊青神人厯戸部員外郎在部十年以廉幹稱出為西安知府區畫賑恤官不損而民濟厯副都御史巡撫延綏初延綏鎮治綏德州屬縣米脂吳堡悉在其外寇每輕騎入掠鎮兵覺而追之已不及往往得利去子俊徙鎮榆林增衛益兵拓城置戍攻守器畢具遂為重鎮寇擾漸稀軍民得安移撫陜於城西北開渠洩水使經漢故城達渭公私便益號余公渠又於涇陽鑿山引水漑田千餘頃通南道直抵漢中以便行旅學校公署圯者悉新之奏免岷河洮三䘙之戍南方者萬有奇易置南北之更戍者六千有奇就戍本土召為兵部尚書遷戸部尚書加太子太保兼左副都御史總督大同宣府軍務尋致仕復起為尚書加太子少保卒贈太保諡肅敬王用才彭山人舉進士授寕府長史宸濠潛蓄異謀用才匡救以正逮獄累月不屈􅁨憤死事聞贈太常少卿本朝楊仕成眉州人官小河營千總乾隆三十八年征金川陣亡卹􅄻如例彭承緒丹稜人官守備乾隆二十三年隨征托木洛克竝沙雅爾二路賊番奮勇力戰陣亡賜祭葬卹􅄻如例黃文釗青神人官貴州遵義千總乾隆三十六年隨征金川屢戰克捷四十年攻噶咱普布咱泥北山梁陣亡卹􅄻如例余正朋彭山人官靖遠營外委嘉慶二年隨􅁹教匪陣亡卹􅄻如例楊忍濟青神人官把總嘉慶二年隨􅁹教匪陣亡卹􅄻如例流寓漢馮良南陽人年三十為尉從佐奏檄迎督郵良恥為厮役乃遁至犍為妻子索蹤迹不得積十餘年還鄉志行高潔安帝以羔幣聘之辭列女唐王琳妻韋氏琳為眉州司功參軍俗僭侈盛飾韋不知有簪珥訓二子有法皆名聞琳卒韋年二十五家欲彊嫁之韋固拒獨處一室著有女訓宋蘇洵妻程氏眉山人程仁轍洵游學四霸之女通經史有氣節適洵生子軾方程教二子以書甚嚴每語家人曰二子必不忝蘇門嘗讀漢范滂傳慨然太息軾請曰軾若為滂母許之否乎程曰爾若為滂吾顧不能為滂母耶蘇軾妻王氏青神人鄉貢進士方之女賢淑載蘇軾墓誌唐庚母史氏庚父病篤母史祈以身代既而母死父生載周益公題跋師驥二女眉山人驥仕為右正言靖康中避亂還蜀至唐州方城驛遇賊執二女欲強之伯罵曰宜速殺我仲抱其姊亦不從并殺之土人收葬二女號曰貞女墓史次秦母眉山人年高而賢次秦為大安軍教授吳㬢所招母聞即命家人以病篤馳報且曰病恐不足取信以訃聞可也曦乃聽還楊文仲母胡氏彭山人文仲七􅀊而孤母年二十有八守節自誓教養諸子文仲既冠以春秋貢母喜曰汝家至汝三世以是經收效矣元虞汲妻楊氏眉州人父文仲世以春秋名家明於性學楊氏在室即通其説適隆州虞汲生子集槃宋末兵亂汲攜家趨嶺外無書可讀楊氏口授集論孟左氏傳歐蘇文比還居臨州始得刻本則已盡讀諸經通大義矣後集以文翰擅名當代皆楊内訓之力云明黃裳妻諶氏眉州人無子苦節三十年余祥妻張氏青神人余子俊母孀居二十年教子成大器同縣苟祥妻程氏祥卒年二十五教子延年領鄉薦任源江令延齡遊庠年九十五終本朝談學􅅒妻胡氏眉州人夫早卒子女皆㓜有豪右欲奪為妾胡峻拒之不已乃自髠以全節王先美妻徐氏眉州人于歸三載夫病卒呼愴極哀自經以殉王朝佐妻李氏眉州人年十四因母病刲左股以進尋愈十八于歸家貧依外祖母宋氏居宋老而多疾李勤侍湯藥刲右股療之朝佐殁氏年二十八躬自力作撫二子成立杜天柱妻熊氏眉州人年二十二守節孝養舅姑撫子成名熊嘗病篤子婦曾氏刲股療之得愈厯七十􅀊終倪元相妻向氏眉州人元相卒氏年二十八紡績資生訓子道充登鄉試厯八十􅀊終劉永布妻􅇞氏眉州人守正捐軀同州烈婦呉開妻蒲氏均乾隆年間旌彭芳文妻田氏丹稜人夫亡守節同縣節婦羅成德妻徐氏均乾隆年間旌陳圖妻彭氏丹稜人夫亡家貧紡績以養孀姑撫子成立同縣節婦彭之權妻嚴氏孝事翁姑撫育弱息辛勤三十餘年黃仁妻汪氏彭山人仁卒遺子女尚幼氏勤紡績撫育成立段錦柱妻張氏青神人夫亡守節同縣節婦陳虞應妻雲氏陶文學妻雷氏均乾隆年間旌戴元后妻李氏眉州人夫亡守節同縣節婦劉􅀖畛妻朱氏何汝俸妻管氏烈婦黃林氏劉趙氏鄭周氏均嘉慶年間旌張鵬飛妻宋氏丹稜人夫亡守節嘉慶年間旌幹體元妻夏氏彭山人夫亡守節同縣節婦宋仁舉妻鄧氏烈婦徐陳氏均嘉慶年間旌呉元富妻馬氏青神人夫亡守節嘉慶年間旌仙釋古彭祖右陸終氏第三子籛鏗也自堯厯夏殷封於大彭周衰始浮遊四方晚入蜀抵武陽留家焉漢瞿君武彭山人七􅀊絶粒服黃精紫芝入峨嵋得道乘龍還家遂撃龍於潭後復乘龍而去今有繫龍潭在縣北四里潭上有橋亦名繫龍史通平光武時自㑹稽來蜀詣峨嵋山謁天皇真人授以正一之法及五符訣遂居青神縣地置茅廬煉丹龍虎成形餌之白日昇天唐楊昭慶景雲中自京兆來眉志尚清虚巡遊二十四化至北平化嘆曰昔漢時史先生得真一之道修之以白日昇天後無繼者乎遂往青神縣遊仙觀三十餘年感五嶽丈人希授真人降下授以朱明龍文遂得尸解之道張遠霄眉山人遇老人授以度世法熟眎舉首見其目中各有兩瞳子後往白鶴川垂釣西湖峯上有一老人曰此乃四目老翁君之師也張大悟後仙去牟羅漢眉山人名安以廂兵隸倅㕔如岷上陟上青坂忽遇髯者顧笑曰汝饑何不食柏子耶摘子投其口顧髯者復不見矣遂不火食一日江水暴漲舟不可行或戲指其笠曰乘此渡可乎遂置笠於水趺坐其上截江以濟觀者異之宋文才彭山人遊峨嵋山中一老人引之徐行見有道士奕棋青童採藥問其地乃峩嵋洞天仙所居也及出山已半月矣宋陳太初眉山人初與蘇軾同學於道士張易簡後軾謫黃州有眉山道士陸惟中來云有得道者曰陳太初問之則同學者也又數年見軾於惠州云太初已尸解矣土産麩金元和志眉州貢鹽明統志彭山縣出有九井硝明統志州東館鎮鷂兒井出獠麻布元和志眉州貢甘子元和志眉州貢寒水石州東蟆頤山出茶州志青神縣出斑竹州志彭山縣出史君子州志彭山縣出前提調官臣鄭紹謙恭纂輯提調官臣張日章恭覆輯校對官臣陶際堯恭校校對官臣宗稷辰恭覆挍大清一統志邛州􅀡隸州在四川省治西南一百八十里東西距二百二十里南北距一百五十里東至成都府新津縣界六十里西