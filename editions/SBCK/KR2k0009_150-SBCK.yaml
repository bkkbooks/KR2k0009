之任世藩瀘州九姓長官司天啟初奢崇明父子搆逆世藩奉檄守建武城與賊相持者兩載天啟三年城陷世藩及其妻王氏俱以抗賊不屈死崇禎二年旌奬高光瀘州人爲應天府通判天啟初奢崇明陷瀘城光薙髮爲僧與子在崑募壯士殺賊百餘賊怒追至大葉壩光罵賊不屈與家衆十二人同死呉長齡瀘州人監生天啟初奢崇明陷城率衆復之尋中伏父子俱戰死湯名揚瀘州人初業儒有識力天啟間集義勇討藺寇屢捷授松潘守將時有邊警名揚自龍安轉戰三百里築寨堡十數拒之後力戰流寇於二郎關爲賊所磔本朝乾隆四十一年予入忠義祠韓國士瀘州人藺賊逼城守者開門降國士不屈令妻朱氏子三人女二人皆縊死遂自焚事聞祠祀傅生納谿諸生藺賊起生書四語於扇以遺弱孫使僕􅀒之逃舉家桑舟自沈江中事聞旌其閭方旭瀘州諸生獻賊破城掠去賊所旭不屈賊支裂之至死猶怒罵不已本朝乾隆四十一年予入忠義祠方伯元瀘州諸生獻賊至伯元不屈厲聲罵賊支裂而死本朝乾隆四十一年子入忠義祠晞容瀘州七寶寺僧獻賊攻豹子峒晞容奮臂曰峒中數百生靈豈可坐視其死遂糾義勇五百餘人攻賊圍解相持兩載殺賊千餘一日賊突至被害本朝乾隆四十一年予入忠義祠曾薦祚瀘州諸生獻賊陷城不屈死本朝乾隆四十一年予入忠義祠林之龍瀘州貢生避居江安獻賊至兀坐觀書見賊大罵賊怒斷其首置書上而去家人并其書藁葬山下王萬春瀘州人官指揮使獻賊之亂招義勇拒賊被執不屈死闔門遇害十一年本朝乾隆四賜諡烈愍韓洪鼎瀘州人萬厯舉人任山西澤州知州致仕歸獻賊破瀘父子罵賊死本朝乾隆四十一年賜諡節愍韓大賓瀘州人崇禎舉人任貴州推官賊陷雲南不屈死本朝乾隆四十一年賜諡節愍鍾子英瀘州諸生崇禎末兵燹後繼以饑饉人相食子英歎曰吾讀聖賢書忍目擊此乎妻亦不忍離夫夫婦遂攜手投於江本朝乾隆四十一年予入忠義祠李伯山瀘州人以廕生官貴州總兵􅁹闖賊於鄖陽陣亡贈鎮國將軍徐明蛟合江人崇禎時官撫標參將率師禦獻賊戰死雷時聲江安人崇禎時官副總兵隨總督盧象昇擊賊於海州城被執罵賊死事聞賜祭廕楊鼎和江安人桂王時長兵部阻孫可望要封被害於崑崙關本朝乾隆四十一年賜諡忠節車應聘九姓司人由貢生任陜西兩當知縣到官匝月闖寇陷城以身殉本朝王匡國納谿人康熙初任山西平陸知縣以亷能惠愛稱卓異行取御史平陸民為修祠立碑卒祀鄉賢祠韓士修瀘州人性至孝博學能文康熙丙午鄉薦第一母卒哀毁骨立成癸丑進士􅃟庶吉士值滇南之變干戈阻道士修以遠違親養憂戚成疾垂死衣冠西望再拜作書與父訣辭極酸楚人咸惜之初同里有湯澯字岷水康熙癸卯舉人事親亦以孝聞瀘人舉文行者必稱韓湯云顔欽明瀘州人康熙丙午舉人研心經史之學呉三桂據蜀士大夫多為迫脅欽明抗節不屈蜀平結屋玉蟾山下二十餘年不入城市曾亮瀘州人康熙甲子舉人有同族孀婦子女孤貧流寓他邑亮移歸瀘恤其家婚嫁皆力任授浙江鄞縣令視民如子致仕歸琴書外無餘物周其祚瀘州人康熙丁酉舉人官安徽休寕知縣有惠政勤於誦讀日記數千言門下多知名士宦遊所見悉誌之瀘州志乘多其祚考訂何飛鳳瀘州人乾隆甲子舉人官安徽和州州同在任十餘年勤慎自矢累攝舒城天長潁上縣事值亢旱飛鳳䖍心祈禱甘霖應時而至有􅀨澤隨車之頌解組歸民數千人泣送不忍去林中麟瀘州人乾隆壬戍進士官廣西河池州牧有廉聲博學尤精理境異同之辨嘉慶十四年入祀鄉賢祠羅文思合江人乾隆戊午領鄉薦第一舉孝廉方正厯任至貴州石阡守居官明允潔己愛民興利剔弊所至循聲卓然嘉慶十三年入祀鄉賢祠蕭溶瀘州人官雲南騰越千總乾隆三十一年隨征緬甸陣䘏廕如亡例張士綸瀘州人官重慶營外委從金川攻昔嶺陣亡卹􅄻如征例張國臣納谿人官雅州營把總隨征金川進􅁹遜克爾宗陣亡䘏􅄻如例王正常瀘州人乾隆乙酉舉人初任湖北咸寕知縣剔弊釐姦政尚清肅仕至安襄鄖荆道有治績居家孝友持躬廉潔士林咸推重之嘉慶二十二年入祀鄉賢祠鄧復禹瀘州人官永寕營外委嘉慶元年隨􅁹敎匪於湖北來鳳寨陣亡卹廕如例列女漢先尼和女絡尼和符縣吏永建元年十二月縣長趙社遣尼和詣巴郡過成瑞灘作二死子賢求喪不得女絡年二十五乃分金錦囊繋兒頸下乘小舟至父沒所哀哭自珠沉見夢告浮出江賢曰某日與父屍俱出至日父子俱上郡縣上言為之立碑以旌誠孝元鄢氏合江祠旌人元末紅巾賊亂􅀍擄奪刀表同縣費列女年十九至正自刎事聞建間遇賊自縊死明馬仲芳妻史氏瀘州人嫁彌月仲芳溺水死史抉一目自誓守節同州李堯中妻劉氏夫歿截髪教子以壽終事聞旌表李春妻楊氏春早卒守節事姑以孝聞年七十終千户韓繼先妻趙氏守節撫子成立年八十卒庠生張鳴鐸妻鄧氏守節撫子健登第俱經旌表李應林妻鄧氏林早卒氏貞節自持撫子成立舉人高在崙妻陳氏避賊山中被執罵賊死生員鍾子英妻崇禎寇亂夫婦投江死馮敏季女江安人幼聰慧通列女傳未字敏卒葬之日斷左小指置壙内誓不受聘母弟陰許聘焉令婢諭意女操刀擊婢事遂寢事聞旌表文愛萬女正針江安人年十七鄢藍賊卒至欲脅以從正針不辱投水死同縣庠生陳尚文妻杜氏夫卒無子誓死守節厯七十餘年事聞旌表又胡氏嘉靖壬子以節婦旌黄銘女龍英瀘州人年十六被賊曹甫刦掠罵賊不絶口賊怒斬其首事聞旌表王悦妻羅氏合江人天啟中奢賊陷城羅被執過馬街渡悦趨求贖之羅大聲曰君勿至贖我無具反罹害言畢投馬街渡死事聞旌表胡大斗妻黎氏瀘州人奢賊破白馬峒大斗遇害黎自刎死張琴妻胡香瀘州人琴患惡疾香事之不違琴卒遂自縊高氏納谿人夫歿子幼氏織絍撫孤誓不他適守節至八十􅀊卒同縣庠生趙繼鱗妻李氏傅氏李遇兵投崖死續娶傳􅀊饑隨夫投淵死庠生閔翼聖妻王氏避賊蘆延鄉有謀刼之者氏投繯死賊義而葬之庠生易衍禹妻王氏賊至被執大罵投崖死閔性善甫五􅀊父歿依舅氏養母有求配者性善以母女相依誓死不字母疾祝天刺血和藥及卒􅀒土成墳本朝徐明蛟妻杜氏合江人明蛟為明末撫標參將討賊死難杜適在軍中投繯欲殉以救免攜二子避亂採蕨而食貧困流離人所不堪杜怡然終身雍正年間旌張振鼇妻先氏合江人振鼇於明末以諸生終遺子二齡屢經離亂苦節不渝年七十餘卒又蔣壬樟妻王氏年十九而寡苦節終身均雍正年間旌馬愷妻曾氏合江人夫亡年十九族人逼之改適曽􅙃面斷髮示不可奪飬姑教子以婦道稱韓止善妻任氏瀘州人夫亡守節同州節婦游璋妻楊氏夏思堯妻羅氏羅國俊妻張氏汪遇文妻李氏魏襲妻涂氏申冠世妻馮氏張國柱妻宋氏戴濬妻楊氏曹欽佐妻宿氏楊世俊妻蕭氏楊瑋妻祝氏李萬和妻趙氏烈婦易生華妻蔣氏夫亡遺子又殤矣志守節夫弟逼嫁之觸柱死又九姓司節婦任宗頊妻韓氏任嗣基妻韓氏張柄弋妻王氏王价妻胡氏李莽妻黄氏均乾隆年間旌庠生袁鈵妻曹氏納谿人夫亡守節同縣節婦劉若寛妻閔氏守志撫孤登上壽五世同堂均乾隆年間旌彭仕應妻劉氏合江人夫亡守節同縣節婦資汝遇妻李氏劉朝相妻雍氏袁鍵妻羅氏胡際飛妻唐氏均乾隆年間旌范孔陽妻潘氏江安人夫亡守節同縣節婦李迎春妻林氏祝鳳妻李氏聶􅓨妻單氏卓朝卿妻楊氏陳仕佐妻呉氏雷偉妻王氏呉作哲妻骨氏祝如松妻李氏周曾惠妻賈氏烈婦彭添聰妻杜氏均乾隆年間旌孫秀昇妻蕭氏瀘州人夫亡守節同州節婦李瑄妻喻氏范記妻魏氏韋有庠妻劉氏韋憲儒妻楊氏陳天錫妻楊氏古理融妻李氏徐維聰妻華氏朱義士妻符氏陳基垣妻魏氏又九姓司節婦易學浚妻楊氏烈婦王郭氏烈女顔三姑均嘉慶年間旌蕭山望妻羅氏納谿人夫亡守節同縣節婦何國鈺妻曾氏何國欽妻唐氏烈婦段蒲氏貞女袁姑均嘉慶年間旌李世權妻程氏合江人夫亡守節同縣節婦李今佐妻羅氏鄭榜妻唐氏李材妻趙氏鄧錦章妻陸氏李棣妻胡氏均嘉慶年間旌鄧中榜妻李氏江安人夫亡守節同縣節婦盧文俊妻羅氏劉世偉妻蕭氏楊維億妻陳氏烈婦鄭元萃妻苟氏均嘉慶年間旌仙釋隋劉珍開皇中居合江之安樂山忽取丹經鐘磬封於石室之中曰後六十年當有聖君取之自以火化唐高宗果遣使取丹徑鐘磬以進詔即山中建一延真觀扁乃御筆也唐落魄仙姓張常賣鼠藥於梓州獄吏王昌市藥以歸䑕食之皆飛去後昌入瀘又遇之乃易其藥餌之呼昌為易元子授以道術取馬送昌歸至家馬化龍入潭昌後遂仙去土產麩金元和志瀘州貢中江水出鹽華陽國志漢安縣有鹽井葛元和志瀘州貢麻布元和志瀘州賦寰宇記瀘州産班布茶寰宇記瀘州之茶樹夷獠常攜瓢穴其側每登樹採摘牙茶必含於口寺其展然後置於瓢中旋塞其竅歸必置於暖處其味極佳又有麄者其味辛而性熱飲之療風通呼為瀘茶藥寰宇記瀘州産大黄杏仁醬元和志瀘州貢花竹簟寰宇記瀘州産楠木荔枝石青石綠明統志皆州土產
