body:
  text: 大清一統志眉州直隸州在距四川一百省六治十南里少西南北一距百九一百十八里東十里西東至一資州百三仁十壽縣里南界至三嘉十定里西至雅府樂山縣州府名山界一百里縣界北至成九都府十五新津里西縣南界八十至嘉定里東南府洪雅至資州縣界七井十研縣界里東北至四資州仁十里本壽縣州境界八東西十距里西八十北五至邛州蒲里南北距江縣界一百一十五界五里東十五至資里南州至仁壽嘉定縣府界三夾江十縣里西界八至丹稜縣十五里北至西彭南山至縣嘉界三定府十里夾江東縣南至界七青神十里縣界五十五里東北至彭山縣界四里自十里州治西至北至京蒲江師五縣千界六十九百里分野天文井鬼分野鶉首之次建置沿革禹貢梁州之域秦爲蜀郡地漢爲犍爲郡武陽縣地後漢及晉宋因之齊建武三年析置齊通左郡梁曰齊通郡置齊通縣又於郡置青州元和志梁太清二年武陵王蕭紀立青州取漢青衣縣爲名按隋志齊通郡及齊通縣皆置於梁時元和志寰宇記謂後魏置通義縣與隋志不合後魏廢帝二年改曰眉州元和志因峨嵋山爲名周復曰青州尋又曰嘉州隋開皇初郡廢改縣曰廣通仁壽元年又改曰通義大業二年復改嘉州曰眉州尋廢州以縣屬眉山郡時郡治龍游即今嘉定府自大業改郡以前青州眉州嘉州皆在通義唐始移嘉州之名於龍游耳隋志書之不明故諸志多誤指唐武德二年復於通義縣置眉州天寶初改爲通義郡乾元初復爲眉州屬劒南道五代屬蜀宋亦曰眉州通義郡屬成都府路太平興國初改通義縣曰眉山元曰眉州至元十三年屬嘉定路二十年以州治眉山縣省入明洪武九年降州為眉縣十三年升直隸州屬四川布政使司本朝因之屬四川省領縣三丹稜縣在州西六十里東西距五十五里南北距五十里東至本州界十五里西至雅州府名山縣界四十里南至嘉定府夾江縣界三十里北至邛州蒲江縣界二十里東南至夾江縣界三十五里西南至嘉定府洪雅縣界十五里東北至成都府新津縣界六十里西北至蒲江縣界三十里漢犍為郡南安縣地周明帝分置齊樂縣武帝改曰洪雅隋開皇十二年改曰丹稜屬嘉州大業初屬眉山郡唐屬眉州宋因之元省明洪武十三年復置仍屬眉州本朝因之彭山縣在州北四十里東西距七十里南北距五十里東至資州仁壽縣界四十里西至邛州蒲江縣界三十里南至本州界十里北至成都府新津縣界四十里東南至本州界二十五里西南至本州界二十里東北至仁壽縣界四十里西北至邛州界四十七里漢置武陽縣屬犍為郡後漢為犍為郡治晉宋因之蕭齊徙郡治僰道以縣屬之梁改武陽曰犍為置江州西魏改縣曰隆山周省江州置隆山郡隋開皇初郡廢縣屬眉山郡唐初屬陵州貞觀元年省入通義二年復置改屬眉州先天元年改曰彭山宋元俱因之明洪武九年併入眉縣十三年復置仍屬眉州本朝康熙元年併入眉州雍正六年復置青神縣在州南八十里東西距五十里南北距五十五里東至資州井研縣界十里西至嘉定府夾江縣界四十里南至嘉定府樂山縣界二十里北至本州界三十五里東南至井研縣界四十里西南至夾江縣界七十里東北至資州仁壽縣及本州界七十里西北至本州界八十里漢犍為郡南安縣地周置青神縣并置青神郡隋開皇初郡廢縣屬眉山郡唐屬眉州宋池本朝康熙三十三年修乾隆十年二十五年嘉慶十三年重修彭山縣城周六里門四外環以池明成化中築正德中甃石本朝乾隆二十年修五十九年重修青神縣城周五里四分門四外環以池明天順中築嘉靖初甃石本朝乾隆二十八年修嘉慶十四年重修學校眉州學在州治南宋時建本朝康熙二年重建乾隆四十三年修入學額數十二名丹稜縣學在縣治南宋紹興中建明成化中遷縣東北本朝康熙初復還舊址入學額數八名彭山縣學在縣治西南明時建本朝康熙元年裁併眉州學雍正八年重建入學額數六名青神縣學在縣治西南本朝雍正八年建入學額數六名鶴山書院在州城内明嘉靖九年建祀宋魏了翁本朝康熙初重建眉山書院在州治南本朝康熙初建於三蘇祠乾隆十九年遷建今所嘉慶十年修大雅書院在丹稜縣治南舊在東門外本朝乾隆二十四年建四十九年遷今所又舊有㢲崖書院在縣北十五里宋紹南四十興間建栅里亦宋時頭書建今院俱在縣廢桂香書院在彭山縣學宫西本朝乾隆初建嘉慶九年修青江書院在青神縣治南朝乾隆初建五十本年修彭山義學在按縣城舊志内載柵本朝嘉頭書院慶十六年建在丹稜縣南四十里五里宋建㢲崖書院在宋紹興中建今並丹廢稜縣北謹附記十戸口原額十六人丁萬三三千二百千五百一九十六十八名今滋生男口計一十婦共七五萬七百一一十戸田賦田地一萬三百四十額徵地丁正雜銀二三頃九十萬二千四三畝四百五十分有奇九兩一錢四分五釐山川蟆頤山在州東七里志自象耳山寰宇記形似蝦蟆連峯壁立西瞰玻頤明瓈江統五十餘里至龍洞唐末此有磅礴踞楊太虚蹲上有淘丹泉山爾朱先生得道於腹有穴曰此輿地紀勝人日出東郊渡玻瓈游蟆頤眉之故事也大旺山在州東南五十里自蟆頤山南趨或起或伏至此峯巒屹立回拱州城石佛山在州西南二十五里山半有石佛像故名宋蘇軾寄弟詩卜宅向何許石佛山下路即此連鼇山在州西南九十里山􅀔連續其形如鼇蘇軾少時讀書於此醴泉山在州西八里環遶州城山半有八角井水清甘如醴筆架山在州西二十五里三峯峙立形如筆架其隂為瀘崩溝環居數十家人皆善書人以為山靈所鍾息臺山在州西三十里東館鎮北快活山在州西北九里平地突起高百餘丈又回龍岡在州西北十里自盤龍山南來或起或伏至此岡阜高出遇雙河口水折而西旋狀若回龍七龜山在州西北二十里南北兩山對峙延互十餘里中平坦有七峯羅列前後形皆龜􅀋白虎山在州東北元和志在通義縣東北二十五里西臨汶江寰宇記其山壁立臨江下有白虎潭曹學佺名勝志按神異記云犍為有一白虎出衆黑虎隨之不傷人物漢王襃招碧雞神祠黃龍見兮白虎仁指此按元和志作白獸避唐諱也舊志謂一名獸山者非是三峯山在丹稜縣東南二十里中峯極高左右稍下形知山字鐵桶山在丹稜縣東南四十里四圍峻險唐花敬定鏖戰於此長山在丹稜縣南二十里巉崖孑立挺入霄漢飄然山在丹稜縣西五里石牛山在丹稜縣西三十里羣石相連如牛龍鵠山在丹稜縣北十五里亦名龍鶴山上有天柱峯下有龍涎洞宋李燾少時讀書於此築室曰㢲岩子壁􅐉亦讀書於此孝宗御書龍鵠山三大字石刻尚存赤崖山在丹稜縣北二十里其山高峻色赤有稜狀如飛旗拱翼縣治縣以此名三青山在丹稜縣東北三十里寰宇記謂之三箐山東山在彭山縣東一里龍爪灘下宋虞允文次子公著築室讀書於此魏了翁為書東山精舍四字又東五里為金華山彭亡山在彭山縣東十里亦名彭望又曰彭模後漢書建武十一年岑彭攻公孫述至武陽所營地名彭亡彭聞而惡之欲徙㑹日暮而止蜀刺客詐為亡奴降夜刺殺彭常璩華陽國志述旣殺彭改彭亡曰平無言無賊也郡國志武陽有彭亡聚注南中志曰縣南二十里有平望山晉書永和三年桓温伐蜀次彭模自將步卒直指成都二百里九年朱齡石討譙縱師次平模去成都二百里酈道元水經注江水自武陽東至彭亡聚亦謂之平模此地有彭冢言彭祖冢焉寰宇記彭女山在彭山縣東北又名彭亡山亦名平模山耳蟠龍山在彭山縣西去州四十里狀若蟠龍一名走馬山下有蠟魚堰水北平山在彭山縣西北三十里寰宇記引李膺益州記云張道陵得仙於此陵有二十四化此其一也明統志上有天柱峯夜見五色神燈莫知其數平葢山在彭山縣北一里下臨繫龍洞鼎鼻山在彭山縣東北元和志鼎鼻山亦曰打鼻山在彭山縣南十五里家譙縱據蜀朱齡石伐之縱遣將譙小苟塞打鼻以禦之即此山形􅀌起東臨江水昔周鼎淪於此水或見其鼻遂以名山輿地廣記今縣南十餘里之打鼻山乃古鼎鼻山縣東北之鼎鼻山乃其支峯耳盤石山在彭山縣東北六里明統志上有普照寺藏宋太祖太宗真宗仁宗御書崖半有石室崌崍山在彭山縣東北十二里寰宇記導江從山南合流而下天社山在彭山縣東北二十里接新津縣界明統志漢建安間李嚴鑿天社山通東道即此象耳山在彭山縣東北二十五里山形聳秀連峯接嶺直南至蟆頤山下有寶硯磨針二溪龍池蠏泉諸勝五渡山在青神縣東十里水經山下繞流屈曲渡處凡五因名熊耳山在青神縣西十五里華陽國志望帝以襃斜為前門熊耳靈關為後户水經汪南安縣西有熊耳峽連山競險接嶺爭高多稜山在青神縣西四十一里東至多棱川北界山在青神縣北二十五里李膺益州記云南安武陽二縣於此山分界上巖在青神縣東北五里又中巖在縣東十里上有喚魚潭羅漢洞巖半有三石筍青衣水經其下下巖在縣東二十里又有慈姥巖在縣東五里九龍洞在丹稜縣南四十里柵頭鎮南上有峯巒石倉洞在彭山縣東北二十五里有石倉在半山石壁間巖竇如蜂房相傳竇出米謂之石倉未洞大江在彭山縣東北一里自新津縣流入經縣東又南經州城東又南經青神縣東又南入嘉定府界水經注江水至武陽縣合􅗪江文井江東至彭亡聚又東南逕南安縣西元和志大江一名汶江亦曰導江舊志大江經彭山縣有龍爪灘鼔樓灘又經州東蟆頤山下波流澄瑩亦名灘多覆舟之玻瓈江又至青神縣東南舊有松柏患相傳宋天禧中縣令張逸為文禱江神不越月而灘徙五里蜀江自新津縣流經彭山縣東北合府河又經縣東北一里凡五十里入州界又南三十里經州東門外又二十里合松江入青神縣又五十里入嘉定州松江在州東南二十里自大江分流西南繞州城與醴泉合江思濛江在州南五十里源出丹稜縣東南流經州南又南經青神縣南入大江元和志思濛水在丹稜縣西北二十五里寰宇記思􅄥水源出蒲周山東流入通義縣又有夷郎川在丹稜縣東三十里與通義縣相連舊志龍鵠溪源出龍鵠山經縣西北流繞城南東出思濛入州界又名芙蓉溪經州南五十里又南經青神縣南二里又五里入江按輿圖有斯磨河源發丹稜縣西東南流至靑神縣西北有水水自丹稜縣東赤崖山南發源東南流逕州界入焉即寰宇記夷郎川也斯磨即思濛之訛舊志謂夷郎川即思濛江誤醴泉江在州西八里有二曰蠟魚堰水自山源皆出蟠龍山自山東者西者曰柏樁堰水二水分流曰雙河自州西北十里曰雙河口又東南流為醴泉江繞州城與松江合又東入大江又有龍潭在州西南十里源出筆架山瀘崩溝東流入醴泉江府河在彭山縣東北自成都府雙流縣流入至縣東北十八里入大江即成都二江之下流也以與赤水合流亦名赤水澭泉水在州西南八十里一名金流江源出丹稜縣流經州界至青神縣入江寰宇記澭甘水源出洪雅縣可募山流入丹稜縣又難江水在通義縣西南二十五里源出丹稜縣本名澭甘水入縣號難江以其水峻急難度為名又有多稜川在縣西南七十里南接青神縣界按舊志金流江在州西南八十里源出丹稜縣獨􅀌里入青神縣界經山東南流二十里經州又二十縣南二十里入江蓋即澭甘水一水而異名者也赤水在彭山縣東十八里華陽國志建安二十四年黃龍見武陽赤水九日水經注武陽有赤水下注江明統志自仁壽縣流經縣入江