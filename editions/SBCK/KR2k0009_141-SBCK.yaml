body:
  text: 成都府四川省治東西距三百四十里南北距二百七十五里東至潼川府樂至縣界一百六十里西至茂州瓦寺土司界一百八十里南至眉州彭山縣界一百十五里北至綿州綿竹縣界一百六十里東南至資州資陽縣界一百六十五里西南至邛州界一百二十里東北至潼川府中江縣界一百五十里西北至茂州汶川縣界一百四十里自府治至京師五千七百一十里分野天文井􅀑分野鶉首之次建置沿革禹貢梁州之域自古為蜀國華陽國志蜀之為國肇於人皇至黄帝為其子昌意娶蜀山氏之女生子帝嚳封其支庶於蜀世為侯伯厯夏商周武王伐紂蜀與焉周慎靚王五年秦滅之置蜀郡史記秦本紀惠文君後九年司馬錯伐蜀滅之華陽國志周失綱紀蜀侯􅁞叢始稱王後有王曰杜宇移治郫邑或治瞿上七國稱王杜宇稱帝禪位於其相開明九世有開明尚徙治成都後與苴巴相攻為秦所滅漢亦曰蜀郡屬益州後漢初為公孫述所據置成都尹後漢書公孫述傳王莽天鳳中為導江卒正居臨邛更始二年自立為蜀王都成都建武元年改益州為司隸校尉蜀郡為成都尹建武十二年述平復蜀郡興平初兼為益州治時益州牧劉焉自綿竹徙治成都建安末蜀漢昭烈帝定都於此建安十九年劉焉子璋以成都降二十六年昭烈即帝位魏景元四年入魏晉太康十年改置成都國封子穎為王後仍為蜀郡太安二年為李雄所據永和三年平之寕康元年陷於苻秦太元八年還屬晉安帝分置懷寕始康二郡宋齊因之元嘉十年置宋寕宋興二郡十六年又徙南泰州之懷寕郡皆􅀉治成都梁徙始康郡於新都梁大寶三年武陵王紀僭號於此西魏廢帝二年入魏後周置總管府省懷寕宋寕宋興三郡人蜀郡隋開皇初州郡並廢置西南道行臺三年復置總管府大業元年府廢仍為蜀郡唐武德元年復置益州總管府三年府罷置西南道行臺九年罷行臺置都督府貞觀元年置劒南道龍朔二年升大都督府開元二年置劒南經畧使七年升節度使天寶元年復曰蜀郡十五載駐蹕於此至德二載改成都府置南京分為劒南西川節度使上元元年罷京五代時王建孟知祥據蜀皆都此宋乾德三年平蜀置西川路太平興國六年降為益州端拱元年復曰成都府淳化五年又降為益州咸平四年分置益州路嘉祐五年改成都府路元曰成都路為四川等處行中書省治至正中明玉珍改成都刺史府明洪武初復曰成都府本朝囯之為四川省治領州三縣十三成都縣附郭在府治北東西距三十里南北距三十五里東與華陽縣分界西至郫縣界三十里南與華陽縣分界北至新都縣界三十五里東南與華陽縣分界西南至温江縣界二十里東北與華陽縣分界西北至新繁縣界三十里古蜀王所治秦置成都縣為罸郡治漢固之後漢木兼為益州治三國蜀漢建都於此晉以後皆為州郡治隋為郡治唐為成都府治五代王氏孟氏皆為國都宋為成都府治元為成都路治明為成都府治本朝因之華陽縣附郭在府治南東西距四十里南北距二十里東至簡州界四十里西與成都縣分界南至雙流縣界二十里北與成都縣分界東南至簡州界四十里西南至雙流縣界二十五里東北至簡州界一百里西北與成都縣分界唐以前俱為成都縣地貞觀十七年分置蜀縣與成都縣共洽郭下乾元元年改為華陽縣宋元明因之本朝康熙九年併入成都縣雍正五年復置雙流縣在府西南四十里東西距四十五里南北距四十里東至華陽縣界二十里西至崇慶州界二十五里南至新津縣界二十里北至温江縣界二十里東南至資州仁夀縣界三十里西南至崇慶州界四十里東北至華陽縣界二十里西北至溫江縣界十五里漢為蜀郡廣都縣地隋仁夀元年改置雙流縣屬蜀郡唐龍朔二年復分置廣都縣屬成都府宋因之元省廣都入雙流屬成都路明洪武十年省入華陽十三年復置屬成都府本朝康熙元年併入新津雍正六年復置温江縣在府西少南五十里東西距四十五里南北距三十里東至成都縣界三十里西至崇慶州界十五里南至雙流縣界二十里北至郫縣界十五里東南五雙流縣界三十里西南至崇慶州界十五里東北至成都縣界三十里西北至灌縣界四十里漢為郫江原二縣地西魏分置温江縣隋開皇三年省入郫縣仁夀三年改置萬春縣大業初又省唐武德二年復置萬春屬益州貞觀元年改曰温江至德初屬成都府五代及宋因之元屬成都路明屬成都府本朝因之新繁縣在府西北五十六里東西距三十里南北距三十五里東至新都縣界十五里西至崇寕縣界十五里南至成都縣界二十里北至彭縣界十五里東􅀯至成都縣界十七里西南至郫縣界十五里東北至新都縣界十八里西北至彭縣界二十五里漢置繁縣屬蜀郡蜀漢徙降人居於此周改曰新繁隋開皇初省人成都唐武德三年復置屬成都府宋因之元屬成都路明洪武十年省入成都十三年復置屬成都府本朝因之金堂縣在府東北七十里東西距六十五里南北距六十里東至潼川府中江縣界五十里西至新都縣界十五里南至簡州界五十里北至漢州界十里東南至潼川府樂至縣界七十里西南至新都縣界二十五里東北至中江縣界七十里西北至漢州界二十里漢為新都牛鞞二縣地唐初為雒新都二縣地咸亨二年分置金臺縣屬益州垂拱二年屬漢州五代晉天福初改曰漢城後復故宋乾徳五年置懷安軍以縣屬之元初升軍為懷州至元二十年省州入縣屬成都路明初屬成都府洪武初省入新都十三年復置本朝因之新都縣在府北五十里東西距三十里南北距四十五里東至金堂縣界十五里西至新繁縣界十五里南至成都縣界十五里北至漢州界三十里東南里西南至成都縣界十里東北至金