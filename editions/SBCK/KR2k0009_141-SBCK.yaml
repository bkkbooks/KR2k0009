唐大厯中建宋時禱雨有驗改今名俗呼草堂寺本朝康􅄉四年修淨衆寺在成都縣西北一名萬福寺唐開元十六年新羅國僧無相募建有巨鐘重千鈞昭覺寺在成都縣北唐建即孟蜀宣華苑故址本朝康􅄉五年修有聖祖仁皇帝御製昭覺寺詩幷勅賜扁額經部大慈寺在華陽縣東唐至德中建明皇書大聖慈寺額本朝順治年間修普慈寺在華陽縣東蜀中人多餞客於此馬覺寺在華陽縣東舊名正覺院相傳馬祖甞經此因名三學寺在金堂縣東南二十里三學山一名棲賢寺有上中下三刹曰法海曰普濟曰廣濟承天寺在灌縣東􅀯四十里寺有馬祖靈骨塔髙丈六尺俗呼為馬祖寺飛赴寺在灌縣西南三十五里内有四望亭名勝志按神僧僡青城山有異僧出入井中赴供長安項􅈓復返廣明中賜名飛赴寺衍慶寺在簡州西北長松山亦名長松寺本蠶叢廟址唐開元中為馬祖所建宋名嘉福今名靈峯修覺寺在新津縣東南五里修覺山僧神秀結廬於此唐明皇駐􅵖為題修覺山三字有左右二井春夏汲東秋冬汲西水斯甘冽反之則否名曰靈泉又縣南二里有四安寺亦神秀創杜甫有暮登四安寺鐘樓詩開元寺在漢州治東北唐建羅漢寺在什邡縣東唐景龍三年建為馬祖出家處門右有說法臺本朝康􅄉三年修龍居寺在什邡縣西舊名凈慈寺方輿勝覽在龍居山飛瀑千尺虚亭屹然橋穔路轉高柏擁翠玊局觀在府城南楊柳隄寰宇記内有玉局壇張通陵得道之所方輿勝覽昔老君與張道陵至此有局腳五牀自地而岀老子升座說南斗經既去而座隱入地中因成涸穴故以玉局為名蘇軾提舉玉局觀即此明統志在府城北二十里按明統志與寰宇記不同明初別建止取故名非故址通真觀在成都縣北十里學射山隋開寶中建名至真觀明統志晉孝武時張伯子於此飛昇度人觀在華陽縣治東相傳唐保和真人嘗修煉於此金烏觀在温江縣西三里内有池舊志唐高宗夢金烏集於益州亘木上遣使訪至此見金烏三足而金色浴於池中因建伏龍觀在灌縣南一里離堆山上下有深潭相傳李冰鎖孽龍於此長生觀在灌縣南二十里方輿勝覽舊名碧落觀在青城山北二十里漢昭烈時有范寂字無為修煉於此觀有古枏高數十尋圍三十丈又有赤城閣臨眺甚遠丈人觀在灌縣西南五十里青城山北方輿勝覽今名㑹慶建福宫昔甯封棲於北巖之上黄帝師焉築壇拜為五岳丈人常道觀在灌縣西南青城山一名延慶宫方輿勝覽隋時建有張天師遺蹟及唐明皇御書碑有六時水六時洒水以代䓘漏清都觀在灌縣西南六十三里一名洞天觀輿地紀勝宋文彦博鎮蜀日市觀側陳地以贈張俞所謂白雲居也其下白雲溪出馬青羊宫在成都縣西南寰宇記老子與關尹喜别約曰千日後尋我於成都青羊肆今為青羊宫明統志青羊宫在府西南十里明初蜀王重建本朝康􅄉七年修上清宫在灌縣高臺山上唐建吳船録宫在峯頂岷山數百峯悉在闌檻下如翠浪起伏勢皆東傾方輿勝覽夜有神燈飛行徧空其東北麓有天師手植乗十七株文殊院在成都縣西北即妙圓塔院有聖祖仁皇帝御製詩幷勅賜扁額二仙庵在成都縣西南本朝康􅄉三十四年建有聖祖仁豈帝御製詩及扁額乾隆四十六年修䕶國庵在華陽縣南本朝康熙四十一年勅賜扁額經部名宦秦李冰孝文王時為蜀守鑿離堆辟沫水之害穿成都二江溉田萬頃罰人水饗其利子二郎贊􅂇之厥功懋焉漢文翁舒人景帝時為蜀郡守仁愛好敎化見蜀地僻陋有蠻夷風欲誘進之乃選邵縣小吏開敏有材者十餘人遣詣京師受業博士或學律令數嵗皆成就還歸文翁以為右職又修起學宫於成都市中招下縣子弟以為學官弟子高者以􅀘郡縣吏次為孝弟力田常選學官僮子使在便坐受事每出行縣益從學官諸生明經飭行者與俱吏民榮之爭欲為學官弟子由是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始云趙䕶成帝鴻嘉三年廣漢男子鄭躬等盗庫兵四年黨與寖廣犯四縣衆且萬入拜䕶為廣漢太守發郡中及蜀郡合三萬人擊之或相捕斬除罪旬月平張堪宛人光武時拜蜀郡太守時大司馬吳漢伐公孫述軍餘七日糧隂具船欲遁堪聞之馳徃見漢誽述必敗不宜退師漢從之成都既拔堪檢閲庫藏收其珍寳悉條列上之秋毫無私慰撫吏民蜀人大悅蔡茂懷人光武時為廣漢太守有政績時隂氏賓客在郡界多犯吏禁茂輒糾案無所廻避第五倫長陵人永平中為蜀郡太守蜀地肥饒􅁺史皆鮮車怒馬以財貨自達倫悉簡其豐贍者遣還之更選􅀌貧志行之人以處曹任於是爭賕抑絶文職修理所舉吏多至九卿二千石廉范杜陵人建初中遷蜀郡太守俗尚文辯好相持短長范每厲以淳厚不受倫薄之誽成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毁先令但嚴使儲水百姓歌之曰亷叔度來何暮不禁火氏安作平生無襦今五絝陳寵沛國汶人和帝初為廣漢太守西州豪右幷兼吏多姦貪訴訟日百數竉到顯用良吏王渙鐔顯等以為腹心訟者日減郡中清肅黄昌餘姚人順帝時遷蜀郡太守先太守李根年老多悖政昌到吏人訟者七百餘人悉為斷理莫不得所密捕盗師一人脅使條諸縣彊暴姓名居處乃分遣掩討無所遣脫宿惡大姦皆奔走他境第五訪長陵人順帝時補新都令政平化行三年之間鄰縣歸之户口十倍韋義杜陵人順帝時為廣郡長政甚有續廣都為生立廟及卒吏氏舉哀若䘮考妣李膺襄城人桓帝時出􅀘蜀郡太守修庠序設條教明法今恩威並行蜀之珍玩不入於門益州紀其政化高䀢陳留人獻帝初為蜀郡太守始文翁立文學精舍講堂作石室永初後遇火䀢更修立乃增造二石室州奪郡文學為州學郡更於夷里橋南岸道東􅁁起文學以播文教按魏志高柔傳注髙幹父躬蜀郡太守陳留圉人眹疑即躬之譌李嚴南陽人漢末益州牧劉璋以爲成都令有能名董和枝江人漢末劉璋以爲牛鞞江原長成都令蜀土富俗奢和躬率以儉防遏踰僭爲之軌制所在皆移風變善畏不敢犯縣界豪強憚和嚴法說璋轉和爲巴東屬國都尉老弱相攜乞留者數千人璋聴留二年三國漢楊洪武陽人先主爭漢中時蜀守法正從行諸葛亮表洪領蜀郡太守衆事皆辦遂使即真鄧芝新野人先主定益州芝爲郫邸閣督先主與語大奇之推爲郫令遷廣漢太守所在清嚴有治績蔣琬湘郷人先主入蜀除廣都長先主嘗至廣都見琬衆事不理將加罪諸葛亮請日蔣琬社稷之器非百里才也其爲政以安民爲本不以修飾爲先願重加察之先主乃不罪項之爲什邡令王連南陽人先主平成都以爲什邡今轉任廣都所居有績後遷蜀郡太守吕乂南陽人先主時爲新都綿竹令存心隱卹百姓稱之爲一州諸城之首累遷廣漢蜀郡太守蜀郡户口衆多士伍亡命更相重冒姦巧非一又到官爲之防禁開喻勸導數年之中漏脫自出者萬餘口晉周處陽羡人武帝時為廣漢太守郡多滯訟有經三十年不決者處詳其枉直一朝決遣南北朝梁柳憕解人武帝時為蜀郡太守為政亷恪益郡懷之庚黔婁新野人武帝初為益州刺史鄧元起長史成都平城中珍寶山積元起悉以分寮佐黔婁一無所取請書數篋而已後除蜀郡太守在職清素民安之魏辛昻狄道人大統末尉遲迥平蜀表為成都令昻到縣即與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠卹嚴友信立身之要如斯而己若不事斯語何以成名各宜自勉克成令舉弗言切理至諸生等並深感悟師告其父兄曰辛君敎誡如此不可違之於是井邑肅然咸從其他隋柳儉解人高祖初為廣漢太守甚有能名韋仁夀萬年人大業未為蜀郡司法書佐斷獄平恕其得罪者皆曰韋君所論死而無恨唐韋嗣立陽武人武后時為雙流令政為二州最劉易從彭城人武后時彭州長史決唐昌池江鑿川派流合堋口琅岐水漑九隴唐昌田張東之襄陽人武后時以鳳閣舍人出為合蜀二州刺史故事􅀊以兵五百戍姚州地險瘴到屯輒死東之請罷姚州􅀠嶲府嵗時朝覲同蕃國廢瀘南諸鎮而設關瀘北非命使不許交通增嶲屯兵擇良吏以統之疏奏不納李禕吳王恪孫開元初蜀州刺史政號清嚴人吏畏而服之子峴肅宗時亦刺蜀州顔春卿琅邪人開元初調犀浦主萍常送徒於州亡其籍至廷口說物色凡千人無所差長史陸象先異之轉蜀尉章仇兼瓊潁川人開元中益州長史開通濟大堰一小堰十自新津中江口引渠南下百二十里至眉州西南入冮溉田千六百頃顔泉明春唧弟子肅宗拜為郫令政化清明縣宿盜人情翕然成都尹舉課第一遷彭州司馬盧士珵范陽人貞元末漢州刺史立隄堰溉田四百餘頃薛元賞佚其箱太和初漢州刺史李徳裕受維州降牛僧孺沮之元賞上言可因撫之潰虜􅈾腹不可失不省高仁厚怢其籍出為西川押牙邛州賊阡能等紛起節度使陳敬瑄遣仁厚討之六日而平五賊又平涪州刺史韓秀昇之亂後與敬瑄絶敗死昭宗時贈司徒楊晟佚其籍昭宋時守彭州王建據蜀數攻彭州城陷不屈死其愛將安師建勇而有禮既就執王建顧曰爾報楊司徙足矣能從我乎謝曰楊司徙哲同生死不忍復戴日月三謂不四乃殺之五代前蜀段融事後主爲雒今多惠政漢州惟廉吏第一後蜀張業浚儀人本名知業孟知祥入蜀授簡州刺史時蜀漢盜賊羣起百姓驚擾菐率兵捕之令五家爲小保五十家爲大保旬日之内擒􅀗殆盡宋吕餘慶安次人太祖平蜀命知成都府時盜賊四起軍士恃功驕恣大將王全斌等不能戢下一日藥市始集街吏馳報有軍佼􅀍酒持刀奪賈人物餘慶立捕斬之以殉軍中畏服民用安渚劉􅄉古寕陵人太祖時知成都府九里堤壤􅄉古規盡修築以捍水患民德之曰劉公隄吕端安次人開寳中知成都府爲政清簡遠人便之卒仲甫孝義人太祖時知彭州州卒誘營兵及諸屯戌以長春節宴集爲亂屬春初仲甫出城廵視見壕中草深意可藏伏命燒薙之其黨疑謀泄乃自首盡擒斬之先是州少種樹署無所休仲甫課氏栽柳䕃行路郡人德之石􅀘闕柳太祖問羣臣大武兼資者趙普以仲甫對徙益州兵馬都監太宗時知成都府奏免嵗輸銅錢罷榷酤政尚寛簡蜀人安之郭守文太原人太祖平蜀選知簡州時劒外多寇守文悉招來集附安守忠晉陽人乾徳時知漢州時寇難甫平使車旁牛公帑不足守忠出私錢以給用每遣使太祖必戒曰守忠在蜀律己以正汝當效之王晉卿河朔人乾徳四年知漢州時蜀初平寇盗充斥晉郷嚴武備設方畧擒捕靡遺賊無敢窺其境耿昭化河南人為蜀州司户參軍盗據城欲脅以官昭化大罵至㫁手足不屈而死張詠鄄城人太宗時知盆州時李順搆亂王繼恩上官正總兵攻討頓師不進詠以言激正勉其親行大致克捷時民多脅從詠移文諭以朝廷恩信使各歸田里且曰前日李順脅民為賊今日吾化賊為民不亦可乎蜀士知向學而不樂仕宦詠察郡人張及李畋張逵者皆有學行為鄉里所稱遂敦魁就舉三人者忠登科士由是知勸民有牃訴者詠灼見情偽立爲判決人皆厭服真宗時以詠前在蜀治行優異復命知益州傳諭詠曰得卿在蜀联無西顧之憂矣凌䇿涇人太宗時爲西川節度推官以彊幹聞李順之亂川陜選官多憚行莱自陳三涖蜀境諳其民俗即命知蜀州真宗時復知益州初策登第夢人以六印加劒上遺之其後徃劍州凡六任時以爲異䇿勤吏職處事精密真宗甞對王旦稱䇿治蜀敏而有斷宋璫渭南人太宗時知益州屬􅀊饑多盗璫始至以方畧擒捕招輯盗皆首服屏息下詔嘉奬程羽陸澤人太宗時知成都府爲政寛簡蜀人便之謝濤富陽人太宗時知華陽縣時李順初平田廬荒廢詔有能占田而倍入租者與之於是腴田悉爲豪右所占流氏至無所歸濤收詔書悉以田還其主劉師道東明人太宗時知彭州轉運使劉錫馬襄上其治績召歸郭延濬彭城人太宗時知漢州州絰兵燹廨舍橋梁城砦忠毁延濬募軍氏葺之又率州帑以應軍須薛田河東人真宗時爲益州路轉運使民間以鐡錢重私爲劵以便交易謂之交子而富家專之數致爭訟田請置交子務以權其出入未報及寇珹守益州卒奏用其議蜀人便之高覿靳人真宗時為益州轉運使彭州廣碃麗水二峽地出金宦者挾富人請置場募人夫採取之覿曰聚衆山谷間與夷獠雜處非遠方所宜且得不償失奏罷之張佶渭南人景德中為益州鈐轄御軍撫民甚有威惠蜀人久猶懷之任中正濟隂人景徳中代張詠知益州在郡五載遵詠條敎蜀人便之王􅍼河南人真宗時知益州繩盜以峻法多致之死有卒夜告其軍將亂立辨其偽斬之蜀人比之張詠號前張後王劉隨考城人真宗時通判益州臨事明銳蜀人號為水晶燈籠趙湘華州人真宗時知新繁縣以吏最命知商州李行簡馮翊人真宗時為彭州軍事推官陵州富民陳子美父死繼母詐為父書逐出之累訴不得直轉運使檄行簡核正其獄陳從易晉江人真宗時調彭州軍事推官攝州事時王均盜據成都彭人謀應之從易斬其首謀召餘黨曉以禍福貰之衆皆呼悅乃率勵將吏修嚴守械成其家偉􅀊少稔逸請放還後其業彭思永廬陵人仁宗時為益州路轉運使成都府吏盜公錢付獄已三嵗岀入自妃思水攝府事甫一日即具獄中使􅀊祠峩眉率留成都購珍玩價值數百萬錢悉賁諸民思永削其三之一使怒去而不能有所中傷袁抗南昌人仁宗時為盆州路轉逎使時三司嵗市上供綾錦萬二千匹抗言蜀民困憊願少紓其力以備秦中他日之用是年郊祀蠲其數之半薛奎正平人天聖中知益州見范縝愛之俾興子弟講學有民婦訟其子不孝詰之乃曰貧無以為養奎出俸錢與之且戒之日若復失養吾不貸汝矣其母子遂如􅀄王駿臨城人景祐元年知益州戌卒有焚營殺馬脅軍校為亂者駿潛兵還營下令曰不亂者斂手出門無所問於是衆皆岀命軍校指亂者得十餘人即戮之蔣堂宜興人仁宗時知益州慶厯初詔天下建學堂因廣漢文翁石室為學宫選屬官以敎諸生士人翕然稱之任中師中正弟康定中知益州先轉運使急於籠利自薪芻果蔬之屬皆有算中師盡奏蠲之楊曰嚴河南人慶厯中知益州時急財用多擾民之賦又陜西奏市益梓利路溪洞馬而不知實無馬也日嚴皆奏罷之文彦博介休人慶厯五年知益州嘗擊毬鈐轄􅅟聞外喧甚乃卒長杖一卒不伏呼入問狀令引出與杖又不受後呼人斬之竟毬乃歸田况信都人慶厯中知成都府蜀自李順王均再辭人心易揺守得便宜決事多擅殺以爲威况至拊循敎誨蜀人愛之程戡陽翟人知成都府奪職人言􅀊在甲午蜀且有變仁宗自擇戡再知益州至彭州民妄言有兵變捕斬之守益州者以嫌多不治城堞戡獨宅城浚池自固奏禁蜀人妖言誣民者韓億雍邱人仁宗時知益州故事益州􅀊出官粟六萬石糶給貧民是嵗大旱億倍數出粟先期與民民得不饑又疏九升江口下溉民田數千頃張方平南床人至和􅀄知益州未王或煽言儂智高在南詔將入寇攝守亟調兵築城民大鷩擾朝廷聞之發陜西步騎兵仗絡繹徃戌蜀詔趣方平行許以便宜從事方乎曰此必妄也道遇戍卒皆遣歸他役盡罷適上元張燈城門三夕不閉得邛部川譯人始造比語者梟首境上而流其餘黨蜀人遂安方西鄙用兵兩蜀多所調發方半爲奏免横賦四十萬減鑄鐵錢十餘萬緡王素萃縣人嘉祐中知成都府先是牙校嵗輸酒坊錢以供廚傳日加厚輸者轉困素一切裁約之鐡錢布滿兩蜀而鼓鑄不止幣益輕商賈不行命罷鏄十年以權物價凡爲政務合人情蜀人紀其目號曰王公異㫁韓絳億子嘉祐中知成都府張詠鎮蜀日春糶米秋糶鹽官給劵以惠貧弱厯􅀊久權歸豪右中人奉使至蜀使酒吏主貿易因附益以取悦絳悉奏罷之吕公弻夀州人嘉祐六年知成都府爲治尚寛人疑其少咸斷營卒犯法當杖抗不受曰廿以劒死公弻曰杖者國法劍汝自請杖而後斬之軍府肅然高繼宣􅀩城人仁宗時爲盆州都監蜀人富侈元夕大張燈知府薛奎戒以備盜繼宣籍惡少年飲犒之使夜中潛誌盜背明日皆􅀗鄭驤河南人仁宗時提􅀧益州路刑獄建言蜀人引江水溉田率有禁嵗旱利不均宜弛其禁孫甫陽翟人仁宗時知永昌縣監益州交子務蜀用鐵錢民苦轉貿重故設法書􅁓代錢以便市易轉軍使以偽造交子多犯法欲廢不用甫曰交子易可以偽造錢亦可以私鑄私鑄有犯錢可廢乎但嚴治之不當以小人癈大利後卒不能廢鍾離瑾合肥人仁宗時為簡州推官以殿中丞通判益州建言州郡既土雨後雖旱多隱之以成前奏請令監司劫其不實者陳薦沙河人仁宗時為華陽尉盜殺人棄屍民田薦出驗有以移屍告者田主又殺其母縣欲文致殺二人以逭薦失盜之責薦不可曰焉有誣人以自貰者耶己而􅀗盜姚仲孫商水人仁宗時通判彭州嘗以天下久無事不可以弛兵備因上前世禦戎料敵之䇿名防􅁁􅀛鑑累遷尚書屯田員外郎王騣守益州辟通判州事吕大防藍田人仁宗時知青城縣故時圭田粟入以大斗而出以公平復利三倍民雖病不敢訴大防始均出納以平其直青城外控汶川與敵相接大防據要置邏密為之防禁山之採樵以嚴障蔽韓絳鎮蜀稱其有王佐才八權鹽鐵判官元豐中知成都府俞汝尚烏程入仁宗時知導江縣新繁令卒使者使承其乏將資以公田辭不許至則悉以周舊令之家朱夀隆諸城人仁宗時知九隴縣吏告民一家七人以火死者夀隆曰豈有盡室就焚無一脫者殆必有姦逾月􅀗盜果即縱火之人殺之盧士宏新鄭入仁宗時知漢州校實民産使力佚不溢人徳之魚周詢雍邱人仁宗時通判漢州城中夜有火部衆救之植劒於前曰攘一物者斬火止民無所失亡王舉元鎮定人治平中徙成都轉運使邛井鹽􅀊入三百五十萬為丹稷卓箇所侵積不售下令止之鹽登於舊劉航魏人神宗時知犀浦縣航先知虞城虞城多姦猾喜寇盜犀浦民弱而馴航為政寛猛急緩不同兩縣皆治馮京鄂州人熈寕中茂州夷叛徙知成都府蕃部何丹方宼雞粽關聞京兵至請降議者遂欲蕩其巢窟京請於朝為禁侵掠給稼器餉糧食使之歸夷人喜爭出犬豕割血受盟願丗世為漢藩韓宗道􅄉寕中㩴成都路轉運判官時行新法使者相望於道宗道不務紛更不膠舊貫所究利害務通其平故蜀路視他路獨優丗論嘉之陸詵餘杭人􅄉寕中知成都府青苗法岀詵言蜀氓刀耕火種民常不足今省稅科折已重其民輕侈不為儲積脱􅀊儉不能償逋適陷之死地願罷四路使者詔獨置成都府一路劉庠彭城人神宗時知成都府乞禁西山六州與漢人㛰姻勿蹈吐蕃侵取維州之害張夀濮州人神宗時知成都府蜀人苦多盜棄嚴保伍使不得隱而中其捕限南蠻寇黎雅討走之罷磨刀崖戍卒張戩長安人􅄉寕元年知金堂縣民有小善皆籍記之月吉召老者飲勞使其子孫侍勸以孝悌民化其德縣訟日少程珦河南人神宗時知漢州嘗宴開元僧舎酒方行人讙言佛光現觀者相騰踐不可禁珦安坐不動頃之遂定熙寕法行為守令者奉令惟恐後珦獨抗議指其未便使者李元瑜怒珦印移病歸何常京兆人哲宗時為成都路轉運副使中使持御札至令織戯龍羅二千匹繡旗五百常奏旗者軍器之飾敢不奉詔戯龍羅惟供御服日衣一匹不過三百有奇今乃數倍無益也詔奬其言為減四分之三胡宗愈晉陵人元祐初知成都府蜀人安其政王覿如皋人紹聖初知成都府蜀地齊腴畝千金無間田以葬覿索侵耕官地表爲墓田江水貫城中爲渠嵗久湮塞積苦霖潦多水災觀疏治復故民德之號王公渠吕由誠開對人哲宗時通判成都有治績馬伸東平人紹聖中爲郫縣丞守委受成都租伸屏絶宿弊民爭先輸多沿途假􅄰以達旦常平使者孫俊早行怪問之皆應曰今年馬縣丞受納不我病也俟遂薦於朝席旦河南人徽宗時知成都府蜀數有妖言議者遂言蜀士習亂或導旦治以峻猛旦政務尚和平政和中入見言蜀楮劵益多使民不敢信帝曰朕爲卿損數百萬虚劵而别給緡錢與本業可乎對曰陛下不愛重費以救敞法此古聖王用心也自是錢引稍仍畝邵伯温洛陽人徽宗時提點成都路刑獄賊史斌窺劒門伯温與成都帥臣盧法原合謀守劒門賊不能入蜀人德之唐恕江陵人崇寕初爲華陽令以不龍奉行茶法忤使者謝病免歸梁介乾道中爲彭州守修復三縣二十餘堰灌溉之利及於鄰邦詔直秘閣利州路轉運判官黄疇若豐城人嘉定中知成都府蠲積欠十餘萬考官吏冗員非勅令差注者悉罷之為民代輸六年布估錢計二十萬二千四百緡又别立庫儲二十五萬三千湣期扵異日接續代輸又糴米十五萬石有奇足廣惠倉之儲又減他賦之重者民力遂寛初沈􅀺蠻屢犯􅁁疇若鏤榜曉以禍福青彌兩卷遂乞降後董蠻寇犍為利店疇若亟調兵設方畧捕之皆遁去洪咨䕫於潛人嘉定中隹與之帥成都請於帝授咨䕫藉田令通判成都府與之為制置使首檄咨夔自近辭曰今當開誠心布公道合西南人物以濟國事乃一未有閒而先及門生故史是示人私也卒不受惟以通判職事徃來効忠蜀人高之馮有碩淳祐初權成都府事兀兵入蜀死之詔贈三官李大全淳祐􅀄知簡州元兵克簡州大全死之王驤淳祐初權漢州兀兵入蜀死之同時死者彭州守宇文景訥權劉當可淳祐初權漢州事元兵屠漢州當可與判官邵復錄事參軍熊由司户參軍趙崇啟知雒縣羅君文皆不屈而死元劉元振濟南人憲宗時隨父黑馬入蜀攝萬户年方二十號令嚴明賞罰不妄􅀫將皆敬服之中統元年廉希憲奏為成都總管宋將劉整降元振徃愛之整獻金六千而男女五百人元振以金分賜將士而歸還其男女張宏元統中灌州判官從肅政廉訪使吉逹布修治隄堰役省工速氏利之明何文輝滁人洪武初以參將留守成都號令明肅軍民皆徳之帝甞稱其課畧威望子環成都後御指揮使征迤北陣殁胡子祺吉水人洪武中知彭州都江諸堰歳治隄防舊用鐡石勞費不貲元李堰廢子祺議以竹木代工甚省朱景哲陜西人洪武初知金堂縣廉靜寛平民頼其撫字凡官署學校壇祠多所創建民不勞而事舉易節萬載人洪武閒知成都府治尚清靜吏胥不敢為奸王佑秦和人洪武中知崇慶州招􅝘撫輯甚得民和胡夀安歙縣人水樂中知新繁縣延父老詢邑中利病而罷行之躬行原野勸耕種性淡泊寢處一紙帳後圃種蘆菔數畝採以供客三宰大邑未嘗攜妻子孔友諒長洲人永樂中知雙流縣立學宫尚風節去任民立祠祀之王敏郫縣訓導宣徳中言郫彭盜賊縱横乞命廉能大臣剋朝殄滅詔從之嚴亨宣德中灌縣隂陽學訓術請築都江四十四堰詔許之汪奎婺源人宏治中知成都府嵗饑多盜賑救復業曾遜氶天人正德中知金堂縣老成凝重初遠氏多逋賦不奉約束或以事捕至輒拘擊憊於獄遜至嘆日民不信有司之過也遂下令與民吏始吏不得禁無􅇳自是愉賦者如期至户給倪帖升合有稽民得其使祀名宦劉漢金齒人嘉靖􅀄任成都訓導敎人有法捐貲以養士孤寒皆能自立著郫縣敎諭聲望益著郫人尸死之繆輔之通海人嘉靖初授重慶節推讞獄明斷擢知漢州節浮費卻請記事上敬而弗阿􅌮傳忠裁以制􅀊早調治有法郡不至亂忌之者以考察隂中之怡然引去汪鸞陜州人嘉靖中知簡州亷直慈惠體士愛民救荒弭盜疏減京料鹽課州人思之劉琮安福人嘉靖中知漢州資性剛明州廨學宫傾圯悉為建置丁禾大早設粥賑饑恊豪強屏益賊人稱其能張文淵貴州人嘉靖中知漢州自廿儉約賦役令氏自應不待期㑹而集利害無不興革去久民猶稱道劉體仁昆明人嘉靖中知新繁縣作堰灌口以概民田改甃甎城摘奸僧續善隱罪人稱神明隣縣每有疑獄輒委決無不立服者自奉淡泊民目為青菜劉子文徵厯四川按察使清節與其父同韓宸大理人嘉靖間知什邡縣清介自持勤察民瘼未久以直道去邑人知其貧贐以金帛宸受之行稍速仍及其主任璜臨潼人嘉靖中授成都推官監倉糧時月棒皆倍支倉曹多累璜草其弊當事有要功者請加兵瀘敘等衛琪按其迹實未叛力請罷師及徵苗民備􅁁無不奉命造釁者遂被劾去璜得褒擢賈梁江川人隆慶時知什邡縣剛正無私在任四年清苦如一日條陳運米折銀民免賠累耿定力黄岡人萬厯中知成都府方正嚴明人不敢干以私大新學宫激厲後進政尚體要郡務翕然改觀李曰輔南昌人天啓時成都推官值奢賊亂後民物凋琖有綏輯勞廵撫朱變元倚以兵事偕諸將攻後重慶釋脅從無算隨攝仁夀縣事翟英天啓時成都衛指揮奢崇明之亂英扼賊龍泉驛與後衛指揮韓應泰小河所鎮撫都聯若俱力􅀾死左重䝉化人灌縣知縣天啓初奢崇明圍成都重數勵士民救之力戰馬蹶罵賊死贈光禄寺卿趙愷天啟初郫縣川導奢崇明來攻率衆禦之為賊刺死贈重慶同知鄭安民浙江人崇禎末為蜀王府左長史賊圍成都安民分守南城城陷不屈死本朝乾隆四十一年賜諡節愍劉士斗南海人崇􅍬末為成都府推官攝府事巡按劉之勃薦為建昌兵備僉事賊􅀅人境之勃促之行士斗曰生死共之復何徃及城陷被就見之勃與獻忠語大呼曰此賊也不可屈節獻忠怒遂闔門被殺之勃寳雞人被執時勸賊勿殺百姓放士平遥語以勿屈既而慷慨罵賊賊攢箭射殺之本朝乾隆四十一年賜士斗諡烈愍之勃諡忠烈又成都同知當塗沈受蒲舉家被害雙流知縣蒲圻李甲升建昌衞同知未行會師榮經縣賊至戰敗􅀍執不屈死本朝乾隆四十一年俱賜諡烈愍方堯相黄岡人榮禎末為成都同知監紀軍事城䧟被執不屈死又金堂縣知縣沭陽章鳴謙新都縣知縣通海包洪䇿崇寜縣知縣江寕劉旋均以城陷不屈死木朝乾隆四十一年俱賜諡節愍沈雲祚太倉人崇偵中知華陽縣流寇破夔門成都大震雲祚謁蜀藩陳守禦䇿不應城陷被執脅降不屈死本朝乾隆四十一年賜諡忠烈潘夢科金堂縣典史與郫縣主簿張􅀿奇於崇禎十年李賊陷城均不屈死本朝乾隆四十一年俱子人忠義祠王勵精蒲城人崇禎中知崇慶州有善政張獻忠䧟成都家人勸之去勵精不可朝服北向拜書文文山成仁取義四語於壁登樓自焚死木朝乾隆四十一年予入忠義祠李之珍崇禎時為成都都司僉事獻賊陷城死之本朝乾隆四十一年賜諡節愍趙嘉煒山隂人官郫縣主簿甫受事守都江堰獻賊至脅降不從投江死本朝乾隆四十一年子入忠義祠何教授佚其名官成都府教授獻賊破成都夫婦並殉難本朝乾隆四十一年予入忠義祠本朝蕭永芃漢軍鑲白旗人康熙三年知温江縣詢民利病而罷行之開荒田瘞枯骨期年之閒流亡復業常九經洋縣人康熙三年知新津縣時人民稀少風􅂔淳樸九經慈良誠慤官民相親至有男婦出耕而九經代視其稚幼者民閒謂之真父母戴宏烈桐城人康熙八年知成都縣招流亡給牛種相度地􅀔修都江堰以通水利民利賴之周輔奏海鹽人康熙四十七年知成都縣發奸摘伏有能名尋攝崇慶州事州多滯獄輔奏至立讞决百餘案稱為平允王霖上元人雍正二年知新繁縣聽斷之下諭導款至婦孺無隱情加意學校建義路禮門二坊在任四載緼􅂁蔬食人服其廉王紹文衡水人雍正五年知成都縣勤理民事非公不謁大府操守清廉以與同官爭論解職貧至不能舉火民􅀒米析薪日為具食廵撫憲德以閒擢知西安府黄鍔將樂人乾隆元年知雙流縣時邑初創復鍔綜理有序修橋十二堰四設官渡六於邑之東南牧馬山相度皋隰募民開塘濬溝闢田二萬畝在任十一年以卓異陞鄭方城閩縣人乾隆二年知新繁縣莅任􅀄即􅂆民稱社穀以濟匱乏厯三載積儲漸充分貯四村貧民賴之建西關義和橋徃來者稱便張南瑛姚安人乾隆十二年知金堂縣初大河灣有地十里許平衍無灌漑利居民僅種菽麥南瑛親為履度遂繞冠紫山南鑿渠接繡川河溉良田數千赦民呼為普利堰堰旁悉成膏腴關基聖臨桂人乾隆三十三年知雙流縣值夏旱履行各鄉村至邑東北得水源田鰱魚洞氏接筧注水苦不能多基聖徃復周勘令鑿石置筧闢兩洞以引水水大至灌溉皆徧下流宣洩無滯民享其利蔣兆奎渭南人乾隆三十四年知華陽縣潔已奉公摘伏如神與大吏論事剛正不撓愛民以實去官之日邑人奔送者相屬毛大瀛寶山人嘉慶五年知簡州賊首冉添元等偷渡嘉陵江涉潼河擾及金堂大瀛偕汎弁馬應魁帶兵防堵至金堂界之土橋溝賊大至大瀛及應魁力戰殁州人從死者五十餘人賜祭葬䘏􅄻如例
