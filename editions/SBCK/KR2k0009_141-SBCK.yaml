開皇三年徙焚道縣於此豈前此犍為郡治竟無縣耶舊志遂謂西魏置犍為郡兼置江源縣誤隋志汶山郡有江源縣後周置當在今松潘廳地非此江源此自宋時改名也晉原癈縣今崇慶州治漢置江原縣晉永嘉中李雄置漢原郡并改縣曰漢原永和中平蜀改郡曰晉原縣復故名曰江原周癈郡改縣曰晉原唐於縣置蜀州宋為崇慶府治明初省縣入州華陽國志江原縣在蜀郡西濱文井江去郡一百二十里元和志蜀州東南至眉州一百七十里西南至邛州八十二里東北至成都府一百五十里在漢為江原縣李雄分為漢原郡晉穆帝改為晉原郡後魏平蜀後移犍為郡理此東三十里因省晉原郡以併之仍於此西十里立多融縣隋改為晉原取舊郡名也開皇中改屬益州垂拱二年割屬蜀州元統志古州城秦張儀築子城隋大業九年縣今韓士元築舊志漢原廢縣在州西北五十里横原鎮一作懷遠鎮相傳李雄置縣於此按今本齊志作晉康郡康即原之訛耳或以為齊改晉原為晉康亦誤永康廢縣在崇慶州西北五代後蜀置宋因之明省寰宇記廣政十二年割郭信等八鄉就横渠鎮置征稅院十六年升為永康縣在蜀州北六十里州志在州西北五十里今名四界鎮按元史失載此縣明統志明初省入崇慶州舊志謂元至元十二年省恐無據雒廢縣在漢州北漢置屬廣漢郡後漢為郡治晉初徙廣漢郡治廣漢以雒縣為新都郡治尋復為廣漢郡治隋屬蜀郡唐於縣置漢州元省縣入州元和志州南至成都府一百里東至梓州二百十里正西微南至彭州七十五里東北至綿州一百八十里按後漢書注雒縣故城在今縣南舊志故雒縣在州北二里二誽不同水經注云雒水經雒縣故城南則舊志之說似是懷中廢縣在漢州北隋書地理志雒縣有西遂寕郡後周改為懷中尋廢安州廢衛在府治東四里明洪武十一年建又成都右衛在府西三里中衛在府西南七里前衛在府南六里後衛在府東三里俱洪武中建今皆廢錦官城在府南華陽國志夷星橋南岸道西有城故錦官也命曰錦里又有車官城元和志錦城在成都縣南十里故錦官城也盤古城在成都縣元和志在成都縣東三十里按方輿勝覽作盤古祠赤塗城在成都縣北三里李特所築瞿上城在雙流縣東華陽國志杜宇或治瞿上明統志在縣東十八里蠶叢氏所都宜城在雙流縣東南十里宜城山下相傳漢任安所築亦曰武陽城魚鳧城在温江縣北十里相傳古魚鳧所都方便城在温江縣北去魚鳧城五里周四里漢朱遵所築又有敦城在縣西二十二里蠻子城在新繁縣東十五里唐咸通中南詔蠻寇成都嘗築城於此以拒官軍因名人有蠻子城在崇慶州西北四十里一名忙子城相傳唐明皇幸蜀駐蹕於此不三日而城成因名王子城在彭縣境寰宇記在九隴縣漢封雍齒子於此公孫述城在新津縣西宻宇記江源縣有臨邛故城俗云公孫述城益州記云蓋李雄據蜀李專從牂柯引僚入蜀境自象山以北臨邛舊縣盡為獠居因兹移置元統志公孫城在今縣西三十里周九里按蕉唐志晉於唐隆縣置臨邛縣後魏平蜀自唐隆移還漢縣即此葭萌城在漢州東五十里或以為漢故城誤湔陽城在漢州南寰宇記漢縣廢城在雒縣南舊志在州西南二十里以在湔水之南為名蓋南北朝時置唐僖宗行殿在新都縣北半里寶光寺遺礎尚存蜀王府在府城内明太祖第十一子椿洪武中封蜀建有城周五里今改其南為貢院北為寶川局石筍街在成都縣西華陽國志蜀有五丁力士能移山每王薨輒立大石長三丈重千鈞為墓誌今石筍是也號曰筍里劉禹錫福成寺記益城石門街大逵西馳曰石筍街酉陽雜俎蜀石筍街夏中大雨徃徃得雜色小珠俗謂地當海眠莫知其故杜光庭石筍記成都子城西通衢有石二株挺然聳峭高丈餘圍八九尺老學庵筆記成都石筍其狀與筍不􅀋乃壘疊數石成之赤里街在華陽縣南華陽國志成都縣本治赤里街碧雞坊在成都縣西南益州記成都之坊百有二十第四曰碧雞坊玉女房在灌縣西華陽國志李冰西於玉女房下白沙郵作三石人立水中寰宇記五女房在導江縣李膺記云其房鑿山為穴深數十丈中有廊廡堂室屈由羊灌田戍在灌縣西華陽國志李冰自湔堰分穿羊摩江灌江唐書地理志彭州有羊灌田朋笮繩橋三守捉城舊志唐元和初高霞寓追劉闢及之於羊灌田即此又縣西四十里有金繩渡即繩橋故址雞鳴原在華陽縣南宋咸平三年知蜀州楊懷忠攻賊王均砦於鷄鳴原即此望川原在雙流縣西任豫益州記廣都縣有望川原後漢時鑿石二十里引取郫江水灌廣都田華陽國志廣都有鹽井漁田之饒江西有安稻田穿山崖過水二十里蠶市在府城内方輿勝覽蜀民重蠶事每􅀊二月望日於府治東大慈寺前鬻蠶器謂之蠶市又五月賣扇於街中謂之扇市五月九日於市前鬻香藥號藥市冬月於市前鬻器用號七寶市花村在彭縣北方輿勝覽天彭亦謂之花州牛心山下謂之花村文翁石室在府治南華陽國志丈翁立文學精舍講堂作石室一曰玉室在城南永初後堂過大太守陳留高联更修立又増造一石室元和志南外城中有文翁學堂一名周公禮殿李膺記云後漢中平中火延學觀廂廊一時蕩盡惟此堂火焰不及構制雖古而巧異特奇壁上悉圖古聖賢齊永明中劉瑱更圖焉朱齡石平譙縱勒宋武帝檄文於石室之璧代王更以丹青增飾古畫仍加豆盧辨蘇綽之象費著周公禮殿聖賢圗考周公禮殿制甚古低屋方柱柱上狹下廣與今異制左柱有漢高䀢修學舍記凡三百四十二字殿有板龕䕶先聖賢像邱文播盡山水龕後有板壁黄筌書湖灘邱書已亡獨黄晝存殿之壁高下三方悉書上古以來君臣及七十二弟子像世傳晉太康中太守張收之筆收子載即銘劍閣者也嘉祐中王素