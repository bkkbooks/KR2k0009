body:
  text: 春秋晉東陽地戰國屬趙秦屬鉅鹿郡漢高帝置信都國治信都縣景帝二年改為廣川國五年國除為信都郡中二年復為廣川國宣帝甘露四年復曰信都國屬冀州後漢永平十五年改曰樂成國延光元年又改曰安平國三國魏移冀州治此按冀州後漢治高邑漢末治鄴元和志云魏黃初中始自鄴移理信都晉太康五年改曰長樂國後魏曰長樂郡仍為冀州治魏書地形志冀州晉世邵續治厭次慕容垂治信都皇始二年平信都仍置齊周因之隋開皇初廢郡存州大業初州廢仍為信都郡隋書地理志開皇初分帶郡信都置長樂縣大業初廢信都入焉寰宇記十二年又改長樂為信都唐武德四年復曰冀州六年置總管府是年移州治下博貞觀元年復治信都府廢龍朔二年改曰魏州咸亨三年復故天寶初復曰信都郡乾元初仍曰冀州屬河北道五代因之宋慶厯八年置安武軍節度使屬河北東路金因之元亦曰冀州屬真定路明洪武六年以州治信都縣省入屬真定府本朝因之雍正二年升爲直隸州領縣五南宫縣在州西南六十里東西距一百十五里南北距三十五里東至山東東昌府武城縣界八十里西至趙州寕晉縣界三十五里南至廣平府威縣界二十里北至本州界十五里東南至廣平府清河縣界八十五里西南至順德府鉅鹿縣界四十里東北至棗強縣界二十五里西北至新河縣界二十五里漢置南宫縣屬信都國後漢屬安平國晉因之後魏屬長樂郡北齊廢隋開皇六年復置屬信都郡唐武德四年屬宗州九年屬冀州五代因之宋皇祐四年省入新河縣六年復置金元明皆因之本朝初屬正定府雍正二年還屬冀州新河縣在州西少南六十里東西距三十五里南北距六十里東至本州界十五里西至趙州寕晉縣界二十里南至順德府鉅鹿縣界三十里北至保定府束鹿縣界三十里東南至南宫縣界二十里西南至鉅鹿縣治八十里東北至衡水縣治一百里西北至正定府晉州治一百二十里漢置堂陽縣屬鉅鹿郡後漢改屬安平國晉因之後魏屬長樂郡北齊廢隋開皇十六年復置屬信都郡唐屬冀州五代晉改曰蒲澤割屬鎮州漢復故名周還屬冀州宋皇祐四年省堂陽升新河鎮為新河縣熙寕六年復省為鎮入南宫元太宗四年復置新河縣屬冀州明因之本朝初屬正定府雍正二年還屬冀州􅀥強縣在州東少南二十五里東西距四十五里南北距八十五里東至河間府故城縣界三十里西至本州界十五里南至南宫縣界六十里北至衡水縣界二十五里東南至山東東昌府武城縣界三十里西南至本州界三十里東北至河間府景州界五十里西北至衡水縣界二十五里漢置棗强縣屬清河郡後漢廢晉復置屬長樂國後魏神瑞二年併入廣川太和二十二年復置屬長樂郡隋屬信都郡唐屬冀州五代因之宋熙寕元年省入信都十年復置金元明俱屬冀州本朝初屬正定府雍正二年還屬冀州武邑縣在州東北九十里東西距四十五里南北距六十里東至河間府景州界二十五里西至衡水縣界二十里南至棗強縣界三十里北至深州武強縣界三十里東南至景州治八十里西南至􅀥強縣治七十里東北至河間府阜城縣界三十里西北至深州治六十里漢置武邑縣屬信都國後漢屬安平國晉太康十年置武邑郡後魏皇始三年移郡治武強以武邑屬之北齊天保七年縣廢隋開皇六年復置屬信都郡唐屬冀州五代宋金因之元初屬東武州太宗六年還屬冀州明因之本朝初屬正定府雍正二年還屬冀州衡水縣在州東北四十里東西距五十八里南北距四十五里東至武邑縣界十八里西至深州界四十里南至棗強縣界二十五里北至深州界二十里東南至棗強縣界二十五里西南至本州界三十五里東北至武邑縣界十八里西北至深州界十八里漢信都國桃縣地隋初為信都下博武邑三縣地開皇十六年始置衡水縣屬信都郡唐屬冀州宋金因之元改屬深州明因之本朝初屬正定府雍正二年改屬冀州形􅀔州據河北之中川原饒衍控帶燕齊稱為都會東近瀛海則資儲可充南臨河濟則折衝易達州志風俗質厚少文氣勇尚義號為彊忮州志城池冀州城舊城周二十四里明宏治元年改建内城方十四里南北西為三大門東面西南隅為二水門本朝順治康熙年間屢修乾隆十一年四十四年重修南宫縣城周八里門四城外為隍隍外為隄隄外為重隄明成化十四年土築本朝康熙十一年修新河縣城周三里有奇門三濠外有隄明景泰中建本朝康熙十四年修􅀥強縣城周四里門三池繞之有護城隄金天會十年土築本朝順治康熙年間屢修武邑縣城周四里門四明正統十四年建城外有濠城南有護城隄衡水縣城周四里有奇高二文東北隅少缺象形曰幞頭城門四眀景泰初土築本朝順治初年修乾隆三十一年甃甎學校冀州學在州治東明永樂十九年建入學額數二十三名南宫縣學在縣治東南明洪武初建入學額數二十三名新河縣學在縣治東元至正中建入學額數十五名棗強縣學在縣治東舊在縣治東北明正統中移建本朝康熙三十六年修入學額數二十三名武邑縣學在縣治東北元延祐七年建入學額數十五名衡水縣學在縣治東明永樂十二年建入學額數十五名信都書院在州治内本朝雍正三年建乾隆三年修十六年重修東陽書院在南宫縣東本朝乾隆十六年建嘉慶二十一年修嘉㑹書院在棗強縣大金村桃城書院在衡水縣户口原額人丁三十一萬三千六百五今滋生男婦大小共一百二十八萬九千二百十八名口計二十三萬三千七十一户田賦田地四萬三百六十九頃九十七畝二分有奇額徴地丁正雜銀一十五萬五千九百三十四兩五錢六分五釐山川􅀥山在州西南五十里山多􅀥因名又武邑縣西南五十里亦有􅀥山紫微山在州東北二十五里又南宫縣北五里亦有紫微山滹沱河在州北自保定府束鹿縣流入合漳􅇭二水又東北逕衡水武邑入武強縣界漢書地理志信都縣故滹沱河在縣北東入海舊志本朝順治二年滹沱河入冀州境者二口一由束鹿縣韓村庄至州界趙家莊入漳一由智邱村四七營温浪口等村過隄北入漳自合漳後即入衡水及武邑縣北又達河間府境舊道自束鹿縣南過安平南深州北復東出饒陽縣北厯河間府獻縣交河而合漳水今自冀州合漳於是深州安平饒陽諸境皆無滹沱故迹矣胡盧河漳􅇭二水自趙州寕晉縣合流東北逕新河縣北又東北至州西北合滹沱河又東北逕衡水武邑二縣北入深州武強縣界即古衡漳及長蘆水故道也漢書地理志信都縣故漳河在北東入海水經注衡漳水自鉅鹿縣又北逕南宫縣故城西又北洚瀆出焉又北逕堂陽縣西分為二水其一水北出逕縣故城西其右水東北注出石門謂之長蘆水東逕堂陽縣故城南應劭曰堂水也又東逕九門坡又東逕扶柳縣故城南又東北屈逕信都縣故城西其水側城北注又北逕安陽城東又北逕武陽城東又北為博廣池又北逕下博縣故城東北注衡水衡水又東北逕扶柳縣北逕昌成縣故城西又逕西梁縣故城東又東北逕桃縣故城北合斯洨故瀆又北為袁譚渡又北逕鄔縣東下博縣西又西逕樂鄉縣列葭水注之又東逕武強縣北又東逕武隧縣南白馬河注之又東逕武邑縣故城北又東北右合張平口故溝又逕東昌縣故城北又東北左會滹沱故瀆謂之合口元和志長蘆水在堂陽南二百步信都縣西北六十二里衡水縣南二百步武邑縣北三十二里宋史河渠志漳河由磁州洺州南入冀州新河鎮與胡盧河合流其後變徙入於大河熙寕三年詔程昉相視四年開修袤一百六十里金史地理志信都縣有胡盧河衡水縣有長蘆河武邑縣有漳河長蘆河舊志漳河一名清水河新河縣界西北二面去河各三十里又在州西北二十五里衡水縣西一里武邑縣西北二十里通志漳􅇭合流至冀州之王家莊與滹沱合又二十里至冀州隄北又二十里至衡水縣之浪子橋又七十里至衡水之石橋又四十里至武邑之圈頭又三十里至武邑之趙橋又二十里至武強之小范按衡漳故道遷流無定唐宋以來雖有長蘆胡盧之異名實皆漳水之下流也今漳水上流東徙經魏縣元城抵館陶入衞僅分一小支由廣宗至新河與􅇭合􅇭水會衆流由寕晉泊而岀至州界合滹沱河東注謂之胡盧河并不得以漳水目之矣古黃河在州東南及南宫縣東南棗強縣南桑欽水經張甲河左瀆又北逕經城東繚城西又逕南宫縣西北注絳瀆右瀆又東北逕廣宗縣故城南又東北逕界城亭北又東北逕􅀥強縣故城東又東北逕廣川縣與洚水故道合又東北逕廣川縣故城西又東逕棘津亭南宋史河渠志熙寕元年河決冀州􅀥強埽北注瀛州元豐四年劉定言王莽河一徑水自大名界下合大流注冀州又臨清徐曲御河決口恩州趙村壩子決口兩徑水亦注冀州城東元祐二年河決南宫下埽三年決上埽四年決宗城中埽大觀二年冀州河溢壞信都南宫兩縣舊志黃路河一名黄瀘河自廣平府清河縣流入逕南宫縣東南八十里又北逕􅀥強縣東三十里又東北出至河間府阜城縣合劉麟河今巳堙廢其地斥鹵潦水數集蓋即古之黃河也古清河在􅀥強縣南自廣平府清河縣流入又東北入故城縣界水經注清河自東武城又東北逕復陽縣故城西又東北流逕棗強縣故城西又北逕廣川縣故城南又東北逕厯縣故城南漳河在棗強縣東北漳水自山東邱縣東行之一支也自廣平府清河縣流入與河間府故城縣接界又北逕武邑縣南入阜城縣界俗亦謂之老漳河索盧河在􅀥強縣西北十里古衡河分流也自河間府故城縣界流逕縣西南折而東北至阜城縣合劉麟河夾河在武邑縣北三十里亦漳水分流也自衡水縣界流入又東入滹沱河鹽河在衡水縣西南二里自冀州流入北通漳河冬春涸秋夏則溢其地生鹽故名洚水故道自順德府廣宗縣流入逕南宫縣北又東北逕州城北又東逕衡水縣南至武邑縣界合於漳水亦名枯洚漢書地理志信都縣禹貢洚水亦入海水經注洚瀆東南流逕九門城南又東南逕南宫城北又東南逕繚城縣故城北又左逕安城南又東北逕辟陽亭又北逕信都城東散八澤渚西至於信都城東連於廣川縣之張甲故瀆同歸於海元和志洚水故瀆在南宫縣東南六里寰宇記洚水枯瀆西南自南宫縣界流經州東南二十里又自衡水縣界經武邑縣城西舊志今南宫縣東南有虹江一名牛口峪又有破塘在縣東北二十里疑即古洚河所經今皆堙塞按禹貢之洚水即濁漳信都之洚水乃漳水一時之徙流漢志即謂禹貢之洚水誤小河渠在南宫縣東有二處皆濁漳之分流河旁地極膏腴舊時民引渠灌田通利渠在南宫縣西五十九里唐延載元年開引漳水以溉田堂陽渠在新河縣西南唐書地理志堂陽縣西南三十里有渠自鉅鹿入縣境下入南宫景龍元年開羊令渠唐書地理志衡水縣南一里有羊今渠載初中令羊元珪引漳水北流貫城注隍杜村溝在衡水縣西南十里旁有窪池二十餘頃明宏治中開此溝以洩水患尋塞正德間復疏通之民獲種植之利又有北沼在縣西南二十里遇漲通於漳水武強湖武邑縣西北水經注強平口故溝上承武強淵淵之西南側水有武強縣故治故淵得其名焉又東南結而為湖謂之􅀰君淵淵水北通謂之石虎口又東北為張平澤澤水所泛北決隄口謂之張刀溝北注衡河謂之張平口元和志武強湖在武邑縣北三十二里葛榮陂在州西南二十里唐書地理志信都縣東二里有葛榮陂貞觀十一年刺史李興公開引趙照渠水注之古蹟信