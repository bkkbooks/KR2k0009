州城内本朝嘉慶八年建二君祠在高邑縣治西中祀平原君信陵君明萬厯閒建本朝乾隆三十二年修龍井廟在州北門外里許金大定閒建禱雨輒應光武廟有二一在州境北轅錄趙川南光武廟二石人尚横於路一在柏鄉縣元和志漢世祖廟一名壇亭在柏鄉縣北十四里即世祖即位處之千秋亭章帝元和二年詔高邑令祀光武於即位壇是也本朝乾隆十五年高宗純皇帝清蹕所經御製有詩漢高祖廟在臨城縣西北二十里劉猛將軍廟在高邑縣八腊廟西本朝乾隆六十年修寺觀柏林寺在州治東南唐時名觀音院為從諗禪師道場金大定中改名柏林寺本朝雍正十一年奉勅修賜今額寺有石甚古刻虞世南攀龍鱗附鳳翼六字殿壁有吳道子畫文武水各一乾隆十五年高宗純皇帝聖駕經臨有御製趙州柏林寺小憩詩及再題吳道子文武水詩並與扈從諸臣聯句開元寺在州治西南宋景祐閒於寺中建石塔玊臺寺在柏鄉縣東相傳隋時建所存石障甚古萬善寺在隆平縣舎客口村東魏武定閒建明院寺在隆平縣東任村隋開皇四年建光業寺在隆平縣南趙孟村唐開元中建有象城尉揚晉碑記乾明寺在高邑縣冶西南唐時建寺右有乾明塔草堂寺在臨城縣西五十里石壁有字永平二年重修前提調官臣沈兆澐恭纂輯提調官臣王廣蔭恭覆輯校對官臣李孚忠恭校恭覆校大清一統志趙州直隸州二名宦漢謝夷吾山陰人章帝時遷鉅鹿太守愛育人物有善績第五倫作司徒令班固為文薦夷吾有政合時雍之譽魏霸濟陰句陽人和帝時為鉅鹿太守以簡朴寛恕為政掾吏有過先誨其失不改者乃罷之吏或相毁訴霸輒稱他吏之長終不及人短言者懷慚譖訟遂息樊準湖陽人永初中拜鉅鹿太守時饑荒之餘人庶流逬準課督農桑廣施方畧期年間豐賤數十倍趙魏之郊數為羌所鈔暴準外禦羌寇内撫百姓郡境以安南北朝魏吕顯壽張人皇始初拜鉅鹿太守清身奉公務存贍恤妻子不免饑寒民頌之曰時維吕君克己清明緝我荒土民胥樂生願夀無疆以享長齡李曾趙郡平棘人道武時為本郡太守令行禁止并州丁零數為山東害知曾能得百姓死力憚不入境賊於常山界得一死鹿賊長謂趙郡地也責之還令送鹿故處郡謡曰詐作趙郡鹿猶勝常山粟其見憚如此裴佗聞喜人世宗時為趙郡太守為政有方威惠甚著狡吏姦民莫不改肅所得俸祿分恤貧窮崔楷安平人孝昌初置殷州以楷為刺史葛榮來攻楷率力拒抗初遣幼子弱女夜出既而追還衆皆曰崔公尚不惜百口吾等何愛一身力竭城陷執節不屈賊遂害之兄弟父子並死王事朝野傷嘆焉崔孝偉安平人趙郡太守郡經葛榮離亂後人皆賣鬻兒女夏椹大熟孝偉勸户人多收之郡内乃安敎其人種植招撫遺散先恩後威一周之後流戸大至興立學校親加勸勵百姓賴之齊崔伯謙安平人除南鉅鹿太守下車導以禮讓豪族皆改心整肅事無鉅細必自親覽民有貧弱未理者皆曰我自告白􅂡公不慮不決在郡七年獄無停因每大使巡察怛處上第隋楊達高祖族子為趙州刺史有能名平陳之後差品天下牧宰達為第一唐弓志元永徽中為平棘令開廣潤陂以蓄洩水利楊元炎闅鄉人高宗時為平棘令課第一御史府表其政璽書襃厲程處黙上元中為寕晉令時地旱鹵西南有新渠處黙引洨水入城以溉田經十餘里地用豐潤民食乃甘李元儀鳳三年為昭慶令開灃水渠以溉田通漕高叡萬年人為趙州刺史聖厯初突厥黙啜入寇叡嬰城拒虜攻益急或勸且下之叡曰吾為刺史不戰而降罪莫大焉及州陷叡自經不得死為所執使諭降諸縣不肯應見殺王佐開元中為柏鄉令時縣有積潦佐浚千金渠築萬金堰以疏之康日知靈州人為趙州刺史日知少事李惟岳惟岳叛日知以州自歸惟岳遣王武俊攻之日知使客説武俊中丞奈何從小兒跳梁武俊還斬惟岳德宗擢日知為深趙觀察使後武俊復遣將攻趙州日知破之獻俘京師五代唐符令謙昭慶人為趙州刺史有善政卒於州州人號泣送葬者數千人周楊澈北海人世宗時年十六昭慶令缺使府命澈假其任時河決鄰郡府督役甚急澈部徒數千經大澤中多蘆葦令采刈為筏順流而下既至執事者訝以後期俄葦筏繼至駭而問之澈以狀對乃更嗟賞宋康德輿洛陽人仁宗時知趙州有告雲冀卒謀以上元夜劫庫兵為亂德輿㑹賓屬燕飲自若陰遣人捕其首謀誅之侯􅀩高密人徽宗時知柏鄉縣民訟皆決於庭受罰者不怨轉運使黄湜聞其名將推轂之召詣行臺白事􅀩以越境不肯往湜怒他日行縣閲理文書欲致其罪無一疵可指始以賓禮見曰君真能吏也率諸使者合薦之金呉微平郭人承安二年知寕晉縣莅政明果有以牛訟者訊得其情牛亦伏膝由是百姓敬若神明元圖郎哈雅威烏氏世祖時為隆平縣達魯噶齊均賦興學勸農平訟橋梁水防備荒之政無一不舉及滿去民勒石紀其政圖郎哈雅改見統部名宦威烏改見順天府名宦達魯噶齊改見保定府名宦布爾罕瑚喇威烏氏至元末任寕晉縣達魯噶齊旱蝗躬親祈捕歲不為災經過軍旅恣為不道執之繩以國法士民感戴布爾罕瑚喇舊作孛而罕忽里今改正宋明善内邱人至止初知高邑縣遠則乘馬近則策杖徧厯耕桑之地勸課不懈聽訟公慎嘗曰吾既不能使民無訟忍枉其是非耶囹圄屢空門無干謁尤為邑人所稱明何濬靈寳人天順間知趙州值歲饑賑濟有法民無流移多鑿井泉以資灌溉後歸老於家州人歲遣子弟問慰不絶及卒聞之皆巷哭家立木主祀之章忱會稽人成化中知臨城縣城北有泥河忱築隄引水灌田又敎民為桔橰以溉高阜鄉鄙舊無醫藥忱檢方書使習其業歲春令民及時婚娶而節其費陸愉嘉定人成化中知寕晉縣巡行田野課農桑招流移疏瀹河流以資灌溉民甚德之鄒珩餘姚人嘉靖中知高邑縣重濬新溝以除水患民得耕種王端冕江陵人崇禎中知趙州以亷惠得民大兵至被執不屈死陳廣心元城人崇禎時為趙州敎諭大兵攻城諸生請避去廣心厲聲曰吾生平所學何事豈為兒女戀戀耶遂死之張純儒新安人為臨城訓導崇禎十一年大兵至率諸生共守城破與二子同坐明倫堂曰此我盡節處也遂死之本朝陶鼎􅉗奉天人順治九年知趙州亷潔自持明於聽斷治聲甚著牟廷選錦州免定封東光侯後復為東郡太守吏民悦服卒諡曰成孟敏楊氏人客居太原荷甑墮地不顧而去郭林宗見而問其意對曰甑已破矣視之何益林宗因勸令遊學十年知名三公徵辟並不屈南北朝魏眭夸一名旭高邑人少耽書傳浩然物表年三十遭父喪鬚髪致白高尚不仕少與崔浩為莫逆交浩為司徒奏徴為中郎辭疾不赴州郡逼遣不得已入京師與浩相見延留數日惟談敘平生不及世利浩每欲論屈之竟不能發言其見敬憚如此李靈平棘人神䴥中太武徴天下才儁靈至拜中書傅士再遷淮揚太守以學優選授文成皇帝經加中散内博士賜爵高邑子文成踐祚卒於洛州刺史諡曰簡子恢進爵為候東平王道符反遇害恢子悦祖悦祖子瑾淳謹好學老而不倦終大司農卿李順靈從父弟博涉經史有計䇿神瑞中拜中書侍郎從征蠕蠕以籌畧賜爵平􅁄子世祖討赫連昌至統萬大破昌軍順謀居多及克統萬帝賜諸將珍寶雜物順惟取書數千卷又從擊赫連定於平涼三秦平進爵為侯遷四部尚書沮渠􅀩遜内附順使涼州凡十二囘世祖稱其能李孝伯順從父弟父曾少以鄭氏禮左氏春秋敎授為業郡三辟功曹並不就州辟主簿到官月餘遂還家太武時為趙郡太守孝伯少傳父業博綜羣言動有法度從兄順言之太武徵為中散累遷光祿大夫賜爵南昌子太平真君末車駕南伐至彭城遣孝伯宣詔勞問與宋張暢往復辨論應答如流進爵宣城公為秦州刺史卒諡文昭孝伯性方慎忠厚每朝廷事有所不足必手自書表切言陳諫或不從者至於再三削滅藁草家人不見公庭議論常引綱紀或有言事者恣其所陳假有是非終不抑折及見帝言其所長初不隱人姓名以為已善故衣冠之士服其雅正自崔浩誅後軍國謀謨咸出孝伯美名聞於遐邇兄祥學傳家業鄉黨宗之厯淮陽河間二郡太守有治聲終中書侍郎李安世祥子幼聰悟天安初拜中散累遷主客給事中時人饑流散豪右多有占奪安世乃上疏陳均量之制孝文深納之後均田之制起於此出為相州刺史假節趙郡敦農桑㫁淫祀表薦善士討斬李波州内肅然卒於家李瑒安世子涉獵史傳有文才氣尚豪爽高陽王雍表薦瑒為友轉尚書郎隨蕭寶夤西征以瑒為統軍瑒德洽鄉閭招募雄勇其樂從者數百騎傾家賑恤率之西討故其下每有戰功軍中號曰李公騎還朝除岐州刺史坐辭不赴任免官場與弟謐特相友善謐在鄉物故瑒不食數日期年形骸毁瘠人俱哀歎之李謐瑒弟少好學周覽百氏初師事博士孔璠數年後璠還就謐請業同門生為之語曰青成藍藍謝青師何常在明經徵拜著作佐郎以授弟郁州再舉秀才公府二辟並不就惟以琴書為業卒年三十二遐邇悼惜之博士孔璠等上書言謐學行詔謚貞靜處士并表其門曰文德里曰孝義弟郁好學沈靜通經史官至散騎常侍嘗於顯陽殿講禮記解説不窮孝武及預聽者莫不嗟善李公緒平􅁄人性聰敏博通經傳魏末為冀州司馬屬疾去官齊天保初以侍御史徵不就沈冥學道誓心不仕尤明天文善圖緯之學雅好著書所撰有典言禮質儀喪服章句古今畧記元子趙記趙語等書北齊李密平棘人少有節操母患積年明醫療之不愈乃精習經方洞嫻針藥母病得除由是以醫知名屬􅈛朱兆弑逆與勃海高昂爲報復計後從神武封容城縣侯位襄州刺史李幼亷高邑人少寡欲爲兒童時人故以金寶授之終不取以其䝉幼而亷故以名焉仕齊厯瀛州并州長史累遷太僕大司農二卿趙州大中正大理卿所在稱職後主時和士開權重百僚盡傾幼亷高揖而己出爲南青州刺史卒贈吏部尚書隋李士謙謐子少孤事母以孝聞年十二魏廣平王贊辟開府參軍事後脱身詣學研精不倦遂博覽羣籍兼善天文術數齊世辟召皆不就及隋有天下畢志不仕家富於財躬處節儉每以賑施爲務有兄弟分財不均致相鬬訟士謙出財補其少者令與多者埒兄弟更相推讓卒爲善士嘗出粟數千石以貸鄉人值年穀不登悉召債家對之燔契歲大饑罄家資爲之糜粥全活萬計收埋骸骨所見無遺趙郡民德之撫其子孫曰此李參軍遺惠也及卒會葬者萬餘人相與樹碑於墓李諤趙郡人性公万明達世務高祖受禪厯遷治書侍御史見禮敎凋敝文體輕薄當官者好自矜伐俱上書論之上以前後所奏頒示天下四海靡然向風諤在職數年務存大體不尚嚴猛以年老出拜通州刺史卒於官李雄高邑人少慷慨有大志家世並以學業自通雄獨習騎射周太祖時從達奚武平漢中定興州又從韋孝寛畧定淮南説下十餘城高祖受禪拜鴻臚卿晉王廣出鎮并州以雄為河北行臺謂雄曰卿兼文武才今推誠相諉吾無北顧之憂矣雄當官正直侃然有不可犯之色王甚敬憚吏民稱之李德饒平􅁄人少聰敏好學弱冠為校書郎轉監察御史糾正不避權貴遷司隸從事每巡四方理雪􅁈枉襃顯孝悌性至孝父母寢疾輙終日不食十旬不解衣丁憂哀慟嘔血及葬單縗徒跣行積雪中四十餘里後甘露降庭樹鳩巢其廬納言楊達巡省河北詣其廬弔慰之因改所居村為孝敬里為和順弟德佋性重然諾大業末為離石郡司法書佐太守楊子崇特禮之唐兵起子崇遇害德佋赴哭盡哀收瘞之唐李素立高邑人武德初擢監察御史民犯法不及死高祖欲殺之素立諫曰三尺法天下所共一動揺則人無所措手足帝嘉納以親喪解官起授七品清要有司擬雍州司户參軍帝曰要而不清擬秘書郎帝曰清而不要乃授侍御史貞觀中轉􅀭州大都督府司馬初􅋓厥鐵勒部内附即其地為瀚海都護府詔素立領之乃開屯田立署次邊民畏威厯太僕鴻臚卿累封高邑縣侯卒諡曰平李守素趙州人秦王署為天䇿府曹參軍通姓氏學世號肉譜虞世南與論人物始言江右山東尚相酬對至北地則笑而不答曰内譜定可畏李乂房子人工屬文第進士茂才異等擢監察御史劾奏無避累遷吏部侍郎與宋璟等同典選事請謁不行時人語曰李下無蹊徑改黃門侍郎制敕不便輒駁正貴幸有求官者睿宗曰朕非有靳顧李乂不可過耳太平公主干政欲引乂自附乂深自拒絶除刑部尚書卒諡曰貞乂沈正方雅識治體時稱有宰相器乂事兄尚一尚正孝謹甚又俱以文章自名弟兄同為一集號李氏花萼集李至遠素立孫治尚書左氏春秋撰周書起后稷至報王為傳紀令狐德棻許為良史高宗時厯天官侍郎知選事疾吏受賄多所絀易吏肅然斂手弟從遠清密有學神龍初厯中書令太府卿兄弟德望相埒至遠子畬事母謹累世同居長幼有禮官至國子司業啖助趙州人淹該經術天寶末調臨海尉丹陽主簿秩滿屏居甘嗜疏糗善為春秋考三家短長縫綻補闕號集傳凡十年乃成李承高邑人擢明經為河南採訪使判官尹子奇陷汴州拘承送洛陽覘得賊謀皆密啟諸朝賊平累遷淮南西道黜陟使奏置常豐堰於楚州以溉屯田李希烈請討梁崇義德宗數稱其忠承言希烈恐不可制帝初謂不然及希烈叛始思其言累擢改山南東道節度使時希烈猶據襄州承以單騎入希烈舍承外館迫脅萬端承晏然誓以死守希烈不能屈遂大掠去襄漢蕩然承輯綏撫安之居一年闔境完復尋檢校工部尚書湖南觀察使卒贈吏部尚書李芃趙州人解褐上邽主簿補長安尉李勉觀察江西表署判官永泰初宣饒賊為亂芃請以秋浦置州扼襟要使不得合從勉是其計奏置池州即詔芃行州事德宗立授河陽三城鎮遏使糧資善者必先給士士悦之達練事宜嚴備常若有敵未幾拜節度使與馬燧等破田悦洹水上興元初以疾請老卒贈太子太保李藩趙州人少沈靜敏於學家本饒財居父喪姻屬來弔有持去者未嘗問益務施與杜亞居守東都表致府中徐州張建封辟節度使建封卒濠州刺史杜兼疾驅至陰有覬望藩謂宜速還否則以法劾君兼因誣奏藩有非望徳宗怒密詔杜佑殺之佑以闔門保藩釋之拜秘書郎累遷給事中制有不便就敕尾批卻之裴垍白憲宗謂藩有宰相器因拜門下侍郎同中書門下平章事藩忠謹好醜必言帝間神仙事知帝有所惑極陳其妄誕不可信河東節度使王諤賂權近求兼宰相密詔中書門下曰諤可兼宰相藩遽取筆署其左曰不可既而事得寢卒諡貞簡李遜趙州人始署山南東道掌書記厯衢州刺史以課最擢浙東觀察使入為給事中故事天子以畸日聽政對羣臣遜奏陛下求治而下有所陳當不時上豈宜限以日憲宗悦從之厯山南東道及忠武軍節度使遜為政抑强植弱貧富均一所至有績可紀卒官刑部尚書諡曰貞李建遜弟與兄俱容荆州鄉人爭鬬不詣府而詣建平決無頗母憐其孝每字之曰㹻子勸吾食吾輒飽進藥吾意其瘳貞元中補校書郎徳宗思得文學者或以建聞擢左拾遺翰林學士順宗立與王叔文不合左遷後召拜刑部侍郎初建為學時家苦貧後雖通顯未置垣屋以清儉稱李虞仲趙州人父端能詩為大厯十才子之一虞仲厯官吏部侍郎簡儉寡欲時望歸重李翺趙州人元和初為國子博士條上興復太平大畧累遷禮部郎中翺性峭直論議無所屈見宰相李逢吉面斥其過失逢吉詭不校更表為廬州刺史入為諫議大夫知制誥後厯山南東道節度使卒翶始從韓愈為文章辭致渾厚見推當時故有司亦諡曰文李珏趙州人事母以孝聞舉進士高第擢右拾遺穆宗即位期於九月九日大宴羣臣珏言陵土未乾不可為天下法不聽以數直諫出為下邽令累遷翰林學士文宗以鄭注問珏珏曰奸囘人也注由是怨珏開成中同中書門下平章事武宗新聽政珏數稱道無逸篇以勸以嘗議立陳王貶外宣宗立厯檢校尚書右僕射淮南節度使卒諡貞穆五代唐符習昭慶人少事趙王鎔鎔遣習將兵從晉及鎔爲張文禮所害文禮上書於莊宗求習歸莊宗遣之習號泣曰臣世受趙恩欲破賊報主莊宗壯之遣他將助習破文禮乃以相衞二州爲義武軍以習爲節度使習辭曰魏博六州霜王之府也不宜分割示弱願授臣河南一鎮得自攻取之遂拜習天平節度使後爲安重誨所搆致仕明宗以其子令謙爲趙州刺史宋曹遵趙州人六世同居真宗時旌表張旦趙州人勇敢善射以經學中第淳化中知陵州李順黨數萬攻州州兵不滿三百旦驅市人進戰大敗之由是知名後知德清軍景徳中遼兵入寇旦與其子利涉率衆奮擊並戰殁帝聞之驚悼特贈左衞大將軍深州團練使利涉崇儀副使宋綬平棘人幼聰警年十五召試中書真宗愛其文後復試學士院爲集賢校理厯判三司憑由司建言蠲積􅀒數百萬累遷工部侍郎時太后猶垂􅄕決事綬奏宜約先天制度令羣臣對前殿忤太后㫖出外久之拜參知政事請仁宗飭厲羣司不以承平自怠卒贈司徒兼侍中諡宣獻綬性孝謹清介言動有常家藏書萬餘卷親自校讐博通經史其筆札尤精妙朝廷大議論多綬所裁定孫冲平棘人真宗時以侍御史為西京轉運塞滑州決河後知河中府徙潞州所至以强幹稱王德用趙州人父超累官崇信軍節度使為將善部分御下有恩至道中擊李繼遷德用年十七為先鋒將萬人戰鐵門闗俘掠以數萬計累遷福州觀察使章獻太后臨朝有求内降補軍吏者德用曰補吏軍政也卒不奉詔乃止後仁宗閲太后閣中得德用前奏奇之拜簽書樞密院事徙定州路都總管皇祐三年致仕德用善撫士屢臨邊境名聞四夷狀貌雄毅面黒頸以下白晳閭閻婦女小兒皆呼曰黒王相公至和初復為樞密使時富弼為相遼使至謂德用曰天子以公典樞密用富公為相將相皆得其人矣卒贈太尉中書令諡武恭曹利用寕晉人慷慨有志操真宗幸澶州遼遣使議和帝使利用詣遼軍和議遂定累拜樞密使同平章事加左僕射兼侍中初章獻后臨朝中人與貴戚軒輊為禍福利用以勳舊自居凡内降恩力持不與左右多怨為内侍所搆貶房州安置投繯死利月忠藎有守死非其罪天下􅁈之明道二年贈太傅諡襄悼王鬷臨城人性至孝狀貌奇偉舉進士為侍御史知雜事上言方塞決河近郡灾歉民力凋敝請罷土木之不急者累官三司鹽鐵副使馬季良方用事請置務收市茶鹽衆莫敢忤鬷獨不可曰與民競利豈國體耶岀知益州為政有大體不尚苛察蜀人愛之景祐五年參知政事後出知河南府卒諡忠穆郭諮平棘人聰敏過人舉進士由通利軍司理參軍厯殿中丞知館陶縣康定西征諮上戰畧獻拒馬搶陳法擢通判鎮戎軍厯知路州三司議均田租召還諮陳均括之法四十條復上平燕議帝壯其言又請自鞏西山七里􅀌柏嶺下鑿七十里導洛入汴可以四時行運詔往計度未及論功而卒李京趙州人以王拱辰薦為監察御史時太史言日當食不食羣臣皆賀京獨疏宜飭邊臣慎出命割帷薄之愛重名器之分仁宗嘉納授右正言數上書論事宰相賈昌朝不悦謫監鄂州税宋敏求綬子賜進士及第為館閣校勘王堯臣修唐書以敏求習唐事奏為編修官治平中知制誥神宗時吕公著為王安石所誣出知潁州敏求當草制安石諭㫖使明著罪狀敏求但言敷陳失實安石怒命陳升之改其語敏求請解職未聽會李定除御史敏求封還詞頭遂以右諫議大夫奉朝請敏求家藏書三萬卷皆畧誦習熟於朝廷典故士大夫疑議必就正焉所著書甚多族弟昌言擢都水監丞熙寕初河決棗强而北昌言建議以除水患詔司馬光往視如昌言䇿不兩月決口塞官至少府監金賈益謙㓇州人大定進士厯任州郡以能稱明昌五年爲右諫議大夫章宗將幸景明宫清暑益謙連上疏極諫鎬王以疑忌下獄上怒甚無敢言者益謙論其不可累官尚書右丞致仕居鄭州纂集衞王事迹時多以衞王天命所絶史官就鄭訪之益謙曰衞王行事中才不及者多矣設欲飾吾言以實其罪吾亦何惜餘生朝議偉之焦旭柏鄉人世宗時宫良鄉令平章石琚薦旭幹能可甄用召爲右警巡使擢監察御史章宗初即位太傅克寕等請上出獵旭奏劾其非上慰諭之爲罷獵明昌中遷都水監以治河防勞授西京路轉運使旭性警敏練達時政與王翛劉仲洙輩世稱能吏云元王義寕晉人有膽智沈黙寡言讀書知大義穆瑚黎兵至義率衆來歸入覲太祖授寕晉令兼趙州以南招撫使時兵亂廢耕所在人相食寕晉東有藪澤周百餘里中有小堡曰􅅹城義曰􅅹城雖小而完且有魚藕菱芡之利不可失也留偏將守寕晉身率衆保􅅹城由是全活者衆累擢深冀趙三州招撫使擊敗金將武仙拔冀州平邢州盜趙大王乃布教令招集流亡勸率種藝深冀之間遂為樂土穆瑚黎改見順天府人物王玉寕晉人長身駢脅多力穆瑚黎引兵南下玉率衆來附從攻拔邢洺磁澤潞諸州攻平陽下太原汾代師還署元帥府監軍後從史天澤攻敗武仙仙遣人齎誥命誘玉妻妻拒曰妾豈可使夫懷二心於國家仙殺其子玉聞領數騎哭其圍斬數百人而還仙遣人追之不敢進皆曰王將軍驍勇我輩非敵也正定平加慶源軍節度副使子忱幼讀書明敏有才識厯官雲南行省參知政事陳祐寕晉人祖忠博究經史鄉黨尊師之既殁門人諡曰茂行先生祐少好學家貧母張氏嘗翦髪易書使讀之世祖時厯河南衞輝總管累遷浙東道宣慰使所至有惠政遇盜死追封河南郡公諡忠定嘗上書世祖言太平之本有三一太子國本建立宜早二中書政本責成宜專三人才治本選舉宜審事雖未能盡行時論稱之陳天祥祐弟少善騎射中統三年李壇叛河南宣慰司以天祥為千户防遏宋兵事平罷歸居偃師南山躬耕讀書從遊甚衆至元中從軍渡江連平興國壽昌之亂二十一年拜監察御史右丞盧世榮以掊克聚斂驟升執政權傾一時無敢言者天祥上疏極言其奸惡世榮遂伏誅大德中為河南行臺御史中丞上章論征西南夷事累數千言不報遂謝病去後拜中書右丞議樞密院事辭不起卒追封趙國公諡文忠陳思謙祐孫警敏好學至順初拜西行臺監察御史建明八事曰正君道結人心崇禮讓正綱紀審銓衡勵孝行紓民力修軍政後拜監察御史首陳四事皆可其奏詔建報嚴寺思謙謂當罷土木以紓民力乃止出為淮西亷訪使累官御史中丞卒諡通敏劉安世柏鄉人父才有篤疾百藥不效安世中夜潛卧墅南石橋氷上氷融三寸許即以瓶􅂑水飲才才曰此水與井水殊不同味頗與藥􅁼數日病痊遂近嘆異以為誠孝所感明曹鼐寕晉人少伉爽有大志事繼母以孝聞宣德初由鄉舉授代州訓導乞劇職自效改泰和典史七年督工匠至京師疏乞入試復中順天鄉試明年舉進士第一授翰林修撰正統五年以侍讀入直文淵閣參豫機務鼐内剛外和通達政體大學士楊士奇常病不視事閣務多決於鼐累遷翰林學士吏部侍郎額森入寇扈從至土木及於難景帝立贈吏部尚書文淵閣大學士諡文襄英宗復位加贈太傅改諡文忠額森改見順天府人物王詔趙州人天順末進士擢工科給事中成化中隆善寺成命授工匠三十人為文思院副使詔切諫已與同官奏請起致仕尚書王竑李秉而斥都御史王越并及宫闈事帝大怒召至面詰杖之宏治初以副都御史巡撫雲南諸夷歸命邊徼安戢召拜南京兵部侍郎未上卒王誥臨城人嘉靖進士厯官户部郎中大同兵變擢誥為知府比至擒首惡數十人悉抵之法餘無所問重鎮以安厯遷僉都御史巡撫甘肅防禦經畫悉中機宜進都御史總督漕運時倭人猖獗直犯淮泗誥督率將士分兵夾撃大破之即休容兵寛租税停買馬威惠並著趙南星高邑人萬厯進士由汝寕推官厯文選員外郎方嚴嫉惡上疏陳四大害觸時忌乞歸再起考功郎中主京察要路私人貶斥殆盡被嚴㫖落職名益高與鄒元標顧憲成海内擬之三君光宗立累拜都御史慨然以整齊天下為任主大計一如考功時彈劾無所避人多震慄進吏部尚書鋭意澄清起用廢錮君子滿朝中外方忻忻望治而小人側目魏忠賢矯㫖削籍戌代州卒崇禎初贈太子太保諡忠毅李標高邑人萬厯進士厯官禮部侍郎標師同邑趙南星魏忠賢黨因列之東林同志錄中標懼禍引病去崇禎初即家拜禮部尚書文淵閣大學士標持大體中立無黨時方綜核名實過於嚴急標毎劑以和平後復五疏乞休得請家居卒諡文節喬若雯臨城人萬厯進士官禮部主事崇禎九年劾魏廣微陳九疇等有直聲厯吏部考功員外郎岀為兖州知府聽㫁明決豪猾斂迹久之以疾歸士民遮道泣送十一年臨城失守若雯端坐按劒以待兵入遂遇害贈太常少卿李讓趙州人崇禎舉人流賊掠西山鄉民欲逃讓以忠義勸衆聚保賊至與從兄武舉調悉力拒守手刄數賊中流矢死調亦被殺事聞詔贈讓宛平知縣調都司同知建坊旌表本朝乾隆四十一年並子入忠義祠郝奇遇柏郷人生有至性崇禎末間都城陷語其妻曰我欲死難汝能之乎妻曰能遂先死奇遇􅄟畢飲藥死本朝孫昌齡寕晉人順治初授吏部考功郎中條議時事累千百言累遷副都御史奏免正定屬邑荒地逋賦卒詔贈右都御史諡恭憲魏裔介柏鄉人順治進士選庶吉士授給事中上疏言六事曰糾邪黨去冗員舉經筵防叢脞杜侵欺開言路請恤明季殉節諸臣范景文等三十人又因星變上十餘疏皆切時政十一年畿内大水民多流亡疏請救賑時黔省未靖海寇時􅅰内地裔介密陳用兵機宜多見採納累遷左都御史條陳時事疏無虛日康熙初加太子太保進吏部尚書保和殿大學士以病歸卒於家雍正十一年入祀賢良祠乾隆二年追諡文毅裔介博綜經史著述甚多嘗輯諸史中事論㫁之曰經世編又有聖賢學知統錄等書弟裔慤官平涼知府有孝行著書亦多魏櫆祥柏鄉人由拔貢生授廣西通判累遷潮州知府康熙十三年總兵劉某與續順公沈志祥有􅂩乘機激變以刄脅櫆祥從逆櫆祥曰仕爾所為我惟一死耳遂幽之一室櫆祥每日拍案大罵十指盡血出不食而死張大高臨城人有至性年十五隨父入山父為豹搏大高奮救得免事繼母以孝聞乾隆八年旌流寓宋魏廷式宗城人常客遊趙州􅃕於監軍魏咸美之􅅟􅅟西素凶咸美知廷式有膽力命居之卒無恙列女南北朝魏任城王太妃孟氏鉅鹿人尚書令任城王澄之母澄為􅀭州時率兵出討賊帥張慶真陰結逆黨襲陷羅城長史韋纉倉卒無計孟乃勒兵登陴激勵文武諭之逆順于是咸有奮志親自巡守不避矢石賊不能克卒以全城事聞勃有司樹碑旌表北齊李搔妹法行趙郡人幼好道截指自誓不嫁遂爲尼所居去鄴二百里往來恒歩在路或不得食飲水而已雉􅈷馴狎入其山居房室齊亡後遭時大儉施糜粥於路異母弟宗偘與族人孝衡爭地相毁法行曰我有地二家欲得者任取之何爲輕致忿訟宗偘等慙遂讓爲閒田隋李士謙姊平棘人適宋氏母亡哀毁而死盧氏李士謙妻士謙終開府參軍有所贈賻氏一無所受謂州之父老曰參軍生平好施今雖殁安可違其志哉於是散粟五日以賑窮乏世多賢之孝女王舜趙郡王子春之女子春爲從兄長忻謀殺舜時年七歲妹粲五歲璠二歲並􅀉食親戚舜陰有復仇之心及長親戚欲嫁之輒拒不從謂二妹曰父仇不復吾輩雖女子何用生爲二妹垂泣惟命各持刀踰牆而入手殺長忻夫妻以告父墓因詣縣請罪姊妹爭爲謀首高祖聞而嘉之特原其罪宋宋綬母楊氏綬幼爲外祖楊徽之所器重徽之無子家藏書萬卷悉與綬綬母亦知書躬自敎訓以故博通經史百家文章爲一時所尚及綬官參知政事母尚在明杜氏女趙州人年及笄值寇掠大石橋突入逼之詈罵不從賊怒刳其腹而死白璋妻楊氏柏鄉人璋病亡氏撫尸慟哭即自縊白勤妻李氏柏鄉人年十六邑胥趙權謀欲汚之伺勤遠行遂入卧内李疾呼詈罵權逸去勤歸訟於官邑令庇胥而笞勤李懣恚自縊死蔣氏名安閒臨城訓導蔣􅃏女夫殁守節隨父之任正德六年流賊陷臨城入學舍捽􅃏及妻李欲殺之女伏暗室聞之遽出泣言願代親死賊釋􅃏及李欲犯之堅拒不從賊怒殺之趙學書妻劉氏臨城人嘉靖癸丑流寇至執其姑氏往救紿賊舍其姑即赴火死孫昌穀妻張氏寕晉人昌穀卒張舍殮如禮幾死者數矣親戚屢勸慰之終不可奪距户自縊李氏女隆平人年及笄未嫁崇禎戊寅為兵所執女堅拒不從兵脅以刄女即以刄自毁其面遂被殺楊晉妻曹氏隆平人崇禎戊寅兵圍城急衆議逃避曹􅀏曰避將安之庭前井足完吾事矣城陷遂攜二女入井死同時張爾翮妻馮氏亦偕其女及婦王氏冋赴井死馮青選妻曹氏寕晉人青選殁一子方二歳號泣欲死姒王氏勸止之乃强食飲以撫其子崇禎甲申流賊至縣境曹語其姒曰我少婦不宜于亂世幸姒可托得撫育吾子足矣吾將從夫於地下遂自縊死本朝李淮妻傅氏高邑人姑病疽醫藥不治氏吮其毒復􅈼天祈以身代姑竟愈後淮官翰林卒於京邸聞訃即哀毁泣血投繯死王澐女新城人字隆平張肯構未嫁夫殁女聞即閉門自縊家人奔救得不死送歸夫家守節舅姑為立嗣女奉養尊嫜訓誨嗣子孝慈