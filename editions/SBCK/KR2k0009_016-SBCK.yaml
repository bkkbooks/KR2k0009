州刺史清簡愛民政績之美聲冠當時轉定州父老送出西境相聚而泣元孚魏宗室肅宗時為冀州刺史勸課農桑境内稱為慈父隣州號曰神君先是州人張孟都等八家屯保林野不臣王命孚至皆請入城願致死効力封隆之蓚人孝靜時凡四為冀州刺史毎臨冀部州中舊齒咸曰我封公復來其得物情如此隋和洪汝南人高祖時東夏初平物情尚梗以洪有威名令領冀州事甚得人和高構北海人高祖受禪轉冀州司馬甚有能名趙煚天水西人高祖時為冀州刺史甚有威德煚嘗有病百姓爭為祈禱冀州俗薄市井多姦詐煚為銅斗鐵尺置之於肆百姓便之上聞而嘉焉頒告天下以為常法柳機河東解人高祖時兩為冀州刺史俱稱寛惠張煚鄭人高祖時再為冀州刺史吏民悦服稱良二千石唐劉允之武德中為信都令有惠政裴子餘稷山人開元初為冀州刺史為政惠􅁉人稱有恩五代漢張廷翰冀州信都人漢初拜本州刺史為政寛厚簡易民甚愛之在郡八年遼數擾邊廷翰擊走之周張暉大城人世宗時為冀州刺史㑹詔築李晏口束鹿平安博野百八橋武強等城命暉護其役踰月而就宋蔚昭敏祥符人真宗時為冀州行營都監遼以五千騎􅋓至冀州城南昭敏率部兵以戰敗之李端懿上黨人知冀州為政循法度民愛其不擾張田澶淵人仁宗時通判冀州内侍張宗禮使經郡酣酒自恣守貳無有敢白者田發其事詔配西陵洒掃李維賢上黨人仁宗時知冀州會遷補禁軍自隸籍後犯贓汚者皆絀為下軍維賢曰武士何可責以廉節且抵罪在昔今不可以新令繩之帝為更其制劉摰東光人嘉祐中授南宫令縣賦甚重民多破產摰援例旁郡條請裁省轉運使怒將劾之摰固請遂告於朝三司使包拯奏從其議民懽呼至泣下曰劉長官活我李沖嘉祐中為信都令與南宫令劉摯清河令黄莘皆以治行聞人稱為河朔三令魯有開亳州人熙寕中知冀州増隄或謂郡無水患何以役為有開曰備豫不虞古之善計也卒成之明年河決水果至不能冒隄而止朝廷遣使河北民遮誦有開功狀劉閴北海人為冀州駐泊總管河水漲隄防墊急閴請郡守開青陽道口以殺水怒莫敢任其責閴躬往濬決水退冀人賴之李彌遜呉縣人宣和末知冀州金兵侵河朔彌遜捐金帛致勇士修城堞決河護塹邀擊其遊騎斬首甚衆烏珠北還戒師無犯其城烏珠舊作兀术今改正李政靖康中授河北將官駐守冀州時知州權􅀖彥以兵赴元帥府勤王金兵屢攻城政皆卻之夜搗其砦所得財物盡散士卒由是人皆用命俄攻城急有登城者政大呼力戰遂敗走未幾政死城遂陷權知州事單某不降自經死金裴莫亨臨潢泰和五年為安武軍節度使嵗大雪民多凍餒莫亨輸已俸為之賙贍及勸率僚屬大姓同出物以濟裴莫亨改見統部名宦明楊繩洪武初知南宫縣兵燹之餘榛莽彌望繩課民墾治荒地二三年後盡為沃壤畝􅀵數鍾時北平守巡官行縣履畝徴税檄守令以田賦之多寡為殿最繩諭民曰墾田雖多慎無具報北鄙為朝廷重地奈何盡民之力吾以此得罪無憾也故今南宫之賦視他邑為輕陸英利津人宣德中知南宫縣春夏常巡省郊野課農事止大樹下集士女教以孝弟勤儉時神武衛二指揮持牒至縣占地為屯英曰惟吾廳事前乃隙地耳此外皆吾民常業不敢聞命兩人知其廉介不可奪乃舍之而去段豸澤州人占籍錦衣衞正德中以給事中謫􅀥強知縣流賊來攻豸誓衆固守矢石俱發殺賊二百餘人賊攻益急城陷死之贈太僕寺少卿彭士宏遼東錦州人崇禎中知南宫縣十七年流寇陷城脅之降不屈賊殺之既死有白氣上升士民塑像祀之崔賢代州人崇禎末知新河縣莅事月餘兵逼城賢嬰城固守城破自殺本朝張恒臨晉人順冶三年知衡水縣兵燹後土寇時發恒一意息民罷革諸弊民建祠祀之衷炳修崇安人乾隆進士知南宫縣甫下車以學校為急即察院遺基建東陽書院至今士林賴之人物漢竇嬰孝文皇后從兄子觀津人孝景即位為詹事竇太后愛帝弟梁孝王孝王朝因燕上從容曰千秋萬嵗後傳王嬰進曰天下者高祖天下父子相傳漢之約也上何得傳梁王呉楚反拜嬰為大將軍賜金千斤嬰言袁盎欒布諸名將賢士進之所賜金令軍士取用無入家者七國破封魏其侯武帝初為丞相時太后好黃老而嬰好儒術以是不合遂免去孟但廣川人受易東武王同子中元光中為大中大夫秦恭信都人從平陵張山拊受尚書増師法至百萬言為城陽内史邳彤信都人光武徇河北以彤為和成太守王􅀰兵起光武自薊還失軍欲至信都彤􅃟精騎緣路迎軍㑹於信都時衆議欲西還長安彤諫乃止即日拜為後大將軍使將兵居前常從戰攻信都復反為王􅀰捕繫彤父弟及妻子使為子書招彤彤泣報曰事君者不得顧家會别將拔信都家屬得免建武元年封靈壽侯永平中圖畫雲臺劉植昌城人王􅀰起植率宗族據昌城開門迎世祖以為驍騎將軍又説劉楊降光武因得進兵拔邯鄲從平河北封昌城侯三國魏牽招觀津人年十餘􅀊詣同縣樂隱受學後隱為車騎將軍河苗長史招隨卒業京都亂隱見害招觸蹈鋒刃殯葬其屍送喪歸道遇賊欲砍棺招垂淚請赦賊義之乃釋而去由此顯名袁紹辟為督軍從事後歸太祖從討烏桓還鄴睹袁尚首懸馬市悲感設祭頭下太祖義之拜平盧校尉文帝踐阼拜使持節護鮮卑校尉屯昌平復為雁門太守明帝賜爵關内侯在郡十二年威風逺振晉馮恢長樂人恢父為宏農太守受少子淑欲以爵傳之父终服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵始仕為博士祭酒隋劉焯昌亭人以儒學知名舉秀才射䇿甲科與王邵同修國史兼參議律厯仍直門下省以待顧問後與諸儒於秘書省考定羣言與楊素牛宏蘇威等共論古今滯義素等莫不服其精博後免官歸以教授著述為務劉􅋑名亞於焯故時稱二劉論者以為數百年來博學通儒無能出其右者馮慈明長樂人大業間拜尚書兵曹􅀰攝江都郡丞事李密逼東都詔慈明安集􅈆洛為密黨所執潛使人奉表江都及致書東都留守論賊形勢密知其狀義而釋之出至營門賊帥翟讓責之慈明勃然曰吾豈從汝求活耶須殺但殺何須罵詈讓怒亂刀斬之贈銀青光祿大夫唐孔穎達衡水人八􅀊就學誦記日千餘言及長明服氏春秋鄭氏尚書詩禮記王氏易善屬文通歩厯隋大業初舉明經高第太宗授文學館學士貞觀初轉給事中數以忠言進除國于司業進太子庶子與諸儒議厯及明堂事多從其説拜祭酒侍講東宫太子稍不法穎達爭不巳後致仕卒陪葬昭陵諡曰憲初穎達與顏師古等受詔撰五經義訓凡百餘篇號義贊詔改為正義云蓋文達信都人博涉前載尤明春秋三家刺史竇抗集耆儒劉焯劉䡄思孔穎達等講論文達依經辨舉皆諸儒意所未叩一坐嘆服貞觀初擢諫議大夫後拜崇賢館學士宗人文懿亦以儒學稱時號二蓋為國子助教既升席公卿更相質問文懿譬曉密微遠近宗仰终國子博士蘇定方名烈以字行武邑人驍悍有氣決貞觀初從李靖襲􅋓厥頡利於磧口為前鋒馳殺數百人餘黨悉降與程明振討高麗破之從程知節征賀魯率精騎搗其營賊衆大潰復為大總管縛賀魯以還由是唐之州縣極西海策功拜左驍衞大將軍封邢國公又降思結闕俟斤都曼平百濟凡滅三國皆生執其王累拜凉州安集大使卒贈幽州都督諡曰莊張昌齡南宫人與兄昌宗皆以文名貞觀末翠微宫成獻頌闕下召見試息兵詔少􅃟成文帝大悦俄為崑山道記室平龜兹露布為世所稱賀蘭敏之奏預北門修撰昌宗官至修文館學士撰古文紀年新傳數十篇杜景佺武邑人性嚴正舉明經累遷司刑丞與徐有功來俊臣侯思止專治詔獄時稱遇徐杜者生來侯者死延載元年同鳳閣鸞臺平章事武后嘗季秋出梨花示宰相以為祥衆賀景佺獨曰陰陽不相奪倫瀆則為災今草木黄落而木復華瀆陰陽也臣位宰相助天治物而不和是臣之咎后曰真宰相後出為并州長史蘇安恒武邑人明周官春秋左氏學武后末年太子雖還東宫政事一不與大臣畏禍無敢言安恒投匭上書勸后傳位后召見厚慰遣之明年復諌曰今太子年德巳盛尚貪有大寶忘母子之恩何顔面見唐家宗廟大帝陵寢書聞不報魏元忠為張易之兄弟所搆安恒獨申救易之等大怒遣刺客邀殺之賴桓彥範營解乃免神龍初為人所讒死獄中睿宗立贈諫議大夫宋荆罕儒信都人建隆初為晉州兵馬鈐轄與楊鈞戰死罕儒輕財好施在泰州時有供奉官張奉珪自言後唐張承業之子罕儒厚加禮待遺錢五十萬米千斛雖不知書好禮接儒士常欲削平太原志未果而及於敗人皆惜之荆嗣罕儒從孫初應募從李繼勲討河東進薄汾河敗賊將楊業太宗時從征太原及幽州皆率先陷陣斬獲甚衆累遷都指揮使真宗時為虢州防禦使邠寕環慶副部署卒嗣起行間以勞居方面經百五十餘戰耿全斌信都人少豐偉父顥攜謁陳摶摶謂有藩侯相太宗在藩邸召試武藝隸帳下稍遷副兵馬使從征太原還遇遼兵於蒲陰追擊敗之屯瀛州與遼戰馬中流矢凡三易乘戰不􅁍在軍中有能名真宗召問邊事口陳利害稱㫖厯知邊郡終濮州鈐轄李超信都人常從潘美軍中主刑刀美好乘怒殺人超每潛緩之美怒解輒得釋以是全者甚衆人謂其有陰德子濬中進士景德初為侍御史從幸澶淵上疏言便宜擢樞密直學士范廷召棗強人父鐸為里中惡少年所害廷召年十八手刃父讐雍熙三年北征為幽州道前軍先鋒都指揮使克固安新城二縣乘勝下􅃰州復與賊戰中流矢神色自若督戰益急詔襃之至道中討李繼遷廷召出延州路獲軍主吃羅等兵器鎧甲數萬咸平二年與遼戰有功加檢校太傅廷召在軍四十餘年凡親征未嘗不從王翰南宫人母喪明翰自抉右目睛補之母目明如故淳化中詔賜粟帛張存冀州人天禧中詔銓司以身言書判取士才得二人存與其􅃟厯殿中侍御史仁宗初親政罷百官轉對存復請之積遷禮部尚書存性孝友收恤宗族嫁聘窮嫠不使一人失所家居矜莊子孫非正衣冠不見田况信都人少卓犖有大志舉進士甲科又舉賢良方正趙元昊反夏竦經畧陜西辟為判官時竦與韓琦尹洙等畫上攻守二策朝廷將用攻䇿况上疏陳七不可於是罷出師議又言治邊十四事遷右正言尋為陜西宣撫使况有文武材言事精暢有奏議二十卷金路伯達冀州人性沈厚有遠識博學能詩登正隆進士章宗時累遷刑部􅀰中上問羣臣何道使民務本業廣儲蓄對曰布德流化必自近始請罷畿内採獵之禁廣農郊以示敦本時採捕禁嚴畿外數百里皆厲禁故伯達及之累拜安武軍節度使卒贈大中大夫吕仲孚南宫人能詩有清漳集路鐸伯達子性剛正章宗時厯官臺諌有直臣風泰和六年為翰林待制累除孟州防禦使貞祐初城陷投沁水死所著詩文號虛舟居士集元張晉亨南宫人從嚴實歸元涉獵書史小心畏懼臨事周密實器之以女妻焉屢從攻戰有功實卒其子忠濟奏晉亨權知東平府事厯七年吏畏民安至元初累官淄萊路總管戍鎮江卒於官明白圭南宫人正統進士除御史監朱勇軍討烏梁海有功岀按山西辨疑獄百餘事天順初以副都御史與方瑛討平貴州東苗千把豬等湖廣災就命圭巡撫召為兵部侍􅀰巡邊敗波賚於固原州進工部尚書成化元年流賊聚嘯荆襄敇朱永往勦以圭督軍務擒賊渠劉通石龍餘宼悉平加太子少保改兵部尚書兼督十二團營卒贈少傅諡恭敏圭性簡重公退即閉閣卧請謁皆不得通次子􅃏進士及第授編修累官太子少保禮部尚書習典故以詞翰稱卒贈太子太保諡文􅁉烏梁海舊作兀良哈波賚舊作孛來今並改正孔環南宫人正德中以􅀊貢授來安知縣忤劉墐黨左遷西華教諭六年盜起霸州奄至西華城陷被執賊持刀脅之降環厲聲罵曰我為國家臣肯從逆賊以求活􅁘遂被害詔賜一子冠帶劉濂南宫人正德進士擢御史時郭勛驕恣不法於武舉宴上與尚書爭坐濂劾之勛遂奪職嘉靖初罷各省鎮守中官諸近侍欲留承天鎮守濂曰留一人是復鎮之根也因發其窩盜事帝大怒覈實逮鎮守中官潘某與甞言不當罷者杖殺之嚴嵩為禮部尚書將有入閣之命濓上疏極言嵩貪詐不可用疏入報聞嵩竟相濂遂謝病歸旋卒劉文蔚新河人崇禎末由􅀊貢為淮安府通判大兵攻城文蔚竭力率家衆守禦城破猶巷戰被執不屈死一年本朝乾隆四十賜諡節愍趙懋賢新河人以恩貢授韓城縣丞崇禎末分守西門城破死之本朝乾隆四十一年予祀忠義祠本朝崔燦棗強人順治五年知湖廣耒陽縣值土寇亂率僕役出戰被執憤罵不屈遇害宋文運南宫人順治進士知山東滋陽縣值軍務旁午以勤幹稱擢吏部文􅃟主事銓政澄清悉協才望累遷順天府尹不數月釐革宿弊殆盡豪猾斂迹進刑部侍􅀰以刑獄至重戒諸司母得瞻徇紛更加太子少保卒諡端慤呉仲廣􅀥強人父為族子毆死仲廣與弟仲祥俱幼未能報及長乃共持梃擊死殺父者詣縣爭首繫獄時家窶甚二人妻竭織紡以供槖饘五年不懈一門孝義遠近稱之鄭端􅀥強人由庶吉士散館改工部主事升户部􅀰中康熙九年除貴州提學道旋丁外艱服闋赴陜西軍營效用尋補神木道洊升江蘇巡撫端素履醇謹厯任有聲卒賜祭葬項士鋐南宫人由國學生議敘州同借􅀘廣西奉議州判倡建義學捐俸置田地延師訓廸旋升四川成都通判署雅州府篆時西南夷自相搆釁士鋐進安撫之䇿為上憲所嘉納故兵不發而卒宴然無事其有功於蜀人大矣李顯祖南宫人以父都統漣勲廕千總洊升貴州遊擊乾隆三十一年隨征金川陣亡事聞議卹加參將銜配享昭忠祠李永慶南宫人乾隆三十八年由外委隨征金川擊賊於昔嶺陣亡事聞議卹廕把總步登廷棗強人由光祿寺署正補富新倉監督時有新倉太平之語升大理寺寺丞平反情罪輕重必當洊升工部郎中居官三十年自奉儉約賙䘏不吝致仕歸里於大金村建嘉會書院培養後進人多稱之歩毓巖登廷孫幼失恃孝事繼母乾隆間進士任河南泌陽縣時值兵燹之餘邑無鹽商崔元珏等聚黨私販行劫首捕誅之因請立商以便民毎讞獄能以色聽至有越境來訴者去任後邑人立碑誌感焉列女金路伯達妻傅氏冀州人伯達使宋還獻所得金銀以助邊未及上而卒傅氏言之朝章宗以金還之傅泣請弗許傅以伯達嘗修冀州學乃市信都棗強田以贍學有司以聞上賢之賜號成德夫人元曹泰財妻劉氏衡水人通孝經及小學至正間紅巾賊奄至見氏露刃逼之氏不從賊強擁上馬投地數四賊怒繫其頸於馬上曳之氏以頭觸石流血被面罵不絶口遂被殺明陳和妻高氏武邑人和為諸生早卒高獨持門户奉翁姑甚孝及殁氏以禮殯葬時年五十矣泣謂子剛曰我父洪武間舉家客河南虞城父死旅葬城北母以􅀥木小車輞識之比還家母亦死弟懦不能自振吾三十年不敢言者以翁姑在堂當朝夕侍養也今大事已畢欲往舁父遺骸歸而合葬剛即隨母往虞城抵葬所冢纍纍不能辨氏以髪繫馬鞍逆行自朝及夕至一小冢鞍重不能前即開其冢所識車輞宛然遠近觀者咸驚異贈遺以歸啟母穴同葬孟著妻孫氏南宫人著為御史卒氏年二十食貧訓子苦節终身宣德中旌蔡甫原妻范氏棗強人年二十四夫死父母欲嫁之氏不從奉姑盡孝教育諸子俱成立宣德中旌同縣宋亮妻高氏年二十六亮嬰病氏日夜􅈼天求以身代及亮卒守節五十餘年成化中旌張繼祖妻杜氏冀州人繼祖為給事中氏相夫教子皆合禮度正德七年盜起杜倉卒隨諸姫匿草澤中賊搜得之迫上馬杜伏地大罵遂遇害同時南宫關景妻陀氏棗強張氏和氏二女皆為賊所逼厲罵不從遇害韓天德妻王氏冀州人崇禎辛未城破氏年二十一抱幼子避難被執不從母子俱遇害賈還素妻尹氏南宫人年十七歸賈戊寅城陷有子尚在襁褓擇老婢付之曰罹此禍亂幸而得生辱吾家門户多矣遂投井死劉仁妻傅氏新河人流賊入城被執驅之行不從賊以繩繫氏頸於馬項氏厲聲罵不絶口賊怒殺之王祚昌妻陳氏冀州人崇禎末城陷賊執之以行氏拒之脅以刃终不可屈遂支解之本朝張庚次女南宫人幼嫻内則女誡列女傳諸書字楊之玉未嫁夫死女聞訃自經救免請奔喪旦夕哀毁及大祥遂不食死邢鑣妻李氏南宫人年十三歸鑣鑣卒氏年僅十五一慟而絶救之復甦尋以哀悼卒李有謙妻蘇氏衡水人夫亡自縊以殉王信真女五姐南宫人字楊貞先未婚貞先欲犯之女守禮不從遇害康熙年間旌宋進城妻張氏􅀥強人與同縣馮之秋女根姐皆拒暴不辱死均康熙年間旌滕國風女武邑人與同縣王五妻楊氏皆為強暴所逼不從死均康熙年間旌李旺山妻屈氏衡水人守正捐軀康熙年間旌邢端立妻劉氏冀州人遇暴不屈死乾隆年間旌謝明善妻劉氏冀州人家貧夫故翁老且病氏拮据以供藥餌翁殁鬻釵鈿營喪葬苦節六十年同州節婦陳以常妻韓氏曹欽曽妻李氏金宏基妻沈氏均乾隆年間旌劉才起妻郝氏南宫人守正捐軀同縣烈婦孟五妻劉氏趙大妻張氏譚宗孟妻郭氏任小二妻宋氏邱大妻張氏烈女孔歡姐節婦安錫妻周氏杜潤妻孫氏齊維新妻路氏李振宗妻房氏宋宏緒妻魏氏喬爾信妻謝氏尚皆吉妻鮑氏馬大成妻李氏李法妻孔氏馬洵妻李氏馬廷祥妻畢氏范通妻宋氏范宗聖妻安氏鮑橘妻曲氏尚恒吉妻高氏李洛妻王氏陳子錂妻孟氏王祥昇妻張氏李訥妻王