front:
  text: 大清一統志冀州直隸州在直隸省治南三百三里東西距一百十里南北距一百五十里東至河間府故城縣界四十五里西至趙州寕晉縣界六十五里南至廣平府威縣界七十里北至深州安平縣界八十里東南至廣平府清河縣治一百四十里西南至順德府鉅鹿縣治八十里東北至河間府阜城縣治一百八里西北至保定府東鹿縣治七十五里本州境東西距六十里南北距七十里東至棗強縣界十五里西至新河縣界四十五里南至南宫縣界五十里北至衡水縣界二十里東南至清河縣治一百四十里西南至新河縣治六十里東北至衡水縣治四十里西北至束鹿縣治七十五里自州治至京師六百三十三里分野天文昴畢分野大梁之次建置沿革禹貢冀兗二州之域通典郡理東入兗州之域西入冀州之域
