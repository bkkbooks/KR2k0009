front:
  text: 大清一統志鳳翔府在省治西少北三百六十里東西距四百二十里南北距二百四十里東至乾州武功縣界一百五十里西至甘肅秦州清水縣界二百七十里􅀯至漢中府鳳縣界一百七十里北至甘肅平涼府靈臺縣界七十里東南至西安府盩厔縣界一百六十五里西南至鳯縣界一百八十里東北至乾州永夀縣界一百六十五里西北至平涼府華亭縣界二百十里自府治至京師三千里分野天文井鬼分野鶉首之次建置沿革禹貢雍州之域周王畿地春秋時為秦國
  hash: sha256:91b8b02418540c383ab0882ce0432d77320750ea326daa015a96fd474413dba9
