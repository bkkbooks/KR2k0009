吾䇿名漢室死歸其正可事二姓哉遂移家屬逃入深山王忳新都人除郿令到官至斄亭亭長曰亭有鬼不可宿也忳不聴夜聞女子稱􅁈聲忳咒曰可前求理女子曰妾夫爲涪令過宿此亭亭長殺妾家十餘口埋樓下悉盜取財貨忳問亭長姓名曰即今門下游徼者也明旦名游徼詰問具服罪及同謀十餘人悉㐲辜遣吏歸其喪南北朝魏楊津華陰人宣武時除岐川刺史巨細躬親孜孜不倦合境畏服至於守令寮佐有黷貨者未曾公言其罪嘗以私書切責之於是官屬感勵莫有犯法者魏蘭根下曲陽人孝昌初爲岐州刺史從蕭寶夤詩破苑川俘其人爲奴婢以美女十人賞蘭根辭曰此縣介於强隣故成背叛今當恤其飢寒奈何並充僕隸於是盡以歸其父兄部内黍多五穗鄰州田鼠爲災不入其境鄭道邕開封人大統中行岐州刺史有能名先是所部百姓久遭離亂逃散殆盡道邑下車日尸止三十留情綏撫逺近咸至數年之内有四萬家歳考績爲天下最趙昶天水􅀯安人大統十五年拜安夷郡守帶長虵鎮將氏族荒獷昶威懷以禮莫不悦服期歳之後樂從軍者千餘人周宇文椿周宗室建德􅀄除岐州刺史四年關中民飢椿表陳其狀璽書勞慰因令所在開倉賬䘏隋梁彦光烏氏人開皇中為岐州刺史有惠政嘉禾連理岀於州境上悦其能乃下詔曰彦光布政岐下威惠在人亷慎之譽聞於天下王伽章武人開皇末為雍令政有能名唐常達陜人為隴州刺史時薛舉方强逵改其子仁杲舉遣將許士政紿降達不疑厚加撫接士政刧之歸賊達不為屈仁果平高祖見達勞曰君忠節正可求之古人賜布帛一百段劉仁軌尉氏人太宗時為陳倉尉部人折衝都尉魯臨者豪縱犯法縣莫啟屈仁軌約不再犯而臨暴横自如仁軌榜殺之帝以為剛正擢咸陽丞楊瑒華陰人為麟逰令時竇懷貞大營金仙玉真二觀檄取畿内嘗負逆人貲者暴斂之以佐費瑒拒不應懷貞怒曰縣令而拒大夫命乎瑒曰所論者民􅁈抑也位高下乎何取懷貞壯其對而止初韋后表民二十二為丁限及敗有司追趣其課瑒執不可遂止不課由是名顯當世馬燧郟城人大歴中為隴州刺史西山直吐蕃其上有通道燧聚石種樹障之設二門為譙櫓八日而畢敵不能暴韋臯萬年人建中中知隴州行營留後始朱泚以范陽軍鎮鳯翔既歸節而留兵五百戍隴上以部將牛雲光督之至是雲光謀請臯為帥將刼以臣泚泚奴使臯所以御史中丞授臯臯偽受泚詔明日置酒大會伏甲盡殺之以其首徇泚復使他奴拜臯鳯翔節度使臯亦斬之帝聞乃授臯隴州刺史置奉義軍拜節度使臯遣兄平及弇繼至奉天乃築壇血牲與士盟又馳使吐蕃與連和隴坻遂安李晟臨洮人德宗時涇州倚邊數戕其帥晟請治不共命者因以訓耕積粟實塞下羈制西戎拜鳯翔隴右涇原節度使兼行營副元帥晟至鳯翔亂將王斌等以次㐲誅嘗曰河隴之陷非吐蕃能取之皆將臣貪沓暴其種落不得耕稼日益東徙自棄之爾因悉家貲懷輯降附吐蕃大懼因謀反間晟設伏兵破之邢君牙樂壽人為李晟都將晟在鳯翔數行邊嘗以君牙守晟入朝代為鳯翔觀察使俄領節度吐蕃歳犯邊君牙勸耕講戰以為傋戎不能侵又城隴州平戎川號永信城野詩良輔為鳯翔將以名雄邊後為隴州刺史朝廷遣使至吐蕃吐蕃輒言唐家稱和好豈妄耶不爾安得任良輔為隴州王承元穆宗時徙鳯翔節度使鳯翔右袤涇原地平少巖險吐蕃數入盜承元據勝地為障置守兵千詔號臨􅊈城府郛左百賈州聚異時燎烽相警承元版堞繚之人乃告安史憲忠建康人文宗時為隴州刺史增亭障徙客館於外戎諜無所伺李惟簡范陽人太和中為鳯翔節度使市耕牛佃具給農歳増墾田數十萬畝鄭畋滎陽人乾符中為鳯翔隴西節度使募鋭兵五百號疾雷將境中盜不敢發發輙得黄巢陷東都帝出梁洋畋上謁斜谷請便宜從事還蒐士卒繕器械濬城隍以順逆曉諸將刺血以盟敗賊將王璠於龍尾坡殺賊二萬擒璠子斬之感動京師宋楊徽之浦城人乾徳初為天興令府帥王彦超知其名侍以賓禮翟守素任城人雍熙中知鳯翔府性謹慎所至有治績李若拙萬年人太宗時知隴州以政聞超授監察御史周審玉開封人咸平初知鳯翔府有桑門乘傳而西以市木為名威動府縣審玉曰此有所倚而為也因按詰之盡得其奸狀械送關下燕肅曹州人􅀘鳳翔府觀察推官寇準知府事薦改著作佐郎李及鄭州人真宗時知隴州㝷知鳯翔府資質清介所治簡嚴杜衍山陰人㩲知鳯翔府及罷歸民邀留境上曰何奪我賢太守也司馬池夏縣人仁宗時知鳯翔府有疑獄上讞大理輒復下掾屬惶遽引咎池曰長史者政事所由非諸君過乃獨承其罪有詔勿劾陳希亮青神人仁宗時知鳯翔嵗饑希亮發十二萬石貸民有司懼擅發希亮身任之是秋大熟以新易舊官民皆便任福開封人仁宗時知隴州擢秦鳯路馬步軍副總管時詔陜西増城壘器械福受命四十日戰守之備皆具李師中楚邱人仁宗時知鳯翔府鄜延路覘知西夏駐兵綏銀州檄諸路當牽制師中疏論牽制之害卒罷蘇軾眉山人嘉祐末簽書鳯翔府判官關中自元昊叛民貧役重岐下歳輸􅀯山木栰自渭入河經砥柱之險衙吏接踵破家軾訪其利害為修衙規使自擇不工以時進止自是害減半程之邵眉山人元祐中知鳯翔府民負債無以償自焚其居紿曰遺火有主藏吏殺四婢人無知者之邵發擿岐人傳誦李伸建炎中知天興縣金兵來攻堅守不下城陷自殺康傑建炎中權知扶風縣與金將馮宣戰宣欲招之傑奮曰吾當死於陣不能降敵宣殺之吳玠隴千人建炎中為秦鳳副總管兼知鳳翔府時兵火之餘玠勞來安集民頼以生金烏珠會諸道兵十餘萬造浮梁跨渭自寶雞結連珠營攻和尚原玠命諸將選勁弓强弩分看迭射以奇兵絶其糧道設伏縱擊大敗之烏珠舊作兀术今改呉璘玠弟紹興初統制和尚原軍馬於是玠駐師河池璘專守原及烏珠大入以死守之敵陣分合三十餘璘隨機而應至神岔伏發烏珠中流矢遁楊政臨涇人建炎間從呉玠擊金兵九戰九㨗升隴州團練使移知方山原軍儲留穀在其中金大軍來攻政擊敗之其後又偕楊從義刼金兵於鳯翔府城南砦敗之帥師趨寶雞渭水上以拒敵衝凡大戰七斬􅀗甚多金龎迪延安人正隆元年遷鳯翔尹海陵􅀯伐徵斂煩急官吏因縁為奸富者用賄以免貧者破産益困廸悉召民使共議增減不加威督而役力均人情大悦馬慶祥本名錫勤希狄道人拜鳯翔路兵馬都總管判官元光元年元兵來攻慶祥殊死戰矢盡元兵圍數匝欲降之不屈而死贈恒州刺史諡忠愍錫勒希舊作習禮吉思今改明宋端肅寕人宣德中知扶風縣九年奏最當遷民乞留詔加秩還任扈進元氏人宣德中知鳯翔府政務寛簡大得民和九載課最進秩至從二品孫璽代州人正徳中知扶風縣時四川盜流入漢中都御史藍章以畧陽要地無城而其令嚴順不足任檄璽往城之賊至順勸璽去璽不可遂遇害贈光禄寺少卿胡爾純山東人崇禎中知隴州流寇􅁆萬攻隴悉力守禦賊入爾純目縊死贈光禄寺少卿薛應玢武進人崇禎中為同知攝隴州事賊陷鳯翔屬邑望風下應玢獨勒兵自守力竭城陷罵賊死王國訓解州人崇禎中知扶風縣流賊來犯偕主簿夏建忠典史陳紹南教諭張宏綱訓導陳繻嬰城固守越兩月外援不至城陷並死之贈國訓光禄寺少卿建忠等皆贈恤吕鳴世清漳人崇禎中知麟逰縣性介特以風教自任地遭兵燹居民寥落拊䘏備至流賊陷城未忍加害絶食六日死唐時明固始人崇禎末知鳯翔府聞李自成入潼關丞治戰守傋賊至典史董尚質等開門迎賊時明為賊得勸之降時明叱曰我天朝命吏肯臣賊耶賊令縛赴西安至興平乘間自縊唐夢鯤番禺人崇禎末知寶雞縣賊巳逼潼關衆勸勿往夢鯤星馳抵任賊陷鳯翔所屬皆下夢鯤知不可守自縊死本朝宋永譽永年人順治初知郿縣流賊賀琛自漢中寇西安道攻郿遣使招水譽誘以厚禄永譽縛其使賊怒亟攻之城陷被執水譽挺立罵不絶口賊衆臠殺之事聞贈按察司僉事吳汝為霑化人順治中知麟遊縣邑自兵燹後户口凋殘汝為殫力生聚減浮糧免積逋民􅀗休息梅遇南城人康熙初知郿縣郿屢經兵燹初設官招墾胥吏等因緑為奸逋賦日積遇請於上官悉減之邑西北多石田遇引古横渠屈流四十里繞西北入渭由是盡成沃壤更設義倉修學校士民咸沐其德于翔漢漢軍正白旗人康熙初知隴州先是呉三桂偽將蔡元攻隴前官翁世庸被執城陷後大兵克復賊西遁復繞踞關山頂塞路守險總督哈占等率兵屯咸宜關相持不下翔漢供億彌年人民安堵擢鳯翔知府休養瘡疾人頼以安朱琦婁縣人康熙中知鳯翔府政無巨細皆手自裁決尤留心􅁈獄多所平反後去官士民立祠祀之茹儀鳳河内人康熙中知岐山縣力行敎養請免荒田一千餘頃士民立祠祀之聶燾衡山人乾隆初由鎮安調鳯翔令潔己勤民盡革陋規甫三月以憂去官士庶為之流涕人物秦白起郿人善用兵事秦昭王封武安君為秦戰勝攻取者七十餘城南定鄢郢漢中北擒趙括後賜死杜郵秦人憐之鄉邑皆祭焉漢徐敖號人事清河胡常為右扶風掾又從解延年受毛公詩敖又授九江陳俠由是言毛詩者本之徐敖郭欽隃麋人哀帝時為丞相司直以論董賢左遷盧奴今平帝時遷南郡太守王莽居攝以病免官歸鄉里臥不出户庭卒於家井丹郿人少受業太學通五經善談論京師為之語曰五經紛綸井大春性清高未嘗修刺侯人建武末沛王輔等好賓客更遣請丹不能致信陽侯陰就要刧致之自是隱閉不關人事法雄郿人初仕郡公曹辟太傅張禹府舉高第除平氏長永初三年海賊張伯路等寇濱海九郡徵雄為青州刺史討之連戰破賊州界清靜遷南郡太守卒於官法真雄子博通内外圖典為關西大儒性恬淡不交人間事同郡田羽萬真順帝虛心欲致前後四徴真深自隱絶時號元德先生三國漢法正真孫先主立為漢中王以正為尚書令䕶軍將軍諸葛亮與正雖好尚不同以公義相取亮每奇正智術先主東征孫權敗績亮嘆曰法孝直若在則能制主上令不東行就復東行必不傾危矣晉魯芝郿人耽思墳籍舉孝康仕魏累官天水太守曹爽輔政引為司馬屢有讜言爽弗能納宣王起兵芝率衆斬闗馳出赴爽勸爽保許昌爽不能用遂委身受戮芝坐爽下獄當死而口不訟直志不苟免宣王嘉之赦而不誅起為并州刺史後封陰平侯隋蘇孝慈扶風人高祖受禪累拜兵部尚書兼太子右衛率陜西置常平倉轉輸京下決渭水為渠以屬河令孝慈督其役渠成上善之轉工部尚書先是以百僚供費不已臺省府寺咸置􅅟錢將息取給孝慈以為官民爭利表請公卿以下給職田各有差上嘉納焉出為淅州刺史遷洪州總管俱有惠政後桂林山越相聚為亂詔孝慈為行軍總管擊平之卒於官唐劉感鳯泉人武德初以驛騎將軍戍涇州為薛仁杲所圍糧盡殺所乘馬啖士而煮骨自飲至和木屑以食城垂䧟長平王叔良救之感與叔良出戰為賊所執還圍涇州令感約城中降感紿諾至城下大呼曰賊大飢亡在朝暮秦王數十萬衆且至仁杲怒執感埋其半土中馳射之至死詈益甚賊平贈平原郡公諡忠壯李高遷岐州人客太原高祖引致左右執高君雅等有功以右三統軍從下霍邑圍長安力戰遷左武衛大將軍江夏郡公邱行恭郿人有勇善騎射大業末聚兵萬人保郿城人多依之羣盜不敢窺境後率衆謁秦王於渭北拜光禄大夫累從戰伐功多擢左衛將軍貞觀中從侯君集平高昌進右武衛將軍卒贈荆州刺史諡口襄王珪郿人從王通受詩性沉澹交不苟合初事建成太宗召為諫議大夫珪推誠納善每存規益遷侍中與房喬李靖温彦博戴胄魏徵同輔政珪自奉薄周恤宗族奉寡嫂家事必咨而後行教撫孤姪雖其子不過也卒贈吏部尚書諡曰懿李淳風雍人父播仕隋高唐尉棄官為道士以論譔自見淳風通羣書明步天厯算貞觀初直太史局制渾天儀詆摭前世得失著法象書七篇上之累遷太史令以勞封昌樂縣男淳風於占侯吉凶若節契然所撰典章文物志乙巳占等書傳於世王燾珪孫為徐州司馬母有疾彌年不解帶視湯劑數從高醫遊遂窮其術因以所學作書號外臺祕要世寶馬厯給事中鄴郡太守治聞於時馬璘扶風人從安西節度府以奇勞屢遷金吾衛將軍至德初從李光弼攻洛陽史朝義衆十萬陳北邙山璘率部士五百薄賊屯賊遂潰光弼日吾用兵三十年未見以少擊衆雄絶如馬將軍者永泰初拜四鎮北庭行營邠寕節度使尋徙涇原大厯八年吐蕃内寇璘設伏擊破之進檢討尚書左僕射扶風郡王卒於軍贈司徒諡曰武段秀實汧陽人六歳母疾病不勺飲至七日病間乃肯食時號孝童及長沉厚能斷慨然有濟世意天寶中授安西府副將李嗣業引為折衝都尉肅宗在靈武詔嗣業以兵五千赴行在嗣業欲逗留觀變秀實責以大義遂東師白孝德為節度使吐蕃襲京師代宗幸陜勸孝德即日鼓行入援拜四鎮北庭行軍涇原鄭潁節度使數年吐蕃不敢犯塞楊炎嫉之召為司農卿未泚反以秀實失兵必恨憤使騎往迎之秀實與子弟訣而入謂泚曰今變起倉卒掃清宫宣迎乗輿公之職也泚黙然秀實知不可乃陰結將軍劉海賓都虞侯何明禮圖泚會源休教泚偽迎天子遣人領鋭師疾馳奉天秀實乃倒用司農印遣其兵與海賓等約搏殺泚翌日泚召計事秀實戎服與源休並坐語至僭位勃然起執休腕奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反耶擊之中其顙流血衊面匍匐走賊衆未敢動而海賓等無至者遂遇害詔贈太尉諡忠烈楊炎天興人曾祖大寶武德初為龍門令劉武周攻之死於守贈全節侯祖哲以孝行稱父播登進士隱居不任徵為諫議大夫棄官就養肅宗賜號元靖先生炎文藻雄蔚父喪廬墓號墓不廢聲詔表其閭三世以孝聞門樹六闕古所未有累遷中書舍人與常衮同時知制誥開元後言制誥者稱常楊德宗即位拜門下侍郎同中書門下平章事時天下租賦悉進大盈内庫炎請出之以歸有司自開元天寶以來租庸調法大弊天下殘瘁炎請為兩税法法行天下利之馬總系出扶風元和中為刑部侍郎兼御史大夫副裴度宣慰淮西呉元濟擒為彰義節度留後擢拜節度使徒天平軍總篤學雖吏事倥偬書不去前論著頗多段珂秀實孫僖宗時居潁州黄巢圍潁刺史欲以城降珂募少年拒戰衆裹糧請從賊遂潰拜州司馬宋閻詢天興人少時以學問著聞擢進士第累遷鹽鐵判官使遼詢頗諳北方􅆠理迓者王惠導詢由松亭往詢曰胡不經葱嶺而迓枉若是豈非夸大國地廣以相欺耶惠慚不能對官至右諫議大夫知同州張載郿人少喜談兵年二十一以書謁范仲淹一見知其逺器因勸讀中庸載猶以為未足又訪諸釋老反而求之六經嘗坐虎比講易京師二程王與論易次日撤坐輟講於是盡棄異學嘉祐二年舉進士為雲巖令熙寕初吕公着言其有古學神宗召見問治道以為崇正院校書尋移疾屏居南山下終日危坐一室左右簡編俯而讀仰而思有得則識之與諸生講學每告以變化氣質之道其家婚喪葬祭率用先王之意而傳以今禮又論定井田宅里發斂學校之法吕大防薦之詔知太常禮院復以疾歸卒載學古力行為關中士人宗師世稱横渠先生著書號正蒙又作西銘學者至今尊其書嘉定中諡明公封郿伯從祀孔子廟庭張戩載弟第進士知金堂縣誠心愛人民化其德熙寕初為監察御史裏行累章論王安石亂法乞罷條例司及追還常平使者又劾曾公亮陳升之韓絳李定吕惠卿書數十上又詣中書爭之出知公安縣徙監司竹監卒於官金劉興哥虢縣人起於羣盜人呼曰熱劉元兵破西夏長驅而入關輔千里皆震興哥為元帥烏延都將率兵往來邠隴間屢戰屢勝故元軍猝不能東下後於清化戰死元兵至酹酒以弔西州耆老語之皆泣下烏延舊作沃衍今改元王檝虢縣人仕金授副都閭王卺郿人永樂中由卿薦厯山東左布政使有惠政正統中入爲工部左侍郎進尚書在職八年凡大營建暨百工此令巹贊畫爲多性篤實廉慎狷介不阿以王振用事未衰而引年去士論高之霍瑄鳯翔人景泰間由鄉舉授大同通判就擢知府額森擁上皇至城下瑄出謁奉命括金帛充犒都督郭登戒嚴弗應瑄號泣從水竇匍匐出叩馬嗚咽衆露刃叱之不爲動因獻上皇服物上皇密諭與發堅守瑄哭而還英宗復辟召拜工部侍郎額森舊作也先今改張傑鳯翔人生有異質穎悟過人正統中舉於鄉以親老就趙城訓導薛瑄過之與論學嘆曰此聖人徒也居喪悉遵古禮免喪不復出弟子從逰日衆拓家塾以五經敎之諸學者稱五經先生張撫寶雞人成化中進士孝宗時歴副都御史督儲南京尋進刑部侍郎撫質厚少縁飾所在以嚴明稱布衣蔬食所得月俸常􅀉之公帑一宅蕭然每詣闕奏事孝宗多從之李俊岐山人成化中進士累遷都給事中二十一年正月朔有星西流化白氣詔求直言後率六科上疏言左通政李孜省太常少卿鄧常恩誕妄此招天變之尤者國師繼曉假術濟私中外切齒帝優詔答之降孜省上林丞常恩本寺丞繼曉革國師為民制下舉朝大悦官至山西參政虎臣麟遊人成化中以諸生貢入太學上言士大夫過先聖廟宜下輿馬從之省親歸會陜大饑巡撫鄭時將請賑臣齎奏陳饑歉狀詞激切大􅀗賑貸孝宗踐䟭將建棕棚於萬歳山備登眺臣抗疏切諫帝遣中使慰諭曰若言是棕棚巳毀矣尋授雲南􅑇嘉知縣張繼孟扶風人萬厯進士天唘中㩴南京御史以不建魏忠賢生祠削籍崇禎初起故官劾吏部尚書王水光永光嫉之出為廣西知府土司普名聲久亂未靖繼孟設計酖之一方遂安遷浙江鹽運使忤視鹽内官崔璘降知保寧府厯川西道副使張獻忠陷城不屈被殺妻賈氏亦死之本朝乾隆四十一年賜諡節愍劉之勃鳯翔人崇禎中進士擢御史上節財六議疏陳東厰三弊帝俱納之岀按四川張獻忠陷成都欲用之不屈叢射而死本朝乾隆四十一年賜諡烈愍楊畏知寶雞人崇禎中舉鄉試第一厯雲南副使討平土酋屢立戰功後為孫可望所害本朝乾隆四十一年賜諡忠烈王者賓鳯翔人天啟中舉於鄉為醴泉教諭遷興濟令致仕歸流寇陷鳯翔被執大罵不屈賊以刀刺其口噴血罵如故遂被害本朝王豫嘉扶風人順治中進士官翰林院侍讀聞父病劇亟請假歸日夜侍奉衣不解帶父殁哀毁骨立服闋赴京迎母張於京邸張思鄉旋復告歸母毁居喪盡禮豫嘉為人有操行博綜典籍所著詩古文詞甚多安尼恭郿縣人為諸生順治二年流寇賀琛破城恭􅀍執不屈罵賊而死白旗郿縣人官蘭州訓導順治五年米回寇蘭州城陷罵賊死贈國子監學錄蹇逢吉岐山人官撫標守備父為賊所掠逢吉竭産求贖不得乃紿賊曰父有藏金吾不知其處質吾而釋父金可得也賊釋其父久之金不至遂殺逢吉於青峯山下盧熙鳯翔人康熙中進士改翰林院檢討典試雲南事竣歸卒於旋舍熙自幼好學六經皆手鈔終年誦讀不輟或曰科第自有定分何太自辛苦熙曰學以明善復性豈為温飽計耶李柏郿縣人幼孤事母孝為諸生避兵入太白山屏居讀書數十年其學貫穿百家與朝邑李楷富平李因篤稱關中三李王大利鳯翔人事親孝母殁以家産讓兄躬自廬墓鄉黨稱之吕夢熊麟遊人母失眀每晨起盥洗為母餂目居常不離左右飲食必手供母壽八十八歳程希舜鳯翔人幼孤事母劉甚謹賀賊亂􅀒母攜孫而走道逢賊泣請曰可殺我與我孫勿傷我母賊並釋之母年百餘希舜亦年七十餘矣董成梅寶雞人性孝友值歳歉捐穀賑饑全活甚衆雍正九年旌侯秉璧岐山人母病侍湯藥嘗而後進母殁家貧為人傭工始得錢以殮年七十餘每為人言尚思摹飲泣乾隆二十二年旌同邑雒兼善李爭豔雒珂郿縣張福遣俱乾隆年間以孝行旌線殿元鳯翔人父病目以舌䑛之復明父復得瘋疾禱􅁆十晝夜膝腫流血疾尋愈父喪廬墓三年嘉慶十六年旌同縣胡成德李蓁俱嘉慶年間以孝行旌龎超岐山人父病疽醫云若吮之毒可􅂥超即吮之病果愈父年老不能步途超爲製人車隨父所欲徃輓之行嘉慶十六年於同縣雒宏恩蘇成文俱嘉慶年間以孝行旌列女唐王珪母李氏郿人始珪隱居與房喬杜如晦善母嘗曰兒必貴然未知所與遊者何如人試與偕來會喬等過其家孝闚大驚敕其酒食喜曰二客公輔才汝貴不疑明張文玘女扶風人長曰存兒仲曰桂兒惡少杜景華瞰其父往田潛入室侵其長者脇以刃不從殺之繼侵仲仲不從亦殺之并刺其季女以减口李復甦白其事捕景華置之法萬厯中御史徐彦登聞於朝爲建坊立祠李若梓女岐山人字小圓許字王邦安邦安自縊死女聞即至其家一慟而絶敉之稍甦入廚作粥奉舅姑曰聊盡婦禮將從夫地下矣是夜端坐喪次大雷震電屋瓦皆裂姑起視之則女巳逝萬厯三十三年旌焦文友妻周氏鳯翔人撫遺腹子苦節自守洪武中旌同縣杜文妻田氏劉啟業妻呉氏均年十六苦節撫孤郭文妻朱氏彭彦妻王氏均苦節復撫遺腹孫成立張􅀖祚妻宋氏岐山人與范宏載妻柳氏王得威妻羅氏均年二十夫亡苦節張自省妻侯氏撫遺腹子辛勤鞠育見其成立張附鳳妻彭氏寶雞人夫亡撫遺腹子苦節同縣楊邁妻高氏年十八夫亡以紡績供養舅姑凡三十年又强吉妻高氏張綸妻趙氏高竤妻王氏高龍妻王氏李承芳妻林氏陳大䇿妻譚氏高選妻張氏均以苦節著胡宗顔妻董氏扶風人年二十夫亡甘貧守孤嘉靖中旌同縣趙一琴妻孫氏夫亡伯氏欲奪其志令婢妾逼之奪其産且謀隕其孤氏避之他所辛苦訓誨克底成立後伯夫婦俱殁氏為營喪葬撫其孤如己出人以為難王麟妻劉氏郿縣人歸王逾年而麟殁苦節敎子成立同縣蘇宇妻胡氏大亡苦節孝事舅姑石可貞妻董氏麟遊人夫死有子方二歳閲二歳殤氏於夫木主前自縊死與同縣甄柟妻張氏何謚妻吕氏夫亡苦節並萬歴年間旌趙􅀖彦妻魏氏􅊈陽人夫亡遺孤甚幼矢志守節七十年孫徵為諸生妻時氏年十八守節勵志撫孤見其成立人稱一門雙節尹希顓妻楊氏隴州人年十九守節六十一年同縣姚度妻俱氏甘貧奉姑守節六十五年又史文載妻楊氏夫亡殉節萬歴中旌閻可讓妻王氏年二十二夫亡嘔血死劉文正妻譚氏鳯翔人奈禎中流賊犯鳯翔譚氏被掠大罵不從為賊所殺同時有李生妻張氏亦罵賊求死賊以刃刺其腹比死罵不絶口又高守業妻劉氏紿賊投井賊以石擊之死井中袁逢辰妻陳氏寶雞人遭寇亂攜子六歳遇賊大罵不屈賊怒曰汝不惜幼子乎從則俱活陳罵益力並遇害陳漣妻李氏扶風人崇禎八年流賊破城李罵賊而死有白大守其尸七日家人至掩之犬始去又邱凌雲妻薛氏孀居二十年投崖死馮可時妻周氏田幾妻張氏俱不從賊見殺又馬汝龍女名潤姐為賊所逼女怒以梃擊賊被磔死張繼孟女名王莪賊逼不從見殺師以風妻王氏郿人流賊殺其姑楊氏氏挺身撲救斃刃下又張文竒妻楊氏奉姑逃匿中途被執紿賊釋姑去伺間投崖賊往援之氏據地大罵賊遂殺之馬翰如妻閻氏隴州人賊陷州域氏赴水賊曳出自扶其目復投水死後三日得其尸衣裳韈履紉結如織本朝王者賓繼妻孟氏鳯翔人賓為興濟令後值