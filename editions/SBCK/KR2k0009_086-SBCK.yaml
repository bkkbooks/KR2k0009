body:
  text: 都始皇時為内史地漢初屬雍國後為右扶風地後漢因之三輔黄圖扶風在夕陰街北光武後出治槐里獻帝起居注中平六年省扶風都尉置漢安郡鎮雍隃麋杜陽陳倉􅊈五縣三國魏為扶風郡地晉為秦國地後魏太延二年於雍縣置平秦郡時扶風郡治好畤領美陽等縣皆非今府地太和十一年兼置岐州西魏改郡曰岐山隋開皇三年郡廢大業三年州廢改置扶風郡唐武德元年復曰岐州天寶元年復曰扶風郡至德元載改曰鳳翔郡二載升為西京鳳翔府上元二年罷京􅀠關内道五代因之宋曰鳳翔府屬秦鳳路宋史地理志鳯翔府次府扶風郡鳯翔軍節度金亦曰鳳翔府為鳳翔路治皇統二年升為府軍名天興大定十九年更名鳳翔軍二十七年升總管府元初立鳳翔路總管府至元九年更為散府屬陜西行省明曰鳳翔府屬陜西布政使司本朝因之屬陜西省領州一縣七鳳翔縣附郭東西距七十五里􅀯北距九十里東至岐山縣界四十里西至􅊈陽縣界三十五里南至寳雞縣界四十里北至麟遊縣界五十里東南至岐山縣界六十三里西南至寶雞縣界五十里東北至麟遊縣界九十里西北至􅊈陽縣界六十五里春秋時雍邑爲秦都後置雍縣屬内史漢屬右扶風後漢及晉因之後魏爲平秦郡及岐州治隋爲扶風郡治唐爲鳳翔府治至德二載改曰鳯翔縣又析置天興縣寶應元年省鳳翔縣入天興宋因之金大定十九年改天興縣曰鳯翔及元明均爲鳯翔府治本朝因之岐山縣在府東五十里東西距四十五里南北距八十里東至扶風縣界三十五里西至鳯翔縣界十里南至郿縣界三十里北至麟遊縣界五十里東南至郿縣界四十里西南至寶雞縣界四十里東北至扶風縣界六十里西北至鳳翔縣界七十里秦漢雍縣地後魏太平真君六年置周城縣屬平秦郡後周廢天和四年改置三龍縣隋開皇十六年改曰岐山縣屬扶風郡唐屬鳳翔府宋金元明仍屬鳳翔府本朝因之寶雞縣在府西南九十里東西距一百八十里南北距一百七十里東至岐山縣界九十里西至甘肅秦州清水縣界九十里南至漢中府鳯縣界一百三十里北至􅊈陽縣界四十里東南至岐山縣界一百里西南至鳯縣界九十里東北至鳳翔縣界五十里西北至隴州界四十五里秦置陳倉縣屬内史漢屬右扶風後漢及晉因之東晉末廢改置苑川縣後魏因之西魏復曰陳倉後周兼置顯州㝷州縣俱廢隋開皇十八年復置陳倉縣仍屬扶風郡唐屬鳳翔府至徳二載改縣曰鳯翔尋又改曰寶雞五代宋金元明俱屬鳯翔府本朝因之扶風縣在府東一百十里東西距六十五里南北距一百里東至乾州武功縣界四十里西至岐山縣界二十五里南至郿縣界三十里北至麟遊縣界七十里東南至武功縣界四十里西南至郿縣界二十里東北至乾州界四十里西北至岐山縣界二十里秦漢美陽縣地唐初為岐山縣地武德三年分置湋川縣四年屬稷州貞觀八年改曰扶風縣屬岐州至徳中屬鳳翔府宋因之金初改曰扶興㝷復故元明俱屬鳳翔府本朝因之郿縣在府東􅀯一百五十里東西距九十里南北距六十里東至西安府盩厔縣界六十里西至岐山縣界三十里南至漢中府洋縣界五十里北至扶風縣界十里東南至盩厔縣界六十里西南至岐山縣界六十里東北至扶風縣界二十五里西北至岐山縣界十五里周郿邑秦置郿縣屬内史漢屬右扶風為右輔都尉治後漢及晉因之後魏廢太平真君六年改置平陽縣屬武都郡西魏改縣曰郿城後周改置周城縣天和元年於縣置雲州建德三年州廢隋開皇十八年改縣曰渭濱大業二年又改曰郿縣屬扶風郡義寕二年於縣置郿城郡唐武徳初改曰郇州三年州廢縣屬稷州七年屬􅄮州至德中屬鳳翔府宋因之金貞祐四年分屬恒州元初升為郿州至元􅀄復為縣屬奉元路明還屬鳳翔府本朝因之麟遊縣在府東北一百二十里東西距一百七十里南北距八十五里東至乾州界七十里西至􅊈陽縣界一百里南至扶風縣界四十里北至乾州永夀縣界四十五里東􅀯至乾州界七十里西􅀯至峽山縣界四十里東北至永夀縣界四十五里西北至甘肅平涼府靈臺縣界一百十里秦杜陽邑漢置杜陽縣屬右扶風後漢初廢永和二年復置仍屬右扶風晉廢隋大業初改置普潤縣屬扶風郡義寕元年増置麟遊縣兼置鳳棲郡二年改郡曰麟遊兼領普潤縣唐武徳元年改郡曰麟州貞觀元年州廢二縣俱屬岐州至徳中俱屬鳳翔府宋金因之元廢普潤縣人麟遊仍屬鳯翔府明亦屬鳳翔府本朝因之􅊈陽縣在府西少北七十里東西距八十里南北距九十里東至鳳翔縣界三十五里西至隴州界四十五里南至寳雞縣界二十里北至甘肅平涼府靈臺縣界七十里東南至寶雞縣界二十五里西南至隴州界五十里東北至鳳翔縣界五十里西北至隴州界三十五里漢置隃麋縣屬右扶風後漢為隃麋侯國晉省入􅊈縣後周置􅊈陽縣兼置􅊈陽郡㝷廢郡隋屬扶風郡唐屬隴州宋因之金移隴州來治元仍屬隴州明嘉靖中改屬鳳翔府本朝因之隴州在府西少北一百五十里東西距一百六十五里南北距二百里東至􅊈陽縣界四十五里西至甘肅秦州清水縣界一百二十里南至寳雞縣界一百四十里北至甘肅平涼府崇信縣界六十里東南至寶雞縣界一百二十里西南至秦州界二百二十里東北至平涼府靈臺縣界六十里西北至平涼府華亭縣界七十里秦􅊈邑屬内史漢置􅊈縣屬右扶風後漢及晉因之後魏置隴東郡正光三年兼置東秦州孝昌三年陷廢永熙元年復置東秦州及􅊈陰縣西魏廢帝三年改州曰隴州縣曰杜陽後周復曰􅊈陰天和五年州廢大象二年復置隋開皇三年郡廢五年改縣曰􅊈源大業三年州廢劚扶風郡義寕二年復置隴東郡唐武徳元年復曰隴州天寶元年改為􅊈陽郡乾元元年復曰隴州屬關內道宋仍曰隴州屬秦鳳路金移州治􅊈陽元初復移治􅊈源屬鞏昌路延祐四年省􅊈源縣入州明屬鳳翔府本朝因之形勢地形險阻原田肥美二南詩譜右袤涇原地平少巖阻唐書王承元傳南望斜谷口三山如犬牙西觀五丈原鬱曲如長蛇宋蘇軾詩四山之中五水之會隴關阻其西益門扼其南府志風俗民厚重質直無驕惰浮靡之習詩傳修習戰備高尚氣力以射獵為先寰宇記勤稼穡務本業俗習忠厚士皆儒雅府志城池鳳翔府城周十二里有奇門四池廣三丈唐末建明景泰正徳萬厯間屢修本朝乾隆十七年重修鳳翔縣附郭岐山縣城周五里有奇門二池廣三丈元至元年間因唐舊址築明景泰嘉靖萬厯間屢修本朝順治十四年乾隆十八年四十四年屢修寶雞縣城周二里七分門三池廣一丈七尺唐至德中建明景泰初拓修本朝乾隆二十八年重修扶風縣城周四里門七西北依山東南因湋水為池明景泰元年土築崇禎十一年甃甎本朝順治十七年康熙五十三年乾隆十七年嘉慶二十年屢修郿縣城周三里門三城外有池元至大元年土築明萬厯初甃甎本朝順治中修乾隆二十七年重修麟遊縣城周三里門三明景泰元年因舊址建天順中增築外城因山為險周九里有奇本朝順治中修乾隆三十一年重修􅊈陽縣城周三里有奇門四池廣一丈五尺明嘉靖中建本朝雍正七年修隴州城周五里有奇門四池廣一丈五尺明景泰初因舊址改建本朝順治十七年修乾隆二十年重修學校鳳翔府學在府治東南舊在治東一里許宋慶厯中建元末徙今所明洪武四年修入學額數二十名鳳翔縣學在縣治東􅀯府學之西明洪武中建本朝順治十年修入學額數十五名岐山縣學在縣治東唐武徳中建元至元中重建明時屢修本朝順治十四年修康熙二十四年乾隆四十四年重修入學額數十二名寶雞縣學在縣治西元泰定中建明洪武中修入學額數十五名扶風縣學在縣治東唐大厯二年建宋元明時屢修本朝順治三年修嘉慶十二年重修入學額數十二名郿縣學在縣治西元至正初建明宏治八年徙治東嘉靖十四年仍復舊所本朝康熙十年修雍正十一年重修入學額數十二名麟遊縣學在縣治東明洪武初建本朝康熙四十二年修入學額數八名􅊈陽縣學在縣治東舊在故縣内明嘉靖中徙建今所本朝乾隆四十五年修入學額數十二名隴州學在州治西南二里許舊在故城内明宣德中徙建今所本朝順治十一年修入學額數十二名岐陽書院在府治東又名崇正書院本寶昌寺故址明正德中建書院祀周公召公太公以宋儒張載配東西廡祀名宦鄉賢鳳翔書院在鳯翔縣治南乾隆四年建鳳起書院在鳳翔縣乾隆三十二年建鳳鳴書院在岐山縣乾隆四十四年建雞峰書院在寶雞縣乾隆八年建石鼓書院在寶雞二縣十東乾七年隆建多賢書院在扶風明宏治縣中南一建里飛本朝鳳乾山隆二街年移建四十七小年西修橫渠書院在儒郿縣東五張子故居十里本元泰定宋中改建隆三十本年朝乾重建岍山書院在隴里明州宏西治北間五建户口原民額人户共丁二十男婦一六百萬二三十千四七百萬八三十千四五百今二滋十生八名口田賦民三地三釐額萬九徵地千丁六百銀一二十十九四頃萬三七十千九一畝八百九十分四兩九地三錢八千五分百六八釐糧十四一百一頃四十十畝石七三分合六六釐勺額徴屯地丁六銀三十二千二石三百六斗五兩一升三錢七分糧合五勺一萬六更名地千七三百百一十七十六頃九兩七十六錢九畝七分一釐分六釐糧一額徴千九地百丁七銀一十二百五石九斗二升八合五勺山川雍山在鳳翔縣西北水經注雍水岀雍山明統志在府城西北三十里靈山在鳯翔縣西北三十五里雞冠山在鳳翔縣北三十里紫荆山在鳯翔縣東北十五里杜陽山在鳳翔縣東北水經注故雍縣有杜陽山山北有杜陽谷有地穴北入不知所極在天柱山南九域志天興縣有杜陽山明統志山在府東北二十五里其麓有老君坡杜水所出石樓山在岐山縣南西接寶雞縣界形如樓閣上有龍湫禱􅀨輒應青峰山在岐山縣南橋山在岐山縣西􅀯與寳雞縣接界岐山在岐山縣東北禹貢導岍及岐詩周頌彼伹矣岐有夷之行國語内史過曰周之興也鸑鷟鳴於岐山史記封禪書自華以西名山曰岐山漢書地理志美陽縣禹貢岐山在西北水經注小橫水厯周原下水北即岐山顔師古曰其山兩岐俗呼箭括嶺括地志岐山亦名天柱山在岐山縣東北十里寰宇記岐山即天柱山周鸑鷟鳴於山上時人亦謂此山為鳯凰堆或云其峰高峻逈出諸山狀若天柱因以為名胡三省曰在鳳翔東四十里縣志天柱山在縣北十里一名鳳凰山一峰如柱又云岐山在縣東北五十里蓋即指箭括山也崛山在岐山縣東北四十里山多石穴唐建耆闍寺亦名耆闍山皆岐山延亙而異名也箭括山在岐山縣東北六十里南去麟遊縣五十里亦即岐山其最高處為箭括嶺嶺巔有缺故名明統志以為即太王所踰之梁山誤又有三龍山在縣東北後周以此名縣五將山在岐山縣東北與麟遊縣接界晉太元十年慕容沖攻逼長安符堅以讖書有云帝出五將久長得遂奔五將山為姚萇將吳忠所執水經注扶風杜陽縣有五將山元和志山在岐山縣西北六十里舊志在縣東北五十里又在麟遊縣西南五十里石鼓山在寶雞縣東南元和志石鼓文在天興縣南二十里許石形如鼓其數有十蓋紀周宣王畋獵之事其文即史籀之跡也明統志石鼓山在縣東南二十里山麓舊有石如鼓者十今在國子監按諸志皆以山因石鼔而名然劉昭郡國志註引三秦記云陳倉縣有石鼓山將有兵此山則鳴似又不因石鼓得