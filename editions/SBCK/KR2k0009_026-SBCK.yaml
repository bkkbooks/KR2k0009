body:
  text: 蘇州府江蘇省治在江寕府東南四百五十里東西距二百二十里南北距二百五十里東至太倉州界一百二十里西至常州府宜興縣界一百里南至浙江嘉興府嘉興縣界一百里北至大江通州界一百五十里東南至松江府青浦縣界一百二十五里西南至浙江湖州府長興縣界一百三十里東北至通州界一百五十五里西北至常州府江隂縣界二百六十里自府治至京師二千七百二十里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋呉國都呉滅屬越戰國屬楚秦始皇三十六年置會稽郡治呉按本紀定楚江南地降越君置㑹稽郡項羽傳二世元年殺會稽假守殷通起兵呉中是郡治呉也漢髙帝六年改置荆國十三年又改呉國見地理志景帝四年復為㑹稽郡後漢永建四年分置呉郡水經注時陽羨令周喜上書以縣遠赴㑹至難求得分置遂分浙江以西為呉郡浙江以東為會稽郡三國屬呉晉宋齊因之梁初分置信義郡太清三年簡文帝又以呉郡為呉州大寶元年復為郡陳禎明元年置呉州隋開皇九年郡廢改州曰蘇州並省信義郡大業初復曰呉州㝷復為呉郡唐武德四年復曰蘇州七年置都督府屬江南東道天寶元年復曰呉郡乾元初復為蘇州五代屬呉越梁開平三年表置為中呉郡宋初曰蘇州呉郡太平興國三年改平江軍節度政和三年升平江府屬兩浙路紹興初改屬浙西路元至元十三年改平江路屬江浙行省明初改蘇州府直隸南京本朝初屬江南省康熙六年分江蘇省府為江蘇巡撫及布政按察兩司治乾隆二十五年改蘇州布政司為蘇州等處布政司與江寕府並為省會領縣九呉縣附郭在府治西南偏東西距一百一里南北距三十七里東至元和縣界一里西至常州府宜興縣界一百里南至震澤縣界三十五里北至長洲縣界二里東南至呉江縣界十五里西南至浙江湖州府長興縣界一百三十里東北至長洲縣界二里西北至長洲縣界十一里周初太伯邑春秋呉國都秦置呉縣為會稽郡治漢因之後漢永建四年於縣置呉郡三國屬呉晉及宋齊以後因之陳為呉州治隋開皇初為蘇州治大業初復為呉郡治唐仍為蘇州治五代因之宋政和後為平江府治元為平江路治明為蘇州府治本朝因之長洲縣附郭府治東北偏東西距四十一里南北距五十二里東至元和縣界一里西至常州府金匱縣界四十里南至呉縣界二里北至常熟縣界五十里東南至元和縣界一里西南至呉縣界二里東北至崑山縣界四十五里西北至常州府金匱縣界五十里漢呉縣地唐萬􅀊通天元年析置長洲縣與呉縣分治州郭下乾元二年置長洲軍太厯五年廢縣如故五代因之宋為平江府治元為平江路治明為蘇州府冶本朝因之元和縣附郭府治東南偏東西距四十六里南北距三十七里東至新陽縣界四十五里西至長洲縣界一里南至呉江縣界三十五里北至長洲縣界二里東南至松江府青浦縣界一百二十里西南至呉縣界四里東北至長洲縣界六十里西北至長洲縣界十里本長洲縣地本朝雍正二年析置元和縣與呉縣長洲縣分治郭下崑山縣在府東少北七十里東西距五十六里南北距八十一里東至太倉州界三十三里西至元和縣界二十三里南至松江府青浦縣界八十里北至新陽縣界一里東南至太倉州嘉定縣界五十里西南至元和縣界四十里東北至新陽縣界二里西北至新陽縣界一里秦置婁縣屬㑹稽郡後漢永建四年屬呉郡晉及宋齊因之梁天監六年改置信義縣大同初又分信義置崑山縣隋平陳二縣俱廢開皇十八年復置崑山縣屬呉郡唐屬蘇州五代因之宋屬平江府元元貞元年升州屬平江路明洪武二年仍降爲縣屬蘇州府本朝因之新陽縣在府東少北七十二里東西距五十四里南北距四十一里東至太倉州界三十三里西至元和縣界二十一里南至崑山縣界一里北至昭文縣界四十里東南至崑山縣界二十四里西南至元和縣界三十六里東北至太倉州界三十里西北至昭文縣界七十里本崑山縣地本朝雍正二年析置新陽縣常熟縣在府北九十里東西距四十一里南北距八十五里東至昭文縣界一里西至常州府江隂縣界四十里南至長洲縣界四十五里北至大江中流通州界四十里東南至新陽縣界四十五里西南至常州府金匱縣界五十里東北至昭文縣界四十里西北至江隂縣界七十里漢呉毘陵二縣地晉太康四年分呉縣虞鄉置海虞縣屬呉郡東晉咸康七年又分昆陵置南沙縣屬晉陵郡宋齊因之梁增置信義郡以海虞南沙二縣屬之大同六年又分置常熟縣隋平陳郡廢并所領海虞南沙入常熟又於縣置常州㝷復州治晉陵以縣屬呉郡唐屬蘇州五代因之宋屬平江府元屬平江路元貞元年升常熟州明洪武初仍降為縣屬蘇州府本朝因之昭文縣在府北九十里東西距八十一里南北距八十里東至太倉州界八十里西至常熟縣界一里南至新陽縣界四十里北至常熟縣界四十里東南至太倉州界四十五里西南至常熟縣界一里東北至海口通州界六十五里西北至常熟縣界一里本常熟縣地本朝雍正二年析置昭文縣呉江縣在府南少東四十五里東西距八十一里南北距八十里東至松江府青浦縣界八十里西至震澤縣界一里南至浙江嘉興府秀水縣界七十里北至元和縣界十里東南至嘉興府嘉善縣界六十里西南至震澤縣界七十里東北至元和縣界十六里西北至呉縣界二十里漢呉縣地唐曰松陵鎮五代梁開平三年呉越分置呉江縣屬蘇州宋屬平江府元屬平江路元貞元年升呉江州明洪武初仍降為縣屬蘇州府本朝因之震澤縣在府南少東四十五里東西距一百一里南北距六十里東至呉江縣界一里西至浙江湖州府烏程縣界一百里南至呉江縣界五十里北至呉縣界十里東南至呉江縣界五十里西南至烏程縣界一百二十里東北至呉江縣界一里西北至呉縣界二十里本呉江縣地本朝雍正二年析置震澤縣形勢呉有三江五湖之利江東一都會漢書地理志包括於越跨躡荆蠻既稱沃區亦曰奥壤晉左思呉都賦三江雄闊五湖腴表風土記川澤沃衍有陸海之饒隋書地理志風俗因士􅀋顯名於厯代而人尚文漢書地理志君子尚禮庸庶敦龐風俗澄清道教隆洽隋書地理志所化者遠士夫淵藪方輿勝覽郊無曠土多勤少儉呉郡志誇豪好侈自昔有之宋長文呉郡續圖經城池蘇州府城周四十五里門六水門五環城濬濠廣至數丈唐乾符二年仍舊址重築元至正十一年增築本朝康熙雍正年間屢修呉長洲元和三縣附郭崑山縣城周十二里有竒門六水門五濠廣六丈有竒元至正十七年土築明嘉靖十八年甃甎本朝順治年間修康熙雍正年間屢修乾隆初重修新陽縣城與崑山縣同常熟縣城周九里有竒門六水門五西北跨山東南北三面環以深濠元因舊址展築至正十六年甃甎本朝康熙十九年修昭文縣城與常熟縣同呉江縣城周五里有竒門四水門五濠廣三丈元至正十四年張士誠拓舊城重築本朝順治四年修康熙四年重修震澤縣城與呉江縣同學校蘇州府學在府治南宋景祐元年范仲淹以所得錢氏南園建堂前有古檜相傳為仲淹所植本朝屢加修葺入學額數二十名乾隆二十七年三十年四十五年四十九年高宗純皇帝南巡皆有御製文廟行禮詩呉縣學在縣治西南明宣德七年建入學額數二十五名長洲縣學在縣治東北半里明嘉靖二十年建入學額數十三名元和縣學與長洲縣同入學額數十二名崑山縣學在縣治西宋元祐初建入學額數十名新陽縣學與崑山縣同入學額數十三名常熟縣學在縣治東南宋端平中建入學額數十三名昭文縣學與常熟縣同入學額數十二名呉江縣學在縣治東門外宋紹興中建入學額數十三名震澤縣學與呉江縣同入學額數十二名紫陽書院在府學内尊經閣後本朝康熙五十二年巡撫張伯行建崇祀朱子延設院長為諸生肄業之所聖祖仁皇帝御賜扁額曰學道還淳雍正十一年發帑銀置田乾隆三年更發帑銀增諸生膏火十六年高宗純皇帝南巡有御製詩白鹿遺規扁額二十二年二十七年三十年四十五年四十九年皆有御製紫陽書院詩正誼書院在府學東滄浪亭後本朝嘉慶十年建文正書院在呉縣禪興寺橋西宋咸淳中建祠祀范仲淹元至正六年總管呉秉彝奏改書院本朝康熙十二年修四十四年聖祖仁皇帝南巡有御賜濟時良相扁額鶴山書院在呉縣治西南隅宋理宗賜魏了翁第宅於此並賜鶴山書院四大字元至順間博士柯九思奏復書院虞集撰記本朝康熙二十四年修學道書院在呉縣東北為子游立宋咸淳五年知府趙順孫移建於武狀元坊明嘉靖二年知府胡纉宗以景德廢寺改本朝乾隆八年修平江書院在長洲縣治東北玉峯書院在新陽縣治南本朝乾隆八年建文學書院在常熟縣治西元至順三年建祀子游設山長翰林待制楊剛中記本朝康熙四十六年修虞山書院在常熟縣虞山南麓本朝雍正三年改建乾隆十一年修梅里書院在昭文縣東北本朝乾隆二十九年建松陵書院在呉江縣治南本朝乾隆四年建震澤書院在震澤縣治北本朝乾隆十一年建按舊志載和靖書院在元和縣虎邱西嶺宋尹焞舊有讀書庵嘉定七年建祠端平二年改建書院延祐初徙置長洲縣治明嘉靖十八年仍移此今廢謹附記户口原額人丁四十三萬八千八百三十今滋生男婦大小共五百四十七萬三千三百四十八名口又蘇州衞屯丁二千六百三十二名口田賦田地六萬二千二百二十五頃七十九畞九分有竒額徵地丁正雜銀五十五萬八千八百四兩五錢一釐又雜辦銀二千一百六兩四錢一分九釐米八十七萬八千三百四十八石四斗八升七合二勺豆六百四十石四斗一升九合二勺又蘇州衞屯田三百三十六頃五畞五分有竒額徵丁糧銀三千四百九十七兩一錢二分米四千九百七十石二斗八升六合七勺山川吾家山在府治西南隅本鄧尉山之支峯居民以植梅為業花時一望如雪香風度十餘里前撫臣宋犖題香雪海三字鐫於石西北石梁為虎山橋又有司徒廟在青芝山北古柏四株雄竒蟠鬱蓋千餘年物北有龜山光福塔在焉本朝乾隆十六年二十二年二十七年三十年四十五年四十九年皆有御製香雪海歌御題呉山十六景有鄧尉香雪詩並賜御聯一横山在呉縣西南十道志四面皆横故名呉地記又名踞湖山在縣西南十六里續圗經山鎮國之西南臨湖控越實呉時要地隋遷郡於横山東亦以此山為屏蔽呉郡志踞湖山以其背臨大湖若箕踞之勢故名五代錢氏時於山下造薦福寺今里人或名為薦福山有五大塢曰芳桂飛泉修竹丹霞白雲又名五塢山姑蘇山在呉縣西南史記上姑蘇望五湖寰宇記一名姑胥山在縣西三十五里連横山之北續圗經或曰姑胥或曰姑餘其實一也有姑蘇臺姑蘇志在横山西北至今人稱胥臺山支硎山在呉縣西南呉地記晉支遁道林常隱於此中有寺曰報恩梁武帝置續圖經報恩山一名支硎山在縣西南二十五里昔有報恩寺故名所謂南峯東峯皆其山之别峯也呉郡志有放鶴亭為遁放鶴處又有白馬澗為遁飲馬處府志有碧林泉南池泉或云平石為硎山有平石故支遁以支硎為號姑蘇志在龍池山東北東址有觀音寺故又名觀音山皇帝南巡本朝康熙二十八年聖祖仁御製支硎山詩乾隆十六年高宗純皇帝南巡御製恭依皇祖詩韻遊支硎山詩二十二年二十七年三十年四十五年四十九年疉邀菴放鶴亭詩賜扁額二宸詠及支公御聯一黄山在呉縣西南隋大業九年劉元進等作亂自昆陵退保黄山府志在縣西南二十五里諸峯高下相連俗稱筆格山姑蘇志在茶磨山北四里胥塘之北西山之半有二石洞深可三四丈俗名虎洞楞伽山在呉縣西南姑蘇志一名上方山在呉山東北傍有茶磨嶼以三面臨水故以嶼名俗稱為磨盤山本朝乾隆二十二年二十七年三十年四十五年四十九年御製遊上方山楞伽寺詩並賜扁額三御聯二堯峯山在呉縣西南宋蘇舜欽詩西南登堯峯俗云堯所基即此縣志横山西南為堯峯於諸山中最高岝㟧山在呉縣西南越絶書莋確山禹遊天下引湖中柯山置之鶴阜更名莋􅃀山水經注太湖東呉國西十八里有莋嶺山縣志本在太湖中禹治水移進近東又西南有兩小山皆有石如卷笮俗云禹所用牽山也太湖中有淺地云是笮嶺山蹠自此以東差深言是牽山之溝此山去太湖三十餘里呉地記在縣西十二里呉王僚葬此續圖經在縣西南十五里形如獅子今以名山姑蘇志獅子山北有何山舊名鶴邑墟故名鶴阜山以何求何點葬此改今名本朝乾隆二十七年四十九年御製岝㟧山詩胥山在吳縣西南史記伍胥死吳人憐之為立祠江上命曰胥山張晏注在太湖邊水經注引虞氏曰松江北去吳國五十里江側有丞胥二山山各有廟昔越使二大夫伐吳死之故立廟山上號曰丞胥二王上有壇石長老云胥神所治也下有九折路南出太湖寰宇記在吳縣西四十里吳郡諸山錄云太湖之東兩山對峙南曰胥山北曰香山中一水曰胥口水東流入胥門運河曰胥塘按越絶書闔閭築城城中有小城二徙治胥山則胥山之名闔閭時已有之非因祠祀伍胥而得名也香山寰宇記在吳縣西南五十里吳王遣美人採香於此因名故有採香涇吳郡志香山胥口相連旁有溪名採香涇今自靈巖山望之水直如矢故俗名箭涇本朝乾隆十六年二十二年二十七年三十年四十五年御製靈巖雜詠有採香涇詩五疉沈徳潛韻穹窿山在吳縣西南呉越春秋由鍾穹窿者古赤松子所取赤石脂也去縣二十里府志在縣西南六十里姑蘇志比陽山尤高其頂方廣百畞山半有泉名法雨四時不絶下有石堰可灌田本朝乾隆十六年二十二年四十五年御製呉山十六景有穹窿仙觀詩又穹窿山望湖亭望湖詩並扁額一賜御聯一鄧尉山在吳縣西南七十里一名袁墓山又名萬峯山明統志一名元墓山山峯四立林木葱蒨前一石屹立太湖中若畫屏然上有萬峯寺樓閣翬飛湖光掩映亦湖中佳處其隂名至理山山勢蜿蜒前瞰太湖對峙陽山光福諸山夾拱山雖北向隆冬入山其氣盎然府志漢鄧尉隱此故名山多梅花時如雪香聞數十里本朝康熙二十八年聖祖仁皇帝臨幸萬峯寺御製鄧尉山詩乾隆十六年二十二年二十七年三十年四十五年四十九年高宗純皇帝俱有御製遊鄧尉山詩光福山在吳縣西南後唐乾寕二年楊行密取蘇州錢鏐遣顧全武破行密兵於烏墩光福即此府志在縣西南七十里或云龜山上有光福寺姑蘇志鄧尉山在錦峯西南光福里俗名光福山西南與元墓銅坑諸山聯屬按明統志以元墓為鄧尉而姑蘇志則以鄧尉為光福二說不同蓋二山岡壟東西相屬也本朝乾隆十六年御題呉山十六景有光福山橋詩銅坑山在呉縣西南呉地志縣西十里有洞山周廻六十里有銅坎十餘穴深者二十餘丈淺者六七丈左思呉都賦所謂採山鑄錢者也府志在縣西南七十二里一名銅井山上有巖洞其懸溜琮琤匯而為池清甘不竭名曰銅泉姑蘇志在鄧尉山西南相傳晉宋間鑿坑取沙土煎之皆成銅故名西蹟山在鄧尉山西最高大少景然在湖濱潭西聚塢差勝潭西一隅色如鐵名鐵山伏龍山在呉縣西南明一統志在府城西三十六里俗名小白陽山左抱靈巖右帶穹窿前瞰太湖中俯平疇萬頃喬木古松䕃蔽林谷彈山在呉縣西南一名小雞山呉郡志在震澤西陸龜􅀩採樵處人笠澤叢書光福寺西五里有小雞山土多石少無大樹木縣志在西磧之左其首在湖濵身横亙六七里直接青芝瀕湖處有七十二峯閣所據極勝茶山在西蹟之左彈山之右一名繡裘山縣志狀􅀋土阜而通體皆石南去太湖不百步浮六小峯如翠螺揺曳水面厯厯可數蟠螭山在彈山之南俗呼爲南山斗入湖中作蜿蜒狀以此得名其隂多桃花春時望之如錦步障洞庭東山在呉縣西南太湖中一名胥母山越絶書闔閭旦食於紐山暮遊於胥母史記正義謂之莫釐山姑蘇志莫釐山以在洞庭之東稱東洞庭山周迴八十里視西洞庭差小而岡巒起伏廬聚物産大畧相同縣志相傳隋莫釐將軍居此故名一名胥母則謂子胥嘗迎母於此也其東麓曰武山周十二里本名虎山呉王養虎處後避唐諱改今名本朝乾隆十六年御題呉山十六景有莫釐縹緲詩包山在呉縣西南太湖中所謂西洞庭山也一作苞山左思呉都賦指苞山而爲期集洞庭而淹留注洞庭即太湖也郭璞江賦苞山洞庭巴陵地道注下有洞庭穴道潛行通於巴陵呉地記去縣百三十里下有洞穴潛行水底無所不通號爲地脈即十大洞天之第九林屋洞天也又引洞庭山記曰昔闔閭使靈威丈人㝷洞秉燭晝夜而行繼七十日不窮而返内石几上有素書三卷持囘上於闔閭不識請孔子辨之孔子曰此夏禹之書並神仙之事言大道也大人姓毛名萇號毛公今洞庭有毛公宅石室並壇存焉續圖經震澤有七十二山惟洞庭最巨居民以桑梔甘柚為常產毎秋高霜餘丹苞朱實與長松茂木相差於巖壑間望之若金翠圖繪可愛府志林屋洞一名左神幽虛之天洞有三門同會一穴内以石門為隔穴中有石室銀房金庭玉柱最高者為縹緲峯本朝乾隆十六年御製呉山十六景有苞山竒石詩夫椒山在太湖中即包山左傳哀公元年呉伐越敗之夫椒賈逵注越地杜預注呉越西南太湖中椒山也越語敗五湖則椒山可得史記正義引會稽記云句踐逆呉戰於五湖中大敗而退今夫椒山在太湖中洞庭山西北水經注太湖中有苞山春秋謂之夫椒山史記索隱夫椒二山不得為一又山仕湖中非戰所按夫椒即包山諸家無異論惟賀循始云在洞庭西北寰宇記則云太湖中别有夫椒山又云在武進九域志則止載常州下云呉王敗越於夫椒即此明一統志在無錫縣太湖濵一名湫山自是人皆以夫椒為在常州界内矣夫是役為呉人伐越則宜戰於越地賈逵以夫椒為越地近是而闕其地杜預謂在太湖中索隱己言其非何得更迂折而西北入常州界也諸書指説不同今据范成大盧熊王鏊楊循吉諸志列於包山之後禹期山在呉縣西南洞庭支嶺也呉郡志在太湖中舊説禹導呉江以洩具區會諸侯於此府志謂之禹祈山又名禹跡山在縣西南八十里又有庭山亦在縣西南八十里柱山在縣西南八十五里洞庭記所謂金庭玉柱在此也又西曰横山曰隂山晉隂長生煉丹處黿頭山在呉縣西南亦洞庭支嶺也唐韋應物黿頭山神女歌黿頭之山直上洞庭連青天呉郡志一名黿山在洞庭西山之東麓有石闖出如黿首一山皆青石温􅃳光瑩浙西碑石與壓砌緣池皆取此下曰􅛇裏有良田皮日休詩􅛇裏何幽奇膏腴二十頃風吹稻花香直過黿山頂府志在縣西南百里禹期山東南三里以形得名山產青石有天然玲瓏者謂之花石宋徽宗時採貢故有花石綱又一種色白而温潤堪為玩具號為玉石又胎斑者光澤可愛可充硯石不在端歙之次又石公山在縣西南一百二十里可盤灣南二里山根有石形如老翁獨立水中甚靈異紅鶴山輿地紀勝在呉縣西南八十里府志謂之鴻鶴山在黿山南二里山西有神女祠亦名聖姑山龍頭山在呉縣西南一百里府志一名龍山又名祈山臨水有石如龍三山在呉縣西南水經注太湖中有三山唐皎然詩太湖三山口呉王在時道寰宇記引呉興山墟名云三山在太湖中白波天合三㸃黛色今屬呉縣府志在縣西南一百二十里山有三峯地相連接上有呉妃太姥祠甚靈大雷山在呉縣西南楊泉五湖賦大雷小雷湍波相逐續圖經大雷小雷二山相去十里府志大雷在縣西南一百二十里小雷在縣西南一百三十里慈里山在呉縣西南一百二十里人煙極繁地產佳李獄山有二並在呉縣西南一百三十里呉郡志太湖中有東獄西獄二山吳王於此嘗置男女二獄寒山在府城西本支硎山之支峯明處士趙宦光隱此築小宛堂後為僧舍庭前老梅相傳宦光手植芙蓉泉出其旁西為寒泉亭清淺池千尺雪飛魚峽東南為空谷棕房石壁馳煙驛有篆書刻石宦光舊跡也本朝乾隆十六年二十二年二十七年三十年四十五年四十九年高宗純皇帝南巡屢駐清蹕有御製寒山别墅綠雲樓飛魚峽琳琅叢芙蓉泉對瀑馳煙驛澄懷堂清暉樓寒山千尺雪聽雪閣寒泉亭詩並十二御聯四四十九年賜御扁仁宗睿皇帝隨扈有寒山别墅詩十尺雪詩出閭門重遊寒山千尺雪詩天平山在呉縣西宋蘇舜欽詩呉會括衆山戢戰不可數其間號天平突兀為之主續圖經在縣西二十里巍然特高羣峯拱揖郡之鎮也府志有卓筆峯飛來峯大小石屋皆山中奇跡山頂正平有望湖臺即遠公庵遺址山半有亭乃白雲泉所出姑蘇志在支硎南五里羣石林立名萬笏林其東為雞籠山西為秦臺山南有羊賜嶺西南為赤山洪武初楊基家其下南址為白雲寺宋范仲淹祖墓在焉旁即范氏義莊後闢為園本朝乾隆十六年賜額高義園御製呉山十六景有萬笏朝天詩二十二年二十七年三十年四十五年四十九年皆有御製遊天平山詩題高義園詩高義園藏范仲淹書伯夷頌疉韻詩白雲泉疉白居易韻詩高景山天平支隴也越絶書作高頸山其西麓對華山厓谷盤拱處曰金盆塢宋魏了翁墓在焉金山亦天平之支隴縣志初名茶塢山晉宋間鑿石得金易今名􅀭循吉雜志山故多美石巉巉高聳皆碧綠色或至十餘丈有壁立之勢靈巖山在呉縣西一名硏石山越絶書呉人於硏石山作館娃宫即其處也寰宇記在吳縣西三十里西有石鼔亦名石鼔山續圖經頂有三池日月池硯池浣華池蓋吳時所鑿也下有石室相傳吳王囚范蠡之地山相連屬登其巔俛瞰具區洞庭烟濤浩渺一目千里而碧巖翠塢􅀧綴於滄波之間姑蘇志在天平山南新志昔吳王置離宫於此有琴臺館娃宫西施洞響屧廊吳王井遺蹟其石壁峭拔者為佛日巖平坦處有靈巖寺本朝康熙二十八年聖祖仁皇帝御製靈巖山詩乾隆十六年高宗純皇帝南巡建行宫於此二十二年二十七年三十年四十五年四十九年御製駐蹕靈巖雜詠五疉沈德潛韻詩臨湖榭詠古並賜御扁六御聯九華山在吳縣西一名天池山呉地記在縣西三十里蓊鬱幽䆳晉太康中生千葉石蓮華因名續圖經在縣西六十里於羣山獨秀望之如屏老子謂可以度難蓋巖穴深遠宜就隱也府志山石峭拔聳秀巖壑與虎邱靈巖相埒縣志山半有池在絶巘横浸山脈逾數十丈故又名天池山上有石屋二間四壁皆鑿佛像又有􅀛巢石虎跑泉蒼玉洞桃花洞洗心泉諸勝其南為鹿山西為清流山東南為龍池山十八年聖祖仁皇帝有本朝康熙二御製華山詩乾隆十六年二十二年二十七年三十年四十五年四十九年高宗純皇帝有御製恭依聖祖仁皇帝詩韻詩御題吳山十六景有華山鳥道天池石壁詩並華山翠巖寺詩並賜御扁二聯二玉遮山在吳縣西姑蘇志在陽山之南横立如屏今但呼為遮山舊志謂之查山其南有案山化山苦竹山其北有蜀山東南有貞山東有官山馬山朝山又東為雅宜山本名雅兒唐青州刺史張濟女雅兒葬此又東則五城山又東則真如塢與小白陽山相連錦峯山在呉縣西二十五里姑蘇志在陽山西南產石紫朱色而秀潤故名陽山在長洲縣西北一名秦餘杭山一名萬安山越絶書秦餘杭山越王棲呉夫差山也近太湖姑蘇志在縣西北三十里高八百五十餘丈逶迤二十餘里以其背隂面陽故名大峯十二箭闕最高戰國策云越王以散卒三千禽夫差於千隧今萬安山有隧山即其地也呉地記餘杭山又名四飛山東北有白鶴山以丁令威名有白石如玉甚光潤號曰石脂亦曰白堊白墡續圖經亦名白墡山有澄照寺白蓮院在其下府志在呉縣西北三十里與長洲縣中分為界卑猶山在長洲縣西北一名徐侯山呉越春秋越王葬吳王於秦餘杭山卑猶即此山也呉地記在呉縣西三十里呉太宰嚭所葬府志餘侯山在縣西北三十里姑蘇志徐侯山在陽山西北十里亦名餘杭雞籠山在長洲縣西北吳地記在呉縣西三十里以形似名晉司空陸玩葬此掘地得石鳳飛去今鳳凰墩是也輿地記鳯凰山在縣西北蓋即雞籠也白石山舊名白豸山在長洲縣西北越絶書故為胥女山春申君初封呉更名為白石去縣四十里府志在縣西北三十里姑蘇志在滸墅北與諸山不相連虎邱山一名海湧山在元和縣吳越春秋闔閭冢在閶門外虎邱專諸魚腸之劒在焉千萬人築治之取土臨湖口葬三日而白虎踞其土故曰虎邱南史何求及二弟點􅁢並隱呉郡虎邱山唐避諱曰武邱元和志武邱山在呉縣西北八里闔閭葬於此秦始皇鑿其珍異莫知所在孫權穿之亦無所得其鑿處今成深澗呉地記秦始皇東巡至虎邱求吳王寶劒其虎當墳而踞始皇以劒擊之不及誤中於石遺迹尚存劒無復􅀗乃陷成池古號劒池旁有石可坐千人號千人石其山本晉司徒王珣與弟珉之别墅咸和二年捨宅為東西二寺續圖經諸書皆以為闔閭所葬有金精之異故名虎邱然觀其巖壑之􅀔出於天成疑先有是邱而闔閭因以葬也千人石俗傳因生公講法得名呉郡志泉石竒詭應接不暇其最勝者劔池千人石秦王試劔石㸃頭石憨憨泉皆山中之景府志宋紹興中洛人尹焞避地山中書堂在焉姑蘇志虎邱劔池唐顔真卿書生公講堂李陽冰書今並存其下有真娘墓新志上有雲巖寺及梅花樓小呉軒可中亭平遠樓仰蘇樓千頃雲小竹林諸勝有清遠道士題詩曰白雲蓊欲歸青松忽消半顏真卿愛之刻之石壁本朝康熙四十二年賜扁額一乾隆十六年二十二年二十七年三十年四十五年四十九年高宗純皇帝御製虎邱寺和東坡韻再疉高啟虎邱次清遠道士韻虎邱雜詠詩並賜御書扁額四聯二秦柱山寰宇記在崑山縣東南三十里南帶海上有烽火樓基相傳呉時以望海寇呉錄亦名秦望山昔秦始皇嘗登此望海因名府志今千墩寺佛殿有山高二丈者是按圖經秦柱山在海鹽縣東南三十里其山現在寰宇記所引山水多所舛訛盧熊乃執其說而傅會之謬益甚矣東山在崑山縣東南車塘里宋范良遂讀書築亭其上號曰墨莊山之陽是為隅山以瀕海之隅也又名虞山以昔虞仲治此也北行九里為破山以龍鬭衝破山腹為澗而名又北行九里為頂山又六七里為小山合而名之或曰烏目山也呉郡志一名海巫山琴川志在縣西北一里高一百六十丈周四十六里有奇河陽山在常熟縣西北四十五里一名鳳凰山出藥對峙者為志山一名鷙山靈龜山在常熟縣西北五十里周二十一里西南接常州府無錫縣界西北接常州府江隂縣界俗稱三界山亦曰顧山又曰香山常熟山在常熟縣北琴川志在縣北三十七里本名銅官山唐天寶六載改名北有石家山范山在常熟縣北三十六里梁范冀兄弟同居此因名福山在常熟縣北四十里琴川志本名覆釜山以形似名唐天寶六載改名金鳳山梁乾化二年改今名宋建炎三年韓世忠控守福山以備金人海道之師明初敗張士誠於福山港新志北臨大江與通州之狼山相直龎山在呉江縣東南三里其北即龎山湖陸墓山在震澤縣西北吳地記有梁門下侍郎陸雲公墓因名府志在呉江縣西北二十里接呉縣界横山三面環山一面臨湖賀九嶺在呉縣西一名賀家嶺縣志花山接連有三嶺一􅄺槃一賀九一雞窠過湼槃遂接支硎之南峯呉郡諸山錄度賀家嶺大石如横案上立兩石俗云嶺北有新婦石此其箱篋也拂水巖在常熟縣虞山之南嶺上下臨壑谷水泉下注如練風拂掠之則水倒飛噴濺如雨大江自常州府江隂縣流入昭文縣界又東流入海九域志常熟縣有大江亦名楊子江琴川志揚子大江在縣東迤而北與通州對岸東則白茅浦東北則滸浦正北則福山浦西北則奚浦黄泗浦為五大浦皆通江按府屬常熟縣舊名海虞呉地記為縣東臨滄海自是議者遂謂大海在縣其實非也縣北與通州相對九域志通州止云有大江及江口鎮通州為江則對境可知此一證也水利書于崑山諸港浦則云入海于常熟諸港浦則云入揚子江自後言水利者皆然又一證也江應辰請罷滸浦寨議言其地邊江不當海道去海尚一百六十餘里又一證也海水味鹹江水味淡今縣界雖有潮到而味不鹹又一證也蓋古時縣界闊遠故東北濵海自明中葉分置太倉州之後凡縣界濵海之地已割屬之今自江隂至縣西北黄泗浦奚浦以東地勢雖漸迤而南然自福山北距通州之狼山又東越滸浦白茅又東至太倉州之七鴉口始折而南是為大洋其在常熟縣境者止可謂之江尾而非海也松江自太湖分流逕呉江縣東北流入長洲縣界又東入崑山縣界又東南入太倉州嘉定縣界即古笠澤也亦名南江左傳哀公十七年越伐呉呉子禦之笠澤夾水而陣國語呉王起師軍於江北越軍江南漢書地理志呉縣有南江在南東入海韋昭曰笠澤即松江去呉五十里水經南江東北為長瀆厯河口東則松江出焉酈注松江上承太湖更經笠澤在呉南松江左右即呉越戰處自湖東北