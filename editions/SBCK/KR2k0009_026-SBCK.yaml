院唐景福元年僧淡然建雲巖寺在元和縣虎邱山續圖經雲巖寺在長洲西北九里晉王珣與弟珉之宅咸和二年捨建精廬卽劒池分爲東西二寺皆在山下後乃移寺山上虎邱山志雲巖寺卽虎邱山寺宋至道中知州事魏岸奏改雲巖本朝康熙二十三年聖祖仁皇帝南巡恭建視河南巡萬􅀊樓於兹山之陽四十六年頒賜扁額凡十有五曰虎阜禪寺曰路接天閶曰青雲璄曰天光雲影曰仙璄澄潭曰曠宜樓曰静觀齋曰香界連雲曰雲光臺曰連雲曰澹香樓曰靜遠曰晴巒飛翠曰含輝山館曰水雲深處乾隆二十二年二十七年三十年四十五年四十九年高宗純皇帝南巡皆有御製逰虎邱雲巖寺詩及靜觀齋含輝山館詩四十九年仁宗睿皇帝隨扈有虎邱雲巖寺詩景德寺在崑山縣治通徳坊一名西寺晉王珉捨宅建初名寳馬寺宋景德二年改今額慧聚寺在崑山縣馬鞍山績圖經高僧慧嚮梁武帝之師宴坐馬鞍山二虎為侍感致神人願致工力是夜風雨暴作遅明殿基成事聞武帝命建寺勅張僧繇繪神於兩壁畫龍於四柱每陰晦欲雨畫龍鱗甲欲動僧繇又畫鏁以制之新安寺在崑山縣東二百步梁天監二年置聖像寺在崑山縣東南三十里滬瀆府志晉建興二年有伽葉維衞二石佛泛海來止衆迎像置郡城開元寺里人趙罕捨所居建寺事聞勅賜今額明洪武間重建興福寺在常熟縣破山齊彬州刺史倪徳光捨宅為寺亦名破山禪院唐常建有詩寶巖寺在常熟縣虞山西麓梁大同三年置舊名延福宋天禧中改賜今名呉地記中有浮圖七級極莊嚴呉人相傳自京師来泗州僧伽塔為第一此為第二慧日寺在常熟縣城西北隅梁天監間僧慧嚮開山今為祝釐道場祥符元年賜今額清涼寺在常熟縣西北舊名三峯寺熙三十八年本朝康賜今額勝法寺在昭文縣梅李鎭乾元元年置為離火宅寺宋祥符元年改今額明因寺在昭文縣支塘鎭舊名永昌又名再昌祥符改元始易今額東塔寺在昭文縣南一名方塔宋建炎四年建本朝康熙四十六年御賜扁額無礙寺在呉江縣松江之上名勝志在城常樂坊西亦名西寺梁開平年建永福寺在呉江縣八赤宋紹興二十一年建平境華嚴寺在呉江縣東門外輟耕錄呉江華嚴寺浮圗之巔望之二矢著其上簳羽宛然相傳南宋賈似道出督時祝矢自誓輒中焉大徳中僧善信大修浮圖更其巔而新之視向二矢實銅鐵二條交貫横亙耳姑蘇志梁衞尉􅀸陸僧瓉捨莊基建紹興五年賜今額法喜寺在呉江縣東九里後唐長興元年建始名崇福大中祥符元年賜今額雙林寺在震澤縣倪林里宋咸淳中建殊勝寺在震澤縣平望鎮呉郡志殊勝院丞相蔡京趨驛道由平望因􅀚寺僧書華嚴經僧以寺額為請蔡問書經至何品僧云至殊勝功德品已而得殊勝勅額上眞觀在呉縣穹窿山三茅峯府志相傳漢初平中建祀三茅眞君􅀊久傾頺惟峯頂斷碑依稀見三茅眞君字及宋延祐年號而巳本朝順治七年法師施道淵興建遂成巨構賜今額乾隆二十二年二十七年三十年四十五年四十九年皆有御製穹窿山上眞觀詩福濟觀在府城内紅橋西北一名神仙廟宋淳熙間建元至大間賜今額白鶴觀在府城東北陽鶴舞橋東相傳其地為宋信安郡王藏春園地至元問道人張應元復建有羣鶴自東南來一鶴結巢樹上因名曰白鶴觀元妙觀在府城東北隅創於晉續圖經唐改名開元宫祥符中更名天慶觀呉郡志紹興十六年重建淳熙六年復建三清殿賜書金闕寥陽寶殿六字額通志元元貞元年始改今額殿中有呉道子老君像唐元宗贊及顔魯公書東廡有通神庵為何眞人所居明正統間造彌羅寶閣賜道藏經本朝康熙十二年重修四十四年賜扁額乾隆三十年賜扁額靈佑觀在洞庭西山續圗經唐之神景宫也内有林屋洞唐時投龍於此因建宫天禧五年改賜今名清眞觀在崑山會仙橋東府志卽宋放生池乾道七年建立眞武殿得樟木一段鋸出儼具聖像披髮仗劒遂裝繪供奉淳熙元年賜額致道觀在常熟縣西門内虞山南嶺下績圖經梁天監五年張裕來此山栖遁建招眞觀昭明太子為之撰碑簡文帝改曰乾元姑蘇志宋治平中道士李則正浚井得藏丹化雙鴿飛入尚湖政和七年改致道􅀚瑞雲觀在呉江縣城東三十里所謂笠澤福地也元泰定間建湧泉院在呉縣西南横山下呉郡志舊為程師孟光祿香火院故程賦詩甚多頂山廣福院在常熟縣西十八里梁石使君捨宅建為頂山禪院治平四年改賜今額有十景大慈塔院在虞山拂水巖東通志本朝玉林通琇禪師自京還山世祖章皇帝勅賜帑金建塔院應天禪院在震澤縣蠡澤邨唐乾符二年賜額青松庵在盤門外宋端平間建龍樹庵在閶門外西五里白蓮涇南通志明萬厯間建周忠介順昌以老樹拒門如龍因名龍樹化城庵在呉縣支硎山西内有石壁峭立水濺石上日夜不純聲因稱千尺雪雲泉庵在呉縣天平山范文正公墓旁宋慶厯中建十八年本朝康熙三御賜扁額二桃花庵在呉縣西北隅桃花塢府志唐寅舊居天啟時改名準提庵浚池得唐解元桃花庵歌及祝允明庵額今並存崇眞宫在承天寺西呉郡志宣和中為神霄宫門有青石橋扶欄雕刻之工細如絲髪為呉中橋欄之最上眞宫在西洞庭龍頭山西三里呉都文粹上眞觀梁隱士葉順昌之宅大同四年捐宅為宫卽今之夀聖上眞宫靈順宫在東洞庭楊灣祀相國伍員唐貞觀二年建宋高宗時再葺獅子林在府治東北隅元至正二年建多聚奇石狀若狻猊石洞螺旋人遊其中迷於往復其上翹林秀木若不階尺土離立巖際内有卧雲室立雪堂問梅閣指柏軒禪窩竹谷諸景元倪元鎭曾繪為圖眞跡入内府康熙四十二年聖祖仁皇帝賜扁額乾隆二十二年二十七年三十年四十五年四十九年帝皆有御製遊獅子林詩曡高宗純皇賜扁額並九年命畫苑摹倪卷眞跡永藏呉中四十仁宗睿皇帝隨扈有㳟和御製獅子林詩名宦漢任延南陽宛人更始元年拜會稽都尉時中土士避亂江南延聘請髙行嚴子陵等待以師友之禮􅁺吏貧者分祿給之省諸卒耕公田以周窮急行縣慰勉孝子又禮致隱士龍邱萇署議曹􅀕酒郡中賢士爭往官焉鍾離意山陰人建武初爲郡督郵時部縣亭長有受人酒醴者府下記按之意封選記言於太守曰政化之本由近及逺宜先清府内且闊畧遠縣細微之愆太守賢之遂任以縣事第五倫京兆長陵人建武中拜會稽太守躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與民之貧羸者其俗多淫祀民常以牛祭神用是財產困匱前後郡將莫敢禁倫移書屬縣曉告百姓屠牛者吏輒行罰後遂斷絶民得以安永平五年坐法徴老小攀車扣馬號呼相隨及詣廷尉吏民上書守闕者千餘人得免歸彭修昆陵人建武中守呉令與太守俱出討賊賊望見車馬競射之修障扞太守中流矢死太守得金賊素聞其恩信卽殺弩中修其能梁江革考城人高祖時監呉郡時境内荒儉劫盗公行革至郡惟有公給仗身二十人百姓皆懼不能靖冦革廣施恩撫明行制令盜賊靜息民吏安之何逺剡人梁初嘗監呉郡性耿介疾强富如仇讐視貧細如子弟特為豪右所憚尤厲清節妻子飢寒不以動心所至立祠祀之何敬容廬江人普通中為呉郡太守為政勤恤民隱辨訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之謝舉陽夏人大同中為呉郡太守先是何敬客居郡有美績世稱為何呉郡及舉為政聲跡畧相比王規臨沂人中大通時為呉郡太守主書芮珍宗家在呉前守宰皆傾意附之規遇之甚薄珍宗密奏規不理郡事俄徵為左民尚書郡吏民千餘人詣闕請留不許陳沈君理呉興人永定初為呉郡太守是時兵革未靖軍國之用成資東境君理招集士卒修治器械民下悦附深以幹理見稱隋劉權豐人開皇中拜蘇州刺史時江南初平物情尚擾權撫以恩信甚得民和唐岑仲翔江陵人為長州時兄義為金壇今弟仲休爲溧水令皆有治績宰相語本道巡察御史母遺江東三岑韋應物京兆長安人建中時爲蘇州刺史性高潔與顧況劉長卿邱丹秦系皎然之儔相酬唱于頔洛陽人貞元中蘇州刺史罷淫祠濬溝澮端路衢爲政有績滕遂貞元中爲長洲令攝呉縣人歌之曰朝判長洲暮判呉道不捨遺人不􅀌王仲舒并州祁人元和中爲蘇州刺史變瓦屋純火災賦調常與民爲期不擾自辦范傳正順陽人元和中蘇州刺史有殊政崔俊京兆長安人長慶中蘇州刺史性介潔視贓負者若仇奏課第一白居易下邽人寶厯中爲蘇州刺史狄兼謨太原人太和中由鄭州改蘇州刺史以治最擢給事中劉禹錫洛陽人太和中爲蘇州刺史以政最賜金紫服楊發馮翊人大中時爲蘇州刺史治以恭長慈幼爲先宋王禹偁鉅野人太平興國中知長洲縣同年生羅處約時宰呉縣日相賦咏人多傳誦宋璫渭南人淳化中三呉􅀊饑民疾病多死擇長吏養治之命璠知蘇州璫體豐碩素病足至州地卑濕疾益甚或勸其謝疾北歸璫曰天子以民病俾我綏撫我以身病而辭焉非臣子之大義也陳省華閬中人至道中知蘇州遇水災省華復流民數千户殍者悉􅄟之詔書褒美陳靖莆田人天禧中知蘇州王質大名莘人天聖中通判蘇州州守黄宗旦得盜鑄錢者百人下獄治退告質曰吾以術鈉致得之質曰以鈎人寘之死而又喜仁者之政固如是乎宗旦慚沮為薄其罪張方平南京人景祐中知崑山縣司馬光夏縣人父池在杭求簽蘇州判官事以便親許之滕宗諒河南人慶厯中知蘇州梅摯新繁人慶厯中通判蘇州二浙饑官貸種食已而督償頗急摯言借貸本以行惠乃重困民認緩翰期蔡抗宋城人嘉祐中知蘇州州並江湖民田苦風潮害抗築長隄自城屬崑山亙八十里民得立塍堨大以為利韓正彥安陽人嘉祐中知崑山縣剏石隄疏三門得良田數萬頃民立祠祀之滕元發東陽人哲宗時知蘇州孫􅁴高郵人神宗時知蘇州劉拯南陵人无豐中知常熟縣有善政縣人稱之常安民卭州人元豐中知長洲縣以主信為治人不忍欺追科不下吏使民自輸先他邑以辦王覿如臯人元祐中加􅀡龍圖閣知蘇州州有狡吏善刺守將意以撓權覿窮其姦狀寘於法一郡肅然民歌咏其政有吏行水上人在鏡心之語洪彥昇樂平人調常熟尉奉母之官既至前尉欲申期三月以規薦而中分俸入彥昇處僧舍卻俸不納如約始交印張克戩開封人徽宗時知呉縣呉為浙劇邑民春爭大姓怙勢持官府克戩一裁以法姦猾屏氣召拜衞尉丞趙訓之秦悼王五世孫知呉縣朱勔怙勢役州縣訓之不為屈勔嘗執數輩詣縣請治訓之悉縱之忤勔遂移疾去陳公輔臨海人調平江教授朱勔方嬖倖公輔絶不與交勔有兄喪諸生欲徃弔公輔不予告張浚綿竹人建炎三年金人南侵車駕幸錢塘留朱勝非於呉門捍禦以浚同節制軍馬巳而勝非召浚獨留時潰兵數萬所至剽掠浚招集甫定會苗傅劉正彥作亂改元赦書至平江浚命守臣湯東野祕不宣謀起兵討賊時吕頤浩節制建業劉光世領兵鎮江浚齎蠟書約頤浩光世以兵來會而命張俊分兵扼呉江上疏請復辟趙鼎聞喜人知平江府胡松年懷仁人建炎中知平江府未入境貪吏解印斂跡以興利除害十七事揭於都市百姓便之李光上虞人徽宗時知常熟縣朱勔父冲倚勢􅁀横光械治其家僮冲怒風部使者移令呉江光不為屈紹興中除顯謨閣􅀡學士移守平江趙彥倓為平江節度推官攝宜興縣時以牧馬劵科為負嘗預用二年後税民以此病彥倓請諸司奏釋宿逋禁預借積弊遂絶向子諲臨江人紹興中知平江府金使議和將入境子諲不肯拜金詔忤秦檜意致仕蕭燧臨江軍人紹興中授平江府觀察推官時秦檜當國其親黨密告燧秋試必主文漕臺燧詰其故曰丞相有子就舉欲以屬公燧怒曰初仕敢欺心耶劉穎西安人紹興中知常熟縣後知平江府梁克家晉江人紹興中投平江簽判時金主亮死克家移書陳俊卿謂敵雖遁吾兵力未振不量力而動􅀅有後悔俊卿以白丞相陳康伯歎其逺慮召為祕書省正字周葵宜興人紹興中知平江府金使絡繹於道葵不為禮李衡江都人高宗時授呉江主簿有部使者怙􅀔作威侵剥下民衡不忍以敲扑迎合投劾於府拂衣而歸洪遵番陽人紹興中金兵由海道窺二浙朝廷以浙西副總管李寳禦之寶駐兵平江以遵嘗薦寶乃命遵知平江及寶以舟師擣膠西凡資糧器械舟楫皆遵供億寶成功而歸遵之助為多先是朝廷慮商舶為敵得悉拘入官旣而不返並海縣團萃巨艦及募水手民兵皆縶留未得去遵因對論之以船還商而聽水手自便呉人徳之張孝祥烏江人隆興中知平江府事繁劇孝祥剖決庭無滯訟屬邑大姓並海囊橐為姦利孝祥捕治籍其家得榖粟數萬明年呉中大饑迄頼以濟虞允文仁夀人隆興中以顯謨閣學士知平江府汪應辰玉山人乾道中以端明殿學士知平江府袁韶慶元人嘉泰中為呉江丞蘇師旦恃韓侂胄威福撓役法提舉常平黄榮檄韶覈田以定役師旦密諭意言呉江多姻黨儻相容當薦為京朝官韶不聽是􅀊更定户籍承徭賦皆師旦黨師旦諷言者將論去榮亟以是亊白於朝且薦之沈作賓歸安人開禧中知平江府請得節制許浦水軍詔可郡有使臣故海盗也作賓使招誘其黨旣至慰勉之又得强勇者幾千人置將統之號曰義士復募郡城内外惡少亦有幾千人號曰壯士衣糧器械皆視官軍而輕捷善鬬過之於是海道不警市井無譁唐璘古田人嘉定中調呉縣尉以鯁􅀡聞呉淵寕國人紹定中知平江府􅀊大祲因淵全活者四十二萬三千五百人孫子秀餘姚人紹定中調呉江主簿有妖人稱水仙郡守王遂將使治之莫敢行子秀奮然請佳焚其廬碎其像沈其人於太湖曰實汝水仙之名矣妖遂絶日詣學宫與諸生討論義理呉潛寕國人嘉熙中知平江府條具財計凋敝本末以寛郡民與轉運使王埜爭論利害授寶謨閣待制提舉太平興國宫陳塏嘉興人淳祐中知平江府兼淮浙發運使户部侍郎趙必愿舉塏最詔特轉一官胡穎湘潭人知平江府兼浙西提黠刑獄榮王府十二人行劫穎悉斬之逾旬命沈於江黃震慈谿人寶祐中調呉縣尉呉多豪勢家告私債則以屬尉民多凍飢窘苦死尉卒手震至不受貴家告府檄攝其縣及攝長洲華亭皆有聲程元鳳徽州人寶祐中判平江府兼淮浙發運使奏免修明局米五萬石包恢建昌人景定中知平江府兼發運豪有奪民包舉田寄公租誣上者恢上疏指以為小民祈天永命之一亊帝覽奏惻然罪任事者卽歸民田常懋武康人淳祐中調常熟尉辟平江府百萬倉檢察不受和櫂亊例戢吏卒暴取度宗時知平江值旱故事郡守合得緡錢十五萬懋悉以為民食軍餉助蠲苗九萬税十三萬版悵十六萬又蠲新苗二萬八千大寛公私之力飛蝗幾及境疾風飄入太湖節浮費修府庫旣代有送還亊例自給吏卒外餘金萬楮懋悉不受吏驚曰人言常侍郎不受錢果然文天祥吉水人德祐中知平江府元王都中福寕人世祖時以父功授平江路總菅府治中時年甫十七僚吏見其年少頗易視之都中遇亊剖析動中肯綮皆􅌓眙不敢欺崑山有詭易官田者事􅁴而八年不決都中為披故牘洞見底裏其人乃伏辜學舍久壞而郡守缺都中曰聖人之道人所共由何獨守得爲乎乃首募大家合錢新其禮殿桂完澤永嘉人嘗從西江左丞李托爾留京師得爲平江路管軍鎭撫會賊攻昱嶺關完澤討之凡再戰皆勝尋又與賊􅃲爲所執其妻弟金德亦被擒臨以白刄脅之降皆不屈賊怒剖二人之腹而死托爾舊作朶兒今改正孔文貞東平人至元中爲常熟縣尹􅀊大潦率民疏境内港浦洩積水而注之江秋乃大稔明魏觀蒲圻人洪武中爲蘇州知府適承前太守虐政後務去煩苛與民休息興學校禮賢士盡心民亊課績爲天下最遷四川參政因部民乞留命還任初張士誠以府治爲宫而别遷府治觀還治舊基又濬錦帆涇興水利或諧其興既滅之基坐棄市王􅀚祥符人由鄉薦擢蘇州知府公廉有威發姦摘伏民憚若神有黠吏錢英屢陷官長觀縛至庭捶殺之姦豪屏跡太祖遣行人齎勅褒之與前守李亨魏觀後守姚善況鍾皆賢稱姑蘇五太守姚善安陸人建文中知蘇州府初太祖以呉俗奢僭重懲以法黠者更持人長短訟獄滋多善務持大體不屑苛細訟為衰止部内布衣賢士咸加優禮政譽翕然劉幹修武人永樂中從户部尚書夏原吉按呉治水改長洲縣丞常躬厯塍陌勞田畯問所疾苦未嘗鞭笞一人卒於官貧不能斂部民助歸其䘮葬衣冠於半塘況鍾靖安人宣德中知蘇州府始至羣吏抱牘請判鍾惟吏所欲行止越三日召詰之曰若輩舞文乆罪當死立捶殺數人一府大震丁憂將去民歌曰況太守民父母願復來養田叟乞留於朝者三千餘人詔許復任奏免田租七十餘萬石興利去弊鋤强扶弱興學校禮文儒九年秩滿當遷郡民二萬餘人乞再任詔進二秩如民請明年卒吏民聚􅂘立祠祀之朱勝金華人正統間知蘇州府政尚中和而吏治精練物無遁情案無滯牘嘗曰吏貪吾詞不付房隸卒貪吾不行杖獄卒貪吾不繫囚人歎服之郭南正統中為常熟知縣縣苦役南酌輸米以給役費民甚便之僚屬有事於鄉令以食物隨行縣產軟粟南食之而甘曰後必有以此貢上者為民永世害矣命悉拔之龍晉南京人景泰初為常熟知縣有善政常疏呉淞江􅀗一石文曰得一龍江水通績用果成林鶚太平人天順時知蘇州府一切簡靖卽有建革必審覈再三呉人重其名旦夕責效頗笑守迂緩已而見其深思曲算圖久逺利乃稱太守為康濟之才雍泰咸寕人成化中知呉縣太湖水漲没田千頃泰議作隄富豪讒之於府泰執而痛杖之隄卒成為民利稱雍公隄民有妾亡去妾父訟夫密殺女匿屍湖石下泰曰彼密殺汝女汝何以知匿石下此必汝殺他人女冀得賂耳一拷而服邢宥文昌人成化時知蘇州府有姦民攬納秋賦捕置之法以其贓萬緍隄沙河甓官道一府利之大水民饑不待奏輒發米二十萬斛以賑宥素廉介及治蘇以儒學飭吏治嚴而不苛楊子器慈谿人宏治元年知崑山縣興修水利振起學校過墪師之門泌下車升坐取童子課程校之奬勵若子弟然毁淫祠百餘區土木像投諸水大邑民立祠祀之九年為常熟知縣蘇州諸水率由常熟白茅港入海侍郎徐貫旣疏治之己而有漲沙當海口潮汐增淤水患如故子器相許浦塘便近可疏乃率民濬之遂爲水利曹鳳上蔡人宏治中知蘇州府俗事五通神每禱祀輒擊牲舉樂謂之恭筵費甚鉅鳳禁之焚其廟像巫覡尼師不得出入士庶家置義冢禁火葬裁定婚䘮禮使無奢越善政甚著方豪開化人正德中知崑山縣􅀊大潦民皆逃散豪解冠帶自繫郡獄上奏乞蠲徴􅀗報可宋儀望永豐人嘉靖中知呉縣民輸白糧京師輒破家儀望令諸區各出公田計役受田贍之下令禁火葬置義冢郭外創子游祠爲文學書院集諸生講習其中王儀文安人嘉靖中爲蘇州知府以田額混淆履畝丈之使縣各爲籍吏不能欺由是以八亊定田賦以三條覈税課徭役雜辦無所不均人人便之治爲知府第一任環長治人嘉靖中爲蘇州同知時東南倭患起官軍屢北環有才畧性慷慨獨以身任之嘗遇賊身被三槍幾殆宰夫􅀡前捍之乃免而宰夫竟死巳賊復至裹創出海擊之竟敗賊累以功擢右參政蘇松兵備及卒詔建祠蘇州有司春秋致祭曹自守茌平人嘉靖中知呉縣清苦儉約三年不置一衣夜不扃署後去官呉民過其里見一叟賣藥市中視之卽自守也遂驚拜道左王鈇順天人有才畧嘉靖進士知常熟縣縣大猾匿亡命作姦鈇招之貰其罪使為己用巳而倭冦至鈇語之曰我延爾命正為今日也衆許諾於是立為耆長俾部署子弟合邑中防卒日夕訓練縣故無城鈇議城之訖工而冦至鈇累戰卻賊又與指揮孔燾破賊寨焚其舟二十七艘溺死無箕㝷追賊至海濱陷淖中遇害贈太僕少卿樊玉衡黄岡人萬厯中知崑山縣縣水災自駕小艇驗視與饑民對啖菜粥朝議方急逋賦玉衡曰民逋賦時我止數齡耳今其人巳老且死何忍窮追耶止不徴民益樂輸恐後編審户役三日而畢蕭景腆福建人萬厯中長洲縣丞太監張志聰過郡指索縣令郭波不得縛之車後景腆率所部弓乎􅀡前奪波且手批志聰市民皆梯屋飛瓦助之事聞逮詔獄得免死呉人立碑記其事葉成章同安人萬厯間長洲令甫至漫不省事既而判決如流邑中利弊洞若觀火吏胥屏息以最擢御史民立祠祀之耿橘瀋陽衞人萬厯中知常熟縣首復子游書院講求水利開嘗福山塘三丈浦奚浦李墓塘梅李塘貴涇横􅄋湖漕橫浦六尺溝等河工畢而民不擾邑民世享其利著有常熟水利興革實政二書楊漣應山人萬厯中知常熟縣亷􅀡不撓築雲和隄五十里設義學聚邑之秀民延師教之民爲立祠焉石崑玉黄梅人由饒州知府以才調蘇州清勤愛民􅀊饑賑濟有法巡撫李淶因事中之落職􅀱勘士民數千人詣淶訟冤誣卒白後以福建右參政舉治行卓異廷謁時吏部尚書趙煥見曰此石蘇州耶遂擢右僉都御史巡撫大同陳洪謐晉江人崇禎中知蘇州府􅀊饑榖騰貴惡少年􅀡入人家盜劫倉粟洪謐捕亂首杖殺之乃發廩賑貸勸富人平糶大興工役使少壯者得食民以不饑呉江民變卽單騎往諭皆羅拜自伏性慈和非重犯不施鞭扑人號陳母馮元颺慈谿人崇禎八年以布政司參議備兵蘇松時温體仁與唐世濟横於湖州其鄉人爲盜太湖率以兩家爲與主人莫敢問元颺捕得輒發露之最後􅀗其魁則世濟族子也立寘之法太倉人陸文聲訐張溥張采倡復社亂天下元颺稱二人好學眞修斥文聲誣妄遂忤體仁意謫官熊開元湖廣人崇禎中知呉江縣舊南北糧運役法不均開元均配畫一民歌其德本朝丁允元日照人順治二年知蘇州府時定鼎之初庶事草創允元練習典故因事釐正綱紀粲然尤加意人才所識拔多知名士湯家相趙城人順治已丑進士知常熟縣潔己愛民釐别耗蠧撫卹流亡善政具舉前令以􅀍劾逮問家相常左右之力白其誣時江南五郡逋賦二百萬緡得㫖俱奪職家相坐免士民争先輸納不踰宿而額足且以治狀走愬當事請留弗獲郭文雄文水人順治十六年知崑山縣為政􅂤易得民民有逋賦者揭姓名縣門不遣一役而輸者如市邑俗多借人命為訟端文雄令毆人至死者里隣公舉得實卽坐之姦民有居為奇貨來告者論如律自是命案漸稀卒於官邑民葬之馬鞍山南呉道煌宛平人康熙二年知蘇州府郡舊有逋賦數百萬道煌悉緩其徵曰吾下考不辭也卒以免官民為祠祀之孫繼徳州人知長洲縣邑賦五十萬以徵不及額去官者前後相屬繼主於緩徴以蘇民曰巳辦下考矣斷獄光平允受事日卽有上官吏來趣成前令盜案繼察獄詞知盜乃誣入者盡出之卒得眞盜沈思舉汀州人康熙中知長洲縣鞭扑不施而課賦無缺立需索單於里甲月一塡報輿皂斂跡􅀊旱且蝗思舉禱於神蝗去而雨大至遂以有秋以盜案免官民祀之前令葉成章祠題曰雙清于宗堯遼東廣寕衞人年十九知常熟縣人或易之宗堯鋭意吏事釐姦興利百務具舉雖老成不逮邑素苦於漕宗堯視事三月盡除其害性􅀌介不受一錢豪强畏之無敢干其法者三年卒於官邑男女皆巷哭留葬虞山之麓郭琇卽墨人康熙中知呉江縣材力强幹屢斷疑獄民驚為神徵輸行版串法分為十限胥吏無從假手總督于成龍巡撫湯斌皆稱其清而能以卓異特薦孔允祖曲阜人以貢生任經厯署呉江縣事時縣經兵火城無居民允祖招撫勤恤又以兵駐邑為民患請上官撤去之順治三年􅁹土冦陣亡事聞議卹如例總纂官臣王廣䕃恭纂輯前提調官臣張日章恭覆輯校對官臣呉華淳恭校校對官臣賀式韓恭覆校
