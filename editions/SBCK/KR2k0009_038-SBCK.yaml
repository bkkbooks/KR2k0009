body:
  text: 徽州府二關隘馬嶺關在婺源縣東北屏障山兩山對峙當休婺二縣界宋初置關五嶺關在祁門縣南一百里路通江西浮梁縣自此抵縣皆高山峻壁佛嶺關在績溪縣東十五里又梅嶺關在縣東南三十里徽嶺關在績溪縣西北十五里太平鎮舊置於縣西二十里新嶺明正徳間移此叢山關在績溪縣北三十里巃嵸山地名永安鎮接寕國縣界最稱險要海口隘在婺源縣南九十里接徳興縣界為往來要口大鱅嶺在婺源縣東八十里大鱅山西當閩浙之衝明萬厯八年設巡司本朝乾隆二十八年裁移設桐城縣練潭鎮街口鎮巡司在歙縣南一百里東至淳安縣八十里即新安江所經有街口渡明置巡司又置梅口批騐茶引所成化十四年併入巡司黄山巡司在歙縣西北百二十里汰厦巡司在休寕縣東南三十里屯溪明初置黄竹巡司在縣西南百餘里之黄竹嶺嘉靖四十四年移駐縣東南五十餘里白際嶺之汰厦後又移駐屯溪項村巡司在婺源縣西舊置縣西九十里澆嶺後移縣西北七十里嚴田明萬厯九年移駐今所大洪嶺巡司在祁門縣北五十里又舊有良禾嶺巡司在縣北三十里良禾嶺後移縣西北二十七里苦竹港明嘉靖中裁濠寨巡司在績溪縣西北三十里馮村今駐鎮頭新館鎮在歙縣東三十里宋􅀄設官􅅦酒之所後廢巖寺鎮在歙縣西二十五里宋設官收酒税􅀄置税課􅈰兼置巖寺巡司洪武十四年廢三吳鎮在婺源縣東七十五里唐末賊軍犯境郡人汪濆戍此却之高砂鎮在婺源縣西南三十里元置高砂税務至正十二年燬魚亭鎮在黟縣東南三十五里宋置驛及巡司於此元廢廟口鎮在黟縣西二十里又西十里有西武鎮皆宋置明廢東山營在歙縣東山本朝順治二年置朱塘營在休寕縣東南屯溪鎮五城營在休寕縣西南五十里五城相去五十里明嘉靖四十四年置王干寨在歙縣東百二十里昱嶺東接浙江昌化縣界舊有巡司本朝嘉慶十二年裁移設霍邱縣三河尖深渡寨在歙縣東南四十五里宋置明􅀄置巡司後廢寰宇記深渡在縣東一百十里與睦州分界從新安江上崇山峻流實百城之襟帶管界寨在歙縣西北八十里宋置明嘗置巡司㝷廢太白寨在婺源縣西北舊有巡司本朝乾隆二十八年裁移設懐寕縣三橋鎮中平寨在婺源縣東北九十里為往來孔道宋置巡司明洪武十八年廢西坑寨在績溪縣東六十里元置鎮守軍營於此明􅀄改置巡司正統􅀄廢貴溪務在祁門縣南七十里又柏溪務在縣北皆宋置元廢津梁紫陽橋在歙縣南五里長數十丈洪橋在歙縣西巖鎮後街舊名洪福明成化間建河西橋在歙縣西門外宋端平初剙浮梁亘五十丈名曰慶豐元季兵燬明洪武中甃石爲之改今名佘翁橋在歙縣西巖鎮文几山側長四十丈孫翁橋在歙縣西巖鎮後豐樂溪上石洞凡九構屋五十楹屯溪橋在休寕縣東南三十五里汊口橋在休寕縣南四十五里一名㑹源橋清漪橋在休寕縣南四十五里内翰橋在休寕縣西二里宋寳慶間程珌磶石架木爲屋三十楹明洪武間用石重建藍渡橋在休寕縣西二十五里元置稅務於此曰藍渡務竹林橋在婺源縣西南竹林元儒程復心建萬安橋在婺源縣西臨江門外平政橋在祁門縣治東桃源橋在祁門縣西上構亭二十間東溪橋在黟縣治東宋慶元間建魚亭橋在黟縣東南三十五里駟歸橋在黟縣東北四十里宋盧諫議故居祠前石痕橋在績溪縣東三十五里元至正中建有亭二十餘楹南關橋在績溪縣南門外通志橋下有倒流朝縣水約九步諺曰九步流東水是也臨溪橋在績溪縣西南二十五里岑山渡在歙縣南十里率口渡在休寕縣南三十五里來蘇渡在績溪縣西徽溪津相傳蘇軾視其弟轍於縣故名隄堰張公隄在府城外府志城北西南三面濵水淫霖驟漲往往漂没民居明知縣張濤伐石隄之高丈許延紆數里中壘白石為橋曰紳影䕶以楊柳民徳之呼張公隄魯公隄在休寕縣西五里明萬厯中知縣魯􅀧築蘇公隄在績溪縣通濟門外宋蘇轍築漁梁在歙縣南三里豐樂富資布射􅀭之水四水會流斗瀉而下無復停蓄故為石梁以緩水勢通志宋嘉定間郡守宋濟創建紹定四年袁甫築成明宏治中屢修後復圯本朝康熙二十七年重修兗山堨在休寕縣東南明天順時縣人汪世安築陵墓漢吳王芮墓在婺源縣游汀鄉雞籠石梅鋗墓在祁門縣南二里三國吳孫王墓在休寕縣審口孫王山晉程元譚墓在歙縣西十餘里土人名地曰雙石南北朝宋汪叔舉墓在績溪縣東登源唐金山梁蕭王墓在歙縣西南累土如冢凡二十三處民間請雨必祭陳程靈洗墓在歙縣西南黄牢山唐汪華墓在歙縣北雲嵐山吳少微墓在休寕縣西鳳凰山黄芮墓在歙縣西南吳仁歡墓在祁門縣西烏門五代陶雅墓在歙縣東宋朱文公祖墓在婺源縣有六一在蓮洞一在官坑一在楊村一在王橋一在鎮下一在小港宋紹興淳熙間朱子歸省鄉里表識各墓而去祝􅃀墓在歙縣南紫陽山凌唐佐墓在休寕縣南門外程珌墓在休寕縣南萬松山羅願墓在歙縣西北汪立信墓在休寕縣下坦元胡一桂墓在婺源縣西南梅田唐師塢鄭玉墓在歙縣西獅山陳櫟墓在休寕縣西陳村胡炳文墓在婺源縣西北考川明汪克寛墓在祁門縣東盛村趙汸墓在休寕縣北漁坑朱升墓在休寕縣詹田程敏政墓在休寕縣東二十里車田金聲墓在歙縣兗山祠廟程朱祖居祠在歙縣篁墩宋二程子朱子之先世皆嘗居此後人因即其地立祠以祀亦名程朱闕里本朝乾隆二十六年高宗純皇帝賜洛閩遡本扁額又有三夫子祠在歙縣堨田祀二程子朱子尚賢祠在歙縣南門外祀晉程元譚梁任昉明陳彦回孫遇張禎彭澤何歆張芹留志淑王繼禮益以梁徐摛共十一人吕司馬祠在歙縣西南祀唐歙州司馬吕渭朱韋齋祠在歙縣