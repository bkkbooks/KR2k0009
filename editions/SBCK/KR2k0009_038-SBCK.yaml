花眉子驢坑在婺源縣北七十里石有青絲暈濟源坑在婺源縣北凡三坑並列曰碧裏坑在山上色理青瑩及半里有水步石大􅀨􅀧白暈次十里入裏山石青細有金紋花暈墨方輿勝覽南唐時有李超及于廷珪自易州南遷至此後主嘗用其墨府志廷珪父子以歙地多松故留造墨宋時徽州􅀊以大龍鳳墨千觔充貢明方於魯程大約皆稱精妙各著有墨譜行世近代歙休製墨亦多佳者茶方輿勝覽有勝金嫩桑仙芝來泉先春運合華英之品又有不及號者曰片茶府志細者名雀舌蓮心金芽出黄山榔源諸處總曰松蘿然松蘿山以多松名非以茶名也木方輿勝覽􅀊聯為桴下浙水祁門人則入於鄱􅀊以茗漆紙木行江西仰其米自給府志婺祁山多田少民多植杉木為林以供賦稅三十年可伐漆明統志出祁門縣玉面貍見明統志府志亦曰牛尾貍蟄則不食舐掌而肥膚理至腴為歙奇品梅堯臣詩雪天牛尾貍是也榧子見明統志笋府志出歙縣問政山鮮美甘香獨異他種蜜蠟桐油府志各縣皆出而婺源祁門為多石耳府志出歙黄厓山者最肥美蕙見府志秃竹府志産婺源三靈山不成枝葉六月最盛翼魚出紫陽山及各處深山四足狀如蝘蜓能緣木以啖飛鳥藥白石英陶宏景曰新安所出極細長白徹者為佳白术本草歙州之术較浙术為優以其白勝也菖蒲本草菖蒲之地七歙居其一石生葉細其花紫
