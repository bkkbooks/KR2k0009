頴廬陵人知歙州盜有殺民於市者三年捕弗􅀗頴至􅀗之抵法有富家夜駭啓其藏者踵捕無所􅀗頴獨召富家二子械送獄吏民交諫謂素良子也頴鞫愈急二于具狀盜某物移於某所咸驚爲神蘇轍眉山人元豐間知績溪縣時有令江東諸郡買戰馬他邑預括民馬吏縁爲奸轍曰取馬使者未到徐為之備可也及州符至縣督馬轍乃以夏稅違期為由召諸鄉保正等詰之曰誰爲有馬者乎以實對後諭之曰取馬者至則出馬不至則已皆再拜曰幸甚取馬者卒不至向綜開封人知歙縣事性寛􅁉善治劇籍閭里惡少年有盜發用以推迹輒得民服其神曾孝藴晉江人知歙州方臘起清溪孝藴約束郡内無得奔擾分兵守阨塞有避賊來歸者􅀗罪使出境人恃以安會移青州既行而歙陷葛勝仲丹陽人大觀初知休寕縣勤恤民隱􅅄進士􅀋周葵宜興人宣和中調徽州推官高宗移蹕臨安諸軍交馳境上葵應變敏速千里怗然鞠嗣復宣和初知休寕縣方臘破縣欲逼使降面斬二士以怖之嗣復罵曰自古妖賊豈有長久者且屢言何不殺我賊曰我縣人也明府宰邑有善政我不忍殺乃委之而去毛㮚宣和中歙州司理參軍嘗攝州事適睦寇陷城㮚坐府治賊脅使降不屈罵賊死妻孥皆遇害陳洙建炎間知祁門縣爲政嚴平賞罰明允時値盜起洙簡練弓矢裒集兵民與民約以死自誓賊不敢犯李植臨淮人高宗時知徽州徽俗尚淫祠植首以息邪說正人心爲事民俗為變郟升卿崑山人乾道初知徽州奏罷創科錢及歙縣絹民困􅀗蘇周必大廬陵人紹興中授徽州户曹洪适鄱陽人高宗時知徽州有惠政范成大吳郡人紹興中爲徽州司户參軍太守洪适每以訟諜付之徐誼温州人光宗時知徽州至郡歙縣有妻殺夫繫獄以五歳女爲證誼疑曰婦人能一掌致人死乎緩其事未覆也會郡究實稅於庭死者之父母及弟在焉乃言我子欠祖久繫饑而大呌役者批之墮水死矣然後􅁈者得釋吏皆坐罪闔郡以爲神明陳居仁明州人孝宗時知徽州至郡告以天子節經費以惠儉瘠不能推廣聖德吏則有罪乃招三衙軍植二表於庭有輸納中度而遭抑退者抱所輸立表下親視之人無留滯吏不能措手輸稅者恒裹贏以歸鄰州有訟多詣臺省乞決於居仁秩滿􅀖人挽留由間道始得去舒璘奉化人乾道中爲徽州教授時詩禮久不預貢士學幾無傳璘作詩禮講解家傳人習自是其學寖盛丞相留正稱爲第一教官趙希遠恭榮王師䕫季子嘉定初守郡有飛蝗翳日希逺禱之蝗散皆斃積荒後米價騰貴即發廩計日而給豪民亦相捐榖爲助又薄於自奉撙節有餘爲民代輸民皆感悅袁甫鄞縣人嘉定中知徽州治先教化崇學校訪便民事上之請蠲婺源紬絹萬七千餘匹茶祖折帛錢五千餘貫月樁錢六千餘貫請照咸平紹興乾道寛恤指揮受納徽絹定每匹十兩請下轉運常平兩司預蓄常平義倉備荒興修陂塘剙築百梁任良弼嘉定中知休寕縣縣有折帛一項請減三分之二又請蠲積欠二十萬緡詔從之邑諸鄉惟黎陽賦重請依和睦鄉則例蠲減民深德焉王應麟慶元府人知徽州其父撝嘗守是郡父老皆曰此清白太守子也摧豪右省租賦民大悅元許楫太原人至元間為徽州路總管民租入親視概量時當僧格立尚書㑹計天下錢糧户部尚書王巨濟􅀝勢刻剝遣吏徴徽民鈔多輸二千錠巨濟怒其少欲更益千錠楫曰公欲百姓死耶生耶如欲其死雖萬錠亦可徴也巨濟怒解徽州賴以免考滿去徽之績溪歙縣民柯三八等因饑阻險為寇行省左丞以兵捕之相拒七日使人諭之三八等曰但得許總管來皆降矣楫單􅀐趨賊壘衆見楫來皆拜曰請署榜以付我楫請退軍一􅃕賊果降僧格舊作桑哥今改正薛居信河東人祁門尹至元中行估勘法官吏多虚増田土數居信勘量綜覈與估勘者逺不相及趨省力陳奸弊得請凡蠲除虚增田四萬四千餘畝地三萬六千餘畝張毅洛陽人大德中績溪尹歲洊饑勸富民分賑復置義倉令入粟有官山墝埆不可種植佃皆逃避以佃官田者併佃之流逋悉歸有蝗至郡虎入境為患毅禱於神是夕風􅀨大作蝗盡滅有猛獸逐虎虎盡去民立石以紀政績鄧文原綿州人延祐六年移江東道徽民謝蘭家僮汪姓者死蘭姪回賂汪族人誣蘭殺之蘭誣服文原錄之得其情釋蘭而坐回時久旱不雨獄決乃雨干文傳平江人延祐時知婺源州婺俗男女婚聘富則逾其約有育其女至老死不嫁者親喪貧則不舉有停其柩累數世不葬者文傳下車即召耆老使以禮訓之閱三月而婚喪俱畢宋大儒朱子上世居婺源故業為豪民所占子孫訴於有司莫能􅀡文傳諭其民以理不煩窮治而悉歸之復募好義者即其故址建祠俾朱氏世守焉有富民江丙出遊京師娶倡女張氏為婦江客死張氏走數千里返其柩以葬前妻之子困苦之既而殺之􅄟其屍山谷間官司知之利其賄不問文傳乃發其事而論如法巴特瑪實哩􅀩古人至正中授休寕縣尹會蘄黄寇陷郡城實哩率所部由歙㨗徑􅀡要其衝破之遂復休寕師臣就舉為休寕達嚕噶齊治以平易寛厚民大悦巴特瑪實哩舊作八􅑯麻失里達嚕噶齊舊作達魯花赤今俱改正張士謙樂安人至正中知婺源州蘄黄賊陷城執士謙先殺其妻加刃其頸脅之使降士謙罵不絶口遂遇害明白謙濠梁人洪武初知婺原州有惠政會信州盜蕭明來寇謙力不能禦懷印出北門赴水死蔡美廬州人洪武初知績溪縣城南有田千畝旱則無􅀗美於上三里乳溪口築堨鑿渠引水灌田遂得常稔何敏中廣信人洪武中知祁門縣有政聲嘗䟽不便事於朝朝廷嘉之賜以酒遂陞本府知府益加清愼事簡民安陳彦囘莆田人洪武末知徽州府建文元年以循良受上賞遭祖母喪承重當去百姓詣闕乞留因葬祖母於徽城北山之陽後燕兵逼京師彦囘糾義勇赴援被械至京死郡人哀之至今名其葬母山為太守山石起宗樂平人永樂中以薦舉為歙縣知縣守官亷謹善決滯獄卒於官民懷不忘張齊錢塘人永樂間知歙縣市井廬舍舉皆煨燼齊設法修葺民賴復業又建紫陽書院禮師儒訓民間子弟翕然興於學吳春建安人永樂中知婺源縣有惠政卒於官士民巷哭陳斌錢塘人宣徳間知婺源縣居官亷約民服其化在任修學校新朱子祠孫遇福山人正統中知徽州府歲饑民羣起行劫遇請發粟賑貸民復安業秩滿當遷民詣闕乞留英宗令晉秩視事在任十八年最得民心民請於朝立祠祀之張魁新淦人正統中知績溪縣清理糧數民無隱欺又築堨溉田世享其利龍晉􅁻水人成化時知徽州府盡心撫字􅄏良堨灌田三千餘頃大水將及民居障而西之民免於患董復浙江人成化中知黟縣邑多山谷大雨水溢壞民田廬復築堤堨以捍之闢田數百頃世享其利彭澤長沙人宏治中知徽州府將嫁女治漆器數十使吏送其家澤父怒趣焚之徒步詣徽澤驚出迎目吏負其裝父怒曰吾負此數千里今汝不能數武耶入杖澤堂下杖已持裝徑去澤益痛自砥礪政蹟日聞唐勲廣東人知休寕縣正徳九年江西姚源賊王浩寇婺源入大鱅掠休南鄙勲募義勇親率至塔嶺截擊破之陶承學㑹稽人嘉靖間知徽州府俗好訟輒以殺人為詞行賄爭勝承學至凡訟殺人者先與約檢虚反坐有一二人坐誣抵死後無敢訟公庭閴然殿工採木使至承學出官帑令市之民以不困景王就國徴役夫徽當以萬人遠候江干民苦之承學已遷官未行乃白監司令民出􅀡募人江滸貧者得食居者安堵民立祠祀之王繼禮文縣人嘉靖中知徽州府朝廷遣眞人有事齊雲巖中官數輩來微供億父老皆恐繼禮曰是責在太守若魚􅁏吾民太守以身當之因謝父老自主辦事中官不得逞史桂芳鄱陽人嘉靖中知歙縣會倭寇數千掠境上桂芳召邑中丁壯子弟設備與抗倭即遁去先是歙邑無城至桂芳乃始倡築之林騰蛟福建人知休寕縣先是縣城宋時所築圯壞殆盡嘉靖三十五年倭寇起騰蛟建議重築藉以守禦一縣􅀗全朱大雅桐鄉人天啓中知祁門縣有餉以墨者唘視之金也立還之邑西患盜命約保自相舉首致渠魁寘之法盜風頓息邑東為新安孔道大雅鳩工修築甃之以石商民便焉戴自成湖廣人崇禎中知徽州府時皇木官銅波累無辜自成請於部使者概豁株連所活甚衆唐良懿新建人崇禎中知徽州府歲饑多方賑恤全活者數萬時郡多亡命結黨謀亂良懿急收捕之置諸法境内以安温璜烏程人崇禎末授徽州推官南都不守知府及僚屬悉遁璜盡攝其印悉力固守城破先殺其妻女乃自刎未殊閱五日以手決其創而死一年本朝乾隆四十賜謚忠烈本朝張學聖奉天人順治初知徽州府與徽寕道張文衡總兵張天祿皆輯兵愛民深得人心後俱遷擢去時有挽不住三張弓之謠張維光奉天人順治中以貢生知黟縣時兵燹後值邑逆僕為􅅍大户竄逃維光至佯不問閲數月宻請各憲發兵戮其渠魁勦餘黨百餘人民得安業竇士範蒲城人順治八年知黟縣為政務持大體奸猾斂迹清賦稅興學校復建挹秀橋於石山民利濟焉李之韡銅梁人順治十五年知績溪縣發奸摘伏胥吏畏若神明海寇告警百計撫輯民咸安堵去之日止行囊三肩張行健海鹽人康熙十年祁門良禾司巡檢甲寅逆藩兵逼城城陷都司臧世龍死之行健被執不屈亦遇害事間贈世龍遊擊行健金山衛經厯士民立祠並祀之廖騰煃將樂人康熙舉人知休寕縣禁民輕生有以服毒自縊投河來控者即勒令埋葬勿得株累民皆懲忿自愛革陋規苛派傕科不擾擢御史邑人祀之海陽書院吳之珽隴西人雍正間知婺源縣除催科積弊罷官貧不能即歸士民日餉薪米每出百姓爭為肩輿不受錢何達善濟源人由莒州牧守徽州莒人老幼數千環城以守夜乘間乃得去在徽建文公祠紫陽書院復水利興惠濟倉設蠶織局善政甚多人物漢梅鋗歙人秦二世時吳芮為鄱陽令以鋗為將練士卒保鄱既而項梁兵起江東芮率越人應之以鋗領兵至南陽遇沛公偕攻析酈二邑降之從入關項羽相王以鋗功多封十萬户為列侯南北朝陳程靈洗海寕人少以勇力聞侯景之亂保黟歙聚徒以拒景景軍據有新安新安太守湘西鄉侯蕭隱奔依靈洗靈洗奉以主盟梁元帝授靈洗譙州刺史領新安太守封巴邱縣侯後歸陳武帝授為蘭陵太守平徐嗣徽破王琳擊周迪累官都督郢州刺史光大初進號雲麾􅀅軍華皎之反遣使招靈洗靈洗斬皎使以聞朝廷深嘉其忠因推心待之復降周將元定克􅃆州擒其刺史裴寛以功改封重安縣公靈洗性嚴急號令分明與士卒同甘苦衆以此徳之卒贈鎮西將軍開府儀同三司諡曰忠壯大建四年配享武帝廟庭程文季靈洗子累官臨海太守後助父鎮郢城靈洗卒文季盡領其衆起為超武將軍仍助防郢州性至孝雖軍旅奪禮而毁瘠甚至服闋襲封重安縣公隨章昭達率軍往荆州征梁以功加通􅀡散􅀐常侍大建五年吳明徹北討至秦郡文季前領驍勇拔􅄏水柵大軍自後至攻剋秦郡又别攻涇州進拔盱眙仍隨明徹圍壽陽文季臨事謹飭御下嚴整凡置陣役人必身先之軍中服其勤幹每戰為前鋒齊軍深憚之謂為程彪以功累遷北徐州刺史加都督後隨明徹北侵軍敗爲周所囚十一年自周逃歸至渦陽爲邊吏􅁤送長安死於獄至徳元年後主知之贈散􅀐常侍仍以子襲封重安縣侯隋藺亮歙人開皇九年廢歙置新安鎭文帝愛亮驍勇令將兵守之大業之􅅍賴其保障民不識干戈常屯兵於浦口山上鄉人呼為藺將軍岩立祠祀之唐汪華歙人大業之亂應募平婺源寇有功郡人請攝刺史以鎮一方既而宣杭睦婺饒等州相繼皆下為政明信逺近愛慕部内賴以安全者十餘年武德四年籍土地民兵奉表於唐封越國公後薨於長安諸子以喪還葬吳少微新安人長安中為晉陽尉與武功富嘉謨魏郡谷􅀝並􅀒文詞時稱北京三傑先是天下文章尚徐庾浮俚不競獨少微嘉謨本經術雅厚雄邁人爭慕之文體一變稱為吳富體韋嗣立薦為左臺監察御史卒有文集五卷子鞏以文行知名開元中為中書􅃕人吳仁歡祁門人永泰間賊方清陷池之石埭據黟赤山鎭僞置閶門縣仁歡率鄉人數千擊破之改立祁門縣以仁歡為令汪節績溪人有神力授神䇿軍將屢戰有功徳宗甚􅃂異之黄芮歙人父卒芮號泣不絶聲廬墓終身不暫舍墓側産芝及連理木刺史上其事詔旌其門吳九郎休寕人黄巢寇至舉義兵保障鄉井與賊戰不利馬上自刎奔逐半里身方墜地死五代南唐江煥歙州人仕南唐以􅀡諫稱汪台符歙州人能文章通古今聞烈祖移鎮金陵上書陳民間利害十餘條大率以富國阜民為務烈祖善之昇元中限民田物畜為三等科其均輸以為定制人使民入米請鹽貨鬻有征舟行有力勝之稅用台符言宋齊邱頗抑之台符貽齊邱書誚其疾己才齊邱大怒密使人誘台符乘舟痛飲沉殺之查文徽休寕人仕南唐累官樞宻副使討建州王延政有功遷建州留後吳越兵據福州文徽攻克之入城撫其民陷伏中被執後遣還以工部尚書致仕弟文徵亦仕南唐宋謝泌歙人少好學有志操太平興國進士端拱初為殿中丞獻功遷工部侍郎集賢院學士復知廣州兼經畧安撫使屬狄青已破賊召還糾察在京刑獄進龍圖閣􅀡學士知荆南屢徙鄧州不行請老以吏部侍郎致仕卒弟炎授秘書省正字為吏强敏名齊於瓘查道休寕人父元方仕李煜為建州觀察判官王師平金陵盧絳據歙州遣使傳􅊾至郡元方斬其使及絳擒太祖聞元方所為優􅅄之拜殿中侍御史知泉州卒道㓜以詞業稱奉母以孝聞端拱初進士高第解褐館陶尉後寇準薦其才授著作佐郎至道中知杲州招降賊黨何彦惠咸平中知寕州會舉賢良方正道䇿入第四等拜左正言􅀡史館進右司郎中真宗退朝之暇召馮元講易便坐惟道與李虚已李行簡與焉天禧初出知虢州將行上御龍圖閣飲餞之道性敦厚有犯不校所至務寛恕居京師家甚貧多聚親族之惸獨者禄賜所得散施隨盡有集二十卷聶冠􅀸新安人大中祥符進士授連州軍事推官楊億愛其文章於是大臣交薦召試學士院校勘館閣書籍翰林學士馮元修大樂命冠卿檢閲事迹遷刑部郎中嘗奉使契丹其主自擊毬縱飲禮遇甚厚還同知通進銀臺司又預撰景祐廣樂記累遷翰林院侍讀學士每進讀左氏春秋必引尊王黜霸之義以諷未幾告歸卒冠卿嗜學好古手未嘗釋卷尤工詩有蘄春集十卷俞獻卿歙人少與兄獻可以文章知名皆中進士第獻可有吏稱厯龍圖閣待制獻卿起家􅀘安豐縣尉累遷殿中侍御史爲三司鹽鐡判官上言和難和買上納其言爲罷諸宫觀兵衛又命官除無名之費以鉅萬計會朝廷擇陜西轉運使宰相連進數人不稱㫖他日獻卿在所擬中帝曰此可矣徙京西因入對言趙振堪將帥范仲淹明鎬可大用及條上邊䇿甚備除福建轉運使以刑部侍郎致仕卒孫抗黟人仁宗時進士擢監察御史嘗因日食極言隂盛以後宫爲戒仁宗大獵城南抗疏諫即夜詔從之㝷官廣西轉運使至工部郎中詹惠明婺源人紹興間父坐事當死惠明詣郡求以身代父罪遂坐府門以火艾灼頂明日趨庭斷右耳血出淋漓郡守駭異以狀聞詔減父罪錫惠明錢帛名所居爲孝弟里凌唐佐休寕人元符進士建炎初提􅀧京畿刑獄加􅀡秘閣知南京南京陷劉豫因使爲守唐佐與宋汝爲密疏其虚實遣人持蠟書告於朝江淮都督吕頤浩過常州得唐佐從孫憲授保義郎閤門祗候俾持書遺之憲至睢陽事泄豫捕唐佐并其家憲脫歸唐佐見豫責以大義豫恕斬唐佐境上李横復潁昌言於朝詔贈徽猷閣待制胡舜陟績溪人大觀進士厯監察御史欽宗時請誅趙良嗣以快天下遷侍御史奏孔子之後深知聖道者孟子而已願詔東宫官先讀論語次讀孟子高宗初除集英殿修撰知廬州時淮西八郡羣盜攻蹂無全城舜陟守廬二年安堵如故累官徽猷閣待制廣西經畧因與運副吕源有隙源以書抵秦檜訟舜陟受金盜馬非訕朝政檜素惡舜陟遣官往推劾辭不服死獄中舜陟有惠愛􅀖人聞其死爲之􅂘詔通判德慶府洪元英究實元英言舜陟受金盜馬事涉曖昧其得人心雖古循吏無以過乃懲勘官袁柟燕仰之子仔知晉陵縣以詩名著有孔子編年五卷莒溪漁隱叢話一百卷金安節休寕人博洽經史尤精於易宣和中進士調新建縣主簿紹興初遷殿中侍御史秦檜兄梓知台州安節劾其附麗梁師成梓遂罷檜銜之以憂去不出檜死起知嚴州累遷侍講給事中孝宗即位安節請嚴内降之科凡内侍省御藥院内東門司冗費一切罷去龍大淵曾覿並除知閤門事安節封還録黄復與周必大力諫命遂寢上諭之曰朕知卿􅀌立無黨張浚聞之語人日金給事眞金石人也拜兵部侍郎權吏部尚書兼侍讀方請謝事詔以敷文閣學士致仕縉紳歎羨以為中興以來全名高節鮮有其比乾道六年卒有文集三十卷奏議表疏周易解汪藻婺源人寓饒州崇寕進士瓊林宴頒氷謝表立成一座驚歎羣臣和徽宗詩唯藻作衆莫能及厯官著作郎與王黼不合出判宣州時梁師成用事令客邀致之藻不往高宗時起􅀡學士院詔令皆出其手時以比陸宣公後除顯謨閣學士知徽州從官典鄉郡時以為榮黄葆光黟人應舉不第以從使高麗得官試吏部銓第一賜進士厯監察御史左司諫始蒞職即言三省吏猥多非元豐舊制者其大􅁦有十願一切革去徽宗即命釐正之士論翕然而蔡京怒其異已徙葆光符寳郎明年復拜侍御史遼人李良嗣來歸擢秘書丞葆光論其五不可政和末歳旱帝以為念葆光上疏論蔡京強悍自專鄭居中余深依違畏避不報京中以他事貶知昭州立山縣又使言官論其附會交結泄漏密語安置昭州京致仕召為職方員外郎改知處州加直秘閣再任卒汪若海歙人未弱冠遊京師入太學靖康初朝廷下詔求知兵者若海應詔擢高等康王起兵相州乃上書樞密曹輔請立王為大元帥鎮撫河北後謁王於濟州一日三被顧問高宗即位以論軍食迕執政通判沅州謫英州道出臨川時節制江夏軍馬李允文跋扈招討使張浚屯江西若海即馳往諭允文以成敗逆順允文感悟即舉軍東下若海復為書招其徒張用曹成等同歸朝廷羣盜解散浚乃班師紹興中通判順昌府為太尉劉錡丐援於朝柘臯之役以勞兩轉至朝散郎屢遷直秘閣知江州丁父憂卒若海豁達高亮深沉有度為文操紙筆立就高宗嘗以片􅁓書若海名諭浚曰似此人材卿宜收拾㑹浚去國不果召朱弁婺源人少頴悟既冠入太學建炎􅀄議遣使問安兩宫弁奮身自獻詔􅀘修武郎為通問副使至雲中見尼雅滿邀說甚切尼雅滿不聽使就館守之以兵紹興初金遣宇文虚中來議和虚中欲弁與正使王倫探䇿決去留弁曰吾來自分必死豈應今日覬倖先歸願正使歸報天子成兩國之好蚤申四海之養於兩宫吾雖暴骨於外猶生之年也倫將歸弁請留印使弁得抱以死金人迫之仕絶餼遺以困之弁饑待盡誓不為屈金知其終不可屈遂不復强十三年和議成弁得歸入見賜金帛甚厚􅁗檜惡之僅轉奉議郎卒有聘遊集曲洧舊聞風月堂詩話諸書尼雅滿舊作粘罕今改正祝􅃀歙人淳厚孝謹親喪廬墓兄弟先後死熙河萬里徒步以歸其喪夜寢柩旁不忍暫去親舊有盡室病卧者􅃀每旦攜粥藥徧飲食之日以為常凡遇貧乏輒傾財與之無吝色人多高其行誼朱松婺源人中進士第胡世將謝克家薦之除秘書省正字趙鼎都督川陜荆襄軍馬招松為屬辭鼎再相除校書郎厯司勲吏部郎秦檜決䇿議和松與同列上章極言其不可檜怒風御史論松懷異自賢出知饒州未上請祠卒學者稱韋齋先生著有韋齋集弟橰著有玉瀾集朱子名熹松子也登紹興進士第厯事高孝光寕四朝凡所奏聞皆誠意正心齊治均平之要初授同安主簿厯知南康軍提舉江西浙東常平茶鹽知漳州潭州除煥章閣待制再除秘閣修撰慶元二年落職罷祠五年致仕六年卒嘉定二年賜諡曰文寳慶三年贈太師封信國公紹定三年改封徽國公少依父友劉子羽寓崇安受學於胡憲劉勉之劉子翬三君及長又從延平李侗遊盡得程氏之傳嘗建白鹿洞書院為學規以示學者又嘗築武夷精􅃕四方相從講學者甚衆所著書皆行於世朝廷以其大學語孟中庸訓說立於學宫其門人程洵滕璘滕珙謝璡等皆徽人也淳祐元年從祀孔子廟本朝康熙五十一年特詔升位於十哲之次程洵婺源人父鼎為朱韋齋内弟從學於閩洵世其家學亦從朱子遊嘗以道問學名其齋朱子易以尊德性因為之銘與朱子往復論為學之要及克已之功今載入大全集厯任廬陵録參以偽學去官著有尊德性齋集十卷王炎婺源人登乾道進士官崇陽簿時張栻帥江陵聞其賢檄入幕府議論相得厯知臨湘縣通判臨江軍知饒州湖州所至蠲除宿弊不畏彊禦積官至軍器大監炎潛心篤學以斯道為已任朱子自閩歸一見契合相與講易為登堂拜其親所著書有讀易筆記尚書小傳及禮記論語孝經解春秋衍義諸經考疑等書凡十數種為􅀟溪􅀋稾程大昌休寕人登紹興中進士嘗著十論言當世事獻於朝擢太平州教授孝宗時厯國子司業兼權禮部侍郎直學士院凡奏對帝皆稱善屢遷權吏部尚嘗會行中外更迭之制力請郡遂出知泉州遷知建寕府光宗初徙知明州㝷奉祠紹熙五年請老以龍圖閣學士致仕卒謚文簡大昌篤學於古今事靡不考究有禹貢論易原雍録易老通言考古編演繁露北邊備對行於世汪綱黟人淳熙中中銓試累除外任所至有政聲厯進直煥章閣知紹興府主管浙東安撫司公事兼提􅀧刑獄權司農卿理宗立詔為右文殿修撰厯加寳謨閣待制紹定元年召赴行在言臣下先利之心過於徇義為身之計過於謀國宜有以轉移之權户部侍郎越數月上章致仕特􅂌二秩守户部侍郎仍賜金帶卒綱學有本原多聞博記兵農醫卜陰陽律象諸書靡不研究機神明銳遇事立決服用不喜奢麗供帳車乘雖敝不更所著有恕齋集左帑志漫存録羅願歙人博學好古法秦漢為詞章高雅精錬朱子特稱重之有小集新安志爾雅翼知鄂州有治績吕午歙人嘉定進士授烏程主簿調當塗縣丞厯改餘杭知縣以言罷浙東提舉章良朋留之幕旋兼沿海制置司事海寇以清差知龍陽縣厯拜監察御史鄭清之失師丁黼死於成都周葵在淮東坐視不出應援午疏論邊閫角立當協心釋嫌而乃幸災樂禍無同舟共濟之心葵以為午黨京湖制司史嵩之亦憾午乃出知泉州初丞相李宗勉深以葵言為疑會來自淮東者言臺官皆與葵交書獨吕御史無之宗勉始以午為賢語人曰吕伯可獨立無黨者嵩之内怨所論邊事及午移浙東提刑令董復亨論罷後復厯監察御史兼崇政殿說書嵩之雅不欲午在經筵午即治裝去詔趣留之午力辭不允由是再留而議論愈不合遷起居郎兼史院官官至中奉大夫卒祝穆歙人性温行醇與弟癸同事朱子於雲谷著事文􅀋聚方輿勝覧諸書子洙第寳祐四年進士嘗注四書集註附録宰執取其書進呈授太學博士程元鳳徽州人紹定初進士淳祐初以宗學博士輪對極論剥復之機及人主所當法天者理宗覧之曰有古遺直風厯遷右曹郎官疏言寔學寔政國本人才吏治生民財計兵威八事㝷拜監察御史丞相鄭清之久專國柄臺官潘凱吳璲合章論列清之不悅改遷之元鳳上疏斥清之罪二人得召還拜右正言權右􅀘闕上疏論革心之學謂革士大夫之風俗當革士大夫之心術至於文敝邊儲人才民心儲將帥救災異莫不盡言寳祐初遷侍御史言法李宗八事薦名士二十餘人屢進參知政事㝷拜右丞相兼樞密使進封新安郡公丁大全謀奪相位元鳳力辭授觀文殿大學士判福州福建安撫使又辭依前職提舉洞霄宫度宗即位進少保三年拜少傅右丞相兼樞密使進封􅁻國公以言罷卒遺表聞帝震悼輟朝特贈少師著訥齋文集若干卷吕沆午之子以恩􅀘將仕郎端平初銓試第一賈似道議行公田慧星見沆請罷公田還民似道矯詔廢十七界㑹子行關子沆力言非便似道大怒調將作監簿急令言者論寢屢召不出汪立信婺源人淳祐進士厯知江陵府時襄陽圍急勸賈似道盡國中兵沿江分屯置府聨絡固守否則輸嵗幣以緩師期以修守備俱不用咸淳十年似道督師次江上以立信爲招討使募兵援江上諸郡即日上道與似道遇蕪湖口曰某去㝷一片趙家地死爾至高郵欲控引淮漢爲後圖㝷聞似道師潰乃置酒召賔佐與訣慟􅂘三日扼吭而死贈少傅子麟在建康不肯以衆降走閩死許月卿婺源人淳祐間登第時徐元杰力攻史嵩之中毒暴卒月卿率三學諸生伏闕爲元杰訟􅁈理宗嘉其忠又上書斥丁大全賈似道爲所忌出佐江西漕宋亡衰絰終身謝枋得嘗書於門曰要看今日謝枋得便有當年許月卿方岳祁門人紹定間省試第一成進士厯知南康軍邵武軍及袁州所至有聲以史嵩之丁大全賈似道諸人之阨坎􅇄終身詩主清新工於鏤琢著有秋崖小稿程若庸休寕人從學􅀟峯饒氏得朱子之傳咸淳間登進士厯安定臨汝武夷書院山長學者師宗之稱為勿齋先生著性理字訓講義太極洪範圖說鮑壽孫歙人宋末盜起父宗巖避地山谷間為盜所得將殺之壽孫願代父死宗巖曰吾老矣僅一子奉先祀吾願自死盜兩釋之元胡一桂婺源人生而頴悟好讀書尤精於易初饒州德興沈貴寳受易於董夢程夢程受朱子之易於黄幹而一桂之父方平及從貴寳夢程學嘗著易學啟􅀩通釋一桂之學出於方平得朱子源委之正宋景定中領鄉薦試禮部不第退而講學逺近師之號􅀟湖先生所著書有周易本義附録纂疏本義啟􅀩翼傳朱子詩傳附録纂疏十七史纂並行於世胡炳文婺源人以易名家作易本義通釋而於朱子所著四書用力尤深餘干饒魯之學本出於朱子而其為說多與朱牴牾炳文深正其非作四書通凡辭異而理同者合而一之辭同而指異者析而辨之往往發其未盡之藴東南學者困其所自號稱雲峯先生炳文嘗用薦者署明經書院山長再調蘭溪州學正陳櫟休寕人生三嵗祖母吳氏口授孝經論語輒成誦長涉獵經史通進士業鄉人皆仰之宋亡科舉廢櫟慨然發憤致力於聖人之學涵濡玩索貫穿古今嘗謂有功於聖門者莫若朱氏朱氏没未乆而諸家之說往往亂其本真乃著四書發明書傳纂疏禮記集義等書於是朱子之􅀃大明於世延祐初詔以科舉取士櫟不欲就有司強之試舉於鄉不復赴禮部敎授於家數十年性孝友剛正日用之間動中禮法與人交不以勢合不以利遷臨川吳澄嘗稱櫟有功於朱氏為多凡江東人來受業於澄者盡遣而歸櫟櫟所居堂曰定宇學者因以定宇先生稱之汪澤民婺源人少警悟家貧力學延祐中登進士第授承事郎同知岳州路平江州事以母老上書願奪所授官一二等得近地以便養不允厯遷兖州知州讞獄明斷所至有聲時衍聖公襲封爵三品澤氏建議謂宜陞其品秩以示襃崇朝廷從之至正中修遼金宋史召澤民赴闕除國子司業與修史書成遷集賢直學士移書告老以禮部尚書致仕後居宣州會長搶軍鎖南班等來寇城陷被執不屈遇害贈資善大夫江浙行中書省左丞追封譙國郡公謚文節吳訥休寕人善􅀐射至正間蘄黄賊熾訥起義兵官萬户從元帥李克魯同復徽州明兵臨郡戰敗不屈自剄死方囘歙人授建徳路總管致仕著讀易釋疑碧流集桐江集瀛奎律髓名僧詩話宋季雜傳諸書鄭玉歙人幼敏悟嗜學既長覃思六經尤􅃉於春秋絶意仕進而勤於敎學者門人受業者衆相與即其地搆師山書院以處焉至正十四年朝廷除玉翰林待制奉議大夫遣使者徴之玉辭疾不起居家日以著書為事所著有周易纂註十七年明兵入徽州守將欲要致之玉曰吾豈事二姓者耶因被拘囚具衣冠北向再拜自縊而死明汪克寛祁門人祖華受業􅀟峯饒魯得勉齋黄氏之傳克寛十嵗時父授以􅀟峯問答之書輒有悟後問業於吳仲迂志益篤元泰定中鄉試中選會試以答䇿直見黜葉科舉業盡力於經學所著春秋有經傳附録纂疏易有程朱傳義音考詩有集傳音義會通禮有禮經􅀘逸綱目有凡例考異四方執經門下者甚衆至正間蘄黄兵至挈家避深山太祖定徽婺克寛始返故鄉洪武初聘至京師同修元史書成將授官固辭老疾賜銀幣給驛還趙汸休寕人從九江黄澤遊得六經疑義千餘條及口授六十四卦大義與學春秋之要後復從臨川虞集遊􅀗聞吳澄之學乃築東山精舍讀書著述其中由是造詣精深諸經無不通貫而尤䆳於春秋初以聞於黄澤者為春秋師說三卷復廣為春秋集傳十五卷又著春秋屬辭八篇左氏􅀘註十卷太祖既定天下詔修元史徴汸預其事書成辭歸學者稱東山先生朱升休寕人少師陳櫟復往學於九江黄澤歸讀書紫陽祠中舉元鄉薦為池州學政蘄黄賊起退隱石門未嘗一日廢學太祖下徽州以鄧愈薦召問時務升對曰高築牆廣積糧緩稱王太祖善之遂參密議典禮章程悉預裁畫吳元年授侍講學士知制誥同修國史洪武初進翰林學士定宗廟時享之禮踰年請老歸卒升自幼力學至老不倦尤邃經學作諸經旁注辭約義精學者稱楓林先生子同官禮部侍郎詹同初名書婺源人至正中舉茂才異等除郴州學正後家黄州仕陳友諒為翰林學士承㫖兼御史太祖下武昌召為國子博士易名同淹貫羣籍講易春秋最善應敎為文才思泉湧太祖善之遷考功郎中直起居注洪武元年與御史文原吉等循行天下訪求賢才還屢進吏部尚書六年為學士承㫖與學士樂韶鳳定釋奠先師樂章又上言陛下渡江以來征討平定之績禮樂治道之詳乞編日厯以傳後世帝從之命同與宋濓為總裁官七年致仕後復起承㫖卒同以文章結主知應制專對靡弗敏贍而操行特耿介故至老眷注不衰後追贈禮部左侍郎謚文憲子徽有才智勤於治事累官吏部尚書兼左都御史後以太子少保坐藍玉獄誅死程國勝初名元佐休寕人太祖兵下徽州賜今名鄧愈署為總管府先鋒首破苗軍及長槍軍取嚴州敗張士誠兵畧地浙西所至皆㨗陳友諒入寇國勝與戰康郎山其將張定邊直犯太祖舟舟適膠淺國勝與諸􅀅駕飛舸奮擊水湧舟脫敵兵環繞國勝舟援兵不接力戰死之追封安定郡侯謚忠愍康永韶祁門人洪武初舉於鄉入國學選授御史成化初巡按畿輔劾尚書馬昂抑市民地四年偕同官胡深等爭慈懿太后山陵事彗星見復偕同官疏言大本未立異端太甚進退賞罰未公財賦工役未省賑濟無䇿備禦無方凡八事帝優詔答之會京察庶寮去留不當永韶等復劾大臣行私且摘刑部主事余志等十二人罪請并奪職帝不從但命不稱者考滿日奏黜志等上章自辨且訐永詔等奸利事遂俱下詔獄後得釋貶永韶順昌知縣久之有薦其知天文者韶還授欽天監正厯進禮部右侍郎仍掌監事坐多訛字落職歸鄭居貞徽州人洪武中舉明經授鞏昌通判升禮部郎中文行為時所重厯進河南參政永樂初坐方黨論死初孝孺敎授漢中居貞嘗作鳳雛行贈之且共以忠義各相砥勉死之日從容赴布無一言及私程通績溪人祖平坐事戍延安通以貢入太學上書乞赦還其祖詞甚哀切太祖憐而許之後以廷對稱㫖授遼王府紀善從王之藩遼東燕兵起從王浮海歸朝上封事數千言陳備禦䇿進左長史燕王即帝位從王徙荆州有言通前上封事多指斥者械至京死獄中家屬戍邊本朝乾隆四十一年賜謚節愍黄彦清歙人建文時國子博士以名節自勵永樂初以在駙馬都尉梅殷軍中私謚建文帝坐死并逮其從子金蘭等繫獄殷言彦清實不在軍中金蘭得釋福王時贈彦清光禄少卿本朝乾隆四十一年賜謚節愍方勉歙人永樂進士改庶吉士正統初授行在監察御史劾都御史李儀巡五軍敎場覈奏鎮遠侯顧興祖彈工部尚書吳中所舉非人出按江浙囘力言浙江急務莫切於防倭而防海都指揮張翥年老且貪不堪備禦升湖廣僉事厯右參議天順初致仕莊觀歙人永樂間舉於鄉分敎浙之義烏滿考優等升辰溪敎諭擢國子學正造士有方正統初以大司馬王驥薦擢陜西提學僉事秩滿升副使仍董學校景泰初奉表赴京乞歸吳永清歙人宣德中進士授行在兵部武庫司主事厯升本部右侍郎同于謙盡心戎務以勞瘁成疾陳情乞歸優詔許之楊彦謐歙人宣徳進士授刑部主事機警多才能蔚有時譽正統四年與都督吳亮征麓川賊款軍門約降彦謐曰兵未加而先降誘我也宜嚴兵待之不聽令督運金齒賊果大至諸將􅀗罪彦謐擢郎中復從王驥至騰衝破賊巢督戰有功師還超拜刑部右侍郎遭母憂奪情九年代侯璡參贊雲南軍務邊方定居景泰初召升禮部尚書其冬以足疾調南刑部英宗初命致仕程思温婺源人正統進士授中書􅃕人進禮部員外郎以清慎著聞已己扈英宗北征死於土木之難景泰癸酉追贈光禄少卿録一子太學程信休寕人正統進士授吏科給事中景帝嗣位數直言天順初録景泰中進言者信時入賀擢太僕卿㝷改左僉都御史巡撫遼東後以事謫降南京太僕少卿五年召為刑部右侍郎母憂歸成化初起復兵部左侍郎四川羣蠻數叛議發大軍討之進尚書提督軍務所向克㨗録功進兼大理寺卿改南京兵部參贊機務卒謚襄毅信有才力識大體征南蠻時許便宜從事迄班師未嘗擅賞戮一人許仕達歙人正統進士擢御史景泰初上疏言災沴數見請修省帝深納之未幾復請經筵之餘日延儒臣講論經史帝亦優詔襃答旋巡按福建劾鎮守中官廖秀鎮守侍御薛希連執漳州知府馬嗣宗送京師遷福建左參政天順中厯山東貴州左右布政使汪進婺源人天順進士官刑曹郎執法不阿治獄多所平反升山西僉事厯陜西左布政司卒進性峭直不畏權勢事親以孝聞撫􅀌姪曲盡恩意官三十餘年家無餘貲程敏政信子十嵗侍父官四川巡撫羅綺以神童薦英宗召試悦之詔讀書翰林院成化初進士及第厯左諭徳直講東言學問該博為一時冠孝宗嗣位擢少詹直經筵敏政名臣子才高負文學常俯視儕偶頗為人所疾宏治初御史王嵩等以雨災劾敏政因勒致仕五年起官厯進禮部右侍郎後贈禮部尚書著有新安文獻志明文衡汪奎婺源人成化初進士為秀水知縣擢御史以星變偕同官疏陳十事言甚切直居數月出為夔州通判宏治中屢遷右副都御史巡撫貴州致仕從子舜民中進士累官南京右副都御史好學砥行嬌矯持風節大負時望胡富績溪人成化進士授南京大理評事宏治初厯福建僉事以憂去起􅀘山東遷廣東副使制馭猺人平儋州黎亂厯陜西布政使正徳初入為奉天府尹累遷南京户部右侍郎劉瑾勒富致仕瑾敗起故官拜本部尚書南都倉儲僅支一年富在部三載有六年積上十餘事率權貴所不便格不行遂引年歸卒謚康惠洪遠歙人成化進士厯授南京監察御史數言事不避權貴升浙江僉事厯巡五道所至以鋤豪強撫􅀌煢為先務正徳中調湖廣制使㑹賑飢擇官分理獨委逺以全楚之半遷右副都御史巡撫雲南改南京大理寺卿晉都御史諭諸言事者務存大體切時弊勿以詆訐為事轉南京工部尚書即疏乞休㑹江西宸濠反調兵械備禦力疾視事以勞瘁卒逺守官四十餘年勤愼如一日當劉瑾用事馳驅逺方無所附麗疾革子侹問以家事不答但曰爾軰以忠孝立身足矣戴銑婺源人宏治進士改庻􅁻士授兵科給事中數有建白久之以便養調南京户科武宗嗣位偕同官請勅六科檢詳宏治間諸大政備録進覧凡裁決機務悉以為準報聞又言四方􅀊辦多非土産勞費滋甚宜蠲其所無既與給事中李光翰等奏留劉健謝遷且劾中官高鳳遂逮繫詔獄廷杖除名世宗立銑己卒贈光禄少卿潘選婺源人宏治進士厯山西按察僉事棄官歸養母母病思食鯽不可得遂解衣入池中捕之果得其二以供母及母喪哀毁卒潘珍婺源人宏治進士正徳中厯官山東僉事分巡兖州劉七等掠曲阜奏徙縣治而城之遷福建副使湖廣左布政嘉靖間巡撫遼東累遷兵部左侍郎諫討安南帝責珍撓成命禠職歸㝷以恩詔復官致仕珍亷直有行誼中外十餘慶皆報寢潘旦珍族子宏治進士知福建漳部二府三遷浙江左布政嘉靖間巡撫鄖陽累遷刑部侍郎後以兵部左侍郎提督兩廣軍務詔起復毛伯温討安南旦行過其里語曰安南非門庭寇公宜以終喪辭往來之間少緩期俟其聞命求款因撫之可百全也旦抵廣適安南使至馳疏乞容觀變時彼國自定章下禮兵二部族父珍適得罪黜旦議不用會伯温人都見旦疏不悅言總督重任宜擇知兵者遂改旦南京兵部以張經代之未行引疾乞休帝怒勒致仕將還吏白例攴庫金為道里費旦􅀏曰吾以不妄取為例卒贈工部尚書謝復祁門人幼聰敏長授春秋即了大義已歎曰學以謀道滯心文義以干禄吾弗為也於是潛心經史以古人自期聞吳與弼講道小坡往從之凡有得於講授者必心體力行三閱寒暑勿少懈既歸益修躬行日率其弟嘉侍親側饌具必躬治坐立不敢南面退與其妻葉氏相敬如賓與弟嘉敦友愛親殁不御酒􅁏冠婚喪祭悉遵古禮為郷人倡平居寡言笑接人和易晩居西山之麓學者稱為西山先生謝用祁門人生母馬氏方姙用父永貞客外嫡母妒而嫁之用既冠始知所生母又改適不知所在遂遍訪㝷宏治十五年果得之歸告父迎生母還居别室孝養二母曲盡其誠嫡母感悔令迎生母同居訖無間言鄰人失火至用舎風反火息時以為孝感唐臯歙人正徳中進士第一授修撰與修武宗實録進侍講學士未幾卒於官臯老於場屋暮年始登上第每為文下筆立就或求竄易字句伸筆直書不襲一字人咸服其才所著有心庵文集史鑑會編韻府增定諸書汪元錫婺源人正德進士厯都給事中時車駕數出幸屢疏切諫帝將親征宸濠元錫復諫阻宸濠就執復偕同官累伸前請封章數十上多與近倖爭執世宗即位遷太僕寺卿李福達獄起忤張璁下獄奪職後起官終户部侍郎潘鏗婺源人正徳進士授南京大理評事厯官都察院右副都御史巡撫四川改工部右侍郎督採木事竣奏言湖廣川貴諸府民疲於採辦請量議蠲復從之起撫兩廣以疾卒諡襄毅鑑性坦易不為危言激論而耿介卓立不可干以私治官如家恭勤潔白之操始終一致胡松績溪人正德進士授嘉興推官擢御史首劾臧賢錢安為宸濠黨及蕭敬陸完内外為奸俱不報又論東厰宜賜裁革又疏薦謝遷韓文彭澤林俊羅玘等忤時罷歸嘉靖初起復故官厯右副都御史治河漕疏言一淮不能受黄河之水必先治北岸乃為長䇿晉工部尚書伊王欲拓府第嚴嵩受賂許之松持祖制不許仇鸞欲召衆至京師給武庫仗松言邊兵不内駐武庫仗不外移鸞議遂格㝷告歸及卒賜祭􅁙潘潢婺源人父鐸務學循禮動法古人潢得家學舉正徳進士疏請行郊禮授樂清令徵入禮部進大學衍義勸經筵御溝改吏部前後累數十章皆切至署選事冢宰屬以私潢執不從累遷至户部尚書正色立朝以議條例不合即上疏自劾徙南工部再轉兵部留守南都上印綬歸潢貌不踰中人而守道守官萬夫莫抗居常恂恂言不出口至矢謨慷慨必盡所懷汪文輝婺源人嘉靖進士授工部主事隆慶中改御史時高拱權勢烜赫其門生韓楫等並居言路專務搏擊文輝亦拱門生心獨非之疏陳四事拱惡其刺已出為寕夏僉事御史孫丕揚忤拱為希㫖者所劾方行勘文輝抗言曰毛舉細故齮齕正人以快當路之私我固不肯為諸君亦不可也於是緩其事未幾劾者先得罪去丕􅀭竞􅀗免神宗時拱罷政召為尚寳卿㝷告歸殷正茂歙人嘉靖進士由行人選兵科給事中厯遷江西按察使隆慶三年擢右僉都御史巡撫廣西討平古田獞韋銀豹等進兵部侍郎提督兩廣時羣盜竊發所在騷然正茂經畧巡守以次盡平累功加兵部尚書萬厯三年召為南户部㝷改北請告家居後起掌南刑部二載乞歸汪一中歙人嘉靖進士由開封推官屢遷江西副使四十年鄰境賊入寇薄泰和當路以討賊屬之先是泰和巡檢劉芳力戰死一中至率諸將吏祭曰爾職抱關猶死疆事吾待罪方靣不滅賊何以生為遂誓師列陣鼓之俘五人斬首以徇旦日賦至軍潰一中躍馬當賊鋒力不支與指揮王應鵬千户唐鼎皆死之贈光禄卿諡忠愍洪垣婺源人嘉靖進士從學於湛若水累官御史前後章奏疏十上劾御史曹部以下得罪者數十人出按廣東㝷改温州知州歳饑有閉糴者饑民殺之垣坐落職歸與同里方瓘往從􅀂水之廣東若水為建二妙樓居之方瓘婺源人厭科舉學絶意仕進從湛若水遊嘗自廣東還同行友瘴死舟中例不載屍瓘秘不以告與同寢數日至韶州始發之汪垍休寕人嘉靖進士授户部主事督餉昌平時調京軍十萬禦角隘口垍飛芻輓粟一夕而備與修會典升福建兵備僉事分部福寕擊賊有功㨗聞賜金幣擢貴州參議㝷忤太宰李黙罷歸三十餘年足跡不入城市孫泗論漸磐俱進士胡宗憲績溪人嘉靖進士厯知益都餘姚二縣擢御史巡按宣大三十三年按浙江時歙人汪直據五島煽諸倭入寇而徐海陳東麻葉等巢柘林乍浦川沙窪日擾郡邑擢宗憲右僉都御史巡撫浙江㝷以為兵部右侍郎總督宗憲用間諭徐海縛獻麻葉陳東而激東黨攻海海投水死又令客蔣洲因汪直養子滶誘致汪直累以平賊功加右都御史兵部尚書太子太保晉少保卒諡襄懋汪道昆歙人嘉靖進士與王世貞同年世貞嘗稱其文簡而有法道昆由是名大起晩年官兵部左侍郎世貞亦嘗貳兵部天下稱兩司馬王寅歙人少年俶儻為諸生棄去不顧聞少林僧扁囤習兵仗甚精之少林受其術歸而盡破其産辭家逺遊海上用兵客胡宗憲幕多所匡正不能盡用竟以敗寅西入陜鄰省賊起寅馳告有司屬郡從事縣簿部民兵往賊且近按兵不行寅入軍中讓之兵乃乘連嶺賊果引去淛兵追及之殱焉晚自號十岳山人方宏靜歙人嘉靖進士厯東平知州江西副使以治行聞萬厯初累擢南京户部右侍郎督糧儲􅀊飢宏静月出倉粟給軍使無糴民間米價為平宏静沉厚篤實居官介然有守卒贈工部尚書程箕績溪人以歲貢授福安教諭嘉靖間倭寇陷城或謂君非守土宜避去箕曰義有死耳何避為遂遇害弟子從死者二十二人監司上其狀詔襃恤之謝廣祁門人父忠出遊不反廣年十六讀頴考叔事感而泣出往㝷父厯十餘年神枯髪秃竟不得歸侍母結樓望父繪像事之母亡具父衣冠招魂窆焉程振歙人生有至性幼喪母號泣甚悲事父暨繼母黄氏盡誠敬嘗有事於浙得父報病劇即兼程歸行且禱願減已年以增父夀父病益劇醫者弗藥遂刲股和糜進疾果愈後十餘年父復病振躬湯藥旦夕不離寢所者三年及居喪庭有紅金錢花忽變白如玉人咸以為孝誠所感云王應禎祁門人好任俠善騎射嘉靖中為新安衛指揮僉事流賊千餘突犯婺源甚急應禎從府同知張子瑫往救蓐食提戈直衝賊營賊衆披靡乃率衆圍之應禎殊死戰以無援死於陣事聞詔䕃其子時武舉王欽被執賊欲降之不屈極口罵賊支解死許國歙人嘉靖進士改庶吉士授檢討萬厯中厯吏部侍郎掌詹事府以禮部尚書兼東閣大學士入參機務後以雲南功進太子太傅廷臣爭請冊立有㫖二十年春舉行十九年秋工部郎張有徳以儀仗請奪俸國與王家屏慮事中變引前㫖力請帝不悅國遂引去疏五上乃許歸國在閣九年廉慎自守屢遭言官攻擊不能被以汙名卒贈太保諡文穆余懋學婺源人隆慶進士厯擢南京户科給事中萬厯􅀄張居正當國懋學屢忤居正傳㫖切責斥為民居正死起故官㝷擢南京尚寳卿御史李植江東之等以言事忤執政同官蔡系周孫希賢希執政㫖紛然攻訐懋學上臣工十蠹疏救之累遷南京户部右侍郎總理糧儲疏白程任卿江時之􅁈二人遂得釋後以拾遺論罷卒追諡恭穆江東之歙人萬厯進士由行人擢御史首發馮保徐爵奸受知於帝僉都御史王宗載承張居正指與于應昌共陷劉台東之疏劾之宗載與應昌俱得罪東之出視畿輔屯政奏駙馬都尉詹拱宸豪奪民田寘於理累遷右僉都御史巡撫貴州京察被劾免官歸卒東之官行人時刑部郎舒􅀖儒閤門病疫死遺􅀌一􅀊人莫敢過其門東之經紀其喪攜其􅀌歸乳之舒氏卒有後汪應蛟婺源人萬㦄進士授南京兵部主事累擢右僉都御史巡撫天津大興田利及移保定條畫墾田事宜帝亦報許後卒不能行召為工部右侍郎未上予告去已進兵部左侍郎以養親不出光宗立起南京户部尚書天唘初改北部東西方用兵驟加賦數百萬應蛟因列上愛養十八事帝嘉納焉應蛟為人亮直有守視國如家謹出納杜虚耗國計賴之㝷乞骸骨詔加太子少保馳傳歸陛辭疏陳聖學引宋儒語以宦官宫妾為戒卒於家潘士藻婺源人萬厯進士厯官御史巡視北城慈安宫近侍侯進忠牛承忠私出禁城狎婦女邏者執之為所毆訴於士藻移牒司禮監治之帝恚曰東厰何事乃自外庭發杖兩閹斃其一張鯨方掌東厰怒會火災修省士藻直言鯨乃􅈭帝怒謫廣東布政司照磨科道交章論救不聽厯遷尚寶卿卒於官洪文衡歙人萬厯進士授户部主事帝將封皇長子為王偕同官賈巖合疏爭㝷改禮部與郎中何喬逺善喬逺坐詿誤被謫文衡己遷考功主事竟引疾歸起南京工部厯郎中力按舊章杜中官横索節冗費為多進光禄少卿改太常中外競請起廢帝卒報寢久之乃特起顧憲成憲成已辭疾忌者猶憚其進用御史徐兆魁首疏力攻之文衡慮帝惑兆魁言抗章申雪㝷進大理少卿以憂去泰昌元年起太常卿卒贈工部右侍郎舒榮都黟人萬厯進士為御史侃直敢言嘗上疏論邊情辨門户言皆剴切魏忠賢竊國柄榮都疏劾之及楊左被害榮都飲鴆死崇禎初贈太常少卿吳宗堯歙人萬厯進士授益都知縣性強項中官陳增以開礦至守令多屈節知屬吏宗堯獨具賓主禮其爪牙程守訓宗堯邑子也宗堯惡其奸不與通後盡發增不法事列狀奏聞請以一身易萬人命帝得疏意動持不下會給事中包見捷郝敬相繼請治增罪帝乃不悅責宗堯狂逞要名已而削宗堯籍增遂劾宗堯阻撓礦務遣使逮治民大譁欲殺増宗堯行民􅂘聲震地既至下詔獄拷訊繫經年釋為民卒天啟時贈光禄少卿賜祭録一子畢懋良歙人由進士授萬載知縣擢南京吏部主事厯福建左布政以善績稱厯順天府尹擢户部右侍郎督倉場以不附魏忠賢為御史張訥所論落職間住兄弟相繼去國士論以為榮崇禎時起工部右侍郎㝷致仕畢懋康歙人萬厯進士以中書舍人簡授御史視鹽長蘆天啟中累官右僉都御史撫治鄖陽魏忠賢以其為趙南星所引欲去之御史王際逵劾其附麗邪黨遂削籍崇禎初起南京通政使厯南京户部右侍郎督糧儲旋引疾歸懋康雅􅀒器局􅆒厯中外與族兄懋良並有清譽稱二畢鮑應鼇歙人萬厯進士厯禮部郎中皇太子生母王氏薨詔喪禮視世廟沈貴妃應鼇以沈妃禮簡考穆宗生母孝恪太后故事上之應鼇端亮有學識議事持正不阿羣小忌之謝病歸汪泗論垍孫萬厯中進士授漳浦令調福清以慈明為治徴授山東道御史建言請杜内批又請召還楊漣李若珪巡按江西敦重持大體厯掌河南京畿道升太僕寺少卿嘗識黄道周於童子試按江西首拔章世純陳際泰人皆服其精鑒余懋衡婺源人萬厯進士除永新知縣徴授御史巡按陜西稅監梁永嘗輦私物於畿輔役人馬甚衆懋衡奏於朝其爪牙樂綱俾膳夫毒懋衡再中毒不死收拷膳夫􅀗綱所予賄及餘蠱遂上疏極論永罪不省天啟初累官兵部右侍郎理戎政三年八月廷推南京吏部尚書以懋衡副李三才帝用懋衡懋衡以資後三才力辭引疾歸明年􅂯授前職璫勢方張堅卧不起奸黨張訥醜詆講學諸臣懋衡遂削奪崇禎初復官江秉謙歙人萬厯進士知鄞縣以廉能徴授御史入臺侃侃言事劾尚書李汝華尸素宜亟罷力頌熊廷弼保守危疆功與給事中郭鞏不合兵部尚書張鶴鳴右王化貞掣肘廷弼化貞既敗秉謙連疏攻鶴鳴乞寘於法坐奪俸半歲仍再疏數其罪復與給事中惠世􅀭周朝瑞等劾沈㴶并詆中官劉朝及乳媪客氏内外胥怨遂出秉謙於外家居四年聞忠賢益專擅憂憤卒方國儒歙人四􅀊失父奉母以孝聞天啟初舉於朝崇禎間授保康知縣邑小素無備賊至城陷國儒冠服生堂上被執大罵身中七刃死本朝乾隆四十一年賜諡烈愍康正諫祁門人起家舉人天啟中和州學正流賊犯和州正諫偕妻汪氏子婦章氏赴水死十一年本朝乾隆四賜諡烈愍程嘉燧休寕人少不羈弃舉子業學擊劍不就乃折節讀書精音律工書畫而詩尤工世推為松圓詩老僑居嘉定歸老於歙有集吳兆休寕人與程嘉燧齊名稱新安二布衣著有金陵廣陵姑蘇豫章諸稿汪偉休寕人崇禎初進士慈谿知縣政績大著十一年帝念寇氛日熾擇知推治行卓絶者入翰林偉擢檢討充東宫講官十六年賊陷承天荆襄偉以留都根本可慮上江防綢繆疏帝嘉納之爲特設九江總督前後所言皆切時務及賊犯都城守兵乏餉不得食偉出貲市餅餌以餽己而城陷偉語繼妻耿氏善撫幼子耿曰吾獨不能從公死乎因以幼子託其弟投繯死偉欣然曰是誠吾志爰書壁曰翰林院檢討講官汪偉同繼室耿氏死節貽子觀書勉以忠孝乃自經本朝賜諡文毅金聲休寕人好學文名傾一時崇禎元年進士授庶􅁻士明年大兵逼都城聲慷慨乞面陳急務帝召對平臺嘉納之改御史屢疏言國家事不用遂乞歸八年起山東僉事兩疏力辭鄉郡多盜聲團練義勇爲捍禦十六年冬廷臣交薦即命召用促入都陛見未赴京師陷福王擢聲左僉都御史堅不起南京城破列郡望風迎降聲紏集義勇保績溪黄山分兵扼六嶺唐王遥授聲右都御史兼兵部右侍郎總督諸道軍陷旌德寕國諸縣九月大兵襲破之聲被執不屈死本朝乾隆四十一年賜諡忠節其門下士江天一歙人同時殉節乾隆四十一年賜諡節愍方士亮歙人崇禎進士由推官入爲給事中舉劾無所避中樞陳新甲主敘之罪自士亮發之待命數日髪爲之白其論中官出鎮之􅁦語尤切至周延儒出督師令贊軍務延儒􅀗譴並下獄後釋歸淩駉歙人崇禎癸未進士以兵部主事從督輔李建泰出拒闖賊至保定駉獨與賊戰􅀍創既死復甦乃走臨清建義於齊豫間勢不可支從容自盡吳可箕休寕人國子生明末城破題詩衣衿縊死於雞鳴山關忠義祠馬嘉祁門人崇禎舉人十七年聞都城陷整衣賦詩北面再拜投繯死十一年本朝乾隆四賜祀忠義祠本朝張光祁歙人順治丁亥進士知鄧州鄧當兵亂之餘光祁招徠勸墾漸復其故㑹湖南用兵光祁督理戰艦區畫有方有盜壘於下莊光祁單車諭之皆感泣就撫擢禮部員外以河決不忍去治河七晝夜卒於鄧鄧人祠之王自亮歙人任山西太谷縣典史順治六年縣民田登魁作亂城破被監禁而死贈主簿王廷陞婺源庠生順治十六年叛兵圍婺源廷陞傾家募鄉勇拒守城陷被殺時同邑民人王祐光率衆殺賊數百人力竭陣亡康熙三年賜卹吳正治休寕人漢陽籍順治已丑進士由侍講出補江西參政升陜西按察使所至以清亷執法著内擢工部侍郎晉禮部尚書拜武英殿大學士守成法持大體以病致仕汪宗洙婺源人順治初以􅀊貢知内邱縣縣境諸山為盜藪時出擾民流亡者衆宗洙多方捍禦撫輯民漸來歸府推官閱囚至其繫獄僅二人歎其不煩有古循吏風卒於官貧至無以為殮縣民皆感悼趙吉士休寕人順治初以舉人知交城縣自明季劇盜嘯聚深山吏不敢詰吉士因勸農閱荒率數􅀐入山宿土窰訪其山川險易一日與同官飲却月湖張樂賊聞不為備夜半忽斂兵疾行由間道搗賊巢擒百人撫定山民一千四百餘户叙功陞户部主事厯給事中著有平交山寇本末及萬青閣自訂集鄭之文休寕人順治己丑武進士官台州遊擊屢立戰功丙申馬信反率羣賊攻城之文單􅀐衝戰却之丁酉海寇大至之文堅守閱月食援俱絶賊斬門人百計誘降之文大罵遂遇害闔門盡節死周士選績溪人順治中以貢授陸川知縣時寇盜嘯聚士選單􅀐入賊壘􅄏誠撫諭俱降復墾田土招流亡境内以安胡公著績溪人順治戊戌進士知靈壽縣有武舉為盜魁者前令不敢詰公著廉知之延與之飲密令捕役於席上擒之次日羣盜來刼被殺吳雯清休寕人順治壬辰進士授潯州府推官峒賊逼城雯清固守有功郡有數大獄久不決雯清立為剖斷擢監察御史江起龍歙人順治中任廣東水帥參將駐白鴿寨通明港修理營署煥然一新遷副將移營海安口出海