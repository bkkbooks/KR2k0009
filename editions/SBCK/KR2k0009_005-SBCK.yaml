  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_005-1a}
body:
  text: 順天府四關隘天津關在宛平縣西二百十五里一名天門口一名大口外通保安州一百里内至宛平縣沿河口三十里又西南有天橋關口黎園嶺口洪水口西龍門口支鍋口南接淶水縣馬水口大通關在通州南張家灣之長店百貨彚集處明永樂中置巡司後裁居庸關在昌平州西北去延慶州五十里關門南北相距四十里兩山夾峙巨澗中流懸崖峭壁稱為絶險即吕氏春秋九塞之一也漢書地理志上谷郡居庸縣有關後漢書光武紀建武十五年徙雁門代郡上谷三郡民置常山居庸關以東水經注居庸關在沮陽城東南六十里居庸界濕餘水導源關山南流厯故關下谿之東岸有石室三層其户牖扇扉悉石也蓋故關之候臺矣南則絶谷累石為關址崇墉峻壁山岫層深側道􅄶狹林鄣􅃉險路才容軌其水厯山南徑軍都縣界又謂之軍都關又南流出關謂之下口隋書地理志昌平有關官唐梁載言十道志居庸關亦名薊門關通典居庸關北齊改爲納款唐書地理志昌平縣西北三十五里有納款關即居庸故關亦謂之軍都關程大昌北邊備對居庸關大行山最北之第八徑也東西横互五十里而中閒通行之地才闊五步元文睿宗於居庸關立南北口屯軍徼巡盜賊各設千戸所至大四年樞密院奏居庸關古道四十有三軍吏防守之處僅十有三舊置千戸位輕責重於是改千户所爲萬户府分諸軍屯駐東西四十三處置隆鎮上萬户以統之皇慶元年始改爲隆鎮衞親軍都指揮使司延祐元年又以哈魯勒軍千戸所隸焉方輿紀要居庸關明洪武二年大將軍徐達壘石爲城三年置守禦千户所永樂二年置隆慶衛領千户所五以爲京師北面之固本朝初設叅將駐守後改都司千把總屬焉關城之南有南口城去州二十五里亦南北二門自南口而上兩山之閒一水流焉道出其上十五里爲關城又八里爲上關有小城亦南北二門又七里爲彈琴峽又七里爲青龍橋道東有小堡又三里至八達嶺嶺上有城亦南北二門元人以此為居庸北口今有把總戍守哈魯勒軍舊作哈兒魯軍今改正慕田峪關在昌平州北一百二十里渤海所北有堡今設把總其北又有田仙峪砦賈兒嶺口又東即密雲幵達口也鎮羅關在密雲縣東六十里有二城東為新城西為舊城北去牆子嶺三十里有把總戍守其北為北水峪口又北為黃門口其南為南水峪口魚子山口皆有堡接薊州之將軍關黃門口關在密雲縣東八十五里鎮羅關北磨刀峪關在密雲縣東九十三里牆子嶺東又東南為南峪砦口皆有堡幵連口關在密雲縣西北三十里其南有幵連口堡黃花鎮東第十一關口也西北接昌平之擦石口東北為神堂峪口河防口又東為大水峪又東為小水峪白道峪牛盆峪東水峪西石城驃騎諸堡又東接石塘嶺諸關口皆屬密雲所轄而近懷柔縣北黃崖口關在密雲縣西北八十里石塘路西北有堡其東有高家莊石佛馮家峪三堡又北即白馬關也白馬關在密雲縣西北八十里東去潮河川九十里有城設把總戍守其東有陳家峪堡其西有高家堡其北為白馬正關東接響溪口西駝骨口西為白崖峪馮家峪口接黃崖口石塘嶺關在密雲縣北五十里大水峪東北有城周二里有奇舊設參將本朝改設石塘路都司今改守備縣志石塘嶺關東自陳家峪西抵开連口延袤二百四十七里轄關寨二十二冊説石塘路兼領營堡二十三西駝骨關在密雲縣北一百二十五里白馬關東北其東有陳家峪外口又東為河七寨口皆有堡又東即潮河川也小黃崖關在密雲縣東北九十里牆子嶺北又北一里為大黃崖關皆有堡又北即黒峪關也牆子嶺關在密雲縣東北九十里有城周一里有奇有水關舊設參將本朝改設牆子路都司縣志牆子嶺關東自魚子山西抵大黃崖口延袤二百三十一里轄堡寨十一冊説牆子嶺路兼領營堡十五古北口關在密雲縣東北一百二十里亦曰虎北口唐書地理志燕樂縣東北八十五里有東軍北口二守捉古北口長城口也金史地理志密雲縣古北口國言曰留斡嶺元史古北口千户所於檀州北面東口置明實錄永樂八年塞古北口小關及大關外門僅容一人一馬昌平山水記唐莊宗取幽州遼太祖取山南金之破遼兵敗宋取燕京皆由古北口故中居庸山海而制其扼塞者古北喜峯二口焉縣志古北路東自盧家安寨西抵蠶房谷寨延袤一百四十七里轄關寨十六冊説古北路兼領營堡八通志古北口有營城周四里有奇雄踞山巔至為險峻明洪武十一年置守禦千户所三十年改為密雲後衞嘉靖以後設㕘將駐守本朝順治初改為都司康熙三十二年設提督為重鎮兼置巡司曹家寨關在密雲縣東北一百四十里司馬臺城東西去潮河川營六十里有城周六里有奇為古北口東第十三關口明設㕘將本朝改設都司縣志曹家寨關東自小臺兒寨西至將軍臺寨延袤一百三十五里轄關寨二十冊説曹家寨路兼領寨堡十黒峪關在密雲縣東北一百六十里有城有水關設把總戍守其西有漢皃嶺口倒扳嶺口土牆柏嶺安口又西接古北口其東轉而南有燒香峪口南峪溝口走馬安口大姦峪口又南接大黃崖口歧溝關在涿州西南三十五里即今歧溝店市益津關在霸州文獻通考永清縣唐置益津關復入契丹寰宇記周顯德六年收復三關遂於益津置霸州將軍關在薊州西北七十里接密雲縣界有把總黃崖關在薊州北四十里將軍􅀜東南有上下二營設把總戍守其北三十五里曰尋思峪又北十五里為柞兒峪皆有堡又車道峪堡在黄崖峪東又東為青山嶺口古强峪口黃松峪關在平谷縣東又東與密雲縣將軍石關相接􅀜北為熊兒峪關又西為熊兒峪營今邊界分屬密雲而其地則逼近縣境黃村巡司在大興縣東南三十里禮賢莊巡司在大興縣東南六十里采育巡司在大興縣東南七十里居民數千家為畿輔首鎮本朝設巡司駐此乾隆二十六年有御製采育里詩盧溝橋巡司在宛平縣西南三十里元置巡司本朝因之王平口巡司在宛平縣西一百二十里西去沿河口九十里即金章宗遊處明初華雲龍言自王平口西至易州西北五十里之官坐嶺關隘有九相去約五百餘里俱衝要地宜設兵屯守宏治中嘗築城於此今有巡司石港口巡司在宛平縣西一百九十里東去沿河口二里又西十里有東龍門口又西即天津關也蘆臺鎮巡司在寕河縣東南去寶坻縣一百四十里即古蘆臺軍元至元十九年立蘆臺鹽使司明亦設蘆臺場置巡司本朝初裁巡司後復設磁家務巡司在房山縣北二十里淀河巡司在霸州中營北岸巡司在薊州沿河口在宛平縣西二百里其東里許有沿河城舊設守禦千户所本朝改設守備今設都司駐此又東即昌平州洪鎮山城也錐石口在昌平州西北三十二里西接居庸關北接黃􅀲峪為州境第二道邊城陳友諒口在昌平州西北四十里錐石口南其西亦接居庸關其東為雁門口又東為石城谷水口有堡為州境第三道邊城石峽峪口在昌平州西北八十里糜子口東口内有石峽峪堡舊設守備後改把總又東北為花家窑口又東為黒豆峪又東即八達嶺南臨居庸黃􅀲峪口在昌平州北少西六十五里八逹嶺東又東為青龍橋口又東為石佛寺口洪鎮山口在昌平州西少北一百六十里有城亦曰洪鎮山圓城其西接宛平縣沿河口稍東為唐虞庵水口又東有唐虞庵小口又東為直巷嶺有城又東為火口嶺稍折而北為分水嶺又東為牛臘渚口糜子峪口再東即石峽峪也􅁅嶺口在昌平州北西去雁門口十八里自居庸關東至黃花鎮凡九十一口而􅁅嶺為衝要德勝口在昌平州北二十里又名翠屏口北去雁門口五里又東為賢莊口龍嶺口在昌平州北四十里有把總駐守其西接賢莊口其北有門家口又北接黄花鎮頭道關口在昌平州北六十里撞道口東又北五里為二道關口其西為雞子口内有雞子峪堡小長峪口在昌平州北六十里其北有萬㵎口南接小長峪北接二道關牆有犄角之勢大長峪口在昌平州北六十里小長峪東内有堡其東北為南治口大榛峪口驢鞍嶺口磨石水口擦石口内俱有堡又東接密雲縣界以上洪鎮山石峽峪黃􅀲峪頭道關小長峪大長峪及下西水峪諸口皆州境第一道邊城也西水峪口在昌平州北六十里石佛口東又東爲撞道口内皆有堡􅀌山口在房山縣南五十六里􅃰易二州分路處也苑家口在霸州東南十八里明景泰中置口頭村巡司今裁張青口在保定縣凸峙衆流之中舟舶往來所必經商賈湊集最爲繁盛拱極城在宛平縣西四十里盧溝橋東明崇禎聞築名曰北拱門二南曰永昌北曰順治特設參將控制之本朝更名拱極城屢有修葺改永昌門曰威嚴設西路捕盗同知巡司及遊擊駐守乾隆二十九年修張家灣城在通州南十五里以元時萬户張瑄督海運至此而名東南漕運至此乃運入通州爲南北水陸要會又自潞河南至長店四十里水􅀔環曲官船客舫駢集於此舊設倉以儲糧明嘉靖三十一年築城周九百五丈有奇門四又爲便門一水關三今設都司駐防鞏華城在昌平州東南二十里其地本名沙河店明永樂中建行宫於此嘉靖十九年築城環之周四里門四設守備駐防本朝設北路捕盜同知及都司駐此白楊城在昌平州西四十里長峪城南亦曰白楊口元置白楊千户所於此明正德中建城跨南北兩山下當兩山之衝周三里有奇門二後又建新城於其西南嘉靖復設守備駐此本朝撥把總戍守其東爲蘇林口湯峪口又東即居庸關南口也鎮邊路城在昌平州西一百里接宛平縣界明正德十五年築東西跨山周三里門三設守禦千户所後又增築一城於其西曰鎮邊新城門三本朝順治初設㕘將駐守後改都司今舊城巳廢横嶺城在昌平州西北八十里鎮邊城東北明宏治十八年築東西跨山南北當兩山之衝周一里有奇門三舊設守備今改把總長峪城在昌平州西北八十里横嶺城南明正德十五年築城上跨兩山下據西山之衝周一里門二後又築小城於其西亦曰長峪新城舊設守備駐守今改把總黃花路城在昌平州東北一百里舊名勃海所明宏治中置千户所於此萬厯初移置於慕田峪四年復還舊治本朝順治初改設黃花路叅將駐守後改都司今又改守備石匣城在密雲縣東北六十里亦名石匣營營西有石如匣因名明宏治十七年築城周四里有奇本朝特設副將駐守後改為逰擊乾隆十年二十六年城俱重修東北十里為瑶亭子建有行宮又一里為新開嶺又十里為稻黃店又十二里即古北口高宗純皇帝鑾輿所經皆屢有御製詩潮河川營城在密雲縣東北一百里南去石匣城四十里西有小城曰潮河川堡舊設潮河川守禦千户所今改把總其東為龍王峪亦有堡司馬臺營城在密雲縣東北一百二十里潮河川城東又東有吉家營城皆有把總戍守信安鎮在永清縣東南五十里與霸州接界即宋信安軍詳見古蹟馬頭鎮在東安縣西又桃河頭鎮在縣南四十里王慶坨鎮在武清縣南八十五里其地川藪錯綜東通大海有千總駐此隸靜海營都司黃花鎮在昌平州北八十里有城元置千户所於此當居庸古北二關之中北連四海冶為京師北門明置㕘將守備駐此本朝初裁今有把總戍守宋城鎮在順義縣東北二十里唐時置戍守處紅螺鎮在懷柔縣北十里狼虎廟鎮在文安縣西北二十里為南北通衢蘇橋鎮在文安縣北四十里接霸州界當水陸之衝貨物雲集明建文初燕王自固安渡拒馬河駐師蘇家橋即此柳河鎮在文安縣東北有集勝芳鎮在文安縣東北七十里居民萬餘家貿易時舳艫千計李壇鎮在大城縣南四十里又