知文儒乃修學宫畫孔子七十二子漢晉名儒像自為贊敦勸生徒由是大化宋慶禮永平人為河北度支營田使兼營州都督開屯田八十餘所追拔漁陽淄青沒户還舊田宅又集胡商立邸肆不數年倉廥充居人蕃集遂罷海運收􅀊儲邊亭晏然賈循華原人累官雁門副使安祿山使守幽州顔杲卿招之以傾賊巢穴循許之向潤客發其謀賊縊殺之宋石曦太原人雍熙中知霸州兼部署會陳廷山謀以平戎軍叛入北邊曦察知之與侯延濟定計擒廷山以獻丁罕潁川人淳化中知霸州河溢城圯罕以私錢修築民咸德之楊應詢益州郫人徽宗時知保定軍霸州塘濼之閒地沮洳水潦易集居人浮板以濟應詢増隄防為長衢濬其旁以泄流民利賴之遼耶律合住保寕中拜􅃰州刺史曉暢戎政久任邊防務鎮靜不妄生事以邀近功屬部乂安鄰壤敬畏耶律儼析津人大安初為景州刺史繩胥徒禁豪猾撫老恤貧未數月善政流播郡人刻石頌德大公鼎渤海人咸雍中為良鄉令省徭役務農桑建孔子廟學部民服化金劉煥中山人由任城尉調中都市令樞密使璞薩瑚圖家有條結工牟利於市不肯從市籍役煥繫之瑚圖召煥煥不往暴工罪而笞之煥初除市令過謝其鄉人吏部侍郎石琚琚不説曰京師浩穰不與外郡同棄簡就煩吾所不曉也至是始重之璞薩瑚圖舊作僕散忽土今改正唐古里大定初為大興尹帝謂之曰京師好訛言府中奸吏為民患卿雖年少有治才去其宿弊無為因循廉察入第一等進階榮祿大夫七年五月大興府獄為之空詔賜宴勞之唐古里舊作唐括安禮今改正烏古倫元忠上京人大定中知大興府事有僧犯法吏捕得置獄貴主屬使釋之元忠不聽主奏其事帝召謂曰卿不狥情正可嘉也治京如此朕復何憂烏古倫元忠舊作烏古論元忠今改正伊拉素玉魯部人為大興尹大定中帝幸上京顯宗守國使人謂之曰自大駕東巡京尹所治甚善我將有春水之行當益勤乃事還以所􅀗鵞鴨賜之伊拉素舊作移刺慥玉魯部舊作虞吕部今改正完顏守道完顔部人厯獻祁濱薊四州刺史大定中幸都過薊父老遮道請留再任焦旭柏鄉人大定時為大興令以杖親軍百人有司議罪帝曰旭親民吏也免之改良鄉令平章政事石琚薦其能召為左警巡使完顏永功大定末為大興尹有老嫗與男婦憩道旁婦從所私亡去嫗告伍長踪迹之有男子私殺牛手持血刃望見伍長意其捕已即走避嫗與伍長疑殺其婦捕送縣不勝楚毒遂誣服問尸安在詭曰棄之水中矣求之水中果得一尸已半腐縣吏具獄永功疑之曰婦死幾日而尸遽半腐哉頃之嫗得其婦於所私家永功曰是男子以殺人就獄其拷掠足以稱殺牛之科矣釋之去武清黃氏望雲王氏豪猾不逞永功發其罪畿内肅然完顔伯嘉翁鄂羅必拉明安人明昌初調中都巡警判官孝懿皇后妹晉國夫人家奴買漆不酬直伯嘉鈎致晉國用事奴數人繫獄晉國白章宗章宗曰姨酬其價則奴釋矣由是豪右屏迹翁鄂羅必拉明安舊作訛古魯必刺猛安今改正王翛涿州人明昌二年知大興府事時僧徒多遊貴戚門翛惡之乃禁僧午後不得出寺嘗一僧犯禁皇姑大長公主為請翛曰奉上命即出之立召僧杖一百死京師肅然承安閒知大興府事闕詔諭宰臣曰可選極有風力如王翛輩者伊拉里瑚魯圖明安人明昌三年畿内饑擢授霸州刺史既至首出俸粟食饑者於是倅以下及郡人遞出粟以佐之且命屬縣視為法多所全活郡東南有隄久圯水屢為害益增修之民以為便為立祠伊拉里譯見前隄堰門清河隄注瑚魯圖明安舊作胡魯土猛安今改正承暉本名福興章宗時知大興府宦者李新喜有寵用事借大興府妓樂承暉拒不與豪民與人爭種稻水利不直厚賂元妃兄左宣徽使李仁惠仁惠使人屬承暉右之承暉即杖豪民而遣之謂其人曰可以此報宣徽也宣宗遷汴承暉與太子留守中都元兵攻之仰藥死李遹欒城人泰和中為大興幕官時瑚芬知府事賈權恃􅀔奴視同列遹獨抗之不少假借摘瑚芬陰事數十條欲發之瑚以非罪䧟遹幾不測卒􅀗免瑚芬舊作虎賦今改正徒單公弼孫卓貨明安人大安初知大興府事讞武清盜疑其有􅁈已而果􅀗真盜孫卓貨明安舊作算主海猛安今改正舒佳佛申薊州明安人貞祐二年為提控與同知順州軍州事温德亨岳查拉守密雲縣佛申家屬在薊州元岳得之以示佛申曰若連降當以付汝否則殺之佛申曰吾受國厚恩宣以家人生死為計耶城破死於陣岳查拉被執亦不屈死舒佳佛申舊作术甲法心明安改見前温德亨岳查拉舊作温迪罕咬查刺今並改正錫登繁峙人貞祐􅀄知大興府登以在京貧民闕食者衆宜立法賑救乃奏曰京師官民有能贍給貧民者宜計所贍升職遷官以奬勵之遂定權宜鬻例格全活甚衆錫登舊作胥鼎今改正富察乣舍盤安軍節度判官與雞澤縣令温德亨錫佛訥同守薊州衆潰而出乣舍錫佛訥死之富察乣舍舊作蒲察乣舍温德亨錫佛訥舊作温迪罕十方奴今並改正元齊努至元七年授大都路總管兼大興府尹馭吏治民有方以暇日正街衢表里巷國學興工尤盡其力齊努舊作千奴今改正耶律有尚至元中知薊州以清􅂤得民心劉德温大興人大德中同知大都路總管府事輦轂之下供億浩繁德温措置有法民用不擾亷瑚遜哈雅至治閒同知順州事有弓匠提舉莫都拉者恃􅀔奪州民田同列畏之瑚遜哈雅至即治其罪亷瑚遜哈雅舊作廉惠山海牙莫都拉舊作馬都刺今並改正明葛誠建文時為燕王府長史王佯病誠密告張昺謝貴宜為備又與䕶衞指揮盧振約内應謀泄俱死謝貴建文初為北平都指揮使與張昺並受密命伺察燕事燕王舉兵不屈而死彭二建文初為都指揮燕師起夜攻九門克其八獨西直門未下二躍馬市中曰燕王反從我殺賊者賞集兵千餘人將攻端禮門燕王遣健卒格殺之馬宣建文時為都指揮守薊州燕兵攻大寕宣發兵將攻北平與燕王戰於公樂驛而敗退保薊州燕將張玉等急攻之宣出戰􅀍擒罵不絶口死曾濬建文時為薊州鎮撫與馬宣同守薊城被擒不屈死李驥郯城人永樂中知東安縣事有病民輒奏於朝罷免之有􅄔婦子死於狼婦奔訴驥驥禱城隍神深自咎責明旦狼死於其所張需天順中知霸州患民多遊食里置一籍識人户大小多寡之數限以恒業所種栗麥桑􅀥及紡績之具雞豚之畜皆有定數暇則入鄉驗其籍缺則有罰於是民無游惰何瑛􅂎縣人成化初東安縣主簿邑南窪下􅀊有水患瑛相度地勢東自南壇旁開創河渠經楊官屯直達甄家莊之河口西自縣西之北隱旁開創河渠經馬子莊直逹挑河頭之河口水得通行害去八九今遺址尚存張憲德興人成化中順天府尹時高貲富人率營充將軍校尉輒得優復致下户重困憲疏陳其弊并及均馬政恤民難省冗費三事悉允行在職四年權豪畏懾楊廉豐城人正德初為府尹時京軍數出車費動數千金廉以頻􅀊水旱請以大興遞運所餘銀供之奏免夏税萬五千石慮州縣巧取民財為置歳辦簿具載其數吏無能為姦革和買借辦之擾釐各官夫馬銀於徭役吏不得多取定陵户貧富撥補之法以絶影射皆著為例張汝舟渾源州人正德中知大城縣流賊臨城與主簿李銓俱戰死汝舟贈光祿寺丞銓贈知縣馬永遷安人正德時以都督僉事充總兵官鎮守薊州盡汰諸營老弱􅃪其農賈取傭直以給健卒由是永軍獨雄於諸鎮武宗至喜峯口欲出塞永叩馬諫帝笑而止中路擦崖當邊衝永築城堡遷軍守之嘉靖初累立戰功進右都督永善用兵且亷潔及卒州人為立祠馬芳蔚州人嘉靖時以薊州副總兵分守建昌土蠻十萬騎薄界嶺口芳與總兵官歐陽安力戰擒其驍騎猛克兎等賊初不知芳至是免冑示之賊驚曰馬太師也遂却張守中聞喜人嘉靖末知通州巡撫某敗績於邊馳入州守中不納巡撫怒將治五衞軍升守中不從乃止王四維河曲人天啟閒知􅃰州有旨建魏忠賢祠四維堅不奉詔被謫葉廷秀濮州人天啟中授順天府推官英國公張維賢謀奪民産廷秀斷歸於民維賢怒愬於朝廷秀亦愬於朝迄還民劉宗周山陰人崇禎初官府尹所陳奏皆極剴切都城戒嚴傳旨辦布囊八百中官競獻騾馬宗周曰是必有以遷幸動上者詣午門叩首諫自晨至暮中官傳旨乃退京尹為卿貳遷轉之階無舉其職者宗周政令一新挫豪家尤力閹人請託輒不應或相詬䛨宗周治事自如武清伯蒼頭毆諸生宗周捶之枷武清門外出過籠篋纍纍詢為司禮監奏樂器焚之通衢賙恤單丁下户備至居一載謝病歸都人為罷市党還醇三原人崇禎中為良鄉知縣城破死之贈光祿丞任光裕崇禎初知香河縣城破死之贈光祿丞武起潛進賢人崇禎初知武清縣有諸生為人所訐納金酒甕以獻起潛召學官及諸生貧者數人置甕庭中謂之曰美酒不可獨享與諸君共之酒盡金見其人惶恐請罪即以金分􅂌貧者治縣一年有聲調繁遵化坐事被劾解官候代城破死之高承􅓨秀水人崇禎時知遷安縣調寶坻縣多中貴豪猾倚之為奸承􅓨以法繩之不少貸其他剔除蠹弊民賴其利會大兵入所過城邑皆克獨寶坻圍九日堅守不下師旋復來環攻二十四日終不下事聞莊烈帝嘉其功命優敘王禹佐崇禎九年以保定通判攝昌平州事大兵至與守陵太監王希忠等固守城陷俱死之禹佐子亦從死同時殉節者判官胡維忠吏目郭永學正解懷亮訓導常時光守備咸貞吉贈恤有差上官藎曲沃人崇禎初知順義縣廉執有聲在官三年薦章十餘上大兵至率衆固守城破自經死同殉節者遊擊治國器都指揮蘇時􅀨訓導陳所藴趙國鼎樂平人崇禎中知寶坻縣有政聲大兵破城死之同死者主簿樊樞典史張六師訓導趙秀王鑰武功人崇禎中知文安縣大兵至率紳士堅守七晝夜城破與主簿安衡典史湯國紀訓導郭養性皆死之贈太僕寺少卿趙煇河津人崇禎中為霸州兵備副使勤於其職大兵至與知州楚雄丁師羲督士民固守及城破煇自盡師羲亦死之贈煇光祿寺卿師羲布政司㕘議高維岱昌邑人崇禎中知永清縣視事甫旬日大兵至一門死之贈按察使僉事鄒養性崇禎中永清教諭大兵至與典史李時卿鄉官劉維蕙同盡節本朝蔣三捷奉天人順治初任通州兵備道廉明有威政教甚舉陳維新奉天人順治四年任昌平兵備道時渤海盜起官兵勦捕株連及州維新請兵無入境身保無賊州人􅀗全陶宏才會稽人為東安縣典史順治五年妖賊劉東坡寇東安時知縣以事赴保定宏才即率兵三百餘出城奮擊斬􅀗甚衆再戰為賊所執奪刀殺數賊自剄死陸光旭平湖人順治九年知保定縣大水決隄繼以大疫光旭請免被災田賦仍罄已貲煮粥以賑擢御史去復請免霸州及文安保定荒地逋糧後轉冀南道聞保定復罹水澇遣人持金分給貧民民立祠祀之韓文富平人順治十年知文安縣時畿南大水縣當最下湮沒尤甚文捐貲易栗以賑賊發親率鄉兵捕誅渠魁縣境旗民雜處爭訟日多文常單騎遍厯莊屯多方開諭民情大安宋文運南宫人康􅄉閒為順天府尹杜絶請謁事有不便於民者立為革除輦下肅清成王臣河南人康􅄉二年知三河縣在職三年不遣一吏訟者令其自拘至即訊決民大悦服祖延泰奉天入知霸州舊時凡興大役給兵米及解部耗費㮣徵之民其數多於正賦延泰盡為禁革大兵北征州當供車馬延泰盡出巳貲辦具不以煩民民至今德之張大有郃陽人康􅄉中任順天府丞多惠政入祀名宦祠劉德宏開源人康􅄉中知涿州寛仁敏練案無留牘獄鮮滯囚潘永圖金壇人康􅄉閒知薊州有犯罪者賄當事請寛之永圖焚其書立置於法何訥崑山人康􅄉中知保定縣水澇大至訥晝夜築隄捍禦嘗中夜視工馬驚墮水溺幾死縣多逋税以羨餘代之彭鵬莆田人康􅄉二十三年知三河縣邑當幾輔之衝素稱繁劇豪猾譸張往往持令短長俾得咎去鵬下車以拊循釐剔為事有奸民冒宗親名詣縣關説公事立燭其奸寘之法又嘗親乗馬佩刀手擒羣賊在任六年不名一錢以廉幹稱聖祖仁皇帝雅知鵬在官循績二十七年巡幸畿輔駐蹕三河召見論對良久特賜三百金以奬其廉陳兆崙錢塘人乾隆十九年為順天府尹先是順天所治置官車以供役其户求退輒别簽他户又時以軍役旁午議民私畜車注官籍以備急需兆崙奏罷官車而力寢籍者之議民以不擾官用亦給在任三年吏怵其威民懷其德前提調官臣沈兆澐恭纂輯提調官臣王廣䕃恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校大清一統志順天府五人物漢韓嬰燕人孝文時為博士景帝時至常山太傅推詩人之意作内外傅數萬言燕趙間言詩者由嬰武帝時嬰嘗與董仲舒論於帝前其人精悍處事分明仲舒不能難也孫商亦為博士韓延夀燕人父義為燕刺王郎中以諫死燕人憫之昭帝時魏相言宜賞其子遂擢延壽為諫大夫遷淮陽太守從潁州又徙東郡為吏上禮義好古敎化所至必聘其賢士以禮待用廣謀議納諫諍在東郡三􅀊治行為天下最入守左馮翊為蕭望之所劾坐棄市吏民莫不流涕韓福􅃰郡人行義著聞元鳳元年賜帛旌之寇恂昌平人初為郡功曹王郎兵起恂説太守耿况附光武至昌平襲殺邯鄲使者奪其軍與况子弇等俱南光武拜為偏將軍河内初定難其守鄧禹曰昔高祖任蕭何於關中無西顧憂終成大業恂文武備足有牧人禦衆之才遂拜太守行大將軍事時軍急乏恂講兵肄射伐竹為矢養馬收租以給軍轉翰前後不絶朱鮪遣將攻温恂馳赴擊破之光武大喜曰吾知㓂子翼足任也厯守潁川汝南擒討賊盜鎮撫吏民治績稱最封邕奴侯入為執金吾恂經明行修名重朝廷所得秩祿厚施朋友故人及吏士時人歸其長者以為有宰相器卒謚威侯嚴授漁陽人為郡兵馬掾元初中鮮卑寇漁陽太守張顯率吏士追出塞伏兵發授身􅀍十創殁於陣虜射中顯顯墜馬主簿街福功曹徐咸以身擁蔽虜並殺之朝廷愍授等節各除子一人為郎中陽球泉州人舉孝廉􅀘尚書侍郎嫻達政事章奏處議為臺閣所崇信拜九江太守討平山賊厯遷司􅀠校尉奏收中常侍王甫等杖殺之徙為衞尉與司徒劉郃議收按張讓曹節等為節所誣奏誅死盧植涿郡人性剛毅有大節嘗懷濟世志通古今學好研精不守章句建寕中徴為博士九江蠻反四府選植才兼文武拜太守蠻冦賓服又守廬江前後俱著恩信黄巾賊起拜北中郎將連戰破斬萬餘人為中官所譖檻車徵復為尚書何進謀誅中官召董卓植知卓必為後患固止之不從及卓議廢立植獨抗議卓怒將誅植議郎彭伯諫卓曰盧尚書海内大儒人之望也卓乃止免植官遂遁隱上谷三國漢張飛􅃰郡人少與關忠義俱事昭烈曹操追昭烈及於當陽之長坂飛將二十騎拒後據水斷橋瞋目橫矛曰身是張翼德也可來共決死敵皆無敢近者從諸葛亮上益州生􅀗嚴顔壯而釋之所過戰克益州平領巴西太守擊破張郃拜車騎將軍封西鄉侯飛雄壯威猛亞於關忠義俱稱萬人敵卒謚桓侯簡雍􅃰郡人性跌宕優游風議少輿昭烈善從至荆州為從事中郎往來使命昭烈圍成都雍入城説劉璋歸命拜昭德將軍魏徐邈薊人文帝時厯官涼州刺史羌胡服其威信正始初遷司隸校尉百僚敬憚後拜司空固辭不受卒謚穆侯韓觀薊州人有鑒識器幹與徐邈齊名盧毓植子幼􅀌遇本州亂二兄死難毓養寡嫂撫兄子以學行見稱文帝時為睢陽典農校尉遷安平廣平太守所在有惠化入為侍中多所駁爭擢吏部尚書作考課法選舉先性行而後言才封容城侯謚曰成田豫漁陽人爲弋陽南陽太守所在有治績文帝初遣使持節䕶烏桓校尉正始初爲䕶匈奴中郎將領并州刺史徴爲衞尉屢乞遜位司馬宣王不聽豫曰年過七十而居位譬猶鐘鳴漏盡而夜行不休是罪人也遂固稱疾篤晉張華方城人學業優博於書無所不覽武帝受禪拜黄門侍郎帝與羊祜潛謀伐呉惟華贊成其計晉史及儀禮憲章並屬於華多所損益詔誥皆所草定惠帝即位累拜侍中中書監盡忠匡輔封壯武郡公爲趙王倫所害華雅好書籍嘗徙居載書三十乘天下奇秘世所罕有悉在華所所著有博物志十篇及文章並行於世盧欽毓子清澹有遠識官至吏部尚書封大梁侯武帝受禪以爲都督􅃆北諸軍事平南將軍在鎮寛猛得中入爲尚書僕射領吏部舉必以才稱廉平清忠高潔不營産業動循典禮所著詩賦論難數十篇盧志欽從子初爲鄴城令成都王穎鎮鄴愛其才以爲諮議參軍後表爲中書監留鄴參署相府事蕩隂之敗志督兵迎帝及王浚攻鄴勸潁奉惠帝還洛陽帝幸張方壘惟志不離左右從至長安及潁薨官屬奔散志親自殯送時人嘉之子湛字子諒善屬文爲司空從事中郎撰祭法注莊子及文集皆行於世劉沈薊人博學好古衞瓘辟爲掾領本邑大中正敦儒愛賢後以侍中假節討李流河間王禺請留爲軍司尋領雍州刺史及禺遣張方入京師詔沉入衞況馳檄四境聚衆萬餘與禺督䕶虞䕫戰於好畤敗之禺急呼張方還救沉軍潰爲陳倉令所執謂禺曰知巳之顧輕在三之節重投袂之日期以必死辭義慷慨遂遇害霍原廣陽人少有志力叔父坐法當死原入獄訟之楚毒備加終免叔父年十八遊太學貴遊子弟皆欲與見後歸鄉里山居積年門徒百數燕王月致羊酒元康末與王裦等以賢良徴不至王浚謀僭使人問原不答遂爲所害南北朝梁張宏策方城人幼以孝聞居母憂三年不食鹽菜兄弟友愛甚篤從武帝起兵参帷幄封洮陽侯盡忠事上知無不爲交友故舊隨才薦拔不以貴勢自高祿賜皆散之親友後爲賊所害子緬嗣爵緬弟纘綰皆知名成景儁范陽人父安樂魏睢陽太守爲常邕和所敎景儁購人刺邕和並鴆殺其子弟後除北豫州刺史侵魏所向推智勇有政績卒謚忠烈魏盧元涿人太武辟召天下儒雋以元為首授中書博士遷侍中使馮宏稱臣請附外兄崔浩每與言輒嘆曰對子真使我懷古之情更深後賜爵固安侯諡曰宣子度世學行為時流所重厯官濟州刺史能安輯邊境高閭雍奴人博綜經史下筆成章少為車子送租至平城修刺詣崔浩浩與語奇之使為謝中書監表明日浩厯租車過駐馬呼閭諸車子皆驚由是知名和平末為中書侍郎與中書令高允入參大政承明初為中書令給亊中詔令書檄碑銘贊頌皆其文也厯相州幽州刺史宣武踐阼累表遜位授光祿大夫賜安車几杖百僚餞送如二疏故事卒諡文貞閭强果敢直諫好為文章集四十卷其文亦高允之流後稱二高為當時所服平恒燕郡人躭勤誦讀多通博聞自周暨魏帝王傳代之由貴臣升降之緒皆撰品第號曰畧註合百餘篇徵為中書博士出為幽州别駕廉貞寡欲不營資産妻子不免饑寒遷秘書丞卒謚曰康盧淵度世子温雅寡欲有祖父風敦尚學業閨門和睦襲爵累加秘書監本州大中正孝文將立馮后淵固請更􅁲及議伐齊又表諫後為徐州長史以誠信得人和初盧志法鍾繇書子孫傳業世有能名洲習家法代京宫殿多其所題寇祖訓上谷人為順陽太守與弟祖禮並孝友敦睦白首同居父亡雖久猶於平生所處堂宇備設帷帳几杖以時節開堂列拜垂涕陳薦吉凶之事必先啟告遠出行反亦如之祖禮後為都督討蠻陣殁贈衞大將軍盧道將洲子涉獵經史風氣謇諤應襲父爵固請讓弟道舒詔許之累官遷燕京太守卒于司徒司馬弟道䖍好禮學難齊尚書令王儉喪服集記七十餘條次子懷仁涉學有詞性恬靜閒雅厯宏農郡守不之任卜居陳留時高其風尚酈道元范陽人父範官至平東將軍景明中道元為冀州鎮東府長史行州事後除御史中尉執法清刻為時所忌遣為關右大使蕭寶夤反力屈被執瞋目叱賊而死道元好學厯覽奇書撰水經注四十卷行世盧同度世族孫􅄉平􅀄累遷尚書左丞明帝時人多􅀼冒軍功同閲吏部勲書得竊階者三百餘人表乞刋定從之以功封章武縣伯永熙初卒贈尚書右僕射盧義僖淵弟子早有學尚識度沈雅九􅀊喪父有至性起家秘書郎厯大中大夫散秩多年澹然自得霍太后臨朝黄門侍郎李軌勢傾朝野求結婚姻義僖俱不許普泰中官尚書驃騎大將軍左光祿大夫寛和惠慎不妄交款性清儉雖居顯位每至用乏麥飯蔬食怡然甘之盧元明亦淵弟子涉獵羣書兼有文義天平初拜尚書右丞相兼黄門郎本州大中正善自標置不妄交遊性好元理作子史雜論數十篇諸文别有集錄盧景裕同兄子少敏專經為學避居不營世事貞素自得齊神武聞景裕經明行修特徴使敎諸子先是景裕注周易尚書孝經論語禮記老子齊文襄令解所注易景􅁉理義精微吐發閒雅從容往復無際可尋興和中卒於晉陽所注易行於世弟辯少好學博通經籍正光初舉秀才為太學博士以大戴禮未有解詁乃注之齊神武起兵節閔遣辯持節勞之神武令辯見其所奉中興主辯抗節不從神武怒辯抗言酬答守節不撓孝武入關事起倉卒辯不及至家單馬從至長安封范陽郡公時朝儀湮墜凡朝廷憲章乘輿法服金石律呂晷刻渾儀辯因時制宜皆合軌度累遷尚書令北齊平鑒燕郡人少聽敏學詩禮通大義不爲章句以軍功累遷襄州刺史齊神武起兵信都鑒棄州自歸即授本官文襄輔政遷懷州刺史時魏將楊標來攻井竭乏水鑒具衣冠而祝至旦泉涌進開府儀同三司終都官尚書令李廣范陽人博涉羣書有才思少與趙郡李謇齊名爲邢魏之亞以才學兼侍御史修國史南臺文奏多其詞也天保初欲以爲中書郎遇病篤而止廣雅有識度坦率無私爲士流所愛有文章七卷鮮于文宗漁陽人年七􅀊喪父父以種芋時亾對芋嗚咽如此終身鮮于世榮漁陽人少沈敏有器幹封義陽郡王領軍大將軍太子太傅周武帝入代送瑪瑙酒鍾與之得便撞破周兵入鄴諸將皆降世榮獨鳴鼓不輟被執不屈死張曜昌平人天保初累官尚書右丞厯事數世奉職恪勤未嘗有過每得祿賜散之宗族性節儉車服飲食取給而巳好讀春秋月一遍時人比之賈梁伯周寇儁上谷人寛雅有識量好學强記不以財利為心累官梁州刺史入關拜秘書監時軍國草創墳典散佚儁選置令史抄集經籍四部羣書稍備加標騎大將軍開府儀同三司儁敎授子弟動循典禮明帝尚儒重德特欽賞之卒謚曰元周惠逹文安人父信厯樂鄉平舒成平令皆以亷能稱惠達幼有節操好讀書魏大統中為尚書右僕射自關右草創禮樂缺然惠逺與禮官損益舊章儀軌稍備雖居顯職而謙退下人盡心勤公愛拔良士人皆敬之盧誕本名恭祖范陽人度世族弟博學有詞采文帝以誕儒宗為當世所推拜國子祭酒恭帝初除秘書監隋盧愷范陽人父柔魏中書監愷性孝友穎悟解屬文有當世幹能開皇初除尚書吏部侍郎攝尚書左丞每有敷奏侃然正色雖逢喜怒不改其常帝親考百僚以愷為上盧昌衡范陽人博涉經史工行草書開皇初拜尚書禮部侍郎文帝嘗大集羣下令自陳功人皆競進昌衡獨無所言高熲目而異之出為徐州總管有能名吏部尚書蘇威考之曰德為世表行為士則論者以為美談終太子左庶子盧思道昌衡從弟聰爽俊辯師事河間邢子才就魏收借異書才學兼著有集二十卷盧楚范陽人少有才學大業中為尚書右侍郎當朝正色甚為公卿所憚帝幸江都官僚多不奉法楚紏舉無所􅂞避越王侗稱尊號以楚為内史令與元文都等同心戮力及王世充作亂皇甫無逸呼楚同去楚曰僕與元公有約苦社稷有難誓以俱死今捨去不義及兵入賊黨執送世充所鋒刄交下支體糜碎唐盧承慶􅃰人思道孫父赤松與高祖雅故終率更令范陽郡公承慶美儀矩博學而才少襲爵累官民部侍郎貞觀中帝問厯代户版承慶敘夏商至周隋増損曲折引據該詳帝嗟賞後拜刑部尚書以金紫光祿大夫致仕卒謚曰定弟承業尚書左丞有能名張知謇方城人兄弟五人知元知晦知泰知默皆明經高第暁吏治清介有守調露時知謇為監察御史裏行後厯十一州刺史所莅有威嚴中宗時以大理卿致仕知謇性敏亮惡請謁求進士每敕子孫經不明不得舉家法可稱云盧照隣范陽人十歲徙曹憲王義方授蒼雅調鄧王府典籖王愛重之調新都尉以病去官其文章與王勃楊炯駱賓王齊名天下稱為四傑盧粲范陽人擢進士第神龍中累遷給事中節愍太子立韋后疾之諷中宗以衞府物給東宫粲駁奏太子不可與諸王等夷武崇訓死詔墓視陵制粲固執爭之得罷安樂公主怒出為陳州刺史終邠王傅魯炅幽州人從哥舒翰破吐番以功除右領軍大將軍安祿山反炅保南陽賊使田承嗣攻之炅被圍一年晝夜戰人相食卒無救乃率衆􅋓圍走襄陽承嗣尾擊炅殊死戰二日斬􅀗甚衆賊引去初賊欲剽亂江湖賴炅扼其衝故南夏以完䇿勲封岐國公陳利貞范陽人為平盧將從李光弼自行間累遷太子賓客封靜戎郡王李希烈攻哥舒曜於襄城利貞登陴捍守七十日未嘗櫛沐朱泚反利貞麾下從亂夜半難作利貞拔劍當軍門大呼曰欲過門者先殺我衆畏其勇乃止德宗嘉之擢汝州防禦使盧羣范陽人曹王􅆏節度江西奏為判官以勁直聞入為侍御史郭子儀家與嬖人訟德宗促案羣奏子儀有大勲德今所訟皆其家事請勿問人謂其識大體累遷兵部尚書淮西呉少誠擅決洧水漑田使者止之不奉詔命羣臨詰既聽命又為陳古今逆順禍福以感動之少誠竦然不敢桀以奉使稱旨遷檢校秘書監後代姚南仲為鄭滑節度使李景畧良鄉人李懷光為朔方節度辟署巡官遷大理司直懷光屯咸陽將襲東渭橋召幕府計議景畧曰殺朱泚還軍諸道仗䇿詣行在此轉禍為福也不聽既出軍門慟􅂘曰豈意此軍乃䧟不義乎遂遁歸靈武節度使杜希全表置於府累轉豐州刺史州當囘紇通道囘紇使梅錄入朝景畧折之梅錄不敢抗以父行呼景畧自此囘紇使至者皆拜於庭威名顯聞遷左羽林將軍對德宗延英殿奏論侃侃有大臣風為河東行軍司馬復拜豐州刺史天德軍西受降城都防禦使窮塞苦寒地瘠鹵邊户勞悴景畧至與士同甘苦鑿咸應永清二渠溉田數百頃聲雄北疆囘紇畏之卒贈工部尚書蔡廷玉昌平人朱泚為幽州節度使奏署幕府廷玉有沈畧善與人交内外愛附時幽州兵强不知上下禮法廷玉勸泚歸貢賦助天子又勸入朝泚將校縛廷玉辱之囚歲餘不能屈待之如初後從泚入朝德宗聞其言詔以大理少卿爲泚司馬泚弟滔傲肆數有請於泚廷玉屢折之滔表請殺廷玉不從會滔以幽州叛帝乃貶廷玉柳州司户參軍以慰滔滔將縛致麾下支解之廷玉告其子曰我爲天子不血刄下幽州十一城欲裂其壤而敗於將成吾不可以辱國比至靈寶自投於河而死李惟簡范陽人兄惟岳叛惟簡奉母鄭奔京師及德宗如奉天惟簡將赴難謀於母母督其行乃斬關出道更七戰得及行在討賊有功帝徙山南惟簡以三十騎從帝曰爾有母乃能從朕耶對曰臣誓以死趨興元惟簡前導及帝還封武安郡王圖形凌煙閣盧景亮范陽人學無不覽第進士宏辭德宗時官右􅀘闕與楊質同在諫爭地書數上鯁毅無所囘貶朗州司馬廢抑二十年憲宗時召還再遷中書舍人景亮有經國志嘗謂人君足食足兵而又得士天下可爲也乃掇治道之要著書上下篇號三足記又作答問言輓運大較及陳西戎利害公卿服其達古今云高崇文其先自勃海徙幽州七世同居開元中再表其閭崇文樸重寡言貞元中從韓全義鎮長武城治軍有聲累官金吾將軍敗吐蕃於寕州封勃海郡王全義入朝留知節度後務劉闢反杜黄裳薦崇文統兵討之自閬中岀卻劒門兵解梓潼之圍與闢戰于鹿頭山八戰皆捷擒闢送京師成都珍貨如山無秋毫之犯衣冠脅汙者爲條上全活之進檢校司空西川節度副大使南平郡王刻石紀功卒謚威武配享憲宗廟庭高霞寓范陽人其先五代不異居孝聞里閭霞寓從高崇文撃劉闢有功拜彭州刺史元和中以左威衞將軍隨吐􅋓承璀及諸將討王承宗獨霞寓有功詔藏所􅀗鎧仗於神䇿庫以旌之賈島范陽人初爲浮屠名無本韓愈敎之爲文章舉進士不第當其苦吟雖逢值公卿貴人皆不覺文宗時坐飛謗貶長江主簿卒普州司倉叅軍劉蕡昌平人明春秋沈健於謀浩然有救世意擢進士第時宦人横甚蕡常痛疾太和二年舉賢良方正能直言極諌引諸儒百人於庭策之考官見蕡對嗟伏以爲過古晁董而畏中官不敢取士人讀其詞至感激流涕諫官御史交章論其直時被選者二十三人所言皆冗齪常務􅀋得優調河南府㕘軍李邰上疏云臣所對不及蕡遠甚乞回臣所授以旌蕡直不納令狐楚牛僧孺皆表蕡幕府授秘書郎以師禮禮之而宦人深嫉蕡誣以罪貶柳州司戸參軍卒昭宗時贈右諌議大夫五代唐趙鳳幽州人少以儒學知名明宗時為端明殿學士好直言安重誨用事殺任圜明宗不能詰鳳獨號哭呼重誨責之重誨慙不能對術士周元豹以相法言人事多中明宗以為神將召至京師鳳力諫止有僧將佛牙以獻鳳請騐其真偽因以斧碎之天成中拜門下侍郎同中書門下平章事重誨得罪羣臣無敢言獨鳳數言其忠罷為安國軍節度吏王思同幽州人敢勇善騎射好學頗喜為詩輕財重義唐明宗時為匡國軍節度使鎮雄武列柵以禦吐蕃五年来朝明宗問以邊事思同指畫山川陳其利害明宗始知其才後為京兆尹西京留守潞王從珂反鳳翔馳檄諸鎮思同執其使送京愍帝嘉其忠以為西面行營都督署討從珂諸鎮兵潰思同走潼關從珂追執之責曰罪可逃乎思同曰非不知從王而生恐終死不能見先帝於地下從珂怒其言乃殺之趙玉安次人爲滄州節度判官呂兖客劉守光破滄州兖舉族被害兖子琦年十五見執將就刑玉紿監者曰吾弟也監者信之縱琦去琦足弱不能行玉􅀒之逾百里變姓名乞食於道以免後琦官至兵部侍郎玉仕至職方員外郎琦事之如父周扈載北燕人少好學善屬文廣順初舉進士高第爲監察御史嘗遊相國寺見庭竹作碧鮮賦題其壁顯德中帝聞之遣小黄門就壁錄之覽而稱善擢知制誥遷翰林院學士尋病卒張藏英􅃰州人唐末舉族爲賊孫居道所害藏英年十七僅以身免後居道避地關南藏英乃求爲關南都巡檢使至則微服攜鐵撾伺其出擊之遂擒歸刳其心以祭父母詣官首服官爲上請而釋之燕薊間目爲報讐張孝子顯德時授緣邊招封都指揮使從征九橋關爲先鋒都指揮使敗遼兵於關北宋趙普薊人父迥徙洛陽初掌書記乾德二年拜門下侍郎平章事普阮相帝視如左右手事無大小悉咨決焉厯相二朝累拜太師封魏國公卒謚忠獻帝爲撰神道碑銘親製八分書賜之普初寡學術帝勸以讀書晚年手不釋卷既辛家人發篋視之乃論語二十篇也性深沉能以天下事爲巳任宋初在相位者未有其比帝疑曹彬不軌普爲辯雪保證遂遇彬如舊咸平初追封韓王配饗廟庭高彦暉漁陽人練習邊事乾德時王師伐蜀爲歸州路先鋒全師雄之亂崔彥進遣彦暉討之戰不利獨與部下十餘騎力戰皆死上聞痛惜命優卹之董遵誨范陽人屢立戰功乾德六年以西夏近邊授通遠軍使遵誨不知書豁達無崖岸多方畧武藝絶人在通遠軍凡十四年安撫一面夏人悦服劉廷讓其先范陽人滄州節度守文之孫初領江寕軍節度乾德二年伐蜀爲副都部署率兵由歸州進討連破松木諸砦峽中郡縣悉下蜀平王全斌等皆坐縱部下掠奪左降惟廷讓秋毫無犯全師雄等作亂廷讓與曹彬討平之太平興國中知雄州卒贈太師張暉大城人累遷華州團練使朝廷方議征蜀遷鳳州團練使兼緣邊巡檢濠砦橋道使暉盡得山川險易密疏陳之帝大悦以暉充西川行營先鋒都指揮使督兵開大散關路躬撫士卒且役且戰人忘其勞至青泥嶺卒大禧中暉妻年百五歲家貧詣闕自陳詔賜束帛錄其孫趙贊薊州人德鈞之孫延夀子年七歲誦書二十七卷特賜童子及第初鎮延州太宗時以功封衞國公卒贈侍中贊頗知書喜為詩接士大夫以禮馭衆有方畧吏民畏服為時賢帥云竇儀漁陽人父禹鈞以詞學名仕周累官諌議大夫高義篤行家法為一時表式儀學問優博風度峻整建隆初遷工部尚書兼判大理寺奉詔定刑統為三十卷再入翰林為學士帝屢稱其有執守欲相之為趙普所忌不果及卒帝憫然曰天何奪我竇儀之速耶弟儼侃偁僖皆相繼登科當時號為竇氏五龍儼性夷曠好賢樂善優游䇿府凡十餘年所撰周正樂成一百二十卷詔藏史閣有文集七十卷尤善推步星厯偁初拜右補闕太宗領開封府選偁判官推官賈炎言矯誕偁叱之太平興􅀦中叅知政事帝曰卿能以公直責賈炎朕旌直臣耳劇可久范陽人沈毅方正明律令初授光祿卿與竇儀等共定刑統致仕卒凡為廷尉四十年用法平允以仁恕稱扈䝉安次人少能文初為翰林學士受詔同修五代史詳定古今本草累官工部尚書自張昭竇儀卒典章儀注多䝉所刋定有鰲山集二十卷宋琪幽州人太平興國中自員外郎累遷尚書拜同平章事琪素有文學尤通吏術究知蕃部兵馬山川形勢數言邊事多見采用在相位百執事有所求請咸面折之又有宋雄者亦幽州人涉獵經史善談論有氣節初與琪齊名燕薊間謂之二宋雍熙中知均唐二州遷將作監所至職務修舉田重進幽州人形貌奇偉積功至靖難軍節度使雍􅄉中出師北征擒遼驍將大鵬翼逐北四十里連下飛狐靈州等城重進不事學乾德時晉王愛其忠勇遺以酒炙不受謂使者曰為我辭晉王我知有天子耳及帝即位知其忠樸始終委遇焉呂餘慶幽州人父琦晉兵部侍郎初藝祖領同州聞餘慶有才奏為從事累官吏部侍郎開寶六年與宰相更知政事印拜尚書左丞卒餘慶厚重簡易自藝祖領藩鎮即為元僚受禪趙普等先用恬不為意會普忤旨左右爭傾普餘慶獨辯明之時稱其長者呂端餘慶弟初為太常丞厯中外四十年持重識大體以清簡為務至道末帝疾大漸内侍王繼恩等謀立楚王元佐李后命繼恩召端端知有變鎻繼恩於閤内使人守之而入后曰立嗣以長如何端曰先帝立太子正為今日乃奉太子之殿中真宗旣立端平立殿下不拜請捲簾升殿審視然後率羣臣拜呼萬歲真宗每見輔臣入對惟於端肅然拱揖不以名呼卒贈司空謚正惠端有器量寛厚多恕意豁如也雖屢經擯退未嘗以得喪介懷輕財好施不問家事嘗兩使絶域其國歎重之後有使往每問端為宰相否其名顯如此張鑑范陽人藏英孫幼嗜學入衞州零落山肄業十餘年太平興國初第進士累拜監察御史決獄江左頗雪􅁈滯遷江南轉運使去大姓為民害者江左震肅淳化中盜起西蜀命鑑安撫之拜諫議大夫厯知廣州郎州相州卒馬知節薊人父全義仕周以戰功厯播州刺史宋初領果州團練使從征李筠筠退澤州全義攻拔之知節以䕃􅀘官景德中擢簽書樞密院事時遼巳盟中國無事大臣方言符瑞而知節每不然之嘗言天下雖安不可忘戰去兵進兼樞密副使時王欽若為樞密使知節薄其為人每廷議輒面詆之遇事敢言未嘗少屈聞其風者皆欽其正直焉終彰德軍留後知貝州卒贈侍中謚正惠孫浦保定軍人十世同居真宗時旌表仍蠲其課調張玉保定人以六班散秩隸狄青麾下號張鐵簡從征儂智高率突騎横貫賊壘賊大潰帝召見使作鋭陣於殿廷下觀破賊之勢累遷宣州觀察使為副都總管河北三十七將以玉為第一張世傑范陽人少從張柔戍杞有罪遂奔宋隸淮兵中呂文德召為小校累功加環衞官命守鄂州元兵降鄂州世傑提所部兵入衞遂復饒州入朝累加保康軍承宣使遣將取浙西諸郡復平江安吉廣德溧陽諸城進沿江制置副使元兵迫臨安從二王入福州拜簽書樞密院事北兵攻之乃奉益王入海益王殂衞王昺立拜少傅樞密副使從崖山封越國公張宏範攻崖山世傑以十餘艦奪港去後還收兵崖山復欲求趙氏後立之俄颶風壞舟溺死遼韓延徽安次人累官崇文館大學士中外事悉令㕘決以功拜左僕射世宗朝遷南府宰相卒贈尚書令遼初庶事草創凡營建制作法度井然延徽力也為佐命功臣之一子德樞未冠守左羽林大將軍授遼興軍節度使封趙國公韓紹勲延徽孫仕至東京户部使㑹大延琳叛被執不屈賊以鋸解之憤罵至死弟紀芳重熙間參知政事廷議征李元昊力諌不聽聞敗嘔血死康黙記本名照少為薊州衙校帝侵薊州得之愛其材隸麾下一切蕃漢相涉事屬默記折衷之悉合帝意時文法未備黙記推析律意論決輕重不差毫釐罹禁網者人人自以為不􅁈拜左尚書佐命功臣其一也室昉南京人幼謹厚篤學不出户外者二十年會同初登進士第累遷翰林學士出入禁闥十餘年數延問古今治亂得失奏對稱旨後拜門下平章事整析蠧弊知無不言務在息民薄賦以故法度修明朝無異議楊佶南京人統和中舉進士第一累遷翰林學士文章號得體同知南京留守發倉廪振乏絶貧民鬻子者計傭出之除吏部尚書同中書門下平章事以進賢為已任總大綱責成百司人人樂為之用有登瀛集行於世馬得臣南京人好學博古善屬文尤長於詩累官翰林學士以正直稱聖祖閲唐高宗太宗明皇三紀得臣錄其行事可法者進之帝擊鞠無度得臣上書言有不宜者三帝嘉歎卒贈太子太保張儉宛平人性端慤不事外飾統和中舉進士調雲州幕官故事車駕經行長吏當有所獻聖宗獵雲中節度使進曰臣境無他産惟幕僚張儉一代之寶願以為獻召見訪及世務條奏三十餘事由此顧遇特異大同中拜左丞相封韓王受詔輔立興宗拜太師中書令加尚父在相位二十餘年禆益為多牛温舒范陽人剛正尚節義有遠器重熙中舉進士累遷户部使轉給事中知三司使事國民兼足上以為能拜參知政事知南院樞密使事夏為宋所攻來請和解温舒使宋遂許夏和還加中書令劉伸宛平人少以詞翰聞重熙中登進士第累遷大理卿伸明法而恕按􅁈獄全活者衆道宗嘗曰今之忠直耶律玦劉伸而巳拜參知政事上曰卿勿憚宰相時北院樞密使耶律乙辛勢焰方熾伸奏曰臣於乙辛尚不畏何畏宰相乙辛排之出為保靜軍節度使王鼎􅃰州人博通經史清寕中成進士累官翰林學士當代典章多出其手金韓企先燕京人乾統進士天會十二年為尚書右丞相召至上京入見帝驚異曰朕疇昔嘗夢見此人今果見之於是方議制度企先博通經史知前代故事因革咸取折衷企先為相每欲為官擇人專以培植奬勵後進為已任推轂士􅀋甄别人物一時臺省多君子彌縫闕漏密謨顯諫宗翰宗幹雅敬重之世稱賢相焉大定八年配享廟庭程寀析津人祖冀凡六男父子皆擢科第士族號其家程一舉寀入金厯翰林待制右諫議大夫上䟽言宜追崇祖宗釐正風俗立紀綱嚴宫禁􅄉宗嘉納之仕至彰德節度使寀剛直耿介不謟奉權貴以希苟進有古君子之風韓昉燕京人天慶二年進士第一天會四年高麗國表稱藩而不肯進誓表昉充使至高麗移督再三高麗徵國中讀書知古今者商㩁辭旨使專對皆為昉所屈乃進誓表如約昉還宗幹大悦曰非卿誰能辦此累遷禮部尚書翰林學士兼太常卿加開府儀同三司封鄆國公昉性仁厚善屬文尤長於詔冊撰太祖睿德神功碑當世稱之高昌福宛平人天㑹進士辟元帥府令史皇統初宗弼復治河南元帥府汴人有疑似􅀍􅀗皆目為宋諜者即殺之昌福讞得其實釋去甚衆世宗時官至河中尹致仕翟永固良鄉人海陵時為禮部侍郎分護燕京宮室役事請寫無逸圖於殿壁不納正隆二年為翰林學士承旨詔至内殿問以將親伐宋事對曰宋人事本朝無釁隙伐之無名縱可伐亦無煩親征大忤海陵意即請致仕大定二年起拜尚書左丞請依舊制廉察官吏革正隆守令之污從之五年致仕劉徽柔安次人天眷進士由欒城簿遷洪洞令明敏善聽斷人伏其神明大定中同知河東南路轉運使事以廉第一累遷中路都轉運使卒於官賈少冲通州人勤學日誦數千百言家貧甚道中􅀗遺金訪其主歸之天會中伐宋調及民兵少冲代其叔行罹行伍間未嘗釋卷中天眷二年進士劉筈欲以妹妻之辭不就為河中府海陵失道少冲謂所親曰不可仕也秩滿不復出大定初累遷刑部侍郎往北京決獄全活凡千人為左補闕每從容進諫世宗稱美之嘗使宋上以意喻少冲對曰臣有死無辱宋人别致珍異不受遷右諫議大夫後為太常卿終順天軍節度使劉仲誨宛平人其先六世仕遼相繼為宰相祖彦宗仕金為中書門下平章事知樞密院事天會中圍汴京彦宗謂宗翰宗望曰蕭何入關秋毫無犯惟收圖籍遼太宗入汴載路車法服石經以歸皆令則也二帥嘉納之父筈嘗從事元帥府凡約束廢置及四方號令多筈畫使江南宋人賂以金珠三十餘萬筈不之顧累拜尚書左丞相兼中書令仲誨皇統中賜進士累官至太子少師兼御史中丞前後為東宮官十五年多所規戒立朝峻整世宗嘗曰朕見劉仲誨嘗若將切諫者其以剛嚴見知如此馬諷漷陰人皇統中登進士為雄州歸信令寕州刺史皆有聲厯官忠順軍節度王蔚香河人皇統進士性通敏曉晰吏事以才幹厯知河中府明昌初召拜尚書右丞致仕丁暐仁宛平人父筠以吏補州縣後致仕鄉里有鬬訟者不之官而就筠質焉暐仁冲淡寡欲讀書之外無他好遼季問關避難未嘗釋卷皇統二年登進士第調武清縣丞縣經兵革後無學校暐仁召邑中俊秀子弟敎之學百姓欣然從之厯遷陜西西路轉運所在有治績張亨漷陰人皇統進士由樊山丞累遷南京路轉運使轉知歸德府才識强敏明達吏事終始有可稱云馬惠迪漷陰人天德進士大定中累遷左司郎中帝嘗謂宰相曰惠迪聰明而樸實五品以下朝官少有如者超拜參知政事時烏達海叛亡已遣將討之又欲益以甲士毁其船栰惠迪奏曰得其人不可用有其地不可居恐不足勞聖慮明昌初仕至南京留守烏逹海舊作烏㡳改今改正馬琪寶坻人正隆進士調清源簿遷永清令以治聞章宗時户部闕官命宰臣選可任者或舉琪帝然之曰琪不肯欺官亦不肯害民是可用也琪性明敏習吏事治錢榖尤長以武安軍節鎮致仕富察通本名富勒渾中都路華尚阿格們明安人􅄉宗選䕶衛以筆識通名通以父老懇乞就養衆訝之曰得充侍衞終身榮貴今乃辭過人遠矣海陵時以御院通進從侵宋使總隆州諸軍聞海陵遇弒哀悶仆地衆掖而起徑入營哭之世宗時屢進平章政事封仕國公在政府舉太子率府完顔守貞監察御史裔俱可大用後皆為名臣世多其知人云富察通舊作蒲察通富勒渾舊作蒲魯渾華尚阿格們明安舊作胡上愛割蠻猛安今並改正馬百祿三河人幼志學事繼母以孝聞大定中詞賦進士累遷同知北京路轉運使事委錄􅀯北路刑獄所至無􅁈明昌初厯南京路提刑使御史臺以剛直能幹聞轉知河中府卒謚貞忠閻公貞宛平人大定進士明昌中累進大理卿居法寺幾十年詳慎周密未嘗有過舉被命校定律令多所是正人以為法家之祖云劉仲洙宛平人大定進士累官定海軍節度使性剛直果於從政所在皆有功績韓玉漁陽人以經義詞賦兩科入翰林為應奉應制一日百篇文不加􅀧又作元勲傳稱旨章宗歎曰勲臣何幸得此家作傳耶後以鳳翔判官敗夏人於北原當事者忌其功誣以與夏寇有謀朝廷使人覘之玉方傳檄勤王使者實其罪被囚死士論􅁈之杜時昇信安人博學知天文不肯仕進承安泰和間宰相數薦時昇可大用時風俗侈靡紀綱大壞乃南渡河􅀮居嵩洛山中以伊洛之學敎人正大末卒完顔仲元中都人本姓郭氏貞祐中累功至節度使賜姓完顔氏仲元在當時兵最强號花帽軍所在立功正大間為兵部尚書沉毅有謀南渡後稱名將云馬肩龍宛平人在太學有賦聲宣宗初有誣宗室從坦殺人將致之死人不敢言肩龍上書願代從坦死宣宗感悟赦從坦授肩龍東平錄事正大中客鳳翔與德順節度愛申同拒元兵死難劉德基大興人貞祐元年進士守官邊邑夏人攻邊城德基坐㕔事積薪其旁謂家人曰城破即焚我及城破家人不忍縱火遂被執脅使跪不屈同僚紿夏人曰此人素病狂故敢如此德基曰為臣子當如此耳吾豈狂耶夏壯其義繫諸獄已而召問大罵終不從遂害之贈朝列大夫同知通遠軍節度使事王鬱大興人為文法柳宗元閎肆奇古歌詩俊逸效李白天興初元汴京被圍上書言事不報圍稍解挺身􅋓出為兵士所得其將遇之甚厚為其下所忌見殺左光慶薊人好古讀書識大義喜為詩善篆隸尤工大字凡宫廟榜署經光慶書者人稱其有法平時為善言蓄善藥號善善道人李伯淵寶坻人為金都帥與崔立守汴立刼衆降元軍心憤怨伯淵結義士誅立梟於承天門祭哀宗張天綱益津人性寛厚端直論議醇正累官御史中丞權參知政事從哀宗遷蔡蔡城破為宋將孟珙所得械至臨安備禮告廟既而命薛瓊問曰有何面目到此天綱曰國之興亡何代無之我金之亡比汝二帝何如瓊叱曳去明日宋主召問曰天綱真不畏死耶對曰大丈夫患死不中節耳何畏之有因祈死不已初有司令供狀天綱曰殺即殺焉用狀為有司不能屈後不知所終張潛武清人幼有志節慕荆軻聶政為人年三十始折節讀書時人高其行義目曰張古人年五十始娶魯山孫氏亦有賢行夫婦相敬如賓里有兄弟分財者其弟曰獨不畏張先生知耶遂如初天興間潛挈家避兵少室不食七日死孫氏亦投絶澗元瞻巴圖爾昌平人元初率衆歸附遂留備宿衞從近臣哈都琥西征囘紇河西諸蕃道隴蜀入洛屢戰流矢中頰不少却帝聞而壯之賜名瞻巴圖爾後代哈都琥為都元帥守正定及哈都琥子少長瞻巴圖爾請於朝歸其政而終老焉瞻巴圖爾舊作張拔都哈都琥舊作漢都虎今並改正錫塔爾海燕人剛勇有志元初率所部三百餘人來歸帝命佩金符為礮水手元帥屢有功後從征囘囬河西肯哲威烏爾諸國俱以礮立功錫塔爾海舊作薛塔刺海肯哲舊作欽察威烏爾舊作畏吾兒今並改正楊葛濟格寶坻人少有勇畧元初率族屬歸附從攻遼左及從元帥阿舒魯定西夏諸部有功帝厚賜以金幣阿舒魯知其才畧出諸將右命裁決軍務後攻拔歸德率舟師進擊宋師溺死楊葛濟格舊作楊傑只哥阿舒魯舊作阿术魯今並改正史天倪永清人父秉直讀書尚氣穆瑚黎南伐所向殘破東直率老穉數千人詣軍門降穆瑚黎命秉直領降人屯霸州拊循有方逺近附者十餘萬家天倪始生之夕白氣貫庭成童姿貌魁傑及長好學日誦千言天興末舉進士不第穆瑚黎見而奇之以為萬户從畧地三關以南至於東海所過城邑皆不戰而下累官河西兵馬都元帥鎮正定為降將武善所害子楫為正定兵馬總都管有善政楫弟權為河南等路宣撫使亦有戰功穆瑚黎舊作木華黎武善舊作武仙今並改正史天祥天倪從兄長身駢脇膂力絶人從穆瑚黎征伐所至先登累功授兵部都元帥每攻城不嗜殺人憂國愛民之心老而不忘史天澤秉直季子善騎射勇力絶人從其兄天倪帥正定天倪為武善所害天澤擊敗之善乃遁去帝命為正定等五路萬户滅金伐宋所向克捷中統二年拜中書右丞相既秉政凡治國安民之術次第舉行定省規十條以正庶物至元十一年詔與巴顔總大軍南伐遇疾還至正定卒累贈太師謚忠武進封鎮陽王天澤平居未嘗自矜其功及臨大事毅然以天下自任年四十始折節讀書尤熟於資治通鑑立論出人意表出入將相五十餘年上不疑而下無怨人以比郭子儀曹彬武善譯改見前巴顔舊作伯顔今改正石天麟順天人年十四入見帝因留宿衞憲宗六年遣天麟使海都拘留久之既而邊將刼皇子北安王以往寓天麟所天麟稍與其用事臣相親狎因語以宗親恩義及臣子逆順禍福之理海都聞之悔悟遂遣天麟與北安王同歸凡拘留二十八年至元中始得還帝大悦拜中書左丞兼斷事官時權臣用事人莫敢言天麟獨言其奸人服其忠直武宗時進平章政事卒謚忠宣杜瑛信安人時㫒子金末避地河南緱氏山中盡讀諸書究其旨趣間關轉徙教授汾晉間至元中帝南伐召見問計納其言中統初詔徵瑛不就左丞張文謙宣撫河北奏為懷孟彰德大名等路提舉學校官遺書執政力辭杜門著書不以窮通得喪動其志年七十遺命其子曰吾即死當表吾墓曰緱山杜處士所著春秋地理原委語孟旁通皇極引用及律厯禮樂雜志諸書多先儒所未發李德輝潞縣人天性孝弟操履清慎嗜讀書世祖在潛邸用劉秉忠薦侍裕宗講讀至元中為右三部尚書改西安王相撫降川蜀遷西安行省左丞又招降羅施􅀑國及卒蠻夷哭之如私親立廟祀之郝彬信安人至元初年十六充太子宿衞擢揚州路治中厯官户部尚書拜㕘知政事同列務生事要功殺無罪之人彬積誠開引横不可制遂稱疾堅卧一榻至數月尚書省臣皆得罪彬不與焉家居七年足迹未嘗出門外王利用潞縣人弱冠與魏初同學遂齊名事世祖於潛邸累官西安興元兩路總管成宗朝為太子賓客疏上時政十七事帝嘉納之以老病卒廉希憲常語人曰方今文章政事兼備者王國賓其人也武宗即位追封潞國公謚文貞王伯勝文安人兄伯順至元中給事内廷為帝所親幸因以伯勝入見帝顧謂伯順曰此子當勝卿可名伯勝以功授朝列大夫拱衞直都指揮使扈從上都久雨夜聞有聲率衞士出視乃大水暴至立具畚鍤集土石氊罽以塞門分決濠隍以洩其勢至旦始定而民不知帝甚嘉之為遼陽行省平章政事有善政召為大都留守追封薊國公諡忠敏張九思宛平人至元中以工部尚書兼東宫都總管府事十九年帝巡幸上都太子從丞相阿哈瑪留守妖僧夜聚數百人為儀衞稱太子入建德門傳令啟關甚遽九思適宿直宫中命主者不得擅啟關賊知不可紿遂至南門外擊殺丞相阿哈瑪變起倉卒衆莫知所為九思叱宿衞併力擊賊盡􅀗之尋遷詹事丞舉名儒宋道劉因佳古之奇李謙分任東宫官屬累官至平章政事光祿大夫阿哈瑪舊作阿合馬佳古之奇舊作夾谷之奇今並改正梁曾燕人少好學日記書數千言中統中以王鄂薦辟中書令使至元中授吏部尚書再使安南責安南世子陳日燇親出迎詔且講新朝尚右之禮以書往復者三宣布威德諷其君入朝日燇感服命相國從曾詣闕請罪并獻方物皇慶時為集賢侍講學士國有大政必命曾與諸老議之梁德珪良鄉人至元中為中書左司郎中六遷至參議尚書省亊執政奏事帝詢其曲折不能對德珪從旁辯析明白通暢帝大悦拜㕘知政事在省日久凡錢榖出納銓選進退諸藩賜予命有驟至不暇閲簡牘同列莫知措辭德珪數語即定成宗初廟堂以安靜為治求進者不得逞其志摭事中傷德珪安置湖廣帝召使復位乞骸骨歸王倚東萊人徙宛平為人孝友樂易重然諾與人交不苟合讀書務躬行不專事章句世祖選良家子入侍東宮倚年弱冠太保劉秉忠器之即以充選服勤守恪遂見信任有詔皇太子裁決天下事凡時政所急民瘼所係倚知無不言累拜工部尚書太子家丞皇孫出鎮懷孟屬倚䕶之帝目之曰倚修潔人也左右皇孫得人矣終禮部尚書謚忠肅郭貫保定人以才行見推擇為樞密中書掾大德間為河東廉訪副使仁宗至五臺山問廉訪使黙勒格特何以有善政左右對曰皆副使郭貫之敎也後除禮部尚書帝書其官階曰嘉議大夫以授有司至治中以集賢大學士致仕貫博學工􅂐籀當世冊寶碑額多出其手黙勒格特舊作滅里吉歹今改正劉德温大興人起家中書省宣使遷内宰司丞奉旨徵河南民逋糧德温輒平其價令出鈔以償民甚便之厯大都永平二路總管皆有治績卒謚清忠宋本大都人至治元年進士第一授翰林修撰厯官集賢學士國子祭酒性高亢持論堅正制行純白不可干以私而篤朋友之義以植立斯文自仕居官清慎厯任通顯猶僦屋以居及卒執紼者近二千人未嘗有一雜賓時人榮之謚正獻所著至治集四十卷行世弟聚累官翰林直學士謚文清聚嘗為監察御史多所建明其文章與本齊名人稱二宋云趙師魯文安人延祐中補中書省掾於朝廷典章故實律令文法無不練習臨事明敏果㫁及典銓選平允無私人無不服泰定中拜監察御史勸帝修舉郊廟大禮元夕命有同張燈山為樂師魯力諫止之累官河間路運鹽使卒謚文清曾德漁陽人宗聖裔母早亡父仲祥再娶左氏仲祥遊襄陽攜左氏家焉亂兵䧟襄陽遂失左氏德徧求之五年乃得奉迎以歸孝養甚至宗􅂎大都人年十九父内宰卒擗踊號泣絶而復甦水漿不入口者三日以哀毁成病伏臥牀榻猶哭不止淚盡繼之以血既葬疾轉甚􅂎有繼母無他兄弟囑其妻楊氏曰汝善守志以事吾母遂卒楊氏遺腹生一男人以為孝感天不絶其嗣云劉居敬大都人年十􅀊繼母郝氏病居敬憂之懇天以求代狀聞襃表明李慶順義人洪武中以國子生署右僉都御史厯紹興知府永樂初召為刑部侍郎性剛果有幹局馭下甚嚴帝以為才數命治他事不得時至部然屬吏交通饋餉慶輒知之繩以法改右副都御史彈劾勛貴中外凛其風采洪􅄉初拜兵部尚書加太子太保辦山陵事中官有求執不與至相詆訐不為動號為生李宣德二年安遠侯柳升討黎利慶參贊軍事時慶有病會升敗殁遂死顧仲禮保定人幼孤事母孝洪武中蝗起仲禮行田間泣曰食我苗吾何以養母俄疾風吹蝗去母歿仲禮年巳六十廬墓三年黄綬平谷人洪武末以奇童召見送國學肄業宣德中成進士擢山東道御史英宗北征綬上言奈何以祖宗付托之身親犯危機不聽扈從至土木死之儲福燕山衞戍卒本無錫人以好義稱燕兵起挈母妻逃去永樂初簿錄亡卒入伍福在錄中調典靖衛仰天哭曰吾雖一介賤卒義不為從賊之臣日衣號泣竞不食死張法保大興人永樂中為金吾衞總旗祖母病刲肝煮汁進之􅀗痊後復病刲臂肉療之亦愈擢尚寶司丞李斆􅃰州人永樂中由衞經厯厯官四川右布政使臨事剛決號令必行蜀人呼為鐵面李正統中召為吏部侍郎施聚其先沙漠人居順天通州父忠為金吾右衞指揮使從成祖北征陣殁聚嗣職從北征至得勝口擒穆克特穆爾以功累官右都督充右副總兵守義州額森逼京師詔入衞聞命慟哭即日引兵西部下進牛酒聚却之曰天子安在吾何心享此賊退還鎮英宗復辟封懷柔伯卒贈侯謚威靖穆克特穆爾舊作可可帖木兒額森舊作也先今並改正薛綬􅀩古人家昌平父斌從成祖起兵封永順伯斌弟貴永樂中從征有功封安順侯卒謚忠勇綬五歲嗣父爵驍勇善戰正統中與成國公朱勇等遇寇於鷂兒嶺軍敗矢盡猶持空弮擊賊賊支解之謚曰武毅李儀􅃰州人永樂中以薦舉授户部主事出知九江府有惠愛正統初以右僉都御史巡撫大同盛有建置號令一新後被誣下吏瘐死儀居官廉謹邊人素德之為建昭德祠以祀劉中敷大興人永樂中授陳留縣丞擢工部員外郎累官至山東左布政使質直廉靜吏民畏懐正統初召拜户部尚書王振嗾言官劾之得罪景泰初起户部侍郎兼太子賓客性淡泊仕宦五十年家無餘貲王復固安人正統進士累官通政參議額森犯京師邀大臣出迎上皇衆憚行復慷慨請往敵露刄夾之復不為懾成化初為兵部尚書巡視陜西邊務凡所建制多合機宜還朝改工部謹守法制聲名逾著卒贈太子太保諡莊簡李侃東安人正統進士授户科給事中景泰中上皇將還侃言禮宜從厚忤旨被詰户部尚書金濓違詔徵租侃論濓下之吏石亨從子彪侵民業侃請置重典廷議易儲諸大臣唯唯侃泣言東宫無失德時議壯之以右僉都御史巡撫山西力振風紀貪墨屏迹母喪歸遂不出侃事親孝好學安貧歿幾不能殮二子德恢德仁皆進士岳正漷縣人正統進士授編修天順初以修撰入直内閣正素豪邁敢言既受拔擢益感激思自效時石亨曹吉祥怙寵擅權正以計間之又勸吉祥辭兵柄諷亨斂戢會承天門災勅諭廷臣命正視草厯數弊政無所避二人遂搆蜚語謂正賣直訕上帝怒謫欽州同知時入閣才二十八日耳尋繫獄于杖戌肅州亨等誅得釋為民憲宗即位以原官直經筵又忤李賢出知興化府遂致仕正博學能文剛鯁負才氣望重一時惜未竞其用嘉靖中贈太常卿謚文肅侯顯昌平人為諸生母喪廬墓虎狼遠避正統中旌劉器之良鄉人五世同居英宗臨其家詔旌之邢表文安人天順進士知􅀗嘉縣治行最擢彰德知府坐與宗藩爭事調衞輝並有政績厯四川左布政使􅀊災大發􅅒賑貸全活數萬人茶課逋者三百餘萬斤表言宿逋難追請斤徴銀一分充松潘餉從之宏治二年就拜右副都御史巡撫其地卒家無餘貲曾鑑其先桂陽人以戍籍居京師天順進士授刑部主事通州民十餘人被誣為盜鑑辨其寃宏治時累遷工部尚書時内府供奉漸廣多所營造鑑因事諌諍遂得罷省正德初與韓文等伏闕諸誅宦官不勝諸大臣留者率巽順避禍鑑獨守故操多所論執卒贈太子太保龔然勝宛平人初為沙門後歸養母母殁廬墓三年羣烏來集天順年間旌歐信薊州人成化進士宏治時以戸部督餉大同増置倉舍粟賤糴之不數􅀊贏五十萬石劉大夏巡視嘆曰典邊儲者盡如歐郎中吾無此行矣正德初累擢右副都御史巡撫大同訓兵練武綜覈屯政諸廢漸舉段正京衞人七歲能詩成化進士由知縣授御史厯官江西左參政精吏事敏聽斷嚴於律身自奉簡淡未仕時僦屋以居入仕三十載猶不能成室燕忠薊州衞人成化進士宏治中厯御史因災異上言冗官日衆土木日興莊田賜撥日廣奔競無恥之徒充列庶位帝不能從出按陜西風采甚著除陜西副使會都御史楊一清修舉馬政以忠為苑馬卿正德初就遷陜西按察使發奸摘伏吏民皆讋擢副都御史巡撫宣府召為大理卿卒所司奏忠剛正得大臣體贈刑部尚書周尚文東安人父目瞽以舌䑛之復明後為昌樂訓導母喪歸葬廬於墓盜不敢犯成化中旌柳芳武清人母歿自營冢㼅廬其旁有白鳩來巢所藝麥一莖兩穗服除復留三載成化中旌萬盛大興人舉於鄉父母歿並廬墓三年有靈芝馴鹿之異成化中旌方榮大興人神機營都指揮僉事母喪廬墓每旦詣營閲操畢即􅀒土培冢有羣烏翔集其樹成化中旌秦貴霸州人自貴以上同居七世成化中旌又韓鵬定邊衞人李琚密雲人俱六世同居宏治中旌王獻臣其先呉人隷籍錦衣衞宏治六年進士擢御史請罷不急科徭嚴杜請乞治奸人以小民恒産投獻勲戚者罪並懲漕事要索尋按遼東劾中官劉恭貪縱為東厰緝事者所訐下獄予杖謫上杭知縣復以事被逮謫廣東驛丞武宗立移永嘉知縣邢昭三河人宏治進士由知縣擢御史按浙鹽因忤劉瑾廷杖不死人稱鐵鑄邢昭謫高平知縣瑾誅復官御史張禬平谷人宏治進士正德初任兵科左給事中時劉瑾擅政欲置劉大夏於死禬抗疏申救得謫戍太監段聰藉瑾力乞官其姪禬又力爭改御史查盤山東墨吏望風解綬遷大理少卿知縣劉儒受贓爲僉事吕和所按儒賂中官欲反罪和禬執不可卒正儒罪巡撫山西鎮守太監呉經貪横虐民禬置其黨於法勢始戢武宗西巡禬極諌帝怒執禬左右考訊竟無所得乃止錢福大興人父喪廬墓有烏鵲白鳩之瑞宏治中旌張欽通州人正德進士爲御史巡視居庸諸關武宗將出關幸宣府欽上疏力諌不報帝遂微行至昌平傳報出關甚急欽命指揮孫璽閉關自􅀒敕印手劍坐關門下曰敢言開關者斬夜中復草疏諫使者再至拔劍叱之帝不得已乃自昌平還後二十餘日欽巡白羊口帝竟微服疾馳出關欽追之不及西望痛哭嘉靖中厯官工部侍郎許復禮東安人正德進士選庶吉士授給事中時方治河採木復禮以四方屢告災祲極言不可武宗數出遊幸屢偕同官疏諫皆不省嘉靖初錢凝江彬宸濠黨詿誤繫獄者甚衆復禮以為言多所省釋逆黨第宅莊田率踰制奪之民請盡撤毁以其地還民中官黄錦愬高唐州判金坡連逮者五百人以復禮言得勿窮治終河南㕘政劉濟騰驤衞人正德進士由庶吉士授給事中帝幸宣府榆林濟皆疏請􅂞鑾詔封許泰江彬伯爵又與同官力爭嘉靖初每因事爭執多與權貴相枝拄直聲大振大禮議起廷臣爭者多得罪濟前後疏救皆不聽既遮朝臣哭伏左順門受杖以倡衆為首再杖之謫戍遼東更赦不宥隆慶初復官贈太常少卿楊秦良鄉人正德進士除行人與司副徐廷瓚等諌武宗南巡廷杖謫國子監學正嘉靖初詔復為行人擢御史議大禮不合出為四川按察僉事平寇有功賜金綺分賑川北川西以勞瘁卒官蜀人惜之王原文安人襁褓中父珣以家貧役重逃去不知所之原稍長問父所在母告以故原大悲痛及娶妻月餘告母將尋父母曰汝父辭家十餘年不通音問汝將安之原號哭與母别遍厯山東數年轉至揮縣夜􅀫野寺門外旦遇寺中執爨者與敘鄉里姓名則其父也相持大哭遂迎以歸後原之子孫多仕宦者楊行中通州人嘉靖進士由知縣擢御史出按遼東輯安兵變厯南京吏部尚書嚴嵩惡其不附已以考察罷歸敝廬蕭然耄不廢學王儀文安人嘉靖進士由知縣擢御史巡按陜西河南以法繩藩封之害民者出知蘇州府均徭役釐奸弊累擢僉都御史巡撫甘肅會諳達犯京師詔儀馳鎮通州仇鸞部卒掠民間捕而笞之荷校市門外鸞訴于帝逮訊斥為民儀警敏有大畧遇事飈發無所避以廉明峭直見嫉然亦以見重於時隆慶初復官賜卹高敏學寶坻人嘉靖進士任給事中劾嚴嵩黨趙文華廷杖卒文華敗追贈光祿少卿王遴霸州人嘉靖進士厯兵部員外郎峭直矜節㮣不妄交惟與同官楊繼盛善繼盛劾嚴嵩論死遴力爭之不得為資饘粥且以女字其子應箕嵩父子大怒摭他事下之詔獄事白復官及繼盛死收葬之再遷岢嵐兵備副使有盛名擢僉都御史巡撫延綏大興屯田邊儲賴之神宗立與張居正不相能移疾歸居正殁起南京兵部尚書奏行計安留都十二事軍政大肅召拜户部尚書數有執奏力贊開京東水田議又請僧道年四十以下及無度牒者悉令歸農及改兵部屏絶請托忤執政乞休去遴雖退聲望愈重卒贈太子太保天啟中追謚恭肅劉體乾東安人嘉靖進士授行人改給事中司禮太監鮑忠率其黨李慶為其姪鮑恩等八人乞遷級帝已許之體乾抗疏力爭乃止錄三人時國用絀廷議請追宿逋增賦額體乾獨言冗吏冗費之弊因汰各監局人匠隆慶初累遷南京户部尚書時内供日侈數下部取太倉銀又趨市珍珠黄綠玉諸物體乾慎惜浮費每疏爭之積忤帝意奪官神宗立起南京兵部尚書致仕體乾清勁有執議論務存大體有古大臣風卒贈太子少保王鈇順天人嘉靖進士知常熟縣倭至率士卒擊敗之後再擊倭陷淖中為所害贈太僕少卿廕錦衣百户建廟以祀傅好禮固安人萬厯進士為御史請節游宴停内操罷外戚世封止山陵行幸又上崇實杜漸諸疏語皆剴直巡按浙江􅀊大祲發栗賑饑多惠政累遷太常少卿時税使四出海内騷然奸民張禮等横行近京好禮上疏極論其害奏入四日不報復具疏請神宗震怒謫廣昌典史既而帝思好禮言下其疏逮張禮等二十八人下獄害乃除天啟中贈太常卿李三才通州人萬厯進士授户部主事厯郎中御史魏允貞言事忤執政三才抗疏直之謫東昌推官累遷僉都御史總督漕運巡撫鳳陽諸府連疏陳礦税之害詞極剴切力抑税使陳増翦其爪牙程守訓遠近大快時朝士方分朋黨而三才屬東林所推遂爲黨人攻去天啟中起南京户部尚書未赴卒何選宛平人萬厯進士官御史時廷臣爭國本多􅀗譴選語鄭貴妃弟國泰令以朝野公論鄭氏禍福懇言於妃俾自請國泰猶豫選危語動之國泰因疏請早定儲以釋危疑帝意不懌巳知出選指謫湖廣布政司照磨尋斥爲民天啟中贈光祿少卿馬經綸通州人萬厯進士由知縣擢御史帝以兵部考選事盡譴南北諸言官大臣疏爭不聽經綸抗疏極論言官箝口之罪不在考選一事而在不諌上之不敬天不尊祖不勤政不任賢去邪不修德賤貨疏入斥為民杜門却掃凡十年卒門人私謚聞道先生天啟初贈太僕卿米萬鍾宛平人萬厯進士厯官江南按察使天啟五年魏忠賢倪文煥劾為黨人削籍歸崇禎初起太僕少卿卒萬鍾善書與董其昌齊名時稱南董北米孫祖夀昌平人萬厯中武舉厯官薊鎮總兵崇禎時都城被兵祖夀己罷官家居乃散家財招部曲數百人赴援歿於陣初為把總時遘危疾妻張氏割臂以療絶飲食者七日祖夀生而張氏旋死遂終身不近婦人及為大帥部將以五百金遺其子子却不受他日來省祖夀賜之酒曰却金一事善體吾心否則將盡法於汝其秉義執節如此本朝乾隆四十一年賜謚忠愍朱之馮大興人天啟進士授户部主事􅅦税河西務羨金一無所私崇禎時厯青州㕘議擒治土豪權貴為請不聽遷河東副使大猾朱全宇潛通流寇之馮執而殺之部内以安擢僉都御史巡撫宣府李自成陷大同之馮集將吏於城樓歃血誓死守時人心巳散莫為盡力中官杜勛請以城降之馮大罵賊至衆爭迎降之溤南向叩頭草遺表勸帝收人心培氣節遂自縊死本朝乾隆四十一年賜謚烈愍史可法大興人母尹氏夢文天祥入其舍而生少以孝聞舉崇禎元年進士授西安推官遷戸部郎中督太倉及遼餉所至砥節奉公遷右參議分守池州太平又改副使分巡安慶禦賊有功擢僉都御史巡撫安慶廬州太平池州時流寇充斥可法持身廉接士信雜處行伍間與下同勞苦故能得死力連敗賊於英山六合以丁艱去十四年起兵部侍郎總督漕運旋拜南京兵部尚書參贊機務聞北都䧟大慟頭觸柱流血誓死報國福王時拜東閣大學士為馬士英所擠自請督師淮􅀭大兵定􅀭州死之本朝乾隆四十一年賜謚忠正金􅉗大興人崇禎初成進士官工部主事中官張彝憲總部務檄諸曹郎以屬禮見鉉疏爭之彝憲愠甚乃摭事劾􅉗奪職杜門謝客究心理學躬爨以養父母十七年起兵部主事巡視皇城都城䧟􅉗痛哭趨入朝解牙牌北向拜投金水河死母章氏妻王氏弟錝並同日死本朝乾隆四十一年賜謚忠潔鞏永固宛平人尚樂安公主好文雅被服如儒生崇禎末上疏請肄業太學帝褒答之又請復建文帝廟諡事雖未行時人韙之都城陷自書八字佩於胷前曰世受國恩身不可辱遂自刎死一年本朝乾隆四十賜諡節愍劉文炳宛平人劉太后姪也嗣封新樂侯謹厚不妄交獨與宛平太學生申湛然布衣黄尼麓駙馬鞏永固善流賊犯京師文炳知事不支與永固誓以死報國外城陷馳至崇文門殺賊數十人及歸第母妻闔門自焚火烈不得人至後園與叔繼祖俱投井死弟文耀守外城突出至渾河聞城破復還覔炳死所大書版井旁曰左都督劉文耀同兄文炳畢命報國處亦投井死本朝乾隆四十一年並賜謚節愍成德懷柔人少倜儻有大志為諸生聞魏忠賢肆虐常懷忿恨及讀楊漣二十四大罪疏焚香下拜曰大丈夫當如此崇禎四年成進士授山東滋陽知縣以抗直忤上官被誣逮問道中具疏極論温體仁罪廷杖戍邊用薦擢兵部主事都城陷聞帝殉社稷持雞酒奠梓宮前賊露刄脅之不顧及歸妻霍氏及妹請先死德拜母自縊母亦縊死本朝乾隆四十一年賜謚忠愍王孕懋霸州人崇禎進士由太原知府遷寕武兵備副使李自成既陷太原遣使説降孕懋斬之與總兵官周遇吉固守城䧟自刎死妻楊氏投井殉之本朝乾隆四十一年賜謚烈愍高文彩宛平人官錦衣千户流寇䧟都城文彩與妻及子孫十七人俱縊死本朝乾隆四十一年賜諡烈愍李時茪霸州人崇禎進士官吏部郎中分守常鎮右㕘議罷歸十五年殉難贈太僕卿本朝乾隆四十一年賜謚節愍王世琇保定人崇禎進士授歸德推官遷工部主事李自成䧟陳州乘勢犯歸德世琇將行僚屬邀共守慨然曰久官其地臨難而去之非誼也遂與同知顔則孔等誓衆堅守賊攻圍七日城䧟遇害本朝乾隆四十一年賜謚節愍甯丞烈大興人由敎諭厯戸部員外郎管大倉銀庫城陷自經於官􅅟本朝乾隆四十一年賜謚節愍米夀圖宛平人崇禎舉人知新鄉縣有破賊功擢南京御史極論監軍張若騏罪並及謝陞為内援若騏論死陞亦除名時楊嗣昌倡練兵之議擾民特甚壽圖疏陳十害罷之又劾偏沅巡撫陳睿謨廣東巡撫林贄貪劣罪帝皆納其言福王時馬士英薦用阮大鋮抗疏論劾後至湖南唐王命為貴州巡撫孫可望破沅州夀圖死之本朝乾隆四十一年賜謚節愍于騰雲大興人崇禎中為光祿署丞值賊至夫婦俱投繯死本朝乾隆四十一年子入忠義祠宋一鶴宛平人為諸生即究心兵事崇禎􅀄舉人為邱縣知縣以薦授兵部員外郎擢汝南兵備僉事􅁹劇賊撫定李萬慶數萬衆進副使調鄖陽代方孔炤為湖廣巡撫破羅汝才於豐邑坪為荆楚第一功移駐蘄州斷横江以遏賊渡承天城陷自縊死本朝乾隆四十一年賜謚烈愍范箴聽大興人以布衣從高攀龍講學魏國公徐允禎延為館賓數有規諫賊至置一棺卧其上絶食七日死本朝乾隆四十一年予入忠義祠韓東明保定人嘗為邠州知州崇禎末家居流寇至與故平涼通判張維綱舉人張爾翬孫從範共佐有司守城城陷俱死之本朝乾隆四十一年賜謚節愍李夢禧順天人慷慨􅀒志節崇禎末都城陷與妻杜氏二子二女一婢俱縊死又布衣楊鉉善畫攜二子赴井死又儒士張士禧與二子懋賞懋官俱縊死本朝乾隆四十一年並子入忠義祠本朝袁生芝良鄉人順治初官陜西商雒道三年山寇賀珍遣其黨劉體純率衆數萬攻商州生芝誓死守城破自經其父亦戰死闔門盡節者凡三十二人詔贈光祿寺卿袁捷大興人官湖廣都司順治四年襄陽總兵王光恩有罪被逮其弟光泰舉兵叛令逆黨王昌說捷降捷大罵不屈昌怒縛殺之事聞贈叅將童士勤宛平舉人知竹山縣順治三年襄陽總兵王光恩結流寇叛士勤以事至襄被執不屈死事聞贈按察司僉事薛溥大城人恩貢生知保康縣順治四年死王光泰之亂事聞贈按察司僉事杜立德寶坻人以薦授中書舍人考選户科給事中累遷刑部尚書每讞重辟周詳審慎世祖章皇帝稱之曰不取一錢不妄殺一人康􅄉初為保和殿大學士聖祖仁皇帝嘗言閣臣如杜立德不愧古大臣厯相十餘年眷遇優渥以疾乞休卒謚文端王崇簡宛平人順治初選庶吉士厯侍讀學士奉詔議卹明季殉難諸臣疏列大學士范景文等二十八人皆得旌典累遷國史院學士時子熙亦官學士世祖章皇帝以崇簡父子同官肩隨朝列擢禮部侍郎尋進尚書加太子太保曾請増祀殷中宗高宗周成康漢文帝宋仁宗明孝宗於帝王廟而黜宋臣潘美張浚從祀時論韙之卒謚文貞所著有青箱堂詩文集及雜著數十卷郝維訥霸州人父傑從其父鴻猷之官延長時左右皆賊壘傑戎服衞父行叩賊壘請假道賊壯而許之由進士厯大理卿以重囚久淹請復􅀬審秋決舊例厯戸部侍郎乞歸卒維訥順治初進士累官吏部尚書性謹慎持清操厯官三十餘年家無餘貲卒謚恭定從弟維訓亦順治進士巡鹽河東有惠政劉楗大城人順治丙戌進士授給事中罷歸家居十餘載臺省交章薦復原官出為平陽分巡道屬吏有貪殘者聞楗至率解綬去累遷湖廣布政使會三省兵合􅁹山寇芻糧數十萬取辦旦夕楗輸送無缺再調江西值呉耿變作賊犯吉安南昌兵民譟巡撫門勢且叵測楗單騎諭解之仕至刑部尚書謚端敏紀汝彝文安人貢生厯官江寕同知性至孝母病篤適汝彝亦病猶手掬溲惡嘗之七十喪父哀泣如嬰兒撫從叔遺􅀌終其身同時以孝稱者保定岳毓粹􅃰州陳鋐趙植而大興李中倫以救父與賊格鬬死楊三知良鄉人順治丙戌進士知榆次縣累遷神木道提督王輔臣反三知亟為守禦計而守將孫崇雅開門納賊執三知令降不從衆拔刄脅取敕印不與紿賊出急呼妻孥投井中三知别赴一井賊􅀒出之右臂折而不死罵不絶口閉之一室排墻壓死事聞贈光祿卿􅄻一子袁懋功香河人順治丙戌進士授禮科給事中疏革江浙織造局機戸民免胥吏誅求之苦累擢户部侍郎授雲南巡撫時雲南新闢詔令降兵歸農其久橫鄉里者懼讐不敢歸懋功以不安置且復為盜乃使隨所在入籍任墾無主之田編保甲以時稽察雲南在明初駐軍屯田計畝抵餉其後兵不耕而鬻諸民輸糧衞所畝四斗有奇至是改隸州縣仍名屯田按舊額徴之視民田賦特重懋功奏請量減糧額其山阻路遠者仍設衞徴糧増州縣夫役供輸運民皆稱便復任山東巡撫卒謚清獻林起龍大興人順治丙戌進士授吏科給事中首疏嚴禁邪敎務絶根株又請以十五事課守令遣亷能大臣巡行直省皆報可累擢户部侍郎康熙初出爲漕運總督時江南榖賤白糧折徴舊額浮於市價疏請改徴本色百姓便之方國棟宛平人順治丙戌舉人除蠡縣敎諭累擢廣東按察司僉事分巡河北道值巨寇鄧耀踞海島時出沒剽掠國棟集兵進􅁹耀遂受擒遷蘇松常道躬率吏民修築湖隄及沿海墩臺呉淞劉河兩閘區畫經費事集而民不擾以勞遘疾卒於任民謳思不置立祠虎邱山麓祀之王􅄉尚書崇簡子順治丁亥進士改庶吉士授檢討屢遷翰林院學士加禮部尚書世祖章皇帝大漸召草遺詔與受顧命康熙五年擢左都御史請裁藩下糜餉禁王公以下貿易之害停官員捐助之例呉三桂反其子以尚主不即誅􅄉請即正法拜保和殿大學士厯二十年夙夜祗勤眷遇始終不替加少傅致仕卒諡文靖趙之符武清人父完璧由薦舉任榆次知縣有惠政之符登順治巳亥進士選庶吉士授給事中在諌垣十有三年前倐建白不下數萬言聖祖仁皇帝每嘉納焉遷左僉都御史卒入祀賢良祠蔣宏道大興人順治已亥進士累官左都御史以亷飭稱蔚之煥大興人為湖北安陸府經厯康熙二年四川流賊郝摇旗等嘯聚鄖陽山中都統圖海會楚蜀之師討之時之煥督餉鄖陽賊􅋓犯大營官軍失利之煥從人備騎促之去不從賊使降之煥罵不絶口賊怒攴解之事聞賜祭葬贈知縣張烈大興人性至孝事􅁇母委曲承順人無間言生平潛心理學康熙九年成進士授内閣中書試博學鴻詞科遷編修擢贊善修明史典訓及四書講義諸書恪勤厥職編輯精當年六十四卒入祀鄉賢祠張國彥大興人由武進士任陜西淡羅營副將康􅄉十三年陜西提督王輔臣叛應呉三桂國彥嬰城固守明年賊黨數千至魚河本營兵變逼國彥獻印不屈妻許氏自縊國彥手刄婢妾五人發火自刎死事聞贈太子太保左都督妻許氏一品夫人􅄻騎都尉王文雄大興人康􅄉二十二年由行伍從征臺灣以功加左都督後隨裕親王征厄魯特賊結為連火攻不入文雄躍馬入陣斬首數十人擢授張家口遊擊隨大將軍費揚古征噶爾丹每征矢無虚發軍中號為飛將累遷至廣東提督入布坦侵哈密文雄請自效覲時䇿妄阿喇聖祖仁皇帝命其子侍衞廷梅隨行㑹大兵進藏凡三遇賊父子皆力戰敗之雍正元年卒入祀名宦祠王源大興人隨父寓高郵從魏禧治古文好春秋左傳年四十餘始遊京師遂以古文名館閣纂修文史必就質焉生平未嘗為時文獨好桐城方舟文倣之舉京兆著或菴文集及評訂孟子並春秋三傳行於世陳儀文安人康􅄉乙未進士改庶吉士授編修為大學士朱軾所知雍正三年畿輔大水諸河泛溢世宗憲皇帝命怡賢親王偕朱軾相度濬治王欲得善治河者軾以儀對王訪以治河所宜先儀白治河當從低處起天津上應析木古渤海逆河之會百川之尾閭也今南北二運並漲東西兩淀爭奔駢趨於三岔一口而强潮復來拒之牴牾洄漩而不時下下隘則上溢其勢宜然故欲治河莫如先擴逹海之口欲擴海口莫如先減入口之水入口之水減則達海之口寛而北之永定南之子牙中之七十二清河乃得沛然入三岔口而東往矣因隨王行視水利以侍講攝天津同知尋擢庶子領天津水師營田局兼屬以文安大城隄工二邑形如釜底積潦不消夾隄内外皆巨浸儀購菰蔣十餘萬束立表下楗以禦險要並請發帑興修即以代賑隄遂完固後擢侍講學士時設營田觀察使儀以僉都御史銜領豐潤諸路營田及罷觀察使還領史職如故所著有毛詩臆評鄉黨私記學庸私記直隸河渠志蘭雪齋集行世鄧曰橒大城人拔貢生早喪母事父極謹父患腹疾日夜不解帶者三年父便汚下衣妻李氏手澣不假於人父嘗顧而言曰願汝子婦亦如是孝汝也父卒喪葬盡禮王札平谷人由拔貢生任甘肅任寕知州康熙十三年總兵王輔臣叛札單騎往諭以禍福賊黨脅之不屈旋遇害事聞贈按察司副使沈斆憼大興人居母憂家不戒於火延及柩前斆憼撲救奮不顧身母柩􅀗全斆憼竟焚死黃叔琳大興人康熙辛未進士授編修累擢浙江巡撫罷歸高宗純皇帝御極起用為山東按察使旋遷布政内擢詹事致仕及年近大耋重豫鹿鳴恩榮宴與六十年後進為同年之會咸稱盛事又恭過皇太后六十萬壽高宗純皇帝特加侍郎銜所著有硯北易鈔詩統説春秋四傳合纂等書行世弟叔璥康熙巳丑進士累官御史江南常鎮揚道著近思錄集朱慎終約編諸書劉順宛平人雍正五年武進士由侍衞洊升金塔協副將十三年從征金川攻囊得擊斬賊衆燬其碉時各碉以次克惟普贍雙單二碉固甚順潛率所部逼單碉以火攻賊潰並奪雙碉遂克色底擢貴州總兵旋調甘肅署西安提督辨理戈壁水泉實心經理擢甘肅提督卒贈太子少保諡壯靖王淦大興人任湖南塞頭司巡檢乾隆五年城步縣横嶺寨苗糾粤猺滋事洤奉檄往諭苗猺數千圍之被戕身亡事聞贈縣主簿黃炎宛平人署四川䕫州守備乾隆十年打箭鑪上下瞻對土司作亂矣與遊擊陳文華隨總兵袁士弼進􅁹擊賊於木魯工山力竭死之事聞贈守備􅄻衞千總羅載堂宛平人任四川合州吏目乾隆三十六年隨征金川木果木師潰死之具沿途被害者同縣候􅀘知縣孫維龍事聞議䘏如例查禮宛平人由捐納主事棟發雲南以同知用尋改發廣西補慶遠府同知洊升至湖南巡撫才具明敏辦事詳慎在四川松茂道時值小金川滋擾以辦理糧餉遲延革職留營效力乾隆三十八年官兵攻克美諾總督劉秉恬檄委接辦降番事宜尋復原官嗣督修揪砥新道又赴郭羅克查拏賊番敘功賞戴花翎朱珪大興人乾隆戊辰進士由編修累擢侍讀學士厯任福建糧驛道山西按察使安徽廣東巡撫兩廣總督内厯吏户兩部尚書入直南書房拜體仁閣大學士嘉慶十一年卒贈太傅諡文正入祀賢良祠珪持躬正直砥節清廉經術淹通器宇醇厚初仁宗睿皇帝在藩邸珪以史職侍學進五箴曰養心敬身勤業虚已致誠内外服官五十餘年未嘗稍蹈愆尤身躋崇班依然寒素家庭敦睦動循矩法洵不愧為端人正士仁宗睿皇帝展謁西陵囘鑾時道經珪墓兩次􅀩恩賜奠其眷遇優隆始終不渝如此所著有知足齋詩文集行世翁方綱大興人乾隆壬申進士由編修累擢内閣學士降補侍讀學士遷鴻臚寺卿致仕嘉慶十二年重豫鹿鳴宴賜三品銜十九年重豫恩榮宴賜二品銜方綱少貧力學工書善詩好金石文字所著有兩漢金石記粤東金石記石皷考廟堂碑考焦山鼎銘考蘭亭考蘇詩補注復初齋詩集行世朱筠大興人大學士珪兄乾隆甲戌進士由編修累擢侍讀學士詔求遺書筠以前明永樂大典一書奏請擇其中苦干部分别繕寫以備著錄後奉命纂輯四庫全書得之大典中者五百餘部皆世所不傳次第刋布海内實筠發之筠少與弟珪同讀書博聞宏覽以經學六書倡刋許氏説文解字敘説之以敎士所著有笥河集行世史謙宛平人乾隆五十一年任福建鳳山縣典史值臺匪林爽文滋事攻鳳山遇害事聞賜卹高黒予大興人乾隆五十三年任廣西左江鎮都司隨佂安南扵黎城擊賊陣亡事聞賜䘏王太和大興人乾隆六十年以守備銜效力軍營隨征黔焚逆苗有功嘉慶元年擊賊於貴魚坡太和爭先撲寨連刄數賊被傷陣亡事聞賜卹高舉大興人任宜昌府通判嘉慶元年敎匪肆掠委防陜西鎮安縣之黄龍鋪賊刼王家坪大營舉與子垚率兵勇前往䇿應同時被害事聞賜卹王懋德大興人任鎮遠知縣嘉慶二年以協理興義狆苗軍需紀功旋赴川陜交界防禦敎匪於安羌州撃賊陣亡同縣陸維基任醴泉知縣四年守城禦賊陣亡施鳴皋廣東候􅀘典史十四年隨􅁹洋匪於磨刀洋撃賊陣亡事聞均賜䘏如例傅成明大興人武進士任江西㕘將嘉慶元年隨征湖北於胡家巖擊賊陣亡同縣張鼎由武進士任湖北常德守備於秀峯橋撃賊陣亡事聞均賜卹如例李紹祖大興人武進士嘉慶四年以臨清協副將隨􅁹四川敎匪有功遷高廉鎮總兵旋調征湖北敎匪於兩河口擊賊陣亡事聞賜諡果壯予騎都尉兼雲騎尉世職金克俊大興人由大挑知縣分發湖北嘉慶四年署房縣事時李淑股匪由羊家河竄入攻撲縣城克俊督率兵役竭力抵禦五年辦理糧臺事務隨􅁹徐添德股匪􅁬勇爭先衝入賊隊受矛傷陣亡事聞照知州例賜卹􅄻雲騎尉李炯宛平人以布政司理問銜投效軍營隨征湖北嘉慶四年攻克黃柏山擊賊陣亡同縣楊文炳任江津縣典史堵禦教匪遇賊力戰死之外委索明陳得富於湖北馬得於陜西擊賊陣亡事聞均賜䘏如例黃定一宛平人官陜西留壩㕔司獄嘉慶四年張漢潮股匪竄入留壩廳之通天觀定一隨同知齊黙慎併力抵禦力竭死之事聞議卹􅄻雲騎尉賈慶檀永清人官河南守備嘉慶四年隨􅁹湖北邪匪賊侍衆抗拒慶檀衝入賊隊受傷陣亡事聞議卹李錫命東安人由一等侍衞授廣東逰擊隨將軍明亮平定苗匪有功嘉慶四年以功擢羅定恊副將時官軍追􅁹賊匪再添元等於蒼溪之隆山界錫命督兵進攻賊由山後突出前後受敵力竭死之事聞議卹楊開第涿州人武進士嘉慶四年以山西平坦營守備隨征陜西於木瓜橋擊賊陣亡事聞賜卹李廷彪密雲人任忠順營都司嘉慶七年於陜西畧陽縣大竹壩擊賊陣亡同縣千總劉鎧於湖北漢王壩趙復興於陜西西鄉朱成龍於四川營山縣趙益元於湖北張家集把總郭俊於湖北槐岡外委鄭永祥馬祺於陕西郭鎮蔡永昌榮英烈於湖北擊賊陣亡事聞均賜卹如例陳寶勲宛平人官河南滑縣典史嘉慶十八年敎匪李文成倡亂寶勲勵節捐軀合家被害事聞賜祭葬􅄻雲騎尉入祀昭忠祠前提調官臣沈兆澐恭纂輯提調官臣王廣䕃恭覆輯校對官臣李學殖恭校校對官臣章詒燕恭覆校大清一統志順天府六流寓宋張邵烏江人建炎三年以直龍圖閣假禮部尚書充通問使使金不拜達賚且移書與相詰難達賚怒執送密州囚於祚山砦明年送於劉豫使豫用之邵見豫長揖而巳且責以君臣大義詞氣俱厲豫怒械置於獄知邵不屈久之復送於金拘之燕山僧寺後又作書爲金人言劉豫之姦金人益北徙之㑹寕府和議成始偕洪皓朱弁南歸達賚舊作撻懶今改正元趙復德安人皇子庫楚伐宋俘得之姚樞勸之北行至燕學人從者百餘楊惟中建太極書院請復講授其中由是許衡郝經劉因皆得其書而尊信之北方知程朱之學自復始庫楚舊作闊出今改正明湯文瓊石埭人崇禎中授徒京師見國事日非數獻䇿闕下不報京師陷書其衣衿曰位非文丞相之位心存文丞相之心遂投繯死贈中書舍人列女南北朝魏盧道䖍妻元氏涿人甚聰悟嘗升座講老子道䖍從弟元明隔紗帷以聽焉齊鮮于氏文宗姊適荀氏七日而夫亡執節不嫁及母卒哭泣喪明隋李士謙妻盧氏范陽人有婦德士謙終賻贈一無所受謂州里父老曰參軍平生好施今雖殞歿安可奪其志於是散粟五百石以賑窮乏元務光母盧氏范陽人好讀書造次以禮盛年寡居諸子幼弱家貧不能就學盧氏親自教授朂以義方漢王諒反遣綦良往山東畧地以務光為記室諒敗慈州刺史簿籍務光家見盧氏逼之以燭燒其身竟不屈節唐鄭義宗妻盧氏范陽人涉書文事舅姑恭順夜有盜持兵刼其家人皆竄匿惟姑不能去盧冒刃立姑側為賊捽捶幾死賊去人問何為不懼荅曰人所以異於禽獸者仁義也若委姑而去倘百有一危我不得獨生姑曰歲寒然後知松柏吾乃今見婦之心崔繪妻盧氏范陽盧獻之女繪喪盧年少家欲嫁之盧稱疾不許女兄適李思冲早亡思冲方顯重表求繼室詔許家内外姻皆然可思冲歸幣百轝盧不可曰吾豈可再辱於人乎是夕出自竇糞穢衊面還崔舍斷髪自誓思冲以聞武后不奪也詔爲尼以終韋雍妻蕭氏張宏靖鎮幽州表雍在幕府朱克融亂雍􅀍刼蕭聞難與雍俱出左右卻之不退雍臨刃蕭呼曰我苟生無益願死君前刑者斷其臂乃殺雍蕭是夕死李惟􅂤母鄭氏李惟岳叛鄭與惟􅂤奔京師德宗拘於客省及出奉天惟􅂤將赴難請於鄭鄭曰爾父立功河朔位宰相身未嘗至京師爾入朝未識天子不能效忠我不子爾矣督其行曰爾能死王事我不朽矣金許古妻劉氏定海軍節度使仲洙女貞祐初古仕於朝留氏僑居蒲城旣而兵圍蒲劉與二女相􅁇自盡事聞追封劉氏爲郡君諡貞潔長女諡定姜次女肅姜元史天倪妻程氏永清人天倪帥正定降將武善謀逆天倪死之程聞變恐辱於賊先自殺事平收葬顔色如生刃猶在手扎穆納妻王氏燕人年十六扎穆納官錢塘病歿葬城西十里外王氏每旦被髪往奠伏墓大慟欲絶久而致疾舅姑力止乃巳服闋舅姑令改適王氏泣曰妾旣委身扎氏夫今早夭天也此足可復履他人門乎不從㷀居三十年負白無玷扎穆納舊作張買奴今改正惠士元妻王氏大都人士元疾革囑曰我必不起前妾所生子汝善保䕶之待其稍長從爾自嫁士元卒氏蓬首垢面居墓側以妾子置左右撫養之歲餘妾子亦死乃號泣曰無復望矣引刀自刺救免至終喪自經於樹費隱妻王氏良鄉人隱有疾王氏數嘗其糞及隱卒王氏撫妾所生子女如己出既而子又死服除乃執女手相抱痛哭是夜自縊死柳氏薊郡人適户部主事趙野未婚而野卒柳哭之盡哀誓不再嫁其兄將奪其志柳曰業巳歸趙氏雖未成婚而夫婦之禮已定雖死無他志也後寢疾不肯服藥遂死魏成妻周氏良鄉人成年五十娶周氏生一子後成得疾氏事之甚勤及成歿氏年二十除服或勸改適氏拒之堅服勤耕織奉姑盡孝守節三十餘年卒事聞詔旌李仲義妻劉氏房山人至德閒縣大饑平章哈拉布哈兵乏食執仲義欲烹之劉氏涕泣伏地乞免兵不從劉氏請烹已以貸夫死兵遂釋其夫而烹劉氏聞者莫不哀之哈拉布哈舊作哈刺不花今改正王士明妻李氏房山人至正聞珠贍軍至縣李氏及其女李家奴皆被執李氏謂其女曰與其受辱不若死女曰母先殺我李氏卽以軍所遺刀殺女尋自殺珠贍聞之為祭葬仍牓其門曰貞烈有司上其事為樹碑焉珠贍舊作竹真今改正安志道妻劉氏順州人志道及劉氏之弟明理並登進士第劉氏避兵匿巖穴中軍至欲汚之劉氏曰我弟與夫皆進士也我豈可汝辱乎軍士以兵磨其體劉大罵不輟聲軍怒鈎斷其舌而死徐猱頭妻岳氏大都人元末兵入城告其夫曰我等恐被辱奈何夫曰事急惟死耳遂火其居夫婦赴火以死徐母王氏及二女一子皆抱持赴火死宋謙妻趙氏大都人兵破大都趙氏子婦温氏高氏孫婦高氏徐氏合謀曰兵且至矣我等豈可辱身以苟全哉趙卽自縊死諸婦四人諸孫男女六人妾三人皆投井死明李彥賓妻劉氏薊州人年二十四而彥賓死家貧子幼氏誓死守節子旣長娶婦楊氏未幾子亦死姑婦相依守節終其身洪武中旌謝黑兒妻梅氏東安人年十八適黒兒黒兒疾卒氏卽欲自盡姑覺止之曰汝志固如此但吾夫婦年老無他人侍養况汝有娠倘生一子以續吾宗不愈於死乎氏悟後果生一子夙夜操作以奉舅姑及卒脱簪珥葬其子俊亦撫育成立守節四十餘年宣德中旌陳連妻孔氏東安人連以歲貢入太學氏謹奉姑連客死姑憐其無子欲嫁之氏曰姑老且疾婦若他適姑將何依哭而不從時遇兵燹人多奔竄氏事姑甚謹姑卒盡鬻衣飾葬之守節五十八年卒正統中旌劉氏京師人有松江人戍邊者詐稱無妻娶劉遇赦紿劉歸省遂往不復劉抵松訪之壻故不認劉乃翦髪為尼行乞市上自置一棺夜臥棺中五十餘年隣火起劉入棺呼曰乞闔棺以畢吾事遂焚死尹之路妻梁氏大城人嫁歲餘夫乏食􅀒販山海關少有資聚又娶馬氏生子二十餘年不通音問梁氏事翁姑艱苦無怨言夫客死悲痛欲絶徒步行乞迎夫喪往返二千里扶柩􅂝其後妻二子以歸里人歎異高山妻朱氏霸州人生四子正德六年流賊入其家朱被執不屈殺其二子以脅之罵不絶口遂被害李氏劉氏三女俱寶坻人一李堂女一李鑾女一劉聰女正德八年流賊䧟城持刀逐三女逼之俱不從厲聲罵賊賊怒支解之嘉靖中知縣呉與之爲立三烈祠竇妙善京師人年十五爲餘姚姜榮妾正德中榮以瑞州通判攝府事華林賊寇瑞榮出走賊入執其妻及婢數人問榮所在時妙善居别室急取府印開後窗投河池衣鮮衣前曰太守統兵數千出東城捕爾等旦夕授首安得執吾婢賊意其夫人也解前所執獨與妙善出城適所驅隸中有盛豹者父子被掠其子叩首乞縱父賊許之妙善曰是有力當以舁我賊從之行數里乘閒語豹曰我所以留汝者以太守不知印處欲藉汝言之今當令汝歸幸語太守自此前行遇井卽畢命矣遂呼賊令仍縱豹去行至花塢遇井遂跳入賊驚救不得而去豹入城告榮取印引至花塢覓井果得其屍郡縣上其事詔建特祠賜額貞烈沈鳳妻仇氏密雲人鳳官興州右屯衞百户嘉靖中守邊寨兵破寨逼之仇大罵而死李三才妾馬氏通州人三才卒氏不食十二日死於喪所張大經妻于氏大城人大經歿于年方十九誓以身從地下舅姑勸之氏佯許不死乘隙自縊於桑林王守時妻丁氏三河人隣人安文登夜至守時家強逼之丁堅拒遂被殺劉蘭女順天人父卒矢志不嫁以養其母崇禎元年年四十六矣母病歿女遂絶粒殉之王錫田繼妻崔氏香河人崇禎二年城破氏與衆訣曰我義不受辱但幼女􅈱􅈱未免遺恨耳乃涕泣乳其女將自縊家人力持不得遂兵及門衆俱奔崔乘閒縊於户後丁大志妻趙氏通州人崇禎二年城陷氏女被掠趙奪之十指盡落遂被殺朱之馮妻馮氏大興人之馮爲山東副使齎表入都寄家屬濟南已而濟南破馮氏匿姑及其子於他所而巳投井死姑李氏聞之亦絶粒而死之馮義不再娶亦不置妾梁以樟妻張氏大興人以樟為商邱知縣崇禎中流賊圍商邱急婦積薪樓下集婢女其上俱令就縊謂子夑曰汝父守城命不可知宗祀惟汝是賴屬乳媪往匿民家自縊死家人舉火諸屍俱燼杜氏宛平人新樂侯劉文炳母聞流賊攻城急􅂤絲縧作七八繯於樓上命家人積薪樓下迎李氏呉氏二女歸曰吾母女同死於此念姑瀛國太夫人年老匿之太學生申湛然家及莊烈帝密詔文炳母撫其背曰太夫人既得所吾與若妻妹死耳城陷同二女俱縊文炳妻王氏亦登樓懸劉太后像率衆拜哭家人共焚樓叔繼􅃝妻左氏見火起亦登樓同妾董氏王氏俱焚死闔門死者四十二人金􅉗母章氏􅉗為兵部主事賊陷都城􅉗著朝服拜母趨闕下章卽赴水死妻王氏亦隨死成氏女兵部主事成德妹年二十未嫁流賊之變德顧之曰我死汝何依妹請先死德哭而視其縊繼室霍繼之德入别其母哭盡哀出而自縊母亦自縊邢嘉遇妻韓氏昌平人嘉遇官泰陵衞指揮甲申城陷嘉遇守西門同長子協中力戰死之韓與次子時中俱赴井死劉應龍妻王氏宛平人家貧以女紅養舅姑應龍父子相繼亡王氏事姑撫子閱二十年賊陷都城泣拜其姑曰留長孫奉亊祖母婦死已決遂􅂝幼子投井有先入者屍横其下水僅至腰不得死幼子呼救氏以掌擊之遂抵淵而死劉氏女保定人諸生劉永祚女崇禎末城破年十六為亂兵所􅀗不屈被殺又諸生馮文珪妻王氏劉星毓妻柴氏宋允成妻王氏俱以不屈死於賊本朝王季銓妻張氏順天人與婦胡氏同居兵變被掠俱觸石死同郡李星耀妻王氏為兵所掠不從見殺康虎妻李氏順天人虎弟頑暴無行每欲調其嫂李堅拒之一日虎出乃持刀強逼不從見殺華生國妻黄氏順天人家貧或終日不舉火氏安之生國嗜酒嘗飲酣謂人曰吾妻雖女子有丈夫氣吾死必殉我諸君他日當見後生國歿黄不食十四日而死時年十九同郡王明元妻張氏蔡樹瓊妻張氏蕭重熾妻姜氏丁本培妻劉氏王所錫妻張氏李尚信妻王氏俱夫亡殉節馬瑞妻張氏順天人歸瑞三年生二子夫遠遊姑歿張竭力營葬越二年傳聞瑞死或勸之改適怒叱之囑族人攜二子尋其父與子泣别卽自縊張貞女順天人許字通州康京女父素不知書以壻家貧欲奪之婚女峻拒之後數年京死女哀泣請奔喪父兄不可晝使人守之夜妹與同卧女夜半自縊死妹寐未覺也與京合葬史可模妻李氏順天人夫亡絶粒姑勸之乃食有欲娶之者李毁容截耳以誓事姑以孝養聞陶門三節婦順天人覺氏陶鸞妻年十八夫亡子瓚方襁褓覺氏截左耳誓不嫁紡績撫􅀌成立李氏陶瓚妻年二十五夫亡撫子守義翦髪矢志守義又早亡婦王氏年甚少事姑至孝撫子承榮成立一門三節均順治年閒旌高位妻段氏宛平人年十七夫亡二子俱襁褓兄勸之嫁不從賃市中板棚為人縫綻二十年二子娶婦生孫長子又歿次子為小吏以罪謫遼左復撫諸孫十餘年孫裔讀書成進士官至大理卿苦節七十九年年九十有六朱暐妻趙氏香河人夫疾氏禱天願以身代及病急先自縊死李時遇妻馬氏通州人夫亡兄弟之子利其産逼之嫁遂自縊同州周六哥妻陶氏夫亡