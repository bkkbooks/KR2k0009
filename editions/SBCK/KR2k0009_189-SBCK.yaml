body:
  text: 遵義府在貴州省治東北二百五十里東西距六百五十里南北距四百九十里東至平越州湄潭縣界一百五十里西至四川敘永廳界五百里南至貴陽府修文縣界一百二十里北至四川重慶府綦江縣界三百七十里東南至平越州湄潭縣界一百二十里西南至大定府黔西州界一百五十里東北至四川酉陽州彭水縣界五百五十里西北至仁懷直隸廳界五百六十里自府治至京師七千九百二十里分野天文井􅀑分野鶉首之次建置沿革禹貢荆梁二州之域秦為巴郡南徼地漢為牂牁郡地後漢至隋因之唐初入於蠻貞觀九年置郎州尋廢十三年復置改曰播州寰宇記貞觀九年分牂牁北界置郎州領恭水高山貢山柯盈邪施釋鷰六縣十一年省十三年又於其地置播州取播川為名其明年改恭水為羅􅀩縣高山為舍月縣貢山為胡江縣柯盈為帶水縣邪施為羅為縣釋鷰為胡刀縣十六年又改羅蒙為遵義縣景龍三年置都督府先天二年府罷天寶初改播川郡乾元初復為播州屬黔州道後没於蠻名勝志乾符中没於南詔太原人楊端收復之遂世其土宋大觀二年復置播州樂源郡宣和三年廢為城屬南平軍宋史地理志播州樂源郡大觀二年南平夷人楊文貴等獻其地建為州領播川琅川帶水三縣宣和三年廢為城隸南平軍端平三年復以白線堡為播州三縣仍廢嘉熙三年置播州安撫司屬䕫州路元至元十四年播州安撫使楊􅀖憲歸附仍授播州軍民安撫司屬順元宣慰司二十八年改宣撫司屬四川行省元史地理志至元二十八年播州楊漢英言向所授安撫職住隸順元宣慰司其所管地於四川行省為近乞改為軍民宣撫司直隸四川行省從之以播州等處管軍萬户楊漢英為紹慶珍州南平等處沿邊宣慰使行播州軍民宣撫使播州等處管軍萬户仍虎符明洪武四年歸附仍曰播州宣撫司六年升宣慰司萬厯中改置遵義府名勝志萬厯二十六年楊應龍叛蕩平改府取唐遵義縣之名屬四川布政使司本朝因之雍正七年改隸貴州省領州一縣四遵義縣附郭東西距二百三十里南北距一百九十里東至綏陽縣界八十里西至仁懷縣界一百五十里南至貴陽府開州界一百里北至桐梓縣界九十里東南至貴陽府修文縣界一百四十里西南至大定府黔西州界一百五十里東北至綏陽縣界九十里西北至仁懷縣界一百六十里漢置鄨縣屬牂牁郡後漢因之晉永嘉中改屬平夷郡宋齊因之梁廢隋為牂牁縣地唐貞觀五年置芙蓉縣屬夷州九年置恭水縣為郎州治十一年廢恭水縣十三年復置為播州治十四年改恭水曰羅蒙十六年又改曰遵義二十年始以芙蓉縣屬播州宋初皆廢大觀二年建遵義軍及遵義縣屬播州宣和三年廢為砦屬珍州開禧二年復升軍嘉定十一年又廢嘉熙中復置播州不領縣元因之明洪武九年置播州長官司萬厯二十七年復置遵義縣為遵義府治本朝因之桐梓縣在府城北一百二十里東西距一百二十五里南北距二百九十里東至綏陽縣界五十五里西至仁懷縣界七十里南至遵義縣界三十里北至四川重慶府綦江縣界二百六十里東南至遵義縣界三十五里西南至仁懷縣界三十里東北至正安州界三百里西北至綦江縣界一百四十里漢牂牁郡地後没於蠻唐貞觀十六年開山洞置夜郎縣屬珍州元和三年州廢以夜郎屬溙州後復没於蠻宋大觀二年復置夜郎縣屬溱州宣和三年廢元為珍州地明洪武初置桐梓驛屬播州宣慰司萬厯二十七年改驛置縣屬遵義府本朝因之綏陽縣在府城東一百里東西距一百二十里南北距八十五里東至平越州湄潭縣界八十里西至遵義縣界四十里南至遵義縣界三十五里北至桐梓縣界五十里東南至湄潭縣界四十里西南至遵義縣界五十里東北至正安州界一百五十里西北至桐梓縣界一百五十里漢牂牁郡地隋大業七年置綏陽縣屬明陽郡唐貞觀四年置夷州十一年移州治綏陽天寶初曰義泉郡乾元初復曰夷州屬黔州都督府宋初為羈縻蠻地大觀三年改建承州仍置綏陽縣宣和三年廢承州以綏陽縣屬珍州元廢縣為珍州地明萬厯二十七年復置綏陽縣屬遵義府本朝因之正安州在府城東三百六十里東西距三百里南北距四百四十里東至思南府婺川縣界二百里西至綏陽縣界一百里南至婺川縣界一百四十里北至四川重慶府南川縣界三百里東南至婺川縣界三百里西南至婺川縣界二百四十里東北至南川縣界五百里西北至南川縣界四百里漢牂牁郡地唐貞觀十六年置樂源縣兼置珍州天寶初曰夜郎郡乾元初復曰珍州元和三年州廢以縣屬溱州尋復置珍州宋乾徳四年改珍州曰高州又改西高州大觀二年復曰珍州仍以樂源縣隸焉咸淳末屬播州安撫司元改置珍州思安等處長官司至正末明玉珍改為真州明洪武十七年改曰真州長官司萬厯二十七年置真安州屬遵義府本朝雍正二年改為正安州仁懷縣在府城西北一百八十里東西距四百二十里南北距五百二十里東至桐梓縣界一百里西至四川敘永廳界三百二十里南至遵義縣界一百四十里北至仁懷廳界三百八十里東南至遵義縣界一百四十里西南至大定府黔西州界一百三十里東北至四川綦江縣界四百四十里西北至仁懷廳界三百八十里漢犍為郡符縣地隋唐為瀘州地宋大觀三年置仁懷縣宣和三年廢為播州地明萬厯二十七年復置仁懷縣屬遵義府縣治在今仁懷直隸廳治本朝初因之康熙中始遷建於今縣治仍屬遵義府形勢西連僰道南極牂牁府志重山複嶺陡澗深林元史陳天祥傳土地曠遠跨接溪洞圖經風俗敦龎淳固以耕殖為業天資忠順悉慕華風圖經椎髻披氊射獵為業信巫􅀑好詛盟明皇輿考土闢民聚悅詩書