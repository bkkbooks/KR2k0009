body:
  text: 兗州府在山東省治南三百二十里東西距五百十里南北距二百六十里東至沂州府費縣界一百六十里西至曹州府濮州界三百五十里南至江南徐州府沛縣界一百五十里北至泰安府肥城縣界一百一十里東南至沂州府蘭山縣界三百三十里西南至曹州府曹縣界三百一十里東北至泰安府泰安縣界一百八十里西北至泰安府東平州界一百六十里自府治至京師一千二百三十里分野天文奎婁分野降婁之次兼胃室壁氐房心之分建置沿革禹貢徐兗二州之域府治及東境屬徐州西北境屬兗州周為魯國東南境為邾小邾滕薛諸國西南境為曹國兼宋地戰國屬楚秦置薛郡漢更為魯國治魯縣後漢魏因之晉改郡劉宋元嘉三十年始更置兗州宋書州郡志兗州刺史後漢治山陽昌邑魏晉治廩邱武帝平河南治滑臺文帝元嘉十三年治鄒山又寄治彭城二十年省兗州分郡屬徐冀州三十年復立治瑕邱按今府治即漢瑕邱縣自漢以來兗州徙治不一其治瑕邱自此始也後魏仍曰兗州按魏初兗州亦治滑臺魏書紀傳多稱此爲東兗州太和十八年以東郡屬司州始稱此爲兗州隋大業元年廢州置都督府二年改魯州三年改魯郡時始自曲阜徙治瑕邱唐武徳五年復曰兗州貞觀十四年置都督府天寶初復曰魯郡乾元初復曰兗州屬河南道後置節度使賜號泰寕軍唐書方鎮表乾元二年升鄆齊兗三州都防禦使爲節度使治兗州寶應元年廢長慶元年升沂海觀察使爲節度使徙治兗州太和八年復廢爲觀察使大中五年又升沂海觀察使爲節度使乾寕四年賜沂海節度使爲秦寕軍節度使五代因之周廣順二年罷軍宋初仍曰兖州魯郡復置泰寕軍節度大中祥符元年升大都督府政和八年升爲襲慶府屬京東西路金復曰兗州大定十九年改曰泰定軍屬山東西路元亦曰兗州初屬濟州憲宗二年屬東平路至元五年復屬濟州十六年屬中書省濟寕路明洪武初曰兗州屬濟寕府十八年升爲兗州府屬山東布政司本朝因之屬山東省初領州一縣十三乾隆四十一年升濟寕爲􅈂隸州以金鄉嘉祥魚臺三縣屬之今領縣十滋陽縣附郭東西距三十里南北距五十里東至曲阜縣界十里西至濟寕州界二十里南至鄒縣界二十里北至寕陽縣界三十里東南至鄒縣治五十里西南至濟寕州治六十里東北至寕陽縣界四十里西北至汶上縣界六十里春秋魯􅀒瑕邑漢置瑕邱縣屬山陽郡晉省入南平陽縣劉宋元嘉三十年始置兗州治瑕邱故城後魏因之隋開皇十三年始復置瑕邱縣爲兗州治大業三年爲魯郡治唐仍爲兗州治五代因之宋大觀四年避孔子諱改曰瑕縣尋又改爲嵫陽金元皆因之明洪武初省縣入兗州十八年升兗州爲府復置嵫陽縣成化七年改嵫爲滋本朝因之曲阜縣在府東三十里東西距五十里南北距五十五里東至泗水縣界三十里西至滋陽縣界二十里南至鄒縣界二十五里北至寕陽縣界三十里東南至嶧縣治二百六十里西南至濟寕州治九十里東北至泰安府泰安縣界五十里西北至寕陽縣治六十里古少皥之墟周初曰曲阜封周公子伯禽於此爲魯國秦爲薛郡治漢置魯縣爲魯國治後漢因之晉爲魯郡治宋及後魏因之北齊文宣改郡曰任城隋開皇三年廢郡四年改縣曰汶陽十六年又改名曲阜屬魯郡唐貞觀元年省八年復置屬兗州五代因之宋大中祥符五年改曰仙源縣金復爲曲阜元因之明屬兗州府本朝因之寕陽縣在府北五十里東西距七十五里南北距五十五里東至泗水縣界五十里西至汶上縣界二十五里南至滋陽縣界二十里北至濟南府肥城縣界三十五里東南至曲阜縣界三十里西南至濟寕州治九十里東北至泰安府泰安縣界五十里西北至泰安府東平州治一百二十里春秋爲魯之闡邑漢置寕陽侯國屬泰山郡後漢屬東平國晉省北齊文宣移置平原縣於此隋開皇十六年改縣曰龔邱屬魯郡唐屬兗州五代因之宋大觀四年又改曰龔縣金大定二十九年改名寕陽縣元至元二年省入嵫陽大德元年復置仍屬兗州明屬兗州府本朝因之鄒縣在府東南五十里東西距一百里南北距七十五里東至泗水縣界六十五里西至至曲濟寕州界三十阜縣界二十五五里南至滕里東南至滕縣界五十里北縣界七十里西南至界八濟寕州魚臺縣界七十五里十里西北至滋陽縣界三十東北至泗水縣里春秋邾國魯繆公因之時唐改為騶漢置騶縣屬魯國後漢晉宋魏隋屬兗州五代因之宋熙寕五年省為鎮入仙源縣元豐七年復置仍屬兗州元因之明洪武中改屬兗州府金本屬滕州朝因之泗水縣在十府五東少北九十里東西距一里東至沂州府費縣界七百里南北距十里西至曲七阜縣界三泰安縣十里南至界五十里鄒縣界二十五東南至嶧縣治里二北至泰安百四十里府西南至十里鄒縣治九西北至寕十里東北至泰陽縣界四十里安府新泰縣界七春秋時魯卞邑漢置卞縣魏省入屬魯國後漢因之晉屬魯郡劉宋因之後鄒縣隋開皇十六年改置泗水縣屬魯郡唐屬兗州五代及阜縣三年復置仍宋金因之元至屬兗州明屬兗元二年省入曲州府本朝因之滕縣在里府東南一百四十南北距一百五十里東西里東至距一百六十嶧縣界一百里西至濟寕州魚臺縣界六十里南至江蘇徐州府銅山縣界一百十里北至鄒縣界四十里東南至嶧縣界五十里西南至江蘇徐州府沛縣界七十里東北至沂州府費縣界一百四十里西北至鄒縣界四十里周時滕薛小邾三國地戰國時為齊地秦為薛縣地漢置蕃縣屬魯國後漢因之晉屬魯郡元康中改屬彭城郡宋因之後魏孝昌二年置蕃郡元象二年省武定五年復置北齊郡廢隋􅄏皇十六年改蕃曰滕縣屬彭城郡唐屬徐州五代至宋因之金大定二十二年改縣曰滕陽兼置滕陽軍二十四年改置滕州仍治滕縣屬山東西路元因之明洪武二年州廢以縣屬濟寕府十八年改屬兗州府本朝因之嶧縣在府東南二百六十里東西距一百六十里南北距一百二十里東至沂州府郯城縣界一百十里西至滕縣界五十里南至江蘇徐州府邳州界六十里北至沂州府費縣界六十里東南至邳州治一百八十里西南至徐州府銅山縣界五十里東北至沂州府蘭山縣界二十里西北至滕縣界七十里春秋時鄫國地戰國屬楚為蘭陵邑漢置蘭陵氶二縣屬東海郡後漢因之晉元康元年置蘭陵郡劉宗徙郡治昌慮省蘭陵入氶縣屬之後魏武定五年復置蘭陵郡并置蘭陵縣屬之北齊廢蘭陵縣隋開皇三年郡廢十六年置鄫州大業初州廢改氶縣為蘭陵縣屬彭城郡唐武德四年復置鄫州又改蘭陵為氶縣貞觀初州廢縣屬沂州五代及宋因之金明昌六年又改氶縣為蘭陵貞祐四年改屬邳州尋於縣置嶧州元屬益都路至元二年省縣入州明洪武二年降州為嶧縣屬濟寕府十八年改屬兗州府本朝因之汶上縣在府西北九十里東西距一百五里南北距六十五里東至寕陽縣界三十五里西至曹州府鄆城縣界七十里南至濟寕州界四十五里北至泰安府東平州界二十里東南至滋陽縣界三十里西南至濟寕州嘉祥縣界六十五里東北至東平州界四十里西北至東平州界二十五里古厥國春秋時魯中都地戰國屬齊為平陸邑漢置東平陸縣屬東平國後漢及晉因之宋初曰平陸元嘉中僑置陽平郡兼移樂平縣寄治尋廢大明元年復置郡後魏曰東陽平郡仍治樂平北齊郡廢隋開皇十六年復改樂平曰平陸屬魯郡唐初屬兗州天寶元年改曰中都貞元十四年改屬鄆州五代因之宋屬東平府金貞元元年改曰汶陽泰和八年又改曰汶上元屬東平路明屬兗州府東平州本朝屬兗州府陽榖縣在府西北三百里東西距七十里南北距九十里東至泰安府東阿縣界四十里西至曹州府朝城縣界三十里南至壽張縣界三十里北至東昌府聊城縣界六十里東南至夀張縣界十五里西南至曹州府范縣治四十里東北至東昌府聊城縣界七十里西北至東昌府莘縣界二十里春秋齊柯邑漢置東阿縣屬東郡為都尉治後漢因之晉改屬濟北郡宋大明元年省後魏復置仍屬濟北郡隋開皇十六年因縣境有故陽榖邑析置陽穀縣屬濟北郡唐初屬濟州天寳十三年州廢以縣屬鄆州宋屬東平府金因之元屬東平路明屬兗州府本朝因之雍正八年分隸東平州十三年仍屬兗州府壽張縣在府西北二百四十里東西距八十里南北距六十五里東至泰安府東平州界五十里西至曹州府范縣界三十里南至曹州府鄆城縣界六十里北至陽穀縣界五里東南至泰安府東平州界五十里西南至曹州府范縣界三十里東北至泰安府東阿縣治九十里西北至陽榖縣界五里漢東郡范縣地隋唐宋為壽張縣地金大定七年徙置竹口鎮十九年復還舊治元因之屬東平路明洪武初廢十四年又移置於王陵店屬東平州十八年改屬兗州府本朝因之雍正八年分隸東平州十三年仍屬兗州府形勢大野旣瀦有羽有􅀩孤桐蠙珠泗沂攸同揚雄徐州箴南抱黃河注以汶泗沂梁之水北瞻泰山翼以尼防鳧繹之山通志風俗魯秉周禮左傳孔子修六經以述唐虞三代之道是以其民好學上禮義重廉恥漢書地理志賤商賈務稼穡尊儒慕學得洙泗之俗隋書地理志人情樸厚俗有儒風文獻通考城池兗州府城周十四里有奇門四郭門五池廣三丈明洪武十八年築正德後屢經修築本朝康熙十年修乾隆四十三年重修滋陽縣附郭曲阜縣城周十里門五池廣一丈明正統七年自縣東十里徙建嘉靖以後屢修寕陽縣城周四里有奇門四池廣一丈二尺宋天聖中築明嘉靖後屢修甃甎本朝康熙二十四年修鄒縣城周四里有奇門四城濠與小沙水相通舊土築明萬厯五年甃甎本朝順治五年修康熙七年四十八年重修泗水縣城周三里有奇門四池廣一丈二尺明成化間修築隆慶間甃石本朝乾隆五十五年修滕縣城周五里有奇門四池廣三丈五尺引梁溪水注之明洪武二年因舊址甃甎石本朝乾隆三十二年修嶧縣城周四里門四池廣三丈明成化二十二年因舊址甃石本朝乾隆四十三年修汶上縣城周十二里有奇門四池廣一丈二尺明成化以後屢修築本朝順治十四年修乾隆四十二年嘉慶二十一年重修陽穀縣城周十二里門四池廣二丈舊土城明萬厯五年甃甎二十五年加築䕶城隄本朝康熙五十年修乾隆五十五年嘉慶二十一年重修夀張縣城周五里門四池廣三丈明宏治十四年增築本朝順治十七年修乾隆五十五年重修學校兗州府學在府治北舊在府治東南唐大中間兗海觀察使劉莒卜建宋景祐中州守孔道輔重修元明以來屢經修葺本朝康熙二十三年増修入學額數二十名滋陽縣學在縣治東元時爲兖國復聖公廟後毁明洪武十八年復設滋陽縣建學於此本朝順治九年増修入學額數二十名曲阜縣學在闕里西舊在曲阜故城内明正德九年遷建於孔廟東嘉靖五年復徙於廟西矍相圃故址崇禎四年修入學額數十二名又於額設樂舞生内考取四名四氏學在闕里東舊名孔氏家學魏黃初二年令魯郡修孔廟宗聖侯孔羨於廟外爲屋以居孔氏學者宋祥符間知縣孔朂於廟側建學延祐間增入顔孟二氏子孫明洪武初改名三氏學萬厯間又入曾子後裔改名四氏學入學額數二十名寕陽縣學在縣治東北元時為縣治後縣徙以其地為學至元間始建本朝康熙十年重建入學額數十五名鄒縣學在縣治西元元貞元年改建明天啟間修本朝康熙三十三年修入學額數十五名泗水縣學在縣治東南舊在城東南一