得名亦名嶧陽山今名柱子山下有村落氶水繞其下後漢書郡國志注山出名桐伏滔北征記今盤根往往而存元和志嶧陽山在下邳縣西六里舊志山之西南有黃鑪山産銅羅泌路史云顓頊修黃帝之政采葛嶧之銅鑄鼎以藏天下之神主按禹貢孔疏以嶧陽為葛嶧蔡傳因之其説本後漢書注攷宋儒以前未有以鄒嶧為嶧陽者獨王應麟詩傳有是説或非無見姑並存以俟考寨山在嶧縣東南六十里形圓如覆釡有壁壘井臼遺址東麓有泉名一勺雨後噴薄殊可觀望仙山在嶧縣南二十里高峻莊嚴如人端坐垂手状頂甚平曠其西為丁公山峯亦奇秀縣志相傳漢丁公曾避難於此故名更南三十里有鑄錢山鐵角山在嶧縣西南二十里巖畔有洞可容數十人山頂絶險繚以周垣狀如壁壘山下有泉居民引以溉田縣西南九十里有馬山形若奔馬武水出焉青檀山在嶧縣西七里上多青檀山巔有流泉經縣南㑹氶水入泇河宋岳飛嘗留題巖壁石屋山在嶧縣西二十里山麓有流泉瀉為瀑布下流為金注水其南有大名山又西三里有馬頭山山前壁立如削旁一鳥道達其上絶頂有二池遇旱不涸其地平曠可耕山東有龍塘泉東流㑹青檀寺水白茅山在嶧縣西四十五里山後有玉華泉流為彭河車梢山在嶧縣北六十里一名三峯山即寰宇記所謂花盤山也四圍峯巒突兀俯臨澗壑澗下一池深杳莫測滄浪淵出焉為氶水上源其西曰巨梁山一名巨龍山其南半里許為將軍山斗山及熊耳山山南有黄龍洞中空闊委折高數丈深十餘丈燭以火乃可入西巖有泉旁多石乳有白蝙蝠大如鴿君山在嶧縣北六十里西泇水發源於此古名抱犢山亦曰抱犢崓魏書地形志蘭陵郡氶縣有抱犢山元和志抱犢山在氶縣北六十里壁立千仞頂寛而有水山去海三百餘里天氣澄明宛然在目昔有遯隱者抱一犢於其上墾種故以為名山高九里周圍四十五里寰宇記抱犢山抱樸子云出芝草齊乘君山一名抱犢山在嶧州北六十里夾山在嶧縣北七十里縣志相傳即春秋之夾谷非也相近又有夾兒山舊有錫場仙壇山在嶧縣東北一里舊志山巔廣數里攢簇奇秀望之如廬相傳古仙人所居山腰有痕如帶亦名玉帶山又名鳳山天臺山在嶧縣東北五十里山頂平如圓葢四壁巉峻望之入雲太白山在汶上縣東五十里縣志相傳唐李白嘗至其上因名俗呼為牛山其旁為雲尾山二山出雲相接則雨蜀山在汶上縣西南四十里其下即蜀山湖四望無山屹立波心爾雅山獨者蜀故名青山在汶上縣北三十五里怪石聳翠俗名卧佛山又縣北四十里有松山􅀌峯獨峙叢柏蓊鬰舊亦名青山坦山在汶上縣東北二十里山形平坦故名土人呼為壇山以舊有禱雨壇也其西巖憑視城郭如在宇下又東北五里為金山亦名榻山榻山之右為九峯山又北為采山皆坦山之支云穀山在陽穀縣治東北小阜也縣因以名梁山在壽張縣東南七十里山以梁孝王遊獵於此而得名上有虎頭崖宋江寨其下舊有梁山濼又縣城東南有鳳山故縣城亦名曰鳳城夀邱在曲阜縣東北八里皇甫謐帝王世紀黃帝生於夀邱史記五帝本紀舜作什器於夀邱元和志夀邱在曲阜縣東北六里皇甫謐以為在魯城東門之北按帝王世紀黃帝生於夀邱則非塟於夀邱可知金改夀邱為夀陵舊志遂列黃帝陵於曲阜誤也本朝遣官祭告黃帝陵在今陜西鄜州中部縣與夀邱無涉附辨於此曲阜在曲阜縣治東禮記明堂位成王封周公於曲阜後漢書郡國志注帝王世紀曰少昊自窮桑登帝位窮桑在魯北後徙曲阜應劭風俗通春秋左傳魯公伯禽宅曲阜之地阜者茂也言平地隆踊不屬於山陵也元和志曲阜在魯城中委曲長七八里縣治及季子臺大庭氏庫並在其上光武洞在鄒縣南瓦曲村相傳漢光武嘗避兵於此元大德間碑記尚存覺林洞在嶧縣北五十里一名朝陽洞林木交蔭蔦蘿下埀境頗幽邃又南二里為九陽洞地多桐樹路亦險峻山頂有蓮花峯又梁王洞在覺林西北有林泉之勝縣志相傳為梁武所鑿故名西沂水源出曲阜縣東南尼山之􅅢西北流逕曲阜縣南二里又西流入滋陽縣境至府城東合於泗論語曾􅀧曰浴乎沂左傳昭公二十五年季平子請待於沂上杜預注魯城南有沂水水經注沂水出魯城東南尼邱山西北平地發泉流逕魯縣故城南沂水北對稷門亦曰雩門門南隔水有雩壇即曾􅀧所謂風乎舞雩處又西逕圓邱北又西古注泗水元和志沂水亦名雩水源出縣東南八里坰澤俗名連泉詩魯頌駉駉牡馬在坰之野是也按此沂水齊乘謂為西沂其自岱麓之沂山出者别見沂州府洙水在曲阜縣北四里泗水分流也春秋莊公九年冬浚洙水經注洙水出泰山葢縣臨樂山西北逕葢縣又西逕泰山東平陽縣西南流盜泉注之又西南流於卞城西入泗水􅅍流西南至魯縣東北又分為二水洙水西北流逕孔里是謂洙泗之間矣又西南枝津出焉又南逕瑕邱城東而南入石門又西南逕南平陽縣之顯閭亭西又南洸水注之又南至高平南入於泗元和志洙水東去瑕邱縣二十三里泗水東自曲阜縣界流入與洙水合闕里志今洙水與泗水不通上源在孔林之東止一溝瀆似古魯城之隍也穿林横流過墓前出林復西南流入於西沂其故道不可考乾隆二十一年此有御製洙河詩高宗純皇帝􅄑魯經按今洙水上源既不遠而下流即入西沂與水經注故道迥殊其分流之處轉出泗水之南亦與水經注南泗北洙之説異或以為今之濟河自府城東金口閘分流貫城而西出至濟寕州界㑹洸水入運河疑即洙水故瀆又以府城北二十五里有沙河三十里有漕河九折而下矯若㳺龍亦名九龍灣皆自寕陽縣流入又西入洸疑即洙水枝津也汶水自泰安府西南流入寕陽境至縣東北三十四里堽城壩分而為二其一南流別為洸水其一西流入東平州界轉西南流至汶上縣北又西南會諸泉匯於南旺湖入運河水經注汶水過博縣西西南流逕陽關故城西又南左會淄水又南逕鉅平縣故城東又西南逕汶陽縣北又西逕汶陽故城北又西洸水出焉又西逕蛇邱縣南又西南過岡縣北又西蛇水注之又西溝水注之又西逕春亭北又汶水自桃鄉四分其派別之處謂之四汶口元和志汶水北去中都縣二十四里又北入須昌縣界明㑹典汶河逕寕陽縣北堽城厯汶上東平東阿又東北流入海元於堽城之左築壩遏汶入洸南流至濟寕合沂泗二水以達於淮自永樂間築戴村壩汶水盡出南旺於是洸沂泗自㑹濟而汶不復通洸舊志汶水至汶上城北二十五里受濼澢諸泉謂之魯溝又西南流至城北二里受蒲灣泊水謂之草橋河又西南十里謂之白馬河又西南二十里謂之鵞河鵞河者故宋之運道也涸而為渠汶水由之又西南十五里謂之黒馬溝又西南至南旺入於漕六分北流出南旺下閘至於臨清㑹於御河長三百五十里四分南流出南旺上閘至於濟寕㑹於沂泗長一百里按汶水有五其源各異詳見泰安府而合流入運之地並在今兗州境乾隆十三年二十年四十五年四十九年高宗純皇帝廵幸俱有御製渡汶河詩洸水汶水支流也自寕陽縣東北堽城壩分流西南逕寕陽縣西三里又南流逕滋陽縣西南又西南流至濟寕州界天井閘入運河水經注吕忱曰洸水上承汶水於岡縣西闡亭東爾雅曰汶别為闡其猶洛之有波矣西南流逕盛鄉城西又南逕寕陽縣故城西又南洙水支津注之又西南逕乘邱縣故城東又東南流注於洙水寕陽縣志元初於堽城左作斗門遏汶水入泗於是洸流始盛至元六年以奔流衝激泥沙填淤乃議濬之自閘口至石刺以通其源又自石刺至高呉橋南至王家道口凡五十六里有奇以達其流而洸河復治二十年㑹通河開北自奉符為閘以導汶水盡入於洸東會泗水出於任城之㑹源閘而始分明永樂几年又築堽城壩以遏汶水惟壩南官莊河入洸洸流始微成化十一年主事張盛復為堽城石閘稍分汶水支流以入於洸逕寕陽西南兩崖之間有東西兩閘以備蓄洩南滙蛇眼諸泉流入滋陽於是洸水入漕之流滔滔不絶矣淄水在寕陽縣東北左傳昭公二十六年齊師圍成成人伐齊師之飲馬于淄者水經注淄水又西逕成城北又西逕陽關城注汶水按此即今小汶河與青州府之淄水為二詳見泰安府泗水源出泗水縣東陪尾山西流徑曲阜縣北八里又西南流逕滋陽縣東五里轉南流與曲阜縣之西沂水合入金口閘又南流逕鄒縣西南五十里又南至濟寕州㑹洸水由天津閘入運河凡二百二十里左傳哀公八年齊伐魯次於泗上國語宣公夏濫干泗淵漢書地理志魯國卞縣泗水西南至方與入沛過郡三行五百里水經泗水出魯卞縣北山西南逕魯縣北又西過瑕邱縣東屈從縣東南流漷水從東來注之又南過平陽縣西又南過高平縣西洸水從北西來注之又南過方與縣東菏水從西來注之又屈東南過湖陸縣南洧涓水從東北來注之又南過沛縣東注地理志曰出濟隂乘氏縣又云出卞縣北經言北山皆為非矣山海經云泗水出魯東北余昔因公事路經洙泗尋其源流水出卞縣故城東南桃墟西北墟有澤澤方十五里澤西際阜俗謂之媯亭山自此連岡通阜西北四十餘里岡之西際便得泗水之源也石穴吐水五泉俱導泉穴各徑尺餘泗水西逕其縣故城南又西南流逕魯縣分為二流北為洙瀆南則泗水洙泗之間即夫子領徒之所也泗水自城北南逕魯城西南合沂水元和志泗水之源有四四泉俱導因以為名明㑹典泗河源出陪尾山西流至兗州城東又南流經横河與沂水合元時於兗州東門外五里金口作壩建閘遏泗之南趨明朝因而修築每夏秋水漲則啟閘放使南流㑹沂水由塂里河出師家莊閘冬春水㣲則閉閘令由黒風口東經兗州城入濟又南流㑹洸水至濟寕出天津閘入於運河舊志成化七年工部主事張盛復作石壩固之以鐵以時啟閉為漕河之利謂之金口閘河胡渭禹貢錐指泗水自泗水縣厯曲阜滋陽濟寕鄒縣魚臺縣滕縣沛縣徐州邳州宿遷桃源至清河縣入淮此禹迹也今其故道自徐州以南悉為黃河所占按明萬厯以前舊漕河自徐州厯沛縣而北即泗水也其支流與汴水合經二洪下接於淮則泗水尚入淮也自萬厯二十二年􅄏濬泇河以避黃河水險由是黃專合汴泗入運不復達於淮本朝乾隆二十二年帝南廵經此有高宗純皇御製過泗水詩漷水在滕縣南十五里即南沙河也源出縣東北一百里述山西南麓西流㑹黃約山諸泉水逕縣南又西㑹南梁河入運河左傳襄公十九年取邾田自漷水注漷水出東海合鄉縣西南流經魯國至高平湖陸縣入泗水經注漷水出東海合鄉縣西南流入邾又經魯國鄒山東南又西南逕蕃縣故城南又西逕薛縣故城北又西逕仲虺城北又西逕湖陸縣入於泗故京相璠曰薛縣漷水首受蕃縣西至山陽湖陸是也經言瑕邱東誤耳按齊乘云滕州南有薛水即古漷水出州東高山春秋魯取邾田自漷水杜注水出東海合鄉縣西南經魯國至高平湖陸縣入泗葢此水也縣志以為水經注梁水南鄰於漷即今漷水也薛水去南梁逺中隔石橋泉河安得鄰之以薛水為古漷水誤矣且縣東北述山前有分水嶺直南至嶧山東水皆東流自崆峒山西至鳳凰嶺北水皆北流東海合鄉之水何從而入杜注亦謬齊乘又云有沙河水出鄒嶧山皆西南流至山陽湖與南梁相合同入於泗名三河口縣志亦辨其不然以為源自嶧山者此北沙河也西南流入泗者則南沙河乃漷水也舊入三河口初不與南梁㑹自漕河東徙遏其南流而北出之趙溝始與南梁㑹合不復入三河口矣南梁水在滕縣東北十五里源出趵突荆溝二泉合而為一西㑹漷水入運河漢書地理志魯國蕃縣南梁水西至胡陵入沛渠水經注泗水又左㑹南梁水地理志曰水出蕃縣東北平澤出泉若輪焉發源成川西南流分為二水北支水西出逕蕃縣北西逕滕城北溉分邱田故有兩溝之名南梁水自枝渠西南逕魯國蕃縣故城東俗以為南鄰於漷亦謂之西漷水又屈逕城南地理志曰其水西流注於沛沛在湖陸西而左注泗泗沛合流互受通稱經無南梁之名而有洧涓之稱疑即是水也齊乘􅀯梁水出滕縣荆溝村西南流至滕州東門外折而過城北又西入山陽湖山陽俗曰刁陽由湖南出注於泗明統志梁水源發滕縣東一十五里西南流入徐州沛縣界按南梁河舊不與漷水合而入徐州沛縣界自明嘉靖間運河東徙又遏漷水導之北出趙溝與南梁會而同入於漕齊乘明統志所言與今河流皆不合矣氶水在嶧縣西一名承治河本出縣北車梢峪源曰滄浪淵􅀯流㑹許池水今滄浪淵水微細獨許池為正源矣南逕縣城西門外折東流至縣南三十里納金注水又東納義河水南合泇河入運河元和志氶縣以西北氶水得名寰宇記云承治水出縣西北方山王莽改氶縣為承治故水有此名今又訛為承冶水西泇水在嶧縣北六十里亦名泇河即古柤水也源出縣東北抱犢山東南流至邳州界㑹沂水入黃河水經注偪陽縣西北有柤水溝去偪陽八十里東南流逕偪陽故城東北南亂於沂而注於沭謂之柤口城齊乘東泇河出沂州西北之箕山西泇河出嶧州東北抱犢山東南流至三合村與東泇合又有魚溝水出浮邱山亦合於此故名三合南貫四湖又南合武河入泗謂之泇口按唐書地理志氶縣有陂十三蓄水溉田皆貞觀以來築齊乘言今沂嶧二州仰泇氶二水溉田青徐水利莫與為匹皆十三陂之遺跡也明萬歴三十二年總河李化龍開泇口自夏鎮李家港至黄林莊名曰泇河以此水得名二年改泇河為運道運河自江蘇徐州府沛縣入府境逕嶧縣南五十里西北逕滕縣東南六十里又西北逕魚臺縣東北三十里折而北逕濟寕州西三里與嘉祥縣分界又北逕汶上縣西南三十五里又北入泰安府東平州界自南而北有泇河南旺張秋等名元志河渠志濟州汶泗相通河非自然長流河道於兗州立牐堰約泗水西流堽城立牐堰分汶水入河南㑹於濟州以六閘撙節水勢啟閉通放舟楫南通淮泗以入新開㑹通河明史河渠志太祖定都應天用海運以餉遼卒洪武二十四年河決原武漫安山湖而東㑹通盡淤成祖肇建北京轉漕東南一仍由海一則浮淮入河至陽武陸輓百七十里抵衛輝浮於衞海運既險陸輓亦艱永樂九年用濟寕州同知潘叔正言命尚書宋禮等濬㑹通河禮用汶上老人白英䇿築壩東平之戴村遏汶使無入洸而盡出南旺南旺者南北之脊也自左而南距濟寕九十里合沂泗以濟自右而北距臨清三百餘里獨頼汶自南旺分水北至臨清降地九十尺置閘二十有一南至鎮口降百十有六尺置閘二十有七其外又有積水進水減水平水之閘五十有四壩二十有一所以防運河之洩佐閘為用谷應泰明紀事本末正統十三年河決滎陽經曹濮以入運河至兗州沙灣之東隄大洪口而決濟汶諸水皆從之入海㑹通遂淤景泰四年左僉都御史徐有貞疏上流為渠起金隄張秋西南踰范濮經澶淵以接河沁用平水勢又濬漕渠出沙灣北至臨清二百四十里南至濟寕三百一十里嘉靖七年以河決東溢逾曹入昭陽湖運道大阻都御史盛應期上言宜于昭陽湖左别開新渠北起姜家口南至留城一百四十餘里以通漕舟其地居河上流土皆沙淤功弗就四十四年河盡北徙吏部侍郎朱衡左僉都御史潘季馴尋應期故道開新河自南陽達留城百四十一里濬舊河自留城達境山五十三里八月而成河防志泇河以嶧縣東西泇水得名明隆慶丁卯庚午間都御史翁大立屢疏請開河自馬家橋經利國監入泇口出邳州以避秦溝吕梁之險議不行萬歴癸巳河決汶上灌徐邳潰漕隄二百里總河舒應龍求通洩之途於微山湖東得韓家莊可引湖水由彭河注之泇開支渠四十餘里工成猶未能通漕也己亥秋都御史劉東星來治河舉韓家莊未竟之工辛丑春再修浚建渠梁橋石閘一德勝萬年萬家莊各草閘一是年漕艘由泇河行者十之三矣癸卯河決黃莊入昭陽湖都御史李化龍定計開泇棄王市以下三十里之泇河徑從王市取直達紀家集南當河深處以避鑿郗山及周柳諸湖百里之險遂改挑直河之支渠修砌王市之石壩平治大泛口之湍溜撈濬彭家口之淺沙建閘設壩次第畢舉通計開泇二百六十里内分邳屬一百里隸中河而夏鎮所隸自李家港口東至黃林莊一百六十里屬滕縣者五十里屬嶧縣者一百十里黃河故道在陽穀縣西水經注河水於范縣東北流為倉亭津又歴柯澤又徑東阿縣故城西而東北注鄧里渠又東北過茌平逕昌鄉亭碻磝城元和志黃河在陽穀縣北十二里又縣東十八里有沙河由曹州府范縣流逕夀張縣又東流入境雨潦則滙羣川北流至東昌龍灣入運河相傳亦黃河故道也嶮河在曲阜縣東北五十里寰宇記在曲阜縣北四十二里源出九龍山東南流入洙其溪磵險隘左傳桓公十二年公㑹􅂎侯莒子盟於曲池杜預注汶陽縣北有曲池亭即以此水為名􅚒河在寕陽縣東南五里滙東北蛇眼諸泉環城而流即今城河也南流至滋陽入漕西流同古城泉由高呉橋南入洸明統志漕水源發寕陽縣治東蛇眼泉北流至府城北三十里入洸水大沙河在鄒縣南三里源出四基山西南流徑城南入白馬河又有小沙河亦出四基山由岡山東麓徑城東而南至城西折南流明萬歴中知縣王汝振築壩塞西南故道穿渠導水環城而北復流而南至城西五里營名曰因利渠本朝康熙間知縣婁一均