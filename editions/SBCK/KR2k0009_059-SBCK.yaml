六十里周顯德中始於其地剏廟以祀夫子宋慶厯中文宣公孔宗愿大建廟宇元至順元年衍聖公孔思誨請命重建賜額尼山書院立學舍祭田設栝柏猶茂闕里志聖廟漢魏唐宋代有修飾宋崇寕元年詔名大成殿金皇統大定間制始大備元凡三修明洪武初重修永樂十四年撤其舊而新之成化十八年廣正殿為九間規制益宏宏治十二年災奉詔鼎建遣輔臣祭告嘉靖隆慶以來守臣代有修葺前後各有碑謹按廟制中為大成殿九楹殿中奉至聖先師像南向左右列四配十二哲先賢像前陳法琅供器本朝雍正十年御賜物又漢陶太尊一銅犠尊象尊山尊雷尊各一漢章帝元和二年物也殿前為杏壇壇前有宋眞宗御贊石十有二壇左右為兩廡各五十楹兩廡中間各開翼門左通崇聖祠右通啟聖祠大成殿後為寢殿七楹左右掖各有門左達神庖及后土祠右達神廚及􅄟所寢殿後則聖蹟殿也自殿而南為大成門列㦸二十四旁開掖門左曰金聲右曰玉振循金聲門而東為承聖門内為詩禮堂堂東為禮器庫其北即崇聖門有孔氏世系碑又北為家廟循王振門而西為啟聖門内為金絲堂堂西為樂器庫其北即啟聖祠又北為寢殿出大成門列碑凡十二有唐乾封初贈太師碑崔行功撰儀鳳二年碑刻詔書二通開元七年修廟碑李邕撰二十八年修廟碑張之宏撰咸通中修廟碑賈防撰宋太平興國中修廟碑吕䝉正撰景祐中講學堂碑成昻撰五賢堂碑孔道輔撰金大定中鄆國夫人廟碑明昌中修廟碑並党懐英撰元大德中加封碑刻誥一通元統中賜孔廟中田宅碑歐陽元撰各覆以亭碑亭之左為居仁門毓粹門右為由義門觀德門其前為奎文閣閣左右掖皆有門門各五楹其東南􅁬為齋所本朝高宗純皇帝屢幸闕里皆駐蹕於此閣之後碑亭十有三座一為聖祖仁皇帝御製孔子廟碑一為御製重修孔子廟碑一為世祖憲皇帝御製重修孔子廟碑一為高宗純皇帝御製孔子廟碑其五為我朝遣官祭告孔子文又其四則唐宋金元諸碑也其前為同文門門左有漢魯相史晨祀廟碑魯相韓敕修墓碑泰山都尉孔宙碑博陵太守孔彪碑右有漢魯相乙瑛百石卒史碑魯相韓敕禮器碑諸郡史孔謙碑魏曹植宗聖侯奉祀碑又前為大中門門榜字舊為宋仁宗御書門左有碑亭二為明永樂宏治時修廟碑大中門前有三門金舊制也前為石橋三以跨璧水石橋左側為快睹門右側為仰高門􅈂北為宏道門橋之前有聖時門􅈂太和元氣坊東一坊曰德侔天地西一坊曰道冠古今坊前為櫺星門左右下馬碑二金明昌二年立櫺星門南為金聲玉振坊又有金水橋自此而南則縣城南門本朝康熙二十三年祖仁皇帝南巡十一月駕幸曲阜聖躬詣大成殿致祭特行三跪九叩禮佾舞一如國學之儀禮畢御詩禮堂講書特授聖裔舉人孔尚鉝監生孔尚任為五經博士御書萬世師表懸額大成殿御製碑文一道又御製孔子及顔曽思孟四子贊詞賜衍聖公以下銀幣並敘錄孔氏陪祀觀禮官員生監等有差命留曲柄黄葢於廟中特免曲阜縣田租一年三十年四月發帑修理聖廟明年告成仍頒御製碑文雍正元年世宗憲皇帝御書生民未有四字額於大成殿二年六月衍聖公孔傳鐸疏奏廟災詔發帑金命大臣督工修建凡殿門廊廡倣帝王宫殿之制用黃琉璃瓦先令繪圖進呈親爲指授視舊益隆七年十一月丙申大成殿上梁前二日卿雲見於曲阜縣特命廣庚戌科會試額四百名壬子科各省鄉試每十名加額一名御書榜聯大成殿曰德冠生民溯地闢天開咸尊首出道隆羣聖統金聲玉振共仰大成大成門曰先覺先知爲萬古倫常立極至誠至聖與兩間功化同流又御書大成殿大成門扁名頒送廟中凡祭器俱内府製造崇聖祠舊名啟聖祠專祀聖父叔梁公雍正元年追封五代木金父公爲肇聖王祈父公爲裕聖王防叔公爲詒聖王伯夏公爲昌聖王叔梁公爲啟聖王合祀祠中乾隆二年御書大成殿額曰與天地參高宗純皇帝頒闕里十三年二月戊寅駕幸曲阜是日先詣孔廟拈香至奎文閣降輦歩入大成門行三跪九叩禮翌日親行釋奠如康熙二十三年儀四配十二哲及兩廡先賢先儒崇聖祠各遣官分獻禮畢十三氏子孫宴有御詩禮堂進講賜御製詩及復聖宗聖述聖亞聖四贊御書大成殿額曰時中立極聯曰覺世牖民詩書易象春秋永垂道統出􅀋拔萃河海泰山麟鳳莫喻聖人門額四曰聖時曰宏道曰大中曰同文詩禮堂扁曰則古稱先聯曰紀緒仰斯文識大識小趨庭承至教學禮學詩併書杏壇賜衍聖公孔昭煥御製詩一章並貂裘蟒服表裏經史授聖裔舉人孔繼汾為内閣中書舍人凡十三氏子孫有職者皆加一級進士以下各賜白金有差降㫖遵聖祖例留曲柄黃葢一於廟中詔免曲阜縣次年地丁錢糧廣通省入學額數又遣大臣分祭顔曽思孟四賢專祠二十一年三月以平定伊犁駕幸曲阜祭告親行釋奠如十三年儀有御製述事詩二十二年四月二十七年四月迴蹕至曲阜詣廟瞻禮並有南廵御製詣闕里瞻拜詩按前代自漢高帝十二年後漢建武五年永平十五年元和二年唐乾封二年開元十年五代周廣順一年宋大中祥符元年凡因廵狩經過闕里者皆躬親祭奠而禮數缺畧儀制未備我聖祖仁皇帝躬備至德心源相接詳酌典禮咸本睿裁康熙五十八年欽頒中和韶樂器於闕里我世宗憲皇帝登極即加封先聖五代勒石廟庭以光盛典改稱幸學為詣學又命凡地方姓氏及臨文所用遇先師聖諱並加阝帝讀作期音以昭至敬我祖攸行四高宗純皇帝尊師重道率詣闕里舉釋奠之典先後頒鉶爵簠簋籩豆諸祭器於廟中勅樂部撰昭平宣平秩平敘平四時旋宫樂辭六章並定陳設樂器之獻凡可以備尊崇之制又改謁廟儀注立獻為跪禮者無一不至矣又按先師後裔列代封爵不一宋崇寕中封衍聖公元明以來因之本朝雍正八年特㫖增設執事官三品至九品四十員選孔氏族人充􅀘其曲阜縣知縣宋時初以孔氏子孫選充金元遂為世襲明改世襲為世職本朝乾隆二十一年命改為在外題選之缺又念現任世職歸部改銓不過恩及其身而止特授為世襲六品官尤見我高宗純皇帝玉成聖裔有加無已之至意二十六年又定四氏學學錄保送升選之例蓋我朝聖聖相承道統治統一以貫之凡此典禮優隆實皆前古所未有猗歟盛哉復聖顔子廟在曲阜縣城中孔廟東北三百餘歩即陋巷故宅也宋熙寕間太守孔宗翰搆顔樂亭於其地元元貞間始建廟至元九年歐陽元撰碑立廟中明成化正德間奉勅重修增廓其制廟南有坊榜曰陋巷府志滋陽縣復聖公廟舊在城東南八里唐開元中封顔子爲兖國公即其地建廟春秋致祭厯代因之繼遭兵燬明洪武十八年創建縣學遷于學官奉祀又寕陽縣復聖公祠在縣西四十里顔氏子孫有居於此者元時因立廟祀之仍復其家明因之本朝乾隆三十六年高宗純皇帝東廵有御製過陋巷顔子祠詩述聖子思子廟在曲阜縣城中孔廟西北隅舊有講堂在鄒縣城東南隅元元貞初改爲書院明宏治十六年始以衍聖公次子世襲五經博士奉祀事本朝康熙二十九年命視顔曾孟三賢祀典一體立廟曲阜亞聖孟子廟在鄒縣城南道左宋景祐四年孔道輔知兖州訪孟子墓得於鄒縣東三十里四基山因於墓旁建廟政和四年奉詔重修後以距城遼遠徙建東門之外宣和四年復徙南門外金泰和中燬元明以來相繼重修門人樂正克以下皆從祀焉本朝康熙二十六年聖祖仁皇帝幸魯親撰碑文令所司立之廟庭乾隆二十二年二十七年髙宗純皇帝南廵經鄒縣親詣拈香行一跪三叩禮分水龍王廟在汶上縣西南三十里南旺湖上運河西岸汶水自戴村壩轉西南流至廟前南北分流明初建廟於其上以鎭之天順二年主事孫仁重修學士許彬有記今春秋秩祀本朝乾隆三十年三十六年四十一年四十五年四十九年高宗純皇帝東巡俱有御製分水龍王廟詩魯義姑廟在寕陽縣南門外舊在縣東北八十里宋建明嘉靖十八年主事張文鳳移建於此汶河神廟在寕陽縣西北堽城壩明成化十一年建寺觀興隆寺在滋陽縣北門内隋仁壽二年建舊名普樂宋太平興國七年改名王禹偁有記有古塔十三級高峻入雲隋時物也迴鑾寺在寕陽縣葛石社宋祥符中東封泰山駐蹕於此故名開元禪寺在鄒縣東羅頭社唐天寶中建泉林寺在泗水縣東五十里陪尾山下寺之左右皆深林茂樹有大泉十數渟􅇦澄澈互相灌輸會而成溪是爲泗水南經卞城東有橋曰卞橋自卞橋西至邑城復有大泉數十南北交會入於泗水以達曲阜大抵邑境數十里内泉如星列皆泗水也以泗泉在東又多古林故曰泉林相傳子在川上即此處本朝康熙二十三年經泉林寺有聖祖仁皇帝南巡迴蹕至曲阜御製泉林記乾隆二十一年於泉上建駐此行宫高宗純皇帝幸魯迴蹕御製泉林詩二章又御製行宫八景詩曰近聖居曰在川處曰鏡瀾榭曰横雲館曰九曲彴曰柳煙坡曰古蔭堂曰紅雨亭二十二年二十七年三十年三十六年四十一年四十五年四十九年東廵駐蹕俱有御製詩並勒于石凡賜御書額九靈芝寺在滕縣東薛山前唐初建元大德間重修清涼寺有二一在滕縣東南漢宫村五代時建一在縣東北三十里東郭村金大定間修僧月曇撰記顯慶寺在滕縣城南五代漢乾祐中建金大定二年賜額重福寺在滕縣東北牙山唐武德間建大雲寺在嶧縣西北四十里唐天寳間為永安寺宋宣和中為巖公寺金大定間更今名寺前多古木有許由泉環繞寺側清眞觀在嶧縣治東南元為元都宫明洪武十八年勅賜今名龍門觀在嶧縣北六十里滄浪淵西宋時建其地峯巒環抱竹樹掩映稱為勝地萬壽宫在滕縣薛山東北隅丹陽洞元長春眞人邱處機建亦名雲峯觀提調官前總纂臣鄭紹謙恭纂并覆輯校對官臣何桂馨恭校
