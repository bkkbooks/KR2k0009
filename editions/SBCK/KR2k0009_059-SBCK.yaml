蒲魚之利蓋梁山濼即古大野澤之下流汶水自東北來與濟水㑹於梁山之東北􅅆合而成濼宋時決河滙入其中其水益大其後河徙而南濼亦漸淤迨元開㑹通河引汶絶濟明築戴村壩遏汶南流􅀊久填淤遂成平陸今州境樍水諸湖即其餘流也沙灣在夀張縣東南三十里去北安平鎮十二里黄河舊決口也明史徐九思傳嘉靖中九思以工部郎中治張秋河道議築减水橋於沙灣俾漕河與鹽河相通工成遂為永利舊志明時疏㑹通河一循元人故道惟於開河閘至沙灣比故河道北徙幾二十餘里又引黄河支流自河南封邱縣荆隆口東東至於沙灣以達臨清之衞河宏治中河決於此自是築塞黃陵岡而沙灣之流漸涸廣濟渠在夀張縣西舊志明正統中河決汴梁東北趨漕河潰沙灣東隄由大清河入海景泰四年徐有貞修塞決河先疏其上流為渠起張秋金隄通夀張之沙河至於范濮以達河沁名曰廣濟渠渠口即通源閘也阿澤在陽穀縣東左傳襄公十四年衞獻公出奔齊孫林父追之敗公徒於阿澤注東阿縣西南有大澤即阿澤也或曰今七級上下二閘即古阿澤之地西湖陂在陽榖縣西十五里亦名黒龍潭又縣西北二十五里有鵞鴨陂霖雨後視西湖陂尤廣東􅇦陂在壽張縣東一里冬夏不涸又縣東三里有白羊陂孔子準字池在汶上縣治堂上縣志自漢唐以來中有池以石為之外方内圓刻鯉魚四環注以水上不在水面下不在底以示為政者中行之意􅀒瑕泉在滋陽縣北六里以古􅀒瑕邑得名其東有闕里等泉西有􅃽詡等泉滋陽境内凡十四泉並入濟河按兗州府屬有泉州縣凡十泉源凡二百三十三俱為泉河通判所轄額設泉夫􅀊加疏濬以資漕運文獻泉在曲阜縣城東二歩舊志即魯頌之泮水也西南流入沂河逵泉在曲阜縣東南三里水中石如伏黿怒鼍名見左傳温泉在曲阜縣東南十里雖沍寒時水常暖可浴西北流入西沂水舊志曲阜縣境凡二十八泉入泗者七由西沂入泗者二十有一柳泉在寕陽縣西十里俗名柳子溝舊南流十五里入洸明嘉靖初洸水涸泉滲沙中不能達漕乃於洸河兩岸東西各立一閘以時啟閉東㑹蛇眼等泉滙於􅚒河明季仍南流入洸本朝康熙三年復改東流經城東㑹諸泉以入􅚒河濼澢泉在寕陽縣西北三十五里西南流經汶上縣東北五十里入蒲灣泊又西流㑹龍鬬泉入汶河蛇眼泉在寕陽縣北門外泉穴如蛇眼故名又縣北門外有日淵泉縣北一里有古泉東北一里有三里溝泉縣東門外有井泉東十二里有張家泉東南八里有金馬莊泉俱㑹蛇眼泉入於􅚒河舊志寕陽縣境泉凡十五入泗者四入洸者十有一魯姑泉在寕陽縣西北二十五里西南流六十五里入濼澢泉又西㑹汶上縣龍鬬泉入汶河淵源泉在鄒縣西南七十里源出鐵脚山下水深十餘丈西北流四里入白馬河舊志鄒縣境凡十五泉惟三角灣泉自入泗餘皆由白馬河入於泗寺前泉在泗水縣東五十里泉林寺南縣志陪尾山下有泗水神祠西即泉林寺水出山下四泉同發故曰泗水寺之左右泉以十數互相灌輸合而成流按山麓有趵突泉珍珠泉黒虎泉淘米泉所謂四泉同發者也相去各二丈許從石罅中湧出噴瀑沸騰晝夜不息合左右十餘泉并在卞橋東五里内滙流而爲泗盜泉在泗水縣東北尸子孔子過於盜泉渴矣而不飲惡其名也水經注盜泉出卞城東北卞山之隂論撰考䜟曰水名盜泉仲尼不潄即斯泉矣縣志縣境之泉凡八十有七惟盜泉不流餘皆滙爲泗河趙溝泉在滕縣西南二十六里舊志有絞溝三山五花等泉俱注南沙河又黃溝泉在縣東南與温水龍灣諸泉舊俱逕沛縣留城閘入漕河縣境凡三十四泉皆引流濟運許由泉在嶧縣西北四十里光武泉在嶧縣北五十里即巨龍河上流相傳漢光武征董憲時曾駐於此舊志縣境凡十有四泉皆引以濟運許池泉在嶧縣西北十里嶺阜下湧出五泉曰珍珠曰鍋泉曰篩泉曰金化曰􅁅泉惟􅁅泉稍濁餘皆清澈可鑒毫髪南流會滄浪石室二泉即為氶水馬莊泉在汶上縣東南十八里泉源二十四合而為一西流十五里徑城南伏流至城北復出由魯溝入蜀山湖龍鬬泉在汶上縣東北五十里初出湧沸如兩虬相擊故名其東有薛家溝泉雞爪泉趙家橋泉俱㑹寕陽境之魯姑泉濼澢泉亘四十里而達蒲灣濼滙流入汶河聖水井在滋陽縣東北二里石佛寺門東府志井底有碑上刻古􅂐􅀊旱致祭取碑出井即雨孔子故井在曲阜縣城中孔廟東詩禮堂後相傳即夫子所飲之井也明兗州府知府童旭護以石欄本朝乾隆十三年二十一年二十七年三十年三十六年四十一年四十五年四十九年製故井贊及高宗純皇帝幸魯有御御製故井諸詩并勒石井側伯禽井在曲阜縣東北三里周公廟東南水清冽而甘亦名甘井顔子井在曲阜縣東北周公廟西南季桓子井在曲阜縣東北三里周公廟北圍五丈三尺深八十尺以石甃之白褒魯記鹿門有兩井一為臧武仲井深六十尺一為季桓子井深八十八尺國語季桓子穿井得土􅇲其中有羊以問仲尼即此阿井在陽穀縣北五十里東阿城鎮上有亭覆之水經注東阿城北門内西側􅆏上有大井其巨若輪深七丈􅀊常煑膠入貢本草所謂阿膠也沈括夢溪筆談東阿濟水所經取井水煑膠謂之阿膠用攪濁水則清服之下膈疏痰止吐皆取濟水性趨下清而重故以治淤濁及逆上之痰齊乘今水不盈數尺色正綠而重周為垣掌之於官提調官前總纂臣鄭紹謙恭纂并覆輯校對官臣鄧賢性恭校大清一統志兗州府二古蹟樊縣故城在滋陽縣西南漢置縣屬東平國後漢改屬任城國晉因之後廢括地志故城在瑕邱縣西南三十五里乘邱故城在滋陽縣西北春秋莊公十年公敗宋師于乘邱注乘邱魯地漢置縣屬泰山郡武帝封中山靖王子將夜為侯國後漢省水經注洸水逕泰山郡乘邱縣故城東括地志故城在瑕邱縣西北三十五里通鑑周安王二年魏韓趙伐楚至桑邱胡三省注桑邱史記楚世家作乘邱即今兗州之瑕邱縣也按水經注引史記趙世家韓將舉與齊魏戰于乘邱謂即乘邱縣考史記乘邱本作桑邱張守節正義引括地志辨桑邱在易州不在泰山竊思魯地入楚三國伐楚而至桑邱其為乘邱無疑若趙齊魏之戰安得在此可以證水經注改桑邱為乘邱之失又漢志於泰山郡乘邱下濟陰郡乘氏下俱引春秋公敗宋師于乘邱水經注乘氏縣故城宋乘邱邑也似又以乘邱爲宋地考左傳乘邱之役公子偃自雩門出則乘邱之去魯城不遠以爲宋地􅂲未必然至漢志注之兩引亦自相矛盾附辨於此魯國故城今曲阜縣治周時魯國舊都左傳定公四年祝鮀曰因商奄之民命以伯禽而封于少皥之墟史記武王封周公于曲阜正義曰兖州曲阜縣外城即魯公伯禽所築也元和志兗州曲阜縣本漢魯縣其地即古炎帝之墟自後或爲魯國或爲魯郡而縣屬焉北齊文宣帝省魯郡仍於魯城置任城郡開皇三年罷郡四年改縣曰汶陽屬兗州十六年又改名曲阜府志古魯城在今曲阜縣城外周迴延袤可十餘里縣志在縣城北三里今爲古城村按元和志闕里矍相圃俱云在曲阜縣西南三里魯城中始知縣志之古城乃唐時之曲阜非魯城也乾隆二十七年高宗純皇帝南廵迴蹕駐曲阜御製古泮池證疑以今曲阜縣治爲古之魯城足以正府縣志之失而新城舊城瞭如指掌矣曲阜故城在今曲阜縣東十里縣志宋大中祥符間遷縣治於魯城東明正德七年流賊䧟曲阜乃徙還魯城故址築新城按故城乃齊隋時所遷縣志誤南平陽故城今鄒縣治本春秋時邾地後爲魯平陽邑左傳哀公二十七年越子使后庸來盟于平陽戰國時爲齊南陽邑孟子謂魯愼子一戰勝齊遂有南陽魯仲連謂楚攻南陽皆指此也漢置南平陽縣屬山陽郡後漢永平二年改屬東平國後仍還山陽晉屬高平國劉宋曰平陽屬高平郡後魏因之北齊時省水經泗水又過南平陽縣西注山陽郡之南平陽縣也竹書紀年曰梁惠成王二十九年齊田盼及宋人伐我東鄙圍平陽者也章懐太子曰南平陽故城今兗州鄒縣按齊乘有古邾城在鄒縣之南漢以爲南平陽晉廢入鄒縣今南平陽晉宋後魏俱屬高平並未嘗廢至隋書地理志始無此縣當在北齊時廢入且今鄒縣南距漢時縣治止二十餘里若南平陽又在今縣之南則兩縣相去不過數里似乎太近齊乘之言皆非也縣志謂南平陽城在縣西三十里今其地猶有平陽橋平陽寺平陽店然以今之俗名證漢時舊縣亦屬難信當從後漢書注爲是邾國故城在鄒縣東南二十六里本邾婁國春秋隠公元年公及邾儀父盟于蔑註邾今魯國鄒縣也左傳文公十三年邾文公卜遷于繹註繹邾邑魯國鄒縣北有繹山漢置騶縣前漢書地理志魯國騶故邾國繹山在北後漢書郡國志註劉會騶山記曰邾城在山南去山二里水經注繹山邾文公之所遷今城在鄒山之陽依巖阻以墉固故邾婁之國曹姓也後乃縣之因鄒山之名以氏縣也杜佑通典故邾國城在鄒縣東南周迴四十里上冠峯巒下屬溪壑自南北朝以來遂遷今治元和志鄒縣本漢騶縣地故邾國魯之附庸魯繆公改邾為鄒因鄒山以為縣于欽齊乘鄒縣古邾國鄭樵通志云顓帝元孫陸終氏第五子晏安賜姓曹封於邾子孫以邾為姓周武王封晏安之裔邾挾為附庸自挾至儀父十二世始見春秋十四世邾文公遷淤繹改稱鄒趙臺卿曰至孟子時改曰鄒此説非也按六書考故邾鄒同聲之轉也故邾謂之邾婁婁有二音合閭音為邾合樓音為鄒此本邾國耳後為楚宣王所滅又古邾城在鄒縣南邾文公遷於繹繹本鄒山故亦稱鄒城蓋其始封之邑也漢嘗以為南平陽鄒城在繹山南二里邾遷於繹依嶧山以爲邑今山前古城猶存此亦漢縣也按古邾城在嶧山之南即邾文公之所遷漢晉以來爲鄒縣諸說相同固無可疑獨今縣治在嶧山北二十里以元和志考之自唐時已然而諸書皆未言及徙置之故齊乘備載古蹟於鄒縣之外増一邾城云是其始封之邑在今縣南則是今縣既非始封之邑又非遷嶧之城縣志求之不得以宋元嘉間約畧言之亦無確據考後漢書注云南平陽縣故城今兗州鄒縣是也始知今縣治乃漢之南平陽縣無疑蓋省平陽入鄒縣又移鄒縣治平陽耳後魏時平陽鄒縣並置分屬高平魯郡北齊天保七年併省郡縣其改置鄒縣當在此時不在宋元嘉間也高平故城在鄒縣西南漢置槖縣屬山陽郡後漢更置高平侯國晉屬高平國劉宋時移高平郡來治後魏因之北齊郡縣俱廢水經注泗水逕高平縣故城西漢宣帝地節三年封丞相魏相爲侯國高帝八年封將軍陳錯爲槖侯地理志曰縣故山陽郡之槖也王莽改曰高平應劭曰章帝改章懐太子曰故城在鄒縣西南卞縣故城在泗水縣東五十里春秋時爲魯卞邑卞莊子食邑於此春秋僖公十有七年夫人姜氏㑹齊侯於卞國語楚申無宇曰魯有弁費注韋昭曰弁即卞也史記魯世家頃公亡遷於卞邑漢置卞縣晉因之後魏縣廢水經注泗水逕卞縣故城南春秋襄公二十九年季武子取卞曰聞守者將叛臣率徒以討之是也郚鄉故城在泗水縣東南春秋時魯邑左傳文公七年城郚注卞城南有郚城漢置郚鄉縣屬東海郡後漢省蕃縣故城今滕縣治漢置蕃縣前漢書注應劭曰邾國也音皮師古曰白裒云陳蕃之子爲魯相國人爲諱改曰皮此說非也郡縣之名土俗各有别稱不必皆依本字水經注南梁水逕魯國蕃縣故城東隋書地理志彭城郡滕舊置蕃郡後齊廢開皇十六年改曰滕縣元和志滕縣本古滕國漢蕃縣也後魏置蕃郡以縣屬焉北齊郡縣並廢隋於此置滕縣屬彭城郡唐屬徐州南至州二百里桃山故城在滕縣東漢置縣爲侯國屬泰山郡後漢省今縣東南有桃山漢縣當以此名薛縣故城在滕縣東南四十四里薛河之北古奚仲所封之國左傳定公二年薛宰曰薛之皇祖奚仲居薛為夏車正遷於邳仲虺居薛為湯左相戰國時齊封田嬰於此秦置薛縣漢屬魯國後齊廢史記孟嘗君傳齊湣王三年封曰嬰於薛子文代立是為孟嘗君後漢書郡國志薛城在春秋之季曰徐州哀公十有四年齊陳恒執其君置於舒州史記作徐州水經注竹書紀年梁惠成王三十一年邳遷于薛改名為徐州括地志薛縣故城在滕縣東南四十四里元和志故薛城在滕縣東南四十三里薛侯國也當孟嘗君時薛中六萬家其中富厚天下無比此田文以抗禦楚魏也按薛城春秋以後别名舒州史記皆作徐州劉熙釋名徐舒也古字相通固非禹貢之徐州亦非漢晉以來之彭城也近志以為即今徐州因引入彭城誤矣昌慮故城在滕縣東南六十里春秋邾濫邑也左傳昭公三十一年邾黒肱以濫來奔注濫東海昌慮縣漢宣帝甘露元年封梁孝王子宏為侯國後漢建安三年析置昌慮郡尋復故晉元康中以縣屬蘭陵郡宋為郡治後魏仍屬蘭陵郡後廢寰宇記濫城在滕縣東南五十九里府志故昌慮城周十里有子城按昌慮縣建安中魏武曾分為郡晉以後復為縣乃寰宇記謂建安中置郡至隋始省齊乘明統志􅈂謂建安中始置縣與諸史皆不相合齊乘又謂此即戚城以漢戚朐縣為證併二縣名為一皆誤戚縣故城在滕縣南七十里乃秦縣也漢屬東海郡後漢及晉因之後廢漢書高帝紀秦二年十一月沛公引兵之薛秦泗州守壯兵敗於薛走至戚又曹參傳遷為戚公屬碭郡注顔師古曰為戚縣之令府志故戚城周圍四里今泇河同知駐此蘭陵故城在嶧縣東五十里史記荀卿適楚春申君以為蘭陵令漢置縣屬東海郡後漢及晉初因之元康元年分置蘭陵郡劉宋移郡治昌慮以蘭陵省入氶縣後魏復置屬蘭陵郡北齊廢隋開皇十六年復置大業初又廢改氶縣為蘭陵唐武德四年仍改蘭陵為氶縣别置蘭陵縣貞觀初復省入氶縣屬沂州元和志蘭陵縣城在氶縣東六十里齊乘在州東南六十里鄫縣故城在嶧縣東八十里春秋時小國僖公十四年鄫子來朝襄公十六年莒人滅鄫鄫亦作繒史記夫差七年敗齊師于艾陵遂至繒又貨殖傳朐繒以北其俗齊漢置繒縣屬東海郡後漢改屬琅邪國後漢書劉永傳董憲及龎萌走入繒山是也晉因之後廢入即邱魏書地形志即邱縣有繒城隋復分氶縣置繒城縣大業初併入氶縣唐復置鄫城縣為鄫州治貞觀初州縣俱廢寰宇記故繒城在氶縣東八十里齊乘古鄫城在嶧州東八十里漢晉並為繒縣其後省入蘭陵隋初鄫州理氶縣大業二年始移蘭陵郡理此後為山賊左君衡所據至唐武德初平賊復置鄫州理此城按地形志繒城晉宋時省入即邱齊乘本寰宇記謂省入蘭陵與魏志亦不合又按隋開皇十六年分氶縣地置鄫州鄫城縣及蘭陵縣此城當時為鄫州鄫城所理其蘭陵所理即漢晉舊縣也未嘗移理此城亦未嘗為郡齊乘謂蘭陵移郡理此亦誤唐武德四年以氶縣治鄫州别置鄫城縣以屬之亦未嘗理此城也偪陽故城在嶧縣南五十里古偪陽國左傳所謂偪陽妘姓者也襄公十年晉侯會諸侯及吳子壽夢于柤遂伐偪陽穀梁作傅陽漢置傅陽縣屬楚國後漢屬彭城國晉因之後廢魏書地形志彭城郡古有偪陽城水經注柤水流逕偪陽縣故城東北陰平故城在嶧縣西南三十里漢陽朔二年封楚孝王子回為陰平侯國屬東海郡後漢因之晉省章懐太子注陰平故城在今沂州氶縣西南建陽故城在嶧縣西漢縣屬東海郡宣帝甘露四年封魯孝王子咸為侯國後漢省後漢書劉永傳董憲屯建陽去昌慮三十里注建陽故城在今沂州氶縣北氶縣故城在嶧縣西北一里漢置縣以氶水所經而名屬東海郡後漢及晉初因之元康後屬蘭陵郡宋因之後魏武定五年移郡治此隋改為蘭陵縣屬彭城郡唐復故元和志氶縣東北至沂州一百八十五里元和十四年楚州刺史李愬討李師道拔氶城寰宇記漢故城在今縣西一里唐武德四年移今治金貞祐四年徙治土樓村元省入嶧州府志故氶縣城在嶧縣城西北漢氶縣故城也氶水之西又有舊土城相傳為隋鄫州城亦稱氶縣中都故城在汶上縣西春秋時魯邑夫子為中都宰即此後漢書郡國志須昌有致密城古中都水經注巨野溝西南逕致密城南郡國志曰古中都也即夫子有宰之邑元和志中都故城在今中都縣西三十九里一名殷密城至漢以其地為東平陸縣按後漢志水經注皆作致密而元和志寰宇記皆作殷密蓋傳寫之訛平陸故城在汶上縣北本古厥國戰國時為齊平陸邑孟子之平陸即此史記齊世家康公十五年魯敗齊師於平陸漢置東平陸縣劉宋去東字曰平陸元嘉中移樂平縣寄治於此隋復改樂平為平陸唐改名中都屬鄆州元和志鄆州中都縣西北至州一百里寰宇記中都縣在鄆州東六十五里桃鄉故城在汶上縣東北春秋魯邑春秋襄公十七年齊侯伐我北鄙圍桃漢鴻嘉二年封東平思王子宣為桃鄉侯國於此屬泰山郡後漢省水經注汶水又西南逕桃鄉縣故城西王莽之鄣亭也世以為鄣城魏收志無鹽有南章城蓋即此也陽穀故城在陽穀縣東北三十里本春秋齊邑左傳僖公三年齊侯宋公江人黄人㑹于陽穀杜預注在須昌縣北又齊語桓公大朝諸侯於陽穀隋因置陽穀縣元和志縣東南至鄲州七十五里寰宇記開寳六年河水衝破縣城至太平興國四年移於上廵鎭宋志景德三年又移治孟店即今治又陽榖亭在東阿縣東南四十里又有會盟臺在縣南五里亦名陽穀亭夀張故城漢置縣在今縣東南五十里東平州界金大定中河水壞城乃遷於今縣西竹口鎭十九年復還故治明洪武初廢十四年又移置於王陵店即今治也瑕邱舊城在滋陽縣西二十五里左傳哀公七年季康子伐邾以邾子益來囚諸􅀒瑕杜預注􅀒瑕魯邑高平南平陽縣西北有瑕邱城是也漢置瑕邱縣元朔三年嘗封魯恭王子政為侯國晉省入南平陽水經注瑕邱魯邑昔衞大夫公叔文子升於瑕邱曾子弔諸􅀒夏鄭元皇甫謐並言衞地魯衞雖殊土則一也元和志宋元嘉三十年立兗州理瑕邱城而瑕邱無縣隋文帝割鄒縣汶陽平原三縣界立瑕邱縣屬兗州縣志漢之瑕邱宋置于嵫陽明洪武初􅀠濟寕府十八年廢建今治平原舊城今寕陽縣治本漢寕陽縣北境北齊改置平原縣於此隋開皇十六年改名龔邱屬魯郡唐因之屬兗州元和志龔邱縣南至兗州五十里本漢寕陽縣之地屬泰山郡後漢改屬東平國北齊文宣帝移置平原縣於漢寕陽城北十七里今縣理也隋以此縣與德州平原縣同名以縣東南二十里有龔邱城遂改平原為龔邱屬魯郡按隋書地理志元和志皆云平原本北齊置當時必有所據曹學佺名勝志乃謂後魏移置新志又以沈約宋志陽平郡有平原縣大明中置後魏屬東陽平郡遂謂平原縣本宋時置考魏書地形志東陽平郡平原縣有鉅野澤鉅野去今寕陽尚遠非龔邱地也當以隋書元和志為是寕陽舊城在今寕陽縣南漢武帝元朔三年封魯恭王子恬為寕陽侯國於此魏書地形志東陽平郡元城縣有寕陽城水經注洸水逕寕陽縣故城西元和志漢寕陽城在龔邱縣南十七里剛縣舊城在寕陽縣東北三十五里戰國時齊之剛邑秦昭王三十六年取齊剛壽漢置剛縣屬泰山郡後漢改屬濟北國晉曰剛平縣屬東平國宋省水經注汶水西南過剛縣北其地逼近汶水後譌剛為堽今有堽城壩又春秋哀公八年齊伐魯取闡注闡鄉在剛縣北漢書地理志剛縣故闡鄉水經注京相璠曰剛縣西四十里有闡亭未知孰是汶陽舊城在寕陽縣東北本春秋時魯地左傳僖公元年公賜季友汶陽之田成公二年齊人歸我汶陽之田漢置汶陽縣屬魯國晉屬魯郡宋及後魏因之元和志故汶陽城在龔邱縣東北五十四里舊志漢章帝元和三年東廵泰山立行宫於汶陽世謂之闕陵城成縣舊城在寕陽縣北本周時郕國地武王封弟叔武於此春秋隱公五年衞師入郕註郕國也東平剛父縣西南有郕鄉後漢置成縣屬濟北國晉省水經注洸水逕盛鄉城西京相璠曰剛縣西南有盛鄉城者也按郕公羊作盛史記作成後漢置縣因之古郕國與魯之成邑雖皆屬寕陽實為二地郕國在西近洸水魯成邑在東近淄水不相混也明統志謂郕國城在汶上縣北二十里誤滕國舊城在滕縣西南十四里周文王子叔繡所封秦為滕縣漢置公邱縣屬沛郡後漢屬侯國晉咸寕三年改屬魯郡後廢水經注南梁水逕蕃縣北西逕滕城北春秋左傳隠公十一年滕侯薛侯來朝漢高帝封夏侯嬰為侯國號曰滕公鄧晨曰今沛郡公邱也縣故城在滕西北前漢書地理志公邱侯國故滕國周懿王子錯叔繍所封齊滅之秦以為縣漢武帝元朔三年封魯共王子劉順為侯國元和志古滕國在滕縣西南十四里滕城是也公邱故城在縣西南十五里夏侯嬰初為滕令號滕公此時高祖未立屬縣故滕為秦縣至武帝改為公邱縣屬沛國縣志古滕城俗呼文公里城周二十里内有子城按左傳郜雍曹滕文之昭也則叔繡之為文王子明甚漢志誤為懿王子顔師古已辨之矣合鄉舊城在滕縣東漢置縣屬東海郡後漢志作合城晉仍曰合鄉宋屬蘭陵郡後魏因之北齊廢水經注漷水出東海合鄉縣漢和帝永寕九年封馬光子復為侯國元和志合鄉故城在滕縣東二十三里即論語所謂互鄉是也永興廢縣在滕縣東南後魏黄興初置永興永福二縣屬建昌郡太和十五年罷郡屬彭城武定五年改屬蕃郡北齊省縣志有臨城在縣東南七十里周四里城西有永興村疑即故縣也又有故縣城在縣東南一百二十里茱萸山北今猶名故縣集疑即故永福也東阿廢縣在陽穀縣東北五十里春秋莊公十三年公會齊侯盟于柯杜注今濟北東阿爲齊之柯邑猶祝柯今爲祝阿也史記齊桓公與魯會柯而盟後爲阿邑司馬穰苴傳齊景公時晉伐阿鄄趙成侯九年與齊戰阿下又齊威王烹阿大夫秦時謂之東阿漢置東阿縣後漢以下因之自宋開寶八年遷縣治於今東阿縣之南榖鎮而故城遂墟今屬縣界謂之阿城鎮檀城在府城北亦曰檀鄉後漢書任光傳刁子都餘黨會於檀鄉注今兗州瑕邱縣東北有檀鄉府志地理瑕邱檀城古灌壇也周時侯國炎帝之後路史兗州有檀鄉鄹城在曲阜縣東南魯邑左傳襄公十年晉侯伐偪陽偪陽人啟門諸侯之士門焉縣門發郰人紇抉之以出門者注郰邑魯縣東南莝城是也史記孔子世家孔子生魯昌平鄉陬邑注孔安國曰孔于父叔梁紇所治邑縣志縣東十里有西鄒集按鄹左傳作郰史記作陬字義皆同與邾婁之改名鄒者有别水經注謂邾國叔梁之邑孔子生於此者誤也昌平城在曲阜縣東南八十里左傳僖公二十九年介葛盧來朝舍于昌衍之上注魯縣東南有昌平城即昌衍也府志明嘗於此置昌平驛春城在寕陽縣西北三十里汶水之陰即水經注所謂春亭也府志即古春城郡成城在寕陽縣東北九十里春秋魯邑春秋桓公六年公㑹紀侯于郕後為孟氏邑左傳昭公七年晉人來治􅂎田季孫以成與之而遷孟氏之邑于桃後復歸魯定公十二年仲由為季氏􅈗將墮成公圍成弗克禮記檀􅃓子羔為成宰史記齊宣公四十八年田和取魯之成邑縣志舊曰故城社今併太平為一社曰太古社漆城在鄒縣東北左傳襄公二十一年邾庶其以漆閣邱來奔注南平陽縣東北有漆鄉水經注泗水自南平陽縣又南逕故城西世謂之漆鄉十三州記曰漆鄉邾邑也今見有故城西南方二里姑蔑城在泗水縣東春秋隱公元年公及邾儀父盟于蔑注蔑姑蔑魯地魯國卞縣南有姑蔑城括地志姑蔑故城在泗水縣東四十五里菟裘城在泗水縣北左傳隱公十一年公曰使營菟裘吾将老焉杜預注菟裘魯邑在梁父縣南元和志菟裘故城在泗水縣東北五十里郳城在滕縣東春秋莊公五年郳黎來來朝注附庸國也東海昌慮縣東北有郳城孔頴達疏郳之上世出於邾國譜云小邾邾挾之後也夷父顔有功於周其子友别封為附庸居於郳曾孫黎來始見春秋數從齊桓尊周室王命為小邾子寰宇記郳城在氶縣文獻通考郳城今沂州嶧即古氶地屬沂州齊乘郳城在鄫城南土人云小􅁅城即小邾之訛也府志郳城在滕縣東一里梁水之東周八里按郳即小邾應劭及晉志皆云蕃縣故小邾國蕃即今滕縣而昌慮亦在縣境當以在滕者為近且寰宇記齊乘既以郳城在氶縣嶧州而於滕縣下仍云古小邾國亦自相矛盾矣堌城在滕縣東薛河之南或謂之五固府志城半為河水所圮近於河岸塌出一碑八分書所引用皆漢以前事文字古質殆漢時物也梁城在滕縣東漷河南有臺焉舊城基也建置無考其曰梁者或因梁水為名二䟽城在嶧縣東四十里漢疏廣疏受所居也齊乘二疏宅在嶧州東四十里羅滕城墓亦在焉府志城周五六里士人指以為宅乾隆二十七年三十年髙宗純皇帝南廵經此俱有御製二疏城詩鍾離城在嶧縣西南三十五里路史沂之氶有鍾離城縣志舊傳楚將鍾離昧所築又孟壤城在縣西北三十里其北為夾谷山相傳為齊侯城闞城在汶上縣西南南旺湖中春秋桓公十有一年公㑹宋公于闞注闞魯地在東平須昌縣東南戰國䇿無忌謂魏王曰秦長驅梁北東至陶魏之交北至乎闞史記魏世家北至平監注徐廣曰史記齊闞止作監字後漢書郡國志東平陸有闞亭注須昌有闞城愽物記曰即此亭是也伏城在陽穀縣東元和志陽穀縣有伏城在縣東南二里蓋伏生所居因名范城在夀張縣東二十里寰宇記夀張縣有范城即春秋范武子邑舊志在縣東南二里閭邱邑在鄒縣境水經注洙水又西南逕南平陽縣之顯閭亭西邾邑也春秋襄公二十一年經書邾庶其以漆閣邱來奔杜預曰平陽北有顯閭亭十三州記曰山陽南平陽縣又有閣邱鄉從征記曰杜謂顯閭亭也今按漆鄉在縣東北漆鄉東北十里見有閭邱鄉顯閭非也然則顯閭自是别亭未知孰是虛朾邑今泗水縣治春秋成公十有八年仲孫蔑㑹晉侯宋公衞侯邾子齊崔杼同盟于虚朾元和志泗水縣西南至兗州一百里本春秋之虚朾地漢為卞縣地隋分汶陽縣於此城置泗水縣屬兗州常邑在滕縣東南詩魯頌居常與許鄭氏曰常或作嘗在薛之南孟嘗君食邑於薛府志今薛城南十里有孟嘗集或以為即古常邑史記越世家願齊之試兵南陽莒地以聚常郯之境索隱曰常邑名即田文之所封薛陵邑在陽穀縣東北戰國時齊邑史記齊世家威王七年衞伐我取薛陵又威王語阿大夫衞取薛陵子不知蓋其地與阿近奄里在曲阜縣城東古奄國書序成王東伐淮夷遂踐奄遷其君于蒲姑左傳昭公九年詹桓伯曰蒲姑商奄吾東土也許愼説文䣍國在魯後漢書郡國志魯有古奄國注皇覽曰奄里伯公􅃁在城内祥舍中民傳言魯五德奄里伯公葬其宅闕里在曲阜縣城中家語孔子始教學於闕里漢書梅福傳仲尼之廟不出闕里注師古曰闕里孔子舊里也後漢書明帝紀永平十五年三月幸孔子宅注在今兗州曲阜縣故魯城中歸德門内闕里之中背洙面泗矍相圃之東北也又鮑永傳孔子闕里無故荆􅁄自除從講堂至於里門水經注闕里背洙面泗牆南北一百二十歩東西六十歩四門各有石閫北門去洙水百餘歩本朝康熙二十三年聖祖仁皇帝南廵經過闕里有御製過闕里詩乾隆十三年二十一年三十六年四十一年四十九年高宗純皇帝東廵俱有御製恭和聖祖過闕里詩按魯有兩觀闕名也禮記仲尼與于蜡賓事畢出遊于觀之上蓋闕門之下其里即名闕里而孔子之宅適在是耳杏壇在曲阜縣孔廟殿前即孔子教授堂之遺址莊子孔子遊於緇帷之林休坐乎杏壇之上司馬彪注杏壇澤中高處也漢明帝幸宅嘗御此後世因以為殿宋天聖間孔道輔監修祖廟増廣殿庭移大殿於後講堂舊址不欲拆毁因甃為壇環植以杏金學士党懐英篆杏壇二字碑於亭内本朝乾隆十三年髙宗純皇帝幸魯有御製杏壇贊併詩二十一年有御製杏壇詩雩壇在曲阜縣南水經注雩門南隔水有雩壇壇高三丈論語所云舞雩是也寰宇記雩壇在曲阜縣南六里沂水之南即樊遲從遊處也泮宫在曲阜縣城中東南隅詩魯頌既作泮宫淮夷攸服水經注靈光殿東南即泮宫也在高門􅈂北道西宫中有臺高八十尺臺南水東西一百歩南北六十歩臺西水南北四百歩東西六十歩臺池咸結石為之詩所謂思樂泮水也乾隆十三年高宗純皇帝幸魯於泮池舊基建有行宫恭邀清蹕二十一年二十二年二十七年三十六年四十一年四十九年俱有御製古泮池詩與御製古泮池證疑並勒石行宫按泮宫臺亦謂之書雲臺左傳僖公五年日南至公登臺以望雲物即此靈光殿在曲阜縣東二里漢景帝子共王所立王延夀魯靈光殿賦序初恭王始都下國好治宫室遂因魯僖基兆而營焉遭漢中微自西京未央建章之殿皆見隳壞而靈光巋然獨存水經注孔廟東南五百歩有雙石闕即靈光之南闕北百餘歩即􅂕光殿基東西二十四丈南北十二丈高丈餘東西廊廡别舍中間方七百餘歩闕之東北有浴池方十四許歩池中釣臺方十歩池臺悉石也遺基尚整故王延夀賦曰周行數里仰不見日者也達巷在滋陽縣西北五里縣志相傳即達巷黨人所居陋巷在曲阜縣闕里東北今顔子廟在焉寰宇記陋巷在曲阜縣西南二里孔子廟北二百歩即顔子所居本朝乾隆十三年幸魯有高宗純皇帝御製陋巷詩五父衢在曲阜縣東南禮記孔子少孤不知其墓殯於五父之衢左傳襄公十一年季武子將作三軍詛諸五父之衢杜預注五父衢魯縣東南道名也後漢書郡國志魯有五父衢注地道記曰在城東括地志五父衢在曲阜縣東南二里子貢廬墓室在曲阜縣孔林石壇西南一室三楹俱東向即子貢廬墓處也乾隆二十一年魯有高宗純皇帝幸御製子貢廬墓處詩萬仭宫牆在曲阜縣南門即今仰聖門也額四宇明胡纘宗所題朝乾隆十三年高宗純皇帝幸魯本御書易之併御書萬仞宫牆贊兩觀在曲阜縣東南春秋定公二年雉門及兩觀災注兩觀闕也家語孔子誅少正卯于兩觀之下元和志兩觀在曲阜縣東南五十歩闕里志兩觀在古魯城雉門之外周圍各四十歩高二丈東西相去一百歩奎文閣在曲阜縣孔廟同文門北金明昌五年章宗所命名閣凡七楹本朝康熙間恭藏聖祖仁皇帝賜書墨寶於上又聖蹟殿在孔廟寢殿後明萬厯間建藏聖蹟圖諸石刻本朝乾隆十三年高宗純皇帝幸魯有御製奎文閣贊魯壁在曲阜縣孔廟東詩禮堂後即孔子故宅後世以為廟宋時即故址建金絲堂明宏治間改建新廟遂移金絲堂於廟西漢書景十三王傳魯恭王初好治宫室壞孔子舊宅以廣其宫聞鐘磬琴瑟之聲遂不敢復壞於其壁中得古文經傳李東陽金絲堂銘序金絲堂舊在孔廟左廡之東東􅈂井前􅈂詩禮堂嘗掘地得石刻知為孔子故宅蓋世所傳魯恭王聞金石絲竹之聲者也故厯代之樂器藏於其間本朝雍正間廟燬而堂猶存新廟之闢堂地皆入左廡金絲則移而西與詩禮堂正相􅈂乾隆十三年高宗純皇帝幸魯有御製金絲堂贊二十一年有御製魯壁詩並勒石矍相圃在曲阜縣城内闕里西即今曲阜縣學之地禮記孔子射於矍相之圃後漢書郡國志注矍相圃在城中西南近孔子廟元和志在曲阜縣西三里魯城中蒲圃在曲阜縣左傳襄公四年季孫為已樹六檟于蒲圃東門之外魯莊公臺在曲阜縣東左傳莊公三十二年築臺臨黨氏寰宇記莊公臺在曲阜縣西北二里魏書地形志魯縣有昭公臺府志在城西北與莊公臺相對鬬雞臺在曲阜縣東南七里左傳昭公二十五年季郈之雞鬬括地志鬬雞臺二所相去五十歩在曲阜縣東南三里魯城中春秋臺在曲阜縣南十里孔子作春秋處見任昉述異記郊臺在曲阜縣西南水經注沂水又西逕圜邱北高四丈餘明統志郊臺在曲阜縣西南十里東西五十八歩南北四十歩即魯君郊祀之所周公臺在曲阜北水經注季武子臺西北二里有周公臺高五丈周五十歩臺南四里許即夫子故宅也府志今文憲王廟在城北高阜上世所稱魯太廟舊址者亦即其地也季武子臺在曲阜縣東北左傳定公十二年公山不狃叔孫輒率費人以襲魯公與三子入于季氏之宫登武子之臺水經注曲阜上有季氏宅宅有武子臺今雖毁猶高數尺清涼臺在滕縣東南縣志相傳漢武東廵置宫於此復築臺曰清涼今其地名漢宫村逍遥臺在滕縣故薛城南十里左傳莊公三十一年築臺于薛舊志孟嘗君歸薛乃更築名曰逍遥唐張九齡有登薛公逍遥臺詩嶽雲樓在府治東南本古兗州城樓唐杜甫嘗登此賦詩云浮雲連海岱故稱嶽雲後樓毁人呼其故址為少陵臺詩禮堂在曲阜縣孔廟承聖門内本孔子舊宅宋眞宗幸魯嘗御此本朝康熙二十三年聖祖仁皇帝南廵迴蹕至曲阜釋奠禮畢御詩禮堂命聖裔舉人孔尚鉝監生孔尚任講書乾隆十三年高宗純皇帝幸魯釋奠禮畢于詩禮堂御經筵有御製詩禮堂進講詩併詩禮堂贊俱勒石又御書額曰則古稱先二十一年三十年三十六年四十一年四十九年高宗純皇帝幸曲阜俱有御製詩禮堂詩又詩禮堂之東廡為禮器庫乾隆十三年御製禮器贊勒石庫中斷機堂在鄒縣南門外曝書臺側即孟子故居也元元貞初建鄒堂在鄒縣治内宋黃庭堅嘗作鄒操元祐中縣令建鄒堂書其操於屏風思聖堂在汶上縣冶内元楊奐東遊記汶上古之中都也先聖之舊治魯定公九年宰于此縣署之思聖堂是也有杜子美望嶽詩刻顔樂亭在曲阜縣城内顔子廟前舊有廢井宋膠西太守孔宗翰濬井作亭於上名曰顔樂有司馬光銘蘇軾記程顥詩宋駐蹕亭在曲阜縣孔林内宋眞宗幸魯駐蹕於此詠歸亭在曲阜縣城南即曾點詠歸處浮香亭在曲阜縣雩水北元楊奐東遊記北涉雩水由竹徑登浮香亭殊有幽勝庚宗亭在泗水縣東接費縣界左傳昭公四年穆于去叔孫氏及庚宗哀公八年吳伐魯舍于庚宗遂次于泗上杜注庚宗魯地曲池亭在寕陽縣東北春秋桓公十二年公㑹􅂎侯莒子盟于曲池注魯國汶陽縣北有曲池亭蔇亭在嶧縣東故繒城北春秋莊公九年春公及齊大夫盟于蔇注蔇魯地琅邪繒縣北有蔇亭按蔇公羊作暨後漢志作概訛也次室亭在嶧縣東南故蘭陵地後漢書郡國志蘭陵有次室亭注地道記曰故魯次室邑列女傳有漆室之女或作次室周杜亳社俱在曲阜縣城内春秋哀公四年亳社災左傳閔公二年成季之將生也桓公使卜之曰間于兩社為公室輔注兩社周社亳社兩社之間朝廷執政所在定公六年陽虎盟公及三桓于周社盟國人于亳社哀公七年以邾子益來獻于亳社穀梁傳亳社者亳之社也大庭氏庫在曲阜縣治東左傳昭公五年南遺使國人助豎牛以攻諸大庫之庭十八年宋衞陳鄭皆火梓愼登大庭氏之庫以望之注魯城内有大庭之墟于其上作庫孔頴逹疏炎帝號神農一曰大庭氏水經注魯縣大庭氏之庫春秋豎牛之所攻也故劉公幹魯都賦曰戢武器於有炎之庫本朝乾隆二十一年三十六年四十一年四十九年高宗純皇帝幸魯有御製大庭氏庫用唐李白韻詩故宅門在曲阜縣孔廟中今毓粹門外舊址是也乾隆十三年高宗純皇帝