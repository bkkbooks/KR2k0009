母篇泣跪於地辭役躬耕養母四十年曲盡子道有司旌其門本朝鄭熙齊靖州人九歳祖母爲賊所執熙齊願以身代賊義而釋之父疾封股療之而愈以孝旌彭士瑞靖州人父年九十餘士瑞年亦七十與父同居一室飲食必親奉冬夕必先温其衾通邑以孝稱歐陽進㑹同人五世同居子姓百餘人一堂和洽邑中推爲義門李元珠㑹同人勤儉好施嘗設義倉周䘏貧困閭里咸飽其德總督楊宗仁爲作義倉記粟榮訓㑹同人乾隆進士知茂名縣潔已愛民縣人爲刋去思録粟通貴㑹同人父客蜀久不歸後卒於蜀通貴方六歳家貧隨母寄食外家及母卒襥被尋父至大足縣訪得父喪一慟幾絶負骨歸張文英靖州人官靖州恊千總乾隆五年城步縣苗匪糾粤猺滋事文英隨大兵㑹􅁹攻白水洞力戰陣亡同時戰亡者把總張牽李如松李三省事聞議卹均􅄻把總楊連仲綏寕人由行伍洊升遊擊乾隆間隨征黔楚逆苗屢􅀗戰功嘉􅂟三年隨􅁹楚北邪匪力擒首逆七年賊竄入川省往捕餘匪屢戰皆捷十八年河南教匪滋事隨官軍進攻道口力戰陣亡事聞賜祭葬􅄻雲騎尉流寓宋程敦厚高宗時為侍郎以言事忤秦檜謫居靖州立書院講學於侍郎山魏了翁卭州浦江人嘉定十七年朱端常劾了翁詔䧏三官靖州居住了翁至靖湖湘江浙之士不逺千里負書從學乃著九經要義百􅃃義藴精密先儒所未有蘇尚元宛平人官廣東韶州府尹徙居㑹同邑人因其征苗有功肖像祀焉列女明王烈女靖州衞指揮王扆女年十五許聘陶紘未行而紘死請於父母往哭奠歸坐輿中自經死陳均保妻向氏靖州衛人適陳均保半年而均保卒自經死詔旌其門蔣穎妻薛氏靖州衞人頴舉武科赴京溺水死薛聞訃自經天順中旌陳儁妻劉氏靖州人儁殁於陣劉守節終身成化中旌宋周希妻梁氏靖州人殉夫死萬厯中旌馮學海妻丁氏靖州人明末兵亂丁與其小姑陳經典妻馮氏具被執不屈相􅂝投五龍潭死馮仁妻劉氏靖州人夫卒無子守節終身唐朝選妻梁氏㑹同人與女月環避寇於紅門塘被執俱投水死梁日榮妻粟氏㑹同人流賊執之於平村觸柱死本朝蕭民聘妻曾氏綏寕人未嫁夫亡守貞順治年間旌趙聮㑹妻鄧氏靖州人夫亡守節於雍正年間旌曾之祚妻唐氏通道人夫亡守節雍正年間旌蘇知選妻李氏綏寕人隨夫寓辰溪縣遇强􅁀不受辱死雍正年間旌梁時傑妻胡氏靖州人夫亡守節同州節婦劉申之妻莊氏劉爾清妻周氏蕭士禹妻許氏楊􅃫書妻沈氏貞女蔡政瑞聘妻石氏均乾隆年間旌栗盛穎妻唐氏㑹同人夫亡守節同縣節婦栗堯基妻梁氏貞女于利海聘妻唐氏均乾隆年間旌楊俊生妻周氏通道人夫亡守節乾隆年間旌左尚妻謝氏綏寕人夫亡守節同縣節婦黃連生妻蕭氏楊聖謨妻袁氏唐伯璞妻袁氏唐子騫妻莫氏􅀸必毓妻陸氏袁應龍妻莫氏均乾隆年間旌趙英鋭妻于氏靖州人夫亡守節嘉慶年間旌林添昇女松妹㑹同人被人穢詈忿極自經死嘉慶年間旌張後栻妻傅氏綏寕人夫亡守節嘉慶年間旌仙釋明無意㑹同人俗姓賀修道於後山知未來事詔召至京賜金鉢銀杖黃竹修道於綏寕之籠烟坡有道行化去土産鐵綏寕縣出葛州縣俱出桐油茶油州縣俱出白蠟靛俱綏寕縣出五倍子州境出九肋鼈明統志沅江出
