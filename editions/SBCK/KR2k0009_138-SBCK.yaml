西南接猺峒苦抄掠雄飛諭以威德悉感服明杜述廣德人永樂慈利縣處已中知廉介賦役均平蠻獠爭來嘗入蠻溪採官木奉迎一境安謐翟亨正統中九溪衞指揮僉事以征麓川功川偕其累弟遷指揮使後復征戰死事聞遣官諭麓祭季恒六合人成化中知安鄉縣民不諳課其功紡􅀊織恒教之樹桑麻木旱救荒有功多所全棉月活張瑄睢陽人成化中知安鄉縣境多虎瑄禱於城隍宜殛之百姓何罪兩日遂􅀗三神曰令不職神虎餘皆屏跡彭倫成化中永定衞指揮使銅鼓諸苗功充叅將築以破兩廣賊及討茅坪蕩峒堡硃砂坪楊開口羊兒四數萬人堡倫苗不敢犯討擒之又有妖平天賊詐稱柱等苗韓林累功兒後號召晉都督熊一定豐城人有牧地宏治中知澧州政尚嚴厲新洲舊藩府欲專其利一定婉詞啟聞卒弛其禁九其辜在任溪蠻怗險擾民一定承檄按問七年積糓累數萬斛饑民賴以卒伏濟麥成順德人正江口成父德中安鄉縣典史嘉子集民兵往禦比戰靖初流寇掠鼎馬躓賊叢槊刺之猶徒步手刃數人父子俱遇害楊永秀閬中人嘉靖中知石門縣慈愛仁明民為樹循良碑楊繼韶高安人萬厯中知安鄉縣值􅀊頻旱澇加以疫癘百計拯救復修卡整隄防士民為立祠謝正蒙惠來人萬厯中知安鄉縣始至若不慧久之盡得吏胥姦狀逮治如法由是姦猾大恐邑苦水災捐賑有法所全活甚衆周鳳岐永康人崇禎末以參政分守澧州拒賊城陷不屈死之本朝湯調鼎清河人順治初知澧州流寇􅀽劉等據境刼掠調鼎偕參將唐洪協心力設方畧追􅁹克復拊循荒殘建延光書院以養士人文遂盛辛良器遼東人順治中知安鄉縣縣無城患盜良器令各堵牆為衞匝月鱗比成垣墉以憂去猶請蠲荒減災免派軍需夫馬草束民懇留援旗制復任勸農興學新范仲淹讀書臺後遷湖州泣送者盈路臧得智漢軍人康熙中知安鄉縣革里甲軟擡之習丈量田畝絲忽必均三姓爭洲判為學地充月課薪水資皆具服民祠祀之許湄嘉善人康熙中知石門縣縣版籍素淆湄􅂂畝清丈均徭賦豪民不得匿税而貧者不困勸課農桑田疇日闢倉廪充牣饑􅀊悉平糶以活民捐俸改建縣學輯縣志在任十四年民戴之如慈父巡撫陳璸趙申喬先後薦之徴至京師未至道卒馬世驥臨清人康熙中知慈利縣加意學校改建文廟造就諸生邑有鬼見愁陰溪等灘險惡病行旅盡鑿平之阮玉堂江南揚州人乾隆元年任九溪營遊擊九谿有北山周數十里兵民皆仰給此山有明李指揮豪姓子孫訟言山水指揮舊地總督委官勘審將為所奪玉堂入省言地即豪姓地亦明代事且絶數萬家之葬窆樵蘇芻牧而以資豪姓為利藪大不便總督即改前議從之兵民感悦時城歩綏寕山苗不靖命貴州總督張廣泗來湖南總制全軍玉堂奉檄進􅁹所至有功賊潰乞降廣泗疑其詐玉堂力白之乃許降旋又生􅀗男婦子女三千餘人廣泗欲悉誅玉堂靖誅壯夫之能執兵抗師者其婦女及男子十六􅀊以下者貸其死廣泗始允玉堂擇壯年有鬚者斬之餘皆全活苗民感其德建祠九谿營至今祀之張綽浪穹人乾隆十年知安鄉縣修學宫保障隄垸建范仲淹祠置祭田課士其中咸為感勵張範尉氏人乾隆末知澧州川楚教匪騷動範團勇戒嚴永定十四都民有傳教潛通川匪者單騎往擒之撫諭匪衆脅從者釋之永定民得安堵如初人物晉車武子南平人父育為郡主簿太守王朝之見武子於童幼謂其父曰此兒當大興卿門武子勤學不倦家貧不常得油夏月則練􅌩盛數十螢以照讀書及長以傳學知名於世時每有盛坐皆云無車公不樂寕康初為中書侍郎關内侯太元中領國子博士議郊廟明堂之禮進爵臨湘侯終吏部尚書周該天門人以義勇稱叔父級為宜都内史亦忠義士也聞譙王氶立義而書檄不至遣該見氶口陳至誠反命為王敦將魏乂所執拷之至死竟不言其故級免於難唐李羣玉澧州人文采藻麗長於詩賦不樂仕進裴休愛其才觀察湖南厚延致之及為相以詩論薦授校書郎所著書三卷又後集五卷段宏古安鄉人剛峭寡合不亊產業人或交之度非義輒去以故五十不能得祿後卒於桂之逆旅歸葬黃山柳宗元祭以文宋蘇庠澧州人工詩少為蘇軾所賞由是名益重其後秦檜欲見之庠曰吾老矣不負販賣雲壑卒年八十餘號後湖居士有文集行世吳祿午澧州人咸淳進士主鄂州咸寕簿宋亡殉節死田希吕慈利人書院以宋元之際守節不仕居天門山創講學誘掖後進當路以為書院山長元熊義山安鄉人至正中累官至萬户倪兵至執縣令義山築城小黄山文俊保障其上一縣使降義山􅀗安越二罵不絶口年文俊襲執之逼文俊怒剖其腹死鄧均忠石門人至正十二糾合鄉丁拒年峒長向思永作亂寇刼鄉邑均忠守鄉土賴以安十四年思永大肆猖獗均忠復帥所部􅁹平之詔以為八番順元等處宣慰司世襲卒諡忠節楊輈慈利人居彌勒山通經史工詩登進士總管阿爾斯禮之明初隱居建聚奎書院講學其蘭哈雅最尊中阿爾斯蘭哈雅舊作阿思蘭海牙今改正明周階安鄉人通春秋博洽子史明永樂初以經明行修徴因母老不就卜居於永安村扁其堂曰鄰德所著有并蛙遺響集羅鎡安鄉人正統舉人授歙縣教諭捐俸建學修書院侍郎王偉稱其氣節剛正遷保定府教授綦沖慈利人正統中為大庾令務以愛民為本興利除弊民咸德之張浩澧州人景泰進士任工科給事中澧舊有運京白糧民苦之浩為奏免邵茂質慈利人事親至孝母性懼雷每聞雷以身翼之母殁每雷必張蓋於墓上雷止乃歸李如圭澧州人宏治進士知建昌縣以計殲劇盜累遷御史按江西激揚有聲厯延綏巡撫時有邊警如圭防杜周悉入為大理卿尋致仕起工部侍郎管理河道晉户部尚書周敘九溪衞人生有異質猿臂善射正德進