body:
  text: 大清一統志澧州直隸州二古蹟澧陽故城隋置澧五代宋陽因郡之治元澧為陽澧縣州唐路為澧治明州省治縣入澧澧州州以為其澧在州澧治水隋之書地北州理城志為澧唐陽郡李泌澧改陽築唐宋置史地理尋復志舊澧州按澧元陽澧郡州建路炎治四澧年陽寓至治正陶十家六市年山為寨徐壽輝新城將明倪洪文俊武初所還陷元舊治帥省孫縣毅入移州鎮松州故城在州東南松州隋尋置改尋改為澧澧州州大隋業書初地置理郡志輿澧地陽紀郡勝平古陳置松州城太在和縣南東村南天門故城今晉石置門澧縣陽治縣吳為置郡天治門陳郡更名郡武陵縣俱為天曰門石郡門宋三書國呉志州郡志孫天休門傳郡永領安縣六澧年分陽晉太康四唐書地年理立志水石經門注云縣吳澧分水零又陽東逕於此澧置陽天縣門南舊郡隋平爲陳石廢門郡縣以安鄉故城在建今炎安戊鄉中縣縣治令南胡縣衿志築宋城在興今癸縣亥南縣一令里毛遺晃蹟移尚治存城紹北義陽故城在西安南鄉晉縣分南理平志郡穆置帝隋時平以陳義廢陽郡流置人安在鄉南縣郡後者因立之義晉陽書郡地宋書州志澧郡陽志郡南安義鄉陽舊太置守義領陽縣郡厥平西陳平郡氏廢隋通書典地安理鄉漢壽孱縣陵地縣南地亦朝置後義漢陽漢郡作唐故城在漢安置郷縣縣屬北武後陵郡爲晉郡置治南隋平改郡曰以孱縣陵爲唐治貞所觀宋初時省改入移安郡治鄉縣陳水復經注康作元唐年縣分後南漢郡分江孱南陵爲立南宋平書郡州治郡作志唐晉後武治帝太江安隋陳書郡地廢理縣志改澧名陽焉郡唐孱書陵地舊理曰志作澧唐州置安南鄉平貞郡觀平元年省縣入孱焉陵零陽故城在郡慈後利漢縣因東之漢晉置改縣屬屬天武門陵郡南北改曰朝慈宋利齊元因和之志隋慈開利皇縣中本改漢置零零陽陵縣縣地十以八在年零水之北故名隋改為慈利慈利故城在今慈利縣西隋置縣元升為州遷治縣北明初遷永泰街即今治隆慶中復徙澧水北澧陽山官塔坪萬厯三年復遷今治本朝初寄治觀嘉渚順治四年復還今治崇義故城在安福縣西隋開皇中置縣後省唐武德中復置麟德􅀄又省隋書地理志澧陽郡崇義後周置衡州開皇中置縣十八年改州曰崇州大業初州廢唐書地理志澧州慈利武德中置崇義縣麟德元年省入焉漊中故城在安福縣西北故漊中蠻地三國吳置縣晉宋齊因之梁以後省宋書州郡志武陵太守領縣漊中二漢無晉太康地志有疑是吳立九溪衞志衞西北界麻寮所東三官臺畔有古城遺址俗呼舊縣世傳即漊中古城也渫陽故城在安福縣東北添平所東南晉置後省水經注渫水逕渫陽縣南晉太康中置按晉宋志俱不載渫陽縣但水經注之言必有所據臨澧故城在永定縣西漢置充縣晉改臨澧南北朝梁以後省漢書地縣宋書州郡志天門太守領縣臨理志武陵郡充澧晉武帝太康四年立水經注充縣廢省臨澧即其地縣即充縣之故治側臨澧水故為縣名永定衞志臨澧城今大庸所乃其故址按水經注臨澧即故充縣所置晉志充縣與臨澧並列誤也羊山故城在永定縣西三十里明洪武二年以永順宣慰司羊峯地置羊山衞在安福縣西二百里三年遷今治更名大庸衞馬援城在州東名勝志馬援征蠻時所築竹城在州城東南一里輿地紀勝澧州當建炎之擾嘗寄治於仙眠洲之南岸以竹為城至今人猶以竹城目之新城在州東南三十里元至正中移澧州路治此其後置新城甞鎮申明城在州南六十里方輿記城在邑於是地澧陽縣申明楚大夫按申明當作申鳴宋玉城在州南六十里長樂鄉輿地紀勝宋玉城内有宋玉廟及銅昏堰皆以銅冶為之楊城在安鄉縣西南九十五里接常德府武陵縣界宋紹興中楊幺所築白公城在慈利縣東輿地紀勝慈利縣白公城四面有門相傳楚白公所築蠻王城在慈利縣東二十里茶陵山頂相傳五代梁􅀅武平破蠻王之所白扺城在慈利縣西北輿地紀勝慈利縣有白扺城高千仞四面絶壁上廣十餘里建炎中廖彥居此縣志一名廖城覃家城在慈利縣西觀嘉渚元末土人覃垕築以自固明洪武初周德興討平之九溪舊衞在慈利縣西北舊索口寨明洪武二十二年置衞屬湖廣都司本朝改為巡司置遊擊駐防於此軍牧村在安鄉縣北七十里接澧州及湖北荆州府公安縣界平原曠野富於水草岡巒横互勢可屯守相傳漢馬援征蠻時駐此唐李羣玉故里在州東一里仙眠洲七星臺在州治内相傳為漢馬援築繫馬臺在安鄉縣東十五里長壽村相傳漢馬援繫馬處讀書臺在安鄉縣治南相傳宋范仲淹嘗讀書於此八桂堂在州西宋時有桂生八幹故名胡寅有記中和堂在州境相傳為宋胡寅建流觴亭在石門縣東北層步山下卓錫泉側元建思賢亭在安鄉縣治南范仲淹讀書臺側宋建博望亭在安鄉縣西瀕江宋縣令劉愚建車公亭在安鄉縣西北四十里縣志車公山有車公亭因晉車武子嘗遊於此故建亭以表之仍園在州北五十里明魯勲故居地臨涔水池亭最勝中有翠芳館關隘古城關在州西北七十五里昔時置戌屯兵之所今關旁有營門遺址江口關在石門縣西二十里三江口又有新關在縣西北道水口金藏關在安福縣東亦名潭口兩山對峙澧水至此淵涵深澈龍伏關在安福縣東其西又有温湯關縣志洪武三年蠻酋覃垕連搆諸峒為亂命周德興討之德興出奇兵直擣温湯關拔之既而為偽夏所據六年命湯和等伐蜀周德興分兵取蜀之龍伏隘進奪温湯關大坪關在安福縣西南天門山之陽路出辰沅亦名太平關九源關在安福縣西北九溪西下臨大河上據山頂為苗蠻出入要道又有閘口關在九溪紫駝峯後坪關在永定縣東南黑松關在永定縣東南