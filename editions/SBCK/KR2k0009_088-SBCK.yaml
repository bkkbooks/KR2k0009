府軍馬事與夏人力戰被執恩不肯降乃自殺贈同州觀察使張亢臨濮人慶厯中管勾麟府軍馬事時元昊引兵屯琉璃堡縱遊騎鈔麟府間二州閉壁不出黄金一兩易水一杯亢單騎叩城入即縱民出採薪芻汲澗谷築東勝金城安定三堡置兵守之又引兵襲破夏人棄琉璃堡去時麟州饋路猶未通敕亢自䕶賞物送麟州賊以兵數萬趨柏子砦來邀亢以三千人擊敗之乃修建寕砦夏人數出爭戰於􅈷毛川賊又大潰不踰月築清塞百勝中候建寕鎮川五堡麟府之路始通王凱太原人仁宗時爲麟州都監夏人圍麟州乘城拒鬬晝夜三十一日始解去遷麟州路縁邊都巡檢使與巡檢張岊䕶糧道於青眉浪寇猝至分兵出其後夾擊之又入􅈷毛川賊衆三萬凱以兵六千陷圍流矢中面鬬不解斬首百餘賊自蹂踐死者以千數遷管麟府軍馬事夏人二萬寇清塞堡凱出鞋邪谷轉戰四十里至杜􅨨川大敗之復得所掠馬牛以還經畧使明鎬言凱在河外九年有功遂領資州刺史竇舜卿安陽人仁宗時辟府州兵馬監押夏人侵塞舜卿欲襲擊舉烽求援於大將王凱凱弗應舜卿度事急提州兵出戰勝之明日經畧使問狀凱懼要以同出爲報舜卿驩然相許不自以爲功郝質介休人仁宗時爲府州駐泊都監主管麟府軍馬與田朏將兵䕶軍需餽麟州道遇西夏數千騎寇鈔質先驅力戰斬首􅀗馬數百又與朏行邊至柏谷敵塹道以阻官軍質禦之於寒嶺下轉鬬逐北遂修復寕遠諸柵以扼敵衝何灌祥符人神宗時爲府州大山軍巡檢盜蘓延福狡悍爲二邊患灌親梟其首賈胡疃有泉遼人常越境而汲灌申畫界堠遏其來忿而舉兵入侵灌迎高射之發輒中或著崖石皆没鏃敵驚以爲神逡巡斂去後三十年遼蕭太師與灌㑹道曩事數何巡檢神射灌曰即灌是也蕭矍然起拜折克行繼閔子初仕軍府與夏人戰於葭蘆川斬􅀗甚衆擢知府州秦兵討夏國克行率部落先驅大酋咩保吳良以萬騎來躡克行爲後拒度賊半度隘縱擊大破之殺咩保吳良王中正出塞克行先拔宥州每出必勝夏人畏之益左廂兵專以當折氏太原孫覽議城葭蘆召克行問䇿即頓兵吐渾河約勒部伍爲深入窮討之狀敵疑不敢動既訖役又入津慶龍横川斬級三千克行任邊三十年善拊士卒戰功最多羌人呼爲折家父司馬朴夏縣人徽宗時調晉寕軍士曹參軍通判不法轉運使王似諷朴伺其過朴不可曰下吏而陷長官不惟亂常人且不食吾餘矣似賢而薦之楊震崞人徽宗時知麟州建寕砦初遼將小鞠䩮攻麟府諸城郭震父宗閔領本道兵馬屢摧敗之俘其父母妻子靖康元年太原䧟鞠䩮驅幽薊叛卒與夏人奚人圍建寕報之時城中守兵不滿百震與戰士約斬一級賞若干官帑竭繼以家人服珥吏士感激自奮越旬矢盡力乏城不守與子居中執中力戰殁徐徽言西安人知晉寕軍兼嵐石路沿邊安撫使金人欲拔晉寕建炎二年自蒲津涉河圍之徽言出兵縱擊斬羅索貝勒之子時環河東皆陷獨晉寕孤墉横當強敵徽言與金人大小數十戰所俘殺過當又廣外城東壓河下塹命諸將畫隅分守金圍之益急城無井寄汲於河金人載茭石湮壅支流城中水絶禆校李位石斌啟外郭納金兵徽言與兵馬都監祁昴決戰門中格殺甚衆退守牙城金人攻之不巳徽言置妻子室中積薪自焚仗劍坐堂上金兵至羅索貝勒就見説之降徽言慢罵不巳金人遂射殺之祁昴亦不屈而死徽言子岡同死事焉羅索貝勒舊作婁宿孛堇今改金鈕祜禄貞本名綽哈西南路招討司人興定二年權色圖和爾啟都哩巴顏泰等無􅀊不擾定邊居延綏西被患尤􅁄懷信勇敢有謀寇入輒敗故邊患雖劇而士氣不衰布色圖舊作卜失􅈷和爾啟舊作火落赤都哩巴顏泰舊作鐵雷擺言太今並改麻貴大同右衞人萬厯中以功擢總兵官鎮守延綏布色圖糾諸部深入定邊營張春井貴乘虛搗其帳於套中斬首二百五十有奇還復邀其零騎㑹寇留内地久轉掠至下馬關寕夏總兵蕭如薫不能禦貴赴援連戰皆捷明年布色圖復大入貴勒兵大破之杜桐延安衞人萬厯中擢延綏總兵官時布色圖西助和爾啟共擾河西達爾罕子圖黙與他部明安謀亂桐率輕騎自榆林往襲大破之馘明安還達爾罕子圖默舊作打兒漢子土昧今改杜松桐弟萬厯中遷延綏參將麻貴大舉搗巢松以右軍出清平塞多所斬􅀗尋擢都督僉事鎮延綏套寇犯安邊懷遠松大破之杜文煥桐子萬厯中以􅄻厯延綏遊擊將軍累擢寕夏總兵官延綏被寇文煥赴救大破之遂代官秉忠鎮延綏累敗寇於安邊保寕長樂西路和爾啟布顏大懼相率降沙津數盜邊爲文煥所敗遂納款布顏舊作卜言沙津舊作沙計今改白爾心吉州人天啟初知府谷縣性狷介人不敢犯簿書悉自裁決一時廉能吏稱最曹文詔大同人崇禎中厯延綏東路副總兵王嘉允久據河曲文詔克其城嘉􅁢脱走轉掠至陽城南山文詔追及之其下斬以降以功擢臨洮總兵都任祥符人崇禎末以右布政使飭榆林兵備時李自成據西安遣其將以精卒數萬來寇總兵王定逃去城中益空任急集軍民慷慨流涕諭以大義以廢將尤世威爲主帥與諸廢將數十人誓死固守賊遣使招降斬以徇自十一月望被圍堅守殺賊甚衆至二十七日城陷任猶巷戰力不支被執賊曰若好男子降我無憂富貴也任大罵不屈遂見殺王家禄黄岡人崇禎末以户部員外􅀰督餉榆林闖賊來攻與都任協守圍急男子皆乘城家禄命婦人運水灌城結爲冰賊攻少沮及城陷自剄死同時死者副將惠顯清澗人被執大罵賊惜其勇繫至神木服毒死參將劉廷極綏德人募死士乞師套部其衆將至賊分兵拒却之及􅀍執賊恨甚磔之至死罵不絶口本朝徐之龍江陰人順治四年知神木縣王永彊之亂嬰城固守城陷死之贈按察使僉事高光祉寕晉人康熙六年擢榆林兵備副使整飭邊疆興屯立學兵民安之十四年朱龍叛自定邊進逼榆林光祉率軍民乘城堅守賊覘知有備遂遁去譚吉璁嘉興人嘉慶九年為榆林同知以清惠稱朱龍叛與副使高光祉總兵許覘魁協力守禦城賴以全榆林自明以來為重鎮而志乗未修規制難攷吉璁苦心搜訪為延綏鎮志考據精詳他志罕有及之者楊三知良鄉人康􅄉十一年􅀘神木道朱龍之亂守將孫崇雅潛通賊賊至逼取勅印三知罵賊不屈􅀍害時神木知縣孫世譽正紅旗人亦不屈死事聞贈三知光祿卿世譽布政使參議韓奕滿洲籍鄜州人康􅄉中為榆林同知居官清介政績甚著推臨洮知府軍民攀留者萬計人物隋李和巖綠人少勇敢有識度仕周厯夏洛二州刺史以仁恕稱開皇初遷上柱國立身剛簡老而逾勵諸子趨侍若奉嚴君李徹和子性剛毅有氣幹累拜車騎大將軍從周武帝破齊師錄前後功加開府宣帝即位從韋孝寛畧定淮南每為先鋒及淮南平即授淮州刺史安集初附甚得其歡心高祖受禪加上開府突厥沙鉢畧犯塞徹率精騎五千遇於白道出其不意掩擊大破之沙鉢畧遂請降累封陽城郡公史祥朔方人少有文武才高祖踐祚拜儀同領交州事轉驃騎將軍從王世績伐陳拔江州加上開府煬帝初漢王諒作亂遣其將綦良自釡口徇黎陽塞白馬余公理自太行下河内帝以祥為行軍總管祥簡精鋭襲破公理遂東趨黎陽討綦良大敗之累進左光禄大夫兄雲官至萊州刺史弟威武賁郞將有幹局唐楊朝晟朔方人起行間從李懷光討劉文喜斬􅀗多加驃騎大將軍李納寇徐州從唐朝臣往討常冠軍懷光反朝晟父懷賓為韓遊瓌將斬賊黨張昕及同謀者授御史中丞及諸軍圍河中懷賓戰甚力懷光平帝以朝晟為遊瓌都虞候父子皆開府賓客軍中以為榮後為邠寕節度使請城方渠合道木波以遏吐蕃路帝納其䇿巳城吐蕃悉衆至度不能爭乃引去後復城馬嶺而歸開地三百里戴休顏夏州人家世尚武郭子儀為大將諭平党項羌以安河曲封咸寕郡王兼朔方節度副使城邠州功最遷鹽州刺史朱泚反率兵三千晝夜馳奔詣行在德宗嘉之帝進狩梁洋留守奉天李懷光屯咸陽使人誘之休顏斬其使勒兵自守懷光駭自涇陽夜走遷檢校工部尚書奉天行營節度使合渾瑊兵破泚偏師斬首三千級追至中渭橋京師平又與城率兵趨岐陽邀泚殘黨拜左龍武軍統軍弟休璿厯開府儀同三司封東陽郡王休晏厯輔國大將軍封彭城郡公俱以將畧稱宋楊榮麟州人七世同居真宗時旌表仍蠲其課調張岊府谷人以貲為牙將有膽畧善騎射天聖中西夏觀察使阿遇侵麟州虜邊户安撫使遣岊詰問岊徑造帳中以順逆諭之悉歸所虜補來遠砦主殺西夏首領奪其甲馬時年十八名動一軍元昊侵鄜延岊以都敎練使從折繼閔破浪黄黨兒兩族斬其軍主敖保時敵騎方熾中人賜軍衣至麟州不得前岊馳騎往䕶之遇敵接戰流矢貫雙頰拔矢戰愈力敵攻府州岊乘埤大呼搏戰飛矢中右目下身被三創晝夜督守又帥死士開關䕶州人汲於河為麟府州道路廵檢近郊民田比秋成未敢穫岊以步卒䕶之大敗賊於龍門川内侍宋永誠傳詔砦下岊䕶永誠遇敵三松嶺矢中背猶躍馬馳射敵皆潰明鎬奏為麟州路駐泊都監兼沿邊都廵檢使累遷洛苑使前後數中流矢創發臂間卒楊畋新秦人進士及第累遷殿中丞討平湖南猺賊厯吏部郞判流内銓改知制誥進龍圖閣直學士知諫院畋出於將家折節喜學問為士大夫所稱性清介謹畏自奉甚約及卒家無餘貲王文郁新秦人為府州巡檢韓琦薦為麟府駐泊都監熙寕初討西夏文郁敗之吐渾河其將杳崖欲舉衆降許之衆忽變譟以出文郁擊之追奔二十里據險大戰矢下如雨文郁徐引渡河謂吏士田前追强敵後背天險韓信驅市人且破趙况爾曹皆百戰驍勇耶士感奮進擊夏人潰降其衆二千神宗召問招降事對曰生羌識鄉導能撫之乃致敵上䇿帝於是決意招納多􅀗其用詔官其二子遷知麟州官至冀州觀察使折可適其先世爲府州刺史因家焉可適未冠有勇馳射不習而能補殿侍羌夏人十萬入侵可適先得其守烽卒姓名詐爲首領行視呼出盡斬之烽不傳因卷甲疾趨大破之於尾丁磑囘次檉陽溝敵舉軍来可適邀其歸路設㐲殱之論功至皇城使嵬名阿埋昧勒都逋皆夏桀黠用事者詔可適密圖之會二酋以畜牧爲名會境上可適遣兵夜往襲並俘其族屬三千人遂取天都山帝爲御文德殿受賀以其地爲西安州後知衞州拜淮康軍節度使移知渭州子彥質紹興中簽書樞密院李翼新秦人宣和末爲代州西路都巡檢使屯崞縣金兵取代遣使招降翼率士卒堅守義勝軍統領崔忠夜引金兵入城翼挺身搏戰達旦力不敵被執富尼雅罕欲臣之不屈而死富尼雅罕舊作粘罕今改朱昭府谷人以效用進宣和末爲震武城兵馬監押攝知城事金兵至夏人乘虛盡取河外諸城震武距府州三百里最爲􅀌絶昭率老幼嬰城募驍鋭夜縋岀薄其營殺􅀗甚衆其酋烏里格爾齊邀昭降時諸城降者多昭故人從旁以言誘昭大罵引弓射之衆走被圍四日不可復支昭召諸將謂曰城且破妻子不可爲敵污徑領數卒屠其家人舁屍納井中將士將妻孥又皆盡殺之謂衆曰我與汝曹俱無累矣賊登城昭勒衆於通衢接戰自暮達旦屍填街不可行昭羅馬從缺城出馬蹶墜塹賊欲生致之昭瞋目仗劍無一敢前旋中矢而死烏里格爾齊舊作悟兒里齊今改畢浩葭州人以義兵屯通秦砦遂兼知州事恤􅀌賑乏境内無驚擾他郡民咸歸之爲立碑烏龍鎮明彭清榆林衞人初襲綏徳衞指揮使宏治中擢副總兵守甘肅從許進恢復哈密有功遂代劉世安爲總兵清御士有恩久鎮西陲威名甚著性廉潔在鎮遭母及妻妹四䘮貧不能歸葬卒之日將士及庶民婦豎皆流涕遺命其子不得受賻贈故其喪亦不能歸帝聞之命撫臣發帑錢資送歸里焉姜漢榆林衞人宏治中嗣世職爲本衞指揮使充延綏鎮遊擊將軍寇犯寕夏興武營漢率所部擊敗之又援宣大有功正德四年擢寕夏總兵官甫數月而安化王寘鐇謀逆執漢脅令從巳漢怒罵不屈遂遇害賊平詔賜􅀕葬有司爲立祠春秋祭之嘉靖時賜額愍忠子奭嗣職為都指揮僉事厯甘肅總兵官禦賊數有功奭子應熊孫顯祚曽孫弼相繼為總兵官姜氏為大將著邊功凡五世武城榆林衞人正德間武舉與千户李江管本鎮司事嘉靖初禦賊於紅山兒賊兵盛城力戰不支遇害王勛延綏人善騎射積功至都督僉事鎮守延綏弟効嘉靖中武進士累官都指揮僉事延綏參將以功累擢寕夏總兵官吉農入犯効以少擊衆連戰破之移鎮宣府名著西陲卒諡武襄陳鳳榆林衞人嘉靖中以世廕累官署都督僉事鎮大同坐事奪職久之起固原遊擊將軍諳達巴圖寇大同鳳與寕夏遊擊朱玉夾擊之遂遁去帝大喜擢署都督僉事尋進延綏副總兵三十六年寇入常樂堡鳳率次子守義逆擊衆寡不敵戰死守義亦被創贈鳳左都督擢守義都指揮僉事諳達舊作俺答巴圖舊作把都今改趙岢榆林衞人年十四持刀出塞外遇寇三人抶岢岢奪其梃反撲之連斬三人首以歸由是知名嘉靖中嗣指揮職積功至延綏總兵官移鎮大同改宣府岢三臨大鎮輒督將士搗巢多􅀗首功數被賞賚諳達既受封朝議虞反側岢大繕垣堡進都督同知郭江榆林衞人厯固原總兵官嘉靖中寇大入戰於定邊死之張臣榆林衞人矯捷精悍搏戰好陷堅由隊長立功知名厯延綏衞遊擊將軍隆慶初土蠻大入畿北遊騎至灤河諸將莫敢戰臣獨率所部千人馳擊追至捧槌崖斬􅀗甚衆萬厯初累遷寕夏總兵官三嵗互市無敢譁多錦青哈擾邊移臣薊鎮多錦青哈懼款關稽首進署都督同知厯固原甘肅和爾啟犯洮河布色圖助之臣逆戰水泉三道溝大敗之生􅀗其愛女布色圖大慟逃匿西海不敢歸巢巳屬宰桑謝罪乃還其女而使歸套時諸部桀驁甚經畧鄭洛專主款臣以爲不足恃上書陳言八難五要議與左乞歸臣善撫士卒更厯四鎮名著塞垣爲一時良將多錦青哈舊作朶顏長昻宰桑舊作宰僧今並改王保榆林衞人驍勇絶倫萬厯中起行伍積功爲薊鎮總兵官多錦青哈敗盟犯大青山保提兵追逐擒其心腹小郞兒以還多錦青哈懼而謝罪獻還被掠人畜補貢互市如初進署都督同知徙鎮遼東卒子學書崇禎中累遷宣府總兵官病免歸李自成攻揄林與同里故帥尤世威王世欽等協力拒守城䧟被執不屈死本朝乾隆四十一年賜諡烈愍弟學詩學禮並至副總兵張承廕臣子由父廕積功爲延綏副總兵勇而有謀尤精騎射數鏖戰未嘗挫衂萬厯三十七年代王威爲總兵官沙津及孟克什哩數犯邊承廕邀擊屢敗之積功進署都督同知移鎮遼東戰於撫順死之贈少保左都督立祠曰精忠本朝乾隆四十一年賜諡忠烈子應昌全昌官皆至總兵德昌官至副總兵孟克什哩舊作猛克什力今改尤繼先榆林衞人萬厯中積功爲固原總兵官和爾啟􅁞食番族且擾西寕聞官軍大集渡河北走牧莽刺川南山繼先奮擊大破之遂徙西海錄功増一柣徙鎮遼東改薊州罷歸繼先眇一目習兵敢戰時􅁛獨目將軍官秉忠榆林衞人萬厯中起世廕厯官寕夏甘肅副總兵嘗與主將達雲大破寇於紅崖伊騰達春屢被挫去積功擢總兵官鎮延綏套寇數犯塞秉忠隨所向以勁騎遮擊先後斬􅀗無算吉農率諸部大舉入寇秉忠與援兵合擊卻之被劾去官召令僉書前府赴援遼東辭疾歸子撫民亦為寕夏總兵伊騰達春舊作銀定歹成吉農舊作吉能今並改王威榆林衞人萬厯中為延綏參將從總兵麻貴大征套寇屢立戰功累進右都督鎮大同時順義王徹克徹哩卒孫布色圖與他部搆釁塞上多事威訓兵飭防邊場晏然前後為將五十年九佩將印以功名終徹克徹哩舊作扯克力今改賀世賢榆林衞人萬厯中從軍積功累擢總兵官鎮瀋陽時四方宿將鱗集獨世賢有功同列多忌之天啟元年大兵薄瀋陽世賢戰敗績身中十四矢降丁内應斷城外橋不得入或勸走遼陽世賢曰吾為大將不能存城何面目見袁經畧決鬬而死本朝乾隆四十一年賜諡忠烈尤世功榆林衞人萬厯中武舉積功至副總兵守瀋陽熊廷弼愛其才倚任之袁應泰代廷弼薦為總兵官未行㑹保左都督建祠曰愍忠大兵下瀋遂戰死贈少本朝乾隆四十一年賜諡忠剛張拱微神木人萬厯中為三屯營副將善騎射膂力絶人撫士卒有恩時邊事告急拱微聞檄即兼程而行臨戰敵為辟易既夕解鞍少息敵圍之矢石雨下拱微嚙臂大呼馳馬左右突陣殺數十人􅁌絶死之本朝乾隆四十一年賜諡烈愍李繼志府谷人萬厯中舉人為宿遷令􅀊歉山東飢民二萬餘口入境繼志皆賑給全活之轉西河廳督船厯兩淮運同所至以廉稱姚慕虞葭州人性至孝父疾焚香泣禱祈以身代及殁廬墓三年事聞旌表李卑榆林衞人崇禎中由神木千總厯臨洮總兵於陜西山西屢立戰功又援剿河南湖廣都御史盧象乾方倚卑辦賊遽以疾卒卑行兵善持紀律所至軍民安堵為人有氣度當倉卒鎮定如常贈右都督猛如虎本塞外降人家榆林驍果善戰與虎大威齊名崇禎八年以參將剿平山西賊巡撫呉甡薦加副總兵擢薊鎮中恊總兵官坐事落職督師楊嗣昌請於朝令從入蜀為正總統追賊於巴州所將止六百餘騎皆左良玉部兵素優閒不戰張獻忠窺官軍無後繼密抽壯騎乘之參將劉士杰與如虎之子先捷戰死如虎力戰決圍岀枚殘卒下荆州扼德安黃州會疽發背不能戰移駐南陽李自成來攻如虎殺賊數千巳而城破如虎持短刅巷戰大呼衝擊血盈􅂁袖過唐王門北面叩頭謝上自稱力