屈而死其子永叔復力戰城破舉家死焉和彥威理宗端平三年彥威獨守饒風關􅀌城外絶救援堅壁屹立元兵數攻不下引還明年夏從谷中奄至金州陷彥威死之明鄭福深州人成化中知金州疏鑿漢江灘石築堤以禦水患開市通商民生滋殖陰子淑内江人成化中知金州以禮義敎民風俗為之變何尚德猗氏人嘉靖中知金州以廉稱金之純廣濟人崇禎中知興安州流賊薄城之純率鄉兵殱其魁嵗饑多方賑恤以勞瘁卒於官何宗孔北直通州人崇禎中為紫陽縣典史流賊陷城死之本朝仰九明河州人順治中為紫陽路遊擊邑多盜九明出奇兵屢敗之入山搗其巢賊悉就擒王章錦州人康熙中知興安州甫到官值軍興總兵貴州民輸糧牧馬民大困章申請上宫立禁之州故無校士所為出資創建會兵進勦芽麓山盜芻糧器械應機立辦鄖撫檄州民運鑲章念民力巳竭竞不應張大經山西鳳臺人乾隆十六年一甲一名武進士厯官至興漢鎮總兵三十六年赴金川軍營進勦朗郭宗克之三十八年大軍移營木果木大經分駐簇拉角克後遇賊於乾海子路險不能􅀐徒步力戰死入祀昭忠祠􅄻騎都尉世職黄衮鎮平人由義勇議叙擢知白河縣堵剿敎匪屢著勞績嘉慶七年禦賊於縣之泰山廟障亡事聞賜䘏廕雲騎尉世職人物晉王遜魏興人仕郡察孝廉累遷上洛太守私牛馬在郡生駒犢者秩滿悉以付官轉魏興太守永嘉四年為寕州刺史時吏士散没城邑邱墟遜披荒糾厲收聚離散征伐諸夷威行寕土遣子澄奉表勸進於元帝累加散騎常侍安南將軍賜爵褒中縣公李雄遣李驤寇寕州遜使將軍姚崇㸑環大破驤等在州十四年卒諡曰壯周李遷哲安康人世為山南豪族遷哲少有識度慷慨善謀畫父元真仕梁爲衡州刺史留遷哲本鄉監統部曲事撫馭羣下甚得其情累遷東梁州刺史大統十七年周文遣遠奚武王雄等略地山南遷哲被執周文以其信著山南令與賀若敦同往經畧遂平寇亂巴濮之人降􅅃相繼授侍中除直州刺史與田宏同計信州留鎮白帝明帝初授都督信州刺史天和三年進位大將軍鎮襄陽大破陳將章昭達進爵安康郡公卒諡壯武王傑本名文達直城人從孝武西遷周文奇其才嘗謂諸將曰文達萬人敵也後復潼關破沙苑爭河橋戰芒山皆以勇敢聞親待日隆於是賜姓宇文氏恭帝元年從于謹圍江陵時柵内有人善用長矟傑射之應􅁌而倒遂拔之孝閔帝踐阼進爵張掖郡公爲河州刺史建德初除涇州總管頗爲百姓所慕卒追封鄂國公諡曰威隋何妥西城人少機警有儁才高祖受禪除國子博士嘗言蘇威不可信任又上八事以諫帝令考定鐘律作清平瑟三調聲又作八佾鞞鐸巾拂四舞以太常所傳宗廟雅樂深乖古意奏請用黄鐘復上封事論時政損益并指斥當時朋黨於是蘇威盧凱薛道衡等皆坐得罪㝷爲國子祭酒卒官諡曰肅撰周易講疏孝經義疏莊子義疏及封禪書樂要文集並行於世唐李襲志安康人仕隋始安郡丞大業末盗起襲志傾私產募士得三千人乘城拒盗蕭銑林士宏屢攻之不下聞煬帝喪與士民縞素三日臨固守凡二年力窮援絶爲銑所陷武德初高祖命其子元嗣召之襲志約嶺南酋李光度潛圖歸國及銑敗嶺南六十餘州皆送款襲志誘而致云授桂州總管封始安郡公守桂二十八年政尚清省南荒便之李襲譽襲志弟通敏有識度高祖定長安召授大府少卿詔委典運以饟東軍累擢揚州大都督府長史江南巡察大使多所黜陟召爲大府卿爲人嚴慤以威肅聞居家儉厚於宗親禄廩隨多少散之以餘資寫書罷揚州載書數車嘗謂子孫曰吾性不喜財遂至屢乏然􅀒京有賜田千頃耕之可以食河内千樹桑事之可以衣江都書力讀之可以官能勤此無資於人矣明謝文金州人成化中進士選庶吉士改御史巡閲通州竹木居庸諸關軍耗長蘆鹽法漕運四川邊儲所至剗弊糾姦不避貴近遷河間知府賑饑有方庭無留牘終山東參政張鳳翔洵陽人生有異質强記博覽為文雄傑卓犖與李夢陽同舉於鄉既成進士同授户部主事未幾卒夢陽輯其遺文六卷梓行之屠濟金州人嘉靖中舉於鄉知長子縣一介不取沍冬著敝鞾無襪民有以罽襪進者正色叱去及歸里鶉衣百結恬如也侯大化金州人嘉靖中舉於鄉知新津縣恂恂不為崖異而自守極嚴毅有欲于以私者皆憚而不敢發卒之日無以為斂清操卓品士論重之胡柟洵陽人知夏縣及保德州均有惠政洊升恩州兵備道卒於官劉四科紫陽人隆慶中進士知長治縣擢吏部主事厯兵部尚書兼副都御史巡撫薊鎮練兵恤民多善政卒贈太子少保羅世濟平利人萬厯中舉於郷為沔池敎諭聞李自成入關以死自誓既而沔池陷世濟率家人力戰被執不屈死之子得鴻練鄉兵守平利殺賊甚多城破與妻子俱死之本朝乾隆四十一年入祀忠義祠孫魯石泉人由歳貢官廣西知州未幾歸流賊攻石泉魯倡守城議甚力城陷魯力戰死本朝吳錦興安州人諸生順治三年流賊餘黨陷興安錦與鄉人譚文達並罵賊不屈死康紹文興安州人諸生順治三年流賊䧟城父子俱􅀍掠賊欲殺其父紹文乞以身代賊殺之父竟免於難康應祥興安州人家貧好義嘗路拾黄金六十兩俟失者還之事繼母以孝聞流賊過其門曰此孝義士也相戒勿犯鍾儀傑洵陽人康熙中進士知息縣賑饑全活甚衆行取吏部主事厯遷郎中出知廣州府潔巳奉職不營貲產以勞卒於官羅登科洵陽人力田敦睦數世同居百餘人合食無聞言覃訓紫陽人少􅀌事繼母来甚孝待繼母弟誨極友愛土賊亂訓􅀒母逃難誨梢緩為賊所􅀗訓傾貲詣賊贖以歸同縣諸生許應選事親亦至孝母病目失明應選朝夕跪泣􅈼天母目忽明楊秉恒平利人諸生性至孝色養無間乾隆年間旌劉悦平利人以孝行著嘉慶年間旌同縣姜宗夀漢陰諸生邱崧俱嘉慶年間以孝行旌流寓宋吕希純壽州人紹聖初父公著追貶希純亦以屯田員外郎分司南京居金州杜門著書陳師道彭城人高介有節安貧樂道諸經皆有訓傳尤邃於詩禮累遷秘書正字客居金州明吕柟高陵人正德間翰标修􅁧敦學行有五經註疏行世避劉瑾亂微服寓金州之純陽宫列女明栢壽妻王氏金州人壽殁家貧甚有勸改適者氏斷髪自誓事姑以孝聞守節六十年疾篤不令醫診視其守身嚴謹􅀋此又梁廷臣妻劉氏廷臣殁遺􅀌在襁褓舅姑欲奪其志即翦髪毁面誓以死有豪强謀聘之氏聞執刀刺頸流血被地舅姑亦為感泣又張鳴遠妻杜民年十九夫亡族豪盡奪其產氏甘貧奉親守節愈厲萬厯中旌屠瑞妻劉氏年十九守節唐際虞妻曹氏馬續光妻劉氏均撫育遺腹苦志守節馬兆祥妻張氏張价妾翟氏均夫亡殉節王正蒙妻蕭氏平利人蒙亡三日自縊死時嘉靖四十二年也余養龍妻王氏紫陽人夫殁氏孝亊翁姑訓子成立黄節四十餘年同縣魏訪之妻侯氏年二十夫亡翦髪自誓苦節撫􅀌任豫之妻孫氏均以節孝旌安汝翼妻王氏石泉人性莊嚴不事色笑夫殁守節三十餘年同縣魏人仰妻周氏夫亡守身課子足不踰國均以節孝旌水中二女興安州人崇禎末漢水溢死者甚衆有結筏自救者鄰里多附之忽聞波中呼救聲漸近見二女子附一朽木倐沉倐浮引筏救之年約十六七問其姓氏不答二女見筏上男子有祼者歎曰吾姊妹倚木不死冀有善地可存也今若此何用生為復欈手躍入波中死又州人陳大䇿溺死妻張氏不食七日死張必奇妻黄氏漢陰人夫殁推散家貲不食十二日死萬厯間旌同縣胡文煥妻王氏年二十文煥病殁密縫身衣縊死柩側又任礱妻楊氏曽武妻王氏張世華妻陳氏閔進孝妻王氏藍正元妻呉氏解鶴妻駱氏藍敏妻陳氏茹士珍妻尹氏陳光耀妻蔡氏皆夫亡守節課子成名王道直妻鄭氏漢陰人明末城陷恐被辱抱女投井死楊天培妻郭氏經厯陳光啟妾王氏皆目刎死本朝梁信成妻喻氏興安州人順治三年為流賊所執大罵不屈亂刀交下死之同時謝賢謨母胡氏妻劉氏陳于堂妻席氏王建極安􅃽氏范文奎妻侯氏陳五美妻劉氏並以義不污賊自殺崔尚志妻單氏興安州人康熙十四年呉三桂亂賊黨縱掠民間氏知不免以其子託鄰婦投崖死藍旐妾鄭氏漢陰人旐夫婦死於賊鄭􅀒嫡子立避難備嘗險阻亂定家業蕩然䌟麻自食訓立至於有成楊裔昌妻劉氏興安州人年十六夫亡事舅姑盡孝鞠遺腹子成立同州趙應泰妻王氏賈廷弼妻馬氏楊秉彝妻康氏梁陳妻孫氏馬志學妻胡氏俱以早寡孝事舅姑撫孤成立魯鏞妻馬氏年二十二夫殁撫遺􅀌宏漢誓守及宏漢為諸生完娶與婦先後死又撫孫成楷成立均雍正年間旌又崔榮妻劉氏馬在良妻馮氏馬天鳳妻常氏均以苦節著又烈婦陳五典妻李氏年十七夫亡自經以殉楊啟勇妻李氏平利人年二十七夫亡事舅姑甚孝及殁喪葬盡禮敎二子皆成立雍正四年旌呉鳳喈妻吉氏洵陽人夫亡孝事舅姑撫子伯禮入泮媳華氏善永姑志撫子淳科餼於庠兩氏俱年二十六而寡守節四十餘年同縣鍾仙質妻吉氏亦以節孝著任兆麟妻王氏紫陽人夫亡守節與同縣武君化妻李氏均雍正年間旌謝得龍妻何氏興安州人夫亡苦節三十年乾隆十三年旌同州朱緯妻沙氏楊正祿妻馬氏謝德隆妻何氏馬顯名妻馬氏鎖賢妻黄氏鎖偉妻馬氏陳知新妻王氏俞珍妻廖氏朱光煦妻周氏王前我妻黄氏萬士榮妻劉氏又烈婦段起志妻廖氏呉忠聘妻惠氏均乾隆年間旌王作位妻黄氏平利人夫亡家貧撫􅀌守節五十餘年同縣王政從妻李氏古㑹極妻王氏王國柱妻羅氏魏必威妻崔氏胡世典妻王氏符節妻陳氏王明世妻王氏彭永壽妻古氏趙良臣妻王氏鍾士彥妻梁氏均乾隆年間旌夜啟泰女平利人喜讀書許字劉遠煥未婚遠煥卒女年十五聞訃歸夫家守貞孝事舅姑立姪為嗣李聯芳妻謝氏洵陽人夫亡守節清苦自持年七十餘卒同縣宋英妻吉氏王諭妻馬氏劉􅁉妻張氏鍾仙麓妻朱氏鍾簴妻呉氏鍾衍慶妻吳氏宋書之妻余氏李本朴妻劉氏王紹曾妻彭氏又烈婦馮告妻羅氏陳􅁢彩妻范氏俱乾隆年間旌又劉可大妻王氏呉義貞妻戴氏胡天章妻李氏劉永敬妻胡氏來鳳子妻錢氏王柱桂妻錢氏劉自玉妻胡氏晏温妻陶氏祁文彩妻李氏陳大祥妻王氏呉涵之妻宋氏李習虎妻賈氏張士正妻陳氏陳宏諸妻焦氏向理之妻張氏均以苦節著談世海妻柯氏白河人不辱强暴投河自盡乾隆三十九年旌任豫妻孫氏紫陽人年二十三夫亡養姑訓子苦節五十餘年同縣任頊之妻嚴氏寇撫德妻魏氏張起鳯妻蕭氏張芝鵬妻高氏又尚其志妻趙氏夫被虎咥氏奮不顧身追虎奪囘而夫傷重旋卒氏甘貧守節孝事翁姑又烈婦康廷英妻呉氏王惟新妻呉氏均乾隆年間旌程氏女石泉人許字吕氏子吕氏子有惡疾其母欲改字蕭姓女不從自經死時年十五夏之相妻汪氏漢陰人夫亡守節上事翁姑養生送死克盡孝道同縣温永馨妻趙氏曾法乾妻李氏郭祚遠妻温氏曽􅄒志妻張氏陳國典妻胡氏尹原享妻劉氏均乾隆年間旌又常敏妻呉氏曾愷妻鄭氏胡鑑妻劉氏以苦節著張珍女白河人名器姐因革生陳茂才摳手戲之女忿自盡乾隆四十四年旌劉氏女平利人劉某女以孝聞嘉慶九年旌謝􅁢恭妻丁氏安康人夫亡守節與同縣楊英妻王氏均嘉慶十五年旌劉名世妻王氏平利人夫亡守節嘉慶六年旌同縣柯瑞燦妻鄭氏柯瑞熿妻鄭氏武涇妻漆氏武汶妻李氏李顯哲妻方氏均嘉慶年間旌張舉妻周氏洵陽人夫亡守節嘉慶十一年旌李文英妻吕氏白河人夫亡守節嘉慶十六年旌同縣吕志鍾妻黄氏黄簡璞妻陳氏劉爾功妻