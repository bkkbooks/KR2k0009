body:
  text: 榆林府在省治北一千三百五十里東西距六百八十五里南北距二百二十三里東至山西汾州府臨縣界九十五里西至甘肅寕夏府靈州界五百九十里南至綏徳州米脂縣界一百六十五里北至鄂爾多斯界五十八里東南至山西汾州府永寕州界三百四十里西南至延安府靖邊縣界二百五十五里東北至鄂爾多斯界一百三十里西北至鄂爾多斯界八十里自府治至京師一千七百九十里分野天文井鬼分野鶉首之次建置沿革禹貢雍州之域春秋時翟地秦為上郡地漢為上郡􅀛茲奢延等縣地兼置屬國都尉後漢末廢晉義熙中赫連勃勃據地稱大夏國名其城曰統萬後魏治光四年平為統萬鎮太和十一年改置夏州兼置化政郡西魏改郡曰宏化隋開皇三年郡廢大業三年州廢改置朔方郡唐初為梁師都所據貞觀二年復為夏州置都督府屬關内道天寶元年復改朔方郡乾元元年仍曰夏州唐書方鎮表貞元三年置夏州節度觀察處置押蕃落使中和元年賜號定難軍五代因之宋為西夏地元為綏徳州地明成化七年始置榆林衞為延綏鎮治本朝雍正八年改置榆林府並置榆林縣為府治又升懷逺堡為縣屬陜西省乾隆元年以所屬之定邊靖邊二縣改隸延安府降葭州為屬州及神木府谷二縣來屬今領州一縣四榆林縣附郭東西距一百五十五里南北距一百七十五里東至葭州界九十五里西至懷逺縣界六十里南至綏徳州米脂縣界一百六十五里北至邊牆十里東南至葭州界一百二十里西南至懷逺縣界八十五里東北至邊牆八十里西北至邊牆四十里秦上郡地漢置􅀛兹縣屬上郡為屬國都尉治後漢因之三國屬魏晉省後魏為夏州地北周置彌渾戍隋開皇初改徳靜鎮大業九年置徳靜縣屬朔方郡唐貞觀七年於縣置北開州八年改曰化州十三年州廢縣屬夏州五代因之宋没於西夏元為米脂縣地明永樂初置榆林寨成化七年置榆林衞為延綏鎮治本朝雍正二年省衞入綏徳州八年置榆林縣為榆林府治懷逺縣在府西南一百六十里東西距一百九十五里南北距一百十里東至榆林縣界一百里西至延安府靖邊縣界九十五里南至延安府安定縣界九十里北至邊牆二十里東南至綏徳州米脂縣界一百八十里西南至延安府安塞縣界一百七十里東北至榆林縣界一百二十里西北至靖邊縣界一百三十里秦上郡地漢置奢延縣屬上郡後漢因之魏省晉屬赫連氏後魏置巖綠縣為夏州及化政郡治西魏為宏化郡治隋為朔方郡治唐貞觀二年改曰朔方為夏州治宋没於西夏元為米脂縣地明天順中置懷逺堡屬榆林衞本朝雍正二年改屬綏徳州九年置懷逺縣屬榆林府葭州府東一百七十里東西距六十二里南北距二百七十里東至山西汾州府臨縣界二里西至綏徳州米脂縣界六十里南至綏徳州呉堡縣界一百十里北至神木縣界一百六十里東南至臨縣界二里西南至綏徳州界八十里東北至神木縣界一百十里西北至榆林縣界一百七十里秦上郡地漢為西河郡圁隂縣地晉時荒廢西魏置中鄉縣後周兼置中鄉郡隋開皇初郡廢改中鄉曰真鄉屬雕隂郡唐屬銀州宋初屬西夏元豐五年收復置葭蘆砦屬石州臨泉縣元符二年以砦置晉寕軍屬河東路金貞元元年屬汾州大定二十二年升爲晉寕州二十四年改曰葭州興定二年屬延安府元仍爲葭州屬延安路明洪武四年降爲縣屬綏徳州八年復爲州屬延安府本朝雍正三年升爲􅀡􅀠州領呉堡神木府谷三縣乾隆元年分呉堡縣屬綏德州仍以葭州及神木府谷二縣並屬榆林府神木縣在府東北二百四十里東西距一百八十里南北距一百四十里東至府谷縣界一百三十里西至邊牆五十里南至葭州界一百三十里北至邊牆十里東南至山西太原府興縣界一百里西南至葭州界一百里東北至府谷縣界八十里西北至邊牆三十里秦上郡地漢惠帝五年置圁隂縣屬西河郡後漢因之晉時荒廢後魏置石城縣北周改曰銀城隋屬雕隂郡唐初屬勝州開元十二年析置麟州後廢天寶元年復置兼置新秦縣爲治其年改新秦郡乾元元年復曰麟州屬關内道五代周時屬北漢宋亦曰麟州屬河東路元豐中於銀城縣界置神木寨政和四年省銀城縣入新秦金時地屬西夏州縣皆廢元初於神木寨置雲州屬延安路至元六年廢州爲神木砦縣屬葭州明洪武初省十四年復本朝乾隆元年改屬榆林府府谷縣在府東北二百里東西距一百一里南北距九十一里東至山西保徳州河曲縣界一里西至神木縣界一百里南至保徳州界一里北至鄂爾多斯界九十里東南至保德州界一里西南至神木縣界四十里東北至鄂爾多斯界九十里西北至鄂爾多斯界一百里秦上郡地漢西河郡地隋為銀城縣地五代後唐置府谷縣兼置府州宋亦曰府州屬河東路崇寕元年改曰靖康軍政和五年賜名榮河郡金地屬西夏元初仍曰府州屬延安路至元六年州廢二十三年縣屬葭州明因之本朝乾隆元年改屬榆林府形勢榆溪為九塞巖險第一連亙千里鄭汝璧都督題名記邊牆千二百餘里連墩勾堡橫截套口内復壍山湮谷是曰夾道明鄭曉吾學編邊陲衝要全陜籓籬北臨沙漠巍然重鎮延安府志東界黃河西繞蘆水峰巒迴抱道路險阻葭州志風俗地接邊荒多尚武節隋書地理志人物勁悍善戰宋史种諤傳懷忠畏法果悍敢勇多將材有節氣鄭曉吾學編城池榆林府城即舊衞城周十三里三百餘步門七西南臨河明正統初剙築成化九年増築北城宏治五年拓南城嘉靖隆慶萬厯中相繼甃甎南關外有外城正徳十年建西門外又有羅城七里隆慶元年建本朝乾隆十四年修榆林縣附郭懷逺縣城即舊堡城周三里有奇門三明天順中建本朝乾隆二十三年重修葭州城分内外二城内城門二外城門三周三里有奇明洪武初因金元舊址建内城北郭隆慶間増建南郭本朝順治十五年建康熙十六年乾隆三十二年重修神木縣城周四里有奇門四池深一丈明正統八年土築萬厯六年甃甎本朝雍正四年乾隆十一年重修府谷縣城周五里有奇門六因河為池明正統中因舊址拓建本朝乾隆十一年四十六年重修學校榆林府學在府治西即舊衞學明成化八年建本朝順治十年修乾隆四十六年重修入學額數十二名榆林縣學附府學入學額數八名懷逺縣學在縣治東乾隆八年建嘉慶二年修入學額數八名葭州學在州治東南明成化中改建本朝順治九年康熙三十九年乾隆四十九年嘉慶十二年重修入學額數十二名神木縣學在縣治南明洪武十四年建本朝順治八年康熙五十四年重修入學額數八名府谷縣學在縣治南明洪武十四年建本朝順治八年康熙二十四年乾隆三十四年重修入學額數八名榆陽書院在榆林縣城内乾隆十九年建正鄉書院在葭州治西乾隆四十三年建榮河書院在府谷縣南門外乾隆三十五年建按舊志載懷逺書院在懷逺縣乾隆十二年建希文書院麟城書院在神木縣乾隆十九年建今並廢謹附記户口原額人丁一十九萬六千八百七十六今滋生民户共男婦五十一萬五千二百六十四名口田賦民地一千二百四十九頃七十五畝九分九釐額徵地丁銀六千五百一十七兩二分五釐糧四千三百八十六石三斗五升一合四勺屯地二千九百九十頃九十六畝八分四釐額徵地丁銀三千二百九十一兩一錢六分五釐糧四千二百五十四石一斗四升一合山川駝山在榆林縣治東高數十丈縣城半居其上俗呼為東山土人穴山為居山之西有堡􅅜山三峰並立上有塔亦名文筆峰塔兒山在榆林縣東雙山堡東南二十里葭州志在州西北一百四十里萬佛洞山在榆林縣東南十二里高峰特起其北十餘里有淩霄塔木􅓓神山在榆林縣東南五十里明成化中嘗有妖神棲此後有道士經此焚其祠妖遂息羊羔山在榆林縣東南五十餘里木􅓓神山東又南十里有暖泉山嗣武城山在榆林縣南一百三十里魚河堡南五十里由石磴而上四面石岩高百丈舊為囉兀城王墓山在榆林縣西南十里有殘碑無字相傳為夏元昊祖墓黒山在榆林縣西十里有黒水出其下水甘草茂明成化中巡撫余子俊築塞堡植柳萬株其下紅山在榆林縣北十里環拱若屏上皆紅石落日返照霞采爛然山之兩崖為紅石峽榆溪獐河匯流其中其上有款貢城鎮北臺易馬臺昔李繼遷葬其祖􅂜昌障水别流鑿石為穴既葬復引水其上疑即此峽也明巡撫鄭汝璧改名雄石峽馬神山在榆林縣東北二里每秋祭馬神於此馬鞍山在懷逺縣東南土門砦北五里又五龍山在縣東南波羅堡南三十里盤龍山在懷逺縣東南八十里橫江怪石盤繞河邊下有石佛洞上有盤龍寺建於明季為嚮水堡之屏障橫山在懷逺縣南宋熙寕中韓絳宣撫陜西用种諤䇿規取橫山元豐中諤復上言橫山延袤千里多馬宜稼且有鹽鐵之利夏人恃以為生其城壘皆控險足以守禦即此舊志橫山即古橋山與延安府安定縣接界龍鳳山在懷逺縣西南十五里牛心山在懷逺縣西南威武堡東十餘里赤木山在懷逺縣西六十五里峙萬山中峻險特出契呉山在懷逺縣北十六國春秋赫連勃勃北遊契呉歎曰美哉臨廣澤而帶清流吾行地多矣自馬嶺以北大河以南未之有也元和志山在朔方縣北七十里白雲山在葭州東南石洞崢嶸重曡為州中名勝西嶺山在葭州西五里葭蘆川旁宋將薛義敗夏人於葭蘆西嶺即此又相近有桃李塢在申家灣東遶蘆水西峙石崖天池山在葭州西六十里其山外高中卑積水若池又名天池窪亦曰白草窪麻椿山在葭州西北百五十里鳳凰山在葭州北八十里南憑黃河高數百仭又無量山在州北百六十里瞭高山在神木縣東一百步一名紗帽山龍眼山在神木縣東南一百步上有二穴透穿如龍眼白龍寺山在神木縣東南十里四面壁立中通一徑又東有鳳凰石石盤山在神木縣西柏油堡東南接榆林縣界相接為沈家寺山有巨人足跡長尺五寸筆架山在神木縣西三里本名駝兒山正徳中賜名大川經其下山有張家洞鳳頭山在神木縣東北一里舊名香爐山明正徳十三年幸榆林駐蹕於此因賜名又有錦屏山在鳳頭山南五龍山在府谷縣東一里五峰突起狀如伏虎亦名五虎山方臺山在府谷縣東有東嶽行宫又黒山在縣東北十里天臺山在府谷縣西南接神木縣界鐭子山在府谷縣西六十五里半坡山在府谷縣西七十里又縣西一百里有小木山水塞山在府谷縣北十五里兩川夾流山峙川中又縣北二十里有陶家山龍峰山在府谷縣東北三十里山形盤曲上有高峰特立􅀊旱禱􅀨輒應三山在府谷縣東北清水堡南又堡東有梁家山古城山堡西有瓦窑山高寒嶺在神木縣東北永興堡東又有響石崖在堡南沙井嶺在府谷縣西北九域志豐州西五十里至沙井嶺西北三十七里至暖泉峰北六十里至龍尾房東北九十里至超沿渡元統行者望之若鞦韆架故名龍王泉水在榆林縣城中自山半湧出匯而為池疏而為竇周灌城中居人皆汲飲此又西南入西河一名南門河又名南泉又一自鐘樓街中出者為北泉渟瀦不流其上皆有龍王廟故名帝原水在榆林縣西亦名西河漢書地理志膚施縣有帝原水水經注帝原水西北出龜茲縣東南流又東南注奢延水延綏鎮志西河在鎮城西即榆溪源出塞外葫蘆海南流有常縣堡所出之獐河西流入焉又南流逕紅石峽入邊為西河合芹河水龍王泉又南鍾家溝水西注之又南五里屈而東流合劉指揮河柳河又南得三岔川又東南騙馬井水注之又南得黒水河又南至魚