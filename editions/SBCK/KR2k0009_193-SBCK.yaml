front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_193-1a}
body:
  text: 左哈薩克在舊準噶爾部之西北東西千里南北六百里東至塔爾巴哈台界西至右哈薩克部界南至伊犂界北至俄羅斯國界其貢道由伊犂以達於京師建置沿革漢為康居國冬治樂越慝地到卑闐城後漢為康居國及栗弋國地魏為康國堅昆國及者舌國東境地者舌國見右哈薩克部隋為康國唐為􅃛戛斯地自後無聞今為左哈薩克部哈薩克部有三曰東部曰中部曰西部哈薩克汗阿布賚之告順德納曰我哈薩克之有三玉兹如準噶爾之有四衞拉特也西爾莫特之告舒赫德曰哈薩克内有伊克準多木達都準邑罕準三部蓋東部者左部也曰鄂圖爾玉兹謂之伊克準中部者右部也曰烏拉克玉兹謂之多木達都準西部最遠曰奇齊克玉兹謂之巴罕準左部之汗曰阿布賚右部之汗曰脫卜柯依西部之頭人曰都爾遜都爾遜未授為汗故今不載西部初阿布賚乘準噶爾部達瓦齊之亂數侵擾準部本朝乾隆二十年準噶爾平遣使往諭阿布賚輸誠歸化適阿睦爾撒納叛走哈薩克阿布賚納之我兵進討累敗其衆後阿布賚悔為阿逆所賣密計擒之以求臣於我㑹阿逆遁歸準噶爾二十二年我兵復進討阿布賚以其兵三萬助攻阿逆陳情謝罪奉表請内附乃以托忒烏珠克字印文導我師巡行諸部時阿睦爾撒納竄跡於阿爾察圖阿布賚將以計擒之不􅀗阿逆奔俄羅斯旋伏㝠誅乃擒其黨額布濟齊巴罕以獻其别部和集博爾根及喀拉巴勒特並率其屬三萬户來服左部咸定二十四年以後屢遣使朝貢並賜冠服宴賚如例晷度北極高四十六度二十分至四十八度距京師偏西三十二度至三十七度西域圖志形勢康居在大宛西北可二千里行國控􅁌八九萬人史記大宛傳建庭葉什勒居客斯騰城西域圖志風俗康居國王每冬寒夏暑則别居不一處顏師古漢書注無城郭逐水草事游牧冬夏别居無常處地廣人稠甲於他部西域圖志山川阿爾津沙拉什保台山在哈薩克東南境此山之東北為阿爾輝西里即準噶爾境額米爾界鄂綽沁吉斯山勒克楞山山南即準噶爾境齋爾界扎拉圖哈薩拉克山喀爾克圖哈薩拉克山喀拉巴克喀爾海山自阿爾津沙拉什保台山以次而西至此山而止是為哈薩克南境山厄勒伊們山在喀拉巴克喀爾海山西北為哈薩克西境山葉什勒河源出其南麓依底克山在哈薩克西北二千里境外接右部界地尼雅克圖山在厄勒伊們山北尼滿哈濟蘭山在尼雅克圖山東喀爾瑪奇爾哈山在尼滿哈濟蘭山東北阿克奇拉山巴顏山蒿哈薩拉克山皇朝文獻通考蒿作毫乾隆二十一年將軍哈達哈敗阿布賚兵於此自喀爾瑪奇爾哈山至此山皆以次而東阿巴拉爾山在蒿哈薩拉克山東南自尼雅克圖山至此是為哈薩克北境山阿巴拉爾山東即塔爾巴哈台境楚庫魯克河在哈薩克東境河東即塔爾巴哈台境三察爾河在楚庫魯克河西色爾格河在三察爾河西南以上三河在哈薩克東境克巴什博爾濟爾河在博爾喀得克泉西綽多爾圖河在克巴什博爾濟爾河西源出喀拉巴克喀爾海山二河在哈薩克西南境葉什勒河皇朝文獻通考作伊什爾河在哈薩克西境源出厄勒伊們山沿河西北行二百里地名春吉索波藍其地極寒哈薩克汗盛夏常居於此蓋建庭處也鄂埒河在哈薩克西北境河源有獨樹見古蹟罕拉海圖泉在色格爾河東烏爾圖泉在色格爾河西阿濟蘇泉阿林泉自罕拉海圖泉至阿林泉以次而西皆在哈薩克東南境青吉斯泉在阿林泉南阿爾齊圖泉奎蘇泉什納噶泉沮洳渙散燦若列星額特倫泉博爾喀得克泉自青吉斯泉至博爾喀得克泉以次而西皆在哈薩克南境古蹟獨樹在哈薩克西北境鄂埒河之上獨幹輪囷其上分為五枝盤拏蔭廣可蔽二百騎哈薩克謂之鄂埒引噶克义莫朶噶克义莫朶者獨樹之謂以生鄂埒河之源故名哈薩克人過其下者必膜拜供獻而不敢稱其名相傳為數千年物云乾隆二十二年哈薩克使臣來朝高宗純皇帝詢問神樹所在使臣具以實奏有聖製寄題哈薩克獨樹詩千年神幹首被光榮於天末焉康居諸國漢書西域傳康居國王冬治樂越慝地到卑闐城去長安萬二千三百里不屬都䕶樂越慝地馬行七日至王夏所居蕃内東至都䕶治所五千五百五十里東羈事匈奴宣帝時漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居至成帝時康居遣子侍漢貢獻然自以絶遠獨驕嫚不肯與諸國相望漢為其新通重致逺人終羈縻而未絶後漢書栗弋國嚴國奄蔡國俱屬康居晉書康居國在大宛西北二千里與栗弋伊列隣接其王居蘇薤城地和暖饒桐柳葡萄岀好馬泰始中遣使獻善馬魏書康國康居之後也自漢以來相承不絶其王本姓温後姓昭武左右諸國並以昭武為姓王都薩寶水上阿祿迪城米國史國曹國何國安國小安國那色波國烏那曷國穆國皆歸附之大延中始遣使貢方物隋書康國大業中遣使貢方物又米國都那密水西西北去康國百里東去蘇對沙那國五百里西南去史國二百里東去瓜州六千四百里史國都獨莫水南十里北去康國二百四十里南去吐火羅五百里西去那色波國二百里東北去未國二百里東去瓜州六千五百里曹國都那密水南數里東南去康國百里西去何國百五十里東去瓜州六千六百里何國都那密水南數里東去曹國百五十里西去小安國三百里東去瓜州六千七百五十里皆舊康居之地唐書康在那密水南支庶分王曰安曰曹曰石曰米曰何曰火尋曰戊地曰史世謂九姓皆氏昭武隋時其王臣突厥武德十年始遣使來獻自貞觀後􅀊入貢永徽時以其地為康居都督府安瀕烏滸河治阿濫謐城即罽王故地東安在那密水之陽治喝汗城東曹居波悉山之陰漢貳師城地也西曹隋時曹也治瑟底痕城中曹治迦底真城石治柘折城即窳匿城地米治鉢息德城何即附墨城故地火尋居烏滸水之陽治急多􅄓遮城即奥鞬城故地戊地距火尋西北六百里史居獨莫水南即蘇薤城故地堅昆國魏畧西域傳北烏伊國在康居北堅昆國在康居西北丁令國在康居北此上三國堅昆居中央南去車師六國五千里􅃛戛斯國唐書回鶻傳􅃛戛斯古堅昆國也郅支單于破堅昆于時東距單于庭七千里南至車師五千里郅支留都之後世訛為結骨稍號紇骨亦曰紇扢斯云堅昆本强國地與突厥等東至骨利幹南吐蕃西南葛邏祿始隸薛延陀未始與中國通貞觀二十二年遣使獻方物其酋長俟利發失鉢屈阿棧身入朝以其地為堅昆府隸燕然都䕶高宗世再來朝乾元中為回紇所破後訛為􅃛戛斯蓋回紇謂之若曰黃赤面云大清一統志右哈薩克在舊凖噶爾部之西北左哈薩克之西二千里東至左哈薩克界西至塔什罕界南至布魯特安集延諸部界北至俄羅斯國界東南至伊犂界其貢道由伊犂以達於京師建置沿革漢為康居五小王地魏晉為康居地後魏為者舌國隋唐為石國或曰柘支曰柘折曰赭時即石國也自後無聞今為右哈薩克部其汗曰阿布勒班畢特即阿比里斯其巴圖爾有三曰吐里拜曰輝格爾德曰薩薩克拜而吐里拜實專國政本朝乾隆二十二年左哈薩克阿布賚既臣服請招右部與之偕來㑹參贊大臣富德方以兵索逆賊哈薩克錫拉至右部遣使往撫是時吐里拜等方與塔什罕回人交兵不下平之乃下於是吐里拜詣軍門納􅅃奉馬進表請歸附二十三年以後屢遣使入朝恩賜宴賚如例晷度北極高四十三度至四十五度距京師偏西四十五度四十八分西域圖志形勢石國東北距西突厥西南有真珠河亦曰質河東南有大山唐書西域傳風俗康居國風俗及人貌衣服畧同大宛晉書西域傳其部曰烏拉克玉兹其俗大畧與左部等又名北哈薩克西域圖志山川依底克山見左部為右部東北境山穆呼札爾山哈喇綽克多嶺莽阿錫魯嶺阿格納斯嶺自穆呼札爾山至阿格納斯嶺於錫爾河北岸薩哈斯河南岸層巒緜亙相接而西阿格納斯嶺正當騰吉斯池南岸是為右部哈薩克西南境山格根河在依底克山西南水瀦不流為右部哈薩克東北境納穆爾河在格根河西南水瀦不流雅哈爾斯河在納穆爾河東南兩河之聞有小城曰噶瑪克錫爾河在雅哈爾斯河西南河南流折而西經穆呼札爾山哈喇綽克多嶺莽阿錫魯嶺阿格納斯嶺之陰河源處西岸有波拉克城東岸有那斡喀特城那斡喀特城南踰山有蒿達克城由蒿達克城西踰錫爾河為塔什罕城薩哈斯河在錫爾河西西南流入騰吉斯池河南岸當穆呼札爾山下有噶拉楚克城又西當哈喇綽克多嶺下有達拉什城又西當莽阿錫魯嶺下有沙爾城沙爾城當騰吉斯池東南岸塔拉斯河發源在依底克山西北又西南流經薩哈斯河北入於騰吉斯池騰吉斯池在阿格納斯嶺北周數百里蓋小海也與俄羅斯鄰接哈拉庫爾在依厎克山西塔拉斯河東二支合流西南瀦為池達布遜淖爾小池瀦不流在哈拉庫爾與塔拉斯河之閒古蹟康居五小王地漢書西域傳康居有五小王一曰蘇䪥王治蘇䪥城二曰附墨王治附墨城三曰窳匿王治窳匿城四曰罽王治罽城五曰奥鞬王治奥鞬城凡五王屬康居按西域山北諸部皆隨水草游牧無城郭漢書所謂行國也惟右哈薩克有達拉什城噶拉楚克城波拉克城那斡喀特城蒿達克城諸名其地在古康居之西偏則漢書所謂五小王各治一城者地正相值想亦其舊俗相因異於諸行國也者舌國魏書西域傳者舌國在破洛那西北去代一萬五千四百五十里太延三年遣使朝貢石國唐書西域傳石或曰柘支曰柘折曰赭時漢大宛北鄙也隋大業初西突厥殺其王以特勒匐職統其國顯慶三年以瞰羯城為大宛都督府開元初封其君莫賀咄吐屯有功為石國王二十八年又冊順義王天寳初封王子那俱車鼻施為懷化王賜鐵劵久之叛安西節度使高仙芝討之俘以獻王子走大食乞兵攻怛邏斯城敗仙芝自是臣大食寶應時遣使朝貢安息國漢書安息王治番兜城去長安萬一千六百里不屬都護北與康居東與烏弋山離西與條支接俗與烏弋罽賓同以銀為錢文獨為王面幕為夫人面有大馬爵其屬小大數百城地方數千里最大國也臨媯水武帝始遣使至安息因發使以大鳥卵及犂靬􅅭人獻於漢安息東則大月氏後漢書安息國居和櫝城其東界木鹿城號小安息章帝章和元年遣使獻獅子符拔和帝永元九年班超遣甘英使大秦扺條支臨大海欲度安息西界船人言入海人皆齎三􅀊糧英乃止從安息西行三千四百里至阿蠻國又西行三千六百里至斯賓國南行渡河又西南至于羅國九百六十里安息西界極矣自此南乘海乃通大秦魏書安息在蔥嶺西都蔚搜城北與康居西與波斯相接在大月氏西隋書安國漢時安息國也王姓昭武與康國王同族都那密水南城有五重環以流水宫殿昏為平頭煬帝初遣杜行滿至其國又烏那曷國都烏滸水西舊安息之地王姓昭武康國種􅀋東北去安國四百里西北去穆國二百餘里東去瓜州七千立百里穆國都烏滸河西亦安息故地與烏那曷為鄰其王姓昭武亦康國種􅀋東北去安國五百里東去烏那曷二百餘里西去波斯國四千餘里東去瓜州七千七百里唐書東安在那密水之陽治喝汗城東距河二百里許西南至大安四百里條支國漢書條支國臨西海暑溼田稻有大鳥卵如甕傳聞有弱水西王母亦未嘗見後漢書條支國城在山上周回四十餘里臨西海海水曲環其南及東北三面路絶惟西北隅通陸道出獅子犀牛封牛孔雀大雀轉北而東復馬行六十餘日至安息魏書波斯國都宿利城在忸密西古條支國也城方十里河經其城