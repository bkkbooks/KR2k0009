蔥嶺直北四百里外西域圖志前纂修官臣孫銘恩恭纂輯總纂官臣邵燦恭覆輯校對官臣賀式韓恭校校對官臣許誦恆恭覆校大清一統志拔達克山在回部喀什噶爾葉爾羌之西南六百餘里國居蔥嶺中其貢道由回部以達於京師建置沿革漢為烏秅國北魏為權於摩國及阿鈎羌國唐為喝盤陀地開元中於其地置蔥嶺守捉元明為拔達克山元史作巴達哈傷明史作八答黑商皆係譯音之譌今俱改正有城郭負山險其汗曰素爾坦沙本朝乾隆二十四年逆回波羅泥都霍集占自葉什勒庫勒敗後奔拔達克山副將軍富德率兵追之遣使往諭素爾坦沙以二酋􅀒恩悖逆狀令擒獻是時二賊方竄入拔達克山沙木爾伯克所屬之錫克南村乘閒逸去檄至素爾坦沙因遮縛波羅泥都而以兵圍霍集占於阿爾渾楚哈嶺賊退保齊那爾河距戰不能支擒之囚於柴札布因報逆賊就擒狀副將軍富德責令獻俘進軍斡罕以待之是時痕都斯坦部方以兵臨拔達克山謀劫霍集占兄弟而塔爾巴斯者拔達克山讎國也賊將通之共攻拔達克山初素爾坦沙以二酋與己同為噶木巴爾派欲即縛獻恐諸部不從方遷延觀望副將軍富德宣示威德曉以順逆利害之故乃大感悟殺二酋以波羅泥都屍身被盜專函霍集占首以獻因率其部落十萬户與其鄰博洛爾部三萬户俱内附二十五年遣使入覲貢八駿馬賜敕嘉奬時素爾坦沙與姪塔什瑪木特相攻塔什瑪木特聞敕使至即釋爭率屬内附二十六年來貢刀斧二十八年獻波羅泥都屍及其妻子并遣使來朝貢晷度北極高三十六度二十三分距京師偏西四十三度五十分西域圖志形勢山居田石閒有白草其西則有縣度漢書西域傳􅀒山險阨蔥嶺之右頗擅形勢西域圖志山川阿爾渾楚哈嶺在拔達克山屬境素爾坦沙奉檄圍霍集占於此葉什得拉克河源出蔥嶺之西陲北流經拔達克山博洛爾兩部之閒至葉什得拉克以地名河分為二支一流經北入圖斯庫爾一流曲折向西南又北入於葉什勒庫勒淖爾葉什勒庫勒舊對音伊西洱庫爾與葉爾羌接界有聖製平定回部勒銘伊西洱庫爾碑文已載喀什噶爾卷中齊那爾河在拔達克山南境素爾坦沙奉檄擒霍集占於此古蹟烏秅國漢書西域傳烏秅國王治烏秅城去長安九千九百五十里東北至都護治所四千八百九十二里北與子合蒲犂西與難兜接累石為室民接手飲其西則有縣度去陽關五千八百八十八里去都護治所五千二百里縣度者石山也谿谷不通以繩索相引而度云權於摩國魏書西域傳權於摩國故烏秅國也其王居烏秅城在悉居半西南去代一萬二千九百七十里阿鈎羌國魏書西域傳阿鈎羌國在莎車西南去代一萬三千里西有縣度山其閒四百里中往往有棧道下臨不測之淵人行以繩索相持而度因以名之按漢書稱烏秅國西有縣度魏書則以權於摩國即漢之烏秅而縣度在阿鈎羌國之西考阿鈎羌去權於摩止三十里境壤毘連蓋漢烏秅國至魏分而爲一其在今則皆抜達克山境也喝盤陀國唐書西域傳喝盤陀或曰漢陀曰渴館檀亦謂渴羅陀由疏勒西南入劒末谷不忍嶺六百里其國也距瓜州四千五百里直朱俱波西南距縣度山北抵疏勒西護密西北判汗國也治蔥嶺中都城負徒多河其王本疏勒人世相承爲之西南即頭痛山也蔥嶺環其國後魏大延中始通中國貞觀九年遣使者來朝開元中破平其國置蔥嶺守捉安西極邊戍也土產刀斧皆乾隆年間入貢馬乾隆二十五年貢八駿大清一統志博洛爾在葉爾羌西南拔達克山之東其貢道由回部以達於京師建置沿革漢爲烏秅國地北魏爲阿鈎羌國地本朝乾隆二十四年其酋沙瑚沙默特輸誠向化與拔達克山同内附二十五年遣使沙伯克等來朝賜宴賚予並賜敕書二十八年貢劒及斧二十九年爲拔達克山素爾坦沙所侵乞援於葉爾羌駐劄都統新柱因遣使戒諭素爾坦沙令還所俘掠罷兵相睦素爾坦沙恪遵約束沙瑚沙默特表謝並遣使來朝貢匕首其部中所最珍也三十四年貢雙玉欛匕首自此貢獻不絶晷度北極高三十七度距京師偏西四十三度三十八分西域圖志土產劒斧乾隆二十八年貢匕首乾隆三十四年貢雙玉欛匕首大清一統志布哈爾在拔達克山西一千餘里其貢道由回部以達於京師建置沿革漢為難兜國自後無聞本朝乾隆二十五年回部厎平遣使頒敕諭二十九年其部長阿布勒噶爾遣使諾羅斯伯克達雅爾伯克因拔達克山素爾坦沙􅈼請以其屬内附晷度北極高三十八度四十二分距京師偏西五十七度三十二分西域圖志古蹟難兜國漢書西域傳難兜國王治去長安萬一千五百里東北至都護治所八百九十里西南至罽賓三百三十里按漢書載烏秅國西與難兜接烏秅為今之拔達克山難兜為今之布哈爾其地位遠近正相值也大清一統志愛烏罕在拔達克山布哈爾之西南其貢道由回部以達於京師建置沿革漢為大月氏國後漢為大月氏貴霜王國北魏為嚈噠國隋為悒怛國唐為大月氏地愛烏罕在蔥嶺西部落最大本朝乾隆二十七年其汗愛哈默特沙知西域厎平聞風慕化遣使密爾漢等重譯來朝貢刀及四駿馬賜宴賚如例二十八年正月頒敕書嘉奬遣使歸國古蹟大月氏國漢書西域傳南道西踰蔥嶺則岀大月氏大月氏治監氏城去長安萬一千六百里不屬都護東至都護治所四千七百四十里南與罽賓接都媯水北爲王庭後漢書西域傳初月氏爲匈奴所滅遂遷於大夏分其國爲五部翖侯後貴霜翖侯邱就攻㓕四翖侯自立爲貴霜王又滅濮達罽賓悉有其國子閻膏珍代立復㓕天竺置將一人監領之月氏自此之後最爲富盛嚈噠國魏書西域傳嚈噠國大月氏種􅀋也原岀塞北自金山而南在于闐之西都馬許水南二百餘里去長安一萬一百里去瓜州六千五百里悒怛國隋書西域傳悒怛國都烏滸水南二百餘里大月氏之種􅀋也大業中遣使貢方物按愛烏罕爲今蔥嶺西南大國漢書所云南道西踰蔥嶺則岀大月氏與今愛烏罕適合魏嚈噠隋挹怛皆月氏種􅀋其所載都馬許水南及烏滸水南蓋字畫之傳譌漢書稱其都媯水烏滸與媯其音固相近是嚈噠悒怛之與月氏同爲一地皆愛烏罕境也土產刀形如半弓乾隆二十七年貢馬乾隆二十七年貢四駿大清一統志痕都斯坦在拔達克山西南愛烏罕東南與北印度國交界其貢道由回部以達於京師建置沿革漢以來為罽賓國地其國人工巧精於治玉以水磨治不以沙石為錯地鄰五印度去中國絶遠其俗善賈舊於回部葉爾羌地方貿易本朝乾隆二十五年西域厎平頒敕書賜物今通市如故向稱温都斯坦今考梵文改正痕都斯坦晷度北極高二十九度十五分距京師偏西四十五度五分西域圖志古蹟罽賓國漢書罽賓國王治循鮮城去長安萬二千二百里不屬都護大國也東北至都護治所六千八百四十里東至烏秅國二千二百五十里東北至難兜國九日行西北與大月氏西南與烏弋山離接地平温有目宿雜草奇木檀櫰梓竹漆種五榖葡萄諸果其民巧雕文刻鏤治宫室織罽刺文繡好治食市列以金銀為錢文為騎馬幕為人面出封牛水羊象大狗沐猴孔雀珠璣􅃢瑚虎魄璧流離它畜與諸國同自武帝始通其王數剽殺漢使元帝放其使者於懸度絶而不通成帝時遣使謝罪漢欲遣使者報送其使杜欽說王鳳曰罽賓絶遠雖不附不能危城郭送客者起皮山南更不屬漢之國四五厯大小頭痛之山赤土身􅀬之阪又有三池盤石阪臨崢嶸不測之深行者騎步相持繩索相引二千餘里乃到懸度罷弊所恃以事無用非久長計使者可至皮山而還鳳白從欽言魏書罽賓國都善見城居四山中地東西八百里南北三百里隋書漕國在蔥嶺北漢時罽賓國也其王姓昭武都城方四里國法嚴整蔥嶺山有順天神儀制極華金鍱為屋銀為地王立山中有石峽兩壁懸崖如斧劈行二三里出峽有門石色如鐵人指云此鐵門關也賽瑪爾堪元史作邪米思干遼大石林牙有國時名為河中府鐵門關在城之東南數百里見邱處機西遊記賽瑪爾堪舊作撒馬兒罕伊里巴里舊作亦力巴力哈里舊作哈烈特穆爾舊作帖木兒沙魯哈雅舊作沙鹿海牙薩蘭舊作賽蘭塔實干舊作達失干克實舊作渴石德爾密舊作迭里迷今俱改正哈里國續文獻通考哈里在肅州西相去一萬一千餘里東北至賽瑪爾堪二千四百里地俱平川四面大山有沙哈魯者國人尊之為蘇勒坦猶華言君王也東有安都懷巴拉默等城皆隸焉衣服色尚白無正朔不用甲子以七日為一周擇日用事則以第一日名阿啼納為上吉凡拜天聚會用之明永樂七年朝貢正統二年貢馬玉石蘇勒坦舊作速魯檀安都舊作俺都懷巴拉默舊作淮八刺墨今俱改正識匿國唐書識匿東南直京師九千里東五百里距蔥嶺守捉所南二百里屬護密西北五百里抵俱密初治苦汗城後散居山谷有大谷五酋長自為治謂之五識匿地二千里無五穀貞觀後屢朝貢天方國古筠冲地一名天堂又曰默伽水道自忽魯謨斯四十日始至自古里西南行三月始至明宣德五年鄭和使西洋遣人至其國國王遣使來貢道從嘉峪關至萬厯中貢使不絶於西域為大國土饒沃無雨雹霜雪草木資露以生四時皆如夏相傳回回設敎之祖曰瑪哈穆特者首於其地行敎其墓頂常有光故人皆向善西土稱為樂國有禮拜寺分四方共三百六十閒皆白玉為柱黃甘玉為地其堂以五色石砌成沈香大木為梁凡五堂堂左有司馬儀墓其國稱為聖人又有諸師傳敎之堂規制俱極宏麗又相近有默德那國回回祖國也其實自為一按王圻以賽瑪爾堪為即漢罽賓地部與痕都斯坦不相屬也天方國為回人祖國在今回部之西其地絶遠今甄錄舊史原文附載於卷末以資考證焉瑪哈穆特舊作馬哈麻今改正土產玉器乾隆年閒入貢者有玉盤玉壺玉椀五杓玉瓿玉盂玉瓢玉杯玉飲器玉洗玉合玉大清一統志巴勒提在博洛爾之南痕都斯坦之東其貢道由回部以達於京師建置沿革自古無聞其地在痕都斯坦東陲相與鄰接國俗亦大略相似蓋漢唐時罽賓國近東屬境也其部羣山接近中有長河其境有土伯特札穆巴克什米爾諸地分兩部落其酋長默默斯帕爾及烏蘇完分統之各有衆八千餘人舊在葉爾羌貿易本朝乾隆二十五年西域既平其酋長請内附自此通市不絶晷度北極高三十一度五十分距京師偏西四十五度二十八分西域圖志前纂修官臣孫銘恩恭纂輯總纂官臣邵燦恭覆輯前校對官臣孫家澤恭校校對官臣許誦恆恭覆校
