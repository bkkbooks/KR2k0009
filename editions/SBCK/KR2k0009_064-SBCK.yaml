極險峻峴下即堂阜俗訛為憚阜牟鄉在沂水縣南春秋宣公九年取根牟左傳昭公八年大蒐于紅自根牟至于商衞革車千乘注根牟東夷國也今琅邪陽都縣南有牟鄉後漢書郡國志陽都有牟臺東吕鄉在日照縣東後漢書郡國志西海注博物記太公吕望所出今有東吕鄉又釣于棘津其浦尚存舊志有晏公臺在縣東北二十里去海里許舊址尚存臺旁溪水清漣即太公釣處按劉向說苑吕尚聞西伯養老西歸于周釣渭上渭水在禹貢雍州之域今陜西西安府渭南縣即其地至日照乃齊封邑賜履之後不得復有垂釣事原志謂釣于棘津其浦尚存今棘津無考又謂晏公臺旁即太公釣處其說悉屬附會以舊志相沿故仍存之孝悌里在費縣東五十里諸滿村省志古臨沂之孝悌里也顔氏自師古以下世居斯土數傳至杲卿眞卿其忠烈尤著云舊志云故城在費縣東五十里中有隱貞觀相傳顔魯公所居之處渠邱里在莒州北左傳成公八年申公巫臣如吳與渠邱公立于池上注莒邑今莒州有蘧邱里花園莊在郯城縣西三里今名郯子花園乾隆二十六年建有行宫高宗純皇帝南巡江浙駐蹕於此二十七年三十年四十五年四十九年俱經有駐蹕御製詩二賢莊在沂水縣西北八十里縣有閔公山相傳爲閔子避地之所又有子路栖依巖後人因名其地爲二賢莊劉公莊在日照縣西八十里梁時劉勰所居望海樓在郯城縣東南三十里孔望山縣志世傳孔子嘗登此山望海因建石樓其上禹王臺在郯城縣東北十里縣志世傳神禹治水時鑿馬陵山引沭水歸海築臺于此以鎭水勢明正德間土寇竊發臺漸圮嗣是夏秋之間沭水泛漲而西縣城屢被衝決本朝康熙二十八年始築竹絡壩禦之乾隆八年復修並建禹王廟於石壩之北自是沭水安流經行諸縣遂無水患十六年浙經過山東有高宗純皇帝南巡江御製題禹王臺詩平野亭在蘭山縣東北縣志相傳爲晉琅邪王潛邸遺址勇士亭後漢書郡國志注郯有勇士亭即古勇士萬邱欣也憶梅亭在郯城縣西北六十里縣志相傳爲何遜建乾隆十六年辛未高宗純皇帝鑾輿經過有憶梅亭御製詩傾葢亭在郯城縣北十里劉向記苑云孔子之郯遭程子于途傾葢而語終日後人因建亭于此古台亭在費縣南春秋襄公十二年莒人伐我東鄙圍台後漢書郡國志費縣有台亭古密如亭在費縣北左傳閔公二年莒人歸共仲及密後漢書郡國志費縣有密如亭康成石室在費縣西南八十里南成山寰宇記後漢書鄭康成遭黄巾之亂客于徐州鄭氏孝經序云僕避難于南成山栖遲巖石之下念昔先人餘暇述夫子之志而註孝經今西上可二里許有石室周迴五丈世云康成註孝經于此香林館在蘭山縣東又有雨聲軒在東湖岸縣志皆金太守張汝芳建澹臺故居在費縣西南九十里關陽鎭澹臺滅明世居于此有澹臺橋老萊故居在費縣西北八十里􅀩山下皇甫諡高士傳老萊子隱居􅀩山之陽著書十五篇于公宅在郯城縣西十里漢于公為獄吏嘗自言曰吾治獄多陰徳後世必有興者令高大其門可容駟馬車今其地名高大社乾隆二十七年三十年宗純皇帝南巡江浙俱有題于公宅高御製詩王導故宅元和志在臨沂縣東南三十八里宋刻漏碑在蘭山縣内元祐六年立醉翁亭碑在費縣廳左宋蘇舜欽為費宰與歐陽修同時為刻此碑並往復手帖響石在􅀩陰縣中山社舊志其石甚巨空透玲瓏擊之聲韻清越宋乾興時詔搆亭其上有眞宗御製碑關隘紫金關在􅀩陰縣東南􅀩山接費縣界元時設巡司明萬厯間裁九女關在􅀩陰縣南三十里南北要路又有白馬關在縣西南三十五里青駝寺巡司在蘭山縣北九十里關陽鎭巡司在費縣西南八十里平邑寨巡司在費縣西北九十里十字路巡司在莒州南一百餘里齊乘謂即古高鄉城石埠集巡司在莒州西北八十里垜莊驛巡司在沂水縣西南百五十里本朝康熙二年置驛丞乾隆十四年改設巡司安東衞巡司在日照縣南九十里本朝乾隆八年移夾倉鎭巡司駐此長任鎭在蘭山縣南三十里金史地理志臨沂有長任向城利城三鎭羅滕鎭在蘭山縣西南九十里舊置巡司今裁磨山鎭在郯城縣西北七十里舊置巡司今裁大興鎭在郯城縣東北九十里舊置沂郯海贛同知本朝乾隆三十八年改設通判駐此毛陽鎭在費縣西北百里舊置巡司今裁夾倉鎭在日照縣東南二十五里有石城明洪武初置巡司今裁濤落鎭在日照縣東南四十里漢書地理志海曲縣有鹽官金史地理志日照縣有濤落鎭舊志明設鹽課司于此張洛營在日照縣南六十里相近有新安營又有石河營湖水營俱在縣東北三十里龍汪營在縣東北五十里皆防海口今廢黑龍寨在􅀩陰縣東北五十五里其東南有楊家寨筲箕寨傅家寨西南有搜虎寨西北有青崖寨北有五子寨樹枝寨東北有匙尾寨磨崮寨太平頂寨蘆崮寨大崮寨版崮寨皆􅀩陰諸山分支石臼寨在日照縣東海邊舊有石臼島故名宋乾道初李寶放舟石臼島與金兵隔一山時北風甚盛寶禱于石臼神俄有風從柁樓中来如鐘鐸聲衆志咸奮風駛舟疾遂有陳家島之捷明初置石臼寨備禦千户所在縣東二十里舊有石城周三里有奇久廢巨峯寨在日照縣西南六十里明嘉靖十三年建蘭陵集在蘭山縣西南一百三十里本朝乾隆六十年移縣丞駐此葛溝店在莒州西南百二十里接沂水縣界舊置巡司本朝康熙十六年裁東里店在沂水縣本朝移縣丞駐此李家莊驛在蘭山縣東南四十里與徐公店紅花埠垜莊並爲南北孔道本朝康熙十三年設舊有驛丞乾隆十四年裁徐公店驛在蘭山縣北七十里本朝康熙二年始置于縣北九十里青駝寺十二年移此舊有驛丞乾隆十四年裁紅花埠驛在郯城縣南四十里本朝康熙二年置驛丞舊有道平解村二驛皆裁津梁駕虹橋在府城普照寺前傾葢橋在郯城縣北十里跨伍湖水傾葢亭舊建于此仁政橋在費縣東二十里跨朱龍河五橫橋在莒州西十里龍石橋在莒州北一里舊患山水漫流明成化間始濬溝水成橋名義橋在􅀩陰縣東十八里通濟橋在􅀩陰縣東四十里水恩橋在􅀩陰縣北三十里亦名高都橋望仙橋在沂水縣南五十里曲橋在沂水縣南七十五里河陽白龍橋在沂水縣南一百里高橋在沂水縣北五十里永固橋在日照縣西跨固河柰子溝橋在日照縣西十五里陵墓周季文子墓在蘭山縣西南神峯山下荀卿墓在蘭山縣西南郯子墓在郯城縣南十里司馬牛墓在費縣南城山曾晳墓在費縣西南八十里南城山下王充論衡所謂南城之冢也莒子墓在莒州西北浮來山下孟母墓在沂水縣東北六十里有祠漢蕭望之墓在蘭山縣西南百三十里孝婦墓在郯城縣東十里許即漢宣帝時東海孝婦也于定國墓在郯城縣西南二里許郭巨墓在􅀩陰縣東北乾山之陽曹嵩墓嵩操之父寰宇記在沂水縣南百二十五里晉琅邪王墓晉宣帝子名佃在蘭山縣東二里王祥墓在蘭山縣北二十五里有孝友祠祀祥及弟覽金張莘卿墓在日照縣南劉家寨明王璟墓在蘭山縣東南三里祠廟宗聖祠在蘭山縣南五里祀曾子及其子元申孫西門人公明儀等又費縣西南境亦有宗聖曾子祠五賢祠在蘭山縣南五里府志舊名景賢祠祀漢諸葛亮晉王祥王覽唐顏杲卿顔眞卿明嘉靖三十年建本朝乾隆十六年高宗純皇帝南巡江浙經過山東易為五賢祠有御製五賢祠詩諸葛武侯祠在蘭山縣東北諸葛城王右軍祠在蘭山縣羲之故宅問官祠在郯城縣北世傳即孔子問官郯子之地本朝康熙七年修蒼山神祠在費縣南宋元豐二年封豐德侯賜額曰靈臺子游祠在費縣西南即古武城地相近又有澹臺子祠􅀩山神祠在費縣西北􅀩山之陽宋政和五年封昭濟惠民王馬鬐山神祠在莒州南馬鬐山齊乗宋宣和四年賜額曰惠感樊噲廟在蘭山縣東五十里故城北樊母村顔魯公廟在費縣東一里祊河上縣志祀唐顔眞卿祠舊在縣東五十里諸滿村宋元祐六年改建於此有宋曹輔碑記城陽景王廟在莒州城内風俗通城陽景王章以誅諸吕功封自琅邪青州六郡皆為立祠轉相誑耀言有神明其遣問禍福立應惟樂安太傅陳蕃濟南相曹操一切禁絕肅然政清後漢書劉盆子傳軍中嘗有齊巫歌舞祀城陽景王顓臾廟在􅀩陰縣西南五十里寺觀普照寺在蘭山縣王羲之故宅也府志晉元帝渡江捨為梵宫唐時賜額曰開元金改今名中有羲之曝書堂澤筆池聖祖仁皇帝南巡經此本朝康熙間御製洗硯池贊并序定林寺在莒州西浮來山舊志即梁劉勰校釋經隋曇觀送舍利之地有古木傳是春秋時所植大數十圍高數仭清陰竟畝夏月忘暑南竺夀寺在􅀩陰縣南三里縣志寺有銀杏唐時植幹圍數丈䕃可一畝聖景寺在􅀩陰縣西北三十里堂阜社省志即宋僧普和伏蟒處一名老僧堂大善寺在沂水縣西南一百四十里寺内有卧佛長亘殿三楹玉虛觀在郯縣東北蒼山之陽縣志相傳為安期生修煉處聖臨院在費縣西省志本名崇興寺本朝康熙二十三年聖祖仁皇帝東巡駐蹕於此改今名塔河院在費縣西縣志唐時建玉虛宫在費縣西北龜山下省志唐仙翁賈文所建院有古松高五丈枝幹盤旋世傳文所手植有神松之目提調官前總纂臣鄭紹謙恭纂并覆輯校對官臣楊汝綬恭校
