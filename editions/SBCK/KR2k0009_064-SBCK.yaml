body:
  text: 武定府在山東省治東北二百里東西距二百八十里南北距二百七十里東至青州府樂安縣界一百四十里西至濟南府德平縣界一百四十里南至濟南府齊東縣界八十里北至海一百九十里東南至青州府博興縣界一百五十里西南至濟南府臨邑縣界一百六十里東北至海二百十里西北至直隸天津府南皮縣界一百四十里自府治至京師七百里分野天文虛危分野元枵之次建置沿革禹貢兗州之域春秋戰國齊地漢為平原渤海千乘三郡地建安末分置樂陵郡治樂陵縣晉為樂陵國治厭次宋亦曰樂陵郡還治樂陵後魏因之隋開皇六年分置棣州治陽信大業二年改滄州三年為渤海郡唐武德四年復置棣州六年廢貞觀十七年復置棣州初治樂陵尋治厭次天寶元年改樂安郡乾元元年復曰棣州屬河南道宋亦曰棣州樂安郡屬河北東路金曰棣州屬山東東路元中統三年置濱棣路至元二年罷以州屬濟南路明洪武六年改曰樂安州宣德元年平漢王高煦又改曰武定州屬濟南府本朝雍正二年升為直隸州十二年又升為府屬山東省領州一縣九惠民縣附郭東西距九十里南北距九十五里東至濱州界五十里西至濟南府德平縣界四十里南至濟南府齊東縣界九十里北至陽信縣界五里東南至蒲臺縣界一百二十里西南至商河縣界三十五里東北至霑化縣治七十里西北至樂陵縣治九十里秦置厭次縣漢改富平侯國屬平原郡後漢永平五年復曰厭次晉徙爲樂陵國治齊廢隋復置屬渤海郡唐武德四年屬棣州八年州廢屬滄州貞觀元年屬德州十七年爲棣州治天寶元年爲樂安郡治五代爲棣州治宋大中祥符八年移治八方寺金元因之明洪武元年省入州本朝初因之雍正十二年升武定爲府設惠民縣爲府治青城縣在府東南六十里東西距二十八里南北距三十里東至青州府高苑縣界二十里西至濟南府齊東縣界八里南至濟南府鄒平縣界十二里北至惠民縣界十八里東南至濟南府長山縣治九十里西南至濟南府章邱縣治一百里東北至濱州治九十里西北至惠民縣治九十里漢置東鄒縣屬千乘郡後漢省晉復置鄒縣屬樂安國宋省後魏爲臨濟縣地唐宋爲青城鎮元太宗七年置青城縣屬濟南路中統中改屬陵州至元二年又屬河間路明洪武二年省入鄒平齊東二縣十四年復置屬濟南府本朝初因之雍正十二年改屬武定府陽信縣在府東四十里東西距九十里南北距五十里東至霑化縣界三十五里西至濟南府德平縣界五十五里南至惠民縣界三十五里北至海豐縣界十五里東南至濱州界四十里西南至商河縣界六十里東北至海豐縣界十五里西北至樂陵縣界五十里漢置陽信縣在今海豐縣界晉移厭次縣於此為樂陵國治宋後魏因之北齊廢厭次改置陽信縣隋開皇六年於縣置棣州大業二年改曰滄州三年改為渤海郡唐武德四年復置棣州尋廢還屬滄州貞觀十七年改置棣州於厭次以陽信為屬縣宋大中祥符八年移今治金元因之明屬濟南府本朝初因之雍正二年分屬武定州十二年屬武定府海豐縣在府東北六十里東西距三十八里南北距一百五十五里東至霑化縣界二十五里西至直隸天津府慶雲縣界十三里南至陽信縣界五里北至大沽河海口一百五十里東南至陽信縣界八里西南至樂陵縣治七十里東北至霑化縣界九十里西北至天津府鹽山縣界九十里漢置陽信縣屬渤海郡後漢初省延光元年復置晉改屬樂陵國後魏屬樂陵郡北齊徙廢隋置無棣縣唐因之五代周顯德五年分縣南置保順軍宋治平中又移無棣縣治保順軍仍屬滄州元初割縣之半屬棣州曰東無棣縣明永樂初改曰海豐屬濟南府武定州本朝初因之雍正十二年改屬武定府樂陵縣在府西北九十里東西距七十五里南北距八十五里東至陽信縣界三十五里西至直隸河間府寕津縣界四十里南至商河縣界七十里北至直隸天津府鹽山縣界二十五里東南至惠民縣界四十里西南至濟南府德平縣治八十里東北至直隸天津府慶雲縣界二十五里西北至直隸天津府南皮縣界五十里漢置樂陵縣屬平原郡為都尉治後漢建安末為樂陵郡治晉初徙郡於厭次以樂陵為屬縣宋還為樂陵郡治後魏因之隋開皇初郡廢屬渤海郡唐武德四年屬棣州六年屬滄州宋金元皆因之明洪武初改屬樂安州後屬濟南府武定州本朝初因之雍正十二年改屬武定府商河縣在府西南至元二年省屬濟南路明洪武初省渤海縣入州屬濟南府本朝雍正二年升為直隸州十二年改屬武定府利津縣在府東一百五十里東西距六十里南北距一百三十里東至青州府樂安縣界四十里西至濱州界二十里南至蒲臺縣界十里北至海一百二十里東南至青州府博興縣界三十里西南至蒲臺縣界二十五里東北至海一百二十里西北至霑化縣界三十里漢千乘郡濕沃縣地隋渤海郡蒲臺縣地唐棣州渤海蒲臺二縣地宋屬濱州金明昌三年升永利鎮為縣屬濱州元屬濟南路明屬濱州隸濟南府本朝雍正十二年改屬武定府霑化縣在府東北七十里東西距九十五里南北距四十五里東至利津縣界八十里西至陽信縣界十五里南至濱州界三十里北至海豐縣界十五里東南至濱州界三十五里西南至惠民縣界六十里東北至海一百四十里西北至海豐縣界二十五里漢千乘郡濕沃縣地隋渤海郡蒲臺縣地宋慶厯三年升招安鎮為縣熙寕六年省入渤海元豐二年復置屬濱州金明昌六年改曰霑化元屬濟南路明屬濱州隸濟南府本朝雍正十二年改屬武定府蒲臺縣在府東一百二十里東西距七十里南北距三十七里東至青州府樂安縣界六十里西至濱州界十里南至青州府高范縣界三十五里北至濱