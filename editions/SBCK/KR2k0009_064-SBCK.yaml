頫所書碑記額曰資福禪寺大覺寺在海豐縣東南府志舊名普照明洪武初改中有古塔十三級唐貞觀中建本朝乾隆二十二年修鎮海寺在海豐縣之黎敬莊府志明宏治三年建掘地得白石佛二有東魏武定四年字蓋古刹也普靜寺在蒲臺縣東南三十里府志唐廣德二年建福田寺在蒲臺縣南二十里舊志縣南福田寺東南迎仙觀皆唐宋時建有古碑三教寺在蒲臺縣西南府志明洪武十五年建相傳為辟攴佛道場高尚觀在濱州西南五十里府志宋時建名宦漢龔遂山陽南平陽人宣帝時渤海太守時􅀊饑盜起遂至勅屬縣悉罷捕盜吏單車至府郡中翕然盜賊皆罷齊俗奢侈不田作遂躬率儉約勸務農桑吏民富實獄訟止息數年徴拜水衡都尉許商成帝時為河隄都尉縣南河水泛溢為害商鑿河注於海故名商河周盤安成人和帝初遷重合令有惠政晉劉亮懐愍時渤海太守以王浚謀將僭號亮諫不從遇害南北朝魏蘇淑武邑人熙平中除樂陵内史在郡二年謝病乞解民吏老幼訴留者甚衆淑清心愛下當時稱為良二千石北齊房豹清河人樂陵太守哀矜貧弱囹圄空虛郡瀕海水味多鹹苦豹命鑿一井遂得甘泉遐通以為政化所致豹罷歸後井味復鹹隋裴藴聞喜人高祖時棣州刺史有能名考績連最唐員半千全節人武后時詔擇牧守除棣州刺史曹華楚邱人憲宗時吳元濟平進棣州刺史州與鄆比時賊據滳河華逐賊斬二千級復其縣又募羣盗可用者貸死補屯卒使據孔道賊至輒擊卻之不敢北欒􅄥文宗時棣州刺史李同捷叛濛密上變事洩為所害邵播昭宗時棣州刺史朱全忠陷棣州播不屈死之五代梁華温琪下邑人為棣州刺史棣州苦河水為患温琪徙於新州以避之民賴其利張錫閩縣人梁末為棣州判官棣為鄆屬郡郡有麴務鄆以牙將主之頗横恣嘗盜麥造麴亊覺悉置於法宋何繼筠河南人太祖時命繼筠領棣州以拒北敵多致克捷周渭恭城人開寶初知棣州監軍傅延翰謀作亂渭擒之在郡以簡肅稱及還吏民遮道泣留詔賜錢七萬路振祁陽人太宗時知濵州遼兵至城下衆謂振文吏無戰禦方畧環聚而泣振乃親加撫諭堅壁自守遼人遂引去吕夷簡夀州人祥符中知濱州代還奏農器有算非所以􅂆立本也由是天下農器皆弗算孫沖平棘人祥符中河決棣州宼準請徙州治隄命沖往按視還言不若塞河為便遂以沖知棣州自秋至春凡四決沖皆塞之及準為樞密使卒徙州陽信沖復上疏言徙州非便著河書以獻張洞祥符人仁宗時知棣州河北地當六塔之衝者􅀊決溢病民田水退强者冒占弱者耕居無所洞奏一切官為標給蠲其租以綏新集河北東路民富蠶桑遼人謂之綾絹州周沆益都人仁宗時知渤海縣􅀊滿縣人請留既報可沆以親老求監州税高若訥榆次人仁宗時知商河縣時有職分田牛與種皆假於民若訥獨廢不耕李迨東平人神宗時調渤海縣尉時州縣團練鄉兵民起田畞中不閑坐作進退之節或譁不受令迨立賞罰以整齊之累月皆精練部伍如法刺史薦之朝累遷通判濟州金巴達喇木布奚五王族人太宗時為濱州刺史廉入優等喇木布凡調官行李止車一乘婢奴數人而已巴達喇木布舊作伯德特离補今改正楊伯仁稾城人世宗時除濱州刺史郡俗有遣奴出亡捕之以規賞者伯仁至責其主而杖殺其奴如是者數輩其弊遂止完顏永元宗室子世宗時為棣州防禦使泰寕軍節度使張宏信通檢山東專以多得民間物力為功督責苛急永元面責之宏信無以對於是棣州賦税得以實自占劉仲誨宛平人世宗時為棣州防禦使厭次縣捕得盜數十人詣州希賞仲誨疑其有􅁈緩其獄同僚請悉寘之法仲誨乃擇其老穉者先釋之未幾􅀗真盜元姜彧萊陽人中統時知濱州時行營軍士多占民田為牧地縱牛馬壞民禾稼桑棗彧言於中書遣官分畫疆畔捕强猾者寘之法乃課民種桑徧野人名為太守桑明周原繁昌人洪武中知蒲臺縣有商被盜疑其主人已誣服原緩其獄而察之果得真盜飛蝗入境禱於神一日大風􅀨蝗盡死杜􅇴洪武中為霑化典史廉幹得民坐事當徙民詣闕稱其賢帝歎曰小吏耳而得民如此良吏也還之白旼保定人永樂中為陽信丞莅官五年治稱第一秩滿邑民八千餘人詣闕請為令許之旼益厲風節􅂆農桑戒游惰九年之内增四千一百户何淡廣東順德人天順中知濱州有善政尋以憂去士民醵錢二十萬為賻淡固卻之朱大用句容人宏治中知青城縣值􅀊饑請發粟賑給全活者衆秩滿復留三載飛蝗四起獨不入境許逵固始人正德中知樂陵縣時土宼劉七等方熾逵慨然為戰守計賊至設伏斬􅀗無遺事聞超擢兵備僉事駐武定至則築城鑿池設樓櫓置巡卒賊數犯數卻之威名大著唐侃丹徒人正德中知武定州會清軍籍應發遣者至萬二千人侃曰武定户口三萬是空半州也力爭之章聖梓宫道山東内奄宣言所過州縣供張不辦者死侃置空棺傍舍中俟諸奄索錢急則指棺示之曰吾辦一死錢不可得也諸奄皆愕眙去李應奎白水人嘉靖中知陽信縣值􅀊祲應奎上書為民請貸上曰斗米三錢貸未晚也應奎大哭曰斗米三錢邑無民矣何以貸為上鑒其誠詔發一萬石賑濟民賴以生楊于陛劍州人崇禎中厯官武定州同知創書屋於署左召士子肄業其中普名聲反以監紀軍事進討兵敗被執死之贈太僕少卿本朝孟化龍渭南人順治初知武定州涖任日檄發軍餉甚急化龍曰民貧如此尚堪科斂耶入郡涕泣以陳格於令不得行返次濟陽深夜自經訃至民皆感泣立祠南門祀之劉儀恕涇縣人順治十三年知武定州革除里中買喂驛馬並錢糧添料解費等項積困大蘇董鼐奉天人康熙二十四年知武定州除里長之役又詳請臨米改折銀兩及德米就近兌給兵糧民累永除而軍亦稱便喬壯受猗氏人順治初年知陽信縣善讞獄訟無淹久康熙三十四年公舉入名宦祠杜鎮南宫人康熙初知陽信縣清厯年積久一十四萬有奇在民者援赦豁免在官者解囊賠補民甚德之杜良祚順治四年知海豐縣時鄰邑多宼儆良祚築城簡閲民兵得健卒五百餘人分為三隊日訓練激勸之賊至開城設伏擒其巨魁明年賊攻慶雲縣甚急良祚率兩隊往援之賊驚遯慶雲令率民奉牛酒犒師良祚曰吾未奉檄而來可攘君保障功耶卒不受人物漢東方朔厭次人武帝初朔上書高自稱譽上偉之令為常侍郎上欲為上林苑朔進諫迺拜朔為大中大夫給事中復為中郎上置酒宣室使謁者引内董偃朔不可詔止之朔雖詼笑然時觀察顏色直言切諫上常用之久之上書陳農戰彊國之計不見用因著論設客難已又設非有先生之論朔之文辭此二篇最善晉石鑒厭次人出自寒素雅志公亮累官司空武帝崩有告汝南王亮欲舉兵討楊駿駿白太后詔令鑒率兵討亮鑒以為不然遣人密覘視亮已别道還許昌於是駿止元康初為太尉年八十餘克壯慷慨自遇若少年時人美之唐任敬臣棣州人五􅀊喪母哀毁天至問父英曰若何可以報母英曰揚名顯親可也乃刻意從學刺史欲舉秀才自以學未廣遯去又三年卒業舉孝廉授著作局正字遷秘書郎虞世南器其人􅀊終書上考固辭召為宏文館學士終太子舍人高適渤海人舉有道科中第哥舒翰表為書記拜監察御史元宗西幸間道走及擢諫議大夫􅀒氣敢言權近側目肅宗召與計事除淮南節度使累封渤海縣侯適尚節義語王霸衮衮不厭政寛簡所涖人便之年五十始為詩即工每一篇己好事者輒傳布高沐渤海人貞元中進士李師道辟署判官師道叛沐引古今成敗前後諫說不能入上書天子師道怒殺沐元和中贈吏部尚書高元裕渤海人敬宗視朝不時宦豎恣放元裕為右補闕切諫李宗閔高其節擢諫議大夫進中書舍人鄭注入翰林元裕當書命乃言以醫術侍注愧憾貶閬州注死累進御史中丞終吏部尚書五代梁李愚無棣人梁末帝時拜崇政院直學士衡王友諒末帝兄也大臣皆拜之獨愚長揖末帝以責愚愚曰臣於王無所私豈宜妄有所屈唐馬允孫商河人舉進士潞王從珂以為觀察判官潞王將舉兵反召允孫告之曰受命移鎮何向為便允孫曰大王為國宗族先帝新棄天下臨喪赴鎮臣子之忠也左右笑其愚然從珂心獨重之宋張令鐸厭次人少以勇力隸軍伍累官鎮寕軍節度令鐸性仁恕嘗語人曰我從軍三十年大小四十餘戰多摧堅陷敵未嘗妄殺一人及卒人多惜之劉蟠渤海人漢乾祐中舉進士累遷倉部員外郎改轉運使􅀊漕江東米四百萬斛以給京師頗為稱職厯官左諫議大夫卒蟠性清介寡合能攻苦食淡張凝無棣人少有武勇倜儻自任太宗聞其名以隸親衞即位補殿前指揮使咸平初遼兵南侵凝挺身陷陣凝子昭遠年十六單騎疾呼入陣中掖凝出左右披靡不敢動時斥堠數擾轉運使俱飛輓不給凝曰今當深入因敵資糧不足慮也乃率兵入敵境斬􅀗無算邊境􅀗安凝忠勇好功名前後賞賜多以犒師家無餘資卒贈彰德軍節度胡旦渤海人博學能文辭太宗時舉進士第一累遷右拾遺直史館數上書言時政利弊厯官秘書監旦喜讀書既喪明猶令人誦經史隱几聽之不少輟著書三百餘卷張安上棣州人慶厯中登進士第通判恩州屬邑送囚至十九人皆重辟安上惻然曰此非死獄也竟減釋之判乾寕軍築凔州河隄數十里自是州無水患八子皆貴顯能守世德時人方之高陽里劉蒙渤海人恥為詞賦不肯舉進士習茂才異等又不欲自售都轉運使劉庠舉遺逸召試第一知潮陽縣常平使者召㑹諸縣令議免役法􅀩以為不便不肯與議退而條上其害即投劾去歸家教授從遊甚衆號正思先生李之純無棣人登進士第熙寕中累官成都路轉運使成都􅀊發官米六千石損直與民言者謂惠民損上詔下其議之純曰蜀郡人恃此為生奈何奪之事遂已元祐初遷御史中丞董敦逸黃􅂟基論蘇軾蘇轍皆以監司罷之純疏其誣罔乃更黜之紹聖中出知單州卒趙伯深居棣州金人渡河母子相失伯深訪尋其母二十餘年一旦聞在瀘南徒步入蜀間關累年乃得其母曾慥賦詩以美其孝金董積躬青城人性敏嗜學舉天徳進士厯縣簿令政平訟理知海州盗不敢入境㝷規措京兆府三白渠事皆以利民為己任劉瑜棣州人家貧甚母喪不能具葬乃質其子以給喪事明昌三年詔賜粟帛復終其身富察琦陽信人世襲穆琨正大中秦藍總帥府辟琦為安平都尉葉合哈坦下都統兼知事小關破事勢已迫哈坦令避矢石琦不去曰業已從公死生當共之尚安所避耶崔立變後令改易巾髻琦曰琦一刑部譯吏襲世爵安忍作此既至家意在懸梁家人泣勸母曰勿勸兒所處是矣即自縊琦性沉靜好讀書知古今事其母完顏氏以孝謹稱富察舊作蒲察穆琨舊作謀克葉合哈坦舊作黏葛合典今俱改正焦榮青城人淹貫經史尹武康如臯復守太和厯知松江府均有善政元學士趙孟頫志其墓宋益齋青城人隱居授徒行誼高潔為鄉黨所欽年九十餘卒王朴題其墓元焦瑾青城人中統間李璮反分兵宼青城城且破瑾縋下紿賊以金帛牛酒請緩攻賊少卻翼日援軍至賊走城賴以全子文炳母劉氏病且死文炳以刀破脅抉其肝割一臠詭為藥以進母大汗而甦齊秉節蒲臺人父珪以戰功厯官􅄣管鎮棗陽秉節魁偉沈毅涉獵書史稍知兵法襲父爵仍鎮棗陽至元中從伐宋數著戰功累官廣威將軍棗陽萬户府副萬户韓榮陽信人倜儻自􅀒家業豐而能散人樂為之用以濱棣軍馬隸史丞相麾下屢有戰功授濱棣路元帥值􅀊荒二州民多流竄榮減去逋賦三千七百餘兩更出粟六萬斛以賑之張琪無棣人韓榮牧棣州以琪知縣事數年縣以殷富遷濱棣叅議時濟南流民二州為多兵定民往往潛歸鄉里户多缺額琪請牒河南減􅀊額三十七百諸郡皆頌其賢任素合渤海人幼事父母以孝稱性倜儻峭直有古俠士風而家居恂恂儒者不能過初襲父官為右衞千户英宗召見與語奇之由是出入禁闥待以心腹英宗遇弑遂引去居常扼腕或醉歸慟􅂘過市時人目以為狂莫知其意也後密謀遣迎文宗即位論功行賞擢禮部尚書居官恂恂無幾微白伐之意人或詢以翊戴之事終無所言任素合舊作任速哥今改正楊乘渤海人至正初為介休縣尹民饑散為盜乘立法招之皆棄兵頓首願為良民累官江浙行省左右司員外郎免官寓居松江張士誠遣張經招乘乘讓經曰平日讀書云河經不能對促行愈急乘乃整衣冠自縊死王巴顏霑化人至正中知福寕州福建轉運副使仍領州事賊偪福寕巴顏募兵扼險與子相馳破之馬仆見執賊帥王善曰聞公有惠政為我尹此州可乎巴顏唾罵弗屈延頸受刃頸斷涌白液如乳暴屍數日色不變相與妻潘氏及二女俱罵賊同死巴顏既死賊時覩其引兵出入事聞追封大原郡侯巴顔舊作伯顔今改正明李益利津人洪武初由太學生擢户部主事居官清謹數年衣不再更會聖誕節詔百官俱服錦繡進賀益借千户服色上見詰其故益以實對上命搜其家止得俸米數升於皁靴中太祖為嗟歎良久後官至山西布政使左叅議成嚴樂安人永樂中授監察御史彈劾不避權貴上常諭貴戚曰爾輩犯罪朕或容之成回子不汝貸也以嚴多􅂡大鼻故云既而巡按河南僚友望風股栗召還卒孟善海豐人以驍勇知名永樂初攻九門破松亭關敗盛庸兵於保定收官兵一萬三千人累封保定侯李濬樂安人永樂初擢監察御史以父艱回籍值漢王高煦謀逆濬潛詣京奏聞請上親征由是四晝夜六軍駐樂安之北高煦倉卒不及為謀開門就縛濬之力也累官左副都御史王佐海豐人永樂中領鄉薦擢吏科給事中累官户部尚書佐器宇洪偉德量寛平士林重之正統時扈駕北征没於王事初至土木佐竟日跪於草中諫上回鑾為王振所窘卒及於難景秦元年贈少保諡忠簡韓相青城人成化中知鄢陵縣以廉潔稱子齊正德中知澄城縣賊李德達宼城下齊悉力拒之論功當擢以憂歸孫一右嘉靖中累遷南京監察御史時嚴嵩柄政一右抗章劾之厯官四川按察使副使丁珝海豐人成化進士授户部主事累遷雲南副使正德時劉瑾用事欲結好珝堅不許瑾怒矯㫖逮詔獄瑾誅未見用而卒盧亨商河人成化進士擢兵科給事中累官太常寺卿亨性醇厚未嘗與人相忤居諫垣十餘年多所建白劉瑾用事欲亨往見以美官啖之亨不屈致仕歸艾洪濱州人宏治進士擢兵科給事中隨事論諫多所匡正後忤劉瑾削籍歸尋起官福建左叅政毛思義陽信人宏治進士厯官永平府鎮守薊州武宗時中官郭原以科斂虐民為思義所抑銜之譖之於帝下詔獄謫官嘉靖中累遷副都御史巡撫應天諸府以冶辦聞初貞濱州人父雄為流賊所執貞持刀奮前大呼以身蔽翼其父賊砍貞右手落二指貞抱如故賊義而釋之濡其血書孝弟二字於垣而去詔旌其閭齊􅀖典濱州人父通判鎮江流宼至太守檄住剿賊時􅀖典年十八父病請從行即代父率兵禦賊於江兵潰􅀖典獨奮身力戰殁於陣孫孟和商河人正德進士累官山西巡按時流賊四掠孟和累有戰功武宗崩疏劾内監張永及安邊伯朱泰等中外憚之袁化中武定州人萬厯進士天啓初擢御史疏陳時事可憂者八語皆剴切楊漣劾魏忠賢化中繼疏極論且發崔呈秀贓私為璫所陷與漣俱死獄中崇禎初贈太僕卿謚忠正張潑樂陵人萬厯進士累遷御史光宗崩李選侍居乾清宫潑與楊漣上疏力爭上納之後掌河南道疏觸魏閹竟坐為袁化中死黨削官崇禎中起河南巡撫本朝李道昌海豐人順治丙戌進士厯官監察御史大理寺卿道昌係遺腹子五六􅀊時嘗以父容問母母指示形狀遂屢夢見其父即追繪之竟得其形似巡按河南當流宼殘害道昌殫心􅁹撫流亡賴以復業卒祀鄉賢祠李之芳惠民人順治丁亥進士除金華府推官由刑部即改御史所至以精敏稱在臺十四年超擢左副都御史旋􅄣督浙江軍務閩逆耿精忠反以衢居浙上游為江淮屏障即日自杭移駐於衢耿逆以甘言相誘之芳斬使焚書誓師出戰親冒矢石或勸宜持重答曰吾若貪生誰不惜死及温台從逆沿海告警賊將盤踞仙霞之西以通江右卒不得沿流窺浙皆之芳力也自身在行間凡九年乃凱還入杭擢兵部尚書轉吏部拜文華殿大學士卒諡文襄李之莊之芳弟􅀊貢生從之芳督兵勦逆頗多贊助居鄉設義學敎育單寒值􅀊饑設粥以食餓者全活無算境東南徒駭河衝決倡築隄岸以禦水患民多賴之杜漺濱州人順治丁亥進士初除正定府推官隨􅄣督張存仁平榆園賊所俘􅀗咸就訊於漺漺錄渠魁釋脅從凡活數百餘人擢禮科給事中抗疏言黃河潰決由濱入海淹没民田皆由河員防治不力請遣大臣行河尋轉河南驛傳鹽法道竭蹷供職事無巨細必躬必親後以疾篤乞歸卒祀鄉賢祠王政陽信人順治己亥進士知唐縣濱河地畞沙水沖壓政親為檢勘力請豁免又請免每􅀊狐皮解費散遞馬於衝要之邑以蘇里社喂養之累唐人德之劉新國陽信人由􅀊貢知鎮安縣鬻產自給無錙銖累民招集流亡次第復業有盜嘯聚山林單騎諭之悉投戈迎降杜履端海豐人拔貢生初授陜西綏德知州值旱蝗立爲撲捕且捐俸賑粥申請免糧闔州賴以全活升正定府同知致仕卒入祀鄉賢祠李復興濱州人康熙丙午舉人知華亭縣時民苦里役逃亡相繼復興立均田均役法一切年首甲首不便於民者悉罷之流亡以次復業部民感德建祠白龍潭祀之吳汝亮霑化人由舉人授江南江寕縣時邑漕一石