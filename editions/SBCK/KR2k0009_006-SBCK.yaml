也城䧟一門殱焉宋楊重進太原人太平興國中爲高陽關都部署遼兵至力戰殁於陣李繼宣浚儀人雍熙中爲高陽關行營都監端拱初遼騎至瀛鎮繼宣率步騎萬人入敵境焚聚落遼兵引還於易州至高陽為望櫓七所舉烽以候警淳化三年徙知保州築關城浚外濠葺營舍千五百處造船百艘入雞距泉以運糧人咸便之張昭允衞州人端拱初為雄州監軍遼騎乗秋掠境上昭允襲擊卻之劉福下邳人端拱二年為雄州防禦使兼本州兵馬部署雄州地控邊塞常屯重兵福至部按行城壘調鎮兵以給繕完出私錢以資宴犒領雄州五年郡境安謐安守忠晉陽人淳化二年知雄州方與僚佐宴飲有軍校謀變擐甲及閽閽者倉卒入白守忠言笑自􅀂徐顧左右曰此輩酒狂耳擒之可也人服其量楊嗣瀛州人淳化二年知保州門無私謁轉運使言其治狀遷威虜軍再知保州有戰功嗣與楊延昭久居北邊俱以善戰聞時謂之二楊楊延昭太原人為保州緣邊都巡檢使咸平二年遼兵南侵延昭在遂城城小無備遼兵圍之數日衆心危懼延昭集丁壯登陴䕶守會天寒汲水灌城上旦悉為水堅滑不可上遼軍遂清去景德中徙高陽關副都部署卒延昭智勇善戰所得俸賜悉犒軍未嘗問家事號令嚴明與士卒同甘苦遇戰必身先行陣克捷推功於下故人樂為用在邊防二十餘年遼人憚之張凝無棣人淳化中累遷高陽關行營鈐轄六宅使咸平初遼人南侵凝據要害斷其歸路縱兵擊之盡奪所掠景徳初為保州駐泊兼北面安撫使善訓士卒繕完器仗前後賞賜多以犒師家無餘貲何承矩河南人淳化中知雄州因積潦蓄為陂塘大作稻田以足民食邊民有告機事者屏左右與之接款故遼人動息皆能前知至道元年遼以精騎數千夜襲城下承矩整兵出拒斬􅀗甚衆真宗嗣住復遣知雄州嘗詔聽邊民越拒馬河塞北市承矩疏其非便即停前詔咸平三年拜引進使州民詣闕乞留詔書嘉奬復遣之景德二年復知雄州遼遣使奉幣承矩以朝廷待邊人之禮悠久可行者悉疏以聞手詔嘉納李允則并州孟人真宗時知雄州河北既罷兵允則治城壘不輟遼主曰南朝尚修城備得毋違誓約乎有詔詰之允則奏曰初通好不即完治恐他日頽圯因此廢守邊患不可測也帝以為然允則善撫士卒皆得其用盜發輒􅀗人亦莫知所由身無兼衣食無兼味不蓄貲財在河北二十餘年事功最多王能定陶人咸平􅀄知静戎軍建議決鮑河斷長城口北注雄州塘水爲戎馬限方舟通漕以實塞下又開方田盡靜戎順安之境北邊來寇能擊走之耿全斌信都人真宗時知安肅軍嘗繪其山川險易爲圖以獻遼兵來侵自山北抵河滸斌遣子從政焚橋砦分率精兵擊走之康保裔洛陽人真宗時爲高陽關都部署遼軍大入諸將與戰於河閒保裔選精鋭赴之遼圍之數重左右勸易甲馳突以出保裔曰臨難母茍免決戰二日殺傷甚衆兵盡矢絶援不至遂沒焉李重貴河陽人真宗時爲高陽關行營副都部署康保裔爲敵所覆重貴與鈐轄張凝赴援腹背受敵自申至寅力戰敵乃退時諸將頗失部分獨重貴凝全軍還屯凝議上將士功狀重貴喟然曰大將陷沒而吾曹計功何面目也帝聞嘉之閻承翰景德中爲北面都鈐轄自嘉山東引唐河三十二里至定州釃而爲渠直蒲陰縣東六十二里會沙河徑邊吳泊遂入於界河以達方舟之漕又引保州趙彬堰徐河水建䇿增開七郡塘水詔通判集議田曰此非禦敵策也壞良田浸冢墓民被其害因疏奏極論王果饒陽人爲高陽關路兵馬鈐轄中官楊懷敏領沿邊屯田事大廣塘水邊臣莫敢言果獨抗辯謂水浸良田無益邊備懷敏怒訴果不法左遷青州兵馬都監田敏易州人爲北平砦兵馬鈐轄先是兩地供輸民多爲遼嚮導敏自魚臺此悉驅南徙凡七百餘户送定州遷總管遼入寇敏敗之於楊村又夜襲破遼主營遂引去劉渙保塞人知保州州自戍卒叛後兵益驕渙至虎翼軍謀舉城叛民大恐渙單騎叩營械首惡者歸斬之一軍帖服李緯楚邱人知雄州治兵頗巖不事廚傳節公使錢貯米三十斛爲常平積奏下其法他州劉兼濟祥符人知雄州先是邊民避罪逃者遼輒納之守將畏事不敢詰兼濟悉移檄責還張亢臨濮人遼聚兵幽􅃰閒以亢知安肅軍因人對曰其主孱而歳歉懼中國見伐特張言耳非其實也萬一背約臣請擐甲爲諸軍先張載長安人爲祁州司法叅軍劉几洛陽人神宗時知保州治狀爲河北第一劉舜卿開封人神宗時知雄州在雄六年恩信周浹李格非濟南人紹聖中通判廣信軍有士人説人禍福出必乗車格非遇之塗叱左右收之窮治其奸杖而出諸境楊應詢徽宗時知雄州朝廷多取西夏地遼以姻婭為言遣使乞還之不得擁兵並塞中外恫疑應詢曰是特為虛聲嚇我耳願治兵積粟以示有備彼將聞風自戢明年果還兵遼馬人望遼東人咸􅄉中知新城縣縣與宋接境驛道所從出人望治不擾吏民畏愛金范承吉皇統中為順天軍節度使屬地震壞民廬舍有欲爭先營葺者工匠過取其直承吉命官屬董其役先後以次不問貧富民賴以省費後復鎮順天奚卒散居境内率數千人為盜承吉繩以法懼不敢犯完顏宗賢皇統中為永定軍節度使天徳初召入雄州父老相率張青䋲縣明鏡於公署老幼填門三日乃得去富蔡鼎夀上京赫書河人大定二年厯蠡州刺史有惠政百姓刻石以記之富蔡鼎夀舊作蒲察鼎夀赫書河舊作曷速河今並改正丁暐仁宛平人大定中為祁州刺史暐仁前節度武定祁為支郡士民聞暐仁之官相率歡迎界上相屬不絶伊拉温遼橫帳人世宗時為定武軍節度使歳旱且蝗乃割指以血􅅹酒中禱而酹之既而雨霑足有羣鴉啄蝗且盡是嵗熟人以為至誠之感伊拉温舊作移刺温今改正劉仲洙宛平人大定中為祁州刺史以六善為教民化之張行􅂤日照人章宗時為順天軍節度使帝曰卿至保州如何治之對曰臣奉行法令不敢違失獄訟之事以情察之鈐制公吏禁抑豪猾以鎮靜為務庶幾萬分之一完顏衷中都司屬司人章宗時厯蠡州刺史平賦役無擾民立石頌遺愛劉弁泰和中為唐令蒞政公勤開廣利渠引唐水溉田數千頃又引而東以灌鄰邑世賴其利徒單航為安州刺史會元兵大至聲言都城失守可速降航盡出家財以犒軍民盡力備禦度不可支乃先縊其妻孥遂自縊城破人猶力戰死者甚衆博舒魯福夀為唐邑主簿元兵攻唐邑福夀與戰死之贈官三階博舒魯福夀舊作孛齊魯福夀今攻正元益良特穆爾囘鶻人太祖以中原多盜選充大斷事官從額真出鎮順天等路布德化寛征徭盜遁奸革州郡以安益良特穆爾舊作岳璘帖穆爾額真舊作幹真今並改正耶律伯堅桓州人至元九年授清苑縣尹初安肅州苦徐水之害大司農欲奪水故道導水使東東則清苑被其害伯堅力陳利害事遂得已縣西有塘水溉民田甚廣􅀔家據以為磑伯堅命決水注之田許以溉田之餘月乃得堰水置磑著為定制縣居南北之衝嵗為親王大官治供帳於縣西吏緣侵漁其費不貲伯堅命築公館以代供帳其弊遂絶凡賦役尤重於他縣者必詣府力爭之在清苑四年民親戴如父母比去立石頌其徳吳鼎燕人至大元年授保定路總管時太后欲幸五臺言者請開保定西五􅂞嶺以取捷徑遣使使視地形計工費鼎言荒山陡入人跡久絶非乗輿所宜往還報太后喜為寝其役額爾魯克布哈􅀩古人至正中除保定路達魯噶齊保定嵗輸糧數十萬於新鄉苦弗便額爾魯克布哈請輸京倉以便之俄除吏部尚書父老詣闕乞留遂以尚書知郡事㑹賊北渡河日修城浚濠爲戰守具廷議發五省八衛軍出戍額爾魯克布哈疏請留其兵自統黒軍數千人圍結西山八十二寨軍􅀔大張賊皆遁去及召還民繪像祀之額爾魯克布哈舊作月魯不花達魯噶齊舊作建魯花赤今並改正明陳哲宣徳中知博野縣民大愛之以舊官還職當去部民懇訴於巡按御史言舊官不逮哲遠甚乞還哲以活百姓御史以聞詔許之盛容無錫人景泰中知束鹿縣縣苦徭役不均爲之立九則法上下稱便母憂去民俟其服除詣闕乞還容命再任益不用鞭扑訟者喻之輒叩頭聽受鄰邑訟不決亦皆赴訴片言折服惠政並敷楊集常熟人景泰中知安州有政聲築隄植柳以防水患民甚德之秦紘單縣人天順初知雄縣奉御杜堅以捕天鵞至從人暴横紘執而杖之坐下詔獄民五千人詣闕爲紘訟冤乃調邊縣吳嶽汶上人嘉靖中爲保定知府敦教厲俗不事摘發而胥吏市猾自無越軼百姓莫不戴德嚴清雲南後衛人嘉靖中知保定府故事歳籍民充京師庫役清議罷之賑荒弭盜善政著聞人以比前守盛容吳嶽蕭文清廬陵人嘉靖中知祁州會水災發倉以賑全活甚衆築隄捍水植柳數千株世賴其利谷中虛海豐人嘉靖中爲高陽知縣時年十九發奸摘伏無遁情吏民駭服御史欲試其才倉卒行部中虛規畫井然詰以疑事立判御史大奇之薦諸朝王象乾山東新城人萬厯時爲保定知府嵗凶借馬價銀萬兩賑諸邑約明嵗輸銀粟還官至期􅀗利數千悉散貧民資牛種王象復山東新城人官保定同知以不拜魏忠賢祠削籍歸冒守愚如臯人萬厯中知高陽縣修築河隄三十里夾河植柳名曰萬柳金隄楊一桂安邑人萬厯時知唐縣開渠七十里導唐水以灌田厯村落三十八建閘二十五以時蓄􅂥所溉田無算民立祠渠上祀之段緯崇禎中知慶都縣修築隄堰易土以石隨時瀦泄民賴其利秦三輔三原人崇禎中知新城縣李九成等攻城與訓導王協中禦之並死贈三輔光祿少卿建祠祀之崔泌之鹿邑人崇禎中知清苑縣多惠政士民感之輔臣周延儒憾御史王宗昌異已嗾知府史躬盛諷泌之摭其令縣時不法狀泌之毅然曰殺人媚人吾不為也以是􅀗譴去後死難黃承宗崇楨時知慶都縣有吏才恤民隱抑豪右十一年城破死之李獻明夀光人崇禎中為保定推官大兵臨遵化時獻明以查盤在城或勸之行獻明曰莫非王土安敢避難與巡撫王元雅死之贈光祿少卿鄭延任臨清人崇禎時為安肅知縣大兵破安肅延任與妻俱死教諭靈夀耿三麟亦殉節熊嘉遇灤城人崇禎中官定興教諭城破死之陳顯元崇禎十五年知新安縣值大亂後撫民以恩惠政甚著以城堞傾頽不能守率士民入保闕門塞流賊至死守旬餘城陷大罵不屈為賊支解何復平度州人崇禎十七年授保定知府聞流賊已薄城單騎兼程抵任同知邵宗元以印授之復不受曰公部署已定我與戮力可也遂晝夜守禦及事急復自爇西洋礮火燎幾死未幾賊火箭焚城樓死焉邵宗元碭山人崇禎末為保定同知有治行李自成來犯宗元集諸生講見危致命章詞氣激烈講畢登城分守及都城陷賊以書説降宗元手裂之詰日寇大至絡繹三百里城中守益堅賊稍稍引卻會督師大學士李建泰輦餉求入城不得已納之賊攻益急建泰與中軍郭中杰等為内應城遂陷宗元不屈死之是日去都城之陷已五日矣劉忠嗣清苑人崇楨末為保定後衛指揮同知性忠勇為儕輩所服李自成犯境忠嗣守東城將陷召女弟適楊千户者歸令與妻毛氏媳王氏同處一室以弓弦勒殺之復登陴拒守城破奮刀斫賊賊支解之本朝乾隆四十一年賜諡忠烈又守備張大同與子之坦力戰死同死者指揮文運昌劉洪恩戴世爵劉元靖吕九章吕一照李一廣中軍楊儒秀鎮撫管民治千户楊仁政等二十四人本朝胡延年光州人順治七年知保定府遇事敢為郡猾隱佔民田為之清理凡千有餘畝豪强慴服威惠咸著武國楹奉天人知保定府時民閒墳墓圈入旗地不復容子孫葬祭國楹請還之民郭宸郛涇陽人順治十二年知清苑縣以廉直稱布衣蔬食不異寒素遇事挺然上官不能折以憂去行李蕭然一僕一婢一羸馬而已姚文燮桐城人康熙初知雄縣時渾河泛溢田廬漂沒民多流徙文燮悉招徠之捐資修城築隄造橋以利渉者人名之曰姚公橋俗以渾河有龍乃倣韓愈祭鱷魚故事為文檄之水果退邑歳貢狐皮苦累無已遂條陳十三難上之大吏題請􅀗免又立屯丁為圑長以守望而盜賊不敢入境百姓咸稱頌之閻興􅀖宣府人知新城縣革吏胥之弊令民自納丁銀息訟勸耕捐俸修學政績甚著趙士麟雲南河陽人康熙初知容城縣縣有不便民者二十事力請除之會縣境盜起士麟密迹其巢牒安肅合兵勦捕盜遂空甞建書院與諸生講論學者輯其語為敬一錄共傳習焉邵嗣堯猗氏人康熙時以巡撫于成龍薦授清苑縣砥礪廉明聲稱藉甚咸以包孝肅比之二十九年復以尚書王隲薦升任去前提調官臣沈兆澐恭纂輯提調官臣王廣䕃恭覆輯校對官臣李孚忠恭校校對官臣沈維鈺恭覆校
