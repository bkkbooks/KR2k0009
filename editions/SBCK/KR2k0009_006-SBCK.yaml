body:
  text: 保定府直隸省治東西距二百七十里南北距四百九十里東至河間府任邱縣界一百十里西至定州曲陽縣界一百六十里南至冀州新河縣界三百里北至順天府房山縣界一百九十里東南至冀州治三百四十里西南至正定府晉州治二百二十五里東北至順天府霸州治二百十里西北至宣化府蔚州治四百里自府治至京師三百五十里分野天文尾箕析木津及昴畢大梁之次府東北清苑滿城安肅定興新城容城雄縣皆古燕地當析木之次為尾箕分野府西南唐縣博野望都完縣蠡縣祁州束鹿安州高陽新安皆古趙地當大梁之次為昴畢分野建置沿革禹貢冀州之域周屬幽州春秋戰國屬燕戰國時南境分屬趙秦屬上谷郡南境屬鉅鹿郡漢屬涿郡分屬中山國及鉅鹿郡後漢因之分屬中山河間二國及鉅鹿郡晉為范陽國地兼為高陽中山河間博陵趙國地後魏為高陽郡地兼為范陽中山博陵北平鉅鹿諸郡地分屬瀛幽定三州隋為河間郡地兼為上谷博陵信都三郡地唐為莫州地兼為􅃰易瀛定深諸州地屬河北道五代晉天福初割屬遼始分置泰州開運二年收復州㝷廢仍為莫州地周分置雄州宋建隆元年始復分莫州地置保塞軍府之基址始此太平興國六年升為保州政和三年賜名清苑郡屬河北西路又分置廣信安肅永寕順安北平五軍與祁雄二州及中山府分屬河北東西路其􅃰州地則入遼屬南京道金天㑹七年升保州為順天軍節度屬中都路又増置遂安肅蠡安完五州與􅃰雄祁三州及中山府分屬中都河北東西路元太宗十一年始升順天軍為順天路置總管府至元十二年改為保定路領易祁雄安遂安肅完七州府之疆域自此始大屬中書省明洪武元年改保定府隸北平行中書省七年隸北平布政使司永樂後直隷京師本朝為直隷省治領州三縣十七雍正二年以深澤縣改屬定州十二年升易州為直隸州又以淶水縣及山西之廣吕縣改屬今領州二縣十五清苑縣附郭東西距六十里南北距八十里東至安州界四十七里西至滿城縣界十三里南至博野縣界七十里北至安肅縣界十里東南至高陽縣界三十五里西南至滿城縣界二十五里東北至安肅縣界三十里西北至滿城縣界三十里漢置樊與廣望二國俱屬􅃰郡後漢皆省入北新城晉復置樊輿縣尋省改置樂鄉縣後魏太和元年分新城置清苑縣改樊輿置扶輿縣與樂鄉縣俱屬高陽郡北齊俱省改清􅁐曰樂鄉隋開皇十八年又改曰清􅁐屬河間郡唐武德四年改屬滿州貞觀七年屬瀛州景雲二年改屬莫州五代晉初入遼置泰州開運二年克復仍廢為清苑縣宋建隆元年於縣置保塞軍太平興國六年改軍置保州仍改縣曰保塞為州治金大定十六年復曰清􅁐元為保定路治明為保定府治本朝因之滿城縣在府西北四十里東西距五十里南北距九十里東至安肅縣界三十里西至完縣界二十里南至望都縣界六十里北至安肅縣界三十里東南至清苑縣治四十里西南至完縣治四十五里東北至安肅縣治六十里西北至易州紫荆關一百二十里漢置北平縣屬中山國後漢晉因之後魏孝昌中屬北平郡興和二年分置永樂縣屬南營州樂浪郡北齊屬昌黎郡後周省永樂縣改北平縣曰永樂隋屬上谷郡唐屬易州天寶元年改曰滿城五代晉天福初入遼屬泰州開運初還屬晉徙泰州治此州尋廢縣仍屬易州宋景德中省入保塞縣金大定二十八年復置滿城縣屬保州元屬保定路明屬保定府本朝因之安肅縣在府北少東五十里東西距五十五里南北距六十四里東至容城縣界二十里西至滿城縣界三十五里南至清苑縣界四十里北至定興縣界二十四里東南至安州治四十里西南至滿城縣治六十里東北至新城縣治九十里西北至易州治九十里戰國時燕武遂邑漢置北新城縣屬中山國後漢屬􅃰郡晉屬高陽國後魏曰新城屬高陽郡永熙二年僑置南營州五郡十一縣北齊惟留昌黎郡領新昌縣隋開皇元年州移三年郡廢十八年改新昌曰遂城屬上谷郡唐屬易州五代周分置梁門口砦宋大平興國六年以遂城縣置威虜軍又以梁門口砦置靜戎軍並置靜戎縣為治景德元年改威虜為廣信靜戎為安肅宣和七年廢安肅軍為安肅縣㝷復為軍仍治安肅縣金天㑹七年改廣信軍為遂州安肅軍為徐州俱屬河北東路天德三年改徐州為安肅州徐郡軍貞元二年號遂州為龍山郡俱改屬中都路泰和四年廢遂州為遂城縣屬保州貞祐二年復置遂州元至元二年省遂州入安肅州後復置遂州俱屬保定路明初省遂州入安肅州洪武六年降安肅州為縣屬保定府本朝因之定興縣在府北少東一百二十里東西距四十五里南北距五十八里東至新城縣界二十里西至易州界二十五里南至安肅縣界四十六里北至易州淶水縣界十二里東南至容城縣界三十五里西南至安肅縣界五十里東北至新城縣界十里西北至淶水縣治三十里秦置范陽縣漢屬􅃰郡後漢因之晉屬范陽國後魏屬范陽郡隋開皇初改曰逎縣屬上谷郡唐初廢入易縣金大定六年始改置定興縣屬􅃰州元屬易州明洪武六年屬保定府本朝因之新城縣在府東少北一百五十里東西距九十里南北距六十里東至順天府霸州界八十里西至定興縣界十里南至雄縣界三十里北至順天府􅃰州界三十里東南至順天府保定縣治九十里西南至容城縣界三十里東北至順天府固安縣界四十里西北至易州淶水縣界四十里戰國時燕督亢地漢置新昌侯國屬􅃰郡後漢省唐大厯四年分固安縣地復置新昌縣太和六年又析置新城縣皆屬􅃰州五代晉入遼宋時與遼分界於此宣和四年歸宋改名威城㝷入金復曰新城元太宗二年升新泰州七年復為新城縣屬大都路十一年屬順