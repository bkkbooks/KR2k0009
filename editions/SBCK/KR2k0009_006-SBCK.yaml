黒泉在望都縣北里許龍泉河内二泉相去僅丈餘其色分明不溷舊志縣境凡九泉匯爲城濠又東注爲龍泉河善利井在唐縣西一名天王井靈井在唐縣西北寰宇記隋圖經云唐縣中山城西北隅有一大井俗名趙母井昔云醇酎千日即是此井所醖後以石葢之人不敢開傾井明統志在束鹿縣西南四十里漢光武師過其地渴甚此井忽傾欹泉水涌出前提調官臣沈兆澐恭纂輯提調官臣王廣蔭恭覆輯校對官臣鄧遇辰恭校校對官臣李孚忠恭覆校大清一統志保定府三古蹟樊輿故城在清苑縣東南漢元朔五年封中山靖王子修爲侯國屬􅃰郡後漢省後魏太和中復置改曰扶輿屬高陽郡北齊省入水寕水經注雹水經樊輿縣故城北地理風俗記曰北新城縣東二十里有樊輿亭故縣也寰宇記樊輿廢城在今縣東三十五里一名隅城舊志今謂之御城按水經注樊輿城在北新城東容城西應在今清苑東北安肅縣東界與寰宇記不合又魏書地形志晉復置樊輿屬高陽國後罷今晉志無此縣蓋失載耳後魏既改扶輿而隋志仍曰樊輿疑後魏時又嘗復故名也樂鄉故城在清苑縣東南漢書本紀高帝十年過趙問樂毅後得其孫叔封之樂鄉號曰華成君水經注濡水東經樂城南即此後魏始置樂鄉縣屬高陽郡北齊省入永寕寰宇記故城在今縣東南三十里按魏書地形志樂鄉縣注云前漢屬信都郡後漢罷晉復置漢時信都爲今冀州與今縣相距三百餘里其界不能至此又考水經注信都之樂鄉縣在下博縣東不云樂叔所封其地在今深州界蓋漢時信都之縣與樂叔之邑本爲二地樂叔雖有封邑未甞置縣也魏志不考混二地爲一舊唐志寰宇記皆仍其說誤廣望故城在凊苑縣西南漢元朔二年封中山靖王子忠爲侯國屬涿郡後漢省水經注博水東經廣望故城北寰宇記故城在縣西南五十里舊志有王莽城在縣東南四十里疑即廣望之訛也清苑故城在今清苑縣治東北七里魏書地形志高陽郡領清苑縣太和元年分新城置隋書地理志河間郡清苑縣舊曰樂郷後齊省樊輿北新城清苑樂鄉入永寕改名焉開皇十八年改爲清苑寰宇記縣本樂鄉高齊天保七年自滿城界移永寕縣理此隋改清苑因縣界清苑河爲名按隋志本謂北齊改永寕爲樂鄉寰宇記則以改樂鄉爲永寕矣二說不合永樂故城在滿城縣西北魚條山下後魏興和二年置屬樂浪郡北齊屬昌黎郡後周移治北平故縣而此城廢北平故城在滿城縣北元和志滿城縣東北至易州一百四里本漢北平縣屬中山國高祖以張蒼為北平侯後漢世祖追銅馬五幡賊於北平破之即此後魏於此置永樂縣天寶元年改為滿城以縣北故滿城為名五代史晉開運二年杜重威引兵攻遼泰州破滿城寰宇記是年以滿城路當衝要移泰州理滿城州尋廢宋史地理志太平興國六年析易州滿城之南境入保塞縣金史地理志滿城縣大定二十八年以清苑縣塔院村置舊志元太祖十四年張柔取滿城開府於此二十二年以滿城地隘還治清苑明初移今治漢故城在縣西二里眺山下明初廢為柴炭廠又有古滿城在縣東北十里北新城故城在安肅縣西南二十里漢置縣闞駰曰河間有新城故此加北後魏去北字北齊仍曰北新城尋省入清苑遂城故城在安肅縣西二十五里戰國時燕之武遂也史記趙悼襄王二年李牧攻燕拔武遂方城魏書地形志南營州永熙二年置􅀉冶英雄城領郡五昌黎遼東建德營邱樂浪縣十一龍城廣興定荒太平新昌石城廣都富平永安帶方永樂隋書地理志後齊惟留昌黎一郡領永樂新昌二縣餘並廢開皇元年州移三年郡廢十八年改為遂城元和志縣北至易州七十里隋開皇三年移後魏新昌縣於此十六年改遂城按縣城即戰國時武遂城也後魏孝武以韓瓚為營州刺史行達此城值盧曹搆逆就置南營州以瓚為刺史所部三千餘人並雄武冠時因號英雄城寰宇記遂城縣今理釡山村舊志廢縣今為遂城社范陽故城在定興縣南史記張耳陳餘畧地燕趙蒯通説范陽令先下漢書地理志范陽縣注􅀿劭曰在范水之隅隋書地理志上谷郡逎縣舊范陽居此俗號小范陽開皇初改為逎元和志范陽故城在易縣東南六十二里寰宇記范陽故城後魏孝昌二年為杜洛周所破高齊武平七年移治故城北十七里伏圖城謂之小范陽西北去州四十五里隋初自伏圖城移范陽之名於淶水縣又於伏圖城别置逎縣屬昌黎郡大業十年又移逎縣於伏圖城西南即今州東南三十四里故逎城是十三年陷入寇二城俱廢舊志今為故城鎮譌為固城在縣南四十里明洪武八司年今置巡廢新昌故城在新屬􅃰城縣郡宣東三帝本十始里四漢年置封縣燕刺王之後子省慶寰為宇侯記國漢後新漢昌廢故唐城復在置固屬􅃰安縣州南宋三初十因里其亦地下濕謂之陷俗城新城故城在理今志新􅃰城州縣新治城北縣唐太書和地六年以成四故年督析亢范地陽置縣寰置宇宋記王在州曽上南遼六事十自里後雄州唐白天溝驛渡城在河縣四北十近里督至亢新城亭後又七遷今十里至治按􅃰寰州宇舊記志與故唐志廢不後同唐蓋復唐置末也嘗唐縣故城在縣今本唐堯縣所東封北國漢置春秋時北北燕燕之邑伯於陽也左春秋昭傳齊納公北十燕二伯年於齊唐高杜偃預帥注師陽納即唐燕晏曰别堯邑為漢唐書侯地國理於志此唐闞縣注駰十應三劭州曰志故唐堯國張縣故城在在中滱山水國之北陽七應十劭五曰里縣水西經四注十唐里縣得南中北人二城亭今俱於此地城理取中志唐人縣鄉後則齊四廢十開也俗皇十以六為年望都復舊城唐誤隋書地書理志唐縣舊治左人城聖厯二年移於今所元和志縣東南至定州五十里舊志以舊唐志考之蓋自北齊廢縣後隋改置於左人城唐時復移治而漢時故城遂廢今有長古城在縣南八里即唐縣也唐後又移今治蠡吾故城在博野縣西南漢置縣屬􅃰郡後漢永建五年更封河間王開子翼為侯國北齊廢入博野水經注滱水東北經蠡吾縣故城北地理風俗記曰縣故饒陽之下鄉也後漢書注蠡吾故城在今博野縣西舊志今有蠡吾鄉分管縣西路村社其地蠡村有蠡吾故城後魏時為滹沱水所淹東南城角猶存按今之博野及漢之蠡吾今之蠡縣乃漢之博陵後魏及唐宋以來之博野自北齊廢蠡吾入博野厯隋唐時蠡吾故地為博野之西境宋置永寕軍金改蠡州並以博野為􅀝郭元至元初省博野三十一年復置博野縣於今蠡縣界屬保定路其時蠡州與博野始分然博野之名猶在故地也明洪武元年遷於西南十八里為今治由是博野蠡縣名稱互易皆非故地明統志但據現在之名不考分合徙置之由所載沿革皆誤且彼此混淆今特訂正望都故城在今望都縣西北三十里本戰國時趙慶都邑按史記秦始皇七年將軍􅀩驁攻龍孤慶都即此漢置望都縣張宴曰尭山在北堯母􅂟都山在南登堯山見都山故以為名隋書地理志後齊併望都入北平開皇六年又置大業初又廢舊唐書地理志望都縣武德四年分安喜北平二縣置初治安險故城貞觀八年移於今治元和志縣西南至定州五十里容城故城在今容城縣西北漢置縣屬涿郡景帝十三年封匈奴降王徐盧為侯國後漢省晉復置尋又廢後魏復置北齊省入范陽隋為逎縣地唐初亦置逎縣天寶初復漢故名元和志縣西北至易州八十八里五代周顯德六年移縣於雄州城中寰宇記廢城在雄州西北五十里是也遼又僑置容城縣於巨馬河北新城縣界仍屬易州在州東八十里自此容城之名南北並置金初省南容城入北容城明景泰二年復遷於巨馬河南北去舊縣十餘里舊志有古城在今縣北十五里城子村周迴七里即故縣也按容城志謂隋移逎縣於容城舊志駮之曰隋逎縣在定興不在容城雖新唐書志容城下有本逎二字為可縣高齊省入范陽開皇元年改疑考元和志容城屬逎縣所為本逎者謂其本屬逎縣耳非即逎縣之治且謂唐初未嘗名容城為逎惟神龍二年嘗改名逎其言雖似其實皆非舊唐書明言容城隋改為逎縣武徳五年置北義州領逎縣又割固安歸義屬之寰宇記亦云武徳四年置北義州仍改為逎縣以屬焉皆與新唐書同不得謂唐初未嘗名逎縣也今容城北距定興僅五十里舊志既云隋改范陽置逎縣在定興南四十里容城故城在今縣北十五里而謂隋之逎縣不在容城可乎元和志雖不言武徳再置逎縣而以天寶元年改為容城直接隋改屬逎縣一語可知改屬屬字乃為字之訛舊志誤解耳曲逆故城在完縣東南左傳哀公四年齊國夏伐晉取逆時戰國時曰曲逆齊䇿魏處曰趙可取唐曲逆是也漢置縣屬中山國高帝七年擊韓王信於代南過曲逆上其城望室屋甚大曰壯哉縣吾行天下獨見雒陽與是耳於是更封陳平為曲逆侯水經注漢章帝章和二年行巡北岳以曲逆名不善因山水之名改曰蒲陰後魏改屬北平郡北齊廢括地志蒲陰故城在北平縣東南十五里本朝乾隆二十六年高宗純皇帝巡幸五臺鑾輿經此有御製曲逆故城詩按水經注章和二年當作元和三年北平故城在完縣東北漢北平縣在今滿城縣界後魏改置北平郡於此魏書地形志北平郡孝昌中分中山置治北平城元和志北平縣西南至定州八十三里本秦曲逆縣地後魏孝明帝於今縣東北二十里置北平郡割中山國之蒲陰望都北平三縣屬之高齊省北平郡及蒲陰縣以北平縣屬中山郡隋開皇三年屬定州唐萬嵗通天二年遼攻圍七旬不下勅改為狥忠尋復舊名按魏書地形志北平郡領北平縣即漢之北平後周改名永樂今滿城縣是也其北平郡所治北平城乃隋唐定州之北平今完縣是也魏時郡縣異治相去本不甚遠故北平城在北平縣界中至北齊時廢郡因移縣就故郡而以魏時舊縣併入永樂至周乃移永樂之名於故北平縣故隋志永樂縣下又云舊曰北平周改名焉二縣之名雖同而漢縣在永樂此是蒲陰故地明統志於完縣下云漢置北平縣於滿城縣下反云漢北平縣地誤博陵故城在蠡縣南漢置陸成縣武帝元朔二年封中山靖王子貞為侯國後漢廢入蠡吾本初元年桓帝以蠡吾侯入立追尊父翼為孝崇皇陵曰博陵因改置博陵縣於此晉改博陸後魏改博野水經注博陵故城即古陸成漢封劉貞為侯國者也今謂是城為野城寰宇記寕邉軍治博野縣以居博水之野為名舊志故城在今縣南十五里魏隋時移今治按晉改博陸縣本合博陵陸成為名九域志乃因霍光封博陸侯遂謂博野縣有霍光墓縣志因之皆誤歸信故城今雄縣治五代晉時歸義縣入遼周分故縣南界置雄州及歸義縣於此寰宇記雄州本歸義縣之瓦子濟橋在涿州南當九河之末舊置瓦橋關晉建軍城周顯德六年收復三關以其地控扼幽冀建為雄州仍移易州之容城并歸義二縣於城中舊志宋太平興國初避諱改縣曰歸信明初縣始廢其城宋至道間知州何承矩築景德中李允則復増築共九里有竒又築外羅城周十八里濬濠引水謂之雄河易縣故城在雄縣西北十五里漢置縣本燕故邑也世本燕桓侯徙臨易史記趙世家惠文王五年與燕鄚易括地志易縣故城在歸義縣東南十五里寰宇記歸義縣東南十五里有大易故城是燕桓侯之别都後魏移理故城西北十五里故易城即今縣理高齊天保七年省入鄚縣又有小易城在大易城北二里歸義故城在雄縣西北三十五里唐武德五年以故易縣地置屬涿州五代晉時隨州入遼仍曰歸義金始併入歸信寰宇記縣在涿州南一百二十里蒲陰故城今祁州治寰宇記蒲陰縣在定州東六十里本漢安國縣地隋開皇六年自鄢城移安國縣於鄭德堡屬定州今縣是也其年仍改安國為義豐唐神功元年改為立節神龍初復改為義豐宋改蒲陰縣宋史地理志祁州景德元年移治於定州蒲陰按清􅀋天文書金天㑹初祁州别築西城移州治焉元復移於東城舊治蓋即一城中分為東西非更築新城也安國故城在祁州南漢初高帝六年封王陵為侯國後為縣屬中山國三國魏封王肅為安國侯又明帝追封后父毛嘉為安國侯皆即此晉因之後魏太平真君七年併入深澤景明二年復置魏書地形志安國縣有安國城又蒲陰縣有安國城章懷太子後漢書注安國故城在義豐縣東南舊志安國城在州東南六里即漢安國縣按元和志安國城本在唐河南今此城在河北道里不合又舊志今州西南三十里有村曰固城故縣或在其地郻縣故城在束鹿縣東漢置郻縣後漢曰鄡更始二年光武擊銅馬於鄡即此水經注衡水又北經鄥縣故城東竹書紀年梁惠成王三十年秦封衞鞅於鄔改名曰商地理風俗記曰縣北有鄔阜蓋縣氏之北齊移安國縣於此隋改置安定縣而故城廢隋書地理志鹿城縣舊曰鄡後齊改曰安國開皇六年改爲安定十八年改鹿城章懷太子曰郻縣故城在鹿城縣東按顔師古曰郻苦么反與鄡同水經注作鄔地形志作通典舊志作􅙉寰宇記作鄢皆鄡字之訛也又舊唐書地理志先天二年分饒陽鹿城界置陸澤縣於古􅙉城與隋志後漢書志不同詳見深州貰縣故城在束鹿縣西南漢高帝六年封越將傅胡害爲侯邑後爲縣屬鉅鹿郡後漢更始二年光武馳赴信都擊堂陽貰縣皆降之即此縣尋廢水經注百尺溝東南經育城西斯洨水東經育城北育城即貰城之訛也安定故城在束鹿縣西北三十里漢本始元年封燕刺王子賢為侯國後漢初馬武從光武擊尤來五幡等進至安定即此尋廢魏書地形志縣有安定城舊唐書地理志束鹿縣漢安定侯國今縣西七里故城是也束鹿故城在今束鹿縣北隋開皇六年改安國置安定縣後改鹿城唐又改今名元和志鹿城縣東至深州二十五里本漢安定縣地隋開皇三年於此置安定縣取漢舊名十八年改為鹿城取縣東故鹿城為名通鑑注束鹿本鹿城縣安祿山叛元宗改縣為束鹿以厭之九域志縣在深州西四十五里舊志明天啟二年滹沱河決城圯移治縣南圏頭市故城在今縣北三十五里今有舊城集高陽故城在今高陽縣東戰國時燕封宋榮蚠為高陽君漢置縣應劭曰在高河之陽因名寰宇記縣在瀛州西北七十里舊志明洪武三年河溢縣始遷豐家口即今治東去古城二十五里按司馬貞索隠縣即古高陽氏所興高陽記故城一名化龍城周迴九里顓頊所築今其地名化龍村皆傳訛也渥城故城今新安縣治水經注渥同口水側有渾渥城寰宇記渾泥城在容城舊縣南四十里水經注云泥同口有泥城漢景帝改為亞谷城封東胡降王廬它之為亞谷侯即此地也金史地理志泰和四年改混泥城為渥城縣屬安州八年移州治渥城舊志元以金移安州治此故曰新安按寰宇記譌渥為泥金時亦曰混泥城而置縣則曰渥城蓋當時嘗經考正也樂信廢縣在束鹿縣西漢神爵三年封廣川繆王子强為侯國屬鉅鹿郡後漢省晏城廢縣在束鹿縣西隋開皇十六年分鹿城置晏城縣大業初廢唐武德五年桑顯和擊劉黑闥於晏城破之即故縣也葛城廢縣今安州治史記趙世家孝成王十九年趙與燕易土燕以􅁑與趙後漢書郡國志高陽有葛城水經漃水經依城北地説無依城之名即古葛城也括地志故葛城又名西阿城在瀛州高陽縣西北五十里寰宇記廢唐興縣在鄚縣西北五十里本漢高陽縣地舊名葛鄉城一名依城唐如意元年析河閒縣置武興縣隸瀛州至神龍初改為唐興縣石晉改為宜川縣周顯德六年併入鄚縣舊志宋太平興國七年高陽關鎮將敗遼於唐興口因置唐興砦淳化三年於砦建順安軍至道三年移軍治高陽此城遂廢金始置葛城縣為安州治明初省縣入州唐興故城在州東南二十里廣養城在清苑縣東六里城周五里南有河藪相傳燕昭王築以養馬處又養老城在縣西南去望都二十里柏陵城寰宇記漢武帝封趙敬肅王子終古為柏陵侯廢城在清苑縣南按柏陵史記作柏陽漢書表作柏暢皆與寰宇記不同壁陽城在清苑縣西南三十里五代時營壘也晉開運二年符彥卿等敗遼於此白城在清苑縣西南三十里宋咸平六年王繼忠與遼戰於康村傍西山而北至白城即此今有白城集清涼城在清苑縣西南四十里接博野縣界亦曰將梁漢元朔二年封中山靖王子朝平為將凉侯水經注崛溝北逕清涼城即將梁也魏書地形志蠡吾縣有清涼城徐城在安肅縣東九域志安肅縣有古徐城周景王時大將徐峻所造舊志在縣東十里又敵城在縣東南三十里相傳戰國時趙將趙葱顔聚與秦將王翦相持處又有空城在縣西南三十里解王城在縣西北四十里桑邱城在安肅縣西南戰國時燕之南界也漢鴻嘉元年封東平思王子頃為桑邱侯括地志桑邱城俗名敬城在遂城縣長城在安肅縣西北二十五里戰國時燕趙分界處水經注易水東流屈經長城西即此今其地名長城口東接新安西北之三臺城綿延斷續􅀔如岡阜百樓城在定興縣西南二十五里相傳唐太宗征遼還於此築城以息將士今為百樓村長安城在定興縣西北二十五里寰宇記在易縣東南二十七里漢宣帝時幽州刺史李宣尚范陽公主主思長安乃築此城象長安故名城中有􅀥樹花而不實枝皆向西南俗謂之思鄉棗古燕城在新城縣西北十四里相傳遼太后所築有梳妝樓釣魚臺遺址伏城在唐縣西南水經注馬溺水出上曲陽城東北流經伏亭疑即八渡關尉宿治舊志符城在縣西南四十里唐河西岸蓋即故伏城後人誤伏為符耳雹水城在唐