援兵至圍始解泰乘勝追􅁹賊多投河死以全邑功遷軍前督餉同知告歸卒祀忠義祠許文耀福建人康熙初任鄖陽通判楊來嘉叛上官檄文耀往撫文耀諭以利害賊無從意文耀切責之遂遇害事聞贈䘏穆生輝山西天鎮人任鄖陽總兵土冦犯境力戰死傅桂芳永清人康熙中竹山營遊擊賊譚宏犯鄖陽桂芳中鎗殁詔贈都司僉書朱綵高唐州人康熙中知鄖陽府舊有武陽龍門諸堰􅀊久湮廢民失水利綵捐貲修復􅀊􅀗倍登復講學勸農緝盜安良郡中翕然稱治卒祀名宦劉大成新昌人知竹山縣嘉慶元年敎匪曾世興陷城與典史吳國華均以殺賊捐軀恩予優䘏國華大興人陳世章江西人知保康縣縣無城嘉慶元年邪匪猝人境督率兵勇􅁹賊與守備孫掄魁同被害恩加優䘏蕭水清字亷泉平逺人保康典史嘉慶元年敎匪􅋓入縣署水清與敎諭黄義峯拒署門門開不可闔各手刃賊十餘人力竭俱死恩予優䘏水清子其馨其芳姪祚超及妻弟林良鳳幕客范紹晉皆不屈死妻林氏媳韓氏及其女孫皆闔門自殺宗超海字雲峯贑縣舉人知竹谿縣多善政嘉慶元年敎匪滋事􅀔倉猝無備督撫駐武昌距邑且千里超海度陜省較近具狀請援幕客以越境請兵有難色超海憤然曰一邑生靈朝不及夕可拘常格乎陜撫秦承恩適至興安得狀遣兵一邑􅀗全七年予祀名宦祠黄詔山陰人房縣九道梁巡檢嘉慶四年敎匪犯境詔率鄉勇堵禦力竭遇害賜䘏如例金克俊大興人乾隆庚子舉人嘉慶五年署房縣知縣隨營􅁹賊陣亡恩㫖照知縣例賜䘏人物周尹吉甫房陵人食采於房詩人爲之歌六月之章晉王遜字邵伯魏興人累官上洛太守私牛馬在郡生駒犢秩滿悉以付官永嘉中爲寕州刺史時外逼李雄内有夷冦吏士㪚沒城邑邱墟遜披荒糾厲收聚離散誅豪右不奉法者征伐諸夷俘馘千計於是莫不振服威行境土遣子澄奉表勸進於元帝帝封遜襃中縣公李驤冦寕州遜使將軍姚崇爨琛拒之戰於堂狼大破驤等崇以道遠不敢渡水窮追遜執崇鞭之怒甚髪上衝冠冠爲之裂夜中卒諡曰壯西魏扶猛字宗畧上甲黄土人世爲上洛郡蠻渠帥梁時爲新城上庸太守南洛北司二州刺史封宕渠縣男魏廢帝元年降魏授車騎大將軍羅州刺史從賀若敦討信州破之入白帝城撫慰民夷莫不悦服後又破蠻帥文子榮於汶陽進爵臨江縣公轉綏州刺史從衞公直援陳將華皎時軍不利唯猛所部獨全又從田宏破漢南諸蠻前後十餘戰每有功明李善房縣人洪武初授國子助教厯工部郎中􅅦課蘆茶出納稱平旋以引年致仕彭忠竹山人永樂舉人累官常州知府郡為三吳劇地時成祖營建北京民苦征徭忠撫字盡善治行為天下第一陳瑛竹山人永樂初以明經應詔除刑科給事中性剛直奏劾無所忌朝廷重之潘滎竹山人永樂初刑部主事讞決無私嘗曰一􅀧墨一人命可不慎乎人服其言楊五保康人兄弟五人以射獵為業有勇名劉千斤石和尚作亂欲掠遠安憚五兄弟不敢越乃以重賂假道五陽受之而設伏以待賊覺乃遁去冦平授左千戸不就力耕終其身周清竹谿人正德十進士不樂仕進隱居敎授嘉靖初為處州府推官循聲丕著以賢能徵卒於途朱襃字崇益鄖西人嘉靖舉人厯官揚州府同知倭冦劫掠海壖襃率兵力戰死事聞贈布政司㕘議廕其子立祠祀焉赫奕鄖縣人嘉靖中舉人授永昌府推官昭雪􅁈獄轉晉下川南㕘議適奢冦為亂奕親冒矢石平之陞廣東布政使未任卒川督朱燮元以平奢功疏於朝贈兵部侍郎廕其一子温如玉鄖縣人嘉靖進士累官御史巡按蘇松時江南島冦初平物產凋耗如玉一意撫循民咸蘇息尋擢山東按察副使以病歸如玉謹廉隅敦孝友居官二十年故廬不増一椽徐成楚字衡望竹谿人萬厯進士知内黄縣有訟鬻田不鬻井者陽不應使人浚井得鐵鎮枯骨乃十年前田主所潛殺布商也遂按伏法邑人神之􅀊旱蝗不入境擢給事中糾劾不避權貴歐陽照竹谿人萬厯進士累官給事中出為隴西道副使為政持大體有能名呉應元鄖西人以掾起家慷慨有國士風任巴西典史以亷敏稱天啟三年奢崇明亂得應元欲授以偽職應元罵曰某雖末吏官自天朝豈向爾死賊求署耶拔刀自刎事聞令建祠祀之喻元傑鄖西人兄弟三人皆諸生崇禎十年流賊夜襲城母陳氏方卧疾家人悉逃獨元傑侍母側母促之去元傑泣曰舍母偷生何以生為賊至母子俱被害冦士元鄖西人明末冦亂士元以諸生散家財募士破賊知縣蔣宗縉署為守備後力戰死本朝乾隆四十一年賜諡節愍劉泗源鄖縣諸生明末路馮二賊圍鄖城城中食盡將潰泗源縋城入賊營為諜以閒之兩賊互相猜疑天明遁去本朝謝廷賓保康貢生有智畧郝賊盤踞房竹閒往往以輕騎掠野廷賓糾合鄉里保全山砦閒出奇兵襲賊賊不敢縱人賴以安甘繼芳竹谿人明季流賊出没邑境繼芳糾合義勇守禦本朝康熙初授守備駐中峯砦左奚㑹楊來嘉叛連洪謝二賊來攻知縣曹席珍入中峯與繼芳協力為前後二門拒守經兩月有縣役通賊破砦賊執席珍繼芳曰主砦者我也因厲聲殺賊至五峯嶺被害梁應旭鄖西人天性純孝里黨咸稱之乾隆九年旌吳正孝竹山人以千總從征金川陣亡嘉慶六年􅀘給恩騎尉世職魏一輪竹山人乾隆庚子舉人嘉慶元年敎匪滋事一輪與兄庫大使廷佐武舉廷宣率鄉勇堵禦一輪殺賊被戕妻子亦遇害廷佐孫藻姪孫元喜及二僕俱死於賊黄富國字世封竹山武生嘉慶元年敎匪陷竹山富國隨西安將軍恒瑞攻復縣治追斬賊首曹海陽於北星河隨􅁹别賊皆有功每出戰張黑幟賊目之為黒虎軍洊擢督標守備二年􅁹賊於山口兩峯壁立賊麏至洞胸死事聞恩予䘏廕如例甘杜竹谿􅀊貢生嘉慶元年任來鳳訓導敎匪猝至偕地方官固守城陷死之事聞議䘏流寓宋龔夬瀛州人上疏乞正元祐后冊位號及元符后不當並立書報聞已而元祐后冊再廢言者論夬嘗建言詔削籍編管房州劉光祖􅂤州陽安人趙汝愚既罷相韓􅇑胄擅朝目士大夫為偽學逆黨禁錮之光祖撰涪州學記諫官張釡指為謗訕奪職謫居房州明母德純南充人嘉靖四年以議大禮戍鄖陽開館授徒於鄖列女明蕭烈女聗西人成化閒年十九以􅀊荒隨父流寓上津㑹官軍逐流民甚急有强暴詐稱官軍執欲汚之蕭度不免自經死熊養性妻曾氏鄖縣人許字養性養性病卒女聞之自經死家人合葬焉于一鳴妻張氏鄖縣人夫溺死張哀毁卒劉顯清妻許氏保康人年十九顯清墜水死許聞奔􅂘索尸不􅀗因自沉後於穀城河並得兩尸事聞􅀗旌郭大美妻景氏竹谿人事姑至孝夫殁姑復卒景慟哭死於柩旁張應龍妻馮氏鄖西人夫卒無子殯前二日自經段雲錦妻徐氏鄖縣人崇禎十六年李茂春倡亂徐與雲錦弟雲章妻趙氏以死相誓衣襦皆密縫之已而為賊所掠行至武陽觀音洞見懸崖臨水數十仞奮身投焉楊應明妻侯氏鄖縣人應明官通判值李茂春之亂侯被掠欲汚之侯罵曰我朝廷命婦豈從汝死賊賊怒殺之郭以新妻冦氏鄖西人流冦至夫婦攜子匿山中邏賊􅀗之舉刃將殺其夫與子冦紿賊曰此吾兄也汝勿害吾從汝賊信而舍之以新遠去乃大罵賊賊惜其姿以手曳之冦舉石擊中賊面賊怒殺之首己隕猶行百歩遇石乃仆陳丹餘妻宋氏鄖縣人崇禎末偕女遇賊見執宋度必不免行詣槐隂下母女急抱樹而罵曰吾母子甘死白日下豈受汝暗室汚哉賊曳之不動以刃斷其指罵益厲並殺之王焻妻黄氏鄖縣人李茂春之亂被掠大罵且拾挺擊賊賊怒殺之李紹賢妻曾氏鄖縣人明末兵變投厠死死踰月得屍顏色不變鞠養睿妻黄氏保康人明末遇賊不屈觸石死本朝胡廷聘妻許氏鄖縣人順治四年王光泰叛羣賊執許許剔目斷髪投水死後膺旌表馬士秀妻李氏鄖縣人冦叛被擄渡江躍入水死又馬之驤妻段氏李紹先妻李氏俱同時殉節張廷芳妻章氏紹興人順治初隨夫任竹谿縣典史宿馬鞍砦流冦􅋓至居民欲逃章脱􅆪珥犒衆以守後見力不支解佩刀先刺㓜子乃自刎賊見之咸咋舌去徐秉哲妻謝氏鄖縣人夫歿姑老子㓜值洪賊亂扶姑攜子逃竄日夜偑利刀以防强暴姑殁營葬撫子有成苦節五十年康熙五十九年旌周宗适妻段氏鄖縣人夫得狂病時持刀秉火段侍疾不怠夫卒遺􅀌亦殀舅欲奪其志堅不從以從子為嗣撫若已出康熙五十九年旌周詩妻徐氏鄖縣人未嫁詩卒守貞奉姑姑卒哀慟事繼姑孝詩弟三人俱㓜日用皆給於徐康熙五十九年旌又同縣節婦陳世德妻楊氏程子民妻楊氏俱康熙年閒旌白天麟妻李氏烈女王金大雍正年閒旌楊正坤妻蔡氏竹山人青年苦節誓志不渝鄉人莫不嘉憫康熙年閒旌又同縣歐陽思鼎妻張氏雍正年閒旌向斗垣妻楊氏鄖西人夫卒守節家貧晝夜紡績以養舅姑嘗被大水浮於樹杪若有物載之以免雍正元年旌又同縣梁應暘妻江氏吳藩妻劉氏俱雍正年閒旌鍾雲明妻李氏鄖縣人夫亡守節乾隆年閒旌又同縣許正坤妻王氏柴先榮妻張氏曾宗先妻張氏王釨妻李氏呉采妻蕭氏陸善妻龔氏李承先妻徐氏瞿成元妻李氏蕭廷獻妻毛氏裴佩綋妻劉氏王鏡妻閔氏吳永祥妻余氏段士宏妻周氏羅永年妻余氏瞿天榮妻吕氏周頌妻陳氏藍士芳妻胡氏孝婦陳文世妻劉氏俱乾隆年閒旌戴之有妻鮑氏趙樸妻李氏田文秀妻劉氏趙相妻陳氏俱嘉慶年閒旌劉楚材妻余氏房縣人夫亡守節乾隆年閒旌又同縣雷天動妻程氏雷天名妻王氏袁宏仕妻許氏彭中允妻林氏陳輔相妻汪氏李應儒妻高氏盧士虎妻錢氏陳萬一妻盛氏趙文經聘妻藍氏烈婦余思舜妻况氏俱乾隆年閒旌陳良臣妻杜氏張文輝妻趙氏張士英妻戢氏俱嘉慶年閒旌又謝龍恩母劉氏鄭某妻陳氏李啟傅媳傅氏李遐友母某氏王道妻呂氏曹倫妻余氏尼僧照福俱於嘉慶元年敎匪入珹遇賊不屈死事聞均旌王國棟妻汪氏竹山人夫亡守節乾隆年閒旌又同縣呉維貞妻韓氏李起鳳妻張氏李廷元妻袁氏魏爾瑾妻楊氏程文相妻焦氏陳得貴妻李氏杜仁妻李氏韓克禮妻杜氏烈婦王伯海妻蕭氏俱乾隆年閒旌都澍妻盧氏都國安妻李氏魏廷相妻曾氏魏正植妻何氏魏兆青妻李氏魏正言妻華氏俱嘉慶年閒旌楊炳妻周氏竹谿人夫亡守節乾隆年閒旌又同縣任尚廉妻李氏汪秀妻孟氏汪文珍妻陳氏烈婦李倫妻陳氏俱乾隆年閒旌蕭崗妻周氏曾致福妻劉氏馮軾妻陳氏馮汝賢妻劉氏趙英妻李氏王元棋妻周氏孝婦郭崇周妻廖氏俱嘉慶年閒旌又敖世炘妻劉氏李翠仲妻吳氏王中妻甘氏熊文韜妻楊氏朱文象妻余氏陳宗善妻喬氏楊勝泰妻郭氏俱於嘉慶元年敎匪入境遇賊不屈死事均聞旌張見隆妻陳氏保康人青年苦節事舅姑以孝聞乾隆四十九年旌至嘉慶元年敎匪入保邑氏罵賊死又同縣黄安元妻周氏酆普妻李氏俱乾隆年閒旌高吉兒聘妻楊氏嘉慶年閒旌又韓玉書妻王氏劉良朋妻羅氏柳孔彰妻王氏陳紹太妻高氏張氏周之珩妻劉氏柳氏羅文海媳閻氏羅文潛媳余氏羅文㵎妻黄氏羅文澍妻陳氏羅桂妻高氏羅棠妻何氏羅桐妻周氏張英妻吳氏長媳王氏次媳葛氏王琅妻周氏羅女魁大張大女張二女俱於嘉慶元年遇賊不屈死朱景雲母徐氏王近智妻謝氏女次大王玉山妻周氏廖作林妻張氏黄鑘女大姑俱於嘉慶五年遇賊不屈死事聞均旌晏守成妻胡氏鄖西人夫亡守節乾隆年閒旌人同縣吳楀妻章氏吳耀光妻黄氏羅某聘妻吳氏俱乾隆年閒旌楊渭功妻周氏楊大有妻章氏夏時妻劉氏羅宗連聘妻吳氏胡學澄妻周氏胡楚栴妻李氏俱嘉慶年閒旌