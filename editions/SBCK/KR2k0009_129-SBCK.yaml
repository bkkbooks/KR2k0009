body:
  text: 襄陽府關隘東津渡關在襄陽縣東十里古稱櫃門關府志府東櫃門關元圍襄樊時置宋將張貴被執見阿珠於櫃門關不屈見殺是也阿珠舊作阿木今改正鳳林關在襄陽縣南七里輿地紀勝襄陽縣有鳳林關府志濱江作險為水陸之門一旅可守觀音閣􅀜在襄陽縣南九里西柳關在襄陽縣西三里老龍隄關在襄陽縣西北十里七里店關在襄陽縣北七里雞頭關在南漳縣南一百里雞頭山下瑪瑙關在南漳縣西三十里猫兒關在南漳縣西四十里隘門關在南漳縣西一百五十里石鼓關在均州東五十里小江口關在均州東南八十里接光化縣界路出河南槐樹渡關在均州北五里油瓶關在均州北六十里吕堰鎮巡司舊名吕堰驛在襄陽縣北七十里明初置本朝因之設巡檢司雙溝巡司在襄陽縣東北七十里明置巡司本朝因之田家集巡司在宜城縣西七十里本朝嘉慶十一年設方家堰巡司在南漳縣東五十里明置本朝因之石花街巡司在穀城縣西五十里本朝嘉慶十一年設左旗營巡司在光化縣西北二十五里明成化初置巡司本朝康熙中移於周家嘴後復舊油坊灘鎮在襄陽縣西三十里樊城鎮在襄陽縣北三里古樊城也本朝雍正元年府同知移駐於此鄧城鎮在襄陽縣北三十里即古鄧城大安鎮在襄陽縣境九域志襄陽縣有大安鳳林峴首沈碑漢陰朝宗八曡東岸八鎮雲水洲鎮在宜城縣東五里清水港鎮在宜城縣東南十五里陰港鎮在宜城縣東南三十五里破河腦鎮在宜城縣南四十里廖家河鎮在宜城縣西南二十里羊祜􅆜鎮在宜城縣北二十五里相近有毛家埠鎮武安鎮在南漳縣東四十三里七里灘鎮在南漳縣西七里亦名七里頭鎮長坪鎮在南漳縣西一百里柴店鎮在穀城縣東南三十里甎橋鎮在穀城縣東南七十里羊臯鋪鎮在穀城縣南三十里次胡鎮在光化縣南九域志光化縣有次胡鎮按次胡疑即茨湖之訛周家嘴鎮在光化縣西北油坊在襄陽縣西北一百里接河南南陽府鄧州界舊名北泰山廟鎮明嘉靖中移油坊灘巡司於此本朝因之嘉慶十一年裁郭海營在宜城縣境本朝雍正八年設把總分防倪家營在光化縣北四十里天保砦在南漳縣境本朝雍正八年設把總分防紫山砦在南漳縣境設把總分防傅家砦在光化縣境本朝雍正八年設把總分防高頭堡有二一在襄陽縣西南團山之南一在穀城縣南接南漳縣界石門堡在南漳縣北四十里明成化中建潼口在襄陽縣南五十里當南北要路陰谷口在襄陽縣西王基埠口在襄陽縣西北七十里為水陸之㑹黨子口在光化縣西北八十里水路通河南南陽府淅川縣漢江驛在襄陽縣西一里明初建於城南五十里成化中遷今所鄢城驛在宜城縣南明正統元年置本朝因之劉昇店在棗陽縣東四十里大板橋店在棗陽縣南二十里清潭店在棗陽縣南九十里李老人店在􅀥陽縣西北七十里鹿頭店在􅀥陽縣東北六十里梁家店在光化縣北四十里胡莊在光化縣東六十里牛首市在襄陽縣西北四十里九域志鄧城縣有牛首樊城高舍三鎮府志東南臨漢江為均鄖要路陡溝市在穀城縣東十五里黃旗埠口市在穀城縣東南四十里相近有塌廟灘市新店市在穀城縣西二十五里石羊集在襄陽縣東一百二十里接河南南陽府鄧州界馬家集在襄陽縣西北五十里薛家集在襄陽縣西北七十里龍王集在襄陽縣西北一百里馬腦觀在穀城縣西一百八十里陰巖山本朝乾隆十九年設巡司嘉慶十一年裁津梁通濟橋在襄陽縣南三里礮石橋在襄陽縣北十里相傳宋吕文煥守襄陽元兵立礮石於此因名豬蘭橋在宜城縣東北水經注沔水東逕豬蘭橋本名木蘭橋橋之左右豐蒿荻劉季和於橋東大養豬襄陽太守曰此中作豬屎臭可易名豬蘭橋百姓遂以為名清涼橋在南漳縣東三十里丁蘭橋在南漳縣東七十里優梁橋在􅀥陽縣東南十里水出分水嶺逶迤百折而匯於漢車橋在􅀥陽縣西南一百里鎖風橋在穀城縣南九十里陡溝橋在光化縣東南三十里紅崖橋在光化縣西南七里梅溪橋在均州南六十里有上中二橋天津橋在均州南八十里相近有大聖橋蔡村渡在襄陽縣東南八里為棗陽宜城兩縣往來通道龍王洲渡在宜城縣東南五十里蠻河渡在宜城縣西南五十里仙人渡在穀城縣東八里紫店渡在穀城縣南三十里臨江渡在光化縣西北北出商鄧南達均房此為津要隄堰襄陽城隄在府城外四面寰宇記襄陽城有古隄後漢胡烈所築名勝志隄隋時已有之唐神龍元年宰相張東之因壘為隄自是襄陽置防禦守隄城府志唐㑹昌元年山南東道節度使盧鈞築隄宋乾道八年荆南守臣葉衡請築襄陽沿江大隄明正德十一年大水副使聶賢又築隄護之襄人呼為聶公隄北自老龍隄至長門皆沿城甃石南自萬山麓至土門皆仍古大隄東南自土門至長門即賢所築隆慶二年副使徐學謨請於東西南門外各去城二里築護城隄自是屢加修築長隄在襄陽縣西檀溪中明萬厯中知府高若愚築老龍石隄在襄陽縣西北十里明萬厯中巡道楊一魁築本朝乾隆中重修五十四年命大學士阿桂估勘添砌石壩以禦沙磧救生隄在宜城縣西南五里宋史河渠志淳熙八年襄陽府守臣郭杲修護城隄以捍江流繼築救生隄為二牐一通於江一達於濠當水涸時導之入濠水漲時放之於江自是水無汎濫之患護城隄在宜城縣東北明嘉靖末知縣雷嘉祥築永豐堰在襄陽縣北宋史河渠志慶元二年襄陽守臣程九萬募工修鄧城永豐堰防金兵衝突之患且為農田灌溉之利武安堰在南漳縣東四十五里又靈溪堰在南漳縣東五十里元何文淵重修武安靈溪二堰記武安靈溪皆在故中廬縣界武安堰唐大厯四年節度使梁崇義修宋紹熙改元都統率公淳祐十