復京兆長安人初自滁州刺史遷襄州開元中以吏部侍郎復為襄州刺史治行名天下故吏盧僎邑人孟浩然立石峴山子朝宗開元二十二年以襄州刺史兼山南東道襄州南楚故城有昭王井傳言汲者死行人雖暍困不敢視朝宗移書諭神自是飲者無恙人號韓公井元結河南人肅宗時以吏部員外郎㕘山南東道來瑱府時有父母隨子在軍者結説瑱令給其父母衣食瑱納之瑱罷結攝領府事固辭侍親歸樊上柳公綽京兆華原人長慶中為小南東道節度使行部至鄧縣吏有納賄舞文二人同繫獄縣令以公綽素持守謂必殺貪者公綽判曰贓吏犯法法在姦吏壞法法亡誅舞文者裴度河東聞喜人太和中出為山南東道節度使白罷元和所置臨漢監收千馬納之校以善田四百頃還襄人盧鈞京兆藍田人㑹昌初漢水害襄陽拜鈞山南東道節度使築隄六千步以障漢暴盧肇作詩以美之五代梁劉玘雍邱人太祖時為襄州都指揮使山南節度使王班為亂軍所殺推玘為留後玘偽許之明日饗士於庭伏甲幕中酒半擒為亂者殺之漢劉審交文安人高祖時為襄州防禦使有善政宋邊光範陽曲人建隆四年襄州節度慕容延釗征湖南以光範權知州事路當衝㑹餉饋無闕延釗卒復知襄州大軍數萬由陜路討蜀出漢上光範復當供億人不知勞趙延進頓邱人宋初伐蜀以襄州當川路津要命為鈴轄同知州務蜀平專領郡事漢水歲壞隄害民田常興工修築延進累石為岸遂絶其患曹翰大名人乾德二年太祖征蜀移翰刺均州澗谷深險翰令鑿石通道師旋以濟詔兼西南諸州轉運使自石門徑趨歸州餉運不乏張金操江東人乾德四年知光化軍時三司請場院主吏有羨餘粟及萬石芻五萬束以上者賞金操上言苟非倍取民租私減軍餘何以致之宜追寢其事詔從之高保寅太祖時知光化軍張士遜其邑人也保寅一見許以遠大議者多其知人魏丕相州人淳化中為襄州刺史境内久旱丕誠禱二夕雨霑足夏竦德安人真宗時知襄州屬歲饑大發公廩不足竦又勸州大姓出粟得二萬斛全活者四十餘萬人耿望真宗時知襄州請於舊地兼括荒田置營田上中下三務築隄堰集鄰州兵六百人市牛分給之種稻三百餘頃又請於唐州赭陽陂置務如襄州歲種七十餘頃張逸滎陽人真宗時知襄州鄧城縣有能名知州謝泌將薦逸先設几案置章其上望闕再拜曰老臣為朝廷得一良吏乃奏之李仲芳清河人祥符間知光化軍漢水東至乾德匯而南水悍暴而岸善崩民居其衝仲芳為作石隄民數千家皆賴以安王洙宋城人仁宗時知襄州㑹貝卒叛州郡皆洶洶襄佐史請罷敎閱士不聽又請母給真兵洙曰此正使人不安也命給庫兵敎閲如常人無敢譁者周湛南陽穰人仁宗時知襄州襄人不善陶瓦率為竹屋歲久侵據官道簷廡相逼火數為害湛至度其所侵悉徹之自是無大患馬尋須城人知襄州時襄州饑人或羣入富家掠囷粟獄吏鞫以强盜尋曰此脫死耳其情與强盜異奏得減死論著為例狄栗仁宗時知穀城縣縣政久廢栗期月稱治修禮興學自是人知尚文風俗淳美孫永長社人知宜城縣舊有白起渠久壞永率民理塞去隘時其蓄洩劉元瑜河南人知襄州富人子張鋭少􅀌弱同里車氏規取其財乃取銳父棄妾他姓子養之比長使自訴陰賕吏為助州斷使歸張氏鋭莫敢辨既同居逾年車即導令求析居元瑜察知窮治得姦狀黥車竄之人服其明歐陽修廬陵人仁宗時為乾德令有惠政劉兼濟祥符人為襄州兵馬監押漢江暴漲兼濟解衣涉水率衆捍城州賴以完張子憲􅁈句人知光化軍戍卒逐其帥韓綱餘黨作亂子憲招降之征稅重人多逋􅀒子憲奏除之張唐英新津人為穀城令縣圃歲畦薑貸種與民還其陳復配賣取息銓曹指為富縣唐英至空其圃植千株柳作柳亭其中聞者咨羨歐陽棐修子神宗時知襄州曾布執政其婦兄魏泰倚聲􅀔來居襄規占田園强買民貨郡縣莫敢誰何指州門東偏官邸廢址為天荒請之棐却之衆為之請棐竟持不與葉康直建州人知光化縣縣多竹民皆編為屋康直敎用陶瓦以息火患凡政皆務以利民時豐稷為穀城令亦以治績顯人歌之曰葉光化豐穀城清如水平如衡朱紘熙寕􅀄為冝城令修復木里溝溉田千頃豐稷鄞人為穀城令以廉明稱仇悆益都人徽宗時為鄧城令滿秩耆幼遮泣不得去宗澤義烏人建炎初知襄陽府時金人有割地之議澤上疏諫高宗覽其言壯之王煥建炎中知武當縣賊犯均州煥率邑人保山砦賊至舉家死之陳桷温州平陽人紹興中知襄陽府充京西南路安撫使襄漢兵火之餘民物凋瘵桷請於朝乞蠲減賦稅均房兵叛桷遣將平之而後以聞漢水決溢躬率兵民築隄民居賴以無虞虞允文仁夀人隆興元年除湖北京西制置使時朝議欲棄唐鄧海泗四州允文五疏力爭三年拜四川宣撫使過襄陽奏修府城張杓綿竹人慶元中知襄陽府陳應祥黨琪等謀襲均州杓部分掩捕斬其為首者二人盡釋黨與反側以安莫濛歸安人知光化軍諜知金渝盟郡乏舟衆以為慮濛力為辦集及敵犯境民賴以濟柴中行餘干人開禧中為京西轉運使中行謂襄陽乃自古必爭之地修禦尤宜周密天方旱盡捐調稅斥征官黜務吏甘澍隨至官取鹽鈔贏過重課日増鈔日壅中行揭示通衢一錢不増商賈大集改知襄陽兼京西帥時襄州兵政久弛中行白於朝考覈軍實舊額二萬二千人存者􅂊半亟招補虚籍劾李珙不法以懲貪守明扈再興有功以厲諸將李燔南康建昌人朱子弟子為襄陽府敎授復往見朱子凡諸生未達者先令訪燔俟有所發乃從朱子折衷諸生畏服趙方衡山人嘉定中為京湖制置使兼知襄陽府金人圍棗陽方遣孟宗政扈再興等援之圍解金兵又逼至棗陽隨州相持踰年無日不戰敵三面來攻方與宗政等表裏合謀犄角追擊金兵遂潰金額爾克復大舉圍棗陽方命宗政守城金頓兵八十餘日不能拔遣再興剋期合戰宗政自城中出夾擊金兵大潰額爾克單騎遁金兵至樊城方命再興陣以待之方親視師金人三日不敢動遂遁再興敗金兵於靈山方得疾尾洲出不意殺傷殆盡貴身􅀍數十創力不支見執不屈死襄帥吕文煥以貴附葬順冡立雙廟祀之牛富霍邱人咸淳中為侍衞馬軍司統制戍樊城累戰不衂數射書襄陽城中遺吕文煥相與固守為唇齒兩城凡六年不拔富力居多城破富率死士百人巷戰死傷不可計身被重傷赴火死贈靜江軍節度使諡忠烈賜廟建康王福咸淳中為禆將守樊城城破牛富死福亦赴火死元楊惟中宏州人太宗時皇子科綽伐宋命惟中於軍前行中書省事克宋襄陽諸府凡得名士數十人收伊洛諸書送燕都立宋大儒周惇頤祠建太極書院延儒士趙復王粹等講授其間科綽舊作闊出今改正賈真鄭州人世祖時知襄陽府視政暇未嘗廢學從戎亦槖駝􅀒書安達拉􅀩古人至順元年遷襄陽路達嚕噶齊山西大饑河南行省恐流民入境為變檄守武關安達拉驗其良民輒聽度關既入煮粥以食所活數萬人又城臨漢水歲有水患為築隄城外遂以無虞安達拉舊作諳都刺達嚕噶齊舊作達魯花赤今俱改正塔布台􅀩古人爲襄陽錄事司達嚕噶齊魏王軍汝亳塔布台來供餉王爲賊所執塔布台馳騎奪王亦爲賊所得賊令其拜拒而詬之且與縛者角遂支解之塔布台舊作塔不台今改正達嚕噶齊譯見前博囉特穆爾高昌人至正中爲襄陽路達嚕噶齊捕斬鄖縣叛人田端子等未幾帥兵救穀城與賊相持軍乏食遣從子瑪哈實哩求糧於襄陽不應明年襄陽失守領義兵二百人且戰且引至監利乃糾合諸義兵五千人仍趨襄陽連戰敗賊生擒賊黨劉咬兒又梟賊將劉萬户許堂主等是日甫至襄兵猶未食賊大至與戰抵暮被重創麾其姪曰吾以死報國汝無留此瑪哈實哩泣曰死生從叔父既而􅀍執罵賊遇害瑪哈實哩帥家奴求其尸戰殁於陣舉家死者二十六人博囉特穆爾舊作孛羅帖木兒達嚕噶齊譯見前瑪哈實哩舊作馬哈失力今俱改正谷廷珪知襄陽縣特黙格兵入境官吏皆遁廷珪與主簿張德獨不去被執不屈死之特黙格舊作鐵木哥今改正明鄧愈虹縣人從太祖起兵爲湖廣行省平章鎮襄陽開設公署増築城池撫安兵民江漢士庶樂業四境以安尹希文武清人洪武間知宜城縣邑人愛之秩滿輒乞留在任二十七年卒官高安正統初知穀城縣勤於政事古羊粉水二河隄岸久圯安修完好年歲屢豐李人儀榮昌人天順中知襄陽縣以幹濟稱何源涇州人正統中知襄陽府築大隄修學宫及羊祜祠民德之為立漢峴同清碑王琬吳縣人成化中知光化縣劇賊劉千斤作亂朝廷出師􅁹平流民散處山澤慮生變議盡驅出境琬獨事招徠既而遣都御史原傑來撫安琬乃單騎入山諭以威德編為里社緩其賦役民遂帖然後以中貴人往來需索棄官歸徐翀豐城人宏治中知棗陽縣邑鮮積儲翀乃規畫置豫備倉二所儲榖至萬斛值歲歉民甚賴之聶賢長夀人正德中補湖廣荆南兵巡副使駐襄陽彊毅饒幹用修城及大隄築蔣家埠捍水全活者萬家吳華東鄉人正德中知襄陽府愛民養士建尊經閣集百家書公餘􅂺講論指授諸生毁淫祠奬忠節凡古名賢無祠者創廟宇置田祭之吳昂海鹽人正德中知宜城縣民有領種官莊者畝收三分謂之老畝又量田加租昂斟酌租課但徵老畝租民皆便之安􅀖確山人正德中知棗陽縣會流賊趙鐩劉文質等來攻凡二十七晝夜􅀖率衆力禦城得全賊退即築城民皆安堵吕容寕州人嘉靖中知襄陽府漢水暴漲壞隄及城容多方捍之民賴以安徐學謨嘉興人嘉靖時知襄陽府時景王之國以安陸地小欲以襄之沙市益之學謨力持不可王不能奪在任剛毅不撓以廉著聲王可賓内鄉人隆慶中知南漳縣建講堂以造士丈地畝以均徭役清隱漏民懷其惠萬振孫合肥人萬厯中知襄陽府作人造士置學田一千三百餘畝社學一百有八所獨建書院一助建者六所馮若愚慈谿人萬厯中知襄陽府時宗藩擾民羣校絡繹出侮州邑長吏若愚一切禁斷之藩不敢逞又詔開礦稅璫聚亡命生事若愚捕璫役數十人悉縛以石投諸江璫遂戢尋中以事罷去何棟如無錫人萬厯中襄陽府推官執法公明時稅璫驕橫棟如按捕其黨置之法中蜚語被逮尋得白王業浩餘姚人初知穀城縣卓異調繁襄陽輕刑緩賦勸農息爭㑹下詔捕蝗鄉民􅀒擔來獻業浩計蝗發賑民德焉劉宇興安州人萬厯中知襄陽縣廉公有威臨事敏幹初宜城大猾占襄民地七百畝收其租入而遺賦以累襄民者十餘年宇按視之立呼前輸賦者盡分其地王之瀚絳州人萬厯中知􅀥陽縣力阻開礦忤稅監陳奉被逮下獄斥為民王家業西安人萬厯中知均州州南四十里石板灘有堰灌田數百頃廢圯近百年家業涖任特為修治至今賴之金九陛全椒人崇禎中知􅀥陽縣釋􅁈獄恤窮黎蝗不入境流㓂躪鄖襄九陛練民兵儲糧以待七年張獻忠入境九陛潛兵擊之殺其渠混天一字王賊再來攻九陛却之自是不敢犯胡承熙應天人崇禎中知均州有能聲遷刑部員外郎未行流冦陷城執之不屈與其于爾英死之本朝乾隆四十一年賜諡節愍王瑞柟永嘉人崇禎中擢兵備僉事駐襄陽張獻忠就撫於熊文燦瑞柟力持不可與左良玉謀執之文燦不從未幾獻忠叛留書於壁具列上官受平順人順治初知光化縣城中止十七家多方招徠民稍安集時流賊未熸良弼多方防禦寢食城上月餘力疾冒矢石戰守賊遁去良弼以勞瘁卒姚延儒烏程人順治初知南漳縣賊郝揺旗等陷城死之事聞贈官廕子時同死者訓導賀來泰天門人唐士傑遼東人順治中知南漳縣流賊盤踞西山士傑力戰不勝自焚死湯家相趙城人順治進士知南漳縣甫下車而冦至堅壁清野遣兵斬偽將馬臣孫信冦乃遁去招民墾田六百餘頃修永泉八觀水利漳民賴之王進忠山海衞人康熙初襄陽前營遊擊􅁹西山賊遇伏死之張所藴高陽人康熙初襄陽前營守備􅁹西山賊血戰三晝夜矢盡遇害時戰死者千總李三畏鄧州人把總孫繼岡新野人王翼孫長洲人襄陽吕堰驛巡檢嘉慶元年敎匪至吕堰翼孫率兵勇堵禦殺賊陣亡恩予雲騎尉世職李鍾大興人官襄陽府司獄嘉慶六年委辦糧站於均州之周府菴遇賊不屈死恩予雲騎尉世職人物周宋玉楚邔邑人屈原弟子雋才辨給善屬文為楚大夫閔其師屈原忠而放逐乃作九辨以述志唐勒䜛之於襄王復著賦以自見後世修辭者稱之漢劉縯字伯升舂陵人光武帝之長兄性剛毅慷慨有大節王莽篡縯發舂陵子弟部署賓客與新市平林兵合軍而進斬甄阜梁邱賜於潢淳水破嚴尤陳茂於育陽後為更始所害光武即位追封齊王諡曰武習融襄陽人有德行不仕子郁字文通建武中拜侍中封襄陽侯劉珍一名寶字秋孫蔡陽人少好學永初中為謁者僕射鄧太后詔使校定東觀諸書又詔作建武以來名臣傳延光五年轉衞尉卒官珍著誄頌連珠凡七篇又撰釋名三十篇以辨萬物之稱號王逸字叔師宜城人元初中舉上計吏為校書郎順帝時為侍中著楚辭章句行於世其賦誄書論及雜文凡二十一篇又作漢詩百二十三篇子延夀字文考少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延夀作甚奇之遂輟翰焉李昺字子然酇人習魯詩京氏易篤行好學不羨榮祿室家相待如賓州府辟賕之數而題其末曰不受我賕者王兵備一人也唐王召入閩復歸温州城破自經死本朝乾隆四十一年賜諡忠節阮之鈿桐城人崇禎中知穀城縣未至任張獻忠陷城據之以求撫總理熊文燦許之處其衆數萬於四郊漸肆行劫之鈿上牒言狀不報明年獻忠叛之鈿仰藥未死賊殺之焚其屍贈尚寳少卿本朝乾隆四十一年賜諡忠節鄺曰廣南海人崇禎時襄陽府推官流冦至曰廣守南城夜半賊上城曰廣冠服危坐不為動城殺之子逢明逄泰俱被害十一年本朝乾隆四賜諡烈愍黎民安金谿人官遊擊駐襄陽流冦陷城民安率所部千人搏戰矢盡被縛罵賊死本朝乾隆四十一年賜諡烈愍張克儉長治人官襄陽副使時楊嗣昌以獻賊羅汝才降卒散處房竹間克儉上書言不便不聽崇禎十四年獻賊假軍符入襄陽焚襄王府克儉奔救為賊所執大罵死本朝乾隆四十一年賜諡忠節周建忠秦州人知穀城縣崇禎十五年闖賊陷城􅀍執不屈死本朝乾隆四十一年賜諡烈愍李大覺金谿人崇禎時知穀城縣兼署襄陽縣事城陷繫印於肘縊死堂上十一年本朝乾隆四賜諡節愍郭裕新淦人崇禎中知棗陽縣流冦來犯時左良玉屯近邑􅁉邀與共擊却之後賊衆復至裕發礮石斃賊無算賊攻益力城陷裕身被數槊大罵為賊支解闔門遇害本朝乾隆四十一年賜諡忠烈萬敬宗南昌人崇禎末知光化縣流冦破城死之本朝乾隆四十一年賜諡節愍陳美新建人崇禎末知宜城縣流冦來攻率民守城躬冒矢石固拒八晝夜力盡被執罵不絶口賊怒以火然其身死本朝乾隆四十一年賜諡忠烈本朝李藻陽城人順治初豫親王帥兵南下委署襄陽副使議復荆州襄陽城門久燬藻潛度尺寸密為門由水道載入翼日門成賊衆駭遁劉開文鄒平人順治初任下荆南道副使王光泰叛被執死之時知府王鑛襄陽知縣潘朝祐俱死難鑛祥符人朝祐杞縣人王良弼召及公車徵皆不應何容字伯求襄鄉人少遊學洛陽與郭林宗賈偉節等相善顯名太學友人虞偉高有父讐未報篤病將終容往候之偉高泣訴容感其義為復讐以頭醊其墓及陳蕃李膺之敗容與蕃膺善乃變姓名亡匿汝南黨事起容私入洛陽為求援救全免者甚衆黨錮解辟司空府董卓秉政與司空荀爽司徒王允共謀卓以他事為卓所繫憂憤而卒謝該字文儀章陵人明春秋左氏為世名儒門徒數百千人建安中河東人樂詳條左氏疑滯數十事以問該皆為通解之名謝氏釋行於世仕為公車司馬令父母老託疾去官少府孔融薦拜議郎以夀終龎德公襄陽人居峴山之南未嘗入城府夫妻相敬如賓荆州刺史劉表數延請不能屈乃就候之德公釋耕於壟上而妻子耘於前表指而問曰先生苦居􅅵畝而不肯官祿後世何以遺子孫乎德公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後遂攜其妻子登鹿門山採藥不返司馬徽字德操襄陽人善知人同郡龎德公稱為水鏡先主嘗問世事於徽徽曰儒生俗士豈識時務識時務者在乎俊傑此間自有伏龍鳳雛先主問爲誰曰諸葛孔明龎士元也黃承彥襄陽人高爽開朗爲􅃆南名士以女妻諸葛亮蒯良字子柔中廬人劉表爲荆州刺史延之與謀良曰衆不附者仁不足也附而不治者義不足也苟行仁義百姓歸之如水就下何患不從蒯越字異度良弟深中足智大將軍何進辟爲東曹掾越勸進誅諸閹宦進猶豫不決越知進必敗求出爲汝陽令佐劉表定荆州遣人誘宗賊斬之又與龎季說降江夏賊張虎陳生於襄陽後歸曹操官光祿勲封侯楊慮字威方襄陽人少有德行爲江南冠冕州郡禮召諸公辟請皆不能屈年七十卒鄉人宗貴號曰德行楊君三國漢龎統字士元襄陽人德公從子少樸鈍未有識者惟德公重之年十八使詣司馬徽徽與語自晝達夜甚異之稱爲南州士之冠冕後爲郡功曹先主領荆州統以從事守耒陽令在縣不治免官魯肅遺先主書曰龎士元非百里才使處治中别駕之任始當展其驥足耳諸葛亮亦以爲言先主與語大器之以爲治中從事親待亞於亮從先主入蜀勸取益州進圍雒縣統帥衆攻城為矢所中卒年三十六先主痛惜流涕追賜爵關内侯諡曰靖習珍襄陽人仕蜀漢為裨將孫權襲害關忠義珍與樊胄等舉兵弗克潘濬招降珍曰我必為漢􅀑不為吳臣糧盡自裁馬良字季常兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之先主辟良為左將軍掾後遣使吳孫權敬待之先主稱尊號以良為侍中及東征吳遣良入武陵招納五溪蠻夷蠻夷渠帥皆受印號咸如意㫖㑹先主敗績於夷陵良亦遇害董恢字公緒襄陽人入蜀以宣信中郎副費禕使吳孫權問禕曰楊儀魏延牧豎小人若一朝無諸葛亮必為禍亂矣諸君曽不知防慮乎禕不能答恢曰儀延不協起於私忿無黥韓難御之心也今方掃除强賊混一區夏功以才成業由才廣若捨此不任防其後患非長計也諸葛亮聞之以為知言恢還辟為丞相府屬遷巴郡太守習禎字文祥襄陽人有風流善談論隨先主入蜀厯雒郫令南廣漢太守子忠亦有名官至尚書郎忠子隆為步兵校尉掌校祕書輔匡字元弼襄陽人隨先主入蜀益州既定為巴郡太守建興中徙鎮南右將軍封中鄉侯楊儀字威公襄陽人初為關忠義功曹建興三年丞相亮以為㕘軍遷長史亮數出軍儀常規畫分部籌度糧榖不稽思慮斯須便了軍戎節度取辦於儀十二年隨亮出屯谷口亮卒儀領軍還魏延反儀討平之楊容字子昭襄陽人入蜀為巴郡太守丞相諸葛亮主簿亮常自校簿書容諫曰為沼有體上下不可相侵故古人稱坐而論道謂之三公今明公為埋親自校簿書流汗竟日不亦勞乎亮謝之後為東曹屬典選舉馬謖字幼常良弟以荆州從事隨先主入蜀除綿竹成都令越嶲太守才氣過人好論軍計丞相諸葛亮深加器異亮征南中問計於謖謖曰用兵之道攻心為上願公服其心而已亮納其䇿赦孟獲以服南方故終亮之世南方不復反廖化字元儉襄陽人為關忠義主簿荆州既屬吳思歸先主乃詐死因攜持老母晝夜西行㑹先主東征遇於秭歸先主大悅以化為宜都太守後主時為丞相㕘軍後假節領并州刺史封中鄉侯以果烈稱向朗字巨達宜城人少師事司馬德操先主以為巴西太守後主時領丞相長史建興六年免官朗少以吏能見稱及去職潛心典籍年踰八十猶手自校書講論古義不干時事執政以下皆敬重焉子條亦博學多識為御史中丞向寵朗兄子先主時為牙門將秭歸之敗寵營特全後為中部督典宿衞兵時諸葛亮當北行特表稱將軍向寵性行淑均曉暢軍事遷中領軍延熙三年征漢嘉蠻夷遇害魏龎山民德公子有令名娶諸葛亮姊為魏黃門吏部郎吳李衡字叔平襄陽人聞羊道有人物之鑒往干之道曰多事之世尚書劇曹郎才也是時校事郎吕壹操弄威柄大臣莫敢言道曰非李衡無能困之者遂共薦為郎孫權引見衡口陳壹姦短數千言權有媿色數月壹被誅而衡大見顯擢後為丹陽太守加威遠將軍張悌字巨先襄陽人少有名理孫休時為屯􅀐校尉晉伐吳孫皓使悌督諸葛靚等帥衆渡江逆戰靚大敗退走使迎悌悌不去靚自牽之悌曰今日以身殉社稷復何遁也靚收淚放之為晉軍所殺習温襄陽人識度廣大始為荆州大公平甚得州里之譽厯長沙武昌太守選曹尚書長子宇執法郎每出車騎導從甚盛温怒杖責之曰貴而能貧始可以無患可以侈靡競乎晉羅憲字令則襄陽人父􅀩為蜀廣漢太守憲年十三能屬文早知名性方亮嚴整待士無倦輕財好施不營產業由蜀歸晉持節領武陵太守泰始初入朝詔曰憲忠烈果毅有才䇿器幹可給鼓吹卒追封西鄂侯諡曰烈龎渙襄陽人德公孫晉太康中為牂牁太守去官歸鄉鄉人宗敬之里中化其德讓少壯皆代老者擔􅀒羅友字它仁襄陽人累官廣益二州刺史在藩舉其宏綱不存小察甚為民吏所安悦習鑿齒字彥威襄陽人博學洽聞以文筆著稱荆州刺史桓温辟為從事累遷别駕温出征伐鑿齒或從或守所在任職每處機要莅事有績善尺牘論議温甚器遇之時温覬覦非望鑿齒在郡著漢晉春秋以裁正之起漢光武終於晉愍帝於三國時以蜀為正統凡五十四卷臨終上疏謂晉宜越魏繼漢不應以魏後為三恪南北朝宋柳元景字孝仁襄陽人世祖鎮襄陽以元景為武威將軍隨郡太守朝廷大舉北侵加元景建威將軍總統軍帥向陜合戰魏軍大潰再出北侵威信著於境外世祖即位拜侍中尋轉安蠻校尉雍州刺史平魯爽及臧質封巴東郡公受遺詔輔幼主當朝理務有宏雅之美時在朝多事產業惟元景獨無所營齊柳世隆字彥緒元景兄子讀書折節涉獵文史與張緒王延之沈炎為君子交宋時以平沈攸之功封貞陽縣侯齊高帝踐阼進爵為公居母憂寒不衣絮杖而後起性清廉惟專攻墳典在朝不干世務垂簾鼓琴風韻清遠甚獲世譽卒贈司空諡忠武子忱年數歲世隆及妻閻氏疾忱衣不解帶經歲及居喪以毁聞梁時封州陵伯梁柳慶遠字文和元景弟子仕齊為魏興太守郡遭暴水人欲移於􅂎城慶遠曰吾聞江河長不過三日命築土而已俄而水退百姓服之梁武帝臨雍州辟為别駕盡誠協贊武帝受禪封雲杜侯出為雍州刺史士庶懷之卒諡忠惠柳惲字文暢世隆子少有志行好學善尺牘與陳郡謝瀹鄰居深相友愛瀹曰宅南柳郎可為儀表試守鄱陽相聽屬吏得盡三年喪禮署之文敎百姓稱焉梁武帝至建業惲上牋請城平之日先收圖籍及遵漢高寛大之義帝從之惲立性貞素再為吳興太守人吏懷之少工篇什復善彈琴投壺射必命中碁品弟二武帝嘗稱之曰柳惲可謂具美分其才技足了十人惲弟憕累官蜀郡太守為政廉恪益部懷之惲子偃年十二武帝引見問讀何書對曰尚書問有何美句對曰德惟善政政在養民衆咸異之後為駙馬校尉封都亭侯馮道根字巨基酇人少失父家貧傭賃以養母年十二以孝聞高祖起義師以道根為驍騎將軍嘗為先鋒陷陣能檢御部曲高祖嘗指道根示尚書令沈約曰此人口不論勲約曰此陛下之大樹將軍也厯處州郡和理清靜在朝廷雖貴顯而性儉約所居無器服侍衞蕭然如素士當世服其清退為散騎常侍左軍將軍卒諡曰威郭祖深襄陽人武帝時為後軍行㕘軍詣闕上封事二十九條帝雖不能悉用然嘉其正直為南津校尉捜檢姦惡不避彊禦朝野憚之絶於干請令行禁止江中嘗有賊祖深自率兵討之遂大破賊長江肅清吉翂字彥霄馮翊蓮勺人家居襄陽幼有孝性遭所生母憂水漿不入口父為吳興原鄉令為吏所誣逮詣廷尉恥為吏訊虛自引咎罪當大辟翂年十五撾登聞鼓乞代父命武帝疑其受敎於人勅廷尉嚴加脅誘廷尉乃盛陳徽纆厲色問之對曰誠不忍見父極刑明詔聽代不異登仙廷尉矜之欲寛其械翂弗聽竟不脫械事聞帝宥其父後丹陽令欲舉翂純孝翂固辭曰父辱子死斯道固然若翂當此舉則是因父賣名固拒止之後辟本州主簿監萬年縣期月化行張景仁廣平人父為同縣韋法所殺景仁時年八歲及長志在復讐後遇法於公田渚手斬其首以祭父墓詣郡自縛乞依刑法簡文在鎮下詔褒美之原其罪柳敬禮慶遠孫累官扶風太守大寶中陷於侯景與南康王㑹理謀襲景剋期將發蕭賁告景遂遇害杜崱襄陽人父懷珤累有軍功卒諡桓侯兄嶷膂力絶人號為杜彪崱幼有志氣以膽勇稱歸梁元帝封枝江縣公討平侯景破齊將郭元建敗降陸納平武陵王於硤石卒諡武崱兄弟九人兄嵩岑嶷岌巚岸及弟嵸幼安並知名岑子龕元帝時封中廬縣侯破侯景將侯子鑒江陵既陷貞陽侯淵明紹梁嗣改封溧陽縣侯張彪襄陽人臨城公大連出牧東揚州以彪為中兵㕘軍後奉表元帝帝甚嘉之及侯景平王僧辯遇之甚厚引為爪牙僧辯見害彪據㑹稽拒陳文帝敗入若耶山為陳將章昭達所殺周㧕霞一名遐字子昇元景族孫幼而爽邁神彩嶷然仕梁除尚書工部郎周保定中徵為霍州刺史導民以德民感化之天和中卒霞有志行父卒於揚州自襄陽奔赴六日而至哀感行路奉喪泝江西歸中流風起舟幾覆霞抱棺號慟愬天俄頃風息其母嘗乳發疽霞吮膿止其痛旬日遂瘳咸以為孝感所致柳靖字思休霞子少方雅博覽墳籍梁大定中為尚書度支郎厯河南德廣二郡守雅達政事所居皆有治績隋文帝徵之以疾固辭閉户以琴書自娛足不厯園庭子弟有過靖必下帷自責長幼相率拜謝於庭靖然後見之朂以禮法於是鄉里亦化之杜叔毗字子弼襄陽人早􅀌事母以孝聞仕梁為宜豐侯蕭修府直兵㕘軍西魏達奚武圍修於南鄭修令叔毗請和周文帝見而禮之使未及還而修中直兵曹䇿謀以城降武時叔毗兄君錫從子映映弟晰各領部曲䇿誣以謀叛加害叔毗志在復讐恐坐及其母母曰若曹䇿朝死吾以夕殁亦所甘心遂白日手刃䇿於京城面縛請就戮周文帝舍之遭母憂哀毁骨立殆不勝喪後從南伐軍敗為陳人所禽將降之叔毗辭色不撓遂被害隋柳莊字思敬霞子少有器量博覽墳籍兼善辭令蔡大寶見之歎曰襄陽水鏡復在於兹後仕隋為給事黄門侍郎明習舊章雅達政事凡所駮正帝莫不稱善官至饒州刺史柳􅔝字顧言世隆曽孫少聰敏解屬文好讀書所覽將萬卷仕梁入隋轉晉王諮議㕘軍王好文雅招引才學之士諸葛穎虞世南等百餘人以充學士而􅔝為之冠王以師友處之官至祕書監封漢南縣公唐張柬之襄陽人中進士第永昌元年以賢良召年七十餘矣對䇿者千餘東之為第一出為合蜀二州刺史故事歲以兵五百戍姚州地險瘴到輒死柬之上疏論其弊俄為荆州長史以狄仁傑薦遷秋官侍郎姚崇復薦之即日拜同鳳閣鸞臺平章事進鳳閣侍郎首建謀誅張易之昌宗迎中宗復辟以功封漢陽郡王為武三思所䜛罷知襄州持下以法雖親舊無所縱貸未幾流瀧州憂憤卒景雲元年贈中書令諡曰文貞杜易簡襄陽人九歲能屬文長博學為岑文本所器官至開州司馬杜審言字必簡易簡從弟少與李嶠崔融蘇味道為文章四友官至修文館直學士坐事貶吉州司戸司馬周季重搆其罪繫獄審言子并年十三刺季重於座為左右所害尹怦字守忠襄陽人父嗣宗居喪盡禮怦年十三竭力􅅵畝勤苦養親父疾篤怦不解衣厯年形貌頓瘠幾至殞滅父卒廬墓􅀒土成墳朝夕號慟有紫芝產墓側龍朔中刺史封道洪改其閭為南陔里張柬之為記子恭先孫仁恕皆有孝行席豫字建侯襄陽人年十六擢上第太平公主聞其名將表為諫官豫恥汚遁去俄舉賢良方正異等累遷考功司員外郎進絀清明拜吏部侍郎典選六年拔寒遠士多至臺閣當朝推知人天寶六年進禮部尚書以使者按行江南江東淮南南方俗死不葬豫敎以埋斂明列科防俗為之改豫清直無欲當官不為權􅀔撼卒諡曰文弟晉亦以文名當時孟浩然襄陽人少好節義喜拯人患難隱鹿門山年四十乃遊京師嘗於太學賦詩一座嗟伏無敢抗張九齡王維雅稱道之採訪使韓朝宗約同至京師欲薦諸朝㑹故人至劇飲歡甚遂不赴杜甫字子美審言孫天寶十三年獻三大禮賦帝奇之擢右衞率府胄曹㕘軍㑹祿山亂天子入蜀肅宗立自鄜州嬴服奔行在為賊所得亡走鳳翔上謁拜右拾遺房琯敗陳濤斜罷相甫上疏救出為華州司功㕘軍棄官客秦州俄流落劍南依嚴武武表為檢校工部員外郎武卒客耒陽卒甫數遭冦亂挺節無所汚為歌詩傷時撓弱情不忘君人憐其忠云柳識字方明襄陽人工文章與蕭穎士元德秀劉迅相上下練理創端往往詣極當時作者服其簡拔柳渾字夷曠襄陽人天寶初擢進士第累官尚書右丞朱泚亂渾匿終南山賊素聞其名以宰相召渾羸服步至奉天改官散騎常侍貞元三年同中書門下平章事帝嘗擇吏宰畿邑而政有狀召宰相語皆賀帝得人渾獨不賀曰此特京兆尹職耳非陛下所宜帝然之渾瑊與吐蕃㑹盟渾曰吐蕃難以信結臣竊憂之後吐蕃劫盟將校皆覆帝天驚曰卿儒生乃知軍戎萬里情乎益禮異之渾清儉不營家產善屬文卒諡曰貞朱放字長通襄州人隱居剡溪貞元初召為拾遺不就有詩一卷鮑防字子慎襄陽人代宗時屢遷太原節度使人樂其冶詔圖形别殿貞元元年策賢良方正得穆質柳公綽崔邠等世美防知人卒贈太子少保諡曰宣防工詩與中書舍人謝良弼友善時稱鮑謝云皮日休字襲美襄陽人咸通八年進士崔璞守蘇辟軍事判官入朝授太常博士後為黃巢所殺日休工詩與陸龜􅀩齋名號皮陸馮行襲武當人以謀勇稱中和初鄉豪孫喜聚衆謀攻城行襲伏士江澳誘喜斬之劉巨容表為均州刺史李茂貞養子繼臻據金州行襲攻破之昭宗授行襲金州防禦使楊守亮將襲京師道金商行襲逆戰破之就擢戎昭軍節度使宋張巨源襄陽人五世同居詔旌門巨源素習法律太平興國中賜明法及第劉芳襄州人五世同居詔旌門淳化四年來賀夀康節賜進士出身常元紹襄州十世同居真宗時旌表仍蠲其課調張士遜字順之乾德人淳化進士厯知射洪襄陽邵武縣以寛厚得民真宗時充河北轉運使河侵棣州詔徙州陽信糧多不可遷士遜貸粟於瀕河數州期來歲輸陽信公私利之仁宗時同中書門下平章事康定初士遜言禁兵久戍邊其家有不能自存者帝命出内藏緡十萬賜之致仕卒諡文懿士遜持正寛厚人有挾怨誣訐執政諫官者恒於帝前解免之被搆陷者多獲保全子友直字益之仁宗令館閣讀書累遷知越州州民每春歛財大集僧道士女謂之祭天友直下令禁絶取所斂財建學以延諸生弟友正字義祖居小閣學書足不出户積三十年不輟遂以書名歐慶字貽孫光化人以通三禮出身居官廉平宗族􅀌幼者皆養於家及卒歐陽修為表其墓戴國忠光化人慶厯進士官屯田郎中歐陽修稱其忠信篤於朋友孝弟孚於宗族禮義達於鄉里張問字昌言襄陽人進士起家通判大名府羣牧地冒入於民有司按籍括之持詔書奪民田至毁室廬發邱墓問以為非朝廷意具狀以聞仁宗立罷之擢河北轉運使所部地震河決議欲調民三十萬築隄問言隄未能為益勞民非計神宗從之熙寕末知滄州獨不行新法累官正議大夫米芾字元章襄陽人厯官知無為軍召為書􅀞學博士為文奇險不蹈襲前人妙於翰墨沈著飛翥得王獻之筆意畫山水人物自名一家尤工臨移至亂真不可辨官至知淮陽軍子友仁字元暉力學嗜古亦善書畫世號小米仕至兵部侍郎敷文閣直學士張嵲字巨山襄陽人宣和三年上舍選中第紹興五年召對嵲言荆襄夀春當擇良將勁兵戍守其地除秘書省正字六年地震嵲奏請薄賦安民再遷著作郎請擇儒臣為川蜀荆襄帥九年除司勲員外郎金人敗盟詔命兩省卿監郎曹各草檄以進獨取嵲所進者播之四方升實錄院修撰論王德擅退軍不當授承宣防禦使封還詞頭官至敷文閣待制李道光化人紹興三十一年為荆南都統金將劉萼入光化道率鋭卒至􅗔湖與萼對壘無日不戰萼毁光化屋作船栰以渡江道率衆下水鏖戰盡奪船栰遂復光化孟宗政字德夫􅀥陽人豪偉有膽畧開禧中金兵逼襄鄧宗政率義士奪其輜重累官京西鈐轄駐劄襄陽金兵至棗陽趙方檄宗政援之午發峴首遲明抵棗陽馳突如神金兵宵遁差權棗陽軍初視事一愛僕犯新令立斬之軍民股栗於是築隄積水修治城堞簡閲軍士金兵圍城厯三月大小七十餘戰宗政身先士卒金兵奔潰額爾克攻棗陽百方守禦血戰十五陣額爾克棄帳走宗政出兵拔湖陽縣燔燒積聚夷蕩營砦金人自是不復窺襄漢中原遺民來歸者以萬數宗政發廩贍之為給田創屋與居籍其勇壯號忠順軍俾出没唐鄧間威振境外卒之日邊城為罷市慟哭額爾克譯見前孟珙字璞玉宗政子從父在行間屢建策立功累遷京西副將總忠順軍紹定元年創平堰於􅀥陽建通天槽八十三丈溉田十萬頃立十莊三轄使軍民分屯歲收贍裕未幾為京西兵馬鈐轄斬鄧賊武天錫破金將武仙擢江陵府副都統制端平元年與元兵破蔡州滅金帥師至東京謁陵二年授主管馬軍司公事駐黃州朝辭帝問和議對曰臣介胄之士當言戰不當言和元兵北攻詔珙往援累戰皆㨗復郢州荆門襄陽珙䇿元兵必道施黔以透湖湘乃遣兵屯峽州歸州以弟瑛駐施州弟璋駐澧州以禦之進四川宣撫使大興屯田元兵至珙下令不許棄寸土權開州梁棟棄城斬以狥由是諸將禀令惟謹後鎮江陵卒諡忠襄珙忠君體國與人一以恩意撫接其學䆳於易著警心易贊石潨光化人博通古今其詩淡泊時出偉麗有滄浪集官至朝散郎張惟孝字仲友襄陽人通春秋工騎射開慶元年至江陵宣撫姚希得奇其才羅致之時鼎澧五州甚危惟孝擊鼓耀兵不數日衆至萬人數戰俱㨗江上平制置使吕文德招之不就而遁元金希説襄陽人博通經史善屬文官至内臺御史弟希舜亦有才名陶元榦襄陽人淹貫經史尤明易理嘗注易世稱為陶易明蘭以權襄陽人博學能詩洪武初以才選授中書省照磨時廣西未靖遣以權撫之至則宣布德威獠人感化未幾升應天府尹以端謹稱任亨泰襄陽人少穎悟洪武中擢進士第一厯官禮部尚書太祖重其學行每呼襄陽任而不名出使安南為蠻􅀖所重陳讓穀城人洪武舉人授刑部主事讞獄明允改御史尋擢刑部郎中以公廉稱廖昇襄陽人早以學行知名洪武中為左府斷事擢太常少卿建文元年修高帝實錄燕師渡江昇慟哭與家人訣自縊死本朝乾隆四十一年賜諡忠節李文郁字允實襄陽人由貢生授敎諭永樂中累遷户部侍郎佐夏原吉治河未幾坐事謫遼東二十年洪熙初召為通政㕘議性介直持守堅正久處患難不移其志王忠字克誠襄陽人永樂中襲寛河衞千户扈從北征先登戰殁於三岔口贈都督王訥穀城人永樂進士授高唐知州敎稼穡新學校均租賦省刑罰值歲荒賑救多所全活秩滿父老詣闕懇留宣宗經其地聞訥善政嘉之賜以金綺宋祐襄陽人天性至孝母病刲股及殁水漿不入口者累日啜粥者十有五年待諸弟極友愛子釗亦以孝聞杜衡南漳人居家孝友父卒廬墓三年景泰初任楚雄府推官持已廉潔決獄平恕秩滿致仕行李蕭然曹璘字廷輝襄陽人成化進士厯官御史孝宗時抗疏勸講學行孝凡十事悉嘉納之出按兩粤遠近肅清訪陳獻章於新㑹服其言論引疾歸卜居山中三十年不入城市徵召皆不應王炎字良璧棗陽人成化進士厯官御史巡按蘇松釐姦剔􅁦吏民懾服後以直諌杖斃囊無贏帛椑衾不備合臺共相佽助始克舉喪李端字表正棗陽人成化進士官御史剛毅質直中官汪直憾之誣以事下錦衣獄謫永寕經厯後遷温州知府有善政王凝字道甫宜城人嘉靖進士充裕府講讀時穆宗在青宫起居不慎凝獨正色直諌穆宗每優容之後巡撫雲南綏懷遠近滇人比之王恕宋鼇光化人以貢生為建平縣丞倭入㓂上官檄鼇禦之追至上海城陷死張鸞均州人性孝友嘗讓產於兄子嘉靖中以貢生為葉縣丞有惠政嘗植柳於官治人稱張柳韓應龍字五雲光化人萬厯舉人授南平令累升長蘆運使歸里值李自成㩀襄不屈自縊死本朝乾隆四十一年賜諡節愍邱瑜字德如宜城人天啟進士崇禎中厯官少詹事襄陽陷瑜上卹難宗擇才吏旌死節停催徵蘇郵困禁勞役六事洊升東閣大學士後被賊執不屈死賊陷襄時瑜父民忠妻龔氏媳廖氏女二俱被執不屈死子之陶偽降於賊蠟書與孫傳庭謀為内應事泄遇害一門死難共七人民忠之陶俱於本朝乾隆四十一年予祀忠義祠方岳貢字禹修穀城人天啟進士崇禎初出守松江築沿海石隄及倉城擢山東副使督漕運吏部尚書鄭三俊舉其廉能晉副都御史十六年人政府後與邱瑜同殉難兄岳朝萬厯中知昭化縣以茂績著聞􅅦關九江有廉名常存畏榖城人天啟舉人崇禎中赴㑹試為流賊所執欲劫為首領罵不絶口死本朝乾隆四十一年予祀忠義祠蔡思繩字孺思襄陽人由貢生官羅平知州歸值流㓂陷城死之時同縣宋大勲以福州通判家居亦殉難本朝乾隆四十一年俱賜諡節愍徐澤字兌若崇禎進士知遵義縣獻賊陷城死之本朝乾隆四十一年賜諡節愍李世儒穀城人流賊作亂世儒負母避兵山巖為賊所逼令棄母隨營世儒徒跣􅀒母如故遂被害李友竹字靖節均州人事繼母以孝聞闖賊陷城死之本朝乾隆四十一年予祀忠義祠本朝李藻􅀥陽人順治初以守城死難無子妻趙氏亦守節有司旌其門王謹微字堯錫襄陽人康熙癸未進士授銅仁知縣縣處邊徼民被􅁈抑者無所控告謹微得其實為申雪之上官嫌其屢翻成案遣人密訪畧無私意但聞百姓感頌聲乃器重之旋以老乞休朱錦標均州歲貢康熙間官湖南耒陽縣訓導著四書直解入祀鄉賢蘇大有字元亨襄陽人由行伍累官至古州鎮總兵雍正六年丹江生苗梗化大有率將備攻克賊寨甚多丹江以平貴州清水江九股生苗及古州降苗聚處數萬大有撫馭有方苗民畏服其臨陣身先士卒與共甘苦八年以積勞成疾卒賜祭葬予祀賢良祠蔡成貴襄陽人雍正中由行伍累官至安籠總兵􅁹八達寨逆猓顏光色等又􅁹鄧横寨苗擢雲南提督以陣亡士卒家口無資乃請以大理城外三十里草廠募民開墾收租以養贍之並請恩免科糧營中􅀌寡實沾其惠以老致仕劉宇廣南漳人父榮知醴泉縣緣事戌遼左宇廣生於戍所及長艱苦備嘗鬻身贖父罪奉父南旋色養盡孝乾隆十四年旌衞逵南漳人性至孝為里黨所推公舉被旌龍在天穀城人事父母盡孝鄉里無間言與同邑宋玉階均於乾隆年間旌張楚龍襄陽人乾隆四十年以把總從征金川陣亡嘉慶六年補給恩騎尉世職趙先寅襄陽人年一百十一歲五世同堂乾隆四十五年予旌並賜御筆扁額吳珍宜城人由歳貢生官保康訓導嘉慶元年敎匪掠境珍罵賊被害其子生員先登連登傳刃自刎死流寓漢杜根潁川定陵人永初元年為郎中時和熹鄧后臨朝權在外戚根以安帝年長宜親政事乃與同時郎上書直諫太后收執根等令盛以縑嚢於殿上撲殺之執法者私語行事人使不加力根得蘇因逃竄為宜城山中酒家保積十五年酒家知其賢厚敬待之及鄧氏誅左右皆言根之忠方歸鄉里潁容陳國長平人初平中避亂荆州聚徒千餘人劉表以為武陵太守不肯起著春秋左氏條例五萬餘言丁蘭河内人寓居南漳少喪父母不得奉事乃刻木為人髣髴親形事之若生每事必告焉趙戩長陵人客於荆州劉表厚禮焉及曹操平荆乃辟之執戩手曰恨相見晚三國漢諸葛亮琅琊陽都人從父元與荆州劉表有舊將亮及弟均往依之元卒亮躬耕隴畝好為梁父吟自比管仲樂毅先主屯新野徐庶薦之先主遂詣亮凡三往乃見屏人與語先主善之於是情好日密先主曰􅀌之有孔明猶魚之有水也南北朝魏薛憕汾陰人曽祖避地襄陽憕少􅀌躬耕養祖母暇則覽文籍未嘗登世祿之門孝昌中還洛陽唐甄逢無極人父濟為襄陽㕘謀因家宜城逢少􅀌及長耕宜城野自力讀書不謁州縣歲饑節用以給親里大穰則賑其餘於鄉黨貧狹者朋友有緩急輒出家貲周贍以義聞逢以父濟不汙祿山偽命名未在國史欲詣京師自言元微之移書史館修撰韓愈愈答書褒之錢徽吳興人第進士後居穀城穀城令王郢以財貨饋遊士坐是得罪觀察使樊澤視其簿獨徽無有乃表署掌書記澤卒周澈主留事吝賞徽頒衣絮於軍衆大悦宋胡旦渤海人以秘書少監致仕後居襄州既喪明猶令人誦經史隱