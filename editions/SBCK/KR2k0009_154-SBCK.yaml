撫使政尚寛大請蠲抑民買鹽名色不報李孟傳上虞人開禧中提舉福建常平閩大饑發廪勸分民無流莩嘉定初就遷提􅀧刑獄徐鹿卿豐城人嘉定中辟福建安撫司幹辦公事會汀邵寇作鹿卿贊畫備禦凡避寇入城者多方賑濟全活甚衆趙必愿宋宗室居餘干汝愚孫淳祐初以華文閣直學士知福州兼安撫使樂忠信旌賢士奬高年藹然有惻怛之實尤留意武備區畫海防修水戰法徐經孫豐城人淳祐中提􅀧福建刑獄號稱平允歲餘升安撫使湯漢安仁人寶祐中提舉福建常平介潔有守劾福州守史嵓之泉州守謝􅌫洪天錫晉江人咸淳初為福建安撫使亭戸買鹽至破家隕身者天錫首罷之並罷荔枝貢陳文龍莆田人益王時漳州叛以文龍為閩廣宣撫使討之文龍以黄恮前守漳有恩信辟為㕘謀使入招撫之恮至民皆頓首謝罪元徹凌􅀩古人至元中為福建行省平章政事平汀漳劇盜歐狗號令嚴肅秋毫無犯徹凌舊作徹里今改正王惲汲縣人至元二十六年授福建閩海道提刑按察使黜官吏貪汚不法者凡數十人察繫囚之􅁈滯者決而遣之戒戍兵無得寓民家而創營屋以居之程鉅夫建昌人至元三十年為閩海道肅政亷訪使興學明教吏民畏愛之烏古遜澤臨潢人至大元年為福建亷訪使有德於閩閩人安之有芝五色產於憲司之澄清堂士民以為善政所致烏古遜澤舊作烏古孫澤今改正呼圖克特穆爾􅀩古人一名劉漢卿延祐三年大臣以浙東倭奴商舶貿易致亂奏遣漢卿宣慰閩浙撫戢兵民海陸靜謐呼圖克特穆爾舊作虎都鐵木祿今改正達爾瑪高昌人泰定元年為福建亷訪使朝廷遣宦官伯顔催督繡緞横取民財宣政院判官卓琳亦取賂於富僧達爾瑪皆劾之達爾瑪舊作答里麻卓琳舊作术麟今並改正拜特穆爾蒙古人至正中為福建行省左右司郎中治福州明兵至城下拜特穆爾知不可守引妻妾坐樓上慷慨謂曰丈夫死國婦人死夫義也今城且陷吾必死於是若等能從吾乎皆泣曰有死而己無他志也縊而死者六人有十歲女度其不能自死則紿之曰汝稽顙拜佛庶保我無恙也甫拜即挈米囊壓之死乳媪抱其幼子旁立以泣拜特穆爾熟視之歎曰父死國妻死夫妾與女從父者也汝三歲兒於義何所從乎為宗祀計可也乃命媪抱匿旁舍而斂金珠畀之曰即有緩急可以此贖兒命有頃兵入城即舉燈燃四圍窗自焚死拜特穆爾舊作柏帖穆爾今改正陳友定歸化人元末應募從軍為黄土寨巡檢屢破羣盜積官福建行省平章時天下大亂羣雄各自割據友定遂據有全閩歲由海道轉粟燕京事元不失臣節後明太祖遣將克其地友定自縊頃之復蘇執至金陵終不屈死明陶垕仲鄞縣人洪武中為福建按察使舊多滯獄吏夤緣為奸垕仲按誅贓吏數十人夙弊頓革興學勸士撫卹軍民帝下詔褒異魯穆天台人宣德中為福建僉事理􅁈滯摧豪强毁淫祠民間呼為魯鐵面伍驥安福人天順中巡按福建時上杭賊起驥單騎詣賊壘諭以禍福賊感悟泣下歸附者千七百餘户賊首李宗政􅀒固不服率兵破平之卒於官軍民哀之子希閔亦官福建僉事兩平上杭寇民德之附祀驥祠何喬新廣昌人成化中為福建副使浙寇千餘人盜夀寕銀礦所過剽掠喬新募兵擊之擒其魁福安寕德銀礦久絶有司責課民多破產喬新以為言減三之二興化民自洪武初受牛於官至是猶歲課其租為奏免之吳洪吳江人宏治中為福建按察使明恕清白數辨疑獄武將有以珠犀走間道餽者堅却之建寕延平民饑便宜發粟以賑汀漳軍餉缺急取征商之羨給之軍以無譁姚鏌慈谿人正德中任福建副使值山寇焚掠邵武之建寕鎮籍被兵者萬餘家瘡痍獲甦署臬篆討汀州大帽山賊平之改授提學講求古禮延名儒分教諸郡縣修閩中諸大儒書院諸生立祠祀之舒芬進賢人正德中以修撰諌南巡謫福建市舶司副提舉先是成化初修撰羅倫亦以諫謫是官士大夫立兩賢祠合祀焉胡文靜山隂人正德中巡按福建平海寇王宏瑀獲其渠魁山寇詹師富嘯聚剽掠騷擾閩浙粤東三省文靜設計擒獲民賴安枕巡撫王守仁上其功擢南光祿寺少卿胡鐸餘姚人正德中為福建僉事分巡建寕興教化辨冤抑巡按御史列其善政二十條以聞於朝就遷提學副使教士先理學特嚴朱陸之辨諸生化之謝汝儀鄞縣人嘉靖中為福建僉事擒劇賊李良武表名儒周瑛陳真晟為立祠置田進副使攝按察使事辨出漳州民陳大淵莆田民陳仰亨等冤獄時稱其能汪道昆歙縣人嘉靖中由福建藩臬進巡撫籌畫軍事首議餉次議兵三議責成四議事任宿將如俞大猷戚繼光輩皆專倚而推轂之轅門士伍待以殊恩咸感激爭奮遂破呉平夷龍頭寨殲楊一蘇阿普餘黨倭患以平項喬永嘉人嘉靖中為福建僉事嘗決五年大獄不徇人可否劇賊莆鐵古等久為亂督兵討平之王時槐安福人嘉靖中官福建僉事上杭流民據險為亂時槐單騎往諭衆感悟斬其魁出降為置城建吏其地始安倭陷詔安時槐攻復其城賊逼漳浦又連勝之賊遁去粤賊王子文流刦至境先所撫上杭民德時槐為擊走之境内獲全何維柏南海人嘉靖中巡按福建歲祲發倉賑卹多方存活㑹劾嚴嵩被逮士民闌道泣送之譚綸宜黄人嘉靖中以右僉都御史巡撫福建時倭寇攻陷城縣猖獗甚綸環柵斷路賊不得出復親勒兵布陣薄賊壘破之遂復一府二縣又考舊制建水砦五控扼海口薦戚繼光為總兵以鎮守之屢破巨寇境内悉定屠僑鄞縣人嘉靖中為福建左布政使入覲不攜一物所部屬吏無敢以苞苴至者俞大猷晉江人嘉靖中由武進士授汀漳守備厯廣東都司僉書改浙東㕘將進總兵以功加都督僉事緣事削職㝷復用為南贛副總兵適倭寇攻興化大猷與戚繼光􅁹克之復升都督同知佩征蠻將軍印後以都督僉事為福建總兵未幾乞歸卒贈左都督諡武襄戚繼光登州人嘉靖四十一年倭寇大犯福建繼光時為浙江㕘將奉檄至攻破横嶼直擣牛田餘賊走興化繼光銜枚亟追夜克十六營焚斬畧盡旋師還浙尋興化復陷乃命為副總兵與俞大猷劉顯合擊之賊平論功居首代大猷為總兵倭屯仙遊戰敗趨同安追殲之與大猷合擊巨寇吳平平僅以身免繼光令嚴而信士無敢不用命者與大猷俱為東南名將金賁亨臨海人嘉靖中為福建提學副使立道南書院祀程顥楊時羅從彥李侗朱子又擇諸生有志者聚之養正書院相與推明洛閩微㫖教化大行子立敬亦為福建提學副使善教士能繼其父殷從儉臨桂人隆慶中以右僉都御史巡撫福建先時倭患急籍民為兵即勒民供餉其後歲增民坐困從儉力裁損悉復故額又革麾下遊擊及總兵所隸都指揮遣還客兵省餉數萬訓士出防督諸將以時出汛海濱晏然龎尚鵬南海人萬厯四年以右僉都御史巡撫福建奏蠲逋餉銀二十三萬推行一條鞭法於諸部總兵官胡守仁貪肆論罷之鄒維連新昌人崇禎初以右僉都御史巡撫福建討平海寇劉香海外紅夷襲陷厦門發兵擊走之振紀綱明賞罰斥貪殘勞績甚著曾櫻峽江人崇禎初以右㕘政分守漳南討平九蓮山寇士民為建祠以憂歸服闋起故官分守興泉二郡􅁹平海寇劉香進按察使分巡福寕道弛海禁收其租充兵餉公私交利施元徵無錫人崇禎中爲福建興泉道清介礪名節悉心爲民撫輯皆有實政仙遊巨寇猖獗率兵力戰破之擒賊渠曾旺等不妄殺一人本朝張存仁漢軍鑲藍旗人順治三年總督閩浙時閩始歸命百務草創存仁多方拊循兵民戴之佟國鼐漢軍正藍旗人順治三年巡撫福建招徠百姓禁飭兵馬備著勞績時巡按周世科專用嚴刑國鼐濟以寛仁多所全活周亮工祥符人順治四年任福建按察使擢本省右布政􅁹平邵武延平諸劇賊鄭成功據厦門率衆來攻亮工繕軍需鳩民兵固守前後兩署督學兼攝兵道海道並以才能顯陳錦漢軍正藍旗人順治五年總督閩浙延平有將軍寨俯瞰順永將沙四邑延袤數郡險峭特甚寇爲巢穴錦起四邑民兵壘土填坑高與寨齊乘以登陴克之賊遂平以次收復福州興化諸郡縣漳平圍急錦提師赴援夜次同安爲刺客所害事聞贈兵部尚書祀昭忠祠佟國器漢軍正藍旗人順治八年任福建布政使十年擢本省巡撫閩自明季戸口散失吏胥挪移作奸里民大困國器履畝受糧積困乃甦征􅁹海寇飛芻輓粟剋期猝辦又累疏陳請撥給淮浙鹽餉協濟軍食簡選將士􅁹殺賊首劉希亮等招撫安插山寇悉平閩人至今頌其功宜永貴漢軍正白旗人順治十二年巡撫福建海寇猝薄城下時大兵悉赴清漳城中騎士僅數十永貴病瘻力疾登城率士民固守又募兵分出七門接戰每多殺獲寇三薄城皆計却之捍禦匝月圍卒解以年老致仕卒康熙五年追敘其功進三等男世襲范承謨漢軍鑲黄旗人康熙十一年總督福建時凋瘵之餘百務廢弛兼耿逆已蓄異志奸宄擾攘承謨多方經畫凡所爲弭亂消釁綢繆保固計者備至巡撫劉秉政爲賊腹心紿承謨入脅以同事承謨憤烈詆罵遂被拘繫絶食求死不得三載蓬首垢面百折不囘著􅀩谷自序百苦吟武夷歌以見志賊勒殺之事聞贈太子少保兵部尚書諡忠貞祀昭忠祠百姓建祠於道山之麓幕下嵇永仁王龍光沈天成及其弟范承譜同不屈死子時崇為福建按察使明允哀矜慈而善斷士民並祀之道山吳萬福漢軍鑲紅旗人順治十五年授福寕總兵福寕稱巖險海寇為患萬福駐鎮􅁹撫兼施盜賊屏息威名大振康熙中耿精忠叛發兵力拒為賊所殺闔門死之贈太子少保諡忠愍祀昭忠祠陳啓泰漢軍鑲紅旗人康熙八年任巡海道駐漳南時山寇徧受偽劄啟泰嚴申保甲反側者無所容耿逆變起啟泰度力不支語妻劉氏曰事不可為矣惟有一死以報朝廷劉氏曰君為忠臣妾獨不能為烈婦乎遂自經妾與婢女俱從縊同日死者三十餘人乃出公堂召諭諸屬吏曰􅀌城無援難以固守吾受國厚恩義不與此賊俱生從容具公服北向再拜自經死贈工部侍郎諡忠毅祀昭忠祠王進鎮江人原任福建城守副將還居江南總督范承謨招之來閩即遇耿變與張瑞午等同謀内舉事洩為賊縊死段應舉漢軍鑲藍旗人康熙十三年為隨征福建提督十七年海寇犯漳州率將士往援退守海澄賊兵雲集攻陷縣城應舉與副都統穆和林自經死事聞祀昭忠祠姚啟聖漢軍鑲紅旗人康熙十三年為福建布政使閩自耿逆肆殘民不堪命啟聖輕徭賦與民休息每自備衣糧召募壯勇有澄清海外志十七年擢福建總督遂毅然以平海外為己任移駐漳州開招徠館泉州人施琅習水戰熟悉海上情形疏請授為大帥與琅決策從平海進兵克澎湖鄭克塽率衆降由是閩海烽煙永靖百姓安堵㝷以病卒於官士民立祠於洪江滸肖像祀之郎廷相漢軍鑲黄旗人康熙十五年為福建總督時逆變初定餘孽尚熾廷相􅁹撫互用出奇制勝旬月之間沿海諸郡次第悉平滇逆遣偽將軍韓大任等由江右入寇廷相遣官詳諭利害大任感泣輸誠閩境帖然王國泰蓋平人初為福州同知又佐泉州府俱有惠政康熙十六年遷本省驛傳道㑹耿逆甫平海氛尚熾軍興旁午辦應有方泉州告警傾囊召募壯勇授以衣糧甲仗身先士卒奮呼擊賊賊大潰圍遂解王育賢漢軍正黄旗人康熙十七年任興泉道海寇圍泉州育賢日夜為戰守具與士卒登陴守禦不解甲者四十餘日徒跣築垣躬操畚插聞援師將至單騎自臨衢巷徧慰父老皆感泣流涕以勞瘁卒泉人設主於崇陽樓祀之汪楫休寕人儀徴籍康熙三十二年為福建按察使莅任甫三日即逢熱審楫剖析大獄五十餘案一如親見復省釋坐誣逮繫者八十餘案囹圄幾空閩省稅糧不敷