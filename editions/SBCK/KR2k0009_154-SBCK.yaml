body:
  text: 大清一統志福建統部在京師南六千一百三十里東西距九百五十里南北距九百八十里東至海一百里西至江西寕都州瑞金縣界八百五十里南至海二百八十里北至浙江處州府龍泉縣界七百里東南至海二百八十里西南至廣東嘉應州界一千二百里東北至浙江温州府平陽縣界五百十五里西北至浙江衢州府江山縣界八百二十五里其臺灣一府在省東南海島中東距大山與生番接界分野天文牽牛須女分野星紀之次後漢書郡國志注自斗十一度至婺女七度一名須女曰星紀之次於辰在丑謂之赤奮若於律為黄鍾斗建在子今呉越分野晉書天文志自南斗十二度至須女七度為星紀呉越分野屬􅀭州唐書天文志東南􅀒海為星紀􅀒海者以其雲漢之隂也南斗牽牛星紀也初南斗九度中南斗二十四度終女四度為星紀之分古吳越及東南百越之國通志牽女跨浙粤閩三省臺灣西界於漳南鄰於粤而北則與福州之閩安鎮相峙漳分野視閩而粤之分野視漳臺之繡壤相錯其均屬之牛女無疑也建置沿革禹貢揚州南境周為七閩地周禮職方氏七閩鄭注閩蠻之别也春秋屬越戰國屬楚史記楚威王敗越殺王無彊越以此散諸族子爭立或為王或為君濱於江南海上服朝於楚秦併天下置閩中郡漢高帝五年為閩越國史記東越傳閩越王無諸其先勾踐之後秦併天下廢為君長以其地為閩中郡無諸從諸侯滅秦率越人佐漢漢五年立為閩越王王閩中故地都東冶建元六年立丑為越繇王奉閩越先祭祀立餘善為東越王與繇王並處元封元年國除為冶縣屬會稽郡後漢永和六年置會稽南部都尉按前漢志南部都尉治回浦沈約宋志後分冶縣地置東南二部都尉蓋後漢始改置於冶縣也三國吳永安三年分會稽南部置建安郡晉太康三年分置晉安郡皆屬揚州元康元年改屬江州宋泰始四年改晉平郡七年復故齊因之梁天監中析晉安郡置南安郡普通五年三郡並屬東揚州陳永定初置閩州領三郡天嘉六年州廢光大二年升晉安郡爲豐州領建安南安二郡隋開皇九年改爲泉州廢建安南安二郡爲縣大業初復改泉州爲閩州三年廢閩州仍置建安郡唐武德初廢郡置建州六年仍置泉州八年置泉州都督府垂拱二年增置漳州久視元年又置武榮州景雲二年改閩州都督府時改泉州為閩改武榮州為泉督閩泉建漳潮五州開元十三年改福州都督府二十一年置福建經畧使二十四年增置汀州割潮州入嶺南仍督五州天寶元年自嶺南割屬江南東道唐書方鎮表乾元元年改經畧使為都防禦使兼寕海軍使上元元年升節度使大厯六年廢為都團練觀察使乾寕四年置威武軍節度使五代史光啟二年王潮克泉州福建觀察使陳巖表以潮為泉州刺史景福元年巖卒潮攻克福州即以為觀察使乾寕四年潮卒弟審知代立唐以福州為威武軍拜審知為節度使五代初為王氏所據後唐天成元年王延翰建閩國五代史梁初封審知為閩王升福州為大都督府唐同光三年審知卒子延翰代立四年自建閩國稱王其弟鏻尋殺延翰自立長興四年僭號改元清泰二年鏻被殺子昶代立晉天福四年國人殺昶立審知少子曦八年曦弟延政自立於建州建國稱殷改元國分為二晉開運二年南唐滅閩三年福州分屬吳越五代史開運元年國人殺曦二年南唐兵執延政分置劍州三年福州將李仁達降吳越宋太平興國三年置兩浙西南路四年置興化軍五年增邵武軍雍熙二年改福建路宋史志領福建泉漳汀劍六州興化邵武二軍景德三年置安撫使大觀元年升為帥府四年罷紹興三十二年升建州為建寕府建炎三年復升安撫使為帥府景炎元年升福州為福安府元至元十五年置行中書省二十二年罷屬江浙行省元史志至元十四年置行宣慰司兼行征南元帥府事於泉州十五年改為行中書省十八年遷於福州十九年復遷泉州二十年復遷福州二十二年併入杭州大德元年置福建道宣慰使司都元帥府元史志領福州建寕泉州興化邵武延平汀州漳州八路三山續志至元十五年置行省於福州十六年改置宣慰使司二十年復置行省二十二年併入江西行省二十三年復置明年呚行尚書省二十八年仍併入江西二十九年仍置行中書省大德元年立福建平海行中書省徙治泉州三年改置宣慰使司都元帥府仍移治福州黄仲昭通志曰三山續志修於元致和間一代典籍尚存必有所據當以為正至正十六年復置行中書省二十六年罷通志改置行樞密院尋為陳友定所據明洪武二年置福建行中書省九年改置福建承宣布政使司統八府福州興化泉州漳州延平建寕邵武汀州一州福寕本朝因之為福建省康熙二十三年海島蕩平以其地置臺灣府雍正十二年升福寕直隸州為福寕府永春龍巖二縣為直隸州永春舊屬泉州府龍巖舊屬漳州府凡領府十直隸州二福州府興化府泉州府漳州府延平府建寕府邵武府汀州府福寕府臺灣府永春直隸州龍巖直隸州形勢東南據海東北自浙江温州府界西南至廣東潮州府界大海環二千里西抵江廣閩西北境與江西建昌府西境與贛州府西南境與廣東潮州府相脣齒北距嶺嶠自浙江衢州處州而南江西廣信建昌贛州而東南皆崇山結曲故閩亦稱嶠外地其名山則有武夷在建寕府崇安縣南三十里梁山在漳州府漳浦縣西南三十里太姥在福寕府東北一百里福鼎縣界其大川則有建江亦曰建溪又曰劍江源出浦城縣北漁梁山南流經縣西又南至建陽縣雙溪口合崇安溪水又南經建寕府城西遶而南松溪水自東北來會亦曰東溪又南經延平府城東南與西溪水會又東南至尤溪口尤溪水自西南來注之又南經古田縣界又東南至水口又東至閩清口又