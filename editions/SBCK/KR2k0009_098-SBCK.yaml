body:
  text: 秦州直隸州在甘肅省東南七百三十里東西距二百九十里南北距四百五十里東至陜西鳳翔府隴州界二百里西至鞏昌府伏羌縣界九十里南至陜西漢中府畧陽縣界二百四十里北至平涼府隆德縣界二百十里東南至陜西漢中府鳯縣界三百十里西南至階州界三百五十里東北至平涼府華亭縣界二百五十里西北至鞏昌府通渭縣治一百八十里本州境東西距一百九十里南北距一百八十里東至清水縣界一百里西至伏羌縣界九十里南至徽縣治一百五十里北至秦安縣界三十里東南至徽縣治二百八十里西南至鞏昌府西和縣界七十里東北至清水縣界一百里西北至伏羌縣治一百二十里自州治至京師三千七百十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢雍州之域古邽戎地秦置邽縣漢曰上邽屬隴西郡後漢屬漢陽郡晉為天水郡治太康七年兼置秦州晉書地理志秦州魏始分隴右置中聞廢泰始五年又置秦州鎮冀城太康三年罷七年復立鎮上邽後魏改縣曰上封仍為州郡治後周置總管府隋初郡廢縣復曰上邽大業初府癈改州為天水郡唐武德初復曰秦州置總管府開元二十二年州移治成紀以上邽屬之天寶元年還治上邽改為天水郡乾元元年復曰秦州屬隴右道寶應二年陷於吐蕃大中三年收復為上邽鎮屬秦州時州移治成紀五代後唐長興元年移清水縣於此宋復移置成紀縣及秦州天水郡雄武軍節度屬陜西路慶厯元年於州置秦鳳路金初曰秦州皇統二年屬熙秦路大定二十七年屬鳳翔路元光二年升爲鎮遠軍元仍曰秦州屬鞏昌路明洪武初省成紀縣入州屬鞏昌府本朝雍正七年以州直隸甘肅省移鞏昌府之秦安清水禮縣三縣隸焉又改鞏昌之徽州爲縣與所轄兩當縣並來屬領縣五秦安縣在州北八十里東西距一百十里南北距六十里東至清水縣界四十里西至鞏昌府通渭縣界七十里南至本州界三十里北至平涼府隆德縣界三十里東南至清水縣界七十里西南至鞏昌府伏羌縣界六十里東北至隆德縣界六十里西北至平涼府靜寕州界八十里漢置改屬秦州形勢西倚天門東扼隴坻南連嶓冢北接鳳凰為蘭河之中堅關隴之重鎮通志南通巴􅈎北控朝那山有嶓冢隴坻之秀水有漢漾渭藉之美州志風俗地本膏腴民事耕殖元統志重然諾􅀒氣節舊志樸茂質實勁直强毅猶存古風而流弊或懻忮忿爭耗財廢業州志城池秦州城舊有東西二城明洪武初因西城址築大城周四里有奇門四濠深一丈二尺大城之東為東關城門二大城之西為中城門二又西為西關城城形如鍾門四又西為小西關亦曰伏羲城門二四城皆與大城聯屬本朝順治十一年俱重築乾隆三十二年修門三惟北城無門秦安縣城周三里有奇門二濠廣三丈金皇統閒建本朝乾隆三十四年修嘉慶六年重修清水縣城周四里有奇門二明洪武四年築宏治中又築東西二郭濠深一丈本朝康熙二十四年修禮縣城明洪武初築土城成化九年展築西偏共周三里有奇門四濠深六尺徽縣城周四里有奇門四濠深一丈明初因舊址増築本朝康熙九年二十四年修乾隆三十二年五十二年重修兩當縣城周三里門四濠深一丈五尺明洪武初築隆慶閒展其址本朝康熙四十四年修乾隆三十四年重修學校秦州學在州治西南元大德六年建本朝康熙十四年修入學額數二十名秦安縣學在縣治東南元至正中建入學額數二十名清水縣學在縣治東南明嘉靖十九年建入學額數九名本朝乾隆六十年撥貴德廳學一名禮縣學在縣西城中明成化中建於錦屏山下本朝順治十三年遷此入學額數十二名徽縣學在縣治東明洪武初建入學額數十二名兩當縣學在縣治西明洪武中建在縣治東正德十年遷此本朝康熙乾隆閒屢修入學額數八名天水書院在州城東隅本朝乾隆二十七年建春雨書院在秦安縣舊名龍川書院本朝乾隆十八年建二十三年重建更名鷄川書院二十六年復更今名天嘉書院在禮縣本朝乾隆十一年建鳳山書院在徽縣署前舊名徽山書院本朝乾隆十四年建二十七年更名丹山書院在兩當縣治北户口原額民丁共三萬三百八十六屯丁共九千五百九十八今滋生民丁男婦大小共六十六萬六千七百九十名口屯丁男婦大小共二十萬二千一百五十八名口統計十六萬五百六十三户四賦田地共四萬七千七百六十六頃二畞七分有奇額徴銀共三萬五千一百五十三兩六錢六分九􅁵糧共一萬五千三十二石五升一勺山川龜山在州東四十里周五里中閒突起如龜背南臨渭水右濱清水其麓為社樹坪有阜自山南循藉水而西止於州東十里謂之沙隴石門山在州東一百里兩峯對峙如門四圍峭削中通一路吳砦山在州東一百八十里相傳宋吳璘嘗置寨於此山之麓有吳鎮為入南山採木之路有木廠又柏林山在州東七十里多産柏麥積山在州東南八十里後魏正始三年秦州主簿吕苟兒反梁州刺史李煥令石長樂由麥積崖赴援正光末隴右畔亂東侵岍岐李苗請固守隴東命偏將出麥積崖以襲其後周大都督李充信於南崖梯雲鑿道造七佛龕庾信為銘方輿勝覽山在天水縣東百里狀如積麥為秦地林泉之冠北為雕窠峪上有隗囂避署宫對面瀑布下注倉崖閒亦勝境也舊志在州東南八十里三面壁立高入雲際其南為香積山永川水出焉又南五十里接兩當縣界改龍山在州東南一百里下有改龍鎮即街子口其旁為仙人山亦名仙人崖有巖突出兩山閒其阿如屋燕子山在州東南一百十里有燕子關地多林木黨水出焉東流入嘉陵江東北二百里抵胡店有官軍防守又五十里界寶鷄秦嶺山在州東南三百里其山長而秀周數百里東聯鳳縣南界漢中又東有金門山五峯如呉岳有棧道通鳳縣翠屏山在州南二里亦名文峯上有文星臺其麓為石馬坪其右曰武峯山有古南山寺杜甫詩山頭南郭寺即此雲臺山在州南五十里下有稍子站筆峯山在州南一百十里有五峯蒼翠如削上多鸚鵡有薜蘿沿壁下垂如線赤峪山在州西南杜甫詩晨發赤峪亭艱險方自兹即此宋嘉定十年利州統制王逸復大散關及阜郊堡進攻秦州及赤峪口通志在州西南十里有水經其中寶峯山在州西南六十里其山挺秀高若摩空嶓冡山在州西南六十里漢書地理志西縣有禹貢嶓冢山西漢水所岀元和志在上邽縣西南五十八里鞏昌府志在州西南六十里南為分水嶺水南流為西漢水北流為赤峪河木門山在州西南九十里三國漢建興九年諸葛亮圍祁山以糧盡退軍司馬懿遣張郃追之進至木門蜀人乘高布伏郃中飛矢死水經注有木門谷水北流入藉水胡三省通鑑注木門谷在天水縣南十里鞏昌府志在州西南九十里與西和縣接界黒谷山在州西方輿勝覽在天水縣北五十里大山喬林連跨數縣有黒谷關紹興初郡守陳俊置以防秦鞏來路最為衝要按方輿勝覽山在天水之北則應在今州西界通志謂在西南一百里與西和及成縣接界恐誤崦嵫山在州西五十里鐵堂山在州西七十里方輿勝覽在天水縣東五里有石筍青翠長者至丈餘小者可以為礪舊志有盤龍山在州西七十里山有鐵鑪坡即鐵堂峽也其峽四山環抱中為鐵堂莊又西五里曰半坡山又西稍南五里曰中峪山其下為横河刑馬山在州西九十里接清水縣界山多林木路可行車迤南為固城山藉水出焉又六十里經小落門接寕遠界州志山深䆳連亙洮岷中為大南峪其水皆東北流入於藉天靖山在州西北二里上有玉泉邽山在州西北水經注渭水東厯上邽縣北邽山之陰九域志成紀縣有邽山通志大陽山在秦安縣東北寰宇記在隴城縣東北五十里有銀冶務大隴山在秦安縣東北元和志隴城縣有大隴山在縣東一百里隴山在清水縣東接陜西鳳翔府隴州界一名隴坂又名隴坻張衡四愁詩吾所思兮在漢陽欲往從之隴坂長説文隴山天水大坂也後漢書郡國志隴縣有大坂名隴坻辛氏三秦記其坂九􅂞不知高幾許欲上者七日乃得越高處可容百餘家下處容十萬户清泉四注而下郭仲產秦州記山東西百八十里登山巔東望秦川四五百里極目冺然山東人行役升此而顧瞻者莫不悲思其歌曰隴頭流水鳴聲嗚咽遙望秦川肝腸欲絶又曰隴頭流水分離四下念我行役蕭然曠野登高遠望涕淚雙墮其上有懸溜吐於山中匯於澄潭名曰萬石潭流溢散下皆注於渭隋書地理志清水縣有分水嶺元和志小隴山在清水縣一名隴坻又名分水嶺隗囂時來歙襲得畧陽囂使王元拒隴坂即此其上有水東西分流因號驛為分水驛東去大震關五十里上多鸚鵡又大隴山在隴城縣東一百里金史地理志清水縣有中隴山又隴城縣有大隴山通鑑注大隴山在清水縣東北通志關山在清水縣東百里即隴山也府志盤龍山在清水縣東五十里即大隴之支阜形若盤龍上有大震關又二十里為關山磅礴三百餘里巖岫重曡層層遞高其坂十八迴上者七十里至頂西下稍平按隴山延亙隴州鎮原清水諸州縣境其峯巒巖嶺隨地異名然其實一隴山耳自後魏以下始有大小之分水經注及元和志皆以小隴山為隴坂而大隴山不與焉今並著之亭樂山在清水縣東三十里有秦亭遺跡青巖山在清水縣東五十里山峯聳秀相接者有華葢山石多五色石洞山在清水縣東南五十里上有清崖洞洞門有巨石懸而不墜其下有泉筆架山在清水縣南七里有五峯分列與邽山相連牛頭山在清水縣西二十里南道河諸水㑹於此曰牛頭河月臺山在清水縣西北五里山形似月因名卧虎山在清水縣北一百里有靈湫禱雨輒應寶葢山在清水縣北一百五十里自大隴山分支而來高聳㟏岈頂平如葢因名赤土山在禮縣東三里土色如硃亦名紅土山山脈自寕遠界迤邐至此特起一峯絶頂有坪可容萬馬祁山在禮縣東四十里接西和縣界翠峯山在禮縣東南十五里山峯端秀如人拱立下有香水崖仙人洞諸勝相傳隗囂曽避暑於此雷玉山在禮縣南三十里有堡地形志蘭蒼縣有雷牛山疑即此十八盤山在禮縣西南寰宇記在大潭縣南一百二十里有十八盤路州志州東南有石門山亦十八盤而上約十里餘又元統志有伎倆山在大潭故縣西南六十里連城縣界岷峨山在禮縣西南一百里接岷州界高聳如岷峨因名又方輿勝覽有通靈山去大潭縣七十里四山環合二水縈流有清水巖水飛落如玉繩通志在西和縣西一百四十里今縣西南界莫遮攔山在禮縣西南一百六十里高出衆山四時積雪不斷鸞亭山在禮縣北五里有小泉泉出霧即雨舊志謂之高亭山九泉山在禮縣北二十五里麓有九泉因名聖湫山在禮縣北六十里捱城河出焉鳳凰山在禮縣東北五里舊嘗建學宫於其下一名錦屏山鐘樓山在徽縣城内明正德六年展築州城包山於内蒼坪山在徽縣東四十里古黃沙驛倉在焉又天池山在縣東七十里上有河池接畧陽縣界鐵山在徽縣南三十里懸壁萬仞石色如鐵其下二十里即虞關宋劉子羽曰蜀口有鐵山棧道之隘又呉曦以階成和鳳四州􅂌金表鐵山為界即此通志山形似巾亦名巾子山接溪山在徽縣南元和志在長舉縣西北五十三里岀硃砂百姓嘗採之桉長舉廢縣見畧陽伶倫山在徽縣西北一里巖壁盤旋如舞優狀故名方山在徽縣西北四十里接成縣界雞冠山在徽縣西北五十里綿亙而北與清水縣之小隴山相連土宜陶冶居民所資金蓮山在徽縣西北七十里高數十仞周圍有數十洞積草山在徽縣北四十里接成縣界杜甫詩山分積草