寇患熙古諭以朝廷恩信取蕃部酋豪子弟為質邊鄙以安王嗣宗汾州人太祖末補秦州司法參軍侍御史路沖知州事為政苛急盜賊羣起嗣宗乘閒直言其闕失劉文裕保州保塞人太平興國中為秦隴巡檢與田仁朗共擒李飛雄宋璫華州渭南人太宗時知秦州有善政就拜監察御史充陜西轉運使以韋亶代之璫去州未百日亶坐事繫獄上以璫前有治績賜錢五十萬再命知秦州安集諸戎部内清肅郭載開封浚儀人端拱中知秦州兼沿邊都巡檢使先是巡邊者多領兵騎以威戎人所至煩苦載悉减去戎人感悅温仲舒河南人淳化四年知秦州先是俗雜羌戎有兩馬家朶藏梟波等部居渭河之南大洛小洛門砦多産良木爲其所據嵗調卒採伐給京師必以資假道於羌然不免攘奪甚至殺掠爲民患仲舒至部兵厯按諸砦諭其酋以威信諸部獻地内屬既而悉徙其部落於渭北立堡砦以限之民感其惠爲畫像祠之馬知節幽州薊人咸平初知秦州州嘗質羌酋支屬餘二十人踰二紀矣知節曰羌亦人爾豈不懷歸悉遣之羌人感之訖終更不犯塞州有銀坑嵗久礦竭課額弗除主吏破産償之不足知節請蠲之章三上乃允曹瑋真定靈夀人真宗時知秦州兼涇原儀渭鎮戎緣邊安撫使廝敦獻南市地瑋城之又築弓門等十砦浚壕三百八十里唃廝囉入寇瑋大敗之李及鄭州人真宗時知秦州議者以及謹厚非守邊才及至秦州州將吏亦頗易之㑹有禁卒白晝攫婦人金釵於市吏執以來及方坐觀書召之使前略加詰問其人服罪及亟命斬之觀書如故於是將吏皆驚服王博文曹州濟陰人仁宗時知秦州初沿邊軍民之逃者必爲熟户畜牧或以遺遠羌易羊馬故常沒者數百人閒有自歸而中道爲夏人所得亦不能辨坐法皆斬博文乃遣習知邊事者密持信紙往招至則悉貸其罪由是􅍲減殊死甚衆朝廷下其法旁路薛奎絳州正平人仁宗時知秦州州宿重兵經費常不足奎務爲儉約敎民水耕謹商算􅀊中積粟三百萬征算餘三千萬覈隱田數千頃得芻粟十餘萬徙知益州秦民與夷落數千人列奎治請留璽書襃諭不許狀曹琮靈夀人仁宗時知秦州度羨材爲倉廪大積榖生羌抄邊琮懷以恩信多請内屬元昊反再知秦州上攻守禦三䇿賊劫儀秦屬戸琮設伏待之賊引去王凱太原人仁宗時授秦鳳觀察使辭日帝諭以唃氏木征交易阻絕有入寇之萌宜安靜以處之凱至與主帥以恩信撫綏遂復常貢王隨河南人仁宗時知秦州秦卒有負罪逃入蕃部者戎人輒奴畜之小不如意復執出求賞前此坐法多死隨下敎能自歸者免死聽復隸軍籍由是多來歸者又建請増蕃落卒給廢陷馬地募民耕種韓琦安陽人仁宗時知秦州有惠政吕公綽夀州人仁宗時知秦州安遠砦古渭州諸羌來獻地公綽曰天下之大豈利尺寸地耶卻之弓箭手多闕馬公綽諭諸寨户為三等凡十丁為社至秋成募岀金帛市馬馬少則先後給之張昇韓城人仁宗時知秦州初青唐蕃部藺氈世居古渭積與夏人有隙懼而獻其地攝帥范祥無遠慮亟城之諸族畏偪舉兵叛昇至請棄勿城先是副總管劉渙討叛羌逗撓不時進昇命他將郭恩代之羌乃潰去陸詵餘杭人仁宗時通判秦州范样城古渭詵主饋餉具言非中國所恃而勞師屯戍且生事既而諸羌果怒爭塞下大擾經二嵗乃定張方平南京人仁宗時以工部尚書帥秦州諜吿夏人將壓境方平料􅂤士馬聲言出塞已而寇不至李參鄆州須城人治平中知秦州蕃酋藥家族作亂討平之得良田五百頃以募弓箭手居鎮閱嵗未嘗以邊事聞英宗遣使問故對曰將在邊期於無事而巳不敢妄以寇貽主憂蔡抗宋城人神宗初知秦州秦有質院質諸羌百餘人自少至老扃繫之非死不岀抗皆縱釋約毋得擅相仇殺已而有犯者斬以徇莫敢姦令張詵建州浦城人神宗時知秦州前此將吏貪功多從羌地獵射因起邊患詵至申令毋得犯得一人斬諸境上羣羌感悅吕大防京兆藍田人神宗時知秦州有惠政孫永長社人神宗時知秦州王韶以布衣入幕府建取熙河策永折之曰邊陲方安靜無故騷動恐變生不測㑹新築劉家堡失利衆請戮偏裨以塞責永曰居敵必爭之地軍孤援絕兵法所謂不得而守者也尤人以自免於我安乎張守約濮州人神宗時為秦鳳路駐泊都監居職六年括生羌隱土千頃以募射手築硤石堡甘谷城第功最多夏人萬騎來寇守約適巡邊與之遇不解鞍􅂤兵五百逆戰衆寡不侔􅀔小卻夏人張兩翼來守約挺身立陣前自節金鼓發强弩殪其酋敵遂退吕大忠京兆藍田人元祐中知秦州時郡糴民粟豪家因之制操縱之柄大忠選僚寀自旦入倉雖升斗亦受不使有所壅閼民喜爭運粟於倉員錢而去得百餘萬斛謝良佐夀春上蔡人為秦州敎授州守吕大忠每過之聽講論語必正襟斂容曰聖人言行在焉吾不敢不肅姚祐湖州長興人徽宗時知秦州或請調熙河弓箭士徙邊以省更戍祐謂人情懷土重遷丐以二年為更發之期滿嵗樂業而願留者乃聽且請擇熙秦富民分丁授地蠲役借糧以勸耕種益廣秦之東西川建城壁嚴保障以控熙河涇原皆從之呉璘永洛城人紹興三年知秦州節制階文四年烏珠薩里罕以大兵十萬至仙人關下璘自武階路入援血戰連日金兵大敗自是不敢窺蜀烏珠舊作兀术薩里罕舊作撒離喝今並改劉宣秦鳳兵馬都監金兵入關陜宣遣蠟書密與吳玠相結且率金將任拱等以所部歸朝約日已定有吿之者金兵取宣縷擘之王琦為弓門砦巡檢建炎四年金兵還自熙河琦禦之金兵立招降旗榜琦獨不屈見殺張威成州人開禧用兵天水縣當金兵西入路乃升縣為軍命威為守屢立奇功曹友聞栗亭人理宗時辟天水軍教授城已被圍友聞單騎夜入與守臣糾民厲戰兵退制置使製大旗書滿身膽以旌之檄管忠義駐閬州討斬叛將郭虎等檄知天水軍北兵至城下命統制王漢臣等出戰自提重兵尾敵後大戰有功端平初授承務郎權發遣天水軍北兵自西和至階州友聞曰階雖非吾境豈可坐視不救遂引兵與諸軍㑹往來督戰有功明暢宣為秦安知縣以母憂去民羣訴於副使鄺埜言宣為政廉能撫民慈惠倘别除他官民將失所埜以聞命服闋還任朱呈瓘藩府宗室崇禎中由貢生知秦安縣兵荒之後城乏兵備賊至遂陷執至寕羌郭外令誘守者呈瓘大呼曰須固守我忍辱至此者欲令知我死所耳遂大罵賊殺之寕羌迄不下贈光祿少卿同時有朱廷彰者亦宗室以府判署州事不屈於賊遇害人物漢李廣隴西成紀人其先曰李信秦時為將廣世善射文帝時從軍擊匈奴以功為郎騎常侍數從射獵格殺猛獸文帝曰惜廣不逢時令當高帝時萬户侯豈足道哉景帝時為上谷上郡隴西北地雁門代郡雲中太守武帝即位召為未央衞尉復拜右北平太守匈奴號曰漢飛將軍廣厯七郡太守前後四十餘年得賞賜輒分其戲下飲食與士卒共之家無餘財自漢擊匈奴廣未嘗不在其中諸校尉以下多以軍功取侯廣獨不得封邑元狩四年以前將軍從衞青擊匈奴今廣岀東道廣欲居前青弗聽軍惑失道青責廣對簿遂自剄廣從弟蔡以從擊匈奴功封樂安侯元狩初代公孫宏為丞相廣三子當户椒敢皆為郎當户早死椒為代郡太守敢以校尉從擊匈奴斬首多賜爵關内侯代廣為郎中令當户子陵善騎射為騎都尉將步卒五千人繫匈奴敗降趙充國隴西上邽人後徙金城令居以六郡良家子善騎射補羽林為人沈勇有大略通知四夷事武帝時以假司馬從貳師將軍擊匈奴有功拜為中郎又擊定武郡氐遷水衡都尉擢後將軍宣帝初以定冊功封營平侯西羌叛充國受詔至金城招降罕开擊破先零罷兵屯田振旅而還卒年八十六諡曰壯侯甘露三年與霍光等列畫未央宫成帝時西羌嘗有警上追美元國召楊雄即充國圖畫而頌之段㑹宗天水上邽人好大節矜功名竟寕中為西域郡護西域敬其威信厯沛郡雁門太守陽朔中復為都護後使安輯烏孫定其國而還烏孫再亂㑹宗徑至其國誅番邱賜爵關内侯病死烏孫中城郭諸國為發喪立祠趙壹漢陽西縣人身長九尺儀容甚偉光和元年舉郡上計時司徒袁逢受計計吏皆拜伏壹獨長揖逢斂袵下堂延置上座問西方事大悅坐者屬目往造河南尹羊陟陟與語大奇之乃與袁逢共稱薦之名動京師後十辟公府並不就著賦頌等十六篇姜岐漢陽上邽人守道隱居名聞西州太守橋元欲召為吏岐稱疾不就元怒敕督郵逼致岐卒堅臥不起三國蜀姜維天水冀人世居鐵堂峽建興初諸􅁑亮軍向祁山署為奉義將軍時年二十九􅀊亮與參軍蔣琬書曰姜伯約忠勤時事思慮過人上士也後封平襄侯魏閻温天水西城人守上邽令馬超圍州城州乃遣温密出吿急於夏侯淵為超所執超解其縛令語城中東方無救温偽許之至城下乃大呼曰大軍不過三日至勉之超怒責之温曰夫事君有死無貳而卿乃欲令長者岀不義之言乎超遂殺之晉閻鼎天水人少有大志為東海王越參軍轉行豫州刺史事京師失守秦王出奔密鼎因西土人思歸欲立功鄉里乃與撫軍長史王毗等謀翼戴秦王㑹賈足迎王至長安為皇太子以鼎為詹事麴允索綝並害其功遂攻鼎出奔雍為氐所殺郭荷略陽人六世祖整漢安順之世公府八辟公車五徵皆不就自整及荷世以經學致位荷明究經籍特善史書不應州郡之命張祚遣使迫而致之至則乞還祚遣送張掖東山卒諡元德先生楊軻天水人少好易學業精微養徒數百劉曜徴拜太常固辭不起遂隱於隴山後石季龍迫致之既見不拜與語不言命舍之後歸秦州仍敎授不絶南北朝梁楊公則天水西縣人父仲懷為宋豫州刺史戰死橫塘公則冒陣抱尸徒步負喪歸鄉里武帝時為平南將軍封寕都縣侯居家篤睦視兄子過於已子性好學雖居軍旅手不釋卷士大夫稱之魏趙逸天水人太武時拜赤城鎮將性好墳典白首彌勤年踰七十手不釋卷所著述詩賦銘頌五十餘篇兄温博學有高名温子炎以孝著閻信天水人滎陽令永安初李曉避難至成皋為信所疑辟左右謂曉曰觀君儀貌豈是常倫古人相知未必在早必有急難須悉心以告天下豈獨北海孫賓碩乎曉以信有長者之言乃具告信實信乃厚相資給以免周李弻成紀人初仕魏封石門縣伯從周文平竇秦與齊神武戰於沙苑以功進趙國公弼每率軍征討朝受命夕便引路略不問私事性沈雅有深識故能以功名終卒諡曰武配食文帝廟廷李賢隴西成紀人漢騎都尉陵之後祖斌以都督鎮高平因家焉賢幼有志節不妄舉動年十四遭父憂撫訓諸弟友愛甚篤太祖西征以功授都督守原州進爵西河郡公厯河州總管徴拜大將軍卒諡曰桓李遠賢弟幼有器局從太祖征戰有功進平陽郡公累除尚書左僕射進位柱國為晉公護所害李崇賢子封迴樂縣侯年尚幼拜爵之日泣下賢問之崇曰無勲於國而幼小封侯當報主恩不得終於孝養是以悲耳後拜大將軍幽州總管與突厥戰殁於陣李詢賢子沈深有大略頗涉書記仕周累以軍功加位大將軍賜爵高平郡公開皇元年詢督杜陽之役民賴其利尋檢校襄州總管事嵗餘拜隰州總管卒諡襄隋李穆賢弟周太祖首建義旗穆便委質累以軍功進爵永平縣伯撫慰關中所至克定進封安平郡公授原州刺史穆以二兄並為佐命功臣子弟布列清顯深懼盈滿辭不受拜太祖不許兄子植被誅其弟基當從坐穆請以二子代基之命宇文護義而兩釋焉天和中進爵申國公高祖受禪拜太師開皇六年卒李雅穆子少有識量周保定中屢以軍功封西安縣男拜大都督從征吐谷渾雅督軍糧於洮河為賊所躡雅偽和以奇兵擊破之累遷荆州總管開皇初進爵為公李景天水休官人驍勇善射開皇中以行軍總管伐陳陷陣有功進位上開府仁夀中檢校代州總管漢王諒作亂發兵拒擊破之煬帝時進爵滑國公楊元感反朝臣子弟多預景獨無關涉帝重之呼李大將軍而不名大業十二年帝令景營遼東戰具於北平幽州賊楊仲緒來攻景擊斬之後為高開道所圍獨守􅀌城一無離叛遼東軍資多在其所粟帛山積景無私焉後遇賊見害趙煚天水西人少􅀌養母至孝及長深沈有器局周太祖引為相府參軍從破洛陽累遷御正上大夫與宗伯斛斯徵素不恊徵坐事踰獄而走購之甚急煚密奏赦之徴獲全煚卒不言高祖受禪賜爵金城郡公卒官冀州刺史趙芬天水西人少有辯智頗涉經史仕周累遷少御正司㑹明習故事朝廷有疑議衆不能決者芬輒爲評斷莫不稱善高祖爲丞相深見親委開皇初拜尚書左僕射與王誼修律合出爲蒲州刺史徵還京師賜以軺車几杖董純成紀人開皇末擢左衛將軍漢王諒作亂從楊素擊平之拜柱國彭城賊數萬掠徐兖純討破之東海賊彭孝才掠懷仁縣轉入沂水純擊之擒孝才於陣餘黨各散唐姜謩上邽人隋末爲晉陽長高祖引爲司功參軍從平霍邑絳郡兵遂渡河謩部勒一夕濟高祖歎其略薛舉寇秦州以謩安撫隴外及薛仁杲平擢秦州刺史謩至撫邊俗以恩信盗賊衰止人喜曰不意復見太平官府改守隴州卒贈岷州都督諡安子確貞觀中爲將作少匠以幹力稱平高昌有功封金城郡公帝將征高麗􅃀諫不從中流矢卒贈成國公諡襄姜晦確孫兄皎明皇時以籓邸舊恩封楚國公遷太常卿開元初晦擢御史中丞先是御史不拜宰相後稍屈下至晦臺儀復振累遷吏部侍郎主選曹吏嘗請託爲姦前領選者檢窒内外猶不禁止晦悉除之示無防限然處事精明相屬諉者輒得其罪既而贓賕路塞流品有敘衆及服皎被放晦亦坐貶終海州刺史尹思貞天水人明春秋擢高第以親喪哀毀除喪不仕張說薦為國子大成每釋奠講辨聽者皆得所未聞遷四門助敎撰諸經義樞續史記未就而卒子愔博學尤通老子書初為道士明皇召對厚禮之拜諫議大夫集賢院學士固辭不赴有詔以道士服視事乃就職專領集賢史館圖書趙昌天水人始為昭義李承昭節度府屬累遷䖍州刺史拜安南都護夷落向化後還朝以裴泰代之未幾州將逐泰德宗召問狀時年踰七十占對精明復拜安南都護詔書至人相賀叛兵即定憲宗時累遷工部尚書太子少保卒諡曰成吳郁兩當人官侍御以直言被謫與杜子美善子美有吳侍御江上宅詩五代漢王仁裕天水人以文辭知名初仕蜀為翰林學士晉高祖時厯諫護大夫漢高祖時累遷户部尚書性曉音律晉高祖􅀄定雅樂奏黃鍾仁裕曰音無和聲當有爭者起禁中已而兩軍校鬬昇龍門外喜為詩少嘗夢剖其腸胃以西江水滌之顧見江中沙石皆為篆籀文由是文思日進有詩百卷號西江集宋尹崇珂天水人徙居大名初事周以謹厚稱累遷為殿前都指揮使宋初為淄州刺史有善政乾德中征嶺表為行營馬步軍副都部暑克廣州擒劉鋹錄功遷保信軍節度使未幾樂範等據五州叛崇珂討平之趙隆成紀人以勇敢應募從王韶取熙河又從李憲討鬼章為涇原將戰平夏川功最多夏人寇涇原隆先登力戰夏人解去徽宗召詣闕慰勞之童貫與論燕雲事曰君能共此當有殊拜隆曰隆豈敢干賞以敗祖宗二百年之好異時起釁萬死不足儻貫知不可奪以知西寕州充隴右都護及卒贈鎮潼軍節度使帝篆碑額曰旌忠劉仲武成紀人熙寕中試射殿庭異等􅀘官累轉涇原將知河州吐蕃趙懷德等叛仲武設伏大敗之為西寕都護樸格之降仲武功居多徽宗召對勞之官其九子厯拜瀘川軍節度使卒贈檢校少保諡威肅襆格舊作僕哥今改張俊成紀人政和中從討南蠻轉都指揮使高宗時為兵部大元帥累功轉榮州刺史扈高宗南行平江淮羣盜時苗傅劉正彥反俊與張浚吕頣浩諸人平之金兵再攻明州連破之屢遷定江昭慶軍節度使又拒劉麟於泗州敗劉猊於定遠屢進太傅封益國公尋進清河郡王拜太師子弟遷秩者十三人與韓世忠諸人並為名將世稱張韓劉岳卒追封循王張子蓋成紀人父宏與金兵戰死子蓋初從韓世忠討苗傅又從俊擊劉猊又大敗金兵於柘皋累官安德軍節度使金兵攻海州急以子蓋為鎮江府都統往援率精銳擊之敵大敗孝宗初授加檢校少保卒贈太尉諡恭壯元巴雅遜達賚迷裏氏家秦州父喪廬墓次晝夜悲號有飛鳥翔集墳土踴起巴雅遜達賚舊作畢也速荅立今改趙世延秦州人至順初修輯唐宋㑹要仕至四川行省平章政事知經筵封魯國公又同府石吉連官右丞相封秦國公諡忠宣又趙按官太傅封秦國公諡忠宣子國瑤封梁國公諡忠憲明高斗南徽州人洪武中由薦舉授四川定遠知縣多善政時舉天下廉吏斗南與焉列其名於彰善榜聖政記擢知新興州以老乞歸薦子吏科給事中恂自代恂博學能詩文官新興從大軍征交阯有協贊功門克新秦州人以薦為敎諭秩滿入京太祖召問經史及政治得失直言無隱授左贊善時紹興王俊華以善文詞授右贊善帝諭吏部曰左克新右俊華重直言也不數年擢禮部尚書尋引疾命給藥物不輟其俸及卒命有司護喪歸葬周蕙秦州人為臨洮衞卒戍蘭州年二十聽人講大學首章􅅥然感動遂讀書州人段堅誨以聖學蕙乃研究五經又從學安邑李㫤久之學益䆳恭順侯呉瑾鎮陜西欲聘為子師固辭不赴或問之蕙曰吾軍士也召役則可若以為師師豈可召哉瑾躬送二子於其家蕙始納其贄後還居秦州之小泉幅巾深衣動必由禮門人多化之稱為小泉先生王爵秦州人從周蕙學宏治初由國子生授保安州判官有平允聲總督秦紘聘居幕中三􅀊贈遺不妄受其教門人也務以