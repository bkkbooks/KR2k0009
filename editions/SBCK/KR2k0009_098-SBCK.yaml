六􅀊飲以藥猶下拜受之左右感慟銳及二子皆自刎死汝曏宣城人善射城破猶提雙刃入陣中十六矢被執以死事聞爲立廟明朱顯忠如臯人太祖時從傅友徳征蜀克文州留顯忠守之蜀將丁世真誘番賊來攻或勸出城求生顯忠厲聲曰爲將守城城亡與亡豈有求活將軍耶決戰而死贈都指揮使周尚文西安後衛人武宗時守備階州計禽叛畨孫仲嗣膚施人性慷􅁣好俠烈宗禎初由􅀊貢生爲階州學正流寇充斥當事知其才委城守寇憚之不敢攻後以大衆陷其城與妻子十餘人並死之贈國子博士本朝毛洪麟夏縣人初以軍功授秦州知州改階州康熙十五年賊復陷階州洪麟退守州西之岡旗寨竭力捍禦大兵過境供餽無缺以民來復業力請蠲免荒糧三千八百餘石民屯亡丁一千有餘州人立碑頌徳韓國元藁城人任西固守備康熙四十八年畨夷入掠邊民國元身先士卒與賊戰殺數十人力屈遇害時西固所千總洪章同安人亦戰死人物南北朝魏楊大眼武都氏人少驍捷跳走如飛大和中用爲軍主以功封安城縣子累除平東將軍荆州刺史大眼拊循士卒見傷痍為之流泣自為􅀅帥恒身先兵士當其鋒者莫不摧拉宋牛皓福津人為川陜宣撫後軍中部將紹興五年全薩理罕至秦川宣撫副使遣諸校分道伺之皓至瓦吾谷與金將遇皓所部步卒不滿二百金人見皓異於他人欲招之皓力戰死薩理竽改見秦州名宦門張詔成州人少隷張俊帳下積功至和州守嘗被㫖介使金孝宗聞其拜祐獻二陵像事嘉之後帥興州甚得士心丁焴福津人為人剛直不受私謁累官太府少卿嘉定閒為利州路安撫使兼知興元府決事明白吏民信服魏了翁嘗曰武階一人而已張威成州人居貧賣藥自給或言其才勇乃令戍邊開禧用兵以功累擢沔州都統制屢敗金兵張福作亂威擒戮之終揚州觀察使威為將每戰輒克臨陣戰酣則精采愈奮兩眼皆赤時號張鶻眼每戰不操它兵有木棓號紫大蟲揮之掠陣敵皆靡又創撒星陣分合數變以此輒勝御軍嚴整兵行無聲每與百姓避路曹友聞栗亭人武患王彬十二世孫少有大志與弟仲友不遠千里㝷師取友登寶慶二年進士辟天水軍敎授北兵再至友聞與弟萬率所部戰敗之以功累授關外四州安撫權知沔州北兵五十餘萬大至制置使趙彦呐檄友聞控制大安以保蜀友聞與弟萬俱戰死北兵遂長驅入蜀秦鞏人汪世顯還師過戰地嘆曰蜀將軍真男兒漢也盛禮祭之事聞贈龍圖閣學士諡曰節萬贈武翼大夫本朝何宗韓文縣人雍正甲辰進士授禮部主事洊升刑部􅀰中旋升大理寺少卿天性純篤嘗言生平所學惟忠恕二字自刑部為廷尉遇大案必反覆詳慎以漢張釋之為法有蔓及者必正色曰恐情理法三字不當如是所著有敦仁堂集義乾隆十一年入祀鄉賢祠郭俊實文縣人以孝聞於鄉里乾隆元年旌汪養正成縣生員嘉慶四年敎匪滋事養正率鄉勇堵禦賊匪張漢潮竄至鄉勇逃避賊執養正誘降養正罵賊不屈臠割死同時生員汪抱一亦以罵賊臠割死生員拍丑辰罵賊中賊矛死王中魁成縣武生嘉慶四年敎匪滋事賊突至門中魁執矛殺賊五人因力不敵眔被賊擒誘降中魁罵賊不屈死列女明竇氏二女階州人萬厯中礦賊左朝登作亂二女被劫至竇家坪投崖死齊朝兒妻王氏階州人嫁甫七日江水大漲朝兒被溺氏沿江哭三日求屍不得遂從夫溺處躍入後於下流見二屍􅂝手而岀楊忠妻張氏文縣人忠因救父爲番所害氏即自經事聞旌表郭萬春妻米氏文縣人萬春爲虎所銜氏追擊虎虎舎其夫而食之事聞旌表王植妻米氏文縣人與同縣米紹元妾王氏皆以拒賊被殺石華如妻權氏成縣人爲賊所逼不從連被數刃氣未絶乃觸石死又同縣陳尚表妻姚氏任某妻李氏皆以拒賊被殺本朝夏鉶妻張氏階州人與同州夏誌妻武氏皆夫死守節厯兵亂遭豪强始終不辱張榮德妻何氏階州人爲强暴所逼守正遇害康熙年閒旌王天眷妻李氏階州人事繼母以孝聞天眷以營卒殁於戊李痛不欲生有爲議再適者氏即自經死又同州譚獻廷妻韋氏宋德隆妻姚氏皆夫亡殉節張明徵妻鄢氏文縣人夫死守節順治四年遇土寇變避入山寨寨破攜其女投崖下死又母月娃妻王氏文縣人夫亡殉節張于泰妻何氏成縣人夫亡守節吳三桂偽將欲逼娶之氏斷髮忿詈誓死不從趙暘妻張氏階州人夫亡守節乾隆六年旌又同州節婦陳常修妻羅氏焦可動妻楊氏趙寅妻李氏郭鳳翛妻李氏楊廷桂妻吳氏寇弻敎妻蹇氏賈時妻謝氏生員房峒妻查氏杜葉茂妻楊氏席延士妻李氏生員雷逢時妻李氏監生王英妻邢氏又烈婦王宏才妻王氏俱乾隆年閒旌儒童高乾妻王氏趙登甲妻劉氏袁文學妻王氏尚自銘妻馮氏武生邢惓妻蹇氏兵丁楊廷佐妻仇氏陳鈞妻楊氏王之信妻劉氏向善妻羅氏俱嘉慶年閒旌楊梓妻何氏文縣人夫亡守節乾隆三年旌又同邑節婦郭獻瑞妻韓氏張龍奎妻韓氏俱乾隆年閒旌鄢伸妻潘氏宋潔已妻席氏張上達妻王氏生員韓鑑妻何氏呉廷秀妻張氏生員米金粟妻張氏俱嘉慶二十四年旌趙正嘉妻盧氏成縣人夫亡守節又同邑節婦張渭妻陳氏武殿畿妻郭氏閻詩妻汪氏俱乾隆年閒旌吏員屈偉伸妻賀氏嘉慶十二年旌土産金唐書地理志文州貢麩金明統志文縣有金窟在麻倉與昭化縣接界窟如井取之甚難布元和志武州貢紬唐書地理志文州貢綿唐書地理志文州貢麻布舊志文縣岀鹽寰宇記階州貢石鹽雄黄元和志武州岀上品雄黄色如雞冠明統志階州岀雄黄水銀寰宇記階州土産九域志將利縣有水銀務瑪瑙漆西固所岀綠礬寰宇記階州産仇池石通志出仇池山宋蘇軾所藏以為希代之寶雲石硯郡志岀階州馬寰宇記階州貢熊麂明統志俱文縣岀鹿茸唐書地理