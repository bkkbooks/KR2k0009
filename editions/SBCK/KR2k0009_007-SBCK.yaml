補遼西鹽官長數上書言便宜事隋韋冲杜陵人開皇時爲營州總管寛厚得衆心懷撫靺鞨契丹皆能致其死力奚霫畏懼朝貢相續高麗嘗入寇率兵擊走之唐田仁會長安人永徽中爲平州刺史􅀊旱自暴以祈而雨大至穀遂登人歌曰父母育我兮田使君挺精誠兮上天聞中田致雨兮山出雲倉廩實兮禮義申願君常在兮不患貧李晦乾封中爲營州都督以治狀聞賜書慰勞賈循華原人開元閒擢遊擊將軍渝關守捉地南􅀒海北屬長城林巒層翳寇所蔽伏循調士斬木開道賊遁去遼韓德樞安次人爲遼興軍節度下車整紛剔蠧恩煦信孚勸農桑興教化期月民􅀗蘇息金爽和天眷初知永安軍爲叛寇孟􅀖養所執脅之降不從遂被害爽和舊作雙虎今改正元阿台憲宗時爲平灤路達魯噶齊始至請蠲銀鹽酒等税諸侯王道出平灤費銀七千五百兩户部不即償阿台自陳上前盡取償以歸達魯噶齊改見保定府名宦劉德温大興人大德中爲永平路總管當天厯兵革之餘野無居民德温爲政一年而户口堦倉廩實遂興學校以育人材庶事畢舉􅀊大旱禱而雨灤漆二水爲害有司􅀊發民築堤德温曰流亡始集而又役之是重民困也遂罷其役水亦不復至明楊禧太和人永樂中知昌黎縣盡心民事政教大行考滿民乞留晉二秩還任再閲三考在任十八年王冕洛陽人嘉靖初以兵部主事巡視山海關遼東妖賊陸雄作亂突入關吏欲扶冕出走冕曰吾有母在走安之急執兵衞母母􅀍傷冕奮前救之被執賊脅以白刃冕大罵遂遇害贈光祿卿高􅀖佐襄陵人萬厯中爲永平知府濬灤河築長隄裁抑税使高淮不敢大横張春同州人天啓二年爲永平兵備僉事時諸軍屯山海關永平爲孔道士馬絡繹難民又雲集春應之有方事皆就理而民不告病崇禎初坐浮言削籍及永平失守復起春為兵備偕諸將收復永平諸城加太僕少卿郡當兵燹之餘閭閻困敝春盡心撫卹人益懷之四年監總兵呉襄宋偉軍救大凌河兵敗被執不屈死鄭國昌邠州人崇禎初以按察使治兵永平大兵破水平國昌自縊於城上中軍守備程應琦從之應琦妻奔告國昌妻與之偕死贈國昌太常卿張鳳琦陽曲人崇禎初為永平知府大兵破永平鳳琦一門及推官羅成功副總兵焦延慶東勝衞指揮張國瑞盧龍教諭趙允殖俱死之鳯琦贈光祿卿成功等贈卹有差楊燫崇禎初知灤州城破死之贈光祿少卿高承埏嘉興人宗禎中知遷安縣教民倣江南桔橰法鑿溝開渠闢田三百八十餘畝復業者千七百户時當輸栗天津以濟遼餉承埏令民齎錢至山海關易粟轉輸而償以漕栗或代明年正賦省浮費萬計本朝吳盡忠任縣人順治􅀄為山海關都司寇至擊敗之繼又來犯盡忠率衆追至邢家灣馬蹶為賊所執不屈被害宋琬萊陽人順治十四年為永平道性明決遇事立剖姦宄歛跡境内肅然李中梧遼陽人知永平府民有持鋤殺人事久未決中梧命燃草炙鋤血跡宛然獄乃定又有操故劵訢人􅀒其父財者察知其偽其人媿服而去陳丹山陽人康熙初知永平府下車即盡罷供應還各屬嚴絶餽遺署内另舍自居纔可容膝以勤政積勞卒於官衞立鼎陽城人康熙初知盧龍縣地當兩京孔道驛使旁午供張糗糒悉稱貸營辦不以擾民先是縣中徵糧勺杪以下皆用升合量納草束以銀代仍買之民閒而低昻其值立鼎令輸户合奇零統歸斗斛及額而止徵草束者用本色輸民甚便之聖祖仁皇帝命尚書魏象樞侍郎科爾坤巡察畿甸至盧龍治具不為食啜茶一甌曰令飲盧龍一杯水耳吾亦飲令一杯水諸大獄悉以咨之立鼎引經準律咸大稱善王永命臨汾人知遷安縣持躬清介課士嚴明設緝逃捕盜法民甚賴之修泠口邊牆建孔道橋粱不誤公不擾民以升任去民為立碑誌徳政祀名宦人物漢郭凉右北平人雖武將然通經書多智畧尤曉邊事幽州牧朱浮辟為兵曹掾擊彭寵有功封廣武侯公孫瓚令支人舉孝廉除遼東屬國長史中平中以討張純等有功拜降虜校尉常乘白馬烏桓憚之更相告語避白馬長史三國吳程普右北平人初為州郡吏有容貌計畧善於􅀿對從孫堅征伐攻城野戰身被創夷堅卒復隨孫策有功以為吳郡都尉後拜盪寇中郎將領零陵太守鎮石城䇿卒輔孫權討平不服拜禆將軍領江夏太守先出諸將普最年長時人皆呼程公性好施與喜士大夫代周瑜領南郡太守遷盪寇將軍卒韓當令夫人以便弓馬有膂力幸於孫堅從征伐􅁆犯危難及孫䇿東渡從討三郡征劉勲破黃祖領樂安長後以中郎將與周瑜等拒破曹操又與吕􅀩襲取南郡厯封石城侯遷昭武將軍唐陽惠元平州人以趫勇奮事平盧軍從田神功李忠臣浮海入青州詔以兵隸神䇿為京西兵馬使鎮奉天德宗初河南大擾詔移戍關東帝御望春樓誓師勞遣諸將酒至神䇿將士不敢飲帝問故惠元曰初發奉天臣之帥張巨濟與衆約不立功母飲酒臣不敢食其言既行有餽於道惟惠元軍瓶罍不發帝咨歎不巳俄以兵屬李懷光懷光叛惠元走奉天懷光遣將冉宗馳騎追及於好畤惠元披髮呼天血流出皆袒裼戰死詔贈尚書左僕射田宏正盧龍人父廷玠厯滄相二州刺史從兄魏博節度使承嗣盜磁相廷玠無所囘染及田悦代立廷玠讓之曰爾承伯父諸業當守朝廷法度以保富貴何苦與恒鄆爲叛臣遂稱疾悦遇謝不納憤而卒宏正幼通兵法善騎射當承嗣孫季安時爲衙内兵馬使軍中翕然歸重季安忌宏正出爲臨清鎮欲因罪誅之乃陽痺痼卧家不出得免後季安子懷諫襲節度召還舊職懷諌委政家奴蔣士則措置不平衆怒曰兵馬使吾帥也詣其家迎之拒不納衆譁於門宏正度不免與約曰吾欲守天子法舉六州版籍請吏於朝皆曰諾遂殺士則圖魏博相衞貝澶之地以獻憲宗嘉之詔充魏博節度使遣裴度宣慰宏正深相結納奉上益謹王承宗叛宏正破其衆李師道拒命宏正率諸節度使進討取十二州加檢校司徒同中書門下平章事穆宋立徙成德軍㑹軍亂並家屬皆遇害贈太尉諡忠愍田布宏正子王師討蔡布凡十八戰破凌雲柵下堰城以功授御史中丞蔡平為河陽節度使宏正遇害召布拜魏博節度使號哭固辭不聽與妻子訣曰吾不還矣未至魏三十里跣行披髮號注而入居堊室屏節旄將士老者兄事之俸祿月百萬一不入私門又發家錢十餘萬緡頒士卒朱克融據幽州與王庭湊脣齒中人屢促戰而度支餽餉不繼魏軍又驕會有詔分布軍救深州衆怒遂潰諸將刼布行河朔舊事布為書謝帝乃入至父几筵引刀刺心曰上以謝君父下以示三軍言訖而絶周寶盧龍人武宗時為檢校工部尚書節度涇原務力耕聚糧至二十萬斛號良將中和初進同平章事兼天下租庸副使以功封汝南郡王宋郭瓊盧龍人少以勇力聞初事契丹後唐天成中挈族來歸厯團練防禦周初知宗正卿事宋初加右領軍衞上將軍致仕瓊雖起卒伍所至有惠政尊禮儒士孜孜樂善蓋武臣之賢者也遼趙思温盧龍人少果鋭膂力兼人太祖經畧燕地思温聲為運使郭宗等所害贈中書左丞諡忠愍張昇其先定州人後徙平州警敏過人力學工文詞至元中授翰林國史院編修官武宗即位議躬祀禮昇據經引古叅酌事宜帝嘉納之出知汝寕府治行為諸郡最泰定初拜遼東道廉訪使屬永平大水請發海道糧以賑并蠲􅀊賦民得全活順帝時以集賢侍講學士致仕卒諡文憲龎遵永平人母病腫三年不能起忽思食魚遵求於市不得歸途歎恨忽有鯉躍入其舟作羮以獻母悦病瘥李彥忠平州人父喪廬墓八年不至家周宏遷安人至正閒官昌黎尹程思忠作亂宏率其民赴永平拒守城陷被執不屈七日不食罵不絶口而死明麯祥永平人父亮為金山衛百户祥年十四為倭人掠去遂仕其國屢諷王入貢宣德中與使臣偕來上疏陳情乞歸侍養帝令暫歸仍還本國祥至金山獨其母在已閲二十年不能識驗耳隂赤痣始信未幾别去後復請於國王仍令入貢復申前請得襲職歸養以孝聞周斌昌黎人景泰進士為御史天順初與同官劫石亨曹吉祥諸不法事帝大怒擲彈章俾自讀斌且讀且對神色自若遂下嶽謫江陰知縣擢閒封知府皆有善政終廣東布政使周璽遷安人嗣職為開平衛指揮使􅀒氣習兵書善騎射成化中以功遷大同副總兵伊斯瑪依勒大入大同總兵官許凝失利璽馳援夜遇敵大呼陷陣臂中流矢拔鏃進戰敵乃退宏治初以總兵鎮守陜西討平諸縣囘囘威名甚著焉伊斯瑪依勒舊作亦思馬因今改正蕭顯山海衞人成化進士擢兵科給事中武臣中官夤緣干恩澤顯多駮正時崇信異教有巫自􅃰州來京師以邪術蠱衆士女爭信之顯抗疏請逐之并及時弊帝怒左遷鎮寕州同知終福建僉事鄭已山海衞人成化進士厯御史偕同官爭慈懿太后葬禮彗星見又陳時政八事尋劾大學士商輅尚書馬昻姚䕫程信不職下獄廷杖後復官出按甘肅鎮守定西侯蔣琬多役軍民將劾之反為所搆謫戍宣府任惠灤州人宏治進士正德初為南京吏科給事中屢建讜言又偕戴銑奏留劉健謝遷且劾中官高鳯廷杖除名後起山東僉事未任卒王珝永平衞人宏治進士除給事中正德時劾御馬太監牛宣尚書劉大夏去國抗疏乞留帝將大婚詔取太倉銀四十萬兩珝首爭之卒減四之一厯右僉都御史巡撫山東武宗南巡中官黎鑑索賄於有司珝不可鑑愬於帝帝曰此必爾有求不遂耳鑑語塞而退終兵部侍郎翟鵬撫寕衞人正德進士累官陜西按察使性剛介以清操聞嘉靖中擢右僉都御史巡撫寕夏坐劾總兵官趙瑛為所訐奪職歸久之起故官再遷宣大總督尋又罷歸後以俺答大入山西復設總督再起鵬令兼督山東河南軍務大修邊備累功進兵部尚書復以俺答入犯逮下詔獄卒人皆惜之隆慶初復官馬永遷安人驍勇有謀習兵法好左氏春秋嗣世職為金吾左衞指揮使正德時從陸完擊賊有功江彬練兵西内永當隸彬稱疾避之嗣因功擢總兵官鎮守薊州武宗至喜峯口欲出塞永叩馬諫而止嘉靖初乞宥議禮􅀗罪諸臣帝怒奪永官寄祿南京後府杜門讀書清約如寒士後復以總兵官鎮守遼東數有功進左都督詹榮山海衞人嘉靖進士厯户部郎中督餉大同值兵變以靖亂功擢光祿少卿再遷右僉都御史巡撫甘肅移大同時俺答數犯邊榮多方計戰守數敗之築邊􅘘開屯田邊備大飭終兵部侍郎萬厯中贈工部尚書張世忠山海衞人嘉靖五年舉武會試由世職增二秩署指揮僉事為大同叅將拒寇於丁家莊有斬􅀗功二十一年寇大舉入掠世忠與諸將合五營兵襲之至陸支村諸軍潰世忠力戰困重圍下馬裏瘡疾鬬首中二矢死贈左都督諡忠愍立祠致祭厲汝進灤州人嘉靖進士厯吏科給事中湖廣巡撫陸杰入為工部侍郎汝進疏劾之并論工部尚書甘為霖范繼祖不職不納尋與同官查秉彛等合疏言太常少卿嚴世蕃竊弄父權嗜賄張焰嚴嵩因激帝怒廷杖八十謫官尋奪職隆慶初起故官未至京卒楊騰遷安人幼􅀌母病目以舌䑛之而愈及殁廬墓三年芝產於側隆慶初旌表有司為建仁孝格天坊劉文煥撫寕人幼􅀌事母孝及母殁盧墓三年有泉湧出人號為孝子泉推官沈之唫詣其廬感動請解官歸養廖汝欽盧龍人官中書舍人里居崇禎三年大兵破永平與武舉唐之俊諸生韓洞原周祚新馮維京胡起鳳胡光奎田種玉等十數人皆死之本朝乾隆四十一年賜諡節愍餘並予入忠義祠本朝馬維熙山海衞人順治初由拔貢生授忻州同知攝偏關廳事姜瓖叛被執不屈遇害詔贈忻州知府吕鳴夏山海衛人弟嗚雲明末官揚武營㕘將戰死鳴夏撫遺􅀌恩誼周至鄉人稱之順治初知衞輝府以政最遷固原副使武大定叛勒兵脅之鳴夏厯數其罪罵不絶口遂遇害詔贈光祿寺郷􅄻一子劉鴻儒遷安人順治進士授兵科給事中疏請頒賦制裁衙蠧兵丁留屯及畿輔民出邊墾種累數百言剴切詳明仕終左都御史祀鄉賢高顯辰灤州人順治初由拔貢生授徳安知縣遷雲南同知與鄉人訣曰吳三桂久蓄異心顯辰此去當捐軀以報國決不苟求活也及三桂反以兵脅降不屈仰藥死妻戈氏亦自經詔贈太僕寺卿李集鳳山海衞人淹通羣籍尤精春秋著春秋辨疑六十五卷官終洛陽丞韓坤業永平諸生事母王氏以孝聞母殁廬墓三年親􅀒􅁟成塋路人哀感又撫寕諸生趙名元布衣孫昇皆事親盡孝親殁並廬墓三年劉一蛟昌黎人貢生父病衣不解帶者三年事母承歡無閒撫􅀌姪如子族人有以貧鬻子女者為贖還二十餘人仍營其嫁娶同縣舉人趙天錫亦有孝行親病三十餘年侍湯藥不少懈張朝臣山海衞人由武進士厯仕浙江處州右營都司康熙四十八年衢賊擾境與都司孫奇豹前後夾擊兵潰遇害事聞􅄻子衞千總穆廷栻臨榆人康􅄉武進士授蔚州路守備遷四川遊擊二十四年疊溪大定堡山後生番阻截哨道廷栻督衆追殺殱其衆累擢江南提替調福建陸路提督廉潔自持營伍整飭六十年臺灣奸民朱一貴等逞亂廷栻赴厦門駐守卒詔贈左都督諡清恪劉天錫昌黎人由武進士授河南守備嘉慶元年調赴湖北營隨將軍傅恒追剿邪匪受傷陣亡事聞議卹􅄻雲騎尉董凝川撫寕人由武舉選授貴州守備洊擢湖北興國營叅將屢著戰功嘉慶四年追賊至梓桐埡樹林中猝中矛傷陣亡事聞議卹􅄻雲騎尉列女五代唐鄭保英妻奚氏保英爲平州刺史契丹兵至城且陷奚率家僮女丁乘城不下賊遂引去金李寶信妻王氏寶信爲義豐縣令張覺以平州叛氏陷城中賊逼之氏怒罵不屈支解而死大定十二年贈貞烈縣君李伯通妻周氏灤平石城人伯通監豐潤縣元兵攻之城破不知所終周氏與子易􅀍擄乘閒自投於塹主者怒拔佩刀三刃其體而去得不死遂攜易而逃閒關至汴績紉自給教易讀書有成元王宗仁妻宋氏進士宋褧之女宗仁家永平氏從夫避兵鏵子山夫婦爲軍所擄行至玉田有窺氏色美欲害宗仁者氏遂攜女投井死明沈鳳妻仇氏遷安人鳯爲興州右屯衞百户嘉靖中守剗軍嶺寨寨破仇被執將汚之不從支解而死黨文明妻某氏樂亭人歸五月而夫死其母欲奪其志即自縊趙氏女撫寕人年十四軍人馬鐸挑之女怒批其面鐸驚走女泣曰我為女子賊敢以媟語戲我安用生為逐自縊有司為樹坊以旌之劉文煥妻王氏撫寕人事姑孝姑病􅈼天願冬著單衣三年姑病果痊本朝馬成妻張氏遷安人强暴逼之不從被害王紹先妻陸氏撫寕人夫亡無子或勸之改節即自縊邢鳳喈妻劉氏昌黎人年十九夫亡舅姑勸之改􅃴刺一目以見志撫子更新成立為娶婦杜氏更新復早卒杜亦承劉志守節終身同縣邵瑄妻劉氏夫亡守志教子成立壽至百有二􅀊魏業懋妻齊氏昌黎人夫亡閉户自縊同縣温成義妻王氏趙萬忠子婦劉氏俱夫亡自縊以殉烈女田氏年十七惡少挑之女怒罵被擊死彭玉妻李氏灤州人遇暴不從死之康朝選妻劉氏樂亭人遇暴逼之守正捐軀宋友懷女典姐山海衞人許字藺某未嫁夫殁即投繯死郝明颺妻趙氏撫寕人善事舅始夫亡孝敬彌篤撫子善繼成立為娶婦馮氏善繼亦早亡姑婦相依並以節孝著同縣俞承恩妻張氏夫亡事姑甚謹及姑殁挈􅀌子攜筐􅀒土成墳母家欲奪其志遂終身不言歸大雪封門徑無行蹤人以為死而機聲不絶聞者感歎均雍正年閒旌闞相辰妻李氏樂亭人夫亡割股療姑病或欲奪其志斷髮以誓每食必先以􅀕夫教三子俱入庠壽至九十餘􅀊同縣楊甫望妻王氏均雍正年閒旌德稜泰妻張氏永平駐防馬甲滿洲人夫亡守節乾隆年閒旌李肅妻王氏盧龍人肅為諸生早亡氏夫志守節同縣節婦王元德妻􅉗氏王棟妻汪氏劉明德妻邸氏韓賓妻李氏賈成章妻呉氏倫健妻張氏馬一霄妻王氏許煥妻楊氏許燦妻竇氏王良妻劉氏張隆妻王氏王之翰妻楊氏王道普妻蕭氏彭年妻李氏楊通妻傅氏樊養正妻姚氏劉植妻馬氏張隆妻魏氏王文鑑妻翁氏陳傑妻燕氏王中善妻魏氏張珍妻段氏李其溥妻伊爾根覺羅氏均乾隆年閒旌吳中憲妻雷氏遷安人夫亡守節孝事翁姑撫􅀌子成名同縣節婦王建極妻李氏王㑹極妻汪氏郭子甸妻彭氏于鴻緒妻高氏郭謙亨妻金氏王三錫妻張氏段秦貴妻吕氏郭子裔妻尹氏張定一妻梁氏許登榮妻張氏李成義妻李氏張從美妻郭氏張從􅁻妻王氏朱之貴妻曹氏李銅妻魏氏蔡芝妻楊氏劉炯妻李氏彭鏡妻王氏郭乾汾妻王氏均乾隆年閒旌謝瑛聘妻張氏撫寕人未婚瑛卒氏聞訃易服奔喪誓不再嫁孝事孀姑同縣節婦孫文智妻王氏王三錫妻李氏張廷珙妻池氏胡漣妻茹氏張希閔妻王氏單珍妻蕭氏劉深妻賀氏單銈妻鄭氏胡字仁妻王氏李尚亮妻姜氏李蕃妻田氏王基勇妻吕氏超憲妻李氏楊天純妻姬氏揚名妻金氏單從新妻袁氏李獻方妻趙氏翟琪妻王氏王崙妻夏氏趙秀齡妻孫氏張起雲妻李氏呉從義妻程氏楊旺妻周氏崔國梁妻趙氏楊作楫妻李氏袁寄凱妻李氏安文傑妻馮氏張明德妻郭氏茹漢妻劉氏程用妻劉氏貞女楊天墴女楊氏均乾隆年閒旌譚五倫妻耿氏昌黎人夫亡守節同縣節婦劉寅妻朱氏田發妻高氏烏得衆妻劉氏陳愷妻魯氏馬瑗妻俞氏郭朝掄妻俞氏高琚妻周氏孟徳孔妻錢氏齊兆熊妻陳氏均乾隆年閒旌霍瑞啟妻谷氏灤州人夫殁父母憐其少㣲諷之氏飲藥自盡鄰婦救之乃免同州節婦張義妻高氏郭翰妻倫氏周成羽妻史氏王曰琦妻魏氏馬躬建妻李氏王敬日妻孫氏李之齡妻劉氏馮驥妻惠氏趙及溥繼妻王氏王百椿