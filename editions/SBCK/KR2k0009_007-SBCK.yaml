front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_007-1a}
body:
  text: 保定府五人物漢趙廣漢蠡吾人少為郡吏州從事以廉㓗通敏下士為名舉茂才為陽翟令以洽行元異累遷京兆尹為人强力天性精於吏職發奸摘伏如神王商蠡吾人徙杜陵少以肅敬敦厚稱嗣又武為樂昌侯推財以分異母諸弟身無所受居喪哀戚大臣薦商行可厲羣臣義足厚風俗擢為侍中中郎將元帝時至右將軍為重臣輔政擁佑太子頗有力焉成帝初為丞相有威重單于來朝商坐未央廷中單于拜謁仰視商貌大畏之遷延卻退帝聞而嘆曰此真漢相矣以忤大將軍王鳳免相王尊高陽人少孤諸父使牧羊澤中尊竊學問通尚書論語􅀄為州郡決曹史初元中舉直言遷虢今以高第擢為安定太守扶弱抑强盜賊分散再免官再起遷益州刺史徼外蠻夷歸附遷東平相以剛直免王鳳奏為司隸校尉坐劾丞相匡衡御史大夫張譚左遷會南山羣盜起徴爲諫大夫行京兆尹事旬月間盜賊清三嵗復免湖三老公乘興等上書訟尊治效復以爲徐州刺史遷東郡太守河水盛溢尊請以身塞金隄因止宿隄上不去水波爲之却迴詔進秩賜金卒官劉祐安國人少修操行舉孝廉補尚書侍郎嫺練故事每有奏議應對無滯遷河東太守政爲三河表桓帝時爲河南尹轉司隸校尉時權貴子弟罷州郡還入京師者至界首輒改易輿服威行朝廷轉大司農中常侍蘇康等占民田業祐移書所在依科品沒入之坐論輸左校後得赦復厯三卿乞歸三國魏孫禮容城人太祖平幽州召爲司空軍謀掾初喪亂時禮與母相失同郡馬台求得禮母禮盡推家財以與台台後坐法當死禮私導令踰獄自首刺奸主簿温恢嘉之具白太祖各減死一等累官楊州刺史吳大將全琮率數萬衆來侵禮禦之戰于芍陂自旦及暮手秉枹鼓奮不顧身琮衆乃退凡臨七郡五州皆有威信遷司空封大利亭侯卒諡曰景南北朝梁許懋新城人少孤性至孝篤志好學十四入太學受毛詩旦領師說晚而復講有能名鴻勲為州主簿僕射臨淮王彧表薦其文學除奉朝請人怪其不謝鴻勲曰為國舉才臨淮之務鴻勲何事從而謝之彧喜曰吾得其人矣齊神武徵至并州作晉祠記好事者翫其文位至高陽太守在官清素妻子不免饑寒時議高之北齊許惇彥五世孫清識敏速達於從政任司徒主簿以明斷見知時人號入鐵主簿遷陽平太守政為天下第一累拜齊梁二州刺史並有治聲終尚書右僕射孟業安國人少為州吏性廉謹同寮侵盜得官絹分三十疋與之拒而不受天保初清河王召為法曹斷决明允尋遷東郡太守以寛惠著隋許善心北新城人幼聰明有思理家有書萬餘卷皆徧通涉十五解屬文徐陵奇之曰此神童也仕陳補􅁧史學士禎明中聘隋遇高祖伐陳留賓館及陳亡善心號哭盡哀帝顧左右曰我平陳國惟􅀗此人旣能懷其舊君即是我誠臣也大業初為禮部侍郎父亨􅁧著梁史未就善心述成先志修續家書宇文化及弒逆之日隋官盡詣朝堂謁賀善心獨不至遂害之越王稱制諡曰文節許智藏道幼孫少以醫術自達文帝以為員外散騎侍郞秦王俊有疾智藏診之曰疾巳入心即當發癎不可救也數日果如其言帝奇之賞物百段唐張行成義豐人體局方正為富平主簿有能名召補殿中侍御史糾劾嚴正嘗侍宴帝語山東及關中人意有同異行成曰天子以四海為家不容以東西為限帝稱善自是凡有大政事必與議焉高宗時晉州地震行成言誠恐女謁用事大臣陰謀願深心以杜未萌拜尚書左僕射卒諡曰定齊澣義豐人少開敏李嶠稱其有王佐才中宗在廬陵澣上言請抑諸武迎太子東宫及太子還后召宴同明殿曰朕母子如初卿有力焉景雲初姚崇引為御史凡劾奏常先風教號善職遷中書舎人論駮及詔誥皆援準古誼朝廷大政必咨之勸崇舉宋璟自代璟遂相後璟為吏部尚書澣及蘇晉為侍郎世謂臺􅃟許遠善心元孫為睢陽太守祿山反尹子奇以兵圍睢陽遠告急於真源令張巡巡援衆至分城而守食盡巡出愛妾殺以食士遠亦殺其奴城陷遠與巡俱被執巡罵城死送遠洛陽至偃師不屈死張興東鹿人性忠勇為饒陽裨將祿山反史思明引衆薄城興擐甲持刀乘城賊將入興一舉刀輒數人死賊皆氣懾城破思明縛之馬前好言誘之降興責以大義思明怒鋸解之齊映高陽人舉進士中博學宏詞補河南參軍事德宗幸奉天授御史中丞貞元中累官中書侍郎封河間縣男與崔造劉滋並輔政吐蕃數入宼帝欲避之映入諌俯伏流涕乃感悟卒諡曰忠陽城北平人好學貧不能得書求為吏隸集賢院竊院書讀之六年無所不通及進士第乃去隱中條山遠近慕其行來學者接迹於道閭里有爭訟不詣官而詣城宰相李泌薦之德宗召拜右諌議大夫裴延齡誣逐陸贄等城上疏極論延齡罪申直贄等累日不止聞者寒慄帝欲遂相延齡城曰延齡為相吾當取白麻壞之下遷國子司業引諸生告以孝道明日謁城還養者二十輩躬講經籍主徒斤斤皆有法度出為道州刺史太學諸生何蕃等二百人伏闕請留為吏遮抑不得上旣至道州治民如治家賦稅不時觀察使數誚責州當上考功第城自署曰撫字心勞催科政拙考下下順宗立召之城巳卒贈左散騎常侍弟堦與城共隱中條山有寡妹依城居夫客死遠方城舉弟行千里􅀒其柩以歸葬宋郭進博野人開寶中征河東以為行營馬步軍都監招徠山後諸州民三萬餘口太平興國中車駕征太原先命進分兵控石嶺關以防北邊遼果犯關進大破之劉文質保塞人簡穆皇后從孫也父審琦為虎牢關使從討李重進戰死文質仕太宗朝為濁輪砦兵馬鈐轄破遼拔黃太尉砦徙知慶州李繼遷入寇文質以私錢二百萬給軍士遂大破賊天禧中官終代州刺史性剛於貴近無所避故不大顯趙振歸信人景德中為隰州兵馬監押累官左神武大將軍振剛强有武力喜謀畫輕財尚氣衆樂為用子􅨈習書史景祐中試䇿畧於中書條對數千言初隨父西邊訪得五路徼外形勝利害作聚米圖經五卷詔取其書並召珣至又上五陣圖兵事十餘篇弟瑜性勁特好學恂恂􅀋儒者瑜弟璞亦知名榮恕民歸信人兄弟異居積年大中祥符中家榆樹兩本自合恕民感其異復相聚鄉人稱雍睦程琳博野人舉服勤詞學科仁宗時權三司使范雍使遼命琳發遣太倉贍軍􅀊且饑琳並以其陳腐者發以貸民民賴全活權御史中丞上疏請罷諸土木營造蠲被災郡縣租賦改三司使出納尤謹禁中有所取輒奏罷之後拜尚書左丞出判大名府卒諡文簡董元亨束鹿人累官國子博士通判貝州王則據城叛元亨坐廳事賊黨排闥入左右皆奔潰賊脅之元亨據案奮擊厲聲張目罵賊遂被害事聞仁宗曰守法之臣也贈太常少卿劉涣文質子以父任為將作主簿天聖中章獻太后臨朝久渙謂天子年加長上書請還政仁宗親政擢為右正言郭后廢渙與孔道輔范仲淹等伏闕爭之厯知諸州皆著聲績熙寕中以工部尚書致仕弟滬知書傳深沈寡言有智畧仕至内殿崇班齊恢蒲陰人第進士通判陳州提􅀧成都府路刑獄徙河東餽餉一無所受韓琦薦其賢進太子左諭德以天章閣待制出知相州召知審官西院糾察在京刑獄恢居鄉里恂恂稱君子臨政府明白簡約所至人愛之遼杜防歸義人開泰進士累遷起居郎知制誥人以為有宰相器重熙九年夏人侵宋宋遣郭禎造遼請與夏和帝命防使夏解之如約罷兵各歸侵地後拜右丞相卒贈中書令諡曰元肅王棠新城人博古善屬文重熙中鄉貢禮部廷試皆第一累官至南府宰相練達朝政金時立愛新城人累官至中書令元帥宗望取燕山立愛謀畫居多封陳國公致仕加開府儀同三司改鄭國公王擴中山永平人明昌進士累官同知横海軍節度貞祐中上書陳河東守禦䇿後權陜西東路轉運使行六部尚書致仕卒諡剛毅擴博學多才梗直不容物以是不振於時云劉炳􅁑城人性倜儻有氣節每讀書遇古忠臣烈士輒嘆息景慕貞祐二年第進士即日條上便宜十事宣宗異焉復試之擢補御史臺令史元張柔定興人慷􅁣尚氣節善騎射金末盜起柔聚族保西山東流塞後歸元爲河北東西等路都元帥戰勝攻取威震河朔移鎮保州保自兵火之餘荒廢者十五年柔爲之畫市井定居民置官廨引泉入城疏溝渠以瀉卑溼通商惠工遂致殷富世祖時以功封蔡國公延祐中加封汝南王諡忠武賈輔蒲陰人初仕金爲祁州刺史以衆歸太祖時張柔開府滿城命輔行元帥府事於祁州從定山東遷左輔元帥柔將兵在外輔常居守累功領順天河南等處軍民萬户子文備襲父左輔元帥嘗領所部屯亳州攻武磯堡以戰守有功累遷湖廣行省參知政事追封武威郡公諡莊武楊果蒲陰人性聰敏工文章尤長於樂府金正大中進士厯偃師蒲城陜令所至以廉能稱中統中累官參知政事出爲懐孟路總管卒焦德裕雄州人父用仕金爲千户守雄州北門元兵至州人開南門降用猶力戰遂生􅀗之太祖以其忠壯釋不殺復舊官徇地山東未嘗妄殺一人德裕通左氏春秋有才辨善射金將武善敗走其黨保善故壘太宗使德裕擒殺之地悉平累升都元帥府參議至元十一年從征鎮江焦山寺僧誘居民叛丞相阿术旣誅其魁欲盡坑其黨德裕諫止之卒追封桓國公諡忠肅武善改見順天府人物張宏範柔第九子善馬槊能爲歌詩年二十時兄順天路總管宏略上計壽陽行都留宏範攝府事吏民服其明決􅀩古軍所過肆􅁀宏範杖遣之入其境無敢犯者至兀中爲鎮國大將軍平宋功最多卒贈平章政事諡武略延祐中加封淮陽王諡獻武宏略有謀略通經史善騎射嘗從父柔鎮􅂎徙亳屢立戰功世祖時為河南行省參知政事卒贈蔡國公諡忠毅解誠定興人善水戰伐宋設方略以功授水軍萬户又從攻安豐壽復泗亳諸州下大理國有功世祖嘉􅅄之卒封易國公諡武定子汝楫襲爵從平宋有功卒亦追封易國公諡忠毅孫特格從征廣西交阯有功卒贈平陽郡公諡武宣特格舊作帖哥今改正史弼博野人通􅀩古語膂力絶人能挽强弓世祖令給事左右從攻宋襄樊至陽羅堡率衆先登南岸論功第一累官福建行中書省平章政事封鄂國公王恂唐縣人父良潛心伊洛之學及天文律厯無不精究恂讀書過目成誦劉秉忠見而奇之薦之世祖命為太子贊善每侍講讀必發明綱常之道及厯代興亡治忽之所以然嘗與許衡郭守敬等定授時厯官至太史令卒贈司徒追封定國公諡文肅劉因容城人父述邃于性理之學因天資絶人初為經學究訓詁疏釋之説輒歎曰聖人精義殆不止此及得周程張邵朱吕之書一見能發其微曰我固謂當有是也性不苟合不妄交接家雖貧非其義一介不取家居教授師道尊嚴弟子造其門者皆有成就嘗愛諸􅁑孔明靜以修身之語表所居曰靜修至元中徴授右贊善大夫未幾以母疾辭歸後復徵集賢學士以疾固辭卒贈翰林學士封容城郡公諡文靜所著有四書精要三十卷詩五卷文集十餘卷郝天挺世居安肅州英爽剛直有志畧受業於遺山元好問世祖時累拜中書右丞與宰相論事有不合輒面斤之仁宗臨御時天挺與議大政革尚書省之弊遂成皇慶之治拜御史中丞首陳紀綱之要風紀大振又疏陳七事曰惜名節抑浮費正括田久任使論好事􅅄農務本勵學養士詔中書省舉行之拜河南行省平章政事卒追封冀國公諡文定嘗修雲南實錄五卷注唐詩鼓吹集十卷行於世張珪仲疇子少能挽强命中仲疇平廣海宋禮部侍郎鄧光薦將赴水仲疇救而禮之命珪受學焉武宗時中丞久闕方議擇人仁宗時在東宫曰必欲得直中丞惟張珪可即日召拜中丞丞相拜住嘗問以相體何先珪曰莫先於格君心莫急於廣言路泰定元年以災異極論當世得失後拜翰林學士承㫖以病還家尚野滿城人至元中徵為國史院編修累升國子博士誨人先經學而後文藝請御史臺出帑藏大建學舍以廣教育仁宗在東宫野為太子文學多所禆益延祐初厯集賢侍講學士兼國子祭酒移疾歸四方來學者益衆卒追封上黨郡公諡文懿野性開敏志趣正大事繼母以孝聞文辭典雅一本於理王結定興人生而聰穎讀書數行俱下從太史董樸受經深於性命道德之藴厯事武宗至順帝初累官翰林學士中書左丞卒封太原郡公諡文忠結立言制行皆法古人故相張珪曰王結非聖賢之書不讀非仁義之言不談識者以為名言晚邃於易著易説一卷臨川呉澄讀而善之並詩文十五卷行於世韓若愚滿城人皇慶初擢中書左司郎中時參政曹鼎新辭職帝曰若效韓若愚廉勤足矣何用辭為後拜河南省左丞會文宗平内難若愚畫䇿中機要累遷淮西江北道廉訪使卒封南陽郡公諡忠肅魏敬益容城人性孝居母喪哀毁骨立素好施與有男女失時者出資財為之嫁娶􅀊凶為糜以食饑者有田十六頃一日語其子曰自吾買四莊村之田十頃環村之民皆不能自給今將以田歸其人汝謹守餘田可無餒也乃呼四莊村民以田歸之皆愕眙不肯受强與之乃受而言諸有司丞相賀太平歎曰世乃有斯人哉王庸歸信人事母李氏以孝聞母疾庸夜禱北辰叩頭出血母疾遂愈及母卒哀毁幾絶露處墓前旦夕呼號一夕雷雨􅁀至鄰人持席欲蔽之見庸所坐卧之地獨不沾濕咸感異而去復有蜜蜂數十房來止其家􅀊得蜜以供􅀕祀丁好禮蠡州人精律算累官户部侍郎京畿漕運使立漕運成法人皆便之尋升户部尚書撙節浮費以足國用拜參知政事後以論議不合去位明兵入京城或勸其謁大將好禮叱之曰我以小吏致位極品恨無以報國所欠惟一死耳後􅁆日大將召好禮抗辭不屈而死明邸鵬唐縣人洪武初進士擢御史廉直敢言坐法籍其家止木匙二木筯五故鄉物也遂復其官王興新城人母病興卧冰白溝河上􅈼天以請如是者三年母病愈洪武時旌王驥束鹿人永樂進士授給事中累官兵部尚書正統初出討西寇阿台朶爾只伯有功兼支大理卿俸麓川思任發叛驥總督軍務大破之封清逺伯又以擒苗王苗士富命世襲卒贈侯諡忠毅王文束鹿人永樂進士累遷左都御史鎮陜西五年鎮靜不擾景泰初改吏部尚書兼翰林院學士入閣典機務江淮大水命巡視發廩賑饑民三百六十餘萬英宗復辟石亨等誣以他罪與于謙同死西市宏治中贈太保諡毅愍邊靖慶都人諸生性至孝父卒廬墓朝夕哭奠手植松楸乏水灌漑水忽甬出宣德時旌孟鑑博野人宣德進士厯官户部侍郎廣東海宼黃蕭養作亂圍廣州甚急命鑑參總戎務鑑至去城百里左右請勒兵爲衛鑑惟從五騎入時城閉已兩月矣鑑即下令開門聽民出入賊詭乞降鑑知其謀伏甲待之賊果率衆圍城鑑出精鋭奮擊遂擒蕭養傳首京師景泰中謝政年餘召起南京工部侍郎宼深唐縣人由貢生厯官左都御史累立邊功天順五年死曹吉祥之變贈少保諡莊愍賈俊束鹿人以鄉舉入國學天順中􅃟授御史厯按浙江山西河南陜西南畿所至有聲成化中由山東副使超拜右僉都御史巡撫寕夏在鎮七年軍民樂業召為工部侍郎賑饑河南活數十萬人尋拜尚書俊廉慎居工部八年望孚朝野宏治中加太子少保致仕吕雯安州人顯宗曾孫顯宗仕元階三品自號集賢居士好善樂施嘗導滹沱河以利民人稱為吕家河雯以天順中舉人授御史成化間累遷右僉都御史巡撫延綏築榆林邊􅘘三百餘里敵六萬猝至擊卻之秦饑民流入境或慮為變請拒之雯不許全活數十萬人召為兵部侍郎卒傅珪清苑人成化末進士􅃟庶吉士武宗時累擢禮部尚書振舉綱維事無巨細務遵成憲帝好佛自稱大慶法王番僧因乞田百頃為法王下院中㫖下部稱法王與聖㫖並珪佯為不知執奏孰為法王敢與至尊並書大不敬詔弗問田亦竟止教坊司臧賢怙寵請易牙牌如朝士又請改鑄方印皆格不行數以災異進諌又極陳時弊十事多斥權倖權倖深嫉之矯㫖令致仕未幾卒嘉靖初贈太子少保諡文毅鄭陽安肅人宏治進士厯監察御史巡撫河南劉瑾納賂奪民田歸之宗藩陽執法拒之遂繫獄左遷旌德主簿瑾伏誅累遷至陜西巡撫黃鐘慶都人自鐘以上六世同居宏治中旌李瑟新城人諸生親喪廬墓枯木生花白蛇繞側正德中旌袁宗儒雄縣人正德進士授御史巡視陜西茶馬按浙江河南皆有聲帝在大同以郊祀將囘鑾旣而復止宗儒率同官力諌已又自稱威武大將軍將巡遊天下宗儒更力諌遷大理寺丞嘉靖三年與廷臣伏闕爭大禮廷杖幾斃厯巡撫貴州討平芒部沙保土酋王阿藤之亂累擢户部侍郎卒王德明清苑人正德進士除封邱知縣錦衣指揮廖鵬倚其兄中官嘗陵侮長吏德明不為屈累遷懐慶知府居數年政化大洽嘉靖中厯右僉都御史巡撫山西討平巨寇常誠心晉府中尉三人酗酒夜撾巡撫門治之為所搆遂落職德明為政嚴行法無所貸然治小民一意惠愛時稱良吏邵錫安州人正徳進士居諌垣能持風采諌止武宗巡幸嘗勘事甘肅讞獄平允值􅀊饑請賑多所全活累官右副都御史巡撫山東楊繼盛容城人嘉靖進士授南京吏部主事從韓􅀖奇受律吕之學得其傳改兵部員外郎劾仇鸞擅開馬市有十不可五謬鸞搆之貶狄道典史鸞敗復擢武􅃟司員外郎疏論嚴嵩十大罪五姦帝怒下詔獄將受杖或遺以蚺蛇膽卻不受曰椒山自有膽何以蚺蛇為繫三載㑹都御史張經李天寵坐大辟秋審時嵩附繼盛名並奏遂棄市妻張氏上書願代夫死嵩屏不奏穆宗時贈太常少卿諡忠愍李淶容城人嘉靖中由世廕累遷山西總兵官數有禦賊功已賊自大同人山西巡撫趙時春親擊之遇伏淶殊死戰時春得脱而淶與長子松及遊擊李桂等皆戰死贈淶少保左都督諡忠愍松亦贈指揮同知鄭洛安肅人嘉靖進士擢御史劾罷嚴嵩黨鄢懋卿萬宷等出為山西參政佐總督王崇古欵俺答有功萬厯中以兵部侍郎總督宣大山西軍務時齊里克方請乞無厭洛因委曲諭導使之貢市惟謹後霍洛齊挾齊里克為重突犯洮河命洛經畧七鎮通欵如故官至少保戎政尚書卒諡襄敏齊里克舊作撦力克霍洛齊舊作火洛赤今並改正孟化鯉新安人萬厯進士官吏部文􅃟郎中清白自持不徇權貴給事中張棟以建言削籍奏起之忤㫖謫歸化鯉少以聖賢自期學本王氏而不涉虛􅄅以無欲為主以孝弟忠信教人而歸之慎獨學者稱之邢雲路安肅人萬厯進士厯官陜西按察使生平究心厯法著古今厯律考七十三卷鹿久徵定興人萬厯中進士知息縣有惠政擢御史神宗以軍政事貶斥臺省三十餘人久徴抗疏論救謫澤州判官遷滎澤知縣未任而卒劉道亨新城人萬厯進士官給事中會三王並封上疏極言元子無封王之條東宫無待嫡之例元輔誤國罪大難逭繼又請元子冠婚疏甚切直又劾執政趙志臯張位皆不報未幾落職王家賓定興人登進士為户部郎榷税臨清值畿輔大旱家賓以課額三萬金佐賑疏稱以朝廷金錢活朝廷赤子且地在輦轂賑恤宜先神宗不之罪官至布政使務承宗高陽人萬厯中以進士第二人授編修為人沈毅有智畧達於政事天啟初累官兵部尚書東閣大學士時遼陽廣寕俱破經畧王在晉議於山海關外更築重關以守承宗請身往決之還奏守關非䇿及在晉召還承宗乃自請行以原官督理諸處軍務便宜行事旣至定軍制建營舎練火器治軍儲汰逃將恤難民遼人大悦又繕治寕遠城守之前後修復城堡數十練兵十一萬立車營水營造戰具數百萬開屯五千頃遣將戍錦州松山大小淩河拓地復二百里魏忠賢黨讒之乞歸崇禎二年詔以故官駐通州撫定祖大壽潰兵出師取灤州加大傅不受尋以常山之敗奪官家居七年大兵攻高陽承宗率家人拒守城破望闕叩頭投繯而死子舉人鉁尚寶丞鑰官生鈰生員鋡鎬從子鍊及孫之沆之滂之澋之浩之瀗從孫之澈之美之泳之澤之渙之瀚皆戰死福王時贈太師諡文忠本朝乾隆四十一年賜諡忠定鹿善繼久徴孫父正急人患難傾其家不惜遠近稱鹿太公善繼鍴方謹慤少讀王守仁書􅁣然有必為聖賢之志不肯與俗浮沈舉萬厯四十一年進士授户部主事時遼左餉中絶廷臣數請發帑不報會廣東進金花銀善繼請於尚書借給之帝怒降級調外光宗立復官尋改職方大學士孫承宗理兵部事推心任之及督師表為贊畫布衣羸馬出入亭障間與將卒相勞苦承宗倚之若左右手其拓地四百里收復數十城堡善繼籌畫為多承宗謝事善繼亦移疾歸崇禎初遷太常少卿復告歸與門人講學從逰者日衆九年大兵攻定興善繼佐長吏守禦城破不屈死贈大理卿諡忠節本朝乾隆四十一年賜諡節愍子化麟舉天啟初鄉試第一伏闕訟父忠踰年亦卒薛一鶚定興人由貢生為黃州通判荆王姬誣他姬酖世子一鶚白其誣奄人傳太妃命欲竟其獄卒直之遷蘭州知州有惠政後罷官歸大兵臨城佐鹿善繼城守遂同死本朝乾隆四十一年賜諡節愍王喬棟雄縣人天啟進士授朝邑知縣邑人王之宷為魏忠賢誣坐賕勒令嚴追喬棟不忍封印於庫而歸巡撫怒欲以聞於朝士民擁臺號呼廵撫懼亟慰止之忠賢誅升湖廣糧道督餉興國州流宼大至喬棟堅守城陷被執罵不絶口死之本朝乾隆四十一年賜諡烈愍唐中穎雄縣人崇禎丙子軍亂舉家被難父八旬病不能行父命中穎去中穎泣曰生死相依惟此地也城破遂被殺本朝乾隆四十一年予入忠義祠張純儒新安人為臨城訓導崇禎戊寅率衆守城城陷攜兩幼子端坐明倫堂被執不屈身受數十創死本朝乾隆四十一年予入忠義祠李國􅕠高陽人萬厯進士改庶吉士授檢討天啟時厯官禮部尚書兼東閣大學士時魏忠賢竊弄威福中外競相媚事國􅕠嶄嶄中立貞不絶俗璫外憚而中忌之帝憑几顧命承諭傳皇五弟乃大聲宣揚湏刻由禁中達外朝用絶非常崇禎帝即位知國􅕠有維䕶功倚之為重凡大典冊悉出其手忠賢誅黨人株連甚衆命國􅕠同定逆案俾無􅁈濫後條次數事以上又請優卹楊漣等皆見採納六上辭疏帝為感動允去歸而以得侍母為快立家廟置義倉居五六年而卒贈太保諡文敏張羅俊清苑人崇禎進士敦義行娶瞽女終身不置妾弟羅彥由進士累官光祿少卿罷歸次羅善羅喆皆諸生次羅輔武進士流寇逼城兄弟五人倡義佐有司分陣堅守賊為引卻已聞京師陷皆哭重訂盟誓令人各綴崇禎錢一於頂以示戴主之意賊謂羅彥主謀呼其名大詬且射書説降羅彥不顧賊死傷多攻愈力李建泰親軍為内應城遂陷羅俊猶持刀斫賊刀脱兩手抱賊齧其耳血淋漓乃遇害羅彥見賊入還家投繯死羅善及羅俊子伸羅彦子晉并赴井死羅輔多力善射射必殺賊矢盡持短刀殺數人乃死惟羅喆從水門走免一門死者凡二十三人本朝乾隆四十一年賜羅俊羅彥諡節愍餘並予入忠義祠金毓峒保定衞人崇禎進士官中書舎人陳漕務稱㫖授御史出按陜西還命監李建泰軍甫抵保定而賊騎巳逼偕邵宗元張羅俊等共守散家資犒士聞京師陷賊射書説衆降毓峒厲聲曰果爾正當為君父復讐敢異議者斬懸銀牌命擊賊者自取衆爭奮殺賊及城陷赴井死妻王氏亦自縊從子振孫有勇力以武舉佐城守賊衆皆散獨立城上大呼曰前日殺賊者我也賊支解之振孫兄肖孫子婦陳與侍兒桂春亦投井死肖孫匿毓峒二子為賊榜掠無完膚終不言二􅀌由是􅀗免本朝乾隆四十一年賜毓峒諡忠烈餘並予入忠義祠高經清苑人崇禎舉人事母至教城陷負母逃遇賊求釋母獨就執乘間赴水死屍浮水上怒目擎拳猶作擊賊狀司時殉難者邠州知州韓東明武進士陳國政赴井死平凉通判張維綱舉人張爾翬孫從範不屈死貢生郭鳴世寢疾聞城陷持棒擊賊死諸生王之珽先城陷一日置酒會家人飲城破偕妻齊及三子二女入井死諸生韓楓何一中杜日芳王法等二十九人布衣劉宗向田仰名劉自重等二十人皆不屈死又都給事尹洗舉人劉會昌貢生王聯芳以城陷之次日為賊所􅀗亦不屈死本朝乾隆四十一年均予入忠義祠吕應蛟保定右衞人厯官密雲副總兵致仕歸流賊攻城應蛟率鄉人共守晝夜戮力城破短兵鬬殺十餘人而死本朝乾隆四十一年賜諡節愍魏克家高陽人崇禎舉人知鄒平縣有善政里居城破死之本朝乾隆四十一年予入忠義祠本朝孫奇逢容城人年十七舉於鄉值明末喪亂與定興鹿正俱以節義聞常念聖學久湮􅁣然以紹往開來為巳任遠近問業者接踵性高介前後十一徴皆不就天下稱為徴君卒年九十二所著有讀易大指四書近㫖理學宗傳行世弟奇彥順治中以貢生知武城縣有聲魏一鼇保定人嘗與容城孫奇逢睢州湯斌游勉以知性誠身之學所著有四書偶錄詩經偶錄北學編雪亭詩草行世杜越容城人諸生少師同郡鹿善繼與孫奇逢友善學行醇邃家貧布衣蔬食授徒自給康熙十七年以博學宏詞徴至都引疾乞還劉金柱定興人順治二年授開州知州擢吉安知府金聲桓叛不屈死王顯望都人順治三年除金谿知縣土寇起單騎入巢降其巨魁百姓􅀗安叛鎮金聲桓陷城遇害張吉大束鹿人諸生有孝行順治初賊刦父􅀖輔索財將殺之吉大挺身罵賊格鬬遇害王三錫完縣人少􅀌孝事繼母妻邊氏亦善事姑明末􅀒母避亂為兵所執問知母子義而釋之順治初土宼竊發脅令入黨不從遇害子學詩傭身葬父亦以孝聞靳榜祁州人嵗貢生知澄城縣順治二年郃陽土寇魏天命犯澄城奸民内應啟門納賊榜死之王家珍容城人順治二年由貢生授朔州知州姜瓖叛家珍以義激勸士民為固守計守備張某開門延賊家珍奮力巷戰被執不屈賊支解之每割一臠問曰降乎家珍至死罵不絶口全家遇害贈山西布政司參議劉之屏保定左衞人順治丙戌進士授夏縣知縣姜瓖之亂羣盜乘間起賊張五者犯縣境殺掠甚慘民皆逃匿守陴者僅僕役數人尋亦散去或勸之避賊之屏叱曰我讀書三十年一旦受國恩為縣令城亡與亡耳乃埋印土中朝服坐城上賊至死之贈按察使僉事李霨高陽人國􅕠子順治丙戌進士改庶吉士累官大學士時年甫三十有四風度端凝持重識大體康熙初輔政諸臣事多專決票擬或未當霨每從容開譬徐使改易調劑之力居多吳三桂等變作察哈爾亦叛軍務旁午一應機宜方畧諭㫖口授霨起草常至夜分乃出􅈺練掌故凡朝廷大典禮必以屬之所得賜予悉以分給宗親卒諡文勤于嗣登安州人少以孝聞登順治丙戌進士授御史累官刑部侍郎讞獄多所平反時人稱為今之于公李淐定興人順治五年知渭源縣轉臨洮同知未任值􅉰變殉節死贈按察使僉事陳上年清苑人順治已丑進士孝友有志節厯官廣西布政司參議賊破梧州迫之降不屈死郭棻清苑人順治壬辰進士改庶吉士累遷内閣學士博學工文詞嘗纂畿輔通志著皇畿大一統賦累數萬言卒祀鄉賢祠陳浵安州人從孫奇逢游淹貫羣書尤好王守仁之學明末盜起流離相屬於道浵收養婦女數十人於州之朝陽觀事定送歸又遍收途間棄兒飼之全活甚衆嘗遊大名有史某以事繫獄浵拯之出一日攜其女為謝浵正色曰吾一生急人之難豈有利人子女以為報者乎驅之去舉順治庚子鄉試未仕卒子鶴齡粹於理學工文章舉康熙甲子郷試授正定教授倣宋胡瑗法立條約遠近來學者數百人終順天府武學教授高鐈清苑人為郡諸生嗜古善書好遊山水所至有題詠著述甚富詩有陸舟蘆中依雪浮家等集雜著有義烈金蘭等編李顯名新安人諸生年八嵗遭流賊亂父母病􅈼天求代殁盡哀性好施嘗傾貲濟人危急以至產落不悔也王廷輔安州人諸生事親甚孝居喪盡禮順治七年土寇刦掠州境廷輔收恤避難婦女爲遠近所稱又同里諸生王之楨劉公舉太學生王又曾容城蕭玉藻皆以孝行旌張所藴高陽人由武舉厯官襄陽守備􅁹賊衝鋒死於陣康熙間贈都司僉事吕申清苑人諸生少穎敏後棄舉子業究心天官輿地諸書精推算百不失一逺近號爲吕仙刁包祁州人事寡母至孝以古文名生平窮究理學所著有四書翊註易酌用陸集行世王炘雄縣人事親以孝聞九􅀊讀尚書即通曉大義長而博覽經史肆力詩文下筆千言立就客遊金陵守令訪之拒不見後歸里從遊益衆宋鍹容城人諸生四􅀊而孤母孫氏撫之成立母卒鍹廬墓朝夕哀號竟卒於廬子允詮廬墓三年人稱世孝李明性蠡縣人諸生父母年俱八十餘每侍疾數月衣不解帶居喪屏酒肉不入中門晨興必至墓號泣六年如一日雍正十年旌李塨明性子博學工文詞南遊江浙與山陰毛奇齡論樂律康熙庚午舉於鄉往來京師與大興王源慈溪姜宸英齊名大學士李光地嘗列薦固辭而不謝為通州學正數月告歸著有易説樂解四書義疏行世常四明雄縣人事繼母至孝與兄弟相友愛鄉里化之有䦧牆者竊曰毋令常公知也冬月置纊以衣寒者嘗傾貲助人喪葬邑人德之鹿賓善繼曾孫康熙壬戌進士知湖廣桂陽縣會有丈量之令賓令民自為丈而親覆之不􅁆日事畢民用不擾撫臣議開礦賓力陳不便事得寢任數年擢御史罷歸卒於家康熙五十六年祀鄉賢陳悳榮鶴齡子康熙癸已進士授湖北枝江知縣修百里州隄以息水患累遷貴州大定知府烏􅀩土司叛悳榮率屬防守賊不敢逼乾隆元年擢貴州按察使時苗疆新定方駐師興屯經畧張廣泗以威重鎮服用法嚴峻二年貴州大火悳榮入見廣泗曰天意如此當設誠修省苗亦人耳可盡殺乎廣泗大感動申戒諸將吏如悳榮言四年署布政使以黔地瘠薄宜務本計乃勸民蠶桑樹藝越年貴筑等六州縣報墾田至三萬六千畝課樹杉木六萬株開野蠶山場百餘所比户機杼聲相聞旋調安徽布政使卒於官陳悳華悳榮弟雍正甲辰一甲一名進士授修􅁧升詹事入直病乞休乾隆三十六年上書房擢禮部尚書以高宗純皇帝繪九老圖宴遊香山悳華列致仕九人中並予優賚尹會一博野人幼孤事母以孝聞雍正甲辰進士授吏部主事遷員外郎出守襄陽府攝荆州㑹石首縣饑民萬餘洶洶以浮言相煽㑹一單騎宣慰之衆立解累擢河南巡撫勸民力事農桑課栽樹多至二百餘萬株又請豁免抑勒報墾升科者百餘萬頃民累悉除以母病乞終養置義田以睦宗族復設義倉義學惠及鄉里服闋補工部侍郎視學江蘇以小學督訓士子尋調吏部卒於官所著有續洛學編小學纂注近思錄集解李殿圖高陽人乾隆丙戌進士授編修改御史擢給事中出為鞏秦階道時囘逆甫平所屬又被災殿圖盡心撫卹在任十二年吏畏民懷累遷安徽巡撫調福建革除陋規緝捕洋盜所至有聲殿圖嘗言惟除害以致利不興利以釀害又云當濟事勿喜事當近情勿徇情當惜名勿沽名當任怨勿斂怨時以為名言復任翰林院侍讀卒入祀鄉賢祠于宗範完縣人乾隆乙未武進士由三等侍衞洊擢廣西思恩營遊擊五十四年隨征安南擊賊市球江陣亡事聞賜卹邵明哲望都人諸生少􅀌事母至孝母殁廬墓終身嘉慶元年旌石陣圖博野人由武進士授四川守備嘉慶元年隨􅁹達州賊匪屢戰有功後遇伏被創陣亡事聞議卹􅄻雲騎尉董紹昌新城人任把總嘉慶二年隨􅁹湖北教匪於王家坪陣亡同縣外委楊青山於私渡河擊賊陣亡事聞賜卹各如例劉玉成清苑人任千總嘉慶三年隨􅁹湖北教匪於陳家壩陣亡同縣千總劉泰沈世傑把總鄒國泰王慶凱劉忠外委周全仁劉曰瑞王廷諾劉得亮張廷貴段福陳玉得高起雲均擊賊陣亡事聞賜卹俱入祀昭忠祠王清弼雄縣人由武進士授陜西守備洊升遊擊嘉慶元年鄖縣邪匪滋事清弼以戰功擢甘肅參將二年隨勦四川竄賊屢􅀗勝戰三年升貴州大定協副將時賊首洪道人等倡亂清弼攻擊之賊衆潰散戰清弼力四年賊竭殁於冉添元等與麻柳灣賊合力拒陣事聞議卹􅄻雲騎尉流寓元郝經陵州人金亡從父思温徙順天則􅀒薪米為養暮則讀書居五家貧晝年為守帥張柔賈輔所知家藏書皆萬卷經延為上客二博覽無不通前提調官臣沈兆澐恭纂輯提調官臣王廣蔭恭覆輯校對官臣高履觀恭校校對官臣沈維鈺恭覆校大清一統志保定府六列女三國魏許允妻阮氏高陽人為中領軍阮最賢明允為景王所誅門生欲藏其子婦曰無豫諸兒事景王遣鍾㑹看之若才藝徳能及父當收皃以語母母答汝等雖佳才具不多率胸懐興㑹語便自無憂不須極哀㑹止便止可少問朝事兒從之㑹反命俱以狀對卒免其禍皆母之敎也隋許善心母范氏北新城人少寡養孤博學有高節高祖知之勅尚食分賜時新嘗詔范入内侍皇后講讀封永樂郡君及善心遇禍范年九十二臨喪不哭撫柩曰能死國難我有兒矣因臥不食卒唐李孝女名妙法博野人安祿山亂􅀍刦徙他州聞父亡奔喪既至父巳葬晝夜號踊結廬墓側手植松柏有異鳥來集後母病或不飲食女終日未嘗視匕箸及亡廬墓終身明張沼妻呉氏清苑人沼為諸生遇宼變呉義不受辱罵賊遇害李瀛妻郭氏清苑人瀛為大同斷事旣卒無子郭與妾韓氏同時自縊親屬解救韓甦而郭巳死王世琇妻武氏清苑人世琇以進士任歸徳推官崇禎時城陷殉節氏聞訃一慟而絶乆之復甦托􅀌子㓜女於妾汪氏閉門投繯死張子耕妻南氏安肅人夫為諸生卒南守節遇寇變一盜援其手氏怒曰奈何辱吾手罵賊被焚死宋鎧妻趙氏新城人鎧為諸生卒趙年二十二不食三日投繯死胡萬倉妻張氏唐縣人崇禎十二年冬避難明㐲山時年十九亂兵過唐河張躍入河氷死及屍出顔色如生孫學妻季氏愽野人正德中流賊至欲犯之季大罵不從遇害張胡妻管氏蠡縣人正德中流賊陷城義不受辱賊怒殺之張􅀿諤妻劉氏望都人崇禎十一年聞夫殉難遂自焚死王璟妻李氏容城人夜盜至李冒刃先出為所擊幾死賊將殺其夫李㐲夫身願代遂見殺范箕生妻馬氏定興人崇禎中城陷馬及冢婦三女同入於井媵婢從者甚衆時人名其井曰五芳漳浦黃道周記其事王御乾妻姜氏清苑人崇禎末御乾死於兵姜守尸身受數創不去事定殮夫家業蕩然守節撫􅀌備嘗辛苦同縣王庶楙妻潘氏夫死於寇投井死以救免􅀒尸歸葬守節終身張氏一門烈婦清苑人崇禎末流賊陷城羅俊兄弟拒賊死一門殉難者羅俊伯母李氏罵賊死羅彦妾宋氏錢氏及子晉妻師氏皆先羅彦投井死羅彥弟羅士蚤卒其妻高氏守節十七年至是與羅喆妻王氏俱自縊死羅善妻高氏及三女羅輔妻白氏及幼女俱投井死羅俊再從子震妻徐氏㢲妻劉氏亦投井死朱士忠妻崔氏束鹿人崇楨末士忠率鄉兵與流寇戰死崔求尸不􅀗日夕哭禱夢夫告以屍所果尋得之守節至八十一歳卒陳瑞妻賈氏唐縣人崇禎末賊破城被執欲汚之氏厲聲大罵並以匕首刺賊面賊怒亂刀剚死本朝乾隆五年旌本朝程格妻王氏清苑人年十九奉姑避難遇敗寇欲掠以行王抱樹不從賊以刃脅之罵愈厲遂遇害事聞旌表同縣宋登龍妻趙氏劉百順妻王氏梁可均母杭氏白鴻妻王氏侯思忠妻張氏王文秀妻佟氏蕭黨女信上􅃟孫女皆順治間遭土寇亂義不受辱而死張稚升妻王氏清苑