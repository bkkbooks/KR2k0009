body:
  text: 安順府在貴州省治西一百八十里東西距三百一十里南北距一百六十里東至貴陽府貴筑縣界一百四十里西至興義府安南縣界一百七十里南至興義府貞豐州界一百里北至大定府平遠州界六十里東南至貴陽府廣順州界四百里西南至安南縣界四百五十里東北至大定府黔西州界四百里西北至平遠州界一百里自府治至京師七千八百二十里分野天文井􅀑分野鶉首之次晉書天文志自東井十二度至柳八度為鶉首建置沿革禹貢梁州荒裔漢牂牁郡地晉為興古郡地梁以後入於蠻唐為羅甸國地宋為普里部名勝志羅􅀑犵狫可􅝮苗所居號普里部元初内附置普定府隸雲南省至元中改為羅甸宣慰司元史地理志普里部歸附後改普定府烏魯斯請剙羅甸宣慰司隸湖南省至元二十七年罷之仍以其地隸雲南烏魯斯舊作斡羅思今改正大德七年改普定路屬曲靖宣慰司明洪武十四年仍置普定府十六年又析置安順州屬焉明統志元置習安州洪武十六年改曰安順州屬普定府十八年府廢以州屬普定衞隸四川通志明洪武十四年復置普定府領州三長官司六屬四川布政司尋增置普定衞十八年府廢以州司附於衞仍屬四川正統三年改隸貴州萬厯中升州為安順軍民府通志萬厯三十年改安順州為安順軍民府本朝為安順府雍正五年以舊屬之普安州及普安安南二縣改隸南籠府即今興義府共領州二縣三土司三普定縣附郭東西距一百二十里南北距九十里東至安平縣界六十里西至鎮寕州界六十里南至貴陽府廣順州界五十里北至大定府平遠州界四十里東南至安平縣界五十里西南至鎮寕州界四十里東北至清鎮縣界五十里西北至平遠州界八十里漢牂牁郡地元置普定縣隸普定路尋改為府明洪武初於普定府増置普定衞二十五年升為軍民指揮使司屬四川布政司正統三年改屬貴州都司本朝康熙十一年改為普定縣為府治永寕州在府城西一百四十里東西距一百里南北距一百五十里東至鎮寕州界七十里西至興義府安南縣界三十里南至興義府貞豐州界一百一十五里北至本府郎岱廳界三十五里東南至貴陽府定番州界二百二十里西南至興義府安南縣界八十里東北至大定府平遠州界九十里西北至興義府普安縣界八十里漢唐為牂牁郡地元置永寕州屬普定府後廢明洪武十六年仍置永寕州屬普定府十八年府廢屬普定衞隸貴州都司正統三年改隸貴州布政司萬厯三十年改屬安順府本朝因之清鎮縣在府城東一百二十里東西距九十里南北距七十里東至貴陽府貴筑縣界二十里西至大定府平遠州界七十里南至鎮寕州界二十里北至貴陽府修文縣界五十里東南至貴筑縣界十里西南至安平縣界二十里東北至貴筑縣界三十里西北至大定府黔西州界九十里漢牂牁郡地唐宋時為覊縻蠻地元為貴州宣慰司地明洪武二十一年置威清站隸貴州衞二十三年改置威清衞隸貴州都司崇禎三年又置鎮西衞及赫聲威武二守禦所本朝康熙二十六年改置清鎮縣而以衞所附入之屬安順府安平縣在府城東六十里東西距五十里南北距六十里東至清鎮縣界二十里西至普定縣界三十里南至貴陽府廣順州界四十里北至清鎮縣界二十里東南至廣順州界三十里西南至普定縣界三十里東北至鎮寕州界三十里西北至大定府平遠州界四十里漢牂牁郡地唐宋為羅甸國地元為金竹府地明洪武二十三年置平􅄵衞屬貴州都司崇禎三年又置柔遠守禦所本朝康熙二十六年改平壩衞為安平縣而以柔逺所附入之屬安順府鎮寕州在府城西五十五里東西距一百五十里南北距一百九十五里東至貴陽府廣順州界一百二十里西至永寕州界三十里南至永寕州界二十里北至安平縣界一百七十五里東南至普定縣界三十五里西南至興義府界一百五十里東北至貴陽府貴筑縣界二百二十里西北至大定府黔西州界一百二十里漢牂牁郡地唐宋為羅甸國地元置鎮寕州明洪武十四年屬普定府尋改屬四川普定衞正統三年改隸貴州布政司嘉靖十二年遷州治於安莊衞城萬厯三十年改屬安順府本朝因之康熙十一年省衞入州西堡副長官司在府城西北九十里元為砦明洪武十九年置司領四砦屬安順州後屬安順府本朝康熙十一年改屬普定縣二十一年仍屬府長官温姓頂營長官司在永寕州南一百五十里元為砦明洪武十九年置司領三砦本朝因之長官羅姓沙營長官司在永寕州南明洪武十四年置司本朝因之長官沙姓形勢崇山峻嶺為郛郭驚濤急流為溝池明皇輿考西南衝劇夷漢襟喉通志風俗土俗尚存桴鼓流寓漸有華風明通志尚文重信甲第雲仍通志詩書禮樂不減中華科舉題名記城池安順府城周九里有奇門四明洪武五年建本朝康熙九年修乾隆十四年三十六年重修普定縣附郭永寕州城周半里門二明洪武中建本朝康熙十二年修嘉慶十六年重修清鎮縣城即威清衞舊城周三里有奇門四明洪武二十六年建本朝康熙十一年修乾隆二十七年重修安平縣城即平壩衞舊城周四里有奇門四水關一明洪武二十三年建本朝乾隆二十二年修鎮寕州城即安莊衞舊城周五里有奇門四明洪武二十五年建本朝乾隆三十一年修學校安順府學在府治東明洪武中建本朝康熙七年修五十五年重修入學額數二十名普定縣學在府治東舊附府學本朝康熙三十八年遷建入學額數十二名永寕州學在州城外舊附安南縣學本朝康熙三十八年遷建入學額數八名清鎮縣學在縣治西舊為威清衞學明洪武中建本朝康熙二十六年改為縣學雍正三年修入學額數十二名安平縣學在縣城東北舊為平壩衞學明萬厯中建本朝康熙二十六年改為縣學雍正四年修入學額數十二名鎮寕州學在州治東舊為安莊衞學明正統八年建嘉靖十二年改為州學本朝康熙六年修雍正十一年重修入學額數十二名習安書院在府城南本朝嘉慶十五年建户口原額人丁一千八百三十五今滋生男婦大小共七十六萬九千七百七十五名口計一十三萬八千二百一十户田賦田地山塘共二十五萬二千七百三十八畝四分有奇額徵地丁正雜銀八千六百一十六兩八錢七分三釐米三萬二千一百八十五石九斗九升七合八勺山川東勝山在府治東高數仞長倍之俗名青龍山塔山在府治南通志元泰定二年建塔其上常有白光自塔頂出山多樹木四時青蔥郡中勝槩西秀山在府治西黔記一名石蓮峯通志與東勝龍虎對峙飛虹山在府城東五里懸崖崒嵂怪樹紆盤巖孔山在府城東四十五里府志山勢奇峻盤亘十餘里土人恃以為險旁有砦旗山在府城東南遊名山記形勢峻拔如幟馬首山在府城東南四十里屏風山在府城南崖壁蒼翠展列如屏馬鞍山有三一在府城西南廢安谷司西十一里狀若天馬一在清鎮縣東南山腰有白石如雪一在鎮寕州印山在府城西一里黔記其相近有龍泉山山下有龍泉故名大林山在府城西三里又有小林山唐帽山在府城西三里元真山在府城西十五里一逕逶迤達巔建閣於上扁曰元真境舊坡山在府城西北兩峯相對中有石關又五里為新坡山其巔長廣五里浪伏山在府城西北西堡司後名勝志元置習安州於山下伐木山在府城西北西堡司南六十里山高箐深中多材木雞公背山在永寕州東與關索嶺對峙通志亦名雞公背坡形如雞背下臨溪㵎山路艱險往來者視為畏途箭眉山在永寕州南頂營司西一百里地名陸堡通志勢極高大周四十餘里河流瀠紆其下巔有兩峯峯畔一谷寬平可藝土氣多燠蔬菜四時不乏然多瘴不可居惟土著仲家居焉安籠箐山在永寕州西廢慕役司北五十里山巒相接林木蓊密周四十里官道經其中險阻難行秋冬多霧昏曉不辨靛山在永寕州西廢慕役司通志水迥山轉其中深箐可種藍藍有木藍蓼藍耕久而益有收土尚煖寒則不生􅀊必異地以植紅崖山在永寕州西北八十里名勝志山畔有洞深廣數十丈居民間聞洞中有銅鼓聲世傳諸葛武侯駐兵之所夷人每祭祀用烏牛白馬則􅀊稔筆山在清鎮縣東峯巒尖聳如筆獅子山在清鎮縣東奇峭不羣上有佛閣滇行記居人言近有何福者威清人偶遊陰崖逢二老圍棋一老者分半桃食福福歸家絶烟火處分家事隨上山養真三十年忽尸解去遂名此山為何福山銅鼓山在清鎮縣西四十五里相傳漢諸葛亮南征􅀗銅鼓於此山半有洞每陰􅀨聞洞中有聲􅁡蜂山在清鎮縣西北五里黔記頂有洞每晨嵐霧如烟羊耳山在清鎮縣北明天啟初張彦方敗水西賊於此團山在安平縣治南山不甚高大而形圓觀音山在安平縣治西南絶頂有洞夏月亦涼金鼇山在安平縣東三里諸峯奔赴如浪湧波翻惟此山高插雲表儼若金鼇特跱高峯山在安平縣東二十里通志僧自然有道行卓錫兹山愛其峯高雲秀樹宻泉香棲息於此手植柏樹數千馬頭山在安平縣東南二十五里羣山連絡高聳凌雲又縣西一里有天馬山圓帽山在安平縣南一里又南一里有筆山八里有蹲獅山龍鳳山在安平縣南五里通志􅂞峯四合秀水雙灣白雲丹嶠崢嶸曰表昔僧自然遊此拂一袈裟於地為禪定所至今遊士憩息鹿角山在安平縣南一十五里明統志石􅄘聳立形如鹿角天台山在安平縣南二十里石壁陡峻一線石磴盤旋而上山頂有殿東坡山在鎮寕州東三里高三十里亘十餘里州之鎮山與山連麓者有筆架山青龍山在鎮寕州南下有嘉樂池對峙曰白虎山玉京山在鎮寕州南黔記在州東龜山在鎮寕州西南五里以形似名白崖山在鎮寕州西三里山勢起伏自水西至普定歡喜嶺老虎關諸處連亘百里至此而止慈母山在鎮寕州西三里名勝志俗名背兒崖形如母負子狀螺山在鎮寕州西五里通志下有大河每風雨交作則毒蛇猛獸並出山上建閣鎮之環翠山在鎮寕州北明統志在安莊衞北林木四時蒼翠猫兒山在鎮寕州北廢十二營司西北三里明統志以形似名歡喜嶺在府城北二里名勝志洪武中蠻賊攻城指揮顧成追殺大勝於此故名象鼻嶺在永寕州西廢慕役司西北四十里路出滇黔必經其上險峻難登寒坡嶺在清鎮縣東七里香鑪嶺在清鎮縣西山峯陡峻形如古鼎因名又名玉冠山關索嶺在鎮寕州西三十里本朝康熙中於嶺上建御書樓恭勒聖祖仁皇帝御書黔南鎖鑰四大字明統志在頂營司東勢極高峻周􅂞百餘里上有關索廟滇黔通道也洪武十五年呉復等克關索嶺又取其旁土砦數十滇程記雞公背山與關索嶺相對兩山之趾界以溪澗嶺凡四十三盤至巔有香樹坡小箐口坡白口東坡安籠箐坡胡淑凹象鼻嶺左右皆崖箐萬仞中僅有道如梁行者慄且汗矣餘詳本卷關索廟注石笏峯在府城東郡中諸山惟此最高摶翠峯在府城東北五里聳翠峯在清鎮縣北通志相傳明建文帝行遯時曾􅀉宿於此袈裟巖在安平縣南五里峭壁千仞如展袈裟其相接者又有包玉巖白石崖在府城西北西堡司西南五十里名勝志巖高頂夷有泉四時不竭一逕攀援而上名山勝槩記層巖削壁幽藤飛瀑夏月過此清寒逼人真物外佳境也藏甲崖在安平縣東五里通志一名金銀山崇山峻嶺石壁嶙峋一户雙扄限閾儼然相傳昔人藏甲於此下有基壘紅土坡在府城西南三里名勝志土色如珠又十里有黒土坡土色如墨黃土坡在永寕州西北一百六十里州志在州西南十里滇程記自頂站西南行十里為黃土鋪乃上黄土坡嶺道險巇打罕坡在永寕州北十