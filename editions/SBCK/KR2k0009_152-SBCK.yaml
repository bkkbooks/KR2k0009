body:
  text: 茂州直隸州在四川省治北少西四百一十里東西距一百八十里南北距四百三十里東至龍安府石泉縣界一百里西至黑虎寨番界八十里南至成都府灌縣界二百七十里北至松潘廳界一百六十里東南至石泉縣界一百里西南至雜谷廳界一百六十里東北至石泉縣界一百里西北臨大江本州境東西距一百七十里南北距一百五十里東至石泉縣界九十里西至黑虎寨番界八十里南至汶川縣界七十里北至松潘廳曡溪營界八十里東南至緜州安縣界一百二十里西南至汶川縣界七十里東北至石泉縣及曡溪營界一百里西北至曡溪營界九十里自州治至京師四千九百里分野天文井鬼分野鶉首之次建置沿革禹貢梁州之域漢初為冉駹國地按史記大宛傳天子發閒使出駹出冉是冉駹本二種也武帝元鼎六年以其地置汶山郡見漢書武帝紀華陽國志作兀封四年置誤治汶江縣宣帝地節三年省屬蜀郡為北部都尉後漢因之建安中先主定蜀復以北部為汶山郡華陽國志作安帝延光三年復立後漢西南夷傳又作靈帝時今據蜀志陳震傳為正晉時徙郡治汶山縣改汶江為廣陽屬之東晉後廢蕭齊復置北部都尉梁普通三年置繩州北部郡仍置廣陽縣為治按隨志汶山縣舊曰廣陽梁改為北部都尉今考齊志有北部都尉而無廣陽縣蓋北部置於齊州郡縣皆置於梁時也周保定四年改繩州曰汶州隋開皇初郡廢改汶州曰蜀州尋又改㑹州置總管府仁夀元年改縣曰汶山大業初府罷復改州為汶山郡唐武德元年復曰㑹州三年置總管府四年改曰南㑹州七年改置都督府督南㑹翼維及羈縻塗炎徼向冉穹笮等十州永徽後又増領三十二州皆生羌部落貞觀八年改曰茂州天寶元年改通化郡乾元元年復曰茂州屬劒南道五代屬蜀宋亦曰茂州通化郡領羈縻十州屬成都府路元屬吐蕃宣慰司明洪武初以州治汶山縣省入屬成都府本朝初因之雍正六年升直隸州屬四川省以成都府屬之汶川縣來隸省威州為保縣屬之嘉慶六年裁保縣以其地併入雜谷廳領縣一土司九汶川縣在州西南一百二十里東西距一百六十里南北距一百七十里東至本州界一百四十里西至瓦寺土司界二十里南縣界一百二十里北至本州界五十至成都府灌里東南至灌縣界一百里本州界五十西南至瓦寺土司界三十里東北至里西北至雜谷廳界十里漢置緜虒縣屬蜀曰汶山郡後漢曰緜虒道晉移汶山郡來東晉後郡徙縣廢周復置汶川縣治改縣仍於縣置汶山郡隋開皇􅀄郡郡唐屬茂州宋熙寕九廢屬㑹州大業初屬汶山年於縣置威戎軍政和六年改名延安宣和三年廢軍為砦縣仍屬茂州元至元十九年廢縣設巡檢司後復置明宣德中移治此仍屬茂州本朝初屬成都府雍正五年復屬茂州瓦寺宣慰司在汶川縣西北二十里東至保子關番界四十里西至鄂克什土司界五百里南至穆坪土司界六百里北至雜谷廳界一百二十里其先於明時世襲安撫司本朝順治九年歸附仍授原職所轄番民一千二百户康熙五十九年征西藏土司桑朗温愷隨征有功加宣慰司銜乾隆二年加指揮使職銜後征雜谷土司蒼旺並金川等處土司桑朗雍中隨征賞戴花翎更名索諾木榮宗嘉慶元年隨征達州教匪升宣慰司換給印信靜州長官司在州東二里東至隴木土司界三十里西至岳希土司界十里南至竹木坎土司界五十至牟托土司界六十里北里宋時蠻董姓者據其地號靜州蠻明洪武七熙五年首領董􅀿韶年置長官司世襲本朝康歸附仍授原職所轄十寨番民長官董氏世襲岳希長官司在州西五里東至州界鎮西橋西至章圭砦二十里南至牟托土司十里明洪武七界二十里北至竹木坎土司界五年置長官司本朝康熙五年首領坤道齡歸附仍授原職所轄黒族七番民一千十户長官坤氏世襲隴木長官司在州東北四十里東至龍安府石泉縣界三十里西至靜州土司界三十里南至州界馬桑灣二十里北至松潘廳曡溪營界三十里明洪武七年置長官司本朝康熙五年首領何延禧歸附仍授原職所轄番民百十七户長官何氏世襲水草坪巡檢土司在州北三十里東至長平堡十里西至鎮戎堡四十里南至魏磨關四十里北至沙壩土司界十五里本朝順治九年歸附頒給印信轄番民一百二十户土司蘇氏世襲牟托巡檢土司在州西南四十里東至州界三十里西至生番界十五里南至保子關二十里北至岳希土司界二十五里本朝順治九年歸附頒給印信轄番民五十四户土司温氏世襲竹木坎副巡檢土司在州西北五十里東至生番界十五里西至黒龍砦三十里南至長平堡三十里北至水草坪土司界五里本朝順治九年歸附頒給印信轄番民一百户土司孫氏世襲沙壩安撫司在州北三十里東至實大關土司界四十里西至岳希土司界五十里南至竹木坎土司界三十里北至水草坪土司界二十里其先於明時世襲安撫司本朝順治九年歸附頒給印信所轄番民三百二十四户土司蘇氏世襲實大關副長官司在州西三十里東至州屬小牛村五里西至大河界二里南至蕭堡塘十里北至大定堡十里其先於明時授職本朝康熙十年歸附頒給印信所轄番民七十一户長官官氏世襲形勢控制吐蕃捍蔽内郡圖經序逼近羌戎環帶山險成都肩背之地舊圖經威茂兩州實灌口之障蔽其勢特與沿邊諸州不同堡寨參錯於中州城􅀌立於外而屬部藩落周分環據二三百里之閒官路惟留一線宋胡元質奏議風俗其山有六夷七羌九氏各有部落土氣多寒盛夏冰猶不釋後漢書冉駹夷傳好弓馬以勇悍相高詩書之訓闕如自古及今並無兩稅寰宇記俗耐飢寒圖經曡石為􅠼以居如浮圖高二三丈者謂之籠雞十餘丈者謂之碉亦有板屋土屋者同上城池茂州城有内外二城内城周三里七分門四明洪武初建外城周五里門二成化中建本朝康熙六年修五十六年重修汶川縣城周不及一里門二明正德七年建本朝乾隆二十九年修學校茂州學在州治南明宣德八年建本朝順治十六年重建康熙六年修乾隆十年四十年重修入學額數六名舊額八名乾隆六十年減二名汶川縣學在縣治南明嘉靖二年建本朝乾隆六十年修嘉慶五年重修入學額數六名舊額八名乾隆六十年減二名石紐書院在汶川縣治南學宫右邊本朝乾隆二十八年建户口原額户四千七十一今滋生男婦共三十九萬六千九百九十九名口計五萬八千九百三户田賦田地三十五頃一十九畝九分有奇額徴地丁正雜並徭銀七百一十五兩三錢二分四釐又各寨番民雜糧折徴米九十石五斗九合一勺二抄三撮山川五味山在州東十八里寰宇記山出五味子因名馬蹄山在州東三十里岷山在州東南二十里益州記岷山去成都五百里元和志汶山縣有汶山即岷山也南去青城石山百里天色晴明望見成都山嶺停雪常深百丈夏月融泮江川為之洪溢即隴山之南首也舊志山有九峯四時積雪不消一名雪山俗呼九嶺山按此非古岷山也漢志岷山在湔氏道徼外在今松潘衞北生番界又山海經注岷山在廣陽縣西張栻西岳碑云在茂州列鵞村其跗曰羊膊輿地廣記在汶山縣西北俗謂之鐵豹嶺此又在州西番界今無可考巨人山在州南三十里寰宇記山頭有石如人面南明皇幸蜀時以石人背立勅令鞭之一百下有池俗傳是九龍池方輿勝覽山有黒龍湫四山環繞百二十里舊志與雪山相連前有龍洞有水噴出山後有徑可達天池大壩彭縣三郎廟等處龍泉山在州南隋志汶山郡北川縣有龍泉山寰宇記在汶山縣南四十八里山下有湫號青池一曰龍池旱禱必應放牧馬於其側多生駿駒雞宗山在州南四十里方輿勝覽宋熙寕九年楊文緒猖獗聲援俱絶至書木牌投於江以告急朝廷遣王中立將兵旁出雞宗山討平之置關及鎮羌寨於此茂溼山在州北十里舊唐志茂州以郡界茂溼為名明統志樹木茂密常有嵐氣因名鷹門山在州北二十里寰宇記山多鷹棲故名按隋志北川縣有雁門山即鷹門山之訛也隴東山在州東北十八里按宋史州北有隴東道通緜州即此玉壘山在汶川縣東漢書地理志緜虒縣玉壘山湔水所出郭璞江賦玉壘作束别之標元和志山在汶川縣東北四里寰宇記在汶川縣北三里又有玉壘坂慈母山在汶川縣南六十里元統志山中有池曰滋茂池亦曰慈母池名勝志慈母山在青城山東滋茂龍池在汶之尤溪萬山叢立中有方池周四十里河屏山在汶川縣西二里山腰有大坪塗禹山在汶川縣西北二十里峯巒秀麗今為瓦寺安撫司住牧之處七盤山在汶川縣北三十里寰宇記在汶川縣北九里有七盤坡路唐大厯中吐番入寇官軍追敗之七盤即此相公嶺在州東北茂溼山北三里方輿勝覽相公嶺州之主山舊志宋王中立駐師於此因名娘子嶺在汶川縣南一百里高峻逶迤為縣門户龍洞在汶川縣南一百三十里兩山石壁高懸疑若無路至冬則水不入江皆注洞中不知歸於何處木瓜坪在汶川縣東一里又馬念坪在縣西北五里接瓦寺土司界大邑坪在汶川縣南懸崖臨江地勢險阻為金川要路現設塘汛又興文坪在縣南七十里溼阪在汶川縣南元和志嶺上樹木森沈常有水滴未嘗暫燥故曰溼阪按元統志作溼凍嶺大江自松潘鎮曡溪營流入南流經州城西又西南經廢保汶川二縣之西又南入成都府灌縣界冰經注江水自龍涸蠶陵南下至石鏡又六十餘里而至北部始百步許又西百二十餘里至汶山故郡乃廣二百餘歩又西南百八十里至經汶溼阪江稍大矣元和志汶江北自翼州南流山縣西二里舊志岷江自曡溪營入茂州境南流五十折而西南里合黑水又東南三十里至州城西又六十里過汶川縣地十餘里入威州界西流一里經州城北合花水又西南十里仍過汶川縣界又三十里至縣城西又南曲流一百三十里入灌縣名湔水每界其在威州界者亦斤較沱水輕二兩神溪河在州東又東入龍安府石泉縣山東十九界即古石密溪也元和志石密溪在汶里舊志今名馬蹄溪源出州東馬蹄山東入石泉縣界又有都流溪源出都流口寨合馬蹄溪按輿圖作神溪下流即石泉河詳見石泉縣白水河在州南源出龍泉山西流入江居民引以灌溉甚利黑水河在州西北六十里源出生番界東南流經曡溪營西界至長平堡西入大江即古翼水也黒虎寨河在州西北源出黒虎寨東流至長平堡南入江舊志謂之北松溪草坡河在汶川縣南源出瓦北曰寺土司沙派溝界有二派南曰龍潭溝東南流㑹為一入大江桃川在汶川縣南四十里山溪也有桃千餘樹故名南龍溪在州南方輿勝覽茂州有龍溪水引入城内至光孝寺以兩池瀦之居民常汲飲州志源出巨人山龍湫今改流城外西入江三溪在州北五里明統志五福泉在州治圖經云自三溪口引水入城至州治貯以兩井號五福泉民汲飲州志源出茂溼山南流入城民取汲之西入江磨刀溪在汶川縣北二十里西流入江温凉泉在汶川縣西南一里山下涌出冬温夏凉新井在州城中州舊無井仰汲於江遇蠻警輒斷汲路明正德中巡撫馬吳鑿地數十丈方得泉號曰新井古蹟汶江故城在州北漢置縣為蜀郡北部都尉治晉改置廣陽縣隋改汶山唐宋皆為茂州治明初始者入州元和志汶山縣本漢汶江縣地汶江城在縣北三里宋白續通典晉置廣陽縣於汶江縣西北五十里周移置於石鏡山南六十里即今治也廣柔故城在汶川縣西北漢置縣屬蜀郡後漢因之晉初屬汶山郡後廢括地志在汶川縣西七十二里廢乾州在州西唐書地