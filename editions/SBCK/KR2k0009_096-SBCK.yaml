人桓帝時為涼州從事時武威太守倚恃權勢恣行貪橫正和案致其罪刺史梁鵠畏懼貴戚欲殺正和以免其􅀒乃訪之於蓋勲勲曰不可謀事殺良非忠也乘人之危非仁也正和由是得免焉張奐敦煌酒泉人延熹中拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月產子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓為立生祠三國魏母邱興河東聞喜人黃初中為武威太守時河右遐遠喪亂彌久武威當諸郡路通喉轄之要加民夷雜處數有兵難興内撫吏民外懷羌胡卒使柔附徐邈燕國薊人明帝時為涼州刺史使持節領䕶羌校尉河右少􅀨常苦乏榖邈上修武威酒泉鹽池以收虜榖又廣開水田募貧民佃之室家豐足倉庫盈溢乃支度州界軍用之餘以市金帛犬馬通供中國之費以漸收斂民閒私仗藏之府庫然後立學明訓禁厚葬斷淫祀進善黜惡風化大行百姓歸心焉西域流通荒戎入貢皆邈勲也范粲外黃人為武威太守到郡選良吏立學校勸農桑是時戎夷頗侵疆埸粲明設防備敵不敢犯西域流通無烽燧之警又郡壤富實珍玩充積粲檢制之息其華侈晉馬隆平陸人武帝時涼州刺史楊欣失羌戎之和隆陳其必敗俄而欣為虜所滅河西斷絶帝臨朝而嘆曰誰能為我討此虜通涼州朝臣莫對隆進曰臣請募勇士三千人鼔行而西虜不足滅帝許之以隆為武威太守隆募得三千五百人西渡温水虜樹機能等以衆萬計乘險設伏隆且戰且前奇謀閒發前後誅殺及降附者以萬計到武威擊斬樹機能涼州遂平李憙上黨銅鞮人景帝時除涼州刺史加揚威將軍假節領䕶羌校尉綏御華夷甚有聲績羌虜犯塞憙因其隙會不及啟聞輒以便宜出軍深入遂大克􅀗以功重免譴時人比之漢朝馮甘焉南北朝魏韓襃穎陽人大統十二年除都督西涼州刺史羌胡之俗輕貧弱尚豪富侵漁百姓同於僕隸故貧者日削襃乃悉募貧人以充兵士優復其家蠲免徭賦又調富人財物以賑給之每西域商貨至又先儘貧者市之由是貧富漸均户口殷實周梁睿烏氏人武帝時爲涼州總管有惠政隋楊爽文帝弟封衞王爲涼州總管治甚有聲賀婁子幹代人開皇元年吐谷渾寇涼州了幹以行軍總管從上柱國元諧擊之功最優高祖慮邊塞未安即令子幹鎮涼州明年突厥寇蘭州子幹率衆至可洛峐山阻川爲營賊軍不得水數日人馬甚敝縦擊大破之乞伏慧馬邑鮮卑人高祖時遷涼州總管先是突厥屢爲寇鈔慧於是嚴警烽燧遠爲斥堠突厥亦素憚其名竟不入境樊子葢廬江人煬帝時為武威太守以善政聞及卒武威民吏聞之莫不嗟痛立碑頌德唐牛仙客涇州鶉觚人開元初為河西判官清勤不倦接待上下必以誠信尋判涼州别駕時又代蕭嵩為河西節度使省財節用所積倉庫盈滿器械精勁侍中崔逸代其事因以奏聞路嗣恭三原人始名劒客由蕭關令連徙神烏徙姑臧令考績為天下最明皇以為可嗣漢魯恭因賜名明劉林洪武初為涼州衞百户額森特穆爾叛掠涼州林戰沒於城西竇融臺事聞賜祭於臺下額森特穆爾舊作也先帖木兒今改宋晟定遠人洪武中為涼州衞指揮使討西番叛酋至額齊訥路擒元海道千户額森特穆爾以下萬八千人以功進右軍都督僉事充總兵官仍鎮涼州周尚文西安後衛人嘉靖初為都指揮同知充涼州副總兵嘗追寇出塞寇來益衆麾下皆恐尚文從容下馬解鞍背崖力戰寇退被創甚告歸尋起故官敵數踏氷入尚文築牆百二十里澆以水冰滑不可上冰泮則令力士持長竿鐵鈎鈎殺渡者官惟賢天啟中以都司僉書署鎮番參將事河套松山諸部來犯惟賢出擊大敗之論功進副總兵時西部頻􅀊寇邊惟賢屢挫其鋒軍聲為振祁秉忠天啟時為永昌參將伊騰達春以二千餘騎入塞秉忠提兵三百拒之轉戰兩晝夜援兵至寇敗走追還被掠人畜邊人稱之伊騰達春舊作銀定歹成今改本朝張鵬翼昌平人順治四年分守涼莊以廉明稱五年死於逆回之難李沈安邑人康熙九年厯升莊浪同知清介自守盡革茶馬屯田之弊課最為天下第一聖祖襃之賜一品服人物漢段熲姑臧人少便習弓馬尚遊俠輕財長乃折節好古學厯中郎將遷䕶羌校尉燒當等八種羌寇隴右熲追擊破之為刺史郭閎所誣坐徴下獄後復為䕶羌校尉破西羌封都鄉侯永康元年當煎諸種復反熲追擊於鸞鳥大破之西羌於此弭定而東羌先零等數寇三輔熲移兵東討凡百八十戰東羌悉平更封新豐縣侯後拜太尉周珌武威人獻帝時官尚書董卓初信任珌及城門校尉伍瓊用所舉韓馥等出宰州郡馥等至官合兵討卓而珌瓊隂為内主卓怒其賣已皆斬之三國魏賈詡姑臧人少時閻忠異之謂詡有良平之奇察孝廉為郎厯討虜校尉從李傕等於長安又為張繡謀主太祖拒袁紹於官渡詡勸繡率衆歸太祖太祖表詡為執金吾封都亭侯用詡計破紹徙為大中大夫太祖與韓遂馬超戰於渭南用詡謀卒破遂超詡自以非舊臣而䇿謀深長懼見猜嫌闔門自守退無私交男女嫁娶不結高門天下之論智計者歸之文帝即位為太尉進爵魏夀鄉侯晉賈疋詡曾孫懷帝時為雍州刺史率衆攻劉曜於長安大敗之曜中流矢退走遂迎秦王奉為皇太子建行臺於長安加疋征西大將軍後為彭仲蕩子天䕶所害疋勇畧有志節以復晉室為己任不幸顛墜時人惜之南北朝梁陰子春姑臧人晉義熙末曾祖襲隨宋武帝南遷至南平因家焉父智伯與武帝鄰居少相友善及帝即位拜梁秦二州刺史子春厯仕胊山戍主東莞太守都督梁秦二州刺史以廉潔稱陳陰鑑子春子博涉史傳尤善五言詩為當時所重仕陳累遷晉陵太守員外散騎常侍有文集三卷行世魏賈彝姑臧人六世祖敷魏幽州刺史廣川都亭侯子孫因家焉父為苻堅鉅鹿太守坐訕謗繫獄彝年十􅀊詣長安訟父􅀗申遠近歎之子秀仕魏為中庶子與高允俱以儒舊重於時厯奉三帝常當機要廉清儉約不營資產陰仲達姑臧人少以文學知名世祖平涼州内徙代都司徒崔浩啟薦仲達與同郡段承根二人同修固史除祕書著作郎北齊段榮姑臧人祖信仕沮渠氏後入魏以豪族徙北邊仍家於五原郡榮少好厯術專意星象正光中謂人曰吾今觀天象察人事不及十年當有亂矣及神武起兵榮贊成之論功封姑臧縣侯厯相濟秦三州所至百姓愛之段韶榮子少工騎射有將領才畧襲父爵事神武文襄文宣累除左丞相封廣平郡公韶出總軍旅入參帷幄功高望重而又雅性温慎敎訓子弟閨門雍肅事後母以孝聞齊代勲貴家罕有及者隋陰夀武威人少果烈有武幹高祖為丞相引夀為掾尉迥作亂高祖以韋孝寬為元帥擊之令夀監軍時孝寬有疾不能親總戎事三軍綱紀皆決於夀㝷拜幽州總管封趙國公開皇初高寶凝攻圍北平夀率步騎破之於黄龍卒官贈司徒陰世師夀子少有節概性忠厚多武藝弱冠以功臣子拜儀同煬帝時拜張掖太守後遷左翊衛將軍與代王留守京師唐軍至世師自以世荷隋恩勒兵拒守城陷見殺唐李抱玉本安興貴曾孫世居河西始名重璋為人沈毅有謀尤忠謹李光弼引為禆校天寶末帝以其戰河西有功改今名祿山亂守南陽斬賊使至德二載上言世占涼州恥與逆臣共宗有詔賜之姓因徙京兆史思明破東都光弼使抱玉守南城縱奇兵出俘殺甚衆賊不能西差功第一封欒城縣公代宗立徙涼國公累進司徒尚書左僕射同中書門下平章事河西隴右山南西道副元帥卒贈太保諡昭武李抱真抱玉從弟沈慮而斷抱玉屬以軍事授汾州别駕僕固懐恩反挺身歸京師厯澤潞節度行軍司馬德宗嗣位領昭義節度使田悦反圍邢門抱真敗悦解其圍㑹朱滔王武俊反救悦諸鎮反者相屬抱真獨以數州截然橫絶潰叛中離沮其姦偽為羣盜所憚興元初朱滔悉兵圍貝州抱真以數騎馳説王武俊合戰破滔進檢校司空段平仲武威人擢進士第為御史磊落有􅂔節徳宗時召對迕㫖坐廢七年元和初為諫議大夫再遷尚書左丞朝廷有得失未嘗不論奏世推其敢直元噶掄北庭人居永昌為巨族久居政府聰明典重通達國體敭厯中外官至平章政事噶掄舊作幹欒今改高智燿河西人世事夏夏亡隱賀蘭山太宗召見將用之遽辭歸後入見憲宗言宜蠲徭役世祖時又言儒者有􅀘治道拜翰林學士遷西夏中興等路按察使子睿授寶符郎出入禁闥詳雅恭謹厯浙西淮東廉訪使所至有政績兩為南臺御史中丞務持大體有儒者風星吉河西人少事仁宗藩邸以精敏稱累官江西行臺御史大夫獨持風裁至正中厯湖廣江西行省平章政事屢破賊後中流矢不食而死星吉為人公廉明決在軍中能與將士同甘苦以忠義感激人心故能得人死力余闕武威人徙廬州少喪父授徒以養母元統初賜進士及第授同知泗州事厯翰林修撰待制至正中盜起以闕僉都元帥府事分兵守安慶以保障江淮功拜江淮行省參知政事仍守安慶後羣盜四集闕以􅀌軍血戰城陷自剄妻子皆赴井死明呉克忠本􅀩古人父允誠永樂中來歸授都督僉事命居涼州以功進左都督封忠順伯卒贈國公諡忠壯克忠襲父爵從征阿魯台有功洪熙初進封侯正統中以功加太子太保土木之變與弟都督克勤力戰死封贈邠國公諡忠勇克勤贈遵化伯諡僖敏克忠子瑾嗣侯曹欽反瑾聞變椎長安門上告門閉欽攻不得人瑾將五六騎與欽力戰死贈涼國公諡忠壯魯鑑其先西大通人祖阿什達父衮布沙克嘉明初率部落歸附太祖授爲百夫長俾統所部居莊浪傳子衮布沙克嘉累官莊浪衞指揮同知鑑有材勇正統初嗣父職擢署都指揮僉事成化四年固原滿四反鑑以土兵從諸軍圍石城躬冒矢石出則先驅入則殿後最爲賊所憚賊平厯都督同知充總兵官鎮守延綏致仕子麟襲指揮使累進都指揮同知充甘肅遊擊將軍魯氏世守西陲有捍禦功至鑑官益顯其世業益大而所部土軍生齒又日繁麟既移甘肅帝以土軍非鑑不能治特起治之且命有司建坊旌其世績麟豪健如其父官至左副總兵麟子經累官都督同知延綏鎮總兵官亦以驍勇稱為良將阿什達舊作阿失都衮布沙克嘉舊作鞏卜失加今並改張達涼州衞人慷慨􅀒奇節膂力絶人嘉靖中累功擢署都督僉事充山西總兵官駐寕武坐事被逮後命赴軍前立功却敵尋鎮陜西延綏又移大同俺答數萬騎入塞伏精鋭谿谷中巡按御史胡宗憲趣出師達欲持重宗憲厲聲責之不得已率所部挺身陷陣力戰死贈左都督諡忠剛郭琥永昌衞人嘉靖中積功至指揮僉事為鎮番守備城接敵境前守者率閉門琥至擊卻寇遂開門縱人耕牧而日帥兵以䕶累擢古北口副總兵繕治邊垣益墾塞下荒田厯延綏薊鎮山西總兵官旋改大同進都督致仕琥潔廉好籌畫目不知書而以意作檄頗中情事云達雲涼州衞人勇悍饒智畧萬厯中累官西寕參將土酋永郃卜入寇設伏擊破之手馘賊帥斬􅀗無算寇集衆大至又敗去進都督同知厯鎮延綏甘肅收復松山拓地五百里累加太子少保雲為將先登陷陣所至未嘗挫衂名震西陲為一時邊將之冠本朝張仲金武威人以把總從孫思克征噶爾丹戰殁孫文炳武威廪生恂謹持禮法安貧嗜學從游甚衆兄殁撫􅀌成立同里馬姓迎父母於金城託妻于炳炳令妻蘇氏同寢處文炳館㝛于外戒子弟年十五以上者不得入内閲七月而馬始還感謝而去入祀鄉賢祠次子詔官至湖北布政使又同邑賈漢英廪貢生精研理學生母王氏早殁事嫡母高氏繼母吕氏極孝竝祀鄉賢祠李蘭鎮番人官新城堡守備隨總兵康海征西藏陣亡何孔述鎮番人少穎悟日誦數千言順治五年值帖清泰倡亂述以諸生與廪生朱運開參將馬玘􅁹滅􅉰黨制軍孟喬芳嘉其功檄署本營參將兵民帖服述辭願以科名顯是年即拔貢辛卯舉于鄉孟公笑曰何生果有大志真文武才也入祀鄉賢祠孟一鯉鎮番人性至孝著有春秋翼傳子良允由舉人厯州縣有循聲擢主事升昌平道厯官浙江布政使著有最樂編念貧吟入祀鄉賢祠孫克明鎮番人康熙庚辰進士鎮邑地多沙患克明率邑人王仲等於東邊外六壩湖移邱開墾貧民賴之仕湖廣通城令多惠政通人爲立遺愛碑入祀鄉賢祠又同邑盧全昌篤學能文事母極孝殁祀鄉賢祠魯大誥平番人置義田贍宗族有􅀒貸者常折券以恤之郡外水利不通修濬溝渠以資灌溉民賴其利入祀鄉賢祠又同邑李可珠敦本睦族亦祀鄉賢祠郭洪恩古浪監生與子生員宗堯於順治五年􅉰匪倡亂協力謀􅁹爲賊所執罵賊而死入祀鄉賢祠李夢白平番人剛方正直敎授生徒有法度由保薦厯官知府卒於廣南囊槖如洗馳驛歸葬祀鄉賢祠周自伏涼州衞人康熙五十七年以守備從康海征西藏及海亡突圍奪海屍賊衆大至力戰死又同縣魯彥燦山西蒲州副將出歸化遇虜爾泰山遂戰殁傅瑾武威人西寕千卹建祠致祭趙化彤武威人五世同堂嘉慶二十五年旌田正鎮番人五世同堂嘉慶十六年旌流寓南北朝魏常爽河内温人祖珍因世亂遂居涼州爽篤志好學博聞强識五經百家多所研綜州郡禮命皆不就魏世祖西征涼土爽歸款拜宣威將軍置館於温水之右敎授七百餘人弟子事之若嚴君暇述六經畧注以廣制作講肄經典二十餘年時號儒林先生明包節嘉興人居華亭嘉靖中以御史按湖廣爲守備中官廖斌誣搆謫戍莊浪衞處之甚安既聞母訃慟􅂘而死列女明蔡氏涼州衞人年十六適邑人秦某甫一􅀊夫殁遺腹生子祚周家甚貧紡績敎子讀書祚周爲諸生娶婦氏乃曰吾之所以不死者汝未成立也今吾事畢矣遂絶食七日而死萬厯末旌表周士成妻郭氏莊浪衞人嫁逾年夫暴卒氏誓以死殉姻戚勸之氏言夫死無子不死何待水漿不入口十餘日而死常德妻甄氏永昌衞人年十八遇賊懼為賊辱以香灼面成瘡賊怒害其夫氏􅀒屍哭罵遂投井死徐氏平番衞人張繼宗子婦崇禎末為流賊所執氏左手扼賊吭右手持刀自刎死又韓逢春妻馬氏賊入城時投繯死胡其美女平番衞人其美常為女講列女傳諸書女即領悟崇禎末流賊攻燒堡門挾女上馬女投井死本朝朱良貴妻張氏古浪人又同邑節婦李棲鳳妻俞氏均夫亡守節撫􅀌成立四十餘年如一日周甲鼎妻張氏鎮番人甫婚夫即從戎以功授四川千總旋殁遺一子又殀氏矢志奉姑苦節不渝劉金璽妻褚氏涼州衞人夫亡守節五十餘年撫孤成立又同衛節婦劉大濱妻金氏徐可􅃟繼妻李氏徐自璧妻李氏王尚賓妻穆氏丁宏妻王氏林可梧妻孫氏均雍正年閒旌馬逢雲妻牛氏武威人夫亡守節事親撫孤四十餘年又同邑節婦梁可正妻衡氏安尚玉妻韓氏張璧妻楊氏段鐸妻牛氏侯用錫妻張氏狄金榜妻岳氏蔡茂妻鮑氏孫瑞麟妻韓氏俱雍正年間旌張兆斌妻李氏武威人兆斌以營卒從征西藏病殁喪不能歸氏晝夜哀號投井死雍正年閒旌辛克嶷妻龔氏武威人克嶷在庠卒年二十五遺二子皆幼氏矢志撫􅀌奉翁姑孝謹又同邑節婦陸嶠妻胡氏張維善妻白氏尹鈞妻張氏馮玉友妻井氏王元妻劉氏王化育妻楊氏張濟妻王氏劉宗向妻紀氏龔爾仕妻袁氏喬世隆妻朱氏王祚永妻于氏劉克成妻李氏張映桂妻孫氏郝敬妻柯氏李生桂妻謝氏何永康妻王氏宣弼朝妻張氏韓炌妻趙氏張元妻宋氏郝謹妻柯氏王錫書妻潘氏高登瀛妻曹氏管愛義妻張氏周宗堯妻賈氏張謀妻章氏張相妻郭氏劉季元妻孫氏魏其貢妻張氐楊鍾美妻程氏閻濟化妻喬氏龔妻任氏張烈妻蕭氏張治妻高氏郭良俊妻李氏趙國清妻王氏王吉林妻李氏張鳳妻王氏盧應才妻王氏盧守福妻陳氏張大典妻甯氏丁錫珍妻楊氏賈琬妻辛氏楊榆妻張氏楊撰妻段氏聶文元妻李氏崔言妻李氏李朝陽妻李氏郭泰妻嚴氏丁士琮妻韓氏張君璞妻郭氏張釨妻李氏孫承相妻姚氏脫榮妻孔氏田得閏妻李氏楊維桐妻郭氏段文魁妻楊氏左化鳳妻馬氏裴印祿妻呉氏林毓睿妻景氏劉伯友妻張氏王好鼎妻楊氏達㑹妻姜氏王棋妻尹氏潘雲清妻張氏劉鼎妻馬氏李永瑞妻唐氏劉士鶗妻降氏董克昌妻師氏董吉福妻查氏李琬妻馮氏薛景妻張氏杜潤妻蕭氏又貞女齊良玉聘妻吕氏均乾隆年間旌王訓妻劉氏鎮番人年二十四而寡遺二孤撫之成立長子希本又逝與媳李氏晝夜機杼供孫讀書長孫有德成進士厯官晉楚氏卒年八十又同邑節婦楊必梁妻謝氏曹祥吉妻蕭氏許遂妻路氏吳道晃妻胡氏何緒淮妻楊氏閻錫珽妻白氏王恒德妻甘氏盛梓妻王氏何中樂妻楊氏何宏烈妻李氏周文曦妻馬氏又烈婦高同勇妻楊氏均乾隆年閒旌劉建勲妻馬氏永昌人年二十八而寡家貧子幼矢志守節又同邑節婦陸遴輔妻王氏又張氏崔氏楊氏曹氏張氏喻氏李氏張氏曹氏杜含蔁妻曹氏均乾隆年間旌王瑞妻唐氏古浪人夫亡守節教子成立又同邑節婦希添位妻張氏金聲聞妻李氏周紹妻俞氏王紀正妻李氏劉建鵬妻胡氏貞女董氏女均乾隆年閒旌蘇文林妻劉氏平番人夫亡守節撫二子成立又同邑節婦李開春妻董氏蘇國仕妻房氏鄧憲文妻蒲氏馬步階妻高氏謝凝妻段氏王理妻高氏童叶謀妻薛氏李廷棟妻甘氏繆玉妻劉氏譚維中妻李氏張緒妻趙氏張希舜妻高氏楊大年妻周氏譚易元妻劉氏高爾志妻張氏張應凱妻周氏岳世瞻妻趙氏張文鑣妻石氏康昌運妻張氏魏建成妻徐氏羅文魁妻胡氏張紳緒妻廖氏金勝玉妻張氏康路妻閻氏張豫妻王氏柳