  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_096-1a}
body:
  text: 甘州府在甘肅省治西北一千五百里東西距三百二十里南北距二百里東至涼州府永昌縣界二百二十里西至肅州高臺縣界一百里南至邊界一百六十里北至邊界四十里東南至大黄山二百五十里西南至祁連山二百里東北至邊界一百里西北至高臺縣界一百二十里自府治至京師五千八十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢雍州之域戰國及秦爲月氐地漢初爲匈奴昆邪王地武帝元鼎六年置張掖郡見本紀地理志作太初元年開不同後漢因之晉仍曰張掖郡隆安中北涼沮渠􅀩遜初都於此􅀩遜於隆安五年據張掖義熙八年遷姑臧後魏太武平涼置張掖軍見元和志太和十一年改軍爲郡見寰宇記而地形志無此郡隋志作後周置西魏大統十二年分置西涼州廢帝三年改曰甘州周復置張掖郡隋開皇初郡廢大業初復置郡唐武德二年復曰甘州唐書方鎮表景雲元年置河西節度副使治甘州天寶初復曰張掖郡乾元初復曰甘州屬隴右道永泰二年陷於吐蕃大中五年收復尋爲囘鶻所據宋天聖六年入於西夏改鎮夷郡又置宣化府元初復曰甘州至元元年置甘肅路總管府八年改甘州路十八年置甘肅行中書省明洪武五年置甘肅衞明統志作二十四年今從明史二十五年改甘州衞二十六年置陜西行都指揮使司於此領衞十二守禦千户所二按明史行都司置於洪武十二年初治莊浪至是始移於此本朝初因之雍正二年裁行都司改置甘州府屬甘肅省置張掖縣為府治又改山丹衞為山丹縣高臺廳為高臺縣七年改隸肅州直隸州今領縣二張掖縣附郭東西距一百九十里南北距二百里東至山丹縣界九十里西至肅州高臺縣界一百里南至邊界一百六十里北至邊界四十里東南至山丹縣界一百六十里西南至白城子二百里東北至轉觜墩一百里西北至高臺縣治一百六十里漢置觻得縣為張掖郡治後漢因之晉改縣曰永平仍為郡治西魏為甘州治後周仍為郡治隋開皇十七年改縣曰酒泉大業初復改曰張掖為張掖郡治唐為甘州治後陷吐蕃廢宋時入於西夏元置甘州路為甘肅行省治明初置甘肅衞二十五年改置甘州左右中前後五衞為陜西行都司治本朝順治中裁中前後三衞存左右二衞雍正二年改置張掖縣為甘州府治山丹縣在府東一百二十里東西距一百三十里南北距一百七十五里東至涼州府永昌縣界一百里西至張掖縣界三十里南至邊界一百五十里北至邊界二十五里東南至白石崖口一百八十里西南至寕番山口一百五十里東北至玉泉墩一百二十里西北至邊界三十里漢置刪丹日勒二縣屬張掖郡後漢因之獻帝時分置西郡晉因之後魏改刪丹曰山丹周郡廢隋大業初復曰刪丹屬張掖郡唐屬甘州宋時屬西夏置甘肅軍元至元初復曰山丹二十二年升為山丹州隸甘肅行省明洪武二十三年置山丹衞屬陜西行都司本朝初因之雍正二年改置山丹縣屬甘州府形勢環以祁連合黎之山浸以居延鮮卑之水元志風俗民俗質樸後漢書竇融傳土人穴居野處採獵為生明統志資雪消之水以灌溉通志城池甘州府城周十二里有奇門四濠廣三丈七尺明洪武二十五年因舊修築本朝乾隆二十九年重修張掖縣附郭山丹縣城周七里有奇門四濠廣二丈五尺明洪武二十四年築本朝乾隆二十五年修高三丈五尺學校甘州府學在府治東南隅即舊行都司學明洪武二十八年建本朝屢經修葺入學額數二十名張掖縣學在縣冶東南本朝雍正三年建入學額數十五名山丹縣學在縣治東南隅明正統五年建入學額數十二名甘泉書院在府城内舊鎮志莫詳創始明嘉靖三十一年都御史王誥病其地隘撤而大之後廢本朝乾隆二十四年重建仙提書院在山丹縣本朝乾隆四十五年建户口原額民丁共五千八百五十今滋生民丁男婦大小共二十八萬二千四百九十六名口屯丁男婦大小共五十三萬一千一百十九名口統計七萬九千八百四十一户田賦田地共一萬二千六百七十九頃三畝九分額徴銀共八百八十一兩一錢六分糧共七萬一千八百八十八石二斗六升八合山川雪山在張掖縣南一百里多林木箭簳元和志甘州南至大雪山三百三十里臨松山在張掖縣南十六國春秋晉永嘉四年張掖臨松山有石如張掖字後掖字漸滅而張字分明隋書地理志張掖有臨松山寰宇記臨松山一名青松山一名馬蹏山又名丹嶺山在張掖縣南一百二十八里明統志馬蹏山在都司城南一百里巖石閒有神驥足在焉西陲今畧馬蹏山在龍首堡南板答口外二十里有石門七石洞二十祁連山在張掖縣西南漢書霍去病傳元狩二年去病臻小月氏攻祁連山揚武乎觻得顏師古注祁連山即天山也匈奴呼天為祁連西河舊事山在張掖酒泉二郡界上東西二百餘里南北百里有松柏五木美水草冬温夏涼宜畜牧一名天山亦名白山元和志山在張掖縣西南二百里行都司志山在甘州衞南一百六十里東西延袤千餘里連互甘肅界西陲今畧山在梨園堡南九十里按新唐志祁連山在甘州西北百九十里與諸書皆不合合黎山在張掖縣西北尚書禹貢導弱水至於合黎隋書地理志張掖有合黎山元和志合黎山俗名要塗山在張掖縣西北二百里行都司志合黎山在甘州衞北四十里迤邐至鎮夷所石峽口三百里甘峻山在張掖縣東北隋書地理志張掖縣有甘峻山舊唐書地理志甘州取州東甘峻山爲名元和志在縣東北四十五里出青鶻鷹稱爲奇絶常充貢獻寰宇記甘峻山一名紺峻山水經注云弱水厯紺峻山南與張掖河合是也按行都司志有人祖山在甘州衞東北四十里俗名快活山其山不毛蓋即古甘峻山石峽口山在山丹縣東八十里兩峯相對下有石井焉支山在山丹縣東南接涼州府永昌縣界漢書元狩二年霍去病出隴西過焉支山千餘里得首虜千餘級舊唐書地理志甘州屬刪丹焉支山在縣界刪丹山即焉支山語訛也西河舊事焉支山東西百餘里南北二十里水草茂美宜畜牧與祁連同匈奴失祁連焉支二山乃歌曰亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顏色括地志焉支山一名刪丹山在刪丹縣東南五十里明統志在山丹衞東南一百二十里唐哥舒翰建神祠於山麓行都司志焉支山一名大黄山西陲今畧大黄山起於新河堡南五里在石峽堡南八里窮石山在山丹縣西南離騷經夕次於窮石淮南子弱水出窮石山十六國春秋北涼永安元年沮渠􅀩遜與從兄男成期同祭蘭門山因而密􅉲之括地志蘭門山一名合黎一名窮石山在刪丹縣西南七十里按行都司志祁連山在山丹衞南一百五十里舊志在馬營墩南三十里蓋即古窮石山也括地志謂一名合黎誤金山在山丹縣西南魏氏春秋青龍三年刪丹縣金山元川溢湧寶石􅀒圖立於川西漢晉春秋是年氐池縣大柳谷口激波湧溢有蒼石立水中文曰大討曹十六國春秋吕光龍飛二年沮渠􅀩遜起兵攻拔臨松屯據金山沮渠􅀩遜元始五年祀金山西如苕藋遣將襲卑和自率衆為繼循海而西復如金山而歸隋書大業五年吐谷渾率衆保覆袁川帝命内史元壽屯金山地理志張掖縣有大柳谷甘鎮志柳谷在甘州東南一百里與山丹衞接界即金山也石觜山在山丹縣西十里山下地皆瀉鹵􅀨後經日色白如鹽龍首山在山丹縣西北二十五里邊外明萬厯中夷人青把都自昌寕湖移駐於此巡撫田樂擊走之一名龍頭山俗呼為甘峻山山腰有三洞各深五尺山隂有泉旱可禱雨紅寺山在山丹縣北二十五里山土皆赤丄有崖深六尺亦名紅寺洞川巖在張掖縣西南十六國春秋沮渠􅀩遜元始八年欲伐西涼引兵西至白巖偽南攻浩亹潛師還屯川巖舊志川巖在甘州衞西南一百五十里大斗拔谷在山丹縣南隋大業五年帝伐吐谷渾經大斗拔谷山路險隘魚貫而出乃至張掖唐武德元年西􅋓厥􅆣度設與甘州曹瓊合兵擊李軌為軌所敗走大斗拔谷通鑑貞觀九年李靖討吐谷渾還上遣使勞軍於大斗拔谷皆即此元和志大斗拔谷在山丹縣南二百里張掖河在張掖縣西即古羌谷水也漢書地理志觻得縣羌谷水出羌中東北至居延入海過郡二行二千二百里括地志羌谷水一名鮮水一名合黎水一名覆袁水今名副投河亦名張掖河自吐谷渾界北流入張掖縣張守節史記正義今案合黎水源出臨松路山東而北流厯張掖故城下又北流至縣北二十三里合弱水又西逕合黎山折而北流經流沙磧之西入居延海行千五百里明統志張掖河在都司城西十里源出擺通川逕祁連山西出合黎山名合黎水流入額齊訥界行都司志張掖河原名黒河自鎮城西南山流出逕祁連山傍合黎山出羌谷口北入額齊訥界今引其水分二十八渠為灌溉之利按黒河上源東北流二百里許至府西北合弱水其源比弱水差短而流特盛自漢以來皆主此水言故詳記源流而畧於弱水就禹貢言此亦弱水之源也額齊訥舊作亦集乃今改弱水源出山丹縣西南北流逕縣西又西北逕張掖縣北又西北入肅州高臺縣界書禹貢雍州弱水既西漢書地理志刪丹縣桑欽以為導弱水自此西至酒泉合黎元和志弱水在山丹縣南山下寰宇記弱水東自刪丹縣界流入在甘州北二十三里王應麟地理通釋弱水西至合黎山與張掖河合力不勝芥然可以皮船渡隋書地理志刪丹有弱水甘鎮志刪丹河在山丹城西源出祁連山西流入張掖河即弱水也自鎮城東北環合黎山入東莎界西陲今畧弱水自祁連北流繞山丹城前後合而西流至甘州新城匯黒河而西此水春夏之閒褰裳可涉及其漲也亦可浮舟但土人不知造舟耳自與張掖河合其下通名為張掖河今俗謂之黒河按輿圖弱水發源處在甘州正南微東山丹縣西南各二百餘里北流稍東過永固城折而稍西至甘州東南有山丹縣南之水流入焉自北轉而西北去山丹之西南正西皆八九十里鎮志謂在城西今畧謂繞城前後皆未甚悉舊志云古之言弱水者不一山海經西海之南流沙之濱有大山曰崑崙之邱其下有弱水之淵環之郭璞注其水不勝鴻毛史記大宛傳安息長老傳聞條攴有弱水西王母而未嘗見漢志臨羌縣西塞外有弱水後漢書大秦國西有弱水流沙西王母所居處近於日所入也十六國春秋乞伏孔子擊吐谷渾覓地於弱水南後魏太武擊蠕蠕自栗水西行至菟園水又循弱水西行至􅃰邪山史記正義弱水有二源皆出女國北河耨達山即崑崙也南流㑹於女國東去國一里非毛舟不可濟南流入海唐書東女國有弱水南流縫革為船所言並在絶域皆非禹貢之弱水然考後魏太武所經之弱水實即指張掖河之下流非有二也宣政渠在張掖縣南一百里分壩四溉田一百一十八頃又虎喇海西渠在縣南一百二十里分壩二溉田二百四十餘頃虎喇海東渠在縣南一百三十里分壩三溉田一百餘頃阿薛古渠在縣城北五里分閘六溉田一百五十九頃囘囘渠在縣城東五十五里分支渠三溉田一百二十頃河東渠溉田二十三頃東泉渠在縣城東郭内分閘四溉田一百二十七頃江淮渠溉田二十七頃迓刺渠在縣西四十里溉田八十五頃小泉渠溉田六十七頃黒水溝渠溉田一十四頃陽化渠在縣城南七十里溉田一百二頃有本渠分閘三溉田五十五頃皆引山水洪水渠在張掖縣南自縣東南一百六十里起至縣南一百里分為六渠共溉田七百二十餘頃又山丹縣亦有洪水渠自縣南一百二十里起至縣西南七十里分為四壩共溉田一百一十餘頃千金渠在張掖縣西漢書地理志觻得縣有千金