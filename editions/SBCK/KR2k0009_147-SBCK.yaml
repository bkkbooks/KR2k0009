今州治也元至元十三年内附十四年設千户十七年改隆州威龍廢州在西昌縣東南元史地理志威龍州在德昌路西南夷名巴翠部領小部三一曰沙窩普宗二曰烏孫泥阻三曰媧諾龍菖蒲皆獹魯蠻種也至元十五年合三部立威龍州隸德昌明統志洪武中改為長官司在建昌衞東南四百十里廢昌州在西昌縣南元史地理志初烏蠻阿屈之裔寖强用祖名為屈部其孫烏則至元九年内附十二年改本部為州兼領普濟威龍隸定昌路二十三年罷定昌路并隸德昌路明統志洪武中改屬建昌衞又改州為長官司在衞南二百里按明史改長官司在永樂二年廢德州在西昌縣南元史地理志德昌路德州在路之北其地今名吾越甸城曰苴龍所居蠻苴郎以逺祖名部曰赬綖憲宗時内附至元十二年立千户十三年改為德州隸德平路二十三年改隸德昌舊志明初亦為德州後廢在德昌所西北境瀘水司十五里明統志謂在都司城西二十五里漢蘇示縣地誤普濟廢州在西昌縣西南元史地理志普濟州在德昌路西北夷名玗甸獹魯蠻世居之後屬屈部至元九年隨屈部内附十五年於玗甸立定昌路二十三年路革改隸德昌明統志洪武中改為長官司在建昌衞西南二百四十里廢蘇州今冕寕縣治明統志元置蘇州屬建昌路洪武初因之二十二年置蘇州衞二十七年改寕番衞屬行都司在司北一百九十里名勝志環而居者皆西番種故曰寕番東連越巂北通烏斯藏西鄰三渡月落口按元志佚此州廢姜州在㑹理州東南元史地理志建昌路領姜州姜者蠻名也烏蠻仲牟由之裔阿壇絳始居閟畔部其孫阿羅仕大理國主高泰是時㑹川有城曰龍納羅落蠻世居焉阿龍攻拔之遂以祖名曰絳部憲宗時隨閟畔内附至元九年隸㑹川後屬建昌十五年改為姜州二十七年復屬閟畔部又屬建昌舊志在㑹川衞東南九十里今為姜州堡黎溪廢州在會理州西南元史地理志㑹川路領黎溪州古無城邑蠻云黎彄訛為今名初烏蠻與漢人雜處及南詔閤羅鳳叛徙白蠻守之􅀩氏終羅羅逐去白蠻段氏興令羅羅蠻乞夷據其地至元九年内附改其部為黎溪州明統志州在㑹川衞南一百五十里明初因之後廢永昌廢州在會理州西北元史地理志㑹川路領永昌州在路北治故歸依城即古㑹川也唐天寶末没於南詔置㑹川總督至􅀩氏改㑹同府置五瞼元憲宗九年内附至元十年改千戸十七年立永昌州明統志州在㑹川衞西北五里明初因之後廢麻龍廢州在㑹理州北元史地理志㑹川路領麻龍州麻龍者城名也地名棹羅能至元十二年屬㑹川十四年立千户隸㑹川路十七年立為州二十七年割屬閟畔部舊志麻龍亦曰麻若漢語黄土城也今有舊龍州在㑹川衞北十里越巂廢縣今西昌縣治元和志本漢邛都縣地周天和五年平越巂置西寕州治越巂縣元史地理志唐懿宗時􅀩詔立城曰建昌府領建安永寕二州元至元九年平建蔕分建昌府為萬户二又置千户二十五年割建鄉城四村及建蔕四村立寳安州十六年分建昌為二州在城曰建安東郭曰永寕二十六年革寶安州以其鄉村屬建安州舊志明洪武二十五年改置建昌衞二十七年又置前衞萬厯三年併前衞入之廢中縣在西昌縣東元史地理志建昌路領中縣治在住頭回甸蓋越巂之東境也所居烏蠻自别為沙麻部以酋長所立處為中州至元九年内附十四年仍為中州二十二年降為縣明統志在都司城東四百里元置明初因之後廢又有廢北社縣在都司城東三百里元置屬建昌路明改為碧舍縣後廢邛都廢縣在西昌縣東南古西夷邛都國也史記西南夷傳自滇以北君長以什數邛都最大漢書司馬相如傳唐􅀩已畧通夜郎時邛筰之君長請吏比南夷帝問相如相如曰邛筰冉駹者近蜀道易通異時嘗通為郡縣矣至漢興而罷今誠復通為置縣愈於南夷帝乃拜相如為中郎將使畧定西南夷邛筰冉駹斯榆之君皆請為臣妾除邊關關益斥西至沬若水南至牂柯為徼通靈山道橋孫水通邛笮又西南夷傳相如既往諭為置一都尉十餘縣屬蜀數􅀊罷元狩元年又令王然于等間出西南夷求身毒道及且蘭君反乃發兵誅且蘭邛君以邛都為越巂郡後漢書西南夷傳更始二年邛人長貴攻殺郡守枚根自立為邛榖王又降於公孫述建武十四年遣使上計授越巂太守十九年劉尚擊益州夷路由越巂長貴欲襲擊尚尚即分兵先據邛都掩長貴誅之華陽國志邛之初有七部後為七部營軍後又有四部斯叟章懷太子後漢書注邛都故城在今越巂縣東南西瀘廢縣在西昌縣西南元和志縣東北至州二十七里本漢邛東縣地周天和二年於此置本可縣天寳元年改名有姜磨戌在縣西南三里舊唐書地理志西瀘梁置可縣隋治姜磨戍武德七年移於今理後陷於南詔元史地理志建昌路領瀘州在路西昔名沙城瞼即武侯擒孟􅀗之地至段氏時於熟水甸立城名洟籠隸建昌至元十五年改洟籠為瀘州明統志廢瀘州在都司城西南二十五里元置明初因之後廢按瀘州道里與元和志西瀘至州道里正合即古西瀘也又按隋志越巂郡領可泉縣舊置宣化郡開皇初郡廢元和志作本可舊唐志作可縣蓋即可泉之訛蘇示廢縣在西昌縣北漢置屬越巂郡後漢因之亦曰蘇祁西南夷傳永平末有蘇祁叟二百餘人送太守張翕喪蜀志蘇祁邑君冬逢叛張嶷討誅之皆即此華陽國志云晉省劉宋復置曰蘇祁蕭齊又省後周復置隋曰蘇祇唐仍曰蘇祁屬巂州後陷南詔遂廢隋書地理志越巂郡蘇祇縣舊置亮善郡開皇初郡廢元和志縣東南至巂州八十里本漢舊縣後陷夷獠周武帝復置屬嚴州開皇初改屬巂州唐書地理志自臺登城九十里至蘇祁縣又南八十里至巂州元史地理志建昌路領禮州在路西北瀘沽水東所治曰籠麽