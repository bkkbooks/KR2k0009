body:
  text: 寕逺府在四川省治西南一千二百三十里東西距八百四十里南北距一千二百九十里東至木托營涼山蠻界二百里西至雲南永北廳界六百四十里南至雲南武定州元謀縣界八百里北至雅州府清溪縣界四百九十里東南至雲南東川府界七百三十里西南至永北廳界六百四十里東北至涼山蠻界六十里西北至清溪縣界五百六十里自府治至京師六千九百四十里分野天文井鬼分野鶉首之次建置沿革禹貢梁州南裔漢初爲邛都國元鼎六年開置越巂郡屬益州應劭曰郡有巂水言越此水以章休盛也後漢因之三國屬漢蜀志建興元年越巂夷王高定叛三年丞相亮南征平之延熙三年使越巂太守張嶷平定越巂郡又張嶷傳郡自丞相亮討高定之後僰夷數叛太守不敢之郡只住安定縣去郡八百餘里嶷在官三年徙還故郡繕治城郭夷種莫不致力晉亦曰越巂郡徙治㑹無縣太安二年改屬寕州咸康八年還屬益州劉宋還治邛都齊曰越巂獠郡而縣廢尋没於獠梁時嘗開置巂州南史大同三年武陵王紀為益州刺史紀在蜀開建寕越巂尋復陷没周天和五年置西寕州天和五年遣將平越巂置尋曰嚴州隋開皇六年復曰西寕州十八年改曰巂州大業初復曰越巂郡治越巂縣唐武德元年復曰巂州三年置總管府尋改為中都督府督羈縻十六州屬劒南道至徳二載没於吐蕃貞元十三年收復太和五年為蠻寇所破六年徙治臺登咸通中為􅀩詔所據立城曰建昌府宋時羈屬大理元史地理志唐時􅀩詔立建昌府以烏白二蠻實之後諸酋爭强分地為四推段興為長其裔浸强遂併諸酋自為府主大理不能制元憲宗時内附至元十二年置建昌路總管府又設羅羅斯宣慰司統之屬四川行省尋改屬雲南行省明洪武十五年置建昌府屬四川布政使司又置建昌衞屬四川都司後廢府改建昌衞為軍民指揮使司二十七年又置四川行都指揮使司本朝初亦曰建昌衞置總兵鎮之雍正六年罷衞改置寕逺府屬四川省領縣三州一廳一土司十一西昌縣附郭東西距六十里南北距二百七十里東至涼山蠻界二十里西至鹽中左所界四十里南至㑹理州界二百里北至越巂廳界七十里東南至㑹理州界六十里西南至鹽源縣界五十里東北至涼山蠻界六十里西北至冕寕縣界一百二十里漢初為邛都國地元鼎六年置縣為越巂郡治晉移郡治會無縣劉宋復還舊治蕭齊縣廢周置越巂縣為西寕州治隋大業初為越巂郡治唐初因之為巂州治後為䝉詔所據元至元十六年置建安州為建昌路治明洪武中廢州改置建昌衞二十七年又置建昌前衞皆為行都司治萬厯三十年省前衞入建昌衞本朝初因之雍正六年改衞曰西昌縣以建昌左所中前所禮州守禦所併入為寕逺府治冕寕縣在府北少西二百三十里東西距六百九十里南北距三百七十五里東至越巂廳界二百里西至本禮刻嗎界四百九十里南至西昌縣界一百二十里北至雅州府明正土司界二百五十里東南至涼山界一百八十五里西南至鹽源縣界二百六十里東北至越巂廳界一百五十里西北至打箭鑪界二百里漢置大筰臺登二縣屬越巂郡後漢省大筰入臺登晉宋因之齊省周武帝復置臺登縣兼置白沙郡隋開皇初郡廢仍屬越嶲郡唐武德元年屬登州九年州廢屬巂州太和六年移巂州來治咸通中陷廢為烏蠻落蘭部地元為禮州地後分置蘇州屬建昌路明洪武二十一年置蘇州衞二十七年改為寕番衞屬四川行都司本朝初亦曰寕番衞雍正六年罷衞改置冕寕縣屬寕逺府鹽源縣在府西南三百十里東西距六百里南北距七百三十里東至德昌所界三百里西至馬喇土司界三百里南至雲南楚雄府大姚縣界五百里北至冕寕縣界二百三十里東南至大姚縣界三百里西南至雲南永北㕔界三百五十里東北至西昌縣界二百五十里西北至馬喇土司界三百里漢置定筰縣屬越巂郡為都尉治後漢晉宋因之齊省周置定筰鎮唐武德二年改置昆明縣屬巂州後没於南詔改香城郡元至元十年内附十四年立鹽井千户十七年改為閏鹽州隷徳平路二十七年改州為縣置柏興府隸羅羅斯宣尉司明洪武二十五年改為柏興千戸所屬建昌衞尋改鹽井衞軍民指揮使司本朝初亦曰鹽井衞雍正六年罷衞改置鹽源縣屬寕逺府㑹理州在府南四百里東西距八百里南北距六百里東至雲南東川府㑹澤縣界五百七十里西至雲南永北㕔界二百三十里南至雲南武定州界三百五十里北至西昌縣界二百五十里東南至武定州祿勸縣界二百三十里西南至雲南楚雄府大姚縣界一百五十里東北至雲南昭通府界二百七十里西北至鹽源縣界四百里漢置㑹無縣屬越巂郡後漢因之晉移越巂郡來治劉宋仍為屬縣蕭齊時没於蠻獠唐上元二年改置㑹川縣屬巂州後没於南詔置㑹川都督府又號清寕郡宋時屬大理仍曰㑹川府元至元九年内附置㑹川路十五年又置㑹理州屬之十七年於路治置武安州明洪武初仍曰㑹川府屬四川布政使司後改置守禦千户所屬建昌衞廢㑹理州入之二十五年改置會川衞軍民指揮使司屬四川行都司本朝初亦曰㑹川衞康熙二十九年復分衞地置㑹理州雍正六年省衞移㑹理州來治屬寕逺府越巂㕔在府北少東三百六十里東西距四百二十里南北距三百九十里東至敘州府雷波廳界三百五十里西至冕寕縣界七十里南至冕寕縣界九十里北至雅州府清溪縣界三百里東南至西昌縣界八十里西南至雪山界一百里東北至涼山界一百五十里西北至清溪縣界二百三十里漢置蘭縣屬越巂郡後漢因之晉省劉宋復置曰蘭縣改屬沈黎郡蕭齊復廢周改置邛部縣兼置邛部郡隋開皇初郡廢仍屬越巂郡唐屬巂州咸通後陷於蠻宋時為邛部王國元憲宗時内附中統五年立邛部州安撫使隸成都元帥府至元十年割屬羅羅斯宣慰司二十一年改曰邛部州屬建昌路明洪武中改邛部軍民州二十五年置越巂衞軍民指揮使司屬四川行都司永樂元年改州為邛部長官司屬越巂衞本朝仍曰越巂衞雍正六年改為廳設通判乾隆二十六年移駐於此威龍州長官司在西昌縣東南其地東至㑹理州界西至普濟土司界南至㑹理州界北至昌州土司界元威龍州地明洪武七年置長官司土官張氏世襲昌州長官司在西昌縣南其地東至安平河西至鹽源縣界南至威龍土司界北至西昌縣界元昌州地明洪武九年以雲南大理府土職調守昌州土官盧氏世襲普濟州長官司在西昌縣西南其地東至威龍土司界西至鹽源縣界南至㑹理州界北至西昌縣界元普濟州地明洪武七年置土知州本朝康熙四十九年改長官司土官吉氏世襲河東長官司在西昌縣其地東至阿都土司界西至爪别土司界南至阿都副土司界北至温都腳夷巢舊為宣慰司本朝雍正六年改長官司土官安氏世襲阿都正長官司在西昌縣其地東至沙罵土司界西至河東土司界南至㑹理州界北至阿都副土司界本朝順治六年土酋結固歸附康熙四十九年授宣撫司雍正六年改土歸流㝷以隨􅁹涼山夷有功授長官司土官都安氏世襲阿都副長官司在西昌縣其地東至雲南麗江府界西至舊河西司界南至正土司界北至沙罵土司界本朝雍正六年以土婦賖哵隨􅁹涼山夷有功授長官司土官都安氏世襲沙罵宣撫司在西昌縣其地東至雲南永善縣界西至阿都土司界南至阿都副土司界北至雷波廳界本朝康熙四十九年土酋安韋威歸附授宣撫司土官安氏世襲馬喇副長官司在鹽源縣西南三百里與雲南永北廳接界其地東至雲南章土司界西至雲南章土司界南至雲南高土司界北至㑹鹽營屬中所土千户界元柏興府地明置長官司本朝康熙四十九年歸附授福長官司土官阿氏世襲􅀲别安撫司在鹽源縣其地東至小番界西至喇嘛界南至古柏樹土千户界北至木裏土司界本朝康熙四十九年土酋玉珠珀歸附授安撫司世襲木裏安撫司在鹽源縣西北其地東至打箭鑪界西至雲南中甸界南至古柏樹土千户界北至裏塘土司界本朝雍正八年土酋六藏塗都歸附授安撫司世襲邛部長官司在越嶲㕔北其地東至雷波㕔界西至冕寕縣界南至冕寕縣界北至寕越營白沙溝界明初置長官司本朝康熙四十二年土官嶺安盤歸附授宣撫司五十二年改長官司世襲形勢東連烏􅀩西距吐蕃南接中慶北鄰西蜀元志地據西南咽喉衝要之處同上山清水秀田地膏腴同上捍蔽三川咽喉六詔通志風俗重儒敬佛相見之禮長跪不拜元志金珠富產穀粟豐盈民足衣食牛羊鹽馬氊布通商殖貨同上竹籬板舍不事修飾同上善造堅甲利刃弩置毒其末沾血立死明統志漢蠻雜處蠻􅀋百種披氊赤足飲食蟲鼠出帶弓弩天性悍戾通志城池寕逺府城周九里三分門四明洪武中築宣德二年甃石本朝乾隆三十一年修嘉慶十六年重修西昌縣附郭冕寕縣城周六里一分門四池廣三丈明洪武中築永樂三年甃石鹽源縣城周四里有竒門四池廣二丈五尺明洪武二十五年修㑹理州城周七里三分門四池廣一丈明洪武中築永樂中甃石本朝乾隆三十二年修五十一年重修越巂廳城周七里一分門四池廣三丈明洪武初築永樂初甃石本朝乾隆三十一年修五十三年重修學校寕逺府學在府治西本朝嘉慶十四年建入學額數八名西昌縣學在縣治西舊為建昌衞學本朝雍正六年改為縣學八年重建入學額數十二名舊額十五名嘉慶十四年減三名冕寕縣學在縣治西舊為平番衞學本朝康熙二十六年建雍正六年改為縣學入學額數八名鹽源縣學在縣治西舊為鹽井衛學本朝康熙二十三年建雍正六年修改為縣學入學額數十名舊額十二名嘉慶十四年減二名㑹理州學在州治西北舊為㑹川衞學明洪武中建本朝康熙二十九年重建雍正六年修改為州學嘉慶十六年重修入學額數十名舊額十二名嘉慶十四年減二名越巂廳學在廳治西南舊為越巂衞學在治南本朝康熙二十四年建三十年遷建東門内尋燬復遷今所雍正六年改為廳學入學額數六名瀘峯書院在府城内本朝乾隆十八年建臺登書院在冕寕縣南門内本朝乾隆初建香城書院在鹽源縣城内本朝乾隆中建柏林書院在鹽源縣白鹽井本朝乾隆初建金馬書院在越巂廳城内本朝嘉慶二年建㑹川義學在㑹理州城西本朝乾隆十七年建户口原額人丁一萬二千五百今滋生男婦共一百二十六萬六千二百七十三名口計二十萬六千二百户田賦折色屯秋田及下田下地二百七十頃三十三畝二分有竒本色秋田豆田及山旱地五百二十三頃三分有竒額徴地丁正雜及各土司土目折納銀三千九百二兩八錢五分九釐四毫米豆一萬一千五百五十七石五斗七升九合四勺山川木托山在西昌縣東二十里下有營汛鹿角山在西昌縣東一百一十里山峯尖削狀如鹿角涼山在西昌縣東一百二十里明統志羣峯嵯峨四時多寒按涼山亙數百里跨馬湖建昌界為諸蠻所居螺髻山在西昌縣東南四十五里明統志其山高聳頂如螺髻瀘山在西昌縣南十五里西近古瀘州故名巴洞山在西昌縣南一百八十里落腰山在西昌縣南二百里東西高而中凹蠻人呼為落腰馬鞍山在西昌縣西南二十里兩峯並聳形如馬鞍吕金坡山在西昌縣西四里昔有土酋吕金居此又天王山在縣西十五里青山在西昌縣北三十里上有松林四時蒼翠冕山在冕寕縣東廢冕山所東三里其山高聳狀如冠冕東山在冕寕縣東四里鐵石山在冕寕縣東華陽