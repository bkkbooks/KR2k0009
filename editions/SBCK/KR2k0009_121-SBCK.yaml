front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_121-1a}
body:
  text: 吉安府三人物漢歐寶廬陵郡人居父䘮廬墓側里人搏虎虎投廬中寶以衣覆之逐虎者至詰寶寶曰此獸可藏乎虎因得免自後月置一鹿於其廬人咸異焉南北朝齊王虚之石陽人䘮親二十五年鹽酢不入口所居每夜有光如燭庭中楊梅隆冬三實墓上橘樹一冬再實時咸以為孝感所至永明中詔榜門蠲其三世匡昕廬陵人有至性隱金華山服食不與俗人交母病亡巳經日昕奔還號呌母即蘇皆以為孝感所致唐劉景洪永新人楊行密得江西衙將彭玕據州自稱刺史屬景洪以兵欲脅衆附湖南景洪偽許之復以州歸行密退居不仕及徐温建國以禮聘之不起官其子煦為殿直都虞候五代南唐蕭儼廬陵人舉童子科為秘書省正字厯刑部郎中元宗欲傳位於弟景遂儼上書力爭後主嗣位數與嬖佞奕儼入見投局於地後主怒曰汝欲效魏徵耶儼曰若臣非魏徵陛下亦非唐太宗矣後主爲罷奕陳喬廬陵人淮南兵興元宗欲以宋齊邱攝政召喬草詔喬不從後主時厯門下侍郎典彬下金陵後主納款降喬至政事堂召二親吏解金帶與之曰善藏吾骨遂自縊郭昭慶廬陵人博學能自力嘗著唐春秋三十卷保大中獻所作治書後主時復獻經國治民論擢著作郎牋表詞章皆出其手宋顏詡永新人唐太師真卿之後少􅀌兄弟數人事繼母以孝聞一門千指家法嚴肅男女異序少長輯睦義居數十年終日怡愉家人不見其喜愠彭思永廬陵人天聖進士爲侍御史極論内降授官賞之弊仁宗深然之時張堯佐覬執政王守忠求旄節思永率同列言之後復論濮王稱親之非終户部侍郎子衞以孝謹聞父老棄官居家十餘年歐陽修廬陵人舉進士甲科除館閣校勘慶厯初召知諫院改右正言知制誥時杜衍韓琦范仲淹富弼相繼罷去修上疏極諫出知滁州徙揚州潁州還爲翰林學士在翰林八年知無不言嘉祐六年拜參知政事與韓琦同心輔政熙寕初以忤新法乞致仕自號六一居士卒贈太子太師諡文忠修天資剛勁見義勇為為文天才自然豐約中度天下翕然師尊之奉詔修唐書紀志表自撰五代史法嚴詞約蘇軾敘其文曰論大道似韓愈論事似陸贄記事似司馬遷識者以為知言子發少師事胡瑗得古樂鍾律之説不治科舉文詞賜進士累官殿中丞制度文物旁及天文地理靡不悉究仲子棐廣覽强記能文詞累直秘閣知蔡州坐黨籍廢龍震翁泰和人性孝母殁未葬山寇焚掠火其居震翁倉皇無計夫妻俱抱柩死死處有枯梅明年六月作花事聞理宗族其門曰孝梅里劉沆景洪孫天聖進士長於吏事臨事强果累官同中書門下平章事子瑾第進士為館閣校勘累拜天章閣待制厯知秦州成德軍卒瑾素有操尚所莅以能稱毛洵吉水人天聖進士性至孝凡守四官再以親疾解任執藥調膳嘗而後進三月不之寢室父母繼卒持鍤荷土為墳手胝面黔親友不能識廬墓二十一月朝夕哭踊抱疾卒郡以孝聞兄溥亦以哀毁卒周中和改名中復泰和人天聖二年進士知英州有善政升屯田員外郎董敦逸永豐人嘉祐八年進士擢左司諫侍御史㑹瑶華祕獄成奉詔錄問敦逸上疏論之至徹宗時復極言蔡京父子之惡外貶敦逸在朝鬚髮皓白既久於外上一日思之問近臣曰白頭御史安在其見重如此彭瑜安福人熙寕間失其母朝夕焚香祈天願知母所在如是十餘年俄有人言母為泰和倪氏婦竟迎以歸劉弇安福人元豐中中博學宏辭科為太學博士元符中進南郊大禮賦哲宗覽之動容以為相如子雲復出除袐書省正字徽宗初改著作佐郎弇為文辭剷剔瑕纇卓詭不凡有龍雲集三十卷周必大序其文謂廬陵自歐陽修以文章續韓愈正傳繼之者弇也蕭服廬陵人第進士知望江高安二縣治以教化為本召為將作少監論人主聽言之要徽宗謂有爭臣風擢監察御史偕沈畸鞫蘇州錢獄以平反七百人忤蔡京覊管處州後為吏部員外郎知蘄州蕭楚泰和人治春秋時蔡京專國禁春秋學楚隱居三顧山下著經辨四十九篇弟子百餘人胡銓皆師之殁門人私諡清節先生歐陽珣廬陵人崇寕進士為將作監丞金人逼京師朝議割河北絳磁深三鎮講和珣率其友九人上書極言祖宗之地尺寸不可與人及㑹議珣復抗論當與力戰敗而失地他日取之直不戰而割地他日取之曲時宰怒欲殺珣乃遣珣奉使割深州珣至深州城下慟哭謂城上曰朝廷為姦臣所誤吾巳辦一死來矣汝等勉為忠義報國金兵怒執送燕焚死楊􅀖乂吉水人博通古今登進士第遭時多艱每以節義自許厯建康教授改秩知溧陽縣金帥完顏宗弼入建康尚書李棁學士陳􅀖光率官迎降唯􅀖乂不屈以血書衣裾曰甘作趙氏鬼不為他􅀖臣翌日宗弼與棁􅀖光宴堂上立􅀖乂於庭􅀖乂叱之曰天子以􅀂捍城敵至不能抗更晏樂何面目見我乎已而宗弼再引􅀖乂􅀖乂大罵宗弼怒殺之剖取其心事聞加贈徽猷閣待制賜廟襃忠諡忠襄劉才邵廬陵人其上世鶚嘗憤五季文詞卑弱倣楊雄法言著法語八十一篇中宣和中宏辭科高宗時厯中書含人兼直學士院帝稱其能文時宰忌之出知漳州開渠十四民德之終顯謨閣學士著有檆溪居士集李籌吉水人與弟衡生同乳葬其母􅀒土成墳廬於墓左廬所產木一本兩􅆬高丈許復合為一至其末乃分兩􅆬五枝鄉人以為瑞胡銓廬陵人建炎進士為樞密院編修官紹興八年秦檜決䇿主和金使以詔諭江南為名銓抗疏力排和議並乞斬王倫秦檜孫近三人除名編管新州孝宗時累擢起居郎論史官失職者四時旱蝗星變又應詔上書數千言帝曰非卿不聞此金人求成銓獨言不可和厯官工部侍郎以資政殿學士致仕卒諡忠簡所著易春秋周禮禮記解及澹菴集一百卷孫槻榘官皆至尚書王庭珪安福人政和進士為茶陵丞與部使者不合去胡銓得罪秦檜謫嶺表人無敢通問庭珪獨送以詩坐謗訕編管辰州檜死得歸孝宗即位召對除直敷文閣年巳九十餘矣所著有瀘溪集曾光庭吉水人仕為東安簿靖康之難起兵勤王㑹徽欽二宗北狩光庭以兵趨南京列表勸進高宗既踐祚論賞應列貴仕光庭辭不受歸桑梓延名儒訓課子孫以老李靚龍泉人以策干都督張浚浚奇之使隸淮西總管孫暉麾下累功授承信郎紹興十年金將翟將軍犯境靚與部曲當其鋒轉戰至西京天津橋南俘翟將軍乘勝逐北㑹金兵大至遂死之王珠龍泉人以孝謹聞建炎間居父憂芝數本生墓側倒植竹以為􅍻復生枝葉紹興間再罹母憂復有雙竹靈芝之祥楊芾吉水人性至孝紹興五年大饑為親􅀒米百里外遇盜奪之不與盜欲兵之芾慟哭曰吾為親􅀒米不食三日矣幸哀我盜義而釋之周必大廬陵人紹興進士又中博學宏詞科召試館職高宗讀其策曰掌制手也除正字兼編修孝宗初除起居郎權給事中繳駮不避權倖累進翰林學士在翰苑六年制命温雅周盡事情為一時詞臣之冠厯參知政事樞密使拜右丞相光宗即位進少保益國公慶元初致仕後韓侂胄黨立偽學之名以禁錮君子而必大與趙汝愚留正為首卒贈太師諡文忠著書八十一種有平園集二百卷楊萬里吉水人紹興進士張浚陳俊卿虞允文交薦之為國子博士淳熙中地震應詔言十事東宫講官闕帝擢萬里為侍讀官僚以得端人相賀王淮為相問人才即疏朱熹袁樞等六十人次第擢用之孝宗命太子參決庶務萬里上太子書太子悚然光宗時入對言朋黨之禍又論近習竊權寕宗時以寶文閣待制致仕韓侂胄用事卧家十五年侂胄專僭日甚憂憤成疾卒萬里精於詩嘗著易傳行於世學者稱誠齋先生賜諡文節羅泌廬陵人博學有才紹興間知永州放民丁錢所著路史行於世子苹為注孫逢吉龍泉人隆興進士為祕書郎紹熙初詔求直言逢吉疏八事遷石正言在諫垣七十日章三十上詞㫖剴切皆人所難言者進吏部侍郎朱熹在經筵持論切直小人潛激上怒中批與祠逢吉於上前爭論甚苦㑹彭龜年以論韓侂胄專僭出補郡逢吉又抗疏力爭侂胄見而惡之及侂胄專國遂出知太平州卒諡獻簡弟逢年逢辰皆有文學行義時稱孫氏三龍曾三聘吉水人乾道進士累遷軍器監主簿光宗不朝重華宫三聘以書抵丞相留正正未及言三聘謂父子夫婦之際羣臣莫敢深言者避嫌遠罪耳遷秘書郎帝欲幸玉津園三聘上疏言人心既離大亂將作陛下安意肆志若弗聞知萬一敵人諜知馳一介之使問安北宫不知何以荅之姦宄窺間傳一紙之檄指斥乘輿不知何以禦之望亟備法駕朝謁不然臣實未知死所也時服其敢言卒諡忠節歐陽守道吉州人少􅀌貧力學里人聘爲子弟師每食舍肉遺母主人爲設二器馳送乃肯肉食年未三十爲鄉郡儒宗淳祐初舉進士後以薦授秘書省正字厯崇政殿說書經筵所進皆切於當世之務蕭逢辰秦和人開慶元年金兵自廣右湖北逼吉州詔起逢辰爲江西副帥拜命之日警報卒至衆屬目逢辰所爲逢辰挈家入城於是城中始有固志或言當用邊郡法清野以待敵逢辰曰城外居民三倍城中即徙必表撤而裏􅀌徒驚潰我衆耳力持不許卒賴以安文天祥廬陵人年二十舉進士第一開慶初元兵伐宋宦官董宋臣說帝遷都天祥時入爲寕海軍判官上書乞斬宋臣不報即自免歸後爲湖南提刑改知贛州德祐初江上報急召天下勤王天祥捧詔涕泣發郡中豪傑萬人入衞提兵至臨安除知平江府時元兵巳下金陵破常州乃召天祥棄平江守餘杭尋命兼兩府使如元軍請和巴延拘之北至鎮江與其客十二人夜亡入真州泛海至温州聞益王未立上表勸進召至福州拜右丞相以都督出江西與元兵戰於空坑大潰收殘兵奔循州駐南嶺衞王立加少保封信國公進屯潮陽元將張宏範奄至被執拘燕三年元世宗知其終不屈乃殺之天祥臨刑從容謂吏卒曰吾事畢矣南嚮拜而死巴延舊作伯顏今改正鄒㵯吉水人後徙永豐少慷慨有大志以豪俠鳴從文天祥勤王領江西招諭副使聚兵寕都得數萬復永豐興國二縣進兵部侍郎兼江東西制置副使後走至潮州及天祥被執㵯自殺時從天祥勤王死事㵯與劉子俊等凡十有九人劉子俊廬陵人少與文天祥同里閈相友善天祥開督府興國子俊詣府計事補宣教郎兼督府機宜天祥兵敗子俊被執自詭爲天祥未幾别隊執天祥至各爭真贗至大將前始得其實乃烹子俊劉沐廬陵人文天祥起兵辟補宣教郎督府機宜天祥開府南劍沐收部曲來㑹專將一軍爲督府親衞空坑兵敗被執至豫章父子同日死仲子死亂兵季子復從天祥死嶺南當時江西忠義皆沐所號召沐性沈實而圜機晝夜應酬亹亹不倦云孫􅕬龍泉人文天祥長妹壻天祥起兵檄􅕬招忠義士補宣教郎知龍泉縣天祥擁兵出贛里人奉􅕬復龍泉拒守不下尋為叛者所陷執至隆興殺之彭震龍永新人天祥次妹壻天祥起兵補宣教郎知永新縣天祥兵出嶺震龍接應復永新元兵至執至帥府腰斬之蕭燾夫永新人與兄敬夫俱文天祥客燾夫為詩尤豪俊天祥起兵補從仕郎及彭震龍謀復其縣燾夫贊之縣受屠兄弟俱死之蕭明哲泰和人性剛有膽氣明大節少舉進士文天祥開府汀州辟充督幹架閣監軍師出嶺明哲以贛縣民義復萬安連結諸砦拒守兵敗被執不屈死於隆興臨刑大罵不絶口聞者壯之劉士昭泰和人嘗為鍼工與鄉人同謀復泰和縣兵敗血指書帛云生為宋民死為宋鬼赤心報國一死而巳因以其帛自縊死劉子薦安福人知融州廣西經畧司檄為㕘議官德祐二年元兵至靜江子薦提猺兵藥弩手守城東門勢不支取笏書云我頭可斷膝不可屈登城北望再拜竟死之劉辰翁廬陵人賈似道專國方殺直臣以塞言路辰翁因對策極論之江萬里薦居史館又除太學博士皆固辭著須溪集王炎午廬陵人為太學生文天祥勤王炎午謁軍門論事欲授之職以母疾辭及天祥被執為生祭文以速之死宋亡終身不仕奉母至孝三十年不懈母没廬墓終身元劉詵廬陵人性頴悟幼失父知自樹立年十二能文章既冠重厚醇雅以師道自居教學者有法江南行御史臺屢以遺逸薦不就為文根柢六經躪躒諸子百家融液今古而不露其踔厲風發之狀所著有桂隱集龍仁夫永新人博究經史與劉銑齊名著周易集傳十八卷多發先儒之所未發其他文尤奇逸流麗學者稱麟洲先生劉岳申吉水人為遼陽儒學副提舉以泰和州判致仕其文辭簡約峻潔甚為吳澄虞集所推重學者稱申齋先生楊景行泰和人延祐進士授贛州路㑹昌州判官教民穿井陶瓦調判永新覈民田租除剷宿弊姦欺不容細民賴焉厯撫州推官宜黄歸安縣尹所至有惠政以翰林待制致仕劉瑾安福人淹貫經史隱居不仕所著有詩傳通釋李廉安福人至正進士為信豐尹紅巾亂與子敬俱死之同州姚正叔一門皆殉蕭彝翁吉水人至正間舉於鄉以薦為建昌州學正後為濂溪書院山長時參政全子仁辟贊軍事陳友諒兵至參政遁去彞翁投井死之同邑髙文鼎帥廣東城陷舉家殉羅啟南姜天祐廬陵戴大賓皆以保鄉里戰死明羅復仁吉水人少嗜學通天文去偽漢歸事太祖從圍武昌遣諭降陳理遷國子監助教擢編修奉使安南却其王所贈帝賢之置宏文館以為學士在帝前每率意陳得失帝喜其質直呼為老實羅而不名間幸其舍復仁方自堊壁急呼妻抱杌以坐帝帝稱歎遂賜第城中尋致仕賜大布衣題詩襟上襃美之後召至奏減江西秋糧及兵餉帝皆允行李繼先廬陵人為樞密院判陳友諒圍南昌繼先力戰死之贈隴西郡侯祀南昌忠臣廟陳謨泰和人邃於經學旁及子史百家隱居不仕而究心經世之務學者多從之游洪武初徵詣京師賜坐議禮宋濂王禕請留為國學師謨引疾辭歸教授以終所著有書經㑹通詩經演疏及海桑集劉崧泰和人七􅀊能詩洪武初舉經明行修召為兵部郎中遷北平副使有異政忤胡惟庸放歸起禮部侍郎尋致仕踰年再徵為國子司業卒帝親為文祭之崧博學有志行微時兄弟三人共居一茅屋有田五十畝及貴無所增益居官未嘗以家累自隨暇則賦詩達旦豫章人宗其詩為江西派陳灌廬陵人㓜􅀌事母孝元季棄書學兵法環所居樹木閲數年寇起募壯士結屯其中謁太祖於武昌累授大都督府經厯從徐達北征有功除寕國府知府治聲大著錢瑛吉水人祖本和以篤行稱瑛少􅀌力學元末奉祖及母避難遇賊被執本和哀告貰其孫瑛亦泣請代不巳賊憐而兩釋之時其妻張氏竟代姑就縛為賊所害後有司知瑛賢凡三薦並以親老辭曾鼎泰和人元末奉母避賊母被執鼎跪而求代賊怒將殺母鼎號泣以身翼蔽傷項肩及足䕶母不捨賊魁憫之攜其母子入營療治􅀗愈行省聞其賢辟為濂溪書院長鼎好學能詩兼工八分及邵子數學歐陽韶永新人洪武初授御史甞入侍帝甚怒將戮人他御史不前韶趨跪廷下倉卒不能措詞急捧手加額呼曰陛下不可帝察其樸實爲霽威從之胡子祺吉水人銓十世孫洪武初授監察御史嘗上書請都關中太祖善之遷廣西僉事厯知彭州延平府皆有善政子廣建文二年進士第一授修撰永樂時厯官文淵閣大學士屢扈北巡卒贈禮部尚書諡文穆蕭執泰和人洪武初舉於鄉爲國子學錄太祖有事北郊召執等齋宫賦詩特加寵眷以親老乞歸親殁廬墓側鄧鎮統兵􅁹龍泉寇蔓及泰和執往責之鎮爲禁止邑人以安楊卓泰和人洪武進士授吏部主事遷廣東行省員外郎復通判杭州以病免卓精吏事吏不能欺而爲治尚寛恕民悦服焉羅性泰和人博學有行誼洪武初舉於鄉授德安同知有善政坐事謫戍西安時四方老師宿儒在西安者數十人吳人鄒奕目合吾輩所讀書庶幾羅先生之半年七十卒歐陽銘泰和人洪武初以賢才薦除江都丞遷知臨淄縣邑大治秩滿入覲卒伍洪安福人洪武進士知上元縣遭父憂服除以母老不仕推資產與諸弟而巳獨養母十九年有異母弟得罪而逃使者捕弗􅀗執其母洪哭訴求代竟死於市楊引吉水人好學能詩文為宋濂陶安所稱駙馬都尉陸賢從受學入朝舉止端雅太祖喜問誰教者以引對立召見賜食他日賢以䙝服見引太息曰是其心易我矣即引去時方不次用人有司頻以孝廉文學善書薦皆不赴復以纂修徵亦不就其教學者先操履而後文藝迄老視聽不衰既殁安福劉球稱其學深道源文範後世去就出處卓然有徐穉陶潛之風王伯貞泰和人以經術顯洪武十五年聘至京應詔者五百餘人帝御奉天門試之伯貞對第一授僉事分巡雷州建文初知瓊州府居數年大治憂歸卒劉仕貆安福人父閈隱居不仕著書終其身仕貆少受父學洪武十五年應賢良舉授廣東按察司僉事以廉惠大得民和遭風殁於水蕭岐泰和人五􅀊而􅀌事祖父母以孝聞有司累舉不赴洪武十七年詔徵賢良强赴之上十便書萬餘言時帝刑罸過中訐告風熾岐語皆指切授潭府長史力辭忤㫖謫雲南楚雄訓導改平涼復召考定書傳賜幣鈔給驛歸嘗輯五經要義又取刑統八韻賦引律令為之解合為一集嘗曰天下理本一出乎道必入乎刑吾合二書使觀者有所省也學者稱正固先生王省吉水人洪武中以文學徵授浮梁教諭後改濟陽燕兵至坐明倫堂伐鼓聚諸生曰若等知此堂何名今日君臣之義惡在因大哭諸生亦哭省以頭觸柱死福王時贈禮部員外諡貞烈孫禎成化初由國子生為夔州通判擊荆襄賊石和尚被執遇害贈僉事本朝乾隆四十一年入祀忠義祠周是修泰和人洪武末舉明經為衡府紀善王未之國是修留京師預翰林纂修好薦達知名士陳説國家大計燕兵入整衣冠詣應天府學拜先師自經死是修外和内剛志操卓犖非其義一介不茍得嘗輯古今忠節事為觀感錄其學自經史百家陰陽醫卜靡不通究為文援筆立就初與楊士奇解縉等約同死惟是修不􅀒其言福王時贈詹事諡貞毅本朝乾隆四十一年賜諡忠節曾鳳韶廬陵人洪武末年進士建文時為御史燕王入覲馳御道且不拜鳳韶劾王大不敬以至親不問及燕王稱帝以御史召不赴尋加侍郎又不赴乃刺血書衣襟囑其妻李子公望勿易衣即以此殮遂自殺年二十九李亦自經福王時贈太僕卿諡忠毅妻諡貞愍本朝乾隆四十一年賜諡忠節鄒瑾永豐人建文時為大理寺丞燕兵至與魏冕等毆都督徐增夀於殿前燕王入不屈死福王時贈大理卿諡貞愍同邑鄒朴為秦府長史聞瑾死亦不食卒或曰朴即瑾子本朝乾隆四十一年賜諡節愍魏冕永豐人建文時御史燕兵至金川門都督徐增夀徘徊殿廷有迎納意冕率諸御史毆之幾死帝倉皇輟朝冕與鄒瑾大呼請速誅增夀明日宫中火起或勸冕歸附冕厲聲叱之遂自殺本朝乾隆四十一年賜諡節愍王艮吉水人建文􅀄進士對策第一以貌寢置第二授修撰與修太祖實錄諸大著作皆綜理之又數上書言時務燕兵薄都城艮與妻子訣曰食人之祿者死人之事吾不可復生矣遂自鴆福王時贈禮部侍郎諡文節本朝乾隆四十一年賜諡忠節顏伯瑋廬陵人建文初舉賢良知沛縣事燕兵來攻城固守不下㑹指揮王顯迎降伯瑋冠帶升堂南向拜遂自經子有為亦自刎父旁福王時贈伯瑋太僕少卿諡忠惠有為翰林待詔諡孝節本朝乾隆四十一年賜伯瑋諡忠節劉鎬龍泉人父允中洪武五年舉於鄉官憑祥巡檢卒於任鎬以道遠家貧不能返柩居常悲泣父友憐之言於廣西監司聘為訓導尋假公事赴憑祥莫知葬處鎬晝夜環哭其父蒼頭巳轉入交阯忽暮至若有物憑之者因得塚所在乃􅀒歸葬解縉吉水人祖子元為安福州判官元末兵亂守義死父開與弟闔有名稱二解縉年十九舉郷試第一洪武中舉進士授庶吉士嘗於大庖西室草疏萬言指斥時政帝稱其才改御史以其年少令還家進業太祖崩縉奔䘮至京有司劾非詔㫖謫河州衞吏用薦召為待詔成祖入京擢侍讀命與黄淮楊士奇等入直文淵閣豫機務累進翰林學士兼右春坊大學士以贊立太子為漢王高煦所惡數搆䜛言又諫討交阯忤㫖遂出為廣西參議既行為李至剛所搆改交阯高煦又陷以他事逮下詔獄死兄綸與縉同舉進士為監察御史改祠部主事應天教授以剛直忤權貴歸養父竟不起楊士奇泰和人少􅀌貧力學授徒自給建文初用薦入翰林與纂修事尋試吏部第一除吳王府審理副仍供職翰林成祖即位改編修入直文淵閣㕘機務累遷左諭德帝北巡留輔太子時漢趙二王搆太子急士奇力為調䕶帝意乃解進翰林學士左春坊大學士仁宗立進禮部侍郎兼華蓋殿大學士尋進少保兵部尚書正統初進少師卒贈太師諡文貞士奇厯相四朝文章德業為一時輔臣之冠云梁潛泰和人父蘭隱居樂道潛由鄉舉除四㑹知縣有治聲永樂初召修太祖實錄擢修撰兼右贊善成祖北巡留輔太子被譖下獄棄市朝野惜之妻楊氏不食死子楘舉進士厯浙江布政使時稱良吏陳誠吉水人由進士官行人洪武中使安南令還所侵思明地却其贐厯吏部員外郎永樂中哈里入貢詔誠偕中官李達等送其使臣還遂頒賜西域諸國誠乃遍厯哈里賽瑪爾堪等十七國諭以招懷之意並圖其山川城郭誌其風俗物產為西域記以獻帝襃賚擢郎中後諸國數入貢帝以誠勞擢廣東㕘議累官右通政哈里舊作哈烈賽瑪爾堪舊作撒馬兒罕今俱改正宋禮永寕人永樂初厯宫工部尚書開㑹通河有功卒祀南旺湖上鄒緝吉水人厯官左庶子兼侍講永樂十九年三殿災緝上疏極陳時政缺失凡數千言幾得禍緝博極羣書居官勤慎清操如寒士官宫僚所陳皆正道曾棨永豐人生而穎異博學强記工文詞永樂二年殿試第一授修撰時詔解縉選進士二十八人進學文淵閣棨為首帝愛其才有薦文士者必問才學如棨否或命就棨辯論以觀其能厯官侍讀學士少詹事為文如泉源一瀉千里館閽中自解胡後諸大制作多出其手卒贈禮部侍郎諡襄敏周述吉水人永樂二年與從弟孟簡並舉進士及第俱授編修述累進左春坊左庶子孟簡在翰林二十年始遷詹事府丞出為襄王長史述温厚簡靜文章雅贍孟簡謙退不伐並為世所重王直伯貞子永樂進士改庶吉士授修撰厯仕仁宗宣宗累遷少詹事兼侍讀學士在翰林二十餘年稽古代言編纂記注之事多出其手正統初進禮部右侍郎八年拜吏部尚書秉銓十四年端方直亮為時名臣卒贈太保諡文端子䅪翰林檢討亦以學行稱羅汝敬復仁孫永樂進士選庶吉士累進侍講仁宗時陳時政缺失十五事忤㫖下獄改御史直聲震朝廷宣德中擢工部右侍郎兩奉使安南督理陜西屯田皆有勞績孫瑋性至孝母喪廬墓虎不為害竹杖生枝白鴉為鳩鳴荷華生於原以祖廕歴官常州府同知李時勉安福人永樂進士選庶吉士厯侍讀性剛鯁慨然以天下為巳任以直言忤㫖繫獄赦復職洪熙元年復上疏言事帝怒命力士搥折其脅下錦衣獄宣宗宥之復原官遷侍讀學士正統時進學士掌院事為祭酒崇廉恥抑奔競諸生貧不能婚葬者節餐錢瞻給督令讀書燈火達旦已忤王振誣以擅伐宫樹枷於國子監前方盛暑枷三日不解監生李貴等千餘人詣闕乞貸石大用上章願以身代太后為言之始得解後致仕歸國子生送者幾三子人無不泣下卒諡文敦成化五年改諡忠文贈禮部侍郎周忱吉水人永樂進士選庶吉士厯刑部員外郎有經世才浮沉郎署二十載人無知者獨夏原吉奇之宣德初超遷工部右侍郎巡撫江南在任二十二年大著惠政諸所建明皆著為令景泰中以工部尚書致仕卒諡文襄詳見江南名宦張宗連吉水人永樂進士改庶吉士豫修永樂大典授刑部主事錄囚廣東多所平反仁宗擢左中允宣德初進大理寺丞尋清軍福建民以不擾坐奏事忤㫖謫常州同知宗連性淡泊涖郡不攜妻子病亟召醫室無燈燭童子從外索取油一盂入立却之其清峻如此陳士啟泰和人永樂進士選庶吉士厯禮部郎中尚書吕震擠尹昌隆至死屬吏承奉唯謹士啟獨不少徇出為山東右參政盡心吏事卒於官李昌褀廬陵人永樂進士選庶吉士豫修永樂大典僻書疑事人多就質遷禮部郎中厯廣西河南左布政使並有惠政為人博學敦行致仕二十餘年屏迹不入公府故廬􅂊蔽風雨伏臘不充蕭省身泰和人永樂進士洪熙初官至河南右布政居河南十二年治行與李昌祺等錢習禮吉水人永樂進士選庶吉士授檢討累進學士掌院事翰林院落成諸殿大學士皆至習禮不設楊士奇楊溥坐曰此非三公府也其剛正有執􅀋此正統初遷禮部右侍郎王振用事達官多造其門習禮恥為之屈遂乞歸卒諡文肅朱與言萬安人永樂進士授湖廣僉事遷四川副使正統初召為南京右副都御史致仕為人剛方廉慎政務大體數建白切時􅁦家居門庭肅清鄉人有不善唯恐與言知之羅通吉水人永樂進士授御史言事忤㫖出為交阯清化知州黎利反圍清化通與指揮打忠堅守乘間殺賊甚衆賊乃去景帝初以兵部員外守居庸關進右副都御史額森别部來攻㑹天大寒通令汲水灌城冰堅滑不得近七日遁走通追擊破官終右都御史額森舊作也先今改正劉子輔廬陵人永樂中由國子生為御史巡按浙江持法公平厯廣東副使左遷諒江知府黎利反來攻與主將李任固守九月力屈城陷遂自縊贈布政司叄議李湘泰和人永樂中以太學生擢知東平州持巳愛民撫綏十餘年始終一致正統中擢懷慶知府彭勗永豐人永樂進士除南雄建寕二府教授有賢聲正統初擢御史督南畿學政訓迪有方士風大振改考功司郎中出為山東副使土木之變數言兵事以直不容於時致仕歸彭琉安福人永樂進士授政和知縣御史李寀巡銀場家人為姦利琉禁之乃摭劾琉謫教諭楊士奇以文學薦擢編修正統初簡儒臣督天下學校琉莅廣東士風為振官終湖廣副使琉寡嗜慾甘勞苦動以古人自期廉名直節表著一時楊黼吉水人由進士授御史仁宗即位上疏言十事擢衞王府長史盡心獻替持守潔清曾泉泰和人永樂進士選庶吉士改御史宣德初以言事謫汜水典史卒河南參政孫原貞上言泉操行廉潔服官勤敏雖古循吏無以加詔追復泉爵周敘吉水人年十一能詩永樂中舉進士選庶吉士授編修厯修撰侍讀正統中疏言國子生習經義外宜兼習一事如治民治兵書算之􅀋有司考課請以農桑學校為殿最帝嘉納焉擢南京侍讀學士請重修宋遼金三史詔許自撰景泰初請復午朝接大臣並詔臣民直言時政帝因詔求言劉球安福人永樂進士厯翰林侍講正統時王振欲征麓川球抗疏力諫復應詔力規時政振大怒逮下詔獄屬指揮馬順殺球深夜順攜一小校持刀至球所球方卧起立大呼太祖太宗在此頸斷體猶植立遂支解􅄟之獄户下侍修撰董璘亦在獄從旁竊血裙遺其家後其子求尸僅得一臂裹裙以殮景泰初贈學士諡忠愍二子􅃏釪痛父冤絶意仕進躬耕養母球既得卹乃應舉皆成進士鉞廣東參政釪雲南按察使球弟玭正統進士以有謫戍遼陽以文自娯著有養晦集郭循廬陵人由進士為刑部主事宣宗置西苑開太液池築萬􅀊山大興土木循抗疏切諫帝大怒命以氊裹循至大内親詰之循抗對無所屈帝益怒射傷其顱繫詔獄英宗立始復官終廣東參政劉廣衡萬安人永樂末進士正統間以刑部郎中出修浙江荒政積粟數百萬督治陂塘為旱澇備景泰初厯左副都御史鎮守陜西改撫福建浙江居官以廉節稱終刑部尚書子喬成化中進士累官湖廣左布政使李信圭泰和人洪熙時舉賢良授清和知縣在任二十二年以薦擢處州知府時稱良吏劉實安福人嗜古博學宣德中舉進士選庶吉士正統初授金華府通判厯知南雄府為中官所誣逮下詔獄瘦死實為人耿介苦節自持政務紛遝未嘗廢書士大夫重其學行孫丙成化末進士為庶吉士改御史巡按雲南督理兩淮鹽課厯官右副都御史廵撫湖廣進工部右侍郎丙操履清介所至嚴明法令修舉卒贈尚書諡恭襄廖莊吉水人宣德進士厯刑科給事中有直聲遷南大理少卿景泰五年疏勸帝朝上皇又言上皇之子陛下之猶子也宜令親儒臣習書䇿使天下臣民曉然知陛下公天下之心疏入廷杖謫定羌驛丞天順初召還厯刑部左侍郎卒贈尚書諡恭敏李紹安福人宣德進士選庶吉士授檢討天順初厯禮部右侍郎致仕成化初召為國子祭酒未赴而卒紹好學藏書甚富居官剛正有器局好􅅄後進其卒也帝深惜之子瑢成化初進士官御史終廣東布政使曾翬泰和人宣德進士厯刑部員外郎秦王以私憾誣巡撫陳鎰狎妓翬按得其情劾藩王不當誣汙大臣朝論偉之累遷廣西河南參政山東右布政使進刑部左侍郎巡撫浙江還朝謝病去翬謹操行所至有聲及歸生計蕭然絶迹公府人以爲賢王質泰和人由鄉舉爲訓導擢御史宣德末厯四川參政行部惟啖青菜人呼爲青菜王由山東布政進户部右侍郎拜刑部尚書正統八年忤奄下獄釋爲侍郎劉定之永新人正統元年㑹試第一授編修京城大水應詔陳十事景帝即位復上言十事帝詔答之成化二年以太常少卿兼侍讀學士入閣輔政江西湖廣災有司方徵民賦以定之言􅀗免尋進吏部左侍郎時萬貴妃專寵皇后希得見儲嗣未兆獨定之抗疏力言中外韙之爲人謙恭質直以文學名一時卒贈禮部尚書諡文安劉觀吉水人正統進士方年少忽引疾歸杜門讀書求聖賢之學四方來學者甚衆知縣劉晟爲築養中書院居之四壁皆書先儒語錄又大書誠明敬義四箴以示學者每日端坐無懈容又作勤儉恭恕四箴以教其家取吕氏鄉約表著之以教其鄉族有􅀌嫠不能自存者周之使全其節其所居曰卧廬學者稱卧廬先生鄰郡吳與弼極推重之孫鼎廬陵人由鄉舉爲松江府教授以孝弟立教正統八年楊溥薦爲御史代彭勗督南畿學政教士務先德行請託者無所措手英宗北狩上書請隨所用効死不報以親老致仕知府張瑄疏言鼎孝追曾閔學繼程朱宜起居論思之職不果用卒於家劉儼吉水人正統七年進士第一授修撰厯太常少卿兼侍讀主順天鄉試黜閣臣陳循王文之子幾得危禍天順初改翰林掌院事卒贈禮部左侍郎諡文介儼有文學立朝正直居鄉有惠澤嘗豫修五倫書厯代君鑑總裁寰宇通志宋元通鑑綱目羅如墉廬陵人由進士授行人從英宗北征瀕行訣妻子誓以死報國屬翰林劉儼銘其墓儼驚拒之如墉􅀏曰行當驗耳途中與尹昌作歌詩相唱和慷慨就死尹昌吉水人由進士官行人司正張洪安福人官御史同死英宗土木之難左鼎永新人正統進士授御史巡按山西及乘輿北狩畫戰守策甚備額森請和抗章言不可尋以山東河南饑遣鼎賑恤民賴以安景泰四年連上疏論時政復因災旱陳救弊恤民七事帝善其言鼎居官清勤卓有聲譽時御史練綱以敢言著名而鼎善為奏章京師語曰左鼎手練綱口自公卿以下咸憚之英宗復位擢左僉都御史王槩廬陵人正統進士厯河南按察使時多繫􅤾訊鞫累日而獄為之空成化中官至刑部尚書卒諡恭毅劉孜萬安人正統進士授御史出按遼東將吏懾伏擢山東按察使治行稱最遷左布政使尋擢右副都御史巡撫江南成化初拜南京刑部尚書懲南部法弛矯之以嚴官吏畏憚致仕卒孜居官廉慎治事精密號一時能臣彭時安福人正統十三年進士第一授修撰郕王監國令入閣豫機務以憂去服除累遷太常少卿天順初復命入閣時帝方嚮用李賢然賢雅重時退必咨之時引義不阿或爭可否至失色憲宗即位議上兩宮尊號中官夏時欲獨尊所生周貴妃時力爭乃得並尊進兵部尚書加太子少保兼文淵閣大學士慈懿太后崩欲别卜山陵時偕朝臣伏文華門泣請卒合葬裕陵改吏部尚書加少保時立朝三十年持正存大體有古大臣風卒贈太師諡文憲鍾同永豐人景泰進士授御史遇事敢言懷獻太子卒同疏論時政請復立沂王為大子景帝怒下詔獄封巨挺就獄中杖殺之時年三十二同之上疏也策馬出馬㐲地不起同叱曰吾不畏死爾奚為者馬猶盤辟再四而行同死馬長號數聲亦死英宗復位贈大理寺丞諡恭愍從祀忠節祠劉宣安福人父戍盧龍卒宣補其役因為衞學生能自奮於學景泰中成進士選庶吉士授編修宏治初厯官南京工部尚書嚴出納剗姦弊部事修舉宣事母孝自奉薄性耿介嫉惡不少徇卒諡文懿子秉監正德中進士厯刑部員外郎錦衣千户王注殺人都督錢安庇之莫敢問秉監竟實其罪為大名副使毁淫祠千數以忤司禮中官賴義下詔獄謫官家居喜講學時人重其名行伍驥安福人景泰進士授御史莊重寡言􅀏見義敢為天順中巡撫福建上杭賊起驥率兵深入破平之冒瘴癘病卒軍民爭為立祠子希閔成化進士厯官福建僉事亦有平寇功張敷華安福人父洪為御史死土木難敷華少􅀒氣節舉天順進士選庶吉士厯兵部郎中廉重不撓遷浙江參議進右參政右布政使治聲大著宏治時巡撫山西陜西總督漕運皆有政績以右都御史掌南京都察院就遷刑部尚書正德元年召為左都御史時大臣與言官請去劉瑾帝猶豫未決敷華復上疏切諫不報尋以中㫖罷去卒贈太子少保諡簡肅敷華剛介直諒望重朝野與劉大夏戴􅃢齊名孫鼇山亦舉進士官御史羅倫永豐人少好學家貧樵牧挾書諷誦不輟成化二年廷試對策萬餘言直斥時弊擢第一授修撰大學士李賢遭喪奪情倫詣賢沮之不聽乃上疏極論謫福建市舶司提舉賢卒復官改南京居二年引疾歸遂不復出倫為人剛正嚴於律巳義所在毅然必為於富貴名利泊如也里居倡行鄉約相率無敢犯衣食粗惡或遺之永見道殣解以覆之晨起留客飯妻子貸粟鄰家及午方炊不為意以金牛山人迹不至築室著書其中四方從學者甚衆卒年四十八嘉靖初追贈左諭德諡文毅學者稱一峯先生周孟中廬陵人自㓜有求道志舉成化進士授南京文選主事厯福建僉事廣西副使皆督學政以正學勗士士皆嚮風累遷廣東布政使治行為當時最宏治中終右副都御史其學本於主敬自號畏齋張黻吉水人成化進士官後府經厯㑹刑部員外郎林俊劾僧繼曉中官梁芳下錦衣獄拷訊黻救之並下獄時言路久塞兩入直聲震都下為之語曰御史在刑曹黄門出後府黻謫師宗知州厯知涪州宿州介特不避權貴劉戩安福人成化中進士及第授編修進侍講孝宗初頒詔安南事畢越宿即行饋遺一無所受安南人為建卻金亭於思明道中官終諭德戩博學守正嫉邪疾革聞劉吉罷張巒死大喜索筆賦詩而卒劉遜安福人成化進士由知縣擢南京御史宏治初與同官姜綰劾内侍蔣琮下詔獄謫灃州判官遷武岡知州復以裁岷府祿米貶四川行都司斷事厯湖廣副使劉瑾徵賄不得坐缺軍儲被逮瑾誅起官厯福建按察使遜有氣節雖數遭挫辱志不少屈歐陽旦安福人成化進士由休寕知縣擢御史宏治初劾劉吉貪位固寵宜急放逐請罷皇莊分賜小民不聽旦醇謹有文學終南京副都御史趙璜安福人宏治進士厯兵部員外郎出為濟南知府政績大著正德初擢順天府丞劉瑾惡之逮下詔獄除名瑾誅復職遷右僉都御史巡撫宣府山東有聲嘉靖初進工部尚書詔營后父陳萬言第估工值六十萬璜持之得大減又與廷臣伏闕爭大禮帝欲遷顯陵璜極言不可乃寢詔建玉德殿景福安喜二宫再疏爭之得罷役為尚書六年持政不阿惜財守法權倖多嫉之致仕歸卒贈太子太保諡莊靖羅欽順泰和人宏治六年進士及第授編修遷南京國子司業與祭酒章懋務以實行造士劉瑾擅政除名瑾誅復官累遷兩京吏部左右侍郎世宗立攝尚書陳久任超遷法大禮議起疏請重正統以隆大孝不納遷南京禮部尚書省親乞歸起禮部尚書又改吏部時張璁桂萼以議禮驟貴樹黨屏逐正人欽順恥與同列乃辭不拜里居二十餘年曰居學古樓潛心格物致知之學專力於窮理存心知性所著困知記辨析精審學者稱整菴先生卒贈太子太保諡文莊本朝雍正二年詔從祀文廟弟欽德欽忠宏治中同登進士孝友為時推重陳鳳梧泰和人宏治進士由庶吉士授主事應詔陳法祖敬天數事且言張鶴齡兄弟宜擇正士與之游處帝頗納之厯湖廣提學僉事河南按察使中官谷大用迎世宗於興邸所至横􅁀鳳梧獨不屈累擢右副都御史巡撫應天十府罷歸卒贈工部尚書劉玉廣衡孫宏治進士擢御史武宗即位因災異陳修省六事出按京畿劾中官吳忠貪虐劉健謝遷罷馳疏劾劉瑾等亂政瑾搆之繫獄削籍瑾誅起官厯右僉都御史提督江防宸濠反攻安慶玉以舟師赴援事定改巡撫鄖陽世宗立為刑部左侍郎偕九卿爭興獻帝不宜稱皇及帝欲考獻帝又偕廷臣伏闕哭爭坐事削籍卒隆慶初贈刑部尚書諡端毅子慤南京工部右侍郎厯官亦有聲羅僑吉水人宏治進士為大理評事正德五年因旱霾上言陛下視朝或至日昃狎侮羣小號呶達旦且文網日密誅求益峻先朝耆舊如劉大夏者謫戍窮邊已及三載願慎逸游屏玩好放棄小人召遷舊德疏入輿櫬待命劉瑾果大怒欲抵極刑李東陽力救得改原籍教官瑾敗復職以病歸宸濠反王守仁起兵吉安僑首赴義世宗即位授台州知府境内大治擢廣東左參政踰年謝病去周尚化泰和人天性孝友操行清介事父及兩繼母甚謹正德三年進士出知郅州初下車賊大至尚化豫築土城捍禦之既逼州議者欲闔門固守尚化日城外非吾民乎因合城内外民諭之以義誓共死守未幾寇擁騎數萬四面攻圍連日不可克乃解去民賴全活勒石紀功立生祠祀名宦尋升刑部員外郎後丁繼母憂以疾卒毛伯温吉水人正德進士厯御史巡按福建河南皆有聲世宗即位中官蕭敬韋霦陰緩張鋭張忠獄伯温請並誅敬霦中官為屏氣尋遷大理寺丞擢右僉都御史巡撫寕夏坐李福達獄禠職十五年起右副都御史進工部尚書總督宣大山西軍務修築大同五堡邊防賴焉尋命統兵征安南諭降莫登庸納其圖籍遂改安南國為安南都統使司加太子太保改兵部尚書上防邊二十四事巳復疏革冗濫左右多不悦未幾罷歸穆宗立復官天啟初諡襄懋歐陽重廬陵人正德進士授刑部主事劉瑾竊柄百官謹事之重獨不顧張鋭等方掌厰衞連搆縉紳獄重皆力與之爭累擢右僉都御史巡撫應天㑹尋甸反改撫雲南討平叛蠻規畫善後民咸稱便既劾黔國公沐紹勛與鎮守中官杜唐為所搆遂罷歸歐陽鐸泰和人正德進士授行人上書極論時政厯延平知府改福州並以治行聞累遷南京光祿卿奏革大官珍羞諸署積弊六事進右副都御史巡撫應天十府均賦平徭民皆稱便再擢南京吏部右侍郎自陳去鐸有文學内行修潔雖通顯家具蕭然卒贈工部尚書諡恭簡戴冠吉水人正德進士爲户部主事上言勢要家子弟童奴茍竊爵賞錦衣官屬數至萬餘次者繫籍勇士投充監局匠役皆國家巨蠧又言調入京操之軍不宜久留所籍財産不宜貯之豹房帝怒貶廣東驛丞嘉靖中厯山東提學副使以清介聞鄒守益安福人父賢篤内行宏治進士授南京大理評事數有條奏當時稱之官至福建僉事擒寇有功守益舉正德六年㑹試第一出王守仁門以廷試第三授編修告歸謁守仁講學於贛州宸濠反與守仁軍事嘉靖初赴官帝欲去興獻帝本生之稱守益再疏切諫下詔獄謫廣德州判官久之厯南京祭酒九廟災陳上下交修之道以殷中宗高宗反妖爲祥享國長久爲言帝大怒落職歸里居日事講學四方從游者踵至學者稱東廓先生隆慶初贈南京禮部右侍郎諡文莊子善嘉靖進士累官太常卿服習父訓踐履無怠稱其家學善子德涵隆慶進士厯刑部員外郎張居正方禁講學德涵守之自若出為河南僉事御史承居正指劾之歸弟德浦萬厯進士厯司經局洗馬早負盛名為東厰所劾罷王思直曾孫正德進士選庶吉士授編修乾清宫災上疏勸帝抑私恩端政本帝狎虎而傷思又上封事切諫謫潮州三河驛丞怡然就道時王守仁講學贛州思從之游及守仁討宸濠檄思參軍議世宗立復官與同官屢爭大禮又偕廷臣伏左順門哭諫繫獄廷杖病創卒隆慶初贈諭德李中吉水人正德進士授工部主事武宗自稱大慶法王建寺西華門内用番僧住持廷臣莫敢言中抗疏切諫謫廣東驛丞王守仁撫贛州檄中參其軍事豫平宸濠世宗朝累官副都御史總督南京糧儲卒光宗時追諡莊介中少聞道於楊珠既而擴充之沈潛邃密學者稱谷平先生門人羅洪先王龜年周子恭皆能傳其學王學夔安福人正德進士以吏部主事諫南巡跪闕下受杖嘉靖初上疏言謹始之道已奏請裁戚畹又申救言官厯考功文選郎中廉謹為時所稱累遷南京吏禮兵三部尚書致仕年九十四卒贈太子少保聶豹永豐人正德進士厯御史巡按福建有聲出為平陽知府修築關隘寇不能犯被論免起右僉都御史巡撫順天進兵部尚書增築京師外城致仕歸隆慶初贈少保諡貞襄王時柯萬安人正德進士授行人嘉靖初擢御史疏言桂萼輩以議禮迎合得升美官薛蕙陳相等連章論奏實出至公忤㫖切責未幾偕廷臣伏闕爭孝宗不當稱伯考再予杖除名穆宗立贈光祿少卿彭􅆪安福人正德初由鄉舉為衡山知縣多惠政移判常州攝宜興縣欲例供遷知靖州投劾去築玩易草堂自稱石屋山人泊然清修迥出塵表時莫不高其風劉魁泰和人由郷薦厯寶慶通判鈞州知州潮州同知所在有惠政升工部員外郎疏陳安攘十事帝嘉納之嘉靖二十一年帝用方士陶仲文言建佑國康民雷殿於太液池西魁上言切諫帝震怒杖於廷錮之詔獄四年得釋未幾復追逮又三年乃釋在獄中與楊爵周怡二人講誦不輟屢瀕死無幾微尤怨李宗栻安福人少為諸生歎曰先王設庠序以復性明倫豈徒應舉取科第耶思近裏著巳以求放心容止食息必以古聖賢為宗尤篤於孝浣濯細事皆躬親之年三十二而卒遠近惜之劉和吉水人年十三父行賈池州溺死和往其地為設祭號慟正德中母殁廬墓三年虎不為害歐陽德泰和人從王守仁學登嘉靖初進士厯刑部員外郎以學行改編修累遷禮部尚書時儲位久虚德上疏懇請㑹有詔二王出邸就婚德以裕王儲貳不當出外裕王康妃杜氏薨德請遵成化朝紀淑妃故事不從德遇事侃侃持正或當利害衆相顧色戰德意氣自如其為學務真知實踐引掖後進如恐不及卒贈太子少保諡文莊周延吉水人嘉靖進士厯兵科給事中時議新建伯王守仁罪將奪其爵延抗疏訟之謫太倉州判遷廣東參政撫安南征黎寇皆豫有功以右副都御史巡撫應天靖海寇林成之亂進南吏兵二部尚書入為左都御史延居官方峻砥節奉公皭然不滓卒贈太子太保諡簡肅郭宏化安福人嘉靖進士由江陵知縣徵授御史以星變上疏請罷各省采木造甎采珠諸役帝怒斥為民穆宗立贈光祿少卿劉􅀖采安福人學於王守仁丁父憂疏水廬墓免喪不復應舉提學副使趙淵强之試遂中式仕至嘉興府同知尋棄官歸􅀖采識既高明用力復果鋭故造詣特深劉文敏􅀖采從兄生而純朴與􅀖采共學於王守仁返躬實踐瞬息不少懈嘗曰學者當循本心之明時見已過刮磨砥礪以融氣稟絶外誘徵諸倫理事物之實無一不慊於心而後為聖門正學非困勉不可得入也以諸生終劉曉文敏族子正德中舉於郷王守仁官南京曉往受業歸語文敏􅀖采亦往師之吉安講席大興由曉倡也後為新寕知縣有善政解官歸劉陽安福人初從劉曉受經曉告以守仁學遂往謁於贛州嘉靖初舉於鄉知碭山縣有惠政徵授御史嚴嵩以同郷故將援之陽引疾歸父喪哀毁廬墓終喪遂不出為學務實踐不尚虚寂歐陽瑜泰和人從王守仁學舉於鄉不就㑹試曰老親在三公不與易也母死廬墓側虎環墓而嗥不為動後為通州學正厯四川參議所至有廉惠聲羅洪先吉水人父循由進士官至徐州副使累著聲績洪先舉嘉靖八年進士第一授修撰告歸起左贊善與唐順之趙時春疏請皇太子御文華殿受朝賀時帝方諱言儲貳見疏大怒遂除名歸洪先事親孝父每肅客洪先冠帶行酒拂席授几甚恭親殁苫􅒘疏食者三年其學專主靜凡天文地理禮樂典章河渠邊塞戰陣攻守靡不精究家居黙坐蕭然屢空弗以介意隆慶初贈光祿少卿諡文莊朱衡萬安人嘉靖進士厯知尤溪婺源有治聲累擢右副都御史巡撫山東進南京刑部尚書嘉靖四十四年河決沛縣飛雲橋運道淤塞改衡工部尚書總理河漕衡開新河起南陽訖留城疏舊渠起留城訖境山由是運道大通萬厯初召還衡先後在部禁止工作裁抑浮費所節省甚衆性强直遇事不撓不為張居正所喜再疏乞休詔加太子太保馳驛歸子維京萬厯進士厯光祿寺丞三王並封維京首上疏力諫削籍歸天啟時贈太常少卿尹臺永新人嘉靖進士選庶吉士授編修嚴嵩以同鄉故善遇之欲與為婚竞不許為南京祭酒將行嵩舉酒屬臺曰何以教我臺曰楊繼盛言誠狂願勿貽主上殺諫臣名厯官南京禮部尚書臺留意理學鄒元標嘗稱其學不傍門户能密自體驗云宋儀望永豐人嘉靖進士知吳縣以治行徵授御史抗疏劾大將軍仇鸞挾寇自重巳陳時務十二策復發嚴嵩私人胡宗憲阮鶚姦貪狀厯忤嵩父子貶􅂜陵州判官嵩敗擢霸州兵備僉事遷福建副使有破倭功萬厯初擢右僉都御史巡撫應天奏減諸郡災賦修戰守備破倭於黑水洋遷南京大理卿罷歸儀望少師聶豹私淑王守仁又從鄒守益歐陽德羅洪先游守仁從祀儀望有力焉王時槐安福人嘉靖進士累官福建僉事有靖寇功厯太常卿時槐少好禪學後從同邑劉文敏游乃專言居敬五十罷官至老講學不倦學者稱塘南先生陳嘉謨廬陵人與王時槐俱師劉文敏又同舉進士為廬州推官有治行厯給事中以不附嚴嵩出為四川副使厯湖廣參政乞歸專用力於學每推服時槐時槐亦欽重之胡直泰和人嘉靖進士厯主事嚴嵩以郷人故欲引之謝不往官至福建按察使直少從同邑歐陽德學年三十復從羅洪先得王守仁之傳鄒元標師事之曾同亨吉水人嘉靖進士為吏部文選司郎中有名萬厯初以右副都御史巡撫貴州與張居正不合勒休致後累遷工部尚書創立勾稽法吏不得為姦諸勲戚中貴陳乞踰制多所裁抑又疏請減織造之半各省􅀊輸軍器民困而器窳請半收其直皆允行乞歸又起為南京吏部尚書久之始拜京察自陳引疾致仕卒贈少保諡恭端弟乾亨從羅洪先游登萬厯初進士厯御史劾兵部尚書張學顏曲庇李成梁􅌸棄公論貶海州判官累遷大理卿趙南星被斥乾亨論救侵執政遂引疾歸乾亨言行不茍與其兄並以名德稱蕭廩萬安人祖乾元以御史劾劉瑾廷杖終雲南副使廩舉嘉靖末進士隆慶初擢御史因地震請加禮中宫引律爭宫闈祕獄出覆陜西四鎮兵食斥將吏隱占卒數萬人歸伍改巡茶馬按浙江請祀建文朝忠臣十二人從祀王守仁於文廟撫陜西移撫浙江皆有聲累遷兵部左侍郎卒贈尚書廩初從歐陽德鄒守益學制行醇謹故所至有立劉靜萬安人為諸生嘉靖間流賊寇縣靜􅀒母出奔賊將殺其母以身翼蔽求代死賊怒攢刃殺之猶抱母不解屍閲七日不變萬厯初旌表劉元卿安福人隆慶中舉於鄉㑹試對策極陳時弊張居正怒下所司申飭既歸師同邑劉陽遂絶意科名專意求道後以累薦召為國子博士擢禮部主事疏請早朝勤政又請從祀鄒守益王艮於文廟尋引疾歸肆力撰􅄒著諸儒學案賢奕編思問編禮律􅀋要大學新編諸書自吳與弼後鄧元錫章演與元卿並􅀩薦辟號江西四君子劉臺安福人隆慶進士萬厯時為御史劾張居正專恣凡數千言皆甚切直廷杖除名居正恨甚誣以他事戍廣西至潯州暴卒是日居正亦卒後贈光禄少卿天啟初追諡毅思傅應禎安福人隆慶進士知零陵縣有平盜功萬厯初授御史疏陳三事指斥張居正被謫戍復起擢南京大理丞奏薦海内知名士三十七人移疾歸卒贈本寺右少卿應禎與劉臺同邑同舉進士為御史同忤居正得禍鄉人並祠祀之鄒元標吉水人九􅀊通五經萬厯初以進士觀政張居正奪情元標抗疏切諫廷杖謫戍極邊居正死召拜吏科給事中首陳君道五事㑹内宫災復上時政六事忤㫖謫南京刑部照磨厯史部員外郎移疾歸里居講學垂三十年中外薦疏凡數十百上光宗立起大理卿進刑部侍郎天啟初還朝首進和衷之説因請起廢錭崇襃恤事皆得行尋拜左都御史元標初以方嚴見憚晚節造詣純粹時朋黨方盛元標思矯其弊薦引黜陟一本至公小人猶忌之以建首善書院為閹黨所劾遂連疏乞歸卒尋被削奪崇禎初贈太子太保諡忠介王德新安福人萬厯進士授南京兵部主事父喪除入都適座主申時行柄國或勸往謁可得美曹德新日吾安忍舉生平而盡棄之乃補刑部㑹四御史以劾工部尚書何起鳴貶秩德新抗疏爭之起鳴方結中官張誠為援遂下詔獄削籍為民久之起官光禄寺丞劉應秋吉水人萬厯十一年進士及第授編修遷南京司業論首輔中時行􅀩蔽邊事並侵王錫爵留中不下尋召為右中允厯祭酒時詞臣多優游養望而應秋獨􅀒才氣好議論以此取忌㑹有撰憂危宏議者御史指及應秋遂調外辭疾歸崇禎時贈禮部侍郎諡文節王如堅安福人萬厯進士厯刑科給事中抗疏爭三王並封與朱維京皆削職為民天啟中贈光禄少卿羅大紘吉水人萬厯進士授行人選禮科給事中上定制書數千言巳復言視朝宜勤語皆切直廷臣請建儲閣臣列名公疏乞納諸臣請首輔申時行獨進密掲謂實不與知大紘抗疏紏論忤㫖斥歸大紘志行高卓鄉人以配羅倫羅洪先號為二羅天啟中贈光祿寺少卿鄒德泳守益從子萬厯進士官御史時李獻可請豫建太子斥為民德泳救之亦削籍家居三十年言者交薦光宗朝厯尚寶少卿太常卿魏忠賢用事遂乞休歸時廬陵劉鐸官􅀭州守忤忠賢論死贈太僕少卿蕭近高廬陵人萬厯進士擢禮科給事中甫拜官即上疏言罷礦釋囚起廢三事明詔已頒不宜中止遷刑科都給事中劾遼東税使高淮激變得撤還厯太僕卿豫議三案謂崔文昇李可灼當斬方從哲當勒還故里張差謀逆有據不可蔽以風癲衆韙其言終工部左侍郎卒於家李􅀖華吉水人萬厯進士由知縣授御史多建白厯天津巡撫兵部侍郎崇禎初遷尚書鋭意清􅁵戎政大舉十二年移南京兵部尚書躬厯江北諸州縣相度形勢建臺築堡不請公帑以父憂去十五年起為左都御史流賊陷山西密疏請帝固守京師命太子監南都又請定永二王分封太平寕國皆未及行都城陷縊於文信國祠福王時贈太保諡忠文本朝順治年間賜諡忠肅周克超泰和人廩膳生天性孝友父殁守殯鄰火災延超扶柩號泣誓與俱焚燎鬚髪毁左目而不去須臾風返得以保屋遠近嘆為孝子萬厯年間旌表祀鄉賢以子應鼇官贈兵部主事郭維經龍泉人天啟進士崇禎中為南京御史疏劾尚書王永光黜陟徇私温體仁不宜在相位朱國弼貪殘皆不納以憂去福王時累升左僉都御史極言逆案不可翻馬士英阮大鉞輩深嫉之令囘籍唐王召為吏兵二部尚書總理軍務督師援贛州入城與楊廷麟萬元吉協守城破入嵯峨寺自焚死本朝乾隆四十年賜諡忠烈黄紹杰萬安人天啟間進士崇禎時官刑科左給事中因久旱求言上疏乞罷温體仁以囘天意帝怒貶秩體仁辯紹杰復列其亂政實迹再辯再劾之遂調上林苑署丞稍遷行人司副鳳陽陷復劾體仁誤國召寇再謫應天府檢校終南京吏部郎中劉同升應秋子崇禎中殿試第一授修撰楊嗣昌奪情入閣抗疏劾之謫福建按察使知事移疾歸南都不守偕楊廷麟共謀興復唐王授以兵部左侍郎巡撫南贛時已得疾日與士大夫講明忠孝大節慷慨激烈聞者感憤以勞瘁卒贈東閣大學士諡文忠徐士驤吉水人崇禎末獻賊入吉安士驤攜妻子避山東遇賊欲官之不屈賊穿其耳令肉􅃝游市見一井即投下賊縋出劓其鼻大罵復斷一臂罵不絶口賊甚怒乃刳心剝膚而死同時死難者周國柱安福諸生與賊鬭死趙雲永新人應募隸贛州營移守吉安賊至挺身搏戰死吳名標永豐人賊至名標手刃妻妾肅衣冠端坐中堂賊殺之顏色不變陳南箕安福人崇禎時副榜弟覯舉人甲申之變兄弟北望大哭棄妻子入歐公山破衣藿食厯八年南箕死覯為左右穴葬兄左留其右待巳孤處萬峯中又二十年卒本朝劉廣業安福人順治進士少失恃事繼母極孝家貧為塾師毎月析修金三十封寄其妻使日持其一市甘㫖遭父喪兵至其鄉見廣業衰絰抱木主不舍目是孝子也乃得免蕭法河吉水人順治進士知滋陽縣與民休息不忍以嚴法繩民時奉緝逃之令法河督捕雖嚴詳而必慎不欲以民命博功名卒入祀鄉賢祠張瑛安福人順治進士知荔浦縣苗人梗化時議用兵殱之瑛刺血為書請免諭苗歸服又請蠲鹽課並雜税巡撫特疏薦之以病歸居鄉迹不入城建祠築陂族里德之卒入祀鄉賢祠歐陽動生安福人順治進士知寶坻縣居官清慎有姦人楊繼魁黄國泰者結黨横行持吏短長動生廉知即置二人於法升武昌同知不就歸吳逆犯境民逃散苦饑動生捐米賑之卒入祀鄉賢祠張貞生廬陵人順治十五年㑹試第一選庶吉士授編修遷國子司業造士有方官至侍講學士性恬澹研精理學構誠意書院與郡人講論其中學者稱簣山先生著庸書唾居隨錄王山遺響若干卷李振裕吉水人康熙進士由庶吉士厯官刑工户禮四部尚書致仕嘗督學江南所賞拔皆一時才俊察賑畿輔全活甚心奏免江西浮賦振裕有力焉彭殿元廬陵人康熙進士選庶吉士授編修與修明史主順天鄉試所取多名士未幾罷官構薌谷小隱潛心講學數十年劉為先廬陵人康熙癸卯舉人授安遠教諭以正學啟牖諸生築談經樓與諸生發明春秋要㫖嘗捐俸修學宫置祭器卒於官入祀鄉賢祠藍嵒廬陵人康熙戊辰進士知山東蒙陰縣勤勞政事利興害除撫字情殷催科不擾凡士農商賈無不沾其厚澤卒入祀鄉賢祠劉驪安福人康熙進士知穀城縣時陜西大饑逃亡者衆皆安置有法升澂和知府卒祀郷賢羅大振廬陵人康熙間吳逆變父被執罵賊賊欲加刃大振引頸請代賊兩釋之事繼母孝愛異母弟併撫其遺􅀌如巳子建育嬰堂捐租膳之又捐社倉穀八百石復置倉五處以均遠近邑漕倉舊在城内民運維艱大振首倡移建城外水次通邑便之祀鄉賢李元鼎吉水人以徵召授太常少卿累官兵部右侍郎元鼎居官遇事敢言不避權貴歸家後日以表章先賢加惠鄉黨為事卒入祀鄉賢祠李陳玉吉水人鄉薦時榜名陳玉書知嘉善縣為民興利除弊多異政擢儀制主事召對稱為儒林循吏拜御史不避權貴卒入祀鄉賢祠廖玉吉氷人康熙間知廣東永安縣時寇猖獗甚玉分師招撫邑境以安時當編審對勘瞭然又履畝清丈積弊遂革修􅓺宫復書院集諸生講肄欽隄之役殫竭心力募夫授傭民不知勞潦不為災玉居官器宇沖和不以才諝自表暴擢儀制主事未幾卒入祀鄉賢祠張元鋭永豐人康熙進士博通經史立身閑以禮義為文獨攄胸臆自成一家登第後怡然南歸讀書窮理以身體力行為本卒入祀郷賢祠吳雲安福人㓜稱神童晚年隱居著天門易學研究先後天心性之㫖一以朱子為宗生平苦節自勵杜門掃迹長吏數存問欲常見之不可得卒入祀鄉賢祠謝來紱安福人博極羣書授徒里黨一以古學相勗尤究心易學著有易説四書精義卒入祀鄉賢祠康嘉安福貢生性至孝早􅀌終身引痛事母色養備至病輒􅈼天身代嘉兩叔俱早世遺子女婚嫁教養不遺餘力建同善書院捐義倉穀築陂隄灌田萬頃鄉里賴之卒入祀郷賢祠康綏猷安福人學問淹貫尤精春秋晚年潛心性理著省克存心箴自警􅀊饑設粥以賑置義田義倉焚劵推解卒入祀鄉賢祠張維垣永豐􅀊貢㓜聰敏鄉里推其獨行家貧好學與長子元鑑同遊施閏章之門講明理學卒入祀郷賢祠鄒承昊廬陵人性孝友好學篤志常捐祭田設茶亭造舟甃橋人感其德卒入祀鄉賢祠蕭煒廬陵庠生十􅀊時父母同日即世舅課之學每見同學執業輒淚沾几席思無墜家聲遭亂離益憤發下帷瓶無儲粟泊如也性耿介不隨流俗人皆敬而愛之祀郷賢賀德焻廬陵人性仁厚嘗身蹈白刃救姪於戎馬之中建義倉講鄉約閭里化之卒入祀鄉賢祠管翔麟安福人為人孝友仁讓善屬文㓜遭父喪一遵古禮秉家政四世合㸑與人真誠坦白樂解推􅀊歉捐穀賑饑所著有五經註釋卒入祀郷賢祠劉冠春安福貢生性至孝侍父母病日不交睫遭喪結廬墓側曉夕哀鳴嘗捐金置田周貧恤乏著有範身十要慎思一編皆得程朱正㫖卒入祀鄉賢祠劉景渤廬陵人孝行著聞同縣黄伉劉國杰賀鳯池均乾隆年間旌蕭道邇泰和人孝行著聞同縣蕭奇䇿陳有奎文慕道歐陽暉劉光秀蕭學文曾輒純羅振惠均乾隆年間旌郭開圖吉水人性孝友嘗佐父耕田猝遇虎以身衞父奮力格之虎卒遁去母亡宿母墓父病乃歸侍巳而父殁居廬三年悲思無閒墓為暴水決衝開圖乘駛流求棺不得􅈼天禱神俄至峽江見沙阜隱起掘之果得親棺歸葬與兄弟相友愛宅產多推讓同縣解貞讓均乾隆年間旌歐陽崑安福人孝行著聞同縣劉百卉王爵賓劉公驥均乾隆年間旌康良佐龍泉人孝行著聞乾隆年間旌盛國宜永新人孝行著聞同縣李枝炯戴前王志珍唐素安均乾隆年間旌王光昇廬陵人舉郷飲賓西􅀊喪母見母衣履輒號泣十三喪父繼母以苦節聞􅀒米力養母怒即長跪涕泣請杖弟甫四􅀊有小過輒與同跪引為已責母病禱於神乞減巳算益母夀母卒數日不食三年不入内室鄉人稱孝其子殿墀吉安府學優廩生母疾疽吮之而愈父病不食亦不食露禱乞以身代醫者夢神語曰有子如此巳益其父算三年矣父母殁廬於墓次一夕有虎來晲若馴擾者久之去桐杖倚殯所秋冬忽萌枿廬墓處向無井遇旱山麓忽涌水泉土人呼曰孝子泉生平踐履篤實精研經史誨人必盡其誠嘉慶八年旌以子官贈編修劉一元廬陵人少􅀌事庶母以孝聞博古通今淡於進取性行端方好行其德周急恤死鄉鄰賴焉殁且久口碑如新入祀鄉賢祠羅煥廬陵人嘉慶戊辰舉人㓜喪母好學篤行推產與兄事父以孝聞居喪廬墓三年有鳥夜啼如哭聲者數月枯杖生枝墳前苦儲樹亦冬花同縣劉士英四􅀊而􅀌薪樵易米以養母母病噎禱神願以自代病得痊母殁廬墓三年後士英果病噎卒均嘉慶年間旌蕭益先泰和人孝行著聞與同縣匡廷元均嘉慶年間旌許巨坤萬安人孝行著聞嘉慶年間旌陳硯亭永新人嘉慶十五年以順孫旌列女宋歐陽觀妻鄭氏廬陵人修母也修四􅀊而􅀌鄭守節自誓親誨之學家貧以荻畫地教修學書孫某妻項氏吉水人宣和七年氏為里胥所逮至中途欲侵淩之引刀自刺死事聞詔贈孺人旌其閭李生妻梁氏龍泉人紹興三年盜彭友犯邑梁義不受辱赴水死劉生妻歐陽氏安福人生居新樂鄉以事出惡少欲侵淩之氏不受辱而死朱雲孫妻劉氏安福人姑病雲孫刲股作糜以進而愈姑復病劉亦刲股以進又愈尚書謝諤為賦孝婦詩譚某妻趙氏永新人元兵破城趙抱嬰兒隨舅姑匿邑校中為悍卒所􅀗殺其舅姑執趙欲汚之不可遂與兒同遇害血漬禮殿兩楹之間入甎為婦人與嬰兒狀久而宛然如新或磨以沙石不滅又煅以熾炭其狀益顯元項惠可妻唐氏龍泉人至正間紅巾寇亂惠可具舟遠避及新林寇奄生唐見事急與夫訣曰我義不受辱所恨惟老母在母曰汝能取義我獨不能舍生乎遂相繼赴水寇驚異援之不及楊用霖妻蕭氏泰和人紅巾賊至姑病不能出蕭與子婦劉氏不忍去城陷皆自投井中鄰婦鄧氏陳氏繼之明宏治間知縣楊南金為立四節婦祠劉閈妻張氏安福人紅巾亂將屠其家張度難全率羣女婦沈茨潭死何某妻賀氏永新人蘄兵陷吉安夫被殺賊將欲聘之齧指血題詩遂自刎端坐不仆賊警去又吉水錢瑛妻張氏伏莽中見姑被執亟出請釋姑自縛睨姑已遠輒罵賊賊攢刃殺之龍泉章立賢家亦父子姑婦同殉曠維楨妻曾氏廬陵人紅巾亂被執閉室中將汚之曽乃先刃其子以血題詩壁間遂目縊蕭道甫妻羅氏萬安人二十孀居至老蓬首練裙足不出戸後長孫觀早卒其妻斷髮亦誓姑前孫女適郭又寡人欲委禽女厲聲曰蕭氏義門世節有死耳知縣康彥民紀其事元末吉水鎮撫彭九萬妻李氏拒寇死節附記之明解楨亮妻胡氏吉水人大學士胡廣女初解縉與廣同侍宴成祖曰爾二人同里同學仕又同官縉有子廣女可妻之廣頓首曰臣妻方娠未卜男女帝笑曰定女矣已而果生女遂約婚後縉家徙遼東廣欲離婚女截耳誓曰薄命之婚皇上主之大人面承之有死無二及赦還卒歸楨亮甯集畧妻吳氏字姞姑永豐人年十九夫卒三日不食決志殉之所親百方解譬始食粥朝暮一溢米服滿母欲令改適往視之同寢食三年竟不敢出一語歸謂諸婦曰此女鐵石心不可動也周賢佐妻胡氏名坤秀萬安人正德間為賊所掠驅行不從見殺時同縣張承甫女名貞姿亦為賊所逼投水死曾周易妻羅氏泰和人嘉靖中流寇至周易遇害羅哭且罵賊以矛刺其腹貫至喉罵猶不絶隆慶間旌表同縣曠子雲妻袁氏亦被掠不從投水死子雲義之終身不娶又同縣胡孟賞妻劉氏以罵賊見殺周必登妻王氏名素英吉水人必登為諸生以疾卒王氏年二十餘誓同死不食數日㑹母死歸弔一日與其弟曰我屍還周氏氏忽以無疾死弟如其言還屍於周周梯雲妻許氏名鳳潔安福人年十九夫卒方有娠慟哭欲以身殉姑曰存祀與死孰重許訣曰妊男則生否則死越四十六日生男煦乃養舅姑撫􅀌子年四十九而卒煦正德間成進士彭紹三妻周氏安福人嘉靖中流寇至罵賊見殺王世昌妻易氏安福人于歸時世昌以遘疾奄奄十餘月易侍之衣不觧帶世昌死除喪猶素縞姑憐之謂汝猶處子可終累乎跪泣曰是何言哉父母許我王氏即終身王氏婦矣自是獨處一樓不窺户外者四十餘年顏􅂤妻伍氏安福人早寡守節有軍人李敦率衆欲强娶之伍自經死詔旌其門劉堯妻顏氏安福人早寡守節里豪掘煤於舅之墓成坎顏泣阻不得遂投身坎中死事聞置豪於法而旌顏氏之孝賴南叔妻蕭氏萬安人早寡無子遺一女時寇大起築室與女共居數年盜突至蕭率女持利刃遮門詈賊賊怒縱火焚之與女俱燼劉一春妻彭氏萬安人一春為寇所刼將加害氏願以身代一春得釋賊欲逼之氏罵曰我文學之妻何可侮也賊殺之同縣陳道妻蕭氏被擄不辱賊幽之閲月義不為屈歎曰妾若失身何以見祖先於地下遂抱女赴水死又周岐妻郭氏彭春妻郭氏劉欽秀妻蕭氏蕭必暄妻郭氏郭常禮妻劉氏郭有銑妻劉氏楊廣藍妻蕭氏劉景達妻張氏俱遇賊不受辱而死王藹妻劉氏安福人幼敏慧學書且學劍年二十二藹卒遺􅀌文度尚未晬矢志守節甲申之亂猾將張某陽以軍需責餉欲逼劉劉以刃相向曰有斷頭寡婦無失身寡婦張乃止劉祭父自爲文又刻父遺集末竟而卒年三十五蕭衡良妻黄氏廬陵人張獻忠寇吉安黄與嫂某氏約同死寇至兩人攜手投水賊憐而出之罵曰誰能從亂賊偷生竟死之烈女胡氏吉水人胡中洋女年十六未字遇賊欲汚之憤罵死周長清妻劉氏名珍娘永新人歸周七日獻賊入境劉以輿舁姑已步行爲賊追及露刃脇之大罵被殺孝婦謝氏安福王三重妻天啟朝旌本朝劉氏二烈婦廬陵劉䕶妻孟氏名秋姑歸劉三載劉孟丑妻李氏歸劉未成婚㑹兵變二婦登樓自縊順治十五年旌羅欽堯妻李氏廬陵人年二十一欽堯卒矢志守節丙戌兵入境即赴水死康熙年間旌郭氏女萬安人郭明徵孫女名奇莊年十五賊至執之抱柱抵死不屈陳仲庸妻羅氏永豐人仲庸痛父屏斥死嘔血成疾卒羅遂觸石死年二十事聞建坊額曰一門忠孝節烈鍾香五妻羅氏永豐人夫卒貧不能殯有香五友佽助之其意在羅也羅覺之罄所有以酬日夜飲泣絶口不食自縊死劉雲崖妻龍氏永新人雲崖卒年二十二守節事舅姑撫育二子一夕有神物睨於側婦正色厲聲曰天地可質何懼女焉遂隱不見劉士鳳妻任氏泰和人夫亡守節同縣李森佩妻尹氏胡其惺妻劉氏陳嘉彭妻彭氏彭仁修妻郭氏妾劉氏胡奎卿妻郭氏胡有淛妻嚴氏蕭道朱妻劉氏陳廷修妻蕭氏劉南台