  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_109-1a}
body:
  text: 台州府二名宦三國呉范平錢塘人呉時遷臨海太守政有異能晉王述晉陽人穆帝時出補臨海太守蒞政清肅公庭盡日無事郄愔金鄉人由黄門侍郎為臨海太守在郡優游頗稱簡黙後以疾去職築宅章安有終焉之志辛景為臨海太守孫恩寇臨海景討破之恩窮蹙赴海自沉南北朝宋臧熹莒人武帝時為臨海太守郡經兵寇百不存一熹綏輯綱紀招聚流散歸之者千餘家阮長之尉氏人元嘉十一年除臨海太守蒞官有風績為後人所思江秉之考城人元嘉十二年轉臨海太守以簡約見稱得祿悉散之親故妻子常饑寒或勸營田者秉之正色答曰食祿之家豈可與農人競利在郡作書案一枚及去官留以付庫齊孔琇之山隂人永明中為臨海太守在任清約罷郡還獻乾薑二十觔世祖嫌少及知其清乃歎息梁傅昭靈州人天監中出爲臨海太守郡有蜜巖前後太守皆自封固專其利昭以周文之囿與百姓共之大可喻小乃戒勿封縣令常餉栗置絹於薄下昭笑而還之蕭洽南蘭陵人遷臨海太守爲政清平不尚威猛民俗便之劉潛彭城人大同十年爲臨海太守時政綱疎闕百姓多不遵禁潛下車宣示條制勵精綏撫境内翕然風俗大變唐啖助趙州人天寶末調臨海尉鄭䖍滎陽人天寶末貶台州司户參軍在官貧約甚澹如也五代唐陳長官史失其名事呉越王錢鏐爲寕海令鏐欲加賦使按縣長官上書言寕海土瘠收薄難以加賦鏐怒繫之死於獄後悟賦得不加民廟祀之宋畢士安雲中人太平興國初呉越錢俶納土選知台州言錢氏上圖籍有司皆侈張賦數今湖海新民始得天子命吏宜有安輯願一用舊籍詔從之王子輿莒人雍熙初知臨海縣精於吏事文牒紛委頃刻決遣曽無凝滯元絳錢塘人慶厯六年知台州州大水冒城民廬蕩析絳出庫錢即其處作室數千區命人自占期三􅀊償費流者復業又甓其城因門為牐以禦湍漲後人守其法陳襄侯官人慶厯中知仙居縣以德化民無事鞭箠然神明内藴案無留牘創開黌宫為勸學文月朔命門人管師讀以聳父老聽自是人才輩出孔文仲新喻人台州推官熙寕初范鎮以制舉薦對䇿九千餘言力論王安石所建理才訓兵之法為非安石怒罷歸故官錢暄臨安人熙寕中知台州台城惡地下秋潦暴集輒圮溺人多即山為居暄増治城堞壘石為臺作大隄捍之陳敏無錫人知台州朝命立元祐黨籍碑敏曰誣司馬公為奸人是誣天也其倅卒立之敏碎其石掛冠去陳槖餘姚人政和中為台州士曹治獄平允更攝天台臨海黄巖三邑皆以愷悌稱紹興中知台州民懷惠愛越境歡迎不數月稱治母喪􅀖人巷哭相率走行在所者千餘人請起槖詔槖清謹不擾治狀著聞敕所在州賜錢三十萬槖力辭上謂近臣曰陳槖有古循吏風滕膺為台州户曹㕘軍宣和中盜吕師囊應方臘來攻城膺率吏士禦以方畧卒磔師囊及去任民立祠祀之朱子撰廟記蕭振平陽人紹興中知台州海寇􅀔張振至克之楊煒紹興中知黄巖縣開官河立陡門九所民賴其利尤袤無錫人紹興中知台州州五縣有丁無産者輸二年丁税凡萬有三千家前守修郡城工纔什三屬袤成之袤按行前築殊鹵莽亟命更築加高厚數月而畢明年大水更築長墉正值水衝城賴以不没有毁袤者帝使人密察之民誦其善政不絶口乃錄其東湖四詩歸奏帝讀而歎賞除淮東提舉常平曾幾河南府人紹興中知台州治尚清淨民安之王淮金華人紹興中為台州臨海尉郡守蕭振一見竒之許以公輔器沈作賓歸安人知台州首訪民疾苦弛鹽禁寛租期均徭役更酒政決滯獄五十日間盡除前政之不便民者􅀖人胥悦前守嫉其勝己媒蘖罷去民請於朝借留不遂為立留碑李浩臨川人孝宗時知台州州有練中禁軍五百人訓練官貪殘失衆心不逞者因謀作亂露刃於庭浩推其為首者四人黥徙之迄無事並海有􅀫寇久不􅀗浩募其徒自縛贖罪即得其魁豪民鄭憲以貲結事權貴囊槖為奸事覺械繫之死獄中權貴教其家訟􅁈且誣浩㕘政劉珙白其本末上曰守臣不畏强禦豈易得耶浩始安趙汝愚餘干人淳熙初知台州有惠政嘗修郡城吕祖謙為之記後孫必愿復知台州一循其政察民疾苦撫摩凋瘵建養濟院陳瓘祠政教並舉彭仲剛永嘉人淳熙中知臨海縣有聲郡守尤袤稱其興滯起廢不擾而集朱子亦謂其保伍之役得法外意黄􅓌分寕人知台州謝良佐子孫居台者既播越流落􅓌求之民間收而教之為治先勸後禁訟牒銷縮郡稱平治為濟糶倉抵當庫葬民之棲􅀉暴露者置養濟院又創安濟坊以居病囚皆自有子本錢使不廢故葉適謂􅓌條目建置憂民如家王萬濠州人嘉熙中差知台州至郡日惟蔬飯終日坐㕔事事至立斷吏無所售往往改業散去民亦化之不復訟上下肅然郡以大治􅂊五月乞祠去許子良東陽人嘉熙中知台州弊蠧相仍逋上供錢三百餘萬子良節縮几典例所宜得者亦謝去居半載郡計裕如讞獄得情即決遣僚吏無所容其私趙景緯於潛人景定中知台州以化民成俗為先務首取陳述古論俗文書示諸邑且自為之説使民更相告諭諷誦服行約束官吏擾民五事取孝經庶人章為四言詠使朝夕歌之舉遺逸車若水林正心於朝旌孝行作訓孝文以勵其俗平重刑懲譁訐治豪横建黄巖縣杜倉六十有六浚河道九十里築隄路三十里節浮費為下戸代輸秋苗奏蠲五邑坊河渡錢胡居仁永康人淳祐中以進士知台州文章政事冠絶一時元胡長孺婺州永康人至大元年轉寕海縣主簿大德末浙東大祲宣慰同知托和齊議行賑荒斂富人錢一百五十萬給之以餘錢二十五萬屬長孺藏乃行旁州長孺悉散於民托和齊雖怒不敢問縣有銅巖惡少年狙伺其間恒出鈔道為過客患官不能禁長孺偽衣商人服令蒼頭􅀒貨以從隂武騶卒十人躡其後長孺至巖中人突出騶卒俄集皆成擒其行事多􅀋此托和齊舊作脱歡察今改正黄溍義烏人延祐中授寕海縣丞地瀕鹽場亭户恃其不統於有司肆毒害民編户􅊢曹司及財賦府者亦謂各有所憑横􅁀尤甚溍皆痛繩以法民有後母殺其父反誣民所為獄將成溍變衣冠隂察之卒直其􅁈惡少年名在盜籍者謀為刼奪未行邑大姓執之初無􅀗財左驗事久不決溍為之疏剔以其獄上論之如本條免死者十餘人伊埒布哈􅀩古人元統中授台州路錄事司達嚕噶齊縣未有學乃首建孔子廟延儒士為之師以教後進伊埒布哈舊作月魯不花達嚕噶齊舊作達嚕花赤今俱改正白景亮南陽人為衢州路總管善政具舉部使者上其事時詔褒美賜以宫錦改授台州路總管卒於官台哈布哈􅀩古人至正十一年遷台州路達嚕噶齊十二年方國珍復入海以叛台哈布哈自分以死報國發兵扼黄巖之澄江國珍以小舸二百突海門犯馬鞍諸山台哈布哈率衆搏賊船射死五人賊躍入船復斫死二人賊羣至欲抱持台哈布哈瞋目叱之起奪賊刀又殺二人賊攢搠刺之中頸死猶植立不仆投其屍海中僮名抱琴及臨海尉李輔德千戸徹辰義士張君璧皆死之後追封台哈布哈魏國公諡忠介立廟台州台哈布哈達嚕噶齊譯俱見前徹辰舊作赤盞今改正趙琬甘陵人台州路總管至正二十七年方國瑛以舟挾琬至黄巖琬潛登白龍嶴舍於民家絶粒不食人勸之食輒瞑目却之七日而死明王士宏潞州人洪武初知寕海縣靖海侯呉楨奉命收方國珍故卒無賴子誣引平民台温明三州騷然士宏條上封事辭極懇切詔罷之諸境以安芮麟宣城人洪武中知台州府明於政體嘗詿誤被逮父老泣送郊外多遺之金却不受王謙南昌人洪武中臨海縣丞勸學課農愛民如子迄去行李蕭然父老追贈不受一錢魏澤漂水人建文三年由刑部尚書謫寕海典史永樂初逮捕方孝孺族黨澤力保持其遺􅀌藏匿之孝孺得有後康彦民泰和人知天台縣著名績永樂初罷歸洪熙元年御史巡按至縣民二百餘人言彦民廉公有為乞還之天台慰民望御史以聞宣宗歎曰彦民去天台二十餘年民猶思之其善政可知乃用為江寕縣丞阮勤交趾人天順中為台州知府清慎有惠政賜誥旌異􅀽道吉水人成化中為太平知縣時以海倉糧腐責償於民道力阻得寢有賊殺捕盜官幾激變道亟至詔諭之其豪民武斷者一置之法治汙浦閘以興水利􅀊大欀樂清民願屬乃奏請割六都隸焉後以憂去行李蕭然民祠祀之顧璘上元人宏治中知台州府爲政持大體雖官冗不廢學盧英重慶人正德初由黄巖調太平知縣居官清約均徭役尤慎於治獄催科立程限不假箠楚獨嚴於吏胥及􅀔要之家不少貸一境肅然羅僑吉水人嘉靖初知台州府建忠節祠祀方李孺延布衣張尺詢民間疾苦􅀊時巡行阡陌課農桑講明冠婚喪祭禮境内大治周志偉江西人嘉靖中知台州府政務德化有大姓爭田搆訟志偉親往按視開示大義於是感泣相讓譚綸宜黄人嘉靖中知台州府性沉毅知兵時東南苦倭患綸練千人自衡倭犯柵浦將兵擊之三戰三捷倭復由松門澶湖掠旁六縣進圍台州不克而去其黨寇仙居臨海綸擒斬殆盡進海道副使益募浙東良家子教之而盡罷客兵倭自象山突台州綸與戚繼光連破之武暐嘉靖中知台州府事時倭入黄巖暐挺身率兵至釣魚嶺力戰遇害建愍忠祠於巾子山祀之毛衢呉江人嘉靖中知太平縣革市豪包攬徭役弊毁横湖堂滛祠火其神民患乃息飭游儌捕盜賊知名者悉瘐死獄中偷黨遂散周思稷麻城人隆慶中知臨海縣清田畝正􅆠界刋税籍宿弊盡洗又奉檄履畝仙居汰消耗革詭冒減圖一十有五奸猾束手周孔教臨川人萬厯中知臨海縣治先教養事無累民初令所需器具辦自坊長舖户一切革去公暇與諸生講學士習丕變李天秩雲南人崇禎中授台州府推官廉積猾巨蠧立置之法案牘填委頃刻決裁前後御史上治行第一去之日單騎襆被鬻書史以自供百姓環泣者數千人本朝李士宏磁州人順治五年授台州推官性廉介執法不少狥時台初定鎮將縱恣士宏一繩以法城鄉之人始􅀗帖席仙居防將趙德捍而􅃛隂令所俘盜牽連平民士宏以巡撫檄蒞仙居趙不敢恣民咸相告曰李公生我及去任出郊士民擁還不得行者累月徐化成昌平州人順治八年知台州府寛徵省役與民休息鄭之文休寕人任台巡道中軍馬信叛陷城之文為所執不屈被害事聞賜􅄻一子劉登科奉天人順治十三年知黄巖縣明年海寇陷城脅降不從繫入舟終不屈賊縛投三江水中士民哀之閻福玉安邱人任黄巖左營遊擊康熙五十一年出防海與賊遇於牛頭門力戰死事聞贈副將􅄻一子人物三國呉虞翔章安人官鄱陽太守朱育稱其立言燦盛與御史中丞句章任爽各馳文檄蔚若春榮晉任旭字次龍章安人立操清修不染流俗舉孝廉除郎中固辭歸永康初惠帝博求清節之士太守仇馥薦旭辭疾不行陳敏作逆江東名豪並見羈縶惟旭與賀循守死不囘敏卒不能屈元明二帝屢徵不至唐項斯字子遷寕海人㑹昌中進士官終丹徒尉以詩名宋郭琮黄巖人幼喪父事母極恭順娶妻有子移居母室凡母所欲必親奉之居常不過中食絶飲酒茹葷者三十年以祈母夀母年百􅀊至道三年詔旌其門除其徭役杜誼字漢臣黄巖人事父母至孝繼喪父母號慟晝夜不絶卜葬徒跣􅀒土為墳遂茇舍墓旁終喪雖虎狼交於側誼泰然無所畏明年呉越大水民居廬墓田産漂壞甚衆而獨不及誼邑人狀其事以聞詔嘉奬以祖垂象􅄻官至贊善大夫嘗知永城縣父老稱其政為不可及後通判梓州卒子揆纔十六􅀊哭墓旁卒楊蟠字公濟章安人慶厯進士為密和二州推官歐陽修稱其詩蘇軾知杭州蟠通判州事與軾倡酬居多平生為詩數千篇後知夀州卒陳貽範字伯模臨海人治平進士厯處州通判遊胡瑗之門又師事陳襄與徐中行羅適為台學源流之首徐中行字德臣臨海人至京師范純仁薦於司馬光光謂神清氣和可與進道得胡瑗所授經熟讀精思踰年乃歸葺小室竟日危坐父死跣足廬墓躬耕養母晚年教授學者崇寕中郡守李諤以八行薦時章蔡竊國柄竄逐善􅀋且盡中行去之黄巖陳瓘謫台州聞名納交謂與山陽徐積齊名呼為八行先生子三庭槐庭蘭庭筠皆有父風羅適字正之寕海人治平進士厯知五縣官至京西北路提􅀧刑獄慷慨建白務恤民隱嘗與蘇軾論水利凡興復者五十有五秩滿去民為置祠徐庭筠字季節中行季子童丱有志行事父兄孝友天至居喪毁甚既免喪猶不忍娶者十餘年其學以誠敬為主居無惰容喜無戲言不事緣飾不苟臧否聞人片善記其姓名遇飢凍者推食解衣不靳一日端坐瞑目而逝年八十五鄉人以其父子俱隱遁稱之曰二徐先生江仲明台州人宣和寇亂載老母逃山澗中猝過寇於東城之岡逼使就降仲明義不辱奮起罵賊卒死之丞相吕頤浩誄以文蔣煜仙居人有文學寇欲妻以女煜絶之脅以拜亦不從寇曰吾戮汝矣煜伸頸就刄詈聲不絶而死陳公輔字國佐臨海人政和三年上舍及第調平江府教授累遷祕書郎擢右司諫論蔡京父子懷奸誤國又奏朱勔罪惡時有指為李綱黨者因辭位復陳三事觸時宰遂斥監全州税紹興六年召為吏部員外郎疏言今日公卿大夫無氣節忠義皆由王安石學術壞之復授左司諫言中興之治在以孝感天以誠得民帝嘉其深得諫臣體令尚書省寫圖進覽公輔益罄忠鯁乞増輪對官有詔將駐蹕建康上書陳攻守之策以徽猷閣待制卒贈大中大夫公輔論事剴切疾惡如仇有文集二十卷奏議十二卷呉芾字明可仙居人舉進士第遷祕書正字與秦檜舊故及檜專政芾退然如未嘗識檜風言者論罷後以何溥薦除監察御史勸高宗痛自悔咎延羣臣陳闕失上韙其言兩淮戰不利廷臣爭陳退避計芾言今日之事有進無退因勸親征上至建康芾請遂跓蹕以繫中原之望上終不能用孝宗即位累遷禮部侍郎以剛直見忌出外前後守六郡各因其俗為寛猛吏莫容奸人懷惠利以龍圖閣直學士致仕芾為文豪健俊整有表奏文集數十卷諡康肅陳良翰字􅀖彦臨海人為文恢博有氣舉紹興五年進士遷監察御史孝宗初金主求和良翰應詔言議和納降俱非是必定計自治而和不和聽之又論時議捨淮防江之謬金移書求故疆湯思退主遣盧仲賢良翰爭之不聽仲賢至汴果許金疆土􅀊幣良翰言秦檜復見今日因極論思退姦邪悞國宜罷黜上曰朕愛思退警敏卿其置之良翰對警敏二字􅂲非卜相之法遂罷言職會金敗盟思退罷召爲兵部侍郎除方誎議大夫陳蜀漢荆襄進取大計除敷文閣直學士卒諡獻肅陳騤字叔進臨海人紹興二十四年試春官第一累官太子諭德時命太子尹臨安騤諫止之光宗受禪召試吏部侍郎紹熙二年詔陳時政得失騤疏三十條皆切時病遷㕘知政事光宗以疾不朝重華宫騤三入奏上感悟寕宗即位知樞密院事慶元二年知婺州告老授觀文殿學士提舉洞霄宫卒贈少傅謚文簡謝深甫字子肅臨海人乾道進士調嵊縣尉以薦爲浙漕考官一時士望皆與選中江東大旱擢提舉常平講行救荒條目所全活一百六十餘萬人紹熙改元遷起居郎兼權給事中遷黜多所諫止每禁庭燕私左右有希恩澤者上必曰恐謝給事有不可耳寕宗即位累遷知樞密院事拜右丞相封魯國公深甫爲相守法度惜名器能扶持朱子蔡元定正學拜少傅致仕卒諡惠正趙師淵字幾道宋宗室黄巖人乾道進士從朱子遊厯寕海軍推官趙汝愚薦授職事官汝愚去國遂東歸益究所學官至太常丞弟師夏師雍皆朱門高弟商飛卿字翬仲臨海人淳熙進士累官工部郎官時韓􅇑胄柄國飛卿未嘗一造請踰月即丐去後擢監察御史以言事忤􅇑胄罷為奉常改司農卿總領江淮軍馬錢糧飛卿以身率儉節縮浮苛糧餉稍裕開熹中擢户部侍郎王居安字資道黄巖人淳熙進士遷著作郎兼權考功郎官誅韓􅇑胄居安實贊其決翼日擢右司諫首論􅇑胄姦逆顯著當肆諸市朝以謝天下陳自强奸險附麗罪同􅇑胄又劾郭倪郭僎竄嶺表天下快之遷起居郎兼崇政殿説書以忤權要去厯知隆興府討平羣盜復召為工部侍郎理宗即位以龍圖閣直學士知福州卒贈少保居安宅心公明待物不貳有方岩集行世杜範字成之黄巖人嘉定初進士拜監察御史奏權臣所用臺諫必其私人是以紀綱蕩然風俗大敗因率台臺論鄭清之詐謀罔上凡侍從近臣之不合時望監司郡守之貪暴者皆以次論斥清之愈忌改太常少卿累拜殿中侍御史極言臺諫失職之弊時襄蜀俱壊江陵􅀌危兩浙震恐復言清之横起邊釁并李鳴復等以賄交結帝未即行遂渡江歸淳祐二年擢同簽書樞密院事拜右丞相上五事繼上十二事盡革舊弊卒贈少傅諡清獻賈涉字濟川台州人父偉嘗守開江極論武興守呉挺之横陛對又乞裁抑郭棣郭杲兵權孝宗嘉納涉幼好讀古書慷慨有大志以父任高郵尉厯准東提􅀧刑獄兼楚州節制本路京東忠義人兵分遣陳孝忠等屢破金人又遣李全取海州復取密濰收登萊兼畧濟沂餘州相繼請降擢制置副使兼京東河北節制金人來犯屢擊敗之卒贈龍圖閣學士光祿大夫陳耆卿字夀老臨海人嘉定進士官至國子監司業葉適嘗稱其文著赤城志同郡林表民博物洽聞同修赤城志又自為續志三卷葉夢鼎字鎮之寕海人以上舍試入優等釋褐授信州推官淳祐中厯知􅀽吉贑三州隆興建寕府皆有善政累遷吏部尚書簽書樞密院事咸寕三年拜特進右丞相兼樞密使與賈似道不合引疾辭歸舒岳祥字舜侯寕海人寶祐進士以文學著名戴表元從而受業表无為東南文章大家其學得於岳祥為多胡三省字身之寕海人寶祐進士終朝奉郎為都將天與副之未幾台州陷率衆禦之遇敵於黄土嶺力戰而死元兵屠其家宗族男女死者不可勝計徐副尉失其名天台人率衆拒元兵於關嶺宋主得浮海去元兵抵台闔門皆遇害獨乳媪哺其所乳兒􅀉居王氏家得存三傳生善述人謂忠節之報黄超然字立道黄巖州人從王柏遊得性理之傳尤深於易著周易通義及或問發例釋􅀩等書凡三十三卷兩與鄉貢及元代宋遂絶意進取元陳孚字剛中臨海人幼讀書過目不忘至元中署上蔡書院山長調國史院編修官攝禮部郎中副梁曽使安南至則詰世子日燇不庭之罪且責其當出郊迎詔講新朝尚右之禮往復三書宣布天子威徳辭直氣壯其所贈悉却之使還除翰林待制帝方欲置之要地廷臣忌之厯台州路總管府治中大德七年州旱民飢道殣相望托歡徹爾怙勢立威不恤民隱孚詣宣撫使愬其不法蠧民事一十九條按實坐罪命有司亟發倉賑飢民賴以全活孚亦以此致疾卒於家托歡徹爾舊作脱歡察兒今改正周仁榮字本心臨海人父敬孫宋太學生初金華王柏以朱子之學主台之上蔡書院敬孫與同郡楊珏陳天瑞車若水黄超然朱致中薛松年師事之受性理之㫖敬孫嘗著易象占尚書􅀘遺春秋􅀋例仁榮承其家學又師珏天瑞治易禮春秋而工為文章用薦署美化書院山長泰定初召拜國子博士厯集賢待制弟仔肩字本道延祐進士終奉議大夫惠州路總管府判官與其兄俱以文學名孟夢恂字長文黄巖人與周仁榮同師事楊珏陳天瑞夢恂講解經㫖體認精切務見行事四方從遊者皆服焉以薦署本郡學錄至正十三年以設策禦寇救鄉郡有功授常州路宜興州判官未受命卒賜諡曰康靖先生所著有性理本㫖四書辨疑漢唐㑹要七政疑解及筆海雜錄五十卷張惟賢字允德仙居人猿臂善射能挽十石弓至正中薦授南漳監鎮累勲擢武德將軍進侯爵與明兵戰蘭溪被􅀗將就刑劉基􅂆勿殺義士因戍武林不食七日而死柯九思字敬仲仙居人工詩善繪仕至奎章閣學士明陶凱字中立臨海人博學善屬文尤工詩領至正鄉薦除永豐教諭不就洪武初徵收元史授翰林應奉擢禮部尚書與崔亮等酌定諸禮儀時初舉制科令定科舉式頒於天下明年為㑹試主考得人之盛自此始凡詔今封冊歌頌碑碣多命凱屬草復請紀載時政從之出為湖廣參政以晉王府右相致仕後以事被殺葉兑字良仲寕海人以經濟自􅀒尤精天文地理卜筮之學元末知天運有歸以布衣獻書太祖列一綱三目言天下大計時太祖已定寕越規取張士誠方國珍而李察罕兵􅀔甚盛發使至金陵招太祖故兑書於三者籌之特詳太祖奇其言欲留用之力辭賜銀幣襲衣以歸後數􅀊削平天下規模次第畧如兑言方克勤字去矜寕海人洪武四年擢濟寕知府治以德化為本不喜近名視事三年户口増數倍自奉簡素一布袍十年不易士大夫被逮過郡者輒賙恤之八年入朝太祖嘉其績賜宴遣還尋為屬吏所誣謫江浦復以空印事逮死子孝聞十三喪母蔬食終制陶宗儀字九成黄巖人少試有司一不中即棄去務古學無所不窺工詩文尤刻志字學習舅氏趙雍篆法甚精家貧教授自給洪武初累徵不就常客松江躬親稼穡暇則休於樹隂有所得摘葉書之貯一破盎十年積盎以十數一日發而錄之得三十卷名輟耕錄又葺説郛書史㑹要四書備遺傳於世徐一夔字大章天台人工文洪武二年詔纂修禮書一夔與焉明年書成將續修元史王禕為總裁官以一䕫薦一夔遺書論史宜置日厯甚詳核以疾辭不至未幾用薦教授杭州召修大明日厯書成將授翰林院官又以足疾辭賜文綺遣還朱右字伯賢臨海人元末屢舉不就洪武初宋濂薦修元史史成辭歸以徵修日厯寶訓授翰林編修遷晉府右長史卒於官陳圭黄巖人洪武時父叔宏為仇所訐當死圭詣闕上章曰臣為子不能諫父致陷不義罪當死乞原父使自新帝大喜曰不謂今日有此孝子宜救其父以風勵天下刑部尚書開濟奏不宜屈法乃聽圭代而戍其父雲南葉伯臣字居升寕海人以國子生授平遥訓導洪武九年因災異上書凡數千言曰分封太侈曰用刑太繁曰求治太速帝覽書大怒命繫刑部瘐死獄中福王時追贈御史諡忠愍郭濬字士淵寕海人伉爽不羣師事宋濂與方孝孺為友洪武九年以諸生貢太學應詔上書論當時急務甚切召對忤㫖令學於太學同學嫉之與學官語不合誣奏抵罪以死鄭士利字好義寕海人兄士元剛直有才學由進士授懷慶府同知擢湖廣按察司僉事屢觸權貴怒洪武九年考校錢穀冊書空印事覺凡主印者論死佐貳以下搒一百戍逺方臺吏因陷士元遂繫獄帝方盛怒莫敢諫㑹星變求言士利方欲上書既而讀詔有假公言私者罪恐禍及兄待士元免死出乃為書數千言言數事而於空印事最詳且言陛下奈何以不足罪之罪而壞足用之材帝覽書大怒下丞相御史雜問士利辭不屈與士元皆輸作江浦而竟殺空印者朱煦仙居人善事父母父季用為福州知府洪武十八年詔盡逮天下積􅀊官吏為民害者赴京師築城季用居官僅五月亦被逮病不能堪時訴枉令嚴至有抵極刑者煦奮曰訴不訴等死耳萬一父緣訴􅀗免即戮死無恨即具狀叩閽太祖悲其意立赦季用復其官同時以例復官者十四人同時危貞昉字孟陽臨海諸生父孝先洪武中進士官陵川丞坐法輸作江浦貞昉詣闕上疏言父筋力向衰而大母年踰九十願代父俾父􅀗歸養太祖惻然從之貞昉即解儒服雜衆傭力作體弱不勝勞閲七月病卒方孝孺字希直一字希古克勤子幼警敏讀書日盈寸師事宋濂濂及門知名士盡出其下恒以明王道致太平為己任洪武二十五年以薦召見上顧皇孫曰此端士當老其才以輔汝除漢中府教授蜀獻王聘為世子師名其廬曰正學建文即位召入為翰林文學博士侍經筵一時詔命皆出其手燕王入召使草詔孝孺衰絰至號哭徹殿陛燕王降榻勞之顧左右授筆札曰詔非先生草不可孝孺大書數字擲筆於地曰死即死耳詔不可草遂磔於市弟孝友同就戮妻鄭二子中憲中愈先自經死二女投秦淮河死福王時贈太師諡文正妻諡貞愍孝友贈翰林待詔本朝乾隆四十一年賜孝孺諡曰忠文所著有侯成集希古堂稿學者稱正學先生盧原質字希魯寕海人方孝孺姑子也洪武中廷對第二授編修厯官太常少卿建文持屢有建白燕兵至不屈被殺弟原朴等皆死福王時贈原質禮部尚書諡節愍本朝乾隆四十一年賜諡節愍王叔英字原采黄巖人洪武中與楊大中葉見泰方孝孺林右並徵至叔英固辭還鄉二十年以薦為仙居訓導遷漢陽知縣多惠政建文時召為翰林修撰上資治八策帝嘉納之燕兵至淮奉詔募兵廣德已知事不可為沐浴具衣冠書絶命詞自經成祖既登極陳瑛簿錄其家妻金氏巳自經二女下錦衣獄赴井死嘉靖中建忠節祠并祀其妻及二女福王時贈禮部侍郎諡文忠本朝乾隆四十一年賜諡忠愍林右字公輔臨海人洪武中為中書舍人與方孝孺友善嘗奉璽書行邊有功進春坊大學士命輔導皇太孫以事謫中都教授棄官歸聞孝孺死為位􅂘於家成祖召之不至械至京猶欲官之不屈成祖怒劓之死福王時贈禮部尚書謚貞穆鄭華字思孝臨海人洪武進士授行人奉使有聲坐詿誤貶東平州吏目燕兵至州長貳盡棄城走華謂妻蕭曰吾義必死蕭泣曰君不􅀒國妾敢􅀒君華曰足矣率吏民憑城固守力疾戰城破不食五日死福王時贈太僕少卿諡貞莊一年本朝乾隆四十賜諡節愍盧迴字士恭仙居人洪武中以貢入太學累官户部侍郎燕兵起與郎任主抗禦策京師陷抗節不屈死本朝乾隆四十一年賜諡節愍鄭恕字本忠仙居人好古博雅洪武中由昌國縣訓導知蕭縣甚得民心建文四年燕將王聰破蕭不屈死二女亦死之子濂湜謫北平福王時諡惠節本朝乾隆四十一年賜諡節愍林嘉猷初名昇以字行寕海人與鄭公智師方孝孺孝孺喜曰匡我者二子也洪武中以儒士校文四川建文初入史館為編修尋遷陜西僉事燕王稱帝坐方黨被逮死福王時贈太僕卿諡穆愍一年本朝乾隆四十賜諡節愍鄭公智字叔貞寕海人為方孝孺所知薦於蜀三王甚禮之建文時以賢良舉為御史持法不阿後坐方黨誅本朝乾隆四十一年賜諡節愍葉惠仲臨海人與兄夷仲並有文名建文初以知縣充史館官修太祖實錄遷南昌知府永樂元年坐書靖難事事多指斥論死籍其家福王時贈太僕少卿徐宗實名垕以字行黄巖人少頴悟力學洪武中薦授銅陵簿請告迎養忤帝意謫戍淮隂驛帝遷駙馬都尉東川侯胡海子觀在選中擇師難其人以命宗實中使置駙馬位南向而布衣席東向宗實手引駙馬位使下然後為講説左右大驚帝聞而嘉之洪武末通判蘇州有忠政建文二年超擢兵部右侍郎奉使兩淮燕事急使兩浙招義勇成祖立乞骸骨歸踰二年坐事逮至京卒於道東湖樵夫不知其姓名樵臨海之東湖日􅀒薪入市口不二價靖難之變閔記書至慟哭投湖水死又天台東鄉野老無姓氏不知其從來永樂改元詔至亟走山中倚樹哭踰晝夜不食死本朝乾隆四十一年賜入祀忠義祠石允常字恒德寕海人洪武進士陞河南僉事有清操永樂初謫戍歸過金陵舊宫慟哭不食而卒顧碩字景蕃仙居人洪武中以通經儒士累官吏部主事成祖立召之不赴為富家牧牛嘗作牧牛行四顧無人輒慷慨悲歌人不知其為碩也後過赦歸徐善述字好古天台人洪武中貢入太學授桂陽州學正永樂初簡宫僚為春坊司直郎見重皇太子每作詩輒令指摘數遏乃定時賜書翰遷左贊善太子每稱爲先生坐累死仁宗即位贈太子少保諡文肅命立祠墓側春秋祀之陳璲字廷嘉臨海人永樂中鄉會試皆第一殿試問禮樂刑政璲爲推原其本且極言靖難師起骨月之間不無慚德誅戮黄子澄方孝孺等其如禮樂刑政何帝不之罪授庶吉士預修五經大全諸書乞休薦起督學江西致仕魯穆字希文天台人永樂進士有清採除御史仁宗監國屢上封事漢王宫奄將校不法莫敢言穆上章劾之不報然直聲振朝廷遷福建僉事理􅁈獄摧豪强民間呼魯鐵面正統初擢右僉都御史奉命捕蝗還以疾卒尚書呉中爲治棺衾乃克殯子崇志登進士授給事中厯應天府尹廉直有父風章樸字原質寕海人與弟宗簡字原佳俱登永樂中進士改庶吉士後以收藏方孝孺文集爲楊善所搆被逮宗簡願以身代並逮之樸言孝孺効忠􅀩戮其文章明先王之道不宜深罪帝益怒駢戮於市樸妻金氏不踰月以哀傷卒陳員韜字從周臨海人宣德進士擢御史出按四川黜貪奬廉雪死囚四十餘人正統末大軍征鄧茂七往撫其民釋被誣為賊者千餘家都指揮蔣貴要所部賄都督范雄病不能治軍皆劾罷之擢廣東右㕘政遷福建右布政使閩越當寇亂後皆撫循備至得士民心員韜持操甚潔而量能容物人謂員韜德性四時皆備云范理字道濟天台人宣德進士知江陵縣以卓異聞楊溥薦知德安府又以最遷福建布政使栘貴州左布政擢南京工部侍郎請鬻蘆場新葦及内庫舊貯布帛葺造郊廟宫殿内外諸署城樓街表并戰船食器皆以次成而民不知又奏省饋糧米􅀊萬石備賑貸從之轉南吏部侍郎以疾卒子絪由進士知濱州王恕奏治行第一齊汪字源澄天台人正統進士累官車駕郎中土木之變汪扈駕不去遂死之林鶚字一鶚太平人景泰中進士授御史英宗復辟出知鎮江革弊舉廢治甚有聲居五年以才任治劇調蘇州成化初超遷江西按察使厯左右布政使􅀊飢奏減民柤十五萬石擢刑部右侍郎執法不撓十二年疾卒鶚交遊不苟對妻子無惰容公餘輒危坐讀書事生母孝謹母稍不怡必跪請得其歡乃巳殁不能具棺斂友人為經紀其喪嘉靖中贈尚書諡恭肅夏壎字宗成天台人景泰進士授御史天順初清軍江西發鎮守中官葉達恣横狀達為斂威以薦超擢廣東按察使成化初奏猺獞弗靖用兵無功由有司撫字乖方請慎選監司守令撫綏遺民帝深納其言厯遷右副都御史巡撫四川壎剛介善聽斷所至民無􅁈在蜀三年民夷畏服年未五十即求退既歸杜門養親不接賓客黄孔昭初名曜後以字行改字世顯太平人天順進士授屯田主事成化九年為文選郎中故事選郎率閉門謝客孔昭曰苟以深居絶客為高何由知天下才俊公退遇客輒延見訪以人才書之於冊除官以其才高下配地繁簡由是銓序平允其以私干者悉拒之累遷南京工部右侍郎奉詔薦舉方面以知府樊瑩僉事章懋應後皆為名臣孔昭嗜學敦行為士􅀋所宗嘉靖中贈禮部尚書諡文毅孫琯字宗賢以議大禮官至禮部尚書謝鐸字鳴治太平人天順末進士改庶吉士授編修性介特力學慕古講求經世務成化九年同校勘通鑑綱目上書言時政帝不能從復條上備邊事宜與邊將之弊語皆切至進侍講直經筵遭兩喪服除以親不逮養遂不起宏治中起為南京國子祭酒尋謝病去再擢禮部右侍郎管祭酒事嚴課程杜請謁增號舍置公􅅟三十餘居其屬諸生貧者賙恤之死者請官為之殮居五年引疾歸鐸經術湛深為文章有體要性好賙恤族黨自奉則布衣蔬食卒贈禮部尚書諡文肅陳選字士賢臨海人員韜子自幼端慤寡言笑以聖賢自期天順四年會試第一授御史巡按江西盡黜貪殘吏廣寇流入贑州奏聞不待報遣兵平之憲宗初疏劾馬昻救羅倫一時憚其風采督學南畿頒禮儀於學宫令肄業作小學集註以教諸生改督河南學政汪直被命出巡都御史以下皆拜謁選獨長揖久之進按察使多所平反囹圄為空厯廣東左右布政使嚴條約革和買減泛役屢觸市舶中官韋眷怒誣以罪被徵至南昌病卒選務克己因自號克庵正德中追贈光祿卿諡恭愍龎泮字元化天台人成化進士授工科給事中宏治初御史暢亨劾中官張慶反為誣訐泮疏直之遷刑科都給事中副使楊茂元􅀍逮泮率同列疏救茂元得薄譴武罔知州劉遜以事忤岷王王劾之命錦衣逮泮率同列爭之忤㫖下詔獄尋釋停俸威寕伯王越謀起用中官蔣琮李廣有罪外戚周彧張鶴齡縱家奴殺人泮皆極論直聲甚著擢福建右㕘政厯廣西左布政使致仕本朝嘉慶十二年賜祀鄉賢祠王純字宏文仙居人成化中進士為工部主事會詔罷南京兵部尚書王恕官純抗章言不宜罷杖之闕下貶思南推官宏治中累遷湖廣提學命事夏鍭字德樹壎之子成化進士宏治四年謁選入都上章請復主事李文祥庶吉士鄒智御史湯鼐等官罷輔臣劉吉位忤㫖下詔獄既釋歸久之始赴選除南京大理評事疏論賦斂徭役馬政鹽課及宗藩戚里侵漁之狀帝不省鍭素無宦情服官僅􅀊餘念母老乞歸侍養家居三十餘年竜不復起王爌字存納黄巖人宏治進士正德時屢遷刑科都給事中武定侯郭勛鎮兩廣行事乖謬奉詔自陳多強辨爌等駮之都察院彭澤復奏不錄爌言爌并劾澤御史林有年直言下獄浙江僉事韓􅀖奇忤中官被逮爌皆論救車駕幸大同久不返爌力請囘鑾俄以論救彭澤忤王瓊調惠州推官嘉靖中累擢南京右都御史以忤夏言謝病歸爌嘗與御史潘壯不相能壯坐大獄詔爌提問爌力白壯罪至忤㫖人以此稱爌長者卒贈工部尚書戴德孺字子良臨海人宏治末進士厯工部員外郎監蕪湖税有清名再遷臨江知府宸濠反遣使收府印德孺斬之誓死守旋與王守仁共滅宸濠以憂去世宗以德孺馭軍最整獨増三秩為雲南右布政使舟次徐州覆水死後贈光祿寺卿予一子官余寛字仲栗臨海人正德進士厯文選司郎中世宗時爭興獻大禮下詔獄戍海南隆慶初贈大理寺卿應良字原忠仙居人父昌字克盛少􅀌事母極孝仕分宜尉良正德中進士改庶吉士授編修王守仁在吏部良學焉親老歸養講學山中者將十年世宗朝以薦起伏闕爭大禮忤㫖廷杖張􅋛黜之為山西副使謝病歸卒王宗沭字新甫臨海人嘉靖進士授刑部主事厯江西提學副使修白鹿洞書院引諸生講習其中隆慶中擢拜右副都御史總督漕運兼巡撫鳳陽極陳運軍之苦請㫖優䘏又以河決無常運道終梗欲復海運因條上便宜七事徐邳俗悍多奸鹽徒出没六安霍山礦賊竊發宗沭奏設守將又召豪俠巨室充義勇責令捕盜後多有功進刑部左侍郎罷歸卒贈尚書天啟初追諡襄裕子士崧士琦士昌皆進士士琦官至右副都御史巡撫大同士昌官至右僉都御史巡撫福建並有名於時曾銑字子重本江都人世居黄巖嘉靖中舉進士授御史巡撫遼東值兵變銑擒斬首惡事遂定厯右金都御史巡撫山東再撫山西二十五年以兵部侍郎總督陜西三邊軍務銑有膽畧長於用兵又感帝知遇圖報稱念寇居河套久為中國患遂上疏請搗其巢條八議以進已又獻營陣八圖並優㫖下廷議嚴嵩言銑開邊釁遂逮銑嵩又使仇鸞訐銑斬於市妻子流二千里銑廉既没家無餘貲天下􅁈之隆慶初贈兵部尚書諡襄敏呉時來字惟修仙居人嘉靖進士授松江推官攝府事以禦倭功擢刑科給事中劾罷嚴嵩私人兵部尚書許論宣大總督楊順巡按御史路楷嵩疾之甚出使琉球將行復劾嵩父子招權不法嵩怒密奏陷之下詔獄遣戍横州隆慶初召為工科條上治河事宜又薦譚綸俞大猷戚繼光宜用之薊鎮皆從之累擢南京右僉都御史遷廣東巡撫旋罷歸萬厯十二年始起湖廣副使終左都御史王士性字恒叔宗沭從子萬厯進士由􅃀山知縣徵授禮科給事中首陳天下大計言朝廷要務二官司要務三兵戎要務四疏凡數千言深切時弊多議行劾揚巍阿輔臣申時行時行納巍邪媚皆失大臣誼又請召還沈思孝呉中行等十六人忤㫖不報遷吏科出為四川㕘議厯鴻臚寺卿卒盧明諏字君教黄巖人萬厯進士授太常博士釐正郊廟大祀典章擢給事中倭警上六事時内侍頓隆犯罪尋見原雲南􅀊進礦金初議量減尋復故明諏并疏㕘駮忤中官又疏請召還直臣張棟等又請起用閣臣王家屏尚書沈鯉員外郎鄒元標時家屏方建言忤㫖㑹枚卜吏部首列家屏名顧憲成坐謫明諏復疏救之帝怒削籍歸呉執御字朗公黄巖人天啟初進士除濟南推官德州建魏忠賢祠獨不赴崇禎三年徵授刑科給事中言理財先保民請蠲畿輔加沠及捐助搜括宜速罷帝切責之已劾吏部尚書王永光專務比匪亦不納俄因風霾陳謹邊防擇守令二事報聞後劾首輔周延儒攬􅅦為奸利忤㫖執政復從中搆之下詔獄釋歸其學以立誠為本立朝更著風節卒於家應昌士字君安仙居人崇禎中特賜進士授安定如縣流賊破潼關城陷被執不屈賊先殺具妻女以脅之終不屈偽帥釋其縛盛具延上座從容勸降昌士舉杯擊偽帥首遂􅀍害一年本朝乾隆四十賜諡節愍陳函輝原名煒字本叔臨海人崇禎進士授靖江知縣罷官歸聞李自成陷京師慟􅂘刑牲誓衆倡義師㑹福王不許草澤勤王乃已尋起職方主事江北事敗擁戴魯王為禮部侍郎王自台航海函輝從之已而相失哭入雲峯山作絶命詞投水死一年本朝乾隆四十賜諡忠節本朝許鴻儒字象垣太平人順治初以貢選知羅城縣縣為土司叛據鴻儒隨征數年始得至俄桂林失守􅀌立無援城陷被執不屈死子弟死者五人贈廣西按察司僉事賜祭葬􅄻一子入監余煜臨海人有膽氣康熙甲寅耿精忠遣曽養性犯台時寕海將軍募敢言之士往撫煜毅然請往縋城說賊責以大義賊怒脅之降不屈死洪若臯字叔敘臨海人順治乙未進士授户部主事厯福寕道僉事丁艱後遂杜門不出性嗜學林居三十年手不停披所著有南沙文集臨海志樂府源流等書婁汝初黄巖人任寕波城守千總康熙三十六年捕賊於慈谿之陽覺殿力戰死事聞􅄻一子同縣羅洪燦乾隆間以把總隨􅁹林奭文殁於陣羅江太官定海鎮總兵嘉慶十年追􅁹蔡牽至盡山洋遭風漂殁均議䘏如例齊召南字次風天台人幼有異秉詩文援筆立就乾隆丙辰舉博學鴻詞科授檢討嘗與修經史考證通鑑綱目三編續文獻通考大清一統志諸書厯官禮部侍郎以疾乞歸掌教敷文書院十餘年人文蔚起著有水道提網後漢公卿表寶綸堂詩集李彬黄巖人乾隆五十七年旌表孝子同縣孝子李恂又天台縣孝子齊式唐李元魁並於嘉慶年間旌流寓晉江􅓉陳留圉人避蘇峻亂屏居臨海翦茅結宇耽玩載籍有終焉之志辟從事除佐著作郎並不就南北朝齊顧歡鹽官人隱於剡天台山開館受業者至百人禇伯玉錢塘人隱居剡瀑布山三十餘年宋孝建時樂詢表薦不就高宗即位手詔以禮迎遣又辭敕於剡白石山立太平館居之梁庾肩吾新野人信父隱居天台故信作哀江南賦云少徵真人天台逸民唐司馬承禎字子微洛州温人廬天台山不出則天睿宗明皇朝累召見問尋還山善草􅀠明皇嘗命以三體寫老子刋正文句卒年八十九諡貞一先生宋陳瓘沙縣人徵宗時上疏辨宣仁后誣謗及著尊堯集坐徙台州宰相且命凶人石悈知州事窘辱百端終不能害在台五年乃得自便豐稷鄞人為御史中丞以論蔡京安置台州石公弼新昌人以劾蔡京誤國謫居台州從弟公孺亦相随居台元台哈布哈世居白野山父塔布台厯任台州錄事判官遂居於台台哈布哈譯見前塔布台舊作塔列女隋杜氏二女臨海仙居人家鬻湯餅大業末女甫筓喪父母庖人挑之二女憤激殺庖人去之孟溪溪溢俱死宋夏孝女名阿九黄巖人嘉定中隨父樵於山父遇虎女號呌直前執薪鞭虎曰可食我母食我父且鞭且泣踰數十步虎棄父而啖女朱伯履妻陳氏臨海人年少夫亡有欲奪其志者痛哭引刀將自剄姑亟持之乃免事舅姑至孝淳熙中詔特封安人旌其門名所居曰節孝巷王貞婦臨海人德祐二年元兵入境舅姑與大皆遇害主將見婦美欲内之挈至嵊縣青楓嶺婦伺守者梢懈嚙指出血書字山石南望痛哭投崖下死其血漬入石間天隂雨即墳起如始書時元至治中旌曰貞婦立石祠於嶺上易其名曰清風嶺元陶宗媛臨海人儒士杜思絅妻歸杜四載而夫亡矢志守節台州被兵宗媛方居姑喪忍死䕶柩為遊軍所執迫脅之不從遂遇害其妹宗婉弟妻王淑皆赴水死任文仲妻林氏寕海人家甚貧年二十八而寡姑患風疾林旦暮扶持維謹撫育三子皆有成年一百三􅀊而卒狄恒妻徐氏天台人恒早殁徐堅志守節至正二十年鄉民為亂被賊所迫紿以渴甚欲自汲飲即投井死時年十八郭氏天台人夫為戌卒千夫長李某見其色美百計調之郭毅然莫犯夫歸具以告夫怒欲殺李李訴於縣論死獄卒葉姓者逼之有恩卒度必死乃囑妻嫁之郭曰君以我死我安能二適以求生乎歸鬻子女得錢三十緡攜之獄請夫以酬獄卒走至仙人渡水中端坐而死水極險惡其尸不衝仆事聞具棺葬之表其墓曰貞烈明符松妾真奴黄巖人松既死其妻歸母家有他志真奴泣諫妻怒捶之逼以去真奴潛歸痛哭自縊於松柩上程有德妻陳氏名貞黄巖人洪武間有德以軍士給事羽林左衛鎮撫陸林見陳美百計調脅不從遂被亂毆而死其夫訴於朝林抵罪嚴氏太平人年十六許字鄭某未嫁而夫亡鄭欲以次子接婚父母利其貲許之氏自縊死又朱四妻呉氏少寡父母欲奪其志赴水死朱渙妻楊氏臨海人夫卒其兄諷