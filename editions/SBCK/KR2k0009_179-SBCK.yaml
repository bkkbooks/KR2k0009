計退之功追襲大勝而還欲官惠惠不受楊淵海大理人為段功員外郎功有寵於梁王淵海逆知王必害功屢勸之歸大理功不聽淵海語人曰吾主無生還日矣豈能食人之食而不同其難乎明年功果為梁王所害淵海死之楊寶太和人父昇通經史以討明王珍功為木􅀖路同知寶由大理路通事從征克蔚州曹州為大理路治中後梁王段氏搆兵寶極力和解之民感其德段寳功之子梁王既害功寶雖幼恒念父讐不與梁王通王遣將士攻大理不能克後明玉珍復攻雲南梁王遣將借兵大理寶答書誚之明洪武初寶遣其叔段貞奉表歸附段文瑞事母至孝母殁哀毁廬墓以手履地􅀒土一里外閲百五十日而墳始成閉户讀書不事生業有司聞其賢辟之輒踰垣而避楊保段氏臣明洪武十五年兵入大理保遣弟名往探緩急約以明日日出為期過期不至有頃聞國破保自縊死名至亦解弓􅁌自縊國人義之合葬於宏圭山下明楊黼太和人博學多聞尤工篆籀隱居不仕號存誠道人庭前桂樹枝幹盤紏題之曰桂樓巢居其中注孝經數萬言父母殁為傭營葬葬畢入山十餘年夀八十子孫迎歸一日沐浴告子孫曰明日吾行時至果卒董寶大理人清平官成之後洪武間任順寕土經厯清慎勤敏以功遷大理土經厯麓川之役多著功績以死事諭祭楊向春號野巖雲南人為諸生棄去隱深山中究邵子先天之學所著有皇極經世心易發微格物篇等書後自稱宏道人遇袁了凡授以易學至武當不知所終趙夀趙州舉人正統間有䝉化土舍謀為土官壽懼為民患要鄉人潛赴京師奏革之一州以安鄉人德之楊禧太和人永樂中為榮經敎諭上書言時政辭甚激切上怒繫之獄旋釋拜監察御史出為慶逺守惠愛及民任滿民赴京留之復任三年民又留如初乃以叅政行府事厯十二年乞歸特加右布政使張孝子太和人失其名性至孝傭工養母母殁晝夜哀號數年不輟同縣王守陽家極貧恐分父母之養四十不娶後終父喪母强之娶生子以妻不得於姑遂去之每夜嘗三四起視衾之寒暖枕之高低母展轉必捧之以助其力人稱為篤孝趙彦趙州人宣徳中四川髙縣知縣以廉惠得民心郡守妬之削其籍後芒部作亂招撫弗聽惟曰俾趙尹來吾即降於是辟彦單騎諭之蠻果降吳讓賓川人以州治不設民無捍禦數苦㓂抄掠宏治間奮然詣臺司請置州街建城池至今民獲安堵趙弼字廷直太和人成化中進士官至太僕丞遂歸田躬親耒耜有同榜姚祥者來為監司訪諸田間去鋤而揖之姚問生事何窶曰差勝諸生時矣姚歎服而去戴仁太和人成化中知鎮遠府府有羡税四千餘金仁裁罷之亦不白於上官人問之曰暴前人之短非吾心也後為松茂兵備歸不治第館賓於門設榻於屏自號無懷先生卒之日家無餘資包文偉太和舉人成化間鄉試對策屬詞峻厲閹官以為詈已恨甚尋授呈貢教諭一日閹召而辱之文偉正色厲聲閹氣奪揖而遣之平日手不釋卷常製藥餌建橋梁利人楊士雲字從龍太和人正德中進士授庶吉士改給事中遂乞歸里居二十餘年甘貧自樂不入城府鄉人不知婚嫁禮節士雲敎之遂易奢為儉所居環堵蕭然與諸弟相友愛自少至老手不釋卷所著有皇極天文律吕詠史諸書李時太和舉人博學執禮為新建人遇友人僉事李素卒於南昌遂棄官送其櫬以歸王陽明髙其義贈以詩楊富太和舉人授黄陂訓導轉國子監學正遷夔州府通判署順慶府事妻曰年老資卑盍少取以為歸計富厲聲叱之明日遽遣妻歸為師為郡所至祀之楊南金字本重鄧川人宏治中進士授太和知縣民有三不動之謡言上官權豪財貨也擢御史與劉瑾忤拂衣歸是日即行二百里瑾聞追之不及除其籍嘉靖中起耆舊厯官江西叅政張雲鵬太和人宏治進士官大理評事時劉瑾用事内官監訟英國寺僚衆莫敢言雲鵬如法判擬不少假借瑾憾之謫湖廣寕遠縣丞瑾誅復官刑部郎中時有當事者欲釋一指揮罪雲鵬執之又謫和州同知後於九江府以功晉瀘兵備僉事屠巒雲南人正徳中授江夏知縣以忤中使調蘆山會天全蠻長攻城屠戮巒􅁹捕之俘其衆復所侵地境内以安居民感之趙汝濓字敦夫太和人嘉靖中進士為考功􅀰中主内察時趙文華在黜中冢宰以其為嚴嵩私人不可汝濓曰若文華不黜則無可黜之官矣後擢都御史諤諤有大臣節致仕家居不治産業益敦内行推俸與兄弟宗黨共之李元陽字仁甫大和人嘉靖中進士知江陰縣有政績入為御史遇事敢言巡按關中墨吏望風解綬以持正不阿尋罷歸家居四十餘年壽九十無疾而終鄒堯臣趙州人嘉靖中進士由御史厯叅藩所至皆有政績而邊功尢著趙重華太和人年七歳父廷瑞岀遊不返及長尋親之武當經太子巖巖有字曰嘉靖四十四年某月日趙廷瑞朝山至此重華且喜且慟書其後曰萬厯六年某月日趙廷瑞之子重華尋親至此後入南都厯無錫遇父於南禪寺遂奉以歸楊俊聲浪穹人㓜聘杜氏女未嫁而瞽兩姓父母咸議離婚俊聲不從竟娶歸情好甚篤後厯官平慶副使道李子明大理歳貢厯官沅州知州􅀄為鎮遠縣令有民鬻男女以償逋賦泣曰此即鬻我兒女也捐俸代償後家居講求理學敦孝弟郡人翕然師之次子選舉隆􅂟進士厯官至江西左叅議有廉改父死失明後愈亦不復出授徒講學淡泊自娱李東字震甫太和人隆慶中進士為成都知縣縣本親王湯沐地最號難治東至期月無不約束上官翕然稱之事無巨細皆委任焉厯官光祿少卿子嗣善萬厯中宛平知縣繫巨璫字小民威愛並濟有父風云黄極太和舉人萬厯間官大理評事執法不阿閹黨銜之後為工部􅀰中釐侵冒權璫益恨中以事遂乞歸布素自適張聚奎字瑞星趙州諸生州有石青硐以關地脉封閉萬厯間遣中使楊榮開採榮遣其黨張文華至極横暴士民競前毆之榮上聞遣緹騎械州守甘學書等聚奎直前曰毆文華者獨聚奎也遂併逮至京繫獄三年㑹赦得岀州人至今義之龍旌賓川人嵩明州學正萬厯間值武定阿克之變整衣􅃣罵賊而死贈國子監學政艾自修鄧川人兄自新粹於理學所著希聖錄得宋儒宗旨自修常纂其要學者咸宗之聞於朝旌曰當代賢儒何文極號近臺太和人萬厯進士知江陵縣途中遇張葢呵䘙者問之張太岳家人千户郵七也縛而杖之太岳怒勒道府揭叅文極亦籍太岳數年逋賦聞太岳不得已調之鉅鹿縣即乞歸晉户部􅀰中不起何􅀖見字北渠浪穹人萬厯間由選貢厯官無爲下邳知州其調下邳時深山窮谷偕來遮道進食卒後建祠祀之浪邑詩學自􅀖見倡之子鳴鳯官六安州知州有半留亭嵩寮集孫蔚文皆有詩名羅時鄧川人與弟鳯自綠玉池開渠導水出江尾民乃得耕人稱爲羅時江後淤蘇大宇復爲開治民甚賴之高桂枝字樹秋鄧川諸生與太和李賡龍往來唱和有畸盧草一卷如䘙軍行土軍行皆有關係朱奕文賓川人崇禎舉人以時事多故退而著書舉遺逸有司强之出抗章力辭有良禽擇木賢人擇時之語罷歸鄉入忠義祠髙拱極太和舉人沙賊破城仰天大慟曰吾家忠貞清白世受國恩不可使賊辱我先靈遂􅄟祖父木主舉火焚屋投池而死乾隆四十一年予入忠義祠妻李氏年二十八撫􅀌成立以節稱鄒良彦趙州舉人天啟間知榮經縣有惠政丁艱歸遂不出孫可望破大理屢檄起之逃壽八十五忽自書云忠於君孝於親為天地肖子仰不愧俯不怍作宇宙完人投筆而卒同州舉人熊化陸與進尹天任皆扺死不赴可望之徵尹夢符太和人沙賊攻城與尹夢旂馮大成倡義助守城破罵賊死同時貢生楊瑡諸生李褒王凝尹亮工蘇昇楊大鴻胡康李元鳳張書紳楊先芔宋應奎馬斯龍張相業等殉難者數十人而邑人李嗣淳亦抱憤投水死乾隆四十一年並予入忠義祠尹宏載太和諸生罵賊被殺妻洪氏死其側同庠陳㨗亦罵賊力戰死妻周氏苦節撫􅀌後二子為潰兵所掠其操不移趙興基太和選貢崇禎間任廬州府通判城破具衣􅃣死於城樓董焴太和舉人任臨清抽分主事遇賊不屈死於官黄翔龍雲龍州選貢官達州知州崇禎間流㓂入蜀翔龍堅守城䧟死之楊愻太和諸生端方向義沙賊破城罵賊不屈賊斫之死及甦而妻楊氏女奇璧已殉節死矣愻遂不復娶本朝杜佳印字仙阿趙州人順治十六年父為雲南清兵所執欲殺之佳印年方少號泣馬下請以身代遂殺之父獲免康熙中旌鄒應運字名世趙州人少􅀌性孝友順治間與母兄避兵相失叩天黙禱獲母處又千里尋兄歸事之盡禮母殁蔬食三年每􅀕必哀慟貧而好施鄉里咸稱之李偉雲南人少事繼母以孝聞值㓂警躬􅀒入山母疾侍奉湯藥未嘗暫離力耕色養五十年如一日龔敏趙州人少􅀌性篤孝幼時母柏氏命就學必拜母而去歸亦如之地震覆垣母被壓敏號泣以手掘地十指淋血曰母血也啖之將葬㑹賊兵至敏同妻抱棺大慟賊感動遂去逆藩重其名檄之仕堅辭不往王佐才趙州人康􅄉壬子舉人吳三桂反脅以官不受籍其家拘省城者年餘終不屈乃得釋遂奉母讀書山中王師復滇授宜良縣教諭旋乞終列女漢曼阿娜妻阿南楪榆人元封間曼阿娜為漢將郭世忠所殺欲妻南南紿之曰能從我三事乎一作幕次􅀕夫一焚故夫衣易君新衣一令國人遍知禮嫁世忠如其言聚國人張松幕置火其下阿南袖刀出令火熾盛乃焚夫衣自引刀斷喉身撲火中國人哀之每歳以是日燃炬聚㑹而弔之名為星囘節唐鄧睒詔妻慈善鄧川瞼人開元間南詔欲吞六詔為一遂因星囘節㑹宴以火滅之明日各詔妻尋夫骸不識初慈善止夫行弗聽乃以鐵釧約其臂而别及罹禍認釧得骸南詔以幣聘之善以夫葬為辭既葬堅閉其城南詔發兵圍之三月食盡端生而卒元段功女羌努一名僧努至正間功遇害努志在復讐將歸昌建阿􅀺氏出繡旗示弟寶曰我自幼聞父母􅁈不能報此旗吾手繡所以識也今歸夫家收合東兵飛檄西洱汝急引師㑹於鄯闡此其為符咏許而别羌努舊作奴今改正明王文妻奚氏太和人年十八嫁甫三月夫客死於外夫之弟欲得兄産迫之嫁氏􅊎死不從撫遺腹子幹長娶之氏拊胸嘔血而死劉繼文妻鄒氏趙州人年十六時箐賊掠白崖氏走水田中賊從崖山張弩脅之氏曰雖死不從賊也賊遂射之貫顱而死楊憲妻楊氏太和人沙賊之亂氏率媳艾氏女奇瑜孫女順貞習貞俱縊憲亦舉火自焚同時楊瑀妻楊氏媳李氏沈氏姪媳楊氏亦俱赴火死張課妻劉氏雲南人偕夫歸母家途遇賊避入蔡氏家㓂追及氏􅂲傷其夫以身捍門厲聲罵賊㓂加刃於頸氏曰可速殺我不受辱也被數創死夫得逸張氏雲南人夫姓名失傳氏被賊擄欲污之不從罵賊而死張先翼妻楊氏鄧川人年少夫卒自縊以殉因救得甦嚙指自誓守節終身又賓川州李英母辛氏夫名失傳卒時無子氏取從子英懷之禱天而乳有湩遂撫養成立楊燦妻李氏賓川人夫卒紡績養姑聞有求娶者自斷其指張奇學妻王氏賓川人為亂兵所執知不能免􅀒三歳子投井死本朝楊克勤妻董氏浪穹人賊入城掠氏欲污之不從賊殺其子氏罵不絶口賊割其乳而殺之李瑶妻楊氏太和人順治十三年沙賊圍城氏先期拜辭父母與夫城破自縊死宋之鼎母楊氏太和人之鼎為千户順治十三年沙賊圍城氏率媳段氏及孫女等共七口自焚死同時指揮鄭宗儒妻邱氏與女媳等共五口俱殉節又蘇公賦聘妻李氏名瓊貞賊至自盡楊先芔妻楊氏先芔殉難氏以節著王宗仁母楊氏太和人宗仁為百户李定國之變氏與媳及孫男女等共十口聚樓自焚死同時朱正泰妻黄氏閔祖法妻楊氏蘇公舟妻蘇氏蘇元度妻李氏趙擴基妻楊氏楊光祖妻趙氏董維岳妻閔氏均死於難陸萬頃妻楊氏趙州人順治十五年賊至氏欲避無門引刀自刎康熙間旌姚時熙妻李氏雲南人矢志不渝罵賊投井死段之嫡妻王氏賓川人賊至欲污之氏拒不從賊怒砍之斷十指而死時際明妻王氏趙州人賊兵四掠同夫避楊柳沖夫爲賊執將殺之氏出曰釋我夫我願從去賊果釋之顧夫去遠自刎死康熙間旌楊朝棟妻蘇氏趙州人年十九夫亡守節賊至避兵西莊賊逼之自刎死康熙間旌馬兆麟妻黄氏趙州人賊至恐污自縊死同時李存雅妻金氏被賊擄去躍入水死又鄒嘉顯妻董氏鄒學魯妻鄭氏張洪緒妻王氏廖偕亨妻鄭氏俱殉難死古受甲妻楊氏浪穹人未嫁夫卒氏曰身既許爲古門婦義當殉之自縊死趙應龍妻黄氏太和人年少夫亡守節六十餘年康熙間旌李應和繼妻楊氏雲南人年少夫亡撫夫前妻子成立守節終身康熙間旌同縣楊知敏妻雷氏夫病劇氏刲股救之不愈未幾子復殤姑憐其年少欲嫁之氏以剪自截其耳姑驚慟乃以姪爲嗣苦節終身楊潤妻趙氏太和人年少夫亡祖姑及翁姑俱老病生養死葬撫􅀌成立雍正間旌趙履祥妻卞氏鄧川人年少夫亡事姑以孝撫遺腹子成立與同州曾㫤妻趙氏胡大業妻侯氏倪昌賢妻鄒氏均以苦節於雍正間旌洪綱妻何氏太和人夫亡守節與同縣李崇儉妻陳氏李允敏妻朱氏均乾隆間旌馬嵩妻鄭氏趙州人嵩隸雲龍未娶卒氏聞而縊救免者再父母許歸馬後以父官粤東别議婚女聞絶食請歸骨夫墓而卒同州袁惟清繼妻失其氏夫死自縊楊爲蕃妻黄氏夫亡守節焦澄清妻戴氏鄧川人夫亡守節同州楊聯登妻段氏李士儀妻段氏均以貞節於乾隆間旌楊時中妻蕭氏浪穹人夫亡守節與同縣王廷弼妻楊氏周太望妻洪氏胡夏鼎妻楊氏均以貞節於乾隆間先後旌趙奮飛妻朱氏賓川人守正捐軀乾隆間旌李獻忠妻阮氏雲龍人沙賊肆掠氏罵賊死同州髙拱極妻李氏夫死於難氏撫􅀌成立尹遂良妻楊氏夫亡無子孝養舅姑及殁恐爲族人所奪依姊以終均於乾隆間旌董宗裔妻楊氏雲龍人夫亡守節乾隆間旌趙珣妻楊氏太和人夫亡守節與同縣楊舒青妻劉氏楊駕和妻趙氏均以節孝於嘉慶間旌石佩妻侯氏趙州人夫亡守節與同州吳君用妻劉氏王文華妻戴氏韓錫章繼妻董氏沈坤妻陽氏均以節孝於嘉慶間先後旌施安名妻李氏雲南人逆匪滋事氏與夫及子定俱遭􅃤害嘉慶間旌張繼後妻郭氏雲南人被人􅁾言自盡與同縣夫亡守節之李唐蘇妻曹氏任汝建妻邵氏陳汝讓妻李氏均於嘉慶間先後旌饒子英妻楊氏鄧川人未嫁夫亡水漿不入口者二日乘父母等往弔易縞素自縊陳祖勲妻楊氏浪穹人夫亡守節與同縣孫燕貽妻王氏楊世澤妻羊氏王訓妻施氏均於嘉慶間旌仙釋唐壽海姓周氏南詔時三年不􅀨王詣海求禱雨救民海曰昔湯旱七年以身代犧六事自責天乃雨此人君有道格天之驗今王殺及無辜天地鬱閉不知悔過何從得雨王乃悔懼誓不虐民已而果雨李成眉不詳何許人南詔時建崇聖寺眉為司廚侍者殿成詔謂衆曰三像以何為中尊眉厲聲曰中尊是我詔怒其不遜流之緬甸未幾坐化緬人荼毘􅄟之塚時有光商人以為寶啟得其骨貨之富人購以造佛像其光如故詔聞而異之遂收其像奉於崇聖寺作中尊小澄雞足山僧南詔時與二僧同住一庵澄嘗入城乞食還至庵問食於二僧二僧曰汝往乞食不裹糧来反求食耶澄遂走叩迦葉石門門訇然中開澄入二僧追至門已閉矣乃大悔恨焚身門外張子辰南詔七師之一習天竺持明法常諷詔行善勿嗜殺人詔問子辰有何功德子辰曰無騰口說當為證明端坐露地前置一鉢頃之中有水晶觀音乘雲升空而去元照本大理人嘗詣天目謁中峯將至中峯語其徒曰當有客自雲南來汝持鏡迓之本至見鏡曰師教我矣徒問故曰吾名照本師教我照見本耳徒白峯峯奇之嘗語趙孟頫曰雲南三僧皆堪􅀒荷照本其一也明無極名法天太和縣感通寺僧洪武間入覲獻白駒一山茶一太祖臨軒納之茶忽開一花太祖喜親為詩記之厚賜遣還芮道材少業儒從劉真人習棲神煉氣之術曾珍峩崀蛟除􅀩化祟宣德􅀄召見尋賜歸創棲霞觀居之後尸解土産鹽浪穹縣出􅀧蒼石出點蒼山唐李徳􅁉平泉莊醒酒石即此産也墨蘇易簡墨譜雞足山古松心燒烟為墨最佳扶留一名蔞子出㸃蒼山文選所謂東風扶留蒟醬南方草木狀蒟醬蓽茇也自然銅太和縣出甲桂陽志蠻軍惟大理國最工甲冑皆用象皮胸背各一大片如龜殻堅與鐡等工魚出洱海如鰷而鱗細長不盈尺明楊慎稱為魚魁總纂官臣顧蒓恭纂并覆輯校對官臣易長華恭校
