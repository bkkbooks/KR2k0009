  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_179-1a}
body:
  text: 雲南府名宦漢文齊廣漢人王莽時益州郡夷棟蠶等起兵因以齊為太守濬陂池通灌溉墾田二千餘頃率勵兵馬降集羣夷甚得其和及公孫述據益州齊固守拒險述拘其妻子許以封侯齊竟不降聞光武即位間道遣使自聞蜀平徴為鎮逺將軍封成義侯道卒詔起祠堂郡人立廟祀之張翕巴郡人永平中為益州太守政化清平得夷人和在郡十七年卒夷人愛慕如䘮父母蘇祈叟二百餘人賫牛羊送至翕本縣起墳􅀕祀詔書嘉美為立祠堂安帝時以翕有遺愛拜其子湍為太守夷人懽迎曰郎君儀貌􅀋我府君王追蜀郡人元和中為益州太守政化尤異有神馬四岀滇地中甘露降白烏見始興學校漸遷其俗楊竦益州從事卷夷封離等叛竦將兵至楪榆先以詔書示三郡密徴武士重其賞進軍與封離等戰大破之擒千五百人資財四千餘萬悉賞軍士封離等惶怖斬其渠帥詣竦乞降竦慰納之因奏長吏姦猾侵犯蠻夷者九十人皆減死州中諭功未及上竦病創卒刺史張喬深惜之刻石勒銘圖畫其像馮顥廣漢人順桓間爲益州太守尤多異迹李容巴郡人憙平五年諸夷叛朝議謂郡在邊外不如棄之容爲太尉掾建策聲討乃拜益州太守與刺史龎芝發板楯蠻平之景毅廣漢人李容卒後夷人復叛以毅爲太守討定之毅初到郡斛米萬錢漸以仁恩年餘減至數十云三國漢董和南郡枝江人爲益州太守清約自處與蠻夷從事務推誠心南土愛信之晉杜軫成都人武帝時除建寕令導以徳政風化大行夷夏悦服秩滿將歸羣蠻爭送餽遺一無所受去如初至毛孟爲寕州治中刺史李毅卒㑹西南夷叛孟詣京師求救不見省孟以死固陳朝廷憐之乃以王遜爲刺史與孟俱行元阿爾噶錫哩䝉古人爲晉寕州同知訪民瘼宣教化境内大治阿爾噶錫哩舊作阿羅哥里室今改正馮文舉什邡人爲雲南儒學提舉明玉珍攻城將䧟文舉謂妻曰吾受國恩有死而已汝光州馬中丞女孫也其往從乎馬曰夫以義死妾生何益焚香北面再拝共縊於學宫明趙幹平陽人洪武中知歸化縣厯嵩明州敦大不苛民夷安之張觀太原人洪武中知嵩明州簡重不擾新附之民樂其撫字鄧思謙桂陽人永樂中知祿豐縣公署橋梁驛郵市肆皆其創建在任九年以清廉著郭鎮宛平人正統中知新興州值水患鎮設醴􅀕河安流如故後知雲南府勤於職凡倉􅅒學校皆所修葺卒於官滇民祀之丁貴金壇人正統中知晉寕州勤慎有才學宫壇廟修葺一新水旱祈禱輒應民懐其徳黄守純正統中知昆明縣撫字有方以舊縣治㣣陋改作之無累閭左邵昱永寕人景泰中知晉寕州廉介愛民秩滿耆老走萬里之京乞留復任三年龎詢成化中知楊林縣愷悌宜民疏浚河渠至今利賴李必昂浦城人宏治中知祿豐縣清介自勵聽斷如神􅀊饑請蠲賦以甦民困邑人感之張昇濟陽人宏治間任昆陽州州同増學址練民兵常出私財代官租因運糧溺滇池士民哀之葉元廣信人正徳中知雲南府廉介有為不避權貴時廣西㓂師宗未靖元以督糧到州設計擒賊州境以安卒於官家無長物李綬南昌人正徳八年知昆陽州儲榖以備賑濟崇學以興士􅀋崇祀名宦譚讓華容人正徳間知昆陽州正大剛直軍民畏服崇祀名宦呉便山隂人正徳中知雲南府精於律法一切疑獄多所裁決陳陽新淦人正徳中以刑部郎中忤劉瑾左遷昆陽州同知築土城以資保障政績最著高公詔内江人正徳中以御史言事謫富民典史置館延師教民子弟風俗一變尋知大理府有惠政以遷去士民咸立廟祀之廖立仁嘉靖中為昆明縣丞􅂝一僕自隨由沅江徒行之任省約安恬後以憂去邑人裒金送之却不受呉世珣保徳人嘉靖中署嵩明州剛果嚴明安賊之叛身率鄉民禦之賊平之後撫瘡痍給牛種民以安輯龍旌大理府趙州人為嵩眀州學正嘉靖中賊楊禮等攻城旌倡義死守州吏目韋宗孝與之同心城䧟旌罵賊死宗孝闔門遇害事聞旌贈國子明縣薄徵省訟重士勸農勘覆吾必奎叛黨全活數萬黄卷鍾祥人崇禎末知呈貢縣與上官不合劾歸甲申之變望闕泣拜不食死乾隆四十一年賜諡節愍王信宜賓人崇禎中知呈貢縣土酋普名聲叛撫鎮令信為監軍敗績罵賊死夏祖訓嘉興人明末為呈貢知縣後起兵拒李定國兵敗死之乾隆四十一年賜諡節愍冷陽春石阡人明末為晉寕州知州起兵拒李定國兵敗而死乾隆四十一年賜諡烈愍本朝高顯宸灤州人康􅄉九年知雲南府吳三桂叛抗節不從􅀍杖戍永昌䘙仰藥死贈太僕卿劉崑南昌人雲南府同知不從呉逆之命被杖戍騰越事平以原官起用張筠碧武昌人康熙二十九年知雲南府建義學製學宫鐘鼔並嬰堂義塚惠績甚著張瑾南城人康熙二十九年知昆明縣􅂝一子二僕入署剖斷明決樂易不苛四載卒官民歌思之劉世熼新蔡人康􅄉己未進士四十二年知呈貢縣潔己奉公嘗自稱曰任黜我官毋虐我民人物漢許淑益州郡人元和中入中國受五經歸教授本郷三國漢爨習建寕人昭烈帝時為建伶令坐事免官太守董和以習方州大姓寢而不許丞相亮定南中以習與朱提孟炎等俱為官屬習官領軍炎官輔漢將軍唐王仁求安寕人河東刺史平賦化民漢夷悦服子善寶以雲麾將軍持節河東諸軍事有治績元楊立義中􅂟人任騰衝同知事親至孝親殁負土成墳詔旌表王昇中慶人由學政累官曲靖府宣慰使文章政事著聲南土張景雲字天祥中慶人優於理學能文章授登仕郎明段澍昆明人洪武中進士事親至孝以御史就養改姚安府教授蘭茂字廷秀楊林人潛心理道淹通經史術數之學靡不窮究後尚書王驥征麓川茂佐以方畧遂成功所著有元壺集鑑例折衷經史餘論諸書行世李葆昆明人洪武間以軍功授前衞千户永樂間征交阯矢石俱盡挺戈刺賊大呼報國䧟陣死施均裕安寕人永樂中貢入成均成祖面試奇之授大理評事改交趾御史按部一十七府吏民懷畏建祠以􅀕後按南直風裁凛不可犯氷蘗之操始終如一楊景安寕人永楽癸卯舉人判灞豐兩州治績優異尋擢化州州同值峒夷亂攻城守將縋城出遁兵民不滿三百景激以大義悉力堅守賊遂引去以老乞致仕卒李純昆明人永樂甲午舉人正統間巡按遼東會土木之難純選精騎嚴兵固守額森入㓂純擊之斬獲無算論功升遼東巡撫後改榆林巡撫卒於官額森舊作也先今改正張英字時俊昆明人事母至孝正統間領鄉薦第一入太學時閹人王振用事􅀕酒李時勉論之振矯㫖械勉於成均英同石大用詣闕請代遂得原釋名動京師即日乞歸養居鄉以孝義著聞楊一清景子成化進士厯官右副都御史督理茶馬鹽政條上事宜多所匡濟巡撫陜西復修花馬池諸要害尋奉勅總制三邊議事為劉瑾所格罷歸瑾誅起為吏户兩部尚書進大學士􅂙預機務因灾異自劾言時事失宜朱凝等疾之謝病致仕嘉靖􅀄召還内閣加少師以議禮不合致仕卒贈太保諡文襄趙璧昆明人成化進士宫郎中時太監蔣宗誣奏南科後湖不法事勘直之因是左遷吉安府通判厯四川副使皆有善政著茶花譜及詩文集李宗泗字希賢昆明人倜儻有智畧登成化進士累官御史時馬政多􅁦宗泗一一肅清之升江西按察副使會長河等峒賊攻掠郡邑宗泗出奇設伏屢以捷聞勞瘁得疾卒於官弟宗儒字希雍成化進士以孝稱授刑部主事王璽字國用宜良人㓜失父事母孝母卒廬墓三年宏治時任合山教諭唐佐字朝相晉寕人宏治中入太學聞父䘮徒步萬里抵家淚盡嘔血水漿不入口旋卒毛玊字用成昆明人宏治進士正德時厯南京給事中疏劾大學士焦芳劉宇諌止巡幸羣盜􅅰山東河南玉請備留都已而盜果渡江以備嚴不敢犯嘉靖初為吏科勸帝戒嗜慾杜請託以破僥倖之門塞蠱惑之隙帝為嘉納時宸濠戚屬連逮者數百人奉命往訊多所全活尋伏闕争大禮受杖下獄竟卒隆慶間贈光祿少卿子沂嘉靖舉人官知州楊慎盛稱之呉九功字時敘昆明人宏治舉人官山東僉事饑民相聚為盗九功單車抵賊巢諭以禍福皆解散卒後民為之立祠繆白字元素呈貢人宏治舉人任成都通判從征畨㓂常戒妄殺時有宋姓豪俠不法白將正其罪直指不可遂鬱鬱不樂適仕麻哈知州即請歸事母盡色養居家四十年以盛德稱方矩昆明人宏治進士官禮科給事中劾劉瑾罷瑾敗復擢山東叅議賢聲大著以年老歸尋卒子方化任四川成都通判聞訃泣血而亡陳淳字維素呈貢人宏治中由舉人任太平府通判郡有疑獄淳為辯之尤多善政去之日民刻像以祀胡廷祿左衞人正德進士官南京户部郎中與吕柟鄒守益共扶正學未幾歸田同年生呉興顧應祥撫黔數年欲一見之不能及去任造其廬始出一見其介如此陳大韶嵩明人隨父忠入京謁選父殁扶櫬歸廬墓虎狼盜賊不為害母殁亦如之正德中旌表張潔晉寕人性至孝父母殁哀毁骨立里人呼為張孝子黄鳳翔昆明人正德進士官刑部鞫閹宦盜簪事直窮其情為當事所搆出守重慶又因訊黄總戎事執法不阿益遭忌遂告歸勤於著述楊慎曰如竹泉者海内未昜得也羅江字孔殷嵩明人正德進士為建昌府推官直身勵操不畏强禦卒於官民哀之立祠以祀黄敏才晉寕人正德舉人知解州民飢不待報出粟賑濟給藥治病全活萬計任九江同知時疏龍開河平江洋㓂尋擢知石阡府所至祀名宦子明艮嘉靖舉人官至畢節兵備道亦有政績李資坤字伯玉昆陽人正德中由舉人屢遷銅仁知府所至多異政考天下廉史第一性剛介寡合言動以禮老而彌篤嚴清字公直後衞人嘉靖進士厯工部郎中董作京師外城修九陵吏無所侵牟省費鉅萬厯四川右布政使並以清望顯萬厯初擢刑部尚書持正執法不屈權勢神宗深重之進吏部尚書以疾歸復起兵部不赴而卒諡恭肅孫繼魯字道甫昆明人嘉靖中進士厯户部郎中監通州倉條上除􅁦四事知衞輝淮安二府並有政績累遷右副都御史巡撫山西所至以清節聞會總督翁萬逹議撤山西内邊兵并力守大同繼魯争之忤㫖下獄病死山西民痛惜之穆宗立贈兵部右侍郎諡清愍朱朝冠字子儀楊林人嘉靖中漢中府通判督兵征何勉屢捷賊内應舉火焚營朝冠往救焚死石銀呈貢人嘉靖舉人知合江縣遷隴川知州所至以豈弟稱而戅直不阿左遷韓府長史隴民詣闕上章願借公數年及歸復踵門求岀卒祀隴川名宦程世勲後衞人署百户嘉靖四十五年官兵討􅃫繼祖世勳護餉至金沙江督偏師出哨至波羅結堡與賊遇力戰死之妻蕭氏年十八養姑撫子矢志不渝于道南以孝聞施昱字子貞昆眀人嘉靖進士為貴州僉事瓦橋驛峻嶺夾江渡者危竦昱為巨橋覆以瓦屋行者便之以擒巨冦李􅀖珍陞光祿少卿子士翼天性篤孝親殁廬墓芝草生其旁唐文炳祿豐人弟文蔚父母相繼卒時文炳年十四文蔚年十一兄弟廬墓三年刺血和泥為像祀之如生文蔚事兄如父孫繼先昆明人隆慶舉人知陀陵以招降功朝廷賜金􅅄之遷下石西州知州句来官此者胥寄妻孥於太平府􅀊一履其地繼先始居之闢草昧拓城甃井生聚教訓致仕後以古禮倡邑人冠婚葬􅀕一軌於制人憚嚴正楊鳳安寕人萬厯舉人刺母州築隄障湖以通鹽舶􅀊省運貲累萬青兖饑民徙海拯活者七十餘萬招集流亡千餘給種開墾三百餘頃入覲晉黔道引􅔂歸黔國公以師禮延之堅卧不出卒祀鄉賢宋應時昆明人父終刺血為像祀之子文學尤孝母殁負土成墳居父母䘮相繼廬墓野燒偶延向風叩首而火息後羣賊剽掠感其孝饋以豚米不納杜維喬字汝遷昆陽人居父母䘮哀毁過人廬墓三年墓前麥生九穗瓜結如斗人謂純孝所致朱運昌字際之昆明人萬厯進士初為大理寺評事岀百餘人於獄覆議得允屢遷福建左布政使中貴人銜命督税多所阻抑遂上書乞歸即日登舟方抵里神宗特簡巡撫閩中後卒於官徐朝綱晉寕人萬厯中為安順府推官視郡事會水西賊攻安順城䧟􅀍執不屈闔門遇害贈光祿少卿􅄻子入國學劉鼎新呈貢人萬厯中四川雙流知縣奢賊之變㓂攻雙流鼎新伏壯士於内開門延之賊入鼎新手刃其魁餘皆殱之狹巷凡三攻皆不克賊去遂引鄉兵援省城賊咸避之後監兵救藺州斬巨魁魯仲賢收降萬餘人劉文徴昆明人萬厯進士知紹興府考清廉第一因劉寵為會稽太守民間有漢明二劉之謡朱思明昆明人萬厯進士官河南按察副使開彰河十餘里設法賑飢民民為立生祠為叅政又開彰河二十餘里陞廣西布政使䋲宗人以法釐剔鹽􅁦董􅀖昌昆明人萬厯舉人知長夀縣有惠政知平越州黒苗叛城賴􅀖昌保全陞思恩府告歸遇流㓂亂舉家自焚陳爰謀昆明人萬厯舉人以知府致仕家居沙賊破城迫欲用之不屈而死同縣楊樹立以南川令致仕歸流㓂至衣冠北面再拜自縊死譚三謀昆陽貢生仕臨安教授歸流㓂破城闔門自盡呉事心昆明人萬厯舉人知臨邑縣以裁抑御史濫索夫馬被劾邑民至京保留者七百餘人後復知丹陵縣􅀊饑賊起設法招徠且至其巢諭之賊悉降所至悉祠祀之趙日亨字貞如安寕人萬厯進士時山東􅀊饑兵亂日亨奉命撫循請蠲賦赦脅從東方以安時有監司恃婦翁為首輔行不法日亨并首輔劾之由此外轉川南兵備值奢賊之亂募死士斬叛黨進解省城圍以功晉秩尋致仕歸傅宗龍字仲綸昆明人萬厯中進士由知縣徵授御史天啟初應詔募兵月餘得精兵五千安􅀖彦反自請討賊不果崇禎中厯貴州巡按四川巡撫保定總督俱著勞績入為兵部尚書承楊嗣昌之後以抗直忤㫖下獄復起總督陜西率兵擊自成死之諡忠壯范立朝字二懐昆明人萬厯舉人屢遷刑部郎中出知平涼府時韓王薨世子㓜有庶子謀立賂以金立朝正色曰嫡庶之禮何可廢也王妃聞之亦以多金求為善計復却之曰此公議也何以私為後罷歸行李蕭然袁善字復虚昆明人厯官松潘􅂙將既罷歸後值東川祿千鍾為亂糾合烏撒霑益攻嵩明巡撫沈儆炌以便宜起善於家令督兵馳救大破之尋進副總兵援貴州時賊猖獗羣苗所在蠭起善緣道􅁹撫抵貴陽滇黔始通論功累加都督同知善勇而好謀撫士卒有恩為滇中諸將之冠甘百昆門人性恬淡惟以賑貧乏為事萬厯庚戍滇饑出粟饘民全活甚衆有司上其事欲旌之力辭庚戌詔天下輸粟助邊立應詔授以官亦不受王來儀字仲威昆明人萬厯中知嘉魚縣廉直不媚上官後流賊入滇罵賊而死本朝乾隆十二年賜諡節愍唐俊德祿豐舉人萬厯中鳳賊猖亂俊德同庠生周之麟百户陳宰土官李印力戰被殺因建祠以祀四人賜額曰忠烈汪文度宜良所世襲指揮天啟間猓賊犯城文度往禦被刺腸出仍奮勇擒賊斬之城賴以完程坤昆明人天啟武進士官四川總兵會西路為賊兵梗率兵赴援至畢節城䧟被執不屈死劉維馨昆明人天啟舉人任鄜州知州流㓂至率衆拒守城䧟罵賊亂刺而死同縣舉人余士秦任石阡推官上計次襄陽值張獻忠圍城死之李悉達羅次人領天啟四年鄉薦品行端方知夔州府多惠政流賊䧟城死之陳履厚昆明人天啟間從京師扶父櫬歸至龍里遇安酋之變賊焚其柩履厚抱柩哀號賊擊之死李玉衡昆陽􅮇生舉家避流㓂於滇池㓂掠其船母蘇氏先投水玉衡即隨之抱母屍死妻子奴僕從死者九人胡郁然昆陽廪生品行方正流㓂屠城前一日母死人勸其去郁然曰母生我而我棄之忍乎守母屍不避賊至遇害王錫衮禄豐人天啟進士厯官吏部左侍郎予告歸里後值沙酋之亂起義討賊被執死之妾尚氏與弟􅃬􅃏妻宋氏皆自縊死張如良昆陽人天啟中􅀊貢持己清慎流㓂之亂如良與子景輝景耀及妻媳一門俱殉死趙譔昆明人天啟舉人知龍泉縣屢平賊亂因擢御史甲申之變罵賊而死本朝乾隆四年賜諡忠愍入祀忠義祠馬乾昆明人崇禎中由舉人授䕫州府張獻忠圍城二十餘日乾親冒矢石隨機制勝賊遁去擢四川巡撫率師禦㓂於内江􅀌軍援絶而死本朝乾隆四十一年賜諡忠節李兆旂昆陽人崇禎中為廬江訓導流㓂圍城兆旂守北門城䧟被執不屈死之長子淳痛􅂘父屍亦罵賊死妻洪氏以苦節聞次子澄聞難奔赴負骨歸葬奉母避㓂山谷至母卒暮夜歸葬負土成墳廬於墓側年本朝乾隆四十一予祀忠義祠羅銘鼎三泊人崇禎舉人官威茂道張獻忠犯川罵賊而死妻段氏􅂝子兆鶴兆桂兆昌俱投水死劉㩠昆明人户部主事為闖賊所執捶之折一足不死歸至滇流㓂使人招之授以督學㩠曰京城不死已無顔見先帝復為賊官耶大罵而死楊永言昆明人崇禎進士知崑山縣卓有政聲值㓂破城巷戰而死劉昌應右衞人明末為叅將流㓂入滇倡義起兵屢戰不克為賊將所執不屈遇害本朝乾隆四十一年賜諡節愍向琪左衞人為百户聞流㓂至宜良一家十六口皆縊死同時前衞千户蔣薦百户向宸亦闔門死節本朝乾隆四十一年予祀忠義祠陳爰詢昆明人崇禎間􅀊貢官南溪訓導時流㓂亂蜀力陳防禦之策因委署馬湖屏山縣城已䧟爰詢走烏􅀩假兵恢復總督樊奇其才授本府推官傾囊募士軍威大振終以力屈死之李守賢昆陽􅀊貢崇禎間任江夏訓導造士有聲流㓂至分兵守城城䧟罵賊而死李方泌昆陽人性至孝篤於學流㓂臨州方泌夫婦􅂝四子入舟避之為賊所獲方泌不屈被殺婦抱子罵賊投水而死一年本朝乾隆四十予祀忠義祠段伯美晉寕人流㓂至伯美偕諸生余繼善耿希哲助知州冷陽春拒守城䧟俱殉難死本朝乾隆四十一年予祀忠義祠羅正符安寕人博學工文崇禎間流㓂遣曹名臣駐州正符憤怒邀一賊至其家執斧斫之不中賊縛之去不屈而死同邑中書朱蘅亦於是殉節李開芳富民人流賊入城妻及二子俱赴井死開芳偕其友王朝賀走至松花壩俱自縊本朝乾隆四十一年予祀忠義祠時在籍知縣陳昌裔不受偽職為賊杖死亦於四十一年賜謚節愍莫貴德宜良人字可及靖州知州流㓂至謂妻麻氏曰身受國恩當以身殉同赴井死王謨昆陽􅀊貢事母孝事兄恭流㓂至被執不屈死同時易門學生楊霓明亦罵賊而死唐泰晉寕人性高潔雲撫錢士晉稱為雲中一鶴晚年隠於僧著擔書使者集楊泰安寕人明未舉人㓜聰頴力學不仕所著有虎邱温泉志司慎昆明人沐天波叅隨沙定州反欲假禀辭襲天波直入府慎叱之被刃斷胸而死同縣向六馬三約敢死士十人書報國字為號共圖賊不克被殺又禆將徐髙遷將糾衆援勦而人無鬬志遂闔家自焚死楊嗣昌昆明諸生流㓂徵丁嗣昌以代弟死安籠妻孔氏以苦節著陳大經昆明人有才畧善騎射兩中武舉沙賊之變沐天波倉皇欲出大經叩馬諌曰尚有日月營兵殺賊不勝行未晚也時奸人于􅃬州隂為沙地目視天波天波疑其見誘抽刃殺大經而去黄恩右䘙人百户沙賊䧟城率家丁數人巷戰力竭而死本朝施洎雲南府學生呉三桂叛奉嬸母生母及㓜弟避兵新興賊驟至匿二母於窖中賊來搜洎力拒之天既明二母出視身無完膚卧地流血但顧弟曰善事親氣遂絶周養元昆明人流㓂入滇將害其父養元號泣願以身代賊感動父子俱得生事繼母趙氏備極孝養趙年九十五卒養元己七十餘哀慕如所生母後其子佩遭呉逆之亂奉母楊氏避兵撒拉村糧絶負米二百里外晝夜兼行兩足流血人謂克嗣其孝萬必貢昆明人性篤孝奉父避兵山東遇大蛇祝曰吾固當死奈二親何蛇竟去後歸傭力以養不缺甘㫖母疾視湯藥跪進之衣不解帶者數月卒後負土成墳邑令聞欲旌之固辭不受楊衍慶昆明人流㓂之難負父避亂父被掠衍慶迫救并遭拷縛杖索皆斷賊驚􅇚之蔣之彦昆明諸生順治七年流賊㓂滇將以之彦祖塋為游觀所之彦往争之賊諭償以他處山場厲聲曰尺土皆朝廷有豈賊得據耶賊壯之授以偽職遂拂衣歸賊促之往終不屈遂死於杖葬邑東之葉家山楊瑄昆明人流賊入滇瑄率鄉子弟操挺杖奮擊城西門外山坡死焉鄉人義之名曰楊瑄坡薛大觀字爾望昆明人為郡諸生順治十五年李定國據雲南大觀攜家居黒龍潭上嘆曰吾當不惜七尺軀為天下明大義子之翰曰大人死忠兒當死孝其妻妾亦相率誓死以金授僕令他往僕曰主死奴安歸遂俱赴龍潭死數日屍浮岀七人皆聚一處乾隆四十一年予祀忠義祠又生員施于京俱闔門焚死袁宏安寕人呉逆殘騎與魯奎野賊擄掠宏間道赴大營請建安撫禦侮策城賴以全復入魯奎賊營要􅇚隣境婦女千餘名平居孝友謙和時能緩急人朱荃安寕人王自奇之亂被執不屈飲酖死初隨父官江南以明末兵亂道阻聘妻陳氏音信阻隔陳父欲别議婚氏截髪誓不從父封其髪達江南乃間道歸娶及荃死氏乃託􅀌於從父絶食而死陳九蛟昆陽人與洪文彬素友善流㓂至相約敘别各自縊死施逢泰昆明人康􅄉二十年大兵圍省城奉父避於姚安方山值胡國柱潰兵劫執逢泰憤甚罵賊賊怒殺之逢泰死而賊悔遂􅇚其父張潤昆明人親疾叩天祈以身代及殁廬墓盡哀潘家禮昆明人三桂叛避兵嵩明父母同日卒鬻身許姓得銀治䘮許感其義不受劵潘不可日與傭作伍積五載償清還教子列郡庠熊才昆明人少有雋才為文援筆立成及長研精諸子百家書晚年詩文益􅃉尤工書畫片言尺牘人皆蔵之胡士悅字季凱昆明人廪生四􅀊失恃哀痛不食九􅀊父病親侍湯藥祈天願以身代及父殁哀毁骨立事兄撫姪兼盡其道族黨交稱焉趙士英字鼎望昆明人康􅄉丙戌進土改庶常假歸養親仲父之瑶貧而乏嗣奉之終身葬其師唐質生厚䘏故人史纂之子皆人所難者王思訓昆明人康熙丙戌進士博學有文為諸生日嘗為當事聘修志後以翰林檢討督學江西典試廣東有近體詩行世陳清嵩明諸生與霑益諸生余聯甲皆尚義康􅄉間東川土官祿永明為其弟妻小安氏謀死欲為子世英謀襲其勢方强二人請於蜀撫曰殺命吏而無罪且得官恐東川殆難綏靖不如改土設流為便撫從其計東川始安戚藩文晉寕人父俊有狂疾康􅄉間阿迷土目盧鼎魁謀逆械繫赴省俊遇之遽曰此吾友必􅇚之押者以為信拘俊送州藩文急往白以疾并拘之鄉人共往祈乃􅇚踰年俊殁繼母張氏乖僻不慈病危藩文刲股肉以進乃愈張亦感悟嘗語人曰藩文真孝子也張旭呈貢人康􅄉壬戌進士官檢討好讀書尤工舉業嘗坐卧小室中肆力於古未幾卒段昕安寕人康熙進士知連城縣民素健悍昕廣置庠塾課以儒行風始革復刋田式使賦不偏重禁溺女擒亂民賑饑荒雍正間以清介保舉内陞主事弟㬢以進士知雲山縣案無留牘薦擢御史屢著直聲歸里後世宗特召用之多所條奏不存稿虞世瓔字虞山昆陽人以薦授光祿寺署丞厯官通政司右􅂙議工書法供奉内廷康熙中致仕歸卒許希孔字瞻魯昆眀人雍正甲辰進士厯官工部右侍郎事祖母繼母曲盡其孝雖處貴顯不啻寒素陳印瑞昆明人事親以孝聞有謝姓者託以三百金後謝殁訪其子還之舊郡守梅姓遺女孫與依印瑞撫而嫁之呉寛昆明人父殁暮宿􅊘旁曉歸養母踰年母殁前後廬墓四載兄亡迎嫂姪同居雍正間旌郭寛昆明人性孝友良知天賦少長如一親殁廬墓三年乾隆間旌林雯昆明人父母殁先後廬墓六年乾隆五年旌涂崇昆明人七􅀊母卒哀毁如成人事繼母以孝聞後以貢授廣南訓導卒趙繼普昆明人博學力行以貢生任􅀩化訓導公慎廉介課士有方文風一振著有雲莊詩文集錢灃字東注昆明人乾隆三十六年進士由檢討遷御史薦井通政司副使甘肅冒賑劾總督畢沅瞻徇復劾山東巡撫國泰驕縱與藩司于易簡俱伏法時大學士和珅在軍機不與諸大臣同處灃特劾之尋得俞㫖命在軍機處行走和珅故試以艱鉅皆不能屈其督學湖南嚴而得士心有錢來不要錢之謡所入廉俸與仲叔共之并倡修會館置鄉會試卷金壬子嵗昆明大水作六河説獻當事倡衆捐資以助公用嘉慶十二年入祀鄉賢祠李超能昆明人母羅氏晚􅀊失明超能以舌吮之年餘忽愈三十餘䘮妻不復娶每夜抱母足以寢同邑華天佐嵩明月添佑月添裾均於嘉慶間以孝旌程振鵬昆明人孝友端方篤於行誼博學强記嗜著述有嶺雲編啟䝉韻學見聞錄數十卷後以貢生任䝉化訓導楊􅂎嵩明人母疾侍湯藥晝夜不倦母卒廬墓有白犬守􅊘諸異嘉慶間以孝旌張棟安寕人少􅀌貧竭力事母甘㫖必供母疾刲股以進友愛二弟嘗傾囊助之己則屢空許瓚易門人家貧竭力事父母有魯奎野賊夜入室執其父瓚挺身捍父力鬬被殺華天佐昆明人奉事孀母孝行克敦人無間言嘉慶間旌流寓漢蘇文達籍貫未詳從馬㐲波南征交趾疾發不得歸永平間來滇至新羅邑即今安寕相傳温泉是其所闢唐賈餘絢蜀人善屬文尤長於書寓雲南西㸑王碑是其手書閭邱均成都人與陳子昂杜審言齊名武后時官博士後從唐九徴為管記南中碑碣多出其手賈島咸陽人能詩唐末寓雲南有送雍陶入蜀詩雍陶成都人唐末寓昆眀有送裴章還蜀詩明劉謹山隂人父戍雲南謹六􅀊問雲南何在人以西南指之輒朝夕遥拜年十四瞿然曰雲南雖遠天下豈有無父之子哉遂抵滇凡三往返始得歸其父焉王紳義烏人贖學士禕之子也蜀王聘之教授蜀郡紳痛父奉使死難䘮未返白王走雲南行抵死所號慟幾絶滇人哀之稱為王孝子唐循仲淳安人長於詩洪武中父戍滇未行卒兄凱仲例當代循仲憐兄無依與之偕居數載兄以疾終循仲哀痛而殁劉有年沅州人建文中知太平府有治聲靖難師至有年守義不迎因安置昆明楊慎戍永昌尤愛昆明髙嶢山水清曠僑居久之詩文一脫手傳誦中土纂述甚富後竟卒於滇詳永昌府志列女晉李毅女名秀父為寕州刺史卒於官時蠻㓂攻城毅子釗任洛還赴到牂牁路塞停住交州交武以秀明達有父才遂奉領州事秀適漢嘉太守廣漢王載載將家避地在南故共推之又以載領南夷龍驤叅軍秀奬勵戰討食糧已盡茹草炙鼠為命伺夷怠緩輒出軍掩破三年釗乃得達丁父䘮文武復逼釗領州府事毅故吏毛孟等詣洛求救懐帝乃下交州使救助之元段功妻阿􅗩梁王柏市刺幹爾密女功官雲南平章梁王忌之令女毒焉女不從梁王卒殺功女痛苦欲自盡梁王防衞周至女愁憤作詩自見聞者哀之卒悒悒死雅克特穆爾妻托克托和氏雅克特穆爾為梁王部將明洪武時平雲南敗績於曲靖馳歸氏閉門不納曰爾受梁王厚恩兵敗不死何以見王乃鴆其二男一女命侍者曰我死舉火焚屋毋令辱我遂飲鴆死又皇甫璇妻楊氏桑和州妻李氏景縣尹妻王氏皆元時以貞節旌雅克特穆爾舊作燕帖木托克托和氏舊作脱脱懷氏今改正明李仁山妻楊氏昆明人仁山早世楊年十八生女未逾月父諷令改嫁楊遂引刀斷一指曰指續可嫁竟不能强孫彬妻謝氏三呉人永樂間從夫戍交趾清化衞彬卒有詔復安南國歸廣南同戍者强其子敬遯海歸氏諭之曰汝占戍籍遯則勾牒至白罹罪也且滇呉萬里浮海不測先祀安託乎乃與敬匿神祠中伺同戍者盡過乃歸苦節五十餘年又侯官嚴士良戍滇卒妻呉氏年二十撫􅀌守節宣德間旌趙宣妻朱氏右䘙人年十九夫卒誓死不二時南寕伯毛福壽征麓川囘謀娶之氏曰善為我辭必欲相强惟有死耳守節五十七年而終良朝元妻郎氏昆明人年二十夫卒撫遺腹子後亦夭苦節七十年又同縣閻厚妻金氏張翿妻王氏劉悌妻􅅊氏秦春妻王氏呉承祚妻繆氏羅必舉妻張氏魯忠妻張氏李􅊙妻黃氏盧英妻短氏劉潤妻趙氏張翃妻胡氏方玘妻曹氏廖忠妻梅氏楊翺妻許氏楊廷詔妻謝氏周允惠妻王氏林東棠妻李氏周維新妻閔氏盧康續妻謝氏董紹舒妻郭氏張翿妻胡氏劉體仁妻孟氏王僎妻段氏陶希哲妻祿氏張翔妻朱氏王重光妻段氏艾龍光妻簡氏呉鑰妻戴氏李光憲妻張氏封錫屢妻王氏廖朝元妻郎氏姜愷妻呉氏李文徴妻熊氏方􅂁妻俞氏劉傑妻吳氏李潔妻楊氏吳詔妻張氏嚴清妻施氏李克明妻楊氏常楨妻沈氏程世勲妻蕭氏俱苦節終身毛從讓妻劉氏昆眀人年二十四夫卒撫子義成立娶魏氏年甫十八義復卒遺􅀌禹一􅀊人謂魏年少恐難守魏歎曰吾姑不忍負吾舅吾忍負吾夫耶撫􅀌事姑一門雙節又同縣徐昂妻顧氏與子行妻鄭氏沈朝惠妻張氏同子國英妻孫氏亦兩世苦節完嗣昌妻太氏昆明人未嫁夫病篤父母許往侍湯藥及亡即守制不歸事舅姑甚謹苦節六十六年同縣楊氏齊姑亦未嫁守節施於身妻嚴氏昆明人于歸甫七月於身授仙居令值流賊阻絶道路氏毁容斷髪針黹以養翁姑後卒拮据殯葬為夫弟婚授以家事將作死計而於身忽歸夫婦不能相識楊嗣昌妻孔氏昆明人流㓂亂嗣昌以諸生代弟戍安籠死遺一子一女後聞賊勒寡婦配軍氏投井中數日水淺得不死遂削髮毁容後子亦死僅遺一女相依􅀌苦守節五十餘年嚴可富妻高氏宜良人年二十七夫卒以女紅給諸子讀書一日􅀕墓歸拾八十餘金訪其人還之子鎮妻汪氏少寡生遺腹子容守節如姑人稱嚴氏雙璧同邑李華妻王氏陳湧川妻程氏藍彬妻萬氏周贇妻趙氏俱以節稱羅江妻李氏嵩明人夫疾割股療治未愈死氏哀慟䘮