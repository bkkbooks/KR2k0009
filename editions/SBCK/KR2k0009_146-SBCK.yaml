body:
  text: 夔州府在四川省治東一千七百四十里東西距五百四十里南北距七百四十里東至湖北宜昌府巴東縣界二百一十里西至綏定府新寕縣界三百三十里南至湖北施南府恩施縣界二百四十里北至陜西興安府平利縣界五百里東南至湖北施南府建始縣界一百一十里西南至忠州界三百九十里東北至湖北鄖陽府房縣界三百一十里西北至綏定府東鄉縣界六百一十里自府治至京師四千二百四十里分野天文翼軫分野鶉尾之次建置沿革禹貢荆梁二州之域春秋時為庸國地後屬巴國戰國屬楚秦屬巴郡漢因之後漢初平元年劉璋分置固陵郡水經注作故陵建安六年改為巴東郡仍屬益州按此本華陽國志與譙周巴記晉宋志不同詳見重慶府三國漢因之晉泰始三年分屬梁州太安二年仍屬益州永和初改屬荆州宋泰始五年置三巴校尉寰宇記宋末廢齊建元二年置巴州永明元年省梁普通四年改置信州見梁書武帝紀寰宇記作大同三年誤周置總管府寰宇記後魏廢帝三年移巴東郡於陽口縣周明帝二年於州理置永安郡其巴東郡惟領雲安一縣宣政元年於州置總管府隋開皇初郡廢大業元年府廢三年復改州為巴東郡唐武德元年復曰信州二年改曰夔州仍置總管府管夔峽等十九州貞觀十四年改都督府督歸夔忠萬涪渝南七州後罷府天寶元年改雲安郡乾元元年復曰夔州二年復升都督府尋罷屬山南東道天祐三年升鎮江軍節度使唐書方鎮表至德元載置夔州防禦使二載升夔峽節度使乾元元年廢廣徳二年置夔忠涪防禦使天祐三年升爲鎮江軍節度使五代屬蜀後唐天成二年改曰寕江軍尋復入蜀宋仍曰夔州雲安郡寕江軍節度使爲都督府開寶六年分置峽西路咸平四年改夔州路元至元十五年置夔州路總管府屬四川行省明洪武四年改夔州府九年降爲夔州隸重慶府十三年復升爲府屬四川布政使司本朝因之屬四川省領縣六奉節縣附郭東西距一百三十里南北距二百八十里東至巫山縣界五十里西至雲陽縣界八十里南至湖北施南府建始縣界二百里北至大寕縣界八十里東南至建始縣界一百一十里西南至雲陽縣界八十里東北至巫山縣界七十里西北至大寕縣界八十里春秋時庸國之魚邑漢置魚復縣為江關都尉治屬巴郡後漢建安中為巴東郡冶三國漢章武二年改曰永安晉太康元年復曰魚復宋齊因之梁為信州治西魏改曰人復隋仍為巴東郡治唐初為夔州治貞觀二十三年改曰奉節宋因之元為夔州路治明洪武九年省縣入州十三年復置為夔州府治本朝因之巫山縣在府東一百三十里東西距一百六十里南北距二百五十里東至湖北宜昌府巴東縣界九十里西至奉節縣界七十里南至湖北施南府建始縣界八十里北至大寕縣界一百七十里東南至巴東縣界一百里西南至建始縣界八十里東北至湖北鄖陽府房縣界三百里西北至大寕縣界一百六十里戰國楚巫郡秦改為縣漢屬南郡後漢建安中改屬宜都郡二十四年分置固陵郡三國呉又分置建平郡晉初置建平都尉治此咸寕元年改都尉為建平郡宋齊以後因之隋開皇初郡廢改縣曰巫山屬巴東郡唐屬夔州宋元屬夔州路明屬夔州府本朝因之雲陽縣在府西一百四十里東西距一百二十里南北距三百里東至奉節縣界六十里西至萬縣界六十里南至湖北施南府恩施縣界二百四十里北至開縣界六十里東南至恩施縣界二百四十里西南至萬縣界七十里東北至奉節縣界六十里西北至開縣界六十里漢置朐􅃘縣屬巴郡後漢屬巴東郡晉因之周改曰雲安唐屬夔州宋開寶六年置雲安軍屬夔州路末廢元至元十五年復置軍二十年升為雲陽州明洪武六年改州為縣屬夔州府本朝因之萬縣在府西少南二百八十里東西距二百里南北距二百十里東至雲陽縣界八十里西至忠州界一百二十里南至湖北施南府恩施縣界一百八十里北至開縣界三十里東南至雲陽縣界一百里西南至忠州界一百二十里東北至開縣界三十里西北至忠州梁山縣界八十里漢朐􅃘縣地三國吳置羊渠縣蜀漢建興八年改置南浦縣屬巴東郡晉及宋齊因之後魏改曰魚泉周置安鄉郡尋改縣曰安鄉郡曰萬川隋開皇初郡廢十八年仍改縣曰南浦屬巴東郡唐武徳初屬信州二年於縣置南浦州八年州廢屬夔州是年復置浦州貞觀八年改曰萬州天寶初曰南浦郡乾元初復曰萬州屬山南東道宋仍曰萬州南浦郡屬夔州路元至元二十年省南浦縣入州明洪武六年改州為縣屬夔州府本朝因之開縣在府西少北二百三十里東西距二百四十里南北距一百三十里東至大寕縣界二百里西至忠州梁山縣界四十里南至萬縣界六十里北至綏定府東鄉縣界七十里東南至雲陽縣界六十里西南至萬縣界六十里東北至大寕縣界二百里西北至綏定府新寕縣界四十里漢朐􅃘縣地後漢建安二十一年置漢豐縣屬巴東郡晉廢後復置仍屬巴東郡宋齊因之西魏改曰永寕隋開皇末改曰盛山屬巴東郡義寕二年於縣置萬州唐武德􅀄改曰開州天寶初曰盛山郡乾元初復曰開州屬山南西道廣德元年改縣曰開江宋仍曰開州盛山郡屬夔州路元省縣入州明洪武六年改州為縣屬夔州府本朝因之大寕縣在府北一百八十里東西距二百六十里南北距四百二十里東至湖北鄖陽府竹山縣界一百三十里西至開縣界一百三十里南至奉節縣界一百里北至陜西興安府平利縣界三百二十里東南至巫山縣界四十里西南至奉節縣界一百二十里東北至湖北鄖陽府竹溪縣界二百三十里西北至開縣界一百八十里漢魚復縣地晉為建平郡泰昌縣地周以後為大昌縣地宋開寳六年以大昌縣鹽泉所置大寕監屬夔州路元至元二十年升為大寕州明洪武九年降為縣屬夔州府本朝康熙六年省入奉節縣雍正七年復置形勢控二川限五溪據荆楚上流為巴蜀要郡歐陽穎引水記當全蜀衆水所會鎮以灔澦扼以瞿唐夔州報恩寺記重岡複嶺上倚絶壁下臨斷崖天險之勢王十朋馬綱狀水有瞿塘灔澦山有赤甲白鹽形勢險天下王十朋武侯祠堂記水陸津要全會東門呉􅂤言禦寇記風俗郡與楚接人多勁勇少文學有將帥材華陽國志其人豪俠其俗信鬼其稅易征其民不偷李貽孫都督府記民淳訟稀王十朋詩夔峽民淳訟獄稀峽土磽确暖氣晚達故民燒地而耕謂之火耕杜甫詩注城池夔州府城周五里四分門五北倚山東西南瀕江明成化十年建本朝康􅄉二十三年修乾隆二十三年重修奉節縣附郭巫山縣城周三里二分門四明正德中建本朝乾隆三十二年修雲陽縣城周八里三分門四明正徳中建本朝乾隆三十一年修嘉慶八年重修萬縣城周五里門三明成化二十二年因舊土城建本朝乾隆三十四年修五十四年重修開縣城周三里有奇門五池廣一丈明成化中建本朝乾隆三十二年修嘉慶十三年重修大寕縣城周三里五分門四明正徳初建本朝乾隆三十四年修學校夔州府學在府治東宋建明洪武四年修本朝康熙二十四年重建嘉慶十七年修入學額數十名奉節縣學在縣治西北明洪武中建成化十年省入府學本朝康熙二十四年復建嘉慶十年修入學額數八名巫山縣學在縣治西北元至正中建本朝康熙二十一年修入學額數七名雲陽縣學在縣治東北明洪武中建本朝康熙二十四年修雍正三年七年重修入學額數七名萬縣學在縣治北明洪武中建本朝康熙二十二年修入學額數八名開縣學在縣治西明嘉靖六年建萬厯末􅁶於盛山西本朝康􅄉六年仍建今所二十四年修乾隆二十七年嘉慶十七年重修入學額數四名大寕縣學在縣治西明洪武中建本朝康熙六年省入奉節縣學雍正八年重建嘉慶十二年修十五年重修入學額數八名蓮峯書院在府治後本朝乾隆三十二年建四十三年修文峯書院在府治西本朝乾隆四年建嘉慶初修聖泉書院在巫山縣治東舊名巫峯本朝乾隆初建四十三年易今名雲安書院在雲陽縣治西本朝乾隆二十二年建鳳山書院在萬縣治東朝乾隆初建本芙蓉書院在開縣東門外本朝雍正十二年建鳳山書院在大寕縣本朝嘉慶十二年建按舊志載靜暉書院在府治後宋建明萬厯初改名仰髙竹林書院在府治東宋嘉熙中孟珙建以處襄陽流寓之士集賢書院在萬縣東門外明嘉靖中建三賢書院在開縣東一里祀元趙受明陳良楊文今並廢謹附記户口原額人丁七千六百四十四今滋生男婦共八十六萬一千五十九名口計二十六萬六百五十一戶田賦田地八千四百九頃八十七畝五分有奇額徵地丁正雜銀一萬一千二百二十九兩七錢五分三釐山川白帝山在奉節縣東十三里元和志即州城所據與赤甲山相接公孫述時殿前井有白龍岀因號此山為白帝山城為白帝城寰宇記公孫述自以承漢土運故號曰白帝赤甲山在峯節縣東十五里水經注江水南逕赤岬城西山甚髙大不生樹木其石悉赤土人云如人袒胛故謂之赤岬山元和志山在城北三里漢時常取邑人為赤甲軍盖犀甲之色也白鹽山在奉節縣東十七里隔江水經注廣谿峽北岸山上有神淵淵北有白鹽崖髙可千餘丈俯臨神淵土人見其髙白故名天旱燃木崖上推其􅁅燼下􅁾淵中即降雨常璩曰縣有山澤水神旱時鳴鼓禱雨則必應嘉澤蜀都賦所謂應鳴鼓而興雨也寰宇記在州城澗東山半有龍池方輿勝覽在城東十七里崖壁五十餘里其色炳燿狀若白鹽麝香山在奉節縣東南四十里杜甫詩水生魚復浦雲暖麝香山即此勝已山在奉節縣南隔江十二里峯巒曡秀巍然獨出泉山之上宋乾道中郡守王十朋命名相近有文山一峯秀拔為郡之案山七曜山在奉節縣南二百里亙延直抵湖北施南慈容山在奉節縣西南一百四十里又金子山在縣西南二百里與施南接界九盤山在奉節縣西北十五里形􅀔九曲又西北五里為三台山卧龍山在奉節縣東北五里上有諸葛祠故名陽臺山在巫山縣城内北隅髙百丈有陽雲臺遺址驅熊山在巫山縣東二里下有石灘四時湍流如熊聲一名箜篌山橫石山在巫山縣東十里有巨石臨江滸巫山在巫山縣東漢書地理志巫縣注應劭曰巫山在西南水經注江水東逕巫峽杜宇所鑿以通江水郭仲産云按地理志山在縣西南而今縣東有巫山將郡縣居治無恒故也江水厯峽東逕新崩灘其下十餘里有大巫山非惟三峽所無乃當抗峯岷峨偕嶺衡疑神孟涂所處又帝女居焉其閒首尾百六十里謂之巫峽蓋因山為名自三峽七百里中兩岸連山畧無闕處重巖曡嶂􅀮天蔽日自非亭午夜分不見曦月至於夏水襄陵沿泝阻絶或王命急宣有時朝發白帝暮到江陵其閒千二百里雖乘奔御風不加疾也春冬之閒則素湍綠潭迴清倒影絶巘多生怪柏懸泉瀑布飛潄其間每晴初霜旦林寒㵎肅常有高猿長嘯屬引凄異故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳明統志巫峽在巫山縣東三十里即巫山也與西陵昭峽並稱三峽寒山在巫山縣東五十里垂崖千層絶壁萬丈其􅀔髙寒荆州記寒山九阪最為險峻南陵山在巫山縣南隔江一里舊南陵縣以此名入蜀記山極高大有路如綫盤屈出絶頂謂之一百八盤蓋施州正路黄魯直詩云一百八盤攜手上至今歸夢繞羊腸謂此也舊志一名向南山女觀山在巫山縣東北四里方輿勝覽有石如人形相傳昔有婦人夫官於蜀登山望夫因化為石烏飛山在巫山縣東北六十里言山高烏飛不能越也千丈山在巫山縣東北一百里秀異高於衆山