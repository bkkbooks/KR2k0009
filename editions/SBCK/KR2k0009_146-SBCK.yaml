口悉焚其舟賊剽開州圍雲安德琛往援之累詔襃諭秦傳序江寕人淳化五年充夔峽巡檢使李順之亂賊衆奄至薄夔州城下得序督士卒晝夜拒戰城中乏食傳序出囊槖服玩盡市酒肉以犒士卒慰勉之衆皆感泣力戰城陷傅序赴火死薛顔萬泉人太宗時為峽西路轉運使始孟氏據蜀徙夔州於東山據峽以拒王師而居民不便顔為復其故城盧士宏新鄭人文彥博包拯以廉能薦由三司開折司擢夔州路轉運使朱夀隆諸城人仁宗時為夔州轉運使巴峽地隘民困於役􅊵其不應法者千五百人周湛穰人仁宗時為夔州路轉運使雲安鹽井嵗賦民薪茅至破產責不巳湛為捐鹽課而省輸薪茅民便之王端仁宗時知雲安軍仁宗頒慶厯善救方端請官為給錢如藥於民遂行於天下彭乘華陽人寶元中為夔州路轉運使土賊田忠霸誘下溪州蠻將内寇乘適按部至境大集邊吏勒兵下山以備賊賊遁去因遣人閒之其黨斬忠霸夷其家曹穎叔譙人夔州路轉運判官夔峽尙淫祀人有疾廢醫而事神穎叔悉禁絕之並教以醫藥陳安石安陽人嘉祐中為夔州判官洞悉民隱時有蓄蠱毒者捕誅其首並刻布藥方由是遇毒者不死張詵浦城人神宗時為夔路轉運判官渝州蠻叛詵自率兵討平之錄其功加􅀡集賢院孫構博平人神宗時夔州部夷梁承秀李光吉王兗導生獠入寇轉運判官張詵請誅之選構為使倍道之官至則遣浯州豪杜安募千人往襲自督官兵及黔中兵擊其後斬承秀入討三族火其居餘衆保黑崖嶺黔兵從閒道夜譟而進光吉墜崖死兗自縛降以其地建南平軍李周馮翊人神宗時知雲安縣蠲鹽井之征王宗望固始人擢夔州路轉運副使哲宗即位行赦賞軍萬州彌旬不給庖卒朱明因衆怒白晝入府宅傷守臣他兵藉藉謀兆亂宗望聞變白夔疾驅至先命給賞然後斬明以徇朝廷嘉之劉昉潮陽人紹興中守夔州政先體要興學校以造士勸農桑以厚民毎岀郊督耕又修諸􅁑亮八陣圖蹟杜甫東屯故居王十朋樂清人乾道初知夔州布上恩恤民隱士之賢者詣門以禮致之朔朢㑹諸生講經詢政民輸租俾自概量訟至庭温詞曉以義理及去民思之如父母程師孟吳人孝宗時提點䕫州路刑獄瀘戎數犯渝州邊使者治所在萬州相去逺有警率浹日乃至師孟奏徙渝夔部無常平粟建議置倉適凶􅀊賑不足即矯發他儲吏不可師孟曰必俟報餓者盡死矣竟發之趙方衡山人淳熙中授大寕監教授俗甚陋方擇可教者親訓誘之人皆感勵自是始有進士何異崇仁人慶元中知夔州兼本路安撫使以夔上狹食少同轉運使立循環通濟倉民便之范蓀開禧中為䕫州路轉運判官疏言施黔等州地曠人稀占田多者須人耕墾冨豪誘客户舉室遷去乞將皇祐官莊客户逃移之法校定凡爲客户者許役其身母及其家屬今後凡理訴官莊客户並用皇祐舊法從之龎彥海爲開州守將咸淳二年元兵取開州死之韓明開州守將元兵破開州兵潰明父子巷戰力屈􅀍執徐宗武夔州路安撫咸淳元年宗武城開達石城三年剙立臥龍山堡五年沒於王事特官其一子承節郎楊夀孫宋末爲雲安主簿元兵至中江夀孫與將官何庚安朝臣田廣澤等督兵連戰三日俱死上官夔宋末爲萬州守將元兵圍城守禦甚力招之降不從城陷巷戰而死明郭子虛太和人洪武十三年知萬縣政甚有聲胡軫豐城人宣德中知夔州府獄有不辜三人擬服上刑軫辨其寃釋之嘗劾罷幕官之貪墨者僚寀肅然謝文彬羅城人正統初知雲陽縣時羣虎白晝食人多方除之頌德者比之劉昆王謙武進人景泰初知夔州治行爲蜀最人畫像祀之王禎吉水人成化初授夔州府通判時荆襄賊石和尚流刦巫山督盜王同知不救禎代勒所部民兵赴援未幾賊刦大昌禎往救遂陷圍中大罵而死竇祥河南人宏治中由御史謫知萬縣廉能剛介吏畏民懷邱瑩麻城人宏治􅀄知開縣自署於門曰愛百姓如子貪一錢非官行如其言張惟任潼關人萬厯中知巫山親課農桑正學田經界租入膽寒士手校驛遞嚴祛貫蠧賦聽民自輸値旱澇禱輒應何承光鎭遠人官夔州同知崇禎七年賊由荆州長驅至副使以下皆遁承光攝府事率吏民守禦城陷死之本朝乾隆四十一年賜諡節愍高日臨鄱陽人崇禎時知大寕縣七年流賊犯城日臨見􅀔弱不能守囓指書牒乞援上官率衆禦之北門兵敗被執大罵不屈賊碎其體而焚之同時訓導高錫及妻女巡檢陳國俊及妻皆遇害本朝乾隆四十一年賜日臨諡烈愍錫國俊俱入祀忠義祠岳農壇鳳翔人崇禎末知大寕縣有治績流賊陷城投泮水死本朝康􅄉初邑人呈請崇祀又大寕教諭左中道籍貫未詳典史史掌文良郷人俱於十七年城破殉節乾隆四十一年中道掌文均愍賜諡烈予入忠義祠郭纘化崇禎末巫山巡檢禦賊死於陣本朝薛人鳳浙江人康熙十九年由夷陵州同擢夔州府通判轉運軍餉道經萬縣過賊將譚宏率兵刦之縛至天城山欲降以偽職人鳳曰吾今日止一死耳必不爾從賊怒礪刃於頸罵愈烈死之許嗣印漢軍鑲藍旗人康熙二十五年知夔州時寇氛初靖嗣印力事拊徇尤加意學校修郡志設救生船於夔巫閒嵗旱火三日不熄嗣印齋栗禱神澍雨如注崔邑俊陽高人雍正四年知巫山縣除弊興利多實政時楚省饑民入川覔食曰以千計大吏檄使禁阻邑俊獨持不可且請弛禁捐俸服粥病者資其藥餌斃者予以棺殮一時歌頌載道沈瀗固始人乾隆二十二年知雲陽縣清廉寡欲實心愛民興養勸學多所禆益李復發安溪人乾隆三十二年知夔州府莅政嚴明百廢俱興設留養局增義渡田創建蓮峯書院捐貲為束修膏火又自遣人購書籍庋置院齋以示士子梁國林順天人乾隆三十六年知巫山縣時方征金川軍務倥偬能鎭靜調度不誤役不􅅰民居心行政實惠及人邑人祀之江權歙縣人乾隆三十八年知夔州府安良除莠部内肅然訓迪士子多所成就仲純信萊陽八乾隆四十一年知夔州府振綱肅紀頒行保甲法姦宄斂迹勸士以敦品爲先人皆感化張至軨合肥人嘉慶元年知夔州府時方􅁹教匪轉餉絡繹絲毫不以􅅰民嘗謂夔郡牛客賈土著者地瘠多貧盡心休養以勞卒於官事聞廕一子周景福祥符人嘉慶元年知奉節縣以􅁹齊峩山邪匪有功擢知夔州府烽燧初銷亟興教養於白陽壩開塘引水灌溉得良田萬餘畝卒於官夔人祀之人物宋宗晏夔州人爲都押衙乾德中寇犯境晏扞禦甚力民賴以安以功補右班殿􅀡達州招安巡檢轉西頭供奉官王文義大寕人景德中母疾篤割股和藥疾愈及母卒廬墓鄉人憫其貧日給之食墳去水逺無以滌祭器後廬側忽涌甘泉人稱孝感事上聞賜以衣帛廖彥正夔州人爲南平司錄參軍徽宗求􅀡言彥正上封事論時政闕失由是􅀍召會修河除都水使者中人有與爭者彦正欲力正其罪遂被斥後與黨籍姚邦基大昌人政和進士知尉氏縣劉豫僭號屏居村落閒授徒自給後朝廷訪隱逸􅀖基與焉明青文勝大寕人洪武閒爲龍陽典史邑地濱洞庭嵗罹水患逋賦數十萬􅃻撲死者相踵文勝慨然詣闕上疏爲民請命再上皆不報復具疏擊登聞鼓以進遂自經於登聞鼓下太祖憐其爲民殺身招滅二萬四千餘石定爲額有司祠祀扁曰惠烈嚴琥開縣人成化末爲高州同知時石城信宜二縣大饑民多流亡琥捐俸賑濟化州吳川等縣嵗賦礦鐵民苦賠補無敢言者琥力請停止民歌曰生我慈母活我嚴父王彥奇雲陽人宏治進士知延安府清白剛方時官兵駐郡多求索彦奇嚴禁之民賴以安嵗大饑賑濟有方全活者衆又興學校正風俗廣儲蓄釋冤滯治水患弭盜賊大著政聲升參政延民乞留仍視府事累官都御史李清開縣人正德中鄢藍賊逼委守險隘賊閒出黄土壩清諜知要擊斬之事聞授萬縣巡司杜斌大寕人為河南沈邱縣丞正德閒流賊攻城斌同都司王寶督衆力戰死焉向孔洙大寕人正德閒流賊鄢藍攻城孔洙率民兵臨城拒敵相持數日城陷孔洙奮勇拒戰稍卻賊詐議和突入孔洙墜城而死柳英巫山人嘉靖中為廣東布政使入境行李蕭然惟一蒼頭自隨未久與時牴梧拂衣去粤中稱廉介必曰柳布政後薦起為光祿卿以方􅀡著劉五緯萬縣人萬厯中進士知無錫縣正􅀡愛民廉能著績以東林黨謫官何仲才雲陽人母老病齒落仲才為人傭作日得雞子以養久而不衰安民大寕人知襃城縣崇禎五年流賊陷城不屈死之本朝乾隆四十一年賜諡節愍賈萬策雲陽人崇禎中官荆州都司流賊陷城不屈死之鄧天祿萬縣人崇禎末為太平戌把總與覃璞共守城賊楊東廕陷太平璞被執不屈天祿奮拳撃賊賊並磔之同縣羅惟先手刃妻子閉家人於一室縱火楚之躍入火中舉家俱死本朝乾隆四十一年均予入忠義祠吳獻棐萬縣貢生崇禎末流賊張獻忠陷城逼以為參軍與子大英大罵不屈賊並磔之本朝乾隆四十一年予入忠義祠羅傑大寕人崇禎末賊至正衣冠坐中堂罵賊遇害年本朝乾隆四十一予入忠義祠本朝沈巨儒萬縣人隱居山中自號西溪野人總督李國英知其夙學勸之仕不應闢草堂以詩文自娯程正性萬縣人順治十六年以貢生授開州州同遷河南雎州牧有治績詳歸德府名宦累官雲南永寕同知楊春芳萬縣人由行伍累官都督同知管温州城守副將康熙十四年耿精忠犯温州春芳死之傅作楫奉節人康熙舉人知良鄉縣擢御史典試浙江洊升至副都御史後因征厄魯特督辦糧餉以軍功議敘旋乞假歸生平於書無所不讀詩尤悲壯雄渾有雪堂燕山遼海等集行世張起雲大寕人雍正六年署烽火門參將訓練有方遷南澳總兵設哨安塘沿海雀苻遠迹凡營卒年老無依者捐俸以資其生施醫藥以愈兵民瘴瘧芟毒草以免愚民輕生雍正十年入祀名宦祠傅朝舉萬縣人事繼母王氏以孝聞及卒親築墳塋獨居三年乾隆五年旌蔣士傑奉節人官外委乾隆十二年隨征金川陣亡同縣把總劉成芳於三十二年緬甸陣亡把總任天奇於三十八年金川陣亡卹廕各如例王宣奉節人累官鎭安協副將乾隆五十四年隨征安南於市球江遇伏力戰陣亡賜祭葬卹廕如例魏元相萬縣人官千總乾隆三十八年隨征金川陣亡同縣外委萬欽六十年隨􅁹苗匪陣亡卹廕各如例米兆濟奉節人官外委嘉慶初與同縣把總胡貴俱隨􅁹教匪陣亡卹廕各如例程安國萬縣人官千總嘉慶初與同縣外委龔正海俱隨􅁹教匪陣亡卹廕各如例桂紳開縣人官浙江縣丞嘉慶元年在籍率鄉勇禦教匪王三槐等於陳家場落水死同縣鄧起甲熊奎光王瑞南蕭國楷吳覲揚王崇佑馮有恒馮吉德曹大陳宗舜羅於黌李世椿魏春風陳鳴臯傅善慶李鳴瑤張奇瑋李之芳李世勲賴名王定一蕭國英姜光顯郭紹儀蕭德文黄鑑王歩鼇曾大紀曾大士陳徳潤陳徳潛陳德洋陳德沛陳德深陳德溢陳德洞吳廷採吳廷召趙宏超張梅先魏正泰李述榮李應舒陳望魯汪國俊楊達林從周林寂裕趙連玉匡懷德張璇汪廷翰汪廷冀陳元仲陳元依陳元伸龔世傅蕭積道陳盛德唐太庚唐元昌楊啓先張可達譚子聘陳眞􅀓譚君述余欽祚段三義石萬凊李芝義李芝仁李天祐陳方璽陳大旺陳楚棟陳方安陳楚楨陳方琦陳楚勝陳方勲陳楚秀陳楚瑶陳楚順張國佐陳方斌張國賢陳楚貴陳方榮陳方雄陳方登陳方爵陳方祿陳大福陳大壽陳楚位陳方德李紹武李元虎李光瑤李勝元李勝禹張國祿張國茂張國盛張國瑞楊才位袁全有周良臣李天贊李天聰桂質恒陳黃玉桂質量陳盛玉李永乾范光虞張永謨張世才張為訓張穎光張足先謝大重謝大林謝大鈞譚大亨謝大用孫勝儒趙勝友桂文廣謝文懐