昻威惠洽著吏民畏而愛之陸騰代人廢帝時拜龍州刺史常通江油路直抵南秦周孝文曰此是卿取柱國之日即解金帶賜之州民李廣嗣李武等憑據巖險騰密令多造飛梯夜襲破之執廣嗣等於鼓下周和􅇝汝南人武帝時龍州蠻任公忻李國立等作亂刺史獨􅀌善不能禦朝議以􅇝有武畧代善為刺史月餘斬公忻國立餘黨悉平唐田昉龍州刺史乾寕三年正月王建陷州昉死之宋􅇝咨夔於潛人知龍州州􅀊貢麩金率科鑛户咨夔曰將奉上乃厲民乎出官錢市之江油之民􅀊戍邊復苦軍餉為請於制漕司免之明薛文勝􅇝武􅀄龍州知州率兵從征松潘衞開路修橋借給軍餉既克遂留松潘衞安撫招降生番甚衆章贊元㑹稽人江油典史崇禎十六年流寇至縣令避入山贊原坐縣􅅟不去賊脅降不屈躍入水死本朝乾隆四十一年賜諡節愍羅應選桃源人為龍安府屬官崇禎甲申賊入蜀誓死守城比陷舉家遇害本朝乾隆四十一年賜諡節愍本朝章士穎龍巖人順治丁酉舉人授龍安府推官民素苦逋賦日逃散士穎多方綏輯給以牛種復業者甚衆姜炳璋象山人乾隆甲戍進士知石泉縣作六勤九戒梓以勸儆其民民業山惟種蕎麥充糧因教以注水作堰法始知有水田利又禁火葬嚴嫁娶相沿陋俗多所革去諄諄教諭民有慈父母之稱署江油凡六月决疑獄增書院膏火田除胥役積弊民戴之如石泉江油有舊縣壩乆廢諭民修築躬親督之堰成開田數千畆民因號為姜公堰徐炎浙江人乾隆四十二年知平武縣以常平倉民多積欠不能償即捐廉採補取民欠冊焚之􅀊大旱立壇祈雨引咎自責拜禱烈日中果大雨夜出聽民舎有書聲輒給以紙筆自是力學者衆人物唐陳該顯武人少好學能屬文上元元年進士四舉有道皆高第後為河内縣尉行高職卑不改其操凡厯所職皆以淸廉仁愛著聞李白詳後綿州按李白故宅在今彰明縣南清廉鄉漫波渡唐昌明縣屬綿州巴西郡州又治巴西縣新唐書以白為巴西人故因地附見於此宋張珖彰明人博學工書淳熙中自湖北副曹遷知劒州愛民多善政秋潦為患築隄捍之明王璽判官思民子襲世職善撫番民宣德八年松潘曡溪寺諸處番猓不靖􅁹寇殱魁功升宣撫司僉事闢東南棧堡勸墾民始富又為郡興學校助輸將人徳之祀鄉賢孫瀊知漢川光化兩縣公直廉平民皆祠之李嘉石泉人李嗣必養子為縣諸生乙酉松潘兵亂􅀗嗣泌索金帛不遂將殺之嘉請以身代遂見殺嗣泌􅀗免王懋烈龍安人崇禎中張獻忠殘蜀舉義兵討之兵敗闔門死節本朝乾隆四十一年賜諡烈愍本朝李廷明江油人有勇略明末獻賊躪蜀廷明集衆立砦自守賊不敢犯國初授成都城守副將康熙六年封昭勇將軍同縣廪生羅奇才獻賊至亦部署鄉人設險自衛屢出奇兵􅁍賊全活甚多論功授知縣不就楊懷玉平武人以守備隨征金川乾隆十二年戰殁於河利山贈署都司僉書廕子同縣千總高天祿把總羅􅀖安俱是年金川陣亡外委馬天輔於六十年隨􅁹苗匪陣亡均卹廕如例李芳平武人父成宗病篤芳割股愈之乾隆中旌胡華貴江油人家陰平河中磧父母皆老華貴偶他岀水大至將沒磧急乘筏歸救中道墮水浮沈三里許遇巨石得生向所乘筏亦至遂泝流還與父母俱得免僉云孝感所致張秉榮石泉人官把總乾隆十二年隨征金川陣亡卹廕如例郭興瑞彰明人父渡水而溺掉舟拯之不得隧舎舟以從順流二十里竟全其父謝開運彰明人家敦孝友五世同居宗族内外之間秩然有序里人稱之虎昇龍平武人撫邊營外委嘉慶三年隨􅁹邪匪陣亡同縣外委王穎翠把總楊祿俱戰殁䘏廕均如例敬服銘江油諸生家貧事繼母孝待異母弟如同產嘉慶五年賊匪冉添元犯境母子俱被執母遇害服銘大罵死之同縣彭利川父殁未葬賊至與妻張氏守柩不去皆􅀍害陳端陳常貧而能養賊至父紹唐母唐氏年俱八十餘不能行兄弟執械以衞父母皆見殺父母獲免何端煒賊殺其父母端煒持槍奮撃為賊剖腹而死列女唐李白二孫女伯禽女白卒於當塗元和末宣歙觀察使范傳正祭其􅊘採訪後裔惟二孫女一適陳雲一適劉勸皆編户氓也進止仍有風範因泣言先祖志在青山頃葬東麓非本意傳正為改葬立二碑告二女將改妻士族皆曰夫妻之道命也亦分也欲敗其􅀋所不忍聞傳正嘉歎復其夫徭役宋張珖妻費氏廣都費樞女珖少為進士幾二十年而仕以母老將辭不行費勸之岀事姑彌謹盡斥匳中之藏以具滑甘雖有疾自持不怠至疾平姑或終不知珖得夙夜王事無内顧憂明嚴庸妻袁氏龍州人永樂五年庸至興文閣道墜江死袁赴溺所投水以殉家人購屍兩月弗得後漁人於沙回頭河見二屍相並崖側事聞旌表王正妻任氏龍州人夫殁守節同州高嵩妻劉氏李昺妾石氏石泉蹇俊妻李氏並以節旌王世英妻張氏靑川人夫卒二子繼亡遺孫廷用甫一􅀊撫之成立百有三􅀊乃終有司表其門曰節壽同所李南山妻柴氏龍安嚴某妻張氏並以節旌梁道濟妻楊氏龍安人崇禎末賊將張化龍陷龍安夫婦避亂山中皆爲賊執脅使跪道濟曰我讀聖賢書豈爲賊屈膝耶欲犯楊楊曰爾速殺我隨夫地下足矣賊縛剮之並罵不絶口死本朝舒繼董妻蔣氏江油人夫亡守節事姑孝謹姑病刲股愈之課三子成名雍正年間旌徐成際妻董氏彰明人夫早亡截髪誓志撫子成名雍正年間旌龔瑛妻王氏平武人夫亡守節同縣節婦王懋誠妻宋氏周宗旦妻蘇氏任士舉妻王氏趙加慶妻王氏劉塤妻李氏王瑤妻唐氏王懋恩妻龎氏周白新妻蘇氏高某妻吳氏烈婦康純一妻魏氏尹登壁妻任氏均乾隆年間旌王文忠妻趙氏江油人夫亡守節乾隆年旌鮮于德妻文氏石泉人年十八而寡撫遺腹子又夭焭焭無依兵荒備厯堅白自全同縣節婦文成章妻