  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_190-1a}
body:
  text: 新疆統部東至喀爾喀瀚海及甘肅界西至右哈薩克及蔥嶺界南至拉藏界北至俄羅斯及左右哈薩克界東南至甘肅省界西南至蔥嶺拔達克山痕都斯坦諸屬界東北至俄羅斯界西北至右哈薩克界廣輪二萬餘里北為舊準噶爾部南為回部統轄天山南北事務將軍駐劄伊犂至京師一萬八百二十里建置沿革古為雍州外地前漢武帝時始通西域自天山以南為城郭三十六國地東接玉門陽關西至蔥嶺南北有大山河流其中設都䕶治烏壘城統轄諸國自天山以北東境為匈奴右部地西境為烏孫國地後漢時山北仍為烏孫國及匈奴地山南分為五十餘國設都䕶及長史以統之三國及晉北為烏孫及鮮卑西部地南仍為于闐龜兹諸國地北魏時北為蠕蠕烏孫悅般高車諸國地後周為突厥鐵勒地其南則鄯善盛大服屬諸國焉隋為突厥鐵勒西突厥地南仍為于闐􅀛兹諸國地唐為西突厥沙陀回鶻諸部置北庭大都䕶府以防制北路其南諸國置安西大都䕶府於􅀛兹統龜兹于闐疏勒焉耆四鎮以控禦吐蕃中葉後四鎮為吐蕃所有唐末回鶻徙居北庭五代至宋回鶻又兼取西州諸城服屬於遼元初回鶻首先歸順憲宗置三行尚書省西域居二蔥嶺以東屬巴什伯里行尚書省世祖時西北諸王多叛天山南北設兩宣慰司北則巴什伯里舊作别失八里今改正南則哈喇和卓後為都哩特穆爾地舊作篤來帖木兒今改正明山北為衞拉特舊作瓦刺今改正元臣脫懽之後四衞拉特世居之山南為巴什伯里葉爾羌舊作葉爾欽今改正土魯番諸國本朝龍興元代後裔之分處東北者並久隸版章世為臣僕惟準噶爾厄魯特四部盤踞西北噶爾丹吞噬鄰屬闌入北塞聖祖仁皇帝三臨朔漠翦㓕其衆北土奠平其姪䇿妄阿拉布坦收其遺孼遁保伊犂傳子噶爾丹策淩興師侵服山南之回部執其酋長收其租賦傳子䇿妄多爾濟那木札爾肆行殘暴喇嘛達爾札執而篡之䇿妄之再從姪孫達瓦齊又􅆲奪其位凶殘益甚衆部落不堪命乾隆十八年冬杜爾伯特舊作都爾伯特今改正台吉車淩舊作䇿淩今改正等率數萬人來歸十九年秋輝特台吉阿睦爾撒納和碩特台吉班珠爾等又率衆來歸羣請興師問罪二十年二月高宗純皇帝特命兩將軍率師啓行衆鄂拓克迎降五月至伊犂達瓦齊潰走回人阿奇木霍集斯伯克執以獻準噶爾平六月阿睦爾撒納覬為總台吉不遂煽其衆以叛將軍䇿楞以兵􅁹之阿逆奔哈薩克準部諸台吉相繼作亂二十二年將軍兆惠副將軍富德分路進討哈薩克歸順阿逆奔俄羅斯旋伏冥誅俄羅斯驛致其屍以獻伊犂復定初回酋波羅泥都霍集占久為準噶爾所執及我兵平伊犂釋其縛遣波羅泥都歸葉爾羌城統其舊屬令霍集占居伊犂撫領回衆未幾背恩從逆竄歸舊穴煽動回衆作亂乾隆二十三年我兵進討之克庫車沙雅爾阿克蘇烏什諸城二十四年收和闐喀什噶爾葉爾羌諸城二酋遁入拔達克山境拔達克山歸順函首以獻回部平設總統伊犂等處將軍參贊大臣辦事大臣領隊大臣章京糧員同知及滿漢營官以經理之以準部之烏嚕木齊建為迪化州分屬甘肅省其準回二部之恭誠投順者封爵世襲有差設分理回務諸扎薩克伯克以統理其衆分境鈐轄盡如内地焉初土爾扈特部與䇿妄不睦竄歸俄羅斯乾隆三十六年其汗渥巴錫台吉舍棱等向風慕化率其衆三萬餘户與和碩特部沙畢納爾部越萬有餘里來歸高宗純皇帝覃恩賜爵授以廪餼給以牧地居其部衆於伊犂烏嚕木齊喀喇沙爾塔爾巴哈台諸境於是元裔四衞拉特之衆盡入版圖朝貢賦稅各率厥職其藩屬之投誠歸順者有左右哈薩克東西布魯特霍罕安集延瑪爾噶朗那木干塔什罕拔達克山博洛爾布哈爾愛烏罕痕都斯坦巴勒提諸部自西域底定並􅀊時朝貢唯謹焉諸部並見新疆藩部高宗純皇帝聖製平定準噶爾告成太學碑文曰遼矣山戎薰粥旃裘毳幕之人界以龍沙畜其驒奚雖無恆業厥有分部蓋自元黄剖判萬物芸生東夷西夷各依其地謬舉淳維未為理據皇古莫紀其見之書史者自周宣太原之伐秦致亙海之築莫不畏其侵軼猾夏是虞自時厥後一二奮發之君慨然思挫其鋒而納之宥然事不中機材不副用加以地遠無定處故嘗勞衆費財十損一得搢紳之儒守和親介胄之士言征伐征伐則民力竭和親則國威喪於是有守在四夷羈縻不絶地不可耕民不可臣之言興矣然此以論漢唐宋明之中夏而非謂我皇清之中夏也皇清荷天之龍興東海撫華區有元之裔久屬版章􅀊朝貢從征狩執役惟謹準噶爾厄魯特者本有元之臣僕叛出據西海終明世為邊患至噶爾丹而稍强吞噬鄰蕃䦨入北塞我皇祖三臨朔漠用大破其師元惡伏冥誅脅從遠遯跡毋俾遺種於我喀爾喀厥姪䇿妄阿拉布坦收其遺孼僅保伊犂故嘗索俘取地無敢不共逮夫部落滋聚乃以計襲哈密入西藏準夷之勢於是而復張兩朝命將問罪雖屢􅀗捷而庚戌之役逆子噶爾丹䇿淩能用其父舊人乘我師怠掠畜於巴里坤擣營於科􅁲多於是而準夷之勢大張然地既險遠主客異焉此勞往而無利彼亦如之故額爾德尼招之敗彼亦以彼貪利而深入也皇考謂我武既􅀭不可以既允其請和以息我衆予小子敬奉先志無越思焉既而噶爾丹䇿淩死子䇿妄多爾濟那木札爾暴殘喇嘛逹爾札篡奪之逹瓦齊又􅆲奪喇嘛逹爾札而酗酒虐下尤甚焉癸酉冬都爾伯特台吉䇿淩等率數萬人來歸越明年秋輝特台吉阿睦爾撒納和碩特台吉班珠爾又率數萬人來歸朕謂來者不可以不撫而撫之莫若因其地其俗而善循之且母令滋方來之患於我喀爾喀也於是議進兩路之師問彼罪魁安我新附凡運餉籌䭾長行利戰之事悉備議之始熟經於庚戌之艱者咸懼蹈轍惟大學士忠勇公傅恒見與朕同而新附諸台吉則求之甚力朕謂犂庭掃穴即不敢必然喀爾喀之地必不可以久居若而人毋寕用其鋒而觀厥成即不如志亦非所悔也故凡禡旗命將之典㮣未舉行亦云偏師嘗試為之耳塞上用兵必以秋而阿睦爾撒納禡木特請以春月欲乘彼馬未肥則不能遯朕謂其言良當遂從之北路以二月丙辰西路以二月己巳各啓行哈密瀚海向無雨今春乃大雨咸以為時􅀨之師入賊境凡所過之鄂拓克􅂝羊酒糗糒迎恐後五月乙亥至伊犂亦如之逹瓦齊於格登山麓結營以待兵近萬我兩將軍議以兵取則傷彼必衆彼衆皆我衆多傷非所以體上慈也丁亥遣阿玉錫等二十五人夜斫營覘賊向賊兵大潰相蹂躙死者不可勝數來降者七千餘我二十五人無一人受傷者達瓦齊以百餘騎竄六月庚戌回人阿奇木霍集斯伯克執逹瓦齊來獻軍門準噶爾平是役也定議不過二人籌事不過一年兵行不過五月無亡矢遺鏃之費大勲以集遐壤以定豈人力哉天也然天垂祐而授之事機設不奉行之以致坐失者多矣可與樂成不可與謀始亦謂蚩蚩之衆云爾豈其卿大夫之謂既克集事則又曰苟知其易將勸為之夫明於事後者必將昩於幾先朕用是寒心且準噶爾一小部落耳一二有能為之長而其樹也固焉一二暴失德之長而其亡也忽焉朕用是知懼武成而勒碑丈廟例也禮臣以為請故據實事書之其辭曰茫茫伊犂大幹之西匪今伊昔化外羈縻條支之東大宛以南隨畜獵獸蟻聚狼貪乃世其惡乃恃其遠或激我攻而乘我緩其計在斯其長可窮止戈靖邊化日薰風不侵不距不來其那款關求市亦不禁訶始慕希珍終居奇貨吏喜無事遷就斯愞漸不可長我豈懼其豈如宋明和市之為既知其然飭我邊吏弗縱弗嚴示之節制不仁之守再世斯斬篡奪相仍飄忽荏苒夙沙革面煎鞏披忱集泮飛鴞食黮懷音錫之爵位榮以華裾膝前而請願效前驅兵分兩路雪甲霜鋒先導中堅如鼂錯攻益以後勁蒙古舊屬八旗子弟其心允篤二月卜吉牙旗飄颻我騎斯騰無待折膠泉湧於磧蕪茁於路我衆歡躍謂有天助匪啻我衆新附亦云黃髮未睹水草富春烏魯木齊波羅塔拉台吉宰桑紛紛款納牽其肥羊及馬湩酒獻其屠耆合掌雙手予有前諭所禁侵陵以茶交易大愉衆情衆情既愉來者日繼蠢達瓦齊擁兵自衞依山據淖惟旦夕延有近萬人其心十千勇不目逃掄二十五曰阿玉錫率往賊所銜枚夜襲直入其乳揮矛拍馬大聲疾呼彼人既離我志斯合突將無前縱横鞺鞳案角鹿㻔隴種東籠自相狼藉孰敢攖鋒狐竄䑕逃將往異域回部遮之兇渠斯得露布既至告廟受俘凡此蕆功荷天之衢在古周宣二年乙亥淮夷是平常武詩載越我皇祖征噶爾丹命將禡旗亦乙亥年既符嵗德允協師貞兵不血刃漠無王庭昔時準夷弗恭弗譓今隨師行為師候尉昔時準夷日戰夜征今也偃卧知樂人生曰匪準夷曰我臣僕自今伊始安爾遊牧爾牧爾耕爾長孫子曰無向非豈有今是兩朝志竟億載基成側席不遑保泰持盈高宗純皇帝聖製平定回部告成太學碑文曰建非常之功者以舉非常之事舉非常之事者以藉非常之人然亦有不藉非常之人而舉非常之事终建非常之功者則賴昊蒼篤貺神運斡旋事若禍而移福機似逆而轉順順天者昌逆天者亡故犂準夷之庭掃回部之穴五年之閒兩勲並集始遲疑猶未敢信終劼劬以底有成荷天之龍在兹畏天之鹽益在兹爰敘其事如左逹瓦齊之就俘也伊犂已大定矣無何而阿睦爾撒納叛彼其志本欲藉我力以成己事時也人心未定佐饔者嘗一蜮肆狂萬狙應響蜂屯蟻雜不可爬梳畏難者羣謂不出所料準夷終不可取並有欲棄巴里坤為退守謀然予計其衆志不齊將有歸正倒戈者於是督䇿將帥之臣整師亟進既而伊犂諸台吉宰桑果悔過勤王思討逆賊以自贖此天思助順者一也二酋大小和卓木者以回部望族久為準噶爾所拘於阿巴噶斯鄂拓者也我師既定伊犂乃釋其囚以兵送大和卓木波羅泥都歸葉爾羌俾統其舊屬而令小和卓木霍集占居於伊犂撫其在伊犂衆回乃小和卓木助阿逆攻勤王之台吉宰桑等阿逆賴以苟延及我師再入阿逆遂逃入哈薩克而霍集占亦即收其餘衆竄歸舊穴此天恩助順者二也準夷之事前紀略見梗概兹不複紀紀興師討回之由則以我將軍兆惠在伊犂時曾遣副都統阿斂道往回議事小和卓木乃以計誘阿敏道而拘之及我師抵庫車問罪彼􅂝阿敏道以來援至中途害之及從行者百人彼猶逞其狂悖抗我師顏且敢冒死入庫車城乃雅爾哈善略無紀律致彼出入自由然我滿洲索倫衆兵士無不念國家之恩效疆場之力故能以少勝衆逆渠懼而􅈷脱此天恩助順者三也知僨轅之無濟掄幹材之可任時將軍兆惠以搜􅁹準夷餘黨至布魯特部落已款服其衆因命旋師定回部於是克庫車存沙雅爾定阿克蘇略烏什收和闐師之所至降者望風直至葉爾羌城下而我軍人馬周行萬有餘里亦猶强弩之末矣二酋以其逸待之力統數萬人與我三千餘人戰我師之過河者纔四百餘猶能斬將搴旗退而築堡黑水固守以待此天恩助順者四也萬里之外抱水救火其曷能濟乃予以去年六月即降㫖派兵撥馬欲以更易久在行間者耳故兵馬率早在途一趲進而各爭前恐後人人有敵愾之憤此天恩助順者五也副將軍富德及參贊舒赫德輩率師進援以速行戈壁中馬力復疲值狂回據險坐俟頗有難進之勢夫援軍不能進則固守以待者危矣而參贊阿里衮驅後隊之馬􅃴至夜擣賊營我師内外夾攻彼不知我軍凡有幾萬握炭流湯之徒自相蹂躙顧命不暇於是解黑水之圍鹿駭麞驚遁而保窟我之兩軍合隊全旅以迴阿克蘇此天恩助順者六也既而彼料我必再入泰山之壓難當乃於我師未進之先􅂝其部落載其重器跳而遠去而葉爾羌喀什噶爾二城之舊伯克等遂獻城以降參贊明瑞一邀之於霍斯庫魯克副將軍富德再陷之於阿爾楚爾於是離心者面内前途者反斾二酋惟挈其妻孥及舊僕近三百人入拔逹克山境此天恩助順者七也人跡不通之地語言不同之國既已雀􅇌寕不狼顧其授我與否固未可定也然一聞將軍之檄莫不援旗請奮整旅前遮遂得兇渠函首露布遥傳此天恩助順者八也夷考西師之役非予夙願之圖何則實以國家幅員不為不廣屬國不為不多惟廑守成之志無希開創之名兼以承平日久人習於逸既無非常之人安能舉非常之事而建非常之功哉然而輾轉輻湊每以艱而􅀗易視若失而反得故自締始以逮定功雖予自問亦將有所不解其故而不敢期其必然者故曰非人力也國家者以天也夫祖宗之敬天如是顯佑天愛民􅀩眷顧者深也則我後世子孫其何以心上蒼之心志列祖之志勉繼䋲於有永保丕基於無窮乎繫以銘曰二酋偝德始亂為賊是興王師報怨以直伊犂既平蕞爾奚屑徐議耕闢徐議戍設以噢以咻伊予本懷豈其弗戢圖彼藐回彼回不量怒臂當車戕我王臣助彼狂狙始攻庫車僨轅敗事用人弗當至今為愧悖逆罪重我武宜揚易將整師直壓彼疆阿蘇烏什玉隴和闐傳檄以定肉袒羊牽二酋孼深知不可活狼狽相顧固守其穴桓桓我師周行萬里馬不進焉强弩末矣以四百人戰萬餘虜退猶能守黑水築堡閒信逹都為之傷悼所幸後軍早行在道督勅速援人同怒心曾不兩月賊境逼臨賊境逼臨彼復徼隙馬繼以進賊營夜斫出其不意賊乃大驚謂自天降孰敢鋒攖大鞣大膊如虎搏􅈷案角隴種誰敢迴顧黒水圍解合軍暫旋整旅三路期並進焉賊偵軍威信不可支挈其妻孥遁投所依所依亦回豈不自謀豈伊庇猿而受林憂利厥輜重無遺盡掠遣其都丸遂來獻馘詎惟獻馘並以稱臣捧齎表章將詣都門奏凱班師前歌後舞尸逐染鍔温禺釁鼓露布至都正逮初陽慈寕稱慶亞􅀊迎祥郊廟告成諸典並舉皇皇太學豐碑再樹豐碑再樹敢予喜功用不得巳天眷屢􅀩始之以武終之以文戡亂惟義撫衆惟仁布惠施恩寰㝢共喜古不羈縻今為臣子疆闢二萬兵出五年據實書事永矢乾乾職官伊犂總統伊犂等處將軍一員乾隆二十七年設統轄天山南北各新疆地方駐防官兵調遣事務印房司官一員幫辦司官一員一由京派往一由本處保送筆帖式二員糧餉處司官一員幫辦司官三員一由京派往一由本處保送餘由京廢員内賞給職街派往等帖式一員駝馬處司官一員幫辦司官一員一由京廢員賞給職銜派往一由本處保送筆帖式一員以上正筆帖式四員由本處挑􅀘額設委筆帖式八員由滿兵帖寫内挑補卡倫侍衞十五員由京挑派三年更換軍臺委筆帖式六員參贊大臣一員乾隆二十七年設二員二十九年裁一員嗣後􅀘放無定制撫民同知一員乾隆三十一年設舊為理事同知四十五年改今職理事同知一員乾隆四十五年増設巡檢四員惠遠城一員惠寕城一員乾隆三十二年設綏定城一員拱宸城一員乾隆四十五年設按惠寕城一員乾隆三十六年由綏定城移駐綏定城一員兼管塔勒奇城拱宸城一員兼管東察罕烏蘇俱歸撫民同知管轄以上各官俱三年更換管理惠遠城倉庫糧員一員乾隆四十年設由陜甘兩省同知通判内㨂派管理惠寕城固勒扎綏定城塔勒奇城各倉糧員四員惠寕城固勒扎乾隆三十四年設綏定城塔勒奇城四十八年設由京記名廢員選派俱三年更換領隊大臣五員初無定員乾隆二十九年分統錫伯索倫察哈爾厄魯特四營各一員俱駐惠遠城三十四年增設惠寕城一員署理營務筆帖式十二員滿洲䝉古營四員惠寕城滿洲􅀩古營二員錫伯營二員索倫營二員察哈爾營一員厄魯特營一員分理惠遠城滿洲􅀩古兵協領八員各兵編為八旗每旗協領一員佐領防禦驍騎校各五員佐領四十員乾隆二十九年設三十八員三十一年增設二員防禦驍騎校同防禦四十員驍騎校四十員分理惠寕城滿洲􅀩古兵協領四員乾隆三十五年設三員尋裁一員各管理四旗三十六年増設二員佐領十六員乾隆三十五年設十三員尋以裁去協領一員增設一員三十六年復增二員防禦十六員驍騎校十六員分理錫伯營兵總管一員副總管一員佐領八員乾隆三十年設六員三十二年增二員驍騎校同驍騎校八員分理索倫逹虎爾營兵總管一員副總管一員佐領八員乾隆二十九年設六員三十二年増二員驍騎校同驍騎校八員分理察哈爾營兵總管二員八旗分左右翼每翼一員副總管二員佐領十六員乾隆二十八年兩翼設十二員三十二年増四員驍騎校同驍騎校十六員分理厄魯特營兵總管二員乾隆二十五年設一員三十年増一員副總管三員乾隆二十五年設一員三十年增一員三十七年增設一員佐領二十員乾隆二十五年設六員三十年增六員三十二年增二員三十五年増二員三十七年增四員驍騎校同驍騎校二十員沙畢納爾營副總管職銜佐領一員沙畢納爾乾隆三十六年隨土爾扈特投誠安插伊犂歸入厄魯特下五旗管束三十七年設佐領四員嘉慶二十年於四佐領内增設副總管職銜一員佐領三員驍騎校四員各營有給六品頂帶在侍衞上行走之領催有給七品頂帶之領催委前鋒校又有空藍翎有委領催皆非營制正額不備載管理屯務綠營中營總兵一員乾隆四十四年設遊擊一員乾隆四十五年設守備一員乾隆四十四年設千總二員乾隆四十四年設一員四十五年增一員把總四員乾隆四十四年設二員四十五年增二員經制外委六員乾隆四十四年設三員四十五年增三員額外外委同額外外委