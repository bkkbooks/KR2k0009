騫漢中人建元中為郎應募使西域至大宛大月氏大夏康居諸國並南山歸具為天子言其地形所有拜大中大夫以從擊匈奴功封博望侯後旋失侯因説天子通烏孫昆莫遣公主為其夫人結昆弟以斷匈奴右臂拜中郎將復使西域至烏孫分遣副使之旁大國騫與烏孫使者數十人還拜為大行􅀊餘卒其副使往諸國者頗與其人俱來西北國始通於漢騫鑿空諸後使往者皆稱博望侯以為質於外國外國由是信之其後益遣使出師擊破姑師虜樓蘭王列亭障至玉門而漢使窮河源河源出于闐其山多玉石采來天子案古圖書名河所出山曰昆侖皆自騫發之云傅介子北地人以從軍為官初􅀛兹樓蘭王皆常殺漢使者盜取財物介子以駿馬監使大宛詔令責樓蘭龜兹皆服罪從大宛還匈奴使者在􅀛兹介子率其吏士誅斬之拜中郎遷平樂監大將軍霍光白遣介子往刺樓蘭王介子至樓蘭將王入帳中屏語因刺殺之告諭其國以王􅀒漢罪天子遣我來誅王當更立前太子質在漢者漢兵方至毋敢動動滅國矣遂持王首還論功封義陽侯常惠太原人宣帝時使烏孫烏孫公主及昆彌因惠言請發五萬騎從漢擊匈奴天子使惠䕶烏孫兵大克􅀗還封長羅侯復遣惠持金璧賜烏孫貴人有功者惠奏請龜兹國嘗殺校尉賴丹未伏誅請便道擊之因發西國東國兵各二萬人烏孫兵七千人合攻龜兹􅀛兹謝罪縛其貴人姑翼詣惠惠斬之而還鄭吉會稽人為人强執習外國事自張騫通西域李廣利征伐之後初置校尉屯田宣帝時吉以侍郎屯渠犁積榖因發諸國兵攻破車師遷衞司馬使䕶鄯善以西南道神爵中匈奴日逐王來降吉發兵迎之將詣京師威震西域遂并䕶車師以西北道故號都䕶都䕶之置自吉始焉封安遠侯吉於是中西域而立莫府治烏壘城鎮撫諸國漢之號令班西域者始於張騫成於鄭吉陳湯山陽瑕邱人遷西域副校尉與騎都尉甘延壽俱出湯沈勇有大慮多䇿謀喜奇功先是匈奴郅支單于西破呼偈堅昆丁令兼三國而都之數困辱漢使者殺漢䘙司馬谷吉西挾康居擊破烏孫日益驕倨湯矯制發城郭諸國兵戊巳校尉屯田吏士勒陳往攻之傅其城擊去康居兵斬郅支單于首得漢使節二及谷吉等所齎帛書以歸中書令石顯丞相匡衡抑其功宗正劉向上書訟之遂封延壽義成侯賜湯爵關内侯段會宗天水上邽人竟寕中為西域都䕶西域敬其威信三􅀊更盡還後數年西域諸國上書願得會宗陽朔中復為都䕶更盡還以病免􅀊餘烏孫諸翖侯大亂會宗以左曹中郎將往使定其國而還元延中復遣㑹宗發戊巳校尉諸國兵即誅烏孫太子番邱會宗選精兵三十弩逕至昆彌所在召番邱責以罪手劒擊殺之小昆彌烏犂靡勒兵數十騎圍會宗會宗與語號泣罷去還賜爵關内侯其後卑爰㚄擁衆欲害昆彌漢復遣會宗往安輯之逾年病卒烏孫中城郭諸國為發喪立祠焉後漢耿恭扶風茂陵人少慷慨多大畧有將帥才永平中為戊己校尉屯後王部金蒲城移檄烏孫諸國宣示漢威德皆遣使獻名馬願遣子入侍恭乃發使迎其侍子匈奴左鹿蠡王攻金蒲城恭乘城搏戰以毒藥傅矢射之匈奴解去恭以疏勒城旁有㵎水可固引兵據之匈奴復來攻擁絶澗水恭於城中穿井十五丈不得水仰歎曰聞昔貳師將軍拔佩刀刺山飛泉湧出今漢德神明豈有窮哉乃整衣服向井再拜有頃水泉奔出衆皆稱萬􅀊乃令吏士􅀭水以示寇遂引去其後車師畔與匈奴共攻圍恭數月食盡窮困乃煑鎧弩食其筯革與士卒推誠同死生故皆無二心而稍稍死亡單于更益兵圍之時肅宗即位遣將擊車師攻交河城車師降恭故吏范羌從山北迎恭因相隨俱歸且戰且行三月至玉門以忠節拜騎都尉班超扶風平陵人有志不修細節永平十六年竇固擊匈奴以超為假司馬將兵别擊伊吾多斬􅀗固遣超使西域至鄯善鄯善王廣奉超禮甚備後以有匈奴使者忽更疎懈超覺之悉會其吏士三十六人夜奔匈奴使者營會大風超令十人持鼓伏舍後約見火擊鼓大呼餘悉持兵夾門而伏超乃順風縱火前後鼓噪擊斬其使及從士三十餘級餘衆悉燒死乃以使首示王廣曉告撫慰之遂納子為質授軍司馬收撫西域降于窴王廣德遣吏縛疏勒王兜題其後焉耆攻没都䕶陳睦龜兹姑墨數攻掠疏勒超士吏單少肅宗即位徴超超發還于窴王以下抱超馬足不得行乃更還疏勒捕斬反者擊破尉頭兵疏勒復定建初三年攻姑墨石城破之五年擊破疏勒反者番辰因發疏勒于窴兵擊莎車明年莎車降自此威震西域永元二年月氏來服明年􅀛兹姑墨温宿皆降乃以超為都䕶居龜兹它乾城六年大發衆討焉耆尉犂危須收其王廣汛等於陳睦故城斬之傳首京師西域五十餘國悉皆納質肉屬封定遠侯超在西域三十一年上疏乞還至洛陽卒班勇超子有父風永初元年西域叛以勇為軍司馬迎都䕶還因罷都䕶元初六年敦煌太守曹宗請復取西域勇上議不可許宜復敦煌郡營兵置副校尉居於敦煌復置長史屯樓蘭延光二年以勇為西域長史屯柳中明年勇至樓蘭鄯善歸附開示恩信龜兹王率姑墨温宿自縛來降因發其兵擊走匈奴收復車師前部四年擊破車師後部更為立王於是車師六國皆平復擊走匈奴數萬餘衆城郭皆安後與敦煌太守張朗討焉耆王元孟張朗徼功先進勇以後期徴還免官唐裴行儉絳州聞喜人累擢安西都䕶西域諸國多慕義歸附儀鳳二年十姓可汗阿史那都支及李遮匐誘蕃落以動安西詔行儉册送波斯王且為安撫大食使權以制事徑莫賀延磧道迷饑乏行儉止營致祭行數百步水草豐美後來者莫識其處衆以為神至西州􅀭言大􅀬未可以進徐召四鎮約畋倍道至都支帳相去十餘里因召都支詣營謁遂擒之並執諸部酋長送碎葉城􅂤精騎襲遮匐遮匐降悉俘至京師將吏為之刻石碎葉城以紀功阿史那社尒突厥人處羅可汗次子以智勇聞貞觀初内附十四年以交河道行軍總管平高昌二十一年以昆邱道行軍大總管與郭孝恪等五將軍發鐵勒十三部突厥騎十萬討龜兹師次西突厥擊處密處真部敗之入自焉耆西龜兹震恐大破之拔都城追擒其王降者七十餘城刻石紀功而還因説于闐王入朝孝恪在軍牀帷器用多飾金玉以貽社尒不受帝聞而嘉之卒陪葬昭陵治冢象蔥山王方翼并州祁人裴行儉討遮匐奏為副兼檢校安西都䕶方翼築碎葉城面三門紆還多趣以詭出入五旬畢西域胡縱觀莫測其方畧悉獻珍寶永淳初十姓阿史那車簿啜叛圍弓月城方翼引兵戰伊麗河敗之俄而三姓兵大至方翼次􅀬海進戰矢著臂引佩刀斷去遣騎分襲皆驚潰引兵遁去西域震服以功遷夏州都督蘇烈字定方以字行冀州武邑人驍悍有氣決從李靖討平突厥頡利擢伊麗道行軍大總管討賀魯出金山北擊處木昆部破之俟斤嬾獨祿以衆萬帳降賀魯率兵十萬拒戰定方兵少令步卒據高攢矟外向自引勁騎陣北原賊三突步陣不能入因其亂擊之斬首數萬級五弩失畢舉衆降乘大雪追北縛賀魯以還由是修亭障列蹊隧唐之州縣極於西海封邢國公高宗時思結闕俟斤都曼先鎮諸胡及疏勒朱俱波喝槃陀諸國叛以定方為安撫大使討平之葱嶺以西遂定薛仁貴絳州龍門人副鄭仁泰為鐵勒道行軍總管時九姓衆十餘萬令驍騎數十來挑戰仁貴發三矢輒殺三人賊氣懾皆降仁貴慮為後患悉坑之轉討磧北餘衆擒偽葉䕶兄弟三人以歸軍中歌曰將軍三箭定天山壯士長歌入漢關王孝傑京兆新豐人以軍功進為右鷹揚䘙將軍孝傑居西戎地久盡悉其虛實初貞觀時設􅀛兹于闐疏勒碎葉為西域四鎮後沒於吐蕃長夀元年孝傑為武威總管討吐蕃盡復故土復置安西都䕶府於􅀛兹遷左衞大將軍本朝班第􅀩古鑲黃旗人乾隆十九年準噶爾内亂以兵部尚書赴北路軍營籌辦軍務授定北將軍二十年以定邊左副將軍阿睦爾撒納副之偕西路定北將軍永常定邊右副將軍薩喇勒先後進􅁹五月大衆入伊犂準噶爾屬衆盡降上奬第首功封一等誠勇公六月􅀗其台吉達瓦齊獻俘京師與鄂容安駐守伊犂伊犂既定阿睦爾撒納蓄異志覬據之弟及鄂容安薩喇勒以其叛迹已著密疏劾之時先有㫖令阿睦爾撒納入覲第等乃趣其行七月令喀爾喀親王額林沁多爾濟監同起程行至烏隆古怱以印授額林沁多爾濟徑由額爾齊斯遁遂叛阿巴噶斯哈丹等掠臺站伊犂道梗逆黨糾喇嘛回人作亂第與鄂容安陷賊中由固勒札赴空格斯轉戰至烏蘭庫圖勒賊蠭集力不支遂自盡賜祭葬如例諡義烈入祀昭忠祠又特建􅀟烈祠並祀鄂容安圖形紫光閣聖製雙烈詩聖製贊鄂容安滿洲鑲藍旗人乾隆十九年準噶爾内亂命赴軍營辦事授西路參贊大臣二十年與定邊右副將軍薩喇勒由西路進􅁹沿途招降各部人衆五月大軍定伊犂達瓦齊遁鄂容安偕喀爾喀郡王品級青滚雜卜等收其遊牧􅀗逹瓦齊之叔及其孥並喇嘛六千餘六月達瓦齊就擒鄂容安同班第駐守伊犂時阿睦爾撒納為定邊右副將軍蓄異志謀據伊犂鄂容安同班第等密䟽劾之諭趣阿睦爾撒納赴覲􅀬河命鄂容安與薩喇勒以兵至塔爾巴哈台相機擒治會阿睦爾撒納行至烏隆古叛逆黨應之臺站斷鄂客安同班第被陷力戰自盡賜祭葬如例諡剛烈入祀昭忠祠並祀雙烈祠之圖形紫光閣聖製詩旌聖製贊明瑞滿洲鑲黃旗人襲一等承恩公爵乾隆二十一年以副都統銜赴西路軍營在領隊大臣上行走時阿睦爾撒納叛竄哈薩克明瑞隨定西將軍逹勒黨阿追之再與哈薩克戰多斬􅀗二十四年加賞毅勇字號授為承恩毅勇公五月隨將軍兆惠勦逆回霍集占於葉爾羌敘功賞雲騎尉世職八月逆酋大小和卓木遁率銳卒往遮力戰敗賊二十六年伊犂回部功成圖形紫光閣聖製贊二十七年授伊犂將軍三十年烏什小伯克賴黑木圖拉等據城為變明瑞親統兵進八月克復之後以征緬甸授一等誠嘉毅勇公陣亡諡果烈舒赫德滿洲正白旗人乾隆二十三年以頭等侍衞銜駐防阿克蘇十月將軍兆惠追􅁹逆回霍集占冞入被圍命定邊右副將軍富德往援授舒赫德參贊大臣十二月簡阿克蘇鋭卒并諸路兵先至者馳援兆惠軍二十四年與富德合軍至呼爾璊賊騎五千餘迎戰擊敗之轉戰五日四夜戮賊千餘會阿里衮督解馬亦至乘夜呼突斫陣兆惠聞鎗礮聲知援至夾擊逆酋波羅泥都中鎗遁二十六年圖形紫光閣聖製贊三十六年土爾扈特等全部歸順命往經理撫輯悉心籌畫動合機宜卒諡文襄入祀賢良祠伊勒圖滿洲正白旗人乾隆三十五年授伊犂將軍六月土爾扈特汗渥巴錫台吉策伯克多爾濟並舍棱等率部衆三萬餘户歸順命伊勒圖加意撫綏俾得所四十年疏言伊犂屯田兵三千現改駐􅂝眷兵應就近增建城堡議從所請在外宣力多年辧理蒙古厄魯特等部落事務衆部落皆心服且久任伊犂將軍辦事妥協卒諡襄武入祀賢良祠阿桂滿洲正白旗人乾隆二十四年往霍斯庫魯克同副將軍富德􅁹辦逆回霍集占八月追賊至阿勒楚爾又追至伊西洱庫爾諾爾回衆乞降霍集占遁走拔達克山是年回部悉平命管理伊犂屯田事務奏籌辦耕牧城守各事宜又奏請定山川土榖諸祀典二十五年以西陲底定圖形紫光閣聖製贊二十六年奏伊犂牧羣蕃息請停止内地購辦又奏招徕葉爾羌喀什噶爾阿克蘇烏什等處回人添駐伊犂耕種三十二年授伊犂將軍卒諡文成奎林滿洲鑲黄旗人乾隆四十五年授烏嚕木齊都統四十六年奏庫爾喀喇烏蘇精河􅀊需兵八百給屯差今改派眷兵六百四十六尚缺兵百五十四請撥濟木薩瑪納斯兵􅂝眷移駐下軍機議行又奏請將烏什葉爾􅆧駐防兵照喀什噶爾英吉沙爾例三年一換議行是年授烏里雅蘇臺將軍五十年授伊犂將軍卒諡武毅保凝􅀩古正白旗人乾隆五十二年授伊犂將軍五十四年奏請增設委前鋒參領嘉慶三年請撥伊犂積貯銀一萬生息養所屬鰥寡􅀌獨上從之保凝久任伊犂鎮静安詳藩部悅服卒諡文端大清一統志伊犂在迪化州西一千七百七十里東至額通古里嶺接喀喇沙爾界西至塔拉斯河接藩屬右哈薩克界南至沙圖阿璊軍臺接阿克蘇界北至巴勒喀什池接左哈薩克界東南踰天山接庫車界東北至呼蘇圖布拉克軍臺接庫爾喀喇烏蘇界西南至英噶爾接東布魯特界西北至吹河接右哈薩克界至京師一萬八百二十里建置沿革漢爲烏孫國地後漢至晉並同北魏爲悦般高車國地周爲突厥地隋爲西突厥及石國地唐爲西突厥地有數部突騎施索葛莫賀部入唐爲嗢鹿州都督府突騎施阿利施部入唐爲絜山都督府皆隸北庭都䕶府又西境爲笯赤建國及石國東境地宋為回鶻地後屬西遼元為阿爾穆爾舊作阿力麻里今改正諸王海都行營處後屬都哩特穆爾舊作篤來帖木兒今改正明為衞拉特地舊作瓦刺今改正本朝為準噶爾庭乾隆二十年官軍進討準噶爾諸鄂托克爭先降五月我兵抵伊犂厥酋達瓦齊率萬餘人渡河遁追及之回人霍集斯伯克擒之以獻伊犂平八月阿睦爾撒納畔將軍策楞以兵追至塔勒奇嶺阿睦爾撒納奔哈薩克十一月準部台吉呢瑪哈薩克沙喇與巴雅爾莽噶里克等搆亂將軍兆惠東援屢殲賊衆二十二年以富德副兆惠軍分南北路進討時阿睦爾撒納自哈薩克歸富德追之哈薩克降阿睦爾撒納奔俄羅斯餘黨以次擒滅伊犂復定二十九年於伊犂河北建惠遠城三十年建惠寕城先是二十七年於伊犂河北二十里築寕遠城城東北岡上恭勒高宗純皇帝聖製平定準噶爾勒銘伊犂碑文後勒銘伊犂碑文各一篇四體字書刻石於其上高宗純皇帝聖製平定準噶爾勒銘伊犂之碑曰惟盡所覆俾我皇清罔不在宥惟清奉天昊天撫薄海兆庶悉主悉臣叶太祖宗世祖肇基宅中皇耆其武太聖祖世宗覲光揚烈克臻郅隆逮予藐躬思日孜孜期四海同風咨汝凖噶爾叶亦􅀩古同􅀋何自外􅂝數世梗化篡奪相仍碩仇其下厥達瓦齊甚毒於酲衆心疧疧如苗斯蟊如􅳐斯螫衆口嗷嗷視爾嗷止予焦勞止期救不崇朝止視爾疧止予噫嘻止亟出汝塗泥止迺命新附爾為先鋒熟悉其路迺命勁旅􅂝數月糧母或掠擄師行時􅀨王旅嘽嘽亦無潦阻左旋右抽王旅渾渾既暇以休烏嚕木齊及五集賽度之折折台吉宰桑迎降恐後奚事斧吭波羅塔拉闥爾奇嶺險如關闔倒戈反攻達瓦齊走旦夕塗窮回部遮􅀗彼䑕斯喙地入無隙露布飛至受俘午門爰貸其罪自今伊始四部我臣伊犂我宇叶曰綽羅斯及都爾伯特和碩特輝特封四可汗衆建王公游牧各安宰桑公臣屬我旗籍誰汝苦辛爾恭爾長爾孳爾幼徐以教養爾駝爾牛爾羊爾馬畜牧􅄖游分疆各守母相侵陵以干大咎齊禦外域曰布魯特越哈薩克醉飲飽食敬興黄教福自天錫伊犂平叶矣勒貞珉矣於萬斯年矣高宗純皇帝聖製平定準噶爾後勒銘伊犂之碑曰天之所培者人雖傾之不可殛也天之所覆者人雖栽之不可殖也嗟汝準噶爾何狙詐相延以世而為賊也彊食弱衆陵寡血人於牙而茂知悛易也云興黄教敬佛菩薩其心乃如夜叉羅刹之以人為食也故罪深惡極自作之孼難逭活也先是分封四部衆建宰桑四圖什墨廿一昂吉蓋欲繼絶舉廢以休以息也而何煽亂不己焦爛為期終於淪亡胥盡伊犂延袤萬里寂如無人之域也是非我佳兵不戢以殺為德也有弗得已耳西師之什實紀其詳悉也以其反覆無常遲益久而害益深則其叛亂之速未嘗非因禍而致福也是蓋天佑我皇清究非人力也伊犂既歸版章久安善後之圖要焉已定者詎宜復失也然屯種萬里之外又未可謂計之得也其潛移黙運惟上蒼鑒之予惟奉時相機今日之下亦不敢料以逆也是平定準噶爾後勒銘伊犂之碑所由作也晷度北極高四十三度五十六分距京師偏西三十四度二十分夏至晝長六十一刻一分夜長三十四刻十四分冬至晝長三十四刻十四分夜長六十一刻一分午正日景夏至長三尺七寸三分冬至長二丈四尺零四分春分秋分長九尺六寸四分西域圖志按西域圖志謂九州以外分野之説不足信爰舉極度晷景髙卑贏縮之數志之兹謹遵纂入分著各篇形勢西雷翥海南疏勒北瀚海唐書突厥傳居天山之陰形勢甲於諸部氣􅀱和暖人民殷庶物產饒􅁉西陲一大都㑹西域圖志風俗烏孫不田作種樹隨畜逐水草與匈奴同俗漢書西域傳其俗皆逐水草無城郭惟所屬回人因其舊俗築城以居西域圖志城池惠遠城在伊犂河北乾隆二十八年築周九里門四東曰景仁西曰悅澤南曰宣闓北曰來安五十八年增築東面展二百四十丈熙春城在惠遠城東八十里地名哈喇布拉克西北距綏定城一百里乾隆四十五年築周二里門三東曰覲恩西曰凝爽南曰歸極寕遠城在伊犂河北惠遠城東南九十里地名固勒札西北距熙春城十里乾隆三十七年築周四里門四東曰景旭西曰環瀛南曰嘉會北曰歸極綏定城在惠遠城西北三十里地名烏哈爾里克東南距惠寕城九十里乾隆二十七年築周四里門三東曰仁熙西曰義集南曰利渠塔勒奇城在惠遠城西北三十里東距綏定城十里北距廣仁城五十里西北距拱宸城八十里乾隆二十六年築周一里五分六釐無城名亦無門名瞻德城在惠遠城西北七十里地名察罕烏蘇東少北距廣仁城二十里東南距塔勒奇城三十里乾隆四十五年築周三里門三東曰升瀛西曰履平南曰延景廣仁城在