body:
  text: 大清一統志桂林府二津梁陽橋在府城内譙樓前宋建名青帶又名通濟明初修改今名本朝順治十八年修永濟浮橋在臨桂縣東江門外明正徳四年撫臣陳金造舟五十兩岸植鐵柱四中貫以鐵纜二各長百餘丈後廢本朝順治十七年重建雍正六年修天柱橋在臨桂縣東舊名花橋又名嘉熙明景泰閒建有石筍自平坡􅊳起形如礎柱故名本朝康熙二十年修乾隆三十三年重修横橋在臨桂縣南門外舊建以扼全城水􅀔後圯本朝康熙二十四年重建定西橋在臨桂縣西門外長安橋在臨桂縣文昌門外二里舊名太平橋本朝乾隆五十年修西新橋在臨桂縣武勝門外明洪武初建本朝乾隆六十年修獨峯橋在興安縣西南二十餘里本朝雍正十一年重建萬里橋在興安縣東北一里灕江上唐李渤建明洪武時修長夀橋在靈川縣西四里本朝康􅄉三十年建甘棠橋在靈川縣西南二十里舊有甘棠渡本朝康熙五十一年撫臣陳元龍造舟三十爲浮梁乾隆二十九年修安行橋在靈川縣北七里攀龍橋在陽朔縣東北四十里宋淳祐間建廣豐橋在陽朔縣東北一百里宋嘉興時建太平橋在永寕州北郭外明萬厯間建本朝康􅄉六十一年重建華蓋橋在永福縣東舊名獅于橋宋淳􅄉中建惠政橋在義寕縣南門外和豐橋在義寕縣南三里飛鸞橋在全州西五里跨羅水宋建本朝康熙二十年重建乾隆年間修廣濟橋在全州西五十里跨白沙水明嘉靖中建本朝雍正七年修文家橋在全州東北八十里明嘉靖間建長二十餘丈上覆以屋兩埠有亭市賈日集亭下龍川橋在灌陽縣北三里明洪武初建通濟橋在灌陽縣北十里明初建曰登雲景泰間上覆瓦亭改曰德興後圯本朝康熙三十六年重建更今名隄堰回濤隄在臨桂縣東唐書地理志桂林東南有回濤隄以捍桂水貞元十四年築寰宇記在城東南十五步桂江西岸其水南流經桂嶺去州二百餘里水勢極高唐貞元十四年刺史王拱築隄長五百五十四步以捍水勢龍眼堰在興安縣東又辛家堰在縣南皆靈渠之水分引溉田處南北二堰皆在靈川縣北三里堰潞江水溉田二千餘頃又有蓮花塘在縣南黄花塘在縣西北皆瀦水溉田處東石渠在陽朔縣東獅子山下石崖天成有兩甕深數丈積水澄泓靈陂有二一在臨桂縣東北二十里唐景隆中桂州都督王晙堰灕水溉田處宋乾道中經畧李浩開營田再築淳熙中經畧詹儀之重修久廢一在陽朔縣西北七十里雷雨所成涌水成江瀦以溉田趙家陂在興安縣西七里源出石康嶺又八字陂在縣治東半里許斜陂在縣北四里引靈渌水合北渠沿潭陂在縣西三十里上承趙家陂下合灕江觀陂在縣西五十里引黄柏六峒水溉田昌陂在縣南六十里引湯海山水灌田清渌陂在陽朔縣西十五里亦曰清渌塘溉田甚廣湖塘在臨桂縣東十五里又有龍塘二塘相通廣數百畝其旁又有潤塘耿塘又石家九塘在縣南沙塘在縣西俱利灌溉古育塘在義寕縣東北相近為横塘又有壺塘在縣南皆灌田數百畝陵墓古雙塚在臨桂縣境寰宇記臨桂縣有雙妃塜高十餘丈周􅂞二里舊傳二妃㝷舜而卒葬於此三國呉薛翊墓在陽朔縣西威南山下唐歐陽普贊墓在臨桂縣北寰宇記在桂州北郭外松林盡處唐初安南都䕶本靈川人葬此其舊宅今聖壽寺是有廟在寺北宋唐承裕墓在全州西覺山鋪下明靖江諸王墓在臨桂縣北堯山麓蔣冕墓在全州尹家塘孝子曹正儒墓在全州湴塘本朝陳宏謀墓在臨桂縣東畔村宏謀任東閣大學士乾隆三十七年賜祭葬陳枚墓在全州馬山枚知山東堂邑縣贈中憲大夫祠廟三先生祠在府學明倫堂之旁祀宋周子二程子張栻有碑記今廢四賢祠在府城内祀明王守仁山雲舒清劉大夏三賢祠在府城内祀本朝巡撫郝浴學政王如辰運使高熊徵康熙年間修有孫勷碑記雙忠祠在府城内本朝康熙二十一年勅建祀巡撫馬雄鎮􅀓宏烈諸葛武侯祠在府西寶積山元至治間追封威烈忠武顯靈仁濟王十一年奉本朝雍正㫖修建李衞公祠在臨桂縣東七星山下祀唐李靖裴公祠在臨桂縣東南訾家洲上祀唐裴行立定南王祠在臨桂縣曡綵山郡人立祠祀本朝定南王孔有德陽海祠在興安縣陽海山下舊志一名靈澤廟宋乾道間范成大請封為靈澤侯故名本朝雍正十年重修勅封安流襄績陽海山神御書陽朔靈源扁額俞公祠在永寕州西南隅祀明總兵俞大猷七先生祠在全州學宋嘉定八年州守林岊建祀周程張朱五子及柳開張栻岊有碑記柳侯祠在全州北柳山祀宋柳開有孫次鐸碑記忠孝祠在全州湘山祀明曹學臣及子正儒平章廟在府城内西北祀元平章政事額爾吉訥本朝乾隆十九年學使許道基有碑記舜廟在臨桂縣東北寰宇記在臨桂縣虞山下宋淳熙間修本朝康熙十六年奉勅修内有御書清慎勤扁乾隆二十三年修四十五年重修伏波廟在臨桂縣伏波山下寰宇記在桂州郭中東北二里唐乾符二年勅封靈昭王本朝乾隆五十八年修堯廟在靈川縣南堯山宋淳熙間桂州經畧使張栻修有謁廟文刻石本朝雍正八年修嘉慶五年重修于公廟在永寕州南門外祀唐于向廣福王廟在義寕縣西北十五里舊稱惠安廟祀蜀漢禆將武當當偕諸􅁑武侯南征追奔踰嶺溺死智慧源後土人祀之禱雨輒應紹興間加封英濟廣福王其後臨桂靈川皆有廟本朝乾隆八年勅封顯佑英濟廣福王二妃廟在全州城南祀虞帝二妃漢􅀄平元年建唐元和九年修柳宗元有碑銘本朝乾隆十二年修嘉慶四年重修盤石廟在全州西三里祀宋州守王世行黄庭堅有記寺觀萬壽寺在府城南門外隋建舊名永安元賜書圓覺虞集作記本朝順治十五年重建棲霞寺在臨桂縣東七星巖下唐建本朝順治十五年重建如意寺在靈川縣南唐建本朝康􅄉五十八年重建為慶賀習儀所鑑山寺在陽朔縣南鑑山下宋建報恩寺在陽朔縣北宋景定間建上乗寺在永福縣東門外明洪武初建香林寺在義寕縣西南唐咸通五年建湘山寺在全州西門外湘山之陽唐乾符三年建有無量壽佛塔本名光孝寺又名景德寺宋賜今額本朝康熙五十二年御書壽世慈蔭扁額慧明寺在灌陽縣西關外舊名梁興唐建宋祥符間賜額大覺寺在灌陽縣北五十里舊名黄潭宋熙寕中賜額慶林觀在臨桂縣東七星山棲霞洞前又名東觀唐建五嶽觀在臨桂縣西唐建名天慶觀宋改今名亦名東觀名宦晋干寶新蔡人始安太守治尚清靜公退即務著述南北朝宋顔延之臨沂人少帝時遷始安太守謝晦謂延之曰昔阮咸為始平郡今卿又為始安可謂一始齊裴昭明聞喜人永明三年為始安内史郡人龔元宣詭云神人與其玉印玉版書不須筆吹紙便成字以此惑衆前後郡太守敬事之昭明付獄案罪梁裴䆳聞喜人天監中遷始安太守䆳志立功邊陲不願閒逺乃致書吕僧珍曰昔阮咸顔延之有二始之嘆吾才不逮古人今為三始非其願也唐李襲志安康人武德初高祖召為桂州總管封始安郡公轉桂州都督前後任桂州二十八年政尚清省南荒便之魚孟威咸通中鎮桂州時靈渠十八斗門己廢孟威以石為鏵隄亘四十里植大木為斗門至十八重乃通巨舟宋柳開大名人端拱初知全州西延洞有粟氏常刧民口糧畜開作衣帶巾㡌選牙吏勇辯者三軰使人以利害諭之粟氏懼留二吏為質率其酋四人與一吏偕來開厚其犒賜遣還如期攜老㓜悉至開賦其居業作時鑑一篇刻石戒之常延信平晉人雍熙中爲全郡六州都巡檢使充羊狀六砦都鈐轄誠州蠻歸欵命延信馳入溪峒索其要領又逐蠻直趣古鎮過西延大木諸峒蠻人慴服曹克明百文人景德中知桂州兼管勾溪峒公事州人覆茅爲屋􅀊多火克明選北軍教以陶瓦又激江水入城以防火災馮伸已河陽人天聖中自邕州改知桂州兼廣西鈐轄會安化蠻犯邊官軍不利仁宗遣中人􅃐伸已討之伸已疾馳至宜州單􅀐出陣語酋豪曰朝廷撫汝甚厚汝乃自取滅亡即皆仰泣羅拜率衆降陶弼永州人慶厯中討儂智高以功得陽朔簿後調陽朔令課民植木官道旁夾數百里行者無暑暍之苦他郡縣悉效之陸詵餘杭人知桂州自儂猺定後交人浸驕守帥常姑息詵至部其使者黎順宗來詵召問折諭懾伏而去詵遂至邕州集左右江四十五峒首詣麾下閲簡壯丁五萬補置將吏更鑄印給之軍聲益張交人遣使入貢張田澶淵人知桂州異時蠻使朝貢假道與方伯抗禮田獨生堂上使引入拜於庭而犒賄加腆土豪劉紀盧豹素爲邊患訖田去不敢肆京師禁兵來戍不習風土往往病於瘴癘田以兵法訓峒丁面奏罷戍蕭注新喻人神宗時知桂州既至種酋皆來謁注延訪山川曲折老㓜安否均得懽心有獻征南䇿者輒不聽縣構博平人神宗時交阯入寇以構知桂州聲言將犄角搗其巢穴寇聞引去劉􅂜福州人熙寕中知桂州言舊制宜邕桂融欽五部土丁成丁已上者皆籍之既接蠻徼自懼宼掠守禦應援不待驅䇿而近制主户自第四等已上三取一以爲土丁而旁寨多非四等已上若三丁籍一則減舊丁十之七餘三分以爲保丁保丁多處内地又俟其益習武事則當蠲上丁之籍恐邊備有缺請如舊制從之張頡桃源人熙寕中知桂州黎峒首領請出兵自効命頡處其事頡召見補以牙校喜而去詔問何賞之薄對曰荒徼蠻蜑無他覬得是足矣尋罷兵海外訖無事熊本鄱陽人元豐中宜州蠻􅅰邊徙本知桂州至則諭溪峒酋長戒邊吏勿生事請選將練兵代戍益市馬以足􅀐兵宜州遂無事時以順州賜李乾德疆畫未正交人縁是輒􅁀勿陽地本檄問􅃺乾德歛兵謝本因請以宿桑八峒不毛之地賜之南荒遂安轉運判官許彦先某通湖南鹽於廣西計口授民度可得息三十萬本言桂管民貧地瘠恐不堪命議遂格謝麟甌寕人元祐初知桂州融江有夷警將吏議致討麟部土人使極南而北兵止屯近郡賴以全者甚衆徐勣南陵人哲宗時選桂州教授王師討交阯轉運使檄勣從軍餉路瘴險民當役者多避匿捕得千餘人使者使勣杖之勣曰是固有罪然皆饑羸病乏不足勝杖使者怒欲並劾勣勣力爭不變郭逵宿留不進勣謂副使趙卨曰師出淹時而主帥無討賊意何由成功因具蠻人情􅃺疏於朝既而逵卨果皆以無功貶沈晦錢塘人紹興問為廣西經畧知靜江府南州蠻酋莫公晟歸朝用為本路鈐轄羈縻之後遁去旁結諸蠻􅀊岀為邊患晦選老將羅統戍邊招誘諸酋諭以威信皆詣府請降晦犒遺之結誓而去自是公晟􅀌立不復犯邊高登漳浦人紹興中由富川簿調古縣令豪民秦琥不法登置之死一郡快之桂帥胡舜陟以古縣為秦檜父舊治屬登祀之登不可范成大吳郡人乾道九年知靜江府廣西專藉鹽利漕臣盡取之於是屬已有増價抑配之弊成大入奏謂能裁抑漕司强取之數以寛郡縣則科抑可禁帝從之舊法馬以四尺三寸為限詔加至四寸以上成大謂互市四十年不宜驟改張孝祥烏江人孝宗時知静江府兼廣南西路經畧安撫使治有政績張栻綿竹人孝宗時知靜江府經畧安撫廣南西路所部荒殘多盜栻簡州兵汰冗補闕籍諸州黥卒伉健者為効用申嚴保伍羣蠻帖服朝廷買馬横山邊民告病而馬不時至栻究其利病六十餘條奏革之李浩臨川人孝宗時知靜江府兼廣西安撫舊有靈渠通漕運及灌溉􅀊久不治命疏通之民賴其利邕管所隸安平州其酋恃險謀聚兵為邊患浩遣單使諭以禍福許其引赦自新即日焚撤木柵聽大府約束應孟明永康人孝宗時知靜江府兼廣西經畧安撫初廣西鹽易官般為客鈔客户無多折閲逃避遂抑配於民公私交病孟明奏除其弊禁卒朱興弄兵雷化間聲勢漸張孟明遣將縳致轅門斬之趙崇憲餘干人淳熙中知靜江府兼經畧安撫靜江屬邑十地肥磽畧等而陽朔修仁荔浦賦獨倍崇憲請加蠲減詔遞損有差有羅蔓峒者􅀊寇鈔為􅁀民何嚮父子隂導之崇憲置之法因嚴民夷交通之禁先是部内郡邑有警輒移統府兵戍之在宜州者百人古縣半之崇憲謂根本單虛乃谷置兵如戍兵數而歛戍者以歸黃疇若豐城人淳熙間調靈川令㑹萬安軍黎蠻竊發經畧司選疇若條畫招捕事宜謂須稽原始亂為區處之方從之詹體仁浦城人寕宗時知靜江府開十縣税錢二萬四千蠲雜賦八千冷應徴分寕人理宗時調靜江府司錄叅軍治獄平恕轉運使范應鈐列薦於朝姚希得潼川人理宗時知靜江府主管廣西經畧安撫使公事兼轉運判官希得忠亮清儉好引善􅀋廣西官署以錦為帟幕希得曰吾起身書生安用此以繒纈易之鄧得遇卭州人理宗時攝經畧事兼知靜江府徳祐元年移治蒼梧而靜江破得遇朝服南望拜辭投南流江而死元石亨祖真定人至正間除全州路總管時蠻猺入寇城邑居民焚掠殆盡亨祖築城郭籍民兵以禦寇民得安生陳南賓茶陵人至元中授全州路學正先是獠人焚延學宫南賓至亟請建廟宇仿蘇湖學則白鹿洞教規訓飭士􅀋文化遹興明左君弼廬州人洪武初授桂林衞指揮僉事平上思州黃英傑及英覽之亂威震兩江李德番禺人洪武初調義寕縣教諭時喪亂後黌舍頽圯生徒零落義寕在粤西尤號荒陋德力為振舉文教漸興康考良洪武元年為永福縣丞殫以經畫事無巨細罔不整飭縣治學校壇宇皆所修建李原受灌陽縣丞洪武中蠻獠寇縣原受調官軍勦平之復為築城以備守禦鄭曦福建人永樂中知永福縣築土為城增修學校立永福堡於縣西沿蘭麻理定牛擺立堡建蘭麻驛悉心經畫民賴以治周健錢塘人宣徳間知全州勤於民事大著聲績考滿民乞留進秩還治羅珦臨安衞人成化中知桂林府西延陽峒諸蠻時出刼為興全害珦檄召六峒丁簡練以待蠻謀渡湘珦至靈川與戰破之又引兵伏山口躡殺幾盡諸蠻自是歛迹􅀩宗逺番禺人正徳中任靈川興史縣故多猺獞募驍民防守名曰打手皆捕官統之宗逺約束綀習人咸思奮賊犯城率兵斬之自是諸蠻屏迹顧璘上元人正德中謫知全州以興賢養才爲首務重建柳侯書院躬親校士􅀊旱甞徒跣禱覆釡山雨隨至胡鶴信豐人嘉靖四年知永福縣值獞賊亂悉心守禦以城北山高受敵議增高城垣重建四門城樓又於鳳山巔築石城賊不敢犯梁若衡順德人崇禎末年知永福縣爲政有聲擢左州知州未赴任大兵定廣州陳子壯謀舉兵若衡應之事洩被執死四十一年本朝乾隆賜諡節愍本朝馮瑾保定人知桂林府清介平恕嘗以體認天理四字見之施行獄片言立折多所平反焦勤武功人順治十二年知臨桂縣臺使令鞫大獄悉心剖折民以無􅁈大兵過省軍需告急㑹本省賦税蠲免帑無餘金勤籌畫轉輸纎毫不以累民江楨寕晋人順治十二年知灌陽縣當李定國亂後鄰兵調至者多掠民間子女楨力請代贖有誣陷平民爲盗者悉釋之全活甚衆呉輅石門人康熙初任桂林推官理逃人及叛盜諸大案以數十計平心剖決得減死若干人衡永食粤鹽為奸商侵漁委輅行部悉亷得之餉賴以足黄朱朂泉州人康熙二年知永福縣安集流民立學校修教化時劇賊莫扶豹等恃險刦掠朱朂單􅀐至賊巢開誠慰諭結以恩信賊黨皆感泣羅拜立為解散渠魁亦勢􅀌就擒李愫文沁水人康􅄉九年知永福縣化導獞民漸改其習修學建署皆捐俸成之後離任去民為之泣朱王造平和人康熙十年知永寕州呉三桂之變王造不從賊全家繫獄三年死獄中錢元昌海鹽人雍正九年知桂林府闢臨桂西鄉花巖下荒地數十頃修隄築壩收其祖為秀峯書院膏火士民交受其恵倪國正成都人知義寕縣乾隆五年桑江苗胡金銀為亂國正與臨桂丞呉嗣昌盧田巡檢魯器下雷吏目魯懋永寕千總潘貴入其巢撫諭之金銀殺嗣昌等而閉國正於土室絶食六日招之降不從死事聞贈按察使司僉事嗣昌正紅旗漢軍人器㑹稽人懋山陰人貴永寕人各賜卹有差建祠祀之額曰五忠祠人物唐曹唐臨桂人太和中舉進士累為知府從事及仕諸幕頗多贈酧有詩集于向臨桂人咸通中從高駢討安南有功授本州團練使黄巢入桂林溪峒蠻響應向出兵禦之巢退走又敗蠻於都狼山孤軍深入蠻遁向亦被創卒巢遂陷桂管曹鄴陽朔人大中間登第由天平節度掌書記遷太常博士時相高璩白敏中相繼薨鄴言璩交遊醜雜進取多蹊徑請諡為刺又責敏中怙威肆行諡曰醜其持論不阿如此後徙居桂林厯祠部郎中終洋州刺史有集三卷趙觀文臨桂人乾寕二年進士第八人被黜者訴不當乃重試觀文遂魁多士時劉季述輩專横觀文以為言忤時相意謝病歸宋李觀象臨桂人有才畧太祖時官左補闕王世則永福人太平興國八年廷試第一太宗幸金明池宴世則等于瓊林苑進士賜宴自此始淳化初世則以右正言使交州還朝條事迹及山川形勢上之進直史館與尹黄裳馮拯等伏闕請立許王為儲貳謫􅀩州後徙知永州朱道誠清相人㓜孤母俞多病截髪延醫卒葬廬於墓側有冬筍瑞竹之異景祐四年有司以狀聞賜絹米及卒郡守趙晰題其墓曰朱孝子墓其子楊善亦廬墓至和二年賜米帛如其父故事唐子正興安人治平初舉孝亷後通判邕州􅄉寕八年冬交阯圍邕與蘇緘固守外援不至城䧟與緘死之歐陽闢靈川人至和間與弟簡同學詩於梅堯臣元祐六年闢舉進士任雷州石康令時蘇軾南遷與之交遊乞休歸居無完壁唐􅅱興安人少孤􅄝學家貧授徒養母紹聖間以經明行修舉為雷州海康令蘇軾南遷過之握手道舊後調池州通判遂歸舊隱鄒浩謫昭日訪其家贈詩甚多唐諫清湘人初名册元符間與鄉人蔣舉上書論時事崇寕間申嚴黨禁入黨人籍屏居田里後易今名登政和五年第嘗知峽州廉介多惠愛李珙永福人大觀間宜州蠻入寇以禦賊首功補右職進築南丹州以珙攝州監押為先鋒羣蠻畏懼納欵歸疆積官至武功大夫劇賊劉花三嘯聚自䖍吉入寇廣東朝廷議擇將禦之除廣東路至則盡俘其衆檻賊首送京師厯邕州團練使金人圍汴珙募死士入援北至衞州敵衆數萬扼其前珙戰死贈忠州防禦使蔣炳文興安人政和二年通判融州南渡後詣行在上書言時事宰相趙􅂦薦為中都官炳文願外職自試除瓊管安撫秩滿奏事忤權臣意遂辭歸唐時全州人政和二年進士初名時臣御筆為去臣字紹興中官鄂岳間值岳飛將兵應付軍需甚有勞績飛薦之召見奏事任靜江理定令官至澧州守蔣周翰興安人太學生靖康初金人犯闕上疏請持國書使西夏請兵入援如唐囘紇破安史故事不報後官德慶府教授黄齊臨桂人紹興二年進士調富川尉改判柳州賜對齊曰桂林賓興數狹折納輸重詔増鄉貢三人減軍輸布錢九萬有竒攝新州踰年種刺竹圍城千二百餘丈後知亷州禁採珠民以不􅅰李守柔臨桂人紹興間登第為海康令後改倅邕邕守武臣御下嚴衣糧不時給將大閲衆洶洶不靖守柔勸使移病為攝州事下令發帑給諸將引首亂者斬之軍中肅然厯知梧宜新三州蔣允濟興安人紹興間登第任新化令縣人不肯輸祖允濟至官即為要約積年逋柤車牛屬路後為賓州倅攝昭州先是官出錢一百予民民輸布一疋折布為錢十倍取之允濟疏聞減其半㝷知潯州及守邕管以亷介聞劉晞臨桂人有詩名桂帥李愿中邀賦秦城王氣詩欲以媚秦檜晞托疾不往後帥李大異聞而嘉之題所居巖曰蟄龍唐俊乂興安人博通經史紹興間進士廷對以直言被黜㝷起容州倅移守昭州政成入奏除知象州㝷知廉州未赴攝鬱林郡賊謝實犯鄰境俊乂躬率吏民禦之實遁去秩滿遂請老家無贏蓄張栻帥桂時深歎其清約右安民臨桂人紹興間登第為象州判官累決􅁈獄以明恕稱分教廉藤二州士知嚮慕興起喜為詩弟安行安持俱􅀒文名人號三石同縣張仲子亦以文藻稱與安民相引重著有桂林盛事記唐則興安人少以學行稱舉進士厯官至侍郎歸築館授徒以身率後進極寒盛暑不少倦經史皆訓詁成一家言陶崇全州人少聰敏十􅀊賦筆山詩登嘉泰二年進士召試館職撰宋鐃歌鼓吹曲及楚詞七敘以進理宗在潛邸時崇為講讀官及登極被召陳保業謹微慎獨持久之説又陳郡縣修武備厚民生勵士氣與史彌逺不合出知信州卒諡文肅蔣公順全州人精研理奥從魏了翁遊七年大有得築室湘源名曰鷦􅀉了翁為之銘後劉之傑制置兩淮攜公順與俱以解安豐圍補官監施州清江税再調沅州黔陽尉辟桃源令未赴而卒弟公頔受業公順亦義烈不羣􅅬處厚全州人少穎悟䆳於春秋魏了翁遷渠陽日往從遊了翁竒之留置門下以古人之學勉之後調柳州馬平簿再辟潭州甘泉酒庫兼帥幕居官守正不阿元唐朝興安人刻意力學選授辰溪教諭值湖湘道阻乃歸授徒家墪每講學必先示濓洛關閩粹論使之體認自得嘗析心字之義為心法纂圖後居父喪不復仕秦仲禮臨桂人武岡峒賊擾桂城仲禮從官兵戰走之以功授義寕縣尉威攝邊猺改臨桂令兼防禦修築縣治葺學宫團鄉兵寛徴歛逺近肅然趙元隆興安人為廣西行省都事明師壓城元隆分守伏波門城陷與同官陳瑜劉允錫皆死之明王溥桂林人洪武進士由郎中為廣東叅政以廉名其弟自家來省屬吏與同舟贈以布袍漙命還之曰一衣雖微此汚行辱身之漸也糧運由海道多漂没漙身至庾嶺相度形勢命有司鑿石填塹修治橋梁教民車運民甚便之居官數年笥無重衣李文選臨桂人洪武時以孝行旌表黃驥全州人洪武中舉於鄉為沙縣教諭永樂時擢禮科給事中嘗三使西域仁宗􅀄上疏論外夷貢馬及官軍下番之弊詞甚剴切帝嘉納之自是陜西之民少甦㝷升右通政卒易先全州人以國子生為諒山知府有善政洪熙元年交人叛死之贈叅政莫愚臨桂人由工部郎中出知常州府奏請減宜興􅀊進茶數禁公差官凌虐有司嚴核上官薦劾之實皆報可秩滿郡民乞留巡撫周忱以聞詔進二階復任朱瓊臨桂人正統間舉人知開建縣有幹濟才天順三年流賊攻縣城瓊身擊賊無援死之蔣冕全州人成化進士正徳時累官户部尚書謹身殿大學士與楊廷和協誅江彬世宗立大禮議起冕固執為人後之説與廷和等力爭帝譙讓及廷和罷政冕當國帝逐禮部尚書汪俊以􅇶冕而用席書代之且召張璁桂萼冕抗章極諫帝不悦令馳傳歸冕當正徳之季持正不撓有匡弼功世宗初朝政雖新而上下扞格彌甚冕守之不移卒齟齬以去論者謂有古大臣風隆慶初諡文定劉本臨桂人成化進士授刑部主事宅憂廬墓有白蓮芝草之瑞有司間於朝旌其門曰孝行蔣曙全州人宏治進士知贛縣擢保定府諸豪歛戢厯廣東參政平樊家屯賊以功晉副都御史撫鄖陽􅀗賊首倪道真等所在有聲績仕終工部右侍郎劉天麒臨桂人宏治進士為工部都水司主事分司吕梁正德初閹人自南都詣北者舟經吕梁天麒不為禮及横索頗裁抑之為諸閹誣奏被逮謫貴州安莊驛丞王守仁亦以事謫龍場驛丞與定交嘉靖初追復官爵蕭淮臨桂人正徳進士由行人擢御史宸濠將作難人無敢言者淮奏宜勅錦衣衛逮至究治世宗嗣位淮請刷錦衣冗員數千厯僉都御史巡撫延綏陳􅀖修全州人嘉靖進士初授行人遷給事中劾郭勛嚴嵩張瓉胡守忠等不職又極論楚世子逆悖乞勅定東宫出閣往還儀節陳清牙牌等疏帝皆嘉納累遷南太僕少卿屠楷臨桂人嘉靖進士由