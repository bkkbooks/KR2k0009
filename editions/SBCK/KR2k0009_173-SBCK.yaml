備至明末遭亂田園荒蕪舌耕以供菽水親没哀毁骨立飦粥三年兄弟藹然一室兄卒後遺産悉􅂌諸姪與人交然諾不苟中康熙己酉舉人初任河南光山令有善政擢監察御史終江南漕運使梁敦峻全州人康􅄉壬子舉人早孤事母盡孝讀書他所距家數里每日必歸省值吳三桂叛偽黨慕名招之敦峻奉母逺避深山後為延長令乞侍養歸十餘年未嘗一夕宿于外母年九十三壽終敦峻亦以哀毁卒謝賜履全州人年二十與父明英同中康􅄉辛酉舉人知感恩縣甫兩月值海冦薄城賜履禦賊有方嗣由黔江知縣累遷户部郎中出為永平知府永平夏澇傷稼賜履出庫帑以賑饑民勸富民出粟以助赴上官請粟百艘民賴以生厯任天津道湖北按察使巡撫山東兩浙鹽政以疾乞休子庭琪雍正二年進士知神池縣調安邑擢太原知府所在有政聲蔣延宏全州人性孝友少值兵燹㓜弟被掠其母以念子故天明延宏椎胸飲泣晝夜􅈼天越三年乃從雲南得弟以歸母喜甚目忽明朱履躍臨桂人以孝著母疾祝天願以身代母没廬墓如禮平生以敦行為先恤􅀌賙貧閭黨奉為模準又同邑周尚文事母以孝聞嘗置義田營義葬鄉里推為長者蔣芾全州人康熙丁􅆗舉人知魏縣涖政積明巡撫下其事於所屬以為法魏濱漳河久罹水患芾躬􅀒畚鍤三日夜隄成衆名日蔣公隄後以母病歸事母至孝撫弟姪曲盡友愛増置祭産助人婚葬無吝色卒祀鄉賢魏人亦祀名宦季弟肇康􅄉癸未進士官檢討曾一懋臨桂人八􅀊䘮父母以鍼黹作生計指為鍼傷一懋輒流涕鄉黨稱孝雍正八年有司為請建坊表其閭劉宏基臨桂人康熙四十六年知晋江縣以慈祥為政催科不立限不事􅃻扑聽訟得情士民刋徳政詩紀焉蔣如昇全州舉人知偃師縣歳饑漕糧催輓甚急如昇白于府請出倉粟代民輸漕不允如昇矯令發之期以明􅀊秋成來歸至期民果如約與前令王澤長並祀南郭外蔣林全州人康熙五十四年進士任檢討六十年年羮堯將致之幕府林遽以假歸後由郎中厯官福建延平邵武浙江嚴州知府嘗權杭州􅂐織造某謀塞海寕尖山林移書極言不可不聽時方四月乞少緩工俟田􅁞畢又不聽且留督役以困苦之林冒暑雨巡役泥滑蔽膝勞來撫循四萬人依為慈父役雖未息杭人至今頌焉乾隆元年擢長蘆運使不私一錢以終養歸楊家修臨桂人康􅄉五十二年舉人雍正元年舉孝亷方正知寶豐縣以誠治民民不忍欺居民有被火者甚熾家修往救遽反風火息李梅賓臨桂人康􅄉六十年進士由庶吉士補四川劍州知州在官不攜家文檄訟牒不假手於人簿書暇輒巡行郊野咨民疾苦藹若家人總督亷其治狀以清官第一薦擢直隸廣平知府秋雨河漲城下土隄垂陷梅賓冒􅀨立隄上鳩工堵築廢飲食者三晝夜水將及隄左右具筏請登梅賓叱之曰隄不保則全城無孑遺守土者將焉避既而水遽退終山東鹽運使唐裴然全州人康熙癸已舉人少􅀌貧晝秉耒耜夜㸐松明讀書雍正末知隆平縣勸民息爭訟勤耕墾嚴胥役催科騷擾之禁又立書院聚生徒以教之築釡東隄若干步民立碑隄上以紀焉旋擢工部主事尋引平歸陳宏諴其先湖南人明末避兵遷粤居臨桂父竒玉宏諴少與其弟宏謀宏議攻舉子業補縣學生宏謀既貴顯而宏諴以獨行為善於家築隄堰立社倉修道路建宗祠人多賴之乾隆二十九年御書友恭篤慶額以賜年九十卒陳宏謀雍正元年進士由檢討累官至雲南布政使時廣西巡撫金鉷以粤西地多糧簿令廢官及官生墾荒報捐以廣賦額人多就熟田擴其畝數實未能開墾也地不加闢而賦日増宏謀陳其事敕下督撫㑹議未覆奏而宏謀復再疏劾乃鐫級授天津道既而總督鄂彌達巡撫楊超曽㑹奏墾報不實請予豁除而論偽報者如律厯任江西陜西河南江蘇福建甘肅巡撫擢兩廣總督節制本郡尤為異數最後以兵部尚書署兩湖總督尋内轉吏部官至東閣大學士凢􅆒厯數十年官迹半天下清儉不異寒素而政治卓越尤盡心水利凢所興建輒為經久之計其在江南條奏河工五事及運道蓄洩二事至今以為法乾隆三十五年加太子太傳致仕卒於途賜祭葬諡文恭祀賢良祠楊嗣璟臨桂人雍正三年進士由編修改御史乾隆五年以吏部侍郎往山西勘獄稱允㝷改宗人府丞平生喜為詩年訟棍邑有典先賢裔女為婢者及長其家贖之靳不予鑾亷得實擇士人嫁之曽唯全州人由行伍累擢至左江鎮標守備署撫標右營遊擊雍正十三年古州苗亂唯督師往勦攻雄台寨奮勇先登既深入而後援不至没於陣乾隆五年賜祭贈卹同時死難者千總熊禄把總蔣忠外委千總黎士俊把總蔣錫著周瑞臨桂人雍正十年舉於鄉厯任山東海豐商河知縣海豐有􅀺敬等五莊地皆磽瘠賦同上則逋欠甚多民或逃亡瑞莅任即請免積欠減糧額並減其地畝額徴糧税詞意誠懇巡撫為奏請得免民困􅀗甦乾隆二十二年運河浸溢其水瀦積直隸慶雲縣令請於海豐之土家堰開支河以消漫溢總督為具奏興工有日民間驚恐以為堰決則水勢直注田廬不保瑞亟按行隄畔審形繪圖備陳利害不可開狀上之巡撫檄監司再勘不誣事遂寢張椿臨桂人父母没廬墓三年事聞得旌先是椿父官山東日照知縣以妾女妻日照人既去官妾及子楷留居日照楷最賢工詩聞父母没以毁卒椿赴山東修其墓後授富川訓導朱若炳臨桂人乾隆二年進士由庶常改授知縣厯任山東長山菏澤厯城等縣皆有政聲擢知膠州􅀊連祲既莅任亟開倉賑之僚屬僉語必待報可曰吾民旦夕死胡可持復建借米關東之䇿巡撫為奏請允行又捐俸疏鑿河溪以通商賈並溉田數百頃築珠山書院買田以助膏火既而調德州擢江西九江府調南昌府蔣振閶臨桂人乾隆十七年舉人厯官山西四川直隸知縣勇於任事涖四川平武任時金川逆命振閶往營臺站地為賊所出没前營站官方遇害振閶勾當兩月不少挫羊河蠻内亂密邇平武振閶請往喻之單􅀐抵其巢穴羣蠻持兵守隘呼號聲數里不絶從者震慄振閶從容呼守者前諭以利害皆釋兵叩頭稱父母去郭相良臨桂人官四川巡檢乾隆癸巳大兵征金川檄守臺站為賊􅀗不屈死之陳枚全州舉人乾隆甲午權山東堂邑縣事時王倫倡亂堂邑民王勝如應之枚收其妻子登城守禦城破罵賊死其弟武舉元樑與賊巷戰格殺數十人力竭不屈亦死之事聞賜祭葬加贈道銜元樑贈千總皆􅄻一子其從兄培敬以舉人授館陶知縣屢破賊賊不敢犯陳蘭森臨桂人太學士宏謀孫乾隆丁丑進士由翰林院編修改部曹授江西袁州府知府調南昌府升鹽道調糧道所至有聲乾隆乙卯湖南苗疆滋事時蘭森丁艱在籍大學士福康安奏調赴軍總理軍需迄嘉慶初年由苗疆至川陜楚三省厯次協􅁹賊匪賞戴花翎服闋補湖南糧儲道仍留軍營辦理軍務後任湖北荆宜施道因趕辦軍糧卒於途詔依軍營病故例賜卹贈太僕寺卿銜􅄻一子駱朝貴臨桂人􅀉籍貴州銅仁府初從田姓入伍嘉慶元年以畢赤營千總隨􅁹邪匪以功累擢雲南新㠄營叅將調勦川省教匪六年升陜西陜安鎮總兵擊賊李彬於巴州追􅁹張添倫於南江七年迎􅁹張魏二逆於本箐壩􅀗偽先鋒張爾文等尋圍斬首逆張添倫賞提督銜九年官川北鎮總兵時殱三省殘匪於土地坎金鷄河等處擊賊鳳凰寨􅀗賊目羅思蘭李如玉等三省全功告蕆調赴陜西協􅁹寕陜鎮叛兵十三年奏請改復駱姓上允之十四年擢湖北提督十五年卒賜祭葬陳鍾琛臨桂人乾隆己亥舉人由直隸撫寕知縣薦升山東布政使登萊青一府夏旱蝗起鍾琛親往驅捕不終日捕除盡淨禾稼無傷而甘霖旋降旋省之日閭閻焚香送數十里感泣而退及秋黄河衡家樓決口山東被災州縣二十餘處鍾琛督辦賑務嚴立科條身親監散吏胥無侵漁請帑不過數十萬而被災之民均沾實惠後補内閣侍讀學士擢太常寺卿以老病乞歸卒於家馬宏樹全州人孝行著聞乾隆四十二年旌李文蔚臨桂人乾隆三十七年由武進士選陜西督標右營守備任漢中都司奉檄往和闐理糧餉及率囘部采玉勤敏清慎嘉慶元年隨征邪教與賊戰於太平之通天觀洞汝河等處凡七戰皆㨗論功賞戴花翎守尚家壩賊衆大至與戰一日夜没於陣事聞以總兵例議卹賜祭葬予􅀐都尉世職麻允光臨桂人由武舉洊升宣化鎮守備嘉慶四年調赴川陜軍營時老林匿匪竄過􅃆縣之埠川官莊一帶允光隨副將韓加業往捕相特一晝夜賊潛自山後繞下允光率衆仰攻鏖戰移時力竭殁於陣蔣尚全州人與弟尚坪孝行著聞嘉慶二十一年旌卿彬灌陽人乾隆五十三年􅀊貢五􅀊喪父廬墓三十餘年事大父母暨母不遺餘力母殁哀毁骨立三年不履人門户所著有周易貫義洪範參解等書嘉慶二十五年入祀鄉賢祠楊秉昭臨桂人由行伍累功擢遊擊嘉慶二年隨征黔楚逆苗遇擂石猝擊死之又外委童上標馬騰雲先後陣亡事聞均􅄻卹如例朱純彩臨桂人由行伍出師湖北拔補把總嘉慶六年擢守備時賊匪冉學勝由楚境竄白河純彩奮力進攻中矛傷卒事聞􅄻雲􅀐尉流寓唐李商隱河内人給事中鄭亞亷察桂州請為觀察判官寓桂林三年多所著作宋尚用之宣和中任本路提刑後寓桂林喜􅅄勸後進卒葬興安子孫因家焉路允迪南遷寓桂林日接後學訓解義理著作甚多孫偉謫融州久寓靜江以講學為務桂林學問之源自此始仇念益都人秦檜方主和議以為異已以朝奉郎少府少監分司西京全州居駐元陳南賓茶陵人任全州路學正先是獠賊焚刼延燒學宫南賓請建文廟倣白鹿洞學規訓飭士􅀋後棄官寄家於全士仍師事之劉三吾茶陵人至正間避兵靜江平章額爾吉訥擢主本路學正遷副提舉一時從遊者甚衆明蔣珍卿益都人景泰進士任荔浦知縣以循良稱謝政歸道出興安樂靈渠之秀遂占籍焉今縣治前蔣家塘其舊址也列女宋馬􅍺女全州人􅍺病篤女割股進􅍺瘥淳祐十年太守朱子恭為立孝忱坊元唐斗輔妻文氏興安人夫亡氏執義自誓孝養舅姑殁葬無違禮至治中旌明陳愚妻􅀽氏全州人愚亡子處厚尚㓜􅀽守志不渝姑諷之嫁􅀽曰烈女不更二夫脱不諒此心當一死以從夫地下議遂寢永樂中旌趙存質妻唐氏臨桂人少寡養姑撫㓜五十餘年成化中旌徐駿妻陶氏臨桂人駿卒於龍州陶聞訃刺血寫詩藏篋笥以衣匳悉還舅姑遂自縊劉鼐妻丁氏臨桂人鼐亡子淳三􅀊姑諷之嫁丁口吾命在姑與子矣不知有他堅守五十七年成化中旌龔氏女永福人正德中古田賊刼其村掠婦女及牛畜去至河龔語賊曰吾不能行願得􅀐牛而渡賊從之乃䇿牛入水自沉死下陋女逸其姓名正徳間女將嫁獞夜掠其村為所􅀗紿獞以取衣飾躍入火中死張義姑桂林衞張禮女禮征安南陣亡兄福尋亦卒福妻劉氏有子輝方六􅀊時姑年十五察劉難久留語之曰兄不幸死遺孤㓜吾張氏女義當為張存孤敢復累嫂因不嫁撫輝為輝娶婦後子姓繁衍嘉靖間旌門特祠署曰義姑唐東昇妻蔣氏灌陽人生子照􅂊三月昇卒蔣奉侍舅姑課子讀書達旦後照登賢書以名宦著天啟中旌唐應星妻張氏灌陽人隆慶五年古田猺賊亂肆刼全灌張為賊所􅀗不從被殺崇禎中旌關輔宗妻彭氏臨桂人宗死彭守節撫孤姑病割股煑粥以進遂愈崇禎中旌劉寀妻舒氏桂林人家卒有一子在襁褓紡績撫孤事繼姑以孝聞曽璋妻鄭氏臨桂人璋卒子㓜鄭與妾同矢志撫孤時稱雙節易氏女義寕人賊刼其村掠易與諸婦女易恐為所汚堅不行為賊所殺黎禧妾黃氏陽朔人禧任新淦令時妖人作亂聚衆刼縣取印黄大罵賊挺刄砍其面血流滿地賊退得不死事聞御賜珠􅃣讓其正室壽七十終蔣氏女全州人父卒二弟㓜且疾女誓不嫁謹視弟疾後皆愈長各為娶婦鄉人高其節義稱曰仁姑􅅬愈淛妻謝氏全州人年二十二明末為亂兵所執不辱攜二子一女投昭平江中蔣極世妻唐氏全州人明末為郝賊所掠挾之馬上同渡河唐奪刀自刎蔣維藻妻唐氏灌陽人時為亂兵所擄守正捐軀同縣唐納俞妻鄧氏其妹為唐之虁妻皆為亂兵所擄誓不從相持投崖下俱被害陳敬甫妻蔡氏灌陽人居寨包嶺山麓隔山即永明苗賊苗利陳所有糾黨刼之敬甫􅀍殺氏伏屍慟􅂘罵賊强之行不從賊羣擁出户鬢髪盡落罵益厲賊怒揮刀刺之剖腹洞胸而死本朝朱德佩女臨桂人未嫁夫亡父母議改適女投井死同邑鄧十妹年十六字韓氏未嫁夫卒遂截髪誓不再適父母嘉之俾行其志王尊德妻唐氏臨桂人尊徳年老病劇隣舍火唐􅀒之再不能動火且至尊德遣之避唐曰君死妾豈敢獨存因以身翼蔽之遂焚死盧懋瑛妻黃氏臨桂人懋瑛客死氏年二十苦營夫喪歸葬事舅姑盡孝教子立學年九十卒衛枝蘭妻廖氏臨桂人枝蘭死截髮以誓甘淡泊守禮法見宗黨戚屬不妄言􅀏三十餘年如一日蔣氏二女興安人長玉貞字張氏未婚守節次冰潔方待字而憐姊苦節願為閨中侣居白玉樓晨夕坐卧其中雖昆弟莫之見玉貞年八十三氷潔年八十一同時卒同縣周觀保聘妻李氏亦未婚守節林槐妹永福人林光岫養女入圃採蔬光岫僕進福欲犯之槐妹怒罵僕遂取腰䥥砍殺之有司杖殺僕封樹槐妹墓曹國瓉妻胡氏全州人明末兵變葬夫贖子飲水茹蘗四十餘年又國瓉女割股療父病後適謝希濓克盡婦道同州王爾祥女年十六割股療母病蔣彦清妻唐氏夫病危唐嚙指誓不嫁撫孤娶唐氏能繼姑志人稱雙節唐鎮畿妻蔣氏全州人康熙十八年夫婦避兵山中為賊所執過大殿嶺氏度不能脱奮身投巖下賊去氏復甦適其弟過聞泣聲救之歸鎮畿被執投水死氏念姑老子㓜艱苦守志史可傳妻蘇氏灌陽人灌俗里户輸運兵糧可傳糧多折耗貸營兵銀補之一日營兵至誘氏曰爾夫􅀒我銀以爾抵償欲挾之去役繯自縊文玉卿女灌陽人名兆祥及笄未字遭李定國亂與嫂陸氏避冦火星山箐中見賊衆搜山淫掠並自刎時稱雙烈唐之訒妻楊氏靈川人守節撫孤足不岀户者三十載康熙七年旌時正煜妻鄧氏灌陽人守節撫孤三子皆成立與同縣唐之靖妻鄧氏均康熙年間旌蔣士達妻朱氏臨桂人士達卒二子俱在襁褓朱年二十四時值兵燹饑饉朱備厯艱險撫三子成立康􅄉二十五年旌同縣劉翊妻朱氏朱旦如妻王氏均康熙年間旌蕭齊審妻劉氏興安人夫亡值兵燹流離藜藿為炊撫其子成立康熙二十五年旌鄧植萼聘妻王氏全州人植萼省其父於潯州學署溺水死王奔喪守制撫猶子承祧亦早没復鞠㓜孫以延宗祀康熙五十五年旌朱履祺女臨桂人字陳坦德未婚而夫没女往夫家守節衆力阻之托言􅏕浴閉戸自縊死康熙六十年旌吕一鷺妻李氏臨桂人夫亡事姑至孝弟死迎養其母方氏雍正三年旌同縣廖應正妻王氏能文宣妻李氏周熾妻李氏朱啟瑞妻徐氏趙鋐繼妻陳氏周朝選妻周氏譚順富妻王氏譚順貴妻王氏唐世輔妻周氏楊光照妻秦氏均雍正年間旌鄭一洪妻朱氏臨桂人年二十七夫亡廬夫墓側賊抄掠其室朱且泣且訴賊感歎去撫二孤中夜篝燈為二子課誦苦節終身雍正九年旌同縣王之梅妻潘氏歐昇琦妻周氏蕭良梓妻張氏賀永貴妻張氏李佳實妻齊氏曹世貴妻趙氏朱文彩妻楊氏馬良妻周氏張驕妻萬氏朱依雯妻陳氏栗如昇妻陳氏李亦章妻胡氏均雍正年間旌鄧章甫妻王氏全州人夫亡撫子愈凱長娶劉氏五載而愈凱亡遺腹生孫姑媳􅀌苦相依雍正三年旌湯成用妻石氏靈川人夫亡守節雍正四年旌李兆榮妻黄氏靈川人年十九兆榮卒黄即絶食欲以身殉父母苦諭之未幾衣麻闔户自經時雍正八年也同縣蘇挺健妻粟氏夫亡子㓜姑以其年少勸改適氏斷髪自誓養姑訓子厯四十年蔣氏女名蓮姑全州人父母早喪弟甫四􅀊女以弟孤苦誓不字人撫弟成立為娶妻胡氏弟卒無子復為立嗣以延宗祀胡亦守志終身雍正八年旌王繼旭妻朱氏臨桂人夫亡以從子體升為嗣娶蔡氏體升卒復立體謙娶陳氏生子為矯體謙又卒一門之内姑婦節烈戚里感之乾隆二十年旌童綬妻朱氏臨桂人十九而寡二子相繼夭朱無所依乃歸居母家朱喜讀書工詩􅊔後絶不復為唯以女誡及古女史教授諸姊妹王炳妻黄氏臨桂人未婚炳没黄聞訃奔喪矢志孝事翁姑撫弟廷珍長子崇儀為嗣嚴為督課得成名乾隆五十三年旌同縣節婦况剛妻梁氏劉貴祥妻秦氏劉玉全妻呉氏王廷圭妻秦氏唐明漢妻莫氏張應璧妻蔡氏李聚林妻吕氏楊賢妻張氏王宗周妻陳氏謝允安妻龍氏徐興悦妻李氏文金洪妻劉氏劉甫麟妻周氏朱瑛妻孫氏梁君錫妻李氏秦體乾妻李氏朱士璟妻蔣氏秦其煜妻王氏馬允定妻駱氏郭永正妻朱氏鄒兆麟妻蕭氏雍世傑妻李氏雍世美妻毛氏雍學詩妻左氏朱亨茂妻王氏莫若佑妻李氏張玉妻秦氏徐德壽妻唐氏阮志和妻唐氏王之美妻周氏龍金保妻楊氏龍章錫妻陳氏秦君璧妻衞氏劉紹寛妻孫氏朱爌妻方氏朱履妻秦氏聶先妻曹氏龍正國妻黄氏莫燕妻吕氏曹助臣妻謝氏王裕祥妻莫氏王仲選妻秦氏黄龍遜妻廖氏張竒芳妻李氏劉允書妻晏氏朱若瓊妻陳氏李儒正妻聶氏李敬福妻李氏冷士德妻陳氏羅茂瑞妻沈氏沈秉禮妻鄭氏晏承德妻黄氏曽文紹妻鄒氏李世松妻劉氏左延圭妻秦氏陳鍾燦妻廖氏龍嘉章妻李氏黄瑞麟妻熊氏朱一淑妻趙氏潘宏清妻詹氏朱依暻妻劉氏莫疏槐妻朱氏朱依瑞妻張氏唐履中妻羅氏蕭