太平人順治四年知羅城縣隨征四載緣兵燹城荒土司叛亂桂林又屢為偽黨竊據羅城􅀌立無援被執不屈罵賊死弟男五人俱被害事聞贈按察僉事賜卹􅄻于成龍山西永寕人順治十八年知羅城縣革重耗減鹽引招集流移勸墾荒田地錯苗疆奸宄雜處成龍申明保甲禁帶刀杖􅀗盜果實立即誅戮自是寇賊屏息熊飛渭南昌人康􅄉十二年知融縣柳州降帥馬承䕃叛奸民蘇際盛曾亞池乘變糾合永寕土司刦擄思管鎮融城小兵稀人情危懼飛渭部署二十四團長申明約束各給信牌領事給錢募民増窩鋪集堡目分城而守賊知有備不敢攻城賴以全江臯桐城人康􅄉二十一年知柳州府地經兵燹臯殫心綏輯流亡復業他邑民有被掠在柳者資送之飭關津撫猺獞政績甚著錢元昌海鹽人雍正六年知柳州府會苗首據通道鎮恣惡提督欲舉兵􅁹之元昌請緩師以手札令巡檢單􅀐往諭衆皆跪泣越日率衆詣府營謝罪納賦如舊元昌遂建公署立墟市以通貿易人物唐白聳馬平人仕為義勝都將光啟中寇入郡境盡驅其民掠財帛聳率所部敗賊奪而歸之宋覃慶元融州人景德進士大中祥符間拜御史中丞莊重不阿遇事敢言舉朝服其公正覃光佃慶元子博學能文開寶進士為監察御史彈劾不避權􅀔進武􅀐尉知雁州軍事時沿邊將士多貪功妄殺及媮惰不職悉徵以法尋升沿邊都總管兼勸農使外籌軍政内肅朝儀咸􅀝重焉覃昌光佃子慶厯進士官至國子祭酒閉户講學其教人一本六經有文集行世王之才䧺容人少好學與同邑張亞卿齊名登慶厯進士厯官工部侍郎有吏治才宋士堯馬平人皇祐中儂智高寇邕州士堯率兵救之與智高戰不勝被害贈屯衞大將軍明計仲政馬平人洪武初峒夷猖獗知縣張霖以才能薦為巡檢率民兵與戰俘馘五百餘諸峒凛然總兵韓觀託為心腹發縱指使無不成功前後四十餘年致仕卒鄧敏象州人洪武丁卯舉人官禮部主事少孤事母以孝聞母卒居喪哀毀廬墓三年有司旌其閭曰思本堂郭本融縣人景泰二年進士厯官御史巡按貴州及浙江時權璫肆惡本疏劾之謫雲南永平主簿周􅄾馬平人成化進士􅃉于理學著東溪日談十八卷成化中獞賊猖獗時為南户部員外上疏指陳多中時弊時論韙之又同縣簡弼宏治舉人官肇慶府通判亦以講學稱吕景􅀩象州人宏治舉人厯御史性矜潔自貴謫判頴州轉汲縣令少嗜學所著有定性發􅀩象郡學的二書戴欽馬平人正德進士擢刑部郎中為尚書林俊所重每屬草稿欽長于詩與何景明馬汝驥輩遊後坐議大禮廷杖殁著有鹿原集玉溪存稿余勉學馬平人嘉靖進士知錢塘縣擢御史時大宰汪鋐秉銓不法列其奸狀以聞下詔獄尋以鋐敗得釋厯天津兵備副使嚴世蕃嫉之嗾言官疏劾事白補貴州厯任福建按察使徐養正馬平人嘉靖進士授禮科給事中後官户部右侍郎劾嚴世蕃奸狀嵩怒矯㫖廷杖謫通海典史量移聲慶府推官嵩敗起南京工部尚書張翀馬平人嘉靖進士授刑部主事疾嚴嵩父子亂政抗章劾之下詔獄謫戍都勻穆宗初召為吏部主事厯僉都御史巡撫南贛有􅁹賊功仕終刑部侍郎卒諡忠簡李允簡融縣人嘉靖時由舉人知内江縣旱禱暴赤日中三日霖􅀨大沛後升思州知府時許保黑苗為亂㕘將石􅀖憲等討之許保􅊳思州刦執知府挾以求厚贖允簡乃傳語􅀖憲令亟進兵自投盤山關崖下賊棄之去思人舁還至清浪衞卒詔贈貴州副使秦健馬平人嘉靖間知祿勸州鳳朝文叛健監守㲹地賊攻圍急遂遇害戴希灝柳州人嘉靖二十一年為永昌同知愷悌廉明絶請託勤勸課在任八載遷長史去之日行李蕭然士民泣留遮道王化馬平人嘉靖時知平遠縣縣故賊藪化單􅀐往日坐草亭中治事大著恩信於是各寨盡出所掠子女三千餘人屢平賊有功晉廣東按察司伸威道副使化生平破賊厯數十戰渠魁既殱為其綏定全活者亦數萬人劉順之馬平人隆慶六年官徐州徐頻年被水築張村隄塞房村口又築䕶城隄徧厯郊原問民疾苦居四年百度俱飭孫克恕馬平人萬厯時舉於鄉厯官貴州副使分巡思石道安􅀖彦之亂戰死有虎守其骸不去蠻人嗟異事聞贈太僕卿覃文應柳城人天啟間授四川巴縣張獻忠陷城文應具朝服北向拜遂投井死其子懋德亦投井本朝乾隆四十一年祀忠義祠龍文光馬平人天啟進士崇禎間以吏部郎督學貴州厯升四川巡撫值張獻忠寇蜀城陷不屈死本朝乾隆四十一年賜謚忠節戴震馬平人崇禎時以鄉薦任浙江常山教諭旋擢知縣事土寇􅀼發執脅不屈死之本朝乾隆四十一年入祀忠義祠本朝温如珍馬平人順治初龍韜盤踞柳慶民遭荼毒知縣許鴻儒副將沈􅀖清俱被害如珍奉命協剿陣斬逆韜恢復柳慶授都督僉事曹應元懷遠人順治初流賊李來亨等所至蹂躪應元散家財聚鄉勇分布守禦為邑之保障弟應魁亦以武功著曹維屏懷遠人康熙十八年將軍傅宏烈授㕘將銜委以􅇛練維屏躬冒險阻率苗獞擒逐餘逆境賴以安楊剛馬平人弱冠從軍厯剿古州慶遠桑江諸苗積功漸升副將尋擢左江鎮總兵生平厯數十戰未嘗敗衂嘗謂用兵之道靜如處女動如脱􅈷二語盡之著有平苗紀畧歐陽永裿馬平人由拔貢知合水縣漸升河南鹽驛道乾隆二十六年河決楊橋隄賑灾全活無算調河陜汝道擢浙江按察使廣東布政使奏言連州排猺地狹人衆將無所得食請許其良者編入民籍以廣謀生之路而消其生事之端下督撫議行永裿厯官數十載能持政體所至興修書院以教士為務尤以誠化民佘之格雒容人由武進士授雲南守備乾隆三十七年隨征金川積功累遷四川漳獵營㕘將擊賊於喇穆山梁陣亡事聞議卹􅄻守備馬羣臣馬平人乾隆五十三年隨征安南陣亡同時死難者吳忠耀陸上柏李元湯正强陳國明劉成亮袁成剛黄振雄王萬年事聞均廕恩騎尉世職李榮光馬平人嘉慶二年由千總協剿聶傑人等餘匪陣亡又王熊飛鄧得羅應龍亦於嘉慶二年隨征黔楚逆苗先後遇害事聞均􅄻雲騎尉流寓宋張庭堅廣安軍人徽宗時蔡京欲引為己用庭堅不肯往京大憾後遂編管象州龔夬瀛州人徽宗時以侍衘史抗疏論事削籍編管象州徒步適貶所列女唐全女柳城人父亡無嗣誓不適人竭力養母母偶岀遭虎害女痛哭逐虎奪囘母骸備棺以殮停柩未􅁙比鄰失火延燒女屋抱柩不去焚死元龍氏柳城人寇至殺其夫將污之氏毅然曰甘與夫同死豈肯為賊辱乎罵不絶口賊怒射之貫胸而死明龍居德妻羅氏融縣人獞蠻刦博塘村得羅驅之以行羅伺間投水蠻出之傷一目堅不行蠻怒支解之謝氏女羅城人正德初蠻寇劫其里見謝有殊色爭輿以行謝罵賊奪刃自殺王化妻計氏馬平人嘉靖中化知江西平逺縣㑹田坑賊叛化􅀉妻子會昌而身率鄉兵往擊㑹昌訛傳化殁計乃以兒置妾懷中慟哭自刎蔡氏二女雒容人長適禇本紀夫亡依其父瑶以居次許字潘仁嘉靖中以征田州調永順保靖兵二女為兵所掠計不能脱相攜墮崖死葛若惠妻廖氏馬平人崇禎末土賊破城廖被執投河死同縣孫章林妻王氏龍偕熊妻鄔氏秦聘瑜女俱被掠投水死陳原道妻計氏馬平人夫殁不食死同縣王象節妻畢氏夫没自縊死鄧氏女受聘未嫁夫卒親欲奪其志遂服其聘服自縊計于京妻戴氏馬平人避亂居五都鳳山村夫為叛兵所殺妻持鐮刀自刎死唐良傑妻盧氏馬平人文燿母文燿奉㫖撫賊被執後賊破城盧罵賊投池死簡文妾李氏馬平人文為福建布政司經厯有女曰元贅陶吾智為壻文與妻皆卒於官二婦與二􅀌扶喪以歸路遇賊吾智與賊抗溺水死李被執輒解囊出白鏹噉賊且曰此外惟一身可表但乞不驚兩幼子足矣語畢遂投水賊亦嗟惋去李漂附岸得不死收吾智屍撫養二􅀌元亦相依不他適人謂為簡門雙節王氏二女柳城人王士魁女一名春姑一名祖姑俱未字土寇單鳴珂作亂二女避古帶村山中為賊所逼並服毒死梁氏二女柳城人五都寇猝至劫二女欲犯之二女怒罵曰賊奴暴虐鄉里犬豕不若吾豈為汝辱耶奮起觸石死吳振元妻龍氏融縣人崇禎末避兵土弁擄之至棠隂橋抱女投水死其夫聞之亦不食死本朝龍應貴妻范氏馬平人年二十八夫亡子甫九􅀊家甚貧氏辛勤紡績撫􅀌成立雍正三年旌同縣盧朝玉妻王氐龍聖佐妻徐氏楊名標妻劉氏葉承晭妻歐氏計元龍母胡氏均雍正年間旌吳起龍妻張氏懷遠人遭􅀊歉翁與夫相繼殁姑老且病張服事維謹家極貧常忍饑供養鄰家失火延及其室氏棄幼子不顧衝燄員姑出須臾子亦至雍正三年旌雷世妻王氏融縣人夫亡守節雍正三年旌歐陽永䄎妻王氏馬平人夫卒扄户三縊帛三絶母氏徐泣諭勉受命以猶子為後養教如所生事姑尤謹戚黨不相見數十年乾隆十七年旌同縣歐陽永祐妻鄧氏王某妻胡氏葉芷妻陳氏許鍾憲妻蕭氏莫維春妻劉氏韋扶亭妻韋氏均乾隆年間旌歐陽貞女馬平人名晚姑生四􅀊而􅀌字蔡昌昌賈于外卒女請奔喪母曰生者母也死者猶米夫忍而去此耶女懼以戚母乃止御縞啜糲矢志不移母卒竟以哀死同縣季氏女幼字陳至言陳憎其命蹇棄而别取季依兄紡績自瞻誓不更嫁人稱為貞女云廖世豪妻盧氏雒容人夫亡守節乾隆三十七年旌范開明妻劉氏羅城人年二十夫病篤泣禱於神願以身代後竟不起遂投繯死乾隆十八年旌賈朝選妻全氏柳城人夫亡守節乾隆十七年旌同縣何可錦妻莫氏五十六年旌覃揆一妻吳氏融縣人年二十七夫亡家貧無所依紡績無􅀌奉姑惟謹乾隆元年旌同邑王伸妻胡氏四年旌韋正妻黃氏象州人捐軀明志乾隆六十年旌宋國祥繼妻何氏象州人年十九而寡奉姑十餘年姑病齧血禱於神而愈教子鋐中甲午舉人後目衰日事紡績手皸裂臨殁時延醫診治不許曰吾豈以手與男子診脈者耶同縣何宏勲妻馬氏歐耀臣妻吳氏孟名世妻王氏均乾隆年間旌韋應坤妻毛氏來賓人年二十而寡子方幼族人將不利之毛曰若輩利吾所有耳悉委之襁􅀒其子走依外家遂遷居廖坊卒全其嗣深慮如此董君甫妻計氏馬平人捐軀明志與同縣金壎妻虞氏均嘉慶年間旌沈正林妻丁氏雒容人夫亡守節嘉慶二十四年旌韋潮和妻常氏柳城人捐軀明志嘉慶六年旌同縣烈婦常扶平妾勞氏嘉慶十二年旌陳良䇿妻曾氏象州人夫亡守節嘉慶七年旌同縣梁㑹瀛妻吕氏陳以梅妻吳氏均嘉慶年間旌仙釋宋佛日禪師來賓金華峯第一代祖有戒行相傳山有寺大石當殿前佛日禱於神忽風􅀨晦􅄀頃之開霽石已移在山中土産金元和志融州貢宋史地理志來賓貢銀元和志柳州象州貢鐵明統志融縣出布寰宇記融州産苧布又象州有古苧績以為布香明統志懷遠縣出降香羅城縣出鬱金香槵子宋史地理志來賓貢桂心元和志融州貢藥元和志融州貢防風寰宇記象州出人面子明統志融縣出蘆甘石猪腰子具木生子形如猪腎能解藥毒又不死草府産苴草高一二尺狀如芊食之令人多壽夏月置盤筵蟁蠅不近蚺蛇膽唐書地理志柳州貢獞錦府志各州縣俱出苗蠻苗府境多有之男女服以青布繡花極工巧俗謂之花衣苗飲食與狪狑同本朝嘉慶三年増設羅城懷遠苗學額各二名猺在馬平縣百里外耕田輸賦皆熟猺也在羅城通道鎮有板猺男衣黒衣婦人左袵裙有五色繫古銅錢步行有聲在懷遠有二種居上下隴耕田納賦謂之住猺種山而食去來無常謂之流猺在融縣居背江村各成村落有紅黒白三種自謂諸葛武侯征孟􅀗流入背江居者在象州男女椎髻徒跣截竹筒而吹待􅀨而耕每􅀊十月屠牛置酒召同􅀋以降神醉則舞刀劒為戲獞在馬平縣有覃􅀩韋三姓服青椎髻男女皆同􅀊首以木槽傾牲物于内伏地作犬嘷在羅城居平西布政高懸各里性頑悍在懷遠男女皆斑衣長僅至臍裙不過膝好樓居在融縣有獞村與猺村分地而居或彼此相錯習俗大畧相似在象州服飾習俗與猺相似來賓縣十數里外皆獞男子繚頭跣足婦人短衣長裙性好仇殺捕逮至中途則劫奪去此其舊習今則咸知奉法矣狼羅城郡那等四堡皆有之男子衣服與漢民同惟婦人少異柳城僅六七村約一百四十餘户近城者漸效華風居鄉者大率鄙陋狑在馬平縣種山捕獸時至墟市交易俗􅇰陋簡在雒容與狼雜居距永寕常安鎮僅隔水羅城之東一西一西七西九東五平東上里懷遠之永吉三峒等村皆狑所居以手搏飯和以魚鮓為上食以宴客殺牲用翦無刀砧狪在懷遠縣與狑雜處不喜殺善音樂彈胡琴吹六管長歌閉月頓首猺足為混沌舞􅩄在柳城縣與㺜猺雜處言語不相通俗􅀋獠而頗􅃛桀性能耐寒故曰􅩄見官長不知拜跪以跏趺為禮㺜在柳城縣上油峒俗似猺􅩄而語言各異犽女馬平柳城皆有之黒齒黥面繡額為花草蛾蜨之狀嫁則自荷傘戒途聚族數十人送之在深谷者為生丁黑丁雜民處者曰熟丁白丁狚在懷遠縣居山谷種山禾日暮始舂粟無隔宿之炊單衣不利于寒長袴不利于走較諸蠻􅇰為愚弱巴在懷遠縣石陣臨溪隂風懆冽人猶聞􅀑哭相傳昔諸葛武侯立營于此夜令云枕石者去枕草者留中夜撤軍枕石者不寐從孔明去枕草者熟睡遂留兹土遺種斯在尚能操巴音而歌烏烏纂修官臣李紹昉恭纂臣蔣立鏞恭纂提調官前總纂臣鄭紹謙恭覆輯校對官臣劉咸恭校
