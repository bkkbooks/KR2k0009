僑立治襄陽今為實土常平廢縣在襄陽縣西隋書地理志襄陽郡常平西魏置曰義安置長湖郡後改縣曰常平開皇初郡廢又後魏置旱亭縣大業初廢唐書地理志襄陽貞觀八年省常平縣入焉惠懷廢縣在宜城縣境隋書地理志襄陽郡漢南後漢廢恵懷石梁歸仁鄢等四縣入義清廢縣在南漳縣東北六十里隋書地理志襄陽郡義清梁置曰穰縣西魏改曰義清屬歸義郡後周廢郡及左安開南歸仁三縣入焉又有武泉郡開皇初廢元和志襄州義清縣東北至州五十八里本漢中廬縣地寰宇記義清縣唐貞觀二年自中廬縣東北三十里移於今所今復為中廬縣輿地紀勝紹興五年省為鎮豐良廢縣在􅀥陽縣南隋書地理志舂陵郡後魏置豐良縣大業初廢汎陽廢縣在榖城縣西晉置梁省宋書州郡志扶風郡汎陽晉武帝太康五年立屬順陽水經注汎水東逕汎陽縣故城南晉分筑陽立安福廢縣在均州西隋書地理志浙陽郡安福梁置曰廣福併為郡開皇初郡廢仁壽初改焉舊唐書地理志武德元年置南豐州領安福縣貞觀元年省安福入鄖鄉平陵廢縣在均州北舊唐書地理志隋義寕二年置平陵縣武德七年省九域志武當縣有平陵鎮平陽廢縣在均州北南北朝宋置梁省宋書州郡志始平太守領縣平陽江左平陽郡民流寓立此水經注平陽川逕平陽故城下又南流注於沔均陽廢縣在均州東北隋書地理志淅陽郡均陽梁置舊唐書地理志武德八年省入武當鄧塞城在襄陽縣東水經注鄧塞鄧城東南小山也方俗名之為鄧塞昔孫文臺破黄祖於其下元和志在臨漢縣東南二十二里南臨宛水魏常於此􅑽治舟艦以伐吳陸士衡表稱下江漢之卒浮鄧塞之舟謂此新城在襄陽縣東南十里宋元通鑑咸淳三年夏貴援襄樊阿珠謂諸將宜整舟師以備新城明日貴舟果趨新城府志縣境凡有牛首安陽古城紅崖白河沙河漁浦新城淳河滚河十城䝉古圍襄陽分築諸城於要津以絶糧援故址尚存阿珠譯見前邑城在襄陽縣西南水經注沔水東南逕邑城北習郁襄陽侯之封邑也故曰邑城夫人城在襄陽縣西北晉書朱序傳序鎮襄陽苻丕来攻序母韓自登城履行謂西北角當先受􅁦遂領百餘婢并城中女丁於其角斜築城二十餘丈賊攻西北角果潰衆便固新築城丕遂引退襄陽人謂此城為夫人城元和志襄州理中城東邊一處有土赤色昔苻丕攻襄陽朱序用道法以硃砂薰之至今土色有異西北角夫人城序母修築鄾城在襄陽縣北古鄾子國晉置縣後廢左傳桓公九年楚子使道朔將巴客以聘于鄧鄧南鄙鄾人攻而奪之幣注鄾在今鄧縣南沔水之北後漢書郡國志南陽郡鄧有鄾聚水經注淯水南逕鄧塞東又逕鄾城東古鄾子國也樊城在襄陽縣北水經注樊城周四里南半淪水城西南有曹仁記水碑杜元凱重刊其後書伐吳之事也元和志襄州臨漢縣南至州二十里即古樊城西魏於此立安養縣屬鄧城郡周天和五年改屬襄州天寶元年改為臨漢縣縣城南臨漢水輿地廣記鄧城有樊城鎮府志樊城與襄陽對峙城西有鐵牕口晉人鑄鐵櫺列樹隄岸以通水道如牕櫺然偃城在襄陽縣北三國魏志徐晃傅晃助曹仁伐闗某晃前至陽陵陂屯關屯偃城括地志偃城在安養縣西北三里陽陵陂又在偃城西北五里平魯城在襄陽縣北水經注沔水又逕平魯城南城魯宗之所築也東對樊城壘城在襄陽縣北水經注城北枕沔水即襄陽縣之故城楚之北津戍今大城西壘是也唐書張東之傳東之授襄州刺史㑹漢水漲齧城郭東之因壘為隄以遏湍怒闔境賴之縣志壘城築壘附近大城猶今砦堡即水經注所謂西壘也楚王城在宜城縣南水經注鄀縣北有大城即楚昭王為吳所迫自郢徙都之所括地志楚昭王所徙在故鄀城東五里韓愈宜城驛記楚昭王廟後小城蓋王居也其内處偏高廣圓八九十畝號殿城當是王朝内之所也多甎可為書硯曾鞏韓公井記跋楚故城今謂之故牆城改為牆者由梁太祖父名誠當時避之故至今猶然按府志楚王城在宜城縣東北誤蠻城在宜城縣南水經注淇水逕蠻城南城在宜城南三十里觀林城在宜城縣南五十五里地名王城港城址猶存羅川城在宜城縣西南古羅國左傳桓公十二年楚師分涉于彭羅人欲伐之注羅在宜城縣西山中水經注夷水厯宜城西山又東南逕羅川城故羅國也黎邱城在宜城縣北後漢書光武帝紀秦豐自號楚黎王注黎邱故城在襄州率道縣北又郡國志邔有黎邱城水經注沔水東南逕黎邱故城西其城下對繕洲秦豐居之故更名秦洲城在觀城西二里建武四年朱祐自觀城禽豐於黎邱是也孟城在棗陽縣西南十八里岑彭城在􅀥陽縣東北元統志岑彭城在􅀥陽縣東北三十里相傳彭征秦豐時築城牧馬於此洛陽城在穀城縣東宋書州郡志河南郡洛陽縣孝武大明元年省水經注洛溪水流逕洛陽城北東南注沔水榖城在榖城縣北春秋時榖國春秋桓公七年榖伯綏來朝注榖國在南鄉筑陽縣北水經注榖城在榖城山上春秋榖伯綏之邑墉闉頺毁基塹亦存張飛城在榖城縣西南五里水經注汎口張飛襲張邰於此學城在榖城縣東北水經注沔水又東逕學城南舊説昔者有人立學都於此值世荒亂生徒罔依遂共立城以禦難故城得名涉都城在光化縣西漢書功臣表涉都侯喜元狩三年封後漢書郡國志筑陽有涉都鄉水經沔水東南過涉都城東北注故鄉名也漢武帝封南海守降侯子嘉為侯國均水於縣入沔謂之均口順陽王城在光化縣北寰宇記固王古城在乾德縣東北五里晉咸寕中封扶風王子暢為順陽王城内有順陽碑府志順陽王城在固封山下又有空城在光化縣北五里三王城在均州境寰宇記武當縣有三王城前漢末王匡王鳳王常所築各一城今號三王城府志一在州東南一在州西南一在州東北和城聚在均州境後漢書郡國志武當有和城聚柤中在南漳縣西一作沮中襄陽記柤中在上黄界去襄陽一百五十里魏時夷王梅敷兄弟三人部曲萬餘家屯此分布在中廬宜城西山䣕沔二谷中土地平敞宜桑麻有水陸良田沔南之膏腴沃壤謂之柤中通典南漳縣有地名沮中吳朱然屯處王應麟地理通􅇚沮中即今襄陽南沮水左右地冠葢里在襄陽縣南接宜城縣界水經注宜城縣有太山山下有廟漢末刺史二千石卿長數十人朱軒華葢同會於廟下荆州刺史行部見之雅歎其盛號爲冠益里刻石銘之白沙里在襄陽縣東北襄陽耆舊傳龎德公孫奐晉太康中去官歸鄉居白沙里南陔里在襄陽縣境楚記唐尹怦淳孝龍朔中刺史封道洪改其閭曰南陔里銅鞮坊在府城内明統志在郡城山南東道樓左楚人好唱白銅鞮因以名坊木香村在宜城縣西六十里寰宇記宜城縣有木香村段成式别業於此村生異竹成式圖送徐商五陌村在光化縣西南寰宇記南雍州記云酇城南四里有五陌村榆樹連理異木合幹高四丈鄉人以為社其樹今巳枯牽羊壇在府城内舊傳刺史初至必牽一羊諸壇遶之以其所遶之數驗治州之年多寡晉文帝為刺史羊行六次不止果八年劉琦臺在襄陽縣東元和志劉琦臺琦與諸葛亮登臺去梯言之所也將臺在襄陽縣南三里相傳元將阿爾哈雅築阿爾哈雅舊作阿里海牙今改漢陰臺在襄陽縣西南水經注檀溪水北逕漢陰臺西臨流望遠意寄漢陰故因名臺杜康臺在宜城縣治東五十步俗傳杜康造酒於此打鼓臺在宜城縣南八里相傳白起操軍於此下有走馬隄分經臺在南漳縣東北梁昭明太子同隠士劉虬法慧分經之所呼鷹臺在􅀥陽縣東一名景升臺水經注魚梁州南有層臺號曰景升臺蓋劉表治襄陽之所築也表性好鷹嘗登此臺歌野鷹來曲卧牛臺在􅀥陽縣境輿地紀勝漢光武帝騎靑牛於此誦經臺在均州北武當山世傳陳希夷誦易處文選樓在府治南輿地紀勝梁昭明太子統建延賢士劉孝威庾肩吾徐防江伯操孔敬通惠子悦徐陵王圃孔爍鮑至等十餘人著文選於此山南東道樓在府城内元統志舊府治有唐李陽冰篆書山南東道四字淳祐辛亥程士元為守創立層樓府志今改為鎮南樓南平樓在襄陽縣治前元守帥楊珪建霽景樓在光化縣境方輿勝覽光化軍有霽景樓宗海樓在均州東一里下臨漢水宋宣和中建聞喜亭在府治内唐太守裴坦建漢廣亭在府北小北門西淳熙中安撫使馬䕫建桃林亭在襄陽縣東南水經注沔水又逕桃林亭東輿地紀勝桃林在襄陽縣南六里南雍州記云晉桓沖北伐屯軍於此時方食桃至春其核萌生遂成茂林縣志即今縣南桃花嶺也舊有桃林館今廢望海亭在襄陽縣南一里方輿勝覽在卧龍山絶頂峴山亭在襄陽縣南峴山上宋熙寕初史中煇因舊址重建歐陽修有記清水亭在襄陽縣境楚紀申徽為襄陽刺史代還人吏送之乃留題於清水亭赤松子亭在􅀥陽縣西南襄陽耆舊傳蔡陽有赤松子亭即南都賦所謂松子神陂者也樂善堂在府城内梁􅂤文爲晉安王鎮襄州日畫前刺史十三人像於堂故名學業堂在襄陽縣南相傳諸葛亮讀書處高齋在府城内襄沔記襄陽城内刺史宅有高齋梁􅂤文爲晉安王鎮襄陽日引劉孝威等於此齋綜覈詩集時號爲高齋學士其南又有一齋梁武帝臨州寢卧此齋常有五色雲􅂞轉狀如盤龍屋上恒有紫雲騰走形似繖葢遠近望者莫不異焉武帝於此龍飛龎統宅在襄陽縣東輿地紀勝士元德操二宅俱在呼鷹臺側蔡瑁宅在襄陽縣東南水經注沔水又東南逕蔡洲漢長水校尉蔡瑁居之故名府志襄陽縣東南有蔡村孟浩然宅在襄陽縣東南鹿門山宋孝武宅在襄陽縣南帝鎮襄陽時所居習郁宅有二一在襄陽縣南習家池畔一在宜城縣東水經注豬蘭橋北有習郁宅宅側有魚池池不假功自然通洫長六七十步廣十丈常出名魚龎德公宅有二一在襄陽縣南後漢書龎公傳龎公居峴山之南輿地紀勝龎德公宅在峴山南廣昌里縣志鹿門山有鹿門寺寺左有三高祠即龎德公舊宅一在襄陽縣東北水經注沔水中有魚梁洲龎德公所居士元居漢之陰在南白沙世故謂是地為白沙曲司馬德操宅洲之陽名勝志宅内舊刻范蔚宗贊按後漢書龎德公居峴山南後入鹿門山採藥不返魚梁洲之居乃其孫奐所居水經注似誤徐庶宅在襄陽縣西水經注檀溪之陽有徐元直崔州平故宅習鑿齒與謝安書云每省家舅縱目檀溪念崔徐之交未嘗不撫膺躊躇惆悵終日名勝志徐庶宅地名甘耳冲今清虛菴是其故址諸􅁑亮宅在襄陽縣西隆中山東水經注沔水厯孔明舊宅北亮語劉禪曰先帝三顧臣於草廬之中咨臣以當世之事即此宅也沛國劉季和鎮襄陽與犍為人李安共􅀚此宅命安作宅銘永平五年習鑿齒又為其宅銘南雍州記隆中諸葛亮故宅堂前有三閒屋地基址最高云是孔明避暑臺元和志諸葛亮宅在襄陽縣西北二十里輿地紀勝在襄陽縣西隆村繁欽宅在襄陽縣西北襄沔記繁欽宅王粲宅並在襄陽王粲宅在襄陽縣西北襄陽耆舊傳王粲與繁欽同鄰並井其墓及井見在襄陽記王粲宅在襄陽縣西二十里峴山陂下司馬徽宅在襄陽縣東北漢水北宋玉宅在宜城縣南三十里水經注宜城縣南有宋玉宅按宋玉宅有三此其里居也一在歸州從屈原遊學時所居一在江陵則服官郢都時居之王逸宅在宜城縣南今俗呼王家屋場漢光武宅在􅀥陽縣東南後漢書光武帝紀注光武舊宅今在隨州􅀥陽縣東南宅南二里有白水水經注白水陂其陽有漢光武故宅所謂白水鄉蘇伯阿望氣處也元和志後漢代祖宅在􅀥陽縣東南三十里張柬之園在􅀥陽縣南五里園址猶存格壘在榖城縣東南十二里府志漢末劉表將李氏甚富有僕數百以其奴戸率衆保此因號格壘善謔驛在宜城縣北二十里輿地紀勝在宜城縣北即淳于髠放鷹處晉柏在襄陽縣東南襄陽名勝志相傳柏為羊祜手植社柏在均州南門段子遊均州圖經南陽武當南門有社柏樹大四十圍梁蕭欣為守伐之忽有大蛇從樹腹中出羣蛇隨入南山其聲如雷雨義犬冡在府城南捷神記音吳王孫權時有李信純襄陽紀南人家飬一犬字曰黒龍一日信純城外飲酒大醉歸家不及卧草中時遇太守鄧遐出獵見田草深遣人縱火爇之卧處有一溪相去三五十步犬即奔往入水濕身來卧處周􅂞以身濕之火至濕處即滅犬運水困乏致斃於側信純聞於太守太守憫之命具棺衾葬之今紀南有義犬冢高十餘丈前纂修官臣羅家彦恭纂總纂官臣廖鴻藻恭覆輯校對官臣閻學海恭校
