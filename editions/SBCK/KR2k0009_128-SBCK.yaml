市税重多所寛假建元元年赦詔未至嶷先下令蠲除部内昇明以前逋欠庾蓽新野人明帝時再為荆州别駕清身率下杜絶請託妻子不免饑寒帝手勅褒美梁蕭秀武帝弟封安成郡王天監七年遷荆州刺史立學校招隠逸是歲魏縣瓠城人反司州刺史馬仙琕籤荆州求應赴秀曰待勅非􅀿急也即遣兵赴之沮水暴長敗田以毂三萬斛贍之散遣貧老單丁吏百餘人百姓甚悦荆州嘗苦旱咸欲徙市開渠秀乃責躬親祈楚望俄而甘雨即降遂獲有年秀弟恢封鄱陽郡王為荆州刺史嘗謂長史蕭琛曰漢時王侯屏藩而巳視事親民自有其職今之王侯不守藩國當佐天子臨民清白其優乎坐者咸服蕭憺武帝弟齊和帝時率雍州將吏諭降蕭璝詔以為都督荆州刺史梁天監元年加安西將軍封始興郡王廣開屯田減省力役存問兵死之家辭訟皆決於俄頃曽無留事六年州大水江溢隄壞憺親率將吏冒雨築之邴州南岸數百家水長驚走登屋緣樹憺募人救之一口賞一萬州人乃免又分遣諸郡遭水死者給棺槥失田者與種糧是歳嘉禾生於州界韋叡京兆杜陵人天監七年為南郡太守司州刺史馬仙琕自北還軍為魏人所躡三關擾動詔叡督衆軍援焉叡至安陸魏人乃退孔休源㑹稽山陰人武帝時為晉安王長史南郡太守行荆州府事帝勅王曰孔休源人倫儀表汝年尚幼當每事師之尋始興王憺代鎮荆州復為憺府長史太守行府事如故在州累年平心決斷請託弗行范縝南鄉舞陰人為宜都太守性不信􅄦神時夷陵有伍相祠漢三神廟縝下敎斷不祠樂子雲南陽淯陽人家居江陵承聖末為江陵令魏克江陵衆奔散呼子雲子雲曰不如守以死節遂仆地卒於馬蹄之下西魏長孫儉河南洛陽人文帝時授荆州刺史所部鄭縣令泉璨為民所訟推之恭高祖從子武德四年平蕭銑遷荆州大總管置屯田立銅冶百姓利之弟壞代為荆州都督政務清靜嶺外酋豪皆如約不敢為亂蘇良嗣京兆武功人高宗時遷荆州長史帝遣宦者采怪竹江南所過縱暴至荆良嗣囚之上書言狀帝下詔慰奬取竹棄之楊元炎閿鄉人武后時為荆州長史遷州刺史咸有風績張東之襄陽人武后時為荆州長史狄仁傑以宰相才薦之李暠隴西成紀人武后時為枝江丞張東之稱為帝宗千里駒韋虛心京兆萬年人景龍中為荆州長史有鄉豪負􅀔干法虚心籍其貲入之官韓朝宗京兆長安人明皇時遷荆州長史喜識拔後進李白有與韓荆州書張九齡韶州曲江人開元末貶荆州長史以直道黜不戚戚嬰望惟文史自娛吕諲河中河東人肅宗時拜荆州長史建請荆州置南都詔可於是更號江陵府以諲為尹置永平軍萬人遏呉蜀之衝以湖南之岳潭郴道邵連黔中之涪凡七州隸其道諲為治不急細務決大事剛果不撓號令嚴明賦斂均一故闔境無盜賊民歌咏之元結河南人肅宗時以水部員外郎佐荆南莭度使吕諲府甚有聲績盧景亮幽州范陽人張延賞節度荆南表為枝江尉掌書記韓愈鄧州南陽人貞元末為江陵法曹叅軍裴潾河南聞喜人力諫憲宗餌方士金丹貶江陵令王潛相州安陽人穆宗時節度荊南疏吏惡榜之閭里殺尤縱者分射三等課士習之不能者罷故無冗軍杜悰京兆萬年人咸通十四年為荆南節度使秦匡謀討蠻兵敗奔悰悰劾其不能伏節詔斬匡謀五代南平梁延嗣京兆長安人少事高季興充衙内馬步都指揮使勸繼沖納土於宋宋盧懷忠河間人太祖將出師遣懷忠使荆南還奏即以為前軍步軍都監荆湖平判四方館事知江陵府四年伐蜀以供億之勞充客省使郭贄襄邑人太宗時知荆南府俗尚淫祀屬久旱盛陳禱雨之具贄始至命悉徹去投之江不數日大雨陳恕南昌人太宗時知江陵府大發羣吏姦贓郡内惕息雷有终郃陽人淳化中知江陵府西征李順命為峽路隨軍轉運使同知兵馬事調發規畫皆有節制張遜高唐人李順亂命為右驍衛大将軍知江陵府峽路漕卒二千人聚江陵或告其謀夑以應蜀議盡誅之遜止捕斬首惡餘黨親加撫慰太祖嘉之張齊賢􅁈句人太宗時知荆南府敏於吏道庭無滯訟邵日華桂陽人太宗時通判荆南賜緋魚嵇適宋城人為石首主簿民有父子坐重繫府檄按之適抵其父而子獲免父死假人言日主薄仁人也行且生賢子明年生穎為翰林學士宋太初晉城人咸平初知江陵府蠻㓂擾動太初以便宜制遏詔􅅄之王子融益都人真宗時知荆南府盜張海緃掠襄鄧至荆門子融閲州兵將迎擊之賊引去馬亮合肥人真宗時再知江陵府有智畧敏於政事徐的建安人攝江陵府事城中多惡少年欲為盜輒夜縱火一夜十數發的籍其姓名使相保任日爾輩遞相察不然皆爾罪也火遂息太子洗馬歐陽景猾横不法的發其姦竄之嶺外李若谷徐州豐人天聖中知荆南士族元甲恃廕屢犯法若谷杖之王䝉正為駐泊都監挾太后姻横肆若谷繩以法監司右􅀩正奏徒若谷潭州王質單父人為荆湖北路轉運使嘗攝江陵府或訴民約婚後期民言貧無資以辦質問其費出私錢輿之吏捕盜人衣者盜叩頭曰迫饑寒至此質命取衣衣之遣去鮮于侁閬州人為江陵右司理叅軍唐介稱其名於上官交章論薦侁盛言左叅軍李景陽枝江令高汝士之美乞移與之介益以為賢余良肱分寕人調荆南司理叅軍屬縣揃殺人者自誣服良肱驗屍輿刃疑之請自捕逮未幾更獲真殺人者民失財物逾十萬逮平民数十人方署榜掠號呼或有附吏耳語良肱急捕之贓盡得張頡桃源人為江陵推官歲旱饑朝廷遣使安撫頡條獻十事活數萬人魏瓘知荆南府時下溪州蠻彭士義叛將發兵討除瓘條上三䇿以招徕為上守禦為下攻取為失不報後卒如瓘議謝麟甌寕人調石首令縣苦江水為患麟曡石障之人得安堵號謝公隄王回仙遊人調松滋令荆沔俗用人祭􅀑回捕治甚嚴其風遂革楊時將樂人張舜民在諌垣薦為荆州敎授程千秋河南人徽宗時知公安縣時羣盜起千秋率民禦之岳鄂鼎澧皆賴以安解潛紹興元年知荊南府奏辟宗綱樊賓措置屯田其後荊州軍食仰給省縣官之半焉王彦上黨人紹興五年知荆南府充歸峽荆門公安軍安撫使自蜀買牛千七百頭授官兵耕營田八百五十頃分給將士有差薛弼永嘉人高宗時知荆南府劇盗伍俊既降復叛弼誘至斬之范如圭建陽人高宗時通判荆南府荆南舊户口數十萬冦亂後時蠲口錢百未還一二議者希秦檜意遽增之積逋數十萬如圭白帥悉奏蠲之劉琦德順軍人高宗時知荆南府凡六年軍民安之江陵縣東黄潭漲溢琦命塞之斤膏腴田數十畝流民自占者幾千户李道相州人高宗時以所部戍荆南府代劉琦為御前諸軍統制金將劉士萼屯光化境道掩擊焚其舟萼遁去滕琛高宗時知松滋縣遷縣冶建廟學為政有方民懷其惠趙雄賓州人孝宗時知江陵府請城江陵城成而民不擾張栻綿竹人孝宗時知江陵府安撫本路一日去貪吏十四人湖北多盗栻首劾大吏縱賊捕斬姦民之舍賊者令其黨相捕告以除罪羣盜皆遁郡瀕邊屯禮遇諸將加恤士卒勉以忠義衆咸感奮並淮姦民出塞爲盜捕得數人中有北方亡奴栻曰無使疆場之事其曲在我命斬盜以徇而縳其亡奴歸之北劾信陽守劉大辨虚増所招流民之數請論其罪章累上大辨易他郡栻遂求去張孝祥烏江人孝宗時知荆南湖北路安撫使築寸金隄以息水患置萬盈倉以儲漕運劉甲龍游人孝宗時知江陵府湖北安撫使甲謂荆州爲吳蜀脊高保融分江流瀦之爲北海太祖嘗令決去之蓋保江陵之要害也即因遺址浚築亘四十里辛棄疾厯城人慷慨有大畧孝宗時知江陵府兼湖北安撫光宗時復知江陵府劉宰金壇人紹興中調江陵尉歲旱賑荒邑境多所全活禁絶巫風妖術令改業爲農緣事出郊與吏卒同疏食飲水去官惟筐藏主簿趙師秀倡和詩而已袁樞建安人慶元中知江陵府江陵歳爲巨浸樞爲室廬徙民居之種木數萬以爲捍蔽吳獵醴陵人開禧中江陵告饑除獵荆湖北路安撫知江陵府請出大農十萬緍以賑饑遣人招商分糴為平糶計金攻襄陽荆為重鎮乃修成高氏三海築八匱上下分注之水􅀔四合可限戎馬金人圍襄陽德安再侵竟陵獵遣卒分援又調大兵及忠義保捷分道夾擊金人遂去德安襄陽之圍皆解吳㬢反獵請以王大才彭輅任西事仍分兵抗均房諸險漕粟歸峽以待王師李大性四會人嘉定中知江陵充荆湖制置使江陵當用兵後饑饉疾疫相􅁇大性首議賑貸凡三十八萬緡有奇蠲放虛羡十有四萬五千緍流移復業者皆奏免征榷劾毁兩路戎司冒受副身凡三千四百九十有七道左選一清江陵錢重楮輕民持貲入市有終日不得一錢者大性奏依襄郢例通用鐵錢於是泉貨流通民始復業宇文紹節廣都人嘉定中除湖北京西宣撫使知江陵府統制官高悅在戍所肆為殺掠紹節至帳前收其部曲俄有訴悅緃所部為㓂者紹節杖殺之張洽清江人嘉定中授松滋尉湖右經界不正洽請行推排法令民自實其土地疆界產業之數投於匱乃籌覈而次第之吏姦無所匿後十餘年訟者猶援以為證趙方衡山人權江陵府增修三海八匱以壯形􅀔進秘閣修撰知江陵府主管湖北安撫司使兼權荆湖制置使時金偪於兵計必南徙方築堡荆門東西兩山上增戍以遏其衝劉愚龍游人調江陵府教授早晩為諸生講論同僚相率以聽秩滿貧不能歸吳淵宣州人理宗時知江陵府兼夔路䇿應大使調兵二萬往援川蜀其後力戰於白河沮河王泉孟珙棗陽人理宗時為鎮北軍都統制元攻江陵圍急詔先遣張順渡江珙以全師繼之破砦二十有四還民二萬嘉熙元年封隋縣男兼知江陵府京西湖北安撫副使詔珙收復襄陽指授方畧發兵深入所至以捷聞四年進封子後復自夔帥知江陵府以城東無隘可守修復内隘十有一别作十隘於外障沮漳之水而東之俾遶城北入漢三海遂通為一隨其高下為匱蓄泄三百里間土木之工百七十萬民不知役後卒於江陵鄒永年知松滋縣政令清肅道不拾遺吏民畏而愛之汪立信六安人理宗時辟荆南制置使幹辦制置趙葵為馬光祖所誣立信力爭不得投劾去後為荆湖安撫制置知江陵府襄陽被圍急立信上疏請益安陸府屯兵凡邊戍皆不宜抽咸移書責賈似道似道終斥之楊霆醴陵人知監利縣立决疑獄辟荆湖制置幹官帥吕文德常試以兵事口占授吏頃刻成案文德驚服即薦除通判江陵府庶務業集霆隨事裁決處之泰然暇日詣郡庠與諸生講學又取隸官聞田増益廩稍選民之强壯者農􅂩訓練之親閲試行賞激勵皆獲其用司馬夢求敘州人咸浮末調江陵沙市監鎮沙市距城十五里恃水為防德祐元年湖水涸元兵横遏中道乘南風縱火都統程文亮逆戰降夢求朝眼望闕冉拜自經死孟紀德佑元年為都統元兵破沙市城死之元許楫忻州人廉希憲鎮江陵以楫為左右司員外郎荆南父老以金帛求見楫曰汝等巳為大元民矣今置吏以撫字汝輩奚用金帛以求見胡祇遹武安人至元中為荆湖北道宣慰副使有佃民訴田主謀為不軌祇遹察其􅁈生告者暢師文南陽人至元三十一年為山南道肅政廉訪使松滋枝江歳發民防水往返數百里師文悉罷其役駙馬家人恬􅀔不法師文治其甚惡者流之毛好義成宗時知公安政事嚴明令行禁止薩題勒密什大德間知石首縣勸民力穡建學造士開水道以疏江流築隄護之薩題勒密什譯見前王都中福寕州人武宗時為荆湖北道宣慰副使適歳大祲躬履山谷拯饑民賴全活者數十萬卜天璋洛陽人天厯二年蜀兵起荆楚大震拜山南道廉訪使厲風紀淸吏治州郡肅然時榖價頓湧乃下令勿損榖價􅃪民自便於是舟車爭集米價頓減朱顯文知公安縣恪守清節後罹兵變餞饉一家淪喪而潔身守義終不以利祿動心布琳尼敦累官至山南廉訪使治中興每按部威惠翕然至正十二年冦侵中興射之多死賊稍退明日復擁衆来襲東門與戰被執不屈而死布琳尼敦舊作卜理牙敦今改正尚都元末為中興路判官冦殺主將布琳尼敦尚都出擊之既而東門失守反鬬力屈賊執之使降尚都大罵賊怒刳腹刲􅁏而死布琳尼敦譯見前明周政洪武初知荆州府招集流亡修治學校政聲遠聞陳獻銅梁人洪武中知監利縣有司造官楮民病之獻奏減大丰陳直方應城人洪武初任石首敎諭具知人鑑於弟子中許楊溥有公輔器後果為名相王滿汝寕人洪武二十二年知枝江縣復設縣治造廨舍興學校勞績懋著刁鵬祥符人永樂中知荆州府在任九年門無私謁囊無贏帛凡所設施皆有條理范理天台人宣德中知江陵縣民累逋租十四萬上官徴之急不能償時將卒墾田立户號曰畸零不供役理定其等諭令各出僱役未因以償租逋畢完縣當孔道理為治清肅權貴過者無敢漁一錢馬祥汲縣人正統初知石首縣公平仁恕吏畏民懷張嵓上虞人正統中知荆州府果於有為事苟利民不恤叢怨毅然為之秩二滿民乞留詔増二秩再任張愷寕波人正統中知江陵縣興學校建公署革弊釐姦吏民畏服俞雍武進人正統中知公安縣清介有志節自奉甚約而愛民甚摯定徭賦之則區畫詳盡除道成梁百廢具舉尤慎於用刑民感其慈惠錢昕蘇州人天順中知荆州府江陵潛江水溢昕築黄潭隄捍之長亘幾百里暇即課諸生講學所成就多知名士石敏中江津人成化中知松滋縣歲饑發賑江漲増築隄防㑹鄖襄盜起軍供旁午敏中措置有方民不告病楊德修長壽人宏治中為松滋訓導訓迪有方寒暑課業不輟邊貢厯城人正德初知荆州府廉靜自守事集而民不擾政寛而下不欺蔣瑶歸安人正德中知荆州府公明廉介士民畏服聞母喪即日就道荆民懷其德立祠祀之姚隆嘉定人正德中知荆州府七年民女事集以忤當路免民老幼遮道泣送後立祠祀之與劉永蔣瑤稱三賢守邵經􅀖仁和人嘉靖初以工部主事􅅦稅荆州府甫三月稅額己满遂啟關任民商出入遠近稱之李元陽大理人嘉靖中知荆州府舊隄圯七州縣皆患水治之無成績元陽身任之再期而成及憂歸一府皆垂涕遠送立祠祀焉牛愷六安人嘉靖間知石首縣聽訟明斷承天府營獻陵愷供役區畫盡善邑人賴之李純朴定遠人嘉靖間以御史謫知監利縣甃甎城建大觀書院趙賢汝陽人嘉靖末知荆州府大水民饑徧行村落計口給賑已而築隄捍水疏渠溉田民深德之大盜楊勝德黄中等為亂賢單車詣勝德壘諭降之中等相率歸附周宗武臨川人隆慶中知宜都縣毁淫祠神像改建正心書院朱正色南和人萬厯中知江陵縣始治縣即力行條鞭法凡賦稅不便民者盡蠲之時起復張居正中官賫詔至從人甚衆正色令吏籍其名謂之曰若已悉載我籍有魚肉百姓者即疏爾罪諸惡悚慄而退楊雲才臨桂人萬厯間知公安縣獄訟不用勾攝質民於庭數言立決清丈田糧單騎郊行履畝定稅著為令甲嘗置釡数十於庭村民入城輸納不覓逆旅炊食已即返故民詣縣如歸蕭以裕清江人萬厯中知宜都縣時遣中官征督舊逋擅開紅花沱金礦民震擾以􅁉請於撫按上疏罷之高斗樞鄞縣人崇禎初知荆州府流冦來逼無一卒可用乃籍民為兵出舊礮百餘置城上徧試之適賊哨騎至聞聲驚遁部議覈屯田之役於民者徵其舊賦斗樞力持不可乃止羅安􅀖荆州守將崇禎十二年楊嗣昌檄救夷陵柞谷深入遇賊香油坪􅀍圍援絶軍覆死之本朝乾隆四十一年賜諡烈愍胡鳴岡績溪人崇禎十四年知枝江縣李自成陷荆州府遣使說之降鳴岡焚其書囚偽使於獄後出城巡徼船卒謀叛奪其印獻賊鳴岡卒不屈賊改容謝之去撖君錫絳縣人明末為荆州府訓導十六年冬十二月李自成陷府城文武吏皆先期遁賊帥羅汝才搜學宫見君錫長髯偉軀端坐明倫堂上詢知與己同鄉貫誘之降君錫駡曰賊奴豈不知世有不畏死男子耶子朝廷命官誰與爾賊為桑梓者汝才恚甚縳繫公安門外賊營桅樹上厯三晝夜君錫罵愈厲汝才執弓射之君錫徐諭曰死非我所懼但我學官當死文廟側耳賊遂捽置城内雲路坊下割舌斷臂而死一年本朝乾隆四十予祀忠義祠方􅀿星武昌人以武舉為巡撫宋一鶴所擢官都司授精兵三百防守號遠洋營崇禎十六年闖賊據襄陽遣人招降不從賊數萬騎攻城三日城陷應星被執誘以偽職大罵死之本朝甘文奎豐城人順治初官荆襄道叅議以計擒賊首王魁等其黨深銜之乘文奎受代出署遂破城縳之去極刑逼降文奎厲聲駡不屈死之贈光祿卿􅄻子張占鼇山西人貢生康熙三年任荆州通判值􅁹流賊郝揺旗於鄖陽山中占鼇督䬲從賊突犯大營官軍失利占鼇堅守軍儲不爲動被執賊露刃脅降占鼇怒叱之遂遇害詔贈湖廣按察司僉事廕一子入監人物漢胡剛南郡華容人清高有志節平帝時大司農馬宫辟之值王莽居攝剛解其衣冠懸府門而去遂亡命交阯隠於屠肆之間後莽敗乃歸鄉里剛六世孫廣字伯始厯任四公封育陽安樂鄉侯蒯越字異度南郡人劉表爲荆州刺史請與謀畫使越誘宗賊帥至者十五人皆斬之復與龎季說降江夏賊陳虎江南悉平曹操平荆州以爲光祿勲封侯三國漢霍峻字仲邈枝江人初依劉表表卒歸昭烈帝帝以峻爲中郎將守葭萌城劉璋將向存等攻圍峻一年不能下出擊大破之斬存昭烈帝定蜀以為梓潼太守卒官還葬帝親率臣僚弔􅀕子弋字紹先後主立太子璿以弋為中庶子盡言規誎甚得切磋之體領永昌建寕太守還統南郡進安南將軍魏之入蜀弋請勤王不得最後始降馮習字休元南郡人隨昭烈帝入蜀帝東征吳習為領軍大敗於猇亭死焉董和字幼宰枝江人昭烈帝定蜀為掌軍中郎將與諸葛亮並署左將軍大司馬府事獻可替否共為歡交死之日家無儋石亮甚追思之董允字休昭和子後主時為黄門侍郎諸葛亮將北征遷為侍中領虎貴中郎將事為防制甚盡匡救之理後以侍中守尚書令卒官晉朱詹江陵人性好學家貧無資累日不爨時吞紙以實腹寒無檀􅂁抱犬而卧志不廢業卒成學士南北朝宋甄恬字彦約江陵人數歲喪父哀感若成人家人以􅁏汁和飯飼之恬不肯食年八歲恨不識父悲泣累日忽若有見言形貌則其父也家貧飬母嘗得珍羞及居喪廬墓有白鳩白雀棲宿其廬州將始興王憺表其狀詔旌表門廬加之以爵位官至安南行叅軍劉凝之字隱安枝江人兄盛公高尚不仕凝之推家財與弟及兄子立屋野外非其力不食辟召一無所就荆州年饑衡陽王義李慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有饑色者悉分與之俄頃立盡一旦㩦妻子汎江湖隱居衡山之陽采藥服食妻子皆從其志陳宗元饒江陵人少好學以孝聞武帝時為廷尉卿尚書左丞宣帝初遷御史中丞性公平善持法吏有犯法政不便時者隨時糾正多所禆益遷南康内史後為吏部尚書唐蔡允恭江陵人後梁左民尚書大業子工為詩仕隋厯起居舍人煬帝有所賦必遣敎宫人允恭恥之數稱疾由是疏斥貞觀初除太子洗馬著後梁春秋劉洎字思道江陵人貞觀中為尚書右丞累加銀青光祿大夫太宗欲聞已過洎曰頃上書有不稱㫖或面窮詰無不羞汗恐非所以開言路帝稱善及征遼東詔兼左庶子輔皇太子監國岑文本字景仁江陵人父子象為人訟不得申文本年十四詣司隸理􅁈辨對哀暢命作蓮花賦文成合臺嗟歎遂得直性沉敏善文辭貞觀中擢中書舍人詔誥皆所草定敏速過人遷侍郎封江陵縣子踰年為中書令從伐遼東至幽州病卒諡曰憲生平口未嘗言家事或勸其營產業歎曰吾漢南一布衣無汗馬勞以文墨位宰相俸入已重尚何殖產業耶岑長倩文本從子永淳中累官兵部侍郎同中書門下平章事武后時加特進輔國大將軍和州浮圖上大雲經著革命事后詔天下立大雲寺長倩爭不可罷為武威道行軍大總管征吐蕃未至召還下獄來俊臣誣以謀反見殺睿宗立追復官爵備禮改葬俞文俊冮陵人垂拱三年新豐縣有山湧出武后以為休徴名曰􅂟山四方畢賀文俊上言陛下以女主處陽位反易剛柔故地氣塞隔而山變為災宜側身修德以答天譴太后怒流於嶺外後為六道使所殺岑參文本之後天寶中進士工詩官右補闕論斥權佞代宗時出刺嘉州杜鴻漸表為幕職終於蜀戎昱荆南人至德間以文名登進士第衞伯玉辟為從事京兆尹李鑾欲妻以女命改姓昱拒之建中間厯辰䖍二州刺史劉蛻字復愚荆南人荆南歳解舉人多不成名蛻始及第號破天荒為文奇詭岸傑自成一家崔道融荆南人為永嘉令累官右􅀘闕唐末不仕朱梁避地入閩宋夏侯嘉正字會之江陵人太平興國進士厯官著作佐郎嘗使巴陵作洞庭賦人多傳寫端拱初太宗召試詞賦擢為右正言直史館禇彥逢江陵人五世同居兄弟五人皆年七十餘至道中轉運使表其事詔􅀘彦逢敎練使朱昂江陵人好學有清節聚書至多號朱萬卷咸平二年拜工部侍郎致仕詔本府歲時存問命其子正辭知公安縣以便侍養高懌字文悅季興四世孫十三能屬文通經史百家從种放受業放奇之不敢處以弟子行范雍建京兆府學召懌講授諸生常數百人張景字晦之公安人少從河東柳開遊悉出家書􅂌之嗜學益力與孫僅朱嚴輩相切磨真宗詔有司徵天下士景居首列為房參二州文學叅軍轉寶應簿後攝理真州事所著有洪範王霸論數十篇崔遵度字堅白江陵人純介好學太平興國進士累官左司諫於􅀔利泊如也仁宗時壽春王開府命遵度與張士遜並為王友官至判司農寺龎天祐江陵人以經籍教授里中父疾天祐割股食之疾愈復喪明天祐又復舐之父年八十餘大中祥符四年卒天祐負土封墳結廬其側晝夜號不絶聲知府陳堯咨上其事詔旌門廬築闕表之唐介字子方江陵人父拱卒漳州州人合錢以賻介尚年幼謝不取擢第官平江令調知任邱縣通判德州轉殿中侍御史劾張堯佐並及宰相文彦博誎官吳奎貶英州别駕直聲動天下後復為殿中侍御史累遷知誎院治平二年出知太原府熙寕元年拜叅知政事王安石執政介數與爭論安石强辨而帝主其說介不勝憤疽發於背卒贈禮部尚書諡曰質樂京荊南人事母至孝嘉祐初以薦得校書郎為湖陽赤水二縣令神宗求言京上疏以畏天保民為請助役法行京白提􅺿常平官言不便使之條析又不報自列丐去詔奪著作左郎十年乃復官監黃州酒税以承議郎致仕元祐初召赴闕不至終於家唐淑問字士憲介子第進士官御史裹行初詔侍臣講讀淑問言王者之學不必分章句飾文辭當延登正人博訪世務以求合先王河北饑流人就食京師淑問條三䇿上之滕甫為中丞淑問立數其短帝以為邀名出判復州久之提􅀧湖北刑獄言新法不便黜知信陽軍病免哲宗立司馬光薦其行己有恥召為左司誎以病致仕數月卒唐義問字士宣介子􅄉寕中以辟召為司農管勾公事從曹孝寛使河東還奏事擢湖南轉運判官奏除羡賦移使京西時陜西大舉兵多亡卒義問請令詣官自陳給券續食元祐中用大彦博薦知集賢修撰帥荆南請廢渠陽諸砦蠻楊晟秀斷之以叛即拜湖北轉運使討降之復砦為州尋入元祐黨籍唐恕介孫崇寕􅀄為華陽令以不能奉行茶法忤使者謝病免歸其弟意為南陵令亦以病自免兄弟杜門躬耕尋以宣敎郎致仕靖康元年御史中丞許翰言其高行詔起為監察御史意亦以吳敏薦召對貧不能行竟餓死江陵山中項安世宇平父江陵人淳􅄉進士官秘書正字光宗以疾不過重華宫安世上書誎不報尋遷校書郎紹􅄉五年召朱子至闕未幾予祠安世率館職上書留之俄為言者劾去官坐學禁廢錮開禧中起知鄂州遷户部員外郎湖廣總領金人圍德安安世不俟朝命遣兵解圍尋權宣撫使坐免所著有易玩辭諸書多行於世劉鼎孫字伯鎮江陵人官翰林學士厓山破驅家屬并輜重沉海鼎孫被執一夕得脫卒蹈海元尹夢龍中興人母喪負土為墳結廬居其側手書孝經千餘卷散鄉人讀之有羣鳥棲其􅊘樹向遜宜都人自宋末及元九世同爨人無間言稱為義門眀傅瓛松滋人吳元年授江西行省叅政遷叅知政事與李善長定律務從簡當洪武元年上郯廟議時京師火四力水旱相仍帝諭修省瓛以天心仁愛為對且自引咎官至禮部右侍郎劉􅖡字子奇江陵人洪武進士厯兵部右侍郎建文時為侍中成祖即位進尚書大征安南以􅖡叅贊軍務簡定復叛儁再出叅贊沐晟軍務晟敗績於生厥江儁襲賊至大安海口颶風大作後軍不繼被執罵賊死洪熙初贈少傳諡節愍裴連字汝器監利人洪武中薦入太學知劍州遷浙江僉事永樂中調江西凡再免官再起御史論事不避權􅀔出按階州賊捕斬首惡數人餘釋不問後以忤當事出知易州仁宗初召為刑部侍郎言事忤㫖出知涪州老於家次子綸字景宣永樂進士居翰林為王振所扼景泰初為山東布政使劾鎮守太監覃廣罷之卒贈禮部尚書諡文僖何忠字廷陳江陵人永樂進士授御史三殿災言事忤㫖出為交阯政平知州及黎利反大將王通敗績遣忠及千户桂勝齎疏詣闕乞濟師未出境為賊所得脅之降兩人並不屈死忠贈南寕府同知諡忠節鄒師顏字希賢宜都人起家太學生永樂中任御史人不敢干以私遷大理寺丞署户部事與夏原吉同下獄仁宗即位釋之擢禮部右侍郎踰年告歸省墓還至通州卒貧不能歸喪宣宗命給官舟送之楊溥字宏濟石首人建文進士授編修永樂中侍皇太子為洗馬時宫僚多得禍溥繫獄十年讀書不輟仁宗立擢翰林學士入閣叅機務正統中進少保武英殿大學士卒贈太師諡文定溥有文學遇事持正與楊士奇楊榮同心輔政時號三楊劉魁字景星監利人諸生時與楊溥遊溥呼為老友監利建學魁伏闕上書願得名師詔以李鐸視學事初魁讀書荆臺觀勸羽士任倫歸儒倫遂舉鄉薦於監臨前盛稱魁才直指召魁同宴鹿鳴越三年魁亦膺鄉舉仁宗時溥執政疏薦之辭不赴詔迫之出授大足學訓導旋乞休溥繪修篁古木圖并詩贈之子祥以孝行聞魁卒祥夜廬墓側旦歸奉母母卒亦廬墓三年成化中旌表傅啟讓石首人永樂進士授河南按察僉事清慎有為嘗奏築隄以禦河水官至大理少卿李志松滋人永樂中以人材拜監察御史剛毅執法宣德間屬國朝貢不至廷議遣兵擊之志奏曰朝貢雖缺遽加以兵非懷遠之道遂止余汝弼字廷輔宜都人勤學好問居家孝友里嘗大疫同諸兄弟煑湯藥糜粥徧飲食之登永樂中鄉薦擢營繕主事遷屯田郎中卒之日家無餘儲張純字志中江陵人永樂進士宣德中授監察御史累擢僉都御史巡撫畿内風紀丕振仕終兵部尚書王恂字用誠公安人宣德進士授檢討博學工文操行簡素後擢大理寺丞巡撫貴州蠻夷畏服官至國子監祭酒劉祥監利人以右軍都督府事死正統己巳之難天順間錄其子汪浩字宏初石首人景泰進士厯官四川按察僉事諸郡冦作浩撟斬萬餘擢僉都御史巡撫四川平劇賊趙鐸等加副都御史討都掌叛夷平之所著有平西錄劉懋字勉之江陵人成化進士授刑科給事中封駮無所避值權閹汪直用事懋首劾之尋論昭德貴妃專寵杖繫詔獄出為浙江按察僉事以憂歸家居數十年足跡不至城市王宗義石首人自宗義以上五世同居成化中旌表蘇昭字廷顯宜都人童稚時日記千言後為南平令致仕一日江濱遇􅀌子守骸而泣昭問其由對曰父知巴陵殁於此昭遂出資殮之助之還王軾字用敬公安人天順進士宏治中厯官大理寺卿軾素精法比與刑部裁定問刑條例頒之天下尋拜南京戸部尚書督軍討平貴州普安賊婦米魯之亂改南京兵部叅贊軍務武宗立致仕卒贈太保諡襄简到思賢字用賓石首人宏治進士厯戸部郎中正德間以忤中官劉瑾繫獄免官瑾誅起知重慶府累遷工部侍郎㳟慎端慤囊無餘儲伍文定字時泰松滋人宏治進士正德時厯常州嘉興二府推官擢知河南府皆有政績調吉安與王守仁平宸濠遷廣東右布政使累擢兵部尚書兼右都御史督兵討雲南土酋安銓復移師征芒部叛酋普奴召還致仕卒天啟初謚忠襄曾連江陵人正德中以吏員任四川綿州判官率兵禦流冦廖麻子力屈死之贈上林苑監丞􅄻子鄧俊石首人正德中以吏員任四川營山縣典史時鄢賊猖獗城陷俊與次子俱死事聞廕其長子官朱輔字翼公公安人成化進士授南陽同知有異政擢御史出為浙江嘉湖道叅議禦倭失援不屈死倭首以屍歸百姓為斂事聞賜祭贈官鄒文盛字時鳴公安人宏治進士除給事中勘事遼東按鎮守中官廖玘罪正德時巡撫貴州累破諸苗嘉靖初厯户部尚書首疏鹽政錢法十一事䅲覈馬坊芻豆破冒宿弊為清乞歸卒贈太子少保謚莊简何皥字太古公安人景泰舉人知睢寕縣有異政尋以户部郎告歸世宗御題賜犢歸莊圖以寵之李夢祥字幼徵監利人嘉靖進士授温州府推官執法有聲後改工部主事尋出知思南府竭力禦苗冦鄰郡多陷而思南獨完范希賢字水南松滋人嘉靖舉人扄户著書不事干謁所著有水南集王期勤字少月松滋人萬厯進士知無錫縣倡始築城數月而畢後倭㓂所至残毁無􅃬以城固無恙厯官職方郎中王之誥字告若石首人嘉靖進士由知縣累遷兵部員外郎出為河南僉事討師尚詔有功厯大同兵備副使以擣板井功增秩厯僉都御史巡撫遼東大興屯田上便宜八事行之進兵部侍郎三邊總督神宗初召為刑部尚書乞終飬歸卒謚端襄張居正字叔大江陵人嘉靖進士由庶吉士授編修隆慶時厯禮部尚書武英殿大學士神宗立累進中極殿大學士太師居正以時乘積玩次第振刷千年之中時號太平卒贈上柱國謚文忠未幾削去崇禎初始復焉劉楚先字衡野江陵人隆慶進士授檢討累官禮部侍郎兼學士神宗時國儲未定楚先七上疏請婚冠期不報家居十六年起禮部尚書掌詹事府事卒贈太傳謚文恪袁宏道字中郎公安人與兄宗道弟中道並有才名時稱三表宗道萬厯十四年㑹試第一官至右庶子宏道萬厯二十年進士為禮部主事謝病歸築園城南植柳萬株號曰柳浪與中道及一二老衲居焉久之起文選主事縳胥吏作姦者送刑部置大辟都人大快官至稽勲郎中所著有瀟碧堂集中道亦萬厯進士第官至南京禮部郎中周天祚字白石松滋人天啟進士知南充縣擢户部主事請裁冗費數忤中官憂憤卒毛羽健字芝田公安人天啟進士厯知萬巴二縣並有聲崇禎初徵授御史疏劾楊維垣阮大鋮附閹罪二人遂被斥王師討安􅀖彦久無功羽健上言賊巢在大方黔其前門蜀之遵義其後户黔道險必從遵義進兵後如其言賊乃滅又極陳驛遞之害以蘇民困嘗疏奏温體仁謝陞王永光周延儒之姦積忤權要落職歸陸師贄字岷源江陵人萬厯舉人知江安縣入為御史閹黨劾之有楊漣密友之語坐罷職歸流㓂陷荆舉家渡江避難悒悒而死謝連監利人萬厯進士由兵部主事厯官廣東山東叅政登萊巡撫崇禎中死節贈兵部右侍郎賜葬祭恩廕一年本朝乾隆四十賜諡節愍劉楷字甸方江陵人為諸生有膂力崇禎九年賊冦荆州楷率義勇楊黄毛等數十人設伏邀之斬賊帥荆州圍解楊黄毛殁於陣楷後隨王叅將以三千人赴汝寕戰死本朝乾隆四十一年予祀忠義祠傅汝為字于宣江陵人崇禎進士知秀水歸善二縣擢南京兵部主事崇禎十五年闖賊陷南陽郡縣汝為出守汝寕顧語妻子曰吾世受國恩頂踵不足惜家有八十老父汝輩可疾歸奉飬賊至欲降之不屈賊怒用以祭礮死一年本朝乾隆四十賜諡節愍陳萬䇿江陵人天啟中舉於鄉有時名崇禎十六年李自成據襄陽叛臣喻上猷薦萬策於自成具書幣徵之歎曰我不能奮身滅賊尚可惜頂踵耶夜自經死本朝乾隆四十一年予祀忠義祠李開先字石麓江陵人天啟舉人與萬䇿齊名亦為上猷所薦使者至開先瞋目大罵頭觸牆死本朝乾隆四十一年予祀忠義祠張允修字建初居正子官尚寶卿崇禎十七年張獻忠陷城允修題詩於壁不食死一年本朝乾隆四十賜諡忠愍張同敞居正曽孫少負志節下筆千言立就以􅄻為中書舍人奉使慰問湖廣諸王因令雲南調兵明亡與翟式耜同殉節死就刃時首殞尸直立躍而前者三人皆辟易本朝乾隆四十一年賜諡忠烈王維藩字現南江陵諸生闖賊破荆州維藩率妻朱氏及二女避難遇賊妻女赴井死維藩見殺本朝乾隆四十一年予祀忠義祠王圖南字北􅈚江陵諸生被賊執不屈死本朝乾隆四十一年予祀忠義祠謝幼安字公嗣江陵人賊至龍灣為所獲幼安罵賊賊截其舌死本朝乾隆四十一年予祀忠義祠龎瑜字堅白公安人由貢生為陜西崇信知縣流㓂陷城瑜被執罵賊磔死瑜貌魁梧有膂力家貧以耕自給夏日戽水灌田執書從牛後朗讀喜讀易之官時筮得姤之革驚曰吾其殁於西乎且有兵象後皆驗贈固原知州廕子本朝乾隆四十一年賜諡烈愍楊一登枝江人崇禎末流㓂亂以驍勇為團練長㓂奄至流店一登率衆大破之後賊數萬悉至一登力禦三戰皆捷翌日賊併力復戰父子俱殁於陣本朝乾隆四十一年予祀忠義祠張大道字行之宜都人官照磨歸里流賊張君用據城大道團三千餘人攻之賊夜襲營父子五人力鄲死本朝乾隆四十一年予祀忠義祠王端冕字服先江陵舉人知趙州以廉惠得民崇禎十五年城破被執死之事聞贈官崇祀本朝乾隆四十一年賜諡節愍侯偉時字異度公安人崇禎進士知陽江縣有惠政擢工吏二部主事北都破隱湖湘間後大兵至被執諭降不屈而死本朝乾隆四十一年賜諡烈愍鄧巖忠江陵人由鄉舉為衢州推官州破自縊死本朝乾隆四十一年賜諡節愍唐自綵江陵人知臨安縣杭州破逃山中有言其受魯王敕者捕獲不屈死從子階豫同死節一年本朝乾隆四十賜諡忠節王時化江陵人知昭化縣崇禎末闖賊陷城死之十一年本朝乾隆四賜諡節愍本朝張可前字箸漢江陵人順治進士任瑞州府推官有惠政擢吏部主事陞郎中以親老乞養歸服闋補原官累陞副都御史疏請於蘭州設將軍控制河西旋晉刑部侍郎轉兵部致仕年八十三卒先是荆安二府協修江漢兩隄屢築屢潰可前請於上官力主兩地自衛之說以杜推諉隄工始固民利賴之胡在恪字念蒿江陵人順治進士厯官刑部郎中督學江南杜絶請託補江西鹽驛道致仕歸幼時父督課嚴嘗以硯擊其背至耄背每發痛則思慕涕泣弟年逾七十偶病即撫摩顧視寢食俱廢云咼正儀公安人順治進士授南陽府推官坦易敏決斷獄如神後裁缺知廣寕縣撫循有方卒於官民哭送之南陽有咼公橋邑人比之峴首云康熙間與父重望同祀鄉賢祠周士元監利人隨總督蔡毓榮攻辰龍關有功授雲南督標守傋厯陞福寕鎮總兵平巨㓂高松香調南澳總兵海賊陳君元逃亡計擒之卒賜祭葬侯章華公安人父令邱受害衡湘間年十歳其人撫為巳子持肉與食章華淚下曰既殺我父吾忍食殺父人手中肉乎其人遂逐之尋以哀慕卒李繼昌江陵人好施與賑饑掩骸完人婚娶給助囚糧四十餘年不懈妻朱氏尤與合志邑遭吳逆變後道殣相望朱煑糜以給酷暑執勞釡鬵間湯火沸騰著乳上肉為潰爛朱無悔心里人咸感稱其義張􅀿宗號魯峯江陵人乾隆丙辰副榜官大冶敎諭􅀿宗讀書穎敏自經史外兵算樂律諸書無不究覽亦工詩古文所著韻衡三卷於古韻頗有發明其以沈約鍾山應敎諸詩證四聲八病之言不出於約又謂反切本非梵音以華嚴字母乃中華譯經之文並非大竺本義為說尤精􅃀彭承堯松滋人由武進士授藍翎侍衞􅀘四川都司乾隆三十六年隨征金川有戰功厯陞至四川提督五十八年論平廓爾喀功圖像紫光閣命儒臣製贊旋調廣西提督以􅁹辦貴州狆苗功加太子少保銜凱旋日染瘴卒於軍劉名芳江陵增生孝事父母乾隆五十三年郡西北萬城隄潰水自西門入城中居民登城堞避水名芳母柩在堂與子繼諲攀號不忍去同時淹斃五十四年旌表黃義峯字際雲江陵人官保康縣敎諭嘉慶元年白蓮教匪犯保康義峯先謀捕􅁹賊恨之割其首縣於市其妻王氏子紹元僕多富張成呉升同時􅀍戕事聞入祀昭忠祠張發瑤宜都人嘉慶元年灌灣腦邪匪張正謨倡亂良民被脅者多發瑶潛約良民應官兵以紅布為號為内外夾攻之討事泄被戕妻王氏媳李民及孫女同時殉節嘉慶四年旌李國治宜都人為邪匪張正謨所脅不從謀與張􅀤瑤内應官兵事泄被害妻聶氏及二女同時殉節嘉慶四年旌流寓周管修齊人寓於楚白公之亂葉公聞其殺齊管修也而後入三國魏司馬芝河南温人避亂荆州於魯陽山遇賊同行者皆棄老弱走芝獨坐守老母賊至以刃臨芝芝叩頭曰母老惟在諸君賊曰此孝子也殺之不義遂得免害推鹿車載母居南方十餘年躬耕守節曹操平荆州以芝為管長晉皇甫方回安定朝那人謐子少遵父操兼有文才避亂荆州未嘗入城府刺史陶侃每造之著素士服望門輙下而進王敦遣從弟廙代侃以方回為侃所重不來諸己乃收斬之荆士莫不􅂷涕劉驎之南陽人居於陽岐在官道之側人物來徃莫不投之驎之躬自供給車騎將軍桓沖聞其名請為長史固辭不受去驎之家百餘里有一孤姥病將死歎息謂人曰誰為埋我惟有劉長史耳驎之先聞其患病往候之值其命終乃身為營棺殯送南北朝宋宗炳字少文南陽􅄺陽人於江陵三湖立宅武帝辟為太尉掾不起宋受襌及元嘉中頻徵不起好山水愛遠遊有疾還江陵歎曰老疾將至名山恐難徧覩惟澄懷觀道卧以遊之古有金石弄為諸桓所重惟炳傅焉從父弟彧之早孤事兄恭謹家貧好學雖文義不逮炳而真澹過之元嘉初大使陸子貞表薦徵員外散騎侍郎不就宗慤字元幹炳兄子慤年少叔父炳問其所志答曰願乘長風破萬里浪元嘉二十二年除振武將軍討破林邑將范毗沙攻拔區粟入象浦遂克林邑孝武伐逆以為南中郎詻議叅軍事平拜左衞將軍封洮陽侯大明三年竟陵王誕據廣陵慤求赴討事乎入為左衞將軍官至安蠻校尉雍州刺史加都督諡曰肅侯配享孝武廟庭齊劉虬字靈預南陽􅄺陽人徒居江陵少而抗節好學須得祿便隠宋泰始中任至晉平王驃騎記室當陽令罷官歸家靜處徴辟皆不應以江陵西沙洲去人遠乃徙居之建武二年卒宗測字敬徽炳孫少靜退不樂人間母喪身􅀒土植松柏長子賓為南郡丞付以家事遂往廬山宗向之炳宗人亦好山澤徵辟一無所就以夀終樂頤之字文德南陽􅄺陽人世居南郡仕為京府叅軍父在郢病亡頣之忽悲戀涕泣因請假還中路果得凶問便徒跣號咷遇商人附載西上水漿不入口數日湘西刺史王僧䖍引為主簿棄官去吏部郎庾杲之嘗往候頣之設食惟枯魚菜菹杲之曰我不能食此母聞之自出常膳魚羹數種杲之曰卿過於茅季偉我非郭林宗仕至郢州中從事樂預字文介頤之弟亦至孝父亡悲咸門絶吐血數升官至驃騎錄事叅軍隆昌末預謂丹陽尹徐孝嗣曰外傳籍籍似有伊周之事人笑禇公至今齒冷無為效尤孝嗣改容謝之建武中為永世令人懷其德庾易宇幼簡南陽新野人徙居江陵志性恬靜不交外物齊臨川王暎臨州表薦之餉麥百斛辭不受徴為司空主薄不就卒梁樂藹南陽淯陽人家居江陵齊䂊章王嶷為荆州刺史以藹為驃騎行叅軍或譖藹􅅟門如市嶷遣覘之方見藹閉閣讀書後為大司馬記室永明八年用為荆門從事梁天監初累遷御史中丞性公彊居憲臺甚稱職出為廣州刺史卒宗夬炳孫少勤學有局幹仕齊為驃騎行叅軍齊􅓹林為南郡王使管書記及即位夬為秣陵令鬱林遇害惟夬與傅昭以清正免梁武帝受禪厯太子右衛率五兵尚書叅掌大選劉坦字德度虬從弟仕齊為孱陵令南中郎錄事叅軍以幹濟稱梁武帝起兵除行湘州刺史齊東昏遣安成太守劉希祖破平都移檄湘部州人欲泛舟逃坦悉聚舟焚之誅叛黨鍾元紹天監中論功封荔浦子遷蜀郡太守未至卒庾詵字彦賓新野人居江陵幼聰警篤學性托夷簡蔬食敝衣不修產業梁武帝少與詵善及起兵署為平西府記室叅軍詵不屈普通中詔以為黄門侍郎稱疾不起卒年七十八詔諡貞節處士子曼倩早有令譽元帝在荆州為中錄事後轉諮議叅軍所製文章凡九十五卷庾承先字子通潁川鄢陵人家居江陵少沉靜有志操受學於南陽劉虬强記敏識出於羣輩辟功曹不就晚居土臺山鄱陽王恢在州要與游處令講老子遠近名僧咸來赴集皆得所未聞中大通三年卒刺史厚自贈􅐠門人黄士龍讓曰先師臨終之日誡約家門薄棺周形巾􅄄爲斂雖䝉賚及不敢輕承敎㫖以違平生之操錢布輙付使反時論高之韓懷明上黨人客居荆州十歳母患尸疰每發輙殆懷明於星下稽顙祈禱忽聞空中有人曰童子母自苦未曉而母平復十五喪父負土成墳􅐠助無所受免喪與鄉人郭黁俱師南陽劉虬虬嘗一日獨居涕泣家人云是外祖亡日時虬母亦已亡矣懷明即日罷學還家就養家貧力供甘脆朝夕不離母側母年九十以壽終懷明水漿不入口一旬號哭不絶聲有雙白鳩巢其廬上服釋乃去及除喪蔬食終身梁天監初刺史始興王憺表言之州累辟不就卒於家庾黔婁字子貞新野人易子少好學仕齊爲編令有異績徙孱陵令到縣未旬父易在家遘疾黔婁忽心驚即日棄官歸家時易疾始二日每稽顙北長願以身代易卒黔婁廬於冢側梁時爲益州長史從鄧元起平成都珍寶一無所取惟請書數篋尋除蜀郡太守元起死於蜀部曲皆散黔婁身營殯殮㩦持喪柩歸鄉里東宫建侍皇太子讀甚見知重遷散騎常侍卒庾於陵字子介黔婁弟能言元理博學有才思齊隨王子隆召爲荆州主簿子隆爲明帝所害惟於陵與宗夬獨留經理喪事永元末除東陽遂安令梁天監中爲太子洗馬洗馬向取甲族武帝曰官以人清豈論甲族時論以爲美庾肩吾字子慎於陵弟八歲能賦詩晉安王在雍州被命與劉孝威等抄撰衆籍號高齊十學士及即位擢爲度支尚書侯景之亂避地㑹稽間道奔江陵承聖中厯江州刺史領義陽太守封武康縣侯劉之遴字思貞虬子八歳能屬文年十五舉茂才明經對䇿即調爲太學博士後官至都官尚書太常卿之遴好屬文多學古體著春秋大意十科左氏十科三傳同異十科合三十事上之侯景陷臺城將立蕭正德爲帝使之遴授璽紱之遴剃髮被法服乃免劉之亨字嘉㑹之遴弟好學美風姿善占對大通六年出師南鄭詔湘東王繹節度諸軍之亨以司農屬西魏滅梁遂留長安官至司宗中大夫作哀江南賦以致其意唐袁滋蔡州朗山人客荆郢間起學廬敎授建中初黜陟使趙質薦於朝李遜字友道唐宗室客居荆州累遷濠州刺史入為虞部郎中由衢州刺史政最擢浙東觀察使入為給事中故事天子以畸日聽政對羣臣遜奏陛下求治下有所陳當不時上不宜限以日憲宗從之後為忠武節度使遜為政抑强植弱貧富均一所至有績可紀官至刑部尚書卒諡曰貞子方元第進士署江西府判官有論死者十餘囚方元審其􅁈悉平貸之終處州刺史李建字杓直遜弟與兄俱客荆州母憐其孝常曰倭子勸吾食吾輙飽勸吾藥吾疾瘳倭子建小字也貞元中補校書郎德宗思得文學者或以建聞帝問左右宰相鄭珣瑜曰臣為吏部時當補校書者八人他皆藉貴􅀔以請建獨無有帝喜擢左拾遺翰林學士李師古以兵侵曹州建作詔諭還之辭不假借以兵部郎中知制誥宰相有竄定藁詔者亟請解職官至刑部侍郎雖通顯未嘗置垣屋以清儉稱五代梁梁震卭州依政人唐末進士朱温􅆲唐歸蜀過江陵高季興愛其才欲奏為判官震恥之欲去恐及禍乃請以白衣侍樽俎季興重之呼為前輩震終身稱前進士後自稱荊臺隠士孫光憲陵州貴平人游荆渚高從誨署為從事厯保融繼冲三世皆在幕府累官至檢校秘書監兼御史大夫賜金紫宋太祖時光憲勸繼沖獻三州之地元謝端蜀之遂寕人宋末避兵江陵因家焉幼穎異弱冠與尚書宋本同以文學齊名時號謝宋史杠宣慰荆南薦之姚樞延祐五年擢進士乙科官至翰林直學士端善為政績譽藉然其文章嚴謹有法預修三朝實䤸及累朝功臣列傳時稱其有史才明宋登春直隸新河人能詩兼工繪事寓居江陵與山左謝榛皆以布衣名一時列女晉皮京妻龍氏字憐西道人年十三適宜都皮京未踰年京卒京二弟亦相次殞憐貨其嫁時資粧躬自紡織數年間三喪俱􅺿每時享祭無闕守節窮居五十餘載而卒南北朝宋宗炳母師氏南陽􅄺陽人炳父繇之湘鄉令母同郡師氏聰辨有學義敎授諸子後徙居江陵宗炳妻羅氏炳不應徵聘妻羅氏亦有高情與炳協趣劉凝之妻郭氏梁州刺史郭銓女遣送豐厚凝之悉散之屬親妻亦能不慕榮華與凝之共儉苦乘薄笨車出市貿易周用之外輙以與人齊劉虬妻樂氏南陽淯陽人樂藹姊家居江陵適徵士同郡劉虬明識有禮訓藹爲州迎姊居官舍三分祿秩以供焉元向存仁妻張氏宜都人存仁早卒其弟存禮亦早世存仁妻張氏存禮妻杜氏各一子二婦年皆未及三十俱守節至元中旌其門曰節義明鄭克誠妻宋氏石首人夫卒時年二十五既終喪姑以子幼家貧欲奪其志宋以死自誓㑹姑病篤宋割股奉姑啖之遂愈又撫姑之幼子完其婚娶守節五十七年洪武中有司以聞旌命未下而卒關福妻李氏江陵人夫醉卧鄰火延及屋李舍幼子女􅀒夫烈熖中相持莫能動並子女死焉王善妻杜氏江陵人善卒有子倫甫二歳姑勸之嫁杜痛􅂘自誓姑年八十卒以禮殮葬敎子成立孀居四十餘年正統中旌張原泰妻姚氏石首人姑病目䑛之愈姑殁勤女紅以給殯葬三年不食肉正統中旌周鏞妻魏氏石首人年二十四而寡誓守四十餘年景泰中旌張蘭妻尹氏石首人蘭早卒尹年二十五紡績以給衣食養姑九十而卒孀居五十餘年天順中旌沈彥清妻于氏江陵人清卒于年二十八家貧養姑撫子守節四十餘年成化中旌何洪妻李氏松滋人洪早卒李年二十七無子苦節不二宏治中大水度不能自存曰年饑若此嫠婦安所求活乎因自縊死梁從善妻向氏宜都人年二十六夫卒子儼方在孩提餋姑撫子守節六十餘年以壽終陳氏女江陵人未筓正德七年賊過其地被掠度不能免乃投水死求得其屍顔色如生李淳妻王氏松滋人正徳末年流㓂入其居欲劫汙之大罵不從被害何清妻楊氏枝江人清卒楊年二十四子存中時在襁褓楊撫􅀌礪節壽至九十嘉靖中旌徐迪妻蔣氏石首人迪嘉靖中鄉舉殁時蔣年二十四父母欲奪其志以死拒之庭有栢樹旦夕依栢悲號樹為之枯二年枝葉復發里人異之稱為栢夫人萬厯中旌潘􅃏妻羅氏監利人鉞舉孝廉肄業南雍歸殁於水羅痛􅂘欲絶撫其子成立羅季女適萬姓早寡亦苦志入稱母女雙節咼懋妻劉氏公安人年二十四夫卒撫遺􅀌文昌敎之成名守節垂三十年有司旌其門毛璣妻張氏公安人許配毛璣未嫁而璣卒張甫十四歳守節夀至七十萬厯中旌袁宗道妾胡氏公安人年二十六宗道卒於京邸誓死守終身茹蔬待嫡出子如己出臺使者旌之王維晫妻梁氏江陵人維晫死梁年二十絶粒五日晨起拜姑及母撫棺哭目皆裂絶於喪次余鳳儀妻駱氏宜都人年二十八鳳儀卒無嗣里人勸之嫁駱以刀自剄不殊自是人不敢言勤紡績以飬舅姑年六十旌門李氏宜都人鄭伯貴妻鄭為盜屢諌不從李自殺以屍諌知縣陶之文題其墓碑曰哲婦劉士忠妻李氏宜都人年二十夫死子甫三歲李勤苦敎子撫三孫成名年八十六終孫漢天啟中成進士詔旌其門曰節義文章鄭友妻熊氏江陵人年二十餘夫死誓守節奉事舅姑辟纑課子四十餘年劉如海妻熊氏監利人為如海繼室事二祖姑以孝聞前妻子在朝方九歲且多病鞠育過於所生年二十九而寡課在朝天啟時成進士後贈恭人年七十三卒王道妻張氏江陵人年二十六夫病革子化行月餘張抱至道前曰兒存與存兒亡與亡道隨瞑張以甆破面流血閉一室非舅姑命不出㑹父卒即室中為位􅂘語兄若弟未亡人不敢歸唁其守禮如此王廷卿妻狄氏江陵人廷卿為諸生早卒未葬狄誓三年服闋當與同穴及期不食死胡盡忠妻文氏枝江人年二十三夫亡遺腹子仲禮撫之成立始終一節楊氏松滋人夫為諸生忘其姓年二十殁楊年十八兩子方在襁褓日則侍舅姑提攜兩穉子嬉戲於前夜則飲泣咽不成聲未浹歳姑忽感疾扶抱進湯餌凡二十年如一日張維妻王氏枝江人未嫁維卒王擗踊呼號水漿不入口者數日欲往弔父母不許王請兄往為代奠母虞有他變令婢守之王侯婢寢熟濳出赴水死楊一敬妻嵇氏枝江人年二十夫死無嗣剪髪自誓設夫像祀之有司三旌其門年七十終李本溶妻柳氏松滋人年十九而寡子幼父母諷其嫁柳即溺水求死卒全其節徐嶧母雷氏江陵人家貧苦節崇禎十五年闖賊至沙市劫掠雷度不免縱火自焚死蕭中妻張氏江陵人崇禎十五年闖賊至沙市不及避賊欲汚之張罵賊死涂升庸妻王氏江陵人崇禎十五年賊至江陵升庸被害王罵賊攖其怒捽王髪控馳十餘里至馬驛街不屈賊縛於杆殺之沈氏江陵人沈肇隆女年十九繼室於馮甫一載夫亡姑亦寡沈與姑同守節崇禎時賊陷荆州沈暗置刃懷間賊覺將劫之沈乃大罵賊刃其面落數牙罵不絶口死繡衣女子不知何許人荆賊任光樂犯之死不從囚之别室遣老嫗勸諭之女曰妾巳名登􅀑錄死後乞姆以杯土掩吾骸耳俯首就刃顔色不變觀者咸爲流涕涂天麟妻殷氏江陵人年二十餘守節崇禎十六年闖賊陷江陵殷藏牆穴中夜以書櫃縱火自焚抱孫女泣曰汝不幸爲女子於此不死更何待遂赴火二子被掠歸從鄰嫗得骸骨葬焉徐宏修妻田氏江陵人宏修爲諸生崇禎十七年賊破白􅈷河宏修死之田氏哭而奔投於水水淺賊追及欲犯之田大罵不屈遂遇害潘有榖妻劉氏監利人有榖爲諸生崇禎十七年城陷被害劉噴血罵賊死胡公恪妻王氏監利人與女蕊姑俱爲賊掠女時年十三絶粒七日憤罵不輟賊怒刃之王氏抱幼女赴水死胡良儒妻袁氏松滋人年二十夫病瘧遠出而死柩至袁往河下設奠痛哭畢躍入水中移時屍浮水面遶夫舟以行事聞爲立烈婦碑宋氏女宜都人宋名錄女崇禎十七年賊將張君用屠其家女方垂髫賊欲活之女延頸受刃宋一家遂絶王奇妻尹氏松滋人奇爲諸生明末夫婦俱爲賊執欲犯之光殺奇尹大罵以夫血塗面拔賊殺夫之刃自刎死徐兆麟妻何氏石首人事姑至孝後遇賊赴水死劉氏江陵人劉汝濟女年十八夫先罹賊難死劉矢志靡他崇禎十七年流㓂張獻忠大掠劉倉卒出走與祖母蕭氏同被賊執遂赴水死旬日汝濟覓得其屍並其夫合葬於邑之天井淵傅乘乾妻文氏江陵人居紀山乘乾死文少寡崇禎末􅂝子避賊宿林中不入人家子復死遇賊刃之八創不從以節終侯令邱妾劉氏公安人適江陵侯令邱官京師崇禎十七年闖賊犯闕令邱欲舁劉送他所劉曰君早自匿勉圖報國盍封我置一室勿以爲念令邱如言脫身去劉自領至履皆用針線密縫遂自縊死賊平有鍼匠張某感其節收葬之侯氏公安人侯令邱二女一適田氏流賊至舅姑驚惶莫措女曰無憂兒就掠一室可免晚當尋兒於紀湖之潭語竟賊挈之去翌日尋之不得後五日復涕泣往尋屍乃冒水出面色如生血自鼻流如泉一適王氏避賊湖中賊至亦蹈水死咼公達妻龔氏公安人子修儀娶劉氏崇禎末流㓂大至欲汚龔抗志不辱爲賊所殺劉見姑隕命抱姑首痛哭且大罵亦絶命於姑側賊衆歎息而去李曙實妻潘氏宜都人曙實為諸生明末為土㓂汪姓者所殺逼潘為子媳潘乘間投河死三日屍浮水面顔色如生田學謨妻毛氏公安人田死毛無子撫側室所生三子如己出孀居苦節後遇賊被執不屈死本朝陳壯猷妻劉氏江陵人順治元年六月流賊掠之去劉罵賊曰我忠臣劉儁後肯受賊污耶賊怒殺之裴旗徵妻王氏監利人流賊掠其夫去王抱兒至河干望之賊至驅王行不從母子俱死徐鐸妻劉氏宜都人夫為獻賊殺劉攜女依父母避亂父母繼亡女亦夭營將某强聘之劉寓書於兄自縊死王某妻鄭氏江陵人適鄉民王某王死市豪見其美强娶之鄭密縫衣牢不可解憤罵不從以死蕭汝六妻陳氏江陵人年二十夫卒止一女女死依母母死無所依饑寒交迫終不易其志而死劉烈女江陵人名又大年十六父母他出土豪戴某夜入其室逼污之不從被殺康熙四十三年知縣捕戴置之法四十四年旌毛瀚澄妻金氏枝江人許嫁毛爲繼室未嫁夫卒金欲赴􅂘父母阻之夜