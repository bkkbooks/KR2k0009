body:
  text: 順天府東西距四百七十六里南北距四百八十八里東至遵化州界二百四十六里西至宣化府保安州界二百三十里南至天津府青縣界三百一十三里北至邊牆一百七十五里東南至天津府天津縣界二百里西南至保定府新城縣界一百七十里東北至遵化州馬蘭峪邊牆三百四十里西北至宣化府延慶州界一百三十里分野天文尾箕析木之次春秋元命苞尾箕散為幽州分為燕國晉書天文志班固言自尾十度至南斗十一度為析木于辰在寅燕之分野屬幽州費直周易分野析木起尾九度蔡邕月令章句析木起尾四度魏太史令陳卓云上谷入尾一度漁陽入尾三度涿郡入尾十六度廣陽入箕九度建置沿革禹貢冀州之域周為幽州之域春秋戰國幽州燕郡厯慕容儁苻堅慕容埀州郡之名如故後魏為幽州燕郡北齊置東北道行臺後周建德六年置幽州總管府隋開皇三年郡廢大業初府廢三年改幽州為涿郡按漢涿郡晉魏范陽郡皆治今涿州隋唐時始移其名於薊唐武德三年復曰幽州置總管府按隋大業中羅藝自稱幽州總管至武德二年歸唐舊唐志寰宇記皆云武德元年改仍羅氏之舊也六年改大總管府七年改大都督府貞觀初屬河北道開元二年置幽州節度使天寶元年改幽州為范陽郡幽州節度使為范陽節度使乾元元年復改郡曰幽州寶應元年改范陽節度使為幽州節度使後又兼盧龍節度使乾寕中為劉仁恭所據及子守光僭號稱燕梁乾化三年入晉五代後唐仍置幽州及盧龍節度使石晉天福初割入遼遼㑹同元年改南京幽都府置南京道開泰元年改燕京析津府保大二年入金金天輔七年入宋宋宣和五年改為燕山府廣陽郡置永清軍節度七年復入金天㑹三年仍為燕京析津府七年屬河北東路貞元元年改燕京為中都府曰大興自㑹寕遷都於此元太祖十年置燕京路總管大興府至元元年改建中都四年徙都之九年改曰大都二十一年置大都路總管府為中書省治明洪武元年改曰北平府隸山東行中書省二年置北平行中書省九年為北平承宣布政使司治永樂元年建為北京改北平府為順天府十九年始稱京師本朝初因之領州六縣二十二順治十六年省漷縣入通州乾隆八年升遵化州為直隸州以玉田豐潤二縣改屬今領州五縣十九統於順天府尹亦兼屬直隸總督大興縣附郭治府東偏東西距二十四里南北距一百七里東至通州界二十一重西至宛平縣界三里南至東安縣界七十二里北至昌平州界三十五里東南至通州界四十五里西南至固安縣界一百十里東北至順義縣界六十里西北至宛平縣界六十里本周初薊國春秋時為燕國都秦置薊縣屬上谷郡漢初為燕國都元鳳中為廣陽郡治本始後為廣陽國治後漢初屬上谷郡永元八年復爲廣陽郡治三國魏爲燕國治晉因之後魏爲幽州燕郡治齊周因之隋爲涿郡治唐爲幽州治遼初改曰薊北縣開泰元年又改曰析津縣爲燕京析津府治宋宣和中爲燕山府治金貞元二年始改曰大興爲中都大興府治元爲大都路治明洪武初爲北平府治永樂中爲順天府治本朝因之宛平縣附郭治府西偏東西距一百九十三里南北距一百十里東至大興縣界三里西至良鄉縣界一百九十里南至固安縣界九十里北至昌平州界二十里東南至東安縣治一百二十里西南至良鄉縣治七十里東北至順義縣治六十里西北至昌平州治七十五里本漢薊縣地唐建中二年析置幽都縣與薊縣並治幽州郭下遼開泰元年改曰宛平爲析津府治宋宣和中爲燕山府治金爲大興府治元爲大都路治明爲順天府治本朝因之良鄉縣在府西南七十里東西距三十二里南北距六十里東至宛平縣界二十里西至房山縣界十二里南至涿州界四十五里北至房山縣界十五里東南至固安縣治七十里西南至涿州治七十里東北至宛平縣治七十里西北至房山縣界二十里漢置廣陽縣屬廣陽國後漢屬郡晉屬范陽國後魏屬燕郡北齊省入薊縣唐為良鄉縣地五代唐長興三年始移良鄉於閻溝屬幽州遼屬析津府宋宣和中屬燕山府金屬大興府元屬大都路明屬順天府本朝因之固安縣在府南一百二十里東西距五十五里南北距一百十里東至永清縣界二十五里西至涿州界三十里南至保定府雄縣界九十二里北至宛平縣界十八里東南至霸州界五十五里西南至保定府新城縣界七十里東北至宛平縣治一百十里西北至良鄉縣治七十里漢置方城縣屬廣陽國後漢屬涿郡晉屬范陽國後魏屬范陽郡齊省隋開皇九年移置固安縣屬幽州大業初屬涿郡唐武徳五年屬北義州貞觀元年屬幽州大厯四年改屬涿州五代遼因之宋宣和四年屬涿郡金屬涿州元憲宗九年改屬霸州又改屬大興府中統四年升為州屬大都路明洪武元年復降州為縣屬順天府本朝因之永清縣在府南一百四十里東西距五十里南北距五十七里東至東安縣界三十里西至固安縣界二十里南至霸州界三十里北至東安縣界二十七里東南至大城縣治一百里西南至霸州界五十里東北至東安縣治四十里西北至良鄉縣治一百一十里本漢益昌縣地晉以後為安次方城二縣地唐如意元年分安次置武隆縣屬幽州景雲元年改曰㑹昌天寶初又改曰永清遼屬析津府周霸州治宋屬燕山府金屬大興府元屬大都路明屬順天府本朝因之東安縣在府東南一百四十里東西距三十里南北距百五十里東至武清縣界十八里西至永清縣界十二里南至天津府靜海縣界六十里北至大興縣界九十里東南至天津縣海口一百十里西南至霸州治一百里東北至通州治一百里西北至固安縣治八十里漢置安次縣屬勃海郡後漢屬廣陽郡晉屬燕國後魏曰安城縣屬燕郡隋復