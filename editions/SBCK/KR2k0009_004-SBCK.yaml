州文安大城二縣五百户􅀠軍新倉鎭今寶坻縣治五代時置鹽倉於此遼為新倉鎭金始置縣金劉晞顔新建寶坻縣記唐末劉仁恭帥燕其子守光置蘆臺軍於海口鎮後唐同光中趙德鈞鎮其地因蘆臺鹵地置鹽場相其地高阜平闊因置榷鹽院謂之新倉以貯鹽遼時置新倉鎮後分􅀠香河縣大定十一年鑾輿東巡幸此謂新倉鎭人烟繁庶可改為縣明年析香河東偏四鄉置縣謂鹽乃國之寶取如坻如京之義命之曰寶坻故興州中屯衞在良鄉縣治東明永樂四年建本朝順治九年栽故通州衞在通州治南明建文四年建又有通州左衞在通州衞東南通州右衞在州冶東南俱明永樂中建又神武中衞在州治南建文二年燕王建定邊衞在州治西南建文四年建今俱裁故營州後屯衞在三河縣冶東明永樂二年建又興州後屯衞在縣治西永樂三年建本朝順治中俱裁故密雲中衞在密雲縣治東明洪武四年建本朝康熙三年裁又密雲右衞在古北口明洪武末建本朝順治九年裁故涿鹿衛在涿州治西南又涿鹿左衞在州治西涿鹿中衞在左衞西俱明永樂中建本朝順治九年裁中左二衞康􅄉二十七年裁涿鹿衞故薊州衞在薊州東北明洪武十年建又鎭朔衞在薊州衞西明永樂中建營州右屯衞在州治北本舊大寕衞永樂二年移此今俱裁故營州中屯衞在平谷縣治東明小樂二年自大寕移此本朝順治九年裁安墟在東安縣界舊志東安縣古安墟黃帝制天下以立萬國始經安墟合符釜山即此縣志安墟在常道城棗林在通州南故郭縣西北元時爲畿甸東南要路柳林在通州南漷縣西元主元十八年如漷州又如柳林自後皆以柳林爲遊畋之地建行宫於比御馬苑在通州西二十里鄭邨壩明時牧養御馬處大小二十所相距各三四里皆繚以周垣坦中有廏垣外地甚平曠羣馬畜牧其閒實錄景泰三年造駝房於鄭邨壩天順四年駕辛鄭邨壩閲仗馬皆此地也蕃育署在大興縣東南七十里東安縣東北六十里古安次縣采魏里也明初爲上林苑改名蕃育署土人合新舊而名之呼爲采有臨朔宫在大興縣界隋書煬帝紀大業七年四月至涿郡之臨朔宫唐書地理志薊縣有故隋臨朔宫碣石宫在宛平縣西史記鄒衍如燕昭王築碣石宫親往師之正義碣石宫在幽州薊縣西三十里長慶宫在東安縣西南縣志宫舊在廣平淀金天會三年移安次南五十里有大石橋以受諸國之禮今次平屯乃其舊址神潛宫在通州故漷縣西南二十里遼后妃從獵行宫也遺址尚存永福宫在昌平州南二十里明宏治十七年建俗呼迴龍觀瑞雲宫在房山縣西北二十餘里金太祖陵側聚燕臺在大興縣東九十里春明夢餘錄臺高一丈廣三四十尺嵗秋社燕辭巢曰必各將其雛數千百羣聚此臺呢喃一二日然後分翔而去謊糧臺在大興縣東南六里相傳唐太宗征高麗時嘗虛設囷倉於此以疑敵人黃金臺在大興縣東南任昉述異記燕昭王為郭隗築臺今在幽州燕王故城中土人呼為賢士臺亦謂之招賢臺迺賢集黃金臺在大悲閣東南隗臺坊内明統志臺在府東南十六里又一曰小金臺在府東南十五里按燕昭王於易水東南築黃金臺延天下士後人慕其好賢之名亦築臺於此為燕京八景之一曰金臺夕照本朝高宗純皇帝有御製金臺夕照詩按史記昭王為郭隗改築宫而師事之不言築臺後漢孔融論盛憲書始云昭王築臺以事郭隗然亦無所謂黄金臺也至水經注及文選李善注引王隱晉書隋上谷圖經始有黃金臺之名然皆在今易州惟述異記謂臺在幽州後人縁此以築耳豐臺在宛平縣西南草橋南為京師種花之所芍藥之盛連畦接畛彌野絢爛相傳无人園亭皆在於此按日下舊聞金時郊臺在南城外豐冝門者金之南門也豐臺疑即拜郊臺因門曰豐宜故目為豐臺云耳拜郊臺在宛平縣西南七里金大定閒拜天於此金史地理志金因遼舊俗以重午中元重九日行拜天禮重午於鞠場中元於内殿重九於都門外安臺在宛平縣西史記樂毅傳齊器設於安臺大吕陳於元英故鼎反乎磨室括地志元英磨室二宫皆燕宫在幽州薊縣西四十里安臺之下看花臺在宛平縣西玉泉山隆教寺西長嶺之半為金章宗故蹟又有看花臺在密雲縣西北三十里大水峪相傳遼蕭后嘗登此釣魚臺在宛平縣西花園邨臺下有泉湧出匯為池其水至冬不竭相傳金人王鬱隱此駐蹕臺在宛平縣西元史文宗紀至順二年發軍士築駐蹕臺於承天護聖寺東雀臺在固安縣西南十八里相傳趙李牧所築舊志謂當作將臺音譌耳武毅漢軍臺在永清縣南二十五里又有武毅番軍臺相傳皆宋初所築奕臺在東安縣西八里左奕邨宋為左奕衞臺高一丈六尺周一百二十歩制如土樓元時㸃軍於此虛糧臺在通州城東有臺十餘相傳趙德釣屯兵於此因軍中乏糧築臺以誑敵呼鷹臺在通州故漷縣西南二十五里元至大􅀄所築亦名晾鷹臺高數丈周一頃元時遊獵多駐於此將臺在通州西二十五里名勝志將臺有三其二在州城西徐達建或曰唐薛仁貴征遼所築用蓆壘土為之其一在州城北通京師東􅀡門中路舊傳慕容氏拜將臺也又保定縣志縣西南有將臺相傳宋楊延朗演武於此駐馬臺在寶坻縣南五里相傳金章宗嘗駐此一名歇馬臺龍虎臺在昌平州西舊縣四十里居庸關南口地勢高平如臺廣二里袤三里元時車駕嵗幸上都往來皆駐蹕其上仙臺在懐柔縣東十里高十丈下有深洞可容百人孤臺在懷柔縣北三里高十餘丈華陽臺在涿州城西北隅相傳燕丹與樊於期置酒華陽館即此展臺在涿州西南二十里燕昭王展禮賢士所築燕昭王臺在涿州西南五十里亦稱仙臺水經注濡水出燕王仙臺東臺有三峯甚崇峻騰雲冠峯高霞翼嶺岫壑沖深含煙罩霧舊言燕昭王求仙處金章宗歇涼臺在房山縣西二十里茶慺山頂遺址猶在龍門臺在房山縣西南二百里四面皆山其下深澗莫測南有一竅上有龍神祠霸臺在霸州州治後相傳宋時將臺今圮改題於州治左譙樓之臺孟母臺在文安縣東北柳河臺下有洞為孟良藏母處釣臺在大城縣東北子牙鎮鹽河中相傳木公嘗居此所謂北海之濱也其臺浮出水面土人云常隨水高下雖大浸不沒鳳凰臺寰宇記在大城縣東北十五里晉石勒四年鳳凰見於此因築臺舞劒臺在薊州李靖遺蹟有石甚堅三臺明統志在平谷縣北十五里中曰發箭東曰擂鼔西曰望馬相傳金章宗出獵登此縣志望馬臺摩鼓臺在縣東二十里發箭臺在縣北二十里齊政樓明統志在府西海子東岸元建蓋取齊七政之義燕角樓在大興縣東南遼時建披雲樓在大興縣南舊有題額金章宗手書樓上有遠樹影即風雨晦明皆見元耶律楚材詩閒上披雲第一重即此卷幔樓燕都遊覽志宛平縣玉泉山有吕公巖下臨一潭廣丈餘山上有看花臺卷幔樓雁月樓在永清縣信安鎭土樓在東安縣東六里宋時為土兒衞臺高一丈二尺周一百六十步舊建樓其上以為四時歌樂之所酒樓在霸州治東澄清街元華亭管訥為州學正有東城酒樓花滿煙之句今廢中心閣在府治西元建以其當都城中故名閣東十餘歩有臺繚以垣上有碑刻中心臺三字又有天堂在府治後萬柳堂在大興縣南花園邨元廉希憲別墅陶宗儀輟耕錄堂臨池數畝池中多蓮繞池植柳數百株每夏柳䕃蓮香風景可愛遂初堂在大興縣南元詹事張九思別業明統志花竹水石之勝甲於都城九思常以休沐與公卿賢大夫觴咏於此從容論說古今以達於政理非􅀡為遊樂也雙清亭在大興縣東南通惠河上元都水張經厯園也宋褧有詩東郭草亭在大興縣東南明興濟伯楊善別業朝士休暇宴遊餞迎賓友咸憩於此南野亭在大興縣南前臨㵎水元宋褧虞集皆有詩玩芳亭在大興縣南元栗院使別墅馬祖常王士熙薛元卿皆有玩芳亭詩匏瓜亭在大興縣南十里明統志亭多野趣元趙參謀別墅按參謀趙禹卿嘗種匏瓜以製飲具當時目曰趙匏瓜王惲詩所謂君家匏瓜盡尊􅂜也垂綸亭在大興縣西南元學士宋本故居雅集亭在宛平縣西南盧溝河畔相傳元符氏建望湖亭畿輔通志在宛平縣五泉山裂帛湖上睨瞰西湖明如半月明李夢陽何景明皆有詩飛泉亭在宛平縣五華山西北有泉自山畔湧出建亭於上以翼之泉水東南流逾尋丈許伏而不見至玉泉山趾湧出蓋王泉之源也督亢亭在固安縣南後漢書郡國志方城縣有督亢亭按明統志謂在涿州東南十五里高丈餘周七十歩又見新城縣崔氏園亭在通州故漷縣内陳循寰宇通志邑人崔禮仕金為四鄉學諭後隱居於此作園亭植花卉以自娛元人時往遊觀焉通潞亭在通州東南水經注以為王莽所建初月亭在密雲山南山麓有二泉相踰僅數尺匯為一流故稱聖水泉泉上有初月亭酈亭在涿州樓桑邨南三里後魏酈道元故居武平亭在文安縣北史記趙世家惠文王二十一年徙漳水武平西二十六年徙漳水武平東括地志武平亭今名渭城在文安縣北七十二里縣志今勝芳鎭在縣東北七十里濁漳滹沱會流於此疑即武平也避暑亭在薊州西北五里相傳金章宗避暑於此干越王廨在大興縣界宋王曾上契丹事燕京子城南門外有干越王廨為宴集之所永平館在大興縣南十一里遼時朝士宴集之所王曾上契丹事燕京南門外永平館舊名碣石館望京館在大興縣東北五十里遼建為南北使臣宿昔餞飲之所王曾上契丹事岀燕京北門至望京館沈括夢谿筆談幽州東北三十里有望京館金溝館在密雲縣東北四十里王曾上契丹事檀州五十里至金溝館將至館川原平曠謂之金溝淀夢谿筆談金溝館東北三十餘里至中頓過頓屈折北行峽中濟灤水道三十餘里鈎折投山隙以度所謂古北口也大安館在房山縣西北大安山劉仁恭師事方士王若訥於此曲水園在大興縣東明駙馬萬煒園也園石牆一徑皆竹竹盡而西迢迢皆水曲廊亭臺皆東西濱水其中有松花石其半尚存木質又冉駙馬宜園石假山名萬年聚亦在東城李戚畹新園在大興縣三里河東明武清侯李偉別業有金魚池梅花亭又有鷗臺鳬樓船橋魚龍諸亭厯二水關長廊數百閒水岸設邨落宛如江浦漁市梁家園在宛平縣西南宣武門東南舊城邊明時都人梁氏建引涼水河入其中亭榭花木極一時之盛今廢萬春園在宛平縣西積水潭元時進士登第恩榮宴後㑹同年於此宋褧詩臨永亭臺似曲江是也張園在宛平縣西嘉興觀西二里明惠安伯張元善別墅牡丹芍藥各數百畝栗園在宛平縣西遼史百官志南京栗園司典栗園即此又在固安縣界括地志固安之栗天下稱之爲御栗因有栗園米家園在宛平縣西北海淀明米萬鍾築口勺園又曰風煙里都人稱曰米家園當時爲郊外勝地獨秀園在通州南故漷縣北二里遼司徒郭世珍别業桑園在寶坻縣西十五里明嘉靖中知縣張元相置後廢知縣唐錬重築垣牆植桑課􅁞張華邨在固安縣東北八里有八角井相傳即華故宅按宛平縣西亦有張華邨在西􅀡門外八里莊晉書華方城人當以在固安者爲是北臺邨在涿州東三里宋太祖故里今爲清凉寺樓桑邨在涿州西南十五里蜀志先主少􅀌與母販屨織蓆爲業舍東南角籬上有桑樹高五丈餘遙望見幢幢如小車蓋往來者皆怪此樹非凡或謂當出貴人先主少時常與宗中諸兒於樹下戲言吾必當乘此羽葆葢車水經注督亢溝水東逕涿縣酈亭樓桑里南即劉先主舊里桃莊在涿州西北一里相傳即張飛舊里相公莊在文安縣治西北三里唐工部尚書張仁憲故里竇氏莊在薊州東三里竇禹鈞故里又有燕山竇氏莊在昌平州東山口内二里相傳有古槐大數十圍中可容十人坐今無盧植故宅在涿州東十五里地名盧家濼劉越石壇在永清縣東南拒馬河之陰相傳晉劉琨與段匹磾同盟處遺址猶存盧王屯在東安縣常道城東南二十五里相傳漢盧綰屯兵於此與劉賈夾攻取燕今名盧邨燈市在大興縣東崇文街西互二里許燕都遊覽志燈市南北兩􅒡珠玉寶器日用㣲物靡不畢具相對俱高樓樓設氍毹簾幙為宴飲地夜則燃燈於上望如星衢市自正月八日始十八日罷鬻燈在市西南今名燈市口柴市在大興縣教忠坊西北隅元至元十九年宋丞相文天祥殉節於此
