隆二十九年另開新紀事子牙河在大城縣東卽滹沱河及滏陽諸水之下流因經大城縣之子牙村故得是名其上游自河閒府獻縣之臧家橋流入大城境至張家莊分為正支二河達莊兒頭經天津府靜海縣境仍入大城合流至天津府㑹南北二運河及大清河入泃河歸海一名鹽河又名沿河大城縣志沿河自河閒縣之龍華橋入縣界東北流至縣東南二十五里四呈口合黑龍港河亦名交河從西北折繞縣東十二里趙扶村又北經子牙村分流由王慶坨入三角淀冊說鹽河在縣南十里自河閒流入分二支一西北流入文安縣石城淀一北流又分三支西支入文安黑母淀東支入大小窩口中支入霸州文爾淀總匯於三角淀入白河通志子牙河總㑹南北二泊􅇭滹諸水而滹沱實為經流其性湍悍伏秋水發河閒以北靜海以南皆被其害本朝康熙三十九年聖祖仁皇帝親閲河工特授方畧於獻縣河閒東西兩岸築長隄西接大城東接靜海各二百餘里又於東隄廣福樓之焦家口開新河一道東北至賈口入淀特設分司董其事自是瀕河之民始無水患其王家口入淀之處舊分二派一派西流至文安趙家莊又分二支西支抵文安大隄而北至龍塘灣北支逕三灘里抵石溝河往往橫截清流為隄防害一派東北流逕瓦子頭抵臺頭㑹清河而東雍正三年怡賢親王奏請障其西流束之歸一後西支自淤正流俱由新河㑹臺頭河按子牙河故道其上流從獻縣西之完固口出單家橋經杜林鎮至青縣鮑家嘴入南運河嗣以濁流淤運且運河當盛漲時水不能下於雍正四年塞完固口使由獻縣之臧家橋循張家莊至王家口入淀淀又被淤於乾隆十年築格淀隄隔别清渾使子牙别由一道循隄東下至天津紅橋匯運河及大清河入海其張家莊以下分為正支二河支河繞蔡家窪至西子牙橋歸入正河旣而支河流暢其歸入正河處形勢稍有未順二十九年興修水利高宗純皇帝命改支為正並於東子牙村别濬新河二十里至窪子頭匯入舊河合流至莊兒頭而東三十二年聖駕巡幸天津臨視河工復命接築格淀隄至莊兒頭西至三灘里屬於千里長隄俾清淀濁河永無浸溢之患並有太公釣臺名御製各詩紀事至子牙河俗謂以聖製詳据史記注水經注諸書以證太公埀釣處當去岐不遠必不在數千里外志乘之傳訛附㑹於是曠若發䝉矣黑龍港河在大城縣南源出滹沱河上流有三一自縣之西南逕南頭村入境迤邐至四呈口與鹽河㑹一自縣之南曹家市北流至四呈口一自清縣扈家店流至四呈口與鹽河㑹本朝乾隆五年疏濬沽河在薊州南源出遵化州東界曰梨河西南流經州南又西經薊州南為沽河折而南與泃河㑹曰潮河卽古庚水也漢書地理志無終縣浭水西至雍奴入海過郡一行六百五十里註師古曰浭音庚卽下所云入庚者同一水也水經注庚水出右北平徐無縣北塞中南流厯徐無山得黒牛谷水又得沙谷水並西出山東流注庚水又逕徐無縣故城又南與周盧溪水合又西南流灅水注之世亦謂庚水為柘水南逕燕山又南逕北平城西南入鮑邱水謂之柘口薊州志沽河在州南五里東接遵化玉田界至州南李家窩折南行至下倉店轉西南行至觜頭莊與泃河合為白龍港入寶坻縣界漕運南來者自新開河泝流而上至李家窩以迄永濟橋亦名永濟河按舊志以遵化州玉田縣之還鄉河為庚水沽河為灅水今以水經注考之沽河卽庚水還鄉河乃巨梁水遵化州西之沙河蓋灅水也龍池河在薊州南半里一名漁河源出州北之鵞臺下瀦為鵞湖南流經州城西又東南入沽河獨樂河在平谷縣東北二十里或伏或見斷續無常西流入泃河水經注獨樂水出北抱犢固南逕平谷縣故城東又南流入泃卽此逆流河在平谷縣南八里源出泉水山西流九千九曲入泃河一名小碾河幢幢水在昌平州西北虎峪山下飛瀑如布流二三里至鵓鴿巖隱流不見或云今州治西舊縣西北城下虎眼泉是其復出處流入榆河後魏時常景遣别將破杜雒周於虎眼泉卽比芹城水在昌平州東北四十里水經注芹城水出北山南逕芹城又東南流注濕餘水漁水在密雲縣南水經注漁水出漁陽縣東南平地泉流西逕漁陽縣故城南城在斯水之陽故名又西南入沽水三城水在密雲縣東北自口外流入又東南入潮河水經注三城水出臼里西逕獷平城謂之三城水又逕香陘山又西逕石窟南又西北逕伏凌山南與石門水合又西南逕獷平城東南而右注鮑邱水要水在密雲縣東北八十里源出古北口外自墻子峪流入西流㑹乾塔河入潮河蓋因後魏僑置要陽縣而名俗謂之清水河涿水在涿州西水經注涿水世亦謂之桃水出涿縣故城西南奇溝東八里大坎下數泉同出東逕桃仁墟北又東北與樂堆泉合又東北逕縣故城西流注於桃寰宇記涿水源出范陽縣西土山下東北流經縣北五里又東注聖水按舊志以俠水為涿水且謂源出保安州涿鹿山以求合應劭涿水出涿鹿縣之説疑皆無據水經注寰宇記又似卽今之拒馬河今不可考姑錄之以存古名甘泉水在房山縣西北水經注甘泉水出良鄉縣西山北東南流逕西鄉城西而南注鳴澤縣志大房山南孤山口東八里有東西南北四甘池村亦謂之長溝峪西村之北水從石壁出凡七竇羅注為池池中生魚止一目而味極美疑卽古泉池也又東北數里爲黑龍潭霸水在霸州南三里上流自白溝河分流逕州界合拒馬河今淤清池水在薊州東十五里周頃餘四山圍繞嵐光野色瀲灧可觀盤山水在薊州東盤山水出山上其山峻險人迹罕到去山三十里許望山上水可高二十餘里素湍浩然頽波厯溪沿流而下自西北轉注於泃水舊志今有沙河在州西二十五里源出盤山流經沙嶺之麓東南㑹五里河入沽河蓋明成化閒盤山水發始潰流而東南入沽河也瀑水在薊州西二十五里源出石山之麓有泉自石罅噴出極清冷流經塔水之陰又白㵎在州西四十里發源盤山西峪經羅家峪中皆白沙而水極清淺其地有高宗純皇帝經臨駐蹕屢有行宫御製詩百泉溪在宛平縣西南十里麗澤關平地有泉十餘穴匯而成溪東南流爲柳林河下流注於盧溝河道人溪在密雲縣東北石盤峪發源龍門流逕縣西入潮河按水經注所謂道人溪在禦夷鎮東此蓋縣境之小水冠以舊名也黑城川在密雲縣北四十里平頂山後流入潮河相傳唐鎮遠軍置此車箱渠在宛平縣西北水經注高梁水首受㶟水於戾陵堰水北有梁山山有燕刺王旦之陵故以戾陵名堰水自堰支分東逕梁山南又東北逕劉靖碑北其詞云魏使持節都督河北道諸軍事沛國劉靖登梁山以觀源流相原隰以度形勢以嘉平二年道高梁河造戾陵堨開車箱渠依北岸立水門門廣四丈堨長十丈山水暴戾則乘堨東下平流守常則自門北入灌田歲二千頃至景元三年詔遣謁者樊良更制水門水流乘車箱渠自薊西北逕昌平東盡漁陽潞縣凡所潤合四五百里所灌田萬有餘頃晉元康五年靖子宏監幽州諸軍事復修治之又東南逕薊縣北又東至潞縣注於鮑邱水魏書裴延雋傳肅宗時遷幽州刺史漁陽燕郡有故戾陵堰廣袤三十里廢毁多時延雋表求營造未幾而就為利十倍百姓賴之泉州渠在寶坻縣東南一名新河水經注泉州渠口故瀆上承滹沱於泉州縣故以泉州為名北逕泉州縣東又北逕雍奴縣東西去雍奴故城一百二十里其下厯水澤一百八十里入鮑邱河謂之泉州口魏志曰魏太祖以蹋頓擾邊將征之從泃口鑿渠逕雍奴泉州以通河海者也今無水寶帶渠在懐柔縣城外縣志白河直流南下本朝初縣人鍾其濚鑿渠引水繞城盤旋如帶縣境鹹土自後遂成水田永濟渠在霸州東宋史河渠志塘濼緣邊諸水東起乾甯軍西至信安軍永濟渠合鵞巢淀陳人淀燕州淀大光淀孟宗淀為一水衡廣一百二十里縱三十里或五十里珠浦港在通州東北二十五里中産蓮藕蘋芰大為民利清沽港在武清縣南八十里西接安沽港東合丁字沽由直沽入於海岐溝在涿州西南三十里卽水經注所謂奇溝也亦曰祁溝唐末設關於此夏澤在三河縣西水經注鮑邱水又東南入夏澤南紆曲渚一十餘里北佩謙澤一望無垠日知錄今三河縣西夏店疑用古夏澤為名按通鑑晉隆安初魏將石河頭自漁陽追慕容寶及於夏謙澤通鑑注澤去薊州北二百里方輿紀要謂平谷縣東北百餘里有海子或謂卽故澤與水經注不同鳴澤在涿州西漢書武帝紀元封四年北出蕭關厯獨鹿鳴澤注服虔曰獨鹿山名鳴澤澤名皆在涿郡逎縣北界水經注洛水上承鳴澤渚渚方一十五里西則獨樹水注之又東逕西郷城又東逕垣縣而南入垣水括地志鳴澤在范陽縣西十五里故逎縣東督亢陂在涿州東南卽燕太子丹使荆軻以獻秦者劉向别錄督亢膏腴之地水經注督亢溝上承淶水於淶谷引之則長潭委注遏之則微川輟流水徳含和變通在我東南流逕逎縣北又東逕樓桑里南又東逕督亢澤苞方城縣風俗通曰沆漭也言乎淫淫漭漭無涯際也其水自澤枝分東逕涿縣故城南又東逕盧植墓南又東散為澤渚北屈注於桃水括地志督亢陂在范陽縣東南十里逕五十餘里舊志陂池廣衍跨連新城固安二境琅川淀在東安縣南七十里卽白溝河諸水下流東入磨􅆜港延芳淀在通州西南遼史地理志漷陰縣有延芳淀方數百里春時鵞鶩所聚夏秋多菱芡遼時每季春弋獵於此舊志今南海子側有延芳村或謂延芳淀卽南海子之舊名云三角淀在武清縣南八十里卽古雍奴水也水經注雍奴者藪澤七十三里舊名堂二淀又東分二流行如八字亦名八字河下流俱入吕公河大浪淀在霸州東南七十四里舊名高橋淀周圍百里其西為栲栳圈衆流所聚也東南流為􅆜河東入文爾淀火燒淀在文安縣東二十五里廣四十餘畝縣東北有石溝河柳河急河三水皆聚於此東入衞河達於直沽三家淀在大城縣東北五十里與文安靜海為三縣之交文安大城之水從此北下明萬厯四十二年靜海民築隄設口障水使不得下文大兩縣俱受水患縣令梁綱請於撫按復開之七里泊在宛平縣西北三十五里地名碾莊亦名七濼源出西山一畝馬眼諸泉遶出萬壽山後匯為七里濼紆迴向南行數十里入高梁河桃花泊在東安縣南五十里渾河水所匯也流入三角淀南新莊飛放泊在通州南舊漷縣南二十五里周八里又縣西南二十五里有栲栳垡飛放泊北八里有馬家莊飛放泊金水窪在霸州東五十里舊本汙池今為沃壤民多耕植其中文安大窪在文安縣東南白龍牛臺諸淀所瀦也受河閒任邱􅅹水舊有廣安橫隄障之以防其北漫但横隄東屬於大城之千里長隄水無所洩汎濫可虞本朝乾隆二十九年於王蕃村穿千里長隄建石閘二座外濬引河使水洩入於榆錢窪東注子牙河其廣安横隄益加培築於是文安之水有所歸而大城亦免潰流之患麒麟窪在大城縣北十里徐昌祚燕山叢錄云昔時民家耕牛嘗産麟於此今淤飛魚口在霸州南寰宇記文安縣有五渠水今名長鳴溝邢子厲三郡記云後魏延興初文安縣人孫願捕魚於五渠水有羣魚從西來共以柴塞之忽有人謂願曰須臾當得大魚若欲求多宜勿殺也願下網果得大魚狀如鯉而大遂殺食之俄風雨晝昏聞鳥飛聲比風息雨霽有人乘船至者云前見羣魚無數飛入於海因呼入海之處曰飛魚口長安客話霸城南沙河與庚河合流處俗呼飛魚口卽魚津窪也玳瑁口在文安縣東南元志云河閒路有黄龍港自鏁井口開鑿至文安縣玳瑁口通濼水經火燒淀轉流入海今湮黑龍潭在宛平縣西北畫眉山下上建龍王廟本朝康熙十年四月聖祖仁皇帝禱雨於此甘霖立沛賜御書喜雨二字後重建廟有御製碑記雍正三年重修亦有碑文高宗純皇帝每當望􅀨之候御製親詣誠禱應時立沛御賜扁曰恩敷廣潤屢有御製詩紀事又有黒龍潭在大興縣南黒窰廠玉淵潭在宛平縣西十里元人丁氏故池柳隄環抱沙禽水鳥多翔集其聞池上有亭亦以玉淵名為當時遊宴之所積水潭在宛平縣西北三里東西互二里餘南北半之西山諸泉從高梁橋流入北水關匯此折而東南直環地安門宫牆流入禁城為太液池燕都遊覽志積水潭内多植蓮亦名蓮花池或因水陽有淨業寺名淨業湖俗又呼為海子套按元時旣開通㑹河運糧直至積水潭自明初改築京城與運河截而為二積土日高舟楫不至是潭之寛廣巳非舊觀故今指近德勝橋者為積水潭稍東南者為十刹海又東南者為蓮花泡子其始實皆從積水潭引導成池也本朝乾隆二十三年重濬積水潭二十六年卽潭中舊龍王廟改建匯通祠並於夾岸築牆以為限界七里龍潭在通州東二十里其池廣袤頃許深處不可測旱禱多應洗馬潭在房山西五里俗傳張飛洗馬於此九龍池在昌平州西南翠屏山下泉出九穴穴鑿石為龍泉出其吻瀦而為池繚以重垣覆以黄甓明時為車駕碣陵事畢臨幸之所月池在涿州西南十八里盈三百畝泓渟澄澈其形如月乾池在涿州西十五里其池窪下為衆流所歸然未嘗盈溢為患一名百尺乾龍灣在香河縣有二大龍灣在縣南四十里又南為小龍灣夏秋時合流經寶坻縣界入七里海新湯泉在昌平州東南三十二里有海子水燠如沸本朝康熙五年鑿大池二砌以雕欄復疏細渠旁流四注皆甃以白石瀅潔如玉百泉在昌平州西南四里許平地涌出不可勝數大者有三一曰原泉清深澈底一曰黄泉流沙渾漫一曰響泉其聲似閘然廣寛俱不過丈許温泉在昌平州有二一在湯山下四時常温浴之可愈瘡痍一在州西南三十二里湯峪山下􅀩泉在昌平州東北七十里銀山下清冽甘美白玉石塘泉在房山縣西南五十里塘下突起一泉清潔如玉有灌漑之利其泉東流入涿州為胡良河之上源義井在宛平縣西十里或曰蜜井趙惠井在懐柔縣東南八十里邵渠莊地高邱艱於汲引里人趙濚鑿以惠民深五十丈鄉人德之因名前提調官臣沈兆澐恭纂輯提調官臣王廣蔭恭覆輯校對官臣李孚忠恭校校對官臣宗稷辰恭覆校大清一統志順天府三古蹟薊縣故城在大興縣西南史記周武王克商封召公奭於北燕即此春秋時為北燕伯國秦始皇二十一年取燕薊城二世元年武臣將韓廣至薊自立為燕王漢元年項羽更立其將臧荼為燕王仍都薊五年入漢仍為國治後漢建武二年漁陽太守彭寵反攻幽州牧朱浮於薊三年寵陷薊城自立為燕王五年寵平初平二年封公孫瓚為薊侯瓚與幽州牧劉虞不相能於大城東南更築小城以居晉建興二年陷於石勒永和六年燕慕容儁攻拔薊城因都之寰宇記郡國志云薊城南北九里東西七里􅄏十門慕容儁鑄銅為馬因名銅馬門也厯後魏隋唐皆曰薊縣為州郡治遼始改名析津金改曰大興元至元四年於中都之東北置城遷都即今治也按禮記樂記武王封黃帝之後於薊陸德明釋文今薊縣即燕國都孔安國司馬遷及鄰康成皆以薊燕為一而召公即黃帝之後班固漢志亦謂召公封此或又謂成王時黃帝後封薊者已絶故更封召公於薊為燕其説與史記封帝堯之後及封功臣召公之文皆不合張守節史記正義召公始封蓋在北平無終縣以燕山為名後漸强盛乃併薊徙居之其説是也又按明統志舊燕城在府西南遼金故都也日下舊聞謂今之西安門去唐幽州城東北五里則唐時薊縣幽都皆當在大宛二縣西南廣陽故城在良鄉縣東北十里漢置縣以其屬廣陽國亦謂之小廣陽後漢初耿弇追賊至小廣陽即此北齊省括地志廣陽故城在良鄉東北三十七里舊唐書地理志歸義州歸義縣總章中置處海外新羅在良鄉縣之古廣陽城又夷賓州領來蘇縣瑞州領來遠縣神龍初皆寄治故廣陽城方輿記要唐上元三年史朝義自歸義東奔廣陽此廣陽謂密雲郡之廢燕樂縣所謂歸義即此城也方城故城在固安縣南本燕方城邑漢置縣水經注聖水東逕方城縣故城李牧伐燕取方城是也魏封劉放為侯國括地志方城故城在固安縣東南十七里寰宇記固安縣在涿州理今縣西五里魏常道城開元二十三年又自常道城移耿就橋行市南元升為東安州明洪武初降州為縣三年避渾河水患又移置常伯鄉張李店即今治也縣志漢安次故城在今縣西北四十里基址尚存俗呼古縣又東安舊州在古縣西五里俗名舊州頭今皆有集石梁城在今縣東南舊州東南五十里潞縣故城在通州東漢置縣以潞水為名水經注鮑邱水逕潞縣故城西漢光武遣吳漢耿弇等破銅馬五幡於潞東謂是縣也世祖拜彭寵為漁陽太守治此舊唐書地理志崇州昌􅀺縣鮮州賓從縣神龍初皆寄治潞縣之古潞城寰宇記潞縣在幽州東六十里本漢舊縣通鑑契丹既强宼抄諸州皆偏幽州東十里之外人不敢樵牧趙德鈞為節度使於州東五十里城潞縣而戌之民始得耕稼州志今州東八里甘棠鄉有古城周四里許如縣故墟蓋隋唐時潞縣治按水經注引土地記潞水在潞縣城西三十里寰宇記亦據其說是潞縣自唐以前雖嘗遷改而水在城西則不異今潞水在州東遼金至明不聞遷改惟通鑑載五代時趙德釣城潞縣其去州道里較寰宇記少十里遷治蓋在是時也漷縣故城在通州南四十五里本遼所置漷陰縣也遼史地理志析津府統漷陰縣本漢泉州之霍邨鎭遼每季春弋獵於延芳淀居民成邑就城故漷陰鎮後改為縣在京東南九十里金史地理志大興府漷陰縣遼太平中以漷陰邨置元史地理志元初漷陰縣為大興府屬邑至元十三年升漷州屬大都路舊志縣舊治在城南隅元升為州遷於河西務至正閒復移舊治明洪武五年降州為漷縣屬通州仍舊治正德初始築土城周二里門四萬厯四年甃甎本朝順治十六年省入通州安樂縣故城在通州境漢置縣屬漁陽郡晉屬燕國北魏太平眞君七年廢入潞縣按安樂故城遺址雖不存然方輿紀要既云北魏廢入潞縣則在今通州境内可知也太子賢後漢書注云安樂故城在今幽州潞縣西北寰宇記安樂故城在今潞縣西北文獻通考亦載安樂故城於潞縣下日下舊聞獨載於順義卷內則因昌平山水記後魏安樂郡故城一條牽連書之以致誤耳考安樂本非因縣為郡郡自在今順義縣境縣自在今通州境不得以名之相同而混郡縣為一也臨泃故城在三河縣東南石趙置以臨泃水為名亦曰臨渠城晉永和六年燕慕容霸伐趙收樂安北平兵糧與其主儁會於臨渠水經注泃水逕臨泃城北屈而厯其東即此城也唐置臨泃縣開元中改置三河縣以地近泃洳鮑邱三水而名寰宇記縣在薊州西六十里通鑑後唐長興三年趙德鈞為節度使於幽州東北百餘里城三河縣以通薊州運路邊人賴之城邑考舊城在今縣三里泃河南被水衝廢今城即趙德鈞所改置也又新唐志薊州有臨河府府兵所居蓋亦置於臨泃故城内雍奴故城在武清縣東漢置縣後漢建武二年封寇恂為侯邑晉以後皆仍舊名唐始改曰武清寰宇記縣在幽州東南一百五十里縣志故城在今縣東邱家莊南東距白河七十里明洪武初因水患遷於縣西八里元衞帥府鎭撫衙即今治也泉州故城在武清縣東南漢置北魏廢縣志泉州故城在今縣東南四十里昌平故城在今昌平州東南漢置縣三國魏文帝拜牽招使持節護鮮卑校尉屯昌平即此後魏初省水經注土地記曰薊城東北一百四十里有昌平城魏書地形志軍都縣有昌平城括地志昌平故城在今州東南六十里萬年故城在昌平州西南後魏置萬年縣屬平昌郡隋開皇初省入昌平軍都故城在昌平州西十七里漢置縣後魏置東燕州及昌平縣於此魏書地形志東燕州天平中置寄治幽州軍都城寰宇記昌平縣在幽州西北九十五里本漢軍都縣後魏移軍都於今縣東北二十里更於故縣置東燕州及平昌郡昌平縣後州郡廢而縣隸幽州方輿紀要五代唐改曰燕平縣徙治曹邨又徙於白浮圖城在今州西八里昌平山水記明景泰元年於昌平縣東八里築城移長獻景三陵衞於内名曰永安城三年并昌平縣移焉正德元年改為州治州志今州東四十里有軍都邨亦曰縣址又有大口故城在州東南五十里􅀟塔故城在州西南十八里按今州在舊縣東八里以寰宇記道里計之唐時昌平縣在今縣西即軍都城也今州東軍都邨即順義縣志所謂軍都城在縣西三十里者乃魏齊時僑置非故縣也順州故城今順義縣治唐開元中移燕州於此後改順州舊唐書地理志燕州隋遼西郡武德元年改燕州六年自營州南遷寄治幽州城内開元二十五年移於幽州北桃谷山天寶元年改歸德郡乾元元年復為燕州治遼西縣寰宇記燕州東至檀州八十里西南至幽州九十里西至昌平縣五十里遼史地理志順州唐初改燕州㑹昌中改歸順州唐末仍為順州按順州之本燕州止見於遼元二史舊唐志順州貞觀六年寄治營州南五柳城天寶元年改順漢義郡乾元初復為順州治賓義縣在幽州城内寰宇記亦云四至八到與幽州同不云移治燕州改為順州然通典寰宇記皆言歸順州為順州北境是順州又即燕州之地舊志以為唐建中二年燕州廢後始自幽州移順來治似為得之蓋順州本治幽州城内因燕州改置之幽都縣亦入幽州城遂移順州於故燕州耳狐奴故城在順義縣東北三十里漢置縣後漢書張堪為漁陽太守於狐奴開稻田八千餘頃三國魏景初二年省晉仍置後魏廢密雲故城即今密雲縣治隋書地理志安樂郡領密雲縣後魏置密雲郡領白檀要陽密雲三縣後齊廢郡及二縣入密雲寰宇記檀州西至昌平縣一百三十里南至潞縣界五十五里北至長城四十五里東南至薊州西南至幽州皆百九十里東北至長安障塞軍一百十里按漢白檀縣在今古北口外後魏密雲郡白檀縣治漢傂奚城已非故治北齊廢白檀入密雲而隋治密雲縣有漁水螺山則在故漁陽縣界又非傂奚故治矣唐置檀州雖取古白檀為名實非古縣也舊唐志謂檀州後漢傂奚縣亦非漁陽故城在密雲縣西南三十里史記燕築長城自造陽至襄平置上谷漁陽石北平遼西遼東郡秦二世發問左戌漁陽即此漢置漁陽縣為郡治三國魏郡縣俱廢晉復置晉書燕王機傳咸寕初以漁陽郡益其國趙錄石虎建武四年有叚遼漁陽太守馬鮑降而晉志不載蓋殘闕也後魏移郡治雍奴以縣屬焉北齊廢括地志漁陽故城在密雲縣南十八里漁水之陽獷平故城在密雲縣東北漢置縣屬漁陽郡後漢建安十年烏丸攻觧于輔於獷平曹操渡潞河救之水經注鮑邱水西南逕獷平縣故城東是也晉省蓋在潮河西近古北口地厗奚故城在密雲縣東北口外獷平城東北漢置厗奚縣屬漁陽郡後漢曰傂奚孟康曰厗音題字或作蹄晉省魏書地形志密雲郡皇始二年置治提􅂝城即傂奚之譌也又置白檀縣爲郡治北齊郡縣俱廢入密雲按舊志據舊唐志燕樂縣舊治白檀城謂即古傂奚後魏之白檀也齊省縣因移燕樂治之考隋志燕樂縣爲安樂郡治不言即後魏白檀舊志疑無據燕樂故城在密雲縣東北東魏時僑置魏書地形志安州廣陽郡領燕樂縣州郡治天平中陷元象中寄治幽州北界隋書地理志安樂郡舊置安州後周改爲元州開皇十六年徙州無終尋置檀州統燕樂縣後魏置廣陽郡後齊廢大業中置安樂郡舊唐書地理志檀州燕樂縣舊治白檀故城長壽二年移治新興城即今治也寰宇記縣在檀州東北七十里本漢傂奚縣地宋白續通典燕樂縣五代時廢爲燕莊其地平曠可屯安樂郡故城在密雲縣東北五十里後魏置魏書地形志安州領安樂郡延和元年置范陽三縣地金大定末以山陵所在因置萬寕縣於今治元改曰房山清􅀋天文分野之書房山縣本良鄉之昌黎里信安故城在霸州東五十里寰宇記本古淤口關周顯德六年收復關南於此置砦宋太平興國六年置破虜軍王存九域志景德二年改信安軍初以永清文安隸軍後以二縣復隸霸州金史大定七年降為信安縣隸霸州元光元年伊拉仲夾努移屯信安高陽公張甫因奏信安本臣北境地當衝要乞權改為府以重之詔改信安為鎭安府元史張禧傳金末張仁義徙家益都元太宗下山東仁義走信安時燕薊已下獨信安猶為金守其主將知仁義勇而有謀用之左右守信安踰十年度不支乃舉城内附舊志元時府縣俱廢今為信安鎭伊拉仲夾努舊作移刺衆家奴今改正益昌故城在霸州東北漢永光中封廣陽頃王子嬰為侯國屬涿郡後漢廢水經注拒馬水東逕益昌縣故城南地理風俗記曰方城縣東八十里有益昌城故縣也文安故城在今文安縣東漢置唐徙今治後漢書注文安故城在今縣東北寰宇記古文安城在今縣東三十里縣志今縣東北柳河鎮有古城上有漢縣令趙夔祠即文安故城也豐利故城今文安縣治隋末置屬河閒郡唐貞觀初省入文安寰宇記文安縣西北去霸州五十五里隋大業七年征遼途經於河口當三河合流之處割文安平舒二邑户於河口置豐利縣隋末亂百姓南移就是城唐貞觀元年以豐利文安二縣相逼遂廢文安城仍移文安名就豐利城置縣即今理也東平舒故城今大城縣治漢置縣水經注漳水枝瀆逕東平舒縣故城南代郡有平舒城故加東土地記曰章武郡治世以爲章武故城非也括地志平舒縣在瀛州東北一百二十五里衡漳水在其界寰宇記大城縣西北去霸州九十五里本漢東平舒縣北齊爲平舒縣周顯德六年割隸霸州改名大城九域志縣在益津關東南一百五里五代時所置也縣志故城基址在今縣北土壟迴折又名越州城今城仍舊址築止得其半西章武故城在大城縣南四十七里漢章武縣在今滄州界後魏正光中分置西章武縣屬章武郡北齊省舊志以在章武之西故加西也無終故城今薊州治左傳襄公四年無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎漢書異姓諸侯王表漢元年項籍立燕王韓廣為遼東王都無終漢書地理志右北平郡無終縣故無終子國水經注藍水逕無終縣故城東秦滅燕置右北平郡治此土地記曰右北平城西北一百三十里有無終城隋書地理志漁陽郡無終縣開皇十六年移置元州於此大業初置漁陽郡後漢書注無終山名因為國號故城在今漁陽縣按舊唐志無無終而有漁陽縣云秦右北平郡治隋為漁陽當是大業初移漁陽郡名於故無終遂改縣亦曰漁陽隋志未及改耳舊志皆以今玉田縣為古無終今考五田乃唐初析置之無終非漢縣也平谷故城在今平谷縣東北漢置縣後漢書光武紀建武元年尤來大槍五幡入漁陽遣吳漢等追戰及平谷大破滅之注平谷故城在今潞縣北魏書地形志太平眞君七年併平谷屬潞金史地理志薊州平峪縣大定二十七年以漁陽縣大王鎮升縣志古縣城在今縣東北十二里名城子莊歸順廢州今懐柔縣治唐書地理志歸順州歸化郡本彈汗州貞觀二十二年以内屬契丹別帥折紇便部置開元四年更名縣一懷柔寰宇記歸順州即順州之北境東至薊州二百十五里北至檀州七十五里西南至幽州七十五里領懷柔縣州所治舊志金改懷柔曰温陽以在温餘河之北爲名元廢明復分密雲蒼頭里迤西之地置縣復唐故名曰懷柔按遼史順州領縣一懷柔有温餘河金改爲温陽密雲是昔之懷柔爲今順義地非今懷柔廢威州在房山縣界舊唐書地理志威州威化縣寄治良鄕縣石窟堡又師州陽師縣神龍中寄治良鄉縣故東閭城房山縣志石堡邨在縣西北六十里幽都廢縣在今宛平縣西南舊唐書地理志幽州領幽都縣管郭下西界建中二年取羅城内廢燕州廨置唐書地理志隋於營州之境汝羅故城置遼西郡武德元年改曰燕州六年自營州遷於幽州城中貞觀二十五年徙治幽州北桃谷山天寶元年曰歸德郡建中二年爲朱滔所滅因廢爲縣遼史地理志宛平縣本幽都縣開泰元年改今縣陰鄉廢縣在宛平縣西南漢置屬廣陽國後漢省寰宇記在今薊縣南界良鄉東界固安北界三縣交入之地方輿紀要在府西南二十五里其遺址俗謂之籠火城唐武德三年竇建德遣將高士興擊羅藝於幽州不克退軍籠火城是也廣平廢縣在宛平縣西唐天寶元年析薊縣置屬幽州尋省至德後復置後又省劉芳喆國門近遊錄盧溝河南過長岡店西有縣邨疑是玉河廢縣在宛平縣西五代時置遼史地理志劉仁恭於大安山創宫觀師煉丹羽化之術於方士王若訥因薊縣分置玉河縣以供給之在京西四十里金廢通澤廢縣在永清縣西寰宇記永清縣在幽州東南一百五十里本漢益昌縣地隋大業七年於今縣西五里置通澤縣隋末廢唐如意元年於今理置武隆縣景雲元年改會昌天寶初為永清縣以邊境永清為名縣志今有北通澤邨在縣西廣武廢縣在昌平州西後魏武定九年僑置偏城郡領廣武沃野二縣屬東燕州北齊廢行唐廢縣在密雲縣東本定州屬縣遼太祖破行唐盡驅其民北至檀州擇曠土居之凡置十砦仍名行唐縣金廢要陽廢縣在密雲縣東南六十里漢縣在今古北口内後魏時僑置於此屬密雲郡北齊省益津廢縣在霸州治東本漢益昌縣地唐為永昌縣地置益津關於此後入遼五代周顯德六年