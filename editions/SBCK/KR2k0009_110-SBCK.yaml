未知學澤為建庠序設師儒講論經術風俗一變自此擢科者相繼李光上虞人崇寕中調開化令有政聲彭汝方鄱陽人宣和初通判衢州使者疏其治狀擢知州事方臘起睦之青溪與衢接境寇至無兵可禦衆望風奔潰汝方獨與其僚段約界守􅀌城三日而陷罵賊以死胡唐老晉陵人靖康三年知衢州苗傅敗走以亂兵犯城唐老拒之會大􅀨雹城上矢石俱發賊不支遂解去以功擢秘閣修撰趙子潚秦康惠王後為衢州推官胡唐老奇其才任之屬時多故子潚佐唐老繕完城具苗劉兵至城下不能攻以功進秩陳康伯弋陽人紹興初通判衢州攝郡事盜發白馬原康伯督州兵濟王師進討克之翁􅀩之崇安人為常山尉時趙鼎以謫死其子汾將喪過衢郡守章傑希秦檜意檄􅀩之領卒掩取鼎平時與故舊來往簡牘􅀩之先遣人告汾焚之逮至一無所得傑怒治􅀩之罪士論高之汪大猷鄞人紹興中以恩補官授江山縣尉曉暢吏事劉珙建人隆興初改知衢州治事精明吏人畏服趙希言惠王令懬元孫淳熙中調衢州司户㕘軍合郡民以計表其坊里標其户數為圖獻於守守得而才之時衢己復孔步章戴二場漕帥復檄訪嚴州烏龍嶺税場希言力陳不當復帥怒曰衢己復二場何烏龍獨不可復希言謂二場當併罷去帥不能奪二場竟亦廢袁甫鄞人嘉定中知衢州立旬講務以理義淑士心􅀊撥助養士千緡西安龍游常山三邑積窘豫借為代輸三萬五千緡蠲放四萬七千緡郡有義莊買良田二百畝益之趙逢龍鄞人理宗時厯知衢州有司例設供張逢龍至悉命撤去日具蔬飯坐公署事至即面問決遣為政務寛恕撫諭惻怛一以天理民􅂜為言民不忍欺馮惟説理宗時為衢州推官浙東提􅀧刑獄徐鹿卿檄惟説決婺獄惟説素廉平至則辨曲直出淹禁大家不快其為會鄉人居言路迺屬劾惟説州索印􅁓惟説笑曰是猶可以仕乎自題詩印􅁓而去陳塤鄞人端平初知衢州寇卜日發漈坑遵江山縣而東塤􅀗諜者即遣人致牛酒諭以大義勸其連改否則殺無赦於是自首者日以百數獻器械者重酬之遂潰散孫子秀餘姚人理宗時守衢州時寇作水冒城郭子秀立保伍選土豪首表常山縣令陳謙亨寓士周還淳等捍禦之勞乞加優賞人心由是競勸未幾盜復起江山玉山間甫七日而衆擒四十八人以來終其任賊不復動又治橋梁修堰牐補城壁浚水原助葺民廬賑以錢米奏蠲秋苗萬五千石有竒並除公私一切之􅀒坍溪沙壅之田請於朝永蠲其税民用復蘇南渡後孔子裔孫寓衢州詔權以衢學奉祀久無專饗之廟子秀廢佛寺奏立家廟如闕里以政最遷太常丞王應麟慶元府人淳祐中調西安主簿民以年少易視之輸賦後時應麟白郡守繩以法遂立辦諸校欲為亂縣令翁甫倉皇計不知所出應麟以禮諭之衆皆讋服元白景亮南陽人為衢州路總管時徭役不均吏緣為姦景亮覈驗田畝役之輕重視田之多寡民不勞而事易集郡學之政久弛諸賢塑像以及祭服樂器諸生廪給景亮皆為之備儒風大振性廉介妻尤儉約惟以脱粟對飯而己部使者上其事特詔襃美陳孚臨海人遷衢州治中多著善政徹爾庫輝本蘇黙人至順初為達嚕噶齊監龍游縣召父老開闢田野均賦役使民自陳得實户九千有奇先是西安龍游糧輸建德凡羨餘令再輸本路庫輝言於司府西安存廣盈倉龍游存和豐倉永為例民便之修瀫江浮橋置田二百四十畝立倉充其費築席村鷄鳴二堰皆親督其成徹爾庫輝舊作察兒可馬蘇黙舊作速蠻達嚕噶齊舊作達魯花赤今俱改正楊居仁至正末為開化尹饒兵陷縣治仗義不屈罵賊死巴延布哈德濟字蒼崖輝和兒人至正十六年授衢州路達嚕噶齊阿爾輝引兵經衢州軍無紀律所過輒大剽掠已延布哈德濟曰阿爾輝以官軍而為民患此國賊也可縱之乎乃帥兵逐之出境郡賴以安陞浙東都元帥守禦衢州頃之擢江東道廉訪副使階中大夫十八年陳友諒遺黨王奉國等寇信州巴延布哈德濟自衢引兵援之日夜與賊鏖戰糧竭矢盡自刎死追諡桓敏總管馬浩同時赴水死巴延布哈德濟舊作伯顏不花的斤輝和兒舊作畏吾兒阿爾輝舊作阿魯􅁅今俱改正明王愷當塗人太祖克衢州命愷總制軍民事時常遇春守金華部將擾民愷執撻之遇春讓愷愷曰民者國之本撻一部將萬民安將軍所樂聞也遇春乃謝愷開化馬宣江山楊明並起爲亂悉先後討擒之唐鐸虹縣人洪武初爲西安縣丞撫綏新附以德化民聲譽大振夏毅衢州守將時金華苗軍作亂殺㕘政胡大海處州苗將亦殺總制孫炎等衢州或謀以城應之毅決計固守會劉基丁母憂囘即迎入城告諭屬邑州境遂安黃奭黃岡人洪武初爲衢州知府營府治増城堡興水利以資灌溉有姦民爲亂親入其壘平之去任後與郡丞余伯深並祀清節祠郭敦堂邑人洪武中爲衢州知府多惠政衢俗貧者輒焚尸敦爲厲禁且立義阡俗遂革禁民聚淫祠敦疾民勸弛其禁弗聽疾亦瘳在衢七年永樂初坐累被逮耆老數百人伏闕乞留夏升鹽城人永樂中開化知縣有惠政秩滿當遷部民訴於上官乞再任上官以聞帝嘉之即擢衢州知府俾得治其故縣王瓚陜州人天順初龍游知縣俗好訟黔其渠魁數輩漸懾服凡學校公宇橋梁修舉一新在任六年以最聞唐瑜上海人天順中衢州知府重建郡學復孔氏祊田造石塘浮橋􅀊祲禱兩立應有倉大使貧卒於官其妻鬻女以殮瑜贖之而歸其櫬饒泗進賢人宏治中知衢州府恤旱災興學政在任五年妻孥不入官舍布被脱粟官㕑屢空民立明德祠祀之沈杰長洲人宏治中衢州知府修雉堞建窩鋪疏請孔氏承廕博士復趙清獻祠浚河引石室堰水入濠皆有利於民林有年莆田人正德中以御史出為衢州知府毁淫祠剏社學修築館舍令諸生肄業於中以衢道衝煩立節省法支應視昔減半􅀊饑捐俸以賑去之日行李蕭然劉佐安福人正德中知龍游縣重民不舉子之禁令婚姻以時有不奉者置之罪以艱去再起仍知龍游治行益著楊燦華亭人正德中知開化縣流寇入境燦築城固守寇退請賑給兼子牛具榖種親率醫胗治疫病全活甚衆劉起宗巴縣人嘉靖中任衢州推官時礦盜盤踞銅山起宗親率兵往攻先遏其歸路分兵三疊陣以進賊驚懼皆潰走官兵夾擊之俘􅀗甚衆自是礦徒絶蹟楊準宜興人嘉靖中知衢州府郡故多火災凖濬古河遶龜峯火災頓息民徳之稱為楊公河驅剿礦盜四境以安後轉閩藩便道過衢復與後任郡守共置學田余一壠婺源人嘉靖中知江山縣縣舊無城一壠創議建築邑賴以安張克文新淦人隆慶中知常山縣躬履田中清丈汰浮糧八百餘石諸催徴解絹鹽商開引舊例悉行申革商民德之韓􅀖憲高淳人隆慶中知衢州府築石室堰以灌田設石門長臺戍守以扼礦坑立􅀋編追徴法以杜混科煩催之弊善政具舉未幾病卒民思之為建常懐祠李一陽丹徒人萬厯中知西安縣摘伏發姦課士取實詣黜浮華履畝丈量得浮額於通邑每畝酌減税糧民德之伍經正安福人崇禎時為西安知縣尋擢知府事城陷赴井死一年本朝乾隆四十賜諡節愍鄧巖忠江陵人為衢州推官城破自縊時巡按王景亮呉江人鎮將張鵬翼諸暨人同死之本朝乾隆四十一年賜巖忠景亮並諡節愍鵬翼諡烈愍方召宣城人署江山縣事時金華被屠集父老告之曰兵且至吾義不當去然不可以一人故致闔城被殃遂封其印冠帶北向拜赴井死士氏為收葬立祠祀焉本朝乾隆四十一年賜諡節愍本朝崔華平山人康熙六年知開化縣先時縣有私徴責成里長民以爲累華至立除之耿精忠叛守將據城通賊華齎印間道走至十六都糾合鄉勇鄭大來夏祚等激以忠義得萬餘人力戰五日復其城撫輯流亡民間子女散失者遍訪贖囘復繪圖請免四年積逋時疫氣盛行設藥局廣爲療治死者爲置棺􅄟埋善聲著聞王宏仁遼陽人康熙十三年以湖州知府調衢州時耿精忠叛衢爲浙閩要衝滿漢將士畢集宏仁調度供億不􅅰於民指陳方畧動中機宜又力請蠲賑衢人德之晉大忠趙城人衢州守備與耿精忠黨戰於繆村斬賊數十人力竭而死事聞賜祭厚恤其家盧燦海城人康熙中任龍游知縣時盜賊充斥燦剿撫並施四境􅀗安在任八年愛士勸農厯著善政卒於官陳鵬年湘潭人康熙中知西安縣民苦虛糧爲累鵬年下車申請丈量不假手胥役每圖十區設區長二人同衆户自丈已田每部立公正二人彚其總數據現田科糧豁除絶户而以丈出餘糧補從前缺額邑境之田多資堰壩以為蓄洩多圯壞鵬年按承堰水田編為十甲擇甲内田多者令為堰長督築堰壩計田出費無苛派侵漁之􅁦他如驅除銅山礦賊雪鄭榮組妻徐氏冤止停喪溺女善政具舉費我仁歸安人以􅀊貢生任開化訓導教士以孝友廉節寒儒逋國賦者助完之文廟圯倡修落成去任時士皆涕泣以送人物漢龍邱萇隱居太末志不降辱王莽時四輔三公連辟不到更始初任延為會稽都尉掾吏白請召之延口龍邱先生躬德履義有原憲伯夷之節都尉埽灑其門猶懼辱焉召之不可遣功曹奉謁修書記致醫藥吏使相望於道積一􅀊萇乃乘輦詣府門願得備錄延辭讓再三遂署議曹祭酒尋病卒三國呉徐陵字元大太末人為縣吏虞翻一見與友善厯三縣長所在著稱遷零陵太守子平字伯先童齔知名諸葛恪守丹陽討山越請平為丞稍遷武昌左部督􅀄恪待平禮意甚薄後恪被害其子建亡走為平部曲所得平使遣去行義敦篤皆此􅀋也南北朝齊徐伯珍字文楚太末人少􅀌貧學書無紙嘗以竹箭箬葉甘蕉及地上學書山水暴出漂溺宅舍村鄰皆奔走伯珍累牀而坐讀書不輟從學叔父璠之積十年究尋經史游學者多依之後移居九巖山州郡禮辟皆不就兄弟四人皆白首相對時人呼爲四皓陳鄭灼字茂昭信安人幼聰敏勵志儒學受業於皇侃尤明三禮梁簡文在東宫雅愛經術引灼爲西省義學士天嘉初累遷中散大夫唐徐知新信安人與同邑徐惠諲俱以孝行著徐安貞字子貞龍邱人本名楚璧應制舉三登甲科調武陟尉開元中進中書舍人集賢院學士帝屬丈多令視草甚承恩顧累遷中書侍郎封東海縣子余常安衢州人父叔皆爲里人謝全所殺常安八􅀊已能謀復仇十有七年卒殺全刺史元錫奏輕比刑部尚書李􅅠執不可卒抵死宋慎知禮信安人父温有詞學仕錢俶終元帥府判官知禮幼好學年十八獻書於俶署校書郎爲掌書記太平興國三年從俶歸朝授鴻臚卿厯知陳州興元府母年八十餘居宛邱懇求歸養退處十年縉紳稱其孝至道三年以工部侍郎致仕知禮自幼至白首􅀊讀五經周而後止每開卷必正衣冠危坐未嘗少懈子從吉字慶之真宗朝厯右諫議大夫改給事中權知開封尹以勤敏稱趙抃字閲道西安人景祐進士為殿中侍御史彈劾不避權倖京師目為鐵面御史累加龍圖閣學士知成都府神宗立召知諫院尋擢㕘知政事抃感知遇朝政有未協者必密啓陳會王安石用事議論不合累疏求去拜資政殿學士知杭州再知成都改知越州復徙杭以太子少保致仕卒贈太子少師諡清獻抃長厚清修人不見其喜愠不治貲業不畜聲伎日所為事夜必焚香告天其為政善因俗施設猛寛不同在處州與成都尤為世所稱道晩年學道有得韓琦嘗稱抃真世人標表云趙屼字景仁抃子由􅄻登第擢監察御史以親老乞外以便養提舉兩浙常平哲宗立復召為御史所言皆切時務蔡卞等忌之出提㸃京東刑獄元符中厯鴻臚太僕少卿卒初抃廬母墓三年縣榜其里曰孝弟及屼執父喪而甘露降墓木屼卒子雲又以毁死人稱其世孝毛漸字正仲江山人治平進士元祐初厯江東兩浙轉運副使浙部水溢起長安堰開無錫武進常熟崑山諸湖浦以入海水不為患入為吏部郎以秘閣校理為陜西轉運使攝帥涇原破夏人於没煙砦進直龍圖閣知渭州未任卒毛􅕬字叔縝江山人少有節操為歙州士曹睦寇陷城罵賊死贈朝議郎劉絢字質夫常山人以䕃為夀安主簿長子令元祐初韓維薦其經明行修為京兆府教授王巖叟朱光庭又薦為太學博士卒於官絢從游程顥之門力學不倦最明於春秋顥每為人言他人之學敏則有矣未易保也若絢者吾無疑焉毛奎字世高本名倜西安人紹聖四年進士為閩曹建卒張員作亂力疾諭之竟死於兵血流如白乳王渙之字彥舟常山人父介舉制科以直聞至秘閣校理兄漢之舉進士累官兵部侍郎龍圖閣直學士渙之未冠擢上第厯官太學博士徽宗立以日食求言召對稱旨欲任以御史辭曰臣由大臣薦不可居是官乃拜吏部員外郎崇寕初進吏部侍郎出知廣州言者論渙之當元祐末與陳瓘等遊不宜復任解職人黨籍後以寶文閣直學士知中山府以疾丐祠渙之性淡泊恬於仕進每云乘車常以顛墜處之乘舟常以覆溺處之仕宦常以不遇處之則無事矣其歸趣如此劉正夫字德初西安人未冠入太學有聲與范致虚呉材江嶼號四俊元豐八年舉進士厯左司諫時方究蔡邸獄正夫入對徐及淮南尺布斗粟之謡帝感動解散其獄累拜中書侍郎進少宰以疾致仕毛滂字澤民江山人元祐中蘇軾守杭滂為法曹軾見其文深器重之後薦於朝擢知秀州所著有東堂集毛注字聖可西安人舉進士知南陵高苑富陽三縣皆以治辨稱徽宗召為殿中侍御史蔡京免相留京師注疏其擅持威福動摇中外交植黨與京遂致仕因彗星見又極言京罪惡京始出居錢塘注復采當世之急務曰省邊事足財用收士心禁技巧皆切於世務官至左諫議大夫徐揆字宅卿衢州人遊京師入太學靖康元年試開封府進士為舉首欽宗詣金營不歸揆率諸生扣南薰門以書抵二酋請車駕還闕二首見書使以馬載揆至軍詰難揆厲聲抗論為所殺建炎二年追贈宣教郎官其後徐徽言字彥猷西安人少爲諸生汎涉書傳􅀒氣豪舉有奇志大􅀚三年賜武舉絶倫及第靖康初知晉寕軍金兵圍太原據嵐石徽言屢率兵破之陰結汾晉土豪欲擣太原取雁門定全晉以復中原有詔聽王庶節制議遂格後河東皆陷没獨晉寕屹然􅀌墉與金人大小數十戰圍益急城陷金婁宿脇之降徽言慢罵不屈遂射殺之事聞高宗撫几歎曰徐徽言忠貫日月過於顔真卿段秀實遠矣贈彰化軍節度諡忠壯子岡同死事從孫適亦以守安豐死世著忠義云方允武西安人武學上舍爲宜興巡檢建炎三年金人入境允武率土兵力戰死之程俱字致道開化人以恩補呉江主簿累遷著作佐郎建炎中爲太常少卿知秀州會車駕臨幸賜對高宗嘉納之紹興初始置秘書省召爲少監時有司文章例從省記俱摭三館舊聞比次爲書名曰麟臺故事上之擢中書舍人兼侍講後罷爲提舉江州太平觀久之除徽猷閣待制秦檜薦領史事力辭不至俱在掖垣命令下有不安於心者必反覆言之不少畏避其爲文典雅閎奥爲世所稱劉章字文儒龍游人少警異日誦數千言紹興中廷對第一授鎮江軍簽判遷秘書郎兼王府教授專以經義文學啓迪掖導秦檜嗛其不附己諷言者劾之出倅筠州檜死召還拜禮部侍郎進權禮部尚書以資政殿學士致仕卒諡文靖章容貌魁碩以周密自守出入兩朝被顧遇未嘗洩禁中一語劉遇字必明龍海人幼警敏力學弱冠入太學有聲上舍釋褐居第一調江陵府教授與葉適項安世講論不倦移安鄉縣令有惠政諸司交薦改秩愚雅不樂仕進遂致仕結廬城南頽垣敗壁蓬蒿蕭然著書自適書禮語孟皆有解年八十三卒門人私諡曰謙靖先生郷郡祀之子克凡以詩名葉適嘗稱其可繼陶韋余端禮字處恭龍游人第進士知烏程縣召對時孝宗志在恢復端禮極陳謀敵決勝之道上喜曰卿可謂通事體矣厯吏部侍郎光宗立拜吏部尚書擢同知樞宻院事興州帥呉挺死端禮謂不宜復令承襲將爲後患不聽挺子曦果叛光宗不豫端禮力贊宰相請太皇太后册皇子嘉王即帝位慶元初累進左丞相與趙汝愚同心共政韓侂胄用事稱疾求退授少保郇國公致仕卒諡忠肅劉穎字公實西安人紹興進士調溧陽主簿張浚知其賢遣子栻與遊厯知郡縣所至皆有治行積官至寶謨閭直學士致仕穎厯事三朝論列俱切中於時常言士以不辱身為重初與韓侂胄交及侂胄用事遂謝絶之丞相趙汝愚謫歸相遇於廢寺所言皆愛惜人才事余端禮繼相卒於善􅀋多所全佑實穎之助云劉甲字師文其先東光人父著葬龍游因家焉中淳熙進士厯知興元府利東安撫使呉曦叛以書致甲甲援大義拒之復持帛書貽㕘知政事李壁告變曦僭王位甲遂去官朝廷久乃微聞曦反狀壁袖帛書進上覽之稱忠臣者再安丙等誅曦甲復還漢中上奏待罪詔趣還任尋除宣撫使西邊諸事朝論多於甲取決進寶謨閣學士兼權四川制置司事卒於官甲幼􅀌多難母病刲股以進生平常謂吾無池長惟足履實地晝所為夜必書之名曰自監為文平澹有奏議十卷理宗詔諡清惠祝夢熊字寛夫江山人嘉泰三年進士累官監察御史請弛偽學之禁又請朱子趙汝愚等復其官開禧用兵疏邊臣啓釁忤韓侂胄罷知武夷山冲祐觀又以聚徒講學謫黃巖尉寇亂禦之力盡被執不屈死加贈龍圖閣待制諡獻烈趙汝標字準叔開化人嘉定中為蘄州簽判金人圍城三月救兵不至與守臣李成之死之事聞官其子二人馬天驥字德夫衢州人紹定進士厯著作佐郎輪對假司馬光五規之名條上時􅁦詞㫖切直寶祐中拜端明殿學士同簽書樞密院事封信安郡侯徐霖字景説西安人年十三有志聖道研精六經以探其要淳祐初試禮部第一授沅州教授上疏厯言史嵩之姦狀上大感悟擢秘書省正字會日食應詔上封事又數請建立太子以言不行去國每遷官輒辭後為秘書省著作郎兼除崇政殿説書權左司知無不言於是讒嫉者思中傷之乞補外厯知汀州卒度宗賜祭田百畝以旌直臣霖嘗家居衢守游鈞築精舍聘霖講道聽者至三千餘人徐應鑣字巨翁江山人世為衢望族咸淳末試補太學生宋亡應鑣與其子琦崧女元娘誓共焚子女皆喜從之太學故岳飛第有飛祠應鑣具酒肉祀飛琦亦賦詩以自誓祭畢乃與其子女入梯雲樓縱火自焚僕聞火聲穴牖視之父子儼然坐立如廟塑像諸僕壞壁入撲滅火不能死與其子女怏怏出户去倉卒不知所之翼日得其尸祠前井中皆僵立瞠目面如生益王立福州贈祕閣修撰後同舍生私諡曰正節先生元鄭介夫字以居開化人性剛直敢言至大間上太平策一綱二十目奏入多見采納終金谿縣丞著韻海行世汪文燝字良辰常山人泰定進士累官廉訪副使以國難憂憤不食卒所著有居朝明農二稿魯貞字起元開化人元末隱居不仕所著有春秋案斷中庸解易注余闕薦之終不出明鄭辰字文樞西安人永樂進士授監察御史南京敕建報恩寺役囚萬人蜚語告變命辰往驗無實無一得罪者谷庶人謀不軌辰盡得其蹤跡帝嘉之超遷山西按察使糾治貪濁不少貸潞州盜起辰親入山谷撫諭盜皆感泣復為良民宣德三年召為南京工部古侍郎英宗即位分遣大臣考察天下方面官辰至四川貴州雲南悉奏罷其不職者遷兵部左侍郎以疾告歸辰為人重義輕利初登進士產悉讓兄弟當世稱之金實字用誠開化人成祖即位上書言治道帝嘉之復對䇿稱㫖命入翰林與修太祖實錄永樂大典仁宗即位除衞府左長史正統初卒實爲人孝友敦行誼閲經史日有程限至老不輟樊瑩字廷璧常山人天順進士授行人使川中不受餽土官作却金亭識之成化中擢御史山東盜起奉命捕穫其魁清軍江北所條奏多著爲例宏治初擢河南按察使賑恤流民全活甚衆厯右副都御史巡撫湖廣平錦田賊以疾乞休起南京刑部右侍郎時滇黔多災異命瑩巡視至則劾鎮巡官罪黜文武不職者千七百人威震蠻俗還進尚書致仕劉瑾用事削其籍瑾誅復官卒贈太子少保諡清惠鄭伉字孔明常山人爲諸生試有司不偶即棄去從崇仁呉與弼學歸築室龍池之上日究諸儒論議一切折衷於朱子事親孝設義學立社倉以惠族黨所著易義發明讀史管見觀物餘論蛙鳴集諸書多燼於火徐文溥字可大開化人正德進士授南京禮科給事中劾尚書劉櫻都御史李自實侍郎吕獻請召還致仕尚書孫交傅珪時論以爲當宸濠求復䕶衞文溥抗疏爭之又疏請擇建儲貳劾中官崔瑶等誣罔罪帝皆不聽遂引疾去世宗即位廷臣交薦累遷廣東副使上言十事多涉權要尋以母老乞歸毛愷字達和江山人嘉靖進士授行人擢御史上疏救鄒守益謫寕國推官􅅦税蕪湖額足即開關放舟商人德之厯官刑部忤時相坐事落職萬厯初巡按御史謝廷傑奏愷守正不阿狷潔有古人風詔復官卒贈太子少保諡端簡余日新字君又龍游人崇禎進士任漳浦縣令有治行擢御史巡按山東時方被兵登陴拒守旋底定上章薦劉宗周等劾兵部尚書陳啓新後以太僕卿致仕柴薦禋字德馨江山人崇禎中由舉人知洧川縣抵任不數日流寇猝至城陷罵賊死本朝乾隆四十一年賜諡烈愍本朝徐光旭常山人由舉人任昌化縣教諭再補黃巖康熙十三年耿精忠叛逼以偽職抗節不受逃匿永嘉山谷中不食而死徐光皓常山人官山東新城知縣致仕歸值耿精忠變被執脅降罵賊不屈遂遇害江之崑字玉隣常山人耿精忠亂賊將呉安􅀖破常山欲降之之崑罵賊不屈與次子世晟俱被害其妻及子婦孫女皆死之鄭大來開化人諸生有勇力康熙甲寅閩賊陷城知縣崔華募兵大來團結鄉勇禦之􅀗賊諜數人磔之賊引去後賊復聚衆萬餘謀夜襲城時黒霧四塞大來單騎從霧中擊殺數十人猝中鎗死時同戰殁者鄭卓麟鄭振祥鄭有忻鄭大卿鄭毛鄭童戴甲毛徐義禮徐白古徐六十徐旦等共十七人汪允祐開化人􅀒母避賊棄妻不顧妻投水而死逃至遂安深山中糧盡乞食以奉母母卒廬墓終喪雍正六年旌其閭徐灝字景梁常山人康熙十三年閩賊陷城灝父錫德被執酷刑索餉時灝年十四以身被翼叩頭流血曰但箠我勿傷吾父賊感其誠兩釋之父病侍湯藥衣不解帶者五年及殁廬墓三年猶不忍去族人有爭產不解者灝割己地以釋其爭毛大經西安人以侍衞官雲南遊擊乾隆三十一年緬匪滋擾大經防禦虎踞鐵壁等關明年擊賊於猛卯江陣殁同縣吉兆乾隆五十二年以外委隨剿林爽文陣亡俱議卹如例何肇勤江山人官廣西守備乾隆五十三年從征黔楚逆苗戰殁同縣周長泰嘉慶七年以都司隨剿楚匪陣亡俱廕卹如例黃廷選開化人嘉慶六年旌表孝子尹子南龍游人嘉慶七年旌表孝子流寓宋孔端友宣聖四十八代孫襲封衍聖公靖康之變與子玠隨高宗南渡因賜第居衢終宋之世百六十年皆襲封爵元初封孔子後疑所立或言孔氏子孫寓衢者乃其宗子召孔洙赴闕洙以封爵遜於居曲阜者世祖曰違榮而不違道真聖人之後也拜國子祭酒趙子晝宋宗室建炎中以公族為侍從衢嚴信饒之民生子多不舉子晝請禁絶之遷知秀州既而奉祠以歸寓於衢為崇蘭圃於城南與程俱諸人酧倡其中汪應辰信州玉山人紹興中疏論和議秦檜不悦遂請祠歸寓居常山之永年院蓬蒿滿逕一室蕭然饘粥不繼人不堪其憂應辰處之裕如益以修身講學為事元趙友欽宋宗室凡遁甲韜鈐天文厯算之學靡不精究一日遊芝山酒肆中遇一丈人方瞳綠髮授以懷中丹書遂隱處海濱二十年注易數萬言嘗乘青騾從小蒼頭往來衢婺山水間卒於龍游之鷄鳴山號緣督先生宋濂劉基皆從之遊其書失於兵火惟存革象新書王禕手校傳世列女宋劉愚妻徐氏龍游人在家時其母將以嫁姑子之富者徐泣曰為富人妻不願也遂歸於愚居破屋中一事機杼愚常懐白金歸徐怒曰我以子為賢而若是愚出書以示束修得也乃己徐氏女龍游人名蓮姑許配方鍾鍾行不檢為父母逐流落死女聞誓不再嫁父母欲奪其志女斷髪持刀以死自勵越􅀊有生員杜謙求為配父母悦而強之女度不免乃佯許之就寢室縊死事聞詔旌其貞烈春秋祀焉潘仲岳妻程氏開化人夫戍遼東程送行監督者豔其色遂以軍政挾與偕行仲岳恐在途遭辱程曰妾自為計君勿憂也因紿以整裝還家即自經死楊子善妻徐氏常山人字玉姑夜有數盜囊一首入子善家呼之出擒縛外庭徐與妾在室中倉卒不知其故盜挈所囊首脅之曰此汝夫也可疾從我徐度不能免使妾款賊急趨出後門投井死魯氏女常山人幼􅀌育於叔父母許字徐洛將嫁洛死魯請往視殮不可即去膏沐尸居一室家人以其長議婚嫁竊知其期沐浴更衣自縊於室又同邑鄭氏女許配汪璇未嫁璇溺桐江死訃至鄭遂自經江氏女開化人名瑞英饒寇破馬金營女從母匿屋後白馬崖下寇􅀗之欲殺母留女女解耳鬟遺母曰母以此買命兒自為計母去即投崖死孔聞勉妻徐氏西安人夫疾侍奉湯藥衣不解帶者三年事舅姑親操井臼備極艱辛夫亡逾七日密紉其衣赴井死本朝張秉薦妻徐氏常山人順治初馬士英驅衆南奔大肆刦掠秉薦為亂兵所擄氏脱簪珥往救兵見氏色麗欲逼之氏大罵兵加以刃即引頸受牽其袂氏即斷袂兵怒三斫其尸月餘秉薦歸殮顏色如生又同縣毛應兆妻江氏應兆任鎮江守備氏在家為賊所掠欲汙之不從投水死楊有華妻葉氏名月娥開化人年十八有華卒守節二十餘年康熙甲寅耿精忠亂氏為賊所􅀗拔簪自刺未殞過溪橋赴水死又同縣劉大通妻魯氏與其父同為賊所執賊斬其父氏奪其刀十指俱墮罵賊而死劉起雨妻徐氏余文教妻劉氏俱投水死余大英妻徐氏自刎死江氏三節常山人張氏江之崑妻曹氏其媳也康熙甲寅耿精忠亂之崑為賊所殺張氏曹氏求自盡孫女如娟大呼曰請先母死賊怒先殺之二氏亦皆自縊又江山縣林士鼎妻毛氏名遜娘賊陷江山遜娘同姑避難至城隅與姑相失因涕泣覓姑不得日暮至陳村自經而死汪氏二節開化汪二蛟母徐氏婦戴氏康熙甲寅閩賊陷開化縛二蛟驅其母妻以行抵大澤戴忽厲聲曰得死所矣徐應聲曰侍我賊急持戴袖袖絶遂沉於水徐亦一躍而下二蛟大呼縛索盡絶亦赴水死同時獨山農民洪大偉妻余氏媳徐氏姑媳避難山中賊搜得之婦觸石破額流血滿面賊知不可活手刃之姑且􅂘且罵亦觸死於婦之旁姚紳妻楊氏常山人康熙甲寅夏閩賊縛之登舟乘間躍河而死時年二十同縣周正徵妻王氏為賊所擄不從投井死徐氏四節常山人詹氏名三娘徐明備妻素有節概康熙甲寅夏閩賊入城氏恐辱與女小答俱投鄰井數日賊退出之顔色不變又徐明琦女秀姑年十六賊薄城夜與父訣閉樓自經死徐文英妻王氏為賊所掠以首觸刃賊斷其喉而去俊姑常山人徐生之妾生一子康熙甲寅夏為賊所掠大罵不從被殺賊去其子猶伏尸而乳賊有後至者異之令他婦抱之起尸忽張目視乃以土掩之訪徐生而歸其子劉章夀妻徐氏開化人劉光漢之子婦康熙甲寅閩賊之變光漢罵賊不屈以義烈聞丙辰三月城再陷氏年十九賊欲逼之不屈置於樓上令兩卒守之氏佯謂卒曰幸語若主必成禮乃可守者以告賊喜盛服佩刀而上氏改容迎之為解所佩刀置案上佯笑曰何不為我具衣飾賊欣然下氏引刀自刺守者奪之氏斷其右臂遂自到死賊忿甚五截其尸而去又同縣夏祁貞妻詹氏被賊掠躍入深溪死汪日炯妻蔣氏鄭起熉妻余氏俱投繯死杜斌妻徐氏西安人年二十餘夫疾割股再夫死孝事舅姑舅姑殁􅂘泣喪明卒鄭榮組妻徐氏西安人榮組父為族弟所擊榮組往救之遂死其冬榮組父亦死明年氏子五元七元遇其人於途嚙之墮其鼻其人控於縣縣逮五元兄弟氏詣縣訴之署令不省氏觸石碑而死典史為置棺置於城西鐵塔下後知縣陳鵬年廉得其事為買地以葬復建孝烈祠於墓旁以祀之徐元那妻王氏開化人年二十而寡無子舅姑早喪依叔姑以居叔姑之子潛鬻氏受金以償所員及期娶者臨門乃白氏氏入室沐浴自縊死又龍游縣張旭初妻胡氏歸旭初二載而夫亡姑貧欲奪其志氏飲藥酒死黃貞女開化人父德初業農女八􅀊許字余生年十四夫以痘殤􅀉衣為訣氏著衣大慟投於河尸流數里仍逆流而上止夫家門席廿二妻方氏龍游人廿二置酒宴客同席有尹眷廣者知廿二與妻異室而寢客散潛入氏室欲犯之氏驚起大呼持刀力拒眷廣奪刀刺氏喉而死雍正二年旌表詹文尉妻徐氏西安人夫亡守節同縣詹文英妻邵氏江敏琇妻鄭氏蔣元肇妻楊氏胡思孟妻陳氏王學恭妻方氏鄭一鼎妻陳氏楊長禧妻葉氏葉應梅妻鄭氏葉起松妻鄭氏江應麟妻鄭氏王鰲妻錢氏舒啓瑞妻杜氏鄭觀光妻王氏周文瑞妻余氏常騮妻鄭氏柴應陞繼妻毛氏王志雍妻陳氏方其升妻陳氏劉雲蛟妻杜氏陳國頓妻留氏陳聖濂妻徐氏王良弼妻趙氏陳其度妻李氏方盛妻徐氏舒齊佳妻胡氏王學岳妻周氏江繼瀚妻鄭氏王學聖妻周氏張元釗妻胡氏凌宏楫妻汪氏余文光妻張氏楊應春妻鄭氏徐兆詩妻吕氏鄭光庶妻夏氏方環妻江氏崔翰妻呉氏徐彪妻鄭氏方濱妻祝氏生員葉璿妻葉氏通判徐敦蕃妾雷氏劉宏治妻鄭氏張榮鎮妻夏氏胡經正妻王氏王正華妻陳氏汪聖溶妻鄭氏邵増祚妻徐氏徐崇卬妻