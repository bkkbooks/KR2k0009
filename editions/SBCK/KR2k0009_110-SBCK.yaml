  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_110-1a}
body:
  text: 金華府二名宦晉丁潭山陰人元帝時為東陽太守以清潔見稱顏含瑯琊莘人元帝時為東陽太守簡而有恩明而能斷山遐河内懷人康帝時為東陽太守為政嚴猛帝詔曰東陽頃來竟囚每多入重豈郡多罪人將箠楚所求莫能自固耶遐處之自苦郡境肅然范汪順陽人咸安中為東陽太守大興學校甚有惠政袁宏陽夏人為東陽太守時謝安為揚州刺史祖道治亭執宏手取一扇授之曰聊以贈行宏應聲答曰輙當奉揚仁風慰彼黎庶太元初卒扵官殷仲文長平人義熙中為東陽太守多惠政南北朝宋蔡興宗考城人孝武時為東陽太守舊有鄉射禮久不復修興宗行之禮儀甚整齊蕭崇之蘭陵人仕齊為東陽太守以幹能顯政尚嚴厲永明中富陽唐寓之反破東陽崇之死之沈約武康人隆昌元年為東陽太守王志臨沂人爲東陽太守郡獄有重囚十餘人冬至日悉遣還家過節皆反惟一人失期司獄以爲言志曰此是太守事主者勿憂明旦果自詣獄辭以婦孕吏民皆歡服梁王承臨沂人武帝時爲東陽太守爲政寛厚吏民悦之時朱异當朝車馬填門魏郡申英常指异門曰此中能不至者惟大小王東陽小東陽即承弟穉也何遠東海郯人武帝時爲東陽太守疾强富如仇讐視貧細如子弟特爲豪右所畏憚及去東陽經年􅀊口不言榮辱士􅀋益以此多之席闡文臨涇人武帝時爲東陽太守在郡有能名冬至悉放獄中囚依期而至何炯灊人嘗慕恬退不樂仕進從叔昌㝢勸之遂解􅄄尋爲永康令以和理稱陳章昭達武康人武帝時留異據東陽帝患之乃使昭達爲長山令居其心腹後卒擒異唐崔義元武城人永徽中爲婺州刺史時睦州女子陳碩貞舉兵反圍婺州義元署崔元籍爲先鋒而自統衆繼進至下淮戍擒其諜數十人於是士卒齊力賊衆大潰斬首數百級歸者萬計􅀗碩貞斬之餘黨悉平李嗣貞趙州柏人高宗時補義烏令有政譽杜暹濮陽人擢明經第補婺州㕘軍秩滿歸吏以紙萬番贐之暹為受百番衆歎曰昔清吏受一大錢何異哉王仲舒并州祁人元和中為婺州刺史時州旱疫人多徙死閭里幾空仲舒在任五年克増户口又按劾贓吏州部肅清于興宗高陵人補東陽令亷靜和易吏民安之黄碣閩人初為彰州刺史尋徙婺州治有績董昌為威勝軍節度使表碣自副及昌反碣直諫遇害宋段少連開封人仁宗時知金華縣通敏有才遇事無大小決遣如流不為權勢所屈李南公鄭州人調浦江令郡猾吏恃守以陵縣不輸􅀒租南公捕繫之守怒通判為謝曰能按郡吏健令也卒寘諸法蘇頌丹陽人熙寕間知婺州遷州學於子城南頌初赴官泝桐江水瀑迅舟横欲覆母在舟中幾溺矣頌哀號赴水救之舟忽自正母甫及岸舟乃覆人以為純孝所感蕭振平陽人政和中方臘㓂東南振調婺州兵曹兼功曹時盜賊所在猖獗婺卒揚言欲叛應賊官吏震􅂲振選土兵强勇者幾千人日習武以備蓄異謀者懾息嘗議城守振請以錢數萬緡傭工板築未數月城壘屹然姚舜明嵊縣人宣和初盗發青溪連陷杭睦衢婺處歙六州以舜明判婺州權州事招集流亾兵數千餘人賊入境晨登義烏門城壁飛矢雨集舜明親率從兵以石擊賊既而引兵出戰賊遂大潰蘇遲眉山人建炎初以直秘閣知婺州言本州上供羅􅀊増五萬餘疋民實不堪詔減其半黄友平陽人攝婺州兵曹婺冦作守欲為殄滅之計友請往諭之既次浦江賊望風解去一境帖然婺人圖像祀之呉表臣永嘉人紹興中知婺州會大饑先發常平米賑貸之然後以聞郡人德之課最王居正維揚人紹興中知婺州奏免􅀊増貢羅及御炭高宗曰守臣愛百姓皆如此朕復何憂辛次膺萊州人紹興中知婺州為政貴清淨先德化人稱其不煩汪大猷鄞人紹興間授金華縣丞爭財者諭以長幼之禮悦服而退李椿年行經界法約束嚴甚檄大猷覆視龍游縣大猷請不實者得自陳母遽加罪汪綱黟縣人紹興中知蘭谿縣決摘如神􅀊旱郡倚辦勸分綱請假常平錢為糴本使得循環迭濟又躬勸富民浚築塘堰大興水利饑者得食其力全活甚衆部使列為一道荒政之冠以言去邑人相率投匭直其事綱力止之後以直秘閣知婺州改提􅀧浙東刑獄慮囚至婺州有奴挾刃欲􅆷其主不遇而殺其子妄牽連徑出斬之汪應辰玉山人紹興中知婺州郡積欠上供十三萬緡朝廷命憲漕究治應辰謂急則憂民乃與諸邑蠲宿逋去苛歛定期會窒滲漏悉為補發趙不􅖊宋宗室紹興中調金華丞治縣豪何汝翼械請諸郡編隸他州邑人慴服林光朝莆田人尹焞弟子南渡後以理學倡東南呉芾仙居人孝宗時知婺州勸民義役金華長仙鄉民十有一家自以甲乙第其產相次執役幾二十年芾輿致十一人者與合宴更其鄉曰循理里曰信義以褒異之李椿永平人孝宗時知婺州會詔市牛筋五千觔椿奏一牛之筋纔四兩是欲屠二萬牛也上悟為收前詔洪邁番陽人孝宗時知婺州金華田多沙勢不受水邁奏治境内陂湖八百三十七所婺軍素無律邁以計逮捕四十有八人戮首惡二人餘黔撻有差莫敢譁者事聞上與輔臣曰不謂書生能臨事達權特遷敷文閣待制蕭燧臨江人淳熙中自嚴州移知婺州父老遮道幾不得行送出境者以千數婺與嚴隣人熟知條敎不勞而治􅀊旱浙西常平司請移粟於嚴燧謂東西異路不當與然安忍於舊治坐視為請諸朝發太倉米賑之李彥頴德清人淳熙中知婺州勤約有惠政禁民屠牛蠲屬縣税十三萬緡趙善湘濮安懿王五世孫開禧元年通判婺州有招茶冦功趙必愿汝愚之孫端平初以直秘閣知婺州至郡免催紹定六年分小户綾羅錢三萬緡立淳良頑慢二籍勸懲人户措置廣運倉及諸倉積穀奏乞寬減内帑綾羅申省免用舊例豫解諸色窠名錢罷開化税場呉昌裔中江人嘉熙間知婺州婺告旱乃減騶從供帳遣僚佐召邑令周行阡陌蠲粟八萬一千石錢二千五萬緡以慰婺民常楙臨邛人淳祐間調婺州推官疏決滯訟以剸繁裁劇稱所至公亷自持故人言常侍郎不受錢陳塏嘉興人淳祐中知婺州進寶章閣直學士再知州興學好士民愛戴之元周自强臨江人泰定時遷義烏尹周知民情而性度寬厚不為刻深民有以爭訟訴於庭者知其曲直未遽加以刑反覆開譬之不悛然後䋲之以法民間田税之籍多失實自强出令履畝覈之吏不能欺由是政治大行聲譽籍甚許廣大天台人至正間為武義尹有循聲他邑訟不決者咸請質焉熟溪水潰築石堤以捍之民稱許公堤徐永益平陽人至正間為金華尹王禕嘗曰婺之屬縣六十年為令而有循良名者得三人焉義烏周自强武義許廣大金華徐永益明王宗顯和州人太祖初克婺州改州為寕越府以宗顯知府事宗顯故儒者博涉經史開郡學聘葉儀宋濓為五經師戴良為學正呉沉徐原等為訓導自兵興學校久廢至是始聞􅃶誦聲未幾卒官王興宗秣陵人太祖初下婺以興宗知金華縣事興宗故隸人也李善長等皆以為不可太祖曰興宗從我久勤亷能斷儒生法吏莫先也居三年果以治行聞王允誠洪武初以清軍總管知義烏縣時承兵燹後廬井蕩然允誠修舉拊循不期月而民安堵縣當孔道民苦軍士侵擾為立法䋲之害頓息凡營造及軍需供億事事規措有方尋擢南安守去民涕泣擁留至馬不得行魏處直益都人洪武中知永康縣持身亷儉剖決精明民歌訟之黄紹欽交州呉川人洪武中為永康縣宋濓稱其真亷且惠有古循吏風宋哲恩縣人永樂初知蘭谿縣為治嚴明豪猾屏跡陞户部郎中父老詣闕乞留詔從之黄仲芳建安人永樂中知東陽縣凡雜賦於民者悉奏罷之縣南山有虎患仲芳為文禱於神越三日有二虎來伏南門外殺之害遂絶劉實安福人正統初授金華府通判適􅀊大旱請蠲租且贖還饑民女子義門鄭氏族大不能自給又買馬出丁供山西郵傳困甚亦以實言􅀗免劉傑樂平人正統三年任義烏縣丞為政識大體嘗因旱奏請蠲糧上封事十條採行其九秩滿民詣􅆣乞留繆樗溧陽人成化中知東陽縣履畝繪圖飛詭之弊一清厯五載政平訟理劉􅉅涪人正德中為金華知府舉治行卓異未及遷即告歸李一元建德人嘉靖中知金華府周知吏胥姦偽訟者情得自達曲直立辨賦税酌輕重爲後先令縣官與民期約未嘗遣役下縣汪道昆歙縣人嘉靖中知義烏縣絶侵漁抑豪强辨􅁈獄盗賊屏息尤重學校所舉拔多爲名流文元發長洲人萬厯初知浦江縣善折獄凡上官疑難案牘數委決焉􅀊當丈量履畝畫魚鱗圖丹吏弊一清時通浙得羨田千畝請以羨米充羨田議下行之解學龍興化人萬厯中任金華府推官居官持大體不爲苛察吏畏民懷奸宄懾息周士英武進人萬厯中知義烏縣清介有守以治最擢吏部主事莊起元武進人萬厯中知浦江縣甫視事察知左右叢奸置之法讞斷摘伏如神而於百姓多所矜釋暇則進諸生談論經藝設學田建書院士皆感奮本朝張安豫華亭人順治三年知金華府時府境初下民多竄伏山谷安豫設法招徠戢􅁀兵嚴告訐寬免力役民得少休府學及鼓樓皆燬於兵次第建造修通濟橋以通行旅石壩圯復修築之民􅀗水利治行推第一孫家棟安邱人順治十七年知義烏縣剖決如神奸豪俱歛迹徐喆廣昌人康熙九年任蘭谿縣丞有惠政十三年攝武義縣事甫月餘閩賊陷城死之事聞贈按察司僉事賜祭葬張元會武寕人知湯溪縣值閩亂悉心守禦計誅叛逆邑賴以全李忱安邑人康熙十三年知金華府下車即除民疾苦值閩變甌括望風響應賊兵數萬屯積道山忱􅀌域獨守爲浙東屏翰以勞卒官趙泰甡膠州人康熙三十一年知金華縣剔除里遞及採買之累邑民德之人物秦顔烏烏傷人事親孝有羣烏銜鼓集所居之異一說羣烏啣土助成父冡詳古蹟烏傷故城下漢楊璇字機平烏傷人兄喬厯官尚書桓帝愛其才貌詔妻以公主喬不食而死璇舉孝亷靈帝時爲零陵太守是時蒼梧桂陽猾賊相聚攻郡縣璇制馬車兵車尅期會戰奔突賊陣羣盜駭㪚郡境以清三遷爲渤海太守所在有異玫以事免後拜尚書僕射以病乞骸􅇧卒於家駱俊字孝遠烏傷人有文武才幹少為郡吏察孝亷􅀘尚書郎擢拜陳留相值袁術僭號羣賊並起俊厲威武保疆境賊不敢犯養濟百姓􅀊􅀗豐稔後術軍衆飢困求糧俊疾惡術不應術怒密使殺之三國呉畱贊字正明長山人少為郡吏與黄巾賊帥呉桓戰手斬之贊一足被創遂屈不伸後引刃自割其筋足伸創愈凌統聞而壯之乃表薦贊累有戰功稍遷屯騎校尉好規諫直言不阿㫖孫權憚之諸葛恪征東興贊為前部大戰魏師遷左將軍孫浚征淮南拜左䕶軍道病卒駱統字公緒俊之子為孫權騎都尉常勸權以尊賢接士育民阜財權深加意焉累遷偏將軍黄武初曹仁攻濡須使别將襲中洲統拒破之封新陽亭侯斯敦烏傷人父偉為廷尉失機議當坐死敦叩閽泣血乞以身代呉主嘉其孝赦偉罪仍旌其門晉許孜字季義呉寕人師事會稽孔冲受詩書禮及孝經論語冲亡孜為制服三年二親殁柴毁骨立建墓於縣之東山躬自􅀒土每一悲號禽鳥翔集宿墓所手植松栢亘五六里時有鹿犯松裁孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下猛獸即於孜前自撲而死自後樹木滋茂無犯者孜乃立宅墓次朝夕奉亡如存元康中郡察孝亷不起邑人號其居曰孝順里子生亦有孝行家於墓側圖孜像朝夕拜焉南北朝宋樓惠明字智遠長山人立性貞固有道術居金華山舊多毒害自惠明居之無復辛螫之苦藏名匿跡人莫之知宋明帝齊高帝召俱不至文惠太子在東宫苦延方至尋辭歸梁龔孟舒東陽人通毛詩善談名理仕梁為潯陽郡丞元帝在江州師事之陳天嘉中官至中大夫唐駱賓王義烏人七􅀊能賦詩與王勃楊烱盧照隣以文章齊名號為四傑厯武功長安主簿武后時數上書言事除臨海丞棄官去李敬業起兵署為府屬為敬業傳檄天下斥武后罪后見之曰宰相安得失此人敬業敗亡命不知所之中宗時詔求其文得數百篇張志和字子同金華人始名龜齡年十六擢明經第以䇿干肅宗命待詔翰林授左金吾衞錄事叅軍因賜名後坐事貶南浦尉致還居江湖自稱烟波釣徒又號元真子帝嘗賜奴婢各一志和配為夫婦號漁童樵青顔真卿刺湖州志和往來苕霅間李德裕嘗稱其隱而有名顯而無事不窮不達嚴光之比云馮宿字拱之東陽人父子華廬親墓有靈芝白兔號孝馮家宿擢進士第累拜河南尹擢東川節度使完城郭增兵械息水患一方賴之卒諡曰懿弟定字介夫與宿齊名人以方漢二馮舒元輿東陽人元和中第進士擢監察御史按劾無所縱累遷御史中丞奏辨明審尋拜同中書門下平章事與甘露之難陳太竭浦陽人親亡即墓手植松柏衰絰終身形質枯瘁哀哭不輟每奠果肴烏鳥不啄宋胡則字子正永康人果敢有材氣進士起家轉憲州錄事㕘軍入奏太宗因問邊策對稱㫖厯典七州更六路使者節所臨有績以兵部侍郎致仕嘗奏免衢婺二州丁身錢民懷其德立像祀之滕元發字達道東陽人初名甫性豪雋九􅀊能賦詩舅范仲淹見而奇之第進士通判湖州厯御史中丞神宗知其誠藎事無巨細輙問之元發隨事解答不少嫌隱徙定州入覲力言新法之害厯知青州應天府齊鄧二州貶居筠州哲宗即位屢遷太原威行西北號稱名帥以龍圖學士知揚州卒諡章敏徐無黨永康人從歐陽修學文章皇祐中以南省第一人登進士第仕止郡敎授所著有五代史注錢遹字德循浦江人熙寕進士通判越州攝府事纔二日獄為一空建中靖國初擢殿中侍御史出提舉湖北常平興利除害發奸摘伏風采凛然梅溶其先呉興人五季時遷浦陽溶以儒受薦為單州助敎年七十餘攝松陽丞宣和初盜發青溪據歙睦衢婺處相繼陷兵及境溶死之從子執禮言於朝官其二子梅執禮字和勝浦江人第進士調常山尉以薦為武學博士累遷禮部尚書以忤王黼出知蘄州又奪職欽宗立召除吏部尚書旋改户部金人圍京師執禮勸帝親征而請太上帝后皇后太子出避用事者阻之及車駕再出執禮與宗室子昉諸將呉革等謀集兵奪萬勝門夜擣金帥帳迎二帝歸范瓊泄其謀故不克而死高宗即位加贈資政殿學士諡曰節愍項德武義人充郡禁卒宣和間盜陷婺城縣亦隨没德率潰卒破賊屯於城隍祠東抗江蔡西拒董舉北扞王國大小百餘戰俘馘無算賊目爲項鷂子適王師至德引衆合會賊盡鋭邀黄姑嶺下德戰死邑人哭聲震山谷圖像􅀊時􅀕之宗澤字汝霖義烏人㓜有大志登元祐進士靖康元年知磁州從羸卒十餘人單騎就道至則繕城池修器械募義勇爲固守計康王再使金澤力止之詔爲副元帥將兵與金人數十戰皆大敗之會金人逼二帝北行澤提軍趨滑欲徑渡河據其歸路邀還二帝而勤王之兵無一至者仍移師近都累表勸進王即位於南京澤入見涕泗交頤陳興復大計除龍圖閣學士京城留守兼開封尹屢破金兵威聲日著北方聞其名尊憚之呼曰宗爺爺方與諸將尅期大舉前後請上還京二十餘奏每爲黄潛善等所抑憂憤疽發於背連呼過河者三而卒贈觀文殿學士通議大夫諡忠簡潘良貴字子賤金華人以上舍釋褐厯秘書郎時蔡京父子欲引致良貴謝絶之尋提舉淮南路常平靖康元年召還賜對極言何㮚唐恪等不可用坐黜高宗即位召爲左司諫請誅判命偽黨又乞封宗室賢者以壯國體巡幸維揚養兵盛以圖恢復黄汪惡其言久之除考功郎宰相吕頤浩欲引入兩省良貴正色曰親老方欲乞外遂出知嚴州未幾請祠起為中書舍人除徽猷閣待制提舉亳州明道宫歸十年不出家居貧甚秦檜諷令求郡不答卒年五十七良貴剛介清苦壯老一節諫疏多焚藁僅存雜著十五卷鄭剛中字亨仲金華人登進士甲科累官殿中侍御史充陜西分畫地界使金使欲盡取階成岷鳳秦商六州剛中力爭止割秦鳳之半尋除四川宣撫副使移司於利州省費百萬奏蠲四川雜征於階成二州營田抵秦州界凡三千餘頃􅀊收十八萬斛又分利州為三路命大將呉璘楊政郭浩為安撫在蜀六年儲蓄豐積金不敢犯與宗澤齊稱以忤秦檜落職徙封州檜死復官卒諡忠愍范浚字茂明蘭谿人紹興間舉賢良方正以秦檜當國不起閉門講學篤志求道嘗著心箴學者稱為香溪先生有文集二十卷王淮字季海金華人紹興進士為臨海尉朱倬舉監察御史遷右正言條奏宰相湯思退罪數十遂策免又奏為治之策治内有三治外有四上深嘉歎淳熙八年拜右相兼樞密事樞密都承㫖王忭怙寵為姦淮極陳其罪斥之章頴論事狂直上將罷黜淮曰陛下樂聞直言士大夫以言相尚此風可賀也進拜左丞相已而上章求去加觀文殿大學士判衢州力辭改提舉洞霄宫卒贈少師諡文定葉衡字孟錫金華人紹興進士知於潛縣治為諸邑最擢知常州除太府少卿奏募民耕合肥瀕湖田四十里倣營田官私各收其半累除樞密都承㫖命按視江淮措置軍民得治兵之要厯拜㕘知政事奏牧守將帥必擇才久任拜右丞相兼樞密使湯􅀖彥譖之罷相謫官􅀖彥以罪竄復官與祠卒衡􅀒才足智兵事甚悉贈資政殿學士陳良祐字天與金華人紹興進士累遷右司諫首論會子之弊願損内帑以紓民急上從之軍民翕然上鋭意圖治良祐勸覽貞觀政要帝曰卿亦當以魏徴自勉左相丁外艱詔起復良祐言起復非正理宜使之終喪遂寢厯吏部尚書時議遣北使請地良祐奏請地乃起釁之端必須遣使則祈請欽宗梓宫猶為有辭奏入忤㫖貶瑞州居住淳熙四年起知徽州除敷文閣待制知建寕府卒潘景憲字叔度金華人隆慶初進士以親老力請太平州敎授宰相歎為不可及與吕祖謙同榜而齒加長聞其論説遂執弟子禮遭父喪廬墓三年服除遂不復仕所著有記纂淵海林大中字叔和永康人紹興進士累遷殿中侍御史紹熙二年春雷電交作詔訪時政闕失疏言陰勝陽之明騐當辨邪正母使女謁得行小人得間君子又疏言宗室汝愚之賢當召上從其言尋以言不行求去知寕國府移贑州寕宗即位召還韓􅇑胄請内交􅁍之㑹彭􅀛年論􅇑胃有㫖􅇑胄與内祠􅀛年與郡大中請留􅀛年經筵而斥􅇑胄外任不聽出知慶元府俄削職歸􅇑胄誅起僉書樞密院事卒贈資政殿學士諡正惠所著有奏議外制文集三十卷鄭綺字宗文浦江人事親孝父照繫獄當死綺上書請以身代事遂白母病攣抱持苦嬰兒三十年不懈綺臨没戒子孫母分財異爨乾道間賜號冲素處士四世孫德珪德璋孝友天至宋亡德璋為仇家所陷德珪以身代弟德璋慟絶者數四􅀒骨歸葬廬墓再期每一悲號烏鳥皆翔集不食後人皆同居元至大中表其門明洪武二十六年遣官簡㧞其家子弟年二十以上者二十四人赴京選用應孟明字仲實永康人隆興初進士厯官樂平縣丞輪對帝嘉􅅄拜大理寺丞故大將李顯忠之子家僮溺死有司誣以殺人逮繫三百家孟明察其􅁈白釋之進直秘閣知靖江府兼廣西經畧安撫民病鹽法孟明條具驛奏除其弊寕宗即位拜太府卿尋權吏部侍郎卒孟明以儒學奮身受知人主官職未嘗幸遷韓􅇑胄嘗遣客誘以諫官俾誣趙汝愚孟明不答士論重之應純之孟明子嘉泰進士厯知楚州兼京東經畧安撫使見北軍屢捷謂中原可復密聞於朝丞相史彌遠鑒開禧之事不欲大舉苐勅立忠義軍令就節制己而擢兵部侍郎金人内侵力戰死之喻良能字叔奇義烏人舉進士第補廣德尉調鄱陽丞遷國子監主簿進忠義傳二十卷通一百九十人乞授之將帥孝宗嘉歎尋除太常丞兼工部郎官致仕鄉人表其里曰郎官里吕祖謙字伯恭金華人尚書右丞好問之孫也祖謙學本之家庭有中原文獻之傳長從林之奇汪應辰呉憲游既又友張栻朱子講索益精初廕補入官後舉進士復中博學宏詞科調宗學敎授尋除太學博士兼國史院編修實錄院檢討官輪對勉孝宗留意聖學及恢復大事厯官著作郎直秘閣祖謙學以關洛為宗而旁稽載籍不見涯涘朱子嘗言學如伯恭方是能變化氣質其所講畫將以開物成務居家之政皆可為後世法學者稱東萊先生理宗朝諡曰成嘉熙二年改謚忠亮景定二年從祀孔廟吕祖儉字子約祖謙弟受業祖謙如諸生監明州倉將上會祖謙卒乞終期喪寕宗即位除太府丞韓􅇑胄用事趙汝愚罷相祖儉上封事極論安置吉州遇赦量移高安尋卒在謫所讀書窮理賣藥以自給每出必草履徒步為踰嶺之備所為文有大愚集嘉熙初諡曰忠吕祖泰字泰然祖儉從弟性疏達尚氣誼慶元初祖儉以言事安置端州祖泰徒步往省之留月餘祖儉殁乃詣登聞鼓院上書論􅇑胄有無君之心請誅之以防禍亂又請誅蘇師旦罷陳自强用周必大書出中外大駭有㫖拘管連州尋杖之百配欽州牢城􅇑胄誅詔雪其冤特補土州文學改授迪功郎監南嶽廟喪母無以葬至都謀於諸公得寒疾卒喬夢符字世用東陽人從吕祖謙學登淳熙進士知徽州歙縣累官大理正鞫獄嚴明不畏權勢除監察御史姦佞為之歛跡陳黼字斯士東陽人少從吕祖謙游永康林大中聞其賢以女妻之登淳熙進士性恬靜有守官至著作郎貧無室廬而能不改其樂終㕘議有文集二十卷邵囦字萬宗蘭谿人登淳熙進士授郴州敎授改潭州朱子帥湖南薦其學行有文學自將誨誘不倦之語所著有禮記解讀易管見等書葛洪字容父東陽人從吕祖謙學登淳熙進士為工部員外郎上疏言當今將帥諸弊乞加嚴飭上下振厲以求更新帝嘉納之累遷㕘知政事封東陽郡公以資政殿大學士致仕卒謚端獻杜範稱其侃侃守正有大臣風徐僑字崇甫義烏人淳熙進士調上饒主簿登朱子之門子稱其明白剛直命以毅名齋入為秘書省正字直寶謨閣以忤史彌遠劾罷端平初召遷秘書少監太常少卿手疏數千言皆感憤剴切除兼侍講開陳友愛大義皇子竑得復爵請周惇頤程顥程頤張載朱子從祀趙汝愚侑食寕宗帝皆如其請遷工部侍郎以寶謨閣待制奉祠卒諡文清葉由庚字成父義烏人從徐僑學蚤夜窮探經㫖騐之躬行僑謂人曰吾道為有托矣金華何基王柏相與貽書辨析至無虛月平生不務著書惟研濓洛諸儒之説以敎人學者宗之王介字元石金華人從朱子吕祖謙游登紹興元年進士除國子錄上疏言陛下於夀皇孝敬不可久闕孝宗崩又力請上過宫執喪言辭激切寕宗即位疏言陛下即位未三月䇿免宰相遷易臺諫悉出内批非治世事韓􅇑胄疑介詆己出知邵武軍會學禁起姚愈劾介黨偽學謫主台州崇道觀􅇑胄誅召還除國子􅀕酒論宰相史彌遠不宜起復兼權中書舍人檄駁不避權貴厯知慶元府兼沿海制置使以疾奉祠卒諡忠簡陳亮字同甫永康人才氣超邁喜談兵下筆數十言立就隆興初婺州以解頭薦上中興五論不報益力學著書者十年孝宗即位亮更名同詣闕上書極言和金之失勸上移居建業以圖恢復孝宗將擢用大臣交沮之渡江歸日落魄飲酒醉中言涉犯上或首刑部以聞下大理孝宗亷知其事劃牘於地遂得免光宗即位舉進士擢第一授僉書建康府判官未至官卒端平初諡文毅喬行簡字夀朋東陽人學於吕祖謙登紹熙進士厯淮西轉運判官列上備邊四事理宗時應詔上書謂賢路當廣不當狹言路當開不當塞累疏論時政拜㕘知政事兼知樞密院事時議收復三京行簡上疏陳利害不從尋拜右丞相襄陽失守或又陳進取之計行簡奏今内外事勢可憂而不可恃者七言甚懇切師得不出嘉熙二年拜平章軍國重事加少師封魯國公卒贈太師諡文惠行簡厯練老成居官知無不言好薦士多至顯達徐􅀖憲字子文義烏人從陳傅良學博通史傳紹熙四年登進士第三遷秘書郎韓􅇑胄開兵端無敢議其非者􅀖憲獨首言之丐外出知處州陛辭力諫用兵不可太驟再􅀊召還上建儲之議侂胄惡其言嗾御史劾之鐫秩罷祠􅇑胄誅尚書倪思舉以自代除權工部侍郎以寶謨閣待制致仕卒諡文肅李誠之字茂卿東陽人受學吕祖謙鄉舉第一入太學舍選亦第一釋褐為饒州敎授厯知蘄州嘉定十四年金人攻淮南誠之募死士迎擊連破之金人攻益力圍城數重誠之料敵應變金人卒不得志會黄州失守併兵十餘萬來攻城陷誠之率兵巷戰子士允力戰死誠之引劍自剄妻許及婦若孫皆赴水死事聞封正節侯立廟於蘄賜名褒忠章如愚字俊卿金華人慶元進士累官國子博士出知貴州開禧初被召上疏極陳時政以忤韓􅇑胄罷歸結草堂山中與士子講學遠近師尊之曰山堂先生所著有羣書考索六十六卷范鍾字仲和蘭谿人嘉定進士理宗時厯官㕘知政事拜右丞相兼樞密院使鍾為相直清守法重惜名器清德雅量與杜範李宗勉齊名卒贈少師諡文肅所著書有禮記解胡巖起永康人嘉定進士知閩縣事卓行危論奇文瑰句士大夫皆自以為不可及在江西幕府平贛州之難全活數十萬人王埜字子文介之弟以父廕補官登嘉定進士厯樞密院編修時襄蜀事急埜上疏條陳八事繼為副都承㫖奏請出師絶和使命淮東西夾攻理宗深然之史嵩之起復埜上疏乞聽終喪拜禮部尚書奏十事前後奏陳皆明正剴切遷沿江制置使兼江東安撫使巡江創遊擊軍萬二十􅀩衝萬艘江上宴然寶祐二年僉書樞密院事與宰相不合罷卒贈特進埜工於詩書法祖唐歐陽詢有奏議文集若干卷王霆字定叟東陽人少有奇氣試不偶去就武舉嘉定四年中絶倫異等授承節郎從軍於鄂理宗即位鎮江都統趙勝辟為計議官李全攻鹽城攻海陵勝出戌揚州霆從行與賊大小十八戰無不利召試閤門舍人厯知蘄州嘗歎曰兩淮籓籬也大江門户也三輔堂奥也於是貽書丞相杜範乞瞰江審察形勢置三新城不報李大同字從仲東陽人嘉定進士厯官右正言兼侍講疏言趙冀分野乃有熒惑犯填星之變願陛下勿以小異而或加忽求必有以格天心而弭災變進兵攻討尤切謹重累進工部尚書以寶謨閣直學士知平江府提舉太平興國宫後卒於家王萬字處一浦江人嘉定進士累遷監察御史史嵩之自江上董師入相萬首論之而當時論相之事已决遂力辭乞休以太常少卿致仕卒及嵩之罷上思萬先見賜諡忠惠馬光祖字華父金華人寶慶進士累遷户部尚書兼知臨安府厯陳京師艱食和糴増價海道致冦三害為江東安撫使知建康府減租税養鰥寡􅀌疾辟召僚屬皆極一時之選咸淳中厯官知樞密院事兼叅知政事以金紫光祿大夫致仕卒諡莊敏光祖在外練兵豐財剸治浩穰風節凛然三至建康終始一紀威惠並行百廢無不修舉云何基字子㳟金華人父伯熭為臨川丞黄􅆬適知縣基遂師事焉􅆬告以必有真實心地刻苦工夫於是研精覃思平心易氣以俟其通朱子門人楊與立一見推服來學者衆基淳固篤實絶􅀋漢儒雖一本於朱子然就其言發明則精義新意愈出不窮郡守趙汝騰等相繼薦於朝皆辭景定五年特薦被命添差婺州敎授兼麗澤書院山長力辭咸淳初授史館校勘改主管西嶽廟終亦不受卒年八十一國子祭酒楊文仲請於朝諡文定所著有大學中庸大傳啟􅀩通書近思錄等發揮本朝雍正二年詔從祀孔廟王柏字會之金華人大父師愈從楊時授易父瀚及朱子吕祖謙之門柏少慕諸葛亮為人自號長嘯年踰三十始知家學之原往從何基遊授以立志居敬之㫖作敬齋箴圖郡守聘為麗澤書院師台守又聘主上蔡書院鄉之耆德皆執弟子禮栢於河圖洛書詩大學中庸有卓識獨見發先儒所未發外所著書數百卷及卒整衣冠端坐楊文仲請於朝諡曰文憲本朝雍正二年詔從祀孔廟金履祥字吉甫蘭谿人幼敏睿比長凡天文地形田乘陰陽律厯之書靡不畢究及壯知向濓洛之學事同郡王柏從登何基之門造詣益􅃉襄樊師急因進牽制擣虛之䇿請以重兵由海道直趨幽薊終莫能用德祐初以廸功郎史館編校起之辭弗就晚􅀊屏居金華山中講道著書以淑後進所著書曰通鑑前編大學章句疏義論孟集注考證書表注學者稱仁山先生元大德中卒至德中賜諡文安木朝雍正二年詔從祀孔廟陳自中蘭谿人咸淳進士厯太常寺丞元兵渡江自中以大都督府行軍司馬提兵拒守分水關食盡援絶士卒多散亡元軍帥欲降之不屈朝服南面再拜而死章堉永康人咸淳末都城失守浙東諸郡多陷時衢益二王在福州堉與弟塈捐家資募義勇兵數千收復婺城制置使李珏以其事上聞授堉知婺州塈通判衢州尋與元兵力戰於丁鼠山援絶城陷堉與塈並死唐元章字子煥蘭谿人爲文思院官與兄子良嗣守蘭谿與元兵戰於黄盆灘破之斬其將奚達魯元兵退守桐廬遂進兵扼守嚴州相持二年糧援不繼元章戰死於龍游元將索多以雙虎符金牌招良嗣不從亦戰死於仙霞嶺奚達魯􅀩古語琵琶骨也索多舊作唆都今改正徐道隆字伯謙武義人以父任入官累官潭州判官汪立信奏辟爲㕘議後㕘江陵趙孟傳軍遂爲提􅀧刑獄奉㫖措置潰卒梟其首亂者於市范文虎等俱遺書誘降道隆焚書斬使元兵至臨平臯亭山朝廷令間道入援即日乘舟出臨湖門泊宋村德祐二年追兵及道隆率三百人殊死戰矢盡槍槊折一軍盡没道隆見執與子載孫俱赴水死贈官賜諡厚卹其家元胡長孺字及仲巖起孫所學自九經諸史下逮百氏罔不包羅至元中拜集賢修撰與宰相議不合改敎授􅀭州轉寕海主簿延祐初以病不復仕隱杭之虎林山以終長孺初師青田余學古得朱子淵源為人光明俊偉誘引不倦為辭章有精魄海内來求者如購拱璧屢司文衡貴實賤華文風一變所著瓦缶編南昌集寕海漫抄顔樂齋稿行於世其從兄之綱之純皆以經術文學名人稱三胡云黄溍字晉卿義烏人延祐進士授台州寕海丞累遷秘書少監致仕未幾召除翰林直學士知制誥同修國史兼經筵帝嘉其忠陞侍講學士致仕優游田里七年卒追封江夏郡公諡文獻溍天資介特立朝無所附其學博極羣書而約之於至精剖析經史疑難及古今因革制度名物之屬多先儒所未發文辭布置謹嚴援據精切所著書有日損齋稿義烏志筆記若干卷鄭文嗣綺四世孫德珪之子累世同居凡二百四十餘年一錢尺帛無敢私至大二年旌為義門文嗣没從弟文融字大和繼主家政家庭中凛如公府每遇􅀊時文融坐堂上諸從子盛衣冠以次進拜奉觴畢皆肅容拱手趨出無敢參差者部使者余闕為書浙東第一家褒之冠昏喪葬必稽朱子家禮而行執親喪哀甚三年不御酒肉子弟從化皆孝謹有家範三卷傳於世文嗣子銘受學於呉萊婦翁張無子盡以其業􅂌銘及翁没籍所受歸於張從弟􅉗父喪慟哭三日而鬚髪盡白與揭傒斯黄溍善綜家政嚴而有恩元末兵起相戒毋犯義門柳貫字道傳浦江人器局凝定端嚴若神嘗受性理之學於金履祥必先諸躬行自幼至老好學不倦於書靡所不通作文沉鬰舂容涵肆演迤人多傳誦之始用察舉為江山敎諭仕至翰林待制與黄溍虞集揭傒斯齊名人號為儒林四傑所著有文集字系近思錄廣輯金石竹帛遺文若干卷許謙字益之金華人少􅀌甫能言庶母陶氏口授孝經論語入耳輙不忘稍長肆力於學受業金履祥之門居數年盡得其所傳之奥嘗作自省編晝之所為夜必書之於書靡不該貫延祐初居東陽八華山逺近學者翕然從之不出閣里者垂四十年時中外名臣列其行義薦於朝者前後章數十上郡復以遺逸應詔終莫能致至元三年卒嘗以白雲山人自號世稱白雲先生賜諡文懿所著有四書叢説詩名物抄書輯傳叢説治忽幾微諸書本朝雍正二年詔從祀孔廟呉萊字立夫浦江人父直方學問該博托克托從受業巴延專政直方告以大義滅親托克托乃白帝去之官集賢大學士致仕萊天資絶人七􅀊能屬文書一經目輙成誦延祐中以春秋舉上禮部不第退居深褭山中益窮諸書奥㫖柳貫每稱萊為絶世之才黄溍謂萊之文嶄絶雄深􅀋秦漢間人作後以薦調長薌書院山長未上卒門人私諡曰淵頴先生有集十二卷托克托舊作脱脱巴延舊作伯顔今俱改正呉師道字正傳蘭谿人㓜工詞章弱冠讀宋儒真德秀遺書幡然有志於為已之學質於同郡許謙由是造履益深登至治初進士第授高郵丞調寕國路錄事􅀊大饑師道賑濟有方民賴全活遷建德尹用薦召為國子助敎陞博士其為敎一本朱子之㫖而遵許衡成法六館諸生人人自以為得師以奉議大夫禮部郎中致仕終於家所著有易詩書雜記春秋胡傳附辨戰國策校注敬鄉錄及文集二十卷張樞字子長金華人㓜聰慧外家潘氏積書數萬卷樞盡取讀之既長肆筆成章頃刻數千言其為文務推明經史以扶翼敎道尤長於敘事嘗取三國時事撰漢本紀列傳附以魏呉載記為續後漢書七十三卷危素稱其立議精密朝廷取其書置宣文閣至正初托克托監修宋遼金三史辟為長史不就徴為國史編修官使强之行至杭州固辭歸陳樵字君采東陽人受經於李直方研精遺經一洗支離穿鑿之陋逾四十年入東白山太霞洞中著書其辭縱横辨博一時知名士若虞集黄溍歐陽元等皆嚮慕以為不可及所著有鹿皮子集聞人夢吉字應之金華人父詵老嘗遊王栢之門夢吉受學家庭手鈔七經傳疏閉户十年洞究奥㫖泰定中貢於鄉以薦起為校官累遷泉州敎授至正中授福建等處儒學提舉辭不上晚避地永康魁山下卒及門宋濓等私諡曰凝熙先生朱震亨字彦修義烏人師事許謙清修苦節所至人多化之尤精醫術得羅知悌之傳嘗著格致餘論本草衍義補遺丹溪心法學者稱丹溪先生王餘慶字淑善蘭谿人仕為江南行臺監察御史以儒學名重當世戴良字淑能浦江人通經史百家暨醫􅁲釋老之説初習科舉業已棄去學古文於黄潛柳貫呉萊以詩名日討論聖賢微言至正中以薦擢儒學提舉寓呉門嘗泛海抵登萊結交燕齊豪傑奮欲有為不􅀗遂元亡南還變姓名隱四明山太祖物色得之召至京師欲官之以老疾固辭忤㫖踰年􅁀卒葢自裁也良世居金華九靈山下自號九靈山人明宋濓字景濓其先潛溪人至濓遷浦江㓜英敏善記嘗從呉萊學已游柳貫黄溍之門元至正中薦授翰林編修辭不行入龍門山著書太祖取婺州召見濓復以書幣徴乃與劉基葉琛章溢同入見除江南儒學提舉兼命授太子經尋改起居注濓自命儒者首用文學受知恒侍左右備顧問充元史總裁官遷贊善大夫隨事納忠帝益重之已擢學士承㫖致仕以長孫慎􅀗罪安置茂州卒於䕫濓於學無所不通為文深醇演迤與古作者並朝廷典禮及大制作悉以委濓為開國大臣之首正德中追諡文憲仲子璲最知名善詩尤工書法王禕字子充義烏人幼敏慧長師黄溍遂以文章名世嘗遊元都陳時務七八千言宰相格不以聞乃南歸益著書名日盛太祖取婺州召見謂曰江南有二儒卿與宋濓耳為南康同知有惠政洪武元年上疏言祈天永命在忠厚寬大雷霆霜雪可暫不可常帝不能盡從也明年詔與濓為元史總裁書成擢翰林待制兼國史院編修官既平蜀命禕齎詔諭雲南至則諭梁王以禍福王未決適元嗣君遣使托克托徴餉脇王殺禕遂遇害建文中贈翰林學士諡文節正統中改諡忠文成化中命建祠雲南春秋奉祀葉儀字景翰金華人受業於許謙得聞學者以五性人倫為本變化氣質為先之説朝夕惕厲研究奥㫖已而授徒講學士爭趨之太祖克婺州召見授為諮議以老病辭太守王宗顯聘儀及宋濓為五經師尋亦辭歸隱居養親所著有南陽雜稿等集呉沉稱其理明識精一介不苟安貧樂道死而不變門人同邑何夀朋字德齡窮經守志不妄干人洪武初舉孝亷以親老辭父殁舍所居宅易地以葬學者因其自號稱曰歸全先生范祖幹字景先金華人從許謙遊得其㫖要其學以誠意為主引誘學者惟恐不入於善四方士大夫嘗詢其安否為斯文重輕太祖兵下婺州與葉儀並召祖幹持大學以進尋辟為諮議以親老辭歸李文忠守嚴州特加敬禮恒􅁛之為師性至孝父母終貧不能葬鄉里共為營辦悲號三年如一日有司以聞命表其所居曰純孝坊學者稱為純孝先生門人同邑汪興立字師道其德行與何夀朋齊名隱居敎授以高夀終陳􅋡義烏人㓜治經長通百家言既而隱居戴青霞冠被白鹿裘不復與塵事接常乘小艇吹短簫吹已扣舷而歌悠然自適自號竹溪逸民宋濓為之傳胡翰字仲申金華人從呉師道遊博習經史已從呉萊學古文復登許謙之門學益􅃉同郡黄溍柳貫見翰文稱之不容口游元都公卿交譽之或勸之仕不應既歸遭天下大亂避地南華山著書自適文章與宋濓王禕相上下太祖下金華召見授衢州敎授洪武初聘修元史書成受賚歸卜居長山之陽所著有春秋集義文曰胡仲子集詩曰長山先生集蘇伯衡字平仲金華人宋門下侍郎轍之裔也博洽羣籍為古文有聲元末貢於鄉太祖置禮賢館伯衡與焉尋用為國子學錄遷學正擢翰林編修力辭歸學士宋濓致仕太祖問誰可代者濓對曰伯衡臣鄉人學博行修文詞蔚贍有法太祖即徴之入見復以疾辭賜衣鈔而還復起處州敎授坐表箋誤下吏死士論悲之二子恬怡救父并被刑呉沉字濬仲師道子早以學行聞洪武初郡以儒士舉誤上其名曰信仲授翰林院待制沉曰名誤不更是欺罔也牒請改正帝喜曰誠慤人也遂眷遇之召侍左右論説書史累官東閣大學士編輯精誠錄書成命沉撰序尋降國子博士以老乞歸卒呉履字德基蘭谿人少從聞人夢吉學通春秋諸史李文忠鎮浙東聘為郡學正舉於朝授南康丞居六年百姓愛之遷安化知縣晉知濰州會改州為縣召還民皆涕泣奔送履遂乞骸骨歸呉文燧字用明永康人元末處州盜起掠永康文燧散家財募壯士得三千人與盜賊戰破走之三授以官皆不受太祖下婺州擢為左副元帥兼知縣事尋擢知嘉興松江民作亂諸將議屠之燧爭曰據城者賊也民何罪釋不問滿三載入朝奉詔持節諭闍婆國次興化疾卒許存仁名元以字行謙子太祖克金華訪謙後召存仁語大悦授應天府敎授仍命入傅諸子擢博士嘗問孟子何説為要存仁以行王道省刑薄賦對呉元年擢祭酒存仁出入左右垂十年自稽古禮文事至進退人材無不與論議後逮死獄中朱亷字伯清義烏人以文章知名知府王宗顯辟爲郡學師洪武三年召修元史拜翰林院編修扈駕至中都進詩上喜賜和詩陞楚王長史致仕歸亷好程朱之學編朱子語􅀋曰理學纂言王名善義烏人爲高州通判海冦何均善被戮洪武五年其黨羅予仁率衆潛入城執名善不屈死樓連字士連義烏人嘗從宋濓學洪武中厯官御史謫戌雲南建文初以文學舉入翰林官侍讀成祖命方孝孺草詔不屈死改命連連歸而邑邑其妻問之曰得無傷方先生耶連曰我固甘死正恐累汝輩耳其夕自經死龔泰字淑安義烏人洪武中以鄉薦入太學授户科給事中建文時遷都給事中燕師渡江泰與其妻訣曰國事至此吾自分死矣俄宫中火起自投城下死子永吉其母傅守志撫之成立舉鄉薦官至兵部侍郎本朝乾隆四十年賜諡忠節劉辰字伯靜金華人少􅀒氣節喜功名太祖下婺州首上謁署典籖使方國珍飾二姫以進辰叱却之李文忠開省嚴州辟至幕下建文中擢監察御史出知鎮江勤於職事修京口故閘公私便之永樂初遷江西布政司左㕘政奏蠲九郡荒田糧以數與都司按察使爭坐免歸起刑部右侍郎致仕鄭淵字仲涵綺七世孫德璋曽孫也師宋濓好洛閩之學善古文母病踰年跪進湯藥膝生胝既卒哀慟過節耳為之聵明初中外屢薦以聵辭卒宋濓諡曰貞孝子楷字叔度與方孝孺善官蜀府長史鄭濓字仲德淵從弟自七世祖綺至濓同居幾三百年世以一人主家政兄渭卒濓繼之以賦長詣京師太祖問治家長久之道對曰無忘祖訓勿聽婦言帝稱善時富家多以罪傾宗而鄭氏獨完濓卒從弟渶繼之建文帝御書孝義家三字以賜濓弟濟善屬文官春坊左庶子從弟沂自白衣擢禮部尚書鄭湜字仲持濓從弟洪武中有誣鄭氏與胡惟庸交通者吏捕之兄弟六人爭欲行湜竟往濓曰我家長當任罪於是與湜爭入獄事聞太祖慰諭之立擢湜為福建左㕘議居官有政聲居一􅀊入覲卒從弟洧字仲宗十九年濓復坐事當逮洧曰吾家以義名先世有兄弟代死者吾可不代兄死乎詣吏自誣服斬於市洧受學於宋濓有學行鄉人哀之私諡貞義處士王應浦江人祖澄字德輝慕義門鄭氏風欲學之將終集子孫誨之曰汝曹能合食同居如鄭氏吾目􅉂矣子覺承父志同居無間言洪武十四年太祖既擢用義門鄭湜因令湜舉所知以應應詔擢布政司㕘議王氏之名遂與鄭氏並王紳字仲縉禕之子禕死時鞠於兄綬事母兄盡孝道長博學受業宋濓濓器之曰吾友不亡矣蜀獻王聘紳待以客禮紳啟王往雲南求父遺骸不􅀗即死所致祭述滇南慟哭記以歸建文帝時用薦召為國子博士豫修太祖實錄獻大明鐃歌鼓吹曲十二章與方孝孺交善卒官子稌字叔豐㓜師孝孺孝孺被難與其友鄭珣輩潛收遺骸禍幾不測自是絶意仕進初紳痛父亡食不兼味稌守之不變居喪不飲酒食肉者三年門人私諡曰孝莊先生子汶成化進士授中書舍人謝病歸讀書齊山下宏治初與陳獻章同召未抵京卒楊榮湯溪人洪武間任國子監助敎靖難兵起棄官歸永樂改元有詔錄用舊臣榮不肯赴强勒至中途赴水死邵玘字以先蘭谿人永樂進士授御史巡按江西廣東福建所過人不敢犯仁宗監國知玘亷直有重獄輙付玘宣宗擢為南京左副都御史奏黜御史不職者十三人簡黜諸司庸懦不肖者八十餘人風紀大振與北臺顧佐齊名卒於官玘􅀒氣持身亷内行修潔母喪哀毁芝再產於庭朱勝字仲高湯溪人永樂舉人授刑部主事累遷郎中知武昌府未幾調蘇州府勝亷靜精敏下不能欺嘗曰吏貪吾不多受牒隷貪吾不行杖獄卒貪吾不繫囚由是公庭清肅民安而化之居七年超授江西左布政使卒於官章懋字德懋蘭谿人成化二年㑹試第一成進士選庶吉士授編修疏諫元夕張燈廷杖謫官累遷福建按察司僉事平沙尤賊滿考入求致仕既歸屏跡不入城府奉親之睱專以讀書講學為事弟子執經者嘗數十百人貧無供具惟脱粟菜羹而己四方稱為楓山先生家居二十餘年中外交薦部檄屢起之以親老辭宏治中起為南京國子監祭酒六館士翕然向風人人自以為得師武宗立陳勤聖學隆繼述謹大婚重詔令敬天戒五事俄引年乞休嘉靖改元即家進南京禮部尚書致仕卒贈太子少保諡文懿懋為學恪守先儒訓難進易退之節世尤高之盧可久字一松永康人為諸生聞王守仁倡道偕同邑程粹應典往師之比歸守仁曰吾道東矣邑有五峯書院祀守仁其中三人聚講焉其殁也鄉人即祀之書院配享守仁粹字養之典字天􅃔由進士官兵部主事家居養母不希榮利通籍三十年在官止一考杜惟熙東陽人師事盧可久其學以克已為要嘗曰學者一息不昧則萬古皆通一刻少寛即終身欠缺卒年八十餘惟熙傳同邑陳時芳陳正道時芳博覽多聞而歸於實踐􅀊貢不仕正道為建安訓導年八十餘猶徒走赴五峯講會其門人永康吕一龍言動不苟學者咸宗之殁亦祀五峯書院徐沂字希曽永康人宏治進士授刑科給事中時張鶴齡等恃恩冒廕及中官李廣矯命干政皆抗章論之改南京工科奏罷􅀊取蘇州細密苧布福建改機陜西馳絨民稱便焉陞廣東副使卒於官歸裝唯圖書而已潘希曾字仲魯金華人宏治進士改庶吉士授兵科給事中武宗初論故太監汪直養子鈺敬不宜授錦衣衞官又論災變陳八事宦官皆怒劉瑾矯詔杖之闕下斥為民瑾誅起厯工科都給事中世祖時以右僉都御史巡撫南贑討平惠州浰頭諸賊遷工部右侍郎治河自單至沛築長堤百四十里以障其衝厯兵部左右侍郎卒官希曽學於章懋言動有準繩同郡唐龍以尚書歸里出入嘗徒步或勸乘肩輿龍曰昔吾師章文懿公吾友潘司馬咸若是司馬謂希曾也陸震字汝亨蘭谿人受業章懋以學行知名登正德初進士授泰和令威惠並著徴為兵部主事在部主諸司章奏與中人忤改巡紫荆諸關又以論都御史彭澤副使胡世安無罪忤尚書王瓊陸完乞歸不得武宗復欲北出宣府震抗疏諫不報遷武選司員外郎江彬惑帝南巡震與同官黄鞏疏陳六事請斬彬以謝天下彬啣之矯詔下獄廷杖五十死方震等繫獄彬必欲致之死絶其飲食震季子體仁年十五變服為他囚親屬饋父世宗立贈震太常少卿詔録一子官諸子以母意讓體仁為漳州通判有名章拯字以道懋從子幼從懋學登宏治中進士授工部主事改刑部因忤劉瑾下詔獄謫梧州府通判瑾誅擢南京兵部郎中嘉靖中累官工部尚書桂蕚欲復海運延公卿議得失拯曰海運雖有故事風濤百倍於河且天津海口多淤自古不聞有濬海者議遂寢南北郊議起拯言不可失帝意尋落職歸久之復官致仕卒諡恭惠唐龍字虞佐蘭谿人從章懋學登正德初進士授郯城令數敗大盜劉六徴授御史出按雲南錢安義父㕘將盧和坐罪當死安屬官出和為龍所持卒正其罪再按江西三司官從宸濠叛者猶居位龍立收其印綬厯僉都御史總漕淮上兼巡撫鳳陽民甚德之累進兵部尚書總制三邊軍務奏行救荒十四事用總兵官王啟梁震數敗敵召為刑部尚書執正大猾劉東山罪大禮大獄及諸建言􅀗罪者錄上應赦百四十人率得宥乞歸養母久之復起改為吏部尚書加太子太保卒贈少師諡文襄章僑字處仁蘭谿人正德進士授行人擢禮科給事中疏劾中官蕭敬芮景賢等又言三代以下正學莫如朱熹近有倡異學者取陸九淵之簡便詆朱熹為支離不禁且為學術憂帝下詔如僑指奸人何淵請立世室僑力言其不可又請停革添設織造内臣尋請斥張璁霍韜等並不聽孝陵司香谷大用乞還京僑言大用初附逆瑾後引錢安江彬宜早遏絶厯禮科左給事中出知衡州府終福建布政使程文德字舜敷永康人初受業章懋為敦本之學後從王守仁遊登嘉靖八年進士第二授編修坐同年生楊名劾汪鋐事下詔獄謫信宜典史鋐罷厯兵部員外郎父憂廬墓側終喪不入内起郎中累擢禮部右侍郎尋調吏部改掌詹事府供事西􅁐不好為道家祝􅁵事所撰青詞有規諷帝銜之調南京工部侍郎疏勸帝享安靜和平之福帝以為謗訕除其名既歸聚徒講學卒貧不能殮萬厯間贈禮部尚書諡文恭呉百朋字惟錫義烏人嘉靖進士擢御史巡按淮揚湖廣進右僉都御史撫治鄖陽改撫南贛汀漳會師破倭海豐又擒賊余大眷等時岑岡高沙下厯三巢賊猖獗百朋命守備蔡汝蘭討擒其渠于苦竹嶂羣賊震懾厯刑部右侍郎父喪歸起改兵部閲視宣大山西三鎮考覈邊臣督撫以下陞賞黜革有差進邊圖凡關塞險隘番族部落士馬强弱亭障逺近厯厯如指掌官至刑部尚書周煥字克光浦江人嘉靖中由貢生授永福知縣倭冦攻城煥率民兵拒守月餘外援不至巷戰死之時一家死者八人王世名字時望武義人年十七父為族子俊毆死恐殘父尸不忍就理乃佯聽其輸田議和凡田所入輙易價封識購一刀銘報讐二字服闋為諸生及生子數月謂母妻曰吾已有後可以死矣一日俊自外醉歸世名迎刃擊之立斃取前所封識者詣官請死時父死已六年矣知縣欲檢其父尸以生之世名曰吾惟不忍殘父尸故至今日遂不食而死應枌字尚端永康人宏治中補弟子員師事王陽明篤行孝友設義田以賙族黨以季子典貴贈兵部主事子勲亦以孝友聞母瞽勲餂之復明均祀鄉賢盧洪春字思仁東陽人萬厯進士擢禮部祀祭司主事時帝託疾久不視朝孟春享太廟遣官以代洪春上疏切諫帝震怒廷杖六十斥為民遂廢於家光宗嗣位贈太僕少卿子懋鼎以父廕入官崇禎間備兵建昌張獻忠陷城被執不屈死之本朝乾隆四十年賜懋鼎諡烈愍徐學顏字君復永康人性孝友母疾禱於天請以身代夜夢神人授藥識其形色廣覔之得荆􅅹疾遂愈父為中城兵馬指揮忤要人下吏將至重辟學顏號泣爭於刑部至齧臂血濺於庭乃􅀗釋歸弟食指繁推所居大宅􅂌之尚義疏財為德族黨三登鄉試副榜以恩貢生特授楚王府長史崇禎十五年攝江夏縣事明年張獻忠陷武昌學顔格鬬斷左臂大罵不屈為賊支解一家二十餘人殉之贈僉事年本朝乾隆四十賜諡烈愍周鳳岐字宇和永康人萬厯進士厯官澧州㕘政張獻忠陷長沙轉攻澧州糧盡援絶城陷被執賊帥親解其縛諷之降鳳岐怒罵曰誓不與賊子同生張拳擊之賊斷其臂剖其腹而死贈都察院右副都御史本朝乾隆四十年賜諡忠節朱大典字延之金華人萬厯進士擢兵科給事中中官王體乾魏忠賢及客氏假保䕶功所廕錦衣許世襲大典抗疏力諫出為福建副使崇禎三年擢巡撫山東時冦亂據登圍萊累月不解大典集兵數萬攻之萊州圍解賊盡平進兵部右侍郎流賊陷鳳陽詔大典以總督漕運兼巡撫移鎮鳳陽屢有破賊功尋被劾罷歸福王立召為兵部左侍郎進尚書總督上江軍務大兵南下還守婺城城破闔門死之本朝乾隆四十年賜諡烈愍張國維字玉笥東陽人天啟進士授番禺知縣擢刑科給事中陳時政五事切中時弊累擢右僉都御史巡撫應天寬惠得士民心遷工部右侍郎總理河道濬諸水以通漕山東饑賑活貧民無算擊降大盜李青山進兵部尚書南都失守國維請魯王監國督師江上還守東陽知勢不可支作絶命詩三章赴水死王肇坤字亦資蘭谿人崇禎進士除刑部主事以平恕稱改御史疏陳崇政體宥詿誤廣薦舉恤民命寬物力五事詔所司議行尋奉命巡視山海居庸二關上言乞正總督陳奇瑜法警厲疆臣帝是之大兵自天夀山入闈昌平肇坤分門拒守城破身中四矢兩刃而死本朝乾隆四十年賜諡忠烈洪希懋字子修湯溪人由􅀊貢生任校官擢知江西德安縣流賊亂希懋守城拒之幾半載城陷遇害本朝乾隆四十一年入祀忠義杜學伸字適我東陽人以武功任孝陵㕘將劾内監張其藴盜伐陵木上怒遂盡撤鎮守内監宦寺等銜之於崇禎十三年歸里明亡死節於天安寺四十一年本朝乾隆賜諡節愍本朝周世榜義烏人順治三年任順昌縣典史土冦攻城佐縣令晝夜捍禦􅁍之尋復來攻城陷不屈死朱之錫字孟九義烏人順治丙戌進士選庶吉士授編修厯官兵部尚書總督河道時黄河秋決悉心防浚得免水患山東河南􅀊大飢之錫設法賑濟全活甚多在任十一年加太子太傅卒特賜祭葬瀕河之民祀之金芳義烏人官羅定州同順治十年李定國黨攻城芳設備固守城陷被執不屈賊繫守之芳知守之者其渠也紿入火藥局擲火焉芳及凶渠俱轟死又李應選永康人官濟源典史順治初流冦陷城被執脅降不從死之金漢蕙字湘隣義烏人順治間進士厯官廣西㕘議分守右江單騎之官披荆􅁄䧟撫流亡威惠大著會冦變官吏俱挈印走漢蕙獨率士民守􅀌城援絶城陷為賊所執不屈死呉尚􅉗字惟鼎浦江諸生有膽畧康熙十三年耿精忠叛尚􅉗練鄉勇為守禦計既賊大至遇於松村力戰死金光義烏人康熙十三年贊平南王尚可喜幕以籌征呉三桂可喜上其功授鴻臚寺卿銜未幾可喜子叛脅光共事不從備極酷刑光不為動囚之絶其食光曰亂臣不可為况賊子乎遂被殺詔祀賢良祠又舒學文蘭谿人康熙十三年以江西巡檢招撫賊黨遂被害贈經厯傅宏基金華人任漳州遊擊康熙十六年冦陷長泰力戰死之曹永言金華人乾隆三十六年以綏寕㕘將隨征金川陣殁楊三虎義烏人累著軍功至秦州副將康熙十八年調征四川明年從克成都得永寕鎮未幾賊來攻城陷遂死之贈左都督張宇浦江人性純孝父患癰百藥罔效宇焚香祝天親跪吮之乃愈康熙二十二年旌方應秩浦江人父大奎性嚴肅應秩先意承志曲盡心力母卒廬墓哀毁不御肉者三年後居父喪如母喪時雍正八年旌黄應律浦江人父寢疾哭求告天願以身代及殁哀毁廬墓三年母性嚴急應律曲體務得歡心迨居母喪悲哀浦江人母疾文楫患痔不能起坐跪煉藥餌以進母目失明文楫䑛之復明母殁廬墓不歸而卒乾隆三十七年旌唐宇泰蘭谿人與同縣范國􅃂唐兆昇都有泰均於乾隆年間以孝旌李正馥東陽人與同縣蔣哲呉承統金希俊均於乾隆年間以孝旌呉世昌義烏人事親盡孝乾隆三十七年旌呉時敏東陽人嘉慶年間以孝行旌流寓南北朝梁劉峻平原人遊東陽紫巖山築室居焉為山棲志其文甚美時呉㑹人士多從其學宋楊時南劍將樂人紹興間寓居金華潘良甫從之遊王師愈受論語傳楊與立字子權浦城人受業朱子之門嘗知遂昌縣因家於蘭谿以道淑人學者宗之稱為船山先生列女宋杜氏女永康人生而端麗宣和間方臘倡辭有賊叩門大言曰以女遺我否則族矣舉家驚泣女曰無恐以一女易一家奚不可賊聞之歡笑以俟女乃沐浴更衣就縊家人推户入惶遽號泣賊遂驚去章俁妻應氏永康人與其姒周氏相歡如同產方臘亂村舍咸走避應與十􅀊兒居不能去屬姒宜急避周曰生死同之何避焉未幾賊入俱罵賊死元胡履妻謝氏名黻蘭谿人元季兵亂遊騎及境氏挈㓜女入山中度不能免行至巖險處先投其女身繼之俱死賈明善妻宋氏名㜪金華人濓女弟也戊戌􅀊西兵擣蘭谿鄉民復嘯聚為亂㜪亡匿灌莾中為遊卒所執以計紿至深淵側躍入而死方仲剛妻呉氏蘭谿人元季兵亂與其夫避難聞鼓噪聲呉度不可免乃謂夫曰君冝自脱勿以妾為累夫不得已捨去遊兵追至投道旁梅塘而死明鄭洪妻石氏浦江人明初李文忠薦洪於朝官藏庫提􅀧坐法死石當發配泣曰我義門婦也可辱其身以辱其門乎不食死李淳妻盧氏永康人嫁三載而寡李宗迫其再適歸依母家弟亦迫之盧紿曰吾所以不從者夫亡未薦耳衆以為然乃潛治已衣衾喪具及期置夫神主哭祭之自縊死程浪妻朱氏永康人年十八歸程未匝月浪遊學南都遘疾亡朱誓不再適有黄某者欲求之朱泣告舅姑曰烈女不更二夫願終吾志舅姑不聽潛許黄矣朱聞沐浴更衣自縊死章孝女名銀兒蘭谿人㓜喪父獨與母居邑多火災室盡燬結茅以棲母母方疾隣居又火衆呼令疾避銀兒曰母疾不能動何可獨避亟欲扶母出烈焰忽覆其屋終莫能救火光中遥見銀兒抱其母宛轉同焚死時宏治元年三月也袁堅妻方氏金華人堅嗜酒敗家死殯于城北濠上方貧無所依乃即殯處置棺寢處其中久之不出死郡守劉蒞為封土祭之胡旵妻汪氏蘭谿人嫁未幾旵亡旵弟昉逼汪再嫁不聽乃私受人聘財汪心覺更飾衣服若願嫁狀衆不為備因逸出溺萬安橋下死焉包姜姑蘭谿人父湘少許字朱楫家甚貧族叔欽武斷一鄉知富賈范某有瞷女意遂揚言湘先受范聘訟於官湘與楫俱懦不能自明女聞而號曰官能拆我婚能拆我心乎自縊死王世名妻俞氏武義人世名為父報讐死俞欲殉夫念􅀌㓜乃乳其􅀌於柩側及三年兒能食自縊以殉旌其門曰孝烈張應華妻陳氏浦江人嫁甫一年應華從軍戰亡陳屢闔門自縊小姑同處屢解之服除父母私與舅姑議更嫁及娶者舁與至陳潛出投池死池素濁後水為之清許伸妻葉氏蘭谿人伸家素饒於財以不儉蕩且盡㩦妻投所親卒於通州氏守尸晝夜哭或遺之食或餽金或勸改嫁俱却不應水漿不入口者十四日竟死尸旁年二十餘州人為買棺合葬劉志浩妻華氏蘭谿人年十七歸浩再期浩卒遺􅀌甫週􅀊華甘貧勵節鄰家利富室之賄者為媒娶華先白之舅姑不可繼使伯妾甘言勸華華痛恨嚼舌死楊烈女義烏人少許字胡恩未婚而恩死訃聞號慟矢不再適其父尋受葉姓聘將改醮焉女號哭三日遂自經死唐貞女蘭谿人許聘鄭時敞未婚時敞殁會有議婚者女憤鬰不食死臨死時先起易鞋蓋聞夫殁而即製者舅姑傷其志合葬焉孫廷佐妻潘氏浦江人嫁逾年廷佐病劇謂曰吾死奈爾年少何潘立誓從死削竹牌數寸刻死節二字佩之夫亡執喪三年終父欲奪其志遂自縊方滿妻徐氏蘭谿人年十八于歸數年滿患惡疾謀令改適婦覺詰之曰而欲賣我盍留我紡績以自給必我棄有死而已乃止越五載夫亡舅姑又謀嫁之徐見父母訣别一夕自縊潘士桂妻童氏蘭谿人奉姑以孝聞年二十四會亂兵經其地童扶姑逃至白蓮塘為兵所􅀗脇使上馬大罵兵仍挾之行至水邊遂投水涸不能没兵拽之出罵益厲遂遇害楊國瑞妻徐氏武義人年十九夫亡遺腹產一女繼母欲奪其志徐翦髪毁容以死拒之會冦亂居民多挈家逃避徐聞之曰未亡人待死之日久矣今豈能更偷生乎遂自縊死章宜賓妻范氏蘭谿人未婚宜賓得痿疾形如嬰孩父母欲别圖嫁范知之佯曰乞與姑一面再議未晚也至章家遂不返越十年宜賓始逝撫姪為嗣年八十五卒王忭妻陳氏金華人明末攜七􅀊􅀌姪避兵南山道遇兵欲逼之陳紿之曰乞放􅀌兒還家吾當從兵如其言陳即赴水死後忭蹤跡得尸衣帶重結腰繫其夫平日所用詩箑為識時年甫二十趙世對妻余氏蘭谿人明季兵漬肆掠余㩦媳諸葛氏與女螽奔蹶折右肱媳灑血别夫螽年未筓亦誓與同死且相謂曰事急矣稍緩即欲求死不可三人遂密縫其衣並自縊戴貞妹金華人戴嘉茂女㓜許王畿華畿華痘殤貞妹自製衰服跪告父母往奠誓不再嫁舅姑屢勸改配次子悲泣不從自刎死陳所思妻戴氏金華人貞妹之女弟從夫避兵售溪山兵抵郡舉家被執戴於袖中自出利剪刺喉而死其將義之釋其夫與子本朝馮士身妻劉氏義烏人順治二年方國安兵肆掠挾氏登騎氏以頭觸石兵抱之口斷兵指兵怒奮刀亂砍剖其尸嚴仲春妻王氏金華人年未二十方國安敗兵挾之上馬氏躍馬投塘而死同縣倪星焜妻朱氏自縊死倪明廷妻徐氏觸岩死朱廷翼妻方氏奪刀自殺索大機妻章氏投水死黄啟賢妻邵氏亦不辱死人湯溪鄭宗元妻祝氏夫婦避難遇賊於邵家源氏即投岩下潭夫亟救之相抱而死葉氏二節蘭谿人葉鍾芝妻趙氏其弟鍾藻妻徐氏馬士英潰兵剽掠二氏並為所􅀗奮呼曰殺我我不去共跳入荷花塘中兵怒以槍亂刺之死順治年間旌張武慇妻蔣氏東陽人順治三年亂兵入其家欲汚之氏躍入門前塘水死又同縣周汝桂妻徐氏張文泰妻馬氏為所掠俱躍入水中死又武義蔣文逵妻翁氏亦赴水不汚死又東陽倪良洶妻陳氏投西湖潭中死樓氏六節東陽人順治四年土冦掠三都和堂樓氏婦女全節死者六人曰王氏廷策妻曰陳氏賢村妻曰