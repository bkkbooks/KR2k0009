慶元六年大旱詔求直言夏時知贛州興國縣上封事召為太學博士柴中行餘干人紹興進士寕宗時知贛州治盜有方境内清肅陳孔碩侯官人嘉定中知贛州豪家沿江作碓以射利水益湍急常壞舟楫孔碩盡去之患乃息子韡端平初復知贛州進江西安撫使破松梓山焚其巢賊首就擒楊大異醴陵人為安遠尉邑有峒㓂擾民官兵致討積年弗􅀗檄大異往治之大異以一僕負告身自隋肩輿入賊峒諭以禍福皆伏地叩頭願改過自新留告身為質偕其渠魁數輩出降羅必元進賢人淳祐中通判贛州賈似道總領京湖尅剥至甚必元上疏以為蠧國脈傷民命似道銜之改知汀州何時樂安人咸淳中知興國縣建安湖書院日課諸生風敎大行文天祥廬陵人寶祐四年舉進士第一咸淳十年知贛州徳祐初江上報急詔天下勤王天祥捧詔涕泣使陳繼周發郡中豪傑并結溪峒蠻使方興召吉州兵諸豪傑皆應有衆萬人元楊景行泰和人延祐中授會昌州判官民素不知井飲汲於河流故多疾癘不知陶瓦以茅覆屋故多火災景行敎民穿井以飲陶瓦以代茅茨始免於疾癘火災豪民十人號十虎干政害民悉捕置之法乃創學舎禮師儒勸民斥腴田以膳士􅃶誦之聲遂盛陳泰茶陵人延祐中為龍南尹石背峒賊掠境泰率兵與戰於犁鼻山敗績死之全布延薩里高昌人為贛州路達嚕噶齊發摘奸惡一郡肅然至正十一年盜起即修城壘備守禦募兵三千人日練習之屬邑有為賊所䧟者輒遣兵復之境内悉安以功拜江西行省參政分省於贛陳友諒既據下流諸郡遣其將幸文才率兵圍贛使人脅之降斬其使力戰凡四月兵少食盡有義兵萬户欲舉城降賊不從遂自剄全布延薩里舊作全普庵撒里達嚕噶齊舊作達嚕花赤今俱改正哈克齊至正中為贛州路總管守贛有功城䧟之日賊將脅之使降哈克齊謂賊將曰與汝戰者我也爾賊毋殺贛民當速殺我耳遂見殺哈克齊舊作哈海赤今改正李亷安福人至正中知信豐紅巾賊起亷率民兵力戰亡於陣其子敬嗣為縣尹誓復父仇數與賊戰亦死之民為立雙節祠明崔天錫贊皇人洪武初取贛州即以天錫知贛州兵燹後版籍蕩然原額糧五千七百石有竒至是失額公私交病天錫令民具實自陳復按行封畛度田廣狹肥瘠率三十而税一久之復業輸糧如初宋濓浦江人洪武四年謫知安遠縣旋召為禮部主事唐子儀歙縣人洪武末以文學徴授興國知縣敎民務農常出郊躬勸勞之造士日有程課寒暑不輟擢趙王府紀善許庸廣東石城人永樂初知會昌縣性敏決庭無滯訟毎遇興作貧者驗丁役力富者量財供費民樂趨事積年逃卒皆聞風自歸李素蒼梧人宣徳初知贛縣邑之橋梁學舎皆其創修秩滿民請留踰十五年始以􅁨去王學古交阯人正統四年知信豐縣以亷介稱撫定石背峒賊列為編户巡撫楊彦謐奏其功復任九載乃致仕張勝麻城人天順中為雩都典史長河峒賊竊發勝率民兵禦之賊圍急援兵不至皆死於陣中姜漣蘭谿人成化七年知贛州府繕城隍改建郡縣學植良翦惡治行為江右第一李璡懐寕人成化中知贛州府郡遭大水繼以疫璡竭力賑濟全活甚衆閩廣流寇犯境率民兵連擊敗之王廷珪彬州人成化中官贛州同知流寇犯境率民兵奮戰援絶力屈死之卹恩晉四品階䕃一子入監讀書朱諌樂清人宏治進士正徳中知贛州府大帽山延袤閩廣千餘里内皆谿谷賊憑要害時出為患諫率兵厯盤龍嶺諸寨殱其魁俘數千人餘衆悉降乃散置安遠龍南諸境給之牛糧盡為良民邢珣當塗人宏治進士正徳中知贛州府招降劇盜滿總等給田廬撫之甚厚後討他盜多藉其力王守仁征横水桶岡珣常為軍鋒功最増二秩宸濠反以重賞誘滿總總執其使送珣遂從珣共平宸濠遷江西右參政著有章貢雜稿徐珪應城人正徳中厯贛州通判招降盜魁何積玉己復叛下珪獄尋釋之後以平盜功擢知州李鳳朝貴州人嘉靖中為信豐主簿三巢賊賴清規等掠城下鳳朝督兵出戰屢破之追入青村谷賊據山逆戰鳳朝奮力先登為賊所害數日得其屍顔色不變李多祚石首人嘉靖末知安遠縣三巢賊亂大石小石伯洪三堡俱被脅從多祚率民禦之與賊戰於下厯斬首千計寇平多方撫循流亡者皆復業陳瀾麗水人嘉靖末知信豐縣下厯之役督撫移鎮信豐官兵四集瀾區畫軍資上無廢事下不病民剏立定南縣以勤瘁卒於官海瑞瓊山人嘉靖末知興國縣値辛酉亂後户口多逋亡瑞勞來安集條上八議豁免浮糧民徳之葉夢熊歸善人嘉靖進士萬厯初由户部郎中知贛州府平黄鄉賊遷浙江副使後累官至兵部尚書沈振龍秀水人萬厯進士天啟二年守贛州閩寇適發振龍立里甲部伍約勒寇不敢至避難者麕集軍士輒縛上幕府指之為寇振龍按其妄多所開釋忤上官意以軼盜劾罷贛人懷之王六如黄岡人崇禎舉人知信豐縣時寇盜蜂起兵役數發輒檄縣中富户充之咸至破産六如照糧編派􅃛者不得規避倉庫本吏胥所司反外僉里民六如釐正之永以為式邑人祠祀之彭期生海鹽人明末為贛州兵備副使招降峒寇張安等大兵攻贛州期生與楊廷麟等悉力拒守城破冠帶自經死時同死於贛者大學士楊廷麟總督萬元吉總理郭維經給事中楊文薦御史姚奇允等数人本朝乾隆四十一年賜期生奇允諡節愍廷麟元吉文薦諡忠節維經諡忠烈本朝曹廷偉陵州人順治初知定南縣金聲桓兵至竭力捍禦不屈死子翰明際盛從子翊明僕曹伏新凡十一人皆遇害賊平贈江西按察使僉事予祭葬􅄻一子入監郭自修絳縣人順治初知安遠縣調石城土㓂陷城罵賊遇害蘇峻大順天人以貢任贛州推官順治五年雩都賊曽斌羅聚奎等嘯聚禾豐山虔撫劉武元發兵􅁹之偵者訛聞城中民與賊通諸將議先屠城而後擊賊峻大時以他事過雩都稔知民無反狀疾驅至郡見武元力言之乃遣飛騎止諸將移兵獨􅁹禾豐民慶更生為祠以祀吉永迪陜西人順治七年以進士知信豐時安逺含砂賊乘虛刼城永迪偵知之乃夜伏兵於龍頭逕賊至大敗之已復奉檄討黃石砦永迪趫勇絶人嫻兵畧數以討賊自效所至有功蔡國相仁和人順治八年任定南典史九年十月廣賊數萬乘夜􅊳至國相率兵力戰殺賊數十衆寡不敵為所擒猶徒手搏賊而死郎永清奉天鑲黃旗人順治十年知贛州府贛自丙戌城破復連嵗用兵閩廣民多轉徙永清勤招徠嚴約束復業者日衆大兵之討李定國郝尚九也道經贛飼馬以行永清預度城南演武塲為營柵芻糧畢備而自往萬安迎大帥陳説郡當新定不宜騒動之故帥感其言下令不許一兵入城瑞金石城被寇害最甚為民營室廬􅄟胔骼嵗洊饑發粟往賑贛諸生王曰旦為盜所引不勝刑誣服永清廉其枉出之又雪興國民廖安民之獄在官四年以兄子廷佐巡撫江西引嫌去贛人立祠祀之黃里湖廣人順治十二年以舉人知贛縣請免荒糧一萬三千缺丁八千七百留給贛鎮兵米抵作贛漕至今兵民食其徳井廞文安人康熙七年由進士知長寕蒞治精察壬子閩寇入境廞調選鄉勇委典史鄭之鵬㑹􅁹大破賊於牛門山郭毓秀陜西人以舉人知贛縣康熙十三年逆藩叛於閩粤大兵出入多道贛有蜚語謂玉田村民通逆主兵者謀殱之毓秀力白其井里自保不得以大逆誣之馳入村毁其壘培而供輸芻糗倍於他所謀遂寢後以戇樸忤上官去至今人述其事猶有墮淚者賈程誼上蔡人順治七年由進士知龍南縣時當殘破之後城垣頽圯民皆散處村落程誼至勞來安集之建譙樓􅆆䕃城造木栅以固防禦凡衙署學宫神廟次第聿新不費公帑不斂民財治民以公明忠厚爲本月一課士躬詣文塲諄諄訓迪卒後民置主祀之龔遂豐城人順治十年任龍南敎諭志趣卓􅕸每月課士以道義相砥礪多士懷之馬鎮臨海人康熙九年知龍南縣丙辰夏劇賊楊鎮􅀖圍縣城時城中戰守之具倉卒未備鎮與舉人徐士孜等設法守城城賴以全後賊屢入縣境見守備甚嚴不敢窺卒後士民立主祀之鄭世逢錢塘人康熙二十七年知龍南縣秉性慈愛敎養實心創立龍城書院親課諸生築楊陂隄灌民田甲申大水發常平減糶以賑饑民得安全馬雲冲奉天人康熙三十二年以瑞州同知攝龍南縣􅂐性耿介雅意作人持政簡肅杜絶賄賂片言折獄民不忍欺去之日兩袖清風士民歌思不置人物南北朝宋鄧徳明郡人元嘉末就豫章雷次宗學博物洽聞該綜今古嘗作南康郡記此􅀖文獻以徳明為冠唐鍾紹京虔州贛人初為司農録事以善書􅀡鳳閣景龍中為宫苑總監㑹韋氏難紹京率户奴丁夫從事平拜中書侍郎進中書令越國公以罪貶後遷少詹事卒紹京嗜書畫如王羲之獻之禇遂良真迹藏家者至數十百卷謝俊贛人以孝聞五代梁盧光稠贛人光啟元年南方盗起州人譚全播與衆推光稠為刺史據虔州天復二年出兵陷嶺南之韶州梁初江南嶺表悉為楊吳及南漢分據光稠獨以虔韶請命京師通道輸貢遂以為百勝軍防禦兼五嶺開通使開平三年卒宋陳炳贛人結廬崆峒山中躬耕樂道勤於著述包拯知瑞州道過虔師事之鍾伷龍南人紹京之後元豐進士厯知潯州陽山考課為天下第一除廣西轉運使以平蠻功進龍圖閣學士陽孝本贛人學博行高隱於城西通天巖蘇頌蒲宗孟皆以山林特起薦之蘇軾自海外歸過而愛焉號之曰玉巖居士隱遯二十年一時名士多從之㳺崇寕中舉八行為國子録轉博士以􅀡秘閣歸李朴興國人紹聖進士厯西京國子敎授程頤獨器許之移䖍州敎授以嘗言隆祐太后不當廢處瑶華宫忌者欲擠之死朴泰然無懼色徽宗即位陳瓘薦朴召對首言熙寕元豐以來政體屢變大臣互相排擊失今不治不可勝救人言士大夫之學不求諸已而惟王氏是聽敗壞心術莫大於此蔡京惡之復以為虔州敎授又罷為四㑹令髙宗初除秘書監未至卒朴自為小官天下髙其名蔡京將強致之力拒不見中書侍郎馮熙載欲邂逅見朴朴笑曰不能見蔡京安能邂逅馮熙載居官所至有聲有章貢集二十卷曽開其先贛州人徙河南府崇寕進士建炎中厯禮部侍郎時秦檜主和議開當草國書辨體制非是論之不聽遂請罷檜慰以温言開引古誼折又上疏力爭由是罷知徽州以病免閒居十餘年卒檜死始復待制開孝友厚族信於朋友從游酢學與劉安世交故立朝遇事臨大節而不可奪曽幾開弟幼有識度事親孝初授校書郎林靈素得幸朝士爭趨之幾不往髙宗即位厯浙江提刑㑹兄開與秦檜力爭和議檜怒開去幾亦罷僑居上饒七年檜死起知台州召對授秘書少監幾承平時己厯館職去三十八年而復至鬚􅁂皓白衣冠偉然薦紳推重焉詔修仁宗寶訓書成權禮部侍郎屢有建白孝宗初致仕卒諡文清幾嘗從劉安世談經論事又從胡安國游其學益粹為文純正雅健詩尤工有經説二十卷文集三十卷王質興國人其先鄆州籍博通經史善屬文游太學與九江王阮齊名著論五十篇言厯代君臣治亂謂之樸論中紹興三十年進士為太學正忌者讒其年少好異論遂罷去虞兀文宣撫川陜辟質偕行令草檄契丹文援毫立就允文執其手曰天才也入為敕令所刪定官遷樞密院編修允文當國孝宗命擬諫官以質鲠亮不囘且文學推重於時可右正言時中貴多畏憚質隂沮之出通判荆南改吉州皆不行奉祠山居陳子敬贛州人以貲雄鄉里嘗從文天祥游天祥建閫汀州子敬募集民兵屯皂口據下流及天祥攻贛子敬與合謀忠效甚著空坑兵敗復聚兵屯黃塘砦連結山砦不降元軍以重兵襲其砦砦潰子敬不知所終元鍾柔龍南人篤學融貫經史下筆千言署廣東雷州學正辭歸講授從者數百人咸悦服稱曰一峰先生所著有諸經纂説易詩書衍義敝帚集數千卷明劉承􅀡贛縣人為國子司業官至浙江僉事王禕論其詩尤工選體出入鮑謝之間吕復興國人洪武􅀄以文學徵為國子典膳時修元史命復乘傳至北平采錄史事遷太常典簿厯太常丞李旭贛縣人永樂中由太學生擢監察御史糾彈不避權要法曹有疑獄輒以委之多所平反扈從北京一切創始規制皆令旭勘覆厯升湖廣左布政使陳勉雩都人永樂進士除御史出為廣東副使仁宗初用薦擢左副都御史宣徳間坐失出下詔獄得釋信豐諸縣盗起命勉撫之招徠三千六百餘人亂遂定正統中厯兩京大理寺卿景泰初進南京右都御史掌院事致仕卒勉外和内剛精法律吏不敢欺袁慶祥雩都人國子生以久次厯事内承運庫見憲宗任宦官用財無度帑藏虚耗而進寶石掇高價者月無虚日乃上章極言其弊忤㫖杖五十遣歸國學後二年舉進士仕至廣東僉事所著有松崖集何廷仁雩都人初慕陳獻章後師事王守仁嘉靖元年舉於鄉復從守仁浙東守仁令之引掖後進詞意懇款立論尚平實除新會知縣士民愛之遷南京工部主事分司儀真􅅦蕪湖税不私一錢考滿即致仕學者稱善山先生黃宏綱雩都人謁王守仁於贛州守仁日治軍事四方從遊者踵至遣高第弟子先開誘之而後與講授宏綱其一也守仁卒始登鄉舉官至刑部主事守仁之門從逰數百善推演師説者稱宏綱及何廷仁錢徳洪王畿時人語曰江有何黄浙有錢王學者稱洛村先生雷濟蕭庾皆贛縣人王守仁鎮虔知二人有識畧置之幕下宸濠反二人為守仁詐為兵檄以撓其進止又為偽書反間離散賊之黨與出入賊壘不顧生死事平功冊俱被忌者削去未幾庾死守仁親為文祭之濟後官四川龍州宣撫司經厯李淶雩都人隆慶進士拜户科給事中張居正父喪奪情已又充大婚冊使淶疏言此大典不宜以新喪將事居正怒出為山東僉事累遷右副都御史巡撫江南致仕歸劉思誨贛縣人萬厯進士授臨淮知縣居六年治行為天下第一擢御史遷大理丞魏忠賢擅政思誨謂中㫖頻宣非所以安元輔請以票擬屬閣臣疏入貶三秩出外歐于復會昌人萬厯間以孝稱盧觀象贛縣人萬厯中授河間府通判天啟元年上屯政條議升河間府屯田同知左光斗巡撫南畿議復汪應蛟所創屯政論者以濱海斥鹵旱澇不時勞不償費觀象力贊之條陳九議張慎言代為巡撫嘉其才力薦之値璫勢熾告歸後起為員外郎崇禎甲申之變死之本朝乾隆四十一年賜諡節愍本朝易學實雩都人㓜頴悟好學與瑞金楊以任贛縣劉日佺等友善奉母入山杜門三十年所著有犀厓文集雲湖詩集朱家垣長寕人順治四年縣初平城以外猶多負固縣令申請委用營官家垣暨張世祥廖宗旺並以血戰全城俱入祀鄉賢祠凌日章長寕諸生因粤寇馬劉沈攻城岡日章率鄉勇禦之賊大至奮勇格鬬殁於陣入祀鄉賢祠潘吉長寕人因粤寇周海元潛入寒地山吉夜襲之斬賊奪旗厯有功績入祀鄉賢祠范洵長寕人三藩叛時寇盜蜂起洵散財倡衆身當賊鋒大小十餘戰㓂不敢逼敘功授守備丁巳叛民黎繁祉布散偽劄洵密令族弟范崇約偽往領劄賺􅀗實據呈官同兵星夜擒殺之邑賴以安入祀鄉賢祠吳孔興長寕人素嫻兵略三藩叛隨澄海鎮將招撫萬安諸寇孔興率數騎達賊營諭以順逆偽參將鍾子龍等率衆五千降功未土卒入祀鄉賢祠胡大鵬長寕恩貢七嵗能文試輒冠軍遠近就學者雲集其授徒以酒養氣識為先士習丕變著有養氣十則入祀鄉賢祠曹世治長寕歳貢績學有智略奸民曹子布作亂世治設䇿誘殱有定變功同縣羅肇楨素敦大義當曹子布倡亂時責以叛逆竟被殺事聞旌以大節可風又范魏卿范勳余國祥劉鴻珏俱率鄉勇出死力與賊搏戰賊黨遂殱有血戰功俱入祀鄉賢祠王鼎相興國恩貢世受易潛心體玩博綜史事著易經集􅄙史斷性至孝一夕寇至人皆登樓避之鼎相獨掖老母適以救免母殁厝葬處去寇尤近伏柩側哀號不去㓂相戒不犯父嘗藏千金地穴中為鄰所􅗎攫之去知而不言入祀鄉賢祠文伯達㑹昌人博窺羣籍以明經厯官南京工部郎中告歸未嘗一日廢學設義館教鄉黨子弟親引掖之入祀鄉賢祠李標英安遠人性至孝明季山寇竊發負母匿深林中為賊所􅀗標英願以身代母賊叩其里居姓氏勿諱賊相戒曰此人孝而義勿入其鄉生平慷慨樂施多所賑䘏入祀鄉賢祠鍾元􅉗安遠人博學強記積書萬卷築石湖草堂泉石幽􅃉著有易經統約石湖詩文集入祀鄉賢祠杜欽駕安逺人仕建陽縣丞告歸尊賢好士施衣煮粥樂善濟貧邑令于作霖旌以恭惠入祀鄉賢祠譚聖誥贛縣人孝行著聞乾隆元年旌同縣章齊純雩都朱士昻興國吕朝勳王可俊長寕職監曽應運均乾隆年間旌宗超海贛縣人知湖北竹谿縣嘉慶七年入祀湖北名宦流寓宋楊方長汀人官校書郎時禁僞學坐諸子黨罷僑居贛州閉户讀書自號澹軒列女元陳有諒妻信豐人失其姓紅巾賊起有諒與女被執欲汚之不從皆被殺明蔡氏女名已貞㑹昌人宏治十七年賊起女年十六義不受汚賊支􅄙之陳雁妻周氏興國人正徳五年流寇破城周被掠不從乗間自刎郭某妻高氏安逺人嘉靖中爲流寇所執投深潭死寇退家人求之從石巖浮出顔色如生藍鳯晹妻羅氏㑹昌人年十八夫亡守節有勢家謀強娶之赴水死同縣劉沂妻周氏年二十守節嘉靖中為山寇所􅀗不受辱赴水死劉潛妻胡氏㑹昌人年十九夫亡無子家人欲奪其志胡曰彼不過欲得吾夫産業耳遂悉與之止留一老婢自供日閉門紡績雖至戚卑幼不輕見也後旌表賜粟帛謝碧妻羅氏定南人嘉靖中岑岡賊李鑑圍丁坊碧被殺擄羅入巢羅見夫死披髮跣足痛􅂘絶食鑑令妾女