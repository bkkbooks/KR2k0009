body:
  text: 贛州府二古蹟贛縣故城在今贛縣西南漢縣也寰宇記漢高六年使灌嬰畧定江南始為贛縣立城以防趙佗今州西南益漿溪故城是也東晉永和五年太守高珪置郡城於章貢二水間義熙七年徙於贛水東梁承聖元年復移於章貢間即今城是也又贛縣晉太康末洪水横流忽有大鼓隨波而下入葛姥故城衆力齊曳不動卜於其地置縣吉遂徙以就焉宋昇明初移置贛水東三百步梁承聖初又遷贛水南唐貞觀中徙於今治雩都故城有二一在今雩都縣東北漢縣也一在今縣東南唐初所遷寰宇記雩都即漢高帝六年使灌嬰防趙佗所立縣也在郡城東四里地名東溪陳永定初遷於大昌村隋大業中復還故郡城唐武徳初又移歸大昌村貞觀中暴水為患安撫大使任懷玉奏請置於南康古郡即今縣城也縣志漢縣治曰古田坪在今縣東北東溪水梁大同中於今縣七十里安遠水南置安遠縣隋開皇中廢貞元四年刺史路應重奏分雩都縣地置按寰宇記云建中三年刺史路應奏請析雩都三鄉並信豐一里再置與元和志不同今考新舊唐書皆作貞元四年路應為刺史亦在貞元初寰宇記誤又齊書州郡志虔化下云永明八年罷安遠縣并此則齊初所置尋并入虔化者其地在今寕都界中與梁所置非一處也葛姥城在贛縣寰宇記􅁑姥祠在贛縣東北五里輿地志云葛姥者漢末避黃巾賊出自交阯資財巨萬童僕數千於此築城為家没後有靈異人立祠祈禱晉太康末徙縣於此瀲江鎮今興國縣治寰宇記太平興國中析贛縣七鄉於瀲江鎮置興國縣以年號為名九域志縣在䖍州東二百四十里九洲鎮今㑹昌縣治寰宇記太平興國中析雩都縣六鄉於九洲鎮置㑹昌縣九域志縣在虔州東四百里蓮塘鎮今定南廰治本龍南縣地明嘉靖三十六年龍南民賴清規據下厯堡以叛合岑崗高砂汶龍諸巢賊出刼四十五年巡撫吳百朋討平之隆慶三年割龍南縣之高砂下厯横江三堡安逺縣之大石小石伯洪三堡信豐縣之潭慶堡置縣曰定南治高砂堡之蓮塘鎮即今廳也百丈戍今龍南縣治唐書地理志虔州有百丈戍寰宇記龍南縣本信豐縣地偽呉武義中析信豐順仁鄉之新興一里為塲壬子歲偽唐改為縣宋史地理志贛州龍南南唐縣本名龍南宣和三年改虔南紹興二十三年改龍南取百丈龍灘之南為義舊志龍南縣即古百丈戍銀塲九域志贛縣有蛤湖銀塲又雩都有天井錫塲㑹昌有援溪錫塲虔化有寶積鉛塲舊志雩都縣舊有銀塲在縣東北智義鄉佛婆里今縣東北七十里有銀坑舖蓋亦以銀塲得名勤王壘在興國縣衣錦郷宋文天祥勤王駐兵之壘累石為墉三層其隘上署都督行府額基址尚存翠玉樓在府治後宋郡守留正建取蘇軾詩山為翠浪湧水作玉虹流之句為名白鵲樓在府治東北八境臺北又城東南有皂葢樓蘇軾皆有詩奎文閣在舊府學内宋建以藏高宗御書名御書閣元改名愛蓮堂在府治前臨方池宋通守羅愿建取周濓溪愛蓮之意為名清獻堂在府治内明洪武初建宋趙抃嘗守虔州故取其諡以名議道堂在舊府學内宋紹聖中提㸃刑獄程筠建左為松軒右為竹軒李朴為記塵外亭在贛縣龔公山頂形勢最高城郭山川一覽無遺蘇軾有詩鬱􅀌臺在府治西南即賀蘭山隆阜鬱然孤起故名唐郡守李勉登臨北望改名望闕宋郡守曾慥増築二臺南為鬱孤北為望闕趙抃蘇軾皆有詩今縣學在其下章貢臺在府冶西北宋郡守趙抃建據章貢二水之會憑高眺逺城北水光山色盡出乎几席履舄之間形勝與􅓹孤對峙稱雄抃自為記八境臺在府東北城上蘇軾䖍州八境詩圖引南康八境圖者太守孔君改作石城即其城上樓觀臺榭之所見而作是圖也東望七閩南望五嶺覽羣山之參差俯章貢之奔流雲煙出没草木繁麗蘇子乃作詩八章題其上按孔宗翰作八境圖未嘗專以名臺此後人所為明統志載八境臺而引蘇軾鬱􅀌臺詩亦誤鳳凰臺在府城東隅􅀛岡萬壑臺在安遠縣治内唐貞元中郡守路應建律田館在信豐縣東八十里又利見館鳳林館俱在縣東九十里新陂館在縣南八十里俱宋建久廢黄田務在信豐縣西南一百六十里宋建統制石在興國縣太平鄉宋末統制鞏信從文天祥勤王元帥李恒追至方石嶺將及信以短兵接戰元兵疑有伏不敢進信坐巨石箭􅀨集被體屹然不動至死不僵後人呼為統制石至今行旅過其下必式石塔在信豐縣治北明統志塔高九層而無影影見則災至石􅀛在興國縣儒林鄉明統志石圓如􅀛項背俱備彷彿八卦形象逐月隨斗杓旋轉土人疑其怪移置他所翌日復歸其處累驗皆然因時祀之銅鐘在興國縣大乘寺明統志唐末鑄宋紹興初一夕忽失之未幾有客言比者文潭漁者得一鐘鬻於天寶寺扣之無聲僧詣天寶寺物色得之贖之不許乃相約曰扣之不鳴即非寺中物扣之鳴即寺中物也天寶僧屢擊無聲大乘僧一擊即鳴遂載以歸至今尚存關隘贛關在贛縣北東西兩橋章貢㑹流處明宏治中設税塲於南安折梅亭正徳六年置關於此以􅅦商税本朝毎年遣部員督收雍正元年改令巡撫委官管理下窑隘在贛縣南相近為文灘隘路出信豐又兜坑隘在縣西路出南康廟前隘在縣西北路出龍泉婆婆隘在縣北路出萬安哀屋嶺隘在縣東北路出興國磜下隘在雩都縣西北三十五里接贛縣界又有龍潭馬嶺峽口牛嶺等五隘俱在縣西南與㑹昌信豐贛縣安遠相通又葛㘭隘在縣東北九十里佛嶺隘在縣東左坑豐田二隘在縣東南銀坑隘在縣東北諸隘皆稱峭險而豐田左坑牛嶺三隘尤最要石口隘在信豐縣東相近有鴉鵲隘俱通㑹昌安逺二縣又竹篙隘平岡隘陂頭隘俱在縣南一百里路通龍南楊梅隘九里隘俱在縣西八十餘里路通廣東南雄州及大庾縣南大方隘在信