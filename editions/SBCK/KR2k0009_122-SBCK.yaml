領所部馳七日抵贛圍其城踰月朝廷命李耕以諸路兵破之累功封武功縣男除破敵都統制孝宗時戍高郵兼知軍事與金人戰射陽湖敗之追至沛城復敗之召爲左騎䘙上將軍移守楚州復爲江西路總管厯光州觀察使卒陳繼周寕都人淳祐三年貢於鄉咸淳十年詔徴勤王文天祥方守贛與計方畧遂留幕中晝夜調度繼周雖弱不勝衣而年德服人差充江浙置制司主管機宜以所部夜襲元兵於南柵門殺傷相當質明猶戰力竭赴水死曾逢龍寕都人開慶進士景炎初元吕師䕫攻廣州通判李性道以城降制置使趙溍舉逄龍為韶州判將兵與熊飛合攻廣州殺性道師䕫復破南雄溍遣逢龍往救力戰敗績死之尹玉寕都人以捕盗功為贛州三砦巡檢秩滿從文天祥勤王及天祥至平江調玉同淮將張全拒元兵戰於伍牧全敗先遁玉手殺數十人箭集於胄如蝟援絶力屈被執元兵横四鎗於其項以梃擊之死餘兵猶夜戰殺人馬蔽田間無一降者贈濠州團練使元廖人俊寕都人父死於寇母被掠人俊方七􅀊獨與祖母陳居既長誓求父骨得於叢塚間又聞母在滄州徒步往求則已殁祖母孀居七十一年壽九十九人俊事之以孝聞吴澄有文記其事蕭士贇寕都人篤學工詩尤愛李白詩為􅀘注行於世有氷崖集明董越寕都人少􅀌貧奉母孝成化五年授編修孝宗即位遷右庶子使朝鮮多所撰述累官南京工部尚書卒謚文僖所著有圭峯文集使東日錄丁積寕都人成化進士新會知縣至則師事邑人陳獻章為政以敦風化為本善政不可勝紀卒於官士民無不號慟曾栢寕都人事親盡孝里人至今稱曾孝子胡易寕都人宏治進士初授給事中論内監黷貨有㫖下獄覆按竟得直又因星變上疏語極切至風采凛然以奔母喪哀毁卒於途楊以任瑞金人崇禎進士淡於進取辭縣職改應天敎授金陵士爭趨之矜為楊門弟子升國子博士卒其制義至今海内傳誦楊以傑瑞金人萬厯舉人知都匀府值苗作亂以傑佐督撫討之斬九千餘人招撫竄亡復業二萬餘口民立廟祀之彭錕寕都人楊廷麟之次贛也以錕署兵備僉事廷麟一子才九􅀊屬之汀州故人及廷麟死其僕自汀􅀒子歸錕錕挈其􅀌避入廣昌山中久之歸寕都大兵至錕使其弟奉母及楊氏􅀌出避曰以此累汝汝莫死死則􅀒我遂與妻氏共縊數年楊氏􅀌返清江竟得全本朝乾隆四十一年賜諡節愍曾嗣宗寕都人州學生楊廷麟募兵嗣宗傾家貲三千金饗士從師吉安敗退保贛州將入城為死守計廷麟謂曰事急矣毋從我嗣宗曰與公共事奈何乘危舍去卒入城俱死十一年本朝乾隆四賜諡烈愍楊燧寕都人崇禎末授雲南臨安通判以病辭楊廷麟督師入贛邀燧偕行燧曰吾年已六十餘衰疾不可用命從子文琦從廷麟視師自避亂山中及廷麟與文琦殉義燧聞痛哭不食未幾冠帶自經死本朝乾隆四十一年賜諡節愍本朝李騰蛟寕都人與臨川陳際泰羅萬藻為文字會後同邱維屏入翠微與魏禧兄弟為易堂交諸人皆兄事之以經學敎授鄉里終邱維屏寕都人弱冠為諸生後隱居翠微峯講學於易堂其學原本六經有周易勦説魏禧寕都人結廬金精之翠微峯與南昌彭士望林時益同邑李騰蛟邱維屏彭任曾燦及兄祥弟禮等九人為易堂學皆躬耕自食切劘讀書禧才學尤高遂以古文名天下康熙十七年舉博學鴻詞以疾辭有文集二十二卷詩八卷左傳經世若干卷兄祥為諸生改名際瑞敏捷强記於兵刑農穀禮制律法皆能窮析源委嘗佐浙撫范承謨幕後館總兵哲爾肯所以說滇逆將韓大任降爲所害有集十卷弟禮少受業於禧刻苦自勵後遍遊海内歸隱翠微終三人既齊名更爲伯子叔子季子以自號人亦以此稱之許泰瀾石城人孝行著聞同縣賴吉諒温秀逵賴上進鄧國望貢生賴克信職監姜大傅監生賴昌維均乾隆年間旌邱鯨寕都􅀊貢性敦孝友􅅄引後進汲汲若不及動以古誼相規勸爲人解紛排患常先事彌縫竟無知者入祀鄉賢祠黄日曦石城選貢讀書尚氣節爲一邑倚賴與同郡魏際瑞兄弟稱文字交己丑張自盛破城日曦徒跣七日夜走贛乞師中途爲賊所􅀗以計得脱導官兵至賊遁城得全生平樂善好義拯人於厄不自見其德入祀鄉賢祠流寓本朝吳參貴池人父尊周明末武進士遯迹爲僧或傳在南嶽參往求弗得南昌彭士望與其父有舊參喪妻子正名才數􅀊託士望鞠之變姓名爲姬適訪求幾遍天下終不遇乃從士望於寕都躬耕以食以父出亡終身不再娶精理學著裏言一編後卒於杭州正名復居寕都以文章爲李騰蛟魏禮高弟子柴紹炳仁和人常從父任至寕都與魏禧兄弟遊講學易堂以躬行寔踐爲規結廬白茅峯有終焉之志後以父卒扶櫬歸里列女宋賴仲元妻葉氏石城人建炎四年盗起䖍化攻石城仲元客游於外葉以舅姑年老不能避㓂至逼之不從罵甚厲賊斷其㗋而死元廖國器妻陳氏寕都人少寡守節值㓂亂子死婦被擄陳育㓜孫人俊愛不忘敎人俊長能孝養陳氏安之年九十餘詔旌其門仍賜粟帛明熊本妻失其姓寕都人生七􅀊而母卒事後母甚孝年十九歸本姑病風攣日夜扶持不怠三子鼎渙晉偽漢兵起遣使徴鼎母曰敗可立待慎毋往元省臣以書招之又曰元運將終不可爲也及鄧愈取江西聘鼎從事母曰聞江表有真主是可依也其明達如此曾立清妻賴氏寕都人年二十二夫亡視殮畢即自縊以殉聶顯華妻王氏寕都人顯華疾亟王願以身代遂自縊死曾氏二烈婦俱寕都人鄧氏曾志顔妻夫將終先自縊死謝氏曾志聖妻夫死明日自縊死葉以清妻陳氏寕都人嘉靖中為流賊所掠義不受辱觸石垣而死陳氏女石城人陳成貴女許配胡氏子未歸而胡卒女聞之持刃自刺父母急救得免人聞其賢求婚者衆乘間閉門自縊許宗慶妻劉氏瑞金人嘉靖四十年流寇至宗慶挈家避陳石山寨寇攻之急劉告母曰此寨不守吾其死越四日寨破投崖死時有劉尚卿妻鍾氏許受誥妻鄧氏李常森妻劉氏皆同死焉又有謝棟妻郭氏以不從賊被支解羅厯生妻賴氏寕都人未嫁而厯生卒女告父母曰羅家貧盍返其聘物以助其喪已而誓不嫁父母未許遂自縊龔朝士妻賴氏石城人賊與龔有夙怨執其翁姑與夫將殺之賴求贖不許求以身代死亦不許因大罵遂俱遇害葉芊妻謝氏寕都人崇禎末避亂於鄉賊至度不可脱以子授夫使速去謝遂被掠賊將犯之謝笑曰吾一女子何往請沐浴妝畢侍左右可乎賦大悦許之謝入房以剃刀自刎死本朝曾氏三烈婦寕都人楊氏諸生曾士橒妻子婦温氏諸生師旦妻蔡氏裔芹妻順治七年城破婦姑三人同縊於門樓兵入見尸驚歎禮拜而去時蔡氏合􅈟甫三月年十六方縊時蔡忽下姑顧曰有悔心耶對曰姒當居左毋失序於是請姑居中温左蔡右而死毛貫易妻廖氏瑞金人夫殁欲以身殉為姑所持久之姑以貧奪其志廖陽諾竊徃夫墓慟哭歸仰藥死雍正五年旌廖克任妻王氏寕都人夫亡守節同州曾為龍妻彭氏邱時乘妻魏氏曾何妻彭氏邱克之妻彭氏邱園妻蔡氏曾次常妻温氏富民知縣彭兆逵妾王氏魏家維妻盧氏蘇舜榮妻陳氏曾方華妻胡氏李於棟妻彭氏丁非作妻彭氏胡忠琦妻魏氏温榮妻曾氏􅀺兼一妻李氏曾啓相妻李氏王幼清妻蕭氏連岳一妻楊氏李蘭石妻張氏曾謨妻蔡氏羅素俅妻曾氏連倩玉妻楊氏陳子璵妻彭氏李亮臣妻符氏蕭二酉妻侯氏彭亦僑妻曾氏彭又程妻連氏張宗一妻蔡氏董亦琴妻寗氏彭訓廷妻曾氏彭歸田妻温氏李煥若妻曾氏羅有倫妻李氏曾錫九妻温氏李㓜尹妻楊氏廖遜長妻李氏曾亮儕妻熊氏羅欽茂妻李氏謝泰諡妻彭氏曾循也妻李氏李豪㧞妻羅氏何唐佐妻胡氏曾名樑妻廖氏陳日如妻彭氏胡虞佐妻廖氏蕭小范妻章氏蕭鼎文妻李氏謝九千妻羅氏廖歩青妻姜氏胡遜上妻蕭氏彭煥如妻曽氏羅騰波妻李氏蕭行三妻黄氏呉小程妻寗氏李泰鴻妻許氏王歩原妻曽氏楊興侃妻李氏曾時烈妻彭氏曽顯珂妻鄧氏曾文石妻鄧氏彭人俊妻楊氏廖步川妻王氏張廷真妻曾氏張文善妻廖氏陳卓軒妻葉氏傅藴三妻彭氏曾立廷妻蔡氏李侣剛妻廖氏李侣僑妻曾氏曾榞妻彭氏劉近山妻寗氏曾全侣妻魏氏胡觀儀妻楊氏胡四瑛妻羅氏李咸宜妻賴氏曾獻組妻連氏温秀千妻廖氏黄日表妻郭氏懷仁知縣彭作霖妾周氏郭以源妻廖氏呉振璠妻李氏郭含英妻彭氏郭罕儀妻封氏廖德尚妻胡氏魏式儔妻李氏蘇雲驊妻彭氏李德倫妻魏氏張體純妻鄭氏楊叅兩妻李氏張麒瑞妻曾氏均乾隆年間旌劉浩然妻陳氏瑞金人夫亡守節同縣陳尚志妻鄧氏鄒學律妻劉氏楊以佖妻袁氏劉世延妻康氏賴聖學妻陽氏劉芳聯妻朱氏楊兆濓妻賴氏陳宗達妻謝氏楊其寛妻毛氏楊方翟妻謝氏賴聖鋭妻林氏羅大璜妻鍾氏賴聖麟妻劉氏賴聖銓妻彭氏楊枝益妻吳氏張仁暉妻謝氏張仁昳妻劉氏陳嘉濬妻楊氏賴傳妻陳氏楊於松妻劉氏鍾秉煒妻劉氏楊於仕妻鍾氏陳年枝妻謝氏謝祿理妻潘氏陳鵬妻何氏楊於􅌧妻朱氏楊其琚妻賴氏楊於絢妻歐氏陳昌銖妻宋氏賴顯􅀭妻鄧氏均乾隆年間旌曾光斗妻温氏石城人夫亡守節同縣黄國瑞妻孔氏頼嘉謨妻閆氏温文宗妻李氏許宗炳妻白氏黄先偉妻劉氏劉大埜妻陳氏陳慶棣妻楊氏賴上達妻劉氏劉滌波妻廖氏黄先庚妻鍾氏張正􅂜妻劉氏陳同志妻王氏陳自洪妻賴氏賴吉亮妻黄氏張立甲妻羅氏鄧鍾岫妻李氏林登遇妻劉氏許麟妻李氏周先礽妻陳氏周兆晅妻雷氏周兆㬙妻范氏李久我妻陳氏鄧大宏妻温氏吳永安妻程氏劉重選妻賴氏賴錫五妻劉氏李時巡妻陳氏黄先松妻劉氏陳時雍妻賴氏温雅暄妻劉氏賴兼五妻黄氏黄之任妻管氏賴仲恩妻徐氏賴永敏妻陳氏賴昌統妻黄氏羅國珍妻吳氏陳崇伸妻黄氏賴昌淑妻夏氏賴吉將妻張氏賴昌駒妻黄氏陳茂才妻林氏陳容川妻李氏姜國聘妻黄氏李大謨妻陳氏黄德琳妻李氏陳崇純妻寗氏陳崇繹妻賴氏李光裕妻黄氏賴應傑妻胡氏温仲箎妻劉氏傅英漢妻曾氏鄧人驥妻賴氏烈婦朱方秀妻鍾氏劉上騰妻張氏均乾隆年間旌謝薪傳妻何氏寕都人夫亡守節同州胡元芳妻温氏魏紹驍妻郭氏曾以庭妻彭氏謝明惠妻廖氏曾名楷妻劉氏廖紹誠妻曾氏廖睦渠妻姜氏郭德予妻賴氏連式和妻温氏劉珍文妻龔氏楊㑹斯妻彭氏李存真妻葉氏賴運溥妻陳氏邱瑞璋妻盧氏丁序敬妻陳氏彭令甡妻曾氏魏經衢妻謝氏烈婦賴承頊妻池氏楊芳備妻彭氏曾萱本妻李氏生員楊芳俠妻彭氏州同彭育華妻謝氏儒童廖藴原妻魏氏廖全六妻曾氏郭景陶妻賴氏張歩登妻邱氏貞女曾氏均嘉慶年間旌楊其昌妻鍾氏瑞金人夫亡守節同縣劉昱妻曽氏陳年楷妻廖氏詹武蘭妻蕭氏陳年橋妻蕭氏武生鍾敷霖妻楊氏均嘉慶年間旌温儒壟妻黄氏石城人夫亡守節同縣賴克搢妻陳氏温家宗妻黄氏賴景堯妻連氏黄尚敏妻賴氏陳澄暉妻鍾氏陳芳聯妻賴氏曾正河妻李氏陳慶佳妻胡氏陳就成妻黄氏陳國賢妻賴氏賴運溥妻陳氏温儒文妻陳氏陳殿臣妻温氏潘成六妻頼氏黄泰妻張氏均嘉慶年間旌仙釋漢劉瑶英秦末女子隨父華避亂石城琉璃山因食異果遂絶粒貌容頓改獨跨一白鶴往來後仙去人名其山為仙姑嶺張麗英字金華張􅉮女入山得道呉芮聞而聘焉麗英弗許曰吾為金星之精降治此山言訖紫雲鬱起失女所在金精山以此名土產夏布寕都州出茶省志岕茶出寕都紫雲峯香味第一不可多得儲茶出自儲山香味亦佳雪笋省志寕都墈方所産三月採取皚白似雪薟笋省志産寕都會