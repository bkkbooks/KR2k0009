老糿涕泣隨送嚴詡陵陽人哀帝時爲潁川太守詡本以孝行爲官謂掾吏爲師友掾吏有過輒閉閤自責終不大言後朝廷遣使徵詡官屬爲設祖道詡據地哭掾吏曰明府吉徵不宜若此詡曰我憂潁川士身豈有憂哉我以柔弱徵必遷剛猛代代到將有僵仆者故相弔耳何並平陵人哀帝時代嚴詡爲潁川太守時潁川鍾元爲尚書令領廷尉用事有權元弟威爲郡掾贓千金又陽翟輕俠趙季李款多收賔客以氣力漁食閣里並下車敕吏曰二人非負太守迺負王法不得不治即捕三人誅之及其其獄於市郡中清靜表善好士見紀潁川名次黄霸性清廉妻子不至官舎寇恂昌平人建武二年潁川人嚴終趙敦與密人賈期連兵爲寇乃拜恂爲潁川太守數月間擊斬期首郡中悉平後爲執金吾而潁川盜賊又起帝謂恂曰潁川迫近京師當以時定惟念卿獨能平之耳即日車駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏人受納餘降郭伋茂陵人建武九年潁川盜賊羣起拜伋潁川太守召見辭謁帝勞之曰賢能太守去帝城不遠河潤九里冀京師並蒙福也伋到郡招懷山賊數百人皆束手詣伋降伋悉遣歸農其黨聞伋威信遠自江南或從幽冀不期俱降絡繹不絶杜詩汲人建武中拜成皋令視事三歲舉政尤異樂俊建武中為浚儀令初平帝時河汴泱壞建武十年發卒營河功俊言今新被兵革方興力役民不堪命宜須平靜更議其事光武遂止王況社陵人建武中為陳留太守善行徳教永平中蝗蟲起過陳留界飛遊不集五穀獨豐王景樂浪􅠗邯人顯宗時詔與將作謁者王吳共修浚儀渠用景墕流法水乃不復為害馬嚴茂陵人建𥘉二年拜陳留太守下車明賞罰發奸慝郡界清靜時京師訛言賊從東方來百姓奔走轉相驚動諸郡各以狀聞嚴察其虚妄獨不為備詔書勅問嚴固執無賊後卒如言寒朗薛人建𥘉中為濟陽令以母喪去官百姓追思之章和初上東巡過濟陽三老吏人上書陳朗前政治狀帝至梁召見朗詔三府為辟首按漢濟陽縣屬陳留郡故城在今儀封廳北後漢郡國志濟陽有武父城今武父城在直隸大名府東明縣西南以地考之濟陽故城當在今𣏌縣陳留境内至山東曹州府渮澤縣之濟陽故城則唐武德中分冤句縣西界置貞觀元年廢入冤句者寒朗於建初中為濟陽令當載入開封府名宦舊志並載山東曹州府名宦中今改正魯恭平陵人肅宗時拜中牟令專以德化為理不任刑罰訟人許伯等爭田累守令不能決恭為平理曲直皆退而自責輟耕相讓建𥘉七年郡國螟傷稼獨不入中牟河南尹袁安使仁恕掾肥親往廉之恭隨行阡陌俱坐桑下有雉過止其旁旁有童兒親曰兒何不捕之兒言雉方將雛親瞿然起曰蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也是歲嘉禾生恭便坐庭中在事三年州舉尤異召馴夀春人信臣孫章帝時拜陳留太守有治迹賜刀劒錢物元和二年入為河南尹曹襃薛人肅宗時為圉令以禮理人以德化俗時他郡盜徙五人來入圉界吏捕得之陳留太守馬嚴風縣殺之襃敕吏曰皋陶不為盜制死刑如得全此人命而身坐之吾所願也遂不殺秦彭茂陵人建初七年轉潁川太守有鳳凰麒麟嘉禾甘露之瑞集其郡境肅宗巡行再至潁川輒賞賜錢穀恩寵甚異朱寵京兆人安帝時為潁川太守治理有聲繆彤召陵人安帝時遷中牟令縣近京師多權豪彤到誅諸奸吏及託名貴戚賓客者百餘人威名遂行宋登長安人順帝時為潁川太守市價無二道不拾遺牛述隴西人順帝時為外黄令好士知人禮請爰延為廷掾范丹為功曹濮陽潛為主簿劉矩蕭人順帝時為雍邱令以禮讓化之其無孝義者皆感悟自革民有爭訟矩常引之於前提耳訓告使歸更㝷思訟者感之輒各罷去其有路得遺者皆推尋其主馮岱桓帝時為陳留太守到官請符融相見融薦范冉韓卓孔伷三人岱辟舟為功曹卓為主簿伷為上計吏宋則長安人桓帝時為鄢陵令有名迹拔同郡韋著扶風法真稱為知人楊沛萬年人漢初平中除新鄭長課民畜乾椹收暨豆積得千餘斛魏武西迎天子所將千餘人皆無糧過新鄭沛乃進乾椹軍以不飢後遷長社令撾殺曹洪賓客魏武以為能棗祗潁川人建安末為陳留太守時歲旱軍食不足祗建置屯田數年中每歲大收所在積粟倉廩皆滿三國魏司馬岐温人明帝時遷陳留相梁郡有繫囚多所連及數載不決詔書徙獄於𡵨屬縣縣請豫治牢具岐曰囚己倦楚毒其情易見豈當復久處囹圄耶及至詰之皆莫敢匿詐一朝決竟劉劭邯鄲人明帝時爲陳留太守敦崇教化百姓稱之李勝南陽人正始三年爲滎陽太守政有遺惠民爲立祠殷裒爲滎陽令時多雨裒乃課氏穿渠入河䟽導原隰因致年豐人號爲殷渠又廣築學館㑹集朋從民歌之曰滎陽令有異政立學校人異性令我子弟恥爭訟晉魏舒樊人武帝時爲滎陽太守甚有聲稱傅祗泥陽人武帝時爲滎陽太守自河濟汎溢鄧艾嘗開石門而通之至是復浸壞祗乃造沈蔡堰兗豫閒無水患何攀郫人武帝時爲滎陽令上便宜十事陸雲吳郡人泰安間爲浚儀令縣居都會之要名爲難理雲到官肅然下不能欺市無二價人有見殺者主名不立雲錄其妻而無所問十許日遣出密令人隨後謂不出千里當有男子候之與語便縛來既而果然問之具服一縣稱神明去官圖畫形像配食縣社李矩平陽人元帝時為滎陽太守招懷離散遠近多附之郭誦平陽人元帝時為陽翟令阻水築壘且耕且戰為滅賊之計賊至誦設伏破之南北朝魏王慧龍晉陽人世祖時拜滎陽太守在任十年農戰並修大著聲績招攜邊遠歸附者萬餘家宋世景廣平人永興時拜滎陽太守鄭氏豪横號為難治世景繩以法於是僚屬畏威莫不改肅終日坐廳事來者無不盡其情抱皆假之恩顔屏人密語民間之事巨細必知發奸摘伏有若神明辛纂狄道人永安中轉滎陽太守民有姜洛生康乞得者舊是太守鄭仲明左右豪猾偷竊境内為患纂伺捕擒獲梟於郡市百姓忻然蘇淑武邑人孝靜時厯滎陽太守清心愛下為吏民所思稱良二千石高謙之遼東人孝昌中為河陰令時有人囊瓦礫詐市人馬索弗獲乃偽枷一人於市宣言是詐市焉賊且欲刑之密遣察市中私議者得二人執送按問悉獲其黨在任二年損益政典多為故事北齊郎基中山人宣帝時為鄭州刺史積年滯訟數日中剖判咸盡條綱闊疏獄訟衰息遠近慶悅卒於官柩還送者莫不攀輀悲慟隋楊達高祖族子開皇中為鄭州刺史平陳之後品天下牧宰達為第一劉幟宏農人大業中為成皋令政有恩惠時長吏多贓汚幟清節愈勵風敎大洽獄無繫囚令狐熙燉煌人開皇中為汴州刺史禁遊食抑工商民有向街開門者杜之船客停於郭外星居者勒為聚落僑人逐令歸本其有滯獄並決遣之令行禁止帝聞而嘉之敕相州刺史豆盧通令習熙之法其年來朝考績為天下最賜帛三百疋張須陁闅鄉人大業末為滎陽通守時李密說翟讓取洛口倉遂逼滎陽須陁戰死其所部兵晝夜號哭數日不止唐郭志安武德四年為管州刺史竇建德陷管州志安死之李元名垂拱中為鄭州刺史境接東畿諸王貴戚縱家人暴百姓元名至一革之為治廉威韋安石萬年人武后時拜鄭州刺史安石性方重不茍言笑其政尚清嚴吏民尊之馮元淑安陽人中宗時為浚儀令右善去惡人稱為神明與奴僕日一食馬日一秣不挈妻子斥俸餘以給貧窮或譏其近名元淑曰吾性也不為苦帝降璽書勞勉付狀史官李畬高邑人厯汜水主簿遇事鋒銳雖厮豎一閲輒記姓名居業黜陟使路敬潛薦其清白倪若水藁城人開元初為汴州刺史政清靜増修學宫興州縣學廬勸生徒身為敎訓風化興行明皇遣中人捕鵁鶄鸂鶒南方若水疏諫帝手詔襃答賜帛四十段齊澣義豐人開元中為汴州刺史地當舟車湊集事浩繁前刺史數不稱職惟倪若水與澣以清毅聞吏氏頌美澣以淮至徐城險急鑿渠十八里入清水人便其漕陸景融吳人任新鄭令政有風績張巡南陽人天寶十五載起兵討賊至雍邱時雍邱令令狐潮舉縣附賊巡乃屠其妻子磔城上士奉巡主軍潮以賊四萬薄城積六旬大小數百戰士帶甲食裹創鬬潮遂敗走追之幾獲潮怒復率衆來大將六人白巡以勢不敵不如降巡陽許諾明日堂上設天子畫像率衆士朝人人盡泣巡引六將至責以大義斬之士心益勸圍凡四月賊常數萬而巡衆纔千餘每戰輒克李勉鄭惠王元懿曽孫代宗時為開封尉推姦抉隱為有名崔無詖博陵人天寶中為滎陽太守安祿山攻滎陽無詖率衆乗城與官屬皆死賊手馬燧郯城人代宗時鄭州刺史勸督農力歳一稅人以為便狄兼謨太原人太和中厯鄭州刺史歲旱飢發粟賑濟民人不流徙柳仲郢華原人宣宗初出為鄭州刺史周墀鎮滑高其績及入相薦授河南尹五代漢盧億河内人魏王承訓為開封尹授億水部員外郎充推官時侍衛諸軍驕恣朝廷姑息之軍士成美以驢負鹽入都門閽者不敢執反擒平民孟柔送侍衛司柔自誣服論當棄市億察其冤言於漢祖而釋之李穀汝陰人漢初權判開封府時京畿多盜中牟尢甚穀誘邑人發其巢穴有劉德輿者梁時屢攝畿佐居中牟素有幹材穀即署攝本邑主簿浹旬穀請侍衛兵數千佐德輿悉擒賊黨自是行者無患宋宋琪薊人乾德四年拜開封府推官太宗為府尹甚加禮遇太平興國七年通判開封府事京府置通判自琪始程羽陸澤人開寶八年領開封府判官羽性淳厚莅事恪謹太平興國初拜給事中知開封府陳靖莆田人太祖時授陽翟主簿遼兵侵邊宋師數不利靖求入奏機畧詔就問之上五策曰明賞罰撫士衆持重示弱待利而舉帥府許自辟士而將帥得專制境外太祖異之改將作監丞吕端安次人乾德時知浚儀縣秦王廷美尹京召拜考功員外郎充開封府判官太宗征河東廷美將有居留之命端白廷美曰主上櫛風沐雨以申弔伐王當表率扈從主留務非所宜也廷美由是懇請從行厯知開封縣許王元僖尹開封又爲判官竇偁漁陽人開寶中太宗領開封府尹選偁判官時賈炎爲推官偁不樂其爲人太宗嘗宴諸王偁炎與㑹炎言矯誕偁叱之曰巧言令色心獨不愧乎上愕然因罷宴王旦莘人太宗時通判鄭州表請天下建常平倉張詠鄄城人太宗時知浚儀縣李沆宋湜寇準連薦其才王旭莘人太宗時知雍邱縣真宗聞其能王彬固始人淳化間厯雍邱尉皇城司陰遣人下畿縣刺事多厲民令佐至與爲賓主彬至捕鞫之得所受賂寘之法自是詔親事官母得出都城周起鄒平人真宗時擢樞密直學士權知開封府起聽斷明審舉無留事真宗嘗臨幸問勞吕夷簡夀州人真宗時權知開封府治嚴辨有聲姜遵長山人真宗時爲開封府右軍巡判官有疑獄將抵死遵辨出之石揚休眉州人真宗時知中牟縣地瘠民貧賦役煩重富人隸太常爲樂工僥倖免役者凡六十餘家揚休請悉罷之樂黄目宜黃人咸平中知浚儀縣上言自今審官院差知州銓曹注縣令候各及三二十人一次引見於御前試時務䇿一道察言觀行取其才識明於吏治達於敎化者充選其有不分曲直罔辨是非者或黜或退如此則官得其人事無不治梁灝鄆城人景德初權知開封府子適亦權知開封府又知鄭州有風采明於法令條教嚴不可犯程琳博野人真宗時權知開封府王蒙正子齊雄捶老卒死章獻太后謂琳曰齊雄非殺人者乃其奴嘗捶之琳曰奴無自專理且使令與已犯同太后黙然遂論如法外戚吳氏離其夫而挈其女歸夫訴於府琳命還女吳氏曰已納宮人矣琳請於帝曰臣恐天下人有竊議陛下奪人妻女者帝亟命歸之魏瓘婺源人真宗時為開封府倉曹參軍持法精審明吏事上元起綵山闕前張燈與宦官䕶作宦者輒誅索侵擾瓘密以聞詔杖宦者遣之後以給事中知開封府政事嚴明吏民憚之薛奎正平人仁宗時擢龍圖閣待制權知開封府事為政嚴敏擊斷無所恃帝益加重龎籍武城人仁宗時為開封府判官尚美人遣内侍稱敎㫖免工人市祖籍言祖宗以來未有美人稱敎㫖下府者當杖内侍詔有司自今宮中傳命母得輒受吳遵路丹陽人仁宗時進兵部郎中權知開封府馭吏嚴肅屬縣無追逮杜衍山陰人寶元閒權知開封府權近聞衍名莫敢干以私范仲淹呉縣人仁宗時知開封府上言洛陽險固而汴州四戰之郊急難則居洛太平乃都汴今洛宮本備巡幸可漸廣儲蓄繕修之在官明敏通照決事如神寇瑊臨安人仁宗時知開封府戚里有毆妻至死更赦事發者太后怒曰夫婦齊體奈何毆至死耶瑊對曰傷居限外事在赦前有司不敢亂法卒免死呉育建安人仁宗時知開封府居數日發大奸吏一人流嶺外又得巨盜積贓萬九千緡獄具而輒再變帝遣他吏按之卒㐲時歲飢多盜育嚴賞功之法嘗得盜而未賞者一切賞之以明不欺包拯合肥人仁宗時權知開封府京師爲之語曰關節不到有閻羅包老中官勢族築園榭侵惠民河河塞不通拯悉毁去李絢依政人仁宗時權知開封府治有能名蔡襄仙游人仁宗時以龍圖閣直學士知開封府襄精吏事談笑剖決破姦發隱吏不敢欺張方平南京人仁宗時權知開封府府事叢集前尹率書板識之方平獨黙記決遣無少差忘馮京江夏人仁宗時爲翰林學士知開封府數月不詣丞相府韓琦與富弼以京爲傲弼使往見琦京曰公爲宰相從官不妄造詣乃所以爲公重非傲也王素華人仁宗時以樞密直學士知開封府至和中大雨蔡河裂水入城詔軍吏障朱雀門素曰兵民廬舍多覆壓衆心怦怦然奈何更塞門以動衆詔遣止其役水亦不害歐陽修廬陵人仁宗時以龍圖閣學士知開封府承包拯威嚴之後簡易循理不求赫赫名京師亦治呉奎北海人仁宗時拜翰林學士權知開封府奎達於從政應事敏㨗吏不敢欺富人孫氏辜榷財利負其息者至評取物産及婦女奎發孫宿惡徙其兄弟於淮閩豪猾畏斂居三月治聲赫然蔣舜欽銅山人天聖中爲滎陽縣尉玉清昭應宮灾舜欽詣登聞鼓院上䟽直諌康德輿洛陽人天聖中遷河陰兵馬都監建沿汴斗門以節水會積雨汴水將溢德輿請自京西導水入䕶龍河得不溢楊佐宣州人仁宗時爲河隂發運判官幹當河渠司皇祐中汴水殺溢不常漕舟不能屬佐度地鑿瀆以通河流王舉元鎮定人仁宗時爲河陰發運判官或言大河決將犯京師舉元適入對具論地形證其妄已而果然宋昌言平棘人仁宗時爲河陰發運判官自濟源之官見道上棄尸若剮剝狀者甚衆既至河陰得兇盜六輩掩其家猶得執縛未殺者七人縣吏與市井少年共爲胠槖昌言窮治其淵藪皆法外行之而流其家人曾公亮晉江人仁宗時以端明殿學士知鄭州盜悉竄他境至夜户不閉嘗有使客亡槖中物移書詰盜公亮報吾境不藏盜殆從者之廋耳索之果然吕公綽夀州人仁宗時知鄭州嘗問民疾苦父老曰官籍民産第賦役重輕至不敢多畜牛田疇久蕪穢公綽為奏之自是牛不入籍王疇濟陰人皇祐中為開封府推官宦者李允良訴其叔父死疑為仇家所毒請發棺騐視衆欲許之疇獨不可曰安知非允良有奸窮治果與其叔父家有怨强至錢塘人仁宗時為開封府倉曹參軍露積油幕一夕火主守者法應死至疑火所起召幕工訊之工言製幕須雜他藥既久得濕則燔為上其事帝悟原其罪胥偃長沙人仁宗時權知開封府有衛卒賂庫吏求揀冬衣坐繫者三十餘人偃請從末減奏可宦人程智誠與三班使臣馮文獻八人抵罪帝使赦智誠三人而文獻五人坐如法偃曰恤近遺遠非政也况同罪異罰乎詔幷釋之呂公孺夀州人仁宗時為開封府推官民鬻薪為盜所奪逐之遭傷尹包拯命笞盜公孺曰盜而傷主法不止笞執不從拯善其守元祐初遷刑部侍郎知開封府為政明恕陳希亮青神人仁宗時為開封府司錄司事楅勝塔火官欲更造度用錢三萬希亮言陜西用兵願以此餽軍詔罷之青州民趙禹上書言趙元昊必反徙建州元昊果反禹至京自理宰相怒下開封獄希亮言禹可賞不可罪外戚沈元吉以奸盜殺人希亮一問得實自驚仆死沈氏訴之詔御史劾希亮及諸掾吏希亮曰殺此賊者獨我耳遂引罪坐廢王臻汝陰人仁宗時龍圖閣待制權知開封府奸人偽為皇城司刺事卒嚇良民以取賕臻購得其主名黥竄三十餘人都下肅然賈黯穰人仁宗時尚書左司郎中權知開封府兩軍獄囚歲瘐死者衆黯言吏或怠於視囚請歲計死者多少而賞罰之府吏額七百人以罪廢復敘者皆數外補之黯請敘者須有闕乃補榮諲任城人仁宗時為開封府判官太康氏事祈禳號白衣㑹縣捕數十人送府尹賈黯請殺其為首者而流其餘諲持不從各具議上之中書是諲議但流首杖餘人李載黎陽人仁宗時知祥符縣有巫以井泉飲人云可愈疾趨者旁午載杖巫堙其井張逸滎陽人仁宗時為太常博士知尉氏縣後遷尚書兵部郎中知開封府有僧求内降免田稅逸固執不許又言禁中比來稍通女謁願令官司糾劾從之韓璹汲人仁宗時為開封府司録嘉祐寛恤諸道分遣使者璹曰京師諸夏夲顧獨不蒙惠乎乃具徭役利害上之詔司馬光陳洙祥定條式遂革大姓漁幷之弊楊繪綿竹人仁宗時以集賢校理為開封府推官遇事迎刃而解諸吏惟日不足繪未午率沛然仁宗愛其才燕度益都人仁宗時知陳留縣京東蝗年飢盜發度勸邑豪出粟六萬以濟民又行保伍法以察盜善狀日聞張錫濮陽人仁宗時詔選能吏治畿縣乃以錫知東明始至令其下曰吾所治者三恃力恃富恃贖者吾所先也歲中以治迹聞沈遘錢塘人英宗時知開封府蚤作視事逮午畢出與親舊往還從容燕笑沛然有餘暇士大夫交稱其能竇卞冤句人英宗時為開封府推官方禁銷金為衣皇城卒捕得之屬卞治以中禁為言奏曰真宗行此制自掖庭始今不正以法何以示天下且非祖宗立法意英宗従其請滕元發東陽人神宗時知開封府民王頴有金為鄰婦所隱閲數尹不獲直穎憤而致傴扶杖訴於庭元發一問得實反其金潁提杖仰謝傴疾忽愈呂溱揚州人神宗時知開封府精識過人辨訟立斷豪强斂迹劉庠彭城人神宗時知開封府王安石欲見之戒典謁者曰今日客至勿納惟劉尹來即告我有語庠者曰盍一往見庠竟不往奏論新法神宗諭之曰奈何不與大臣協心濟治乎庠曰臣知事陛下不敢附安石邵亢丹陽人仁宗時提點開封縣鎮公事比有縱火者一不獲則主吏坐罪民或自燔其居以中吏亢請非延及旁舍者雖失捕得勿坐神宗時知開封府亢遇事敏密吏操辭牘至前皆反覆閲之人或以為勞亢曰決是非於湏臾正當爾初雖煩後乃有也籍閭里惡少年與吏之廢停者一有所犯皆遷處之畿下鬬訟為之衰止趙瞻盩厔人熙寕三年為開封府判官神宗問卿知青苗法便乎對曰青苗法唐行之於季世優攘中掊民財誠便今欲為長久計愛養百姓誠不便曹孝寬晉江人神宗時知咸平縣民詣府訴雨傷麥府以妄杖之孝寛躬行田辨其實即蠲賦姜潛奉符人神宗時知陳留縣青苗令下潛出錢榜其令於縣門己徙之鄉落各三日無應者遂撤榜付吏曰民不願矣司農開封疑潛阻格各使其屬來驗皆如令而條例司劾祥符住散青苗錢潛移疾去縣人詣府請留之不得蘇軾眉山人神宗時權開封府推官決斷精敏聲聞益遠會上元勅府市浙燈且令省價軾疏言百姓皆謂耳目不急之玩奪其口體必用之資即詔罷之蔡延慶膠水人神宗時厯開封府推官有衞士告黃衣老卒筒火入直延慶察卒色辭疑焉詢之果為所誣即反坐告者事聞帝重之王安禮臨川人神宗時知開封府前滯訟不得其情及具按而未論者幾萬人安禮剖決未三月三獄院及畿赤十九邑囚繫皆空邏者連得匿名書告人不軌所涉百餘家安禮驗所指皆畧同最後一書加三人有姓薛者安禮喜曰吾得之矣呼問薛曰若豈有素不快者耶曰有持筆來售者拒之鞅鞅去其意似見銜即命捕訊果其所為也梟其首於市不逮一人京師謂為神明宗室令騑以數十萬錢買妾久而斥歸之訴府督元直安禮視妾既炙敗其面矣即奏言此與炮烙之刑何異請勿理其直而厚加譴以為戒詔從之許將閩人神宗時以翰林學士權知開封府為同進所忌㑹治太學虞蕃訟釋諸生無罪者蔡確舒亶因陷之逮其父子入御史府逾月得解錢藻臨安人神宗時以樞密直學士知開封府平居樂易無崖岸而居官獨立守繩墨為政簡静有條理不肯徇私孫覽高郵人神宗時知尉氏縣有屯將遇下虐士卒謀因大閲殺之以叛覽聞馳往士猶羣語不顧覽呼諭之曰將誠無狀然天子何負汝輩乃欲致族滅耶皆感謝去就列屯將徐至覽命吏趨具奏衆意遂安章衡浦城人熙寕中知鄭州奏罷原武建弛牧地四千二百頃以予民喬執中高郵人神宗時為司農丞提開封縣鎮諸縣牧地民耕歲久議者將取之當夷邱墓伐桑柘萬家相聚而泣執中請於朝詔復予民呂大防藍田人哲宗時為翰林學士權知開封府有僧誑民取財訟至庭下驗治得情命拘具獄即其所杖之他挾奸者皆遁去錢勰臨安人元祐中以龍圖閣待制知開封府訴諜七百勰隨剖決簡不中理者緘而識之戒無復來閲月一人又至呼詰之讕曰無有勰曰汝前訴云云吾識以某字啓緘示之上下皆驚咤宗室貴戚為之斂手雖丞相府謁吏干請亦械治之積為衆所憾出知越州後復知開封臨事益精王詔鎮定人元祐中開封府推官富民貸後絶僧牒為緡錢十三萬踰期復責倍輸身死貲籍又錮其妻子詔請免之王巖叟清平人元祐中知開封府都城羣偷所聚謂之大房每區容數十百人巖叟令掩捕撤毁隨輕重決之根株一空供備庫使曹續以産萬緡貿市儈踰年負其半續盡力不可取一日啟户則所負皆在焉驚叩其故儈曰王公今日知府矣巖叟嘗謂天下積欠多名催免不一公私費擾乞隨等第立多寡為催法朝廷乃定五年十科之令范百祿華陽人哲宗時以龍圖閣學士知開封有勤於民事獄無繫囚吏欲以圄空聞百祿曰此至尊之仁非尹功也不許任伯雨眉山人哲宗時知雍邱縣御吏如束溼撫民如傷縣枕汴流漕運不絶舊苦多盜然未嘗有獲者人莫知其故伯雨下令網舟無得宿境内始猶不從則命東下者斧斷其䌫趣京師者䕶以出自是外户不閉范正平吳縣人紹聖中為開封尉有向民於其壙造慈雲寺户部尚書蔡京以向民后戚規欲自結奏拓四鄰田廬民有訴者正平按視以為所拓皆民業不可奪民又撾鼓上訴京坐罰向子諲臨江人元符中知咸平縣豪民席勢犯法獄具上尹盛章方以獄空覬賞卻不受子諲以聞詔許自論決章大怒劾以他事勒停吳擇仁永興人徽宗時知開封府有竇鑑者以捕盜寵官諸司使服金帶擇仁視事狃舊態來前叱而械諸獄一時大驚賣珠人居官貨久不返度事急匿宦官楊戬第擇仁取之竄於遠范純禮吳縣人徽宗時以龍圖閣直學士知開封府前尹以刻深為治純禮曰寛猛相濟聖人之訓今處深文之後若益以猛是以火濟火也乃務去前之苛一切以寬處之王襄南陽人徽宗時以顯謨閣待制權知開封府府事浩穰縲繫滿獄襄晝夜決遣四旬俱盡又閲月獄再空劉汲丹稜人徽宗時辟開封府推官自盛章等尹京果於誅殺率取特㫖以快意汲每白府奏罷之時彥開封人徽宗時為開封府尹異時都城苦多盜捕得則皆亡卒吏憚於移問往往畧之彦始請一以公憑為驗否則拘繫之以俟報坊邑少安獄屢空程振樂平人靖康中拜開封尹故時大辟有情可矜多奏取原貸崇寕以來率便文殺之振請復舊制詔捕亡命卒得數千人欲論如法振曰方多事之際而一日殺千人必大駭觀聽乃盡釋之趙伯振太祖八世孫靖康末為鄭州司錄捍禦有功就遷通判州事建炎二年金兵至鄭州守臣董庠棄城走伯振率兵巷戰中流矢墜馬遂遇害金李晏高平人皇統閒為中牟令會海陵方營汴京運木於河晏領之以經三門之險前後失散者衆乃馳白行臺以其木散投之水使工取於下流人皆便之王若虚藁城人承安中為管城令有惠政秩滿民攀送不忍别王毅大興人累官東明令貞祐二年東明圉急毅率民兵願戰者數百人拒守力窮被執不屈死程震東勝人興定中為陳留令治為河東第一元袁裕洛陽人至元六年為開封府判官洧川縣達魯噶齊貪暴盛夏役民捕蝗禁不得飲水民不勝忿擊之而斃有司當以大逆寘極刑者七人連坐者五十餘人裕議誅首惡一人餘各杖之有差部使者錄囚至縣疑其太寬裕辨之益力遂陳其事狀於中書刑曹竟從𥙿議達魯噶齊舊作達魯花赤今改正陳祜寕晉人至元十二年授南京總管兼開封府尹吏多震懾失措祐因謂曰何必若是前爲盜跖今爲顔子吾以顔子待之前爲顔子今爲盜跖吾以盜跖待之由是吏知修飭不敢弄法卜天璋洛陽人至元中爲南京府史時河北飢民數萬人集河上欲南徙有詔令民復業勿渡衆洶洶不肯還天璋慮其生變勸總管張國寶聽其渡國寶從之遂以無事河南按察副使程思廉察其賢辟爲憲史聲聞益著張廷珍金州人至元中拜南京路總管兼開封府尹控鶴軍士十餘人賃大宅聚居縱横街陌廷珍察其必爲盜急捕之得寶玩器服子女滿室窮索其黨俱殺之民以爲神河決灌太康漂溺千里廷珍括商人漁子船及縛木爲筏載糗糧四出救之全活甚衆水入善利門廷珍親督夫運薪土捍之不能止乃頽城爲堰水既退即發民增外防百三十里人免水憂蒲理翰至元間知鄭州崇飭學宮範銅為祭器製革帛為禮服善政最多民為立碑黄廷佐至元間知鄭州廉潔不苟外寬内明喜怒不形於色治行為一時最塔海武宗時為汴梁路總管先是朝廷令民自實田土有司繩以峻法民多虚報以塞命其後差稅無所徴民多逃竄塔海言於朝省民間虛糧二十二萬民頼以安劉可任元統初知鄭州崇學校勸農桑興利除害民圖像以祀明王博應天人洪武初為開封知府時流移新復博寬其徭役禁其侵攘敎民闢土地藝蠶桑期年之間獲其利境内遂安齊勉陽穀人洪武初知尉氏縣清慎莅職雙洎河水為患勉築隄六十餘里康溝河淤塞復疏通之自是尉氏及鄰邑俱免水患胡澄諸暨人洪武初為河隂丞以德導民清稱甚著境内有虎患澄至皆徙去時令劉茂江寕人亦以善政聞鄒俊洪武中為祥符丞有政績擢大理卿許譽長山人洪武中知儀封縣邑多游民譽躬行四畝勸課農桑民皆化之永樂初秋滿當遷民乞留賜襲衣寶鈔復留三年李遵義衡水人洪武中知新鄭縣律己以廉舉政務合民情暇則巡行閭里以稽民瘼民之貧富與丁之壯弱纖悉具知民莫能欺程惠民新泰人洪武初知汜水縣廉潔敦厚不尚威嚴公暇輒詣學宮講析經義勸勉生徒秩滿去士民泣送章以善新昌人永樂初知𣏌縣民困於賦以善第為三等量貧富以定其程之遠近役之輕重民皆稱便曾泉太和人宣德初以御史謫汜水典史卒正統四年河南參政孫原貞上言泉操行廉潔服官勤敏不以降黜故有偷惰心躬督民闢荒土收穀麥伐材木備營繕通商賈完逋責官有儲積然後造舟楫置棺椁贍民器用臣行部汜水泉殁己三年矣民懷其惠言輒流涕請追復泉爵襃既往以風方來帝從之王斆山西人宣德中知中牟縣稱强項令時巡案有魯恭三異書青史王斆一廉達紫宸之句殁後不能歸葬因殯於邑人題其墓曰明清白吏賈威束鹿人正統𥘉知滎陽縣扶善懲惡在任九年無一民越訴者巡撫于謙署上考榜諭屬吏使共觀法魚侃常熟人天順初知開封府居官清正苞苴屛絶秩滿告歸家益貧妻子不免飢寒周斌昌黎人天順中知開封府有善政及遷去民涕泣追送衞英洪洞人宏治初知開封府居官不以妻子自隨衣服車器非極敝不更居九年致仕去王時中黄縣人宏治𥘉知鄢陵縣嘗出郊旋風擁馬首時中曰冤氣也跡得尸眢井乃婦與所私者殺之遂伏辜顧璘上元人正德中知開封府都御史彭澤討平大盜趙鐩璘籌畫為多以直忤鎮守太監廖堂王宏謫全州知州劉魁泰和人正德間知禹州興學校毁淫祠丈地均糧俱有成法數年敎化大行王詔厯城人嘉靖中為開封同知朱仙鎮盜起陷尉氏詔設伏扶溝而身領卒住擊賊遇伏執以還河決金相寺口時議築孫繼口至清河口百餘里費十七萬詔身先徒衆三月而工成費不盈萬潘恩上海人嘉靖中知鈞州鈞徽王封國也宗戚豪悍恩約束之州人為建祠配公孫僑黄霸張夢鯉萊陽人隆慶初知開封府首斥冗役千餘人藏吏進奇羨怒笞之令著之籍州縣上贖鍰悉卻不納使易粟實廪鑿渠通溱洧以資灌溉有大盜譁於獄衞卒憚不敢入捕夢鯉手劒前趨曰敢後者死衆擁入盜遂伏誅龔起鳳崑山人隆慶中知𣏌縣初受事見獄多冤濫悉縱去止留重罪數人諸所興革直行已意上官頒令有不便者輒格之監司檄讞商邱大猾致千金不受窮治伏辜官舍蕭然日惟疏食兩蒼頭不勝困先後逃去夜自闔門而寢陳登雲唐山人萬厯中知鄢陵縣政最善擢御史陳幼學無錫人萬厯中知中牟縣秋將熟飛蝗蔽天幼學捕蝗得千百餘石不為災縣故土城卑且圯乃集貧民築之與以粟工成民不知役縣南荒地多茂草難墾幼學令民投牒者必入草十斤未幾草盡得良田數百頃縣有大澤瀦水泛溢三十餘里害民田幼學疏為河者五十七為渠者百三十九俱引入小清河又以大莊諸里多水築堤十三道陣之給貧民牛種貧婦紡具在任五年政績茂著關永傑鞏昌衞人崇禎中為開封推官攝府事强直不撓民愛而畏之申佳允永年人崇禎中知儀封縣縣素多盜佳允嚴保甲法姦無所容霪雨河決􅋈舟怒濤中率衆塞其口捕大猾置之法以才調杞縣八年賊埽地王率萬人來攻佳允固守募死士擊之賊遂引去顔日愉上虞人崇禎中為開封同知嘗攝澠池滎陽二縣事撫恤瘡痍政績甚著費曾謀鉛山人崇禎中知通許縣甫四旬流賊猝至曾謀召父老曰我死若輩以城降可免屠戮北向再拜抱印投井死楊一鵬河津人崇禎中知尉氏縣甫數月治聲甚著城破罵賊死魯世任垣曲人崇禎中知鄭州建天中書院集士子講肄其中遠近從者千人十五年流賊來犯親勒民兵禦之河干戰敗自刎死士民肖像祀之書院中周騰蛟香河人崇禎中知汜水縣撫字有術釐定徭役民甚便之城孤懸河畔城南摩天巖最險土寇李際遇伺騰蛟往河北急攻據之遂攻縣城騰蛟力請援兵至賊始解去遷縣治於摩天巖以扼賊衝未幾賊大至相持十餘日賊多死來者益衆勢不支砦臨河可渡以免騰蛟曰吾何忍舍衆而獨生遂自投於河賊退人從河濱獲其尸印懸肘間本朝乾隆五年祀名宦柴薦諲江山人崇禎中知洧川縣城陷罵賊死劉振之慈谿人崇禎中知鄢陵縣大將索餉不應被縛去父老斂資以犒始釋歸李自成陷許州振之集吏民共守無何賊大至城陷振之走謁文廟秉笏坐堂上賊索印不予縛置雪中三日夜罵不絶口亂刃交下死杜邦舉富平人崇楨中為鄢陵典史與知縣劉振之共守拒戰許州既屠衆大懼有遁走者邦舉捕得立斬之城既陷自成欲降之邦舉大罵曰朝廷臣子豈為賊用自成抉其舌邦舉以血噴之仍大罵遂遇害邵大濟陜西人崇禎中陳留縣典史流賊李自成陷城大濟不屈賊怒臠之舉家赴井死訓導楊導升及其子亦死吳加增陽武人崇禎中劄委千總與流寇力戰屢捷後賊數千薄城増大戰一日斬首數百級乗勝窮追馬陷地穴中為賊所獲不屈死邑人立碑誌之本朝雍正二年祀名宦朱敏汀明宗室崇禎中知密縣流賊陷城敏汀死之妾張氏一女一孫及臧獲數人皆死劉孔暉邵陽人崇禎十四年知新鄭縣流寇掩至固守不能支死之陳潛夫錢塘人崇禎十六年授開封推官大河南五郡盡為賊據長吏皆寄居封邱有勸潛夫弗往者不應馳之封邱募民兵奉周王渡河居杞縣檄召旁近長吏歃血誓固守賊所設偽巡撫梁啓隆居開封他偽官散布郡邑甚衆潛夫轉側杞陳留間朝夕不自保聞西平寨副將劉洪起勇而好義躬往説之起兵俘𣏌偽官啓隆聞風遁去本朝胡士梅錦州人順治初知祥符縣時值河患士梅招流移問疾苦新安十三寨之民頼以全活者甚衆牛炳星大興人順治十七年知杞縣捐俸買穀代貧民輸租積累頓除時霪雨百日飢民載路炳星力請蠲免夫柳䀼給無遺𣏌名宦牟文龍奉天人康熙八年任開封南河同知值河流衝突躬自辦料督工奔走嚴霜烈日中者四載又攝府篆多善政後以最遷慶陽士民遮道攀留數里不絶韓藎光保定人康熙九年知中牟縣以勤政安民為己任每朝夕延接紳士諮訪利弊興革不遺餘力祀名宦管竭忠奉天人康熙二十五年知開封府儉於自奉勤以盡職㑹歲荒捐俸賑濟貧民又修隄堰水施藥療病人多頼以全活胡權任邱人康熙二十六年知祥符縣聽斷明敏案無留牘革除供億不以累民扶弱戢强奸宄悉皆屏蹟張國卿霸州人康熙三十七年知開封府自奉儉素僚屬皆化盡職守分不邀名譽時有獻諛頌德政者即嚴行禁絶民以為實心實政云王典仁和人知𣏌縣為政寬仁不事鈎距每政事之暇輒與諸生論文課藝多所成就祀名宦張國輔奉天人知汜水縣明決果斷釐弊鋤奸建義學置義田振興文教勸課農桑初汜人不知育蠶國輔督令宅旁隴畔家樹桑民享其利又設立布市革里長陋規修城隄徧栽榆柳興利除害有古良吏風卒於官士民祀之鮑志周餘杭人乾隆七年知祥符縣夏黒岡口河溜頂衝下埽輒走隄幾隤志周至不呼而集者數千人力為搶䕶省金錢無算嘗辦米麥接濟鄰省事竣而民不知許勉燉浙江人乾隆十四年知陳留縣十五年夏旱輒疏通溝渠增修城垣人惑之十九年後邑數被水竟不為患始服其識祀名宦昌宜泰滿洲鑲藍旗人嘉慶十六年知開封府十八年滑縣敎匪滋事大吏悉赴軍營宜泰留守省垣於沿河緝獲匪黨奸究無由偷波大河以南頼以安堵歲饑實心賑濟全活無算捐修學宫濬賈魯河士民交頌二十一年卒於官人物漢張良其先韓人世相韓秦滅韓良悉家財求客刺秦王為韓報讎得力士擊秦皇帝博浪沙中誤中副車亡匿下邳遇老父授以太公兵法陳涉等起良欲往從景駒道遇沛公遂從不去沛公為漢王還定三秦以良為成信侯常為畫策臣酈食其謀撓楚權請立六國後良借箸陳八不可追楚至陽夏南用其計諸侯皆至高帝六年封功臣帝曰運籌帷幄之中決勝千里之外吾不如子房封留侯薨諡文成酈食其陳留高陽人好讀書家貧落魄為里監門人皆謂之狂生沛公畧地陳留至高陽傳舍食其入謁長揖不拜沛公延之上坐定計下陳留號為廣野君常為說客馳使諸侯漢三年項羽擊漢拔滎陽漢王欲損成皋以東屯鞏洛以距楚食其說漢王進兵收取滎陽請奉詔說齊王使為漢而稱東藩上從其畫復守敖倉使食其説齊王馮軾下齊七十餘城及韓信夜度兵平原襲齊齊以食其賣已廼烹食其十二年高祖封其子疥為高梁侯酈商食其弟陳勝起事聚少年數千人屬沛公從攻長杜先登封信成君破秦軍雒陽定漢中沛公為漢王商以將軍為隴西都尉别定北地上郡漢王即帝位遷為右丞相賜爵列侯與絳侯等定代郡雁門以將軍將太上皇衞一歲七月以右丞相擊陳豨又從擊黥布更封為曲周侯薨諡景侯鼂錯潁川人學申商刑名以文學為太常掌故受尚書於伏生累遷太子家令以辨得幸太子號曰智囊數上書言邊事舉賢良文學士對䇿者百餘人惟錯為高第由是遷中大夫復上書三十篇孝文奇其才景帝時為御史大夫侵削諸侯曰不如此天子不尊宗廟不安吳楚七國反斬錯東市堂溪惠潁川人受公羊春秋於貢禹惠授泰山冥都滿昌潁川人受詩於匡衡官為詹事賈山潁川人祖父祛故魏王時博士弟子也山受學於袪孝文時言治亂之道借秦為喻名曰至言文帝除鑄錢令山復上書諫以為變法非是言多激切善指事意其後復禁鑄錢任安滎陽人嘗為大將軍衛青舍人後青故人門下多去事霍去病輒得官獨任安不肯去後為益州刺史假倉陳留人從平陵張山拊受尚書以謁者論石渠官至膠東相孫寶鄢陵人以明經為郡吏御史大夫張忠辟為屬上書薦寶累遷丞相司直劾奏帝舅紅陽侯立懷奸罔上狡猾不道哀帝即位遷司隸初傅太后與中山孝王母馮太后俱事元帝有郤使有司考馮太后令自殺衆庶冤之寶請覆治傅太后大怒下寶獄旋復官鄭崇下獄寶上書稱崇冤免為庶人平帝立寶為大司農㑹越巂郡上黄龍遊江中太師孔光等咸稱莽功德比周公宜告祠宗廟寶曰風雨未恃百姓不足每有一事羣臣同聲得無非其美者大臣皆失色因事坐免終於家虞延東昏人少為户牖亭長王莽貴人魏氏賓客放縱延䘚吏突入其家捕之王莽末延擁衛親族捍禦鈔盜賴以全者甚衆建武初除細陽令太守富宗召署功曹宗以侈縱被誅歎曰恨不用虞延之諫光武聞而奇之累遷洛陽令南陽太守永平三年徵為太尉遷司空厯位二府十餘年家至清貧身殁後子孫不免寒餒侯霸宻人矜嚴有威容篤志好學師事九江太守房元治穀梁春秋厯官淮平大尹建武四年徵拜尚書令霸明習故事收錄遺文條奏前世善政法度有益於時者皆施行之每春下寛大之詔奉四時之令皆霸所建也進大司徒封關内侯明察守正奉公不囘薨帝親涖弔劉昆束昏人梁孝王裔平帝時受施氏易於沛人戴賓王莽時敎授弟子恆五百餘人建武五年舉孝廉不行敎授於江陵光武聞之即除為江陵令徵拜議郎稍遷侍中宏農太守徴為光禄勲詔問昆曰前在江陵反風滅火後守宏農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此長者之言顧命書諸䇿令入授皇太子及諸王小侯五十餘人拜騎都尉三十年以老乞骸骨詔賜洛陽第以千石祿終其身鄭興開封人更始時拜諌議大夫厯涼州刺史坐事免隗囂虚心禮請而興恥為之屈稱疾不起建武六年徴為大中大夫興數言政事依經守義文章温雅然以不善䜟故不能任九年與大司焉吳漢擊公孫述述死詔興留屯成都左轉蓮勺令以事免興好古學尤明左氏周官長於厯數世言左氏者多祖興三公連辟不肯應卒於家董宣圉人初為司徙侯霸所辟舉高第累遷北海相左轉懷令後為江夏太守坐輕慢外戚陰氏免特徵為洛陽令搏擊豪强莫不震慄京師號為卧虎歌之曰枹鼓不鳴董少平在縣五年卒詔遣使臨視惟見布被覆尸妻子對哭有大麥數斛敝車一乘帝傷之曰董宣廉潔死乃知之葬以大夫禮拜子幷為郎中張興鄢陵人習梁邱易以敎授建武中舉孝廉為郎謝病去復歸聚徒永平中遷侍中祭酒十年拜太子少傅顯宗數訪問經術弟子自遠至者著錄且萬人為梁邱家宗十四年卒於官子魴傳其業位至張掖屬國都尉鄭衆興子年十二從父受左氏春秋精力於學明三統􅍓作春秋難記條例兼通易詩知名於時建武中皇大子及山陽王荆因梁松以縑帛聘請衆辭不受梁氏敗賓客多坐之惟衆不染於辭永平初以明經給事中持節使匈奴衆至北庭欲令拜衆不為屈廼發使隨衆還京師帝復遣衆報之上書固爭詔追還繫廷尉會赦歸家其後帝見匈奴來者言衆意氣壯勇雖蘇武不過乃復召為軍司馬與馬廖擊車師建初六年為大司農時肅宗議復鹽鐵官衆諌以為不可詔數切責衆執之不移在位以清正稱後受詔作春秋刪十九篇子安世亦傳家業為長樂未央廐令樓望雍邱人少習嚴氏春秋操節清白有稱郷閭建武中趙節王栩聞其高名遣使齎玉帛請以為師望不受永平初為侍中越騎校尉入講省内遷大司農代周澤為太常後為左中郎將教授不倦世稱儒宗諸生著錄九千餘人年八十卒於官郭躬陽翟人父宏習小杜律太守寇恂以為決曹掾斷獄三十年用法平郡内比之東海于公躬少傳父業後為郡吏辟公府明帝時以躬明法律召入議獄累遷至廷尉家世掌法矜在寛平及典禮官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之皆施行著於令子晊亦明法律官至南陽太守郭鎮躬弟子少修家業初辟六尉府延光中遷尚書及立濟陰王鎮率羽林士擊殺衞尉閻景以成大功再遷尚書令封定潁侯子賀父殁當嗣爵讓於弟時而逃積數年詔大鴻臚州郡追之賀不得巳乃出受封累遷廷尉高慎圉人父固不仕王莽世為淮陽太守所害以烈節垂名慎敦厚少華有沈深之量撫育孤兄子五人恩義甚篤厯二縣令東萊太守老病歸家草屋蓬户甕缶無儲李充陳留人家貧兄弟六人同食遞衣妻勸充分異充跪白母曰此婦敎充離閒母兄罪合斥遣便呵斥其婦逐令出門延平中徴為博士累遷左中郎將年八十為國三老安帝常召進見賜以几杖卒於家高式慎子性至孝常盡力供養永初中螟蝗為害獨不食式麥圉令周疆以表州郡太守楊舜舉式孝子讓不行後以孝廉為郎陳弇陳留人受歐陽尚書於司徒丁鴻躬自耕種常有黄雀飛來隨弇翺翔後仕為蘄長楊倫東昏人少師事丁鴻習古文尚書為郡文學掾更厯數將志乖於時遂去職敎授於大澤中弟子至千餘人順帝即位徵拜侍中陽嘉二年徵拜大中六夫倫以直諫不合旣歸閉門講授自絶人事卒於家虞放延從曾孫少為太尉楊震門徒及震被讒自殺放詣闕追訟震罪由是知名桓帝時爲尚書以議誅梁冀功封都亭侯性嫉惡宦官遂爲所陷靈帝初與李膺俱以黨錮被害黄真雍邱人吳祜舉孝廉郡中祖道時真爲小吏祜越壇共真歡語移時與結友而别功曹以枯倨請黜之太守曰吳季英有知人之名卿且勿言真後舉孝廉爲新蔡長世稱其清節楊匡陳留人常爲杜喬掾喬與李固坐黨楇死暴尸城北匡聞之號泣星行到洛陽乃著故赤幘託爲夏門亭吏守衛尸喪驅䕶蠅蟲都官從事執之以聞梁太后義而不罪匡於是帶鐵鑕上書幷乞李杜骸骨太后許之成禮殯殮送喬喪還家葬送行服隱匿不仕匡初好學在外黄大澤敎授門徒補蘄長政有異績遷平原令時國相徐曾中常侍璜之兄也匡恥與接事託疾牧豕去爰延外黄人清苦好學能通經敎授性質慤少言辭爲鄉嗇夫仁化大行桓帝時徵博士太尉楊秉等舉賢良方正再遷爲侍中帝嘗問朕何如主對曰爲漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍黄門預政則亂是以知陛下可與爲善可與爲非累遷大鴻臚乞骸骨還家病卒子驥白馬令亦稱善士范冉一名丹外黄人受業於樊英又就馬融通經桓帝時以為萊蕪長遭母憂不到官後辟太尉府議者欲以為侍御史因遁身於梁汴之間推鹿車載妻子捃拾自資結草廬而居有時絶粒閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪中平二年卒陳留太守累行論諡僉曰宜為貞節先生會葬者二千餘人刺史郡守各為立碑表墓邊韶浚儀人以文學知名敎授數百人曽晝日假卧弟子私嘲之曰邊孝先腹便便懶讀書但欲眠韶應之曰邊為姓孝為字腹便便五經笥但欲眠思經事嘲者大慚桓帝時為臨潁侯相徵拜大中大夫著作東觀再遷北地太守入拜尚書令後為陳相卒官著詩頌碑銘書策凡十五篇服虔滎陽人少以清苦建志入太學受業有雅才善著文論作春秋左氏傳解至今行之又以左傳駮何休之所駮漢事六十條舉孝廉中平末拜九江太守所著碑賦誄書記連珠九憤凡十餘篇吕强成皋人少為小黄門遷中常侍清忠奉公靈帝時封都鄉侯强辭讓懇惻帝聽之因而上疏極言宦官妄授茅土後宫衣食之費日數百金外戚奢麗過禮不省中平元年黄巾賊起帝問所宜施行强欲先誅左右貪濁者大赦黨人及料簡刺史二千石能否於是趙忠等遂共搆强强自殺朱震陳留人𥘉為州從事奏濟陰太守單匡贓罪幷連匡兄中常侍超帝收匡下廷尉以譴超超詣獄謝三府諺曰車如雞棲馬如狗疾惡如風朱伯厚後為銍令聞陳蕃死棄官哭之收葬蕃尸幷匿其子逸於甘陵界中事覺繫獄合門桎梏震受考掠誓死不言故逸得免符融浚儀人遊太學師事少府李膺膺風性高簡每見融輒絶他賓客聽其言論郭林宗始入京師時人莫識融一見嗟服因以介於李膺由是知名州郡禮請舉孝廉公府連辟皆不應會黨事起亦遭禁錮終於家茅容陳留人年四十餘耕於野與等輩避雨樹下衆皆夷踞相對容獨危坐愈恭郭秦行見之而奇其異遂與共言因請寓宿旦日容殺雞為饌泰謂為己設既而以供其母自以草蔬與客同飯泰起拜之曰卿賢乎哉因勸令學卒以成德田盛陳留人與郭泰同好亦名知人優游不仕以夀終庾乘鄢陵人少給事縣庭為門士郭泰見而拔之勸遊學宫遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讐問由是學中以下坐為貴徴辟并不起號曰徵君夏馥圉人少為書生言行質直桓帝初舉直言不就馥雖不交時宦然以聲名為中官所憚遂與范滂張儉等俱被誣害詔下州郡捕為黨魁及儉等亡命所連引布滿天下馥頓足歎曰孽自已作空汚良善一人逃死禍及萬家何以生為乃自翦鬚變形入林慮山中隱匿姓名為冶家傭親突煙炭形貌毁瘁積二三年人無知者黨禁未解而卒申屠蟠外黄人九歲喪父哀毁過禮服除不進酒肉十餘年每忌日輒三日不食家貧傭為漆工郡召為主簿不行遂隱居精學博貫五經兼明圖緯太尉黄瓊辟不就再舉有道不就先是京師遊士范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風蟠乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮蟠確然免於議論大將軍何進連徴不詣中平五年復以博士徵不至明年董卓廢立蟠及荀爽韓融等復俱公車徵惟蟠不到居無幾爽等爲卓所脅迫惟蟠終全高志年七十四終於家張升尉氏人少好學多閲覽而任情不羈其意相合者傾身交結不問窮賤如乖其志好者雖王公大人終不屈從仕郡爲綱紀以能出守外黄令遇黨錮去官後竟見誅著賦誄頌碑書凡六十篇升去官歸鄉里道逢友人共班草而言相抱而泣有老父趨而過之植其杖太息言曰夫龍不隱鱗鳳不藏羽網羅高懸去將安所雖泣何及乎二人欲與之言不顧而去莫知所終按後漢書逸民傳有陳留老父舊志另載人物今附注於此李曇潁川人少孤繼母嚴酷曇事之愈謹爲鄉里所稱法陳蕃等薦之曰曇德行純備擢登三事必能贊宣盛美增光日月桓帝以安車纁幣徴之不起養親行道以終於家張元祖潁川人時符融妻亡貧無殯殮鄉人欲爲具棺服融不受元祖弔之謂言禮設棺槨制杖車孔子曰我從周便推所乘羸車牛命融以給殯融受而不辭蔡邕圉人性篤孝母常滯病三年未嘗解襟帶不寢寐者七旬與叔父從弟同居三世不分財少博學好辭章術數天文妙操音律建寕三年辟司徒橋元府召拜郎中校書東觀遷議郎邕與五官中郎將堂谿典等奏求正定六經文字靈帝許之邕乃自書丹於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉光和中詔引入崇徳殿問災異又特詔邕指陳政要邕言切直帝覽而嘆息左右皆側目思報中常侍程璜飛章陷邕與家屬徙朔方會赦還董卓辟之累拜左中郎將封高陽鄉侯及卓被誅王允收邕付廷尉遂死獄中所著凡四百篇傳於世鄭泰衆曾孫少有才畧靈帝末舉孝廉三府辟公車徴皆不就何進輔政以泰為尚書侍郎遷侍御史進將誅閹官欲召董卓為助泰諌不能用乃棄官去進尋見害卓作亂泰與何容荀攸共謀誅之事洩容等被執泰脫身東歸道卒邊讓浚儀人少辯博能屬文作章華賦知名於時大將軍何進聞其才召署令史議郎蔡邕深敬之屢遷九江太守初平中去官歸家恃才氣不屈曹操多輕侮之言操殺之三國魏任峻中牟人寛厚有度而見事理漢末亂關東皆震峻說中牟令楊原權行河南尹事使諸縣堅守魏武起關東入中牟界峻收宗族賓客家兵數百人以從魏武大悅表為騎都尉每征伐峻常居守以給軍時歲飢軍食不足潁川棗祗建置屯田魏武以峻為典農中郎將數年中所在積粟倉廪皆滿以功封都亭侯遷長水校尉於飢荒之際收恤朋友孤遺中外貧宗周急繼乏信義見稱卒謚曰成徐庶潁川人原名福少好任俠擊劒中平末甞為人報仇為吏所得黨伍共篡解之得脫於是棄其刀戟折節學問客荆州與諸葛亮相善昭烈南行亮與庶并從魏武獲庶母庶辭昭烈指其心曰本欲與將軍共圖王霸之業者以此方寸地也今已失老母方寸亂矣無益於事請從此别遂詣魏仕至右中郎將御史中丞邯鄲淳一名竺潁川人博學有才又善蒼雅蟲篆許氏宇指魏武素聞其名召與相見甚敬異之黄𥘉中為博士給事中作投壺賦千餘言奏之文帝以為工賜帛千匹繁欽潁川人以文才機辨少即得名汝潁長於書記又善為詩賦其所與太子書記率皆巧麗後為丞相主簿棗柢潁川人本姓棘先人避難易為棗嘗為屯田都尉施設田業歲則大收軍用豐足郭嘉陽翟人初見袁紹以紹好謀無決遂去之先是潁川戲志才籌畫士也魏武甚器之早卒魏武與荀彧書汝潁固多奇士誰可繼之彧薦嘉召見論天下事魏武曰使孤成大業者必此人也表為司空軍謀祭酒征呂布説魏武急攻之遂擒布孫䇿將襲許衆聞皆懼嘉曰策輕而無備必死於匹夫之手䇿果為許貢客所殺從破袁紹紹死又從討紹子譚尚於黎陽諸將欲乘勝攻之嘉請緩之以待其變可一舉而定冀州平封嘉洧陽亭侯魏武將征烏丸諸侯多懼劉表使劉備襲許嘉曰表坐談客耳才不足以御備公無憂嘉深通有算畧達於事情魏武曰惟奉孝為能知孤意年三十八卒孫敞有才識位散騎常侍毛玠陳留平邱人少為縣吏以清公稱魏武為司空丞相玠嘗為東曹掾與崔炎共典選舉其所舉用皆清正之士雖於時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以廉節自勵玠居顯位常布衣疏食撫育孤兄子甚篤賞賜以賑施貧族家無所餘遷右軍師魏國初建為尚書僕射復典選舉黜免卒於家阮瑀尉氏人少受業於蔡邕建安中都䕶曹洪欲使掌書記瑀不為屈魏武以為司空軍謀祭酒管記室始文帝為五官將及平原侯植皆好文學瑀與山陽王粲北海徐幹廣陵陳琳汝南應瑒東平劉楨并見友善軍國書檄多琳瑀所作也徙為倉曹掾屬卒辛毗陽翟人魏武表為議郎遷丞相長史文帝踐阼遷侍中帝欲徙冀州士家十萬户實河南時連蝗民飢羣司以為不可而帝意甚盛毗求見帝作色曰卿謂我徙之非耶對曰誠以為非也帝不答起入内毗隨而引其裾帝良久乃出曰卿持我何太急耶毗曰今徙既失民心又無以食也帝遂徙其半明帝即位進封潁鄉侯時劉放孫資制斷時政大臣莫不交好而毗不與徃來毗子敞諌毗正色曰吾之立身自有本末就與孫劉不平不過令吾不作三公而己焉有文夫欲為三公而毁其高節者耶出為衛尉卒諡曰肅趙儼陽翟人魏武以為朗陵長恩威并著入為司空掾屬主簿并參于禁樂進張遼三軍時諸將任氣多不協儼每事訓諭遂相親睦累遷為關中䕶軍明帝時進封都鄉侯遷司空卒初儼與同郡辛毗陳羣杜襲並知名號曰辛陳杜趙云鄭渾泰弟避難投華歆魏武聞其篤行召為下蔡長厯召陵令辟為丞相掾屬時天下未定民生子率皆不舉渾所在課耕桑重去子法民皆豐贍所育男女多以鄭為字遷左馮翊平山賊梁與靳富等魏武征漢中以渾為京兆尹民安於農盜賊止息文帝即位累遷將作大匠渾清素在公妻子不免飢寒及卒以其子崇為郎中高柔圉人父靖為蜀郡都尉卒於西州時兵寇縱横柔冒艱險詣蜀迎喪辛苦荼毒無所不嘗三年乃還魏國初建為尚書郎文帝四年遷為廷尉屢上䟽諫爭在官二十三年遷司空徙司徒封安國侯轉為太尉卒諡曰元蘇林陳留人傳學多通古今字指凡諸書傳文間危疑林皆釋之黄初中為博士給事中官至散騎常侍以老歸第帝每遣人就問之數賜遺年八十餘卒范粲丹孫高亮貞正有丹風博渉强記學皆可師應辟為治中厯職皆有聲稱遭母憂以至孝稱服闋為太宰中郎齊王芳𬒳廢粲素服拜送哀動左右稱疾闔門不岀特詔為侍中粲因陽狂不言寢所乗車足不履地晉太康六年卒時年八十四不言三十六載終於所寢之車晉阮籍瑀子容貌瓌傑志氣宏放博覽羣籍尤好莊老嗜酒能嘯善彈琴曹爽召爲參軍以疾辭及爽誅時人服其逺識晉宣帝命爲從事中郎封關内侯徙散騎常侍籍屬天下多故不與世事以酣飲爲常文帝𥘉欲爲武帝求婚於籍沈醉六十日不得言而止鍾㑹欲致之罪皆以酣醉獲免拜東平相乘驢到郡法令清簡文帝引爲大將軍從事中郎籍聞歩兵廚善釀貯酒三百斛求爲歩兵校尉年五十四卒子渾字長成以閒淡寡欲知名京邑阮咸籍兄子任達不拘與籍爲竹林之遊厯仕散騎侍郎咸妙解音律荀朂與咸論樂自以爲遠不及也嫉之出𥙷始平太守卒庾純乘之孫博學有才義爲世儒宗補主簿仍參征南府厯中書令河南尹初純以賈充奸佞與任敳共舉充西鎮關中充由是不平充嘗宴朝士而純後至及純行酒充不飲純曰長者爲夀何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下兇兇由爾一人充曰充輔佐二世蕩平巴蜀有何罪而天下爲之兇兇純曰高貴鄉公安在衆坐因罷充慚怒上表解職純亦上河南尹印綬上表自劾後拜少府卒鄭黙泰孫子起家祕書郎考覈舊文删省浮穢武帝時為散騎常侍帝出杞南郊使黙驂乗問以政事善之黙寛沖博愛謙虚温謹不以才地矜物事上以禮遇下以和累官大司農光祿卒諡曰成禇䂮陽翟人有局量以幹用稱嘗為縣吏事有不合令欲鞭之䂮曰物各有所施榱椽之材不可以為藩落也願明府垂察乃舍之家貧辭吏年垂五十鎮南將軍羊祜與䂮有舊言於武帝始被升用官至安東將軍董養浚儀人泰始初到洛下不干祿求榮及楊后廢因著無化論以非之謂謝鯤阮孚曰易稱知幾其神乎君等可深藏矣乃與妻荷擔入蜀莫知所終阮种尉氏人弱冠有殊操為嵇康所重察孝廉為公府掾時召舉賢良方正直言之士太保何曾舉种賢良對䇿擢為第一轉中書郎种進止有方正己率下朝廷咸憚其威容每為駁議事皆施行遷平原相卒庾旉純子少有清節厯位博士齊王攸就國旉上表諫武帝怒下廷尉免死後數歳復起為散騎侍郎終國子祭酒江統圉人靜黙有遠志除山陰令時關隴屢為氐羌所擾統謂宜杜其萌作徙戎論時服其深識遷中郎選司轉太子洗馬上書陳五事朝廷善之及太子廢徙許昌賈后諷有司不聽宮臣追送統冒禁至伊水拜辭道左悲泣流漣收付洛陽獄尋免太子薨統作誄敘哀為世所重官至黄門侍郎散騎常侍卒庾衮鄢陵人少履勤儉篤學好問事親以孝聞咸寕中大疫二兄俱亡次兄毗復殆父母諸弟出次於外衮獨留不去親自扶持晝夜不眠十有餘旬毗病得差衮亦無恙父老咸異之初衮諸父並貴盛惟父獨守貧約衮躬親稼穡以給供養父亡作筥賣以供母母終服喪居於墓側州郡察孝廉舉秀才清白異行皆不降志世遂號之為庾異行會賊張宏等肆掠於陽翟衮乃率族姓保於禹山賊畏其整皆退後攜妻子入林慮山而卒潘岳中牟人少以才頴見稱郷邑號為奇童辟司空太尉府舉秀才泰始中武帝躬耕籍田岳作賦以美其事才名冠世為衆所疾栖遲十年出為河陽令勤於政績遷給事黄門侍郎後為孫秀所害岳美姿儀辭藻絶麗尤善爲哀誄之文潘尼岳從子少有清才與岳俱以文章見知性靜退不競惟以勤學著述爲事常著安身論以明所守太康中舉秀才爲太常博丁元康初拜太子舍人上釋奠頌趙王倫時託疾歸聞齊王冏起義乃赴許昌冏引爲參軍封安昌公累官中書令太常卿高光柔子少習家業明練刑理累遷廷尉元康中從駕討成都王頴有勲封延陵縣公時朝廷咸推光明於用法故頻典理官惠帝幸長安朝臣莫有從者光獨侍帝而西遷尚書左僕射加散騎常侍及懷帝即位加光禄大夫與傅祗並見推崇終尚書令范喬粲子好學不倦父粲陽狂不言喬與二弟并棄學業絶人事侍疾家庭足不出邑里凡一舉孝廉八薦公府再舉清白異行又舉寒素一無所就所著有劉楊優劣論庾珉鄢陵人性純和好學行已忠恕厯散騎常侍侍中封長岑男懷帝之没劉元海也珉徙在平陽元海大㑹使帝行酒珉不勝悲憤因大號哭賊惡之遂遇害太元末追諡曰貞庾敳珉弟雅有遠韻處衆人中居然獨立累遷吏部郎參東海王越太傅軍事轉軍諮祭酒時劉輿見任於越人士多為所搆惟敳縱心事外無跡可閒後以石勒之難被害阮修咸從子好易老善清言性簡任絶不喜見俗人雖當世富貴不肯顧家無擔石之儲晏如也王衍自以論易畧盡然有未了硏之終莫悟及與談言寡而㫖暢乃歎服焉常作大鵬贊以自况後為鴻臚丞轉太子洗馬避亂為賊所害蔡豹圉城人有氣幹元帝時為振武將軍官徐州刺史阮瞻咸子性清虛寡欲自得於懷讀書不甚硏求而黙識其要遇理而辯辭不足而㫖有餘神氣沖和識者歎其恬澹不可榮辱仕為太子舍人卒弟孚性閑暢明帝時官侍中從平王敦賜爵南安縣侯後除都督交廣寕三州軍事鎮南將軍庾闡鄢陵人㓜好學九歲能屬文永嘉末母隨兄肇殁於石勒之亂闡不櫛沐不婚宦絶酒肉垂二十年鄰親稱之蘇峻之難闡奔郗鑒為司空參軍峻平以功賜爵吉陽縣男出補零陵太守徴拜給事中卒諡曰貞子肅之亦有文藻官至湘束太守庾亮衮弟子明穆皇后兄也風格峻整動由禮節閨門之内不肅而成元帝甚器重之中興初拜中書郎侍講東宫時帝方任刑法以韓子賜太子亮諌以申韓刻薄傷化不足留聖心太子甚納焉累遷中書監加左衞將軍以功封永昌縣公成帝初徙中書令蘇峻平亮鎮蕪湖郭黙叛亮率步騎二萬討破之遷都督江荆豫益梁雍六州諸軍事征西將軍鎮武昌卒諡文康庾冰亮弟以雅素垂風初徴為祕書郎預討華軼功封都鄉侯出補吳興内史累官中書監既當重任經綸時務不舍晝夜賓禮朝賢升擢後進由是朝野注心咸曰賢相康帝即位力求外出領江州刺史鎭武昌卒諡忠成冰天性清慎嘗以儉約自居室無妾媵家無私積世以此稱之庾翼冰弟風儀秀偉少有經綸大畧初為太尉府參軍累遷南蠻校尉領南郡太守石城被圍得全翼之勲也賜爵都亭侯授都督江荆司雍梁益六州諸軍事安西將軍荆州刺史鎮武昌戎政嚴明經畧深遠自河以南皆懷歸附康帝即位翼欲率衆北伐詔加都督征討軍事後還鎮夏口卒諡曰肅禇裒䂮之孫康獻皇后父也少有簡貴之風桓彝見而目之曰季野有皮裏春秋謝安恒曰裒雖不言而四時之氣備矣郗鑒辟為參軍蘇峻平封都鄉亭侯康帝即位拜江州刺史在官清約徴拜侍中衞將軍錄尚書事裒以近戚固請居藩於是改授都督出鎮京口及石虎死表請伐之除征討大都督率衆三萬徑進彭城河朔士庶歸降者日以千計裒撫納之甚得其心還鎮病卒遠近嗟悼子歆以學行知名厯散騎常侍祕書孫爽少有令名為義興太守早卒褚翜裒從兄以才藝幹畧稱襲爵關内侯厯官奮武將軍淮南内史王敦搆逆征西將軍戴淵令翜出軍赴難翜即遣將領五百人從之成帝初為左衞將軍蘇峻之亂翜與王導抱帝登殿侍立左右峻兵入翜正立呵之兵不敢動賊平以功封長平縣伯遷丹陽尹累遷尚書左僕射卒阮放修族弟除太學博士厯遷吏部郎在銓管之任甚有稱績成帝時為揚威將軍交州刺史卒放素知名而性清約不營產業為吏部郎不免飢寒王導庾亮以其名士常供給衣食阮裕放弟以德業知名為王敦主簿甚被知遇𥙿以敦有不臣之跡乃終日酣觴以酒廢職出為溧陽令復免由是得違敦難論者貴之常以人不須廣學正應以禮讓為先故終日靜黙無所修綜而物自宗焉曾有好車借無不給有人葬母意欲借而不敢言後𥙿聞之歎曰吾有車而使人不敢借何以車為遂命焚之後屢徵不起庾龢好學有文章叔父翼將遷襄陽龢年十五以書諫翼甚奇之升平中為丹陽令表除重役六十餘事遷中領軍卒江虨統子官尚書僕射簡文帝為相每訪政事多所補益終國子祭酒江淳虨弟孝友淳粹高節邁俗性好學每以為君子立行應依禮而動乃著通道崇儉論世咸稱之累徵不就養志二十餘年卒江逌圉人少孤與從弟灌共居甚相友悌避蘇峻之亂屏居臨海翦茅結宇耽玩載籍有終焉之志征北將軍蔡謨命為參軍何充復引為驃騎功曹求試守為太末令殷浩北伐請逌為諮議參軍軍中書檄皆以委之姚襄結營以逼浩逌以計破之升平中遷吏部郎長兼侍中穆帝將修後池起閣道逌上䟽諫帝嘉其言而止復領本州大中正遷太常在職多所匡諌江灌逌從弟少知名才識亞於逌簡文帝引為撫軍從事中郎遷吏部郎時謝弈為尚書銓敘不允灌每執正不從弈託以他事免之受黜無怨色頃之簡文帝以為撫軍司馬甚相賓禮遷御史中丞轉吳興太守灌性方正為桓温所惡徵拜侍中以在郡時公事有失追免之温卒遷尚書中䕶軍復出為吳郡太守卒范宣陳留人少尚隱遁加以好學博綜衆書尤善三禮家貧躬耕供養親殁負土成墳廬於墓側太尉郗鑒命為主簿詔徵太學博士散騎郎并不就所著有禮易論難行於世江績灌子有志氣以父與謝氏不睦故謝安之世辟召無所從安卒始為會稽王道子驃騎主簿多所規諌出為南郡相㑹荆州刺史殷仲堪舉兵應王恭要績與般顗同行不從顗慮績及禍乃於仲堪坐和解之績曰大丈夫何至以死相脇江仲元行年六十但未知獲死所耳一坐皆為之懼仲堪憚其堅正以楊佺期代之徵為御史中丞奏劾無所屈撓及卒朝野悼之南北朝宋庾登之冰曾孫少以强濟自立初為宋武帝鎮軍參軍預討桓元功封曲江縣男謝晦為荆州刺史請為長史意甚不愜晦拒王師欲登之留守登之不許晦敗以無任免官還家後為司徒長史時彭城王義康專攬政事不欲自下屠意登之性剛每陳已意義康不悅出為吳郡太守坐免後拜豫章太守褚湛之衰之曾孫文帝時拜著作佐郎謹實有意幹故為帝所知厯顯位孝武初累遷尚書左僕射賜爵關内侯阮長之尉氏人年十五喪父有孝性哀感旁人服除䟽食者猶積載閒居篤學未嘗有惰容初為諸府參軍累遷臨海太守母亡葬畢不勝憂遂卒庾仲遠登之子初為宋明帝府佐景和中明帝疑防賓客故人無到門者惟仲遠朝謁不替明帝即位謂曰卿所謂疾風知勁草自錄軍事參軍擢拜太子中庶子卒於豫章太守禇炤湛之從子少有高節王儉稱炤才堪保傅召為國子博士不拜常非從兄淵身事二代淵拜司徒賓客滿座炤歎曰彦回少立名行何意披猖至此門户不幸乃復有今日之拜淵以軺車給炤炤大怒曰著此辱門户索火燒之齊庾道愍冰元孫有孝行所生母漂流交州道愍尚在襁褓及長知之求為廣州綏寕府佐至府而去交州尚遠乃自負擔冒險求母經年日夜悲泣嘗入邨日暮雨驟乃寄止一家有一嫗負薪自外還道愍心動訪之即其母也於是俯伏號泣遠近聚觀莫不揮淚後仕齊至射聲校尉蔡薈陳留人清抗不與俗人交李撝謂江斆曰古稱安貧清白曰夷湼而不緇曰白蔡休明可不謂之夷白乎梁庾沙彌冰六世孫父佩玉爲長沙内史昇平中坐誅時沙彌始生及年五歲所生母爲製采衣不肯服終身布衣疏食嫡母劉寢疾沙彌晨夕侍側衣不解帶或應針灸輒以身先試及母亡晝夜號慟所坐薦淚沾爲爛墓在新林忽生旅柏百許株枝葉鬱茂劉好噉蔗涉彌遂不食焉舉純孝梁武帝召見補歙令遷邵陵王參軍隨府會稽復丁所生憂喪還濟浙江中流遇風舫將覆沒沙彌抱柩號哭俄而風静咸謂孝感所致後卒於長城令阮孝緒尉氏人幼至孝年十三徧通五經既冠屏居一室非定省未嘗出户外兄王宴貴顯屢至門孝緒穿籬逃匿不與相見及晏誅竟獲免家貧所居以一鹿牀爲精含以樹環繞天監中與吳郡范元炎俱徵並不到後於鍾山聽講母王氏忽有疾卂弟欲召之母曰孝緒至性冥通必當自到果心驚而返合藥須得生人葠舊傳鍾山所岀孝緒躬厯幽險累日不逢忽見一鹿前行孝緒隨至一所果獲此草母服之遂愈大同二年卒門徒追論德行諡曰文貞處士所著七錄削繁等一百八十一卷并行於世鄭紹叔開封人年二十餘為安豐令有能名武帝初起兵為冠軍將軍留監江州事督江湘糧運無闕乏入為衛尉郷紹叔少孤貧事母及祖母以孝聞奉兄恭謹及居顯要糧賜餉遺悉歸之兄室忠於事上所聞纖亳無隱帝甚親信之封東興縣侯累遷司州刺史徵為左衞將軍卒諡曰忠庾仲容登之從孫少有盛名專精博學晝夜手不釋卷初為安西法曹參軍太子舍人除安成王記室太子以舊恩降餞賜詩時輩榮之後為尚書左丞有文集二十卷行於世庾承先鄢陵人少沈靜有志操是非不涉於言喜愠不形於色人莫能窺也受學於劉虬强記敏識靡不該悉辟功曹不就大通三年卒刺史厚有贈賻門人黄士龍讓曰先生平素食不求飽衣不求輕凡有贈遺皆無所受雖蒙賚及不敢輕承教㫖以違平生之操時論高之褚翔陽翟人少有孝行起家祕書郎累遷義興太守徵為史部郎居小選公清自持不為請屬易意號為平允遷侍中守吏部尚書丁母憂以毁卒陳阮卓尉氏人幼聰敏篤志經籍尤工五言詩性至孝父問道卒於江州卓年十五自都奔赴水漿不入口者累日載柩還渡彭蠡湖中流過疾風船幾没者數四卓仰天悲號俄而風息天康中為新安王府記室參軍奉使招慰交阯其地多珍怪之產前後使者皆致之惟卓挺身而還衣裝無他時論咸服其廉後為德敎殿學士除南海王府諮議參軍不之官退居里舍以文酒自娛褚玠陽翟人九嵗而孤及長博學能屬文訓義典實不好艷靡大建中除山陰令去官無還裝太子手書賜粟二百斛累遷御史中丞甚有直繩之稱卒於官所著章奏雜文二百餘篇皆切事理以此見重於世子亮有才學官至尚書殿中侍郎魏鄭羲渾八世孫仕魏為中書博士遷中書侍郎延興初陽武民田智度妖惑動衆擾亂京索以羲為河南民望遣乘傳慰諭羲至宣示禍福重加募賞句日之閒衆皆歸散以功賜爵平昌男累封滎陽侯子懿閒雅有政事材爲齊州刺史次子道昭少好學綜覽羣言厯官祕書監董養小黄縣人事親至孝三世同居閨門有禮景明初畿内大使王凝奏請標異詔從之王續生京縣人遭繼母憂居喪杖而後起及終禮制鬢髮盡落世宗詔標門里甄其徭役張昇滎陽人喪父哀毁形骸枯悴髮落殆盡盜賊不侵其閭詔表之倉跋京縣人喪母水漿不入口五日吐血數升居憂毁瘠見稱州里王崇雍邱人兄弟并以孝稱身勤稼穡以養二親母亡杖而後起鬢髪墜落廬於殯所晝夜哭泣母喪闋復丁父憂哀毁過禮是年夏風雹所經草木摧折至崇田畔便止禾麥十頃竟無損落咸稱至行所感崇雖除服仍居墓側州奏標其門閭李顯達陽翟人父喪水漿不入口七日鬢髪墜落形體枯瘁六年廬於墓側哭不絶聲州牧高陽王雍以聞詔旌其門北齊鄭述祖道昭少子少聰敏好屬文有風檢天保中爲兖川刺史遷光州刺史病篤自言曰吾老矣富貴己足以清白之名遺子孫死無所恨前後行瀛殷冀滄趙定六州事正除懷兖光及殷懷趙等州刺史所在皆有惠政卒諡曰平簡鄭子飜羲曾孫少有器識好文章齊武平末位司徒記室參軍齊亡厯周隋不仕隱居滎陽三窟山遠近欽其高名累徵不起終於家隋劉祐滎陽人開皇𥘉為大都督其所占候合如符契奉詔撰兵書十卷名曰金韜後著陰策二十卷觀臺飛候六卷元象要記五卷律厯術文一卷婚姻志三卷產乳志二卷式經四卷四時立成法一卷安厯志十二卷歸正易十卷並行於世王貞陳留人少聰明七歲好學通毛詩禮記左氏傳周易諸史百家無不畢覽善屬文不事產業開皇初舉秀才授縣尉非其好也謝病歸齊王暕鎮江都聞其名以書召之及至待以客禮索其文集貞上三十三卷王善之後上江都賦賜錢十萬貫以疾還終於家前總纂官臣張琴恭纂輯提調官臣張日章恭覆輯校對官臣夏勲恭校校對官臣章詒燕恭覆校
