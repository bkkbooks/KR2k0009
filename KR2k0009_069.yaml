臼也鄶城在密縣東北五十里接新鄭縣界周初封國詩有檜風國語史伯曰妘姓鄢鄶路偪陽平王時鄭武公滅鄶而併其地左傳僖公三十三年鄭葬公子瑕於鄶城之下杜預注古鄶國在滎陽密縣東北詩正義鄶即鄭地元和志在鄭州新鄭縣東北三十二里林鄉城在新鄭縣東二十五里春秋宣公元年㑹晉師於棐林伐鄭注棐林鄭地滎陽苑陵縣東南有林鄉戰國䇿信陵君曰從林鄉以至於今秦七攻魏後漢書郡國志苑陵有棐林華城在新鄭縣東南亦名華陽亭古華國春秋時鄭地戰國屬韓晉書嵇康嘗游洛西暮宿華陽亭忽有客詣之與康共談音律因索琴彈之而為廣陵散遂以授康水經注黄水東南流逕華城西史伯謂鄭桓公曰華君之土也韋昭曰華國名史記秦白起攻魏拔華陽走芒卯司馬彪曰華陽亭名在密縣嵇叔夜嘗採樂於山澤學琴於古人即此亭也通許故鎭今通許縣治宋置屬陳留縣九域志在開封府東南九十里舊志有故城址在今縣北郭周十里明崇禎九年嘗修治之河陰倉在滎澤縣元二十二西廢河陰縣西元和志開年裴耀卿為相兼轉運都使分置河陰縣及河陰倉於河清縣置柏崖倉三門東置集津倉三門西置鹽倉三門北鑿山十八里陸行以避湍險自江淮來者悉納河陰倉白河陰候水調浮漕送含嘉倉又取曉習河水者遞送太原倉所謂北運也自太原倉浮渭以入關中石門在滎澤縣西北水經注滎瀆受河水有石門謂之為滎口石門地形殊卑葢故滎波所道自此始也又漢建寕四年於敖城西北壘石為門以遏渠口謂之石門故世亦謂之石門水門廣十餘文西去河三里水北有石門亭劉昭曰石門在滎陽水北一里軒轅邱在新鄭縣西北故城史記黄帝居軒轅之邱後漢書郡國志河南尹新鄭黄帝之所都通典新鄭祝融之墟黄帝都於有熊亦在此也萬人聚舊志在𣏌縣西十五里王莽將王邑破翟義於此高二文餘俗呼為蜂火臺按此即水經注魯溝所經萬人散也當在縣南圉鎭曲遇聚在中牟縣東史記曹參世家西擊秦將楊熊於曲遇注徐廣曰在中牟後漢書郡國志中牟有曲遇聚陽關聚在禹洲西北後漢書王莽遣王邑將兵百萬到潁川光武將數千兵邀之於陽關注聚名也在今洛州陽翟縣西北水經注潁水東南流逕陽關聚聚夾水相對俗謂之東西二土城汴故宫在祥符縣城内正北五代梁建都以軍治為宫晉為大安宫宋時謂之大内金因舊址少更之明初建周王府宋史地理志建隆三年廣皇城東北隅命有司畫洛陽宫殿按圖修之宫城周圍五里南三門東西兩門北一門正殿曰大慶正衙殿曰文德大慶殿北有紫宸殿視朝之前殿也西有垂拱殿常日視朝之所也次西有皇儀殿又次西有集英殿宴殿也殿後有需雲殿東有昇平樓宫中觀宴之所也宫後有崇政殿閲事之所也殿後有景福殿西有殿北向曰延和便坐殿也凡殿門皆隨殿名宫中又有延慶安福觀文清景慶雲玉京等殿夀安堂延春閣福安殿其東眞君殿曰積慶前建感眞閣又有龍圖閣下有資政崇和宣徳述古四殿天章閣下有羣王蕊珠二殿後有寶大閣閣東西有嘉德延康二殿苑内有崇聖殿太清樓其西又有宣聖化成金華西涼清心等臀翔鸞儀鳳二閣華景翠芳瑤津三亭延福宮有穆清殿延慶殿北有柔儀殿崇徽殿北有欽明殿延福宫北有廣聖宫内有太清五清沖和集福會祥五殿建流杯殿於後苑又有慈德殿觀稼殿延曦閣邇英殿隆儒殿慈夀殿慶夀殿保慈宫玉華殿基春殿睿思殿承極殿崇慶隆祐二宫睿成宫宣和殿聖瑞宫顯謨閣玉虛殿玉華閣親𧖟宫燕安殿延福宫保和殿玉清神霄宫上清寶籙宫金史地理志南京正殿曰大慶殿東廡曰嘉福樓西廡曰嘉瑞樓大慶後曰德儀殿内有隆德殿隆德之次曰仁安殿仁安之次曰純和殿正寢也西曰雪香亭亭北則后妃位也有樓樓西曰瓊香亭亭西曰涼位有樓樓北少西曰玉清殿純和之次曰福安殿殿後曰苑門内曰仁智殿有二太湖石左曰敷錫神運萬嵗峯右曰玉京獨秀太平巖苑門東曰仙韶院院北曰湧翠峯東連長生殿又東曰湧金殿又東曰蓬萊殿長生西曰浮玉殿又西曰瀛洲殿長生殿南曰閲武殿又南曰安泰門東則夀聖宫北曰徽音院又北曰燕夀殿徽音夀聖東曰太后苑苑殿曰慶春明統志洪武十一年即其故址建周王啜漢武帝行宫寰宇記在陳留縣羅城内漢元狩元年建今廢為倉逍遙宫寰宇記在陳留縣南六里隋大業二年建今廢艮嶽在祥符縣城内東北隅宋徽宗所築王禹偁東都事略政和𥘉作壽山艮嶽於築城之東陬高十餘仞有飛来峯梅嶺杏岫黃楊巘丁香嶂椒崖龍板坡循壽山而西曰斑竹麓瀑布屏從艮嶽之麓曰朝眞磴海棠川神運峯其他軒榭庭徑各有巨石布列並與賜名宋史地理志政和七年始作萬嵗山山周十餘里宣和四年徽宗自為記以在國之艮故名艮嶽六年又改名壽峯嶽之正門曰陽華故亦號陽華宫自政和迄靖庫積累十餘年四方怪竹竒石悉聚於斯樓臺亭館不可數計及金兵圍城日久欽宗命拆屋為薪鑿石為礮云宜春苑在祥符縣東門外宋史建隆元年幸宜春苑玉海玉津瓊林瑞聖宜春宋時為四苑園瓊林苑在祥符縣西門外宋乾德二年置遇放榜設聞喜宴於此東京夢華錄瓊林苑與金明池相對三月一日開金明池瓊林苑池周迴九里直徑七里有臨水殿車駕臨幸觀爭標賜宴於此擷芳園在祥符縣城内西北隅宋史地理志景龍江北有龍德宫其地嵗時次第展拓後盡都城一隅名曰擷芳園通志本宋徽宗潛邸即位廣之芳林園在祥符縣城内東北宋太祖潛邸時園也即位後號曰潛龍後改奉眞天聖七年又改名芳林梁園在祥符縣城東南一名梁苑亦名兔園漢梁孝王遊賞之所唐李白有梁園吟玉津園在祥符縣南門外夾道爲兩園引閔河別流