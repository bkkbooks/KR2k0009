front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_069-1a}
body:
  text: 開封府二古迹故東京城今府城故基五代梁建東都後唐罷晉復曰東京宋因之侯鯖録開封舊城即汴州城唐建中二年節度使李勉重築宋𥘉號曰闕城亦曰裏城周顯德三年詔别築新城號曰小城亦曰羅城皆韓通王朴二人所經度宋史地理志東京舊城周圍二十里一百五十五步東二門北曰望春南曰麗景南三門中曰朱雀東曰保康西曰崇明西二門南口宜秋北曰閭闔北三門中曰景龍東曰安遠西曰天波新城周圍五十里一百六十五步大中祥符九年增築南三門中曰南薰東曰宣化西口安上東二門南曰朝陽北曰含輝西二門南曰順天北曰金輝北四門中曰通天東曰長景次東曰永泰西曰安肅汴河上水門南曰大通北曰宣澤汴河下南曰上善化北曰通澤惠民河上曰普濟下曰廣利廣濟河上曰咸豐下曰善利上南門曰永順其後又於金輝門南置開遠門金史地理志都城門十四李夢陽修城記河南省城郎宋之內京城其外城已毁新里故城在祥符縣東三十里寰宇記隋開皇十六年分浚儀置新里縣大業二年廢唐武德四年復置貞觀元年又廢開封故城在祥符縣南五十里戰國魏邑史記韓釐王二十一年使暴鳶救魏為秦所敗鳶走開封秦二世三年酈商將陳留兵攻開封漢高祖封功臣陶舍為侯邑後為縣屬河南郡後漢因之晉改屬滎陽郡後魏太平真君八年併入苑陵景明元平復置孝昌中改屬陳留郡東魏天平初增置開封郡北齊郡廢隋屬滎陽郡唐屬卞州貞觀元年省入浚儀延和元年復置移入州郭管東界明初省入祥符浚儀故城在祥符縣西北史記魏惠王三十一年徙治大梁泰始皇二十二年王賁攻魏引河溝灌大梁大梁城壞其王請降盡取其地漢書地理志陳留郡浚儀縣故大梁水經注大梁城夲春秋之陽武高陽鄉也於戰國為大梁周梁伯之居也後魏惠王自安邑徙都之故曰梁秦滅以為縣漢文帝封孝王於梁孝王東都睢陽自是置縣以大梁城廣居其東城夷門之東夷門即侯嬴抱關處也舊唐書地理志汴州浚儀古縣隋置在今縣北三十里為孝密所陷縣人王要漢率豪族置縣於汴州之內武德四年移縣於州北羅城內貞觀元年移於州西一里按左傳所載梁伯大其城號曰新里在今陜西同州有新里城水經注即以為大梁城誤陳留故城今陳留縣治公羊傳古者鄭處於留後鄭伯取檜遷鄭而野留漢書地理志陳留郡陳留注孟康曰留鄭邑也後為陳所并故曰陳留臣瓚曰宋亦有留彭城留是也留屬陳故曰陳留城李吉甫元和郡縣也魏書地形志開封有陳留志陳留縣西至汴州五十里開皇二年分浚儀置寰宇記小陳留城在縣南三里晉太康地道記曰陳留先有陳留縣以北有大城故此號小城按陳留晉志不載故寰宇記以為西晉末廢而隋志謂為後魏廢又按括地志元和志所記至州道里俱與今縣合明統志云在縣北三十里誤小黃故城在陳留縣東北戰國魏邑史記黃歇説秦昭王曰王取首垣以臨平邱小黃即此漢置縣晉泰始元年封魏廢帝為陳留王移治於此水經注濟水徑小黃縣故城北縣故陽武之東黃鄉也因水以名縣北齊廢入陳留唐初復置屬汴州貞觀初又省括地志小黃故城在陳留縣東北三十三里寰宇記唐初小黃縣在陳留縣西南四十里雍邱故城今𣏌縣治春秋哀公九年宋皇瑗帥師取鄭師於雍邱史記韓景侯元年伐鄭取雍邱秦始皇五年蒙驁攻魏定雍邱二世二年沛公與項羽略地至雍邱與秦軍戰大破之漢書地理志陳留郡雍邱縣故𣏌國也周武王封禹後東樓公先春秋時徙魯東北魏黃初四年徙封弟植為雍邱王晉太興三年祖逖為豫州刺史鎮雍邱水經注汳水自鳴雁亭南又東徑雍邱故城北元和志雍邱夲漢舊縣亦古之雍國其城北臨汴河元史地理志元初於故城北二里河水北岸築新城置縣繼又修故城號南𣏌縣縣志張柔城在縣北五里即元時所築新城外黃故城在𣏌縣東左傳惠公季年敗宋師於黃杜預注黃宋邑陳留外黃縣東有黃城史記魏惠王三十年齊擊魏魏太子申為上將軍過外黃秦二世二年沛公與項羽略地雍邱還攻外黃漢書地理志陳留郡外黃縣都尉治張晏曰魏郡有內黃故加外臣瓚曰縣有黃溝故氏之也晉屬陳留國後魏廢魏書地形志濟陽縣有外黃城隋復置外黃縣屬濟陰郡唐初屬𣏌州貞觀六年復廢元和志外黃故城在雍邱縣東六十里又春秋昭公二十五年宋公佐卒於曲棘杜預注外黃城中有曲棘里圉縣故城在祀縣南春秋時鄭地左傳昭公五年韓宣子如楚送女反鄭伯勞諸圉後屬魏史記楚人以弋説襄王曰王朝張弓而射魏之大梁之南還射圉之東是也漢置圉縣屬淮陽國後漢屬陳留郡晉屬陳留國後廢後魏景明元年復置後改曰圉城屬陽夏郡北齊廢隋開皇六年復置圉城縣屬梁郡唐初屬𣏌州貞觀元年廢蕭德言括地志故圉城有南北二城在雍邱縣界寰宇記在縣南五十里金史地理志𣏌縣有圉城鎮縣志今名南圉鎮尉氏故城今尉氏縣治漢置縣應劭曰古獄官曰氏鄭之别獄也臣瓚曰鄭大夫尉氏之尉邑故遂以為名通鑑隋義寧元年尉氏城主時德睿應李密唐武德二年德睿降於王世充以為尉州刺史三年德睿以所部七州來降改尉州為南汴州元和志縣北至汴州一百里本漢舊縣武德四年置洧州貞觀元年廢以縣屬汴州寰宇記秦始皇二年置縣即南阮所居之所洧川故城在今洧川縣南十里金史地理志開封府洧川縣興定二年以尉氏縣之宋樓鎮升洧川縣志明洪武二年縣令俞廷芳以水患遷今治鄢陵故城在今鄢陵縣西北春秋隱公元年鄭伯克段于鄢成公十六年晉侯及楚子鄭伯戰於鄢陵楚子鄭師敗績史記韓宣惠王十四年秦伐敗我鄢漢書功臣表鄢陵侯朱濞高帝十二年封後漢書郡國志鄢陵春秋時曰鄢魏書地形志鄢陵縣有鄢陵城括地志鄢陵故城在今鄢陵縣西北十五里元和志鄢陵縣西北至許州七十五里縣志古鄢城在縣西北甘羅保北又縣南有朱濞城中牟故城在今中牟縣東水經注洙水經中牟縣故城薛瓚注漢書云中牟在春秋時為鄭之堰也及三卿分晉則在魏之境內元和志中牟縣西至鄭州七十里本漢舊縣縣理即古中牟故城寰宇記後周保定五年中牟移於今縣西三十里圃田城隋開皇十七年於中牟舊城置郟城縣十八年改圃田城曰圃田縣大業二年廢郟城縣移圃田縣於中牟城唐初復改中年縣志故城在今縣東六里明天順中移今治按中牟有二史記正義云相州蕩陰縣西有牟山趙中牟邑在山側此中牟乃鄭地其名中牟始於漢非趙中牟也班志謂趙獻侯自耿徙此誤東昏故城在蘭陽縣東北二十里夲古戶牖鄉左傳哀公十三年會於黃池吳人囚子服景伯以還及戶牖歸之史記陳平陽武戶牖鄉人索隱曰秦時戶牖鄉屬陽武至漢以戶牖為東昏縣屬陳留漢書地理志東昏縣莽曰東明魏書地形志濟陽縣有東昏城括地志東昏故城在陳留縣東北九十里寰宇記東明縣在開封縣東九十里即府界靜戎鎮之地尋為東明鎮西南去陳留縣八十里東昏故城在今縣西北金史地理志曹州東明縣初隸南京後避河患徙河北冤句故地後以故縣為蘭陽儀封有舊東明城明統志金析東明六鄉為縣取其首鄉曰蘭陽以為名縣志縣舊冶東北五里明洪武元年遷今冶濟陽故城在儀封廳北竹書紀年梁惠成王三十年城濟陽史記蘇代約燕王曰決白馬之口魏無外黃濟陽漢置縣屬陳留郡景帝中六年封梁孝王子明為濟川王應劭曰今濟陽縣也又元帝永元三年立子康為濟陽王後漢書南頓君初為濟陽令以建平元年生光武於縣舍晉屬陳留國後魏咸和二年置徐州於此皇興初州廢孝昌中改屬陽夏郡隋屬濟陰郡唐貞觀𥘉省入冤朐縣括地志濟陽故城在冤句縣西南三十五里舊志在今儀封廳北五十里儀封故城在儀封廳東北十七里金廢東明縣為通安堡元至大元年於此置縣明洪武二十二年圯於河遷於西南通安鄉之白樓村即今治也管城故城即今鄭州治周𥘉管叔封於此春秋時鄭地左傳宣公十二年楚子圍鄭晉師救鄭楚子次於管以待之韓非子魏安釐王攻韓拔管使縮高守之漢書地理志中牟有管叔邑杜預左傳注滎陽京縣東北有管城水經注汴家溝水徑管城西故管國也元和志管城縣自漢至隋皆為中牟縣地隋開皇十六年於此置管城縣又分置管州唐貞觀元年廢管七年自武牢移鄭州於今理明初縣省古大索城今滎陽縣冶左傳昭公五年晉韓宣子如楚送女鄭子皮子太叔勞諸索氏杜預注成皋縣東有大索亭水經主索水北徑小索亭西世語以為本索氏兄弟居此故號小索又北徑大柵城東晉滎陽民張卓董遇等遭荒流離鳩聚保固名為大柵塢魏太平真君中潁州刺史崔白自虎牢移州治比開廣舊城創制改築太和十七年遷都洛邑省州置郡索水又北屈東徑大索城南晉地道記所謂京有大索小索亭漢書京索之間也括地志今滎陽縣即大索城又有小索城在縣北四里按水經注分大柵大索為兩城括地志元和志合為一城晉灼曰索音柵蓋大柵即大索之訛不當分也須水故城在滎陽縣東三十里唐武德四年置須水縣屬管州貞觀元年省入滎陽京縣故城在滎陽縣東南左傳隱公元年鄭武薑為叔段請京使居之謂之京城太叔史記漢二年楚與漢戰滎陽南京索間應劭曰京縣名屬河南郡隋書地理志後齊省京縣入滎陽括地志京縣在滎陽縣東南二十一里即鄭之京邑滎陽故城在滎澤縣西南戰國時韓邑史記韓桓惠王二十四年秦拔我滎陽漢二年漢王兵大振滎陽破楚京索間後置縣後漢時兼置都尉獻帝起居注建安十八年省州并郡豫州得河南滎陽都尉魏志正始中傳嘏拜滎陽太守水經注索水徑滎陽縣故城南其城跨倚岡原居山之陽魏正始三年詔割河南郡鞏縣自闕以東創建滎陽郡蓋魏時己置郡晉因之也後魏太和十七年移郡治大柵城而此城廢括地志滎陽故城在滎澤縣西南十七里河陰故城在滎澤縣西元和志河陰廢縣西南至府二百三十里本漢滎陽縣地開元二十二年以地當汴河口分汜水滎澤武陟三縣地於輸場東置縣以便漕運即侍中裴耀卿所立舊志元時徙治廣武山北之大峪口明初又徙在滎澤縣西十五里本朝乾隆三十年省入滎澤滎澤故城在今滎澤縣北五里隋置明洪武八年為河水所圯遷今治成皋故城在汜水縣西北本古東虢國後屬鄭為制邑亦曰北制左傳隱公元年鄭莊公曰制巖邑也虢叔死焉五年鄭敗燕師於北制是也又名虎牢穆天子傳天子射獵於鄭圃有虎在乎葭中天子將至七萃之士高奔戎生捕虎而獻之天子命之為柙畜之東虞是為虎牢左傳莊公二十一年鄭伯定王室王與之武公之略自虎牢以東襄公二年孟獻子請城虎牢以逼鄭遂城虎牢其後為成皋戰國策三晉己破智氏將分其地段規謂韓王曰分地必取成皋韓王曰成皋石溜之地無所用之段現曰王用臣言則韓必取鄭王曰善取成皋至韓之取鄭果從成皋始史記秦莊襄王元年使蒙驁伐韓韓獻成皋漢三年漢王從滎陽走成皋晉書地理志成皋縣有關宋書州郡志武帝北平關洛置司州刺史治虎牢水經注河水經成皋縣北縣治伾山上縈帶伾阜岸絶峻周高四十許丈即虎牢也城西北隅又有小城周三里魏書地形志泰常中置北豫州治虎牢元和志開皇十八年改成皋為汜水縣開元二十九年自武牢城移於今理西南至河南府一百八十里舊志虎牢城在縣西二里明洪武二年改虎牢為古關置巡司戍守成化十七年裁今縣城即故關城唐時所移也成皋故城