  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_137-1a}
body:
  text: 永州府二古蹟泉陵故城在零陵縣北漢置主子侯表元朔王年封長沙定王子賢為衆陵侯顔師古曰即泉陵也隋書地埋志零陵舊曰泉陵置零陵郡元和志零陵縣本漢泉陵縣地隋改為零陵縣移治於此舊唐書地理志泉陵縣故城在今州北二里祁陽故城有二元和志縣南至永州一百八十里木泉陵縣地呉置隋廢舊唐志古城在今縣東北九十里此呉舊址也唐武德四年復置九域志縣在州北一百里此唐舊址也縣志舊城在今縣東南俯臨大江元時屢以江漲淹圯明景泰中移於東北高阜即今治營浦故城在道州北漢置縣三國呉置營陽郡尋廢晉穆帝復於縣置郡水經注營水徑營浦縣南營陽郡治魏咸熙二年呉孫皓分零陵置在營水之陽故以名郡齊梁間改郡曰永陽隋書地埋志永陽縣舊曰營陽梁改名置永陽郡平陳郡廢省營浦縣入蓋是時徙治唐又改名宏道元和志道州治宏道縣本漢營浦縣隋改曰永陽武德四年置營州移永陽於州西南移營道縣於州郭貞觀八年改州曰道州天寶初改縣曰宏道九域志建隆三年復改宏道曰營道明初始省入州舊志營浦故城在今州北營陽鄉地名大漢又有營道故城在州西四十里營山下唐初治此天寶初移今治按晉書東晉穆帝復置營陽郡宋書南齊書皆作營陽郡舊唐書地理志吳置營陽郡晉以爲永陽郡者誤也泠道故城在寕逺縣東漢置水經注九疑山東北爲泠道縣界又曰泠水北流徑泠道縣西南縣指泠溪以爲名隋省入營道舊唐書地理志漢泠道縣古城在今延唐縣東南四十里隋廢入營道仍於泠道廢城置營道縣武德四年移營道於州郭乃於此置唐興天寶元年改爲延唐按舊唐志既曰泠道城在延唐東南又曰隋於泠道廢城置營道縣唐改名二說自相背繆叅考新唐志蓋隋移營道治泠道城蕭銑又分營道置梁興縣至唐改梁興爲唐興非復泠道故治也營道故城在寕逺縣西漢置縣水經注馮水徑營道縣西右注營水營水又西北屈徑營道西舊志隋時徙冶泠道縣界唐改曰延唐元和志縣西至道州一百里本漢泠道縣之地隋自奔巢水口移營道縣於此武德四年又移營道縣於州郭内於此置唐興縣天寶元年改名舊志宋又移今治改名寕逺九域志縣在州東七十五里即今冶也按唐書地理志延唐木梁興蕭銑析營道縣置銑平更名與元和志異舂陵故城在寕逺縣西北漢置後漢城陽王祉傳長沙定王子賈元朔元年封泠道之舂陵鄉傳至考侯仁以地勢下溼山林毒氣求内徙初元四年徙於南陽之白水鄉而故城廢宋書州郡志舂陵前漢舊縣徙省呉復立仍屬零陵郡東晉改屬營陽郡宋齊因之水經注都溪水南徑舂陵縣西因春溪為名故城東又有一城東西相對各方百歩古老相傳言漢家舊城知是節侯故邑也東南三十里上有節侯廟隋平陳省入營道元和志舂陵故縣在延唐縣北五十里永明故城在今永明縣南唐初所置永陽縣也舊唐書地理志武徳四年於郭内置營道縣乃移永陽於州西南一百十里貞觀八年省入營道天授二年復析營道置天寶元年改曰永明宋史地理志熙寕五年省為鎮入道州元祐元年復置縣志永明縣故址在今縣西白塔山後又移治瀟江之南有城周一里有竒元時移今治馮乘故城在江華縣西南漢置唐析置江華縣元和志江華縣本漢馮乘縣地故城在縣南七十里蓋隋唐間徙治也宋開寶四年省舊志在縣西南六十里廣西富川縣界江華故城在今江華縣東南唐書地理志江華武德四年析賀州之馮乘縣置元和志縣北至州一百十三里九域志在道州南九十里蓋己徙而北也縣志唐初置縣在五保之地神龍初遷於寒亭北陽華巖之江南故名江華明洪武二十八年析寕逺衞置右千户所於縣建城於今縣治隔江之東名鎮守所城天順中遷治西北五里地名黃岡合縣所為一城即今治也大厯故城在新田縣西元和志道州大厯縣西北至州二百二十里本漢營道縣地大厯二年觀察使韋貫之奏析延唐縣置因年號為名宋史地理志乾道三年廢大厯縣明統志廢縣立舂陵故城北十五里永昌廢縣三國呉分泉陵置屬零陵郡晉及宋齊以後因之隋省入零陵明統志在祁陽縣西八十里應在今縣西北祁江之北石燕山之東應陽廢縣在東安縣東北晉置王隱晉書應陽本泉陵之北部沈約宋書晉惠帝分觀陽立蓋誤水經注應水徑應陽縣南即應水為名隋省入零陵謝沐廢縣在永明縣西南漢置屬蒼梧郡晉屬臨賀郡宋屬臨慶國齊仍屬臨慶郡隋省入永陽舊志謝沐鄉在今縣西南二十五里又縣西南四十里崇福郷下墟社有城隍廟土人以為謝沐故址也吕蒙城在零陵縣北二里明統志吳吕蒙西取長沙零桂三郡惟零陵太守郝普城不下蒙因築城守之新田營今新田縣治明萬厯二年置以防寕逺東北猺洞崇禎十二年郡守晏日曙以其地山巒層複民染猺俗建議分寕逺南北二鄉十五都置縣即新田為治因名永州舊衞在府治南明洪武初建本朝康熙二十七年裁東安場今東安縣治本零陵縣之東安驛五代時馬氏置東安場宋史地理志雍熙元年升東安場置縣在州西北一百二十里鐵場在江華縣南宋史地理志江華有黃富鐵場銀場九域志寕逺有上下槽一銀場新田縣志下槽洞在縣南五都息壤在零陵縣治西南唐柳宗元記龍興寺東北陬有堂堂之地隆然負甎甓而起者廣四步高一尺五寸始之為堂也夷之而又高由是寺之人皆神之莫敢夷甘茂盟息壤蓋其地有是類也方輿勝覽在縣南故龍興寺中狀若鴟吻色若青石自也出尺餘秦馳道在零陵縣東方與勝覽在縣東八十里澗五丈餘類今之河道兩岸如削夷險一致始皇命天下修道以備遊幸即此有庳墟在道州北接東安縣界孟子舜封象於有庳水經注引王隱曰應陽東五里有鼻墟山下有象廟括地志謂之鼻亭唐元和九年薛伯高刺道州命撤其屋墟其地沈其主於江柳宗元為之記盪宼將軍壘在寕逺縣東六十里南齊李道辨為開拓南蠻大使築壘於此懷素塔在零陵縣界方輿勝覽唐僧懷素嘗於此草書有墨池筆塜在其側三十六臺在寕逺縣東南九疑山唐時所築今存其四南樓在府城東下臨東湖上有紅蕖堂唐利史李衢建萊公樓在道州西北宋寇準謫此後人思之為建樓陳統夫有記御書樓在寕逵縣東南九疑山永福寺宋紹興中建以議厯朝所賜御書狀元樓在寕逺縣南三十里唐李郃故里稽古閣在府學内宋汪藻有記三元閣在道州學宮内宋胡銓道州濂溪祠記祠建講堂後三元閣上太史閣在道州治東宋嘉定間知軍州事方信孺建自為記新堂在府治内唐刺史韋宙建柳宗元有記思賢堂在府學内宋建繪周敦頤范純仁范祖禹鄒浩張浚像共為一堂額曰思賢三省堂在府城内宋張浚寓永時建並撰記種愛堂在零陵縣治西宋紹興中邑宰吕行中建太守王佐榜曰種愛楊萬里有記讀書堂在寕逺縣東南九疑山高士巖側縣志宋監簿劉子澄為朱子高弟慕九疑之奇築書院於此聚徒講學其中西軒在零陵縣治西南唐柳宗元有龍興寺西軒記方輿勝覽西軒在龍興寺柳宗元闢下瞰大江雙鳳亭在府學前宋郡守彭合新學舍得異石如鳳作亭臨之張栻有記九巖亭在府城内巖出池中者凡九跨池為橋創亭於上三亭在零陵縣東唐柳宗元有記名勝志在東山之麓一曰讀書林亭二曰湘秀亭三曰俯清亭唐零陵令薛存義建玩鷗亭在零陵縣西愚溪口宋汪藻謫居時建自為記萬石亭在零陵縣城北唐刺史崔某建以多石故名唐㧕宗元有記巖扃亭在零陵縣宋胡寅記永城南二十餘里有澹山巖者自山谷詩既行巖名聞於天下乃相南缺得地不盈丈為亭命之曰巖扃却顧中虚靜覽勝致而重山大壑環乎外者又或在目且穹山開壑剪竹開徑以趨於亭自今騷人逸士去來徙倚得所好而逺所畏然後斯巖之美全矣窊樽亭在道州東唐元結建方與勝覽在城中報恩寺之西月巖亭在道州西月巖内宋周子讀書處後遷建於巖外明李發有記寒亭在江華縣南方輿勝覧在江華縣隔江唐瞿令問棧險道入洞穴因作亭於石上元結大暑登之疑天時將寒故名丹崖翁宅在零陵縣南方輿勝覽唐永泰中有隴水令唐節督去官家於崖下自稱丹崖翁元結有宿丹崖􅡇宅詩並有銘刻崖下按唐節督舊志續志均作唐節今從全唐文改正元結故宅在祁陽縣西南浯溪上唐上元中結罷道州歸愛其山水因家焉亦名涭郎宅方輿勝覽有浯溪唐亭峿臺三銘宋陳衍題浯溪圖云元公因水以爲吾溪因山以爲吾山作屋以爲吾亭三吾之稱我所自也制字從水從山與广我所命也周子故居在道州西方輿勝覽營道之西二十八里爲濓水之源東流十里爲濓溪堡左曰龍山右曰豸山則濂溪故居也州志元公故里在州西二十五里安定山下元歐陽原功濂溪故居祠堂記舂陵郡西距城可十里有鄉曰營樂里曰濂溪周子故居在焉左有龍山其形蜿蜒如龍右有豸嶺崖石哈呀其狀若豸中爲平田有水逶迤田間澄澈見底即濓水也其居舊制有堂三間歲久寖敝延祐七年里儒唐道舉重建立爲專祠至正六年道舉子㦄詔復作東西序規制百倍於前鐵鑪歩在零陵縣北唐柳宗元志江之滸凡舟可縻而上下者曰歩永州北郭有步曰鐵鑪蓋嘗有鐡鐡者居其人去而其號冒而存青箱雜記嶺南以村市爲墟水津爲步今人改爲埠摩崖碑在祁陽縣南浯溪北崖石上鐫唐元結所撰大唐中興頌顔真卿書鹽厰在東安縣東北二十五里明萬厯中建麓牀三級在寕逺縣東南方輿勝覽在舜廟前簫韶峯之東北無爲觀後相去十餘里其地又有修妻四壇關隘湘口關在零陵縣西北瀟湘二水合流處又黒石關在縣西北大橋關在縣北六十里鎮峽關在永明縣西漢書地理志謝沐縣有關縣志鎮峽關在縣西六十里荆峽鎮接廣西恭城縣界爲入粵通衢宋時設官鎮守熙寕中省仍置砦兵番守明正德中置關今設百總戍守山口隘在永明縣東南接廣西平樂府富川縣界猺人出入之路石盤隘在永明縣南亦接富川界又有馬磯隘义山隘斑鳩隘連州隘皆在縣南爲猺獞往麥要路嶺東隘在江華縣南接廣西平樂府賀縣桂嶺界當開山摇衝設把總戍守歸陽巡司在祁陽縣東一百里乾隆二十一年以歸陽巡司移駐縣東北百里排山驛永隆巡司在祁陽縣西北一百里石期市巡司在東安縣東南四十里明初置驛萬厯中廢本朝乾隆三十二年移改永明縣枇杞巡司於此蘆洪巡司在東安縣北一百里唐書地理志永州有蘆洪戍九疑魯觀巡司在寕逺縣二峒口桃川巡司在永明縣西南四十里本明守禦千户所洪武二十九年置隸寕逺衞有關有市本朝改置巡司錦田巡司在江華縣東南一百五里本錦田砦宋史地理志熙寕六年廢明洪武二十九年置守鎮千户所隸寕逺衞本朝改置巡司兼設千總成守府志有城周三百二十四文東西二門錦岡巡司在江華縣南八十里順化鎮在零陵縣東六十里五代時置宋改為驛明廢又東四十里為杉木鎮雷石鎮在零陵縣南六十里唐置當瀧水口水流觸石其聲如雷鳴水鎮在零陵縣西南一百里鳴水嶺五代時置瀟湘鎮在零陵縣北十里潚湘㑹流之地五代時置一曰瀟湘關白水鎮在祁陽縣東南五十里樂山鎮在祁陽縣東南八十里宋史地理志熙寕六年廢樂山砦即此今有市文明鎮在祁陽縣西北六十里沙鎮在祁陽縣北一百二十里大營鎮在祁陽縣東北五十里舊置驛今裁宋岳飛嘗駐兵於此有永州祁陽縣大營驛題記淥埠鎮在東安縣東十五里又東有江口鎮荆塘鎮在東安縣北一百七十里當寶慶之