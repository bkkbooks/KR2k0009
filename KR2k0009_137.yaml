當上考功第城自署曰撫字心勞催科政拙崔敏博陵人貞元中永州刺史黜侵漁吏擒戮妖巫出令三年人魚怨讟柳宗元河東人元和初貶永州司馬既竄斥地又荒癘因自放山澤間其湮厄感鬱一寓諸文倣離騷數十篇讀者咸悲惻韋宙京兆萬年人元和間出為永州刺史遇歲歉斥官下什用供刺史者得九十餘萬錢為市糧餉民不知法多觸罪宙為書制律並種植為生之宜州負嶺轉餉艱險每饑人輒殍死宙始築常平倉收榖義餘以待之縣舊置吏督賦宙俾民自輸湘源生零陵香巖市上供人苦之宙為奏罷民貧無牛以力耕宙為置社二十家月㑹錢若于探名得者先市牛以是為準久之牛不乏立學宮取仕家子弟充之民以婚娶㑹賓客號破酒多至數百人力不足則不迎宙條約使畧如禮俗遂改薛存義河東人元和間授零陵令甫下車遁逃復還蠧姦披露逋租匿役期月而理薛伯高河東人元和中為道州刺史毁鼻亭象祠遷州學於州西營川門外柳宗元為記述其善政宋張去華襄邑人太祖時荆湖平命通判道州去華上言桂管為五嶺衝要今劉鋹保境固守若大軍先克其城以趨番禺如踐無人之境有詔嘉奬寇準下邽人天禧間罷相貶道州司馬始至州素無公廨百姓競荷瓦木不日而成徐處仁應天榖熟人徽宗時為永州東安令蠻人叛處仁入峒開示恩信蠻感泣誓不復反趙不􅖊宋宗室紹興中除永州通判郡歲輸米倍收其贏民病之不􅖊言於子損其數帥司檄錄靖州獄辨出冤者數十百人晴人德之繪其像以祠楊萬里吉水人紹興中調零陵丞時張浚謫永杜門謝客萬里三往不得見以書刀請始見之浚勉以正心誠意之學萬里服其教終身名其堂曰誠齋浚入相薦之朝子長孺後繼為零陵簿丞田如鼇贛州人紹興間知道州時母后南還郡國悉獻典禮謂出􅗔餘實於常賦之外巧為各色以斂如鼇獨以州小民貧一無所獻胡寅崇安人知永州寕德皇后訃至朝廷用故事以日易月寅上䟽言禮讐不復則服不除願降詔㫖服喪三年衣墨臨戎以化天下先是安國知永州寅治永綽有父風人稱奕世戴德云李南壽龍泉人紹興間知道州疏減大禮錢之病民者後擢起居舍人乞外補孝宗曰卿道州政事甚美如卿等姓名嘗書屏間未忍令卿去朕側王政山東人乾道中為衡永郴桂都巡檢郴寇犯寕逺政禦之𬒳執罵賊死贈觀察使李揆瀏陽人乾道中寕逺尉獲盜數多或謂可得美擢揆曰殺人媚人吾不為也民至今稱之章穎臨江軍人孝宗時調道川教授作周敦頤祠㑹宜章寇為亂羣僚相繼引去頴獨留寇平郡守奏穎有協贊之功可大用王阮江州人廉正方介學有原本孝宗時移永州教授獻書闕下請罷呉楚牧馬之政而積馬於蜀茶馬司以省往來綱驛之費歲時分牧之資凡數千言黃疇若豐城人淳熙中授祁陽主簿邑民有斥僧為盗且殺人移鞫治疇若疑其無證以白提點刑獄馬大同且爭之甚力己而得真盜傅大聲仙游人淳熙中通判道州適寇至調軍督戰賊潰去尋知州事百姓呼為傅父歐海茶陵人知零陵有善政作勸農十詩真德秀稱為衞良之遺表聞於朝李芾衡州人理宗時為祁陽尉賑荒有聲攝縣縣大治辟湖南安撫使幕官時盜起永川招之歲餘不下芾與參議鄧垌提兵破其巢擒賊魁以歸餘黨遂平後知永州有惠政元烏克遜澤臨漢人至元二十一年調永州路判官湖廣平章約蘇穆爾貪縱滛虐誅求無厭或妄言初歸附時比屋歛銀將輸之官銀己具而事中止約蘇穆爾即下令責民自實隨地置嶽株連拷掠死者載道所獲盡掩有之有使至永澤戒吏供帳酒食務適其意使者感愧因以利害曉之一郡獲安是歲盗起寶慶武岡行省遣澤討平之丞相僧格建議考校錢榖澤自上計行省約蘇穆爾怒其無所增羡拘繫之僧格敗約蘇穆爾伏誅得釋烏克遜澤舊作烏占孫澤約蘇穆爾舊作要束木僧格舊作桑哥今俱改正劉潛吉安人任永州錄事歲饑鄰境遏糴遣吏持所受告身懇於全守石古峯守義其請遂通商販民賴以活兵尉張榮壽等恃勇掠民乃白府將盡捕下獄强暴斂手樊炳永州總管爲政廉明興學校毁淫祠八百餘區驅巫祝以代民役任滿除湖南宣慰副使林興祖福州羅源人至正八年授道州路總管時寇進城至即布恩信貸商鈔爲守禦計賊聞一日具五百盾以爲大軍至中夕遁去永明縣峒猺竊發以手牓諭之皆曰林總管廉而愛民不可犯也三年不入境春旱蟲食麥苗興祖為文禱之大雨三日蟲死而麥稔罷興作賑貧乏輕徭薄斂郡中大治鄧祖勝永州守將明兵圍城食盡自殺明陳福山同安人洪武時知零陵縣居官清謹修築堰塘溉田二百餘頃民賴其利號曰陳公堰李應庚應天人宣德中知永州府政尚寛平昭雪冤獄奏革黑石湘口大橋三關税務用通商旅盛祥丹徒人正統中知道州多惠政州有虎患禱於神二虎渡河一虎斃鼻亭祠下及卒民祔祀寇準祠十同漢陰人鯁介不阿勤於民事景泰中知東安縣儒學舊在城外數有苗警同為遷建治東士民德之楊宗豐城人成化中知永州府歲時每親行渠堰築祁陽城行九等均徭法諭民婚嫁無得論財貧者官給布帛一時婚配者九千餘家馬成四川人成化中知祁陽縣滿秩九年應遷百姓赴闕乞留遂命復任三年鄉民中有至老不見官府者一日偶至縣庭長揖不跪左右叱之成歎曰使吾民皆如是胥與葛天氏遊矣禮而遣之符鍾南昌人嘉靖中知道州值歲荒餓莩載道鍾悉發倉榖賑濟而後以聞全活無算適永明界峒摇越境為寇諭以恩盛乃大服周諒永豐人嘉靖中知寕逺縣高山寇亂諒躬率郷民搗其巢穴立五營以搤其險又平江華苗有功擢御史傳應禎安福人隆慶間知零陵縣剛正不阿鋤姦除寇本邑咸陽里與粤全州接壤民因爭田致相攻殺幾致亂應禎剖别撫安之唐山斗雲南人萬厯間知零陵縣清正不苛丁内艱去不能具行裝左右或請曰某事一判發可得萬緡山斗泣而叱曰是重予不孝也卒不聽鄔熙和新昌人萬厯中知祁陽縣歲大祲死者相枕籍熙和煮粥以哺施藥以療全活萬人王時春東莞人萬厯中知寕逺縣歲饑出俸米炊粥以活流亡天早禱雨願減禄算又自責以禳火至今氏有餘思曾可立豐城人知永明縣單騎至邑或問故可立曰吾不忍以迎送驛騷吾父老子弟也迨受事一意與民休息裁冗兵汰浮糧民稱為曾母萬元吉南昌人崇禎中為永州推官有宗藩諸孫招納亡命元吉寘其家人於理周志躍直隸人崇禎中東安典史時流寇犯境志躍率居民禦敵没於陣沈至緒蕭山人崇禎中以武進士為道州守備高紫二源猺賦犯州至緒力戰死其女雲英知書道兵法至緒死雲英時年十五出與猺戰勝之奪父尸還猺遁去城獲全張珣東莞人崇禎十二年析置新田縣珣以衡州同知攝縣事悉心規畫凡城垣署舍學宫壇祠以次具舉本朝魏紹芳文安人順冶中知永州府千戈甫平一時招徕休養民有更生之望大兵進征雲貴紹芳精心調度絶不擾民建濓溪書院置義學社學稱賢守第一永人至今思之文運亨遼陽人順冶中知新田縣值猺賊犯城運亨率民兵拒守賊衆大至城陷死之同殉節者教諭邯鄲王鑄攻子弟皆遇害楊召春正白旗人康熙中知江華縣不畏强禦猺民多骫法召春按治之以弭盜安民為急務在任二載六寨斂跡以艱去民思不忘徐尊顯竟陵人康熙中任永明教諭重修學宫置學田三百畝拓復濓溪書院購經史遴諸生肄菐其中資以膏火楊純崇明人乾隆初知永明縣在官清亷視民如家人父子以勞㾕卒於官病草時民相率至卧捐前問訊歸觀日皆執紼悲號聲溢衢老為肖像尸祝焉翁運標餘姚人有孝行啓任湖南縣令有惠政乾隆十三年擢道州民焚香數里迎之道州路通郴桂峭壁千仞下臨深溪為行旅患運標捐資倡率鑿險通幽長八十餘里悉成坦途歲大疫為文告於城隍神請自罰無傷百姓購良方製築親至村落一一審視或以傳染為慮曰我為民父母子弟病忍不一顧耶全活甚衆以疾卒於官州人為之立祠沈華呉人乾隆中知零陵縣力行保甲宵小斂跡教學勸耕士鮮不率野無曠土催科責之戸首吏胥無所售姦每至鄉必撫䘏其老㓜人皆德之調知武陵縣治績一如宰零陵時謝仲坃陽春人乾隆中以常德丞屢攝永州府事正已率屬屏絶請託自署楹帖云但有餽遺都郤去曾無情面可求來淫雨害稼度禱立止政暇輒延耆士論學不倦莊熊芝陽湖人乾隆中知零陵縣方春勸農周行田問集鄉耆問稼穡水旱藹然有古循吏風陳三格岳池人乾隆中知零陵縣亷惠甚著剏建羣玉書院講學誡士後置田養之去後為祔祀書院稱和溪先生何澤茂閩人乾隆中權知寕逺縣善治盜先是㣲行周厯盡悉鄉堡間積年巨賊遇報竊即籖示賊所在至則果就獲嘗一夜獲十餘人良善以安陳丹心詔安人乾隆中知寕逺縣下車致文行士周訪民間疾苦首革除之縣多曠土教民植薯歲偶歉得無饑移零陵去任縣人羣送之江滸攀舟不忍别汪輝祖蕭山人乾隆中知寕逺縣夙習吏事凡治獄情罪必當尤喜表章節孝未旌者悉附祠側著舂陵表貞錄又著善俗書民事纎細無不詳備教化大行風俗一變蕭國璋山海關人嘉慶初知祁陽縣建龍神祠有禱立應修義渡以濟人先知寕逺亦多善政曾鏞泰順人嘉慶中知東安縣治尚寛簡懲一二詐誣之民邑幾無訟捐葺育嬰堂課士字民視若家事以仕學兼優舉治行未幾卒人咸惜之人物漢鄭産泉陵人為白土鄉嗇夫漢末多事國用不足産子一歲輒出口錢民多不舉子産乃勅民勿得殺子口錢當自代出為表上言錢得除更名白土為更生鄉三國漢劉敏泉陵人與蔣琬齊名為左䕶軍揚威將軍鎮漢中時魏遣曹爽襲蜀敏與王平據興勢多張旗幟彌亙百餘里㑹大將軍費禕從成都至魏軍即退敏以功封雲亭侯賴厷零陵人父恭昭烈帝用為汰常厷為丞相西曹令史隨諸葛亮於漢中蚤夭亮甚惜之與張裔蔣琬書曰令史失賴厷為朝中損益多矣呉黄蓋泉陵人孫聖舉義兵蓋從之堅薨隨䇿及權擐甲周旋蹈刃屠城諸山越不賓有寇難之縣輒用蓋為守長凡守九縣所在平定建安中隨周瑜拒曹操於赤壁蓋建䇿曰操軍方連船艦首瓦相接可燒而走也瑜用其計卒破操拜武錄中郎將武陵蠻及長沙益陽山賊反亂蓋盡討平之加偏將軍蓋姿貌嚴毅善於養衆當官決斷事無留滯子柄爵關内侯晉唐諶零陵人少有志操武帝初年舉茂才拜武騎嘗侍平呉還拜零陵太守境内清晏道不拾遺百姓樂業唐宏零陵人永嘉初舉孝亷拜殿中郎累遷尚書太司徒薦舉賢能朝野多之唐􅠭泉陵人官郡功曹史庾闓薦􅠭牋曰􅠭立身持操行著一邦若得驂軌鸞衡服襄駿足則機石之良選可以對揚萬里者也南北朝齊唐獻之泉陵人舉秀才官至廣州都督嚴毅公清臨事能㫁嶺表肅然唐張子厚江華人家洄溪元結聞而就之見其容若少壯問其年己九十有奇問其何以能此子厚對曰巖下有泉田環於左右五世居此飲食取足無求乎他乃止結宿結贈以詩刻於巖下張季秀道州人代宗時處士道州刺史元結請於朝曰季秀介直自全退守亷遜乞令州縣造舍給田免其户役從之季秀卒結表其門覃季子祁陽人性愛書貧甚尤介特不苟受施讀經傳言推太史公班固下到今通為書號史纂又取鬻老管莊子思晏子下到今為子纂黜陟使取其書以名聞除為太子校書唐節督零陵人曾為瀧水令去官家於瀧下水石間日號丹崖翁刺史元結為作丹崖銘何堅道州人德宗時舉進士自太學歸韓愈送以序稱為道民之賢者周魯儒延唐人太和間舉進士詞賦宏麗有時名官終員外郎知制誥劉禹錫有送魯儒赴舉詩其序云與之言能言其得姓因家之所自暨縣道鄉亭之風俗望山名水之概狀羅含所未記朱贛所未詳咸得之於生李邰延唐人太和二年應賢良方正擢進士第一時昌平劉簧以䇿詆宦官落第邰歎曰劉蕡下第我輩登科能不厚顏乃上疏言陛下以直言招天下士蕡以直言副陛下所問雖訐必容雖過當奬書之史冊千古光明况臣所對不及蕡逺甚内懐愧恥自謂賢良奈人言何乞回臣所授以旌蕡直疏奏不納人服其公宋路振祁陽人幼頴悟父洵美奇之淳化中擢甲科遷太子中允通判邠州遷知濱州一日契丹至城下兵少民相恐振親加撫諭堅壁自守契丹引去大中祥符初使契丹撰乘軺錄以獻擢左司諫知制詔振文詞温麗尢長詩咏從事譙亳獨直行在專典綸翰箋奏填委應用無滯時稱為敏贍撰九國志有集十卷其子綸為太常寺奉禮郎周堯卿永明人警悟彊記以學行知名天聖進士積官至太常博士范仲淹薦經行可為師表未及用卒堯郷年十二喪父憂戚如成人及母䘮倚廬三年席薪枕塊雖疾病不御酒肉既葬慈烏百數銜土集隴上人以爲孝感所致居官祿雖薄必以周宗族朋友其學長於毛鄭詩及左氏春秋子論鼎州司理叅軍詵湖州歸安主簿陶岳祁陽人性清介以儒學有名官太常博士尚書職方員外郎知端州不苟取余靖寓端訪諸父老言爲硯所苦前後刺史不永硯者惟包拯及岳二人而己陶弼岳子俶儻知兵慶厯中楊畋討湖南猺授以兵往襲大破之以功得陽朔主簿調陽朔令兩知邕州綏輯惠養善政甚多進西上閤門使留知順州交人襲取桄榔弼獲間牒諭以逆順縱之去終弼任不敢犯加東上閤門使未拜而卒周輔成營道人敦頤之父世居濂溪登進士厯官多善政終貴州桂嶺令以子貴贈諫議大夫萬厯中奏請從祀啟聖公祠周敦頤營道人初爲主簿調南安軍司理叅軍移桂陽令俱著治績徙知南昌厯合州判官嗣爲廣南東路轉運判官三年轉虞部郎中提點刑獄以洗冤澤物爲己任以疾求知南康軍因家廬山蓮花峯下前有溪合於湓江取營道所居濓溪以名之卒年五十七黄庭堅稱其人品甚高胸懷灑落如光風霽月遲於取名而鋭於求志薄於徼福而厚於得民菲於奉身而燕及煢婺陋於希世而尚友千古博學力行著太極圖明天理之根源究萬物之終始又著通書四十篇發明太極之藴序者謂其言約而道大文質而義精得孔孟之木源大有功於學者也嘉定十三年賜諡曰元公淳祐元年封汝南伯從祀孔子廟庭二子壽燾周夀元公子元豐五年進士初任吉州司户次秀州知錄終司封郎中黃庭堅跋壽所撰龍眠居士大悲贊云元翁純粹動金石其言語文章發明秋慧非為作使之合蓋其中心純粹而生光耳弟燾元祐進士為黃池令兩浙轉運使時蘇軾知杭州與燾唱酬甚夥後終寶文閣待制陳遘其先自江寕徙永州登進士第積官至光祿大夫欽宗時守中山金人再至受圍半年遘呼總管使盡括城中兵擊賊為步將沙振所害及其子錫並僕妾十七人城遂降建炎初贈特進遘性孝友為入寛厚長者任部刺史二十年每出行郡邑必焚香祈天願不逢貪濁吏嘗薦王安中吕頤浩張慤謝克家何鑄後皆至公輔世以為知人弟適由閒封少尹官至光祿卿金人執之以北後十年死於雲中鄧璋永州人范純仁謫永州璋館門下教授諸孫同郡王繪布衣也時有詔舉遺佚胡安國以璋與繪應召二人老不行安國請命之官以勸為學者李良輔稱二人黨人范純仁客而流人鄒浩所請託也蔡京素惡安國異己得良輔言大喜命湖南提刑置獄推治又移湖北再鞫卒無驗李長庚江華人紹興進士厯官五十年仕至朝議大夫亷潔有守不事生産惟積書數千卷著有氷壺文集義太初道州人先以詞賦名尋舍去宗濂溪之學登淳熙進士品行端方周必大朱子皆與之遊屢表其能厯官知高瓊二州俱有聲著氷壺詩十卷易集注五卷文集二十卷呉庸道州入登淳熙特科為容州陸川主簿李接倡亂庸與同郡徐邦直唐㨗起兵禦之庸不克死事聞贈承德郎官一子樊謹寕逺人淳熙六年郴寇入江華謹應募覘賊為賊所執不屈死之樂雷發寕逺人少頴敏書無不讀九長詩賦累舉不第門人姚勉登科以讓第䟽上理宗召親試對選舉八事䇿嘉納之特賜及弟因數議時政不用歸隱雪磯元蔣節零陵人元未聚義兵千人結寨保障湖南兵起節擊走之行省疏節為安撫司領其部曲修葺城池自備糧餉招撫猺獠討平山寨且耕且守明周壎敦頤九世孫好學善談易長於詩討元季隱居營道山之陰洪武初有司以明經舉送京師不仕歸熊魁營陽人早歲䘮父與兄裘同事母何氏色養備至母常患危疾魁割胸肉以進服之頓愈歐善堂寕逺人洪武初李文卿内附餘黨未息平章楊燝駐兵道州議縣北十里外盡屠之善堂年九十餘率衆耆老説燝曰兵以輯亂為功今峒獠之外皆赤子被脅從耳豈可妄殺無辜璟悟乃止賴以全活者十數萬人唐慎零陵人永樂舉人官御史巡按廣西有淫祠能為民禍福皆云著赭永過廟門即降災慎乃著緋衣往焚其像而廬之邪妖竟息後擢兵備僉事張琮東安人宣德中為守鎮百户苗寇犯境琮冒矢石拒敵中流矢卒雷復寕逺人正統進士任御史風裁凛然出為廣西副使討斬叛民胡趙成成化中巡撫山西凡六降勅㫖奬諭寗良祁陽人正統進士天順中為刑曹時曹石恃功驕横恣陷善類良仁恕明敏誓不受權貴指使厯浙江布政使拔謝遷王華諸生中時稱知人熊繡寕逺人成化進士由行人擢御史巡按陜西劾布政使于璠賊穢璠誣奏繡他亊逮訊卒無驗璠所親當路者力主之謫清豐知縣宏治中累遷副都御史巡撫延綏正德初為雨廣總制有軍功以不合劉瑾致仕卒諡莊簡周鵬永明人成化進士官刑部生事每錄囚多所平反出為潮州知府築三浰溪隄溉田數千湏陳憲章為碑記之官至雲南參政何天衢道州人宏治進士正德中官御史彈劾無所避權貴斂手劉瑾柄用落職家居瑾敗起知河南有累遷浙江布政使宸濠不軌内侍畢直潛為應接天衢以計擒之嘉靖初論功晉都御史巡撫河南礦賊王堂倡亂討平之進工部侍郎留守南都胡節零陵人宏治進士正德中官御史立朝敢言時劉瑾擅權節巡按山東一無所饋瑾怒使緹騎逮進京節杭疏條瑾罪惡俱為瑾匿矯㫖下錦衣獄為瑾黨毒死嘉靖初贈光祿卿郁浩零陵人宏治進士嘉靖中官刑部員外郎世祖欲加興獻尊號浩上疏力爭不聽終江西僉事張機祁陽人事後母孝及父母相繼殁廬墓十有二年宏治中旌表揚成章道州人父泰納妾丁生成章甫四歲秦卒丁之父逼令改適丁勇銀錢與嫡妻何各藏其半約成章長授之及成章為諸生何臨殁授以半錢告之故遂尋母得之及母卒廬墓三年嘉靖中授國子學錄陳薦祁陽人隆慶進士官御史忤中官馮保稱病歸萬厯間起按陜西時三秦荒旱延慶為甚薦理贖鍰得四萬餘金上疏請賑全活甚衆累官吏部尚書著古今衷辨百餘卷申在廷祁陽人萬厯中舉人由學正出知貴陽郡以黔蠻易亂預繕城堞足糗糧練什伍天啟初成都兵變圍貴州在廷有守城功崇禎中贈太樸少卿周希聖零陵人萬厯進士知華陽縣邑歲供宫扇十餘萬大為民困希聖出俸錢佐之猶不支秩滿擢御史具疏極陳其弊謫灌陽典史用薦起太僕寺丞累遷南户部尚書楊漣劾魏璫奸坐黨削籍蔣向榮零陵人萬厯進士知南樂縣民侯華為母所訟向榮歎曰令教民者也而使階除下有不孝子不德孰甚焉乃置華於獄欲解印綬去邑人咸誚責華華亦自痛悔遂坐母於庭出華秋之使謝母母子相抱天哭觀者咸泣下華卒為孝子遷吏部郎中見魏璫專政乞歸蒲宗瑞永明人居家孝友以貢生授崇善知縣以疾歸遇盜掠其行李止竹籠一肩羣驚曰囊槖如此不取民間一文可知因相戒散去蒲秉權永明人萬厯進士授建昌令天啟中擢吏科給事中時魏璫竊國柄㑹有襲封之命秉權力䟽爭之得寢璫敗起西寕兵備厯肅州副使陳邦釴永明人父思性攜家謁選卒母歐陽氏扶柩還鄉中流舟覆釴纔五歲同母皆為隣舟所救見父棺浮沉乃復投水攀棺號泣衆皆憐之共援柩登岸獲歸年十四為諸生未幾卒母歐陽及妻蒲氏皆以節顯唐德明東安人崇禎舉人十六年張獻忠陷城强授偽職德明抗節不屈仰藥死本朝乾隆四十一年賜入忠義祠張綸祁陽人舉崇禎中鄉試方介寡合遭寇亂避地深山築土室以居親故罕見其面卒於土室陳純德零陵人崇禎進士時帝鋭意求治召諸進士於前咨以時事純德敷陳稱㫖授御史巡桉山西盡心職業尋督畿輔學政都城陷作書别父母北面再拜自縊贈太僕卿諡恭節本朝乾隆四十一年賜諡節愍唐周慈零陵人篤志正學萬元吉為推官甚器之後從元吉死蔣道亨永明人衡川府教授攝武陵縣事崇禎十六年張獻忠陷衡州道亨抱印罵賊遂遇害本朝傅明賢零陵人順治初粤寇圍城明賢負母岀門者不許其父己先出母命往省之哭而行母聞隣人為兵所殘驚怖死明賢歸一慟而絶蔣應黌零陵人世為巫居唐公廟粤寇圍城糧盡兵入廟中欲殺食其父應黌請以身代賊殺之邑人哀之立祠廟側蔣本生零陵人康熙舉人㓜孤力學事母孝母卒廬墓三年每長號聲徹郊坰有白雁集於廬側拊翼哀鳴歲餘不去王錞祁陽人康熙鄉舉知安平縣縣地瘠民貧錞至蠲其苛急調普定值苗變籌畫軍需民不知擾水災辦賑無冒無濫民沾實惠焉黃簡祁陽人父用中避兵竹山為兵所執簡求以身代兵乃釋父刺簡死雍正六年旌陳糦零陵人少以淹博着尤精於易垂老兩目眵昏日集生徒講解不倦人咸以耆宿奉之後官湘潭縣訓導雷時登祁陽人年四歲母饒為寇掠求之不得朝夕哭泣稍長讀書成諸生日以求母為念遂徧厯楚豫徒歩五千里果得母於新安奉之而歸伍澤榮祁陽人雍正進士知寶坻縣有惠政民愛戴不忘卒祀名宦陳大受祁陽人雍正進士性沉敏强記童時初授内則即退行其儀家人怪之拱而曰禮也由編修厯官安徽江蘇福建巡撫兩廣直隸總督協辦大學士直軍機處不務赫赫之名興利除弊必以漸凡所規畫務為久逺卒賜祭葬祀賢良祠諡文肅蔣鳳邑零陵人父漣以孝稱鳯邑雍正鄉舉知東流縣調建德決獄多所平反鄰獄有疑者皆委讞驗民顔其堂曰片言晆文煥零陵人雍正戊申舉孝友文章第一授知江南桃源縣值水災民多漂溺丈煥募船拯救並請按户查賑全活遂衆既復大早詣鄉亭祈禱雨立沛時氏飲之酒因額亭曰醉雨蔣元縉永明人乾隆選枚授常州通判調保定先是安州與新安縣民爭地容城楊忠愍祠産十八頃亦被隱占元縉奉檄履勘盡歸忠愍祠故地並勘出官淤多頃判入蓮花書院以資養士署用知兼攝容城縣事俱以廉能稱申大年祁陽人乾隆鄉舉由議叙累官刑部郎中出為邵武知府郡上瘠民貧大年至悉罷苛政以惠綏之致仕歸不名一錢郡人皆攀轅泣送周廷高零陵人乾隆選拔判開州河決陽武口廷高冒雨行水築隄要害處水不為災值旱蝗為文禱於神翼日蝗盡死累官西安同知所至有治蹟孫占鼇零陵人㓜時家貧嘗給事郡署挾書而往郡守奇之勸令讀書不數年補縣學生文名大噪晚而潛心理學終日黙坐澄心一切世味泊如也著有周易疑叅四書質疑諸書年九十有六卒劉烺零陵人㓜時為人傭耕年十五方就塾勤學刻勵以禮法自持父母晚病目皆好書烺授經家墪凡門人詩文佳者津津雒誦父母聞而歡笑竞日九經皆有心得手稿藏於家不以問世年七十三以歲貢終王名望零陵人由營伍洊升都司嘉慶三年隨將軍恒瑞進剿