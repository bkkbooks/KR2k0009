body:
  text: 大清一統志廣西統部在京師西南七千四百六十里東西距二千八百一十里南北距二千九百六十五里東至廣東肇慶府廣寧縣界一千二百六十里西至雲南廣南府土富州界一千五百五十里南至廣東廉州府靈山縣界二千四十五里北至貴州黎平府永從縣界九百二十里東南至廣東高州府石城縣界一千一百八十里西南至越南國界二千三百十里東北至湖南永州府東安縣界三百四十五里西北至貴州興義府貞豐州界一千三十六里分野天文翼軫分野鶉尾之次按古荆州為翼軫分野惟梧州府之蒼梧藤容岑溪四縣為牛女餘俱屬翼軫故當以翼軫為主建置沿革禹貢荆州南徼春秋時為百越地秦始皇三十三年以陸梁地置桂林象郡漢初屬南越國元鼎六年改置蒼梧鬱林二郡屬交州兼為荆州零陵郡南境後漢因之三國屬吳增置始安臨賀桂林寧浦四郡晉為廣州地晉書地理志廣州領始安臨賀蒼梧鬱林桂林寧浦六郡元帝分鬱林立晉興郡穆帝分蒼梧立永平郡劉宋為湘廣越三州地宋書州郡志湘州領始建臨慶二郡廣州領始安臨賀蒼梧鬱林桂林寧浦六郡又有南流郡屬越州南齊因之梁置桂靜二州隋為始安蒼梧永平鬱林四郡唐初復改諸郡為州屬嶺南道置桂容雍三管經略使咸通三年始分置嶺南西道唐書地理志嶺南道領雍澄寶橫潯巒貴龔象藤巖宜瀼籠田環桂梧賀柳富昭蒙嚴融思唐容牢白順繡鬱林黨禺義等州五代初屬楚增置全州周廣順元年屬南漢宋至道三年分置廣南西路宋史地理忘廣南西路治桂州領容雍融象昭梧藤龔潯柳貴宜賓橫白鬱林等州其賀州則屬東路全州則屬荊湖南路元置廣西兩江道宣慰使司及嶺南廣西道肅政廉訪司屬湖廣行省元史地理志宣慰司治靜江路領南寧梧州潯州柳州四路平樂一府鬱林容象賔橫融藤賀貴九州慶遠南丹一安撫司又有左江領思明太平二路右江領田州來安鎮安三路其全州治别屬嶺北湖南路至正末始分置廣西等處行中書省明洪武九年置廣西等處承宣布政使司統九府桂林柳州慶遠思恩平樂梧州潯州南寧太平本朝因之為廣西省順治十五年升泗城土州為府尋改為軍民府隸思恩府康熙二年鎮安土府改設流官隸思恩府雍正三年升鬱林為直隸州四年仍改泗城軍民府為府七年升鎮安為府共領府十一直隸州一桂林府柳州府慶遠府思恩府泗城府平樂府梧州府潯州府南寧府太平府鎮安府鬱林直隸州形勢東據湘水水出桂林府興安縣東流徑全州入湖廣永州府境南控交址南寧府太平府思明府南境思陵州憑祥州龍州西境皆與交址接界西接滇黔自泗城府西隆州而西接雲南廣南府界自泗城府而北達貴州之永寧州又自慶遠府北柳州府西北皆與貴州接壤北逾五嶺五嶺在廣西北境者二萌渚嶺在平樂府賀縣北越城嶺在桂林府興安縣北其名山則有勾漏山在鬱林州北流縣東北十五里其大川則有灕江與湘江同源出桂林府與安縣南流徑靈川縣又南繞桂林府城亦曰桂江亦曰始安江又經陽朔縣平樂府昭平縣至梧州府與左右二江合謂之三江口牂牁江亦名􅓹水豚水溫水唐時始有左右江之名新志左江源出交址界東流徑上下凍州龍州太平府至南寧府西合江鎮與右江合右江自雲南土富州界東流徑田州奉議州上林縣罛化土州隆安縣又東南與左江合又東徑南寧府永淳縣橫州貴縣至潯州府與黔江合又東徑平南縣藤縣至梧州府與灕江合又東入廣東肇慶府界為西江又點江即貴州盤江流徑泗城土府亦曰紅水江又東徑思恩府欣城土縣又東徑遷江縣及賓州又東南至潯州府武宣縣與左右江下流合其重險則有嚴關在桂林府興安縣西南十七里大藤峽在柳州府象州武宣縣東南三十里潯州府西北百五十里跨柳潯二郡間夾潯江而南乃羣蠻之窟穴文職官兩廣總督管轄廣東廣西兩省駐廣東省城巡撫駐桂林府提督學政駐桂林府布政使駐桂林府經厯庫大使廣盈按察使駐桂林府統轄全省驛傳事務經厯司獄分守桂平梧鬱道駐桂林府兼理鹽務分巡左江兵備道駐南寧府轄泗南太鎮四府控制漢土州縣官分巡右江兵備道駐柳州府轄柳慶思潯四府控制漢土州縣官桂林府知府同知舊駐府城嘉慶十三年移駐臨桂縣大罅通判舊駐府城乾隆六年移駐龍勝理苗舊有管糧通判乾隆四十七年裁府學教授訓導經厯司獄知州二員永寧全州同全理苗駐西延鎮舊有州判乾隆三十一年裁州學學正二員訓導二員巡檢三員永寧州屬喇洞全州屬山棗山角吏目二員知縣七員臨桂興安靈川陽朔永福義寧灌陽縣丞二員臨桂永福縣學教諭七員訓導七員巡檢六員臨桂縣屬蘇橋六塘墟興安縣屬社水灌陽縣屬崇順龍勝廳屬龍勝廣南典史七員柳州府知府通判府學教授訓導經厯舊有司獄乾隆三十一年裁知州象州學學正訓導巡檢龍門吏目知縣七員馬平雒容羅城柳城懷遠融來賓縣學員天河思恩巡檢三員宜山縣屬白土德勝龍門典史四員思恩府知府同知駐百色理苗通判乾隆四十七年裁桂林糧捕通判設府學教授訓導經厯司獄知州賓土知州田州同田土州判暘萬乾隆七年設州學學正賓州訓導巡檢安城吏目知縣三員武緣遷江上林土知縣上林縣丞上林駐三里營縣學教諭三員訓導三員巡檢五員百色廳屬百色武緣縣屬高井遷江縣屬平陽上林縣屬思隴周安按思隴一員乾隆四十三年由甘蔗園移駐周安一員乾隆四十六年由思吉鎮移駐土巡檢九員白山興隆定羅舊城下旺那馬都陽古零安定典史三員泗城府知府舊有同知乾隆四年裁府學教授經厯知州西隆州同駐八達管糧督捕州判駐舊州嘉慶二年裁西林縣八