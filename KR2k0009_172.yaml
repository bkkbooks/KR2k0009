餘燼鳥竄鼠遁還奔荆州朱雋上虞人光和元年為交州刺史時交址賊梁龍等與南海太守孔芝反攻破郡縣雋受命過本郡簡募家兵及所調合五千人分兩道入既到州界按甲不前先遣使詣郡觀賊虛實宣揚威德以震動其心既而與七郡兵俱進逼之遂斬龍旬月盡定賈琮聊城人中平元年交址屯兵反執刺史及合浦太守靈帝以琮為交州刺史琮到部移書告示各使安其資業招撫荒散蠲復徭役誅渠帥為大害者簡選良吏試守諸縣歲間蕩定百姓以安隋令狐熙敦煌人開皇中以嶺南夷數起亂拜熙桂州總管至部大宏恩信其溪洞渠帥更相謂曰前總管以兵威相脅今乃以手教相諭我輩豈可違於是相率歸附先是州縣生梗長吏多不得之官熙悉遣之為建城邑開設學校夷人感化侯莫陳穎代人高祖以嶺南刺史縣令多貪鄙蠻夷怨叛妙簡清吏於是徵頴拜桂州總管及至官大崇恩信民夷悅服周法尚安成人文帝時為桂州總管後入朝以本官宿衛州人李光仕反令法尚討之馳往桂州光仕率徑兵保白石洞法尚捕得其弟光略光度親率奇兵蔽林設伏兩陳始交法尚馳擊其柵光仕大潰遂斬之唐李靖三原人武德中授嶺南撫慰大使檢校桂州總管以嶺海陋遠久不見德非震威武示禮義無以變風即率兵南巡所過問疾苦延見長老宣布天子恩意遠近歡服王晙景城人景龍末授桂州都督州有屯兵舊常仰餉衡永晙始築羅郛罷戍卒又堰江水開屯田數千頃百姓賴之後求歸上冡州人詣闕留詔即留以須政成在桂踰期年州人刻石頌德裴懷古壽春人聖厯中始安賊歐陽倩擁衆數萬剽掠州縣授懷古桂州都督招慰討擊使未踰嶺逆以書諭禍福賊迎降懷古以為示不疑可破其謀乃輕騎赴之曰忠信可通神明况裔人耶身至其營撫慰之倩等大喜悉歸所掠出降諸洞相率內附嶺外悉平張九齡曲江人坐宇文融謗出為桂州刺史兼嶺南按察選補使張説薦九齡可備顧問召為集賢院學士李昌巙大厯間以御史中丞出為桂州刺史兼桂管觀察防禦使討蠻賊潘長安有功吏士刻平蠻頌於鎮南山下韓佽長安人元和中纍遷桂管觀察使部二十餘州自參軍至縣令無慮三百員吏部所補才十一餘皆觀察使商才補職佽下車悉來謁一吏持籍請補缺員佽下教曰居官治吾不奪其不奉法無望縱舍缺者須按藉取可任任之會春服使至鄉有豪猾厚賄使者求為縣令佽召鄉豪貴以撓法笞其背以令部中自是豪右畏戢時詔置五管監兵盡境賦不足充費佽處以儉約遂為定制馬總扶風人元和中以虔州刺史遷安南都護廉清不撓用儒術教其俗民皆安之建二銅柱於漢故處劖著唐德以明伏波之裔徙桂管經略觀察使李渤洛陽人寶厯中為桂管觀察使桂有灕水出陽海山世言秦命史祿伐越鑿為漕馬援討徵側復治以通餽後為江水潰毁渠遂廢淺每轉餉役數十户濟一艘渤釃浚舊道障泄有宜舟楫利焉周元靜為靜江軍節度使唐末所在兵起元靜約部內守令將校廣農輯兵四境信服安州防禦使宣晟以計入桂詭奪所領元靜不從與其部將劉士政率衆以戰不勝死之部衆咸就死無棄去者按通鑑是時為靜江節度使者即劉士政以敗出降此則本新唐書本紀所載巳為考異駮正以舊志與省志皆如此姑存之以備參考宋陳堯叟閬中人為廣南西路轉運使嶺南風俗病者禱神不服藥堯叟有集驗方刻石桂州驛又以地氣蒸暑為植樹鑿井每三二十里置亭舍具飲器人免暍死咸平初諸路課民種桑棗堯叟以所部諸州田多山石地少桑蠶請以所種麻苧頃畝折桑棗之數民以布赴官賣者免其算稅詔從之曹克明百丈人景德中撫水蠻叛徙克明為宜融桂昭柳象雍欽廉白十州都巡檢使既至蠻酋獻藥一器曰溪洞藥箭中人以是解之可不死請試以雞犬克明曰當試以人乃取藥箭刺酋股而飲以藥即死羣蠻慚懼而去曹利用寧晉人景德中宜州軍校陳進殺知州劉永規叛陷柳城縣圍象州事聞帝以利用曉方略擢廣南安撫使利用至嶺外遇賊武仙賊持健鏢蒙采盾衣甲堅朱夀隆諸城人提點廣西刑獄嶺外新經儂冦修營城障貴州虐用其人壽隆馳詣州械守送獄奏黜之老稚婦女遭亂不能自還檄所在資送舊制溪蠻侵恭羈縻州雖殺人無得仇報壽隆請聽相償蠻始畏戢王罕華陽人先為廣東轉運使以平儂智高功復為西路轉運使時智高已遁儂宗旦尚據險聚衆罕呼宗旦子日新謂之曰汝父內為交址所仇外為邊將希賞之餌非計也汝歸報擇利而為之於是父子俱降周沆益都人儂智高亂定仁宗命安撫廣西諭之曰嶺外地惡非賊所至處毋庸行對曰君命仁也然遠民罹塗炭當播宣天子德澤遂往遍行郡邑為民興利除害魏瓘婺源人提點廣南西路刑獄雍州獠户緣逋負沒男女為傭者千餘人悉奏還其家就除轉運使劉鋹時計口以稅雖舟居皆不免瓘為除之又減柳州無名役四百人胡則永康人仁宗時為廣西路轉運使有番舶遭風至瓊州食乏不能去則命貸錢三百萬吏白夷人狡詐又風波不可期則曰彼以急難投我可拒而不與耶已而償所貸如期又按宜州重辟十九人為辨活者九人徐的建安人仁宗時為廣南西路提點刑獄安化州蠻攻殺將吏所部卒畏誅謀欲叛的馳騎至宜州慰曉之衆斂手聽命奏復澄海忠敢軍後皆獲其用杜𣏌無錫人仁宗時廣西區希範誘白崖山蠻蒙趕反襲破環州嶺外騷然擢杞廣南西路安撫使行次真州先以書諭蠻聽其自新次宜州蠻無至者乃勒兵攻破白崖黃泥九居山寨及五洞焚毁積聚斬首百餘級復環州賊散走趕來降獲希範醢之和斌鄄城人仁宗時權廣西鈐轄徙涇原安南入寇復徙廣西撫水蠻羅世念犯宜州斌提步騎三千進討方暑晝夜趣兵誘敵至平阪列八陳以待之士殊死戰蠻大敗世念率酋黨內附李師中楚邱人仁宗時提點廣西刑獄桂州靈渠故通漕歲久石窒舟滯師中鑿而通之雍管有馬軍五百馬不能夏多死師中謂地皆險阻無所事騎奏罷之後攝帥事交址聲言入寇師中方宴客飲酒自若草六榜揭境上具得其情賊不敢動即日貢方物苗時中宿州人熙寧中交人犯邊擢廣西轉運副使師討交人罪次富良江久不進時中曰師無進討意賊必從間道來乘我不備冀萬一之勝勢窮然後降耳密備之既而果從上流來戰敗始納款張頡桃源人熙寧中授廣西轉運使時建廣源為順州將城之頡謂無益朝廷從其議劉誼長興人元豐初提舉廣西常平上言廣西一路户口二十萬而民出役錢至十九萬緡先用稅銀敷出稅數不足又敷之田米田米不足復算之身丁夫廣西之丁既稅以錢又算以米是一身而輸二稅乞裁損其數則兩路丁米可少寬詔減役錢萬一千二百餘緡王奇汾州人崇寧中為廣西都監宜州蠻寇邊萬人驟集麾下勸逃去奇罵曰大丈夫當盡節以報國何走為戰死贈皇城使朱伯文紹興中催斷廣西刑獄還言雷州海賊兩獄並係平人七人內五人已死帝惻然詔本路提刑以下重致罰路彬晉陽人紹興中提點廣西刑獄所至輒親身詣獄悉記所繫名數隨取按問枉者立釋時昭化夏稅折布錢過重民甚苦之彬獨抗章請減詔從之徐夢莘臨江人紹興間主管廣西轉運司文字時朝廷議易二廣鹽法遣廣西安撫司幹官胡廷直與東西漕臣集議夢莘謂廣西阻山止當仍官般法廣東諸郡並江或可容客販未可遽以二廣概行廷直竟以客販變法不三年二廣商賈毁業民苦無鹽復從夢莘官般法曾幾河南人高宗時為廣西運判除轉運副使三仕嶺表家無南物人稱其廉徐天麟臨江人夢莘從子權廣西轉運判官所至興學明教有惠政李椿永平人提點廣西刑獄獄未竟者一以平洪之釋所疑數十百人奏罷昭州金坑禁仕者母市南物吳獵醴陵人劉焞經略廣西以獵為本司準備差遣盜陷容貴鬱林等州獵請賞勞誅罪焞於是録鬱林功誅南流縣尉鬱林巡檢人人驚厲不踰時盜悉就擒崔與之廣州人提點廣西刑獄遍厯所部至浮海巡朱崖秋毫無擾州縣而停車裁決奬廉劾貪風采凛然嶺南去天萬里用刑慘酷貪吏厲民乃疏為十事申論而痛懲之高惟肖嘗刻之號嶺南便民榜馬默成武人為廣西轉運使會安化等蠻歲飢內寇默乃上平蠻方略董槐豪州定遠人淳祐六年棹廣西運判兼提點刑獄至雍州上守禦七䇿雍州西通諸蠻南引交址符奴月烏流鱗之屬數寇邊槐與約無相侵推赤心遇之皆伏不動又與文址約五事一無犯邊二歸侵地三還虜掠生口四奉正朔五通貿易於是遣使獻方物南方悉平楊大異醴陵人提點廣西刑獄兼漕庾二司所至姦吏屏息盜寇絶迹凡可以為民興利除害者必奏行之廣海幅員數千里道不拾遺報政為最趙彥橚宋宗室為廣西提刑諸郡鬻官鹽取息之六以奉漕司後增至八分彥橚復其舊以蘇民力馬塈宕昌人咸淳中留靜江總屯戍諸軍護經略司印守城元阿爾哈雅來攻塈發所部及諸洞兵守靜江而自將三千人守嚴關元兵攻關不克乃以偏將入平樂過臨桂夾攻塈塈兵敗退保靜江阿爾哈雅使人招降塈發弩射之攻圍三月城破塈率死士巷戰被執死之有黃文政者淮人戍蜀軍潰間道走靜江塈邀與同守城被執大罵不屈死阿爾哈雅舊作阿里海牙今改正劉子薦安福人主管廣西經略司參議官德祐二年北兵至靜江馬塈遺子薦提猺兵樂弩手守城東門勢不支時瀛國公巳入燕子薦取笏書其上云我頭可斷滕不可屈登城北望再拜取所衣𫀆瘞之語左右曰事已急不可為吾惟以死守城陷死之元臧夢解慶元人至元間官廣西廉訪副使煙瘴之地行部者多不至夢解遍厯案問凡貪姦置於法者八十餘人又平反雍州黃震藤州唐氏婦兩冤獄烏克遜札爾臨潢人至元中為廣西兩江道宣慰副使兩江荒遠瘴癘與百蠻接不知禮法烏克遜札爾作司規三十有二章以漸為教其民至今遵守雍管及外蠻數為寇烏克遜札爾循行並徼得厄塞處布畫遠邇募民伉健者置雷留那扶十屯列營堡以守之陂水墾田築八堰以節瀦泄得稻田若干畝歲收榖為軍儲邊民賴之烏克遜札爾舊作烏古孫澤今改正吕恩誠平定人出僉廣西廉訪司事巡行郡縣土官有千元帥者恃勢魚肉人恐事覺陰遣其子迓思誠於道思誠縛之悉發其陰私痛懲其罪一道震肅額爾吉訥唐古氏人至正末授廣西行省平章此事時賊入湘南嶺表震動額爾吉訥築城扼險招集驍勇保境土二十餘年明初楊璟兵至額爾吉訥堅壁不下城破被執送京師不屈死額爾吉訥舊作乜兒吉尼唐古舊作唐兀今改正陳瑜雷州人為廣西中書行省都事城被圍佐額爾吉訥守禦甚力及城破拔佩刀自刎同時湘潭劉永錫率妻子溺白龍池死又義兵千户曾尚賓守西城及城陷退焚其家以死尚賓江西人明楊璟合肥人洪武初以征南將軍與周興張彬率兵取廣西璟馳至桂林破之執元平章額爾吉訥送京師遣諭郡縣及兩江溪洞莫不迎降徐元洪武中為廣西指揮東蘭那地賊犯邊元擊斬之平寨二十四胡子祺吉水人洪武中為廣西按察司僉事屢平冤獄祠廟不載祀典者悉撤毁宋元祐黨人碑在融州山谷舁出掊碎之王佑泰和人洪武中為廣西按察司僉事時尋適為按察使嘗咨以政體佑曰蠻方之人漬倫傷化不及此時明禮法示勸懲後將難制適從之廣西稱治韓觀虹縣人洪武中為廣西右衛指揮僉事屢平象州義寧古田慶遠諸叛擢都指揮使二十八年討南寧奉議及大藤峽等賊擒賊帥黃世鐵莫金等俘獲甚衆開設奉議南丹潯州慶遠四衛及向武河池懷集賀縣四千户所山雲徐州人宣德初以征蠻將軍出鎮廣西平柳慶蠻寇前後十數戰身先士卒所向無前馭土官以威信廉介自持由是蠻猺懾服黃潤玉鄞人正統初擢廣西提學僉事抑浮靡奬實行士風為變時方軍興有都指揮妄掠子女萬餘口潤玉劾而歸之副使李立入民死罪至數百人亦為辨釋南丹衛處萬山中瘴甚戍卒多死為奏徙夷曠之地王翺鹽山人景泰三年潯梧諸府􅍹寇亂翺為左都御史總督軍務兩廣之有總督自翺始翺素有威望至鎮將吏讋服推誠撫諭􅍹多嚮化部內遂無事韓雍長洲人成化初廣西猺獞為寇雍以右僉都御史贊理軍務討之賊據大藤峽直搗其巢大破之諸寨悉平遷左副都御史提督兩廣軍務以憂歸後再任蠻民懾雍威寇盜益稀朱英桂陽人成化中總督兩廣以安靜約飭將士毋得妄請用師招撫猺獞效順者定為編户給復三年於是馬平陽欮蒼梧諸縣蠻悉聞風來歸而荔波賊擁衆數萬久負固亦遣子納款自是歸附日潨比户口十五萬有奇帝甚嘉之田州酋黃明不法檄誅之傳首軍門英淳厚然持法無所假借以故人畏服承韓雍之後益持清節僅攜一蒼頭之官所賜金幣悉貯於庫威里雖不及雍而惠澤過之葉淇山陽人成化中為廣西按察使僉事南丹土官侵掠鄰境淇撫定之城柳城雒容以遏賊衝荔浦賊熾承總督朱英檄進討不踰時平孔鏞長洲人成化時為廣西副使猺獞聞鏞名相率遠遁尋進按察使荔浦賊來寇總督朱英以兵屬鏞賊聞驚曰此故髙州孔副使耶亟遁走鏞追擊平之歐磐滁人成化中充廣西右參將分守柳州慶遠討融縣八寨猺克之鬱林陸川賊猖獗攻破之宏治時平府江永安諸獞進廣西副總兵思恩土官岑濬築石城於丹良莊截江括商利帥府令毁之不聽磐自田州還督兵將毁城濬率衆拒擊敗之卒夷其城舒清德興人宏治中為廣西左布政猺獞反側不常清御以恩信皆讋服田州土官襲職酬金幣甚厚清召集屬吏示以令章而歸其賄於公帑姚鏌慈溪人宏治中為廣西提學僉事立宣城書院延五經師以教士子桂人祀山魈鏌毁之俗遂變嘉靖初提督兩廣軍務兼巡撫田州土官岑猛謀不軌鏌設計斬之又流官陳善後七請改設事制可張祐廣州人正德時為廣西右參將分守柳慶六破府江賊於沈沙口擢副總兵鎮守廣西督討臨桂灌陽諸搖又連破古田賊多所俘獲巳復討平州雒容平樂諸蠻尋以被劾間住盧蘇王受亂田總督姚鏌召至軍中贊畫後王守仁代鏌詢剿撫之宜祐蘇受果效曰以夷治夷可不煩兵而下守仁納之順因請於朝命以副總兵鎮守思田祐智識絶人馭軍有節制與士卒同甘苦不營私産田州人立祠橫山祀之王守仁餘人姚嘉靖中總督兩廣時思恩土州土酋盧蘇王受反守仁至皆詣軍門乞降杖而釋之因請於田州地别立一州以岑猛次子邦相為吏目署州事復於田州置十九巡檢以蘇受等任之悉統於流官已攻破斷藤峽􅍹賊八寨仙臺花相諸洞蠻會疾作卒於南安唐胄瓊山人嘉靖初遷廣西提學僉事令土官及猺蠻悉遣子入學後遷左布政使官軍討古田賊久無功胄遣使撫之其魁曰是前唐使君令吾子入學者即解甲翁萬達揭陽人嘉靖中擢廣西副使時議征安南莫登庸萬達以為宜先除內寇於是誘執斷藤峽猺侯分丁破其巢而盡平諸不順命者進參政已毛伯溫集兵進剿以萬達策登庸遂降黃佐香山人嘉靖中為廣西提學僉事正士習毁淫祠舉節孝立鄉社擇士民秀者為諸生俾轉相諭告猺獞感悅寇掠為稀應檟遂昌人嘉靖中總督兩廣時桂林平樂諸猺據險肆亂檟與總兵顧寰督兵進討遂夷其巢戴鱀鄞人嘉靖中以副使備兵府江時蠻賊據江剽掠鱀練壬分道入巢合擊俘斬殆盡厯仙回松林馬尾石田等山諸蠻四出求撫鱀許之由是咸輯茅坤歸安人嘉靖中厯廣西兵備僉事轄府江道猺賊據鬼子諸寨殺陽朔令朝議大征總督應檟以問坤坤曰大征非兵十萬不可餉稱之今猝不能集而賊已據險為備計莫若雕剿倐入殱其魁他部必讋謀自全檟善之悉以兵事委坤連破十七寨晉秩二等民立祠祀之殷正茂歙人隆慶三年巡撫廣西古田獞韋黃二姓自宏治正德時積年為亂正茂督將討平之斬其魁捷聞改古田為永寧州設副使參將鎮守建委官運鹽之議以其息充軍餉綜理詳密軍需賴以不匱終明世增損其法而行之卒莫能易俞大猷晉江人嘉靖末為廣西總兵官隆慶初古田獞煽亂大猷討之賊保潮水巢極巔攻十餘日未下乃分兵自擊馬浪賊而密令參將王世科登山設伏大破賊軍馬浪諸巢相繼下生擒賊首黃朝猛韋銀豹等百年積寇盡除威名震南服郭應聘莆田人隆慶時由廣西按察使厯右副都御史巡撫其地討平府江懷遠諸猺克定陽朔及雒容上油邊山諸叛悉平後再涖任時十寨初平奏設三鎮隸賓州以土巡檢守之而統於思恩參將十寨遂安李錫歙人隆慶中以征蠻將軍鎮廣西剿府江賊獞酋等悉授首柳州猺據懷遠萬厯元年錫分兵六道並進自統水師獨當其衝截潯江大破之賊盡殱移師討雒容獞及永福永寧柳城諸賊並以捷聞錫一年內破賊二百一十四巢獲首功一萬二千餘級在任六年威名大著鄭茂莆田人隆慶末遷府江兵備督兵進剿諸叛蠻悉奔潰於六巢各置一堡改三洞為二土司屯兵厄險復開仙回馬尾二營以通永安修廣運足灘二堡以控府江創昭平治以控平梧諸猺斂迹徐作南昌人萬厯二年以副使備兵府江時南源殘孽為梗榕洞喇崙六窟等巢附之作督兵分道進剿復峯門寨破其山灣賊周公樓等降昭平上下四屯賊黎福莊叛又計擒之五指巖最負固悉平之吳文華連江人父世澤為府江兵備副使威鎮諸蠻萬厯初文華巡撫廣西討平南鄉陸平周塘板寨􅍹及昭平黎福莊請終養歸起兵部侍郎復撫廣西遷總督兩廣軍務周起元海澄人萬厯中出為廣西參議分守右江道柳州大飢羣盜蜂起起元單騎招劇賊而賑恤飢民甚至金九陛全椒人崇禎十二年分巡蒼梧道時洞猺焚掠鬱林北流總督張鏡心令九陛會剿直趨鳳凰山賊巢先後斬獲滿朝哥等一百九十餘人殱其魁瞿式耜常熟人崇禎末以僉都御史巡撫廣西南都既覆式耜與丁魁楚焦連等奉永明王監國於肇慶以大學士留守桂林大兵至偕焦連力守城獲全後郝永忠大掠桂林式耜糾合餘燼廣西再定及大兵入嚴關諸鎮皆逃去城中無一兵獨式耜端坐府中俄總督張同敞至誓偕死秉燭危坐黎明數騎至式耜曰吾兩人待死久矣至則踞坐於地不降將就刑夭大雷空中震擊者三遠近稱異本朝乾隆四十一年賜諡忠宣同時殉難者光祿少卿汪皡投水死守將鎮西將軍朱旻如平樂城破自刎中書舍人周震居全州慷慨尚氣節條城守事宜上之式耜題為御史監全州軍無何郝永忠盧鼎自全州撤兵還桂林守全諸將議舉城降震力爭不可衆怒殺之張同敞江陵人大學士居正曾孫永明王時總督廣西諸路軍務每出師輒躍馬為諸將先及大兵破嚴關諸將盡棄桂林走同敝自靈川至見翟式耜端坐府中誓與共死明燭達旦侵晨被執諭之降不從令為僧亦不從閲四十餘日整衣冠就刃顔色不變既死尸植立首墜躍而前者三人皆辟易本朝乾隆四十一年賜諡忠烈同時殉難者侍郎吳炳從桂王太子奔城步遇大兵被執送衡州不食自盡於湘山寺尚書嚴起恆事桂王以阻孫可望王封殺之於平樂兵部尚書楊鼎和以阻封議孫可望追殺之於崑崙關大學士郭之奇聞孫可望殺嚴起恆團聚鄉勇守樂民所被執至桂林不屈死之湖南道陳象明徴餉廣西調土兵至梧州戰敗死蘇松兵備道參政余昆翔與總督汪碩德等同在廣西被獲不屈死吳炳宜興人嚴起恆山陰人楊鼎和江安人郭之奇揭陽人乾隆四十一年均賜諡忠節陳象明東莞人賜諡烈愍余昆翔一作余鯤辰溪人賜諡節愍龍之虬永新人一作之明永明王時巡撫柳慶右僉都御史辛卯柳州城被圍誓以死守城陷不屈死其妻朱氏亦殉本朝乾隆四十一年賜諡節愍焦連山西人永明王時總督廣西軍務封宣國公與瞿式耜同守桂林後移駐南寧訓練兵士至平樂陳邦傅説降不屈自刎本朝乾隆四十一年賜諡節愍本朝孔有德奉天人順治六年以定南王率兵平廣西遂留鎮桂林九年靖寶鎮將失守分遣赴援李定國從間道突犯桂林麾下李養性孫龍程希孔俱戰死有德知不可守乃闔室舉火妻李氏以下並投繯拔劎自刎事聞諡武壯祀昭忠祠李懋祖容人以湖南衡永郴兵備道署廣西巡撫殉難贈光祿寺卿祀昭忠祠線國安奉天人順治九年李定國陷桂林時國安鎮南寧亟提師赴援定國遁走十年定國擁衆數萬復犯桂林國安與巡撫陳維新合䇿敗之後以征雲南功晉伯爵仍留鎮廣西先後二十餘年安靜不擾李率泰奉天人順治十年總督兩廣李定國陷廣西諸郡縣急攻新會率泰躬提徑卒襲擊大破之定國宵遁窮追至雍始還平靖兩藩將士欲乘亂掠高雷潯南率泰偵知馳令禁遏人素憚其威遂止陳維新奉天人順治十年巡撫廣西李定國犯桂林維新偕線國安拒守賊驅象來攻敗之復穴地道欲陷城維新令掘城內地射火箭入穴賊多死隨取土囊壘築賊計沮遁去事平疏請蠲免兩載租賦以蘇民困于時躍奉天人順治十二年巡撫廣西時桂林初復李定國尚盤踞南太六郡時躍籌兵畫餉緩急得濟賊以削平交址黎莫二夷搆爭相讐殺時躍宣布德威莫遂內附黎亦奉表入貢李棲鳳漢寧鑲紅旗人順治十四年總督兩廣時廣西潯南兩郡未平棲鳳受事五閲月調兵恢復擒偽江夏王及賊渠陳奇䇿等積年負固者次第翦除土司交址率服致貢田升龍奉天人順治十四年巡按廣西疏陳閭閻窮困凡鹽埠營債諸弊立除之旗辨有強占民産并奪子女者力為禁止又請改舊藩邸為貢院國朝廣西賓興自此始彭而述南陽人順治末任廣西參政時獞賊猖獗流劫臨桂永寧融縣而述督兵進剿計擒渠魁招集流亡計口授田民賴之金漢蕙金華人順治巳丑進士任廣西參議分守右江單騎之官招集流亡勸農課學後遭兵寇漢蕙守孤城援絶遂陷脅降不屈遇害翁旦壽昌人順治乙未武科纍官參將會猺獞蠢動率兵剿之深入被圍自刎死馬雄鎮遼陽人康熙初巡撫廣西值羣寇煽亂剿撫並行計斬渠寇楊其清等賊衆瓦解十三年滇南搆禍孫延齡叛附雄鎮密檄提督馬雄潛師討之雄遷延不至因蠟疏具狀遣子世濟世永間道入京乞師延齡詗知夜發兵圍署百計脅之不從賊吳世琮至執之詣營雄鎮詈罵不屈闔門遇害贈太子少保兵部尚書諡文毅佟鳳彩漢軍正藍旗人康熙初為廣西右布政時雲南未定廣西屢遭兵燹人民流離鳳彩悉心籌畫轉餉不乏境內安堵傅宏烈進賢人以預發吳三桂不軌得罪戍蒼梧嗣三桂叛宏烈召募義兵出龍南庾嶺東迎大兵擢廣西巡撫佩撫蠻滅寇大將軍印分兵四出復梧潯郡縣數十城後全粵底定以雲貴未平疏辭撫篆率兵進討取道柳州柳降將馬承蔭驚悸邀計機宜單騎往為所執械送桂陽遂遇害贈太子太師諡忠毅王如辰鼇山衛人康熙十九年督學廣西時吳逆變亂學宫鞠為茂草如辰力振興之文學日興黃元驥晉江人康熙十九年任廣西按察使會大兵進復雲南檄使轉餉即兼程趨南寧是時苗疆多阻險延望元驥宣布朝廷盛德開誠化導率響應建議就地募夫充運諸郡得免侵冒瘴癘遠役之苦又為圜轉遞運法自竹洲塘直接滇省計里設塘計塘設汛分設目長逐塘遞接更番休息先至者别出賞以旌之前後運糧數百萬曰用夫六千六百人增口糧給禦寒止舍之具人心踊躍叢山疊嶺間挽役不勞而餉糧日充雍正十一年祀名宫郝浴定州人康熙二十年巡撫廣西