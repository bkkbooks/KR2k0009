front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_042-1a}
body:
  text: 廬州府三人物楚范增居鄛人年七十好竒計説項梁立楚後佐項羽霸天下漢文翁舒人少好學通春秋以郡縣吏察舉景帝末為蜀郡守修起學宫興教化由是蜀地文學比齊魯焉吏民為立祠堂祭祀不絶朱邑舒人少時為舒桐鄉嗇夫所部吏民愛敬焉厯遷北海太守以治行第一入為大司農為人惇厚篤於故舊然性公正不可交以私貢薦賢士大夫多得其助者身為列卿居處儉節祿賜以共九族鄉黨家無餘資許子威廬江人西漢末為中大夫光武少時從受尚書毛義廬江人家貧以孝行稱南陽張奉慕其名往候之府檄適至以義守安陽令義奉檄而入喜動顔色奉心賤之及義母卒去官後舉賢良公車徴不至奉嘆曰賢者固不可測往日之喜乃為親屈也章帝下詔襃美常以八月遣長吏問起居周榮舒人肅宗時舉明經辟司徒袁安府安舉奏竇景及與竇憲爭立北單于事皆榮所具草竇氏客徐齮脅榮曰竇氏悍士刺客滿城中謹備之榮曰榮得備宰士常勑妻子若卒遇飛禍無得殯殮冀以區區腐身覺悟朝廷及竇氏敗榮由此顯名累遷山陽太守所經郡縣皆見稱紀以老病乞身卒於家子興少有名譽永寕中尚書陳忠薦其善屬文拜尚書郎周景興子辟大將軍梁冀府朝廷以景素著忠正引拜尚書令厯官司空時宦官任人及子弟充塞列位景與太尉楊秉舉奏諸奸猾將軍牧守以下免者五十餘人侯覧具瑗等皆坐黜朝廷莫不稱之遷太尉薨三國魏劉整鄭像並合肥人呉諸葛恪圍合肥新城城中遣整岀圍傳消息爲所得語整曰諸葛公欲活汝整曰當必死終無他辭又遣像岀城傳消息恪遣騎索得使言大軍己還洛不如早降像不從更大呼城中曰大軍近在城外壯士努力呉人以刀築其口詔追賜整像爵關内侯使子襲爵呉周瑜舒人孫䇿與瑜同年友善策東渡瑜將兵迎䇿䇿大喜曰吾得卿諧也授建威中郎將以瑜恩信著於廬江出備牛渚㝷為中護軍領江夏太守從攻皖拔之復破劉勳討江夏還定豫章廬陵䇿薨權統事瑜以中護軍掌衆事曹操入荆州瑜進住夏口與劉備并力逆操遇於赤壁諸船同時發火延燒岸上營落曹軍敗走瑜遂進取蜀至巴邱病卒王蕃廬江人博覽多聞孫皓初為常侍氣體高亮不能承言順指被譖見殺陸凱曰蕃處朝忠蹇呉之龍逢也晉韓友舒人受易於會稽伍振善占卜能圖宅相冢亦行京費厭勝之術神效甚多而消殃轉禍無不皆驗干寶問其故友曰筮卦用五行相生殺如按方投藥治病以冷熱相救後舉賢良元帝渡江以為廣武將軍杜不愆廬江人少就外祖郭璞學易卜有竒驗都超曰雖管郭何以尚此後為建威㕘軍南北朝齊王虚之廬江石陽人居父母喪以孝聞武帝永明中詔旌門蠲租三世隋樊子蓋廬江人厯官武威太守以善政聞大業間使謁墳墓還除民部尚書檢校河南内史車駕至高陽帝勞之曰昔高祖留蕭何於關西光武委宼恂於河内公其人也命佐越王留守東都進爵為濟公卒諡曰景陳稜襄安人父峴為譙州刺史陳滅廢於家高智慧等作亂廬江舉兵相應推峴為主峴偽從使稜至柱國李徹所請為内應謀洩為其黨所殺稜僅以獲免文帝以其父之故拜開府大業三年拜武賁郎將自義安泛海擊琉球國斬其主歡斯渴刺兜煬帝征遼東稜為東萊留守楊元感作亂稜擊平黎陽尋奉詔於江南營戰艦至彭城賊帥孟讓阻淮為固稜潛於下流濟襲破之賜爵信安侯李子通等衆各數萬稜率宿衞兵擊之往往克捷超拜右禦衞將軍俄而帝崩棱為發喪改葬於呉公臺下慟感行路論者義之唐任瓌合肥人高祖義師起瓌至龍門請謁願為一介使先入關宣布威靈以收左輔乃授為招慰大使降賊孫華等説下韓城與諸將擊破王世充以功封管國公後平徐元朗及輔公祏拜邢州都督遷陜州卒袁傑無為人僖宗時盜賊充斥傑招集强壯保障一方賊凡六入傑挺身血戰度不能脱仰天大呼自刎死尸僵立者七日賊驚異而遁張進昭巢人事親孝母終廬墓詔旌其門賜束帛徐行周舒城人數世同居詔旌其門萬敬儒廬州人三世同居喪親廬墓州改所居曰成孝鄉廣孝聚大中間表其門唐海巢縣人母喪廬墓躬耕以祀田中産嘉禾一本六穗刺史裴靖作表以聞五代南唐伍喬廬江人性嗜學居廬山苦節自奮讀易探索精微舉進士第一宋姚鉉合肥人太平興國中進士甲科直史館厯兩浙轉運使授舒州團練副使卒鉉文詞敏麗藏書至多頗有異本采唐人文章纂為百卷目曰文粹卒後子嗣復以其書上獻詔藏内府授嗣復永城主簿王光濟廬州人喪母刻像事如平生孝道純篤咸平二年詔旌之馬亮合肥人舉進士為大理評事仁宗時遷工部尚書以太子少保致仕卒亮有智畧敏於政事田况㲾庠等為童子時厚遇之世以亮為知人楊察合肥人景祐元年舉進士甲科除將作監丞厯右諫議大夫權御史中丞論事無所避又數以言事忤宰相陳執中罷知信州累遷户部侍郎踰年復以本官充三司使察美風儀敏於屬文其為制詰皆雅緻有體遇事明決勤於吏職雖多益不覺厭弟寘舉進士第一通判潤州以母憂不赴毁瘠而卒包拯合肥人始舉進士除大理評事知建昌縣以父母皆老解官歸養後數年親繼亡廬墓終喪久之赴調知天長縣徙知端州拜監察御史知諌院數論斥權倖大臣請罷一切内除曲恩又列上唐魏徵三疏願置座右累除龍圖閣直學士厯知開封府遷右司郎中拯立朝剛毅貴戚宦官為之斂手聞者皆憚之人以拯笑比黄河清童稚婦女亦知其名呼曰包待制京師為語曰關節不到有閻羅包老遷禮部侍郎卒贈尚書諡孝肅拯性峭直惡吏苛刻務敦厚有奏議十五卷胥致堯合肥人少力學為文辭官至左班殿直卒歐陽修誌其墓焦蹈無為人文翰有名四首鄉薦又由省元登第蓋三元云李臺卿廬州人性介特博學强記有史學考正同異多所發明知天文律數卒蘇軾有詩弔之鍾離瑾合肥人舉進士知德化縣將嫁女市婢得前令女遂與巳女同嫁累遷提點浙西刑獄知開封府俱有惠政茹孝標舒城人天聖中進士負氣節好學不倦以都官員外郎出知江州吏治有聲王珪華陽人後徙舒曾祖永事太祖為右補闕呉越納土受命往均賦至則悉除無名之算珪弱歲竒警舉進士甲科修起居注神宗時進同中書門下平章事珪以文學進流輩咸共推竒其文閎侈瓌麗自成一家朝廷大典冊多出其手珪叔罕為西路轉運使降儂宗旦父子徙知潭明二州為政務適人情不加威罰終光祿卿珪從兄琪起進士厯禮部侍郎致仕琪性孤介不與時合數臨東南名鎮政尚簡靜楊傑無為人元豐中官太常嘗議玉牒帝系四后升祔之禮又言大樂七失元祐中為禮部員外郎有文集二十餘卷樂記五卷雙漸無為人慶厯中進士博學能文知本軍後知漢陽為政和易吏民見思有古循吏風馬仲甫亮之子為度支判官内侍言漕舟淮汴間水遞鋪為使仲甫條其害議遂格累官淮南轉運使鑿洪澤渠六十里漕者便之朱翌舒人政和間進士時人諱言詩翌獨況涵六藝文思飇發南渡後為中書舎人掌書命文章忤時宰謫曲江著潛川集張徴舒城人建炎三年為御史中丞劾黄潛善汪伯彦大罪二十條罷知江州詹世勛舒城人修偉沉毅其勇莫敵紹興中為民兵正將弟世勣副之招募壯勇拒金人於拷栳原身被重創死王藺廬江人乾道中為御史陳時政闕失奏舉潘時鄭矯等八人進㕘知政事光宗勵精初政藺不存形迹除目或自中岀未愜人心者輒留之納諸御座趙廣廬州人八世同居淳化二年詔旌其門劉虎廬州人累功擢副都統拒元師於五河中流矢洞胷達背悶絶復甦更戰彌厲援壽春自三月至五月戰百餘合卒解其圍拜合肥郡侯劉師勇廬州人以戰功厯環衞官姚訔復常州加師勇和州防禦助訔守常受圍數月援絶城陷潰圍出從二王至海上見時事不可為憂憤卒密佑其先密州人徙居廬州佑為人剛毅質直為江西都統元兵逼撫州佑麾兵突戰元兵圍之數重自辰戰至日昃佑面中矢拔之復戰衆皆死被執以金符遺之許以官佑不受怡然自解其衣請刑遂死元羊仁廬江人至元初阿珠兵南下仁家為所掠父被殺母及兄弟皆散去仁年七歲賣為汴人李子安奴力作二十餘年子安憐之縱爲良仁蹤跡得母於頴州䝉古軍塔海家兄於睢州蒙古軍岳納約尼家弟於邯鄲連大家皆爲役尚無恙乃徧懇親故貸得鈔百錠厯詣諸家求贖之經營百計更六年大小二十餘口復聚居爲良孝友甚篤鄉里羡之大徳中旌表呉志淳無爲人工草隸優於文學元末以廕厯任靖安都昌二縣主簿入明遂不仕季原禮無爲人親喪廬墓三年不食鹽醬孫立曽孫廷春居父母喪並如之一門純孝眺顯巢人泰定時爲平江路總管以廉自律杜請謁禮文學之士勞來阡陌絶奸吏詘大姓一時稱焉葛聞孫合肥人早喪父事母孝甞出爲州文學既而曰此非養志之道遂歸力耕供養結環翠山房以延來學執政薦其學行於朝召爲翰林辭不赴及卒余闕表其墓朱可與舒城人好學博覽絶意仕進家居教授文行著於當時余闕廬州人元統元年賜進士及第厯翰林待制至正中起副使僉都元帥府事分兵守安慶時羣盜環布四外闕居其中屹爲江淮一保障陳友諒來寇闕以孤軍血戰城陷引刀自刎墮清水塘中闕號令嚴明與下同甘苦故人爭用命稍暇即注周易率諸生謁郡學會講立軍士門外以聽使知尊君親上之義有古良將風烈事聞追封豳國公諡忠宣王翰廬州人陳友定表授潮州路總管友定敗棲永福山中明太祖聞其賢强起之自刎死明劉友仁合肥人與弟謙隨胡大海取徽寕等處多戰功殁於陣祔祀功臣廟廖永安巢人與俞通海等以戰艦千餘結寨巢湖後歸太祖賴其力渡江遂克太平下集慶鎮江常州池州㝷拔江陰石牌寨絶張士誠窺江路累官樞密同知與張士誠將吕珍戰於太湖舟膠淺被執不屈死追授平章政事封楚國公諡武閔廖永忠永安弟從永安迎太祖於巢湖將水軍渡江有功永安陷於呉永忠襲職爲樞密僉院總其軍從伐陳友諒戰鄱陽湖友諒潰奔又邀擊之涇江口友諒死張士誠遣舟師薄海安永忠還兵水寨禦之遂克淮東諸郡尋充征南副將軍會湯和討降方國珍取福州畧定閩中諸郡至延平執陳友定遂拜征南將軍由海道取兩廣洪武三年從大將軍徐達北征伊克察罕諾爾還封徳慶侯明年以征西副將軍從湯和率舟師伐蜀蜀主明昇降帝製平蜀文旌其功伊克察罕諾爾舊作克察罕腦兒今改正俞通海其先濠人父廷玉徙巢結寨巢湖歸太祖積功至僉樞密院事攻安慶没於陣追封河間郡公通海從太祖攻曼濟哈雅於裕溪口破其水寨又從克寕國以舟師畧太湖降張士誠二將於馬蹟山艤舟胥口吕珍兵暴至通海身先疾鬬矢下如雨中右目遂眇陳友諒圍南昌從太祖擊之友諒敗死拜中書省平章政事總兵畧劉家港進逼通州敗士誠兵又明年攝江淮行中書省事鎮廬州從徐達平安豐又從克湖州圖平江中流矢創甚歸金陵卒追封虢國公諡忠烈通海沈機簡重勞而不伐嚴而有惠士卒畏而感之咸樂為之用曼濟哈雅改見前山川門俞通源通海弟從父兄立功通海卒就領其衆攻平江擒張士誠嗣通海官從徐達征中原下山東河南北山西諸郡復偕馮勝等會兵太原定河中渡河克鹿臺取鳳翔鞏昌涇州會張良臣再叛據慶陽通源自臨洮疾趨至涇畧其西良臣援絶糧盡遂克慶陽征定西大破庫庫出連雲棧克興元皆先登封安南侯庫庫舊作擴廓今改正俞通淵通海弟從徐達征秦隴燕趙以功授都督府僉事征哈刺哈至捕魚兒海獲酋長人畜甚衆又征都勻龍塲諸蠻峒克辰沅寶慶俘獲多封越嶲侯建文元年召為豹韜衞指揮使戰没白溝河福王時追諡襄烈本朝乾隆四十一年賜諡烈愍馬雲合肥人洪武四年為都指揮使與葉旺同鎮遼東出竒設伏破納克追擊三百餘里殲其衆進都督僉事十二年征大寕克捷巡邊還卒袁義廬江人本姓張太祖賜姓名數從征伐為楚雄衞指揮使嘗入朝以其老命染鬚髪還任以威遠人汪澤廬江人鄱陽湖戰殁封廬江縣子宋國興合肥人年十八以總管從征與陳埜先戰南臺太祖解白龍𫀆衣之敵誤以為太祖攢槊刺之至死常遇春翼上潰圍出其弟晟嗣兄官累軍功封西安侯張德勝合肥人才畧雄邁與俞通海等自巢來歸從渡江克采石太平陳埜先來攻與湯和等破擒之進克鎮江取常州收長槍兵下太湖畧馬蹟山攻宜興取馬䭾沙及石牌寨趙普勝掠青陽石埭德勝與戰柵江口破走之陳友諒攻龍江德勝麾諸將奮擊友諒軍披靡遂大敗與諸將追及之慈湖縱火焚其舟至采石大戰没於陣追封蔡國公諡忠毅張興祖巢人本姓汪德勝養子嗣職從破安慶克江州拔蘄黃取南昌祝宗康泰既降而叛興祖從徐達擊定之從援安豐大敗呉師鄱陽之戰與廖永忠等以六舟深入又邀擊友諒於涭江口功最擢湖廣行省參政從大軍北征别將衞軍由徐州取山東克沂青東平衍聖公希學率曲阜知縣希舉等迎謁軍門興祖禮之兗東州縣聞風皆下與達會師德州克長蘆直沽率舟師並河進遂克元都徇下永平西取大同將三衞率守之充征虜副將軍與傅友德合兵伐蜀克階文乘勝至五里關中飛石死追封東勝侯桑世傑無為人與俞通海等結水寨於巢湖太祖撫其衆俱納款趙普勝有異志世傑發其謀普勝逸去從渡江授秦淮翼元帥拔鎮江徇金壇丹陽攻寕國長槍諸軍克水陽平常州判行樞密院事畧地江陰宜興與廖永安等攻江陰石牌寨没於陣贈永義侯薛祥無為人從俞通海來歸為水寨管軍鎮撫數從征有功授京畿都漕運使分司淮安濬河築隄自揚達濟數百里治淮八年民相勸莫為惡寫像祀之授工部尚書時造鳳陽宫殿帝坐殿中若有人持兵鬬殿脊者李善長奏諸工匠用壓鎮法將盡殺之祥面折善長乃分别交替不在工者并鐵石匠不罪活者千數出為北平布政使治行第一呉復合肥人歸太祖於濠從克泗滁和采石太平從徐達攻鎮江克常州張士誠兵奄至力戰敗之士誠奪氣又從徐達克廬州下漢沔荆諸郡縣從常遇春下襄陽洪武元年授懷遠將軍安陸衞指揮使凡鄖均房竹渚山寨之不附者悉平之三年從大軍征陜西屢敗庫庫明年從傅友德平蜀又明年從鄧愈平九溪辰州諸蠻論功封安陸侯十四年從友德征雲南克普定城田關索嶺開箐道取廣西復臨陣奮發衝犯矢石體無完膚平居恂恂口不言征伐事卒追封黔國公諡威毅庫庫改見前俞通源註楊璟合肥人以管軍萬户從太祖積功擢湖廣行省平章政事率周德興張彬將武昌諸衞軍取廣西還為偏將軍再從徐達鎮北平練兵遼東卒追封芮國公金朝興巢人率衆附太祖從渡江所在征伐皆有功厯遷都督僉事兼秦王左相朝興沈勇有智畧所至以偏師取勝雖未爲大帥而功出諸將上後從傅友徳征雲南駐師臨安元右丞鄂博台等俱降朝興撫輯有方軍民咸悦進次㑹川卒追封沂國公諡武毅鄂博台舊作兀卜台今改正趙庸廬州人歸太祖授樞密僉院從破安慶徇江西諸路征陳友諒大戰康郎山友諒殪與華高率舟師下淮安遂伐士誠呉平擢中書左丞從徐達取山東移兵克汴梁徇下河北州縣下關陜元將伊蘇侵通州從常遇春東拒之遂擣惠州抵大寕伊蘇遁命庸爲副將軍再敗元兵於馬邑耀兵東勝州復從李文忠北伐出野狐嶺擒祝真敗太尉曼濟等進克應昌俘獲無算封南雄侯復從伐蜀討平廣東盜獲賊萬餘人還見奬勞伊蘇舊作也速曼濟舊作蠻子今並改正濮英廬州人初以勇力爲百夫長積功至西安衞指揮太祖命耿炳文選陜西都司衞所卒備邊惟英所練稱勁旅加都督僉事命率所部從馮勝北征抵金山降納克楚遂班師而以英將兵為殿猝為所乘遂見執敵既得英思挾為質英絶食不言乘間引佩刀剖腹死諡忠襄進贈樂浪公納克楚舊作納哈出今改正花茂巢人歸太祖從定江左殲陳友諒平中原山西陜西俱有功再遷廣州都指揮同知世襲廣州左衞指揮使數剿連州廣西湖廣諸猺賊請於山海要害之地立堡屯軍以備不虞報可進都指揮使卒次子英果毅有父風亦以軍功至廣東都指揮使有聲永樂中徐明合肥人以百户從守南昌陳友諒圍城明出劫其營奪良馬以歸友諒陰設穽誘明出戰馬陷被執不屈死追封合肥縣男郈明合肥人與陳友諒戰康郎山死於陣追贈梁縣子王徳朱昇同戰死皆贈合肥子祀康山王仁趫舒城人從征陳友諒戰鄱陽湖没於陣追封舒城縣男陳文合肥人早喪父事母至孝歸太祖南北從征並有功累官都督僉事卒贈東海侯諡孝勇葉昇合肥人自拔采石定金陵平友諒士誠還征中原三平叛蠻積功封靖安侯鎮遼東汪河舒城人少倜儻有大志師事余闕以文章名太祖渡江用為行中書省掾進大都督府都事遣使河南庫庫特穆爾留之被拘六年完節不屈帝甚嘉之拜晉王左相卒庫庫特穆爾舊作擴廓帖木兒今改正鄭亨合肥人父用從太祖於和積功為大興左衞副千户亨嗣職洪武中遷密雲衞指揮僉事後從燕師攻真定旋將勁騎數百襲大寕克之又戰夾河藁城畧地至彰徳耀兵河上從破東平汶上軍入京師遷都督僉事進左都督封武安侯留守北京成祖凡五出塞亨皆在行仁宗即位拜征西前將軍鎮大同轉餉宣府酋長歸附者相屬亨嚴肅厚重善撫士恥掊克卒諡忠毅左君弼合肥人元末據州太祖再攻之走汴守陳州遣使招諭歸其母感泣納款以副總兵底定兩江又胡通王珪甯仲英王雄王玉玉弟瑛周顯鄭祥瞿通皆合肥人孫世陳清皆巢人明開國時各樹戰功陳植廬江人洪武間吏部主事有賢聲建文中厯兵部右侍郎燕兵臨江植監戰部將有議迎降者植厲聲責以大義部將殺植以降本朝乾隆四十一年賜諡烈愍孫鎮合肥人洪武中以經明行修除户部主事知衞輝府燕兵起衞輝當南北之衝鎮堅守不下永樂登極謫戍山海宣德初赦回除上饒丞不就申泰無為人洪武間知延平府㑹諸守有贓敗者令徧搜各省知府至延平止得米三升鈔二貫考天下清廉第二呉敬無為人母疾割肝煎湯母愈而敬不傷事聞太祖官以贊禮郎又同郡沈秉直刲股療母疾章華國刺臂血愈母疾姜潤割股愈母疾俱旌表張澄朱扆呉孝子俱以孝行稱余瑱合肥人官北平都指揮與同官謝貴密謀拒燕兵貴死瑱走居庸關練兵將襲北平成祖命將擊之被執死本朝乾隆四十一年賜諡烈愍甯忠合肥人累官都督建文初從李景隆拒北平戰敗被執不屈死宋瑄合肥人西安侯晟之子建文中為右衞指揮禦燕兵戰死弟瑛嗣侯爵殉土木之難徐凱合肥人建文中以副總兵官鎮滄州燕兵至戰敗被執抗節死瞿能合肥人父通以開國功官都督僉事能嗣官從藍玉擊西番有功燕兵起從李景隆為裨將攻北平與其子率精騎攻張掖門垂克景隆忌之令候大軍同進於是燕人夜汲水沃城方大寒冰凝滑不可登景隆卒至大敗已又從景隆進駐白溝河與燕師戰能父子奮擊所向披靡會旋風起燕王突入馳擊斬能父子南軍由是不振本朝乾隆四十一年賜諡忠烈廖鏞永忠孫任散騎舍人厯官都督建文時與議兵事時宿殿廷鏞與弟銘嘗受學方孝孺孝孺死鏞銘檢遺骸瘞聚寶門外山上被收論死本朝乾隆四十一年賜諡節愍周讓無為人倜儻尚氣節以劉基薦任給事中永樂初兩使西域被拘徙之荒野瀕死者數終不屈諭以朝廷恩信卒令番人隨之入貢有重使古刺集本朝乾隆十五年賜祀忠義祠史昭合肥人永樂初積功至都指揮僉事鎮涼州討平叛寇婁達噶移鎮西寕仁宗立上言西寕俗鄙悍請設學校如中土報可宣徳初曲先衞酋薩竒蘇邀劫西域往來使昭討之長驅至曲先薩竒蘇遁威震塞外尋以征西將軍鎮守寕夏進右都督昭居寕夏十二年老成持重兵政修舉邊境無事婁達噶舊作老的罕薩竒蘇舊作散即思今俱改正陳瑄合肥人累立戰功擢都督僉事永樂初封平江伯會北京遼東餉不足命瑄為總兵都督始議海運歲輸百萬石抵直沽又城天津衞籍兵萬人守之宣宗朝鎮守淮安兼督漕運疏更民運為兑運漕政益修漕渠在江淮問者瑄功為大卒諡恭襄蔚綬合肥人厯官布政司參議永樂中拜禮部侍郎綬履行端方宣德初以禮部尚書致仕卒龍源合肥人少警敏力學永樂初豫修大典授工科給事中親喪家居見民牧不良即聞於朝其人賂當道誣之遂罷歸方正合肥人永樂初授工部主事時建北都督工規畫有條擢江西參政平峒賊遷福州布政丁毅無為人永樂間進士選庶吉士性剛直時近臣有紀綱者勢傾中外衆莫敢忤毅獨正言與之抗綱服其直不能厄鄭泰舒城人永樂進士任給事中讜言動衆超補刑部侍郎璽書襃美朱昂無為人厯任福建參政巡海有聲績歸休二十五年葛巾野服如未嘗有勢位者有里人負屈嘗陰白有司以伸之人或造謝杜門不見李春無為人正統進士兵科給事中有直聲轉福建參議汀盜起春親抵巢穴諭降進江西左參政撫諸洞反側厯兩藩俱著聲績沈譓合肥人景泰進士知東昌府政尚嚴明常祿外不入一錢折獄明允銓注天下廉能官第一王敬廬江人景泰間任大理評事力白三原王恕之冤衆論多之鮑德舒城人景泰舉人任華容縣知縣興學勸農懲奸理冤治稱湖湘第一呉凱合肥人由進士擢兵科給事中封駮敷奏動存大體承㫖覈邊儲罷武弁不職者四百餘員仕至廣東少參葉鸞舒城人景泰進士任貴州參議雜苗難治鸞廉靜忠誠按部所至一斷以法有宣慰刲人腸藩臬莫能糾鸞馳諭即服罪又宣慰有奪嫡者僉允其請鸞獨不署名親老授副使終養張淳合肥人成化進士厯御史出勘牧馬草場請罷近畿仁壽宫皇莊以益牧地議雖不從他皇莊所侵據者緣是悉還民按貴州擒叛苗普安阿保父子撫其黨五十九寨籍為編氓正德時積官至右副都御史巡撫保定其知吉安尹應天並有異政蔚春合肥人宏治進士兵科給事中陳時政八事邊務七事咸見施行參政廣西以鯁介為忌者中傷乞歸鄭時舒城人景泰進士授御史遇事敢言出按湖廣江西著風采坐事謫内鄉知縣擢延平知府皆有名遭喪歸廬墓三年白兔馴墓側累官南京刑部尚書以清慎稱秦民悦舒城人天順進士厯廣平知府考績為畿内冠累擢南京吏部尚書以星變偕九卿陳時政二十三事多議行張政廬江人父喪廬墓虎狼遠跡同郡有王紹由進士厯御史母喪廬墓高興父喪廬墓俱正統中旌表又沈諲母喪廬墓成化中旌表又胡紀胡鐸父母喪廬墓錢敏母喪廬墓張梅父喪廬墓李得春父母喪俱廬墓孫翦兒母喪廬墓李大經周繼成詹天瑞俱刲股廬墓先後旌表薛遠祥之孫正統進士景泰時官户部郎中有能聲成化中用兵兩廣出督軍餉諭衆能破賊者以其資予之將士爭奮賊平進户部尚書周璽廬州衞人宏治進士厯禮科都給事中武宗時屢以災異偕同官切陳時弊後擢順天府尹劉瑾用事璽數與牴牾詞色無假瑾積憤矯㫖下詔獄榜掠死郭鋐合肥人宏治中以總兵官督漕運筦漕十三年軍民利病必力陳於朝嘗濬通州河二十里置壩令淺船搬運歲省帑金數萬鄭元合肥人自元以上五世同居宏治中旌表曹琥巢人宏治進士授户部主事御史周廣疏劾閹官被謫琥抗疏救之貶尋甸通判再遷廣信同知時鎮守中貴托貢獻頻有徵斂琥攝府事堅持不予擢鞏昌知府未任卒方欽巢人宏治舉人知福山縣同官俱為流賊所害欽以好官不要錢獨免劉瑾用事監司斂諸屬金銀獻媚欽獨無所輸因注下考子榘知平陰縣耿直忤時亦有清操李紹賢巢人正德中除行人篤學敦行以小臣抗疏諫南巡被杖創甚死萬振孫合肥人嘉靖進士服官剛正知襄陽府舉覈屬令贓過令賄監司為解勿釋也陞副楚臬適礦使縦横振孫捕其爪牙立斃之以忤㫖削籍劉崙無為人嘉靖進士擢御史巡陜西修舉茶馬八事回按順天疏陳畿輔灾荒疾苦轉太僕少卿會景王之國廷議恐其騷擾推崙湖廣巡撫及期營辦有方公私不擾楚人頌之宛嘉祥廬江人嘉靖舉人知思南府撫戢强寇四境帖服民立碑頌之蔡悉合肥人嘉靖進士授常徳推官累官南京尚寶卿署國子監嘗請立東宫又極論礦税之害有學行淡宦情仕五十年家食强半清操亮節淮西人宗之丁華一無為人兄弟五人不忍析居相與折梅五枝共接一本各識之祝曰若一枝枯即某有異志後五枝俱秀而實鄉里稱為五果丁氏又向侃兄弟五人白首同居妻亡鰥居四十年又薛崇禮與兄崇仁俱以孝友為時重竇子偁合肥人萬厯進士授大理評事抗疏請建儲後守泉州課最督學湖廣大計註廉明第一遷福建布政司朱萬春無為人萬厯進士知上饒遏璫䜿開採之擾省長差拖累之患擢御史劾本兵糾總河論首輔請東宫出閣講學按四川奏留帑金充採辦免加派賑灾荒轉江右道平鄱湖劇賊内陞厯左通政許如蘭合肥人萬厯進士知紹興府舉卓異後巡撫廣西折悍藩平劇賊進副都御史趙一韓巢人萬厯中進士九江推官時中璫收税恣横痛繩以法視榷蕪關廉聲比前官葉茂才晉貴州副使魏璫時能植節自振朱來遠廬江人萬厯進士初令秀水除雜差以蘇民禁私販以惠商勸課省刑時稱善治仕至太常卿盧謙廬江人萬厯進士擢御史出為江西右參政引疾歸崇禎中流賊犯廬江謙命服危坐中門賊至不屈死同時舉人張受畢伊周亦不屈被殺謙贈光祿卿本朝乾隆四十一年賜諡烈愍張受畢伊周並賜祀忠義祠胡守恒舒城人崇禎進士授推官改編修乞終養歸里流賊攻舒城守恒與遊擊孔廷訓督民兵共守城陷死之贈少詹事諡文節沈志傑無為人崇禎末流賊犯境志傑率子可則姪可仕及鄉兵乘夜砍營不勝俱罹難楊四知無為人崇禎進士知漢陽擢御史陳江北被寇之慘兵將玩寇之弊又上銓政京營漕運及被寇地方求改折免等疏巡視兩關勞瘁卒官余承德無為人崇禎末流寇至祖母及母被執承徳號呼衞之並遇害妻楊氏投河死妹玉女亦不屈死程楷合肥人厯官參政崇禎十五年張獻忠攻城楷方里居與知府鄭履祥經厯鄭元綬分門拒守會提學徐之垣以試士至獻忠遣其下偽為諸生襲儒冠以入夜半舉礮城中大擾楷不屈死之贈光祿卿本朝乾隆四十一年賜諡烈愍張四哲合肥人崇禎乙亥流寇圍廬同弟回美四竒與賊戰城下不勝退與弟暨妻女子婦共十五人投井以殁王寖大合肥人崇禎進士事繼母撫異母弟五人内外無間言乙亥守城親冒矢石厯任南吏部郎家居三遇旱蝗捐資助賑規畫甚詳尤萃力史書所著有春秋説史綱鈔數十萬言黄得功合肥人後徙開原衞少負竒氣膽畧過人崇禎中以討流賊功封靖南伯福王時進封侯命移鎮太平大兵南下倉卒中流矢得功知事不可為拾所拔箭刺吭死其妻聞之亦自經本朝乾隆四十一年賜諡忠桓本朝張維德合肥人明崇禎乙亥流賊入境其父被執將見殺維徳甫十歲延頸就刃求代賊義而釋之順治丙申父没哀毁骨立廬於墓三年張振祚廬江人父宏任攜孥知四川嘉定州崇禎壬午流賊逼城祚奉父命領數騎突出求救城陷祚還見父被害觸石死時弟振祺應試囘籍阻絶無音耗及順治甲午聞信奔赴至保寕不得前巡撫李國英拔署梓潼縣三年道始通即辭官尋母遇之峩眉縣年七十餘矣奉以歸又合肥張文達壬午夏詣北莊收麥聞寇至奔還於積屍中覓得其父負行七十里抵莊得全達年至一百三歲勅建坊又廬江高克謹年十三父為寇執謹乞身代寇兩釋之又郡人方華張大履胡蔭楊光耀王鳳吾賈文彪郭士瑛許明時宋志靈張一綸魏振趾張應星俞尚質俱以孝友聞李天馥合肥人順治戊戌進士授檢討厯工刑兵吏四部尚書以老成清慎拜大學士存心虚公甞謂變法不如守法救弊不能無弊時以為得體卒諡文定子孚青康熙巳未進士官編修有詩名王綱合肥人順治壬辰進士授兵部督捕郎逃案山積綱為振滯獄釋株連冬月流徙出關者給湯粥衣絮終通政參議張肯穀巢縣人知秦州事時巴三綱之亂賊衆潛布城中猝發執肯穀去誘降不屈紿守者得脱奔叩幕府陳進剿策躬為嚮導一鼓而三綱授首遷鳳翔知府轉濟南皆著治績胡永亨守恒子守恒死壬午難永亨募勇士夤夜入賊營收父骸而葬之康熙庚戌成進士爲户部郎奉命鞫廣東獄仁恕得情分巡肇高廉羅道公亷持法於積弊多所釐剔楊國龍廬江人任江西廣信府把總康熙十七年勦賊陣亡賜卹如例王祥巢人江西把總康熙十五年耿逆之黨據萍鄉祥攻之陣殁賜卹如例阮自雄無爲人順治十六年以剿海宼功由把總升鎮江千總康熙十三年從征逆藩呉三桂有功二十年以沅州鎮標十總從擊貴州八萬猺甫至洞口賊從篁棘中宇岀自雄戰殁賜卹如例劉承恩廬江人厯廣東潮州副將康熙十五年呉逆倡亂滇黔承恩協衆將摧鋒陷陣大小三十餘戰所向披靡十八年以力戰陣亡賜銀歸葬乾隆二十六年祀昭忠祠王承業廬江人由行伍爲廣東總兵官管副將事康熙十七年援勦廣西有功二十年進征雲南殁於陣詔贈右都督董金鳳合肥人乾隆戊戌一甲三名武進士以