南芍陂上魏鄧艾屯田於壽春人賴其利唐貞觀十五年立廟相山廟在宿州西北九十里相山上宋大觀中封山神為崇惠侯本朝乾隆二十三年重修二十四年頒賜御書惠我南黎扁額徐王廟在宿州北近墓側並見陵墓門王乏嗣明太祖追封為王立廟於太廟東以祭既而稽古無文乃即王所生里立廟寺觀皇覺寺在府東南二里明太祖微時甞為寺僧洪武初敕建改名龍興寺元封寺在里定唐遠貞縣元東中六建十禪窟寺在里定三遠縣峯山西内北三舊名十虎窟寺岀前唐有元繫和虎間石建旁寺有當山茂林腰修有竹泉森穿映屋寺壁而宇棲賢寺在寅壽行州達西汝北陰魏東書城蕭寶寅巳陷遂傳停正壽始春元之年棲三賢月寺寶漆園觀在縣定東遠北縣一治百東三寰十宇步記唐漆宏園觀道元在定年敕遠建名宦漢劉平彭屬城郡人有王劇莽時賊輒守令菑平邱守長之政所教至大皆行理每一郡其稱能梁統烏守氏有人治世祖績吏時人為九畏愛江之太宋均安建衆武人中為九多傷江害太均守以郡為多民虎患暴數者咎為在民殘患吏當勞募設勤張檻捕穽非猶憂恤東之遊本渡乃江一中去元檻元穽除年山削陽課楚制沛其多後蝗傳言其飛虎至相九與江界二者輙山民東共西祠散之去衆由巫是名遂取稱童遠男近女浚為遒公縣嫗有唐后歲歲改易至山娶不者敢皆嫁娶娶巫均下家勿書曰擾良自民今於以是後遂為絶元賀宕人渠肅宗時厯九江太守沛郡太守以清潔稱欒巴南黄人順帝時遷沛相有政績楊匡陳留人順帝時補蘄長政有異績滕撫北海劇人永嘉中為九江都尉賊馬勉等稱帝撫討斬之廬江賊攻尋陽又攻盱眙撫遣司馬王章擊破之又擊破廣陵賊張嬰斬厯陽賊華孟陽球漁陽泉州人靈帝時拜九江太守時九江山賊起連月不解球到設方畧凶賊殄破收郡中奸吏盡殺之盧植涿人熹平初九江蠻反四府選植才兼文武拜九江太守蠻寇賓服王吉浚儀人熹平中為沛相曉達政事能斷察疑獄發起奸伏多出衆議專選剽悍吏擊斷非法袁忠汝陽人初平中為沛相乘葦車到官以清亮稱舒仲應建安中為沛相袁術以米十萬斛與為軍糧仲應悉散以給飢民術怒將斬之仲應曰知當必死故為之願以一人之命救百姓於塗炭時苗鉅鹿人建安中為壽春令令行風靡始之官乘薄軬車黄牸牛居官歲餘牛生一犢及其去留其犢謂主簿曰令來時本無此犢也由此名聞天下三國魏鄧艾棘陽人太祖時人垣崇祖為豫州表薦之起家為平西長史梁郡太守為政清靜有高士風劉粹蕭人永初三年豫州刺史領梁郡太守有政績梁夏侯夔譙郡譙人大通六年為豫州刺史率軍人於蒼陵立堰溉田歲收穀百餘萬石以充儲備兼贍貧人夔兄亶先經此任並有恩惠百姓歌曰我之有州頻得夏侯前凡後弟布政優優在州七年遠近多附之魏元澄北魏宗室襲封任城王宣武時任楊州刺史鎮壽春下車封孫叔敖之墓毁蔣子文之廟總衆南侵所在尅㨗詔書褒美北齊盧潛范陽人武成時除揚州刺史鎮淮南十三年大樹風績為陳人所憚陳主與邊將書曰盧潛在卿宜深備之周游元任城人為壽春令有能名王長述霸城人仁州總管有能名隋趙軌洛陽人為壽州總管長史芍陂舊有五門堰蕪穢不修軌勸課人史更開三十六門灌田五千餘頃人賴其利張䖍雄清河東武城人大業中為壽春令有治績唐高智周晉陵人高宗時壽州刺史其治尚寛惠文雅行部先召學官見諸生訪經義及時政得失既乃錄獄訟考耕餉勤惰以為常員半千全節人中宗時以賢見忌出為濠蘄二州刺史所至禮化大行李瀾永泰初為蘄令梁宋兵興瀾諭降劇賊數千人刺史曹升襲賊敗之賊疑瀾賣巳執瀾及其弟渤兄弟爭相代死瀾女亦求代父皆遇害張鎰大厯初為濠州刺史政條清簡延經術士講教生徒比去州升明經者四十人李遜趙郡人為濠州刺史初濠卒惡都將楊騰剋削謀殺之騰覺而走因滅騰家剽刦遜至鐫諭利害衆釋鎧自歸觀察使欲令限外浮斂遜一不應張萬福元城人代宗時攝壽州刺史舒廬壽都團練使州送租賦詣都為賊所奪萬福領輕兵尾襲賊倉卒不得戰悉擒之盡得其所亡并先掠人妻女財蓄萬計還其家不能自致者給船車以遣就拜刺史後詔鎮咸陽會李正己反屯兵埇橋江淮漕艘及進奉舩千餘不敢踰渦口徳宗拜萬福為濠州刺史萬福馳至渦口駐馬於岸悉發漕船相銜進賊兵倚岸熟視不敢動張建封南陽人德宗時為濠壽廬觀察使是時四方尚多故乃繕埤隍益治兵逺州民列狀乞留陳堯佐閬中人景德中知壽州歲大饑出俸米為糜粥聞者競勸出粟益多賑活數萬人崔立鄢陵人真宗時知安豐軍大水壞期思塘立躬督繕治踰月而成梅詢宣城人真宗時為三司户部判官坐事降出知濠州劉航魏人真宗時知宿州押伴夏使使者多所邀請執禮不遜且欲服毬文金帶入見航皆折正之江澤天禧中知定遠縣率民修廢塘濬古港以灌高卬之地賜詔奬焉俞獻卿歙人天禧中為安豐縣尉有僧貴安積財甚厚其徒殺之托以遊方不歸獻卿紿言吾與安善不告而去豈有異乎其徒色動因執之得其所瘞尸一縣大驚張㫖河内人明道中淮南饑自詣宰相陳救荒之策命知安豐縣大募富氏輸粟以給饑者浚渒河三十里疏泄支流注芍陂為斗門溉田數萬頃外築堤以備水患李若谷緱氏人仁宗時知壽州豪右多分占芍陂陂皆美田夏雨溢壞田輒盜決若谷擿冒占田者逐之每決輒調瀕陂諸豪使塞堤盜決乃止連庶應山人仁宗時為壽春令興學尚文尊禮秀民以勸其俗開瀕淮田千頃縣大治陳希亮青神人仁宗時知宿州州跨汴為橋水與橋爭常壞舟希亮始作飛橋無柱以便往來詔賜縑以襃之仍下其法自畿邑至泗州皆效之厯知曹州會淮南饑安撫轉運使皆言壽春守王止民不任職正民坐免詔希亮乘傳代之轉運使調理胥米而蠲其役凡十三萬石謂之折役米米翔貴民益饑希亮至除之且表其事旁都皆得除又言正民無罪職事辦治詔復以正民為鄂州魏炎婺源人仁宗時知壽州盜殺寺童子有司執僧笞服炎憐其非罪命脱械縱去一府爭以為不可後數日得真盜王克臣洛陽人仁宗時通判壽州有卒夜入州廨擊郡將既就擒而監軍使所部被甲操刃立庭中克臣徐言曰此不過為盜耳遣甲者去戒卒勿妄引他人衆懽服朱壽隆諸城人仁宗時知宿州會州多劇盗至白晝被甲剽攻郡縣不能制壽隆設方畧耳目捕斬干餘人包拯合肥人仁宗時為定遠令公廉正直聽斷燭隠豪右斂迹以忠信禮義教民政績彰聞馬從先祥符人知宿州宿在淮汴間素難治從先厚賞以求盜法甚嚴值大水發廪賑流亡全活數萬人代還知壽州以老辭英宗諭遣之曰聞卿治行藉甚壽尤重於宿姑為朕往既至治如曩時朱景偃師人英宗時知壽州秩祿視提點刑獄始至亟發廪賑給勸富者出積穀所活數萬城西居民三千室建議築外郭環入之公私稱便韓晉卿安邱人神宗時知壽州奏課第一蘇頌同安人元豐初知濠州游酢建陽人徽宗時知濠州多惠政州人德之翟汝文丹陽人徽宗時諫帝東封責監宿州税趙士嶐太宗之後為郡縣吏累遷至淮南西路兵馬鈐轄駐壽春劇賊丁一箭衆號十萬來攻城士嶐募軍中敢死士張宣持槊縋城下擊殺數卜人賊衆披靡乃選壯士數百人夜開城門出其不意擊走之王時升紹興中通判安豐軍言淮南土皆膏腴然地未盡闢民不加多者縁豪強虚占良田而無徧耕之力流民襁負而至而無開耕之地望凡荒閒田許人剗佃户部議期以二年未墾者如所請京西路如之劉泰樞密院忠義軍前正將慷慨好義以私財募兵三百金人攻壽春泰率所部赴援轉戰身被數十創一夕死李光上虞人紹興中擢吏部尚書時苗傅餘黨韓世清久屯宣城調發不行光請先事除之乃授先淮西招撫使光假道至郡世清入謁縛送闕下伏誅周淙長興人紹興三十年金主亮傾國入邊命淙守濠梁時淮楚舊有置砦自衛者淙為立約束結保伍賴以全活不可勝計李祥無錫人孝宗時為濠州錄事參軍光宗時為淮西運判兩淮鐵錢比不定祥疏乞官賜錢米銷濫惡者更鑄紹熙新錢從之劉穎西安人光宗時遷司農少卿淮西總領内府宣限既迫每移供軍錢以應歲輸穎蒐吏弊汰冗員分明綱解自是不復那移王阮江州人光宗時知濠州請復曹瑋方田修种世衡射法日講守備與邊民親訪北境事宜終阮在濠金不敢南侵黄幹閩人通判安豐軍淮西帥檄幹鞠和州疑獄至則具得其殺人投井狀囚驚服崔與之廣州人淮西提刑司檢法官斷獄平恕呉潛寕國人紹定中遷淮西總領告執政用兵復河南不可輕易當以和為形以守為實以戰為應趙師揆為淮西提刑兼領屯田事奏以荒圩給軍士其屯田為民世業者勿奪從之及代去吏請獻羨錢二十萬師揆曰後將病民矣楊照濠州將官金兵圍城急照躍上角樓刺賊之執黒旗者洞腹抽腸而死照中流矢卒有統領丁元遇金人十八里洲被圍元大呼其徒衆一舟二百餘人皆力鬬至死杜杲邵武人久習邊事知濠州制置使趙善相謀復盱眙密訪杲杲曰賊恃外援當斷盱眙橋梁以困之卒用其策成功李全衆數萬駐榆林阜請降輜重甚富或請誘而圖之杲曰殺降不仁奪貨不義紬之則有後患諭而遣之張斌理宗時為濠州統制柘塘之戰没於王事贈官三轉李庭芝隋州人理宗時知濠州城荆山以備淮南切中機會王霆東陽人理宗時知濠州節浮費糴粟買馬以備不虞再任職事修舉劉雄飛理宗時為壽春守臣元兵圍城捍禦有功官三轉元博特音奈曼部人為壽穎二州屯田府達嚕噶齊時二州地方多荒蕪有虎食民妻其夫來告博特音為設機立檻誘虎射之虎患頓息博特音舊作别的因奈曼舊作乃蠻達嚕噶齊舊作達魯花赤今俱改正張晉亨南宫人世祖中統四年命將兵戍宿州首言汴堤南北沃壤閒曠宜屯田以資軍食乃分兵列營以時種藝選千夫長督勸之事成期年皆獲其利安汝明寕晉人延祐間宰定遠首興學校謹禮奉法御吏甚嚴民有冤不能仲必平枉使直興利除害如嗜欲然張謙高唐人至正六年為安豐路總管賑恤饑民政績可紀明周榮蓬萊人洪武中靈壁縣丞有惠政坐累逮刑部其耆老羣赴輦下稱榮賢帝賜鈔及襲衣宴榮及耆老而還之㝷擢知本縣民益樂其寛惠閻斌乾州人宣徳中臨淮縣丞任滿當去邑人詣闕請留詔許之且增其俸在任二十三年清勤惠愛始終如一田誠洪熙時靈壁縣丞滿九載父老恐其遷去赴闕言其居職廉能撫民有道乞還之百姓詔以州判官職復任許敏洪熙時壽州州判善治巳愛民民奏乞擢用即用為本州同知九載當遷民更乞留進秩還任楊瓚蠡縣人正統時知鳳陽府帝鄉勳戚子孫多犯禁至是始遵約束正統十年大計羣吏始命舉治行卓異者瓚與焉受宴賚而還又數年超擢浙江布政使章鋭鄞縣人成化中知鳳陽府洊罹水旱奏行救災備荒十六事民困大蘇居數年省修陵浮費數萬陞湖廣參政劉㮣濟寕人成化末知壽州廉明果毅摘發如神毁境内淫祠幾盡置義冡興社學四鄉各建預備倉養老恤孤崇奬風節三年政教大行曽大有麻城人宏治中知定遠縣凡學校公廨城郭陂池修治一新撲滅妖賊孔布張洪一境宴然蔣賢隴州人正德中靈壁縣主簿賊楊虎犯縣與指揮錢英同拒守城陷被執罵賊不屈與英皆死之劉采麻城人嘉靖中宿州知州歲饑請發帑金轉糴代民輸賦俟秋成取償漕使者不可采竟矯發之及秋而償民無負者林大槐莆田人嘉靖中知懷遠縣性廉介曰食不過一蔬修築陂塘以資灌溉民賴其利卒於官至無以為殮黄克纘晉江人萬厯中知壽州好士愛民申請編定賦額名曰一條編至今循守其法嚴容暄漳浦人崇禎時知鳳陽府流賊肆焚掠容暄囚服匿獄中得之大罵遇害血浸石階宛如其像滌之不滅士民取石立冢萬元亨南昌人父文英為鳳陽推官崇禎中賊掠城知府嚴容暄為賊所殺文英方卧病賊索之元亨年甫十六以身代父岀大罵遇乾隆四十害文英獲免本朝年賜諡節愍朱國相榆林人崇禎中官中都留守賊犯鳳陽鳳陽故無城國相率兵禦之力屈自刎死本朝乾隆四十年賜諡烈愍唐良鋭全州人崇禎中知靈壁縣十五年流寇陷其城抗罵死本朝乾隆四十年賜諡節愍本朝史記功漢之軍鑲紅旗人順治初知鳳陽府瘡痍後以撫綏為事輕徭省役勸課耕桑民皆樂業張純熙真定人順治進士授鳳陽推官嚴明有守猾吏不敢營私權要請屬㮣拒不允以持正稱李大生猗氏人順治十年守壽州莅政精敏境内水利久湮為重修芍陂塘躬督畚鍤田疇資以灌溉清里甲革耗羨誅鋤奸蠹修學舍建東西齋集諸生奬誨之治化大行聶士貞監利人康熙七年知定逺縣先是邑苦逋賦或株繫無辜士貞盡行省釋令以限完納逋户感徳輸賦倍早期年流民盡歸田畝墾闢因崇學校奬節義事簡民安鞭笞不用以憂去官士民號泣遮留三日始岀境席屺呉縣人乾隆三十年知壽州政尚寛平增修書院立普濟堂築芍陂蔡城二塘水利所關民甚賴之沙琛太和人嘉慶六年知懷遠縣壬戌宿州之亂募鄉勇堵禦鎮兵至得速勦滅賴懷遠之扼其衝也
