他賊所獲啟愚晝夜哭不絶諸壘賊哀之釋其父與弟隆慶中官兵討賊讓與二子從之累著奇績二子前後戰死旌讓冠帶不受老於家李槐長樂人隆慶中賊起槐聚衆衞其所居之玉茶鄉賊屠長樂居鄉凡七十九不敢入玉茶後從副使王化擊蘇繼春於泉砂埔後繼不至賊圍之數重力殺數賊創重死朱鳳興寕人充十三都巡司弓兵崇禎三年流賊攻破司城𬒳執巡檢匐伏求免鳯罵之縛一晝夜復問從否曰從官不從賊賊遂磔之曾紹宗平遠人為縣吏崇禎中賊起戰禦有功授石鎮把總勦壩頭鐵山嶂賊生擒全汝器等又斬九蓮山賊謝九功生擒謝一善等升守備後與流賊戰馬蹶徒步力戰死本朝李恒炱程鄉監生内行醇謹好善樂施順治七八年間勦逆兵興恒炱傾囊以助軍需卒𣏌鄉賢謝天慶程郷人質性醇厚常集古人善惡行事規戒里黨歲饑力為勸賑鄉人徳之康熙五年祀鄉賢李其昌字遜伯程鄉人順治中積軍功至隰州都司康熙十二年告病囘次年劉進忠叛賊黨聞風嚮應脅之從逆其昌奮罵之賊遂焚其室殺一家十人縛其昌掘坑生埋之子以猷後獲賊剖以祭父李焜程鄉人順治間以功授都司性孝友樂施與康熙十三年劉進忠叛焜築碁枰寨固守亂平請於當事免其鄉徭役之半卒祀忠孝祠何亮程鄉人官千總劉進忠叛檄將士赴郡亮隨都司白虎至郡始覺遂與虎計密請援師恢復事洩進忠縛亮叱之亮曰爾背義賊臣我當上訴天帝待爾對質遂遇害一家死者九人同邑千總鄧材亦以不附賊被害事聞均廕其子千總陳瀾程鄉廪生善事繼母康熙十三年閩寇之變傾貲捍禦四十八年祀鄉賢周南長樂人㓜孤事母孝母歿廬墓終身卒祀孝子祠姚建安平遠人事母孝敦行樂施二子俱知名卒祀鄉賢李坤鎮平人以守備斬賊林青袍於石正續征河婆五指石瓦子寨俱有功調赴廣西署總兵禦吳逆兵於籐縣賊潰復合馬陷失足其子容縣都司國柱追援不及井亡於陣事聞賜坤諡忠烈陳公泓興寕貢生性至孝侍母病衣不解帶及殁廬墓三年雍正十一年祀孝弟祠李喬基嘉應人隨父客臺灣乾隆五十一年林逆反喬基倡粤民從官軍禦賊斬馘無算明年偕子舉柏率健士數十人詣鹿仔港請火藥為賊所偵皆戰死青埔三子端柏亦於是年十月陣亡事聞贈知縣銜梁槐程鄉諸生父卒哀毁盡禮㓜弟為土寇所掠槐詣冦願以身代弟賊感而釋之同邑諸生梁汝楫敦孝友崇實學俱乾隆九年祀孝義祠蕭東日興寕人事親孝母死哀毁骨立既葬廬墓三年乾隆十年祀孝弟祠劉希燾長樂監生任陽榖縣丞乾隆三十九年王倫之亂力戰被害贈鑾儀衞經厯祀昭忠祠温模長樂人任通渭縣典史乾隆四十九年敎匪犯城自經死祀昭忠祠嘉慶七年奉㫖廕子鍾燕超長樂人任諸羅縣典史乾隆五十一年林逆破城死之祀昭忠祠余建勲平遠人乾隆六十年隨征湖北陣亡嘉慶七年祀昭忠祠楊堂嘉應人蒼溪縣典史嘉慶三年川匪擾亂被害於永興場糧臺祀昭忠祠梁崇嘉應人咸寕縣典史嘉慶四年隨征敎匪陣亡祀昭忠祠李培秀嘉應人四川試用典史敎匪之亂䕶糧被害祀昭忠祠李象斌嘉應武舉官千總嘉慶七年出海遇賊戰死祀昭忠祠同邑陳得貴嘉慶二年隨征銅楚陣亡黎英嘉慶六年出師湖北陣亡俱祀昭忠祠李淳長樂人貴陽府經厯嘉慶二年苗匪滋事陣亡祀昭忠祠李正勇長樂人由侍衞升授臨武營叅將嘉慶四年征楚陜敎匪陣亡賜祭葬廕子劉誠纘長樂監生性至孝母病目患瘵誠纘䑛母目經二十年而瘵病俞䘮母廬墓三年父殁哀毁盡禮嘉慶四年旌蕭水清平遠人任湖北保康縣尉嘉慶元年楚匪倡亂攻保康城水清率衆固守城陷死之合家皆自刎贈縣丞祀昭忠祠妻林氏媳韓氏孫女瀛仙並入節烈祠子其馨其芳姪祚超妻弟林良鳳並入昭忠祠利振紀鎮平人由侍衞官守備嘉慶二年隨征陜西敎匪陣亡四年奉旨廕子黄衮鎮平人署白河縣知縣嘉慶七年勦賊陣亡賜卹廕子流寓宋劉安世魏人以元祐黨謫居英州同文館獄起蔡京乞誅滅安世等家讒雖不行猶徙梅州京因使者入海島諷令過安世脅使自裁又擢一土豪為轉運判官使殺之梅守勸安世自為計安世色不動對客飲酒談笑徐書數紙付其僕皆經紀同貶當死者之家判官疾馳未至二十里嘔血死乃免列女明張經妻詹氏興寕人天順五年山賊攻陷興寕詹氏被擄大罵延頸待刃賊殺之年二十三歲黄萬全妻賴氏興寕人年二十五夫死守節宏治末流賊刧其鄉被執紿曰汝解刀即從汝遂奪刀斫賊賊怒支解之古玉安妻黄氏程鄉人年二十而寡孝事舅姑克守節操正德閒為賊首李四仔所掠罵曰我守節多年肯為賊汚耶遂遇害李尚猷妻葉氏程鄉人年十八而寡為木窖賊所掠欲犯之瞋目大罵遂遇害古氏女程鄉人許字葉鳳起未婚葉遘危疾往奉湯藥月餘葉死即入室自縊家人破門救之後葉既葬往省其墓因覓毒藥服之遽歸而死家人更營大壙而合葬焉林日照妻李氏平遠人夫病革囑以撫孤及卒李欲殉家人以遺言慰之乃强進飲食及孤宸補邑弟子員李歎曰林氏有託吾事畢矣遂不食而死本朝張氏女名招叔程鄉人張斗衡孫女父母早逝祖母徐撫之年十四未字順治三年三月隨祖母避寇於馬頭寨被賊執不從乞死賊彊之招叔大罵賊怒加數刃猶縛之去將近南蛇岡見傷重始棄之祖母追視猶開目泣曰無復報恩也乞水一咽而絶其地不生青草者約二丈餘同邑蔡聲逺妻高氏城陷謂夫曰急營自脱妾死不受辱遂扃户自刎其姒伍氏亦投水死陳某妻黄氏興寕人嫁両月而寡遺腹生一女守節十餘年順治十八年寇掠其鄉牽之使行罵曰吾守節半生不料為賊汚手願速死賊怒戳其指割其耳罵愈厲遂殺之越三日顔色如生孔王惠妻張氏長樂人順