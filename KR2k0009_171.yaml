body:
  text: 大清一統志嘉應直隸州在廣東省治東七百里東西距四百一十五里南北距二百里東至潮州府大埔縣界一百四十五里西至惠州府龍川縣界二百七十里南至潮州府豐順縣界八十里北至福建汀州府武平縣界一百二十里東南至豐順縣界九十里西南至惠州府永安縣界二百四十里東北至福建汀州府上杭縣界一百二十五里西北至江西贛州府長寕縣界一百六十里本州境東西距一百九十五里南北距一百二十里東至潮州府大埔縣界一百四十五里西至興寕縣界五十里南至潮州府豐順縣界八十里北至鎮平縣界四十里東南至豐順縣界一百里西南至興寕縣界八十里東北至鎮平縣界五十五里西北至平遠縣界六十里自州治至京師八千七百六十三里分野天文牛女分野星紀之次建置沿革禹貢揚州南境春秋戰國爲百越地秦爲南海郡地漢爲南海郡揭陽縣地東晉後爲義安郡海陽縣地齊分置程鄉縣屬義安郡至隋因之唐屬潮州五代南漢乾和三年於縣置敬州宋開寶四年改曰梅州屬廣南東路熙寕六年廢州元豐五年復置宣和二年改義安郡紹興六年廢州十四年復置元至元十六年升爲梅州路二十三年仍降爲散州屬廣東道明洪武二年廢州縣屬潮州府本朝初因之雍正十一年升爲直隸嘉應州領縣四嘉慶十一年升嘉應府復置程鄉縣十六年仍改為直隸州省程鄉縣領縣四興寕縣在州西七十里東西距一百二十里南北距二百里東至本州界七十里西至長樂縣並惠州府龍川縣夾界五十里南至長樂縣界九十里北至平遠縣並江西長寕縣夾界一百里東南至本州界七十里西南至長樂縣界二十里東北至平遠縣界一百八十里西北至江西長寕龍川兩縣夾界九十里漢南海郡龍川縣地東晉分置興寕縣屬東官郡宋齊以後因之隋改屬龍川郡唐屬循州南漢乾享初升為齊昌府徙縣治宋天禧二年復為縣仍屬循州元因之明屬惠州府太朝初因之雍正十一年改屬嘉應州長樂縣在州西一百一十里東西距一百六十里南北距二百十五里東至興寕縣並潮州府揭陽縣夾界九十里西至惠州府龍川河源兩縣夾界七十里南至惠州府陸豐縣界一百七十五里北至興寕縣界四十里東南至潮州府揭陽縣界一百里西南至惠州府永安縣界一百里東北至興寕縣界十五里西北至惠州府龍川縣界六十里漢南海郡龍川縣地東晉以後為東官郡興寕縣地五代南漢時移興寕縣來治宋天禧二年興寕還故縣以其地為長樂鎮熙寕四年改置長樂縣屬循州元因之明屬惠州府本朝初因之雍正十一年改屬嘉應州平遠縣在州西北七十里東西距一百里南北距一百二十里東至鎮平縣界五十里西至江西贛州府長寕縣界五十里南至本州界九十里北至長寕縣界三十里東南至本州界七十里西南至興寕縣界一百里東北至福建汀州府武平縣界四十里西北至長寕縣界三十里漢揭陽縣地東晉為海陽縣池齊以後為程鄉縣地明嘉靖四十二年分程鄉及惠州府興寕縣地置平遠縣屬潮州府本朝初因之雍正十一年改屬嘉應州鎮平縣在州西北六十里東西距一百十里南北距八十里東至本州界六十里西至平遠縣界五十里南至本州界四十五里北至福建汀州府武平縣界三十五里東南至本州界八十里西南至平遠縣界五十里東北至福建汀州府上杭縣界七十五里西北至武平縣界五十里漢揭陽縣地東晉為海陽縣地齊以後為程鄉縣地明嘉靖以後為平遠縣地崇禎六年分平遠及程鄉縣置鎮平縣屬潮州府本朝初因之雍正十一年改屬嘉應州形勢北連章貢東控閩汀圖經萬山北拱四水東流天然勝麗舊程鄉縣志風俗民性質實尚勤儉重本薄末舊程鄉縣志地狹民瘠尚氣輕生興寕縣志君子質木小人悍蔽長樂縣志俗稱謹愿婚姻以檳榔雞酒為禮病惟鍼灸平遠縣志其民敦樸力田終歲勞苦以食力酷信風水屢葬屢遷鎮平縣志城池嘉應州城周九百八十五丈門五南臨河東北轉西池長五百八十丈明洪武十八年因程鄉縣址建本朝康熙十二年修興寕縣城周六百二十六丈門四池廣二丈明成化三年建本朝順治三年修康熙二十五年六十年乾隆三年重修長樂縣城周一千五十九丈門四池周一千九十五丈明洪武二十年建嘉靖元年增建本朝順治三年修十八年康熙二十五年重修平遠縣城周五百二十丈門四東西南三面臨溪北倚山無池明嘉靖中建本朝順治二年修康熙二十五年重修鎮平縣城周八百丈門四西北倚山東南池長五百丈明崇禎六年建本朝康熙十一年修二十九年乾隆八年重修學校嘉應州學在州治南舊為程鄉縣學明洪武三年建本朝雍正十一年改為州學乾隆十年修嘉慶十二年復為程鄉縣學十六年仍為州學入學原額二十四名嘉慶十八年加八名興寕縣學在縣城東南明成化十八年建本朝康熙二十五年重建雍正十二年修人學額數十五名長樂縣學在縣城東紫金山明成化四年建本朝順治十八年修康熙二十五年雍正五年重修入學額數十五名平遠縣學在縣治東明嘉靖四十二年建本朝順治十二年修康熙四十年雍正五年嘉慶六年重修入學額數十五名鎮平縣學在縣治西明崇禎六年建本朝順治十三年修康熙二年雍正五年重修入學額數十五名培風書院在嘉應州城内東北隅康熙二十二年建雍正十一年更名程江書院乾隆十五年重建復故名先賢書院在嘉應州攀桂坊順治中建東山書院在嘉應州攀桂坊乾隆十一年建立誠書院在嘉應州松口順治中建鳳山書院在平遠縣城内乾隆三年建桂嶺書院在鎮平縣桂嶺乾隆四十五年建培風義學在嘉應州城内東北康熙二十五年建按舊志載錦江書院在嘉應州城東半里周溪書院在嘉應州城東四里今並廢謹附記户口原額人丁五萬二千一百八十今滋生男婦大小共一百三十一萬四千五十名口又屯民男婦共一萬九千一百七十名口田賦田地山塘共一萬一千八百一十一頃八十八畝七分有奇額徴地丁正雜銀三萬一千二百七十一兩二錢四分四釐遇閏加徴銀八百三十五兩六錢八分八釐米九千九百五石九斗一升八合八勺屯田共二百二十五頃三十四畝九分有竒額徴屯米四千四百八十石九斗七升八合山川金山在州治後四十步百花山在州東十二里形勢起伏相連如城堞與百花洲相應故名明山在州東南輿地紀勝在程鄉縣東三十里山巔有古池池有五色荷花舊志在縣東南四十里高九百餘丈周三百里下有龍潭禱雨輒應西麓為仙花峯西洋之水出焉州志明山仙花嶂鄉人或見花開其巔計其數以占科名並視其色以卜歲潛確類書仙花嶂花開如蓮大約丈餘其色白則人安紅則人災西陽山在州東南元和志在程鄉縣東南四十五里舊志名西洋山峯巒周匝一名九峯山陰那山在州東南八十里後有五指峯接大埔縣界其下有湖銅鼓山在州東南八十里高九百餘丈周一百餘里與海陽大埔二縣接界亦曰銅鼓嶂九狼山在州南四十里九峯錯出亦名九狼峯又南十里為城堞山形如雉堞故名天馬山在州南六十里西山在州西十四里山址周囘分為八重峯巒尖聳其頂平衍居民甞築寨避冦於此按州志李洋山鄉民呼迷娘寨又呼宜洋寨西山蓋統名也王夀山在州東北一百二十里接福建上杭界高八百九十丈周二百餘里形如殿閣上有仙牛嶺山水幽奇又有龍牙筆山在州東北一百四十里山勢峭拔其形如筆又平頂山在州東北接福建上杭縣界形如展葢而頂平産鐵礦跌馬砦山在興寕縣東三十里黄陂水出此雞靈山在興寕縣東四十里有水流為添坑溪錦洞山在興寕縣東南二十里篤陂水出此神光山在興寕縣西南十里形如展旗輿地紀勝神光山在興寕縣嘗騰焰燭天舊志宋邑人羅孟郊讀書山下有洗硯池一名墨池又十里有貴人峯下有曾子湖孟郊於此取魚餉母因名蝴蝶山在興寕縣西南二十里形如蝶翅聳峙學前一名鼓角嶂又黄峒山在縣西南三十里皆有水出翔鳳山在興寕縣西十里有洋塘寨迤西為竹山一名天燭山吉湖山在興寕縣西北二十里一名獅子巖有温泉迤西南為麻嶺為洛峒山又西為羊陂山去縣四十里烏池山在興寕縣西北二十里雙溪合流於此大坪山在興寕縣西北五十里又北為金坑山顔輋山又北即龍母嶂合水山在興寕縣北三十里羅崗龍歸之水合於山麓故名潭坑徑山在興寕縣北四十里有國泰巖大坪水自西北大塘來合於此又北二十里為黄渡山有金坑水合於此又十里有上下藍山一名甘村山下有石灰潭羅崗水至此畧通小舟吳田溪合於此羅岡山在興寕縣北八十里大望溪尾楊梅顔輋四水合流於此是為羅岡水又北十里為大信山大望之西支也迤西南為楊梅砦山牛池頭山在興寕縣北少東三十里崆溪水出此又北為岡背山有大坪湖蚌湖和山在興寕縣東北二十里狀若旋螺其陽有麻石巖深廣數丈山雲時封石乳日滴巖中清冷如浸寶山在興寕縣東北六十里雞靈之北勢若樹屏相傅元末陳友定採礦於此旁有黄牛嶺宋李綱徙萬安道嘗出此有詩云深入循梅瘴癘鄉是也寶龍山在興寕縣東北七十里近平遠縣界西北去龍絲障十里許大望山在興寕縣東北九十里東近本州北界長寕為惠潮二郡諸山之祖一名大帽山有水下瀦為蓮塘湖即羅崗水源也東山在長樂縣東一里環繞縣城七都山在長樂縣東五十里又東十里有紫臯山臨河天堂山在長樂縣東一百里高數百丈牛巖山在長樂縣東南五十里有坪二級可容數百人又十里有鵞公嶂嵩螺山在長樂縣南九十里高千餘丈峯巒連屬起歸善海豐迄於潮州為一方巨鎮其山出石煮鐵韌可為線冠於粤閩天柱山在長樂縣南九十里高數百丈其勢高聳險道傾仄絶頂可容千餘家有寨瀛山在長樂縣西南二里貴人山在長樂縣西南三十里上有井泉常溢一名蒲石髻山又十里有巫峰怪石嵯峨上凌霄漢錫坪山在長樂縣西南五十里南近琴口産錫玳瑁山在長樂縣西南五十里一名羅徑山又金魚山在縣西少南九十里一名丫髻山俱接龍川縣界大梧山在長樂縣西南一百里地接永安縣界董源山在長樂縣西北十里董源水出此南入清溪迎龍山在長樂縣東北二里迤南為紫金山縣治扆之下有鹿坑水自紫金西出為五華山在城西北一里夀春山在長樂縣東北十餘里又中道山在縣東北十五里為往興寕適中之地新河源出此尖筆山在平遠縣東三里峙學宫之東南卓筆山在平遠縣東南三十里下有鐵礦又鐵礦山在縣東南四十里亦産鐵有爐石龍山在平遠縣東南七十五里麓阜巉削岡脊平衍可容萬人有萬斛泉石鎮山在平遠縣東南七十里四面壁立中通一徑躋巔平衍有泉及巖洞數處一名白雲山舊志謂之南臺石鳳山在平遠縣南三里舊名鵞山麟石山在平遠縣西一里又名硯石山又西二里曰寶珠山産土珠頂山在平遠縣北三十里地接江西長寕縣山多白雲天霧不散産葛土人採以為布五子石山在平遠縣東北三十里石峯壁立其最勝者為寶鼎寶葢諸峯合掌擊磬睡佛諸洞大峯山在鎮平縣東二十里尖峯卓絶四面懸崖壁立惟有羊腸小徑二道可造其巔上則四面寬平約二十餘里山峙水流恍同村落有洗馬潭飛泉瀑布及仙人橋龍鬬山在鎮平縣南十五里兩山對峙勢如龍鬬少南為天馬山形勢雄昂狀如天馬誥軸山在鎮平縣南二十里為縣學朝山其右為九子嶺踞縣水口鐵山在鎮平縣南二十五里形如寶葢色若皁染亦