地入境首禁豫借決訟自卯至申未已嘗謂瘠郡無力惠民僅有政平訟理事當勉所著有心政經咸傳誦焉徐鹿卿豐城人真德秀守泉辟宰南安既至首罷科斂之無名者明版籍革豫借決壅滯達冤抑邑以大治德秀尋帥閩疏其政以勸列邑歲飢處之有法富者樂分民無死徙朱在建安人朱子第三子以廕補官嘉定中通判泉州為政一以朱子為法入對以進學問振紀綱求放心為言厯官工部侍郎煥章閣侍制陳宓莆田人嘉定中知安溪縣有經總制錢為民病府判監簿欲解補登足宓免之元雷機建安人至元中知惠安縣抑豪強均賦役創建社學延師以教邑弟子鼐瑪台蒙古人至正末監南安縣時當寇亂調度轉輸以給軍餉勞徠綏輯以復流亡時稱良吏鼐瑪台舊作乃穆泰今改正明胡器新喻人洪武間知泉州府革蠧弊課農桑修橋渡興學校時令父老各誨其子弟每判死刑恆鬱鬱不樂曰吾不能化民故致此倉庫火風猛莫遏器向風稽首火遂滅顏賢高安人洪武間泉州府司獄不虐罪囚每重囚引決必詣賢謝而後去陳永年新淦人洪武間知惠安縣以亷謹稱有蝗傷稼永年仰天嘆曰政失致災令罪也民則何辜俄有羣鳥啄蝗歲乃大稔余慶新會人永樂中知南安縣革姦弊興學校奏免海蕩浮糧一千二百餘石流亡悉復蔡錫鄞縣人宣德間知泉州府奏除洛陽東山大橋三鎮戍兵公私便之洛陽橋圯錫捐俸修之民立祠蔡襄祠旁閔楨橫州人宣德間惠安主簿有善政秩滿以邑民留擢知本縣情偽利弊纖悉周知不事鞭朴而令自行正統中沙寇掠郡大兵南討措辦糧餉設畫備禦邑賴以安尹宏厯城人正統中知泉州府亷公愛民卒於官民留其衣冠葬城東熊尚初南昌人正統末知泉州府明正亷勤時羣盜起上官檄尚初監軍不旬日降賊數百已而賊擁衆至尚初提民兵數百與晉江主簿史孟常陰陽訓術正楊仕洪拒賊於古陵坡兵敗尚初被執不屈與孟常仕洪皆遇害羅倫永豐人成化初以疏諫李賢奪情忤旨謫提舉泉州市舶司至泉州有司率諸生從之講學時於南安片瓦巖徘徊吟詠人傳誦焉張遜無錫人成化間知同安縣潔已愛民刑清政舉擢知福寧州父老齎金為贐峻却之邑人為立却金亭陳用之成化中永安衛知事衛濱海絃誦聲稀用之訪諸貴胄及戍籍子弟之秀者勸使就學延興化耆宿陳愈為之師既三年得可造者三十人附充泉州府學由是文風日進黃濟臨川人宏治中知南安縣公正亷平治獄多所平反邑濱海四十一都自宣德後苦苛派復并於豪強逋亡過半田地日荒濟多方招徠民復故業後以賢能召為太僕丞張津博羅人正德中知泉州府時劉瑾私人絡繹郡邑津以嚴重鎮之輒屏息去政平而信吏民畏服李緝餘干人正德中為泉州府同知疑獄及積案不可究詰者緝訊之無不立剖嘗歎戎伍勾補之弊行法獨恕獨子畸户多蒙矜恤民賴以保全者甚衆洗文淵順德人正德中知南安縣性方介不苟撫愛真誠劉瑾之使旁午文淵獨不以纍民民德之熊汝達進賢人嘉靖間知泉州府時倭寇逼郡城汝達多方禦却城中有謀為賊內應者以計擒除之郡人頌其政尚清嚴功多捍禦云盧仲佃襄陽人嘉靖間知晉江縣築安平城繕完二巡司城時倭寇猖獗軍興乏餉上司議弓兵加征洛陽橋置官榷稅仲佃申請除豁民甚德之夏汝礪融縣人嘉靖間知南安縣興築邑城工完而土寇禇鐸至堅不能攻邑賴以全林咸番禺人嘉靖間知惠安縣倭寇來犯力戰死贈泉州府同知朱炳如衡陽人隆慶間知泉州府先教化而後刑罰擇諸生才俊者談道論文士皆自奮葉春及歸善人隆慶間知惠安縣單騎入境采風謡詢民疾苦凡邑重役悉為申改官榷徴納規則纖悉曲盡八郡傳以為式毁淫祠立社學舉射飲禮高年隱士康朔孝子王定民皆躬至其廬禮焉竇子稱合肥人萬厯間知泉州府性高潔敏毅凝重竿牘苞苴不至其門蔡善繼烏程人萬厯間知泉州府有異政負人倫藻鑑顧大章常熟人萬厯間為泉州府推官溫厚明恕好善如不及性尤剛介不撓以異績擢臺省彭國光德化人萬厯間知晉江縣清修敏練事無巨細剖決如流鍾化民仁和人萬厯間知惠安縣居官政簡刑清士民愛敬夏建寅秀水人萬厯間知安溪縣亷明果斷不發私函嘗以公事行村落自攜乾糗不擾民間本朝徐騰鯨奉天人順治三年署安溪縣時土寇林艮等聚衆劫殺騰鯨練鄉勇設奇計屢戰斬獲甚衆四境悉安韓曉長安人順治十二年知安溪縣時海氛未熄人民凋瘵城郭傾壞曉多方安輯修築城垣邑人鐫聯於城樓以紀其功吳英莆田人康熙十八年任同安總兵率舟師復平金厦歲飢馳請總督姚啓聖許沿海百姓出界採捕全活百萬劉國興宣化人提標右營遊擊康熙十七年海寇圍泉國興身先士卒竭力捍禦城賴以全黃允芳甌寧人康熙十七年任同安學教諭時海氛未靖以學宫屯駐兵馬允芳以已計偕資斧蓋造營房申請移屯楊芳聲萬全左衛人康熙二十二年知同安縣時徭役繁興芳聲措置有方民無派纍歲旱跣足禱雨甘霖立應常光裕奉天人康熙三十四年知泉州府為政安靜聽斷詳慎摘姦發伏有神明之稱朱奇珍長沙人康熙五十一年知同安縣革弊除姦催科不擾繕囹圄男女異所宿繫申豁一空胡格江夏人雍正十一年知同安縣有能聲十三年調知晉江縣催科不擾治事維勤每聽訟霽顏溫詞俾得從容達情然後徐理其曲直片言而決民稱不冤邑有豪猾柯疇格偵知其匿處密擒之數十年大憝獲除民頌其德乾隆六年再任賢聲益著王裕璸山陰人先知惠安南安縣有惠政乾隆十三年調晉江縣剛正精明人莫敢干以私嚴禁吏役需索案牘無所假手每讞獄曲直立判後保舉知府未入覲卒於官民追思之海祿蒙古正藍旗人以征金川功列入紫光閣功臣畫像乾隆五十四年由廣西提督調福建陸路提督居官清正威重勤於訓練嚴於巡緝時同城晉江知縣史必大亦亷潔勤敏故城廂內外軍民安堵夜户不閉五十六年卒於官賜祭葬徐觀孫天津人乾隆年間署惠安縣事居心正直操守清亷士民安之嘉慶二十一年祀名宦祠人物唐歐陽詹字行周晉江人貞元八年與韓愈李觀李絳崔羣王涯馮宿庾承宣聯登第時稱龍虎榜為國子四門助教率其徒伏闕下舉愈為博士詹事父母孝與朋友信義其文章切深往覆明辨既卒愈為作哀辭從子秬字降之開成進士亦工為文吳人陸汙以拾遺棄官歸後召司勳郎中無所建明秬遺書責之人擬之諍臣論許稷字君苗晉江人祖輔乾為泉州守父楙文家於莆稷始居泉州入山力學三年出就府薦成進士官終衡州刺史工詩歌與歐陽詹林藻友善嘗為江南春詞甚綺麗人傳誦之楊廷式晉江人唐末明經登第除太子舍人黃巢之亂避歸黃浦村中以清苦名節自立王審知屢辟不至人皆稱之宋劉昌言字禹謨南安人少篤學文詞靡麗陳洪進辟功曹參軍掌箋奏太平興國八年舉進士第二淳化初趙普留守西京表為通判委以府政普病屬昌言後事普卒昌言感普知已經理其家事太宗以為忠咸平中拜工部侍郎卒錢熙字大雅南安人幼穎悟及長博貫羣籍陳洪進以弟之子妻之辟為巡官宰相李昉深加賞重雍熙初登進士寇準掌吏部選薦試中書纍遷右司諫嘗擬古樂府著雜言十數篇及措刑論為識者所許曾會字宗元晉江人端拱二年進士第二授光祿寺丞直史館祥符末出為兩浙轉運使丁謂建錢塘捍江之役發卒萬餘斬木伐石傾蕩山鋊中外無敢言者會奏列其狀有旨中罷凡出入四十餘年厯典七郡後贈楚國公陳從易字簡夫晉江人端拱進士為嵐州團練推官再調彭州軍事推官王均盜據成都彭人謀殺兵馬都監應之時從易攝州事斬其首謀率厲將士修嚴守械賊聞有備不敢入境纍遷侍御史直史館景德後文士以雕靡相尚從易與楊大雅相厚皆好古篤行朝廷進二人以風天下後以龍圖閣直學士知杭州卒神宗時有清節過馬援之褒所著有泉山集中書制藁西清奏議蘇紳字儀父同安人天禧進士厯官祠部員外郎通判洪州徙揚州歸上十議進直史館召求直言疏論時事又陳便宜八事擢知制誥為翰林學士尋知河陽徙河中未行卒李沂字從聖南安人以六經太元講授問里著帝王通録蘇紳稱其得前史廣記法詔官繕寫上進官國子監丞致仕遷大理寺丞曾公亮字明仲會次子天聖進士知會稽縣厯翰林學士參知政事嘉祐六年拜同中書門下平章事明練文法習知朝廷臺閣典憲韓琦每咨訪焉熙寧中封魯國公以太保致仕卒諡宣靖配享英宗廟庭子孝寬從子孝廣孝藴俱有聲孝序以忠義著蘇緘字宣甫紳從弟實元進士熙寧初為廣東鈐轄知雍州交趾入寇緘遣子子元拏舟逆戰斬蠻酋賊為雲梯又為攻濠洞蒙以革布緘悉焚之蠻計已窮將引去知外援不至囊土登城絾縱火自焚神宗嗟悼贈奉國軍節度使諡忠勇以其子子元為閣門祗候次子子明子正孫廣淵直溫與緘同死皆褒贈焉吕夏卿字縉叔晉江人慶厯進士同知禮院陳時務五事後出知潁州卒夏卿長於史貫穿唐事創世系諸表於新唐書最有功曾誕字孚文公亮從孫孟后之廢誕三與鄒浩書勸力請復后浩不答及浩論立劉氏南遷誕著玉山主人對客問人以比韓愈諍臣論蘇頌字子容紳之子慶厯進士皇祐五年詔試館閣校勘同知太常禮院議立郭皇后神御殿曾公亮深歎服之富弼嘗稱頌為古君子與韓琦同表其亷退以知潁州後擢知制誥李定除御史頌與宋敏求李大臨封還詞頭時有三舍人之稱尋出知婺州方泝桐廬江水暴迅母在舟幾溺頌哀號赴水救之舟忽自正人以為純孝所感元祐初遷吏部尚書兼侍讀每進讀至弭兵息民必援引古今以動人主之意尋拜右僕射兼中書門下侍郎其為相務使百官守法遵職量能授任杜僥幸之原戒疆埸之臣邀功生事論議有未安者毅然力爭之徽宗立進太子太保纍封趙郡公卒贈司空諡正簡劉逵字公逹同安人元豐進士調越州觀察推官崇寧中同知樞密院事中書侍郎勸徽宗碎元祐黨碑寬上書邪籍之禁後加資政殿學士以醴泉觀使召及都而卒溫革字叔皮惠安人政和進士官祕書郎紹興初被命使河南修陵寢歸奏憤激上為泣下忤秦檜出守延平漳州終福建轉運使林頤夀晉江人祖母楊苦背瘍潰爛徑寸頤夀俟其寐舐之傅藥而愈後廬父墓芝草生焉廬繼母墓白鵲來巢楊世永晉江人紹興五年以特奏召為端溪尉寇犯界世永佩刀跨馬獨出遇賊戰死贈承務郎官一子梁克家字叔子晉江人幼聰敏過目成誦紹興三十年進士第一遷著作佐郎詔求言克家條六事乾道中為右丞相近戚權幸不少假借而外濟以和保護善類甚多纍封鄭國公卒贈少師諡文靖諸葛廷瑞字麟之南安人紹興進士調龍溪尉改知崇安縣以政績聞厯進起居郎所上章奏詞意鯁切皆見嘉納李諶字誠之晉江人厯知袁州蓄米二萬石以備凶儉遷大理卿修斷獄例著為令除集英殿修撰改知建寧以禮教化民旋奉祠卒張巽字子文惠安人父寓嘗與張栻其學遣巽從之時朱子之學盛行於泉如楊至楊履正陳易輩稱清源别派惠安劉鏡者稱為高弟巽從之遊然疑晦菴之教不止是乃走武夷謁朱子以所與栻講論中和之旨告之曰此某與南軒晚年畫一功夫也臨别教之曰南軒記嶽麓某記石鼓合而觀之知所用力矣既歸日從事於涵養體察久益明淨築草堂於錦溪之上學者稱錦溪先生許升字順之同安人朱子簿同安升年十三從朱子遊語録中多載其問答之語同邑王力行亦遊朱子之門著有朱氏傳授支派圖傅伯成字景初晉江人父自得以父察死事補承務郎厯官有聲伯成少從朱子學與兄伯夀登隆興進士纍進太府寺丞言吕祖儉不當以上書貶朱某大儒不可以偽學目之又言朋黨之弊起於人主好惡之偏出知漳州律已愛民推朱子遺意而遵行之遷工部侍郎相府災陳失民心隳軍政啓邊釁三事言甚痛切後除寶文閣學士以老病辭伯成純實無妄表裏洞達常慕尸諫疏草畢朝服而逝年八十有四諡忠簡石起宗字似之同安人乾道五年進士第二除祕書正字再擢權倉部郎官上言君子小人之情狀與天下治亂安危之機一時稱之又奏乞取仁宗洪範政鑒與敬天圖列置左右帝嘉嘆久之楊炳字若晦世永孫淳熙進士纍官左司諫論治贓吏當自大吏始遷權吏部尚書時邊釁寖開與鄧友龍異議遂乞外因疏論用兵之害開禧中除寶謨閣直學士奉祠卒曾從龍字君錫公亮四世從孫初名一龍慶元五年進士第一纍官禮部侍郎權刑部尚書嘉定間上言修德政蓄人材飭邊備帝善其言進簽書樞密院參知政事疏論胡矩憸壬為矩嗾言者劾罷起湖南安撫使撫安洞獠威惠並行時有二京之役極論南兵輕進易退未幾言驗進知樞密院事卒贈少師陳霖字傅叟惠安人嘉定進士為瑞金尉紹定中盜發江閩延及東粵霖出迎敵被執不屈死洪天錫字君疇晉江人寶慶進士理宗擢拜監察御史劾董宋臣等疏上至六七閹人為之氣沮度宗即位疏病民五事尋進華文閣直學士致仕疾革猶手草遺表以進卒諡文毅王大夀同安人紹定中為左翼隊將海寇犯圍頭大夀領百人防遏猝與賊遇奮前控弦斃賊十餘後無援者遂沒事聞贈官恤其家謝應瑞泉州民歲飢自出私鈔四十餘萬糶米以賑鄉井理宗詔輔進義校尉吕中字時可晉江人淳祐進士官教授除國史實録院檢閲上疏言當去小人之根革贓吏之弊遷國子監丞兼崇政殿説書丁大全忌之出知汀州卒所著有演易十圖皇朝大事記治迹要略等書吕大圭字圭叔南安人淳祐進士學於陳淳門人王昭復專務致知力行知興化軍轉知漳州時蒲夀庚降元脅大圭署降表不從見殺著有論孟集解易經集解學易管見春秋或問行世黃巖孫字景傳惠安人寶祐進士咸淳間令尤溪興學校通水利建橋梁疏朱子所解太極通書西銘申以已意名曰輯解刋於書院邱葵字吉甫同安人少慕程朱之學親炙吕大圭最久宋末杜門厲學不求人知著有易解疑書口義詩直講禮記解春秋通義周禮補亡諸書元柯公煥字德章晉江人元貞間為古田尉鄰寇侵境或曰可以去乎公煥曰寇至則去國誰與守遂率其民敵之力不支而死其家殲焉顏應祐字孝先同安人母許以兵難遷徙失所在應祐遍行訪求二十六年有告曰汝母在雲南即往求之至蜻蛉嶺得焉迎以歸士人歌詩嘉其孝有閩泉南詔各一隅道塗相去萬里餘之句黃道賢晉江人嫡母唐無子道賢在襁褓而生母蘇以疾去既長屢請於父得召歸道賢孝養二母得其歡心父卒廬墓終制盧琦字希韓惠安人至正進士少受學於余子賢子賢語其友陳忠曰希韓經學該貫為人簡重無惰容吾畏友也授永春尹調寧德擢興泉鹽課司提舉賑飢均賦減鹽引破土寇所至有聲著有圭峯集明趙士亨字應嘉晉江人元李隱九峯山居父母喪廬墓終制洪武初以人材薦授河舶官尋引疾去黃存中惠安人以人材授中書舍人建文中仕至禮部尚書靖難兵起死之朱鑑字用明晉江人永樂中舉鄉試授蒲圻教諭後擢御史巡按湖廣諭降梅花洞賊正統間巡撫山西外飭戎備內撫災民勞瘁備至前後章疏十餘上皆邊防大計致仕歸卒葉秉乾同安人正統中沙尤寇發秉乾率民兵討之戰不利被擒不屈死成化初旌其門曰忠義崔惠字迪吉晉江人正統末教諭石城叛賊陳椿陷城執惠逼降惠罵不絶口會賊焚草營遂自投火死李森安溪人慷慨好施天順中歲儉出粟賑濟全活無數授漳州巡檢吳文度字憲之晉江人成化進士厯南京御史偕同官論妖僧繼曉被杖尋遷汀州知府正德初厯雲南巡撫南京右都御史劉瑾屢責賄不應令以南京户部尚書致仕文度恬淡守素達官貴人造之恆避匿不見史惠晉江人親喪廬墓三年有白烏宿其樹成化中𬒳旌蔡清字介夫晉江人成化進士宏治初選禮部主客主事調吏部稽勳主事時王恕為尚書訪以時事清薦名士劉大夏等三十餘人恕皆納用纍官南京吏部文選郎中正德初除江西提學副使與宸濠忤力辭去尋起南京國子祭酒命甫下卒清之學初主於靜後主於虛故以虛名齋所著有易經四書蒙引萬厯中追諡文莊贈禮部右侍郎同邑門人王宣易時中林同並有名顧珀字載祥晉江人宏治進士知虹縣及旌德擢知和州皆有惠政入為兵部武庫司秉正執法宿蠧一清纍遷南京戶部右侍郎上便宜十二事致仕卒黃瑗字純玉晉江人宏治進士知長山縣時山東旱蝗瑗多方賑濟青齊有疑獄藩臬多檄瑗鞫之擢守肇慶以平賊功進三品秩留志淑字克全晉江人宏治進士厯知杭州鎮守太監畢真宸濠黨也濠反謀應之一夕搆市人火其居延燒千餘家志淑令民熄火所在堅閉母動真不得逞謀益急志淑縱兵捕之遂伏辜武宗征濠志淑移知徽州遷湖廣參政屬邑有腴田數百頃洪水決為陂塘設法疏導築隄植柳以固之民呼曰留公隄纍遷浙江布政使未任卒李源字士達晉江人宏治進士除户部主事監臨清倉疏中官與諸吏朋姦乾沒狀劉瑾竊政以終養乞歸源至孝晚歲文名益著郭楠字世重晉江人正德進士厯官御史嘉靖初請召還直臣王思等會諸臣爭大禮得罪楠方巡按雲南馳疏乞賜優容帝怒逮赴京廷杖削籍歸陳琛字思獻晉江人蔡清得其文異之曰吾得友此人足矣琛遂稟學于清舉正德進士厯官吏部考功主事乞終養歸嘉靖中起貴州提學僉事俄改江西皆辭不赴著有四書淺説周易通典學者稱紫峯先生史于光字中裕晉江人事親孝家貧勵志讀書正德丁丑成進士官吏科給事議大禮疏不報以疾歸著有易經正蒙張嶽字維喬惠安人正德進士授行人與同官諫南巡杖闕下謫官嘉靖初厯主客郎議禘禮嶽議不如為皇初祖位毋實以人後如嶽言遷亷州知府時征安南嶽力主撫卒降之纍撫鄖陽江西總督兩廣著威名復以右都御史總督湖廣貴州四川軍務破平諸苗嶽自幼好學以大儒自期博覽工文章經術湛深學以程朱為宗前後纍奏奇功為嚴嵩父子所撓卒官贈太子少保諡襄惠林希元字茂貞同安人正德進士授大理評事嘉靖初上新政八要言君道在勤正學親正人而息中官機務罷中官鎮守上嘉納會以議獄事被論棄官歸大臣交薦之起為寺正遼東兵變希元極言姑息之弊謫知欽州時安南不貢廷議征討擢希元兵備海道希元主必征之䇿與督臣異議罷歸著易經四書存疑學者稱次崖先生蕭景腆晉江人以掾補長洲尉時知縣郭波執法為織造太監張志聰所撓執而倒曳之車後景腆領所部追奪之市民羣助景腆梯屋飛瓦羣擲志聰志聰還訴於朝械下詔獄廷臣會疏救之仍調尉上官為立仗義英風之碑王慎中字道思晉江人嘉靖進士授户部主事時詔簡部郎為翰林衆首擬慎中張孚敬欲一見辭不赴纍遷河南參政歲飢賑濟有方旋罷歸益肆力古文演迤詳瞻卓然成家與唐順之齊名天下稱曰王唐順之稱其文二百年來當為中興後有起者莫能及有遵巖集行於世莊用賓字君采晉江人嘉靖進士厯官浙江按察僉事直指行部事不合必與抗論上虞丞倚鹺使私人貪恣不法暴其狀黜之罷歸值倭寇逼郡父塜為寇所發偕弟用晦率鄉勇直搗寇巢負父骸以歸用晦奮身擊賊力不支而斃事聞贈太僕寺少卿豫世襲一子百户陳一道字邦緒晉江人嘉靖中以掾吏為蕪湖丞倭自浙流劫至南陵一道赴援麾衆獨進為賊所殺其從弟子義橫身捍刃亦死之事聞贈應天府通判子義府經厯蔡元偉字伯瞻晉江人嘉靖舉人授羅田教諭厯撫州同知署樂安崇仁並著勞績學宗程朱勇於自治作考德録日識所行事所著有四書折衷易經聚正周天佐字宇弼晉江人嘉靖進士任户部主事九廟災御史楊爵應詔陳時政闕失繫詔獄天佐疏救之詔廷杖繫獄死隆慶初贈光祿寺少卿天啓中諡忠愍許宗鎰字應衡晉江人嘉靖進士由浦江令厯户部郎中出知夔州以凊亷為二千石冠賜宴褒嘉擢廣東按察副使大小羅山洞寇出沒為害宗鎰增屯戌謹關隘而通鹽米以撫結之大廟山寇黃顯祖據山為巢出剽江艇請閩贛二省兵會勦廣撫檄移其兵宗鎰以功垂成不遣坐為所論謫貴州參議尋遷雲南按察副使獛刺牳雞諸蠻剽掠為俗舊制有十哨兵屯種守禦歲久皆廢宗鎰盡復之鑿元湖達瀘江修嶍峨河灌田防水教民種蕎菽諸榖民有所仰食擢浙江參政罷歸趙恆字志貞晉江人嘉靖進士教授袁州纍擢姚安知府郡故雜苗俗恆為定婚娶之禮所著有春秋録史朝賓字應之晉江人嘉靖進士授刑部主事楊繼盛論嚴嵩罪下獄朝賓比奏事不實律署末云楊繼盛語雖詿誤心實無他惟憫其狂愚謫發遠戍庶以全好生之德奏入楊竟坐大辟朝賓亦謫判泰州嵩敗擢鴻臚寺卿卒俞大猷字志輔晉江人世泉州衛百户舉嘉靖武進士除千户尚書毛伯溫奇其才擢廣東都司平交黎有功進參將移浙東屢以舟師破倭寇遷總兵總督胡宗憲誘誅汪直倭復鬨宗憲委罪大猷以白衣赴大同立功擢廣東總兵平惠潮羣盜經略廣西隆慶中征古田叛猺夷其洞建縣治改福建總兵尋免萬厯初南書談綸薦起後府僉書乞歸大猷在軍中五十年長於料敵未嘗挫衄忠誠許國老而彌篤著有正氣堂集劍經行世伍民憲晉江人嘉靖中倭寇殺其父民憲往與賊鬬賊斷其手卧草中猶呼其父三日而絶李愷字克諧惠安人嘉靖進士授番禺令亷幹有材遷湖廣按察僉事擒斬苗寇降其餘黨倭寇犯惠安愷督視築城力戰拒守邑賴以全著有介山集康朗字用晦惠安人嘉靖進士授刑部主事閲武定侯郭勛獄以疆直著聲遷山西參議備兵曹濮劇寇傅伯王劉千斤流剽三省朗冒矢石與將吏死戰斬獲無遺捷聞晉僉都御史開府鄖陽適漢中降回激變朗持檄諭之回遂解散轉副都御史致仕歸朱一龍字于田惠安人嘉靖進士厯官廣東左參議時柘林叛兵突薄會城藩臬官分門守禦不納避者一龍曰賊近而啓扄以待示吾疆也民急而開門以納示吾仁也傳令大開門日入男婦以萬計遷廣西右江時寇猖獗條上督撫請便宜從事從之乃密召將領分兵四出斬獲八百有奇諸蠻震懾復遵約束遷江西參政罷歸陳道基字以中同安人嘉靖進士厯官應天巡撫檄下所司諸告密株連者勿問謬持人短長快睚眥者必罪自是告訐之風頓息以忤張居正被劾歸後起官南京刑部尚書乞歸卒洪朝選字汝尹同安人嘉靖進士厯官刑部侍郎遼藩獄起張居正以私憾欲有所旁及屬朝選往勘朝選論庶人如法他無株連居正銜之罷歸九江勞堪任巡撫希居正意托其無實事以聞命未下捕置之獄絶食死居正卒朝選妻及子競訟冤闕下詔復其官張宏綱同安人倭寇邑其父與弟皆被掠索金贖宏綱家貧無所得金乃入賊巢泣曰某幼無可假貸不如歸父則金可得賊信之刻期而歸其父及期父不至賊令縛其兄弟斬之復紿賊曰父歸必有金可遣吾弟速之賊又如言而遣其弟弟既脫宏綱乃告賊曰家貧金實不可得吾以全吾父與弟耳賊怒為所賣懸而殺之詹仰庇字汝欽安溪人嘉靖進士由南海知縣徴授御史隆慶中疏言陳皇后遷居别宫上為心動會奉命巡視十庫疏言內官動以供御為名肆行侵冒乞命查核疏入忤旨杖至百黜為民仰庇官臺中八閲月疏四上多指斥中官萬厯初起官刑部侍郎乞歸卒黃鳳翔字鳴周晉江人隆慶戊辰進士第二授編修厯官禮部右侍郎洮河告警抗疏請屏遊宴親政事以實圖安攘因進用人理財之説既以請建儲未得命請告去後擢禮部尚書天啓初諡文簡王用汲字明受晉江人為諸生時郡遭倭橫會御史至用汲言之知府以為非諸生事用汲曰范希文為秀才時以天下為已任矧鄉井之禍不關諸生耶知府有慚色舉隆慶進士為員外郎張居正奪情歸葬楚督撫以下畢會按臣趙應元獨不往被劾除名用汲憤甚抗論坐削籍居正殁復官厯南京刑部尚書用汲剛正遇事敢任以疆直故纍遷皆在南卒贈太子太保諡恭質王定民惠安人家貧鬻楮為業能以養志為孝父病足出入恆負之邑令葉春及詣其廬禮焉郭惟賢字哲卿晉江人萬厯進士官南京御史張居正既死諸忤居正得罪者猶未召録惟賢請復諸臣故秩時馮保猶用事謫江山丞保敗復官遂劾左都御史陳炌薦在籍諸臣王錫爵等皆從之尋以救諫內操被謫主事董基忤旨調南京大理評事纍遷户部左侍郎卒贈右都御史諡恭定蘇濬字君禹晉江人萬厯進士厯官浙江提學僉事遷廣西參政興文化俗治尚簡易岑溪洞猺反討平之擢貴州按察使不赴歸家講明心性之學著四書易經説與蒙引淺説並傳學者稱紫溪先生李廷機字爾張晉江人隆慶庚午鄉試萬厯癸未會試皆第一廷試第二授編修厯祭酒立教以嚴為主遷南京吏部侍郎典京察無偏私署户二二部事綜理精密奏行軫恤行户四事商因大蘇廷機遇事有執尤勵亷潔纍官禮部尚書兼東閣大學士致仕卒贈少保諡文節楊道賓字維彥晉江人萬厯丙戌進士第二厯官禮部侍郎習練朝典嘗因星變請釋逮繫言官南京水災請御殿決政章疏母留中及內降東宫輟講疏引唐宦官仇士良語為戒深中時忌卒贈尚書諡文恪何喬遠字稚孝晉江人萬厯進士官禮部儀曹郎力爭三王並封事得寢坐纍謫廣西經厯歸里二十餘年中外交薦不起光宗即位起光祿卿進通政魏忠賢毁首善書院逐鄒元標等喬遠抗疏不報遂乞歸崇禎𥘉起南京工部侍郎尋致仕卒贈尚書所著有名山藏及閩書百五十卷黃汝良字明起晉江人萬厯進士厯南北司業有監生挾巨璫書至汝良曰國學四方觀型司成無與中涓通書例按治之擢東宫日講官每敷引古今隨事披陳東宫喜動顔色天啓中掌詹事疏言楊左諸臣宜加贈恤要典宜毁晉禮部尚書陳時務八要又力言犴狴填滿干天和遂致仕歸所著有河干集冰署筆談野紀矇搜樂律志諸書史繼偕字世程晉江人萬厯壬辰進士第二授編修疏言册立東宫開閣講學不報厯南少宰兼戶禮工三篆力清盤庫盜帑之姦改詹事乞歸尋起佐銓部入閣辦事偕廷臣疏請神宗視朝并力陳備兵措餉諸事不報致政歸天啓初復召入閣加少保引疾歸卒崇禎初贈少師諡文簡林學曾字志唯晉江人萬厯進士授南康推官以清慎著稱時有前林後李清和無比之謡天啓中纍官户部尚書致仕年踰八十猶朝夕講誦不輟厚德雅量學者宗之撫特疏於朝奉旨存問從孫孕昌字為磐萬厯進士授南京戶部主事厯吏部文選郎中以忤楊嗣昌削職歸講學于晉江學左之旦氣堂後即其地祀焉著有經史耨義周易口占易史象解旦氣語録內外篇諸書莊欽鄰字寅卿晉江人萬厯進士授饒州推官厯吏部郎中以忤魏璫削職崇禎𥘉引用直臣纍遷戶部侍郎黃道周劾楊嗣昌奪情忤旨下獄欽鄰與范景文合疏論救後為史部尚書以母老乞歸卒林欲楫字仕濟晉江人萬厯進士授編修天啓中火災陳修省數事觸璫忌纍遷禮部尚書掌詹事府武陵楊嗣昌議增兵餉抗言不宜以窮民養驕兵尋其民窮兵譁疏力指時弊不報乞休卒何燮字中理晉江人萬厯舉人知靈川桂東二縣事卓有政績崇禎十五年知毫州州自八年後寇賊交橫益以飢饉民死徙過半燮盡心撫循營戰守具甚備甫及三月齊豫土寇迭至力戰擒其渠撫降數千人未幾闖賊至燮堅守孤城晝夜擐甲城陷被執抗罵不屈賊斷其足罵益疾復割其胸旋割旋罵賊磔殺之懸其首於市三日耳鼻猶動贈太僕寺少卿諡忠壯本朝乾隆四十一年賜諡烈愍蘇茂杓字宏濟晉江人萬厯舉人知封邱縣屬旱蝗為災捐槖設粥賑之存活無算進開封府同知署府篆闖賊大舉圍汴汴水決賊乘筏蟻進茂杓度不免赴水死本朝乾隆四十一年賜諡節愍兄茂相字宏家萬厯進士厯官中外有政聲崇禎初仕至刑部尚書加太傅乞歸卒莊際昌字景説晉江人萬厯巳未會試廷試第一以修撰充經筵展書直起居注時魏璫煽虐授事未數日即乞差歸丙寅秋當復命會修三朝要典蹙然曰是固欲以國史為刑書乎無何為魏璫所禠奪璫誅即家起右諭德進左庶子卒贈詹事潘寬晉江人兄為諸生得危疾寬刲股療之肉未進有鬼物告其兄曰君有賢弟我不敢侮食之果瘥韋起宗晉江人母蔡氏守節比長遇士大夫輒拜跪求文表揚請於朝幾得之為忌者所沮目為之盲久之獲朝命目復明母殁廬墓三年又追為父服亦廬墓三年萬厯中旌其里為節孝王熺晉江人幼孤母李氏誓死撫育熺長盡孝後為瀧水訓導子文升孝如其父萬厯中皆被旌洪有復字懋純南安人萬厯進士知武陵縣以抗直得聲遷湖廣左布政適稅璫肆焰同官馮應京被逮有復悉力調護為民請命湘澤獲蘇洪啓睿字爾介南安人萬厯進士授禮部主事首發沈惟敬之姦疏兵部尚書石星誤國復請册立東宫纍官浙江布政使浙東飢浙西潦請蠲請折請賑咸報可乞休歸陳玉輝字達卿惠安人萬厯進士授吉水令厯御史轄屯田馬政釐剔姦弊豪右斂手以艱歸復起御史掌大計風裁嚴峻書牘不入視事五月卒李獻可字堯俞同安人萬厯進士厯官禮科都給事中甫三日疏請皇太子出閣講學削籍歸天啓初録言事諸臣贈光祿寺卿蔡復一字敬夫同安人萬厯進士厯湖廣參政時方有事貴州黔撫議勦復一獨言撫不聽坐免尋起鎮易州及安邦彥亂擢兵部侍郎賜尚方劍節制五省入黔未幾上首功八十餘級賊畏不敢渡河復坐搗巢之役免移境上候代卒於軍贈尚書諡清憲許獬字子遜同安人萬厯辛丑會試第一授編修性不諧俗喜讀書矢口縱筆皆有精意蔡獻臣字體國同安人萬厯進士授刑部主事時神宗久不視朝獻臣疏請早定國儲遷禮部郎疏請福藩之國鄭貴妃夜發內使執之獻臣不為屈旦入對據舊典力爭神宗嘉其直天啓時擢南太常為璫所誣削籍李懋檜字克倉安溪人萬厯進士除六安知州愷悌得民厯刑部員外郎因旱上言皇貴妃及恭妃册封事又言保聖躬節內供御近習等七事寢不行尋以給事中邵庶論刺建言諸臣懋檜疏爭言陛下欲重百官越戰之禁不若嚴言官失職之罰帝責其沽名貶官天啓初終太僕寺少卿蔣德璟字中葆晉江人天啓進士官翰林陳練兵練將之法上救荒事宜性鯁直不設門户崇禎時纍遷禮部尚書東閣大學士進御覽備邊册諸邊撫賞册又力言召買之苦練餉之害乞歸卒黃景昉字太稚晉江人天啓進士充日講官會召對言考選未公推官成勇朱天麟亷能素著不獲與清華選尚書鄭三俊四朝老臣一生清德以詿誤繫獄乞從寬宥尋擢户部尚書文淵閣大學士乞假歸趙元有晉江人天啓舉人授黃陂令邑屢被寇災至則招集流亡置倉賑恤崇禎十六年張獻忠遣哨至城下索印死守不與力盡援絶被執羈之𡵨亭啖以高官曰吾世受國恩肯作賊官耶已復罵賊支解以死陂人拾殘骸葬之本朝乾隆四十一年賜諡節愍蘇夢儀字羽若晉江人天啓武進士崇禎十六年以都督同知提督安慶水陸營衛叛帥左良玉舳艫東下郡縣望風披靡夢儀曰吾世受國恩脫力不支抱忠入地耳無何廢將杜宏域等開城內應夢儀巷戰被執百計啖誘終不屈遂遇害於南鍾嶺闔家俱死贈光祿大夫太子少保大都督諡武愍范方字介卿同安人博學善屬文舉天啓辛酉鄉試第一授助教遷户部主事闖賊陷京師執方索倉鑰方曰頭可斷鑰匙不可得也鋒刃交下噴血怒罵而死長子諸生登楓號痛絶吭死同時死者同邑平涼同知郭寅日及其二子本朝乾隆四十一年俱賜諡節愍莊鼇獻字叔瞻晉江人崇禎進士由庶吉士改兵科給事中上太平十二策極論東厰之害忤旨貶江西布政司照磨福王時復官陳洪謐字龍甫晉江人崇禎進士授户部主事厯遷蘇州知府時方急催科洪謐以撫循為事蠲一切煩苛吳民戴之時稱循吏擢太僕寺少卿曾異撰字弗人晉江人家侯官父為諸生早卒母張氏以遺腹生家窶甚紡績給晨夕異撰事母至孝為詩古文有奇氣娶妻不能具牀恆宿於外歲凶則採薯葉雜粳籺食之然性介甚長吏知其賢欲為之地不屑也崇禎中舉於鄉有紡授堂集行世吳韓起字宣伯晉江人崇禎進士知當塗縣有惠政擢禮部主事為文古雅清徑海內傳誦著有四書易經説青嶽文稿蔡道憲字元白晉江人少聰敏博雅崇禎丁丑進士為長沙推官緝盜鋤強姦人斂迹十六年張獻忠逼長沙巡撫王聚奎遁道憲攝太守事為死守計賊繞城呼曰軍中久知蔡推官名速降母自苦道憲命守卒射之斃越三日總兵尹先民戰敗降賊道憲急出百姓十餘萬户以孤城自誓城陷被執百計誘以官嚼齒大罵釋其縛延之上坐罵如故賊曰汝不降將盡殺百姓道憲大哭曰願速殺我毋害我民賊擲刃揕其胸血濺賊面賊為昏仆遂斷其足截其手鉤舌毁齒抉眼割鼻寸磔以死時年二十九贈太僕寺少卿諡忠烈有從役凌國俊李師孔陳賢等九人者隨不去賊先殺五人以懼道憲不動及以次斬及國俊國俊請葬主而後就戮賊許之國俊解衣裹肉骨葬之城南醴陵陂還詣賊自刎死蔡肱明字子起晉江人崇禎進士以召對稱旨擢職方郎中出為四川威茂道副總兵朱化龍為變脅肱明從之肱明厲聲曰反賊我死則死耳安能從爾反乎與其兄啓明俱遇害父國烒妻莊氏及一家三十二人同日俱死諡忠愍本朝乾隆四十一年賜諡烈愍郭符甲字輔伯晉江人崇禎進士授南京户部主事乞假歸明末舉兵山中戰敗死尸七日不腐鄉人義而葬之同邑御史郭承汾亦抗節死於酉陽本朝乾隆四十一年俱賜諡節愍洪淯鼇字六生晉江人崇禎拔貢永明王時總督兩粵滇黔等處軍務拒守荆湘戰敗死於巫山本朝乾隆四十一年賜諡忠節葉翼雲字敬甫同安人崇禎進士知吳江縣有惠政遷刑部主事乞歸唐王入閩擢稽勳員外郎兵敗抗節死闔門俱殉本朝乾隆四十一年賜諡烈愍本朝林維造字用章晉江人順治四年以廕補鞏昌知府有惠政擢西寧副使李自成餘黨潛蹤山谷維造勦除之五年逆回煽參將蔣國泰為亂佯言兵變擁維造至北關扼殺之康熙元年贈光祿寺卿賜祭葬李先春字克建安溪人年十二父以非辜淹囹圄詣郡哀訴郡守奇之為出其父稍長慷慨重然諾歲大飢設立賑法賊帥張六角圍寨先春借庫中錢立賞格率鄉勇擊敗之秋成賊糾夥盜割先春選壯士撼其營賊遁去鄉人德之王命嶽字伯咨晉江人順治乙未進士選庶吉士厯兵户二科所條上吏治樞政漕弊興屯救荒及密陳靖海疏皆軍國大計遷刑科都給事中後卒於家富鴻基字磐伯晉江人順治戊戌進士授編修厯內閣學士耿逆之變李光地遣人馳蠟書至京時論以人自賊中來慮有他變弗敢以聞鴻基毅然曰孤臣效忠為國家東南半壁計吾遑恤身家哉即詣闕代奏得旨施行擢禮部右侍郎已未壬戌兩知貢舉積弊為之一清鴻基持身嚴重潔謹自守至盈庭聚議則讜正不隨以病乞假歸卒賜祭葬李日字省甫先春子康熙中賊帥劉國軒圍泉日請於將軍拉哈達自為鄉導出安溪進攻賊遁去隨陳平海五䇿悉見嘉納授邵武協副將調臺灣陳辛倡亂日率五百人收捕海外帖然擢永州總兵乞歸輯性理諸書以進御書方重淳深四字褒之拉哈達舊作喇哈達今改正李光地字晉卿先春孫康熙庚戌進士授編修以親老假歸耿逆變作沿海巨寇竊發光地密疏言逆必敗狀上覽疏嘉歎擢侍讀學士白頭賊蔡寅聚衆圍安溪光地方居父喪募鄉勇絶賊糧道賊潰去臺灣逋寇鄭克塽復圍泉州巡撫吳興祚提兵南下將軍拉哈達自漳平進光地率鄉里夾繫賊退郡邑以安時臺灣尚為寇據光地舉內大臣伯施琅有智略遂平海外擢兵部侍郎巡撫直隸築子牙隄開柳坌以業窮氓民受其利晉吏部尚書尋拜文淵閣大學士欽定朱子全書周易折中及性理精義等書皆承旨纂修卒諡文貞祀賢良祠子鍾倫康熙癸酉舉人著周禮訓纂二十一卷未仕而卒孫清植曾孫宗文俱官禮部侍郎李光坡字耜卿光地弟少為諸生受學家庭宗尚宋儒壯歲專意三禮積四十年成述注六十九卷以鄭康成為主疏解簡明自成一家言旋入都與光地講貫著性理三篇辨論理氣先後動靜以訂近儒之差光地嘗論東吳顧炎武與光坡皆數十年用心經學可以自通於後者上詢學古通經之士御書道通月窟天根裏人在清泉白石間對關以賜雍正元年舉孝亷未赴卒丁煒字淡汝晉江人康熙中以人才舉授漳平教諭改魯山丞升獻縣令以最擢户部主事厯官贛南道郡以産榖名藩檄行郡徴米艘稅協餉定南煒摘其十弊請於總督于成龍革除之升湖廣按察使省冤獄二十餘人煒工詩濟南王士正稱之著有涉江問山詩文集萬正色字惟高晉江人康熙十二年吳三桂反正色以遊擊從軍討逆纍立戰功擢嶽州總兵前後十七戰兵無頓刃長沙常德諸郡以次削平海寇陸梁加太子少保提督福建水師恢復海澄金門厦門招撫降附四民安堵施琅字尊侯晉江人纍功官福建水師提督進爵內大臣伯海寇鄭成功世據臺灣授琅靖海將軍率舟師征之火矢交攻賊艘覆溺無算乞降琅議設郡縣防守海外悉平封靖海侯世襲卒贈太子少傅諡襄壯祀賢良祠子世驃以水師守備隨父戰澎湖臺灣有功纍官至福建水師提督康熙六十年臺灣逆匪朱一貴陷郡城世驃督兵勦平之以疾卒於軍贈太子少保諡勇果施世綸字文賢琅仲子以廕知泰州遷知揚州府嚴禁蕩遊俗尚一變纍遷順天府尹副都御史令行禁止畿輔肅然擢戶部侍郎總督漕運通阻礙懲懲遛漕政次第畢舉以治河勞瘁卒於官賜祭葬世綸性警敏聽斷如神自司牧厯大吏清白自持始終如一許謙吉字二言晉江人康熙已酉舉人任將樂教諭整飭學校訓士有方擢知湖廣江華縣事邑有槖胥擾害閭閻積數十年官莫能治謙吉甫蒞任亷其狀置之死士民大悅尋以病歸陳遷鶴字聲士晉江人康熙乙丑進士授編修厯官左庶子立品端粹博通經學李光地見其所為太極太虛論曰經生中有是人耶晚年家居綜述尤富著有易説尚書私記毛詩國風繹春秋紀疑春樹堂上峯堂文集諸書嘉慶二十二年祀鄉賢祠子萬䇿康熙戊戌進士由編修厯官詹事有文名著近道齋詩文集陳大玠字元臣晉江人祖曙以孝旌大玠登雍正甲辰進士授臨漳令邑苦河患濬百陽萬公普濟福惠四渠俾積水入河課農桑興學校以臨漳漕米甲豫省而離水次遠輸運維艱請豁減四千三百五十五石永為例邑人德之入為中書科中書升禮部主事擢浙江道御史遷吏科給事中建言皆關政體厯官太常寺少卿著有筍湄內篇經史講義文集詩集諸書李雲永字世瞻晉江人母傅氏病晝夜不離母殁結廬墓側夙夜哀號惠安張元嘉事嗣母得歡心俱雍正年間旌李清芳安溪人乾隆丙辰進士授編修改御史奏言御史之設所以防壅蔽必取其特立孤行無所依傍者然後不負厥職今乃令各衙門保舉恐夤緣之弊由此而生上韙其言又奏請寬奉天海禁及陳福建湖廣捐監之弊皆從之以給事中巡視淮南漕務疏濬鎮江坍山京口運河得旨嘉奬厯官兵部右侍郎回籍侍養卒於家官獻瑶字瑜卿安溪人乾隆元年用楊名時薦為國子監助教甫入學上事宜六條於其長巳未成進士授編修主浙江鄉試督學廣西陜甘居官亷慎導士以誠擢洗馬乞養母歸獻瑶經學淹貫尤邃於禮所著有周官偶記儀禮讀喪服私鈔雜記諸書嘉慶十四年祀鄉賢祠陳桂洲字文馥南安人乾隆壬戌進士授檢討厯官翰林院侍讀學士順天府府丞督學廣西廣東持躬端謹試士公明嘉慶二十一年祀鄉賢祠李清時安溪人乾隆壬戌進士授編修出知嘉興府厯升河東河道總督以運河水小恐微山湖宣泄過多請於滚壩磯心增設石槽閘板及應行疏濬堵閉各事宜俱稱旨官終山東巡撫莊紉蘭惠安人乾隆乙酉舉人由教職遷湖北來鳳縣知縣嘉慶元年教匪滋事倉猝來犯紉蘭禦之遇害恩豫恤典胡振聲同安人提督胡貴之子嘉慶五年授溫州鎮總兵偕提督李長庚會勦洋匪攻擊水溪鳳尾兩幫盜船斬獲無算又擒蔡牽黨陳贊等百四十名九年六月以兵船二十六隻會捕蔡牽駛至浮鷹洋面奮勇追擊因坐船逼近山麓為賊擲火焚燒被害事聞賜祭葬諡武壯李長庚字超人同安人乾隆辛卯武進士由藍翎侍衛任浙江衢州都司嘉慶三年纍遷定海鎮總兵勦捕洋匪所向有功六年擢浙江提督調福建水師提督又調浙江特命總統閩浙水師前後率舟師往來閩粵浙洋面擊逆匪蔡牽身先士卒斬獲無算賊勢日蹙十二年十二月追賊於黑水外洋賊僅存三舟長庚發炮擊蔡逆船幾覆賊倉皇落水者不可勝數乃别用火攻乘風絓其後艄火炮交下長庚忽為流炮所中卒事聞追封三等壯烈伯世襲賜祭葬諡忠毅祀昭忠祠並詔立專祠於同安春