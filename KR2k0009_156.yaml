鞠育成人自二十八歲至八十歲勞瘁如一日橚後以孝稱鄭耀寰妻吳氏年二十二而寡矢志撫孤時堂前五燕化烏為白遭寇舅被掠索賂氏脫簪珥贖舅歸朝夕孝養有司旌其門李鏜妻林氏安溪人山寇掠其鄉遇追度不免紿曰吾藏金某處同往發之行至黃石潭躍水死三日尸出倚石而立本朝康熙五十四年御書女宗挺節四字旌之本朝林某聘妻歐氏晉江人許字林氏子未歸而殞父母旋殁一弟十歲氏摩其頂哭曰吾死於林義也顧父母死爾何依自是躬紡績而課讀不輟順治丁亥遭寇自毁其面弟被執氏哀號抱持瀕死不去主兵者憐而釋之弟成立氏一慟而絶歐陽八哥妻林氏晉江人夫以醫遊四方林紡紝自給順治丁亥山賊至林恐為所汚偕女子二人投於池時林之母家嫂妹三人一經於卧內二赴水死蓋同日有六烈云歐廷炎妻林氏晉江人順治丁亥土賊據衛城率二女赴水死里中女從死者十餘人數日尸浮皆相抱持不可解王定安妻陳氏惠安人順治間寇亂子被殺媳遊氏投井死氏曰婦能殉夫余忍獨存亦繼之二烈婦同安人失其姓順治戊子寇亂嫂與小姑避賊石馬寇至挾小姑不從以刃揕其胸旋挾嫂嫂又不從賊亂斫之二尸顏色如生同邑紀四妻蔡五娘亦遇寇不辱死鄧某妾扈氏北平人年十七歸晉江鄧某為妾嫡妒閉氏幽室鄧殁嫡乃出之氏哭奠柩前自經死衣帶中遺詩二絶有願從野蝶依青草携手雙雙到鬼門之句林忍娘同安人夫從軍死於海澄林請於主將願從夫於地下求合葬許之遂自縊楊六妻王氏同安人夫亡氏年十七撤帷之日投繯而逝同邑劉修妻鄭氏陳某妻林城娘俱夫亡殉節陳京妻許氏名初娘同安人為豪家所逼義不受辱被擊死謝昂聘妻林氏名雅娘同安人許字未婚昂病劇昂母倣佛見女子在榻前昂死雅娘自縊昂母往視其殮驚曰曩日侍免病者乃吾婦也耶吾習其容久矣兩家異之同邑蘇獻臣聘妻鄭氏陳陳舍聘妻紀氏蔡德聘妻劉氏李燕聘妻林氏鄭育濬聘妻洪氏陳郊聘妻張氏王鳳聘妻黃氏林萬燧聘妻陳氏林烇聘妻吳氏林原聘妻石氏俱夫亡殉節高洛聘妻詹氏名京娘安溪人父母早亡依叔洛外出不還舅姑許改適京娘守義不移待字二十載聞洛卒投溪死郭彥郁妻李氏晉江人夫殁家貧寄居母家勤女工課子必緒成名年九十一卒雍正三年旌同邑鄭承棟妻陳氏陳兆麟妻王氏生員林登驪妻黃氏蘇夔妻孫氏黃時可妻傅氏楊銘鼐妻王氏黃頤騧妻陳氏楊朝勳妻姚氏車乘鳳妻劉氏周泰可妻陶氏俱雍正年間旌陳貞姑晉江人父年老喪媪貞姑未字治女紅以奉甘脆自誓不嫁父年九十五卒貞姑哀痛繼殞里人比之北宫嬰貌云胡氏晉江人遇暴不辱自縊同邑陳士蘅聘妻黃氏黃汝觀聘妻徐氏夫亡殉節俱雍正年間旌黃異望妻李氏南安人夫為諸生殁時氏年二十四撫遺腹子讀書成立家極貧苦日織布三丈積之為兒娶婦卒年八十六雍正三年旌王中靜妻洪氏南安人年十九而寡勤女紅以事舅姑立夫姪為嗣孀守三十三載雍正四年旌同邑傅思樂聘妻吳氏未婚而夫亡殉節張煃妻黃氏惠安人年二十一寡居遭寇亂挈老姑避山中孝養不離晨夕教諸子讀書成立年八十一卒雍正三年旌孫洪籌妻鄭氏惠安人夫亡殉節同邑烈女吳藥娘遇暴不辱自縊雍正五年旌王天祐妻何氏同安人年二十夫故辛勤紡紝仰事七旬舅姑鞠育周歲弱嗣及舅姑殁拮據殯殮如禮卒年八十有九雍正六年旌同邑張應斗妻李氏黃忠妻蔡氏俱雍正年間旌謝復淑妻劉氏安溪人年二十九歲孀守茹苦課子讀書成立氏夀踰百齡雍正十一年旌鄭可階妻黃氏晉江人夫亡守節同邑教諭陳燻繼妻謝氏施世騮妻黃氏莊延祝繼妻張氏蘇褒紹妻陳氏莊頤妻蕭氏林偉烈妻施氏王元侯妻黃氏黃球圖妻鄭氏池繼澤妻王氏蘇得鱗繼妻張氏何希哲妻萬氏鄭廷璧妻柯氏黃璿妻李氏蔡翼升妻林氏何宗文妻蔡氏王鳳翼妻林氏楊興業妻黃氏林祥鎮妻鍾氏張文秩妻吳氏許臣驥妻鄭氏柯懿肯妻吳氏蔡正春妻林氏江子趾妻曽氏鄭汝瑶妻許氏柯士鼇妻洪氏蔡奕樞妻林氏陳向榮妻黃氏張鴻模妻林氏陳兆菁妻溫氏蔡士震妻賴氏伍維騏妻蘇氏曽承烈妻黃氏陳維推妻吳氏蘇琛妻李氏陳士秀妻紀氏紀天純妻黃氏唐士芳妻杜氏高謀中妻萬氏朱尚卿繼妻張氏吳士針妻李氏蔣階奮妻黃氏王奕運妻洪氏浙江觀風整俗使蔡仕􅘎妾陶氏李學桂妻楊氏王志贈妻余氏王榮升妻陳氏薛文燦妻杜氏王興祖妻汪氏張文煌妻莊氏曽濟烈妻張氏蔡立泉妻林氏陳斌聯妻許氏陶經麟妻林氏楊承珍妻薛氏李維羆妻張氏趙與理妻鄭氏李克忠妻王氏吳世美妻王氏邵士戬妻高氏黃清編妻商氏黃世達妻歐陽氏朱正豔妻賴氏朱萬庚妻陳氏吳奕忠妻高氏王濬改妻薛氏粘紹熙妻黃氏楊曽澤妻蔡氏黃時敏妻鄭氏曾道美妻王氏黃奕祿妻賴氏曾望遠妻陳氏林重龍妻何氏林道珩妻吳氏烈婦陳用妻林氏烈女鍾片娘翁成娘楊慈娘梁玉女梁氏俱乾隆年間旌許才高妻秦氏晉江人夫為諸生赴省鄉試病殁喪歸氏慟哭幾絶家貧女紅自給事舅姑盡孝課子繼元成名守志三十一年年六十卒胞姪賜元娶曾氏年二十八而寡撫孤甫婚而殁復嗣幼孫艱阻備厯人服其苦節李尚德妻楊氏南安人夫亡守節同邑洪奕曠妻黃氏洪奕涊妻朱氏蔡雄達妻陸氏黃洽命妻吳氏黃洽泰妻伍氏黃洽遴妻吳氏洪士綱妻葉氏陳文龍妻蔡氏潘鼎發妻謝氏洪鳴珂妻郭氏傅幾德妻柯氏黃胎玉妻陳氏戴隆齡妻鄭氏蘇振璽妻黃氏傅儲瑾妻陳氏黃世芳妻張氏張士煒妻尤氏貢生楊從謙妻施氏黃綜伍妻楊氏王朝璋妻趙氏王世喜妻卓氏鄭德禮妻洪氏鄭哲輝妻林氏黃元賓妻曾氏黃元畏妻陳氏吳恂