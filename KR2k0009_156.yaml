body:
  text: 泉州府在福建省治西南四百一十里東西距二百八十里南北距二百三十三里東至海一百三十里西至漳州府長泰縣界一百五十里南至海一百三里北至興化府仙遊縣界一百三十里東南至海八十三里西南至漳州府龍溪縣界一百四十里東北至仙遊縣界九十里西北至永春州界一百五里自府治至京師七千二百五十五里分野天文牽牛須女分野星紀之次建置沿革禹貢揚州南境周為七閩地後屬越秦閩中郡地漢為會稽郡冶縣地後漢為會稽南部都尉地三國吳分置東安縣晉改曰晉安屬晉安郡宋齊因之梁天監中分置南安郡陳因之隋平陳廢郡改縣曰南安屬建安郡唐武德五年置豐州貞觀元年州廢屬泉州時泉州治閩縣聖厯二年置武榮州唐志析泉州之南安莆田龍溪置治南安三年廢久視元年復置景雲二年改曰泉州元和志即今理天寶初改清源郡乾元初復曰泉州屬江南東道五代初屬王閩晉開運中屬南唐置清源軍節度使宋乾德二年改平海軍太平興國三年復為州屬福建路元至元十五年升泉州路總管府是年置行中書省十八年徙福州明洪武初改曰泉州府屬福建布政使司本朝因之屬福建省領縣五舊領縣七雍正十二年升永春縣為永春直隸州廢聖厯二年為武榮州冶三年州又廢久視元年於縣東北界置武榮州尋改泉州以南安屬焉宋因之元屬泉州路明屬泉州府本朝因之惠安縣在府東北五十里東西距七十五里南北距九十五里東至海四十五里西至晉江縣界三十里南至海四十五里北至興化府仙遊縣界五十里東南至海五十里西南至晉江縣界三十里東北至仙遊縣界四十五里西北至仙遊縣界四十五里漢冶縣地晉以後為晉安縣地隋為南安縣地唐為晉江縣地宋太平興國六年析置惠安縣屬泉州元屬泉州路明屬泉州府本朝因之同安縣在府西南一百三十里東西距一百十五里南北距一百三十五里東至南安縣界四十里西至漳州府龍溪縣界七十五里南至海八十里北至安溪縣界五十五里東南至南安縣界四十五里西南至龍溪縣界七十五里東北至南安縣界四十里西北界五十里漢冶縣地晉太康三至漳州府長泰縣年析置同安縣屬晉安郡尋省入晉安縣隋唐為南安縣地五代後唐天成四年王閩復置同安縣屬泉州宋因之元屬泉州路明屬泉州府本朝因之安溪縣在府西一百五里東西距八十五里南北距八十五里東至南安縣界二十五里西至同安縣界六十里南至南安縣界二十五里北至永春州界六十里東南至南安縣界四十里西南至同安縣界六十里東北至永春州界九十里西北至龍巖州漳平縣界一百七十里漢冶縣地晉以後為晉安縣地隋唐為南安縣地五代南唐保大中分置清溪縣屬泉州宋宣和三年改曰安溪元屬泉州路明屬泉州府本朝因之形勢川逼𬈑渤山連蒼梧唐歐陽詹二公亭記閩越奧區地帶嶺海宋錢熙記表以紫帽龍首之峯帶以金溪石筍之阻宋陳知柔修二門記北枕清源西拱紫帽漲海經其南岱嶼襟其會宋淳祐志北負洛陽南面晉江倚泉山而城三台山八卦水明王世懋閩部疏風俗民淳訟簡素稱易治宋王十朋止訟文地推多士素習詩書宋曹修睦建學表其地少寒故曰溫陵圖經煮鹽鬻魚為業商賈鱗集圖經俗尚儉朴號曰海濱鄒魯隆慶府志城池泉州府城周三十里門六水門三唐天祐中建元至正十二年拓建明萬厯三十二年重建本朝順治十五年修康熙三年十七年雍正九年乾隆十六年嘉慶五年重修晉江縣附郭南安縣城周七百七十四丈門四引萬石陂水環城為濠明嘉靖三十八年建本朝順治十三年重建康熙三年修乾隆十一年重修惠安縣城周九百八十六丈門四濠周一千二十丈明嘉靖三十一年建萬厯三十八年重建本朝順治四年修康熙十七年乾隆十六年重修同安縣城周八百四十六丈門五各為重門濠周一千九十六丈宋紹興十五年建明景泰元年重建本朝順治十二年修康熙十七年二十四年乾隆二十二年重修安溪縣城周六百二十六丈門四水門二明嘉靖四十一年建本朝順治十三年重建雍正二年修乾隆五年十六年重修學校泉州府學在府治南育材坊宋太平興國七年建本朝康熙十二年修雍正二年乾隆二十六年嘉慶十六年重修入學額數二十名晉江縣學在縣治東行春門外宋淳熙四年建於行春門內明洪武初移建今所本朝康熙七年修五十二年乾隆十四年重修入學額數二十名南安縣學在縣城東二里宋紹興中建本朝順治中修雍正十二年乾隆二十七年重修入學額數二十名惠安縣學在縣治東元元貞初建本朝雍正十三年修入學額數二十名同安縣學在縣治東南宋紹興十年建本朝康熙元年修五十五年雍正九年乾隆十年二十年重修入學額數二十名安溪縣學在縣治東南宋紹興十二年建本朝康熙二十五年重建雍正元年修乾隆二十年重修入學額數二十名溫陵書院在府治東蔡巷明正德十年建本朝乾隆七年拓建清源書院在府治東南本朝乾隆三十二年建小山叢竹書院在府治東北城隍廟旁本朝康熙四十年建中有亭宋朱子題額曰小山叢竹因取以名書院梅石書院在府治東北舊名一峯書院明嘉靖八年以羅倫謫官講學於此因建本朝乾隆十五年重建改今名嘉慶十三年修石井書院在府城西南安平鎮西舊名鼇頭精舍宋紹興初朱松為鎮官講學於此嘉定四年建本朝康熙三十九年重建乾隆十四年修增臺門及兩廡豐州書院在南安縣治東本朝乾隆二十年建螺陽書院在惠安縣學宫右舊在縣署右本朝康熙年間建乾隆十四年移建今所雙溪書院在同安縣治東本朝乾隆二年建十八年拓建文公書院在同安縣大輪山麓初在城隍廟左元至正初賜額大同明成化間遷於儒學東嘉靖間改建今所本朝康熙二十七年修乾隆十七年重修玉屏書院在同安本朝乾縣厦門城內隆十六年建紫陽書院在同安縣門朝天宫厦後本朝雍正二聖祠前亦有紫年建四年拓陽書院朱子建又安簿同安溪縣東南啓時嘗按事於此考亭書院在安五十溪縣治城二年建乾隍廟東本隆二十二年朝康熙修按舊志載歐陽書院在晉江縣東北清源詹林藴林藻讀書處奉先書院在南安山唐歐縣西三陽里九日山宋安縣東南建乾道中改為墨妙堂浯州浯州嶼元建鳳山書院在安書院在溪縣北同鳯山明正德十六年建謹附記户口原男額人丁一十二萬七千七百七十婦大小共二百三十八萬一千四九今滋百二十生九名口婦共計四十六萬七五萬三千一百千八十三名口二十九户又屯計三千九百五民十男五户田賦田六地一萬三千七百五釐有奇額徴地丁正十九頃八十雜銀一十二一畝萬七二分千七十九兩六錢二分七釐米五千九百七石三升四合一勺屯田五百七十一頃九十八畝一分六釐有奇額徴丁糧銀二千二百四十四兩三錢二分米五千五百一石九升三合山川清源山在府城北五里郡主山也舊名泉山一名北山又以高頂常雲名齊雲山寰宇記山有孔泉故名朱買臣傳謂東越王所保之泉山是也上下皆石上石如殼下石如砥中坼孔竅而泉出焉方輿勝覽山周環四十里有石乳泉下達於江其巔有清源洞以泉名山及州以清源名郡蓋本於此通志在晉江縣東北八里高數千仞上多巖洞其得名者凡三十六閩書三十六巖洞純陽洞紫澤宫東巖西巖海潮室南臺巖遵巖半嶺巖棲霞巖大道巖泰嘉巖靈源菴碧霄巖不易巖瑞像巖寒山巖日休巖妙覺巖獅巖龜巖虎巖賜恩巖中巖下巖巢雲巖彌陀巖觀音巖梅巖木龍巖勢至巖清泰巖羽仙巖片瓦巖泰空室無塵菴楞伽院是也縣志上起三峯中峯有上下二洞上洞名純陽下洞名紫澤上下洞之間即清源泉也府志自清源之陰分而東行為萬安山至洛陽江南岸而止相近曰梁相山其迤而入郡城者東北曰虎頭山一名松灣折而北曰雲山為宋時州治韓琦生時榕樹開花處迤南曰鸚鵡山有巨石車立如鸚鵡故名更折而西南曰升文山以漢末王朗登臨於此龍頭山又西曰亦名朗山一名莪山山有莪泉萬歲山在晉江縣東南十里一名法石山下有法石寺宋初陳洪進築壇遙祝以效嵩呼後人名其地曰萬歲坡其左有石頭山山有三石傑出又雁塔山亦在縣東南十里平地突起高岡圓秀靈山在晉江縣東南二十里下瞰東湖前有盤石可觴坐百人上有懸石撼之輒動搖不止名碧玉毬左為雲谷山明蔡清嘗讀書於此上有塔院名雲谷室又十里有桃花山山土紅如桃花相連為赤蝦山金叉山在晉江縣東南三十里兩峯延袤數百丈若叉股然左有石鏡峯右有石獅巖上有六勝塔頗壯麗浯嶼水寨移置於此以地名石湖亦曰石湖山寶蓋山在晉江縣東南四十五里一名大孤山絶頂有石塔名關鎖塔聳出雲表商舶望此為抵岸之標俗謂之姑嫂塔下有聖泉井隨海潮汐為盈縮山半有虎岫巖東南跨海旁有金鞍山俗呼小孤山亦名天馬山中有月菴岱峯山在晉江縣東南閩書中有石佛巖相傳宋嘉定中石露夜光三道僧守淨鐫彌陀觀音勢至三尊旁刻泉南佛國四大字宋王十朋書字高六尺許獅山在晉江縣南十里昔人嘗置烽火於此一名烽山山前有行輦山相傳宋幼主南行至此下輦故名又南二十里有象陷山山勢雄大其東南為石龜山羅裳山在晉江縣南三十里為府城案山山東有玉髻峯下有畫馬石又有龍湫六井汲一井則五井皆動華表山在晉江縣南四十里頂有巨石聳立形如劍戟相近有高州山尖聳秀淨與府城相對靈源山在晉江縣南四十里其山蜿蜒數十里高出東南諸山舊名吳明山以有靈泉大旱不竭改今名上有望江石南瞰大海外如在眉睫絶頂有紫雲峯靈秀山在晉江縣南五十里上有小巖潮至則石潤潮退則石燥名海潮巖橫山在晉江縣南七十里橫於郡南長數里許龍蛇二水出焉石塔山在晉江縣西南二里筍江上其山從腰底尤不至麓乃一大可測號萬家磐石長二百餘丈其石宋𥘉有僧建塔於穿伏水頂因名左為龜山有鼓雷山有石有石卓立二丈如鼓叩之許名石筍又聲如雷又二西里南里有龍許首一亦名堂唐歐龍頭嶺下有妙陽詹别墅在焉峯紫帽山在與晉江南安縣西縣接南界方與勝頂常有覽州有紫帽山紫雲故名山椒為郡之前山嵯峨有龍池府志在縣摩西天絶南五里其來有南十即二南安縣峯峯之界山脈自南安最高者有二左烏石峯之山蜿蜒陰有金而粟洞右試劍峯絶棋局頂有凌霄塔仙迹仙掌諸西有石鼓丹龜峯北有天湖巖雙陽山在晉江縣北十曰大陽小里與南安陽南望之縣接則兩界郡城望山並峙一之微名朋有大山舊小志朋山深不大陽之可測名巔有泉為龍潭五洋山在山晉江縣北五頂有田千畝十宋里時有五有小姓居此髻洞山今訛五為吳麓有清水巖豐山在晉江縣里每遇水北六旱鄉十人禱之南三常豐故十里亦名山頂有雙丫亦名有豐山南安縣南七雙髻山又十里有大縣豐東山鳳山在晉江縣東北勢如飛鳳故名一名黃積山又名皇績山明嘉靖三十七年倭賊掠鳳山清源山犯南安即此地相連為大旗山下有石鏡亦名鏡山明何喬逺築精舍其下龍山在南安縣東六里形如龍蜿蜒而西偃而復起者九亦曰西山靈秀山在南安縣東南七里山狀如屏障山上有巖旱禱輒應相連者曰佛迹山九域志上有足迹相傳以為佛迹舊志相近有翠屏山有大小潘山按此與晉江縣之靈秀山名同地異又惠安縣南亦有靈秀山雄山在南安縣南六十里山勢高大諸峯皆在