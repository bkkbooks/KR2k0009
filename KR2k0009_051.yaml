  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_051-1a}
body:
  text: 大同府在山西省治北六百二十里東西距二百六十里南北距四百六十里東至直隸宣化府懷安縣界二百十里西至朔平府左雲縣界五十里南至代州繁峙縣界一百六十里北至察哈爾界三百里東南至宣化府蔚州界二百五十里西南至左雲縣界一百二十里東北至察哈爾界三百一十里西北至朔平府寧遠廳界一百三十里自府治至京師七百二十里分野天文昴畢兼尾箕分野大梁之次按漢書地理志趙地昴畢分野燕地尾箕分野今應州以東為燕地與宣府同分自大同以至偷林則皆趙分大同一府有燕趙二分建置沿革禹貢冀州之域周并州地戰國屬趙秦雁門郡地漢為雁門郡東部都尉後漢末廢晉永嘉五年封拓跋猗盧為代公遂有其地後魏天興中徙都於此置司州牧及代尹延和元年改萬年尹太和十七年遷都洛陽改曰恆州代郡孝昌二年陷廢北齊天保七年復置恆州并置安遠臨塞威遠臨陽等郡周平齊州郡並廢隋為馬邑郡地唐武德四年置北恆州七年廢貞觀十四年改置雲州元和郡縣志自朔州北界定襄城移雲州於此永淳元年廢開元十八年復置天寶初改曰雲中郡乾元初復曰雲州屬河東道會昌三年置大同都團練使四年升為都防禦使乾符五年升為節度使中和二年更為雁門節度使徙治代州五代唐同光二年復置大同節度使晉天福初割入契丹遼重熙十三年建為西京升大同府宋宣和五年復歸於宋改曰雲中府尋入金復為西京路大同府元至元二十五年改西京曰大同路屬河東山西道明洪武五年置山西行都指揮使司七年改為大同府隸山西布政使司本朝因之隸山西省領廳一州二縣七大同縣附郭東西距一百二十里南北距一百六十八里東至陽高縣界六十里西至朔平府左雲縣界六十里南至應州界八十五里北至邊牆八十三里東南至渾源州界八十里西南至懷至仁縣邊牆界一六百十里里漢東置北平至城陽縣髙屬縣雁界門九郡十為里西北東部都尉治郡後後魏漢天末興廢三中建國都魏為復代置屬郡治新興延和郡晉屬雁元年改曰門萬年太齊天和保十七七年年置復曰恆安平鎮城尋為恆改置州太治平孝縣昌中後周廢北改曰雲北中恆屬州朔治州貞隋改觀十為四雲年內於屬恆馬安邑鎮郡改後置徙定唐初襄縣為為雲縣州為治雲永州淳治元遼年重州熙縣十俱七廢開元年析雲十中八置年大置同雲縣中為西大京同大同為大府同治路金治因明之元為大至同元府二治年省本雲朝中因入之豐鎮廳在里府治南北北距邊二牆百外二一十百里里東東至西直距隸二百宣化三十府張家口十里理南事廳至大界同二縣百界里二西十至里朔北平至府察寧哈遠廳爾正界紅三旗正三黃十旗里遊西牧南地至界寧二遠百廳里東南界二十至五天里鎮東縣北界至二百察哈爾正三十黃旗里草地本朝界二初為百蒙一古十里察哈西北爾地至及寧遠廳界太僕寺牧厰十雍三正年三改年隸隸山直西隸省宣設化豐府川張衛家並口設理鎮事廳寧所管乾理隆十陽五高年縣裁之衛理所事改通設判豐駐鎮此廳三屬十大三同年府改移設舊同駐知懷仁縣在十府里西東南至七大十同里縣東西界三距十六里十西里至南朔北平距九府左雲縣縣界界六三十十里里東南南至至山應隂州縣界界三三十十里里西北南至至左朔雲平府左朔雲州縣界界九八十十里里東漢北沙至南大縣同後縣魏界時十廢里隋西開北皇至二年置移懷雲仁內縣來屬治大屬同馬府邑金郡貞後祐廢二唐年雲升中為縣雲地州遼元析復曰懷屬大仁同縣府屬大本同朝路因明之渾源州在十府里東東南西一距百九二十五至里應南州北界距五二十百五十里里南東至至代廣州靈繁縣峙界四十縣界九里十西里北百至十大里同西縣南界至一繁百峙二縣十里界八東十南里至東靈北邱縣至陽界一高縣界一縣屬百雁五門十郡里後西漢北及至晉懷初仁因縣之界永七嘉十五里年漢割置入崞於代後廢隋魏為改雲為崞內縣山地縣唐天為平雲二中年縣改地屬後繁分峙置郡後渾源周縣屬於應縣州置五渾代源晉州初元隨至州元入四遼年遼省因渾之源金縣貞入祜州二屬年大同府路明本屬大朝因同之應州在七府十南里一南百北二距十七里十東五西里距東至代渾州源繁州峙界四十里縣界四十西里至北山至陰大縣同界縣三十界三里十南五至里東五南里至東繁北峙至縣大界五同縣十界里四西十南里至西繁北峙至縣懷界仁五縣十界三十魏為里漢桑乾置郡劇陽地隋縣為屬馬雁邑門郡郡地後唐漢為因馬之晉邑縣省地後五代唐國軍明節宗度置晉金天城福縣兼元年置入應遼州遼天因成之元屬年西升京為道彰宋宣度和仍五屬年西屬京雲路中元路曰尋入應州金亦屬大曰同應州路明彰初國省軍金節城縣入府州本屬朝大因同之山陰縣在西府西距五南十一五百里四南十北里距東八十三里十東里至南應至州代界州二十界三五十里里西北至至朔懷平仁府縣朔州界五界十里四東南十里至東代北州至繁峙應州縣界九界三十十里里西西南至北至朔朔州州界界二十省五隋里漢為善置陽􅓭陶縣地縣唐屬雁為馬門郡後邑縣地漢遼及置晉河因隂之縣後屬朔州貞祐清二寧年中升改為屬應忠州州金元至大元定二七年改年并入為山金城隂縣縣後復大置同仍府屬應本州明朝因屬之陽高縣在里府東東西北一距八百十二五十里南大北同距縣一百界六四十里里東至南至天大鎮縣同縣界二界九十十五里里北西至至邊牆縣十四界五里十東里南至東北天至鎮天縣鎮界縣四十界六里十西里南至西北大至同大同縣治後界六漢為十代里漢郡治置高縣尋柳縣廢晉屬復代置郡後為西部都尉魏永熙中於縣置府金高大柳定郡七北年齊更郡縣名曰俱省白登遼元置長屬大青縣同路屬大明洪同武初司省嘉二十靖二六十年六改建年設陽和大同衛屬山東路西本行朝都指改曰揮使陽高衛三順治年改六衛年為移縣大同屬大府同治府於乾此隆八三年十還三故治年改雍正大同府同知為通判駐此天鎮縣在府東北六十五里一百南北八距十里東西一百三十距三里東至縣界三直十隸五宣化府懷里南至廣安縣靈縣界三十界一百里十西至陽高三里北至邊牆二十里東南南至陽高縣界四至十宣里化府西寧縣東北至懷安界縣八十里西界四十五里西後漢北至陽省後魏高縣道武界二帝置十里漢廣牧縣置陽原縣屬代後為塞外地唐郡置天成故名軍遼置屬宣德天成府中縣統屬大同三年改府金曰屬興和天路城元明洪初武復四年縣改衛屬山屬大西行同府都指尋揮廢二十使司六年置天本朝改曰成天鎮鹵二鎮衛雍正縣三年屬大改衛為同府廣靈縣在西府東距八南二十七百四十里南北里距東八十里源州東至界六直隸宣化十里南至府靈蔚州邱縣界二界四十十七里里北西至至渾宣化府至西寧縣靈邱縣界四界七十十里里東南至東北至蔚州界七西寧縣界十里西八十里南西北至陽高後漢晉及縣後界一百魏因之二十孝昌里漢置平舒縣中陷天平中復屬代置兼郡置上谷郡北齊并省入靈邱縣唐為興唐縣地五代後唐同光初析置廣陵縣屬蔚州遼因之金改曰廣靈仍屬蔚州元本朝雍正三年改明因之屬太同府靈邱縣在府東南二百七十里東西距八十里南北距一百七十里東至直隸易州廣昌縣界四十里西至渾源州界四十里南至直隸正定府阜平縣界一百三十里北至廣靈縣界四十里東南至直隸保定府唐縣界二百里西南至代州繁峙縣界六州界五十里西北至十里東北至直隸宣化府蔚渾源州界四十里漢置靈邱縣屬代郡後漢省後魏復置天平二年兼置靈邱郡後周又置蔚州隋開皇三年郡廢大業二年州廢屬雁門七年僑治郡唐武德六年復置蔚州僑治陽曲縣繁峙縣八年僑治秀容之北恆州城縣皆隨州寄治貞觀五年破突厥復故地還治靈邱縣天寶初移蔚州治安邊縣以靈邱縣屬焉遼及金初因之郡元復曰貞祐二年升為成州四年割為代州支靈邱縣屬蔚州明因之本朝雍正三年屬大同府形勢北臨廣野延亘千里封略之內南北錯居太平寰宇記東連上谷南達并恆西界黃河北控沙漠為邊郡之要衝府志風俗其民鄙朴少禮文好射獵漢書地理志質直淳厚圖書編俗尚武藝信義相先舊志士人徑直率矜名節飭廉隅猶存忠厚之風府志城池大同府城周十三里門四池廣一丈五尺明洪武中因舊土城甃甎城東南北各有小城周五里門三明景泰天順間築本朝順治八年修乾隆十年重修大同縣附郭懷仁縣城周三里有奇門二池廣一丈八尺明洪武中因土城增築萬厯間甃甎本朝增修渾源州城周四里有奇門三池廣二丈後唐時土築明萬厯中甃甎本朝順治六年修乾隆三十二年重修應州城周五里有奇門三池廣二丈明洪武中土築隆慶中甃甎本朝順治十二年修康熙元年乾隆十一年重修山陰縣城周四里有奇門三池廣二丈宋時土築明隆慶中甃甎本朝乾隆二十八年修陽高縣城周九里有奇門三池深三丈明洪武中土築崇禎中甃甎本朝乾隆十二年修天鎮縣城周九里有奇門四有池明洪武中因舊城土築萬厯中修本朝乾隆十二年重修廣靈縣城周三里有奇門二池廣三丈後唐時土築明萬厯中甃甎本朝順治六年修靈邱縣城周四里有奇門二池廣三丈唐開元中土築明萬厯中甃甎本朝順治十二年修乾隆十三年重修學校大同府學在府治東南舊在府治東即遼金西京國子監明洪武中改建本朝順治十二年修入學原額二十名乾隆五十四年裁撥霍州靈石縣三名大同縣學在縣治西北隅舊與府學一區明萬厯初徙建今所本朝康熙五十六年修入學額數十五名懷仁縣學在縣治西北隅舊在城東門外明洪武中徙建今所本朝順治康熙間屢修入學額數八名渾源州學在州治西元皇慶初建本朝順治六年修入學額數十二名應州學在州治西南舊在城西北隅遼清寧間建明洪武中徙建今所本朝順治十一年修康熙四十年重修入學額數十二名山陰縣學在縣治西宋建明嘉靖中增修本朝初重修入學額數八名陽高縣學在縣治東舊在高山衛東偏明成化中建萬厯中移建今所本朝順治間修康熙二十六年重修向為衛學雍正三年改設入學額數八名天鎮縣學在縣治東明戌化中建本朝康熙八年修五十五年重修向為衛學雍正三年改設入學額數八名廣靈縣學在縣治西北明洪武初建在縣治西後徙今所本朝順治十四年修入學額數八名靈邱縣學在縣治東金貞祐間建本朝順治十七年修康熙十七年重修入學額數八名雲中書院在府治東明御史陳文燧建延陵書院在廣按靈舊縣志城載內務西學北書隅院在本府朝治乾西隆南二明十宏五治年中建朱仕渾玳源搆州此南以七貯里御翠賜屏書山籍金賜狀額元務劉學翠撝右屏丞書蘇院保在衡講明學正處德石間溪巡書撫院石在玠渾建源今州並治廢北謹七附里記户口原共額七人十丁六四萬萬四五千千九二百百二二十十三二名今口滋計生一男十婦三萬五三十千五六户百田賦田有地奇五額萬徵一地千丁二正百雜八銀十一二十頃一一萬十二八千畝六六百分三十千兩九八百錢七三石分八一斗釐一糧升一有萬奇四山川紇真山在雲大內同縣縣有東紇亦名真山紇元于和山