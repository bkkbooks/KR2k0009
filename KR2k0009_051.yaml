重傷被擒不食三日死遼張儉宛平人統和中調雲州幕官故事車駕經行長吏當有所獻聖宗獵雲中節度使進曰臣境無他産惟幕僚張儉一代之寶願以為獻先是上夢四人侍側賜食人二口至聞儉名始悟召訪世務占奏三十餘事由此顧遇特異太平五年由武定軍節度使移鎮大同金大懷貞遼陽人大定二年遷彰國安武軍節度使縣尉獲盜得一旗上圖亢宿有謀叛狀株連萬人懷貞請誅其首十八人餘釋之嘗以私忌飯僧就中一僧異常懷貞曰汝何許人對曰山西人復問曾為盜殺人否對曰無之後三日詰盜果引此僧皆服具明察丁暐仁宛平人大定中同知西京留守事首興學校以明養士之法曹望之宣德人世宗朝同知西京留守事上書論便宜事多見采納以本官行六部事於北邊完顏守貞大定二十五年由西京警巡使改同知西京留守事御史臺奏守貞治有善狀元李德輝潞人至元七年録囚山西河東至懷仁有魏氏得木偶告妻厭勝謀不利於巳移數獄詞皆具德輝察知其有愛妾疑妾搆陷召鞫之移時而服杖其夫論妾死張思明輝州人延祐五年西京宣慰使嶺北戍士歲凶相挻為變思明威惠並行邊境乃安韓浩蔚州人至正間應州彰國軍節度使性持正人不敢干以私善撫循士卒一軍傾心百姓懷其德皆戴之如父母孫德謙睢人任大同行省平章事明兵圍大同德謙嬰城固守自知力不支作詩數章自決城陷不屈死明許彥餘籍未詳洪武三年知懷仁縣建學宮徙縣治置諸廨舍倉鋪多惠政民咸戴之張文煥籍未詳洪武中為大同白洋鎮巡檢忠勇有清操敵騎逼邊文煥率弓兵力戰中流矢死妻聞之同日亦死王士嘉武城人建文中知山陰縣善決疑獄有齎錢百緡卧樹下失之者士嘉曰此樹為祟吾將治之趨駕出士民傾城往視密令人偵不往者果得盜代王內藏失物戶扃如故士嘉曰此必狙公教狙竊之乃陳幣於庭呼羣狙過伺而觀之果有狙攫去詰其主皆服人以為神王良永樂初以户部主事督大同餉有威信為邊士所服周郁濟南人永樂中知渾源州時旱蝗郁齋沐以禱蝗飛出境州南有虎傷人郁牒於神是夜虎果入籠霍瑄鳳翔人正統初知大同府土木之變額森擁英宗至城下瑄號泣出叩馬衆露刃叱之不為動因獻英宗服物出金帛犒軍英宗嘉嘆軍民被掠脫歸者老弱發粟賑而所留丁壯為除賦役詔加山西右參政仍治府事英宗復位賜誥奬異額森舊作也先今改正朱冕沂人正統中以武進伯充總兵官鎮大同在鎮數年士卒愛戴十四年北征戰於陽和死之諡忠慤郭登臨淮人正統十四年以都督僉事充參將守大同英宗北狩軍士傷殘登涕泣撫循誓同存亡衆皆感奮敵奉英宗至呼門登不納曰臣奉命守城不敢擅啓景帝監國擢總兵官額森數入邊登大破之栲栳山封定襄伯居數年練兵蓄馬邊備復完年富懷遠人景泰初以右副都御史巡撫大同築新城廣屯田奏免秋賦罷諸州縣稅課局停太原民之轉餉大同者在鎮數年人戴之若父母韓雍長洲人天順中以僉都御史巡撫宣大恤軍繕堡治貪蠹飭邊防一時稱之王越濬人天順末以右副都御史巡撫大同修築諸邊城堡成化三年韃靼入塞督戰士禦却之余子俊青神人成化二十年以兵部尚書總督宣大邊務修築長城起大同中路至偏頭關六百里又以威遠至朔州一百七十里為轉運路乃城井坪以防堵截邊民稱便陳梁涇陽人成化中知渾源州恆山素禁樵採梁奏弛禁民獲其利南人充大同軍役多死者梁上狀各調本土衛所軍民圖像祀焉張文質扶風人成化中知渾源州境有妖狼囓人文質祈諸神詰旦狼伏死南墠之右歲旱禱雨即應是歲郡歉而渾源獨稔薛敬之渭南人成化末知應州首課耕織時行田野貧者賚以牛種負租及不能婚葬者助之州近邊少蓋藏積粟至四萬餘石歲飢民免流殍復業者三百餘家境有虎患為文祭告虎死於壑蕭家寨洪水湧出亦為文祭告水即下泄州不知學敬之親為訓誘人多興起課績為天下最劉安山陽人成化中以都督僉事充左參將分守陽和十九年伊徹默音達入大同周璽擊却之無何復入掠安將兵三千連戰敗之而大同西路參將莊鑑亦邀其歸路敵遂遁時諸將多失利安獨以功超遷都督同知尋改左副總兵協守大同與周璽並著功北邊稱名將伊徹默音達舊作亦思馬因大今改正周璽遷安人成化中以署都指揮僉事充右參將分守陽和有戰功進署都督僉事遷大同副總兵十九年秋伊徹默音達入大同總兵官許安敗績璽移兵往援大呼陷陳與麾下壯士急擊敵乃退以功豫實授莊鑑遼東人成化十九年為大同西路參將伊徹默音達入􅌽其歸戰牛心山寇遂遁鑑所部無亡失賚銀幣楊志學徐州人正德時以右僉都御史巡撫大同時帝數往幸江彬等恣徵索志學率取辦公帑不病民愛養士卒有邊警爭致死力歲飢請發帑賑救又奏增軍士月糧折色居五年邊人愛之若父母許進靈寶人宏治初以右僉都御史巡撫大同精諳邊務北部小王子以二萬衆抵關聲言入貢進遣犒奏許三千人入嚴飭備入貢者警畏不得肆終進之任不敢窺大同子論嘉靖中以兵部尚書總督宣大亦有勳績史道涿州人嘉靖十五年以大理少卿巡撫大同創置五堡墾田數萬項為邊大利郡人立祠祀焉詹榮山海衛人嘉靖中以户部郎中督餉大同值兵變肆掠用計擒戮首惡遂討平之擢光祿寺少卿後復以右僉都御史巡撫其地俺答數大舉入邊榮纍破之築東路牆一百三十八里又召軍闢治近地五百餘里得田數十萬頃佃作之復其租徭移大同一歲市馬費市牛賦之秋冬則聚而遏寇録功進兵部尚書纍被賞賚梁震榆林衛人嘉靖十五年以右都督為大同總兵官初大同數變震至憚其威名一軍帖服小王子等屢入抄掠數破之毛伯溫來督師與震協議修鎮邊諸堡不數月功成周尚文西安後衛人嘉靖二十一年為大同總兵官總督翁萬達議築邊牆自宣府西延袤二百餘里以尚文忠勤專屬之尚文益築陽和以西至丫角山邊牆四百餘里斤屯田四萬餘頃全鎮賴之先是俺答及吉農諸子數入擾尚文與萬達規畫戰守纍破強敵邊氏息肩者數年吉農舊作吉囊今改正張達涼州人嘉靖中大同總兵俺答數萬騎入塞伏精鋭山谷中達欲持重巡按御史胡宗憲信敵誘乘醉趣達出師達憤怒挺身陷陳北兵圍之數匝達左右突不得出副總兵林椿引兵來救亦陷重圍矢如雨違與椿俱死事聞贈達左都督諡忠剛立祠賜祭葬嶽懋陜西人嘉靖三十三年大同總兵巡邊遇俺答追擊至青屹塔陷伏戰死事聞贈左都督諡莊愍立祠致祭韓邦靖朝邑人嘉靖初為山西參議分守大同歲飢奏請發帑不許復抗疏不報遂乞歸兵民遮道泣留馬不得前未幾其兄邦奇亦以參議涖大同為政亦如其弟民並戴焉李瑾大同右衛人嘉靖初為中路參將霍賊擾西路瑾馳兵擊敗之升大同總兵官與士卒同甘苦其有追北失期烽堠失警者不少貸鎮兵恨之廢將朱振乘釁為亂夜攻瑾格鬬力竭自刎死張世忠山海衛人嘉靖中為署指揮僉事參將大同拒敵丁家莊有斬獲功薛蓁嘉靖中為大同指揮僉事總兵嶽懋遇俺答欲逐之蓁曰疑有伏請母深入懋不從追至青屹塔果陷伏中懋戰死蓁巳奪圍出聞懋被害復陷陳搏敵亦死事聞贈都督僉事丁碧為大同西路參將嘉靖中俺答入邊碧提孤軍數百遏其鋒於馬家窊大呼突陳敵攢射而死王邦直磁州人嘉靖二十四年北部入掠鵓鴿峪邦直佐守將張鳳射却之轉戰而前敵大合鳳與邦直結方陳拒之鳳戰死或勸邦直潰圍出邦直曰我豈忍獨生遂揮刃向前擊殺數人知不得脫乃自刎死許光宗乾州人嘉靖間知山陰縣邑患水築堤以捍舊城卑薄又請重築堅厚邑賴以全石昆玉黃梅人萬厯中以右僉都御史巡撫大同與總督塗宗濬宣府巡撫汪道亨協䇿定順義王布色圖之封進右副都御史在鎮四年威惠大著後以疾歸布色圖舊作卜石免今改正曾乾亨吉水人萬厯十八年以光祿少卿兼監察御史閲視大同邊務劾罷總兵官以下十餘人大同土兵歲餉萬二千石兵自徴之民不勝擾乾亨議留兵二百餘盡汰之屢奏邊備事宜輒中機要張信民澠池人萬厯中知懷仁縣行條鞭法開墾荒田千五百畝又嚴斥異教講學造士民建祠祀焉衛景瑗韓城人崇禎十五年以右僉都御史巡撫大同歲飢且疫疏乞賑濟給牛種民獲蘇乃戢豪宗搜軍實練火器聲績甚著閲二年李自成陷大同入駐代王府執景瑗以見景瑗不屈大哭自縊於佛寺滿桂崇禎九年為大同總兵官時察哈爾部順義王入大同大掠挾賞不去桂至遍厯八路七十二城堡大修守備軍民恃以無恐察哈爾部舊作插部今改正朱家仕河州人崇禎中厯副使分守大同政尚寬平流賊至或勸之避家仕曰生平所學何事尚惜一死不以報國耶城陷盡驅妻妾子女赴井而已從之一家死者十六人徐有聲金壇人崇禎末以户部郎中督餉大同城陷被執不屈死福王時贈太僕少卿李倬陜西人崇禎末知山陰縣流賊破城死之蔣秉彩全州人崇禎中知靈邱縣有循吏風大兵至慨然曰吾以死衛民遂登陴列守力屈自經死闔門殉之本朝佟養量奉天人順治六年任宣大總督駐陽和時薑瓖初平骸骨遍野斂而葬之又建報忠祠祀一時死事諸人衛所屯田部議照內地起科養量言邊地沙磧種遲霜早加以兵凶荒殘愈甚若授例起科勢必聞風俱潰疏上獲允郡人至今感之佟養升奉天人順治間養馬大同薑瓖之亂戰敗不屈死張肇斌順治五年大同府西路同知死薑瓖之亂王度山東人順治進士知大同有能聲薑瓖之亂招撫懷仁諸縣以次定督運勸輸括馬擒寇胥有功賊反間度於親王統師者王知其忠告之度怒檄詆賊家人盡為賊所殺事平遷太常寺卿時縣丞項一科死之榮爾奇德州人知渾源州剛毅明達愛民禮士薑瓖之亂城陷死之時吏目周官同死難郎永清廣寧人順治六年知渾源州立義冡瘞遺骸招流亡開墾請豁逋賦萬餘兩給販易者母錢俾通貨器殘民漸蘇為立祠祀之宋起鳳滄州人順治十一年知靈邱縣力請蠲逋賦萬訐時詣田勸相流民漸得復業管一舉順治間得勝路參將薑瓖之亂殉節死贈副總兵祀忠烈祠梁化鳳長安人順治間官陽和高山衛守備能得士死力大兵進勦薑瓖化鳳率所部從大小七十餘戰所向有功晉都督僉事李吐馨同官人靈邱典史薑瓖之變兵數千集城下令恇怯莫措吐馨招集鄉勇激以大義皆感泣為之堅守曹溶嘉興人康熙六年任陽和兵備道賑荒馭吏皆有聲績董遂升河間人康熙九年官大同府西路同知時民有重獄已定擬察其誣釋之而置姦於法石佳彝奉天人康熙二十年知懷仁縣出金賑荒給牛種以勸耕邑近邊地鮮文學立義學興起諸生民立碑識之董學詩遼陽人康熙二十六年知懷仁縣年少精敏在任三年冶行為當時最談從簡山海衛人康熙元年知靈邱縣諳民間利病百廢具舉瘡痍漸復王度漢陽人康熙十一年知靈邱縣蒞官仁恕能濟以嚴明吏民畏愛之卒官䈓愇布被敝衣數襲而已百姓罷市往哭陳際熙石屏人雍正三年知天鎮縣時初改衛為縣際熙一意振作百務具舉值歲旱遍厯各鄉撫慰力請蠲縣去官後士民立像私祀之朱宗洛無錫人乾隆二十三年知天鎮縣緝獲積匪窮治窩黨境內肅然凡聽訟不踰三日悉論報可息者令自和解公餘勤課諸生士習丕懋卒於官僅存著書數十卷士民環署涕泣與陳令並立像私祀之人物漢韓珩字子佩代人少喪父母奉養兄姊宗族稱孝弟官至别駕袁紹之子熙尚為其將焦觸等所攻奔烏桓觸自號幽州刺史驅率諸郡大守令長背袁向曹殺白馬盟令曰違者斬衆莫敢言各以次歃至别駕珩曰吾受袁公父子厚恩智不能救勇不能死於義闕矣若北面曹氏所不能為也一座失色曹操聞珩節甚高之屢辟不至卒於家南北朝魏衛操字德元代人少有才略晉征北將軍衛瓘以為牙門將後與從子雄及其宗室鄉親姫淡等歸魏説桓穆二帝招納晉人附者稍衆桓帝嘉之以為輔相任以國事及劉淵石勒之亂桓帝匡助晉氏操稍遷至右將軍封定襄侯燕鳳字子章代人好學博綜經史明習陰陽讖緯昭成待以賓禮後拜代王左長史參軍決國事又以經授獻明帝嘗使苻堅不辱命苻堅存立道武鳳之謀也道武即位厯吏部郎給事黃門侍郎行臺尚書甚見禮重太武初以舊勳賜爵平舒侯許謙字元遜代人少有文才善天文圖讖之學昭成擢為代王郎中令兼掌文記與燕鳳俱授獻明帝經登國初為右司馬與張衮等參贊初基後為陽曲護軍賜爵平舒侯長孫嵩代人寬雅有器度道武以為南部大人纍著軍功明元即位與奚斤安同崔宏等八人坐止車門右聽理萬幾世號八公明元寢疾與嵩定䇿禁中詔太武臨朝監國嵩為左輔太武即位進爵北平王司州中正遷太尉薨長孫道生嵩從子道武愛其慎重使掌機密太武即位進爵汝陰公遷廷尉卿從征蠕蠕大捷而還征赫連昌為前驅遂平其國纍除司空加侍中進封上黨王道生廉約身為三司衣不華飾食不兼味每建大議多合時機為將有權略善待士衆所在著績孫觀以壯勇知名有軍功官至征南大將軍長孫肥代人有雅度果毅少言道武之在賀蘭部肥常侍從禦侮左右登國初與莫題等俱為大將屢有戰功從平中山賜爵琅琊公纍遷兖州刺史肥善策謀勇冠諸將前後征討未嘗失敗南平中原西摧羌寇肥功居多子翰以善騎射為獵郎纍加平南將軍太武即位進封平陽王遷司徒翰清正嚴明善撫將士所征討咸有尅獲功尉古真代人道武之在賀蘭部賀染干等將肆逆古真密馳告染干執拷之以兩車軸押其頭傷其一目後從平中原以功賜爵東州侯弟諾侍道武以忠謹稱從圍中山先登亦傷一目道武嘆曰諾兄弟並毁其目以建功效誠可嘉也賜爵安樂子諾長子眷忠謹有父風明元時執事左右為太官令以驍烈聞文成時拜侍中太尉封漁陽王録尚書事庾業延代人後賜名嶽恭慎修謹善處危難道武嘉之命為外朝大人參預軍國從平中原拜安遠將軍以軍功賜爵西昌公遷鄴行臺嶽為將有謀略士衆服其智勇名冠諸將遷司空被誅時人冤惜焉叔孫建代人登國初為外朝大人纍除平原鎮大將封丹陽王加征南大將軍擊走宋將檀道濟拔滑臺建沈敏多智東西征伐常為謀主又雅尚人倫禮賢愛士魏初名將鮮有及之穆觀代人父崇從道武平中原位太尉宜都公觀少襲崇爵明元時尚宜陽公主拜駙馬都尉太武監國觀為右弼出則統攝朝政入則應對左右事無巨細皆關決焉終日怡怡無愠喜之色勞謙善誘不以富貴驕人年三十五薨贈宜都王樓伏連代人忠厚有器量道武初從破賀蘭部又平中山以功賜爵安邑侯太武即位封廣陵公再遷光祿勳進爵為王後鎮統萬薨賀狄干代人為北部大人登國初道武遣狄干結婚于姚萇萇死興立因止狄干而絶婚狄干在長安習讀書史通論語尚書諸經舉止風流有似儒者初帝普封功臣遙賜狄干爵襄武侯加秦兵將軍後還國見其言語衣物類中國忿而殺之于栗磾代人材力過人能左右騎射登國初拜冠軍將軍襲慕容寶於中山進假新安公後為河內鎮將劉裕伐姚浤栗磾慮其北擾築壘河上𥙿不敢進遺栗磾書假道題曰黑矟公麾下栗磾以狀表間明元因授黑矟將軍栗磾好持黑矟故有其號纍遷外都大官爵新安侯卒贈大尉栗磾自少總戎迄於白首臨時善斷所向無前加以謙虛下人刑罰不濫太武甚悼惜之子洛拔少拜侍御中散有姿容善應對襲爵出為和龍鎮都大將營州刺史有能名後遷侍中尚書令在朝祇肅百僚憚之車路頭代人少以忠厚選給東宫為帳下帥天賜未明元出外路頭隨侍竭力及即位封宣城公忠意將軍帝性明察羣臣多以職事遇譴路頭性無害每評獄處理常獻寬恕之議以此見重於朝帝亦敬納之古弼代人少忠謹初為獵郎門下奏事以敏正稱明元嘉其直而有用賜名曰筆後改名弼言其有輔佐才也太武時位侍中爵建興公假節督隴右諸軍纍著戰功遷尚書令事務殷繁而讀書不輟遇事敢言不避誅責帝常稱為社稷之臣吳王立以弼為司徒文成即位坐法死時人冤之叔孫俊建長子字醜歸內侍左右謹密無過行道武崩清河王紹閉宫門明元在外紹逼俊以為巳援俊仍與元厯磨渾等説紹歸明元明元即位遷衛將軍賜爵安城公朱提王悅懷刃將為逆俊覺舉動有異執悅殺之明元以俊前後功重軍國大計一以委之劉尼代人勇果善射世祖見而善之拜羽林中郎賜爵昌國子宗愛殺南安王余于東廟尼密以狀告殿中尚書源賀與南部尚書陸麗謀迎文成登大位衆咸唱萬歲尼遷內行長封東安公尋出為定州刺史以清慎稱官至司徒來大千代人驍果善射永興初位中散典宿衛禁旅用法嚴明上下齊肅太武踐阼為常侍纍從征討以戰功賜爵廬陵公尋使巡撫六鎮經略得宜後吐京胡反以大千為都將討平之周幾代人少以善射為獵郎明元即位為右部尚書以軍功封交址侯太武以幾有智勇遣鎮河南威信著於外境進號宋兵將軍率洛州刺史于栗磾以萬人襲陜城卒於軍軍人無不歎息之豆代田代人明元時從攻虎牢登樓射賊矢不虛發從討赫連昌乘勝追賊入其公門門閉踰宫而出太武壯之拜勇武將軍後從討平涼破赫連定又從討和龍戰功多封長廣公陸真代人少善騎射太平真君中從討蠕蠕以功賜爵關內侯從太武至江還次盱眙真功居多文成即位進爵都昌侯後拜長安鎮將氐豪仇傉檀等及東平王道符先後反俱擊平之進爵河南公陸俟代人明元踐阼纍拜給事中典選部蘭臺事無所屈撓纍拜冀州刺史治績為天下第一厯安定長安二鎮大將遷內都大官加都督秦雍諸軍俱以方略討平巨寇文成踐阼以子麗䇿立勳進爵東平王于什門代人明元時為謁者使喻馮跋及至和龍住外舍使謂跋曰大魏皇帝有詔須馮王出受然後敢入跋使人牽逼令入見不拜跋令人案其項終不憢屈既而跋拘留什門隨身衣裳敗壞略盡蟣蝨被體跋遺以衣服拒而不受厯二十四年後馮宏上表稱臣乃送什門歸拜治書侍御史太武下詔褒美比之蘇武羅結代人劉顯謀逆結從道武幸賀蘭部後以功賜爵屈蛇侯太武初纍遷侍中外都大官總三十六曹事太武以其忠慤甚信待之除長信卿歸老賜大寧東川為私第别業并為築城曰羅侯城朝廷每有大事驛馬詢問年一百二十卒子斤從太武討赫連昌力戰有功厯位四部尚書後從平涼州以功賜爵帶方公纍除柔元鎮都大將伊馛代人勇健善射太武將討涼州議者咸以無水草諌惟崔浩勸行馛曰若涼州無水草何得為國宜從浩言帝善之克涼州太武曰馛智力如此終至公相欲拜馛為尚書馛辭曰中祕多文士請參其次遂拜袐書監進爵河南公興光元年拜司空清約自守為政舉大綱不為苛細太安二年領太子太保與陸麗等並平尚書事封敕文代人始光初為中散稍遷西部尚書出為使持節開府領護西夷校尉秦益二州刺史賜爵天水公鎮上邽征吐谷渾慕利延兄子捨歸於枹罕拾歸遁去金城邊坰天水梁會謀反陽王元達聚黨攻城皆討破之天安元年卒長子萬護讓爵於弟翰朝廷義而許之苟頽代人性嚴毅清直武力過人太武南征為前鋒都將常先登陷陳賜爵建德男厯位侍中都曹尚書頽方正好直言雖文明太后生殺不允頽亦懇切致諌未曾阿諛纍遷司空進爵河東王大駕幸三川頽留守京師沙門法秀謀反頽率禁旅收掩畢獲內外晏然陸馥俟長子多智有父風興安初為相州刺史多善政在州七年徵為散騎常侍百姓乞留者千餘人後襲父爵改封建安王獻文將禪位於京兆王子推馥抗言曰皇太子聖德承基四海屬望不可橫議干國之紀臣請刎頸殿廷有死無二帝意乃解詔曰馥直臣其能保我子乎遂以馥為太保奉皇帝璽綬傳位孝文陸麗馥弟少以忠謹入侍左右審慎無僭失賜爵章安子稍遷南部尚書太武崩南安王余立為宗愛等所殺麗首建大義奉迎文成而立之社稷獲安受心膂之任興安初封平原王纍遷司徒公領太子太傅尉撥代人初從兖州刺史羅忸擊賊於陳汝有功賜爵介休男討和龍擊吐谷渾皆有功進爵為子纍遷杏城鎮將清平有惠績獻文時進爵安成侯婁提代人獻文時為內三郎獻文暴崩提號泣欲殉遂引佩刀自刺幾死太后詔賜帛二百匹和其奴代人少有操行善射御文成初封平昌公纍遷尚書左僕射又與河東王閭毗太宰常英等並平尚書事在官慎法不受私請遷司空加侍中薨贈平昌王薛彪子代人父野䐗并太二州刺史封河東公有聲稱彪子姿貌壯偉明斷有父風太安中遷內行長典奏諸曹事當官正直內外憚之太和四年徐州民桓和等叛詔彪子與尉元等平之除開封徐州刺史甚多惠政尉元字苟仁代人由羽林中郎纍遷北部尚書天安元年薛安都以徐州內附以元為持節都督東道諸軍事赴之宋兖州刺史畢衆敬遣章仇􅋆歸款元並納之遂長驅入彭城分擊吕梁絶其糧運宋將張永夜遁太和三年進爵淮陽王齊高帝多遣間諜扇動新民以元威名夙振使率諸軍討之東南清晏遠近帖然尋遷尚書令進司徒詔為三老卒元澄字道鏡任城王雲子少好學言辭清辨以孝聞襲封纍授尚書令孝文謀遷都澄贊成其事衆聞驚駭澄援引古今曉之衆乃開伏從幸鄴宫除吏部尚書及車駕自代北巡留澄銓簡舊臣自公以下萬數量其優劣別三等用之咸無怨者明帝初遷司空加侍中領尚書令奏利國濟人所宜振舉者十條後加司徒公政無大小皆引參預澄亦盡心匡輔事有不便諫諍不巳內外咸敬憚之穆亮字幼輔觀曾孫孝文時纍官至侍中尚書右僕射於時復置司州孝文曰司州須立中正必任德望兼資者尚書陸睿舉亮為司州大中正尋遷司空參議律令孝文南伐以亮録尚書事留鎮洛陽徙封頓邱郡開國公于烈洛拔長子善射少言有不可犯之色少拜羽林中郎纍遷光祿卿太和十九年大選百僚烈子登引例求進烈表請黜落孝文嘉其有識進登為太子翊軍校尉又加烈散騎常侍及穆泰陸睿謀反舊京時代舊族同惡者多惟烈一宗無所染預帝益器重之以為節概不讓金日磾詔除領軍將軍宣武即位以宰輔咸陽王禧等專擅與烈潛謀廢之自是長置禁中參預機密大事禧謀反烈追執之卒贈太尉進封巨鹿郡公長孫慮代人母因飲酒其父真誤以杖擊致死為縣囚執處以重坐慮列辭尚書云父母忿爭本無餘惡直以繆誤一朝橫禍今母喪未殯父命旦夕兄弟五人並沖幼慮身居長今年十五乞以身代父使嬰弱衆孤得蒙存立尚書奏云慮於父為孝子於弟為仁兄尋情究狀特可矜感孝文詔特恕其父死罪以從遠流董洛生代人居父喪過禮詔遣祕書中散溫紹伯奉璽書慰之令自抑割以全孝道又詔其宗親使相喻奬勿令滅性朱長生于提並代人孝文時長生為員外散騎常侍與提俱使高車既至高車王阿伏至羅責長生等拜長生拒之至羅既受獻不拜長生曰為臣內附宜盡臣禮呼出帳令衆中拜至羅怒囚之脅降長生與提瞋目厲聲責之至羅大怒絶其飲食各分徙之三歲乃放還孝文嘉其節拜長生河內太守提隴西太守並賜爵五等男穆紹字永業亮之子拜駙馬都尉厯七兵殿中二尚書遭憂免居喪以孝聞除中書監侍中領本邑中正紹資性方重罕接賔客領軍元乂當權熏灼候紹紹迎送下階而已靈太后欲黜乂猶豫未決紹贊成之以功加特進儀同三司孝莊立爾朱榮遣人徴之紹往見榮捧手不拜尋授尚書令司空公進爵為王長孫冀歸字承業代人聰明有才藝虛心愛士為前將軍從孝文南征宣武時假鎮西將軍討蜀都督頻戰有功纍除尚書右僕射雍州刺史蕭寶夤據州反以承業為行臺討平之除雍州刺史孝武入關位太師録尚書事封上黨王陸凱字智君馥之子謹重好學位太子庶子給事黃門侍郎在樞要十餘年以忠厚見稱兄琇陷罪凱痛兄之死哭幾失明訴冤不巳至正始初宣武復琇官爵凱大喜置酒集諸親曰吾數年中抱病忍死顧門戶計耳今願畢矣遂以其年卒二子暐恭之並有時譽陸旭俟曾孫性雅淡好易緯候之學撰五星要訣及兩儀真圖頗得其指要太和中徴拜中書博士稍遷散騎常侍知天下將亂遂隱於太行山纍徵不起元順字子和澄子通杜氏春秋性謇諤淡於榮利起家為給事中時高肇權重天下順詣肇直往登牀捧手抗禮父憂哭泣嘔血身自負土領軍元乂威勢尤盛順曽不詣乂至于朝論得失順常鯾言正議曽不阿旨纍官左僕射莊帝初河陰遇害家徒壁立無物以殮門下通事令史王才達裂裳覆之贈尚書令司徒公婁寶字道成伏連孫明帝時隨源子雍討擊葛榮師敗被囚變姓名匿於戎伍密啓賊形勢規為內應榮滅始得還永安中除假員外散騎常侍使蠕蠕先是蠕蠕稱藩上表復以中州不競書為敵國儀寶責之蠕蠕主謝遂更稱藩後從孝武入關封廣安縣伯官至儀同三司兼太子太傅寶清簡少言頗諳舊事位厯師傅守靖謙恭以此為人所敬陸操字仲志麗從孫高簡有風格學業知名為散騎常侍聘梁使還遷廷尉卿齊文襄為世子甚好色薛置妻元氏有色迎入欲通之元氏正辭且哭世子送付廷尉操曰廷尉守天子法須知罪狀世子怒召操命刀環築之操終不撓後徙御史中丞天保中卒於殿中尚書北齊慕容紹宗字紹宗燕太原王恪之後曽祖騰歸魏遂居代紹宗恢毅深沈有膽略爾朱榮入洛欲因百官出迎悉誅之紹宗諌不聽後以軍功封所盧侯遷爾朱兆長史及兆敗紹宗攜榮妻子及兆餘衆自歸神武神武仍加恩禮軍謀兵略時參預焉元象初以軍功進爵為公纍遷尚書左僕射侯景反命紹宗為東南道行臺討景於渦陽時景軍甚盛紹宗麾兵徑進諸將從之因大捷西魏王恩政據潁川又以紹宗為南道行臺與髙嶽劉豐圍擊之堰洧水灌城未幾臨堰見北有塵氣乃入艦忽暴風飄艗向敵城紹宗度不免遂投水卒贈太尉綦連猛字武兒代人初事爾朱榮爾朱兆後為神武親信爾朱文暢將為逆猛曰昔事其父兄願今日受死不忍告而殺之神武聞之曰事人當如此舍其罪而益親之以軍功纍封山陽王猛頗疾姦佞言議時有可采官至大將軍卒婁昭字菩薩平城人祖父提家僮千數牛馬以谷量性好周給士多歸附之昭方雅正直有大度深謀神武少親重之神武將出信都昭贊成大策即以為中軍大都督從破爾朱兆於廣阿纍封濮陽郡公樊子鵠反以昭為東道大都督討之子鵠既死諸將勸昭盡捕誅其黨昭曰此州橫被殘賊其人何罪遂皆捨焉纍遷司徒出為定州刺史薨侯莫陳相代人七歲父死號慕過人及長性雄傑後從神武起兵以戰功封白水郡公天保初纍遷司空進爵為王厯太傅朔州刺史次子晉貴嚴重有文武幹略襲爵官至開府儀同三司梁州刺史陸卬字雲駒麗元孫博覽羣書多通大義善屬文起家員外散騎侍郎纍除中書侍郎修國史以父憂去職居喪骨立兄弟相率廬墓負土成墳詔褒所居里為孝終里天保中遭母喪哀毁沈篤弟搏遇疾臨終曰大兄尫病如此性至慈愛摶死必不使大兄知之致有感動家人至祖載始告卬聞而悲一慟而絶卬自在朝篤慎周密不説人短不伐巳長言論清遠有人倫鑒裁朝野甚悲惜之子又襲爵始平侯五經精熟官至通直散騎常侍張華原字國滿代人周文據雍州華原以散騎常侍入關往説周文謂曰能屈於此當共享富貴不爾命懸今日華原曰有死耳不敢聞命周文嘉其亮正乃使東還纍遷兖州刺史人懷感附寇盜寢息重囚給假依期畢至卒官州人大小莫不號慕為樹碑立祠祀焉贈司空公尚書左僕射周達奚武字成興代人初為賀拔嶽别將嶽為侯莫陳悅所害武收尸歸平涼從文帝平悅封須昌縣伯魏大統初自大丞相府中兵參軍出為東秦州刺史厯雍同二州纍著戰功進封鄭國公轉太傅武微時奢侈好華飾及居重位不持威儀行常單馬門不施戟每曰天下未平國恩末報安可過事威容子震習武藝有政術建德中從平鄴拜大宗伯出為原州總管竇熾字光成其先扶風平陵人亡奔胸奴後隨魏南徙家於代熾少從范陽祁欣受毛詩左氏春秋略通大義善騎射以戰功拜楊烈將軍大統中從文帝禽竇泰復宏農破沙苑皆有功厯涇原二州刺史政績著聞保定初進封鄧國公後拜太傅熾名望素隆軍國大謀常與參議隋文帝為相國百僚皆勸進熾獨不肯署箋時人皆高其節竇毅字天武熾兄子魏孝武初起家員外散騎侍郎齊神武擅朝毅慨然有殉主之志從孝武西遷及禽竇泰復宏農戰沙苑皆有功纍封神武郡公保定三年拜大將軍時突厥君臣有二志於齊毅抗言正色以大義責之乃定毅性溫和謹慎尚文帝女襄陽公主朝廷委信任兼出入未嘗有矜惰之容時人以此稱焉厙狄峙其先遼東人徙居代峙仕魏為高陽郡守為政仁恕大統初遷黃門侍郎時與東魏爭衡蠕蠕屢為邊患朝議欲結和親使峙往峙善辭令蠕蠕主信重之自是不復為寇封高邑縣公纍拜侍中蠕蠕滅後突厥強盛雖與周通好而外連齊氏令峙喻之突厥執齊使歸諸京師進爵安豐郡公明帝時為少師卒子嶷嗣位蔡州刺史嶷弟徵徽嶔皆以軍功拜儀同大將軍陸騰字顯聖旭之子魏大統中為文帝帳下都督遷武衛將軍安康賊黃衆寶等作亂騰大破之遷拜龍州刺史轉江州厯龍州總管拜司憲大夫前後破平諸賊凡賞得奴婢八百口馬牛稱是天和四年遷江陵總管陳人圍江陵騰奮擊遂遁加位柱國進爵上庸公尉遲回字薄居羅代人有大志好施愛士魏大統中纍官尚書左僕射兼領軍將軍尋拜大將軍督開府元珍等六軍伐蜀所至皆降詔以回為大都督益潼等十二州諸軍事益州刺史三年加督六州迥綏輯新邦民人懷服性至孝大長公主年高文帝徴回入朝以慰其意武成元年封蜀國公建德初拜太師宣帝即位出為相州總管隋文輔政迥舉兵圖匡復為韋孝寬所敗自殺弟綱善騎射河橋之役文帝馬中流矢驚奔綱與李穆等左右力戰衆皆披靡文帝方得乘馬進爵平昌郡公厯位少傅大司空陜西總管梁椿字千年代人初從爾朱榮入洛又從賀拔嶽討平万俟醜奴仍從文帝平侯莫陳悅魏大統中纍以戰功封東平郡公位開府儀同三司保定元年拜大將軍椿性果毅善撫納所獲賞物分賜麾下故每戰咸得其死力好儉素不營資産時論以此稱焉尉遲運綱之子宣帝在東宫數有罪失武帝選忠諒鯁正者匡弼之以運為右宫正建德三年帝幸雲陽宫令運與長孫覽輔太子居守衛刺王直作亂襲肅章門覽懼走行在所運手自闔門直乃縱火運更益其火直遂不得進乃退運率留守兵擊之直大敗而走武帝嘉之授大將軍將伐齊召運參議東夏砥定頗有力焉進爵盧國公宣帝即位出為秦州總管隋達奚長儒字富仁代人高祖受禪封蘄春郡公開皇二年突厥衆十餘萬來寇以長儒為行軍總管率衆二千力戰却之進上柱國厯鄜州刺史母憂去職長儒性至孝毁悴過禮天子嘉歎起為夏州總管胸奴不敢窺塞轉荆州總管卒竇榮定熾兄子高祖受禪以佐命功拜上柱國尋除秦州總管突厥沙鉢略寇邊為行軍元帥出涼州擊之數挫其鋒突厥懼請盟而去進爵安豐郡公高祖欲以為三公上書固辭房兆代人本姓屋引氏剛毅有武略頻為行軍總管擊寇有功位至柱國徐州總管吐萬緒字長緒代郡鮮卑人在周襲爵元壽縣公高祖受禪有吞陳之志授徐州總管令修戰具陳平拜夏州總管漢王諒舉兵詔緒從楊素擊破之大業初轉光祿卿賀若弼遇讒緒明其無罪免官劉元進作亂攻潤州帝徴討破之斬偽僕射管崇等五千餘人尋忤帝意徴詣行在所發疾卒楊義臣代人本姓尉遲氏父崇仕周為儀同大將軍開皇初擊突厥於周槃戰死義臣幼養於宫中賜姓楊氏性謹厚能騎射有將領才突厥達頭可汗犯塞以行軍總管出白道破之明年突厥又寇邊義臣追至大斤山破之代州總管李景為漢王將喬鍾葵所圍詔義臣往擊破之以功授上大將軍其後屢平巨寇進位光祿大夫尋拜禮部尚書卒五代唐安金全代人數從莊宗用兵有功官至刺史以疾居太原莊宗與梁相距河上梁將王檀襲太原監軍張承業大恐金全強起召率子弟及故將吏百餘人夜出北門擊檀於羊馬城中檀軍驚潰明宗即位拜振武軍節度使安重誨應州人為人明敏謹恪明宗鎮安國為中門使及即位纍加侍中兼中書令事無大小皆以參決盡忠勞力時有輔益卒被讒死周史彥超雲州人周太祖入立為虎捷都指揮使以戰守功纍拜感德軍節度使周兵圍漢太原契丹救漢出欣代世宗遣符彥卿拒之彥超為先鋒戰欣口勇憤俱發解而復合者數四遂殁於陳贈太師優恤其家焉宋李漢超雲中人初從太祖平李重進等遷齊州防禦使在郡十七年政平訟理吏民愛之後為關南都巡檢使卒漢超善撫士卒與之同甘苦死之日軍中皆流涕子守恩驍果善戰有父風纍官至隴州刺史知靈州戰殁特賜洪州觀察使折御卿雲中人從太宗征河東破岢嵐軍淳化五年拜永安軍節度使遼兵入御卿大敗之於子河汊歲餘被病遼諜知之率衆來侵御卿力疾出戰其母使人召歸御卿曰世受國恩死軍中分也翊日卒贈侍中子惟昌為洛苑使知州事破言泥族拔黃寨纍拜興州刺史惟信與趙保吉戰殁於陳惟忠最知兵纍官雲麾將軍卒惟忠子繼閔為西京作坊使嗣知府州畢士安字仁叟雲中人事繼母以孝聞乾德四年舉進士太平興國初吳越錢俶納土選知臺州言錢氏張侈賦數今宜用舊籍詔從之纍遷翰林侍讀學士景德初遼人謀入境士安陳選將餉兵理財之䇿真宗嘉納與寇準同拜平章事遼引兵大掠與準條所備禦狀又合議請幸澶淵定和議未幾趙德明亦內附中外晏安卒贈太傅中書令諡文簡士安飭躬慎行有古人風仕至輔相無田園居第沒未終喪家用已絀真宗感嘆賜白金五千兩折繼祖字應之繼閔弟嗣知府州纍轉成州團練使韓絳城羅兀繼祖深入敵帳降部落户八百加解州防禦使有子當襲請以授兄子克柔詔從之弟繼世延州東路巡檢嵬名山內附繼世以騎步萬軍懷安寨分名山之衆萬五千戶居大理河夏人來攻再戰皆捷録功領忠州刺史説韓絳城囉兀以撫橫山因畫取河南之䇿絳以為然以果州團練使卒折克行字遵道繼閔子夏人寇環慶克行與戰於葭蘆州斬級四百降戶千馬畜萬計諸老將矍然曰真折太尉子也擢知府州討夏國每出必勝夏人畏之益左廂兵專以當折氏城葭蘆築八寨皆用克行策在邊三十年善拊士卒戰功最多羌人呼為折家父官至秦州觀察使折可適克行從子少隸延州屢與夏人戰皆敗之東兵久不得食千人成聚籍於軍門或欲掩殺以為功可適曰此以飢而繞耳非叛也單馬出詰之皆回面流涕謝再生各遣歸夏人入寇大破之於尾丁磑又分騎據西山轉戰至高嶺間道設伏邀其歸路敵赴崖澗死者如積論前後功至成州團練使夏人有桀黠用事者哲宗詔可適密圖之可適遣兵夜襲俘其族屬三千人遂取天都山以其地為西安州纍拜懷康軍節度使遼邢抱朴應州人保寧初纍官翰林學士加禮部尚書統和四年山西州縣被兵命抱朴鎮撫之民始安十年拜參知政事按察諸道守令能否而黜陟之大協人望嘗兩決南京滯獄人無冤者卒贈侍中陳昭衮雲州人勇而善射纍官敦睦宫太保兼掌圍場事開泰五年秋大獵帝射虎馬馳太速矢不及發虎怒奮將犯蹕左右辟易昭衮捨馬捉虎兩耳騎之虎軼山終不墮地伺便拔佩刀殺之輦至上前即日設燕悉以席上金銀器賜之特加節鉞遷圍場都太師命張儉吕德懋賦以美之厯西南面招討都監卒金蘇保衡字宗尹天成人天會中賜進士出身補太子洗馬纍官工部尚書大定二年伐宋保衡行户部於關中兼糾察黜守令不法者十餘人邠守傅慎微忤用事者被讒搆下獄且死保衡力救之得免入為太常卿遷禮部尚書拜參知政事進右丞稱賢執政康元弼字輔之雲中人正隆三年進士由汝陽簿纍遷大理丞大定二十七年河決曹濮間朝廷遣元弼往視相其地如盎而城在盎中請改築於北原曹人賴焉官至南京路轉運使劉從益字雲卿渾源人登大安元年進士第纍官監察御史坐與當路辨曲直得罪去起為葉縣令有古良吏風未幾被召百姓詣尚書省乞留不聽人授應奉翰林文字卒從益精於經學為文章長於詩子祁字景叔太學生甚有文名金末喪亂作歸潛志以紀其事修金史多採用焉雷淵字希顔一字季默渾源人入太學讀書後從李之純遊遂知名登至寧元年詞賦進士甲科纍拜監察御史彈劾不避權貴出巡郡邑所至有威譽官至翰林學士卒高汝礪字巖夫金城人登大定進士第涖官有能聲擢左諌議大夫時遇奏事臺臣亦令回避汝礪言國家置諌臣蓋欲周知時政以參得失豈可疏遠乞自今有司奏事諌臣得預聞從之纍拜户部尚書時鈔法不能流轉汝礪隨事上言多所更定安兵息民帝從之卒贈大司徒諡忠亮雷膺字彥正渾源人淵之子少孤篤學事母以孝聞至元二年拜監察御史首以正君心正朝廷百官為言又斥聚斂之臣不宜作相纍厯外任皆著威惠徴拜集賢學士成宗即位召諸故老詢國政膺為稱首多所建白卒諡文穆明李彝渾源人永樂舉人授監察御史以剛直有聲臺中後厯江西按察使治獄明恕遷浙江布政使益厲素節出納錙銖必謹尋卒於官郭頤應州人永樂中由知縣擢監察御史巡按京畿文皇北伐抗疏力爭後復屢疏言事朝右咸側目遂乞歸孫逢吉字餘慶渾源人正統舉人授延長知縣有賢聲擢御史巡鹽長蘆監軍榆林所至風紀肅然後復按四川厯陜西僉事纍遷左布政使川陵之民皆被其澤引疾歸石瑁字信之應州人數歲以孝友稱宣德進士正統初授禮科給事中克舉其職擢金華知府除邑患賑流民甚有善政纍遷禮部尚書靖共於位朝望益孚王尚文廣靈人正統進士官户部主事額森入塞英宗親征尚文以督餉從土木之難踵駕號哭遂遇害郭石山陰人嘉靖舉人知滕縣多善政纍遷整飭延綏道駐偷林守禦有功獲賜金幣丁艱歸補山東按察僉事尋致仕石性沉靜居官以清謹著名郭民敬山陰人嘉靖進士知壽光縣以治行第一擢御史按南畿歲歉奏蠲租賦數十葛緡復按四川過里值邊警時山陰土城難守民敬為留集丁壯城守甚力邑人賴之至四川墨吏望風解綬去性至孝家資分給諸弟姪一無所取喬景華山陰人嘉靖中扶母避亂父稍後見執景華復奔救翼之右臂受刃更易左臂父子仆地賊感其孝而去樊深大同人嘉靖中為通政使陳禦寇七事中言仇鸞養寇要功上方眷鸞立斥為民隆慶初復官尋遷刑部右侍郎齊康劾徐階深劾康并詆高拱時登極詔赦死罪以下而流徙巳至配者所司拘律令不遣深言誅死猶赦而此反不及非所以廣皇仁詔從其議旋進左侍郎罷歸卒王汝濂懷仁人隆慶進士以母老引疾歸養奉侍左右如嬰兒出必稟命母殁哀毁盡禮人稱其孝王家屏字忠伯山陰人隆慶進士由庶吉士厯修撰充日講官敷陳剴摯帝嘗斂容而受稱為端士張居正寢疾同官奔走祈禱家屏獨不往纍擢吏部左侍郎兼東閣大學士每議事秉正持法不激不隨進禮部尚書嘗以久旱乞罷指時事甚切不報與申時行等懇請册立疏至再及為首捕請益力李獻可以請豫教被黜家屏封還御批纍疏爭之帝不悅遂乞歸家屏端嚴忠直深識有謀秉國止半載卒贈少保諡文端熹宗立再贈太保李懷信大同人由世蔭厯定邊副總兵勇敢有謀寇入輒敗擢甘肅總兵官松山多擾連擊敗之邊人恃以無恐萬厯末遼東急詔充援勦總兵官有戰守功尋引疾去天啓中追録邊功進左都督王從義大同人萬厯進士授評事多所平反厯郎中升東昌知府以善政聞秩滿擢副使備兵壽張與平妖賊徐鴻儒全活脅從數萬人纍遷副都御史巡撫山東安集流移除大猾不遺餘力尋以協餉功進戶部右侍郎引疾歸居鄉謙退儉約母喪哀毁欲絶曹文詔大同人崇禎三年以功擢延綏東路副總兵討賊王嘉應於河曲降其衆升臨洮總兵官擊斬羣賊關中略平賊遂流入山西六年文詔至山西屢戰皆捷餘賊多流入河北移師討平之尋調大同為援勦總兵復由河南勦賊商州大捷於金嶺川尋以三千人遇賊於湫頭鎮轉鬬不支自刎死贈太子太保左都督立祠祀之文詔天性忠勇為明季良將第一其死也賊中為之相慶弟文耀從兄征討數有功河曲之戰斬獲多後擊賊欣州戰死城下詔豫贈恤本朝乾隆四十一年賜文詔諡忠果曹變蛟文詔從子幼從文詔征討以勇敢知名賊聞大小曹將軍來皆怖懾崇禎十年厯官臨洮總兵降小紅狼一部餘賊入蜀繼入秦變蛟邀擊破之與李自成轉戰千餘里賊黨多降惟自成東走復窮追之自成妻女盡失僅以七人逃録功進左都督後從洪承疇援松山被執死之贈太子太保本朝乾隆四十一年賜諡忠烈焦埏大同人祖澤父承勳皆總兵官著勞績埏以世將子喜兵法精騎射以功纍官大同副總兵崇禎十五年奉命東援力戰不屈死事聞贈恤本朝乾隆四十一年賜諡烈愍張爾墊大同人事母以孝稱鄉里爭訟率片言而決人服其公以功厯官守備崇禎末都城戒嚴戰死盧溝橋事聞贈恤本朝乾隆四十一年賜諡烈愍李若葵大同人崇禎末聞賊陷都城與兄象葵弟心葵從子柱周並婦女五人俱縊死本朝李國英字培之大同人少倜儻有才略從肅王收四川擢巡撫以功晉尚書總督川陜時全蜀未定再統師入川大興屯田與士卒同甘苦日饗士卒遂平巴巫逋寇晉太子太保以勞疾卒官鮑承先應州人負大略嘗上書皇帝請行仁除暴世祖章召見賜馬及幣授內祕書殿大學士與定勦撫方略承先事繼母孝糲食布衣第舍僅蔽風雨居鄊退讓又嘗修府縣學創桑乾河石橋鄉里德之韓一蘇廣靈人與弟一歐事父廷和以孝行著聞順治初闖賊敗歸所過剽掠至南和縳廷和去二子奔赴賊營並求代賊挺刃交下一歐立麋爛一蘇亦垂斃猶祈免其父不少止賊黨有義之者因釋其父賊退一蘇獲蘇事其父以壽終王逢泰大同人幼時父之雲攜其兄出遊獨與母楊居薑瓖之亂母死井中殯訖徒步訪父兄遇於金陵奉歸父年八十終既葬逢泰詣墓輒攀柏哀號沒齒不衰于懷漢懷仁人事母孝被旌康熙甲辰蠲粟賑飢全活甚衆周於德廣靈人父之屏薑瓖之亂縣令城守徴鄉勇之屏督衆往於德與弟於道俱請從賊猝至兄弟奮長矛大呼逐賊旋陷入賊壘被執不屈死又之屏妻弟李蓂亦同往於德兄弟陷賊馳救之亦被殺吳之琳陽高人以孝友旌門撫從子二十年無間言有徐某寄以金徐死而其子不知如數還之穆生輝天鎮人驍勇有知略起行間洊厯副將所向有功總兵鄖陽屢以功世襲拖沙喇哈畨後以討賊戰死張光璧大同人天性淳篤事親盡孝乾隆五年旌任舉大同人乾隆七年以武進士任固原城守營參將值兵變手刃亂兵解散賊黨捍禦全城十三年調赴金川洊升總兵進攻昔嶺石城被槍陳亡加贈都督同知賜祭葬諡勇烈入祀昭忠祠張朝龍大同人寄籍貴州乾隆三十七年由馬兵隨征金川奮奪碉寨洊升遊擊五十二年隨征臺灣屢立戰功五十三年臺灣平圖形球江戰殁紫光閣復隨大兵進擊市賜諡壯果入祀昭忠祠田佳富懷仁人以孝義稱乾隆三十九年旌王萬邦陽高人乾隆二十年由侍衛任涼州營遊擊值西陲用兵萬邦勦賊有功洊升總兵三十六年赴金川身先士卒奮奪碉卡後以力疾督戰負傷卒賜祭葬入祀昭忠祠流寓南北朝魏江疆涼州人太延五年涼州平內徙代京上書三十餘法各有體例又獻經史諸子千餘卷拜中書博士宋朱辨婺源人建炎初假吉州團練使使金通問兩宫至雲中見宗翰邀説甚切宗翰不聽使就館守之以兵及正使王倫歸辨請留印為信倫解授辨受而懷之卧起與俱金人迫辨仕劉豫辨不屈紹興中和議成乃歸所著有聘遊集洪皓番陽人建炎三年假禮部尚書為金通問使二帝遷居五國城皓在雲中密遣人奏書以桃梨粟麵獻二帝始知帝即位皓聞祐陵訃北向泣血旦夕臨諱日操文以祭聞者皆揮涕金人迫仕劉豫皓不從流遞冷山元元好問秀容人以詩文名世時遊渾源之封龍山與李冶張得輝結吟社稱龍山三老劉秉忠邢州人嘗為僧遊雲中留居南堂寺世祖在潛邸海雲禪師被召過雲中聞其博學多才藝邀與俱行既入見應對稱旨世祖大愛之遂留藩邸明沈良仁和人刑部主事洪武三十二年謫戍大同應州以春秋授徒石瑁輩皆出其門列女南北朝魏和跋妻劉氏代人道武北狩豺山收跋刑之路側劉自殺以從叔孫俊妻桓氏代人泰常元年俊年二十八卒明元命桓氏曰夫生既共榮殁宜同穴能殉葬者可任意桓氏乃縊遂合葬焉陸昕之妻元氏獻文帝常山公主奉姑有孝稱神龜初與穆氏琅邪長公主並為女侍中性不妒忌以昕之無子為納妾媵公主有三女無男以昕之從兄希道第四孑子彰為後子彰事公主盡禮丞相高陽王雍以為過於自生陸卬母元氏子彰妻咸陽王禧女上庸公主初封藍田高明婦人也甚有志操卬昆季六人並主所出故邢邵常謂人曰藍田生玉固不虛矣主教訓諸子皆以義方雖創巨痛深出於天性然動依禮度亦母氏之訓焉蕭寶夤妻元氏寶夤歸魏尚南陽長公主主有婦德敬事不替寶夤每入室公主必立以侍相遇如賓自非太地疾篤未嘗歸休蕭贊妻元氏贊奔魏尚壽陽公主出為齊州刺史爾朱兆入洛為城人趙洛周所逐公主被録送京爾朱世隆欲相陵逼公主守操被害遼邢抱朴母陳氏應州人抱朴與弟抱質受經於母皆以儒術顯抱朴官至南院樞密使抱質至侍中時人榮之元雷膺母侯氏渾源人膺生七歲而孤金末母挈膺北歸渾源艱險備嘗織袵為業課膺讀書膺遂以文學稱劉仲亨妻田氏渾源人仲亨死田年二十五投繯死喪側至正間旌表宋堅童妻班氏大同人堅童死班不食數日死特詔表揚朱淑信山陰人少寡不嫁一女妙淨糿哭父雙目失明士人王士貴重其李乃求娶焉張思孝妻華氏大同人元季為貊高兵所執以不辱見殺其婦劉氏僵壓姑尸大罵不已兵併殺之後檢其尸婦姑之手猶相持不捨明高清妻王氏大同前衛人少寡姑病目雙瞽王氏以舌舐之兩目復明舅姑卒號泣毁形士夫并稱之王謨妻郭氏山陰人嘉靖間察哈爾部入境郭匿南山寇索得驅之郭大罵投崖死又張天敘妻賀氏有女年十五俱被掠賀慮女見辱潛取刀與女俱自殺察哈爾部舊作插部今改正朱充妻郝氏大同人孀姑曹氏性嚴重好潔有心疾展轉需人郝須臾不離者垂四十年跪伏進膳積久手足幾不能屈伸曹氏曰吾死何以報汝願汝有婦亦以事我者事汝爾其後婦許氏事郝盡孝果如曹氏言石銘妻馬氏銘大同人鹺于廣陵娶馬氏生子二方在抱銘客死長蘆族人利其遺資令馬他適馬涕泣不從族人舁柩返不與馬俱馬乃治裝攜二孤厯數千里抵夫家守節以死朱充妻石氏大同人年二十一夫亡家貧勸嫁者踵至石矢死撫孤孤成甫娶未幾子婦相繼夭又撫孫芝田成立被旌米貞妻周氏山隂人年十九夫亡里人爭欲娶之周毁容守節厯四十餘年卒又王洊初妻劉氏少寡父母欲嫁之齧指矢志撫孤成立先後被旌宋定妻劉氏大同人定為陜西都司亡劉誓守節有鄰郡宦族謀娶之劉峻拒不從聞闖賊陷太原絶粒七日而死何大本妻武氏大同人闖賊陷城大本遇害武聞同子婦寧氏投繯死又王璇繼妻方氏少寡聞城陷亦自刎死王爾揚妻朱氏懷仁人崇禎中以賢孝旌闖賊之變縊死楊儒女應州人年十四闖賊陷城隨母匿木塔復板內賊索得之掠其母去女不從墜地死宋偉妻邊氏山陰人偉為大同總兵官闖賊入城據其室殺偉邊不為屈厲聲大罵賊加以炮烙兩乳焦爛罵猶不已賊稱其烈而止子婦朱氏被執紿賊往取藏金自縊死任朝陽妻郭氏廣靈人年二十餘夫亡有遺腹每夕祝生男以延夫祀已果得男撫孤守節姑愛次子利其資逼令改適郭誓死不從姑數以非禮虐之郭事姑彌謹終無怨言年九十餘卒王永卿妻李氏靈邱人少寡子幼家貧就食於叔祖王學家學亦貧不能養與族姓謀嫁之李揮刀斷髮族姓驚愧去撫子完節以終本朝何士璋妻焦氏大同人事舅姑至孝姑抱沉疴不能動履焦負之卧起積勞成疾至嘔血侍姑不少輟姑歿毁瘠踰常翁年幾八旬事之一如其姑歲時祭享必以誠敬士民咸稱其孝劉德溥妻魏氏大同司馬魏某之女許字廣靈劉令之孫德溥魏遷官滇南劉卒廣靈德溥以官逋繫獄魏聞言及婚事有沮色女言於母曰貧富遠近命也魏嘉其志送完婚荆布自甘克修婦道雖在患難中敬禮如賔女讀書能詩有氷鑑閣閨中三十詠王某妻劉氏懷仁人家貧有老姑夫不能養婦勩薪磑延日會大飢有豪賈貨買飢人子女劉謂夫曰旦暮將俱死賈購我多金誠全此老姑弱子可無死矣君送我郊外金既得妾自為身謀如其言之郊外賈防有他變令其夫送出界四日舍於天城賈乃逐其夫出外舍賈盛服入婦詭語醉之乃引簪刺喉而死賈驚去道路傳為飢婦奇節云王之雲妻楊氏應州人薑瓖之亂之雲與長子他出楊謂仲季二子曰吾不貪生致辱兒輩無偕死以絶王祀躍入井死季子泣從之女已適人間母死亦自經仲子訪父數千里奉歸孝養郭隆繼妻許氏山陰人年二十夫亡族人利其産百計撓之外禦侮內撫孤二十餘年始定子二俱成立壽七十餘王繩祖妻謝氏陽高人少寡子七歲家貧事姑不遺餘力每奉甘旨紿子出不令分姑食姑性嚴少不遂輒詬罵至批頰齧臂終無怨色楊月斗妻梁氏大同人守正被戕康熙年間旌谷發妻王氏天鎮人守正被戕康熙年間旌孫汝葺妻段氏大同人義烈可風同縣烈婦王孝妻相氏節婦宋芝池妻魏氏喬佳選妻韓氏彭國瓚妻劉氏聶顯妻龔氏徐昌妻李氏王通賢妻李氏陳慧妻王氏王志選妻汪氏項貴妻高氏郭輔妻劉氏王有監妻常氏康孔昭妻吕氏董國璽妻袁氏楊可範妻張氏王通妻趙氏宋顯榮妻郝氏馬秉慧妻朱氏張維屏妻徐氏張秉鉞妻吳氏曹應貴妻薛氏由泰妻朱氏王希禹妻馬氏劉鳳彩妻柴氏鄭模妻馬氏楊宗仁妻施氏賀尚本妻于氏韓宗妻張氏楊士俊妻姚氏靳天寵妻劉氏王威妻杜氏田英妻朱氏王振綱妻杜氏張登第妻董氏郭進朝妻趙氏師鎮璽妻姚氏孫登鯉妻劉氏曹世家妻郭氏喬起雲妻嶽氏李潤妻王氏聶文光妻段氏高嵩妻劉氏李轃妻薛氏俱乾隆年間旌張宗第妻李氏豐鎮廳人守正捐軀同廳烈女李根女李氏並乾隆年間旌武令德妻何氏懷仁人夫亡守節同縣節婦王績妻郭氏王其正妻王氏郝贄妻王氏馬榮妻趙氏管應閣妻夏氏武登科妻李氏張文運妻楊氏馬國俊妻周氏王仁鄰妻紀氏張漢卿妻梁氏劉金厫妻張氏刁成妻管氏刁士光妻彭氏孫有功妻武氏王法妻李氏閻士建妻李氏王定昌妻李氏楊換妻趙氏李棠妻石氏王治妻閻氏武致中妻朱氏王深妻郝氏王鄰妻趙氏俱乾隆年間旌張珆妻侯氏渾源人夫亡守節與同州節婦薑講之妻王氏任慧妻吕氏白充琳妻張氏李周鼎妻楊氏馬苗妻張氏白維商妻李氏田發妻郭氏胡宗義妻白氏白智妻郭氏李深源妻張氏白思誠妻魏氏姚時名妻于氏孫鸐妻侯氏郭制文妻任氏熊秉鋭妻白氏王用極妻張氏俱乾隆年間旌鄧廷彥妻趙氏陽高人守正被戕同縣節婦楊秀妻王氏俱乾隆年間旌王三爵妻溫氏天鎮人夫亡守節同縣節婦曹宏妻郭氏李澳妻高氏俱乾隆年間旌梁遇春妻曹氏廣靈人夫亡守節同縣節婦曾傳鈞妻王氏王賜祿妻蘇氏李維明妻黃氏俱乾隆年間旌郝周妻王氏靈邱人守正捐軀同縣烈婦溫天啓妻張氏節婦李鳳翺妻張氏馬建標妻劉氏張良弼妻李氏白鳳妻李氏張廣妻孫氏王在國妻燕氏嶽諄然妻王氏張健妻王氏俱乾隆年間旌王天相妻楊氏大同人夫亡守節同縣節婦徐俊妻趙氏劉琮妻趙氏王世魁妻楊氏師鎮威妻李氏張德妻潘氏王汝為妻汪氏劉漢章妻韓氏李積馨妻刁氏同琦妻張氏同均妻劉氏袁伏謄妻鄭氏郭堂妻張氏李爾惠妻周氏勒嘉修妻羅氏王自剛妻張氏張師仲妻閻氏劉登高妻趙氏劉育功妻賀氏彭鳳舉妻劉氏吳日暢妻郭氏劉文彪妻周氏郝定祿妻王氏戴沛霖妻孟氏戴天錫妻程氏馬凌妻馮氏俱嘉慶年間旌高劉氏豐鎮廳人守正捐軀同廳烈婦淮趙氏並嘉慶年間旌楊泰妻張氏懷仁人守正捐軀同縣烈婦郭宗植妻馮