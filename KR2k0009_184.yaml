body:
  text: 元江直隸州在雲南省治西南七百九十里東西距三百里南北距二千一百里東至臨安府石屏州界一百里西至鎮沅州界二百里南至車里宣慰司界一千六百里北至楚雄府南安州界五百里東南至交趾老撾界一千三百四十里西南至普洱府界四百七十里東北至臨安府嶍峨縣界五百里西北至鎮沅州界四百里本州境東西距二百十里南北距二百五十五里東至臨安府石屏州界一百三十五里西至普洱府界七十五里南至普洱府他郎界一百二十五里北至新平縣界一百三十里自州治至京師八千九百九十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢梁州荒裔漢益州郡徼外地唐時蒙氏以其地屬銀生節度置威逺瞼明統志南詔徙白蠻蘇張周段等十姓戍之又開威逺等處置威逺瞼宋時和泥蠻侵據其地明統志宋時儂智高之黨竄於此和泥又開羅槃甸居之後為㱔麽徒蠻阿僰諸部所有元初内附尋復叛至元中遥立元江萬户府以覊縻之後於威逺更置元江路隸雲南行省明洪武十五年改為元江府永樂四年改為元江軍民府隸雲南布政使司本朝順治十八年改曰元江府屬雲南省乾隆三十五年改直隸州領縣一新平縣在州北二百里東西距四百六十里南北距五百里東至臨安府嶍峨縣界九十里西至鎮沅州恩樂縣界三百七十里南至本州界二百里北至楚雄府南安州界三百里東南至臨安府石屏州界一百五十里西南至鎮沅州界九十六里東北至嶍峨縣界五十里西北至恩樂縣界五百里本嶍峨部地元初為嶍峨千户地至元中設平甸縣屬嶍峨州後改平甸鄉仍隸嶍峨縣明為丁苴白蠻夷所據萬厯十九年討平之置新平縣屬臨安府本朝因之雍正十年改屬元江府乾隆三十五年屬元江州形勢東有禮社江西瞰瀾滄水北據自樂山南距交趾界明統志三江合繞諸緬遥牽崀峩為河馬籠列嶂府志風俗地多瘴癘四時皆熱草木不凋一歲再收性懦氣柔惟酋長畜使府志僰人能居卑濕蒲蠻好居髙山志勝城池元江州城周九里門四三面瀕河舊土城元大德間築本朝順治十八年雍正七年十三年累修新平縣城周一里有竒門四環牆為濠明萬厯十九年築土牆於縣西五里崇禎七年遷今地為石城本朝康熙三十七年接築新舊二城使相連屬雍正十年又拓新城直過舊城之東學校元江州學在州治東北舊為府學寄臨安建水州學本朝順治十七年遷建康熙五十二年雍正元年累修乾隆三十五年改為州學入學額數十五名新平縣學在縣治東北舊寄府學後附嶍峨縣學本朝康熙三十一年遷建雍正九年重修入學額數八名北池書院在州治北眀嘉靖中建户口向因蠻民雜處未經編丁田賦田地三百六十一頃五十六畝三分有竒夷田九十段額徴地丁正雜銀四千五百三十五兩八錢五分八釐米四千五百二十石一斗三升四合五勺山川玉臺山在州城東五里府志舊名羅槃山凡二十五峯懸崖絶壁險阨難登蒼翠如玉望之若臺路通山在州城東二十五里明統志舊名馬籠山北瞰禮社江髙峯千仞虧蔽日月通志中有羊腸一線路出臨安天馬山在州城東南十五里府志秀如華峯與嵯峩山相對峙學宫前嵯峩山在州城南二十里中峯嵯峩狀如卓旗寳山在州城西二十里圎如螺髻尖若插簪俗傳昔有蠻酋藏寳於山之麓故名因逺山在州城西四十里山下有泉為仲夷溪分流溉田為仲夷渠府志在城西北七十里泉流瀑布下多村落莽支山在州城西北相近又有茶山二山接普洱界俱産茶九龍山在州城西北三百里産鑛名魚鳬場車里司治在山之後竒山在州城北三十里舊名龍爪山上有涵春臺仙人洞怪竒萬狀自樂山在州城東北十里明統志作目樂山懸崖峭壁凡二十峯狀若崆峒蒙氏封為南嶽今名棲霞山按蒙氏封蒙樂山為南嶽明統志於目樂山亦云蒙氏封為南嶽葢自樂山即蒙樂山訛蒙為目又訛目為自也魯奎山􅏅新平縣東南六十里險僻高峻連石屏元江諸處舊為野冦之數今皆效順金營山在新平縣南二十里為丁苴故地二龍山在新平縣南長峯兩分矯如游龍團山居其中鎮元山在新平縣南五十里團山在新平縣西南六里形如滿月倚樓山在新平縣西七十里崇巖峻嶺若樓閣憑虚五桂山在新平縣北里許頂有五峯水簾洞在新平縣西象山之半水自洞門流出垂若珠簾大江即摩沙勒江也一名馬龍江亦名鹿滄江自楚雄府舊􅑇嘉縣流經州境為禮社江之上源臨安府志馬籠諸山在江之右迤阻諸山在江之左羣山夾江其縊如峽通志明洪武中平緬叛結寨於馬籠他郎甸之摩沙勒沐英遣將擊却之元江在州城東南即禮社江也通志源自白崖江合瀾滄江流繞州城東南經納樓蒙自南達於海自新平縣之三江口流入沿州治之南繞東南入臨安府納樓司界㟍峨河在州城西四十里河南村源出州西北㟍峨山東南流入禮社江平甸河在新平縣東十里衆流所滙大羅河在新平縣東五十里水勢􅍅湧曡水河在新平縣南半里源髙數丈自上流下澎湃潺湲霞氣上蒸流入大江襟帶河在新平縣南自二龍山口出㑹入平甸河温玉泉在州城西北十五里名勝志石間迸出其色清碧其沸如湯洪本泉在新平縣西一里邑城内外資其流灌瑞木井在新平縣東一里許其味甘冽源出木下其木一本三幹花葉皆異亦竒品也古蹟奉化故州在城西一百一十里本名羅槃甸元為羅槃部元史地里志古西南夷地阿僰諸部蠻自昔據之憲宗四年内附七年復叛率諸部築城以拒命至元十三年遥立元江府以覊縻之二十五年命雲南王討平之割羅槃等十二部於威逺立元江路明統志元江府附郭有因逺羅必甸長官司舊名羅槃甸屬元江路洪武初置長官司通志因逺羅必甸後改為奉化州舊亦以土官子孫分掌本朝平滇那嵩負固討平之順治十八年并為元江府關隘猛甸關在州境又有瓦阨關杉木關定南關舊皆置戌結白土廵司在州境府志土廵司方從化舊係魯魁山土目本朝康熙二十七年總督范承勲委官招撫從此向化題授世職又有水摩村廵司在州城東北六十五里舊有土官廵司戍守了味土廵司在新平縣境舊係魯魁山土目至普為善於本朝康熙二十七年歸附授土廵司世襲舊又有摩沙勒廵司南峝廵司皆土官世襲今俱省阿怒甸在新平縣廢新化州東北其相近有喇烏得箐為縣境最要地因逺驛在州城西因逺山下為往來必經之地舊有知事一員乾隆三十五年改因逺廵檢津梁南安橋在州城南門外又城南徳化鄉有石橋西城橋在州城西十五里混龍橋在州城西二十五里跨崀峩河長三丈􅦎丈餘藤橋在州城西一百里康濟橋在州城北門外義興橋在州城北本朝康熙十年建祠廟忠義祠在新平縣明騰衝叅將鄧子龍建祀陣亡將士昭忠祠在州治城隍廟東本朝嘉慶八年建寺觀甘露寺在州城東五里玉臺山本朝康熙九年建妙蓮寺在州城西南一百三十里元時建名宦明汪輔雲南後衛指揮同知嘉靖間署元江知府政務便民有控訴至者不加鞭朴訓以禮讓遣之至於軍衆禦以嚴明毫不敢犯李先芬萬厯間任新平知縣始建縣治築鑿城池夷民咸德之秦元穂廣東人崇禎間任新平知縣改遷縣治建築磚城民祠祀之本朝沈洪浙江人任新平縣典史雍正十年署揚武壩廵檢適猓賊叛洪竭力堵禦死之丁珏浙江人以廵檢管理青龍厰務猓賊刦掠厰地珏不屈死之王昌寕夏人千總擊猓賊於喇博坡殁於陣汪自貴華陽人把總擊猓賊於阿者奮勇赴敵死之洪先開化人把總與賊戰於户東山殁於陣以上五人事聞贈廕有差人物元刀代元江人為本路安撫使大德五年從征八百有功陞本路總管智勇過人部夷畏服時洞蛟為孽代挾利劔入洞頃之水盡赤代與蛟俱死沿河之民始得耕種嵗嵗祀之明施大節元江人永樂中舉人厯知交州横州慈愛㢘明宣徳二年遇賊警大節繕甲兵聚糧餉為守禦計及賊勢不可遏城陷力屈而死馬雲衢字賡宇元江人天啟間由教諭遷知天河縣有廉能聲邑中峒番肆出刦掠雲衢設法剿諭皆感畏不敢犯去任歸里行李蕭然本朝曹一彬新平人康熙中土酋祿益反園新平執一彬令誘開城一彬入率民兵固守賊攻不克城得全李其紀元江人有孝行祿益之變其紀負母逃一日夜不休得免父殁廬墓三年有虎伏兔馴之應蔣應堂元江卒伍刲股療母母殁刻木為像祀之如生康天錫元江人為本營把總雍正十年猓賊叛戰於他郎先登死之事聞贈廕張文秀新平人新嶍營把總分防揚武壩猓賊至力屈死之賜贈廕馬匡周元江人性孝友工書畫任廣南守備乾隆六十年出師黔楚屢著戰功後以追賊中標亡猶持㦸不僵有㒓卒負回予廕襲入祀昭忠祠流寓明周官江西人能詩工草書性剛直敢言明末棄官逰滇從臨安入元江一時士人多所請正後卒於郡本朝鄧魁春撫州人號梅庵學問綜博順治初至元江教授生徒多所成就列女明馬宗範妻白氏元江人年少夫亡守節五十餘年同郡李儒妻楊氏夫卒欲以身殉姑知有遺腹曲諭之乃拮据襄事生子聖希教之成名又何源深妻曾氏楊得先妻馬氏王諍妻黄氏均苦節終身何源清妻李氏元江人夫亡服毒死楊氏女名曩察元江人母孀居無子女矢志養母誓不適人勢家欲强娶之以死拒得免母殁獨處年至八十歲孫愈發妻雷氏新平人夫亡守節與同縣黄玠妻普氏均於崇禎間旌本朝孫廷紀妻張氏新平人年少夫亡撫孤成名與同縣黄土麟妻普氏均康熙間旌艾張顯妻楊氏元江人猓賊之變氏挈家避入甘槖箐聞夫被殺夜囘家與媳及孫媳陶氏女孫皆自縊同時陳萬言妻車氏媳鄧氏女孫一又艾國用妻陶氏艾國樑妻林氏艾承顯妻曽氏媳朱氏艾竒二女姚春先母何氏妻艾氏李從龍母馬氏馬氏二女丁一鵬姪女均不辱死雍正間旌王德逺妻張氏新平人夫為普威總兵鎮沅夷叛夫殁於陣氏抱兒投火死雍正間旌楊守恕妻袁氏新平人猓夷叛氏與舒鳯翮女舒鵬翮女均不辱而死丁鈺妻吳氏鈺浙江人以廵檢管青龍厰事務猓逆叛氏被擄不辱見殺雍正間旌何昌祖妻楊氏元江人夫亡守節與同州吳星耀妻劉氏吳㑹璘妻胡氏董繼世妻張氏均乾隆間旌魏正儒妻蘇氏新平人夫亡守節乾隆間旌温瑞暘妻何氏元江人夫亡守節與同州董惟璽妻張氏段鳴珂妻梁氏陳有基妻李氏髙璋妻李氏李文沛妻陳氏段鳴玉妻蔣氏均嘉慶間旌王曙妻朱氏新平人夫亡守節與同縣任佃妻盧氏郭永新妻李氏陳樹道妻楊氏黄繼妻陶氏均嘉慶間旌仙釋明月光道人正徳間雲遊至郡結廬金鰲山麓兀坐不言日啖菜根少許如是數年忽一日不知所在人往覓之見壁間書一絶句而去陳羽士嘉靖間棲東山目光如電郡嘗旱延至城中甘雨随注居二十年化去土産檳榔一名仁頻樹髙數丈旁無附枝正月作居四月開花每房百餘實蘆子産山谷中夏花秋實蔞葉家園遍種葉大如掌纍藤於樹無花無果冬夏長青採葉合檳榔食之味甘美降真香茘枝僅數本肉薄味酸蜜多羅樹髙數丈實從幹生大如冬瓜色似楊梅抹猛果形如木瓜夏月熟味酸蘇木鱗蛇膽有黄黒二種長丈餘具四足能食鹿春夏在山秋冬在水土人取食之其膽治牙疼解諸毒黄者更佳白鷴矮鷄俗名擺夷雞足短而鳴長黄魚金色味羙孔雀大清一統志鎮沅直隸州在雲南省治西南一千二百里東西距三百四十里南北距二百九十里東至元江州界一百里西至順寕府雲州界二百四十里南至普洱府威遠界二百三十里北至景東廳界六十里東南至普洱府界八十里西