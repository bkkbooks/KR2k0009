仕值沙賊陷城死難本朝乾隆四十一年賜諡節愍張烈蒙化人衞千户沙賊陷城衆皆奔潰烈獨與巷戰遂死於難馬逸蒙化人萬厯舉人值猛廷瑞搆亂募義勇數百隨師出征招撫甚衆當事上其功欲授以世職辭不受周二南字汝為蒙化人天啟選貢以長沙通判升岳州府因士民遮留以新秩遷長沙張獻忠之亂率師殺賊力屈而死贈太僕卿本朝乾隆四十一年賜諡節愍宣廷式蒙化人崇禎舉人任左江道弟廷賓以拔貢任興化府推官皆有政聲鼎革後同祝髪為僧左廷臯字對楊蒙化人崇禎進士沙賊破蒙化死難本朝乾隆四十一年予入忠義祠陳懷瑾字輯瑞蒙化庠生沙賊圍城登陴守禦城破𬒳執不屈死本朝乾隆四十一年予入忠義祠彭萬昌蒙化庠生事母克孝蒙化被兵時奉母避於南山賊追及箭射其母昌以身翼之賊感釋焉負逃免難陳佐才蒙化人曽為故黔國公部將自孫可望入滇後隱居不仕鑿石為棺銘其上有明末孤臣死不改節之句詩多血性語不事推敲自有奇傑之氣本朝朱自得蒙化人年十三順治三年沙賊殺其父萬祚自得抱父屍罵賊甚厲遂遇害同郡歲貢宣大政諸生孫繩張藻皆以罵賊而死黄圖隆蒙化諸生賊擄其弟逃去又繫其父欲殺之圖隆跪求願以死代賊釋其父繫圖隆於西門後竟殺之范悦蒙化人性篤孝親没廬墓白烏羣集其側吳三桂反强官之拒不往教授以終同郡熊兆鎰馬㕘李北有俱康熙初舉人不屈於逆藩事平各授以官危斯泰蒙化人父光遠覯疾斯泰時年十二衣不解帶晝夜侍側父死一慟而絶李士奇蒙化貢生制行端方康熙間吳逆脅之以官不受流寓明王汝敬字敬夫山西代郡人隨父任蒙化寓此敎授生徒崇尚四禮俗一變楊慎字用修新都人嘉靖初議禮謫戍遊寓蒙化之冷泉菴士多從之曹學字行之四川人嘉靖初客遊滇中寓居蒙化能詩工畫性嗜酒日置錢與壺於驢背遣入肆人皆知爲曹之驢也居蒙化數年卒他日驢經其墓撞死墓側列女明趙宣奴妻楊氏蒙化人宣奴早殁年幼矢志孝事翁姑有諷之改嫁者舉刃自誓撫子忠成立景泰六年受旌左剛妻張氏剛世襲蒙化土知府早殁氏勵志如一二子相繼承襲成化三年建坊表之唐齡妻胡氏蒙化人夫任百户早卒氏年二十撫遺腹子政成立繼襲楊仁海妻左氏蒙化人沙賊破城被執不屈罵賊自投於井賊復出之猶罵不絶口賊碎其面釘殺之王繼漢妻張氏舊定邊縣人年二十三遇流冦潰兵至𬒳執不屈遇害周國輔妻陳氏舊定邊縣人猓賊屠城陳𬒳執不屈賊剖其腹而死吳伯祐妻張氏蒙化人沙賊破城被擄不從殺其乳子脅之氏怒甚以頭觸刃死之徐惟一妻劉氏蒙化人沙賊擄入營氏曰我既歸爾無囘理有銀藏於家當同往取賊以為實氏乘間奮身入井賊下石填之同郡宣其邁妻陳氏懼為賊汚拜辭翁姑自縊本朝孫某妻徐氏蒙化人夫名失傳氏許聘未嫁吳逆部將孫龍韜聞其美遣卒登門逼娶之氏度不免紿曰少待粧飾遂扃户取夫家所聘布纏身自縊顔色如生竪碑紀烈王肇興妻姚氏蒙化人夫亡守節與同廳芮翊周妻楊氏楊之蕃妻袁氏徐奮翼妻陳氏均雍正閒旌王維翰妻丁氏蒙化人夫亡守節與同廳芮苾妻龎氏范逢瀾妻蘇氏徐鳳翔妻周氏陳煜妻饒氏胡其高妻顧氏李文芳妻杜氏陳孔效妻黄氏胡其昌妻楊氏楊蔚妻陳氏熊啟妻侯氏張良臣妻劉氏均乾隆間旌張天宿妻范氏蒙化人夫亡守節與同廳徐宗聖妻歐陽氏徐昌妻孟氏曹天章妻黄氏胡士元妻潘氏朱瓊蕃妻王氏彭允昇妻韓氏張祖訓妻徐氏均嘉慶間旌仙釋明王敏蜀之華陽人永樂初寓居蒙化遇異人授道術能役鬼神召致風雨大理府鄧川州孽龍爲崇請敏制之敏往龍遁去成化甲午預知其終蒙人咸以爲尸解土產石黃石母山出棉花人面竹節如人面雄黃石母山出白鹻舊定邊縣出能去垢錦雞沙溝魚大僅如指味甚美大清一統志永北直隸廳在雲南省治西北一千三百五十里東西距四百七十五里南北距八百一十里東至武定州元謀縣界三百五十里西至麗江府鶴慶州界一百二十五里南至大理府賓川州界二百二十里北至外域黄喇嘛界六百里東南至楚雄府大姚縣界三百里西南至大理府鄧川州界一百八十里東北至四川鹽源縣界三百里西北至麗江府麗江縣界一百五十里自廳治至京師一萬一千七百五十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢梁州荒裔漢益州郡地後漢為永昌郡地晉以後為施蠻所據唐貞元中南詔異牟尋始開置名北方睒明史北勝唐南詔異牟尋始開其地名北方睒亦號成偈睒又名善巨郡元史地理志唐南詔時鐵橋西北有施蠻者貞元中為異牟尋所破遷其種居之號劍羌名其地曰成偈睒又改名善巨郡宋段氏時改為成紀鎮元史地理志蒙氏終段氏時高智昇使其孫高大惠鎮此郡後隸大理元初内附至元中置施州尋改北勝州後升為北勝府屬麗江路明洪武十五年改為州屬鶴慶軍民府二十九年置瀾滄衞以州屬之隸雲南都司正統七年直隸雲南布政使司與衞同治本朝因之康熙五年改隸大理府二十六年裁衞入州三十一年仍為直隸州三十七年升為永北府乾隆三十五年改為永北廳直隸雲南省領土府一永寕土府在廳城北四百五十里東西距一百四十里南北距三百里東至四川鹽井衞界六十里西至麗江府麗江縣界八十里南至本廳界一百四十里北至劉卜蒙古黄喇嘛界一百六十里漢越巂郡西境地名樓頭睒與吐蕃接界又名答藍磨些蠻祖泥月烏逐出吐蕃遂居此睒南詔時為磨些蠻所據世屬大理元憲宗三年内附至元閒置答藍管民官尋改置永寕州屬北勝府明初屬鶴慶府後改屬瀾滄衞永樂四年升為永寕府隸雲南布政使司正統三年設流官同知駐北勝州