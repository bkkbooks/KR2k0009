宿儀門以禱忽夜夢雨已而果應士民為作夢雨亭易翼之字孔章騰越人正德中由學正陞長夀知縣為政不事苛細與上官不合歸隱龍川江為一時師表著有四書音義㑹編春秋經傳㑹編詩話類鈔古今詩評騰司志稿等書殷賢騰越人伯父五十無子命賢應世襲堅辭之力勸伯父娶妾生弟弟卒又出資助姪成立襲祖職陳夢熊騰越人官指揮孫可望據滇時為楊武所廹不屈見殺子世培懇以身代亦遇害夢熊本朝乾隆四十一年賜謚節愍流寓明祝璀德興人性耿介善易以罪戍騰衝尋宥歸學者留之講易遂家焉易恒長沙人正統中自滇徙騰衝積學篤行時騰地無學校舉以為師人賴其薰陶者甚衆周東華不知何處人明甲申之變自燕京遁至騰越嘗數月辟榖輒與人言儒理所著有雪山集列女明磉飄孟養思氏之女嫁宣慰俸罕姪思義劉綎兵至思氏率衆歸順擊殺莽兵復歸故土密堵送速二城已而莽應鯉徵兵於二城不應引兵攻孟養思養戰敗自縊磉飄聞之亦縊死其母思氏堅守以待中國金騰道李材遣兵救之黄桂妻梁氏騰衝衞人年二十四夫卒苦節四十餘年同衞林鳯妻閻氏呉璽妻張氏俱夫亡苦節詔旌其門華松妻林氏騰衝衞人夫任後所千户早卒氏年十七撫遺腹子復春襲職復春尋卒再撫遺孤以存華氏同衞張晟妻鄭氏陸緒妻王氏趙萬善妻陳氏鄧文妻黄氏譚惟光妻沈氏俱夫亡苦節厯四五十年谷天生妻楊氏騰衝衞人思任冦邊夫從征中嵐瘴死氏痛哭自縊柩旁同衞張榜妻頓氏常應學妻梁氏呉宗堯妾原氏劉氏俱夫亡自盡趙善萬妻陳氏騰越人夫卒自縊家人救活之遂割耳以見志李允達妻劉氏騰越人夫亡舅姑欲奪其志氏引刀自刎救之甦子殞撫孫成立尹氏女騰越人孝於事親堅不肯字州守旌其門張校妻頓氏騰越人校病篤氏割股救之及卒服毒親隣救之復自縊死於夫柩側林某妻段氏騰越人年十四許聘未嫁夫卒守節不字厯七十年事聞旌表同州左衞劉秉璧妻陳氏王伸妻陳氏皆未嫁守貞本朝王之霖妻徐氏騰越人之霖病奉事惟謹及卒隨自縊與同㕔李誠妻尹氏俱嘉慶閒旌仙釋唐李賢者大理人又名買順戒律精嚴南詔建崇聖寺蒙化問以何佛為尊賢者曰我為中尊蒙化怒其不遜流於騰越之南甸主家有婦難産賢者摘一念珠使吞之珠在兒手中出棄之於地叢生珠樹每苞百八枚後生化黄甬騰越人入祐聖觀驅邪治疾屢驗宏治間旱兵憲趙炯延術士禱雨甬對曰不必懸旛驅雷願竭誠必有感也炯率屬齋戒數日天雨甬自此戒行益嚴人呼為松溪鍊士本朝德潤字香谷姓俞氏隨父宦於滇每有出世想遂於騰越雲峯山出家行頭陀行建刹接衆募緣施粥以濟饑民掩埋枯骨以免暴露後遊昆明坐化於長樂寺土產銅騰越出者佳琥珀產緬爨諸西夷地松脂入地千年所化又云松木精液凝成其中亦有蚊蠛等形者以火珀及紅杏為上血珀金珀次之蠟珀最下又其下之供藥餌而已後漢書郡國志博南注廣志曰有虎魄生地中其上及旁不生草深者四五八九尺大者如斛削去外皮中成琥珀如桃膠凝結成也濮竹高黎共山出節甚長竹䶉大如􅊵而肥出干崖司杜詩所謂笋根稚子也香櫞廳境多有比安南之產尤大紅籐南甸司出蠻婦用之飾腰孔雀呌雞俱南甸出五色錦明史干崖四時皆蠶以錦貢白􅷓布干崖出橙橄欖芋蔗皆芒市出徼外附見舊鈕兀長官司在雲南省治南十六程東至元江州界西至威遠界南至車里宣慰司界北至思陀甸長官司界古蠻地名也兀民皆倭泥蒲類蠻自昔未通中國明宣德七年始來歸附置鈕兀長官司土官任氏世襲本朝平滇爲覊縻地舊猛密宣撫使司在雲南省治西南三十三程東至木邦宣慰司界西至緬甸界南至猛卯安撫司界北至蠻莫安撫司界漢永昌西南裔地後爲羣蠻所據明初爲木邦宣撫司部落成化十九年始析置猛密安撫司屬灣甸州嘉靖中附緬其後來歸萬厯十三年升爲宣撫司土官思氏世襲本朝平滇爲荒外地舊木邦軍民宣撫使司在雲南省治西南三十五程東至八百大甸宣撫司界西至緬甸界南至連克刺蠻界北至芒市長官司界古蠻地本名孟都又名孟邦元至元二十六年立木邦路軍民總管府領三甸明洪武十五年改爲木邦府永樂初改爲宣慰使司土官罕氏世襲司於六宣慰中分地最廣永樂正統間數以從征軍功益地隆慶二年土舍罕㧞叛附緬萬厯十年爲緬侵奪明年討却之立罕欽守其地其叔罕􅜵約暹邏攻緬緬恨之三十三年緬圍木邦立猛密思禮領其地官軍不能討本朝平滇爲荒外地舊孟養軍民宣慰使司在雲南省治西南三十七程東至金沙江西至大古喇宣慰司界南至緬甸界北至干崖宣慰司界漢永昌西徼地俗名迤西有香柏城元置雲遠路軍民總管府明洪武十五年改爲雲遠府又分置孟養府永樂初改孟養軍民宣慰使司土官刁氏世襲本朝平滇爲覊縻地舊孟艮土府在雲南省治西南三十八程東至車里宣慰司界西至木邦宣慰司界南至八百大甸界北至孟連長官司界古蠻地名孟掯又號怕詔自昔未通中國明永樂四年始來歸附置孟艮府隸雲南都司土官刁氏世襲後爲木邦所併嘉靖間附於緬與景邁莾應龍相表裏然亦未敢背也本朝平滇爲覊縻地乾隆三十一年設土司指揮使駐此山川南牙山在猛密司北詳見南甸司慕義山在木邦司北通志明萬厯二十二年隴川猛卯酋多淹叛附緬負嵎於木邦境内之慕義山木邦酋罕欽奉檄擒淹淹奔古喇欽追至雷聳茂斬之按雷聳茂在司西北境鬼窟山在孟養司東極險隘蠻人據為硬寨又訛為鬼哭山芒厓山在孟養司東明王驥征思機攻芒厓山寨拔之金沙江在猛密司南與磨勒江俱環司治流入緬甸此江達南海與麗江之金沙江名同而流異喳哩江在木邦司西詳見永昌府自芒市流入境又西南入緬甸界寶井在猛密司西南滇程記由隴川十日至猛密又二日至寶井又十日至緬甸明史猛宻據寶井之利資為結納朝廷每以嬖臣出鎮司採辦通志其地有金礦古蹟廢蒙憐路在木邦司北元史地理志至元二十七年從雲南行省請以蒙憐甸為蒙憐路軍民總管府蒙萊甸為蒙萊路軍民總管司密堵城在孟養司南又有速送城皆孟養别部所居距孟養十餘程瀕金沙江近緬甸之阿瓦城關隘孟炎甸在木邦司北通志明萬厯十一年官軍討緬緬酋莾應禮西㑹諸路兵於猛卯東㑹車里八百孟艮木邦兵於孟炎合犯姚關尋敗還舊志自姚關渡喳哩江十二程至其地也孟乃部猛密北界别部也孟廣部亦猛密東北别部近隴川界相近有猛哈部明萬厯十六年為緬所併戛撤部在孟養司南道出緬甸至為險隘明萬厯四年緬人來㓂孟養酋思箇潛遣軍至阿瓦河絶緬糧道自督大兵塞戛撤斷其歸路亟請援於官軍緬兵大困久之援不至隴川叛目岳鳳援緬導之由間道逸去猛别部在孟養司西南近緬甸界萬厯十一年官軍敗緬酋應禮追至境緬酋還守阿尾河又分守洞吾猛别雍㑹諸地猛别蓋與雍㑹相接近大古喇境孟礦部在孟養司西南又司西南有戛里孟養别部也又有哈喇杜諸蠻皆近孟養緬甸之境通志司北又有阿昌諸蠻地羊寨在猛密司東明史其屬有地羊寨在猛密東往來道所必經有地羊鬼短髪黄睛奸狡嗜利出没不常工幻術採辦人有强索其飲食者多腹痛死乘馬亦斃剖之則馬腹皆木石也土產濮竹圍三尺餘大可受一斛丁香有高五六丈者翠鳥有大如鷹者取其皮可以點翠山呼鸚鵡之小者青石可為碑碣總纂官臣顧蒓恭纂并覆輯校對官臣陳鴻墀恭校
