body:
  text: 楚秦為鄣郡地漢元封二年改置丹陽郡治宛陵後漢因之元和志漢順帝立宣城郡東晉或理蕪湖或理姑孰赭圻而漢晉志皆不載三國吳徙郡治建業案建業屬今江寧府晉太康二年改置宣城郡仍治宛陵宋元嘉五年割屬南豫州宋書州郡志大明六年併淮南郡入宣城徙治干湖八年復故泰始二年還屬揚州四年又僑置南豫州治宣城郡五年罷齊永明二年仍屬南豫州梁承聖元年又於郡置南豫州隋平陳郡廢改州曰宣州大業初復曰宣城郡唐武德三年復曰宣州兼置總管府貞觀元年罷府天寶元年復曰宣城郡乾元元年復曰宣州屬江南西道唐書方鎮表乾元元年置宣歙饒觀察使治宣州二年廢七元二年自蘇州徙浙江西道觀察使治宣州大厯元年改置宣歙池等州都團練觀察使十四年廢為團練使景福元年升為寧國軍節度天復三年罷五代屬楊吳復置寧國軍節度宋亦曰宣州屬江南東路乾道二年升為寧國府元至元十四年升寧國路總管府屬江東道府志至正十七年時為龍鳳三年改曰寧安府八年又改宣城府十二年又改宣州府明初吳元年改曰寧國府直隸南京本朝初屬江南左布政使司康熙六年分屬安徽省領縣六宣城縣附郭東西距一百二十里南北距一百六十五里東至廣德州建平縣界六十里西至南陵縣界六十里南至涇縣界六十里北至太平府當塗縣界一百五里東南至寧國縣界六十里西南至涇縣界五十里東北至江寧府高淳縣界七十里西北至太平府蕪湖縣界七十里漢置宛陵縣初屬鄣郡元封二年為丹陽郡治後漢因之晉為宣城郡治宋齊以後因之隋大業初改縣曰宣城仍為宣城郡治唐為宣州治五代因之宋為寧國府治元為寧國路治明為寧國府治本朝因之涇縣在府城南一百里東西距一百五十五里南北距一百二十里東至寧國縣界八十里西至池州府青陽縣界七十五里南至旌德縣界八十五里北至南陵縣界三十五里東南至旌德縣界七十里西南至太平縣界一百一十里東北至宣城縣界三十五里西北至南陵縣界四十里漢置涇縣屬丹陽郡後漢因之晉改屬宣城郡宋齊至隋皆因之唐武德三年於縣置南徐州尋改為猷州八年州廢仍屬宣州五代因之宋屬寧國府元屬寧國路明屬寧國府本朝因之南陵縣在府城西九十里東西距七十五里南北距九十里東至宣城縣界三十里西至池州府銅陵縣界四十五里南至池州府青陽縣界七十五里北至太平府繁昌縣界十五里東南至涇縣界二十里西南至青陽縣界七十里東北至太平府蕪湖縣界八十里西北至繁昌縣界三十里漢置宣城縣屬丹陽郡後漢省晉初復置屬宣城郡宋齊以後因之隋初廢入南陵縣唐長安四年始移南陵縣於今治仍屬宣州五代因之宋屬寧國府元屬寧國路明屬寧國府本朝因之按南陵名縣始梁舊唐書地理志云南陵縣漢春穀縣地梁置南陵縣治赭圻城唐長安四年移青陽城縣志青陽城即今縣治據此則漢春穀縣為唐初以前之南陵而非今之南陵也今之南陵為漢宣城縣地今之宣城則漢宛陵縣地也附辨於此寧國縣在府城東南九十里東西距二百二十里南北距一百七十里東至浙江湖州府孝豐縣界一百里西至涇縣界一百二十里南至浙江杭州府昌化縣界一百三十里北至宣城縣界四十里東南至孝豐縣界一百里西南至徽州府績溪縣界一百三十里東北至廣德州建平縣界六十里西北至涇縣界九十里漢宛陵縣地三國吳分置寧國縣屬丹陽郡晉改屬宣城郡宋齊以後因之隋平陳省入宣城縣唐武德三年復置屬宣州六年省天寶三載復置五代因之宋屬寧國府元屬寧國路明屬寧國府本朝因之旌德縣在府城南二百二十里東西距一百里南北距五十五里東至寧國縣界四十里西至太平縣界六十里南至徽州府績溪縣界十五里北至涇縣界四十里東南至績溪縣界三十里西南至徽州府歙縣界八十里東北至寧國縣界四十里西北至太平縣界五十里漢涇縣地唐天寶以後為太平縣地永泰初析太平東北境置縣屬宣州五代因之宋屬寧國府元屬寧國路明屬寧國府本朝因之按旌德縣之置新舊唐書地理志歐陽忞輿地廣記俱云寶應二年析太平置元和志云永秦初置樂史太平寰宇記兩存其説考寶應無二年其二年即廣德元年也又閲一年為永泰元年李吉甫著書在當時自可據今從之太平縣在府城西南二百二十里東西距九十里南北距一百十五里東至旌德縣界三十里西至池州府石埭縣界六十里南至徽州府歙縣界六十里北至涇縣界五十五里東南至歙縣界七十五里西南至徽州府黟縣界一百三十里東北至涇縣界八十里西北至石埭縣界一百二十里漢涇縣地唐天寶四載析涇縣西南十四鄉置太平縣屬宣州永泰中省大厯中復置五代因之宋屬寧國府元屬寧國路明屬寧國府本朝因之按寰宇記云天寶十一載立太平縣今從元和志形勢作藩南夏據吳上遊陳勢大安塔記寧國重藩宣城奧壤南唐韓熙載宣州新城記山環而風萃水曲而氣結明朱大器保豐臺記風俗清涼高爽唐韓愈與崔羣書陵陽奧壤土廣人庶白居易制其土樂其民安其俗阜唐盧肇新興寺記舟車繁會之鄉風俗和柔之境唐尉遲樞新安禪院記阻山帶江顔謝流風宋王應麟玉海城池寧國府城周九里有奇高二文五尺門五晉咸和中桓彝築元至正中重加甃甓本朝順治間增築康熙七年十九年乾隆九年屢修宣城縣附郭涇縣城周五里六十四步高一丈九尺門五南北水關各一外環以池明嘉靖四十二年創築崇禎中重修本朝乾隆二十九年嘉慶五年增修南陵縣城周五里七十二步有奇高二丈五尺門四水門三明嘉靖四十二年創築萬厯九年修本朝康熙五十三年乾隆二十九年屢修寧國縣城周三里有奇高一文五尺門三唐故址宋南渡時增築本朝康熙十三年雍正七年乾隆二十八年屢修旌德縣城周四里三百四十二步高二丈門七東瀕淳溪西南北負山明嘉靖四十五年創築本朝順治十四年康熙八年雍正八年乾隆二十九年屢修太平縣城周五里有奇高一文八尺門五水門二引霧山水為池明嘉靖四十二年創築萬厯中增修本朝乾隆二十九年重修學校寧國府學在府治東南明初建本朝順治六年康熙九年四十年五十年乾隆五中建初名待學書院又名正學書院本朝乾隆八年知府蔣大成請於巡撫改今名南湖書院在宣城縣東北四十里南崎湖上水西書院在涇縣寶勝寺右明嘉靖中建一曰水西精舍雲龍書院在涇縣東台泉山明嘉靖中建黌堂書院在南陵縣西宋熙寧中邑人徐元功建西津書院在寧國縣西津橋東初為鳳山書院一名明德書院在縣學前明正德中建後圯本朝康熙十六年知縣馬重光移建改名儲英書院在旌德縣學西即明太學書院本朝康熙中重建育文書院在旌德縣南五十里洋山邑人談子文建天都書院在太平縣治南明嘉靖中建初名文峯書院後更今名按舊志載籍山書院在南陵縣治東北明萬厯中建今廢户口原額人丁五萬八千六十一今滋生男婦共三百四十三萬三千三百二十一名口田賦田地二萬七千七百九十七頃四十六畝六分有奇額徵地丁銀一十九萬六千四百二十九兩三分雜項銀五百三十九兩五錢三分五釐米六萬二千一百九石八合豆九千一百一石一斗三升三合一勺山川陵陽山在府城內方輿勝覽陵陽山峯為疊嶂樓一峯為譙樓一在宣城一峯為景德寺宣城起為三縣志岡巒盤曲為郡之鎮自敬亭而南隱峯環繞縣治其南為鼇峯又東南曰陽陂唐獨孤霖謂郡地四出皆卑即阜為垣郡治蓋據此山之岡麓也又太平縣有陵陽山在縣西六十里與池州府石埭縣接界有三峯矗立屬縣者一西屬石埭者二下有三門六刺灘舒溪所經此山為陵陽子明得仙處詳石埭縣按隋志元和志寰宇記九域志俱以陵陽山載涇縣下太平本涇縣地唐天寶中析置隋志涇縣下之陵陽山即今太平縣之陵陽山元和志寰宇記九域志仍載涇縣者蓋沿隋志之文未考唐以後縣已分析也輿地紀勝遂於涇縣太平縣下兩載陵陽山誤矣玉山一名土山在宣城縣東十里又東十里有碧泉山麻姑山在宣城縣東三十里名勝志麻姑山高廣遇於敬亭昔麻姑於此飇舉有丹竈存嶧山在宣城縣東南三十里宛溪水出此勞山在宣城縣東南四十里有六小二山大勞有洞可容數十人稽亭山在宣城縣東南六十里有仙人巖三天洞其北為洞山有洞可容數百人寰宇記三天洞東北去郡城五十里祥符圖經宣城稽亭山行客悅其幽曠往往駐步故名柏視山在宣城縣東南接寧國縣界其山之陽即文脊山也溪谷邃深峯巖回曲飛流界道跨岫為梁響山在宣城縣南二里下俯宛溪有響潭權德輿響山亭新營記元和二年宣城長寰陽郡王路公作新亭新營於響山兩崖聳峙蒼翠對起又涇縣西北五里有響山亦曰白額山石壁屹然山腰有石巖深廣各三四丈南北並有石洞廣深倍之行人過此呼嘯山即響應雙羊山在宣城縣南五里宋梅堯臣詩風雪雙羊路即此方輿勝覽山有雙羊石故名巖臺山在宣城縣南四十五里巉巖峭壁上有平臺下有石洞乳泉橫山在宣城縣南六十里乃陵陽敬亭諸山發脈處也其東為魯山華陽水經其下又東為新田山高陂水魯墨溪華山大河疊繞其前華陽山在宣城縣南跨宣涇寧旌四邑之境周數十里高數百仞山之支隴為洞山又為大小墨山高峯山在宣城縣南接涇縣界華陽之西高七百八十仞曷山在十宣城縣西南三里唐文德元年楊行密攻宣州自糝潭濟趨曷山即此梅隴山在宣城縣西南六十里高十餘丈相近曰龍潭山行廊山在宣城縣西北四十里下臨大明湖兩峯對峙環抱若行廊然又縣西北有方山與南陵縣接界敬亭山在宣城縣北一名昭亭山隋書地理志宣城有敬亭山宋永和山川記宛陵北有敬亭山元和志敬亭山在州北十二里即謝朓賦詩之所舊志一名查山高數百丈東臨宛句二水南俯城閨千巖萬壑為近郭名勝其東北有􅌉龍山麒麟山東有甑山峽石山皆敬亭支阜長山在宣城縣東北六十里慈溪出焉又長山在涇縣東南十五里以長三十里故名錦溪出此雲山在宣城縣東北七十里下有金牛洞又北為蔣山下瞰固城湖與高淳縣接界漢山在涇縣東三里突然孤秀下有深潭金壺山在涇縣東二十五里石壁峭拔下有平臺北衝山在涇縣東三十星兩山相並環以清溪相近曰巧坑山其山多怪石幕溪出此貂蟬山在涇縣東六十里旁有水泉不涸四角山在涇縣東七十里壁立萬仞絶頂可容千餘人上有井泉湧溪山在涇縣東七十里湧溪出此慈坑山在涇縣東南四十里坑口有觀音洞烏溪出此硃砂山在涇縣東南五十里廣袤二千餘丈俯瞰長流巉巖峻險相對者曰石鼓山有飛泉迸湍其聲如鼓又南為皇托山山下有陽和洞洗刀池相傳晉桓彝磨劒於此黃㟋山在涇縣東南六十里高五百文亘十餘里羣巒疊嶂雄鎮一方縣治祖山也西面有太乙華蓋天乙三峯下有三池又有緅花塢雙石塢蘇坑諸勝承流山在涇縣南四十里山有九峯皆極聳秀為邑之冠山後有避兵洞又山之東有東流山山之西有赤土洞自承流而南峯岫盤旋百有餘里如城壘然東達旌德西接太平溪谷幽深最為嘉勝出此又相近有石牌山四面皆美石又西五里日後山賞溪經其下西接大小嶺稍北曰湖嶺山高四百餘丈絶頂可以望江路通櫟山大城山在涇縣西七十五里名勝志晉郭璞嘗鑿泉眼于山椒以視潮侯今以潮大小為雨暘之占碧山在涇