威遇下有禮州大水民苦疾疫安節治藥餌遍給之以勞卒官吳遵路丹陽人仁宗時知宣州上禦戎要略邊防雜事二十篇孫覺高郵人嘉祐中知太平縣政先禮教儒雅自飭嘗引鄉弟子於庭親為講解經義民以知學風俗淳美李常建昌人為宣州觀察推官發運使揚佐將薦改秩常推其友劉錡佐曰世無此風久矣并薦之盧革德清人請外神宗謂宰相曰革亷退如是宜與嘉郡遂為宣州余良肱分寧人紹興初知宣州治為江東最許幾貴溪人知南陵縣還民之托僧尼為姦者數百人李宏宣城人宣和初知旌德縣時州郡多故宏召集鄉勇訓練有方建炎間盜張遇寇江上進逼宣境知有備不敢犯郡守吕好問薦其才李光上虞人建炎三年知宣州時范瓊將過軍光先入視事瓊至則開門延勞留三日而去無敢譁者光以宣密邇行都乃繕城池聚兵糧籍六邑之民保伍相比謂之義社擇其健武者統以土豪得兵甲萬餘號精練軍又柵險要二十三所謹戍之釐城址為十地分分巡內外歲租輸邑者悉命輸郡初歡言不便及守城之日贍軍養民迄賴以濟張果四川人建炎中知宣州水暴至果抱民籍入水死城得不沒州民求其尸葬之郭僎祥符人建炎中知宣城縣苗傳劉正彥之變僎説郡守劉珏請募勇士倍道赴難揭榜復用建炎年號人皆韙之李琮江寧人為寧國軍推官州庾積穀腐敗轉運使移州散於民俾至秋償新者守將行之琮曰榖不可食強與民責而償之將何以堪持不下李椿永平人紹興中為寧國軍節度推官治豪民偽劵還陳氏田吏才精強人稱之魏𣏌壽春人紹興中知涇縣從臣錢端禮薦其才召對擢太常寺主簿趙愷乾道中封魏王判寧國府又請增士人貢額築墟田之潰圯者帝手詔嘉勞之林淳乾道中知涇縣甫至訪三農利病邑有陳雷二塘堙塞不理久為豪家所據淳議復之凡修治古塘六百餘所民食其利郭蕘淳熙中知南陵縣嘗除工山坑冶之害修復隄陂以資灌溉田獲歲稔李延忠臨安人開禧中知旌德縣創置學田八十餘畝捐地稅錢九千餘緡張忠恕綿竹人嘉定中知寧國府夏旱請於朝得賜僧牒五十米十萬七千餘石常平使者欲均濟而勿勸糶忠恕慮後無以濟遂核戶口計歲月嚴戒諸邑諭大家發蓋藏宣民以蘇方俌厯陽人嘉定中知旌德縣收學校沒入靈源浮屠田三百餘畝以廩諸生建預備倉立平糴法民賴其利孫夢觀慈溪人理宗時知寧國府蠲逋減賦無算泛入者盡籍於公帑户部遣官督賦闔郡皇駭夢觀曰吾可委官以去豈可病民以留將以府印牒所遣官所遣官聞之夜遁他日夢觀去寧國人為流涕丞相董槐召還帝問江東亷吏槐首以夢觀對杜範黃巖人嘉熙中知寧國府適大旱範以便宜發常平倉又勸富人積粟者發之始至倉庫多空未幾米錢盈萬悉以代輸下戶糧兩淮飢民渡江者多剽掠其首張世顯尤勇悍隂有窺城之意範以計擒斬之給其衆使歸王遂敷陽人淳祐元年出守寧國除積弊定斗斛置義役奏罷蕪廢逃亡田稅人羣頌之曰作民父母後王前杜文天祥信州人咸淳五年差知宣郡勸農惓篤越月召還趙與䅯德祐初知寧國縣元將布延來與䅯率衆城守出戰死之詔贈直文華閣布延舊作伯顔今改正趙時賞和州宗室知旌德縣德祐初北軍至境時賞擁民兵捍戰有功升直寶章閣元高睿河西人世祖時除江東道提刑按察使部內草竊陸梁聲言圍宣城郡將怯懦城門不開睿召責之曰寇勢方熾官先示弱民何所憑即命密治兵衛洞開城門聽民出入寇以有備不敢進遂討平之吳師道蘭溪人至治時寧國路録事會歲大旱飢民仰食於官者三十三萬口師道勸大家得粟三萬七千六百石以賑飢民又言於部使者轉聞於朝得粟四萬石鈔三萬八千四百錠賑之三十餘萬人賴以存活蘇濟益都人至正初涇尹濬渠均賦學宫鑄祭器復浮屠氏侵田餼諸生士民德之劉耕孫茶陵人至正十五年授寧國路推官歲飢勸富民發粟賑之活者萬計會長槍瑣南班程述謝璽等攻寧國耕孫分守城西南日署府事夜率兵固守浙江行省遣參知政事濟濃格爾來援至則兵己疲矣城恃有援不為備瑣南班知之引衆緣堞而上城遂陷耕孫力戰遇害濟濃格爾舊作吉尼哥兒今改正王相廬陵人由翰林院編修出為涇尹首核民田以見業為準禁兼并平賦役一切額外之征力為請免明陳灌廬陵人明太祖起兵除寧國知府建學擇師選子弟受業教化洽於逺近問疾苦禁兼并創戶帖以便稽民帝取為式頒天下以暇伐石築堤作水門蓄泄護瀕江田百姓咸賴有坐盜麥舟者論死數十人灌曰舟自漂至而愚民鬨取之非謀劫也坐其首一人餘悉滅死淮丰采嚴正而為治寬恤類此栁世榮洪武初知太平縣首務清理田糧黃山峭壁田有不可耕者申免稅糧一千五百餘石袁旭樂安人正統中知寧國府均徭册以恤孤貧設義倉以備賑貸雖時事興作而善撫循民不告貧會大計羣吏始舉卓異之典旭得豫焉後被誣卒於獄郡人惜之甚立祠祀之况子玉瀘州人正統中知宣城縣歲飢多方拯救民賴以全沈性會稽人天順中授寧國知府剗除蠧弊一意愛民訟至立斷獄無繫囚課績為南畿第一賜封誥旌異強珍滄州人成化初知涇縣請減額賦民懷之王辨吉水人成化中知涇縣歲大飢辨請蠲貸上官不許遂自疏諸朝得請民賴以蘇胡東臯餘姚人正德中知寧國府時徭役苦不均乃定大户為里小户為甲以一里統十中經歲而代閲九年然後復役人大稱便宣城有金寶墟素沃饒久被水嚙漸受害東臯相便宜修築遂為永利王廷相儀封人正德中以庶吉士謫知寧國縣器度宏闊以文學飭吏治期月間百廢具舉張鳳翀寧州人嘉靖初知旌德縣時高淳議派養馬旌民憂懼鳳翀抗言山嶺非芻牧之地力請於上官得免方逢時嘉魚人嘉靖中知寧國府景王就國所遇凌轢郡縣吏逢時獨往部署所需立辦且面奏諸璫驕橫狀王為引咎治其從官民得無擾王皥安福人嘉靖中任寧國訓導建鳳山書院進諸生討論正學訓迪不倦嘗輯四禮纂要行於邑士習為之一變劉世亨臨川人嘉靖中知涇縣歲時行鄉落勸民力耕建社倉教以積貯斂散地多盜令鄉募武勇以巨室主之分布要害賊發輒獲以治行高等徵為吏部主事楊九韶餘姚人嘉靖中知南陵縣奏蠲養馬七十匹邑免賠纍又築隄為墟凡十餘所蓄泄有法至今賴之周詩錢塘人嘉靖中知南陵縣歲潦力請免逋負數千又請核姦民欺隱田千餘畝賦稅始均甘灃蘄州人嘉靖中知旌德縣裁省厨傳寬里甲諸費有中貴過縣索供帳橫甚灃易服佯為吏往見中貴怒曰令何在灃曰邑如縣磬不足以犒從者令遁矣中貴度無所得乘傳去黃尊素餘姚人萬厯中寧國府推官執法不阿豪貴皆斂手公餘引生徒講學士習一變詹事講樂安人萬厯中知宣城縣嘗盡發儲三萬石賑民丈量令下里甲騷然事講履畝核盈縮姦猾弊息田溢額而稅不增沈堯中嘉善人萬厯中知宣城縣墾荒築堰濬川瀦陂磽埆皆為沃産喬明旃永城人崇禎中知旌德縣捐資築堰以通水利由是邑田屢豐本朝秦宗堯義州人順治九年知寧國府性亷儉常質衣自給郡故貢黃連非土産也宗堯奉詔言民利病得請免貢傅大業建昌人康熙間知太平縣值歲旱大業捐米為倡又親詣大姓委曲勸輸設厰發粟散給甚均所活萬計馬光鄒平人康熙十三年知寧國縣邑素僻陋光下車建尊經閣立西津書院諭民以禮教俗為一變時徽浙兩界伏莽跳梁練鄉勇嚴偵候迄不敢犯治邑六年以卓異薦擢御史許廷試廂黃旗人康熙四十年知寧國府為政敏決多所整理郡洊飢廷試檄領米榖平糶民甚德之王廷棟大定人乾隆十七年知涇縣歲大旱步禱數十里雨大注時謂之王公雨李廣峰嘉應人乾隆二十年知太平縣豪強斂迹胥吏莫敢為姦民戴之如父母祀名宦祠人物漢抗徐丹陽人鄉里稱其膽智初試守宣城長悉移深林遠藪椎髻鳥語之人置於縣下由是境內無復盜賊後為中郎將宗資别部司馬擊破大山賊公孫舉等平之封烏程東鄉侯厯官長沙太守與度尚俱為名將數有功晉紀世和宣城人咸和中宣城內史桓彝為賊所害諸子並流迸世和率義故葬之唐左難當一名匡政涇人隋末盜起難當率衆保障武德中入朝授猷州刺史輔公祏反圍猷州固守三年李大亮至授以兵遂擊公祏敗之後太宗伐高麗以李大亮為水道兵總管難當副焉並勇冠一時劉太沖宣州人博治工詩顔真卿守平願辟從事畫策拒安祿山劉太真太沖弟善屬文師蘭陵蕭穎士舉高第進土淮南陳少遊表為書記興元初為河東宣慰賑給使纍遷刑部侍郎德宗以天下平詔羣臣宴曲江自為詩敕宰相擇文人賡和李泌等請羣臣皆和帝自第之以太真李紓等為上羅立言宣州人貞元末進士魏博田宏正表佐其府改陽武令以治劇遷河隂河南尹丁公著上狀加朝散大夫纍遷京兆少尹蘇仲芳南陵人太和中父死負土成墳廬於墓側繞墳行哭羣鳥隨之悲鳴許棠涇人咸通中有詩名與張喬鄭谷等號十哲楊凛旌德人光化中官太子校書行義修飭自唐太和初至宋乾道間數世同居至千餘口以孝友世其家宋蒯鼇宣城人少孤貧篤志於學善屬文以亷直自勵一介不干於人太宗時擢進士第厯茶陵令以殿中丞致仕隱於廬山凌策涇人幼孤勵志好學與姚鉉同學於廬州雍熙中舉進士起家廣安軍判官淳化中纍遷都官先是嶺南輸香藥以郵置卒萬人煩役為患策請陸運至南安泛舟而北止役卒八百厯拜右諌議大夫集賢殿學士知益州自蜀代還真宗對王旦言策有才用旦曰策性淳質和臨事強濟上深然之旋拜給事中權御史中丞時以疾不能朝謁纍遣中使挾醫存問賜藥尋遷工部侍郎子瓘琬並為奉禮郎兄簡管國子博士分司南京梅詢宣城人進士及第為利豐監判官後以祕書省著作郎豫考進士於崇政殿真宗奇其占對詳敏召試中書除集賢院尋為三司史部判官屢上書陳論西北事又論曹瑋馬知節之才可用凡數十事其言甚壯纍遷給事中出知許州卒子鼎臣舉進士厯翰林學土上賜飛白書墨莊二字曰美卿世居文翰之地也汪文諒涇人纍世同居至一千三百口天禧四年詔旌之趙積其先單父人後徙宣城真宗時進士樞密直學士李濬薦為監察御史厯遷益州路轉運使積至數言部中事至一日章數上天聖中遷禮部尚書致仕劉琦宣城人博學強覽立志峻潔以都官員外郎通判歙州召為侍御史建言自城綏州數至羌寇宜棄之後貶通判鄧州卒梅堯臣詢從子工詩用詢蔭為河南主簿錢惟演留守西京特嗟賞之歐陽修與為詩友自以為不及由是知名於時厯德興令忠武鎮安判官大臣屢薦宜在館閣召試賜進士出身屢遷都官員外郎豫修唐書成未奏而卒嘗上書言兵注孫子十三篇撰唐載記二十六卷毛詩小傳二十卷宛陵集四十卷有人得西南夷布弓衣其織文乃堯臣詩也名重於時如此楊佐本唐靖恭諸楊後家於宣及進士第為陵州推官皇祐中置都水監命佐以鹽鐡判官同判京城地勢南下夏秋苦霖潦佐開永通河自是水患息又議治孟陽河從其䇿汪齊涇人慶厯進士纍官尚書都官員外郎時行青苗免役法齊詣朝堂力言不便王安石不悅出判池州徐績南陵人舉進士選桂州教授王師討交址轉運使檄績從軍因具蠻人情狀疏於朝舒亶聞其名將以御史薦績惡亶為人辭不答徽宗立遷中書舍人詔與蔡京同校五朝寶訓績不肯與京聫職固辭奏京之惡引盧杞為喻遷翰林學士上疏陳六事又言國史久不成皆由元祐紹聖史臣好惡不同宜盡取輔相家藏記録參討是非勒成大典帝然之後出知江寧府言者論為元祐姦朋罷歸大觀中起厯龍圖閣直學士留守南京以疾致仕詹友端宣城人政和中鄉貢第一建炎初伏闕上書言甚剴激不報監池州贍軍酒庫會盜發友端攝西安尉與賊力戰中流矢卒王行之太平人為婺州土曹宣和初方臘寇婺官吏皆遁行之曰吾刑官也分當死職遂遇害鮑琢旌德人宣和中方臘寇旌德琢紏義兵擊破之補承信郎又明年盧邁寇涇琢力戰中流矢卒王相如宣城人孤貧嗜學工詩文建炎初江右盜起相如為盜所獲命作檄相如奮髯曰有死而已不能為賊作箋遂遇害盡室殱焉所著有溪堂集方致堯寧國人建炎中戚方寇寧國致堯伏鄉兵於石嶺大破之賊益兵至中流矢被執不屈死陳天麟宣城人紹興進士知贛州茶商寇贛吉聞天麟豫為守備民恃以安佐憲臣辛棄疾討賊給餉補軍天麟方略為多孫楙太平人紹興進士厯判池真潁三州所至以興學節財為務纍遷知溫州朱子稱其愛立而教明古良吏也吳柔勝宣州人淳熙進士丞相趙汝愚知其賢差嘉興府學教授將置之館閣會汝愚去嘉定初遷國子正柔勝始以朱子四書與諸生誦習又於生徒中得潘時舉吕喬年白於長擢為􅕄事使以文行表率於是伊洛之學晦而復明出知隨州收土豪孟宗政扈再興隸帳下後皆為名將厯除祕閣修撰卒諡正肅李經南陵人性篤孝母喪廬墓地故多虎經不畏後虎皆絶迹吳淵柔勝第三子也五嵗喪母哀慕如成人嘉定中舉進士厯樞密承旨政府欲用兵中原淵力陳不可後厯江東安撫使詔以淵興利除害所列二十有五事究心軍民拜資政殿大學士封金陵侯進爵為公屢起知江陵府兼夔路策應大使寶祐中以援川蜀功加拜參知政事卒贈少師淵有才略克濟事功所至興學養士著易解及退庵文集奏議吳潛柔勝季子嘉定十年進士第一授承事郎纍遷江東安撫留守上疏論保蜀之方護襄之策防江之算備海之宜端平初詔求直言潛陳九事淳祐中拜右丞相兼樞密使後判寧國府還家召入對論畏天命結民心進賢才通下㥽帝嘉納拜特進左丞相進封慶國公尋改封許國公會論丁大全沈炎高鑄之姦卒以炎論劾落職命下中書舍人洪芹繳還詞頭不報謫建昌軍屢徙循州安置卒德祐初追復原官明年贈諡特贈少師章炎太平人寶慶中進士拜侍御史彈劾無所避出知江州忤丁大全解職趙汝嚮宣城人嘉熙中判文州元兵來攻與知州劉鋭率軍民力戰殺傷甚衆度力不支飲藥死城陷汝嚮被執不屈臠殺之周真旌德人咸淳中文天祥劄授本縣尉元兵壓境力戰死之吳寶信宣城人以蔭為龍泉令元兵入臨安寶信從張世傑等奉二王如福州復遷泉州會蒲壽庚亂率淮兵百人力戰死楊義忠寧國人為縣吏元布延攻寧國知縣趙與䅯戰死義忠帥衆城守凡六十日城陷亦死之布延改見前名宦門趙與䅯注元貢師泰宣城人泰定四年釋褐出身厯丞椽大臣有以其名聞者擢應奉翰林文字厯拜監察御史自世祖以後南士復得居省臺自師泰始時論以為得人至正中遷兵部侍郎朝廷以京師至上都驛户凋弊命師泰巡視整飭之至則均其徭役數十郡之民賴以稍蘇後除户部尚書俾分部閩中以閩鹽易糧由海道轉運給京師凡為糧數十萬石朝廷賴焉召為祕書卿卒師泰性倜儻所至績效輒暴著尤喜接引後進以故士譽翕然歸之有詩文若干卷行於世王翕宣城人管軍百户長槍賊陷城呼弟曰我受國恩當死汝等衛老母出遂與妻子俱自刎死張文貴宣城人官百户明兵下寧國路守將出降文貴被執不屈死妻妾皆自殺梅實宣城人集慶路照磨明兵至謂友人李端曰事亟矣當以死殉國城陷闔門死之張國岡南陵人至正間趙雙刀寇南陵國岡率義兵力戰被執不屈死明汪文炳太平人太祖渡江隨孫炎入見授祕書典籖講解稱旨遷都昌知縣陳友諒來攻援絶被執不屈死何應龍南陵人少涉獵經史膂力絶人元末起義兵以功授民兵千户洪武初詔世其官從徐達北定中原還留宿衛後從征西卒於途遺誡睦族子孫同居者九世秦逵宣城人洪武進士厯任副都御史奉命清理囚徒寬嚴得體擢工部侍郎有大興作多召逵議議定工匠以三年為班更番赴京輸作免其家徭役諸匠便之後遷工部尚書致仕歸陳迪宣城人洪武中辟府學訓導為郡草萬壽賀表太祖異之久之以通經慶除編修厯山東左參政雲南右布政並有聲建文初徵為禮部尚書時更修制度沿革損益迪議為多又陳清刑獄招流民凡二十餘事皆從之燕王入京召迪責問抗聲不屈命與子鳳山丹山等六人並磔於市其僕侯來保潛拾遺骨歸葬崇禎末追贈太保年本朝乾隆四十一賜諡忠烈余逢辰宣城人有學行建文時為燕王府伴讀王信任之故得聞異謀乘間力諫知變將作貽書其子誓必死及燕兵起泣諌言君父兩不可負死之崇禎末追贈苑馬寺少卿本朝乾隆四十一年賜諡節愍萬琛宣城人慷慨負氣節成化中舉於鄉知清江縣改瑞金會劇盜大至縣人逃竄有勸之急去者琛叱曰我去誰與守土遂率民兵力戰殺賊數十人力屈被執死之事聞贈光祿寺少卿張綸宣城人成化中進士擢御史厯遷大理寺卿興襄二府爭灘地連逮七十二家綸調停奏上之事乃定改刑部侍郎奉詔推治博野慶成二王獄稱旨纍官都御史武宗時中官用事綸劾巨璫蕭敬等罪當誅疏久不下因乞歸董傑涇人成化進土上疏論經筵忤冢宰出知沔陽州纍遷保定府知府河南湖廣布政使志切民瘼所在盡職民懷其德正德六年江右盜起巡撫王哲兵敗擢傑代之剿賊有功察宸濠有異志餽遺不受時諷以忠義濠知不可奪因留飲鴆之歸一夕卒傑潛心理學著七士辨以明學術邪正有五城文集左輔涇人宏治進士授浮梁令遷瑞州府同知因忤劉瑾黨謫南安教授瑾誅起知寧州謝病歸著有周易本義附説太極後圖南庠日講等集張棨涇人五歲受書輒曉大義嘗聞雞聲遽欲起母問之則舉小學以對十三遭父喪哀毁不離次後母卒廬墓三年從歐陽德鄒守益等逰以學行稱吳宗周宣城人少孤嘗刲股療母疾母卒廬墓三年宏治中登進士方觀政給事中龎泮等以言事得罪抗疏救之厯官臨江知府其子大經亦有孝行宏治中並獲旌吳景南陵人宏治進士正德中厯官四川僉事守江津重慶盜曹弼來寇景迎擊被執不屈死贈副使立祠江津吳大本宣城人正德進士授進賢知縣儀賓李貴橫暴以私逋殺人本論治之擢御史三疏摘大學士張璁不職狀出為廣東僉事終兵備副使周希旦旌德人嘉靖進士由興化推官擢御史時高拱當國專恣希旦論之又疏請罷內閲及定天峪山議纍遷應天府丞時苦旱疫請發帑金二萬以賑旋引年歸梅守德宣城人嘉靖進士厯給事中時嚴嵩私人胡奎謀為工部侍郎徐可成以道士纍官工部侍郎掌太常卿復求改官守德抗疏論駁事皆得已嵩深疾之出為紹興知府纍遷雲南參政乞養歸崔涯太平人嘉靖進士擢御史糾劾不避權貴世宗目為真御史按福建墨吏聞風解綬陳山海十二䇿悉中利弊以劾吏部尚書汪鋐忤旨見斥會倭寇東南廷臣薦唐順之及涯等可任用以老疾辭屠羲英寧國人嘉靖進士為浙江提學副使持法清嚴竿牘不行張居正禁講學羲英曰官可棄學不可不明益講習不輟遷太常卿掌南監事申嚴條約六館肅然南部諸臣公疏請居正奪情羲英獨不署名遂罷歸交薦不起唐汝迪宣城人嘉靖進士真定推官擢吏部郎以忤嚴世蕃出知雷州雷濱海倭寇一夕突至急登陴授兵城賴以保仕終廣西按察使孫濬宣城人嘉靖進士由永豐知縣入為給事中疏劾趙文華希嚴嵩旨乞翦權黨以答中外謫孝感丞厯知平陽府沈寵宣城人嘉靖中舉於鄉厯知行唐獲鹿縣擢御史亷直有聲清軍福建疏劾南贛巡撫張烜遷湖廣江防僉事破平劇賊鄭翦進廣西參議以母老乞歸寵學宗良知然務實踐不浮慕取名御史耿定向聘主開元講席自是宣城人士皆興於學子懋學萬厯五年進士第一授修撰疏救吳中行趙用賢格不入遂引疾歸徐楠宣城人嘉靖舉人知耒陽縣振興文學同知撫州躬負畚插築千金坡撫人為建祠坡上攝郡事免歸子鴻起領萬厯鄉薦遷衡州知府耒故衡屬也郡人祠祀之題曰父子濟美趙睿涇人嘉靖進士由蕭山知縣擢御史巡視十庫璫報車駕幸西上門觀獅子請暫避睿正色曰􅕄在補過拾遺主上來正宜班侍何避焉上聞即斂轡還纍遷四川左布政使許汝驥寧國人嘉靖進士厯兵部郎適景王之國部委治舟潞河限以千艘民得不擾又閲視薊鎮軍實劾鎮帥張承勳貪酷不法狀仕至河南副使查鐸涇人嘉靖進士隆慶時為刑科左給事中忤大學士高拱出為山西參議萬厯初官廣西副使移疾歸繕水西書院講王畿錢德洪之學後進多歸之周怡太平人嘉靖進士厯給事中疏劾大臣不少顧大臣多側目因攻大學士翟鑾嚴嵩嵩搆之杖闕下錮詔獄隆慶初復官終太常少卿天啓時諡恭節蕭彥涇人隆慶進士除杭州推官萬厯初擢兵科給事中自塞上多警邊吏輒假招降幸賞彥言降人不可處內地宜一切報罷從之尋閲視陜西四鎮邊務還奏訓兵儲餉十事并允行進户科都給事中初詔購金珠巳命停市以其直輸內庫彥秦不當虛外府以實內藏又言察吏之道不宜君催科為殿最厯撫貴州雲南鄖陽總制兩廣召拜户部右侍郎卒贈右都御史諡定肅弟雍萬厯進士厯廣東按察使宦績亞於彥而學過之時稱二蕭徐大任宣城人隆慶進士授工部主事嵗汰水衡冗費數十萬奉命榷稅真州羡入一無所私厯官中外皆以亷稱神宗嘗稱其清節為天下第一以工部侍郎致仕歸詹沂宣城人隆慶進士由新建知縣擢給事中時張居正奪情議起省垣希旨乞留疏具沂獨不署名出為山東副使纍遷副都御史遇除夕神宗嘗以沂素亷清寂可念特賜羊酒鏹幣旋乞歸不許挂冠歸蕭良幹涇人隆慶進士授户部主事榷稅崇文門例有羡金斥不納纍遷布政使歸置義田以贍宗族待以舉火者數百人貢靖國宣城人萬厯進士厯刑部員外郎張居正欲置人重辟令其子嗣修以通家刺來謁靖國還其刺竟出之出知泉州府亷平為理移兩浙鹽運使忤御史投劾歸沈有容宣城人萬厯中積功至都司僉事乞歸日本封事壞起有容守浯嶼銅山倭據東番有容率舟與倭遇縱火焚其六舟斬獲甚衆倭遂去東番海上息肩者十年厯溫處參將罷歸後福建中復設水師起有容統之襲禽倭東沙尋招降巨寇袁進李忠散遣其衆天啓初為登萊總兵廣寧覆遼民走避諸島日望救援巡撫下令渡一人者斬有容爭之立命數十艘往獲濟數萬人以老乞歸卒贈都督同知顔文選宣城人萬厯進士任戶科給事在垣十一月疏十三上其請建儲尤激直尋推鄒元摽府丞疏入久不下文選力請遂謫外後追贈光祿少卿麻溶宣城人萬厯進士厯吏部郎中同官趙南星削籍溶上疏乞召還忤執政意出為汾州守道稅使馬堂肆虐致民變捕治者多株連溶力持得釋及卒貧不能斂撫臣魏允貞以清正聞贈光祿卿湯賓尹宣城人萬厯乙未冠南宫廷對第二授編修仕至南祭酒以制藝名天下張守道宣城人萬厯進士厯遷工部侍郎性孝友破産急其兄難母卒廬墓三年蔡逢時宣城人萬厯進士任禮部郎議藩封祿制著為令遷溫處兵備副使圖畫海防斬倭七十餘人纍官四川左布政使葉永盛涇人萬厯進士以御史巡鹽浙直中使劉成來擁稅商竈震懾盛奏之疏詞剴切上悟不直奄巡按江西奄寺黨連武辨有獻店投榷之議盛抗疏請斬宵人議遂罷在垣九載疏數十上直聲振中外纍升太僕寺卿梅鼎祚宣城人精古學詩文博雅王世貞嘗稱