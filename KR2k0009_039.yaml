自執官吏知民有完票可據前弊自除一切雜稅銀數米數皆依此法或奉詔書蠲免而先完在官者即可持票以抵他項應徵之課使小民均霑實惠下部議行三十五年擢通政司右參議官至工部侍郎五十五年卒賜祭葬梅庚宣城人康熙辛酉舉人少孤苦志力學以詩文名於時知泰順縣邑苦歲修海船庚蒞任五年纍不及民著聽山詩鈔漫與集梅榖成文鼎孫少承家學精於算數康熙壬辰由諸生召入內廷賜舉人進士授庶吉士旋授編修聖祖特書承學堂額賜之纍充蒙養齋總裁性耿介邃於理學雍正中以御史巡漕通州岸無粒米河無滯舟世宗特旨奬諭為巡漕法乾隆初奏升祀有子於堂又奏正一真人不當厠朝班風采卓然纍官左都御史致仕卒諡文穆汪越南陵人康熙四十四年舉人所著詩古文詞沖淡典博有緑影草堂集讀史記十表排比舊文鉤稽微義訂訛砭漏所得殊多嘗行社倉於里中請官給印簿而自謹其出入可為後人法式焉劉芳藹宣城人雍正丁未進士由福建仙遊知縣厯户禮科給事中至湖北按察使官御史時集經史為十針以進請展會試期於三月酌定儲倉採買以備荒政及奏刑名應變通八條皆中事理司臬三年獄無滯囚丁母憂歸卒朱武勳涇人性孝友族有流落他鄉者訪歸為置家室又捐義田以贍族人倡建龍潭石橋嵗無病溺者常遺命後嗣捐修郡學嘉慶十一年入祀鄉賢祠徐強南陵人孝行著聞雍正年間旌何士閥南陵人有何滿者盜破其祖母冢以葬親士閥訟之官三年不得直會巡撫檄兩縣令會勘滿健訟事仍未白士閥大慟觸碑而死令義之勒滿起棺題曰義士何士閥墓胡堯齡涇人母喪廬墓夜夢大水浸棺覺而徙葬未幾其原葬處蛟起人以為誠孝所感雍正年間旌劉時可旌德人嘗遵父命建義冢並置田為祭掃費又建義冢於都中旅人德之凡遇歲歉必買穀以助賑又立文社建文萃塔培植人才義行卓然胡增琦寧國人孝行著聞雍正年間旌趙青藜涇人生而穎異九嵗能文乾隆元年舉會試第一改庶吉士授編修尋授御史在臺中數年有直聲而能持大體如請清屯田以歸運丁弛米禁以濟民食仍耗義歸公興西北水利皆有關利病又劾總督高斌等奏開捐例謂此風一開將言利之徒接踵而起為害甚大上嘉其有所見其合糾協辦大學士彭維新奪情議尤侃侃以耳疾乞休年八十餘卒青藜學以不欺為主接人外和而內嚴不可干以私為古文受義法於桐城方苞故風格似之詩自漢唐及宋元靡不綜貫著有潄芳居文集詩集又著有讀左管窺于二百四十二年事貫穿尤深朱理涇人乾隆丁未二甲一名進士授編修嘉慶元年知浙江衢州府遷福建興永道尋遷浙江按察使山東布政使擢刑部侍郎授江蘇巡撫尋仍召為刑部侍郎調倉場侍郎出為貴州巡撫嘉慶二十四年卒於任嘗奉命往甘肅查辦虧空核實訊擬撫貴州整飭鉛務嚴禁私鑄等弊流寓晉瞿硎先生不知姓名亦不知何許人太和末常居宣城縣界文脊山中有瞿硎因以為名焉桓溫嘗往造之見先生被鹿裘坐於石室神無忤色溫及僚佐數十人皆莫測之乃命伏滔為之銘贊竟卒於山中唐李白廣漢人天寶末嘗往來宣城南陵間有我家敬亭下大清一統志寧國府三列女梁宛女子宣城人天監中女與母共寢母為猛獸所攫女呼號搏獸行數十里獸毛盡落置其母去女抱母猶有氣息經時乃絶太守表上詔榜其門閭唐洪勝可妻梅氏涇縣人黃巢亂氏為賊所獲賊脅之氏引刀自刺死香聞十里涇人立祠祀之號香心五娘宋吳寶信妻饒氏宣城人嫁七日元兵入臨安寶信為龍泉今奉二王浮海死氏撫姪鉉為夫後以節終元葛妙真宣城民家女九歲聞術者言母年五十當死妙真悲憂祝天誓不嫁終身齋素以延母年母後年八十一卒紀氏宣城紀吉甫女年及笄未嫁至正間長槍賊陷宣州為所獲女觸牆碎首死時有胡氏賊劫之去號泣不從賊逼之氏嚙其指立斷賊怒殺之明葛之孚妻胡氏寧國人年二十二夫卒子觀稍長亦病卒氏與婦施氏相勵守節洪武中旌胡選孫妻金氏寧國人年十六歸胡選孫有痼疾偃卧牀褥會安吉叛軍突至家人出走氏獨侍夫疾不去夫殁年甫十八守節終身洪武中旌陡門婦不知何氏女居陡門中正德間宣大飢婦與夫乞食於金寶墟夫約曰汝居此吾得食即還去數日不返墟人有悅其色者誘致之與之食不食飲墟水一蹶而死吳仕期妻貢氏宣城人仕期上書忤張居正操江都御史胡檟承旨令同知龍宗武杖殺之氏往求夫尸既葬赴南臺訟寃無敢為言者御史孫維城上其事檟宗武皆論戍貢夫婦並旌施之濟妻徐氏宣城人既許嫁里豪湯一泰艷之強委禽焉女投池中死時年十五知府臨視命立祠城東饒鼎妻楊氏寧國人鼎以單衣溺死湖中楊守節課二子成立雖冬不衣祫萬厯初楊年八十竟單衣入宅旁池中端坐而死羅愷妻孫氏宣城人年未笄歸愷與姑避兵石塘沖松樹下兵將刃姑氏請代欲汚之不從兵怒刺其足氏抱松樹大呼曰死不可辱遂見殺三日猶抱松不仆人稱為抱松女王連妻劉氏宣城人少寡撫遺腹子每言及其夫輒悲號隕地守節終身劉慶八妻馮氏宣城人年十九夫亡娣姒諷之曰守未易言非能咬斷鐵釘者恐不勝馮即投𬒮起拔壁上釘齧之剨然有齒痕復怒抉臂肉釘著壁上曰脫有異志此即狗彘肉不若矣已而遺腹生子曰大賢長娶李氏大賢又夫姑婦相守至老卒取視壁釘肉常韌不腐齒痕如新童寬濟妾章氏涇人寬濟為萬載知縣卒章年二十餘扶櫬歸途中坐卧不離棺側及抵涇悉取遺裝付嫡投河死查斌妻汪氏涇人夫婦並為賊所執汪紿賊縱夫即自沉水童灌妻唐氏涇人夫為賊所殺唐紿令焚之投烈焰死鄭瑶妻沈氏涇人遇流賊至觸崖石死王鍍妻梅氏南陵人鍍死翦髮自誓富人王爐