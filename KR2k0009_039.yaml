front:
  text: 大清一統志寧國府在安徽省治東四百三十里東西距二百二十里南北距三百三十五里東至廣德州建平縣界六十里西至池州府銅陵縣界一百六十里南至徽州府績溪縣界二百十五里北至太平府當塗縣界一百二十里東南至浙江杭州府於潛縣界二百二十里西南至池州府石埭縣界三百里東北至江寧府高淳縣界七十里西北至太平府繁昌縣界一百三十里自府治至京師二千七百四十五里分野天文斗分野星紀之次建置沿革禹貢揚州之域春秋屬吳後屬越戰國屬
