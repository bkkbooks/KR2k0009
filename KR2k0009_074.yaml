front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_074-1a}
body:
  text: 衛輝府三人物漢賈護黎陽人從胡常受左氏傳哀帝時待詔為郎授蒼梧陳欽子佚由是言左氏者本之賈護向長朝歌人性尚中和好通老易王莽大司空王邑欲薦之於葬固辭乃止潛隱於家讀易至損益卦歎曰吾巳知富不如貧貴不如賤但未知死何如生耳建武中男女娶嫁既畢敕斷家事勿相關遂肆意與北海禽慶俱遊五嶽名山不知所終杜詩汲人少有才能仕郡功曹有公平稱建武元年遷侍御史安集洛陽時將軍蕭廣放縱兵士暴橫民間詩敕曉不改遂格殺廣還以狀聞帝賜以棨戟復使之河東誅降逆賊楊異等厯轉汝南都尉所在稱治遷南陽太守詩雅好推賢數進知名士身雖在外盡心朝廷讜言善策隨事獻納後𬒳徵會病卒衛颯修武人家貧好學問隨師無糧常傭以自給建武二年辟大司徒鄧禹府舉能案劇除襄城令遷桂陽太守視事十年郡內清理光武欲以為少府會颯被疾不能拜起敕以桂陽太守歸須後詔書後卒於家趙咨東郡燕人少孤有孝行桓帝時舉至孝有道遷博士靈帝時纍遷敦煌太守以病免還躬率子孫耕農為養盜常夜往劫之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾病須養貧居朝夕無儲乞少置衣糧妻子物餘一無所請盜皆慚歎奔出拜東海相以疾自乞徵拜議郎臨終敕子薄葬時稱咨明逹百里嵩封邱人為徐州刺史部車所至甘雨輒降及卒民立祠祀焉仇覽一名香考城人幼而淳默鄉里無知者年四十縣招補蒲亭長勸人生業令子弟就學賑恤孤寡期年稱大化令王渙聞其賢署為主簿尋資覽入太學同郡符融與郭林宗齎刺就房謁之遂請留宿林宗嗟嘆下牀為拜學畢歸鄉里不就請辟雖晏居必以禮自整妻子有過輒免冠自責妻子廷謝覽冠乃敢升堂家人英見喜怒聲色之異後徵方正會疾卒少子元最知名史弻考城人少篤學辟公府為北軍中侯遷尚書出為平原相桓帝時詔書下舉鈎黨弻獨無所上從事切責弻曰他郡自有平原自無胡可相比濟活千餘人遷河東太守考殺侯覽私人覽大怒詐作飛章誣弼檻車徵前孝亷裴諭送之曰明府摧折虎臣選德報國願不憂不懼弻曰誰謂荼苦其甘如薺下廷尉詔獄得減死歸田里何休訟弻有幹國之器拜議郎出為彭城相卒向詡向長之後性卓詭不倫恆讀老子常於竈北坐板牀上積久板有膝踝足指之處後特徵拜趙相遷侍中每朝廷大事侃然正色百官憚之三國魏張範修武人性恬靜樂道徵命無所就弟承亦知名仕為諫議大夫範子陵及承子戩為山東賊所得範直詣賊請二子賊以陵還範範請以易戩賊義其言悉以還範後為議郎參丞相軍事甚見敬重救恤窮乏家無所餘中外孤寡皆歸焉楊俊獲嘉人受學陳留邊讓讓器異之以兵亂乃扶持老弱詣京密山間同行者百餘家俊賑濟貧乏通其有無武帝除俊曲梁長遷南陽太守徙為征南軍師遷中尉文帝踐阼復任南陽俊自少至長以人倫自任同郡審固陳留衛恂皆出自兵伍俊資祓奬致咸作佳士黃初二年車駕至宛以市不豐樂下獄遂自殺衆冤痛之晉孫登共人無家屬於蘇門山為土窟居之夏則編草為裳冬則𬒳髮自覆好讀易撫一弦琴文帝使阮籍往觀既見與語不應嵇康從之遊三年問其所圖終不答將别謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光人生而有才而不用其才故用光在乎得薪所以保其耀用才在乎識真所以全其年康不能用果遭非命登竟不知所終成公綏白馬人性寡欲不營資産家貧嵗飢晏如也少有俊才詞賦甚麗張華雅重綏每見其文歎服以為絶倫薦之太常徵為博士厯遷中書郎每與華受詔並為詩賦又與賈充等參定法律所著詩賦雜筆十餘卷行於世成公簡東郡人性朴素不求榮利潛心道味默識過人張茂先每言公簡清靜比揚子雲默識擬張安世官至散騎常侍桑虞黎陽人父沖有深識遠量河間王容執權引為司馬沖知其必敗稱疾求退虞年十四喪父毁瘠過禮諸兄仕於石勒咸登顯位惟虞欲避地海東會丁母憂遂止哀毁骨立廬墓五年後朝廷遣人授虞青州刺射厯任以和簡著稱蔡廓謨曾孫博涉羣書言行以禮起家著作佐郎以方鯁間素為武帝所知遭母憂三年不櫛沐殆不勝喪輔御史中丞多所糾奏百僚震肅出為豫章太守徵為吏部尚書徐羡之方録尚書事廓曰吾不能為徐干木署紙尾遂不拜廓奉兄軌如父家事大小皆咨而後行公祿賞賜一皆入軌有所資需悉就典者請焉江湛夷之子居喪以孝聞愛好文義兼明算術為彭城王義康司徒主簿固求外出乃以為武陵內史元嘉中纍遷吏部尚書家甚貧約不營財利饋餉盈門一無所受在選職公平無私不受請謁後為太子劭所害孝武初追贈左光祿大夫諡忠簡江智淵夷之弟子為隨王誕後軍參軍元嘉末纍遷中書侍郎智淵愛好文雅辭采清贍孝武深相知待恩禮冠朝兄子槩早孤智淵養之如子厯黃門吏部郎江秉之考城人少孤弟妹七人並幼撫育姻娶盡其心力少帝時為烏程令以善政著名東土後為山陰令人户三萬政事煩擾訟訴殷積秉之御煩以簡常得無事厯官新安太守元嘉中轉臨海並以簡約見稱所得藻遊焉按漢之濟陽縣故城在今開封府儀封廳北山東曹州府曹縣亦有濟陽故城唐武德中分冤句縣西界置河南通志辨疑謂濟陽在今陳留縣北原本江洪江重欣蔡仲熊並濟陽人似皆不應載入衛輝人物志但卷內江蔡諸人並籍隸考城而考城與儀封接壤南齊書南徐州有南濟陽郡領考城縣蓋僑置也故仍存之而考正附注焉江重欣濟陽人性清介雖處晴室如對嚴實位至射聲校尉蔡仲熊濟陽人禮樂博聞執經議論往往與時宰不合亦終不改操求同仕至尚書左丞當時恨其不遇江泌考城人少貧晝日砍屧為業夜讀書隨月光光斜則握卷升屋母亡後以生缺供養遇鮭不忍食武帝以為南康王子琳侍讀建武中明帝害諸王後泌憂念子琳及子琳被害泌往哭之淚盡續以血親視殯葬乃去泌尋卒泌族人與泌同名世謂泌為孝泌以别之梁江淹考城人少孤貧姦學沈靜少交遊起家南徐州從事尋以秀才對策上第齊明帝時為御史中丞彈劾不避貴近內外肅然明帝謂曰自宋以來不復有嚴明中丞君可謂近世獨步遷祕書監入梁為左衛將軍封醴陵侯卒諡曰憲所著有前後集並齊史十志行於世江革考城人幼而聰明六歲解屬文家貧與弟觀入太學謝朓常候革時大寒雪革敝絮單席耽學不倦朓割半氊與充臥具而去入梁為御史中丞彈奏權豪一無所避後隨豫章王鎮彭城及失守為魏人所執魏徐州刺史元延明聞革才名厚相接待革稱腳疾不拜延明將害之見革詞色嚴正更加敬重遂放還明帝晏勞曰今日始見蘇武之節纍遷度支尚書卒諡曰強蔡撙興宗子少方雅退默丁母憂廬於墓側入梁為吳興太守不飲郡井齋前自種白莧紫茄以為常餌詔褒其清天監中纍遷吏部尚書在選宏簡有名稱又為侍中領祕書監風骨梗正氣調英嶷當朝無所屈讓後為中書令卒諡曰康范岫考城人早孤事母以孝聞名行為時輩所與仕齊為太子家令纍官尚書左丞入梁終祠部尚書岫博述多通尤悉晉魏以來吉凶故事南鄉范雲嘗謂人曰諸君進止威儀當問范長頭以岫多識前代舊事也自親喪後終身布衣疏食每所居官恆以廉潔著稱所著有禮論雜儀字訓江蒨斆之子幼聰警讀書過目便能諷誦仕齊起家祕書郎居父憂以孝聞廬於墓側服闋纍遷建安內史入梁厯尚書吏部郎領右軍蒨方雅有風格漢射徐勉權重惟蒨及王規與抗禮不為之屈遷光祿大夫卒諡曰肅蒨好學尤悉朝儀故事撰江左遺典三十卷未就有文集十五卷江紑蒨之子幼有孝性年十三父患目疾紑衣不解帶者期月夜夢一僧云患眼者飲慧眼水必差及覺説之莫能解者紑第三叔祿與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真能度彼岸乃因智者啓捨同夏縣界牛屯里舍為寺敕以慧眼為名及就創造泄故井井水清冽異於常泉依夢取洗遂差及父卒廬於墓側終目號慟不絶聲月餘亦卒子總篤學有文辭仕梁陳隋有文集三十卷江子一考城人少好學有大志以家貧缺養因蔬食終身起家為王國侍郎其姑夫左衛將軍朱異權要當朝欲引子一為助子一末嘗造門後為南津校尉弟子四厯尚書右丞子五為東宮殿直主帥兄弟性並剛烈子四自右丞上封事極言得失侯景之亂子一及子四子五並力戰死元帝時贈子一侍中諡曰義子四黃門侍郎諡曰毅子五中書侍郎諡曰烈蔡大寶考城人少孤篤學不倦性嚴整有智謀雅達政事文辭贍速蕭察引為咨議參軍及察稱帝為侍中尚書令章表書記教令詔册並專掌之推心委任以為謀主所著有文集三十卷及尚書義疏陳江德藻革之子性至孝事親盡禮與異産昆弟居恩惠甚篤涉獵經籍善屬文仕梁為尚書比部郎以父憂去職服闋之後容貌毁瘠如居喪時入陳為中書舍人天嘉中使齊著北征道里記三卷還遷御史中丞自求宰縣出知新喻令政尚恩惠頗有異績六年卒於官有文集十五卷子椿亦善屬文位尚書左丞江從簡德藻弟少有文情位司徒從事中郎後為任約所害子兼叩頭流血乞代父命以身蔽刃遂俱見殺天下痛之蔡景厯考城人少俊爽有孝行家貧好學善尺牘工草隸仕梁為海陽令政有能名入陳遷祕書監文帝時以定策功封新豐縣子纍遷度支尚書卒景厯屬文不尚雕靡而長於敘事應機敏速為當時所稱有集三十卷蔡凝撙之孫博涉經傳有文詞尢工草隸仕吏部侍郎才地為時所重遷給事黃門後主嘗置酒歡甚將移晏宏範宫衆人皆從惟凝不行曰長樂尊嚴非酒後所過臣不敢奉詔衆皆失色出為晉熙王府長史製小室賦以見志甚有詞理陳亡入隋道病卒魏江文遙考城人父悅之好兵書有將略仕宋厯諸王參軍入梁以討賊劉季連功進冠軍將軍正始二年與夏侯道遷俱歸魏尋卒贈輔國將軍梁州刺史諡曰莊文遙少有大度輕財好士仕魏為咸陽太守政為諸郡之最遷安州刺史時幽燕以南悉沒文遙孤城獨守鳩集荒餘且耕且戰百姓皆樂為用隋翟普林楚邱人事親以孝聞躬耕色養父母疾親易燥溼不解衣者七旬大業初父母俱終哀毁殆將滅性廬於墓側負土為墳家有烏犬隨其在墓若普林哀臨犬亦悲號二鵲巢其廬前柏樹入廬馴狎無所驚懼司隸巡察奏其孝感擢授孝陽令華秋臨河人幼喪父事母以孝聞家貧傭賃為養母患疾秋容貌毁悴鬚鬢頓改母終遂絶櫛沐髮盡秃落廬於墓側負上成墳人欲助者輒拜而止之有一兔常宿廬中馴其左右郡縣以狀聞煬帝遣使勞問表其門閭後羣盜起往來廬之左右咸相誡曰勿犯孝子鄉人賴以全者甚衆徐孝肅汲郡人早孤不識父及長問其母父狀因求畫工圖其形象搆廟置之而定省焉朔望享祭養母至孝母終茹蔬飲水盛冬單縗哀毁骨立祖父母父母墓皆負土成墳廬於墓所四十餘載𬒳髮徒跣遂以身終其弟德備聰敏通涉五經河朔間稱為儒者德備終子處默又廬於墓側奕世稱孝焉蔡徵景厯子幼聰敏精識強記七嵗丁母憂居喪如成人禮繼母劉氏視之不以道徵供侍益謹初無怨色仕陳纍遷中書令於當朝制度憲章儀軌户口風俗山川土地問無不對隋文帝聞其敏贍召見顧問言輒會旨除太常丞轉給事郎卒唐劉政會胙人隋大業中為太原鷹揚府司馬以兵隸高祖麾下王威等二心政會執而囚之武德初授衛尉少卿留守太原調輯戎政遠近歡服厯光祿卿封邢國公貞觀初轉洪州都督卒太宗手詔政會昔預義舉有殊功葬宜異等於是贈民部尚書諡曰襄後追贈渝國公王恭白馬人少篤學教授鄉閭弟子數百人貞觀初拜太學博士講三禮别為義證甚精博蓋文懿文達皆當時大儒每講遍舉先儒義而必暢恭所説謝偃衛人貞觀初應詔對策髙第厯高陵主簿上書陳得失帝稱善引為宏文館直學士遷魏王府功曹嘗為塵影賦二篇帝美其文又獻惟王誠德賦其賦蓋規帝成功而自處至難云時李百藥工詩而偃善賦時人稱李詩謝賦官終湘潭令趙元河間人祖掞徙居汲元少負志略好論辨遊雒陽士爭慕嚮武后稱制調宜祿尉尋卒其友魏元忠等共諡昭夷先生劉奇政會子長壽中為天官侍郎薦張鸑司馬鍠為監察御史二人因申屠瑒以謝奇正色曰舉賢本無私何見謝聞者皆竦崔日知靈昌人少孤貧力學以明經進至兵部員外郎與張説同為魏元忠朔方判官以健吏稱會譙王重福之變官司逃日知獨率吏卒助屯營擊賊遷殿中少監終潞州長史崔日用日知從父弟擢進士第為芮城尉厯遷修文館學士時韋后專制謁臨淄王以自託且密贊大計韋氏平以功授黃門侍郎封齊國公尋為荆州長史入奏計因言太平公主逆節有萌請捕逆黨帝納之以功進吏部尚書會帝誕日日用采詩大小雅二十篇及司馬相如封禪書獻之借以諷諭且勸告成事後徙并州長史卒子宗之好學寬博有風檢與李白杜甫以文相知盧懷慎滑州人范陽著姓祖哲仕為靈昌令遂為縣人懷慎第進士厯中丞上疏陳時政遷黃門侍郎與魏知七分領東都選開元𥘉進黃門監自以才不及姚崇故事皆推而不專卒時遺言薦宋璟等帝悼而歎之懷慎清儉不營産服器無金玉文綺之飾雖貴而妻子猶寒飢所得祿賜於故人親戚無所計惜隨散輒盡于奐早修整為吏有清白稱仕終尚書右丞盧奕懷慎少子天寶初為鄠令治最積功擢給事中拜御史中丞自懷慎奐及奕三居其官清節似之時傳其美俄留臺東都兼知武部選安祿山陷東郡吏亡散奕朝服坐臺被執將殺之即數祿山罪徐顧賊徒曰為人臣者當識順逆我不蹈失節死何恨臨刑西向再拜而辭罵賊不空口逆黨為變色肅宗詔贈禮部尚書諡貞烈甄濟無極人家衛州少孤好學以文雅稱居青巖山十餘年遠近服其仁環山不敢畋漁天寶中以左拾遺召安祿山求濟於帝授范陽掌書記居府中論議正直久之察祿山有反謀不可諫密置羊血左右至夜若嘔血狀陽不支舁歸舊廬祿山反使蔡希德封刀召之濟色不動希德嗟嘆止刀以實病告東都平肅宗召館之三司署使汙賊官羅拜以愧其心授祕書郎厯侍御史卒甄逢濟子幼而孤及長耕宜城野自力讀書不謁州縣歲飢節用以給親里大穰則賑其餘於鄉黨貧狹者朋友有緩急輒出家資周賑以義聞逢嘗以父名不得在國史欲詣京師自言元和中袁滋表濟節行而逢與元稹善稹移書於史館修撰韓愈由是父子俱顯名班宏汲人父景倩國子祭酒以儒名家宏天寶中擢第高適鎮劒南表為觀察判官貞元初賦調益急以户部侍郎副度支使韓滉竇參代滉德宗以宏熟天下計進尚書副參尋判度支清潔勤力晨入官署夕而出吏不堪勞而己益恭卒諡曰敬高郢衛州人父伯祥為好畤尉安祿山陷京師將誅之郢尚幼解衣請代賊義並貸之寶應初及第代宗為太后營章敬寺郢上書諫以茂才異行高第纍擢咸陽尉李懷光引佐邠安府懷光反欲悉兵鼓而西時渾瑊提孤軍抗賊郢恐為懷光所乘與李鄘固止之因與李鳴嶽張廷英謀間道歸國事泄懷光斬二將引郢詰誚郢抗辭無所愧隱觀者為泣下懷光慙赦之懷光已誅李晟表其忠召拜主客員外郎進禮部侍郎凡三歲甄幽獨抑浮華流競之俗為衰順宗時以尚書右僕射致仕卒諡曰貞子定早慧長通王氏易仕至京兆府參軍盧元輔奕孫犯子少以清行聞擢進士輔崇文校書郎厯抗常絳三州刺史課最纍官兵部侍郎元輔端靜介正能紹其祖故厯顯劇而人不以𣏌之惡為纍云劉崇望政會七世孫字希徒及進士第以員外郎主南曹選事清辦僖宗幸山南王重榮不肯率職崇望以諫議大夫持節往既至陳君臣大義動之重榮順服昭宗時為門下侍郎判度支楊守信反帝列兵延喜門命崇望守度支庫禁卒將大掠崇望駐馬勞曰公等不帝前殺賊取功名而苟欲剽掠成惡名乎士皆唯唯至長樂門賊望兵至乃遁去仕終兵部尚書兄崇龜擢進士仕纍華要終清海軍節度使蒞政精明姻舊或干以財率不答但寫荔枝圖與之弟崇魯景福中以水部郎中知制誥時昭宗以李磎為相崇魯掠其麻曰今雖乏人豈宜取憸人為之磎由是不得相著有忠臣孝子録節義傳等編行世鄭遨白馬人少好學敏於文詞唐末入少室山為道士與李振故善振後事梁貴顯欲以祿遨遨不顧聞者髙其行後徙居華陰唐明宗時以左拾遺召晉高祖復以諫議大夫召皆不起自號為逍遙先生好飲酒奕棋時為詩章人間多寫以縑素相贈遣以為寶至武圖寫其形玩於屋壁其迹雖遠而名愈彰宋魏仁浦汲人幼孤貧母為假黃縑製署服仁浦年十三歎曰為人子不克供養乃使慈母求貸以衣我因辭母詣洛陽隸樞密院為小吏周祖即位為羽林將軍充承旨嘗問仁浦諸州屯兵之數及將校名氏手疏於紙校簿無差周祖倚重焉世宗時由樞密使命為相宋初進位右僕射性寬厚務以德報怨當時稱其長者子咸熙性仁孝寬厚仕至太僕少卿咸信官陜州大都督府長史保平軍節度頗知書善待士孫昭亮拜西上閣門使加領恩州團練使崔頤正封邱人與弟偓佺並舉進士明經術頤正雍熙中為高密尉遷殿中丞帝召説莊子一篇賜錢五萬咸平初召説尚書大禹謨賜牙緋自是日令侍講説尚書至十卷年老表求致仕偓佺淳化中厯連江尉判國子監李至奏為直講真宗幸國學召説尚書景德後令講道德經三年卒嘗撰帝王手鑑十卷王昭素酸棗人篤學不仕有志行為鄉里所稱鄉人爭訟不詣官府多就昭素決之昭素博通九經尢精詩易著易論二十三篇開寶中召赴闕見於便殿令講易乾卦因訪以民間事昭素所言誠實無隱帝嘉之以衰老求歸鄉里拜國子博士致仕昭素頗有人倫鑒初李穆兄弟從昭素學易嘗語人曰穆兄弟皆令器穆尤沈厚他日必至廊廟後果參知政事子仁著亦有隱德張圭衛州人七世同居真宗時旌表仍寬其祖調傅求考城人有吏能幹局由甲科通判泗州厯梓州路轉運使縣吏冒取播州田夷獠恐而叛求馳往按所以狀黥吏置嶺南夷人聞之散去進秩徙陜西關中行當十錢盜鑄不可計求亟下令更為當三民出不意盜鑄遂止召為户部副使番酋蘭氊獻古渭州地范祥納之請繕城屯兵又括熟户田請羌叛夏人欲得渭地移文來索張升請棄之詔求往視求以為城己訖役且已得而棄非所以強國威乃諭羌衆反其田報夏人以渭非其有不應索正其封疆而還兵遂解遷樞密直學士知開封府改知兗州卒劉隨考城人及弟為永康軍判官有惠政遷右司諫隨在諌職數言事嘗論丁謂姦邪不宜遷之內地又因太后未歸政隨請軍國常務專稟帝旨入諌太后不宜數幸外家與孔道輔曹修古皆以清直聞遷天章閣待制卒趙賀封邱人事繼母至孝舉毛詩及第輔臨朐主簿有才幹改大理寺評事鹽池吏欺緡錢選賀往解州鈎校出入悉得其姦以太子中舍安撫京東纍遷工部郎中為江淮制置發運使嵗漕米溢常數一百七十萬流民歸占者二萬六千尸或出田租三十萬纍遷光祿卿入判大理寺厯知鄧越濠廬鄭蔡壽等州卒欒崇吉封邱人少為吏部令史上書言事輔臨淄主簿令坐贓敗即以崇吉代之復以書判優等改舒州團練判官纍遷殿中丞明習文法清白勤事至道初擢度支員外郎度攴副使時以楊文質為祕書丞提點五房事帝謂曰汝見擢用欒崇吉否當自勗勵真宗時纍擢江南轉運使後遷司農少卿知洪州有司歲斂民財造舟崇吉奏罷之遷衛尉少卿以將作監致仕韓璹汲縣人登進士第知安喜縣韓琦稱其才為開封司録具徭役利害上之詔司馬光陳洙詳定條式遂革大姓漁并之弊神宗初為梓州路轉運使朝廷命諸道議更役法璹議上帝褒之知澶州河決晝夜扞禦以勞官大中大夫杜常衛州人昭憲太后族孫折節學問無戚里氣習中第調河陽司法參軍事富弻禮重之厯任工部尚書崇寧中知河陽軍會苦旱及境而雨大河決常親護役郡賴以安陳興衛南人開寶中應募為卒纍官本州團練使興起行伍有武略所至著聲績真宗言軍校之材必以興為能陳伯玉臨河人及第遷太常博士監察御史丁父喪哀毁墳木連理憂除遷殿中侍御史天聖五年祀南郊中外以為丁謂復還伯玉上疏請不原赦帝然之厯任户部度支鹽鐵副使汴倉納糧綱槩量不實伯玉始奏選官監視謂之定計斗面積遷至尚書工部郎中李載黎陽人少苦學隆暑讀書置足於水雖得疾不舍去登第知寇氏縣吕夷簡薦其才凡六為州以寬厚稱性篤孝侍母病不解帶至病亟不能食載亦不食母知之為強食仕至光祿卿賀鑄衛州人喜談當世事雖貴要權傾一時小不中意極口詆之無遺辭人以為近俠是時江淮間有未芾以魁岸奇譎知名鑄以氣俠雄爽適相先後二人每相遇瞋目抵掌論辨鋒起終日各不能屈鑄所為詞章往往傳播在人口自裒歌詞名東山樂府楚衍胙城人少通四聲字母於九章緝古綴術海島諸算經尤得其妙善推步陰陽星厯之數間語休咎無不中自陳試宣明厯輔司天監學生遷保章正天聖初授靈臺郎與掌厯官宋行古等九人制崇天厯進司天監丞皇祐中同造司辰星滿厯十二卷金陳顔汲縣人父光宋季調壽陽尉未赴值金兵取汴光病圍城中顔間關渡河往省其父因扶疾北歸家奴誣告光與賊殺人光繫獄搒掠不勝因自誣服顔詣郡請代父死太守哀之不敢決適帥臣至郡以其狀白帥曰此真孝子也遂并釋之天會七年詔旌其門閻忠滑州人衛王時開州刺文賽噶叛忠單騎入城縛賽噶以出由是漸被擢用蔡城破與磁州人郝乞同日戰死賽噶舊作賽哥今改正元王惲汲縣人操履端方好學善屬文中統𥘉左丞姚樞宣撫東平辟為詳議官上書論時政纍擢中書省都事治錢榖擢才能議典禮考制度咸究所長至元五年拜監察御史論列凡百五十餘章裕宗在東宮惲進承華事略二十篇成宗即位獻守成事鑑十五篇所論悉本經旨又纂修世祖實録集聖訓六卷上之後乞致仕授其子公儒衛州推官以便養卒諡文定所著述有百卷張思明其先獲嘉人徙居輝州思明穎悟過人讀書日記千言由侍儀舍人纍擢湖廣都事元貞初召為中書省檢校六曹無滯案延祐三年拜中書參知政事皇慶初浮屠妙總統有寵敕書中官其弟五品思明執不可曰選法天下公器徑路一開來者雜沓雖違旨獲戾不忍隳祖宗成憲久之近臣疾其持法峭直日搆讒間改工部尚書勤政如初天厯初以中書左丞入覲敷陳纍朝任賢使能治民足國之道因以衰老辭思明平生不治産蓄財收書三萬七千餘卷尢明於律與謝仲和曹鼎新同稱三絶卒諡貞敏王遜志惲曾孫至正末遷太常禮儀院事明師入燕公卿爭出降遜志獨家居衣冠而坐其友王翼來告曰新朝寬大不惟不死且仍與官盍出詣官自言狀遜志拂然斥之曰君既不忠又誘人不義耶因戒其子曰汝謹繼吾宗即自投井死李鉉濬縣人守延平擊寇於政和泗州橋弗克死贈隴西郡公兄鈞纍以戰功至懷遠大將軍亦以討寇沒於難閩人號曰雙忠明宋訥滑縣人元至正進士任鹽山尹棄官歸洪武初授國子助教遷翰林學士撰文廟碑稱旨改文淵閣大學士轉祭酒嚴立學規講解無虛晷卒諡文恪訥性持重學問該博嘗應詔陳邊防長策帝多用其言靳義淇縣人洪武中以太學生授御史永樂初出按畿輔治貪墨決疑獄日恆蔬食在官如僧遷湖廣按察司副使奏劾吳公悅王玉姦貪罪狀風紀肅然王越濬縣人景泰進士為御史有聲厯官兵部尚書總制大同及延綏甘寧軍務凡三出塞收河套地身經數十百戰於邊徼險易將士勇怯核如指掌出奇取勝謀定後發人莫測其際御下嚴而有恩故所統將校皆效死力以功封威安伯卒諡襄敏黃紱封邱人正統進士除行人擢南京刑部郎中大猾談千户者占民蘆場莫敢問紱奪還之民後巡撫延綏捕豪猾問病苦宏治三年拜南京户部尚書就改左都御史厯官中外四十餘年操履潔白所至有建樹陳瑛封邱人母早喪事繼母翟氏孝謹翟卒瑛廬墓三年白兔烏鵲並集於舍成化聞詔旌其門張衍瑞汲縣人宏治進士知清豐縣以執法忤劉瑾逮下詔獄瑾誅復起厯吏部郎中諌武宗南巡受杖謫官嘉靖初擢太常少卿時同縣人刑部照磨劉珏亦以諫南巡杖死肅宗時贈刑部主事李可登輝縣人宏治末舉於鄉嘉埥初為兵部司務以忠義自許及爭大禮廷杖死穆宗立贈光祿寺丞李光翰新鄉人進土授南京給事中正德初以災異求言光翰疏劾中官苗逵保國公朱暉督師無功顧受厚賞及司禮高鳳李榮納路招權又偕同官奏留劉健謝遷遂逮繫廷杖除名後起台州知府宋明濬縣人𥘉授户部主事督倉臨清中官監儲橫肆明一裁以法遷員外郎有中貴乞莊田濫及容城諸邑明往按廉得其情抗疏釐正之後為兩漸鹽運使卒盧柟濬縣人博聞強記落筆數千言性跅弛嘗為具召邑令日晏不至柟撤席而臥令至柟巳醉不具賓主禮令銜之誣以殺役夫罪論死獄中作幽鞠放招二賦從陸光祖知濬縣反其獄乃得出柟騷賦為王世貞所稱詩亦雄放鄧伯裕滑縣人萬厯進士厯官甘肅巡撫著邊功仕至兵部尚書屈可伸延津人天啓進士授檢討遷侍講與修神宗實録嘗作神器局記數千言皆古名將所未言者位終詹事賀仲軾獲嘉人萬厯進士詣闕上書極陳時事語皆痛切不報後厯官陜西副使甲申之變慷慨自經妻妾皆從死本朝乾隆四十一年賜諡節愍閻祺滑縣人諸生兄禧被流賊李自成所虜祺千里尋兄遇寇不屈死本朝任文華新鄉人明崇禎舉人李自成僭據西安迫之仕棄家逃避本朝成進士授廣信府推官廉直有聲李嵩陽封邱人明崇禎舉人本朝纍官監察御史時有冤獄久不得直嵩陽至即力為昭雪尋巡鹽兩淮夙弊浩繁以私販係獄者纍纍嵩陽為疏滯壅而課以法商民大悅纍遷廣西按察使李實發汲縣人明崇禎舉人本朝任襄陽府推官值逆辨作亂𬒳執不屈罵賊死贈僉事劉源湛新卿人順治丁亥進士知大冶縣勇於有為時江西鎮兵譁頑民聞風反側源湛殱其巨魁餘悉就撫報最遷鞏昌府同知分轄涼州逆􅉰作難復殄平之升禮部郎中厯山東監司攝臬篆案牘煩積日夜檢閲不假手於人疑獄頓清卒祀鄉賢馬大士濬縣人幼失恃事繼母孝養倍篤登順治戊戌進士由庶吉士改監察御史條奏時政請嚴加派處分熱審減等及停追俸祿嚴禁私販硝磺等疏悉被嘉納尋巡視兩淮鹽政掌京畿道事以憂回籍建立義墩延師迪後學成就甚衆孫博雅本容城人父奇逢遷輝縣遂家焉博雅沈潛理學康熙八年舉山林隱逸博雅以親老固辭父殁偕兄望雅弟韻雅結廬墓側三年不見齒韻雅有罪繫獄為具槖饘日事奔籲竟客死長安學士大夫高其義稱文孝先生李實秀汲縣人順治丙戌進士任湖東道時永豐鉛山玉山等處盜賊盤踞實秀招撫賊首散其黨羽四境獲安後遷鳳宿道平海寇有功厯鬱林道楊育蘭新鄉人父文秀性純孝歲飢捐榖賑濟育蘭登順治丙戌進士授江寧推官聽訟明決巡按兩浙鹽漕以廉明稱厯官衡永郴道參議暢泰兆新鄉人父策順治舉人以孝行稱泰兆登康熙巳未進士任祁門知縣土豪蠧胥悉繩以法無敢犯者再任稷山革除雜派平反冤抑官至工科給事中陳起元汲縣人康熙舉人任邵陽知縣設學田延師以教俊秀聽訟明慎民無冤獄高遐昌淇縣人康熙丙辰進士事繼祖母繼母以孝稱除東莞知縣調茂名俱有政績纍遷兵科給事中疏陳免糧兼及租户請京師每歲煮賑展限三月永為定例郭遇熙新鄉人父士棟孝友端方學以濂洛關閩為宗遇熙康熙乙未進士兄弟同居數十載逮析㸑田宅盡讓與諸兄弟仕廣東從化知縣著有循聲擢刑部主事卒郭培墉新鄉人優貢生乾隆元年舉孝亷方正性至孝母殁廬墓三年晨夕哀號塋外舊有先世祠一夕𬒳火培墉抱木主冒火而出倉卒中遺生母像復衝入烈焰檢得之有藥賈宿其家遺金百兩培墉追還之耿之翰輝縣人父患痿痺臥牀褥不能轉側者六年之翰日夜侍牀下飲食便溺不假他人手母病侍奉如父學使者聞於朝祀忠孝祠孫用正輝縣人父喪寢處柩旁三年不飲酒茹葷母殁亦如之廬墓側者三年乾隆年間旌賈龍圖獲嘉人武生任陜州營千總嘉慶四年赴陜州漫州關堵禦賊匪撫防得宜授行營千總旋調赴湖北屢戰奮勇擢守備七年於東湖縣霧渡河擊賊陳亡事聞豫雲騎尉世職秦一清滑縣人諸生嘉慶十八年教匪滋事興同縣諸生秦秉鐸許九牧皆遇賊被戕事聞旌恤朱繼連滑縣人諸生嘉慶十八年教匪滋事繼連與村人王大小朱振邦等團練鄉勇拒賊被戕賞恤如例流寓唐李績離狐人客衛南家富積粟常數千鍾與其父蓋皆喜施貸所周給無親疏之間宋邵雍其先范陽人徙共城堅苦刻勵冬不爐夏不扇夜不就席者數年張鑑范陽人幼嗜學入衛州霖落山肄業凡十餘年元姚樞柳城人太宗時為燕京行臺郎中棄官攜家居輝州作家廟别為室奉孔子及宋儒周子像刋諸經惠學者時許衡在魏至輝就録程朱所注書以歸列女梁江淹母淹年十三時孤貧嘗採薪以養曽於樵所得貂蟬一具將