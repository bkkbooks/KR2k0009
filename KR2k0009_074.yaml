內向邑詩作都于向左傳隱公十一年桓王以蘇忿生之田與鄭有向注軹縣西有地名向上竹書紀年魏襄王二十四年鄭使韓辰歸陽及向二月城陽向更名陽為河雍向為高平水經注天漿水出軹南睪向城北俗謂之韓王城闞駰十三州志軹縣南山西曲有故向城即周向國也括地志韓王故城在河陽縣西北四十里湛城在濟源縣南後漢書郡國志河陽有湛城水經注湛水自向城南徑湛城東或謂之隰城非也陽城在濟源縣西南周畿內樊邑左傳隱公十一年桓王以蘇忿生之田與鄭有樊注樊一名陽樊野王縣西南有陽城又僖公二十五年晉文公定王室次于陽樊國語王以陽樊賜晉後漢書郡國志修武有陽樊注服虔曰樊仲山甫之所居故名陽樊水經注湨水南源出陽城南溪府志陽樊城在濟孟之交湨水南岸今呼皮城原城在濟源縣西北周初原國左傳隱公十一年王以蘇忿生田與鄭有原注原在沁水縣西後漢書郡國志軹有原鄉水經注濟水東源出原城東北昔晉文公伐原以信而原降即此城也俗以濟水重源所發因復謂之濟源城隋書地理志濟源有古原城括地志城在濟源西北二里寰宇記在今縣九里勳掌城在濟源縣西北二十五里水經注湨水出原城西北二里勳掌谷北齊書斛律光傳河清二年光築勳掌城於軹關西仍築長城二百里置十二戍攢城在修武縣西北二十里左傳隱公十一年王以蘇忿生田與鄭有攢注攢在修武縣北後漢書郡國志修武有攢茅田注縣西北有攢城通鑑地理通釋攢茅在修武縣北今為大陸村殷城在武陟縣東南水經注朱溝東徑殷城北述征記曰河之北岸河內懷縣有殷城或謂楚漢之際殷王卬治之非也按竹書紀年秦師伐鄭次于懷城殷殷即是城也晉劉聰以郭默為殷州刺史都督緣河諸軍治此元和志殷城在縣東南十里隰城在武陟縣西南十五里左傳隱公十一年王以蘇忿生田與鄭有隰城又僖公二十五年寬侯殺太叔于隰城注在懷縣西南樊城在武陟縣西南四十里今名古樊城相傳樊噲屯兵於此永橋城在武陟縣西高齊有永橋大都督蓋城近河陽設以控三城之險後周書大象工年韋孝寬討尉遲迥進次永橋城之東南諸將士以此城當路請先攻之孝寬以城小而固引軍次於武陟寰宇記隋大業十年移修武縣於永橋縣志永橋即今縣西虹橋鎮沁陽城在武陟縣西水經注懷縣北有沁陽城魏書地形志山陽有沁陽城府志沁陽城在沁水北河內武陟之交今呼為沁陽村無辟城在孟縣東後魏太和二十年廢太子恂置於河陽無鼻城在河橋北二里水經注湨水徑無辟邑西世謂無比城亦曰馬髀城北中城在孟縣南水經注河北側岸有二城相對置北中郎府徙諸縣隸府户并羽林虎責領隊防之後魏武泰初爾朱榮自晉陽南下胡太后遣將守河橋及北中城以拒之永安元年元皓入洛遣陳慶之守北中城自據南岸分兵守河中渚又遣别將緣河固守三年魏主誅爾朱榮遣將軍奚毅等將兵鎮北中東魏元象元年又築南城及中灘城是為三城使潘樂屯北中城高永樂守南城其後汗薩出為五城都督鎮河陽蓋有五城矣寰宇記孟州城即北中府城也後魏太和二十年置高齊於其中置行臺周武平齊改為河陽鎮隋開皇十六年復置河陽縣治此按元史地理志孟州金大定中為河水所害北去故城十五里築今城徙治焉故城謂之下孟州新城謂之上孟州元初仍治下孟州憲宗八年復治上孟州州今有下孟鎮在縣南十八里即故孟州治鄧城在孟縣西南戰國魏邑史記秦本紀昭襄王十六年左更錯取軹及鄧注南陽有鄧縣括地志故鄧城在河陽縣西三十一里冶坂城在孟縣西南冶坂津述征記即春秋踐土水經注冶坂城舊名漢祖渡城險固南臨孟津城中灘城在孟縣西南河陽三城之一也元和志東魏元象元年築仍置河陽關洪邁容齋隨筆河中一洲名曰中灘上有河伯祠水環四周喬木蔚然嘉祐八年秋大水懷襄了無遺迹中灘由此遂廢明統志中灘城今夾灘縣志即今黃河中郭家灘南城在孟縣西南寰宇記南城與河陽縣接東魏元象元年築通鑑地理通釋南城在河陽縣西四面臨河即孟津之地安國城在孟縣西南水經注同水東北流徑安國城西湨水東南徑安國城東程莊城在孟縣西南元統志程莊城在河陽縣北十五里遺址存焉冶城在孟縣西北水經注天漿水東北徑一故城俗謂冶城縣志冶城俗呼為冶墻今縣西北路有冶墻村李城即今溫縣治後漢書郡國志平皋有李城水經注奉溝水徑李城西秦攻趙邯鄲李同説平原君勝分家財饗士得敢死者三千人李同與赴秦軍秦軍退李同死封其父為李侯即此城也元和志隋大業十三年自故溫縣移於今理西南至河南一百三里司馬城有二一在溫縣西二十里招賢鎮司馬懿所築一在武陟縣西南三十里晉司馬氏所居其鄉有司馬村安昌城在溫縣東北水經注沙溝水東南徑安昌城西漢成帝河平四年封丞相張禹為侯國魏書地形志平皋有安昌城元和志安昌故城在武德縣東南十三里新志有南北二平皋安昌蓋即北平皋也陽池城今原武縣治竹書紀年魏惠王十五年遣將龍賈築陽池以備秦水經注陰溝右瀆東南徑陽城北元和志原武縣隋復置縣理即古陽池城安城在原武縣東南史記魏世家昭王十三年秦拔武安城又無忌謂魏王曰通韓上黨於共􅑔使道安城出入賦之通鑑地理通釋安城在鄭州原武縣東南二十里垣雍城在原武縣西北五里即衡雍也左傳僖公二十八年晉侯敗楚師於城濮還至於衡雍注衡雍鄭地今滎陽卷縣史記秦本紀昭襄王四十八年韓獻垣雍又魏世家信陵君謂魏王曰秦有鄭地得垣雍注徐廣曰垣雍城在卷縣卷屬魏也水經注陰溝左瀆絶長城徑垣雍城南昔晉文公戰勝於楚周襄王勞之於此故春秋書甲午至於衡雍作王宫於踐土吕氏春秋曰尊天子於衡雍者也長城在原武縣西北竹書紀年梁惠成王十二年龍賈帥師築長城於西邊戰國䇿蘇秦説魏王曰西有長城之界漢書郡國志卷有長城經陽武到密博浪城在陽武縣東南史記張良為韓報仇得力士為鐡錐狙擊秦皇帝博浪沙中索隱地在陽武南今浚儀西北四十里有博浪城元和志博浪沙在陽武縣東南五里棣城在陽武縣北左傳襄公五年諸侯戍陳子囊伐陳會於城棣以救之杜預注城棣鄭地陳留酸棗縣西南有棣城元和志南棣北棣二故城在陽武縣北十里懷宫在河內縣治後漢書光武紀建武元年祠高祖太宗於懷宮注懷河內縣名有離宮周書武帝紀宣政元年行幸懷州置懷州宫河陽宮在孟縣南寰宇記河陽縣隋煬帝置河陽宫入唐宫廢深井里在濟源縣南故軹城旁即聶政所居史記刺客傳聶政者軹深井里人也鐡岸在濟源縣北濟瀆廟東夾濟河岸如鐵石因名竹塢在河內縣東北明月山之南乾隆十五年嵩洛經此有高宗純皇帝巡幸御製駐蹕竹塢詩鍾繇塢在濟源縣東南鍾王村水經注湨水東徑鍾繇塢北世謂之鍾公壘白騎塢在孟縣西北水經注同水東北流徑白騎塢南塢在源上為二溪之會北帶深隍三面阻險惟西版築而巳縣志漢末賊將張白騎所築故名今名為白墻縣北西路有白墻村新城壘在河內縣東北九置元和志武德三年劉德威置營於此東吳壘在孟縣西南晉升平元年泰山太守諸葛攸率水陸軍擊燕入自石門屯於河渚燕將慕容詳等與攸戰於東吳即此鉤陳壘在孟縣西南四十里水經注河南有鉤陳壘世傳武王伐紂八百諸侯所會處紫微有鈞陳之宿主兵陳是以壘資其名七賢鄉在修武縣北晉初阮籍嵇康山濤王戎向秀劉伶阮咸同居山陽時人號為竹林七賢避暑録語七賢竹林在今懷州修武縣初若欲避世遠禍者然反以此得名本朝乾隆十五年經此有高宗純皇帝御製七賢詠詩文侯鄉在陽武縣西北二十五里漢丞相張蒼故里聃村在修武縣西二十里周老聃所居孔子與南宫敬叔適周問禮於此亦名孔莊義門村在修武縣西二十里宋張宏毅家於此有連理槐兩樹相去三步許上枝交貫為一今猶盛茂前有龍虎二石不假雕刻形象天成懷慶舊衛在河內縣治東明洪武七年建今廢沁園在河內縣東北沁水北岸金時官僚宴會之所有石圖本今廢吏隱園在濟源縣治有唐元和年碑記竇氏園在濟源縣北鐵岸之北宋王巖叟詩云李郭名園竇氏鄰傳林花竹遠相親言李郭傅三園相去不遠也會春園在濟源縣北沁河北岸五代周顯德中建桑園在陽武縣曹大家止宿處按文選班昭東征賦云宿陽武之桑園即此許衡别墅在河南縣東北十五里景賢村韓愈别墅在孟縣西十里今呼韓莊盧同别墅在濟源縣西北二十里石村之北有玉川烹茶館在焉同詩買得一片田濟源花洞前石晉别墅有二一在濟源縣西六十里韓村社俗呼特進莊一在孟縣東十五里今呼駙馬莊皆傳晉高祖微時居此張旨宅在河內縣城內司馬故宅在溫縣城內東南隅舊為學宫今為興化寺晉書宣帝本紀司馬氏河內溫縣孝敬里人望嶽樓在河內縣治元初建面嵩少背太行得一郡勝槩迎風樓在河內縣北宋王巖叟有詩避暑樓在修武縣西北百家巖西舊傳漢獻帝避暑於此址磴猶存江樓在陽武縣唐韋承慶有詩懷川閣在府城內宋尹洙建有詩平嵩閣在孟縣南舊孟州治後圃因城為閣北倚太行南憑嵩少俯瞰黃河為河陽勝觀宋司馬光有記揚清閣在孟縣西舊河陽縣治後圃宋慶厯中縣令鮮于亨建高令元敏復新之黃庚堅有詩懷古堂在府治內舊懷州治唐太守杜正倫建草堂在濟源縣西北濟瀆廟西宋傳堯俞建司馬光蘇軾有詩久廢人猶呼為傳家園又有别墅在濟源縣北盤谷德威堂在孟縣南舊孟州治宋文彥博以司空判河陽後其子及甫亦為河陽守彥博以太師就養建此堂蘇軾作銘又有太師堂亦及甫所建刻父三詩于石范祖禹作記鎮山亭在河內縣城內金沁南軍節度使耿光祿建於此厲兵秣馬鎮遏太行之寇碑刻尚存萬柳亭在濟源縣西唐白居易溫庭筠皆有詩苗亭在濟源縣西水經注濝水徑苗亭西春秋苗賁皇采色裴公亭在濟源縣西北濟瀆廟側唐裴休所居李洞有詩房公亭在濟源縣北濟瀆廟西唐房琯建望懷亭在濟源縣東北三十里下臨枋口曲亭在修武縣北後漢延熹二年封尚書令張敬為山陽曲亭侯鄇人亭在武陟縣西南十五里左傳成公十一年晉郤至與周爭郎田注鄇溫别邑懷縣西南有鄇人亭聯芳亭在孟縣西舊河陽縣治後圃宋慶厯中縣令鮮于亨建修武亭在原武縣東左傳成公十五年晉人及鄭子然盟于修澤注卷縣東有修武亭亦名修魚史記秦本紀惠文王後七年韓趙燕齊共攻秦秦使庶長疾與戰修魚注正義曰修魚韓邑水經注濟水自滎澤東經滎陽卷縣之修武亭南扈亭在原武縣西北左傳莊公二十二年公與齊侯盟于扈文公七年趙盾與諸侯盟于扈注扈鄭邑卷縣西北有扈亭水經注河水又東北徑卷之扈亭北竹書紀年晉出公二十二年河絶于扈即此地也烏巢亭在陽武縣東北後漢建安五年袁紹與曹操相持于官渡紹遣淳于瓊北迎運車瓊宿烏巢去紹軍四十里水經注濟瀆東徑酸棗縣之烏巢澤北澤有故亭晉太康地記曰澤在酸棗之東南昔曹操納許攸之䇿破袁紹軍處也大臺在河內縣治東寰宇記河內縣有大臺光武遣王梁擊赤眉賊處憩鶴臺在濟源縣西寰宇記在河清縣西北三十里相傳王子喬浮邱公遊王屋憩鶴於此沁臺寰宇記在濟源縣東北三十里與沁水故城相去五里醒酒臺在修武縣西北百家巖前傳是晉劉伶遺迹宋曹涇大書石刻存鬬雞臺在孟縣西五里唐時洛陽王公貴家歲