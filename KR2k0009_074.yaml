吳元扆太原人太宗時再知河陽淳化五年秋霖河溢奔注溝洫城壘將壞元扆躬涉泥滓督工補塞民多構木樹杪以避水元扆命濟以舟楫設餅餌以食時澶陜悉罹水災元扆所部賴以獲安陳省華閬中人太宗時為濟源令勤政施仁惠及黎庶後遂家焉子堯叟堯佐堯咨相繼知濟源縣後堯叟以右僕射知河陽堯咨以武信軍節度使知河陽俱有政績張知白清池人真宗時遷河陽節度判官奏疏言當今要務真宗異之富弼河南人仁宗時授簽書河陽判官陳襄侯官人仁宗時知河陽縣始教民種稻富弻為郡守一見即禮遇之襄留意教化進縣子弟於學或讒之於弼謂其誘邑子以資過客弼疑焉人勸毁學舍以塞謗不聽久之弻以語襄襄曰自反而縮雖千萬人往矣公苟有惑志何名知己益講説不少懈李之才青社人仁宗時調孟州司法參軍時范雍守孟亦莫之知也雍初自洛建節守延安送者皆出境外之才獨别近郊或病之謝曰故事也頃之雍謫安陸之才見之洛陽前日遠送之人無一來者雍始恨知之之晚蘇緘晉江人仁宗時為陽武尉劇盜李囊索于民賊曹莫能捕緘訪得其處萃衆大索火旁舍以迫之李從中逸出緘馳馬逐斬其首送府府尹賈昌朝驚曰儒者乃爾輕生耶李琮江寧人神宗時吕公著守開封薦知陽武縣役法初行琮處畫盡理旁近民相率撾登聞鼓願視以為則神宗召對擢利州路江東轉運判官向經開封人神宗時知河陽會旱蝗民乏食經度官廪歲用無餘乃先以圭田租入賑救之富人爭出粟多所濟活張景憲河南人元豐初知河陽時方討西南蠻景憲入辭因言小醜跳梁殆邊吏擾之耳且其巢穴險阻若動兵遠征萬一餽餉不繼則我師坐困矣帝曰卿言是也吕公孺壽州人元豐中徙知河陽洛口兵千人以久役思歸奮斧鍤排關不得入西走河橋諸將請出兵掩擊公孺曰此皆亡命急之變且生即乘馬東去遣牙兵數人迎諭之索倡首者黥一人餘復送役所語其校曰若復偃蹇者斬而後報衆帖息乃自劾專命詔釋之杜常衢州人崇寧中以龍圖閣學士知河陽軍時苦旱及境而雨大河決直州西上掃勢危甚常親護役徙處掃上掃潰水溢及常坐而止於是役人盡力河流遂退郡賴以安任諒汝陽人徽宗時為懷州教授徽宗見其所作新學碑曰文士也擢提舉夔路學事仇悆益都人徽宗時為武陟令朝廷方調兵數十萬於燕山悆餽餉畢給時主將縱士卒過市掠物不豫直他邑官逃避悆先期趣備申嚴約束遂以不擾巳而悆送軍餉於涿值大軍潰於盧溝河囊槖往往委以資敵悆聞關營護無一毫棄失張旗宣和中通判河陽權州事奏河陽纍有軍馬經過舉隨身軍器於市肆博易熟食名曰寄頓其實棄遺逃避征役宜諭民首納免貽他患帝善其奏霍安國宣和未知懷州靖康元年路允迪奉使至懷表其治狀加直龍圖閣金騎至遂被圍安國捍禦不遺力城陷將官王美投濠死尼雅哈問不降者為誰安國曰守臣安國也通判州事林淵兵馬鈐轄張彭年都監趙士詝張諶於潛鼎澧將沈敦張行中及隊將五人同辭對曰淵等與知州一體皆不肯降及解衣面縳殺十三人而釋其餘安國一門無噍類尼雅哈舊作粘罕今改正蔣興祖宜興人徽宗時知陽武縣陽武土脈脆惡大河薄其南積雨泛溢掃具輒潰興祖躬救護露宿四旬隄以不壞治為畿邑最靖康初金兵過縣或勸走避興祖曰當死於是與妻留不去金師益至力不敵死焉金王競彰德人熙宗時為河內令時歲飢盜起競設方略以購賊不數月盡得之夏秋之交沁水泛溢歲發民築堤豪民猾吏因緣為姦競核實減費幾半民為之諺曰西山至河岸縣官兩人半蓋以前令韓希甫與競相繼治縣皆有幹能正平令張元亦有治績而差不及故云舒穆魯元懿州路明安人章宗時為沁南軍節度副使河內民家有多美橙者歲獲厚利仇家夜入殘毁之主人捕得乃以劫財誣其人仇家引服贓不可得元攝州事究得其情舒穆魯元舊作石抹元明安舊作猛安今并改正路鐸冀州人泰和末為孟州防禦使貞祐初城破投沁水死元森徹赫薩穆珠台氏太祖時以本部兵就鎮懷孟同僚王榮潛書異志欲殺森徹赫伏甲繫之置佛祠中森徹赫妻沙勒布爾聞之率衆攻榮家奪出之森徹赫裹瘡從二子馳旁郡請兵討榮殺之朝廷遣使以榮妻資産賜森徹赫家且盡驅懷民萬餘口郭外將戮之森徹赫力爭曰為惡者止榮一人耳其民何罪苟朝廷罪使者以不殺吾請以身當之使者還奏帝是其言民賴不死森徹赫給榮妻孥劵放為民遂以其宅為官𪠘秋毫無所取森徹赫舊作純只海薩穆珠台舊作散术台沙勒布爾舊作喜禮伯倫今并改正談資榮懷來人中統元年為懷孟路總管明年入覲賜金符四年易虎符居官時訟至立決教民力田務本談澄懷來人世祖時擢懷孟路總管歲旱令民鑿唐溫渠引沁水以溉田民用不飢教之種植地無遺利王倚宛平人至元二十六年皇孫出鎮懷孟帝為選老成練達舊臣護之乃以屬倚陛辭帝目之良久謂侍臣曰倚修潔人也左右皇孫得人矣及行營幕所在軍政肅然尚野滿城人至元末改懷孟河渠副使會遣使問民疾苦野建言水利有成法宜隸有司不宜復置河渠官事聞於朝河渠官遂罷明廖欽吉水人洪武初為河內丞以忠信導民民有侵課逃匿者欽列姓名榜於市招之民素信欽皆還未及期而課足後坐事謫戍以老病放還道經河內河內民競持羊酒為壽且遺之縑欽固辭不獲遁去沃墅蕭山人洪武初知溫縣時民艱於食墅令墾闢荒蕪樹藝桑棗百姓歌曰田野闢沃公力衣食足沃公育比代去民遮道留之王興宗洪武中遷懷慶知府上計至京帝方以事詰諸郡守至興宗獨曰是公勤不貪不須問方徴莆田人洪武中為懷慶知府志節甚偉遇事敢直言居郡時因星變求言疏言風憲官以激濁揚清為職今不聞旌廉拔能專務羅織人罪多徵贓罰此大患也帝令具實徴指河南僉事彭京以對王德明清苑人嘉靖中為懷慶知府歲飢緩徴貸賑民以不困居數年政化大洽嘉禾瑞麥異瓜生焉袁應泰鳳翔人萬厯進士為河內知縣遊枋口度地形命工鑿山脊引沁水下瀉成二十四堰溉河內濟源武陟孟溫五縣田數萬頃名廣濟河河決朱旺役夫多死者應泰設席為廬飲食作止有度民歡然趨事治行冠兩河石維嶽灤州人萬厯進士天啓中知懷慶府於廳事後建告帝亭事無巨細皆日自紀録焚而告之捐孟縣荒糧三千衣食簡淡嘗一冠三載一被數年王漢掖縣人崇禎進士為河內知縣歲飢人相食漢繪飢民圖籲闕請蠲築城以傭飢民所活數萬巨寇劉二將犯濟源漢出其不意擒以歸又乘雪夜破妖僧智善夜半渡河破賊楊六郎李自成圍開封漢馳金龍口柳林燃火為疑兵遣死士入賊中聲言援軍大至賊懼圍稍解漢有膽決而能虛巳受言在行間與士卒同甘苦善用間諜威名大著丁泰運澤州人崇禎進士除武陟知縣調河內著廉直聲十七年賊將劉方亮自蒲坂渡河東窺懷慶巡按御史蘇京託言塞太行道先遁去叛將陳永福引賊至賊遂逼懷慶監司以下皆竄泰運獨守南城力不能支被執賊擁見方亮使跪不屈燒鐵鎖炙之亦不從乃遇害本朝常鼎漢軍鑲紅旗人順治元年以副將隨總兵金玉和討流寇時李自成黨圍濟源攻孟縣蔓延及清化鎮鼎隨玉和援濟源陳殁時懷慶鎮標同日陳亡者守備則白忠順余國棟陳應傑石斗耀康虎千總則宋國俊趙國相李中王國臣楊虎劉奉相高友才把總則張進仁張光𥙿陳廷機張景泰許養和黨忠直廖得仁薛貴事聞鼎廕鑾儀衛指揮僉事俞國才順治元年為懷慶鎮參將值賊圍孟縣國才堅城守賊攻七晝夜不能下將引去會大雨城壞賊入國才率兵巷戰被戕事聞廕鑾儀衛百户史耀麟祥符舉人順治元年署清化鎮同知蒞任甫兩月執法嚴姦民憾之引賊入執耀麟怒罵不屈賊忿磔其尸妻高氏及婢僕同日殉事聞賜恤王曰俞陽城人順治元年知孟縣綏輯有方寇猝圍城率士民固守七日守將引兵夜遁曰俞死之事聞賜恤時濟源縣典史李應選永康人亦朝服端坐罵賊死邑人葬之東郊題曰死節典史之墓張可舉奉天人順治五年為捕盜通判駐武陟之安郭驛值寇起偽稱獵者入驛西郭門騎百餘披甲持刀仗焚劫入通判署可舉力鬬遇害事聞賜恤張瑃陽城人順治中知原武縣承殘破之後勞來安集期年流亡歸倉庫實乃興學教士絃誦不絶邑濱大河力請閉渡口以除民纍蒞任四載以卓異去卜永升安東人順治十四年知修武縣以廉感民民逃而歸者百餘家堂刻左右針以自警日用儉薄一如寒素謝絶商人饋遺嚴禁額外浮鹽人得按丁食鹽照額銷引官民免纍至今利賴焉謝包京浙江人康熙元年知陽武縣撫輯流移遍給牛禮凡闢草萊百餘頃又請酌濟驛站裁派河夫平鹽價疏鹽引民力獲舒祀名宦沈光榮正白旗人康熙中知河內縣葺學宫勤勸課凡徭役區處有方毫不纍民祀名宦夏錫貴山隂人雍正中判糧捕水利裁革水碓及辦漕陋規採買軍需均平無擾佐郡十四年民思慕如父母焉沈榮昌浙江人乾隆中守懷慶以振興文教為第一其他興利除弊肅吏安民諸務悉次第舉行屬沁水暴漲決古陽隄漂沒廬舍榮昌即日開倉撫恤全活無算所興水利甚夥又嘗輯府志未及刋去士民至今戴之前總纂官臣張琴恭纂輯提調官臣張日章恭覆輯校對官臣鄧遇辰恭校校對官臣章詒燕恭覆校
