以獻帝詔曰汝勸課藝植農不遊惰宜獲瑞參之應七年薨於官父老乞建祠立碑以紀遺愛傅伯成濟源人孝宗時授明州教授以年少嫌以師自居日與諸生論質往復後多成材范成大吳郡人淳熙中知明州奏罷海物之獻李孟傳上虞人知象山縣守薦為邑最林大中永康人寧宗時知慶元府城南民田潮溢不可種大中捐公帑治石築之民蒙其利郡訛言夜有妖大中謂此必黠賊所為立捕黥之人情遂安李韶吳縣人嘉定中調慶元教授丞相史彌遠薦士充學職韶不與袁變求學宫射圃益其居亦不與燮以此更敬韶胡矩寶慶初知慶元府請發栗以浚東錢湖命水軍番上迭休且募七鄉人助役又奏以贏錢二萬八千緍增置田畝分給漁户剃湖中葑茭溉田數千頃孫子秀餘姚人理宗時通判慶元府主管浙東鹽事先是諸場鹽百袋附五袋名五釐鹽未幾提舉官以為正數民困甚子秀奏蠲之吳潛寧國人寶祐中授沿海置制大使判慶元府至官條具軍民久遠之計告于政府奏皆行之又積錢百四十七萬三千八百有奇代民輸帛前後蠲五百四十九萬一千七百有奇姚希得潼川人理宗時知慶元府兼沿海制置使詔增沿海舟師希得為之廣水軍造戰艦蓄糧食蠲米一萬二千石舊逋百萬去官庫餘羡悉以代民輸葉蘿鼎寧海人度宗初知慶元府肅清海冦罪止首惡建濟民倉以備飢寒造驛舍以待賓旅劉黻樂清人咸熙中為沿海制置使知慶元府事建濟民莊以濟士民之急資貢仕春官之費備郡庠耆老緩急之需又請建慈湖書院藩方平陽人為慶元府市舶慶元降附方不屈赴水死元富德庸濟南人至元二十五年知慈溪縣抑豪強清狴犴民樂耕商士興孝弟干文傳平江人延祐時同知昌國州事監場官倚轉運司勢虐使州民家業破蕩文傳語同列曰吾屬受天子命以牧此民可坐視而弗之救乎乃亟為陳理上官莫能奪民賴以免以恩信柔下海島之民雖頑獷不易治亦為之變俗哈尚特穆爾蒙古人至正中為昌國州達嚕噶齊方國殄來攻屢擊破之國珍悉衆至或勸之遁特穆爾曰是我效死之日也城破力戰而死哈尚特穆爾舊作高昌帖木兒達嚕噶齊舊作達魯花赤特穆爾舊作帖木兒今俱改正明王璡日照人洪武末授寧波知府毁淫祠興文教貞廉強幹庶政畢舉自奉儉約一日饌田魚羮怒其妻曰若不憶吾啖草根時耶撤而埋之時號埋羮太守燕師臨江璡造舟勤王被執廢于家易紹宗攸縣人洪武時授象山縣錢倉所千户建文三年倭剽掠至境紹宗大書于壁曰設將禦敵設軍衛民縱敵不忠棄民不仁與妻訣而去密令遊兵間道焚賊舟賊驚救紹宗格戰殺賊追至海岸陷卓中手刃數十賊遂死詔賜祭葬勒碑旌之蔡海閩縣人永樂中為象山教諭倭冦陷城被執罵賊而死宋真和州人永樂中為象山丞倭冦侵縣或勸其當避其曰吾為民牧民被冦吾將安歸與賊搏戰援絶死之鄭珞閩縣人宣德初知寧波府治績稱最中使吕可烈無狀奏劾之可烈伏誅以艱去會海冦犯境民數千詣闕乞留復任張瓚孝感人天順間厯知寧波府有善政成化初市舶中官福住貪恣瓚禁戢其下住誣瓚於朝瓚遂列住罪住𬒳責其黨多扺去瓚名震一時朱欽邵武人成化中為寧波推官治最徵授御史薑昂太倉人宏治中知寧皮府其僚畏之為減騶從屬吏相戒無敢犯日本使橫甚過其地皆斂手市舶中官怙勢裁以禮亦愧服馬思聰莆田人宏治末知象山縣復二十六渠溉田萬頃寇天敘榆涎人正德中知寧波府祛弊節用佑弱鋤強歲飢白上官秋糧得改折治行為天下第一徐相江西人正德九年知象山縣清介絶俗自奉唯蔬素內子不堪曰為清白吏歸不愈于贓敗為戍卒歸耶今里甲均徭之法自相立法始翟唐長垣人正德中知寧波府市舶中官崔瑶假進貢名擾民間為唐所裁抑且杖其黨王臣瑶奏唐阻截貢獻笞殺所遣使唐被逮軍民遮道涕泣請宥左遷嵩眀州鄭餘慶閩人正德中知定海縣歲大祲陳荒政十事不待命先發廩以賑建石坊張鑑二碶及新興閘以溉田為利甚溥楊最射洪人嘉靖初知寧波府涖官止攜一蒼頭旦暮舉炊蔬菽而已勤於聽斷案無留牘以恤孤弱抑豪強為務去之日父老遮留大慟立祠祀焉宋繼祖濮州人嘉靖中知定海縣縣境崇邱鄉田引鄞東錢湖以資灌溉舊有蛇堰逼小浹江一決則盡注江河渠易涸繼祖於東岡山下去舊堰二十餘里築堰以蓄水又築碶以泄之溉田數萬畝何愈富川人嘉靖中知定海縣修築千丈塘及五碶浚諸渠引以溉田復修靈緒舟山平水諸閘水利悉舉張可大應天人萬厯時為舟山𠫭將束軍伍遠斥堠治樓櫓製火器自岑港抵厯海三江皆置戌倭犯五罩湖白沙港連敗之以功加副總兵城久圮躬親董築兩月工訖城內外田數千畝海潮日害稼乃築碶蓄淡水遂為膏腴民稱為張公碶沈猶龍華亭人萬厯未知鄞縣倣古社倉法以備凶荒長春門外舊有泥塘江流逼城斥鹵易入猶龍甃以石為鄞永賴東錢湖日長葑茭為豪右私占猶龍嚴禁之令民取葑培田湖益開浚陳璸漳浦人天啓時知慈溪縣海冦劉香騷擾瀕海郡縣璸備禦有方冦不犯境斷獄數言立辨濬河渠以溉民田民蒙其利後厯湖廣𠫭議死獻賊之難汪偉休寧人崇禎時令慈溪歲祲捐俸市米勸輸全活甚衆時邊事孔棘偉設法征解額外無增益後行取授翰林檢討與妻耿氏同死闖賊難本朝王奐南陵人順治九年知奉化縣始至治姦胥之乾沒者設綱簿詳載里甲總數田地山蕩丁口按則科糧瞭如指掌上官頒其法于他縣大兵平舟山督造戰船奐經畫有方應期立辨又擒捕山冦勞績最著張秉乾江寧人康熙中官象山協左營守備海冦犯境力戰卻之賊再至衆寡不敵獨石死趙燾杭州人為象山右營都司康熙十四年耿精忠黨自海道來犯燾率衆出沈家門洋奮力衝檕追至毛頭洋戰死贈副將蔡育秀錦縣人康熙十六年知奉化縣值歲暮鄉民以逋課滯獄者數十人悉放還家約以新正完課民感泣如約邑有盜魁二人行劫橫州里育秀擒磔于市請免運象協兵米民纍得蘇史鳴皋如皋人乾隆辛未進士知象山縣修築會源朝宗靈長等碶又縣東南有賢昌碶湮且百年水無所泄民田苦害鳴皋親相度疏濬計工以田計田出力不費官帑傷民財而事以藏又設田為士子應試費士民咸愛戴之人物漢夏黃公四皓之一會稽典録云鄞大里人按史記留侯世家注引陳留志云公姓崔名廣宇少通隱居夏里放號夏黃公四明文獻志云宋畢文簡以綺里季夏後人誤將夏字屬黃公讀如孟子讀樂正裘牧仲之誤宋潛溪非之著論以夏黃公為的但考南史阮孝緒語及唐杜甫詩俱稱黃綺而不言夏綺似畢説正非無據今姑照舊志書之至公之為鄞人既有典録可證又晉書夏統傳云會稽土地風俗其人有黃公之髙節今鄞大隱山有黃公墓則其為鄞人無疑董黯字叔達句章人虞翻答王府君云黯盡心色養喪致其哀單身林野烏獸歸懷怨親之辱白日報讐海內聞名昭然光著王修句章人順帝時為揚州從事虞翻稱其委身受命垂聲來世三國吳任奕句章人會稽典録山陰朱肓曰文章之士立言粲盛則有御史中丞句章任奕各馳文檄蔚若春榮唐孫邰字希韓奉化人自幼負氣岸博學髙才唐末官左拾遺朱全忠篡唐即脫冠棠隱奉化山著書紀年悉用甲子以示不臣之意五代吳越石延翰明州人恥事強藩隱居沃州山白雲谷以書史自娛後贈白雲先生宋沈起字興宗鄞人進士髙第調滁州判官監真州轉般倉聞父病委官歸侍有司劾其擅去仁宗謂輔臣曰觀過知仁今由父病而致罪何以厚風教而勸為人子者乃特遷之知海門縣有惠政包拯舉為監察御史書數十上京東盜起除提點刑獄開首贖法盜自相東縛惟恐後厯知吏部流內銓奉使契丹其位著乃與夏使等起不就列遂升東朝使者自是為定制官至天章閣待制知桂州周鍔字廉彥鄞人元豐進士當官桐城辭不赴益究治六籍諸子百氏之説悉論著其本旨乃遊潁昌訪其舅范忠宣公純仁過洛見文路公司馬公咸見器重後知南雄以言事入黨藉退沐于家著文二十卷雜集數卷樓郁字子文自奉化徙鄞志操髙厲學以窮理為先慶厯中教授郡學一時英俊皆在席下登進士調廬江主簿自以祿不及親絶意仕進以大理評事終于家有遺集三十卷豐稷字相之鄞人登第為穀城令以廉稱嘗使髙麗海中大風舟幾覆衆惶擾稷神色自若擢監察御史治章惇請託事無所移撓哲宗時厯刑部侍即屢進讜言徽宗立除御史中丞入對即論蔡京姦狀人乞辨宣仁誣謗之禍時宦官漸盛稷懷唐書仇士良傳讀於帝前曾布拜相勸帝斥之哲宗升祔議功臣配享稷謂當用司馬光吕公著稷盡言守正積忤貴近以樞密直學士守越蔡京得政除名徙建州辛諡清敏陳禾字秀實鄞人元符進士擢監察御史奏劾蔡京子倏何執中壻蔡芝罪皆罷之遷右正言首劾童貫及黃經臣怙寵弄權論奏未終上拂衣起未引上衣衣裾落上曰正言碎朕衣禾言陛下不惜碎衣臣豈惜碎首貫等訴帝謫監信州酒後起知和州卒贈中大夫諡文介有易傳九卷春秋傳十二卷論語孟子解各十卷俞充字公達鄞人登進士第熙寧中遷成都路轉運使茂州羌冦邊充上十策禦戎召判都水監陳河防十餘事擢天章閣待制知慶州山夷叛舉戶亡入西夏者且三百充遣將耀兵塞上夏人亟反之充帥邊屢言願得乘傳入覲面陳攻討之略未及行卒王庭秀字㯋彥慈溪人與黃庭堅楊時遊操持堅正為文俊邁宏逺登政和上舍第李光薦為御史臺檢法官遷殿中侍御史論黃潛善賣官售寵罷之既與鄭玨力爭降封高宗事出知瑞州後纍官至直祕閣鄭覃字季厚明州人靖康中貢于鄉建炎四年金人陷明州縱兵大掠覃為兵所劫去迫之降覃厲辭罵不屈躍入水中其妻董哭曰夫亡矣與其受辱以生不如死亦自沈後孫曽多舉進士而清之最貴顯史浩字直翁鄞人紹興進士為國子博士因轉對言普安恩平二王宜擇一以係天下望除祕書郎兼王府教授極盡輔導之功隆興初拜尚書右僕射首言趙鼎李光無罪嶽飛久冤宜復其官爵祿其子孫時張浚欲請幸建康浩陳三説不可因奉祠歸淳熙五年復為右丞相將告歸薦江浙之士楊簡陸九淵等十五人皆一時選除太保致仕卒諡忠定汪大猷字仲嘉鄞人紹興進士厯官吏部郎為莊文太子侍講多寓規戒權刑部侍郎孝宗每訪以政事多所陳論又言有司用新制棄舊法輕重舛牾舞文之吏得售其姦請明詔編纂書成上帝大悅纍進敷文閣直學士江西妥撫大猷與丞相史浩同里又同年進士未嘗附麗以干進好周施敘宗族外族為興仁録率鄉人為義莊衆皆欣勸高文虎字炳如四眀人紹興進士聞見博洽多識典故遷太學博士兼國史編修官興修四朝國史自熙寧以來史事淆雜文虎盡取朱墨夲刪正謬妄一一研核纍遷兵部侍郎知建寧府以臺臣言奪職卒高閌字抑崇鄞人紹興中為國子司業時方興太學閌奏宜先經術於是條具其法首六經語孟義次詩賦子史論又次時務䇿凡太學課試郡國科舉盡以此為法且立郡國士補國學監生之制中興以後學制多閌所建明官至禮部侍郎著春秋集傳行世楊慶鄞人父病刲股啖之良己其母病不能食慶取右乳焚之以灰和藥進焉入口遂差久之乳復生紹興中守仇悆為之請詔表其門陳居仁字安行其先興化軍人父膏徙居明州膏厯官御史鄞僧王法恩謀逆事覺或請屠城膏力論多殺非聖世事脅從者悉得寬宥居仁登紹興進士厯中書舍人泛恩濫賞封繳無所避居仁風度凝遠處己應物一以誠信臨事毅然有守出知鄂州厯移鎮江福州所至號稱循吏子卓字立道紹熙進士纍官至簽書樞密平生不營産業卒諡清敏楊簡字敬仲慈溪人乾道進士授富陽主簿陸九淵道過富陽問答有所契遂師事之為紹興司理以朱子薦差浙西撫幹軍政大修明厯知樂平邑民呼曰楊父召為國子博士以辨趙汝愚冤連斥嘉定𥘉厯著作佐郎輪對極言弭災消變之道北境傳誦為之涕泣出知溫州治績大著理宗即位以寶謨閣學士致仕所著有甲藁隱藁冠記昏記喪禮家記家祭禮釋菜禮記等書沈渙字叔晦定海人入太學從陸九齡學乾道中舉進士為太學録以所躬行者教淑諸人同僚忌之調去後通判舒州卒渙人品髙明嘗曰晝觀諸妻子夜卜諸夢寐兩者無愧始可言學寶慶二年追贈直文華閣諡端憲舒璘字元質一字元賓奉化人初從學張栻又從陸九淵遊朱子吕祖謙講學於婺璘徒步往謁之為徽州教授丞相留正稱為當今第一教官後知平陽縣通判宣州卒璘與沈渙友善而樂於教人嘗曰師教尊嚴璘不如叔晦若啓迪後進則璘不敢多遜舉乾道進士楊簡謂璘孝友忠實道心融明淳祐中特諡文靖袁燮字和叔鄞人淳熙進士嘉定中纍遷國子祭酒延見諸生必迪以反躬切已忠信篤實是為道本聞者悚然有得進寶文閣直學士奉祠卒夑師事陸九淵每言人心與天地一本精思以得之兢業以守之則與天地相似學者稱之曰潔齋先生後諡正獻袁韶字彥淳鄞人父為郡小吏五十無子其妻資遣之往臨安置妾既得妾乃故趙知府女也家四川父歿家貧故鬻女以為歸葬計即送還且盡以囊中資與之明年妻遂生韶登淳熙進士為吳江丞蘇師旦姻黨在吳江密以屬韶不聽改知桐廬擢臨安府尹並有惠政紹定初拜參知政事胡夢昱論濟王事當逺竄韶獨以夢昱無罪不肯署文書李全叛韶力言於史彌逺乃討之卒以言羆奉祠卒贈太師越國公樓鑰字大防鄞人隆興進士厯知溫州光宗時擢起居郎兼中書舍人繳奏無所回避禁中或私請上曰樓舍人朕亦憚之不如且已遷給事中乞正太祖東嚮之位朱子以論事忤韓托胄除職與郡鑰請還講筵不報彭龜年攻托胄出知外郡鑰奏留不得尋告老托胄誅起翰林學士厯同知樞密院𠫭知政事卒贈少師諡宣獻鑰文辭精博自號攻愧主人有集百二十卷史彌鞏字南叔鄞人彌逺從弟好學強記紹興中入太學彌逺柄國淹抑十載嘉定十年始登進士嘉熙元年都城火彌鞏應詔上書謂修省之未至者有五出提點江東刑獄纍著政績官至直文華閣知婺州奉祠歸真德秀嘗曰史南叔不登宗衮之門者三十年未仕則為其寄理已仕則為其排擯皭然不污有如此袁甫字廣微燮之子嘉定進士為校書郎輪對皆深切時政出通判湖州厯知徽州衢州提舉江東常平前後持節江東五年所全活不可數計除中書舍人繳奏不擲苛小時相鄭清之以國用不足行履畝之今甫極論其害帝為惻然纍遷吏部侍郎條上十事至為詳明權兵部尚書卒諡正肅史璟卿鄞人嵩之從子嘗以書諫嵩之謂異日國史載之不得齒于趙普勳臣之列而厠于蔡京亂臣之後為今之計莫若盡去在幕之羣小悉召在野之君子庶幾失之東隅收之桑榆居無何璟卿暴卒相傳嵩之致毒云應㒡字之道昌國人嘉定進士為祕書郎請早建太子入對帝問星變請修實德以答天戒又問藏書㒡請訪先儒解經注史因及程逈張根所著書皆有益世教遷起居舍人直學士院一夕詔㒡草詔夜四鼓五制皆就帝奇其才纍拜𠫭知政事陳塤字和仲鄞人登嘉定進士師事楊簡理宗即位詔求言塤上封事直聲著天下纍遷太常博士與舅史彌逺不合通判嘉興彌逺卒召為樞密院編修官入對首言天下安危在宰相次言內廷當嚴宦官之禁外廷當嚴臺諌之選忌者陰中之出知衢州提點浙西刑獄後遷國子司業罷歸塤輕才急義明白洞達一言之出終身可復子蒙年十八上書萬言論國事為太府寺主簿入對極言賈似道為相國政闕失官至淮東總領趙逢龍字應甫鄞人嘉定進士理宗時厯知州郡居官自常奉外一介不取究心荒政以羡餘為平糶本遷宗正少卿兼侍講凡道德性命之藴禮樂刑政之事縷縷為上開陳疏奏甚衆稿悉焚棄家居講道四方從遊者皆為巨公名士寡嗜欲泊然不知富貴之味或問何以裕後笑曰吾憂子孫學行不進不患其飢寒也趙善湘字清臣濮安慤王五世孫徙居眀州登慶元進士紹定中李全犯淮東善湘以江淮制置使屢建討逆復城之功淳祐二年進觀文殿學士致仕所著周易約説或問洪範統論中庸約説大學解論語大意孟子解春秋三傳通議等書張虙宇子宓慈溪人慶元進士為大學生輪對言立國有大經人主當以靜制天下之動帝嘉納焉遷國子博士以亢旱上疏語皆切直厯著作佐郎陳邊事二病出知南康有惠政端平初召為國子司業兼侍講以禮記月令進讀分為十二卷乞按月觀之官至國子祭酒卒諡文靖孫蘿觀字守叔慈溪人寶慶進士厯知寧國府遷司農少卿輪對言今內外之臣恃陛下以各遂其私而陛下獨無一可恃可為寒心次論郡國當為斯民計朝廷當為郡國計帝善其言進起居郎抗論益切以集英殿修撰知建寧府卒官夢觀退然若不勝衣然義所當為奮往直前其居敗屋數間布衣蔬食而重名節云吳從龍字子雲奉化人官建康府統制紹定初李全犯揚州從龍為先鋒赴敵援絶被擒使至泰州城下誘降從龍大呼曰我統制吳從龍也馬中矢被執至此揚州無恙泰州城堅宜死守賊怒寸磔之詔褒其忠立祠祀之黃鏞字天與咸淳中舉進士元兵至被執不屈舉家十七人皆死史蒙卿字景王彌鞏孫舉咸淳進士厯江陰教授遂不仕淹博著書時四明之學皆主象山表章朱子之學者自蒙卿始晚年設教于鄉人稱為果齋先生張漢英奉化人幼聘吕氏女及請期吕以女雙瞽辭漢英曰聘時無恙而今喪明命也遂娶之咸淳初守樊城元兵至被圍四年援絶城陷終不屈死之元臧蘿解慶元人宋末進士至元中授海寧知州副使王慶之薦其才德兼備屬江陰飢江浙行省委夢解賑之所活四萬五千餘人擢廣西肅政廉訪副使改江西浙東除湖南宣慰副使致仕夢解博學洽聞為時名儒敏于政事其操守尤介特童金字子丹慈溪人至元間以才能薦授進義副尉歲督海運秩滿扁所居曰一間築隄浚澤興水利于鄉築室百餘楹為義孰置田四頃延師淑來學又割田二頃給貧不能養死不能斂者大德中歲飢發積以貸全活無算詔旌其門戴表元字帥初奉化人七歲學古詩文多奇語稍長從里師習詞賦輒棄刁肯為宋咸淳中登進士乙科教授建寧大德間拜信州教授調婺州以疾辭初表元閔宋季文章萎薾已甚慨然以振起斯文為己任時四明王應麟天台舒嶽祥並以文章師表一代表元皆從受業至元大德間東南以文章大家名重一時者惟表元而已所著有剡源集袁桷字伯長韶之曽孫為童子時已著聲大德初已薦為翰林檢閲官時初建南郊桷進十議禮官推其博多采用之纍遷侍講學士桷左詞林朝廷制册多出其手所著有易學春秋説清容居士集卒諡文靖程端禮字敬叔慶元人幼潁悟純篤十五歲能記誦六經曉析大義慶元自宋季皆尊尚陸九淵之學而朱氏學不行于慶元端禮獨從史蒙卿遊傳朱子明體達用之旨學者及門甚衆所著讀書工程國子監取以頒示羣邑教官仕為衢州路教授弟端學字時叔至治進士厯國子助教動有師法著有春秋本義三傅辨疑春秋或問等書俞述祖字紹芳象山人為沔陽州推官至正十二年蘄黃賊迫州境述祖領兵民守淥水洪并力禦之城陷為賊所執械至其偽主徐壽輝所誘之降述祖罵不輟壽輝怒支解之事聞追贈象山縣男史公珽字搢叟鄞人學通諸經尤稽易理隱居教授者數十年程端學薦主甬東書院棄去寄興吟咏廣平李堯民七喪不舉公珽傾槖賙之自號蓬廬處士陳桱字學經奉化人官至翰林學士祖著宋時知台州常本綱目撰書紀厯代之統桱思宏前業乃續成二百卷上自盤古迄有宋比事較義紀年師司馬公補遺書法師朱文公綱目名曰通鑑續編行世明桂彥良名德以字行慈溪人元末為平江教授洪武初徵授太子正字每顧問對必以正帝嘗曰江南大儒惟卿一人遷晉王府右傅製格心圖獻王改右長史朝京師上太平十二策帝歎為通達事體有禆治道告歸卒傅恕字如心鄞人學通經史洪武二年詣闕陳治道十二策太祖嘉納之命修元史事竣授博野知縣後坐纍死同郡鄭真字千之亦有文名洪武初舉鄉試第一入見賊詩稱旨除廣信教授自號榮陽外史烏斯道字繼善慈溪人與兄本良俱有學行洪武中斯道以薦授石龍知縣調水新坐事謫役定遠放還卒上詩古文兼精書法所著有秋吟稿春草齋集子熙亦善詩吝錢唐字維明象山人博學敦行洪武初舉明經對策稱旨特拜刑部尚書時詔孔廟釋奠止行于曲阜天下不必通祀唐上疏力爭帝覽孟子至草芥冦讐語議罷其配享詔有諌者以大不敬諭唐抗疏入諌言臣為孟子死死有餘榮帝鑒其誠懇不之罪其後配享旋復唐為人強直敢諫終以忤旨謫壽州卒陶垕仲初名鑄以字行鄞人洪武中以國子生擢御史尚氣敢言劾刑部尚書開濟濟坐誅直聲動天下擢福建按察司至即誅贓吏數十人興學勸士撫恤軍民為人清介自持祿入悉以贍賓客未幾卒官李孝濂鄞人與弟悌濂忠濂並著孝友洪武初父仕開以督造戰艦不中程將執送刑部孝濂悌廉爭請代往有司遂囚孝濂去罰令築城期年赦歸仕開復以充賦長米耗論死忠濂荷械請代竟戊遼東以殁永樂中孝濂舉明經為纂圖志總裁所著有中林集通鑑考證諸書戴德彝字邦倫奉化人洪武時以廷試第三人授編修遷侍講尋改御史建文時改左拾遺靖難兵起與方孝孺黃觀輩日夕謀兵事燕王即位不屈死福王時贈太常卿諡毅直本朝乾隆四十一年賜諡節愍劉朴字維素慈溪人洪武末由太學生授獲鹿知縣靖難師南下井陘平山諸邑望風降附朴抗節不屈死之又張安國定海人建文朝為工部郎靖難師起妥國乘舟入太湖聞金陵陷遂與其薑鑿舟自沈向朴字遵博慈溪人力學養親洪武末以人材召見授獻縣知縣靖難師起縣無城郭朴集民兵與燕將潭淵戰被執懷印死福王時贈太僕少鄊諡惠莊本朝乾隆四十一年賜諡節愍梁田玉定海人與族人良玉良用中節三人俱同仕違文朝會燕兵入京田玉官郎中髠髮為沙門遁去良玉官中書舍人變姓名踰嶺至海南市肆賣樂以老良用去為舟師死於水中節素好讀老子太元經入山為道士本朝乾隆四十一年俱賜入祀忠義祠萬鍾字榮祿其先定逺人父斌字文質太祖時以功遷龍驤衛千户從征沙漠戰阿魯渾河陷陳死鍾襲職纍功遷寧波衛指揮僉事遂為鄞人建文中拒燕師戰死于大興花園子武字世忠襲父職永樂六年從征交趾戰于檀舍江力竭而死弟文字世學嗣兄職率舟師禦倭獲其巨盤夜次桃渚遇風溺死萬氏祖孫父子並死王事時稱四忠俞士吉字用貞象山人洪武末舉于鄉授兖州訓導建文時陳時政十餘事擢御史出按湖廣辨釋疑獄風紀肅然成祖即位擢左僉都御史督浙西農政奏除湖州逋賦六十萬石偕夏原吉治水蘇松有勞績終南京刑部侍郎袁珙字廷玉鄞人好學能詩嘗遊海外落伽山遇異僧授以相術相人多奇中姚廣孝薦于燕王永樂初官太常寺丞為人孝友端厚待族黨有恩自號柳莊居士子忠徹傳其術後官至尚寶少卿金華宇宗實鄞人負志節弟忠為燕王府紀善守通州有功欲推恩官之辭不就從居東湖忠卒召賜金綺伏闕辭謝曰臣野人不敢用此成祖目為迂叟放還里中稱白雲先生忠以善卜從燕王起兵由紀善纍官兵部尚書帝初以高煦扈從有功欲立為太子謀已定獨忠力爭于是立世子為皇太子命忠為輔導官兼詹事府事卒諡忠襄應履平字錫祥奉化人建文進士厯吏部郎中常德知府宣德初擢貴州按察使所至祛除姦蠧吏畏民服終雲南左布政使陳本深字有源鄞人永樂初由鄉舉授刑部主事遷員外郎擢知吉安府豪強巨猾誅翦殆盡久之郡中無事民恥爭訟前後守吉安十八年請老歸陳敬宗字光世慈溪人永樂進士選庶吉士厯侍講宣德初轉南京國子監司業遷祭酒方嚴肅下與北祭酒李時勉齊名時稱為南陳北李考滿入京王振慕其名欲招致之終不可得見以故在太學十七年不調景泰初致仕卒贈禮部侍郎諡文定陳憲字廷章定海人永樂進士擢御史巡按湖廣江西風紀肅然吉安千戶臧清貪淫不法按其罪械送京師久之憲坐纍下獄時清同在夜竊至憲所遭毆辱忿恨死一日宣宗問侍臣聞御史陳憲能持身振綱紀今妥在左右以實對遂磔清于市黃潤玉字孟清鄞人少有至性永樂初徙南方富民實北京潤玉請代父行官少之對曰父去日益老兒去日益長官異其言許之既至築室治圃粥蔬自給間輒力學舉順天鄉試授建昌府學訓導以薦擢御史出按湖廣厯廣西僉事提督學政所至有聲後謫含山知縣以年老歸其學以程朱為宗所著有儀禮戴禮記附注書經補注學庸通旨等學者稱南山先生陸瑜字廷玉鄞人宣德進士正統中以刑部員外郎録囚南畿出重囚三百餘人輕罪減免者又千餘人厯山東布政使天順二年徵拜刑部尚書以明允稱卒贈太子少保諡康僖竺淵奉化人宣德進士正統時為刑部主事會葉宗留陳鑑湖等為亂流入福安擢淵福建𠫭議往撫諭之淵率衆禦賊被執罵賊死張瑭字廷玉慈溪人正統進士為刑部主事同邑包良玉字克忠亦正統進士授禮科給事中英宗北征俱扈蹕死土木之難王來字原之慈溪人宣德初以會試乙榜授新建教諭擢御史巡按蘇松常鎮四府數抑巨璫帝稱其賢正統時厯山西𠫭政河南布政使景泰初以右副都御史總督貴州軍務平叛苗有功進南京工部尚書陳時政十二事于曹司積弊多所釐正劉煒字有融慈溪人正統進士為南京刑科都給事中景泰四年户部以邊儲不足奏令罷退官輸未二十石給之誥敕煒抗疏止之都督黃􅎫以易儲議得帝眷奏求武清縣地煒劾􅎫怙寵妄干請眀正其罪直聲振中外天順初出為雲南𠫭政改廣東會大軍征兩廣以勞瘁卒于官姚堂字彥容慈溪人正統進士纍遷工部郎中有清操厯知廣信蘇州鎮江三府終廣東𠫭政長于政事所在著聲績尤措意學校養老恤孤褒顯名德三郡皆有遺愛豐慶字文慶鄞人正統進士授給事中諌景帝南城及易儲事言甚剴切詔繫獄七年英宗復辟復官纍遷布政使以清節著楊守陳字維新鄞人祖範有學行守陳受教作致知力行持正三銘登景泰進士選庶吉士授編修厯侍講學士官五品十六年泊然退處孝宗初由少詹事擢吏部右侍郎極言經筵常朝不宜祗循故事百官題奏不宜付內臣調旨批答願遵祖宗舊制開大小經筵日再御朝以親庶政接羣臣帝深嘉納後復午朝召大臣畫議政事由守陳啓之也守陳學術純粹操行潔白諸經皆有論著為一時詞臣之冠卒贈禮部尚書諡文懿王淮字柏源慈溪人與劉溥湯允績等為景泰十才子之一嘗與允績遇於湖州慈感寺徴青陵臺事淮厯厯口誦無所遺允績大歎服語人曰真行祕書也好作長歌下筆輒數十韻造語奇麗擅名江淮間有大塊集毛宏字士廣鄞人天順初進士授刑科給事中憲宗頗事逸遊宏偕同官切諌乞日御經筵講求正學慈慤太后崩詔別葬宏等抗疏諌復合諸臣伏哭文華門竟得如禮在垣中多所論列聲振朝寧帝頗厭苦之而宏慷慨議論無所屈三遷至都給事中卒同縣章鎰字元益成化進士選庶吉士厯兵科都給事中彈劾無所避與宏齊名楊守址字維立守陳弟成化初鄉試第一入國學祭酒邢讓下獄率六館生伏闕訟冤十四年進士及第授編修宏治初修憲宗實録厯侍講學士遷南京吏部右侍郎常署兵部陳時弊五事武宗立加尚書致仕卒贈太子少保守址博極羣書師事兄守陳學行相埓楊守隨字維貞守陳從弟成化進士授御史巡按江西所至以風采見憚嘗疏陳六事言郕王削平禍亂功甚大殁諡以戾人心不平亟宜改易又因災異陳九事擢應天府丞尋以李孜省譖坐貶宏治中𩔶工部尚書掌大埋寺遇事持法不撓武宗立八黨弄朝守隨與户部尚書韓丈等伏闕力爭文等既逐守隨獨上章極論攻劉瑾尤甚瑾甚銜之致仕歸瑾憾未釋逮繫獄除名瑾誅復官卒贈太子少保諡康簡從弟守隅由進士厯官江西參政有政績瑾惡守隨并罷守隅官後起官終廣西布政使屠滽字朝宗鄞人成化進士宏治中厯右都御史總督兩廣討猺賊有功召掌院事疏陳時弊十二事多見採納轉吏部尚書武宗初劉瑾誣劉大夏往事為罪欲置之死滽執不從遂得減論以忤瑾歸卒諡襄惠朱瑄字廷璧鄞人成化進士授工部主事督通州倉棹稅蕪湖羡入皆無所私以兵部郎中分賑鳳翔活飢民萬數厯河南𠫭議𠫭政布政司遷副都御史巡撫江南并著聲績生平不言財利歸之日饔飱不給張昺字仲明慈溪人成化進士知鉛山縣多異政擢南京御史宏治初偕同官極言時政劾大學士劉吉等十餘人奉命閲軍因忤守備中官蔣琮調南京通政使經厯用薦遷四川僉事進副使滅惠并著引疾歸環堵蕭然擁經史自娛炊煙屢絶處之淡如也及卒舍殮不具知縣丁洪為經紀其喪孫紘字文冕鄞人成化進士厯南京御史劾大監郭鏞擅遊禁地鏞訴于帝會薑綰以劾中官蔣琮被貶紘坐謫膠州判官遷廣德知州卒官紘少貧傭書市肉以養母既通籍終身不肉食周津字文濟慈溪人成化進士授行人擢南京御史監龍江瓦屑二榷務守備中官蔣琮求一見為治具邀之不可得遷九江知府調瑞州皆有惠政終廣東左布政使楊子器字名父慈溪人成化進士知崑山髙平常熟皆有實政擢吏部考功主事陳邊務十二事兵部尚書劉大夏深善其言時孝宗大開言路子器數有建白多見施行正德初厯驗封郎中劉瑾以張綵言移貯部籍于千步廊獨子器爭之自是纍朝典制惟驗封考切二司猶存一二遷湖廣𠫭議河南𠫭政屢著禦賊功仕終布政使楊茂元字志仁守陳子成化進士厯刑部郎中出為湖廣副使改山東宏治時河決張秋茂元乞召還中官李興平江伯陳鋭而專委劉大夏治之興鋭連章劾茂元逮付詔獄父老遮路訴會言者交論救謫長沙同知久之遷廣西𠫭政正德中劉瑾索賄不豫勒致仕瑾誅起官終刑部侍郎弟茂仁字志道成化進士厯刑部郎中按治中官梁圯之罪終四川按察使余濬慈溪人成化進士厯南京御史宏治初疏請永除納粟入監令又言浙江鎮守中官張慶廣東鎮守中官韋眷皆貪虐恣睢乞召還論罪因薦王恕馬文升等可任吏部內閣已為中官蔣琮所搆貶平度州判官姚鏌字英之慈溪人宏治進士厯廣西提學僉事方興文教遷福建副使改督學政厯貴州按察使皆有聲擢右副都御史巡撫延綏撫循有方軍政大飭嘉靖五年以右都御史提督兩廣軍務討岑猛大破之進左都御史為霍韜方獻夫所排落職尋復起兵部尚書總制三邊軍務鏌辭乃罷子淶嘉靖初殿試第一授修撰爭大禮廷杖召修明倫大典懇辭不與纍官侍讀學士豐熙字原學鄞人宏治殿試第二授編修遷諭德以不附劉瑾出掌南京翰林院事世宗即位進翰林學士大禮議起熙偕禮官數力爭及將上恭穆獻皇帝諡册熙等又杭疏諌已而相率伏哭左順門帝震怒盡録諸臣為首者于是熙等八人並下詔獄掠治復杖之闕廷戍福建鎮海衛更大赦不原熙處之恬然日以讀書為事竟卒于戍所隆慶初贈官賜恤聞淵字靜中鄞人宏治進士授刑部主事嘉靖中纍遷南京刑部尚書每視爰書至夜分不休曰恐少年吏深文入人罪也尋改北進吏部尚書嚴嵩殺夏言勢益橫侵部權淵獨不為屈乞歸淵居官始終一節卒贈少保諡莊簡張邦奇字常甫鄞人宏治進士選庶吉士授檢討出為湖廣提學副使嘉靖初厯南京祭酒以身為教規條整肅纍擢史部右侍即掌部事推轂善類人不可干以私帝屢欲用邦奇尚書為武定侯郭勳大學士李時所沮後遷南京兵部尚書卒贈太子太保諡文定邦奇性篤孝以養親故屢起輒退學以程朱為宗躬修刀踐不少懈所著有學庸傳五經説粹然一出於正王渙字時霖象山人宏治進士由長樂知縣擢御史正德初條上應天要道五事語多斥宦官出視山海關都御史劉宇承劉瑾指劾之下詔獄豫杖斥為民瑾誅復官致仕子梃嘉靖進士為工部員外時大工繁興議添雇役梃力請獲羆厯官湖廣𠫭政汪玉字汝成鄞人正德進士厯湖廣僉事分巡辰沅地僻少文建書院明山麓聚生徒誦習延遷謫御史周廣教之再擢郴桂兵備副使討平大盜王廷簡嘉靖中纍進右僉都御史巡撫順天乞歸玉剛介廉直與同里聞淵張邦奇余本稱甬上四君子王應鵬字天字鄞人正德進士知嘉定縣以廉幹稱擢御史諌武宗微行中官劉允迎佛烏斯藏又極陳其妄直聲大著纍遷僉都御史巡撫畿內山西嘉靖中進左副都御史上言當今國事未定人心未一綜核之嚴翻成操切時以為至論而帝深銜之尋攝院事條上職掌禮儀九十五事方欲有所建樹帝摘其微誤斥之士論惜焉余本字子華鄞人正德中進士及第授編修乾清宫災應詔陳時事言皆剴切出為廣東提學副使以正風俗作人才為己任嘉靖時為山東副使終南京通政本清修實踐篤信正蒙立言制行一以張子為法所著有皇極釋義禮記拾遺周禮考誤春秋傳義孝經刋誤諸書馮涇字伯清慈溪人正德進士武宗南巡偕同官伏闕諌罰跪午門外日復廷杖創重死家貧不能還喪世宗立詔有司厚恤其家葉應驄字肅卿鄞人正德進士授刑部主事偕同官諌南巡豫杖嘉靖初厯郎中伏闕爭大禮再下獄廷杖勘姦人陳洸獄奏其罪狀忤桂萼已遷吉安知府萼益用事反洸獄謫應驄戍遼東後赦歸復冠帶應驄敦行誼好著書數更患難其慷慨至老不挫屠僑字安卿滽再從子正德進士授御史巡視居庸諸關武宗遣中官李嵩等捕虎豹僑刀言不可世宗時纍官兩京刑部尚書改左都御史僑遍厯中外咸著聲績卒贈少保諡簡肅楊言字惟仁鄞人正德進士嘉靖四年擢禮科給事中甫數日即上章厯指時政得失忤旨切責姦人何淵請建世室言抗章爭之張璁以特旨拜兵部侍郎言極陳其不可千户王𨝍奇借哈密事搆楊廷和彭澤言獨力辨其誣帝怒收繫親鞫于午門備極五毒無撓詞謫宿州判官稍遷溧陽知縣厯南京吏部郎中再謫知夷陵終湖黃𠫭議所至著聲績孫懋字德夫慈溪人正德進士厯南京吏科給事中請罷遊畋射獵復御朝常儀還久留邊兵汰錦衣冗官又言江彬梟桀儉邪為宗社憂乞置重典不報駕幸南京懋􅝴請北還并急定平宸濠功賞皆不省世宗即位疏薦建言貶謫諸臣周廣范輅等皆召用已又乞倣宋文彥博故事起大學士謝遷尚書韓文帝不能用出為廣東𠫭議終應天府尹卒贈右副都御史黃宗明字誠甫鄞人正德進士厯南京兵部員外郎從王守仁論學宸濠反上防江三䇿武宗南征杭疏力諫嘉靖中纍擢兵部右侍郎編修楊名以劾汪鋐下獄宗明論救忤旨謫官尋召起終禮部侍郎劉世龍字允卿慈溪人正德進士嘉靖初為南京兵部主事太廟炎應詔陳三事一杜諂諛以正風俗二廣容納以開言路三慎舉動以存大體多指斤言禮諸臣帝怒械至京