front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_105-1a}
body:
  text: 寧波府二古迹鄮縣故城在鄞縣東元和志鄒縣本漢舊縣屬會稽郡隋平陳省入句章唐武德八年再置仍移理句章城寰宇記漢鄒縣居鄒山之隂府志故城在鄞縣東三十里一名官奴城相傳漢光式嘗賞田奴為鄮令故名按名勝志句章城一名官奴城舊圖經云漢光武至越嘗為賊所困因牧奴得免既定天下以奴為鄒令名鄒為牧奴縣城為官奴城又梁載言十道志云宋武帝微時避吏於鄒與人奴名桂者善因匿之得免後立官奴城以報之其謂光武者於史無據而宋書劉裕曽戍句章故疑為宋武云句章故城有二一為漢縣在慈溪縣界國語句踐之地南至句無闞駰十三州志句踐并吳因大城之以章霸功故名句章秦置句章縣後漢為東部都尉治晉改築城於小溪鎮此城遂廢括地志句章故城在鄮縣西一百里舊志在今慈溪縣西南三十五里城山渡東是也一為晉縣在今鄞縣南晉隆安四年孫恩作亂劉牢之等討之改築句章縣於小溪鎮即此元和志句章城在明州西一里舊志晉句章城在鄞縣南四十里小溪鎮即唐初鄮縣治大厯六年袁朝作亂始移於今治長慶初始移州亦於鄒縣治也鄞縣故城在奉化縣東國語句踐之地東至於鄞即此漢置鄞縣屬會稽郡隋省入句章縣志故城在今縣南五十里夏時有堇子國以赤堇山為名後加邑為鄞又有鄞成在今鄞縣東南白社里象山故城今象山縣治元和志縣西北至明州水陸相兼一百六十里本漢鄞縣地神龍元年監察御史崔皎奏於寧海縣東界海曲中象山東麓彭姥村置縣東至大海二十里南至大海三十五里東北至大海四十里正北至大海十五里惟西南有陸路接台州寧海舊志今有縣基坪在縣南二十五里相傳舊欲於此建縣因名翁山故城在定海縣東三十里翁山下春狄時越之甬東也左傳哀公二十二年越滅吳請使吳王居甬東杜預注句章縣東海中州也其州環五百里唐始置翁山縣大厯中以袁朝亂廢宋熙寧六年改置昌國縣九域志在明州東北一百七十五里高宗建炎三年航海幸此元升為州明洪武十二年重築昌國故城明年置昌國千户所十七年改置昌國衛二十年湯和以其懸居海島外連倭寇廢之徙其民於內地改置中千戶及中在干户所永樂十六年增築所城本朝康熙元年廢二十六年改置定海縣於此望海故鎮今鎮海縣治唐元和十四年浙東觀察使薛式奏望海鎮去明州七十餘里俯臨大海與新羅日本諸番接界宜增戍守寰宇記定海縣在明州東北七十里海壖之地梁開平三年錢鏐以地濱海口有魚鹽之利因置望海照後改名威遠城在鎮海縣北招寶山上聳峙海口明嘉靖三十九年胡宗憲築城山巔周二百丈置兵以扼海口與縣城相唇齒復於山麓西南展築靖海營堡周二百四十丈宋王城在象山縣南八十里宋亡後土人見海岸浮尸衣繡龍黃𫀆疑為帝昺收葬於此外圍以牆因名定海故衛在鎮海縣治東北一里明洪武二十五年置今裁鮚崎亭在奉化縣東南漢書地理志會稽郡鄞有鮚崎亭顔師古注鮚蚌也長一寸廣二分有一小蟹在其腹中崎曲岸也其中多鮚故以名亭舊志在縣鮚崎山下宋嘉泰中置鮚崎塞南田在象山縣南百五十里大佛頭山舊設三里村落有范嶴林門朱門金寨下灣諸處山多鶴鹿水多海錯海中十洲以南田為第一明洪武初起發沿海居民遂空其地甬江樓在府治東南宋楊芾建吕祖儉為記鎮海樓在府治宋寶慶二年郡守胡矩建經綸閣在鄞縣治宋王安石為邑令人思其改即其燕休之所作此閣徐度有記宸奎閣在鄞縣東五十里阿育王山廣利寺宋建蘇軾為記碑尚存九經堂在府治束宋淳化中詔頒九經守陳充作堂藏之元祐五年守李閌重建並作記稽古堂在府學宋郡守徐琛建衆樂堂在府城內月湖中一名衆樂亭宋嘉祐間守錢公輔建叢碧軒在府治後宋建米芾書扁軒之前有平易進思二堂鹿亭在鄞縣四明山梁隱者孔祐居升仙祠側有鹿中矢來投祐為牧豢而去因建此亭碧沚亭在府城內月湖中宋樓鑰詩四面樓臺相映發一川煙水自灣環三江亭在府治東宋紹興間守潘艮貴建有記圓嶠亭在象山縣東三里東谷桃花溪之南四山盤旋前揖松蘿下俯石澗宋嘉定十二年令趙善晉建又有方壺亭在鳯躍泉之南亦善晉建朝暉軒在奉化縣元趙孟俯戴表元黃潛聚講之所凡戴黃有作趙書之今為去華寺西湖十洲在鄞縣西月湖中輿地紀勝湖有汀洲島嶼凡十曰柳汀雪汀芳草汀芙蓉洲菊花洲月島松島花嶼竹嶼煙嶼太白莊在府東五里元學士程端禮與弟端學改為讀書莊即宋守胡矩所建太白樓也百花臺在府城桃源洞前宋郡守曹泳築鳧磯館在慈溪縣東南二里唐開元中令房琯建後改為驛董黯故宅在鄞縣治西南百餘步今即其宅立純德廟史浩故宅在鄞縣西一里月湖之東宅乃賜第楊簡宅在慈溪縣北二里後為慈湖書院趙善湘故宅在鄞縣南握蘭坊左王應麟故宅在鄞縣治南應麟父撝為崇政殿説書理宗御書飛白汲古傳忠四字扁其堂黃震故宅在慈溪縣北五十里地名古窰為震讀書處戴表元故宅在奉化縣西坑村千人壇在慈溪縣西南十五里相傳秦始皇東遊會稽望秩以求神仙立壇於此上可容千人關隘定海關在鎮海縣南門外本朝康熙二十四年建海舶由此驗放湖頭渡關在奉化縣東百二十里東接象山南距台州西連塔山北連鎮海明𥘉設官軍戍守今有千總分防長溪關在慈溪縣西北二十里長溪嶺溪流其下又杜湖關在縣西北四十里杜湖嶺路俱達觀海衛翁山關在定海縣南二里唐置宋設兵守禦今為近郭險要處寧波衛在府治西明洪武初建明州衛尋改寧波衛觀海衛在慈溪縣西北六十里宋於瀕海置向頭鳴鶴雨水軍寨明洪武二十年湯和於兩塞間置衛築城周四里門四西南去餘姚縣八十里北去海五里轄於紹興而地屬慈溪本朝順治十七年裁衛今有千總分防昌國衛在象山縣西南八十里明洪武十二年舟山置干户所十七年置衛於故昌國縣二十年徙於照之東門山二十七年因東門懸海薪水艱阻徙於後門山為衛治築城周七里門四外為濠本朝順治十七年裁衛十八年徙居民內地城墮康熙二十三年重築二十六年設守備駐守今改都司大嵩所在鄞縣東南九十里元置巡司明洪武二十年湯和改置千户所築城周四里有奇門四自東南抵北為濠自西以北際石山本朝順治年間裁後設遊擊守備駐防霩􅛾所在鎮海縣南一百二十里宋置霩􅛾驛明洪武二十年置千户所築城周三里今所廢有千總分防龍山所在鎮海縣西北伏龍山南南去府城七十里明洪武二十年湯和因龍頭場石塘團舊址建築城周三里今所廢有千總分防石浦所在象山縣西南一百里明洪武二十年改石浦巡司建前後二千户所築城周不及五里門三外有濠西北阻山今所廢仍設巡檢又有千總防守本朝乾隆五十九年又移守備一員駐此錢倉所在象山縣東北四十里明洪武一十年建千户所築城周三里門四今改為塞有都司守備逐年輪駐防守爵溪所在象山縣東南二十五里明洪武三十一年建干户所築城周三里門三西北阻山東南負海孤懸海口直衝韭山今所廢設兵防守小溪鎮在鄞縣南四十里唐曰光溪元設巡司後廢今移杖錫巡司於此松浦鎮在慈溪縣西北五十里明洪武初置巡司今因之向頭鎮在慈溪縣西北七十里向頭山宋置向頤寨元改為鎮明初設巡司洪武二十年他徙正統十四年復還舊所本朝康熙三十九年裁司塔山巡司在奉化縣東百里元置田下寨設巡司明初改今名洪熙中廢本朝仍置長山巡司在鎮海南四十里舊為海內東寨明洪武初徙置長山鹽場之右曰長山巡司二十七年徙今所嘉靖中廢本朝復置又有甬東巡司在縣東南十五里舊置於府東五里甬東隅明洪武二十年徙竹山海口後廢太平巡司在縣南六十里明正統十三年置後亦廢管界巡司在鎮海縣西四十里宋曰水陸管界巡檢寨在縣城內嘉祐中遷縣西北六十里澥浦山改今名明洪武二十年徙今所仍置巡司今因之穿山所在鎮海縣東南九十里明洪武二十年湯和徒大小謝海口居民於此二十七年置干户所建城周四里門四本朝順治十八年重築城周二里今所廢改置巡司及千把總分防於此趙嶴在象山縣東七里舊隸寧海縣明正統八年改置於此有城周六十八丈今有巡司駐此石浦在象山縣西南一百里明洪武二年置二十年改置千户所遷巡司於此有城周四十八丈今仍設巡司又有陳山巡司在縣東南十三里舊置於縣北陳山明正統三年遷此有城周五十六丈爵溪巡司在縣西四十里明洪武二年置後改建干户所而遷巡司於此有城周四十二丈今皆裁沈家嶴在定海縣東八十里舊曰沈家門寨番舶往來皆泊於此內有趙嶴南嶴蘆花嶴大嶴去寨三五里以大嶺口為阻截要地今置巡司及汛兵防守又岑港亦設巡司岱山隘在定海縣東二十里海中舊有巡司又東南三十里有寶陀巡司今皆裁碇隘在定海縣西五十里去本港密通與外港相對舊為戍守要地應家棚寨在奉化縣東七十五里舊為海口衛要本朝順治十八年築城設兵戍守今有守備駐防鮚崎寨在奉化縣東南六十里以鮚崎山名宋嘉泰中置監官領土兵鎮守元改設巡司至元十三年廢明初復置洪熙初廢崑亭寨在鎮海縣南一百四十里北接穿山東接霩􅛾有官兵防守南堡寨在象山縣西南三十里有城周不及半里遊仙寨在象山縣東南十五里即赤坎寨明正統八年建有城周不及一里螺峯寨在定海縣西南十五里亦曰螺峯鎮西去府城二百六十五里舊置三姑巡司明洪武二十八年改為螺峯巡司今栽四明驛在鄞縣西南水驛也有驛丞又車廄驛在慈溪縣西南四十里元置以近車廄山名本朝康熙三十九年裁鹽場府境鹽場共六大嵩場在鄞縣大嵩所鶴鳴場在慈溪縣西北六十里清泉場在鎮海縣南十里又縣穿山所有穿山場伏龍山西半里有龍頭場長山司側有長山場今併長山入穿山俱有鹽課司津梁平橋舊名四明橋在府治南有亭唐太和中建宋開慶初郡守吳潛立石為水則改今名東津浮橋在府城東門外舊名靈橋跨鄞江上唐長慶三年刺史應彪置凡十六舟亘板其上長五十五丈闊一丈四尺維以鐵絙至今因之高橋在鄞縣西南三十五里宋建建炎三年張俊拒却金兵於此百梁橋在鄞縣西南五十里舊名小溪江橋宋元豐初建長二十八丈四尺架屋其上驄馬橋在慈溪縣治南唐開元中今房琯建以琯嘗為御史故名環碧橋在慈溪縣西三里慶安橋在慈溪縣東南十五里德星橋在慈溪縣西南唐建以其近大寶山亦名大寶橋慶登橋在奉化縣東二里劉宋元嘉中謝鳯為令置舊名謝鳳橋宋改今名惠政橋在奉化縣東四里一名善勝橋又名通剡橋宋乾德中建南渡橋在奉化縣東北二十里又名廣濟橋宋建元修南北二亭上架屋十五間壽通橋在奉化縣北二十五里明成化初知府張瓚建凡二十四洞北接鄞縣境東江橋在鎮海縣東五里又甬東橋在縣東十五里長山橋在鎮海縣東南二十里跨小浹江虹橋在鎮海縣北十里海口橋在象山縣東北二十里海潮汐經其下宋建南濟橋在象山縣南門外大河合三十六澗之水於此太平橋在象山縣東北四十里明建文三年倭賊犯境千户易絽宗戰死於此其裔孫易安易顯就此建橋以識殺賊之功因名太平狀元橋在定海縣治東南宋紹熙三年昌國令王阮建遂以名橋明初邑人張信生此後果第一及第大士橋在定海縣輔陀山潮音洞上宋建桃花渡在鄞縣東北三里