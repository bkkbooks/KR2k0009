啓進士崇禎初擢御史疏陳天下五大弊語極剴切先後劾輔臣周延儒溫體仁直聲大著出視河東鹽政代還乞歸卒馮元揚字爾唐慈溪人崇禎進士授都水主事纍遷蘇松兵備𠫭議與弟元颷並著直聲忤溫禮仁謫山車鹽運判官官至右僉都御史天津巡撫元飈字爾天啓進士厯官至兵部尚書趙珽字禹圭慈溪人崇禎進士厯知南安侯官擢河間兵備僉事大兵臨城與知府顔孕紹等固守城破珽一門十四人悉被難贈太僕卿又同縣御史楊文瓚主事屠獻宸員外郎任斗墟俱于本朝乾隆四十一年賜諡烈愍錢肅樂字希聲鄞人崇禎進士知太倉州有政績進刑部員外郎以艱歸杭州破率士民守寧波魯王航海肅樂卒于舟與同縣給事中董志安俱于本朝乾隆四十一年賜諡忠節高斗樞字象光鄞人崇禎進士授刑部主事纍遷長沙兵備臨藍賦起破湘潭圍長沙斗樞擊走之分守鄖陽李自武來攻屢不克而退時湖南北十四郡皆陷獨鄖屹然存國變後還家卒陳良謨字士亮鄞人崇禎進士援大埋府推官尋擢御史出按四川會流賊犯成都良謨親督諸將戰敗之還朝後賊勢益迫良謨素有規畫俱格不行及京師陷乃正衣冠望闕再拜自縊福王時贈太僕卿諡恭愍本朝順治聞賜諡恭潔其妾時氏同時殉節死沈宸荃字友蓀慈溪人崇禎進士授行人福王時擢御史疏陳五事皆切時病又極論王士吉張晉彥等失機罪出為蘇松兵備僉事後從魯王泛海遭風而殁本朝乾隆四十一年賜諡忠節從弟履祥字其旋崇禎進士為侯官知縣死節台州山中劉振之字而強慈溪人性剛方敦學行以名教自持崇禎中舉于鄉署東陽教諭遷鄢陵知縣流賊大至振之與典史杜邦舉集吏民共守城陷索印不與縛置雪中三日夜罵不絶口亂刃交下乃死贈太僕少卿李振珽字詔枋鄞人萬厯舉人知寶慶府獻賊忽以三萬騎薄城下遂陷􅓨被執不屈至衡江奮身投急浪中死弟振􅓨同時被執與僕李六鳳周科徐彩并死于難又戴國柱字殿材慈溪人官總兵闖犯中州血戰不支遂被害又陳值字行之慈溪人天津副總兵汴中流寇披猖危急請師值奉檄即行陷陳而死又知縣王士思寧波人亦死賊難俱於本朝乾隆四十一年並賜諡烈愍應時盛字泰宇慈溪人由諸生襲爵指揮同知纍功至總兵蔡懋德巡撫山西調時盛鎮太原甲申闖賊入太原城時盛扶懋德至三立祠解袍帶二繫梁左右懋德就左縊身輕不死時盛缷所衣鐵鎧被其身懋德既死乃就左縊須臾氣絶本朝乾隆四十一年賜諡忠烈張煌言字倉水鄞人崇禎甲午舉人魯王時授為東閣大學士金陵軍敗避居海中懸嶴為降卒執至軍門勸降不從死之其子萬祀先三日死于鎮江本朝乾隆四十一年賜諡忠烈黃嘉寯字仲籲鄞人崇禎中由思貢知開州姦民乘流寇之亂引土苗千餘破城嘉寯罵賊觸階而死子近衮近扆俱殉焉又王恆言字仍默慈溪人崇禎舉人知滎陽縣流寇陷城脅降不屈死又鄞縣人𠫭將袁斌營繕所所正戴仲明俱以死節于本朝乾隆四十一年賜諡節愍謝于宣字宣子鄞人崇禎進士授行人闖賊破京師于宣慟哭投繯為僕從所解遂被執不屈以死又婁文煥字象眀象山生員聞眀亡偏别親族拱坐海邊沙上上潮至隨水湧去越數日尸隨潮轉顔色不變人驚神異本朝乾隆四十一年入忠義祠周畏志鄞人年少以氣節自髙登崇禎進士任江都知縣大兵破揚州從史可法死之本朝乾隆四十一年賜諡烈愍又同里王纘爵任揚州同知亦同死本朝乾隆四十一年賜諡節愍趙景麟鄞縣諸生聞紹興破整巾服懷所作文謁先聖赴泮池未死復投子江又定海貢生華夏偕妻陸氏寧波生員馬之騆馬之駉定海千户陳應鵾俱以死節本朝乾隆四十一年入祀忠義祠本朝王顯謨字裕如慈溪人隸籍天津由拔貢授歸德府推官升漳州府同知順治九年鄭成功入犯顯謨親率軍捍禦之力盡遂赴水死贈按察使副使陳貞字吉人鄞人為上饒縣丞耿精忠亂貞走南昌平寇大將軍檄署廣昌縣暫駐南豐會賊衆來攻力屈被執囚於福州後遇害贈按察仗司僉事同縣鮑瑞魁於康熙二年任鍾祥縣縣丞死流賊郝徭旗之難翁鳳翥任石門巡檢康熙十四年耿逆黨陷饒州鳳翥率家丁巷戰力竭死之俱贈經厯又象山縣貢生謝逢亦遭耿逆之亂被執不屈觸石死王天才鄞人為象山協右營千總康熙十三年與賊戰于毛頭洋奮身前進手刃十七人後賊舟聚圍力戰不支赴海死謝逢字子荆象山人由貢生授知縣罷官里居耿逆攻象山副將羅萬里叛降逢被執不屈賊擁至彭姥嶺乘間觸石死陸崑字華星鄞人性篤孝順治己亥父為海冦所執將刃之崑奔救乞以身代遂遇害父得釋李鄴嗣字杲堂鄞人嘗侍父病至嘔血數斗遂絶意仕進專事著述所撰古詩文詞百餘卷鄞人宗師之其從兄弟文純之纘俱富著述人稱三李云萬斯大字充宗鄞人父泰明崇禎舉人以學行重于鄉斯大邃於經學尤精春秋三禮所著學禮質疑儀禮商禮記偶箋周官辨非學春秋隨筆多先儒所未發兄斯選字公擇躬行實學為劉宗周弟子弟斯同字季野書過目不忘年十四五遍讀父所藏書尤精經史有明一代事實能默識不遺徐乾學纂禮書徐元文王鴻緒修明史皆咨之所著凡三十種史大成字及超鄞人順治乙未進士廷試第一人援修撰厯官禮部侍郎有議裁孝子節婦廩給者駮止之知貢舉嚴內外之防略苛細試歲貢不循具文得卷必首尾披閲聞者感之卒賜祭葬仇兆鼇字滄柱鄞人為諸生有聲名登康熙乙丑進士官編修纍擢吏部右侍郎引疾歸兆鼇少從黃宗義遊講切性命之學恬淡自安所著有四書説約杜詩詳注等書薑宸英字西𬈑慈溪人遊京師用薦預修明史康熙丁丑廷試第三授編修時年已七十矣宸英自少以古文知名中歲研精經學旁及諸史百家為文必先立意而後下筆略無凝滯兼善書法行草尤入妙所著有湛園文稿葦間詩集陳汝咸字莘學鄞人父錫嘏字介眉康熙丙辰進士官編修有文名汝咸登辛未進士選庶常改漳浦知縣捕海盜有功調南靖擢御史都御史趙申喬薦其能遷通政𠫭議官至大理少卿同縣陳鴻績康熙舉人以知縣試康熙十八年博學宏詞授檢討黃斐字雲襄鄞人康熙庚戌進士由翰林改御史疏劾廣平府知府某貪縱又疏糾四川布政使家人之誣指良民為盜者直聲振一時纍官至左副都御史卒賜祭葬邵基字學址鄞人康熙辛丑進士由編修改御史入直尚書房洊擢吏部侍郎請嚴懲屬員之誣上官者出撫江蘇疏請支河汊港俱聽民挑又以孤貧銀米支給未均請均分而預給之又詳定州縣交代章程及各衛飬廉數目部議俱允行卒賜祭葬全祖望鄞人學極博於書靡不貫串以選貢入都與侍郎方苞論禮苞大異之乾隆元年舉博學鴻詞未試成進士改庶吉士散館歸班外用遂歸主講蕺山端溪諸書院修南雷黃氏宋儒學案校水經注續選甬上耆舊詩著有丙辰公車徵士小録漢書地理志稽疑經史問答諸書包幹鄭鄞人乾隆三十八年旌表孝子又慈溪縣孝子應允生錢秉虔並乾隆年間旌定海縣孝子慮長庚慈溪縣順孫張憲章俱嘉慶年間旌藍嘉瑛定海人官龍門協副將嘉慶十一年追勦蔡牽至黑水洋遭風漂至夷洋遇艇匪聚圍嘉瑛督兵力戰身受多傷陳殁同縣蔡得耀以守備擊賊於玉環洋殺獲首夥多名擢遊擊尋以出洋捕賊遭風沈殁雲騎尉蔡興福千總施大發把總鄭金張大鯨外委李文耀郁廷彪李永舉鄭國太嚴鎬周宏恩與鎮海劉成業官遊擊柯介錫官把總俱於嘉慶年間先後擊賊於海洋力戰沈殁均議恤如例流寓宋祖域建隆中由閩徙奉化仕至殿前司統制平居尚氣節樂施與歲飢發廪以賑全活以千計里中子弟不能學者教之貧不能婚喪者助之既殁立廟宇以祀焉鄭鍔由福州徙鄞躬孝友之行貫通經史登紹興三十年進士元任士林其先蜀綿竹人徙居奉化再世義徙崎山幼潁敏六歲能屬文既長喪父廬墓讀書亹亶不倦後講道會稽至大初以薦授安定書院山長有松鄉文集及中庸論語指要丁鶴年西域人年十七通詩書禮三經避地越江上遂留四明或旅食海鄉為童子師或寓居僧舍賣藥自給慈溪縣尹陳林稱賢令四方士大夫多依之鶴年居是邑數載未嘗覩其面納顔世居金山之西隨其兄宦遊江浙卜居于鄞以能文名尤長歌詩時浙人韓與玉能書王子充善古文納顔與二人偕至京師人目為江東三絶以薦授翰林院編修納顔舊作乃賢今改正戴良浦江人至正間儒學提舉嘗從定海泛海至登萊欲歸擴廓軍元亡變姓名寓慈溪之花嶼湖十餘年眀太祖欲官之不屈死明李善東平人父灝仕元為三江巡檢遂家慈溪篤志問學處窮約簞瓢自樂居一室日吟哦其中人羡其所作豪放目之曰小李白列女宋董八娜鄞之通縣鄉建嶴人虎銜其大母女手拽虎尾祈以身代虎為釋其大母銜女以去時林栗侍親官其地嘗目覩之已而為守以聞於朝祠祀之元金氏女鄞人金良女名汝安父母多疾女侍飬維謹及筓里中大家爭求聘女謂父母老病兄弟支持門户事朝夕乏供養奈何舍去自是絶葷茹夜則焚香籲天祈親夀後父母俱年八十餘卒女居喪六年遂不嫁鄉人稱其孝危素為之傳其事江文鑄妻范氏名妙元奉化人年二十一歸于江及門未合卺夫忽癎疾卒范曰我既入江氏之門即江氏婦也豈以夫亡有異志哉遂居夫家撫諸姪江森江道如己子卒年九十五程徐妻金氏鄞人徐仕元為兵部尚書至正末京城破金氏謂女瓊曰汝父出捍城我三品命婦汝儒家女又進士妻義不可辱抱二歲子與瓊俱赴井死明楊貞女慈溪人字鄭子淶洪武中子淶隨其父仲徽戍雲南楊年甫十六聞子淶母老弟幼請子父母適鄭養姑以待子淶之返子淶竟卒於戍所楊與姑撫諸叔成立以夫從子孔武為嗣守貞五十餘年其後鄭煥妻張氏嫁未旬日夫亡守節鄭泰然妻嚴氏早寡苦節撫孤鄭栻妻王氏事夫癎病中八年服勤勿怠夫亡後守節終身三人皆貞女夫族萬厯中知府題鄭氏節門以比浦江鄭氏義門云項氏奉化戴德彝嫂德彝死建文之難項家居聞變度禍且族令闔室逃去匿德彝二子山中毁戴氏族譜獨身留家收者至無所得械項至京榜掠備至終無一言戴族遂全按浙江省志及府縣各志俱稱項係戴德祐妻德祐乃德彝之弟舊統志稱項為嫂疑誤德彝偕兄德禮在都德祐往省之遂同被難德祐生二子長允珏五齡次允瑚三齡項在家聞變寄與外家避匿後遇赦始挾歸撫訓成立則所云匿二子者乃德祐之子非德彝子也頃遇難時年二十六又二十二年而卒事與統志所載稍異當係傳聞不同今附記于後以備𠫭考陳佳妻王氏慈溪人許聘于陳而佳病其父母娶婦以慰之及門即入侍湯藥未幾佳卒氏年甫十七姑張氏以未成禮勸之嫁氏不從姑乃使人邀其二弟諷之氏截髮毁容自誓姑終欲強之窘辱萬狀氏終無怨言曰不逼嫁為婢亦甘也每夕寢處小姑牀下受卑溼遂得傴疾私自幸曰我知免矣鞠從子梅為嗣教之業文成化𥘉領鄉薦卒昌其家張維妻凌氏慈溪人宏治中維舉於鄉而卒氏年二十五生子四歲亦卒因歸省其兄諷之改適遂終身不歸舅姑愍之曰吾二人景逼矣爾年尚遠何以為活婦曰恥辱事重飢死甘之乃出簪珥為舅納妾果得子喜曰張氏不絶妄後舅病瘋姑雙目瞽婦紡績供養二十年不衰萬義姑名義顓寧波衛指揮僉事萬鍾女兩兄武文皆襲世膱戰死旁無期功之親繼母曹兩嫂陳氏吳氏皆盛年孀居吳遺腹僅六月姑旦暮拜天哭告曰萬氏絶矣願天錫一男續忠臣後我天不嫁共撫之已果生男名曰全姑喜曰萬氏有後矣乃與諸嫠共守名閥來聘皆謝絶之訓全讀書嗣職傳子禧孫椿皆奉姑訓惟謹年七十餘卒姑之祖父先并死王事母及二嫂俱守貞姑更以義著鄉人稱為四忠三節一義之門葉貞女定海人許聘慈溪翁姓父母殁遂育于翁翁家日落姑已殁舅待之如婢又以子幼欲鬻之羅姓者女日夜哽咽一夕逸出門外投河死及晨得尸色如生衣服上下連結甚固薑阿龍妻桂氏慈溪人嘉靖中倭冦至被逼不從絶裾赴池水死竺欽妻陳氏奉化人嘉靖中倭冦至與夫扶姑攜女而逃至徐家渡賊漸逼氏度不能脫遂令夫負姑逸自抱女投水死傅烈女定海昌國衛傅梓女年十七未字美姿容為倭所得女以石自破面流血塗地賊怒磔之王憲維妻邱氏象山人嘉靖中漳賊劫西山入其家欲污之不從挺擊賊中首賊以刃刺其腹而死王仁益妻張氏象山人嘉靖中島冦入城氏適歸省父為賊所殺氏抱父尸痛哭賊欲犯之不從以刃脅之即奪賊刃自殺沈氏六節婦慈溪人章氏沈祚妻周氏沈希曾妻馮氐沈信魁妻柴氏沈維瑞妻孟氏沈宏量妻孫氏沈琳妻里名沈思橋近海族衆二千人多驍黠善鬭嘉靖中倭冦入數犯屢殲其魁賊深仇之一日賊大至沈氏豪誓于衆共死守章亦誓于內曰男子死鬭婦人當死義無為賊辱衆婦皆聽命聚一樓以侍既而賊入章先投河周與馮繼之柴自刃孟與孫為賊所得皆詈罵奪刃自刺死茅氏女慈溪人年十四父母亡與兄嫂居其兄病痿值冦入嫂出奔呼之同行女曰吾室女也去將安之且俱出誰為扶兄者賊縱火女扶兄避于空室火延至俱被焚死陳氏鄞縣人適于柴其夫蕩廢家業謀鬻女陳聞大慟赴水死陳襄妻倪氏定海人適鄞縣諸生陳襄襄早喪氏力女紅養姑有慕其姿者遣梅白姑氏煎沸􅣚自潰其面左目爆出又以煙煤塗傷處遂成惡狀媒見之驚走不敢復言厯二十年姑卒哀慟不食死甬上四烈婦張氏錢塘人適鄞縣舉人楊文瓚明亡文瓚與兄文琦友華夏屠獻宸俱坐死張幼針聯文瓚首棺殮畢題絶命詩自縊死文琦妻沈氏夏繼妻陸氏皆自縊有司聞三婦死遣丐婦四人至獻宸家防其妻朱氏甚嚴朱陽為惟笑以接之數日防者稍懈因謂之曰我將一浴汝儕可暫屏丐婦聽之遂合戶自盡時稱甬上四烈婦本朝趙文炳妻陳氏鄞縣人順治己亥海冦入犯獲氏欲污之大罵賊斷其臂赴水死又有應烈婦者鄞東鄊丐婦也海冦亂時避村廟中遇官兵欲污之力拒被殺江貞女奉化人名金姑許字駱氏子駱病篤舅姑因迎氏入門駱已垂絶翌日卒氏即為行喪或曰爾未為婦理得歸江何自苦氏曰入門即婦知行婦道而巳至八十始歸省年逾九十卒胡氏二烈婦鎮海胡定隆妻應氏定慶妻楊氏娣姒也並遭冦掠加刃於腹脅之不從被殺謝應誥妻俞氏鎮海人同郡媪避冦宋安嶺俞年最少冦至欲犯之氏抵死不屈以槊貫其胸罵猶未己冦截其首懸竹杖而去史登賢妻周氏象山人少寡舅姑老子甫三歲邑遇寇亂氏斷髮毁容佯為瘋疾以保身歲祲領賑粟以養舅姑而己啖粳籺又同縣錢拱妻林氏俱雍正中旌表王孝女慈溪人名盧姐性至孝母殁柩在室夜半火起家人倉皇走女往柩前哭呼救舁無應者火漸逼乃以身翼母棺遂焚死時年十七羅秀吉妻鄭氏慈溪人年二十三而寡家貧無子母欲令改適氏曰有舅姑在代夫奉養職也己而舅姑相繼亡母復迫之再三氏不為動一日母潛受聘財厲聲告鄭鄭佯如平常入夜密紉其衣及某氏輿至已扃户投繯死矣沈三壽妻周氏奉化人年十八夫病迎氏歸沈故流寓為傭家赤貧氏典衣以供醫藥甫兩月夫亡父母與姑俱欲其改適氏不可其兄強之氏哭于夫墓歸著嫁時衣闔戶自經洪爾文妻史氏鄞縣人適定海洪爾文爾文戚屬陳紹者豔氏色往來其家一日爾文逺出夜半紹排闥入欲強之不從則以兩手扼其吭氏力脫呼救紹急取繩纏氏頸意其怖死從之也氏拒益堅且大罵紹遂引繩絶之有四子俱幼紹并殺之時康熙二十七年四月也獄成紹磔誅氏被旌楊承祖妻沈氏鄞縣人夫亡守節同縣范琬友妻徐氏蒲文貴妻陳氏生員舒再芬妻陳氏董明妻郭氏生員徐僑妻毛氏李愛球妻繆氏周應爵妻張氏潘光捷妻陳氏潘光榮妻楊氏費國棟妻胡氏李愛玉妻江氏施公惠妻周氏胡起幡妻陳氏黃瑞妻陳氏張明玉妻黃氏生員徐基妻陳氏谷簡臣妻髙氏張起鳳妻周氏水大顯妻毛氏樂遜鋭妻鍾氏監生李昌授妻范氏李思杰妻項氏洪明任妻張氏鮑承哉妻聞氏生員吳世瑚妻俞氏俞世卿妻馬氏錢懿綱妻周氏傅錫鉞妻林氏湯廷茂妻周氏監生鄭學夏妻何氏張貴妻王氏朱善增妻周氏施廷梓妻吳氏鄭本賢妻沈氏蔣霱妻蕭氏鮑廷清妻鍾氏張瀛客要樓氏生員范鑄妻李氏戚文才妻李氏杜啓才妻邵氏陳士俊妻舒氏貢生陳元肇妻倪氏李斐章妻載氏陳泰爵妻葉氏沈越千妻劉氏武生徐元士妻李氏陸本洪妻盛氏趙周京妻胡氏陳袺妻唐氏張士暹妻陳氏孫廷顯妻聞氏陳之和妻余氏趙濂妻屠氏蒲應文妻周氏張圖安妻鮑氏監生陳振玉妻黃氏朱士奇妻沈氏張取新妻汪氏李敬義妻胡氏監生胡宗相妻孫氏孫藝妻董氏傅尚謙妻李氏張尚珍妻范氏監生毛忠藎妻柳氏聞華章妻朱氏王揆妻陸氏應統成妻殷氏應德峻妻徐氏錢國定妻金氏嚴立綱妻張氏張守元妻王氏錢美圭妻鮑氏樓慶雲妻周氏監生周云華妻金氏生員朱彪妻柴氏韓繼梅妻曹氏生員張錫玠妻蔣氏林一通妻孫氏楊式林妻陳氏蕭國柱妻朱氏李德昌妻王氏張國金妻凌氏劉逢良妻陳氏李世則妻徐氏生員毛忠楨妻馬氏洪振字妻萬氏孫美生妻王氏殷時髙妻柴氏陳僑妻顔氏張行仁妻邵氏周志佩妻薑氏夏廷武妻張氏王錫禮妻余氏陳起嶽妻黃氏鄭榮期妻崔氏林名逺妻楊氏方金侯妻徐氏俞朝保妻鄭