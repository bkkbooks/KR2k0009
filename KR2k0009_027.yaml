front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_027-1a}
body:
  text: 蘇州府四人物漢嚴助吳人郡舉賢良對策武帝擢為中大夫令助等與大臣辨論中外相應以義理之文大臣數詘建元中拜會稽太守朱買臣吳人家貧好讀書不治産業常艾薪樵賣以給食嚴助貴幸薦買臣召見説春秋言楚詞帝甚悅之拜為中大夫與嚴助俱侍中是時東越數反覆上拜買臣會稽太守到郡治樓船備糧食水戰具將兵擊破東越有功徵人為主爵都尉陸續吳郡人仕郡户曹史時歲荒太守尹興使續於都亭賑民饘粥事畢興問所食幾何續因口説六百餘人皆分别姓氏無有差謬為郡門下掾興坐楚事下廷尉續繫洛陽獄掠考五毒肌肉消爛終無異詞赦還鄉里續長子稠廣陵太守有理名中子逢樂安太守少子褒力行篤學不慕榮名連徵不就陸康褒子少以義烈稱除高成令厯遷武陵桂陽樂安太守所在見稱時靈帝欲鑄銅人詔調民田畝斂十錢康上疏切諫徴詣廷尉免歸會廬江賊攻沒四縣拜康廬江太守賊黨悉降獻帝時天下大亂康蒙險奉貢詔加忠義將軍袁術屯夀春康以其叛逆閉門不通術遣孫䇿攻康困守受敵二年城陷朝廷愍其守節高岱吳郡人輕財貴義孫䇿聞其善左傳欲與講論為媚嫉者所中過害三國吳陸績康子博學多識星厯算數無不該覽孫權統事辟為奏曹掾以直道見憚出為鬱林太守意在儒雅雖有軍事著述不廢作渾天圖注易䆁元皆傳於世顧雍吳縣人孫權領會稽太守雍為丞行太守事吏民歸服雍寡言語舉動時當為丞相所選用文武將吏各隨其能所任心無適莫時訪逮民間及政職所冥輒密以聞若見納用則歸之於上不用終不宣泄權以此重之弟徽少逰學有唇吻朱桓吳人孫權為將軍桓給事幕府後遷蕩寇校尉使部伍吳會二郡鳩合遺散丹賜鄱陽山賊起桓督領諸將周旋赴討皆平定為濡須督魏曹仁將步騎數萬向濡須桓偃旗鼓以誘致仁臨陳斬溺死者千餘以功封嘉興侯拜前將軍桓輕財貴義愛養吏士俸祿産業皆與共分及卒吏士男女無不號慕子異以父任除郎拜騎都尉代桓領兵顧邵雍子博覽書傳好樂人倫為豫章太守下車祀徐孺子墓舉善以教風化大行在郡五年卒張溫吳人少修節操顧雍稱為當今無輩嘗以輔義中郎將使蜀蜀貴其才孫權嫌其聲名太盛會暨豔事起即罪溫幽之有司後病卒朱據吳人孫權以據才兼文武使領兵屯湖熟謙虛接士輕財好施赤烏九年遷驃騎將軍遭二宫搆爭據擁護太子言則懇至義形於色遂左遷尋賜死顧談邵子為太常平尚書事時魯王霸有盛寵談上書欲安太子而便魯王坐徙交州幽而發憤著新言二十篇其知難篇蓋以自悼也張儼吳人以博聞多識拜大鴻臚寶鼎中使於晉賈充荀勗等欲傲以所不知皆不能屈晉顧榮雍孫與二陸同入洛時人號為三俊拜郎中厯廷尉正後還吳為東海王軍咨祭酒廣陵相陳敏反榮與周屺甘卓紀瞻等起兵攻敏平之元帝鎮江東以榮為軍司加散騎常侍凡所謀畫皆以咨焉張翰吳郡人有清才善屬文而縱任不拘時人號為江東步兵齊王冏辟為大司馬東曹掾冏時執權翰因見秋風起乃思吳中菰菜蓴羹鱸鱠遂命駕而歸著首邱賦俄冏敗人皆謂之見幾翰性至孝遭母憂哀毁過禮其文筆數十篇行於世顧衆榮族弟出後伯父早終事伯母以孝聞舉孝廉為鎮東參軍厯太子中庶子蘇峻反王師敗績衆潛圖義舉吳中響應峻平論功封鄱陽縣伯顧和衆族子王導為揚州辟從事咸康初拜御史中丞劾奏尚書左丞戴抗贓污百萬付法議罪百僚憚之遷侍中領國子祭酒母憂去職居喪以孝聞既練起為尚書令和每見催逼輒號咷慟絶表疏十餘上竟不起服闋然後視職陸士光吳人少有雅望元帝初辟為祭酒纍遷散騎常侍拜侍中徙尚書以平錢鳳功進爵江陵伯蘇峻之難隨成帝在石頭舉動方正峻不敢加害峻平進爵為公陸玩士光弟少有美名元帝引為丞相參軍後厯侍中司空雖登公輔所辟皆寒素有行之士翼亮纍世常以宏重為人主所貴誘納後進謙若布衣陸納玩子少有清操王述引為建威長史纍遷尚書令恪勤貞固始終勿渝時會稽王道子委任羣小納望闕歎曰好家居纎兒欲撞壞之耶朝士服其忠亮張禕吳郡人少有操行恭帝為琅琊王以禕為郎中令從王至洛還京都劉裕以禕乃帝之故吏素所親信封藥酒一􅑥付禕密加鴆毒禕自飲之而死宋顧覬之吳郡人孝建中為湘州刺史以政績稱厯吏部尚書出為吳郡太守幸臣戴法興權傾人主覬之未嘗降志蔡興宗與覬之善嫌其風節太峻覬之曰辛毗有云孫劉不過使吾不為三公耳後為湘州刺史卒覬之家門雍穆為州郡所重嘗命弟子願作定命論張敷吳郡人生而母亡至十歲許求母遺物惟得一扇乃緘録之每至感思輒開笥流涕性整貴風韻甚高武帝召見奇之曰真千里駒也以為世子中軍參軍數見接引纍遷黃門侍郎父在吳興亡遂毁瘠成疾未期而卒孝武即位詔旌其孝道追贈侍中改其所居稱張孝里陳遺吳郡人宋初為郡吏母好食鐺底飯遺在役恆帶一囊每煮食輒録其焦以貽母母目失明遺入户再拜號咽母目豁然即明陸徽吳人為建康令清平無私除廣州刺史士庶愛詠厯都督寧益二州諸軍事益州刺史威惠兼著卒於官家無餘財文帝惜之諡曰簡子張裕吳人初為何無忌參軍纍遷揚州别駕武帝西伐劉毅北伐關洛皆居守留任州事出為廣州刺史綏靜百越嶺外安之元嘉中除會稽太守職事甚理尋卒於官諡恭子子演鏡永辨岱俱知名時謂張氏五龍顧琛和曽孫謹確不尚浮華孝建初為吳郡太守以起義功封永新侯竟陵王誕據廣陵遣陸延稔齎書授琛及二子寶素寶先官琛執延稔斬之遣二子送其首世祖嘉之終員外常侍中散大夫齊張融吳郡人行巳卓越高帝素愛之嘗曰此人不可無一不可有二融有孝義忌月三旬不聽樂官司徒左長史文集數十卷行於世名為玉海張岱裕少子州辟從事厯為三王府咨議與典籖主帥共事事舉而情得嘗言我為政端平待物以禮悔吝之事無由而及宋元徽中為益州刺史益土安其政遷侍中吏部尚書武帝時為吳興太守更以寬恕著名卒諡貞子張緒吳郡人少知名清簡寡欲長於周易言精理奧見宗一時武帝時遷散騎常侍帝植蜀柳於大昌靈和殿前嘗賞玩咨嗟曰此楊柳風流可愛似張緒當年時張沖吳郡人少有至性父卒每祭輒流涕居官有幹力屢遷郢州刺史梁武帝起兵手書喻意又遣辨士説之沖確然不回分部拒守梁遣曹景宗等攻城沖固守不出病將死屬府僚以誠節官終而卒陸慧曉吳郡人玩元孫清介自立不雜交遊張緒稱之曰江東裴樂也初應州郡辟舉秀才以母老還家侍養十餘年不仕高帝輔政除為尚書殿中郎何點稱慧曉心如照鏡遇形觸物無不朗照為廬陵王長史厯輔五政治身清肅僚佐以下造詣必起送之厯官輔國將軍南兗州刺史以疾歸卒三子僚任倕並有英名時謂三傑陸厥吳郡人少有風概好屬文嘗與沈約論四聲永元初父間被誅厥兄絳抱頸求代死不獲遂以身蔽刃俱死厥坐繫尋有赦感痛而卒陸澄吳郡人少好學手不釋卷纍遷度支尚書令王儉自以博聞多識讀書過澄集學士何憲等盛自商略澄待儉語畢然後談所遺漏數千百條皆儉所未覩儉嘆曰陸公書厨也陸超之吳郡人雅為晉安王子懋所知明帝殺鄱陽隨郡二王晉安王舉兵入討君側事敗人勸超之逃亡答曰吾若逃非惟孤晉安之眷亦恐田橫客笑人端坐俟命有門人周姓者伺超之坐自後斬之頭墮而身不僵顧憲之覬之孫性清直宋元徽中為建康令時人號曰神明仕齊為東中郎長史行會稽郡事山隂人吕文度有寵於武帝於餘姚立邸頗縱橫憲之至郡即日除之西陵戍主杜元懿請增牛埭稅憲之議其有乖政體武帝並從之由是深以方直見知時竟陵王於宣城臨城定陵三縣界立屯封山澤數百里禁人樵採憲之固陳不可言甚切直王曰非君無以聞此德音即令罷屯禁遷尚書吏部郎中宋時其祖覬之嘗為吏部於庭植嘉樹謂人曰吾為憲之植耳至是果為此職憲之雖屢經宰郡資無儋石及歸環堵不免飢寒所著詩賦銘贊并衡陽郡記數十篇梁陸倕慧曉子少勤學善屬文嘗借漢書失五行志四卷乃暗寫還之略無遺脫天監初為安成王主簿與樂安仕昉友為感知已賦以贈武帝雅愛倕才纍遷太常卿陸襄厥弟弱冠遭家禍終身蔬食不聽音樂昭明太子聞襄業行啓高祖引與遊處除太子洗馬母憂去職襄年巳五十毁頓過禮太清元年遷度支尚書侯景陷臺城襄與海鹽陸黯舉義兵戰敗以憂憤卒陸雲公襄姪好學有才思製泰伯廟碑張纘讀其文歎曰今之蔡伯喈也武帝時纍遷中書黃門郎陸杲吳人少好學天監五年位御史中丞性悻直不畏強禦為義興太守在郡寬惠為下所稱厯左民尚書太常卿張率吳人年十二能屬文嘗與同郡陸倕詣沈約約曰此二子後進才秀皆南全也天監初引見玉衡殿謂曰祕書丞天下清官東南胄望未有為之者今以相處厯黃門侍郎張嵊吳人有孝行為吳興太守侯景圍鄴嵊舉義兵赴援賊行臺劉神茂遣使説嵊嵊斬其使乃遣軍破神茂後敗被執景將舍之嵊曰死為幸乃殺之世祖追贈侍中諡忠貞顧協吳人和六世孫舉秀才沈約覽其策歎曰江左以來未有斯作普通中有詔舉士湘東王表薦之召拜通直散騎侍郎協清介有志操初為廷尉正冬服單薄寺卿蔡法度謂人曰我願解身上𥜗與顧郎顧郎難衣食者竟不敢以遺之在省十六載器服飲食不改其常協博極羣書於文字及禽獸草木尤稱精詳撰異姓苑五卷瑣語十卷皇侃吳郡人少好學師事會稽賀瑒盡通其業仕梁為國子助教於學講説聽者常數百人撰禮記講疏五十卷奏上詔付祕閣加員外散騎侍郎性至孝常日限誦孝經二十遍丁母憂感心疾卒陳孫瑒吳人少倜儻好謀略博涉經史大建中都督荆州刺史出鎮公安增修城池懷服邊遠為鄰境所憚後纍遷祠部尚書瑒事親以孝聞於諸弟甚篤睦有財物散之親友及卒尚書令江總為之銘志後主又題銘後四十字遣左民尚書蔡徴宣敕就宅鐫之時論以為榮顧野王吳人遍觀經史精記默識無所不通為梁宣城王賓客侯景之亂野王丁父憂歸本郡乃召募鄉黨隨義軍援都見者莫不壯之大建中纍遷黃門侍郎光祿卿野王以篤學至性知名其勵精力行皆人所莫及所撰文集二十卷陸瓊吳人父雲公梁時掌著作瓊年十一丁父憂毁瘠有至性天嘉中以文學纍遷吏部尚書詳練譜牒雅鑑人倫號為稱職性謙儉不自封殖雖位日隆而執志愈下俸祿皆散之宗族暮年深懷止足謝疾不視事有文集二十卷陸溫玉瓊從父弟幼孤好學有志標纍遷直嘉德殿學士文帝以其博學引置左右嘗使製刀銘溫玉援筆立就無所點竄帝歎賞之弟瑜並以才學娛侍左右時人比之二應張種吳郡人為太府卿除左民尚書權監吳郡種深沈虛靜識量宏博時以為宰相之器僕射徐陵嘗抗表讓位於種雖厯顯位家産屢空終日晏然不以為病有集十四卷陸慶吳郡人少好學遍通五經節操甚高仕梁為婁令天嘉初徴為散騎侍郎不就永陽王為吳郡太守欲與相見慶辭以疾慶嘗詣郡掾宗人榮王乃微服往榮宅穿壁觀之王謂榮曰風神凝峻嚴君平鄭子真何以尚兹張昭吳郡人幼有孝性父嘗患消渴嗜鮮魚昭身自結網捕魚以供朝夕弟乾亦有至性父卒兄弟並不衣綿帛不食鹽酢每一感慟必至嘔血服未終母又卒兄弟哀毁形容骨立衡陽王伯信舉孝廉固辭不受隋張仲吳郡人覃思經典撰春秋義略異於杜氏七十餘事喪服義三卷孝經義三卷論語義十卷前溪音義十二卷官至漢王侍讀潘徽吳郡人性聰敏少受禮於鄭灼受毛詩於施公受書於張沖講莊老於張譏並通大義尤精三史善屬文能持論秦王俊召為學士令為萬字文並遣撰集字書名為韻纂俊薨晉王廣復引為揚州博士令與諸儒撰江都集禮褚輝吳郡人以三禮學稱於江南大業中徴天下儒術之士悉入內史省相次講論輝博辨無能屈者擢太學博士撰禮疏三百卷唐陸德明名元朗以字行吳人善名理言隋大業間廣召經明士四方踵至德明與魯達孔褒共會門下省相酬難莫能詘王世充憯號德明移病成皋入唐為國子博士論撰甚多傳於世朱子奢吳人善文詞貞觀初直國子學纍轉諌議大夫宏文館學士初太廟享止四室高祖崩將祔主於廟詔有司詳議以子奢言始定七廟之制帝嘗欲觀起居紀録子奢曰陛下所舉無過事雖見無嫌然懼開後世史官之禍子奢為人樂易能劇談以經誼緣飾每侍宴帝令論難羣臣恩禮甚篤張後允崑山人以學行世其家高祖鎮太原引為客以經授秦王太宗即位問欲何官陳謝不敢帝曰朕從卿受經卿從朕求官何所疑後允頓首願得國子祭酒授之卒年八十三諡曰康陸元方吳人舉八科皆中武后時為天官侍郎或言其薦引多親黨后怒免官令白衣領職元方薦人如初后召讓之對曰舉臣所知不暇問讐黨又薦其友崔元暐有宰相才后知無他復拜鸞臺侍郎同平章事元方素清慎再執政每進退羣臣后必先訪問外祕莫知臨終取奏藁焚之曰吾隂德在人後當有興者陸象先元方子器識深邃舉制科高第參揚州軍事纍授中書侍郎景雲中進同中書門下平章事太平公主擅權宰相爭附之象先未嘗往謁及謀逆召宰相議象先不從以保護功封兖國公弟景倩監察御史景融工部尚書景融於象先為後母弟象先被笞景融諫不入則自楚母為損威人多其友陸餘慶元方從父陳右衛將軍珣孫方雅有祖風以博學稱舉制䇿甲科纍監察御史聖厯初靈勝二州黨項誘别部寇邊詔餘慶招慰喻以恩信蕃酋率衆內附開元中為河南河北宣撫使餘慶於寒品後進必悉力薦藉人有過必面折退無一言中宗朝以道自將雖仕不赫赫訖無悔尤張旭吳人善書每大醉乎呌狂走乃下筆或以頭濡墨而書既醒自視以為神世呼張顛嗜酒與李白等號飲中八仙仕常熟尉歸崇敬吳人治禮家學多識容典遭父喪孝聞鄉里天寶中舉博通墳典科對策第一授左拾遺代宗幸陜召問得失崇敬極陳生民瘦敝當以儉化天下以兵部尚書致仕諡曰宣張鎰後允五世孫居母喪以孝聞郭子儀表為元帥府判建中初拜中書侍郎同中書門下平章事子儀壻趙縱為奴所告下御史臺劾治而奴留內侍省鎰力爭之杖死奴盧杞忌鎰剛直出為鳳翔隴右節度使為李楚琳所害詔贈太子太傅顧少連和裔孫為監察御史德宗幸奉天徒步詣謁授翰林學士再遷中書舍人閲十年以謹密稱厯吏部侍郎嘗與裴延齡會田鎬第酒酣提笏曰段秀實笏擊賊臣今吾笏擊姦臣奮且前元友直勸解之改京兆尹政尚寬簡不為灼灼名遷吏部尚書陸璪餘慶子舉明經仕以清幹稱除洛陽令摧勒姦豪人不敢犯纍遷西河太守從子長源有清譽貞元中由汝州刺史徙宣武行軍司馬去汝日送車二乘曰吾祖罷魏州有車一乘而圖書半之吾愧不及先人云沈既濟吳人經學該明楊炎薦其有良史才召拜左拾遺史館修撰請省天后紀合中宗紀議不行德宗立鋭於治詔兩省分治待詔官權公錢收子贍用既濟諫止後為禮部員外郎撰建中實録時稱其能歸登崇敬子貞元初拜右拾遺德宗欲以裴延齡為相右補闕熊執易疏論之以示登登動容曰願竄吾名雷霆之下君難獨處轉右補闕起居舍人順宗為太子登父子侍讀及即位遷工部侍郎獻龍樓針憲宗問政何先登勸順納諫諍進工部尚書子融開成初拜御史中丞湖南觀察使盧周仁取羡錢億萬進京師融劾奏周仁以小利市恩恐海內因繇漁利請還所進代貧民租入厯兵部尚書丁公著吳人三歲喪母七歲見鄰媪抱子哀感不食父喪負土作冢貌力癯惙觀察使薛蘋表上至行詔刺史弔問李吉甫為相擢右補闕充太子諸王侍讀因著太子諸王訓十篇穆宗立召居禁中條詢治理纍遷禮部尚書沈傳師既濟于治春秋工書貞元末舉進士復登制科為河南江西觀察使遷吏部侍郎性恬退無競更二鎮十年無書賄入權家初拜官宰相欲以姻私託幕府者傳師拒之治家不尚威嚴閨門自化帑無儲錢鬻宅以葬云張籍吳人第進士為國子博士厯主客郎中當時名士皆與遊而韓愈尤賢重之為詩長於樂府任終國子司業陸亙吳人元和中䇿制科中第補萬年丞厯䆓蔡虢蘇四州刺史浙東觀察使徙宣歙文明嚴重所到以善政稱陸希聲吳縣人景融四世孫博學善屬文論著甚多為右拾遺見州縣利弊上言當謹視賊盜明年王仙芝反株蔓數十州纍擢歙州刺史昭宗聞其名召為給事中拜户部侍郎同中書門下平章事以太子少師罷陸龜蒙元方七世孫性高放通六經大義刺史張搏辟以自佐居松江甫里多所論撰嗜茶置園顧渚山下不喜與流俗交升舟設篷席齎束書茶竈筆牀釣具時謂江湖散人或號天隨子甫里先生後以高士召不至宋許洞吳縣人折節勵學尤精左氏傳咸平三年進士景德中獻所撰虎鈐經二十卷又著春秋釋幽五卷演元十卷鄭戩吳縣人力學舉進士甲科權三司使復轉運使考課格分别殿最官至樞密副使范仲淹唐宰相履冰之後其先邠州人後徙家江南遂為蘇州吳縣人舉進士第為廣德軍司理參軍晏殊薦為祕閣校理每感激論天下事奮不顧身一時士大夫矯厲尚風節自仲淹倡之仁宗朝由右司諫出知睦州徙蘇州首建郡學聘胡瑗為師州大水民田不得耕仲淹疏五河導太湖注之海遷吏部員外郎吕夷簡不侻罷知饒州厯潤州越州元昊反召為天章閣待制厯知永興軍延州慶州改邠州觀察使守邊數年號令明白愛撫士卒羌人呼為龍圖老子進陜西路安撫招討使元昊請和召拜樞密副使除參知政事仲淹上十事中外想望其功業仲淹以天下為巳任裁削幸濫考核官吏僥幸者不便謗毁稍行會邊陲有警急遂以仲淹為河東陜西宣撫使以疾請鄧州尋徙杭州再遷户部侍郎徙青州會病甚請潁州未至而卒年六十四贈兵部尚書諡文正既葬御書其碑曰褒賢之碑仲淹內剛外和性至孝好施豫置義莊里中以贍族人泛愛樂善士多出其門下為政尚忠厚所至有恩邠慶二州之民與屬羌皆畫像立生祠事之及卒羌酋數百人哭之如父四子純祐純仁純禮純粹純祐事親孝不應科舉寶元中西夏叛仲淹連官關陜皆將兵純祐與將卒錯處得其才否由是仲淹任人無失而屢有功葉清臣長洲人天聖進士知舉劉筠奇所對䇿擢第二宋進士以䇿擢高第自清臣始寶元初為兩浙轉運副使建請疏盤龍匯滬瀆港入於海民賴其利知永興軍浚三白渠溉田踰六千頃仁宗御天章閣召公卿出手詔問當世急務清臣聞之為條對極論時政闕失其言多劘切權貴以為翰林學士權三司使知河陽卒清臣天資爽邁遇事敢行奏對無所屈數上書論天下事陳九議十要五利皆當世可行者有文集一百六十卷錢象先蘇州人進士高第吕夷簡薦為國子監直講厯權大理少卿象先長於經術侍邇英殿十餘年有所顧問必依經以對反覆諷諭遂及當世之務帝禮遇甚渥屢為刑官條令多所裁定持心平恕知許潁陳三州以吏部侍郎致仕程師孟吳人進士甲科判三司都磨勘司接伴契丹使蕭惟輔爭白溝地師孟曰兩朝當守誓約涿郡有案牘可覆視君舍文書騰口説遽欲生事耶惟輔愧謝出為江西轉運使知福州築子城建學舍治行最東南後纍領劇鎮為政簡而嚴罪非死者不以屬吏得豪惡不逞者必痛懲艾之至剿絶乃已所部肅然洪福廣越為立生祠范師道長洲人進士及第至和初為御史奏請罷內降推恩選宗室賢者養宫中備儲二纍遷三司鹽鐵副使直龍圖閣帥道居官勵風操前後在言路有聞即言范純仁仲淹子皇祐進士仲淹門下多賢士如胡瑗孫復石介李覯之徒純仁皆與從逰仲淹沒始出仕神宗朝同知諫院奏言王安石變祖宗法度掊克財利民心不安神宗嘉納之乃作尚書解以進安石大怒乞加重貶神宗命知河中府徙成都路轉運使以新法不便戒州縣未得遽行安石怒純仁沮格左遷知和州哲宗立召為右諌議大夫元祐三年拜尚書右僕射兼中書侍郎純仁在位務以博大開上意忠篤革士風凡引薦人材必以天下公議哲宗既召章惇為相純仁堅請去遂以觀文殿大學士知潁昌府吕大防等竄嶺表會明堂肆赦章惇先期言此數十人當終身勿徙純仁齋戒上疏申理之忤惇意貶武安軍節度副使永州安置徽宗即位授光祿卿分司南京純仁乞歸疾革以宣仁后誣謗未明呼諸子口占遺表卒年七十五諡曰忠宣御書碑額曰世濟忠直之碑純仁自布衣至宰相廉儉如一所得俸賜皆以廣義莊有文集五十卷行世子正平正思正平學行甚高父卒詔官其子孫正平推與幼弟紹聖中為開封尉忤蔡京羈管象州會赦得歸范純禮純仁弟以父蔭為祕書省正字出知遂州瀘南有邊事調度苛棘純禮一以靜待之民圖像於瀘奉之如神元祐初屢遷刑部侍郎進給事中凡所封駮正名分紀綱皆國體之大者徽宗立拜禮部尚書擢尚書右丞范純粹純仁弟元祐中為户部侍郎紹聖初以元祐黨人奪職黨禁解以徽猷閣待制致仕純粹沈毅有幹略嘗惜賣官之濫論甚剴切郟亶崑山人嘉祐進士為廣東安撫使機宜上吳中水利論六失六得條具甚悉除司農丞令提舉興修吕惠卿言其措置乖方遂罷役子僑官將仕郎嗣緝父説亦有所發明其書並傳於世米芾吳縣人為書畫學博士擢禮部員外郎為文奇險妙於翰墨得王獻之筆意畫山水人物自名一家精於鑒裁不能與世俯仰故從仕數困子友仁力學嗜古亦善書畫世號小米仕至敷文閣直學士朱長文吳縣人年未冠舉進士築室樂圃坊著書閲古吳人化其賢名動京師公卿薦以自代者衆元祐中召為祕書省正字元符初卒哲宗知其清賻絹百有文三百卷六經皆為辨説又著琴史葉夢得吳縣人登進士第徽宗朝為議禮武選編修官召對除起居郎言用人以有德為先又極論朋黨之弊高宗駐蹕揚州除户部尚書陳待敵之計有三曰形曰勢曰氣因請南巡阻江為險以備不虞紹興初為江東安撫大使奏防江措畫八事上章請老特遷一官拜崇信軍節度使致仕黃由長洲人淳熙八年廷對論內侍甘升與曾覿王抃相結招權納賄擢第一吳自設科來由始冠多士纍遷將作監嘉王府贊讀紹熙五年孝宗疾光宗不能問安人情疑懼由請嘉王過重華宫問安孝宗為之感動慶元初有請斥偽學之黨者由執奏不可終刑部尚書李彌遜吳縣人政和中官起居郎以封事剴切廢斥宣和末知冀州金兵攻河朔彌遜損金帛致勇士修城堞決河護塹邀擊其遊騎靖康中再遷起居郎直前論事鯁切如初秦檜贊和議彌遜力陳不可再上疏言愈切直以沮議落職有詩十卷弟彌大崇寧進士纍遷刑部尚書王葆崑山人弱冠通諸經宣和六年進士紹興中纍遷考功御史秦檜專政百司莫敢可否事葆獨伸滯直枉當官不避出知廣德軍移守漢瀘二州皆著政績厯浙東提刑丐祠歸葆學行深醇尤精鑒裁每賞識士於未過時後多為名臣郭元邁吳縣人建炎中魏行可使金元邁以上舍應募補和州團練為之副不肯髠髮換官卒於北范成大吳縣人紹興進士孝宗時充國信使上面諭受書事成大至燕山密草奏具言受書式懷之入初進國書辭氣慷慨搢笏出之金庭紛然太子欲殺成大越王止之竟全節而歸除中書舍人張説除樞密成大留詞頭七日不下上疏言之説命竟寢纍拜參知政事紹興中加大學士薨成大有文名尤工詩有石湖集攬轡録桂海虞衡集行世衛涇崑山人淳熙進士第一授承事郎時初任將滿必通謝宰執始頒召命王淮秉政涇不通謝被召三月不得引見尋除祕書省正字屢上言恢復大計辭甚剴切紹熙中應詔上封事觸李后及諸佞幸出為淮東浙東兩路提舉纍遷御史中丞請誅韓托胄論罷陳自強拜參知政事為史彌遠所忌諷御史劾罷之卒諡文節弟湜著禮記集説王介吳郡人由進士授昭慶軍簽判先宗時入為學官疏請駕覲重華宫慶元時韓托胄用御筆罷諫官介力攻之開禧中為尚書度支郎首陳用兵之禍後纍遷中書舍人會不雨請册免宰相史彌遠厯知慶元府卒諡忠簡介初學於吕祖謙故文學有原委子野工詩書效歐陽詢以父廕補官復登第厯僉書樞密院事以不阿丁大全罷歸麋溧蘇州人左司郎中師旦子以父郊恩授如皋尉復舉慶元進士嘉定末纍遷監察御史理宗即位除右正言立朝剛正先後封事彈章數十上人稱其有仁者之勇大臣之節以祕閣修撰致仕子􅠐由進士厯知安慶府弇以廕官提舉江西常平並有治續李韶彌遜曽孫父文饒為台州司理參軍每謂人曰吾司臬多陰德後有興者嘉定四年韶與其兄同時舉進士為太常博士諫濟王竑獄且以書曉史彌遠言甚懇到拜殿中侍御史時魏了翁罷督子祠韶訟之乞亟召還劾女冠吳知古宜出之禁庭改遷禮部侍郎韶忠厚純實默坐一室門無雜賓元干文傳平江人少嗜學登延祐二年乙科纍遷長洲烏程兩縣尹升婺源知州又知吳江州文傳長於治劇所至俱有善政長洲為文傳鄉邑文傳徙榻公署無事未嘗輒出而親舊莫敢通私謁至正三年召赴闕預修宋史擢集賢待制以禮部尚書致仕顧德輝崑山人才情妙麗輕財結客築别業於茜涇西曰玉山佳處招致四方文學之士置酒賦詩其中以母喪歸綽溪張士誠辟之遂斷髮廬墓自號金粟道人所著詩有玉山璞藁及刻交遊詩自楊維禎而下四十餘家曰草堂雅集並傳於世明髙啓長洲人博學無所不覽尤工於詩隱居吳淞江之青邱自號青邱子時吳下詩人啓尤超軼與楊基張羽徐賁並稱四傑洪武初召啓修元史授翰林院國史館編修官復命教授諸王三年擢户部右侍郎固辭歸後坐魏觀事誅年三十九楊基吳縣人潁敏絶人九歲能背誦六經著書十餘萬言名曰論鑒嘗於楊維禎座上賦鐡笛歌維禎驚喜與俱東語從遊者曰若曹就之學優於老鐵也著有眉菴集洪武初官至山西按察使顧琇吳縣人洪武初父充軍鳳翔母隨行母卒琇奔赴負母骨行數千里未嘗置於地寢則懸之屋梁涉則戴之於頂後父釋歸李養不衰父卒琇號泣而死宋克長洲人博涉書傳好任俠擊劒走馬元末思以功業自見無所遇杜門染翰日費千紙遂以善書名天下與同邑高啓王行無錫吕敏永嘉余堯臣等為北郭十友王賓長洲人通經善醫不肯為富貴人療治里巷及方外士招之輒往明太祖法嚴仕者多不保賓徉狂以免知府姚善造之賓踰牆逸去他日善屏騶從獨往始一接善欲薦之終不敢發言事母至孝年七十疾革抱母不釋巳死復蘇連呼母乃絶既成祖即位且衣冠自投琴川橋下死本朝乾隆四十一年賜諡節愍劉政長洲人建文初舉鄉試第一出方孝孺門燕兵起草平燕策將上卧疾未行聞燕兵渡江痛哭嘔血死龔詡崑山人年十七為金川門卒燕兵至慟哭去之隱居教授巡撫周忱重其人欲薦之謝曰詡仕固無害恐負往日金川門一慟耳竟以隱終門人私諡安節先生尤安禮長洲人為人尚義輕利一友當遠戍念其幼女無所託安禮曰吾有男當娶之巳而友死戍所其女巳得痼疾迄踐其言用薦為崇安教諭厯知兵部郎中貴州參議歸居窮巷中屋隘甚知府况鍾割官地益之固辭陳祚吳縣人永樂中甫釋褐即授河南參議疏諫遷都北京非便謫太和山佃户宣德時召為御史巡按江西祚上勤聖學疏請進講大學衍義帝大怒謂譏我不讀大學並其父母妻子悉下獄英宗立始復官終福建僉事吳璋吳江人年十一失怙母陸氏守節永樂中母以選給事內廷隨親王分封韶州改封饒州璋往來兩藩陟嶺蛇齧瀕死遇異人得活至饒屢啓求見母不允日夜號哭不輟聲王聞賢之遣扶母出三日而母卒璋徒步扶櫬歸葬子洪成進士王永和崑山人性至孝父卧疾十八年侍湯藥不懈永樂中舉於鄉厯兵科都給事中數彈劾武將以徑直聞七年超拜工部右侍郎十四年從駕北征歿於土木贈本部尚書諡襄敏陳鎰吳縣人永樂進士授御史厯湖廣山東浙江副使皆有聲宣德至景泰間以右副都御史三鎮陜陜人戴之若父母還為右都御史加太子太保卒諡僖敏劉鉉長洲人幼孤事母以孝聞永樂中舉順天鄉試景泰四年厯國子祭酒時諸生出身資格多為權要所持鉉與諸生約必六館共推無敢越次者會國計不足部檄停月廩鉉言養才為國家急務得復給天順初改少詹事鉉性介特言行不苟讀書老而彌篤服食儉陋楊士奇至其居湫隘幾難容膝歎息而去卒贈禮部侍郎諡文恭子瀚天順初進士官至陜西按察使以廉慎稱吳訥常熟人好古博學永樂中命以布衣侍闕廷備顧問洪熙中擢御史宣德五年拜南京右僉都御史進左副都御史端方清介克振風紀卒諡文恪著文章辨體行世曾孫堂宏治進士官御史武宗幸榆林堂伏御道大呼力諫纍官大理寺少卿陳繼吳縣人生十月而孤長博極羣書人稱為陳五經母吳氏苦志守節繼事之極孝有司上其事母子並獲旌仁宗建宏文閣欲得賢士任之楊士奇薦繼召為五經博士直閣備顧問終翰林檢討趙忠長洲人宣德時由進士為御史厯按四川浙江終雲南參議久宦無餘資致仕歸其友朱名仲推餘屋居之及卒名仲與其友襄事乃克殮楊翥吳縣人宣宗時楊士奇以經明行修薦召試稱旨授翰林檢討改郕府長史景泰初以王府舊僚纍遷禮部尚書給祿致仕翥篤行絶俗家居鄰人築室簷溜於翥家家人不平翥曰雨時少何必校也士奇落新第亟邀登豈曰舍初成願得善人長德首臨之其見重如此杜瓊吳縣人生而孤稍長博綜古今兼工書畫為文章醇實不浮事母至孝有司欲以上聞瓊固辭而請旌其母母遂獲旌嘗刲肱愈母疾祕不令人知知府况鍾兩薦之固辭不出宣德景泰間求賢詔屢下所司輒擬薦瓊知不可奪益禮重焉學者稱東原先生韓雍長洲人正統進士授御史巡按江西踔厲風發景泰時擢廣東副使尋巡撫江西有才望天順中厯官兵部右侍郎憲宗立坐纍貶官會廣西猺獞為寇改左僉都御史贊理軍務討之直搗大藤峽破賊三百二十四寨生擒賊魁分擊餘黨悉定威震南方遷左都御史提督兩廣軍務丁憂歸復以右都御史涖故任致仕兩廣人念雍功立祠奉祀正德間諡襄毅葉盛崑山人正統進士授給事中景帝虛懷納諫凡六科建請率盛與林聰為之倡廷臣議事盛每先發往復論難擢右參政督餉宣府協贊軍務修復獨石馬營龍門衛所四城及赤城雕鶚諸堡天順時以右僉都御史巡撫兩廣尋改撫宣府憲宗朝擢禮部右侍郎兵部議搜河套復東勝盛力言守為長䇿後師出無功人服其先見終吏部左侍郎諡文莊劉溥長洲人少敏悟八歲能賦詩研覃載籍與同縣鄒亮儀真蔣忠等號景泰十才子孔鏞長洲人景泰中舉進士知都昌連山二縣為高州知府單騎入賊寨諭降厯廣西按察使以右副都御史巡撫貴州計擒悍苗宏治初官至工部右侍郎陸釴崑山人天順進士第一廷試第二為編修沈靜好學與張泰並擅詩才名藉甚孝宗在東宫釴充講官敷奏明暢最為得體暨即位屢遷太常少卿兼侍讀直經筵病歸徐恪常熟人成化進士授給事中數有諫諍宏治時纍官右副都御史巡撫河南調湖廣素性剛正所至抑豪右祛姦弊政績卓然中旨拜南京工部侍郎恪言大臣進用宜出廷推今恩命出臣意表臣義不敢干清議速官謗帝慰留乃拜命居官砥節奉公茍利於民必信其志條列利病每一疏出人爭傳誦吳寬長洲人成化八年會試廷試皆第一授修撰宏治時屢遷禮部尚書時詞臣望重者寬為最謝遷次之遷入閣屢引寬不果用寬行履高潔詩文爾雅兼工書法生平重倫理篤恩義稱為長者卒贈太子太保諡文定王鏊吳縣人成化中鄉會試俱第一廷試第三授編修宏治時厯侍講學士充講官時中貴李廣導帝遊西苑鏊講文王不敢盤於遊田反覆規切罷講帝謂廣曰講官所指殆為若曹耳自是遊幸益省正德初纍進户部尚書文淵閣大學士時劉瑾銜韓文劉大夏欲殺之又欲以他事中劉健謝遷鏊力救得免未幾以志不得行力求去鏊學問該博立朝三十年廉正守道如一日卒贈太傅諡文恪李應禎長洲人由鄉舉入國學中官牛玉知其名欲延教小內豎應禎避匿不赴成化初為中書舍人帝命書佛經曰臣聞天下國家有九經未聞有佛經也帝大怒撻於廷官至太僕少卿葉紳吳江人成化進士厯官禮科都給事中宏治中太子年十七紳請擇講官勸講劾尚書徐瓊等二十人復陳中官李廣八大罪帝不能用擢尚寶少卿卒楊循吉吳縣人成化進士為禮部主事壯歲辭官人高其節好古博洽一時鮮儷其詩文自定為松壽堂集戴冠長洲人好古篤學文章奮迅淩轢尚書王恕雅重之嘗訪以時務大學士李東陽亦深愛其文所著有經學啓蒙禮記辨疑奇字音釋濯纓文集凡數百卷吳洪吳江人成化進士厯廣東副使釐剔姦弊人以為神遷福建按察使矯矯有風節正德時終南京刑部尚書卒贈太子少保三子山巖崑皆進士山為刑部郎中諫武宗南巡受杖嘉靖中官刑部尚書巖為給事中乾清宫災奏請罷養子斥番僧遣還邊兵武宗遣中官督饒州瓷器率同官力諫官終四川右參政崑吏部主事朱皓長洲人父喪廬墓大雨冢裂皓籲天哀號明旦冢復平成化中旌表馮琨崑山人成化中舉於鄉厯薊州知州核還勳貴所攘地下獄旋復官劉瑾用事復興前獄杖八十死而復蘇薊民競守圜土餽餉不絶有僧素昵於瑾語之曰馮知州惟飲薊州一杯水耳瑾乃釋還再遷登州知州劉杲長洲人由進士纍遷湖廣副使朝議括流民戍邊所在􅍅懼杲急白上官驗文引及生業以定去留民乃安三遷江西左布政使天下朝覲官劉瑾皆要重賄杲故無所賫力拒不應士論稱其剛正瑾誅以時望方遷擢而杲力乞罷詔進右副都御史致仕王哲吳江人宏治進士擢御史清軍福建按廣東江西饒有政績遷山東副使有外國使入貢私市鹽哲謂不治則廢法治之非所以柔遠乃沒鹽於官仍給其直厯右僉都御史巡撫江西益有聲毛澄崑山人宏治進士廷試第一授修撰武宗時纍進禮部尚書時帝數巡幸澄每偕大臣切諫宸濠謀不軌令巡撫孫燧等奏其孝行澄力駮之及宸濠反帝南征駐蹕留都復屢疏請回鑾世宗時議大禮主為人後之義纍命集議持之益堅既諭加稱興獻帝為皇帝纍疏力爭事迄止澄端亮有學行論事不撓帝欲推崇所生遣中官諭意至出囊金卑澄卒不動乞歸卒贈少傅諡文簡吳一鵬長洲人宏治進士官編修世宗初纍擢禮部左侍郎與尚書毛澄汪俊力爭大禮俊去國一鵬署部事帝趣建獻帝廟甚亟一鵬持之并劾張璁桂萼乞付法司不聽頃之極諫四方災異請帝救疾苦罷營繕信大臣納忠言優詔報之尋命迎獻帝神主於安陸一鵬復疏爭不納纍進尚書人內閣典誥敕璁萼忌之出為南京吏部尚書乞歸贈太子太保卒諡文端盛應期吳江人宏治進士授都水主事出轄濟寧諸閘忤中貴李廣下獄謫官正德初厯雲南僉事抑鎮守太監梁裕為所劾逮下詔獄得釋纍擢四川江西巡撫復總督兩廣忤撫寧侯朱麒中官鄭潤引疾歸旋以治水起右都御史議開新河功垂成而罷後朱衡循新河遺迹成之運道蒙利蔣欽常熟人宏治進士厯南京御史正德初劉瑾逐大學士劉健謝遷欽偕同官切諫逮下詔獄廷杖為民居三日欽獨具疏劾瑾再杖三十繫獄越三日復具疏又杖三十方欽屬草時聞鬼聲奮筆曰死即死耳此藁不可易也聲遂止至是創甚越三日卒於獄瑾誅贈光祿少卿後追諡忠烈朱希周崑山人宏治進士廷試第一授修撰嘉靖中纍擢禮部右侍郎時方議大禮數偕其長爭執尋署部事帝以張璁桂萼言欲去本生之號希周率郎中余才等疏諫時羣臣諫者率跪伏左順門希周走告閣臣亦偕羣臣跪伏帝怒命希周等待罪而盡繫庶僚於詔獄及上章聖皇太后册文希周不赴嚴旨譙責巳復請寬庶僚之被繫者不納再遷南京吏部尚書乞休歸希周性耿介不妄取豫終身無他嗜好卒贈太子少保諡恭靖陳察常熟人宏治進士正德初厯御史劉瑾既誅武宗猶不親政偕同官請務講學節嗜欲語皆切直帝將征宸濠疏諫不聽世宗初言興獻帝不當加皇號帝之親鞫楊言也落其一指察大呼曰臣察願以不肖軀易言命誠不忍言獨死諸大臣皆愕帝亦目攝之察不為動退復具疏申理纍擢至僉都御史巡撫南贛因乞休薦前御史史萬鐺等可用忤旨斥為民周用吳江人宏治進士正德時為南京給事中帝遣中官劉永迎佛烏斯藏又以中旨除尚書劉愷季浩等皆抗章切諫出為廣東參議有破盜功嘉靖中纍擢吏部尚書用端亮有節概卒諡恭肅顧鼎臣崑山人宏治進士廷試第一授修撰憫鄉郡賦重條興利革弊四事嘉靖時復懇請并松江常州杭州湖州嘉興諸府皆責知府釐正賦役為平嘗曰是法行吾家增賦且千石然為百貧家減千石矣纍進少保武英殿大學士初崑山無城鼎臣言當事城之後倭亂獲全鄉人請於朝祠祀焉周廣崑山人宏治進士擢御史正德時疏陳四事請斥番僧遠伶人嚴軍令其一則重國本言錢璫以宦豎僭稱庶子罪不可言錢大怒傳旨謫懷遠驛丞稍遷建昌知縣有惠政吏部擬除憲職錢矯旨再謫竹寨驛丞世宗初復故官纍遷南京刑部右侍郎魏校崑山人宏治進士厯南京刑部郎中訊囚得情守備中官劉琅驕恣判牒至莫有抗者校獨行意自如暇則與諸曹郎余祐輩講明正學世宗嗣位用薦起廣東提學副使厯江西兵備終太常卿卒贈禮部侍郎諡恭簡校之學私淑於胡居仁學者稱莊渠先生著有大學指歸六書精藴諸書徐禎卿吳縣人宏治進士資頴特家不畜一書而書無所不通幼與祝允明唐寅文徴明齊名號吳中四才子其詩鎔鍊精警為吳中之冠既登第與李夢陽何景明遊名亦相亞沈周長洲人博覽書籍文學左氏詩學白蘇字學黃庭堅又工於畫片楮流傳人爭寶之事親孝遇物和易家無贏資好周人急先後巡撫欲延至幕下並以母老辭母年九十餘終周亦八十矣又三年卒都穆吳縣人七歲能詩長遂泛濫羣籍宏治進士以太僕少卿致仕歸齋居蕭然日事讐討所著有周易考異史外類抄金薤琳琅南濠詩略文略祝允明長洲人五嵗能作徑尺字九歲能詩稍長博覽羣籍為文章有奇氣尤工書法名動海內玩世自放不問生産舉於鄉官至應天通判生而枝指自號枝山桑悅常熟人書過目輒焚棄曰已在吾腹中矣舉於鄉官泰和訓導敢為大言或問天下文章悅曰惟悅其次祝允明耳唐寅吳縣人宏治中鄉試第一家無擔石客坐嘗滿文章風采照映江左畫入神品宸濠以厚弊聘之寅察其有異志佯狂使酒宸濠不能堪乃還文徴明名璧以字行更字徴仲長洲人父林官溫州知府有善政徵明頴異挺發與祝允明唐寅徐禎卿輩相切劘名日益著貢入都特授翰林待詔世宗初預修武宗實録侍經筵楊一清張璁謀欲徙徵明官固辭求去遂致仕四方乞書文詩畫者接踵周徽諸王常以寶玩為贈不啓封而還之外國使者道吳門或望里肅拜以不得見為憾優遊林泉主持風雅者三十餘年卒年九十四子彭國子博士嘉和州學正並能詩工書畫篆刻世其家王寵吳縣人性資穎拔善行楷妙得晉法書無所不觀丰儀玉立風度汪洋人擬東漢黃憲與唐寅文徴明交善别號雅宜山人方鳳崑山人與兄鵬同舉正德進士厯御史武宗南巡疏論七事又極陳災眚屢見宜修德以謹天戒世宗立數爭大禮既以災異指斥弊政出為廣東提學僉事謝病歸鵬初與鳳同以學行相砥比議禮鵬獨是張璁議至南京太常卿然意殊悒悒遂謝去兩人家居相友足迹不履官寺鄉人並賢之周鳳鳴崑山人父倫南京刑部尚書操履耿介鳳鳴正德進士嘉靖初厯刑部郎中決疑剖滯常冠諸司調兵部職方薦都督馬永才果有功一歲中疏百餘上悉協機宜擢大理寺丞陳兵食水利諸事多報允署寺事減御史馮恩死忤張孚敬奪官鳳鳴性孝友勵廉隅盛有時望以無罪去士論惜之顧濟崑山人正德進士厯刑科給事中武宗自南都還卧病豹房惟江彬輩侍左右濟請慎擇廷臣更番入直不報世宗初劾司禮太監蕭敬都御史張綸等不聽帝欲加興獻帝皇號濟疏言不可未幾侍養歸卒子章志孫紹芳皆進士章志南京兵部侍郎南京故有馬快船供中貴進奉承其役者輒破産章志請減其額官為給直雇募積害頓除比卒官都人立祠祀之紹芳春坊左贊善朱紈長洲人正德進士嘉靖時厯四川副使與副總兵何卿共平深溝諸寨番賊纍擢右副都御史巡撫浙江及福建濱海諸府時倭寇大起紈首嚴通番之禁率師討賊連戰皆捷憤閩淅勢家庇賊上疏數侵之會佛郎機國人行劫至詔安督師迎擊擒其渠諸勢家嗾御史劾其擅殺罷職聽勘遂仰藥死紈清強峭深勇於任事不恤人怨以及於禍朝野惜之沈漢吳江人正德進士授給事中嘉靖初興獻帝議加皇號漢疏諫因災異陳時政缺失指斥甚切及刑部尚書林俊去位復抗章爭之李福達之獄執法大臣皆下吏漢執奏並除名卒隆慶𥘉贈太常少卿陸粲長洲人嘉靖進士由庶吉士為給事中請帝延見大臣面決庶政又陳用人數事多議行偕御史郗元洪清核馬房錢榖精心剔抉積弊頓清張福殺母獄起粲上章極論下詔獄受杖時張璁桂萼柄政粲劾其專權召賄帝立下詔暴璁萼罪狀罷之已而以霍韜言召璁還謫粲貴州都鎮驛丞稍遷永新知縣乞歸遂不出王穀祥長洲人嘉靖進士由庶吉士厯文選員外郎尚書汪鋐專伺政府為黜陟穀祥掌司事一切持之鋐銜焉會乞歸養謫官穆宗初徐階當國以為南京文選主事不應穀祥善文詞兼工書畫與文徵明蔡羽祝允明輩以文翰名吳中袁帙吳縣人嘉靖進士厯官廣西提學僉事其學精深宏博羣經子史無所不窺所著世緯二十篇文集二十卷皇明獻實吳中先賢傳兄褧善詩古文兼工書畫子尊尼進士好古能書皇甫涍長洲人兄沖嘉靖舉人涍與弟汸濂並嘉靖進士兄弟好學工詩負才名時稱皇甫四傑涍官至浙江按察僉事汸吏部郎中濂工部主事其後里人張鳳翼燕翼獻翼並負才名吳人語曰前有四皇後有三張錢泮常熟人嘉靖進士厯侯官慈溪知縣纍遷江西左參政所至皆有能聲里居與知縣王鐵禦倭寇力戰而死贈光祿卿與鐵並立祠死所陸師道長洲人事母孝母嘗失明舐之而愈嘉靖進士纍遷尚寶少卿出使秦府卻其厚贐師道嗜古勤學善詩文工小楷古篆兼曉繪事時文徴明稱擅四絶不減趙孟俯師道從之學盡得其傳其風尚亦約略相似嚴訥常熟人嘉靖進士授編修纍擢吏部尚書慎擇曹郎務抑奔競黜貪殘振淹滯又倣三途並用法州縣政績尤異者破格超擢銓政一新尋加太子太保武英殿大學士以入直西苑勞疾乞歸父母皆在人皆榮之卒諡文靖瞿景淳常熟人嘉靖中舉會試第一殿試第二授編修典制誥錦衣陸炳先後四妻欲封其最後者屬景淳撰詞不可嚴嵩為請亦不應纍官禮部侍郎卒贈禮部尚書諡文懿子汝㮨汝説居官皆以剛正聞徐申崑山人嘉靖初由鄉舉厯蘄水上饒知縣用廉能徴授刑部主事冬月提牢憫囚寒餒時加資給囚德之比當代相率譁於獄請留三月昭聖太后弟張延齡繫獄世宗必欲殺之申奏記尚書聶賢唐龍謂太后春秋高即延齡旦暮致辟何以慰太后心賢等然之故獄久不決後卒以延齡故廷杖謫官曾孫應聘少有才名持正不茍萬厯進士官太僕少卿袁洪愈吳縣人嘉靖中由鄉試第一成進士厯給事中剛介疾惡耻隨俗沈浮嘗疏陳邊務數事從之出為福建僉事厯湖廣參政所在以清節著萬厯中纍擢南京禮部尚書上疏請禁干謁又極陳屯田廢壞之􅊣乞募商就耕以所收粟麥中鹽免內地飛挽皆議行就進吏部乞休歸洪愈性不競榮利通籍後所居不增一椽出入徒步如寒士遠近重之卒諡安節徐師曾吳江人十二能為詩古文長博學兼通陰陽律厯醫卜篆籀之説嘉靖間舉會試以親老歸閲六年始就廷對選庶吉士厯吏科給事中頻有建白世宗方殺僇諫臣言官緘口師曽遂連疏乞休萬厯初起禮科左給事中力辭不出著禮記集注周易演義又撰正蒙章句世統紀年文體明辨大明文鈔宦學見聞小學史斷共數百卷陳瓚常熟人嘉靖進士知永豐縣以治行徵授給事中廣東福建江西羣盜方張府縣多無城以瓚言敕所司興築已劾文選郎南軒廷杖除名隆慶初起官請褒恤楊最楊爵羅洪先等而誅姦黨之殺沈鍊者皆報可因論御史齊康忤高拱栱再起謫官終刑部左侍郎瓚性淡靜言行恂恂當官守職介然不撓卒諡莊靖郭諫臣長洲人嘉靖進士授袁州司李嚴世蕃貪黷無厭諫臣持正不懼厯吏部主事隆慶初疏言正一真人不當復令傳襲請永行革除外戚玉田伯蔣榮安平伯方承裕宜視泰和伯陳萬言例止終其身衍聖公親喪宜侯服除始赴京襲爵服中免入賀諸所陳多持正朝議悉從之官終江西參政申時行吳縣人嘉靖末殿試第一授修撰萬厯時纍進吏部尚書中極殿大學士時行文彩藴藉當張居正時不立崖異居正卒時行盡反前政務取和平其止易漕開水田罷內操平隴川定洮河號能斷大事卒以建儲議為時所排擊遂去位卒贈太師諡文定子用懋進士兵部尚書孫紹芳進士户部左侍郎歸有光崑山人六歲能屬文嘉靖間舉鄉試徙居嘉定來學者常數百人有光初師同邑魏校為古文原本經術而好太史公書能得其神髓晚始第進士知長興縣調順德通判條馬政事宜咸切利弊隆慶間為南京太僕寺丞留掌內閣制敕房欲盡觀中祕書遽以病卒子子慕舉萬厯鄉試屏居江村竹籬破屋日讀書其中與無錫高攀龍嘉善吳志遠潛心正學俞允文崑山人讀書汲古工詩文時歸有光以古文名天下允文與之角立兼善諸體書王世貞與友善其定廣五才子以允文為首云黃省曾吳縣人甫成童綜貫百氏為文恆屈其賢豪嘉靖舉人遊喬宇之門命輯諸山記又擬作五嶽之遊宇因呼為五嶽山人所著有五嶽山人集兄魯曾博涉能詩正德舉人子姬水幼穎悟性至孝省曽出入必攜之有所題咏輒令同賦書法亦工杜偉吳江人六歲時祖母疾盲舐之而愈嘉靖舉於鄉江西羅洪先聞其賢聘為子弟師偉即從受學時與靜坐石蓮洞學益有得萬厯間授河南推官治行冠河南遷工部主事榷稅荆州不私一錢渡鄱陽湖盜入其舟詢之為偉羅拜而去王應電崑山人受業同邑魏校冥心潛思閎覽博識而尤篤好周禮殫精十數載成周禮傳詁數十卷以就正羅洪先洪先讀其書與辨難纍三月大服應雷研精字學所著有經傳正訛同文備考書法指要六義音切貫珠圖六義相關圖王敬臣長洲人受業於魏校事父母至孝其學以慎獨為先而指親長之際袵席之間為慎獨之本鄉人尊為少湖先生張基吳縣人嘉靖舉人母老跬步不離治一室題曰愛日以居母書無所不窺尤邃於經學多所箋疏歲大祲有米數百斛悉以賑飢者屬當軍興之際毁家以紓族卒贈翰林待詔趙用賢常熟人隆慶進士萬厯時官檢討疏論張居正奪情與吳中行同杖戍居正歿起官終吏部侍郎諡文毅用賢剛直嫉惡議論風發官庶子時常言蘇松嘉湖財賦半天下民生坐困條十四事上之執政以為吳人不當言吳事格不行張棟崑山人萬厯進士知新建縣有能名擢給事中請蠲度田虛賦又言蠲租宜蠲起運母但蠲存留皆得行吳中白糧為纍疏請令民出資助漕舟附載為政府所格遂乞歸尋起兵科出巡固原單騎厯險盡得邊事虛實多所論建王叔承吳江人少孤篤學好古遊燕京太倉王錫爵其布衣交也再召有三王並封之議叔承遺書數千言謂當以去就力爭不宜依違兩端錫爵歎服其詩為王世貞兄弟所許王稚登長洲人六歲善擘窠大字十嵗能詩長益駿發有盛名吳自文徵明後稚登遙接其風主詞翰之席者三十餘年趙宦光吳縣人讀書稽古精於篆書與婦陸卿子隱於寒山足不至城市當事慕其名多造門求見宦光亦不下山報謁著有寒山雜著諸集顧大章常熟人萬厯進士負志節與楊漣左光斗善擢刑部員外郎執法持平屢忤魏忠賢意熊廷弼王化貞獄起大章以廷弼有守遼功宜貰之以責後效衆不可屢遷陜西僉事忠賢將殺楊左逮大章下獄同瘐死崇禎𥘉贈太僕卿諡裕愍弟大韶與大章攣生通經史百家尤精於詩禮多所發明弟大武權奇俶儻以豪俠自命大章被逮大武傾身周旋無所避一夕見垣中白氣如斗大武曉星象指而泣曰諸君子其不免乎已而果然大武護兄喪歸益自放於酒而卒周宗建吳江人萬厯進士由知縣擢御史天啓初魏忠賢客氏亂政宗建首疏劾之明年璫勢益熾宗建復三疏彈擊忠賢大怒矯旨削籍嗾其黨李實誣以贓罪下獄拷死崇禎初贈太僕卿諡忠毅周順昌吳縣人萬厯進士授福州推官守法不撓治最擢吏部主事厯文選員外郎力以推賢退不肖為已任嘗推一大僚失要人意遂歸魏璫秉政順昌每與人言輒義形於色會給事中魏大中以劾閹被逮順昌與之訣因以女字其孫閹黨詗知之誣奏削籍逮問緹騎至士民大譁訟寃移時而集者萬餘輩毆殺緹騎數人順昌赴詔獄每掠治必大罵忠賢遂遣人於夜中潛斃之崇禎初贈太常卿諡忠介姚希孟吳縣人萬厯進士授檢討行誼修謹立朝矯矯持風節天啓中從鄒元標馮從吾講學首善書院都給事中楊所修劾其為繆昌期黨削籍崇禎中赴召以庶子充講官預定逆案溫體仁忌之出為南京少詹事後贈禮部侍郎諡文毅張振德崑山人萬厯中由選貢授興文知縣奢崇明反振德督兵與戰力盡援絶取印繫肘北面再拜自刎妻錢氏二女淑昭淑慶皆伏劒一門死者十二人賊見振德尸面色如生右手握刀忿怒如赴敵狀皆羅拜事聞贈光祿卿諡忠愍張世偉吳縣人萬厯中舉順天鄉試砥行植節與周順昌文震孟姚希孟朱陛宣稱吳門五君子既歿鄉人稱為孝節先生李文詠崑山諸生萬厯中父寢室被火文詠宇入將抱父出而榱棟盡覆父子俱焚死火息人視尸猶覆其父父存全體文詠但餘一股王志堅崑山人萬厯進士授南京兵部主事崇禎初以僉事督湖廣學政其詩文法唐宋名家不逐時好所輯古文瀾編瀆編及四六法海並行於世弟志長志慶皆舉於鄉讀書好古志長貫穿經學著有儀禮周禮注疏刪翼蔡懋德崑山人萬厯進士厯官井陘濟南諸道有殺賊功崇禎未巡撫山西流賊破潼關懋德孤軍拒戰賊遣使諭降懋德立斬之城陷入三立祠自經死將吏應時盛等四十六人皆殉難事聞諡忠襄本朝乾隆四十一年賜諡忠恪王燾崑山人萬厯舉人崇禎末為隨州知州張獻忠攻隨燾率兵拒戰殺賊三百餘人力竭自經死事聞贈太常卿諡忠愍本朝乾隆四十一年賜諡節愍文震孟吳縣人天啓二年殿試第一授修撰疏陳勤政講學忤魏忠賢意調外震孟遂歸崇禎初召置講筵連劾王永光忠賢遺黨乘機報復及賊犯皇陵痛陳致亂之源擢禮部左侍郎兼東閣大學士與溫體仁不協被劾落職歸卒贈禮部尚書諡文肅陳仁錫長洲人天啓二年殿試第三授編修喜著書與同里文震孟俱以老成宿望登甲科時稱得人魏忠賢冒邊功錫上公爵給世券仁錫當視草持不可遂削籍歸厯南京國子祭酒所著有義經易簡録明皇世法録等書卒諡文莊趙士春用賢孫崇禎進士及第授編修楊嗣昌奪情復謀入閣士春抗疏劾之忤旨謫布政使照磨後復官終左中允龔元祥長洲人舉於鄉崇禎四年為霍山教諭厲廉隅以名節自任八年賊陷鳳陽令逸去元祥督士民固守城陷整衣冠坐賊欲屈之厲聲罵遂遇害子炳衡號呼罵賊賊又殺之事聞贈國子助教建祠曰忠孝以其子配宋學朱長洲人崇禎進士為御史抗疏劾楊嗣昌田惟嘉時論壯之巡按山東方行部大兵攻濟南急聞警馳還與布政張秉文等分門死守援兵不至城陷死之後贈大理卿本朝乾隆四十一年賜諡忠烈徐􅊈長洲人崇禎進士厯官右庶子黃道周以論救錢龍錫被謫􅊈兩疏爭之不聽乞假歸周延儒再柄國數招之不應福王立召為少詹事陳時政七事安遠侯柳祚昌劾􅊈東林巨魁遂移疾歸及南都亡投虎邱新塘橋下死本朝乾隆四十一年賜諡忠烈許炎吳縣人為諸生磊落不羈崇禎十七年聞京師變過友人出酒宴飲炎擲杯詬曰今日何日尚欲縱酒耶拂衣去巳而聚哭明倫堂炎獨衰杖劈踊號泣盡哀趨古廟自經為人所解聞哀詔至即稽首號慟而卒鄉人私諡潛忠先生時長洲諸生顧所受為炎立傳南都亡所受投泮池死本朝乾隆四十一年賜祀忠義祠盧渭長洲人為諸生有聲南渡時馬士英入相命史可法督師淮揚渭抗疏乞留可法云汪黃在內李綱在外宋終北轅不納可法建禮賢館以招四方之士渭與焉揚州被圍監守鈔關門城破赴水死本朝乾隆四十一年賜祀忠義祠朱集璜崑山人歲貢生學行為鄉里所推授徒至數百人邑東南有夏駕浦雞鳴塘海潮壅沙漸成平陸集璜與縣令議開濬身督其役六閲月而復其故南都亡集璜偕邑人周室瑜王佐才及室瑜子朝曠等城守城破皆死之諸生陶炎聞集璜死亦慷慨自縊本朝乾隆四十一年俱賜祀忠義祠劉曙長洲人崇禎進士南都亡上海諸生欽浩通款於魯王署忠義士二十三人以曙為首其書為邏者所得捕曙對簿曙實未嘗識浩而絶不置辨強項不肯屈膝臨死賦詩别母乃就刃本朝乾隆四十一年賜諡節愍楊廷樞吳縣人諸生時值里人周順昌被逮廷樞與王節等請於巡撫毛一鷺祈具奏免逮巳而緹騎擊死廷樞坐除名崇禎三年舉鄉試第一有盛名諸生之討阮大鋮也廷樞與其謀大鋮得志先捕首事五人廷樞與焉會國亡乃已後數年以未剃髮𬒳執不屈死本朝乾隆四十一年賜諡忠節朱天麟崑山人崇禎進士為饒州推官有清操擢翰林編修厯遷禮部尚書東閣大學士大兵至永明王倉皇出走奔安隆天麟扶疾追從道卒贈少保諡文靖顧錫疇崑山人萬厯進士授檢討天啓中與魏忠賢不協削籍崇禎中厯禮部侍郎後復本部尚書請補建文帝景皇帝廟號及建文朝忠臣贈諡又奪溫體仁文忠之諡與馬士英不協去後寓溫州江心寺為總兵賀君堯所害一年本朝乾隆四十賜諡節愍瞿式耜景淳孫汝説子萬厯進士崇禎初擢給事中十七年以右僉都御史巡撫廣西平靖江王亨嘉之亂後留守桂林加大學士封臨桂伯式耜在軍與士卒同甘苦聞時政闕失必疏爭之兩粵皆倚以為重後諸鎮兵皆潰式耜端坐府中與總督張同敞俱死本朝乾隆四十一年賜諡忠宣總纂官臣王廣蔭恭纂輯前提調官臣張日童恭覆輯校對官臣馬延槐恭校校對官臣賀式韓恭覆校大清一統志蘇州府五人物本朝徐枋長洲人􅊈長子明崇禎舉人痛父􅊈殉難死隱居靈巖山之上沙閉户著書不入城市巡撫湯斌聞其名屏騶從兩訪之終不得見隱居四十餘年卒徐開禧長洲人明崇禎進士官翰林為文一本先正法程舉業家咸師尊之顧鼇吳縣人年二歲時父仲常為讐金瑞甫所殺鼇稍長知父死狀即淬一刃挾以出入金亦避之順治辛丑鼇年十八遇金於胥口拔刀刺之金躍入水鼇從之連刺金不死金逸去挾資誣鼇以盜兵備王紀郡丞劉瑞訊得實卒誅瑞甫顧炎武崑山人貢生篤志古學邃於經史兄迹半天下流覽山川風俗考核得失利病上下今古成一家言有日知録音學五書天下郡國利病書卷帙最富者為肇域志惜其書散佚不存尹明廷吳人順治進士知平樂府李定國之亂城破被執死之事聞贈太僕寺卿賜祭葬汪琬長洲人順治進士授户部主事康熙己未舉博學宏詞授編修在史館兩月撰史稿七十五篇稱疾歸讀書堯峯以文章為己任標望彌峻宋德宜長洲人順治進士選庶吉士授編修屢遷左都御史多所建白厯吏部尚書杜絶請托清釐銓法進文華殿大學士贊理機政尤稱慎密卒諡文恪孫承恩常熟人順治進士官修撰入直遇疾卒於邸承恩神氣清朗見者色動為人以孝友聞工駢體書仿歐陽詢能深得其筆法既侍顧問寵遇日隆及卒時論惜之錢中諧吳縣人順治進士康熙己未舉博學宏詞授編修詩文雄贍自名一家葉方藹崑山人順治己亥一甲三名進士授編修應對敷陳皆忠朴無飾語康熙癸丑賜宴瀛臺從官皆進詩賦方藹獨作八針以獻又命撰太極圖説俱稱旨擢侍講學士在翰林二十五年直貧不能斂南書房屢遷刑部侍郎卒官賜金營其喪諡文敏徐乾學崑山人八歲能文十三通五經康熙庚戌一甲三名進士授編修壬子主順天試所拔皆宿學文體一變屢遷左都御史刑部尚書罷歸乾學以文章受知試平蜀頌瀛臺賦經史賦乾清宫讀書記班馬異同辨皆列第一人直南書房恪勤供職及歸詔攜一統志宋元通鑑即家編輯尋奉召復官而乾學已歿平生敦尚氣誼獎拔後進單寒於人才多所造就徐秉義乾學仲弟康熙癸丑一甲三名進士授編修典試順天浙江俱稱得士屢遷內閣學士賜御書恭謹老成扁額徐元文乾學季弟順治己亥以第一人及第授修撰屢遷國子監祭酒訓士有法厯左都御史整飭紀綱澄肅吏治屢陳時政多見采納以事鐫秩解任起復原官厯刑户二部尚書進文華殿大學士兼掌翰林院事罷歸舟過臨清榷使檢視囊槖衣裝之外惟圖書千卷人服其清韓菼長洲人所為經義力振庸靡康熙癸丑會試第一對䇿力言三藩當撤以第一人及第授修撰屢遷內閣學士謝病里居研究經史及唐宋古文將著書以老閲八年起原官晉掌翰林學士禮部尚書遇廷議侃侃不阿多所建白卒諡文懿蔣伊常熟人明禮部主事棻子康熙進士選庶吉士改御史有陳六部積習及請減白糧價諸奏彈劾大吏無所撓避又集民間疾苦繪十二圖以獻聖祖仁皇帝披覽嘉納出為參議督糧廣東多所興除遷河南提學副使以實行移士習稱公明第一卒於官楊無咎明諸生廷樞子痛父罹難杜門隱居厯八十年覃思經學多闡前人所未發著有談經録諸書戴笠吳江諸生隱居朱家港教授生徒土屋三間炊煙時絶而編纂不輟朱鶴齡吳江人邃於經學五經皆有著述又有李義山詩注彭定求長洲人康熙丙辰會試殿試俱第一授修撰厯侍講先後里居二十餘年泊若寒素編纂儒門法語蒙正録諸書發明心性宗旨粹然負儒者之重望潘耒吳江人康熙己未以布衣舉博學宏詞官檢討纂修明史以母憂歸不復出耒幼有神童之目復從顧炎武徐枋戴笠遊故其學貫穿淹洽旁及星學算數宗乘道藏悉有神會尤侗長洲人博物洽聞工詩文以恩貢為永平推官鋤強扶弱以事罷歸康熙己未舉博學宏詞授檢討纂修明史未幾乞歸優遊林下年登大耋子珍康熙進士官翰林世其家學范必英長洲人順治舉人康熙己未舉博學宏詞授檢討纂修眀史謝病歸儲書萬卷喜汲引後進一時名雋多從之遊徐釚吳江人康熙己未以布衣舉博學宏詞授檢討纂修明史尋乞歸所著詩文膾炙藝苑少刻菊莊樂府朝鮮貢使以金餅購去其見重如此是科同舉者周慶曾常熟人授編修馮勗長洲人授檢討朱鍾仁崑山人授中書皆以文學彪炳一時稱為極盛黃儀常熟人精輿地之學凡郡邑建置沿革山川險易畫圖著説縷析條分徐乾學修一統志儀與淮安閻若璩百詩無錫顧祖禹景范搜討為多歸允肅常熟人康熙己未殿試第一人授修撰辛酉主順天試所拔皆寒畯厯官少詹事持正不阿居鄉雅有清望陶元淳常熟人康熙進士知昌化縣作浮糧考魚鱗册會計經費録區分縣事如家事為民請命與上官往復千言動以至誠海外武辨驕橫盡發其姦狀將卒斂戢時行村落問民疾苦行不坐乘暑不張蓋以勞卒邑人思之嚴虞惇常熟人康熙丁丑一甲二名進士授編修洊升大理寺副屢次平反疑獄遷太僕寺少卿典試楚蜀皆稱得人著述甚富其讀詩質疑三十一卷有功詩學何焯長洲人康熙癸未舉人進士選庶吉士充欽賜武英殿纂修改編修性通敏工書博覽淹貫長於考訂雍正初年贈侍讀學士蔣廷錫常熟人康熙癸未欽賜進士選庶吉士授編修洊擢內閣學士雍正初遷禮部侍郎厯户部尚書勾稽周密諸曹宿弊釐剔無遺進文華殿大學士仍兼理户部事務卓識長才蒞事精敏仰贊機務悉協於當加太子太傅給一等輕車都尉世職卒諡文肅吳士玉吳縣人為諸生即以文名四方康熙進士以翰林侍講督順天學政纍官至禮部尚書宏通儒雅扶獎人倫著有吷劒集卒諡文恪惠周惕長洲人康熙己未鴻博辛未庶吉士改密雲知縣周惕邃於經學著有詩説易傳春秋三禮問諸書子士奇康熙進士纍官翰㭑院侍讀撰易説六卷春秋説十四卷大學説一卷又因新法究推步之原著交食舉隅二卷孫棟元和生員於諸經融洽貫串謂訓詁古音古字非經師不能辨作九經古義二十二卷尤邃於易採播漢學撰周易述二十三卷易例二卷嘉定錢大昕謂惠氏世守古學而楝所得尤精嵇曾筠長洲人康熙進士選庶吉士洊升僉都御史典試河南還條上貯穀理漕防河三事尋授副總河督豫河事務纍官至文華殿大學士曾筠負經濟大略知人善任恭慎廉明纍用引河殺險法前後節省庫帑百萬其生平勞績治河為大與靳輔齊蘇勒並稱名臣卒諡文敏彭啓豐長洲人雍正丁未會試廷試皆第一授修撰入直南書房乾隆七年遷通政使提督浙江學政條陳學政事例尋遷內閣學士仍留學政任擢刑部右侍郎疏陳折省利弊四事官至兵部尚書孫希濂乾隆進士由刑部主事厯官至刑部右侍郎嵇璜曽筠子雍正進士由庶吉士授編修纍官至文淵閣大學士生平習於經世之務尤善治河厯南河河東河道總督皆著聲績性至孝為人外和中剛不屑矯名沽譽而有確然不拔之操卒諡文恭沈華元和貢生雍正間以薦舉入書局後知武陵縣勤敏蒞政不數月積牘一空厯宜春武功蒲城所在皆有政聲乾隆四十六年入祀鄉賢祠陳祖范常熟人雍正進士以病不與殿試歸蹴居華匯之濱鍵户著書乾隆庚午薦舉經學賜司業銜所著有經咫一卷文詩集各四卷掌録二卷蔣溥常熟人廷錫子雍正進士由庶吉士授編修洊擢內閣學士尋升吏部侍郎乾隆八年命署湖南巡撫旋實授辦理永順等處苗猺軍務頗得機宜議築文洲園墾田萬畝士民同願興工尋擢户部尚書東閣大學士溥居心純正遇事從無少懈卒贈太子太保入祀賢良祠賜祭葬諡文恪王錫闡吳江人博覽羣書兼通中西天學潛心測算每天色澄霽輒登屋卧鴟吻間仰觀星象竟夕不寐著曉菴新法六卷梅文鼎曰從來交食祇有食甚分數未及其邊惟錫闡以日月圓體分三百六十度而論其食時所虧之邊凡幾何度今推其法頗精確沈彤吳江人淹通三禮撰周官祿田考及周官頒田異同説五溝異同説井田軍賦説釋周官地征等篇又撰儀禮小疏春秋左氏傳小疏尚書小疏氣穴考略內經本論其果堂集十二卷多訂正經學之文乾隆元年薦舉博學鴻詞沈德潛長洲人乾隆進士由編修洊升禮部侍郎十四年以老乞休命有所著作寄京呈覽有歸愚集西湖志纂俱進呈十六年二十二年二十七年均賜詩二十六年高宗純皇帝南巡皇太后萬夀命集在朝諸王文武及致仕大臣年七十上者為九老並繪圖德潛列致仕九老之首卒贈太子太師入祀賢良祠諡文慤旋緣事削奪四十四年御製懷舊詩列德潛於五詞臣末云施錦元和人湖南乾州平頭司吏目乾隆六十年逆苗滋事錦率鄉勇抵禦於石灰窑力戰陳亡事聞賜恤廕雲騎尉費增運震澤人福建彰化縣典史乾隆六十年臺匪陳周全滋事城陷死之事聞賜恤如例蔣元益長洲人乾隆乙丑會元由庶吉士授編修改監察御史纍官至兵部右侍郎元益少有夙慧於書無所不窺官御史時不輕建言癸酉秋上請更河臣疏遂受上知生平著述甚富有草一史訂誤周易精義清雅堂詩餘藏於家嘉慶九年入祀鄉賢祠蔣檙常熟人廷錫孫溥子乾隆進士由編修擢侍講在南書房行走洊升至兵部侍郎知武舉疏言武闈外簾事宜議行卒賜祭葬薑晟元和人乾隆進士由刑部主事洊升至刑部侍郎秋讞核議允當屢奉命赴直隸山東山西江南湖北等省訊案授湖南巡撫籌辦苗匪軍務秩然有序鎮靜得宜嘉慶五年擢授湖廣總督調直隸總督九年擢刑部尚書揚厯中外四十餘年後以直隸總督任內失察處分給四品京堂禇廷璋長洲人乾隆乙丑考授內閣中書癸未進士由編修洊升侍讀學士官中書時纂西域圖志凡天文風俗音樂沿革瞭如指掌又纂西域同文志其字滿漢蒙古西番四體並列緯以三合切音纂四十二字母與𣑽書本音同異會解奉旨載入藏經廷璋視學湖南培植人材楚人士設長生位於韓文公祠側嘉慶十一年入祀鄉賢祠彭希洛長洲人乾隆進士官御史奏敕各省嚴禁浮收並照報部以錢易銀時價先期出示聽民兩便又督撫勒屬告病州縣諱盜為竊所奏俱切中時弊頒諭通行嘉慶七年蘇郡糧價騰貴九年大霪雨兩次舉行平糶總督費淳勸諭各郡平糶以希洛現行成法為準十三年入祀鄉賢祠金士松吳江人寄籍宛平登乾隆庚戌進士由庶吉士授編修纍官至兵吏二部侍郎擢左都御史嘉慶元年遷禮部尚書尋調兵部尚書士松小心慎密每召對知無不言而未嘗輕泄於人其於天下兵馬錢糧關河險要駐防處尢留心焉卒諡文簡入祀賢良祠余蕭客長洲人撰古經解鈎沈三十卷凡唐以前舊説自諸家經解所引旁及史傅類書片語單詞悉著其目又撰文選紀聞三十卷文選音義八卷顧祖禹常熟人著方輿紀要一百二十卷據正史考訂地理於山川形勢險易古今戰守攻取成敗得失之迹皆有折衷雖荒僻幽仄之地一一如目見王翼孫長洲人任湖北襄陽縣吕堰驛巡檢嘉慶元年邪匪聶傑人聚衆滋事擾及枝江餘匪由枝江竄至吕堰翼孫率兵堵禦殺賊陳亡事聞賜恤廕雲騎尉世職陸霖昭文人四川侯輔知縣嘉慶元年調至達州軍營赴東鄉禦賊陳亡事聞廕雲騎尉世職華潤昭文人孝行著聞同縣顧勳臣董淇俱嘉慶年間旌錢棨長洲人鄉會廷試俱第一授職修撰臚唱日有御製三元詩洊升侍讀學士典試雲南尋任學政拔取公平輿論翕服嘉慶四年擢內閣學士兼禮部侍郎倪定得吳縣人由行伍拔補蘇松鎮標中營把總洊擢福建閩安副將嘉慶五年升海壇鎮總兵時蔡牽盜船由浙入閩定得率舟師於白丈洋擊之沈其船一奪其船一擒盜犯侯塗等七年擢福建水師提督九年入覲射中布靶賞戴花翎尋因病乞休卒於家楊繼祖常熟人以孝聞乾隆年間旌楊岱繼祖子並以孝聞嘉慶年間旌流寓漢梅福夀春人元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變姓名為吳市門卒云梁鴻扶風人至吳依大家臯伯通居廡下為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃舍之於家鴻潛閉著書十餘篇蔡雍陳留人靈帝末亡命在吳吳人有燒桐以爨者雍聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦時人名曰焦尾琴晉戴逵譙國人天性高潔孝武帝時纍徴不就郡縣敦逼不已乃逃於吳吳國內史王珣有别館在武邱山逵潛詣之與珣遊處南北朝宋戴容逵子出居吳下吳下士人共為築室乃述莊周大旨著逍遙論齊何求廬江人除中書郎不拜逃歸吳隱武邱山弟允亦居武邱山西寺講經論學有異鳥如鶴紅色集講堂馴狎如家禽唐楊收世居馮翊父遺直客姑蘇收七歲而孤母長孫親授經十三通大義善屬文吳人號神童造門觀賦詩至壓敗其藩懿宗時官中書侍郎宋蘇舜欽銅山人既放廢寓於吳中買水石作滄浪亭益讀書其詩體豪放往往驚人賀鑄衛州人食官祠祿退居吳下引逺世故家藏書萬卷手自校讐何執中龍泉人為太學博士以母憂去寓蘇州比鄰夜半火執中方索居遑遑不能去拊柩號慟誓與俱焚觀者悲其孝而危其難有頃火卻柩得存王萬濠州人史嵩之自江上董師入相萬首論之疏入遷大理少卿萬即日還常熟寓舍鄧若水井研人嘉熙間通判寧國府以言罷遂不復仕隱太湖之洞庭山明張羽潯陽人元季徙吳與高啓楊基輩為詩友羽博學好古文為文章精潔有法工詩有靜居集徐賁蜀人元季自毗陵徙於平江工詩善畫山水洪武中官至河南布政使有政績著詩曰北郭集薑埰萊陽人崇禎中官至禮科給事中直諫廷杖謫戍宣州衛未至國變居於吳中疾亟謂二子安節實節曰吾乃受命謫戍今流離異鄉死必埋我敬亭之麓遂沒於吳之虎邱列女漢陸續母續為會稽太守尹興門下掾楚王英事覺續詣洛陽詔獄就考續母至京師饋食續對食悲泣不能自勝使者問故續曰母來不得相見故泣耳使者問何以知之續曰母常截肉未嘗不方斷蔥以寸為度是以知之許升妻呂氏字榮升少不理操行榮躬勤養姑勸升修學升後感激自厲遂以成名尋被辟命為盜所害刺史捕盜得之榮手斷其頭以祭升靈後遭寇賊欲犯之榮曰義不以身受辱寇殺之是日疾風暴雨雷電晦冥賊懼叩頭謝罪乃殯葬焉孫奇妻范氏年十八配奇一年而奇亡父母以范少無子迎還其家范不肯歸迎者迫之操刀割耳及鼻曰父母迎我不過以我年少美色耳今已殘矣行將焉如迎者乃返三國吳張白妻陸氏陸續於鬱林所生女名曰鬱生年十三適張白三月白罹家禍遷死異郡鬱生抗聲昭節姚信集有表稱之乞褒以義姑之號顧承妻張氏張溫姊妹三人皆有節行為溫事巳嫁者皆見録奪其中妹先適顧承官以許嫁丁氏成婚有日遂飲藥而死其時人皆嘉歎并圖畫為之贊頌云晉張茂妻陸氏吳郡人茂為吳國內史被沈充所害陸氏傾家産率茂部曲為先登以討充充敗陸詣闕上書為茂謝不尅之責南北朝宋顧琛母孔氏孫恩亂後東土洊飢孔氏發家糧以賑邑里全活者甚衆生子皆以孔為名齊范法恂妻禇氏吳郡人勤苦執婦業永明中卒子僧簡在都聞病馳歸未至禇已卒將殯舉尸不起尋而僧簡至焉梁張稷女名楚媛適會稽孔氏無子歸宗州人徐道角作亂將殺稷氏以身蔽父同遇害唐張鎰母盧樅為官人所搆鎰為殿中侍御史欲直之白其母曰今理樅樅免死而鎰坐貶為太夫人憂默則負官敢問所安母曰兒無纍於道我所安也樅得流鎰貶撫州司户參軍宋吳永年妻何氏吳人建炎中金兵道三吳永年與姊及妻奉母而逃母老待扶而行卒為賊所得將縶之何紿曰婦人東西惟命耳賊信之行次水濱謂其夫曰吾不負君遂投於河其姊繼之元錢珍妻顧氏常熟人至正末避亂珍前妻邵氏所生子友安氏所生子虎並孩稚襁負力難兩存謂其夫曰冢子不可失吾子可復生乃棄虎道旁撣涕而去人比之魯義姑明顧春妻俞氏吳縣人春疾卒氏以指抉雙目不得出乃以剪刀刺其左目又欲刺其右姑奪其剪諭之曰汝欲養舅姑撫二子留一目可也氏乃止遂守節終焉王妙鳳吳縣人適吳奎奎商於外姑與所私飲並欲汚氏氏不從所私戲紾其臂氏拔刀斷臂死余布妻馬氏吳縣人歸布五年而寡無子家酷貧姑欲奪其志有田二畝半得粟不以與婦馬不為動姑潛納他人聘一夕鼓吹臨門趣治裝馬入卧室自經死几上食器粳籺尚存衛廷圭妻孫氏吳縣人隨夫商販寓潯陽小江口宸濠陷九江廷圭適他往孫與二女共一長繩自束赴河死葉藝妻鄒氏吳縣人成婚僅兩月而藝卒氏毁容誓死不出户不見男子姑曰如火盜疾病何氏曰火至委軀灰燼盜至先自盡疾聽其死終不令醫診察年六十而卒彭餘璋妻鄭氏長洲人歸再期而夫卒子方晬斂畢即赴水死徐宣妻卓氏長洲人宣卒遺孤二逾年皆夭既而姑舅皆殁竭力營葬操守益堅刲肱作糜以愈母疾母即世執喪盡禮人皆稱其節孝水德妻李氏崑山人夫死無子或勸改嫁婦堅拒欲自經其兄子覺之得不死洪武中同籍兄繫獄婦當連坐當事者脅之曰若適人可全婦曰吾不忍以危難改節雖死無悔有司以聞詔免其罪並旌之夏景澄妻葉氏崑山葉盛女歸五月而夫卒誓死不二先依於母母殁復歸於夏舅即世執喪如禮守節終其身趙一鳳妻尤氏崑山人夫死守志營葬惡少年豔其色思強聘之氏葬畢觸石死王道正妻周氏崑山人未歸而道正卒父母以女年少議改適女堅不從即詣夫家守節姑亦孀居女勤紡織事姑盡孝年七十四卒王貞女崑山人字顧同吉顧死女衣縞素赴弔見翁姑淚下留執婦道不去後姑病篤女斷一指入藥病遂愈人皆稱貞孝女云朱一鴻妻張氏常熟人一鴻家貧出為童子師氏工紡織家不能具機杼鄰嫗憐之俾就其家織有宗周者窺氏有色百計誘之氏覺遂扃戶不復詣鄰家周計婦獨處易制乃以酒物噉諸鄰鄰素畏周頷之夜四鼓挾刀斬門而入氏號呼頭搶地觸瓶罍皆碎周不敢犯而去氏恚憤積薪自焚鄰嫗驚救出已焦灼無完膚不食十六日死邑紳嚴訥為建祠旌表置周於法潘興玉妻時氏常熟人避亂出城與夫相失興玉被創死氏為兵所逼厲聲罵不絶口遂被殺經酷暑數日顔色如生周應祁聘妻項氏吳江人應祁從父宦學未娶及還病瘵卒項氏年十九即變服洗妝夜分自縊將斂母視其中裳皆自以績麻紉縫周固踰三日入棺啓纊見面初如霜白頃之紅顔如生汗發如珠盈面與應祁合葬為之置後萬厯四年敕建貞烈坊嗣子信早卒媳金氏苦節四十年能繼姑志云須烈婦吳江人夫李死市兌悅其色爭欲娶之姑與母亦利其嫁婦度終不免自經死葉紹袁妻沈氏吳江人山東副使沈珫之女紹袁官工部郎中習靜好書沈有雋才工詩歌生三女長紈紈次蕙綢次小鸞並能詩極一時閨房之秀吳中比之謝家左氏諸子並有文名所著午夢堂十集行世本朝嚴燦妻顧氏吳縣人夫為仇陷獄當死順治辛卯巡按秦世貞按吳氏白夫冤自刎堂下冤得雪沈子猷妻金氏吳縣人夫遠出與孀姑居姑素與鄰人通並欲汚氏氏大罵被擊仆地而絶姑以暴病語人巡撫湯斌勘實上聞姑與所私俱棄市顧汝綋妻沈氏吳縣人夫亡殉節同鄉黃永祥妻劉氏周文遂妻馬氏羅廷佐妻錢氏均夫亡殉節胡士彥妻黃氏吳縣人夫亡守節歸省其母會夫家火起氏倉皇歸視夫棺已為灰燼氏泣裏餘骨自割臂肉同置瓶內瘞城下遂自經袁七妻陳氏吳縣人七傭作數出比鄰周二假乞火將犯之氏詬呼得脫恆以刀自衛巳周乘半夜排户入氏持刀拒之周怒奪刀砍氏斷首而走里人擁周赴官正法巡撫韓世琦立烈婦碑蔡瓊藻妻周氏吳縣人夫有心􅍚夫兄瓊滋挑之氏訴諸姑姑不為禁氏憤自縊死後瓊滋夜發狂手刃妻女遂自刎一婢見有紅衣女子殺瓊滋蓋氏斂時服云同縣葉氏女許字王某申氏女許字錢厯方邵氏女許字申希文陳氏女許字林大治俱未婚夫亡自盡以殉沈聖章妻王氏長洲人同縣宋爾城妻葉氏鄒化明妻王氏徐樹聲妻張氏陳周氏俱遭兵亂抗節不汚死王漢侯妻梅氏長洲人夫死斂畢自經柩前同縣史洽妻王氏劉昭美妻陸氏吳泰妻尤氏均夫亡自盡以殉周氏女長洲人許字何綸言未嫁夫亡欲往弔不可遂自經死同縣華氏女許字施某戴氏女許字吳其機吳氏女許字宋啓業尹氏女許字張國富俱未婚聞訃自盡蔡懋良繼妻張氏崑山人夫亡值兵亂二子皆前母出欲偕氏避氏曰未亡人得死為幸豈可奔走道途以自取辱投井中死次子方燧哭守母尸竟遇害同縣管氏女未嫁守貞兵至慮見辱自縊張敬懷妻某氏常熟人與同縣章淳妻薛氏言誾如妻某氏徐萱妻沈氏蕭爾亨妻許氏俱遇兵亂抗節不汚死蔣氏女常熟人母殁遇兵亂拜哭母柩前經死趙烈婦失其姓常熟人趙故宦僕氏美而莊主數挑之不為動一日強逼之氏泣曰夫人嚴敢相從乎主謀於妻妻固不􅶩先召氏入密室諭以意因鍵其户至暮主人啓戶入縊死矣任紹孟妻言氏常熟人夫亡殉節同縣吳周繼妻厲氏孫之炯妻屈氏席永敬妻諸葛氏何述臯妻秦氏袁夀先妻談氏陳藝九妻蔣氏均夫亡殉節程忠謀妻周氏常熟人少寡無子孝飬其