front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_047-1a}
body:
  text: 太原府二名宦漢張敞其先平陽人後徙杜陵宣帝時為太原太守滿歲為真太原郡清鄭昌剛人成帝時為太原太守著治迹條教法度為後所述彭宣陽夏人成帝時為太原太守馮衍杜陵人更始二年尚書僕射鮑永行大將軍事以衍為立漢將軍領狼孟長屯太原繕甲養士捍衛并土劉瓆平原人桓帝時為太原太守時小黃門晉陽趙津等諂事宦官貪橫放恣為一縣巨患瓆使郡吏王允考按其罪雖經赦令竟殺之宦官因緣譖訴帝震怒徵瓆下獄死晉荀藐潁川人榆次令為政以德而民懷之會鳳集其境武帝下詔褒美曰就之如日月敬之如神明愛之如父母樂之如時雨王陟琅琊人永興初為嵐州守時劉淵稱帝將攻嵐石等州劉琨與陟約拒寇陟曰公不員朝廷陟敢負公哉協力守禦卒賴保全後陟既遷其地乃陷南北朝魏元徽景穆帝曽孫明帝時為并州刺史先是州界夏霜安業者少徽輒開倉賑之文武共諌止徽曰昔汲長孺郡守耳尚輒開倉救人災弊况我受委大藩豈可拘法而不救人困也先給後奏明帝嘉之加安北將軍汾州山胡舊多劫掠自徽為郡羣胡相戒勿得侵擾鄰州之人多來詣徽投訴願得公判除泰州刺史還都吏人泣涕攀車不能自已徽車馬羸弊皆京來舊物見者莫不歎其清儉北齊段韶武威人家五原郡大寧二年除并州刺史為政舉大綱不存小察甚得民和周宇文神舉文帝族子建德中從平并州即授刺史州本齊氏别都控帶要重又甫平定多有姦猾神舉勵精為治示以威恩旬月之間遠近悅服隋皇甫誕烏氏人開皇末漢王諒為并州總管盛選寮佐上以誕公方著稱拜并州總管司馬總府政事一以咨之諒甚敬焉煬帝即位諒發兵作亂誕諫止以死請諒怒囚之及楊素將至諒屯清源以拒之諒主簿豆盧育出誕於獄協謀拒諒諒襲擊破之並抗節遇害陶模京兆人仁夀初為嵐州司馬漢王諒作亂刺史喬鍾葵將赴逆模拒之臨之以兵辭氣不撓遂繫獄及諒平拜開府唐竇靜平陸人武德初并州大總管府長史時突厥數萬為邊患糧道不屬靜表請屯田太原以省餽運歲收粟數萬斛詔檢校并州大總管又請斷石嶺以為障塞制突厥之入李靖三原人武德八年突厥寇太原靖為行軍總管以江淮兵萬人屯太谷時諸將多敗獨靖以完軍歸李績離狐人貞觀初行并州大都督府長史治并十六年以威肅聞帝曰煬帝不擇人守邊勞中國築長城以備虜今朕用績守并突厥不敢南賢長城遠矣張文瓘武城人徙家魏州之昌樂貞觀初并州參軍時李績為長史常以管蕭比之績入朝文瓘與僚屬二人皆餞績贈二人以佩刀玉帶而不及文瓘文瓘疑之績曰贈刀欲其果斷贈帶俾其守約束子才無施不可焉用贈李義炎樂昌人為太原尉時李績為并州都督僚吏憚其威義炎獨敢廷辨曲直績甚禮之韓思彥南陽人高宗時使并州方賊殺人主名不立醉胡懷刀而汙訊掠已服思彥疑之晨集童兒數百暮出之如是者三因問兒出亦有問者乎皆曰有之乃物色推訊遂擒真盜裴懷古夀春人武后時為并州大都督府長史吏民懷愛神龍中遷左羽林大將軍未至官還為并州人知其還攜扶老稚出迎崔宣道始代為長史亦野次懷古不欲厚愧宣道使人驅迎者還而來者愈衆其得民心如此崔神慶武城人武后時拜并州長史始至有詔改錢幣法州縣布下俄而物價踊昂商賈驚擾神慶得豪猾之煽惑愚民者誅之法遂行后喜下詔褒美初州隔汾為東西二城神慶跨水連堞合而一之省防禦兵歲數千韋安石萬年人武后時并州司馬有善政張説洛陽人明皇時授檢校并州長史兼天兵軍大使時朔方軍大使王晙誅河曲降虜阿布思也九姓同羅拔野固皆疑懼説持節從輕騎二十直詣其部宿帳下召見酋豪慰安之由是九姓遂安李皓宗室淮安王神通元孫明皇時以黃門侍郎檢校太原以北諸軍節度使太原俗為浮屠法者死不葬以尸棄郊飼鳥獸號其地曰黃坑皓至申勵禁條約毋敢再犯遂革其風戴謙開元二年為文水令於縣東北鑿甘泉蕩沙靈長千畝等渠俱引文谷水傳溉田數千頃民用富饒嚴挺之華陰人開元初太原少尹時殿中監王毛仲抵太原朔方籍兵馬後數年仍牒太原取兵仗挺之恐毛仲有變密啓於帝及毛仲敗帝嘉其忠擢刑部侍郎張嘉貞猗氏人為并州長史政以嚴辦吏下畏之奏事京師明皇數慰勞突厥九姓新內屬雜處太原北嘉貞請置天兵軍綏護其衆即以為天兵軍使裴寬聞喜人開元中授太原尹明皇賦詩褒餞崔日用靈昌人開元十年并州大都督府長史卒官并人懷其惠吏民數百皆縞服送喪崔衍安平人天寶末為清源令勸民力田懷附流亡觀察使馬燧表其能辛雲京金城人客籍京兆寶應元年授大原尹治謹於法下有犯雖絲毫不肯貸賞功亦如之故軍中畏而信回紇入朝所在暴掠至太原惕息不敢縱數年太原大治令狐楚華原人貞元中為太原尹鄭儋判官儋暴卒不及占後事軍大譁將為亂夜十數騎邀取楚使草遺奏諸將圜視楚色不變秉筆輒就以遍示之皆感泣一軍乃安定李景略良鄉人貞元中為太原少尹行軍司馬先是景略為豐州刺史回紇使梅録將軍入朝景略常折服之至是復入朝過太原節度使李説大會爭坐説不能遏景略叱之梅録識其聲驚拜曰非李豐州耶遂就坐將吏相顧嚴憚韋宙萬年人盧鈞節度太原表宙為副時回鶻破諸部入塞下剽殺吏民鈞欲得信重吏視邊宙請往遍見酋豪謫諭之視亭障守卒增其廩約吏不得擅以兵侵諸戎於是三部六蕃諸種皆信悅宋高瓊蒙城人端拱中授為并州馬步軍都部署戍兵有以廩食陳腐譁言者瓊出巡諸營士卒方食因取其飯自啖之謂衆曰今邊鄙無警爾等坐食甘豐宜知幸也衆言遂息真宗時復為并代都部署轉運使上其政績詔褒之王嗣宗汾州人咸平中知并州兼并代部署州境有卧龍王廟每窮冬闔境致祭值風雪寒甚老弱踣於道嗣宗亟毁之鄭文寶上其政績有詔褒美先是西邊市馬以給北邊戰士有瘠弱者即送闕下暑月道遠多死嗣宗建議以汾州地涼接樓煩諸監美水草請就收牧從之張禹圭河朔人成平中知嵐州西人勒厥麻誘衆叛禹圭率衆討之俘獲甚衆雷有終郃陽人景德初為并州副都部署遼兵入寇帝幸澶淵有終赴援威聲甚振俄遼人修好命還屯所就判并州劉綜虞鄉人景德四年知并州以政績聞州民乞留優詔嘉奬康保裔洛陽人真宗時為并代都部署徙知天雄軍并代列狀請留詔褒之高繼勳瓊子真宗時為并代州鈐轄徙屯岢嵐軍遼兵五萬屯革城川繼勳誘令南發伏寒光嶺大敗之獲馬牛槖駝甚衆鄭戩吳縣人知并州遼兵與元昊交兵奏互上戩不以聞曰敵自相攻中國不足憂也韓琦安陽人拜武康軍節度使知并州奏中貴廖浩然怙勢貪恣誣逐前帥李昭亮所為益不法帝命鞭諸本省遼人冒占天池廟地琦吕其豪帥示以曩日所永修廟檄證為宋土遼人無以對既又侵耕陽武寨地琦鑿塹立石以限之始潘美鎮河東患寇鈔今民悉內徙而空塞下不耕於是欣代寧化火山之北多廢壤琦以為此皆良田不耕適足以資敵遂請距北界十里為禁地其南則募弓箭手居之益田九千六百頃富弼河南人仁宗時以宣徽南院使判并州馮京江夏人仁宗時知太原府諸縣公事至即厯究之苟與縣贖合而處斷麗於法者呼法吏決罪不以付獄報下捷疾一無壅滯人服其敏云張孜開封人仁宗時為并代副總管有奇績楊偕坊州人仁宗時知并州有中官預軍事素橫偕一繩以法軍政肅然改本路經略安撫招討使陳堯佐閬中人仁宗時知并州每汾水暴漲州民輒憂擾堯佐為築隄植柳數萬本作柳溪民賴其利李若谷緱氏人仁宗時知并州民貧失婚姻者若谷出私錢助其嫁娶贅壻無賴委妻去為立期不還許更嫁并多降人喜盜竊籍纍犯者以三人為保有犯並坐之悛者削去籍名由是盜賊屏迹司馬旦夏縣人知祁縣天旱乏食羣盜剽寇富豪以兵自備旦召至開以禍福於是爭出粟減直以糶飢者獲濟盜患亦弭司馬光旦弟寶元初從龎籍辟通判并州唐介江陵人英宗時知太原府夏人數擾代邊多築堡境上介遣兵悉撤之諭以利害遂不敢動范純仁吳縣人哲宗時知太原府其境土狹民衆惜地不葬純仁遣僚屬收無主燼骨别男女異穴葬者三千餘人又推之一路葬以數萬計王素莘人太尉旦季子熙寧初知太原府汾河大溢亟命築隄捍之人賴以安吕公弼夀州人神宗時知太原府韓絳宣撫秦晉將取囉兀城令河東兵趣神堂新路公弼曰虜必設伏以待我乃由永和既而新路援兵果遇伏詔褒之王安禮臨川人安石之弟也從河東唐介辟熙寧中鄜延路城囉兀河東發民四萬負餉宣撫使韓絳檄使佐役後帥吕公弼將從之安禮爭曰民兵不習武事今驅之深入此不為寇所乘則凍餓而死耳公弼用其言民得歸他路遇敵者全軍皆覆公弼執安禮手曰四萬之衆豈偶然哉紹聖二年知太原府苦風痺卧帳中決事下不敢欺孫永長社人神宗時知太原府欣代産鹽苦惡不堪食轉運使欲以盜販闌越之罪罪兵吏永言鹽民食也不可禁兵武備也不可闕顧以惡鹽纍防兵非計也詔弛其禁滕元發東陽人哲宗時知太原府元發治邊凛然威行西北號稱名帥陶節夫鄱陽人知太原府盜李勉等起遼州北平之間河東河北騷動至出臺郎督捕之節夫請悉罷所遣兵卒以計獲勉郭永元城人徽宗時知太谷縣太原帥率用重臣每宴饗費千金取諸縣以給斂太谷尤亟永曰用民膏血資豆觴之費可乎投劾而去府不敢迫縣有潭出雲雨歲旱巫乘此譁民永杖巫暴日中雨立至部使者及郡文移不便民者必條利病反復或遂寢不行民安其政以為自有令無永比者既去數年復過之老稚遮留如始去時唐恪錢塘人知榆次縣豪子雄於鄉萃逋庇姦不輸公賦前後莫敢詰恪以理善曉之悟而自悔折節為長者劉士英靖康𥘉通判太原府金人入境帥臣張孝純欲避之士英率將官王稟力止孝純及城陷稟焚火死士英持短兵接戰死之金楊邦基華陰人熙宗時太原交城令太原尹徒單恭託名鑄金佛命屬縣輸金邦基獨不與徒單恭怒召至府將以手持鐵拄杖撞邦基面邦基不動乘德廉察官吏尹與九縣令皆免去邦基以廉為河東第一盧孝儉宣德人為太原少尹大定二年陜西用兵尚書省發本路稅粟赴平涼充軍實期甚嚴迫孝儉輒易以金帛馳至平涼用省而不失期并人稱之用廉進官二階張大節五臺人知太原府近郭男子被殺妻哭不哀召審之果姦夫所殺人以為神晉叔虞祠舊以施錢輸公使庫大節還其廟以給營繕烏庫里德升明安人興定二年太原府佐監軍行元帥府事元兵圍太原破濠垣德升植柵為拒出其家銀幣及馬賞戰士及壞城西北隅德升聯車塞之三却三登城破德升謂其姑及妻曰吾守此數年不幸力窮乃自縊而死其姑及妻皆自殺烏庫里德升舊名烏古論德升明安舊作猛安今並改正烏庫里仲溫蓋州人貞祐初為鎮西軍節度使時中都被圍移書安撫使賈益謙約以鄉兵救中都馳驛如平陽將與益謙會於絳不能進仲溫嘗治平陽吏民留之仲溫曰平陽巨鎮易守私計得矣如嵐州何遂還鎮元兵大至城破不屈死之烏庫里仲溫舊作烏古論仲溫今改正喬天翼哀宗時合河令元兵攻城急天翼竭力拒守城陷不屈遂遇害元攸哈喇巴圖渤海人太祖時授河東北路兵馬都元帥鎮太原時太原新破修城池繕兵甲招降屬邑市肆不改遠近相率來歸金兵來犯屢戰却之後人獻太原東門於金兵入攸哈喇巴圖鏖戰死攸哈喇巴圖舊作攸哈喇拔都今改正談澄懷來人父資榮金末為交城令澄年十九襲職文谷水舊分溉交城田文陽郭帥堰之訟纍歲莫能直澄折以理令決水以利於民豪民持吏短長為姦者察得主名皆法治之時籍民户有司多以浮客占籍及徵賦逃竄官為稱貸積息數倍民無以償澄入覲因中書耶律楚材面陳其害太宗為免其逋亡民能歸者復三年公私便之後復大籍澄盡削交城之不土著者賦以時集李德輝潞人至元元年太原路總管崇學校表孝節勸耕桑立社倉一權度凡可以阜民者無不為之嘉禾瑞麥六出其境齊元彞樂城人至正中知興州撫字有方流離者皆復業民為立碑顏瑜顏子五十七代孫以行誼舉為陽曲縣教諭善啓迪士子楊克恭景州人至正中知興州革弊平訟吏民思之明黃福昌邑人洪武中清源縣主簿首建學校仁廉愛民尹暹安豐人洪武初知興縣政平訟簡賦役均平民懷其惠燕雲咸寧人正統中知陽曲陽曲民愛之九年考滿爭伏闕乞留詔增秩還任滕淵祥符人正統間嵐縣典史有廉能聲嘗承檄戍偏頭關與士卒同辛苦秩滿去惟攜琴書而已張夀華陰人成化間知太谷縣剛正有為著故布袍時遣僮採藜莧佐食陳鎰臨清人成化初知岢嵐州蒞任三載盜賊屏蹤公廨後生嘉禾多一本五穗者遇旱自繫禱於神廟雨即大澍劉經順天人宏治中知太原縣政尚寬厚每笞人笞地而已人感其德亦無有犯者楊光澤沂州人宏治中治興縣撫字有方調洪洞老稚俱垂涕送之蘇民陜西人正德初知榆次縣為政務持大體民有犯者先曉以禮義而後治之尤加意學校召諸生勤講課士習一變黃卿益都人嘉靖初知太原府寬仁廉正治獄多所平反黃土寨大水漂民居以千計卿掩骸賑恤不遺餘力民舍火將延學宫再拜禱之風反火熄在任六載治聲卓然於惟一懷寧人嘉靖末知太原府歲飢請賑不待報可徑發倉廪全活甚多擢陜西副使去之日民遮道泣送畢文太原營遊擊以事繫獄嘉靖中標兵作亂破其械奉以為帥不從死之高鵬嘉靖中太原參將標兵亂脅使主兵不從被害于天經冠縣人萬厯中知陽曲縣清勤愛民每巡行阡陌勸課農桑一馬一吏而已遇訟者以片詞折之歲飢停徵調屢被譴不為動尋以憂歸送者擁車不得行吳三省洛陽人萬厯初知徐溝縣廉正有為城舊以土築圯於塗水三省用甎石甃之三年而成永為保障周璧厯城人萬厯間知交城縣闢地穿渠繕城堡賑恤寒唆士民咸愛敬之毛文炳鄭州人崇禎中山西兵備副使駐太原李自成來寇乘城固守城陷被執誘以官不從抗罵數日被殺妻妾投井死子數歲被掠去士民以忠臣子贖而歸之畢拱辰掖縣人崇禎中山西冀寧兵備僉事李自成陷太原被執賊適得新刀拱辰睨視之問何睨曰欲得此斫頭耳賊遂取斬之孫康周安邱人崇禎末知太原府闖賊陷城率兵巷戰被執不屈死之李一清太原府同知已遷官闖賊圍太原巡撫留一清守城城陷不屈死范志泰虞城人晉州長史署陽曲縣從孫康周守城城陷不食死趙希壯文水典史流寇入境督鄉兵往偵猝遇賊力戰死本朝徐淳遼東人岢嵐道兵備僉事大同降將薑瓖之亂偏關兵應之被執不屈死贈光祿寺少卿王昌齡遼東人順治四年知太原府遷寧夏道薑瓖叛留轉餉軍中遇賊被害贈光祿寺卿以上二人祀忠烈祠邊大綬任邱人順治八年知太原府有綜理才薑瓖初平悉心撫綏多著治績張國賢宛平人順治五年以舉人任太原府中路同知死薑瓖難贈按察司副使馬維熙欣州州同署太原府西路通判薑瓖亂偏關兵應之被執不屈死贈欣州知州以上二人祀忠烈祠楊三知良鄉人順治三年以進士知榆次縣薑瓖亂率百姓守城宿陴下六月卒全其城又捐俸立社學訓士並置廚饌田楊其籍按察司照磨署太谷縣有政聲薑瓖亂偕教諭蒲州賈道醇典史王自亮守城城陷被執俱不屈繫獄死其籍贈布政司知事道醇贈國子監助教自亮贈濟源主簿周邦翰布政司都事署交城縣與典史鄭運昌守城拒薑瓖適賊有內應俱被殺邦翰贈都司經厯運昌贈山陽主簿曹之賢遼東人順治四年知文水縣精敏善剖決薑瓖黨陷城遇害李昌汴豐潤人順治四年知興縣剛方有守薑瓖陷城索印力拒不屈被殺贈按察司僉事謝應舉巡捕都司死薑瓖亂贈遊擊同時死難者守備李進忠董延儒贈都司千總宋貴中王命新並恤其家自楊其籍下十二人俱祀忠烈祠甘國基正藍旗漢軍康熙二十七年知太原府明敏善折獄姦豪斂迹仁聲甚著劉果諸城人康熙三年以進士任太原推官修文廟立義學引汾水溉太原榆次諸縣田分水先後胥有次第民以不爭交城盜傅青山等據葫蘆峪授計交城令趙吉士平之富人訟産餽黃金五百兩假黃鼠以進峻却之後弟棨以進士知平陽府亦有治績唐廉四川人康熙三十六年知陽曲縣儉朴不事上官中吏議罷歸再起知縣事卒不少屈禮接士大夫不可以私引民以公事至語亹亹不厭骫法者按治不少貸解歸行李蕭然人謂不愧其名云孫閎達江南通州人康熙中以進士知太原縣食不重味慈恕不輕敲撲犯者雖至死感頌不輟後以病歸行李如始至時趙良璧奉天人康熙八年知徐溝縣邑當衝民苦供億良璧送迎餽獻胥絶蒞政五年寬嚴並濟趙吉士休寧人康熙七年知交城縣縣居萬山中饒良馬多灌木時禁民畜馬又廢南堡村木廠民重困多踞險為盜吉士察其出沒要地十年十月奉檄進剿葺靖安堡期以月望進屯先七日張樂宴會密誡司夜者於子刻鼓報五更起送容出郭飭守備姚順等統步騎四百疾行四十里分三隊直搗其窟賊奔潰獲渠魁二十二人餘或降或自殺召山民不作賊者三十七家賚以羊酒其素不當役者千四百餘户編籍入圖旬有六日寇悉平儲方慶宜興人康熙十四年以進士知清源縣山水數害城修白石堰禦之吏緣為姦利方慶設法以辦不徵民錢以費不給停役步禱龍神廟明年春水改道西南去城十里喜曰可保清邑數十年無患矣方慶不延幕客遇事悉自裁決上官重之陳履和石屏人嘉慶二十一年以舉人知太谷縣興學勤政除弊杜私鄰邑積訟爭請赴質以憂去士民遮道泣送籲上官請服闋仍四本任格於例不行私祠祀之人物漢衛綰大陵人事文帝為中郎將醇謹無它景帝立拜河間王太傅吳楚反詔將河間兵擊吳楚有功拜中尉後封建陵侯為丞相上以綰為敦厚可相少主尊寵之建元中薨諡曰哀侯常惠太原人應募隨栘中監蘇武使胸奴拘留十餘年昭帝時乃還拜光祿大夫宣帝本始二年為校尉持節護烏孫兵擊胸奴還封長羅侯後代蘇武為典屬國明習外國事勤勞數有功甘露中為右將軍薨諡莊武侯郇越字臣仲太原人與族弟相並舉州郡孝廉茂才數病去官越散其先人資千餘萬分施九族州里志節尤高劉茂字子衛晉陽人孝行著於鄉里習禮經教授常數百人哀帝時察孝廉建武二年為郡門下掾赤眉來攻茂負太守孫福觸刃踰城出保盂縣晝逃隱夜求食積百餘日賊去乃得歸府明年詔求天下義士福上茂徵拜議郎後拜侍中卒官溫序字次房祁人建武六年為護羌校尉行部至襄武為隗囂别將苟宇拘劫序曰受國重任分當效死義不貪生宇等復曉譬之序大怒以節撾殺數人賊衆爭欲殺之宇曰此義士死節可賜以劍序受劍銜鬚於口顧左右曰即為賊所迫殺無令鬚汙土遂伏劍死子夀為鄒平侯相棄官歸葬談賢字伯升太原人守節不仕王莽世建武中徵並不到閔貢字仲叔太原人世稱節士雖周黨之潔清自謂弗及也黨見其含菽飲水遺以生蒜受而不食建武中應司徒侯霸之辟既至霸不及政事徒勞苦而已仲叔恨曰以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去後客沛以夀終郝潔太原人與同郡胡武袁著善皆危言高論嘗連名奏記三府薦海內高士而不詣梁冀冀銜之會著上書指冀凶縱冀笞殺著又檄捕潔武潔初逃亡知不得免因輿櫬奏書冀門書入仰藥而死王烈字彥方太原人少師事陳實以義行稱鄉里有盜牛者主得之盜諸罪曰刑戮是甘乞不使王彥方知也諸有爭訟曲直將質之於烈或至塗而反或望廬而還其以德感人若此察孝廉三府並辟皆不就黃巾董卓之亂避地遼東曹操聞烈高明遣徵不至終於遼東王允字子師祁人同郡郭林宗見而奇之曰王生一日千里王佐才也以司徒高第為侍御史黃巾賊起拜豫州刺史討擊大破之初平元年為司徒董卓遷都關中朝政悉委於允允矯情承附扶持王室臣主內外莫不倚恃及見卓篡逆已兆乃潛結卓將吕布刺殺之卓將李傕郭汜等不自安合攻長安城陷吕布招允同去允曰朝廷幼少恃我而己臨難苟免吾不忍也與二子及宗族十餘人皆遇害王宏字長文太原人獻帝遷都關中司徒王允以同郡宋翼為左馮翊王宏為右扶風李傕等將害允懼二郡為患乃先徵翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徵明日俱族若舉兵共討惡人山東必應之此轉禍為福之計也翼不從宏不能獨立遂俱就徵傕皆殺之王柔字叔優弟澤字季道晉陽人兄弟總角共候郭林宗訪以才行所宜林宗曰叔優當以仕進顯季道當以經術通後果如其言柔為護胸奴中郎將澤為代郡太守三國魏郭淮字伯濟陽曲人建安中舉孝廉除平原府丞厯官鎮西長史雍州刺史征西將軍都督雍涼諸軍事淮方䇿精詳在關右三十餘年外拒強敵內綏民夷羌胡反叛皆計破之降服有至萬餘落者詔嘉其功以為車騎將軍儀同三司進封陽曲侯正元二年薨追贈大將軍諡曰貞侯郝昭字伯道太原人為雜號將軍鎮守河西十餘年軍民畏服蜀相諸葛亮圍陳倉使昭鄉人靳詳説之昭曰我受國恩深而門户重但有必死耳相攻拒二十餘日亮引退上嘉昭善守賜爵列侯王昶字文舒晉陽人文帝時為洛陽典農遷兗州刺史昶雖在外任心存朝廷乃著治論略依古制而合於時務者二十餘篇著兵書十餘篇言奇正之用青龍中奏之纍官征南將軍假節都督荆豫諸軍事昶表徙治新野習水軍廣農墾殖倉庫盈積嘉平三年遣兵襲吳蜀有功進封京陵侯遷司空薨諡曰穆溫恢字曼基祁人父恕為涿州太守卒恢年十五奉喪歸里盡散家財賑宗族州里高之後舉孝廉文帝時為侍中纍遷涼州刺史持節領護羌校尉道病卒詔愍其忠勤賜恢子生爵關內侯晉王渾字元沖昶之子沉雅有器量襲父爵京陵侯厯官安東將軍都督揚州諸軍事督率所統擊破吳軍遂平秣陵以功進爵為公時吳人新附頗懷畏懼渾撫循綏納莫不悅服徴拜尚書左僕射加散騎常侍遷司徒惠帝立加侍中録尚書事薨諡曰元玉湛字處沖渾之弟少有識度人莫能知兄弟宗族皆以為癡兄子濟嘗詣湛見牀頭周易請言之湛剖析元理妙有竒趣濟歎曰家有名士三十年而不知濟之罪也後武帝問湛於濟濟稱其美帝曰誰比濟曰山濤以下魏舒以上厯官太子中庶子出為汝南內史郭奕字大業陽曲人山濤稱其高簡有雅量初為野王令纍遷雍州刺史太康中為尚書奕有重名當世朝臣皆出其下時帝委任楊駿奕表駿小器不可任以社稷後駿果敗郭琦字公偉晉陽人博學善五行作天文志五行傳注穀梁京氏易百卷鄉人王遊等皆就學武帝以為佐著作郎及趙王倫之亂遂終身處於家王濟字武子渾之子少有逸才善易及莊老與和嶠裴楷齊名尚常山公主拜中書郎纍遷侍中每侍見武帝未嘗不咨論人物及萬機得失濟善清言修飾辭令諷議將順朝臣莫能尚焉會齊王攸當之藩濟力諌忤旨左遷國子祭酒後以白衣領太僕先渾卒溫羡字長卿祁人序之後也兄弟六人並知名號六龍羡少以頴悟稱惠帝時為豫州刺史入為散騎常侍轉吏部尚書建議復張華官爵後以從討成都王穎有功封大陵縣公官至司徒卒諡曰元溫嶠字太真羡弟少以孝弟稱為北平大將軍劉琨𠫭軍琨遷司空以為右司馬時石勒劉聰跨帶疆場嶠為主謀琨憑恃焉元帝初鎮江左琨使嶠奉表勸進辭旨慷慨舉朝屬目明帝即位以平王敦功封建寧縣公咸和初為江州刺史持節都督平南將軍鎮武昌有惠政蘇峻反要陶侃同赴國難誅峻於石頭封始安郡公至鎮未旬卒時年四十二江州士庶聞之相顧而泣追贈侍中大將軍諡忠武子放之嗣爵官至給事黃門侍郎牧交州甚有威惠王承字安期湛之子永寧中為司空從事中郎與迎大駕賜爵藍田侯復遷東海太守政尚清淨不為細察渡江為元帝鎮東府從事中郎甚見優禮承少有重譽而推誠接物盡宏恕之理為中興第一名臣子述字懷祖少孤事母以孝聞司徒王導辟為中兵屬嘗見導每發言一座贊美述正色曰人非堯舜何得每事盡善導改容謝之纍官散騎常侍尚書令王𪷟字仲祖晉陽人哀靖皇后父也事諸母甚謹俸祿資産常推厚居薄喜愠不形於色以清約見稱初辟司徒掾終左長史南北朝魏張偉字仲業中都人學通諸經鄉里受業者數百常依附經典教以孝弟門人感其仁化事之如父清雅篤慎非法不言世祖時拜中書博士仕至平東將軍營州刺史爵建安公卒諡曰康在州郡以仁德為先不任刑罰清身率下宰守不敢為非郭祚字季祐晉陽人涉厯經史工文章孝文初舉秀才對䇿上第纍官黃門侍郎以贊帝遷洛賜爵東光子尋拜尚書進爵為伯宣武時除使持節散騎常侍都督雍州刺史鎮西將軍為領軍于忠所害祚清勤在公達於政事凡所經履咸稱職每有決斷多為故事器重望深非罪見殺遠近惋惜正光中贈車騎將軍儀同三司諡文貞王思政祁人魏孝武時以與定策功封祁縣侯齊神武潛有異圖思政首䇿西遷帝從之進爵太原郡公纍加特進兼尚書左僕射行臺都督荆州刺史大統十四年以大將軍守潁川敗東魏太尉高嶽步騎十萬斃行臺慕容紹宗儀同劉豐生等俄而齊文襄來破城被執不屈文襄厚遇之思政不營資産嘗賜園地家人種桑果雜樹怒曰胸奴未滅去病辭家况大賊未平欲事産業豈所謂憂公忘私耶命拔而棄之北齊唐雍字道和晉陽人其先自晉昌徙焉天保中文宣出塞雍必從專掌兵機或於御前簡閲將吏雖三五千人不執文簿暗唱官位姓名未嘗謬誤文宣嘗曰唐雍手作文書口且處分耳又聽受實是異人嘗登佛寺望并州城曰此何等城或曰金城帝曰我謂唐雍是金城此非也纍官中書監尚書令封晉昌王周王軌祁人漢司徒允之後從武帝平并鄴以功進位上大將軍爵郯國公陳將吳明徹入吕梁軌俘獲明徹及將士三萬餘人進位柱國仍拜徐州總管威振敵境陳人甚憚之軌以皇太子多涼德不克負荷極議於武帝前武帝深然之而不能用及宣帝即位自知必及於禍謂所親曰此州控帶淮南鄰接強寇欲為身計易同反掌但忠義之節不可虧違况荷先帝厚恩每思以死自效豈以獲罪嗣主便欲背德止可於此待死義不為他計冀千載之後知吾此心大象元年帝使內史杜虔信就徐州殺之軌立朝忠恕兼有大功忽以無罪被戮天下知與不知皆傷惜焉冀俊字僧儶陽邑人善隸書太祖引為記室世宗二年以車騎大將軍為大使巡厯州郡察風俗理冤滯還拜小御正尋出為湖州刺史性靜退每以清約自處所厯皆有聲稱進爵昌邑縣侯王雄太原人有謀略魏永安末從賀拔嶽入關纍官大將軍行同州事入周進柱國封庸國公出為涇州總管與齊將斛律光戰死諡曰忠子謙襲父爵授益州總管隋文輔政謙以世受國恩將圖匡復舉兵為梁睿等所敗被害王慶祁人少開悟有才略武成元年以戰功賜爵始安縣男屢使吐谷渾突厥皆見感悅後更至突厥屬其國有喪諷慶𠢐面表哀慶抗詞不從突厥見其守正不敢逼武帝聞而嘉之録慶前後使功遷開府儀同三司兵部中大夫進爵公隋開皇中卒諡曰莊隋郭儶字宏乂文水人家門雍睦七葉同居犬豕同乳鳥鵲同巢時人以為義感事聞文帝使宇文弼詣其家勞問侍書御史柳彧巡省河北表其門閭唐許世緒并州人從起晉陽有功纍官蔡州刺史封真定郡公唐儉字茂系晉陽人雍之孫事親以孝聞儉少與太宗遊見隋政亂因説以建大計武德初使至永安王孝基軍中會軍敗為劉武周所拘於賊中得獨孤懷恩反謀密遣劉世讓歸發之帝命捕反者懷恩自殺俄而武周敗得還帝嘉儉不忘朝廷詔復舊官還為天䇿府長史莒國公顯慶初卒贈開府儀同三司并州都督諡曰襄溫大雅字彥宏祁人性至孝與弟彥博大有皆知名薛道衡歎曰三人皆卿相才高祖兵興引為記室參軍主文檄帝受禪與竇威陳叔達論定儀典隱太子圖亂秦王表大雅鎮洛陽待變數陳密畫多所嘉納終禮部侍郎封黎國公卒諡曰孝四世孫佶字輔國安祿山亂往見平原太守顏真卿助為守計後居鄴薛嵩薦之朝授太常丞謝去屏處郊野世推高節溫彥博大雅弟字大臨隋開皇末對䇿高第入唐為中書舍人遷侍郎高麗貢方物高祖欲讓而不臣彥博執不可乃止突厥入寇彥博以并州道行軍長史戰敗被執突厥數問國虛實不肯對囚陰山太宗立突厥歸款得還纍遷中書令封虞國公彥博性周慎既掌機務謝賓客不通進見必陳政事利害家貧無正寢卒殯别室帝命有司特為搆寢諡曰恭子振厯太子舍人居喪以毁卒彥博弟大有字彥將高祖舉兵引為太原令從秦王徇西河下之纍遷中書侍郎封清河郡公卒諡曰敬武士逸文水人字逖有戰功為齊王府户曹參軍從王守太原為劉武周所執嘗間遣人陳破賊計賊平擢授益州行臺左丞數言當世得失高祖嘉納之終韶州刺史張道源祁人名河以字顯年十四居父喪士人賢其孝縣令署所居曰復禮鄉至孝里嘗與容夜宿客暴死道源卧尸側至曙徒步護送還其家高祖興署大將府戶曹參軍厯大理卿時何稠得罪籍其家屬賜羣臣道源曰利人之亡取其子女自奉仁者不為也更資以衣食遣之終棉州刺史贈工部尚書諡曰節王方翼字仲翔祁人早孤哀毁如成人時號孝童後居母喪哀瘠尤甚其友趙持滿誅親戚莫敢視方翼具禮收葬之纍官檢校安西都護徙庭州刺史夏州都督屢平寇亂封太原郡公事具陜西名宦武后時以王后屬流崖州道卒子璵珣瑨俱以文學稱時號三王狄仁傑字懷英太原人舉明經調汴州參軍黜陟使閻立本異其才薦為法曹參軍稍遷大理丞歲中斷久獄萬七千人時稱平恕厯江南安撫使毁淫祠千七百房為豫州刺史活詿誤論死者二千餘人所至民愛仰之往往為立碑置生祠召拜鸞臺侍郎同鳳閣鸞臺平章事聖厯三年卒贈文昌右相諡文專中宗立贈司空睿宗又追封梁國公子光嗣仁傑薦為地官員外郎以稱職聞厯淄許貝三州刺史母喪奪為太府少卿固讓睿宗嘉其誠許之按仁傑薦張東之為相卒成反正之功故其説武氏迎復廬陵王一事史傳莫不艷稱恭譯通鑑輯覽御批則知姑姪母子之喻已先發之於李昭德而東之被薦時年已八十餘幸而後死以成其功而終仁傑之丗唐祚實未嘗復也故於嗣聖十七年仁傑之卒特書曰周一字之斧鉞真足使託言調護委蛇亂朝者無可藉口兹故舉其厯仕之績而於説武后語從略武宏度文水人武后父士彠兄子補相州司兵參軍永徽中父卒自徐州被髮徒跣趨喪所負土築塋晨夕號日一溢米素芝産廬前狸擾其旁高宗下詔褒美旌其門武平一名甄以字行潁川郡王載德子也通春秋工文辭武后時畏禍隱嵩山屢詔不應景龍中為考功員外郎太平安樂公主各立黨相毁帝患之平一上書極論帝美其忠切平一見寵中宗嘗因詩頌規戒明皇立被謫而名不衰武攸緒武后兄惟良子也恬淡寡欲好易莊周書少變姓名賣卜長安市得錢輒委去纍官鴻臚少卿武后時固辭官廬巖下如素遁者后遣其兄攸宣敦諭卒不起盤桓龍門少室間市田潁陽使家奴雜作自混於民中宗即位以安車召拜太子賓客苦祈還山後諸武之禍惟攸緒不及王維字摩詰祁人九歲知屬辭與弟縉齊名開元初擢進士厯監察御史母喪哀毁幾不欲生纍遷尚書右丞維工草隸善畫名盛開元天寶間與裴迪賦詩相酬為樂寶應中代宗語縉曰朕於諸王座間聞維樂章今傳幾何縉裒集數十百篇上之李憕文水人少秀敏舉明經高第纍官給事中失李林甫意出為河南少尹天寶初為京兆尹楊國忠惡之改光祿卿東京留守安祿山反與盧奕達奚珣繕城壘勵士卒將遏賊西鋒帝聞擢禮部尚書祿山渡河憕堅守城陷死之贈司徒諡忠懿河洛平再贈太尉子源以父死賊手常悲憤不仕自營墓為終制時時偃卧埏中長慶初年八十李德裕表其至孝詔以源為諫議大夫王緯字文卿太原人舉明經厯長安尉大厯中與李泌俱為路嗣恭判官嗣恭欲殺李泌緯解免泌執政進緯給事中浙江觀察使缺泌以緯清而忠能惠養民請遣緯帝可之果稱職貞元十年加御史大夫兼諸道鹽鐵轉運使裴延齡以諸道負錢四百萬緡獻為羡錢緯奏此諸州經費忤延齡意改檢校工部尚書王仲舒字宏中祁人貞元中賢良方正高第拜左拾遺德宗欲相裴延齡與陽城交章言不可改右補闕遷禮部考功員外郎奏議詳雅省中伏其能元和初為吏部員外知制誥楊憑得罪無敢過其家仲舒屢存之將直憑冤貶陜州刺史改婺州徙蘇州俱有惠政終江西觀察使贈左散騎常侍諡曰成武元衡字伯蒼平一孫舉進士德宗欽其才略遷御史中丞嘗對延英帝目送之曰是真宰相器順宗時王叔文誘為黨拒不納憲宗立進戶部右侍郎元和二年拜門下侍郎同中書門下平章事帝素知元衡堅正有守信任異他相淮蔡用兵帝悉以機政委之王承宗李師道等恐使賊刺之元衡入朝被害帝聞震悼為再不食贈司徒諡忠愍武儒衡字廷碩元衡從兄弟以莊詞正色為宰相鄭餘慶所重纍官戶部郎中知諫議大夫事兼知制誥論議徑正有風節且將大用令狐楚忌而沮之遷中書舍人以疾惡太分明終不至大任卒官兵部侍郎李光進其先河曲諸部姓阿跌氏貞觀中內屬以其地為雞田州世襲刺史隸朔方軍光進與弟光顏居家太原以沉果稱從馬燧救臨洺戰洹水有功元和四年加檢校工部尚書振武節度使賜姓以光寵之光進有至性母喪三年不歸寢弟光顏先娶委以家事及光進娶母已亡弟婦藉資貯納管鑰於姒光進命反之曰弟婦逮事姑且嘗命主家不可改因持光顏泣乃如初李光顏字光遠初從河東馬燧為裨將討李懷光楊惠琳有戰功又從高崇文平劍南益知名元和元年討蔡擢忠武節度使詔以其軍當一面光顏先破賊裴度宣慰諸軍還言光顏勇而善必立功韓宏挾賊自重惡光顏忠力乃飾名姝相遺光顏謝曰戰士皆棄妻子冒白刃奈何以女色為樂天子於光顏恩厚誓不與賊同生將卒數萬皆感泣氣益勵蔡平加檢校司空厯義成邠寧鳳翔諸節度使敬宗初拜司徒河東節度使卒贈太尉諡曰忠光顏性忠義善撫士其下樂為用故數立勳云溫造字簡輿佶子性嗜書隱王屋山夀州刺史張建封以書幣招禮造往從之李希烈反建封奉詔命造往幽州説劉濟濟流涕願效死節復隱東都烏重引奏置幕府長慶初以京兆司録為幽鎮宣諭使以禍福開諭劉總入朝還遷殿中侍御史夏州節度使李佑違詔進馬造劾之佑瞻落纍遷御史中丞彈擊無所回畏終禮部尚書子璋以父廕官大理丞陰平吏盜官物而焚其帑璋刺得其情擢侍御史纍遷京兆尹同昌公主薨懿宗誅醫無狀者繫親屬三百餘人璋與劉瞻極諫貶振州司馬仰藥而死狄兼謨字汝諧仁傑族孫及進士第辟襄陽使府剛正有祖風授左拾遺數上書言事纍遷御史中丞江西觀察使吳士矩擅用上供錢數十萬兼謨劾奏之士矩貶蔡州别駕兼謨官至東京留守李景讓字後已憕之孫性方毅有守寶厯初遷右拾遺淮南節度使王播以錢十萬市朝廷歡求領鹽鐵景讓詣延英極論不可遂知名大中中為御史大夫威肅當朝拜西川節度使丐致仕或諫公廉潔無素儲不為諸子謀耶景讓笑曰兒曹詎餓死乎書聞輒還東都以太子少保分司卒諡曰孝弟景溫纍官尚書右丞盧儶當國其弟隱由博士遷水部員外郎材下資淺景溫不許赴省衆韙其正溫廷筠字飛卿彥博裔孫少敏悟工辭章與李商隱皆有名號溫李數舉進士不第徐商鎮襄陽署為巡官不得志後遷隨縣尉卒溫廷皓廷筠弟咸通中署徐州觀察使崔彥曾幕府龎勛反以刀脅廷皓使為表求節度使廷皓紿曰表聞天子當為公信宿思之歸與妻子訣明日復見勛索表廷皓倨答曰我豈以筆硯事汝耶其速殺我勛囚之彥曽死亦遇害贈兵部郎中王凝字成庶晉陽人曽祖翊厯山南東道節度使代宗目為純臣世稱謹廉卒諡忠惠凝舉明經進士皆中厯臺省寖知名擢禮部侍郎不阿權近出為商州刺史乾符四年遷宣歙池觀察使時王仙芝之黨屠建德勢益張凝遣將綴賊城守嚴賊不能犯會大星直寢庭墜術家言宜上疾不視事以厭勝凝以一方無賴誓與賊相存亡不敢脫禍既而賊去未幾卒贈吏部尚書諡曰貞王重榮祁人用父任為列校與兄重盈皆以毅武冠軍纍官河中節度使與楊復光李克用討平黃巢以功檢校太尉同中書門下平章事封琅琊郡王五代唐李嗣昭太谷人本姓韓李克用使弟克柔養為子常從用兵梁軍圍太原克用謀走雲州李存信勸奔契丹嗣昭力爭以為不可晝夜出奇兵擊梁軍梁軍解去是時鎮定間已絶晉附梁孤城被圍者再嗣昭力戰之功為多天祐初為昭義軍節度使拒戰有功十九年從莊宗擊契丹於望都契丹圍數十重嗣昭以三百騎決圍取莊宗以起尋討張文禮於鎮州為賊射中腦卒張憲字允中晉陽人少好學纍官東都副留守精於吏事甚有能政郭崇韜代蜀薦憲可任宰相宦官伶人不欲憲在朝乃以為太原尹北京留守趙在禮作亂遣人以書招憲憲斬其使明宗入洛永王存霸奔太原憲左右教憲拘存霸奉表明宗勸進憲涕泣拒之卒與存霸俱死周鄭仁誨字日新晉陽人事母以孝聞漢高祖為河東節度使周太祖居帳下時過仁誨有疑從質問仁誨所對不阿太祖破李守貞於河中軍機多所參決官至樞密使謙謹不伐為士大夫所稱卒封韓國公諡忠正韓通太原人以勇力聞周祖知通謹厚委以心腹築城濬渠禦遼屢著功績纍官檢校太尉同平章事宋太祖至陳橋為諸軍推戴通在殿閣聞變遽歸軍校王彥升逐之為所害妻子皆死詔贈通中書令李筠太原人善騎射晉開運末遼衆數萬據常山筠以控鶴指揮使敗走之入周纍官招義軍節度使加同平章事復以擊退遼師功加兼侍中宋太祖受周禪遣使諭筠筠延使者置酒遽索周祖畫像懸壁涕泣不已殺澤州刺史張福據其城引兵南向太祖破筠衆於澤南列柵圍之拔其城筠赴火死宋王溥字齊物祁人漢乾祐中舉進士甲科為祕書郎周廣順中纍拜中書侍郎平章事建隆初纍遷太子太師太平興國中封祁國公卒贈侍郎諡文獻溥性寬厚好汲引後進其所進薦至顯位者甚衆嘗集蘇冕會要及崔鉉績會要補其缺漏為百卷曰唐會要又著五代會要三十卷又有集二十卷子貽孫字象賢博聞強識端拱中右僕射李昉求郡省百官集議舊儀貽孫具以對時論許其諳練云藥元福晉陽人晉開運初遼人圍魏郡元福以左千牛衛將軍與慕容鄴各領三百騎左右馳突無不披靡明年遼兵復入元福與符彥卿等禦之於陽城大戰追奔二十餘里遷威州刺史厯仕漢周皆有戰功纍官檢校太尉建隆初加太師卒贈侍中元福雖老筯骨不衰時稱驍將慕容延釗太原人仕周以戰功為北面行營馬步軍都虞侯太祖即位命延釗按治邊境以鎮靜聞加殿前都點檢同中書門下三品建隆四年為湖南行軍都部署擒賊將汪端平荆湘加檢校太尉子德豐字日新厯知蔚慶邢廷靈等州輕財好施厚享將士進潁州團練使及卒家無餘財王全斌太原人建隆初拜安國軍節度詔葺西山保寨不踰時而就乾德二年伐蜀全斌為西川行營前軍都部署蜀平𬒳訴獲罪責授崇義軍節度觀察留後開寶末為武安軍節度卒贈中書令全斌輕財重士不求聲譽寬厚容衆軍旅樂為之用黜居山郡十餘年怡然自得識者稱之郭從義其先沙陀部人後家太原漢祖表為馬步軍都虞侯屢率師破遼於代北開寶二年以太子太師致仕從義性厚重有謀略多技藝尤善飛白書張永德字抱一陽曲人曽祖丕尚氣節永德事繼母以孝聞周祖時官至殿前都指揮使泗州防禦使劉崇引遼人來侵世宗親戰高平太祖與永德各領牙兵二千分進大捷降崇軍七千從克夀州授檢校太尉太祖即位加兼侍中咸平三年卒贈中書令李萬超太原人幼孤貧負販以養母晉祖起并州萬超應募以功厯肅鋭指揮使遼入中原萬超屯潞州殺遼使推王守恩為帥漢祖令史宏肇統兵至潞語之曰得復此州公之力也吾欲殺守恩以公為帥可乎萬超曰殺遼使推守恩為社稷計爾若賊人自利非宿心也宏肇大奇之建隆初纍官左驍衛大將軍安守忠字信臣晉陽人建隆初為左衛將軍淳化三年知宋州兼制置營田使卒守忠謹慤淡泊為治簡靜有威德從征太原多與謀略所至藩郡樂施與喜與士大夫逰時論多與之吳廷祚字慶之太原人仕周為檢校太尉建隆初加同中書門下三品三年特任為雄武軍節度廷祚謹厚寡言性至孝居母喪絶水漿纍日好學聚書萬卷治家嚴肅子元扆字君華尚太宗女纍官檢校太傅性謹讓厯藩郡俱有善政待賓佐以禮所得祿賜悉給親族孤貧者邊光範字子儀陽曲人為人謙退和雍有吏材起家榆次令開寶中拜御史中丞性至孝母病疽嘗親吮之劉孝忠太原人母病割股食母母病心痛劇然火掌中代母痛母尋愈後母死傭為富家奴得錢以葬富家知其孝行養為己子養父兩目失明為舐之復能視太祖召見慰諭李進卿晉陽人晉天福中杜重威敗安重榮於宋城進卿力戰有功乾德二年伐蜀為歸州路行營步軍都指揮使拔巫山寨下夔萬二州蜀平録功拜侍衛親軍步軍都虞侯卒贈侍中子延渥禦遼有勞終左武衛大將軍楊美文水人武力絶人周廣順初從征淮南以功擢鐡騎都指揮使領白州刺史建隆三年升青州北海縣為軍以美為軍使乾德初召還民數百為詣闕乞留厯官保靖軍節度使美任氣好施凡得賜豫俸祿盡周給故舊親戚及卒家無餘財侯贇太原人建隆初為諸衛將軍先是朝廷歲仰關中穀麥以給用贇掌其事三十年國用無闕開寶中厯知建安軍揚徐二州刺史皆有善政太平興國七年知靈州得邊士心在任十餘年卒於官郭守文太原人父暉從周祖征河中戰死守文年十四居喪哀毁建隆𥘉為西頭供奉官太平興國初秦州內附蕃部騷動命守文撫諭西夏悅服後夏人擾攘守文帥師破之諸部畏懼相率來降銀麟夏三州歸附者百二十五族西邊遂安厯宫北面行營都部署卒贈侍中諡忠武守文沉重有謀略頗知書每退朝習書百行出言溫雅未嘗忤人意得俸祿賜賚悉犒士卒死之日家無餘財士卒莫不流涕袁繼忠其先振武人後徙并州開寶中伐廣南為先鋒以功遷供奉官太宗征大原預破鷹揚軍先登陷陳遼師入代率兵擊走與崔彥進破之於長城口殺獲數萬衆雍熙二年從田重進攻遼取飛狐下靈邱平蔚州師還重進欲斬降卒後期至者繼忠救免之淳化初遷引進使繼忠長厚忠謹士大夫多與遊前後賜賚巨萬悉以犒士卒家無餘財石曦太原人晉祖弟韓王敬暉之子建隆初官左驍衛大將軍西人犯邊曦率所領擊破之斬渠帥十三人太平興國四年知霸州兼部署陳廷山謀以平戍軍叛入北邊曦與侯延濟定計擒廷山以獻録功加領本州團練使終右龍武軍大將軍楊業太原人弱冠事劉崇屢立戰功號為無敵太宗征太原得之大喜以為右領軍衛大將軍雍熙三年北征以潘美為雲應路行營都部署命業副之連拔雲應寰朔四州時遼太后蕭氏領衆十餘萬復陷寰州業言遼兵益盛不可與戰護軍王侁迫之業因指陳家谷口曰諸君於此張步兵強弩為左右翼業轉戰至此即夾擊救之不然無遺類矣美即與侁陳谷口自寅至已侁使人望之以為遼兵敗走欲爭其功即引兵離谷口俄聞業敗即麾兵走業力戰自午至暮果至谷口望見無人即撫膺大慟仍力戰身被數十創士卒殆盡猶手刃數十百人馬重傷不能進遂為遼所擒不食三日卒帝聞之痛惜甚贈太尉大同軍節度潘美降官王侁除名業忠烈武勇有智謀練習攻戰御下有恩士卒樂為用朔州之敗麾下尚百餘人皆感泣不肯去無一生還者楊延昭業子本名延朗幼沉默寡言多戲為軍陳業曰兒類我每征行必以從太平興國中補供奉官厯官保州防禦使高陽關副都部署延昭有智善戰出入騎從如小校號令嚴明遇敵必身先行陳克捷推功於下在邊防二十餘年遼人憚之目為楊六郎及卒帝遣中使護櫬以歸河朔之人多望柩而泣子文廣字仲容討賊張海有功授殿直范仲淹宣撫陜西奇之置麾下遼人爭代州地界文廣獻陳圖並取幽燕䇿未報而卒王貴太原人太平興國二年為淄州刺史從潘美北征攻沁州頗立戰功及從楊業為遼兵所圍親射殺數十人矢盡張空弮又擊殺數人遂遇害年七十三石普其先幽州人徙居太原纍官大將軍倜儻有膽略兩平蜀盜大小數十戰摧賊鋒衆推其勇頗通兵書陰陽六甲星厯推步之術武英字漢傑太原人父密與遼戰殁於望都英以戰功厯涇原行營都監元昊入寇英與任福合諸將戰張家堡斬首數十百敵棄羊馬偽遁諸將皆趨利爭進英以為前必有伏衆不聽已而伏發福等既敗英力戰自辰至申矢盡遇害贈邢州觀察使尹憲晉陽人太宗時以供奉官護府州屯兵與鄜州三族會攻嵐州破敵千餘衆擒偽知州馬延忠拔緣河諸寨入朔州界破安武軍獲人馬器甲甚衆改護夏州兵就知夏州俱有戰功後知定州卒劉美字世濟并州人真宗劉后之兄由三班奉職纍遷洛苑使領勤州刺史在官咸克舉其職子從廣性謹飭喜交士大夫時頗稱之從子永年仁宗嘗問禦戎䇿對合旨書忠孝字以賜卒諡莊恪呼延贊太原人以材勇授驍雄軍使從王全斌討西川當前鋒中數創以功補指揮使太平興國初從征太原先登及堞而墜者數四面賜金帛奬之淳化中官至康州團練使真宗嘗補軍校皆敘已功或至歡譁贊獨進曰臣月奉百千用不及半自念無以報國不敢更就遷擢衆嘉其知分閻守恭榆次人聞郭進為太宗寵遇慨然曰吾自度豈不及進耶遂應募擢殿前押班明道中為永興軍兵馬鈐轄徙并代路守恭性沉勇御軍嚴雖家居如對賓客常訪求士大夫取郭進事師法之所得俸賜悉散豫人王貽永祁人溥之孫性清慎寡言咸平中尚鄭國公主厯徐州團練使知鄆州皆築隄禦水患纍拜同中書門下平章事貽永能遠權勢在樞密十五年無過失人稱其廉靜高若訥字敏之榆次人徙家衛州進士及第纍官參知政事強學善記精於天文兼通醫書雖國醫皆屈服皇祐中詔纍黍定尺以制鐘律若訥以漢貨泉度一寸依隋書定尺十五種上之並損益祠祭服器悉施用有集二十卷王信字公亮太原人少勇悍大中祥符中盜起晉絳潞澤數州信應募籍軍與其徒生擒賊七十人部使者表薦纍官西京作坊使知保安軍兼鄜延路兵馬都監始至之夕敵衆號數萬薄城信領徑兵二千擊走之官至步軍副都指揮使卒楊畋字樂道太原人重勛曽孫知嶽州纍遷荆湖南路兵馬鈐轄嘉祐三年冬河北地震明年日食正旦上疏宜早立皇嗣以答天意仕至龍圖閣直學士畋出將家折節喜學問在山下討蠻與士卒同甘苦遂破諸洞性清介自奉甚約及卒家無餘資盧政文水人為德州兵馬監押與討貝州先登守者莫能亢大軍乘之以入南征儂智高亦有功纍拜武參軍節度使時年七十三能上馬踴躍觀者壯之趙密太原府清源人政和中用材武試河北隊將金兵陷揚州士民數萬從乘輿渡江密露立水濱麾舟濟之從張俊征戰屢立功遷龍神衛四廂都指揮使隆興二年進少保按清源本傳作清河但宋志太原無清河河字誤今改正金李汾字長源平晉人為人尚氣跌宕不羈善讀史工詩雄健有法舉進士不中用薦為史館書寫尋上書言時事不合去客唐鄧間死時年未四十劉昂字子昂興州人大定進士高曽以下七世登科昂天資警悟律賦自成一家詩得晚唐體官上京留守判官卒郭文振字拯之太原人承安二年進士纍官遼州刺史興定二年太原不守以文振權元帥左都監行河東北路元帥府事文振招降太原東山二百餘村遷老幼於山寨得壯士七千分駐營柵防護秋穫尋與張開合兵復取太原封晉陽公文振有材略屢上疏言軍國事朝廷不能用趙益太原人元兵入境合土豪保聚山陜屢戰有功晉陽公郭文振署為壽陽令駐兵榆次重原寨率衆收復太原獲老幼二萬餘口以出升太原治中擢同知府事兼招撫使元光元年八月元兵大至攻城不可支乃焚府庫殺妻子沉符印於井遂自殺王渥字仲澤太原人性明俊博學善談論長於詞賦登興定二年進士第為時帥所致故多在兵間後辟安陵令有治績入為尚書省令史使宋應對敏給宋人重之劉海興州人舉進士第一仕至河南尹死國難元郝和南巴圖太原人通譯語善騎射太祖遣使宋往返數四以辨稱從南伐善戰所在有功太宗於行在所命解衣數其瘡痕二十一嘉其勞進拜宣德西京太原平陽延安五路萬户卒贈太保冀國公諡忠定郝和南巴圖舊作郝和南拔都今改正張德輝字耀卿交城人少力學史天澤開府真定辟為經厯官資其籌畫世祖在藩邸深器重之呼其字而不名及即位以為河東河北路宣撫使考績為十路最入見疏急務四事遷東平路宣慰使有惠政至元三年參議中書省事以老乞歸德輝天資剛直博學有經濟毅然不可犯望之知為端人劉宣字伯宣其先潞人後徙太原沉毅清介居家孝友宣撫張德輝至河東見而器之薦為中書掾至元十二年入為戶部郎中從丞相巴顏平江南詣闕上捷書世祖親問南征事稱旨賜器服寵嘉之纍遷吏部尚書時將伐交址及征日本宣上書切諫帝嘉納其言延祐四年追封彭城郡公諡忠憲巴顏舊作伯顏今改正王守誠字君實陽曲人氣宇和粹性好學從鄧文原虞集遊文詞日進泰定初試禮部第一由祕書郎厯官至禮部尚書與修遼金宋三史至正五年使四川舉劾精嚴為諸道最進河南行省左丞卒諡文昭明周瑄字廷玉陽曲人正統中以鄉舉除刑部主事尋遷郎中超拜侍郎奉命賑順天河間飢民先後賑二十六萬五千給牛種各萬餘奏行利民八事還部救正冤濫甚多瑄官刑部久屬吏不敢欺意主寬恕不為深文時稱長者成化中遷南京刑部尚書令諸司事非會勘者母出五日獄無滯囚暑疫悉縱輕繫者曰召汝則來及期無違令者卒贈太子少保諡莊懿王鑑字彥昭太原人景泰中進士授監察御史石亨亂政率同列廷論之下獄搒掠幾死謫膚施知縣有善政亨敗升延安知府周經字伯常瑄子天順進士改庶吉士宏治中纍遷户部尚書經悉按祖宗成憲寬逋緩徵裁節冗濫四方告災必覆奏蠲除每委官監稅課入多者與下考苛切之風為衰經剛介方正好強諫雖重忤旨不恤宦官貴戚皆憚而疾之會星變乞休中外論薦者至八十餘疏咸報寢卒贈太保諡文端王瓊字德華太原人成化進士為工部郎中以敏練稱正德中纍遷户部尚書明習國計轉兵部制置周詳宸濠反用王守仁督戰立擒之嘉靖初謫戍尋以邊警起督陜西三邊軍務吐魯番降服北寇遠遁邊陲晏然人比之楊一清官至吏部尚書卒贈太師諡恭襄杜蓁陽曲人成化舉人由城固知縣升南京户部主事以不附逆瑾奪官瑾誅起擢員外郎言行政事多可法鄉評重之唐希介字景賢陽曲人成化進士以工科給事中稽省真定等四鎮儲備盡得宿弊以聞權幸見嫉謫四川石砫宣撫司經厯纍遷陜西按察副使皆有善政中官不便搆諸逆瑾遂罷歸薄彥徽陽曲人宏治進士為南京御史論道士崔志端不可玷尚書正德初八黨竊柄偕同官極論其罪疏上而劉健謝遷已被逐復上疏乞留遂被逮廷杖除名張文明字應奎陽曲人正德初進士以御史巡按陜西車駕幸延綏馳疏極諌不省既而文明朝行在忤司禮太監張忠輩下詔獄謫官世宗立召復故官尋出為松江知府卒巡按御史馬録頌其忠詔贈太常寺少卿寇天敘字子惇榆次人正德進士授南京大埋評事厯寺副讞獄多所平反遷寧波知府有聲擢應天府丞武宗南巡江彬等怙寵為虐天敘力與之抗民得不困嘉靖初厯撫甘肅陜西以禦寇功擢刑部右侍郎改兵部卒家貧喪事不具解一貫字曽唯交城人正德末進士除工科給事中嘉靖元年出核牧馬草場凡內臣勛戚所據莊田率歸之民帝為后父陳萬言營第極壯麗一貫力請裁節尋進吏科都給事中張璁桂蕚同擠費宏偕同官力詆之竟謫開州判官卒周鈇字汝威榆次人嘉靖初進士厯御史監視十庫嚴杜侵蝕巨璫斂手纍遷左春坊清紀郎兼翰林院侍讀尋以言事謫官起國子監丞遷吏部主事坐與王與齡發嚴嵩私事貶河間府通判已復禠職里居出入徒步蕭然若布衣海內皆知其名穆宗立贈光祿少卿李敏字鈍甫榆次人嘉靖中進士選庶吉士改刑科給事中以論救楊守謙廷杖謫官起禮科給事中又以不與醮壇被杖纍遷順天府尹自陳歸里卒於家萬自約太原人萬厯進士為刑科給事中改户科前後劾罷兩尚書兩都御史一翰林學士厯光祿寺少卿適倭犯朝鮮主兵事者謀以封貢款之抗疏力爭纍遷順天府尹以停罷大內所索珠寶貶官王元雅太原人萬厯進士厯官監察御史巡撫遵化崇禎二年城陷死本朝乾隆四十一年賜諡節愍鄭宗周字伯忱文水人萬厯進士為監察御史列首輔方從哲姦狀光廟崩纍疏請正李可灼崔文升妄投藥劑之罪與楊漣左光斗並稱忠鯁崇禎初遷太僕寺少卿釐遼薊諸鎮宿弊擢兵部右侍郎巡撫天津遼東民之徙內地者加意綏輯以母喪歸不復出宗周遇義可否挺特不少屈其貌清臞乃若不勝衣者張鳳奇陽曲人崇禎初永平知府城陷飲藥死門內十餘人皆殉節後贈太僕寺少卿一年本朝乾隆四十賜諡烈愍胡玉琴興人其父博娶關氏生尚默繼娶甄氏生玉琴甄疾卒兄弟廬墓父殁玉琴復廬墓哀思竟死墓側朱慎鏤晉府宗室攝靈邱郡王府事崇禎末賊陷太原冠帶祀家廟驅家人入廟焚之自投焰中死本朝乾隆四十一年賜諡烈愍楊方生字爾楨陽曲人闖賊之變兩弟被執方生聞之急詣賊曰我楊氏冡子某有事當任於弟無與賊因釋其弟囚之兩月幾死後得脫會弟當行戍方生求代不得乃偕弟行左右之以及其歸本朝王廷衡陽曲人順治初舉武鄉試第一為都司營中軍薑瓖之亂賊據太原晉祠鎮廷衡繕攻具賊爇之熸焉詔恤其家祀忠烈祠潘一桂陽曲人鬻販事親父好酒必醉醉必夜歸執燭候門扶之終身不改父殁廬墓人稱潘孝子李中馥字鳳石太原人明天啓舉人為孝廉五十年未嘗入官府巡撫御史薦之辭不赴甲申闖賊遣人授偽官怒曰尚不趨召肯為賊屈耶順治四年薑瓖亂為縣令畫守禦計縣人賴之讀書晚年益勤著述甚多常大忠字二河交城人順治壬辰進士為潛山知縣擢保定同知皆有善政在保定朔望必拜楊忠愍祠建忠烈祠以祀甲申盡節諸臣卒官櫬不能歸衆賻之乃行胡全才字體舜文水人明季進士以職方主事贊畫李建泰軍至真定率所部百人為疑幟於固關闖賊不敢逼順治初遷陜西漢羌道平賀珍及川孽張定國擢僉都御史巡撫寧夏猶親剿漢羌山寨殺賊一萬四千餘人而去四年平寧夏賊十年巡撫鄖陽平鄖陽賊擢湖廣總督卒贈兵部尚書諡勤毅孫世藎字丹臺興人工文精騎射順治初以教諭遷知崇仁縣平大盜羅漢七撫按交章薦世藎以老力請歸子天繡好義鄉里稱之甄于廷興人兄懷廷與邑豪趙姓隙順治九年趙黨數百人猝至圍堡門曰第縛甄懷廷孫奕二人來即解去孫亦隙於趙者鄉人縛孫下趙攢刃刺之懷廷將下于廷力挽求代爭久之鄉人感泣乃下于廷趙熟視曰非也于廷慟言狀趙感動投刃而去傅山字青主陽曲人自幼讀十三經諸子史如宿通者明崇禎中袁繼咸督學山西為巡按御史張孫振誣劾被逮山槖饘左右伏闕上書白其冤馬世奇作義士傳比之裴瑜魏邵後為道士裝醫術入神有司以醫見則見不然不見也康熙十八年徴聘至京以老病辭授中書舍人歸山工分隸及金石篆刻畫入逸品子眉字夀毛亦工畫能作古賦馬電字耀如太原人補博士弟子屢周人急里人劉養病亟以所積數十金寄電後養妻他適訟於官電曰劉言遺其子今子未十歲若何縣令曰第與之即手金還之又出數十金曰此數年來子錢也令益義之康熙四十二年聖祖仁皇帝西巡幸其家電率四世子孫跪迎賜坐問電年曰九十解賜御衣書秀眉二字扁其門乾隆五十六年入祀鄉賢祠閻若璩字百詩太原人博極羣書考核精當多著作尤嗜吟詩康熙戊午舉博學宏辭嘉慶二十一年入祀鄉賢祠張雪鳳字建閣徐溝人八歲哭母淚盡血流事父及繼母色養父病同卧起二十餘年比卒苫塊饘粥被髮終三年蘇曰祥徐溝人未十歲喪母哭不絶聲事繼母如所生父病不解帶二百日父及繼母殁皆手自築墳廬墓三年邑人將聞諸官力辭張繼仲清源人生未浹歲而父商於外年十六父不歸誓往尋之道出關東遇虎默禱虎逡巡去明年果得父歸鄉稱孝子成元震字東權文水人康熙戊子武舉性端重由徐協守備厯任至甘肅提督在職以整練間撫營伍有恩威鎮兖州日給催漕兵役以資糧遂著為例在甘肅安飭蕃人奏改木廠水草地隨事設宜有益軍屯多類此居家孝友閭里稱之張旺字月宇興人少能挽弓十五石左右射吳耿搆逆以守備從援漳州復永定縣從征尚逆先登軍乘之城破調入閩剿山海擒渠寇授遊擊復龍虎山及長泰海澄數縣平金門厦門諸島授左都督厯江西南瑞南贛總兵江南福建提督剿湖廣紅苗先登如少年時卒贈太子少保李全陽曲人由行伍洊擢至雲南永順鎮總兵乾隆三十二年從剿緬甸大破賊於蠻結三十三年轉戰至蠻花賊蜂至全戰益力受鎗傷卒得旨瀀恤入祀昭忠祠並祀旌勇祠賜祭葬子萬年襲職騎都尉隨征金川斬獲甚多攻剿當噶爾拉碉卡負傷力戰克之纍遷至廣西右江鎮總兵馬全陽曲人乾隆二十五年一甲一名武進士由侍衛署總兵洊升甘肅提督三十八年赴金川軍營為領隊大臣六月木果木大營失利全殿後力戰竟夜死之賜祭葬諡壯節入祀昭忠祠圖形紫光閣賈士楚陽曲人八歲喪母每父出泣下沾襟父返輒知拭淚承順及父卒事祖母馮氏繼母李氏曲盡歡心數十年如一日閻廣居陽曲人乾隆四十六年以舉人厯任湖南麻陽芷江耒陽等縣知縣升乾州直隸廳同知所至著有循聲嘉慶十四年祀鄉賢祠周昌運榆次人早孤育於祖母及長事祖母甚孝貿易京師匆心動曰祖母得無疾乎遽歸果病劇與妻王氏籲天泣禱翼日旋愈後復病卧牀第者十餘年昌運與妻謹侍之未嘗少怠及卒廬墓三年張星煜榆次人母侯氏病截指血書佛經祈速愈母竟卒哀慟幾鬚髮畢白絶牛天卑太谷人乾隆七年武進士由侍衛授都司洊升四川川北鎮總兵從大兵討金川多戰功三十八年六月木果木大營失利天卑力戰陳亡賜祭葬諡毅節圖形紫光閣楊鈇太谷人母病冒雪跪冰籲天哀禱及母殁廬墓三年同縣冀秉良天性仁孝好善樂施俱乾隆年間旌張克容徐溝人孝義著聞同縣孝子李升鳯蘇菱俱乾隆年間旌牛名士嵐人素以孝聞乾隆間旌孫嘉淦字懿齋興人世藎孫少有至性父天繡以事繫獄嘉淦奔走呼籲尋得釋康熙癸已成進士授檢討聞母病乞假侍湯藥衣不解帶者五月及服闋升國子監司業遷祭酒纍遷刑部侍郎乾隆元年晉尚書總督直隸移制湖廣厯任吏部尚書協辦大學士卒諡文定嘉淦自諸生時潛心經學有志發明諸經皆有箋解乾隆二十年入祀鄉賢祠馬瑀陽曲人乾隆二十二年武進士由守備洊升總兵六十年赴湖北軍營協剿苗匪多著戰功嘉慶元年加提督銜六月奉命馳赴大寧九月由奉節縣黑樓門會勦邪匪至張家崖賊據險負隅瑀督兵擊之殺賊甚衆乘勢攻撲賊卡中傷墮崖卒事聞賜恤廕子劉芳太原人官把總篤行敦倫嘉慶二十五年入祀忠義祠郭鳳翥太谷人孝行著聞嘉慶八年旌王溶仁徐溝縣職員孝行著聞嘉慶二年旌孫孝愈興人嘉淦子孝友性生敦宗睦鄰以廕生授刑部員外郎厯福建糧驛汀漳龍道勘災發賑實惠及民捕巨寇治大獄精明勇決上下賢之升直隸按察使卒於官嘉慶十九年入祀鄉賢祠康基田興人乾隆進士由知縣洊升江南河道總督熟悉河務辦事不辭勞瘁嘉慶五年緣事革職八年復授江南布政使十六年以太僕少卿銜休致卒流寓漢孟敏楊氏人客居太原荷甑墮地不顧而去郭泰見而問之對曰甑已破矣視之何益泰異之因勸令遊學十年知名三公俱辟並不就三國魏楊俊獲嘉人避地并州本郡王象少孤時為人僕隸年十七八見使牧羊而私讀書因被箠楚俊嘉其才質即贖象著家聘娶立屋然後與别南北朝魏辛紹先狄道人世祖平涼州紹先內徙家於晉陽先是蓼泉之戰父淵以所乘馬援李歆而身死於難紹先三年口不甘味頭不櫛沐髮遂落盡常著垂裙皂帽盧景裕涿人從兄仲禮據鄉應西魏齊獻武王驛徵景裕繫晉陽獄後舍之使教諸子興和中補齊王開府屬卒於晉陽齊獻武王悼惜之李鉉南皮人武定中高祖令世宗簡碩學以教諸子徵詣晉陽時中山石曜北平陽絢北海王晞清河崔瞻廣平宋欽道及工書人韓毅同在東館師友諸王鉉於講授之暇覽説文蒼雅刪正六藝經注中謬字名曰字辨崔子約清河人武定中與兄子瞻俱謁晉陽寄居佛寺每憑几相對儀望俱華諸沙門竊窺之以為二天人也北齊楊愔華陰人正光中隨父津之并州性恬默好山水遂入晉陽西懸甕山讀書永安中津為并州刺史北道大行臺愔隨之任李德林安平人皇建初詔搜揚人物追赴晉陽撰思春賦一篇世稱典麗唐張後允崑山人嘗從父在并州以學行見稱時高祖鎮太原引居賓館太宗就受春秋左氏傳義師之舉後允首贊之段志元臨淄人從父客太原以剽果諸少年畏之甚為太宗所識義兵起募得千餘人授都督府軍頭李白興聖帝九世孫天寶中客并州有太原早秋詩晉祠尤為亟遊地嘗見郭子儀奇之子儀犯法白為救免崔從武城人與兄能偕隱太原山中力學會歲飢拾橡實以飯講誦不輟怡然終日不出山巖如是者十年劉巨敖彭城人為太原晉陽令樂其土俗遂著籍太原之陽曲曰我為此邑人可也何必彭城五代唐趙玉漁陽人嘗客滄州依節度判官吕兗劉守光破滄州收兗親族盡戮之兗子琦年十四玉負之以逃至太原變姓名丐衣食以給琦琦同光初為藩郡從事當時燕趙之士以玉能存吕氏之孤翕然稱之見宋史北漢世家宋李瓊幽州人杖䇿詣太原與周祖等十人約為兄弟周祖與瓊情好尤密嘗過瓊見其危坐讀書因問所讀何書瓊曰此閫外春秋也周祖令讀之謂瓊曰兄當教我自是周祖出入常袖以自隨遇暇輒讀每問難瓊謂瓊為師入宋仕至右驍衛上將軍金張中孚其先自安定徙居張義堡父遠宋封慶國公中孚以父任補承節郎侍父守太原金宗翰圍太原其父戰殁中孚泣涕請迹父尸乃獨率部曲十餘人入金軍中竟得其尸以還明范濟元進士洪武中以文學舉為廣信知府坐纍謫戍興州宣宗即位濟年八十餘矣詣闕言八事帝命廷臣議之尚書吕震以為不足采帝曰所言甚有學識多契朕心當察其素履以聞震備言之帝曰惜哉斯人令久淹行伍今猶足用震曰年老矣帝曰國家用人正須老成但不宜以任繁劇耳乃以濟為儒學訓導列女唐李景讓母鄭氏文水人早寡治家嚴肅身訓諸子始貧乏時治牆得積錢母曰士不勤而祿猶災其身况無妄而得我何取亟使閉坎景讓為浙西觀察使嘗怒牙將杖殺之軍且謀變母召景讓廷責之將鞭其背將吏再拜請不許皆泣謝乃罷一軍遂定五代周李筠母太原人史亡其氏筠拜義成軍節度每怒將殺人母屏後呼筠筠趨至母曰聞將殺人可免乎筠遽釋之宋王稟妻孟氏岢嵐軍人稟為太原總管靖康末金訥默亨陷太原稟死汾水中孟氏曰妻以夫為天夫死我何生為亦赴水死訥默亨舊作黏沒喝今改正王履謙妻齊氏太原人治家嚴肅克守婦道至正十八年賊陷太原齊與二婦蕭氏吕氏及二女避難於趙莊石巖賊且至度不能免俱投崖死元李宏益妻申氏冀寧人至正二十年賊陷冀寧申語宏益曰君當速去勿以我相纍若賊入室必以妾故害及君言訖投井死宏益既免難再娶安氏居二歲而宏益卒安亦自縊於柩側白氏太原人夫棄家為僧白年二十留養姑不去績絍以供租賦夫一日還迫使他適白斷髮誓不從夫不能奪乃去姑年九十卒竭力營葬畫姑像祀之終身武祺妻王氏太谷人祺為甘肅行省參政值寇入其家欲污之王氏罵不絶口賊以刀劈其首死武氏女名管嬰太原人年十七未嫁至正間避兵山洞父被執管嬰奔父所請以身代衆釋其父去又言井邊有瘞金衆掘得爭取之女即投井死後人名其井曰烈女井明姬公輔妻常氏太谷人正德中𬒳流賊執欲污之常罵賊不從遂遇害同邑趙守貴女年十六亦以拒賊被害孔俊妻武氏祁人正德間流賊入祁縛俊連射六矢因脅武使從武大罵遂被害時同邑段奎妻閻氏楊子秀妻田氏趙文茂妻高氏王原妻郝氏張才玘妻范氏溫廷美妻郭氏俱以被掠不從死李氏興人為李君璵之姑適吕某君璵父巨富而君璵蕩産幾盡父將死密出二千金付氏曰子改行付之不則與甥氏泣而受之密藏近村樹下君璵父死數年益落魄氏數賙而激之君璵愧悔甚氏乃發金付之告以故君璵感泣獻其半氏堅辭之君璵持歸自勵復至富氏死為成服郭憲妻王氏陽曲人嘉靖中俺答入寇被掠不從遂遇害憲繼娶牛氏憲亡牛散遺資於親族不食十四日而絶李文傑妻梁氏太原人嘉靖中遇寇掠不從斬其首血濺尺餘尸行數步而仆又李永剛妻薑氏同時被執亦以不從死仲顯妻李氏榆次人嘉靖中避寇王碧寨寇來破寨掠婦女百餘北行及李李大罵曰安敢犯我遂從寨後投崖死又郭思德妻安氏隨思德避寇思德被害縶安與二女行中道俱乘間赴井死張大紀妻徐氏岢嵐人嘉靖中俺答入寇闔家被驅北行大紀投巖死徐氏繼之妾武氏擲幼兒巖下紿賊下馬拉賊俱墜巖死又武勛妻王氏年十七未婚寇亂被獲罵賊遇害戴宛女祁人隆慶初隨母遇寇殺其母以刃劫女女罵不從亦死之王應璧妻郝氏祁人隆慶初被寇掠迫之乘隙投井死聶三妻曹氏交城人天啓初山賊嘯掠被執欲污之紿以他辭得間自經死武氏慶成王之妃崇禎末年闖賊渡河妃聞之蓬垢不事櫛沐宫媪問其故曰天之所壞人不能支待死而已賊至投井死陳見妻孔氏陽曲人孀居二十年闖賊陷城掠其家罵賊被害子婦朱氏孫性福併孫女俱投井死又同縣李桂芳妻朱氏投井死幼女侍婢皆從之郝堯宰妻柴氏陽曲人夫死守志闖賊逼城匿地窨中讐家引賊入柴恐被污以鐡器自擊其額流血仆地賊舍之不食三日死又同縣王紘妻陳氏城破亦不食死朱萬夀妻於氏陽曲人闖賊陷城偕羣婦走匿夾牆失後衆以為必獲於賊及賊退得尸井中兩脅俱有刀痕寸許裏衣繩縛數匝見者歎為真節婦又同縣李時春妻任氏罵賊觸石死秦謙妻康氏武瓚妻程氏俱自縊死程姪女亦投井死朱新甄妻張氏陽曲人新甄蒲城知縣李自成之變張氏被執紿賊取資財乃乘間投井死同縣靜海知縣崔嗣遠妻黃氏率其婦於氏并女孫女侍女同死一井又諸生聶輝妻李氏城陷投井水淺賊欲出之以頭濡水死又裴潤妻范氏侯三接妻高氏俱投井死趙氏太原人適陽曲羅某羅初娶婦時曽貸匪人金約與私之既娶匪人先匿寢室趙堅拒姑強之怒乃以他詞訴匪人於官稍繩以法己而逼如故趙遂斷髮垢面自刎死王一元妻李氏榆次人崇禎末闖賊陷城被執不屈受烙死其母馬氏亦罵賊投井死侯化龍妻李氏太谷人闖賊之亂與婦任氏姪婦王氏趙氏女五人及諸婢妾十三人俱投井死又同縣李芳妻貟氏張孔教母孔氏並罵賊死張翀妻侯氏太谷人流寇之變攜夫妾王氏夫妹張氏避兵母家賊逼之侯投井死母李氏弟妻任氏夫妾夫妹暨婢妾輩十有三口胥從之本朝順治中旌楊士隆妻孟氏祁人流賊逼其家脅以刃不屈夫與子俱被害罵賊死劉祚隆妻王氏清源人流賊逼城下偕婢投井死惠貞旺妻安氏交城人流寇亂夫被殺安年十九生女甫三月舅姑將避亂以攜少婦有難色欲使更適人安聞啼哭終日至夜卧女於牀潛出自縊康所里妻孫氏興人遇流賊逼污之不從罵賊求死賊不加刃挾之去至黃河岸投水死又同縣劉文妻樊氏被賊執投崖死本朝孟孫蕙妻楊氏陽曲人年十八夫亡無子欲殉姑慰止之尋以哀毁成疾其父延醫視之卒不受醫而死申燦妻溫氏祁人薑瓖之亂夫婦被執賊殺燦挾溫上馬溫怒罵之墮馬遇害閻士特妻馮氏徐溝人夫亡瀕死者再子甫五歲姑勸以立孤苦守十年餘子既長卒投井死同縣閻士宏妻劉氏年二十七夫亡殉節李星錦妻任氏年十九夫亡守節教子和梅以孝行舉李珮妻孫氏交城人與珮弟環妻曹氏聞賊至並投井中賊出之復奮躍而入閻環奇妻李氏交城人幼字環奇環奇出遊不返及笄不肯改適自縊死郭超宗妻文氏文水人賊至恐被辱投井死喬之珩妻康氏興人年二十一夫亡踰年一子又殤舅姑老而疾康孝養惟謹舅姑殁孑然苦節終身又同縣王氏不詳其夫姓氏少寡子廢疾守志不奪王授基妻康氏興人年十九夫亡遺腹子立閲十餘歲為締姻畢率立哭奠夫墓歸即自縊又孫雲妻白氏夫亡二十年為子娶婦遂攜奠夫墓曰子有室可延夫祀吾事畢矣一慟而絶劉士麒妻康氏興縣舉人康體元女少字士麒將婚而士麒癲久益甚或議解婚女誓死不移體元喜而歸之年十九侍疾四十年士麒死守節終身又劉光榮妻王氏事三姑俱盡孝夫弟光世生五日而姑卒王代撫之乳汁自生光世苦病七歲不釋懷李進選妻龎氏榆次人早寡惡少逼之龎忿恚指裂其膚自投井死康熙四十三年旌郭命宏妻李氏岢嵐人強暴逼污之不從被殺康熙五十三年旌程爾潔女祁人年十六未字守正捐軀雍正三年旌宋發富妻劉氏陽曲人守正捐軀同縣烈婦王玉環妻康氏傅榮