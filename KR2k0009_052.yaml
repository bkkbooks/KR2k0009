body:
  text: 寕武府在山西省治北少西三百四十里東西距一百五十里南北距二百七十七里東至朔平府朔州界二十五里西至太原府岢嵐州界一百二十五里南至代州崞縣界七里北至水泉營邊牆界二百七十里東南至崞縣界九十五里西南至忻州靜樂縣界一百四十里東北至朔平府平魯縣界二百里西北至保德州河曲縣界一百十五里自府治至京師九百五十里分野天文參井分野實沈之次建置沿革春秋樓煩地戰國屬趙漢雁門郡樓煩縣地後漢末廢後魏置神武太平二郡屬朔州北齊并神武郡入太平周廢隋爲馬邑樓煩雁門三郡地唐末置寕武軍通鑑唐乾符五年李克用進擊寕武注云寕武軍在嵐州東北百里後廢宋太平興國五年置寕化軍領寕化縣金大定二十二年升爲寕化州仍領寕化縣元初並廢入管州明景泰元年置寕武關屬代州崞縣本朝雍正三年改置寕武府隸山西省領縣四寕武縣附郭東西距一百五十里南北距二十四里東至朔平府朔州界二十五里西至太原府岢嵐州界一百二十五里南至代州崞縣界七里北至神池縣界十七里東南至崞縣界八十五里西南至崞縣界一百里東北至朔州界三十五里西北至五寨縣界九十里漢樓煩縣地後魏置太平郡領太平太清永寕三縣屬朔州周廢隋爲雁門郡崞縣樓煩郡靜樂縣地唐末置寕武軍後廢宋太平興國五年置寕化縣爲寕化軍治崇寕三年縣廢爲鎮金大定二十年復置縣爲寕化州治元廢明初置寕化所本朝雍正三年升爲縣爲寕武府治偏關縣在府西北一百八十里東西距一百二十里南北距一百四十里東至朔平府平魯縣界一百里西至保德州河曲縣界二十里南至五寨縣界六十里北至邊牆八十里東南至神池縣界六十里西南至河曲縣界二十里東北至邊牆一百里西北至邊牆一百里漢置美稷縣屬西河郡後漢末省五代北漢置偏頭砦宋屬火山軍遼置寕邊州鎮西軍屬西南招討司金正隆三年置寕邊縣為州治元州縣俱省改偏頭砦為偏頭關明初屬鎮西衞成化二年置偏關所本朝雍正十三年升為縣屬寕武府神池縣在府北三十里東西距一百十五里南北距一百五里東至寕武縣界二十五里西至五寨縣界九十里南至寕武縣界十五里北至偏關縣界九十里東南至寕武縣界五里西南至五寨縣界五十里東北至朔平府朔州界六十里西北至偏關縣界九十里漢置樓煩縣屬雁門郡後漢末廢後魏置神武郡屬朔州北齊併郡入太平後周改置神武縣隋因之屬馬邑郡唐省入善陽遼重熙九年復置并置武州屬西京道金省縣入州元屬大同路明廢入代州崞縣嘉靖十八年建神池堡本朝雍正三年升為縣屬寕武府五寨縣在府西一百里東西距五十里南北距一百里東至神池縣界三十里西至太原府岢嵐州界二十里南至寕武縣界三十里北至偏關縣界七十里東南至寕武縣界三十五里西南至岢嵐州界四十里東北至神池縣界五十里西北至保德州河曲縣界七十里漢汾陽縣地建安以後為新興郡地後魏為秀容神武二郡地隋唐以後為朔州地宋熙寕初置寕遠砦後為遼所取置寕遠縣屬朔州尋廢入神武縣金復置屬武州元省明為岢嵐州地嘉靖十六年建五寨堡屬鎮西衞本朝雍正三年升為縣屬寕武府形勢倚山傍河背高南下東倚臺山之勝西含汾水之源六盤踞其前黄花枕其後層巒合抱鳥道紆迴寕武關志風俗境臨邊塞耕鑿少而絃誦稀俗尚剛直儇巧不作亦有樸實遺風寕武關志城池寕武府城周七里有奇門四明成化初土築萬厯中甃甎本朝乾隆三十三年修寕武縣附郭偏關縣城周五里有奇門三明洪武中因舊土城改築宣德天順成化嘉靖中相繼展築萬厯中甃甎本朝乾隆三十二年增修神池縣城周五里有奇門三西門外有池明成化中土築嘉靖中展築萬厯中甃甎本朝初增修五寨縣城周四里門三明成化中土築嘉靖中展築萬厯中甃甎本朝雍正十年修學校寕武府學在府治西北本朝雍正九年建入學額數十五名寕武縣學在縣治東明寕武所學嘉靖中建本朝初增修入學額數八名偏關縣學在縣治東北明偏關所學宏治中建本朝順治康熙中屢修入學額數十五名神池縣學在縣治北本朝雍正九年建入學額數八名五寨縣學在縣治中街本朝雍正九年建入學額數八名鶴鳴書院在府治内本朝乾隆四年建清漣書院在五寨縣本朝乾隆十五年建蘆秀書院在五寨縣本朝嘉慶十一年建户口原額人丁一萬六千九百二十二今滋生男婦共二十三萬八千六百九十二名口計三萬二百一十九户田賦四地一萬六千六百六十九頃九十七畝八分有奇額徵地丁正雜銀八千二百九兩四錢一分八釐糧二萬二千五百八十九石七斗五升有奇山川鳳凰山在寕武縣南七里府志鳳凰山去郡城七里接六盤嶺跨代州崞縣界萬華山在寕武縣南六十里山下有水西南流入汾水黄嵬山在寕武縣南跨代州崞縣界蘆芽山在寕武縣西南一名蘆芽尖山見寰宇記新志在縣西南九十里周百餘里跨神池五寨靜樂岢嵐諸州縣界按通志蘆芽山一名大峪山引水經注中陵川水出中陵縣東南山下北俗謂之大峪山云云此山跨諸州縣皆非漢中陵縣地固不待辨又云一名太古牢山引遼史耶律頗的使宋求天池之地詔蕭迂魯統軍屯太古牢山以備之爲證亦非考遼史道宗獵於太古牢山問頗的邊事乃令使宋求之今考寕武宋寕化軍地也五寨偏關火山軍地也熙寕後割地入遼乃以寕武東北境爲邊塞蘆芽山在其南不下百里遼安能越境而獵乎竊疑太古牢山自當在遼西京道界内不應牽合此山也管涔山在寕武縣西南山海經北次二經之首在河之東其首枕汾名曰管涔山汾水出焉水經注闞駰曰汾水出武