晉隰緣邊巡檢使邊民聞之喜爭迎勞於道左云次子允正字修己累典邊任有功徙知永興軍卒李允則字垂範謙溥子少以材畧聞厯知滄雄等州鎮定高陽三路行營兵馬都監仁宗時領康州防禦使允則不事威儀間或步出遇民有可語者延坐與語以是洞知人情訟至立斷善撫士卒皆得其用在河北二十餘年功最多段德平定軍人五世同居真宗時旌表蠲其課調侯可盂人父道濟任丹徒令生女適程珦即程顥程頤之母也可博極羣書尤熟於西北形勢以討儂智高功拜武爵不就改文資厯殿中丞事蹟詳程顥所作墓志銘金楊雲翼字之美樂平人明昌五年進士第一特授應奉翰林文字累官禮部尚書正大中設益政院雲翼為選首每召見賜坐而不名卒諡文獻雲翼天性雅重自律甚嚴與人交死生禍福不少變國家之事知無不言議論忠讜務格君心文墨政事皆有足傳兼精天文醫方與趙秉文代掌文柄時號楊趙所著書甚多耿守直平定人由進士官總帥府教授金亡不仕隱居鄉里自號方山居士元杜安盂人少有謀畧從世祖累立戰玏授龍虎衞指揮使擢鎮逺大將軍南蠻叛遣安討之安撫以威信不戰而平王構字嗣能父无咎自武安徙樂平遂為樂平人舉孝廉為寕晉令縣適有盜聞構至即以贓歸主而去曰恐辱賢宰也累官同知衢州路總管府事構性至孝居喪廬墓六年白兔兩繞墓偙詔表其門閭吕思誠字仲實州人泰定初進士第為景州蓚縣令有善政天厯時擢翰林編修文宗在奎章閣命取國史閲之院長貳無敢言思誠在末僚獨跪閣下爭曰國史紀人君善惡自古天子無親閲之者遂寢官至大司農卒諡忠肅思誠氣宇凝定以剛廉勁直聞彈劾不法不為勢利屈三為祭酒一法許衡之舊諸生從化後多為名士聶珪字廷器平定人初授招撫司副使以破武仙功授都元帥自守令以下任賢使能各盡其長喜賓客好吟咏與元好問友善卒贈西陽郡公葛禋字從禮平定人居家孝友厯中外官以名德為世推重仕至工部尚書河南總管卒李朝英盂人至元中進士授汾州判官有政聲五世同居奉詔旌表其門明閻察平定八洪武中進士除禮科給事改監察御史遇事敢言上甚器之轉浙江布政司叅議有中官使折侵察察擊殺之太祖赦不問尋擢為左布政使王克己夀陽人母喪廬墓側兵亂號泣不去賊感其孝不忍害洪武初以文學孝行辟累官吏部尚書甄拔得人尤以清介著石撰平定人以學行稱洪武中寕王府長史及燕兵起撰在大寕輒為守禦計及城破被執憤詈不屈支解死耿九疇字禹範平定人永樂進士由給事中任兩淮鹽運同知痛革宿弊廉聲著聞尋入為刑部侍郎力辨疑獄巡視鳳陽招流移七萬户撫陜西極言邊衞增戍之非任至南京刑部尚書卒諡清惠郭浩盂人由貢士厯工部主事從英宗北狩被執不屈死贈員外郎又同縣韓能為隨駕將軍兵敗執金瓜殺賊甚衆力竭死之賈琮夀陽人永樂舉人授都督府經厯從英宗駐蹕土木戰死贈奉直大夫郗䕫平定人宏治進士為禮科給事中正德五年命覈延綏戰功劉瑾屬其私人䕫正色拒之明日復遣中使脅諸途䕫叱使者中使曰有駕帖械公䕫歎曰予天子耳目臣豈從賊謀遂自經死瑾誅追復原官李岱字宗岳樂平人成化進士官南京刑科給事中劾權倖數人置於法遷南京光祿少卿罷嶺外上供物凡病民事必絶之以忤劉瑾致仕閻璽夀陽人居官清廉遷河南兵備副使以忤劉瑾克官喬宇字希大樂平人祖毅工部左侍郎父鳳職方郎中皆以清節顯宇成化進士武宗時官南京兵部尚書宸濠反中官劉瑯通賊豫伏死士宇索得三百人皆斬之嚴爲警備宸濠遂不敢東上至南京詔百官戎服以朝宇不可卒如禮江彬矯㫖宣索每裁抑之彬爲稍戢論功加少保世宗初爲吏部尚書銓政一清宇遇事不可無不力爭而爭大禮尤切復爭召用席書張璁桂萼等忤㫖奪官卒穆宗初贈少保諡莊簡楊思忠字孝夫平定人嘉靖進士除清苑知縣治行最擢給事中彈劾無所避孝烈皇后大祥欲豫祧仁宗祔后太廟思忠與尚書徐階據禮力爭帝摘其疏中語杖之百斥爲民隆慶初起掌吏科終南京户部右侍郎孫繼先字引甫盂人萬厯中由進士厯御史疏請召吳中行趙用賢鄒元標諸人又言魏學曽宋纁等皆海内正人當用由是諸人咸得進後以劾兵部尚書張學顔謫臨清州判官葛凝秀平定人崇禎閒進士厯任户部郎中家居李自成敗歸過平定欲授以官凝秀大罵不屈而死朱一統平定人由舉人知蒲城縣崇禎十六年城陷赴井死本朝乾隆四十一年賜諡烈愍安邦輔平定諸生闖賊過州偕友陳一德抵賊營詆之俱投井死後並入祀忠義祠耿升平定人偕妻避兵盗執之使為嚮導升曰吾不忍禍延鄉里夫婦皆死州帥義而葬之趙之璽字如石樂平人父紱由進士官兵部尚書里居時遇流賊至不屈死之本朝乾隆四十一年賜諡節愍之璽為紱長子由拔貢中解元助父拒賊父死賊挾之入城索鏹無以應刃下如雨臂且斷之璽曰吾不怖死所以不偕衆逸者以父柩在耳汝能留一椽勿燼吾瞑矣賊太息曰何不蚤言使吾輩幾殺孝子遂捨去巡按上於朝有才嫓班馬行法閔曾之語後厯官叅政鼎革時死節燕京入本朝始歸葬焉乾隆四十一年賜諡節愍本朝武全文字藏夫本州人順治四年以進士知崇信縣度汭水疏渠溉田民甚賴之遷衡永郴守道亦有惠政張景星宇伯顯本州人明季拔貢生為保定府通判未任時子青雲於州南拾遺金四百兩景星曰必公帑也已而官吏來尋帑景星詣州報金在出付之趙曰爌樂平人為人孝謹饒才畧順治初以進士知博野縣邑多盜曰爌設科條洞中機宜期月盜靖獄空後官江南潁道賑饑有紀民獲甦王纘先字接武盂人性孝謹十歲從父遇賊賊執父纘先捫懷曰金在是釋吾父父逸去探懷中止二銅鎖賊怒欲殺之己而義之獲免嘗見盜其園果者引身避之故家女鬻為婢典衣贖還之年九十三卒于孫多登科甲人以為盛德之報云朱時亨本州人孝行著聞同州孝子耿丹俱乾隆年間旌趙德忭盂人孝德著聞同縣孝子舉人張拱鹿俱乾隆年間旌祁繼昌夀陽人孝行著聞乾隆年間旌張宗文本州人任湖南永州府同知以政績稱嘉慶二年入祀鄉賢祠劉鏸本州生員孝行著聞嘉慶六年旌又同州義夫孫𥙿嘉慶十八年旌石維崲盂人孝行著聞同縣孝子張作式張作儀賈景璋孫書田俱嘉慶年間旌流寓金王无咎武安人為昭義軍節度副使金亡不仕徙樂平以山水自娯列女唐張暌妻趙氏盂人會昌中暌戍邊十年趙繡迴文詩詣闕獻之睽得歸宋程珦妻侯氏盂人幼聰悟過人好讀史而不為詞章年十九歸河南程珦相敬如賓雖小事必稟命生二子顥頤纔數歲行而踣必責以徐步嘗食絮羮亦呵止雖使令輩不得以惡言加之其敎子如此元郝義妻張氏平定人年二十夫亡子彌月舅殁日灌畦蠶織以奉姑嘗畜一牝羊孳息不勝計人謂節孝所感至正中旌表王履謙妻齊氏平定人履謙為河東廉訪副使寇掠州境齊與二婦蕭氏吕氏及一女避趙莊石巖寇圍急俱投崖死後旌表耿承祖妻康氏平定人承祖為太常太祝山東盜起剽掠平定康攜幼子避盂陽石洞中盜迫之遂以幼子付婢投井死至正中旌表明黄鑑妻靳氏平定人嘉靖中北部入寇獲勒欲汚之不屈賊剖腹視胎以去時其同宗有嬪於荆氏者有通名張氏子者俱義不受辱同時遇害郝麒妻任氏盂人嘉靖中與麒弟麟妻侯氏俱被寇掠任至龍池投淵死侯至河村先擲幼兒崖下躍身從之人稱郝氏雙烈閻洪範妻季氏夀陽人嘉靖中北寇至被掠季肆罵不辱死之蔡芳妻尚氏平定人與姑避寇於王德寨寇攻寨急俱投崖死又王佇妻某氏為闖卒所逼掣刀殺賊即自刎死潘雲翼妾石氏盂人十餘歲鬻於潘潘導以學遂通書史後納為妾闖賊陷太原雲翼被拘拷掠家人悉逃石垢而服男子服乞食奉潘潘死石仰天哀慟亦死本朝潘一鳴妻劉氏本州人年二十夫卒遺娠生男撫之成立厯五十有餘年順治中旌甄大冶妻葛氏本州人夫亡守節撫子昭成進士康熙年間旌李綦隆妻常氏樂平人綦隆以生員從擊賊戰殁常親往購屍哭幾斃苦節四十餘年訓子有成張氏夀陽人適李某年未笄偶歸母家紡績牆下惡少逼汚被白刃不從母至乃解招其夫告以故送之門訣曰妾不辱君遂自縊同縣劉世輔妻李氏年十七于歸閲十月夫卒求殉姑防甚至半載後得間自縊張祿妻姚氏本州人守正捐軀同州烈婦王立經妻李氐夫失名池氏王氏節婦王憲武妻郝氏白成懿妻延氏李璧書妻張氏張灝妻劉氏景棉逺妻葛氏趙宜妻趙氏王良臣妻張氏杜秉仁妻潘氏王學士妻朱氏李正春妻張氏苗瑾妻劉氏楊錦妻劉氏張元新妻霍氏梁鈺妻朱氏劉立誠妻杜氏郭秀妻張氏史廷秀妻張氏王丕基妻楊氏賈綬妻王氏盧登祚妻劉氏石耐妻李氏朱光繼妻張氏黄玉亮妻丁氏劉大學妻曹氏黄振基妻竇氏李文標妻宋氏竇淇妻薛氏潘時夏妻張氏李福妻郭氏陳世璘妻張氏張成連妻杜氏荆如桂妻李氏姚成德妻石氏王克勤妻朱氏耿遜志妻尚氏竇克崇妻朱氏張志道妻趙氏楊升秀妻王氏霍盡美妻李氏李奇芳妻周氏趙鑮妻郝氏郭祺妻孟氏商廷輔妻郗氏魏元亨妻楊氏俱乾隆年間旌王端大妻竇氏樂平人守正被戕同縣烈婦胡秉旺妻黄氏趙夀昌妻李氏節婦毛宏化妻劉氏宋訓通妻李氏閆宏中妻劉氏張克謙妻李氏馬從龍妻毛氏李明初妻趙氏趙其勉妻宋氏趙明妻李氏翟雲翔妻劉氏喬會同妻趙氏俱乾隆年間旌榮旺妻田氏盂人守正捐軀同縣節婦王德顯妻石氏劉向智妻王氏龎紹貴妻趙氏栗春旺妻李氏鄭國燦妻趙氏張燿繼妻白氏張作相妻韓氏高璿妻張氏俱乾隆年間旌李文明妻王氏夀陽人夫亡守節同縣節婦張苗妻李氏趙如梅妻高氏王通妻胡氏傅龍妻王氏傅㺬妻陳氏榮志士妻劉氏王廷鳳妻李氏王述義妻王氏鈕遂性妻李氏王朝美妻郭氏張敷治妻韓氏陳宗衍妻丁氏郝見龍妻苗氏陳元佐妻王氏陳萬鍾妻武氏韓萬春妻孫氏尚應通妻聶氏俱乾隆年間旌李鳴玉妾王氏本州人守正捐軀同州烈婦韓某妻張氏苗昌霖妻郝氏和鋭妻趙氏節婦董喜興妻王氏潘美珠妻黄氏史秉忠妻周氏高步蟾繼妻郝氏李富書妻石氏石山屏妻商氐王蔚文妻張氏李綬繼妻任氏石丈貴妻高氏李鳴儀妻趙氏又樂平鄉節婦李安仁繼妻董氏李池繼妻張氏冀來復妻宋氏秦立藩妻宋氏陳鳳來妻李氏李承祚妻季氏俱嘉慶年間旌趙凡受妻周氏盂人守正捐軀同縣貞女史璘聘妻張氏節婦劉鐸妾孫氏聶青雲妻張氏張朝琮妻于氏張作藩妾任氏俱嘉慶年間旌王藴功妻郝氏夀陽人夫亡守節嘉慶二十五年旌仙釋唐李通元號長者開元中自滄州來盂縣日食十棗一柏葉小餅掩室著論無虚時後至冠葢村逢一虎馴伏又至神福山得一龕居之拔去一松化為一潭僭暘之歲祈求必應每製作心窮元奥至夕輒出白光以代燈燭著論既畢化於龕中年九十有六元普惠州人號洞雲住夀聖寺能詩有戒行與中書左丞吕思誠為方外友吕嘗作洞雲歌贈之及吕北上惠貽詩曰君王若問榆關郡地瘦民貧山水多後徙獅子山石巖下年九十八化明讓大師號納空相傳陜右人筮仕長史後棄官雲遊得佛法於五臺山達觀禪師遂棲獅子窟與憨山海印妙峯輩五十三人為淨友達觀示寂乃卓錫方山之昭化院戒行精嚴嘗貯粟於掌鳥雀馴集掌上就食後無疾跏趺而逝土産鐵本州出有冶礬石本州出有窯瓷器本州出有窯梨盂縣出煤炭夀陽出纂修官臣馮芝恭纂總纂官臣顧蒓許應