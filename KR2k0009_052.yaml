餘騎帝大喜立擢都督僉事霍什舊作火篩今改正崔世榮寕夏人為大同叅將嘉靖四十五年敵入威遠衞世榮以兵二百禦之與子大朝大賓俱死樊皮嶺申其學山東人萬厯中知朔州深悉民隱治理得宜當時稱循良第一元之偉崇禎中為朔州兵備道闖賊入寇殉節璩宏基漢中人崇禎中大同西路通判闖賊陷城死之本朝宋子玉奉天人順治間大同兵備道駐朔州姜瓖之亂密與通判楊逵知州王家珍謀靖内患既而變猝起謀不克遂手刃愛子以死家珍亦奉天人殉節死吏目王京順德人亦死難徐一范蕪湖人左衞兵備道聞姜瓖變私念從子明弼知馬邑縣可密藉起兵馳車至城下而賊已圍城一范遂為所殺楊逵太康人朔州通判姜瓖之亂逵諭衆城守而守備張英通賊逵密計擒之錮於獄翼日登陴有康某者英黨也怒目視逵逵立奪其刀英子復鼓譟賊黨乘之入城遂被執誘之降怒罵不絶口賊桀殺之奏入後贈山西按察司僉事李向堯鐵嶺人順治間助馬路叅將姜瓖之亂殉節死贈左都督僉事祀忠烈祠佟國仕奉天人順治間井坪路㕘將姜瓖之亂巷戰死贈副總兵祀忠烈祠人物漢王霸馬邑人字元伯避王莽亂棄官後從光武起兵屢著戰功明帝五年追論中興功臣以霸為第二十三人圖形雲臺三國魏張遼字文遠馬邑人本聶壹之後以避怨變姓少為郡吏後歸曹氏拜中郎將賜爵關内侯封盪寇將軍數有戰功及屯合肥孫權率衆十萬圍之遼先登陷陣斬二將衝壘入至權麾下權退追撃幾獲權拜征東將軍文帝立封晉陽侯南北朝齊斛律金字阿六敦朔州勅勒部人性敦直善騎射行兵用匈奴法望塵知馬步多少嗅地知軍度遠近以戰功累官大司馬封石城郡公文宣帝立封咸陽郡王進位左丞相金子孫皆封侯貴達一門一皇后二太子妃三公主金嘗曰我家直以立勲抱忠致富貴豈藉女也辭不獲免嘗以為憂斛律光字明月金子工騎射厯位太子太保河清三年周尉遲迥等攻洛陽戰於芒山大敗之遷太尉天統中襲爵咸陽三屢敗周兵拜左丞相光居家嚴肅見子弟若君臣性節儉杜絶饋餉不肯預政事每會議常獨後言言輒合理行兵嘗為士卒先自結髮從戎未嘗失律深為鄰敵懾憚後被祖珽等譖死弟羨字豐樂為都督幽州刺史善備邊禦敵封高城縣侯羨厯事數帝以謹直稱憂合門貴盛上書推讓解職詔不許進爵荆山郡王與光同死唐尉遲敬德名恭以字行善陽人為劉武周偏將秦王遣使諭之降引為統軍從擊王世充世充將單雄信直趣王敬德横刺雄信墜翼王出還戰大敗之討劉黑闥王被圍又出之破竇建德及徐圓朗以功授王府䕶軍隱太子招之贈金皿一車辭曰若私許則懷二心徇利棄忠將焉用之後與長孫無忌決策定隱巢之亂論功為第一除右武侯大將軍封呉國公改封鄂國卒贈司徒并州都督諡忠武五代唐周德威字鎮遠馬邑人勇而多智能望塵知敵數事晉王為鐵林軍使累以戰功遷振武節度使同中書門下平章事天祐中大敗梁將王景仁於鄗邑破劉守光於幽州拜盧龍節度使德威雖身為大將常與士卒馳騁矢石間又務持重以挫人之鋒常伺敵之隙以取勝胡柳陂之戰莊宗不從其謀遂殁於陣明宗時贈太尉宋黨進馬邑人少淳謹開寶中從征太原有功厯官至忠武節度使進形貌魁岸居常恂恂每擐甲胄毛髪皆豎卒贈侍中金李完字全道馬邑人登詞賦進士第由澄城主簿補尚書省令史世宗選能吏八人按行天下完其一也累遷南京按察使卒完長於吏治所至姦惡屏迹民皆便之楊沃衍一名噶理朔州人貞祐初由武州刺史升岢嵐節度使自奉詔即以身許國累有戰功正大二年厯拜陜西元帥左監軍三峯山之敗沃衍走鈞州其部曲白留奴呆劉勝既降元請招沃衍大帥令勝入鈞誘沃衍大官沃衍拔劍斫之望汴京拜且哭即自縊從死者十餘人噶理舊作幹烈今改正元崔斌字仲文馬邑人工文學達政術中統元年授西京叅議宣慰司事世祖嘗召斌問為政大體今當何先斌以任相對帝曰汝為我舉可為相者斌以安同史天澤對帝黙然良久斌乞采輿言因颺言問羣臣衆皆呼萬歲帝悦遂以二人並為相除斌左右司郎中每論事帝前羣臣終日不決者斌以數言決之出莅外任咸著威惠下襄陽取潭州皆有力焉尋被召入覲㑹阿哈瑪擅權日甚斌極言其姦蠧帝遣使按問之海内稱快阿哈瑪因誣搆以罪竟爲所害至大初贈太傅追封鄭國公諡忠毅阿哈瑪舊作阿合馬今改正李膺完孫少孤事母以孝聞太宗時詔郡國設科選試膺弱冠與選遂以薦爲翰林修撰終集賢學士諡文穆明孫祥大同右衞人正統進士由兵科給事中擢右副都御史以才幹忠讜稱後守備紫荆關額森入寇督戰被殺額森舊作也先今改正呉順朔州衞卒父病閉結藥不能通泣而䑛之又病痩嘗其糞苦喜曰可無患矣果愈父思雞羮遽索不得忽雞飛墮其家遂取以供父卒順年七十矣猶哀毁廬墓三載正統中被旌年百餘歲而殁鄭本公朔州人正德進士厯御史請武宗慎選親賢正位東宫不報世宗初欲加興獻帝皇號力言不可論救給事中劉最忤㫖切責時享太廟帝不親行極言遣代非宜報聞尋帝欲考興獻帝且立廟禁中偕同官屢争之不得遂伏闕哭陳繫獄廷杖後終南京太僕少卿劉漢平魯衞人嘉靖中以署都督僉事充大同總兵官三十九年北兵聚喜峯口將攻薊鎮漢乘其虚自鎮河堡出塞搗其帳於灰河尋又大破之於豐州時邊師積弱北兵易之駐近塞出没無所忌漢始再挫之諸鎮亦往往乘閒出搗始稍移其帳帝悦進漢都督同知麻貴大同右衞人父祿宣府副總兵兄錦宣府總兵皆善戰立功塞外貴由舍人積功至寕夏副總兵萬厯中以平布巴功遷延綏總兵累敗套賊病歸復起備倭總兵征日本事乎進右都督旋鎮遼東屢振軍聲綽