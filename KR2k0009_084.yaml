其人乎文曰霸陵杜稚季寶曰其次文曰豺狼當道不宜復問狐狸稚季聞之遂不敢犯法寶為京兆尹三歲京師稱之原涉茂陵人舉能治劇為谷口令谷口聞其名不言而治鄭衆開封人永平中遷左馮翊政有名迹郅夀西平人肅宗擢為京兆尹郡多強豪姦暴不禁聞夀為冀州刺史時無所容貸皆懷震竦各相檢敕莫敢干犯夀雖威嚴而能推誠下吏皆願效死莫有欺者王堂郪人安帝末遷右扶風帝西巡阿母王聖中常侍江京等並請屬於堂堂不為用掾史固諌之堂曰吾蒙國恩豈可為權寵阿意即日遣家屬歸閉閣上病果有誣奏堂者會京等悉誅堂以守正見稱史敞考城人順帝時為京兆尹有能名尤善條教見稱三輔梁並烏氏人永嘉初為左馮翊時諸羌叛並以恩信招誘之於是離湳狐奴等五萬餘戶詣並降隴右復平陳龜泫氏人桓帝時拜京兆尹時三輔強豪之族多侵枉小民龜到厲威嚴悉平理其怨屈者郡內大悅延篤犫人桓帝時遷左馮翊又徙京兆尹其政用寬仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰先有趙張三王後有邊延二君段熲姑臧人桓帝時為陽陵令所在能政滕延北海人靈帝時為京兆尹有理名劉陶潁陰人靈帝時為京兆尹到職當出修宫錢直千萬陶既清貧而恥以錢買職稱疾不聽政帝宿重陶才原其罪賈琮聊城人靈帝時為京兆尹有政理迹楊彪華陰人光和中為京兆尹黃門令王甫使門生於郡界辜榷官財物七千餘萬彪發其姦言之司隸司隸校尉陽球因此奏誅甫天下莫不愜心蓋勳敦煌人中平中為京兆尹時長安令楊黨父為中常侍恃勢貪放勳案得其贓千餘萬貴戚咸為之請勳不聽具以事聞并連黨父有詔窮案成震京師三國魏鄭渾開封人遷左馮翊時梁興等略吏民五千餘家為寇鈔渾聚吏民治城郭為守禦之備發民逐賊獲十以七賞百姓大悅皆願捕賊遂斬興及其支黨後為京兆尹渾以百姓新集為制移居之法使兼復者與單輕者相伍溫信者與孤老者為比勤稼穡明禁令由是民安於農而盜賊止息顔斐濟北人黃初中為京兆太守令屬縣整阡陌樹桑果是時民多無車牛斐又課民於間月取車材作車令畜豬貴時賣以買牛又起文學聽吏民欲讀書者復其小搖於是風化大行豐富常為雍州十郡最倉慈淮南人黃初末為長安令清約有方吏民畏而愛之晉劉霄太康中為京兆太守武帝以其有政績賜榖千斛張輔西鄂人初輔藍田令不為豪強所屈時強弩將軍龎宗西州大姓護軍趙浚宗婦族也故僮僕放縱為百姓所患輔繩之殺其二奴又奪宗田二百頃餘以給貧户一縣稱之杜軫成都人除池陽令為雍州十一郡最百姓生為立祠得罪者無怨言南北朝魏元範明元帝子太武以長安形勝之地遷範為長安鎮都大將範謙恭惠下推心撫納百姓稱之時秦土新罹寇賊流亡者相繼請崇易簡之治帝納之元子推景穆帝子為長安鎮都大將性沈雅善於綏接秦雍之人服其威惠陸真代人文成時為長安鎮將雍州民夷莫不震服在鎮數年甚著威稱原思禮樂都人文成末為雍州刺史清儉有惠政善撫恤劫盜止息李惠安喜人為雍州刺史長於伺察吏人莫敢欺犯元雲文成帝弟孝文時遷長安鎮都大將廉謹自修留心庶獄挫抑豪強劫盜止息江文遙考城人永平初為咸陽太守勤於禮接終日坐廳事至者假之以恩顔屏人密問於是民所疾苦大盜姓名姦猾吏長無不知悉郡中震肅治為雍州諸郡之最崔亮東武城人宣武時為雍州刺史城北渭水淺不通船亮謂魏晉之日有橋決欲營之唯慮長柱不可得會天大雨山水暴至浮出長木數百根橋遂成立百姓利之名崔公橋亮性公清敏於決斷三輔服其德政雷紹武川鎮人孝武時為京兆太守清平理物甚得人和唐永平夀人正光中為北地太守賊將宿勤明達等寇郡境永擊破之善馭下士人競為之用臨陳常著帛裙襦把角如意以指麾處分辭色自若在北地四年與賊數十戰未嘗敗北時人語曰莫陸梁恐爾逢唐將永所營處至今猶稱唐公壘楊儉華陰人孝武初除北雍州刺史政尚寬惠夷夏安之韓褒潁陽人大統中為北雍州刺史州帶北山多盜賊褒密訪並豪右所為乃悉召桀黠少年素為鄉里患者署為主帥分其地界盜發不獲以故縱論於是諸被署者莫不惶懼所有徒侣皆列其姓名褒取盜名簿藏之因大榜州門曰自知行盜者可急來首即除其罪旬月之間諸盜咸悉首盡褒並許以自新由是羣盜屏息周蕭圓肅梁武帝孫保定五年拜咸陽郡太守寬猛相濟甚有政績衛文升洛陽人武帝時領京兆尹稱為強濟樂運淯陽人建德二年除萬年縣丞抑挫豪右號稱強直武帝嘉之事有不便於時者令巨細奏聞後超拜京兆郡丞隋梁毗烏氏人開皇初為大興令遷雍州贊治直道而行無所回避長孫熾洛陽人開皇初加諫議大夫攝長安令與大興令梁毗俱為稱職毗以嚴正聞熾以寬平顯為政不同部內各化尋遷雍州贊治房恭懿洛陽人開皇初授新豐令政為三輔最帝聞而嘉之所得賜物皆分給窮乏時雍州諸縣令每朔望朝謁帝必呼恭懿至榻前訪以理人之術敬肅蒲坂人開皇初為安陵令有能名劉行本沛人文帝時為大興令權貴憚其方直請託路絶法令清簡吏民懷之高構北海人開皇中為雍州司馬以明斷見稱坐事左轉盩厔今甚有治名復拜雍州司馬屈突蓋徒河人文帝時為長安令以方嚴顯時為語曰任食三斗艾不見屈突蓋劉子翊彭城人仁夀中為新豐令有能名高世衡渤海人大業中為櫟陽令風教大洽獄無繫囚唐張行成義豐人高祖時調富平主簿有能名盧承慶涿人太宗時厯雍州别駕弟承業繼為雍州長史有能名劉仁軌尉氏人太宗以其剛正擢咸陽丞貞觀十四年校獵同州時秋斂未訖仁軌進諫璽書褒納劉延祐彭城人補渭南尉有吏能治第一李晦河間王孝恭子以右金吾將軍檢校雍州長史摧擲姦伏無留隱吏下畏之高宗將幸洛詔晦居守謂曰關中事一以屬公法令外苟可以利人者行之無須以聞故晦治有異迹郎餘慶新樂人高宗時為萬年令道無拾遺李嗣真柏人人調露中為始平令風化大行李嶠贊皇人高宗時遷長安尉時畿尉名文章者駱賔王劉光業嶠最少與等夷薛訥龍門人武后時遷藍田令富人倪氏訟息錢於肅政臺中丞來俊臣受賕發義倉粟數千斛償之訥曰義倉本備水旱安可絶衆人之仰私一家報上不與馮元淑安陽人武后時厯始平令右善去惡人稱神明與奴僕日一食馬食一秣不挈妻子俸餘以給貧窮或譏其近名元淑曰吾性也不為苦李令質中宗時為萬年令有富商抵罪令質按之韋擢馳救今質不從毀於帝帝詔令質至令質奏曰擢於賊非親非故但以貨求耳臣豈不懼權勢但申陛下法死不恨帝乃釋之宋璟南和人京兆人權梁山謀逆敕河南尹王怡往按久未決乃命璟為京兆留守覆其獄初梁山詭稱婚集多假貸欲併坐貸人璟曰婚禮借索大同而狂謀率然非所防億平縱數百人裴耀卿稷山人睿宗時為長安令舊有配户和市法百姓苦之耀卿一切令出儲蓄之家豫給其直遂純僦欺之弊開元中遷京兆尹秋雨害稼帝將幸東都召問所以救人者耀卿請遣重臣分道賑給自東都益廣漕運以實關輔於是置河陰集津三門倉引天下租由盟津泝河而西三年積七百萬石強循鳳州人仕纍雍州司士參軍華原無泉人畜多暍死循教人導渠水以浸田一方利之薑晦上邽人睿宗時為高陵令治有聲遷長安令人畏愛之韋濟陽武人開元初擢醴泉令修飭政事有治稱遷馮翊太守源乾曜臨漳人開元中帝東幸乾曜以京兆尹留守京師治尚寬簡人安之居三年政如始至仗內白鷹因縱失之詔京兆督捕獲於野絓榛死吏懼得罪乾曜曰上仁明不以畜玩置罪苟其獲戾尹専之遂入自劾失旨帝不問衆服其知體而善引咎盧奕靈昌人天寶初為鄠令所治稱最李峴吳王恪孫天寶時纍遷京兆尹明皇歲幸溫湯甸內巧供億以媚上峴獨無所獻帝異之楊國忠使客擲安祿山隱事諷京兆捕其第得安岱李方來等與祿山反狀縊殺之祿山上書自言帝懼變出峴為零陵太守峴為政得人心時京師米貴百姓乃相與謡曰欲粟賤追李㞾劉晏南華人肅宗時為京兆尹總大體不苛號稱職蔣沇膠水人乾元中厯陸渾盩厔咸陽高陵四縣令美政流行郭子儀軍出其縣敕麾下曰蔣沇賢令供億得蔬飯足矣毋撓其清也魏少遊巨鹿人少遊四為京兆雖無赫赫名然善任人緣飾規檢有足稱者梁鎮廣德𥘉為昭應令術士李國楨請度昭應南山作天華上宫露臺大地婆父祠並三皇道君等名為堂皇給百户掃除詔從之乃除地課工方歲飢人不堪命鎮上書切諫以為有七不可臣謹以便宜悉停帝從之李勉鄭惠王元懿曽孫代宗時為京兆尹魚朝恩領國子監前尹黎幹諂事之須其入敕吏治數百人具以餉至是吏請勉不從曰吾候太學彼當見享軍容幸過府則修具朝恩銜之亦不復至太學羅珦會稽人代宗時遷京兆尹請減平糴半以常賦充之人賴其利薛珏寶鼎人代宗時為昭應令人請勒石紀德珏固讓崔縱安平人代宗時授藍田令德化大行柳子華華原人代宗時為昭應令宰相元載有别墅以奴主務自稱郎將怙勢縱暴租賦未嘗入官子華收付獄劾發宿置杖殺之一邑震服嚴郢華陰人大厯末為京兆尹嚴明持法疾惡撫窮盜賊一衰減吏官匠丁數百人號稱職陸贄嘉興人以書判拔萃補渭南尉德宗立遣黜陟使庾何等十一人行天下贄説使者請以五術省風俗八計聽吏治三科登俊乂四賦經財實六德保罷瘵五要簡官事時皆韙其言裴佶耀卿孫授藍田尉德宗詔發畿縣民城奉天嚴郢為京兆政刻急本曹尉韋重規妻乳且疾不敢免佶請代役當時稱其義裴向聞喜人德宗時纍為櫟陽渭南令奏課皆第一顧少連吳人德宗時為京兆尹政尚寬簡不為灼灼名先是京畿租賦薄厚不能一少連以法圴之吳湊濮陽人貞元中為京兆尹京師苦宫市強估取物有司阿從無敢爭湊見便殿因言中人所市不便民宜令平價和售以息衆歡又言掌間彍騎飛龍內園芙蓉園禁兵諸司雜供役手資課太繁宜有蠲省帝輒順可初府中易湊貴戚子不便簿領每有疑獄時其將出則遮湊取決幸倉卒得容欺湊叩鞍一視凡指摘盡中其弊衆畏服僚吏非大過不榜貴召至廷詰服原去其下傳相訓朂舉無稽事馮伉元城人德宗時授醴泉令縣多嚚猾數犯法伉為著諭蒙書十四篇鄉鄉授之使轉相教督李程襄邑恭王神符五世孫德宗時調藍田尉縣有滯獄十餘年程單言輒判京兆狀最遷監察御史王播揚州人貞元中補盩厔尉善治獄厯三原令邑中豪強犯法未嘗輒貸歲終課最憲宗時為京兆尹時禁屯列幾內者出入屬鞬佩劍姦人冒之以剽劫又勳戚家馳獵近郊播請一切呵止盜賊不能容隱皆走出境李鄘江都人憲宗時為京兆尹進尚書右丞元和初京師多盜賊復拜京兆鄘強直無私所至稱治楊於陵華隂人憲宗時為京兆尹先是編民多竄北軍籍中倚以橫閭里於陵請限丁制減三丁者不得著籍姦人無所隱賴京兆豪右大震柳公綽華原人授渭南尉嵗歉饉其家雖給而每飯不過一器嵗豐乃復或問之答曰四方病飢獨能飽乎元和中拜京兆尹方赴府有神䇿校乘馬不避者即時榜死帝怒其專殺公綽曰此非獨試臣乃輕陛下法帝乃解以憂去長慶元年復為京兆尹時幽鎮用兵補置諸將使驛係道驛馬盡乃掠奪民馬怨嗟驚擾公綽請著定限以息其弊有詔中書條檢定數由是吏得紓罪王正雅晉陽人穆宗時京邑多盜正雅為萬年令威震豪強京兆尹柳公綽言其能就賜緋魚韓愈南陽人長慶初為京兆尹兼御史大夫六軍相戒不敢犯劉仁師彭城人長慶中為高陵令初涇水東行注渠居上遊者壅泉而專其腴仁師請更水道使無棄流無越制新渠成民名渠曰劉公堰曰彭城仍歲旱沴而渠下田獨有秋邑人享其長利韓遼太和初為咸陽令疏秦漢時故漕興成堰自咸陽抵潼關三百里罷挽車之牛以供農耕關中賴其利孔戡孔子三十八世孫遷京兆尹歲旱文宗憂甚戡躬祠曲江池一夕大澍柳仲郢公綽子會昌中為京兆尹置權量於東西市使貿易用之禁私制者北司吏入粟違約仲郢殺而尸之自是人無敢犯政號嚴明禁軍校劉詡毆其母仲郢不待奏即捕取之死杖下後為河南尹以寬惠為政或言不類京兆時答曰輦轂之下先彈壓郡邑之治本惠養烏可類乎薛元賞會昌中拜京兆尹都市多俠少年以黛墨鑱膚夸詭力剽敓坊閭元賞到府三日收惡少杖死三十餘輩陳諸市餘黨懼爭以火滅其文元賞長吏事能推言時弊件白之禁屯怙勢擾府縣元賞數與爭不少縱由是軍暴折戢百姓賴安溫璋祁人懿宗時厯京兆尹璋素強幹鋤宿弊豪右懾服李知柔惠宣太子曽孫擢京兆尹始鄭白渠梗塞民不得嵗知柔調三輔治復舊道灌浸如約遂無旱虞民詣闕請立石知柔固讓得止林慎思莆田人為萬年令黃巢寇長安迫以偽祿不屈罵賊死宋陳省華閬中人太祖時為櫟陽令縣之鄭白渠為鄰邑強族所據省華盡去壅遏水利均及民皆賴之崔翰萬年人太祖時為感德軍節度使時盜賊充斥翰誘其渠魁誡以禍福羣盜感悟散歸南畝境內肅然劉湜彭城人知耀州富平有盜掠人子女者既就擒陽死伺問逸去捕得復陽死守者以報湜趣焚其尸裴莊閬中人太平興國中為高陵主簿本府召權司理椽轉運使雷德驤以威望自任嘗巡按至境官屬皆出迎候莊獨視事本局徐謁道周德􅋮稱其有守馬元方鄄城人淳化中知萬年縣諸將討李繼遷關輔轉餉踰瀚海多失亡獨元方所部全十九楊覃浙人田重進為永興節度選覃同判軍府事重進不法覃事多抗執表求徙任不許就轉都官員外郎楊齊賢冤句人至道中知永興軍時閣門祗候趙贊以言事得幸提點關中芻糧所為多豪橫齊賢論列其罪卒抵於法李迪濮人真宗時知永興軍城中多無賴子弟喜犯法迪奏取其甚者部送闕下張詠鄄城人咸平中知永興軍有父老訴牛舌為人所割詠詰之爾於鄰仵誰氏最隙曰有甲氏嘗貸粟於某家不遂構怨之深詠遽遣去戒云至家徑解其牛賣之父老如教翼日有百姓訴殺牛者詠謂之曰爾割某氏牛舌以償貸粟之怨而反致訟耶其人遂伏罪陳若拙盧龍人真宗時知永興軍府時鄰郡嵗飢前政拒其市糴若拙至則許貿易民賴以濟向敏中開封人景德初知永興軍真宗幸澶淵賜敏中密詔盡付西鄙許便宜從事敏中得詔藏之視政如常日會大儺有告禁卒欲倚儺為亂者敏中密使麾兵被甲伏廡下幕中明日盡召賓僚兵官置酒縱閲無一人豫知者命儺入先馳騁於中門外後召至階敏中振袂一揮伏出盡擒之果各懷短刃即席斬焉既屏其尸張樂宴飲坐客皆股栗邊藩遂安周起鄒平人真宗時知永興軍所至有風烈陳堯佐省華子仁宗時知永興軍初章獻太后遣宦官起浮圖京兆城中前守薑遵盡毀古碑碣充甎甓用堯佐奏唐賢臣墓石今十亡七八其未毁者願勒州縣完護之陳堯咨堯佐弟知永興軍長安地斥鹵無甘泉堯咨疏龍首渠注城中民利之張龜年知富平縣明通初詔增秋再任以其治行風告天下杜衍山陰人仁宗時知永興軍民有晝亡其妻者為設方略捕立得殺人賊發所瘞尸並得賊殺他婦人尸二寶元二年復知永興軍時方用軍民苦調發衍區處計畫量道里遠近寬其期會民得次第輸官比他州費省過半范雍河南人仁宗時知永興軍完永興城或言非便詔止其役雍匿詔而趣成之明年賊至邠岐之間皆恐而永興獨安晏殊臨川人仁宗時知永興軍性剛簡奉養清儉吏民畏之趙師民臨淄人仁宗時知耀州勤於吏治政有惠愛後又奏蠲陜西旱租鄭戩吳縣人仁宗時知永興軍建言軍行所須願下有司相緩急析為三等非急罷去先是衙吏輸木京師浮渭泛河多漂沒至則斥不中程往往破家不能償戩奏嵗減二十餘萬又奏罷括糴以勸民積粟長安故都多豪惡戩治之麗人皆愓息李咨新喻人仁宗時知永興軍衣冠子弟恃廕無賴者悉杖之境內肅然文彥博介休人仁宗時知永興軍起居舍人母湜鄠人也建言廢鐵錢朝廷雖不從其鄉人多知之爭以鐵錢買物賣者不肯受長安為之閉肆寮屬請禁之彥博曰如此是愈使擾也乃召絲絹行人出其家縑數百匹使賣之日納其直悉以鐡錢於是衆知鐵錢不廢市肆復安英宗初復判軍事种世衡洛陽人仁宗時知涇陽縣里胥以姦利事敗法當徙遁去比郊赦輒出世衡曰送府則會赦杖其脊而請罪於府知府李咨奏釋之吳遵路丹陽人知永興軍𬒳病猶決事不輟及卒仁宗聞而悼之侯可華陰人韓琦薦知涇陽説渭源羌首輸地八千頃因城熟羊以撫之調華原主簿富人有不占田籍而質人田至萬畝歲責其租可馳至富家發櫝出劵歸其主郡吏趙至誠持守以下短長可暴其罪言於大府誅之王獵長垣人慶厯中范仲淹薦為藍田主簿府使之掌學諸生犯法者獵自責數以為教之不至屏出之府帥意其私捕生下獄獵前白曰此年少不率教耳致於理不足以益美化恐適貽士類辱帥悟即釋生而待獵加敬葉清臣長洲人仁宗時知永興軍浚三白渠灌田踰六千頃劉敞新喻人仁宗時知永興軍大姓范偉為姦利冒同姓户籍五十年持府縣長短數犯法敞窮治其事偉伏罪程皓河南人仁宗時調鄠縣主簿民有借兄宅居者發地得瘞錢兄之子訴曰父所藏皓問幾何年曰四十年彼借居幾時曰二十年矣遣吏取十千視之謂訴者曰今官所鑄錢不過五六年即遍天下此皆未藏前數十年所鑄何也其人不能答鮮于侁閬州人英宗時從何郯辟僉書永興軍判官萬年令不任職繫囚纍百府使往治數日空其獄曾公亮晉江人熙寧中判永興軍先是慶年叛既伏誅而餘黨越佚自陜以西皆警備閲義勇益邊兵移內地租賦人情騷然公亮一鎮以靜次第奏罷之専務裁抑冗費長安豪喜造飛語聲言營卒怨減削謀以上元夜結外兵為亂邦人大恐或勸母出遊公亮不為動張燈縱觀與賓佐竟夕乃歸司馬光夏縣人熙寧中知永興軍宣撫使下令分義勇成邊選諸將驍勇士募市井少年為竒兵調民造乾糒悉修城池樓櫓關輔騷然光極言公私困敝不可舉事京兆一路皆內郡繕治非急宣撫之令皆未敢從若乏軍興臣請任其責於是一路獨得免王舉元真定人神宗時知永興軍夏人以兵屯境上舉元以千騎拒之扼其要害長安遣從事來會兵涇原時大將竇舜卿鋭意請行舉元止之曰不過三日虜去矣至期夏人果退吳中復永興人神宗時知永興軍河北行青苗法使者至將先下州縣中復檄之曰斂散自有期今先事擾之何也拒不聽且以報安撫司韓琦方疏諌青苗録其語以上關內大旱民多流亡中復請加賑恤執政惡之遣使往視謂為不實削一階李周馮翊人神宗時調長安尉嵗飢官為粥以食餓者民坌集不可禁縣以屬周周設陛枑間老少男女無一亂者都巡檢趙瑜詰盜南山諸尉皆屬焉瑜悍急多行無禮獨於周不敢肆朱光庭偃師人擢第調萬年主簿數攝邑人以明鏡稱之畢仲遊雲中人哲宗時知耀州歲大旱仲遊先民之未飢揭諭境內日郡賑施與平糴若干萬石虛張其數富室知有備亦相勸發廩凡民就食者十七萬九千口無一人去其鄉劉絢常山人元祐初韓維薦其經明行修為京兆府教授鄭驤玉山人徽宗時擢京兆府等路提舉常平驤按格為常平總目十卷頒之所部時陜右大稔驤奏乞以所部本息乘時廣糴得米六十萬斛賈炎獲鹿人政和中知永興軍陜西行鐵錢久幣益輕蔡京設法盡斂之更鑄夾錫錢幣稍重京去相轉運使李譓陳敦復見所斂已多遂請罷鑄鐵錢復行其輕如初自關以西皆罷市民不聊生炎獨一切弛禁聽從其便徐處仁穀熟人徽宗時知永興軍童貫使陜西欲平物價處仁曰此令一傳則商賈不行而積藏者弗出名為平價適以增之轉運使阿貫意劾其格德音倡議論詔處仁赴闕單煦平原人為清平軍使有二盜殺人捕治不承煦縱之食甲食之既乙不下咽執而訊之果殺人者唐重彭山人高宗初知京兆府兼經略制置使六上疏以車駕幸關中為請并條奏關中防河事宜又乞選宗親充京兆牧或置元帥府令總管秦蜀十道兵馬以便宜從事俱不報金將羅索渡河陷韓城時京兆餘兵皆調赴行在重度勢不可支以書别其父克臣克臣報曰汝能以身殉國含笑入地矣及金兵圍城城中兵不滿千外援不至經制副使傅亮以精鋭數百奪門出降城陷重以親兵百人血戰中流矢死贈資政殿學士諡恭愍羅索舊作婁宿今改郭忠孝河南人為永興軍路提點刑獄金兵再至京師大軍盡出函谷忠孝獨以蒲解軍三千至猗氏遇金兵破之踰絳州破太平寨斬首數百級攻平陽入其郭及金兵圍永興兵寡或勸忠孝以監司出巡可以免禍忠孝不答與經略唐重分城而守敵攻陷城東南隅忠孝與重及副管楊宗閔轉運副使桑景詢判官曾謂經略主管機宜文字王尚提舉兵馬程迪俱死之贈大中大夫程迪開封人金兵迫近唐重以迪提舉永興路軍馬措置民兵金兵四面急攻迪率諸司及統制偏禆以下東鄉會盟誓不與敵俱生城破率其徒行徇於衆憤怒大呼口流血士皆感奮多所斬殺迪冒飛矢持短兵接戰數十合身被創幾遍絶而復蘇猶厲聲叱戰不巳遂死之麾下士舁至空室中比屋皆燼室獨不火及斂容色如生詔贈明州觀察使諡忠愍金宋九嘉夏津人宣宗時厯藍田高陵令咸以能稱李獻甫河中人正大中辟長安令京兆行臺所在供費甚繁獻甫處之常若有餘縣民賴之以安馬百祿三河人明昌初遷耀州刺史吏民畏愛提刑司狀聞授韓王傅師夔哀宗時為興平令時辟舉法行與咸寧令張天綱臨潼令武天禎三原令蕭邦傑藍田令張德宜皆清慎才敏極一時之選王浩哀宗時辟涇陽令亷白為關輔第一時西臺檄州縣增植棗果督責嚴急民甚被擾浩獨無所問主司將坐之浩曰是縣所植已滿其數若欲增植必盜他人所有取彼置此未見其利浩所在有善政於民絲毫無所犯秦人為立生祠元許衡河內人世祖出王秦中思所以化秦人召衡為京兆提學秦人新脫於兵欲學無師聞衡來人人莫不喜幸來學郡縣皆建學校民大化之馬亨南和人世祖征雲南留亨為京兆榷課所長官京兆藩邸分地也亨以寬簡治之不事掊克凡五年民安而課裕趙炳灤陽人至元九年授京兆路總管兼府尹皇子安西王開府於秦詔治宫室悉聽炳裁製王府吏卒橫暴擾民者即建白繩以法王命之曰後有犯者勿復啓請若自處之目是豪猾斂戢民賴以安張雄飛臨沂人至元中同知京兆總管府事宗室公主有家奴逃渭南民間為贅壻主適過臨潼識之捕其奴與妻及妻之父母皆械繫之盡沒其家資雄飛與主爭辨主不得已以奴妻及妻之父母家皆還之惟挾其奴而去趙世延雍古族人大德十年除安西路總管安西故京兆省臺所冶號稱會府前政壅滯者三千牘世延既至不三月剖決殆盡陜民飢省臺議請於朝賑之世延曰救荒如救火願先發廪以賑朝廷設不允世延當傾家財若身以償省臺從之所活者衆王琚鄒平人大德中為涇陽令疏涇渠起涇陽厯三原高陵櫟陽至大初遷西臺御史建言於豐利渠上更開石渠民賴其利朱春至正末為三原尹明兵克奉元春與其妻俱投崖死明魏必興濠梁人洪武初知耀州凡州治學舍與里甲徭賦驛傳諸務皆必興所創定李叔正靖安人洪武初為渭南丞同州蒲城人爭地界纍年不決行省以委叔正單騎至其處剖數語立決渭南歲輸糧二萬豪右與猾吏為姦田無定額叔正履畝丈量立法精明諸弊盡剔濮英廬州人洪武中為西安衛指揮太祖選陜西都司衛所卒備邊惟英所練稱徑旅茅大芳泰興人洪武中為秦府右長史輔導盡職許欣開封人洪武中知鄠縣蒞政勤撫民有恩意閻皓洪武中知長安縣時關中貧瘠皓慨然以安養生息為已任化洽境內帝嘉其績褒賚甚厚羅以禮桂陽人宣德中知西安府所至有惠愛王瑩鄞人正統中知西安府以政績著余子俊青神人天順中知西安府歲飢發廪十萬石賑貸區畫以償官不損而民濟成化初所司上治行當旌者知府凡十人子俊為首就擢參政李文祥麻城人宏治初以進士上封事謫授咸寧縣丞既至官上官有欲門見之者文祥却立曰庭參禮也此非其所其自守如此暢亨河津人宏治初由御史謫知涇陽縣未期年邑大治增開涇水渠民賴之嚴永濬華容人宏治中知西安府性剛正為治務去民瘼嘗構書院簡諸生肄業吕柟康海馬汝驥王九思諸人皆出其中劉麟上元人宏治中知西安府為政清簡時陳夀為巡撫何亮知咸寧與麟號為三廉何亮登州衛人宏治中知咸寧縣秦俗婚姻尚財亮諭以禮士貧弗能娶者與之娶民貧弗能葬者與之葬程啓充嘉定州人正德初知三原縣妖人李午以左道惑衆啓充逐其黨境內肅清王秀萊陽人正德中知長安縣至即延見父老問民疾苦禁吏役出入豪右不敢私謁先是賦稅多逋秀為著令無敢後者有檄增甘肅糧千石力請而止王科涉縣人嘉靖初知藍田縣城隘且無水科導西山水入城拓而廣之遂為望邑毁境內之淫祠以其材葺學宫及先賢祠宇馬珮德州人嘉靖中知咸寧縣省里甲清賦稅抑強扶弱考績為天下最李希雒太原人嘉靖中知渭南縣關中地震渭南尤甚希雒省刑罰蠲逋賦築城葺舍民不知疲曹璜益都人萬厯中知西安府商洛藍田間産葛民不知治璜為求漢中治葛者教之礦稅病民力為調劑民賴之尹伸宜賓人萬厯中知西安府公廉強直不事媕阿劉兑歙縣人萬厯中知富平縣廣開渠道為邑永利滿朝薦麻陽人萬厯中知咸寧縣有廉能聲稅監中官梁永縱其下劫諸生槖朝薦捕治之永遣人蠱巡按御史余懋衡事覺朝薦捕獲其人永率衆擐甲入縣庭吏卒早為備無所掠而去城中數夜驚言永反朝薦操之急永使使入都訟朝薦逮下詔獄久之始釋王正志祥符人萬厯中知富平縣中使梁永趙欽肆虐正志捕其黨李英杖殺之因極論二人不法帝怒逮正志繫詔獄四年瘐死袁化中武定人萬厯中知涇陽縣有善政劉璞莒州人萬厯中知鄠縣回賊倡亂盩厔白龍溝與鄠龎家村聲勢相應璞申嚴保伍選壯丁每月三日教習餘日歸農立社學教民子弟社倉原額五千六百石有奇璞經畫畢備史邦直樂陵人萬厯中為西安同知回賊亂衆議主戰邦直堅持不可身率兩騎馳諭之皆感泣降伏殲其渠魁餘黨悉散路振飛曲周人天啓中知涇陽縣大吏諂魏忠賢將建祠涇陽振飛執不從邑人張問達忤奄誣坐追贓十萬振飛緩其事奄敗事乃解流賊入境振飛力擊却之史可法大興人崇禎𥘉為西安推官賑荒恤民戢姦弭盜能聲大著陳其赤崇仁人崇禎中知西安府有吏能章尚絅會稽人崇禎末為秦府長史闖賊陷西安尚絅投印井中趨王府端禮門再拜自縊死贈按察副使時有秦藩衛旗官徐應魁從王嗣出走王嗣為賊所殺應魁絶粒死賊踞王府有吏邱從周大罵曰若一小民僭妄若此何能久耶賊怒殺之吳從義山陰人崇禎末知長安縣值兵荒後多方賑恤督師孫傳庭駐西安征求百出從義不憚強禦並令豪族均輸民力稍寬及城陷望闕再拜投井死贈按察僉事指揮崔爾達亦投井死楊暄高平人崇禎末知渭南縣嵗凶畢力拯救緝姦人斃杖下民稍獲安李自成抵渭南暄已擢兵部主事未行與學官蔡某同守城城陷暄𬒳縛索印不豫詬罵死蔡亦死之本朝惠應詔永平人順治𥘉以副將管西安城守事西安洊遭寇亂軍實皆虛應詔視事漸次完具流賊所掠子女流離道路收問鄉貫移郡縣使各歸故里賀珍餘黨復圍西安應詔悉力固守擊賊城下大敗之遂遁去李溥鄢陵人順治中知三原縣時流賊初平餘黨未殄溥繕城陴練鄉勇捍禦甚備九年春賊破縣西王堡據嵯峨山溥率兵搗其巢盡殲之邑賴以安邵伯蔭閩縣人順治中知高陵縣性精察姦蠧無所隱奉檄勘田悉蠲浮額嘗兼攝渭南藍田二縣皆有惠政鄭崑璧文水人順治中知富平縣疏漆沮諸水溉田多善政駱鍾麟臨安人順治中知盩厔縣時李中孚講學里中鍾麟尊以師禮人益知向學康熙元年夏大雨渭水南溢將及城鍾麟率僚屬跪雨中哀禱尋雨止水亦退茹珍山陰人康熙初吳三桂叛以幹略擢西安通判值官兵會於西安芻稿不給諸司憂慮珍與諸將期三日馳赴各州縣遍召富室諭以國恩當報宜先輸草束以佐軍約倍還其直皆踴躍應命於是芻茭山積初隴渭間久當賊衝堡民多受迫脅或疑其款賊欲屠之以珍言獲免審理逃人多所平反以疾歸黃家鼎穎上人康熙初知咸寧縣廉儉有惠政擢兵部主事士民請留復任以勞瘁卒于官陳瑹蘄水人康熙中知臨潼縣值軍興徵符四出瑹不事敲撲而事辦官兵駐西郊瑹布衣徒步手挈壺簞犒之民聞之芻茭器具無不立應擢耀州知州郭傳芳大同威遠衛人初授咸寧縣丞攝長安篆有聲遷富平知縣吳三桂叛涼冦竊發傳芳偵賊將入境乘昏霧搗其巢斬獲有功時軍需旁午傳芳轉輸有法民不告勞張發辰杞縣人康熙中知臨潼縣聽斷明決禁革苛斂時軍興往來挽運年未老而鬚髮頓白遷去後念民有舊欠濱河地稅為捐貸以清之林世榕海陽人康熙中知藍田縣時民多失業世榕招集流亡散給牛種由是農務大興田野多闢讞獄多所全宥去官日槖中惟圖書而已俞漣蕭山人知三原縣歲祲煮粥給貧全活甚衆招徠流民數千户巡行勸墾不辭勞瘁卒於官陳明經綏陽人康熙中知咸寧縣歲飢賑濟有方民無失所大蝗齋戒至田所祭之蝗遂去秦中久經兵燹郡邑册籍無徴明經履畝勘實一清諸弊周宣暘鄖西人康熙中知臨潼縣大盜王金山嘯聚驪山又渭北布袋賊出沒櫟陽勢甚熾宣暘以計擒誅之民賴以安蔣陳錫常熟人康熙中知富平縣甫至值關輔大飢流移載道陳錫立出資煮粥以食飢者全活無算復收瘞道殣以縣境水利久廢躬行阡陌疏故玉帶直城文昌諸渠咸獲灌溉之利趙于京厯城人康熙中知臨潼縣親履隴畝勸課農桑催科不役吏胥惟用滚單訟庭清簡獄無罪囚力行保甲之法修臨潼縣志去任日士民涕泣追送數十里外有趙青天之稱乾隆十二年入祀名宦祠左觀瀾永新人乾隆中知安定縣嘉慶三年署寧陜通判教匪竄入時無城隍可守有説以避賊者觀瀾不可晝夜修輯輒以短木補其隙缺已而賊大至用大炮擊之炮裂被擊死而賊亦他竄子承廕亦隨營堵禦五年遇賊於夾嶺死之事聞賜世襲雲騎尉同時有知醴泉縣陸維基縣丞葉槐均隨營遇賊死署寧陜鎮總兵甘肅韓自昌禦賊于洋縣之月亮坪陳亡左營守備河曲秦繼昌亦死之楊之震平利人由行伍任江口營參將嘉慶十一年署寧陜鎮總兵新兵陳先倫等叛與關口營逰擊寧夏羅全亮同遇害事聞賜恤前總纂官臣丁善慶恭纂輯提調官臣許應藻恭覆輯校對官臣顔以燠恭校大清一統志西安府五人物秦王翦頻陽東鄉人少好兵事秦始皇將兵夷六國為宿將始皇師之漢魏尚槐里人孝文時為雲中守軍市租盡以給士卒出私養錢五日一殺牛以饗賓客舍人軍吏胸奴遠避不近雲中塞車千秋本姓田氏其先齊諸田徙長陵為高寢郎會衛太子為江充所譖敗千秋訟太子冤帝感悟拜為大鴻臚數月遂為丞相封富民侯千秋謹厚有重德昭帝時以年老朝見得乘小車入宫殿中因號曰車丞相按西安為漢唐建都之地士大夫之宦居長安者似不必概行收入人物傳內如社延年已載河南南陽府人物韋元成已載山東兖州府人物鄭崇已載萊州府人物顏師古顔真卿顔杲卿顔泉明已載沂州府人物故於卷內悉為剛除以省重復其各本貫未經載入者則仍依原本謹附識於此趙食其祋祤人武帝時以主爵都尉從衛青有功元狩三年賜爵關內侯蘇武杜陵人父建以校尉從大將軍衛青擊胸奴封平陵侯武少以父任為郎天漢元年以中郎將使胸奴單于欲降之武不屈乃幽武置大窖中絶不飲食武齧雪與旃毛并咽之又徙北海上無人處使牧羝廪食不至掘野鼠去􅋄實而食之杖漢節牧羊卧起操持節旄盡落留胸奴凡十九歲昭帝始元六年始還拜典屬國宣帝立賜爵關內侯圖畫麒麟閣張安世杜陵人父湯為御史大夫安世以父任為郎武帝竒其才擢為尚書令昭帝即位封富平侯與大將軍霍光尊立宣帝光薨拜大司馬車騎將軍領尚書事以謹慎周密自著每定大政自朝廷大臣莫知其與議匿名迹遠權勢天子內親安世心密於光焉薨諡曰敬侯子延壽嗣侯自以身無功德數上書讓減户邑延夀子勃元帝初舉大官獻丞陳湯湯立功西域世以勃為知人勃子臨亦謙讓每登閣殿常嘆曰桑霍為我戒豈不厚哉自宣元以來為侍中中常侍諸曹散騎列校尉者十餘人功臣之世惟金氏張氏親貴比於外戚張千秋安世長子與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓還光問戰鬬方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能記光由是賢千秋嘆曰霍氏世衰張氏興矣徐福茂陵人初霍氏奢侈福上疏言宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅告霍氏者皆封人為福上書論功為曲突徙薪之喻帝賜福帛十匹後以為郎馮野王父奉世本潞人徙杜陵野王元帝時為隴西太守以治行高為左馮翊池陽令並素行貪汚野王部督郵掾祋祤趙都案驗得其罪收捕並不首吏都格殺並家上書陳冤事下廷尉都詣吏自殺以明野王京師稱其威信遷大鴻臚尚書選第中二千石野王行能第一帝以後宫親屬不用然甚見器重有名當世弟逡舉茂材為美陽令厯清河都尉言河隄方略遷隴西大守治行亷平逡弟立通春秋成帝時為五原太守徙西河上郡居職略興野王相似遷東海太原更厯五郡所居有迹弟參為黃門給事中宿衛十餘年以嚴見憚不得親近侍帷幄綏和中封宜鄉侯哀帝即位傅太后追怨參姊中山太后陷以罪參自殺衆莫不憐之蕭育父望之本蘭陵人徙杜陵育以父任為太子庶子元帝時為茂陵令召拜司隸校尉復為中郎將使胸奴鄠名賊梁子政久不伏辜育為右扶風數月盡誅子政等哀帝時拜南郡太守復為執金吾育為人嚴猛尚威居官數免稀遷弟咸舉茂枋好畤令厯張掖宏農河東太守所居有迹官至大司農弟由治郡有聲官至中散大夫張山拊平陵人事小夏侯建受尚書為博士論石渠官至少府鄭寬中平陵人受尚書於同縣張山拊有雋材以博士授太子尚書成帝即位賜爵關內侯遷光祿大夫領尚書事谷永長安人博學經書建昭中為太常丞數上疏言得失其於天官京氏易最密故善言災異前後所上四十餘事纍遷光祿大夫終大司農鄭子真谷口人修身自保成帝時元舅大將軍王鳳以禮聘之不詘名震京師三輔決録子真名朴安邱望之長陵人恬靜不求進宦時號曰安邱文人成帝聞欲見辭不肯著老子章句許商長安人從周堪受尚書善為算著五行論厯四至九卿門人知名者甚衆班伯其先居樓煩後占數長安少受詩於師丹誦説有法拜中常侍又受尚書論語於鄭寬中張禹志氣慷慨數使胸奴出為定襄太守郡中稱神明卒官水衡都尉弟斿博學有俊材為諌大夫右曹中郎將與劉向校祕書帝器其能斿弟稚少為黃門郎中常侍方直自持王莽秉政以延陵園郎食故祿終身朱博杜陵人以太常掾察廉輔安陵丞成帝時為櫟陽令徙雲陽平陵以高第入為長安令京師治理遷冀州刺史州郡畏博威嚴徙并州遷琅邪太守視事數年大改其俗入為左馮翊少愛利敢誅殺下吏盡力哀帝時為大司空復拜御史大夫代孔光為丞相封陽鄉侯後坐事自殺李尋平陵人治尚書與鄭寬中同師張山拊獨好洪範災異又學天文月令陰陽哀帝初待詔黃門常極言災異為母后與政亂朝又言宜少抑外親大臣遷黃門侍郎拜騎都尉平當祖父自下邑徙平陵成帝時以明經為博士給事中每有災異輒傅經術言得失使行流民幽州所過見稱後以明禹貢為騎都尉領河隄哀帝即位徵為光祿大夫至丞相明年欲封當當病篤或謂當強起受侯印為子孫計當曰吾已負素餐之責今不起者所以為子孫也子晏以明經厯位大司徒封防鄉侯漢世唯韋平父子至宰相王嘉平陵人以明經射䇿甲科為郎鴻嘉中舉敦朴能直言召見宣室對政事得失超遷大中大夫建平三年代平當為丞相封新甫侯嘉為人剛直嚴毅有威重哀帝時封董賢等嘉切諫不聽後董賢益封嘉封還詔書因奏封事諫上及太后詔詣廷尉不食嘔血死元始四年追諡忠侯馮商陽陵人治易事五鹿充宗後事劉向以能屬文待詔金馬門受詔續太史公書七篇何並祖父自平輿徙平陵大司空何武舉為長陵令道不拾遺遷隴西太守徙潁川郡中清靜名次黃霸云敞平陵人師事同縣吳章章治尚書為博士王莽秉政長子宇與章謀夜以血塗莽第門若鬼神之戒冀以懼莽事覺章坐腰斬弟子千餘人皆禁錮不得仕敞時為大司徒掾自劾吳章弟子收章尸葬之蔣詡杜陵人為兖州刺史以廉直得名王莽居攝以病免官歸鄉里卧不出户卒於家宋宏長安人父尚成帝時至少府哀帝立以不附董賢抵罪宏少而溫順哀平間作侍中赤眉入長安遣使徴宏逼迫不得己至渭橋投水家人救出因佯死獲免光武初纍遷大司空封宣平侯所得租俸分贍九族家無資産以清行稱所進賢士馮翊桓梁等三十餘人或相及為公卿者威容德器羣臣莫及竇融平陵人更始時趙萌薦為巨鹿太守融見東方尚擾而祖父纍世在河西知其土俗謂兄弟曰天下安危未可知河西殷富帶河為固張掖屬國精兵萬騎一旦緩急足以自守此遺種處也乃辭巨鹿得為張掖屬國都尉既到撫結雄傑懷輯羌虜河西翕然歸之及更始敗酒泉太守梁統等推融行河西五部大將軍事聞光武即位遂決䇿歸漢授涼州牧從破隗囂封安豐侯拜冀州牧又遷大司空弟友亦封顯親侯子穆等皆尚公主於親戚功臣中莫輿為比卒諡曰戴景丹櫟陽人更始立為上谷長史與耿弇寇恂將兵歸世祖拜偏將軍從擊王郎大破之世祖即位拜驃騎大將軍封櫟陽侯萬修茂陵人更始時為信都令與太守任光都尉李忠共城守迎世祖拜為偏將軍及破邯鄲拜右將軍從平河北拜槐里侯耿弇茂陵人上谷太守况之子少好學習騎射年二十一奉奏詣更始會王郎起兵邯鄲道聞光武在盧奴乃馳北上謁因歸説况使寇恂東約彭寵發突騎及漁陽兵合軍而南擊斬王郎將校四百餘級定涿郡中山巨鹿清河河間二十二縣遂從光武拔邯鄲與吳漢擊破銅馬赤眉諸賊光武即位拜建威大將軍封好畤侯遂定彭寵於漁陽還收富平獲索東攻張步平齊地光武謂弇曰將軍前在南陽建此大䇿常以為落落難合有志者事竟成也弇凡平郡四十六屠城三百未嘗挫折卒諡曰愍子忠以騎都尉擊胸奴於天山有功耿舒弇弟光武初為復胡將軍擊彭寵有功封牟平侯馬援茂陵人援三兄況余貟並有才能為二千石援少有大志嘗受齊詩意不能守章句乃辭況欲就邊郡况曰汝大才當晚成王莽敗避地涼州建武四年隗囂使援奉書詣洛陽見光武遂歸漢光武西征囂援於帝前聚米為山谷指畫形勢開示衆軍所從道徑遂進軍大破囂衆拜隴西太守視事六年隴右清靜徴入為虎賁中郎將交址女子徴側徴二反拜援伏波將軍討平其地封新息侯後討武陵五溪蠻病卒梁松因事陷之詔收侯印綬建初三年追諡忠成郭伋茂陵人少有志行哀平間為漁陽都尉王莽時為并州牧更始徴拜左馮翊世祖即位拜雍州牧再轉尚書令數納忠諌爭厯漁陽潁川太守盜賊消散威信著聞調并州牧過京師謝恩言選輔衆職當簡天下賢俊不宜専用南陽人帝納之入州界所過問民疾苦聘求耆德與參政事朝廷多舉伋可為大司空帝以并部尚有盧芳之警且胸奴未安欲使久於其事故不召以老病乞骸骨徴為太中大夫賜宅一區及帷帳錢榖以充其家伋輒散與宗親九族無所遺餘蘇竟平陵人平帝時以明經為博士講書祭酒善圖緯能通百家言建武五年拜侍中病免初延岑護軍鄧仲況擁兵據南陽陰縣為寇劉龔為其謀主竟以書曉之仲况與龔遂降竟終不伐其功申屠剛茂陵人性剛直嘗慕史鰌汲黯之為人王莽時避地河西轉入巴蜀建武七年徴拜侍御史遷尚書令光武嘗欲出遊剛諫不見聽遂以頭軔乘輿輪帝遂為止以數切諫失旨出為平隂令復拜太中大夫王丹下邽人王莽時連徴不至隱居養志好施周急每歲農時輒載酒肴於田間侯勤者而勞之惰者皆自厲邑聚相率以致殷富其輕點遊蕩廢業者曉其父兄使黜責之殁則賻給親自將護有遭喪憂者輒待丹為辦行之十餘年其化大洽風俗以篤前將軍鄧禹征關中軍乏糧丹率宗族上麥二千斛禹表丹領左馮翊後徴為太子太傅張湛平陵人矜嚴好禮動止有則建武初為左馮翊在郡修典禮設條教政化大行五年拜光祿勳光武臨朝或有惰容湛輒陳諫其失常乘白馬帝每見湛輒言白馬生且復諌矣為太子太傅郭后廢因稱疾不朝拜太中大夫居中東門候舍故時人號曰中東門君王隆雲陽人王莽時避難河西為竇融左護軍建武中為新汲令能文章所著詩賦銘書凡二十六篇王遵霸陵人少豪俠有才辨初與隗囂舉兵為大將軍常有歸漢意數勸囂遣子入侍囂不從遵乃與家屬東詣京師拜太中大夫封向義侯方望平陵人隗囂起兵聘為軍師説囂急立高廟稱臣奉祠囂從其言更始二年遣使徴囂望以為更始未可知固止之囂不聽望以書辭謝而去班彪伯弟稚之子家安陵性沉重好古年二十餘避難從隗囂著王命論欲以感之囂終不悟遂避地河西為竇融畫䇿事漢以拒隗囂光武初舉茂才拜徐令以病免彪既才高而好述作遂專心史籍採前史遺事旁貫異聞作後傳數十篇斟酌前史譏正得失後辟司徒玉况府時東宫初建上言宜博選明儒以為傅帝納之為望都長卒於官馮衍杜陵人野王孫博通羣書王莽時多薦舉之者衍辭不仕亡命河東更始時為立漢將軍領狼孟長屯太原後歸世祖為曲陽令建武六年曰食上書陳八事帝將召見尚書令王護等讒之不得入西歸故郡卒於家所著有賦誄銘説五十篇杜林茂陵人父鄴成哀間為涼州刺史林少好學家既多書又從外氏張竦受學博洽多聞時稱通儒王莽敗與弟成俱客河西隗囂深相敬待終不屈節建武六年成物故囂乃聽林持喪東歸既遣而悔令刺客楊賢遮殺之賢見林推鹿車載致弟喪乃嘆曰我雖小人何忍殺義士因亡去光武徴拜侍御史議定郊祀遷大司徒司直薦同郡范逡趙秉申屠剛及隴西牛邯等皆被擢用厯官大司空稱為任職相玉況京兆人為陳留太守以德行化人建武二十三年遷司徒張純安世六世孫少襲富平侯哀平間為侍中以敦謹守約保全前封建武初先來詣闕拜太中大夫更封武始侯食富平之半純明習故事建武初舊章多闕每有疑議輒以訪純自郊廟婚冠喪紀禮儀多所正定帝甚重之二十三年代杜林為大司空在位慕曹參之迹務於無為選辟掾史皆知名大儒丁邯陽陵人有高節世祖初舉孝亷故事尚書郎以令史久缺輔之世祖始改用孝亷以邯輔焉邯稱疾不就詔問實病羞為郎乎對曰臣恥以孝亷為令史職耳世祖怒杖之數十詔問欲為郎否邯曰能殺臣者陛下不能為郎者臣詔遣出竟不為郎後拜汾陰令治有名迹遷漢中太守卒於官耿國弇弟建武七年拜駙馬都尉父况卒國於次當嗣讓其弟霸厯頓邱陽翟上蔡令所在吏人稱之徴為五官中郎將數言邊事帝器之呼韓邪單于𣢾塞稱藩議者皆以為不可許國獨言宜如孝宣故事受之帝從其議由是烏桓鮮卑保塞自守中國少事二十七年為大司馬上言宜置度遼將軍左右校尉屯五原以防逃亡卒後顯宗思國言如其議朱勃茂陵人少與馬援兄弟善年未二十右扶風請試守渭城宰厯雲陽令後援貴嘗待以舊恩而卑侮之勃愈身自親及援遇讒諸賓客故人莫敢弔會勃詣闕上書訟之肅宗即位追賜勃子榖二千斛龍述京兆人光武時為山都長馬援戒兄子書曰龍伯高敦厚周慎口無擇言謹約節儉亷公有威吾愛之重之願汝曹效之帝見援書擢述為零陵太守鮑恢扶風人建武中鮑永為司隸校尉辟恢為都官從事恢亢直不避強禦帝嘗曰貴戚且宜斂手以避二鮑第五倫長陵人其先齊諸田徙園陵者多故以次第為氏倫少介然有義行王莽末盜起倫依險固築營壁以拒之銅馬赤眉之屬皆不能下京兆尹閻興召為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安市倫平權衡正斗斛市無阿枉百姓悅服建武二十七年舉孝亷輔淮陽國醫工長從王朝京師得見帝問以政事大悅厯會稽蜀郡太守多善政肅宗初代牟融為司空上疏請抑馬竇權奉公盡節言事無所依違性質慤在位以貞白見稱杜篤杜陵人延年元孫少博學不修小節以事繫獄會大司馬吳漢薨光武名諸儒誄之篤於獄中為誄辭最高帝美之賜帛免刑後仕郡文學掾建初三年馬防擊西羌請為從事中郎戰沒於射姑山著論都賦及他文十八篇韋彪賢之元孫徙平陵孝行純至父母卒哀毀三年不出廬寢服竟羸瘠醫療數年乃起好學洽聞雅稱儒宗建武末舉孝亷除郎中以病歸教授恬於進趣建初中纍遷大鴻臚言取士宜以才行為先不可純以閥閲又言二千石視事久而為吏民所便安者宜增秩重賞勿妄遷徙帝納之彪清儉好施祿賜分與宗族家無餘財著書十二篇號曰韋卿子楊政京兆人少好學從代郡范升受梁邱易善説經書教授數百人升嘗繫獄政乃肉袒以箭貫耳抱升子濳伏道旁侯車駕持章叩頭大言武騎虎責舉弓射之旄頭又以戟叉政傷胸政猶不退哀泣辭請有感帝心詔即出升為人不拘小節果敢自矜然篤於義官至左中郎將竇固融弟友之子少尚光武女涅陽公主為黃門侍郎好覽書傳喜兵法中元元年襲父封顯親侯顯宗時以固明習邊事拜為奉車都尉出屯涼州擊呼衍王加位特進復出玉門擊西域遂破白山降車師在邊數年羌胡服其恩信肅宗即位徴為大鴻臚纍遷光祿勳衛尉性謙儉愛人好施士以此稱之卒諡曰文樂恢長陵人父親為縣吏得罪於令收將殺之恢年十一俯伏寺門晝夜號泣令即解出親長好經學性亷直介立為本部功曹選舉不阿請託無所容徴拜議郎會竇憲出征胸奴數上書諌爭入為尚書僕射刺舉無所回避貴戚惡之妻每諌恢恢歎曰吾何忍素餐立人之朝乎上疏諌不省稱疾歸鄉里竇憲風州郡迫脅飲藥死竇氏誅恢門生何融等上書陳恢忠節除子已為郎中趙牧長安人少知名以公正稱習春秋事樂恢恢以直諌死牧為陳冤得申後舉高第為侍御史會稽太守皆有稱績第五訪倫族孫少孤貧常傭耕以養兄嫂有暇則學文仕郡為功曹察孝亷輔新都令厯官張掖太守護羌校尉皆有治績班固彪子年九歲能屬文及長博貫載籍以彪所續前史未詳乃潛精研思欲就其業顯宗召除蘭臺令史成世祖本紀遷為郎典校祕書又撰功臣平林新市公孫述事作列傳載記二十八篇奏之帝復使終成前所著書固乃探撰前記綴集所聞以為漢書起高祖終孝平王莽二百三十年凡百篇積思二十餘年至建初中乃成當世甚重其書後遷元武司馬天子會諸儒講論五經作白虎通德論令固撰集其事竇憲出征胸奴以固為中護軍憲敗洛陽令种兢捕繫固死獄中賈逵平陵人誼九世孫父徽從劉歆受左氏春秋兼習國語周官又受古文尚書於塗惲學毛詩於謝曼卿逵悉傳父業以大夏侯尚書教授兼通五家榖梁之説又明左氏傳國語為解詁五十一篇顯宗重其書寫藏祕館拜為郎與班固並校祕書應對左右肅宗初詔逵入講北宫白虎觀南宫雲臺帝善逵説令逵自選公羊嚴顔諸生高者教以左氏又選高才生受榖梁春秋古文尚書毛詩由是四經遂行於世和帝時為侍中領騎都尉甚見信用所著經傳義詁及論難百餘篇學者宗之班超彪少子為人有志不修細節然內孝謹家貧常傭書以養母久勞苦嘗投筆歎曰大丈夫當立功異域以取封侯安能久事筆硯間乎明章兩朝間出征西域厯為軍司馬將兵長使西域都護安集五十餘國封定逺侯在西域三十一年以年老乞歸徴還拜射聲校尉卒年七十一徐幹平陵人建𥘉三年班超請平西域幹素與超同志上疏願奮身佐超遂以幹為假司馬將弛刑及義從千人就超超遂與幹擊番辰大破之以幹為軍司馬永元中月氏龜兹諸國降乃以幹為長史廉范杜陵人父遭亂客死蜀漢范年十五辭母西迎父喪至葭萌載船觸石破沒范抱柩俱沉溺衆傷其義鈎求得之療救僅免於死歸葬服竟詣京師受業事薛漢永平初為鄧融功曹後辟公府會薛漢坐楚王事誅范獨往收斂之由是顯名舉茂才遷雲中太守胸奴不敢向雲中後遷蜀郡太守百姓歌之免歸鄉里廣田地積財粟悉以賑宗族眀友世稱其好義馬嚴援兄余之子少孤從平原楊大伯請學通春秋左氏與弟敦俱居巨下三輔稱其義行號巨下二卿明德皇后既立嚴更徙北地斷絶賓客永平十五年慨多大略有將帥才永平末為戊校尉屯金蒲城胸奴來攻恭乘城搏戰殺傷甚衆引兵據疏勒城胸奴於城下擁絶澗水恭於城中穿井十五丈不得水乃整衣服向井再拜有頃水泉奔出吏士揚水以示虜遂引去後車師復叛與胸奴共攻恭數月食盡乃煮鎧弩食其筋革士無二心單子遣使招降恭手殺其使炙諸城上單于更益兵圍恭不能下肅宗遣謁者王蒙發兵出塞恭乃得歸鮑昱奏恭節過蘇武宜蒙爵賞於是拜為騎都尉後以忤馬防免官卒於家傅毅茂陵人少博學建初中召為蘭臺令史拜郎中與班固賈逵共典校書毅追美孝明帝功德最盛而廟頌未立乃作顯宗頌十篇奏之由是文雅顯於朝廷秦彭茂陵人六世祖襲為潁川太守與羣從同時為二千石者五人三輔號曰萬石秦氏顯宗時擢彭為開陽城門侯拜騎都尉副駙馬都尉耿秉北征胸奴建初元年遷山陽太守後轉潁川皆有善政魯恭平陵人建武初父為武陵太守卒官時恭年十二弟丕七歲晝夜號踴郡中賻贈無所受乃歸服喪禮過成人十五與弟丕俱居太學習魯詩閉户講誦絶人間事恭憐丕小欲先就其名託疾不仕建初初丕舉方正恭始為郡吏太傅趙熹聞而辟之肅宗集諸儒於白虎觀恭特以經明得與其議拜中牟令專以德化為理在事三年州舉尤異纍拜侍御史魯詩博士樂安相徴為侍中遷光祿勳選舉清平京師貴戚莫能枉其正永元十二年代吕蓋為司徒坐事免永初元年復為司徒恭再在公位選辟高第至列卿郡守者數十人性謙退奏議依經潛有補益然終不自顯故不以剛直為稱長子謙為隴西太守有名績謙子旭獻帝時為太僕與王允同誅董卓為李傕所害魯丕恭弟性沈深好學兼通五經以魯詩尚書教授為當時名儒建初元年舉賢良方正厯青州刺史遷趙相就學者常百餘人關東號之曰五經復興魯叔陵厯東郡陳留太守中散大夫侍中左中郎將再為三老馬廖援子少以父任為郎肅宗初為衛尉時太后躬履節儉事從簡約廖慮美業難終上疏勸成德政太后深納之廖性質誠畏慎不受權勢虛名有司連據舊典奏封廖等纍讓不得巳建初四年受封為順陽侯每有賞賜輒辭不敢當京師以是稱之馬防廖弟肅宗初為城門校尉建初二年平定西羌還拜車騎將軍封潁陽侯拜光祿勳數言政事多見採用馮豹衍子事後母至孝長好儒學舉孝亷拜尚書郎忠勤不懈每奏事未報常俯伏省閣或從昏至明肅宗嘉之使黃門持被覆豹敕令勿驚是時方平西域以豹有才謀拜為河西副校尉和帝初數言邊事奏置戊已校尉城郭諸國復率就職遷武威太守復徴入為尚書卒於官馬稜援族孫少孤依從兄毅共居毅卒無子稜心喪三年建初中舉孝亷及馬氏廢肅宗以稜行義徴拜謁者遷廣陵太守永元中厯漢陽丹陽會稽太守治皆有聲何敞平陵人性公正元和中辟太尉宋由府常引大體多所匡正以高第拜侍御史後拜尚書數切諫言諸竇罪過憲等深忌之出為濟南太傅遷汝南太守在職以寬和為政百姓化之氷元中復徴三遷五官中郎將梁鴻平陵人家貧尚節介博覽無不通而不為章句娶同縣孟氏女共入霸陵山中以耕織為業詠詩書彈琴以自娛因東出關過京師作五噫之歌肅宗求之不得乃易姓運期名耀字侯光與妻子居齊魯間又去適吳依大家臯伯通居廡下為人賃舂伯通異之乃舍之於家潛閉戶著書十餘篇及卒葬要離冢旁高恢京兆人少好老子隱於華陰山中梁鴻東遊思恢作詩恢亦高抗終身不仕張仲蔚扶風人少與同郡魏景卿隱身不仕明天官博學善詩賦所居蓬蒿沒人曹喜扶風人工篆書與李斯少異而亦稱善邯鄲淳師焉耿夔秉弟少有氣誼永元初為車騎都尉從竇憲擊胸奴出居延塞直奔北單子廷于金微山斬閼氏名王已下五千餘級盡獲其珍寶財畜去塞五千餘里而遝自漢出師所未嘗至也封粟邑侯厯官度遼將軍後坐法免卒於家蘇順霸陵人和安間以才學見稱好養生術隱處求道晚乃仕拜郎中所著賦論雜文凡十六篇摯恂京兆人好學善屬文以儒術教授隱於南山不應徴聘名重關西班勇超少子有父風元初六年胸奴與車師後部攻沒長史索班公卿以為宜閉玉門關勇言宜置校尉長史以扞撫諸國絶胸奴覬覦之情于是以勇為西域長史悉平車師六國又發諸國兵擊降胸奴是後車師無復虜迹城郭皆安竇章融元孫少好學有文章永初中三輔遭羌寇章避難外黃居貧蓬户蔬食躬勤孝養講讀不輟太僕鄧康薦入東觀為校書郎順帝初遷屯騎都尉謙虛下士甚得名譽後為大鴻臚子唐有俊才官虎賁中郎將韋豹杜陵人元成元孫數辟公府輒以事去司徒劉愷辟之欲薦為御史豹跣而起愷追之徑去不顧安帝西巡徵拜議郎兄順平輿令有高名弟義初仕州郡太傳桓焉辟舉理劇為廣都長甘陵陳二縣令數上書順帝譏切左右貶刺竇氏以兄順喪去官豹子著少以經行知名大將軍梁冀辟之不就靈帝即位拜東海相蘇章純孫少博學能屬文安帝時為議郎數陳得失順帝時厯并州刺史以擢折權豪忤旨坐免隱身鄉里後徵為河南尹不就朱寵京兆人初辟鄧隲府稍遷潁川大守治理有聲建光中為大司農痛隲無罪遇禍乃肉袒輿櫬上疏追訟隲兄弟忠孝詔免官歸田里順帝即位擢為太尉封安鄉侯馬續嚴少子七歲通論語十三明尚書十六治詩博觀羣集善九章算術順帝時為護羌校尉遷度遼將軍所在有威恩稱馬融嚴之子有俊才從京兆摰恂學恂竒其才以女妻之初膺鄧隲召拜郎中校書東觀安帝時出為河間王廏長史召拜郎中厯武都南郡太守後復為議郎重在東觀著述融才高博洽為世通儒教養諸生常有千數涿郡盧植北海鄭康成皆其徒也善鼓琴好吹笛常坐高堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者著春秋三傳異同説注孝經論語詩易三禮尚書列女傳老子淮南子離騷所著賦頌等凡二十一篇矯愼茂陵人少好黃老隱遁山谷因穴為室與馬融蘇章鄉里並時融以才博顯章以亷直稱然皆推先於慎年七十餘不娶後忽歸家自言死日及期果卒第五頡倫少子厯桂陽廬江太守所在見稱順帝之為太子廢也頡為太中大夫與太僕來厯等共守闕固爭帝即位擢為將作大匠頡性狷介洛陽無主人鄉里無田宅常客止靈臺中或十日不炊故舊各致禮餉頡終不受宋漢宏弟嵩之孫嵩以剛強孝烈著名官至河南尹漢以經行舉茂才四遷西河太守永建元年為東平相度遼將軍立名節以威恩著稱拜太中大夫卒詔書稱其清修雪白正直無邪子則鄢陵令亦有名迹拔同郡韋著扶風法真稱為知人宋登漢弟少傅歐陽尚書教授數千人厯官尚書僕射順帝以登明識禮樂使持節臨太學奏定典律轉拜侍中數上封事抑退權臣由是出為潁川太守韓康一名恬休霸陵人常採藥名山賣於長安市後遁入霸陵山中博士公車連徴不至桓帝以安車聘之康不得巳乃辭安車自乘柴車因道逃遁趙岐長陵人初名嘉後避難故自改名少明經有才藝娶馬融兄女鄙融不與相見辟司空掾舉理劇為皮氏長會中常侍左悺兄勝為太守岐即日西歸復為京兆尹功曹先是岐與從兄襲數貶議中常侍唐衡兄玹􅎫深毒恨延熹元年玹為京兆尹岐與從子戬逃避四方因赦得出靈帝初復遭黨錮十餘嵗獻帝西都拜議郎遷太僕遣岐宣揚國命所到郡縣百姓皆喜又南説劉表遣兵詣洛陽助修宫室軍資委輸前後不絶以老病留荆州就拜太常年九十餘卒著孟子章句三輔決録傳於時第五種倫曽孫少厲志義為吏冠名州郡永夀中以司徒掾清詔使冀州亷察災害奉使稱職拜高密侯相以能換為衛相遷兖州刺史中常侍單超兄子匡為濟隂太守負勢貪放種即奏匡并以劾超超積恨遂以事陷種坐徙朔方會赦出卒於家竇武融元孫少時以經行著名關西延熹八年長女立為皇后遷越騎校尉封槐里侯明年拜城門校尉在位多辟名士清身疾惡禮賂不通歲儉民飢所得兩宫賞賜悉散與太學諸生及貧民時內官専寵李膺杜密等為黨事考逮永康元年武上疏諫有詔原膺等靈帝立拜大將軍更封聞喜侯與太傅陳蕃謀誅宦官為曹節王甫所害宋果扶風人性輕悍為郡縣所疾郭泰訓之義方果感悔遂改節自敕以烈氣聞辟公府侍御史荊州刺史所在能化蘇不韋章兄曽孫父謙官金城太守為司隸校尉李皓所殺不韋謀刺皓不克乃馳到魏郡掘其父冢斷其頭以祭父皓捕求不得憤恚死不韋遇赦還家乃始改葬行喪後太傅陳蕃辟為郡五官掾段熲與皓素善因收不韋害之馬日磾融族子少傳融業以才學進與楊彪盧植蔡雍等典校中書厯位九卿獻帝初為太傅金尚京兆人獻帝初為衮州刺史東之部而曹操已臨衮州遂依袁術術僭號欲以為太尉不從為術所害趙戩長陵人性質正多謀初平中為尚書典選舉董卓欲有所私授戩拒不聽卓怒召欲殺之衆人悚栗而戩辭貌自若卓悔謝釋之後為平陵令王允被害莫敢收允尸者惟戩棄官營喪士孫瑞扶風人有才謀獻帝初為執金吾王允引為僕射謀誅董卓瑞以允自専討卓之勞歸功不侯所以獲免於李傕之難後為國三老光祿大夫每三公缺楊彪皇甫嵩皆讓位於瑞興平二年從駕東歸為亂兵所殺天子都許追論瑞功封子萌為津亭侯萌有才學與王粲善耿紀秉元孫少有美名辟公府稍遷少府紀以曹操將篡漢建安二十三年與太醫令吉本丞相司直韋況等謀起兵誅操不克死金禕京兆人自以世為漢臣自日磾以來名節纍葉覩漢祚將移與耿紀等共謀誅曹操死之鮑出新豐人興平中三輔亂母為賊所掠出獨追之斫賊四五人又殺十餘人見其母與比舍嫗同貫相連遂復奮擊賊賊乃解還其母比舍嫗遙望出哀求出又斫賊賊謂出曰已還卿母何為不止出又指嫗曰此吾嫂也賊復解還之遂相扶侍客南陽建安五年北歸母不能步行出獨自負之鄉里士大夫嘉其孝烈欲薦州郡出曰田民不堪冠帶至魏青龍中母年百有餘嵗乃終出時年七十餘行喪如禮三國漢馬超茂陵人父騰漢末為征西將軍屯涼州後徴為衛尉超初為偏將軍領騰部曲進軍至潼關與曹操戰敗奔漢中聞先主圍劉璋於成都遂請降將兵到城下璋即稽首纍遷驃騎將軍領涼州牧封􆈏鄉侯卒諡曰威從弟岱位至平北將軍射援扶風人其先本姓謝援少有名行丞相亮以為祭酒馬鈞扶風人巧思絶世嘗作指南率又作翻車令童兒轉之而灌水自覆見諸葛亮連弩曰巧矣未盡善也作之可令加五倍魏脂習京兆人與孔融善融被誅許中百官先與融善者莫敢收恤習獨往撫而哭之黃初中拜中散大夫張既高陵人舉茂才除新豐令治為三輔第一為京兆尹招集流民興復縣邑百姓懷之魏國建出為雍州刺史文帝時復為涼州刺史封西鄉侯既臨二州十餘年政惠著聞明帝時追諡曰肅社畿杜陵人少孤繼母苦之以孝聞舉孝亷除漢中守丞拜河東太守在河東十六年治為天下最文帝時封豐樂亭侯守司隸校尉帝征吳以為尚書僕射統留事卒贈太僕諡曰戴隗禧京兆人少好學初平中三輔亂禧南客荆州擔負經書每以採梠餘日誦習之黃初中為譙王郎中王宿聞其儒者常虛心從之後拜郎中年八十餘以老處家就之學者甚多禧既明經又善星官撰作諸經解數十萬言楊沛萬年人除新鄭長纍遷長社令九江東平樂安太守並有治迹後又為鄴令厯京兆尹身退之後家無餘積占河南夕陽亭部荒田二頃起瓜牛廬居止其中妻子凍飢沛亡鄉人及故吏民為殯葬賈洪新豐人好學有才而特精春秋左傳建安初仕郡舉計掾應州辟時州中自參軍事以下百餘人惟洪與馮翊嚴芭才學最高厯守三縣令所在輒開除廏舍親授諸生晚為隂泉長延康中轉白馬王相王彪雅好文學常師宗之吉茂池陽人好書建安初入武功南山隱處精思數嵗舉茂才除臨汾令拜議郎從少至長室如懸罄其或餽遺一不肯受傅幹泥陽人建安十九年曹操征孫權幹以參軍從諫不聽軍遂無功官終丞相倉曹屬傅嘏幹從弟弱冠知名司空陳羣辟為掾時劉劭作考課法嘏著論難之為河南尹以德教為本正始中纍遷尚書時議欲伐吳嘏言宜明法練士錯計於全勝之地後吳將諸葛恪揚聲欲向青徐朝廷將為之備嘏議以為淮海非經行之路恪自并兵來向淮南耳恪果圖新城不克而歸後以功進封陽鄉侯杜恕畿子太和中為散騎黃門侍郎推誠以質不治飾不結交援専心向公每政有得失常引綱維以正言在朝八年論議亢直出為宏農太守厯官幽州刺史龎迪扶風人為河南尹以清賢稱韋誕京兆人有文才善屬辭章太和中為武都太守以能詩補侍中官至光祿大夫魏氏寶器銘題皆誕書杜寬恕弟理之子篤志博學舉孝亷除郎中經傳之義多所論駮剛集禮記及春秋左氏傳解存於世晉杜預恕子博學多通起家尚書郎厯河南尹秦州刺史拜度支尚書在內七年朝野號曰杜武庫拜鎮南大將軍都督荆州諸軍事以平吳功封當陽縣侯公家之事知無不為凡所興造必考度始終鮮有敗事立功之後耽思經籍為春秋左氏經傳集解又參考衆家譜第謂之釋例又作盟會圖春秋長厯成一家之學卒贈征南大將軍諡曰成竇允始平入清尚自修察孝亷除浩亹長遷謁者泰始中拜臨水令遷巨鹿太守皆有政績王育京兆人少孤貧為人傭牧羊過小學必歔欷流涕時有暇即折蒲學書同郡許子章聞而嘉之給其衣食使與子同學遂博通經史司徒王渾辟為掾除南武陽令為政清約遷并州都護摰虞長安人少事皇甫謐才學博通著述不倦舉賢良拜中郎元康中遷吳王友荀顗撰新禮使虞討論得失而後施行厯光祿勳太常卿時郊祀禮儀弛廢虞考正舊典法物粲然撰文章志四卷注解三輔決録又撰古文章類聚區分為三十卷名曰流别集各為之論杜錫預子為太子中舍人性亮直忠烈屢諫愍懷太子言辭懇切後轉衛將軍長史孫秀營伉儷置居宅并薦之元帝帝即辟之後至少府卿詹卒浤製朋友之服哭止宿草追趙氏祀程嬰杵臼之義祭詹終身吉挹蓮勺人祖朗愍帝時為御史中丞西朝不守朗歎曰吾知不能謀勇不能死何忍君臣相隨北面事賊乎乃自殺挹少有志節孝武帝時苻堅陷梁益桓豁表挹為魏興太守以拒堅功拜員外散騎侍郎堅將韋鍾攻魏興挹屢挫其鋭其後賊衆繼至力不能抗城陷不食死追贈益州刺史南北朝宋吉翰池陽人初為龍驤將軍劉道憐參軍復參武帝中軍事清謹勤正甚為武帝所知賞厯梁南秦二州刺史徙益州加督遷徐州刺史皆有治績傅宏之祗元孫少倜儻有大志厯位太尉行參軍高祖北伐宏之與沈田子等七軍自武關入進據藍田招懷各部落留為桂陽公義真雍州治中從事史義真東歸赫連勃勃追躡於青泥宏之軍敗不屈見殺杜驥預元孫元嘉中為青冀二州刺史惠化著於齊士後徴為左軍將軍梁韋睿杜陵人事繼母以孝聞武帝時纍遷豫州刺史領厯陽太守督諸軍侵魏攻拔合肥魏中山王元英圍昌義之於鍾離詔睿會曹景宗拒之魏軍大潰以功進爵永昌侯後為雍州刺史徴拜護軍睿性慈愛撫孤兄子過於已子厯官所得祿賜皆散之親故家無餘財蒞人以愛惠為本所居必有政績將兵仁愛被服必於儒者臨陳交鋒常緩服乘輿執竹如意以麾進止為梁世名將康絢藍田人祖穆為姚萇河南尹宋永初中率鄉族三千餘家至襄陽武帝為置華山郡藍田縣於襄陽以居之絢少俶儻有志氣仕梁厯司州刺史衛尉卿寬和少喜懼在朝廷見人似不能言號為長厚韋放睿子大通初為明威將軍總兵攻渦陽大破魏軍纍遷北徐州刺史弟稜性恬素博物強記當世士咸就質疑終光祿卿稜弟黯位大府卿侯景濟江黯都督城西面諸軍晝夜苦戰卒於城內韋粲放子少好學仗氣大同中為衡州刺史召還至廬陵聞侯景作逆倍道赴援至青塘侯景望見粲營未立便率鋭卒來攻軍敗左右牽粲避賊粲不動遂見害粲子尼及三弟助警構從弟昻皆戰死詔贈護軍將軍元帝平侯景追諡忠貞魏王洛兒京兆人以善騎射給事明元東宫明元獵灅南氷陷沒馬洛兒投水奉帝出殆將凍死帝解衣賜之天賜末帝避難居外洛兒晨夜侍衛不懈元紹之逆洛兒冒難往返京師通問於大臣明元還宫社稷獲全洛兒有功焉拜散騎常侍賜爵新息公韋閬杜陵人少有器望遇慕容氏政亂避地薊城太武初徴拜咸陽太守轉武都太守善撫納孫俊早孤事祖母以孝聞韋珍閬族弟厯尚書南部郎孝文初蠻首桓誕歸𣢾令珍招慰蠻左珍至桐柏山窮淮源宣揚恩澤莫不懷附招降七萬餘户以功進爵霸城侯子纘聰敏明辨孝文時纍遷尚書左丞纘弟彧為東豫州刺史綏懷蠻左州境肅清韋崇閬從子孝文時為南潁川太守郡中大治遷洛後為司州中正復為河南邑中正頻居衡品以平直見稱梁祚泥陽人篤志好學厯治諸經尤善公羊春秋鄭氏易與幽州别駕平恆有舊恆時請與論經史辟祕書令撰并陳夀三國志名曰國統子元吉有父風毛遐三原人世為酋帥正光中三輔騷擾與弟鴻賓聚鄉曲豪傑東西略池氐羌多赴之追擊賊帥七柵皆平蕭寶夤搆逆謀遐攻破其將寶夤走巴中孝武入關遷驃騎大將軍儀同三司卒遐世為豪右資産巨億士流貧乏者多被賑贍自供衣食粗敝而巳毛鴻賓遐弟狀貌頗異氐羌皆畏之遐雖早立而名出其下及賊起鄉里推為盟主後拜岐州刺史明帝以鴻賔兄弟所定處多乃改北地郡為北雍州鴻賓為刺史改三原縣為建忠郡以旌其兄弟孝武帝令鎮潼關為高歡所擒遂憂恚卒王子直杜陵人性節儉有幹能永安初拜鴻臚少卿大統初漢熾屠各阻兵於南山周文帝令子直率涇州步騎五千討破之除尚書左外兵郎中從解洛陽圍經河橋戰廢帝元年拜使持節太都督行瓜州事西土悅附恭帝初徴拜黃門侍郎北齊韋子粲俊子蕭寶夤為雍州刺史引為主簿轉録事參軍及寶夤反子粲與弟子爽執志不從相率逃免雍州平賜爵長安子齊夭保初封西𤏡縣男卒於豫州刺史子粲兄弟十三人並有孝行居父喪毁瘠過禮廬於墓側負土成墳弟榮亮博學有文才德行仁孝為時所重厯諌議大夫衛大將軍周王羆霸城人魏太和中為雍州别駕纍拜冠軍將軍荆州刺史孝武西遷除華州刺史拜驃騎大對軍移鎮河東以功進爵扶風郡公卒贈太尉羆安於貧素不營生業後雖貴顯鄉里舊宅不改衡門當時服其清潔王悅藍田人少有氣幹周文初定關隴悅率募鄉里從軍屢有戰功厯大行臺左丞侯景據河南來附悅言景於高歡分義有同魚水今尚背德豈肯盡節於朝廷周文納之景尋叛遷大行臺尚書孝閔踐阼授郢州刺史尋拜大都督進爵河北縣公性儉約不營生業家徒四壁韋孝寬名叔𥙿以字行杜陵人西魏時纍遷晉州刺史移鎮玉壁齊神武傾山東之衆來攻盡其智力孝寬咸拒破之保定初以孝寬立勳玉壁置勳州仍授勳州刺史進爵鄖國公武帝時上䇿平齊拜大司空進上柱國卒贈太傅諡曰襄孝寬在邊多載屢抗強敵所有經略布置人初莫解見其成事方乃驚服早喪父母事兄嫂甚謹所得俸祿不入私房親族有孤遺者必加賑贍子揔聰敏好學纍官京兆尹從武帝東征揔每率麾下先驅陷敵遂於并州戰殁追封河南郡公諡曰貞韋敻孝寬兄志尚夷簡淡於榮利弱冠拜雍州中從事謝疾去前後十見徴辟皆不應命周文帝聞敻養高不仕備加禮命竟不能屈所居之宅枕帶林泉敻對玩琴書蕭然自逸明帝為詩以貽之號之曰逍遙公敻雅好名義虛襟善誘雖耕夫牧竪有一介可稱者皆接引之竇熾平陵人漢大鴻臚章之後性嚴明有謀略少從范陽祁欣受毛詩左氏春秋善騎射魏正光末以功拜揚烈將軍從孝武帝西遷出為涇州刺史轉原州甚有政績蠕蠕侵廣武熾渡河追及大破之保定元年封鄧國公齊平進位上柱國隋文帝為相國百僚勸進熾自以纍世受恩不肯署箋時人皆高其節楊荐寧夷人性廉謹喜怒不形於色永安中討賊封高邑縣男文帝臨夏州補帳內都督魏孝武欲向關中荐贊成其計進爵清水縣子閔帝踐祚以奉使突厥稱旨遷大將軍進爵南安郡公梁昕盩厔人從爾朱天光征討拜右將軍大中大夫文帝深賞異之除河南郡守遷東荆州刺史孝閔踐祚進驃騎大將軍開府儀同三司天和初拜工部中大夫昕性溫𥙿有幹能厯官內外咸著聲稱韋瑱杜陵人幼聰敏有夙成之量起家太尉府法曹參軍周文帝為丞相轉行臺左丞從戰沙苑又從戰河橋厯鴻臚卿散騎常侍除瓜州刺史蕃夷不敢為寇纍封平齊縣伯隋杜杲杜陵人學涉經史有當世幹略周明帝時為司會上士前後四使陳嫻於占對陳宣帝甚敬異之纍官同州刺史開皇初進爵義興縣公遷兵部尚書竇榮定熾兄善之子沉深有器局周時以功進位開府尉遲迥初平拜榮定為洛州總管以鎮之隋受禪以佐命功拜上柱國厯秦州總管進爵安豐郡公竇毅熾兄子深沉有器事親以孝聞周時進爵神武郡公厯蒲金二州總管加上柱國入為大司馬開皇初拜定州總管纍居藩鎮咸得人和杜整杜陵人少有風概九歲居父憂哀毁骨立事母以孝聞及長驍勇有力好讀孫吳兵法從周武帝平齊纍加上儀同隋受禪進封長廣郡公開皇中密進取陳之䇿上善之於是以行軍總管鎮襄陽尋卒弟肅亦有志行開皇初為北地太守王長述羆孫早孤為祖所養及羆薨居喪過禮周受禪纍遷廣州刺史甚有威惠厯信州總管王謙作亂遣使致書於長述因執其使上其書又陳取謙之䇿帝大悅授行軍總管率衆討謙以功進柱國開皇初復獻平陳計帝善其能後以行軍總管道病卒韋師瑱子少沉謹有至性居喪盡禮周宇文護引為賓曹參軍雅知諸蕃風俗及山川險易夷狄朝貢師必接對論其國俗如視諸掌夷人驚服無敢隱情隋受禪拜吏部侍郎賜爵井陘侯遷兵部尚書奉詔為山東河南十八州安撫大使平陳之役以本官領元帥掾陳國府藏悉委於師秋毫無犯卒官汴州刺史韋世康􅳋子尚周文帝女襄樂公主厯沔硤二州刺史司州總管長史入為司會中大夫授絳州刺史課最擢禮部尚書世康寡嗜欲不慕勢貴未嘗以位望矜物聞人之善若巳有之亦不顯人過咎以求名譽進爵上庸郡公轉吏部尚書前後十餘年間多所進拔朝廷稱為亷平出拜荆州總管卒子福獎通事舍人與楊元感戰沒韋洸世康兄性剛毅有器幹仕周纍遷開府擊尉遲迥有功封襄陽郡公伐陳之役為行軍總管陳平拜江州總管略定九江遂進圖嶺南至廣州嶺表皆降拜廣州總管番禺夷王仲宣反洸拒之中流矢卒子協好學有雅量厯定息秦三州刺史有能名史萬歲杜陵人父靜周滄州刺史平齊之役戰殁萬歲少英武善騎射好讀兵書兼精占候襲爵太平縣公從擊尉遲迥每戰先登迥平拜上大將軍平陳之役以功加上開府從楊素擊高智慧踰嶺海攻破溪洞不可勝數諸夷叛以萬歲為行軍總管擊之破其三十餘部諸夷大懼請降以功進柱國後拜河州刺史突厥達頭可汗犯塞聞萬嵗名懼而引去萬歲追擊破之逐北入磧數百里楊素害其功譖殺之天下莫不冤惜萬歲為將不治營伍令士卒各隨所安敵亦不敢犯臨陳對敵應變無方號為良將劉方長安人性剛決有膽氣開皇初以軍功至大將軍厯甘瓜二州刺史仁夀中交州里人李佛子作亂詔為交州道行軍總管方法令嚴肅仁而愛士進兵臨佛子先令人諭以禍福佛子懼而請降尋授歡州道行軍總管經略林邑至其國都刻石紀功而還卒贈上柱國盧國公宇文愷京兆人博覽書記多技藝文帝時領營新都副監決渭水達河以通運漕煬帝時纍拜工部尚書自永嘉之亂明堂廢絶愷博考羣籍奏明堂議表撰東都圖記二十卷明堂圖議二卷釋疑十卷韋鼎睿孫博涉經史尤善相術遭父憂哀毁過禮侯景之亂兄昻卒於京城鼎負尸出寄於中興寺求棺無所得哀憤慟哭忽見江中有物流至鼎所乃新棺也因以充斂元帝聞之以為精誠所感仕陳為太府卿陳平授上儀同三司厯光州刺史魚俱羅下邽人身長八尺膂力絶人弱冠為親衛纍遷大都督從平陳以功拜開府沈元懀高智慧等作亂戰有功封高唐縣公楊素出靈州擊突厥奏與同行所當披靡進位柱國拜豐州總管自是突厥不敢畜牧塞下大業中越嶲飛山蠻作亂詔俱羅討平之李圓通涇陽人少給使文帝家性嚴整文帝以為堪當大任授帥府都督委以心膂周氏諸王圖為不軌賴圓通保護獲免由是參預政事伐陳之役以功進位大將軍仁夀中進爵萬安郡公陶模京兆人性明敏有器幹仁夀初為嵐州司馬漢王諒作亂刺史喬鍾葵將赴逆模拒之諒平煬帝嘉之拜開府授大興令楊元感反率兵從衛文升擊之以功進位銀青光祿大夫來和長安人少好相術識文帝於微時開皇末進位開府著相經四十卷臨孝恭京兆人明天文算術文帝甚親遇之每言災祥之事未嘗不中帝因令考定隂陽書官至上儀同著欹器圖地動銅儀經九宫五墓遁甲録月令元辰經百怪書録命書九宫龜經太乙武經孔子馬頭易卜等書張定和萬年人少貧賤有志節從平陳以功拜儀同從李充征突厥先登陷陳賊刺之中頸定和以草塞創而戰神氣自若敵遂敗走進位柱國封武安縣侯煬帝時拜左屯衛大將軍從征吐谷渾中流矢卒骨儀長安人開皇初為侍御史處法平當不為勢利所回煬帝嗣位遷尚書右侍郎於時濁貨公行凡當樞要之職並家纍金寶而儀勵志守常介然獨立帝嘉其清苦超遷京兆郡丞唐兵至儀與其子並死之張季珣京兆人父祥為并州司馬漢王諒反以退賊功授開府季珣少慷慨有志節大業末為鷹揚郎將其府據箕山為固與洛口連接李密翟讓陷倉城遣人呼之季珣罵密極口密怒攻之季珣所領不過數百人經三年一無離叛糧盡遂為所陷羣賊曳令拜密季珣曰吾天子爪牙臣何容拜賊也密壯而釋之翟讓從之求金不得遂殺之弟仲炎為上洛令義兵起率吏人城守部下殺之仲炎弟琮為千牛左右宇文化及之亂遇害唐屈突通長安人仕隋纍遷左驍衛大將軍授關內討捕大使高祖起代王遣通守河東戰久不下高祖留兵圍之遂濟河通自武關援長安誓以死報國及聞京師平家盡沒猶不肯降兵敗被禽帝以其忠臣釋之授兵部尚書封蔣國公從秦王平薛仁杲賊珍山積諸將爭得之通獨無所取從平王世充論功第一拜右僕射鎮東都後配饗太宗廟廷皇甫無逸萬年人父誕隋并州總管府司馬漢王諒反逼之不從見殺煬帝嘉誕忠特封無逸平輿侯而贈誕宏義郡公無逸厯右武衛將軍與段達元文都立越王侗及王世充篡斬關自歸高祖尊遇之拜民部尚書封滑國公纍官益州大都督府長史所至以亷介稱劉宏基池陽人從高祖舉兵太原引兵先濟河次長安京師平功第一討薛舉諸軍皆沒惟宏基力戰矢盡為賊拘不屈仁杲平乃克歸纍封任國公改夔國殷開山名嶠以字行鄠人高祖兵起召補大將軍掾從攻西河為渭北道元帥長史招慰關輔羣盜與劉宏基屯故城破衛文升賜爵陳郡公厯吏部尚書從討王世充以功進鄖國公竇威熾子沉邃有器局貫覽羣言高祖入關召輔大丞相府司録參軍時禮典湮缺威多識朝廷故事乃裁定制度帝語裴寂曰今之叔孫通也武德初授內史令每論政事必陳古為諭性儉素家不樹産比喪無餘資竇抗榮定子侍父疾束帶五旬不弛居喪哀癯過常母卒數號絶高祖定京帥為左武侯大將軍從秦王平薛舉功第一又從征王世充東都平册勳於廟者九人抗與從弟軌與焉李元通藍田人為隋鷹揚郎將率所部歸高祖拜定州總管為劉黑闥所破愛其才欲以為將不聽囚之故吏有餉飲餽者元通曰諸君見哀吾能一醉遂縱飲謂守者曰吾能舞劍可借刀守士與之乃潰腹死帝擢其子伏護大將軍李靖三原人通書史其舅韓擒虎每與論兵歎曰可與語孫吳者非斯人尚誰哉高祖時拜行軍總管平蕭銑擒輔公祏太宗踐祚授刑部尚書兼檢校中書令尋破突厥取定襄擒頡利斥地自隂山北至大漠封代國公遷尚書右僕射懇乞骸骨帝嘉美聽之吐谷渾寇邊復起為西海道行軍大總管進兵殘其國更立其王而還改衛國公卒贈司徒并州都督諡景武弟容師右武衛將軍纍戰功封丹陽郡公孫令問明皇即位以協贊功遷殿中少監封宋國公杜如晦杜陵人少英爽內負大節臨幾輒斷高祖時秦王引為府兵曹參軍常從征伐參帷幄機祕纍封蔡國公進尚書右僕射與房喬共管朝政引賢者下不肖咸得職時天下新定臺閣制度憲物容典率二人討裁如晦長於斷而喬善謀故能同心濟謀以左右帝當時語良相必曰房杜卒贈司空諡曰成叔淹材辨多聞秦王引為文學館學士嘗侍宴賦詩尤工官至檢校吏部尚書李大亮涇陽人有文武才略高祖入關授土門令招亡散撫貧瘠間出擊盜所至輒平貞觀初都督涼州有諷使獻名鷹者大亮密表言之太宗報曰有臣如此朕復何憂以討吐谷渾功進爵武陽公拜右衛大將軍兼右衛率又兼工部尚書身三職宿衛兩宫房喬稱其有王陵周勃節可倚大事臨終表請罷遼東役既卒家無珠玉為含惟貯米五斛布三十端大亮性忠謹外若不能言而內剛烈不可干廷爭是非無回撓至妻子未嘗見惰容葬宗族無後者三十餘柩殁後所育孤姓為行服如所親者十餘人兄子道𥙿貞觀末為將作匠獨言張亮不反帝不聽後悔之擢道𥙿為刑部侍郎終大理卿姚思亷名簡以字行父察自吳興遷京兆遂為萬年人思廉少寡嗜欲惟一於學察嘗修梁陳二史未就死以屬思亷思亷入隋表父遺言有詔聽續遷代王侍讀高祖定京師府僚皆奔亡獨思亷侍王兵將升殿厲聲曰唐公起義本安王室若等不宜無禮衆郤步聽扶王至順陽閣泣辭去秦王嘆曰思亷蒙白刃以明大節古所難者太宗即位遷著作郎宏文館學士與魏徴共撰梁陳書以卒父業加散騎常侍凡政事得失盡言無所諱孫思邈華原人居太白山不應隋文帝徴語人曰後五十年有聖人出我且助之太宗初詔詣京師歎曰有道者欲官之不受顯慶中召拜諫議大夫固辭思邈於隂陽推步醫藥無不善嘗曰膽欲大而心欲小知欲圓而行欲方孟詵盧照鄰師事之魏徴等修齊梁周隋五史屢咨所遺韋仁夀萬年人隋末為蜀郡司法書佐高祖遣使者徇蜀承制擢仁夀嶲州長史南寧州納𣢾朝廷歲遣使撫接至率貪沓邊人苦之帝素聞仁夀治理詔檢校南寧州都督開地數千里置七州十五縣人人安悅公孫武達櫟陽人從秦王討劉武周苦戰多功貞觀初為肅州刺史擊突厥於張掖河斬溺略盡封東萊郡公終右武衛大將軍薛萬均咸陽人與弟萬徹客幽州以才武為羅藝所厚善與藝歸𣢾授上柱國永安郡公竇建德寇范陽萬均率死士百人出他道掩擊其背衆驚潰去平梁師都拜左屯衛將軍從李靖討吐谷渾勇蓋三軍遷本衛大將軍又副侯君集擊高昌降麴智盛進潞國公弟萬備有至行母喪廬墓以尚輦奉御從伐髙麗契苾何力為賊所窘萬備單馬救之獲免仕至左衛將軍張儉新豐人高祖從外孫也高祖起儉以功除右衛郎將遷朔州刺史州賴以安檢校代州都督建平糴法遷營州都督征遼有功纍封皖城郡公兄大師太僕卿華州刺史弟延師左衛大將軍范陽郡公典羽林兵三十年未嘗有過時號三戟張家竇靜抗子高祖入京師擢并州長史突厥數為邊患糧道不屬表請屯田太原歲收粟十萬斛又請斷石嶺以為障塞太宗時改夏州都督突厥攜二諸將出征者過靜為陳敵中虛實由是大克獲又間其部落皆內附再遷民部尚書卒李道彥淮安王神通子幼孝謹隋大業末父亡命入鄠被疾山谷間纍旬食盡道彥羸服丐人間或採野食以進父有所分辭以飽乃藏弆以待武德五年封膠東郡王貞觀初例降公為相州都督後以父喪解柴毁雖親友不復識服除拜岷州都督遣入黨項諭國威靈區落盡降令狐德棻華原人博貫文史武德初為祕書丞時載籍湮缺德棻請購求天下遺書置吏輔録不數年圖典略備又建言近代無正史今耳目尚相及一易世事皆汨暗無掇拾有詔蕭瑀等分主論撰宋齊諸史貞觀三年復詔撰定書始成自德棻發之遷禮部侍郎坐事免會修晉史房喬奏起之類例多所諏定于仲謐高陵人貞觀中為太子左庶子太子承乾數有過仲謐上疏極諌太子敗宫臣皆罪廢獨仲謐蒙勞勉遷侍中進封燕國公監修國史永徽初拜尚書左僕射同中書門下三品王皇后之廢武后以其不右巳銜之出為華州刺史卒仲謐愛賓客樂引後進凡格式律令禮典皆與論撰修定本草并圖合五十篇崔敦禮咸陽人涉書傳以節義自將武德中官通事舍人善辭令嘗持節幽州召廬江王瑗瑗已舉兵執之脅問朝廷事敦禮不為言太宗壯之纍拜兵部尚書詔撫輯回紇鐵勒部姓敦禮通知四夷情偽少慕蘇武為人故屢使突厥允合事機永徽中封固安縣公拜太子少師同中書門下三品閻立德名讓以字行萬年人與弟立本皆機巧有思貞觀初拜將作大匠擢工部尚書進爵大安縣公弟立本代立德為工部尚書咸亨中為中書令唐臨長安人武德初為萬泉丞再遷侍御史持節按獄交州出冤繫三千人纍遷大理卿高宗嘗録囚臨占對無不盡帝善之他日復訊餘司斷者輒分訴不已獨臨所訊無一言帝問故答曰唐卿斷囚不冤所以絶意帝嘆曰為獄者固當如是纍遷吏部尚書坐事貶潮州刺史臨儉薄寡欲務掩人過見妻子必正衣冠兄晈貞觀中官吏部侍郎先是選集四時補擬不為限晈請以冬初集盡季春止後遂為法韋宏機萬年人貞觀中為左千牛胄曹參軍使西突厥還會石國叛道梗三年不得歸裂𥚑録所過諸國風俗物産為西征記比還上其書高宗時擢司農少卿主東都營田苑宦者犯法杖乃奏方士朱欽遂為武后所寵姦贓狼藉宏機白帝逐欽遂於邊孫嶽子武后時為汝州司馬太原令遷宋州長史歷盧海等州刺史皆著風迹終陜州刺史景駿歷肥鄉貴鄉令遷房州刺史所至有異政終奉天令韓瑗三原人父仲良武德初與定律令終刑部尚書瑗少負節行博學曉吏事永徽中官侍中王后廢瑗雪泣極諫不納禇遂良貶潭州都督瑗上言遂良社稷臣宜省察不聽貶振州刺史復遣使即殺之既至瑗已死田仁會長安人擢制舉仕纍左武候中郎將太宗時擊薛延陀有功永徽中厯平州刺史勝州都督皆有治績遷右金吾將軍晝夜巡行有姦必發京師無貴賤舉憚之終右衛將軍子歸道武后時以左衛郎將攝司賔卿使突厥默啜請六胡州等地不得大怨望執歸道將害之歸道色不變詈且讓為陳禍福默啜亦悔更以禮遣終右金吾將軍權懷恩萬年人祖宏壽高祖時擢太僕卿蘆國公懷恩以蔭纍遷尚乘奉御襲爵馭人安畢羅為高宗所寵見帝戲慢不恭懷恩奏事適見之退杖四十帝嗟賞擢萬年令賞罰明見惡輒取時語曰縱飲三斗塵無逢權懷恩其姿狀沈毅每盛服妻子不敢仰視更慶萊衛邢宋五州刺史洛州長史所居威名赫然終益州長史周智夀同官人永徽初父為族人安吉所害智夀與弟智爽候諸塗擊殺之相率歸有司爭為首有司不能決者三年或言弟始謀乃論死臨刑曰讎已報死不恨智夀自投地委頓身無完膚舐智爽血盡乃巳見者傷之田遊巖三原人永徽時補太學生罷歸入太白山母及妻皆有方外志自蜀厯荆楚愛夷陵青溪止廬其側長史李安期表其才召赴京師辭疾入箕山居許由祠旁自號由東鄰高宗幸嵩山至其門遊巖野服出拜帝曰先生比佳否對曰臣所謂泉石膏盲煙霞痼疾者拜崇文館學士進太子洗馬放還山𧖟衣耕食不交當世王方慶名綝以字行咸陽人父宏直為漢王友王好畋遊上書切諫遂被疏斥方慶武后時纍遷廣州都督以著善政轉洛州長史進同鳯閣鸞臺平章事中宗復為皇太子拜左庶子卒方慶博學練朝章著書二百餘篇尤精三禮家聚書不減祕府方為相時子為眉州司士參軍武后曰君在相位何子之逺對曰廬陵陛下愛子今尚在遠臣子何敢相近為庶子嘗奏人臣於天子未有斥太子名者今東宫門殿名多嫌觸請悉改之皆人所難言者高睿萬年人隋尚書左僕射熲孫舉明經厯趙州刺史聖厯初突厥默啜入寇睿力不能制即自經不得死為虜執不從見殺贈冬官尚書諡曰節子仲舒通故訓學擢明經為相王府文學開元初宋璟蘇題當秉多咨訪焉終太子右庶子王孝傑新豐人武后時為武威道總管討吐蕃克龜兹于闐疏勒碎業等城進夏官尚書同鳯閣鸞臺三品將兵討契丹李進忠墮谷死贈耿國公唐休璟名璿以字行始平人少孤受易於馬嘉運傳禮於賈公彥舉明經高第武后時授靈州都督陳方略請復四鎮聖厯中都督涼州大破吐蕃中宗時纍拜太子少師同中書門下三品休璟以儒者號知兵自碣石踰四鎮其間綿地幾萬里山川夷坦障塞之要皆能言之故行師料敵未嘗敗張仁願下邽人有文武才武后時纍遷殿中侍御史張嘉福王慶之請以武承嗣為太子邀仁願聯章仁願正色拒之神龍中為洛州長史盜無敢犯遷朔州軍總管築三受降城自是突厥不敢踰山牧馬景龍二年同中書門下三品封韓國公李昭德長安人父乾祐貞觀初為殿中侍御史鄃令裴仁軌私役門卒太宗欲斬之乾祐諫由是免死母卒廬墓側負土成墳帝遣使就弔表異其閭終司刑太常伯昭德強幹有父風擢明經如意元年拜鳯閣侍郎同鳯閣鸞臺平章事洛陽人王慶之請以武承嗣為皇太子后遣德昭詰其故昭德笞殺慶之餘黨散走因奏曰自古有姪為天子而為姑立廟乎當傳之子孫為萬世計后乃止時來俊臣侯思止舞文法數誅陷大臣昭德每奏其誣罔不道狀卒榜殺思止俊臣誣以逆謀既而俊臣亦下獄同日誅衆庶莫不冤昭德而快俊臣蘇珦藍田人中明經第調鄠尉鄠多訟珦裁決明辨自是無訟者垂拱初為監察御史武后欲殺韓魯諸王付珦密牒按訊珦推之無狀后詰之挺議無所撓遷右司郎中王宏義附來俊臣為酷珦按奏免之纍授左肅政臺御史大夫后營大像白司馬坂糜用億計珦切諫中宗將斬韋月將珦執據時令不可以大戮忤三思意改右臺纍擢户部尚書封河內郡公子晉舉進士為中書舍人元宗監國所下制命多晉屬藁屢進讜言後為吏部侍郎典二都選當時譽之終太子左庶子韋安石孝寬曾孫舉明經調雍州長史武后時為膳部貟外郎遷并州司馬有善政拜德鄭二州刺史久視中以鸞臺侍郎同鳯閣鸞臺平章事尋知納言事時二張及武三思寵橫安石數折辱之鳯閣侍郎陸元方自以為不及告人曰韋公真宰相神龍元年遷中書令封鄖國公睿宗立改封郇國太平公主有異謀欲引安石拒不往後為薑皎所搆貶沔州别駕卒韋叔夏安石兄通禮家學擢明經第厯春官貟外郎武后拜洛享明堂凡所沿革皆其所裁討衆咨服之中宗時轉太常卿纍封沛郡公國子祭酒子縚開元時厯太常卿請宗廟籩豆皆加十二又請室加籩豆各六又議定禘祫禮終太子少師李迥秀大亮族孫及進士第厯考功貟外郎武后愛其才遷鳯閣舍人中宗時厯兵部尚書迥秀母少賤妻嘗詈媵婢母聞不樂迥秀即出其妻後所居堂産芝草犬乳鄰貓中宗以為孝感旌大門閭韋湊萬年人永淳初解褐厯揚州法曹入為相王府屬時姚崇兼府長史嘗曰韋子識逺文詳恨晚得之睿宗時授鴻臚少卿徙太府景雲初作金仙等觀湊執爭之朝廷為減費萬計開元初纍官河南太原尹封彭城郡公韓思復長安人祖綸貞觀中厯左衛率封長山縣男思復少孤年十歲母為語亡父狀感咽幾絶舉秀才高第襲祖封永淳中家益窘歲飢京兆杜瑾以百綾餉之思復方并日食而綾完封不發調梁府倉曹參軍大旱輒開倉賑民開元初厯諫議大夫山東大蝗宰相姚崇遣使分道捕蝗瘞思復上言望陛下悔過責躬以答譴咎驅蝗使一切宜罷遷御史大夫性恬淡不喜為繩察纍遷吏部侍郎太子賓客卒帝親題碑曰有唐忠孝韓長山之墓子朝宗初厯左拾遺數直諌天寶初纍官京兆尹喜識拔後進嘗薦崔宗之嚴武於朝當世士咸歸重之朝宗孫佽元和初第進士纍遷桂管觀察使豪右畏戢韋維湊從祖叔謙之孫進士對䇿高第纍遷户部郎中善裁剖時貟外宋之問善詩故時稱户部二妙終太子左庶子子虛心舉孝廉遷大理丞侍御史神龍中按大獄竇懷貞劉幽求有所輕重虛心據正不撓景龍中屬羌叛既禽捕有詔悉誅虛心惟論酋長死原活其餘官至工部尚書弟虛舟厯洪解二州刺史入為刑部待郎安金藏長安人在太常工籍睿宗為皇嗣公卿不復見惟工優給使得進有誣皇嗣異謀者武后詔來俊臣問狀左右畏慘楚欲引伏金藏大呼曰公不信我言請剖心以明皇嗣不反引佩刀自剚腹中腸出被地眩而仆武后聞大驚輿至禁中命高醫內腸禠桑土紩之閲夕而蘇武后臨視歎其忠即詔停獄睿宗乃安神龍初母喪葬南闕口營石墳晝夜不息地本昻燥泉忽湧流廬側李冬有花犬鹿相擾詔表闕於閭明皇時擢右驍衛將軍爵代國公卒配享睿宗廟廷諡曰忠尹思貞長安人弱冠以明經第長安中厯秋官侍郎忤張昌宗出為定州刺史召授司府少卿神龍初擢大理卿雍人韋月將吉武三思大逆中宗命斬之思貞固爭出為青州刺史睿宗立召授將作大匠竇懷貞護作金仙玉真觀思貞數有節損懷貞讓之拂衣去帝知之特召令視事纍遷工部尚書前後為刺史十三郡皆以清最聞李適萬年人舉進士武后時預修三教珠英纍遷工部侍弼子季卿亦能文舉明經博學宏辭肅宗時為中書舍人大厯中終右散騎常侍在朝薦進才髦與人交有終始李尚隱萬年人舉明經再調下邽主簿神龍中左臺中丞侯令德為關內黜陟使尚隱佐之以最擢左臺御史崔湜鄭愔典選不平尚隱顯劾其罪湜等皆斥去纍遷御史大夫進户部尚書尚隱性剛亮論議皆披心示誠三入御史府繩惡吏不以殘鷙失名左遷復見用以循吏終始云唐紹臨孫神龍時為太常博士中宗始郊祝欽明奏以皇后亞獻安樂公主終獻紹引正誼固爭帝又詔武后陵及諸武墓皆置守户紹謂宜準常典睿宗即位數言政損益遷給事中兼太常少卿辛替否萬年人景龍中為左拾遺時置公主府官屬而安樂府輔授尤濫築第侈費過度公私疲匱替否上疏諫不省睿宗立罷斜封官千餘人俄復之方營金仙觀替否又切諫不能用稍遷右臺殿中侍御史雍令劉少微恃權貪贓替否按之岑羲屢以為請替否曰我為憲司懼勢縱罪謂王法何少微坐死纍遷潁王府長史李朝隱三原人中宗時厯大理丞武三思搆五王鄭愔請誅之朝隱獨以不鞫實不宜輕用法忤旨貶嶺南後遷吏部貟外郎時政出權幸不關兩省內授官但斜封其狀付中書即宣所司朝隱執罷千四百貟遷長安令宦官閻興貴有所干請曳去之成安公主奪民園不酬直朝隱取主奴杖之由是權豪斂伏開元初遷吏部侍郎銓敘明審為大理卿固爭裴景仙之死母喪召為揚州大都督固辭時年已衰而致毁瘠士人以為難終嶺南採訪處置使姚班思亷孫兄璹少孤撫昆弟友愛永徽中舉明經第武后時擢文昌左丞同鳯閣鸞臺平章事班勵學有立志擢明經厯六州刺史政皆有績遷太子詹事兼左庶子時節愍太子稍失道班凡四上書諌擢右散騎常侍遷祕書監睿宗立拜户部尚書班曾祖察嘗撰漢書訓纂而後之注漢書者多竊取為已説班著紹訓以發明舊義云李元紘萬年人父道廣武后時同鳯閣鸞臺平章事封金城侯元紘早修謹初為雍州司户參軍太平公主嘗與民競碾磑元紘還之民長史竇懷貞趣改之元紘大署判後曰南山可移判不可搖也開元初為萬年令賦役稱平擢京兆少尹詔決三輔渠時王主權家皆傍渠立磑瀦堨爭利元紘敕吏盡毁之分溉渠下田民賴其恩纍拜中書侍郎同中書門下平章事務峻涯檢抑奔競夸進者憚之後終太子詹事元紘再世宰相有清節其當國纍年未嘗改治第宅僮馬敝弱得封物賙給親族家無留儲崔沔長安人純謹篤孝有文章擢進士厯左輔闕當官正言不詘睿宗時為檢校御史中丞請發太倉粟及減苑囿鳥獸所給以振貧乏中書令張説數稱之遷中書侍郎沔喜論得失凡事多所異同説不悅出為魏州刺史後厯祕書監太子賓客朝廷有疑議皆咨逮取衷李皓淮安王神通元孫少孤事母孝張柬之見曰帝室千里駒纍擢衛尉少卿居母喪柴瘠訖除家人未嘗見言笑開元初厯汝州刺史檢校太原以北諸軍節度使皆有政績纍為太子少傅韓休長安人父大智洛州參軍其兄大敏仕武后為鳳閣舍人梁州都督李行褒為部人告變詔大敏鞫治或曰行褒諸李近屬后意欲去之無列其冤恐纍公大敏曰豈顧身枉人以死乎至則驗出之后怒卒殺行褒而大敏賜死休舉賢良擢左輔闕開元中拜黃門侍郎同中書門下平章事休直方不務進趨既為相天下翕然宜之時政所得失言之未嘗不盡明皇嘗獵苑中或大張樂稍過差必視左右曰韓休知否已而疏輒至嘗引鑑默不樂左右曰自韓休入朝陛下無一日歡何不逐去之帝曰吾雖瘠天下肥矣後罷為太子少師卒諡文忠子浩萬年主簿洪華州長史軍大理司直安祿山盜京師洪渾浩及洪四子皆為賊所殺肅宗以大臣子能死難贈浩吏部郎中洪太常卿渾太常少卿韋述宏機曾孫性嗜書舉進士開元初為櫟陽尉纍遷起居舍人撰武德以來國史文約事詳厯工部侍郎述典掌圖書餘四十年任史官二十年淡榮利為人純厚當世宗之著書二萬卷皆手校定古草隸帖祕書古器圖譜無不備所著書二百餘篇弟逌迪學業亦亞述與逌對為學士與迪並禮官縉紳高之韋繩維弟撫養宗屬孤幼無異情舉孝亷以母老不仕踰二十年乃厯長安尉威行京師擢監察御史更泗涇鄜三州刺史天寶初入為祕書少監明皇尚文視其職如尚書丞郎繩刋是圖簡以善職稱終陳王傅云韋陟安石子風格方整善文辭開元中纍遷禮部侍郎長於鑒裁取人無遺材遷吏部侍郎銓綜號為公平李林甫楊國忠忌之由是得罪肅宗即位授御史大夫江東節度使後為吏部尚書陟家法修整敕子允就學稍怠則立堂下不與語雖家童數十然應門賓客必允主之韋斌陟弟少修整好文藝容止嚴峭有大臣體與陟齊名開元中遷祕書丞厯太常少卿拜銀青光祿大夫子況少隱王屋山孔述睿薦為右拾遺不拜未幾以起居郎召半嵗輒棄官去元和初授諌議大夫勉諭到職數月乞骸骨以太子左庶子致仕當時重其風操韋抗安石從父兄子弱冠舉明經纍官御史中丞開元中為黃門侍郎進刑部尚書分掌吏部選抗居職清儉不治産及終無資以葬明皇特給槥車所表僚屬後皆為顯人韋見素湊子性仁厚及進士第天寶中為江西山南黔中嶺南道黜陟使繩糾吏治所至震畏遷文部侍郎銓敘平允拜武部尚書同中書門下平章事從帝入蜀兼左相封豳國公肅宗立持節奉傳國璽是歲十月有星犯昴見素言祿山之死日月皆驗纍拜尚書右僕射致仕子諤厯京兆府户曹參軍國忠之死軍聚不解陳元禮請殺貴妃帝猶豫諤請割恩以安社稷因叩頭流血帝寤賜妃死後終給事中賈會華原人有高節嘗稱疾不答辟署親亡負土成墓廬其左手蒔松柏時號關中曽子賈循會子有大略以功擢遊擊將軍李適之薦為安東副大都護安祿山表以自副祿山反使守幽州顔杲卿招之以傾賊巢穴循許可為向潤客等發其謀賊縊之建中二年贈太尉諡曰忠從子隱林為永平兵馬使屬朱泚難率衆扈行在賊圍急隱林冒矢石死戰已而解拜神䇿統軍第五琦長安人少以吏幹進肅宗時拜監察御史勾當江淮租庸使兼諸道鹽鐵使鹽鐵名使乃自琦始當軍興隨事輒辦不益賦而用以饒乾元二年進同中書門下平章事子峰婦鄭皆以孝著表闕於門于休烈仲謐曾孫機鑑融敏善文章開元初第進士擢制科纍遷比部郎中楊國忠為相斥不附已者出為中部郡太守肅宗立遷太常少卿知禮儀事兼修國史於時史籍燔缺休烈奏請購之獻五代論討著舊章帝嘉之代宗時纍遷工部尚書封東海郡公雖厯清要不治産性恭儉仁愛無喜愠之容樂賢下善推轂士甚衆年老篤意經籍嗜學不厭李嗣業高陵人膂力絶衆開元中從高仙芝討平勃律諸國以功進右金吾大將軍留為疏勒鎮使安祿山反詔與郭子儀犄角常為先鋒廣平王收長安嗣業統前軍陳於香積祠北賊精騎薄戰王師不能陳嗣業持長刀大呼出陳所向無前自日出至昃斬首六萬級遂平長安略定諸州封虢國公兼北庭行營節度使與子儀等圍相州諸將無功獨嗣業披聖數奮中流矢卧帳中方愈忽聞金鼓聲知與賊戰大呼創潰血流數升卒諡曰忠勇贈武威郡王李峴吳王恪孫世居京兆天寶時纍遷京兆尹出為零陵太守至德中復為京兆封梁國公乾元二年以中書侍郎同中書門下平章事時李輔國用權制誥或不出中書峴極言其惡帝悟稍加檢制輔國由是深銜之出為蜀州刺史代宗時復拜門下侍郎同中書門下平章事不踰月為要近所譖遂罷峴兄峘嶧與峘同時為御史大夫俱判臺事又合制封公嶧至户部侍郎龎堅涇陽人四世祖玉魁梧有力明軍法高祖時為領軍武衛二大將軍梁州總管安祿山反堅以長史守潁州賊將悉鋭攻之堅晝夜戰糧盡援絶被執不屈死程千里萬年人纍官安西副都護天寶末兼北庭都護討阿思布獻俘擢右金吾衛大將軍祿山反為上黨長史賊將蔡希德圍上黨千里率百騎欲直擒之幾得而救至乃退會橋壞馬顛為賊執謂從騎曰為我報諸將可失帥不可失城軍中皆為泣下增備固守賊不能下乃囚千里於東都後為所害路嗣恭三原人以世蔭為鄴尉連徙蕭關神烏姑臧令考績為天下最轉渭南令時關畿用兵使人係道嗣恭儲具有素而民不優大厯中為嶺南節度使封冀國公討斬哥舒晃還為兵部尚書子應貞元初為虔州刺史纍遷宜歙池觀察使李錡反發兵救湖常二州以故錡不能拔李泌京兆人七歲知為文明皇召試賦方圓動靜張説賀帝得竒童張九齡尤奬愛呼為小友天寶中待詔翰林供奉東宫楊國忠疾之斥置蘄春郡後謁肅宗於靈武入議國事出陪輿輦拜元帥廣平王行軍司馬帝曰卿侍上皇中為朕師今下判廣平王行軍朕父子貴卿道義二京平泌謀居多崔圎李輔國疾之泌畏禍乞隱衡山代宗立召還元載忌泌又出之德宗時拜中書侍郎同中書門下平章事纍封鄴縣侯順宗為太子帝有廢立意泌執爭至數十帝悟太子乃得安加集賢殿崇文館學士卒贈太子太傅泌出入禁中事四君數為權幸所疾常以智免時時讜議能寤移人主栁玭稱其功大於魯連范蠡云常衮京兆人天寶末及進士第性狷介不妄交遊纍為中書舍人文采贍蔚譽重一時魚朝恩兼國子監衮奏成均之任不宜以宦官領職帝誕日諸道爭以侈麗奉獻衮請還之又言諸祠寺寫經造像焚帛埋玉所賞賚歲巨萬計若以昜芻粟減貧民之賦福豈有量哉代宗嘉納拜門下侍郎同中書門下平章事後為福建觀察使卒於官韋倫京兆人以廕輔藍田尉幹力勤濟從明皇入蜀為劍南節度行軍司馬置頓判官中人衛本多侵暴倫以清儉自將西人賴濟乾元中為山南東道節度使李輔國方恣橫倫不肯謁憾之中罷為秦州刺史代宗立宦者吕太乙反嶺南詔拜倫韶州刺史為太乙反間斥棄十年德宗嗣位擢太常少卿使吐蕃諭天子威德贊普入獻進太常卿兼御史大夫數論政得失盧杞惡之改太子少保杞敗後帝欲復用𣏌為刺史倫苦諫乃止進太子少師郢國公致仕李勉鄭惠王元懿曾孫家京兆從肅宗靈武擢監察御史時武臣無法度大將管崇嗣背闕坐笑語喧縱勉劾不恭帝曰吾有勉乃知朝廷之尊擢太常少卿欲遂柄用而李輔國諷使下已勉不肯乃出為汾州刺史厯京兆尹兼御史大夫拜嶺南節度使進工部尚書封汧國公厯滑亳汴宋節度使興元初以檢校司徒同平章事卒贈太傅諡貞簡李涵永安王孝基曾孫簡素忠謹為宗室雋郭子儀表為關內鹽池判官再遷宗正少卿寶應初母喪奪哀持節宣慰河朔所至州縣非公事不言蔬飯水飲席地以瞑使還固請終制代宗見其癯毁許之韓滉休子至德中厯吏部貟外郎性強直明吏事以户部侍郎判度支數年德宗時為鎮海軍節度使遣將破走李希烈調發糧帛以濟朝廷當時賴之貞元初加檢校左僕射同平章事江淮轉運使封晉國公劉元佐不朝滉過汴諷之為辦裝犒軍元佐遂入朝滉雖宰相子性節儉衣裘茵袵十年一易居處僅蔽風雨不為家人資産初判度支李晟以禆將白軍事滉待之加禮使其子拜之後晟終立大功韓洄滉弟乾元中纍拜諌議大夫數上章言得失德宗時擢户部侍郎判度支積米長安萬年二縣各數十萬石視年豐耗而發斂人不艱食終國子祭酒姚南仲下邽人乾元初擢制科纍進右輔闕代宗詔近城為獨孤皇后陵以朝夕臨望南仲上疏諌帝嘉納進五品階以酬讜言德宗時拜義成節度使授尚書右僕射崔祐甫沔子第進士纍遷中書舍人性剛直遇事不回德宗即位拜中書侍郎同中書門下平章事薦舉惟其人不自疑畏推至公以行未踰年除吏幾八百貟莫不諧允淄青李正已畏帝威斷表獻錢三十萬緡祐甫請遣使勞其軍以所獻就賜將士正已慚服卒贈太傅諡文貞以弟之子植為嗣植博通經史為補闕數論得失長慶初拜中書侍郎同中書門下平章事馮河清京兆人始隸郭子儀軍拜左衛大將軍後從馬璘充兵馬使數遇吐蕃多效級名聞軍中德宗走奉天河清召諸將計事東向哭相勵以忠衆義其為無敢異言即發儲鎧完仗百餘乘獻行在六軍大振即拜河清涇原節度使安定郡王朱泚數遣諜人訹之河清輒斬以徇後為田希鑑所害贈太子太傅于邵萬年人天寶末第進士德宗時纍遷諫議大夫知制誥進禮部侍郎朝有大典册必出其手後出為杭州刺史貶衢州别駕徙江州卒邵孝弟有行晚塗益修潔奚陟京兆人大厯末擢進士召授左拾遺居親喪毁瘠過禮朱泚反走間道及車駕於興元貞元八年遷中書舍人江南淮西大水詔陟勞問循慰所至人人便安遷刑部侍郎裴延齡誣劾京兆尹李充遺陸贄金帛郎中崔元翰揣延齡指逮繫搒掠甚急陟白其誣元翰恚死尋遷吏部銓綜平允陟少著名節常薦權德輿楊於陵後皆有名韋臯萬年人六代祖範有功周隋間臯起家纍辟帥府德宗時以殿中侍御史知隴州行營留事朱泚反遣使以御史中丞授臯皋殺之泚復遣他奴拜臯鳳翔節度使臯亦斬之帝乃授臯隴州刺史置奉義軍拜節度使寵其功貞元初代張延賞為劍南西川節度使用功進檢校司徒兼中書令南康郡王卒贈太師諡忠武臯治蜀二十一年凡破吐蕃四十八萬其功烈為西南劇杜佑萬年人父希望開元中拜鄯州都督知留後破吐蕃城鎮西軍而還為宦者牛仙童所誣下遷恆州刺史佑以蔭輔濟南參軍建中初以户部侍郎判度支盧杞惡之出為饒州刺史遷嶺南節度使厯淮南節度貞元十九年拜檢校司空同平章事順宗憲宗初兩攝冢宰拜司徒封岐國公以太保致仕佑資嗜學雖貴猶夜分讀書著通典二百卷儒者服其書約而詳子式方以篤行稱官桂管觀察使式方子悰尚岐陽公主出入將相纍拜司空封邠國公悰弟慆咸通中為泗州刺史龎勛反圍城十月慆以忠義拊循士皆殊死卒完一州賊平遷義成軍節度使王紹太原人徙萬年少為顏真卿所器字之曰德素奏為武康尉包佶領租庸鹽鐵使署判官時李希烈阻兵江淮輸物留梗乃徙餉道自潁入汴紹入關德宗已西狩乃督輕貨趣間道走洋州由是紓難厯户部侍郎判度支頃之遷尚書主計凡八年每政事多所關訪順宗立出為東都留守元和初為武寧軍節度使復拜兵部尚書判户部杜黃裳萬年人擢進土第又中宏辭郭子儀辟佐朔方府入為侍御史為裴延齡所惡十期不遷貞元末纍遷太常卿王叔文用事黃裳未嘗過其門壻韋執誼輔政黃裳勸請太子監國執誼不聽即拂衣出皇太子總軍國事擢門下侍郎同中書門下平章事劉闢叛黃裳堅請討之因奏罷中人監軍而􅌹委高崇文凡兵進退皆自中指授蜀平帝目黃裳曰卿之功也始德宗務姑息方鎮選不出朝廷黃裳每具言宜鑒貞元之弊整法度朘損諸侯則天下治帝嘉納之由是平夏翦齊滅蔡平復兩河赫然號中興元和二年為河中晉絳節度使封邠國公卒贈司徒諡宣獻徐申京兆人擢進土第嗣曹王臯討李希烈申以洪州長史行刺史事皋表其能遷韶州刺史州民詣觀察使以其有功於人請為生祠申固讓進嶺南節度使劉闢反表請發卒五千循馬援故道搗闢不備詔可加檢校禮部尚書封東海郡公韋夏卿萬年人大厯中與弟正卿同舉賢良方正皆䇿高等厯吏部侍郎時從弟執誼在翰林嘗受人金有所干請密以納夏卿懷中夏卿曰吾與爾賴先人遺德致位及此顧當是哉執誼大慚纍官檢校工部尚書東都留守夏卿性通簡好古談説多聞人不見其喜愠撫孤姪恩踰已子為政務通理不甚作條教所辟士如路隋張賈李景儉等至宰相達官世稱知人任迪簡萬年人擢進士第天德李景略表佐其軍軍中悅其長者景略卒舉軍請為帥德宗乃授迪簡豐州刺史天德軍使入為太常少卿改易定節度使三年上下完充入除工部侍郎竇牟金城人纍佐節度府晚從昭義盧從史度不可諫即移疾歸從史敗不以覺微避去自賢位國子司業兄常弟羣庠鞏皆工詞章為聯珠集行於時許孟容長安人擢進士異等德宗時纍遷給事中自袁高爭盧杞後凡十八年門下無議可否者至孟容數論駮四方想見其風元和中為京兆尹神䇿軍吏李昱貸富人錢不償孟容遣吏捕詰使償曰不如期且死一軍盡驚訴於朝憲宗詔以昱付軍治之奏曰臣為陛下抑豪強錢未盡輸昱不可得帝嘉其守正許之京師豪右大震纍遷尚書左丞東都留守韋貫之名純以字行敻八世孫父肇大厯中為中書舍人纍上疏言得失為元載所惡左遷久之載曰肇若過我當處以善地終不詣載誅除吏部侍郎代宗欲相之會卒貫之及進士第再遷長安丞永貞時為監察御史權幸側目憲宗時厯禮部侍郎所取士抑浮華先實行流競為息改尚書右丞同中書門下平章事遷中書侍郎平淮西服鎮州皆如其䇿以張宿姦佞欲斥之為所搆罷穆宗立以工部尚書召未行卒貫之嚴身律下以正義裁物生平未嘗通饋遺故家無羡財韋綬貫之兄舉孝亷又貢進士禮部侍郎潘炎將以為舉首綬以其友楊凝親老讓之不對䇿凝遂及第後擢明經德宗時以左補闕為翰林學士密政多所參逮帝嘗幸其院韋妃從綬方寢學土鄭絪欲馳告之帝不許時大寒以妃蜀襭袍覆而去其待遇如此出入八年性謹畏甚終散騎常侍弟纁有精識兄弟皆名重當時令狐楚德棻之裔五歲能為詞章既及第厯桂管太原幕德宗每省太原奏必能辨楚所為數稱之憲宗纍擢翰林學士中書舍人文宗時政在宦宫數上書辭位終山南西道節度使楚外嚴重不可犯而中寬厚善撫御治有績人人得所宜子綯宣宗時為學士詔與論人間疾苦帝出金鏡書曰太宗所著也綯舉其要帝曰善後同平章政事柳公綽華原人幼孝友起居皆有禮法為吏部郎中憲宗數出遊畋公綽奏太醫針以諷帝置之坐隅拜御史中丞後遷刑部尚書京兆府有姑鞭婦至死者府欲殺之公綽曰尊毆卑非鬬也且子在以妻而僇其母不順遂減論太和中出鎮河東以病乞代授兵部尚書疾急忽顧左右召故吏謂諉以家事乃曰為我白宰相徐州専殺李聽親吏非高瑀不能安因不復語公綽居喪毁慕三年不澡沐事後母薛謹甚蒞官未嘗以私喜怒加人取士皆知名李夷簡鄭惠王元懿四世孫擢進士第憲宗時纍拜門下侍郎同中書門下平章事出為淮南節度使以直自間厯三鎮家無産資病不迎醫將終戒無厚葬母事浮屠母碑神道世謂行已能有終始者韓臯滉子資質厚重有大臣器䇿賢良方正異等纍拜尚書右丞王叔文用事臯嫉之謂人曰吾不能事新貴叔文怒出為鄂嶽蘄沔觀察使厯東都留守忠武軍節度使所至有績召拜吏部尚書進左僕射程異長安人居鄉以孝聞第明經纍遷衛尉卿鹽鐵轉運副使方討蔡異使江表調財用不加斂經用以饒元和中以工部侍郎同中書門下平章事猶領鹽鐵身殁官第無留資世重其亷白居易下邽人貞元中擢進士拔萃元和初入翰林為學士遷左拾遺奏凡十餘上後對殿中論執強鯁帝變色罷拜左贊善大夫出為江州司馬厯主客郎中知制誥轉中書舍人以言不見聽丐外遷為蘇杭二州刺史文宗立遷刑部侍郎二李黨事興居易恥緣黨人升乃移病分司東都會昌初以刑部尚書致仕卒贈尚書右僕射諡曰文居易文章精切尤工詩多至數千篇當時士人爭傳雞林行賈售其國相率篇易一金初與元微之酬詠號元白晚與劉禹錫齊名號劉白弟行簡擢進士第官主客郎中敏而有辭從祖弟敏中官至中書令韋丹孝寬六世孫高祖瑅以洗馬事太子承乾諫不聽太宗才之擢給事中終太子詹事丹早孤從外祖顏真卿學舉五經高第厯咸陽尉順宗為太子以殿中侍御史召為舍人詔拜司封郎中使新羅國故事使外國賜州縣十官賣以取資號私覿官丹謂不足於資宜上請安有貿官受錢即具疏所宜費帝命有司與之因著令還為容州刺吏以諫議大夫召有直名劉闢反議者欲釋不誅丹上疏言不可赦憲宗褒美纍遷江南西道觀察使卒後宣宗讀元和實録見丹政事卓然乃詔觀察使紇干泉上丹功狀命刻於碑子宙宣宗時為永州刺史多善政後拜江西觀察使南方以為世官纍加檢校尚書左僕射同中書門下平章事弟岫亦有名纍官福建觀察使韋顗見素孫早孤事姊恭順及長身不衣帛通陰陽象緯博知山川風俗議論典據厯御史輔闕與李約李正辭更進諷諌數移大事裴垍韋貫之李絳崔羣蕭俯皆布衣舊繼為宰相朝廷典章多所咨逮嘗曰吾儕五人智不及一韋公敬宗時厯吏部侍郎韋表微元禮七世孫擢進士第厯翰林學士時學士缺人人爭薦丞相所善者表微獨薦韋處厚人服其公又與處厚議增選學士復薦路隋處厚以諸父事表微因曰隋位崇入且翁右奈何答曰選德進賢初不計私也遷中書舍人文宗立進户部侍郎表微好春秋病諸儒是非紛然著三經總例又以學者薄師道著九經師授譜韋處厚萬年人事繼母以孝聞中進士第憲宗初擢右補闕數上書言皆忠切穆宗立為翰林侍講學士與路隋合上六經法言再遷中書舍人張平叔以言利得幸請官自鬻鹽處厚發十難誚其謬遂寢文宗時拜中書侍郎平章事勸帝近君子逺小人又言裴度忠可久任帝嘉納之處厚姿狀如甚懦者至廷爭嶷然不可回奪百僚畏惕未嘗敢及以私性嗜學家書讐正至萬卷柳公權公綽弟穆宗時以侍書學士再遷司封員外郎帝嘗問公權用筆法對曰心正則筆正帝改容悟其以筆諫也文宗時遷中書舍人嘗與六學士對便殿帝舉袂曰此三浣矣學士皆賀公權曰人主當進賢退不肖納諫諍明賞罰若服浣衣此小節耳其忠益多類此咸通時以太子太保致仕公權博貫經術其書法結體徑媚自成一家柳仲郢公綽子嗜學工文著尚書二十四司針為韓愈咨賞為左諫議大夫武宗延方士築望仙臺纍諌諄切咸通中終天平節度使仲郢父子更九鎮五為京兆再為河南皆不奏祥瑞不度浮屠急於摘貪吏濟單弱每旱潦必貸匱蠲負里無逋家子玼清直有父風官御史大夫昭宗欲倚以相中官譖罷之述家訓以戒子孫世傳為法李石襄邑王神符五世孫元和中擢進士第文宗時以户部侍郎同中書門下平章事進中書侍郎石以身徇國不恤近幸張權綱欲強王室收威柄仇士良疾之遂罷去弟福太和中第進士石當國薦福可任治人終太子太傅李賀系出鄭王七歲能詞章韓愈皇甫湜過其家使賦詩援筆輒就如素搆自目曰高軒過二人大驚自是有名為詩辭尚竒詭絶去翰墨畦徑當時無能效者以父名晉肅不肯舉進士為協律郎卒年二十七李漢淮陽王道元六世孫少事韓愈通古學愈以子妻之擢進士第纍遷左拾遺敬宗時漢言多所補救坐婞詰出佐興元幕府文宗時官至吏部侍郎論次憲宗實録書宰相李吉甫事不假借貶汾州司馬大中時又為宗正少卿杜牧佑孫善屬文第進士厯殿中侍御史內供奉時劉從誎守澤潞何進滔據魏博驕蹇不循法度牧追咎長慶以來朝廷措置無術復失山東嫌已不當位而言實有罪故作罪言後澤潞平略如其䇿纍遷中書舍人牧剛直有竒節不為齪齪小謹敢論列大事指陳利病尤切於詩情致豪邁人號為小杜以别杜甫云弟顗舉進士賈餗異之李德𥙿辟浙西府賓佐德𥙿貴盛賓客無敢忤惟顗數諌正之顗亦善屬文與牧相上下李從晦襄邑恭王神符六世孫寶厯初及進士第厯常州刺史鎮海軍山南西道節度使所至以風力聞少與崔龜從李景讓裴休善奬目後進名知人楊收方布衣進謁從晦一見如雅識即待以公輔後果至宰相韋溫綬子七歲日誦書數千言十一舉兩經及第以拔萃高等輔咸陽尉入為著作郎解歸侍親疾彌二十年衣不弛帶既居喪毁瘠不支服除頻遷右輔闕宰相宋申錫被搆罪不測溫率同舍伏閣切爭羣臣請上尊號溫固諫乃止李德𥙿入輔擢禮部貟外部或言與牛僧孺厚德𥙿曰是子堅正可以私廢乎鄭注節度鳳翔表為副溫拒不從再遷翰林學士固辭久之為給事中論駮王晏平尉遲璋事封上詔書武宗立擢吏部侍郎終宣歙觀察使盧鈞藍田人舉進士中第厯監察御史爭宋申錫獄知名出為華州刺史擢嶺南節度使南方服其德不懲而化以户部侍郎召判户部會昌中拜山南東道節度使徙宣武河東大中中以檢校司空同平章事為山南西道節度使懿宗初以太保致仕鈞居官必有績大抵根仁恕至誠而施於事位將相沒而無贏財韋正貫臯弟平之子平與臯斬朱泚使者間走奉天上功擢萬年尉正貫推蔭為單父尉舉賢良方正異等調華原尉又中詳間吏治科厯夀州團練使宣宗立以治最拜京兆尹擢嶺南節度使人服其清韋澳貫之子第進士復擢宏辭方靜寡欲十年不肯調御史中丞高元裕與其兄溫善諷澳謁已溫以告澳曰恐無呈身御史宣宗時纍遷兵部侍郎進學士承旨每見帝開陳可否未嘗不納改京兆尹帝舅鄭光主墅吏豪肆積年不輸官賦澳逮繫之帝問可貸否答曰陛下擢臣尹京邑安可使畫一法獨行於貧下乎太后為輸租乃免由是豪右斂迹出為河陽節度使懿宗時徙平盧又徙邠寧後以河南尹辭疾歸杜審權如晦六世孫第進士舉拔萃中為右拾遺宣宗時纍遷翰林學士承旨懿宗立進同中書門下平章事出為鎮海軍節度使入為尚書左僕射襄陽郡公繼領河中忠武節度卒審權清重寡言性長厚居翰林最久終不漏禁近語在方鎮視事有常處非日入未始就內寢坐必斂袵常若對大賓客與杜悰俱位將相世謂為小杜公王徽京兆人第進士宣宗時授右拾遺書二十餘上言無回忌進考功員外郎故事考簿以朱注上下為殿最歲久易漫吏輒竄易為姦徽始用墨遂絶妄欺廣明初為户部侍郎同平章事黃巢入關僖宗西狩徽為賊所執將汙以官徽陽瘖不答以刃脅肩卒不動守者懈乃奔河中詔拜諸道租庸供軍使因説都監楊復光請赦沙陀罪令赴難遂平京師進檢校司空御史大夫權京兆尹宦要家爭治第侵冒齊民訟訴滿前徽不屈勢幸一平以法昭宗立授吏部尚書進右僕射于琮休烈曾孫擢第授左拾遺尚廣德公主咸通中以兵部尚書同平章事僖宗時拜尚書右僕射黃巢陷京師以病卧家巢欲起為相琮辭疾賊迫脅不止乃曰吾死在旦夕位宰相義不受汙賊遂害之王處存萬年人僖宗時纍遷義武節度使黃巢陷京師處存號哭不俟詔分兵二千間道至山南衛乘輿外約王重榮連盟進屯渭橋中和二年授京城東面都統每痛國難未夷語輒流涕軍中多其義愈為之用素善李克用遣使十輩曉譬迎勸卒共平京師王鐸差興復功處存為第一進檢校司徒同中書門下平章事節度河中杜讓能審權子擢進士第以孝聞僖宗狩蜀奔謁行在為翰林學士讓能思精敏凡號令行下處事植機無所遺算帝走寶雞進狩梁間關嶮澀讓能未嘗暫去帝側擢兵郎侍郎同平章事昭宗立封晉國公進太尉景德二年討李茂貞宰相崔昭緯密遣人語茂貞曰上不喜兵一出太尉茂貞迎戰至三橋讓能請歸死以紓國難帝泣下不能巳乃賜死復贈太師韓偓萬年人擢進士第為翰林學士遷中書舍人嘗與宰相定䇿誅劉季述昭宗反正為功臣帝西幸偓夜追及鄠至鳯翔遷兵部侍郎進承旨偓處可機密率與帝意合欲相者三四朱全忠怒其薄巳貶濮州司馬帝執其手流涕曰我左右無人矣偓挈其族南依王審知而卒五代唐任圜三原人李嗣昭節度昭義辟圜觀察支使梁兵圍潞州踰年救兵皆去圜勸嗣昭堅守巳而莊宗攻破梁圜由是知名從戰胡栁有功莊宗勞之曰仁者之勇也明宗時拜同中書門下平章事兼判三司圜選辟才俊抑絶僥幸公私給足天下便之李懌京兆人少好學工文辭唐末舉進士天成中纍遷尚書右丞承旨張文寶知貢舉所放進士中書有覆落者命懌作詩賦為貢舉格懌笑曰豫少舉進士登科偶然耳假令復就禮部試未必不落第安能與後生英俊為準格聞者多其知體周王易簡萬年人少好學工詩梁乾化中舉進士擢第晉初判宏文館史館事晉祖治求速效易簡上漸治論以諌之詔付史館厯吏部侍郎左丞判吏部銓號為舉職廣順初遷禮部尚書改刑部致仕宋杜漢徽長安人有膂力善騎射晉漢周時戍邊州屢破遼兵宋初領茂州刺史改潮州從平李筠李重進録功居多纍官雄武軍使張保續萬年人由通事舍人纍遷客省使宋初遷衛尉卿判四方館客省閣門事性介直好儉素在閣門前後四十年善宣贊辭令纍使藩國不辱命韓溥長安人唐相休之裔孫周顯德初舉進士開寶三年為監察御史厯司門郎中博學善持論詳練臺閣故事多知唐朝氏族號為近世肉譜梁延嗣長安人少事高季興頗見委任厯事四帥人稱其忠盡繼沖納土太祖授延嗣復州防禦使撫慰之曰使高氏不失富貴爾之力也改濠州防禦使有善政崔翰萬年人太祖時以功纍官端州刺史太平興國二年授殿前都指揮使從征太原命總侍衛馬步諸軍流矢中其頰督戰益急知定州大破遼兵以功擢武泰軍節度使後移鎮安軍卒翰驍勇有謀所至多立功輕財好施死之曰家無餘資楊礪鄠人建隆中舉進士甲科父喪絶水漿數日解褐鳳州推官以母疾棄官真宗尹開封礪為推官真宗甚重之纍官工部侍郎樞密副使咸平二年卒真宗冒雨臨其喪礪僦舍委巷中乘輿不能進步至其地嗟憫久之宋璫渭南人乾德中進士及第擢著作佐郎知綿州太宗時厯知泰州益州皆有善政淳化中改知蘇州卒璫性清簡厯官三十年未嘗問家事惟聚書以貽子孫寇準下邽人年十九舉進士為鹽鐵判官極陳利害擢樞密院直學士叛吏部銓嘗奏事殿中語不合帝怒起準輒引帝衣令帝復坐事決乃退太宗嘉之曰朕得寇準猶文皇之得魏徵也景德元年同中書門下平章事遼兵大入中外震駭準獨請帝親征遂幸澶州遼乃奉書請盟河北罷兵準之力也王欽若譖之遂罷後復相為丁謂所搆貶雷州司户參軍卒後贈中書令萊國公諡忠愍王凱京兆人曾祖全斌本太原人祖審鈞為永興軍駐泊都監以擊賊死遂家京兆寇準守長安見其狀貌竒之薦為三班奉職元昊反徙麟州都監厯并代州鈐轄屢破夏人厯武勝軍節度使凱治軍有紀律善撫循士卒平居與均飲食至臨陳援枹鼓毅然不少假借故士卒畏信戰無不力孫詵能詩善畫尚蜀國長公主官至留後史序京兆人善推步算數知司天監事淳化中修儀天厯上之又嘗纂天文厯書為十二卷以獻序慎密勤職在監三十年未嘗有過衆頗稱之李建中京兆人幼好學太平興國中進士甲科官太常博士表陳時政利害序王霸之略太宗嘉賞建中性簡靜風神雅秀怙於榮利前後三求掌西京御史臺好吟咏善書札行草尤工宋湜長安人父溫故與弟溫舒皆有時名湜幼警悟早孤與兄泌厲志篤學事母以孝聞太平興國進士咸平元年以給事中充樞密副使從真宗北巡卒湜器識沖逺美文詞工書善談論又好趨人之急當世士流翕然宗仰之溫舒子澥有清節居長安不仕與种放魏野遊多篇什酬唱澥弟濤端拱初進士知襄城縣以政績聞纍遷監察御史知虢州李若拙萬年人舉進士擢上第又登賢良方正直言極諌科改著作佐郎雍熙三年假祕書監使交州黎桓制度踰僭若拙戒以臣禮由是桓聽命拜詔盡恭燕饗日以竒貨異物列於前若拙一不留盼帝謂其不辱命厯知升貝二州卒子繹幼謹願第進士厯知華貝延等州所至稱治三知鳳翔府終右諌議大夫繹自以久宦在外嘗作五知先生傳謂知時知難知命知退知足也甄婆免鄠縣人母劉為同里董知政擊殺婆兒方十歲避仇徙居赦村後數年稍長大寒食具酒殽詣母墳慟哭歸取條桑斧置袖中往見知政以斧斫其腦殺之有司以其事上請太宗嘉其能復母讐特貸焉惠從順京兆人十世同居太宗時詔表門閭張佶胃南人少有志節咸平初擢陜西轉運副使至延安過夏入寇親督兵擊敗之厯為麟府益州邠寧鈐轄天禧中拜西上閣門使復為涇原鈐轄佶涉獵書史勇敢善射有方略其總戎護塞以威名自任元守全長安人五世同居真宗時旌表仍蠲其課調李仕衡成紀人後家京兆府進士及第調鄠縣主簿田重進守京兆命仕衡鞫死囚五人活者四人重進即其家謂曰子有隂施此門當高大之寇準薦其材纍遷度支副使厯河北陜西轉運使知天雄軍青州入為三司使仁宗初拜尚書左丞前後管計事二十年才智過人子丕緒纍官司農卿居官亷靜家多圖書集厯代石刻為數百卷李仲容萬年人祖濤仕漢拜平章事仲容舉進士甲科除大理評事知三原縣天聖中纍遷右諌議大夫至户部侍郎性醇易不與物忤與人言未嘗及勢利三弟早卒字其諸孤十餘人如己子當世稱其長者自集制草為冠鳯集十二卷趙瞻其先亳州永城人徙盩厔舉進士第厯知萬全夏縣永昌皆有善政治平初除侍御史英宗遣內侍為陜西諸路鈐轄瞻請追還責成守臣吕誨等諌濮議罷去瞻乞與同貶遂通判汾州神宗時為開封府判官言青苗法不便王安石欲瞻助己使其黨餌以知雜御史瞻不應由是不得留京師元祐初纍官同知樞密院事所著有春秋論史語抵牾論唐春秋等書吕大忠其先汲郡人後家藍田登第為華隂尉晉城令厯僉書定國軍判官熙寧中王安石議立緣邊封溝大忠陳五不可使遼議代北地與之力爭元豐中為河北轉運判官上生財養民十二事河決蝗災入對極論之元祐中知秦州有治聲後以寶文閣直學士知渭同二州致仕吕大防大忠弟由進士第厯監察御史裏行英宗時首言紀綱賞罰未厭四方之望議濮王稱考謂顧私恩違公議章纍十數上元豐初知永興軍神宗以慧星求言大防陳三説九宜纍數千言時用兵西夏調度百出有不便者輒上聞務在寬民及兵罷民力比他路為饒供億軍需亦無乏絶元祐初封汲郡公拜尚書左僕射兼門下侍郎興范純仁並位同心戮力以相王室進退百官不可干以私不市恩嫁怨以邀聲譽八年始終如一後為章惇等所搆貶死大防自少持重無嗜好兄弟同居相切磋論道考禮冠婚喪祭一本於古關中言禮學者推吕氏紹興初贈太師宣國公諡正愍吕大鈞大防弟中乙科知三原縣後為鄜延轉運使從事卒大鈞從張載學能守其師説而踐履之冠婚喪祭一本於禮關中化之尤喜講明井田兵制悉撰次為圖藉可見於用載每嘆其勇為不可及吕大臨大鈞弟學於程頤與謝良佐遊酢楊時在程門號四先生通六經尤邃於禮元祐中為太學博士遷祕書省正字范祖禹薦其好學修身如古人可備勸學未及用而卒陳求道咸寧人登進士第靖康問判都水監二帝出郊請和求道力爭之不聽金人立張邦昌下令在京官不朝者死求道竟不往建炎四年高宗命為襄鄧隨郢鎮撫未行自咸寧挈家就食嘉魚值亂兵起乃之蒲圻寓龍堂僧寺招撫劉忠叛一夕數千人麇至驅求道至茗山具酒食奉為主將南走湖湘求道正色厲辭賊怒殺其妻蔡及二子符佺求道罵愈厲賊斫其口拔舌斷之獨符子凱竄山谷得免劉化源耀州人紹興進士建炎初金兵陷關陜化源知隴州不肯降城陷被執使人守之不得死遂驅入河北鬻蔬果隱民間者十年終不屈辱劉長孺耀州人博州判官與劉豫書備陳祖宗德澤勸以轉禍為福豫怒囚之百日終不屈紹興中宣諭使周聿上之朝詔赴行在命轉兩官奉祠其後金復渝盟長孺之華隂不屈而死李好義下邽人弱冠從軍善騎射開禧初為興州正將吳曦叛好義與其兄謀誅之約立長史安丙以主事遂率李貴等七十四人入偽宫斬曦首馳告安丙宣詔軍民拜舞撫定城中市不改肆好義請乘時取關外四州丙從之十戰至山寨高堡七日至西和金西和節度使完顔欽奔遁好義遂以中軍統制知西和州曦將王喜遣其黨毒之遂卒居民號慟如喪私親贈檢校少保諡忠壯金蕭貢咸陽人大定中進士纍官翰林修撰上書言擢真才核功能慎名器重守令然後政化可行百事可舉又論時政五弊言路四難詞意切至厯户部尚書致仕貢好學讀書至老不倦有注史記一百卷楊達夫三原人泰和中進士有才幹嘗主鄠縣簿事一從簡吏民樂之達夫亦愛其山水之勝因家焉會有詔徙民東入關達夫與衆行及韶為遊騎所執將禠衣害之達夫挺然直立曰我金國臣子既為汝所執不過一死忍祼袒以黯天日耶遂見殺元李邦瑞臨潼人幼嗜學讀書通大義嘗被掠逃至太原為金將小史穆呼哩攻下諸城堡金將走邦瑞率衆來歸復居太原守臣惜其材具鞍馬遣至行在所受旨使宋道出蘄黃宋遣賤者來迎邦瑞怒叱出之宋改命行人乃議如約而還從諸王庫春經略河南凡所厯州郡繪圖以進授金符宣差軍儲使穆呼哩舊作木華黎庫春舊作闊出今並改賀仁傑鄠人父貴數從軍有功關中兵後積尸滿野賁買地收瘞之嘗於毁垣中得白金七千五百兩持五千兩獻世祖以助軍世祖即位賜金符總管京兆諸軍鄂囉仁傑從世祖南征雲南北征納延皆著勞績居中事上知無不言多所裨益而言不外泄帝深愛重之帝欲選民間童女以充後宫及有司買物多非其土産山後鹽禁久為民害皆奏罷之民為之立祠為上都留守纍加中書右丞大德中請老仁宗時諡忠貞追封奉元王鄂囉舊作奧魯納延舊作乃顔今並改蕭㪺奉元人性至孝讀書南山者三十年博極羣書及門受業者甚衆世祖辟侍秦邸以疾辭大德末拜太子右諭德入覲東宫書酒誥為獻疾作歸卒賜諡貞敏㪺制行甚髙真履實踐其教人必自小學始為文立意精深一以濓洛考亭為據關輔之士翕然宗之稱為一代醇儒韓擇奉元人天資超異信道不惑其教學者雖中歲以後亦必使自小學等書始曰人不知學白首童心且童蒙所當知而皓首不知可乎擇尤邃理學有質問者口講指畫無倦容士大夫遊宦過秦中必往見擇世祖嘗召之赴京疾不果行及卒門人為服緦麻者百餘人同恕奉元人父繼先博學能文同居二百口無間言恕年十三以書經魁鄉校仁宗時三召不起領魯齋書院教事先後來學者千數後以太子左贊善召入見東宫厯陳古誼盡開悟涵養之道英宗初以疾歸其學由程朱上遡孔孟教人曲為開導平居雖大暑不去冠帶事異母如所生父喪哀毁至目疾自京還家居十三年縉紳望之若景星麟鳳鄉里稱為先生而不姓卒贈翰林直學士諡文貞楊恭懿奉元人力學強記書無不讀尤深於易象春秋後得朱子集注四書歎曰人倫日用之常天道性命之妙皆萃此書矣父殁水漿不入口者五日居喪盡禮至元中與許衡俱被召恭懿不至太子下教中書聘之乃至尋歸田里後召於太史院改厯授集賢學士兼太史院事辭歸蕭道壽興平人家貧鬻筬以自給母年八十餘道夀事養盡禮每旦候母起夫婦親侍盥櫛日三飯必侍母食然後退就食至夕必待母寢然後退就寢出外必以告母許乃敢出母或怒欲罰之道夀自進杖伏地以受杖足母命起起復再拜謝違教拱立左右俟喜色乃退母嘗有疾醫纍歲不能療道夀刲股肉啖之而愈至元八年詔賜羊酒表其門第五居仁奉元人師蕭㪺同恕博通經史躬率子弟致力農畝而學徒滿門雅量能容人嘗行田閭遇有竊桑者居仁輒避之鄉里高其行義率多化服遊其門者學明行修及卒門人私諡靜安先生侯均奉元人父母早亡獨與繼母居賣薪以給奉養積學四十年羣經百氏無不淹貫名震關中用薦者起為太常博士後以上書忤時相意即歸田里不復仕賀勝仁傑子嘗從許衡學通經傳大義年十六入宿衛凝重寡言世祖甚器重之納延叛帝親征勝直武帳中雖親王不得輒至勝傳旨飭諸將詰旦合戰矢交帳前勝立侍不動帝一日獵還勝參乘伶人蒙采毳作獅子舞以迎駕輿象驚奔逸不可制勝投身當象前後至者斷靷縱象乘輿乃安大德中代父仁傑為上都留守民德之為立祠上都西門外後為丞相特們德爾所害至正中追封涇陽王諡忠宣子惟一中書左丞相監修國史納延改見前特們德爾舊作鐵木迭兒今改李子敬三原人嫁不能嫁者五十餘人葬不能葬者五十餘喪焚逋劵四萬餘貫大德中旌之劉德奉元人父娶後妻何氏德事之如所生家貧傭工取直寸錢尺帛皆上之四弟並何出德撫愛尤篤年五十未娶稱貸得錢先為弟求婦諸弟亦化其德一門藹然明張紞富平人洪武中舉明經厯官雲南左布政使凡十三年治行為天下第一建文時召為吏部尚書所選用皆當其才成祖即位紞自經於吏部後堂李昶涇陽人洪武中由鄉舉厯官户部郎中成祖即位命安撫北平郡縣綏輯有恩北京設行部用為侍郎行部廢調官户部嘗扈從北征轉運不絶宣德中進尚書専督倉場勤恪不懈亷正有守為朝論所重高士文咸寧人永樂初纍戰功進都督僉事從張輔征交址黎季犛既擒餘黨竄七源山谷中士文率所部圍其寨寨垂破賊突走士文追與戰中炮死所部復追之賊遂潰朝廷念士文功追封建平伯命其子福嗣爵楊鼎咸寧人正統中舉鄉會試第一殿試第二授編修景泰中由中允超擢户部侍郎成化時進尚書掌國計十餘年持身亷謹卒贈太子太保諡莊敏子時暢官侍講學士多識典故有用世才時敷廬墓被旌官兵部司務王恕三原人正統進士選庶吉士知揚州府以治行最超遷江西右布政使成化初擢副都御史巡撫荆襄移撫雲南劾中官錢能交通安南直聲動天下改掌南京都察院參贊機務進兵部尚書又巡撫江西復改南京兵部尚書先後應詔陳言者二十一建白者三十九皆力阻權幸天下傾心慕之時為謡曰兩京十二部獨有一王恕由是貴近側目遂致仕歸孝宗立召為吏部尚書益以身任國事一時正人及賢才久廢者拔擢恐後宏治二十年間衆正盈朝號為極盛者恕之力也當時稱名臣必首恕晚年究極聖學著石渠意見多前賢未發卒年九十三贈太師諡端毅姚顯咸陽人正統中以鄉舉入太學初王振修大興隆寺奉僧楊某為上師儀從侔王者景泰時顯上疏切諌後為齊東知縣移武城公亷剛正用薦擢太僕丞邢簡咸寧人少力學有志尚登景泰進士知真定府治行稱最成化中為順天府尹亦有聲終户部右侍郎為人亷介強明卒之日囊無餘資士大夫莫不賢之張漣醴泉人少孤祖繼殁漣年十二每晨起詣墓所哀號閲三年不改負土營墳有白鵲巢其旁乳哺不驚母殁亦廬墓終喪天順初旌李錦咸寧人受業於周蕙獲洛閩之學天順中以鄉舉入太學為祭酒邢讓所知令諸子受業及讓坐事下吏錦率衆抗章白其非辜幼喪父事母色養執喪盡禮巡撫余子俊欲延為子師錦以齊衰不入公門固辭所居僅蔽風雨布衣糲食義不妄取成化中授松江同知卒於官駱森涇陽人為諸生親喪身營冢域廬其旁泣血五載成化中旌薛敬之渭南人五嵗好讀書長從秦州周蕙遊雞鳴輒灑揥設座跪而請教成化初以歲貢生入國學與同舍陳獻章並有名會父母相繼殁號哭徒行大雪中遂成足疾母嗜韭終不食韭授應州知州課績為天下第一宏治時遷金華同知致仕卒所著有道學基統洙泗言學録爾雅辨音思菴野録雍泰咸寧人成化進士知吳縣有治行擢御史厯山西按察使浙江布政使宣府巡撫所至好擊強豪恤貧弱坐事奪職正德初起前官擢南京户部尚書太監劉瑾泰鄉人也怒泰不與通甫四日即令致仕瑾誅復官泰奉身儉素為尚書無緋衣及卒家人始製以斂天啓中諡端惠梁澤三原人初為縣椽令閲其所書牘竒之俾就學成化中成進士以庶吉士改御史巡按貴州山東彈劾無所避為忌者所中謫茶陵知縣厯浙江參政所至以廉惠稱李崙咸寧人成化進士知屯留縣治行為山西最擢户部主事厯郎中積弊盡革纍遷河南左參政崙制行高優經濟既殁妻子不能自存詔有司月給米一石張鼎咸寧人父亷知蒲州鼎從之任受業於河東薛瑄能恪守其師説成化中舉進士厯刑部員外郎見其鄉邊事日殷水旱繼作因陳八事多採納遷知太原府大得民和賜誥旌異宏治初以右僉都御史巡撫保定鼎操行潔素所至務惠民以所部多盜令屬府縣沿途築牆禦之民久而蒙其利終户部侍郎楊宏西安左衛人成化中嗣世職為本衛指揮使宏治初掌衛事練士馬均力役抑豪強軍政清肅纍進總兵官鎮成都擒大盜鄢本恕破方四擊敗廖麻子曹甫於營山蓬州間世宗初督漕運鎮淮安多所釐正淮人德之終僉書南京中府王承裕恕子七嵗能詩弱冠著太極動靜圖説宏治中舉進士恕致政承𥙿即告歸侍養起授兵科給事中出理山東河南屯田多善政武宗立遷吏科都給事中以言事忤劉瑾罰米輸塞上嘉靖時纍官南京戶部尚書清逋稅一百七十萬石積羡銀八萬四千餘兩帝手書清平正直褒之張漣耀州人由進士擢御史巡按湖廣劾治劉瑾黨總兵毛倫罪武宗駐蹕太原有儀賓坐殺人繫獄賄江彬彬矯詔赦之漣奏論如法厯官户部侍郎忤張孚敬乞休歸里居布衣徒步常獨行為執鞭者所擊既知為漣也叩頭謝漣笑而遣之熊玻涇陽貢生親喪廬墓賊過不忍犯宏治中旌後官獲鹿知縣周尚文西安後衛人幼讀書粗識大義多謀略善騎射年十六襲指揮同知屢出塞有功進指揮使嘉靖時纍鎮涼州寧夏山西延綏皆有破賊功用薦為東官廳聽征總兵官兼僉後府事嚴嵩子世蕃為後府都事驕蹇無狀尚文向叱將劾奏之嵩亟謝得免調世蕃治中以避尚文銜刺骨尋出鎮大同與總督翁萬達等戮力封疆規畫戰守甚備邊民息肩者數年纍功加太保兼太子太傅尚文清約愛士得士死力善用間知敵中曲折故戰輒有功威名最盛嚴嵩父子時謀傾陷而尚文功高帝方向之讒不得入及卒格恤典不豫穆宗立始贈太傅諡武襄吕柟高陵人正德初進士第一授修撰劉瑾以鄉人致賀卻之已疏請武宗還宫御經筵親政事益忤瑾遂引疾去瑾誅還朝上敬學疏復應詔陳六事皆切時政以父病解職歸世宗嗣位首召柟上疏勸帝勤學為新政之助以論大禮下詔獄謫解州判官纍遷南京禮部右侍郎忤夏言致仕柟受業渭南薛敬之接河東薛瑄之傳學以窮理實踐為主官南都與湛若水鄒守益共主講席東南士人多出其門仕宦三十餘年家無長物終身未嘗有惰容及卒里中為罷市四方學者皆設位持心喪後贈禮部尚書諡文簡杜鸞咸寧人正德末進士授大理評事嘉靖初爭大禮杖午門外長沙盜李鑑行劫被獲席書撫湖廣劾知府宋卿故入鑑罪逮至京鸞會御史訊無異詞因劾書以惡卿故為鑑奏辨又李福達之獄鸞司其牘力斥郭勛姦邪已而桂萼等力反前獄鸞坐除名馬理三原人從王恕遊由卿薦入國學名重都下安南使者至問關中馬理先生何在正德中舉進士擢吏部主事偕郎中張衍瑞等諌帝南巡詔跪闕門豫杖嘉靖初為員外郎爭大禮再豫杖遷考功郎劉瑾黨人莊繹以瑾敗落職至是求復理力持不可大計外吏大學士賈詠尚書廖紀以私憾欲去副使魏校蕭鳴鳳唐龍理力爭乃止厯南京光祿卿致仕理學行純篤與吕柟並為關中所宗隆慶初贈右副都御史天啓初追諡忠憲張原三原人正德中進士授吏科給事中疏陳汰冗食慎工作等六事權幸惡之謫新添驛丞嘉靖初復官南安伯毛良殺其子錦衣指揮朱宸等多違縱原劾之皆奪職前後章數十上不避權貴時號敢言尋以爭大禮伏左順門哭諌繫獄再受杖而卒後贈光祿少卿許宗魯咸寧人正德中進士擢御史巡按宣大劾武定侯郭勛太監蕭敬時以為敢言纍遷右僉都御史巡撫保定又撫遼東在任多所建置裴紹宗渭南人正德中進士知海門縣武宗南巡受檄知江都縣貴幸憚之供億大省擢兵科給事中疏請世宗法祖定制并請日御便殿親儒臣帝嘉納之帝欲加興獻帝皇號紹宗力諌尋以爭大禮受杖卒後贈光祿少卿盧紳咸寧人嘉靖初進士知遂寧縣有異政厯荆南副使貴州按察使終南京户部尚書居官務修實政以孝友恭儉稱於鄉雒昻三原人嘉靖初進士擢吏科給事中劾大學士張孚敬復劾左都御史汪鋐已薦致仕尚書羅欽順趙璜等屢忤旨厯右副都御史巡撫河南會鈞州知州陳吉發徽王過失王自訟帝怒逮吉及昻竟死杖下隆慶初贈户部右侍郎王準世籍秦府儀衛司嘉靖初進士擢禮科給事中巡視京營劾郭勛等恣罪又劾張璁桂萼引用私人璁萼罷準亦下吏謫富民典史稍遷知縣都御史汪鋐希璁旨以考察罷之楊爵富平人年二十始讀書家貧燃薪代燭從朝邑韓邦竒遊以學行名嘉靖中舉進士授行人帝方崇飾禮文爵上言臣奉使湖廣見民挈筐操刃割道殍食之假令周公制作盡復於今何輔老羸飢寒之衆奏入被俞旨擢御史以母老乞歸母喪廬墓冬月筍生推車糞田妻饁於旁見者不知其為御史也服闋起故官時郭勛用事歲頻旱帝日夕建齋醮經年不視朝爵上疏極諫帝震怒立下詔獄搒掠血肉狼籍關以五木周天佐浦鋐以救爵先後箠死無敢言者厯五年得釋抵家甫十日復逮繫獄又三年始還後贈光祿卿諡忠介吕濳涇陽人父應祥禮科給事中潛從學於髙陵吕柟柟甚重之生平言行一以柟為法母病革欲識其婦面命之娶潛娶而不婚嘉靖中舉於鄉與里人郭郛講學谷口洞中從遊者甚衆薦授國子學正舉行柟為祭酒時學約遷工部司務卒郛嘉靖中舉人學以持敬為主官終馬湖知府又同邑張節從湛若水吕柟遊柟稱其守道不歸魏學曾涇陽人嘉靖中進士纍遷右僉都御史巡撫遼東有治績入厯吏部左侍郎穆宗崩大學士高拱被逐學曾獨曰上踐祚伊始奈何輒逐顧命大臣忤張居正出為南右都御史被劾歸居正殁起南京户部右侍郎召為右都御史督倉場尋以南京户部尚書致仗後復以兵部尚書總督陜西延寧甘肅軍務布巴反賜尚方劍督戰檄諸將復河西諸堡圍賊於寧夏鎮城決黃河水灌之功無成被逮奪職踰月而賊平詔復原官致仕布巴舊作哱拜今改鄒應龍長安人嘉靖中進士由行人擢御史時嚴嵩專政久廷臣攻之者輒得禍皆莫敢言應龍上疏乞斬世蕃而黜嵩帝遂勒嵩致仕下世蕃等詔獄擢應龍通政參議遷太常卿省牲北郊劾太監馮保僭肆隆慶初以副都御史總理江南江西鹽屯黔國公沐朝弼驕恣改應龍兵部右侍郎巡撫雲南至則發其罪朝弼竟被逮萬厯初馮保修卻削籍卒尋復官孫丕揚富平人嘉靖中進士隆慶初厯大理丞以嘗劾高拱為拱黨誣劾落職拱罷復官萬厯初擢僉都御史巡撫保定境內大治以忤張居正及中官馮保引疾歸起厯户部侍郎河北大飢言於帝罷諸加派遷刑部尚書獄無滯囚改五歲恤刑之制為歲一舉行又條上省刑罰各三十二事自是刑獄大減改左都御史拜吏部尚書始創掣籖法凡大選急選悉聽其人自掣請寄無所容以數請起廢弗納遂歸帝念丕揚廉直召起故官黜陟咸當而諸不得志者深銜之所薦耆舊名臣又不用力求去卒贈太保天啓初諡恭介李世達涇陽人嘉靖中進士為吏部郎中有名萬厯中厯右副都御史督漕運遷南兵部侍郎進尚書參贊機務俄召為刑部尚書遇事敢於執奏出入平允改左都御史勸帝容納讜言又請建儲與吏部尚書孫鑨同主京察斥政府私人殆盡乞休歸世達練于事體直而不激通而不隨有古大臣風卒諡敏肅王之士藍田人嘉靖中舉於鄉潛心理學嘗為養心圖定氣説書之座右閉關不出者九年敦行吕氏鄉約鄉里化之祭酒趙用賢薦於朝授國子博士除目下而之士巳卒溫純三原人嘉靖末進士厯兵科都給事中謇諤敢言出為湖廣參政萬厯中纍遷左都御史極諫礦稅之害請盡捕言利姦人亟撒稅監之害民者不報乃率諸大臣伏闕泣請帝震怒問誰倡者對曰都御史臣純帝為霽威已而稅使多激變純又抗疏言之以力爭妖書楚藩事與沈一貫忤羣小攻詰不已力求去純清白奉公五主南北考察澄汰悉當肅百僚振風紀時稱名臣卒贈少保諡恭毅雒遵涇陽人嘉靖末進士厯吏科都給事中神宗初馮保竊權帝每御殿保輒侍立御座遵劾其無禮尋以劾兵部尚書覃綸謫浙江布政使照磨保敗纍遷光祿卿改僉都御史巡撫四川孫瑋渭南人萬厯中進士擢兵科給事中劾中官魏朝及東厰辦事官鄭如金罪下詔獄又劾福建巡撫勞堪貪虐堪免官皆馮保黨也厯右副都御史巡撫保定救荒恤民治聲大著三遷倉場尚書兼攝户兵二部事瑋言臣所知大僚吕坤劉元震等庶僚鄒元標等皆堪任用何必以纍纍三印悉卑之臣弗聽厯兵部尚書掌左都御史事豫告天啓初召拜刑部尚書改吏部再掌都察院事疾篤上疏薦諸正人勸帝修德卒贈太子太保魏忠賢用事追誥命崇禎中復還之諡莊毅南企仲渭南人祖大吉與叔祖從吉皆進士子孫科第相繼企仲萬厯中進士以祖母年高請終養為張居正所惡下撫按推問已授刑部主事客寓資其家夫婦並殁呼其子還之吏部尚書孫丕揚以為賢調為已屬厯文選郎遷太僕卿帝免礦稅釋囚録建言貶斥諸臣既而悔之企仲請如詔奉行帝大恚詔落一官尋削籍大啓時起太常卿至南京吏部尚書致仕李自成陷渭南企仲時年八十三遇害子居業禮部主事亦不屈死張問達涇陽人萬厯中進士擢給事中纍疏請停礦稅以右僉都御史巡撫湖廣政聲甚著召拜刑部侍郎厯左都御史受光宗顧命天啓初遷吏部尚書連掌內外大計悉叶公論挺擊紅丸移宫三案並經其手持論平允不激不隨乞休歸魏忠賢誣以贓私削職下吏按問尋卒崇禎初贈太保雒于仁遵子萬厯中進士厯大理評事疏獻酒色財氣四針以諫帝怒斥為民天啓初贈光祿少卿馮從吾長安人萬厯中進士改庶吉士授御史見帝怠於政事抗疏進諌被斥歸杜門謝客取先正格言體驗身心家居二十五年光宗踐阼起尚寶卿天啓初進副都御史廷議三案持論公正羣小惡之已與鄒元標共建首善書院講學其中給事中朱童蒙等力詆之再疏引歸召拜工部尚書力辭豫致仕魏忠賢擅國遂削籍尋卒崇禎初贈太子太保諡恭定從吾學宗程朱志行純粹立朝光明俊偉學者稱少墟先生史記事渭南人萬厯中進士擢御史敢諌有聲厯光祿少卿以觸時忌罷歸蕭然四壁講學著書諸經皆有考訂富平田時震疏薦之不果用而卒來復三原人萬厯中進士厯淮揚僉事魏忠賢建祠復不往拜終山西右布政使性絶頴詩文援筆立就書畫之外諸琴棋劍器百工藝術寓目即能有詩集十餘卷王國耀州人萬厯中進士為御史出視畿輔屯田清成國公朱允楨等侵田九十餘頃己極論中官馮保罪保𬒳斥出為四川副使後巡撫保定以剛介著王圖國弟萬厯中進士改庶吉士授編修妖書事起沈一貫欲有所羅織圖引古誼規之屢進詹事吏部侍郎時門户分爭圖為東林推重故黨人攻去之天啓初起禮部尚書卒諡文肅邱民仰渭南人萬厯中舉於鄉厯知東安新城二縣治聲甚著擢御史號敢言出為天津副使調大同遷永平右參政移督寧前兵備以善理劇頻移要地擢右僉都御史巡撫遼東松山之敗民仰死之贈右副都御史本朝乾隆四十一年賜諡忠節陶爾德咸寧人萬厯中進士厯任四川川北道參議崇禎十六年由川歸陜途遇流賊攻長安遂分守東城城陷爾德罵賊不屈死年本朝乾隆四十一賜諡烈愍祝萬齡咸寧人父世喬有至行以父逺遊不歸年十五即獨身訪求厯數千里屢頻死卒得之後由選貢生為南康通判以清慎著萬齡從鄉人馮從吾逰舉進士知保定府天啓六年魏忠賢毁天下書院萬齡嘆息其黨李魯生劾之落職歸崇禎初起知黃州集諸生講學時號關西夫子遷河南按察使副使與山西監司夾擊水峪回賊焚其巢尋罷歸及流賊陷長安萬齡趨至關中書院哭拜先聖投繯死同時有懷慶通判竇光儀儀封知縣徐方敬芮城知縣徐芳聲舉人宗室朱誼䍒皆里居城破並投水死本朝乾隆四十一年並賜諡節愍張耀三原人萬厯中舉於鄉知聞喜縣崇禎中厯官貴州布政使所至以和厚得民張獻忠死其餘黨率衆攻陷貴州執耀欲降之耀怒詈不屈賊殺之并殺其家屬十三人本朝乾隆四十一年賜諡烈愍南居益從吉曾孫萬厯中進士授刑部主事厯任副都御史巡撫福建海外紅毛夷據澎湖為亂居益討平之遷工部侍郎總督河道魏忠賢銜其敘功不及已格其賞尋削籍歸李自成陷渭南擁之去加炮烙終不屈絶食死本朝乾隆四十一年賜諡烈愍袁養和盩厔人萬厯中舉於鄉知屏山縣厯雲南副使後歸里流賊徴之不屈絶粒死十一年本朝乾隆四賜諡節愍焦源溥三原人萬厯中進士以知縣入為御史熹宗初移宫議起刑部尚書黃克纘請寬盜寶諸奄源溥抗疏折之語皆切至崇禎初分巡河東遷寧武數有平寇功厯僉都御史巡撫大同歲飢餉缺屢請於朝不應遂自劾求去尋罷歸李自成陷關中被執脅降源溥瞑目大罵賊拔其舌支解死從兄源清萬厯中進士崇禎時纍官宣府巡撫與源溥同被執均抗節不食死本朝乾隆四十一年賜源溥諡忠節源清諡節愍宋師襄耀州人萬厯中進士天啓初官御史請罷內操又請減上供汰冗官核營造省賞賚羣閹不便格不行尋命客氏及魏忠賢等十二人世襲錦衣師襄抗疏力諫巡按河南懲貪舉亷政績甚著忠賢恨之貶秩歸崇禎中官太常卿致仕闖賊陷州不屈死本朝乾隆四十一年賜諡忠節王徴涇陽人以孝義聞天啓中進士厯廣平揚州推官皆有聲崇禎中為遼海道監軍僉事節制東江坐事謫戍尋釋歸聞流賊陷京師勸哭絶食七日卒本朝乾隆四十一年賜諡忠節李喬崑高陵人天啓中進士知洪洞縣後歸里流賊入關欲汚以偽職拒不受望闕再拜死四十一年本朝乾隆賜諡節愍武大烈臨潼人天啓中舉於鄉崇禎中知永寧縣李自成陷永寧執大烈以同鄉欲活之大烈不屈被燔灼以死本朝乾隆四十一年豫祀忠義祠田時震富平人天啓中進士崇禎初擢御史屢忤吏部尚書王永光出為江西參議厯山西參政罷歸流賊陷富平欲授以偽職不屈死本朝乾隆四十一年賜諡節愍朱崇德富平人子國棟天啓中進士為給事中多所彈劾纍官兵部右侍郎崇德居鄉有厚德嘗出積粟賑飢民流賊陷富平驅崇德往長安中道稱病僵卧不起賊見其老以為果病聽之歸崇德曰始吾所以隱忍者為九族計耳今得死所矣乃北面再拜自縊而死本朝乾隆四十一年賜諡節愍宋緒湯耀州人崇禎中諸生流賊陷城被獲大罵死本朝乾隆四十一年豫祀忠義祠杜必殿咸陽人諸生事繼母孝讀書授徒以名節相砥礪崇禎間流賊陷咸陽併執其父必殿設計脫之父得免賊竒之逼令降必殿不屈死之本朝梁化鳳長安人順治初由武進士授山西高山衛守備從征薑瓖有功纍遷崇明總兵官擊走海賊張名振築沙隄以捍城改鎮蘇州大破鄭成功於江寧以功進太子太保左都督提督江南軍務授三等男世職卒贈少保諡敏壯子鼐由父廕厯官浙閩總督梁加琦三原人順治初以將材隨征充前鋒取太原授遊擊大兵征蜀以運餉勞遷副將率兵歸山東擒斬偽總兵陳貴榮等康熙初擢四川總兵官剿平西山賊攻太昌賊袁宗第搗其巢復招降偽新化伯馮起鳯剿賊黨於巫山賊首劉二虎自縊子世勳以父廕厯官安徽巡撫户部左侍郎焦之雅三原人明僉都御史源溥子源溥為李自成所害之雅與弟之夏冒死求父尸歸葬畢棄家隱華山之夏亦隱處終身同縣諸生房廷詳父建極明末官兵部主事歸里李自成陷關中建極入都赴難廷詳時年十五易道士服從父間關避賊走數千里抵京畿而京師已陷乃輿父歸未幾建極卒既葬廬墓終身王景其先延川人明末避兵徙盩厔康熙初以都司出師達州有功洊升雲南右鎮總兵景忠勇出羣剿保寧復重慶定滇南皆與有功康熙三十一年致仕性至孝置田宅以收族人五服內無飢寒者邑建書院復捐田以助膏火卒祀鄉賢周熛臨潼人順治初舉於鄉為寧逺教諭􅉰賊擾河西偽檄至熛率諸生立碎之諭衆堅守以薦授知梓潼縣撫綏流移有惠政遷雷州府同知招降劇盜王之瀚等官至鳳陽知府弟燦順治中進士由刑部主事奉使安南及還記其山川風俗以獻出守南康設船以拯覆溺修白鹿洞書院督學四川奏請土司子弟亦準入學所著有願學堂集張炯鄠縣諸生順治二年賀珍陷城父被執炯奮身捍衛為賊所殺又諸生王先身性耿介好學博古賊至負母閻氏避難為賊所獲俱遇害楊在陛三原人順治中進士知扶溝縣招徠流亡誅斬巨盜在任數年民皆安業孫一鵾富平人舉武鄉試順治中纍遷廣東水師總兵官李定國犯廣東攻圍新會一鵾以舟師守江門會陳竒䇿從海上突至一鵾率兵大戰衆寡不敵遂殁於陳贈太子太保賜祭葬仍月給米恤其家王承祖渭南人順治初舉於鄉知晉江縣捍禦海寇邑賴以安擢兵部主事纍遷工部侍部歲飢罄資賑濟全活甚衆毛竒盩厔人明末流賊翻山鷂等行劫至縣竒以鄉勇應募先登陷陳殺賊無算順治初從總督孟喬芳入蜀剿寇勇冠一時以功授重慶都司病免歸卒年一百嵗黨國虎富平人父普寬兄亷生並為族子國孝所殺國虎幼未能報順治九年國虎年二十一乃誘國孝於野并其子撾殺之詣縣自告縣官欲生之國虎曰父兄讐雪吾事畢矣遂自經知縣郭傳芳以其事與唐梁悅相類為建孝義祠肖象祀之又同縣諸生唐文昭父殁為後母所逐獨居肆力於學益盡子道母卒悔悟呼歸家貧甚鄉人重其學行常斂粟贍之傅芳並祀之孝義祠陳有虞富平人順治中進士知仙遊縣海寇陷漳泉有虞募鄉勇固守賊來攻屢擊敗之城陷率餘兵巷戰中箭死家人趙啓遜等十四人皆死焉贈福建按察司僉事賜祭葬邵廷儀咸寧人順治中舉於鄉授清澗教諭遷靖逺衛教授王輔臣叛偽檄促各官盡銷舊印廷儀獨懷印以死自誓事平擢知香山縣有善政梁鋐三原人順治中進士選庶吉士改給事中指陳得失無所避纍擢倉場侍郎持身亷潔厯官三十年有勸置田宅者輒笑謝之丁父憂悲泣傷目母殁哀毁愈甚遂失明子澄之亦有孝行以母喪哀毀卒劉元勳咸陽人七嵗喪父哀戚如成人事祖母及母以孝聞順治中進士選庶吉士以祖母年老請歸終養後官山西參議有善政任璣涇陽人順治中進士知滕縣行保甲清賦稅邑大治擢兖州府通判改運河同知疏渠築隄運道無阻遷長蘆運使鹽政多所釐剔終直隸守道李念慈涇陽人順治中進士知直隸新城縣康熙十七年舉博學宏辭性好吟咏喜逰覽足迹幾遍天下所居曰谷口著有谷口山房集十卷王焯三原人康熙初進士知阜城縣行均稅法豪民不敢匿賦擢刑科給事中尋掌吏科厯僉都御史太常卿皆著清聲梁鳳翔咸寧人少孤事母有孝行康熙中進士知孝感縣擢知潞安府皆有惠政又同縣吕大猷順治中進士厯官兵部郎中以母老乞歸侍養母殁遂不復出居鄉清介退讓不入城市時稱篤行君子常日暄三原人康熙十四年慶陽土寇作亂犯涇原攻馮家堡日暄率鄉兵十八人往援殺賊數十人衆寡不敵皆戰死馮家堡獲全李因篤富平人年十一為諸生肆力為古文辭尤長於詩詞歌賦康熙十七年舉博學鴻詞授翰林院檢討纂修明史尋以母老屢疏乞歸母殁遂不復仕性敏絶博極羣書好汲引後學有文集十五卷詩集三十五卷廣韻正四卷孫枝蔚三原人博學工詩明末流賊亂關中枝蔚結鄉曲壯士討賊不果去客揚州康熙中舉博學鴻詞以年老授內閣中書舍人歸所著有溉堂集同邑貢生杜恆燦亦以詩文名殷化行咸陽人康熙中以武進士為火器營守備從大將軍圖海收復川陜積功授三屯􅩌副將擢臺灣總兵官時臺灣未有城化行令所部人致樹二株立為木城并令諸營俱建以資防衛遂為海外重地移鎮襄陽改寧夏三十四年領兵與大將軍費楊古出塞擊破噶爾丹於昭木多以功授世襲雲騎尉尋提督廣東軍務討平諸洞叛蠻致仕歸陳嘉績三原人康熙中以舉人知濬縣有惠政再知澄海禦海寇有功擢御史官終大理寺少卿李容盩厔人父可從明末從總督汪喬年征流賊戰死襄城母彭氏賢明有志節容少好學篤信宋儒諸書以明體達用為主性至孝母殁哀毁幾絶服除訪父遺骸於襄城不獲為位慟哭招魂而歸康熙十二年總督鄂善聘主關中書院與諸生講明正學先後奉詔特徴以疾辭四十二年聖祖仁皇帝巡關中召之容已衰老遣子慎言詣行在陳情并進所著二曲集反身録御書操志高潔以賜之年七十九卒人稱二曲先生遊其門者多以學行聞於時劉曾臨潼人康熙中進士知漵浦縣擢吏部主事遷郎中有亷名出知貴陽府治行為當時最官至雲南按察使王心敬鄠縣人少孤母李氏矢節教養一言一動必朂以古聖賢成法年二十五從李中孚學根究尊德性道問學宗旨凡十年而後歸建二曲書院與從逰者講學其中一以明體達用為主著書十六種卒祀鄉賢祠李麟其先延安人徙咸陽從勇略將軍趙良棟征吳三桂以功纍擢張家口遊擊遷化林營參將打箭爐蠻人恃險不服麟至列狀請討盡平之升副將就擢總兵官大兵西討策妄阿喇卜坦麟與諸將擊敗賊將䇿凌敷西藏平遷固原提督雍正元年入朝授內大臣鑾儀使以年老乞歸張大齡長安人幼孤事母孝家貧業醫母病篤百計療之日夕籲天遂愈康熙中旌同縣柏覆皇孝友好施康熙三十年歲大祲散粟八十餘石全活甚衆長幼七十餘口數世同居無間言又有孟學馮選李文秀三人及鄠縣民􆁒宏王賢並以事親至孝聞王承烈涇陽人康熙中進士選庶吉士授檢討雍正初改御史巡視東北兩城捕巨猾置於理轉給事中督湖北漕從民請就便南兊省運費數千緡擢江西布政使罷斥姦吏釣考綜核諸弊一清纍遷刑部侍郎蘭泗耀州人康熙中任直隸三屯營副將會吳三桂據長沙調駐武昌進剿嶽州又檄討黃金龍戰於大冶殱賊殆盡厯擢荆州左路總兵克思南復龍泉屢立戰功改鎮安籠地界滇粵在鎮十六載內安外撫四境帖然張先志長安人由武舉授七里關守備雍正二年從征卓子等山土蕃遇賊力戰死贈一秩賜祭葬廕一子徐宗仁長安人由行伍為陜西督標把總雍正元年從大兵征羅卜藏丹津先後積戰功纍擢山西殺虎口副將八年從西路大兵出征統涼州兵分駐峩崙磯賊大至宗仁拒戰三晝夜殺賊數千轉戰至紅山峽賊衆悉來攻自辰至未血戰突圍創重而殞敕祀忠勇祠授世職騎都尉又同邑李國勳雍正元年武舉同宗仁出西寧擊賊有功授南古城守備八年調巴里坤從征於紅山峽戰殁賜祭葬給世職騎都尉郝振綱富平國子生幼孤事母孝母殁廬墓三年收恤族人甚有恩義雍正五年旌同邑諸生孫文達咸陽蕭光蘭涇陽薑士珍皆以孝行旌張文運藍田人八嵗喪父家貧竭力養母遭寇變負母逃匿金山采果實以食母年近百嵗始殁文運哀毁逾禮廬墓不忍去雍正六年旌孫符咸寧貢生祖盛事繼母以孝聞符十嵗喪母悲慕不已每至墓哀號竟日父病癰吮之獲愈同邑鄭仁幼孤事母盡孝母殁廬墓三年俱雍正八年旌李天牖涇陽人事父母孝母病痢嘗糞知不起禱天願以身代嘗還遺金拒奔女焚債劵負米百里以贍其師雍正八年旌陳慶門盩厔人雍正初進士知盧江縣修學宫濬城濠置義田積社榖仿北方種植教民墾高阜地知無為州取碎石樹樁編竹築鮑漁橋魚橋二處坦坡民免墊溺所至皆有政績後知達州其惠政尤著著有仕學一貫録何宏圖咸寧人父疽發背宏圖三吮瘡毒父殁家貧菽水奉母孝養備至乾隆五年旌同邑傅彤長安王計馬伯知查繼儒張洲咸陽蕭宏吉竇元正王珂魏成佩臨潼王文蕙王賜印高陵黨思睿鄠縣屈乃伸閻泰臨三原李璉楊道寅申汝德秦旭任吉士盩厔馬可法渭南趙廷機雷時祚王者棟宋世亮富平師其禮朱綸醴泉張茂德俱乾隆年間以孝行旌何茂榮咸寧人官四川督標中營千總乾隆十五年隨都統傅清死叛黨羅卜臧扎什之難事聞議恤韓文星富平人耕讀為業十二世同居雍雍一堂無間言治家勤儉不蓄私財鄉里稱其孝友乾隆十六年旌張璘涇陽人七世同居一門孝友乾隆三十一年旌御賜上用縀匹並詩一章賜之同邑劉繼業門丕吉俱以孝行旌敖成長安人由行伍洊擢貴州提督從征瞻對金川及庫車俱有功得僧格巴圖魯名號列前五十功臣圖像紫光閣卒諡勇慤贈太子太保給雲騎尉世職蔣兆奎渭南人乾隆中進士由知縣洊擢山西布政使議將山西陜西河南三省鹽課改歸地丁尋授山西巡撫引疾歸嘉慶四年復起為漕運總督旋授山東巡撫李培本盩厔人貢生嘉慶元年聞漢南賊警倡衆築堡城以備之衆不應復邀衆於家厯陳利害衆不能從作思患預防説三年賊大至培本子心平心和擊賊死與弟培基衣冠坐庭中斥以大義賊怒並殺其母妻事平里人祀其主於社時有武生張斗南年六十餘避於樓上見少婦至斗南趨下少婦呼之斗南曰男女有别遂為賊所殺又王永盛與弟永茂擊賊死姪紀聚闔家男婦十八人自焚死有曾學廣史鍾傑二人者賊劫之使賺開馬召堡城二人至城下以嚴守告賊怒殺之雷文照渭南人性至孝父母既殁文照廬墓三年每日親身負土隆冬手足皆裂遇佳節祭奠必誠哀哭之聲聞於道路過者皆知為孝子雷家之塋云嘉慶十五年旌吕大謨咸寧人乾隆五十九年舉武鄉試父病目舐之復明嘉慶三年教匪竄南山居民逃避大謨父抱木主守先人墓側揮大謨速去大謨曰父在此大謨焉往乃持矛衛父賊不敢逼一村安堵嘉慶十六年以孝行旌劉斌咸寧人任河南老岸司巡檢嘉慶十八年教匪李文成與林清相結謀逆斌偵知其期以告遂遇害事聞賜恤給雲騎尉世職嶽漢春長安人性至孝親病禱神願以身代殁喪葬盡禮嘉慶十九年旌又興平姚本務涇陽劉丕業張璁三原王基業胡瑛渭南趙廷翰醴泉張永錫俱嘉慶年間以孝行旌前總纂官臣丁善慶恭纂輯提調官臣許應藻恭覆輯校對官臣顔以煥恭校
