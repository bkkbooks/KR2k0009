body:
  text: 西安府四祠廟三皇廟在藍田縣北三十里又高陵縣東三里亦有廟禹王廟在長安縣西四十里豐水上又鄠縣東二十五里渭南縣東北集賢里皆有廟商湯祠在興平縣西北長安志在縣西北二十里湯祠鄉周文王廟在同官縣西四十里文王山又武王廟在武王山文武成康祠在咸陽縣城內北街長安志縣有周文王廟二處一在縣西一在縣東相去各十五里又武王廟在縣北五里成王廟在縣西十五里康王廟在縣北七里文獻通考周文王廟在酆以太公配武王廟在鎬以周公召公配縣志諸廟歲久圯廢明嘉靖十年改建今祠以合祀焉露臺祠在臨潼縣東南三十五里寰宇記露臺祠即始皇祠也三秦記云驪山頂有始皇祠又齋戒而往即風雨迷道漢高祖廟在長安縣西長安志在縣西四里班政坊開寶三年敕修又通志興平縣東南二十里樊噲城北有漢高祖祠漢文帝廟在咸寧縣東長安志在萬年縣東陵北去縣二十五里又朱雀街西第四街之休祥坊有漢顧成廟餘址漢景帝廟在咸陽縣東北長安志在縣東北十五里漢武帝廟有五一在咸陽縣東北一在興平縣東北名龍淵廟一在臨潼縣西北一在富平縣南一在耀州南帝王世紀孝武廟名龍淵在茂陵東魏書地形志富平有漢武帝祠元和志漢龍泉廟在興平縣東北二十四里武帝廟號也長安志武帝廟在咸陽縣東北八里又龍淵廟在興平縣東北十七里又櫟陽縣西南十八里富平縣南二十里華原縣南五里並有漢武帝廟漢宣帝廟在咸寧縣東南長安志在萬年縣東南陵北去縣十里又樂遊廟在升平坊東北隅宣帝立餘址尚存漢光武廟在咸寧縣東南寰宇記廟在萬年縣東南勾家嘴去縣四十里後魏文帝廟在耀州西唐家原後周文帝廟在富平縣西北長安志去縣十三里隋文帝廟在盩厔縣東南長安志在縣東南五十里唐天寶三年建唐太宗廟在醴泉縣南長安志在縣西門外一里縣志舊在縣東三十里宋開寶六年修元至元中廢遺址尚存廟前有宋遊師雄重刻昭陵圖六駿圖二碑明萬厯中移建於今縣南門外唐肅宗廟在醴泉縣北長安志在縣北三十五里開寶敕云去甘北巡鎮三里終南山神祠在咸寧縣治南關嘉慶八年建御書夀民佑正扁額敕封安民顯佑終南山神太白山神廟在長安縣治西關明崇禎間修書金精靈澤扁額本朝乾隆二年御敕封昭靈普潤太白山神並御製太白山神詩刻石廟中終南山祠在長安縣北長安志唐開成二年册終南山為廣惠公置祠宇以孝夏土王日致祭天齊祠在醴泉縣東北漢書地理志谷口有天齊公五牀山仙人五帝祠四所縣志祇存天齊祠在縣東北八十里九嵕山巔餘皆廢渭水神廟在渭南縣上漲鎮金山神廟在藍田縣南長安志在縣南十里輞谷口金山之前舊圖經曰黃帝滅蚩尤之衆於此蓋風后之祠縣志風后祠有四其一在城中即金山廟也胡公廟在鄠縣西南七里胡公泉上太公廟在咸陽縣西水經注渭水徑太公廟北前有太公碑文字褫缺今無可尋縣志縣西釣臺側舊有太公廟碑又鄠縣志縣有太公廟在城外東北隅晉文公廟在高陵縣北三里中南渠北老子廟在盩厔縣樓觀南長安志華陽子録記秦始皇好神仙於尹喜先生樓南立老子廟晉元康五年重修蒔木萬株南北連亘七里給户三百供灑掃隋開皇元年復修又尹先生廟在老子廟北晏子廟在高陵縣西南八里祀齊晏嬰鄭國廟在涇陽縣西洪口堰祀秦鄭國武安君廟在咸陽縣東水經注杜郵亭中有白起祠元和志咸陽城中有白起祠長安志在縣東五里王翦廟在富平縣長安志在縣東北三十里又有廟在美原縣東南一百步又頻山神廟在美原縣西二十五里亦祀王翦又耀州東一里亦有王翦廟蒙恬廟在咸陽縣元和志在縣西北十五里酇侯廟在咸陽縣西北三十五里長安志在縣西三十里張樊廟在臨潼縣新豐鎮東門外祀漢張良樊噲四皓廟在咸寧縣炭谷西北寰宇記在萬年縣南終南山下去縣五十里長安志唐元和八年重建又魏書地形志石安縣有四皓祠長安志在咸陽縣東二十五里董子祠在咸寧縣治東南又董夫子廟在渭南縣東北董村俱祀漢董仲舒丁蘭廟在興平縣北五里又有墓在縣東北十里周孝侯廟在渭南縣倒獸谷口祀晉周處田氏三賢祠在臨潼縣東郭外祀田真兄弟祋祤廟在耀州東長安志在州東二里州志蓋祀祋祤令之遺愛者亡其名廟南有祋祤冡相傳即其葬處濟衆侯廟在藍田縣東南長安志在縣東南五十里倒回谷口其神名石門將軍唐京兆尹第五琦楊知至祈雨有應乾符中封濟衆侯龍王廟在寧陜廳西一百里有石佛十餘尊碑文剝蝕僅辦大明二字禱雨輒應鹿臺祠在高陵縣西寰宇記祠在鹿苑原上百姓祈禱水旱有感今號為鹿臺將軍李衛公廟有二一在鄠縣東二十里一在三原縣城內西北祀唐李靖賢相祠在長安縣故城內祀唐杜如晦今廢長安志杜相公祠在古城啓夏門內道東去縣八里咸通六年建魏公廟在高陵縣西南十五里祀唐魏徴馬公祠在渭南縣東十五里祀唐馬周汾陽王廟在涇陽縣東門內祀唐郭子儀顔魯公祠在藍田縣藍橋明天啓六年建祀唐顔真卿杜工部祠在咸寧縣南少陵原北岡下祀唐杜甫忠烈祠在臨潼縣西南十五里祀唐段秀實俗呼為烈神廟明成化嘉靖間相繼修葺本朝康熙四十年重修西平王祠在高陵縣南渭橋北百餘步祀唐李晟晉公廟有三一在臨潼縣零口鎮西北一在藍田縣東三里一在藍田縣西三十里祀唐裴度或云祀晉文公重耳裴寇二公祠在渭南縣西關外祀唐裴度宋寇準韓文公祠有三一在藍田縣秦嶺一在藍田縣城北一在渭南縣小里村祀唐韓愈白樂天祠在渭南縣北紫蘭村祀唐白居易劉公祠在高陵縣西二十五里彭城閘南祀唐縣令劉師仁寇