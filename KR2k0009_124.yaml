front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_124-1a}
body:
  text: 武昌府古迹沙羡故城在江夏縣西南宋書州郡志江夏太守領縣沙羡漢舊縣吳省晉武太康元年復立治夏口按沙羡城或以為即夏口城非也沙羡漢縣夏口城吳孫權始築至晉武帝以後則沙羡縣城始即夏口城耳夏口故城在江夏縣西黃鵠山上吳孫權築晉為沙羡縣治宋為郢州及江夏郡治吳志孫權傳黃武二年春正月城江夏山宋書州郡志江夏太守漢高帝立永初郡國及何志並治安陸此後治夏口水經注黃鵠山東北對夏口城孫權所築對岸則入沔津故城以夏口為名亦沙羡縣治也南齊書州郡志郢州鎮夏口城據黃鵠磯宋孝武置州於此以分荆楚之勢按宋志謂治夏口者乃江南之夏口城非江北之夏口也汝南故城在江夏縣西南晉置縣屬江夏郡宋齊因之隋省水經注汝南僑郡咸和中寇難南逼户口南渡因置斯郡治於塗口元和志東晉以汝南流人僑立汝南郡後改為汝南縣寰宇記􅍮湘記云金水北岸有汝南舊城古鄂城今武昌縣治漢置鄂縣屬江夏郡後漢因之吳改為武昌史記楚世家熊渠伐庸揚粵至於鄂乃立其中子紅為鄂王注九州記曰鄂今武昌水經江之右岸有鄂縣故城注舊樊楚地世本稱熊渠封中子為鄂王晉太康地記以為東鄂矣孫權以魏黃初元年自公安徙此改曰武昌又以其年立為江夏郡至黃龍元年權遷都建業以陸遜輔太子鎮武昌孫皓亦都之皓還東令滕牧守之晉惠帝永平中始置江州傅綜為刺史治此城後太尉庾亮之所鎮也杜佑通典鄂州武昌縣東晉謝尚庾翼屯守於此輿地紀勝嘉定十五年樞密院言鄂州武昌縣係江西上流衝要隘口因升為武昌軍尋以與鄂州節鎮之名相類因玉寶壽昌文錫名壽昌軍晉鄂縣城在武昌縣西南宋書州郡志武昌太守領縣鄂漢舊縣吳改為武昌晉武帝太康元年復立鄂縣而武昌如故隋書地理志江夏郡武昌平陳廢鄂縣入焉沙陽故城在嘉魚縣北宋書州郡志江夏太守領縣沙陽漢舊縣本名沙羡晉武帝太康元年更名又立沙羡而沙陽徙今所治文帝元嘉十六年度巴陵孝武孝建元年度江夏水經注江中有沙陽洲沙陽縣治也寰宇記沙陽屬上雋郡梁承聖三年改為沙州陳初復還縣又屬上雋郡隋開皇元年廢蒲圻故城在嘉魚縣西南三國吳置屯晉太康初置縣隋移縣於鮑口而此城廢鮑口即今治也宋書州郡志江夏太守領縣蒲圻晉武帝太康元年立本屬長沙文帝元嘉十六年度巴陵孝武孝建元年度江夏水經注蒲圻洲頭即蒲圻縣治也寰宇記吳黃武二年置在兢江口隋開皇十二年洪水泛溢縣遂漂流就鮑口權立唐武德四年使人王宏讓刺史周和舉權在陸溪川中為縣貞觀七年移還鮑口永安故城今咸寧縣治寰宇記永安縣本江夏縣界南去縣三百里唐大厯二年割金城豐樂宣化等鄉置鎮吳乾貞三年改為永安場南唐保大十二年升為縣王存九域志景德四年改永安縣為咸寧在州東南三百里輿地紀勝避永安陵名故改縣志元末陳友諒據武昌邑燬遷於河北朱老廟後明初友諒既平仍還舊治唐年故城在崇陽縣西四十里唐置縣屬鄂州五代吳時改為崇陽遷今治元和志唐年縣本漢沙羡縣地天寶二年分置寰宇記吳順義七年改為崇陽縣志唐年故城在縣西桃溪橋東五代時遷今治朱梁初楚將許德勛破唐將李饒等掠上高唐年而歸即此下雋故城在通城縣西漢置縣屬長沙國後漢晉屬長沙郡宋齊俱屬巴陵郡隋省入蒲圻元和志下雋故縣在唐年縣西南一百六里因雋水為名寰宇記梁大同五年於下雋縣置上雋郡承聖三年改為雋州陳天嘉四年州廢隋開皇九年省下雋入蒲圻按漢書地理志武陵郡充縣澧水東至下雋入沅後漢書馬援傳援征五溪軍次下雋則下雋當在長沙武陵之間於今為湖南地殆吳以後始移縣於巴陵之東也下雉故城在興國州東南漢置縣晉省元和志下雉故縣在永興縣東南一百四十里漢伍被謂淮南王安曰守下雉之城絶豫章之口是也武昌記下雉縣晉義熙中併入陽新州志今州東昌平鄉下洋有下雉潭陽新故城在興國州西南六十里三國吳置縣屬武昌郡晉宋齊因之隋改置富川縣三國吳志西陵太守領陽新下雉兩縣寰宇記故陽新縣在永新縣西南一百二十里名勝志吳孫權分置陽新縣隋改曰富川州志上陽辛里下陽辛里在今州西南六十里即故陽新縣永興故城在興國州東五十里陳置縣隋省入富川又改富川為永興隋書地理志江夏郡永興陳曰陽新平陳改曰富川開皇十一年廢永興縣入焉十八年改名元和志陳永興故縣在永興縣城東五十里東臨江水俗云伍子胥所築一名子胥城輿地紀勝隋改富川曰永興居高陵故城貞元八年移於長樂鄉之深口按高陵故城在州西一里深口即今州治城塘廢縣在武昌縣西寰宇記廢城塘縣在鄂州西北一百一十里隋末縣令羲士暄置西有小城塘因名大業九年廢名勝志神人山下為白鹿磯城塘縣設此安昌廢縣在興國州西北九十里寰宇記梁普通七年置縣隋開皇九年併入富川樂化廢縣在通城縣東南寰宇記梁大同五年分下雋縣置樂化縣隋開皇十二年省入蒲圻縣志縣東南有樂化鄉曹公城在江夏縣東北元和志在江夏東北二里梁武遣將曹景宗所築明統志梁武起兵遣曹景宗築曲水城及武帝攻郢城又遣王世興屯兵於此萬人敵城在江夏縣東明統志黃鵠山頂舊有城宋建炎間寇犯城郡守命萬人登城以強弩射之寇退因名吳王城在武昌縣東一里餘一名吳大帝城元和志孫權故都城本漢灌嬰所築晉陶侃桓溫為刺史並理其地寰宇記吳大帝城吳主置城有五門各以所向為名西角一門謂之流津北臨大江明統志吳王城孫吳故宫城遺地今宫城前有御溝後有廟黃石城在武昌縣東二十里一名流沂壘江表傳孫輔於彭澤破劉勳勳走入楚江從尋陽步上到置馬亭聞孫策等已克皖乃投西塞至流沂築壘自守寰宇記黃石城即劉勳所居胡三省通鑑注流沂壘在夀昌縣東南三十里近西塞梅城在武昌縣西五十里吳黃武二年築有仵城在縣西七十里吕蒙城在嘉魚縣西南一名陸口城水經注陸水築室號懷坡閣畫東坡像於其上王十朋過之為賦懷坡詩白楊臺在江夏縣北十里相傳梁武攻郢城遣唐修屯兵於此湧月臺在江夏縣城西黃鶴樓側宋黃清老書湧月一字後人摹刻於此而續以臺字鳳凰臺在武昌縣東明統志在虎頭山吳主因鳳凰見築臺於此詔周瑜魯肅定建都之計釣臺在武昌縣西北江濱晉書陶侃傳遣兵逼西陽王羕侃整陳於釣臺為後繼水經注江上有釣臺權常極飲其上曰墮臺醉乃止張昭盡言處寰宇記釣臺在武昌城下有石磯臨江懸峙四眺極目縣志明成化初江岸平沙尚高二三尺許今壅沒馮京讀書臺在咸寧縣南潛山又相山亦有讀書臺舊有相山書院下有金蓮池俱相傳馮京讀書處張志和釣臺在大冶縣東道士洑相傳唐張志和隱處謝公墩在興國州東一里湖隄山宋謝枋得寓居讀書處其地有疊山書院焦度樓在江夏縣東南齊書焦度傳沈攸之大衆至夏口將直下都度於城樓上肆罵攸之衆蒙楯將登度今投以穢器賊衆不能冒至今呼此樓為焦度樓黃鶴樓在江夏縣西元和志江夏城西南角因磯為樓名黃鶴樓按仙人乘鶴事各書傳聞不一説詳見上卷山川門黃鵠山注白雲樓在江夏縣城內黃鶴山頂一名南樓輿地紀勝南樓中改為白雲閣元祐間守方澤重建復舊名或以為庾亮所登非也亮所登在武昌縣和豐樓在冮夏縣東南明統志舊名高樓宋淳熙間燬總管劉邦翰重建改今名南樓在武昌縣南世説庾太尉在武昌秋夜氣佳景清使吏殷浩王胡之之徒登南樓吟詠庾公率左右步來與諸人詠謔竟坐甚樂縣志又名玩月樓即今之譙樓嶽公樓在嘉魚縣東宋嶽武穆駐節處捲雪樓在興國州東六十里輿地紀勝在富池之黃龍洲前臨大江皮日休讀書堂在江夏縣東眺公武讀書記皮日休少時曾讀書武昌頭陀寺今寺有讀書堂其遺迹也四賢堂在府學內明統志宋嘉定中教授石繼諭建以祀周子二程子朱子黃幹有記吳王讀書堂在武昌縣西樊山輿地紀勝在寒溪山間名勝志東坡玉堂話舊詩自注云吳王臺在寒溪有吳王讀書堂堂下有泉世號吳王井張詠讀書堂在崇陽縣東六十里港陂扁曰休心詠嘗賦詩自記黃庭堅讀書堂在崇陽縣東金城山麓扁曰浩然十詠堂在興國州治後宋慶厯中王琪出守興國作望江南十詠紹興間知軍事黃仁榮建堂取十詠名之元結讀書堂在大冶縣東回山上乖崖亭在布政使司署後明統志宋李燾設張忠定公詠像於內有文記之江漢亭在府通判廳宋乾道中鄂倅葉椅建張栻作記張藝叟南遷録鄂倅公字因古城作亭榭俯瞰江漢景物最秀仙棗亭在江夏縣治南景泰四年重建改名吕仙亭明統志舊傳亭前棗木未嘗實一歲忽有實如瓜太守命小吏採而進小吏輒私啖之遂仙去縣志又傳太守與卒奕有一異人吹笛來忽不見隨即聲至樓上惟見石鏡題詩末書吕字而去故改今名石照亭在江夏縣西黃鶴樓下宋王鞏聞見近録鄂州黃鶴樓下有石光徹名曰石照壓雲亭在江夏縣西黃鶴山上明統志舊為頭陀峯頂院元世祖嘗駐此至正間建亭封建亭在江夏縣南梅亭山明太祖既降陳理駐蹕山上得使報生皇六子喜曰他日以此子王楚及封議王齊寶三鑄不成因悟曰朕昔駐梅亭有言其王楚乎一鑄而寶成後乃建亭於山上廣宴亭在武昌縣西樊山唐廣德中樊口津吏欲為候舍元結驗之圖記以為故孫吳遊宴地乃諭縣令馬珦建亭名曰廣宴結為之記殊亭在武昌縣治後唐縣令馬珦建元結作記取其才殊政殊迹殊為此亭又殊因名怡亭在武昌縣西歐陽修六一題跋在武昌江水中小島上武昌人謂其地為吳王散花灘裴鷃造李陽氷名而篆之裴虬銘李莒八分書刻於島石九曲亭在武昌縣西九曲嶺為孫吳遺迹宋蘇軾重建蘇轍有記後廢元泰定中重建名最樂亭又廢明嘉靖中又建名懷坡崇禎中更名懷蘇本朝順治七年重建香霧亭在崇陽縣治後宋張詠建任希夷重建美美亭在崇陽縣北舊名北峯亭宋張詠改建滄浪亭在興國州放生池上蓮花彌望夾隄皆垂柳羣山環列有浮屠突兀在雲煙紫翠間記稱江山之勝頗似武林西湖寶泉監在江夏縣東二里宋史地理志鄂州監一寶泉熙寧七年置鑄銅錢富民監在大冶縣東宋史地理志興國軍大冶有富民錢監青山場今大冶縣治寰宇記唐天祐二年吳析武昌置大冶青山場院南唐升為大冶縣豐寶埸在大冶縣北宋史地理志大冶有銅場輿地紀勝豐寶場去縣九十里出膽水浸鐵成銅蘄竹山埸在大冶縣東道士洑西世傳宋吕文德種竹所新興冶在大冶縣西晉書地理志鄂縣有新興馬頭鐡官水經注庾仲雍江水記云谷里袁口江津南入厯樊山上下三百里通新興馬頭二冶縣志縣有鐵山鐵務二冶本在縣界故以大冶名縣鐵務在大冶縣北宋史地理志大冶有磁湖鐵務縣志今鐵山下有鐵山爐宋於此置爐煎鐵丁固宅在江夏縣南寰宇記固母作大被以招賢故固學為時所重孟宗宅在江夏縣南輿地紀勝今安遠樓其故基也舊為靈竹寺即宗泣竹之所李雍宅在江夏縣東十五里名勝志修靜寺即李雍所居青蓮集有遊修靜寺詩按修靜寺在洪山之西去寶遇寺半里餘陶侃宅在武昌縣西北武昌記陶侃宅地中有黑石中坳如樽唐孟士源命為杯樽輿地紀勝在縣西北臨江後為羅漢院元結宅輿地紀勝在武昌縣西五里竇參宅在蒲圻縣東北名勝志唐竇參宅在定相寺參未第時肄業於此山神告以他日