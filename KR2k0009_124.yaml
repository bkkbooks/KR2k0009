臨沂人咸寧中受詔伐吳進攻武昌吳將各率衆降戎渡江綏慰新附宣揚威惠吳光祿勳石偉方直戎表薦之荆土悅服華軼平原人永嘉中江州刺史雖逢喪亂每崇典禮置儒林祭酒以宏道訓在州甚有威惠州之豪士接以友道得江表歡心流亡之士赴之如歸時天子在洛軼有匡天下之志每遣貢獻入洛不失臣節陶侃鄱陽人武昌太守時山夷多斷江劫掠侃令諸將詐作商船以誘之劫果至生獲數人是西陽王羕左右侃即遣兵逼羕令出向賊羕縛送二十人侃斬之自是水陸肅清流亡者歸之盈路溫嶠太原人下車武昌即拜徐孺子墓見王敦像削去之聞京師破號慟纍日要陶侃赴難奉侃為盟主卒敗蘇峻卞敦冤句人征南將軍山簡以為司馬尋王如杜曾相繼為亂乃使敦監沔北七郡軍事振威將軍領冮夏相戍夏口攻討沔中皆平郭舒順陽人王敦使守武昌督護繆坦嘗請武昌城西地為營太守樂凱言於王敦曰百姓久買此地種菜自贍不宜奪之敦大怒曰王處仲不來當有武昌地否凱懼不敢言舒曰繆坦小人疑誤視聽舒不敢不言敦即使還地衆咸壯之南北朝齊庾域新野人蕭順之為郢州刺史辟為主簿歎美其才曰荆南𣏌梓其在斯乎加以恩禮梁韋睿杜陵人梁武帝以睿為江夏太守行郢府事初郢城之拒守也男女口垂十萬閉壘經年疾疫死者十七八皆積尸牀下生者寢處其上睿料簡隱恤咸為經理於是死者埋藏生者反居業百姓賴之蕭秀武帝弟安成王天監十三年為郢州刺史務存約己省去浮費百姓安堵境內晏然夏口常為戰地多暴露骸骨秀於黃鶴樓下祭而埋之冬月常作襦袴以賜凍者遷雍州刺史郢人相送出境聞其疾百姓商賈咸為請命何遠東海郯人為武昌太守折節為吏杜絶交遊餽遺秋毫無所受武昌俗皆汲江水盛夏遠以錢買民井寒水不取錢者則摙水還之車服尤敞素器無銅漆江左水族甚賤遠每食不過乾魚數片而已唐鄭元瑾滎陽人武德初為蒲圻令值西良水淤洳疏請改邑治於鳳山監凡土田經制學校署宇皆其區畫李道宗唐宗室貞觀初徙封江夏郡王授鄂州刺史好學接士大夫不倨於貴李必聞蜀王愔之後永徽中為蒲圻丞有惠澤人擬諸召父鄭光系滎陽人開元中為蒲圻尉政績卓異孟士源天寶間為武昌令與元結善結稱其在武昌不為人厭馬珦扶風人為武昌令元結稱其明信嚴斷惠政為理故政不待時而成韓仲卿南陽人為武昌令有美政既去縣人刻碑頌德趙憬隴西人寶應中試江夏尉志行峻潔民畏以懷馮昭奏鄂州刺史志氣剛徑不畏強禦李兼鄂州刺史李希烈反遣兵襲鄂兼大破之於是畏兼不敢復有窺江淮之志柳仲郢華原人公綽子牛僧孺辟為武昌幕官有父風矩僧孺歎曰非積習名教安及此耶溫遷約僖宗時黃巢據荆南遷約糾義旅由長沙來往藩翰賊不敢侵邑賴以全僖宗嘉之命尹於崇陽凡十有三載厯知鄂州宋楊礪鄠人雍熙中出知鄂州以善政聞張詠甄城人太平興國中知崇陽縣為陂渠溉田民以茶為業詠使植桑民初以為苦其後官榷茶他縣皆失業而崇陽之桑已成可為絹歲百萬匹民咸德之謝濤富陽人真宗時知興國軍清靜端介有治績王素大名莘人御史中丞孔道輔薦為侍御史道輔貶出知鄂州仁宗思其賢擢為諌院鄧聖求仁宗時知武昌縣政績顯著召入翰林段少連開封人仁宗時知崇陽縣崇陽劇邑自張詠為令有治狀其後惟少連能繼其風迹王琪華陽人慶厯中知興國軍事政尚簡靜蔡仲舒新昌人景祐間知通山弭盜有功王安國臨川人為武昌軍節度推官在郡持正不可干以私蔣之奇宜興人熙寧中為通山令有政績楊繪綿竹人元豐間知興國軍為吏強敏表裏洞達一出於誠方澤知武昌軍政和民悅黃庭堅有詩美之黃庭堅分寧人紹聖初知鄂州有善政梁燾須城人紹聖中以司馬光黨黜知鄂州作薦士録具載姓名客或見其書口公所植桃李乘時而發但不向人開耳燾笑曰燾出入侍從位至執政八年之間所薦用之不盡負愧多矣其好賢樂善如此孔端植曲阜人熙寧中知通城縣有政聲卒於官因家焉唐鈞政和間嘉魚今築新隄以弭水患李涓南豐人靖康初知崇陽縣時檄召天下兵鄂部縣七當發二千九百人皆未集涓獨以所募六百請行出家錢買牛酒激犒之即日引而東至蔡敵至涓馳馬先犯其鋒下皆步卒蒙盾徑進殺騎兵數人敵稍却涓乘勝追北十餘里大與敵遇飛矢蝟集創甚猶血戰大呼叱左右負己遂死焉金兵去蔡人以其尸歸朝廷録其忠贈朝奉郎趙令􅍲燕懿王之後建炎初為鄂州通守領兵戍武昌賊閻瑾犯黃州縱掠而去令􅍲渡江存撫之黃人乃安王庶慶陽人紹興六年除湖北安撫使知鄂州趨闕因燕見言陛下欲保江南無所事如曰紹復大業都荆為可高宗大異之李稙臨淮人張浚督師江上薦為鄂州通判大盜馬友孔彥舟未平稙請修戰艦習水戰分軍馬為左右翼大破彥舟伏兵誅馬友二盜平李宜高宗時知興國軍時金兵渡江至境上遣使檄降宜焚香斬使者嬰城固守金兵不得入城民賴以安王子溉高宗時知江夏縣視民如子久而慕之錢師仁紹興中為崇陽令修復白泉陂以利民宋時紹興中守興國軍疏言諸州縣違期歸業者其田己佃及官賣者即以官田之可耕者給還詔從之王綯紹興中知興國軍與知永興縣陳升率先奉詔誘民墾田增一秩趙善俊宋宗室孝宗時知鄂州適南市火善俊亟往視事弛竹木稅發粟賑民開古溝創火巷以絶後患省晏遊車騎鼓吹之費郡計用饒以代輸民役錢李椿永年人孝宗時知鄂州請行墾田復户數千曠土大闢陳居仁興化人孝宗時知鄂州築長隄捍江新安樂寮以養貧病之民撥間田歸之韓彥直延安人乾道七年授鄂州駐劄御前諸軍都統制條奏軍中六事乞備器械增戰馬革濫賞厲奇功選勇略充親隨等朝廷多從之先是軍中騎兵多不能步戰彥直命騎士披甲徒行日六十里雖統制官亦令以身率之人人習於勞苦馳騁如飛事聞詔令三衙江上諸軍倣行之羅願歙人孝宗時知鄂州有政績禱雨立烈日中得暴疾卒劉清之臨江人孝宗時通判鄂州鄂大軍所駐兵籍多偽清之白郡及諸司請自通判廳始俾偽者以實自言而正之簡世傑靖安人隆興中蒲圻令政本愷悌行之以信不設科條民不忍犯陸九齡金溪人乾道中興國軍教授地濱大江俗鮮知學九齡嚴規矩勸綏引翼士類興起汪泳休寧人淳熙中知蒲圻政聲藉甚上言王者仁政必自均力役始帝嘉納之趙方衡山人淳熙中調蒲圻尉疑獄多所委決任希夷邵武人朱子弟子淳熙中知崇陽有善政王武豐城人慶元初為江夏尉平租寬禁有功於民趙彥倓宋宗室開禧初知興國軍歲旱蝗軍需益急屬邑令負上供銀彥倓坐纍貶秩令愧謝彥倓曰屬時多難宜寬民力何謝為潰卒據外城為變彥倓捕斬之散其餘黨吳柔勝宣州人嘉定中為湖北運判兼知鄂州甫至值歲歉即乞糴於湖廣大講荒政十五州被災之民全活者不可勝計史彌鞏鄞縣人嘉定中李􅐉開鄂閫知彌鞏持論不阿辟咨幕府事壽昌戍卒失律欲盡誅其亂者彌鞏靖誅倡者一人軍心感服黃何休寧人嘉定時大冶簿湖中三山産鐵尉巡警盜鑄者四千人起為敵何單騎往諭焚其具還延朱子弟子萬人傑為學者師俾知趨嚮鄒應博嘉定中為武昌尉政事通敏浚壽井以便民薛儀老永嘉人端平三年知蒲圻縣嚴明精敏作新學校孟珙棗陽人嘉熙中授樞密都承旨制置使兼知鄂州劉全遣談深復光化軍息蔡降珙命以兵逆之得壯士百餘籍為忠衛軍趙逢龍鄞人理宗時知興國軍至官有司例設供帳悉命徹去日具蔬食坐公署事至即面問決遣政務寬恕撫諭惻怛民不忍欺尤究心荒政以羡餘為平糶本陳慶勉休寧人淳祐中任蒲圻尉湖北漕使蕭逢辰舉之曰性資純恪學問老成陳仲微高安人淳祐中知崇陽縣寢食公署旁日與父老樵漁相爾汝下情必達吏無所措手李壽朋淳祐中知興國軍事招水軍六千人建富池沙口等寨置戰艦五十百廢具興尹穀長沙人宋末知崇陽縣廉正有聲束元嚞通城主簿毁淫祠正風俗元李恆西夏人至元十二年守鄂州時豪民聚衆侵江陵命恆往討恆斂兵不動諭使出降得十餘萬悉縱為民禁軍虜掠饋獻一無所取鄭鼎陽城人至元十四年為湖北道宣慰使鎮鄂州蘄黃二州反鼎將兵討之戰於樊口舟覆溺死鄭制宜鼎子至元十四年襲父職大原平陽萬户戍鄂州攝府事城中屢災或言於制宜恐姦人乘間為變宜捕其疑似者痛治之制宜曰吾當嚴守備而已奈何濫及無辜不笞一人災亦遂息有盜伏近郊晨暮剽劫流言將入城俄有數男子自城外至顧盻異常制宜命吏縛入獄問之無驗行省疑其非將釋之不從明日再出城東遇一人乘白馬貌服殊異制宜叱下訊之乃與前數男子同為盜者遂正其罪一郡帖然陳天祥寧晉人至元十三年興國軍以籍兵器致亂行省命天祥權知本州事天祥領軍士十人入城中父老來謁天祥諭之曰捍衛鄉井誠不可無兵任事者籍之過當故致亂耳今令汝輩權制兵仗自衛如何民皆稱便乃條陳其事於行省行省許以從便處置天祥凡所設施皆合衆望由是流移復業鄰郡民來歸者伐茅斬木結屋以居天祥命以十家為甲十甲有長弛兵禁以從民便民心既安軍勢稍振用民兵收李必聰山寨不戮一人他寨聞之各自散去境內悉平察罕西域博囉罕城人大德四年中書省奏為武昌路治中廣西妖賊高仙道以左道惑衆平民詿誤者數千計既敗湖廣行省命察罕與憲司雜治之鞫得其情議誅首惡數人餘悉縱遣博囉罕舊作板勒紇今改成宣皇慶間為嘉魚縣令築城及隄有功於民周鏜瀏陽人泰定中大冶縣尹有豪民持官府短長號為難治鏜狀若尫懦而毅然有威不可犯抑豪強惠窮民治行為諸縣最申屠致遠壽張人至元中壽昌府判時寇盜竊發遠近騷然致遠設施有方衆賴以安成遵穰縣人至正中武昌路總管武昌自十二年沔寇殘燬民死於兵疫者十六七而大江上下皆劇盜阻絶米直翔湧民心恟懼遵言於行省假軍儲鈔萬錠募勇敢之士具戈船截兵境且戰且走糴粟於太平中興民賴以全活者衆李夔至正間嘉魚縣尹創建縣治修建橋梁侯玉濟陰人至正中蒲圻簿守己儉約居常惟紙衾菜飯蒞事撫民類多仁愛翟居敬金臺人為興國路録事遇旱請禱霖雨沛然居官廉勤卓有政績劉碩茶陵人至正中為江夏縣魯湖大使起義兵援茶陵死之明姚以德洪武初知嘉魚縣元末嘉魚當敵衝民不勝苦以德闢草萊課耕耨數年之間八蕃物阜馮昶嘉魚人洪武初知咸寧縣兵革初定民多逋竄昶招集流亡百廢具舉柯日新平涼人洪武初知蒲圻縣時瘡痍未起日新勞來安集疆理土田置郵建學民襁負而至丁士梅洪武初由翰林出知蒲圻立政卓然可觀李善將樂人洪武中知崇陽縣平易簡當愛民如子吳懋西安人洪武中知大冶縣端正廉潔作戒諭文以訓民汪大本徽州人洪武初知武昌府教養有法構講堂修齋舍以興學教士楊伯成龍泉人洪武中知崇陽縣時初定賦上官欲倣長沙例行之伯成言崇陽山田磽確非長沙沃土比竟得輕稅馬極永陽人洪武初知通城縣攘除凶暴撫輯遺黎踰年田野闢户口增境內大治馮萬金黃州人洪武初知大冶縣立廨宇勸農桑流亡日集王克中洪武中知通山縣清廉有聲王原銅梁人永樂中知咸寧縣勞心撫字不事表暴樊繼句容人永樂中知興國州州有虎患繼禱於城隍神明日兩虎自鬬死州西湖隄壞捐俸築之興學校毁淫祠令民喪葬用朱子家禮民多從之綦禎永樂中知大冶縣以寬蒞民恤貧下士吏役肅清民懷其德王進永樂中武昌府學訓導講明體適用之學尤嚴義利之辨士之出其門者多立名節于賢達縣人永樂中知大冶縣蒞事果斷期年政平訟理林和生晉江人永樂中知蒲圻縣勵己公廉臨民慈愛去之日行李蕭然邵銘仁和人宣德初知武昌府為政公平三載間百弊悉除上官儀沙縣人宣德中知咸寧縣德政及人吏民畏而愛之莫震吳江人正統中知嘉魚縣每秋冬親行郊野相土宜修陂池以興民庸疆場整飭封域肅然楊慶長壽人正統間知通城縣九載奏績民德而留之請於朝復任九年秩滿又請前後凡二十三年鮑旭池州人正統中知興國州治民以慈愛為本有冤抑者急為伸之修常平倉六所撙節出納數年民以殷富朝天隄圮甃以石建石亭於上人名為鮑公隄孫倫瀘川人天順中知嘉魚縣修學宫條冠婚喪祭之禮頒於民楚王旗校強取居人木倫諭之不聽乃嚴刑遣之王大怒衆為之危倫曰事利民死何恨卒不為動秦夔無錫人天順中知武昌府創立養濟院及張乖崖祠縛劇盜定均徭法積榖備荒在任多善政黎庸交址人天順初知大冶縣錦衣校尉毛福居大冶庸不為禮福誣以罪罷官下獄庸奏辨復職給半俸居大冶子孫遂占籍焉遊季勳豐城人成化中知江夏縣食不兼味庭少鞭撲母喪去官行至白滸鎮暮夜羣盜至問其姓名曰遊公廉吏解散去馬炳然內江人成化中知嘉魚縣民有為人作訟牒者炳然逮詰之對曰貧無以養炳然給資使力本自是遊食者悉遁去暇日巡行村落悉知民間瑣屑事吏不能欺周洪上海人成化中知蒲圻縣勸課農桑驗其勤惰而賞罰之高田置筒車下隰築陂堰民賴饒洽鄉置社學學置田令生徒耕讀仍復其徭有姦法者大書木牌於其門雖權勢不避立義倉儲粟三萬石正德初大旱民猶被其餘澤杜敏霸州人成化中知通城縣建便民倉十五所於陸溪口改建養濟院於陸平寺左汪璽婺源人宏治中知武昌縣歲旱虔禱以勞卒嘉靖中建鳳臺書院祀之薑溥廣德州人宏治中知嘉魚縣邑瀕江多水患乃自百匹山作長隄至三角鋪二百餘里患乃息王介侯官人宏治中知咸寧縣以贖鍰易穀萬石歲飢全活甚衆李鋭安福人宏治末知崇陽縣廣儲積榖後遇凶歲發其所藏全活者無算胡瀛羅山人知興國州事蒞事明敏張珮新淦人正德中知蒲圻縣規畫有法凡土田廣隘户口多寡各集其數編糧稽田賦編丁均差徭編甲通供億編户詰姦宄王鑾大庾人嘉靖初知武昌府指揮劉良等侵官糧釐而置諸理鎮守中官李景儒歲進魚鮓多科率鑾疏請罷之楚府征茶稅商重困鑾謂稅當歸官據故事力爭王怒訐鑾遂請終養歸莫揚吉安人嘉靖間知江夏縣時行方田令掦率里中父老誓神已再拜謂父老曰令屈膝以為民也若屬董事者各自愛苟因緣為姦罹三尺法令不能庇衆皆感泣不敢私蕭立業新喻人嘉靖中知咸寧縣三年察廉內召嘗曰吾治邑無所愧但增民數及多植引道松為負邑耳吳希賢宣城人嘉靖中知興國州弗便於民者悉裁之立忠節祠祀謝疊山賈棲鸞巴州人嘉靖中知大冶縣時盜賊縱掠棲鸞僉水南民之在大冶者親領入山擒巨寇十餘人盜自是不敢犯境丁模如臯人嘉靖中知大冶縣户選一人為家長冠服而禮之責以教弟子完賦稅刑罰不施而民勸孫溥貴池人嘉靖中知通山縣扶善鋤惡遇事敢為監司以不阿抑之遂致仕去林金連江人嘉靖中知通山縣多善政去之日民攀轅泣送李有朋東陽人隆慶中知武昌縣邑舊無城郭賊易侵犯有朋創城之譙田龍南充人隆慶中知通山縣擢知興國州又嘗攝崇陽縣民並愛戴之馮應京旴𣅿人萬厯中以僉事分巡武昌稅監陳奉橫恣應京繩以法抗疏列奉九大罪忤旨逮問民聚譟斃奉黨并傷緹騎應京坐檻車曉以大義民號送為位祀之復詣闕訴冤卞孔時四川人萬厯中同知武昌府抑稅監陳奉受誣被逮胡嘉棟西華人萬厯中武昌府推官稅璫陳奉率羣小為凶暴富人無故被籍者千餘家棟與同知卞孔時共勵操執法盡逮羣校置死奉稍斂戢後為奉所譖被逮徐日久西安人萬厯中知江夏縣民歲輸苦胥吏侵漁乃置匱使民自投其中運漕苦軍訌使民輸粟於官檄漕軍就倉受粟邑有隄捍水自江夏接嘉魚一百二十里日久亟新之黃應龍順德人萬厯中知武昌縣會歲祲為粥以賑飢者三閲月復請蠲田租之半隨建義倉每歲積穀貸民劉曰淑南昌人萬厯中知武昌縣剔姦弊有卓異聲劉體仁內江人萬厯中知武昌縣先是邑無學田體仁捐俸購買每歲徵其入以贍寒素葛中選河西人萬厯中知嘉魚縣民懷其德立祠祀之周曰庠臨川人萬厯中知咸寧縣邑東北近湖城且就圮建議築隄衛之城以不潰宣大勳蒙化人萬厯中知蒲圻縣縣西北盤石湖歲水溢傷禾大勳築隄亘十里自是無水患趙廷儼嶽陽人萬厯中知通城縣為政敏決始建石城有保障功韓相晉州人天啓中知武昌縣釐弊攻鋤豪猾治甚有聲徐學顔永康人崇禎中為楚府長史攝江夏縣事楚府新募兵即令學顔將之張獻忠來寇新軍內叛城陷學顔格鬬賊斷其左臂大罵不屈死一家二十餘人殉之贈按察使僉事王喬棟雄縣人崇禎中湖廣督糧參政駐興國州流賊陷城自經城樓上本朝乾隆四十一年賜諡節愍李育英固安人崇禎中武昌府通判張獻忠陷城舉家自縊本朝乾隆四十一年賜諡節愍同死者武昌衛經厯汪文熙巡檢戴良瑄崔文榮海寧人崇禎中厯官武昌參將張獻忠犯漢陽文榮潛師渡江擊斬六百餘級漢陽陷文榮議守城不如守江團風煤炭鴨蛋諸洲水甚淺不宜縱之飛渡當事不從賊果由團風渡江陷武昌縣文榮戰死同時巡江都司朱士鼎城陷被執賊喜其勇敢欲用之戟手大罵賊斷其右手乃以左手染血灑賊賊又斷之不死賊退令人縛筆於臂能作楷字招集舊卒訓練如常鄒逢吉湖口人崇禎中知武昌縣值峽山土寇倡亂逢吉討平之暇即進士之良者講道論義時流寇蹂躪江黃多方設備又立龍虎二營督率訓練賊憚之後行取入京值闖賊陷城被執不屈死吳騤宜興人崇禎中知嘉魚縣邑土城易圮騤始甃以石王良鑑霍山人崇禎中知嘉魚縣十六年流賊張獻忠陷城罵賊死本朝乾隆四十一年賜諡烈愍曾栻臨川人崇禎中知蒲圻縣時寇氛交訌軍需旁午栻以息事安人為本務上官檄取戰騾栻以非地産謝去後流寇陷城死之本朝乾隆四十一年賜諡烈愍徐至美上虞人官都司崇禎十六年獻賊圍武昌至美分守黃鶴樓率兵力戰被重創死本朝乾隆四十一年賜諡烈愍本朝楊世學當塗人順治中武昌道僉事善斷疑獄時有賊嘯聚黃州界號擡天黨世學討平之盛治江都人順治中知通城縣城為流賊燬治招民入城給官地使建市􅒡歲飢捐資買榖三千餘石賑之蟲虎為災禱於神害悉除孟世泰臨汾人康熙初以宏文院編修署武昌道參政時吳逆倡亂世泰效力行間垂十年屢有功及賊敗佯乞降緩師世泰知其詐追之至營諭以利害賊遂解甲去邱象升山陽人康熙初通判武昌府通城民因積逋聚譟象升單騎往諭開誠布公衆感悔輸納恐後象升徴南糧除陋規清積弊督理捕務搜剔姦宄吏民畏服謝鑅英德人康熙中知大冶縣有姦民黃金龍謀變鑅止諸路進剿兵躬率鄉勇討平之張芭桐城人康熙中通判武昌攝知府事裁兵夏逢龍以索餉鼓譟圍巡撫署芑正色叱之賊將加害父老數百人奔號懇免賊囚之欲授以官芑罵而裂其劄賊犯荆州芑越獄出東抵鄥穴録狀上部請師剿賊會蘄州叛兵倡衆內訌芭與守備李馞計擒斬之駐道士洑檄屬縣討賊賊不敢東下隨振武將軍瓦岱克復黃州獲逢龍賊平擢工部員外郎龎頴廣西人康熙中知嘉魚縣有惠政裁兵夏逢龍之亂有賊黨突入縣境攻西南門甚急頴多方捍禦相持五十晝夜賊知不能攻始引去事定頴撫輯邑民不急催科而卒無逋賦去任後邑人刋石志其政並立專祠祀之乾隆十年命入名宦祠姚棻桐城人乾隆中知武昌府案無留滯於土豪衙蠧鋤治不少貸京山嚴金龍逆黨有何先生者未獲監司某得同姓者一人委棻鞫之具得其畏刑誣服狀乃白於督撫而監司猶爭論不已會信陽牒至則真者已就捕矣大吏益心重之後官至福建巡撫前纂修官臣羅家彥恭纂總纂官臣廖鴻藻恭覆輯校對官臣荆宇燾恭校大清一統志武昌府人物晉孟陋字少孤武昌人少而貞立清操絶倫布衣蔬食以文籍自娛口不及世事未曾交遊時或弋釣孤興獨歸雖家人亦不知所之喪母毁瘠殆於滅性不飲酒食肉十有餘年簡文帝輔政命為參軍稱疾不起由是名稱益重博學多通長於三禮注論語行於世郭翻字長翔武昌人少有志操辭州郡辟及賢良之舉家於臨川不交世事惟以漁釣射獵為娛居貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉推與之縣令聞而詰之以稻還翻翻不受嘗以車獵去家百餘里道中逢病人以車送之徒步而歸其漁獵所得或從買者便與之而不取直亦不告姓名由是士庶咸敬貴焉與翟湯俱為庾亮所薦公車博士徵不就南北朝宋郭希林翻曾孫少守家業徴州主簿秀才衛參軍元嘉初吏部尚書王敬宏舉為著作佐郎後又徵員外散騎侍郎並不就子蒙亦隱居不仕泰始中郢州刺史蔡興宗辟為主簿不就唐江水清永興人開元間鄉貢明經親老侍養不仕授徒靈峯山一時人士宗之廖忠唐年人大中間同弟恕糾率精兵與黃巢迎敵賊斬其首猶躍馬七里後人名其地為七里山走馬嶺鄉人立廟祀之五代南唐吳仲舉字太沖永興人仕李煜為池陽令曹彬平江南仲舉殺彬所招降使者城陷彬義而釋之宋陳卓咸寧人有田五千畝兄之田止一千畝卓願合户而同之且曰人生飽暖之外骨肉歡聚而己其後兄子康民登皇祐初進士官至大中大夫馮京字當世江夏人舉進士自鄉舉禮部以至廷試皆第一吳充以論溫成皇后追册事出知高郵京疏充言是不當黜為翰林學士知開封府數月不詣丞相府韓琦以為傲京曰公為宰相從官不妄造請乃以為公重非傲也出安撫陜西神宗立改御史中丞王安石為政京論其更張失當擢樞密副使進參知政事薦劉攽蘇軾掌外制茂州夷叛徙知成都府有能聲哲宗即位拜太子少師致仕卒諡文簡吳中復字仲庶興國人仲舉子進士及第纍官殿中侍御史彈宰相梁適適罷又彈宰相劉沆沆罷改右司諫厯成德軍成都府永興軍有善政知荆南坐過用公使酒免中復樂易簡約好周人之急士大夫稱之李昌國江夏人有清修善於教子長康侯仕至河南守次康年仕至監丞善古篆與蘇軾黃庭堅遊次康直仕至左司員外郎休官歸里自稱裕老費師古蒲圻人天聖進士纍官諫議大夫時范鎮知諫院以請建皇儲罷師古抗疏留之不報遂歸李翔字仲覽興國人元豐進士博學善吟咏蘇軾謫黃州每訪之作懷坡閣以寓思軾之意吳擇仁字知夫中復從孫建中靖國初知大鹿縣擢熙河路轉運判官以直祕閣為副使拜户部侍郎兼知開封府俱有能聲後以直學士提舉崇福宫卒盛子充興國人親喪廬墓三年鄉里稱其孝家富藏書名其閣曰萬卷與王黼同舍黼登相位一無所干蔡攸亦以書招不赴任獻夫字安世蒲圻人政和進士溫厚爾雅厯荆門刑曹有異績陳求道字得夫咸寧人登進士第靖康間判都水監朝議二帝出郊請和求道力爭不聽金人立張邦昌下令在京官不朝者死求道稱疾不屈先是陳留河決漕輸不通開封尹宗澤命求道疏治之七日盡復故道建炎四年命為襄鄧隨郢鎮撫未行寓蒲圻龍堂寺招撫劉忠叛奉求道為主求道正色厲詞賊怒殺求道妻蔡氏及二子符佺必欲從已求道罵愈厲賊斫其口拔舌斷之獨符子凱竄山谷得免賊退始得求道尸瘞於興坡李宗儀江夏人與從弟宗儒四世同居好學篤行興書院建祠以祀先聖給田以贍來學汴京失守程吏部千秋勤王宗儀子彥章開倉庾資給軍士王質字景文興國人博通經史善屬文遊太學著論五十篇謂之朴論中紹興三十年進士第汪徹張浚皆辟為屬入為太學正時孝宗屢易相國論未定質上疏極言天子心知質忠而忌者共讒質年少好異論遂罷去會虞允文宣撫川陜辟質偕行令草檄契丹文援毫立就詞氣激壯允文起執其手曰景文天才也入為樞密院編修官允文當國以質鯁亮不回可石正言時中貴人用事多畏憚質隂沮之奉祠山居絶意祿仕吳必大字伯豐興國人少從呂伯恭張敬夫遊晚事朱子深究理學以父任為吉水丞會禁偽學遂棄官歸李義山字伯高嘉魚人師事朱晦菴張敬夫二先生讀書一過解大義嘉定間登進士初知吉饒等州有善政淳祐中以金部郎中入對言為善不可有疑心去惡不可有悔心理宗嘉納之萬人傑字正淳大冶人師事陸象山復師事朱子朱子稱之曰萬正淳氣象儘好却是先於性情持守上用功張丰應大冶人師事朱子講學白鹿洞嘗攝司理會洞猺亂俘獲渠魁釋其脅從無驗者數千人邵應豹字起南武昌人嘉熙進士常德司户轉知江夏母老辭祿侍養時同年丁大全賈似道當路薰灼豹獨絶之自幼篤孝母疾醫須鵲肉和藥豹默禱鵲自投其室疾尋愈後知寶應縣轉知潯州皆有惠政卒年九十五李大同嘉魚人富於學問能文章瀟灑無疑滯咸淳中以周禮舉第一授國子監學録後歸隱不仕黃觀象江夏人居父母喪哀毁踰禮廬墓六年墓旁産芝詔賜粟帛捐徭役旌之楊秀咸寧人年十二有虎齧其兄秀即以斧斫虎首兄得脫秀扶凡歸他日其母又為虎所傷秀乃奮呼復以斧斫之虎死母得全王華字日華咸寧人宋末兵亂華集少壯數千結寨以護鄉邑民賴以安元宋願字文齋蒲圻人生而頴敏力學不倦崇尚經術至忘寢食皇慶中授濂溪書院山長轉澧州學正何槐生字德孚蒲圻人幼頴敏日記數千言泰定進士授江西宜黃縣尹再任德安雲夢遷慶元路總管府推官俱有政聲所著有善政指南書及碑碣諸文行世聶炳字韞夫江夏人元統初進士為寶慶路推官有善政至正十二年遷知荆門州詳見荆門州名宦李英字茂林義山孫武昌兵變所在相聚為盜英保障鄉閭參政阿魯輝克復武昌召募忠勇英倡率義兵出應以功授敦武校尉蘄黃寇以舟師溯武昌而上蒲圻咸寧嘉魚殺掠殆盡英設伏擊之獲鎧仗輜重甚多獻俘授奉議大夫同知嶽州府事李鵬翔字時起咸寧人至政初纍官翰林學士世居梓山下文章德業一時稱重廖均用蒲圻人父升三卜葬於縣之楂林均用負土成墳手植異松元末避亂南山散財饗士鄉民賴以全活躬耕南山下儲穀至二十萬石值歲旱均用盡發所儲嘉魚咸寧蒲圻崇陽四縣咸取濟焉嚴士真崇陽人嘗遊學棲息廬山博洽經史善詩文丁鶴年其先西域人父智默特羅丹為武昌縣達嚕噶齊遂為武昌人淮兵襲武昌奉嫡母走鎮江母殁鹽酪不入口者五年復避地四明後還武昌生母馮已前死不知殯處慟哭行求母告以夢乃齧血沁骨斂而葬焉烏斯道為作丁孝子傳鶴年好學洽聞精詩律晚學浮屠結廬居父墓卒智默特羅丹舊作職馬祿丁達嚕噶齊舊作達魯花赤今改正馮三江夏人為湖廣省公使素不知書寇陷湖廣皂隸輩悉起為盜拉三以從辭曰賊名惡我等豈可為衆怒將殺之三遂唾罵賊乃縛諸十字木舁之行而刲其肉三益罵不止抵江上賊斷其喉去妻亦投江死明張文忠字甫相興國人身長一丈二尺技勇絶人元末立鯽魚寨保護鄉里以拒賊明太祖戰陳友諒於康山文忠率所部轉餉助軍進秩大夫劉任一名仁武昌人元四川行省參政明初擢兵部尚書出為廣東行省參政召拜應天府尹其在四川廣東以善政聞魏觀字杞山蒲圻人元末隱居蒲圻山明太祖下武昌聘授平江學正纍官起居注洪武元年建大本堂命勸侍太子説書授諸王經厯改侍讀學士遷祭酒五年廷臣薦觀才出知蘇州府後以譖誅帝尋悔之命致祭歸葬蔡哲字思賢武昌人洪武中中書參政四川明玉珍死子升立遣使奉貢上命哲往宣諭哲挾畫史偕行圖山川險易以獻後伐蜀取道多用之李祥字從吉咸寧人元進士洪武初都督府斷事厯遷尚寶卿浙江按察使為人識度明雅威儀莊肅太祖重之親為誥詞褒美葛素字叔繪咸寧人洪武中工科給事中母喪服闋將赴京時楚藩侵斧頭湖為鳬雁池旗校橫甚素以計縛其用事者十人欲與詣闕王恐遣使請還所侵咸寧民賴之成務字惟幾興國人洪武舉人授廣元教諭適御史按邑率諸生郊迎己望見遽麾諸生返御史至問諸生何在對曰大人行李甚盛恐士子見之壞心術己麾之去矣御史奇之薦擢行人卒官按察使周琳字尚貢武昌人父縉永清縣典史燕兵起縉佩印南奔糾義旅勤王事泄械赴京師得末減謫戍興州遺書諸子議一人代戍兄弟爭往琳曰兄老矣弟未有子我當往竟代父還是年戰死鷂兒嶺盧文政江夏人建文舉人纍官太僕寺丞致仕年八十餘手不釋卷所著有厯代一覽徐祥大冶人初為漢萬户歸明太祖於江州積功為燕山右護衛副千户燕王命侍左右從起兵奪九門破居庸關進僉事屢立戰功進為都指揮使封興安伯祿千石陳智字孟機咸寧人永樂進士授御史巡按福建蘇松理冤獄多善政遷陵西按察使洪熙初入覲兵部奏以馬給朝覲官智上章謂上新即位俾職官孳牧恐傷國體上嘉納之官至右都御史李琥武昌人宣德間左軍都督府都事土木之變隨侍英宗職橐饘備厯艱苦而卒鄧珏江夏人宣德進士為刑部郎中貴州副使厯官三十餘年廉介自持吳綬武昌人父喪廬墓虎至不為害景泰中旌表李玘蒲圻人七世同居成化十年旌表徐鏞字用和興國人成化進士授御史與同官劾汪直八罪并及其黨王越陳鉞諸人地震修省旋舉慶成宴鏞以非上下交修之義請罷之謫鎮原知縣宏治中擢淮安知府皆有善政終右副都御史總督漕運潘廷桂字貞庵江夏人幼至孝九歲母疾籲天請代母愈遂不茹葷成化二年授南昌府經厯父卒於官署奉柩歸舟過鄱陽遇大風廷桂度不免以索繫棺於身舟覆與波上下忽漂至一洲得免歸葬廬墓三年黃玹字敬潤蒲圻人成化進士授高安知縣有政績拜監察御史時貴州征都勻苗敕玹紀功改土為流改州為衛厥功居多陟大理寺丞龔伯安字文卿崇陽人成化中知新昌縣有善政汪洪字克容蒲圻人成化舉人官至山東參議謫知錦州創石盤七堰溉田數千頃土苗叛遇害李承箕字世卿嘉魚人成化舉人往師陳獻章久之有所悟歸隱黃公山不復仕與兄進士承芳皆好學稱嘉魚二李李承勛字立卿嘉魚人宏治進士知太湖縣厯官南昌知府舉治行卓異遷浙江按察使纍遷右副都御史巡撫遼東嘉靖時遷刑部尚書改兵部督團營時中官出鎮者多暴橫承勛因諫官李鳳毛等言先後裁二十七人又革錦衣官五百人監局冒役又數千人復奏減御馬監而請以騰驤四衛屬部核詭冒制可承勛沈毅有大略服官四十年家無餘資卒諡康惠葉相通山人父任山東鹽運經厯卒於官六年不能歸相方童年間關百狀扶柩歸葬廬墓三年性好學從李承箕逰陳獻章亟稱之廖漢字天章蒲圻人宏治進士授户部主事陳情便養改南京孤介有聲正德初劉瑾當國上疏抗論時政不報再疏自陳歸結茅五供山不復出江師古字克承蒲圻人宏治進士授工部主事管清江浦閘時中貴往來作威凌鑠師古不為屈正德𥘉劉瑾柄國即抗疏歸性儉朴敝衣糲食陋室匡牀翛然自得劉珂字梅雪興國人宏治進士授長洲令多善政厯太僕丞劉瑾柄政乞休鍾湘字用秀興國人宏治進士厯官知漳州府有平海寇功張璞字中美江夏人宏治進士以御史按雲南中官梁裕虐民以法繩之為劉瑾所誣繫獄死王疇字敘之崇陽人幼聰慧三歲失母哀毀如成人事繼母尤謹正德進士授南京大理評事有誣殺人者獄已成疇力辨其非後果獲實殺人者於淮北內殿災上言四事後遷四川副使歸家居手不釋卷所著有石洲文集一卷孟廷珂字培之武昌人正德進士授大理寺副武宗南巡上疏極諌忤旨謫户部照磨嘉靖中纍官雲南參政汪文盛字希周崇陽人正德進士授饒州府推官持憲不阿入為兵部主事偕同官諫武宗南巡杖闕下嘉靖初厯雲南按察使就拜右僉都御史巡撫其地安南莫登庸篡位其舊臣多不服文盛諭降之劉守緒字克承興國人正德進士授奉新知縣從王守仁平宸濠後官至太僕卿方宸嘉魚人正德中土寇賀璋反宸應募剿捕之餘黨復熾宸追戰遇伏墜馬死弟寀救兄力鬬亦死事聞贈宸檢校仵瑜字忠父蒲圻人正德進士世宗初為禮部主事疏陳勤聖學篤親親敬大臣開言路等十事己而輿羣臣伏闕爭大禮死杖下後贈光祿寺少卿朱廷立字子禮通山人嘉靖進士授諸暨知縣議建海塘歲省夫直纍遷禮部侍郎所著有鹽志馬政志家禮節要汪宗伊字子衡文盛嗣子嘉靖進士除浮梁知縣厯官兵部郎中楊繼盛劾嚴嵩及其孫鵠冒功事宗伊議不撓忤嵩自免歸萬厯時纍官户部尚書總督倉場致仕卒天啓初追諡恭惠陳宗夔字惟一通山人嘉靖進士纍官浙江兵備副使有破倭寇功劉景韶字子成崇陽人嘉靖進士厯貴州僉事屢破叛苗擢淮揚道副使有破倭寇功官至右僉都御史巡撫鳳陽諸府徐綱字浴泉興國人十歲而孤母黃氏守節教綱嘉靖中登進士遷兵科給事中世宗建醮命諸臣黃冠行香綱上疏極諫廷杖瀕死復諫乃止隆慶元年簡授工部侍郎萬厯元年致仕歸熊桴字元乘武昌人嘉靖進士授太倉知州轉蘇州同知擢蘇州兵備僉事升雲南參政轉陜西按察使左遷山東參政俱有政績擢僉都御史巡撫廣東以平海寇功進右副都御史卒於軍贈兵部侍郎賜祭葬唐時舉字省庵咸寧人父育有三子獨器重時舉分産罄與昆季謂時舉曰汝不藉此也登嘉靖進士除知會稽縣有善政入為大理寺官值嚴嵩獄起株連頗濫時舉多所平反未幾卒於官舒大猷通城人嘉靖舉人纍官浙江布政司以文章政事名一時所著有諸儒粹議及清心齋集胡希瑗字橋南大冶人嘉靖舉人知潼川州會三殿災采大木學宫有喬木數百章議欲取之瑗曰奈何伐廟木以自功别采得大木視旁郡獨先弟希寅字于野嘉靖舉人知開建縣一日釋奠於縣學適盜突至衆倉皇走希寅曰賊至當共捍衛走者治以軍法乃糾聚多人戎服親冒矢石殲賊百餘人賊自是不敢犯希瑗子應辰字汝拱萬厯進士户部主事榷江州不以餘緡自潤吳國倫字明卿興國人嘉靖進士入李攀龍王世貞詩社為七子之一由中書舍人擢兵科給事中楊繼盛之死國倫倡衆賻送忤嚴嵩假他事謫江西按察使知事嵩敗起建寧同知纍遷河南參政罷歸國倫才氣橫放好客輕財歸田後聲名籍甚所著有甔甀洞稿塢必信字迎實武昌人篤學有隱德年百歲孫明昌崇禎進士上言臣大父必信積學行義己及百年皆聖朝悠遠之徵詔賜冠帶粟肉命有司表其閭郭正域字美命江夏人萬厯進士授編修為皇長子講官厯禮部侍郎稅璫魯保請關防兼督織造秦王請封其庶子為世子閣臣沈一貫皆許正域持不可又建議奪黃光升許論吕本諡不果行會有訐楚王以異姓子嗣位者正域請勘帝以楚王立久不問遂乞歸妖書事起或引正域將置之死舉朝不平事得寢正域博通載籍勇於任事有經濟大略自守介然人望歸之扼於權相遂不復起家居十年卒光宗即位贈禮部尚書太子少保諡文毅孟養浩字義甫咸寧人萬厯進士授行人擢户科給事中李獻可請豫教元子獲嚴譴養浩疏救帝怒杖之百削籍為民光宗立起太常少卿遷南京刑部侍郎未之官卒舒宏緒字崇孝通山人萬厯進士官給事中時同官李獻可得罪宏緒爭之帝益怒出宏緒南京未幾除名天啓中贈光祿少卿李沂字景曾嘉魚人萬厯進士厯吏科給事中中官張鯨肆橫沂疏言陛下往年罪馮保近日逐宋坤鯨之惡百於保而萬於坤流傳謂鯨廣獻金寶多方請乞虧損聖德夫豈淺鮮帝震怒謂誣謗君父杖六十斥為民光宗嗣位贈光祿少卿徐汝化字應時興國人萬厯進士任河間令性孝友築愛日堂以娛親事兄如父與吳明卿倡和有青桂集趙邦柱字安甫咸寧人萬厯進士纍官通政司參議時諸中官請乞日以百數邦柱痛抑之中官為氣沮孟習孔字魯難武昌人萬厯進士授香山令調吳縣尋知開封皆有聲進太僕卿值楊漣為魏忠賢所陷習孔率同官上章訟漣忠賢怒嗾私人卓邁劾習孔罷歸及忠賢敗以恩詔復官習孔不出老於家熊廷弼字飛百江夏人萬厯進士授保定推官擢御史巡按遼東四十七年以兵部侍郎經略遼東廷弼有膽知兵善左右射然性剛負氣好謾罵不為人下物情以故不甚附天啓初朝議以袁應泰代遼陽破詔起廷弼於家與撫臣王化貞不和後以河西失遂論死本朝乾隆四十八年命巡撫舒常訪其後裔得五世孫熊泗先恩賞訓導吳應鵬字圖南通城人萬厯舉人官溫州司李有平海寇功與武將袁大安不睦挂冠歸崇禎末楊嗣昌欲起之力辭遊士任字肩生嘉魚人萬厯進士擢廣西道御史天啓時客魏用事士任特疏糾之自是臺省交章忠賢矯旨殺楊漣並逮士任下錦衣獄拷掠備至不死謫戍安慶崇禎元年詔釋之還其冠服賀逢聖字克繇江夏人萬厯進士授編修天啓時厯官洗馬魏忠賢聞湖廣生祠上梁文出逢聖筆特詣之逢聖曰此借銜陋習耳余安能數千里外為人作文忠賢怒誣以罪削籍崇禎初起故宫纍遷禮部尚書兼東閣大學士致仕歸厯陳道中所見災傷及郵傳困憊狀十四年召還明年又引疾歸十六年張獻忠圍武昌逢聖晨夕登陴與士卒同飢困城陷投墩子湖死妻危氏子覲明子婦曾氏陳氏孫三人孫婦某氏皆從死次子光明自他所來赴亦死之及事定有司覓其尸閲八日顔色不變本朝乾隆四十一年賜諡忠慤王台彥字明珍蒲圻人萬厯舉人官四川達州知州有白蓮教匪攻城台彥計擒其魁諭散黨與州境以安丁父艱歸服闋補河南信陽州知州治聲甚著時楊漣以論魏璫死舁骸歸道經信陽與漣友者不敢視台彥獨撫棺慟哭且厚恤之擢銅仁府知府境多苗台彥恩威並著胥悅服旋授畢節道副使安奢二酋擾黔中朝廷遣使往勘皆不返台彥攜僕就道檄召安信信使其驍帥率千衆來迎意叵測叱退之夜分酋貽以金珠台彥曰吾不可威劫亦不可利誘但欲平界息爭救爾衆萬死耳酋服其誠信遂歸命定界而還朝廷賜白金寶鈔授廣西參政踰年豫告歸卒魏説字肖生蒲圻人萬厯進士官工部郎中典試粵東督學四川釐正文體得人稱盛嗣授山西按察司副使轉參政復除山東按察使所在多惠政山東妖賊煽衆圍邑攻郡勢逼省會説點煙丁守城騰檄招撫賊乃靖遷太僕寺少卿尋除應天府府尹却私餽減徵額未幾擢户部侍郎兼都察院右僉都御史以不附閹璫致仕歸著青山閣集八卷熊開元字魚山嘉魚人天啓進士除崇明知縣調吳江崇禎四年徴授吏科給事中帝遣中官王應期等監視關中軍馬開元抗疏爭王化貞久繫不決開元請立肆化貞市朝化貞卒正法後貶秩十三年遷行人司副會求言開元於帝御德政殿入奏極論周延儒廷杖戍杭州楊逢春咸寧人母殁未葬家忽火猝不能移棺乃伏棺上欲與母俱燼衆扶之出泣曰母尸不能全逢春終不有其身也復入衆又挽之須臾室燬無遺而母棺獨存咸謂孝感所致王廷栻崇陽人父官閩為僕所毒死廷栻廉得其狀手刃三僕有司下廷栻獄天子嘉其孝釋歸明􅐶字作聖江夏人力學甘貧名節自勵明末流賊陷城即自題神主曰明苦節明生之位率妻子凡七人赴井死時人號其井為明井年本朝乾隆四十一豫祀忠義祠吳思溫字江黃江夏人萬厯舉人厯官廣西布政使歸張獻忠破城不屈死貢其志字以達江夏人天啓舉人知雲山縣歸張獻忠破城自焚死十一年本朝乾隆四賜諡節愍李甲字孚先蒲圻人崇禎舉人知雙流縣署新都事擢建昌衛同知未之任流寇至甲力戰進兵榮經殁於陳僕李從冒白刃覓尸歸遂以死殉一年本朝乾隆四十賜諡烈愍何應軫字天經江夏人崇禎中拔貢流賊破城不屈死本朝乾隆四十一年豫祀忠義祠吳兹明武昌人明末由掾吏為黃縣典史流寇至嬰城固守城陷遇害孫鵬舉字何知江夏人知松江縣歸流寇陷城罵賊死一門殉節者十餘人本朝乾隆四十一年賜諡烈愍張鳴錦字養晦江夏人明末指揮千户流寇破城被執不屈舉家三十餘口死之本朝乾隆四十一年賜諡烈愍李成名字次峯江夏人流寇至聞其名欲官之成名罵賊賊怒斷手寸磔之本朝乾隆四十一年豫祀忠義祠劉承漢字心五武昌諸生流賊陷武昌罵賊賊怒截其舌潄血唾賊面扼吭死本朝乾隆四十一年豫祀忠義祠賀昌明字宸極武昌諸生崇禎末聞北京失守斬衰祭莊烈帝慟哭發狂疾死陳瑞字五玉咸寧諸生明末江水涸作涸江嘆以憂時流寇將至率二女孫沈紫潭湖死卓立水中數日猶不仆本朝乾隆四十一年豫祀忠義祠謝淳培字應侯江夏人天啓舉人博學能文張獻忠陷城被執不屈死之本朝乾隆四十一年豫祀忠義祠朱藴羅江夏人官蒲江知縣崇禎十七年獻賊陷城罵賊不屈死四十一年本朝乾隆賜諡烈愍李藎臣武昌人流賊陷城死之妻熊氏亦自縊十一年本朝乾隆四豫祀忠義祠尹如翁大冶人賀逢聖門生張獻忠逼江夏如翁走三百里持一僧帽一袈裟來貽逢聖逢聖反其衣帽曰子第去無憂我如翁歸大冶遇城破慷慨殉節本朝乾隆四十一年豫祀忠義祠朱英璃楚東安王四世孫初授楚宗正張獻忠陷城英璃為僧避地孝感聞北京失守自縊死朱華字德心楚藩宗室流寇至驅妻子入屋後大池中率家丁巷戰殺賊二十餘人賊大至自剄死朱藴䤥字希周楚藩宗室博學工文辭力辭中尉祿流寇陷城不屈死有名藴銙者於藴䤥為昆弟行亦死於賊本朝程九百通山人順治二年李自成敗走通山之九宫山九百率衆殺之獻其首於總督羅繡錦檄為德安府經厯許立逵通山人順治時知江浦縣海寇陷城死之贈江南按察使僉事嘉慶六年補給恩騎尉世職劉日襄武昌人順治恩貢官賓州知州土寇陷城不屈死事聞贈廣西參議賜祭蔭子嘉慶六年補給恩騎尉世職鄭邦相字又僑咸寧人順治進士知鄱陽縣為政簡易庭無滯獄凡布帛菽粟悉聽民折以輸糧詳請北運民甚便之湖中多盜招其魁令捕黨自贖擢知滁州時地震城圮於水募善泅者取甓而償以錢城成費減半後丁母憂歸不復仕張燕翼字安仲江夏人順治會試乙膀官禮部司務究心理學言動以禮士人奉為楷模有以金見寄者其人已殁訪其孤還之謝應璜字皇黼蒲圻人以舉人授崇仁令一歲輸六年逋賦勸諭有方又劇盜為害數十年應璜單騎諭降之官終河西知縣楊兆傑字又仁江夏人順治舉人康熙初授大理府推官治獄多所平反擢兵部主事條奏節冗費清盜源又請裁提督文武兼制申議楚糧皆練達中機宜安南王黎維禧逐都統莫元清流寄雲南兆傑往諭之初至維禧殊簡傲兆傑引禮切責維禧懼出郊迎詔拜伏如禮於是令還高平四川地安置元清還報榷淮關以父喪歸常正綱字公振江夏人有才幹康熙十九年吳逆以雲南叛綏遠將軍蔡育榮統兵征剿辟正綱授參領為先鋒從都督僉事諒有材督兵攻討正綱斬擒偽將屢獲大捷有材中賊計軍心洶懼正綱攝都督誓士死戰搗賊要害大兵乘以剿平論功授僉事後遷沅州協副將雍正癸卯征阿爾特誕協理軍務以勞瘁卒劉時遠字馭侯武昌人康熙中舉人授蘆山知縣微服入境詢知小民貿易每日輸錢入官即諭免之有劇盜數千盤踞山谷為商旅害設方略率吏民擒之擢成都知府未至以病歸宋長春字柏山蒲圻人事母以孝聞從軍征吳逆為把總平嶽州有功從征福建克復南日澳直抵厦門授都督僉事管西安州遊擊事立義學教軍民子弟獲大盜金維正等纍官雲南副總兵誅叛苗陸尚賢餘悉宥之廣南平卒官吳琮字崚季江夏人令任邱創修學宫按季課士人文大盛學宫舊有苦井至是忽化為甘泉汪錞字鍾如江夏人康熙進士孝友誠篤厯官户部主事典倉儲手自清算積弊一清改吏部黜陟大政引例據典持正不阿王開泰字乾來江夏人康熙庚辰進士以庶吉士改博羅知縣縣多訟發姦摘伏剖決如流絶請託恤孤寡課文禮士上下稱之丁艱歸起補慶元平冤獄卒於官馬之鵬字文淵蒲圻人康熙進士知博白縣有失子者控縣訪之不得之鵬清保甲見一人有異訊之獲所殺尸於水中遂置之法一縣稱神又擒積盜王叔元害以除改知元謀縣盜魁李玉林入資為撫院吏之鵬捕治之厯官給事中條奏會審遲延潮鹽加派會試中額三事俱施行掌錢法力清宿弊卒之日家無宿儲張謙字子吉武昌人康熙進士知珙縣前令與土人何姓者為讎虛報隱糧賦較他縣獨重又官給酒米悉取諸民吏緣為姦民多逋竄謙革諸供應勸民墾荒民乃生聚又捐資焚鑿江中歐趲二灘行者稱便縣穀賤鹽貴謙請民得以穀易鹽於是益勤開墾暇日課士示以文體縣人始知嚮學苗人有獻却之厯刑部郎中精律例部事多倚辦念六十以上充軍者多道死謙請得以贖論報可督學雲南公廉協士論除竄籍替考諸積弊雍正元年擢雲南按察使民翕然嚮化晉大理寺少卿巡撫貴州未至道卒賜金千兩子祭葬盧逢益蒲圻人歲貢生七歲而孤事母朱氏以孝聞母病疫逢益禱於神請以身代數日而愈母後以壽終逢益亦享年八十餘乾隆五年旌陳正勳字書竹江夏人乾隆己未進士除臨縣令調臨晉擢汾州同知以艱歸起補重慶同知摘姦剔弊川東人號為青天程英銘字新三興國人乾隆戊辰進士授鄰水知縣有生員甘文林熊宗裴熊興誠等以抗官聚衆將伏法英銘廉其冤力救得釋後文林以庚辰成進士宗裴興誠皆由貢生官教職當世美之後官海陽亦有善政向宏材武昌人年十四時父殁劈踴盡哀母病劇禱於神請以身代母復患癰以口吸膿血即愈母卒廬墓側遇生忌辰哀痛如初喪乾隆三十三年旌李方弼蒲圻監生性至孝父有宿疾食忌鹽方弼亦食淡數十年父母殁廬墓盡禮乾隆三十七年旌傅興國江夏人官守備與同邑把總余國良於乾隆三十八年從征金川先後陳亡嘉慶六年補給恩騎尉世職李為松蒲圻諸生年甫十二父手傷於蛇為松哀抱口吮父禁不許俟父熟寢輕吸傷處頃刻而愈母八十餘忽患風疾手足痿痺為松朝夕侍奉不離寢所浣濯穢垢從不假手僕婢妻早逝為松鰥居三十載乾隆五十八年旌劉宏勳江夏武生父母早逝善事祖母一日隨祖母渡江省墓遇暴風舟垂覆乃繩約祖母於背而自挾兩艎版出沒狂濤中遇救得免遠近驚傳為異乾隆四年以順孫旌其時同里以孝稱者若王敬天之割股廬墓陳文炳熊承裔之舐翳吮癰又細民中如夏士友業刀鑷以養母郭儀之奉後母以孝聞皆難能者也鄭廷祥字庶安江夏人里有廟嘴湖廣三里許廷祥捐數千金建石橋三年而後成水漲時則設義渡又捐置田以為經久計人稱其橋為庶安橋蔡國棟江夏人由行伍拔德安營把總嘉慶元年五月教匪李文高等擾孝感國棟隨參將劉景齡率兵六十人馳剿遇賊奮擊斬獲甚衆會天暮甚雨賊匪千餘突出合圍力竭殁恩豫雲騎尉世職胡鵬盛通城人乾隆癸卯舉人任歸州學正嘉慶四年在州剿辦教匪陳亡恩子雲騎尉世職入祀昭忠祠朱尊爵通山人事父母以孝聞一日其父赴村市距家數里許日暮未歸尊爵訝其遲持炬往迎適父遇虎尊爵號呼奔救虎即遁去父屢患腹疾醫者云服鮮石耳可愈邑有九宫山懸崖峭壁下産石耳尊爵以繩繫腰間採取得之父食之即愈後父母殁前後廬墓左六年嘉慶七年旌流寓漢禰衡平原般人建安中劉表送衡與江夏黃祖祖善待之祖長子射尤善衡嘗與俱遊共讀蔡雍所作碑文射愛其辭還恨不繕寫衡曰吾能識之惟其中碑缺二字為不明耳因書出之射馳使寫碑還校如衡所書莫不歎服射時大會賓客有獻鸚鵡者射舉巵於衡曰願先生賦之以娛嘉賓衡攬筆而作文無加點辭令甚麗後黃祖在蒙衝船上大會賓客而衡言不遜順祖慚乃訶之欲加箠衡大罵祖恚殺之晉高悝廣陵人寓居江州刺史華軼辟為西曹掾尋軼敗悝藏匿軼二子及妻崎嶇經年既而遇赦攜之出首帝嘉而宥之孟嘉鄳人曾祖宗葬武昌因家焉少知名太尉庾亮領江州辟部廬陵從事褚裒時為豫章太守正旦朝亮大會州府人士裒問亮聞江州有孟嘉其人何在亮曰卿但自覓裒厯觀指嘉曰此君小異將無是乎亮欣然而笑乃益器焉唐李雍江都人嘗遷居江夏杜甫詩稱為江夏李雍今縣有李雍宅元結字次山河南人代宗時以侍親丐歸寓武昌樊山益著書作自釋一篇高驤幽州人崇文孫性孝嗜學好恬退兄駢為西州節度驤遁去客江淮間愛崇陽山水卜居之築愚亭引客賦詩因號愚翁後荆南高季興過之命圖驤像於亭中宋廖正一字明略德化人徙居蒲圻讀書鳳凰山深造獨得黃庭堅深器重之張山翁普州人德祐初為荆湖宣撫司幹官鄂守張宴然議納款山翁以書誚讓之宴然既降山翁被執酬對不屈行省賈思貞義之貸不殺後居黃鵠山聚徒教授而終明辨斌正德時錦衣衛指揮與同官韋璽俱忤劉瑾謫沔陽衛百户二人同寓江夏斌遂卒於江夏嘉靖初召璽復官未行亦卒列女宋張烈女鄂州江夏民婦里惡少謝師乞過其家持刀逼與為亂曰從我則全不從則死張大罵曰庸奴我可死不可他也至以刀斷其喉猶走擒師乞以告鄰人既死朝廷聞之詔封旌德縣君表墳曰烈女之墓元何槐孫妻費氏蒲圻人宋諫議師古曾孫女夫病幾殆刲臂和藥王蘭孫妻劉氏蒲圻人年二十六子德俊才六歲德原生六日而蘭孫亡姻婭欲嫁之誓死不二撫二子成立至正十二年兵越蘄黃蹂踐鄉邑二子奉母周全獨完其宗人以為貞節所感黃開妻宋氏蒲圻人開早殞無嗣誓不更嫁節操貞白以上夀終明陳子達妻汪氏通城人永樂中子達運糧北京死於途汪年十五歲誓不再嫁日事紡織自給撫孤成立徐廣妻舒氏通山人宏治間廣客東吳溺於江父母憐其寡而貧欲奪之婦誓不他適撫二子一女紡績治生趙璁妻從氏興國人夫卒自縊死張煜妻余氏咸寧人夫卒無子自縊死彭嵋妻胡氏武昌人夫卒無嗣以女工自給茹蔬終身張隆妻劉氏江夏人正德中流寇入境劉匿草中賊欲劫以行劉以衣結其體蟠坐於地賊殺之蟠坐如生陳旺妻唐氏汝陽人適旺旺為武昌優人正德二年唐攜其女環兒姪成兒隨夫來江夏有史聰者艷其色以計殺旺脅汚唐氏唐曰汝殺吾夫吾恨不能殺汝又忍從汝亂耶遂遇害繼逼環兒環兒大哭且罵賊又殺之棄尸去成兒潛逃訴於官擒聰伏法曾某妻吳氏武昌人夫殁絶粒死徐宏軒妻柳氏武昌人年十九夫亡撫孤有孫矣後俱夭絶苦節七十餘年吳自強妻高氏武昌人夫疾刲肉以療卒不起飢饉父欲奪其志高自沈於河救免守節終身湯某妻盧氏武昌人湯遠行遇盜死盧氏間關覓尸歸守節撫孤成立魏銘妻黃氏蒲圻人無子銘别娶丁指揮女紿為繼室指揮後知之亟攜女還黃追至途懇請讓丁正室而已為副羅欽仰聘妻歐陽氏江夏人名金貞歐陽梧女許配欽仰未婚欽仰墜水死金貞年甫十四欲從死父母持不許乃告父母曰婦本以事姑姑既失子可今並失婦耶願歸羅以畢所事從之守節年六十餘卒熊鍈妻胡氏武昌人生子甫彌月鍈卒胡足不出户閾嘗有危疾鍈弟善醫將為診視胡曰嫂叔不通問禮也吾未亡人耳安用藥為有司高其行皆親蒞門嘆曰真節婦也黃孝女江夏人年十九父為牙儈斃於宦僕女痛父死無後哭三日死里人即其居祀焉顔曰孝女祠朱英鏻妻吳氏江夏人嫁宗室朱英鏻年二十四而寡撫幼子成立襲爵乃絶粒死方孟鍈女嘉魚人未嫁而夫亡誓不更許人依母兄終其身劉學良妻莊氏興國人莊安女名八兒安三世為莊家奴八兒年十六適劉學良亦人奴子越一年病卒八兒執喪甚哀屢絶復蘇久之有少年傭耕者求贅舅姑許之八兒自度不能抗佯諾焉屆期更麻衣出拜舅姑入室自縊劉宗牧妻李氏興國人年十七寡遺腹生子良礪良礪生世斗登崇禎進士官户部主事劉孝女江夏人幼孤與弟妹並育於伯父紹堯女年十五病疫紹堯視醫藥獲痊紹堯病女辛勤營救竟不起哭三晝夜而殞謝自強妻姚氏蒲圻人夫卒無子自縊死孟機妻余氏咸寧人機卒嘔血長慟欲以身殉塊處一室人罕見其面子養浩廷杖歸拜母曰兒幾無以見母余曰兒今始可以見吾矣胡肫妻程氏大冶人名香兒婚八日以歸省渡三山湖風濤作其夫溺程即赴水從之舟人救援竟絶袖而沈朱之彥妻劉氏通山人年十八夫夭誓死守清謹寡言笑雖中庭亦步履不出詔旌其門熊民懷妻焦氏通山人年十八嫁民懷才八月民懷死以死自誓養姑盡孝朱華圉妻周氏江夏人崇禎末流寇陷城同子婦周氏赴火死楊世泰妻朱氏江夏人世泰為武昌衛指揮使運糧京師流賊張獻忠寇武昌城陷朱泣謂子韜曰汝急逃勿以吾故纍汝汝父歸可白吾志言畢赴水死陳騰龍妻李氏江夏人流賊陷城李積薪自焚仲子象奇年十六躍身入烈𦦨中與母俱燼陳姓百餘人賊盡驅之江溺焉惟幼子志奇初育於娣白氏獲免及左兵東下志奇被虜白與夫雲龍隨至九江為酒家伺之一日志奇戲岸上負馳歸宗姓復蕃邵雲寰妻趙氏武昌人夫卒遇寇罵賊死同縣王家臣母王氏孟道翼妻胡氏俱遇寇殉節死魏夔一妻謝氏武昌人年二十二夫卒無子遭亂避巖穴中虎宿其側後竟餒死童心開妻章氏嘉魚人張獻忠之亂罵賊死同縣李之馨妻余氏亦罵賊死黃若水妻彭氏嘉魚人值寇亂夫婦俱被掠彭紿賊曰釋吾夫吾從汝彭度夫行己遠罵賊死陶弼妾艾氏什邡人興國州陶弼知綿竹縣娶為妾無子弼卒艾死以殉吳璧良妻盧氏興國人年十九夫亡無子哭泣雙目俱瞽守志以終李本素妻黃氏興國人避寇入山聞警與夫同縊死韋安野妻劉氏江夏人流賊屠楚安野走失劉抱子隨母與姑走賊追至強劉上馬劉度不能免紿之曰軍中不能攜幼子容吾與母姑及子一别乃從容哺其子尋拜其母與姑赴水死李藎臣妻熊氏武昌人藎臣隨父之贛守任張獻忠陷武昌熊為賊所得欲犯之熊奪賊刀自刎賊去鄰嫗救活之明年李自成率殘卒南奔婦隻身竄山谷間及藎臣來自江西遇賊被害熊痛哭三日自縊死曹大椿妻汪氏武昌人崇禎十六年流寇猝入樊湖汪抱嬰兒赴水死越七日尸浮淺渚時當炎暑面色如生兩手抱嬰兒不可解遂併葬焉羅烈女嘉魚人避亂匿蘆葦賊見執之罵不絶口賊支解之熊開元妻徐氏嘉魚人避亂至粵舟次程鄉蒿口徐知不免謂開元曰當使公見妾死必不死公後介公懷次日賊數千奄至徐急赴水授以篙不受而沈翼日得其尸視衣履間皆針線密縫蓋方其語開元時已辦矣童洞儒女嘉魚人未適人流寇陷城女同兄走避湖中兄曰止因汝纍女曰如有事必不纍兄後賊至女持所攜針線筐對賊擲曰此中有寶汝可取之隨赴水死賊果取筐檢視其兄乃得免袁友正妻蕭氏咸寧人友正卒哀毁骨立晝夜在壙一日忽謂家人曰袁子至矣速為我治衣棺言竟而卒劉熾妻楊氏蒲圻人熾素有痼疾楊事之數十年無怠夫喪哀毁飲食必奠如事生二婢感其義年四十餘亦不嫁黃祐妻謝氏蒲圻人年十六適祐祐卒撫孤有成復夭一孫又夭子婦何氏孫婦魏氏俱二十而寡嫠居三世俱有節操楊鑑妻吳氏崇陽人早寡或奪其志斫庭前桂誓曰此吾夫手植者欲改行有如此桂馮鼇妾谷氏宛平人崇陽馮鼇妾年二十夫亡無子誓死守節家貧績絍易食至親罕覩其面饒安世妾金氏休寧人適咸寧饒安世年十七安世殁置主室中哀號數十年不絶孟魯難妾黃氏揚州人適武昌孟魯難流賊至從子避難尤江遇寇自刎死吳稽妻張氏宛平人適興國州吳稽稽僑寓京師既死不能葬父母逼張再適誓不從因攜夫骨繫左臂抱二歲孤乞食歸興國守志以老張經世妻石氏興國諸生石漢女名瓊秀未婚經世卒瓊秀聞訃赴喪次一慟幾絶旋起拜舅姑曰不幸不及事吾夫猶得事二尊人即無他志矣未幾舅又死瓊秀獨事其姑辛苦飢寒後數年嘔血死鄭邦相妻楊氏咸寧人鄭為鄱陽縣令崇禎十六年兵寇交訌楊義不為辱冒刃死其姒周氏鄭邦遇妻亦同日投水死郭翊中妻黃氏咸寧人翊中早亡崇禎十六年賊寇至執黃於黃泥洞黃罵賊不辱觸石死血漬石成碧至今猶存魏柱國妻謝氏蒲圻人名三淑年十四未婚獻賊屠城避地獺山為賊所獲罵賊奮躍方塘而死孟道異妻胡氏大冶人崇禎十六年避流賊永安寺為賊所執逼汚之白刃臨頸不從賊怒刲其腹實草飼馬而去樊口女不知何姓左良玉卒東下過樊口挾女馬上手為女所齧不得脫呼羣卒斷其首齒已入骨矣須臾卒亦死投江女子不知何縣人為亂兵所掠至潯陽江投水死尸逆流四百里至武昌漁人收葬之見其髮間有小緘啓視之則所作絶命詞也本朝劉滋妻徐氏江夏人滋卒自經舅姑救蘇已而父母欲奪其志徐投水中援之不死遂截髮毁容順治二年闖賊南奔徐年且七十罵賊死順治十六年旌長山烈婦不知何許人闖賊南奔驅襄郢士民以從婦與夫被掠途中得脫夫殁於江夏縣長山鋪婦身餘一珥即以珥倩人掘地以葬有少年掘地成壙強婦偕去婦身入壙枕夫尸慟哭觸顙流血批王自掩曰乞併葬我衆挽之不起會日暮風雨暴作衆委去平明往視見血流滿面死里人遂加土成冢周文彬妻皮氏通城人名鳯貞十三字文彬明末周為賊所掠鳳貞守貞數十年以待凌升妻束氏江夏人在室刲股療母病及歸升升卒守節茹蔬終身李懋德妻朱氏江夏人年二十餘寡居順治初寇薄城守夫柩不去遇害郭惟一妻孫氏江夏人惟一以哭父死孫年十八夫兄欲奪其志遣少僕為婦妝以嘗孫卒不敢犯孫有遺腹將乳夫兄賄蓐媪殺之孫偵知娩身不用蓐媪死而復蘇者再子生適里人同日生女夫兄誣其以女為子訟於官刺血驗非偽夫兄服罪孫苦節終身子炳長為諸生余光煌妻詹氏大冶人光煌卒無子詹雕夫像置室中飲食必祝事姑孝姑殁以毁卒陳烈女大冶人許嫁未行而夫夭有興國人欲娶之女不知也迎者至門自經死吳啓豫妻劉氏大冶人夫亡遺兩孤歲飢日噉半粟室被火結茅不能禦風雨守貞不二康熙三十六年旌朱萬鐸妻王氏通山人年十九夫亡遺腹生一子舅姑早殁無伯叔兄弟祖姑年老王自減饔飧以奉之康熙三十六年旌羅烈婦姓梅氏江夏人夫貧不自支欲梅喪節以給衣食梅不從投繯死康熙四十九年旌蔣宏道妻朱氏江夏人年十七適宏道夫卒遺孤