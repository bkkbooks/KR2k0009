别有屬耳存之備考三國吳皇象墓在平湖縣東南三十里象江都人善隷書晉干瑩墓在海鹽縣西南四十里按志怪錄吳散騎常侍干寶父瑩死以婢殉葬經十年而母喪開墓其婢伏棺上不死舁還家經日而甦寶嘗著無鬼論至是撰搜神記唐陸贄墓在嘉興縣東三十六里新豐鎮前有橋名陸墳橋按贄傳順宗時召還詔未至卒今忠州有贄墓周都官墓明統志在府城北與月波樓相對其墓居水中旱不加高潦不加没至今猶在按都官疑唐宋時人佚其名五代吳越屠瓌智墓在海鹽縣南三十六里德政鄉瓌智海鹽人吳越時守湖州死徐綰許再思之亂以衣冠葬此錢元弼墓在石門縣西北三十七里洲錢村武肅王子也文穆王初置秀州以元弼爲刺史婁機墓在嘉興縣南五十里宋輔廣墓在石門縣西一里陸德輿墓在石門縣西北六里常楙墓在海鹽縣常墳橋顔復墓在桐鄉縣石門鎮之北元張伯淳墓在石門縣西北十七里吳鎮墓在嘉善縣治東梅花菴程本立墓在桐鄉縣梧桐鄉明呂原墓在秀水縣南二十二里項忠墓在秀水縣西南五里張安墓在海鹽縣西關外順安橋南屠勲墓在平湖縣南鄂陽山潘蕃墓在石門縣北石門鎮有祠鄭曉墓在海鹽縣嶼城南勾塍山陸光祖墓在平湖縣北十里霍宗道墓在桐鄉縣皁林秀溪橋東明嘉靖中宗道以禆將拒倭戰殁於此魏大中墓在嘉善縣胥五都子學洢學濂祔徐從治墓在海鹽縣東南大蒲山徐世淳墓在嘉善縣感化都吳麟徴墓在海鹽縣西南鷄籠山本朝杜臻墓在嘉興縣東馬涇朱彝尊墓在秀水縣百花莊彭孫遹墓在海鹽縣西南六里陸隴其墓在平湖縣泖上餘字圩高士竒墓在平湖縣東門外善字圩祠廟徐偃王廟在府城西北二十里至元志偃王逃之㑹稽王之宗族有散在邑者爲立廟伍子胥廟在嘉興縣東胥山上又有尚胥廟在海鹽縣西北十八里祀子胥及其兄尚三賢祠在秀水縣西南半里元大德間建祀漢朱買臣唐陸贄宋陳舜俞許侍郎祠在府城内祀晉黃門侍郎許安仁范公祠在秀水縣西南金明寺後范蠡嘗居嘉興今稱陶朱公里祠南臨范蠡湖陳司徒祠在嘉興縣西南五里唐咸通中建祀隋司徒陳杲仁唐封忠烈公陸宣公祠在嘉興縣治北祀唐陸贄宋呂祖謙有記又府城東鴛湖上有宣公書院亦祀贄明劉基有記又有祠在嘉善縣東北十二里曹使君祠明統志在府治西北祀吴越曹信及其子珪信當錢氏時守嘉興慈惠及人珪為嘉興都將淮人圍城珪與族人師魯拒之後以功授蘇州刺史魯公祠在海鹽縣南思魯橋之左祀宋令魯宗道岳忠武廟在海鹽縣澉浦所公廨左明嘉靖中以倭亂建蘇公祠在秀水縣西本覺寺祀宋蘇軾明萬厯八年建趙龍圖祠在秀水縣南真如寺宋建炎𥘉趙叔近以龍圖待制知秀州王淵以私憾害之殯寺中後為立祠忠勲祠在石門縣治東祀宋趙汝愚程都御史祠在桐鄉縣北門内祀明僉都御史程本立楊副使祠在海鹽縣白洋河上祀明楊瑄旁有三公祠祀僉事陳詔郡丞黄清縣令饒廷錫俱築海塘有功者喻楊二公祠在嘉善縣北斜塘鎮祀明治水叅議喻良知府楊繼宗丁清惠祠在嘉善縣治束祀明丁賓忠孝祠在嘉善縣治東祀明魏大中及子學洢忠烈祠在海鹽縣西門外祀明徐從治徐太僕祠在府治東祀明徐世淳旌忠祠在海鹽縣治東祀明呉麟徴陸公祠在府學東祀本朝御史陸隴其莊烈女祠在平湖縣西鄉寺觀覺海寺在府治西南一里舊名報忠寺宋建本朝雍正十一年重建勑賜今額楞嚴寺在府治西北二里宋建明萬厯中重建賜藏經五千卷本朝康熙四十四年賜藏海慈波寺興聖寺在府城内東北本嘉興縣丞廳宋孝宗誕育於此嘉定間賜額興聖院理宗御書流虹聖地興聖之寺八字碑刻尚存東塔寺在嘉興縣東三里相傳漢朱買臣故宅梁天監中建寺精嚴寺在秀水縣治東本晉徐熙宅因井夜發光遂請捨宅為寺賜名靈光後名靈龜宋祥符中改今額本覺寺在秀水縣西古檇李亭地舊名報本禪院宋宣和中改為玉清萬夀宮建炎初復本朝乾隆二十七年高宗南巡賜改今額真如寺在秀水縣南四里唐建内有雪峯僧住菴及宋司馬光所作真如院法堂記石刻香嚴寺在秀水縣北五里舊名懶石菴本朝康熙四十四年聖祖南巡勅賜今額天安萬夀寺在秀水縣東北一里舊為施水菴唐宋以來更名不一明洪武二十四年定今名按寺本漢嚴助宅内有嚴將軍井茶禪寺在秀水縣西南四里宋時名景德寺寺有三塔亦名三塔寺本朝乾隆二十七年高宗南巡賜改今額有御製詩並御書標示三乘四字扁保安寺在秀水縣西北五十里舊爲通聖蘭若東晉時建梁時賜額保安唐陸贄有記慈雲寺在嘉善縣治西北唐建名保安宋改今額資聖寺在海鹽縣西本光興寺晉右將軍戴威之宅捨爲寺見吳郡陸崧塔記宋天禧二年改今額金粟寺在海鹽縣西南金粟山下呉赤烏中建明宋濂有記寺有藏經其頁内襯紙甚佳書畫家皆珍之本朝康熙五年修雍正五年御賜聯對法善寺在海鹽縣西南三十里舊名通元寺呉大帝孫權呉夫人捨宅置宋祥符元年改今額中有凖僧塔鹿苑寺在海鹽縣西北三十五里輿地紀勝魯宗道初宰是邑夢胡僧來迎叅政及瞻羅漢像與所夢符合後果叅大政崇福寺在石門縣西本名常樂寺梁天監二年建宋天禧二年改今額又縣東有廣福寺縣西祇園寺俱梁天監中置棲心寺在平湖縣當湖明建名化成菴本朝康熙四十一年賜今額惠雲寺在桐鄉縣治西北後周廣順初建本名鳳嗚院宋治平中改今名有雙塔及龍眼池崇道宮在府治西南二里呉越武肅王建俗稱南宮纂修官臣李煌恭纂前纂修官臣蔡睿颺恭纂前總纂官臣黄爵滋恭覆輯校對官臣王積順恭校
