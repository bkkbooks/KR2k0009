  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_102-1a}
body:
  text: 杭州府四人物本朝黃機字次辰錢塘人順治進士由庻吉士厯禮戸吏三部尚書晉文華殿大學士端厚清謹公忠體國兩任吏部抑奔競疏壅滯㑹陳時務言皆剴切立朝四十餘年廉潔自愛不名一錢卒諡文僖項景襄字去浮錢塘人順治進士選庻吉士厯官兵部侍郎凡國家大建置輒据成例以進刑部疏請改五流之應徙邊者無逺近皆戍烏喇景襄力爭之卒從其議山東濱海民多捕魚為業巡撫以民舟篷桅具者議坐以通海景襄曰海濱漁船率容二百石非篷桅不可行奈何以重法陷之由是皆免且著為定例吳道煌錢塘人順天籍順治已丑進士任武康令邑多盜道煌飭保甲詰奸宄民賴以安㝷擢蘇州守故事郡財賦分解諸部寺道煌建議專歸戸部法始畫一在任五年嚴絶苞苴屢剖冤獄郡人德之立祠於虎邱高咸臨字與侯仁和人順治初以選貢爲永安知縣山寇陷建寕擁衆來犯咸臨率親戚防禦從弟其翰從子顯宗中表吳之璜先後捍賊死咸臨數獲賊磔之相拒五閲月而救不至城陷被執遇害贈僉事同邑錢法裕知蒲州姜瓖之亂死難贈叅議吳允焞仁和人順治三年貝勒博洛定杭州允焞與邑人潘際昌胡萬鎰錢塘沈孚建並投效博洛俱挈入閩疏以允焞知夀寕際昌知永春萬鎰爲其訓導孚建知政和時海寇連陷諸縣城允焞被執拷掠無完膚罵不絶口而死妻瞿氏殉焉際昌萬鎰同守永春凡四閲月城破並死之孚建亦罵賊死同時死難者有漳平知縣戴真學海澄教諭周祖唐又順治二年諸生王業鞏負父避寇賊殺其父業鞏憤罵賊斷其舌死四年死粤寇之亂者有長寕知縣顧德濟吳川縣丞徐啟連五年死姜瓌之亂者有高家營遊擊鄭世英大寕典史徐士鶚康熙間以勦捕海賊陣殁者有把總王一彪許文爵雍正間以烏䝉新平猓􅉓之亂死者有巡檢葉祚徽丁鈺典史沈洪鈺妾吳氏亦殉焉乾隆五十四年以平安南委辦臺站𬒳害者有經厯張誠皆浙人因縣籍俱無考附記於杭州府下王起彪字虎子錢塘人順治進士知德興縣時饒州巨寇雖平餘賊時發涖任一月賊董三等來攻起彪拒守被執不屈死雍正六年賜廟祀鄔象鼎字符九仁和人順治進士備兵羅定猺獞反象鼎提師深入殲其魁諸砦厎定粤寇破桂林逼羅定象鼎率子元祼從子聯珠元珦力拒之擒斬二千餘人賊遁旋集攻圍累月城陷俱不屈死家屬五十七人咸殉難贈象鼎光祿卿王萬鎰字人王錢塘人順治中以鄉貢知萬年縣有政聲康熙甲寅耿逆倡叛饒廣二郡偏將俱應之萬鎰率衆力戰與家僮六人俱死贈叅議宋人望錢塘人以貢生知連江縣順治三年海寇攻城人望嬰城守糧盡城陷死之同邑生員汪士嵋康熙十二年耿逆之亂獻䇿軍門以功授同知奉檄招撫賊黨被戕潼川通判汪時乾隆二十七年從征緬甸被害先後詔卹如例錢嘉倫仁和人順冶三年知順昌縣土宼攻城嘉倫固守不能下賊穴城陷之被執大罵賊斷其舌猶罵不絶聲賊支解之同邑蔡相國官定安典史順治九年流賊犯瓊州死之倪霖官四川縣丞程應桂宮大足知縣俱乾隆二十七午從征緬甸死難王雋官福建同知乾隆五十一年臺匪據鳳山雋解餉至石佛頭罵賊死俱先後贈卹如例鮑之奇餘杭人順治五年以貢生官恩平知縣方之任城已為賊據之奇單騎往諭被戕周文煜海寕人官默陽知縣順治十年土寇犯境文煜禦之於金橋被執至洪江脅降不從殺之妻施氏自經妾王氏投井死幼子及賓從同殉者八十餘人楊雍建字自西海寕人順治進士知高要縣時師行絡繹供億煩重雍建減費恤役有持軍符下縣者語不遜雍建撻之帥以愬總督王國光國光曰賢吏也乃杖持軍符者而薦雍建於朝授兵科給事中數有建白厯副都御史巡撫貴州綏輯有方召為兵部侍郎尋乞歸嚴沆字子餐錢塘人順治進士選庶吉士改給事中典試山東故事聖裔無舉者四氏子不得獨售沆疏請得歳舉二人著為令累官總督倉場侍郎通贏絀别侵蟊歳省金錢數萬乞養歸趙燾仁和人順治中由武進士厯象山右營叅將康熙乙卯剿賊至貓頭洋斬偽都督周貴旋因風勢失利力戰死贈副將陸承祺陸承祚仁和人父夢蘭客死鬱林時方用兵踰年凶問始至承祺承祚年尚幼皆號慟辭母王氏走萬里道乞食至鬱林徧求不得忽遇父故人導之入蕭寺見棺一慟而殞承祚甦而承祺竟死承祚乃負父兄骸骨還家先是承祚道遇鄉人寄書歸母母見書慟哭曰夫柩已歸吾復何戀絶粒而死徐旭齡字元文錢塘人順治進士授刑部主事擢御史遇事敢言視鹺兩淮㑹黄淮水決旭齡恤流民全活甚衆擢僉都御史巡撫山東下車劾墨吏數人嚴禁倉糧河夫之最病民者豪猾斂跡進工部侍郎總督漕務有籌三便釐三害等疏悉見施行卒諡清獻柴紹炳字虎臣仁和人性孝友稍長博極羣書為諸生七試冠軍居西湖南屏山究心象緯輿地兵農禮樂諸書著古韻通考古經濟類編省軒集沈昀仁和人從劉宗周學以誠敬為本力排佛老清苦自守嘗累日絶糧采階前馬蘭草食之以喪禮久廢輯士喪禮説年六十三卒無以為殮應撝謙經紀其喪涕泣曰吾不敢輕受賻禭以玷先生其生平介潔如此應撝謙字嗣寅仁和諸生性孝友殫心理學以不自欺為本六經多所發明尤精於易殁後河陽趙士麟儀封張伯行刻其遺集行世其周易彚解尤為精詣毛先舒字稚黄錢塘人八歳能詩與陸圻張綱孫沈謙諸人稱西泠十子尤精韻學著韻學指歸及唐韻四聲表綱孫一名丹字祖望有從野堂詩集謙字去矜有東江集及臨平記等書顧豹文字季蔚錢塘人順治進士知真陽縣以治最擢御史出按湖北請捐漢安荆襄等州縣逋糧復蘆洑口舊隄建義倉一百四十餘所病歸硏究經史至老不倦吳任臣字志伊仁和人耽書玩古多所論著廣郭璞山海經注及刺取五代諸霸國事為十國春秋康熙中試博學鴻詞授檢討同時試博學鴻詞者錢塘則汪霦由進士官行人授編修海寕則沈珩由進士官中書授編修仁和則沈筠由進士授編修邵遠平由進士官光祿寺少卿授侍讀馮景錢塘人太學生性嗜讀書見聞淵博善屬文下筆纚纚千言康熙閒遊京師㑹有司營宫室需楠木有請易國子監彛倫堂梁者景致書於尚書魏象樞極陳不可事得寢於是京師咸知有太學馮名景嚴氣正性師友風義以責善為事生平著𫐠甚富多散失有幸草十二卷樊中集十卷解舂集十四卷行世徐潮字青來錢塘人康熙進士選庶吉士授檢討厯官刑部侍郎巡撫河南潔己奉公自布政司以下舊時加徴於民者皆革除之又奏除南陽辦鉛衛輝辦漕之弊開溝渠以資灌溉杜發馬以安驛遞革牙行以恤商民權户部尚書聖祖仁皇帝以高寶水患與潮面論形勢指授方略命董其事百日工竣晉吏部尚書致仕卒雍正十一年特命入賢良祠乾隆元年追諡文敬十六年御賜清慎可風扁額謝廷謨於潛人官雲和訓導康熙十二年耿逆黨陷處州廷謨募鄉勇剿賊被執絶粒死又臨安諸生洪恩宣以應募招撫耿逆賊黨與邑人余煜並遇害又俞峻臨安人官彰化知縣乾隆五十一年以剿臺匪林爽文戰殁俱卹如例王一麟錢塘諸生少孤力學母邵氏哭夫失明一麟䑛目復開母亡廬墓枯柏復茂康熙十二年旌表王愚叟錢塘人不知其名誠心待人受人欺或負其錢物終不校再求輒應人以謂愚叟亦自謂愚故號愚叟閲世百年無一妄語嘗為詩云吾心如秋月為鏡不為鈎雨過浮雲淨清光到處流盧必陞錢塘人叔無子以必陞嗣本生父病思食蟛蜞非其時莫致必陞攜筐採取風潮忽至殁於海漁者救之猶手蟛蜞不釋嗣父遇流賊相失必陞躬冒鋒鏑尋父以歸及卒廬墓三年事聞旌表趙啟裕錢塘人十歳喪父哀慟不欲生事母孝謹不離左右者數十年母卒執喪盡禮廬墓三年兄患惡疾近者輒染啟裕扶侍起居與同寢食兄廖己亦不染雍正四年旌表吳修齡錢塘人年十四父士培疾籲天求代及殁寢苫若成人事祖母張極孝養有偷兒夜入其室罄取所有舉火焚其廬修齡赴烈焰負祖母岀毛髮為焦母錢氏孀居卧疾親奉湯藥衣不解帶者三年殁後喪葬盡禮雍正八年旌又同縣孝子莫美章施嘉榖田世容仁和孝子鮑光郎汪天石鮑増孫人偉富陽孝子胡謙新城孝子淩鴻磐俱於乾隆年間旌桑天顯字文侯錢塘人幼失恃年十三父病反胃天顯百方求醫父得延五年乃卒康熙十三年耿逆反官令海壖各圑練爲保天顯爲鄉長率其鄉人極力備禦賊退辭薦賞惟施醫敎子而已乾隆七年以孝行旌子調元字􅌢甫博學能文雍正癸丑特賜進士授工部額外主事王起凡仁和人居江于販蔬養母甚孝謹一日入市屋爲鄰起火延燒起凡急歸冒煙焰入負其母不得出抱母同斃里人爲立王孝子祠陳詵字叔大海寕人康熙舉人由中書累遷左副都御史巡撫貴州地多山峒不事農桑詵教之開墾又令善𧖟者即署旁浴種治繭民始知織絍調湖北時江浙歳歉廷議弛米禁濟一時商賈皆東下而省城米價騰湧詵立假藩庫銀五萬兩貴糴賤賣江浙米價平而楚民亦得不病榷使請於白螺磯設關詵奏不可乃止晉工部尚書轉禮部致仕卒諡清恪許汝霖字時庵海寕人康熙進士選庶吉士厯贊善督江南學政所取士拔其尤累遷禮部尚書性篤孝友律躬謹飭致仕歸讀書課士恂恂如諸生時湯右曾字西崖仁和人康熙進士選庶吉士授編修改户科都給事中累遷吏部右侍郎兼翰林院掌院學士卒官右曽少頴敏工詩晩年益歸蒼老兼工行楷尺牘華瞻人爭重之查慎行字夏重海寕人康熙進士選庶吉士授編修入直南書房告歸慎行天資頴異五歳能詩十歳作武侯論同邑范驤稱爲曠世才既長遊黄宗羲之門所學益進於經史無所不窺而尤深於詩所著有敬業堂詩集及周易玩辭集解蘇詩𥙷注等書慎行弟嗣瑮字德尹康熙庚辰進士官侍講工詩與慎行齊名又同里查昇字仲韋康熙戊辰進士官少詹事工詩文尤精書法片禇隻字人爭寶之沈近思字位山康熙進士知臨潁縣潁與許接壤許有孔家口水勢衝激爲潁患近思出夫十之七助許築隄俄水發安堵無恙遷南寕同知力行保甲山盜斂跡雍正元年爲文選郎中擢本部侍郎盡職奉公門無私謁晉左都御史風紀肅清卒贈禮部尚書太子少傳諡端恪陳元龍字廣陵詵同祖弟康熙乙丑第二人及第授編修入直南書房後由吏部侍郎巡撫廣西有惠政内升工禮二部尚書雍正元年授文淵閣大學士十一年致仕加太子太傳乾隆元年特賜在家食俸卒時年八十有五諡文簡陳世倌字秉之詵子康熙癸未進士選庶吉士授編修督學順天謝絶苞苴請託雍正初由内閣學士巡撫山東興利除害多有善政未幾以被劾罷職乾隆元年起副都御史厯遷左都御史工部尚書文淵閣大學士戊寅冬以衰老告休加太子少傅將就道卒諡文勤徐本字立人潮子康熙戊戌進士選庶吉士授編修雍正初督學貴州授按察使越二年巡撫安慶宿亳向多萑苻夀州更甚本廣設偵邏密計擒治盜藪一清内擢左都御史工部尚書恊辦大學士乾隆元年晉東閣大學士入直南書房八年乞休加太子太傅卒贈少傳諡文穆商盤錢塘人雍正進士初以知縣用特㫖改庶吉士授編修尋外補同知終雲南元江府知府盤幼工詩出入元白蘇陸間樂府歌行尤瑰麗縱恣才情富瞻篇什甚多刪汰之餘尚三千首集三十二卷梁詩正字養仲錢塘人雍正戊戌第三人及第授編修入直上書房乾隆二年以侍讀入直南書房厯官内閣學士刑户吏三部侍郎户兵吏工四部尚書東閣大學士加太子少傅卒贈太保諡文莊董邦達字孚存富陽人雍正癸丑進士選庶吉士授編修厯官至工部尚書邦達端謹老成兼工書畫入直南書房卒諡文恪厲鶚字太鴻錢塘人康熙庚子舉人乾隆丙辰舉博學鴻詞放歸讀書不輟遺文袐牒無所不窺發為詩文以清和為聲響以恬淡為神味考據故實之作寓正論於敘事中尤工長短句入南宋諸家之勝著有樊榭山房詩文集行世沈廷芳字椒園仁和人幼穎異立志卓然乾隆丙辰舉博學宏詞授庶吉士官編修改山東道監察御史奏毁智化寺明閹王振像請免各關米豆税及米船船料東南米貴兩請截留漕運並蒙温㫖允行授山東登萊青道擢河南山東按察使所厯剔弊除好並著善績致仕終著有十三經注疏正字續經義考鑒古錄及隱拙齋詩文集杭世駿字大宗仁和人博聞强識於學無所不貫藏書千萬卷目睇手纂詩文宏肆而奥博中雍正甲辰鄉試乾隆初年舉博學宏詞授翰林落職歸杜門奉母暇則與里中耆舊結南屏詩社歌詠太平著有道古堂集行世陳兆崙字星齊錢塘人雍正庚戌進士以縣令舉博學宏詞科授檢討官至太僕寺卿直上書房十三年恪恭盡職尹順天府時適調索倫兵赴西陲短衣策馬䕶送出居庸關民不擾又免派富民之充車戸者人德之學淹博著作甚富制藝外有紫竹山房詩文集行世汪由敦錢塘人雍正進士由庻吉士授編修洊升侍讀乾隆初入直南書房擢内閣學士厯官至吏部尚書軍機大臣署協辦大學士加太子少師晉太子太傅由敦學問淵純文詞雅正屢掌文衡俱稱得士供奉懈數奉内廷贊襄樞禁夙夜在公勤勞匪命勘永定天津河工凡疏濬建築事宜悉如所議行卒後贈太子太師諡丈端祀賢良祠上親臨奠醊御製詩悼之並以由敦書法秀潤命勒石名時晴齋法帖四十四年御製懷舊詩及五詞臣由敦列刑部尚書張照之次金德瑛字汝白仁和人乾隆丙辰第一人及第授修撰官至都察院左都御史五典鄉試三任學政取士極公明立朝二十七年多所建白伹奉㫖允行孫志祖仁和人乾隆進士官御史著有讀書脞錄七卷考論經子雜家折衷精詳不為武㫁之論家語疏證六卷證王肅之偽又有文選考異文選補註及補正姚之駰輯謝承後漢書若干卷同邑吳廷華康熙舉人官興化同知譔儀禮章句十七卷於喪禮尤為精審金甡仁和人乾隆壬戌第一人及第授修撰官至禮部左侍郎性清介直上書房前後十七年竭忱啟導唱酬題詠皆寓意約箴學淹貫長於論文三典鄉試兩視學所至稱得士以疾歸高宗純皇帝南巡召見慰問年八十餘卒盧文弨仁和人父存心乾隆初年舉博學宏詞文弨乾隆十七年第三人及第授編修入直上書房累官至待讀學士提督湖南學政以條陳失當部議降三綴調用乞養歸文弨孝謹篤學好校書所校諸善本皆鏤板惠學者又苦鏤板難多校經史子集三十八種名之曰羣書拾補所自著有抱經堂集儀禮注疏詳校鍾山札記龍城札記廣雅注等書卒年七十九姚成烈錢塘人乾隆乙丑進士由吏部主事擢臺諌請於聖躬祈雨時緩決重囚引證經史言甚摯外任司道巡撫在粤西時修仁令獲訟猾因病死有指爲濫刑斃命者成烈以實聞嚴㫖切責堅執不移命下刑部推勘事得白成烈適召見極蒙宸奬官至禮部尚書王際華字秋瑞錢塘人乾隆乙丑第三人及第授編修入直南書房厯官户部尚書時修四庫全書際華爲總栽並兼武英殿事綜覈勤勩卒諡文莊趙佑字啟人仁和人乾隆壬申進士由庶吉士授編修官至都察院左都御史性儉約授徒資朝夕四典鄉試五視學長於論文每卷必署其得失視學所至嚴行月課訓士以孝友大本士論稱其愛人如慈父誨人如嚴師試武生童取其騎射出衆者編入行伍約束之至今放行焉胡高望字豫堂仁和人乾隆辛已第二人及第授編修官至都察院左都御史厯掌文衡有清望直上書房三十年竭誠錫麒字聖徵錢塘人乾隆乙未進士授編修厯官國子監祭酒入直上書房著有有正味齋集行世博采閎覽其為詩詞清峭婉雅駢體文字則濃思縟采之中風骨蒼然彌與古㑹尤為學者推重云項朝槐仁和人官長安主簿嘉慶二年楚匪擾華陰朝槐身先入賊陣格殺多人以馬陷水田受矛傷陣殁同縣張宁陽知東鄉縣嘉慶元年教匪犯縣境宁陽擊賊陣殁均議卹如例汪之萼錢塘人嘉慶十五年旌表孝子流寓晉郭文河内軹人洛陽陷步擔入餘杭大辟山中窮谷無人之地倚木於樹苫覆其上而居焉時猛獸為暴文獨宿十餘年卒無患害區種菽麥採竹葉木實貿鹽以自供人或酬下價者亦即與之有餘穀輒恤窮匱人有致遺取其粗者示不逆而已王導聞其名迎置西園七年後逃歸臨安結廬山中臨安今萬寵迎至縣中及蘇峻反破餘杭而臨安獨全人以為知機許邁句容人立精舍於餘杭縣霤山往來茅嶺之洞室放絶世務以尋仙館永和二年移入臨安西山登巖茹芝眇爾自得有終焉之志陳徐孝克東海郯人陵第三弟也少為周易生徧通五經博覽史籍性至孝值侯景之亂京邑大饑孝克養母不能給薙髪為沙門乞食充給後東逰居錢塘之隹義里又陵第三子儀以周易生舉高第累官至東宫學士陳亡隱於錢塘之赭山唐丁飛字翰之濟陽人讀老莊書居錢塘龍泓洞蓄妻子事耕稼知常人夜半取琴彈弄少睡寡言與人相接禮簡情至嘗曰修身治心之外復有何物宋潘閬太谷人寓居錢塘通易詩春秋尤以詩知名所交遊皆一時豪俊徐復建州人仁宗時居杭州十數年周輝海寕人紹熙閒居錢塘清波門之南嗜學工文隱身不仕撰清波雜志十二卷元貫雲石元功臣阿爾哈雅之孫生而神采秀􅉴膂力絶人及長折節讀書吐辭為文出人意表少因廕為萬戸府達嚕噶齊讓與其弟後以文行洊至翰林院侍讀學士稱疾還江南賣藥錢塘市中詭姓名易服人無有識之者自號酸齋阿爾哈雅舊作阿里海涯達嚕噶齊改見統部名宦䇿丹註吾邱衍太末人寓居仁和能詩工篆隸性簡傲常自比郭忠恕居生花坊一小樓廉訪使徐炎來見衍從樓上呼曰此樓何敢當貴人登耶願明日謁謝炎笑而去所著有尚書要略九歌說文續解等書明孫一元字太初不知何許人或云安化王子工詩築室南屏山顧璘慕之不可得見道衣幅巾放舟湖上月下見小舟泊斷橋一僧一鶴一童子煮茗笑曰此必孫也移舟就之遂往還無閒薛侃字尚謙揭陽人揉行醇固嘉靖閒進士官行人司司正素慕餘姚王守仁學遂出其門精思力踐以勇銳見稱徙家於杭築天真精舍祀守仁列女三國吳孫翊妻徐氏富春人翊領丹陽太守為媯覽戴員所殺覽欲取徐徐紿乞晦日設祭除服潛與翊舊將孫高傅嬰圖之至期覽入徐出户大呼高嬰共出殺覽並殺員徐乃衰絰奉覽員首祭翊墓前晉虞潭母孫氏富春人孫權族孫女適潭父忠有婦徳忠亡誓不改節潭自幼便訓以忠義永嘉末潭為南康太守討杜􅌢孫傾貲産以餽戰士遂免捷及蘇峻亂潭守吳興假節征峻孫戒以舍生取義仍發家僮助戰貿環珮以為軍資拜武昌侯太夫人加金章紫綬潭立養堂於家王導以下皆就拜謁南北朝陳駱文牙母臨安人梁太清末文帝避北臨安文牙母睹帝儀表知非常人賓待甚厚及帝為吳興太守引文牙為將帥帝即位母卒贈臨安國太夫人諡曰恭唐馮孝女居錢塘少孤不嫁以養母母病刲股和藥以進母死號慟嘔血既葬結草廬墓下焚香疏食刺臂血寫經以薦母長慶初詔賜束帛孫媚容錢塘人父孫戩迎濤死女媚容巡江哭自投江水抱父屍岀縣司以為純孝立碑此與曹娥事同而得不死更異莫生妻何氏於潛人夫死年尚少養姑至孝黄巢亂鄰里皆走匿氏以姑病不去賊至號泣哀請願代姑死賊舍其姑掠氏將汚之詭請櫛沐更衣得閒解繻自縊死元輝和爾三女錢塘人諸兄逺仕不歸母思之成疾三女欲慰母意乃共斷髪誓終身不嫁以養母同力侍護四十餘年母竟以夀終事上並賜旌異輝和爾舊作畏吾氏今改正姚氏餘杭人居山谷閒夫出刈麥姚居家執㸑母何氏往汲㵎水久而不至俄聞覆木聲亟出視則虎銜其母以走姚倉卒往逐之即以手毆其脅鄰人競執器械以從虎乃置之而去姚負母以歸求藥療之奉養二十餘年而卒黄仲起妻朱氏杭州人至正十六年張士誠寇杭州賊驅諸婦至其家且指朱氏及其女臨安奴曰為我看守日暮我當至也朱氏聞之懼受辱遂與女俱縊死妾馮氏歎曰我生何為徒受脣耳亦自縊死繼而仲起弟妻蔡氏抱幼子與乳母湯氏皆自縊明􆇦華氏女名妙清杭州衛千户榮女榮戍彭城累功得官臨殁語女以子震幼弱後母年又少恐族人利吾官將不利於震女哭應曰請得事吾母長我弟嗣我父勲終不從婚媾去榮卒從兄逼之嫁女翦髪碎面自誓竟育震襲父官劉烈女錢塘人少字吳嘉諌鄰富兒張阿官屬窺之一夕緣梯入女呼父母共執之俟旦訟官張之從子倡言劉女誨淫縛人取財女泣告父曰賊污我名不可活矣我當訴帝求直耳即自縊盛暑待驗暴日下無屍氣嘉諌初惑人言不哭既知其誣伏屍大慟女目忽開流血淚數行阿官延訟師丁二執前説女傅魂於二曰若以筆汚我我先殺汝二立死有司遂杖殺阿官及從子姜縉妻胡氏錢塘人縉殁族人利其貲逼胡改嫁訟之官讞者欲試之語曰爾少二子幼盍早決胡即拔骨簪刺雙目流血盈階目遂瞽秦某妻顧氏錢塘人夫甚貧病痿垂死謂顧曰同餓死無益孰若更適他人吾亦得須臾無死顧飲泣不答一日舅姑攜酒肴來與夫相耳語顧度其將市己投井死潘氏女仁和人許字孫登名登名卒女年十八歳欲奔喪父母不許遂蓬髪垢面閉户不岀富室爭求聘之輒欲自殺久之登名母死女聞哀毁幾絶密於室中置飯一盂遥奠之遂裂衾自縊許釗妻潘氏海寕人年十六生子淮甫期歳釗卒釗族兄欲潘改適夜率勢家僕數十人椎門入潘抱子奔避至河濱忽有木浮至憑之以渡達母家遂止不歸及淮長釗族兄來潘命淮酌酒飲之北向拜曰未亡之强生者以淮故耳今幸成立復何恨語畢入室自縊沈華區妻潘氏海寕人明末杭破被掠語兵曰妾與若去願釋我夫兵釋華區驅潘登舟至梅溪躍起投水兵驚捽其髪潘沒以入髮為斷如是者三兵怒殺之吳正宗妻許氏海寕人崇禎末為兵所掠擁上馬投地大罵復擁以行至沙河隄於馬上奪刀拽兵墮河兵被淹幾死同伍者怒攢刺殺之黄烈婦仁和人兵亂被掠舟出陡門投水死越五日屍出其夫扶屍而慟婦忽兩目淚溢潘之庠妻凌氏新城人夫亡遺腹生一子翁病姑盲凌事之盡孝亂兵躪郡邑凌被掠投河死同時沈登榜妻陳氏亦殉節死翁善妻陳氏昌化人明末為兵所執脅之不從被殺時有陳錦妻翁氏陳大忠妻章氏並被執不受汚乘閒赴水死童時聘妻王氏引頸受刃遂遇害本朝李士鈐妻蔡氏錢塘人士鈐痛母喪嘔血死蔡晝夜悲號扼喉以殉順治中旌表仲升妻曾氏仁和人少寡順治初奉姑避兵於鄉值姑卧病賊至鄰婦呼曾同行曾曰吾義不可舍姑去惟守死以待耳蓬垢侍湯藥榻前賊至不為動賊曰孝婦也舍之去守節五十餘年女適費亦少寡依母居母亡女痛母隨死楊氏二烈婦富陽人楊友松妻朱氏生子愈奇娶宋氏順治初山寇竊發姑婦走匿叢薄閒賊搜得遂相抱躍入池中賊抽矢射之而去翼日家人出之矢貫宋項面色如生雍正中旌周甸妻陳氏新城人早喪母遇歳歉以麪食其父與弟而己㗖糠粃甸父聞其賢聘為子婦順治二年與姑避難山中寇至將刃其姑氏直前救護寇豔其色曰能從我釋爾姑氏紿曰諾遂釋姑去度已遠乃抱路旁大樹號哭不肯行寇拔刃逼之氏奪刀自剄死時年二十二雍正中題旌又同縣鍾時飛母羅氏遇寇被獲不從引頸受刃死袁啟元妻葉氏新城人遇賊雙江口之墳山義不辱投水賊怒射殺之同縣沈尚珍妻袁氏被執至富陽亦投水死盧貞女錢塘人全人聘為繼室未婚全人死盧往行三年喪守志以殁康熙中旌李士謀妻胡氏錢塘人夫亡事舅姑孝撫幼叔幼姑為之婚嫁比鄰失火胡號泣籲天風反火滅人以為孝感康熙中旌李氏女仁和人名婃許字張仕華姑及夫先後死時年十八請視殮父不許乃辟一室中立兩主歳時祀姑及夫守志四十年康熙中旌朱安九妻徐氏海寕農家婦美姿容性貞潔康熙四十年四月採桑湖畔有漁人章四欲犯之徐厲聲大呼章怒搤其吭而死事聞旌表建坊水側後有舟經其地者語涉䙝狎忽風浪湧起覆其舟往來者咸相戒弗敢犯孫秀姑錢塘人年十五歸楊文龍未婚隨父販衢州秀姑與姑侯氏家居鄰有閆士積者素横里中伺姑卧病突入將犯之秀姑嚙其指負痛逸去後再至秀姑懼不免遂飲滷死方酷暑顔色如生數日不變事聞旌表而寘士積於法秀姑冡在西湖棲霞山麓有坊曰貞烈留香楊德宏妻余氏錢塘人適德宏方一載姑亡德宏患病死氏勺水不入口晝夜哀號而死潘周嘉妻沈氏海寕人年十歳父客死潯州哭幾殞及十五歸周嘉終身茹素淡服周嘉以羸疾殁遺孤纔一週氏大慟撫孤曰我不能顧汝矣視殮畢即自絶以殉距夫死纔六日陸禮妻徐氏海寕人年十六歸禮禮父以事陷獄母又喪明驚憂成疾氏朝夕䑛姑目數月復明御史巡方至乃匍匐赴水鳴舅冤得釋夫亡事舅姑益謹舅姑殁喪葬皆經理無憾人稱孝婦莫孝女錢塘人年十三父病侍湯藥不離左右及殁哀毁如成人聞者争欲娶之女以母傅氏無倚誓不嫁布衣操作以供母食母卒遂絶粒既而曰父母未葬我何可死乃晝夜紡績銖積數年擇地葬父母而卒雍正中旌張所修妻汪氏錢塘人年二十四所修病不起目汪曰吾死汝何如汪泣即舉刀斷一指曰設有不虞以此指先殉地下吾當忍死敎孤所修乃暝守節三十年而卒又同縣生員姚垣妻陸氏垣殁氏年二十三撫子洙成立以夀終邵周書妻陸氏錢塘人周書卒陸抱孤泣曰天如不絶邵氏我當作未亡人十五年及孤年十五岀應試陸謂曰汝可自立我將報汝父地下矣詰旦自縊死吳錫妻戴氏錢塘人居父喪以孝稱歸吳六年夫病殁戴巾絞刀刺凡求死者七家人環伺不得死乃宻懷琉璃瓶吞之嘔血數升卒解烈女錢塘人解仲良女母亡仲良他出鄰惡少伺閒謔之遂服毒死徐嘉謨妻金氏錢塘人年九歳母疾籲天求代及歸徐孝於舅姑姑患癱金吮膿奉藥衣不解帶者四十日姑遂瘳舅貧而好施見有䰞子者心憐之而不言金典衣飾贖之嘉謨卒於京金紡績積貲以歸其喪林邦基妻曾氏仁和人年二十七夫病不起曾許以身殉家人阻之不得告於官曉之曰舅在且老不當代夫供子職乎曽即從之逾三年舅殁既葬曰吾今乃可踐吾言矣賦詩一章不食而死雍正中旌王端姑仁和人父湘病危與友宋英倩榻前訂姻踰六年宋子殤端姑甫七歳聞之鳴咽及長有議婚者遂絶食卒同縣嚴貞女許嫁柴際洛際洛亡女年十五聞訃陰以縞繩束其髮却繡綺不御父為改婚女不食死徐氏女錢塘人許字施士標未婚夫殁徐歸施成服經理八喪備諸荼苦雍正中旌唐之坦妻曹氏海寕人夫亡曹服滷吞錢投水絶食皆以救勸不得死㑹歳除内外倥偬遂乘閒縊柩側王敬姑海寕人許字屠氏子納聘請期以母疾侍奉乏人翦髪而辭曰俟髮長乃可加笄耳潛割臂奉母逾年病劇復剜臂而母已不能進飲食矣父悲悼成疾又剜臂進不效女赴舍北止水中以死曹氏女餘杭人許字錢塘洪珽未婚夫殁曹欲奔喪不得久之母病刲股以進不效乃泣曰昔夫亡不死者以有母在今母又死何用生爲遂經於母柩側年三十一翁學賢妻施氏餘杭農家女夫亡守節歳歉自食糠粃而養其姑姑病痿十年侍奉不稍懈人咸以孝稱之許志獻妻章氏昌化人年十六適許未一載夫亡父命改嫁不從嘗佩刀白誓奉舅姑誠敬教子孫有義方守節六十餘年監生姚廷錫妻趙氏錢塘人夫亡守節又同縣房聖章妻陳氏夏兆龍妻張氏濮人玉妻王氏監生滑桂妻楊氏監生錢綸妻滑氏冷耀妻金氏監生馮宏綸妻王氏姚魯玉妻陳氏考授州同孫士驥妾胡氏杜公遠妻馮氏貢生費錫駿繼妻朱氏沈服周妻蔡氏葛紹雍妻翁氏倪燾妻徐氏許儒妻鄭氏生員程良棟妻趙氏邱肇昌妻方氏霍兆昌妻宋氏章士進妻沈氏俞七豪妻張氏汪純繼妻沈氏監生孫勅妻魏氏陳天濤妻方氏徐昂發妻吳氏生員張九疇妻沈氏汪原熹妾鄔氏王時禧妻謝氏陳輔卿妻成氏監生仲謀妻樂氏陳六吉妻朱氏邱良杞妻吳氏史子傳妻郭氏生員馬浤妻顧氏唐啟周妻姚氏吕之榮妻沈氏沈育萬妻方氏沈勇天妻周氏張玘妻傅氏監生朱兆定妻許氏許有聲妻楊氏妾范氏生員張卜年妻黄氏監生費錫麟妾顧氏馬榮妻陳氏畢介臣妻程氏河南輝縣知縣滑彬妾許氏焦昇國妻吳氏吳又虞妻王氏陳甄侯妻方氏候選訓導謝琨成妻沈氏妾錢氏傅耀公妻黄氏監生汪棠妻吳氏汪紹辰妻張氏馬元斌妻陳氏吳甫臣妻王氏吳廷翰妻姚氏沈寓惟妻吳氏賴四吉妻歸氏馮宗立妻黄氏戴連登妻周氏王宣妻葛氏盧廷相妻李氏程聖妻吳氏武舉吳聚庚妻余氏蔣文況妻洪氏蔣美成妻俞氏吳聖徵妻管氏馬肇永妻色氏生員吳景烈妻金氏陳經綸妻張氏顧君德妾汪氏生員王太美妻屠氏楊肇開妻沈氏毛友生妻夏氏潘依仁妻俞氏聞聖日妻費氏丁珮玖妻陸氏章士奇妻毛氏監生邵懋建妻沈氏倪文耀妻楊氏陳敘妻邵氏徐萬鍠妻曹氏葉介燦妻趙氏吳如林妻陳氏陳鴻妻周氏施正宜妻程氏候選吏目劉在宣妾徐氏監生余懋桓妻袁氏王金蘭妻汪氏俞文魁妻潘氏張駿妻毛氏陳文奎妻王氏何兆麒妻駱氏