皆走險進至大勃弄執承顛餘屯大者數萬小數千皆破降之西南夷遂定韋皋萬年人貞元間為劍南節度使兼雲南安撫使説南詔異年尋歸唐後屢從破吐蕃兵嵗貢方物元烏里特哈達蒙古人憲宗二年命太弟討南蠻諸國以烏里特哈達總督軍事至昆澤擒其王段興智出師凡二年平大理五城八府四郡洎烏白等蠻三十七部請悉置郡縣從之加大元帥鎮大理烏里特哈達舊作元良合台今改正信苴日僰人段氏之後中統二年詔領大理鄯闡等城自各萬户以下皆受其節制至元元年舍利畏及三十七部諸爨叛信苴日率衆進討大破之爨部平十一年為大理總管舍利畏復叛以計殺之於是置郡縣署守令行賦役施政教與中州等帝嘉其忠勤纍進大理威楚金齒等處宣慰使都元帥復拜為雲南行省參政張立道大名人至元十年授大理等處巡行勸農使佩金符地有昆明池界金馬碧雞之間環五百餘里夏潦暴至必冒城郭立道求泉源所自出役丁夫二千人治之泄其水得壤地萬餘頃皆為良田爨僰之人雖知蠶桑而未得其法立道教之飼養收利十倍於舊雲南由是益富庶猓猓諸山蠻慕之相率來降收其地悉為郡縣賽音諤德齊沙木思迪音回回人至元十一年平章政事行省雲南俗無禮儀男女往往自相配偶親死則火之不為喪祭無粳稻桑麻子弟不知讀書賽音諤德齊沙木思迪音教之拜跪之節婚姻行媒死者為之棺椁奠祭教民播種為陂池以備水旱創建諸路學宫明倫堂購經史授學田由是文風稍興西南諸夷翕然款附居雲南六年卒百姓巷哭帝思其㓛詔雲南省臣賽音諤德齊沙木思迪音成規不得輒改賽音諤德齊沙木思迪音舊作賽典赤瞻思丁今改正愛魯克至元五年從雲南王征金齒諸部震服定其租賦平火不麻等二十四寨閲中慶路版籍得隱户萬餘以四千户即其地屯田十七年拜參知政事平烏蒙蘿佐山白水叛蠻愛魯克舊作愛魯今改正尼雅斯拉迪音賽音諤德齊沙木思迪音長子至元十七年授雲南行中書省左丞尋升右丞建言三事其一謂雲南省規措所造金薄貿易病民宜罷其一謂行省既兼領軍民則元帥府亦當罷其一謂雲南官員子弟入質惟達官子弟當遣餘宜罷奏可尼雅斯拉迪音舊作納速刺丁今改正齊喇西域人至正十八年拜鎮西緬麓川等路宣撫司時成都烏蒙諸驛阻絶齊喇市馬給傳往來便之後從雲南王入緬統兵三千屯鎮驃國設方略招徠其黨由是復業者甚衆齊喇舊作怯烈今改正多爾濟西夏寧州人世祖時為雲南廉訪副使會諸蠻叛僚佐悉稱故去多爾濟獨居守後為廉訪使僰夷與蠻相仇殺省臣受僰賂誣奏蠻叛殺良民多爾濟奏劾廢之子仁通以伯忽等叛殁於戰多爾濟舊作朵兒赤今改正伊克德濟實喇婁人至元二十一年征緬造舟二百艘進攻江頭城拔之獲鋭卒萬人因圖其形勢遣使詣闕陳攻守之策不報後諸蠻據太公城以厄大兵遣使諭禍福為所害遂擊之金齒十二城皆降伊克德濟舊作也罕的斤實喇婁舊作匣喇魯今改正額森布哈蒙古人至元二十三年拜雲南諸路行中書省平章政事時阿郎可馬丁諸僰夷為變討平之遂立登雲路府州縣六十餘所得户二十餘萬官其酋長定其貢稅邊境以安額森布哈舊作也先不花今改正張萬嘉努至元間為副都元帥征雲南峩昌多興羅羅諸夷民為之立祠後征緬戰死嘉努舊作家奴今改正程思廉東勝州人至元二十六年立雲南行御史臺思廉為御史中丞始至蠻夷酋長來賀意甚倨思廉奉宣上意明示禍福聞者懾服雲南舊有學校而禮教不興思廉振起之始有從學問禮者劉正靖州人大德元年為雲南行中書省左丞雲南民嵗輸金銀甸寨遠者秋季遣官領兵往徴人馬費嵗以萬計所差官必重賂省臣乃得遣徴收之數必十加二而折閲之數及送迎餽贐亦如之正首疏其弊給官稱俾土官輸納其弊始革庫克新賽音諤德齊沙木思迪音第三子大德時為雲南行省右丞條具諸不便事言於宗王王不可庫克新與左丞劉正馳還京師有旨令宗王協力施行由是一切病民之政悉革豪民規避繇役投充王府宿衛庫克新按朝廷原額所無者悉籍為民減其宿衛三分之二令諸郡邑遍立廟學選士為教官文風大興庫克新舊作忽辛今改正張瑾河南人至正間為雲南廉訪副使興學勸農鋤強旌善常行部至澄江辨釋禁獄五十餘人剖決冗案三百餘事舒嚕任都元帥時朝廷遣兵討車里不利舒嚕曉以大義其酋寒賽感悟願增差賦併出黃金采女贈之一無所受寒賽曰入我土而不為金婦餌者元帥一人而已舒嚕舊作述律杰今改正幹爾密梁王聞明師入滇秦母嘉僖率妻忽的斤等百餘人趨昆明池謂行省右丞驢兒達德曰我宗室無降理遂仰藥死驢兒達德蒙古人亦自殺從死者幾二百人幹爾密舊作瓦爾密今改正明傅友德碭山人洪武十四年為征南將軍生擒達爾瑪略定永昌澄江臨安元江尋甸楚雄等處又取東川烏蒙鶴慶麗江金齒其時陳桓葉升以隨征東川封侯達爾瑪舊作達里麻今改正王禕義烏人洪武時奉詔諭雲南梁王己聽其言會有自立於朔漠者遣托克托索餉迫梁王殺禕遂遇害諡文節托克托舊作脫脫今改正沐英定遠人洪武中以西平侯征南右副將軍從傅友德取雲南乘霧趨白石江生擒達爾瑪田梁王走死屬郡皆下遂拔大理分兵收未收諸蠻設官立衛守之詔英留鎮思倫發寇定邊衆號三十萬英大破之諸蠻震懾麓川始不復梗入朝帝親撫之曰使我高枕無南顧憂者汝英也英後先鎮雲南十年簡守令課農桑墾田至百萬餘畝滇池隘浚而廣之無復水患通鹽井之利以來商旅辨方物以定貢稅視民數以均力役疏節闊目民以便安卒之日軍民巷哭遠夷亦為流涕梅思祖夏邑人洪武十五年以汝南侯從傅友德平雲南署雲南布政司事思祖善撫輯遠人安之張紞富平人洪武中雲南平出為右參政厯左布政使十三年治行為天下第一凡土地貢賦法令條格皆紞所裁定民間喪祭冠昏咸有定制務變其俗滇人遵用之沐春英長子嗣爵鎮雲南洪武二十七年平越巂蠻立瀾滄衛其冬阿資復叛春搗其巢擒之越州遂平春在鎮七年大修屯政鑿鐵池河灌宜良涸田數萬畝民復業者五千餘户民為立祠祀之陳迪宣城人洪武中除雲南右布政使普定曲靖烏撒烏蒙諸蠻煽亂迪率土兵擊破之沐晟英次子建文元年嗣爵鎮雲南平思倫發餘黨以其地為三府二州五長官司永樂四年拜晟征夷左副將軍從張輔平交趾晉封黔國公豫世劵洪熙初加太傅鑄征南將軍印給之世鎮其地自是為定制子孫相承鎮守二百餘平羣蠻服其威無敢大肆南服賴之馮貴武陵人永樂中征交趾纍遷左參政蒞事明決練土兵二千人驍果善戰貴撫以恩義數擊賊有㓛中官馬騏奪之黎利反以羸卒禦賊力屈而死時參政侯保以黃江要害築堡守之拒數月死於戰陳遜浦城人永樂間任右布政使博學有志操卒於官無以為殮同時有周樂吉水人任按察使亦以清操著名僚友為之殯殮周新南海人永樂間任按察使執法公平不畏強禦李任永康人宣德元年以都指揮從征交趾守昌江與指揮顧福死守九月餘前後三十餘戰卒以力詘皆自刎內官馮智指揮劉順俱自經城中軍民士女不屈死者數千人事聞贈恤崔聚懷遠人宣德初從安遠伯柳升征黎利升遇伏死聚帥軍援昌江及陷郎中史安主事陳鏞李宗昉及後軍都事潘禋皆死聚被執百計降之終不屈死張璞江夏人正統間按滇時鎮守太監梁裕濫取貨物民不堪命璞盡革之裕與同知敖英搆謀誣奏逮璞下獄卒贈太僕寺少卿王恕三原人成化十二年以右都御史巡撫雲南時鎮守中官錢能貪恣甚恕廉得其私通外國狀劾能罪當死恕居雲南僅九月威行徼外黔國以下咸惕息奉令疏凡二十上直聲動天下當是時安南納江西叛人王姓者為謀主潛遣諜入臨安市銅鑄兵器欲伺間襲臨安微恕事且不測樊英常山人成化間按滇繩貪獎廉交人越界掠殺英移諭禍福遂納款陳騏南海人成化間任按察副使時錢能橫甚命藩臬官五日一謁或令錦衣衛指揮受禮騏正立不屈能怒曰這蠻子食蛇慣了故此大膽騏曰豈但蛇即豺狼虎豹也要食能目左右欲毆之騏趨出執法如故王詔趙州人宏治元年以右副都御史巡撫雲南土官好爭襲所司入其賄變亂曲直生邊患詔不通苞苴一斷以法且去弊政之不便民者諸夷歸命邊徼安戢林俊莆田人宏治元年擢雲南副使鶴慶元化寺稱有活佛歲時集士女萬人爭以金塗其面俊命焚之得金悉以償民逋又毀淫祠三百六十區皆撤其材修學宫干崖土舍刀怕愈欲奪從子宣撫官劫其印數年俊檄諭之遂歸印進按察使楊繼宗楊城人宏治初以僉都御史巡撫雲南繼宗嘗為雲南副使三司多舊僚相見歡然既而出位揖之曰明日有公事諸君幸相諒遂劾罷不職者八人郭緒太康人宏治中為雲南參議孟養思祿孟養思揲搆怨不已巡撫命緒往諭之緒單騎從數人行甸日至南甸斬棘徒步引繩以登及至孟賴去金沙江僅二舍手為檄使馳過江諭以招徠意蠻人相顧驚曰中國使竟至此乎發兵率象馬數萬夜渡江環緒數重從行者懼請勿進緒拔刀叱曰明日必渡江思祿聞遣使來聽命祿繼至緒先敘其勞次白其􅬁然後責以叛諸酋聞咸俯伏呼萬嵗請歸侵地及前所留使人賀元忠吳縣人宏治中為金騰道兵備副使未久即去行李蕭然土人聚百金於驛為贐元忠正色却之送者皆號泣後人目其亭曰却金亭席書遂寧人宏治十七年雲南晝晦五日敕大吏考察諸吏書以部郎上疏言致災之由係朝廷不係雲貴在大臣不在庶官正德十二年任右布政使霑益土舍搆亂贊剿有㓛唐龍蘭溪人正德時以御史巡按雲南錢凝義父參將盧和坐罪當死疑為奏辨下鎮撫覆勘會遣官録囚受凝囑欲出和為龍所持卒正其罪土官鳳朝明坐罪死革世職凝令滇人為保舉而矯旨許之龍抗疏爭寢其事何孟春郴州人正德時以右副都御史巡撫雲南彌勒州十八寨蠻酋阿勿阿寺為亂焚掠寧州通海孟春討斬阿勿生擒阿寺諸寨悉平陳察常熟人正德時以御史巡按雲南助巡撫何孟春討定彌勒州嘉靖初疏言金齒騰衝地極邊徼既統以巡撫總兵又有監司守備分轄無事鎮守中官因劾太監劉玉都督沐嵩罪詔並罷還陳洪謨武陵人正德時為雲南按察使鎮守中官史泰金騰分守中官劉玉假進貢名索金寶洪謨檄所司毋奉行泰縱家人橫於道洪謨執而治之聶賢長壽人正德間任金滄副使有指揮貪虐結貴官賢誘使盡吐其私賄還故主然後繫之劉節大庾人正德時為金騰道兵備副使廉正有威時兩鎮中官貪甚節力為裁抑權貴側目革鎮之議自此始薑龍太倉人正德末遷雲南副使備兵瀾滄姚安滇故盜藪龍讓土酋酋懼撫諭羣盜悉聽命巨盜方定者既降而貧為妻妾所詬不忍負龍竟仰藥死在滇四年番漢大治唐胄瓊山人嘉靖初擢金騰副使土酋莽信虐計擒之木邦孟養搆兵胄遣使宣諭木邦土酋遂獻地顧應祥長興人嘉靖時以右副都御史巡撫雲南昆陽新興賊作亂應祥與巡按毛鳳詔等討平之居三年所規畫便宜凡二十餘疏雲南人深德之歐陽重盧陵人嘉靖六年以右僉都御史巡撫雲南時尋甸土酋安銓鳳朝文反攻圍會城重督兵擊敗之朝文計窮絶普渡河走追兵至殲焉銓逃尋甸為土兵所執賊盡平緬甸木邦諸酋數相讐殺重諭以禍福皆還侵地供貢如故重乃恤創殘賑貧乏輕徭賦規畫鹽鐵商稅屯田諸務民咸便之雲南嵗貢金千兩費不資大理蒼山産奇石鎮守中貴遣軍匠鑿山壓死無算重皆疏論浮費大省山得永閉汪文盛崇陽人嘉靖十五年以雲南按察使就拜右僉都御史巡撫其地時安南莫登庸篡位朝議致討文盛乃廣設方略招攜懷遠有武文淵者以所部萬人降又詔安南旁近諸國助討皆聽命登庸懼奉表請降願修貢文盛以聞朝議不許既而毛伯溫至南寧受登庸降卒如文盛議鮑象賢歙人嘉靖十五年為雲南副使巡撫汪文盛受命討安南象賢言剿不如撫文盛然之屢遷右副都御史代石簡撫雲南集土漢兵七萬討元江土舍那鑑鑑懼仰藥死擇那氏後立之曾鈞進賢人嘉靖中為雲南副使兩司赴黔國公率廷謁鈞始正其禮且釐還所侵麗江府民地毛鳳詔麻城人嘉靖間按滇時閹鎮為害鳳詔抗疏斥罷後以僉事道分巡金滄尤多善政吕光洵新昌人嘉靖末以右都御史巡撫雲南時苗夷阿方李向陽等為亂光泃督兵討平之武定土酋鳳繼祖叛趣兵討擊繼祖遂授首黔國公沐朝弼數致厚賄却不受且發其罪朝弼結權貴傾光洵遂罷歸鄒應龍長安人隆慶時以兵部右侍郎巡撫雲南至則發黔國公沐朝弼罪朝弼竟被逮萬厯改元鐵索箐賊作亂討平之又討叛番栂多斬獲蕭彥涇縣人萬厯中以右副都御史巡撫雲南隴川兵大譟兵備薑欣撫定之而其兵素驕給餉小緩遂作亂過會城彥調兵攻之斬首八十脅從皆撫散自緬甸叛孟養車里二宣慰久不貢至是修貢彥撫納之黃文炳籍貫未詳萬厯間任兵備道時隴川多安民反五年未平文炳密調兵措餉搗其巢擒渠帥還而民不知仁恩實洽於民心嘗嘗賓館云求通民情願聞已過李材豐城人萬厯間以按察使任兵備道正倫紀禁浮屠俗先恥讓男女别途日延紳士講修身之學以剿何披莽裕功擢鄖陽都御史尋以御史蘇酇誣劾其不實下獄郡人薛繼茂訟其􅬁始釋朱永吉桂林人精天文術數客黔在傅宗龍幕解安邦彥圍隨宗龍至滇崇禎間為遊擊屢破普名聲後吾必奎通賊永吉身被重傷伏發力戰死偏將趙能馮忠葬於路側能亦自刎沐天波黔寧王沐英十一世孫襲爵鎮滇土司沙定洲陷省城走保楚雄與副使楊畏知協力固守李定國入滇賊解圍走孫可望遣人招之天波執義不赴乃約共討賊圖恢復從永明王入緬諸臣多傲慢天波獨事之甚謹後緬酋謀獻永明誘天波之木城天波察有變與王起隆林旗鼓等囊石為鎚擊殺數十人遂死之其子忠亮被執亦不食死常沙賊陷城時母陳氏妻焦氏皆自焚死本朝康熙六十年崇祀乾隆四十一年賜諡忠節楊畏知寶雞人崇禎中為雲南分巡金滄副使武定土官吾必奎反陷楚雄畏知督兵誅必奎駐其地會沙定洲之亂諸郡皆陷西攻楚雄畏知固守賊引去後孫可望西略畏知懼戰敗投水不死踞而罵可望素重其名折矢誓共討賊畏知要以不殺人不焚廬舍迤西八府免屠戮畏知力也後以忠直為可望所殺楚雄人以畏知守城功為立祠以祀本朝乾隆四十一年賜諡忠節本朝趙廷臣漢軍鑲黃旗人順治十八年任雲貴總督兵燹之餘繼以荒歉廷臣調劑兵民甚有恩惠性不喜繁侈每行部不過數騎竟有不知其至者李天浴漢軍鑲藍旗人康熙七年任雲南巡撫廉明勤慎屬吏凛然無敢犯法者吳三桂奏請徙滇民天浴力疏止之民賴以安甘文焜漢軍正藍旗人康熙七年任雲貴總督時吳三桂逆節已萌僭侈踰法文焜持大體多所裁抑及三桂叛文焜死之贈兵部尚書諡忠果雍正間入祀昭忠祠同時遊擊閻洪標林宗珍皆於安南衛戰死事聞賜恤廕李興元遵化人康熙十年任按察使方正執法嚴抑藩兵不許違禁取利及準折民間子女吳三桂叛守節不屈杖之下獄尋安置蒙化遇害趙良棟寧夏人康熙十九年授雲南總督時大兵圍雲南久不下良棟馳至督諸軍進攻逼之三日賊潰納款良棟斂兵不入城即日率所部趨曲靖秋毫無犯有古良將風蔡育榮奉天正白旗人康熙十九年授綏逺將軍同諸軍恢復雲南賊平後改授雲貴總督時逆氛初靖育榮招撫散亡給牛種勸耕作流民漸復業奏上籌滇十疏設施各有條理滇人德之王繼文廣寧人康熙二十年任布政使大兵討吳逆步騎數十萬米芻闕供議欲取食民間繼文白巡撫伊闢言於都統賴塔及固山貝子章泰等曰現糧可支三日如三日後米芻不繼請正繼文軍法乃急遣員賫銀分市鄰邑未三日米芻飛至後巡撫伊闢卒遺疏薦遂撫滇賊平之後招徠流民以斬復業升雲貴總督惠政尤多范承勳奉天正黃旗人康熙二十五年任雲貴總督滇經亂後庶事草創承勳至整飭營伍盜息民安即捐俸修建學宫置禮樂器聘名士纂修通志所規畫動中機宜在任六載威惠大行許宏勳遼陽人康熙二十五年任按察使持法剛正無所撓二十七年楚北兵譁滇姦人張麻子等思乘機為變期以三鼓發宏勳偵得其謀亟白督撫戒譙樓鼓徹夜無三撾密捕亂首十數人無得脫者比明己斬首懸轅門兵民帖然人服其智石文晟奉天正白旗人康熙三十三年巡撫雲南豁達多材略為政務舉大網先是雲南屯賦仍前明舊額科重軍民病之文晟疏請減十之六又請增廣舉子鄉試解額以振起人文士民無不感戴劉蔭樞韓城人康熙四十二年任按察使論囚平恕晉本省布政使值嵗旱減價糶粟民不苦飢濬治六河疏海口大得灌溉之利楊名時江蘇人康熙五十八年任雲南巡撫會征西藏大兵駐省城約束嚴明無敢叫囂凡軍民疾苦大者奏請小者更易科條事無遺纖悉恩信浹於蠻髳於屬員之邪正事之得失風氣之淳薄皆盡言無隱乾隆元年以禮部尚書卒贈宫傅諡文定魏方泰廣昌人康熙間任學政杜頂替嚴冒籍革陋規所拔多孤寒勵以實踐乾隆八年崇祀蔣洞常熟人康熙間任學政苞苴不行文風丕振臨元開皆有􅌹祠徐嘉賓奉天人任按察使雪冤懲慝宵小絶迹升布政使定義學規制添書