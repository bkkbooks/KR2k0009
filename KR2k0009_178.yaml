body:
  text: 雲南省在京師西南八千二百里東西距二千五百一十里南北距一千一百五十里東至廣西泗城府界七百五十里西至神護關接野人界一千七百六十里南至交趾界七百五十里北至四川寧遠府會理州界四百里東南至廣西鎮安府界一千一百四十里西南至天馬關接緬甸界二千三百一十里東北至貴州興義府普安縣界四百三十里西北至吐蕃界二千里分野天文東井輿鬼分野鶉首之次建置沿革禹貢梁州南境戰國時楚頃襄王使莊蹻略地至滇池遂自王秦時通道置吏為西夷滇國漢武帝元封二年開置益州郡屬益州部刺史兼為牂牁郡西境今廣南府及廣西州地越巂郡西南境今麗江府及永北廳地後漢分益州郡西境置永昌郡後漢永平十二年割益州郡西部都尉置屬益州部今永昌鶴慶大理姚州四府州地三國漢建興二年改益州郡置建寧郡又分建寧永昌置雲南郡今大理姚州二府州地分建寧牂牁置興古郡今廣西州及曲靖府之霑益羅平二州地晉泰始七年分益州置寧州領雲南興古建寧永昌四郡統縣四十五太康三年廢寧州入益州置南夷校尉以護之監五十八部蠻族太安二年復置寧州時又分建寧以西之七縣别立為益州郡永嘉二年改益州郡為晉寧郡分牂牁立平夷夜郎二郡是時其地再為李雄所有其後李夀分寧州興古永昌雲南朱提越巂河陽六郡為漢州咸康四年分牂牁夜郎越巂朱提四郡置安州八年罷併寧州以越巂還屬益州省永昌郡劉宋因之領郡十五建寧晉寧牂牁平蠻夜郎朱提南廣建都西平西河東河陽雲南興寧興古梁水十五郡蕭齊時為寧州鎮領郡三十左建平南廣南朱提南牂牁梁水建寧晉寧雲南西平夜郎東河陽西河陽平蠻興古興寧西河平樂北朱提宋昌永昌益寧又有南犍為等九郡不領縣梁大同中置南寧州太清二年為西爨所據唐書南蠻傳自曲州靖州西南昆州曲軛晉寧渝獻安寧距龍和城通謂之西爨白蠻自彌鹿升麻二川南至步頭通謂之東爨烏蠻隋開皇初遣使朝貢因置恭州協州昆州尋廢唐武德元年復開南中置南寧州四年置總管府舊唐書志州管南寧恭協昆尹會姚西濮西宗九州又置姚州都督府並置州十三七年改南寧總管為都督督西寧豫西利南雲縻南籠七州並前九州為十六州八年改南寧為郎州新唐書南蠻傳爨蠻西有徒莫祇蠻貞觀二十三年內屬以其地置傍望覽邱求五州隸郎州都督府永徽初罷郎州都督更置戎州都督新唐書志諸蠻州九十二皆無城邑椎髻皮服惟來集於都督府則衣冠如華人焉天寶末沒於南詔蒙氏大中中蒙氏自號大禮國滇載記光化四年鄭買嗣滅蒙氏改國號曰大長和五代後唐天成三年趙善政代之改國號曰大天興清泰中楊干真又奪之改國號曰大義寧尋為段思平所滅石晉天福二年段氏改國號曰大理宋初仍為大理國滇載記元符二年段氏絶高升泰改國號曰大中國既而復求段氏立之號曰後理國元憲宗三年滅之收府八郡四部三十有七至元八年分三十七部為南北中三路路設達嚕噶齊并總管十三年立雲南諸路行中書省治中慶路領路三十七府二屬府三屬州五十四屬縣四十七大德三年罷雲南行御史臺立雲南諸路道肅政廉訪司領中慶威楚武定鶴慶麗江等路又曲靖宣慰司領曲靖澄江普定等路臨安宣慰司領寧安廣西元江等路大理金齒宣慰司領大理金齒等路又金齒等處宣撫司領柔遠茫施鎮康鎮西平緬麓川等路又有烏撒烏蒙宣慰司而廣南西路宣撫司元史闕達嚕噶齊舊作達魯花赤今改正明洪武十五年置雲南布政使司改中慶路為雲南府治焉領府十一雲南大理臨安楚雄澄江蒙化景東廣南廣西鎮沅順寧軍民府七曲靖姚安鶴慶武定尋甸麗江元江直隸州一北勝嘉靖元年置永昌軍民府本朝初因之康熙六年置開化府八年降尋甸府為州屬曲靖府三十七年升北勝直隸州為永北府雍正四年改隸四川之東川府來屬五年改隸四川之烏蒙鎮雄二府來屬六年降鎮雄府為州屬烏蒙府七年置普洱府九年改烏蒙府曰昭通府乾隆三十一年降永北府為直隸廳三十五年降廣西武定鎮沅元江四府皆為直隸州景東蒙化二府皆為直隸廳省姚安府入姚州屬楚雄府改鶴慶府為州屬麓江府嘉慶二十四年升永昌府屬之騰越州為直隸廳共領府十四直隸州四直隸廳四雲南府大理府臨安府楚雄府澄江府廣南府順寧府曲靖府麗江府普洱府永昌府開化府東川府昭通府廣西直隸州武定直隸州元江直隸州鎮沅直隸州景東直隸廳蒙化直隸廳永北直隸廳騰越直隸廳形勢東接黔蜀東川曲靖二府之東接貴州昭通府西北接四川東南接貴州又武定姚州之北及永寧土府之東皆與四川接界南控交趾臨安開化二府與安南接界西擁諸甸永昌以西皆蠻甸也北距吐蕃麗江府及永寧土府之北與西蕃接界其名山則有點蒼雞足高黎共玉龍其大川則有金沙江瀾滄江潞江滇池西洱河其重險則有石門誠梁益之舊區西南之重鎮也舊志文職官總督駐雲南府轄雲南貴州雍正六年兼轄廣西省十三年仍改為雲貴總督巡撫駐雲南府提督學政駐雲南府布政使駐雲南府經厯舊有理問乾隆二十九年裁庫大使濟用按察使駐雲南府經厯司獄分守糧驛道駐雲南府舊為糧儲道乾隆三十三年兼管驛傳轄雲南武定二府州改今名分巡鹽法道駐雲南府舊為驛鹽道乾隆三十一年兼轄雲南武定二府三十三年專管鹽法改今名庫大使舊有經厯乾隆七年裁分巡迤東道駐尋甸州轄澄江廣南曲靖開化東川昭通廣西七府州舊轄雲南臨安澄江廣南曲靖普洱開化東川昭通廣西武定元江鎮沅十三府乾隆三十一年以雲南武定歸鹽道轄臨安普洱元江鎮沅歸迤南道轄分巡迤西兵備道駐大理府轄大理楚雄順寧麗江永昌景東蒙化永北八府廳分巡迤南兵備道駐普洱府乾隆三十一年設轄臨安普洱元江鎮沅四府州雲南府知府同知通判乾隆四十八年移駐南關府學教授訓導經厯舊有司獄乾隆十七年裁知州四員嵩明晉寧安寧昆陽舊有昆陽州同駐海口乾隆四十三年裁州學學正四員訓導四員吏目四員知縣七員昆明富民宜良呈貢羅次祿豐易門縣丞昆明駐板橋縣學教諭七員訓導七員導三員吏目三員知縣五員建水通海河西嶍峩蒙自縣學教諭五員訓導五員巡檢建水曲江司舊有石屏州寶秀司巡檢乾隆二十年裁嶍峩縣興衣司巡檢三十九年裁寧州傍甸鄉阿迷州甸苴關巡檢俱嘉慶七年裁典史五員舊設四員乾隆三十五年增建水一員楚雄府知府舊有同知乾隆二十一年裁府學教授訓導司獄知州三員舊設南安鎮南二員乾隆三十五年以姚安府屬之姚州一員來隸州判二員南安駐􅑇嘉雍正九年設姚州駐普淜雍正十年設州學學正三員訓導三員吏目三員知縣四員舊設楚雄定遠廣通三員乾隆三十五年以姚安府屬之大姚一員來隸縣學教諭四員訓導四員典史四員鹽井直隸提舉司三員黑井琅井白井白井司治舊在姚安府境乾隆三十五年撥入曲靖府五十二年改撥鹽大使四員黑井白井安豐井阿陋井舊有復隆白石谷大使二員俱乾隆四十二年栽白井安豐井五十二年由曲靖府改撥訓導二員琅井白井澄江府知府府學教授訓導舊有司獄嘉慶二十四年裁知州二員新興路南州學學正二員訓導二員吏目二員知縣二員河陽江川縣學教諭二員訓導二員典史二員廣南府知府府學教授訓導經厯乾隆三十六年移駐普廳塘知縣寶寧乾隆元年設典史順寧府知府通判駐緬寧乾隆十二年由右甸移駐府學教授訓導經厯駐右甸知事巡檢猛緬司乾隆十二年設知州雲州學學正訓導吏目知縣順寧乾隆三十五年設縣學教諭訓導典史曲靖府知府同知舊有通判乾隆四十一年裁府學教授訓導司獄知州六員霑益陸涼羅平馬龍尋甸宣威州學學正六員訓導六員吏目六員巡檢三員舊設宣威可渡司兼管可渡儻塘二驛乾隆二十年添設霑益炎松司尋甸易古司二員知縣二員南寧平彞縣學教諭二員訓導二員巡檢南寧白水司舊有南寧縣白水馬龍州易龍霑益州松林宣威州炎方驛丞四員俱乾隆二十年裁典史二員麗江府知府同知駐中甸乾隆二十一年設通判駐維西府學教授訓導舊有知事乾隆四十八年裁經厯嘉慶二十四年栽知州二員鶴慶劍川乾隆三十五年降鶴慶府為州并舊屬之劍川來隸州學學正二員訓導二員吏目二員舊設劍川一員乾隆三十五年增設鶴慶一員鶴慶舊有觀音山巡檢三十六年裁知縣麗江乾隆三十五年設教諭訓導典史鹽大使二員麗江井彌沙井普洱府知府同知二員一駐思茅雍正十三年設一駐威遠乾隆三十五年由鎮沅府改隸通判駐他郎乾隆三十五年由元江府來隸經厯二員舊設府經厯一員嘉慶四年增威遠經厯一員駐猛甸知事二員舊設威遠知事一員嘉慶十六年增設他郎知事一員巡檢思茅廳兼管司獄乾隆三十九年設知縣寧洱教諭訓導駐他郎典史鹽大使抱香井舊為抱母井大使嘉慶八年改香鹽井大使以抱母井鹽務歸威遠同知管理十九年兼管二井改今名永昌府知府同知駐龍陵府學教授訓導司獄巡檢三員龍陵廳沙木和施甸司知縣二員保山永平舊有騰越知州嘉慶二十四年升直隸廳縣學教諭二員訓導二員典史二員開化府知府同知駐安平府學教授訓導司獄屬安平同知嘉慶二十四年設知縣文山縣丞駐江那里嘉慶二十四年設典史東川府知府同知駐巧家營嘉慶十六年設舊有湯丹通判乾隆三十五年裁府學教授經厯駐巧家營知縣會澤巡檢二員歹補司者海司者海巡檢舊駐則補嘉慶十六年移駐典史舊駐者海嘉慶十六年移駐府城昭通府知府舊名烏蒙府屬四川省雍正五年來隸九年改今名同知駐大關通判駐魯甸府學教授經厯舊有司獄嘉慶七年栽知事二員舊設一員駐大關乾隆四十八年增設一員駐牛街巡檢二員魯甸司大關鹽井渡知州鎮雄州同駐彝良州判駐威信州學學正吏目巡檢母亨司知縣二員恩安永善縣學教諭永善縣丞永善駐副官村典史二員廣西直隸州知州舊為廣西府乾隆三十五年降為州裁通判經厯州判乾隆四十一年設駐五嶆州學學正訓導吏目知縣二員師宗彌勒舊並為州乾隆三十五年降為縣裁師宗州同縣丞師宗駐邱北乾隆三十五年設縣學教諭二員訓導二員巡檢彌勒竹園村乾隆十七年設典史二員乾隆三十五年設舊有師宗彌勒二州吏目是年裁武定直隸州知州舊為武定府乾隆三十五年降為州裁同知經厯州學學正訓導吏目巡檢金沙江知縣二員舊設元謀一員乾隆三十五年降祿勸州為縣裁和曲州縣學教諭二員訓導二員典史二員乾隆三十五年設舊為祿勸州吏目是年裁元江直隸州知州舊為元江府乾隆三十五年降為州裁通判經厯知事州學學正吏目巡檢因遠司知縣新平縣學教諭巡檢揚武壩典史鎮沅直隸州知州舊為鎮元府乾隆三十五年降為州舊有同知是年改隸普洱府州學學正吏目乾隆三十五年設巡檢新撫司知縣恩樂縣學教諭典史鹽大使案板井景東直隸廳同知舊為景東土府掌印同知乾隆三十五年改直隸廳廳學教授訓導經厯巡檢猛統司蒙化直隸廳同知舊為蒙化土府掌印同知乾隆三十五年改直隸廳廳學教授訓導經厯巡檢三員南澗司瀾滄江漾濞江永北直隸廳同知舊為永北府乾隆三十五年改直隸廳廳學教授訓導經厯知事駐金江渡口騰越直