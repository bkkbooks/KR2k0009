天生橋在衛南九十里祠廟龍王廟在州北五里得勝墩本朝乾隆二十二年大兵討準噶爾師出其地甘泉湧出數十處士馬得濟奉敕建廟封助順昭靈龍神欽賜神功顯濟扁額春秋致祭寺觀永安寺在州東橋灣堡西里許本朝雍正十年建雷音寺在敦煌縣南三十里即千佛洞唐建巖石間舊有佛像萬計名宦三國魏倉慈淮南人太和中遷敦煌大守郡在西陲曠無太守二十嵗大姓雄張遂以為俗慈到抑挫權右撫恤貧嬴甚得其埋先是屬城獄訟衆猥縣不能決多集冶下慈躬往省閲科簡輕重自非殊死但鞭杖遣之一嵗決刑曾不滿十人又常日西域雜胡欲來貢獻諸豪族多逆斷絶既與貿遷欺詐侮易多不得分明胡常怨望慈皆勞之以府見物與共交市使吏民護送道路由是民夷翕然稱其德惠皇甫隆安定人嘉平中為敦煌太守初敦煌不甚曉田常蓄水使極濡洽然後乃耕又不曉作樓犂用水及種人牛功費既費而收榖更少隆到教作樓犂又教行溉歲終率計其所省庸力過半得榖加五晉吾彥吳郡吳人為敦煌太守威恩甚著南北朝魏韋瑱杜陵人恭帝三年除瓜州刺史州通西域蕃夷住來前後刺史多受賂遺夷寇犯邊又莫能禦瑱雅性清儉兼有武略蕃夷贈遺一無所受胡人畏威不敢為寇公私安靜夷夏懷之唐張守圭河北人開元中為瓜州刺史墨離軍使時王君􅎢死河西震懼守圭督餘衆完故城版築方立虜奄至衆失色守圭置酒城上會諸將作樂虜疑有備引去於是修復位署招流冗使復業詔以瓜州為都督府守圭為都督州地沙瘠不可藝常瀦雪水溉田是時渠堨毁材木無所出守圭密禱於神一夕水暴至大木數千章塞流下因取之修復堰坊耕者如舊州人神之刻石紀事郭虔瓘厯城人開元初屢遷右驍衛將軍兼北庭都護宇厥默啜圍逼北庭虔瓘固守斬􅊳厥同俄特勒降其都於城下默啜壻火拔頡利將其妻來歸降以功拜冠軍大將軍尋改安西都護賈師順支州人為長樂令吐蕃悉諾邏陷瓜州并兵攻城遣人夜見師順曰州已失守孤城詎可久不早降以全噍類乎師順曰我受天子命守此義不可下數日又求贈于師順師順請脫士卒衣襦悉諾邏知無有乃撤營去師順開門收器械復完守備吐蕃果還襲見有備乃去裴行儉聞喜人儀鳳二年十姓可汗阿史那匐延都支及李遮匐扇動蕃落浸逼安西連和吐蕃議者欲討之行儉曰吐蕃叛渙干戈未息安可更為西方生事今波斯王死望差使往波斯册立路經二蕃必可便宜行事帝從之命其往册波斯王路出西州人吏部迎行儉召其豪傑子弟千餘人隨己而西又蕃酋子弟投募萬人行儉假為田獵都支與遮匐卒聞軍至計無所出遂擒之高宗廷勞之曰比以西服未安遣卿總兵討逐孤軍深入經途萬里深副朕委封常清猗氏人天寶十一載以常清為安西副大都護持節充安西四鎮節度經略支度營田副大使俄而北庭都護程千里入為金吾令常清權知北庭都護持節充伊西節度等使常清性勤儉私馬不過一兩匹賞罰嚴明張義潮張掖人沙州首領大中五年奉瓜沙伊肅甘等十一州地圖以獻始義潮陰結豪英歸唐一日衆擐甲譟州門漢人皆助之虜守者驚走遂攝州事繕甲兵耕且戰悉復餘州以部校十輩操梃內表其中走天德城以聞帝嘉其忠擢義潮沙州防禦使俄號歸義軍遂為節度李觀洛陽人興元元年拜四鎮北庭行軍涇原節度在鎮四年勵卒儲糧訓整安輯渾瑊與吐蕃戰平涼觀伺知吐蕃狡謀擇精兵五千要伏險道賴觀與李元諒之師以免馬璘扶風人永泰初遷四鎮行營北庭節度使璘詞氣慷慨以破虜為己任前後破吐蕃三萬餘衆中興之猛將也解琬元城人聖厯初充使安撫烏贊勒及十姓部落咸得其便宜蕃人大悅以功擢御史中丞兼北庭大都護持節西城安撫使在軍二十餘年務農習戰邊境安之卒年八十餘人物後漢張奐敦煌淵泉人舉賢良對䇿第一擢拜議郎厯遷度遼將軍護胸奴中郎將永康初論功當封奐不事宦官賞遂不行建寧初中常侍曹節等矯制使奐圍竇武奐深病為節等所賣固讓封侯因災異上疏請改葬竇武陳蕃徙還家屬天子深納奐言而不得自從轉奐太常曹節等􅔂之陷以黨罪禁錮歸田里奐少立志節為將有勳名及歸杜門不出著尚書記難三十餘萬言所著銘頌書教二十四篇長子芝次子昶並善草書蓋勳敦煌廣至人初舉孝廉為漢陽長史厯官討虜校尉靈帝問天下何苦而反亂如此勳曰幸臣子弟擾之時宦者蹇碩在坐以此恨􅈴董卓亂政自公卿以下莫不皂下於卓惟勳長揖爭禮然內厭於卓不得意疽發背卒侯瑾敦煌人少孤貧性篤學恆傭作為資暮還輒㸐柴讀書以禮自牧獨處一房如對嚴賓徵辟不到作矯世論以譏切當時覃思著述以莫知於世作應賓難以自寄又按漢記撰中興以後行事為皇德傳三十篇西河人敬其才而不敢名皆稱為侯若三國魏張恭敦煌人先是河右擾亂隔絶不通敦煌太守馬艾卒官府又無丞恭時為郡㓛曹郡人以恭素有學行推行長史事恩信甚著乃遣子就東詣太祖請太守至酒泉為賊黃華所拘劫以白刃就終不回私與恭疏曰大人率厲敦煌忠義顯然今大兵垂至但當促兵以犄之願不以下流之愛使就有恨於黃壤也恭即遣從弟華攻酒泉别遣鐡騎緣北塞迎太守尹奉華恐遂降就竟平安奉得之官黃初二年賜恭爵關內侯拜戊已校尉數歲微還以子就代之就後為金城太守父子著稱於西州周生烈敦煌徵士姓周生名烈何晏論語集解有烈義例餘所著述見晉武帝中經簿晉段灼敦煌人果直有才辨為鄧艾鎮西司馬從艾破蜀有功封關內侯遷議郎武帝即位上疏追理艾帝甚嘉其意後復陳時宜數千言帝覽而異焉擢為明威將軍魏興太守索靖敦煌人少有逸羣之量與鄉人泛衷張甝索紒索永稱敦煌五龍四人並早亡惟靖該博經史兼通內緯武帝擢為尚書郎與尚書令衛瓘俱以善草書知名泰安末拜逰擊將軍與賊戰被傷而卒著五行三統正驗論辨理陰陽氣運又撰索子晉詩二十卷并草書狀索琳靖少子靖每曰琳廟廊之才非簡札之用州郡吏不足汚吾兒也懷帝時為馮翊太守與雍州刺史賈匹等共立愍帝纍拜尚書左僕射後為劉聰所殺汜騰敦煌人舉孝廉除郎中屬天下兵亂去官還家散家財五十萬以施宗族柴門灌園琴書自適張軌徵之為府司馬騰曰門一杜其可開乎固辭病卒索襲敦煌人虛靖好學遊思於陰陽之術著天文地理十餘篇不與當世交通張茂時敦煌太守陰淡請為三老會病卒淡素服會葬諡元居先生索紞敦煌人博綜經籍明陰陽天文善術數占候鄉人從紞占問吉凶門中如市紞曰攻乎異端戒在害已遂詭言無驗乃止帷以占夢為無悔吝乃不逆問者凡所言莫不驗宋纖敦煌效穀人少有遠操隱居酒泉南山明究經緯弟子受業三千餘人注論語及為詩頌數萬言年八十篤學不倦張祚徴至姑臧遣其子太和以執友禮造之纖稱疾不見遷太子大傅遂不食而卒諡元虛先生南北朝魏宋繇敦煌人少以孝聞隨張彥至酒泉追師就學晝夜不倦博通經史事涼武昭王厯位通顯家無餘財雖兵革間講誦不廢後入魏拜河西王右丞相錫爵清水公曾孫遊道受知齊神武文襄以為尚書左丞性剛直疾惡如讎張湛敦煌人弱冠知名涼土好學能屬文素有大志仕沮渠蒙遜為兵部尚書涼州平拜寧逺將軍司徒崔浩識而禮之浩注易敘曰敦煌張湛金城宗欽武威段承根三人皆儒者並有俊才每與余論易以左氏傳卦解之遂相勸為解注故為之解其見稱如此湛至京師家貧不立操尚無虧浩薦為中書侍郎湛知浩必敗固辭每贈浩詩頌多針規之言兄銑間粹有才幹性至孝母憂哀毁過人服制雖除而疏糲弗改卒於征西參軍闞駰敦煌人博通經傳聰敏過人三史羣言經目則誦時人謂之宿讀注王朗易傳撰十三州志沮渠蒙遜甚重之令典校經籍刋定三千餘卷後入魏為樂安王從事中郎劉昞敦煌人隱居酒泉不應州郡命弟子受業者五百餘人涼武昭王徴為儒林祭酒遷撫夷護軍雖有政務手不釋卷以三史文繁著略記百三十篇八十四卷敦煌實録二十卷沮渠牧犍尊為國師命官屬以下皆北面受業太武時拜樂平王從事中郎索敞敦煌人為劉延明助教專心經籍盡能傳延明業入魏為中書博士京師貴遊之子皆受業於敞敞以喪服散在衆篇遂撰比為喪服要記出補始平太守卒於官周令狐整敦煌人世為西土冠冕整幼聰敏沈深有識量孝武西遷鄧彥竊據瓜州整執彥送京師周文嘉其忠節表為都督尋而城人張保殺刺史搆逆整集豪傑襲保保遂奔吐谷軍詔授夀昌郡守整以國難未靖欲舉宗效力遂卒鄉親二千餘人入朝隨軍征討纍進位大將軍厯居內外所在見稱隋令狐熙整子性嚴重不妄通賓客博覽羣書尤明三禮周時以通經為吏部上士纍轉夏官府都上士俱有能名高祖受禪纍遷鴻臚卿兼吏部尚書判五曹尚書號為明幹厯汴州刺史桂州總管皆有政績少子德棻最知名唐王君􅎢瓜州常樂人開元中為河西隴右節度使以擊破吐蕃功遷大將軍封晉昌縣伯後吐蕃陷瓜州回紇等四部叛君􅎢力戰死帝痛惜之五代唐李琪河西敦煌人兄珽仕梁至右散騎常侍侍講琪少舉進士博學宏辭與珽皆以文章知名事梁為翰林學士梁兵征伐四方書詔皆琪所為下筆輒得太祖意末帝時為相梁亡仕唐至右僕射為人重然諾喜稱人善亦以文章自負列女本朝張皓妻耿氏安西人夫殁守節事姑孝謹教二子成立乾隆七年旌吕登魁妻李氏安西人夫官安西提標把總殁於陳氏矢志守節撫孤成立乾隆五十七年旌李秉端妻周氏敦煌人夫亡守節撫孤成立嘉慶二十五年旌崔秀妻劉氏玉門人夫充靖逆營馬兵乾隆二十年從征巴里坤戰殁氏誓以死守遇強暴守正不屈𬒳殺乾隆二十六年旌土産瓜漢書地理志敦煌古瓜州地生美瓜顔師古曰其地今猶出大瓜長者狐入瓜中食之首尾不出野馬皮元和志沙州貢唐書地理志瓜州貢礬唐書地理志瓜州貢黃礬絳礬沙州貢黃礬石膏元和志沙州貢胡桐律唐書地理志瓜州貢前協修官臣溫豫巽恭纂輯前提調官臣張日章恭覆輯校對官臣吳嘉淦恭校校對官臣賀式韓恭覆校大清一統志迪化直隸州在甘肅省治西北五千七百二十里距鎮西府治一千三百八十里東至木壘烏蘭烏蘇接鎮西府奇臺縣界西至安濟哈雅接庫爾喀喇烏蘇界南踰天山接闢展屬界北至額彬格遜淖爾接塔爾巴哈台界自州治至京師八千八百九十里分野天文東井輿鬼鶉首之次建置沿革漢為蒲類前國後漢為蒲類國三國為蒲陸國北魏初為高車地後入於蠕蠕周為突厥地隋為西突厥鐵勒屬焉唐初為蒲類縣隸西州後隸北庭大都護府寶應元年更名後庭縣宋為高昌國北庭地元屬回鶻為五城地明屬衛拉特舊名瓦刺今改正本朝初為準噶爾庫木諾雅特遊牧處噶勒丹多爾濟之昂吉乾隆二十年官兵進討準噶爾噶勒丹多爾濟率其屬迎降地皆內屬有舊城周三里賜名迪化别於舊城北建迪化新城二十五年設迪化同知三十八年改設直隸迪化州於城西三十里建鞏寧城為知州治三十九年設昌吉縣四十一年設阜康縣四十四年改綏來縣隸焉領縣三昌吉縣在州西一百二十里東至頭屯河接本州界西至呼圖克拜河接綏來縣界南至天山接闢展屬界北至葦湖接塔爾巴哈台界漢蒲類後國後漢移支國三國為蒲陸國晉屬高車魏入於蠕蠕周為突厥地隋為西突厥鐵勒地唐屬後庭縣元為回鶻五城地明屬衛拉特本朝乾隆二十七年昌吉河建寧邊城始於其地設管糧通判三十八年改