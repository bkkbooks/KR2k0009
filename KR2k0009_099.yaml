  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_099-1a}
body:
  text: 肅州直隸州在甘肅省治西北一千四百七十里東西距四百里南北距一百五十里東至甘州府張掖縣界三百一十里西至安西州玉門縣界九十里南至金佛寺南山一百二十里北至邊牆三十里東南至張掖縣界一百八十里西南至雪山一百八十里東北至張掖縣界二百八十里西北至本州野麻灣堡邊牆七十里本州境東西距一百九十里南北距一百五十里東至高臺縣界一百里西至玉門縣界九十里南至邊界一百二十里北至邊牆三十里東南至高臺縣界一百四十里西南至雪山一百八十里東北至本州金塔寺邊牆一百里西北至邊牆六十里自州治至京師五千五百十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢雍州之域古西戎地戰國時月氏戎居之漢初為胸奴昆邪王分地武帝元狩二年見本紀地理志作太初元年不同開置酒泉郡治祿福縣後漢晉志皆作福祿後漢晉因之義熙初李皓都此稱西涼後屬北涼後魏太武平涼以酒泉為軍屬敦煌郡孝昌中復置酒泉郡隋開皇初郡廢仁夀二年分置肅州大業初州廢以福祿縣屬張掖郡義寧元年改縣曰酒泉唐武德二年復置肅州八年置都督府貞觀元年府罷天寶初復曰酒泉郡乾元初復曰肅州屬河西道大厯元年陷於吐蕃宋景祐初屬西夏元至元七年置肅州路總管府屬甘肅行省明洪武二十七年改置肅州衛屬陜西行都司本朝雍正二年裁衛併甘州府七年改置肅州直隸甘肅省領縣一高臺縣在州南二百七十里東西距二百里南北距一百一十五里東至甘州府張掖縣界四十里西至本州界一百六十里南至邊界一百二十里北至邊牆五里東南至張掖縣界一百四十里西南至本州界一百八十里東北至張掖縣界四十里西北至本州界一百七十里漢置表是縣屬酒泉郡後漢曰表氏晉因之前涼張氏分置建康郡後魏因之後周廢入張掖縣唐證聖元年置建康軍天寶後廢宋屬西夏元屬甘州路明初屬甘州衛景泰七年始分置高臺所屬陜西行都司本朝雍正二年改置高臺縣以鎮夷所併入屬甘州府七年改屬肅州形勢河山襟帶為羌戎通驛之路元志南有雪山嵯峩萬仞北有紫塞延袤千里羌番入貢之要路河西保障之咽喉通志風俗織毛褐勤耕牧務本業尚釋教舊志城池肅州城周八里有奇東南北三門環以濠廣八丈三尺明洪武二十八年因舊改築成化二年增築東關廂城東西二里南北一里有奇亦環以濠本朝乾隆三十一年修高臺縣城周四里門三濠廣一丈五尺本朝乾隆二十九年重修學校肅州學在州治東南即舊衛學明成化三年建入學額數十二名高臺縣學在縣治東北即舊所學明嘉靖二十三年建入學額數十五名酒泉書院在州城東南隅明嘉靖二十六年建本嘉靖二十三年所建新興學舍舊址高臺縣書院在縣城東門外本朝乾隆三十七年建户口原額民丁共六千九百八今滋生民丁男婦大小共三十一萬九千七百六十八名口屯丁男婦大小共十三萬二千二百九十五名口統計二萬二千五百三十七户田賦田地共三千七百五十三頃八畝二分有奇額徵銀共一百十二兩九錢一分六釐糧共二萬五百七十二石一斗七升山川觀音山在州東南一百八十里與雪山相連又有紅山在州東南一百六十里寒水石山硫黃山在州南一百五十里西陲今略山北麓在金佛寺西南二十里雖與祁連相連相去甚遠也自觀音而西為紅山寒水石山硫黃山皆相連通典酒泉縣有九龍山寰宇記九隴山在縣南一百里周地圖記云昔有神人坐張掖西方山上西射酒泉郡西金山之百神射得九籌畫此山上遂成九隴因名或曰即今清水堡之九九山也祁連山在州南隋書地理志福祿縣有祁連山行都司志在肅州衛南一百六十里亙涼肅之界西陲今略山在衛永安堡一百二十里相連者有火山又十六國春秋酒泉南有銅駝山人言犯之者輒大雨雪沮渠蒙遜永安九年遣工取之得銅萬斤今無考文殊山在州西南三十里兩峯南北對峙水泉中流昔人多鑿洞穿穴繪塑佛像又名羅漢洞西陲今略又有濫泥山一名淖泥山在西南百餘里文殊山南其山多水泉地濘泥故名崑崙山在州西南竹書紀年穆王十七年西征崑崙邱見西王母漢書地理志金城臨羌縣西北塞外有西王母石室崑崙山祠十六國春秋張駿時酒泉太守馬岌上言酒泉南山即崑崙之體也周穆王見西王母樂而忘歸即謂此山上有石室玉堂珠璣鏤飾煥若神宮禹貢崑崙在臨羌之西即此明矣宜立西王母祠以裨朝廷無疆之福駿從之隋書地理志福祿縣有崑崙山括地志山在酒泉縣西南八十里明統志山在肅州西南二百五十里東與甘州山連其巔峻極經夏積雪不消世呼雪山西陲今略山在卯來泉堡西南一百八十里俗呼雪達巴東北又有小雪逹巴即祁連山祁連至此漸卑故加小云按明統志今略所云與括地志道里不合今略又云嘉峪關西二十里地名大草灘灘南有山名崑崙蓋此乃古之崑崙而明統志所云乃祁連之西麓耳達巴舊作打板今改牌樓山在州西南百里卯來泉堡南形如牌樓洞庭山在州西元和郡縣志在酒泉縣西七十里四面懸絶人不能上遙望𦦨𦦨如鑄銅色山中出金寰宇記酒泉縣有鴻鷺山穆天子傳云天子循黑水至於璧玉之山謂此今為鴻鷺所棲故名明統志有嘉峪山在州西一名玉石山舊志嘉峪山在衛西七十里即璧玉山西麓即嘉峪關也黑山在州北一百八十里屹立沙漠中一名紫塞其山口在西北一百四十里又有黑山在鎮夷所東北二十里大乾糧山在州東北下古城堡東北六十里一名沙山其側有小口子又有金山在州東北八十里元和志玉門縣東六十里有金山出金以里數計之應即是此孤紅山在州東北金塔寺東北三百五十里凡往來哈密北山者必聚於此又狼心山在堡北六百里南去鎮夷所五百里為邊人往來之路榆木山在高臺縣南四十里上産榆樹故名東起梨園西盡暖泉延長百餘里白城山在高臺縣西南八十里石磴曲折有林泉之媵崆洞山在高臺縣西鎮夷所城南隋書地理志福祿縣有崆洞山元和志山在福祿縣東南六十里黃帝西見廣成子於崆洞漢武帝行幸雍祀五畤登崆洞並謂此山也按隋志元和志雖皆言在福祿縣然隋之福祿即今肅州唐之福祿乃改漢樂涫所置在肅州東百里非一地也其山又在東南則應在今高臺縣舊鎮夷所南界又按隋時樂涫之地廢入福祿則謂二志所言即一山亦可明綆志於鎮夷所不載而於肅州衛則仍云山在東南六十里是引元和志之言混在隋縣之中誤矣鵝頭山在高臺縣西鎮夷城西北五十里以形似名石硤山在高臺縣西北鎮夷城西北七里亦曰石峽口張掖河所經也其水自此北流兩崖石峽壁立若門合黎山在高臺縣北東接張掖水經注山在酒泉會水縣東北史記正義山在張掖縣西北二百里行都司志在高臺所北十里鎮夷所東北三十里與黑山相接西陲今略山起山丹石硤至於鎮夷延長三百餘里其山産茶紅崖在高臺縣鎮夷城西十五里其色赤形如屏障討來河在州南下流合張掖河即古呼蠶水也漢書地理志福祿縣呼蠶水出南羌中東北至會水入羌谷寰宇記呼蠶水一名潛水俗謂之福祿河西南自吐谷渾界流入行都司志在肅州衛北一百里源出祁連山下合清木河同沙河徑古會水縣入張掖河州志河水與城東水磨渠同派至威虜城又名廣福渠又東至岔口與鎮夷黑河合流一名天倉河在衛東北三百里西陲今略討來川在金佛寺南一百十里西北繞南山之後其勢甚急至卯來泉堡西南分流北流謂之討來河又折而東北徑渭城西北合清水紅水白水沙河又東徑下古城南折而北流出邊為天倉河又東徑金塔寺北三十里至岔口合張掖河按輿圖今討來河發源州西南五百餘里畨界中有三派最西曰討來河其西又有輝圖巴爾呼河北流百餘里與討來河合又東北百餘里南有巴哈額齊訥二河分流二百里許合流又北數十里與討來河會為一又東北二百餘里入邊繞州南至州東北合西來之水又東北出邊過金塔寺稍折而北又轉東與張掖河合又北五百餘里入居延海其發源甚遠與漢志出南羌中寰宇記出吐谷渾界流入之説相合都司志謂在州北百里今略又以為西流皆誤輝圖巴爾呼舊作哈土巴爾呼巴哈額齊訥舊作巴哈額濟餒今並改張掖河自甘州府張掖縣流入經高臺縣北又西北經故鎮夷所城南出邊即弱水之下流也禹貢弱水餘波入於流沙史記正義合黎水徑張掖縣又西徑合黎山折而北流徑流沙磧之西入居延海司馬貞索隱弱水西北至會水入合黎山腹行都司志黑河在高臺所北二百步又在鎮夷城西四里徑城西北出口即張掖河也西陲今略黑河自高臺所南發源東北流徑甘州復折而西北流入所北環所三面又西流徑深溝堡北折而北流出石硤與討來河合謂之天倉河又東北入居延海白亭海在州東北元和志在酒泉縣東北一百四十里一名會水以衆水所會故曰會水以北有白亭故曰白亭方俗之間河北得水便名為河塞外有水便名為海按漢志呼𧖟水至會水入羌谷今討來張掖二河會流之處在州東北三百餘里此白亭海當指討來河瀦水之處非漢志之會水也紅水在州東南三十里源出南山北流合白水至下古城東南入討來河水有紅色故名又白水源出州西南二十里下合紅水又有沙河在州東四十里源出雪山北流入討來河清水在州北五十里源出州西北清水泉東流入討來河又有黑水在州西北一百二十里源出黑水泉會清水流放驛湖在州東南一里周六里餘亦名站家湖鏵尖湖在州東南二十里有二湖皆放牧之所鄭家湖在州北七里鄭家堡前又倉兒湖在州北二十五里俗謂之大湖場又花城兒湖在縣北八十里地屬新城堡五壩湖在高臺縣東十二里又大蘆灣湖在縣東北二十里黑家站家湖在縣東四十里鴛鴦湖在高臺縣西十里又七壩湖在縣西十五里月牙湖高臺站家湖皆在縣西北五里水磨湖海底湖皆在縣西北十里葦蕩湖在縣西北十五里狼窩湖李家湖皆在縣西北二十里官軍湖在高臺縣鎮夷所城東南三里又局匠湖在城東南十里舊為牧放之地夜不收湖在城東北五十里胭脂堡旁大湖在高臺縣鎮夷所城西一里又烏嚕訥湖在城北邊外五百里烏嚕訥舊作兀魯乃今改黃草壩渠在州西南十五里自西南至東北長六十餘里又沙子壩在黃草南去州西南三十餘里長七十里兔兒壩在州西南文殊山口長二十餘里俱引討來河水溉田按肅州引討來河為渠十四共溉田五百餘頃又紅水壩在州南二十五里長一里其北有花兒壩長十五里洞子壩長十里俱引紅水又王子莊大河引討來河紅水壩河臨水河各處尾水分渠十一溉田六百二十三頃乾隆三十二年增渠十三五十年又增渠一按紅水共引渠十二溉田四百餘頃又豐樂川壩在州東南其下又分為河東河西等十壩共支渠十四溉田二百二十餘頃皆引豐樂川水溉清水金佛寺河清等堡田又暖泉壩在州東三十里乃亂石堆北湖中有滚鍋泉水流成渠溉小泉兒暖泉堡田又鉢和寺壩在州西北四十里溉新城堡田納淩渠在高臺縣東南二十里分渠十溉田一百九十頃又有站家豐稔永興黑泉等五渠俱在縣東南五壩至十壩五渠在縣之東北西北紅崖橙槽河東河西上中下三壩暖泉古城毛家等十渠俱在縣西南皆分引黑河及山泉水共溉田八百餘頃按本朝乾隆十八年甘州府設撫夷廳以肅州之八壩九壩二渠及橙槽渠下壩渠暖泉渠俱因就近歸撫