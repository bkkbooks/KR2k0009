南籍端水出南羌中西北入其澤元和志晉昌縣冥水自吐谷渾界流入大澤東西二百六十里南北六十里豐水草宜畜牧按輿圖及新志今有蘇賴河亦名布隆吉爾河發源靖逆衛南山曰昌馬河北流轉而西經舊柳溝衛北會十道溝水為蘇賴河又西經州北三十里又西經敦煌縣西北黨河自南來注之又西流三十里許入哈喇淖爾其流長七百餘里池方數十里即古南籍端水也今州縣屯田俱藉此水灌溉本朝乾隆四年於蘑茹灘閛濬渠道引昌馬河水以益之分渠為七懸泉水在敦煌縣東元和志在沙州東一百三十里出懸泉山漢將李廣利伐大宛還士衆渴乏引佩刀刺山泉飛湧出即此也水有靈車馬大至即多出少至即出少敦煌耆舊記水有懸泉之神寰宇記一名神泉出龍勒山腹氐置水在敦煌縣西漢書地理志龍勒縣有氐置水出南羌中東北入澤溉民田舊志在沙州衛西按與圖今有黨河亦名錫爾噶勒津河發源敦煌縣東南山中北流二百餘里折西流百餘里會南來之一水又折北流繞沙州舊城之東新城之西流百餘里入蘇賴河溉田甚廣當即古氐置水五代高居誨使西域記沙州西渡都鄉河亦即此但漢龍勒即唐夀昌在沙州西一百五里今此水近傍沙州與漢唐志不甚合疑今沙州或唐以後西徙龍勒之境今不可考又元和志夀昌縣有龍勒水在縣南一百八十里龍勒山上即李陵至東浚稽山徘徊觀虜處按李陵所至龍勒水在居延北塞外此非其地錫爾噶勒津舊作西勒哈金今改石脂水在玉門縣赤金所東南劉昭郡國志注博物記曰延夀縣南有山石出泉水大如筥注地為溝其水有肥如煮肉洎凝膏然之極明不可食謂之石漆元和志在玉門縣東南一百八十里泉中有苔如肥肉然之極明水上有黑脂人以草盝取用塗鴟夷酒囊及膏車周武帝宣政中突厥圍酒泉取此脂然大焚其攻具得水愈明酒泉賴以獲濟明統志石油出肅州南山通志今赤金所東南一百五十里有石油泉土人取以然燈即石脂水也布魯湖在州東北即蘇賴昌馬兩河下流經行停瀦之處澄波千頃葭葦彌望浴鳧飛鷺宛然澤國由是西行踰柳溝城為古南籍端水舊志在柳溝衛東北一百二十里三道溝在州東二百五十里自此而西至柳溝衛東二里又有四道五道六道七道八道九道十道共七溝皆草地出泉北入蘇賴河惟四道溝泉流獨盛即所云昌馬河乃蘇賴河之源也其頭二道溝在玉門縣靖逆衛界按漢置淵泉縣闞駰曰地多泉水蓋即指此屯田渠在州東自州東北至州西長九十里又回民渠自東至西南長六十里餘丁渠東西長三十五里皆引蘇賴河水以溉田通裕渠在敦煌縣分黨河水溉田長二十里又普利渠長二十三里永豐渠長三十二里慶裕渠長十七里大有渠長四十二里又窑溝渠伏羌新渠伏羌舊渠莊浪渠皆分黨河水以溉田雌黃洲在敦煌縣境寰宇記其土出雌黃丹砂因産物以為名鹽池在敦煌縣東元和志在沙州敦煌縣東四十七里池中鹽常自生百姓仰給焉又黨河西四十里有西鹽池四面皆沙山藥泉在敦煌縣東南石堡城味略如酒相傳飲之愈疾水有二源北流合一又北流為水峽未至踏實而沒又東南一百四十里有大泉南三百五十里有塔兒泉月牙泉在敦煌縣南十里鳴沙山麓南鄰黨河淵渟澄徹映月無塵環以流沙雖遇烈風而泉不為沙掩舊傳水産鐵背魚七星草服之可長生舊志在沙州衛南十里古迹晉昌故城在州東漢置冥安縣屬敦煌郡晉咸康五年分置晉昌郡十六國春秋苻堅建元二十一年呂光自西域還晉昌太守李純以郡迎降段業神璽二年晉昌太守王德以郡降李皓庚子元年晉昌太守唐瑶移檄六郡推皓為沙州刺史沮渠蒙遜元始十年晉昌太守唐契叛周書魏大統十二年瓜州民張保叛晉昌人吕興等害郡守郭肆以郡應保隋書地理志敦煌郡統常樂縣後魏置常樂郡後周併涼興大至冥安淵泉合為涼興縣開皇初郡廢縣改為常樂元和志瓜州晉惠帝置晉昌郡周武帝改為永興郡開皇三年罷郡縣屬瓜州唐武德五年别於晉昌置瓜州大厯十一年陷於西蕃州境東西三百九十三里南北六百八十四里東南至肅州四百八十里西至沙州三百里晉昌縣郭下本漢冥安縣因縣界冥水為名開皇四年改為常樂縣武德七年又改為晉昌縣唐書大中五年張義潮以瓜州來歸宋史夏國傳景祐二年元昊取瓜州元史地理志瓜州宋初陷西夏夏亡州廢至元十四年復立隸沙州路二十八年徙居民於肅州但名存而已明統志瓜州城在肅州西五百二十六里淵泉故城在州東舊柳溝衛東漢置屬敦煌郡闞駰曰地多泉水故以為名後漢書注在今晉昌縣東北晉咸康初分屬晉昌郡後周併入涼興縣廣至故城在州西漢置屬敦煌郡地理志宜禾都尉治崑崙障後漢因之晉元康五年分置宜禾縣皆屬晉昌郡十六國春秋段業天璽中分敦煌之涼興烏澤晉昌之宜禾三縣為涼興郡進李皓都督涼興以西諸軍事隋書地理志後周併涼興大至冥安淵泉為涼興縣開皇初改為常樂所云大至即廣至也唐改隋常樂為晉昌而别置常樂縣於此屬瓜州章懷太子曰廣至故城在常樂縣東今謂之縣泉堡元和志常樂縣東至州一百十五里本漢廣至縣地魏分廣至置宜禾縣後魏明帝改置常樂郡隋於此置常樂鎮武德五年置常樂縣寰宇記在常樂縣西北恆以大石棧之稍開即有風暴至傷人又有宜禾故城漢宜禾都尉所居在晉昌縣西北界魏正光元年僑立會稽郡於此舊志有涼興城在廢瓜州西一百七十里瓜州故城今敦煌縣治古瓜州亦月氏戎地左傳襄公十四年范宣子將執戎子駒支親數諸朝曰昔秦人迫逐乃祖吾離於瓜州又昭公九年詹桓伯曰允姓之姦居於瓜州漢書西域傳大月氏本居敦煌祁連間至冒頓攻破月氏而老上單于殺月氏以其頭為飲器月氏乃遠去武帝紀元狩二年胸奴昆邪王來降以其地為武威酒泉郡元鼎六年分酒泉置敦煌郡地理志敦煌郡武帝後元年分酒泉置治敦煌縣中部都尉治步廣候官杜林以為故瓜州地生美瓜應劭曰敦大煌盛也十六國春秋咸康元年張駿分敦煌晉昌高昌三郡及西域都護戊已校尉玉門大護軍三營為沙州以楊宣為刺史永和十年張祚改敦煌郡為商州隆和元年復故苻堅建元二十一年呂光自西域還至玉門敦煌太守姚靜以郡迎降段業神璽二年敦煌太守孟敏以郡降以為沙州刺史敏卒衆推效穀令李皓為敦煌太守庚子元年皓自稱沙州刺史涼州牧建初元年遷都酒泉李歆嘉興四年沮渠蒙遜入酒泉以索元緒為敦煌太守魏書太平真君三年沮渠無諱走渡流沙李皓孫寶據敦煌遣使內附元和志沙州漢敦煌郡前涼張駿於此置沙州因鳴沙山為名後魏太武於郡置敦煌鎮明帝罷鎮立瓜州取故地為名尋又改為義州莊帝又改為瓜州大業三年又罷州為敦煌郡隋末陷賊武德二年復置瓜州五年改為沙州建中二年陷於西蕃東至瓜州三百里北至伊州七百里敦煌縣郭下本漢舊縣周武帝改為鳴沙縣大業二年復為敦煌唐書吐蕃傳憲宗時沙州刺史周鼎為唐固守贊普徙帳南山使尚綺心攻之鼎請救回鶻踰年不至議焚城郭東奔兵馬使閻朝殺鼎自領州事城守者八年又二嵗糧械皆竭於是出降大中五年沙州首領張義潮奉瓜沙伊肅甘等十一州地圖以獻詔號歸義軍節度使八年義潮入朝十三年以長史曹義金領州務後中原多故諸城多沒五代史唐莊宗時沙州留後曹義金遣使附回鶻以來拜為歸義軍節度使晉天福七年沙州曹元忠遣使來周世宗時又以元忠為歸義軍節度使宋史太平興國五年曹元忠卒子延祿來貢咸平五年為從子宗夀所害大中祥符末授宗夀子賢順本軍節度元史地理志沙州宋景祐初陷西夏元太祖二十二年破其城以隸八都大王至元十四年復立州十七年升為路去肅州千五百里舊志明洪武二十四年沙州首領阿魯哈錫哩遣使朝貢永樂三年置沙州衛以授其首領坤濟勒宣德七年上言諸夷侵掠願徙居察罕城不許正統十一年其首領訥格以困於衛喇特率部屬來歸徙置內地衛遂廢古瓜州在新瓜州西十五里東距淵泉縣城四十五里有土城明史西域傳自赤斤蒙古西行二百里曰苦峪自苦峪南折而西百九十里曰瓜州阿魯哈錫哩舊作阿魯哥失里坤濟勒舊作困即來訥格舊作喃哥衛喇特舊作瓦刺今並改龍勒故城在敦煌縣西漢置屬敦煌郡後漢及晉因之後魏置夀昌郡後周時郡縣俱併入鳴沙唐改置夀昌縣屬沙州後廢元和志夀昌縣東至州一百五里本漢龍勒縣因山為名周武帝省入鳴沙縣大業十一年於城內置龍勒府武德二年改置夀昌縣因縣南夀昌澤為名唐書地理志夀昌縣永徽元年省乾封二年復置開元二十六年又省後復置治漢龍勒城按舊唐志寰宇記皆云後魏改夀昌縣參考隋志蓋後魏於縣置夀昌郡非改縣名也涼寧舊郡在玉門縣界晉置十六國春秋永和九年張祚廢張靈曜為涼寧侯沮渠蒙遜永安九年所部酒泉涼寧二郡叛降西涼魏書地形志涼寧郡領園池貢澤二縣周隋時省新鄉廢縣在州東南晉元康五年分置屬晉昌郡後周廢通典瓜州南至新鄉鎮一百八十里伊吾廢縣在州北晉置初屬敦煌郡元康五年分屬晉昌郡後魏廢通典在晉昌縣北效穀廢縣在敦煌縣西漢置屬敦煌郡漢書注縣本魚澤障桑欽説孝武元封六年濟南崔不意為魚澤尉教民力田以勤效得穀因立為縣名十六國春秋段業時沙州刺史孟敏署李皓為效穀令隋書地理志後周併效穀郡入敦煌郡又併效穀縣為鳴沙縣玉門廢縣在今玉門縣東漢置屬酒泉郡闞駰曰漢罷玉門關屯戍徙其人於此晉書地理志元康五年别立會稽縣屬晉昌郡十六國春秋李皓庚子元年東伐涼興并擊玉門諸城皆下之建初元年分酒泉南人五千户置會稽郡周書魏大統十二年瓜州張保據州叛遣令狐整救涼州整至玉門郡召集豪傑説保罪逆馳還擊之先定晉昌進軍擊保保奔吐谷渾隋書地理志敦煌郡統玉門縣後魏置會稽郡周廢郡併會稽新鄉延興為會稽縣開皇中改為玉門併得魏玉門郡地元和志玉門縣東至肅州二百二十里本漢舊縣後魏孝明帝改為玉門郡周武帝省入會稽縣開皇十年復改為玉門縣唐書地理志肅州酒泉郡玉門縣貞觀元年省後復置開元中為吐蕃所陷因於縣城置玉門軍天寶十四年哥舒翰奏廢軍重置縣五代晉高居誨使于闐記自肅州渡金河西百里出天門關又西百里出玉門關即故縣也寰宇記十三州志云玉門縣長三百里石門周匝山間裁經二十里衆泉北入延興海通志今赤金所去肅州二百三十里與古玉門縣道里相仿蓋即玉門縣地也延夀廢縣在玉門縣東南後漢置屬酒泉郡晉因之後魏廢寰宇記十三州志云縣在郡西按劉昭郡國志注延夀縣有石漆元和志石脂水在玉門縣東南一百八十里延夀縣當在其地沙頭廢縣在玉門縣西南漢置池頭縣屬酒泉郡後漢改曰沙頭三國志魏初河右擾亂隔絶不通敦煌功曹張恭遣從弟華攻酒泉沙頭乾齊二縣别遣騎東緣酒泉北塞徑出張掖北河以迎太守晉書地理志元康五年分沙頭縣屬晉昌郡十六國春秋段業天璽二年酒泉太守王德叛敗奔晉昌沮渠蒙遜追至沙頭破之後魏廢乾齊廢縣在玉門縣西南漢置屬酒泉郡地理志西部都尉治西部障孟康曰乾音干三國魏皇初初張恭攻酒泉乾齊縣即此晉改屬敦煌郡後魏省騂馬廢縣在玉門縣界晉書地理志酒泉郡統騂馬縣十六國春秋呂光大安元年攻克酒泉進次涼興王穆自敦煌東還單騎奔騂馬騂馬令郭文斬之後魏省寰宇記相傳昔有騂馬二匹為胸奴掠去數載自歸以其地為邊防因立騂馬戍也柳溝衛城在州東一百六十里城周六里三分門四漢置淵泉屬敦煌郡後漢因之晉元康五年分屬晉昌郡後周併入涼興縣隋為常樂縣地唐為晉昌縣地宋入西夏元為瓜州地明為赤斤蒙古衛地本朝康熙五十七年置柳溝所於柳溝堡設通判領之雍正三年改屬安西同知五年升衛移治於此其地向在邊外名布隆吉爾舊設遊擊乾隆二十六年改設都司距營二十五里七里泉有牧馬厰又忒布忒河有安西營牧馬厰苦峪城在州東南東去嘉峪關四百二十里去赤金所二百里明史西域傳宣德十年沙州衛都指揮僉事坤濟勒為哈密所侵走赴塞下邊臣請移之苦峪命治苦峪城正統六年城成十三年邊將護哈密使臣至苦峪赤斤都指揮總加勒等率衆圍其城天順七年哈密衰微迤北酋沙佳斯蘭襲破其城王母率親屬部落走苦峪成化二年兵部言王母避苦峪久今賊已退宜令還故土從之八年土魯畨襲破其城執王母十年都督和順退居苦峪命權主國築苦峪城移哈密衛於其地十八年和順襲哈密破之遂還故土行都司志自此至哈密分三道城東有河城中有三墩又西一百二十里至王子莊城小而堅西八十里至布隆吉爾河坤濟勒舊作困即來總加勒舊作總兒加陸沙佳斯蘭舊作癿加思蘭和順舊作罕慎今並改黨城在敦煌縣南一百六十里黨河口建置不知所始城基尚存又黨河口西十里有古城按通志自黨城東南至額爾德尼布拉克六百里有水革西通色爾騰西南通阿嚕大小柴達木鹽也要路額爾德尼布拉克舊作額爾得尼布喇克今改騸馬城在玉門縣東七十里西十里為火燒溝又西為八楞墩明史西域傳回回墓西四十里曰騸馬城古陽關在敦煌縣西南一百三十里漢書地理志龍勒縣有陽關玉門關皆都尉治西域傳孝武擊破胸奴右地始置酒泉武威張掖敦煌四郡據兩關焉晉書地理志敦煌郡統陽關縣元和志陽關在夀昌縣西六里以居玉門關之南故曰陽關本漢置謂之南道西趣鄯善莎車後魏嘗於此置陽關縣周廢晉高居誨使于闐記西渡都鄉河至陽關按漢晉諸書陽關在今敦煌縣境而肅州新志謬引烏嚕木齊西境之陽巴勒噶遜聞見淆訛末由審定伏讀高宗純皇帝聖製陽關考以陽關玉門關均在黨河之西陽關西而偏南故以陽名詳核形勢應在今黨河西南與紅山口相近王維送元二使安西詩西出陽關云云考唐之安西初治西州即今闢展再徙高昌即今吐魯番之交河三徙龜兹即今庫車三遷總在哈密之西是安西實在陽關外而陽關之屬敦煌縣境尤為無疑仰見睿裁論定印證明確實非自古耳食之流所能窺尋萬一由是陽關之名既定而玉門關之在陽關迤北者亦從此可推彼以吐魯畨之玉門當之者其無稽又不待辨矣古玉門關在敦煌縣西一百五十里漢書西域傳西域三十六國東則接漢扼以玉門陽關又武帝欲通大宛諸國遣趙破奴擊虜樓蘭王於是列亭障至玉門後二師軍擊大宛遣軍正任文將兵屯玉門關為後距後漢書永元中班超久在絶域年老思故土上疏曰臣不敢望到酒泉但願生入玉門關十六國春秋苻堅建元二十一年呂光平龜兹東還自高昌至玉門敦煌晉昌二郡迎降元和志玉門故關在龍勒縣西北一百一十八里謂之北道西趨車師前庭及疏勒此西域之門户也唐書地理志夀昌西北有玉門關罕東左衛在敦煌縣城內明永樂中罕東部人阿扎克與衆族不相能率衆逃居沙州境後部落日蕃不受罕東統屬正統間沙州全部內徙遂盡有其地成化十五年從其酋所請置罕東左衛於沙州故城授都指揮使嘉靖七年率部內徙沙州遂為土魯番所有阿扎克舊作奄章今改罕東衛在敦煌縣東南明洪武三十年酋長索諾木喇什遣使入貢置罕東衛授指揮僉事與赤金哈密同主西域貢道嘉靖初土魯番復陷哈密罕東殘破率部來歸分處肅州塞內其地遂墟索諾木喇什舊作鎖南吉刺思今改安定衛在敦煌縣南罕東衛西距甘州一千五百里本漢婼羌唐為吐蕃地元封宗室布延特穆爾鎮之地名薩里輝和爾廣袤千里明洪武七年來貢分其地為鄂端烏爾珍碩沙克特哩木四部八年置安定鄂端二衛封延特穆爾為安定王成化中為土魯畨殘破正德中伊伯勒阿喇圖什等侵據其地餘衆散徙布延特穆爾舊作卜姻帖木兒薩里輝和爾舊作撒里畏兀兒鄂端舊作阿端烏爾珍舊作阿真碩沙克舊作若先特哩木舊作帖里延特穆爾舊作姻帖木兒伊伯勒舊作亦不喇阿喇圖什舊作阿爾秃厮今並改曲先衛在敦煌縣西南安定衛西古西戎地唐屬吐蕃元置察遜塔拉元帥府明洪武四年置察遜衛授土酋桑濟索克為指揮同知後為多爾濟巴勒所攻併入安定居烏爾珍地永樂四年指揮哈斯桑濟索克桑濟等奏言西蕃侵暴仍乞立衛徙治藥王灘以桑濟領衛事并徙安定衛於色爾騰成化中為土魯畨所擾率部族內徙遂失故地察遜舊作曲先搭拉舊作答林桑濟索克舊作散即思多爾濟巴勒舊作多兒只把哈斯舊作哈三桑濟舊作三即色爾騰舊作昔兒汀今並改關隘新瓜州城在州西南三十里舊為安西衛地本朝雍正十三年吐魯番為準噶爾所擾其酋額敏和卓率所部回民內附於安西鎮西築五堡居之頭堡在鎮西南二十五里二堡在頭堡西南十里三堡在二堡西北十里四堡在三堡西北四里五堡在四堡東北十里别於頭堡數里之內築新瓜州城靖逆衛城在玉門縣西北一百二十里本朝康熙五十七年置舊為赤金衛地城周二里南北四門雍正四年移柳溝通判治此乾隆二十四年裁衛屬玉門縣設遊擊千總駐守距營七十里黃渠沿拾墩湖有牧馬廠巴顔布喇在敦煌縣西南一百二十里通伊遜察