等物十二年有内地商民代駕暹羅貨船來粤貿易特頒敕諭永遵例禁福建船商金協順廣東船商陳澄發裝載暹羅貨船來粵貿易經地方官查明詢問暹羅國貢使據稱該國民人不諳營運多倩福潮船户代駕呈遞譯書稟結並非冒飾兩廣總督吳熊光具奏仁宋睿皇帝諭軍機大臣曰外夷貨船來廣貿易自應專差夷目親身管駕不得令内地商人代為販運今金協順陳澄發皆以内地客商領駕暹羅船隻雖訊無假冒揑飾及夾帶違禁貨物但恐日久相沿必致奸徒潛往外夷賖欠誆騙或竟冒為夷貨代盜銷贓不可工防其漸現已另降諭㫖申明内外體制令該國王凜暹母忽此次飭禁之後如再有代駕船隻進口者即當查明懲辦免滋流弊至澄海縣商民領照赴暹羅國買未接濟内地民食雖行之己閲四十餘年但此項米船據報囘棹者不過十之五六而日棹之船所載米石又與原報數目不符安知非揑詞影射藉以通道濟匪自應停止給照將此諭令知之十五年暹羅國世子鄭佛遣使表貢懇請封襲王爵上允所請賜以敕命即令該使臣領齎囘國二十四年國王鄭佛遣官表賀萬壽並進方物宴賞如例其國有大庫司九猶華言布政司也一曰暹羅二曰可刺細馬三曰足曹本四曰皮細綠五曰束骨胎六曰果平疋七曰倒腦細八曰討丕九曰六昆府十四一曰綵納二曰無老三曰比采四曰東板魯五曰皮六曰疋皮里七曰采野八曰多鐃九曰千無里十曰細辭滑十一曰采欲十二曰款細灣十三曰沾奔十四曰魁出縣七十二分隷各府自廣東海道約四十五晝夜可至其境按暹羅國都在廣東西南始自廣東香山登舟乘北風用午針出七洲洋十晝夜抵越南海次中有一山名外羅八晝夜抵占城海次十二晝夜抵大崑崙山又用東北風轉舟向未及中三分五晝夜可抵大真樹港又五晝夜可抵暹羅港入港二百里即淡水洋又五日扺暹羅城風俗地方千里環國皆山氣候不常或嵐或熱瀛涯勝覧崇信釋敎不通漢字惟誦佛經字皆横寫明史男女多爲僧尼亦居庵寺持齋受戒衣服頗類中國富貴者尤敬佛百金之産即以其半施之死則用水銀灌其口而葬貧則移屍至海濱即有羣鴉飛啄俄頃而盡人拾其骨號泣而棄之於海謂之鳥葬亦延僧設齋禮佛煑海為鹽釀秫為酒續文獻通考男女椎髻事決婦人續文獻通考男女椎髻白布纒頭被服長衫每有計議刑法輕重錢榖出入之事並決之婦人婦人智量在男子上瀛涯勝覽云婦人多智夫聽於妻妻與中國人私寢食與同恬不怪也按暹羅為扶南别種南史海南諸國傳扶南初以女人為國號曰柳葉今暹羅婦女智量在男子上其果扶南遺風歟城分八門暹羅館志城冢用磚砌分八門南北五里東西十里城中有小河通舟城外西南居民湊集有外城周遭十餘里王居在城西隅另建一城約三里餘殿用金裝綵繪覆以銅瓦室用錫瓦階砌田錫裹磚䦨千用銅裹木地卑溼民皆樓居上聯檳榔片藤覆之亦有用陶瓦者坐卧即於樓板上藉以氊及藤席無牀桌椅凳之制官制九等館志一曰握亞往二曰握步喇三曰握蟒四曰握坤五曰握悶六曰握文七曰握板八曰握郎九曰握救其選舉由鄉舉於大庫司審其堪用以文達於王所王為定期面試至期大庫司引至王前咨以民事應對得當即授官服候用否則逐出考課亦以三年為期人皆有名無姓為官者稱握某民上者稱奈某最下者稱隘某乘輿飾糚彩帽製類兜鍪館志王鎖里人出乘金糚彩轎或乘象車其􅏛葢以茭蔁葉為之每日旦登殿各官於臺下設氊以次盤膝而坐合掌於頂獻花數朶有事則具文書朗誦上呈候王定奪乃退遇正日冬節及慶喜事亦有賞賜凡頒賜敕諭王則用原封冠服行五拜三叩頭禮又云其服飾惟王以受封故留髮冠金嵌寶石帽製類兜鍪上衣長三尺用五綵緞小袖在袵下用五綵布縵鞋韈用紅緞官及庶民皆翦髪官一等至四等則金嵌寶石帽五等至九等則五綵絨緞帽俱著兩截衣韈屨用牛皮婦人糚髻於後飾用金銀簪花戒指鐲釧脂粉貧者用銅上衣披五色飛花布縵下衣五綵織金花縵拖地長二三寸足著紅黒波靸鞋風俗勁悍習於水戰明史其大將以聖鐵裹身刀矢不能入聖鐵者人腦骨也海􅖝代錢重禁私銀續文獻通考貿易以􅖝子代錢瀛涯勝覽云市用海􅖝一如錢價西北二百餘里有市鎮曰上水通南居人無慮六百家各種番貨皆有館志民多載舟至各國商販少則用海􅖝多則用銀官民有銀不得私用皆送王所委官傾瀉成珠田鐵印印紋於上每百兩入税六錢無印紋以私銀論初犯斷左指再犯斷右指三犯者死民家飼象取牙以奉夷目短衣革屨常佩刀劍婦女喜游冶工紡績皇清職貢圖土產龍涎香象牙胡椒螣黄荳􅞦蘇木西洋閃金花緞速香烏木大楓子金銀香以上俱入貢羅斛香味極清遠亞於沉速沈香丁香石榴子樹香貓兒眼寶石金剛鑽花錫大清㑹興錫之良者產於南洋諸夷國番船以時至者由廣東和買貓竹黄竹萗竹西洋布犀象孔雀五色鸚鵡金絲猴六足龜水瓜土瓜大清一統志越南海南諸國地在西南隅東西一千七百六十里南北二千八百里東至海三百二十里西至南掌國界五百六十里南至占城國界一千九百里北至廣西太平府憑祥州界四百里至京師一萬一千一百六十五里其貢道由廣西憑祥州以達於京師分野天文翼軫分野鶉尾之次建置沿革古南交地書堯典宅南交史記舜本紀南極交趾周時為越裳氏地秦始皇初并百粤置桂林南海象郡其後為南海尉趙佗竊據漢武帝元鼎中討平之置日南等九郡儋耳珠崖南海蒼梧九真鬱林日南合浦交趾元帝時罷珠崖儋耳故交趾刺史領七郡其交趾日南九真即今越南國地後漢光武時女子徴側徴貳反遣馬援討平之界以銅柱置交州領交趾等七郡三國呉分立廣州而徙交州治龍編縣增置九德武平新昌三郡宋齊仍舊梁陳於交州置都督府隋初郡廢改都督府爲總管府唐仍曰交州調露初改安南都護府至德𥘉改鎮南都護府大厯閒復曰安南五代梁時土豪曲承美專有其地南漢置交趾節度使既而管内大亂推丁部領爲州帥其子連繼立宋平嶺表連内附封交趾郡王沈括夢溪筆談云交趾乃漢唐交州故地五代離亂呉文昌始據安南後爲丁連所殺開寶六年歸附授靜海軍節度使八年封交趾郡王此安南封王之始三傳而爲其臣黎桓所篡黎氏亦三傳為其臣李公藴所篡宋孝宗隆興二年李天祚遣使入貢封為安南國王安南國名自此始李氏八傳至昊旵無子傳其壻陳日煚元世祖時封日煚子光昺為安南國王尋叛後陳益稷自拔來歸仍其封明洪武二年其王日煃遣使奉表朝貢封為安南國王賜駝紐塗金銀印已而日煃卒其姪日熞襲封四傳至日焜其大臣黎季犛竊柄廢立自擅建文元年遂大殺陳氏宗族而自立更姓名為胡一元名其子蒼曰胡􅐏尋自稱太上皇傳位於􅐏誠祖即位􅐏自署權理安南國事遣使奉表朝貢因封為安南國王已而老撾送日煃之弟天平至京言黎氏篡奪本末帝命官齎勅責􅐏􅐏遣使入朝謝罪且請迎天平歸奉為王乃令天平還國勅廣西左右副将黄中吕毅將兵五千送之而改封􅐏順化郡公天平入雞林關􅐏㐲兵邀殺之中等敗還帝大怒命新城侯張輔西平侯沐晟等率師分道並進討平之改安南為交趾置交趾布政司設交州北江諒江三江建平新安建昌奉化清化鎮蠻諒山新平演州乂安順化十五府分轄三十六州一百八十一縣又設太原宣化嘉興歸化廣威五州直隸布政司分轄二十九縣然蠻人自以非類互相驚恐數年之後叛者屢起至宣德二年始諭布政司官等盡撤軍民北還六年命黎利權署安南國事明統志洪熙元年冦孽黎利攻劫郡縣復命將討之宣徳初黎利勢屈始奉表乞立陳氏後名暠者王其國詔封為安南王後利簒位自立朝臣復請加兵會利遣使來貢謝罪因而與之利雖受敕命其居國稱帝置百官設學校彬彬有華風焉建為東西二都分十三道曰山南京北山西海陽安邦諒山太原明光諒化清華乂安順化廣南東都在交州府西都在清華府利卒子麟代立正統元年封為安南國王厯傳八主至晭多行不義正德十一年社堂燒香官陳暠殺晭而自立詭言前王陳氏後晭臣都力士莫登庸起兵討之暠敗走死復立晭兄灝之子譓譓封登庸為武川伯總水陸諸軍登庸既握兵柄潛蓄異志嘉靖元年逐譓出居清華旋篡其位十六年譓子黎平遣使赴京備陳登庸篡逆乞興師問罪乃命仇鸞總督軍務毛伯温為叅贊仍諭如彼能束手歸命則待以不死十九年伯温等抵廣西登庸即率其部目入鎮南關進降表并上土地軍民籍請奉正朔永為藩臣乃命削安南國為安南都統使司授登庸都統使改其十三道為十三宣撫司而黎平據清華自為一國至萬厯𥘉莫氏漸衰黎氏之後維潭舉兵攻莫茂洽殺之奮其都統使印亦敂關求通貢詔授維潭都統使而莫氏後但保高平一郡勢益弱本朝順治初莫氏敬耀來歸未授爵而卒尋授其子元清為都統使十八年廣西巡撫奏稱安南黎維祺奉表投誠康熙五年禮臣題准給與封典令照常朝貢二十二年遣官冊封黎維正為安南國王賜以誥命并換給新鑄駝紐鍍金銀印御書忠孝守邦四字賜之三十六年安南國王奏請給還故地移文責之三十六年十一月雲南巡撫石文晟入見奏事聖祖顧大學士等曰石文晟言牛馬蝴蝶浦園明時内屬自我朝開闢雲南即在蒙自縣征糧並非安南之地朕初不知其故因安南國王以為彼地被土司所據奏請給還亦以小國境壤欲遣大臣勘明給之而文晟所奏又如此爾等其詳視輿圖確議入奏於是大學士等議安南國王不察本末輕聽妄言遽遣兵於邊疆駐劄生事妄行移文責之安南誠服按蒙自縣南蓮花灘為入安南之道即梨花江所經也明永樂初沐晟岀蒙自蓮花灘進討安南嘉靖間莫登庸作亂撫臣王文盛遣兵據蓮花灘羅洪先云自蓮花灘入交州石隴關循洮江右岸者此大道也自縣之河陽縣入交州循洮江左岸者皆險阨崎嶇此閒道也輿程記由蓮花灘達安南之東都可四五日而主雍正三年安南國遣使進貢御書日南世祚四字賜國王黎維祹六年雲南督臣請清查安南國地界奉㫖特賜安南鉛厰河内地四十里遂以白馬小賭呪河為界初雲南總督高其倬奏雲南開化府與交趾接界臣查自開化府馬伯汛外四十里至鉛厰山下小河内有逢春里六寨冊載秋糧十二石零於康熙二十二年入於交趾應行清查再查雲南通志自開化府文山縣南二百四十里至賭呪河與交趾為界今自開化府南至現在之馬伯汛止有一百二十里即至鉛厰山下小河亦止一百六十里是鉛厰山下小河以外尚有八十里亦係雲南舊境雖失在明朝但封疆所係亦請一併清查奉㫖境界失在明朝者恩免清查著另議立界繼督臣鄂爾泰奏請于鉛厰山下小河地方立界遣官齎頒諭㫖于安南國王國王黎維祹奏謝奉㫖覽王奏感恩悔過詞意䖍恭朕特沛殊恩將雲南督臣等查出四十里賞賜該國王十二年黎維祹卒嗣子黎維祐承襲乾隆二年黎維祐卒其弟黎維禕承襲二十六年黎維禕卒嗣子黎維褍承襲三十四年安南莫氏後黄公纘居南掌猛天寨地方為黎氏所逼率屬内投國王請索囘處治移檄責之五十二年廣南土目阮惠即阮光平因輔政鄭姓專國人心不附借除鄭姓為名攻破黎城擊滅鄭姓黎維褍復受制於阮氏旋卒亡失國印嗣孫黎維祁懦弱阮惠遂盡奪黎氏之地黎維祁脱身逃竄安南陪臣阮輝宿等奉黎維祁母妻及子敂關求救巡撫孫永清入奏上命兩廣總督孫士毅經理之