道以避海難從蕩昌縣南至九真郡自九真以南隨山刋木開陸路至日南郡又南行四百餘里至林邑國又南行二千餘里有西屑夷國援至其國鑄二銅柱于象林南界與西屑夷分境以紀漢德之盛其時以不能還數十人留銅柱之下至隋乃有三百餘家南蠻呼為馬留人其水路自安南府南海行三十餘里至林邑計交州至銅柱五千里銅船元和志交州朱鳶縣朱鳶江去縣一里後漢馬援南征鑄銅船於此寰宇記交州軍安縣有銅船湖交州記九真有一湖去合甫四十里至陰雨日百姓見有銅船岀水上又有一牛岀湖中以雞酒為祭便倍獲漁若不設此祀則魚牛糞而己見後漢志交趾郡定安縣注銅鼔後漢書馬援好騎善引名馬於交趾得越銅鼔為馬式汪裴氏廣州記狸獠鑄銅為鼓鼓唯高大為貴闊丈餘初成懸於庭剋辰置酒招至同類來者盈門豪富子女以金銀為大釵執以叩鼓叩竟遺留主人也隋書地理志諸蠻多置大銅鼓俗好殺每欲相攻則鳴此鼓到者如雲有鼓者號為都老其製高可三四尺有上面無下底其聲亦不甚大名曰諸葛鼓猺人謂是孔明所製明統志交趾服役有頭飛獠子赤裩獠子鼻飲獠于皆窟居巢處好飲酒擊銅鼓或云銅鼓乃諸葛征蠻鉦按後漢書注則東漢時已有此鼓似不始於孔明也名宦漢路博德西河平州人元鼎四年以衞尉將兵屯桂陽五年詔為伏波將軍出桂陽下湟水至番禺南越素聞㐲波名皆降遂定為九郡錫光漢中人平帝時為交趾太守教導民夷漸以禮義王莽末光閉境拒守建武初遣使貢獻封鹽水侯嶺南華風始於光任延南陽宛人建武初為九真太守九真俗以射獵為業不知牛耕常告糴於交趾每至困乏延乃今作田器敎之墾闢田疇歲歳開廣百姓充給又越駱民無嫁娶禮法不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸祿以賑助之同時相聚者二千餘人其產于衆咸曰使我有是子者任君也多名子為任於是徼外蠻夷夜郎等慕義保塞延遂止罷偵候戍卒視事九年九真人生為立祠馬援茂陵人光武時交趾女子徴側徴貳反援以伏波將軍與扶樂侯劉隆等水陸並進至浪泊與側貳戰大破追斬之進殲其黨交趾平援立銅柱而還張喬南陽人順帝時象林蠻區連入冦州郡討之不克於是選喬為交州刺史喬開示慰誘並皆降散祝良長沙人永和中蠻夷區連等反與張喬同命喬為交趾刺史良為九真太守良單車入賊中設方畧招以威信降者數萬人皆為良築起府寺嶺外復平夏方九江人建康初為交州刺史日南蠻夷攻燒縣邑扇動九真方開恩招誘賊皆降服遷桂陽太守桓帝時蠻夷攻九真太守兒式戰死九真都尉魏朗討破之渠帥猶屯據日南衆轉强盛復拜方為交趾刺史方威惠素著日南宿賊聞之相率詣方降谷永建寕人為鬱林太守以恩信招降烏滸人十餘萬内屬皆受冠帶開置七縣朱儁上虞人靈帝時交趾梁龍等反乃拜儁交趾刺史令過本郡簡募鄉兵及所調合五千人分兩道而入先宣揚威德既而進逼之斬龍降數萬人旬月盡定賈琮聊城人為交趾刺史先是刺史無清行吏民怨叛琮招撫荒散蠲復徭役誅斬巨魁簡選良吏百姓以安為之歌曰賈父來晚使我先反今見清平吏不敢飯治事三年為十三州最周乘漢末為交州刺史上書云交州絶域習俗貪濁强宗聚姦長吏肆狡行立絳州稷山人為安南經畧使時環王國人李樂山謀廢其君來乞師行立斬之歸其孥蠻人悦服馬植扶風人開成初為安南都護以文雅飾吏事清淨不煩夷民安之諸酋皆納款請租税約束宋邵煜其先京兆人後家桂陽景德中瓦交趾安撫國信使會黎桓死其子王相殺奪煜駐嶺表以事聞改緣海安撫使許以便宜行事煜移書安南諭朝廷威德俾速定位即時聽命元托歡扎拉爾台氏世祖平雲南遣人召安南入覲不行遣托歡等討平之十七戰皆捷陳日垣棄城遁入海以糧運不繼還國日烜卒子日燇嗣自是為藩臣托歡舊作脱懽扎拉爾台氏舊作扎刺兒台氏今改正明張輔祥符人永樂四年七月出征安南從廣西憑祥雲南蒙自分道進兵以輔代朱能為大將軍入坡壘關傳檄數黎季犛二十罪諭其境内以立陳氏意師次芹站遂造浮橋於昌江以濟前鋒抵富良江而輔由芹站西取他道至新福縣㝷移營三帶州招市江口攻拔多邦城遂下交趾東西二都五年正月大破賊於木丸工又敗之於富良江追至日南州奇羅海口擒季犛併其子澄於高望山安南盡平輔奏安南本中國地陳氏子孫已誅盡無可繼其國中耆老民庶俱請為郡縣如中國制乃改安南為交趾設布政司使六年六月振旅還京上交趾地圖東西一千七百六十里南北二千八百里安撫人民三百一十二萬有奇獲蠻人二百八萬七千五百有奇糧儲一千三百六十萬石象馬牛二十三萬五千九百有奇船八千六百七十軍器二百五十三萬九千八百論功進封英國公自輔召還陳季擴亂復命輔討誅之輔三擒偽王經營交趾十年及還京交趾復亂宣德初議棄交趾自此仍為安南國土沐晟定遠人永樂四年以西平侯為左副將軍征安南晟軍自雲南臨安府蒙自縣經野蒲斬木通道攻奪猛烈棚華關隘至洮江北岸與多邦城對壘時大將軍張輔率大軍營於城北之沙灘與晟合勢下交趾東西都遂平安南論功進封黔國公黄福昌邑人永樂四年征安南福以工部尚書轉餉安南平敕以尚書兼掌布按二司事二十六年召還京福居交趾十八年交人扶老攜幼送之皆號泣不忍別後因監軍中官馬騏貪殘交人苦之二年閒叛者四五起而黎利最劇馮貴侯保陳洽先後戰死何忠遇害交趾布按上言尚書黄福舊在交趾民心思之乞令復至以慰民望遂召福於南京赴闕議之仍掌布按二司事及柳升敗死官軍大潰福為賊所得皆下馬羅拜曰我父母也公向不北歸我曹不至此言已皆泣福斥之諭以順逆賊衆不忍加害其渠長餽餱糧乘以肩輿贈金幣出境至龍州悉以所贈歸之官人物秦阮翁仲南海人身長一丈三尺氣質端勇異於常人始皇併天下使翁仲將兵守臨洮聲振匈奴翁仲死遂鑄銅為其像置咸陽宫司馬門外匈奴至有見之者猶以為生漢李進交州人中平閒代賈琮為交州刺史請依中州例貢士其後阮琴以茂才仕至司隸校尉人才得與中州同選蓋自進始唐姜公輔愛州人第進士𥙷校書郎以制策異等授右拾遺翰林學士每進見敷奏詳亮徳宗器之未泚亂帝在奉天公輔曰今禁旅單寡而士馬處外竊為陛下危之帝曰善悉内諸軍既而朱泚兵果至乃擢公輔諫議大夫同中書門下平章事後貶泉州别駕順宗立拜吉州刺史明琴彭交趾人永樂中以乂安知府署茶籠州事有善政宣德閒黎利反圍其城彭拒守七月糧盡卒疲諸將無援者城陷死之贈交趾左布政使陳汝石交趾人初為陳氏小校大軍南征率先歸附積功至都指揮僉事永樂閒四忙土官車綿子等叛汝石從方政討之深入賊陣與千户未多蒲皆死多蒲亦交趾人同時有陶季容陳汀皆以忠節著裴伯耆安南舊臣祖父皆執政大臣死國事伯耆幼侍國王官五品洪武末禦冦東海黎季犛篡弑伯耆家屬遭害棄軍遁伏山谷永樂初詣闕號泣請師討逆復立陳氏後帝乃感動命所司周以衣食會老撾送陳天平至而黎氏使亦至出天平示之皆錯愕下拜伯耆責使者以大義惶恐不能荅及安南平改設郡縣授伯耆為交趾按察司右叅議土產金香鑪花瓶銀盆沈香速香以上俱入貢金太原諒山乂安等府出珠靖安雲屯海中出海賈云中秋有月是歳多珠珊瑚有赤黒二種在海直而軟見日曲而堅漢初趙佗獻赤珊瑚名火樹玳瑁狀類龜而殻稍長具足有六後兩足無爪丹砂晉葛洪欲煉丹求為勾漏令杜甫詩云交趾丹砂重是也安息香樹如苦棟大而直葉類羊桃而長中心有脂作香蘇合油樹生膏可為樂胡椒蔓生似山薯春花秋實羚羊角高石山出一角而中實極堅能碎金剛石犀象寰宇記象孕則五年一生被傷則羣黨相扶將去死則向南跪拜鳴三帀以木覆之雄死則雌泥土著身不飲食輒流涕焉兕漢靈帝時九真獻為奇獸元時安南嘗貢兕白鹿晉元康初白鹿見交趾武安縣宋元嘉末交趾獻白鹿猩猩南中志猩猩人面豕身似猿常數革為羣人以酒并糟設路側連結草屐猩猩見之即知張者祖考姓名呼曰奴欲張我亟舍去復自謂試共嘗酒逮醉取屐著之為人所擒狒狒晉郭璞云出交州山中狀如人面長臂黑身被髪迅走食人見人則笑猓􅛊寰宇記愛州有猓􅛊土人號曰歌然似獼猴而大面目與人無異皮毛軟毳細滑堪作褥此獸有仁義行則大者前小者後如得果實則小者先送與大者然後自食夷人古堂􅽜獠藥箭射之中一必獲其二未傷者拔死者之箭自刺而死蒙貴狀如猱而小紫黒色能捕鼠白雉周成王時越裳氏來獻漢光武時日南九真貢翡翠羽可為首飾蚺蛇形大而長其膽性極冷能療諸疾居風母交州記居風母以猿見人若慙屈頭打死得風便還活果下牛寰宇記九德出果下牛高三尺駚牛異物志日南多駚牛日行數百里搪牛寰宇記形如牛而大頭白身黒角長二丈堪為酒器出懷驩縣潮雞寰宇記輿地志云愛州移風縣有潮雞鳴長且清如吹角潮至則鳴一名林雞其冠四開如芙蓉大蜈蚣皮可鞔鼓肉白如瓠為脯味佳紅飛鼠茸毛肉翼每雌雄伏花蕉間得其一則其一不去南中婦人採之為媚藥石磬安鑊山石可為磬晉豫章太守范寗採用之又寰宇記愛州軍安縣磬石出浮邱溪火齊寰宇記愛州軍安縣流金澗多金沙出大齊狀如雲母重曡如黄金蟻漆寰宇記呉錄云居風有蟻絮藤人視土中知有蟻因墾發以木枝插其上則蟻出緣如生漆堅凝雞舌香釀花而成者都梁香似藿香沈香藤簡子藤實皆亦色可食人子藤子如人狀燒之集象千歲子子在根下石栗生石罅中花開三年方結實九層皮脱至九層方見肉熟而食之味類栗莎樹米可食古度樹不花而實實從木皮中出如綴珠然黄時即食時久化為飛蟻左思呉都賦松梓古度平仲君遷劉逵注古度樹也不華而實子皆從皮中出大如安石榴正赤初時可煑食廣州有之晉顧微廣州記熙安縣有古度樹俗人無子於祠炙其乳則生男以金帛報之木棉樹實如酒杯訶羅勒穰木樹皮中有屑如米可作餅食由梧竹長三四丈圍三尺可作梁柱如何九百年一實形如棗長五尺象牙簟抽牙絲織者辟珠犬者如指常附胎於椰子檳榔諸果上謂之聖鐵他綸木寰宇記堪為衣裳及褥蟻子鹽醢交州漢洞酋長多收蟻卵鹽為醬非官客親族不得食周禮醢人餽食之豆有蚳蟻子疑即此菴羅果俗名香蓋乃果中極品或謂種出西域實似北梨四五月間熟即多食無害波羅蜜大如冬瓜皮有軟刺五六月熟味最香甜核可煑食能飽人奉化府嘉林州出者尤佳烏木堅緻可為器蘇木一名多邦前纂修官臣金光杰恭纂前提調官臣許應藻恭覆輯校對官臣陸以潤恭校大清一統志俄羅斯在喀爾喀楚庫河以北東南至格爾必齊河北岸自大興安嶺之陰以東至海與黑龍江所轄北境接界西接西洋西南至土爾扈特舊國及凖噶爾界北至海去中國二萬餘里其貢道由恰克都經喀爾喀地進張家口以達于京師建置沿革地在極北古難詳考秦漢之間服屬匈奴史記匈奴傳冒頓單于北服渾庾屈射丁靈鬲昆薪犁之國注正義曰薪犁以上五國在匈奴北按魏畧曰匈奴北有渾窳國有屈射國有丁令國有隔昆國有新黎國葢北海之南自有丁令非烏孫之西丁令也烏孫長老言北丁令有馬脛國漢有堅昆丁令漢書匈奴傳郅支單于北擊烏揭降發其兵西破堅昆北降丁令按堅昆在烏孫北烏揭之西丁令又在其北史記所謂丁靈也即今俄羅斯地唐時有黠戛斯骨利幹等國唐書黠戛斯古堅昆國也地當伊吾之西焉耆北白山之旁或曰居勿曰結骨其種雜丁零乃匈奴西鄙也匈奴封漢降將李陵為右賢王衛律為丁零王後郅支單于破堅昆于時東距單于庭七千里南車師五千里郅支留都之後世得其地者訛為結骨稍號紇骨亦曰紇訖斯云直曰紇西北三千里南依貪漫山地夏沮洳冬積雪人皆長大赤髪晳面綠瞳以黑髪為不祥黑瞳者必曰陵苗裔也男少女多俗趫伉氣多寒雖大河亦半冰稼有禾粟大小麥青稞穄馬至壯大其君曰阿熱遂姓阿熱氏駐牙青山至回鶻牙所槖駝四十日行回鶻牙北六百里得仙娥河河東北曰雪山地多水泉青山之東有水曰劍河偶艇以度水悉東北流經其國合而北入于海堅昆本强國也地與宇厥等東至骨利幹南吐蕃西南葛邏祿貞觀二十二年入朝帝以其地為堅昆府隸燕然都䕶乾元中為回紇所破後語訛為黠戛斯葢回紇謂之若曰黄赤面云又云骨利幹處瀚海北多百合產良馬其地北距海去京師最遠又北度海則晝長夜短日入烹羊胛熟東方巳明葢近日入處也太宗時入朝以其地為元闕州其大酋獻馬帝取其異者號十驥龍朔中以元闕州更為余吾州隷瀚海都督府按唐時堅昆在西骨利幹在東皆今俄羅斯南境今其人多赤髪晳面綠瞳葢堅昆之裔也元時有俄羅斯及奇爾濟蘇哈卜㙮噶謙州益蘭州等處元史竒爾濟蘇南去大都萬有餘里其境長一千四百里廣半之謙河經其中西北流又西南有水曰鄂浦東北有水曰玉舒皆巨浸也會于謙而注于莽噶拉木河北入于海俗與諸國異土產名馬白黒海青阿克新者因水為名附庸于奇爾濟蘇去大都二萬五千餘里即唐史所載骨利幹國也烏蘇亦因水為名在奇爾濟蘇東謙河之北哈卜塔噶猶言布囊也葢口小腹巨地形類此因以為名在烏蘇東謙河之源所從出也其境上惟有二山口可出入山水林樾險阻為甚謙州亦以河為名去大都九千里在奇爾濟蘇東南謙河西南唐麓嶺之北益蘭者蛇之稱也初州境山中居人見一巨蛇長數十步從穴中出飲河水腥聞數里因以名州朔漠圖自和安北行三千里名昂吉爾海子自此又行五百餘里至欠欠州奇爾濟蘇地又行千里大澤云俄羅斯舊作阿羅思奇爾濟蘇舊作吉利吉思哈卜塔噶舊作撼合納鄂普舊作阿浦玉舒舊作玉湏莽喝拉木舊作昂可刺河阿克新舊作昂可新烏蘇舊作烏斯昂吉爾舊作阿只里奇爾濟蘇舊作乞里吉思今俱改正皆其地也明時阻於朔漠未通中國本朝順治十二年其國察漢汗始遣使貢方物十三年復入貢以來使不諳朝儀却其貢十四年復遣使進貢表文不合體制廷臣請逐之上以外邦從化宜加含容以示懷柔貢物查收來使量與宴賞不報書而遣之康熙十五年察漢汗又遣使進貢表言俄羅斯僻處遠方不諳中華文義及奏䟽禮儀兩次抒誠致多缺失今特敬謹奉貢仰祈矜宥上准其納貢先是順治初其衆曰羅刹竊據黑龍江雅克薩之地築城居之侵擾索倫達虎爾等索倫達虎爾二部居額爾古納河及淨溪里江之地與羅刹接境及是諭察漢汗以嚴禁羅刹毋優邊陲而羅刹潛侵淨里溪等處遷延不去二十一年駐兵額蘇里羅刹有過黒龍江者降其兵目三十餘人赦不誅遣降番米海羅等往諭之羅刹據雅克薩尼布楚二城如故二十四年命都統公彭春督師進討頭目額里克舍等窘迫乞降及我兵還復來城雅克薩地二十五年命黒龍江將軍薩布素等統兵圍之其國察漢汗遣使上疏謝罪言下國邊民搆釁自當嚴治乞撤雅克薩之圍且請分定邊界詔許之二十八年遣内大臣索額圖等與其使臣費要多羅等會議於尼布潮之地定格爾必齊河以北大興安山一帶為界其前所侵之尼布楚雅克薩諸處俱歸版圖於格爾必齊河旁立碑為誌自後朝貢貿易每歲或間歲一至未嘗稍違節度三十二年俄羅斯送回逃人二名理藩院行文奬之是年察漢汗遣使入貢聖祖閲其章奏諭大學士曰俄羅斯貢獻想古所無其國距京師甚遠從此陸路可直達彼處自嘉峪關行十一二日至哈密自哈密行十二三日至土魯番過土魯番即俄羅斯之境聞其國遼濶有二萬餘里三十九年俄羅斯遣使者齎奏至聖祖曰俄羅斯地方遥遠僻處西北海隅然甚誠敬噶爾丹窘迫求救於彼曾拒而不答曩者遣人分畫疆界即獻尼布楚地以東為界尼布楚等處原係布拉忒呉郎海諸部落地彼皆林居以捕貂為業人稱之為土中人後俄羅斯强盛并吞之能遂獻還即此允當軫念也其國王所居之城曰莫斯科窪近西北大海去京師甚遠康熙五十一年兵部職方司郎中圖理琛使土爾扈特國假道俄羅斯歸而悉其山川風俗為異域錄以獻其畧曰歲在壬申七月十六日至蘇布克圖為俄羅斯分界處又二日至楚庫柏興近色楞格河南岸河東岸民皆樓居無城垣四面皆山俄羅斯與蒙古人雜處五十二年正月十四日俄羅斯官温多里卧番邦非翅以察罕命來迎楚庫柏興東北行二百餘里越三日至北海爾湖南岸之博索爾伊斯科其間小柏興六七處間有田疇柏海爾湖在烏的柏興西北三百餘里湖内有地曰鄂遼漢洲布拉特蒙古五十餘户居之二十二日至柏海爾湖北岸之果落烏斯那越三日至厄爾庫城無垣牆有市井民樓居皆俄羅斯族少蒙古人跡矣二月二十二日迎候官以河未泮陸行多泥陷五月初四日乘舟下昂噶拉河順流十九日水程三千里至伊聶謝柏興居民千户俗多畜鹿以供乘載名曰俄倫去北海一月程距伊聶謝柏興五日乃舍舟而陸過麻科佛斯科嶺越宿至麻科斯科西傍揭的河初五日登舟順河流晝夜行水程二千五百里十二日至那里木柏興即揭的河入鄂布河處濱河地平坦多林木二十四日至蘇爾呼忒柏興越二日行六百里至薩瑪爾斯科由額爾齊斯河遡流而上越六日至狄木演斯科越十一日至托波爾城俄羅斯遣官迎候托波爾城内天主堂二十餘駐兵二千額爾齊斯河繞城之西由河西南遡流入托波爾河九宿至圖敏由圖敏西北遡土拉河舟行五百餘里至鴉班沁復捨舟而陸地勢漸下越九宿至費耶爾和土爾斯科城在鴉班沁西北四百餘里止二宿過佛落克嶺沿途皆山藪越三宿至改郭羅多在索里喀木斯科西北四百餘里有别爾馬羈人雜處其地葢又一部落自此西北行至莫斯科窪二千二百餘里自改郭羅多越四日至索羅博達有西費耶斯科國又一日至黑林諾付越六日至喀山在黒林諾付西南五百餘里又三日至西木必爾斯科在喀山三百餘里又西南五百餘里至薩拉托付為俄羅斯土爾扈特接壤處時五十二年十一月十六日俄羅斯遣官馳告土爾扈特國五十三年六月至土爾扈特國返斾渡河七月下旬至喀山十一月初七至托波爾十二月二十二日乃啟行越七宿至㙮喇斯科越十四宿至托木斯科為俄羅斯準噶爾等國接壤處自托木斯科至伊聶謝一千六百餘里又十日至伊里木城四面皆山自伊里木城往厄爾庫城東南行千有餘里餘如來程所厯不複書今按圖理琛所錄俄羅斯地處極北去北海一月程而荷蘭貢使稱與俄羅斯接壤是其國近北海而又接西海然地雖荒遠亦不應如該國使臣所言三四年而後歸伏讀高宗純皇帝御製土爾扈特全部歸順記定為俄羅斯故為紆繞其程觀於土爾扈特之來祇八月而己至益可見矣相傳其國本微弱地亦狹初居近海之計由地後假兵力於西費耶斯科國漸强盛其國至依番瓦什里魚赤始得西費耶斯科之助以兵八千及餉收諸部族遂雄長西北稱汗者厯二十三代三百五十餘年吞併喀山托波兒諸處亦一百六十餘年今其地廣袤幾二萬餘里分八道一道曰莫斯科窪斯科國王所都一道自托波兒河東至尼布楚與中國分界處曰西旱爾斯科其六道曰喀山斯科佛羅尼使斯科計由斯科司馬連斯科三皮提里普爾斯科郭羅多阿木哈斯科每一斯科如中國有㑹其餘小斯科無數設官管轄每斯科設一人統轄曰噶噶林各處有城堡名曰柏興猶中國州縣大者兵民數百或千餘小者一二百設頭目一人有樓房屋舍架大木為之城垣亦皆列木栅但絶少多虚名耳南界土爾扈特哈薩克諸國及内附之喀爾喀西北尚有十餘國大者曰西費耶斯科圖里耶斯科近為所侵掠皆微弱云康熙間其國遣人來京師就學特設俄羅斯館派滿洲助教一人漢助敎一人敎習之雍正五年定俄羅斯來學喇嘛六人學生四人每十年更換一次是年遣郡王額駙䇿凌等與俄羅斯使臣薩瓦議定邊界以恰克圖為通市所自額爾古訥河岸至阿魯哈當蘇阿魯奇都勒齊克達奇林等處俱為我斥堠以相對之楚庫河為界自此往西沿布爾古特山等處以博木沙畢鼐嶺為界立石為誌不許越境滋事及容留逃盗人等人以恰克圖為常互市所遣官照料乾隆二十二年王師追討凖噶爾部叛賊阿睦爾撒納由哈薩克竄入俄羅斯境未即縛送特命典屬嚴詞索取適逆犯身斃俄羅斯遂傳送其屍修詞恭謹三十年以恰克圖貿易俄羅斯不遵禁約停止互市俄羅斯有私將貨物由洋船販至廣東售賣者皆嚴行禁絶五十六年俄羅斯懇求開市上鑒其恭順允之先是乾隆三十六年土爾扈特汗渥巴錫以俄羅斯征調不息挈全部來歸五十六年有由俄羅斯逃出喇嘛薩邁林偽造俄羅斯書信欲襲取土爾扈特以為摇惑之計土爾扈特親王車凌烏什巴將薩邁林及書信一併呈送及審出薩邁林供詞書信係屬假造杜爾伯特土爾扈特等皆安靜尋據俄羅斯薩納特衙門覆稱前信係屬偽造並非邊界頭目手記我國事天朝素稱恭順不敢稍存異志懇奏大皇帝俯念悃忱信其無他敢乞施恩復准開市等語上以所懇措詞恭順准其通市嘉慶九年藴端多爾濟奏請裁撤巴彥阿達罕卡倫駐防兵丁上以俄羅斯恭順此項駐防兵丁著照所請裁撤前因俄羅斯所屬喀木呢罕等進巴彦阿達爾罕卡倫搶擄車臣汗部落游牧地方牲獸由該部落派兵二百名駐防是年藴端多爾濟等奏請裁撤即于此兵丁内派兵二十名駐劄庫倫之南汗山巡察牲獸樹木得㫖近年俄羅斯感恩向化甚屬恭順此項駐防兵丁亦屬無用著照藴端多爾濟等所請裁撤十年俄羅斯商船二隻來廣懇請貿易奉諭㫖俄羅斯向例在恰克圖地方通市嗣後遇有該國商船來廣貿易當嚴行駮回以嚴定制十六年俄羅斯固畢爾納托爾懇請遣人探望喇嘛及學生部議不准十八年俄羅斯與罕巴爾因交易起釁向哈薩克索討安集延經卡倫官員傳諭彼此即將財物儥還安靜歸部其事天朝極為恭順焉風俗地寒而溼多雨雪少晴和居止有廬舍水陸用舟車其夷官披髪戴三角帽短衣革靴出必佩劍官婦戴紅頂三角帽繫五色長桶裙披織錦短衣無袖俗以去髭鬚為姣好髪卷者為美觀卑賤見尊長以免冠立叩為恭敬服氊罽喜飲酒不知茶屑麥為餅不飯食知種而不知耘不知牛耕居河濱者喜浴善泅有錢文大小銀銅式不一以十六寸為一尺十二兩為一斤千步為一里無節氣書知有四季而不知朔朢人材勇健性矜夸貪得平居和睦喜詼諧少爭鬬好詞訟刑罰頗嚴尚浮屠自國王至庶民有四季大齋數十日山川帕付林斯科山在國境東佛落克嶺西北高出諸山之上土人云冬夏積雪人不能至按自喀爾喀諸部駐牧之色楞格河下流地名楚庫柏興入俄羅斯界自此而北水皆北流沿路皆大山深谷山多林藪夏多蛇虻水多魚本朝康熙五十一年原任内閣侍讀圖理琛奉使土爾扈特道經其國歸而著其山川風土今依其所經次第列諸大水于下山雖多而有名者絶少故不盡錄佛落克嶺在費耶爾和土爾斯科地高十餘里有二水嶺東流出者曰土拉河嶺西流出者曰托波兒河山之陰有水曰喀穆河下流俱會於厄爾齊斯河色楞格河源出喀爾喀境内東北流至楚庫柏興入俄羅斯界受東南來之楚庫河又東北流二百餘里至烏的柏興受東南來之烏的河又西北三百餘里入白哈皃湖河廣曰五十丈水清溜急十月中始凍兩旁皆山沿岸多叢柳樺榆櫻薁中多魚昂噶喇河自白哈兒湖西北流出又西北流一百五十餘里至厄爾庫城受西南來之厄爾庫河又西北流二千九百餘里受東北來之伊里穆河又數百里會伊聶謝河流入北海此河長三千餘里受十餘小水又大于色楞格兩岸及河中皆高峯峭壁水深溜急舟行甚險五六月尚有氷舊志昂噶喇河兩岸皆山自伊里穆河流入之處以至伊聶謝河中間河流俄羅斯人又呼為通古斯科河又有十餘小河皆注入之昂噶喇河内有伯克五處破落克八處西費喇九處其國謂水中高峯及臨水懸崖曰伯克有滅提别西伯克巴達爾滿斯克伯克多達兒斯克伯克減費斯克伯克費達穆克伯克謂夾岸峭壁中有大石河水陡下懸流曰破落克有博合滅兒爾納破落克牙皮乃破落克巴墩破落克多爾規破落克沙滿斯克破落克阿普林斯克破落克木爾蘇克破落克四鐵烈洛什破落克謂水淺多在急流之處曰西費喇有洛什西費喇鄂標穆索斯奈西費喇柏格西費喇郭洛活瓦西費喇郭費殷斯克西費喇噶什那西費喇鄂費夏那西費喇鄂爾吉那西費喇郭薩牙西費喇按元史奇爾濟蘇有謙河西北流注於莽噶拉木河莽噶拉木即昂噶喇謙河當即伊聶謝也莽噶拉木己見前伊聶謝河自厄爾庫城西北由昂噶喇河水行三千餘里至伊聶謝柏興得伊聶謝河其水大于昂噶喇不知發源之處北流經伊聶謝柏興會東來之昂噶喇河轉東北流入于北海自此而北地益寒益近北海矣揭的河伊聶榭柏興之西北二百五十餘里地名麻科斯科有嶺名佛落克水從嶺下流出西北流二千五百餘里至那里穆柏興入于鄂布河舊志揭的河土人名為解梯多灣曲水色赤治河有小柏興四五處順流約二千里河面漸濶水色漸白鄂布河自麻科斯科西北由揭的河水行二千五百餘里至那里穆柏興得鄂布河其水西北流至托穆斯科受東南來之托穆河至那里穆柏興又受東南來之揭的河又西北流二千餘里至薩馬爾斯科之地轉西南流與厄爾齊斯河合復西北流入北海此河又大于伊聶謝水濁溜緩洲渚甚多自此而北地漸平坦山亦不甚大矣厄爾齊斯河自那里穆柏興西北由鄂布河水行二十餘里至薩馬爾斯科得厄爾齊斯河其水自阿爾泰山發源北流入俄羅斯境又西北流至托波兒之地受托波土拉二河轉東北流與鄂布河合流入北海此河大如色楞格水濁溜急其發源之阿爾泰山屬中國西北塞外邊界即古金山也計其源流與色楞格相等不知幾千里舊志厄爾齊斯河在蘇爾呼忒柏興西南六百餘里托波兒河源岀費雅爾土爾斯科地之佛落克嶺西東南流與土拉河會又東北流入于厄爾齊斯河其入厄爾齊斯河處之東地名托波兒在薩馬爾斯科西南一千餘里彼所稱八道中之一道也居民二千餘戸駐兵二个頭目十數人有廬舍市井謂之西畢爾斯科設噶林一人統之凡諸柏興皆其所轄云舊志狄穆演斯科西南六百餘里為托波兒地厄爾齊斯河來自東南遶過托波兒向東北流托波皃河來自西南至此地而合土拉河源出佛落克嶺東東南流入托波兒河匯于厄爾齊斯河其發源處地名費耶爾和土爾斯科在托波皃西北二千餘里自此西北與國城相近彼謂之内地喀穆河在佛落克嶺之北從一山中流出西南流千餘里至黒林諾付之地有佛落克嶺北流出之費牙忒喀河西南流入此河又流至喀山城東南入佛兒格河此河上流至地名黒林諾付俱屬西畢爾斯科道至喀山乃别為一道自此而北至國王所居莫斯科窪城僅二千餘里地勢趨下人烟稠密舊志喀穆河大似色楞格河水色赤溜急自東北向西南流至喀山相對之地入佛兒格河佛兒格河發源西北山中東南流至喀山晝長而夕短所謂小海即此水也又按史記匈奴傳匈奴留郭吉遷之北海上漢書蘇武傳匈奴徙武北海上無人處使牧羝武既至海上廪食不至掘野鼠去草實而食之杖漢節牧羊單于弟於靬王弋豺海上給衣食賜馬畜王死後人衆徙去丁令盗武牛羊武復窮厄匈奴使李陵至海上為武置酒設樂武終不降後漢使復至匈奴常惠夜見漢使敎使者謂單于言天子射上林中得雁足有係帛書言武等在某澤中前言北海海上後言某澤以塞外遇水澤通稱海也白哈兒湖地在匈奴北與丁零正相近史記匈奴傳冒頓北服丁靈漢書李陵傳匈奴立衞律為丁靈王師古注丁靈匈奴之别種又蘇武傳注丁零即上所謂丁靈耳然則俄羅斯南境即丁靈故地而白哈兒湖即蘇武牧羝之北海上歟土產麥有大麥小麥蕎麥油麥松杉樺已上三種各處有之馬唐書骨利幹産良馬首似槖駝筋骼壯大日中馳數百里今俄羅斯産馬皆高大逾常即其類也牛骨連生大不過三尺味頗佳冰未凍時從北海由鄂布河溯流而來甚多人取食之又有名鄂莫裏者長止尺餘白露後五日内由白哈兒湖逆流而來取之不盡其諸河内皆產鱸鱠鯉鯽鱓鮰等及哈打拉魚他庫魚石斑魚穆舒呼魚松阿打魚勾深魚牙魯魚前纂修官臣金光杰恭纂前提調官臣許應藻恭覆輯校對官臣陶際堯恭校
