以上宴餞之儀禮甚稱永徽元年真德大破百濟遣春秋子法敏以聞又織錦作五言太平頌以獻帝嘉之拜法敏為大府郷龍朔二年詔以新羅國為雞林州都督府授法敏為雞林州都督開元二十五年遣左贊善大夫邢璹攝鴻臚少卿往冊封新羅王璹將發上製詩序太子以下及百僚咸賦詩以送之上謂璹曰新羅號為君子之國頗知書記有類中華以卿學術善於講論故選使充此到彼宜闡揚經典使知大國儒教之盛又聞其人多善棊因令善棊人率府兵曹楊季鷹為璹之副璹等至彼大為番人所敬其國棊者皆季鷹之下於是厚賂璹等金寶及藥物等續文獻通考遼太祖九年新羅遣使貢方物天贊四年新羅國來貢古休忍國在新羅東亦三韓之屬東晉時有休忍國服屬於燕符秦滅燕遂屬秦及苻洛以龍城叛徴兵於鮮卑烏桓高句驪百濟新羅休忍諸國其後并於百濟古獩貊國今朝鮮之江原道遼史地理志本獩貊地不耐城古獩貊所居也文獻通考獩亦朝鮮之地南與辰韓北與高句驪沃沮接東窮大海西至樂浪漢武帝元朔元年獩君南閭等叛朝鮮率二十八萬口詣遼東内屬帝以其地為滄海郡數年乃罷元封三年滅朝鮮分置四郡昭帝時并二郡入樂浪元菟復徙元菟居句驪自單大嶺以東沃沮獩貊并屬樂浪後以境土廣遠復分嶺東七縣置樂浪東部都尉光武建武六年省都尉官遂棄嶺東地悉封其渠帥為縣侯皆歲時朝賀無大君長自漢以來其官有侯邑君三老統主下户其耆舊自謂與高麗同種言語大抵相類俗多忌諱疾病死亡即棄舊宅常以十月祭天晝夜飲酒歌舞名曰舞天又祭虎以為神其邑落有侵犯者輒相責罰牛馬名曰責禍地多文豹有果下馬高三尺乘之可於果樹下行其海出班魚皮漢里常獻之魏齊王正始六年不耐􅐮侯等舉邑降四時詣樂浪帶方二郡朝謁有軍政賦調如中華人焉續文獻通考遼太祖天顯元年渤海既平獩貊來貢古躭羅國今朝鮮之慶尚道境亦曰流鬼國唐書居新羅武州南島上初附百濟後附新羅麟德二年遣使入朝後為新羅所併圖經今濟州即古躭羅國也元大德五年置躭羅軍總管府續文獻通考躭羅高麗與國也元世祖既臣高麗以躭羅為南宋日本衝要乃於至元十年命將平之即其地立躭羅國招討司屯鎮邊軍千七百人後改為軍民府達嚕噶齊總管府又改為軍民安撫司其貢賦進毛施布百匹至元三十一年高麗王以為言遂復隷高麗達嚕噶齊舊作達魯花赤今改正古沸流國今正州城古沸流國地遼史地理志正州本沸流王國故地為公孫康所併渤海置沸流郡有沸流水户五百隸淥州在西北三百八十里統東那縣本漢東耐縣地在州西七十里井邑鎮在全州東北或曰即百濟之故沙井寨也明萬厯中倭行長犯王京退屯井邑去王京六百餘里碧蹄館在國城西三十里其東有橋曰大石橋明萬厯中李如松與倭戰處肅平館在平壤西北圖經肅平館之西曰定州東曰安州明萬厯二十年李如松援朝鮮逾鴨綠江至肅平館起二日抵平壤即此箕子墓在平壤城西北三里小山環繞其前為箕子祠有參奉二人世守祭祀即箕子裔又大同江岸有柴樹林可十里許幹似松葉似榆土人常藉以療饑相傳其始即箕子所植云名宦漢耿臨順帝時為元菟太守句驪犯遼東殺帶方令掠得樂浪太守妻子建安二年臨討之斬首數百級其王降服乞屬元菟公孫域桓帝時為元菟太守永康元年扶餘國王將二萬人來寇域擊破之斬首數千級唐李勣曹州人乾封間為遼東道行軍大總管率諸將征高麗連拔其城遂圍平壤執其君臣收凡五部百七十六城户六十九萬詔勣便道獻俘昭陵凱還割其地為都督府者九州四十置安東都䕶府擢酋豪有功者授都督二縣百復刺史令與華官參治蘇定方冀州人顯慶間為神邱道行軍大總管率諸將討百濟自成山濟海百濟守熊津口定方擊敗之直趨都城拔之執其王父子及酋長送京師平其國五部三十七郡二百城户七十六萬乃析置熊津韓東明金漣德安五都督馬府劉仁軌尉氏人初蘇定方平百濟留劉仁願守其城百濟叛圍仁願詔仁軌檢校帶方州刺史發兵援之解仁願圍合兵再定百濟仁願等振旅還詔仁軌鎮守百濟再被亂仁軌瘞埋弔祭葺復户版署官吏開道僵屍如莽路營聚落復防堰賑貧貸乏勸課耕種為立官社民皆安其所遂營屯田以經畧高麗後為熊津道安撫大使兼浿江道總管副李勣討高麗平之人物漢王閎樂浪人更始時為郡三老更始敗土人王調殺郡守自稱大將軍樂浪太守建武六年光武遣太守王遵將兵擊之至遼東閎與決曹史楊邑等共殺調迎遵皆封為列侯閎獨讓爵王景宇仲通閎子辟司空伏恭府有薦景能理水者顯宗詔與將作謁者王呉共修作浚儀渠吳用景墕流法水不復修汴渠引見景問以理水形為害永平十二年議便景陳其利害帝善之遂遣景與王呉修渠築隄自滎陽東至千乘海口千餘里景乃商度地勢鑿山阜破砥磧直截溝澗防遏衝要疏決壅積十里立一水門令更相洄注無復潰漏之患遷侍御史從駕東巡狩至無鹽帝美其功績拜河隄謁者尋遷徐州刺史又遷廬江太守廬江民不知牛耕食常不足景驅率吏民修起孫叔敖芍陂稻田教用犁耕墾辟倍多境内豐給銘石刻誓令民知常禁又訓令蠶織為作法制卒於官西魏王盟樂浪人家於武川以積射將軍從蕭寶寅西征寶寅僭逆盟遂逃匿及爾朱天光入關盟從之隨賀拔岳禽万俟醜奴平秦隴常先登力戰及宇文泰平侯莫陳悅除盟原州刺史孝武至長安封魏昌縣公厯拜司空司徒侍中太尉趙青雀之亂輔太子出頓渭北事平進長樂郡公遷太保進太傅姿度宏雅仁而汎愛雖位居師傅禮冠羣臣而謙恭自處未嘗以富貴驕人卒諡孝定北周高琳字季珉高麗人從魏孝武西遷封鉅鹿縣子河橋之役琳勇冠諸軍太祖謂之曰公即我之韓白也復從戰芒山除正平郡中正齊將東方老來寇琳擊退之除鄜州刺史加侍中孝閔踐阼進犍為郡公武成二年討平文州氏天和三年為江陵副總管陳將呉明徹來寇琳固守江陵以抗之晝夜拒戰凡經十旬明徹退走進位柱國卒諡曰襄唐黑齒常之百濟西部人降唐累遷左領軍員外將軍儀鳳三年從擊吐蕃敗之調露中吐蕃使贊婆等入寇又敗之永隆二年贊婆營青海常之馳掩其屯破之悉燒其糧廥所獲不貲凡莅軍七年吐蕃憺畏不敢盜邊封燕國公垂拱中突厥復犯塞常之追擊之賊遯去後爲燕然道大總管與李多祚等擊突厥骨咄祿元珍於黄花堆破之賊潰歸磧北高仙芝高麗人開元末爲安西副都䕶四鎮都知兵馬使小勃律王爲吐蕃所誘故西北二十餘國皆羈屬吐蕃天寶六年詔仙芝討之乃分軍爲三而自率一軍越險深入至阿弩越城城中大酋長皆吐蕃腹心仙芝遣將悉縛斬之王出降因平其國急斷婆夷橋吐蕃至不克渡於是拂菻大食諸胡七十二國皆震懾降附擢爲四鎮節度使尋加左金吾衞大將軍九載討石國降其王車鼻施更拜右羽林軍大將軍封密雲郡公王思禮高麗人以功授右衞將軍關西兵馬使安禄山反哥舒翰爲元帥奏思禮赴軍委以軍事密勸翰表誅楊國忠不聽潼關失守思禮走行在更爲關内行營節度河西隴右伊西行營兵馬使守武功賊將來戰退保扶風長安平思禮先入清宫收東京戰數有功遷兵部尚書封霍國公兼潞沁等州節度乾元元年與郭子儀圍相洲軍潰惟李光弼思禮完軍還㝷破史思明别將萬餘衆於直千嶺代光弼為河東節度副大使加司空卒謚武烈張保臯鄭年新羅人皆善鬬戰工用槍年復能沒海履其地五十里不噎二人常不相下自其國皆來為武安軍小將後保皐歸新羅謁其王曰徧中國以新羅人為奴婢願得鎮青海使賊不得掠人西去王與萬人守之自太和後海上無鬻新羅人者保臯既貴於其國年饑寒客漣水一日辭戍主東歸謁保臯飲之極歡聞大臣殺其王國亂保臯分兵五千持年泣曰非子不能平禍難年至誅反者立王以報王召保臯為相以年代守青海土産白苧布綿紬木棉布五爪龍席雜彩花席白硾紙米有江米稻米二種鹿皮獺皮刀以上俱入貢金銀鐵石鐙盞有紅白二色水晶鹽狼尾筆油煤墨摺扇編竹為骨以多為貴黄漆樹似棕六月取汁漆物如金果下馬後漢書獩國有果下馬注云高三尺乘之可以果樹下行長尾雞後漢書馬韓國長尾雞尾長五尺蜂蜜貂豽紅豹皮後漢書獩國多文豹八梢魚班魚後漢書獩國海出班魚使來皆獻之蠣房龜脚竹蛤海藻昆布秔可為酒黍麻麥松有二種惟五葉者結子人參茯苓硫黄白附子榛子梨栗前纂修官臣金光杰恭纂前提調官臣許應藻恭覆輯校對官臣彭作邦恭校大清一統志琉球在福建泉州府東海島中接漳泉興福四州界其貢道由福建以達於京師分野天文牛女分野建置沿革古史不載漢魏以來不通中國相傳在海島之中當建安郡東水行五日而至在外國爲最小而險其國有大琉球小琉球隋大業中令羽騎尉朱寛訪求異俗始至其國言語不通掠一人以返後遣武賁郎將陳稜率兵至其都掠男女五千人還唐宋時未嘗朝貢寰宇記隋煬帝大業𥘉海帥何蠻等云每春秋之時天清風靜東望依稀似有煙霧之氣亦不知有幾十里三年帝命羽騎尉朱寛入海訪求異俗遂與何蠻俱往因到琉球國言語不相通因掠一人并取其布甲而還帝復遣武賁郎將陳稜朝請大夫張鎮州率兵自義安浮海擊之至琉球初稜將南方諸國人從軍有崑崙頗解其語遣人慰諭之琉球不從拒逆官軍稜擊走之進至其都頻戰皆敗焚其宫室擄其男女數千人而還自是而絶元世祖至元二十八年沿海副萬户楊祥使往招諭不從成宗元貞三年福建省平章政事高興遣都鎮撫張浩等赴琉球國擒生口而還元史作瑠求又曰高興言今立省泉州距瑠求為近可伺其消息或宜招宜伐不必他調兵力九月高興遣都鎮撫張浩福州新軍萬户張進赴瑠求國擒生口一百三十餘人其國始建自天孫氏傳二十五代為逆臣利勇所簒浦添按司舜天者日本人討殺利勇衆推為王遂代天孫氏舜天之孫義本禪位於天孫氏後英祖而自隱於北山英祖三傳至玉成荒淫無度諸司不朝大里按司稱山南王歸仁按司稱山北王玉成遂自稱中山王國分為三玉成傳子西威西威薨國人廢其子而立浦添司察度明洪武𥘉奉朝貢遣子姪及陪臣子弟來請肄業國學帝許之并賜閩人三十六姓善操舟者令往來朝貢自是三王嗣封皆請於朝未幾山南佐鋪按司巴志者合衆攻山南繼攻山北山北王自殺復攻滅中山巴志遂奉其父思紹為王永樂五年請於朝襲封中山王爵巴志復滅山南王自元延祐中國分為三至是合為一賜尚姓尚巴志五傳至尚德國人廢其子而立伊平人尚圓或曰義本之後或以為天孫氏裔終明之世修貢不絶按明史洪武五年載中山王察度十一年載山北王怕尼芝俱非尚姓永樂二十二年始載中山世子尚巴志厥後諸王乃各冠以尚姓是中山之得尚姓自巴志始而始云洪武初其國有三王曰中山山南山北皆尚姓史文不免相牴牾蓋山南山北兩王本莫考其姓氏即中山之姓尚者並非察度子孫其後尚圓代尚德而立亦非同姓外藩有更姓之實而不敢為更姓之名者懼中朝詰責也史家但據赴告直書雖紀載通例而其傳國本末有不可誣者又續文獻通考云後嗣王尚圓尚真尚清分為三曰中山王曰山南王曰山北王然明宣德間二王巳為中山所併尚圓襲封在成化七年尚真即尚圓之子此時何至分為三王是蓋因史家有三王皆尚姓之言遂借其後王之姓名以附會之也按舊志亦云元末國分為三皆以尚為姓此沿明史及續文獻通考之說今改正本朝順治六年琉球國遣使奉表納款十一年其國王世子尚質遣使進貢方物詔冊封尚質為中山王賜鍍金銀印令二年一貢著為例康熙二十年中山王世子尚貞奏請襲封二十一年遣官冊封琉球國王并御書中山世土四字賜之五十七年琉球國王世曾孫尚敬奏稱自四十八年中山王尚貞薨逝世子尚純早世世孫尚益權署國事未及請封亦薨今遣耳目官正議大夫等奉表恭進方物并請封襲王爵奉㫖琉球國世守臣節忠誠可嘉准該國王世曽孫尚敬所請敕賜承襲琉球國中山王雍正元年琉球國王尚敬遣王舅翁國柱及曽信入貢復遣官生鄭秉哲等入監二年召見王舅翁國柱於乾清宫御書輯瑞球陽四字賜之乾隆元年二年三年琉球國王俱遣使入貢四年高宗純皇帝以國王遣使慶賀忠藎可嘉降敕奬諭併御書永祚瀛壖四字賜之十九年琉球國王世子尚穆奏稱臣父敬於乾隆十六年薨逝念臣小子穆恭循典例以嫡繼統謹遣耳目官正議大夫等䖍齎方物奏請循例封襲王爵二十年敕封尚穆爲琉球國中山王二十四年復遣官生梁文治等入監五十年御書海邦濟美扁額賜之六十年琉球國世子尚温恭逢國慶遠進表貢特頒敕諭並賚文綺等物嘉慶四年冊封尚温為琉球國中山王御書海表恭藩四字賜之十二年琉球國世孫尚灝嗣立詔封如例自後二年一貢其國有三十六島風俗風土氣候與嶺南相類隋書望月盈虧以紀時節候草木榮枯以為年歲北史去髭黥手羽冠毛衣寰宇記人皆深目長鼻男子去髭鬚婦人以墨黥手為龍蛇文文獻通考男女皆紵繩纒髪從後盤繞至額其男子用鳥羽為冠裝以珠貝飾以赤毛形製不同婦人以羅文白布為帽其形方正鬭鏤皮并雜毛以為衣製裁不一綴毛垂螺為飾雜毛相間下垂小貝其聲如珮綴璫施釧懸珠於頸織藤為笠飾以毛羽深目長鼻名有小慧隋書無禮節好剽掠寰宇記無君臣上下之節拜伏之禮父子同牀而寢男女相悦便相配偶婦人産乳必食子衣明統志无好剽掠故商賈不通人喜鐵器不駕舟楫惟縛竹爲筏急則羣舁之浮水而遁火耕水耨文獻通考厥田良沃先以火燒而引水灌之特一鍤以石爲刃長尺餘闊數尺而墾之宜稻粱禾黍麻豆赤豆胡黒豆等木有楓栝松楩楠枌梓果藥同於江表家織蕉布汪楫使琉球雜錄農習於惰紝婦較耕男爲勤家織蕉布非是則無以爲衣也負薪運水亦婦人爲之曝海爲鹽木汁爲醋米麴爲酒寰宇記以木槽中曝海水爲鹽木汁爲醋米麴爲酒其味甚薄食皆用手遇得異味先進尊者凡有宴㑹執酒者必待呼名而後飲上王酒者亦呼王名後銜盃同飲頗同突厥歌呼蹋蹄一人唱衆皆和音頗哀怨扶女子上膊摇首而舞胡靖崇禎癸酉記錄肴饌盡乾製無調羹各盤貯而不相共飲酒止以一盃相傳有我合彼分我分彼合之别土多山洞洞有小王寰宇記琉球國自隋聞焉居海島中當建安郡之東水行五日而至土多山洞其王姓歡斯氏名渇刺兠不知其由來有國代數也彼土人呼之爲可老羊妻曰多拔茶所居曰波羅檀洞塹柵三重環以流水樹棘爲藩王所居舍其大十六間雕刻禽獸國有四五帥統諸洞洞有小王往往有村村有鳥了帥並以善戰者爲之自相樹立理一村之事兵有刀矟弓箭劍鈹之屬編紵爲甲或用虎豹之皮王乘木獸今人舉之而行導從不過數十人國人好相攻擊人皆驍健善走難死而耐創諸洞各爲部隊不相救助兩軍相當勇者三五人出前跳譟交言相罵因相擊射如其不勝一軍皆走遣人致謝即共和解收取鬭死者衆食之無賦斂有事則均稅用刑亦無常準皆臨事科決文獻通考其民犯罪皆斷於鳥了帥不伏則上請於王王令臣下共議定之獄無枷鎖惟用繩縛決死刑以鐵椎大如筯長尺餘鑽頂殺之周煌琉球國志略云其國刑法有死刑三一凌遲一斬首一槍刺輕刑五一流一曝日一夾一枷一笞近奉正朔設官職被服冠裳表陳章奏以土官為武職司朝貢者為文職續文獻通考其大夫長史通事官司朝定員為文職皆明所賜三十六姓子孫為之土官則有名無姓也著作篇什有華風焉張學禮中山記云官宦之家俱有書室客軒架列四書唐詩通鑑等集板翻高闊旁譯土言云宫殿門皆西向皇朝文獻通考其國山形本南北向以中國在海西王殿及門皆西向表忠順内面之意貢使至京必候賜時憲書歸國通事官豫依萬年書推算名曰選日通書權行國中俟憲書頒到通國遵用分土為祿官級以簪為差等皇清職貢圖王與臣民分土為祿夷官品級以金銀簪為差等用黄綾絹摺圈為冠寛衣大䄂繫火帶官婦髻插金簪不施脂粉衣以錦繡其長覆足營海利工紡績皇清職貢圖男服耕作營海利土人結髻於右漢種結髻於左布衣草履出入常攜雨葢婦人短衣長裙以幅中披肩背間見人則升以蔽面常負物入市交易亦工紡績山川北山在國境西南與日本接界明萬厯中福建巡撫許孚遠奏云琉球近歲為關白優害蓋因地勢連屬無波濤之險由薩摩開船四日可至琉球北山延袤三百餘里隨路有山早行夜宿關白見其路順欺其國弱聲言發船來伐要彼北山屯兵若果據北山琉球必為所得而閩廣為其出沒之地盤據騷擾將無安日即指此山也按故山北王國以此山名與中山山南為三琉璜山亦在國境西南地名尤家埠山形圓卑如覆盂四面無址虎萃峯在國城内殿後其下有小廟無像但設香供於地又殿前有石壁高數丈闊二十餘丈平如斧削中有一穴穴口嵌一鐵龍頭龍口内有泉噴出從空注下即大旱之年水亦不竭高華嶼隋書自義安浮海至高華嶼又東路二日至龜鼊嶼又一日便至琉球按二嶼俱隋陳稜率兵過此落漈元史水至彭湖漸近琉球謂之落漈者水趨下不迴也凡西岸漁舟至彭湖遇颶風作漂流落漈囘者百之一二續文獻通考嘉靖中國王遣使蔡瀚奉表謝又請云明統志中載琉球有落漈王居壁下聚髑髏非實事杜氏通典集事淵海蠃蟲錄星槎勝覽所述亦傳者妄也乞下史館從之那壩港在國城外二十餘里離海口三里許其間里巷相連人居稠密又有地名玖米亦見章奏龍潭在國城西潭中二山並峙一名石筍一名龍岡其國人於端陽日為龍舟競渡之戲於此古蹟三嶼故國名近琉球元世祖至元三十年欲遣人招誘之平章政事巴延言此國之人不及二百萬乞不遣使從之巴延舊作伯顔今改正三清殿在那壩港東北三里殿前有二松樹大數圍高二十餘丈天妃廟在三清殿東其東有演武場場南有長虹橋廣丈餘長五里橋下大水名曰曼湖通海過橋有松嶺長二十里松楸滿目蒼翠鬱然亦琉球之一景也迎恩亭在那壩港地方明洪武時建離海口三里許即天使登岸之所天使館近迎恩亭向來冊封員役俱駐於此館中有㕔堂廊房樓閣園亭臺榭書室小軒周圍寛廣館内鋪設什物俱照中國制度設專司收貯在庫俟天使至日方敢動用後樓上尚有明季使臣杜三䇿題梅花詩百首於壁間其餘吟詠甚多外有扁額字畫皆明厯代名公之遺蹟也館前有空地百畝每日午後婦女或老或少攜筐挈莒聚集於此為貿易實遊玩也山北王墓在今歸仁運天村土人呼為按司墓尚圓王祖塋在葉壁山中有一山宛轉如游龍中山王祖塋在國城内西南塋中無冢惟石碑上刻琉球中山王祖塋塋前五峯相對遠山圍抱又有中山王家廟離那壩港數里官民經過下馬步行殿中所供牌位自唐宋以來子孫不替云土產熟琉璜紅銅以上俱入貢鬭鏤樹寰宇記鬬鏤樹似橘而葉密條纖如髮紛然垂下金荆榴續文獻通考木色如真全密緻而文彩盤錯有如美錦甚香可以為枕及案面雖枕檀不能及海螺殻白剛錫胡椒番茹狀如薯蕷番紙蕉布苧布紅花蘇木鬃煙大清一統志荷蘭在西南海中亦曰紅夷俗稱紅毛國其貢道由福建以達於京師建置沿革自古荒服之地不通中國相傳在西洋中其地近佛郎機其人深目長鼻髮眉鬚皆赤足長尺二寸頎偉倍常故名紅夷又名紅毛番明萬厯中佛郎機市香山據吕宋荷蘭聞而慕之明史萬厯中福建商人嵗給別往販大泥吕宋及咬𠺕吧者和蘭人就諸國轉販未敢窺中國也自佛郎機市香山據吕宋和蘭人聞而慕之二十九年駕大艦攜巨礮直薄吕宋吕宋人力拒之則轉薄香山㠗言欲通市當事難之㠗中人慮其登陸謹防禦始引去三十二年七月駕二大艦直抵彭湖至十月末乃去是時佛郎機横海上紅毛與爭雄攻破美洛居國與佛郎機分地而守後又因咬𠺕吧假臺灣之地於日本築安平赤篏二城倚夾板船為援戰久留不去海上奸民䦨出貨物與市尋復出據彭湖築城設守已又泊舟風櫃仔出沒浯㵰白坑東椗莆頭古雷洪嶼沙洲甲洲間要求互市濱海郡邑為戒嚴天啟三年巡撫南居益謀討之上言臣入境以来聞番船五艘續至與風櫃仔船合凡十有一艘其勢愈熾有小校陳士瑛者先遣往咬𠺕吧宣諭其王至三角嶼遇紅毛船言咬𠺕吧王已往阿南國因與士瑛偕至大泥謁其王王言咬𠺕吧國主已大集戰艦議往彭湖求互市若不見許必至搆兵蓋阿南即紅毛番國而咬𠺕吧大泥與之合謀必不可以理諭為今日計非用兵不可因列上詞兵足餉方略部議從之四年正月遣將先奪鎮江港而城之且築且戰番人乃退守風櫃城居益増兵往助攻擊數月宼猶不退乃大發兵諸軍齊進㓂勢窘兩遣使求緩兵遂揚帆去彭湖之警始息而其據臺灣者猶自若也崇禎中為鄭芝龍所破不敢窺内地者數年乃與香山佛郎機通好私貿外洋十年駕四舶由虎跳門薄廣州㝷遁歸臺灣本朝順治九年偽鄭成功率舟師攻安平城荷蘭戰敗因棄臺灣而去十年廣東巡撫奏稱荷蘭國遣使航海請修朝貢十三年貢使嗶嚦哦嘢哈哇㘃等到京其貢道由廣東入康熙三年荷蘭國遣出海王統領兵船至閩安鎮助剿海逆克取厦門金門特頒敕諭二道遣官齎賞賚銀緞至福建令給付本國人帶歸五年荷蘭國王表貢方物二十五年改定荷蘭國貢道由福建入是年荷蘭國遣使獻方物以貢船例由廣東入但廣東路近而泊地險福建路遠而泊地穩請嗣後由福建入部議如所請自是職貢彌謹雍正初年通市不絶夏秋交來廣由虎門入口至冬乃囘乾隆元年特命裁減荷蘭税額二十七年准荷蘭國夷商每船配買土絲五千斤後又准每絲千斤扣帶綢緞八百斤著為例五十年上幸瀛臺荷蘭國貢使於西苑門外瞻覲宴賞優渥賜國王綵緞羅綺文玩諸珍錫之敕諭以嘉悃忱五十九年荷蘭國王遣使入貢宴賞如例按荷蘭明史謂之和蘭其本國在西洋者去中華絶遠華人未嘗至其所恃惟巨舟大礟舟長三十丈廣六丈厚二尺餘樹五桅後為三層樓旁設小牕置銅礮桅下置二丈巨鐵礮發之可洞裂石城震數十里世所稱紅夷礮即其製也然以舟大難轉或遇淺沙即不能動而其人又不善戰故往往挫衂其所役使名烏鬼入水不沈走海面若平地其柁後置照海鏡大徑數尺能照數百里云風俗奉天主敎深目長鼻髪眉鬚皆赤國土富遇中國貨物當意者不惜厚貲明史夷人黒氊為帽著錦繡絨衣握鞭佩劍遇人則免冠挾之以為禮夷婦青帕蒙頭領圍珠石肩披巾縵敞衣露胸繫長裙以朱草為屨皇清職貢圖土產馬珊瑚哆囉絨織金氊嗶吱緞鏡丁香檀香自鳴鐘冰片琥珀鳥槍火石以上俱入貢金銀瑪瑙玻瓈刀劍可屈伸縈繞如帶天鵞大清一統志西洋在西南海中其貢道由廣東以達於京師建置沿革去中國極遠於古無可考至明萬厯九年有利瑪竇者始汎海抵廣州之香山嶴二十九年入於京師中官馬堂以其方物進獻自稱大西洋人是時禮部言會典止有西洋瑣里國無大西洋其真偽不可知又寄居二十年方行進貢則與遠方慕義特來獻琛者不同况此等方物未經臣部譯驗徑行進獻則内臣混進之非與臣等溺職之罪俱有不容辭者及奉㫖送部乃不赴部審譯而私寓僧舍不知何意乞給賜冠帶還國勿令潛居兩京與中人交往别生事端不報帝嘉其遠來給賜甚厚瑪竇安之遂留居不去嗣是以後其徙來者益衆皆祖述其説盛相矜誇瑪竇有萬國全圖其大略言天下有五大州第一曰亞細亞州第二曰歐邏巴州第三曰利未亞州第四曰亞墨利加州最後得墨瓦蠟泥加州為第五而域中大地盡矣其所謂亞細亞州者自中國以至日本交趾西域等國皆是也其所謂歐邏巴州者則南至地中海北至青地及冰海東至大乃河墨阿的湖大海西至大西洋共七十餘國自國王以及庶民皆奉天主耶蘇敎即瑪竇等所生之本國也其所謂利未亞州者南至大浪山北至地中海東至西紅海聖老楞佐島西至阿則亞諾海大小共百餘國其所謂亞墨利加州者地分南北中有一峽相連峽南曰南亞墨利加南起墨瓦蠟泥海峽北至加納達峽北曰北亞墨利加南起加納達北至冰海東盡福島地最廣大其所謂墨瓦蠟泥加者因以西把泥亞國王念地為圜體徂西自可達東乃命其臣墨瓦蘭者往訪沿亞墨利加東偏展轉經年忽得海峽亘千餘里海南大地杳無涯際以墨瓦蘭首開此區遂即其名命曰墨瓦蠟泥加云四十四年禮部侍郎沈㴶給事中晏文輝等合疏斥其邪説惑衆且疑為佛郎機假託乞急行驅逐帝納其言始令俱遣赴廣東聽還本國命下久之遷延不行至崇禎初厯法疏舛禮部尚書徐光啟請令西洋人羅雅谷湯若望等以其國新法相叅校開局纂修報可書成未上會本朝建元始採取其説命若望等理欽天監事即醫學亦間用之康熙九年西洋國始遣使嗎吻薩喇噠㘃到京具表進貢十七年其國王阿豐速遣使進獅子雍正三年意達里亞國敎化王伯納第多遣使奉表進貢五年西洋博爾都噶爾國王若望復遣使奉表進貢乾隆十八年復遣使進貢嘉慶十六年嚴定西洋人傳敎治罪專條先是康熙八年五十六年屢禁西洋人在内地開堂傳教雍正元年奏定西洋人除進京效力人員外俱安置澳門不准於内地傳敎乾隆五十年釋西洋人吧吔哩咉等十二犯於獄其願留京城者准其赴堂安分居住如情願囘者即押送囘澳不許在各處潛藏煽惑滋事嘉慶十六年仁宗睿皇帝諭曰西洋人素奉天主其本國之人自行傳習原可置之不問至若誑惑内地民人甚至私立名號蔓延各省實屬大千法紀著該管大臣查明除在欽天監推步供職外其餘西洋人遣令歸國其在京當差之西洋人仍當嚴加約束禁絶旗民往來以杜流弊至外省地方即不應有西洋人在境潛住除廣東省向有西洋人貿易居住之處留心管束勿任私行傳敎不遵禁令者按例懲治外其餘各直省通行詳查其國地之遠近舊史不載今據利瑪竇及南懷仁等所紀歐邏巴州之地共七十餘國其大者曰以西把尼亞在歐邏巴之極西周一萬二千五百里其地三面環海一面臨山産駿馬五金絲綿細絨白糖國人好學有共學二所遠近學者聚焉國中有二大名城一曰色未利亞近地中海為亞墨刺加諸舶所聚金銀如土奇物無數多亞利襪果有一林長五百里者一名多勒多城在山巔運水甚難巧者製一水器盤水至城不賴人力其器晝夜自能轉動又有渾天象其大如屋人入其中見各重天之運動其度數皆與天合國中天主堂極多近國王又造一大堂修道之士環居内有三十六祭臺中臺左右有編簫二座中各有三十二層每層百管管各一音合三千餘管凡風雨波濤謳吟戰鬬與百鳥之聲皆可模仿本國之西有波爾杜瓦國四方商船皆聚產果實絲綿極美水族亦繁歐邏巴初通海道周經利未亞過大浪山抵小西洋至中國貿易者從此國始拂郎察在以西把尼亞東北周一萬一千二百里分十六道屬國五十都城名把理斯設一共學生徒嘗四萬餘併他方學共七所又設社院以敎貧士一切供億皆王主之其先嘗因囘囘佔如德亞地興兵伐之始製大銃曰囘遂稱西土人為佛郎機銃亦沿此名是國之王神能以手撫人􅐇瘡應手而愈每歲一日療人先期齋戒三日凡患此疾者豫集天主殿中國王舉手撫之國土膏腴物力豐富意大里亞在拂郎察東南周圍一萬五千里三面環地中海一面臨高山有一千一百六十六郡最大曰羅瑪城周一百五十里地有大渠穿出城外百里以入於海四方商舶悉輸珍寶駢集是渠敎王居於此列國之王雖非其臣咸致敬盡禮認為代天主敎之君也羅瑪城奇觀甚多宰輔家有名苑中造流觴曲水又銅鑄各類羣鳥遇機一發自能鼔翼而鳴各具本類之聲又有石柱外周鏤形象爛然可觀内則空虚可容數人登隮上下如塔然城中大山曰瑪山人煙稠密苦無泉造一高梁長六十里梁上立溝接遠山之水如通流河西北為勿搦祭亞城建海中有一種木為樁入水千年不朽其上鋪石造屋備極精巧城内街衢俱是海兩旁可通陸行城中有舶二萬又有橋梁極闊上列三街俱有民居不異城市其高可下度風帆國中精於造舟豫庀物料一舟指顧可成造玻璃極佳甲於天下有勿里諾湖在山巔從石峽瀉下聲如迅雷聞五十里日光耀之恍愡皆虹蜺狀又有沸泉不可染指投畜物於内頃刻便糜爛其南為納波里地極豐厚從納波里至左里城石山相隔國人穴山通道長四五里廣容兩車對視如明星其四周皆小山山洞甚多入内可療病各主一疾如欲汗者入某洞則汗至欲除溼者入某洞則溼去意大里亞名島有三一西齊里亞地極富庶有大山噴火山四周多草木積雪不消常成晶石沸泉如醋物入便黒國人最精天文造日晷法自此地始有巧工德大祿者造百鳥能飛即微如蝇蟲亦能飛更有天文師名亞而幾墨得者有三絶昔敵國駕數百舶臨其島彼則鑄一巨鏡映日注射敵舶光照火發數百舶一時燒盡又其王命造一極大舶舶成將下海雖傾一國之力用牛馬駱駝千萬莫能運幾墨得營運巧法第一舉手舟如山岳轉動須臾下海又造一自動渾天儀十二重層層相間七政各有本動凡日月五星列宿運行遲疾與天無二以玻璃為之重重可透視旁近有瑪兒島不生毒物蛇蝎等皆不螫人毒物自外至輒死一哥兒西加有三十三城產犬能戰一犬可當一騎其國布陣毎騎間一犬反有騎不如犬者又近熟奴亞一雞島滿島皆雞自生自育絶非野雉之屬熱爾瑪尼亞在拂郎察東北國王不世及乃七大屬國之君所共推者或用本國臣或用列國君須請命教王立之其土人散處各國為兵極忠實至死不二各國䕶衞宫城或從征他國皆選此國人充之工作精巧能於戒指内納一自鳴鐘又有法蘭哥地人最質直易信行旅過者輒詈之客或不答則大喜延入具酒食謂此人已經嘗試可信託也多葡萄善造酒但沽與他方過客土人滴酒不入口也其屬國名波液米亞者地生金掘井恒得金塊重十餘斤河底嘗有金如豆粒有羅得林日亞國最侈汰其王一延客堂四周皆列珊瑚琅玕交錯儼如屏障拂蘭地亞在亞勒馬泥亞西南地不甚廣人居稠密婦人貿易無異男子能手作錯金絨不煩機杼布最輕細皆出此地波羅泥亞在亞勒馬尼亞東北地甚冷冬月海凍行旅於冰上厯幾晝夜望星而行其屬國波多里亞地易發生種一歲有三歳之獲海濱出琥珀是海底脂膏從石隙流出初如油出穴便凝每為大風衝至海濱翁加里亞在波羅泥亞南物産極豐牛羊可供歐邏巴一州之用有四水甚奇其一從地中噴出即凝為石其一冬月常流至夏反合為冰其一以鐵投之便如泥再鎔又成精銅其一水色沈綠凍則便成綠石永不化大泥亞諸國歐邏巴西北有四大國曰大泥亞曰諾而勿惹亞曰雪際亞曰鄂底亞與熱爾瑪尼亞相隔一海套道阻難通其南夏至日長六十九刻其中長八十二刻其北夏至日輪横行地面半年為一晝夜其大泥亞國沿海産菽麥牛羊最多海中魚蔽水面不藉網罟隨手取之不盡本國一世家名第谷建一臺於高山絶頂以窮天象究心三十餘年累黍不爽所制窺天之器窮極杳渺今為西土推算之宗其諾而勿惹亞寡五榖山多材木鳥獸海多魚鼈人性馴厚喜接遠方賓旅絶無盜賊雪際亞地分七道屬國十二歐邏巴北稱第一富庶多五榖五金財貨百物貿易不以金銀以物相抵人好勇亦善遇遠方人鄂底亞在雪際亞之南亦繁庶厄勒祭亞在歐邏巴極南地分四道凡禮樂法度文字興籍皆為西土之宗其人喜啖水族不嘗肉味亦嗜美酒東北有羅馬泥亞國都城周裹三層生齒極衆城外居民延亘二百五十里一聖女殿門開三百六十以象周天附近有高山名阿零薄山頂終歲清明無風雨有河水一名亞施亞白羊飲之變黒一名亞馬諾黒羊飲之變白有二島一為厄歐白亞海潮一日七次一為哥而府圍六百里出酒與油蜜極美遍島皆橘柚香櫞之屬莫斯哥未亞在亞細亞北盡境東西萬五千里南北八千里中分十六道有窩兒加河最大文河八十皆為尾閭以七十餘口入北高海兵力甚强日事吞併其地夜長日短冬至日止二時氣候極寒雪下堅凝室宇多用火温行旅為嚴寒所侵血脈皆凍如驀入温室耳鼻輒墮每自外來者先以水浸其軀俟僵體漸甦方可入温室八月至四月皆衣皮裘產皮處用以充賦税所造大銃長三丈七尺用藥二石内容二人埽除又有蜜林其樹悉為蜂房國人各界其樹為恒産風俗尚天主敎通推算善製造南懷仁坤輿圖説云歐邏巴州大小諸國自王以及庶民皆奉天主敎纖毫異學不容竄入其婚娶男子三十女子至二十外臨時議婚不預聘通國皆一夫一婦無有二色者土多肥饒産五榖以麥為重果實更繁出五金以金銀銅鑄錢為幣衣服蠶絲者有天鵞絨織金緞之屬羊絨者有毯罽鎖哈喇之屬又有利諾草為布細而堅輕而滑敝可搗為紙極堅靭君臣冠服各有差等相見以免冠為禮男子二十以上㮣衣青色兵士勿論女人以金寶為飾服御羅綺佩帶諸香酒以葡萄釀成不雜他物可積至數十年膏油之類味美者曰阿利襪是樹頭果熟後全為油飲食用金銀玻璃及瓷器其屋有三等最上者純以石砌其次甎為墻其下土為墻築基最深上累六七層高至十餘丈瓦或用鉛或輕石板或陶瓦工作製造備極精巧其駕車國王用八馬大臣六馬其次四馬或二馬戰馬皆用牡騸過則弱不堪戰矣諸國皆尚文學國王廣設學校一國一郡有大學中學一邑一鄉有小學小學選學行之士為師中學大學又選學行最優之士為師生徒多者至數萬人分為四科聽人自擇一曰道科主興教化一曰敎科主守敎法一曰治科主習政事一曰醫科主療疾病凡四科官祿入皆厚養廉有餘尚能推惠貧乏諸國所讀之書一以天主經典為宗在處皆有貧院專養鰥寡孤獨及殘疾之人又有幼院以育小兒有病院養疾病各城邑遇豐年多積米麥饑歲以常價糶之國中有天理堂選盛德宏才無求於世者主之凡有舉動征伐必先質問合天理否以為可然後行諸國賦税不過十分之一民皆自輸無徵比催科之法詞訟極簡小事里中和解大事乃聞官凡官府判事不先事加刑必俟事明罪定然後刑之按皇清職貢圖意大里亞國人善行賈多富厚肌膚白晳鼻昂而目深碧不蓄鬚髪别編義髪蒙首以黒氊折三角為帽短衣革屨袴韈束迫如行縢婦人螺髪為髻領懸金殊寳石上衣下棠用錦帕覆背謂之巾縵俗重女輕男相悦為婚又合勒未祭亞省國人軀體壯闊極忠義受德必