front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_199-1a}
body:
  text: 朝貢各國朝鮮在盛京東一千八百里東西距二千里南北距四千里東至海七百七十里南至海一千三百里西南至海八百里西北至鴨綠江七百五十里北至九連城一千一百十五里其貢道自鳳凰城至京師三千九十六里分野天文箕星分野析津之次建置沿革古營州外域周封箕子於此戰國時屬燕秦為遼東外徼漢初仍屬燕國燕王盧綰叛入匈奴燕人衞滿亡命聚此逐箕準自王都王險史記索隱遼東有險瀆縣即朝鮮王舊都惠帝時兼有獩貊與高句驪沃沮地凡數千里傳子及孫右渠武帝元封三年遣樓船将軍楊僕等擊滅之因分置樂浪臨屯元菟真番四郡昭帝時省臨屯真番二郡入元菟徙居高句驪西北其沃沮獩貊分七縣置樂浪東部都尉轄之光武建武六年省都尉棄七縣地順帝陽嘉元年置元菟郡屯田六部漢末有扶餘人高姓者據其地改國號曰高驪又曰高句驪通典高句驪本出於大餘先祖朱蒙朱蒙母河伯女爲夫餘王妻日所照遂有孕而生及長名曰朱蒙俗言善射也國人欲殺之朱蒙棄夫餘東南走渡普述水至紇升國城遂居焉焉曰句驪以高爲氏三國魏正始五年幽州刺史母邱儉討破之尋復據其地晉咸康八年其王高釗為慕容皝所破至曽孫連益强并有朝鮮諸地都平壤城即朝鮮國王險城也國内分八道中曰京畿東曰江源本獩貊地西曰黄海古朝鮮馬韓舊地南曰全羅本弁韓地東南曰慶尚本辰韓地西南曰忠清古馬韓地東北曰咸鏡本高句驪西北曰平安本朝鮮故地義熙九年遣使表獻以連為使持節都督營州諸軍事征東將軍高句驪王樂浪公劉宋初加連征東大將軍都督平州諸軍事元嘉十二年連遣使入貢於魏魏封為高句驪王齊永明九年連卒子雲嗣請命於魏明年魏主宏冊雲督遼海諸軍事遼東公高句驪王梁天監十八年雲卒子安立遣使入貢於梁梁以安為安東將軍高句驪王後亦臣附於東魏高齊齊亡益并有遼東地隋開皇中高麗王元帥靺鞨之衆寇遼西隋遣漢王諒總兵討之次遼水元遣使謝罪乃罷兵大業中屢出師征高麗俱不能克唐武德四年高句驪王建武遣使入貢建武即元之弟七年冊為遼東郡王貞觀十六年高麗西部大人蓋蘇文弑其王建武改立其弟子臧十八年伐高麗明年親征諸軍分道並進克遼東等數城而還自是數遣軍伐高麗高宗顯慶五年滅百濟以其地置熊津馬韓東明金漣德安五都督府總章元年李勣征高麗拔平壤置安東都䕶府由此高氏遂滅儀鳳初新羅據其地開元以後并於渤海大氏五代史渤海本號靺鞨高麗之别種也唐高宗滅高麗徙其人散處中國置安東都䕶府於平壤以統治之武后時契丹攻北邊高麗别種大乞乞仲象與靺鞨酋長乞四比羽走遼東分王高麗故地武后遣將擊殺乞四比羽而乞乞仲象亦病亡仲象子祚榮立因并有比羽之衆其衆四十萬人據挹婁臣於唐中宗時置忽汗州以祚榮為都督封渤海郡王其後世遂號渤海文獻通考初渤海王數遣諸生詣京師太學習識古今制度至為海東盛國地有五京十五府六十二州以肅慎故地為上京曰龍泉府領龍湖渤三州其南為中京曰顯德府領盧顯鐵湯榮興六州獩貊故地為東京曰龍原府亦曰柵城府領慶鹽穆賀四州沃沮故地為南京曰南海府領沃晴椒三州高麗故地為西京曰鴨綠府領神桓豐正四州曰長領府領瑕河二州夫餘故地為夫餘府常屯勁兵捍契丹領扶仙二州鄚頡府領鄚高二州挹婁故地為定潘府領定潘二州安邊府領安瓊二州率賓故地為率賓府領華益建三州拂涅故地為東平府領伊蒙沱黒比五州鐵利故地為鐵利府領廣汾蒲海義歸六州越喜故地為懷遠府領達越懷紀富美福邪芝九州安遠府領安郿慕常四州又郢銅涑三州為獨奏州涑州以其近涑沫江蓋所謂粟末水也龍原東南濱海日本道也南海新羅道也鴨綠朝鮮道也長領營州道也夫餘契丹道也天祐初大氏衰有眇僧躬乂者聚衆據開州稱王號大封國遂有高麗故地五代梁龍德二年高麗人王建者起兵為海軍統帥襲殺躬乂自稱高麗王後唐清泰末建引兵擊破新羅百濟而并其地於是東夷之地皆附之地益拓其國北鄰契丹西則女直南曰日本建都於松岳即開州也謂之東京而以平壤為西京又置六府九節度百二十郡以理其地晉開運二年建卒子武代立自後子孫遣使貢於宋亦朝於遼金宋嘉定十二年高麗王暾附於蒙古既而中絶紹定五年蒙古主諤格台諤格台舊作窩濶台今改正遣兵伐高麗其王暾復請降因置京府縣達嚕噶齊達嚕噶齊舊作達魯花赤今改正七十二人監其國端平初悉為高麗所殺自是四遣兵攻之拔其城十有四大要旋服旋叛元至元中其西京内屬因置東安路總管府畫慈悲嶺為界大德三年又置征東等處行中書省尋罷至治三年復置命其王為左丞相至正之季始貳於元明洪武二年高麗王顓表賀貢方物且請封詔封為高麗國王五年顓為權相李仁人所弑顓無子以寵臣辛肫之子禑為子於是仁人立禑二十一年禑遜位於子昌二十二年其門下侍中李成桂廢昌而復立王氏裔定昌國君瑶二十五年成桂徒瑤出居原州而自立更名旦遣使請改國號帝命仍古號曰朝鮮至是王氏始絶萬厯二十年為日本關白平秀吉所侵掠朝鮮王李昖奔平壤己復走義州八道幾盡沒遣使求援中國乃以宋應昌為經畧李如松為提督分布諸將攻戰終莫能勝二十六年平秀吉死諸倭徹兵歸朝鮮之禍始息本朝天聰元年太宗文皇帝命大貝勒阿敏貝勒濟爾哈朗等征朝鮮屢戰皆捷遂克義州分兵搗鐵山又克安州至平壤城朝鮮國王李倧懼攜妻子遁江華島遣其弟李覺來貢獻求和許之以李覺還尋遣歸七年朝鮮復皆盟遣英俄爾岱等齎書往責之崇德元年復遣朝鮮使臣羅德憲李廊歸國遣書國王不報是年上親率和碩禮親王代善睿親王多爾衮等征高麗渡鎮江至郭山城及定州安州進圍朝鮮王都李倧遣妻子入島而自遁入南漢山城就圍之分兵敗其諸道援師李倧哀詞求和始許其出城歸命然倧猶疑懼不敢出未幾睿親王多爾衮破江華島獲倧妻子及羣臣妻子令其内侍䕶至軍并遺以書倧乃率其長子􅓭及羣臣朝服出降伏地請罪上慰諭賜坐宴之還其妻子及羣臣春屬封其國主為朝鮮國王賜誥命給龜紐金印封王妻為妃王子為世子賜裘帽貂皮鞍馬遣人送入王都至是朝鮮遂服慶賀大典俱行貢獻禮於太宗文皇帝駐軍之地豎立石碑備書其事云碑文曰大清崇德元年冬十有二月寛温仁聖皇帝以敗和自我始赫然怒以武臨之直搗而東莫敢有抗者時我寡君棲於南漢􅏮􅏮若履春氷而待白日者殆五旬東南諸道兵相繼奔潰西北師逗撓峽内不能進一步城中食且盡當此之時以大兵薄城如霜風之捲秋籜鑪火之燎鴻毛而皇帝以不殺為武惟布德是先乃降勅諭之曰來朕全爾否則屠之有若英馬諸大將承皇命相屬於道於是我寡君集文武諸臣謂曰于托和好於大邦十年於兹矣由于惽惑自速天討萬姓魚肉罪在予一人皇帝猶不忍屠戮諭之如此予何敢不欽承以上全我宗社下保我生靈乎大臣協贊之遂從數十騎詣軍前請罪皇帝乃優之以恩一見而推心腹錫賚之恩遍及從臣禮罷即還我寡君於都城立招兵之南下者振旅而西撫民勸農遠近之雉舉鳥散者咸復厥居詎非天幸歟小邦之獲罪上國久矣已未之役都元帥姜宏立助兵明朝兵敗被擒太祖武皇帝止留宏立等數人餘悉放囘恩莫大焉而小邦迷不知悟丁卯歲今皇帝命將東征本國君臣避入海島遣使請成皇帝允之視為兄弟國疆土復完宏立亦還矣自兹以往禮遇不替冠蓋交跡不幸浮議煽動搆成亂梯小邦申飭邊臣言涉不遜而其文為使臣所得皇帝猶寛貸之不即加兵乃先降明㫖諭以師期剴切訓示不翅耳提面命而終未免焉則小邦羣臣之罪益無所逃矣皇帝既以大兵圍南漢而又命偏師先陷江都宫嬪皇子暨卿士眷屬俱被俘獲皇帝誡諸將不得擾害令從官及内侍看䕶既而大沛恩典小邦君臣及被獲眷屬復歸於舊霜雪變而為陽春枯旱轉而為時雨區宇既亡而復存宗社已絶而還續東土數千里咸囿於生成之澤此實古昔簡冊所罕覯也於戲盛哉漢水上游三田渡之南即皇帝駐蹕之所也壇場在焉我寡君爰命水部就其所増而高大之又伐石以碑之垂諸永久以彰夫皇帝之功之德直與造化而同流也豈特我小邦世世永賴抑亦大朝之仁聲武誼無遠不服者未始不基於兹也顧摹天地之大日月之明不足以彷彿於萬一謹載其大畧銘曰天降霜露載肅載育惟帝則之并布威德皇帝東征十萬其師殷殷轟轟如虎如貔西番窮髪暨夫北貉執殳前驅厥靈赫濯皇帝孔仁誕降恩言十行昭囘既嚴且温始迷不知伊慼自貽帝有明命如寐覺之我君祗服相率而歸匪惟怛威惟德之依皇帝嘉之澤洽禮優載色載笑爰束干矛何以錫之駿馬輕裘都人士女乃歌乃謳我君言旋皇帝之賜皇帝班師活我赤子哀我蕩析勸我穡事金甌依舊翠壇維新枯骨再肉寒荄復春有石巍然大江之頭萬載三韓皇帝之麻自後每年恭進萬夀聖節冬至元旦年貢等四貢俱於年終彚進遣正副使各一員以其國吏曹户曹禮曹等判書或以判中樞府事等官充之書狀官一員大通官三員押物官二十四員乾隆八年高宗純皇帝詣盛京國王李昑遣官接駕特賜式表東藩扁額十九年遣陪臣於盛京接駕賞賜如例四十一年李昑薨世孫李祘承襲四十三年上詣盛京遣官齎表迎駕特賜東藩濟美扁額四十八年八月上詣盛京值萬夀節賜國王扁額詩章及古稀說五十年舉行千叟宴命朝鮮酌派年六十以上者二三員充正副使豫兹盛典比於内臣上聞國王好學能詩賞内務府倣宋板五經全部並筆墨等物五十五年上八旬萬夀頒恩詔於朝鮮國王表賀貢方物嘉慶四年上高宗純皇帝尊諡國王遣使進表文方物仁宗睿皇帝嘉其恭謹准作年貢以示體卹五年李祘薨子玜立六年以本國辦理邪匪顛末臚章入告並稱餘孼未靖恐其潛入邊門上諭其嚴飭臣民敦崇正道飭沿邊大吏一體嚴查以示撫輯懷柔之意八年國王咨稱盛京高麗溝偷砍木植奸民劉文喜六名竄入其國緝獲劉青山蔡法二名劉文喜乘間復竄已將龍川府使等拏勘上嘉其恭謹以首犯已獲諭將勘處之員寛免十年上詣盛京遣官接駕特賜禮教綏藩扁額十二年以其國義州商人與邊民私市自將商人監禁並繳進銅鐵等物上奬其恭順厚賚之二十三年上詣盛京遣陪臣跪迎瞻覲賜御製詩章御書福字其國八道分統郡凡四十一府凡三十三州凡三十八縣凡七十京畿道治國城朝鮮都也亦曰漢城明初高麗王旦自開州徙此居七道之中稱為四塞領郡三曰楊根豐德水城府三曰漢城開城長湍州七曰楊廣潤驪果谷波縣三曰交河三登土山江原道治江陵府在國城東面本獩貊地漢為臨屯境領郡七曰忤城平海通州安越松岳旌善高城府五曰江陵淮陽山陟襄陽鐵原州四曰原江槐㝠縣十曰平康安昌烈山騏麟酒泉丹城蹄麟蔚珍瑞和歙各黄海道治黄州在國城西面古高麗馬韓舊地領郡三曰遂安延安平那府三曰平山瑞興承天州五曰黄白海愛仁縣八曰安岳三和龍岡咸從江西牛峯文化長淵全羅道治全州在國城南面本弁韓地後為百濟國唐顯慶五年蘇定方伐百濟擒其王置熊津等五都督府後井於新羅五代時高麗兼有其地圖經朝鮮地界正北從長白山發脈南跨全羅界西南盡於海日本對馬諸島偏在朝鮮海洋之東南與慶尚之釜山相對倭船止抵釜山不能越全羅至西海故八道之中惟全羅一道直北正南其迤西則與遼東對峙日本所以隔絶遼薊不通海道者恃有朝鮮而朝鮮所以保固邊陲控禦諸島者恃有全羅也志云全羅之地南濱大海東接慶尚為朝鮮門户倭犯朝鮮此其必由之道也領郡三曰靈巖古阜珍島府二曰全州南原州四曰羅濟光昂縣二十三曰萬頃茂長鎮安扶安全渠康津興德黄成樂安昌平濟南㑹安大江臨波古臯南陽富順扶安麻仁緒城海南神靈移安慶尚道治慶州在國城東南面本辰韓地後為新羅國濱海與日本相對為朝鮮之屏蔽領郡七曰蔚山咸陽熊川陜川永川梁山清道府六曰全海善山靖海密陽安東昌原州五曰慶泗尚晉蔚縣十二曰東萊清河義興聞慶巨濟昌安三嘉安陰義城山陰高靈守城忠清道治忠州在國城西南面本馬韓地王京居八道之中東隘為烏嶺忠州西隘為南原全州志云王京為朝鮮都㑹咸鏡忠清為犄角並稱天險領郡四曰清風温陽天安臨川州九曰忠清公矜靖幸興禮洪縣七曰永春報恩連山扶餘石城燕岐保安咸鏡道治咸興府在國城東北面本高句驪地領郡三曰端州蜀莫安遠府五曰咸興鏡城會安永興安邊州八曰延德開惠蘇合燕隋縣一曰利城平安道治平壤府朝鮮西境也東南去國城五百餘里漢曰樂浪郡後為高句驪王所都亦曰長安城一名王險城唐平高麗置安東都䕶府於此後没於渤海五代時高麗復取之為西京元至元六年其臣李延齡等以西京府州縣六十餘城來屬因改西京為東安府升東安路割靜義麟三州威遠一鎮屬娑娑府餘俱領於東安其城治類皆廢燬僅存空名耳元末復歸於朝鮮領郡十一曰嘉山价川郭山雲與熙川宜川江東慈山龍川順川博川府九曰平壤成川定遠昌城合蘭廣利見仁安邊江界州十六曰安定買義鋼鐵靈朔撫宿滑買青昇常銀縣六曰土山德川陽德江東中和泰川含資城在國城南境漢樂浪郡屬縣也後漢因之晉改屬帶方郡漢書地理志縣有水西至帶方入海隋大業中伐高麗分軍出含資道蓋以漢縣為名耳豐德城在國城南朝鮮置豐德郡於此明萬厯二十年倭自釡山潛渡臨津分兵陷豐德諸郡朝鮮王李昖倉卒棄國城奔平壤即此孟州城在國城西唐置孟州領三登一縣椒島椵島安德三鎮今州廢縣存吞列城在國城東南漢縣屬樂浪郡後漢省漢志注列水出分黎山西至黏蟬入海行八百二十里又有列口城亦在國城西南漢縣屬樂浪郡後漢省晉復置屬帶方郡胡三省曰冽水入海之口也漢元封二年楊僕擊朝鮮先至冽口張宴曰朝鮮有溼水洌水汕水三水合流為冽口是也丸都城在國城東北晉時高句驪依險為城謂之丸都旁多大山深谷通典漢建安中高麗王伊夷模更作新都於丸都山下在沸流水之東魏正始五年幽州刺史母邱儉以高句驪數侵叛督諸軍出元莬討之高句驪王位宫敗走儉追至頳硯懸車束馬以上丸都屠其城既而復都於此晉咸康八年高句驪與慕容皝接境皝謀擊之高麗以重兵備北道皝潛將勁兵四萬趣南道出其不意高麗王釗敗遁遂入丸都毁其城大掠而還唐書地理志自鴨緑江口舟行百餘里以小舫泝流東北行凡五百二十里而至丸都城臨屯城在國城西南漢元封二年置臨屯郡治東暆縣去長安六千一百三十八里領縣十五昭帝時郡廢漢志東暆縣屬樂浪郡是并廢縣又真畨城在國城西北漢元封二也後漢年置真番郡治霅去長安帝時亦并入樂浪六千六百四十里領縣十五昭郡按霅縣漢志不載徐廣曰遼東郡有番汗縣疑即真番開州城在國城西南二百里高麗所置州也左溪右山稱為險固亦曰松岳唐天祐初眇僧躬乂據此五代朱梁貞明五年入貢於淮南楊隆演後唐清泰末王建殺躬乂而代之仍都於此謂之東京亦曰開京宋大中祥符三年高麗臣康肇戕其主誦立誦兄詢而相之遼主隆緒討高麗渡鴨綠江康肇戰敗退保鋼州遼人進擒肇等追亡數十里鋼霍貴安等州皆降進攻開京詢棄城走平州遼人遂焚開京宫室府庫民廬俱盡兵還詢復葺開京而居之諸城亦復歸高麗今曰開城府平山城在黄州東北百里或曰舊名甑山府西接黄州東連平壤其相近者有瓊山今為平山府海州城在黄州西南二百餘里以濱海而名又東北即安岳縣也志云境内有安岳三和龍岡成從江西五縣長命一鎮今俱屬黄州皆唐置元因而不改南原城在全州東南與全州相犄角為國城要隘明萬厯中倭陷南原遂犯全羅進逼國城李如松謂全羅饒沃南原尤其咽喉是也其相近者有雲峯城亦為衝要濟州城在南原府南海島中亦曰濟州島朝鮮置州於此志云朝鮮之濟州猶中國之瓊州或曰即故躭羅也元大德五年置躭羅軍總管府又沿海立水驛自躭羅至鴨綠江并楊村梅口凡三十所今仍曰濟州又珍島城在濟州西海中珍島上亦曰珍島郡宋咸淳六年高麗叛人裴仲孫立高麗王植庶族子承化侯為王竄人珍島䝉古討平之大江城在南原府東南朝鮮所置縣也又東接慶尚之晉州明萬厯中倭屯釡山浦李如松分遣諸將屯大江忠州以扼之既而倭從釜山移西生浦劉綎留鎮朝鮮分屯慶尚及大江蓋扼要處也南陽城在南原府西北朝鮮之南陽縣也明萬厯二十二年李如松命將守南原分兵屯禦於此俱拔城在全州南北史百濟都俱拔城亦曰固麻城其外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀光城北方曰熊津城是也唐顯慶五年蘇定方下百濟留劉仁願守百濟府城即俱拔城也處仁城在全州西宋紹定六年蒙古主諤格台遣將薩里台攻高麗至國城南攻其處仁城即此又黨項城在全州東北唐貞觀十二年百濟與高麗連和伐新羅取四十餘城又謀取黨項城絶其貢道薩里台舊作撒禮塔今改正任存城在全州西古百濟所置城也唐龍朔初百濟餘衆叛劉仁軌破之於熊津江口其衆釋百濟府城之圍退保任存城任存百濟西部也依任存山而名三年仁軌遣兵攻任存城拔之又真峴城在全州北唐龍朔二年劉仁軌既解百濟府城之圍還軍熊津城有詔班師仁軌曰今以一城之地居敵中央動足輒為擒擄正宜堅守觀變乗便取之不可動也於是出兵掩其支羅城拔之并拔其尹城大山沙井等柵時敵以真峴險要加兵守之仁軌復伺其懈引兵襲據之遂通新羅運糧之路唐書百濟傳支羅真峴諸城俱在熊津之東周留城在全州西又西北有加林城唐龍朔三年百濟故將福信等據周留城劉仁軌既拔真峴諸將以加林水陸之衝欲先攻之仁軌曰加林險固攻之不易周留虜之巢穴宜先取之遂定計自熊津進破百濟之衆於白江口趨周留城拔之熊津城在全州西北即熊津江口百濟之險要也唐顯慶五年蘇定方討百濟自成山濟海百濟據守熊津江口定方擊破之直趨其都城遂克之置熊津都督府以守其地龍朔初年百濟復叛圍百濟府城詔劉仁軌赴援仁軌轉鬬而前所向皆下百濟立兩柵於熊津江口仁軌擊破之府城之圍遂解仁軌因駐守於此既而再破百濟餘衆於熊津之東復平百濟或曰今漢江口即古置城處也蔚山城在慶州西北即蔚山郡也南有島山不甚高而城皆依山險中有江通釡山寨陸路則由彦陽監通釜山明萬厯二十五年倭屯蔚山大帥麻貴攻之不克既而倭益築城寨據守於此謂之東路麻貴遂進師逼之據險收其禾稼倭詭却以誘之貴為所敗順天城在慶州西南明萬厯二十六年倭酋據此謂之西路朝鮮紀事倭酋行長據粟林臾橋建寨數重憑順天城與南海營相望負山襟水最為扼隘大帥劉綎攻之不能克泗州城在慶州西或曰即古泗城也唐龍朔𥘉百濟復叛與劉仁願等相持詔新羅應援新羅將金欽將兵至古泗為百濟所邀敗自葛嶺遁還今泗州相近有葛嶺道云明萬厯中倭據泗州謂之中路北倚晉江南通大海為東西聲援大帥黃一元克之尋復敗還晉州城在慶州西南明萬厯二十六年大帥董一元擊泗州倭進取晉州乘勝渡江南燬永春昆陽二寨倭退保泗州老營一元奪其城進逼新寨寨一面臨江一面逼陸引海為濠海艘泊寨下千計又築金海固城二寨為左右翼中通海陽倉一元攻之不克敗還晉州又有咸陽城在晉州西北朝鮮之咸陽縣也萬厯中倭犯咸陽晉州即此梁山城在蔚山城東北朝鮮之梁山郡也明萬厯中麻貴攻蔚山遣别將屯此以絶釜山彦楊之援又有永川郡在梁山東南又東與慶州接境昌平城在晉州東朝鮮所置縣也南濱晉江江之南為固城縣縣南有唐浦為海濱津要處安東城在慶州西朝鮮之安東府也志云府當馬嶺之南為東出慶州之道又義城在安東城西朝鮮之義城縣也亦曰宜城明萬厯二十五年督臣邢玠等議攻倭酋青正於慶州分兵屯義城東接慶尚西阨全羅云七重城在慶州北境内又有買肖城唐上元二年新羅拒命遼劉仁軌討之大破之於七重城詔以李謹行為安東鎮撫大使屯新羅之買肖城以經畧之新羅屢敗乃遣使入貢且謝得罪陜川城在慶州東北朝鮮之陜川郡也明萬厯二十二年李如松復王京分兵屯禦於此又東南曰熊川郡東濱大海公州城在忠州西南境其東近全羅道之南原府明萬厯二十五年倭入南原麻貴發兵屯公州城在忠州西其東接天安以拒之即此又清州郡郡西南接公州界開州城在咸興府西北遼史地理志本獩貊地高麗置慶州渤海為東京龍原府都督慶鹽穆和四州叠石為城周二十里遼太祖平渤海城廢宣帝伐新羅還復加完茸置開封府開遠軍又改為開州鎮國軍遼末入於高麗或謂之蜀莫郡圖經郡在開州之東又開遠廢縣故開州治也遼史地理志本柵城地高麗為龍原縣慶州治焉渤海因之遼初廢後復置熊山城在開州西遼史地理志唐薛仁貴征高麗與其大將温沙門戰熊山擒善射者於石城石城即開州城也渤海時龍原府統縣六曰龍原永安鳥山壁谷熊山白楊遼初廢鹽州城在開州西北遼史地理志州去開州百四陽接海格川龍十里本渤海置亦曰龍河郡統海河四縣遼初皆廢而鹽州仍舊又穆州城在開州西南一百二農郡領㑹農水岐順化美四十里渤海置亦曰會縣遼仍曰穆州治會農縣又賀州城亦渤海置亦曰吉理郡領洪賀送誠吉理石山四縣遼皆廢仍曰賀州與鹽穆二州俱隸於開州後入於高麗不耐城在咸興府北漢縣屬樂浪郡東部都尉治此後漢廢魏正始中幽州刺史母邱儉擊高句驪刊丸都山銘不耐城而還即此晉陳壽曰漢武置樂浪郡自單大嶺以西為樂浪自嶺以東七縣都尉主之皆以獩為氏即所謂不耐獩也高句驪城在咸興府東北漢縣為元菟郡治後漢因之志云縣本高句驪國地漢滅朝鮮以高句驪為縣仍封其種人為高句驪侯和帝元興以後屢犯遼東元菟寨延光中稍輯服曹魏時高句驪王位宫强盛寇西安平正始五年幽州刺史母邱儉破走之後復熾晉初高句驪亦曰句麗陳夀曰元菟郡𥘉治沃沮後為彝貊所侵徙郡句驪西北公孫氏據遼東置元菟郡於遼東東北二百里葢因舊名非復故治也晉元菟郡仍置高句驪縣蓋因公孫度所置耳德州城在咸興府西南唐置後因之元仍置德州領江東永清通海順化四縣安遠柔遠安戎三鎮後入於高麗仍曰德州又延州城在咸興府西北亦唐置今仍舊大行城在咸興府西南唐乾封三年李勣等敗高麗於薛賀水進拔大行城於是諸軍皆㑹乂進至鴨綠柵云王險城即平壤城漢應劭曰箕子故都也薛瓚曰王險在樂浪郡浿水之東漢初燕人衞滿渡浿水居上下障都王險武帝元封元年其孫右渠拒命遣樓船將軍楊僕自齊浮渤海左將軍荀彘出遼東誅之取其地改置朝鮮縣樂浪郡治焉晉永嘉以後沒於高麗義熙末其主高連居平壤城亦曰長安城隋大業八年伐高麗分兵出朝鮮道即此隋書高麗傳平壤城東西六里隨山屈曲南臨浿水開皇十八年伐高麗命周羅㬋將水軍自東萊泛海趨平壤不能達而還大業八年詔左右各十二軍分道伐高麗總集平壤明年復遣宇文述等趨平壤述不克至唐書太宗本紀貞觀十八年伐高麗命張亮以舟師自海道趨平壤明年拔遼東諸城攻安市未下江夏王道宗請以精卒乘虛取平壤既而降將高延夀亦請自烏骨城直取平壤不果龍朔初命蘇定方等討高麗進圍平壤不能拔總章三年李勣征高麗拔其平壤而高麗亡唐杜佑曰平壤即王險城也五代時王建據高麗始謂之西京云有潼關堡在平壤西境亦朝鮮所置戍守處也成州城在平壤東唐置元因之領樹德一鎮今曰成州府又北曰順川郡順川之西曰价川今曰价川郡皆唐舊名元因之江東城在平壤東高麗所置今曰江東郡志云郡逼臨大同江東岸渡江而南即中和縣宋嘉定九年契丹部長六哥竄入高麗據江東城金主阿固達遣兵攻滅之又理道記自黄海道之黄州鳳州至中和去國城不過三百六十里自中和縣而東即土山縣也二縣亦唐所置元因之屬東安路今仍舊阿固達舊作阿骨打今改正淥州城在平壤西遼史地理志高麗故道也渤海置為西京鴨淥府城高三丈廣輪二十里領神桓豐正四州神鹿神化劍門三縣遼改置淥州鴨淥軍統宏聞神鄉二縣後廢又桓州城在淥州西南二百里高麗謂之中都城領桓都神鄉浿水三縣遼廢縣存州仍隸淥州遼志晉時高麗創立宫闕於此國人謂之新國五世孫釗當晉康帝建元初為慕容皝所敗公室焚蕩蓋此處云遼末州廢郭州城在平壤西北唐置渤海因之後屬於遼載記初契丹以鴨綠江北予高麗高麗築興鐵通龍龜郭等州凡六城宋大中祥符五年契丹怒高麗擅弑立又不入朝議復取六州地或謂自開京東馬行七日有大寨廣若開京凡旁邑所貢珍異皆在焉其勝羅等州之南亦有二寨所積如之若大軍自鴨綠江並大河而上至郭州與大路㑹高麗可取也七年契丹遣耶律世良蕭屈烈與高麗戰於郭州破之元亦置郭州於此今曰郭山府鋼州城在平壤西北宋大中祥符中契丹擊高麗其將康肇敗保鋼州為契丹所擒即此其相近又有費貴等州或曰費州今買州之訛也貴州今渭州之訛也又嘉州城亦在平壤西北唐置元因之今曰嘉山郡西接義州境東接安州境保州城在平壤西北百餘里遼開泰三年以高麗王詢擅立問罪不服取其保定二州仍置保州治來遠縣亦曰宣義軍金初以高麗臣附割保州與之即今安州也其相近者有懷化軍亦遼開泰三年置隸保州金初亦入於高麗定州城在平壤西北三百餘里高麗置治定東縣遼取之仍曰定州亦曰保安軍後入於高麗今仍為定州西南與義州接界義州城在平壤西北四百二江明萬厯二十十里其西南為龍川郡皆濱鴨綠年朝鮮王李昖以關白之亂走義州請内屬即此又有晏家關在義州西南水東岸舊為津要又鐵州城亦在平壤西當鴨綠北唐所置州也元亦置鐵州領定戎一鎮今仍曰鐵州又西北曰靈州亦唐置元因之今仍舊又熙州城在鐵州東北唐置元因之今曰熙川郡又東曰撫州亦唐置元因之今仍舊定遠城在平壤北唐置屬安東都護府其後廢置不一元府今因之其南曰慈州城亦唐置元因仍曰定逺之今為慈山郡朔州城在平壤北唐置元因之今亦曰朔州東北有昌州城亦唐時故名也元因又之今曰昌城府宣州城在平壤東北二百餘里唐置屬安東都䕶府遼仍曰宣州亦曰定遠軍遼志開泰三年置治保州蓋渤海廢遼復置也元亦曰宣州屬東安路領安朔羣島二鎮即今之宣州郡宿州城在平殷州壤東北百餘里又東北曰城皆唐置元因之今仍舊雲州城在平壤東北唐置元因之今曰雲興郡又東北有博川城高麗所置也今仍曰博川郡西南與慈山郡接界東與价川郡接界志云郡城西有大定江或謂之大安江江之西岸有凌漢山嘉州城在今安州之西唐置元仍郡又有泰州城在定遠府曰嘉州今為嘉山西亦唐置元因之今曰泰山縣慕州城在綠州西二百地領慕化崇平里本渤海安遠府二縣遼改置慕州屬綠州後廢豐州城在綠州東北二百一十里渤海置亦曰盤安郡領安豐渤恪隰壤硤石四縣遼廢縣存州仍隸綠州後廢正州城在綠州西北三百八十里本沸流國故地後漢建安中為公孫康所併渤海置正州於此亦曰沸流郡以沸流水而名遼因之仍隸綠州後廢又東那城在正州西七十里渤海置遼因之仍屬正州後廢帶方城在平壤南漢縣屬樂浪郡公孫康置帶方郡於此晉因之後没於高麗通典後漢建安中公孫康分臨屯昭明二縣以南荒地置帶方郡前漢書地理志樂浪郡昭明註南部都尉治是也隋大業中伐高麗分兵出帶方郡即此劉氏拒却之或曰城在營州境内風俗俗知文字喜讀書五代史高麗傳飲食以籩豆官吏閑威儀宋徐兢圖經飲食用爼豆文字合楷隸上而朝列官吏閑威儀而足辭采下而閭胥陋巷經館書社三兩相望子弟未婚者則羣聚從師稍長則擇友講習喜飲酒歌舞或冠弁衣錦寰宇記修宫室祀靈星後漢書高句驪傳俗節於飲食而好修宫室又云好祀鬼神社稷靈星以十月祭天大㑹名曰東盟其國東有大穴號襚神亦以十月迎而祭之按東盟亦作東明靈亦作零戴折風巾服大袖衫北史高句驪傳人戴折風巾形如弁士加插二羽貴者紫羅為之服大袖衫大口袴素皮帶黄革履婦人裙襦加襈公㑹衣服皆錦繡金銀為飾按皇清職貢圖其民人戴黒白氊帽衣袴皆白布為之民婦辮髪盤頂衣用青藍色外繫長裙布襪花屨柔仁惡殺崇釋信鬼文獻通考堂上設席升必