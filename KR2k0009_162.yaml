母林氏相失其叔祖攜至臺灣以為己子明燦稍長始棯遭寇失母之故行求內地多年不獲與家人訣誓不見母不復生還乃於延平遇其母依族人以居遂迎歸孝養焉陳致遠字子靜臺灣人康熙二十二年以軍功署參將從施琅攻克澎湖衝鋒陷陳屢立戰功臺灣平留致遠安集居民募佃開墾田園二萬餘畝纍遷瑞安副將乞休歸王璋字昻伯臺灣人康熙癸酉舉人為雲南宜良令潔己愛民丁母憂百姓數千詣巡撫籲留璋從間道歸家服闋起知湖廣房縣升主事遷監察御史卒於官陳士俊字子慶臺灣人好施與康熙五十七年大飢士俊出粟二千五百石以賑存活無算置園地於嘉義鳳山二縣以充義塜鄉里德之按府志作黃仕俊王鳳來字瑞周臺灣人由嵗貢任漳平訓導整飭規條示諸生以敦倫樹品之道康熙六十年秩滿入都歸會朱一貴倡亂上書制府陳剿征䇿寇平授蘇州督糧水利同知監兑漕糧殫精剔弊奉押漕運盡革陋規厯河南懷慶知府遷兵部員外郎黃廣嘉義人事母孝雍正八年火焚居屋廣與母妻俱出走惟少妹在內母憐女復反廣懼急隨入救母妻力挽止廣廣輒推妻於港遂與母同死火中黃孟深嘉義人兄弟早殁孟深撫姪如己子男女四十八口同居合㸑以耕讀為業內外無間言同邑王求李次俱四世同居有司並表其門王克捷字仲肯嘉義人乾隆丁丑進士任行唐知縣遷江寧同知郡人舉進士自克捷始鄭其仁鳳山人以武生為義民首積功給守備職銜乾隆五十三年賊擾水底藔其仁引導官兵戰死於下埤頭奉旨優恤流寓明王忠孝惠安人崇禎戊辰進士以户部主事督薊儲忤監視太監逮治下獄戍邊後得免遁迹臺灣肆志詩酒作方外客張士栯惠安人崇禎癸酉副榜遁迹臺灣隱居於東安坊杜門不出日以書史自娛辟穀三年惟食茶果夀至九十九而終盧若騰同安人崇禎庚辰進士由兵部主事遷浙江巡海道僉事潔巳惠民浙人祀之厯鳳陽巡撫後與進士沈佺期許吉燝渡海隱於臺灣澎湖杜門著𫐠詩文甚富本朝夀同春諸暨人乾隆五十一年林爽文倡亂淡水同知程峻被害同春時為幕友年七十餘同官兵恢復竹塹城五十二年帶領義民進剿遇伏被擒百方脅誘不屈賊支解之事聞豫知縣職銜李喬基嘉應人林爽文之亂喬基在彰化首先倡義招募民番分撥義勇協守鹿仔港殺賊甚多五十二年督義民攻大里杙被擒迫降不屈磔死事聞豫知縣職銜列女本朝洪之廷妻張氏臺灣人年十八歸之廷生一女之廷死氏勤紡織以養舅姑苦節四十年辜純湯妻林氏臺壪人純湯卒時氏年二十無子撫其媵所生二子成立同邑楊茂仁妻余氏鄭斌升妻陳氏俱夫亡守節鄭克􅡕妻陳氏臺灣人克􅡕鄭經養子也經以偽監國印付克􅡕經死諸子囚克􅡕夜遣人拉殺之陳泣請於姑曰昔為箕帚婦今為罪人孥願出居柩旁俟亡夫百日後即相從地下耳許之乃旦暮哭奠如禮既卒哭自縊以殉傅璿妻黃氏臺灣人康熙二十年總督姚啓聖將討鄭克塽臺人傅為霖謀舉兵以應事泄為霖及其子璿均遇害氏曰子死父妻死夫義也敢逃義乎遂自縊沈瑞妻鄭氏臺灣人鄭斌女而鄭克塽之族妹也瑞以傅為霖事連坐被囚獨遣氏歸氏請於父曰兒既適沈家矣安可獨生亦就拘及瑞將死使人來訣氏對使自縊謝燦妻鄭氏漳州人歸臺灣縣民謝燦燦逺賈於外病卒訃聞氏投繯死李宋妻趙氏臺灣人歸宋時宋已病篤氏衣不解帶服侍湯藥及宋卒氏哀慟投繯死同邑曽國妻郭氏年十八國溺海死郭自經以殉王尋妻阮氏漳州人歸鳳山王尋尋卒氏請於伯叔為尋立嗣殯畢自經死歐預妻王氏嘉義人年二十適預踰年預卒氏治喪盡禮踰月閉室自經陳越琪聘妻黃氏臺灣人許聘未婚越琪卒氏自縊康熙六十一年旌同邑紀惠女許聘吳氏子亦未婚殉節袁氏女臺灣人夫亡殉節雍正年間旌吕氏女臺灣人守正捐軀乾隆十三年旌林妙妻侯氏臺灣人夫亡守節同邑陳振揚妻吳氏侯孟富妻劉氏沈耀汶妻蕭氏並乾隆年間旌李時燦妻王氏鳳山人夫亡守節同邑烈婦顏氏趙越妻嚴氏俱乾隆年間旌吳慶榮妻高氏嘉義人夫亡守節同邑劉源由妻江氏番民大治賦妻大南蠻烈婦蘇智妻林昭娘俱乾隆年間旌汪劉氏汪余氏彰化人姑婦二人素慈孝雍正九年大甲西番焚掠其鄉姑謂婦曰義不可辱當各為計遂自刎婦泣拜訖番猝至觸垣死同邑節婦翁昌齡妻林氏俱乾隆年間旌劉滿姑湘潭人臺防同知劉亨基之女乾隆五十一年林爽文陷彰化城亨基死之滿姑時年十七奔投屋後水池水淺不即死號哭痛罵賊割其口鼻罵不絶聲遂遇害五十三年旌祀臺灣烈女祠又彰化縣知縣朱瀾媳魯氏女羣姑仁和人乾隆六十年賊匪滋事不屈被戕是年旌蕭世華妻李氏嘉義人夫亡守節嘉慶二十年旌楊振科妻鄭氏彰化人夫亡守節同邑林熾妻楊氏俱嘉慶年間旌仙釋絳衣縞衣仙鳳山有沙馬磯其頂常帶雲煙非天朗氣清不得見也故老言頂上時有絳衣縞衣二仙人對奕今山上石碁盤石凳猶存明李茂春龍溪人明季至臺遁迹於禪放浪山水間跣足岸幘旁若無人構茅亭曰夢蝶處日講佛經自娛人稱李菩薩土産鹽糖有黑白二種飼子飯魚通志無細骨可和飯以飼幼子鹿茸三友花俗呼山茉莉亦稱番茉莉柑府志有仙柑紅柑雪柑盧柑九頭柑數種龍眼鳳梨府志實生叢心色黃味甘酸清芬襲人葉攢簇如鳳尾其皮鱗起一名黃梨􅿚通志紅毛從日本移來之種實如豬腰五六月盛熟有香􅿚木檨肉􅿚三種椰檳榔波羅蜜府志荷蘭國移來者實生樹幹大如斗皮似如來頂味甘如蜜芋府志紅者呼為檳榔紅白次之大於內地數倍番薯府志明萬厯中得種外番有文來薯種出文來國最美一名地瓜番民臺灣縣熟番臺灣番民有生熟二種聚居各社如內地