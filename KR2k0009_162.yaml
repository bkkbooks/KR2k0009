巖人夫病劇禱天願以身代及殁四日入室自縊同州邱賢觀聘妻林氏章炎聘妻劉氏皆夫亡殉節乾隆年間旌連尊生妻林氏龍巖人夫亡矢志撫孤事繼姑盡孝同州章衮妻饒氏吳冕妻連氏詹哲妻陳氏吳錦妻林氏翁子災妻廖氏連日光妻林氏傀珊妻邱氏林元桂妻黃氏邱禹鎔妻連氏邱鑾妻郭氏郭舜林妻林氏邱夢麟妻林氏邱上蘭妻謝氏李其長妻王氏陳惠忱妻邱氏連文錦妻賴氏楊珠妻邱氏黃光瑁妻張氏蔣儀妻魏氏邱澎妻連氏黃承誥妻郭氏陳昌庭妻章氏林綸妻邱氏陳蓮池妻石氏邱江妻鄭氏王德嘉妻郭氏傅峙葊妻鄧氏郭替野妻楊氏謝登榜妻林氏郭克明妻蘇氏陳熺久妻林氏郭祚基妻邱氏郭庭授妻林氏魏繼緒妻倪氏魏子宜妻邱氏詹世錂妻謝氏吳鍠妻張氏烈婦謝洪妻劉氏謝展賢妻林氏貞女蘇瑶聘妻劉氏俱乾隆年間旌朱馥妻陳氏漳平人夫亡守節同邑鄭經邦妻李氏劉鳳恩妻陳氏俱乾隆年間旌賴燦士妻曹氏寧洋人夫亡守節同邑貞女范國魁聘妻郭氏乾隆年間旌蔣祿妻連氏龍巖人夫亡守節同州吳湛妻蔣氏林學詩妻鄭氏蔣育英妻陳氏林進傳妻邱氏鄭騰聚妻陳氏溫應泉繼妻鄭氏倪國俊妻石氏林平江妻邱氏鄭遜明妻羅氏饒明季妻廖氏林兆昌妻連氏邱峩妻連氏邱超斯妻郭氏魏輯妻蘇氏邱中理妻廖氏邱泮馥妻林氏林馥青妻王氏邱心吉妻陳氏魏成章妻連氏溫大紹妻曾氏謝光溥妻林氏謝淑瞻妻盧氏謝宇琬妻林氏謝駿三妻盧氏傅明方妻林氏謝禹齊妻連氏楊豫妻章氏楊楫妻石氏生員楊菼妻連氏楊熺妻蘇氏楊桂妻連氏謝仲江妻鄭氏張瑜上妻黃氏林濟川妻蔣氏翁春梅妻湯氏邱樹言妻謝氏郭晨輝妻張氏劉之珣妻舒氏邱士寬妻林氏邱會聲妻章氏賴勝金妻謝氏倪泮妻陳氏連惠觀妻林氏鄧啓超妻陳氏林準乾妻李氏曹鍾秀妻魏氏郭維章妻劉氏張入千妻傅氏生員林騰光妻鄭氏林彬宇妻蔣氏烈婦章國香妻張氏蔣定妻張氏俱嘉慶年間旌陳元蓁妻柯氏漳平人夫亡守節同邑陳世冕妻詹氏李獻墀妻許氏陳雙輝妻林氏俱嘉慶年間旌吳憲妻羅氏寧洋人夫亡守節同邑貞女吳富聘妻林氏俱嘉慶二十五年旌仙釋宋郭公龍巖人少有奇行嘗遊九侯山遇異人授以遁形變幻之術每禦寇輒立奇功殁著靈異鄉人祀之曹四公寧洋人元祐間鄉有妖神每歲以童男女祀里人患之四公往廬山遇異人授以禦妖之術因以竹杖乘之俄頃至其鄉風雨中鏗然有金戈鐡馬聲妖遁去紹興間大疫四公以劍擊石壁甘泉湧出飲者立愈洪水漂民田四公於壩上立壇令人以桃柳矢射水中少頃一巨蟒長丈餘斃浮水面紹興十年秋沐浴更衣端坐而化土産苧布葛布各縣並出鉛出漳平縣三井林并節惠粗坑鐡石筍生石上俗呼石菰石竹通志節疏而平可為器用香茅通志葉似苗而香煮作浴湯辟邪氣令人身香畬民畬客州志即猺人州屬呼為畬客在龍巖者惟藍雷二姓在漳平寧洋者有藍雷鍾三姓隨山種插去瘠就腴編荻架茅為居善射獵以毒藥塗弩矢中獸立斃貿易商賈刻木大小短長為驗其酋魁亦有辨識文字者前提調官臣鄭紹謙恭纂輯提周官臣張日章泰覆輯校對官臣賀式韓恭校校對官臣沈維鈺恭覆校
