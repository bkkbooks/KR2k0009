front:
  text: 大清一統志臺灣府在福建省治東南五百四十里外又水程一十一更四靣皆海東西距除澎湖及水程四更外廣一百里南北距二千八百四十五里東至大山番界五十里西至澎湖島五十里南至沙馬磯頭海五百三十里北至雞籠城海二千三百十五里自府治至京師七千餘里分野天文牽牛須女分野星紀之次建置沿革自古荒服之地不通中國名曰東番隋開
