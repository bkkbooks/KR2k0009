body:
  text: 皇中遣虎賁陳稜略澎湖三十六島明嘉靖四十二年海寇林道乾掠近海郡縣都督俞大猷征之追至澎湖道乾遁入臺灣天啓元年閩人顔思齊引日本國人據其地久之為紅毛荷蘭夷人所奪本朝順治十八年海寇鄭成功逐荷蘭夷據之偽置承天府名曰東都設二縣曰天興萬年其子鄭經按府志鄭經一名錦改東都曰東寧省升二縣為州康熙二十二年討平之改置臺灣府屬福建省領縣三雍正元年增置彰化縣領縣四臺灣縣附郭東西距除澎湖及水程四更外廣五十里南北距五十里東至大山番界四十五里西至鹿耳門海五里南至鳳山縣界十里北至嘉義縣界四十里本東番地本朝順治十八年鄭成功偽置天興萬年二縣屬承天府其子鄭經升二縣為州康熙二十三年廢二州改置臺灣縣為府治乾隆五十三年平定臺灣逆匪欽頒御製紀事文三篇並御製碑文勒碑府城垂示久遠鳳山縣在府南八十里東西距五十五里南北距二百七十五里東至淡水溪大山番界二十五里西至海三十里南至沙馬磯頭海二百三十里北至臺灣縣界四十五里本東番地本朝順治十八年鄭成功據之屬萬年州康熙二十三年分置鳳山縣屬臺灣府嘉義縣在府北一百十七里東西距五十一里南北距二百五里東至大山番界二十一里西至海三十里南至臺灣縣界七十七里北至彰化縣界一百二十八里本東番地本朝順治十八年鄭成功據之尋屬天興州康熙二十三年分置諸羅縣屬臺灣府乾隆五十二年以賊匪林爽文攻擾時城內義民同官兵守禦無虞賜縣名嘉義彰化縣在府北三百九十七里東西距四十里南北距七百七十里東至大山番界二十里西至鹿仔港海二十里南至嘉義縣治二百八十里北至雞籠城海六百八里本東番地本朝順治十八年鄭成功據之尋屬天興州康熙二十三年屬諸羅縣雍正元年分諸羅縣北半線地置彰化縣屬臺灣府形勢屹峙海中延袤二千餘里為東南屏障臺郡聞見録四面環海崇山峻嶺橫截其中臺郡圖志背負崇岡襟帶列島浪嶠南屏雞籠北衛舊志澎湖為門户鹿耳為咽喉鳳山縣志七鯤身毗連環護三茅港滙聚澄泓客問風俗禾麻蔽野廬舍依然畜牧之饒無異中土臺郡聞見録節候稍晚夏乃澍雨人始耕種嵗一收穫豐盈常足同上地無木棉兼民不知蠶布帛多資於中土同上尊敬長老孤獨廢疾之人則鄉社人共餔之同上民非土著皆泉漳潮惠之人故習尚與內地無甚異臺灣縣志俗尚華侈同上喜鬭輕生嘉義縣志晚稻豐稔資贍內地所以户鮮蓋藏臺海使槎録城池臺灣府城本朝雍正三年建柵城周十一里三百三十四步門七乾隆元年易七門以石雉堞釘鐡皮樓護女墻五十三年改築土城周二千五百二十丈高一丈八尺以西面濱海按舊墓收進一百五十餘丈臺灣縣附郭城東門樓上舊祀關帝乾隆五十三年臺匪林爽文等滋事官軍渡海咸覩月奉旨重修神像尋即蕆功七御書扁額曰神威翊應鳳山縣城在興隆莊龜山之麓本朝康熙六十年建土城圍以刺竹周四里一百八十步門四有濠乾隆五十三年移建竹城於埤頭而於此地建龜山石卡駐兵防守嘉慶十二年仍還舊治改築石城周八百丈高一丈八尺建立炮臺門四有樓嘉義縣城本朝康熙四十三年建柵城雍正元年土築周四里一百五十步門四濠廣三丈五年建城門樓十二年於土城外環植刺竹乾隆六十年重建周七百四十四丈有奇高一丈八尺彰化縣城本朝雍正十二年環植刺竹周四里一百十八步門四嘉慶十六年甃以甎石周一千二十八丈高一丈八尺並於城之四面及八卦山頂添設炮臺五座澎湖廳城在臺灣縣西澎湖大山嶼西澳本朝康熙五十六年建淡水廳城在彰化縣北竹塹本朝雍正十一年環植刺竹周二里一百六十步門四有樓噶瑪蘭城在淡水廳所轄三貂溪東五圍本朝嘉慶十六年栽九芎樹為城東西南北相距各一百八十丈周五百四十丈門四有樓學校臺灣府學在府治西南本朝康熙二十四年建五十一年修乾隆十四年重建入學額數閩籍二十一名粵籍九名臺灣縣學在縣治東東安坊本朝康熙二十三年建四十二年修雍正十二年乾隆十四年重修入學額數十三名鳳山縣學在縣治北門外本朝康熙二十三年建五十八年修雍正七年乾隆二年十七年重修入學額數十三名嘉義縣學在縣治西門外舊在西門內本朝康熙四十五年建乾隆十八年移建今所入學額數十三名彰化縣學在縣治東北本朝雍正四年建乾隆十七年修二十四年重修入學額數十三名淡水廳學在廳城東門內本朝嘉慶二十三年建入學額數六名海東書院在府治西南舊在府學西本朝康熙五十九年建乾隆三十年移建今所崇文書院在府城內東安坊本朝康熙四十三年建乾隆二十四年重建南湖書院在府城南本朝乾隆三十年建玉峯書院在嘉義縣西門內舊學宫址本朝乾隆二十四年建白沙書院在彰化縣學宫右本朝乾隆十年建二十四年修明志書院在淡水廳城北興直莊本朝乾隆二十八年建户口原額人丁一萬八千八百二十七今滋生男婦大小共一百七十八萬六千八百八十三名口計二十二萬四千六百四十六户田賦田園四萬七千三百四十五甲八分有奇又二千二十九頃八十八畝有奇共額徵粟一十八萬八千四百八十四石二斗七合一勺續報升課田園六百一十二甲一分三釐有奇額徵銀三百八十三兩九錢二分二釐人丁餉稅額徴銀一萬三千六百五十三兩八釐山川大目降山在臺灣縣東五十里土番所居通志山下有大目降溪蜿蜒而下過平坂隸於番其南曰柳仔林山列阜如屏延亘數里其西北為馬鞍山自木岡西遞衆山重疊不一馬鞍其盡處也按輿圖臺灣之東有大岡山當即木岡及大目降山字音訛異耳又通志自太目降山厯保大里東保大里西至新豐永豐二里又南抵崇德里相距百里其山崔嵬險阻人迹不到從無名號以此知大岡山蓋大山之統名也香洋仔山在臺灣縣東南通志山在湖仔內山南培嶁絡繹擁起平疇角帶圍山在臺灣縣東南二十六里通志在香洋仔山南下有深坑仔紅毛寮溪過此曰岡山溪為鳳山縣界按舊志小香洋山東為深坑仔又西南為大香洋溪流逶迤山水幽勝即指此山也豬母耳山在臺灣縣東南五十八里通志下有鯽魚潭許寬溪咬狗溪石頭坑又有遙接其南者曰湖仔內山大岡山在臺灣縣南八十餘里山頂險峻上有巨岡可望不可登近鳳山縣之嘉祥里亦曰江山又曰碙山其東南為小岡山近鳳山縣之長治里新志大岡在北小岡在南兩山相對峙凡至臺舟過澎潮東吉澳即見此山與臺灣猴洞諸山相界處也以輿圖考之臺灣有兩大岡山一在臺灣東稍北當即舊志大腳山與新志大目降山也一在縣南又南曰小岡山與鳳山縣接界木岡山在臺灣縣東北三十三里與嘉義縣相接巍峩特聳其頂常戴雲霧天氣清明始見山形其峯上與天齊通志臺灣之山此最高大為一府諸山之祖亦縣治之主山也北至蔦松溪則為嘉義縣界山之南有番仔湖山拔地而起與木岡山勢相聯屬按輿圖臺郡北自雞籠山南至沙馬磯頭二千餘里東偏負山西面臨海其山蜿蜓不斷總名大山亦總呼為木岡山阿猴林山在鳳山縣東林木茂密漸入番界赤山在鳳山縣東十里上有湯池舊志去府一百四十里通志陂陀平衍時有火出其上由此而南悉屬番社又鳳彈山東北一山土色純赤亦曰赤山觀音山在鳳山縣東南十五里舊志者水西流入小岡山水通志在阿猴林西北起伏盤曲中峯屹立若菩薩端坐衆小峯拱峙於側故名又七星山聯絡觀音山之北七峯皆戴石如星傀儡山在鳳山縣東南六十里土番所居呼為加嘮通志在縣治東沖霄聳起常帶雲霧舟行至澎湖天氣晴霽即見此山重岡復岫皆人迹所不到總呼為傀儡山野番出沒於此其分支為北葉山自是而南為蜈蜞嶺其左為琅嶠山又南而直抵於波濤中者為沙馬磯自磯回轉而東有兩峯並峙高出天表為網卒山老佛山由二山絡繹而北纍纍不絶又有朝華離山大柴高山霄馬于山大烏萬山皆背立傀儡山之後俯臨海中毗南謐山在鳳山縣東南二百二十里亦曰卑南覓山舊志山連延高峻上多松杉人迹不至夜望之有光如火又金山在縣東境外多羅滿港內相傳産金又大女覓山有芋葉大如屋土番珍之沙馬磯頭山在鳳山縣東南二百三十里海濱其南有仙人棋盤石亦曰仙人山舊志山形如城下可泊舟水退時有礁狀如馬通志吕宋船往來皆以此為指南鳳山在鳳山縣南三十里形若飛鳳縣以此得名舊志上多巨石嶔﨑玲瓏通志旁有二小峯如翅又東北有數小峯如卵曰鳳彈山西南山岡曰鳳鼻山邑治之對山也虎仔山在鳳山縣西南七里濱海亦曰打鼓山俗呼為打狗山舊志北去府治百里下為打狗仔港冬産青魚通志山特峙海濱舊有番人居之明嘉靖間流寇林道乾為俞大猷所逐遁入於此後從海道逃入占城其遺種尚有存者今水師營壘尚在由此山蜿蜒而下勢若長蛇為蛇山在邑治右又旗後山在打鼓山西南臨海上為漁人採捕處其參差隔海列於打鼓左右者西有石佛石佛北有石塔南有涼繖礁皆屹立海中舟人經此必鳴金焚𥿄以祭海神七鯤身山在鳳山縣西北通志自打鼓山穿田過港逶迤六十餘里平地中結為七峯如鯤魚鼓浪其山無石皆沙土上多雜木蒼翠可觀半屏山在鳳山縣北七里通志自臺灣縣大小岡山迤邐而南近附於縣治者為半屏山形如畫屏故名蓮花潭直過其下懸巖陡立又呼為半崩山又縣左有龜山近接半屏山中多喬木繁陰密蔭望之蔚然深秀又漯底山在半屏山西北平原中一邱浮出其頂寬平上有小竅出水若無底然滚水山在鳳山縣東北舊志在岡山南二十餘里下有湯泉廣五十餘畝泉源沸􅊳微有硫氣流瀦為潭周數十里有山環障中起三洲古木森列居民決水灌田饒沃數千頃通志有大小滚水二山相距十里許上有濁泥水滚出火山在嘉義縣東二十五里玉案山東稍南通志山多石石隙泉湧常有火出水中大武巒山在嘉義縣東南通志由彰化縣大遁山南奔七百餘里山脈停駐挺為是山特立圓秀可愛縣治之主山也又牛朝山在縣西北十里通志由大武巒迤邐而西二十餘里橫岡如帶近貼縣治之背復自右旋左尾一小山逆列水口為邑治鎖鑰按大武巒即諸羅山舊志山在縣東地最肥饒縣治其麓多熊豕獐鹿縣之得名以此玉山在嘉義縣東南大武巒山之後色白如銀北與彰化縣之水沙連內山接通志三峯並六高出羣山為大武巒後障終嵗雲封其頂惟冬日晴明可見頃刻煙霧復合矣多侶居山在嘉義縣東南舊志在天興州東北百餘里山極高峻盛夏雪消流成瀑布阿里山在嘉義縣東南通志山極遼濶內有八社又東南為大龜佛山同為邑治左肩又東為肚武營山為番米基山馬椆山在嘉義縣東南二十里通志自半月嶺而南又西轉為關仔嶺山徑仄如天險下有漢人耕種其中相近有糞箕湖山又小龜佛山在糞箕湖西南下有古樹高數丈相傳有神附焉居民皆徙數里水東南為赤山土色皆赤按此與舊志龜佛山異舊志謂山東臨中港者今為彰化縣山玉案山在嘉義縣東南三十里通志山自東而折於南居邑左臂為學宫對山舊名玉枕又嵌頭山在玉案山東北其西南為筆架山又有翁上天山如老翁扶杖欲行狀又西為半月嶺大武壠山在嘉義縣東南六十里通志山繞玉案山後與學宫遙對又西北為五步練山峭險不容足相並為消離山其支峯聯絡於南為鹿馭山東西煙山虎頭