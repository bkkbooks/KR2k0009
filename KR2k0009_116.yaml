理諭民無梗者朱敏義烏人洪武五年以御史改知星子縣奏減稅糧茶貢翟溥福東莞人正統初擢南康知府先是歲歉民有擅發富家粟及收取漂流官木者前守悉坐以盜當死者百餘人漙福閱實杖而遣之地濱鄱陽湖舟遇風濤無所泊為築石隄百餘丈以便徃來興復白鹿書院延師訓其子弟朔望躬詣講授以年老乞歸去之日父老爭贐金帛不受衆挽舟涕泣因建祠湖隄又配享三賢祠孔鏞長洲人景泰中知都昌縣户分九等以定役設倉水次以便收斂民甚賴之陳嘉言蘇州人嘉靖初為星子典史劇賊剽掠商舶嘉言率邑民宗允春等二十四人追至四山賊縱擊救援不至遂俱被害呉寳秀浙江平陽人萬厯中知南康府湖口稅監李道横甚寳秀不與通㑹漕舟南還揚帆直入湖口道欲榷其貨遣吏持牒至郡捕之寶秀拒不發道大怒飛章劾寶秀阻撓稅務詔逮治妻陳氏自經死至京下詔獄星子民陳英儒士熊應鳯等走京師伏闕訟冤乞以身代得釋歸南康民建祠祀之李應昇江隂人萬厯中授南康推官出無辜十九人於死寘大猾數人於重辟民服其公廉為之謡曰前林後李清和無比林謂晉江林學増以清慎著稱者也九江南康間有柯陳二大族恃強拒捕有司議兵之應昇單騎徃諭皆叩頭請命出所匿罪人一方以定白鹿書院久廢應昇為興復之徴授御史呉賜玉歙縣人以䕃授南康通判戈陳賊寇南康賜玉率丁壯數十人追及之賊返擊賜玉躍馬持鞭格殺數賊遂遇害贈按察司僉事王養正泗州人崇禎十四年知南康府以計殱巨寇鄧毛溪熊高一方賴之本朝聶應井四川宜賓人順治二年知南康府守城禦寇地方賴之後隱廬山子孫遂家焉温可掬直隸人順治四年任南康通判金聲桓之亂死之俞之琛福建人為建昌縣丞順治五年武寕寇率衆陷城之環罵賊遇害周燦臨潼人康熙間守南康以臨湖多水患設救生船以拯溺講學白鹿書院造士多所成就人物南北朝宋周續之本鴈門人其先過江居豫章之建昌八歲喪母哀戚過於成人奉兄如父年十二詣太守范甯受業通五經五緯名冠同門既而入廬山與劉遺民陶淵明為㝷陽三隠宋武帝召之為開舘東郭外招集生徒乘輿降幸問禮記之義辨析精奥稱為名通通毛詩六義及禮論註公半傳於世司馬暠建昌人性至孝母病亟禱於先祠願以身代母果得痊唐熊仁瞻建昌人性至孝為袁州宜春縣丞母卒卜葬歸義鄉岡阜峻險念非水道不可達誓傾家貲掘地為川以通江俄大雨水湧成川與江流接舟以得達既葬廬墓六年有慈烏來巢之異勅旌其門世名其川曰孝子港橋曰孝感橋里曰孝錫坊宋洪文撫建昌人本姓殷避宣祖諱改焉曽祖諤唐䖍州司倉叅軍子姓衆多以孝弟著稱六世義居室無異爨就所居雷湖北創書舍招來學者至道中遣内侍賫御書百軸賜其家文撫遣弟文舉詣闕貢土物為謝太宗飛白一軸曰義居人以賜之命文舉為江州助教又詔表其門閭李常建昌人皇祐進士熙寕中知諫院王安石立新法常言均輸青苗斂散取息傅㑹經義流毒天下遂落校理通判滑州厯知鄂湖齊三州哲宗立進户部尚書轉對上七事拜御史中丞出知鄧州徙成都府卒有文集奏議六十卷詩傳十卷元祐㑹計錄三十卷曹彦約都昌人淳熙進士嘗從朱子講學漢陽闕守橔攝軍事金人大入彦約訪得土豪許卨等授方畧逆擊大敗之以功就知漢陽遷湖南安撫討平羅世傳李元礪等擢右侍郎官出知利州時蜀之邊面諸司並列兵權不一乃作病夫議獻之廟堂後其言無一不驗理宗即位擢兵部侍郎入對勸帝講學防近習次言當以慶厯元祐聽言為法以紹聖崇觀諱言為戒㑹下詔求言彦約上封事又薦布衣李心傳乞置史舘授兵部尚書不拜以華文閣學士致仕卒諡文簡黄灝都昌人擢進士第光宗即位厯太常寺簿論今禮敎廢闕請勅有司取政和冠婚䘮葬儀及司馬光高閌等書叅訂行之出知常州提舉本路常平以倚閣海鹽秋苗移居筠州既歸里幅巾深衣騎驢匡山間若素隱者灝性行端飭以孝友稱朱子守南康灝執弟子禮質疑問難朱子殁黨禁方厲單車徃赴徘徊不忍去著有西坡集四十卷李燔建昌人紹熙進士從朱子學凡諸生未達者先令訪燔俟有所發乃從而折衷朱子謂人曰他日任斯道者必燔也朱子殁學禁方嚴燔率同門徃㑹葬不少怵詔訪遺逸九江守以燔薦再詔再辭郡守請為白鹿書院長學者雲集講學之盛他郡無與比添差江西運司幹辦公事洞寇作亂燔馳諭皆帖服通判潭州不數月辭歸時史彌遠當國燔不復出自謂居閒無以報國乃薦崔與之魏了翁真德秀陳宓等於朝居家講道學者宗之與黄幹並稱卒贈直華文閣諡文定馮椅都昌人家居授徒所註易書詩語孟太極圖西銘輯說孝經章句喪禮小學孔子弟子傳讀史記及詩文志合二百餘卷江萬里都昌人大父璘鄉稱善人萬里少神雋有鋒穎舉入太學有聲理宗在潛邸嘗書其姓名几硯間召試舘職累官侍御史器望清峻論議風采傾動一時帝眷注尤厚度宗時累遷參知政事與賈似道不合去後拜左丞相乞歸居鄱陽元兵破饒州萬里赴水死左右及子鎬相繼投池中贈太師諡文忠弟萬頃厯守大郡為提舉江西常平茶鹽官城破時軍士執萬頃索金銀不得支解之馮去非椅子淳祐進士寶祐四年召為宗學諭丁大全為左諫議大夫三學諸生叩閽言不可帝為下詔禁戒立石三學去非獨不肯書名碑下未幾大全簽書樞密院事去非以言罷歸泊舟金焦山有僧上謁致大全意願母遽歸少俟收召去非奮然正色曰老夫今歸廬山不復仕矣絶之不與言陳大猷都昌人師事雙峯饒魯仕至黄州軍判官著尚書集傳李成大建昌人登進士德祐初知金壇縣元兵至不屈被殺贈直秘閣諡忠節陳澔大猷子不求聞逹博學好古著禮記集註行世本朝雍正二年詔從祀孔廟元燕公楠建昌人十歲能屬文同知吉州路世祖召對稱㫖除僉江准行尚書省請置屯田勸道有方除大司農領八道勸農營田司興利舉弊績用大著僧格既敗而蠧政未盡去分楠赴闕極陳其故請更張以固國本累遷湖廣行省右丞僧格舊作桑哥今改正高必達建昌人五歲時父明大忽棄家遠遊莫知所適必達既長晝夜哀慕乃娶妻以養母而厯徃四方求其父十餘年始得之黄州金真道院中學道三十年矣必達哀號叩頭乞歸父不得已乃還家孝養篤至鄉里稱之鄭佛生建昌人早孤貧事母盡孝詔表其門明于光都昌人少有大志初從徐夀輝署江都宣慰及陳友諒弑壽輝光歸太祖拜行樞密院判從平陳友諒有功擢鷹揚衛指揮從徐達平淮東浙西擒張士誠取汴梁克陜洛佐郭興守潼闗徙守鞏昌庫庫特穆爾偵知徐逹南還遂襲蘭州指揮張温堅守光率兵赴援遇庫庫軍戰敗𬒳執至城下使說温降光大呼曰吾不幸而擄且死公等幸堅守大將軍旦夕至矣遂被殺贈懷遠將軍配享功臣廟庫庫特穆爾舊作擴郭帖木兒今改正魏源建昌人永樂進士除御史廵按陜西宣德初為河南左布政使所至有惠政拜刑部尚書正統二年命徃大同宣府督察諸將便宜從事源劾指揮杜衡等抵大辟按行諸險要令將吏分守修開平龍門城自獨石抵宣府増置墩堠免屯軍租一年儲火器為邊備諸依權貴避役者悉括歸伍八年致仕㝷卒余濂都昌人宏治進士授監察御史慨然以風紀自任曲阜孔廟災濂言宜遣官慰祭經營重建從之未幾以災異劾禮部尚書呉瓊等居位不稱復因災異論大臣不職者並宜免於是尚書罷去者五人出按遼東坐事下獄謫雲南布政司照磨式宗時累官至雲南副使呉尚禮星子人嘉靖二年由監生除授歸善主簿蠻寇入境尚禮督兵勦賊遂為所害陶一貫星子人嘉靖中為福建布政使理問官罷寓金陵倭入蘇州掠淮揚一貫自赴軍門願效督討募兵海鹽遇賊於德清戰殁贈奉議大夫曹珊都昌人父英有孝行及殁珊廬墓三年子必和孝如其父萬厯初勅建世孝坊徐大相安義人萬厯進士任國子博士百僚將早朝中官盧受傳免衆趨出從後姍侮大相草疏論受姦邪時接疏者即受也帝閱疏顧受曰此即論汝罪者受錯愕叩頭流血累遷驗封員外郎以議薛蕙諡貶二秩調外羣奄黨受者持梃譟門捜囊中止俸銀七十兩乃散崇禎初厯文選郎中奏陳十事帝即飭行以父憂歸卒熊德陽建昌人萬厯進士天啓𥘉擢御史彈劾中官諸不法者奉使祭告北鎮具知熊廷弼王化貞功罪條上河西情形既而化貞敗遁樞臣張鶴鳴庇之德陽并劾鶴鳴鶴鳴族人中以他事謫歸崇禎初復職余應桂都昌人萬厯進士授御史上疏劾首輔周延儒貪邪傾險狀帝怒貶三秩引疾歸後擢右僉都御史巡撫湖廣時方招降張獻忠等與總理熊文燦謀不合爲文燦所劾下獄遣戌已而獻忠反文燦伏誅㑹督師孫傳廷戰殁命應桂徃代之坐逗留奪職後死於難本朝乾隆四十一年賜諡忠節淦君鼎建昌人崇禎末以歲貢爲贛州訓導署通判亊城陷與次子祐少子祉俱死之妻熊氏及祐妻熊氏祉妻李氏婢瑞香並赴井死惟長子斌以先遣歸得脫本朝乾隆四十一年賜諡烈愍本朝徐碭安義人順治舉人知益陽縣呉三桂反碭奉檄招撫被害贈僉事予祭葬䕃一子入監于建邦星子人康熙庚辰進士知舞陽縣時值大澇甫下車輙發貯粟以賑全活無筭復舞泉書院置田聚書豫有蝗獨不入舞陽境去官後民立祠祀之王廷實安義諸生性至孝父䘮明廷實舐之而愈閩寇犯境聯鄉勇爲保障計嘗率其徒直搗賊巢邑賴以安入祀鄉賢祠項鳴鳳星子人副貢生孝友足式品行可風甞捐修書院焚劵讓租爲士民稱頌入祀鄉賢祠陳獻赤星子人由鄉薦任南昌教諭訓迪諸生亹亹不倦歸里後設教鄉閭羣受其化入祀鄉賢祠李夢蘭建昌人當耿逆猖獗募鄉勇捍衛地方智勇兼備叙功授楚雄知縣時值呉逆初平錢糧逋欠八載並徵民無完膚乃力請豁免得㫖全省豁免八十餘萬民得再生入祀鄉賢祠周倬建昌諸生天性至孝亊父母備盡色養友愛兩弟歲歉設賑全人夫婦潛心經史理探程朱有兹堂集十卷入祀鄉賢𥘉王廷憲安義人由鄉舉知歙縣聞父䘮􅅹血辭職時以新例奪情哀毁骨立累章陳情终制得㫖俞允扺廬撫柩大痛未㡬卒以孝行旌表流寓唐楊於陵漢太尉震裔擢進士辟鄂岳江西使府妻父韓滉居宰相領財賦權震中外於陵隨府罷避親不肯調退廬建昌以文書自娯穆宗朝官終户部尚書封宏農郡公諡貞孝李渤魏横野将軍申國公發之裔刻志於學與仲兄涉偕隱廬山取古廉徳高蹈者以楚接輿老萊子黔婁先生於陵子王仲儒梁鴻六人圖像讚其行因以自儆久之更徙少室五代南唐鄭元素華原人少習詩禮避亂南遊隱居廬山青牛谷四十餘年集古書至千餘卷史虚白北海人避地廬山以詩酒自娛韓熙載薦之召見問為治之理對曰臣草野之人漁釣而已邦國大計不敢預知元宗曰真處士也賜田遣還陳貺閩人志操古朴不苟於仕進隱廬山三十年學者多師事之元宗徴至金陵欲授以官辭不受宋劉渙筠州人為頴上令以剛直不能亊上官棄去家於廬山之陽歐陽修作廬山高詩以美之渙居廬山三十餘年環堵蕭然饘粥以食而遊心塵垢之外超然無戚戚意以夀終列女宋呉孝婦都昌人夫早亡無子姑老且病欲贅壻以相養呉泣曰女不二夫妾志也自能供侍常傭鄰家獲錢歸養姑目翳甞取所食誤置不潔處呉還见亟借鄰食奉姑滌汚者自食一夕呉夢兩童子引叩天門謁帝帝勞問賜酒錢養姑自是家貲日𥙿姑目復明馮孝女名素貞星子人父病割股療之即愈郡守陸德輿表其墓明甘氏女名清秀星子甘夢珊女正徳中值宸濠變隨母逃避賊擄其母清秀義不辱即投玉京潭死賊退尸浮水面如生里人收葬山前劉良坤妻王氏星子人萬厯中劇賊何鳳掠其家執王欲汚之不從大呼家人殺賊賊引劍刺其腹死郝氏建昌人給事中熊維典之嫂崇禎末左良玉縱兵四掠郝抱子沉於河同時死者有族婢郝氏况氏及渡夫妻熊氏熊氏二女建昌人熊士䕫之女長曰芷姑次曰頴姑左良玉兵掠境二女潛匿河滸相約曰賊至有死無辱俄見一騎來遂並投水死士䕫妾淦氏及兩婢考香赫香皆從之里人祠之曰二烈實五烈也但驄妻傅氏建昌人崇禎未亂兵恣掠殺驄逼傅氏傅且泣且罵遂遇害劉克寛母胡氏安義人年十八而寡撫子成立壽九十四歲同縣劉天錫妻熊氏年二十而寡守節教子夀九十三本朝余文之妻李氏都昌人文之父為叛卒所執文之請以身代父李又願以身代舅若夫卒見李姿容許諾文之父子得脫李度其去已遠遂厲聲罵賊賊忿立殺之李秀英安義人幼字楊昌裴未嫁昌裴病篤李徃侍湯藥數日而卒李服䘮成禮誓以身殉家人防之一日登夫讀書樓自縊康熙年間旌向某妻陳氏都昌人歸向甫十七日夫亡父憐其少氏盡翦其髮以自誓家貧刺綉以供朝夕终歲不踰閾擇繼嗣續夫祠守節六十餘年余英涵妻彭氏都昌人未嫁英涵卒彭衰絰徃哭䘮畢堅閉一室奉木主三年翁殁大殮成時英涵服闋氏迎父母至永訣引刀自刺死雍正六年旌同縣徐英夏妻萬氏以力拒強暴死七年旌胡治臣妻范氏建昌人性貞靜于歸七年治臣貧病無以自活隂與媒鬻范與富人顧萬齒誘之出門范奮擲呼號入顧門遂自經雍正八年旌李家駒聘妻朱氏建昌人高安大學士軾之女幼通諸書性至孝動止必以禮未嫁而家駒殁氏告於父徃李氏持服適䘮次哀慟幾絶遂守貞夫家事祖姑及舅姑盡孝己而不茹葷血鄰家失火勢甚烈家人倉皇走避氏獨端坐室中火亦息尋得疾不服藥而卒陳錫位妻宋氏星子人夫亡守節厯久彌貞同縣烈婦魏若寛妻凃氏段英發妻蕭氏曹嘉年未婚妻查氏均乾隆年間旌黄學璸妻徐氏都昌人夫亡守節同縣胡道珍妻高氏傅安皇妻袁氏許定攀妻李氏江右烈妻周氏烈婦巴忠治妻曹氏王道商妻陳氏均乾隆年間旌皮應琯妻郝氏建昌人夫亡守節同縣淦聨妻凃氏郝維妻陳氏胡孔麟妻帥氏熊惟岱妻何氏淦文達妻吕氏李廷棟妻凃氏梁發邇妻孫氏呉必梓妻李氏周汝勲妻淦氏凎世楫妻江氏烈婦劉尚英妻程氏呉宇科妻淦氏均乾隆年間旌熊景華妻萬氏安義人夫亡守節同縣楊運苡妻符氏龔華卿妻戴氏毛鼐妻胡氏徐學吕妻黎氏熊大經妻劉氏黄重藩妻熊氏劉君則妻戴氏余正道妻劉氏周翰第妻許氏黄錫祉妻羅氏劉必忠妻彭氏熊必長妻王氏黄芳烈妻楊氏胡貴妻陳氏黄兆基妻謝氏魏自敏妻張氏黄宗淮妻楊氏黄宗源妻李氏烈婦李育相妻王氏均乾隆年間旌于幹妻夏氏星子人夫亡守節同縣李登龍妻錢氏均嘉慶年間旌徐芳増妻戴氏都昌人夫亡守節同縣王徳愷妻杜氏石梁正妻崔氏劉永源妻王氏陳先棟妻馬氏呉正清妻江氏劉魯官妻詹氏高思鶴妻袁氏侯錫選妻詹氏呉永顯妻傅氏楊秀拔妻曹氏汪炳遠未婚妻曹氏均嘉慶年間旌張觀河妻劉氏建昌人夫亡守節同縣皮凱詔妻呂氏周昌雲妻燕氏蔡泰元妻熊氏饒南谷妻鄧氏陳步雲妻王氏陳嘉㑹妻熊氏徐均華妻袁氏均嘉慶年間旌黄吉明妻萬氏安義人夫亡守節同縣傅紹才妻萬氏凌若林妻宋氏陳文修妻周氏陳文禮妻劉氏徐步武妻熊氏黄廷福妻李氏凃信芳妻劉氏熊運易妻萬氏黄蘅圃妻葉氏烈婦羅海文妻陳氏羅勝章妻林氏均嘉慶年間旌仙釋晉葉千韶建昌人少隱廬山學道辟榖服氣嘗獨居忽有一白衣人言君道德臻備仙籍褒㫒當在人間役使鬼神其後能致風雨驅雷電救人疾疫其應如響不知所終佛馱耶舍罽賓人年十九誦大小乘經姚興迎至長安譯四分律并長阿舍等經後來廬山躬自負鐵於紫霄峯頂鑄塔以如來舍利藏其中江州刺史王羲之捨宅居之即今歸宗寺南北朝宋陸修靜呉興人居廬山簡寂觀有道術文帝製停霞寳輦賜之明帝設崇虚觀通仙堂以待之至即求歸不許卒於京賜諡簡寂先生唐劉元和彭城人居白鶴峯乆之留其弟子何玉守舍自入五老峯石室種木瓜為食丹成而逝舉棺將葬空無人矣所居有丹井丹臼存焉智常馬祖法嗣也居歸宗寺目有重瞳以藥手按摩致眥皆赤號赤眼歸宗後示寂勅諡至真禪師道膺幽州玉田王氏子嗣洞山价初結茅於三峯後居雲居寺天復二年示寂諡宏覺禪師道簡范陽人初造雲居謁道膺膺大奇之令刻苦事衆徧掌寺務居第一座膺將示寂主事問嗣者曰堂中簡主亊意不在簡簡知之一夕遁去有安樂樹神號泣衆悔迎歸聞空中連聲唱曰和尚來也譚紫霄泉州人有道術事閩王昶封正一先生閩亡隱居廬山棲隱洞南唐後主召至金陵賜號金門羽客并金紫不受宋開寶六年卒明周顛仙建昌人少得狂疾人因呼之曰顛元末乞食南昌市中長官初至必謁訴曰告太平人莫測其所謂及太祖克南昌顛來見隨至金陵顛愈甚太祖厭之命衛士覆以巨甕積薪燔之火息啓視端坐自若命居蔣山寺半月不食寺僧言於上太祖徃視顛來迓無饑色後陳友諒圍南昌太祖復征之顛從行至馬當見江豚戲水曰水怪見損人多太祖怒其妄語命投於江及師至湖口則顛又來見遂辭去後莫知所之太祖為製周顛仙傳土産絹都昌縣出葛布星子縣出又各縣俱岀紵布茶宋史地理志南康軍貢茶芽省志匡茶香味可愛茶品之最上者石耳明統志星子縣出省志出廬山削壁上大者如盤石斛寰宇記出廬山懸崖省志星子縣出石花魚省志廬山諸龍潭有之大者三數觔蛤粉星子縣出按舊志載寰宇記