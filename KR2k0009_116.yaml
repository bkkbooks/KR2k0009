支東流合於江渺茫無際水落則流注於馬當江龍泉在府治北輿地紀勝晉慧遠結菴於此無水以杖刺地泉湧旣而歲旱慧遠誦龍王經於泉上俄而龍起雨乃大足虎跑泉在德化縣南廬山東林寺後晉慧遠與蓮社諸賢游上方峯頂患水遠有虎跑石出泉故名又有卓錫泉及聰明泉神泉在德化縣南廬山蓮花峯後輿地紀勝宋紹興中皇甫履賜隱廬山高宗名其所居曰清虛菴光宗在東宮日嘗問履山中所乏履曰但水差遠光宗因大書神泉二字遺之云持歸隨意鑿一泉履歸於菴側穿一小井方施畚插而泉已湧東隹泉在德安縣西東隹山紫巖下一名紫巖泉明統志山有巖洞甚深廣昔有人秉火入洞至一巨澗不可渡而止其泉有上下二竅上竅流則下竅乾絶下竅流則上竅乾絶三日一周縣志東隹泉天晴則西流雨則東流若雨晴未定則西有小水泉西有石洞深不可極早則於此禱雨秉炬入進四十里有湖吳山泉在德安縣西北四十里呉山灌田五百餘畝其泉雷震而出雷伏而止又峽石泉在縣西北二十里峽石嶺下灌田三百餘畝静泉在徳安縣西北七十里長溪山下平地流出寂然無聲灌田三百餘畝又布金泉在縣西北小崑崙山之隂平地涌出灌田數百頃白龍泉在瑞昌縣西二十里泉出懸崖洞中繞流山麓漑田甚廣東南流抵城西白龍橋入南河大􅡉泉在瑞昌縣北平地涌出四時不竭溉田百餘頃其水流入赤湖冷水泉在湖口縣北二里瑩澈如氷味甘四時不竭赤泉在彭澤縣南一百里泉赤色利灌漑又函玉泉在山川壇左自山頂石罅中出四時清瑩人掬飲以愈疾浪井在府治内寰宇記圖經云漢高祖六年潁隂侯灌嬰所開年深堙塞孫權經此自標井地命使鑿之正得其井江有風浪北水輒自漂動土人呼爲浪井今見在城内古蹟柴桑故城在德化縣西南漢置屬豫章郡晉咸和中移尋陽郡來治其後江州亦治此宋昇明元年沈攸之舉兵東下時江州刺史邵陵王友鎮尋陽蕭𦣱以爲尋陽城不足固表移友同鎮湓口留别駕胡諧之守尋陽胡三省曰尋陽時治柴桑今江州德化縣西南九十里有柴桑山是也陳時又於縣分置西江州天嘉𥘉復為江州隋廢為湓城縣地唐武德五年復於其地置楚城縣貞觀八年廢入潯陽通典今潯陽縣南楚城驛卽舊柴桑縣也元和志柴桑城在潯陽縣西南二十里潯陽故城今德化縣治本晉時柴桑縣之湓口城厯宋齊梁陳為江州戍守處隋平陳廢柴桑縣置尋陽縣於此大業初改為湓城唐曰潯陽南唐曰德化自後因之晉書地理志柴桑有湓口闗齊書州郡志庾亮臨終表江州宜治㝷陽以州督豫州新蔡西陽二郡治湓城接近東江諸郡往來便易元和志江州理城古之湓口城也漢高帝六年灌嬰所築通鑑胡三省注湓口在德化縣西一里江州治徳化蓋近湓口古城處按漢時尋陽縣本在江北今湖北黄梅縣界晉時移郡治柴桑義熙八年又省尋陽入之自是以後皆以郡治之柴桑為尋陽而江北之尋陽始晦隋廢柴桑於湓口故城改置尋陽縣唐因之於是又以湓口為尋陽而名益淆湓口在六朝為江濱鎮守要地其地則屬柴桑柴桑乃尋陽郡治至隋時始移尋陽之名於湓口後人多混為一明統志云潯陽城在府西十五里本漢尋陽縣其城晉孟懐玉所築隋因水患移入城為附郭今名故州曰彭蠡曰湓城卽其地其言尤無所據厯陵故城在德安縣東漢置縣屬豫章郡王莽改曰蒲亭後漢復故晉改屬鄱陽郡宋元嘉初省通典潯陽有蒲塘驛卽漢厯陵縣也王莽改為蒲亭按厯陵縣晉時與餘汗鄡陽俱割屬鄱陽郡而柴桑則分屬武昌郡鄱陽在東武昌在西相去甚遠且中隔彭蠡不應厯陵反出柴桑之西通典以蒲塘為厯陵徒以厯陵嘗名蒲亭故耳然王莽所改未幾復故安見蒲塘之卽古蒲亭疑屬傅㑹宋晁氏以厯陵故縣及博陽山皆在今鄱陽縣界其説近是今以相沿已久而厯陵故址亦無的據姑存俟考彭澤故城在湖口縣東三十里漢置屬豫章郡建安中置彭澤郡以吕範為太守尋廢晉永嘉後改屬尋陽郡隋改置龍城縣於東界後改龍城為彭澤而故縣遂廢元和志彭澤故城在都昌縣北四十五里晉陶潛為令理此城寰宇記彭澤城在都昌縣西北一百二十五里漢高帝置隋廢舊迹猶存湖口縣志今為彭澤鄉故縣理在今縣東三十里浩州故城在彭澤縣東南四十里浩山下寰宇記彭澤縣東西廣長南北枕帶江壖爲吳地之首唐武德五年李大亮安撫江南張善安歸降江表既靜於此古城置浩州以浩山取名又分楊梅嶺以南更置都昌縣東南置樂城縣分饒州鄱陽北境置廣晉縣合四縣並隸浩州至八年廢浩州及縣其年彭澤縣仍移入廢浩州内南唐昇元初又自浩州故城移向西四十里江次卽今縣理縣志元至正中於浩州城置高唐馬站後廢按明統志又載浩州城在饒州西北一百三十里以唐書及寰宇記考之其地當爲廣晉浩州自在今彭澤界不在饒州也古太原郡在彭澤縣東北梁武帝僑置領彭澤晉陽和成天水四縣隋平陳郡縣並廢寰宇記古太原郡在彭澤縣東北五十里松滋廢縣在德化縣東晉僑置宋因之齊省宋書州郡志晉成帝時江左流民寓尋陽僑立安豐松滋二郡遥隸揚州安帝省爲松滋縣尋陽又有宏豐縣流寓文帝元嘉十八年省併松滋汝南廢縣在德化縣西梁置屬尋陽郡隋平陳併入尋陽上甲廢縣在湖口縣東南晉書地理志元帝渡江尋陽郡又置九江上甲二縣尋省九江縣入尋陽安帝又省工甲縣入彭澤湖口縣志故址在今縣東南百里彭蠡鄉三學堂南按梁蕭韶封上甲侯似梁時嘗復置也天水廢縣在彭澤縣東梁置與晉陽和城等縣俱屬太原郡隋平陳廢入彭澤寰宇記廢天水縣在彭澤縣東五十里按顧野王輿地志云梁武帝置以擬西水縣又廢和城縣在縣東北二百二十里廢晉陽縣在縣東北一百九十四里彭澤縣志天水故縣在縣東今為天水郷餘二縣俱在安徽池州府境龍城廢縣在彭澤縣西隋書地理志九江郡彭澤平陳置龍城縣開皇十八年改名焉寰宇記廢龍城縣在彭澤縣西二里樂城廢縣在彭澤縣南舊唐書地理志武徳五年置浩州又分置樂城縣八年省入彭澤寰宇記廢樂城縣在彭澤縣南三十九里縣城傍山為之南北高險東西平下按縣志又謂在今縣東五十里陶王山北未知何據半洲城在德化縣西吳志孫慮傳黄武七年封建昌侯後二年假節開府治半洲通鑑晉咸康五年庾亮表弟懌為梁州刺史鎮半洲元和志半洲故城在潯陽縣西九十里郭黙城在德化縣東北晉咸和中郭黙所築亦名陶公壘通鑑梁大寶二年侯景將於慶自鄱陽還豫章侯瑱拒之慶走江州據郭黙城王僧辨前軍襲慶慶棄城走元和志晉咸和四年郭黙叛陶侃討黙築壘以攻之黙乃以布囊盛米為壘以應陶今稱陶公壘巢湖城在潯陽縣東四十二里按楚有二巢一在廬江六縣一南巢桀所奔處卽此蒲塘場今德安縣治寰宇記德安縣在江州西南一百里本蒲塘春秋時楚之東鄙其地舊屬柴桑縣唐時分潯陽之三鄉於敷淺水之南為埸以地有蒲塘為名咸通三年還潯陽四年復為場楊吳順義七年升為德安縣縣志唐武徳八年置蒲塘驛貞元中改蒲塘場楊吳置縣因移場於東北一里宋復為蒲塘驛元因之明廢今呼其地為驛頭赤烏場在瑞昌縣治西寰宇記瑞昌縣本赤烏場地孫權時有赤烏見於此始有地名蓋柴桑之舊域也唐時為潯陽西偏建中四年以僻遠因立為場南唐昇元三年改為瑞昌縣縣志故址在今縣西安泰鄉湖口故址在今湖口縣東名勝志劉宋時為湖口戍寰宇記湖口縣本湖口戍是南朝舊鎮上據大鐘石旁臨大江唐武德五年安撫李大亮以為要衝遂置鎮在彭蠡湖口南唐保大中升為縣府志故址在今縣東二里三家市今名三市口陶潛宅在徳化縣西南九十里柴桑里元結故居在瑞昌縣西倉城墩府志唐元結避亂江州曾家瀼溪有詩云尤愛一溪水而能存瀼名即此義門在德安縣西北六十里卽陳氏故居自唐至宋凡十八世同居至三千七百餘口又有義門書堂在縣西北東佳山下唐時陳衮於其居左二十里建書堂聚書數千卷以資學者子弟弱冠悉今就學宋徐諧有記庾樓在府治後濱大江具磯石哭出江干百許步相傳晉庾亮鎮江州時所建按此因晉書庾亮傳有秋夜登南樓之事而傅㑹也亮時江州自鎮武昌不在湓城史傳甚明李白詩清景南樓夜風流在武昌亦未嘗誤白居易詩云潯陽欲到思無窮庾亮樓南湓口東自後遂爾傳訛清輝樓在府治後唐劉禹錫有詩九曡樓在府治後唐刺史李渤建因對廬山九曡故名齊雲樓在府治東北子城上宋皇祐中所建紫煙樓在府治後宋余崇龜建取李白詩日照香鑪生紫煙為名清風閣在府治後明統志後人慕宋均潔已安民去獸之異因名洪武末重建按宋均守九江在夀春今府城北又有虎渡亭皆傅㑹也倚天閣在府治東對雙劍峯宋張孝祥命名取長劍倚天外之意白傅草堂在廬山香鑪峯下唐白居易謫江州時建居易有草堂記三賢堂在府治後祀陶潛狄仁傑白居易又瑞昌縣治南有二賢堂祀元結蘇軾皆宋時建生意堂在府治後宋濂溪周子在江州時窗前草不除因扁堂曰生意漪嵐堂在德化縣治西偏宋政和中縣令呉怡建洪适有詩三學堂在湖口縣彭澤鄉府志陶潛令邑時與周續之陸修静講論於此因名唐天祐中卽故址為寺有洗墨池流觴九曲池遺迹稽亭在德化縣東齊書晉安王子懋傳延興元年子懋起兵赴難具船稽亭渚通鑑梁大寶元年鄱陽王範至湓城尋陽王大心使徐嗣徽築壘稽亭以備範胡三省注稽亭在江州東尋陽記稽亭北瞰大江南望高嶽淹留逺客因以為名白蓮亭在德化縣輿北紀勝在縣南五十里廬山記云昔謝靈運一見慧逺肅然心服乃卽寺繙湼槃經因鑿池為臺植白蓮池中名其臺曰繙經此亭卽其故地百花亭在府治東梁刺史邵陵王綸建元帝有詩浸月亭在德化縣西甘棠湖中有上墩圓如月唐白居易作亭其上後人因其别時茫茫江浸月之句而名高逺亭在府治東唐李渤建每一登覽江中景物俱在目中琵琶亭在徳化縣西大江濱唐白居易送客湓浦口夜聞隣舟琵琶聲作琵琶行後人因以名亭煙水亭在徳化縣甘棠湖上宋周濂溪子司封郎官夀建久廢本朝康熙五十九年重建曡翠亭在徳化縣南五十里宋岳飛建以對廬山兀曡故名光風霽月亭在廬山麓濂溪書院内宋朱子建有記攬秀亭在府治南宋建元總管李黻重建取李白詩九江秀色可攬結之義墨竹亭在瑞昌縣西十里宋元豐間蘇軾自黄州適筠州視弟轍經此題詩石上以餘墨灑竹後人搆亭於山卽名亭子山白雲亭在彭澤縣南十五里明統志唐狄仁傑宰彭澤奏赦犯大辟者三百人民德之建祠立亭後人因取其望雲思親之意為名魯望亭在彭澤縣馬當山麓唐陸龜蒙嘗寓此故名六角亭在彭澤縣治西元王德淵讀書巖碑記宋眉人石振作尉於此攜三子就巖讀書黄太史魯直訪之親書三字曰讀書巖今尉和仲寛按圖經復舊觀又構六角亭於巖之前萬里江天亭在彭澤縣水驛前元大徳中縣尹曹靖國建白鹿昇仙臺在廬山天池寺世傳嘗有白鹿於此上昇明洪武二十二年御製周顛仙傳建碑亭於臺上玩月臺在湖口縣東三十里相傳晉陶潛為彭澤今時築以玩月董奉館在德化縣明統志在廬山第三嶺後巖下今存故址匡山精舍在府治南元學士姚燧讀書處前總纂官臣許應藻恭纂輯提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校
