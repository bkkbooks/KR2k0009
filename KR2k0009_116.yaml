body:
  text: 南康府在江西省治北二百四十里東西距二百十里南北距一百十里東至饒州府鄱陽縣界一百六十里西至九江府德安縣界五十里南至南昌府新建縣界六十里北至九江府德化縣界五十里東南至饒州府治二百五十里西南至南昌府奉新縣治二百六十里東北至九江府彭澤縣治二百五十里西北至九江府瑞昌縣治一百二十里自府治至京師四千六百七十五里分野天文斗分野星紀之次建置沿革禹貢揚州之域春秋爲呉楚地戰國屬楚秦屬九江郡漢爲柴桑彭澤海昬三縣地屬豫章郡後漢屬豫章郡三國呉置鄱陽柴桑郡晉屬豫章尋陽二郡元康元年置宋屬江州齊梁因之陳置豫寕郡隸江州隋置洪州當陽府即今建昌縣唐爲江洪二州地五代屬楊呉後屬南唐宋太平興國七年置南康軍治星子縣隸江南西路紹興初改隸江南東路元至元十四年升南康路隸江淮行省二十二年改隸江西行省明初改爲西寕府時爲元至正二十一年尋曰南康府屬江西布政使司本朝因之屬江西省領縣四星子縣附郭東西距七十里南北距一百十里東至都昌縣界二十里西至九江府德安縣界五十里南至南昌府新建縣界六十里北至九江府徳化縣界五十里東南臨鄱陽湖至饒州府餘干縣治三百五十里西南至南昌府武寕縣治二百三十里東北至九江府湖口縣治一百二十里西北至九江府德化縣治一百四十里本漢豫章郡柴桑縣地隋為湓城縣地唐為潯陽縣地五代時楊呉置星子鎮南唐為德化縣地宋太平興國三年升為星子縣屬江州七年為南康軍治元為南康路治明為南康府治本朝因之都昌縣在府東八十里東西距一百四十里南北距一百二十三里東至饒州府鄱陽縣界八十里西至星子縣界六十里南至南昌府新建縣界三十里北至九江府湖口縣界九十三里東南至饒州府鄱陽縣治一百六十里西南至南昌府新建縣界一百里東北至九江府彭澤縣治二百二十里西北至九江府德化縣界八十里漢豫章郡彭澤鄔陽二縣地宋齊以後為彭澤縣地唐武徳五年分置都昌縣屬浩州八年州廢縣屬江州大厯中屬饒州宋太平興國七年改屬南康軍元屬南康路明屬南康府本朝因之建昌縣在府西南一百二十里東西距一百三十里南北距八十里東至南昌府新建縣界四十里西至南昌府武寕縣界九十里南至安義縣界五十里北至九江府德安縣界三十里東南至南昌府新建縣界六十里西南至安義縣治八十里東北至星子縣界五十里西北至九江府德安縣治六十里漢置海昬縣屬豫章郡後漢為海昬侯國晉仍為海昬縣劉宋元嘉中省海昬移建昌縣來治仍屬豫章郡齊梁至隋因之唐武德五年於縣置南昌州總管府七年府廢八年州廢以建昌縣屬洪州宋太平興國七年改屬南康軍元元貞元年升為建昌州屬南康路明初仍為縣屬南康府本朝因之安義縣在府西南二百里東西距六十里南北距六十里東至南昌府新建縣界四十里西至南昌府靖安縣界二十里南至南昌府奉新縣界三十里北至建昌縣界三十里東南至南昌府新建縣治九十里西南至南昌府奉新縣治六十里東北至建昌縣治八十里西北至南昌府武寕縣治一百二十里本漢海昬縣地宋齊以後為建昌縣地唐武德五年析置龍安縣屬南昌州八年廢入建昌縣明正德十三年分建昌之西南地置安義縣屬南康府本朝因之形勢背負匡廬前據彭蠡地勢雄秀甲於東南朱子南康榜文其西五峯峭壁隱然在望者為廬阜其南巍峯曡聳若來向者為蘇山宗彭圖南致霖亭記控楚引粤為江右咽喉地明費宏府城碑記風俗禹跡所經太史所游有聖賢遺風朱子南康榜文俗朴訟稀民貧土瘠宋黄唐謝表城池南康府城周五里二十步門五東西北三面環以濠廣二丈南臨湖宋淳祐中土築明正德八年改甃􅰫石本朝順治九年闢小南門康熙三年修乾隆二十二年重修星子縣附郭都昌縣城周九百五丈五尺門八四面以湖為池明嘉靖中創築本朝康熙二十一年修建昌縣城周四里三百二十四步門四水門二明正徳十三年土築嘉靖三十年改甃􅰫石本朝乾隆十年修二十五年重修安義縣城周四里一百二十步門四濠深一丈二尺明正德十三年創築本朝順治十六年以後屢修乾隆七年二十七年重修學校南康府學在府治南宋紹興中自城西門外遷此元末燬明𥘉再建本朝屢修入學額數二十名星子縣學在縣治東宋紹興中建於城西門外明洪武四年遷府治東南萬厯四十一年改建今所本朝康熙五十六年修入學額數十五名都昌縣學在縣治西金街嶺唐咸通中建在縣東南明萬厯中遷縣治西本朝康熙十一年人遷小南門外五十四年移建今所入學額數十五名建昌縣學在縣治東北宋崇寕中建於縣治東慶元初遷縣西明天啓元年改建今所本朝康熙五年修十一年重修入學額數十五名安義縣學在縣治南明正德十三年建本朝康熙十一年修五十一年重修入學額數十二名白鹿書院在星子縣北廬山五老峯下唐貞元中洛陽人李渤與兄涉讀書廬山嘗畜一白鹿自隨寳厯中渤為江州刺史於故處創臺榭遂以白鹿名洞南唐昇元中即其地建學置田命國子監九經李善道爲洞主號曰廬山國學宋初始置書院與睢陽石鼓嶽麓三書院並名天下學徒常數百人太平興國二年詔從知江州周述請給國子監印本九經驛送至洞號曰白鹿國學久之學廢淳熙中朱子知南康軍因其遺址重建書院聚徒講學嚴立規條置田以給廪餼其後又建禮聖殿増舍益田至元季燬明正統成化間修復舊制萬厯七年再廢後又復本朝順治以來屢修堂廡增置學田康熙二十五年聖祖仁皇帝賜御書學達性天扁額及十三經二十一史雍正四年重修並增建學舍乾隆九年高宗純皇帝賜御書洙泗心傳扁額修江書院在星子縣宋淳熙中朱子知南康軍時建宏齋書院在建昌縣治東宋李燔讀書處户口原額人丁五萬二千四百二十一今滋生男婦大小共一百二十七萬六千七百二十五名口計二十萬五千八百九十八户又前左衛及九江衛屯軍男婦大小共一萬五千七百五十八名口計一千七百二十三戸田賦田地一萬八千四百八十三頃二十八畝八分四釐有奇額徵地丁銀七萬三千八百八十三兩五錢六分米四萬一千六百三十九石六斗六升七合山川錢家山在星子縣南十五里鴉髻山在星子縣南四十里形如山台時起雲霧相近有龍潭山呉城山在星子縣南百三十里濱江上有望湖亭鳳凰山在星子縣西南十里蜿蜒特起水漲山浮勢若鳳翔一名流星山今改名福星又有鳳凰山在安義縣東五里起伏如鳳凰舞下有碧潭東古山在星子縣西南十里又西南十里有西古山東古山之西北為洪井山相傳葛洪煉丹於此精舍山在星子縣西南三十里其東相接者為一字山有兩水夾山流一名藍車山烏石山在星子縣西五里又西二里有清潭山下有潭玉京山在星子縣西七里一名上京山當湖之濱一峯最秀其東西雲山煙水數百里浩渺縈帶皆列於几席間明統志陶潛詩疇昔家上京指此雞籠山在星子縣西十五里下有潮泉晷刻不差朔望尤大上有柔石可為礪稍北為封家山黄龍山在星子縣西三十里山有兩巖北麓為主簿山下有温泉廬山在星子縣西北二十里北接九江府界古名南障山一名匡山總名匡廬朱子九江彭蠡辨禹貢敷淺原說者以為漢厯陵縣之博易山在今江州徳安縣為山甚小而庳不足以有所表見而其全體正脈遂起而為廬阜則甚高且大以盡乎大江彭蠡之交而所以識夫衡山東過一支之所極者惟是為宜耳周必大廬山後録山有九十九峯櫛比磬折如城垜然輿圖廣記廬山三靣阻水西臨大陸為羣山所奔輳山無主峯蜿蜒㠆聯指列條數各自為勝王褘六老堂記其隂土燥石枯岡阜並出以扼大江東來之勢是為九江其陽千巖萬壑土木秀潤是為南康按廬山之勝南多於北今峯巖洞壑在府界者不可悉數其最著者曰五老峯石鏡峯紫霄峯淩霄峯鐵船峯漢陽峯漢陽峯之水西流為康王谷之谷簾泉東流為開先寺之雙瀑五老峯下為棲賢谷西為三峽澗洞曰白鹿洞白雲洞原曰栗里原此南康之勝也以舊屬潯陽故宋以前記載詳見九江府其峯巖泉瀑之有名者分著於下龍塘山在星子縣西北三十里峯巒峭㧞環抱湖灣又西北十里有屏風山丹崖紫壁環繞磅礴如屏障然石牛山在星子縣北三十里又北十里為青山張家山其東北為香山東南為石子山呉章山在星子縣北四十五里與廬山接嶺峻峽隘亦名呉障山以其為呉之障也其北又有塔尖山㓊林山接九江府界定山在星子縣東北十餘里濱江赤石山在都昌縣東十里上有鐵硃路通饒州及湖口彭澤為往來所必經陽儲山在都昌縣東四十里山甚高聳登之可望諸山積翠舊志謂居衆山之南陽氣所鍾故名巔有石室昬黑不可入強山在都昌縣東六十里鄱陽湖中由長山發脈綿亙湖中突起二峯東峯屬饒州府鄱陽縣界亦名狂山佛殿山在都昌縣東七十里紆迴曲折上有清泉四時不竭又龍宫山亦在縣東七十里三山在都昌縣東南六十里鄱陽湖中又四望山在縣東南九十里湖中四望空闊舊有巡寨南山在都昌縣南二里與西山並峙為邑左障下有泉名野老甚甘冽歲旱不涸蘇軾黄庭堅嘗遊憩於此又西山在縣西一里延袤十餘里團山在都昌縣南二里湖中為邑塞口春夏水漲狀如覆釡其南半里許又有小團山松門山在都昌縣南二十里鄱陽湖中接南昌新建縣界俗名岧嶤山詳見南昌府釣磯山在都昌縣南五里臨湖有巨石如臺端潔特立元和志山在縣南一百十二里昔陶侃常釣於此得一梭化為龍而去寰宇記釣磯石在縣西三十里旁臨浦嶼按元和志據都昌舊治言故遠寰宇記所記與今不合疑誤石壁山在都昌縣西南七里山麓有石立數大截然如壁屹臨巨湖寰宇記山在縣西十一里旁臨清江大磯山在都昌縣西七里懸崖百仞長三里許一名望仙山頂有平石可以眺遠山之南有瞭望臺舊為備湖巡兵屯聚處又小磯山在縣西南十五里脈自大磯山發截立湖中二山之間為磯池舟行多險元辰山在都昌縣西四十里相傳晉蘇耽居此得仙一名蘇山道書以為第五十一福地最高處為黄茅嶺如屏障篁竹山在都昌縣東北二十里舊名龍王腦又小岡山在縣東北六十里島山在縣東北七十里華山在都昌縣東北九十里突然峭㧞高壓衆山擬之太華故名又東遊山亦在縣東北九十里其下即舊縣也黄金山在都昌縣東北一百二十里山頂有龍湫禱雨多應有巨石廣數十丈飛泉噴出石間名飄水巖迂迴而入怱登爽塏有田常豐産煤炭石灰迴城山在建昌縣南四十五里山勢迴環列嶂如抱上有聖水塘常盈不竭雲居山在建昌縣西南三十里紆迴峻極頂常出雲一名歐山明統志世傳歐岌先生得道於此雲居山志歐山秋澤湧洩垂流三十餘丈形如曳布謂之布水縣志山之陽有鵞公嶺走馬嶺山隂有陽㘭有大小馬頸馬頸者以兩山斷絶中止一綫相屬從二百餘歩衡尺有咫兩旁皆深谷無影行者股慄山上羣峯環抱凡十有一俱削如城郭而上復開豁有湖有田長山在建昌縣西南五十里與安義縣龍安城相對宋岳飛討李成屯兵於此尖山在建昌縣西五里屹然特立於修江之左度修江而南曰蟠龍山蜿蜒旋伏如龍鳳棲山在建昌縣西十里山勢旋伏狀如棲鳳上有騰雲石常出雲氣下臨河有太子洞可容數人越山在建昌縣西二十五里羣山環繞聳拔峻峭上有平窩四周如城曲徑可