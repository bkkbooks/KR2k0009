body:
  text: 大清一統志西安府六列女漢曹世叔妻班昭扶風人彪女字惠班一名姬博學高才世叔早卒有節行法度兄固著漢書其八表及天文志未及竟而卒和帝詔昭踵成之數召入宫令皇后諸貴人師事焉號曰大家作女誡七篇有助內訓年七十餘卒鄧太后素服舉哀所著賦頌等凡十六篇子婦丁氏為撰集之又作大家贊昭女妹曹豐生亦有才慧嘗為書以難昭辭有可觀梁鴻妻孟光扶風人初勢家慕鴻高節多欲女之鴻並絶不娶孟亦擇對至年三十父母問其故曰願得賢如梁伯鸞者鴻聞而聘之始以裝飾入門七日而鴻不答乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也字之德曜名孟光乃共入霸陵山中以耕織為業後至吳居臯伯通廡下鴻為人賃舂每歸光為具食不敢於鴻前仰視舉案齊眉鴻卒葬畢歸扶風袁隗妻馬氏扶風人融女字倫少有才辨融家世豐豪裝遣甚盛隗問之曰婦奉箕帚而已何乃過珍麗乎對曰君若欲慕鮑宣梁鴻之高者妾亦請從少君孟光之事矣倫妹芝亦有才義少喪親長而追感作申情賦晉杜有道妻嚴氏京兆人字憲貞淑有識量年十八嫠居子植女韡並孤藐憲撫育二子教以禮度植遂顯名於時韡亦有淑德傅元求為繼室憲便許之時元與何晏鄧揚不穆內外以為憂懼憲曰晏等驕侈必當自敗晏等尋𬒳誅植從兄預為秦州刺史被誣徴還憲與預書曰諺云忍辱至三公能忍之公是卿坐預後果為儀同三司元前妻子咸年六歲憲曰此千里駒也以其妹之女妻之咸後亦有名其知人之鑒如此杜乂妻裴氏杜陵人乂無男生成恭皇后而終裴嫠居養后以禮自防甚有德音孝武時進封廣德縣君百姓號曰杜姥竇滔妻蘇蕙始平人字若蘭善屬文滔符堅時為秦州刺史被徙流沙蘇氏思之織錦為回文五綵相宣縱廣八寸題詩二百餘首計八百餘言縱橫反覆皆為文章名曰旋璣圖以贈滔讀之辭甚悽惋唐平陽公主高祖女下嫁柴紹初高祖兵興紹詭道走并州主自長安奔鄠發家資招募得數百人以應帝略地盩厔武功始平下之申法誓衆禁剽奪遠近咸附帝渡河紹以數騎來迎主引精兵與秦王會渭北紹及主對置幕府分定京師號娘子軍楊慶妻王氏新豐人世充兄女慶以河間王子為郇王守滎陽陷於世充故世充妻之用為管州刺史太宗攻洛陽慶謀與王歸唐謝曰鄭以我奉箕帚者綴公之心今負恩背義自為身謀可若何至長安則公家婢耳願送我還東都慶不聽王謂左右曰唐勝則鄭滅鄭安則吾夫死若是生何益乃飲藥死柳公綽妻韓氏華原人仲郢母韓臯女也善訓子故仲郢幼嗜學嘗夜和熊膽九使咀咽以助勤楊三安妻李氏高陵人舅姑亡三安人死子幼孤寠畫田夜紡凡三年葬舅姑及夫兄弟凡七喪遠近嗟涕太宗聞而異之賜帛三百段遣州縣存問免其徭役于敏直妻張氏皖城公儉女生三嵗每遇父母病已能晝夜省視顔色如成人及長愈恭順仁孝儉病篤氏聞之號泣幾絶儉死一慟遂卒高宗懿其行以其狀屬史官高睿妻秦氏萬年人睿為趙州刺史為默啜所攻州陷睿仰藥不死至默啜所示以寶帶異𫀆曰降我賜爾官不降自死睿視秦秦曰君受天子恩當以死報賊一品官安足滎自是皆瞑目不語默啜知不可屈乃殺之楚王靈龜妃上官氏下邽人靈龜出繼哀王後而舅姑在妃朝夕侍奉甚謹凡珍美未經獻不先嘗靈龜卒將葬前妃無近族議者欲不舉妃曰逝者有知魂可無托乎乃備禮合葬聞者嘉歎喪除兄弟共諭妃少又無子可不宜行泣曰我未能殉溝壑尚可御糚澤祭他胙乎妃將自劓刵衆遂不敢強和政公主肅宗女章敬太后所生生三歲后崩養於韋妃性敏惠事妃有孝稱下嫁柳潭安祿山陷京師安國公主方嫠居主奪潭馬載之身與潭日步百里躬爨以奉安國初潭兄澄之妻楊貴妃姊也勢幸傾朝主未嘗干以私及死撫其子如所生自兵興財用耗主貿易取奇贏千萬贍軍代宗以主貧詔諸節度餉億主一不取親紉綻裳衣諸子不服紈絺董氏女金城人家無兄弟孝養不嫁父亡廬於墓側凡六年天寶中旌其門漢陽公主名暢順宗女下嫁郭鏦時戚近爭為奢詡事主獨以儉嘗用鐵簪畫壁記田租所入文宗尤惡世流侈詔宫人視主衣服廣狹遍諭諸主嘗誨諸女曰先姑有言吾與若皆帝子驕盈貴侈可戒不可恃岐陽公主憲宗女下嫁杜悰事舅姑以禮聞悰為澧州刺史主與偕從者不二十婢乘驢不肉食州縣供具拒不受姑寢疾主不解衣藥糜不嘗不進廣德公主宣宗女下嫁于琮琮為黃巢所害主泣曰今日誼不獨存賊殺我巢不許乃縊室中主治家有禮法嘗從貶韶州侍者才數人郤州縣餽遺凡內外冠昏喪祭主皆身答勞疏戚皆得其心為世聞婦宋种放母夫翊長安主簿翊卒從放隱居終南山淳化三年放被詔母恚曰常勸汝弗聚徒講學今果為人知我將棄汝入窮山矣放稱疾不起上嘉放志節賜緡錢使終養元張興祖妻周氏安西人年二十四興祖殁舅姑欲使再適周氏不從曰妾家祖父皆早世妾祖母妾母並以貞操聞妾或中道易節是亡故夫而辱先人也夫忘故夫不義辱先人不孝不孝不義妾不為也遂嫠居三十年奉舅姑生事死葬無違禮又某妻楊氏亦西安人少寡守志割體療姑袁天祐妻焦氏涇陽人天祐祖父始皆從軍殁祖母楊氏母焦氏並家居守志至元二十三年天祐復從征死甘州妻焦氏年少宗族欲改嫁之氏哭旦言曰袁氏不幸三世早寡自祖姑以來皆守節義豈可至吾而遂廢乎吾生為袁氏婦死則葬袁氏土耳終不能改容事他人也衆不敢復言張德妻孫氏三原人年二十四德亡誓死靡他子世享亦早卒妻王氏世享子忠亦早卒妻劉氏三世守義不渝詔旌其門張訥妻劉氏藍田人訥為監察御史早卒劉守志不二河東受兵劉氏二子衡衍俱以事出外度不能脫遂與二婦孫氏姚氏決死盡發資囊分給家人婦姑同縊焉李子和妻劉氏耀州人夫亡年十九誓不再適事姑極孝至大元年旌名其里曰孝姑里明楊楠妻劉氏長安人楠萬厯中諸生嘗讓産於人以息爭劉實勸成之楠死劉自縊以殉馮從吾講學於鄉率紳士往奠焉泰昌時旌又同縣濮仕通妻關氏顔訓妻王氏安守信妻孫氏陳經濟妻趙氏皆以夫亡殉節又王敷典聘妻趙氏字孟英未婚夫殁孟英從母至其家觸棺死趙斌妻賀氏咸寧人斌舉於鄉死京師氏聞訃痛絶同縣黃運煜妾杜氏李能妻韓氏李梁妻夏氏均夫亡殉節又王用相妻李氏年十九夫死苦節自誓隆慶中旌閻伯仁妻葛氏興平人夫亡守節三子後皆為諸生又相繼殂逝葛率諸婦守節終身時稱一門四節閻臣妻陳氏臨潼人臣病死陳悉力營葬自經從之同縣張綸妻宋氏夫亡年少叔翁逼嫁之不從仰藥死又王道賢妻房氏張宗孔妻卞氏均夫亡殉節又史鸞妻趙氏媳王氏孫媳潘氏三世貞操冉天敘妻牟氏冉一清妻方氏一門雙節史宗直妻馮氏鄠縣人年十四歸直五年夫亡氏不食數日卒同縣王渼妻張氏亦夫亡殉節閻𢆚妻葛氏藍田人夫亡年二十一不食死同縣孫振譜妻張氏亦丈亡絶食死王朝妻祁氏涇陽人夫亡撫孤值歲儉家人私謂糊口不給何守節為祁聞之以面觸壁幾死家人救之而容由是毁同縣何瑚妻宗氏撫遺腹子成立均嘉靖中旌又周仁學妻閻氏年二十夫亡將葬令穿穴者大其壙葬前一日自經死張紹祖妻王氏年二十一夫亡痛哭不食死魏龍光妻王氏年十九夫亡誓以必死舅姑密防之值夫忌辰自縊死王可久妻竹氏夫卧病十年侍湯藥如一日夫亡遂絶食死又劉居仁聘高氏女未婚而往蜀居仁母迎女於家以待居仁竟客死女守節五十餘年又有劉從龍亦死於蜀妻王氏紡績葬其翁姑並翁父母守節終身又張倉女名四桂惡少王宰以言挑之不從強之不從為所殺萬厯間祀烈女祠張鸞妻呂氏三原人鸞卒呂年未二十撫孤尚永後娶常氏尚永又早卒婦姑雙節常卒子元琛廬墓三年以節孝被旌同縣郝緒妻雀氏夫亡家貧聞議婚者泣曰吾能餓死誓不他適逾年竟餓而死馬翰如妻白氏盩厔人翰如為諸生早死白翦髮誓守翰如兄謀改嫁之遂自縊死其衣上下皆先縫紉不見寸體時謂之封骸節婦同縣張附翺妾王氏武崇義妻吉氏何大錢妻王氏張學詩妾劉氏均夫亡殉節雷同妻較氏渭南人年十七隨同客居鄖陽同卒一女在褓扶櫬歸葬叔翁受張姓賂為奪節計氏破面翦髮以禦乃止一日自備衾木謂女曰往吾不死者以翁姑與若耳今翁姑就窆若又嫁此吾報夫地下時也絶粒死同縣張猷妻安氏馬連妻杜氏張而弛妻王氏妾樊氏均夫亡殉節𬒳旌孫玻妾張氏南養仲妻陳氏曹鴻妻王氏均殉節死李彥章妻楊氏富平人年二十六夫死家貧甚紡債鞠其幼子嘉靖中地震餓纍日里中富人豔其色謀娶者數輩楊輒拒之鄰婦哀之餽之食不受竟與其子俱餓而死同縣孟學孔妻惠氏李崿妻王氏田爾腴妻徐氏張問德妻陳氏均夫亡殉節安裕妻左氏耀州人年十九裕病卒氏即翦髮破鏡置柩前餓十數日死萬厯中旌彭邦貴妻王氏同官人年二十四而寡姑憐其少使改適氏翦髮自誓奉姑盡孝萬厯中輸粟千石賑飢詔立坊曰節義同縣周儀妻夫亡殉節亦𬒳旌馬應祥妾劉氏西安衛人應祥病亡自縊死秦王存樞妃劉氏崇禎末李自成破西安存樞為所脅偽授權將軍妃死之葉增光妻趙氏長安人增光天啓初舉人知汶縣歸里後流賊陷城被執趙聞之即赴井死同縣鄭夢麟妻趙氏不食死張元儀妻王氏自縊死沈伯騰妻韓氏沈仲起妻任氏馬健空妻朱氏張素含妻某氏張素謨妻宗氏王宏祖妻晉氏與其女朱誼奬妻晉氏王宏宗妻袁氏蕭起鳳妻王氏蕭仕昌妻葛氏李國楨女皆投井死高翔妻康氏咸寧人流賊陷城康方坐蓐賊入室欲劫之去康佯言從之紿賊出即樹刀於壁引領就之絶喉而死同縣劉烈女給事中劉懋女孫也流賊至其母先投井女從之有老嫗欲引之出授以綆女不從抱母尸死同縣李光信妻雷氏又盧應豸妻康氏苦節二十年均赴井死薛來貞妻宋氏咸陽人流賊陷城罵賊死劉國柱妻張氏流賊寇掠村堡氏恐遭辱引佩刀破面投井死又趙子玉妻王氏子玉偶出惡少嶽苗調之氏忿投井死李廷𣏌女興平人流賊入城女被掠不從賊殺之城下又諸生王謂靖妹亦被殺中軍翟自信女赴井死李輔德女臨潼人年十七未字流賊挾之上馬女憤罵擈地賊創之至死罵不絶口同縣郝聲楊妻王氏武啓哲妻吳氏劉溢源妻孔氏官莊里農家二女皆罵賊死舉人周永祚妻王氏妾屈氏諸生劉濬源妻袁氏及小姑與女皆投井死劉光燦妻李氏高陵人歸中部劉光燦為鎮撫早殁崇禎四年流賊陷高陵李年七十九矣其家掖之走不可曰未亡人棄此何往語未巳賊露創入李即取刀自刺流血淋漓賊壯其烈與飲食怒不受以碗擊賊罵曰吾守節四十九年乃啜賊食耶遂遇害趙日升妻同氏鄠縣人日升崇禎時諸生夫婦同為流賊所虜同指日升紿賊曰此吾兄也釋之當從汝賊縱日升去同即木罵𬒳殺又同邑楊遇周妻何氏山思亷妻閻氏姚大璽妻閻氏閻祚昌妻沈氏皆罵賊死舉人陳治衡妾王氏投井死郭鳳翔妻雷氏涇陽人鳳翔死雷年十九誓以死守流賊聞之亦高其節標幟於門曰勿犯節婦家賊再至鄰人托其家者皆得保全守節六十年而終同縣王生妻陳氏生有子方晬疾將死以遺孤為念陳曰吾當生死以之崇禎八年流賊至陳抱子避樓上賊燒樓陳從樓簷躍下母子俱不死賊視其色麗挾之馬上陳躍身墜地者再後以索縛之行數里陳力斷所繫并鞍墜焉賊知其不可奪乃殺之賊退家人收其尸子􅈱􅈱懷中兩手堅抱如故同縣王三有妻楊氏為流賊所