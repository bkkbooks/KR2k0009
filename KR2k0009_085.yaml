謂要契未明而亟城則羌人必爭移文河東又遺籍手書及疏於朝不報既而夏人果犯河外陷驍將郭恩如育所言程琳博野人以宣徽北院使判延州嘗獲渠魁不殺戒遣之夏人亦相告無捕漢民久之以五百户驅牛羊叩邊請降琳拒不受已而賊果以騎三萬臨境上以捕降者為辭琳諜知之閉壁戒諸將勿動賊疑有備遂引去程戡陽翟人英宗時拜鄜延路經略安撫使判延州州夾河為兩城雉堞卑小敵登九州臺則下瞰城中戡調兵夫大增築之在邊安重習事治不近名張載郿縣人為雲巖令以敦本善俗為先每月吉具酒食召鄉人高年會於縣庭親為勸酬使人知養老事長之義且口諭使往告其閭里一言之出雖愚夫孺子無不豫知景思立普州人熙寧中囉兀用兵韓絳使攝保安軍夏人寇順寧思立領兵赴援諸將敗一軍獨全吕大防藍田人熙寧四年知延州城河外荒堆寨咸謂不可守大防留戍兵修保障有不從者斬以徇衆遂安沈括錢塘人神宗時知延州至鎮悉以别賜錢為酒命㕓市良家子馳射角勝有軼羣之能者自起酌酒以勞之邊人歡激越歲得徹札超乘者千餘皆補中軍義從威聲雄他府朝廷出宿衛之師來戍賞賚至再不及鎮兵括以衛兵雖衆而鎮兵無歲不戰今不均若是且召亂乃藏敕書而矯制賜緡錢數萬以驛聞劉昌祚真定人元豐中知延州時永樂方陷士氣不振昌祚先修馬政令軍中校技擊優者給馬自義合至德靖寨連亙七百里昌祚度屯戍險易地望遠近事力強弱立為定式上諸朝夏人寇塞門拒破之殺其統軍葉悖麻咩吪埋二人圖其形以獻燕達開封人為延州巡檢戍懷臨寨夏人三萬騎薄城達所部止五百人躍馬奮擊所向披靡擢鄜延都監陸詵餘杭人知延州諒祚寇慶州以敗還聲言益發人騎且出嫚詞復攻圍大順城詵乃留止請時服使者及歲賜而移宥州問故明年又乞留賜冬服及大行遺留二使而自以帥牒告之諒祚始因詵謝罪共職貢趙卨卭州人知延州夏人屢欲款塞每以虛聲搖邊詔問方略卨審計形勢為破敵之策以獻檢括境內公私間田得七千五百餘頃募騎兵萬七千訓練精鋭過於正兵後遷龍圖閣直學士復帥延安知夏將入寇檄西路將劉安李儀曰夏即犯塞門汝徑以輕兵搗其腹心後果來犯安等襲洪州俘斬甚衆夏遂入貢范純粹吳縣人元祐中出知延州徽宗立再臨延州以課最聞陶節夫鄱陽人知延安府招降羌有功築石堡等四城石堡以天澗為隍可趨者惟一路夏人窖粟其間以千數既為宋有其酋驚曰漢家取我金窟堝亟發鐵騎來爭節夫分部將士遮禦之斬獲統軍以下數十百人夏人度不可得斂兵退方議城銀州諜告夏人巳東節夫料必西趨涇原乃遣禆將耿端彥疾驅至銀州五日城成夏人果從涇原至則城備巳固遂遁去李南公鄭州人知延安府夏人犯涇原南公出師搗其虛夏人解去賈炎獲鹿人徽宗時知延安府時宣徽使童貫禁夾錫錢不得用民以為苦炎表言邊氓生理蕭條官又再變法鄜延去敵迫近民不安則邊不可守又與貫論邊事不合貫沮之改河陽錢即錢唐人徽宗時知延安府時夏使由鄜延事有小不如式者即投檄夏國責其失禮夏人憚之郭永元城人徽宗時為丹州司法參軍守武人為姦利無所忌永數引法裁之守盛兵民竄匿山谷著招諭撫循修舉廢墜民始安輯有鄒二者不孝著召諭化之二遂改行為孝子陳蚪永豐人宣宗時知延安府為政公敏任滿當遷軍民遮道乞留詔加陡西右參政給正三品俸仍蒞延安張庸江寧人宣德中知保安縣有政績九年奏最當遷民乞留詔增秩還任王鑑太原人天順時為御史以劾石亨曹吉祥左遷知膚施縣憲宗嗣位所司以治行聞擢守郡特賜封誥董盡倫合州人萬厯中知安定縣有惠政秩滿安定人詣闕請留詔加鞏昌同知仍視縣事李懷信大同人萬厯中遷定邊副總兵布色圖和爾啓都哩巴顔泰等無歲不擾定邊居延綏西被患尤棘懷信勇敢有謀寇入輒敗故邊患雖劇而士氣不衰布色圖舊作卜失兔和爾啓舊作火落赤都哩巴顔泰舊作鐵雷擺言太今並改羅爌清源人崇禎初知延川縣土寇焚劫孤城受圍爌訓練兵壯誓衆死守居北門城樓五年不返署邑城獲全蒲來舉崇禎中知甘泉縣賊至守備孫可法等擁兵不救城陷來舉手創數賊而死贈光祿少卿應昌士仙居人崇禎末知安定縣賊至堅守賊環攻旬日不能克前任知縣王垣四川人以攝會寧縣事為賊所執至是逼之説降垣登城朂昌士死守賊急攻陷之殺垣於城上執昌士亦不屈死萬代芳遼東人崇禎中知延長縣流賊至與教諭談恩驛丞羅文魁協力城守城陷皆死之代芳妻劉氏妾梁氏俱從死代芳贈光祿丞妻妾並旌表恩等亦賜祭本朝馮如京代州人順治初為靖邊兵備副使巨盜黃色俊聚衆來犯如京糾民兵得數百人登城固守乘間出擊敗之遂乘勝搗平其巢賈廷璋山東人順治初知宜川縣王永強陷郡城索印廷璋不與被害事聞贈蔭如制時典史方一御亦與難黃瑤忠州人順治四年知安塞縣王永強之亂瑶堅守孤城拒戰而死贈按察使僉事宋從心𣏌縣人順治五年知延安府王永強據榆林偽檄至從心與守備萬廷貴碎其檄誓衆死守城陷從心遇害廷貴亦死於獄寺為追騎所殺次子光世宣和末討河北賊有功南渡後纍拜太尉兼淮南京東諸路宣撫使封楊國公韓世忠延安人目瞬如電鷙勇絶人宣和中以偏將從王淵討方臘擒之高宗即位授平寇左將軍屯淮陽苗傅劉正彥反世忠以所部發平江賊敗遁追擒送行在誅之帝手書忠勇二字揭旗以賜使守鎮江烏珠分道渡江世忠俟其歸邀擊之烏珠絶江遁去建炎四年金兵與劉豫分道入侵世忠軍次大儀設伏二十餘所及戰伏兵四起金兵大潰授京東淮東路宣撫處置使置司楚州在楚十餘年兵僅三萬而金兵不敢犯秦檜收三大將權拜樞密使尋罷為醴泉觀使卒孝宗朝追封蘄王諡忠武配享高宗廟廷世忠性勇敢忠義事關廟社必流涕極言嶽飛寃獄世忠獨攖檜怒抵排和議觸檜尤多持軍嚴重器仗更精絶過人克敵弓連鎖甲狻猊鍪及跳澗以習騎洞貫以習射皆其遺法子彥直彥質彥古皆以才見用烏珠舊作兀术今改解元保安軍人猿臂善射起行伍為清澗都虞候隸韓世忠麾下擢偏將金兵大至元領二十騎陷陳苗劉之變從世忠追至臨平與戰擒之從討湖外盜據其望樓賊遂平金與劉豫合兵至元屯承州擒金萬户黑頭虎追至數十里元攻城野戰未嘗敗衄終保信軍節度使韓彥直世忠子六歲從世忠入見高宗令作大字即跪書皇帝萬歲四字帝喜拊其背曰他日令器也登進士纍遷工部郎使於金幾罹禍者數抗節不屈纍遷户部尚書嘗托宋朝事分為類目名水心鏡百六十七卷張宗顔延安人父吉為涇原將解宣威城圍死之宗顔從張俊討賊纍遷崇信軍承宣使劉豫入寇宗顔自泗州為張俊繼遇劉猊大破之擢武信軍承信使知廬州總帥事卒諡壯敏金龎迪延安人少倜儻喜讀兵書善騎射應募有功嘗從百餘騎經行山谷遇夏人數千衆駭避迪遂躍馬犯陳敵皆披靡厯臨洮慶陽鳳翔尹汾陽絳陽軍節度使所至以治最聞性純孝父病刲股作羮昆弟析家産迪盡以與之一無所取官爵之廕率先諸姪楊仲武保安人皇統中除知寧州關中洊飢盜賊縱橫仲武悉平之遷同知臨洮尹木波寇熙河仲武與之約遂不敢犯塞厯陜西路轉運使元王思聰安塞人家貧力田以養親母喪盡哀父繼娶楊氏事之如所生父嘗病劇思聰拜祈於天額膝皆成瘡得神泉飲之愈後復失明思聰日舐之即能視縣上狀詔旌異之張閏延長人隸軍籍八世不異爨家人百餘口無間言日使諸女諸婦相聚為女紅畢即公貯一室各無私藏幼椎啼泣諸母見者必抱哺一婦歸省留其子衆婦共乳不問孰為巳兒亦不知孰為己母也閏兄顯卒即以家事付姪聚相讓既久卒歸於聚縉紳之家自謂弗如趙溉甘泉人明於經術至正中纍官吏部尚書清介不阿政績最著明張信膚施人父喪廬墓虎狼不為害正統中旌劉友德膚施人早孤事母至孝母病衣不解帶數月及卒廬墓乏水泉忽湧出同時有柏英者延安衛指揮母喪廬墓有兔鵲馴擾之異俱天順中旌李端保安人母喪廬墓有泉湧出狼不為害成化中旌趙彥膚施人萬厯中進士光宗即位以僉都御史巡撫山東請增兵戍諸島設鎮登州天啓初平妖賊徐鴻儒撫其衆四萬七千餘人論功進兵部尚書加太子太保極陳邊將剋餉役軍虛伍占馬諸弊因條列事宜帝稱善立下諸邊舉行以抗疏劾魏忠賢削籍尋追敘邊功即家進太子太傅杜桐延安衛人萬厯時纍官延綏總兵襲破套夷馘其部長徙鎮寧夏番衆大舉入寇桐連破之賊遂納款桐有將才自偏裨至大帥積首功至一千八百時服其勇杜松桐弟驍勇敢戰由舍人從軍纍官至延綏總兵寇犯安邊懷遠松大破之後鎮遼東萬厯末提兵援撫順戰殁於界凡山贈少保左都督本朝乾隆四十一年賜諡忠節杜文煥桐子萬厯中以蔭厯延綏遊擊將軍纍擢寧夏總兵官延綏被寇文煥赴救大破之遂代官秉忠鎮延綏又敗寇於安邊保寧長樂西路和爾啓布顔大懼相率來降沙津數盜邊為文煥所敗遂納款官至山西提督卒和爾啓譯見前布顔舊作卜言沙津舊作沙計今並改蕭如薰延安衛人厯寧夏參將守平鹵城布巴據寧夏遣其黨四出略地列城多風靡獨如薰堅守不下布巴養子雲最驍勇引套夷卓哩克圖急攻如薰伏兵南關射雲死又襲卓哩克圖營獲人畜甚多城獲全擢副總兵遂以都督僉事盡統延綏甘肅固原諸援軍與李如松等共平賊後厯七鎮魏忠賢黨劾之奪職歸如薰為將持重不苟趨利輕財愛士所在見稱布巴舊作哱拜卓哩克圖舊作著力兔今並改嶽具仰延安人舉於鄉厯瀘州知州户部郎中貴州亂朝議具仰知兵用為監軍副使及兵敗內莊為賊所拘具仰馳蠟書於外遂被殺事聞贈光祿卿録一子馬登鼇膚施人崇禎中以鄉舉知靈夀縣城陷死之從父大緯為蠡縣訓導亦死本朝乾隆四十一年豫祀忠義祠孫仲嗣膚施人崇禎末由貢生為階州學正當事知其才委以城守賊大至盡瘁死守城破與妻子並死之詔贈國子博士本朝乾隆四十一年賜諡節愍本朝王光印延川諸生母病劇醫者不審其症光印嘗糞察之焚香告天願以身代病竟愈且享大年後卒光印哀毁骨立廬墓三年文天爵安塞人由將材授廣東左翼鎮標遊擊康熙十五年賊孫楷宗誘之降天爵叱之遂𬒳殺沉尸於海事聞贈恤石之玫甘泉人順治中進士知桃源縣有惠政老成勤慎諳習河務河道總督靳輔疏薦其賢遷知福州府薛之竒延長人事母孝母殁淚盡繼以血撫幼弟之鳳成立卒不分爨由拔貢生選衡州府通判厯署州縣事以清謹稱後因官事卒於涪州纍贈按察司副使黃元龍靖邊人由武生積功洊升至四川提標中營參將乾隆十五年隨都統傅清駐西藏叛黨羅卜藏扎什糾衆肆擾元龍死之事聞議恤史纂欽安定人家貧父早喪負薪以養母母患癰纂欽吮之而愈殁廬墓三年終身不嘗甘旨乾隆十八年旌同邑南䁘孫宏澤楊鼎張士恭王艮一白皓濯趙芳勳石志廉趙璞王楊燦俱乾隆年間以孝行旌郝澄涇保安人事親能以色養父母有疾籲天願以身代親殁每食必獻如生前宗黨咸稱其孝乾隆四年旌又延長蘇芳延川梁永建宜川郝尊圯趙紀靖邊王守官俱乾隆年間以孝行旌施縉定邊人由營伍積功洊升貴州安義鎮總兵嘉慶五年川省邪匪滋事縉統黔兵協剿屢得勝仗後進攻賊匪於竹子山猝受矛傷陳亡事聞加等賜恤給騎都尉兼一雲騎尉世職馮種玉安定人嘉慶十二年以孝行旌列女宋孟氐女延安人父戍永樂城夏人攻城陷之父死孟氏呼號徒步入城獲父尸一慟而卒夏人憐之並其父葬焉韓世忠妻梁氏延安人苗傅劉正彥反世忠誓討賊以所部發平江時梁氏及子亮為傅所質朱勝非紿傅曰今白太后遣二人慰撫世忠則平江諸人益安矣於是召梁氏入封安國夫人俾迓世忠速其勤王梁氏疾驅出城一日夜會世忠於秀州進兵次臨平敗賊摛之焦山之戰梁親執桴鼓金兵終不得渡明蕭如薰妻楊氏膚施人尚書兆之女也如薰為平鹵參將城被圍楊盡出簪珥日具牛酒犒士城賴以完事平被旌同縣陸立望妻張氏吳著妻董氏張如楠妻紀氏均以守節旌又烈婦王敏妻陳氏楊于喬妻董氏楊虞徵妻王氏均夫亡殉節許舒妻曹氏甘泉人年十九而寡守節撫孤洪武中旌白光翰妻郝氏安塞人夫早亡遺子白崑未周歲厯盡艱苦撫育成立李恭妻景氏安定人夫亡遺腹生裕苦教成立同縣郝容母孫氏年十九守節劉漢興母石氏年十九遺腹生子與南征吉妻高氏並以節著李榮妻劉氏保安人年十八歸榮甫六月榮卒自經於柩前成化中旌又靳希顔妻韓氏以苦節著王紀妻張氏延川人年十九夫亡遺腹生男世寶竭力鞠育長就外孰歸必親課其業善事孀姑採樵汲水皆躬親之詔旌其門曰縣張謹妻馬氏年十八撫遺腹子事孀姑賀氏以孝聞又楊一元妻曹氏夫亡殉節劉廷瑚妻郭氏宜川人廷瑚知盧縣值寇破城同小姑丁香赴井死同縣郭景甫妻趙氏夫亡撫幼子維聘既長遂縊死乂張千妻趙氏劉永宏妻王氏李永第妻張氏均以苦節著焦子學妻李氏延長人夫亡守節嘉靖中旌同縣郭永安妻李氏年十九守節又董維新妻王氏李鏜妻趙氏馬陽妻賀氏並青年喪夫撫遺腹子成立張鏞妻周氏鏞為靖邊營千户病殁氏年十九守節撫孤七十餘歲卒又舊安邊餘丁張紀妻梁氏夫亡誓以身殉越三日自經死查瑾妻袁氏年十八瑾以救父陳亡氏聞不食死時清妻柏氏清為延安衛指揮陳亡氏年十八無子守節六十一年卒正統中旌又沙繼勳妻常氏繼勳早卒年二十餘刻木於堂事之如生垂四十年又張世功妻馬氏陶秉忠妻趙氏均年十九夫亡以苦節著劉爾甲妻楊氏膚施人尚書兆孫女適中部貢生劉爾甲崇禎末避亂夜遇流賊以衣蒙面投崖死宋薊妻高氏安塞人流賊起氏自鄉入城避之值賊至氏大罵賊截其耳束之馬上行經深谷竦身墜崖死薛文炳妻白氏安定人崇禎末賊大至氏奮曰吾義不受賊逼即投井死同時有張志道妻薛氏自縊死薛一翀妻高氏夫亡守妾子數年亦自鎰死郝建中妾陳氏年十七投井死薛三樂子婦某氏服毒死王彥俊女適某氏夫被盜殺投冰孔死韓炳衡妻鄭氏保安人炳衡舉進士崇禎中流賊破城索財物鄭氏曰吾夫清官焉取長物賊以白刃脅之遂延頸受刃死同時貢生劉善慶妻張氏自經死王符妻李氏流賊至城下氏命婢取櫛沐具曰吾將見先人地下耳城陷賊至氏罵不絶口賊刃其頰傷左耳氏掩耳投井死許志尚妻靳氏年十八其夫城守被傷將死賊至欲掠之氏紿之曰夫死在旦夕待殁吾掩尸從汝是夕夫死氏葬之牆下遂自投於井賊掖之將出復躍入死馬萬選妻高氏延川人崇禎九年為流賊所掠氏厲聲罵賊賊強挾上馬氏奮身投崖死本朝薛之光妻田氏膚施人事舅姑以孝聞康熙十六年朱龍叛被虜詈罵不從遂遇害同縣吳大年妻左氏楊捷春妻趙氏朱文鳳妻尉氏李之正妻何氏均夫亡苦節雍正年間旌李天保妻王氏安塞人天保為延安營卒康熙十八年調戍平涼挈氏同往後從征四川牛頭山賊卒於軍氏年方少誓死不二扶櫬歸鄉里同縣張大美妻李氏年十九大美客死氏聞之痛絶復蘇孝事翁姑撫孤成立何繼秀妻宋氏年未笄父患危症割股愈之適何而寡撫遺腹子成立均雍正年間旌強勷妻南氏安定人年十九夫亡苦節同縣王運超妻張氏強貴妻吳氏南苞妻石氏任覺民妻南氏張文藻妻石氏均雍正年間旌牛紹孔妻王氏保安人年十七夫亡乞從子世祿為嗣辛勤鞠育迄於成立同縣牛重輪妻王氏亦以守節著均雍正年間旌張宗妻黑氏宜川人年二十夫亡姑以其少欲遣去氏囓指自誓姑悔之氏承歡朝夕白首無間以禮法自持守節四十七年劉姚舜妻梁氏延川人年二十夫亡遺一子目盲氏日夜焚香祝天子目復明守節六十三年郭運隆妻白氏延長人年二十二夫亡晝耕夜織苦節撫孤每汲水採薪負兒於背守節四十五年同縣朱秉寅妻羅氏李曰福妻鄭氏馮仕萃妻董氏王大臣妻沙氏均雍正年間旌賀麟妻郭氏定邊人康熙十八年寇掠定邊麟被掠而亡氏年二十三奉姑育子厯五十餘年同縣陶魁妻王氏年十八夫亡叔俊勸令改嫁氏翦髮刺指以誓守節終身賈世虎妻謝氏年二十夫亡生子甫三月家甚貧從兄逼令改嫁終不從亢孝妻許氏夫亡年二十一苦志守節均雍正年間旌趙士魁妻張氏膚施人年十六夫亡事翁姑克盡孝道教子成立茹貧守節三十餘年乾隆三年旌同縣房象乾妻趙氏閻丕顯妻周氏李開唐妻陳氏趙妻夏氏閻孔訓妻南氏尉鵬圖妻賀氏尹柱妻張氏馮紹緒妻劉氏高文煌妻任氏又烈婦孫三保妻張氏均乾隆年間旌閻廷選妻黨氏安塞人夫殁毁面截髮誓不欲生翁姑勉以撫孤守節備極艱苦乾隆三年旌同縣馬賦吉妻閻氏趙廷琮妻沙氏白煒妻閻氏宋柱妻孫氏韓世勛妻拓氏高如辰妻白氏石𠬢妻高氏李􅴭妻季氏郭士楊妻方氏高通妻李氏劉基敬妻白氏均乾隆年間旌李煥妻王氏甘泉人煥客亡長安氏號泣不欲生守節四十餘年仲子枝榮負骸歸葬人稱母節子孝乾隆四年旌同縣孫汝賢妻張氏張場妻章氏路維妻白氏張星輝妻毛氏張惟妻章氏王人翼妻嶽氏均乾隆年間旌強妻史氏安定人夫亡年二十七事孀姑孝姑