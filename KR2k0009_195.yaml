  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_195-1a}
body:
  text: 土默特二旗在喜峯口東北五百九十里東西距四百六十里南北距三百一十里東至養息牧牧廠界西至喀喇沁右翼界南至盛京邊牆界北至喀爾喀左翼及敖漢界至京師一千里建置沿革本古孤竹國漢置柳城縣屬遼西郡為西部都尉治晉咸康中燕慕容皝改為龍城縣遂建都號和龍宫北魏為營州治隋復置柳城縣為遼西郡治唐為營州都督府治後為奚所據遼太祖平奚置興中府治興中縣隸中京道金因之元降為州屬大寕路明初以内附部長為三衞指揮使自錦義厯廣寕至遼河曰泰寕衞永樂初以忽刺胡班為都指揮僉事掌泰寕衛事三年阿繖掌衞事終明之世叛服不棠阿繖舊作阿散今改正嘉靖以後小王子之裔居此者號曰圖們是為土默特本朝天聰三年其台吉鄂木布楚琥爾偕塔布囊善巴來降崇德元年以善巴從征有功封達爾漢鎮國公世襲主左翼康熙元年晉多羅達爾漢貝勒至嘉慶二十一年以濟克默特扎布襲封凡九世附貝勒一康熙四年封世襲順治五年封鄂木布楚琥爾之子固穆為鎮國公世襲主右翼康熙二年晉固山貝子至嘉慶四年以瑪呢巴達喇襲封凡十世共爵三其貢道由喜峯口右翼駐大華山在喜峯口東北五百九十里東西距二百九十里南北距一百八十里東至左翼界九十里西至喀喇沁右翼界二百里南至盛京邊牆六十里北至敖漢界一百二十里東南至喀喇七靈圖山八十里西南至鄂博圖插漢和邵山二百七十里東北至博羅惠波洛温都爾山一百二十里西北至胡西哈圖山一百八十里左翼駐旱龍潭山在喜峯口東北八百二十里東西距一百六十里南北距一百三十里東至養息牧牧廠界八十里西至右翼界八十里南至盛京白土廠邊門三十里北至喀爾喀左翼界一百里東南至額倫布坦插漢台九十里西南至盛京清河邊門一百十里東北至黒頂山八十里西北至阿里馬圖山九十里山川大華山右翼貝子所駐蒙古名巴煙花又有二巴煙花山一在其東四十里一在其北十五里遼史興中府有大華山小華山衣達摩山在右翼東十三里五鳳山在右翼東四十里蒙古名他奔拖羅海麝香山在右翼東四十里蒙古名翁額勒庫盛京義州北清河發源於此蓮花山在右翼東六十里花拖羅海山在右翼東九十里喀喇七靈圖山在右翼東南八十里臺土山在右翼南五里神應山在右翼南三十里一名平山蒙古名蘇巴爾噶圖盛京義州柳河川河發源於此哈札噶爾山在右翼南六十里阿爾札噶爾山在右翼南七十里五藍峯山在右翼南九十里土祿克臺山在右翼西南一百二十里道場山在右翼西南一百五十里蒙古名庫里野圖山半有二洞内有石佛卓常吉爾山在右翼西南二百里山南有一泉南流㑹木壘河葦蘇圖喀喇山有二一在右翼西南二百里一在右翼西北一百九十里明安喀喇山在右翼西南二百二十里山頂有洞盛京錦縣小淩河發源於此卓杭吉爾山在右翼西南二百三十里山北有泉北流㑹木壘河牛心山在右翼西南二百五十里蒙古名巴煙朱祿克釜山在右翼西六十里蒙古名喀喇拖和多青山在右翼西九十五里蒙古名博羅和邵鳳凰山在右翼西一百里蒙古名兆馨喀喇山頂有洞西北有塔棗山在右翼西一百二十里蒙古名齊巴噶圖喀喇姤山在右翼西一百五十里蒙古名查伯齊克森噶查哈伯他海花山在右翼西一百八十里石塔峯山在右翼西一百八十里蒙古名蘇巴爾圖圖和邵上有三塔天保山在右翼西二百里蒙古名騰葛里蒙克哈達圖喀喇和邵山在右翼西二百里鐵幡桿山在右翼西北七十里蒙古名馬尼圖香高山在右翼西北七十五里蒙古名温都爾散花遼史興中府有香高山布祿爾喀喇山在右翼西北一百二十里栗山在右翼西北一百八十里蒙古名河西哈圖喀喇上有四塔七寶山在右翼北六十里蒙古名多倫和爾賀錦屏山在右翼北一百里蒙古名喀爾乾回賀爾山在右翼北一百里狼山在右翼北一百十里蒙古名綽農圖赤山在右翼東北六十里蒙古名五藍馬鞍山在右翼東北九十里蒙古名席喇得伯僧額色賀爾波山在右翼東北九十里博羅㑹波洛温都爾山在右翼東北一百二十里楊山在右翼東北一百三十里蒙古名烏里雅蘇台旱龍潭山左翼貝勒所駐在盛京義州北一百七十五里蒙古名海他哈山大隄河發源於此野狐山在左翼東南三十里蒙古名烏納格圖石塔山在左翼東南六十里蒙古名蘇巴爾噶圖山上有塔山腰有洞七金山在左翼東南七十里蒙古名和爾博爾金烏拉布爾圖山在左翼東南八十里達離山在左翼南十里蒙古名刻特俄爾多和邵羖羊山蒙古名衣馬圖有二一在左翼西南三十里一在左翼西北八十里古爾板温都山在在翼西南四十里膜衣達摩山在左翼西十三里三塔山在左翼西三十里蒙古名古爾板蘇巴爾漢上有遼金時所建三塔猶存旁有興中舊城址青金山在左翼西七十里蒙古名博羅蒙魁青蛇山在左翼西北四十八里蒙古名漠惠博羅黑山在左翼西北五十里蒙古名邵圖喀喇彌勒山在左翼西北六十里蒙古名邁達里盛京義州東北細河發源於此山石峯山在在翼西北八十里蒙古名七老峯黑頂山在左翼西北一百里蒙古名喀喇拖羅海盛京廣寕縣東北樂洋河發源於此陶金圖山在左翼北五里伊克翁山在左翼北三十五里山麓有一塔巴漢翁山在左翼北四十里褪邦圖山在左翼北四十五里西有一塔阿漢里拖羅海山在左翼北七十里馬盂山在左翼北七十五里蒙古名哈伯他海麝香崖在右翼東九十里蒙古名翁克勒庫遼史興中府有麝香崖駐龍峪在右翼南三十里蒙古名奴祿拉呼遼史興中府有駐龍峪盤嶺在右翼西南二百八十里青鸞嶺在右翼西北一百八十里蒙古名