出額類嶺南流㑹寛河至盛京寕遠州西入邊為黑水河㑹六州河寛河在左翼南一百十里蒙古名布勒圖源出寛山東流㑹額類河明宣德三年大破三衞之兵於寛河即此舊志在遷安縣西一百七十里和爾圖河在左翼西十里源出陀蘇圖喀喇山東流㑹敖木倫河森几河在左翼西四十里源出森几圖山東流㑹敖木倫河賽因台河在左翼西北六十里源出鴻吉岱山東流入敖木倫石塔河源出左翼西北八十里東南流㑹克爾河神水河入敖木倫河蒙古名蘇巴爾噶河清水河源出左翼西北八十里東南流㑹克爾河神水河入敖木倫河青龍河在左翼西北一百二十里蒙古名顧沁河源出長吉爾岱山西南流㑹湯圖河經額倫碧老嶺入邊城經永平府北入灤河大淩河在左翼北五里蒙古名敖木倫河源出尾蘇圖山東流至西喇哈達圖山又東北折入土黙特右翼界又東南入邊為大淩河神水河源出左翼北九十里蒙古名阿喇善河東南流經弩山㑹石塔河克爾河入敖木倫河泥濼在左翼西北一百里蒙古名西巴爾台西流㑹青龍河鄂倫布拉泉在右翼東南一百七十里北流㑹烏魯蘇台河入老河博爾多克泉在右翼東南一百八十里源出博爾多克山東南流㑹土爾根河紅果爾泉在右翼南七十里巴爾漢温泉源出右翼南一百里南流㑹上神水河温冷特泉在右翼南二百里拉克拉哈爾泉在右翼南二百三十里源出拉克拉哈爾山東南流㑹豹河賽因阿喇善温泉在右翼西南一百八十里即熱河之源湯泉在右翼西八十里卯金温泉在右翼西一百十五里有二泉一出卯金河東西流㑹卯金河一出卯金河西東南流亦㑹卯金河烏里雅蘇台泉在右翼西北九十里源出西寶敖爾山西北流㑹克爾河奴黑圖泉在右翼北三十里五泉在左翼東三十五里源出五嶺東南流㑹遂濟河蒙古名他奔泉蒙格泉在左翼西七十里烏哈爾温泉在左翼北一百里古蹟大寕舊城在右翼南本遼時大定府遼史地理志中京大定府秦為遼西郡漢為新安平縣漢末步奚居之幅員千里多大山深谷險阻足以自固魏武北征縱兵大戰降者十餘萬去之松漠其後拓跋氏乘遼建牙於此當饒樂河水之南温渝河水之北唐太宗伐高麗駐蹕於此部帥蘇支從征有功奚長可度率衆内附為置饒樂都督府咸通以後契丹始大奚族不敢復抗太祖建國舉族臣屬聖宗常過七金山土河之濱南望雲氣有郛郭樓闕之狀因議建都擇良工於燕薊董役二歲郛郭宫掖樓閣府庫市肆廊廡擬神都之制統和二十四年五帳院進故奚王牙帳地二十五年城之實以漢戸號曰中京府曰大定城池湫濕多鑿并泄之人以為便金史地理志遼中京海陵貞元元年更為北京置留守司元史地理志大寕路元初為北京路總管府至元七年改為大寕二十二年改為武平路後復為大寕明典彚洪武初即古㑹州大寕地設北平行都司興營諸屯衞封建寕藩與遼東宣府東西聯絡為外邊號稱雄鎮永樂初烏梁海内附乃徙行都司於保定散布興營諸衞於京府大寕之地盡卑烏梁海通貢互市朶顏泰寕福餘三衞是也孫承澤山水記明洪武二十年置大寕都指揮司二十一年改為北平行都指揮使司二十四年封皇子權為寕王建文元年燕王兵出劉家口襲破大寕以寕王及將士歸北平大寕初設未有氏人但立一十六衛自燕王拔之而南遂爲空城及轉戰三年始下南京而大寕巳棄之後不能復置因徙衞於山南而以其地卑烏梁海舊志明宣德三年烏梁海犯大寕帝親征至寛河大破之景泰四年泰寕都督僉事單于特穆爾乞大寕廢城及甲盾兵部尚書于謙力持不可遂不許宏治中朶顏諸部始横特穆爾舊作帖木兒今改正按舊城在今哈喇沁右翼南百里喜峯口東北四百八十里老河北城周二十里南北四門東西二門久圯舊青城在右翼南一百五十里蒙古名喀喇城明初所築周四里四門薊門考大寕至青城二日程即此舊㑹州城在右翼南二百二十里周三里餘四門蒙古名插漢城本元時惠州地後訛爲㑹明初元将納克楚據金山洪武二十年命宋國公馮勝率師出松亭關築大寕寛河富峪及㑹州四城留兵居守即此薊門考青城至㑹州二日程離大喜峯口一百餘里又云大寕西南至青城七十里青城西南至㑹州一百二十里㑹州西南至喜峯口二百里納克楚舊作納哈出今改正利州舊城在左翼東北遼統和二十河元史地理志大寕路大定中統二年省長興入焉九邊圖縣在馬盂山西按今本遼史作長安而金史不言更名蓋遼史訛也舊富庶縣在舊大寕城東遼開泰二年置屬大定府金因之元至元三年省入興中州後復置屬大寕路九邊圖縣在白狼山東舊和衆縣在舊大寕城東南遼史地理志榆州高平軍本漢臨榆縣地後隸右北平驪城縣唐載初二年析鎮州置黎州處靺鞨部落後為奚人所據太宗南征横帳解里以所俘鎮州民置州開泰中沒入屬中京統縣二和衆縣本新黎縣地金史地理志大定府和衆縣皇統三年廢榆州以縣來屬元史地理志大寕路領和衆縣九邊圖在白狼山北舊高州在舊大寕城西北遼史地理志高州觀察唐信州之地開泰中聖宗伐高麗以俘户置高州屬中京金史地理志天輔七年高州置節度使皇統三年廢為三韓縣承安三年復升為高州置刺史泰和四年廢元史地理志大寕路領高州舊松山縣在舊大寕城西北遼史地理志松江州勝安軍開泰中置屬中京統縣一松江縣本漢文
