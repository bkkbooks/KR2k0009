史扶弱抑強進善黜惡教化大行卒于官吏民痛惜之李欣范陽人文成時為相州刺史為政清簡百姓稱之上疏請州郡各立學官使士望之流就而受業其經藝通明者貢之王府書奏從之政為諸州之最陸馥代人興安初為相州刺史為政清平抑強扶弱州中有宿老重望以友禮待之得十人號曰十善又簡諸縣強門百餘人為耳目發姦摘伏事無不驗李平頓邱人宣武時司徒長史行相州事勸課農桑修飾太學簡試通儒以充博士圖古聖賢像于講堂親為立贊北齊赫連子悅勃勃之後除林慮守世宗往晉陽路由是郡因問所不便子悅答云臨水武安二縣去郡遙遠山嶺重疊車步艱難若改屬魏郡則地平路近世宗笑曰卿徒知便民不覺損幹子悅答曰所言因民疾苦不敢以私潤員公心世宗云卿能如此甚善甚善仍敕依事施行隋梁彥光烏氏人高祖時轉相州刺史彥光前在岐州奏課為天下第一及居相如部岐州法鄴都雜俗多變詐為之作歌稱其不能理化上聞而譴之竟坐免歲餘拜趙州刺史彥光請復為相州上從之豪猾者聞彥光自請而來莫不嗤笑彥光下車發摘姦隱有若神明合境大駭招致山東大儒每鄉立學非聖哲之書不得教授及大比當舉行賓貢之禮又于郊外祖道并以財物資之于是人皆尅厲風俗大改吏人感悅略無爭訟礬叔略陳留人高祖時遷相州刺史政為當時第一帝降璽書褒美之百姓為之語曰智無窮清鄉公上下正礬安定徵拜司農卿吏人莫不流涕相與立碑頌其德政長孫平洛陽人高祖時鄴都舊號難治前後刺史多不稱職朝廷以平所在善稱轉相州刺史甚有能名薛胄汾隂人開皇中檢校相州事甚有能名唐吕珉武德二年竇建德連突厥侵相州刺史吕珉死之房晃武德五年劉黑闥陷相州刺史房晃死之許圉師安陸人高宗時遷相州刺史專以寬治州人刻石頌美部有受賕者圉師不忍按但賜清白針其人自愧後修飾更為廉士李景咸亨三年為相州刺史開高平金鳯萬金諸渠引洹水溉田民獲其利李仁綽成亨四年為臨漳令開菊花利物二渠引天平渠水以溉田民甚德之裴懷古夀春人武后時徒相州刺史吏民懷愛宋璟南和人中宗時厯相州刺史政清毅吏下無敢犯者張嘉祐猗氏人開元未為相州刺史舊刺史多死官衆疑畏嘉祐以周總管尉遲迥死國難忠臣也立祠房解祓衆心後吳競為刺史又加神冕服遂無患王燾郿人天寶中厯鄴郡太守治聞於時田廷玠盧龍人與承嗣為從昆弟大厯中徙相州刺蟲承嗣盜磁相廷玠無所回染宋錢文敏新安人太祖時厯相州録事參軍先是府帥多以筆牘私取官庫錢韓重贇領節制頗仍其弊文敏不從重贇假他事廷責之文敏不為屈太宗嘉其有守索湘鹽山人太宗時知相州時有羣盜聚西山下謀斷澶州河橋入攻磁相州白晝抄劫鄰郡發兵捕逐無敢近湘擇州軍得精鋭三百人偵其入境掩擊盡擒之韓億雍邱人真宗時知相州河北旱轉運使不以實聞億獨言歲飢願貸民租崔立鄢陵人真宗時厯知相州識韓琦于布衣人服其鑒王獵長垣人仁宗時徒林慮令縣依山俗以搜田為生不知學獵立學宫擇秀民誨之漢杜喬墓在境中往奠謁建祠其旁居官無絲髮優吏民愛信共目為清長官高化正定人仁宗時知相州部有大獄已具皆當論死化疑之遣移訊果出無罪者三人李復圭豐人仁宗時徙知相州自太宗時聚夏人降者五指揮號聽子馬子弟相承百年無他役復圭斥不如格者選能騎射士輔之趙不試太宗六世孫建炎元年知相州金兵大入州久被圍軍民無固志不試謂之曰今城中食乏外援不至不試宗子也義不降計將安出衆不應不試知事不可為遂登城與金兵約勿殺許之既啓門乃納其家井中然後以身赴井命提轄官實以土州人皆免於死金田灝興中人太祖時遷彰德軍節度使是時新定力役灝蠲籍之半而上之故相之繇賦比他州獨輕梁肅奉聖州人世宗時為彰德軍節度使召拜參知政事上謂侍臣曰梁肅以治入異等遂至大任亷吏亦可以勸矣洪郭玖柱臨潢人明昌中知彰德府事戰殁洪郭玖柱舊作黃稒九住今改陀滿色勒咸平路明安人承安中徙知彰德府事貞祐四年元兵復取彰德色勒死焉陀滿色勒舊作陀滿斜烈明安舊作猛安今改正元王踞仁河間人延祐中為涉尹在職二年流民復業者百四十餘户滹沱之役計民之貧富以上中下為則百姓皆便之明蔡誠巢縣人洪武初知安陽縣時百姓新附田蕪不治誠買耕牛給貧民由是地闢民富凡縣廨學校皆誠所建劉安零陵人永樂中為武安知縣嘗以事逮詔獄民相謂曰廉官去矣吾儕安歸多相攜逃山中後安事釋復任逃者皆返奏最為河南第一卒於官葛守禮德平人嘉靖中授彰德推官巨盜誣富家株連以百數守禮盡出之藩府獄久不決御史以屬守禮一訊即得乃大驚服冬至趙王戒百司朝服賀守禮獨不可乃止許文獻長洲人嘉靖間為涉縣知縣性狷介不名一錢僮僕常至飢寒去任家人取一氊立令發回人稱其亷遠應泰鳳翔人萬厯中授臨漳知縣築長堤四十餘里捍禦漳水袁化中武定人萬厯中知內黃縣有善政曹鳴鶚崇禎六年流賊犯武安時鳴鶚為守備戰死本朝王象天富平人順治四年知臨漳縣河決壞民田力請蠲賦協濟磁州驛站縣人詣州供役甚苦之請仍舊例解銀免役不果遷太僕丞去後令萬廷仕復請之象天為言於部得報允後督湖廣學政過邯鄲漳民越境迎之老弱塞路張沐上蔡人康熙元年任內黃知縣潔已愛民縣苦賦役不均輸糧者或無田沐令田主自首地畝不文而清嚴行十家牌法姦宄斂迹適苦旱自八月不雨至次年九月民飢甚思竄沐先捐資賑救並勸富民貸粟官為書其數俟秋獲取償多方獎諭人爭應之藉免轉徒按內黃本屬直隸雍正初始隸河南故沐以上蔡籍仕內黃高啓元萊陽人康熙十二年知安陽縣勸墾荒除雜派大兵征滇逆休士四十日芻茭悉自捐備不以纍民李適夀光人知內黃縣為政仁恕務與民休息歲終胥吏以荒地羡金三千進適叱却之以充來歲額賦又申減學田歲征之半立五社課士文學蔚興遷官去行李蕭然邑民立祠祀之武達觀岐山人乾隆間任武安知縣冰檗矢志凡擾民之事悉為革除民為歌曰官之清民之福昌其後崇其祿會縣有蝗蝻達觀自責祈禱蝗旋滅以卓薦入都百姓焚香泣送祝其復來比再任悲喜交集如見慈父母焉祀名宦前總纂官臣張琴恭纂輯提調官臣張日章恭覆輯校對官臣呂育林恭校校對官臣章詒燕恭覆校
