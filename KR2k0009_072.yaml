front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_072-1a}
body:
  text: 歸德府三人物漢灌嬰睢陽人以中涓從高帝定天下封潁陰侯吕后崩吕祿等欲為亂齊王舉兵西祿等以嬰為大將軍往擊之嬰乃與絳侯等謀屯兵榮陽絳侯既誅諸吕罷兵歸以丞相卒諡曰懿侯欒布梁人彭越嘗與布遊布後為奴於燕燕將臧荼舉為都尉漢擊燕虜布越請贖為梁大夫使於齊未反及越誅布還奏事越頭下祠而哭之吏捕以聞高帝趨烹之布曰垓下之會微彭王項氏不亡今反形未見以苛細誅之臣恐功臣人人自危也乃釋布拜為都尉孝文時為燕相以功封鄃侯申屠嘉梁人以材官蹶張從高帝為都尉孝文時為丞相嘉廉直門不受私謁大中大夫鄧通方愛幸居上旁怠慢嘉為檄召通責曰朝廷者高皇帝之朝廷也通小臣戲殿上大不敬當斬通頓首出血不解帝使使持節召通而謝丞相乃免卒諡曰節侯韓安國梁成安人徙睢陽事梁孝王為中大夫吳楚反安國擇吳兵於東界而名以顯武帝時遷御史大夫其為人多大略智足以當世取舍而出於忠厚所推舉皆廉士於梁舉壺遂臧固郅他皆天下名士士以此稱慕之壺遂梁人與太史今司馬遷等定漢律厯官至詹事深中隱厚內廉行修武帝方欲倚以為相會病卒高遂梁人栗太子廢竇嬰爭勿能得謝病屏居藍田南山下數月諸竇賓客辨士説莫能來遂乃説嬰曰將軍屏間處而不朝是自明揚主之過有如兩宫螫將軍則妻子無類矣嬰然之乃起朝請如故丁寬梁人梁項生從田何受易時寬為項生從者讀易精敏材過項生遂事何學威何謝寬寬東歸何謂門人曰易以東矣景帝時寬為梁孝王將軍拒吳楚號丁將軍作易説三萬言焦贛梁人嘗從孟喜受易京房師之戴德梁人從凡子聖字次君並受禮於后蒼德為信都太傅聖以博士諭石渠至九江太守由是禮有大戴小戴之學橋仁梁人與楊榮並受小戴槽仁著槽記章句四十九篇成帝時為大鴻臚家世傳業榮琅琊太守由是小戴禮有橋楊氏之學周慶梁人傳穀梁之學為博士丁姓梁人與蔡千秋周慶皆從榮廣受榖梁春秋宣帝時求能為榖梁者莫及千秋乃以為郎中户將選郎十人從受會千秋病死乃徵周慶丁姓待詔保宫使卒授十人自元康中始講至甘露元年積十餘歲皆明習姓至中山太傅韓伯俞梁人嘗有過其母笞之泣母曰他日笞子未嘗泣今泣何也對曰他日笞常痛今母乏力笞不覺痛是以泣夏恭梁國蒙人習韓詩孟氏易講授門徒嘗千餘人王莽末盜賊縱橫恭以恩信為衆所附擁兵固守蒙獨安全光武嘉其忠召拜郎中遷泰山都尉和集百姓甚得其歡心恭善為文著賦頌詩勵學凡二十篇卒官諸儒私諡曰宣明子牙少習家業著賦頌贊誄凡四十篇舉孝廉早卒鄉人號曰文德先生車成梁都人兄弟並為赤眉所執將食之成叩頭乞以身代賊哀而兩釋之虞詡武平人祖父經為郡縣獄吏案法平允詡年十二通尚書早孤孝養祖母縣舉順孫辟太尉府拜郎中永初四年鄧騭欲棄涼州詡異其議出為朝歌長轉懷令時羌寇武都以詡有將帥略遷武都太守永建元年為司隸校尉奏太傅馮石等百官側目案中常侍張防屢寢不報詡乃自繫廷尉書奏坐論輸左校防必欲害之二日之中傳考四獄門生百餘人舉幡言枉狀乃赦之復拜議郎官至尚書令詡好刺舉無所回容數忤權戚九見譴考三遭刑罰而剛正之性終老不屈子恭有俊才官至上黨太守葛龔寧陵人和帝時以善文記知名性慷慨壯烈安帝永初中舉孝廉為大官丞上便宜四事厯官蕩隂臨汾二縣今皆有續著文賦碑誄書記凡二十篇審忠梁人靈帝時為郎中光和二年連有哭異忠以為朱瑀等罪惡所感上書勸帝掃滅醜類以答天怒章寢不報後宦官誅忠始辟公府橋元仁七世孫少為縣功曹謁刺史乞為部從事窮案梁冀所厚陳相羊昌賊罪由是著名桓帝時為度遼將軍邊境安靜靈帝𥘉纍遷司徒素與南陽太守陳球有隙及在公位薦球為廷尉光和元年遷太尉以疾罷元性剛急然謙儉下士當時稱之卒年七十五家無居業喪無所殯三國魏典韋巳吾人形貌魁梧膂力過人任俠為襄邑劉氏報讐豪傑義之初屬夏侯惇有功拜司馬魏武討吕布於濮陽賊矢如雨韋持十餘戟大呼起所抵無不應豫倒者布還拜韋都尉引至左右將親兵數百人常繞大帳遷為校尉性忠至謹重嘗晝立侍終日夜宿左右稀歸私寢張繡襲魏武營韋戰於門中創重死梁習柘人魏武辟為漳長遷西部都督從事表置屯田都尉於道次耕種菽粟以給人牛之費文帝時為并州刺史在州二十餘年居處貧窮無方面珍物明帝異之徴拜大司農卒衛臻陳留襄邑人父兹有大節不應三公之辟魏武初至陳留兹曰平天下者必此人也魏武亦異之數詣兹議事從討董卓卒於榮陽臻為散騎常侍文帝踐阼時羣臣頌魏德多抑損前朝臻獨明禪授之義稱揚漢美纍官右僕射明帝方隆意於殿舍臻數切諌曹爽輔政欲引臻入守尚書令及為弟求婚皆不許固乞遜位官終司徒晉陳頵谷陽人少好學有文義仕為郡督郵檢獲隱匿者三千人為一州尤最太守劉享引為主簿州辟部從事齊王冏起義州遣頵將兵赴之拜駙馬都尉元帝初典法兵二曹頵以孤寒數有奏議朝士多惡焉陶侃表為梁州刺史綏懷荒弊甚有威惠召還卒焦保谷陽人元康中同縣陳頵舉孝廉頵薦保曰保出自寒素稟質清沖若得參嘉命必能光贊大猷允清朝望州乃辟保南北朝魏李彥下邑人少有節操好學慕古為鄉閭所敬憚纍拜尚書左丞斷決如流略無凝滯臺閣歎其公勤明察性謙恭有禮節雖居顯要與親黨之間恂恂如也輕財重義好施愛士時論以此稱之唐盛彥師虞城人少任俠高祖起兵授行軍總管李密叛彥師引衆入熊耳山出奇兵擊斬之徐圓朗反詔彥師為安撫大使戰敗為所執圓朗令作書招其弟彥師書曰吾誓死報國若宜善侍母勿以吾為念圓朗笑曰將軍壯士也置之圓朗平得還程袁師宋州人母病十旬不褫帶藥不嘗不進代弟戍洛州母終聞訃日走二百里負土築墳貌癯人不復議常有白狼黃蛇馴墓左每哭羣鳥鳴朔永嵌中刺史狀諸朝詔吏敦駕既至不願仕授儒林即還之魏元忠宋城人少好兵術儀鳯中吐蕃數盜邊元忠上封事言命將用兵之要高宗善之纍遷殿中侍御史聖厯二年同鳳閣鸞臺平幸事中宋在東宫為檢校左庶于時二張勢傾朝廷元忠嘗癸曰臣不能徇忠使小人在君側易之等恨怒因譖元忠下獄貶高要尉中宗復位拜中書令卒陪葬溫陵諡曰貞朱敬則永城人志南恢博好學重四十節義善與人交賑其急難與三從昆弟同居年資産無異武后稱制興大獄誅將相大臣敬則時為右補闕上書諫后善其言進同鳳閣鸞臺平章事敬則執政每以用人為先薦裴懷古魏知古皆稱職軍誅易之兄嘗密謂敬暉曰公若假太子今舉北弟兩飛騎力耳暉卒用其䇿唐祚復安卒諡曰元朱仁軌敬則兄隱居養母常誨子弟曰終身讓路不枉百步終身讓畔不失一段有赤烏白鵲栖所居樹及卒郭山暉等共諡為孝友先生劉憲寧陵人父思立在高宗時為名御史遷考功員外郎卒於官憲擢進士纍進左臺監察御史天授中按來俊臣罪欲重繩之反為所搆貶官後纍遷太子詹事鄭惟忠宋城人天授中以制舉召見武后問舉者何所事為忠惟忠曰外楊君之美內正君之惡后曰善擢司禦曹參軍政遷鳯閣舍人中宗時厯黃門侍左郎進大理卿節愍太子敗守衛詿誤皆流已決諸聿黨請悉誅之惟忠奏大獄始判復改訊恐反側者不自安且失信後以賑給河北卒論如前所全貸為多道稱旨封榮陽縣男五代唐張廷藴襄邑人從宗壯之以莊宗征伐先登力戰金瘡滿體莊為步軍都虞侯魏博三城巡檢使莊宗在魏劉后從行多縱其下為不法廷藴輒收而斬之以平李繼韜功遷左監門衛上將軍廷藴武人識不過數字而平生重文士判官趙鳯後鳳為相性素廉厯七嘗破梁鄆州州卒之日家薦無餘皆宋劉熙古寧陵人後唐長興中中纍官參知政事熙舉進士宋開寶古通易詩書春秋及隂陽象緯之術性醇謹雖顯貴不改寒素集古今事迹為厯代紀要十五卷于蒙正善騎嘗射屢著軍㓛任終毫州團練副使蒙叟由科甲厯任職方郎中好學善屬辭著五運甲子編年厯三卷楊大雅宋城人素好學雖飲食不官集賢院學士朴學自信釋卷第進士纍無所阿附官二十五年不遷或笑其違世大雅曰吾不學乎世而學乎聖人是以至此後命知制誥上原治十七篇張去華襄邑人幼勵學敏於屬詞建隆初舉進士擢右補闕太宗時著大政要録三十篇以獻上覽而嘉之後改工部侍郎嘗獻元元論大旨以養民務穡為急真宗命以縑素寫其論為十八軸列置龍圖閣之四壁楊慤虞城人力學勤志不求聞達戚同文過其學舍慤異而留之不終歲畢誦五經慤即妻以女弟宗翼虞城人篤孝恭謹負未飬母好學強記能屬文隱居不仕戚同文歎為勞謙有古人風楚昭輔宋城人事太祖以才幹稱甚見信任性剛介人下敢干以私纍官樞密使檢校太尉李惟清夏邑人以三天解褐涪陵尉時宦官督輸造船木從恣惟清奏殺之由是知名遷主客員外郎雍熙中判度支議通鹽法惟清奏言以鹽配氏非便遂罷改度支使令遣使河朔治方田大發兵惟清以盛春妨農懇求罷廢至道二年拜同知樞密院事惟清倜儻自任所至稱強幹除御史中丞卒郭贄襄邑人舉進士太宗尹京因事藩邸太平興國中纍遷參知政事性溫和能延譽時雋宋白以文學沈下位贄薦引之曹彬為弭德超所誣贄極言救解後為鹽鐵使時諸路積逋欠犯人雖死猶繫其子孫贄條陳其事多所蠲貸嘗授真宗經及卒上以舊學之故親臨哭之諡文懿子昭度集其文為三十卷上之賜名文懿集許驤睢陽人郡人戚同文以經術聚徒驤從之學善屬文與吕蒙正齊名太宗初擢甲科纍官右諫議大夫知益州召歸言蜀民浮窳易搖宜擇忠厚者撫之為預備既而李順叛衆服其先見仕終工部侍郎張師德去華子真宗祀汾隂獻大禮頌舉進士第一遷集賢校理判三司嘗奏事殿中帝訪以時事條對甚備纍官左諌議大夫師德孝謹有家法不交權貴在西掖九年不遷卒官有文集十卷嵇穎宋城人天聖中及第王曽知青州徙天雄軍皆辟為從事纍官兵部員外郎召入翰林為學士未及謝卒穎舉進士時王曾張知白相繼為南京留守見潁謹厚篤學謂其子弟曰若曹師表也王堯臣虞城人舉進士第一纍遷翰林學士陜西用兵為體量安撫使使通奏邊事仁宗以其言戒邊吏又薦韓琦范仲淹不當置散地种世衡狄青有將帥才皆從之以户部郎權三司使時張永和建議收民僦舍錢轉運使請增鹽井課十餘萬堯臣諌以為牟利斂怨皆罷之纍進參知政事典內外制十餘年文詞溫麗執政時嘗與宰相文彥博富弼劉沆勸帝早立嗣為詔草挾以進未果卒諡文忠王洙宋城人舉進士纍官侍講學士知制誥嘗言天下田稅不均請用郭咨孫琳千步開方法頒州縣以均其稅又請借內藏庫禁錢乘時和糴以供邊食時論善之後為翰林學士洙泛覽傳記至圖緯方技算數音律䚯詁篆隸之學無所不通著易傳十卷子欽臣清亮有志操厯知成德軍石延年宋城人跌宕任氣節為文徑捷詩最工纍舉進士不第真宗人為三班奉職延年恥不就張知白素奇之謂曰母老乃擇祿耶不得已就命厯大理寺丞上書章獻太后請還政久之判登聞鼓院上言天下不議戰三十餘年請為二邊之備不報及元吳反始思其言張方平南京人少穎悟凡書一閲不再讀舉茂材異等又中賢良方正選著作佐郎趙元昊叛方平上平戎十策命直集賢院俄知諌院夏人寇邊方平首乞合樞密之職於中書以通謀議既以修起居注使遼遼主顧左右曰有臣如此佳哉酌玉巵飲之且贈以所乘馬還知制誥拜三司使初王拱辰議榷河北鹽方平請降手詔罷之西鄙用兵兩蜀多所調發方平為奏免橫賊四十萬減鑄鐵錢十餘萬緡神宗時纍官參知政事出判應天府高麗使過府長吏當送迎方平言臣班視二府不可為陪臣屈詔但遣少尹方平慷慨有氣節論事切至於用兵起獄尤反覆言之平居未嘗以顔色假人守蜀時得眉山蘇洵與其二子軾轍深器異之王安石行新法方平極論其害嶷然不少屈聲望高一時哲宗立加太子太保卒諡文定趙概虞城人少篤學自力器識宏遠為一時名輩稱許舉進士第厯官知制誥蘇舜欽等以羣飲逐概言預會者皆館閣名士舉而棄之非國之福為翰林學士聘遼會獵請概賦詩甚見禮重代韓絳為御史中丞絳以論張茂實不宜典宿衛罷概至首言之茂實竟去擢參知政事以太子少師致仕嘗集古今諌爭事為諌林百二十卷上之神宗賜詔奬卒諡康褒靖張景憲師德子神宗𥘉為户部副使韓絳築撫凝羅兀兩城命景憲往視始受詔即言城不可守未幾撫凝陷至延安又言羅兀邈然孤城鑿井無水將何以守願罷徒勞之役廢無用之城後以大中大夫卒景憲在仁宗朝為部使者時吏治尚寬獨多舉刺神宗以後吏治峻急反濟以寬居官不畏強禦非公事不及執政之門自負所守於人少所許可母卒一夕鬚髮盡白世以此稱之田京鹿邑人舉進士厯官提點河北刑獄事王則據恩州叛京縋城趨南關撫士卒營兵欲為亂京捕斬之遂督士卒攻城賊繫京妻子乘城呼之京督戰益力射殺其家四人賊氣奪恩州平纍遷知滄州終諌議大夫京尚氣節通兵戰厯算雜家之學著天人流術通儒子十數書蔡挺宋城人厯知慶渭諸州數與夏人戰大破之自以意製渡河大索及兵械鎌槍皆獲其用神宗五年拜樞密副使問挺涇原訓兵之法召部將按於崇政殿帝善之下以為諸部法後遼議雲中地挺請罷沿邊戍人示以無事因乞置三十七將皆行其䇿兄抗第進士英宗時同知諌院議安懿王典禮抗引禮為人後之誼指陳切至張整酇陽人神宗時為荆湖將領拓溪蠻地築九城董兵鎮守又破蠻於大田狤狑迫黔江城整擊之殺獲甚多涖軍嚴明官至威州刺史孫諤睢陽人少挺特不羣為張方平所器登進士遷左正言紹聖中治元祐黨諤言漢唐朋黨之禍其鑒不遠又言朝廷當示信以靜安天下請一切勿問帝每患臺諌之人諤立疏可用者二十二人章惇惡其拂已出知廣德軍徽宗立復為司諌帝以鯁直稱之徐處仁榖熟人舉進士厯東安金鄉二縣令以薦除太常博士纍拜尚書右丞忤童貫落職宣和中除侍讀言宜節浮費罷橫斂百姓既足軍儲必豐帝稱善詔置𥙿民局討論振兵𥙿民之法蔡京不悅出知揚州上備邊十䇿欽宗立拜太宰兼門下侍郎與吳敏異議罷高宗仍起為大名尹卒於郡許翰襄邑人第進士宣和中為給事中為書抵時相請罷雲中之師張邦昌為太宰翰力爭之高宗朝拜尚書右丞權門下侍郎黃潛善等欲罷宗澤翰極論不可李綱罷遂求去終資政殿學士翰通經術正直不撓厯事三朝致位政府與黼攸潛善輩不合不展其用議論剴切所著有論語解春秋傳趙俊宋城人舉進士官至朝奉郎隱居杜門雖鄉里不妄交建元末士大夫皆避地俊獨不肯曰但固吾所守爾死生命也避將安之晏然不動劉豫以為虞部員外郎辭疾不受以告卑其家卒卻之如是再三豫亦不復強凡家書文宇不用豫僭號但書甲子卒贈承直郎滕康宋城人第進士高宗時為諌議大夫旬日間封章屢上進同簽書樞密院事宰相吕頤浩議欲盡棄中原徙居於東南康力持不可乃止纍官資政殿學士許欣拱州人舉進士高宗時為吏部員外郎極論和議不便疏入不省乞外輔謫居撫州程逈寧陵人舉進士厯宰泰興德興進賢上饒政寬令簡綏強撫弱暇則賓禮賢士進其子弟之秀者為之陳説詩夀隱德潛善無問幽明皆表而出之以勵風俗嘗授經學於崑山王葆嘉禾聞人茂德嚴陵喻樗所著有古易考古占法古易章句易傳外編春秋傳顯微例目淳熙雜志等書學者稱沙隨先生卒官朝奉郎朱子以書告其子絢曰敬惟先德博聞至行釋經訂史開悟後學當世之務又所通該非獨章句之儒也子絢巴陵尉能理冤獄孫仲熊亦有名元陳思濟柘城人世祖在藩邸召備顧問即位命掌敷奏事無巨細悉就準繩憲章程式多出其手至元時拜監察御史阿合瑪立尚書省權在中書右思濟劾其不法纍官僉河南江北行中書省事多有惠政阿合瑪舊作阿合馬今譯改正孔全鹿邑人父病刲股肉啖之父卒居喪盡哀廬墓側負土為墳日六十肩風雨有虧俟霽則補之三年成墳又陳乞兒夏邑人年九歲母喪哀毁親負土為墳人憫其幼欲助之則拜泣而辭盛昭歸德人至正間為淮南行省照磨遣諭張士誠𬒳拘士誠使將兵昭叱曰吾奉命招諭汝汝拘留詔使罪不容斬又欲吾從汝為賊耶罵不絶口士誠怒礫之明韓政睢州人嘗為義兵元帥率衆歸太祖授江淮行省平章政事李濟據濠命政討平之從克平江定山東取元都進封東平侯鎮山東河北招撫流移出居庸應昌取和林大獲而還卒追贈鄆國公梅思祖夏邑人明初兵下淮南思祖率衆來歸從伐吳取浙西屢立戰功洪武中平四川散毛諸洞與傅友德克雲南署雲南布政司事善撫輯吏民安之梅殷思祖從子尚主拜駙馬都尉有謀略能騎射兼通經史視山東學政賜敕褒美謂堪為儒宗受遺詔輔建文鎮守淮安扼燕兵不使南下燕遣使假道殷割使者耳鼻縱之還成祖即位召還京為談深趙曦所害徐永達歸德人洪武中由太學生授侯官教諭永樂間召拜翰林編修宣德初纍遷鴻臚寺卿時交址臣黎利謀叛南徼騷然遣永達往諭禍福利稱罪貢獻纍擢湖廣山西按察使在職清正資家人紡織以供衣食吏人畏敬之後卒少卿于謙往唁見其官舍蕭然解帶賻其喪朱謙夏邑人永樂時為指揮僉事正統中充總兵官鎮守宣府屢立戰功封撫安伯子永襲父爵治軍嚴肅有威重前後佩八將軍印內總十二團營兼掌都督府以延綏戰功進封保國公一時列侯勳名無與比軒輗鹿邑人永樂進士擢御史出按福建剔蠧鋤姦正統中遷浙江按察使天性廉介布𫀆疏食俸資之外一無所取遷右副都御史巡撫浙江討平閩吳賊金八等天順初大學士李賢薦為刑部尚書以太監曹吉祥等怙勢侵官力請致仕帝詔見問曰昔浙江廉使考滿歸行李僅一簏乃卿耶尋以左都御史督理南京糧儲告歸卒楊敬歸德人父殁於陳求遺骸不得為木主招魂以葬每讀書至戰陳之事輒殞涕母柩在堂鄰火將及敬撫柩哀號風止火滅正統中旌表潘禮商邱人天順進士授給事中剛直敢言宏治中纍遷工部侍郎督易州山厰故有園圃菜蔬利主者歲收其利以遺中貴人禮悉以需國用比解任敞衣之外圖書數卷而已盜入其室僅粟數升盜叩頭曰使在官者皆若公我輩敢為盜乎正德初巡撫韓邦問奏其清節詔有司月給未三石沈忠歸德衛軍祖母患瘡生蛆忠泣取吞之曰使食吾心勿傷吾祖母吮之而愈父疾籲天乞減巳算一紀以延父夀父卒果及其數暨母卒俱廬墓三年成化中旌表子二濚瀚並有孝行蔡天祐睢州人宏治進士改庶吉士授給事中謇諤不避權貴厯山東副使分巡遼陽歲歉活飢民萬餘闢海濱墟田數萬頃纍遷山西按察使所至有殊績大同兵亂巡撫張文錦被害擢天祐僉都御史代之從數騎馳入城諭軍士獻首惡亂遂定在鎮七年威德大著進兵部侍郎告歸卒孫清睢陽人為諸生幼孤事母以孝聞母殁未葬流寇至居民盡逃清獨守柩不去賊兩過其門皆不入里人有賴以全者正德中旌任鏜夏邑人早喪母事嫡母孝及卒廬墓三年時河決將齧塋鏜伏地號哭河即南徙嘉靖中旌陳聞詩柘城人嘉靖中舉於鄉以親老不仕親殁居喪哀毁賊師尚詔陷城欲劫為帥脅之百端聞詩紿之曰欲我行母殺人母放火賊許之至鹿邑自經死詔贈鳳陽同知立祠死所魯邦彥睢州人嘉靖進士授行人考滿當選科道大學士嚴嵩欲引之遂乞養歸杜門掃軌潛心經術同邑徐養相亦嘉靖進士除主事守正不阿忤時貴罷歸與邦彥並以名行推重宋纁商邱人嘉靖進士授永平推官擢御史按山西擒大盜李九經俺答陷石州將士捕七十七人當斬纁訊得其誣釋者殆半厯僉都御史巡撫保定獲鹿諸縣飢先賑後以聞尋遷户部尚書石星嘗語纁曰其郡有奇羡可濟國需纁曰朝廷錢榖可使蓄久勿用不可搜括無餘星善之調吏部奬廉抑貪於執政一無所關白與申時行忤乞休不允卒諡莊敏從子沾知福山縣有惠政沈鯉歸德人嘉靖中進士授檢討神宗立進贊善每直講舉止端雅所陳説獨契帝心纍遷吏部侍郎屏絶私交好推轂賢士不使人知拜禮部尚書詳稽先朝典制定中制頒天下又奏行學政八事請復建文年號修景帝實録拜東閣大學士加少保進文淵閣首勸帝聽言圖事以薦賢為第一義乃列謹天成恤民窮等十事書於碑極陳礦稅害民狀幾得停止與沈一貫共事相左遽致仕歸卒諡文端吕坤寧陵人萬厯進士知襄垣縣有異政厯吏部郎中清介自持門無私謁纍遷右僉都御史巡撫山西嚴薦舉連坐法境內大治入為刑部侍郎疏稱天下安危不報遂稱疾乞休坤剛介峭直留意正學家居日與後進講習多所著述李汝華睢州人萬厯進士徵授給事中在垣多所糾擲擢僉都御史巡撫南贛威惠甚著拜户部尚書汝華練達勤敏立朝無黨阿尤於國計盈縮邊儲虛實與鹽澮屯牧諸大政殫心裁劑加太子太保致仕卒從子夢辰崇禎進士官給事中疏請收拾人心禁額外之徵緩不急之需又厯指將驕軍悍節制不行帝頗採其言遷通政罷歸為賊羅汝才所執扼吭而死其妻王氏聞之亦不食死侯執蒲商邱人萬厯進士授御史疏論相臣李廷機朱賡方從哲樞臣孫礦不稱職天啓初擢太常卿魏忠賢竊政有指執蒲為東林倔強老者致仕歸子恪萬厯進士官編修以纂神宗光宗實録忤魏忠賢削籍崇禎初起中允與韓爌等更定三朝要典終南京祭酒子方鎮諸生壬午殉難楊東明虞城人萬厯進士厯官給事中請定國本出閣豫教早朝勤政值歲凶河決齊梁淮徐東明繪飢民圖上之神宗惻然出帑金三十萬往賑建首善書院與馮從吾鄒元標闡明聖學官至刑部侍郎王三善永城人萬厯進士纍遷太常少卿天啓初擢僉都御史巡撫貴州安邦彥反三善進討大破賊衆解貴陽圍進擊邦彥食盡援兵不至退師過賊衝墜馬解印綬付家人拔劒自刎不死羣賊擁之去不屈遂被害贈兵部尚書周士朴商邱人萬厯進士厯官給事中侃侃論列數興中官忤崇禎初拜工部尚書時中官張彝憲奉命監出納士朴恥與共事引罪求罷以他事削籍歸李自成陷商邱士朴與妻曹氏妾張氏子舉人業熙子婦沈氏同日縊死彭端吾夏邑人萬厯進士為御史有直聲巡鹺淮揚禁翦單續掣諸弊鹺政以理改按四川方用兵請以劉綎為帥從之土酋遂平泰昌初官通政卒練國事永城人萬厯進士天啓初厯官御史時閣臣葉向高史繼階俱以病告國事疏請留向高而黜繼階又疏紏魏忠賢尋尚書鍾羽正失朝廷體前後疏凡三十餘上皆切時政尋為忠賢黨所劾落職棠禎初以命都御史巡撫陜西剿流賊有功崔泌之鹿邑人家陳州天啓進士崇禎中為清苑知縣邑舊令黃宗昌為御史劾周延儒延儒嗾保定守史躬盛托其遺事躬盛以囑泌之泌之曰殺人以媚人可手躬盛怒誣訐之時泌之已遷户部主事復下獄遣戍久之釋歸後流賊陷陳州泌之用鐵杖擊數賊自刎死本朝乾隆四十一年賜諡烈愍王應昌拓城人天啓中舉於鄉初知交河縣縣地畝率為權璫豪右所占應昌按籍核徴之大盜張某聚黨數千人為民害應昌率健卒㨶其穴殱之唐鉉睢州人崇禎進士厯定州知州城陷死之又楊汝經亦州人由進士厯僉都御史巡撫甘肅遇賊戰敗被執説之降不從賊斃諸獄本朝乾隆四十一年賜諡節愍夏云醇永城人崇禎中舉於鄉城破罵賊死本朝乾隆四十一年豫入忠義祠沈試鯉之孫為工部郎中家居李自成陷歸德試罵賊死一時同死者主事朱國慶中書侯欣廣西知府沈仔威縣知縣張儒舉人徐作霖吳伯裔周士美楊昌王風普李明開官生田國賴沈泌侯晙貢生侯恆劉桄周士貴喬文煒張元曜田國命沈誠范奇勝監生侯悰沈倜安念祖徐纘武諸生劉伯愚吳伯引張渭侯忱賈開明等一百十餘人本朝乾隆四十一年賜沈試諡烈愍朱國慶等俱豫入忠義祠史能仁鹿邑人崇禎中厯山東新城淄川二縣擢御史未任道遇流賊檢其裝僅錢數百兩邑德政歌二軸賊歎息曰此廉吏也捨之去卒無子殯古廟中牧兄日擲瓦礫其上積為巨冢至今人稱清官冢云閻學夔鹿邑人崇禎末為代州參將城破抗節死四十一年本朝乾隆賜諡烈愍徐道興睢州人崇禎末銓授雲南都司經厯署師宗州事廉潔愛民孫可望破曲靖道興見賊逼集士民諭之曰力薄兵寡不能抗賊吾死分也若等可速去士民請偕行厲聲曰封疆之臣死封疆吾將安之言訖鬚眉奮張衆灑淚而出及賊入道興死之本朝乾隆四十一年賜諡烈愍劉熙鹿邑人崇禎末父為賊據熙自縛詣賊曰父年老恐不堪役熙願備前驅賊因歸其父熙度父已入堡乃罵賊曰吾良家子肯從爾作賊耶賊怒磔之本朝乾隆四十一年豫入忠義祠張瑾夏邑人崇禎十三年流寇突至瑾率衆捍禦賊引去越數日復集大衆攻城邑人惶怖瑾曰賊忌者獨我耳挺身出喻以大義被執迫之降瑾罵不絶口遂過害邑人立石墓前本朝乾隆四十一年豫入忠義祠劉夢祥虞城人邑諸生崇禎末土寇猖獗夢祥募義兵拒戰賊衆敗去復親督義勇圍賊黨於念吾寨破之虞城獲全本朝吳友名商邱人以材武從戎順治初從追闖逆有功纍官山東膠州參將謫江西吉安守備吳耿之叛巡撫董衛國督江西軍務奏為督標副將時江右所在被賊友名身先搏戰所至克定加右都督會師進討賊踞武岡楓林嶺峭壁不可上友名誘致鄉導從别隘進武岡下遂復鎮遠世襲雲騎尉以疾乞休卒侯憲武永城人順治二年知績溪縣土寇破城殉難賜祭葬贈按察使僉事又任佐君鹿邑人順治二年任廣德州同知土寇作亂被執不屈死之陳武睢州武舉順治中授金華鎮遊擊調廣東從攻南雄韶州廣州俱有功暑參將剿高州攻化州斬賊首冷雄傑施上義復吳川信宜茂名等縣李定國犯高州城陷不屈自刎死賜祭葬廕子嬴雲騎尉侯方域商邱人博學能文東南名士多與交明季客金陵阮大鋮使其客通款拒不納且移文逐之幾被重禍有壯悔堂集若干卷行世王依書柘城人順治丙戍進士授刑部主事讞決平恕纍遷福建福寧道時洋禁嚴甚邏卒獲巨艘所載悉珍貨以獻依書力拒之討平山寇趙子章郭爾隆擒海寇林察等郡邑獲安李培正夏邑人順冶丙戌進士由贊善出為揚州兵備道副使時海寇猖獗姦民朱錤聚衆千人為內應培正設方略擒賊首民賴以安旋以病歸里置贍族田數頃嵗飢出積榖賑濟里中童子有貧不能就傅者輒召至家延師課之蔣奇猷睢州人少孤事母以孝聞順治丙戌舉於鄉會黃河水漲溢至州西界奇猷出布囊堵水築隄城賴以全每值歲飢出所儲粟以賑貧乏遠近就食者日數百人順治年間旌入祀鄉賢侯服永城人舉人性純孝父繩武患痰疾每焚香禱天願以身代父病尋愈後父司訓信陽病卒時服在家心悸星夜赴任所未至遇柩於途一慟幾絶歸葬悉遵古禮年六十餘事母猶嬰兒雍正年間旌王培柘城人順治戊子舉人柘邑頻遭水患培率村鄰濬東渠三十餘里初授新河知縣與同官陸隴其輩講諭吏治建立義學義倉諸制巡撫于成龍薦授户部主事卒所著有綱目刋誤二十一史刋誤等書陳天清柘城人順治己丑進士初授平鄉知縣邑與邢之西山鄰接巨盜出沒其間天清出奇計取之平鄉地卑下襟帶漳滏天清修堤濬渠升工部主事分司南河運河兩岸姦民穿穴盞水每歲輸金於分司可得萬餘金又河工所用工料率藉以肥槖天清悉屏絶之乞假歸里卒彭舜齡夏邑人事繼母盡孝順治己丑進士授嘉興府推官執法平允郡無冤獄再補山東登州府會賊首于七率衆數萬臨城守令皆望風遁舜齡晝夜登陴守禦城賴以全以勞卒官劉超鳳商邱人順治己丑武進士官詔安營守備耿逆之變不屈自刎死王震生睢州人順治壬辰進士以户部主事理通州糧儲通為姦蠧藪震生釐剔積弊轉員外郎協審八旗事務有不可者持之必力遷刑部郎中視學江南以疾乞歸湯斌睢州人生而端慤年十二聽里孰講小學退而見之於行順治壬辰成進士由檢討出為陜西按察司副使備兵潼關升嶺北道參政治贛郡所至皆有治績以親老乞歸康熙十七年以博學宏詞薦授翰林院侍講超擢內閣學亡巡撫江蘇以教化為先務痛除吳中侈汰之習禁婦女母遊觀撤淫祀下令期必行吳民翕然向風纍擢工部尚書卒祀賢良乾隆元年賜諡文正斌於學無所不窺自贛州歸復師事孫奇逢所得益邃其立身以忠孝誠正為本所著有洛學編潛庵語録行世李天馥永城人順治戊戌進士由檢討洊井兵部尚書嘗薦舉循吏三阿知縣彭鵬靈夀知縣陸隴其官至武英殿大學士卒諡文定李遙睢州人順治己亥進士授彭澤知縣縣苦里役當之者輒破産遙畫為均平之法歲省民間數千金吳逆未反時歲販私鹽數萬石過境遙械繫其人申請督撫移文三