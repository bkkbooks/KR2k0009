front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_078-1a}
body:
  text: 南陽府四人物漢陳恢宛人沛公圍宛城三匝南陽守欲自剄舍人陳恢踰城見沛公曰為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下通行無所纍沛公乃以宛守為殷侯封陳恢千户引兵西無不下者直不疑南陽人文帝時為郎有同舍告歸誤持其同舍郎金去亡金者疑不疑不疑買金償之後告歸者至歸金亡金郎大慚以此稱為長者或毁其盜嫂不疑曰吾乃無兄然終不自明也遷至中大夫拜御史封塞侯諡曰信張釋之南陽堵陽人以資為騎郎事文帝拜謁者僕射從登虎圈上問上林尉諸禽獸簿尉不能對虎圈嗇夫從旁代對響應無窮者詔拜嗇夫為上林令釋之曰陛下以嗇夫口辨而超遷之臣恐天下隨風靡爭口辨無其實也文帝乃止拜公車令太子與梁王共車入朝不下司馬門釋之追止太子梁王劾不景帝時出敬拜中大夫為廷尉持議平天下稱之為淮南王相病卒子摯官至大夫免以不能取容當世故終身不仕杜延年南陽杜衍人𥘉補軍司空遷諫大夫因發上官桀逆謀封建平侯擢為太僕右曹給事中霍光持刑罰嚴延年輔之以寬數言宜修孝文時政以儉約寬和順天心悅民意光納其言舉賢良議罷酒榷鹽鐵皆自延年發之霍光薨延年坐免宫召拜北地太守徙西河徴入為御史大夫病篤賜安車駟馬就第卒諡曰敬侯杜欽延年子少好經書目偏盲茂陵杜鄴與欽同姓字俱以才能稱京師衣冠謂欽盲子夏欽乃為小冠京師更謂欽小冠子夏王鳳奏請欽為大將軍武庫令詔舉賢良方正能直言士合陽侯梁放舉欽厯陳災異為議郎以病免徴詣大將軍幕府國家政謀鳳常與欽慮之欽數稱達名士救解罪過及繼功臣絶世鎮撫四夷當世善政多出於欽者優遊不仕以壽終兄子業有材能為太常數言得失不事權貴孔休南陽宛人守新都令王莽時去官歸家莽請為國師嘔血託病杜門自絶光武即位求子孫賜榖以旌表之樊重南陽湖陽人性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役僮隸各得其宜資至巨萬而賑贍宗族恩加鄉閭縣中稱美推為三老年八十餘終後光武過湖陽祠重墓追爵諡為壽張敬侯立廟湖陽鄧晨南陽新野人娶光武姊元更始立以晨為常山太守光武自薊走信都晨亦間行會巨鹿下光武曰偉卿以一身從我不如以一郡為我北道主人晨從光武追銅馬高胡羣賊於冀州發積射士千人又遣委輸給軍不絶晨好樂郡職厯中山汝南太守吏民稱之後拜光祿大夫建武十九年封西華侯卒諡曰惠李休南陽宛人王莽竊位漢祚中移休少好學遊心典謨鈞深極奧窮覽妙旨古今疑義前人所希論後學所不覽者休盡剖判靡不明晣凡朝臣優禮請者皆不就永壽三年卒于家鄧禹南陽新野人年十三受業長安見光武知非常人遂相親附及間光武安集河北即杖策北渡追及於鄴説以延攬英雄務悅民心光武大悅常與定計議任使諸將多訪於禹所舉皆當其才赤眉西入關光武欲來釁并關中以禹沉深有大度故投以西討之略拜前將軍持節西入關河東都尉守關不開禹守十日攻破之樊參將數萬人度大陽攻禹禹逆擊於解南大破之斬參首遂定河東拜大司徒封酇侯時年二十四是時赤眉所過殘賊百姓不知所歸聞禹乘勝獨克師行有紀皆望風迎降日以千數禹所至輒停車以勞來之建武十三年定封高密侯禹內文明篤行淳備事母至孝天下既定常欲逺名勢有子十三人各使守一藝修整閨門教養子孫皆可為後世法資用國邑不修産利帝益重之顯宗即位拜為太傳薨諡曰元侯吳漢南陽宛人説彭寵歸光武拜偏將軍尋拜大將軍持節北發十郡突騎幽州牧苗曽陰敕諸郡不肯應調漢將二十騎先馳至無終收曽斬之北州震駭城邑莫不望風弭從光武北擊羣賊漢常將突騎五千為軍鋒數先登陷陳拜大司馬封廣平侯束方悉定建武十一年率岑彭等伐公孫述與述戰於廣都成都之間八戰八克護軍高午殺述振旅浮江而還漢性強力每從征伐帝未安恆側足而立諸將見戰不利或失其常度漢意氣自若方整厲器械激揚吏士帝歎曰吳公差強人意隱若一敵國矣嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分昆弟外家病篤車駕親臨問所欲言對曰願陛下慎無赦而巳薨諡曰忠侯賈復南陽冠軍人少好學習尚書光武以為偏將軍從擊青犢於射犬大載至日中賊堅陳不卻復𬒳羽先登所向皆靡賊乃敗走拜執金吾遷左將軍復從征伐未嘗喪敗數與諸將潰圉解急身𬒳十二創諸將每論功自伐復未嘗有言帝輒曰賈君之功我自知之十三年定封膠東侯復為人剛毅方直多大節以列侯就第闔門養威重卒諡曰剛侯岑彭南陽棘陽人光武徇河內召見彭拜刺姦大將軍從平河北拜廷尉行大將軍事圍洛陽説朱鮪面縛出降遷征南大將軍南擊秦豐潛兵渡沔水從川谷間伐木開道直襲黎邱擊破諸屯兵豐敗走更封武陰侯敕彭擊蜀長驅入江關徑拔武陽使精騎馳廣都去成都數十里公孫述大驚以杖擊地曰是何神也乃使客夜刺殺彭彭持軍嚴整秋毫無犯諡曰壯侯蜀人為立廟武陽朱祐南陽宛人世祖討河北以祐為護軍常力戰陷陳拜建義大將軍建武二年討延岑破之四年圍秦豐於黎邱破其將張康於泰陽斬之擊延岑餘黨隂酇築陽三縣賊悉平之祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功禁制士卒不得虜掠百姓十三年定封高侯馬武河南湖陽人從世祖擊羣賊常為軍鋒力戰無前為侍中騎都尉破龎萌走隗囂以功定封揚虛侯武為人闊達敢言在御前面折同列無所回忌顯宗時征西羌以武為將軍屢破之劉隆南陽安衆侯宗室從世祖為騎都尉與馮異共拒朱鮪李軼纍拜誅寇將軍討平李憲屯田武當後以中郎將副馬援擊交址破之獲其帥徵二降二萬餘人還為驃騎將軍行大司馬事後定封慎侯卒諡曰靖馬成南陽棘陽人少為縣吏世祖討河北以成為期門從征伐遷護軍都尉建武四年拜揚武將軍督發會稽丹陽九江六安四郡兵擊李憲盡平江淮地後屯常山中山以修北邊繕治障塞在事五六年北方無事定封金椒侯陳俊南陽西鄂人光武狗河北以為安集掾從擊銅馬賊於清陽拜強弩將軍與五校戰於安次俊下馬乎接短兵所向必破建武二年别擊金門白馬賊於河內又拔南武陽是時大山豪傑多擁衆與張步連兵拜俊太山太守行大將軍事定太山與耿弇共破張步徙琅琊太守齊地素聞俊名入界盜賊皆解散帝美其功詔俊得專征青齊十三年定封祝阿侯杜茂南陽冠軍人初歸光武於河北為中堅將軍常從征伐拜大將軍擊五校賊於魏郡清河東郡悉平諸營保道路流通拜為驃騎大將軍建武七年詔引兵屯田晉陽廣武鎮守北邊十五年定封參蘧卿侯任光南陽宛人更始初為信都太守及王郎起郡國皆降之光武自薊還不知所向聞信都獨為漢堅守即馳赴之拜光為左大將軍使將兵從光移檄於他邑句日之間兵衆大盛因攻城邑遂屠邯鄲建武初定封阿陵侯王常潁川舞陽人下江兵起常説其將帥引兵與漢軍合破王尋王邑建武二年常將妻子詣洛陽光武見常甚勤勞之拜為左曹封山桑侯帝於大會中指常謂羣臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日遷為信重之多為其言故得免而東歸八年歙將二千人伐山開道從番須回中徑至略陽斬囂守將因保其城囂鋭攻之歙堅守自春至秋帝自將上隴圍解詔歙率馮異等入天水攻拔落門天水屬縣皆降隴西平歙乃傾倉廩轉運諸縣以賑贍之於是隴右遂安而涼州流通焉十一年與蓋延馬成進攻公孫述將於河池下辨陷之乘勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客故呼巨卿欲相屬以軍事而反效兒女涕泣乎延收淚強起受所誡又自書表投筆抽刃而絶帝省書覽涕賜䇿贈中郎將征羌侯印綬諡曰節韓歆南陽人光武時為大司徒以從征伐有功封扶陽侯好直言無隱諱帝每不能容嘗證歲將飢凶言甚剛切坐免歸田里自殺歆素有重名死非其罪衆多不厭帝乃追賜錢榖以成禮葬之丁綝潁川定陵人王莽末守潁陽尉世祖略地潁陽綝説其宰遂與俱降因從征伐將兵先渡河移檄郡國攻營略地下河南陳留潁川二十一縣拜河南太守及封功臣綝願封本鄉帝從之封新安鄉侯後復徙封陵陽侯尹敏南陽堵陽人習歐陽尚書兼善毛詩榖梁左氏春秋建武二年上疏陳洪範消災之術拜郎中帝以敏博通經記令校圖讖敏對曰讖書非聖人所作恐疑誤後生帝小納敏與班彪親善每相遇輒日旰忘食夜分不寢後三遷長陵令永平十一年遷諫議大夫卒於家窪丹南陽淯陽人世傳孟氏易王莽時常避世教授專志不仕建武初為博士遷大鴻臚作易通論七篇世號窪君通丹學義研深易家宗之稱為大儒十七年卒於官孔喬南陽宛人學古文尚書春秋左氏傳常幽居修志鋭意典籍至乃厯年身不出門鄉里莫得瞻見建武初公車徴不行卒於家李善南陽淯陽人本同縣李元蒼頭建武中疫疾元家相繼死惟孤兒續始生數旬而資財千萬諸奴僕謀殺續分其財産善力不能制乃潛負續逃去隱山陽玻邱界中親自哺食乳為生潼續年十嵗善與歸本縣修理舊業告奴婢於長吏悉收殺之時鍾離意為瑕邱令上書薦善行狀光武詔拜善及續並為太子舍人善以能理劇纍遷九江大守未至道病卒續至河間相茨充南陽宛人舉孝亷之京師同侣馬死充到前亭含車持馬還相迎鄉里號之曰一馬兩車茨子河光武時為桂陽太守張堪南陽宛人早孤讓父餘財數百萬與兄子受業長安志美行厲世祖召拜郎中遷謁者詣大司馬吳漢伐公孫𫐠在道追拜蜀郡太守時漢軍餘七日糧陰具船欲去堪馳説漢不宜退師成都既拔堪慰撫吏民蜀人大悅後領驃騎將軍擊破胸奴於高柳拜漁陽太守卒樊仲華南陽新野人與光武少遊舊建武初徵為侍御史遷河東都尉厯揚州牧卒天水太守顯宗追思其政詔賜家錢百萬子融有俊才好黃老不肯為吏樊宏南陽湖陽人少有志行赤眉多所殘殺聞宏仁厚皆稱曰樊君素善何心攻之引兵而去世祖即位拜光祿大夫位特進建武十五年定封壽張侯宏為人謙柔畏慎不求苟進斫上便宜及言得失輒手自書寫毁削草本宗族染其化未嘗犯法帝甚重之卒遺令薄葬諡曰恭陰識南陽新野人光烈皇后前母兄建武元年為騎都尉遷侍中十五年定封原鹿侯帝每巡郡國識嘗留鎮守京師人雖極言正議及與賓客語未嘗及國事帝敬重之常指識以敕戒貴戚激厲左右焉顯宗即位拜識為執金吾位特進卒諡曰貞陰興光烈皇后母弟建武二年為黃門侍郎守期門僕射將武騎從征伐平定郡國雖好施接賓然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之張汜杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠平九年遷侍中帝欲封之興固讓後拜衛尉領侍中卒追諡翼侯任延南陽宛人年十二顯名太學號為任聖童更始元年拜會稽都尉建武中拜武威太守帝戒之曰善事上官無失名譽延對曰履正奉公臣子之節上下雷同非階下之福善事上官臣不敢奉詔帝歎息曰卿言是也顯宗時又厯潁川河內二郡太守病卒郭丹南陽穰人少從師長安嘗為都講諸儒咸敬重之王莽徴之逃於北地更始初徴拜諫議大夫更始敗諸將悉歸光武獲封爵丹獨保平氏不下為更始發喪盡哀建武十三年大司馬吳漢辟舉高第再遷并州牧轉為左馮翊永平三年為司徒在朝廉正公直與侯霸杜林張湛郭伋齊名相善出典州郡入為三公家無遺産趙喜南陽宛人少有節操更始徵為郎中拜中郎將更始敗亡走遇更始親屬皆飢困不能前喜見之悲感所裝縑帛資糧悉以與之將護歸鄉里時鄧奉反於南陽喜與奉善數遺書切責之光武得喜書乃驚曰趙喜長者也即以喜守簡陽侯相纍拜太尉帝崩喜受遺詔典喪禮時舊典不存皇太子與東海王等雜止同席熹正色階殿扶下諸王以明尊卑整禮儀嚴門衛內外肅然封節鄉侯肅宗即位進太傅録尚書事建初五年薨諡曰正侯宋均南陽安衆人以父任為郎好經書善論難調補辰陽長後為謁者詔均監馬援軍討武陵蠻援卒軍士多病死乃矯制調伏波司馬吕种入賊營告以恩信因勒兵隨其後蠻夷共斬其大帥降于是散其衆遣歸本郡為置長吏而還纍遷九江太守永平七年徴拜尚書令每有駮議多合上旨出為河內太守以疾上書乞免均性寬和不喜文法常以為吏能宏厚雖貪汚放縱猶無所害至於苛察之人身或廉法而巧黠刻削毒加百姓災害流亡所由而作帝後聞其言追悲之朱暉南陽宛人早孤有氣節初光武與暉父岑俱學長安及即位岑已卒召暉拜為郎尋以疾去卒業於太學性矜嚴進止必以禮新陽侯隂就慕暉賢自往候之暉避不見致禮閉門不受就歎曰志士也勿奪其節後為衛士令再遷臨淮太守坐法免建初中南陽大飢盡散其家資以分宗里故舊之貧羸者元和中拜尚書僕射上便宜陳密事深見嘉納尚書張林請封錢用布帛為租暉言不可施行帝發怒切責暉等皆自繫獄詔出之遷為尚書令以老病乞身拜騎都尉和帝時竇憲北征暉復上疏諫頃之病卒子佶修儒術安帝時至陳相馮魴南陽湖陽人有方略建武三年徴詣行在所見於雲臺拜虞令遷郟令再遷魏郡太守以高第入為太僕中元元年為司空二年封陽邑鄉侯永平七年為執金吾魴性矜嚴公正在位數進忠言多所納用子柱為侍中以恭肅謙約稱位至將作大匠樊倏宏之子謹約有父風事後母至孝及母卒哀思過禮毁病不自支世祖常遣中黃門朝暮送饘粥永平元年拜長水校尉與公唧雜定郊祀禮儀北海周澤琅琊承宫並海內大儒倏皆以為師友而致之於朝二年徙封倏燕侯廣陵王荆有罪詔偹與任隗雜理其獄事竟奏請誅荆帝怒曰諸卿以我弟故欲誅之即我于卿等敢爾耶倏對曰天下高帝天下臣等以荆屬托母弟故敢請耳如令陛下子臣等專誅而已帝歎息良久十年卒諡曰哀初倏刪定公羊嚴氏春秋章句世號樊侯學教授門徙前後三千餘人次子梵為郎二十餘年三署服其重慎悉推財物二千餘萬與孤兄子官至大鴻臚鄧訓禹第六子少有大志樂施下士永平中理呼沱石臼河以通漕運拜訓謁者使監領其事訓考量隱括知大功難立奏罷其役更用驢輦歲省費億萬計全活徒士數千人厯官至護羌校尉訓雖寬中容衆而於閨門甚嚴兄弟莫不敬憚諸子進見未嘗賜席接以溫色永元四年卒官諡曰平壽敬侯鄧彪南陽新野人彪少勵志修行父卒讓國與異母弟鳳顯宗高其節後仕州郡厯遷太尉在位清白為百僚式和帝即位以彪為太傅録尚書事當時宗其禮讓以老病上還樞機職詔賜養牛酒而許焉韓稜潁川武陽人四嵗而孤以孝友稱顯宗時徴辟五遷為尚書令以才能稱肅宗嘗賜寶劒自手署其名曰韓稜楚龍淵竇憲為大將軍威震天下尚書以下議欲拜之伏稱萬嵗稜正色曰上交不諂下交不瀆禮無人臣稱萬嵗之禮議者慙而止在朝數薦良吏應順吕昌周紆等皆有名當時及竇氏敗稜典案其事數月不休沐遷南陽太守後為司空卒孫演順帝時為丹陽太守官至司徒丁鴻綝之子年十三從桓榮受歐陽尚書善論難綝卒鴻當襲封讓國於弟盛顯宗甚賢之永平十年徵拜侍中建初四年詔鴻及諸儒論定五經同異於白虎觀鴻以才高論難最明時人歎曰殿中無雙丁孝公和帝即位厯遷為司徒時竇憲兄弟擅權鴻因日食上封事收憲印綬憲自殺孔嵩南陽人家貧親老乃變姓名為新野縣阿里街卒正身厲行街中子弟皆服其訓化遂辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責讓曰孔仲山善士豈宜侵盜乎於是送馬謝之官南海太守高鳳南陽葉人少為書生專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳護雞時天暴雨而鳳持竿誦經不覺潦水漂麥其後遂為名儒乃教授於西唐山中鄰里有爭財者持兵而鬬鳳往解之不已乃脫巾叩頭固請於是爭者懷感投兵謝罪建初中舉直言到公車託病逃歸推其財産悉與孤兄子隱身漁釣終於家宋意均族子顯宗時舉孝亷拜阿陽侯相建初中徵為尚書肅宗親親恩篤故叔父濟南中山二王特加恩寵及堵昆弟並留京師意以為人臣有節不宜踰禮過恩乃上疏諫帝納之鮮卑擊破北胸奴南單于乘此請兵北伐因欲還歸舊庭議欲從之意復諫止後遷司隸校尉永元初竇憲兄弟貴盛羣黨負勢放縱意隨違舉奏無所回避二年病卒賈宗復少子少有操行多智略初拜郎中建初中為朔方太守敵畏之不敢入塞徵為長水校尉宗兼通儒術每宴見帝使與丁鴻等議論於前章和二年卒任隗光子少襲父封淸靜寡欲所得奉秩常以帳恤宗族收養孤寡擢羽林左監厯官司空隗義行內修不求名譽而以沈正見重於世竇憲擊胸奴國用勞費隗奏議徴憲還前後十上獨與司徒袁安同心畢力持重處正鯁言直議無斫回隱永元四年卒尹勤南陽人篤信好學屏居人外荆棘門生時人重其節和帝時為司空後以定䇿立安帝封福亭侯杜安潁川定陵人少有志節年十三入太學號奇童京師貴戚慕其行或遺之書安不發悉壁藏之及後捕案貴戚賓客安開壁出書卬封如故竟不罹其患時人貴之公車特徵拜宛令厯仕至巴郡太守卒杜根安子性方實好絞直永初元年舉孝亷為郎中時和熹鄧后臨朝權在外戚根以安帝年長宜親政事乃上書直諫太后大怒今撲殺之執法者以根知名私語行事人使不加力既而載出城外根蘇因得逃竄及鄧氏誅根方歸鄉里徵詣公車拜侍御史順帝時遷濟隂太守子翊世拜議郎遷尚書在朝正色百僚敬之鄧隲訓長子少辟大將軍竇憲府及女弟為皇后纍遷車騎將軍定䇿立安帝隲謙遜不欲久在內連求遷第嵗餘許之永初元年封上蔡侯隲辭讓不獲遂逃避使者詣闕自陳太后不聽疏至五六乃許之拜大將軍時人士荒飢盜賊羣起隲崇節儉罷力役推進賢士揚震等故天下後安鄧閶訓幼子和熹皇后立以閶為黃門侍郎永初元年封西華侯母新野君寢病上書求還侍養太后以閶最少孝行尤著特聽之新野君卒閶至孝骨立有聞當時元初五年卒遺言薄葬不受爵贈太后從之鄧康禹孫少有操行紹封為越騎校尉康以太后久臨朝政宗門盛滿數上書諌爭太后不從遂謝病不朝安帝徵康為侍中順帝立為太僕有方正稱名重朝廷卒諡曰義樊準宏之族曾孫少勵志行修儒術以父産業數百萬讓孤兄子永元十五年召見拜郎中鄧太后臨朝儒學陵替準上疏以為宜傳求幽隱寵進儒雅太后深納其言是後屢舉方正敦朴仁賢之士再遷御史中丞復言災異陳時政擢守光祿大夫使冀州到部開倉廩食慰安生業流人咸得蘇息還拜巨鹿太守三轉為尚書令明習故事元𥘉三年為光祚勳卒官左雄南陽涅陽人安帝時舉孝廉遷冀州刺史永建𥘉徵拜議即數言事其辭深切拜尚書再遷尚書令言守相長吏惠和有顯效者可就增秩勿使移徙鄉部親民吏皆用儒生清白任從政者又言孝廉年不滿四十不得察舉皆先詣公府諸生試家法文吏課戕奏副之端門練其虛實以觀異能自是牧守畏栗察選清平多得其人帝封宋娥為山陽君梁冀襄邑侯雄再上封事自雄掌納言多所匡肅遷司隸校尉坐法免後為尚書永和三年卒張衡南陽西鄂人少善屬文通五經貫六藝時天下承平日久王侯以下莫不踰侈乃擬班固兩都作二京賦因以諷誎精思傅會十年乃成安帝雅聞衡善術學徴拜郎中再遷為太史令遂乃研覆隂陽妙盡璇璣之正作渾天儀著靈憲算罔論言甚詳明復造候風地動儀皆服其妙後遷侍中順帝引在帷幄諷議左右宦官懼其毁巳讒之永和初出為河間相徴拜尚書四年卒所著詩賦銘七言靈憲應間七辨巡誥懸圖凡三十二篇來厯歙曽孫永元中為侍中延光二年遷太僕中常侍樊豐等共讒陷太尉楊震厯惡其傷害忠良絶不與通豐又搆讒太子厯與光祿勳祋諷等十餘人俱詣鴻都門證太子無過帝使中常侍奉詔脅羣臣諫者失色各稍自引起厯獨守闕連日不肯去帝大怒免厯官順帝即位拜車騎將軍復為大鴻臚陽嘉二年卒官趙康南陽人隱於武當山清靜不仕以經傳教授同郡朱穆年五十奉書稱弟子及康殁穆葬之如師朱穆暉之孫年五歲便有孝稱及壯耽學鋭意講誦初舉孝廉梁冀辟之使典兵事因推災異奏記以勸戒冀舉高第為侍御史嘗感時澆薄慕尚敦篤作崇厚論又著絶交論梁冀驕暴不悛奏記切諫擢冀州刺史徵詣廷尉輸作左校居家數年徴拜尚書穆深疾宦官及在臺閣志欲除之帝不納自此中官數毁之憤悶發疽卒祿仕數十年蔬食布衣家無餘財董班南陽宛人少遊太學宗事李固才高行美不交非類嘗耦耕澤畔惡衣蔬食聞固死乃星行走赴哭泣盡哀殉尸不肯去桓帝嘉其義烈聽得襚斂歸葬班遂送喪到漢中葬畢面還三公並辟隱身莫知所歸韓韶潁川舞陽人少仕郡辟司徒府尚書選三府掾能理劇者以韶為嬴長病卒同鄉李膺陳實杜密荀淑等為立碑頌焉子融少能辨理而不為章句學五府並辟獻帝初官至太僕宗資南陽安衆人均之孫學孟氏易歐陽尚書舉孝廉拜議郎補御史中丞後拜汝南太守署范滂為功曹宗慈南陽安衆人舉孝廉九辟公府有道徴不就後為修武令時太守出自權豪多取貨賄慈遂棄官去徵拜議郎未到道疾卒南陽羣士皆重其義行岑晊南陽棘陽人有高才郭林宗朱公叔等皆為友李膺王暢稱其有幹國器太守成瑨請為功曹時語曰南陽太守岑公孝宏農成瑨但坐嘯宛富賈張泛用勢縱橫晊勸瑨收捕過赦竟誅之汛妻上書訟寃帝震怒晊亡匿齊魯之間會赦出後州郡察舉三府交辟並不受賈彪潁川定陵人志節慷慨與同郡苟爽齊名舉孝廉輔新息長延熹元年黨事起彪謂同志曰吾不西行大禍不解乃入洛陽説竇武霍諝大赦黨人後以黨禁錮卒於家初彪兄弟三人並有高名而彪最優故天下稱曰賈氏三虎偉節最怒張璣南陽涅陽人靈帝時舉孝亷官長沙太守深於醫侍中王仲宣年二十餘璣見之曰子年至四十當有疾鬚眉脫落後半年且死豫服五石湯可免仲宣聞而惡之受方不飲後二十年果如璣言其神異如此著傷寒論二十二篇何進南陽宛人靈帝時以女弟為貴人纍遷虎賁中郎將出為潁川太守黃巾賊張角起以進為大將軍鎮京師角别黨馬元義謀起洛陽進發其姦封慎侯弟苗擊盜有功孫晏少知名好老莊言著述凡數十篇三國漢黃忠南陽人從昭烈入蜀自葭萌還攻劉璋常先登陷陳勇毅冠三軍建安二十四年於漢中定軍山擊魏夏侯淵一戰斬之遷征西將軍賜爵關內侯卒諡曰剛傅肜義陽人為將軍從昭烈征吳次猇亭昭烈退軍肜斷後拒戰吳將詰令降肜罵曰何有漢將軍降者遂戰死子僉為都督景耀六年臨危授命論者嘉其父子奕世忠義陳震南陽人隨昭烈入蜀建興三年遷尚書令奉命使吳諸葛亮與兄瑾書曰孝起忠純之性老而益篤及其贊述東西歡樂和合有可貴者還封城陽亭侯王連南陽人為梓潼令昭烈起事葭萌進軍來南連閉城不降昭烈義之成都平以為什邡令轉廣都遷司鹽校尉較鹽鐵之利有裨國用於是簡取良材以為官屬若吕人杜祺劉幹等終皆至大官自連所拔也厯官領丞相長史封平陽亭侯卒來敏義陽新野人來歙之後也涉獵書籍善左氏春秋尤精於倉雅訓詁好是正文字昭烈定益州署敏典學校尉後主踐阼纍遷光祿大夫子忠博覽有父風鄧芝義陽新野人漢司徒禹之後也昭烈與語奇之擢郫今遷廣漢太守入為尚書吳嘗請和諸葛亮遣芝修好吳遂絶魏與蜀連和封陽武亭侯延熙六年遷車騎將軍涪陵國人殺都尉叛率軍征討即梟其渠帥百姓安堵為大將軍二十餘年賞罰明斷善恤卒伍身之衣食資仰於官不苟素儉然終不治私産妻子不免飢寒死之日家無餘財性剛簡於時人少所敬貴惟器異薑維云吕人南陽人少好讀書鼓琴為綿竹令纍遷巴西蜀郡太守入為尚書令衆事無留門無停賓厯職內外治身儉約謙靖少言為政簡而不煩號為清能子雅清厲有文才著格論十五篇董厥義陽人為丞相亮府令史亮稱之曰董令史良士也吾每與之言思慎宜適胡濟義陽人為丞相亮主簿有忠藎之效亮嘗曰從事於偉度數有諌止宗預南陽安衆人丞相亮以為主簿遷參軍右中郎將將命使吳孫權嘉其抗直甚愛待之延熙中復東聘吳賜爵關內侯纍拜鎮軍大將軍魏文聘南陽宛人為劉表大將魏武征荆州琮舉州降聘欷歔流涕魏武愴然曰卿真忠臣也以為江夏太守使典北兵文帝時纍功遷後將軍封新野侯孫權以五萬衆圍聘於石陽甚急聘堅不動權乃解去聘追擊破之在江夏數十年有威恩名震敵國卒諡曰壯韓嵩南陽義陽人少稱好學雖貧不改操為劉表别駕從事正諫不從漸見違忤遣嵩詣魏武觀虛實嵩還深陳魏武威德表大怒欲殺嵩考殺隨嵩行者知嵩無他意乃止荆州平嵩疾病就在所拜授大鴻臚印綬杜襲根之子避亂荆州劉表待以賓禮襲南適長沙建安初魏武以為西鄂長時長吏皆斂民保城郭不得農桑襲自知恩結於民遣老弱分散就田留丁壯備守吏民感恩咸為用命後領丞相長史隨魏武討張魯留督漢中軍事綏懷開導百姓自出徙洛鄴者八萬餘口魏武東還當選留府長史鎮守長安選多不當魏武令曰釋騏驥而不乘焉皇皇而更索遂以襲為之夏侯尚昵於太子襲謂尚非益友不足殊待以聞魏武太子初甚不脫後乃追思文帝踐阼為尚書明帝時封平陽鄉侯為大將軍師以疾徴還卒諡曰定韓暨南陽堵陽人舉孝亷司空辟皆不就同縣豪右陳茂譖暨父兄幾至大辟暨結死士擒茂以首祭父墓由是顯名太祖平荆州辟為丞相士曹屬後遷樂陵太守黃初七年遷太常進封南鄉亭侯崇明正禮廢去淫祀多所匡正後拜司徒卒諡曰恭劉廙南陽安衆人魏國𥘉建為黃門侍郎上疏諫征蜀後徙署丞相倉曹屬著書數十篇及與丁儀共論刑禮皆傳於世文帝即位為侍中賜爵關內侯鄧艾義陽棘陽人為典農綱紀上計吏司馬懿奇之辟為掾遷尚書郎時欲廣田蓄榖使艾行陳項已東至壽春艾以為宜開河渠引水澆溉大積軍糧又通運漕之道乃著濟河論以喻其指事皆施行出參征西軍事行安西將軍解雍州刺史王經圍於狄道薑維趣上邽艾與戰於假谷大破之以為鎮西將軍都督隴右諸軍事封鄧侯又破維於侯和景元四年諸軍征蜀艾自隂平道行無人之地七百餘里鑿山通道造作橋閣山高谷深至為艱險艾以氊自裹推轉而下將士皆攀木緣崖魚貫而進軍到雒蜀主降艾檢御將士無所虜掠綏納降附蜀人稱焉詔進太尉增邑二萬戶州泰義陽棘陽人好立功業善用兵官至征虜將軍假節都督江南諸軍事卒諡曰壯吳趙咨南陽人博聞多識應對辨捷仕吳為中大夫使魏魏主嘉美之遂拜騎都尉晉滕修南陽西鄂人仕吳孫皓時為廣州刺史甚有威惠會晉師伐吳修率衆赴難至巴邱而皓已降乃縞素流涕而還入晉拜安南將軍廣州牧封武當侯委以南方事在南積年為邊夷所附卒諡曰忠孫舍為庾冰輕車長史討蘇峻有功封夏陽縣侯授平南將軍廣州刺史曾孫恬之為龍驤將軍魏郡太守戍黎陽為翟遼所執死之鄒湛新野人少以才學知名仕魏厯通事郎太學博士晉泰始初轉廷尉平征南從事中郎深為羊祜所器重元康中拜祭酒轉少府所著書及論事議二十五首為時所重子捷亦有文才為散騎侍郎太傅參軍樂廣清陽人性沖約有遠識寡嗜欲與物無競裴楷辟為太尉掾轉太子舍人衛瓘見而奇之曰此人之水鏡見之瑩然若披雲霧而覩青天也纍遷侍中河南尹凡論人必先稱其所長則所短不言自見人有過先盡宏恕然後善惡自彰廣與王衍俱名重於時故天下言風流者謂王樂為稱首焉時王澄胡母輔之等皆任放為達或至裸體廣聞而笑曰名教內自有樂地何必乃爾位終尚書令魯褒南陽人好學多聞以貧素自立元康末褒傷時貪鄙乃隱姓名而著錢神論以刺之時共傳其文哀不仕莫知所終劉喬南陽人少為祕書郎以誅楊駿功賜爵關中侯纍遷散騎常侍御史中丞時齊王冏腹心董艾勢傾朝廷百僚莫敢忤喬二旬之中奏劾艾罪者六張吕之亂喬與劉宏共討昌惠帝西幸長安喬復與諸州郡舉兵迎大駕後為都督豫州諸軍事鎮東將軍豫州刺史卒於官王豹順陽人少而扢直初為豫州别駕齊王冏為大司馬以豹為主簿冏驕縱失天下心豹兩致箋極諫遂被殺將死曰懸吾頭大司馬門見兵之攻齊也衆庶冤之張輔南陽西鄂人少有幹局初補藍田令不為豪強所屈纍遷尚書郎封宜昌亭侯轉御史中丞多所糾劾及孫秀執權將繩輔以法輔以箋與之秀雖凶狡知輔雅正乃止後為秦州刺史郭舒順陽人始為領軍校尉坐擅放司馬彪繫廷尉世多義之夏侯含辟為主簿含坐事舒自繫理含事得釋劉宏收荆州引為治中宏卒舒率將士推宏子璠為主討滅逆賊郭勱保全一州王澄引為别駕荆土士人宗嘗因酒忤澄澄怒叱左右棒舒厲色謂左右曰使君過醉汝輩何敢妄動澄恚因遣搯其鼻炙其眉頭舒跪而受之澄意少釋而遂得免後為王敦參將敦謀為逆舒諫不從仕至梁州刺史趙彭南陽人為晉故東萊太守張賓薦之於石勒勒徴為魏郡太守彭泣辭曰受人之榮復事二姓臣志所不為亦明公之所不許也徴辟再四卒不受范汪晷之孫少孤貧年十三喪母居喪盡禮及長布衣蔬食燃薪寫書遂博學多通善談名理解褐參護軍事蘇峻平賜爵都鄉侯復為庾亮平西參軍從討郭默徵拜中書侍郎時庾翼將悉郢漢之衆以事中原汪上疏諫桓溫西征蜀委以留府蜀平進爵武興縣侯溫頻請為長史皆不就自求為東陽太守溫甚恨焉在郡有惠政纍遷徐兗二州刺史既而桓溫北伐令汪率文武出梁國以失期免為庶人朝廷憚溫不敢執談者為之嘆恨汪屏居吳郡講肄不言枉直卒於家贈散騎常侍諡曰穆范堅汪之從父博學屬文拜佐著作郎撫軍參軍討蘇峻賜爵都亭侯纍遷尚書右丞護軍長史子啓以才義顯終黃門侍郎父子並有文筆傳於世朱序義陽平氏人世為名將纍遷兗州刺史寧康初拜梁州刺史鎮襄陽苻堅遣其將苻丕率衆圍序序纍戰破賊督護李伯護密與賊相應襄陽遂沒序陷於堅太元中堅悉衆南侵謝石拒之堅遣序説石使降序至謂石曰若堅百萬之衆悉到莫可與敵及其未會擊之可以得志於是石選勇士八千涉淝水挑戰堅衆小卻序時在其軍後倡云堅敗衆遂大奔序乃得歸拜龍驤將軍加都督司雍梁秦四州諸軍事豫州刺史卒劉驎之南陽人少尚質素虛退寡欲好遊山澤志存遁逸車騎將軍桓沖聞其名請為長史固辭不受沖嘗到其家驎之於樹條桑使者致命驎之曰使君既枉駕光臨宜先詣家君沖聞大愧於是乃造其父父使驎之於內自持濁酒蔬菜供賓沖敕人代驎之斟酌父辭曰若使從者非野人意也沖慨然至昏乃退去驎之家百餘里有一孤姥病將死嘆息謂人曰誰當埋我惟有劉長史耳何由令知驎之先聞其有患故往候之值其命終乃身為營棺殯送之其仁愛惻隱若此劉耽喬之孫少有行檢為宗族所推博學明習詩禮三史厯度支尚書加散騎常侍在職公平廉慎所在著績桓靈寶耽女壻也及輔政以耽為尚書令加侍中不拜卒贈左光祿大夫子栁有名譽厯尚書左右僕射徐兗江三州刺史范寧汪之子少篤學多所通覽時以浮虛相扇儒雅日替寧以為其源始於王弼何晏著論斥之解褐為餘杭令遷臨淮太守封陽遂鄉侯徴拜中書侍郎在職多所獻替有益政道時博求明堂辟雍之制寧據經傳奏上皆有典證孝武雅好文學甚被親愛朝廷疑議輒咨訪之出輔豫章太守又大設庠序遣人往交州採磬石以供學用遠近至者千餘人資給衆費一出私録并取郡四姓子弟皆充學生課讀五經免官卒於家初寧以春秋穀梁未有善釋沈思積年為之集解其義精審為世所重云韓延之南陽堵陽人初拜建威將軍荆州從事轉平西府録事參軍劉裕伐司馬休之未至江陵密與書招之延之報書辭甚激厲以裕父名翹字顯宗於是已字顯宗名子為翹蓋示不臣劉氏也南北朝宋范泰寧之子仕晉位至御史中丞入宋拜金紫光祿大夫加散騎常侍時議建國學以泰領國子祭酒泰上表陳將進之道又言事者以國用不足欲更造五銖錢泰極諫其不便景平初加位特進致仕泰博覽篇籍好為文章愛獎後生孜孜無倦撰古今善言二十四篇及文集傳於世卒諡曰宣子蔚宗少好學善為文章能隸書刪衆家後漢書為一家之作自以為博贍不及班氏整理未必愧也宗炳南陽涅陽人居喪過禮為鄉閭所稱武帝辟為主簿又召為太尉行參軍俱不就家貧無以相贍身營稼穡武帝數致餼賚悉不受好山水愛遠遊西陟荆巫南登衡嶽疾還嘆曰老疾俱至名山恐難遍覩惟當澄懷觀道卧以遊之凡所遊履皆圖之於室謂人曰撫琴動操欲令衆山皆響古有金石弄為諸桓所重桓氏亡聲遂絶惟炳傳焉宗或之炳從弟早孤事兄恭謹家貧好學州辟主簿舉秀才不就公弘餼遺一無所受元嘉初帝使陸子真觀采風流三詣彧之辭疾不見子真還表薦之徴拜員外散騎侍郎亦不就卒於家師覺授南陽涅陽人與宗少文並有素業以琴書自娛母殁一號而絶良久乃蘇後撰孝子傳八卷臨川王義慶辟為州祭酒主簿並不就宗越南陽葉人父為蠻所殺讐嘗出郡越於市中刺殺之太守夏侯穆擢為隊主蠻有為寇盜者常使越討伐往輒有功元嘉中隨柳元景伐魏還補後軍參軍纍立戰功封始安縣子後領南濟隂太守下獄死越善立營陳每數萬人止頓自騎馬前行使軍人隨其後馬止營合未嘗參差宗慤炳從子少時炳問其志答曰願乘長風破萬里浪元嘉中江夏王義恭舉慤有膽勇除振武將軍遣攻林邑林邑王傾國來拒以具裝𬒳象前後無際士卒不敢當慤曰吾聞獅子威服百獸乃製其形與象相禦象果驚奔衆潰亂遂克林邑收其珍異雜物不可勝計慤一無所取孝武初以功進左衛將軍封洮陽侯後為雍州刺史卒諡曰肅朱修之序之孫初為州主簿元嘉中纍遷司徒從事中郎隨到彥之北伐留戍滑臺太武嘉其守節以為侍中修之潛謀南歸及至以為黃門侍郎孝武初纍遷荆州刺史以功封南昌縣侯修之治身清約凡所贈貺一無所受惟以撫納羣蠻為務官至崇憲太僕加特進金紫光祿大夫卒諡曰貞齊劉虬南陽涅陽人少而抗節好學須得祿便隱宋泰始中為當陽令罷官歸家靜處斷穀餌术及胡麻齊建元初豫章王嶷為荆州辟為别駕不應命永明三年詔徴為通直郎建武二年徵國子博士皆不就其冬虬病正畫有白雲徘徊簷户之內又有香氣及磬聲其日卒庾震新野人喪父母居貧無以葬賃書以營事至手掌穿然後葬事獲濟南陽劉虬為撰孝子傳庾蓽新野人仕齊為驃騎功曹史博涉羣書有口辨後為荆州别駕清身率下杜絶請託皮被蔬食妻子飢寒纍遷會稽郡丞行郡府事清節愈厲太守永陽王饋之謝不受天監元年卒庾杲之蓽從子少有貞立學涉文義仕齊為尚書駕部郎清貧自業食惟有並葅草瀹韭生並雜菜或戲之曰誰謂庾郎貧食鮭常有二十七種言三九也纍遷尚書左丞出為王儉衛軍長史時人呼入儉府為芙蓉池後為太子右衛率加通直常侍厯在上府以文學見遇卒諡曰貞樂頤南陽涅陽人少而言行和謹仕為京府參軍時父在郢病亡頤忽思父涕泣因請假還中路得凶問徒跣號咷水漿不入口數日嘗遇病與母隔壁忍痛不言嚙被至碎恐母之憂已也吏部郎庾杲之往候頤為設食惟枯魚菜葅杲之不能食母聞之自出膳魚羹數種杲之曰卿過於茅季偉我非郭林宗仕至郢州治中卒劉渢南陽人母早亡父紹仕宋為中書郎𬒳敕納路太后兄女為繼室渢年數嵗路氏不以為子路氏生溓渢憐愛之不忍舍恆在床帳側輒被驅捶終不肯去路氏病經年渢晝夜不離左右每有增加輒流涕不食路感其意慈愛遂隆溓事渢過於同産事無大小必咨而後行渢後為始安王遙光咨議遙光有異志風諫不從事敗渢靜坐圍舍溓為度支郎亦奔亡遇渢仍不復肯去以衣帶結兄衣俱見殺何蔭聞之嘆曰兄死君難弟死兄禍美哉宗元卿南陽人早孤為祖母所養祖母病元卿在遠輒心痛大病則大痛小病則小痛以此為常鄉里號曰宗曾子宗測炳之孫少靜退不樂人間居母喪身負土植松柏豫章王辟為參軍永明三年詔徴太子舍人皆不就遂往廬山止祖炳舊宅魚復侯子響命駕造之測避不見後子響奄至所住測不得已巾褐對之竟不交言建武二年徵為司徒主簿亦不就卒著有續高士傳三卷庾易新野人志性恬靜不交外物齊臨川王映表薦之餉麥百斛易辭不受以文義自樂建武三年詔徴為司徒主簿不就卒梁范縝南陽舞隂人少孤貧事母孝謹及長博通經術尤精三禮性質直好危言高論仕齊位尚書殿中郎永明中與魏氏和親簡才學之士為行人縝將命著名鄰國後為宜都太守遷尚書左丞坐事徙廣州還為國子博士卒有文集十五卷范雲縝從弟六嵗讀毛詩日誦九紙性機警有識善屬文下筆輒成時人每疑其宿搆沈攸之兵圍郢城雲父抗為府長流入城固守劉家屬居外雲為軍人所得攸之召與語聲色甚厲雲容貌不變徐自陳説攸之笑曰卿定可兒仕齊厯除尚書殿中郎會文惠太子幸東田觀穫雲時從文惠顧雲曰此刈甚快雲曰三時之務亦甚勤卒諡曰壯張惠紹義陽人少有武幹仕齊為竟陵橫桑戍主母喪歸鄉聞梁武帝起兵乃自歸纍有戰功武帝踐阼封石陽縣侯遷驍騎將軍時東昏餘黨作亂惠紹馳率所領赴戰賊乃敗走遷太子右衛率天監六年魏軍攻鍾離惠紹與馮道根等攻斷魏連橋短兵接戰魏軍大潰以功為冠軍將軍後為司州刺史在州和理吏民親愛之徴還為右衛將軍加通直散騎常侍卒諡曰忠子澄以軍功厯遷衛尉鄉太子左衛率卒諡曰愍樂藹南陽淯陽人方頤隆準舉動醖藉仕齊為豫章王嶷驃騎行參軍嶷常問靄城隍風俗山川險易藹隨問立對若葉圖牒嶷益重焉永明八年巴東王子響反及敗焚燒府舍官曹文書一時蕩盡武帝見藹問以西事藹占對詳敏帝悅用為荆州中從事梁天監初纍遷御史中丞性公強居臺憲甚稱職出為廣州刺史宗夬炳之孫少勤學有局幹仕齊為驃騎行參軍時竟陵王子良集學士於西邸並見圖畫夬亦預馬鬱林為南郡王居西州使夬掌書記以筆札貞正見許後出為秣陵令遷尚書都官郎與傳昭俱以清正免禍入梁為太子右衛率五兵尚書參掌大選庾域新野人少沈靜有名鄉曲梁文帝為郢州辟為主簿嘆美其才曰荆南杞梓其在斯乎長沙宣武王為梁州以為録事參軍帶華陽太守時魏軍攻圍南鄭州有空倉數十所域手自封題指示將士曰此中粟皆滿足支二年但努力堅守衆心以安軍退以功拜羽林監遷懷寧太守罷仕還家妻子猶事井白域身衣大布餘俸專充供養母好鶴唳域在位營求孜孜不怠一旦雙鶴來下論者以為孝感所致入梁為寧朔將軍巴西梓潼二郡太守魏襲巴西域固守魏軍退封廣牧縣伯遷寧蜀太守庾子與域之子幼而岐嶷五歲讀孝經乎不釋卷齊永明末除州主簿時父在梁州遇疾子輿奔侍醫藥言淚恆并尋丁母憂哀至輒嘔血梁天監初為尚書郎父出守巴西子輿以蜀路險難啓求侍從以孝養獲許父卒寧蜀子輿哀慟將絶者再奉喪還鄉經灎預瞿塘秋水猶壯子輿撫心長叫其夜五更水忽退減安流南下及渡水復舊行人為之語曰灎預如幞本不通瞿塘水退為庾公後除巴陵內史庾黔婁易之子少好學多所講誦性至孝不曾失色於人仕齊為編令政有異績先是縣境多猛獸暴黔婁至猛獸皆度往臨沮界時以為仁化所機徙孱陵令到官未旬父易在家遘疾黔婁忽心驚流汗即日棄官歸至時易疾始二日醫云欲知差劇但嘗糞甜苦易泄利黔婁輒取嘗之味轉甜滑心愈憂苦至夕每稽顙北辰求以身代居喪過禮廬於冢側後除蜀郡太守入梁纍遷至散騎常侍庾於陵黔婁弟七歲能言元理及長清警博學有才思齊隨王子隆為荆州召為主簿使與謝朓宗夬抄撰羣書永元末除東陽遂安令為人吏所稱梁天監初拜太子洗馬時論以為美纍遷中書黃門侍郎終鴻臚卿劉之遴虬之子八嵗能屬文十五舉茂才明經對䇿沈約任昉見而異之調為太學博士時張稷新除尚書僕射託任昉為讓表昉令之遴代作操筆立成昉曰荆南異氣果有異才後為荆州中從事之遴篤學明審博覽羣籍時劉顯韋陵並稱強記之遴每與討論或不過也纍遷都官尚書太常卿鄱陽王範得班固所撰漢書真本獻東宫令之遴等參校異同之遴録其狀數十事及著春秋大義十科左氏十科三傳同異十科合三十事上之帝大悅尋避難還鄉湘東王繹嘗嫉其才學乃密送藥殺之前後文集五十卷劉之亨之遴弟好學美風姿善占對梁武帝嘗曰之遴必以文章顯之亨當以功名著後舉秀才除太學博士纍遷步兵校尉大通六年出師南鄭之亨以司農卿為行臺承制大致克復軍士有功皆録惟之亨為蘭欽所訟執政因而陷之故封賞不行久之帝讀陳湯傳因感悟乃封為臨江子固辭不拜代兄之遴為南郡太守有異績子廣德亦好學位湘東太守庾詵新野人幼聰警篤學經史百氏無不該綜而性托夷簡特愛林泉十畝之宅山池居半蔬食布衣不修産業梁普通中詔為黃門侍郎不起卒諡貞節處士撰帝厯二十卷易林二十卷子曼倩亦早有令譽為荆州咨議參軍所著喪服儀文字體例老子義疏算經七曜厯術並所著文章凡九十五卷樂法才藹之子幼與弟法藏俱有美名仕為建康令不受奉秩比去將至百金縣曹啓輸臺庫武帝嘉其清節除南康內史厯位少府卿江夏太守表求還鄉棲心物表尋卒法藏位征西録事參軍法藏子子雲美容貌善舉止以江陵令除光祿卿魏克江陵子雲守節死胡僧祐南陽冠軍人少勇決有武幹仕魏為銀青光祿大夫以大通三年避爾朱氏之雞歸梁頻上封事武帝器之侯景之叛圍王僧辨於巴陵元帝拜僧祐武猛將軍封新市縣侯以援僧辨前至赤沙亭會陸法和至乃與并軍大敗景將任約軍擒約送江陵景聞之遂遁纍遣車騎將軍及魏軍至以僧祐都督城東諸軍事中流矢卒庾肩吾易之子八歲能賦詩初為安王國常侍隨在雍州𬒳命與劉孝威等抄撰衆籍號高齋學士纍遷太子率更令中庶子簡文即位為度支尚書後宋子仙破會稽購得肩吾欲殺之先謂曰吾聞汝能作詩令可即作若能將貸汝命肩吾操筆便成辭采甚美子仙乃釋以為建昌令仍間道奔江陵厯江州刺史封武康縣侯卒陳岑之敬棘陽人五嵗讀孝經每焚香正坐親戚咸加歎異年十六䇿春秋左氏孝經榷為高第梁武帝召入而試之敬剖釋縱橫左右莫不嗟服除童子奉車郎尋為壽光學士入陳纍遷征南府咨議參軍之敬博涉文史雅有詞筆性謙謹未嘗以才學矜物接引後進怐恂如也每母忌日營齋必躬自灑掃涕泣終日士君子以篤行稱之樊毅湖陽人家本將門少習武善騎射仕梁為右中郎將隨簫循討陸納以功封夷道縣伯尋除天門太守進爵為侯陳大建初為豐州刺史轉左衛將軍五年衆軍北伐毅攻廣陵楚子城拔之擊走齊軍詔以毅為大都督後改封逍遙郡公入為侍中護軍將軍弟猛膽氣過人為湘州司馬會武陵王紀叛猛率軍拒之手擒紀父子三人斬於𦪙中以功纍封安山縣侯入陳纍遷南豫州刺史魏張耀南陽西鄂人仕魏為步軍校尉後為别將以功封長平男厯岐東荆東刺史天平初鄴都草創以耀忠直素著有稱一時轉營構左都將勤於其事宫殿成除東徐州刺史卒諡曰懿周趙文深宛人少學楷隸初仕魏為大丞相府法曹參軍文深雅有鍾王之則筆勢可觀當時碑榜惟文深及冀俊而已大統中追論立義功封白石縣男太祖以隸書紕繆命文深與黎季明沈遐等依説文及字林列定六體成一萬餘言行於世庾信肩吾子幼聰敏博覽羣書起家梁湘東王國常侍與東海徐陵並為抄撰學士文並綺艷故世號徐庾體梁元帝使聘於周遂留不遣江陵平纍遷驃騎大將軍開府儀同三司進爵義成侯明帝武帝並雅好文學信特蒙恩禮信雖位望通顯常有鄉關之思乃作哀江南賦以致其意宗凛南陽涅陽人少聰敏好讀書晝夜不倦語輒引古事鄉里呼為小兒學士梁元帝鎮荆州以為記室嘗夕被召宿省使製龍川廟碑一夕便就帝嘆美之後厯臨汝建城廣晉三縣令遭母憂去職哭輒嘔血每旦有烏數千集於廬舍候哭而來哭止而去時論以為孝感所致魏破江陵入關周太祖以凛名重南土甚禮之拜車騎大將軍世宗即位詔與王褒等刋定羣書於麟趾殿隋樂運淯陽人少好學涉獵經史事母及寡嫂甚謹以孝義聞周天和中為露門學士前後犯顏屢諫武帝多被納用宣帝嗣位輿櫬詣廟堂陳帝八失帝怒將戮之內史元巖諫獲免隋開皇初為􅓳陽令轉高唐令運長願處一諫官從容諷議而性訐直為人所排抵遂不被任用乃發憤録夏殷以來諫爭事集而部之凡四十一卷名曰諫苑奏上之文帝覽而嘉焉唐韓思彥鄧州南陽人授監察御史昌言當世得失巡察益州會蜀大飢開倉賑民然後以聞璽書褒美後太白晝見勸帝修德答天譴帝讓中書令李義府曰八品官能言得失而卿冒沒富貴主何事耶後義府譖思彥出為山陽丞至官閲月自免去上元中復召見詆外戚擅權武后惡之遷賀州司馬子琬開元中為殿中侍御史強直敢言張巡鄧州南陽人博通羣書曉戰陳法氣志高邁略細節開元中擢進士第出為清河令治績最更調真源令天寶中安祿山反巡起兵討賊遂人雍邱賊四萬薄城巡每戰輒克拔衆至睢陽與太守許逺城父令姚問等合賊將尹子奇合衆十萬來攻巡屬士固守日中二十戰氣不良逺自以材不及請稟軍事居其下詔拜巡御史中丞數敗賊固守數月救兵不至食盡巡殺愛妾以饗士乃使南霽雲冒圍至臨淮告急賀蘭進明忌巡聲威不肯救城遂陷見執子奇謂巡曰聞公督戰大呼輒眥裂血面嚼齒皆碎何至是曰吾欲氣吞逆賊顧力屈耳遂大罵𬒳害巡讀書不過三復終身不忘守㫿陽士卒居民一見問性名其後無不識待人無所疑賞罰信與衆共甘苦寒暑故下爭致死力能以一當百巡死後十日收東京咸謂蔽遮江淮巡有功云贈揚州大都督趙雲鄉穰人少嗜學履尚清鯁開元中擢進士第纍官祕書少監敦友誼不以夷險恩操與殷寅顏真卿柳方陸據蕭穎士李華邵軫善時為語曰殷顏枊陸蕭李邵趙張建封南陽人父玠少任俠安祿山使李廷偉徇山東玠率豪傑斬之建封喜文章慷慨尚氣自許以功名顯代宗時盜起蘇常間李光弼討之建封請前喻賊開譬禍福一日降數千人由是知名擢監察御史出為壽州刺史屢拒李希烈賊平纍拜御史大夫除泗濠節度使貞元中來朝時宦者主宫市誎章列上皆不納建封得間言之帝頗順聽及還鎮帝賦詩以餞又以鞭賜之曰卿節誼嵗寒弗渝卒贈司徒韓翃南陽人與盧綸吉中孚錢起司空曙苗發崔洞耿湋夏侯審季端皆能詩齊名號大厯十才子家居無聊一日夜將旱客扣門賀曰員外除駕部郎中知制誥翃愕然曰誤矣客曰制誥闕人中書請補御批曰與韓翃時有同姓名者為江淮刺史又批曰與詩人韓翃趙宗儒驛子第進士授校書郎貞元六年以司勳員外郎領考功事黜陟詳當無所回憚纍遷檢校右僕射守太常卿太和初進太子太傳帝召訪政理對曰堯舜之化慈儉而已帝納其言二嵗授司空致仕卒庾敬休新野人夷淡多容可不飲酒食肉不通聲色擢進士第又中宏辭辟宣州幕府厯官翰林學士文宗將立魯王為太子慎選師傳敬休以户部侍郎兼魯王傅言蜀道米價騰涌百姓流亡請以本道闕官職田帳貧民詔可再為尚書左丞卒范傳正順陽人好古性精悍舉進士宏辭皆高第授集賢殿校書郎厯歙湖蘇三州刺史有殊政拜宣歙觀察使改光祿卿卒宋周湛穰人舉進士授祕書省著作佐郎鄧州美陽堰歲役工數十萬溉州縣職田而利不及民湛奏罷之為鹽鐵判官立勘同法嵗減天下許帳七千厯江南西路夔州路轉運使治煩劇能得其要所至條上利害前後至數十百事拜右諫議大夫徙知相州卒賈黯欀人擢進士第一遷左正言果於言事首論韓琦富弼范仲淹可大用尋擢知制誥請召史臣同侍經筵除翰林學士唐介等坐言陳升之皆外補黯奏介等敢言請寬之英宗即位遷給事中權御史中丞上用人五事後議以濮王為皇伯執政弗從數爭論以病求出知陳州未行卒口占遺奏數百言黯修潔自喜在朝數言事人稱其介直王襄南陽人擢進士第以軍器監主簿言事稱旨擢庫部員外郎遷顯謨閣待制權知開封府縲繫滿獄襄晝夜決遣閲月獄空大觀中為兵部侍郎使高麗厯吏部尚書同知樞密院事後以延康殿學士罷知亮州元暢師文南陽人幼警俉家貧無書手録口誦過目輒不忘弱冠謁許衡與姚燧高凝相友善至元五年陳時政十六䇿丞相安圖奇其才辟為三部令史尋拜監察御史糾劾不避權貴上所纂農桑輯要書至大初修成宗實録賜鈔百錠不受時制作多出其乎纍官至翰林學士卒安圖舊作安同今改白景亮南陽人明法律善書算由征東行省譯史有勞超遷南恩知州升沔陽府尹奏最於朝特授衢州路總管有惠政性亷介勤苦自奉甚薄妻尢儉約惟以脫粟對飯而巳部使者上其事特詔褒美賜以宫錦改台州路總管卒博都里翀其先隆安人祖德從憲宗南征因家鄧之順陽翀勤學隱居不仕學行為州里所敬大德十一年用薦授襄陽縣教諭纍遷集賢直學士兼國子祭酒作屋以居學者有六年未及釋褐者皆使就試而官之帝師至京有旨朝臣皆郊迎大臣俯伏進觴帝師不為動惟翀舉鵤立進曰帝師釋迦之徒天下僧人師也余孔子之徒天下儒人師也請各不為禮帝師笑而起舉觴卒飲衆為之栗然除江浙行省參知政事卒翀狀貌魁梧不妄言笑其為學一本於性命道德而記問宏博文章簡奧與雅深合古法學者仰為儀表所著有文集六十卷子逺以廕除授祕書郎轉襄陽縣尹需次居南陽賊起遠以忠義自奮傾財募丁壯得千餘人與賊戰俄而賊大至遠被害成遵穰人幼敏悟讀書日記數千言至順辛未至京師虞集見之曰公輔器也元統中進士第授翰林國史院編修官至正二年拜監察御史是歲言事並舉劾凡七十餘事皆指訐時弊執政者惡之出為陜西行省員外郎改禮部郎中奉使山東淮北察守令賢否得循良者九人貪懦者二十一人奏之遷中書右司郎中時刑部獄案久而不決者積數百遵與其僚分閲之共議輕重各當其罪纍官中書左丞明郭雲南陽人武勇有材略狀貌魁梧元季聚鄉人為義兵保裕州元主北奔河南郡縣皆下雲獨堅守徐達圍之雲出戰𬒳執植立不跪且罵且求死達壯之繫送京師太祖奇其狀貌用為溧水知縣民皆稱之擢南陽指揮僉事兼知府事卒李仁唐縣人以常遇春薦知黃州府事由給事中擢吏部侍郎時銓法未畫一仁詳考舊典參以時宜按地劇僻為設官煩簡凡庶司黜陟及課功核實之法皆精心籌畫銓法秩然進尚書謫青州知府政最擢户部侍郎周炳舞陽人事母孝謹母常病甚哀號籲天願以身代母思獐肉炳求之不得悲痛愈切晚忽有獐入室殺以啖母病遂愈洪武間詔旌其門劉淳南陽人洪武末為原武訓導周王聘為世子師薦於朝輔右長史以正輔王時端禮門槐盛夏而枯淳引咎徵陳戒王用其言修省枝枯復榮因旌其槐曰攄忠鐵鉉鄧州人洪武中由國子生授禮科給事中調都督府斷事嘗讞疑獄立白太祖喜字之曰鼎石建文初為山東參政李景隆北伐鉉督餉無乏燕兵攻濟南鉉乘城守禦以計盡毁其攻具燕遂隄水灌城衆懼鉉令軍士偽降燕王喜亟下令退軍自乘駿馬入甕城鉉伏兵城上急下鐵板中王馬首王大驚取他馬疾馳去鉉率衆掩擊大敗之擢山東布政使尋進兵部尚書已而燕師渡淮鉉猶屯淮上被執不屈令一回顧終不得遂磔於市福王時贈太保諡忠襄李賢鄧州人舉鄉試第一宣德進士授驗封主事遷文選郎中上正本十䇿景帝命翰林寫置左右備省覽超擢兵部侍郎轉吏部採古二十二君行事可法者曰鑑古録上之英宗復位命兼翰林學士入直文淵閣尋進尚