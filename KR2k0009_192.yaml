body:
  text: 庫車兼轄沙雅爾在喀喇沙爾西八百里第納爾河西二百里東至第納爾河接喀喇沙爾界西至烏恰特河接賽喇木界南至烏恰特河接沙雅爾界北至額什克巴什山接伊犂界沙雅爾東至托伊博羅多接喀喇沙爾界西至塔木根庫勒接阿克蘇界南至塔里木大河北至烏恰特河接庫車界庫車至京師一萬八十里沙雅爾至京師一萬二百三十里建置沿革漢為龜兹國後漢建武中莎車攻滅其地後復立屬胸奴永元中內屬晉太康中為焉耆所併後復立唐初入朝貞觀二十一年移安西都護府於其國統龜兹于闐疏勒碎葉四鎮咸亨元年陷吐蕃長夀元年收復貞元後又陷吐蕃宋為回鶻所有元初為回鶻地號庫徹舊作苦義今改正後以封宗王明為伊勒巴拉舊作亦力把里今改正本朝乾隆二十三年官兵追討逆回霍集占霍集占西遁舊伯克阿集等遂以城降其南一百五十里為沙雅爾城我兵攻庫車擊敗沙雅爾援兵逆黨阿布爾什木西奔阿克蘇舊伯克烏哈墨第以城內附庫車城周四里六分東南北三面形圓西面形方高一丈九尺沙雅爾城周二里許高一丈四尺南北二門晷度北極高四十一度三十七分距京師偏西三十三度三十二分夏至晝長六十刻二分夜長三十五刻十三分冬至晝長三十五刻十三分夜長六十刻二分午正日景夏至長三尺二寸七分冬至長二丈一尺五寸四分春分秋分長八尺八寸八分西域圖志形勢南與精絶東南與且末西南與扜彌北與烏孫西與姑墨接漢書西域傳東有輪臺南有大河號計式水即黃河也魏書西域傳村落比連煙户稠密西域圖志風俗龜兹人以田種畜牧為業晉書西戎傳龜兹俗尚音樂唐書西域傳回部地近天方本通音律龜兹樂五旦七均繁聲促節少舒遲廣大之響西域圖志屬境托和鼐在庫車城東六十里阿巴特西南一百四十里乾隆二十三年大兵討逆回進圍庫車以托和鼐西南有地名托木落克通賽喇木拜兩城為逆回援兵要路增兵進禦賊依溝升阜列陳未安我兵競進自午迄未殱之無一賊得脫者高宗純皇帝聖製詩有托和鼐行阿巴特在庫車城東二百里西濱奇里什河唐書地理志東夷僻守捉又七十里至西夷僻守捉東夷僻守捉在玉古爾西則西七十里之西夷僻守捉當在今阿巴特也裕赤哈喇在庫車城東南二十里哈喇阿薩爾北二十里阿勒玉蘇布在庫車城東南三十里裕赤哈喇東南十里特勒伯在庫車城東南一百里常格東南三十里不通路徑哈喇阿薩爾在庫車城南四十里常格北三十里常格在庫車城南七十里廬舍比密為大村落哈魯納斯在庫車西南十五里庫克體騫北十里庫克體騫在庫車西南二十五里達烏圖北十五里達烏圖在庫車城西南四十里嬴和東北三十里嬴和在庫車城西南七十里裕赤哈喇西南四十里特克集在庫車城西南一百里常格西北四十里濵烏恰特河奇里什在庫車東北六十里正北當天山正幹阿勒坦呼蘇南麓距庫車城一百里額什克巴什在庫車城東北九十里天山南麓以上屬庫車托伊博羅多在沙雅爾城東一百二十里踰烏恰特河而至東通喀喇沙爾界喀伊木阿塔在沙雅爾城東南四十里南臨大河塔里木在沙雅爾城南地寬腴可耕植南臨大河查盤在沙雅爾城西南四十里又西南通阿克蘇境塔木根庫勒在沙雅爾城西一百四十里地多沙磧不可耕庫克布葉在沙雅爾城西北四十里城垣卑小東傍烏恰特河哈爾噶齊在沙雅爾城西北五十里烏恰特河南西通阿克蘇境坡斯在沙雅爾城東北三十里以上屬沙雅爾葉勒阿里克在沙雅爾西南七十里南距大河八十里葉伊勒干在沙雅爾西南一百五十里葉勒阿里克西八十里布古斯孔郭爾郭在沙雅爾西南四百里葉伊勒干西二百五十里以上係沙雅爾西南境外地戶口回民一千九百七十六戶一萬二千一百四十八名口田賦額徵糧三千二百二十八石四斗額徵紅銅一千八百八十八斤四兩零臺站庫車底臺西至阿克蘇屬和色爾臺二百一十里托和鼐臺庫車底臺東八十里阿巴特臺托和鼐臺東一百四十里玉古爾臺阿巴特臺東北一百里英噶薩爾臺玉古爾臺東北八十里策特爾臺英噶薩爾臺東八十里車爾楚臺策特爾臺東一百六十里哈喇布拉克臺車爾楚臺東南一百里庫隴勒臺哈喇布拉克臺東少北三十里哈喇噶阿璊臺庫隴勒臺東北六十里又東北至喀喇沙爾屬之海都河南臺一百五十里俱在庫車東境卡倫博勒齊爾特吉克沙爾達朗塔里木葉勒阿里克山川額什克巴什山在庫車北百里北去汗騰格里山二百里為庫車北屏山脈自木素爾山分支東南行百餘里為阿勒坦呼蘇山至此北與汗騰格里山合又東行一支接庫克納克嶺山形寬廣産硫磺隋書西域傳白山一名阿羯山常有火及煙即是出碙砂之處即其地也汗騰格里山在庫車北三百里東北距伊犂一百五十里東去納喇特嶺五百里山脈自西南四百里之木素爾山東行分二支其北一支由圖斯池東南折而東北至特克斯河源南其南一支自拜賽喇木庫車之北折而北行逾西裕勒都斯河發源處折而西與北一支合汗騰格里當其交會處峯勢尊嚴羣巒環拱為天山之主峯奇里什河在庫車東塔什阿里克河西五十里源出天山北麓南流六十里至托和鼐地即名托和鼐河居民藉以汲飲塔里木河在庫車東南即額爾勾河之下遊也大河西來三源並會其會處在布古斯孔郭爾郭之西為阿克蘇之東南境庫車之西南境東流至塔里木地名塔里木河烏恰特河在庫車西南一百里舊音鄂根或名渭甘皆音之訛也上承赫色勒河東南流經庫克布葉之北又經沙雅爾城北名沙雅爾河東入塔里木河即古龜兹西川也乾隆二十三年領隊大臣順德訥等追剿回酋霍集占擒殺賊衆一千六百餘級於河口額爾勾河在庫車西南河以地名即西域大河也上承蔥嶺和闐及阿克蘇諸水至額爾勾地為額爾勾河復合烏恰特河會而東流為塔里木河又東流六百餘里北會海都河又東二百二十里入羅布池額爾勾之北正當庫車西境其南方沙磧彌望縱橫千里即且末鄯善諸國地大河所受北山之水最盛南則沙礫隔之無顯然來會之水水經注北河又東徑龜兹國南又東左合龜兹川水即斯河也水經注又云大河又東右會敦薨之水即海都河矣魏書西域傳龜兹國南三百里有大河東流號計式水正與今大河北距庫車里數合庫克納克河在庫車東北葉斯巴什河烏恰爾薩依河密爾特彥河三水皆導源庫克納克嶺為庫克納克河分流復合出山又分為三最西者曰密爾特彥河流百八十餘里入沙哈里克湖次東者曰烏恰爾薩依河亦百八十餘里入沙哈里克湖最東者曰葉斯巴什河亦曰額什克巴什河流五十餘里入阿提委納克湖諺曰頭道河二道河三道河蓋即水經注所謂龜兹東川也古迹古龜兹國漢書龜兹國王治延城去長安七千四百八十里南與精絶東南與且末西南與扜彌北與烏孫西與姑墨接東至都護治所烏壘域三百五十里魏書國在尉犂西北白山之南一百七十里其王白姓都延城方五六里其南三百里有大河東流號計式水即黃河也東去焉耆九百里南去于闐一千四百里西去疏勒一千五百里北去突厥牙帳六百餘里其國西北大山中有如膏者流出成川行數里入地如醍醐甚臭服之鬚齒已落者能令更生隋書大業中遣使貢方物唐書龜兹一曰邱兹一曰屈兹自焉耆西南步一百里度小山經大河二又步七百里乃至橫千里縱六百里宜麻麥粳稻蒲萄出黃金居伊邏盧城北倚阿羯田山亦曰白山常有火貞觀二十一年帝怒其佐焉耆叛乃以阿史那社爾為崑邱道大總管部兵十萬討之社爾凡破五大城遣使者諭降小城七百餘西域震懼乃立王弟葉護王其國勒石紀功始徙安西都護於其都統于闐碎葉疏勒號四鎮儀鳳時吐蕃攻焉耆四鎮俱沒長夀元年武威道總管王孝傑破吐蕃復四鎮地置安西都護府於龜兹於是沙磧荒絶民供資糧甚苦議者請棄之武后不聽都護以政績稱者田揚名郭元振張孝嵩杜暹云自龜兹六百里踰小沙磧有跋祿迦即漢姑墨國橫六百里縱三百里西三百里度石磧至凌山蔥嶺北源也水東流春夏山谷積雪西北五百里至素葉水城素葉以西數十城皆立君長役屬突厥文獻通考宋大中祥符後屢入貢其國主自稱師子王其國西至大食國六十日行東至夏州九十日行或稱西州回鶻或稱西州龜兹或稱龜兹回鶻按龜兹故城雖不可考然水經注城東西有川則今之庫車城烏恰特河流徑其西額什克巴什河流徑其東正與酈注所稱方位相合又元史太祖紀尚稱龜兹而地理志西北地附録則曰庫徹正與庫車音合則庫車之即龜兹國都無疑矣庫車元史舊作苦又今改正安西都護府唐書地理志安西大都護府初置西州顯慶二年平賀魯析其地置濛池崑陵二都護府分種落列置州縣西盡波斯國皆隸安西又徙治高昌故地三年徙治龜兹都督府而故府復為西州咸亨元年吐蕃陷都護府長夀二年收復安西四鎮至德元年更名鎮西後復為安西吐蕃既侵河隴惟李元忠守北庭郭昕守安西與沙陀回紇相依吐蕃攻之久不下建中二年元忠昕遣使間道入奏詔各以為大都護並為節度貞元三年吐蕃收沙陀回紇北庭安西無援遂陷龜兹都督府舊唐書地理志本龜兹國貞觀二十二年阿史那社爾破之以其地置都督府領蕃州九顯慶三年仍自西州移安西府置於龜兹國城土産粳稻麻麥唐書西域傳龜兹土宜麻麥粳稻宋史外國傳龜兹有米麥蒲萄瓜安息香後漢書西域龜兹出安息香馬犎牛皮孔雀北史西域傳龜兹出皮良馬犎牛等多孔雀羣飛山谷間人取而食之孳乳如雞鶩銅鐵北史西域傳龜兹出銅鐵金唐書西域博龜兹出黃金硫磺硝西域圖志庫車額賦硫磺硝紅銅大清一統志阿克蘇在庫車西八百里東至赫色勒臺接庫車界西至察哈喇克臺接烏什界南至喀什噶爾達里雅北至噶克察哈爾海臺接伊犂界至京師一萬七百九十里兼轄賽喇木拜二城建置沿革漢為溫宿姑墨二國北魏時二國役屬龜兹隋為龜兹國地唐為溫肅姑墨二州地元為阿特巴什地舊作阿忒八失今改正明為巴什伯里地本朝乾隆二十三年官兵克庫車阿克蘇回衆俱聞風向化逐霍集占所置伯克以城內附晷度北極高四十一度九分距京師偏西三十七度十五分夏至晝長六十刻夜長三十六刻冬至晝長三十六刻夜長六十刻午正日景夏至長三尺一寸九分冬至長二丈一尺零九分春分秋分長八尺七寸四分西域圖志形勢地勢甚高垣墉陡峻北踞崇岡四城連峙外以一大城環之洵形勝之地西域圖志屬境帕爾滿在阿克蘇城東五十里有河發源山麓分繞莊之東西雅爾巴什在阿克蘇城東六十里札木在阿克蘇城東八十里哈喇裕勒衮西南八十里哈喇裕勒衮在阿克蘇城東一百八十里又東百里名察爾齊克為阿克蘇東境接拜城界雅哈阿里克在阿克蘇城東二百六十里東北距葉伊勒干五十里南至額爾勾河二百里濱木素爾河南岸古姑墨國地喀勒喀勒在阿克蘇城東南七十里西北距額爾格齊六十里科布魯克在阿克蘇城東南八十里托什干河北七十里渾巴什在阿克蘇城東南九十里伯什阿里克在阿克蘇城東南一百十里賽阿里克在阿克蘇城東南一百十里英額阿里克西四十里托什干河南五里和卓巴斯哈克在阿克蘇城東南一百二十里伯什阿里克東十里齊托克喇克在阿克蘇城東南一百四十里呼木什阿里克在阿克蘇城東南一百五十里英額阿里