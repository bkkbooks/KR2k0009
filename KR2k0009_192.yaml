克鄂托克在愛雅克布克色木北八十里和闐城東北六百七十里伯什阿喇勒在伯德里克鄂托克北九十里和闐城東北七百六十里齊克齊鄂托克在伯什阿喇勒北六十里和闐城東北八百二十里波斯湯托郭喇克在齊克齊鄂托克北一百二十里和闐城東北九百四十里又北行七十里至哈喇烏蘇交阿克蘇界自和闐城東北之勒沁托海至阿蘇界千里自塔喀克北至此皆東傍和闐河新唐書地理志自撥換南而東經崑岡渡赤河又西南經神山睢陽鹹泊又南經疏樹九百三十里至于闐鎮城按唐撥換城在阿克蘇東循阿克蘇河東南行渡喀什噶爾葉爾羌諸河即所謂自撥換南而東經崑岡渡赤河也神山睢陽鹹泊及疏樹當在今波斯湯托郭喇克至勒沁托海南北千餘里之間阿勒屯郭勒地以水名在和闐城東南六百八十里塔克東南二百七十里踰河流三至其境蘇格特在阿勒屯郭勒東南一百里踰河流二至其境巴爾呼都克在蘇格特東南二百里踰河流一至其境阿氏爾干在巴爾呼都克東北四百里和闐東一千一百十里一水雙流環帶其地自阿勒屯郭勒至此皆在和闐東境之外彌望砂磧即古渠勒戎盧精絶且末小宛諸國地户口回民一萬三千六百四十二户四萬四千六百三名口田賦額徴糧一萬三千九百三十四石八斗額賦普爾八千三百十二騰格五十文臺站和闐底臺皂窪勒臺又名哈喇哈什臺和闐底臺西七十里又西一百五十里至葉爾羌屬之皮雅勒阿勒瑪臺卡倫圖什罕里克紀雅賽巴克那哈喇齊必自雅伊里班奇札木達爾阿薩爾一杆旗待達克阿哈薩爾敖札特瑪雜爾山川額什墨提斯山在和闐南尼蟒依山在和闐南東西有二山和闐河分出其麓漢書河有二源一出于闐南山下即其地魏書西域傳稱凍凌山唐書西域記有瞿室伽山山峰兩起巖隒四絶蓋古今異名亦即其地云按西域圖志有額什墨提斯哈朗歸諸山無尼蟒依山新疆識略言和闐河二源皆出尼蟒依山不言出哈朗歸山疑尼蟒依即哈朗歸聲之轉蓋并哈朗歸額什墨提斯二山而統稱之矣堅珠山在和闐西南境皂窪勒之西南薩納珠山東二百里哈朗歸山在和闐西南境皂窪勒南又東南為額什墨提斯山皆屬和闐南境之山自蔥嶺分支過葉爾羌南境又東行至此和闐河出其北麓自和闐南山東南行峯嶺連接相屬於沙磧之區經五千餘里與安西南路之南山接瑪雜爾山在和闐河西三百里山不甚高産火硝為和闐北屏自瑪爾占鄂勒氏西行至瑪雜爾山迤邐而西連山不斷直抵葉爾羌河碩勒圖郭勒山在和闐東境外沙圖圖嶺東北三百餘里沙磧中硇什達爾烏蘭達布遜山在和闐東境外碩勒圖郭勒山東南二百五十里沙磧中此山直北七百餘里至羅布淖爾南境自東折北千有餘里與安西州西南境之南山相屬沙圖圖嶺在和闐東南自塔克村東距葉什勒池又東行沙磧六百里至此岡巒連屬不絶玉隴哈什河在和闐東源出皮什雅南尼蟒依山中東北流經玉隴哈什城西分為二各流三十里復合為一北至喀提里什東哈喇哈什河自西南來會又北為和闐河出白玉哈喇哈什河在和闐西源出皮什雅南尼蟒依山中北流至哈喇哈什城南分為二夾城而流城西之河西北流為皂窪勒河而止城東之河距城二里東北至喀提里什入于玉隴哈什河又北為和闐河哈喇哈什城東有河三處並長三十里出青玉魏書西域傳于闐國城東二十里有大水北流號樹枝水即黃河也一名計式水城西五十五里亦有大水名達利水與樹枝水會俱北流五代晉高居誨使于闐記河源所出至于闐分為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異每歲秋水涸國王撈玉于河然後國人得撈玉皂窪勒河在和闐西即哈喇哈什河之分流不通他水和闐河在和闐北即玉隴哈什哈喇哈什二河至喀提里什地復合者源流一千二百里會葉爾羌喀什噶爾諸水即大河南源也史記大宛傳漢使窮河源河源出于闐其山多玉石采來天子案古圖書名河所出曰崑崙云漢書西域傳河有兩源一出于闐在南山下其河北流與蔥嶺河合東注蒲昌海水經注南源導于闐南山俗謂之仇摩置北流經于闐國西又西北注於河克勒底雅河在和闐東源出克勒底雅城東北山中南流經城東行二百餘里通葉什勒池按舊以克勒底雅河為建德力河唐書西域傳建德力河在于闐東三百里而克勒底雅河西去和闐四百三十餘里遠近不侔所云建德力河未必即克勒底雅也葉什勒池在和闐東南源出南山中周回成大澤克勒底雅南流入之唐西域記嫓摩川東入沙磧行二百餘里至尼壤城周三四里在大澤中當即此澤也烏蘭池在和闐西蔥嶺中周回五十餘里不通他河古迹古于闐國漢書于闐國治西城去長安九千六百七十里東北至都護治所三千九百四十七里西通皮山南與婼羌北與古墨接後漢書于填國去長史所居五千三百里建武末莎車王賢強盛攻并于填徙其王俞林為驪歸王遣將君得鎮守于填永平三年于填大人都未殺君得大人休莫霸復殺都末自立為于填王三國志魏黃初三年遣使入貢後魏書于填國在且末西北蔥嶺之北二百餘里東去鄯善千五百里南去女國二千里北去龜兹四百里其地方亙千里連山相次所都城方八九里部內有大城五小城數十城東三十里有首拔河中出玉石真君六年吐谷渾慕利延西入于闐殺其王據其地明年慕利延還故國于闐復定隋書于闐國王姓王字卑示閉練大業中頻遣使朝貢新唐書于闐或曰瞿薩旦那亦曰渙那曰屈丹北狄曰于遁諸胡曰豁旦并有漢戎盧扜彌渠勒皮山諸國地其居曰西山城王姓尉遲氏名屋密本臣突厥貞觀中阿史那社爾平龜兹其王伏闍信入朝上元初以其地為毗沙都督府析置十州授伏闍雄為都督舊唐書地理志安西府領毗沙鎮本于闐也五代史于闐西南近蔥嶺與婆羅門為鄰國而相去猶三千餘里南接吐蕃西北至疏勒二千餘里晉天福三年于闐國王李聖天遣使來貢晉遣張匡鄴册聖天為大寶于闐國王匡鄴自靈州行二歲至于闐至七年冬乃還判官高居誨記其國東南曰銀州盧州湄州其南千三百里曰玉山云漢所窮河源出于闐而山多玉石者此山也宋史祥符二年于闐國黑韓王來貢嘉祐八年復來獻乞賜號為歸忠保順􅠫鱗黑韓王于闐謂金翅烏為􅠫鱗黑韓蓋河汗之訛也明史西域傳于闐自古為大國永樂四年遣使來朝舊志于闐在哈密西南四千八百里至肅州六千三百里東抵曲先北連巴什伯里按今額里齊城即古于闐國都漢書扜彌國西通于闐三百九十里精絶國西通扜彌四百六十里且末國西通精絶二千里鄯善國西通且末七百二十里是于闐至精絶二千八百五十里至鄯善三千五百七十里也新唐書地理志于闐東七百里有精絶國于闐東距且末鎮千六百里魏書且云于闐東去鄯善千五百里里數與漢書大異今由和闐東南經塔克村沙圖圖嶺折東北碩勒圖郭勒山至硇什達爾烏蘭達布遜山計千五百餘里而其地北直羅布淖爾七百餘里淖爾南三百里即故樓蘭國即鄯善國也是于闐至鄯善以今道里計算實無三千五百七十里蓋漢時塗徑屈曲後魏及唐開徑直之道故里數前多後少也精絶去于闐七百里則當在克勒底雅東一百七十里且未去于闐千六百里則當在克勒底雅東千一百餘里鄯善且未漢時為孔道今沙磧彌望人户鮮少故城舊迹渺無可尋故扜彌精絶且未諸國不復標目但記其大略於此扜彌當在克勒底雅之西齊爾拉之東土産穀黍桑麻北史西域傳于闐土宜五穀桑麻明史西域傳于闐桑麻未黍宛然中土馬橐駝騾北史西域傳于闐有好馬駝騾玉史記于闐山多玉石晉高居誨記于闐有白玉河緑玉河烏玉河西域圖志玉産和闐南山者最良河出山中為玉河有紺黃青碧元白數色歲貢無定額金西域圖志和闐土貢黃金纂修官臣張芾恭纂輯總纂官臣邵燦恭覆輯校對官臣賀式韓恭校校對官臣許誦恆恭覆校
