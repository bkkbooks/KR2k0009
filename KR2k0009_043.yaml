跡唐姚崇中宗時爲亳州刺史楊凝宏農人宣武節度董晉表爲判官亳州刺史缺以凝行州事增墾田決圩堰築隄防水患以息五代周王祚祁縣人顯徳初爲潁州刺史均部内租税州境有通商渠距淮百里歲久湮塞祚疏導之遂通舟楫郡無水患宋戚綸楚邱人太宗時知泰和縣江外民險悍多搆訟綸爲諭民詩五十篇因時俗耳目之事以申誨老幼多傳誦之每嵗時必與獄囚約遣歸祀其先皆如期而還李迪濮州人景祐二年知亳州時賊剽掠城邑發兵捕之久不得迪至悉罷所發兵隂聽察知賊匿處部勒驍說士擒賊斬以徇張詠鄄城人真宗時知潁州王旭莘人真宗時知潁州荒政修舉晏殊臨川人仁宗時知潁州范仲淹呉縣人爲集慶軍節度推官歐陽修廬陵人皇祜元年知潁州因災傷奏免黄河夫萬餘人築塞白龍溝注水西湖灌溉腴田大爲農民利建書院敎民子弟由是潁人咸知向學修樂西湖之勝有卜居之志故卒歸老於潁云蔡齊膠水人仁宗時知潁州潁始立學齊所請也卒後潁人見其故吏猶號泣思之邵亢丹陽人仁宗時授潁州團練推官晏殊為守一以事委之民税舊輸陳蔡轉運使欲復折緡錢且多取之亢言民之移輸勞費已甚方仍嵗水旱又從而加取將不堪命乃止謝絳富陽人知汝隂縣善議論喜談時事嘗論四民失業累數千言宋庠雍邱人英宗時判亳州以慎静為治富弼河南人神宗時以使相判亳州青苗法出弼以為如是則財聚於上民散於下持不行坐改為左僕射判汝州曽鞏南豐人神宗時知亳州黄庭堅分寕人知泰和縣以平易治時課頒鹽莢諸縣争占多數泰和獨否吏不悦而民安之吕公著壽州人通判潁州與郡守歐陽修為講學之友後為御史中丞王安石行青苗法公著極言其害忤安石出知潁州迨後公著次子希純亦知潁州推廣父政敎化大行何執中龍泉人為亳州判官值曽鞏為守欲振起諸事一見合意事無纎鉅悉委以剸決有妖獄久不竟執中往訊諸囚無不引伏葉康直建州人知亳州通濬積潦民獲田數十萬畝張洞祥符人調潁州推官州民劉甲主使弟柳毆婦死吏坐夫法洞以律分首從既非夫本意當坐主使遂出其夫朝議從之由是知名蘇頌同安人知潁州通判趙至忠本邊徴降者所至與守競頌待以禮具盡誠意至忠感泣曰平生誠服者惟公與韓魏公耳蘇軾眉山人元祐六年出知潁州㑹開封諸縣多水吏不究本末決其陂澤注惠民河河不能勝又將鑿鄧艾溝與潁河並欲鑿黄堆注之於淮軾始至遣吏以水平準之水高於新溝幾一丈若又鑿黃堆淮水必為潁患為奏罷之郡有宿賊尹遇等數劫殺人又殺捕盜吏兵軾召汝隂尉李直方曰君能擒此當力言於朝乞行優賞不獲亦以不職奏免君矣直方有母且老與母訣而後行乃緝知盜所分捕其黨獲之後崇寕中弟轍亦知潁州朱光庭偃師人哲宗時知亳州范祖述華陽人監潁州酒税攝獄掾閲獄活兩死囚州人以為神陸佃山隂人哲宗時知潁州佃以歐陽修守潁有遺愛為建祠宇曽悟南豐人靖康間為亳州士曹金人破亳州悟被執抗辭嫚罵衆刄劘之屍體無存者相州人靖康中以州校用劫殺金兵有功累授武義郎從劉錡守順昌復宿亳下城父永城臨渙靳縣朱家村金納哈塔謀嘉蒙古人興定三年為潁州防禦使有告宋人將襲潁州者已而果至納哈塔謀嘉有備乃引去有司上功不及告者納哈塔謀嘉請而賞之納哈塔謀嘉舊作納坦謀嘉今改正劉均林慮人正大時為亳州觀察判官天興初提控楊春納𣢾於元後脅均同降均佯應之歸其家取朝脤服之顧謂妻子曰我起身刀筆仰荷上知始列朝著又佐大藩死亦足矣今頭顱已如此假使有十年壽何以見先帝於地下乎即仰藥而死李用宜正大時為城父令天興初元兵石總管入亳州屬縣皆下惟用宜不降其妻子在亳降將楊春以為質竟不屈而死王進天興初為譙縣尉亳州軍變散所有濟貧民以死自勵後復其州授本州節度使元兵至奏留李喜珠治亳詔從之鎮防之亂與刑部尚書王賓先後遇害元張柔定興人憲宗時鎮亳州環亳皆水非舟楫不達柔甃城壁為橋梁屬汴隄以通商賈之利復建孔子廟設校官弟子員歸暘汴梁人至順元年授同知潁州事鉏奸擊強人不敢以年少易之山東監司遣奏差至潁恃勢為不法暘執以下獄時州縣奉監司甚謹暘獨不為曲葢苗元城人至正元年知亳州修學宫完州廨有豪強占民田為已業民五十餘人訴於苗苗訊治之豪民咸自引服苗曰爾等罪甚重然吾觀皆有改過意遂從輕議明李天祐洪武初為潁州同知時百事草創天祐隨宜經理招撫流亡民皆復業高昇阜城人天順中知霍邱縣縣舊無城昇督民築土垣以為捍衞霍邑有城自昇始盧試榮東陽人正統中知亳州修葺學宫創建義倉多貯米穀以備賑濟林一陽漳浦人嘉靖中知霍邱縣地阻山出鑛椎埋為奸一陽曉以務本保身之道人多從化乃修學校行鄉約立保甲積公廥政敎大行屠隆鄞縣人萬厯中知潁上縣時城東門患河決築長隄以衞之王世䕃萬厯中知霍邱縣築澧河堤障水捍田迄今賴之尹夢鼇雲南太和人崇禎中知潁州流賊至與諸生劉廷傳等募民守城衆潰投城下烏龍潭而死弟姪七人皆死之贈光禄少卿本朝乾隆四十一年賜諡忠節趙士寛掖縣人崇禎中為鳯陽通判駐潁州流賊至與尹夢鼇同守城陷率衆巷戰力竭赴水死妻崔氏攜二女登樓自焚僕王丹亦罵賊死一門忠節奉旨卹贈本朝乾隆四十一年賜諡節愍左相申崇禎中知霍邱縣十五年流寇再陷其城率衙兵巷戰死之本朝乾隆四十一年賜諡節愍張有俊崇禎間為霍邱縣丞賊至城陷與敎諭倪可大訓導何炳邑紳田既廷戴廷對舉人王毓貞並死之本朝乾隆四十一年張有俊與何炳田既廷戴廷對王毓貞俱入忠義祠賜倪可大諡烈愍何燮晉江人萬厯舉人崇禎中知亳州時屢遭寇患變盡心撫輯經營戰守山東河南土寇迭至與戰於盧家廟等集生擒其魁李忠等戮之又降李龍等數千人十五年李自成陷其城罵賊不屈死本朝乾隆四十一年賜諡烈愍入忠義祠楊春芳崇禎十五年知太和縣張獻忠陷城與典史陳知訓敎諭沈鴻起訓導婁懋履並死之本朝乾隆四十一年賜春芳諡節愍陳知訓沈鴻起婁懋履俱入忠義祠本朝呉國用春天人順治六年知霍邱縣興革恊宜山賊陳伯紹犯城㑹久兩城圯國用率兵巷戰斬賊七人力盡自刎事聞贈按察司僉事陳大倫定與人順治十四年知蒙城縣時田賦混淆流民未復爲裁定畫一之法均里甲除奸蠧舊有邪敎惑民大倫捕其魁置之法邑以大治喻三畏奉天人康熙五年知潁州清慎平恕革除耗羡重築湖堤灌溉桑麻人資其利遷建寕郡丞死耿逆之亂喪還過潁士民絡繹奔奠朱之連漢軍鑲白旗人康熙三十一年知亳州修學勸耕才政交著遷安慶同知後復委賑亳饑民遍沾實惠李月槎滿洲人雍正三年知潁州先是潁州試院在鳯陽諸生苦於跋涉月槎創建考棚人皆徳之江洵儀徴人乾隆四十二年任亳州明年水決儀封考城壤永清大橋兩岸廬舍漂没者數千家洵捐賑修堤令民遷高埠皆得其所人物漢郭憲宋國人王莽素奇之及莽篡位拜憲郎中賜以衣服憲受衣焚之而逃光武即位拜博士遷光禄勲時議伐匃奴憲廷諍不合乃伏地稱眩瞀不復言帝令兩郎扶下殿憲亦不拜帝曰嘗聞關東觥觥郭子橫實不虚也張酺汝南細陽人少事桓榮勤力不怠顯宗為四姓小侯開學於南宫酺以尚書敎授除為郎遂令入授皇太子酺為人質直守經義數多匡正肅宗即位累遷河南尹暴竇氏罪白夏陽侯瓌冤永平五年遷為大僕後代魯恭為司徒卒華佗譙人遊學徐土兼通數經徴辟皆不就曉養性之術精方藥後為曹操所殺三國魏曹仁譙人操從弟為將嚴整奉法令拜廣陽太守曹丕即位累遷大司馬卒諡曰忠夏侯惇譙人以烈氣聞文帝時為大將軍惇雖在軍旅親迎師受業性清儉有餘財輒以分施不足資於官不治產業卒諡曰忠夏侯淵惇族弟從曹操起兵屢著戰功操嘗稱淵虎步關右所向無前淵為將赴急疾常出敵之不意軍中語曰典軍校尉夏侯淵三日五百六日一千曹彰操子任城王少善射御膂力過人為北中郎將乘勝逐北所向皆破北方悉平卒諡曰威曹植彰弟陳王善屬文嘗自忿抱利噐而無所施太和二年上疏求自試五年復上疏求存問親戚帝輒優文答報卒諡曰思許禇譙人容貌雄毅勇力絶人歸曹操操壯之曰此吾樊噲也拜都尉引入宿衛從討韓遂馬超於潼關操與超等單馬會語超問曰公有虎侯者安在軍中以禇力如虎而癡故號曰虎癡性謹慎奉法質重少言封牟鄉侯卒諡曰壯曹真明帝初為大將軍遷大司馬真少與宗人曹遵鄉人朱讚並事曹操遵讚早亡真愍之乞分所食邑封遵讚子詔聽之真每征行與將士同勞苦軍賞不足輒以家財班賜士卒皆願為用卒諡曰元呉吕蒙富陂人為横野中郎將與周瑜西破曹操兵於烏林拜偏將軍又從權拒操於濡須數進奇計後定荆州以蒙為南郡太守封孱陵侯權嘗論蒙少時不辭劇易果敢有膽及身長大學問開益籌略奇至可以次於公瑾吕範細陽人避亂壽春孫䇿見而異之領宛陵令討破丹陽賊還呉遷都督權嘗㑹文武嘆曰魯子敬比鄧禹吕子衡方呉漢子衡範字也晉曹志植子少好學以才行稱晉武時爲博士祭酒齊王攸將之國下太常議崇錫文物志奏議以諫辭旨甚切免官後復爲散騎常侍夏侯湛譙人幼有盛才文章宏富善搆新詞太始中舉賢良對䇿中第拜郎中累年不調乃作抵疑以自廣尋爲散騎常侍著論三十餘篇别爲一家之言湛弟五人淳亦有詞藻與湛俱早知名官至弋陽太守曹攄譙人少有孝行好學善屬文𥙷臨淄今一縣號曰聖君及齊王冏輔政攄勸以居高思危冏不納惠帝末爲襄城太守與賊王道戰敗死之曹毗譙人少好文籍善屬詞賦郡察孝亷累遷下邳太守以名位不至作對儒以自釋宫至光禄勲卒所著有文筆十五卷傳於世隗炤汝隂人善於易含明隱跡南北朝齊夏侯恭叔譙人豫州刺史垣崇祖聞其才義辟爲州主簿永明初崇祖被誅恭叔出家財殯崇祖上表論柳元景劉勔不宜廢後為竟陵令惠化大行梁夏侯詳譙人年十六遭父艱哀毀三年廬於墓側嘗有三足雀集其廬户天監中遷湘州刺史在州四載為百姓所稱徴為尚書左僕射夏侯亶詳子寛厚有器量涉略文史能專對仕梁為六郡三州不營産業禄賜所得隨散親族性儉率居處服用取足而已弟夒以破魏功封保城縣侯大通六年為豫州刺史立堰溉田歲收穀百萬逺近多附之唐李興霍邱人父死廬墓墓上産紫白芝二本柳宗元為作孝門銘李敬元譙人該覽羣籍尤善於禮高宗在東宫馬周薦其材召入崇賢館兼預侍讀厯遷西臺侍郎咸亨中進吏部尚書居選部久人多嚮附所著禮論及他書數十百篇李紳敬元曾孫六歲而孤哀等成人母盧躬授之學於詩最有名時號短李穆宗召為翰林學士與李徳裕元微之同在禁署時稱三俊武宗即位進尚書右僕射門下侍郎封趙郡公卒贈太尉諡文肅五代晉張仁愿譙郡人存敬子有孝行存敬卒事其兄仁潁如事父之禮曉法令仕終大理卿周李穀汝隂人少任俠後發憤從學所覽如宿習廣徳初拜平章事世宗用穀䇿平淮南累封趙國公穀汲引寒士多至顯位李昉嘗爲穀記室穀視之曰子他日官禄當如我昉後果至宰相宋尹拙汝隂人晉天福四年與張昭等同修唐史周顯徳中又同詳定經典釋文乾徳六年以秘書監致仕性純謹博通經史當時服其該愽張綸汝隂人以右班殿直從雷有終討王均於蜀降寇數百據險叛使綸撃之綸曰此窮寇急之則生患不如諭以向背有終用其說賊果棄兵來降累遷乾州刺史徙知潁州卒綸有材畧所至興利除害性復寛恕喜施予高瓊家世燕人父乾家亳州之蒙城瓊少勇鷙太宗爲晉王時尹京邑知其材勇召置帳下及即位擢御龍直指揮使景徳中車駕北巡或勸南還瓊曰敵師己老陛下宜親往以督其成上悦即日進幸澶淵以殿前都指揮使兼領二司瓊曉達軍政善訓諸子子繼勲官至建雄軍節度性謙有機畧善撫馭士卒臨戰輒勝在蜀有威名繼宣㓜善騎射工筆札知讀書官至眉州防禦使張可象汝隂人七世同居真宗時凍餒對曰法制不立庶民食侯食服侯服此今大患也即拜右正言厯官御史臺還潁十年卒贈右諫議大夫牛富霍邱人勇而知義為侍衛馬軍司統制戍襄陽移守樊城屢戰不為􅗮時元兵圍襄陽築長圍以絶聲援富數以蠟丸遺書襄陽京西安撫使吕文煥相與固守為脣齒兩城凡六年不拔富力居多後元兵入城富率死士百人巷戰身被重傷赴火死贈寕逺軍節度使諡忠烈劉士昭太和人嘗為鍼工與鄉人同謀復太和縣敗血指書帛云生為宋民死為宗鬼赤心報國一死而已因以其帛自縊金王賓亳州人貞祐進士為人外若曠逺而深有謀畫天興元年遇楊春為變節度使鈕祜禄荆山力屈出走賓與前譙縣尉王進魏節亨吕鈞約城中軍氏復其州楊春遂遁事聞哀宗嘉之擢行部尚書鎮防軍亂拽賓及吕鈞往市中俱遇害鈕祜禄荆山舊作粘合荆山今改正元李黼潁州人以明經魁多士累官禮部侍郎至正中出為江州路總管丁普郎渡江黼出戰身先陷陣後城破不屈死事聞封隴西郡公諡文忠詔立廟江州張紹祖潁州人讀書力學以孝行聞於朝授河南路敎授至正十五年奉父避兵山間賊至執其父將殺之紹祖泣曰吾父耆徳善人不當害請殺我以代父死且曰若等獨非父母所生乎賊怒以戈撃之戈應手挫折因感而相謂曰此真孝子也乃釋之張旺舅霍邱人㓜失父母陳氏居貧守志旺舅九歲賣餳以養及長母病伏枕數月旺舅無資命醫惟日夜痛状禮天求代未幾遂愈又自以生業微不能多給竟不娶以終母年縣令言於朝旌之郭成亳州人年七十一母喪食粥廬墓朝夕哭臨人哀其老而能孝劉通譙人家貧力業農母卜氏好聲樂每遇技者以簫鼓至門必令娛侍或自歌舞以悦母心母目失明通誓斷酒肉禱之三十年不懈母年八十五忽復明曹彦可亳州人會妖寇起里中無賴子倡亂掲帛於竿羣趨彦可家劫之使寫旗彦可力辭乃迫以刀斧彦可唾之曰我儒者知有君父即死耳豈為汝寫旗耶賊怒遂見害明張泌潁州人洪武中由歲貢授兵科給事中永樂時為光禄寺卿勤於其職既殁吏部每除光禄寺官成祖必問得如張泌否王質太和人永樂舉人擢御史時松門有羣聚謀爲盜者奉命往察之還奏止罪渠魁餘悉宥之全活甚衆厯官山東布政勤慎清約所食惟菜羮糲飯累遷刑部尚書陳嶷蒙城人宣徳中舉賢良方正授刑部照磨屢決疑獄大學士楊士奇薦之擢御史巡按浙江風采嶽立蜀獠叛胡濚舉嶷往剿之嶷集將士授以方畧一戰而克陞陜西按察副使汪泉蒙城人父喪廬墓白鶴來棲天順中旌表薛蕙亳州人正徳進士授刑部主事諫武宗南巡受廷杖歴考功郎中嘉靖初廷臣數爭大禮蕙撰爲人後解爲人後辨及辨張璁桂蕚所論七事合數萬言上之下鎮撫司考訊已貰出之解任歸見璁蕚等用事遂不出以詩文名家晚節講學持已峻潔學者稱爲西原先生曽翀霍邱人嘉靖中由進士厯御史與同官戴銑劾南京尚書劉龍聶賢等吏部尚書汪鋐庇之因與言官互詆翀復抗疏攻鋐被廷杖死隆慶初贈太常少卿白精中潁州人幼孤家貧母袁氏自食糠覈以精者哺兒精中知之每飱先啖其惡者天啟丁卯舉於鄉崇禎中宼至以衛母遇害本朝乾隆四十一年入忠義祠劉廷傳潁州人性篤孝崇禎中流寇至與弟廷石倡義守城及陷兄弟俱罵賊死本朝乾隆四十一年入忠義祠李心唯潁州人崇禎中流寇至守母喪不去被殺子果亦罵賊死同時檀之槐䕶母柩不去與賊格鬬殺數人被磔死韓光祖潁州人爲諸生流賊薄城助有司拒守城破死之母李氏妻武氏次子定䇿孫日曦俱殉難本朝乾隆四十一年俱入忠義祠時同死難者鄉官田之潁劉道逺李生白丁嘉遇舉人郭三杰等一百三人婦死節者三十七人烈女八人潁州忠節爲獨盛云本朝乾隆四十一年賜田之潁劉道逺李生白諡節愍丁嘉遇郭三杰入忠義祠本朝劉體仁潁州人廷傳子順治乙未進士厯官吏刑二部郎中有詩名與宋犖汪琬王士正施閏章等唱和時號十才子告歸後日手一編不問户外事居家孝友婣睦恂恂可稱著有蒲庵集沈允達潁上人康熙元年盜入其室執父九徳拷掠允達越垣告急鄉里不應奮曰親如此安用生為赴鬭遇害李甲聲潁州人由拔貢授廣西天和知縣叛民殺官吏會兵往勦甲聲奉􅊾監軍以叛民因憤怨相誘惑頓兵緩其誅逆黨相繼解去甲聲乘間搗賊巢殱其魁亂遂定遷漳州同知隨征臺灣率敢死士冒險先登厯知廣州慶陽二府所至勸耕平訟甚有聲鹿祐阜陽人康熙壬戌進士授浙江西安知縣時民多逋賦定三年帶征之法民賴以舒尋轉内曹厯監察御史累官兵部左侍郎巡撫河南時豫省多水患祐借穀緩征民困盡甦以廉率屬吏治肅然引疾乞休民不忍捨自豫至潁送者不絶卒於家湯裔霍邱人精於岐黄充太醫官雍正七年從大將軍傅爾丹北征陣亡贈布政司經厯入忠義祠李長桂亳州人母朱氏早亡撫於繼母魏氏魏亡長桂廬墓三年墓側有仙禽穀秀之祥乾隆四年旌李成邦亳州人四川重慶鎮摽守備管遊擊事乾隆十二年征金川攻巴納山亡於陣贈參將䕃守備連際遇阜陽人以孝聞厯任貴溪知縣乾隆二十八年旌流寓北魏劉