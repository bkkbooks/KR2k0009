front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_043-1a}
body:
  text: 鳳陽府三人物漢召信臣九江夀春人以明經甲科為郎出𥙷穀陽長厯遷河南太守數增秩賜金竟寕中為少府奏請上林諸宫館稀幸御者勿復繕治供張又奏省樂府黃門倡優諸戲宫館兵弩什器減過大半及它非法食物悉奏罷省費每歳數千萬年老以官卒高相沛人治易其學亡章句專説陰陽災異自言出於丁將軍施讐沛人為童子時從田玉孫學易謙讓常稱學廢不敎授梁邱賀遣子臨分將門人張禹等從讐問讐自匿不肯見賀固請不得巳乃授臨等於是賀薦讐為博士甘露中與五經諸儒雜論同異於石渠閣聞人通漢沛人后倉說禮數萬言號曰后氏曲臺記授通漢以太子舎人論石渠至中山中尉慶普沛人受后氏禮為東平太傅又傳族子咸為豫章太守蔡千秋沛人受榖梁春秋於魯榮廣又事皓星公為學最篤宣帝時爲郎召見與公羊家並說上善穀梁說擢爲諫議大夫給事中後左遷復求能爲穀梁者莫及千秋上愍其學且絶乃以千秋爲郎中戸將選郎十人從受陳萬年沛郡相人爲郡吏察舉至縣令累遷大僕萬年廉平内行修以丞相丙吉薦代于定國爲御史大夫子咸以父任爲郎有異才抗直數言事刺譏近臣公卿以下皆敬憚之薛廣德沛郡相人以魯詩敎授楚國龔勝龔舎師事焉蕭望之薦廣德經行遷諫議大夫代貢禹爲長信少府御史大夫廣德爲人温雅有藴藉及爲三公直言諫諍翟牧沛人孟喜授牧易爲博士由是有翟孟之學張邯九江人受詩潁川滿昌至大官徒衆甚盛嚴望九江人與兄子元傳朱雲學皆爲博士望至太山太守戴崇沛人從張禹受易至少府九卿褚少孫沛人受詩王式應博士弟子選詣博士摳衣登堂頌禮甚嚴試誦說有法梅福九江夀春人明尚書榖梁春秋爲郡文學補南昌尉後去官成帝委任王鳳福上書不納又言宜封孔子後以奉湯祀元始中王莽專政福棄妻子去九江至今傳以為仙其後人有見福於會稽者變姓名為呉市門卒云陳咸沛國洨人成哀間以律令為尚書王莽簒位召咸為掌寇大夫謝病不肯應時三子參豐欽皆在位悉令解官歸鄉里閉門不出入猶用漢家祖臘曰我先人豈知王氏臘乎收斂其家律令書文皆壁藏之咸性仁恕常戒子孫曰議法當依於輕愼無與人重比建武初欽子躬為廷尉左監史岑沛國人以文章顯著出師頌等凡四篇桓譚沛國相人博學多通徧習五經數從劉歆楊雄辯析疑異董賢用事欲交譚不與通王莽時人多稱德求媚譚獨黙然世祖時以宋宏薦拜議郎給事中數陳時政帝欲以讖決疑譚極言讖之非經帝大怒將斬之良久得解出為六安郡丞道病卒著書二十九篇號曰新論又賦誄書奏二十六篇桓榮沛郡龍亢人少學長安習歐陽尚書貧窶無資常客傭以自給十五年不窺家園建武中年六十餘召令說尚書甚善之拜議郎入使授太子每朝會輒令榮於公卿前敷奏經書帝稱善曰得生幾晚拜榮為博士車駕幸太學會諸博士論難於前榮被服儒衣温恭有醖藉講明經義二十八年以榮為少傅尋拜太常永平二年二雍初成拜榮為五更封關内侯及卒帝變服臨哭賜冢塋於首山之陽趙孝沛國蘄人時歲饑人相食弟禮為饑賊所得孝聞之即自縛詣賊曰禮瘦不如孝肥賊並放之曰可且歸更持米糒來孝求不能得復往報賊願就烹衆異之遂不害永平中辟太尉府顯宗素聞其行拜諫議大夫厯遷長樂衞尉復徴弟禮為御史中丞禮亦行已恭讓類於孝帝寵異之詔禮十日一就衞尉府大官送共具令兄弟相對盡歡鮑駿九江人與丁鴻同事桓榮甚相友善及鴻讓爵出亡與駿遇於東海陽狂不識駿駿止而讓之鴻感悟乃還就國范遷沛國人永平中為司徒有宅數畞田不過一頃復推與兄子其妻嘗謂曰君有四子而無立錐之地可餘俸祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世在位四年薨家無擔石焉召馴信臣曾孫少習韓詩博通書傳以志義聞鄉里號之曰德行恂恂召伯春建初元年稍遷騎都尉侍講肅宗拜左中郎將入授諸王帝嘉其義學恩寵甚崇官至光祿勲徐防沛國銍人永平中舉孝廉為郎體貌矜嚴顯宗異之陽勤曉政事所在有迹和帝時拜司空防上疏以五經久遠宜為章句以悟後學詔從之延平元年遷太尉安帝即位以定策功封龍鄉侯陳寵躬子明習家業章帝初為尚書時政尚嚴切寵上疏諫帝深納之和帝時擢為大司農遷廷尉數議疑獄常親自為奏每附經典務從寛恕寵厯二郡三卿所在有迹見稱當時卒官司空夏勤九江壽春人從樊鯈學為京宛二縣令零陵太守安帝時位至司徒陳忠寵子永初中辟司徒府三遷廷尉正以才能擢尚書忠自以世典刑法用心務在寛詳奏上二十三條為決事比以省請讞之弊安帝親政數薦隱逸直道之士厯遷司隸校尉糾正中官外戚賓客近倖憚之出為江夏太守復拜尚書令卒施延沛國蘄人少為儒生明於五經兼綜星官風角家貧母老周流傭賃以養後舉有道高第拜侍中順帝時為太尉桓郁榮子敦厚篤學傳父業榮卒郁當襲爵讓於兄子汎顯宗不許不得已受封悉以租入與之稍遷侍中授太子經數進忠言多見納錄和帝時遷長樂少府復入侍講遷太常郁敎授二帝恩寵甚篇桓焉郁中子以父任為郎明經篤行永初二年入授安帝三遷為侍中步兵校尉永寕初順帝立為太子以焉為少傅遷太傅尋為太常太子廢為濟陰王焉極諫不能得順帝即位拜太傅復入授經禁中後厯官太尉弟子傳業者數百人黄瓊楊賜最為顯貴桓典焉孫復傳其家業以尚書敎授潁川舉高第拜侍御史時宦者秉權典執政無所囘避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史奉使督軍破滎陽賊靈帝崩與大將軍何進謀誅閹宦功雖不遂忠義炳著桓鸞焉弟子少立操行不肯仕太守向苗舉鸞孝廉遷膠東令始到官而苗卒鸞即去職奔喪終三年乃歸淮汝之間高其義復徵義郎上陳五事舉賢才審授用黜佞倖省苑囿息役賦書奏不省以病免桓嚴鸞子尤修志介一餐不受於人舉孝廉三公並辟皆不應初平中避地會稽尋客交阯越人咸化其節後卒於合浦桓麟焉兄子早有才慧桓帝初為議郎侍講禁中以直道牾左右出為許令母終麟不勝喪未祥而卒著述凡二十一篇桓彬麟子少與蔡邕齊名舉孝廉為郎時中常侍曹節女婿馮方亦為郎彬未嘗與共酒食方深怨之遂見廢所著七說及書凡三篇蔡邕等共論序其志樹碑而頌之三國魏劉馥沛國相人建安初為揚州刺史數年中恩化大行百姓樂其政流民越江山而歸者以萬數桓範沛國人建安末入丞相府正始中拜大司農以清省稱曹爽輔政以範鄉里老宿於九卿中特敬之範嘗鈔撮得書中諸雜事自以意斟酌之名曰世要論蔣濟楚國平阿人明帝時為中䕶軍時中書監號為專任濟上疏諫景初中外勤徴役内修宫室濟乂諫齊王即位遷太尉時丁謐鄧颺等輕改法度濟復因星變極言得失後以隨太傅司馬懿屯洛水浮橋誄曹爽等進封都鄉侯薨諡景侯劉靖馥子為大司農衞尉上疏陳儒訓之本謂宜高選博士取行為人表經任人師者掌敎國子使二千石以上子孫年從十五皆入大學明制絀陟榮辱之路則浮華交遊不禁自息矣遷鎮北將軍假節都督河北諸軍事諡景侯張茂沛人明帝時太子舎人青龍三年大治洛陽宫百姓失農茂上書極諫略曰舎堯舜之節儉為漢武之侈事臣竊為陛下不取黃朗沛郡人為人宏通有信實抗志遊學累官涿郡太守吳薛綜沛郡竹邑人為尚書僕射孫權欲征公孫淵綜上疏切諫赤烏三年徙選曹尚書五年為太子太傅六年卒凡所著詩賦難論數萬言名曰私載又定五宗圖述二京解皆傳於世魯肅臨淮東城人周瑜薦肅才宜佐時劉表死肅請說劉備撫衆共拒曹操孫權即遣肅行宣騰權㫖勸備與權併力曹操破走拜奮武校尉代周瑜領兵拜漢昌太守偏將軍轉横江將軍蔣欽壽春人孫策東渡拜别部司馬授兵與策平定三郡又從定豫章從征合肥皆力戰有功遷盪寇將軍領濡須督召還典領詞訟權嘗入其室内母疎帳縹被妻妾布裙權歎其在貴守約後督水軍入沔道卒周泰下蔡人與蔣欽隨孫策為左右數戰有功從討黃祖後與周瑜拒曹操於赤壁攻曹仁於南郡留督濡須拜平虜將軍孫權案行至濡須塢會諸將大為酣樂權自行酒到泰前命泰解衣權手自指其創痕問以所起泰輒記昔戰鬬處以對歡讌極夜授以御葢封陵陽侯薛瑩綜子初爲秘府中書郎厯選曹尚書光祿􅈴既至洛陽爲散騎常侍答問處當皆有條理著書八篇名曰新議樓承先沛郡蘄人孫皓時爲大司農主殿中事正身率衆奉法而行應對切直數忤皓意徙交阯自殺晉武陔字元夏竹邑人沈敏有識早獲時譽與二弟韶茂並總角知名同郡劉公榮有知人之鑒見陔兄弟曰皆國士也元夏最優有輔佐之才泰始初拜尚書掌吏部遷左僕射深懷遜讓終始全潔武韶山濤啟事稱韶清白有識終散騎常侍武茂爲侍中尚書潁川荀愷恃貴戚欲與茂交拒而不答由是致怨及楊駿誅愷陷爲逆黨遂見害茂清正方直聞於朝野一旦在酷天下傷焉嵇康譙國銍人有奇才遠邁不羣學不師授博覽無不概通長好老莊拜中散大夫山濤將去選官舉康自代康乃與濤書告絶後爲鍾會陷死海内之士莫不痛之劉伶沛國人澹黙少言不妄交遊嘗乘鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我雖陶兀昏放而機應不差嵇紹康子十歲而孤事母孝謹惠帝時拜侍中河間成都二王舉兵帝北征王師敗績於蕩隂百官及侍衞莫不散潰惟紹儼然端冕以身捍衞兵交御輦飛箭雨集紹遂被害於帝側血濺御衣及事定左右欲浣衣帝曰此嵇侍中血弗去累贈太尉諡忠穆嵇含紹從子好學能屬文家於鞏縣亳邱自號亳邱子累官襄城太守性通敏好薦達才賢爲郭勱所害胡威壽春人父質官征東將軍備禦有方及卒家無餘財諡曰貞威早勵志尚累遷徐州刺史後入朝武帝謂威曰卿孰與父清對曰臣不如也臣父清恐人知臣清恐人不知爲尚書嘗諫時政之寛帝曰尚書郎以下吾無所假借威曰臣之所諫豈在丞郎令史正謂如臣等始可以肅化明法耳封平春侯卒劉宏字終嘏相人光祿勲兄粹字純嘏弟潢字冲嘏並顯貴知名時語曰洛中雅雅有三嘏劉和季靖子太安中爲荆州刺史百姓愛悅進拜侍中鎮南大將軍威行南服前廣漢太守辛冉說以從横之事和季怒斬之永興三年進號車騎將軍開府和季每有興廢手書守相剴切款密人皆感悅咸曰得劉公一紙書賢於十部從事卒贈新城郡公諡曰元劉璠靖孫司馬郭勱欲推成都王頴為主璠率府兵討勱斬之詔璠為順陽内史江漢之間翕然歸心徵為越騎校尉桓彞龍亢人漢五更榮九世孫少孤貧雖簞瓢處之晏如起家州主簿累遷尚書郎時王敦擅權彝以疾去職明帝拜彝散騎常侍引參密謀敦平封爵男用温嶠薦補宣城内史蘇峻之亂死之賊平贈廷尉諡曰簡有五子温雲豁秘冲雲襲爵厯位建武將軍義成太守遭母憂去職葬畢起為江州刺史稱疾廬於墓次詔書敦逼固辭不行服闋然後莅職劉惔宏孫少清遠有標奇王導深器之累遷丹陽尹惔每奇桓温才而知其有不臣之迹及温為荆州惔言於帝曰温不可使居形勝地其位號常宜抑之帝不納嘗薦呉郡張憑憑卒為美士衆服其知人桓沖代温居任盡忠王室卒贈太尉諡宣穆桓伊譙國銍人有武幹標悟簡率為王濛劉惔所知頻參諸府軍事以功封永修縣侯伊性謙素雖有大功而始終不替善音樂盡一時之妙卒諡曰烈戴逵譙國人少博學善屬文能鼓琴太宰武陵王晞召之逵對使者破琴曰戴安道不為王門伶人後徙居會稽之剡縣性高潔以禮度自處武帝時累徵不巳遂逃於吳按逵字安道南北朝宋戴仲若逵子與兄勃並隱遁有高名桐廬多名山兄弟共遊之因留居止及出居吳下吳下士人共為築室衡陽王義季亟從之遊仲若服野服不改常度文帝每欲見之嘗謂張敷曰吾東巡之日當宴戴公山下也以其好音長給正聲伎一部齊劉瓛惔六世孫足弟二人共處蓬室怡然自樂習業不廢丹陽尹袁粲薦為秘書郎不見用後以母老闕養拜彭城郡丞瓛儒業冠於當時都下士子推為大儒以比古之曹鄭有至性祖母病疽經年手持膏藥漬指為爛母孔氏曰阿稱便是今世曾子稱瓛小名也居母憂住墓下不出廬足為之屈杖不能起卒梁天鑒初詔諡貞簡先生劉璡瓛弟建元初出為武陵王參軍與友孔徹同舟入東徹留目觀岸上女子璡舉席自隔不復同坐兄瓛夜呼璡不答方下床著衣立然後應瓛怪其久璡曰東帶未竟其立操如此梁劉顯瓛族子六歲時號曰神童瓛無嗣齊武帝詔顯為後天監初尚書令沈約領太子少傅於座䇿經史十事顯對其九顯問約五事約僅對其二後為中書郎與裴子野劉之遴顧協連職禁中遞相師友遷尚書左丞後佐兩府並事驕主咸見禮重顧思遠鍾離人年一百一十二歲家乏闕養行役部伍中北徐州刺史蕭映見而異之召賜食食兼於人載還都謁見天子與之言往事多異所傳擢為散騎侍郎賜以奉宅朝夕進見年一百二十卒隋劉臻顯子年十八舉秀才周冢宰宇文護辟為中外府記室軍書羽檄多成其手高祖受禪進位儀同三司高熲伐陳以臻隨軍典文翰進爵為伯臻精於兩漢書時人稱為漢聖有集十卷郎方貴淮南人少有志尚與從弟雙貴同居方貴出行遇雨於津所寄渡船人撾方貴臂折雙貴遂毆船人致死縣官按問以方貴為首雙貴從坐兄弟二人爭為首坐縣不能斷送州州以狀聞高祖原之表其門閭唐夏侯端壽春人仕隋為大理司直高祖微時與相友義師興擢秘書監李密降關東地未有所屬乃拜端大將軍河南道招慰使會亳汴巳降王世充道塞無所歸麾下二千人糧盡不忍委端去餓死凡十三四行五日遇賊存者纔三十餘人遂東走擷䝁豆以食持節卧起世充遣人以淮南郡公印召端端曰吾天子使豈污賊官邪因間道走宜陽入謁帝憫之復拜秘書監周憬壽春人神龍中與王同皎謀誅武三思未發宋曇白其事中宗怒斬同皎憬逃遯比干廟自刎將死謂人曰比干古忠臣神而聰明其知我乎武三思虐害忠良滅亡不久可竿我頭國門見其敗也裴懷古壽春人儀鳳中頻遷監察御史詔為姚巂道懷輯使申明誅賞叛者日歸遂定南方蠻人立石著功監閻知微使突厥黙啜欲官之懷古不肯拜囚軍中亡歸遷祠部員外郎厯桂并幽等州都督懷古清介審慎馭士信臨財廉為國名將李興安豐人有至行父被惡疾興自刄股肉假托饋獻父病死興號呼撫臆口鼻垂血捧土就墳沾漬涕洟墳左作小廬蒙以苫茨伏匿其中晝夜哭廬上産瑞芝廬中醴泉涌柳宗元為作孝門銘五代南唐劉奐壽春人有學識性方言直動作忤物嚴續薦之後主爲監察御史起居舎人宋吕夷簡先世萊州人後家壽州進士及第仁宗初拜參知政事莊懿太后爲宸妃薨夷簡請發哀成服備儀仗葬之莊獻明肅太后崩帝始親政夷簡手疏陳八事累封許國公以太尉致仕薨諡文靖夷簡當國柄最久雖素爲言者所詆帝眷倚不衰其於天下事屈伸舒卷動有操術後配食仁宗廟子公綽公弼公著公孺公綽以䕃𥙷官天聖中遷侍讀學士時久不雨公綽言獄久不決即有冤者故多旱帝親慮囚巳而大雨遷右司郎中卒公孺賜進士出身仁宗時判吏部南曹召對詳敏知澤潁廬常四州終戸部尚書以清節著吕公弼賜進士出身仁宗時權開封府嘗奏事退帝目送之謂宰相曰公弼甚似其父英宗初拜樞密副使陳升之議衞兵年四十以上稍不中程者減其廪徙之淮南公弼曰既使去本土又削其廩儻二十萬衆皆反側爲之奈何韓絳議復肉刑公弼力陳不可帝皆爲之止王安石立新法公㢶數言宜務安靜忤安石遂罷爲觀文殿學士知太原府儀判秦州薨諡惠穆吕公著幼嗜學登進士累官御史中丞王安石行青苗法公著極言非便安石怒其深切出知潁州元祐初拜中書侍郎與司馬光同心輔政光薨獨當國宋興以來宰相以三公平章重事者四人而公著與父居其二薨贈太師申國公諡正獻御書碑首曰純誠厚德公著自少以治心養性為本平居無疾言遽色於聲利紛華泊然無所好簡重清靜蓋天禀然好德樂善見士大夫以人物為意者必問其所知與其所聞參伍考實以達於上每議政事博取衆善以為善至所當守則毅然不為奪子希哲希純苗時中其先自壺關徙宿州以䕃主安陵簿邑有古河久湮請開導以溉田為利甚溥人謂之苗公河調潞州司法參軍郡守欲入一囚於死執不可守怒時中曰願歸田里法不可奪守悟而聽之神宗時擢廣西運副時韓存寶討蠻中時中以糧道阻遠創為摺運法食以不乏吕希哲少從孫復胡瑗學後從程顥程頤張載遊以䕃入官為崇政殿說書會紹聖黨論起出知懷州徽宗初以直秘閣知曹州旋遭黨禍奪職羈寓淮泗間十餘年卒希哲樂易簡儉有至性晚年名益重遠近皆師尊之弟希純登進士第哲宗時厯中書舎人會除内侍梁從政劉惟簡内省押班希純疏言親政之始恐無以示天下持不行吕好問布哲子靖康中擢御史中丞章前後數十上首疏蔡京過惡乞投海外削王安石王爵湔元符上書獲罪者金兵陷真定攻中山廷臣猶以和議為辭好問率臺屬劾大臣畏懦誤國及金人立張邦昌好問勸邦昌轉禍為福金人既退遂奉傳國寶詣元帥府勸進高宗勞之曰宗廟獲全卿之力也以恩封東萊郡侯吕本中好問子幼而敏悟從楊時游酢尹焞游紹興中賜進士出身權中書舎人秦檜既相私有引用本中封還除目檜勉其書行不從檜風御史蕭振劾罷奉祠卒諡文清學者稱為東萊先生著春秋解十一卷童蒙訓三卷師友淵源錄五卷行於世李植臨淮人幼明敏篤學舉於鄉靖康初向子諲轉運京畿時羣盜四起餉道阨絶乃以植借補迪功郎使督四百艘植招募忠勇二萬餘衆自淮入徐趨濟時高宗駐師鉅野聞東南一布衣統衆而至士氣十倍首加勞問植占對詳敏高宗大悅授承直郎厯除尚書戸部員外郎時秦檜當國植即丐祠奉親寓居長沙之醴陵十有九年杜門不仕檜死召入見除知桂陽軍丁母憂歸葬哀毁廬墓有白鷺朱草之祥乾道中上防江十策以中奉大夫寶文閣學士致仕卒諡忠襄魏𣏌壽春人登進士孝宗時為金通奉使條上十七事上隨事畫可至燕館伴張恭愈以國書稱大宋脅去大字𣏌拒之卒正敵國禮損歲幣五萬比還以使不辱命遷起居舎人給事中後至相位卒諡文節王希吕宿州人登進士孝宗時除右正言時張說以攀援戚屬擢用再除簽書樞密院事希吕上章劾之直聲聞於遠邇淳熙中累官吏部尚書天性剛勁遇利害無所迴護性廉潔去官至無屋可居寓居僧寺上聞之賜錢造第董槐定遠人登進士淳祐中為給事中羣臣奏事少與法違憚槐不敢上寶祐初參知政事言事無隱意在格君心之非不為容悅三年拜右丞相兼樞密使極言丁大全邪佞不可近遂䇿免景定二年累封許國公三年致仕卒諡文清姜才濠州人隸淮南兵中以善戰名為通州副都統元兵攻揚州才為三曡陣迎之三里溝有功又戰揚子橋流矢貫才肩才拔矢揮刀而前所向辟易元軍築長圍困之德祐二年宋亡烏珠使人招之才曰吾願死豈作降將軍邪後以疽發背不能戰都統曹安國入才卧内執之以獻不屈死烏珠改見廬州古蹟門槖臯故城註鞏信安豐軍人沈勇有謀文天祥開督府信同督府都統制江西招討使天祥自興國趨永豐元兵追其後信戰於方石嶺中數矢傷重不能戰自投崖石死贈清遠軍承宣使立廟旌之元孟祺宿州符離人當巴延伐宋授祺為行省諮議諸將爭趨臨安祺曰若以兵相迫宋必竄閩莫若以計安之令彼不懼巴延從其言祺自請為使徴降表至宋取宋國璽十二枚出巴延奏祺前後有功累官至浙東按察使巴延舊作伯顔今改正明郭子興其先曹州人父郭公以日者術遊定遠言禍福輒中生子興元末子興與其黨孫德崖等起兵據濠州自稱元帥掠有旁邑太祖初隸其麾下子興厚遇之因此得成大業及太祖即帝位而子興已久没追尊為滁陽王詔有司建祠花雲懷遠人貌偉而黒驍勇絶人仗劍謁太祖於臨濠太祖奇其才俾將兵略地所至輒克明年率所部先渡江命為行樞密院判加安遠大將軍守太平陳友諒來寇雲率麾下三十餘人結陣迎戰三日賊不得入城陷罵賊不屈死追封東邱郡侯立忠臣祠祀之李善長定遠人少有智計策事多中太祖略地滁陽善長迎謁與語悅之留幕下掌書記尋遷為參謀預機畫甚見親信軍機進退賞罰章程十九決於善長太祖為呉王拜右相國即帝位拜左丞相封韓國公加太師為開國文臣之冠徐達濠人年二十二從太祖渡江拔采石搗太平與常遇春皆為軍鋒冠從下集慶為大將太祖攻婺州達留守應天與常遇春設伏敗陳友諒軍於九華山生擒三千人遇春將盡殺之達不可太祖始命達盡護諸將後以達為左丞相拜大將軍伐吳破蘇州執張士誠封信國公尋與遇春北伐齊地悉定太祖即帝位以達為右丞相下河南遂克元都還師下山西陜西復將兵破庫庫特穆爾振旅還京師封魏國公帝嘗以舊邸賜達達固辭乃命有司即舊邸前治甲第表其坊曰大功卒贈中山王諡武安配享太廟列祀功臣廟位皆第一庫庫特穆爾舊作擴郭帖木兒今改正常遇春懷遠人貌奇偉勇力絶人猿臂善射從太祖渡江才武冠諸將取江南拔江西克湖廣平浙江功最多厯官中書平章軍國重事封鄂國公後副徐達定山東河南遂入元都連下河北山西陜西天下大定還軍北平出討餘寇戰無不捷進拔開平順帝北走師還暴卒追封開平王諡忠武配享太廟肖像功臣祠位皆第二湯和濠人從太祖克滁州擊陳埜先流矢中左股拔矢復鬬同徐達取鎮江進統兵元帥張士誠再寇再擊卻之討平江西諸山寨拜征南將軍討方國珍國珍乞降浙東悉定遂承詔航海伐陳友定獻俘京師拜偏將軍再以征西功封信國公後乞骸骨年七十卒贈東甌王諡襄武配享太廟列祀功臣廟位皆第五沐英定遠人初為太祖養子積功至大都督府同知以破番寇功封西平侯尋從傅友德取雲南戰功最著詔留英鎮滇中先後討平諸蠻洪武二十二年入朝賜宴奉天殿錫賚有加英先後鎮雲南十年墾田至百餘萬畞疎節濶目民以便安卒贈黔安王諡昭靖配享太廟肖像功臣祠位皆第六子春襲爵鎮雲南修舉屯政威惠甚著馮國用定遠人太祖略地至妙山國用偕弟勝來歸曰金陵帝王之都先拔之以為根本然後四出倡仁義以收人心勿貪子女玉帛天下可定也太祖大悅日見親信俾居幕府典親兵曼濟哈雅扼采石國用與諸將攻破哈雅水寨又破擒陳兆先累擢親軍都指揮使卒於軍贈郢國公列祀功臣廟曼濟哈雅改見廬州山川門馬腸河註馮勝國用弟雄勇多智略歸太祖積功為元帥國用殁襲兄職典親軍從破陳友諒張士誠皆有功累遷右都督從取山東下河南克陜西封宋國公尋拜大將軍征降納克楚二十萬衆於金山其驍勇與傅友德相埒納克楚改見廬州人物門濮英註吳良定遠人與弟禎從太祖起濠梁並為帳前先鋒江南既定良以指揮使守江隂與張士誠相拒十年數破其兵累官大都督府僉事封江陰侯後征廣西蠻寇復有功卒贈江國公諡襄烈呉禎良弟助良守江陰撫蘇州累功為親軍指揮使數破張士誠兵又副湯和討方國珍大敗之由大都督府僉事封靖海侯後累禦倭海上俱有功卒贈海國公諡襄毅與良並列祀功臣廟郭興一名子興濠人滁陽王郭子興據濠稱元帥興隸麾下太祖在甥館興歸心焉軍行常備宿衞累功進統軍元帥攻常州寕國江陰宜興婺州安慶衢州皆下之從徐達取張士誠轉戰皆捷洪武元年從達取中原克汴梁守禦河南尋移鎮鞏昌邊境帖然卒贈陜國公諡宣武郭英興弟事太祖見親信令值宿帳中呼為郭四大小百餘戰重傷遍體未嘗以疾辭積功封武定侯永樂初卒諡威襄明初功臣封侯者皆不得襲獨英至明亡乃絶耿炳文濠人與其父君用從太祖渡江積功至大都督府僉事從征中原屢著功從征陜西走李思齊張思道即鎮其地浚涇陽洪渠民賴其利洪武三年封長興侯後從徐達出塞從傅友德征雲南從藍玉北征並有功建文初燕兵起命炳文為大將軍北伐軍敗燕王稱帝之明年言者劾㶧文僭妄不道懼自殺華雲龍定遠人從太祖渡江積功為豹韜衞指揮陳友諒兵犯龍江雲龍守石灰山接戰擣其中堅大敗之從征山東進克元都擢大都督府僉事封淮安侯張龍濠人從太祖渡江有戰功後以偏將軍從平山東河南陜西僉大都督府事洪武十一年副李文忠征西番洮州論功封鳳翔侯復以平雲南功命世襲胡海定遠人從太祖渡江累著戰功金瘡遍體後從傅友德征雲南論功封東川侯張赫濠人元末聞太祖起率衆來附累功都督府僉事後以習知海道數命督海運餉遼東卒贈恩國公諡莊簡周德興濠人從太祖渡江屢戰有功封江夏侯副湯和伐蜀蜀平復副鄧愈為征南左將軍平婪鳳安田諸州蠻署中立府行大都督府事後征五溪蠻功益著勲臣存者德興年最高歲時入朝錫賚不絶曹震濠人從太祖起兵隨沐英征西番論功封景川侯從藍玉平雲南尋復理四川軍務諸所規畫並極周詳蜀人德之顧時濠人倜儻好奇略從太祖渡江諸攻伐皆從破張士誠定山東河南取元都轉戰山西陜西並有功累官大都督同知封濟寕侯卒贈滕國公諡襄靖祔祭功臣廟王弼其先定遠人後徙臨淮弼有膽略善用雙刀從下江南滅漢平吳定中原並有功厯都督府僉事以平番功封定遠侯再以克雲南功予世襲趙德勝濠人初為元將太祖興於滁德勝母在軍中乃棄其妻來從克和州拔采石定太平集慶進下鎮江寕國廣德取池州從平江州及臨江吉安撫州累官行樞密院僉事守南昌陳友諒舉兵圍之德勝率諸將死戰弩中腰膂死追封梁國公諡武桓配享太廟列祀功臣廟丁德興定遠人歸太祖於濠克滁和二州破曼濟哈雅擒陳兆先取集慶鎮江常州寕國廣德徽州池州並有功授鳳翔衞指揮使敗陳友諒於龍江破吕珍於安豐戰鄱陽平武昌定湖南收淮東亦有功後討張士誠卒於軍追封濟國公列祀功臣廟世襲龍江衞指揮使曼濟哈雅改元前茅成定遠人從太祖渡江拔太平克衢州取安慶戰鄱陽下武昌並有功為武德衞指揮使攻張士誠中又死贈東海郡公列祀功臣廟孫興祖濠人從太祖渡江積功遷天策衞指揮使沈毅有謀徐達推重之克泰州守海陵進攻通州進大都督府副使移鎮彭城從克元都置燕山六衞留兵二萬人命興祖守之洪武三年率六衞卒從徐達出塞遇敵力戰死追封燕山侯諡忠愍列祀功臣廟子恪嗣官曹良臣安豐人歸太祖從破陳友諒張士誠皆有功為江淮行省參政還守通州時大兵出山西通州守備單弱元丞相伊蘇將萬騎營白河良臣以計破之伊蘇遯去元兵自是不敢窺北平洪武三年封宣安侯後北征沙漠戰殁於鄂爾琨河贈安國公諡忠壯列祀功臣廟伊蘇改見廬州人物門趙庸註鄂爾琨舊作阿魯渾今改正嚴德濠人從太祖起兵積功為海寕衞指揮從朱亮祖討方國珍克天台進攻台州方國瑛來拒德力戰死追封天水郡公陳德濠人有勇力太祖起兵首隸麾下滅漢平呉並有功累官大都督府事從下河南取山東陜西封臨江侯卒贈杞國公諡定襄王志臨淮人元末率鄉兵歸太祖於滁陽從戰屢騰柵先登身冒矢石洪武三年進同知都督府事封六安侯十九年卒追封許國公諡襄簡甯正壽州人從太祖渡江積功授和州衞指揮使勤於勞徠修築漢唐舊渠開屯數萬頃再從沐英北征取全寕四部遷四川都指揮使討平松茂數州從征雲南大破思倫發兵又大破越州阿資兵官終左都督王濂定遠人歸太祖於金陵用為執法官決獄平允厯浙江僉事災異求言具陳民瘼太祖為之緩征及卒太祖語李善長曰濂有王佐才今死朕失一臂矣單安仁濠人為元樞密判官歸太祖命為元帥守鎮江厯浙江按察使民誣告者置之法告訐之風為息進工部尚書精敏多智計諸所營繕小大悉中程官終兵部尚書帝念其賢勞歳給半俸李夢庚濠人從太祖渡江掌軍機文字以督撫參軍代謝再興守諸全再興叛執夢庚降吳不屈死祔祭功臣廟徐輝祖達長子有才氣嗣父爵領中軍都督府建文初率師拔山東大破燕兵於齊眉山俄有詔召還諸將勢孤遂相次敗績燕王至金川門獨守父祠弗迎勒歸私第幽縶之永樂五年卒萬厯中錄建文忠臣廟祀南都以輝祖居首後追贈太師諡忠貞輝祖死踰月成祖命其子欽嗣爵傳子顯宗承宗承宗天順初守備南京公廉恤士有賢聲宋晟定遠人從太祖渡江積功至都督僉事太祖晚年宿將殆盡晟數有戰功建文中出鎮甘肅成祖即位入朝擢左都督還鎮尋以招降功封西安侯晟凡四鎮涼州前後二十餘年威信著絶域病卒三子長瑄建文中以指揮使禦燕師戰殁於靈壁本朝乾隆四十一年賜諡烈愍次琥瑾並尚公主郁新臨淮人洪武中以人才徵授戸部主事累遷户部侍郎每奏事殿廷顧問天下户口田賦地里險易民間利病無鉅細皆應答無遺帝稱其才尋進尚書長於綜理密而不繁其所規畫後不能易然謙退自抑未嘗以心計自多人尤以爲難卒賜祭葬李彬定遠人初爲濟川衞指揮永樂中從平交趾厯鎮甘肅陜西最後出鎮交趾數討叛寇有功卒贈茂國公諡剛毅費瓛定遠人祖愚洪武時燕山中護衞指揮使傳肅至瓛永樂中討平涼州叛寇命鎮守其地宣德中由左都督封崇信伯從討高煦還出鎮甘肅尋卒瓛爲人和易善撫士在鎮十五年境内安謐伍雲定遠人以指揮同知從征交趾破坡曡隘留多邦城拔東西二城皆有功仁宗初隨方政攻黎利陷陣死之皇甫斌壽州人先為興州右屯衞指揮同知調遼海衞忠勇有智略遇警輒身先士卒宣德五年勒兵禦寇至密城東峪自旦至晡力戰矢盡援絶子弼以身衞父俱戰死事聞詔裦卹朱勇能子厯掌都督府事以從征沙漠功加太保正統中從駕至土木額森驟至勇迎戰中伏死贈平陰王諡武愍額森舊作也先今改正郭登武定侯英孫七歲能詩正統中從征麓川有功厯大同參將車駕北征登言敵騎巳迫宜亟入紫荆關王振不從帝北狩登悉力守禦額森擁帝至城下閉門不納景帝監國進總兵官屢破敵初賊欲取大同為巢穴數來攻為登所挫遂議和登料敵制勝動合機宜紀律嚴明武臣無及者卒贈侯諡忠武湯引勣東甌王和曾孫景泰初詔求賢才巡撫周忱以引勣應于謙見而異之稍遷至指揮僉事後分守孤山堡與賊戰死方引勣官京師與劉蒲王淮等唱酬號十才子李忠鳳陽人母殁跣足營墓廬其旁不離苫塊景泰中旌表年富懷遠人本姓嚴宣德時由德平訓導擢吏科給事中糾正違失務存大體厯陜西參政河南布政使景泰中以右副都御史巡撫大同提督軍務威名重天下天順四年拜户部尚書酌贏縮謹出納躬親會計吏不能欺事關利害僚屬不敢任者富獨當之部事大理廉正強直始終不渝憲宗時卒諡恭定高越鳳陽人成化舉人授山東福山敎諭時流賊猖獗知縣棄城走越首倡忠義嬰城死守賊退越拜監察御史清軍湖廣革親藩之僭巡按遼左明功罪嚴軍實積弛一振出知泉州府致仕歸趙輔鳳陽人襲職指揮使有文武才成化初以都督同知征大藤峽蠻賊有大功封武靖伯世襲卒贈容國公諡恭肅周緒鳳陽諸生母喪廬墓二鳩巢樹異草叢生成化中旌表湯鼐夀州人成化進士厯御史孝宗嗣位首劾大學士萬安罔上誤國已而安斥鼐亦出畿輔印馬馳疏劾内閣尹直等奸邪無恥而薦致仕尚書王恕王竑等帝報聞宏治中劾禮部尚書周洪謨等因言少傳劉吉與萬安尹直等奸邪又以尚書王恕盛暑請輟經筵鼐上疏極言不可無何劉吉因事中之戍肅州許士俊懷遠人年十七隨父渡淮父墮水士俊哀號急入水救之父子俱死踰三日抱父屍而出王澄鳳陽衞人母喪廬墓芝産其旁宏治中旌表余翺定遠人正德進士嘉靖初為御史劾司禮太監張佐蒙蔽罪尋以議大禮繫詔獄廷杖戍邊隆慶初贈光祿寺少卿劉繼文靈壁人嘉靖進士授萬安知縣清苦愛民累擢給事中出為浙江參政有妖僧惑衆立除其奸考滿與海瑞並稱書天下清官第二方震孺壽州人萬厯進士沙縣知縣卓異授御史巡視南城中官劉朝等被訟魏忠賢為請震孺不從遼陽破震孺一日十三疏陳兵事慷慨請犒師軍民感悅命為監軍巡按覈軍實稽功罪練士馬日無暇晷王化貞棄廣寕走列城聞之悉遯獨前屯以震孺在得無動御史郭興治誣劾其按遼時贓私魏忠賢素怨震孺誣以咒詛應坐大辟崇禎初釋還流賊犯壽州震孺倡士民固守城獲全史可法上其功用為嶺西參議後擢右僉都御史巡撫廣西聞闖賊陷京師慟哭率師勤王馬士英憚之勒還鎮以憂憤卒本朝張明棐宿州人順治初賊五十騎入其鄉家人俱登樓母劉年七旬不及避為賊所劫明棐急下救母賊執之支解以死十七年旌沈時鳳陽人隨征入粤授永安知縣為人耿介方正剔蠧釐奸吏民懾服順治中賊攻城親冒矢石築子城固守閱三月援兵至圍解擢知潮州府厯糧儲驛道所至民懐其德李之實壽州人以歲貢任睢寕縣訓導順治十年膠州兵海時行作亂犯睢城之實率邑人固守賊火其西門城陷後為賊所殺贈國子監學錄汪吉鳳陽人湖廣都司僉書賊黨一隻虎攻遠安總兵鄭四維遣吉往剿殲賊於唐旗坪遇伏起突圍不得出馬傷步戰力竭死賜雲騎尉世職張壽芳鳯陽人性至孝乾隆十一年旌李子奇鳳臺人性至孝乾隆年間旌曹培靈壁諸生執親喪躬自壘土為臺寢處其中朝夕哭泣未及歸而卒人稱孝子臺同縣孝子傳大業乾隆二年旌李佺懷遠人康熙舉人性孝友初任長清縣知縣賞罰嚴明訟簡刑清繼知饒陽縣事縣北滹沱河每逢霖雨泛溢為災佺諭民挑濬積水之區咸成膏壞士民勒石頌功乾隆十三年奏准入祀鄉賢方積定遠人乾隆己酉拔貢生授四川州判嘉慶初川省敎匪滋事積時為縣令素得民心與同知劉清齊名屢次剿賊有功厯升至四川布政使以疾卒官入祀鄉賢王福定遠人嘉慶七年宿州敎匪滋事福投營以功官把總追賊中槍死事聞詔襲雲騎尉世職秦攀元宿州庠生嘉慶七年敎匪據州城攀元率鄉勇杜如山營兵趙永浚等入戰被戕詔贈雲騎尉世職與永浚如山同祀昭忠祠同時遇害者鄉勇張大萬等二十九人營兵熊山符七人兵丁五人鄉氏七十七人俱入祠賈沛壽州人官王莊把總嘉慶七年宿州敎匪亂鳳廬道珠隆阿率師勦捕沛為前鋒戰死把總胡玉外委張永清同時遇害並賜祀昭忠祠流寓晉杜夷廬江灊人懷帝時刺史王敦舉為方正逼夷赴洛夷遯於壽陽鎮東將軍周馥傾心禮接自詣夷為起屋宇馥敗夷歸舊居唐王質少孤客壽春力耕以養母講學不倦諸生從授學者甚衆宋陳禾鄞縣人兄乗為壽春府敎授禾依之以居適童貫領兵道府下謁不得入餽之不受貫怒歸而譖之上曰此人素如此汝不能容邪郭延澤彭城人咸平中致仕居濠州城南有小園以自娛其咏牡丹千餘首聚圖籍萬餘卷手自刊校范果韓丕皆與之遊列女漢周郁妻沛郡人同郡趙孝女習儀訓嫻於婦道而郁驕淫無禮郁父偉謂曰新婦賢者女當以道匡其夫不改新婦之過也婦拜受命退謂左右曰我言不用君必謂我不奉敎令則罪在我言而用是為子違父而從婦則罪在彼生如此亦何聊哉遂自殺劉長卿妻同郡桓鸞女生男五歲而長卿卒防遠嫌疑不肯言歸兒又夭殁乃刑耳自誓宗婦愍之對曰昔我先君五更學為儒宗尊為帝師厯代以來男以忠孝顯女以貞順稱是以豫自刑翦以明我情沛相王吉上奏高行顯其門閭號曰行義桓嫠縣邑有祀必膰焉晉劉惔母惔少清遠有標奇與母任氏寓居京口家貧織芒屨以為養蓽門陋巷晏如也人未知識惟王導深器之後稍知名論者比之袁羊惔喜還告其母其母曰此非汝比勿受之又有比之范汪者惔復喜母又不聽及惔年德轉升論者遂比之荀粲唐宋延夀妻王氏延壽事楊行密為壽州刺史惡行密不臣謀歸唐行密覺而召之將行氏請曰一介為驗及為行密所殺介不至氏曰事敗矣即部家僕授兵器方闔扉而捕騎至乃赴火死宋吕希哲母希哲父公著作相希哲滯管庫久乃判登聞鼓院力辭公著歎曰當世善士吾收拾略盡爾獨以吾故置不試命也夫希哲母賢明有法度聞公著言笑曰是亦未知其子矣王宣妻曹氏臨淮人建炎中盜馬進掠臨淮宣要其妻避之曹曰我聞婦人死不出閨房賊至堅卧不起衆賊劫持之大罵不屈為所害鍾離婦鳳陽人紹興間金兵破濠城欲驅之去婦不從金兵怒斷其臂罵不絶口死元許氏女安豐人父疾割股啖之乃痊閔居正妻蒲氏定遠人少知書年十七適居正會居正當從軍與蒲泣别蒲義形於色曰丈夫當立功閫外婦亦分榮晝錦即不諱有皦日作證也後數年居正凶問至婦部署箱奩分厚者奉姑餘及妯娌紿婢作炇自縊室之西窗纔二十六歲明花雲妻郜氏妾孫氏懷遠人太祖時雲與賊戰方急郜氏子方二歲抱兒泣謂家人曰城破吾夫必死吾不獨生花氏惟一兒若等善撫育之雲被害郜氏赴水死孫氏抱兒逃遇賊捽孫氏及兒於江值斷木附之入蘆渚取蓮實啖兒凡七日不死卒全花嗣詹奎妻周氏臨淮人年十七適奎奎卒無子家極貧氏守志不二事夫祖母及姑生養死葬惟謹永樂中旌表丁文聰妻朱氏名善真靈壁人永樂中文聰殁父議改許他姓女曰一身可更二姓邪遂自縊死劉錫妻張氏靈壁人錫卒張年二十有三有二子父兄逼改適氏翦髮自矢撫子舉鄉貢守節終身正統中旌表張煜妻杜氏定遠人煜死自縊以殉方淳妻居氏定遠人正德中流寇陷城氏不屈死一時婦女死節者五十六人賊平侍郎叢蘭上其事詔悉加旌表劉惺如妻李氏靈壁人正德中為流寇所掠自剄死王綬妻徐氏靈壁人正德中流賊犯境氏被劫不從被七槍三箭而死同時有李希儒妻張氏赴水死董鸞妻茅氏攜子女赴井死事聞俱旌表劉氏鳳陽人夫亡守節養姑及姑殁遭盜焚掠乃往夫墓自縊於樹王璣妻何氏宿人未歸而璣卒父母欲令他適何慟哭不從一日謂母曰我欲往王秀才墓所一祭母力阻之不可乃與其姑往至墓慟哭幾絶母姑扶囘嘔血而卒陸某妻劉氏宿人及笄陸貧行乞父醜之欲改婚賈人女不從曰義不可改適同乞所甘心也父竟受賈人聘將嫁自經死王雄妻吕氏臨淮人雄卒抱幼女托所親自經死王邦妻馬氏壽人同里厲讚妻薛氏屠照妻楊氏陳一䇿妻王氏俱夫亡自縊以殉綠衣女鳳陽人崇禎末張獻忠陷城女被執欲犯之不從賊怒縛於庭槐灌油燎之至死罵不絶口顧賀泰妻席氏臨淮人崇禎末爲流賊所執不屈遇害本朝周維先妻趙氏鳳陽人夫亡殉節同縣黑崑妻楊氏陳遇妻張氏李信章妻潘氏均夫亡殉節葛先質妻尚氏懷遠人夫亡殉節同縣支斐妻湯氏張國善妻潘氏胡一琠妻楊氏均夫亡殉節孫會隆妻羅氏孫培隆妻張氏陳文忠妻何氏均守正捐軀貞女玉國隆未婚妻余氏符世緯未婚妻江氏均夫亡殉烈馮廷棟未婚妻徐氏定遠人夫亡守貞順治年間旌沈起湄妻陸氏定遠人夫亡殉節同縣魏尚秀妻胡氏鈕旭妻陳氏閻進妻張氏周之璋妻王氏王璟徹妻朱氏趙民化妻周氏均夫亡殉節劉某妻沈氏守正捐軀卞魯妻楊氏壽人夫亡殉節同州侯謹度妻張氏張應祥妻譚氏孫天祐妻夏氏徐容肅妻周氏劉某妻毛氏王玉璘妻朱氏蔣承運妻卜氏孫某妻夏氏陶於義妻張氏均夫亡殉節黃以位妻吳氏韓萃妻余氏均守正捐軀烈女周錫林未婚妻張氏謝岐山未婚妻繆氏陳某未婚妻侯氏均夫亡殉烈張氏三烈宿人張國憲女長年十八次年十六國憲弟婦龔氏年二十三均遇賊守正捐軀同州張煒妻劉氏亦遇賊守正捐軀俱順治年間旌張烈婦宿人夫亡殉節同州杜維楫妻陳氏張其璿妻董氏范錫爵妻沈氏瞿某妻丁氏劉冲漢妻何氏李如德妻孫氏喬印妻陳氏張奏妻楊氏梁荆萃妻化氏黄得中妻盛氏陳秀妻尹氏王梅妻陳氏俱夫亡殉節烈女董貞吉未婚妻夏氏徐之修未婚妻丁氏均夫亡殉烈梁氏女守正捐軀邵經妻黃氏鳳陽人夫亡守節同縣蔡瑮妻張氏王家元妻戈氏陳之問祖母舒氏均夫亡守節俱康熙年間旌邵璞妻尚氏懷遠人夫亡守節同縣湯潢妻劉氏亦夫亡守節俱康熙年間旌盛履台妻苗氏定遠人夫亡守節同縣岳應詔妻王氏與子媳張氏桑成學妻張氏楊彝公妻陳氏均夫亡守節烈婦王連錫妻葉氏夫亡殉節俱康熙年間旌方自申未婚妻夏氏壽人夫亡守貞同州劉璇未婚妻夏氏劉朗未婚妻某氏均夫亡守貞俱康熙年間旌吕國檙妻張氏宿人夫亡守節同州王潢妻趙氏武澤世妻張氏均夫亡守節烈婦張士純妻魏氏張文獻妻田