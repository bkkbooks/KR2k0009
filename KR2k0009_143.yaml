front:
  text: 大清一統志重慶府二古迹江州故城在巴縣西本巴國都漢置縣為巴郡治左傳桓公九年巴子使韓服告於楚請與鄧為好杜預注江州故巴國都也華陽國志秦惠文王遣張儀滅巴城江州漢世郡治江州巴水北有柑橘官今北府城是也後乃還南城劉先主初以江夏費觀為太守領江州都督後都護李嚴更城大城周回十六里欲穿城後山自汶江通水入巴江使城在孤洲上諸葛亮召嚴故穿山不逮然造蒼龍白虎門别郡縣倉皆有城後漢書注江州故城在巴縣西北元和志巴縣在岷江之西漢水之南即李嚴所修古巴城也南齊改為墊江縣周武成三年改為巴縣寰宇記南齊永明五年江州自郡城移理僰溪口又移墊江縣就江州所理枳縣故城在涪州西古巴邑漢置縣晉永和中為涪陵郡治周廢入巴縣隋於此置涪陵縣唐宋為涪州治元省戰國䇿蘇代約燕王百曰楚得枳而國亡華陽國志枳縣在巴郡東四里治浩陵水會土地確瘠水經注江水厯雞鳴峽江南岸有枳縣治元二百四十里華陽國志和志涪州西至渝州水路曰涪陵巴之南鄙從枳縣入泝涪先主以水枳縣即今州理是也與荆楚界相接蜀為涪陵郡武德元年立為涪州在蜀江之南涪江之西故名寰宇記四夷縣道記云自涪陵西泝蜀江十五里有雞鳴峽上有枳城即漢枳縣也李雄據蜀後縣廢桓溫平蜀别立枳縣於今東北十里鄰溪口又置枳城郡尋廢周保定四郡年涪陵皇三首領田思鶴歸化於故枳城立涪陵鎮隋開年移漢平縣於鎮城仍改漢平為涪陵縣因鎮為名大業三年又罷為鎮輿地勝故枳城在巴縣東北一百十五紀里廢昌州在榮昌縣北元和志昌州正南至瀘州三百八十里正北微西至普州二百八十里東北至合州二百九十里本漢資中縣之東境墊江縣之西境江陽縣之北境乾元元年左拾遺李鼎祚奏以山川闊遠請剖瀘普渝合資榮等六州界置昌州尋為狂賊張朝等所焚州遂罷廢大厯十年復置其城南憑赤水北同倚長巖極置寰宇記為廢險固靜南靜南縣縣在永郭下川縣乾西元元北五年十與州里地名靜南等三縣壩舊因志為縣今名名宋舊州初以壩在地大荒民足縣少井入東南大按足新唐書地理云治靜南志蓋寰宇記皆云州先治靜南繼治初昌治昌元又元獨元移治大和足志也府在志大今名足縣舊州東南壩廢溱州在綦江義府桐縣梓南接貴州縣界元和遵志溱州七十正里南東微與東至賓州珍接州二界山百險里不東北通西至南州接合江二縣百界本巴郡才上封南境事請貞於觀十西南六年有渝州萬壽縣人夷竇渝之界招慰不庭牟建智立州縣懿縣至十郭下七扶年置以南觀縣東至有溱溪州五十水里為以名管縣縣東扶二觀榮山為名置樂皆來與縣州咸同置亨元舊唐書地理年廢天寶元志貞年改觀十六年並為溱溪郡乾元元州熙年復寧七為年溱州招納宋史地理志置榮懿等寨溱溪寨本羈縻隸恭州後隸南溱平軍大俱廢觀二以溱年溪别置溱寨隸南州及平軍溱輿溪地縣紀宣和勝榮二年州懿市本縣唐溱州故榮懿縣紹興七年移土門鎮巡檢於此兼寨事後移巡檢於曲崖隘今空有寨名止為一市又扶觀市本溱州屬縣熙寧四年置寨後移寨官於歸正今止為一市江陽故縣在江津縣西南西魏置隋改名江津宋移今治元和志江津縣東北至渝州一百二十里寰宇記南齊永明五年江州縣自郡城移理僰溪口即今理是也周閔帝元年於縣理置七門郡領江州一縣尋改江州為江陽縣隋開皇三年罷郡移縣入廢郡理屬渝州十八年改江陽為江津縣以斯地在江之津為名宋史地理志乾德五年移治馬騣鎮舊志江陽故城在今縣西南僰溪口即南江口也永
