七年知合州賦性狷介興學重農士民蒙業張寀蒲城人康熙十二年知綦江縣時吳三桂竊據寀厲志不屈憤惋成疾死王無荒孟津人康熙十九年知綦江縣值吳三桂餘寇圍城下無荒百計拒守糧盡援絶死之陳士礦秀水人康熙四十九年知重慶府廉正剛介執法嚴明誅鋤豪橫一郡肅然任舉大同人乾隆十二年官重慶鎮總兵督兵勦金川逆酋冰雪崚嶒舍馬徒步身先士卒克昔嶺奪諸卡及碉樓二百餘座進兵色兒力山賊懼退守石城十三年六月薄卡踴登手刃數賊因火鎗傷墜崖死詔贈提督諡勇烈又守備李成邦亳州人亦以是年隨征金川力戰殁於陳恤廕如例單思邁高密人乾隆十五年知永川縣精明果斷民不敢為姦修築塘堰數百處水利以興至今賴之曾受一東安人乾隆三十年知江津縣始教民樹桑飼蠶倡修水利加意學校民為祠祀之吳一嵩新建人乾隆三十七年知重慶府金川軍興委赴西路佐建昌道總理糧餉西師潰一嵩曰他人可出走吾有軍糧之責宜死守遂死之事聞贈太僕寺少卿祭葬恤廕如例又合州吏目羅載堂亦赴西路軍營掌書記木果木之變隨軍夜出遇賊被害詔贈府知事恤廕如例葉書紳廣豐人乾隆田十三年官江北廳同知明決廉慎緝宄安良勸農課士民被其惠左修緒清泉人乾隆四十五年知合州廉明靜慎折獄準情民以不冤蔡必昌順天人乾隆五十五年知重慶府嚴毅精明吏不能為姦民憚犯法郡政大治石陳圖博野人官重慶守備嘉慶元年隨勦邪匪王三槐等在達州擊賊陳亡又守備山陰人夏繼先二年禦賊於長夀縣力戰陳亡守備江南龍魁追勦邪匪在東鄉縣擊賊陳亡守備東湖歐愷七年從征邪匪在太平廳力戰陳亡恤廕均如例章潮天津人嘉慶二年為長壽縣典史王三槐攻圍縣治潮同守備夏繼先激勵士卒奮力決戰被執不屈剖腹死事聞恤廕從優大清一統志重慶府三人物周巴蔓子巴國人仕巴為將軍周末國亂蔓子請師於楚許三城楚已救巴遣使請城蔓子曰藉楚之靈克弭禍難誠許三城可持吾頭往謝城不可得也乃自刎以頭授楚使王曰使吾得臣如蔓子用城何為乃以上卿禮葬其首巴亦葬其尸以卿禮漢嚴永巴郡人詔旌孝子元初時王堂為太守撥亂致治進賢達士貢孝子嚴永及隱士黃錯名儒陳髦俊士張璊皆至大位李德卬墊江人辟太尉掾熹平五年益州諸夷叛執太守雍陟御史中丞朱龜討之不能克拜德印益州太守與刺史龎芝擊破平之又巴郡沈椎黎彪為益州太守皆著名績杜孝巴縣人事母以孝聞母喜食生魚孝役成都買魚置竹筒以草塞之投於中流祝曰願吾母得此食婦汲於江見筒橫來觸岸異而取視有二魚曰必我壻所寄熟以進姑聞者嘆其孝感謁渙江州人仕為汝南太守有公直之稱三國漢董和其先巴郡江州人徙於南郡枝江漢末率族西遷依劉璋任成都令益州太守清約持躬務推誠信南土愛信之先主定蜀徵為中郎將與諸葛亮並署大司馬府事外牧殊域內斡機政二十餘年卒之日家無擔石之儲亮追思稱嘆不置董允和之子初為太子洗馬後主立遷黃門侍郎丞相亮北征疏允先帝簡拔必能禆補闕漏有所廣益尋遷為侍中獻納之任允皆專之甚盡匡救之理後主愛宦人黃皓允上則正色匡主下則數責於皓皓畏允不敢為非後終尚書令允孫宏晉巴西太守晉毛楚枳人與同郡楊宗皆有美德楚至牂牁太守宗武陵太守唐李陽冰合州人開元中為當塗令有政績宗人李白常往依之善篆書推古今獨步宋郝仲連昌州人為河東軍馬使建炎元年金將洛索犯河中以重兵壓城仲連力戰度不能支先自殺其家人城陷不屈及其子皆遇害後贈觀察使洛索舊作婁宿今改正譙定涪陵人初學易於郭曩氏一日至汴聞伊川程頤講學於洛棄其學而學焉靖康初召為崇政殿説書以論弗合辭不就高宗即位定猶在汴詔遣詣行在將用之會金兵至定復歸蜀隱青城山蜀人敬之稱曰譙夫子馮時行壁山人紹與進士知丹稜縣有惠政以左朝奉郎爭和議出知萬州部使者附秦檜意遂坐罪廢檜死起守蓬黎終成都路提點刑獄雅人思其德祠祀之著有縉雲集朱子稱其所論人主正心親賢即所謂建極者足明禹箕之傳破諸儒之陋度正合州人紹熙進士厯官國子監丞疏言李全必反且獻斃全之䇿其言鯁亮激切遷軍器少監為帝言陛下推行聖學當自正家始進太常少卿適太廟災為二説以獻其一則用朱子之議其一因宋朝廟制而參以朱子之議纍遷禮部侍郎致仕所著有性善堂文集胡天啓重慶人吳曦叛負母而逃兵欲殺其母天啓妻張氏哀號願以身代不聽卒殺之天啓與其妻呼天大罵於是夫婦同死事聞褒恤之趙卯發昌化人淳祐進士素以節行稱咸淳十年權通判池州元兵渡江守遁因攝州事為守禦計明年有諷以降者或問禔身之道曰忠義所以禔身也此外非臣子所得言既知不可守置酒訣親友謂其妻雍令出走雍曰吾請先死卯發笑止之兵薄城晨起書几上曰君不可叛城不可降夫婦同死節義成雙與妻同縊從容堂死巴延入為具棺衾合葬於池上祭墓而去巴延改見前趙立重慶人以上書忤賈似道被謫德祐初起為太社令湖北提刑使蜀趣諸將入衛至重慶則咎萬壽已降元張珏方城守為後圖立無以復命還至涪沈水死趙孟壘合州人為金華尉臨安降與從子由鑑懷太皇太后帛書詣益王擢宗正寺簿監軍復明州戰敗見獲不屈磔死劉霖永川人德祐元年瀘州守梅應春以城降於元霖獻計於郡守張珏復瀘州珏以霖為知軍既而元兵陷重慶被執死之元張孝子江津人逸其名元末兵亂孝子負其母糊口四方十有二年明兵平蜀始負母南歸至筍溪時值水漲母曰吾以老憊纍吾子至此今隔一衣帶水天將不使吾見家鄉乎仰天長嘆自躍赴江孝子倉皇從之覺足下有石載之得渡與母俱無恙及顧江中乃一石牛也今指渡處為卧牛灘明陳憲銅梁人洪武中知監利縣有司造官批民病之憲奏減大半知華容奏免浮稅三萬餘石憲一作獻蹇義巴縣人洪武進士授中書舍人建文即位超擢吏部右侍郎文皇立遷左侍郎進尚書永樂七年帝北巡命輔皇子監固軍國事倚辦奉命巡應天諸府黜陟文武長吏止斥太甚者數人餘多寬假仁宗即位纍進少師奉命修太宗實録宣德中賜第大明門內英宗即位遣問欲言以敬守成憲始終不渝為對卒贈太師諡忠定王原銅梁人永樂中知咸寧縣勞心撫字不事表暴江淵江津人宣德進士授編修郕王監國徐有貞倡議南遷淵極陳固守之䇿由侍講擢刑部右侍郎景泰元年入閣預機務明年以天變條時務三事詔悉從之京師久雨雪淵上免稅如詔五言民怨鬱結之由帝令法司申冤濫年山東河南江北飢淵往撫條上軍民便宜十數事悉議行調工部尚書尹竑巴縣人正從英宗北統進士擢禦史狩死土木之難楊慶長壽人正統間知通城於朝復任九載秩滿又縣九載奏績民請留請前後二十三年陳價銅梁人正統中知臨湘縣嵗歉疏乞寬租詔蠲免之有舟丁六百戍江淮役重率多逃亡價又奏免百人政績稱最纍官至都御史價或作介誤李翔大足人天順進士為給事中以疏論宦官忤旨謫寧州判官蔣雲漢巴縣人天順進士成化間知大理府操守廉約聽訟以善言感動至泣下引罪然後剖決民相語曰不畏公箠但畏公唾去之日行色蕭然官至福建布政使牟俸巴縣人景泰進士授御史巡按雲南南安伯毛勝鎮金齒俸列其違縱罪將吏皆聳成化時遷江西按察使政尚嚴厲巡按山東五年盡心荒政活飢民不可勝數石敏中江津人成化中知松滋縣歲飢發賑江漲增築堤防會鄖襄盜起軍供旁午敏中措置有方民不告病劉春巴縣人成化進士及第授編修正德時厯禮部尚書專典誥敕掌詹事府事時覲官各言鎮守內臣入貢之害春列上纍朝停革貢獻詔旨乞一切停罷掌禮三年宗藩請封請婚及文武大臣祭葬贈諡多所裁正卒贈太子太保諡文簡姚學禮巴縣人家京師宏治進士擢南京御史正德元年偕同官諫馳騁騎射不納既與葛浩等乞留劉健謝遷罪劉瑾馬永成等下詔獄廷杖削籍後起雲南僉事終參議鄒智合州人家貧讀書焚木葉繼晷成化二十二年鄉試第一明年登進士改庶吉士上疏言時事不報孝宗嗣位復因星變上書極詆萬安劉吉尹直而薦王恕王竑彭韶等吉憾智甚適湯鼐劉概獄起使其黨入智名遂下詔獄謫廣東石城吏目聞陳獻章講道新會往受業學益粹未幾卒年二十有六天啓初追諡忠介劉􅉅涪州人宏治進士正德初户科給事中時劉瑾擅權首抗疏極言其姦被杖落職瑾敗起金華知府舉治行卓異終江西副使陳伯剛合州諸生父母喪負土成墳廬墓六年有白鶴來巢鄉人以為孝感事聞旌表王俊民合州人正德進士厯給事中謇諤有聲嘉靖初張璁方尊顯俊民前後持大禮諸疏劾之不少假忤旨杖斃隆慶初贈太常少卿任轍巴縣人嘉靖進士知許州嵗旱多方賑恤擢守黃州採木之役曲蘇民困知大理府時檄貨大青甚急吏欲擇尤者以獻轍慮以難繼病民拒之厯貴州巡撫計縛叛苗許吾等邊陲奠安李文進巴縣人嘉靖進士遷給事中陳邊計十二事多見省納京師僧聚衆説法於天安寺文進上言乞捕外護為首者按治之諸郡邑有似此者通行禁飭帝善之洊擢大同巡撫大同右衛北地曰豐州叛民邱富趙全等居之築城堡開良田數千頃號曰板升板升者華言城也以妖術誘衆數入寇文進曰此中國隱患也乃與劉漢俞大猷謀乘間取之擒斬多人焚其宫室進宣大總督劉起宗春之孫嘉靖進士為户科給事中延綏洊飢請帑金賑救尋以疏忤嚴嵩父子廷杖謫荔浦典史終遼東苑馬寺卿劉世曾巴縣人嘉靖進士以御史巡按江南不攜蘇松一物厯雲南巡撫削平緬寇性醇孝平生清苦無所蓄積聶賢長夀人由進士為御史有清操嘉靖時厯右都御史會御史馬録奏妖賊李福達獄并劾武定侯郭勛賢等覆如録奏力言勛黨逆罪勛激怒帝反前獄奪賢官後用薦起工部尚書終刑部諡榮襄張佳蔭銅梁人嘉靖進士授滑縣令有異政擢户部主事出榷閩廣無毫髮私改兵部職方司主事纍遷副都御史巡撫應天為政務持大體後撫宣府入為兵部侍郎浙江兵變令撫浙許以便宜行事甫入浙境市民之變復起遂勒兵討擒之而斬兵之倡亂者二人二亂悉定以功遷兵部尚書段威武銅梁人舉孝廉為渭源令事父母以孝聞既葬廬於墓朝夕哀奠有鹿馴烏集梨橘再實之異李仕亨銅梁舉人萬厯中知善化縣時遭旱疫斥俸錢給饘粥藥餌又力請蠲租賑恤得報可置義冢以掩胔骼尤惓惓興學造士內擢主事貧不能置裝後出知思州府置田贍士賑恤孤貧惠愛為多厯副使田大益定遠人萬厯進士厯戶兵二科給事中纍陳貢稅之害言皆剴切時兩京缺大僚方面凡百十餘人大益疏請簡補又劾內官擅兵採煤極陳君德缺失言雖不納時論壯之卞孔時江津人萬厯舉人補武昌同知監軍征橋州有功大奄以礦稅來楚縱役恣暴孔時面斥奄列其狀於朝奄誣富民孔時又直之奄遂劾以阻撓稅法逮下詔獄凡十九年葉向高為言乃放還熹宗立起南京刑部員外郎忤魏忠賢意出知漢陽府越二日卒董盡倫合州人萬厯舉人官安定知縣秩滿氏詣闕乞留詔加鞏昌府同知仍視縣事久之以同知理甘州軍餉解職歸天啓𥘉奢崇明來攻與知州翁登彥拒守城獲全援銅梁復有功尋被檄援重慶戰死贈光祿少卿夏衍虞江津人天啓舉人知臨漳縣有惠政擢曲靖府推官署道事丁亥孫可望陷滇衍虞貽巡按羅國瓛書約共舉義事覺與國瓛俱闔門遇害乾隆四十一年賜諡節愍竇成川西小卒隸安慶撫標守桐城隨辨將廖應登出偵賊為賊所獲並挾至城下使諭降廖未及言成大聲告以賊虛實使城中堅守賊寸磔之桐人專祠以祀乾隆四十一年豫入忠義祠按巴縣志云邑人事在崇禎十五年三月陳新第長夀人崇禎末知定番州禮士愛民共戴之丁亥春孫可望寇定番新第誓衆堅守並扼要害逆戰先後殺賊數百城陷自縊於署內馴鹿堂又忠國公王祥綦江人守遵義孫可望遣賊將白文選攻之兵敗被殺乾隆四十五年俱賜諡節愍程源江津人崇禎進士釋褐後以闖賊窺潼關上書陳勦寇十䇿不報甲申後擁立永明王厯晉東閣大學士兵部尚書經理滇黔楚蜀督戰克捷偏橋之役為王祥所執七日不食終以大義服祥解諸鎮爭鬨之害明祚既終悲憤卒梁士麒永川人崇禎舉人獻賊陷城遇賊不屈大罵受刃同縣蔣世鉉獻賊至倡集義旅二百餘人嬰城守禦與賦戰於東門為賊所執招之降瞋目呼之不屈賊寸磔之臨死罵不絶口又合州諸生董克治獻賊分掠合州克治傾資募義勇殺賊甚多後於長安坪與賊戰力不支乃率三千餘人據洞中相持月餘賊鑿山積火其上衆感克治風義無變志俱被熏死乾隆四十一年俱豫入忠義祠曾異撰榮昌人崇禎舉人為永寧州知州張獻忠部寇孫可望將寇雲南異撰與其客江津進士程玉成貢士龔茂勳謀曰州據盤江天險控扼滇黔棄之不守事不可為矣遂集衆登陴未幾城陷自焚死乾隆四十一年賜諡烈愍張奏凱綦江人天啓初征藺有功授川北副總兵拒闖賊升天柱總兵獻賊攻成都奏凱守東門城陷死難乾隆四十一年賜諡烈愍羅大爵合州人崇禎十七年以總兵鎮戍都賊至死之同時川北副總兵李文陰壁山人與獻賊戰於白水𬒳執罵賊死乾隆四十一年俱賜諡節愍按大爵一作官黎雅參將文陰壁山縣志作文廕蕭頌聖定遠人明末麻城教諭署縣事城陷獻賊脅授偽官自縊死乾隆四十一年賜諡節愍本朝簡上巴縣人性至孝為兒時常負米百里外以養親順治辛卯舉於鄉知直隸巨鹿縣以廉能擢吏部文選司郎中視學江南再轉廣西右江道所人俸錢多分贍族黨之貧者著有四書彚解劉如漢巴縣人順治進士由翰林院檢討轉兵科給事中所陳奏多報可纍遷副都御史巡撫江西未抵任丁父憂哀毁骨立尋卒李如碧合州人慷慨有勇略順治間以隨平雲南功授雲南前營驃騎將軍康熙三年復平水西羅甸升黔西總兵晉貴州提督屢立戰功卒於官贈公安伯祀鄉賢祠覃銓巴縣人歲貢生吳三桂迫以偽職銓百計逃免教授生徒多所成就李成芳巴縣人由拔貢任雲南寧州州同康熙十二年吳三桂之亂把總李忠投賊劫州庫成芳統丁壯生擒李忠以功加議敘同知十四年賊復攻城力戰死之贈布政司參議傅汝友巴縣人官提標隨征總兵康熙十九年出師永寧與提督王之鼎泊費雅逹等被賊執不屈死贈都督同知龍為霖巴縣人康熙進士知太和縣邑號難治為霖不尚刑威民無寃抑值西藏軍興供億得宜初太和丁糧分納有田已迭賣而丁名不除者為霖力為詳請獲免擢石屏知州修城增戍州有土目立勳父子以狡黠雄夷中嘗隨軍得千總劄為霖密請斥革以防未然立􅈴旋有陰誘魯魁之變他邑殘破石屏以有備得全厯潮州知府剔弊釐姦復葺韓山書院人文蔚起以母老乞養歸著有松蔭堂詩集本韻一得李馥巴縣人康熙武舉任成都城守千總署守備從征青海戰殁劉鍹江津人康熙進士官桐鄉知縣厯署海鹽石門德清勤於課士多惠政卒祀名宦王恕銅梁人康熙進士由庶吉士改吏部主事厯湖北及江安督糧道盡除漕政之弊乾隆元年遷廣東按察使治獄多平反有歸善劫盜數人獄巳具恕察其枉悉縱之未幾果得真盜纍升福建巡撫請豁崇安浮賦貯榖南臺以濟漳泉荒旱檄修閩縣官浦興化木蘭陂水利閩人咸頌其德著有樓山詩集李芳述合州人康熙十九年勇略將軍趙良棟從白水江入川芳述率先納款隨師進勦吳三桂餘寇收復滇黔纍官西寧總兵貴州提督苗蠻懾服晉太子少保卒贈太子太傅苟金徽合州人康熙舉人性孝友濳心理學知廣東曲江縣以卓異升廣西新寧州丁繼母憂抵家三日慟卒韓成合州人康熙中任重慶鎮總兵法令嚴明諸蠻畏服遇亢旱禱雨輒應郡城偶不戒於火成具衣冠肅拜忽反風滅火人神之韓良輔成子康熙武進士授二等侍衛隨征厄魯特厯遷宜君參將宜君多盜良輔嚴坐窩主盜以息又以多虎患造虎槍教兵習殺虎校獲百餘虎提督廣西勦猺獞有功改巡撫卒弟良卿康熙武進士由侍衛厯官甘肅提督嶽鍾琪征準夷良卿總統軍務機宜悉協卒諡勤毅韓勳良輔子康熙武舉隨父出兵口外授侍衛洊升古州總兵以征逆苗屢立戰功遷貴州提督卒贈右都督諡果壯周儼涪州人談宏之亂儼負父潛逃為賊所執兩臂受創父疾篤躬嘗便溺以占順逆父死號泣嘔血七日髮盡白撫弟孤如已子周儒儼弟事親並以孝聞儼被執儒急父兄之難與賊力戰受重創死李文仲巴縣人任貴州安籠鎮標守備雍正六年勦八違寨逆㺜戰殁贈都司僉書彭國泰巴縣人官把總乾隆十二年從征金川隨守備李成邦攻巴納山同戰殁恤如例嘉慶七年補給恩騎尉世職同縣把總任友外委馬化龍把總瞿良佐俱乾隆十三年金川陳亡把總王信三十二年緬甸陳亡恤廕均如例談世俊巴縣人漳臘營守備乾隆三十八年從征金川木果木陳亡同縣把總張其中亦以是年登春陳亡千總張魁三十九年博羅瓦陳亡外委談虎馬世奉俱六十年黔楚陳亡恤廕均如例周煌涪州人乾隆進士授編修屢典試事嘗以侍講充册封琉球副使開洋至姑米山颶風大作舟且壞從人請易舟煌謹護詔敕弗聽尋達琉球成禮而還入直上書房升侍郎提