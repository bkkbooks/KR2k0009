body:
  text: 川故縣即今永川縣治元和志縣西至昌州九十里大厯十一年置東西北三面並枕侯溪水南面接延陵英山唐書地理志本壁山縣地寰宇記在昌州東南一百五十里以山川闊遠因名南川故縣在綦江縣南唐志元和志南州北至江津縣二百三十里漢為巴郡江州之境武德二年割渝州置南川縣郭下武德二年改曰隆陽舊唐書地理志先天元年復為南川宋史地理志皇祐五年以南州置南川縣熙寧七年以南川縣隸南平軍九域志南平軍熙寧七年招收西南蕃部以南川縣銅佛壩地置仍省南川縣為鎮入焉元豐元年復置南川縣為軍治輿地紀勝今之南川在唐之南川縣北四百六十里其銅佛壩在故南平城西門外地有金銅佛像二相傳唐明皇所鑄明統志廢面平軍在綦江縣南九十里銅梁故縣在今銅梁縣北元和志縣東至合州一百五十里長安四年刺史陳靖意以大足川僑户輻輳置縣取小銅梁山為名寰宇記本漢墊江縣地舊理在今縣北四十里奴崙山北列宿壩上開元三年移就涪州南岸權立十六年遂東南移於東流溪壩上即今理也明統志縣在合州西南九十里元移今治按今縣乃故巴川縣地蓋元時既併巴川入縣遂南移於巴川舊縣側近也壁山故縣即今壁山縣治元和志縣東北至渝州一百八十里本江津萬壽巴三縣地四面高山中央平田周回約二百里天寶中諸州逃户多投此營種至德二載置縣因山為名縣東陸路至江津縣一百三十里定遠故縣在今定遠縣北元史地理志合州定遠縣本宋地名女箐平至元四年創為武勝軍後改為定遠州二十四年降為縣明統志在合州北一百五十里舊志縣治本在江北其後江水漲溢城壞明嘉靖十三年知縣胡濂移治江南岸十里去州九十里地名廟兒壩印今治也南平廢縣在巴縣東南唐貞觀四年分巴縣南界置南平州領南平清谷周泉昆川和山白溪瀛水七縣八年改曰霸州十三年州廢省清谷等六縣以南平屬渝州宋雍熙中省入巴縣元和志縣西至渝州一百三十里本漢江州縣地寰宇記唐貞觀四年置南平州仍於州理置南平縣今縣南三十五里古霸州城也十三年州廢移南平縣於西北即永淳以前舊理所也永淳二年又東南移六十里於平鄉頓壩權置行縣即今縣理萬壽廢縣在江津縣西南元和志縣東北至渝州二百八十里本漢江州縣地武德三年分江津置萬春縣屬渝州五年改為萬夀縣宋史地理志恭州舊領萬壽縣乾德五年廢永安廢縣在長壽縣西南寰宇記唐武德元年析涪陵巴二縣地於涪州西二南一百五十年民以為非里置縣以縣北永安山為名開元便遂廢按唐書地理志作開元二十二年省入樂溫樂城廢縣在長壽縣西華陽國志巴領樂城縣蜀延熙十七年郡省舊志今長壽縣西一百里有樂磧鎮即其地也樂溫廢縣在長壽縣西北唐置元和志縣東南至涪州一百十里寰宇記樂溫後周省枳縣又為巴縣地唐武德二縣秦枳縣地年又析巴縣地置以縣南樂溫山為名舊志元省樂溫入涪州置涪陵巡司明玉珍改置長壽縣西北去故縣五十里昌元廢縣在榮昌縣西北元和志縣東至昌州一百二十里乾元元年與州同置東接瀨波西臨耶水輿地紀勝周顯德初為寇移治羅市鎮天禧中又移今治舊志故昌元所焚縣今為昌元里按宋史地理志作咸平四年移治羅市與紀勝不同又明統志元改置昌安縣明改榮昌而元史地理志不載丹溪廢縣在綦江縣東南舊唐書地理志武德二年置南州領隆陽扶化隆置當山嵐山巫丹溪靈水南川六縣貞觀七年又歸德汶溪四縣八年廢當山等四縣十一年又廢扶化隆巫靈水三縣寰宇記丹溪縣在南川縣東南三十里於丹溪水曲置因名貞觀十七年廢三溪廢縣在綦江縣東南唐置屬南州元和志縣西北至南州二百四十里貞觀五年置以縣內有僰溪東溪葛溪三溪合流為名其縣城甚高險寰宇記縣理城俗名石城宋初廢瀛山廢縣在綦江縣西北舊唐書地理志貞觀四年南州領瀛山縣十三年省舊志在縣西北瀛山下隆化廢縣今南川縣治至涪州三百元和志縣東北里本漢枳縣地貞觀十一名先天二年分巴縣置隆化縣因縣西永隆山為年以避諱改為賓化宋史地理志南平軍領隆化縣熙寧八年自涪州來隸九域志縣在軍東一百四十五里舊志按元統志云嘉熙三年移軍治此元至元二十二年併縣入南川於此置理自後遂為南川縣治是則今之南川唐之賓化也唐之南川今之綦江也明統志不經詳别致山川古迹混雜不明今據元志改正石照廢縣今合州治漢置墊江縣屬巴郡西魏改為合州治宋初改曰石照明初省縣入曰石州元鏡和志合州西至治石鏡縣本遂州二百六十里北至果州三百里漢墊江縣也寰宇記宋於此置東宕渠鏡郡魏恭帝三年改東以涪水北有圓石似宕渠鏡因為墊江郡改縣名仍於郡治合為石州蓋取涪漢二水合於此故為州稱城臨峽江之上控束之地舊志宋淳祐三年余玠知重慶府徙實州城治釣魚山縣亦隨徙焉元至元二十二年州縣始復還故治漢平廢縣在涪州東南三國漢置晉陵郡漢平因縣之宋省齊復蜀延熙十三置隋又年置水廢華陽國志涪經注江水自涪州東經漢平東一百二十二百餘里寰宇記漢里羅浮山北岷江之平縣在今南白水入涪江州處開元三移入涪年陵武隆廢縣在涪州東涪州明初南唐置曰武龍屬改名元和志武龍縣西北至涪州二百五十里本漢涪陵縣地武德元年分置寰宇記本涪陵枳二縣地以界內武龍山為名宋興元年復史地理志宣和元年改武龍為枳縣紹故舊志明洪武初改為武隆本朝康熙七二里年歸併涪州設巡司有城周有竒在州南一百七十里赤水廢縣在州合西隋開皇八年置屬涪陵郡唐屬合州宋熙寧四年省入銅梁七年復置元至元二十年併入石照元和志縣東至合州一百里本漢墊江縣地隋分石鏡縣於今縣西二里置縣因水為名寰宇記唐武德元年移於今理舊志按九域志在合州西北一百三十里蓋宋時又徙而北也溫山廢縣在涪州西北一百一十里唐書地理志涪州有溫山縣本屬南潾州亦武德初所置九域志熙寧三年省為鎮入涪陵縣巴川廢縣在銅梁縣西南唐置屬合州宋因之元初併八銅梁元和志縣北至州二百里開元二年刺史孫希莊奏割石鏡之南銅梁之東置寰宇記本漢墊江縣地以地在巴川故名九域志在合州西南一百十里輿地紀勝在州南七十五里安居廢縣在銅梁縣西北七十里隋唐有安居縣在今遂寧縣界明成化十七年復折銅梁遂寧二縣别置屬重慶府蓋即宋銅梁縣之安居鎮也縣治波羅川東里許有城周一里有奇本朝康熙元年省入合州六十年以其地分屬銅梁縣古灘城輿地紀勝在巴縣東七十九里岷江岸周一百步闊五尺相傅巴子於此置津立城因名古樂城輿地紀勝在巴縣西南舊志又有多功城在縣西四十里宋淳祐中築以禦蒙古東陽城輿地紀勝在巴縣西一百里舊志云齊建武元年割巴縣置東陽郡舊志周時廢今為東陽鎮宋王城在合州輿地紀勝在合州南二里巴子城在合州南華陽國志巴子或治墊江在巴郡西北中水四百里括地志巴子故都在石鏡縣南五里九域志舊傳楚襄王滅巴子封庶子於濮江之南號銅梁侯即此綦市今綦江縣治輿地紀勝宋紹興二十六年移南川鎮稅務於大綦市明統志綦江鎮即古綦市洪武初改置為縣范鎮村在江津縣西樓臺山之麓宋范鎮嘗寓於此人慕之因以名村鑄錢監在綦江縣南輿地紀勝在南平軍西南一里許渡溪而上於歸正壩松嶺等處取鐵歲鑄錢四萬貫自元豐二年吳淇申請復增鑄至六萬貫名廣惠監紹興末郡守張鼎以耿炭遠鼓鑄不充遂廢荔枝園在巴縣華陽國志江州有荔枝園至熟二千石常設廚宴命士大夫會樹下食之按明統志謂在江津縣廳西北誤塞樂園在綦江縣南輿地紀勝在南平軍西郊去城一里初太守封固以邊方安靜營治為遊宴之地細石屈曲鱗砌錦紋作小徑嘉木名卉最為可人有二亭曰風月曰賞心軒曰緑猗士大夫留詠甚多紹興末溪水泛浸稍壞今為荒圃獨荔枝一株在耳妃子園在涪州西十里輿地紀勝其地多荔枝昔楊妃所嗜當時以馬遞馳載七日七夜至京香草樓在江津縣西南寰宇記李膺記云江州縣西南有仙池昔有仙人居此池側置樓多植香草忽一夕天降紫雲飄然而去後人指其地為香草樓明統志在江津縣西南三十里飛雲樓在南川縣普澤寺江樓在合州治前輿地紀勝下臨漢水杜甫送祁録事歸合州因寄蘇使君詩幸為達書賢府主江花未盡會江樓清華樓在合州治輿地紀勝朝公武有記三仙樓在涪州北岩東謂爾朱先生蘭真人王帽仙四賢樓在涪州北岩西四賢宋程頤黃庭堅尹焞譙定也望仙樓在銅梁縣治西唐合明統志宋制置使余玠築懷清臺在長壽縣南史記貨殖傳巴寡婦清其先得丹穴擅其利數世家不資清能守其業用財自衛秦皇帝以為貞婦而客之為築女懷清臺怙地志清臺山俗名貞女峽在永安縣東北七十里風月臺在長壽縣西北輿地紀勝樂溫縣北白虎山下有石龕名風月臺招賢館在府治左明統志宋余玠建關隘陽關在巴縣東水經注江水東徑陽關巴子梁江之兩岸猶有梁處巴之三關斯為一也延熙中車騎將軍鄧芝為江州都督治此寰宇記州東北二十里有石洞峽即劉先主置關之所舊志今亦名石洞關銅鑼關在巴縣東三十里銅鑼峽又南平關在縣南一百五十里佛圖關在巴縣西十里即李嚴欲鑿通汶涪二江處為重慶要津上有石佛像故名又二郎關在縣西北六十里清水關在縣北六十里崖門關在江津縣南三百里接貴州遵義府界為總路元未明玉珍築一名雁門關關北屬縣界南屬遵義朝陽關在榮昌縣東一里三舍溪關在綦江縣南一百里近古縣趕水關在綦江縣南一百五十里元置東溪巡司明嘉靖十一年移此今裁馬頸關在南川縣南又冷水關在南川縣北一百里接涪州界清溪關在涪州東南唐開成三年牂牁蠻寇涪州之清溪鎮即此又白雲關在州西南七十里米糧關在大足縣東二十五里即宋米糧鎮也又有化龍關在縣北三十里接潼川府遂寧縣界木洞鎮巡司在巴縣東九十里明置水驛於此本朝雍正七年置巡司武隆鎮巡司在涪州東南舊武隆治本朝康熙初置安居鎮巡司在銅梁縣西北七十里即舊安居縣本朝雍正七年置大洪江鎮在巴縣東百里亦曰大紅江鎮明置巡司今裁來蘇鎮在永川縣西南六十里九域志永川縣有牛尾來蘇侯溪龍歸羅市鐵山等十一鎮雲門鎮在合州東北九域志石照縣有雲門龍會安壩來灘來蘇扶山銅期董市茆域九鎮舊志雲門在州東北渠口屯營在江津縣南二十五里四圍峻絶中如砥平明正德中都御史林俊破賊曹甫屯兵於此石寨在江津縣東南龍登山後四圍石壁皆百丈僅通一路又茅草寨在縣西南石門驛西一里高寨在縣忍善鄉平地突起一峯插天懸巖僅通一線昔人避兵於此天臺寨在長壽縣北四十里舊有天臺寺地極陡峻明木鄉人多避兵於此永昌寨在榮昌縣北廢昌州北三里唐乾寧二年昌州守韋君靖建安穩寨在綦江縣南九域志南川縣有榮懿開邊通安安穩歸正五寨舊志安穩寨在縣西南百二十里大菴汛在江北廳北二百六十里華鎣山岡巒延亘接合州嶽池鄰水界本朝乾隆十七年移重慶右營守備駐此四十四年栽改營為汛鶴遊坪在涪州北一百里磐石為坪周二百餘里本朝嘉慶十七年設州同駐此因舊寨為城名保和城白錦堡在綦江縣南八十里宋史地理志端平三年以白綿堡置播