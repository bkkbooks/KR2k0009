壽南故水城經南注而漢西壽南水入源出漢水東舊山志西今流有南按河輿在地縣紀南勝二又百有步柘源出溪在紫縣金東堡三滙十流里西縣入志江今有稻民壩河藉以在溉縣田東皆西即流此入水江居也濳水在雅廣水元自縣漢北出爾為潛入郭大璞穴音中義通有洞水山從下漢西中南沔潛陽出南一流名至沔梓水潼舊漢俗壽云即龍禹門貢水之源潛出也綿河谷圖縣括東地龍志門潛水山大一石名穴復下水元今和名志源源出出縣縣北北龍一門百山三書十曰里沱木潛寨既山道流是經也神縣宣志驛潛又水南二江十舊里省經志龍洞口按水繼至注朝引天鄭驛康北成穿之穴言而曰出漢入别嘉為陵潛流明入以漢西合大漢水禹為自潛導水漢也疏後通人即信為史西疑漢經水知是有康西成漢而龍不門知山其而為廣潛元水舊也志久則矣云括出地木志寨元山和意志者皆木言寨出山乃龍水門自山沔在陽縣來東之北所八經十而二人里誤今以以為舊出志與所元言和考志之木口寨山又南南二十十餘里里為為神朝天宣驛驛去又縣南二八十十里里恰為與龍龍洞門之里其所數謂相經符龍蓋洞朝口天至驛驛之北穴穿即穴龍而門出山之者又穴與也至與地紀三勝水吻自合紀第三勝洞云發自源朝貫天通程兩入洞谷下十合五嘉里陵有江石此洞即所下謂嘉入陵大穴江通中謂通之洞潛山水下湖西潛南逾潛龍出門者而也北自即此可以由沔水陽以縣達西南之於沔矣宕水在界通入江巴縣江東寰又宇南記流符徑陽巴縣州有思江公縣水界源又出有縣乎北思公山州水北自南通徑江縣縣理界西流又經南廢入廣通納縣理里又西南與合廣北納水溪舊水志合又今名南宕流水經又廢曰歸東仁河縣源東出五漢中里府與西竹鄉浴縣關界水自合大巴流十江里入至縣境峭口南又流分二二百派三十過毛浴十鎮里復入合巴又州西界南為流泥五灘十河里又合四諾水十五又里東入南巴流江三即平水州也諾水在南通諾江水縣為西名寰舊宇志記後魏諾水源諾出水南縣鄭因縣縣之青石俗名關經西河衆自山羊中圈水關流入所縣激界聲南若呼流四諾百故里名過舊縣志城西又十里南入流宕三水符水在縣通東江南縣三北百寰步宇西記流源經出縣符南陽九十入步思又公西水白石水在通清水江一縣名北白寰石宇水記東白北石自縣洋有源里水深皆嘉陵多魚二之溢流溪也㵅溪在巴州章縣東東寰北三宇記十五源出里平其地東又南流經東南經始始寧故平山縣東東南又南與思東南賴水流合經縣按北輿三里圖今巴州河東東南界流通入化宕縣水西蓋有即楊此柏也鹿溪在里巴相州西對者五十為處溪又百里深皆度東溪在流入州巴西江清浴溪在里通江下流縣入西九於巴十江聞溪在劒江又州石東臼源出溪在五州子西把十寨二五里山東合流東入嘉流至漩口入陵江劒溪在流劒州經小北水劒戍經下注入小劒清水水元西和南出志大劒谷劒水東出北普安縣西劒山由北四劒門十關九流里出空北冢山折為下魚州子志大溪又劒北溪至出大大倉嶺而入清東過涼水水溝又瀑小布劒溪崖至在兩大劒溪溪口合北源出於大劒小溪劒又山水會渡亦二劒水曰水回合田渡在處杜甫州有北八十水會渡里即詩彭道將池在閬中將縣南漢魚池在書西地理南寰志閬宇記中四縣夷彭述道將云州池在東南南彭有南道池東西二里南北約五里州西南十里有郭池周約五十畝二池與漢志相符方輿勝覽彭道將池即今南池魚池即今郭池也舊志自漢以來堰大斗小斗水溉田里人賴之唐時堰壞漸成平陸玉鞭池在通江縣西十里壁山上龍池在通江縣北三里怪石崢嶸水自石隙出漫溢成池不涸老池潭在蒼溪縣西以沙為岸産魚黑龍潭在廣元縣南三十里三山屹立林木鬱秀宋時利州久旱郡守於潭酌水禱之大雨三日龍潭在通江縣東二十里相傳有龍出此化馬騰躍漢王潭在劒州西南一百二十里其側有漢王廟因名龍爪灘在閬中縣南嘉陵江中輿地紀勝雍熙中閬中光聖院山下江中有龍爪灘出馬未幾陳氏二元繼出元豐中大像山東北江中又有灘生里人亦以龍爪名之無祐六年馬涓果擢第一九井灘在廣元縣北一百八十里一名空舲灘江流所經也舊有巨石為行舟患宋轉運使陳鵬鑿平之有記菖蒲澗在南江縣東二里旁有石崖下有龍潭下流入巴江醴泉在南部縣治西水甘如醴因名玉女泉在昭化江一里縣東許山輿地下大紀勝在縣旱不竭自桔柏泉而上二里許有玉女房涼水泉在大昭化縣東路旁冬溫桔柏夏涼渡君子泉在巴州東南中流出四十清洌里廢無比曽口又有縣西朝陽巖其泉白二潮衆在州北三十巖石五里前提調官臣鄭紹謙恭纂輯提調官臣張日章恭覆輯前校對官臣沈苐恭校校對官臣沈維鈺恭覆校
