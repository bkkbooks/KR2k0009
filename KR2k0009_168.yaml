洪武初知信宜縣愛民若子尤有清操客有獲魚以獻者遣人投之江中倪望吉安人洪武𥘉為石城縣丞當兵燹之後勞來安集民免流離邑舊無城乃率民築土城計二百五十丈遂藉以捍衞吳春湖廣人天順𥘉知化州廣西流賊豎二樓於城外俯矙攻城春募敢死士奮勇出城鈎焚其樓力戰破走之孔鏞長洲人成化初知高州府先是鄉民避猺賊趨城知府劉海不納鏞至開門納來者加意撫循流亡日至又招降劇賊數千人境内大定尋擢按察副使分廵高雷二府招徠劇賊梁定等分田與耕遂為官備他盜廣西賊犯信宜岑溪諸縣皆擊敗之治績聞賜誥命旌異滕漢興州人由廣東都指揮同知守備高州兼攝叅將廵哨高雷廉三郡成化三年西賊掠石康遂犯靈山漢追之奪囘石康縣印乘勝窮追誤陷泥淖伏宼羣聚漢大呼躍岀單騎力戰創重猶以三矢斃三酋而死賊亦驚畏遁去李時敏樂平人成化中知信冝縣有才武從孔鏞共平猺賊以功遷知化州粤人並稱孔李云陳綱潮陽人成化初知石城縣時民苦猺賊多他徙綱勞來安集流亡復歸請於上官奏減逃絶漁課米七百餘石總督韓雍薦為本府通判從副使孔鏞撫治􅍹民不憚瘴厲險阻綏懷遠邇猺俱向化鄒智合州人宏治中以庶吉士上疏劾内閣萬安劉吉謫石城所吏目總督秦紘檄召修書乃居會城吳國倫興國人嘉靖中以給事中謫外厯知高州府倭宼逼城勢甚猖獗國倫謹烽堠遣士卒岀戰斬首數十級倭懼而退一郡獲安李渭思南人嘉靖間為高州府同知却猺賊拒屬邑餽遺行一條鞭法劑量多寡官為主辦悉放民歸耕程文德永康人嘉靖中由編修謫信宜典史總督陶諧延主蒼梧書院尋還信宜創麗澤書院以教學者復至高州主高明書院其敎專主立志士多信從王許之高安人萬厯初知電白縣值倭宼之擾招徠撫綏百廢具舉平積宼四百餘黨境内晏然祝簡衡陽人萬厯初知化州履畝清丈捐浮糧五百餘石有富民殺人夜持千金求免却之在州數年吏治稱最本朝羅麗宸奉天人順治十一年知高州府英敏廉幹心存撫字嘗屬疾不視事聞堂下有呼冤聲力疾出問白其冤時兵燹後富民苦重役多用賄免麗宸即以所賄助役而均其徭藩下悍將以客兵駐府白晝攫於市麗宸馳説其將下令約束民乃安堵後以赴省疾卒民甚哀之王訓河南人順治中知石城縣時城市荒蕪訓多方招徠流亡始集總兵鎮邑增築城壕動多徵索訓調劑有方民得不擾卒於官囊槖蕭然沈弼普安人康熙三十八年知高州府除陋規清盜源加意拊循治尚安靜尋以公務卒於陽春士民哀之祀名宦吳存義漢軍正黄旗人康熙年間任高州府倅清操自矢督捕有方萑苻屏跡祀名宦李廷樞無錫人康熙進士任信宜令正身率物約己裕民革私徵省差役絶請託杜苞苴民甚德之在任甫六月卒於官遠近奔赴號泣四十三年祀名宦邱崇文奉天人康熙二年知化州加意安輯凡兵丁所至供億之費十減五六化人祠祀之秦松無錫人康熙十九年令吳川招降土宼豁免荒糧修葺學校卒祀名宦人物漢李進字子賢高興人補郡功曹遷都尉永和二年荆蠻叛進爲武陵太守帥兵破之在郡九年中平間代賈琮爲交趾刺史奏請依中州例貢士後阮琴以茂才仕至司隸校尉交趾士人得與中州同選實自進始唐馮盎祖寶本龍城人梁大同中爲高涼太守娶於高涼洗氏子孫遂爲高涼人盎於隋末盡有番禺蒼梧朱崖地自號總管或說盎曰公克平二十州地數千里名位未正請上南越王號盎曰吾居越五世矣常恐忝先業敢自大哉武德五年歸附授上柱國高州總管封越國公子智戴勇而有謀能撫衆得士死力入朝授衞尉少卿累遷左武衞將軍宋鞠杲吳川人元祐初登進士第光符二年入京師上書數千言數章惇等妨賢誤國之罪惇怒以呆隷黨籍梁楚電白人紹興中攝博白令交宼破城被執以火炙之罵不絶口而死詔贈禮部侍郎陳燾電白人事母至孝紹興間母死卜葬燾盲目十年必欲臨窆負土親屬止之不從索途一二里雙目頓開人稱爲孝感潘惟賢茂名人宋末爲本縣尹元兵至被執憤罵不屈而死其子斗輔持劍馳敵寨報仇弟欲俱往曰汝宜存祀母俱殞獨赴敵而死黄十九電白人爲高州路廵檢元兵追帝昺於莊山力戰死之陳惟中字子敬吴川人寶祐進士任文昌縣景炎中轉餉艘至井澳元將劉深縱火焚艦惟中與司户何時被創力戰值天反風餉艘乘上流亦縱火深兵始退陳子全惟中兄爲廬陵丞景炎二年同主簿吳希奭尉王夢應勤王復袁州已而湘郡諸縣陷没子全中流矢希奭力戰俱殁夢應收殘卒趨永新未幾亦卒廬陵稱為三忠元郭羅佐石城人元初以平海宼有功授朝列大夫化州路總管尋改廣州路運糧至海北遇警罵賊而死長子震敦武校尉化州路把總同死難次子奇雷州府同知奉檄討猺賊被害奇子元珪亦以救父死孫仕顯襲武德將軍廉州同知至正間以剿海宼戰殁於石港一門相繼死節粤人稱為五節羅家張恒電白人泰定間為本邑千户猺賊逼城諸將皆怯恒獨躍馬出戰竟以無援死邑人祀之張友明吳川人至正九年從游宏道為先鋒討海宼力戰而死吳世紹吳川人母病瞽行哭求醫時以舌餂遂復明一日樵於隔江聞母暴病不暇待舟乘筏而渡竟溺死明陳思賢化州人洪武間舉人為漳州敎授成祖繼統詔至慟哭集諸生伍佐原陳應宗吕賢林珏鄒君默曾廷瑞設舊君位於明倫堂哭臨如禮郡人執送京師俱死之嘉靖中立祠祀焉蔣資化州人洪武進士官郎中成祖時以諌下獄謫戍尋召還為濟寕知州廉能簡易敎行惠孚民甚德之林雄茂名人成化初流賊四起雄與電白人符瓊倡義保障鄉里從知府劉海防城賊不敢近後知府孔鏞薦之督撫授以冠帶從破諸賊奮力先登並以戰死後人立義壯祠祀之