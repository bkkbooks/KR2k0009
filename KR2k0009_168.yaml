body:
  text: 高州府在廣東省治西南一千十里東西距五百十里南北距三百十五里東至肇慶府陽江縣界一百九十里西至廉州府合浦縣界三百二十里南至限門海一百十五里北至廣西梧州府容縣界二百里東南至陽江縣界一百九十里東北至羅定州界一百二十里西南至雷州府遂溪縣界二百里西北至廣西鬱林州博白縣界二百二十里自府治至京師八千六百四十七里分野天文牛女分野星紀之次建置沿革禹貢揚州南境秦爲南海郡地漢爲合浦郡高涼縣地三國晉宋爲高涼高興二郡地梁爲高州地又分置電白郡惰平陳郡癈爲高涼永熙二郡地時茂名電白二縣屬高涼郡良德縣屬永熙郡唐初屬高州武徳四年置南宕州貞觀八年改潘州治茂名二十二年又徙置高州始自高凉移治良德天寶初改高州曰高涼郡潘州曰南潘郡乾元初復曰高州潘州皆屬嶺南道五代屬南漢宋開寶五年省潘州入高州仍曰高涼郡屬廣南西路景德元年州廢屬竇州三年復置元至元十五年置高州路安撫司十七年改總管府屬湖廣行中書省大德八年屬海北海南道明洪武元年改高州府屬廣東布政使司本朝因之屬廣東省領州一縣五茂名縣附郭東西距一百十五里南北距一百七十里東至電白縣界五十里西至化州界因之信宜縣在府東北八十里東西距一百五里南北距一百七十里東至茂名縣界二十里西至廣西梧州府容縣界八十五里南至茂名縣界五十里北至容縣界一百二十里東南至茂名縣界三里東北至羅定州西寕縣界一百里西南至茂名縣界二里西北至廣西鬱林州北流縣界一百里漢蒼梧郡端谿縣地梁分置梁德縣兼置梁德郡隋平陳郡廢開皇十八年改縣曰懷德屬永熙郡唐武德四年析懷德置信義縣兼置南扶州貞觀元年州廢屬瀧州二年復置五年又廢屬瀧州八年復置改曰竇州天寶初曰懷德郡乾元初復曰竇州屬嶺南道五代屬南漢宋開寶中省懷德入信義太平興國初改信義曰信宜仍為竇州治熙寕四年州廢以縣屬高州元屬高州路明屬高州府本朝因之化州在府西南九十里東西距一百五里南北距二百里東至茂名縣界二十五里西至石城縣界八十里南至吳川縣界四十里北至廣西鬱林州北流縣界一百六十里東南至吳川縣界六十里西南至呉川縣界六十里東北至茂名縣界四十里西北至鬱林州陸川縣界一百六十里漢合浦郡高涼縣地晉為高涼郡地劉宋分置羅州縣屬高涼郡蕭齊復立高興郡梁置羅州及石龍郡又分置石龍縣為州郡治隋平陳郡廢大業初州廢以石龍縣屬高涼郡唐武德五年復以石龍縣置羅州六年改南石州貞觀九年改曰辯州天寶初曰陵水郡乾元初復曰辯州屬嶺南道天祐元年改曰勲州五代屬南漢仍曰辯州宋太平興國五年改曰化州陵水郡屬廣南西路元至元十五年立化州路安撫司十七年改總管府屬海北海南道明洪武三年改置化州府八年降為州省石龍縣入焉九年又降為化縣十四年復曰化州屬高州府本朝因之吳川縣在府南一百二十里東西距六十五里南北距五十里東至海岸五里西至化州界六十里南至限門海二十五里北至茂名縣界二十五里東南至海岸七里東北至茂名縣界二十里西南至雷州府遂溪縣界八十里西北至化州界五十里漢高涼縣地隋置吳川縣屬高涼郡唐屬羅州宋元屬化州明洪武八年改屬高州府本朝因之石城縣在府西南一百九十里東西距一百六十里南北距一百五十里東至化州界三十里西至廉州府合浦縣界一百三十里南至雷州府遂溪縣界三十里北至廣西鬱林州博白縣界一百二十里東南至吳川縣界六十里東北至鬱林州陸川縣界一百二十里西南至遂溪縣界七十里西北至博白縣界一百五十里漢合浦郡合浦縣地劉宋為高涼郡羅州縣地梁為石龍縣地唐武德五年析置石城縣屬羅州六年移羅州來治天寶元年改縣曰廉江又改州曰招義郡乾元元年復曰羅州屬嶺南道五代屬南漢宋開寶五年州縣俱廢入吳川乾道三年復析吳川置石城縣屬化州元因之明洪武八至改屬高州府本朝因之形勢土厚山環高而稍涼故以名郡寰宇記銅魚三山揖其前寶峯絶頂拱其後宋劉棠州學記郡據叢山中去海百里輿地紀勝風俗民尚簡儉易於取足絶無醫藥遇疾惟祭鬼以祈福圖經四時之候多燠少寒春多遇雨差凍頃刻日岀復如四五月天氣然亦無甚瘴癘輿地紀勝榖熟時里閈同取戌日為臘聚會作歌悉以高欄為居號曰干欄三日一市寰宇記城池高州府城周六百七十一丈門五東南北池周五百四十丈西以江為塹明洪武中建本朝康熙十七年修乾隆八年嘉慶十六年重修茂名縣附郭電白縣城周一千八十四丈門四池周一千一百五十四丈原為神電衞城明永樂中建成化四年改為縣城本朝順治九年修乾隆三年重修信宜縣城周五百二十五丈門四東西南三面環竇江無池明正統五年建本朝順治十三年拓建嘉慶十八年修化州城周五百六十三丈門二西近山麓北臨大江東南池長二百二十丈明正統中建本朝雍正八年修乾隆二年十二年重修吳川縣城周五百八十丈門四池周六百八十丈明洪武中土築永樂元年甃甎本朝乾隆三年修五十三年重修石城縣城周五百三十七丈門三北倚山東西南池長三百九十五丈明洪武中土築正統五年甃甎本朝順治十三年修學校高州府學在府城東隅明洪武二年建本朝順治十五年重建康熙六年修雍正七年乾隆三年嘉慶二十四年重修入學額數二十三名茂名縣學在城内西北明洪武十四年建尋遷城外東山正德五年復建舊所本朝康熙二十二年修五十一年雍正八年乾隆四年二十一年嘉慶二十三年重修入學額數十五名電白縣學在縣治東南明成化四年建本朝順治十七年修康熙二十七年五十二年雍正三年重修入學額數十二名信宜縣學在縣治東元至正中建明嘉靖間遷於縣左本朝康熙五年復建舊所二十八年修雍正三年乾隆四年重修入學額數十名化州學在州城南門外宋嘉定二年建元明以來屢遷本朝乾隆十三年建復今所入學額數十二名吳川縣學在縣治東元至正中建本朝康熙二十三年修雍正五年即分司署址改建乾隆四年五十一年重修入學額數十二名石城縣學在縣治左元天厯間建明成化嘉靖萬厯間屢遷本朝康熙十三年復建今所二十五年修乾隆四年二十二年重修入學額數八名高文書院在府城東嘉慶六年建敷文書院在府治西舊為筆山書院明隆慶中建本朝雍正八年改建易今名羅江書院在化州城内訓導署右舊為義學乾隆八年拓建易今名正誼書院在吳川縣舊學左明萬厯中建本朝康熙三十年重建松明書院在石城縣治東隅宋蘇軾謫儋州經此有詠松明大詩後人即其地建書院尋廢本朝康熙五十年重建起鳳義學在信宜縣城内康熙五十一年建按舊志載茂山書院在府城西晉高涼太守楊芳著書處翔龍書院在吳川縣碙洲宋景炎中建今並廢謹附記户口原額人丁四萬七千二十三今滋生男婦大小共二百三十三萬五千五百一十六名口又屯民男婦共一萬五千五百六十二名口田賦田地山塘共一萬九千一百五十一頃四十八畝一分有奇額徵地丁正雜銀六萬四千九百九十七兩九錢七分六釐遇閏加徵銀一千七百九十二兩七錢七釐米二萬三千三百七十六石一斗六升一合六勺屯田共一百頃八十二畝四分有奇額徵屯米一千五百五石二升四合一匀山川東山在茂名縣東一里一名潘山峯巒高聳環抱郡治為郡主山輿地紀勝山前有潘仙坡為道士潘茂名煉丹處石龜山在茂名縣東十里麓有小石形如龜首又化州西南二十里亦有石龜山上有巨石龜形扣之聲響若鐘潘山在茂名縣東三十里寰宇記昔潘茂名於此昇仙因以名山通志縣東三十里有雲鑪山即此銅魚山在茂名縣東四十里下有石井輿地紀勝與郡治相對賴仙翁高涼風土歌云一條丁水銅魚寨即此謝賴山在茂名縣東四十里高百餘丈一名射賴岡龍湫山在茂名縣東輿地紀勝在郡東二十里下有石穴泉源四時不竭禱雨立至因立廟焉通志謂之靈湫山在縣東五十里大小二巖聯峙有石室可容數百人曲折窈㝠最為奇勝筆架山在茂名縣東南十里三峯高聳按府志明知府孔鏞創潘仙亭於筆架山椒其亭遺跡至今尚存射牛山在茂名縣東南二十里高聳而秀俗呼石牛山上有二潭有水流為東河百祿山在茂名縣南十五里稍南又有古祿山巴山在茂名縣南寰宇記南巴縣取縣東南巴山為名又毛山在舊潘水縣東二十里相傳毛女隱此按南巴潘水二廢縣皆在縣南二山應在縣南界仙山在茂名縣西南隔水寰宇記亦潘茂名煉丹處上有昇仙觀通志名昇真山在縣西半里有觀在其巔一名觀山山頂有二井曰金井玉井前有石脊穿城出江干突露石角水常旋渦𧖟山在茂名縣西南三十五里以形似名俗呼王商嶺其右又有那石山高八十餘丈横鎮水口武壇山在茂名縣西高百歩輿地紀勝其山圓淨如將壇寶山在茂名縣北四十五里形如圓珠故名輿地紀勝山巔有登高亭下有送龍岡淋水山在茂名縣北五十里山最高聳接信宜縣界監山在茂名縣東北輿地紀勝在寳山之北舊有銀坑通志謂之監山在縣東北四十里下有澄溪如鏡曰鑑水射狼山在茂名縣東北寰宇記在良德縣界去州十里昔有人射白狼於此新志在縣東北四十里高涼山在茂名縣東北寰宇記在良德縣界去州十里輿地紀勝在郡東四十里羣山森然盛夏如秋新志在縣東北五十里廟岡山在茂名縣東北輿地紀勝山在郡東六十歩大應山在茂名縣東北五十餘里接信宜縣界輿地紀勝有千歳山在電白縣北四十里或曰即大應山要龍山在茂名縣東北輿地紀勝在電白縣東六十里相近有雙甑山舊志有大帽山在縣東北八十里連延數十里猺人散處其中疑即要龍山波浪山在茂名縣東北寰宇記在良德縣界去州七十里岡壠如波浪相傳海沫漂成通志有白水山在縣東北八十里山上飛泉直瀉中有白石鮮明一名白水嶺疑即波浪山朝烏山府志在電白縣東十里為邑左輔青峙山在電白縣東南二十餘里曰小青峙山又東南十里有大青峙山皆挺峙海中為縣捍衞蓮頭山在電白縣南十里有崔嵬豐平二峯並峙海濱為縣案山下有沙磧自東而西控扼海門汾洲山在電白縣西南二十里海中又西十里為放雞山航海者皆以雞祀焉晏鏡山在電白縣西南九十里赤水港西又南五里為晏鏡嶺臨海響水山在電白縣西二十里山有高溜下流琮琤故名又五里為雙木山熱水山在電白縣西三十里下有温泉山氣常暖其筍常先春而生又西十里為龍門山樂山在電白縣西輿地紀勝在信宜縣東南二百二十五里舊志在縣西六十里一名安樂山高百餘丈雄峙一方茶山在電白縣西北十里寰宇記廢保定縣有茶山帽澇山在電白縣西北寰宇記在廢良德縣界北至高州九十三里當亢陽山有雲如帽即雨下有帽澇水奇壁山在電白縣西北十五里亘二十餘里上有石如壁危如削成一名碧山又名石壁山大橋河出焉蛟潭山在電白縣西北三十里又五里爲金山四山皆赤相傳有金簕山在電白縣西北四十里東西亘數十里爲南北通道有閘以扼北來諸路之衝又名千歳山又北十里爲佛子山上有石如樓樓有洞門尖山在電白縣西北六十里其形尖秀一名鼻岡下有泉浮山在電白縣西北寰宇記廢潘水縣有浮山高七百尺堯時洪水泛溢此山獨浮居