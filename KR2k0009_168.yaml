巖山徑崎嶇捐亷甃以石磴修葺橋梁去之日士庶攀轅立碑誌愛人物漢張重字仲篤合浦人才敏嗜學為日南郡從事舉計入洛明帝善其應對賜以金帛姚文式合浦人建安中舉茂才任為交州治中時歩隲為刺史欲建都會文式指畫尉佗舊治因立城郭於番山之隅綏和百粤丁茂字仲慮合浦人少孤貧事母盡孝母卒負土成墳列植松柏白鹿馴遊其下太守察其行舉孝亷不受辟召三國呉李祖仁合浦人兄弟十人同居並孝慈亷讓五鳳初交州上其事詔爵三級復其家唐甯純字如和欽江人世爲俚帥父宣在隋爲合浦太守武德中歸附宣卒以純爲越州刺史善撫衆能以詩書敎其宗人蠻俗向化徙刺合州卒於官甯原悌純從孫永昌進士授校書郎開元中以諌議大夫兼修國史元宗見直書隱巢事諭之以對忤旨去官卒葬大墓山詔發五府兵給葬姜公輔字德文欽州人應制䇿科高第授右拾遺遷翰林學士德宗器之朱滔叛公輔請帝誅其兄泚不從既而倉皇出幸公輔曰泚嘗帥涇原得士心不如追令從駕若羣凶得泚必貽國害帝又不從逮至奉天或言泚將奉迎乘輿乃詔諸道援兵距城一舍止公輔諫曰王者不嚴羽衞無以重威靈今禁軍單弱有備無患若泚誠奉迎何憚兵多帝乃悉納諸軍擢公輔諫議大夫同中書門下平章事唐安公主道薨詔厚葬公輔諫止之帝怒罷爲左庶子再黜泉州别駕卒憲宗朝贈禮部尚書宋李元方石康人崇寕間上書論廣西便民十事稱旨累遷朝奉大夫知高貴二州有治行黄渙字彦舟靈山人元符中領鄉薦累官至知梧州軍事宣和五年以選次赴京會金人入寇渙率所部官連表留駕巳而奔南京奉表勸進髙宗擢兵部侍郎建炎三年戰没贈朝奉大夫秘閣修撰宫一子明陳善住欽州人洪武中貢入太學授山西平陽衞經厯擢宰蒲縣厯任三十餘年妻子不入官舍勞心撫字吏民懷之韓珠字子瓊石康人永樂進士授刑部主事尋升員外郎厯山西右㕘政爲政明恕甚得民心鄭韺字汝明石康人天順中母謝氏爲流賊所掠時韺年十六挺身入賊壘紿以身代母歸取金贖賊拘韺而釋其母韺既脱母言笑自若賊殺之檀昭靈山人太學生有勇略景泰間盜起知府饒秉鑑令統民兵爲保障與賊大小二十餘戰馘斬六百餘級後廣西龍山賊攻陷城邑戰死林榮字仲仁合浦人成化進士厯禮科給事中抗直敢言不避權貴時各省運糧入京中官多侵刻榮疏論之弊始革後滿喇咖國請封以榮充正使泛海溺死詔贈禮科都給事中遣官諭祭䕃一子湛鉞亷州人任本衞指揮升廣州都指揮僉事宏治十四年儋州賊符南蛇與諸黎攻陷郡邑鉞領兵渡海聞賊分兵攻臨高由間道遶賊後擣其老營賊亟退而官軍巳扼其歸路因出其中橫擊之斬首七百餘級生擒賊首南蛇聞之遁去李國華靈山人嘉靖中山賊殺其父國華矢心復讎持刀赴鬬為賊所害莫如勤靈山人少勵志於獨石峯絶險處搆室讀書嘉靖十二年賊越城劫庫殺百户邵經時如勤方家居請兵躡其後訊知首惡所居直搗其巢擒送幕府施敦合浦人事親孝親殁廬墓三年萬厯中詔旌其門本朝戎士祥欽州人少孤事母孝服勞奉養務得歡心母病侍湯薬不離左右厠牏垢裳必親浣滌鄉人稱之章憲欽州人四川督標左營守備嘉慶元年隨剿湖北敎匪陣亡奉㫖賜卹王瑞鳳欽州人龍門協標把總嘉慶五年出洋緝捕追賊𬒳傷落水卒八年奉㫖賜卹馮敏昌欽州人乾隆戊戌進士由翰林編修改刑部主事丁父憂既葬廬墓旁三年母殁亦如之篤學敦行誼以家産析與諸弟毫無所取自為諸生時已以詩名晚尤深造敎授於鄉必舉立身行巳之大節為訓亹亹不倦著有師友淵源集孟縣志華山小志河陽金石録小羅浮草堂詩集行於世嘉慶十三年祀鄉賢祠流寓漢母將隆蘭陵人王莽少慕與交不肯附及秉政孔光奏隆前治中山馮太后獄不平免官徙合浦唐張説洛陽人武后時張易之誣害魏元忠引説為助后親臨問説言臣實未聞易之敎臣耳后怒流説欽州宋蘇軾眉山人紹聖中以元祐黨謫居海外徽宗立移亷州陳瓘沙縣人徽宗時以左司諫貶袁州移亷州杜門謝客自署其居曰了齋魏安行樂平人大觀中為京西轉運副使梓行程瑀論語解秦檜疑其議已編管欽州吕祖泰河南人上書請誅韓侂冑蘇師旦周筠而逐陳自强杖配欽州牢城列女明李清女名蘭香合浦人指揮張某聘為子婦張後以女贫别議婚女誓不再適父母强之女乃書張氏子姓名置懷中自縊翁天經妾荀氏合浦人事嫡甚謹天經與妻相繼殁荀竭力殯葬服除有謀奪其志者翦髪以誓尋哀毁而死倪聰女欽州人許字李時芳未嫁夫卒有議婚者輒不食人莫覩其面父凡殁依嫂守節年七十五萬厯十二年旌本朝龎玉振妻范氏合浦人年二十二夫亡守節康熙四十三年旌李氏女名瓊娘合浦人許字孔宗周未歸而夫夭欲赴䘮不許遂在母家守志年七十五歲而終郝氏女合浦人許字黄士熙士熙遠遊以寇亂不相聞有黄某欲强娶之女投繯死何廣珍妻蒙氏靈山人性端莊不苟言笑里中有惡少挾刃潛入其室大呼力拒連被數刀死康熙四十七年旌李元章妻陳氏靈山人年十九而寡守節三十五年同邑李鉉璋妻陳氏均雍正六年旌王廷獻妻熊氏合浦人夫死一子始周歳以舅姑老拮据營甘㫖奉之苦節四十三年乾隆十三年旌何世燦妻施氏靈山人年二十而寡家貧守節養姑採野菜至樟木江邊遇賊挾刃脅之將自投於江為所持乃以頭擊石面目盡裂賊殺之乾隆十年旌同邑節婦黄世莊妻陳氏寗浚昌妻趙氏均乾隆年間旌陳相度妻徐氏合浦人夫亡守節嘉慶七年旌同邑譚超淵妻馮氏黎鳳岐妻姚氏均嘉慶年間旌李超伋妻馮氏欽州人夫亡守節嘉慶二十三年旌同州黄洲海妻呉氏方定繩妻曽氏郭寓邦妻孫氏劉文縉妻錢氏彭敦本妻潘氏均嘉慶年間旌葉乘桂妻何氏靈山人夫亡守節嘉慶四年旌同邑仇汝康妻容氏伍之逹妻利氏子允寛妻李氏陳居達妻林氏烈婦李某妻黄氏均嘉慶年間旌土產金元和志欽州貢銀唐書地理志亷州欽州陸州貢珠寰宇記亷州産珠蚌翠羽府志欽州陸州貢玳瑁唐書地理志陸州貢鹽明統志州縣俱岀鼊皮唐書地理志陸州貢甲香唐書地理志陸州貢餘甘子寰宇記欽州岀一名菴羅果高良薑唐書地理志欽州貢孔雀明統志欽州岀
