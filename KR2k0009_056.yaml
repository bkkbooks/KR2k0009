練兵攻守發飛礮打賊數萬既而賊攻城將潰令望猶手刃二賊自投火不死遂為賊所執賊誘以好言令望罵不止賊怒殺之死年五十二子興及家口二十餘人同日死士民死者二萬餘人值末季喪亂未得恩恤太康人私謚忠烈本朝乾隆四十一年賜謚忠烈趙克寛字得軒武鄉諸生工詞賦崇禎末流賊陷城率衆巷戰為賊所執脅之跪克寛詈賊至死猶噴血賊面子廷舉性至孝母病祈藥武當往返四千餘里母尋愈久之母卒哀毁廬墓聞父克寛被執將死廷舉號泣求代不得巳而紏衆復讐手刄賊首賊圍之即投井死廷舉子夢鯉謁選都門夢父血流盈面心動即歸中途聞難哀毁幾絶終身不仕李之沆武鄉人崇禎末流賊至境扶父避匿道遇賊被執父善醫賊强之診視不肯賊怒欲殺之沆請身代不許賊並殺之魏以繼武鄉諸生應省試母喪慟哭奔歸時寇亂所親力阻其行不得曰母死不歸禽獸也即死賊手猶得免於禽獸至陰辿果被執大罵不屈死本朝趙天騏字平符武鄉人克寛孫廷抃子廷抃為諸生通經術尤明於禹貢天騏幼稱神童明崇禎末進士甲申闖賊遣其黨來聘天騏焚冠服投深崖下衣挂於樹不得死順治初以遺佚薦姜瓌之亂授偽官不從刧其家亦不為動母卒廬墓三年種園織麻以供父父卒遂不食死著有續高士傳等書行於世呉琠字伯美沁州人順治庚子進士知河南確山縣以卓異授吏部主事厯文選司郎中累擢副都御史疏言督撫宜巡厯地方以知守令賢否又請復巡撫巡道管兵舊制以備緩急擢兵部右侍郎巡撫湖北清吏治定人心活陜西流民在境者四萬人尋總督湖廣時值酌裁兵額琠區畫得宜人情怗然汁左都御史聖祖仁皇帝嘉其清廉升授為刑部尚書拜保和殿大學士卒謚文端雍正十年詔入賢良祠程乘龍武鄉人父死寇突至從容殯殮號哭盡禮賊異而問之乘龍指櫬嗚咽曰父死不殮非人也棄父得生猶死也賊義之助瘞致奠而去趙簡武鄉諸生七歲喪母號泣欲殉事繼母如所生侍病衣不解帶後父卒哀毁骨立三年未嘗入私室雍正十年旌李秦字西聖沁州人父星一為讎者陷入獄秦竭力營救前後凡六年以父之故食止粗糲嚴冬著單布衣卒以擊登聞鼔得白父冤親死廬墓三年為諸生四十年研窮經史視聲色貨利去之若浼人咸敬之卒年六十有五入鄉賢祠劉青藜字奉若本州嵗貢生節婦王氏子值兵亂負母攜弟晝伏夜行卒兔於難母歿撫幼弟成立與呉琠為貧賤交琠貴青藜猶弟呼之同州孝子劉瑞呉時練劉企向秦珍秦駿劉光蔚王珍李生穉俱乾隆年間旌劉漢鼎沁源人止一子具弟夫婦俱歿亦止一子歲大歉謀諸婦郭鬻子以全其姪人比之鄧伯道焉李仙標武鄉諸生孝行著聞同縣孝子武習路武籙長武光前李玖俱乾隆年閒旌流寓隋王通龍門人寓居銅鞮紫金山有石室元杜思敬豐子隨父寓沁州仕至中書左丞列女明杜氏襄垣人為武鄉墨鐙村民王氏婦家貧歲饑有里豪欲以非禮犯杜嚴肅不可近豪乃賄其姑以勢迫之日見笞撻畧無二志後豪肆强暴杜疾走投崖死魏國才妻程氏武鄉人年十九夫亡子爍甫三月程日夜寢苫塊意不測姑諭之曰若死孤亦死魏不血食矣程悟忍死營葬畢織麻縷以為食伯叔兄弟歲時饋遺概弗受事姑盡孝訓子有成事聞旌其門宋朝妻朱氏沁源人年二十夫亡無子食貧守志親黨爭勸之嫁朱注水於甕埋三尺許覆以石板召勸嫁者環左右而誓曰待此水乾時吾當嫁也自是衆不敢復言居六十餘年卒馮烈女父九金襄垣人寄武郷攀龍鎮字里民胡棟因棟貧議改字富室女曰貧富易操何顔人世遂自縊呉明道妻史氏沁源人崇禎末為流賊所獲賊衆醵飲脅坐行酒史涕泣不顧乘閒出投厠賊挽起為易衣頃復投之賊怒擊以瓦石死又張光斗妻呉氏被執上馬輒自投地賊斫殺之駢應春妻陶氏沁源人應春方汲井上賊驟至被殺陶聞難奔赴抱屍痛哭投井死又張薦妻張氏𬒳寇縛馬上乘閒投地亦赴井死史光顯妻劉氏武鄉人流寇亂舉家匿窖中劉偶出執爨賊猝至被執劉紿曰樓有金帛可取也賊信之令前行甫登樓即闔户自樓窗投地死又韓家奇妻李氏賊至舉家被執獨悦李不加刄李怒罵投崖死董國章女武鄉人流賊至𬒳獲女投厠賊曳出之女大罵被殺又李克林女僑居攀龍鎮賊攻寨急揚言多與我婦女即解去女聞恐被辱墜崖死本朝王悦曾妻張氏本州人年二十三夫亡一女五嵗夫弟二皆幼張善撫之有求婚者張色拒之曰俟二叔有室女有家吾有以自處也越十餘平婚嫁畢曰吾事盡矣闔户自縊閻尚名妻程氏本州人夫亡守節康熙年間旌劉萬祚妻李氏沁源人姜瓖之亂同夫避難遇賊殺其夫大罵求死賊殺之又王簡妻李氏王攀龍妻王氏並為賊掠罵不絶口遇害史翼經妻姚氏沁源人少寡守節越數年夫弟衞經又死翁泣謂衞經婦朱氏曰我耄不足恃媳可自為計朱曰姆為人婦兒獨非人乎與姚同守志厯四十餘年卒與同縣節婦李敬忠妻呉氏先後旌武一貫妻王氏本州人守正捐軀同州節婦秦繼緒妻葛氏王龍珠妻程氏楊培堂妻李氏楊培模妻王氏楊秉貞繼妻陳氏王翼妻陰氏呉瑛繼妻梁氏郭營岐妻劉氏劉青玉妻秦氏王肅妻楊氏楊燦妻李氏楊春肇妻程氏李現紅妻李氏呉志妻王氏宋璐繼妻戴氏劉汝勵妻呉氏俱乾隆年閒旌劉柱女武鄉人姜瓖亂縛劉上馬行過高崖躍身墮崖下家人購其屍見一虎守其旁體完如生同縣烈婦王賢妻史氏節婦魏晉封妻董氏趙泰晟妻魏氏李玖妻李氏程禹臣妻李氏段恭侯妻程氏段康侯妻韓氏閻耀妻李氏郝芳葉繼妻任氏郝人宣妻李氏俱乾隆年閒旌牛石柱妻王氏本州人守正捐軀嘉慶二十三年旌張炎妻南氏沁源人夫亡守節嘉慶二年旌武澍妻魏氏武鄉人守節撫孤同縣節婦蔣