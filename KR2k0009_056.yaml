body:
  text: 沁州在山西省治東南三百十里東西距四百二十里南北距四百里東至潞安府黎城縣界二百十里西至霍州界二百十里南至潞安府襄垣縣界七十里北至太原府太谷縣界三百三十里東南至襄垣縣界八十里西南至平陽府岳陽縣界一百七十里東北至遼州榆社縣界八十里西北至汾州府平遙縣界一百五十里本州境東西距九十里南北距一百十里東至武鄉縣界三十里西至沁源縣界六十里南至襄垣縣界七十里北至武鄉縣界四十里東南至襄垣縣界八十里西南至沁源縣界六十里東北至武鄉縣界三十五里西北至平遙縣界一百五十里自州治至京師一千七百里分野天文參井分野實沈之次建置沿革禹貢冀州之域春秋晉銅鞮邑戰國屬韓後屬趙漢爲上黨郡銅鞮穀遠等縣地後魏延和二年以銅鞮縣屬鄉郡建義元年置義寕郡治沁源縣隋開皇初郡廢十六年置沁州兼領銅鞮縣大業初州廢二縣皆屬上黨郡義寕元年復置義寕郡唐武德元年復曰沁州天寳元年改爲陽城郡乾元元年復爲沁州屬河東道宋太平興國二年始於銅鞮縣置威勝軍屬河東路六年省沁州入焉金天㑹六年復升軍爲沁州屬河東南路元光二年又升爲義勝軍節度元曰沁州屬晉寕路明洪武初省州治銅鞮縣入州九年直隸山西布政使司萬厯二十四年改屬汾州府三十二年復舊本朝因之屬山西省領縣二沁源縣在州西少南一百二十里東西距一百五十里南北距二百里東至本州界五十里西至霍州界一百里南至平陽府岳陽縣界五十里北至汾州府平遙縣界一百五十里東南至潞安府屯留縣界五十里西南至岳陽縣界四十五里東北至本州界六十里西北至霍州靈石縣界一百三十五里漢置穀遠縣屬上黨郡後漢因之晉省後魏建義元年置沁源縣兼置義寕郡隋開皇初郡廢十六年於縣置沁州大業初州廢屬上黨郡義寕元年復為義寕郡治唐武徳初復置沁州天寳元年為陽城郡治乾元初復為沁州治五代因之宋太平興國六年沁州廢以縣屬威勝軍金初屬沁州元光二年於縣置榖州元初州廢明仍屬沁州本朝因之武鄉縣在州東北六十里東西距二百五十里南北距五十里東至遼州界一百十里西至汾州府平遙縣界一百四十里南至潞安府襄垣縣界三十里北至遼州榆社縣界二十里東南至襄垣縣界四十里西南至本州界二十五里東北至遼州界八十里西北至太原府祁縣界一百二十里漢置涅氏縣屬上黨郡後漢曰涅縣晉因之後魏分置鄉縣延和二年兼置鄉郡永安中省涅縣東魏置南垣州尋改豐州後周州廢隋開皇初郡廢縣屬上黨郡唐屬潞州武后時改曰武鄉縣神龍元年復為鄉縣後又曰武鄉縣五代因之宋太平興國二年改屬威勝軍金屬沁州元至元三年省入銅鞮縣後復置明屬沁州本朝因之形勢漳水環其前綿山鎮其北太行拱其東霍太峙其西峯巒環曡川澤瀠洄州志風俗其地磽瘠氣候遲暖而早寒通志其俗勤儉樸實專力耕農少事商賈明通志城池沁州城周六里有奇門三元末築明崇禎中甃甎本朝順治十六年修康熙三年六年重修沁源縣城周二里有奇門三池廣二丈元時土築明萬厯中甃甎本朝康熙二十八年修雍正七年重修武鄉縣城周三里門三後魏太和中土築明崇禎閒甃甎本朝順治十六年修學校沁州學在州治西興文街明洪武中建宏治中重修本朝順治九年修康熙九年二十年重修入學額數十五名沁源縣學在西城高阜處舊在東關東南元大德閒建明天啟中移北關外崇禎中遷建今所本朝順治十五年修康熙三年十七年重修入學額數八名武鄉縣學在縣北半里石勒寨舊在縣治西南明嘉靖中遷建今所本朝康熙十一年修二十四年重修入學額數十二名銅鞮書院在州城内本朝乾隆十四年建琴泉書院在沁源縣東門外本朝乾隆十七年建户口原額人丁三萬七千五百三十五今滋生男婦共二十六萬六千八百一十一名口計四萬六千七百二十八户田賦田地一萬七百五十四頃六十畝五分有奇額徵地丁正雜銀四萬五千二兩四錢七分四釐糧八百五十三石七升有奇山川檀山在州東三十里山有九峯世傳嘗有鳳棲其上萬安山在州南四十里其地有文中子洞屬故銅鞮縣北紫金山畔蓋隋王通讀書之所東為靈泉有靈泉寺中有沖惠沖淑二真人祠故又稱二神山山為沁州諸水總匯之處自是而東南則襄垣縣界筆架山在州治西南一里三峯高出北對學宫銅鞮山在州西南四十里北史魏彭城王勰傳勰從孝文幸代都次於上黨之銅鞮山文獻通考銅鞮縣有銅鞮山明統志一名紫金山后泉山在州西南四十里一名皇后山水經注皇后水出此石梯山在州西南魏書地形志銅鞮縣有石梯水東行入漳元和志石梯山在沁州西三十里寰宇記在銅鞮縣西南七十里高一千九百尺鼊山在州西二十里開村之西北州志鼊音碧龜屬以形似名土人不識此字故舊志訛爲鼈山山下有鼊池東流入於漳水按集韻䵶鼊水蟲名似龜皮有文韻會䵶鼊龜屬似龜而曼胡無指爪其甲有珠文如瑇瑁䵶音衢州有龜山舊統志因訛鼊爲鼈州志說近是今從之堯山在州西三十里寰宇記在銅鞮縣西二十里唐天寶六載勅改爲銅鞮山山高一千五百五十尺按州志有帝堯廟今圯土人疊石爲堡名爲堯神寨此山之所由名也伏牛山在州西三十里山高十餘里周圍可四十里上有古松數百株縣志昔人見神牛隱此故名山之陽有龍泉神廟銅鞮水之源出此山後有雲洞其北與武鄉縣覆甑山相接滑山在州北三十五里甲水出焉亭亭雲表望之若芙蕖蘸水明萬厯中改名花山以山峯似花故也聖鼓山在州東北五里一名聖鼓嶺上有大圓石擊之聲如鼓故名小河水經其下流入漳河麟山在州東北二十里九域志威勝軍有麟山舊志在檀山之下爛柯山在州東北四十里接武鄉縣界小河源出此按王質爛柯事出水經注雲笈七籖爛柯山在衢州信安縣王質隱處不知州境之山何以得此名據縣志云山有王仙祠石上碁局尚存傳疑可也琴泉山在沁源縣東六里盤踞三十餘里前有靈泉西流入沁河青龍山在沁源縣東二十里青龍河出此螺山在沁源縣南二十里北石村與州西嶺相接縣志上有唐時古刹傍有石井紫金山在沁源縣西門外高十餘里縣城跨其半霍山在沁源縣西七十八里接霍州界詳見霍州碾臺山在沁源縣西九十里與霍太山相連怪石巉巖其上多韭上觀山在沁源縣西北五十里林木叢鬱上有香林寺亦名香林山靈空山在沁源縣西北六十里高千餘里盤踞五十餘里其勢陡峻石磴盤折俗名十八盤上有五龍潭半空有仙巒二橋跨㵎而過其東麓有蓋海洞靜草蒐山在沁源縣西北九十里高三十里盤踞百餘里與靈空山相連山高風猛六月寒凜寸草不生故名仁霧山在沁源縣北五十里高五里自綿山分脈延亘六七十里湱河出此青石山在沁源縣北八十里山多青石望之如黛綿山在沁源縣北一百二十里盤踞百里西北接汾州府介休縣西接霍州靈石縣界水峪河出焉龍居山在沁源縣東北八里許延亘甚遠清水河源出此五花山在沁源縣東北三十里南與青龍山相接青果山在沁源縣東北五十里上有寒泉羊頭山在沁源縣東北即古謁戾山山海經謁戾之山有金玉沁水出焉漢書地理志穀遠縣有羊頭山元和志羊頭山一名謁戾山在綿上縣東北五十里按今縣志無羊頭山蓋羊頭山在綿上縣境綿上縣自元時省入沁源縣縣志或仍舊時圖經未經詳考故也黄崖山在武鄉縣東六十里山色皆黄黄崖水出焉天城山在武鄉縣東九十里層巒複嶂邑人曾避兵於此相近又有小壑頭山五峯山在武鄉縣東一百里五峯並峙積雪至夏不消又東二十里即太行山南山在武鄉縣東南三里三原山在武鄉縣東南二十里中有平原三處故名時山在武鄉縣西南三里八角山在武鄉縣西五里山形八角馬鞍山在武鄉縣西七十里南北皆昂而中低以形似名西交山在武鄉縣西一百里以山勢相交而名麓臺山在武鄉縣西一百二十里西北接太原府祁縣及汾州府平遥縣界石臼山在武鄉縣西北七十里元和志石臼嶺在武鄉縣北六十五里縣志又西二十里為石盤山秃頂山在武鄉縣西北九十三里胡甲山在武鄉縣西北一百里一名侯甲山水經注胡甲山有長坂謂之胡甲嶺即劉歆遂𥘉賦所謂越侯甲而長驅者也寰宇記武鄉縣侯甲山今名護甲嶺覆甑山在武鄉縣西北水經注涅水西出覆甑山魏書地形志陽城縣有覆甑山涅水出焉按縣志有分水嶺在縣西北一百里涅水發源於此蓋即古覆甑山也鞞山在武鄉縣東北一里寰宇記在縣東北六十里晉載記石勒耕於野每聞鞞鐸之聲歸告其母其母曰作勞耳鳴非不祥也山以此得名横嶺山在武鄉縣東北五十里紫巖山在武鄉縣東北六十里山色皆紫故名羊徑山在武鄉縣東北接遼州界高險峻狹路若羊腸為入太行之徑其東相接者有龍巖洞即太行山麓雕巢嶺在沁源縣東南五十里高五里延亘三十里接潞安府屯留縣界州西嶺在沁源縣南門外百步許高十里延亘二十里南接螺山隋唐閒置沁州其嶺在西故名紅祠嶺在沁源縣西北三十五里上有清泉朱鶴嶺在沁源縣北四十里上有風洞絶頂有天池又土嶺在縣北八十里長二十里鐵鑪嶺在沁源縣東北十五里琴泉山後相連者為磨刀嶺下有馬圈坪青龍岡在州城東上有龍泉神祠本朝雍正五年奉㫖建先農壇知州管學宣於祠右卜地築建焉蓋海洞在沁源縣西六十里靈空山東麓玉華洞在武鄉縣東六十里洞中多產鍾乳石龍囤洞在武鄉縣東九十里深遠莫測陰辿在武鄉縣西北一百二十里兩峯對峙高出雲表中通一綫接太原府祁縣界為三晉咽喉銅鞮水在州南四十里源出州西伏牛山東南入潞安府襄垣縣界俗謂之漳河水經注銅鞮水出銅鞮縣西北石磴山東流與專池水合又東南合女諫水又東逕斷梁城又東逕銅鞮縣故城北又東南逕頃城西又南逕胡邑至襄垣入漳舊志謂之西漳河又名小漳河有二源一出伏牛山一出滑山至鼊山南合為一川南流逕州西二里又東南入襄垣縣界后泉水在州西南四十里后泉山下東北流逕州西入銅鞮水小河水在州北源出爛柯山南流逕聖鼔山下繞州城北西流入銅鞮水甲水源出州北滑山東流逕爛柯山北又東逕武鄉縣西五里南入涅水古名白鷄水水經注白鷄水出涅縣西山東逕縣北東南流入涅水沁水在沁源縣東北源出縣之羊頭山西南流合水峪河又西南流合湱河又南流逕縣東又南流合青龍河又西南流合西川河又南流合大南川又南流入平陽府岳陽縣界即古少永也左傳襄公二十三年齊侯伐晉封少水漢書地理志榖遠縣羊頭山世靡谷沁水所出東南至滎陽入河過郡三行九百七十里顔師古注今沁水至懷州武陟縣入河此云至滎陽疑傳寫錯誤水經注沁水即洎水出羊頭山世靡谷三源奇注逕瀉一隍又南會三水又南流逕榖遠縣東又南至猗氏元和志沁水一名少水出綿上縣東南二十四里覆甑山南流逕沁源縣東一里按寰宇記沁有二源一出綿山東谷一出縣東北馬圈溝俱南流至交口村而合逕縣城東而南注縣志沁有四源一出縣東北一百十里滑鳳村石崖下石穴一出縣東北一百里崖頭村北山麓俱由縣東北六十餘里琴峪村而南至縣北五十里陽城村一出縣正北百里車家嶺底由綿上鎮至陽城合流轉東一出縣東北六十里白孤窰馬圈溝至縣北四十里交口村合流而南復受諸水入岳陽界其説