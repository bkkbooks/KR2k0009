化城南門外本朝順治七年建康熙三十一年改今名崇壽寺在歸化城南門外本朝順治七年建康熙三十三年改今名永壽寺在歸化城南門外本朝康熙九年建三十二年改今名大明寺在歸化城東四十里金大定七年建今毁碑塔尚存延壽寺在歸化城西北二十五里本朝康熙二十九年改今名白塔在歸化城西四十里本朝順治九年建萬卷華嚴經塔即大明寺塔高二十丈七級有金世宗時閲經人姓氏名宦漢孟舒高祖時為雲中守時匈奴冒頓新服北夷來為邊寇孟舒知士卒罷敝不忍出言士爭臨城死敵如子為父十餘年免官孝文帝初立田叔稱為長者復召為雲中守魏尚槐里人文帝時為雲中守軍市租盡以給士卒出私養錢五日一殺牛饗軍匈奴遠避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚衆亷范杜陵人顯宗時為雲中太守㑹匈奴大入塞范拒之不敵日暮令軍士各交縛兩炬三頭爇火敵遥望大驚待旦將退范乃令軍中蓐食晨往赴之斬首數百級自相轔藉死者千餘人由此不敢復向雲中楊穆建光初為雲中郡功曹時遼西鮮卑大人其至鞬畔雲中太守成嚴擊之兵敗穆以身捍嚴與俱戰殁李膺襄城人永壽二年鮮卑寇雲中徵為度遼將軍膺到邊皆望風懼服先所掠男女悉送還塞下聲振遠域南北朝魏來大千代人太武時以廬陵公鎮雲中兼統白道軍事數有戰功悉北境險要詔使巡撫六鎮經畧得宜隋賀婁子幹本代人後居關右開皇初拜雲州刺史甚為敵無不懷徳劉沔彭城人太和末振武軍節度使開成三年突厥刼營田沔發萬人擊之狄騎無一返者悉頒所獲馬羊於戰卒石䧺徐州人㑹昌初囘鶻入寇連年掠雲朔牙五原塞下詔雄為天徳防雄副使兼朔州刺史佐劉沔屯雲州大破烏介可汗選三千騎夜發馬邑旦登振武城望見公主帳雄穴城夜出縱牛馬鼔譟直搗烏介帳可汗單騎走追斬萬級迎公主還金舒古特完顔部人正隆中為西南路招討使兼天徳軍節度使政尚忠信決獄公平番部不敢擾邊舒古特舊作石古乃今改正璞薩揆上京人明昌中為西南路招討使兼天徳軍節度使出禦邊嘗轉戰出塞七百里而還沿徼築壘穿塹連亘九百里營柵相望烽候相應人得恣田牧北邊遂安璞薩揆舊作僕散揆今改正伯徳窊哥西南路人壯健沉勇與定初授東勝軍節度使東勝被圍城中糧盡援絶率衆潰圍走保長安寨復被圍死之明黄里雲内州同知洪武五年蒙古兵入城里率兵巷戰力屈死之人物漢裴遵雲中人為燉煌太守從光武平隴蜀有功後徙河東安邑南北朝魏賀拔勝本神武尖山人後家武川少有志操善左右馳射以豫定䇿立孝莊帝功封易陽縣伯大畐初累除侍中孝武帝將圖齊神武以勝弟岳擁衆關西欲廣其勢援乃拜都督荆州刺史多所克捷帝入關後勝至受太保録尚書事河橋之役勝大破東魏軍及齊神武攻玉壁勝以前軍大都督募勇敢三千人犯其軍與神武遇追及之會馬為流矢所中神武逸去周文每云諸將對敵神色皆動惟賀拔公臨陣如平常真大勇也自居重任始愛墳籍又重義輕財死之日惟有隨身兵仗及書千卷而已弟岳字阿斗泥與爾朱榮尊立孝莊賜爵樊城鄉男從破葛榮平元顥累遷武衞將軍時万俟醜奴僭號關中岳為左廂大都督討擒之又執蕭寶夤以歸封樊城縣伯尋進爵為公後為齊神武所害雷紹字道宗武川鎮人善騎射嘗使洛陽見京都禮義之美歸辭母求師經年通孝經論語嘗讀至人行莫大於孝歎離違侍養非人子之道即還鄉里躬耕奉養遭母憂哀毁骨立賀拔岳舉為京兆太守甚得人和永熙三年為渭州刺史進爵昌國伯卒於州紹禄賜皆分贍親故及死曰無以送終宇文顯和武川人性矜嚴頗渉經史能左右馳射孝武在藩顯和具陳宜杜門晦迹相時而動及即位拜閤内都督封城陽縣公齊神武專政帝每不自安相與定入關䇿帝以其母老令豫為計對曰忠孝不並安敢豫為私討帝改容曰卿我之王陵也遂從入關進位車騎大將軍卒趙善字僧慶武川人性況毅有遠量嘗為爾朱天光長史天光拒齊神武於韓陵敗見殺善請收塟其屍齊神武義而許之孝武西遷封襄誠伯厯位尚書左右僕射進爵為公善性温恭謙退時稱其有公輔量王盟字子仵武川人賀抜岳擒万俟醜奴嘗先登力戰孝武至長安封魏昌縣公官至太傅盟宏雅仁愛雖居師傅而謙恭自處文帝甚尊重之子勱字醜興大統初為千牛備身直長小心謹厚沙苑之役被傷卒於行閒宇文測字澄鏡武川人周文族子性況密仕魏位司徒右長史及孝武疑齊神武詔測詣周文密為之備還封廣川縣伯㝷從孝武西遷進爵爲公厯位侍中開府儀同三司行汾州事政在簡惠頗得人和地接東魏測務安邊時論方之羊叔子轉行綏州事突厥入寇測敗走之不敢復至卒於太子少保宇文深字奴干測弟數歲便以草石作軍陣之勢父永遇大喜謂後日必爲名將孝武西遷事起倉卒人多逃散深時爲子都督領宿衞兵撫循所部並得入關賜爵長樂縣伯大統中累轉尚書直事郎中善籌䇿多戰功進爵爲侯厯東雍州刺史吏民懷之官至司㑹中大夫寇洛其先昌平人後家武川洛性明辨不拘小節賀拔岳西征洛從入關以功封安鄉縣子及岳爲侯莫陳悦所害洛收集將士志在復讐從周文討平陳恱拜涇州刺史大統初詔加開府進爵京兆郡公梁禦其先安定人後家武川禦少好學爾朱天光西討知禦有知畧引爲左右共平關隴封白水縣侯大統初授尚書右僕射從周文復宏農破沙苑進爵廣平郡公出爲東雍州刺史人庶稱之周趙貴字元寶其先南安人後家武川貴少有節概從爾朱榮討元顥從賀拔岳平關中累遷大都督岳爲侯莫陳悦所害貴詣悦詐降因請收塟岳言辭慷慨悦壯而許之貴乃收岳屍還營與寇洛等奔平涼共圖拒悦悦平後梁仚定稱亂河右以貴為隴西行臺封破之從復宏農破沙苑進爵中山郡公孝閔踐祚遷大冢宰進封楚國公晉公䕶攝政與獨孤信謀殺䕶𬒳誅侯莫陳崇字尚樂武川人謹慤善騎射從賀拔岳力戰破万俟醜奴生擒之封臨涇縣侯從平侯莫陳悦别封廣武縣伯從擒竇泰復宏農破沙苑戰河橋又别討平稽胡累戰皆有功進位柱國大將軍孝閔踐祚進封梁國公保定中晉公䕶逼令自殺兄順從魏孝武入關破梁仚定於河州趙青雀於渭橋累封平原郡公孝閔踐祚拜少師進位柱國獨孤信其先雲中人祖俟尼以良家子鎮武川因家焉信善騎射正光末與賀拔度等同斬衞可瓌由是知名魏孝武西遷事起倉卒信單騎從之孝武嘉歎進爵浮陽郡公荆州陷東魏以信都督荆州諸軍事東魏兵奄至不敵遂奔梁梁武帝問信所往荅以事君無二梁武義之禮送甚厚大統中除隴右十一州大都督秦州刺史數年公私富實信著遐通累立軍功聲震隣國孝閔踐祚遷大宗伯進封衞國公閻慶字仁度盛樂人善撫士卒能盡其死力西魏時以軍功累拜歩兵校尉封安次縣伯孝閔踐祚出為河州刺史厯雲寕二州皆有惠政晉公䕶母慶之姑也護擅朝慶未嘗阿附武帝尤以此重之大象二年拜上柱國若干惠字惠保武川人以翊戴文帝從平侯莫陳悦拜直閣將軍從擒竇泰復宏農破沙苑每先登陷陣加侍中封長樂郡公魏大統四年與齊神武戰於河橋破之七年又大破神武於芒山累遷司空惠早喪父母以孝聞子鳳字達摩有識度襲父爵尚文帝女拜柱國王徳字天恩武川人少以孝弟稱以翊戴文帝除平涼郡守治績為涇州最常從征伐累有功加開府侍中進爵河閒郡公卒於涇州刺史子慶嗣性謹厚位開府儀同三司赫連達字朔周盛樂人少從賀拔岳征討有功賜爵長廣鄉男及岳被害迎文帝匡復秦隴後復宏農戰沙苑皆有功保定初為大將軍夏州總管亷儉仁恕㝷進爵樂川郡公柱國薨韓果字阿六拔武川人仕魏封石城公性强記有權畧善伺敵虛實文帝以爲虞侯都督從戰並有功除河東郡守從破稽胡於北山稽胡憚果勁健號爲著翅人保定三年拜少師進位柱國卒華州刺史王勇武川人數從征討氣蓋衆軍所當必破太祖嘉其勇敢賞賜特隆累官侍中驃騎大將軍魏恭帝元年從趙貴征蠕蠕破之進爵新陽郡公武成初岷山羌豪叛勇帥師討平之宇文虬字樂仁武川人少從征討累以功封南安侯禽竇泰復宏農及沙苑河橋之戰皆有功又從獨孤信討梁仚定破之累遷驃騎大將軍開府儀同三司虬每經行陣必身先士卒故上下同心戰無不克後除全州刺史大將軍卒金武都字文伯東勝州人大定中進士爲商水令有治績累遷戸部郎中被詔由海道漕遼東粟賑山東都高其價直募人入粟招海賈船致之大定三年遷西京按察使備豫有勞召爲户部尚書河東路宣撫使卒趙重福字履祥豐州人通女直大小字試𥙷女直誥院令史厯滄州鹽副使有惠政貞祐中累遷同知河閒府事河閒被圍兵少多羸疾不任戰重福勸之强者戰弱考守㑹久雨圍乃解去遷河東北路轉運使致仕完顔陳和尚名彜字良佐以小字行豐州人天資高明雅好文史視世味漠然哀宗五年北兵入大昌原陳和尚以忠孝軍提控為前鋒先沐浴易衣若將就禾椑者擐甲上馬不反顧是日以四百騎破八千衆自軍興二十年始有此捷奏功第一授定遠大將軍平涼府判官屢戰皆捷正大九年正月三峯山之敗走鈞州城破元兵入即縱軍巷戰陳和尚趨避隱處殺掠稍定乃出自言曰我忠孝軍總領陳和尚也今日當明白死時欲其降斫之脛折不為屈割口吻至耳噀血而呼至死不絶大將義之酹以馬湩祝曰好男子他日再生當令我得之年四十一贈鎮南軍節度使程震字威卿東勝州人與其兄鼎俱擢第興定初知陳留治為河南第一召拜監察御史彈劾無所撓時皇子荆王為宰相家僮席勢侵民震劾之上責荆王出内府銀以償物直杖大奴尤不法者數人未幾罷官卒震為人剛直忘身殉國及為御史臺綱大振為小人所中去士論惜之元謝睦歡豐州豐縣人嘗從太祖攻西京力戰先登連中三矢仆城下太宗命軍校拔其矢裸納牛腹中良久乃甦誓以死報每遇敵必身先之官至太原路金鐵冶達嚕噶齊孟攀鱗字駕之雲内人曾祖彥甫以明法爲招討司知事有疑獄當死者百餘人彥甫執不從後三日得實皆釋之攀鱗㓜號竒童金正大七年擢進士第世祖中統三年授翰林待制同修國史至元初召見條陳七十事世祖悉嘉納之帝將親祀郊廟召問儀制攀鱗悉據經典以對命定禮儀畫圖以進帝皆親覽焉卒贈翰林學士承旨平原郡公諡文定程思亷字介甫東勝州人初給事𥙿宗潛邸以謹愿聞至元中監察御史以劾權臣阿哈瑪特繫獄累遷河北河南道按察副使歲饑罷徵大小賑貸民皆徳之厯雲南行臺御史中丞河東山西道亷訪使皆有威惠思亷剛正疾惡言事剴切與人交有終始於家族尤盡恩意好薦達人物或以爲好名思亷曰若避好名之譏人不敢復爲善矣卒諡敬肅謝仲温字君玉睦歡子初備世祖宿衞大軍圍鄂令督諸將時守江軍士乏食敎之􅊻魚充食累遷順徳路總管出俸金贖鬻子者㝷宣慰淮東歲旱導白水塘漑民田公私賴焉列女本朝張環妻白氏歸化城人守正𬒳戕乾隆二十九年旌楊正之妻黄氏青水河人守正捐軀乾隆年閒旌李順之妻鍾氏薩拉齊人守正𬒳戕同㕔烈婦李大有妻趙氏俱乾隆年閒旌曹有妻趙氏和林格爾人守正𬒳戕同㕔烈婦趙起林妻黄氏賈文元妻王氏俱乾隆年間旌郝茂英妻鄧氏歸化城人守正捐軀嘉慶四年旌郭成明妻劉氏薩拉齊人守正捐軀同㕔烈婦吳㑹妻王氏俱嘉慶年閒旌喬得寶妻任氏和林格爾人守正捐軀嘉慶八年旌土産黄羊雉兔瑣瑣葡萄實之旁環繞有小葡萄俗名公領孫梨石碌碾玉沙不灰木地蕈
