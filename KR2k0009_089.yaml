郭璞注云今京兆鄭縣也紀年穆王元年築祗官於南鄭傳所謂王以是獲殁於祇宫者神臺宫在華州唐書地理志鄭縣東北三里有神臺宫本隋普德宫咸亨二年更名集靈宫在華陰縣西北漢書地理志華陰有集靈宫武帝起水經注敷水北徑集靈宫西張昶華嶽碑稱漢武慕其靈築宫在其後寰宇記集靈宫存神殿存仙殿望仙臺集仙宫望仙觀皆漢宫觀名也金城宫在華隂縣唐書地理志華陰縣東十三里有隋金城宫武德三年廢顯慶三年復置瓊岳宫在華陰縣唐書地理志華陰縣西十八里有瓊岳宫故隋華陰宫寰宇記隋大業四年置本名敷水宫五年改為華陰宫義寕二年移宫置長監貞觀六年改為華陰宫顯慶三年為瓊岳宫今廢看花臺在大茘縣城南舊志傳隋築之雒岸者下有蓮池上有馳道今其址猶存鳳凰臺在郃陽縣東南三十里沙苑在大茘縣南接朝邑縣界元和志沙苑一名沙阜在馮翊縣南十二里東西八十里南北三十里後魏大統三年周太祖與高歡戰於沙苑大破之其時太祖兵少隱伏於沙草之中以奇勝之後於兵立之處人栽一樹以表其功今樹猶存仍於戰處立忠武寺今以其處宜六畜置沙苑監唐六典沙苑監掌牧養隴右諸牧牛羊寰宇記沙苑監在同州馮翊朝邑兩縣界唐末廢周顯德三年於苑内牧馬在州南十五里又沙苑古城在朝邑縣南十七里從馮翊縣東界沿洛水南岸入朝邑縣界又南至渭水其城廣四十八里宋史兵志沙苑占田九千餘頃嵗費緍錢四十餘萬牧馬六千凡諸監興罷不一而沙苑監獨不廢舊州志沙苑在州南洛渭之間亦名沙海亦名沙溪其中坌起者曰沙阜東跨朝邑西至渭南南連華州其沙隨風流徙不可耕植唐置沙苑監宋初置牧龍坊尋復改沙苑監明初為郭駙馬草地今為馬坊里居民茭牧其中多樹果蓏佳於他産白樓在大茘縣集古錄同州有白樓唐賢眺咏之所令狐椘作賦刻其上元稹寄白居易詩云烟入白樓沙苑暮謂此齊雲樓在華州城内舊唐書昭宗紀乾寕四年帝與學士親王登齊雲樓西望長安令樂工唱御製菩薩蠻詞舊州志城中有隆阜相傳此地為齊雲樓故址今州治建焉左右臺址尚存或云古昭慶院有齊雲樓是時假之為駐蹕地後建州治於此山河一覽樓在潼關廳東南麒麟山上明兵備道張維新建應亭在大荔縣史記秦昭襄王五年魏王來朝應亭集解徐廣曰魏世家云㑹臨晉南谿池亭在大茘縣東南十五里唐刺史王龜建御史中丞蔡曙作記遊春亭在華州西南五里西谿上一名西谿亭唐杜甫詩鄭縣亭子澗之濱即此利陽亭在白水縣東北後漢書郡國志衙縣有利陽亭劉昭注皇覽云倉頡冢在利陽亭南縣志有陽武村在縣東北八十里村西三里有利鄉今為史官村有倉頡墓倉頡生陽武而葬利鄉即此二地也吏隱亭在白水縣城西唐令白行簡建杜甫詩有吏隱道性情兹焉其窟宅即此子夏石室在韓城縣西南禮記子夏退而老於西河之上水經注横溪水注于崌峪側溪山南有石室西面有兩石室北面有二石室皆因阿結牖連扄接闥所謂石室相距也東廂石上猶傳杵白之迹庭中亦有舊宇處尚髣髴前基北坎室上有微涓石溜豐周瓢飲似是棲遊隱學之所昔子夏設敎西河疑即此也寰宇記韓城縣有子夏石室又水經注河水又南逕子夏石室東南北有二石室臨側河崖即子夏廟室也郃陽縣志有子夏洞在縣東南飛浮山相傳子夏讀書處殷濟精廬在韓城縣西水經注陶渠水東南流逕漢陽太守殷濟精廬南俗謂之子夏廟張超廬在華陰縣霧谷後賈志後漢張楷結廬此地學者如市萬年鄉在蒲城縣西寰宇記櫟陽縣有萬年鄉元和元年勅割屬奉先以奉景陵廣通倉在華州東隋書食貨志開皇三年詔西至蒲陜東至衞汴水次十三州募丁運米於華州置廣通倉京師倉在華陰縣東漢書王莽地皇四年郭欽陳翬成重收散卒保京師倉顔師古注倉在華陰灌北渭口永豐倉在華陰縣東北隋大業九年楊元感圍東都其黨李子雄勸元感直入關中開永豐倉以賑貧乏十三年唐公起義師引軍而西華陰令李孝常以永豐倉降唐至徳中郭子儀討安慶緒據永豐關陜始通元和志永豐倉在縣東北三十五里渭河口隋置義寕元年因倉置監唐書地理志華陰縣又有臨渭倉舊志隋開皇三年置廣通倉大業初改曰永豐倉錢監在華州九域志有錢監二皆在州南一里一熙寕四年置鑄銅錢一八年置鑄鐵錢後廢伏龍府在澄城縣南五十里唐置折衝府肅宗時太原王榮為伏龍府折衝是也今其地名伏龍里相原府在蒲城縣長安志蒲城縣有唐折衝府五曰相原孝徳温湯宣化懷仁縣志相原府在縣東二里孝德等府亦皆在縣境盖唐所建以衞五陵者郭子儀故宅在華州東其鄉曰將相鄉里曰將相里有井曰汾陽王井王宿莊在華州舊志宜氏族譜云宜氏世居華城東北二十里地曰王宿莊古傳周太子宜臼出奔曾宿渭陽之濱即此暨踐阼後以封庶子賜姓宜氏姚武壁在郃陽縣西北通典河西縣有姚武壁伏陸壁皆險固寰宇記夏陽縣有姚武壁苻堅二十一年姚萇奔渭北西州豪族推為盟主僭號於此以武功立因名縣志姚武壁伏陸壁並在縣西北曹公壘在潼關廳西北述征記漢末之亂魏武征韓遂馬超連兵此地今際河之西有曹公壘道東原上云李典營義熙十三年王師曾據此壘水經注宋武入長安檀道濟王鎮惡或據山爲營或平地結壘爲大小七營濱帶河險今皆無攷姚鸞屯在潼關廳南十五里晉義熙十三年宋武伐秦秦將姚紹守潼關使姚鸞屯大路以絶晉糧道即此又有姚氏屯在城東晉書紹遣姚讚屯河上以絶水道西征記沿途逶迤入函道六里有舊城周百餘步北臨大河南對高山姚氏置關以守峽舊衞志城東門外有金陡城或以爲即姚讚河上之屯也乾坑在大茘縣西