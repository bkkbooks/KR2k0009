關大都督齊神武遣竇泰襲宏農時炎衆少戰敗奔洛州力窮爲東魏將高敖曹所執謂敖曹曰天子之臣乃爲賊所執敖曹送并州見神武言色不屈見害字文深陽夏人性鯁正大統中厯東雍州别駕使持節大都督東雍州刺史爲政嚴明示民以信抑挫豪右吏民懷之王彦河津人通之曾祖也爲同州刺史著政小論八篇言王霸之業通稱内難而能正其志云裴宣明聞喜人太和中爲華州刺史有惠政元燮安定王休子世宗初除華州刺史時州治李潤堡燮以其地非宜表還馮翊詔從之李叔虎蓚人世宗時除假節行華州事爲吏民所稱楊津華陰人延昌末爲華州刺史先是受調絹疋度尺特長在事因緣共相進退百姓苦之津乃令依公尺度其輸物尤好者賜以杯酒而出其所輸少劣者亦為受之但無酒以示其恥於是人競相勸官調更勝舊日王羆霸城人孝武西遷除華州刺史嘗修城未畢梯在外齊神武遣韓軌司馬子如從河東宵濟乘梯入城羆尚卧未起聞闔外洶洶有聲便徒跣持白挺大呼而出敵見驚退逐至東門軌遂遁走時關中大饑徵税民間榖食以供軍費或隱匿者令遞相告以是人有逃散惟羆信著于人莫有隱者得粟不少諸州而無怨讟沙苑之役神武士馬甚盛至城下謂羆曰何不早降羆大呼曰此城是王罷冢死生在此欲死者來神武不敢攻高幹蓚人厯白水太守以亷平著稱宋稚敦煌人景明中拜白水令在縣十一年頗得人和泉仚豐陽人永安中除東雍州刺史豪右無敢犯者性清約纖毫不擾於人在州五年每于鄉里運米自給後復為刺史蜀人張國雋聚黨剽刼州郡不能制仚悉捕戮之闔境清肅周薛善汾陰人文帝欲廣置屯田以供軍費除善司農少卿領同州夏陽二十屯監又于夏陽諸山置鐵冶復令善為監每月役八千人營造軍器善親自督課兼加慰撫甲兵精利而皆忘其勞苦焉達奚武代人保定中以太保出為同州刺史歲旱武帝勅武祀華岳岳廟舊在山下常所祈禱武謂僚屬曰吾備位三公不能燮理陰陽不可同於衆人在常祀之所必須登峰展誠于是攀藤而上稽首祈請晚不得還藉草而宿夢一白衣人執手慰勞至旦雲霧四起俄而澍雨遠近霑洽武帝璽書嘉之達奚震代人武平初除華州刺史導民訓俗頗有治方楊纂廣寕人天和中為華州刺史性質樸莅職但推誠信吏以其忠恕頗懷之鄭偉開封人天和中為華州刺史以威猛為治吏民莫敢犯禁盜賊休止隋楊智積華陰人高祖弟整之子封蔡王為同州刺史在州未嘗嬉戲游獵聽政之暇端坐讀書門無私謁侍讀公孫尚義府佐楊君英蕭德言並有文學時延於坐所設惟餅果酒纔三酌家有女伎惟年節嘉慶奏於太妃前其簡靜如此崔宏度安平人開皇初拜華州刺史御下嚴急吏人讋氣所至之處令行禁止盜賊屏跡柳機解人周宣帝時拜華州刺史高祖踐阼徵為納言復出為華州刺史前後作牧俱稱寛惠榮毗無終人開皇中楊素薦爲華州長史素田宅多在華陰左右放縱毗以法繩之無所寛貸晉王在揚州令人密覘京師消息於路次置馬坊以畜牧爲辭毗遏絶其事上聞而嘉之唐雲得臣武德時爲西韓州治中自龍門引河溉田六千餘頃民便利之趙慈景隴西人帝美其姿故妻之帝起兵或勸亡去對曰母以我爲念且安往吏捕繫獄帝平京師爲華州刺史討堯君素戰死諡曰忠王珪郿人貞觀中爲同州刺史褚遂良錢唐人高宗初出爲同州刺史裴炎之聞喜人永徽初爲同州司户參軍年甚少不主曹務刺史李崇義内輕之吏白積案數百崇義讓使趣斷炎之曰何至逼人乃命吏連𥿄進筆爲省決一日畢既予奪當理而筆詞勁妙崇義驚曰子何自晦成吾過耶由是名動一州號霹靂手蘇瓌武功人武后時爲同州刺史嵗旱兵當畨上者不能赴瓌奏宿衞不可闕宜月賜増半糧俾相給足則不闕番又宜却進獻罷營造不急者不見省時十道使括天下亡户初不立籍人畏搜括即流入比縣旁州更相廋蔽瓌請罷十道使專責州縣豫立簿注天下同日閲正盡一月止使柅姦匿嵗一括實檢制租調以免勞弊後善其言李懷遠栢人人徙同州刺史治尚清簡累遷鸞臺侍郎姚崇硤石人為同州刺史先天二年明皇講武新豐故事牧守在三百里者得詣行在時帝亦密召崇崇至咨天下事遂大用成大琬為同州刺史先天二年太上皇命有司頒賞諸州朝集使有善政者遂以大琬為陜州刺史賜物一百殺李朝隱三原人開元中為同州刺史帝東幸召見慰勞賜以衣帛姜師度魏人開元中為同州刺史派洛灌朝邑河西二縣閼河以灌通靈陂收棄地二千頃為上田置十餘屯帝嘉其功下詔襃美崔隱甫武城人開元九年自華州刺史遷太原尹所至潔介自守明吏治在職以彊正稱崔希高仁友孝悌遷馮翊令貧乏荷其矜恤時有雲氣如蓋當其㕔事須臾五色錯雜徧於州郭狀聞敕編入史蔣欽緒膠水人為華州長史蕭至忠至晉州𬒳召過之欽緒本姻家戒曰以君才不患不見用患為華州刺史政清簡流民至者給地居之名其里曰義合專以慈惠為本未嘗設條敎民愛向之召為左金吾衞大將軍以楊於陵代之滋行耆老遮道不得去於陵使諭曰吾不敢易袁公政人皆羅拜乃得去李夷簡唐宗室補鄭縣丞德宗幸奉天朱泚外示迎天子遣使東出關至華侯吏李翼不敢問夷簡謂曰發幽隴兵五千救襄城乃賊舊部是將追還耳上越在外召天下兵未至若凶狡還西助泚危禍也請騐之翼馳及潼關果得召符白於關大將駱元光乃斬賊使收僞符獻行在鄭珣瑜滎澤人貞元初詔擇十省郎治畿赤珣瑜以檢校吏部員外郎兼奉先令高郢衞州人順宗時為華州刺史政尚仁靜初􅶴元光自華引軍戍良原元光卒軍入神䇿而州仍歲餉其糧民困輸入累刺史憚不敢白郢奏罷之李絳贊皇人元和中為華州刺史吐突承璀田多在部中主奴擾民絳捕繫之會遣五坊使帝戒曰至華宜自戢絳大臣有奏即行法矣州有捕鷂户歲責貢限絳以為言並勸止畋獵有詔澤潞太原天威府並罷之孔戣孔子後憲宗時為華州刺史明州嵗貢淡菜蚶蛤戣奏罷之後擇嶺南節度帝問裴度嘗論罷蚶菜者度以戣對即拜之崔戎博陵人憲宗時為華州刺史民有兄弟訟産者戎垂涕自責民感化不復析居吏以故事置錢萬緡為刺史私用戎不取及去召吏籍所置錢享軍民擁留於道不得行夜單騎亡去民追不及止李景温文水人元和中為華州刺史以美政聞王龜揚州人咸通中為同州刺史牙將白約素暴横嘗譁言月廪薄以動士心為亂龜捕殺之人皆震慄郭璋光啟初為同州刺史王重榮及李克用寇同州璋死之五代晉段思恭晉城人開運中劉繼勲節制同州辟為掌書記繼勲入朝㑹契丹入汴軍士請立思恭為州帥思恭諭以禍福拒而不從漢扈彦珂雁門人授鎮國軍節度華商等州觀察使乾祐初李守貞趙思綰王景從並叛周祖為樞密使總兵征之從彦珂計遂平河中宋張美清河人太祖時拜定國軍節度縣官市木關中同州歲出緡錢數十萬假民長吏十取其一嵗至數百萬美獨不取高保寅荆南人太祖時知同州錢若水為從事保寅許以遠大議者多其知人陳文顥仙遊人端拱初知同州錢苦水為從事文顥深禮之委以郡政錢若水新安人雍熙中為同州觀察推官聽決明允張暉大城人宋初為華州團練使時太原未下詔入覲問計暉對澤潞瘡痍未復不若戢兵育民俟富庶而後為謀賜襲衣金帶鞍馬令還州盧斌開封人端拱中為華州巡檢賊刼興平櫟陽斌率兵掩襲擒斬並盡以勞詔還李繹萬年人知華州蒲城民李藴訴人盜其從子亡去繹因密刺藴藴有陰罪姪覺之懼事暴殺之以滅口遂收藴致法寇準下邽人咸平初知同州韓晉卿安邱人神宗時知同州奏課第一明鎬安邱人知同州嘗閲廂軍材武者得三百餘人教以强弩奏為清邊軍號最驍悍鎬所至安靜有體為世所推司馬池夏縣人仁宗時知同州以清勤仁厚聞梁彦通須城人知華州事時鄜延修城調七州保甲華在調中衆聳懼彦通版示衆曰浹旬之役近在邊隅不與頃嵗入界同也衆乃趨命屬歲不登彦通括廪得數十萬斛平價踰半躬視糶老幼癃寡皆得食所活以萬計民頌其惠趙瞻盩屋人熙寕三年知同州七年朝廷患錢重議以交子權之命瞻制置瞻曰有本緡足恃法乃可行如多出空劵是罔民也議不合移知陜州王睦汴人華陰尉為官亷潔清慎不忍鞭撲而心性明敏張甫為華州推官日用倉粟惡吏當追賠錢數百萬轉運使李絃以吏屬甫甫乃令斗米春之可棄者日纔二三又試之亦然吏遂得弛繫所賠錢纔數十萬而已絃因薦甫遷職司馬旦夏縣人為鄭縣主簿鄭有婦藺訟奪人田者十年不決旦取案一閲情偽立見黜吏十數輩冤者以直吏捕蝗因緣騷民旦言蝗民之讐宜聽自捕後著為令吕大防藍田人熙寕中知華州華嶽摧自山屬渭河被害者衆大防奏疏援經質史以驗時事張戩郿人嘗攝蒲城令邑民悍不畏法令寇盜倍他邑異時令長以峻法治姦愈不戢戩悉寛條禁有訟至庭必以理敦諭間召父老使之敎督子弟服學省過作記善簿民有小善悉以籍之月言以俸錢為酒召邑之高年聚于縣廳以勞之使其子弟侍側勸以孝弟之道不數月邑人化之訟獄爲衰呉時卭州人徽宗時知鄭縣轉運使檄州運米五萬輸長安鄭獨當三萬時貽書使者曰㑹三萬斛之費以車則千五百乘以卒則五萬夫縣民可役者纔二百五十八户耳古者用師則贏糧以養兵無事則移兵以就食誠能移兵于華則前費可免華雍相去百六十里一旦欲用朝發而夕至矣使者從其言張汝明廬陵人爲華陰主簿縣修嶽廟費鉅財窘令以屬汝明汝明嚴與爲期民德其不擾相與出力佐役如期而成他廟非典祀妖巫憑以惑衆者毁而懲其人范祥三水人自乾州推官厯知華州提舉陜西銀銅坑冶鑄錢祥曉達財利建議變鹽法後人不敢易稍加損益人輒不便唐重彭山人徽宗末知同州金人巳陷晉絳將及同重度不能守乃開門縱州人使岀自以殘兵數百守城以示必死金人疑有備不復渡河而返在州時凡三上疏乞早臨關中以符衆望降詔奬諭呉元亨厯馮翊令馮翊華陰以漆沮爲境中間洲上有美田民相與爭之五十餘年吏不能決元亨檄華陰令會境上盡按兩鄉之籍徧履其田執度以度之皆得其實自是民不敢復爭鄭驤玉山人高宗初知同州金將羅索攻同州及韓城驤遣兵拒險擊之師失利金人乘勝徑至城下通判以下皆遁去驤曰所謂太守者守死而已翼日城陷驤赴井死贈樞密直學士諡威愍羅索舊作婁宿今改金喬君章平陽人正隆中任蒲城縣丞有異政碑李完馬邑人大定中調澄城主簿有遺愛民為立祠李革河津人大定末遷韓城令同知州事納富商賂以歲課軍須配屬縣革獨不聽趙規中都安次人大定間尉澄城勸課農桑安集疲民察奸慝杜請托邑人立祠祀之張可用滏陽人大定末為定國軍節度副使兼同州觀察副使提舉河防亷靜明決政尚威嚴境内民安盜息張鉉河東人明昌三年為定國軍節度副使兼同州觀察副使提舉河防政平訟理士民悦服張彀臨潁人章宗時為同州觀察判官時岀兵備邊州徵箭十萬限以鵰雁羽為之其價翔躍不可得彀曰矢去物也何羽不可節度使曰當須省報彀曰州距京師二千里如民急何萬一有責下官身任其咎一日之間價减數倍尚書省竟如所請李復亨河津人宣宗時為安國軍節度使元光元年城破自殺鄭建充為同州節度使性明果勇于任事在州多所興除時河衝蒲坂民不任修䕶歲役馮翊兵數千人建充條罷其役關輔飢人鬻于軍者等驅虜詔許放良多務掩匿建充閲遣數百人又以帑緡葺廟學士民愛戴有像祀泮宫完顔額珂為同州節度使興定中元兵取同州額珂死之完顔額珂舊作完顔訛可今改艾元老大興人任澄城知縣寛嚴並濟百事具舉前主簿馬炳亨物故遺六女一孫甫幼咸擇婚而配之秩滿民為立祠鈕祜祿温綽仕至楨州刺史被行省牒徙州人於金勝堡巳而元兵至温綽拒戰中流矢病創卧花帽軍張提控言兵勢不可當宜速降温綽曰吾曹坐食官祿但當力戰死耳至夜張提控持兵仗入脅温綽温綽曰聽汝所為吾終不屈也遂殺之執其妻子出降初楨州人遷金勝堡多不能至軍事判官王謹收遺散别屯周安堡兵至謹拒戰十餘日内潰被執亦不屈死之鈕祜祿温綽舊作女奚烈幹岀今改烏色宗室瑪奇子從攻陜西有功師還正授謀克遷華州防禦使屬關中歲饑盜賊充斥烏色募兵討平之部以無事郡人列狀丐留烏色舊作沃側瑪奇舊作麻吉今並改元完顔遜卓從太宗攻下鳳翔同州有功賜號巴圖爾佩銀符爲同州管民達魯噶齊完顔遜卓舊作完顔石住巴圖爾舊作八都兒達魯噶齊舊作達魯花赤今並改雅格爲同州達魯噶齊值久旱禱雨祝神曰得雨蘇民願以已女給侍左右雨果隨注霑足稍霽報女暴死州民感其德願以遺貌肖像於後殿每歲本州享祭必有雨應雅格舊作亞哥今改珠爾噶岱至正中爲澄城縣達魯噶齊大旱徧禱羣神獲甘􅒴縣南飛蝗害稼奉幣告奠蝗入他境不爲灾珠爾噶岱舊作赤只皃瓦歹今改薛文曜丹陽人至元中知澄城縣剛方清慎著有勞績嘗捐俸金修廟學呂河内人至元中爲華州知州勸農興學具有成效及代民爭留之郝思仁平陽人元貞元年知澄城縣事嗜經史重儒術臨事有決甚有能聲竇本奉先人至正中為澄城尹潔已奉公以政績著呉惟敬長安人任澄城主簿持已清正處事公平董摶霄磁州人順帝初為陜西行臺掾從侍御史郭貞讞獄華陰時天大旱有李謀皃累殺商賈於道為賊十五年至百餘事事覺獄已具賄賂有司五年不決摶霄言於貞即尸諸市天乃大雨張玊固始人至正中任蒲城尹有幹畧不事表暴明兵西掠至華州旁邑多蹂躪玉修保伍嚴警備民賴以安明胡惟俊洪武初知華州時關西初定生理未復惟俊招流亡給耕具營廨舍公私充實孫浩永樂中知郃陽縣亷公有為范斌榆次人永樂中知華州謹條敎躬為勸諭有犯法者不少貸奸豪屏息鞭扑不施姚厚興化人永樂中調掌潼關衞事秦王入朝夜至關呼門甚急厚曰深夜不得啟也王訴於上上微哂未浹旬適厚至上顧左右曰姚指揮鎖鑰臣也奸細撒伏臘假僧過關厚斬之言官交論不當先誅上曰誅之則軍威大振指揮是也伍箕安福人宏治中知華州以本州地當衝要請自潼津沿河以上盡免雜徭俾得力田供役敎民種桑棗勸耕織設條告令里民書於牌月朔儆戒之且令書其勤惰善惡以聞俗爲之變張綸黄縣人正德間知郃陽縣剛正有爲會流賊陷洛州警報甚急鄰邑皆爲避兵計獨綸矢死守備邑賴安堵桑溥濮州人正德中知華州城北積水萬頃溥相視開惠民渠州及華陰俱賴其利何祥内江人嘉靖中知華陰縣時華山諸峪水暴溢祥疏渠築堰踰年工竣引水溉田遂成沃壤沈瑋大興人嘉靖間爲韓城主簿奮身殺賊而死贈韓城知縣廕一子鄭璧内江人萬厯間以僉都御史左遷知同州下車盡罷一切私徵捜剔奸蠧歲省數千金時議行條鞭璧奏記極言不便而尤不便於同遂不果行民感服以察亷内遷王喬棟雄縣人天啟時知朝邑縣縣人王之寀爲魏忠賢黨所惡坐以贓賄下喬棟嚴追喬棟不忍封印於庫而去巡撫怒將劾之士民擁署呼號乃止張禴平谷人任潼關兵備道時值李午之亂禴斬擒甚衆建東西重門關設兵道自禴始張問行内黄人兵備潼關時南山礦寇大發問行剿滅之建察院道治并潼河石橋何鼇紹興人兵備潼關建南北水關潼人賴之周相寕波人兵備潼關引水入城修渠便人至今稱周公渠聶豹永豐人兵備潼關有直節時閹官在關榷税豹揭㕘被逮是日玉山觀風穴白晝飛沙障天人驚異之邊詢任邱人兵備潼關法紀嚴明掲㕘暴弁七十人時羅侍郎清丈屯田擾民詢力抗之又濬河夫役以闕京半俸餘糧給之民戴其德范懋和富順人兵備潼關嚴除蠧役出贖金建城鋪五十一所時韓邑山宼蒲渭桀盜華洛礦徒悉就蕩平黄和兖州人兵備潼關清直剛毅甄别衞弁賢否歲饑請減屯糧三分之一嚴禁礦徒山盜平息胡其俊孝感人兵備潼關常按部車騎出署人莫知所之歲饑屯糧請折每石六錢韓城撫賊賞給千緡與其俊嫌者誣以得賊賂故重酬賊逮鞫錦衣衞關人泣送之並合資送家眷歸事竟得雪張維世太康人兵備潼關風采嚴肅時閹官巡視茶馬大吏皆折節事之維世不為禮喬遷高定襄人由知府署潼關道事監孫傳庭軍孫於河南失利退守潼關遷高分捍南城城陷挺身巷戰殺數賊而死子諸生象觀同妻史氏俱自縊陳仲秩巴縣人知華州莅政精明專以徳治杖人只示辱而巳母有賢德每臨政輒聽於屏後決事失平即擊屏以警之故尤多仁恕云謝如尚萊陽人知朝邑縣時督織宦者檄絲商邑故少貿於南破家者多如尚抗不應又上官屬如尚欲陷故保定通判如尚曰殺人媚人某不為竟忤上官去左懋第萊陽人崇禎中知韓城縣有異政許嗣復北直隸人崇禎末為潼關衞學敎授闖賊入關嗣復分守上南門城陷衆潰持挺擊賊而死妻女皆自殺王無逸寕陵人崇禎間知白水縣明斷不撓大修城陴後寇陷城無逸着公服罵賊死范志懋虞城人知郃陽縣性剛毅尚名節甫至郃流寇攻城十七日不下先是邑城設有韓郃營費民萬三千餘釜志懋力請撤去之朱一統平定人崇禎末知蒲城縣闖賊陷西安屬邑望風降一統獨謀拒守會衙兵叛奪印趨降叱日吾一日未死印不可得也日暮左右盡散知事不可為乃赴井死縣丞姚啟崇沁源人亦同死節朱迥滼宗室知白水縣習法律吏不敢欺賊陷城猶手弓射賊與學官魏箴典史劉進並被難本朝湯斌睢州人精研理學博通經濟任潼關兵備道時經兵燹斌振興學校撫馭兵民弊革利興豪猾斂跡金培生漢軍正白旗人任潼關道築城浚隍興敎化勵風俗著有治績馬呈祥奉天人順治初知同州有强幹才時兵燹後百務未舉呈祥招集流亡修城堡清糧地勸耕織民以復業北山餘寇未息兼行撫剿州屬獲安俞卿雲陸涼人以能薦知同州清嚴自礪興利剔奸民立碑頌其事趙瀚榆社人順治初以同州州同攝白水縣事賊至被執不屈死之王廷用奉天人順治初知華州時寇亂甫定征役尚煩廷用申請臺司計合州糧石毎里十甲均輸差糧不擾靳榜祁州人順治初知澄城縣敷政寛平與民休息會郃陽魏天命倡亂澄城被寇死之索應運德州人順治初爲白水縣典史循聲大著流寇陷城不屈自縊死王用傑陽城人順治初知澄城縣時澄方被宼用傑請兵親剿執賊魁康姬衞戮之餘皆就撫四境帖然姚欽明江寕人順治中知澄城縣剿平餘賊招集流亡舊有荒糧爲民累欽明條列諸弊中請再三卒得免翟世琪益都人順治中知韓城縣性嚴決有政聲會王輔臣叛柳溝營遊擊李師膺以裁餉鼓譟撫慰不從世琪及二子皆遇害秦宗堯奉天人順治中知華州山右姜瓖之變華當孔道宗堯悉力轉輸山宼盤踞石脆率民兵搗其巢殲之張舜舉綿竹人順治中知蒲城縣邑先爲王永彊竊據舜舉招集流亡撫恤備至率兵討山寇平之餘黨解散胡有德奉天鐵嶺人順治中知華州慈惠明決大旱具文城隍深自刻責須臾風雨驟至秋禾有成嘗憫所屬寒士歲給穀至數百石人咸戴之羅人琮湖南桃源人康熙初知朝邑縣縣田圯於河者千餘頃人琮勘實申請減賦三千七百餘兩驛馬舊令里民牧養潼關衞弓兵廩食私取之朝邑至是皆申革之以亷幹擢御史趙煥文懷寕人康熙初任白水縣典史大將軍圖海下平涼給劄令招撫遠近至棧口遇賊不屈死之鈕琇呉江人康熙中以白水縣攝蒲城篆時奸民以歲祲刼掠琇擒亂首况諸河復置蠧吏二人於法民遂安輯沈華呉縣人雍正中知蒲城縣邑有報墾地十四頃沙積叢雜久不成熟華履勘得實力請豁除捐修文廟備祭器于各鄉建義塾邑舊有弔忠泉爲前明邑令朱一統盡節之所華新其亭以表之立法嚴明催科不擾民咸德之李長青黄岡人乾隆中知同州府綏靖地方撫䘏灾黎摘伏懲奸民不忍欺王希伊寶應人乾隆中知白水縣在任六年裁陋規均里甲息訟化頑愛民敎士創建彭衙書堂倡爲同善會以濟窮困民思其德久而不忘前總纂官臣丁善慶恭纂輯提調官臣張日章恭覆輯校對官臣顔以燠恭校校對官臣沈維鈺恭覆校
