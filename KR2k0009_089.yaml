body:
  text: 同州府在省治東北二百四十里東西距一百七十八里南北距三百三十里東至山西蒲州府永濟縣界五十八里西至西安府富平縣界一百二十里南至商州洛南縣界一百五十里北至鄜州洛川縣界一百八十里東南至河南陜州闅鄉縣界九十五里西南至西安府臨潼縣界一百四十里東北至山西絳州河津縣界二百六十里西北至鄜州宜君縣界一百九十里自府治至京師二千一百三十里分野天文井鬼分野鶉首之次建置沿革禹貢雍州之域戰國時魏臨晉邑秦置臨晉縣漢屬左馮翊後漢末移左馮翊來治三國魏改為郡除左字晉因之後魏太和十一年置華州及華山郡孝昌二年改郡曰武鄉西魏改州曰同州元和志禹貢云漆沮既從灃水攸同言二永至此同流入渭城居其地故曰同州隋開皇三年郡廢大業三年州廢改置馮翊郡唐武德元年復曰同州天寶元年曰馮翊郡乾元元年復曰同州隸關内道舊唐書地理志同州防禦長春宫使同州刺史領之唐書方頊表興元元年以同州為奉誠軍節度是年罷乾寕二年升同州為匡國軍節度天祐三年罷五代因之寰宇記唐匡國軍梁改忠武軍後唐同光初復舊周顯德六年降為刺史宋曰同州屬永興軍路宋史地理志同州望馮翊郡定國軍節度金屬京兆府路金史地理志定國軍後改安國軍元初以州治馮翊縣省入屬奉元路明屬西安府本朝雍正三年直隸陜西布政司領朝邑郃陽澄城韓城四縣十三年升爲府並設大茘縣爲府治降華州爲屬州及華陰蒲城白水潼關四縣來屬乾隆十二年升潼關縣爲廳今領州一縣八廳一大茘縣附郭東西距四十里南北距九十里東至朝邑縣界十里西至蒲城縣界三十里南至華州界五十五里北至澄城縣界三十五里東南至華陰縣界五十里西南至西安府渭南縣界五十里東北至朝邑縣界三十里西北至蒲城縣界三十里秦取大茘戎築其地曰臨晉後置縣漢屬左馮翊後漢未爲左馮翊治魏爲馮翊郡治晉因之武帝改名大茘北魏改馮翊郡爲華州更縣爲華陰孝昌二年改名武鄉縣爲武鄉郡治隋大業初更名馮翊爲馮翊郡治唐爲同州治武徳九年析置臨沮縣貞觀初省五代宋金因之元省縣入州明因之本朝雍正十三年升同州爲府置縣為府治朝邑縣在府東三十里東西距四十八里南北距九十里東至山西蒲州府永濟縣界二十八里西至大荔縣界二十里南至華陰縣界四十里北至郃陽縣界五十里東南至華陰縣界六十里西南至華陰縣界四十里東北至郃陽縣界五十里西北至澄城縣界五十里秦漢臨晉縣地後魏太和十一年置南五泉縣屬澄城郡西魏改曰朝邑隋屬馮翊郡唐初屬同州乾元三年割屬河中府改名河西大厯三年復曰朝邑仍屬同州五代宋金因之元明統於西安府本朝雍正三年屬同州十三年屬同州府郃陽縣在府東北一百十里東西距六十里南北距一百里東至山西平陽府臨晉縣界四十里西至澄城縣界二十里南至朝邑縣界五十里北至韓城縣界五十里東南至山西蒲州府永濟縣界四十里西南至澄城縣界四十里東北至韓城縣界五十里西北至澄城縣界四十里本古有莘國戰國魏合陽邑秦置縣屬内史漢曰郃陽屬左馮翊後漢初廢永平二年復置仍屬左馮翊晉屬馮翊郡後廢後魏太和二十年復置屬華山郡後周屬澄城郡隋屬馮翊郡唐武德三年割屬西韓州貞觀八年還屬同州五代梁改屬河中府後唐天成元年復故宋因之金貞祐三年改屬禎州元初復屬同州明統於西安府本朝雍正三年屬同州十三年屬同州府澄城縣在府北一百里東西距六十里南北距一百三十里東至郃陽縣界二十里西至白水縣界四十里南至大茘縣界六十里北至鄜州洛川縣界七十里東南至朝邑縣界六十里西南至蒲城縣界六十里東北至韓城縣界九十里西北至洛川縣界九十里春秋晉徵邑秦置北徵縣屬内史漢為徵縣屬左馮翊後漢廢晉為郃陽縣地後魏太平真君七年置登城縣兼置澄城郡隋開皇初郡廢以縣屬馮翊郡唐屬同州五代梁改屬河中府後唐同光中復故宋金元因之明統於西安府本朝雍正三年屬同州十三年屬同州府韓城縣在府東北二百里東西距一百四十里南北距一百六十里東至山西平陽府滎河縣界十五里西至鄜州洛川縣界一百二十五里南至郃陽縣界四十里北至延安府宜川縣界一百二十里東南至滎河縣界二十里西南至郃陽縣界七十里東北至山西絳州河津縣界六十里西北至宜川縣界一百二十里本古梁國戰國初魏少梁邑秦置夏陽縣屬内史漢屬左馮翊後漢因之晉屬馮翊郡後魏屬華山郡後省入郃陽隋開皇十八年改置韓城縣屬馮翊郡唐武德三年屬西韓州八年徙州治此貞觀八年州廢以縣屬同州天祐二年改名韓原縣五代梁改屬河中府後唐天成元年復曰韓城還屬同州宋因之金貞祐三年升為禎州元至元元年州廢二年復置六年又廢以縣屬同州明統於西安府本朝雍正三年屬同州十三年屬同州府華州在府南一百八十里東西距六十七里南北距一百十里東至華陰縣界四十里西至西安府渭南縣界二十七里南至商州洛南縣界八十里北至渭南縣界三十里東南至華陰縣界一百十五里西南至渭南縣界六十里東北至大茘縣界三十五里西北至渭南縣界三十里周為鄭國春秋屬晉戰國為秦魏二國境秦置鄭縣屬内史漢屬京兆尹後漢因之晉屬京兆郡後魏太平真君元年置華山郡孝昌二年置東雍州西魏始改為華州隋開皇三年郡廢大業二年州廢縣屬京兆郡義寕元年復置華山郡唐武德初仍名華州治鄭縣垂拱元年改曰太州神龍元年復故天寶元年改華陰郡乾元元年復故上元元年又改太州寶應元年仍曰華州屬關内道