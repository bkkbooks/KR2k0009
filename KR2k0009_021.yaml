  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_021-1a}
body:
  text: 奉天府五流寓漢逢萌北海都昌人王莽時解冠挂東都城門歸將家屬浮海客遼東因遂潛藏光武即位乃之琅邪勞山王烈平原人董卓亂避地遼東躬秉農器布衣蔬食不改其樂遼人化之強不陵弱衆不暴寡市不二價丞相曹操纍徴不起卒於海表年七十八邴原北海朱虛人少與管幼安俱以操尚稱黃巾起原將家屬入海遂至遼東遼東多虎原之邑落獨無虎患嘗行而得錢拾以繫樹此錢既不見取而繫者愈多問其故答者謂之神樹原惡其由已而成淫祀乃辨之於是里中遂斂其錢以為社供在遼東一年中往歸原居者數百家遊學之士教授之聲不絶管幼安北海朱虛人漢未大亂避遼東公孫度虛館以候之幼安因山為廬鑿壞為室越海避難者皆來就之居旬月而成邑遂講詩書陳俎豆飭威儀明禮讓非學者不見由是度安其賢民化其德度子康欲官幼安以自輔終莫敢發言其敬憚如此幼安所居屯落會井汲者或男女雜錯或爭井鬬鬩幼安患之乃遂多買器分置井旁汲以待之又使不知來者得而怪之問知幼安所為乃各相責不復鬬訟鄰有牛暴幼安田者幼安為牽牛著涼處自為飲食過於牛主牛主得牛大慙以是禮讓移於海表在遼東積三十七年乃歸涼茂山陽昌邑人獻帝時為樂浪太守公孫度在遼東擅留茂不遣之官然茂終不為屈國淵樂安蓋人與邴原管幼安等避亂遼東淵篤學好古常講學於山巖士人多推慕之由此知名太史慈黃縣人猿臂善射少好學為郡奏曹史因避仇之遼東孔融聞其名數餽其母及融為黃巾昕圍慈適從遼東還為融攻黃巾破之晉高瞻渤海蓚人永嘉之亂率數千家徙幽州後隨崔毖如遼東及毖敗慕容廆署為將軍瞻稱疾不起廆敬其姿品數端視之仍辭疾篤廆不平之遂以憂死唐蔣儼義興人為兵曹參軍太宗伐高麗募為使者人皆憚行儼獨請往及至為莫離支所困不屈納土室中及髙麗平乃歸帝奇其節授朝散大夫明王儼湖廣人由進士厯官侍郎廉靜謹恪正德間忤劉瑾謫遼東後赦歸胡永清仁和人官江西副使論宸濠不法謫瀋陽學者宗之後宸濠伏誅起官至兵部尚書本朝苗君稷昌平人明季諸生遭時多難隸籍黃冠喜讀儒書居盛京之三官廟賦詩有隱者風府丞薑希轍序而刻之郝浴定州人順治中以御史巡按四川為吳三桂所搆謪鐵嶺讀書講學無間寒暑著易解士人宗之康熙十四年召還留所居為銀岡書院列女遼耶律珠展妻蕭氏國舅博勒之女年十八歸耶律珠展未幾珠展卒既葬謂所親曰夫婦之道如隂陽表裏無陽則陰不能立無表則裏無昕附妾夫早歲登朝有才不夀天禍妾身復何倚恃死者可見則相從地下不可見則當與俱逝遂自刃而死珠展舊作术者博勒舊作孛堇今皆改正耶律中妻蕭氏韓國惠王四世孫及笄歸耶律中天慶中為賊所執氏置刃於履誓不受汚至夜賊遁得免久之帝召中為五院都監中謂妻曰吾本無宦情今不能免當以死報國女能從我乎氏曰謹奉教及金兵徇嶺西中守節死氏躍馬突至中所自殺元耶律琉格妻約囉氏元太祖時琉格為遼王納款於元琉格卒約囉氏入奏會帝征西域皇太弟承制以約囉氏佩虎符權領其衆者七年丙戌帝還約囉氏攜其子善格特爾格永安及從子托爾多孫收國努見帝於河西湫城帝慰勞甚至約囉氏奏琉格既卒官民乏主其長子色辰扈從有年願以次子善格代之使歸襲爵帝曰色辰從朕征西域已積功為巴圖魯不可遣當令善格襲其父爵約囉氏拜且泣曰色辰者琉格前妻所出嫡子宜立善格者婢子所出若立之是私己而滅天倫也竊以為不可帝歎其賢遂以色辰襲爵而留善格托爾多於朝遣其季子永安從約囉氏東歸琉格舊作留哥約囉舊作姚里善格舊作善哥特爾格舊作鐵哥托爾多舊作塔塔兒收國努舊作收國奴色辰舊作薛闍今並改正李君進妻王氏遼陽人大德八年君進卒下葬將發引親戚鄰里咸會氏謂衆曰夫婦死同穴義也吾得從良人逝不亦可乎因撫棺大慟嘔血升餘而死衆殮之與夫連柩出葬送者數百人莫不灑泣趙洙妻許氏集賢大學士有壬之姪女至正十九年紅巾賊陷遼陽洙時為儒學提舉夫婦避亂匿資善寺洙以叱賊見害氏不知也賊甘言誘氏令指示金銀之處氏大言曰吾詩書冠冕故家不幸遇難但知守節而死他皆不知也賊以刃脅之色不變已而知其夫死因痛哭仆地罵聲不絶口且曰吾母居武昌死於賊吾女兄弟亦死於賊今吾夫又死焉使吾得報汝當醢汝矣遂遇害寺僧見氏死狀哀其貞烈賊退與洙合葬之文宗信妾白氏宗信為遼陽行省丞病篤氏昏旦潛禱於神至忘寢食宗信語之曰汝年方二十我死汝當奈何氏應曰妾身草芥賴夫子以存活萬一不諱妾不獨生宗信死逮殮氏盡出箱篋分給親戚沐浴告别主母遂自縊親戚義之與夫同葬明巫氏瀋陽衛農家婦正德十年五月夫在田耕耘氏獨行饋餉遇強暴持刀挾氏欲汚之氏堅執不從遂為所殺死後手中猶握血漬破衣一片巡撫立碑表其墓蕭士清妻丁氏金州人奉姑至孝士清疾飲食俱廢祝天願以身代士清歿氏悲慟纍日遂自縊正德間旌表又張頃妻朱氏張俊妻徐氏錢海妻許氏皆金州人夫亡守節又籍氏金州軍餘之妻夫死守志四十餘年又劉志才妻閔氏能以禮自防夫屬軍籍成金州傭衽供衣食夫亡無子撫妾子如巳出裴貴妻劉氏三萬衛鎮撫劉呼喇圖女幼聰慧父母令女師授孝經列女傳咸成誦年十六適同郡裴貴事舅姑以孝聞既而貴有疾氏潛刲股肉和糜以進弗效每夜禱天祈以身代夫疾革乃囑曰吾危矣汝幼善事後人氏泣曰奈何以犬豕畜妾當誓天效死安用生為遂入隱室而縊家人覺救之無及越一日夫歿事聞旌之呼喇圖舊作忽魯充今改正高門五節婦劉氏光州固始人夫高希鳯戍遼東為亂軍所掠拒而不服軍怒斷其腕劉抱腕且哭且罵遂被殺希鳳弟藥師努妻李氏早寡因亂攜子姓避難始終保全歸守夫墓誓不再適希鳯季弟巴延布哈為仇家所殺妻郭氏即自縊於馬櫪希鳯從子塔實廷為父仇訟陷而死妻金氏妾邢氏俱自志事姑通弟正與文亦早亡正妻宋氏文妻陳氏俱守節不移時稱一門四節蔡遇春妻陳氏瀋陽人遇春死即欲自縊以殉以年飢未葬子幼無依而止越三年卜葬抱子痛哭先一日縊死竟與夫合葬顧澄妻楊氏鐵嶺人遺腹三月産一男楊氏誓不二適甘貧撫孤卒時七十九歲陸淳妻鄧氏三萬衛人淳死氏年十九哀毁不食殮畢即自縊葬之日送者無下隕涕趙雲妻于氏三萬衛人年二十餘雲故氏自縊櫬旁高門二節婦高鳳妻蘇氏鳳戍開原病故蘇氏扶櫬歸葬撫教二子守節五十四載卒年八十有三鳳弟龍娶羅氏龍故遺腹四月生一男羅氏守志撫孤人稱一門雙節本朝貝勒莽古爾泰次福晉納喇氏貝勒卒欲從殉太宗文皇帝諭止之福晉固詣遂至别室自盡侍妾一人亦從死焉克勤郡王嶽託福晉納喇氏崇德四年嶽託薨福晉殉李度妻趙氏奉天鑲黃旗人夫亡守節又正紅旗清格妻瓜爾佳氏阿克順妻趙氏索斐妻索佳氏阿哩尼妻托和囉氏阿布尼妻納喇氏阿克恕妻覺羅氏雅爾遜妻赫舍哩氏義思哈妻覺羅氏鑲黃旗漢軍董國祥妻李氏張明儒妻汪氏正白旗漢軍王國勳妻汪氏王國輔妻孫氏劉得祿妻趙氏劉廷印妻金氏禮部壯丁金柏連妻李氏均康熙年間旌劉氏女遼陽正黃旗人少失恃依嫂以居嫂與人通恐女發其事欲並汚之女抵死不從遂為所殺康熙年間旌王命召妻滕氏蓋平城守漢軍滕天成姊嫁未期命召從征廣東後自京移家往氏扺粵南五日命召病亡乃號泣自縊康熙年間旌康泰妻楊氏遼陽人拒暴被害同州石函喻妻李氏夫亡守節均康熙五十二年旌薩穆哈妻關氏永陵總管所屬鑲黃旗人夫亡守節又正黃旗三泰妻耿氏正白旗蘇爾泰妻覺羅氏朱光彩妻達氏劉琪妻傅氏鑲白旗科什妻趙氏索奈妻何氏正紅旗哲庫納妻曹氏鑲紅旗海哈妻馬氏正藍旗額嶽納妻伊氏松奇妻關氏鑲藍旗衆神保妻關氏阿爾泰妻徐氏福陵總管所屬鑲黃旗費揚武妻傅氏賽必哈妻蘇氏法碩妻袁氏穆陳妻王氏正黃旗穆立泰妻趙氏佟花芷妻趙氏八十五妻何氏依蘭太妻王氏正白旗剛安泰妻趙氏保住妻趙氏蘇拉太妻趙氏鑲藍旗莫禮宏妻孫氏昭陵總管所屬鑲黃旗千丁高登舉妻謝氏張成文妻金氏胡登元妻祁氏李天鳯妻李氏晉良玉妻張氏金儒奎妻孫氏王天順妻汪氏時永明妾洪氏李有福妻董氏金明玉妻劉氏胡登雲妻李氏羅聰妻黃氏王玉龍妻陳氏正黃旗竈保妻瓜爾佳氏吳士英妻劉氏七十八妻寧氏薛自昌妻張氏常柱妻石氏正白旗郝尚智妻劉氏鑲白旗伍達克妻蒙古索氏正藍旗書魯木妻郎氏費揚古妻赫舍哩氏鑲藍旗烏何諾妻覺羅氏均雍正年間旌滕文煥妻崔氏奉天正白旗人甫納聘文焕殁氏守貞三十餘年雍正十年入祀節孝祠王守貴妻李氏寧海正黃旗人夫家近海地多流寓有欲強汚之者氏堅拒不從被害雍正年間旌古禮妻李氏奉天鑲黃旗人夫亡守節同旗筆帖式福克山妻塔坦氏李建龍妻盧氏建龍姪澄妻劉氏源妻李氏騎都尉薩木哈妻色勒理氏常祿妻赫舍哩氏穆澄妻王氏覺和托妻覺羅氏柱兒妻田氏伍栭妻陳氏杜爾泰妻姚氏趙拜妻瓜爾佳氏伍爾妻陳氏曾保妻閔氏常祿保妻何氏趙巴燕妻關氏覺圖妻王氏舍立泰妻趙氏吳靈阿妻關氏三雅圖妻顔氏魯夀妻于氏正黃旗西蘭泰妻王氏那爾泰妻烏雅氏瓦什妻扎拉氏雅蘭泰妻李氏伍勒妻高氏沙賴妻黃氏海蘭妻趙氏正白旗滕文煜妻徐氏賽達禮妻烏雅拉氏達崇阿妻張氏保住妻覺羅氏沙賴妻納喇氏那拉庫妻白氏鑲白旗莽古爾賚妻瓜爾佳氏鄂阿納妻高氏阿金妻烏噌特氏正紅旗筆帖式諾敏妻鈕祜祿氏關六格妻康氏白蘇朗妻溫察氏達薩布妻韓氏安圖妻高氏巴延圖妻傅氏溫補妻王氏白斯瑚郎妻溫察氏和善妻趙氏長夀妻吳氏松額托妻蘇氏瑚西那妻劉氏禪奇妻費氏伊拉根妻趙氏尼卜鈕妻吳氏剛阿塔妻唐氏鑲紅旗韓奇妻郎氏奈信妻舒舒覺羅氏薩蜜哈妻瓜爾佳氏白圖妻吳氏農生妻關氏乃新妻獨獨覺羅氏哈爾吉納妻瓜爾佳氏莫和勒妻阿蘇特氏扎爾呼妻巴雅喇氏石頭妻圖默特氏鈕什妻們綽克氏那爾泰妻卓絡特氏李芬芳妻孫氏正藍旗固爾泰妻史氏察穆布妻巴雅喇氏保拜妻楊氏渾奇妻瓜爾佳氏麻色妻馬氏馬揚阿妻楊氏達蘭泰妻張氏保住妻倉氏法吉納妻趙氏都伯盛妻傅氏麻奈妻馬氏西勒妻羅氏布達哈妻關氏黃自禮妻談氏瓦子妻庫雅拉氏鑲藍旗花薩里妻瓜爾佳氏納楞額妻喀爾拉氏薩那妻王氏喀里岱妻關氏多利妻寧氏陶法哈妻孫氏索色妻吳氏希爾德妻烏嚕特氏張圖賓妻楊氏鑲黃旗漢軍徐得妻許氏劉登科妻賈氏李顯芝妻吳氏楊朝臣妻任氏楊門黃氏段門汪氏郭門陳氏正黃旗漢軍朱有成妻沈氏楊志𥙿妻王氏張文孝妻何氏傅達妻王氏郭明玉妻張氏高文倉妻石氏李珊妻唐氏正白旗漢軍張文明妻劉氏孫珊妻于氏楊玉林妻林氏烏布恆妻莫氏金達立妻白氏王國相妻薑氏康國禮妻盧氏李有貴妻倪氏陳嘉謨妻祝氏董魁臣妻張氏劉繼美妻薑氏何門楊氏陳門李氏鑲白旗漢軍劉元輔妻吳氏康鳳玉妻宋氏康守玉妻朱氏康懷玉妻金氏朱自善妻佟氏張元臣妻王氏陳門龎氏李門王氏正紅旗漢軍何世秀妻徐氏王世臣妻楊氏張儛妻李氏王綱妻李氏趙世登妻皮氏田宗德妻王氏蘇門劉氏胡門王氏鑲紅旗漢軍武成功妻劉氏董宏仁妻張氏顧天榮妻謝氏王鳳來妻詹氏王鳳鳴妻王