徙治於此故義州衛在義州城內明洪武二十三年設衛於十三山尋移治義州本朝為城守尉治乾隆四十八年有御製過義州詩古虹螺山寨在府治西五十里按遼金元三史地理志俱無此寨名唐書亦不載其名土人相傳疑渤海時建通志其遺墟周二里三百三十四步有門三今圮和龍宫在錦縣西慕容皓時有二龍各在一山交首嬉翔皓見之大悅改所築宫曰和龍宫白雀園慕容盛時有雀素身緑首棲於東園因改其園曰白雀園以表瑞又景雲山逍遙宫甘露殿曲光海清涼池皆慕容熙所造遼王府在廣寧縣城內西北隅明洪武二十五年封遼王於此永樂初徙封荆州府久廢鎮東堂在廣寧縣城內明巡撫王翺建覽秀亭在醫巫閭山西麓其地高爽可以登覽山河之秀故名誓臺在廣寧縣東三十里明統志唐太宗征高麗築此臺以誓師釣魚臺在義州北門外明給事中賀欽築鮮卑故庭在義州魏武帝征遼嘗涉其地城堡大淩河城在錦縣東四十里明宣德三年置中左千户所於此屬廣寧左屯衛城周三里有奇門一本朝順治初城址尚存實録天聰五年秋七月癸巳謹按太宗文皇帝聞明總兵祖大夀等率山海關外八城兵及夫役築大淩河城欲乘我兵未至告竣己亥太宗文皇帝統大軍西發八月丁未抵大淩河進圍其城命大臣楞額禮率正黃旗兵圍北面之西額駙達爾漢率鑲黃旗兵圍北面之東貝勒阿巴泰率護軍在後策應覺羅色埒率正藍旗兵圍正南面貝勒莽古爾泰德格類率護軍在後䇿應宗室芬古率鑲藍旗兵圍南面之西貝勒濟爾哈朗率護軍在後䇿應大臣武納格率左翼蒙古兵圍南面之東喀克都哩率正白旗兵圍東面之北貝勒多鐸率護軍在後策應大臣伊爾登率鑲白旗兵圍東面之南貝勒多爾衮率護軍在後策應額駙和碩圖率正紅旗兵圍西面之北大貝勒代善率護軍在後策應大臣鄂穆岱率右翼蒙古兵圍正西面葉臣率鑲紅旗兵圍西面之南貝勒嶽託率護軍在後策應蒙古貝勒明安等各率所部兵於空隙處列營額駙佟養性率舊漢兵載紅衣炮當錦州大道而營太宗文皇帝諭曰攻城恐士卒被傷不若掘壕築牆以困之彼兵若出我則與戰外援若至我則迎擊於是諸將分赴汛地環城四面掘壕太宗文皇帝臨城南山岡閲視有騎兵百餘出城逐我採樵者命侍衛率護軍擊之擒其都司王延祚庚戌明騎兵百餘出城布顔圖談拜率護軍擊之斬三十餘人辛亥明步騎兵約五百出城額駙達爾漢率八十人擊敗之追至城壕而還復有出城刈禾者布顔圖率護軍四十人擊之斬三十人貝勒莽古爾泰德格類所轄護軍斬十八人總兵官馬光遠招降城南一臺遊擊范文程招降城西一臺癸丑命大臣揚善翁阿岱蘇達拉率護軍列壕邊遇敵人過壕乃接戰圖賚南楚哈克薩哈等列兩黃旗間見敵人逐我樵採者乃邀擊之諸將甫至汛地明兵出城誘戰圖賚即率兵往擊額駙達爾漢率鑲黃旗兵繼進四面軍士見之亦各進戰兩藍旗兵徑抵城壕舍騎步戰逼明兵入壕明兵入壕死者百餘人是日額駙佟養性督舊漢兵以紅衣炮攻城西南隅一臺穿其雉堞臺兵驚懼遂降我兵列車楯於臺下以炮攻城之南面壞其雉堞四敵樓一又攻毀城東一臺臺兵乘夜遁我兵追及盡殱之先是命阿山勞薩圖嚕什往錦州偵敵擒明兵十一人又設伏路旁獲七人丁巳明援兵自松山來阿山勞薩圖嚕什率兵三百擊敗之斬百餘人獲其纛二甲子命貝勒阿濟格碩託率領纛大臣每旗一員精兵五百蒙古兵五百往松山遮擊明援兵太宗文皇帝親往指示立營瞭哨之地而還越一日明錦州副將二員參將遊擊十員率兵六千至時大霧人覿面不相識我軍列陳以待忽有青氣自天衝入敵營霧開如門頃之即霽阿濟格碩託遂率兵進擊大敗之追殺至錦州城生擒遊擊一員辛未祖大夀遣兵出城奪我軍已得之臺甫樹梯和碩圖葉臣等各率兵出營偕敖漢奈曼蒙古兵齊進攻擊大敗之明兵奔入城追擊至城壕乃止九月乙亥命談布率護軍一百五十人邀擊明兵出城樵採者斬三人生擒二人庚辰我軍攻克大淩河西五里外一臺盡殲其衆癸未偵知明兵來援錦州太宗文皇帝以貝勒阿濟格兵寡命額駙揚古利率八旗護軍之半往益之丁亥命貝勒多鐸率護軍二百營兵一千五百額駙佟養性率舊漢兵五百攜車楯往擊太宗文皇帝見錦州城南塵起遣圖嚕什勞薩往覘親率護軍二百與多鐸同往緣山前行頃之明兵七千逐圖嚕什等至小淩河岸太宗文皇帝見之遂擐甲渡河直衝而入敵兵七千悉潰遁追擊至錦州城敵墮壕死者甚衆城中復出步兵列車楯大炮於城外以騎兵隨其後距我軍里許太宗文皇帝督兵擊敗之斬副將一生擒把總一乃收軍以兵留付阿濟格而還庚寅命營卒執旗幟離大凌河城十里馳騁揚塵聲炮不絶為錦州援兵狀祖大夀遂率兵出城攻西南隅我兵已得之臺樹梯將登我鑲藍旗鑲紅旗右翼蒙古烏嚕特蒙古四營兵齊出奮戰太宗文皇帝豫率護軍伏山內突馳進擊敵知墮計奔入城陳斬臺下者十七人中創死者百餘人自是祖大夀閉城不敢復出乙未明太僕寺卿監軍道張春與總兵吳襄等率兵四萬餘來援過小淩河駐營掘壕列車楯槍炮我哨兵馳告太宗文皇帝親率行營兵之半往視諭諸將曰敵壁壘嚴整不宜輕戰致傷我衆俟彼起營前進乘隙擊之遂引軍還戊戌明兵四更起行距大淩河城十五里太宗文皇帝與大貝勒代善率兵二萬往擊至則敵已列陳太宗文皇帝密遣精鋭設伏扼敵歸路以行營兵推戰車近敵護軍及蒙古兵繼列先令騎兵衝敵陳敵槍炮齊發我騎兵縱橫馳突飛矢如雨敵敗卻我右翼兵悉衝入敵陳先殺其步兵四面追擊其騎兵左翼兵避敵槍炮踵右翼兵而進敵營未盡破仍復拒戰額駙佟養性奉命率所部兵屯於