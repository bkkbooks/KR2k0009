任七年咸多惠政張萬言奉天監生康熙二十六年知瓊州府潔已愛民尤善教養歲旱發倉賑飢民懷其惠四十五年祀名宦賈棠河間貢生康熙三十七年知瓊州府正已率屬決訟如流置義田以濟孤貧修橋梁以便行旅尋擢本省鹽法道郡民思之卒祀名宦林文英侯官人康熙進士五十四年知瓊州府革陋規清夙弊瓊隔海南士子艱於應試文英輒捐俸金買舟以濟瓊士感之卒祀名宦俞參升山陰人康熙二十一年令澄邁建學養士聽訟和平卒祀名宦陶元淳常熟人康熙三十三年令昌化邑再罹兵燹册籍燬姦民隱占貧弱逃亡元淳力行清丈定為科則民復業者千餘家卒於官著有南崖集四卷皆在官時為民請命所作張光祖厯城人康熙三十八年知萬州加意撫循民鮮逋賦萬多陂塘洪口陂深陂為利最大光祖疏濬潤田數千頃歲凶無虞卒祀名宦徐濬漢軍正黃旗人康熙五十一年知萬州時當兵燹之後多橫徴濫派濬悉革之修橋梁以利民行仿荒政以備災旱民甚德之卒祀名宦楊廷潮州人瓊鎮左營千總隨征逆賊王之銑力戰陳亡人物宋薑唐佐字公弼瓊山人從蘇軾學軾重其才崇寧初以鄉薦隨計過汝陽蘇軾亦稱其氣和而言邁有中州士人之風王霄字霞舉儋州人年七十餘始應貢辟雍三年歸遂不出李光以宿學稱之年至九十六衆推為鄉先生陳應元字景仁瓊山人七歲能屬文登紹定進士初尉徐聞厯宜倫令尋改番禺李昴英徐清叟童槐李曾伯交章薦之辟倅雷州攝儋州所至有聲學行政事為瓊士最謝明瓊山人宋末與謝富冉安國黃之傑並從安撫趙與珞拒元兵於白沙口被執不屈而死元蔡徴字希元居萬宣後遷瓊山通經史善文辭先攝郡學元末兵起遂歸隱纂瓊海方輿志明莫宣寶定安人元末文昌賊陳子瑚猖獗宣寶率鄉兵併力戰守合境以全洪武初詔書奬諭八年永嘉侯朱亮祖征五指山宣寶建議開十字路會黎賊宇出奮臂敵之中流夭卒太祖嘉之敕祀鄉賢張騰鸞崖州人共武初父為海寇所虜騰鸞率鄉勇奪之手刃數賊竟遇害唐誼方名遜以字行瓊山人篤學力行元末纍辟不就洪武初舉經明行修授郡訓導永樂間請老歸時年九十門有祖植古榕鄉里稱榕樹公林茂森字良才臨高人少孤事母孝甘貧力學永樂中以舉人選武宣教諭勤於課士後以母老辭歸著有方輿儒林一覽行世唐舟字汝濟瓊山人永樂進士知新建縣治尚簡易洪熙中為監察御史疏論內侍陷黃本固等數事風節凜然舟心事光明與人無纎毫畛域揚厯中外餘三十年家無擔石儲年八十二卒鄉議高之邢宥字克寬文昌人正統中進士擢監察御史景泰初治王振黨獄督運通州糧以實宣府有能聲出按福建遼東河南風裁皆震一時厯台州蘇州知府當官廉介後以僉都御史巡撫應天兼理兩浙鹽政考察屬吏奏黜不職者七十餘人居數歲引疾歸榮瑄瓊山人天順初與兄琇扶母避賊將見獲琇謂瑄曰並死無益吾以死衛母汝急去瑄從之賊將殺其母琇曰貰吾母願相從遂陷賊中後琇為官軍所執將刑瑄趨至曰兄以母故陷賊今母老恃兄為命願代死遂見殺薛遠字繼遠瓊山人正統中進士以户部郎核逋南畿督儲大同並著能聲以工部侍郎塞開封決河且行賑恤改户部督兩廣兵餉成化中為南京兵部尚書汪直諷言官劾之罷去王佐字汝學臨高人正統中舉人成化初授高州府同知改邵武臨江二府同知所至清廉慈愛始終如一佐自少至老手不釋卷所著有雞肋集經籍目略原教篇瓊臺外紀庚申録珠崖録邱濬字仲深瓊山人景泰進士授編修時南海衛官軍苦遠調天順七年濬奏請專防海黎賊寇帝嘉納之成化二年晉侍講與修英宗實録或謂于謙誅死當著其異謀濬曰己巳之變微少保國事不知所終武臣挾怨誣之安可徇也衆乃止厯晉禮部侍郎掌國子監祭酒撰大學衍義輔一百六十卷孝宗立表上之晉禮部尚書宏治四年晉文淵閣大學士參預機務上疏詩革弊政年七十餘卒於官贈太傳諡文莊濬博極羣書尤熱典故性剛直與入論政必反覆辨難生平痛抑詭行之士黨論朱子家禮最得崇本敦實之意作朱子學的二十篇入仕四十餘年家無贏餘正德中賜祠於鄉陳實字秀卿瓊山人宏治中進士劉瑾用事家居數年瑾敗起南京江西道御史劾罷採珠內侍趙蘭改北御史出按徽寧諸郡厯常州知府所至有聲韓俊字克彰文昌人宏治進士為刑部員外郎以忤劉瑾歸瑾誅起官遷刑部郎中河南副使以廉能為天下第一馮容字有孚瓊山人宏治中進士授戶部主事官軍討待蚺蛇久不克容厯陳致變之由請用土官已廢者攻之劉大夏奏行其䇿正德中勘涇王莊地清還二千七百餘頃後改御史以事忤劉瑾為所誣自經死林士元字舜卿瓊山人正德中進士授行入册封唐藩却餽金六十鎰擢南京戶科給事中劾光祿少卿史俊都御史汪鋐併內外不職者數十人仕路一清先後陳時務數十疏皆極剴切擢湖廣副使轉廣西參政浙江按察司以憂歸遂不起鍾芳字仲實崖州人改籍瓊山正德中進士由編修謫寧國推官遷漳州同知有政績厯部郎為浙江提學副使崇尚名檢士風為之一變轉廣西參政諭降討叛屢著軍功再轉江西布政擢南太常卿晉兵部侍郎改户部會南都太廟災疏請修省多剴切語俄請致仕家居十餘年有干以私者謝曰吾豈晚而改節哉芳學至精極博著有學易疑議春秋集要皇極經世圖贊古今紀要崖志略及詩文二十卷唐胄字平侯瓊山人宏治中進士授户部主事疏請罷蘇州織造內臣厯官雲南副使提督南贛巡撫山東所至有聲進户部左侍郎世宗欲討南安胄極言用兵非計其後卒撫定之郭勛怙寵為其祖英請配享太廟胄疏爭不聽世宗欲以興獻皇祀明堂配上帝胄又力言不可坐削籍歸胄耿介有器識立廟執義不撓海南推為冠冕子穆嘉靖中進士官禮部員外郎王宏誨字紹傳定安人喜靖進士選庶吉士海瑞以直諫被逮宏誨極力調護及張居正用事宏誨作火樹篇春雪歌諷之纍升至南京禮部尚書上疏請建儲朝講等六事因病乞休致仕王盤瓊山人隆慶中其母為賊所虜盤多方丐資以贖僅得免賊繼至責如前盤無以應願己死易母賊怒兩殺之海瑞字汝賢瓊山人生四歲而孤母謝氏夫志教之嘉靖已酉舉於鄉計偕伏闕上平黎策授南平教諭謁上官以師儒禮抗見遷知淳安縣轉判興國尋擢户部主事時世宗久不視朝瑞抗疏直陳數千言世宗怒甚擲其章於地下獄論死移宗立復官改兵部旋晉大理丞擢僉都御史巡撫應天豪強貪墨望風戢翼吳淞江暨白茆港河道久淤瑞身乘小舟督畚鍤剋日疏濬不期月告成賑活飢民數十萬户清丈三吳田悉奪豪右受獻者還之民遂搆蜚語解官里居十五年至萬厯乙酉起南僉都晉右都御史掌南院議革諸司穴役穴費以身矯物百吏震肅卒於任贈太子少保諡忠介自號剛峯天下稱剛峯先生梁雲龍字會可瓊山人萬厯中進士授兵部主事厯任副使兵備莊浪中蜚語解職尋敘前後邊功復官進布政使升湖廣巡撫卒官子思泰天啓中副榜為貴陽同知督銄征黔寇死難諡忠烈本朝林運鑑文昌人康熙舉人任高安知縣躬親勸稼建文昌閣集諸士誦讀置田為膏火禁溺女置義塜卒於任祀名宦康熙五十四年復祀鄉賢王宗佑樂會舉人康熙二十四年令溫江旱則築江安堰潦則浚楊柳渡民飫其利乞休後閉户著書學者宗之卒祀鄉賢鄭存禮瓊山人性至孝母病篤禱以身代父老齒脫嚼飯送咽居喪廬墓三年友愛兩兄撫養孤姪雍正十二年旌祀忠義祠莫謨定安舉人知灤州明於決獄民無遁情士風振興姦宄斂迹居家恤貧睦族殁後灤州士民請祀名宦林朱密瓊山人少孤事母至孝居鄉孰得肉必歸奉母居喪廬墓三年乾隆中祀忠義祠吳位和瓊山優貢任博羅訓導二歲喪母哀毁過成人及長侍父暨繼母疾衣不解帶居喪先後廬墓六年歲飢使子槖千金市榖以備施賑乾隆五十三年以孝子旌張日珉文昌人乾隆進士令宜良政尚簡易捐俸開張子溝於北屯四十餘里灌溉陸涼路南宜良三州縣調新平治如宜良告養歸居父喪廬墓一年卒宜良新平俱祀名宦王一聖臨高人少孤事母至孝與弟一賢相勵以善祀孝弟祠林春榮陵水人孝事父母自少至老不離滕乾隆十七年舉孝子流寓唐李德裕趙都人宣宗朝白敏中排之纍貶崖州司户次年卒懿宗朝復贈左㒒射宋蘇軾眉山人紹聖間連貶瓊州别駕居昌化軍僦官房有司不可乃寓城東天慶觀結屋以居儋人運甓畚土助之獨與幼子過著書為樂時時從父老遊若將終身任伯雨眉山人徽崇朝居諫省半嵗所上一百八疏黨禍作屢徙昌化軍三年釋歸曲端鎮戎人建炎中烏珠窺江淮張浚議出師端曰宜訓兵秣馬俟之浚不悅罷端兵柄再謫海州團練使萬州安置烏珠舊作兀术今改正趙鼎聞喜人以故相謫吉陽軍王年潛居深處門人故吏不敢通問惟廣西帥張宗元時餽醪米秦檜聞之命本軍月具存亡狀鼎乃自書墓中石記鄉里及除拜歲月又書銘旌云身騎箕尾歸天上氣作山河壯本朝遂不食死李光上虞人紹興中以參知政事斥泰檜懷姦誤國連謫瓊州安置居八年移昌化軍怡然自適年逾八十精力不衰亭臺扁詠多出其手胡銓廬陵人紹興中以樞密院編修疏請斬秦檜王倫編管新州後新州守張棣訐銓與客倡酬謗訕再謫吉陽軍二十六年秦檜死乃得歸列女漢珠崖二義珠崖令後妻及前妻女也女名初年十三繼母連大珠以為繫臂令死送喪還法內珠入關者死繼母棄之九歲兒取置鏡奩中皆不知也及關候索得珠問誰當坐初曰初心惜之夫妾當坐關吏執人不知也母亦曰此珠妾之繫臂筆書不能就乃曰母子有義知此坐之不忍後乃知九歲兒內焉唐符鳳妻字玉英鳯以罪徙儋州至南海為獠賊所殺劫玉英英乃紿賊請更衣有頃盛服立於舟罵曰受賊辱不知死自沈於海元林友仁母李氏瓊山人年二副阿喇表其十五而寡守節泰定中海北憲門阿喇舊作阿刺今譯改唐柏壽女五妹瓊山人至正中陳之瑚亂與其妹俱被執語妹曰我必不免於從辱汝幼尚可求生乃紿賊曰家破親亡何所歸將焉用縳賊然之釋其繫即投江死時年十八陳道安妻林氏文昌人至正十四年陳之瑚殺道安林瘞其夫遂噉土哽咽而絶韓良可二女其先相州人宋魏公琦之後子孫有宦於瓊者為文昌人良可長女年十八次女年十六至正二十一年賊攻韓氏寨諸兄皆力戰死母遇害二女攜手投江而死蔡徴為之傳贊明賈嶽妻程氏瓊山人前所鎮撫凱之女洪武中歸嶽四年而嶽病篤程嚙指血誓以同死及嶽卒程親視舍殮夜沐浴整衣自縊年二十一解縉為作傳馮那有妻王氏澄邁人嘉靖四十四年海寇至境其夫與衆拒之為賊所殺氏縊以殉林維翰妻陳氏儋州人嘉靖中維翰赴省試卒氏聞畫夜號慟比喪還自縊死時年十九同邑林任重妻范氏夫亡守節隆慶中為叛兵劫去奮罵不辱被殺謝應升妻韓氏瓊山人年二十為海寇曽一本所虜罵賊遇害同邑許撝謙妻陶氏陶舜卿女金娘均於隆慶中倭陷海口被掠不屈死林有原妻李氏澄邁人萬厯中為海賊所虜厲聲罵賊令速殺竟被刃死陳瑛妻程氏定安人年二十喪夫舉遺腹于託乳保撫之慨然曰夫有子矣與其後死而失節不如同穴之為愈遂自縊死林繼統女淑溫文昌人年十六受瓊山沈魴聘魴死女易服守志會海寇掠其家挾至海脅之不從碎首而死同邑王高賓妻華氏萬厯二年與其女並為海寇林鳳所執堅不屈母女俱被殺又韓文濬妻吳氏為海寇許萬載所執觸石而死賊怒碎其尸黎天注妻邢氏