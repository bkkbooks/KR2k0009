  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_170-1a}
body:
  text: 瓊州府古迹舍城故城在瓊山縣東南元和志隋太業六年置唐書地理志隨珠崖郡武德四年平蕭銑置崖州治舍城縣新唐志以舍城水為名寰宇記開寶五年廢崖州以舍城縣屬瓊州本漢瞫都縣地九域志熙寧四年省入瓊山輿地紀勝引圖經序云去瓊州三十里有古崖州城又引瓊管志云在今瓊州南之瞫都土人猶呼為舊崖州府志舊州在今縣南四十里濱江築城引小溪為濠遺址尚存按寰宇記云舊崖州在瓊州東北二百六十里疑誤瓊山故城在今瓊山縣南元和志本漢玳瑁縣地唐貞觀五年置瓊山縣屬瓊州以縣西六里瓊山得名寰宇記瓊州理瓊山縣開寶四年平南越割崖州之地屬瓊州舊志故縣在今縣南六十里宋熙寧四年始移今治按漢玳瑁縣無考晉志合浦郡有毒質縣疑即玳瑁蓋晉亦省珠崖入合浦也澄邁故城寰宇記在舊崖州西九十里漢苟中縣地惰置澄邁縣以界內邁山為名輿地紀勝引圖經云舊縣治在澄邁村後移今治明統志在府城西六十里按九域志云縣在州西五十五里縣志云澄水邁山四面環繞縣治宅焉元燬於寇明洪武三年仍相舊址建設成化中邱濬以縣治海濱欲議遷徙未果與地紀勝云後移今治亦無確據今縣治在府西六十里與九域志所載相近疑即今治定安故城在今定安縣東南明統志在府城南八十里本唐宋瓊山縣地通志元至元三十年元帥朱斌平黎巢明年置縣治在今縣東南南資都新寨嶺下天厯二年升南建州移治瓊牙鄉即今治明洪武二年故南建知州王官子廷金為亂尋剿平之因廢州復為縣文昌故城在今文昌縣北唐置寰宇記在舊崖州東南一百四十里通志故縣在今縣北何恭都潭步村元至順二年移於北山都即今治會同故城在今會同縣西北縣志本樂會縣黎洞地元至元二十八年克哷濟蘇平黎始割樂會西北境置縣治在今縣西北永安都烏石硧皇慶元年為土酋王高所燬徙於端山即今治又有故址在縣東南太平都牛斗村克哷濟蘇舊作澗里吉思今譯改樂會故城在今樂會縣北宋史地理志樂會縣唐置環以黎洞寄治南管九域志在瓊州東南一百餘里輿地紀勝引瓊管志云黎人屢攻破縣遷徙不一今現治南管村通志唐縣治黎黑村在今會同縣東元至元二十四年徙調瀨村在今會同縣東南大德六年王文河之亂又徙萬泉渡南即今治臨機故城在臨高縣東南唐初置開元初更名臨高與地紀勝縣初治英邱紹興初遷於莫村府志有臨機村在臨高縣東那虞都海邊昌化故城在今昌化縣東南元和志儋州昌化縣本漢至來縣地隋大業六年置寰宇記在儋州西南一百八十黑明統志在州南一百九十里有千户所在縣北十里洪武二十五年建正統六年徙縣治千户所通志隋縣在今縣東南十五里舊縣村石基猶存宋移治今縣南十里南北二江間州中明初數罹水患正統間移治千户所即今治其漢至來縣無考萬安故城在萬州北本漢紫貝縣地唐置萬安縣為萬安州治宋熙寧時廢州為軍九域志北至瓊州二百八十五里西南至朱崖軍三百九十五里輿地紀勝大觀二年移軍於陵水洞又移於容寮後移今處通志唐治通化都在今州北今名舊州宋移今治陵水故城在今陵水縣東北隋置九域志在萬安軍西南一百十里明統志在萬州城南六十里又有南山守禦千户所在縣西南通志唐初縣治陵水洞博吉李村在今縣東北元初遷南山頭皇慶間遷龍頭村海邊後又遷港門明洪武間築城正統間燬遷於南山所即今治感恩故城即今感恩縣治元和志本漢九龍縣隋大業六年改名感恩取感恩水為名寰宇記縣東至儋州二百二十五里九域志在昌化軍西南二百七十九里明統志在崖州西北二百二十里通志故縣治中和鄉萬厯九年以其地近海多浮沙移治縣東大雅坡後以嵐瘴復移還今治珠崖故郡在瓊山縣東南漢書地理志序自徐聞南入海得大洲方千里元鼎六年略以為珠崖儋耳郡應劭注郡在大海中崖岸之間出真珠故曰珠崖臣瓚注引茂陵書珠崖郡治瞫都去長安七千三百二十四里元帝本紀初元三年珠崖山南縣反省珠崖郡賈捐之傳珠崖儋耳郡在南方海中廣袤千里合十六縣其民自以阻絶數犯吏禁吏亦酷之率數歲一反帝用捐之言遂罷郡地理志合浦郡領朱盧縣為都尉治蓋即改故珠崖郡所置後漢志無朱盧而有珠崖縣仍屬合浦郡晉書地理志吳赤烏五年復置珠崖郡平吳後省入合浦其合浦所領有珠官縣宋書州郡志合浦領朱盧縣吳立朱盧即晉志之珠官也齊因之梁陳時朱盧縣廢隋移珠崖治義倫而故郡廢縣志漢珠崖郡在縣東南三十里東潭都即故瞫都縣儋耳故郡在儋州西山海經離耳國在鬱水南即儋耳也漢書地理志序元封元年置儋耳郡昭帝初省三國吳志赤烏中陸凱除儋耳太守蓋嘗復置尋廢也水經注引楊氏南裔異物志曰儋耳在珠崖分為東蕃元和志隋大業六年置儋耳郡唐武德五年改儋州治義倫縣章懷太子曰儋耳故城今即儋州義倫縣寰宇記儋州東至樂會縣界射狼山三百二十里西至舊振州延德縣界白沙三百四十七里東北至澄邁縣界合橋三百七十里宋避太宗諱改縣曰宜倫輿地紀勝儋耳外城楊僕築子城儋耳婆築通志故州治在今州西三十里高麻都湳灘浦隋末徙高坡即今冶按儋耳應劭曰其種大耳渠率自謂王者耳尤緩下肩三寸張晏曰鏤其頰皮上連耳匡分為數支纍纍下垂顔師古曰儋字本作瞻丁甘反輿地紀勝引平黎記載伏波收黎人西至一處有聃耳婦人出現號其地為聃或訛而為儋廢忠州在定安縣西南輿地紀勝唐咸通中辛傳趙李四將進兵擒捉黎洞蔣璘等於其地置忠州舊志廢忠州在縣西南黎母山洞中廢鎮州在感恩縣東北宋史地理志大觀元年置鎮州於黎母山心倚郭縣曰鎮寧賜靜海軍額政和元年州廢以靜海軍額歸瓊州元南寧軍記宋立鎮州隸邑三曰龍門四達感恩隋廢入昌化縣志廢鎮州城在縣東北七十里有石城遺址名楊文廣壩今為黎人雜處顔城廢縣在瓊山縣東二十里舊唐書地理志武德四年崖州領顔盧縣貞觀元年改曰顔城新唐志開元後省入舍城府志有顔村在今縣東二十里有龍盧洞即顔盧故址武德廢縣在瓊山縣東南隋書地理志朱崖郡領武德縣蓋梁陳時廢朱盧後置唐初省苟中廢縣在澄邁縣南寰宇記漢縣縣志在縣南四十里那舍都曾口廢縣在澄邁縣南舊唐書地理志貞觀十三年復置瓊州領曾口縣文獻通考五代時省縣志在縣南七十里曾家東都今其地名博羅村紫貝廢縣在文昌縣南元和志文昌本漢紫貝縣地通志故縣在縣南紫貝山陽今地名新衙容瓊廢縣在會同縣西舊唐書地理志貞觀十三年瓊州領容瓊縣貞元七年省入瓊山寰宇記廢縣在樂會縣界其地有容瓊洞府志在舊瓊山縣東南一百五十里應在今縣西界富羅廢縣在臨高縣北舊唐書地理志儋州領富羅縣本隋毗善縣武德五年改名寰宇記廢富羅縣在儋州東北一百二十里文獻通考南漢時廢舊志富羅鄉在今縣北有故縣址在東塘都那在村即古富羅也洛場廢縣在儋州東南舊唐書地理志儋州洛場縣乾元後置寰宇記元縣在黎洞山心今移入州城下輿地紀勝太宗時省入宜倫州志黎中落窑洞古為洛場縣地吉安廢縣在昌化縣北隋置屬珠崖郡唐初省入昌化貞觀元年復置屬儋州尋省縣志今縣東北有舊縣疑是富雲廢縣在萬州西舊唐書地理志貞觀五年析文昌置富雲博遼三縣屬瓊州十三年隸崖州後屬萬安州寰宇記二縣皆唐末廢文獻通考並南漢時省吉陽廢縣在崖州東元和志貞觀二年析寧遠置寰宇記在崖州東北九十里九域志熙寧六年廢為藤橋鎮文獻通考今吉陽軍城乃舊吉陽縣基舊志宋紹興六年復為縣元廢臨川廢縣在崖州東元和志本漢臨振縣地隋大業六年置唐屬振州宋屬崖州寰宇記在州東南八十里文獻通考南漢省落屯廢縣在崖州東元和志振州落屯縣永徽元年置在落屯洞因名寰宇記在崖州東北二百里文獻通考南漢省州志即今黎中落屯村在州東北一百五十里按新唐志云天寶後置與元和志異寧遠廢縣在崖州南隋置寧遠縣為臨振郡治唐改郡為振州寰宇記開寶六年割舊崖州之地隸瓊州却改振州為崖州東至陵水縣界一百六十里東北至瓊州四百五十里西北至儋州四百二十里治寧遠縣漢臨振縣地九域志熙寧六年廢州為朱崖軍廢縣為寧遠鎮輿地紀勝政和七年知軍吳况奏改軍為吉陽軍又併故吉陽寧遠二縣地為寧遠縣舊志明復改軍為州省寧逺縣通志有舊州址在今州南一里水南村延德廢縣在崖州西北隋書地理志珠崖郡領延德縣元和志本漢臨振縣地隋大業六年置唐屬振州宋屬崖州寰宇記在州西一百四十里文獻通考南漢時廢舊志廢縣在州西北一百五十里白沙鋪西南按宋史地理志有廷德軍崇寧五年置延德縣於朱崖軍黃流白沙側浪之間大觀元年改為軍又置倚郭縣曰通遠政和元年廢軍為感恩縣隸昌化軍廢通遠縣為通逺鎮屬朱崖軍六年復置延德寨蓋隋置舊縣在州西北乃南漢己廢之延德宋置延德縣後復為寨疑即今感恩縣九龍廢縣在感恩縣西北九龍山下漢儋耳郡故縣朗勇城在崖州東北八里黎人出沒之衝明正德中知州陳堯恩築城募兵防守今圮下田村在瓊山縣西北一里明邱濬故居買愁村在臨高縣東南那盆嶺下宋胡銓謫崖州經此有詩白玉蟾故居在澄邁縣東十里地名香山王宏誨故居在定安縣東南李家都龍梅村東坡故居在儋州城南故天慶觀側雲海樓在瓊山縣輿地紀勝在郡治海山樓在瓊山縣城南宋陳瓘有詩鑒空閣在瓊山縣西五十里俯瞰江流宋蘇軾有詩通潮閣在澄邁縣治西宋蘇軾嘗憩其上有詩其後胡銓和之李光書扁六瑞堂在瓊山縣治南譙樓下明統志宋時嘗開雙蓮者三郡守王光祖建堂因名又輿地紀勝有平理堂燕喜堂在郡治節愛堂超然堂在倅廳知樂堂在放生池上尊賢堂在儋州治東明統志蓋蘇軾所居郡守韓景先達此以祀軾繼美堂在儋州治東宋知軍陳適建以其父中孚亦嘗為守故名又有堅白堂亦陳適建李光改為無倦齋秀香堂在儋州治北輿地紀勝乃陳氏北園李泰發名之曰秀香載酒堂在儋州城南儋人黎子雲之居東坡訪之名其屋曰載酒堂愛民堂在萬州治又有觀德堂在廳事後皆見輿地紀勝盛德堂在崖州治輿地紀勝河東裴聞義曾守昌化居於吉陽胡銓名其堂曰盛德有銘洗兵堂在崖州西過江二里取杜甫詩淨洗甲兵長不用之意瑞蓮亭在瓊山縣城南有池産瑞蓮泂酌亭在瓊山縣東北雙泉上宋蘇軾有詩湄邱草亭在文昌縣東北五十里東崑溪北邱狹而長若隄然延亘六七里中藏一邱隆然深秀宋知軍邢夢璜世居於此其裔孫宥自都御史致任歸乃作草亭其上湧月亭在儋州城北下臨大江宋李光名之取杜甫月湧大江流之句問漢亭在儋州北大江橋上胡淡庵命名李泰發有詩凝香亭在萬州治見輿地紀勝鑑亭在萬州城東下瞰小江又有魯亭在城北元邱世傑建望闕亭在崖州城南十里唐李德裕為司户時建江亭在崖州西元參政王士熙謫居時建風月臺八年復移太平汛改今名又有安村巡司在縣東南六十里明洪武中置今裁鋪前巡司在文昌縣西北一百五十里明洪武三年置萬厯十七年添設參將鎮守本朝裁參將巡司如故青藍頭巡司在文昌縣東北七十里明洪武中置和舍巡司在臨高縣南五十里明洪武中置博鋪港巡司本朝雍正十二年移駐和舍市改今名又有定安巡司在縣東三