餘家貧二子幼父母欲嫁之筌泣不從紡績碓舂以給朝夕二子皆畢婚後渭官侍御纍遷廣東西路計度轉運使因訪舊室復相見人皆異之明邵守琪妻楊氏連州人年十九夫死竭力養舅姑撫子誠中永樂庚子鄉試有司以聞旌之同州陳才惠妻嚴氏年十六夫死遺腹生一子父欲奪其志誓不從鄧曰惠妻黎氏年十七夫死守節終身又歐氏錦桂許字賈繼保未婚夫死即奔柩前誓守終身鄰婦勸之輒翦髮斷指以拒紡績絲枲自給年八十卒鄧惟明妻熊氏連州人嘉靖辛酉冬流賊寇境熊氏隨妯娌同舟避之舟為賊獲諸人皆就執熊抱其幼女赴水死又同州鄧氏夫姓名亡考隆慶辛未大龍水賊寇境被虜不受辱投水死陳張科妻鄧氏陽山人年二十七而寡食貧守子三鳳成立娶婦唐氏古五月而三鳳死唐年十七姑婦苦節終身本朝陳子晉妻莫氏連州人夫亡守節事祖姑及姑盡孝順治四年土寇將臨城父母以舟迎之遠避莫抱幼子付其弟曰此陳氏一線也弟善保之吾有二老姑在義不容去城破投井死同時有劉烜妻江氏投井死莫矜妻李氏名子秀不屈被殺陳步鄉妻李氏名蘭玉為賊所執自沈於海嚴聖訓妻鄧氏連州人順治八年土寇掠鄉鄧誓不受辱攜二女潛匿山中忍飢不出而死廖錫封妻邱氏連州人夫亡守節雍正九年旌同州何潤龍妻黃氏歐志泰妻何氏均雍正年間旌陳友韓妻黃氏陽山人夫亡守節雍正十年旌同邑唐德墉妻李氏歐陽衍修妻唐氏均雍正年間旌葉常茂妻吳氏連州人夫亡守節乾隆二年旌同州吳秉諤妻馬氏黃如鉉妻石氏梁燫妻曽氏廖永吉妻張氏李茂清妻唐氏吳武中妻石氏鄧林松妻唐氏均乾隆年間旌仙釋唐元慧嘗居連州寺韓愈重其戒操贈之以詩時吏部員外郎王仲舒貶連州司户參軍甚愛敬之日與之遊稱為慧師土産銀唐書地理志桂陽有銀明統志連州出銅宋史地理志陽山有銅坑鐵唐書地理志桂陽陽山有鐵明統志連州出丹砂唐書地理志連州土貢布唐書地理志連州土貢白紵細布藥宋史地理志連州土貢官桂鍾乳
