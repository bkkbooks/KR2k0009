front:
  text: 大清一統志陳州府二名官漢申屠嘉梁人孝惠時為淮陽守剛毅守節不受私謁汲黯濮陽入武帝時拜為淮陽太守政清令黯以諸侯相秩居淮陽十歲而卒韓延夀燕人遷淮陽太守治甚有名鄭宏山陰人顯宗時遷淮陽太守消息繇賦政不煩苛行春天早隨車致雨白鹿方道挾轂而行主簿黃國拜賀曰聞三公車轓畫作鹿明府必為宰相戴封剛人永元初為西華今時汝潁有蝗災獨不入西華界㑹督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之是歲大旱封禱請無獲乃積薪坐其上以自焚火走而大雨暴至於是遠近歎服周磐安成人和帝時遷陽夏令有惠政韋義平陵人順帝時為陳令政甚有績官曹無事牢獄空虚及卒吏民為義舉哀駱俊烏傷人擢拜陳相值袁術僭號羣盜並起陳與比界奸慝四布俊勵威武保疆境賊不敢犯養濟百姓災害不生歲獲豐稔李祥赴郡人建安中爲淮陽太守時經喪亂之際民多流徙祥循撫有方歸者萬餘家晉鍾雅長社人舉四行除汝陽令南北朝
