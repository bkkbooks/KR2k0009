body:
  text: 宋李熙國元嘉初爲鮦陽令任事有方人思其政魏辛穆隴西人静帝時爲汝陽太守遇水澇民饑請輕租税帝聽以小絹爲調唐陸景倩吴人爲扶溝丞按察使畢構覆州縣殿最欲必得其實有吏言狀曰某彊清某詐清惟景倩曰真清劉昌裔陽曲人德宗時爲陳州刺史韓全義敗於溵水引軍走陳求入保昌裔登陴揖曰天子命軍討蔡何爲來陳且賊不敢至我城下君其舍外無恐明日從十餘騎持牛酒抵全義營勞軍全義迎拜嘆服五代晉陸思鐸澶州人高祖時爲陳州刺史有善政周王明成安人廣順初藥元福奏署陳州判官會劉崇入寇元福將兵援之事多咨於明先是州縣吏部送丁壯餉糧一夕丁夫盡遁去元福怒盡驅官吏將就戮明馳白元福曰今軍儲無闕丁夫數萬人文吏懦不能制斬之何益不如寬以待之賊敗凱旋公無專殺之名不亦善乎元福感悟盡免其死宋韓億雍邱人真宗時通判陳州會河決治隄費萬計億不賦民而營築之范仲淹吳縣人天聖中由秘閣校理改通判河中府徙陳州上疏請罷修寺觀減常歲市木之數以蠲除積負召為右司諫陳鑄興化人仁宗時通判陳州會有水患悉力拯援全活甚衆部使者上其勞朝廷嘉之李仕衡成紀人仁宗時知陳州州大水築隄以障水患魏炎仁宗時通判陳州適歲饑百姓相率强取人粟坐死者甚衆炎曰此迫於窮餓豈得巳者坐其首黥之張孜開封人仁宗時為陳州兵焉都監築隄袁家曲捍水陳以無患孫思恭登州人知宛邱縣轉運使以水災時調春夫思恭爭之弗能得乃棄官去范鎮華陽人英宗時出知陳州陳方饑視事三日擅發錢栗以貸民監司繩之急即自劾詔原之是歲大熟所貸悉還向經開封人知陳州歲終閲囚活重辟三人西華令掠人至死誣以疾經得其情窮治如法嵗大雪輒弛公利僦錢以寬民有司持不可經曰民窮蓋我責我自為此不爾累也方鎮别賜公使錢例私以自奉經斥歸有司惟以供享勞賓客軍師之用楊仲元管城人調宛邱主簿民訴旱守拒之曰邑未嘗旱校吏導民而然仲元白之曰野無青草公日宴黃堂宜不能知但一出郊可見矣校吏非他實仲元也竟免其税張方平南京人神宗時知陳州時韓絳主西師慶卒亂京西轉運使令一路各會兵於州民大駭方平持檄不下而奏之帝曰守臣不當爾耶命罷諸郡兵程顥河南人知扶溝縣瀕河惡子無生理脅取行舟財貨顥捕得一人使引其類貰宿惡分地處之令以挽繂為業且察其為奸者自是境無焚剽患吳擇仁永興人建中靖國初畿内多盜以擇仁知太康縣始至令賊曹曰民窮而盜非天性也吾以静鎮之若亡命椎埋故犯我一切誅之羣盜相戒不入境中貴人譚稹奴犯法按致於理稹羞恚造譖詔郎中宋喬年往鞫喬年慮囚摘隱剔抉帑庾出入不能得毫毛罪遂薦擢之霍端友武進人徽宗時知陳州為政以寬聞不立聲威陳地汙下久雨則積潦時疏新河八百里而去淮尚遠水不時洩端友請益開二百里徹於淮自是水患遂去内侍石燾傳詔索瑞香花數十本端友疏罷之趙子崧宣和末知淮寕府汴京失守子崧與潁昌府何志同等盟傳檄中外起兵勤王又請濟王進兵南京以號召四方豪傑向子韶開封人知淮寕府建炎中金兵至淮寕子韶率諸弟守城城陷率軍民巷戰力屈為所執闔門皆遇害陳亨祖淮寕大豪也紹興末領民兵據淮寕以城來歸命知淮寕府金兵攻城亨祖力戰死之舉家五十餘人皆死贈容州觀察使金武都東勝州人大定間為商水令縣素多盜凡奸民嘗縱火行刦椎埋發塚者都皆廉得姓名榜之通衢約毋再犯盜悉奔他境趙重福豐州人章宗時同知陳州防禦事宋諜人蘇泉入河南重福迹之至魚臺將渡河見前一舟且渡令從者大呼泉姓名前舟中忽有倉惶失措者執之果泉也王浩南遷後為扶溝令開興元年正月民錢大亨等執縣官送款於北以浩有恩不忍加刃日勸之降終不聽於是殺之無血主簿劉坦尉宋乙並見害棄屍道路自春祖夏獨浩屍儼然如生目且不瞑鳥犬莫敢近殆若有神護者葉赫納慎天興初擢陳州防禦使時兵戈搶攘道路不通葉赫納慎受命毅然䇿孤騎由間道以往陳自兵興軍民皆避他郡葉赫納慎為之擇官吏明號令完城郭立廬舍寶倉廩備器械未幾聚流亡數十萬口明年哀宗改陳州為金興軍馳使奬諭以為節度使葉赫納慎舊作粘葛奴申今譯改明劉恭獻陜西人洪武初為陳州知州平徭均税撫綏勞來流民復業者五百餘户復立社學擇師以教㓜稚民知向學李子義江西人洪武中為陳州知州勸農興學教民節儉以地多卑下督民築隄防之由是州無水患孫元仁丹徒人洪武中為商水縣丞導民以德不任刑罰有兄弟争田者元仁以義諭之感泣相讓教化大行黃福昌邑人洪武中為項城主簿臨政公廉吏民懷畏邑有好訟者福捕寘之法獄訟遂清張志道武進人正統初為陳州知州涖政廉勤教民耕織值歲多蝗鄰邑𬒳災者甚衆州境獨不為害周庠麻城人正統中為陳州知邱世光單騎諭降給以社米衆歡然散去孫紹武棠禎中為陳州衛指揮闖賊攻沈邱紹武奉檄守禦城陷死之子璉赴援亦死侯君擢成安人崇禎中為陳州知州賊圍城時身先士卒運木石擊賊後被縛罵不絶口死贈布政使右參議王化行崇禎中為商水知縣賊陷城被害姚文衡代之賊復至赴水死並獲贈卹劉伯驂河間人崇禎中為西華知縣賊圍城急有勸出降者立斬之登陴死守城陷伯驂抗節死士民立廟以祀魏令望武鄉人崇禎中知太康縣賊至固守及城陷闔門自焚死本朝田六善山西人順治中知太康縣招集流亡振興學校恤良鋤暴治稱第一劉允謙夀州人順治四年知沈邱縣英敏廉介以教養士民為務邑人德之劉嗣理全州人康熙四十六年知扶溝縣渾厚精敏案無留牘積訟數年片言而決刁健斂跡尤留心民瘼四十八年麥秋𬒳水設法賑貸全活無算吳本涵當塗人雍正十一年知太康縣撫良除暴為政嚴明奸棍蠧胥一時斂跡康邑素不諳蠶織本涵捐俸買桑諭民種植教以養蠶之法又創設書院捐俸爲膏火資人物漢鄭當時陳人少以任俠自喜聲聞梁楚間孝景時爲太子舍人置驛馬長安諸郊請謝賓客常恐不徧孝武時遷爲大司農客至無貴賤執賓主之禮以其責下人每朝候上問說未嘗不言天下長者其推轂士常引以爲賢於巳聞人之善言進之上惟恐後仕終汝南太守黃霸陽夏人少學律令武帝末以待詔入錢賞官補侍郎謁者後爲河南太守丞時吏尚嚴酷而霸獨用寛和爲名宣帝即位召爲廷尉正數決疑獄廷中稱平坐夏侯勝事繫獄霸因從勝受尚書獄中出復爲諫大夫擢揚州刺史三歲爲潁州太守累遷爲丞相封建成侯漢世言治民吏以霸爲首甘露三年薨諡曰定侯彭宣陽夏人治易事張禹舉爲博士遷東平太傅禹薦宣明經有威重可任政事累官大司農光祿勲右將軍哀帝即位徙爲左將軍歲餘以關内侯歸家元壽元年用鮑宣薦召爲光祿大夫遷御史大夫轉大司空封長平侯王莽秉政專權宣上書乞骸骨歸鄉里鍾興汝陽人少從丁恭受嚴氏春秋恭薦興學行高明光武召見拜郎中稍遷左中郎將詔令定春秋章句以授皇太子及宗室諸侯封關内侯興以讓其師丁恭於是更封恭而興遂固辭不受薛漢陳人世習韓詩父子以章句著名漢尤善說災異數授常數百人建武初爲博士當時言詩者推漢爲長永平中爲千乘太守政有異迹周防汝陽人年十六爲郡小吏世祖召掾史試經防尤能誦讀拜爲守丞防以未冠謁去師事徐州刺史蓋豫受古文尚書舉孝廉拜郎中撰尚書雜記三十二篇太尉張禹薦補博士稍遷陳留太守汝郁陳郡人性仁孝親沒遂隱處山澤以賈逵薦累遷魯相郤巡陳郡人從樊英學傳其業官至侍郎袁安汝陽人祖良習孟氏易舉明經至成武令安少傳良學爲人嚴重有威見敬於州里舉孝廉累遷太僕章和元年拜司徒竇憲北征安等上書諫輒寢安與任隗免冠朝堂固争者十上衆皆爲之危懼安正色自若又劾竇景罪舉奏諸二千石免官四十餘人竇氏大恨安以天子幼弱外戚擅權每進見及與公卿言未嘗不噫嗚流涕自天子及大臣皆恃賴之四年薨子京習孟氏易作難記三十萬言官至蜀郡太守何熙陽夏人少有大志永元中為謁者身長八尺五寸善為威容贊拜殿中音動左右和帝偉之厯司隸校尉大司農永初三年南單于與烏桓俱反以熙行車騎將軍事進擊大破之卒於軍三子臨瑾阜臨瑾並有政能阜俊才早歿臨子衡為尚書以正直稱坐訟李膺等免官袁敞京之弟少傳易經教授以父任為太子舍人和帝時厯位太僕光祿勲元初三年為司空敞廉勁不阿權貴失鄧氏指遂自殺朝廷以三公禮葬之復其官應順南頓人事母孝和帝時為河南尹將作大匠公廉約巳明達政事生十子皆有才學袁原汝陽人安帝時拜司徒忠蹇匪躬盡誠事國中興以來最為名宰周舉防之子博學洽聞為儒者所宗京師語曰五經縱横周宣光順帝初舉茂才為平邱令上書言當世得失辭甚切正陽嘉中拜尚書與僕射黃瓊同心輔政名重朝廷時數有災異詔書以舉才學優深特下䇿問後詔遣八使巡行風俗皆選素有威名者乃拜舉侍中與杜喬等分行天下舉劾奏貪猾表薦公清朝廷稱之累拜光祿大夫卒詔賜錢十萬以旌其節袁彭京之子少傳父業厯廣漢南陽太守順帝時為光祿勲行至清為吏粗𫀆糲食終於議郎尚書胡廣等追表其有清潔之美比前朝貢禹第五倫未䝉顯贈當時皆嗟嘆之蔡叔陵南頓人學通五經門徒著鋉者萬六千人順帝時詔徵拜議郎講論五經異同甚合帝意遷侍中出為宏農太守蔡衍項人少明經講授以禮讓化鄉里有爭訟者輒詣衍決之其所平處皆無怨舉孝廉稍遷冀州刺史徴拜議郎梁冀聞衍賢請欲相見辭疾不往後以表救成瑨等言甚切厲坐免官靈帝即位復拜議郎袁湯彭之弟少傳家學諸儒稱其節桓帝初為司空以豫議定䇿封安國亭侯累遷司徒太尉子二逢寛厚篤信著稱於時後為司空卒於執金吾靈帝嘗以逢為三老特優禮之隗少厯顯官獻帝初拜太傅為董卓所害袁盱敞之子官至光祿勲時梁冀擅朝内外莫不阿附惟盱與邯鄲義正身自守及桓帝誅冀使盱持節收其印綬周勰舉之子以父任為郎自免歸家梁冀貴盛前後三辟竟不能屈常隱處竄身杜絶人事巷生荆棘十有餘嵗至延熹二年乃開門延賓遊宴及秋梁冀誅年終勰卒時年五十蔡邕以為知命李巡汝陽人為中常侍時宦官縱横巡獨守凊忠不爭威權見諸博士試甲乙科爭第高下至有行賂定蘭臺漆書經字以合其私文者乃白帝與諸儒共刻五經文於石於是詔蔡邕等正其文字五經一定爭者頓息應奉順之曾孫少聰明讀書五行並下著漢書後序多所述載舉茂才拜武陵太守後為司隸校尉糾察奸違不避䝉威以嚴厲為名田貴人見幸桓帝有建立之議奉以田氏微賤不宜起登后位上書諫帝納其言黨事起奉慨然引疾自退著感騷三十篇袁紹湯之孫壯健有威容愛養名士為軍校尉將兵誅宦官拜渤海太守起兵誅董卓後引兵攻曹操軍潰疾作卒袁閎彭之孫少勵操行苦身修節父賀為彭城相閎徒行省謁比返無知者及賀卒縗絰扶柩體貌枯毁見者傷之累徵不應桓帝末黨事將作閎欲投跡深林以母老不宜遠遁乃築土室四周於庭不為戸自牖納飲食而巳旦於室中東向拜母潛身十八年黄巾賊起不入其閭鄉人就閎避難者皆得全免袁忠閎之弟與同郡范滂為友俱證黨事得釋初平中為沛相乘葦車到官以清亮稱後客會稽上虞見太守王朗徒從整飾心嫌之遂稱病自絶孫䇿破會稽忠浮海南投交阯獻帝都許徵為衛尉未到卒弟宏字邵甫以門族貴勢乃變姓名徒步從師不應徵辟終於家封觀南頓人有志節當舉孝廉以兄名位未顯恥先受之遂稱風疾喑不能言後數年兄得舉觀乃稱損仕郡為功曹從太守趙謙擊黃巾軍敗以身捍刃死袁秘忠之子為郡門下議生黄巾起從太守趙謙擊之軍敗秘與功曹封觀等七人以身捍刃皆死於陳謙以得免詔表秘等門閭號曰七賢應劭奉之子少篤學博聞多覽靈帝時舉孝廉累官太山太守劭凡為駮議三十篇又刪定律令為漢儀奏之獻帝稱善後為軍謀校尉時遷都於許舊章湮没書計罕存劭乃綴集漢官禮儀故事凡朝廷制度百官典式多劭所立又著中漢輯序撰風俗通後世服其洽聞穎容長平人博學多通師事太尉楊賜善春秋左氏著條例五萬餘言郡舉孝廉州辟公車皆不就初平中避地荆州劉表以爲武陵太守不肯起建安中卒三國魏袁渙扶樂人父滂爲漢司徒渙清浄舉動必以禮劉備爲豫州舉渙茂才後爲吕布所拘留使渙作書詈辱備渙不可布以兵脅之渙曰渙他日之事劉將軍猶今日之事將軍也如一旦去此復詈將軍可乎布慚而止歸魏武爲諫議大夫丞相軍諮祭酒前後得賜甚多皆散盡之家無所儲乏則取之於人不爲皦察之行然時人服其清魏國建爲郎中令行御史大夫事請大收籍篇明先聖之教以易民視聽居官數年卒袁徽渙從弟以儒素稱初天下將亂渙慨然嘆曰惟强而有禮可以庇身乎徽曰見幾而作君子所以元吉也徽將遠迹以求免身及亂作各行其志應瑒奉之孫爲五官將文學多諳朝廷制度文帝與吳質書稱應瑒常斐然有述作意其才學足以著書何䕫陽夏人幼以孝友稱魏武辟爲司空掾屬出為城父令遷長廣太守徴還參丞相軍事海賊郭祖寇暴樂安濟南界魏武以䕫前在長廣有威信拜樂安太守到官數月諸賊悉平入為丞相東曹掾魏國既建拜尚書僕射文帝踐祚封成陽亭侯袁亮渙從子父霸公恪有功幹魏初為大司農及同郡何䕫並知名於時亮貞固有學行疾何晏鄧颺等著論以譏切之位至河南尹尚書應璩瑒之弟博學好屬文善為書記明帝時厯官散騎常侍遷侍中後曹爽秉政多違法度璩為詩以諷焉其言多切時要世共傳之袁侃渙之子精粹閑素有父風厯位黄門選部郎號為清平稍遷至尚書早卒侃議論清當柔而不犯善與人交在廢興之間人之所趨騖者常謙退不為也弟準忠信公正不恥下問以世事多險不敢求進著書十餘萬言論治世之務為易周官詩傳及論五經滯義官至給事中吳程秉南頓人逮事鄭康成仕吳為太子太傅著周易摘商書駮論語弼凡三萬餘言胡綜汝南固始人仕呉為鄂長後典軍國密事蜀漢聞孫權踐阼遣使申前好綜為盟文文義甚美官至偏將軍兼左執法自權統事諸文誥策命鄰國書符畧皆綜所為也鄭泉陳郡人博學有奇志為吳大中大夫孫權嘗與之言卿好於衆中面諌或致無禮不畏龍鱗乎對曰臣聞君明臣直今值朝廷上下無諱實恃鴻恩不畏龍鱗晉應貞璩之子善談論以才學稱初為武帝參軍及帝踐阼遷給事中帝於華林園宴射貞賦詩甚美初置太子中庶子官以貞為之後遷散騎常侍以儒學與太尉荀顗撰定新禮卒有文集行世何曾䕫之子好學博聞性至孝閨門整肅自少至老無聲樂嬖倖之好夫妻相見如賓仕魏入晉爵朗陵公進位太宰王銓陳人少好學有著述之志仕為厯陽令每私錄晉事及功臣行狀未就而卒王瑚銓之子少重武節成都王穎舉兵向洛以為冠軍參軍累官遊擊將軍與司隸校尉滿奮等屯大司馬門以衞宫掖時上官巳縱暴瑚與奮等謀除之反為所害應詹璩之孫幼孤居祖母喪以孝聞性質素宏雅犯而不校以學藝文章顯初辟公府鎮南將軍劉宏請為長史委以軍政著績漢南遷南平太守聞洛陽傾覆詹攘袂流涕勸王澄赴援澄不能從後與陶侃破杜弢於長沙賊中金寶溢目詹一無所取唯收圖書累遷尤祿勲王敦作逆詹慷慨請討之假節都督朱雀橋南斬賊帥杜發賊平封觀陽縣侯遷使持節都督江州諸軍事平南將軍江州刺史卒次子誕有器幹厯六郡太守龍驤將軍謝鯤陽夏人父衡以儒素顯仕至國子祭酒鯤少知名通簡有高識任達不拘恬於榮辱王敦引為長史知敦有不臣之迹每從容諷議及敦至石頭鯤力勸入覲不從時朝望被害皆為其憂而鯤推理安常時進正言出為豫章太守卒王隱瑚之弟以儒素自守不交勢要博學多聞受父銓遺業西都舊事多所諳究太興初召為著作郎令與郭璞撰晉史預平王敦功賜爵平陵鄉侯袁瓌陽夏人渙曾孫南渡後累官臨川太守以功封長合鄉侯徙大司農尋除國子祭酒加散騎常侍於時喪亂之後禮教陵遲瓌上疏請備學徒博士成帝從之國學之興自瓌始弟猷少與兄齊名歴位侍中衛尉卿袁耽凖之孫耽少有才氣俶儻不羈為士類所稱蘇峻之役王導引為參軍隨導在石頭路永匡術等皆峻心腹耽潛説永等使歸順峻平封秭歸男拜建威將軍厯陽太守子質以孝行稱厯官琅邪内史東陽太守鄧嶽陳郡人少有將帥才畧司徒王導命為從事中郎遷西陽太守平蘇峻討郭黙嶽俱有功遷督交廣二州軍事建武將軍封宜城縣伯咸康中嶽遣軍伐夜郎破之加督寕州遷平南將軍卒子逸亦有武幹監交廣二州建威將軍殷浩長平人識度清遠弱冠有美名建元初徴為建武將軍揚州刺史累遷中軍將軍假節都督揚豫徐兗青五州軍事浩以中原為已任上疏北征開江西疁田千餘頃以為軍儲請屯洛陽修復園陵既至許昌會姚襄反浩擊之失利為桓温所廢浩雖被黜口無怨言談咏不輟謝尚鯤之子㓜有至性七歲喪兄哀慟過禮及長辨悟絶倫善音樂博綜衆藝司徒王導深器之辟為掾襲父爵咸亭侯累遷尚書僕射進號鎮西將軍鎮壽陽於是採拾樂人並制石磬以備太樂江表有鐘石之樂自尚始徵拜衛將軍加散騎常侍卒袁喬瓌之子初拜著作佐郎桓温鎮京口引為司馬領廣陵相尋督沔中諸戍江夏隨義陽三郡軍事時混謀伐蜀衆以為不可喬獨勸之温使喬領二千人為軍鋒進逼成都與賊大戰前鋒失利矢及馬首左右失色喬因麾而進聲氣愈厲遂大破之進號龍驤將軍封湘西伯尋卒喬博學有文才注論語及詩並諸文筆皆行於世子方平亦以軌素自立厯官義興瑯琊太守鄧遐嶽之子勇力絶人氣蓋當時桓温以為參軍數從温征伐厯冠軍將軍數郡太守號為名將襄陽城北沔水中有蛟常為人患遐遂拔劒入水蛟統其足遐揮劒戮蛟數段而出後温憚遐勇果因免遐官尋卒謝奕尚之從弟父裒太常卿奕少有名譽初為剡令與桓温善温辟為安西司馬猶推布衣好在温坐岸幘笑詠無異常日遷都督豫兗冀并四州軍事豫州刺史未幾卒官長子泉有名譽厯義興太守謝安奕之弟少有重名累徵不起年四十餘始為桓温司馬除吳興太守徵拜侍中遷吏部尚書中䕶軍簡文帝崩桓温入赴山陵大陳兵衛呼安及王坦之欲於坐害之坦之見温流汗沾衣安從容就席笑語移日温威振内外人情噂􅊱互生同異安與坦之盡忠匡翼終能輯穆進中書監驃騎將軍錄尚書事加侍中都督揚豫徐兗青五州幽州之燕國諸軍事時苻堅强盛諸將敗退相繼安遣弟石及兄子元等應機征討所在剋㨗堅後率衆號百萬次於淮肥京師震恐加安征討大都督元入問計安夷然無懼色指授將帥各當其任既破堅有驛書至安方對客圍碁了無喜色進拜太保後出鎮廣陵薨贈太傅諡曰文靖又以平苻堅勲更封廣陵郡公謝萬安之弟才器儁秀早有時舉工言論善屬文簡文帝作相召為撫軍從事中郎累遷豫州刺史監司豫冀并四州軍事子韶少有名位車騎司馬孫恩宏達有遠畧為黄門郎武昌太守謝石萬之弟初拜秘書郎累遷尚書僕射征苻堅將句難以功封興平縣伯淮肥之役詔石以將軍假節征討大都督與兄子元等破堅遷中軍將軍尚書令更封南康郡公於時學校陵遲石上疏請復興國學以訓胄子頒下州郡普修鄉學孝武帝納焉後為衞將軍加散騎常侍卒袁宏猷之孫有逸才謝尚引為參軍累遷大司馬桓温記室性彊正亮直雖被温禮每不阿屈卒於東陽太守撰後漢紀三十卷及竹林名士傳三卷詩賦誄表等雜文三百首傳於世幼子明子有父風最知名官臨賀太守袁山松喬之孫博學有文章著後漢書百篇襟情秀遠善音樂厯位吳郡太守孫恩作亂山松守滬瀆城城陷被害謝朗石兄子善言元理文義豔發名亞於㓜度仕至東陽太守子重明秀有才名為會稽王驃騎長史謝元奕之子少潁悟為叔父安所重及長有經國才畧為桓温掾轉征西司馬監北征諸軍事時苻堅彊盛數侵邊境朝廷求文武良將安以元應拜兗州刺史兼江北諸軍事屢破賊衆及堅自率兵次項城衆號百萬詔以元為前鋒堅列陣淝水元以精鋭八千決戰堅中流矢臨陣斬苻融衆遂奔潰復遣諸將分攻兗青司豫平之加都督徐兗青司冀幽并七州軍事封康樂縣公還鎮淮隂轉授散騎常侍左將軍會稽内史卒孫靈運少好學博覽羣書文章之美為江左第一襲封康樂縣公累官永嘉太守謝瑗度安之子弱冠以幹貞稱拜著作郎累遷散騎常侍侍中苻堅之役出為輔國將軍與從兄元俱陷陣破堅封望蔡公太元末為右將軍假節都督前鋒軍事討平王恭孫恩作亂以瑗度為會稽内史與賊戰於千秋亭敗績為帳下都督張猛所害二子肇峻俱被害詔以瑗度父子隕於君親贈瑗度侍中司空諡忠肅贈肇散騎常侍峻散騎侍郎謝邈石弟子性剛骾無所屈撓頗有理識累遷侍中後為吳興太守孫恩之亂為賊所執逼令北面邈厲聲曰我不得罪天子何北面之有遂為所害謝混瑗度子少有美譽善屬文父及兩兄為張猛所害後劉裕生擒猛送混混剖肝生食之襲父爵厯官中書令中領軍尚書左僕射袁湛耽之孫少有操植以沖粹自立與弟豹俱為謝安所知累官尚書右僕射封晉寕縣男袁豹湛之弟好學博聞喜談雅俗毎商較今古兼以誦詠聽者忘疲仕為御史中丞丹陽尹卒官以參伐蜀謀追封南昌縣子謝裕朗弟子博聞强識為著作佐郎義熙中累遷左僕射先是宋武帝欲伐慕容超朝議不可裕獨曰公建桓文之烈應天人之心宜推亡固存廣振威畧豈容縱敵貽患哉宋武從之殷顗浩之從子性通率有才氣少與從弟仲堪俱知名太元中以中書郎擢為南蠻校尉涖職清明政績肅舉及仲堪將與王恭興兵南伐顗密諫辭甚切至仲堪不從遂以憂卒南北朝宋謝述裕之弟少有至行父純在江陵遇害述奉喪還都喪舫遇風流漂述乘小船冒浪尋求見純喪幾没述號呌呼天幸而獲免常不為裕所愛及裕疾述衣不解帶不盥櫛者累旬裕深感愧友愛甚篤為彭城王義康長史涖官清約宅無私舍卒於吳興太守初述唯勸義康退及義康得罪文帝嘆曰謝述若存義康必不至此謝澹安之孫任達仗氣不營當世與范泰為雲霞交厯位尚書武帝受禪以澹方外士不以任寄嘗因侍飲謂帝曰陛下用羣臣委順者乃見貴汲黯之徒無用也景平中累遷光祿大夫常憂從弟混終當破家混尋誅朝廷以澹先言不及禍元嘉中位侍中卒謝方明安之從孫父沖為孫恩所害方明屯苦備嘗而貞履之揉在約無改為宋武中軍主簿嚴恪自居雖暗室未嘗有惰容累遷驃騎長史南郡相位侍中丹陽尹有能名轉會稽太守東土稱咏之卒於官謝瞻安之從曾孫六歲能屬文與從叔混族弟靈運俱有盛名為武帝相國從事中郎時弟晦為宋臺右衞權遇巳重賓客輻輳瞻驚駭謂晦曰此豈門戸福耶乃籬隔門庭曰吾不忍見此及晦建佐命功瞻愈懼臨終遺晦書曰吾得歸骨山足亦何所恨弟思自勉為國為家謝㬭瞻之弟年數歲所生母郭氏疾㬭晨昏温凊勤容戚顔未嘗暫改恐僕役懈倦躬自執勞母為疾畏驚一家尊卑感㬭至性咸納屨行屏氣語如此者十餘年位終黄門侍郎謝密萬之曾孫㓜時精神端審時然後言為叔父混所重起家散騎常侍瑯琊王參軍性嚴正舉止必修禮度事繼親之黨恭謹過常伯叔二母歸宗兩姑晨夕瞻奉盡其誠敬僕婢之前不妄言笑由是尊卑大小敬之若神元嘉中厯位中庶子加侍中志在素宦畏忌權寵毎獻替及陳事必手書焚草人莫知之謝惠連方明子十歲能屬文族兄靈運嘉賞之後為彭城王義康法曹行參軍卒年三十七文章並行於世殷景仁長平人少有大成之量國典朝議舊章記注莫不撰錄為武帝太尉參軍厯位黄門侍郎文帝即位遷侍中與王華等以風力局幹冠冕一時嘗薦劉湛共參朝政湛入結彭城王義康以傾之景仁稱疾家居文帝待之甚隆凡朝政大小必密函問之累遷尚書僕射後拜揚州刺史卒袁淑豹之子博學多通不為章句學為司徒祭酒劉湛欲其附巳淑不為改意以疾免官元嘉中累遷太子左衞率太子劭將為逆淑不從被害孝武即位贈侍中太尉諡忠憲有文集傳於世謝莊密之子七歲能屬文孝武時累遷左將軍於時搜才路狹莊表陳求賢之義拜吏部尚書再遷侍中領前軍將軍時孝武夜行出還勅開門莊居守以棨信或虛須墨詔乃開帝後因宴從容曰卿欲效郅君章耶後為中書今散騎常侍卒所著文章四百餘首行於世謝孺子裕之孫父恂鄱陽太守孺子少與族兄莊齊名多藝能尤善聲律車騎將軍王或與孺子宴桐臺孺子吹笙彧自起舞旣而嘆曰使人飄飄有伊洛間意除廬江郡主簿後以家貧求西陽太守卒官子璟亦知名仕梁至侍中殷淳景仁從祖弟父穆以和謹致稱宋特進光祿大夫淳少好學有美名厯中書黃門侍郎高簡寡言早有清尚愛好文義未嘗違捨在秘書閣撰四部書大目凡四十卷行於世子孚有父風位吏部郎殷孝祖長平人少有氣幹以軍功累遷兗州刺史明帝初即位四方多叛司徒參軍荀僧韶請徵孝祖入朝孝祖聞命即日棄妻子率文武二千還都人情大安拜冠軍將軍時賊據赭圻孝祖與戰中流矢卒贈建安縣侯諡曰忠袁粲湛之從孫少好學有清才以操行見知孝武時厯遷司徒右長史泰始末為尚書令受顧命元徽元年丁母憂居喪毁甚桂陽王休範為逆粲扶曳入殿時兵難危急咸莫能奮粲慷慨謂諸將當以死報因命左右被馬衆感激出戰賊即平殄順帝即位遷中書監鎮石頭及齊革命粲自以身受顧託不欲事二姓與劉彦節王藴等謀攻齊主道成不克遇害袁最粲之子昇平初粲謀攻齊不克戴僧静奮力直前最年十七大呌抱父乞先死兵士莫不隕涕粲謂最曰我不失為忠臣汝不失為孝子遂俱遇害齊袁彖粲從子少有風概善屬文仕齊為中書郎累遷冠軍將軍性剛常以微言忤武帝為王晏所譖免官付東冶久之得釋後爲侍中彖㓜而母卒養於伯母王氏事之如親伯父顗見誅投屍江中彖微服求屍四十餘日乃得密瘞石頭後岡人稱其孝義焉袁廓之宏之曾孫父景雋仕宋爲淮南太守以非罪見誅廓之終身不聽音樂布衣蔬食足不出門時人以比晉王裒齊國建方出仕官太子洗馬何澗爲文惠太子作楊畔歌太子甚悦廓之諌曰殿下當降意簫韶奈何聽亡國之響太子改容謝之謝超宗靈運孫少隨父鳳徙嶺南元嘉末乃還好學有文辭盛得名譽補新安王國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳯毛靈運復出矣入齊爲黃門郎謝朓述之孫少好學文章清麗執筆便成善草隸長五言詩沈約見之嘆曰二百年無此作矣累遷尚書吏部郎朓好奬人才謂孔珪曰士子聲名未立應共獎成無惜齒牙餘論其好善如此嘗輕江祏爲人後卒爲祏所害梁謝朏莊之子幼聰慧莊撫之曰真吾家千金仕宋爲侍中領祕書監入齊累徴不起梁天監初徴爲侍中司徒尚書令改中書監卒著書及文章行於世子譓不妄交接門無雜賓位右光祿大夫謝幾卿超宗子㓜號神童超宗徙越巂詔家人不得相隨幾卿年八歳别父於新亭不勝慟遂投江救之得免居父憂哀毁過禮及長博學有文采入梁累遷尚書左丞幾卿詳悉故實僕射徐勉每有疑滯多詢訪之後為左光祿長史卒有文集行世袁昂彖之從弟父顗宋雍州刺史為明帝所誅昂以父亡不以理終身不聽音樂仕齊厯遷御史中丞劾奏不憚權豪當時號為正直出為豫章内史丁所生母憂以喪還江路風潮暴駭昂乃縛衣著柩誓同沈溺及風止餘船皆沒惟昂獲全咸謂精誠所致入梁累遷尚書令在朝謇諤雅有人鑒入其門者號為登龍門進司空卒袁峻陽夏人篤志好學家貧無書毎從人假借抄寫自課日五十紙紙數不登則不止訥言語工文辭梁武帝雅好辭賦峻乃擬揚雄言箴奏之帝嘉焉除散騎常侍直文德學士省抄史記漢書各為二十卷謝微孺子孫好學善屬文為中書舍人武帝餞魏中山王元峉於武德殿賦詩三十韻限三刻成微二刻使就辭甚美仕至尚書左丞卒於南蘭陵太守謝覽朏弟子父瀹齊太子詹事覽仕齊為太子舍人梁武帝平建鄴諸公卿皆拜覽獨長揖意氣閑雅帝謂徐勉曰覺此生芳蘭竟體厯遷吏部尚書出為吳興太守卒官謝舉覽之弟幼好學與覽齊名弱冠丁父憂幾致毁滅起家秘書郎為豫章内史晉陵吳郡太守甚得民心㦄官尚書令謝藺安之八世孫五歲時父未食乳嫗欲令先飯藺終不進舅阮孝緒聞之嘆曰此兒在家則曽子之流事君則藺生之匹因名曰藺授以經史過目能誦及丁父憂晝夜號慟毁瘠骨立後為散騎常侍使魏母在家卒及藺還入境夜夢不祥旦便投劾馳歸號慟幾絶水漿不入口親友勸以飲粥藺勉受之終不能進經月餘卒殷鈞長平人九歲以孝聞及長恬静好學善隸書為當時楷法武帝時厯祕書丞遷侍中東宫學士出為臨川内史母憂去職居喪過禮昭明太子手書戒諭官至國子祭酒殷芸長平人倜儻不拘細行然不妄交遊門無雜賓勵精勤學博洽羣書位秘書監司徒長史後直東宫學士省卒周興嗣項人博學善屬文天監初奏休平賦其文甚美武帝嘉之拜安成王國侍郎直華林省其年河南獻舞馬詔興嗣與待詔到沆張率為賦帝以興嗣為工擢拜散騎侍郎次韻王羲之書千字使興嗣為之帝稱善賜金帛後遷給事中直西省卒所撰實錄皇德記起居注職等百餘卷文集十卷陳殷不害長平人性至孝居父憂過禮由是知名家貧有弟五人皆㓜弱不害事母養弟勤劇無所不至以篤行稱仕梁為廷尉平名法有輕重不便者輒上書言之多見納用侯景陷臺城帶甲入朝過謁簡文景兵士衝突不遜侍衛莫不驚恐辟易唯不害與徐摛侍側不動元帝時為中書郎兼廷尉卿魏克江陵不害督兵他所失母所在時甚寒雪凍死者滿溝壑不害行哭求之見死人溝中即投身捧視水漿不入口七日始得母屍每憑而哭輒氣絶行者皆流涕入陳累遷光祿大夫殷不佞不害弟少立名節居父喪以至孝稱好讀書尤長吏術仕梁為武康令會魏克江陵而母卒道路隔絶久不得奔赴四載之中晝夜號泣居處飲食常為居喪之禮及第四兄不齊迎喪歸葬不佞身自負土手植松柏每歲伏臘必三日不食入陳累遷尚書左丞加通直散騎常侍卒袁敬昂之子純素有風格幼便篤學老而無倦仕梁為太子中舍人魏克江陵流寓嶺表高祖受禪敬在廣州依歐陽頠及頠卒其子紇據州有異志敬為陳順逆之理紇不從而敗朝廷義之徴為太子中庶子厯金紫光祿大夫加特進卒謝哲朏之孫舉止醖藉襟情豁朗為士君子所重仕梁至廣陵太守入陳厯吏部尚書司徒左長史袁樞昂之孫父君正吳郡太守樞性沈静少好學居父喪以孝聞仕梁為吳興太守入陳累遷吏部尚書領丹陽令謹慎周密清白自居文武職司鮮有遊其門者官至尚嘗左僕射謝貞藺之子幼聰敏有至性祖母阮氏苦風眩每發便一二日不能飲食貞年七歲見祖母不食貞亦不食年十三善左氏春秋工草隷蟲篆丁父艱號頓於地絶而復蘇數矣及江陵陷沒入長安周趙王厚相禮遇聞貞獨處晝夜涕泣因訪知其母老在南乃奏放還國始興王叔陵辟為主簿貞度叔陵將有異志每有宴遊未嘗參預及叔陵肆逆貞獨不坐遷南平王長史以母憂去職哀毁羸瘠遂卒魏袁式陽夏人式在南厯武陵王諮議參軍歸魏為上客賜爵陽夏子與司徒崔浩盡國士之交朝儀典章浩所草創恒顧訪之性長者雖羈旅飄泊而清貧守度不失士節時皆呼曰袁諮議沈静樂道周覽書傳至於訓詁倉雅偏所留懷作字釋未就卒子濟襲父爵為魏郡太守政有清稱袁翻項人宣武帝時厯官豫州中正是時修明堂辟雍翻議明堂五室請同周制郊建三雍求依故所又議選邊戍神龜末遷涼州刺史孝昌中拜都官尚書加撫軍將軍建義初遇害河隂袁躍翻之弟博學儁才性不矯俗篤於孝友翻常謂人曰躍我家千里駒也厯仕尚書都兵郎中散騎常侍將立明堂躍乃上議當時稱其博洽蠕蠕主阿那瓖亡破來奔朝廷矜之送復其國既而辭㫖頗不盡禮躍為朝臣書與瓌陳以禍福其辭甚美遷車騎將軍有文集行世齊袁聿修翻之子七歲遭喪居處禮若成人性深沈有鑒識清静寡欲與物無競天保初除太子庶子行博陵太守遷秘書監天統中出為信州刺史即其本鄉也為政清靖不言而化自長史以下爰逮鰥寡孤獨皆得其歡心還除都官尚書聿修和平温潤素流之中最為規檢以名家子厯仕清華時望多相器待唐㼼權扶溝人以母病與弟立言究習方書遂為高醫仕隋為秘書省正字稱疾免唐貞觀中㩲巳百歲帝幸其舍視飲食訪其術擢朝散大夫賜几杖衣服尋卒年一百三歲所撰脉經鍼方明堂等圖傳於時立言仕為太常丞殷侑陳州人通經術貞元末及五經第其學長於禮擢太常博士元和八年使囘鶻可汗不為屈再遷諫議大夫論時政得失前後凡八十四通文宗即位拜義昌軍節度使以仁惠為治累官刑部尚書時李訓鄭注已誅文宗問侑治安術侑言朝廷宜任耆德母輕用新進帝善之終忠武軍節度使侑以經術進臨事鋭敏有彊直名殷盈孫侑之孫廣明初為成都諸曹參軍僖宗至蜀聞有禮學擢太常博士昭宗郊祠中尉及樞密皆以宰相服侍盈孫奏非令典當隨所攝資品猶免僭逼從之時喪亂後制度彫紊追補容典皆所折衷終大理卿趙犨宛邱人資警健善騎射世為忠武軍牙將黄巢亂陳人請授為刺史犨乃培城疏塹實倉庫峙藁薪為守計未幾巢將孟楷宼項城犨擊擒之拜檢校司空巢聞揩死乃悉軍攻之州人大恐犨曰士貴建功立名節徒懼無益且死國不愈生為賊乎引鋭士大小數百戰會汴軍至犨因急擊賊破之圍凡三百日而解累遷檢校司徒加彰義軍節度使卒趙昶犨之弟神采軒異而内沈厚有法度破孟楷功多犨領泰寕節度使以昶為州刺史及犨老昶授留後遷忠武節度使亦留陳勸課農桑於人有恩惠加同中書門下平章事卒趙珝犨之子雄毅喜書善騎射黃巢圍城珝激勵麾下約皆死庫有巨弩機牙壞不能張珝以意調治激矢至五百步人馬皆洞賊畏不敢逼以勞授檢校尚書右僕射昶卒為忠武節度使陳州土惡善圯珝曡甓表墉遂無患光化中封天水郡公按鄧艾故蹟決翟王渠溉稻以利農一家三節度使相繼二十餘年陳人宜之位至右金吾衞上將軍卒五代唐符存審宛邱人晉王克用以為義兒軍使賜姓李氏為將有機畧從莊宗破梁軍走遼兵敗劉鄩大小百餘戰未嘗敗衂與周德威齊名宋常真項城人父母死廬墓終喪負土成墳不茹葷血開寶中詔旌其門真妻病子晏割股肉以療疾及死次子守規徒跣日一食廬墓三年太平興國中旌表沈倫太康人少習三禮周顯德中太祖領節鎮署從事掌留後財貨以廉聞及受禪召為戸部郎奉使至越歸奏便宜十數事皆從之揚泗饑倫白太祖以軍儲賑饑民王師伐蜀為隨軍水陸轉運使入成都獨居佛寺東歸篋中所有纔圖書數卷而巳太祖知之以倫為戸部侍郎樞密副使倫第卑陋太祖遣中使督工治之倫私告使者願得制度狹小帝亦不違其志厯官右僕射門下侍郎以左僕射致仕卒喬維岳南頓人治三傳明習吏事有治劇才太平興國中為泉州通判會盜起攻城維岳抗議堅守民賴以全詔襃之為淮南轉運副使累遷太常少卿京府事繁維岳評處詳敏真宗立拜給事中知審官院以年衰乞外遷上嘉其静退厯壽州刺史卒萬適宛邱人六歲能詩及長喜學問精於道德經與高冕韓伾交遊唱酬不求仕進專以著述為務有狂簡集百卷雅書三卷志苑三卷雍熙詩二百首經籍摘科討論四十卷淳化中伾任翰林學士帝問嵩陽遺逸伾以適對召至闕下特授慎縣主簿樊可行陳州人五世同居真宗時旌表仍蠲其課調李宗易宛邱人少好學爲詩效白樂天詳於吏治慶厯間官至太常少卿晏殊相知尤深後歸優遊林泉者十六年時蘇轍爲宛邱博士常與之遊姚仲孫商水人父煜舉進士第一官著作佐郎仲孫早孤事母孝擢進士補許州司理參軍通判彭州嘗以天下不可弛兵備上防邊龜鑑入爲右司諫閻文應求爲都知仲孫數其罪出之兼侍御史論諫議大夫不宜以歲月序進請艱其選以處材望乃詔當選者奏聽㫖後權三司使事屬西北備邊募兵益屯仲孫悉心經度雖病未嘗輒廢事出知蔡州卒黃寔陳州人舉進士哲宗時累遷寶文閣待制知定州卒寔孝友敦睦世稱其内行蘇轍在陳與結婚又與軾友善故不得久於其朝謝文瓘陳州人舉進士爲大名教授元豐中上疏言新法不便哲宗時遷考功右司員外郎時建廣武四埽石岸黃流湍悍役人多死文瓘條别利害罷其役徽宗立擢為給事中後入名黨籍帝披籍曰朕究知文瓘本末命出籍乃以為集英殿修撰知濟州謝貺文瓘子宣和中為駕部員外郎知汝州欽宗時上封事十篇論事切至擢提點京西北路刑獄會金師攻汝州貺自襄陽領兵往援戰死元徐世隆西華人弱冠登金正大進士辟為縣令其父戒曰汝年少學未至母急仕進世隆遂辭官益篤於學元世祖在潛邸召見於日月山時方圖征雲南以問世隆世隆對以不嗜殺人之語及即位擢燕京等路宣撫使召為翰林集賢學士以疾辭卒年八十所著有瀛洲等集百餘卷邵敬祖宛邱人父喪廬墓母繼殁河決不克葬殯於城西敬祖露宿於其側風雨不去友人哀之為縛草舍庇之前後居廬六年兩體俱成濕疾至治三年旌其家韓元善太康人父克昌監察御史以論事有名聲元善由國子監生積分中程釋褐除新州判官厯中書左丞同知經筵事至正十二年卒元善性純正明達政體以文學治才羽翼廟謨論議之際秉義陳法不偭鄉上官國是所在倚之以為重嘗效范文正公遺規置田為義莊以周貧族為義墪以教族人子弟明王鈍太康人元至正間進士知猗氏縣洪武中徵授禮部主事遷吏部郎中福建右參政以廉慎聞遣諭麓川卻其贈金或曰遠人疑且貳鈍乃受之以輸雲尚官庫遷浙江左布政使在浙十年帝嘗稱於朝以勸庶僚厯官户部尚書傅安太康人洪武時為禮科給事中奉使西畨羈留十三年執節不屈永樂中始歸宋伯義西華人剛介有守洪武中入太學以才行選擢山東右參政永樂初轉陜西布政使清譽益彰劉逵項城人性寡黙善書翰鄉邦稱之洪武中以人村薦舉累官刑部尚書古樸陳州人洪武中由鄉舉厯兵部即中建文時擢兵部侍郎成祖即位調户部宣德初拜南京户部尚書入仕四十年持身廉介家無贏資顧佐太康人由進士厯御史兩京府尹並有聲累遷通政使宣德初以朝臣貪汚擢佐為都御史奏黜不職朝臣二十餘人正身率屬百僚肅然非議政不與諸司同坐人皆稱為獨坐云婁志德項城人正德進士知趙州有惠政累遷福建布政使巡撫山東嘗著兩浙賦役全書卓有實濟京師語曰天下清官婁志德穆宗特賜敕襃美何出光扶溝人萬厯進士任監察御史時巨璫連結外戚互相黨援權傾内外出光抗疏劾之抵羣姦法再按山東發京考預洩之弊為忌者所中奪職歸張維世太康人萬厯進士厯官平陽知府公正廉潔大得民和崇禎九年巡撫宣府坐事遣戍巳釋還明年李自成陷太康抗節死宋一韓陳州人萬厯中任漢中推官遷兵科給事立朝忠直毎疏論時事切中利弊號為諫垣鳴鳳李引嘉沈邱人剛方好俠崇禎間薦授潛山知縣甫三月張獻忠兵至力戰被執遂遇害贈太僕寺卿張質商水人官臨汾知縣解職歸崇禎中流賊陷商水質抗賊死劉恩澤扶溝舉人慷慨能任事崇禎中流賊逼城衆議守禦而縣令騃不解事恩澤蹶起痛哭曰我不幸從汝曹木偶而死自題樓壁曰千古綱常事男兒肯讓人城陷墜樓而死本朝乾隆四十一年予祀忠義祠王受爵陳州人崇禎中以舉人偕知州侯君擢守城城陷受爵擊殺數賊大罵死贈宛平知縣本朝乾隆四十一年予祀忠義祠龔作梅陳州人年十七父母俱亡殯於舍賊火民居作梅跪柩前焚死馬呈瑞西華人天啟甲子舉人崇禎中城陷不屈死十一年本朝乾隆四予祀忠義祠王繼東沈邱人流賊猖獗倡土民築壘固守寇力攻衆寡不敵遂遇害本朝乾隆四十一年予祀忠義祠耿燿太康人少從異母兄光學事之如父凡事諮而後行光嘗與之財燿曰家有長兄我無用此為也闖賊陷太康燿與弟炳奉母避河朔孝養備至容城孫奇逢高其行為作傳耿於彝燿從子有學行父喪未葬闖賊陷城居民逃竄於彝抱父柩號泣不去賊推墜城下幾斃歲大祲人相食邑令餉穀四十斛悉推以賑貧者耿氏自光兄弟以孝友著名子姪守其家法中州稱禮讓者首耿氏劉璞沈邱人拔貢生事母以孝聞崇禎末流宼猖獗璞椎牛享士日夕守陴城賴以全設義塾延名師課里中子弟多所成就本朝李渙沈邱人歲貢生父引嘉明李殉難渙匍匐叩閽疏三上卒得贈太僕少卿事母以孝聞入本朝厯任睢鄧陜三州訓導勤於教士晚居林下敦宗族樂施予李鼎玉煥弟父引嘉殉難鼎玉扶柩還時寇氛未靖晝夜露處資野蔬澗水以給母病衣不解帶事兄煥如父年逾七十猶朝夕省視寒暑不輟順治壬辰進士累官御史柳同春太康人順治初授江西都司金聲桓叛同春夜越城變服晝夜馳三百里引兵進剿身為軍鋒陷陣妻子留省城者殲焉賊平擢狼山鎮總兵妻安氏得旌孫馥沈邱人性孝友好讀書精研經義為文闡廉洛關閩之旨嘗因盜賊竊發散資招募鄉勇助守孤城城賴以全順治已亥進士生平好義樂施族中㓜弱無依者收養之教以成人祀鄉賢王輔運太康人順治丁亥進士官禮部郎中議祀典黜張浚進子謙從祀時論韙之終湖廣提學副使杜俊彦扶溝人由拔貢除廣西賀縣知縣出榖以賑凶荒偽帥投誠者為督撫所疑俊彦單騎叩壘撫定其衆卒無他變其幹畧類如此盧愈奇扶溝人康熙戊戌進士授平涼府通判疏理鹽法擢知涇州涇糧賦多逋欠愈奇設法勸諭不事𫾣撲人爭輸納時西陲用兵愈奇辦運軍需既不誤公民亦不擾程孔述淮寕人性好善康熙四十八年賈魯河決溺死者甚衆孔述駕舟渡活人無算是年鄰人有因貧鬻妻者孔述悉贖歸之崔吉士襄城人乾隆三十九年為襄城營把總值山東壽張逆匪王倫倡亂吉士隨河北鎮總兵在臨清舊城堵禦陣亡事聞廕卹何之璞扶溝人乾隆甲辰武進士嘉慶元年任上江協遊擊隨剿湖南苗匪有功二年隨剿貴州狆苗先後擒獲甚多斬馘尤衆自捧鮓至黃草壩一帶悉平得㫖奬勵旋擢撫標參將四年隨剿四川邪匪於忠州陣亡事聞議卹子雲騎尉世職張遠覽西華人乾隆巳卯舉人少孤事母盡孝母喪廬墓三年仕正陽教諭擢貴州鎮遠知縣攝黎平府通判所至有聲致仕歸嘉慶六年邑中土棍東玉林滋事遠覽與縣令密謀擒獲復躬率紳民嚴緝餘黨不以老疾辭鄉里賴之卒入祀鄉賢祠曾禮廷沈邱人武生嘉慶十八年隨剿滑縣教匪在道口鎮擊賊陣亡賞卹如例流寓漢魏朗會稽上虞人以報讐亡命到陳國從博士郤中信學春秋圖緯丁蘭河内人寄居西華縣東北築臺以祀母木像今有丁蘭冢宋張耒淮陰人遊學於陳學官蘇轍愛之列女漢陳孝婦淮陽人年十六嫁而無子其夫當戍囑曰吾生死未可知幸有老母在無他兄弟備養吾不還汝養吾母乎婦應曰諾後夫果不還婦紡績織絍養其姑二十有八年姑卒盡賣其財物田宅以葬終奉祭祀淮陽守以聞賜金四十斤號曰孝婦唐殷敬仲妻顔氏長平人敬仲官吏部郎中為酷吏所陷顔率二女割耳為敬仲愬冤敬仲得減死李侃妻楊氏侃項城令建中末李希烈謀襲陳州分兵畧諸縣侃欲逃去楊曰君縣令寇至當守力不足死焉職也君如逃尚誰守李從之楊請重賞募死士侃率以乘城楊身㸑以享衆報賊曰項城父老義不下賊矣侃中流矢還家楊責曰君不在人誰肯守死於城不猶愈於家乎侃遽登城會賊將中流矢死遂散去城賴以全陳之胥妻佚姓氏建炎中統制王淵討陳州賊杜用軍於鄧灣從賊中得之見婦美欲與通不允又逼之婦曰統制軍官隨都統來破賊本為百姓除害若要新婦充婢使則可若欲見私則不願也淵張之且曰我當殺汝婦曰若此統制亦賊爾死何懼淵命擁出斬之明孟七保妻張氏名鍼姑陳州人年十四許同郡孟七保未幾七保輸税於開封卒葬祥符之蘇村父母欲嫁之鍼姑曰既許孟氏今雖亡其母無所依願歸以養父母從之乃與姑詣祥符負其夫骨還葬守節終身永樂中旌表常友妻盧氏名温柔陳州人祖母張氏寢疾三年温柔事奉甚謹親戚異之後字太康常友未及婚友卒温柔往弔之遂潛自縊死鄉人為合葬焉天順末詔旌其門樊亨妻翟氏名粉兒陳州人年十七字樊亨未幾亨卒父母往弔粉兒入房縊死杜維訥妻董氏陳州人訥家徒四壁董安之訥死即其旁自縊州守洪蒸為具棺給地以葬魏氏三烈陳州人一魏體坤女適劉忠貞劉死無子魏年二十二家有庶姑袁氏生二歲子魏泣屬曰幸姑善視劉氏後婦從夫死矣尋自縊一魏體泰女適謝用賓謝死竟以腰絰縊死年亦二十二一魏體咸女適朱試不數年試病卒魏以身殉年亦二十二三婦皆產於魏而死時年齒相同竸稱魏氏三烈云張氏女名合兒沈邱人宏治中合兒年十四饁父於田途遇里人武鑑欲强汚之合兒不從遂投河死姜國才妻姚氏沈邱人女年十六字姜國才未婚而國才歿女聞訃紿父同母徃弔遂縊死縣令申請建坊馬旺妻楊氏西華人正德七年流賊陷城旺夫婦俱為所獲義不從賊皆被害詔旌其門李時蘭妻高氏商水人時蘭卒高潛入隱室縊死時蘭復甦聞高死流涕曰待我與汝俱行須臾亦死事聞旌其門本朝李賢相妻聶氏項城人賢相商於外鄰人潛入室拒之得免誓自殺以滅恥姑防之甚謹得閒卒行其志雍正年間旌張氏女淮寕人許聘田鼇鼇亡女投繯以殉同縣節婦焦維正妻李氏徐之龍妻于氏孫夢雷妻張氏許長祚妻李氏高洪遠繼妻王氏許如義妻鄭氏竇瑶妻李氏竇瑜妻何氏竇炎妻龔氏孟國瑞妻王氏孟誥繼妻王氏烈婦杜注妻王氏任黒妻石氏王士坤妻馬氏陳某妻葛氏貞女劉正聘妻崔氏阮永登聘妻鄭氏烈女羣姐張二姐趙氏女尤氏女欒氏女均乾隆年間旌李太璞妻安氏商水人夫亡守節同縣節婦李紫袍妻王氏李紫衣妻雷氏烈婦高黒妻吳氏胡曰仁妻康氏王忠妻李氏文某妻王氏烈女福姐煥姐均