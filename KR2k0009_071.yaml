以來天下學校廢興學自殊始劉航魏人厯知虞城犀浦縣虞城多奸猾喜寇盜犀浦民弱而馴航為政寛猛急緩不同兩縣皆治范純仁呉縣人皇祐間知襄邑縣有牧地衞士牧馬踐民稼純仁捕一人杖之牧地初不隸縣主者怒曰天子宿衞令敢爾耶白其事於上刻治甚急純仁上言養兵出於税畝若使暴民田而不得問税安所出詔釋之且聽牧地隸縣時旱久不雨純仁籍境内賈舟諭之出糶所蓄十數萬斛至春諸縣皆饑獨境内民不知也孫鼛錢塘人調武平尉捕獲名盜數十謝賞不受張田澶淵人知應大府司錄歐陽修薦其才張亢臨濮人仁宗時為應天府推官治白沙石梁二渠民無水患苗時中宿州人神宗時以䕃主寕陵簿邑有古河久湮請開導以溉田為利甚溥人謂之苗公田蘇頌南安人神宗時知應天府吕惠卿嘗語人曰子容吾鄉里先進苟一詣吾執政可得也頌聞之笑而不應杜誼黄巖人知永城縣歲捐俸三十萬收瘞汴渠之溺死者又出俸錢新學宫兩旁為學舍數十區旦夕講學於其堂永城父老稱誼之政為不可及曾幾贑州人徽宗時為應天府少尹庭無留訟時諌官劉安世亡恙黨禁方厲無敢窺其門者幾獨從之談經論事郭僎祥符人徽宗時為鹿邑丞中貴楊逢周率軍士以捕賊為名入邑境所至騷動僎檄取所授文書逢周不與僎令尉畿察之逢周歸愬於徽宗逮赴開封府獄獄以狀聞乃使還任孫安道為應天府兵馬鈐轄金兵下淮南城陷不得歸謀挺身還朝為金所害贈忠州刺史淩唐佐休寕人建炎中加直秘閣知南京值城陷劉豫因使為守唐佐密疏其虚實遣人持蠟書告於朝江淮都督吕頤浩得唐佐從孫憲俾持帛書遣之憲至睢陽事泄豫捕唐佐見豫責以大義豫怒斬於境上贈徽猷閣待制金張奕高平人熙宗時為府通判劉豫廢兵在郡者謀為亂奕知之選士人丁壯授以兵結陣扼其要巷開小南門以示生路亂不得作擒其首惡誅之都統完顏木補以軍至歸德欲根株餘黨奕以闔門保郡人無他遂止完顏木補舊作完顔魯補今改正毛碩甘陵人皇統元年權知拱州宋將張浚據亳州柘城酒監房人傑叛應浚碩發兵討之至柘城躬扣城門呼耆老諭意遂縛人傑以降碩逕入縣署召百姓慰安之元董文貞獻州人中統中為寕陵達魯噶齊邑苦盜剽掠文貞教民習武備境内以安達魯噶齊舊作達魯花赤今改正宋世元符離人至元中爲永城縣尹治績卓然有歧麥嘉禾之瑞卜天璋洛陽人皇慶初知歸德府勸農興學復河渠河患遂弭時羣盜據要津商旅不通天璋擒數百人悉磔以狥盜爲止息趙璧兖州人至治初爲寕陵縣尹勸農賑饑塞汴河支流復起隄障厯有成續固影新州人泰定間知歸德府廉明剛斷發摘如神民有衘冤不直者雖數十年前事皆千里奔走來訴立爲剖決一日悉清嘗行部至亳民訴蝗食禾遂取蝗向天祝之以水研碎而飲是歲蝗不爲災固影舊作觀音奴今改正許義夫碭山人至正初爲夏邑縣尹每親詣鄉社教民稼穡見民勤謹者出巳俸賞之怠惰者罰之三年之間境内豐足額森瑭古特人至正中爲柘城主簿歲饑請捐租民德之邑多盜擒其魁良民有爲盜誘者自誣服力辨出之治豪猾不少恕在職以廉能稱額森舊作埜僊瑭古特舊作唐兀今並改正明盧熙崑山人洪武初以睢州同知攝知府事適御史銜命搜舊軍籍民充之睢民當入伍者千人檄熙追送熙令民自實得甞隸尺籍者數人卑之御史怒械繫曹吏必盡得熙自詣御史曰州軍籍盡此矣迫之民且散獨有同知在耳請以充役御史不能奪乃罷去熙卒於官貧不能䘮官為其殮喪歸吏民挽哭者塞道大雨無一人却者梁祖榮高要人永樂中知柘城縣值霖雨教民疏濬溝洫邑無水災民有負租者貧無以償祖榮捐巳俸倡富民出粟助之民免流亡畢用博平人成化中為歸德知州時河水泛溢用築堤捍水城得不壊巨閹過州境吏皆望塵拜用獨長揖閹怒誣奏逮獄未幾復官王鼎岢嵐人正德中知永城縣流賊陷城鼎繫印於肘端坐待賊不屈死安宣山西人正德中為夏邑縣丞初授官賊逼其境或勸無往宣兼程進抵任七日賊大至宣拒守有功城陷死之贈開封通判石阯青城人嘉靖中為寕陵知縣柘寇師尚詔謀亂阯先授兵登陴為守禦計尋歸德府陷阯泣厲將士誓以死守寇諜知之不敢犯後坐誣去官民遮道泣送者數千人董綸太谷人嘉靖中為歸德檢校柘城賊師尚詔入歸德聚衆剽掠綸請於知府願自往捕賊知府不許賊尋陷城綸率民兵巷戰𬒳執垂死猶手刃數賊妻賈氏及童僕皆從死贈歸德同知立祠於死所鄭三俊建德人萬厯中知歸德府持身峻潔刑不妄用建范文正公書院文教蔚興劉作民東明人萬厯中知柘城縣邑西地窪下鑿渠以洩之名永利渠民賴其利孫傳庭振武衞人萬厯末知柘城縣以才調商邱天啟初白蓮賊黨居歸德謀應徐鴻儒傳庭弭其變郡以無虞成勇安樂人崇禎中為歸德推官流賊來攻乘城設守擊却之居官清節冬月不能具裘有以裘獻者却不受王世琇清苑人崇禎中為歸德推官屢平土寇黄老山等李自成來犯時世琇巳内遷主事將行慨然曰久官其地臨難而去之非義也誓衆堅守城陷遂遇害盛以恒潼關衞人崇禎十年知商邱縣明年張獻忠來攻時以恒巳遷開封府同知將行吏民留之遂登城設守督家衆殺賊力屈城陷罵賊死贈河南按察司副使王徴俊陽城人崇禎中謫歸德照磨巡按御史李日宣薦於朝給事吕黄鍾亦請用徵俊以為天下必不可少之人乃移知滕縣顏則孔沂州人崇禎中為歸德同知城陷死之其女亦自縊徐一源海鹽人崇禎中為歸德經厯賊至一源分守北城城陷巷戰罵賊死夏世英祥符人崇禎中為商邱教諭城陷世英持刀罵賊死於明倫堂妻石氏亦自刎紀懋勲膠州人崇禎中為鹿邑知縣流賊陷城死之孔亮興平人崇禎中為虞城主簿署縣事死流賊之難本朝白明登漢軍鑲白旗人順治五年任柘城知縣廉潔自守治尚嚴明擒賊魁按以法䘏民荒殘多方招撫力請停減增派河夫設條教以勸耕讀十年考最以升任去趙申喬武進人康熙二十年知商邱縣邑舊多雜派悉革去之祀名宦武宏祖奉天人康熙三十一年知歸德府屬邑催科多陋規宏祖悉為革除嚴禁牙帖胥吏苛取税銀痛懲以法史鑑仁和人康熙二十七年知柘城縣開溝洫興水利凡卑窪之區俱成膏壤設立義學百餘所延師講課文教振興胡國佐遼陽人知歸德府值歲荒設法賑濟全活數十萬人劉暟大興人任歸德府河捕通判沿河堤岸故卑暟督役加築堅固堡夫舊多雜差皆與蠲除歲饑捐俸施粥諸晉餘姚人康熙五十矢卒於官幾不能五年知夏邑縣清廉自殯士民斂貲歸其柩前總纂官臣張琴恭纂輯提調官臣張日章恭覆輯校對官臣王式和恭校校對官臣章詒燕恭覆校
