邁人爭慕之號吳富體韋嗣立薦並為左臺監察御史蘇頲瓌子弱敏悟一覽至千言輒覆誦第進士遷監察御史長安中被詔覆來俊臣等冤獄驗發其誣多從洗宥拜中書舍人明皇平内難書詔填委獨頲在太極後閣口所占授功狀百緒輕重無所差襲封許國公開元四年進同紫微黄門平章事與宋璟同當國璟剛正多所裁決頲能推其長帝前敷奏璟有未及輒助成之罷為禮部尚書卒贈右丞相諡文憲頲與張説以文章顯稱望畧等故時號燕許大手筆弟詵舉賢良方正高等累轉給事中出為徐州刺史治有迹詵子震十餘歲強學有成人風肅宗興師靈武震晝夜馳及行在帝嘉之仕終太常卿來瑱永夀人父曜開元末持節磧西副大使四鎮節度使著名西邊瑱畧知書尚名節天寶初從四鎮任劇職遷行軍司馬詔舉智謀果決才堪統衆者張鎬薦瑱擢潁川太守安祿山反攻潁川填完埤自如手射賊皆應弦仆賊使降將畢思琛招之瑱不應前後俘殺甚衆賊目為來嚼鐵以功加防禦使瑱能撫訓士舉動安重賊不得侵西京平封潁國公蘇源明初名預武功人工文辭及進士第累遷國子司業安祿山陷京師不受偽署肅宗時擢授考功郎中知制誥數陳時政得失及史思明陷洛陽有詔幸東京將親征源明上疏極諌帝嘉其切直遂罷東幸以秘書少監卒蘇弁世長從孫擢進士調奉天主簿德宗出狩而縣令計事在府官屬皆惶恐欲遁走弁諭之乃定車駕至儲偫畢給累遷倉部郎中判度支案裴延齡死弁通學術吏事精明承延齡後平賦緩役畧煩苛人賴其寛後終滁州刺史聚書至三萬卷手自讎定當時稱與秘府埒趙植奉天人德宗出狩變倉猝羽衞單寡朱泚攻城急植率家人奴客以死拒守獻家財勞軍帝嘉之賊平擢鄭州刺史鄭滑節度使李融奏以自副融病委以軍政大將宋朝晏火其營夜為亂植列卒不動遲明而潰捕斬皆盡優詔嘉慰累擢嶺南節度使趙隱植之孫父存約辟署興元李絳府值軍亂絳麾使去對曰荷公德厚誼不當獨免即部勒左右捍之而同遇害隱以父死難與兄騭廬墓幾十年不應辟召㑹昌中擢進士第咸通末厯中書侍郎性仁悌不敢以貴權自處始布衣時家無貲與騭同耕以養母宦寖顯還家易衣侍左右猶布衣也騭終宣歙觀察使隱子光逢光裔光䕃皆第進士厯臺省宋游師雄武功人學於張載第進士元祐時遷軍器監丞吐蕃寇邊其酋長鬼章謀據熙河詔師雄便宜從事遂破洮州擒鬼章厯衞尉少卿哲宗數訪邊防利病師雄具紹聖安邊策凡六十事上之進直龍圖閣知秦州徙知陜州卒議者以為用不盡其才蘇昞武功人始學於張載事二程卒業元祐末吕大中薦之起布衣爲太常博士元楊奐奉天人年十一母殁哀毁如成人金末舉進士不中乃作萬言䇿指陳時病未及上而歸敎授鄉里太宗詔試諸道進士奐試東平兩中賦論第一授湖南路徴收課税所長官兼廉訪司公私便之世祖在潛邸驛召奐參議京兆宣府司事累上書得請而歸康廷瑞武功人明性理之學讀書長寕西門原上有數百人宗師之後辟爲興化訓導明馬京武功人洪武中進士授編修厯任大理卿永樂初爲刑部侍郎太子守北平盡誠翊贊高煦數毀之謫戍廣州召還仍坐前事下獄死仁宗立贈少傅諡文簡康海武功人宏治中進士授修撰與李夢陽輩倡復古學號正德中七才子夢陽忤劉瑾下獄海詣瑾求釋瑾敗坐落職海工於樂府兼通厯象太乙六壬醫經算書任棟永夀人崇禎中由貢生爲萊州通判李自成等叛棟佐知府李萬年共守萬年與巡撫謝漣爲賊所誘執棟助大帥楊御蕃力拒圍解論功進秩賜金累遷保定監軍僉事從總督楊文岳南征鳴臯鎮之捷棟與有功尋與總兵虎大威破賊平峪再破之鄧州從援開封㑹左良玉大潰於朱仙鎮賊來追棟力戰殁於陣贈太僕卿本朝馬琾武功人由貢生知永嘉縣康熙十三年耿精忠叛閩温郡戒嚴琾與副使陳丹赤協謀防禦守將祖鴻勳殺丹赤倡衆從逆琾不屈遇害贈浙江布政司叅政追諡忠勤琾族叔之騄時在署至琾死所枕尸哭賊欲殺之或曰此義士也遂得䕶䘮歸子逸姿仕至安徽布政使耿獻忠武功人順治𥘉分巡閩中海氛未靖將士俘獲甚衆有誤入者獻忠詣臺司力爭得釋數千人遷廣東布政使裁抑武弁驕横粤以安輯康吕賜武功人諸生幼潁悟究心格致之學事親孝親殁三年不御酒肉友愛二弟備至卒年八十八孫景烈武功人乾隆𥘉進士授翰林院檢討性敦孝友學有心得閭里人士奉為楷模韓際春乾州人五歲母殁哀毁如成人九歲父病嘗糞甘苦告醫用藥年十五父殁哭晝夜不絶聲泣盡繼以血祖以哭子䘮明際春以舌䑛之目復明乾隆五十年旌列女唐竇伯女仲女奉天人永泰中遇賊行剽二女自匿山谷賊迹而得之將逼以私行臨大谷伯曰我豈受汚於賊乃自投下賊大駭俄而仲亦躍而墜京兆尹第五琦表其烈行詔旌門閭元田大妻郝氏永夀人與田二妻胥氏田三妻周氏皆夫死於兵郝年二十胥年十九周年十八俱堅心守節終身不嫁延祐二年旌明李氏女乾州人年十六字於陳未嫁而夫罹刑女聞之自縊死騫九思女永夀人幼字趙趙故富而騫家漸落趙遺書罷婚九思許之女澡身整服強婢導至趙門自刎死時天日開霽而雷雨驟至一邑震驚又師氏女父第為族人誣訟之官捕者至其家牽女衣女憤遂自縊死吳珩妻周氏乾州人隨夫戍錦衣衞夫亡年二十六攜二子負骸骨歸葬事姑二十餘年䘮祭皆以禮正統中旌又徐自清妻車氏年未二十夫亡苦節陳汝真妻馬氏年二十二夫亡孝養舅姑撫遺腹子成立郝讓妻王氏武功人夫亡子亦繼卒氏力作以養孀姑苦節終身同縣王繼祖妻郭氏子乾明妻張氏孫受元妻田氏三世苦節耿認妻㳟氏年十九守節陳懋謙妻牛氏年十九撫遺腹守節康栗繼妻楊氏楊宋妻康氏均夫亡殉節馬璟妻侯氏知夫病不起先自縊死杜逢雲妻屈氏武功人歲大祲其翁與夫就食漢南翁死夫歸亦死氏泣曰敢以夫死之故而使翁之遺骸棄於原野乎殯其夫即徒步往漢南負翁骨歸葬葬畢閉戸不食而死張簡妻騫氏永夀人年十八守節事孀姑以孝聞同縣劉宗樂妻王氏年十九撫遺腹子成立趙應聘妻員氏無子守節遇歲祲閉戸不食死劉弼主妻陳氏武功人崇禎中流賊破城被獲氏罵不絶口賊斷其兩臂而死俎衍溱妻陳氏永夀人崇禎末抱幼女隨姑避亂為流賊所掠氏奮奪賊刀殺女自刎賊驚異釋其姑本朝楊志秀女武功人年十四順治八年為土寇所掠欲汚之女罵不從賊擄至渭水灘罵不絕口賊怒以刀横斫其面兩目俱墮仍作罵聲而死同縣張居仁妻馬氏少寡棲止土窰中為惡少所逼峻拒之被焚死殷之才妻吳氏乾州人之才客死氏聞自縊同州黎衞妻殷氏以夫病篤先投繯死廖揚光妻李氏夫亡不食死殷銓妻袁氏夫亡截髮自誓苦節終身又王紹用妻王氏唐振吉妻虢氏宋志禮妻彭氏宋樸妻趙氏子焻妻張氏並以節著馬穎姿妻周氏武功人穎姿隨叔琾官永嘉值兵變死氏守節撫姪為嗣雍正六年旌同縣馬瑜妻魏氏吳三桂之變瑜運餉不歸氏年十九貧無依或勸之改適不從苦節五十餘年馬鐸妻王氏夫死舅姑欲奪其志自縊死吳翥妻李氏夫亡年十九族人逼之改適氏斷指自誓守節五十餘年李某妻康氏夫亡家極貧姑亦在殯氏竭力營葬路人為之感動又張錫履妻郭氏康吕夢妻閔氏均以苦節著周棟妻袁氏乾州人年十九夫亡翁姑年老夫弟年幼氏送死養生曲盡孝道夫弟甫五齡課讀入泮夫弟沒子方三歲氏撫育如己出同州崔易妻殷氏吳淙妻劉氏劉禹統妻董氏張焯妻王氏羅璐妻趙氏王思恭妻郭氏史達儒妻唐氏高崇陛妻胡氏張於朝妻黎氏楊仲蘭妻任氏趙炘妻郭氏趙珮珏妻郭氏吳漢誠妻張氏張呈福妻周氏李遇春妻賀氏南相極妻李氏張涵妻魯氏牛盡孝妻王氏趙任統妻宋氏胡瑋妻王氏趙照妻陳氏趙煇妻楊氏陳普妻孫氏祝天顧妻董氏宋得業妻姬氏宋光祖妻史氏郭成徳妻侯氏陳禮妻趙氏韓致中妻王氏劉可相妻熊氏郭文治妻劉氏郭國固妻謝氏劉璒妻吳氏王進妻开氏丁信妻康氏范希順妻李氏宋浩妻嚴氏宋裕承妻吳氏又烈婦劉世安妻黄氏均乾隆年閒旌王世桂妻崔氏武功人世桂蚤殁氏親族無所依甘貧織紝撫子成立氏生於明萬厯四十一年殁於雍正九年壽一百二十歲又張志耀妻趙氏年二十八而寡撫孤生子又撫孫以及曽孫卒於乾隆十八年夀一百零四歲乾隆十七年旌同縣徐遵妻喬氏王錦妻馬氏李尚林妻楊氏李浩妻劉氏楊茂楝妻羊氏王應運妻張氏張義妻景氏舒庭妻吳氏党從直妻李氏党防妻薛氏蒲桐妻賈氏蒲延齡妻朱氏張宰妻王氏葛正夏妻白氏王富善妻楊氏靳永臨妻張氏張泗妻焦氏靳莊妻何氏張金門妻馬氏党廷環妻胡氏朱炎斌妻焦氏党熙齡妻耿氏党黃珍妻黃氏徐鴻綬妻申氏田希篝妻趙氏又烈婦金庫妻馮氏魏大緒妻孫氏曹恒禄妻馬氏均乾隆年閒旌夏芳妻任氏永夀人年二十夫亡子甫及歲氏念翁老孤幼紡績餬口鄉里稱賢乾隆十一年旌同縣夏泉妻師氏周鏡妻董氏李鳳翔妻都氏又烈婦趙㑹妻盧氏俱乾隆年閒旌高氏女乾州人許字鄭宏德未婚夫殁矢志守節撫嗣子成立嘉慶二十三年旌蔣氏女武功人許字党忻年十八未婚聞夫䘮痛絶復蘇遂往夫家養翁姑執婦道䘮葬盡禮撫嗣子成立嘉慶二十五年旌王永傑妻吳氏乾州人夫亡守節嘉慶元年旌同縣金國庠妻景氏張應周妻全氏李永淮妻史氏王有年妻常氏馬彦妻郭氏黎利復妻殷氏劉廷權妻王氏王振河妻吳氏嚴其品妻鄭氏田士英妻張氏均嘉慶年閒旌王有年妻夏氏武功人夫亡守節嘉慶二年旌同縣馬樓妻趙氏耿汝超妻王氏党光壁妻張氏劉毓棟妻段氏楊學深妻劉氏劉起瑞妻李氏孫潤妻王氏王雲龍妻郭氏弓冲漢妻别氏張位妻王氏劉璋妻張氏丁折桂妻何氏楊繼溥妻崔氏楊之華妻党氏申紀妻徐氏李振東妻伊氏李振家妻華氏馬浚四妻趙氏張素抱妻何氏張清妻郭氏楊錦蘭妻党氏楊友蘭妻羊氏丁一昇妻蔣氏劉事清妻張氏郭維垣妻党氏周三元妻王氏宋坦妻桂氏王仲智妻徐氏又烈婦王某妻趙氏魏廷傑妻李氏均嘉慶年間旌弓峻登妻于氏武功人峻登舉於鄉未幾病氏禱於神祈以身代及卒仰天泣曰舅有長子奉養不患無人夫無遺子生亦何為遂自縊柩前面色如生同縣訓導党振聲妻王氏亦夫亡殉節均嘉慶年閒旌流寓漢陸賈楚人孝惠時吕太后用事欲王諸吕賈自度不能爭之乃病免以好畤田地善往家焉三國魏吉茂池陽人與扶風蘇則共入武功南山隱處精思仙釋明僧寶金永夀人號璧峯俗姓石氏嘗趺坐大樹下谿水橫溢人意其已死越七日水退視之燕坐如平時惟衣溼耳明洪武初奉詔至南京召問佛法及鬼神情狀奏對稱㫖御製詩賜之後卒宋濂為撰舍利塔銘土產小麥州志皮薄麪多較他處每斗重二斤西瓜州志陽洪店出瓜味美於他處柏州志乾陵柏文多雲氣人物鳥獸一株值萬錢唐白樂天有柏床詩前總纂官臣丁善慶恭纂輯提調官臣張日章恭覆輯校對官臣顏以燠恭校校對官臣沈維銓恭覆校
