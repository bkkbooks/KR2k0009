  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_090-1a}
body:
  text: 同州府三人物漢李必駱甲俱重泉人漢王西收軍於滎陽楚騎來衆乃擇軍中可為騎將者皆推故秦騎士李必駱甲習騎兵乃拜灌嬰為中大夫令必甲為左右校尉將郎中騎兵擊楚騎於滎陽東大破之司馬談夏陽人秦蜀守司馬錯八世孫學天官於唐都受易於楊何習道論於黄子建元元封之間為太史令愍學者不達其意而師誖乃論陰陽儒墨名法道德六家之要指司馬遷談子生龍門耕牧河山之陽年十歲誦古文二十而南遊江淮上會稽探禹穴窺九疑浮沅湘北涉汶泗講業齊魯之邦過梁楚以歸仕為郎中奉使巴蜀還為太史令遭李陵之禍被腐刑為中書令作史記始自黃帝迄於漢太初凡百三十篇楊敞華陰人給事霍光幕府為軍司馬光愛厚之後遷御史大夫拜丞相封安平侯與光共立宣帝薨諡敬侯子忠嗣田惲兄威都左馮翊人俱純懿惲最知名郡嘗欲察授之惲恥越兄賢遂托病瘖積四歲威都果舉遷安定長史惲始語司隸太尉大將軍同時並辟爲侍御史舉茂才早殞威都官至武郡太守太尉掾楊惲敞次子始讀外祖太史公記頗爲春秋以材能稱好交英俊諸儒名顯朝廷擢爲左曹以與誅霍氏功封平通侯遷中郎將郎謁者有罪過輒奏免薦舉其高第有行能者絶請謁貨賂之端令行禁止擢光祿勲居殿中亷潔無私郎官稱公平楊寶敞曾孫習歐陽尚書哀平之世隱居敎授王莽居攝二年與兩龔蔣詡俱徴遂遁逃不知所處光武高其節建武中公車特徴老病不到卒於家楊震寶子少好學明經博覽諸儒謂之關西孔子年五十始仕州郡四遷荆州刺史東萊太守當之郡道經昌邑故所舉荆州茂才王密爲令謁見至夜懷金十斤以遺震震不受密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出後轉涿郡太守故舊或欲令爲開産業震曰使後世稱清白吏子孫以此遺之不亦厚乎永寕初爲司徒延光二年爲太尉時乳母王聖及中常侍樊豐等更相扇動震屢上疏切諫豐等譖之詔遣歸本郡行至城西夕陽亭飲酖卒順帝即位詔令改葬有大鳥集䘮前悲鳴淚下葬畢飛去時人立石鳥像於墓所劉寛華陰人父崎順帝時為司徒寛嘗行有人失牛者就寛車中認之寛無所言下車步歸州里服其不校延熹八年徴拜尚書令典厯三郡温仁多恕雖在倉卒未嘗疾言遽色吏人有過但用蒲鞭罰之示辱而巳嘉平五年為太尉夫人欲試寛令恚伺當朝㑹使侍婢奉肉羮飜汚朝衣寛神色不異乃徐言曰羹爛汝手否其性度如此海内稱為長者後封逯鄉侯楊秉震中子少傳父業兼明京氏易博通書傳年四十餘應司空辟拜侍御史頻出為豫荆徐兖四州刺史遷任城相皆計日受俸餘祿不入私門故吏賷錢百萬遺之閉門不受桓帝即位以明尚書徴入勸講遷侍中尚書帝微行私過幸梁冀子舍秉上疏諌冀用權秉稱病冀誅後徴拜太尉時宦官方熾任人及子弟為官競為貪淫秉奏免牧守以下五十餘人天下肅然每遇朝廷得失輒盡忠規諌多見納用卒賜塋陪陵楊賜秉子篤志博聞不答州郡禮命後以司空高第遷侍中越騎校尉建寕初靈帝當受學三公舉賜侍講於華光殿中厯拜司徒帝好微行遊幸外苑賜上疏諌光和元年行辟雍禮引賜為三老五年拜太尉黃巾賊起賜𬒳召㑹議詣省閣切諫免歸後帝感悟詔封臨晉侯卒諡文烈楊彪賜子以博習舊聞公車徴拜議郎中平中厯拜司徒董卓欲遷都彪堅爭不止興平初為太尉錄事尚書及李傕郭汜之亂彪盡節衞主崎嶇危難之間㡬不免害及曹操秉政彪見漢祚將終稱疾不出卒於家子修好學有俊才為操主簿操忌之見殺自震至彪四世太尉德業相承為東京名族張芝父奐自酒泉徙屬華陰始為華陰人芝少持高操以名臣子勤學太尉辟公車有道徴皆不至尤好草書為世所寳韋仲將謂之草聖弟昶亦善草書楊奇震曾孫靈帝時為侍中帝嘗問朕何如桓帝對曰亦猶虞舜比德唐堯帝曰卿强項真楊震子孫死後必復致大鳥矣後為侍中衞尉從獻帝西遷有功勤及李傕脅帝歸其營奇誘傕部曲將令反傕傕由此孤弱帝乃得東後徙都許追奇功封子亮為陽城亭侯楊衆父敷震之孫能世其家衆亦傳先業以謁者僕射從獻帝入關累遷御史中丞及帝東還衆率諸官屬步從至太陽拜侍中後封蓩亭侯三國魏嚴幹李義皆馮翊東縣人二人器性皆重厚義仕魏為執金吾衞尉幹以功封武陽侯明帝時遷永安太僕始義以直道推誠於人故於時陳羣等與之齊好幹後更折節學問善春秋公羊鍾繇不好公羊而好左氏數與幹辨析長短晉董景道宏農人少好學明春秋三傳京氏易馬氏尚書韓詩三禮專遵鄭氏著禮通論永平中隱商洛山屢徴不起以夀終南北朝魏楊播華陰人父懿為選部給事中有公平譽播少修飭累遷衞尉少卿出漠北擊蠕蠕大致克獲從南攻至鍾離師廻詔播為圓陣禦之相拒再宿播領精騎三百厯其船大呼曰我今欲渡能戰者出遂擁而濟敵莫敢動後從破崔慧景於鄧城賜爵華陰伯卒諡曰壯播家世純厚竝敦義讓昆季相事有如父子旦則聚於廳堂終日相對未嘗入内有一美味不集不食廳堂間往往幃幔隔障為寢息之所一家之内男女百口緦服同爨庭無間言楊椿播弟性寛謹為内給事與兄播竝侍禁幃後為中部法曹折訟公正孝文嘉之累遷梁州刺史永安初位太保莊帝時請老誡子孫曰吾兄弟三人並居内職十餘年中未嘗言一人罪過汝等脱若蒙明主知遇宜深慎言語不可輕論人惡也楊津椿弟少端謹以器度見稱遷符璽郎中津以身在禁密不外交遊至宗族姻表罕相參候後遷長水校尉仍直閣咸陽王禧謀反直閣半為逆黨津不預因遷驍騎將軍孝昌中除定州刺史元顥内逼莊帝以津為中軍大都督顥敗津封閉府庫迎帝於北芒帝深嘉慰之尋為司空卒諡孝穆長子遁性靜退仕至尚書左丞次子逸有當世才為光州刺史政績尤美楊侃播子好計畫襲父爵蕭寳夤反雍州長孫承業討之除侃為行臺左丞次宏農白承業曰須北取蒲坂飛棹西岸諸處既平長安自克承業從之長安平侃頗有力元顥内逼詔行北中郎將孝莊徙河北執侃手曰卿尊卑百口若隨朕行所累甚大盍還洛圖之侃曰豈可以臣微族頓廢君臣之義固求陪從及車駕南還以功進爵濟北郡公徐遵明華陰人幼孤好學與平原田猛畧就范陽孫買徳受業指其心謂猛畧曰吾今知真師所在不出門院凡經六年因手撰春秋義章敎授門徒每臨講坐持經執疏然後敷講遵明講學於外二十餘年海内莫不宗仰北齊楊愔津少子孝莊末潛竄累載屬齊神武至信都引見言辭哀壯神武為之改容即署行臺郎中轉右丞文檄敎令皆自愔出遭罹家難常以䘮禮自居所食惟鹽米而巳及韓陵之戰愔每陣先登頃之表請解職還葬風雪嚴厚愔跣步號哭見者無不哀之後封開封王愔早著聲譽風標鑒裁為朝野所稱典選二十餘年獎擢人倫以為已任周薛端魏雍州刺史汾陰侯辨六世孫祖麟駒徙居馮翊之夏陽端有志操居父䘮合禮年十七司空高乾邕辟為參軍以世亂居鄉里魏孝武西遷東魏遣將守楊氏壁端招喻村人多設奇兵以臨之東魏將東遁端收其器械復還楊氏壁文帝徴為丞相府戸曹參軍從擒竇泰復宏農戰沙苑並有功累遷吏部郎中性强直不避權貴貴遊子弟才劣行薄者未嘗升擢之進吏部尚書端久處選曹雅有人倫之鑒其所擢用咸得其才孝閔時出為蔡基二州刺史有吏政卒進封文城郡公諡曰賢隋薛胄端子少聰明每覽異書便曉其義周明時襲爵文城郡公高祖受禪為兖州刺史發奸摘伏人稱神明堰沂泗二水決令西注陂澤盡為良田又通轉運百姓賴之徴拜大理卿持法寛平遷刑部尚書以雪明高熲獄忤㫖被繫後檢校相州卒薛濬胄從祖弟少孤養母以孝聞開皇中厯尚書虞部考功侍郎丁母憂歸葬夏陽時隆冬極寒濬衰經徒跣五百餘里足凍墮指創血流離哀動朝野尋起令視事帝見其毁瘠過甚顧羣臣曰吾見薛濬不覺悲感傷懷尋病卒濬性清儉死之日家無遺財郭均馮翊人為兵部尚書明悟有幹畧楊伯醜武鄉人好讀書隱於華山開皇初徴入朝高祖與語不答賜之衣服捨之而去被髮佯狂遊行市里有張永樂者賣卜京師有不能決者伯醜輒為分析爻象尋幽入微永樂鑒服伯醜亦開肆賣卜多奇驗國子祭酒何妥嘗詣之論易所説辭義思理元妙論者以爲天然獨得非常人所及以夀終楊智積華隂人高祖弟整之子整從周武平齊力戰死高祖時追封蔡王以智積襲授同州刺史門無私謁或勸爲產業智積曰昔平原露朽財帛苦其多也吾幸無可露何更營乎有五男止敎讀論語孝經亦不令交通賓客意恐其有才能以致禍也大業中拜宗正卿楊尚希隋宗室少孤入太學專精不倦同輩皆推服周太祖嘗親臨釋奠尚希時年十八令講孝經詞㫖可觀擢爲國子博士厯東京司憲中大夫撫慰山東河北文帝受禪拜度支尚書尚希見天下州郡過多請存要去間併小爲大國家則不虧粟帛選用則易得賢才帝嘉之遂罷天下諸郡厯兵禮二部尚書卒諡曰平楊异華隂人九歲丁父憂哀毁過禮免䘮後閉戸讀書數年博涉書記周閔帝時以軍功封昌樂侯文帝踐祚拜宗正少卿蜀王秀之鎮益州也朝廷盛選綱紀以异方直拜益州總管長史厯宗正卿刑部尚書楊武通華陰人性果烈善馳射數以行軍總管討西南夷以功拜左武衞將軍党項羌屢爲邊患朝廷以其有威名使鎮邊厯岷蘭二州總管楊善會華陰人大業中爲鄃令以清正聞俄山東饑盜起善會討之往皆克捷後賊帥張金稱破黎陽而還善會邀破之前後抗賊七百餘陣未嘗負敗拜清河通守後爲竇建徳所陷建徳釋而禮之善會肆罵臨之以兵辭氣不撓乃害之王辯蒲城人少習兵法善騎射從討漢王諒遷武賁郎將山東盜起辯發步騎三千擊敗之復擊高士達郝孝徳等所向皆㨗後擊李密渉水至中流墜馬溺死唐徐齊聃長城人世客馮翊八歲能文太宗召試賜以佩金削刀高祖時立崇文館學士齊聃姑爲帝婕妤嫌以恩進求出爲桃林令累進西臺舍人長孫無忌死家廟毁頓齊聃言於帝曰齊獻公陛下外祖雖後嗣有罪不宜毁及先廟今周忠孝公廟反崇飾踰制恐非所以示海内帝悟復獻公官以無忌孫延主其祀齊聃善文誥帝愛之令侍太子坐事流欽州卒喬知之馮翊人有俊才所爲詩人多傳誦武后時累除右補闕遷左司郎中爲武承嗣所害嚴善思名譔朝邑人以字行父延通儒術該曉圖䜟善思傳延業褚遂良上官儀等奇其能高祖時調襄陽尉居親䘮廬墓因隱居十年武后時擢監察御史數言天下事方酷吏搆大獄以善思為詳審使平活八百餘人原千餘姓長夀中按囚司刑寺罷疑不實者百人來俊臣等疾之誣以罪謫交阯後以著作佐郎兼太史令睿宗立拜右散騎常侍徐堅齊聃子舉秀才及第聖厯中東都留守楊再思王方慶共引為判宮屬文典厚再思每目為鳳閣舍人様與徐彦伯等修三敎珠英睿宗時進東海郡公遷黄門侍郎初太平公主用事武攸暨屢邀請堅堅不許又以妻岑羲女弟因辭機密羲敗不染於惡明皇時厯集賢院學士副張説知院事堅於典故多所諳識凡七當撰次高選齊聃姑為太宗充容仲為高宗婕妤皆明圖史議者以堅父子如漢班氏楊宏禮華隂人太宗征遼東拜兵部侍郎領步騎二十四軍跳出賊背所向摧靡帝自山下望其衆𫀆甲精整人人盡力壯之還遷司農卿弟宏武仕終同東西臺三品謹慎自守居職以清簡稱楊炯華隂人舉神童授校書郎永隆二年充崇文館學士薛元超薦之遷詹事司直厯盈川令炯與王勃盧照隣駱賓王以文章齊名稱為四傑嚴挺之名浚以字行華隂人少好學舉進士并擢制科姚崇執政引為右拾遺先天二年正月然燈賜酺閲月未止挺之疏諫帝納焉開元中累進給事中典貢舉時號平允厯濮汴二州刺史召為刑部侍郎宰相張九齡雅知之用為尚書左丞知吏部選李林甫恨之下除洺州刺史天寶初終員外詹事子武肅宗時官劍南節度使封鄭國公王忠嗣鄭人父海賓討吐蕃為先鋒戰死忠嗣時年九歲始名訓入見帝伏地號泣帝撫之曰此去病孤也賜名養禁中及長雄毅寡言有武畧蕭嵩出河西引為麾下嘗以精鋭數百襲虜斬數千人獲羊馬萬計累遷朔方節度使突厥不敢盜塞忠嗣本負勇敢能持重安邊不生事嘗曰平世為將撫衆而已吾不欲竭中國力以幸功名訓練士馬時出奇兵所向無不克俄為河西隴右節度使權朔方河東節度佩四將印李林甫忌其功誣以罪貶漢陽太守寳應初追贈兵部尚書楊瑒華隂人為麟遊令名顯當世累擢侍御史謀劾京兆尹崔日知貪㳫不法反為日知先搆瑒廷奏曰肅䋲之司一為恐脅所屈開奸人謀則御史府可廢明皇直之逐日知瑒進厯户部侍郎宇文融建檢脱户餘口時融方貴公卿啽黙獨瑒抗言不便出為華州刺史入為國子祭酒表大儒王迥質尹子路白履忠等敎授又奏今習春秋三家儀禮者纔十二恐遂廢請能通者稍加優宦奬孤學詔以三家傳儀禮出身不任散官遂著令改左散騎常侍卒諡曰貞瑒常歎士大夫不能用古禮因其家冠婚䘮祭據舊典為之節文揖讓威儀哭踊衰殺無有違者呉筠華隂人美文詞性高鯁不耐沉浮於時頗究老子術明皇召見敕待詔翰林嘗問神仙治鍊法對曰此非人主宜留意筠每開陳皆名敎世務高力士短之懇求還嵩山所善孔巢父李白歌詩畧相甲乙郭子儀鄭人以武舉異等累遷振遠軍使安祿山反充朔方節度使率本軍東討收雲中馬邑下井陘與李光弼合軍數破賊方北圖范陽會肅宗即位靈武詔班師同中書門下平章事仍總節度平河曲攻潼關蒲津收永豐倉於是關陜始通進司空充關内河東副元帥從廣平王克復長安大破安慶緒遂收東都河東河西河南州縣悉平以功加司徒入朝帝迎勞曰國家再造卿力也經畧北討破賊河上執安守忠進中書令魚朝恩譖之遂解兵尋復為朔方等處節度行營兼副元帥封汾陽王屯絳州代宗立程元振搆之罷副元帥僕固懷恩引吐蕃入寇遽拜子儀為關内副元帥時虜巳並南山而東帝幸陜子儀收兵屯商州威鎮關中吐蕃遂潰帝以子儀為京城留守乘輿還賜鐵劵圖形淩煙閣永泰初懷恩説吐蕃囘紇等三十萬分道入子儀馳數十騎至囘紇軍結歡誓好遂合軍破吐蕃十萬於靈臺徳宗嗣位詔攝冢宰賜號尚父進太尉中書令卒諡忠武配享代宗廟廷子儀事上誠接下恕賞罰必信以身為天下安危者二十年子八人四以才顯曜樸簡自處居䘮以禮厯官太子太保晞從征伐有功復兩京戰甚力累官御史中丞領朔方軍援邠州擊破吐蕃回紇朱泚亂南走山谷賊舁致之欲汚以官佯瘖不答露兵脅之不動數以賊中事貽書李晟至奉天改太子賓客曖尚昇平公主朱泚逼署官辭以居䘮𬒳疾既而與公主奔奉天徳宗嘉之官至太常卿曙爲司農卿德宗幸奉天曙領家兵扈乘輿帝還擢金吾大將軍瞹子釗太和中爲西川節度使釗弟鏦尚漢陽公主厯官太子詹事楊燕奇華陰人父文誨爲平盧衙前兵馬使世掌諸蕃互市恩信著明祿山之亂燕奇率諸將校子弟勤王拜左金吾大將軍累遷御史大夫爵清邊郡王結髮從軍四十餘年從討平劉展李希烈敵攻無堅城守必完臨危蹈險欷歔感發乘機應令捷出神怪其事君無疑行其事上無間言楊綰華陰人少孤家貧事母謹甚舉詞藻宏麗科擢右拾遺肅宗即位累遷中書舍人故事舍人年久者爲閣老其公㕔雜料獨取五之四至綰悉均給厯禮部侍郎建復古孝亷力田等科遷吏部品裁清允人服其公元載忌之改國子祭酒載得罪拜中書侍郎同中書門下平章事制下士相賀於朝時諸州悉帶團練使綰奏罷之又減諸道觀察判官員之半高選州上佐定上中下州差置兵員詔郎官御史分道巡覆又定府州官月廪復承平時舊制未幾卒諡文簡綰儉約始輔政御史中丞崔寛毁城南别墅京兆尹黎幹減從騶郭子儀在邠州方大會除書至音樂散五之四李抱玉朝邑人本安興貴孫為人沈毅有謀尤忠謹安史之亂屢立戰功至德二載上言恥與賊臣同姓詔賜姓李位至鳳翔隴右節度使卒諡昭武其從父弟抱真沈慮而斷亦以勇畧著聞嚴郢華陰人大厯末年官拜京兆尹嚴明持法盜賊一衰減隸官工匠數百人號稱職宰相楊炎請屯田豐州發關輔民鑿陵陽渠郢奏浚渠營田擾而無利炎惡之諷御史劾郢繫金吾長安中日數千人遮建福門訟冤帝出為費州刺史楊於陵漢太尉震之裔擢進士德宗時拜中書舍人京兆李實恃恩横暴於陵不附為所譖短徙秘書少監元和中厯遷吏部侍郎請修甲厯南曹置别簿相檢實吏不能為姦居四年凡調三千員時謂為適穆宗立遷戸部尚書以尚書左僕射致仕於陵器量方峻進止有度節操堅明始終不失其正卒諡貞孝子嗣復八歲知屬文後擢進士博學宏辭尤善禮家學開成中同中書門下平章事嚴綬挺之從孫擢進士第以侍御史副劉贊為宣歙團練使擢河東節度使憲宗立楊惠琳反夏州劉闢反蜀綬建言始即位不可失威請必誅選鋭兵遣李光顏助討賊二賊平進司空後節度荆南封鄭國公殷堯藩同州人有才名工詩元和九年登第是年韋貫之掌文衡堯藩被黜尚書楊漢公盛言其屈貫之重收焉初為李翺長沙幕後為永樂令治績風采甚著有詩集傳世郭承嘏晞孫幼秀異通五經元和中及進士第居母䘮以孝聞太和六年為諌議大夫文宗以鄭注為太僕卿承嘏極論其非進給事中俄出為華州刺史盧載言承嘏數封駮稱職宜在禁闥乃復留遷刑部侍郎帝常稱其儒素無貴驕氣每進對恩接稱厚楊收馮翊人七歲而孤處䘮若成人母長孫親授經十三通大義善屬文號神童及壯博學强記他藝無不通解擢進士懿宗時為中書舍人翰林學士以中書侍郎同中書門下平章事進尚書右僕射兄發累官左司郎中宣宗追加順憲二宗尊號有司議改造廟主發以為求古無文執不可累官兵部侍郎從子涉哀帝時進同中書門下平章事為人端重有禮法遭唐之亂以謙進免於禍涉子凝式有文詞善筆札官至太子太保楊煚於陵曾孫累擢左拾遺昭宗初立數遊宴上䟽極諌厯户部員外郎朱全忠入京師煚挈族客湖南終諌議大夫五代梁敬翔馮翊人少好學工書檄從梁太祖為館驛巡官謀畫多中帝即位以為崇政院使遷兵部尚書金鑾殿大學士翔深沈有大畧從帝用兵三十餘年細大之務必關之盡心勤勞晝夜不寐末帝即位趙巖等用事翔遂不用唐莊宗入汴自經而死宋雷德驤郃陽人周廣順中舉進士為三司判官受詔均定隨州諸縣田屋税稱為平允宋初判大理寺會宰相趙普擅増刑名因求見太祖以白其事未引對直詣講武殿奏辭氣俱厲太祖怒黜為商州司户叅軍尋削籍徙靈武數年召為秘書丞端拱初累遷户部侍郎楊克讓馮翊人晉末舉進士不第宋初為西川轉運副使蜀民懷其善政後為兩浙西南路轉運使討平泉州盜徙知廣州卒克讓少好學手寫經籍厯官亷謹所至有聲每視事斷決如流子希閔生而失明令諸弟讀經史一厯耳輒不忘屬文善緘尺趙普守西洛牋疏皆希閔所為有集二十卷自敎三子日華日嚴日休皆登進士邊珝鄭人晉天福中解褐祕書省宋初為倉部郎中太平興國中拜右諫議大夫領吏部選事移知開封府珝精力有吏材帝方欲倚用及卒歎惜數四雷有終德驤次子初署萊蕪尉發知監左拾遺劉棋姦賊代知監事太宗聞其名召為大理寺丞淳化中厯度支鹽鐵副使江南嶺外茶鹽制置使李順之亂命為峡路隨軍轉運使規畫戎事皆有節制真宗初王均據蜀為亂以有終知益州率衆討平之景德初徙并代副都部署契丹入寇帝幸澶淵有終赴援威聲甚振召拜宣徽北院使檢校太保卒贈侍中有終沈敏善斷輕財好施厯典藩閫能撫士卒家無餘財奉身甚薄兄子孝先累官領軍衞大將軍分司西京孝先子簡夫隱居不仕京兆府薦治三白渠厯知雅州終職方員外郎韓丕鄭人幼孤貧有志操通周易禮記太平興國三年舉進士擢著作佐郎直史館端拱初拜右諫議大夫厯知河陽濠州丕起寒素以沖淡自處不奔競於名宦太宗甚嘉重之召入為翰林學士官至工部侍郎安儼郃陽人負奇節善屬文舉進士授大理評事多所平反厯秘書省著作郎帝謂曰卿文章純粹為時名器宜懋乃徳啟沃朕心加右司諌出知鄜州蘇州皆多美績李行簡馮翊人家貧刻志於學讀六經每至夜分寒暑不易又聚木葉學書筆法道勁舉進士為侍御史陜西旱蝗命往安撫發倉粟救乏絶又蠲耀州積年逋租還擢龍圖閣待制歴尚書刑部郎中帝數幸龍圖閣命講周易間訪大臣能否行簡無怨昵各道其所長人以為長者乾興初改給事中厯知虢州卒趙湘華州人進士甲科厯遷太常博士上補政忠言十篇召判宗正寺真宗親製五箴以自警湘因言宗室風化所本宜有以訓厲帝為製宗室座右銘賜凝王元偓以下并及湘且諭之曰卿宗姓也故賜卿後為集賢院學士張昇韓城人舉進士王曾稱其有公輔器厯知雜御史張堯佐縁恩驟用内侍楊懷敏夜直禁中而衞士為變皆極論之拜御史中丞指切時事無所避嘉祐中厯參知政事樞密使昇愛惜官資凡内降所與多持不下屢進言建儲事卒與韓琦同決䇿英宗立請老帝曰太尉勤勞王家詎可遽去命五日一至院後以太子太師致仕卒贈司徒兼侍中諡康節王吉甫同州人神宗時累遷刑部員外郎持論寛平遇事不可必力爭之厯知齊梓同邢漢等州以中大夫卒吉甫老於為吏亷介不囘為時所稱李廌華州人其先自鄆徙華六歲而孤能自奮立以學問稱鄉里謁蘇軾於華州軾拊其背曰子之才萬人敵也軾典貢舉遺之賦詩自責與范祖禹謀將同薦諸朝未㡬相繼去國軾亡廌哭之慟走許汝間相地卜兆作文祭之元祐求言上忠諫書忠厚論并獻兵鑒二萬言論西事當時韙其言李周馮翊人登進士第調長安尉厯知雲安縣通判施州皆有政績司馬光將薦為御史欲使來見周曰聞薦而往所為呈身御史也卒不往哲宗立召為職方郎中朝廷議和西夏欲棄蘭州周以為非秦蜀利遂不果棄官至集賢殿修撰周自為小官沈晦自匿未嘗私謁執政以是不偶於世侯可華隂人少以氣節自許既壯篤志為學孫沔征儂猺請參軍事奏功得官調華原主簿韓琦鎮長安薦知涇陽縣厯官至殿中丞可與田顏為友顏無子不克葬可鬻衣相役卒葬之天寒單衣以居有饋白金者顧顔之妹未嫁舉以佐之一日自遠歸適友人郭行叩門曰父病醫邀錢百千賣吾廬而不售可惻然計槖中裝悉與之蔣偕鄭人父病曽刲股以療舉進士厯大理寺評斷官陜西用兵數上書論邊事用龎籍范仲淹薦為環慶路兵馬都監儂智高反為廣南東西路鈐轄呉革華隂人從涇原軍以義秉郎幹辦經畧司公事金兵南攻帥兵解遼州之圍車駕幸金營革與孫傅募士民萬計將攻金營既而有立張邦昌之議革先謀誅范瓊瓊黨紿革入帳執之脅以從逆革罵之極口引頸受刄顏色不變其麾下百人皆死侯仲良可孫學於程頤未悟訪周敦頤留對榻夜談越三日乃還頤驚異之日非從周茂叔來耶客荆胡安國留與為鄰稱其覊苦守節朱子亦稱其清白勁直所著有論語説侯子雅言金楊邦基華隂人天眷二年登進士第遷交城令太原尹圖克坦恭託名鑄金佛屬縣輸金邦基獨不與圖克坦恭召至府將以鐵柱杖撞其面不為動以亷為河東第一遷秘書監兼左諫議大夫出為永定軍節度使致仕卒邦基能屬文尤以善畫名當世圖克坦恭舊作徒單恭今改党懷英馮翊人大定進士能屬文工篆籀當時稱第一累除翰林待詔充遼史刋修官章宗即位求文學之士以備侍從謂宰臣曰近日制設惟党懷英最善永安中厯翰林學士承㫖卒諡文獻張建蒲城人有詩名明昌時授絳州敎官召為官敎應奉翰林文字以老請致仕章宗愛其純素不欲令去授同知華州防禦使仍賜詩以寵之自號蘭泉有集行於世元郭寳玉鄭人郭子儀之裔通天文兵法善騎射金末封汾陽郡公穆呼哩引見太祖言建國之初宜頒新令於是頒條畫五章從帝伐西蕃討遼遺族收遼渤海等諸國皆立有戰功累遷斷事官穆呼哩舊作木華黎今改郭德海寳玉子􅐾貌奇偉亦通天文兵法從先鋒哲伯西征攻破鐵山踰雪嶺西北萬里進軍次達哩國悉平之從庫庫楚入關中破南山八十三寨陜西平提孤軍轉戰連破金軍以功遷右監軍子侃弱冠為百户鷙勇有謀畧屢破金軍從宗王錫里庫西征破降諸部世祖即位侃上疏陳建國號築都城立省臺興學校等二十五事及平宋之䇿後皆如其言累擢萬户知寕海州哲伯舊作拓伯達哩舊作荅里庫庫楚舊作闊闊錫里庫舊作旭烈兀今並改王由義朝邑人為御史累有獻替從幸上京抗章論衞士縱牧踐民田行營肅然至大元年除彰德路總管多善政徵兵部侍郎郭均朝邑人至正時尹郿課農興學有蠧民者悉伏法又引斜谷水溉田建常平倉積粟民甚戴之張思孝華州人母䘮以孝聞父疾調䕶甚至不愈以父涕洟半器垂泣盡飲之復潔齋致禱乞以身代未幾遂痊至順中表其門呉好直蒲城人父殁事繼母孝兄弟嘗求分財好直勸諭不能止即以己所當得悉推與之出從師學淡洎三十年無少悔明王朴初名權同州人洪武中進士授吏科給事中以直諫忤㫖罷旋起為御史陳時事千餘言性鯁直數與帝辨是非不肯屈一日遇事爭之彊帝怒命戮之至市復召還曰汝改乎朴對曰陛下不以臣為不肖擢官御史使臣無罪安得戮之有罪又安用生之臣今日願速死耳帝大怒竟戮死周彧朝邑人洪武時以人材徴為給事中舉劾無所避遷通政使有譖其貪者帝怒下獄死籍其家惟米數斛及布衣而已召訊其妻曰夫常恐溺職不敢受俸今皆寄司庫頃之所司以彧俸進帝始知枉立誅譖者以俸金給其家命有司致祭高翔朝邑人洪武中以明經為監察御史建文時僇力兵事成祖聞其名召翔欲用之翔䘮服入大哭語不遜遂族誅福王時贈太僕卿諡忠愍程濟朝邑人有道術洪武末為岳池敎諭建文初上書言北方兵將起逮至京將殺之濟入見大呼曰陛下幸囚臣臣言不驗死未晚乃下之獄巳而燕兵起帝釋濟以為翰林院編修參北征軍淮上敗召還後莫知所終蔚能朝邑人初為吏以能授光禄典簿累進本寺卿天順初拜禮部右侍郎仍掌寺事能居光禄逾三十年清慎守法未嘗私取一臠先後官光祿者皆不及侯智同州人天順間以孝行旌又同州人張鼎成化間以孝行旌李茂澄城人為諸生母患惡瘡茂日吮之夜則叩天祈代及卒結廬墓傍朝夕悲泣天大雨懼衝其墓伏墓哭雨即止父卒廬墓如之成化二年旌二子表森森為國子生茂卒兄弟同廬於墓宏治五年旌表子俊亦國子生表卒俊方弱冠廬墓終喪母卒亦如之正德四年旌侯自明白水人宏治中進士學問博洽尤飭名節與康海吕柟遊官户部主事忤劉瑾謫判安慶官至川南兵備王緒華陰人宏治中舉於鄉正德中知諸城縣時遭齊彦名之亂青州屬邑皆陷賊攻諸城緒率兵民逆戰斬賊首一境獲全邑人祠之韓邦奇朝邑人正德中進士厯吏部員外郎上疏極諌時政闕失忤㫖謫平陽判官遷浙江僉事中官王堂等在浙爪牙四出民不聊生邦奇數裁抑之堂奏邦奇沮格上供斥為民嘉靖初厯副都御史巡撫宣府調遼東又調山西皆著威望進南京兵部尚書致仕歸地震殞焉贈太子少保諡恭簡邦奇性嗜學自諸經子史及天文地理樂律術數兵法之書無不通究著述為世所稱韓邦靖邦奇弟與邦奇同登進士授工部主事榷木浙江輒輕其課進員外郎上疏言時政奪職世宗即位起山西參議分守大同歲饑請發帑不許復抗疏千餘言不報遂告歸尋卒邦靖兄弟孝友邦奇嘗廬居得疾邦靖藥必分嘗食飲皆手進後邦靖病急邦奇日夜持弟泣衣不解帶及殁衰絰蔬食終䘮勿懈鄉人為立孝弟碑馬自强同州人嘉靖中進士改庶吉士授檢討隆慶中厯國子祭酒振飭學政請寄不行神宗時累擢禮部尚書禮官所掌宗藩事最多先後條例自相牴牾黠吏得恣為奸利自强擇其當者俾僚吏遵守每藩府疏至榜之部門明示行止吏無所牟利諳達通貢市賞有定額邊臣徇其求額漸溢自强請申故約歲貢費不貲進太子太保文淵閣大學士參機務卒贈少保諡文莊諳達舊作俺荅今改王維楨華州人嘉靖中進士選庶吉士厯官南京國子祭酒讀書好經世學備知關塞要害及守禦方畧所著有槐野存笥稿張達白水人由指揮厯建邊功性慷慨負奇節膂力絶人遇敵好離營陷陣所向有功嘉靖中諳達大舉入犯達力戰死之諳達譯見前盛訥潼關衞人父徳世戰指揮討洛南盜戰死訥年十七號泣請於當事勺水不入口者數日為發兵討斬之隆慶中舉進士由庶吉士厯官吏部侍郎與尚書陳有年共釐銓政母憂歸以篤孝聞卒諡文定子以宏萬厯中進士厯官禮部尚書李朴朝邑人萬厯中進士厯户部主事朴以朝多朋黨清流廢錮疏請破奸黨錄遺賢因爲顧憲成于玉立李三才孫丕揚辨謗而薦吕坤姜士昌鄒元標趙南星帝不能用遷郎中時齊楚浙三黨勢盛稍持議論者羣操逐之朴性戅積忿不平上疏極論帝爲下詔切責言官黨人益怒排擊無虚日遂落職天啟初起用厯官參議卒贈太僕少卿張春同州人萬厯中舉於鄉天啟初擢永平兵備僉事崇禎四年以監軍救太凌河新城𬒳執不屈妻翟氏聞之六日不食自縊死王之寀朝邑人萬厯中進士爲刑部主事首發張差挺擊事天啟初上復讐疏言方從哲崔文昇等誤用藥之罪累遷刑部侍郎魏忠賢竊柄首翻挺擊案逮下詔獄死楊呈秀華隂人萬厯中進士厯官順慶知府罷歸流寇侵掠郡縣呈秀結鄉勇迎戰力竭被執爲賊所害贈光禄少卿弟呈芳見兄被執單騎入賊營身被重創而死敕並旌表楊愈懋潼關衞人萬厯末僉書中軍都督府天啟四年蜀寇亂命總兵征之五戰皆捷遂帥師深入至江門賊圍之數重愈懋督軍築塹以守援兵不至乃遣人間道齎敕印至成都力戰死之贈太子太保賜祭奠妾王氏聞訃亦絶粒死姬文廕華州人萬厯中舉於鄉天啟二年知滕縣視事甫三日白蓮賊徐鴻儒薄城文廕緋衣坐堂皇嚙齒罵賊遂自經贈太僕少卿諡忠烈王之良華隂人天啟中進士以御史巡按畿南及鹽務俱有政績洊升太僕寺卿以僉都御史巡撫南贑時猺人與土寇相結廣東東昌盜亦起之良遣兵往擊諸寇悉降其衆復以兵扼猺出入斷其魚鹽猺患遂平在䖍倉儲有榖三千餘萬石人稱建䖍鎮百餘年得兩王公前有文成後有之良云尋擢南京兵部右侍郎卒贈都察院右都御史子宏學好學篤行流賊陷長安遂隱居不出著有石渠閣文集盛以恒潼關衞人萬厯中舉於鄉崇禎時知商城縣視事月餘流賊至卻之張獻忠陷襄樊以恒遷開封同知尚未去遂留禦賊身𬒳數矢裹創力戰城陷𬒳執不屈賊支解之贈河南按察司副使本朝乾隆四十一年賜諡節愍衞景瑗韓城人天啟中進士崇禎中擢御史劾首輔周延儒吏部侍郎曾楚卿又言楊嗣昌建議加賦之非給事中傅朝祐李汝燦以論温體仁下吏景瑗力為申救左遷行人司正後以僉都御史巡撫大同聲績甚著李自成陷山西大同總兵姜瓌開門迎賊景瑗𬒳執不屈自縊於僧寺福王時贈兵部尚書諡忠毅四十一年本朝乾隆賜諡烈愍劉孔暉郃陽人天啟初舉於鄉知新鄭縣李自成兵至固守不能支遂死之士民祀之子産祠本朝乾隆四十一年予入忠義祠王道純蒲城人天啟中進士崇禎初擢御史疏言銓除舉劾考選甲乙科太低昻宜變通帝命所司即行流賊躪關中道純請急賑飢民勿使從賊報可巡按山東以萊州事忤周延儒謫為民蒲城陷道純抗節死本朝乾隆四十一年賜諡忠節王勵精蒲城人崇禎中選貢授廣西府通判仁恕善折獄遷知重慶州張獻忠陷成都勵精自焚死本朝乾隆四十一年予入忠義祠張爾猷潼關衞人崇禎末為本衞指揮使善騎射李自成攻潼關急爾猷守南城矢石俱盡城陷䇿馬衝突殺數十賊復張弓矢入重圍身𬒳數十創死同時指揮盛昶之亦衞人為賊所執不屈縊殺之本朝乾隆四十一年並賜諡節愍李穆郃陽人諸生操持嚴正工古文著有率意稿文集本朝李楷朝邑人少聰明博涉羣書兼工書畫知寳應縣罷歸所著有河濱集一百卷賈宏祚韓城人順治初進士厯知章邱尉氏元氏三縣皆有惠政擢御史出視長蘆鹺政商人餽金悉屏弗納期滿告歸性孝友自以禄養未遂終身不衣裘帛不置酒張樂衞引嘉韓城人弱冠值流賊父之琯叔之琚從兄引文俱被執引嘉挺身赴賊願以身代備罹楚毒卒不屈順治中成進士知石首縣剿平山寇民德之引文子鴻亦以孝友著程毓槐韓城人少䘮父哀毁幾絶母殁未葬值流賊至鄉人皆走匿毓槐與弟毓檟守柩不去賊以刃脅之兄弟爭就死賊義而釋之衛執蒲韓城人順治中進士知新樂縣有惠政遷戸部主事擢御史疏請裁所歸驛並復設延安巡撫皆關大計時西南方用兵秦民困於輸輓執蒲請改水運自湖廣直達漢中公私交便先後疏凡數十上官至左副都御史党湛同州人性至孝父病狂家人莫敢近湛獨晨夜侍側父殁廬墓三年家貧不營生産屏居古窑中讀書談道終身又同里歲貢生李士璸進士張珥並里居不仕潛心理學士璸著有玉山集大學正譜等書董元俊華陰人順治中進士知黄岡縣繼知句容除積弊二十事興利七事邑有虎患元俊禱於城隍神患遂息許占魁蒲城人順治初為陽平關叅將摧破張獻忠餘黨擢山西平陽副將擒巨寇張武等有功康熙中陞延綏總兵朱龍叛進逼榆林遣逆黨投以偽劄占魁立集文武僚屬發其事晉都督同知時縁邊城堡多陷占魁誓衆固守㑹援兵四集朱龍伏誅東路神木未下占魁督兵圍之遂乞降論功給世職騎都尉襲二次卒贈太子少保諡恪敏王凝祚蒲城人父汝璜明末任河南息縣丞卒於官以寇阻未歸櫬順治初凝祚徒步求之至潼關足繭不能前卧旅舍夜夢神為摩足次日大愈星馳至息負骸歸葬王又旦郃陽人順治中進士康熙初知潛江縣邑當漢沖又旦親視隄埝先事豫防水不為患邑賦役多奸弊又旦為區畫疆理以鄉規田以田均畝以畝定賦逃亡咸復其居擢給事中疏陳湖廣濱漢諸隄請各治所轄以專責成廣東花縣請置縣設官以除盜藪皆如所請性純孝友愛博學能文尤工于詩著有黄湄集十卷楊仕顯蒲城人順治中進士性恭謹雖盛暑必衣冠終身無戯容媟語湯斌為潼商道慕之數至蒲相訪談道選知雩都縣以母老歸養終楊端本潼關衞人順治中進士知臨淄縣興學校開水利履畝行勾股法阡陌較若畫一宿賦累民者悉除之邑有温泉久涸端本至泉忽涌出父老言有賢宰則然且兆歲豐是年果大熟因名瑞泉端本罷後泉復涸臨淄人思之不置刻石泉側曰楊公泉修潼關衞志王士正稱其簡覈有體兵志一篇尤可備史掌家故王宏撰華隂人康熙初舉博學宏詞晚年潛心著述有周易圖説述周易筮述正學隅見嘗主講關中書院弟子著錄者幾三百人兄宏嘉工書行草楷法直入晉人之室著有信古齋詩文集大華存草王斗機華隂人康熙中進士知滕縣敦本尚實勸課農桑捐修文廟未幾以憂歸服闋後絶意任進修白雲祠為遊息之地性好山水文章構朱文公祠於山麓與同人講學士論以為晴雲秋月纖塵不染康乃心郃陽人康熙舉人聖祖仁皇帝西巡駐潼關問關中經明行修者韓城劉䕃樞以乃心對自是文章之名大著著有毛詩箋萃野集太乙子韓城平遥志陳九疇華州人性孝友事繼母屈氏承歡四十年屈忘其非巳出也與異母弟九錫相友愛盡以美田宅讓之湯斌分守潼商高其行誼為銘其墓孫蒼華州人康熙初年十七隨父樵西石門虎突至攫其父蒼奮呼而前揮手中斧裂虎項虎逸父得脱同里劉誥亦以孝謹聞親卒負土成墳廬墓三年雷䥵蒲城人副貢性篤孝友親䘮哀毁骨立所遺産悉讓兩弟僦居數椽季弟客死山左䥵往求遺櫬為人傭書得金始扶歸櫬宋希寅蒲城人性篤孝父母相繼逝既葬廬於墓所穿土穴以居有兩狼蹲伏其傍馴擾不去又烏啄隣田瓜希寅所種瓜烏不食皆以為孝感楊長華隂人歲荒嘗負粟隣境忍飢奉親家貧卧無衾裯嘗身先温席抱父足竟夕父病為嘗糞祈以身代父卒廬墓傍不去康熙二十年旌張大有郃陽人康熙中進士由翰林院編修厯官至漕運總督雍正初疏陳漕政八條又奏山東閘河疏洩事宜及稽查糧艘夾帶私鹽之弊均議行尋遷工部尚書卒諡文敬蘇億華陰人七歲䘮母哭泣至慟水漿不入口者數日後父疾嘗抱坐懷中七晝夜無轉側隨父寢處三十餘年父殁負土成墳廬墓三年雍正五年旌王夢祖蒲城人由恩貢舉孝亷方正七歲母殁寢食俱廢見者異之父殁於蘭山夢祖奔䘮至山左徒步扶櫬歸事伯叔一如事父遇兄弟子姪之無服者如同胞曰此皆吾祖宗之血脈也學以程朱為宗嘗言學人之業惟居敬存誠四字服膺張横渠學舍亦左書砭愚右書訂頑邑舊有横渠祠率衆鼎新之顔曰關西大儒乾隆十三年歲饑鄰里欲他徙夢祖邀止之曰吾有積粟數十石願與共之不足則鬻産繼之由是家中落其示子孫曰儉可養亷恕可成德卒年七十五崔文傑華州人以四川阜和營把總隨征金川積功洊陞遊擊乾隆四十年進剿當噶殁于陣事聞賜卹王士棻華州人乾隆十九年進士改庶吉士散館授主事洊升刑部郎中計資當外轉特加四品卿銜旋授刑部右侍郎以事謫新疆上以士棻刑名熟習釋令囘京授刑部員外郎由郎中授江蘇按察使以失於糾叅落職擬謫軍台尋授刑部員外郎卒士棻居刑曹垂四十年多所平反屢奉命讞獄外省官按察使時凡鳴冤者必親訊以免屬吏迴䕶案有疑竇者亦必親訊以免駮審往還虚公周密為世所稱王杰韓城人乾隆二十六年進士授修撰官至東閣大學士厯典湖南江西浙江鄉試視學福建浙江厯充會試正副總裁經筵講官尚書房總師傅入直南書房軍機大臣平定臺灣廓爾喀俱賜圖像紫光閣御製贊各一首嘉慶五年因病乞休得㫖慰留七年復以病請章再上始加太子太傅銜致仕陛辭允其請賜以高宗御前陳設玉鳩杖及内府人葠併賦詩二章御書聯語以寵其行九年十月杰夫婦年皆八十諸珍物御書福綏燕喜並夀佛如意命陜西巡撫於其生日䝴至其家賜之併賜詩一章是年冬杰抵京陳謝諭令乘輿至隆宗門外扶杖進内召見後屢有賞賚並曡前韻於邸舍上以杰賜詩一章十年正月卒先朝耆舊久直内廷宣力有年忠清直勁老成端謹特贈太子太師入祀賢良祠賜諡文端原遜志蒲城人乾隆中進士知臨邑縣擢知德州善聽斷性極嚴正至臨民則心平氣和常舉黄叔度爲政先平其心之言以自勵亷訪命鞫積年疑獄平理四十餘案釋無辜百餘人尤力捕蝗春初以錢三百易蝻子一升偶有萌動剖渠掘坎悉力焚瘞初至臨邑值歲旱遜志擘畫調劑以工代賑修城垣測日景計土方設飯厰存活甚衆建育嬰廣濟二堂因病去官既殁祀名宦遜志幼嗜學家有隙地比木爲廬置筆硯肄業其中夜深書聲徹閭閈鄰嫗夜績者皆憐其瘁一日其父五更起聞苦吟聲愴然下淚遜志自是讀書默識之不敢出聲王樾郃陽人事母至孝母殁廬墓乾隆三十九年旌同縣楊繼宗屈建楚雷湛韓城張士洪申厥抱薛之棟劉大本白水高天爵俱乾隆年間以孝行旌李朝恩大荔人七世同居乾隆五十年旌又朝邑薛務本八世同居亦乾隆年間旌强克捷韓城人嘉慶十三年進士知滑縣十八年九月近畿逆匪林清滋事與滑縣李文成相結約先期文成潛糾逆黨克捷亷得其情獲文成及其黨二十餘人嚴訊之餘黨知謀巳洩夜糾衆刼獄克捷率役毛天榮家丁祁陞等手格數人賊來益衆轉戰至儀門天漸曙丁役無存者克捷身被數十創猶厲聲奮矛殺賊以力屈死闔署三十餘人皆遇害二子逢泰望泰以囘籍得免長媳徐氏罵賊不屈死尤慘官軍將集賊衆潛擁文成出城因重傷不能遠遁戮於輝縣之司寨逆首林清旋就獲上以克捷首獲逆黨俾失約敗謀先後授首厥功甚大且以身殉難闔署慘遭荼毒尤堪矜憫照知府例賜恤入祀京師昭忠祠諡忠烈給騎都尉世襲罔替韓城滑縣俱為克捷建祠春秋致祭以與難諸人從祀又以韓城登仕籍者有克捷之忠良前大學士王杰正色立朝亦籍隸其地士風醇茂増文武學額各五名長子逢泰襲世職後請改文職命以六部主事用在軍機章京上行走現升工部郎中次子望泰賞給舉人二十二年命同新貢士一體殿試改庶吉士散館復奉恩㫖授内閣中書趙垿朝邑人諸生事親以孝聞嘉慶十九年旌又澄域姚長發雷天保姚受禄蒲城孫忠愉潼關㕔劉進純畢天機俱嘉慶年間以孝行旌流寓漢高恢京兆人隱於華隂山中與梁鴻為友鴻東遊思恢作詩孔長彦魯人父僖為臨晉令卒于官遺令即葬長彦及弟季彦並十餘歲蒲坂令許居然勸令反魯對曰今載柩而歸則違父令舍墓而去心所不忍遂留華隂張楷成都人順帝時隱居宏農山學者隨之所居成市張奐酒泉人永康初願徙屬宏農華隂舊制邊人不得内移惟奐因功特聽䧟黨罪禁錮歸田里閉門不出養徒千人著尚書記難三十餘萬言董卓慕之使其兄遺縑百匹奐深惡卓之為人乃絶而不受列女漢楊敞妻司馬氏華陰人霍光謀廢立議既定使田延年報敞敞驚懼不知所言延年起至更衣敞夫人龍門司馬遷女也遽從東廂謂敞曰此國大事猶豫無決先事誅矣延年從更衣還敞夫人與延年參語許諾請奉大將軍敎令晉吕纂妻楊氏宏農人有義烈纂為吕超所殺楊氏殯於城西超將妻之楊氏乃自殺時吕紹妻張氏亦有操行年十四紹死便請為尼吕隆見而悦之欲穢其行張氏曰欽樂志道誓不受辱遂升樓自投於地二脛俱折口誦佛經俄然而死唐楊紹宗妻王氏華隂人在褓而母亡繼母鞠愛父征遼殁繼母又卒王氏年十五乃舉二母柩而立父像招魂以葬廬墓左永徽中詔賜物縀并粟表其門金許古妻劉氏定海節度仲洙女貞祐初古挈家僑居蒲城仕於朝元兵圍蒲劉氏謂二女曰汝父在朝而兵勢如此事不可保若城破被驅為所汚不若俱死以自全已而攻城甚急劉氏與二女相繼自盡事聞諡劉氏曰貞潔長女諡定姜次女肅姜李文妻史氏白水人夫亡服闋誓死弗嫁父强取之歸許邑人姚乙為妻史氏不聽姚訴之官被逮遂自縊死詔有司致祭其墓元雷沂妻蒙氏同州人沂殁於軍氏孀居三十年以節孝著聞至元中詔旌其門馬宅妻王氏朝邑人宅卒氏年十九守節不渝延祐元年旌又党通妻張氏任輝妻井氏皆蒲城人守節孝親撫孤成立并延祐五年旌孫謙妻陳氏韓城人生子景仁甫一歲而謙卒氏方十九守節不渝至元十六年旌明趙守曾妻惠氏同州人守曽死親老絶嗣叔翁促之嫁氏泣曰叔翁利吾田耳願田歸叔翁吾甘以手力養翁姑也後翁姑死氏葬以禮守節終身又董芳繼妻潘氏適芳時芳巳病篤潘年十五撫芳前妻子如己出有謀奪節者即引刀自裁又馬芳繼妻張氏夫亡苦節撫遺腹子成立張汝愚妻胡氏以苦節著任世威妻閻氏朝邑人世威死舅姑利富人資以計强載其家氏不勝憤以衾蒙面自刎死又王思謙妻楊氏孀居亦以舅姑逼嫁自縊又諸生何大慶者病革妻翟氏年十八先自經死李昆妻賀氏郃陽人夫亡誓不欲生翁姑以年老無依慰留氏袖刀至靈前割左耳以殉乃守志事親終身完節同縣甯洵妻范氏適甯未及成禮而甯卒亦剪髮明信姑婦相依苦節終身又党相妻李氏年十四守節夀至八十石愷妻蔡氏澄城人夫亡年十九生子甫六月事祖父母及孀姑李氏克盡孝養守節五十餘年成化時旌同縣梁孝恭妻王氏鄭伯玉妻王氏鄭炳妻孫氏關冕妻路氏馬鶚妻路氏均以苦節著又白麟繼妻張氏李朱藎妻呼氏皆夫亡殉節李子健妻東氏華州人歸健方九月而健卒遺腹生子守節撫孤又劉朝妻王氏李道妾陳氏王夢熊妻東氏郭承實妻杜氏均以苦節著又宋堯妻高氏適逵妻嚴氏東羣芳妻郭氏妾王氏曹士魁妻王氏郭宏祖妻東氏李鋐妾孫氏王氏均夫亡殉節王德懋妻李氏華隂人年十八夫亡斷髮自誓元季兵亂攜嗣子入華山張超谷以避難事定乃歸人欽其節姜溢妻趙氏蒲城人溢為山陽椽正德中賊陷山陽擊傷溢將掠趙去趙抱溢痛哭罵不絶口遂遇害許昌言妻楊氏白水人夫亡年二十一仲兄利其産氏坐卧佩刀以死自誓後撫孤成立年八十卒又奚洪斗妻李氏夫亡殉節郭恒妻楊氏潼關衞人萬厯初恒客遊湖南久父議納他聘女不可斷髮自守家有巖壁穴牆居之垂槖以通飲食厯二十六年恒歸乃成禮王璋女同州人名巧兒許字張氏子張死女父母往弔歸女巳自經於室訃於張遂合葬焉嘉靖中旌潘思忠妻王氏同州人甘貧守節歲大饑閉户餓死同時有王遷者以傭自給亦餓死其妻呉氏晝夜哭殉之又張思靜妾田氏亦夫亡殉節劉氏女朝邑人許字楊氏子楊死女哭欲往父母不許遂投繯死同縣李德澄女父死母不安其室女覺之大哭三日仰藥死時年十四又萬厯初有張世强女許字魏珠珠死女年十六誓以身殉家人防之乃佯飲食乘間自經邑令郜相建三烈祠並祀之韓繼宗妻雷氏朝邑人繼宗死繼姑暴虐以簪刺其股血淋漓又遭叔淩害晝夜痛哭終不易節同縣張三妻師氏韓邦仁妻許氏李芳春妻馬氏嗣子文郁妻馬氏韓日孜妻閻氏申養情妻楊氏党元第母張氏樊成芳妻趙氏李尚平妻張氏皆以苦節著又石捷妻張氏夫亡殉節羅詢妻党氏朝邑人嘉靖中大饑有盜劉曹邦等掠詢及富民數人於河濱殺之還刼詢室子亦遇害氏匿積草中得免出訴當道不為理因以豕穢汚口肩夫脛骨號冤道旁官乃為捕盜數十人盡置之法又楊專妻張氏歲大祲專與一子先斃氏走赴水見者止之氏曰我義不為乞故就溺耳從容結衣履而死曹氏女郃陽人名粉容未歸而壻死父母勸其改字遂投繯死王氏女郃陽人名田阿未婚而壻死斷髮毀容守貞不渝終其身又有王氏女字比村趙氏子臣兒臣兒死女請臨䘮括髪枕股而哭及笄而歸趙氏為臣兒立後養舅姑終身安尚起妻李氏郃陽人尚起商於河南病亡氏聞訃盡變産完夫所貸且置榜以待夫櫬歸跪告族黨曰煩舉二棺入地閉户將自縊鄰婦欲生之排闥曰爾尚有所逋何遽死氏啟户應曰然吾資巳盡奈何請復待一日乃紉履一雙往卑之曰得此足償矣歸家自縊死同縣李光被妻秦氏趙大彦妻魏氏李白妻張氏魏屏翰妻王氏雷一滋妻嚴氏雷起蛟妻趙氏田光謙妻秦氏侯三仕妻趙氏均夫亡殉節又呉文英妻孟氏以苦節