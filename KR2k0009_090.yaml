取上洛豪族泉杜二姓密應之仚掩襲二姓散走寳夤亦退遷東雍州刺史豪右無敢犯闔境清肅西魏時為洛州刺史封上洛郡公高敖曹攻逼州城仚拒守旬餘矢盡援絶城陷被執尋卒於鄴泉元禮仚長子少有志氣好弓馬賜爵臨洮縣伯散騎常侍當洛州䧟時與仚俱被執而東元禮於路逃歸潛與豪右結託遂率鄉人襲州城斬東魏所授刺史杜窋朝廷嘉之代襲洛州刺史從周交戰於沙苑中流矢卒泉仲遵一名恭仚次子少謹實涉獵經史長有武藝高敖曹攻洛州與父力戰拒守矢盡以棒杖扞之爲流矢中目不堪復戰及城陷士卒嘆曰若二郎不傷豈至於此後與兄元禮斬杜窋元禮殁代爲洛州刺史大統十三年行荆州刺史事梁司州刺史柳仲禮爲邊患仲遵率鄉兵擊獲之進本州大中正南洛州刺史留情撫綏百姓安之襲爵上洛郡公復爲荆州刺史卒仲遵有方雅之操厯官皆以清白見稱明張鵬洛南人永樂中爲監察御史厯廣西按察使山東左布政使爲人寛厚練達所在著稱南鏜商州人成化中進士厯河南布政使以忤劉瑾繫錦衣獄幾死陞南太僕卿復以忤瑾放歸瑾敗屢薦不起布衣蔬食如窮居時本朝荀復山陽諸生明末流寇陷商州父日躋罵賊遇害復遍覓父屍歸葬甫及壙遇賊數十突至復守父棺不去賊問其故曰欲與父同死耳賊感其孝呼衆賊助葬且令急走遂得免劉緒岱山陽歲貢生父必達知汾陽縣爲流賊所殺緒岱求遺骸不獲痛哭而歸賊平徒步抵汾陽遍求不得怱一老人云迤西關忠義廟後有一棺盍驗之啓視果其父也觀者皆嘆息遂更殮歸葬同縣諸生蔡光先七歳䘮母厯事四後母皆盡孝撫幼弟極友愛云王孝風鎮安人流賊至與族弟攜家避亂事急弟棄其母負妻去孝風獨棄妻子負母逃匿亂定奉母歸妻子亦無恙而族弟與妻皆為賊所殺同縣陳國柱家貧投充士伍目不知書而事親盡孝又孟三光少孤家極貧事母甘㫖無缺母失明扶掖不離左右年踰四十母怒輒長跪受杖又有曹亨者年十一母死不能具棺號泣於路鬻身以殮鄉里皆稱之陳顯耀山陽役徒也順治三年流寇劉二虎犯山陽知縣趙廷臣晝夜固守率數十騎出偵賊猝遇賊衆從者皆竄避顯耀獨挺戈捍衛賊刺傷廷臣奪其馬更刺之顯耀奮救得免負匿榛莽閒褁其創視賊去且盡大呼追刺一賊墜地因奪馬扶廷臣急馳歸後廷臣官浙閩總督招之竟不往周蒲璧商州人康熙中舉鄉試第一成進士改庶吉士授檢討以母老不能迎養告歸侍飲食湯藥惟謹兩女弟家貧賙䘏倍至視從兄弟如兄弟舉族人之方正者爲族長敎子弟多所成就居平慎言笑嚴取與讀書樂善泊如也王官商南人至性純篤毅然有以自持處家庭從容和順六世同居人稱孝友乾隆五年旌流寓漢四皓東園公甪里先生綺里季夏黃公皆河内軹人秦始皇時共入商雒隱地胏山唐賈島范陽人由渭南主簿遷藍田令後隱豐陽之西鄙雲蓋寺注水經寺在鎮安境宋張舜民邠州人徽宗時以龍圖閣待制知同川坐元祐黨謫楚州團練副使商州安置列女明敬珖妻任氏商州人年十七夫亡苦節天順中旌同州王英妻姚氏王登妻岳氏南伯謙妻周氏雷始奮妻孔氏閻公述妻南氏葉御邦妻任氏任引妻南氏俱年末逾二十以貞節著又薛厚倫妻南氏夫亡殉節劉邦敎女商州人許字張緡夀緡夀死女年十五臨柩慟哭父母促之歸不食而死遂合葬焉張鏜妻解氏鎮安人夫亡守節嘉靖年閒旌同縣姚某妻景氏以節著又朱紹孔女許字謝姓未婚夫殁投江死李翠妻劉氏雒南人年二十三夫亡舅姑欲奪其志劉自經死嘉靖閒旌同縣某妻翟氏趙國寶妻石氏均夫亡殉節趙進孝妻李氏年十九夫亡以苦節著南應旌女商州人許字山陽劉光光死女年十五詣夫家服衰絰行婦禮久之舅姑與其父母謀為别嫁女割耳斷鼻獨處一室萬厯中表其門江蘭妻李氏商南人蘭卒李號哭不已至葬前一日服毒死吕元聲母東氏商州人崇禎末流賊陷城東與元聲妻薛氏自刎又南士程妻程氏被執賊殺其姑與夫而欲納之程慟自刎李從文妻王氏夫婦同被執賊欲汚之王目夫使逃遂自殺商雒守備朱從鎮妻李氏孔綱妻吕氏楊育桂妻杜氏閻調璽妻呉氏俱抗節死邵公正妻王氏年二十夫卒守節十年流賊陷城自刎未死賊舁之過泮池旁王奮起以頭觸石死姜騰鳳妻段氏孔維樸妻劉氏盧宜巍妻南氏王英妻姚氏周之瑾妻南氏南國禎妻王氏雷維元妻孔氏石中玉妻閻氏張希元妻姚氏皆早寡守節城陷俱不屈死牛紹玉妻盧氏牛振武妻王氏牛奇妻周氏周之珽妻牛氏程彤錫妻王氏楊育禎妻武氏陳宗器妻牛氏牛紹聞妻王氏白玉潔妻吕氏雷維垣妻邢氏張詣妻武氏侯維垣妻吕氏周天琬妻王氏牛維明妻南氏牛芳妻劉氏周志伊妻魚氏冀觀妻楊氏張耀明妻楊氏田應貢妻孟氏俱不屈死何克俊妻周氏雒南人崇禎末流寇入其室罵賊死又孫應錫妻盧氏自縊死史録妻王氏陶崇妻樊氏投潭中死邑吏王鳳鳴女年十五媳張氏年十七同匿賈村山中賊至俱墜崖死本朝楊用枅妻趙氏商州人年十九夫亡誓以身殉家人密防之得不死翁與父憐其年少無子勸改適即自髠其髪翁感泣為立姪嗣之守節五十七年卒羅立賢妻周氏家貧佐立賢讀書成進士立賢殁不食而死王正妻孔氏商州人幼讀孝經小學能通其義未嫁姑殁即不事膏沐年十七歸王二載夫亡有勸以改適者輒不食敎嗣子讀書成立苦節終身雍正七年旌劉瑞徵妻楊氏鎮安人與同縣齊扶上妻田氏並年三十守節撫孤以苦節著薛匡倫妻邵氏雒南人因避冦居商明末流賊陷城被執大罵賊則其足磔之時年二十八歲雍正六年旌牛廷琇妻唐氏商州人年二十三夫亡割耳守節孝事姑嫜撫育幼女苦節六十年乾隆二年旌同州邵重臣妻武