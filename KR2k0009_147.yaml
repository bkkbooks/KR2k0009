番界東北流會羅羅河入大渡河中産大魚故名大渡河在越巂廳北二百二十里源出吐蕃自鐵口野夷流入與雅州府清溪縣接界又東經鬼皮落野夷入峩眉縣界水勢浩大煙瘴特甚詳見雅州府孫水在西昌縣西十五里自冕寧縣北發源南經縣西又南經會理州西合若水一名長河又名安平河漢書地理志臺登縣孫水南至會無入若行七百五十里司馬相如傳橋孫水以通邛筰水經注孫水出臺登縣一名白沙江南流經邛都縣又南至會無入若水元和志長江水本名孫水出臺登縣西北胡浪山下明統志長河在寧番衛城東源出西番界南流會瀘水經建昌城西入金沙江舊志長河源出寧番衛北架州窩下東南流有蘇州小河源出架州西番山流入之又南流有南河在衛南二里源出凹烏西番山箐流入之又東流合呷瓜河太平橋河總名為安寧河入建昌衛界又南經德昌所東又經會川衛西至迷易所西南合打沖河溫水在西昌縣北水經注邛都縣有溫水冬夏常熱其源可燖雞豚浴者能治宿疾昔李驤敗李流於溫水是也元和志溫水出蘇祁縣東二十一里平地又溫湯水出西瀘縣四十二里山下明統志熱水池在都司城北七十里四時常熱流入越溪河合瀘水接金沙江舊志熱水在建昌衛北七十里源出熱水塘西流入安寧河三渡水在冕寧縣西南二百里源出番界南流至鹽源縣北界入打沖河水流湍急舟楫難施渡處有三故名若水在冕寧縣西源出西番流入縣西界折東流經西昌縣西南又轉南經鹽源縣東又南至會理州西合金沙江亦名瀘水俗名打沖河漢書地理志若水出旄牛徼外南至大筰入繩又司馬相如傳相如略定西南夷除邊關西至沫若水水經若水出旄牛徼外東南至故關為若水注山海經曰南海之內黑水之間有木名曰若木若水出焉沿流間關蜀土黃帝子昌意降居此水娶蜀山氏女生顓頊於若水之野若水東南流鮮水注之又南經越巂邛都縣西又南至會無縣孫水入之又南徑大筰縣入繩元和志瀘水在西瀘縣西一百十二里諸葛亮表曰五月渡瀘深入不毛謂此水也水峻急而多石土人以牛皮作船而渡一船勝七八人明統志打沖河在打沖千户所治西蠻名黑惠江又名納夷江源出吐蕃下流合金沙江舊志打沖河自西番界流入經鹽井衛東北一百六十里又東南經會川衛西一百五十里至三江口合金沙江其間兩山壁立水勢洶湧狼牙相距舟楫不通有索橋橫亙四十二丈自舊瀘州一帶駝運入衛路必經此邊陲之天險也按此水上流今名鴉龍江發源西番界巴延喀喇山西南流千餘里至鹽源縣西北有打沖小河自西流入焉自下始名打沖河折東流二百里又折南流三百餘里會金沙江自此以下今皆謂之金沙江又按水經注瀘水在朱提界武侯渡瀘在其地蓋即今之金沙江今打沖河在蜀西南徼非入滇必經之道自唐宋以來始專以若水為瀘水然元和志又云巂州西至東瀘水二百里南至瀘渡四百五十里蓋以若水在金沙江東北故别之為東瀘渡在二水合流之下是猶以金沙江為瀘水之正派也明通志以孫水為瀘水尤誤卑水在會理州東北華陽國志卑水孫水流通馬湖水經注水出卑水縣東流注馬湖江海子有二一在西昌縣十五里其水澄徹浩闊如海多産嘉魚一在鹽源縣西一百九十里步北澤在鹽源縣東漢書地理志定筰出鹽步北澤在南華陽國志定筰縣有鹽池北沙河是元和志昆明縣有鹽井在城中凡取鹽先積柴燒之以水澆灰即成里鹽舊志鹽井在鹽井衛治東有黑白二井通志今鹽源縣鹽井二設竈五十八荷花池在鹽源縣西南一百六十里黎溪驛北中有芰荷盛夏香來可以避瘴溫泉在冕寧縣東一百四十里四時溫暖可以療疾又有溫泉在越巂廳東二十里引流可以溉田元泉在會理州城東泉色稍黑灌溉山田民獲其利常以仲春祀之勝功泉在會理州西北五里自石竇中流出四時不涸聖泉在越巂廳北一百八十里河南站瀑布井在西昌縣南三十里自山頂流下狀如白練前提調官臣鄭紹謙恭纂輯提調官臣張日章恭覆輯前校對官臣顔以燠恭校校對官臣李孚忠恭覆校大清一統志寧遠府二古迹德昌廢府在西昌縣元置明廢元史地理志德昌路軍民府漢邛都縣地在建昌府南所居蠻號屈都至元九年內附十二年立定昌路以本部為昌州二十三年罷定昌路併入德昌路治本州葛路城明統志洪武中改德昌路為府二十五年廢府置德昌千户所屬建昌衛在衛南百四十里廢府在所南會理故州在今會理州東南元史地理志會川路會理州在路東南唐時南詔屬會川節度地名昔陀有蠻名阿壇絳亦仲由蒙之遺種其裔羅于則得昔陀地居之取祖名曰絳部後強盛盡有四州之地號蒙歪元憲宗八年內附隸閟畔萬户至元四年屬落蘭部十三年改隸會川路十五年置會理州仍隸會川二十七年復屬閟畔部舊志在衛東南二百里明初廢通志本朝康熙二十九年復分會川衛地置州於會通河西岸苦竹壩之地雍正六年移治會川廢里州在西昌縣東元史地理志建昌路領里州唐隸巂州都督蒙詔時落蘭部小酋阿都之裔居此因名阿都部至元十年效順隸烏蒙十八年設千户所二十三年升軍民總管府二十六年罷為州明統志州在都司城東三百里明初因之後廢廢闊州在西昌縣東南元史地理志建昌路領闊州治密納甸古無城邑烏蒙所居昔仲由蒙之裔孫名科居此因名為部號後訛為闊至僰羅內附至元九年設千戶二十六年改為州明統志州在都司城東南四百里明初因之後廢廢隆州在西昌縣東南與會理州接界元史地理志建昌路領隆州在路之西南與漢邛都縣接境唐會川之西北蒙氏改會川為會同邏立五瞼本州為邊府瞼其後瞼主揚大蘭於瞼北塏上立城曰大隆城即今州治也元至元十三年內附十四年設千户十七年改隆州威龍廢州在西昌縣東南元史地理志威龍州在德昌路西南夷名巴翠部領小部三一曰沙窩普宗二曰烏孫泥阻三曰媧諾龍菖蒲皆獹魯蠻種也至元十五年合三部立威龍州隸德昌明統志洪武中改為長官司在建昌衛東南四百十里廢昌州在西昌縣南元史地理志初烏蠻阿屈之裔寖強用祖名為屈部其孫烏則至元九年內附十二年改本部為州兼領普濟威龍隸定昌路二十三年罷定昌路并隸德昌路明統志洪武中改屬建昌衛又改州為長官司在衛南二百里按明史改長官司在永樂二年廢德州在西昌縣南元史地理志德昌路德州在路之北其地今名吾越甸城曰苴龍所居蠻苴郎以逺祖名部曰赬綖憲宗時內附至元十二年立千户十三年改為德州隸德平路二十三年改隸德昌舊志明初亦為德州後廢在德昌所西北境瀘水司十五里明統志謂在都司城西二十五里漢蘇示縣地誤普濟廢州在西昌縣西南元史地理志普濟州在德昌路西北夷名玗甸獹魯蠻世居之後屬屈部至元九年隨屈部內附十五年於玗甸立定昌路二十三年路革改隸德昌明統志洪武中改為長官司在建昌衛西南二百四十里廢蘇州今冕寧縣治明統志元置蘇州屬建昌路洪武初因之二十二年置蘇州衛二十七年改寧番衛屬行都司在司北一百九十里名勝志環而居者皆西番種故曰寧番東連越巂北通烏斯藏西鄰三渡月落口按元志佚此州廢薑州在會理州東南元史地理志建昌路領薑州薑者蠻名也烏蠻仲牟由之裔阿壇絳始居閟畔部其孫阿羅仕大理國主高泰是時會川有城曰龍納羅落蠻世居焉阿龍攻拔之遂以祖名曰絳部憲宗時隨閟畔內附至元九年隸會川後屬建昌十五年改為薑州二十七年復屬閟畔部又屬建昌舊志在會川衛東南九十里今為薑州堡黎溪廢州在會理州西南元史地理志會川路領黎溪州古無城邑蠻云黎彄訛為今名初烏蠻與漢人雜處及南詔閣羅鳳叛徙白蠻守之蒙氏終羅羅逐去白蠻段氏興令羅羅蠻乞夷據其地至元九年內附改其部為黎溪州明統志州在會川衛南一百五十里明初因之後廢永昌廢州在會理州西北元史地理志會川路領永昌州在路北治故歸依城即古會川也唐天寶末沒於南詔置會川總督至蒙氏改會同府置五瞼元憲宗九年內附至元十年改千戶十七年立永昌州明統志州在會川衛西北五里明初因之後廢麻龍廢州在會理州北元史地理志會川路領麻龍州麻龍者城名也地名棹羅能至元十二年屬會川十四年立千户隸會川路十七年立為州二十七年割屬閟畔部舊志麻龍亦曰麻若漢語黃土城也今有舊龍州在會川衛北十里越巂廢縣今西昌縣治元和志本漢邛都縣地周天和五年平越巂置西寧州治越巂縣元史地理志唐懿宗時蒙詔立城曰建昌府領建安永寧二州元至元九年平建蒂分建昌府為萬户二又置千户二十五年割建鄉城四村及建蒂四村立寶安州十六年分建昌為二州在城曰建安東郭曰永寧二十六年革寶安州以其鄉村屬建安州舊志明洪武二十五年改置建昌衛二十七年又置前衛萬厯三年併前衛入之廢中縣在西昌縣東元史地理志建昌路領中縣治在住頭回甸蓋越巂之東境也所居烏蠻自别為沙麻部以酋長所立處為中州至元九年內附十四年仍為中州二十二年降為縣明統志在都司城東四百里元置明初因之後廢又有廢北社縣在都司城東三百里元置屬建昌路明改為碧舍縣後廢邛都廢縣在西昌縣東南古西夷邛都國也史記西南夷傳自滇以北君長以什數邛都最大漢書司馬相如傳唐蒙已略通夜郎時邛筰之君長請吏比南夷帝問相如相如曰邛筰冉駹者近蜀道易通異時嘗通為郡縣矣至漢興而罷今誠復通為置縣愈於南夷帝乃拜相如為中郎將使略定西南夷邛筰冉駹斯榆之君皆請為臣妾除邊關關益斥西至沫若水南至牂柯為徼通靈山道橋孫水通邛笮又西南夷傳相如既往諭為置一都尉十餘縣屬蜀數歲罷元狩元年又令王然于等間出西南夷求身毒道及且蘭君反乃發兵誅且蘭邛君以邛都為越巂郡後漢書西南夷傳更始二年邛人長貴攻殺郡守枚根自立為邛榖王又降於公孫述建武十四年遣使上計授越巂太守十九年劉尚擊益州夷路由越巂長貴欲襲擊尚尚即分兵先據邛都掩長貴誅之華陽國志邛之初有七部後為七部營軍後又有四部斯叟章懷太子後漢書注邛都故城在今越巂縣東南西瀘廢縣在西昌縣西南元和志縣東北至州二十七里本漢邛東縣地周天和二年於此置本可縣天寶元年改名有薑磨戌在縣西南三里舊唐書地理志西瀘梁置可縣隋治薑磨戍武德七年移於今理後陷於南詔元史地理志建昌路領瀘州在路西昔名沙城瞼即武侯擒孟獲之地至段氏時於熟水甸立城名洟籠隸建昌至元十五年改洟籠為瀘州明統志廢瀘州在都司城西南二十五里元置明初因之後廢按瀘州道里與元和志西瀘至州道里正合即古西瀘也又按隋志越巂郡領可泉縣舊置宣化郡開皇初郡廢元和志作本可舊唐志作可縣蓋即可泉之訛蘇示廢縣在西昌縣北漢置屬越巂郡後漢因之亦曰蘇祁西南夷傳永平末有蘇祁叟二百餘人送太守張翕喪蜀志蘇祁邑君冬逢叛張嶷討誅之皆即此華陽國志云晉省劉宋復置曰蘇祁蕭齊又省後周復置隋曰蘇祇唐仍曰蘇祁屬巂州後陷南詔遂廢隋書地理志越巂郡蘇祇縣舊置亮善郡開皇初郡廢元和志縣東南至巂州八十里本漢舊縣後陷夷獠周武帝復置屬嚴州開皇初改屬巂州唐書地理志自臺登城九十里至蘇祁縣又南八十里至巂州元史地理志建昌路領禮州在路西北瀘沽水東所治曰籠麼