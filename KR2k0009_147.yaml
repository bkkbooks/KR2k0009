免代編沔陽江夏銀米邑人德之性伉直不媚上官厯遷巡道卒祀鄉賢祠京黎州守禦所千户崇楨甲申張獻忠亂蜀川南道胡恆檄建昌指揮丁應選與守備楊啓泰入援至黎州所官沈雲龍阻之京及弟亭通使白某子寰翠千户李華宇等招集萬餘衆至雅州八步石龍觀山對岸與賊力戰殺賊數千復雅州苦戰三載後劉文秀寇黎州華宇及白氏父子戰敗被磔馬京兄弟死之無一降者京亭華宇白父子五人皆黎州人本朝乾隆四十一年並豫入忠義祠啓泰名山人以老病卒於軍楊之明天全人以招討拒賊孫可望於雅州飛仙關兵敗被執不屈死本朝乾隆四十一年賜諡烈愍傅元修雅州諸生獻賊之亂元修與同州諸生洪其仁內江員外郎范文光等舉義兵推黎州參將曹勛為副總兵統諸將敗賊於小關山龍觀山等處勛黎州人襲指揮本朝魏攀龍雅安人官外委乾隆三十六年從征金川陳亡恤廕如例陳定國蘆山人平番營都司乾隆三十七年從征金川陳亡恤廕如例又同縣把總李德於五十七年從征廓爾喀陳亡把從剿苗匪總樊啓閶於六十年陳亡恤廕均如例張芝元清溪人乾隆三十八年以千總隨征金川有功賜札敦巴圖魯名號擢越巂營參將四十五年從討三暗巴番芝元乘賊不備從山巔疾馳下縱火焚二十四碉賊降晉副將五十二年調平臺灣逆匪林爽文等畫像紫光閣升松潘鎮總兵五十六年征廓爾喀芝元率屯練深入抵堆補木賊懼乞降芝元觸瘴癘回至濟嚨卒論功復畫像紫光閣巴利巴塘土千總乾隆中從征金川陳亡恤廕如例又大寺寨土千總桑共土把總阿邦木坪土守備楊在朝徐元昆土千總朗扎什俱隨征金川陳亡恤廕均如例唐玉龍雅安人官守備嘉慶三年從剿教匪追賊積年屢擒賊目洊擢參將六年六月追擊賊匪被圍手刃數十人力竭陳亡恤廕如例同縣外委楊學上張營升於元年從剿教匪陳亡守備張希儒於八年從征維西猓夷陳亡恤廕均如例劉富榮經人官外委嘉慶初從剿教匪陳亡恤廕如例張瑶蘆山人官千總嘉慶初從剿教匪陳亡恤廕知例克底巴底土守備嘉慶初從剿苗匪陳亡恤廕如例又土把總雜卡雜等三人巴旺王把總容依等三人均隨剿苗陳亡恤廕均如匪例列女宋張祺妻史氏眉山人適雅州張祺博學能文性沖淡不事鉛飾與祺唱酬目為和鳴集善用秃筆字體莊徑祺卒果州參軍任史以詩禮教子協祺於黃庭堅為外兄山谷緑菜贊稱女博史為士明廖武妻田氏雅州人武卒無子守節事姑以終同州楊倫妻薑氏宋鑾妻馮氏髙松妻楊氏王佐妻薑氏高昂妻王氏陳三才妻梁氏均夫殁守節張斐妻馮氏蘆山人斐卒馮年二十八苦節至九十三歲終同縣李應陽妻楊氏夫殁守節劉東陽繼妻高氏榮經人東陽官上海縣丞與倭冦戰殁高年十九尋尸歸葬守節至七十八歲亟憐黃少卒同縣王心妾黃氏心官饒州通判疾令改適不從扶櫬歸毁容明志以節終又王信賢妻伍氏周應詔妻王氏嶽遂妻黃氏張廷臣繼妻李氏均夫殁守節曹學瑋妻王氏黎州人與同所張廷臣妻唐氏均夫殁守節楊成名妻張氏雅州人明末寇亂被執扶之行佯曰須刀削竹以扶賊授以刀遂自刎時尚乳數月于也本朝彭映妻楊氏雅安人年十六適映匝月朠卒自縊柩前翁姑救免苦節以終李鳳翥妻楊氏雅安人夫亡矢死絶粒父諭以親老子幼乃復食孝養舅姑姑嬰篤疾刲股以進撫二子成名張翀妻葉氏雅安人年十八守節事舅姑孝撫子成立康熙年間旌王偉妻賈氏天全人偉從征土寇陳亡氏年二十四苦節不渝撫子成立八十五歲卒劉淑修妻高氏天全人年二十餘夫卒遺孤襁褓夫弟利其田産迫令改適氏截髮毁容以守夫弟私賣其業氏力田作苦卒無異志程門偉妻韓氏蘆山人夫亡守節雍正年間旌胡來麟妻張氏雅安人夫亡守節同縣節婦徐鵬翔妻趙氏蔣奇文妻袁氏范成鈺妻蕭氏烈婦黃某妻羅氏均乾隆年間旌馬亨元妻陳氏名山人夫亡守節同縣節婦王建侯妻張氏羅炳妻楊氏穆世模妻高氏烈女羅氏均乾隆年間旌黃庭訓妻劉氏榮經人夫亡守節同縣烈婦諸葛玉相妻張氏劉貴義妻王氏均乾隆年間旌衛長卿妻淩氏蘆山人夫亡守節乾隆年間旌羅紳妻苟氏天全人夫亡守節同州節婦高京琦妻彭氏楊昌文妻張氏趙振業妻任氏均乾隆年間旌曹玕妻李氏清溪人年十八玕卒無子誓不他適依母紡績終其身同縣烈婦白瑞彩妻李氏均乾隆年間旌王瑜廷妻李氏雅安人夫亡守節同縣節婦王萬盈妻朱氏劉某妻鄧氏烈婦李春盛妻范氏雷某妻王氏均嘉慶年間旌胡廷宇妻王氏名山人夫亡守節同縣節婦文寬妻柏氏朱孔章妻李氏胡定禮妻趙氏烈婦彭學珍妻楊氏閔伸妻王氏辛萬品妻李氏鄭守學妻閔氏鄭某妻陳氏烈女李三姑均嘉慶年間旌劉以剛妻楊氏天全人夫亡守節同州節婦高翠妻牟氏高振妻鮮氏烈婦楊均仁妻王氏均嘉慶年間旌蔡某妻孫氏清溪人守正捐軀嘉慶年間旌仙釋唐黃觀福百丈縣民家女幼好清靜食柏葉飲水及笄將嫁投水化去一日下其庭中曰女本上清仙人也今年此地疫請父母移家益山以避凶歲留金數餅而去其歲果疫毒唐麟德年也五代僧知廣居雅州開元寺善救病以竹片為板按痛處抶之無不應手而愈攣者就伸跛者即行時號聖僧土産金元和志雅州貢麩金寰宇記浮圖水出金綿元和志雅州賦絺元和志雅州賦紙寰宇記雅州産蠲紙卭竹元和志卭來山竹高節實中堪為杖落雁木元和志邪州貢茶元和志蒙山每歲貢茶為蜀之最寰宇記出百丈山尤佳方輿勝覽蒙山有五頂前一峯最高曰上清峯産甘露茶明統志蒙頂茶受陽氣之全故芳香李時珍本草綱目雅州之蒙頂石花露芽穀芽為第一藥寰宇記雅州産黃連升麻明統志黎州産牛黃麝香天南星椒元和志雅州貢椒宋史地理志黎州貢紅椒明統志雅州貢花椒石菖蒲寰宇記雅州土産娑羅花明統志出瓦屋山五色如爛錦照映山谷移之他處即枯魶魚明統志魶魚出榮經水及西山有足能緣木天旱輒含水上山以草覆身張口露水鳥來飲水因吸食之前提調官臣鄭紹謙恭纂輯提調官臣張日章恭覆輯前校對官臣葉克昌恭校校對官臣李孚忠恭覆校
