body:
  text: 江蘇省江寕府為省㑹在京師南二千四百里東西距九百五十里南北距一千一百三十里東至太倉州海岸七百七十里西至安徽和州界一百八十里南至浙江嘉興府嘉興縣界四百七十里北至山東沂州府郯城縣界六百六十里東南至松江府金山縣海岸九百三十里西南至浙江湖州府長興縣界四百八十里東北至山東沂州府日照縣界八百三十里西北至河南歸德府虞城縣界九百四十里分野天文斗牛女分野星紀之次兼魯地奎婁分野降婁之次今淮安府之清河安東桃源徐州府之邳州宿遷睢寕及海州是宋地氏房心分野大火之次今徐州府之銅山蕭縣碭山豐縣沛縣是建置沿革禹貢揚州及徐豫二州之域禹貢淮海惟揚州孔安國傳揚州北據淮南距海按經云東漸於海則青徐揚之海皆主東言通典云揚州北距淮東南距海今境内淮以南皆揚州之地惟徐州府之邳州宿遷睢寕及海州淮安府之清河安東桃源為古徐州域徐州府之銅山蕭縣碭山豐縣沛縣為豫州之域春秋時分屬吳楚亦兼魯宋之疆邳泗以北屬魯徐州屬宋後越滅呉并其地戰國時為楚地秦置㑹稽鄣諸郡漢初置吳楚二國秦置㑹稽郡後漢分置吳郡治吳今蘇州府吳國今揚州府楚國今徐州府元封五年置十三部刺史分屬揚徐二州漢置揚州領郡國七丹陽㑹稽二郡屬之徐州楚國屬之後漢因之改徐州之楚國為彭城國為州治増置下邳國三國時揚州屬呉吳都建業置揚州領丹陽吳郡徐州屬魏徐州治彭城國兼領沛國梁國下邳國晉亦為揚平吳後治建鄴領丹陽吳郡増置毘陵郡惠帝増置義興郡徐治彭城國領下邳國東海廣陵臨淮郡二州東晉都建康揚州遂爲王畿徐州増置山陽郡義熙中僑置徐兗二州於江淮閒劉宋仍爲揚領丹陽呉等郡徐領彭城下邳南蘭陵等郡二州改晉之僑州曰南徐領南東海南琅邪晉陵義興等郡南兗領廣陵海陵山陽等郡二州蕭齊及梁初仍爲揚徐南徐南兗州天監中增東徐州晉泰始中徐州入魏改爲東徐州尋廢天監初復置梁中大通五年又改魏東徐州爲武州而淮表屬魏魏延興𥘉置南徐州太和十九年置南兗州武定七年置東楚州宿豫郡復梁武州爲東徐州大寶以後江北盡入於高齊先有南徐東徐南兗改東楚州曰東徐州復東徐州曰武州復雎州曰潼州天保二年克廣陵改東廣州陳承梁緒僅保江南亦置揚州南徐等州禎明初増置吳州而江淮地屬齊旋屬後周大象元年取陳南北兗州改武州曰邳州南兗州曰吳州隋開皇九年平陳置揚州徐州總管府大業初改為丹陽江都毘陵呉郡以上屬揚州彭城東海下邳等郡以上屬徐州唐武德𥘉復改諸郡為州貞觀初分屬江南及淮南道開元二十一年又分江南為東西道淮南道採訪使治揚州領揚楚等州江南東道採訪使治蘇州領潤昇常蘇四州昭宗時為楊行密所據五代時楊隆演建吳國都廣陵李昪代之是為南唐都建康増置泰州惟吳郡屬於吳越錢氏周顯德五年克淮南十四州以江為界又増置通州宋開寳八年平南唐分江南淮南二路及分屬兩浙路熙寕中分江南為東西二路淮南為東西二路亦分屬為浙西路江寕府屬江南東路淮安州清河軍海州真州高郵軍泰州通州屬淮南東路常州江陰軍鎮江府平江府屬浙西路元分屬河南江浙行中書省揚州淮安二路高郵一府徐邳二州屬河南江北行省平江常州鎮江集慶四路松江一府屬江浙行省至元二十三年自杭州移江南諸道行御史臺於集慶路明𥘉定鼎建康改集慶路曰應天府建為京師嘗置江南行省旋罷永樂二年改建北京以為行在正統六年定北京為京師以應天府為南京直隸府六蘇州松江常州鎮江揚州淮安州一徐州本朝改置江南省治江寕府順治十八年分屬左右布政使司淮安揚州二府徐州一州屬左布政使司江寕蘇州松江常州鎮江五府屬右布政使司康熙六年改為江蘇省領江寕蘇州松江常州鎮江淮安揚州七府徐州一州雍正二年升蘇州府屬之太倉州淮安府屬之海州揚州府屬之通州為直隸州十一年升徐州為府乾隆三十二年以通州及崇明縣沙地析置海門直隸廳領府八直隸州三直隸廳一江寕府蘇州府松江府常州府鎮江府淮安府揚州府徐州府太倉直隸州海州直隸州通州直隸州海門直隸廳形勢東濱海自海州東北接山東日照縣界南至松江府東南接浙江海鹽縣界中閒迴環所及濱海幾一千二百里而淮安府之安東為河准入海之口通州之海門為大江入海之口太倉州之崇明則孤懸海中為江口扞蔽南據五湖即太湖也與浙江湖州府分界西接梁楚自徐州府亳州以西為河南歸德府故梁地自潁州府以西為河南汝南府故楚地北有淮甸徐邳之境跨淮北上接山東其名山則有鍾山在江寕府東北唐六典江南道名山曰蔣山朱子曰天下山皆發源於岷山鍾山實其脈之盡者攝山在江寕府東北輿地志云山多藥草可以攝生雞鳴在江寕府西北本名雞籠山樂史太平寰宇記西接落星岡北臨棲元塘牛首在江寕府南李吉甫元和郡縣志山有二峯東西相對名曰雙闕亦曰牛頭山北固在鎮江府北下臨長江其勢險固實為京口壯觀焦山在鎮江府東九里大江中通無丹徒縣有京口譙山戍一名樵山金山在鎮江府西北七里大江中與焦山對峙相距十里許世稱金焦北固為京口三山云惠山在常州府西通志古名華山又曰西神山下有慧山寺第二泉在焉靈巖在蘇州府西寰宇記山西有石鼔亦名石鼔山其大川則有大江自江西彭澤縣流入東北逕江寕縣西江浦縣東上元縣北六合縣東又東逕句容縣北儀徴縣南又東逕丹徒縣北江都縣南又東逕丹徒縣北泰州南武進縣北又東南逕江陰縣北泰興縣靖江縣如皋縣南又東