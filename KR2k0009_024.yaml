今徐州刺史高明應甚少脫爲李納所并以梗餉路是失江淮也請以建封代之益與濠泗二州由是徐復爲雄鎮李吉甫贊皇人元和中爲淮南節度使奏蠲逋賦數百萬築富人困本二塘溉田萬頃漕渠不能居水乃築隄蓄洩李德裕贊皇人憲宗時爲浙西觀察使初潤州王國清亂貲用空殫德裕自儉約以留州財贍軍再期賦物儲牣南方信禨巫雖父母癘疾子棄不敢養德裕諭以孝慈大倫敕違約者顯置以法數年惡俗大變又按屬州非經祠者毁千餘所撤私邑山房千四百舍寇無所廋蔽敬宗立詔浙西上脂盝糚具又詔索盤縧繚綾千匹德裕皆上奏力言開成初復起爲浙西觀察使德裕三在浙西出入十年遷淮南節度使崔從齊州人敬宗時爲淮南節度使蠲除苛政及卒下有刲股以祭者李珏趙郡人宣宗時拜淮南節度使江淮旱發倉賑民以軍羨儲粟半價糶之卒於鎮淮南之人德之宋許驤睢陽人宋太宗時改江南轉運副使洪吉上供運船水損物主吏懼罪故覆舟鞫獄者按以欺盜當流死者數百人驤訽得其實多獲輕典優詔襃之又上言刧盜配流遇赦得原還本鄉讎告捕者多所殺害請以隸軍詔可楊允恭綿竹人太宗時縁江多賊命督江南水運因捕寇黨行及臨江軍擇驍卒拏輕舟伺下江賊所止悉梟其首又趨通州境上躡海賊賊赴水死者大半自是江路無剽掠之患任中正濟陰人太宗時爲江南轉運副使至部歲大稔民出租賦平糴皆盈羨發運使欲悉調餉京師中正曰東南歲輸五百餘萬而江南所出過半今嵗有餘或歲稍歉則數不登患及吾民矣乃止向敏中開封人太宗時爲淮南轉運副使時領外計者皆以權寵自尊所至畏憚敏中不尚威察待僚屬有禮勤於勸勗職務修舉喬維岳南頓人太宗時爲淮南轉運使淮河西流三十里曰山陽灣水勢湍悍運舟多罹覆溺維岳䂓度開故沙河自末口至磨盤口凡四十里又建安北至淮澨總五堰又命剏二斗門於西河第三堰覆以厦屋設縣門積水俟潮平乃泄之建横橋岸上累石以牢其址自是運舟往來無滯胡則永康人太宗時提舉江南路鑄錢監得吏所匿銅數萬斤吏懼且死則曰馬伏波哀重囚而釋之吾豈重貨而輕數人之生乎籍為羡餘不之罪王嗣宗汾州人至道中為淮南轉運使揚楚閒有窄家神廟民有疾不服藥但謁致祀以邀福嗣宗撤其廟選名方刻石州門自是民風稍變初漕運經泗州浮橋舟多覆壞嗣宗徙置城隅遂獲安濟夏侯嶠鉅野人咸平中為江南巡撫使所過疏理刑訟存問耆老務從寛簡人以為便使還采病民二十餘事上之亟詔釐革黃震浦城人真宗時為江淮發運使先是李溥自三司小吏為發運使十餘年姦贓狼籍丁謂黨之無敢言者震既至發溥姦贓數十事溥坐廢趙賀封邱人真宗時為江淮制置發運使籍諸州物產厚薄分劇易為三等視其功過自裁定吏巧不得施蘇州太湖塘岸壞及並海支渠多湮廢水浸民田賀伐石築隄浚積潦自呉江東赴海流民歸者二萬六千户歲出苗租三十萬任布河南人真宗時擢江淮制置發運使前使者多聚山海珍異之物以餉權要布一切罷去張綸汝陰人真宗時除江淮發運副使時鹽課大虧奏除通泰楚三州鹽户宿負官助其器用鹽入優與之直歲増課數十萬復置鹽場於杭秀海三州嵗課又百五十萬疏五渠導太湖入海又築漕河隄二百里於高郵以洩横流泰州有捍海堰綸修復之見漕卒凍餓道死者曰此有司之過推俸錢市絮襦衣其不能自存者薛奎正平人真宗時遷江淮制置發運使疏漕河廢三堰以便餉運王隨河南人真宗時遷淮南轉運使歲比饑隨敕屬部出庫錢貸民市種糧約歲終輸絹以償流傭多復業徐起鄄城人真宗時爲江東轉運使請開長淮舊浦以便漕運李防内黃人景德中爲江南轉運使淮南舊不禁鹽制置使請禁鹽而官自鬻之使兵夫輦載江上多漂失之患防請令商人入錢帛京師而給以鹽則公私皆利後采用之吳遵路丹陽人仁宗時爲淮南轉運副使兼江淮發運司事嘗於真楚泰州高郵軍置斗門十九以蓄泄水利廣屬郡常平倉儲二百萬以待凶歲後皆便之許元宣城人慶厯中擢江淮制置發運判官時江淮歲漕不給京師乏軍儲元至悉發瀕江州縣藏粟所在留三月食逺近以次相補引千餘艘轉漕而西未幾京師足食朝廷以爲任職就遷副使范仲淹吳縣人仁宗時歲大蝗旱江准京東滋甚命仲淹按撫江淮所至開倉賑之且禁民淫祀奏蠲廬舒折役茶江東丁口鹽錢條上救敝十餘事方偕莆田人爲江南按撫三司歲出乳香綿綺下州郡配民偕奏罷之龔鼎臣須城人仁宗時淮南災以鼎臣體量安撫蠲賦賑貸全活甚衆韓絳雍邱人仁宗時江南饑爲體量安撫使行便民事數十條李繹萬年人仁宗時爲江淮制置發運使内出絹五十萬匹責貿於東南繹曰百姓饑不宜重優奏罷之徐的建安人仁宗時爲江淮制置發運副使奏通泰州海安如皋漕河詔未下的以便宜調兵夫濬治之出滯鹽三百萬斛得錢八百萬緡遂爲制置發運使王鼎館陶人爲淮南兩浙荆湖制置發運副使前使者多漁市南物持遺權貴鼎一無所市獨悉意吏事凡調發綱吏度漕路遠近定先後爲成法於是勞逸均吏不能爲重輕蔣堂宜興人爲淮南轉運使兼江淮發運使歲薦部吏二百人曰十得二三亦足報國後為江淮制置發運使先是發運使上計造大舟數十載江湖物入遺京師權貴堂曰吾豈為此歲入自可附驛奏也前後五年未嘗一至京師張瓌全椒人為淮南轉運使三司下諸道責羨財淮南獨上金九錢三司使怒移文誚責瓌以賦數民貧對楊察合肥人仁宗時厯江南東路轉運使屬吏以察年少易之及行部數摘姦隱衆始畏伏察在部專以舉官為急務人或議之察曰此按察職也苟掎拾羨餘則俗吏之為何必我哉齊廓㑹稽人為江淮西南轉運使時初兼按察奉使者競為苛刻邀聲名獨廓奉法如平時人以為長厚王素莘縣人仁宗時為淮南郡轉運按察使時新置按察類多以苛為明素獨不摘細故即有貪刻必繩治窮竟吏愛而畏之沈立厯陽人為江淮發運使居職辦治楊綋浦城人為江東轉運按察使江東饑綋開義倉賑之吏持不可綋曰義倉為民而設稍稽人將殍矣張景憲河南人任淮南轉運副使山陽令鄭昉贓累巨萬親戚多要人景憲首案治流之嶺外貪吏望風引去張洞祥符人英宗時為淮南轉運使淮南地不宜麥民艱於所輸洞命輸錢官為糴麥不踰時而足羅拯祥符人為江淮發運副使江淮故無􅍬倉漕舟擊岸下俟糴入乃得行蓋官吏以淮南不受陳粟為逃譴計拯始請凡未至而不可上供者以廩軍又貯浙西米於潤倉以時運自是漕増而費省馬仲甫廬江人為淮南轉運使真揚諸州地狹出米少官糴之多價常踴登濱江米狼戾而農無所售仲甫請移糴以紓其患兩益於民從之又建議鑿洪澤渠六十里漕者便之蔣之奇宜興人為淮東轉運副使歲惡民流之奇募使修水利以食流者如揚之天長三十六陂宿之臨渙横斜三溝尤其大也用工至百萬溉田九千頃活民八萬四千後擢江淮荆浙發運副使鑿龜山左肘至洪澤為新河以避淮險自是無覆溺之患凡所經度皆為故事薛向萬泉人神宗時為江浙荆淮發運使綱舟厯嵗久篙工利於盜貨常假風水沈溺以滅迹向募客舟分載以相督察王宗望固始人哲宗時為江淮發運使楚州沿淮至漣州風濤險舟多溺議者謂開支氏渠引水入運河歲久不決宗望始成之為公私利毛漸江山人哲宗時為江東兩浙轉運副使浙部水溢漸案錢氏有國時故事起長安堰至鹽官徹清水浦入於海開無錫武進常熟諸河入大江又開崑山諸浦東北道吳江開大盈顧匯柘湖下金山小官浦以入海自是水不為患沈遘臨江人徽宗時為淮南發運使朝廷方督綱餉運渠壅澀遘使決吕城陳公兩塘達於渠漕路始通而朱勔花石綱塞道官舟不得行遘捕繫其人上書自劾帝為黥勔人張根德興人徽宗時為淮南轉運使根以水災多乞蠲租賦散洛口米常平青苗米以貸流民詔襃諭之章縡浦城人提點淮南東路刑獄新鈔發行舊鈔盡廢一時商賈束手或自殺縡得訴者所持舊鈔為錢以千計者三十萬上疏言鈔法誤民請如約以示大信帝怒罷之韓宗武雍邱人徽宗時為淮南轉運判官前使者貸上供錢禁庭遣使來索宗武奏其狀詞極鯁切坐貶秩罷歸向子諲臨江人宣和初除江淮發運使主管文字淮南仍歲旱漕不通有欲濬河與江淮平者内侍主其議發運使檄子諲行子諲言決不可請復舊制嚴禁約則無患使者用其言漕復通張大經南城人紹興中提點江東刑獄他路有巨豪犯法歲久不決命移屬大經豪挾權勢求脫大經卒正其罪葉夢得吳縣人紹興初為江東安撫大使知建康兼壽春等六州宣撫使時建康兵不滿三千夢得遣將分屯要害劉豫兵入寇夢得諭降其將八年除安撫制置大使建康留守奏防江措畫八事金兵至拓臯夢得團結民兵分據江津金兵不得渡而去夢得兼總四路漕計以給饋餉軍用不乏尤袤無錫人紹興中提舉江東常平江東旱單車行部覈一路常平米通融有無以之賬貸推行朱子所講荒政於諸郡民無流殍洪适番昜人提舉江東路常平茶鹽首言役法不均之弊㑹完顔亮來侵上親征适覲金陵言本路旱百姓逐食於淮復遭金兵今各懷歸而田產為官鬻請聽其贖劉錡德順軍人紹興三十一年金主亮自將南來以錡為江淮浙西制置使引兵屯揚州建大將旗鼓軍容甚肅金萬户高景山攻揚州錡遣員琦拒於皂角林大敗之斬景山楊存中崞縣人隆興中金人攻淮甸詔存中都督江淮事時諸將各守分地不相統一存中集諸將調護之於是始更相為援帝親札賜之曰諸帥協和互相䇿應卿之力也㑹金兵已深入朝廷欲舍淮保江存中持不可乃已鄭興裔開封人為江東路鈐轄乾道𥘉建康留司請治行宫備巡幸興裔奏勞人費財乞罷其役韓彥直延安人乾道中總領淮東軍馬錢糧㑹大軍倉給糧徑乘小輿往察之給米不如數捕吏置於理初代者以乏興罷交承為緡錢僅二十萬明年奏計乃四倍岳珂湯陰人任江東轉運判官以所積經常錢糴米五萬石樁留江東九郡以時濟糴諸部皆蒙其利謝深甫臨海人孝宗時江東大旱擢為提舉常平講行救荒條目所全活百六十餘萬人楊萬里吉水人光宗時為江東轉運副使權總領淮西江東軍馬錢糧朝議欲行鐡錢於江南諸郡萬里疏其不便邱崈江陰軍人為江淮宣撫使時師潰崈奏泗洲孤立淮北所屯精兵幾二萬萬一金人南出清河口及犯天長等城則首尾中斷堕敵計矣莫若棄之還軍盱眙從之金人自渦口犯淮南或勸崈棄廬和州為守江計崈曰棄淮則與敵共長江之險矣吾當與淮南共存亡益増兵為防袁甫鄞人提舉江東常平適歲旱亟發庫庾之積凡州縣窠名隸倉司者無新舊皆住催遣官分行賑濟饑者予粟病者予藥尺籍之單弱者市民之失業者皆曲軫之提點本部刑獄行部問民疾苦薦循良劾姦貪決滯獄所至詣學宫講說前後持節江東五年所活不可勝計常楙理宗時監江淮茶鹽所蕪湖局不受商稅贏唐璘古田人理宗時為江東運判時邊事急置四察訪使就詔璘分建康太平池州江西檄當塗宿設戰具防采石撥和糴續生劵具奏捐總領所錢二十萬緡助江防聲大振耿世安為江東副總管兩淮都撥發官諜報元兵至世安迎至魚溝以三百騎入陣鏖擊自午至酉身𬒳七創猶追殺潰兵收兵還至數里殁趙淮衡山人為淮東轉運使德祐中戍銀樹壩兵敗被執阿珠使招李庭芝淮陽許諾至城下大呼曰李庭芝男子死耳母降也阿珠殺之棄尸江濱阿珠舊作阿术今改正元趙良弼女直人世祖南征召參議元帥事兼江淮安撫使親執桴鼓率先士卒五戰皆捷禁焚廬舍殺降民所至宣布恩德民皆安堵商琥濟陰人至元十四年拜江南行御史臺監察御史建康戍卒有利湯氏財者投戈於其家誣為反具琥知其冤罪誣者而釋之華亭蟠龍寺僧思月謀叛𬒳擒其黨縱火來刼民大擾琥亟誅其魁文法吏責琥擅誅中丞張雄飛曰江南殘毀之餘盜賊屢起顧尚循常例安用憲臺為哉薩里至元中奉使江南省風俗訪遺逸時行省理財方急賣所在學田以價輸官薩里曰學田所以供祭祀育人才也安可鬻遽止之還朝以聞帝嘉納焉薩里舊作撒里今改正瑠濟哩威至元中為江東道宣慰使在官務興學諸生有俊秀者拔而用之為政嚴明豪猾吏束手不敢犯然亦無所刑戮而治瑠濟哩威舊作立智理威今改正陳思濟柘城人至元中授兩淮都轉運使姦弊盡革商賈通行歲課以足趙宏偉甘陵人大德中遷江南行臺都事江南大饑宏偉請以贓罰錢賑之民賴以生伊克德伊爾丹大德中除江東建康道肅政廉訪使始視事見獄具陳列庭下甚備問之乃前官創置以待有罪者伊克德伊爾丹蹙然曰凡逮至臬司皆命官及有出身之吏廉得其情則將服罪獄具無庸施也即屏去之監憲一年贓吏削迹伊克德伊爾丹舊作奕赫抵雅爾丁今改正敬儼河東人至大元年擢江南諸道行御史臺治書侍御史以議立尚書省忤宰臣意適兩淮鹽法久滯乃遷轉運使欲以陷之比至首劾場官之貪汚者法既大行課復増益至二十五萬引河南行省參政來㑹鹽筴將以益數為歲入常額儼以亭户凋敝已甚以羨為額民力將殫病人以為己非宰臣事事遂止崔敬惠州人至正初遷江東廉訪使抑豪强惠下窮洗冤滯興學勸農百廢具舉福壽唐古特人至正十五年遷江南行臺御史大夫明兵圍集慶福壽數督兵出戰勢不能支城遂破百司皆奔潰福壽獨據胡牀坐鳳凰臺下指麾左右或勸之去叱之曰吾為國家重臣城存則生破則死尚安往哉亂兵四集遂遇害唐古特舊作唐兀今改正明陳瑄合肥人宣德中以平江伯充總兵都督䟽清江浦引水達淮開泰州白河通大江築高郵河隄隄内鑿渠互四十里淮濱作常盈倉貯江南輸稅鎮守淮安兼督漕運漕政益修漕渠在江淮間瑄功為大周忱言水人宣德五年始設巡撫官以忱為工部右侍郎巡撫江南奏減蘇州府田租七十二萬石他府亦以次減民得蘇息修吳淞江顧浦諸處水利至今賴之孫鼎廬陵人正統中督南畿學政教士以德行為本每學置本源錄錄諸生善行行部不使人知單輿猝至集諸生試之即日定其甲乙請託者無所容王竑河州人景奉時以右僉都御史總督漕運兼巡撫江北四府徐和滁三州時大水民饑道殣相望竑不待報開倉發賑家賦牛種復業者無算他境流移安輯者萬六百餘家病者給藥死者具槥鬻子女則贖而歸之還籍者與道里費由是人忘其饑李秉曹州人天順初以僉都御史巡撫蘇松歲饑發廪賑貸又請滸墅關稅悉徵米備荒内宫金保於淮安倉肆科索秉發其罪帝宥之令盡革其弊居職數載惠政大敷崔恭廣宗人天順初代李秉巡撫蘇松浚儀徵漕河及常鎮河避江險又大治吳淞江起崑山夏家口至上海白鶴江嘉定卞家渡迄於莊家涇凡浚萬四千二百餘丈又浚曹家港浦匯塘新涇諸水民賴其利蘇松旱饑奏蠲秋糧四十餘萬石民困以蘇陳選臨海人成化初以御史督學南畿患士習浮夸範以古禮嘗止宿學宫夜巡行兩廡察其誦讀諸生競勸文教大興王恕三原人成化中以右副都御史巡撫江南舊制應天鎮江太平寕國廣德官田徴半租民田全免其後民田悉歸豪右而官田累貧民恕乃減官田耗均之民田常州時有羨米奏以六萬餘石補夏稅又補他府户口鹽六百萬貫公私便焉水災奏免秋糧六百餘萬石周行賑貸全活二百餘萬口戴珊浮梁人成化中以御史督學南畿抑奔競嚴約束賞拔皆知名士佀鐘鄆城人宏治初以右副都御史巡撫蘇松首擇廉幹吏主倉庾侵漁弊絕所部災奏免歲辨織造諸物改折漕糧五十萬石留滸墅關稅二年皆報許何鑑浙江新昌人宏治中以右副都御史巡撫江南蘇松大水民饑用便宜發漕米十五萬石賑之屢奏便民事宜多報可與侍郎徐貫疏吳淞白茆諸渠泄水入海水患始息朱瑄鄞縣人宏治中以右副都御史巡撫江南濬三江下流以殺太湖水疏孟瀆諸河通漕自蘇州至崑山經沙河舟多覆溺瑄為甃石作隄樹柳其上太倉鎮海二衞軍民雜處難治建議置太倉州减蘇松歲辦雜徭實心幹濟口不言錢歸之日饔飱不給李充嗣内江人正德時巡撫應天歲大饑悉心賑濟時宸濠有逆謀充嗣為之備及宸濠反自將精兵萬人西屯采石傳檄部内詭言京邊兵十萬且至賊疑懼㑹王守仁破南昌賊乃潰去就進工部尚書修蘇松水利大開白茅港䟽吳淞江嘉靖初奏減正德時所加白糧并蠲歲辦之浮舊額者民困以蘇蕭鳴鳳山陰人正德時以御史督學南畿取士先德行後文藝誨諭懇摯諸生感悅以比前御史陳選稱之曰陳泰山蕭北斗歐陽鐸太和人嘉靖初以右都御史巡撫應天十府以蘇松田賦不均乃令賦最重者減耗米派輕齎以輕之晨輕者徵本色增耗米陰重之由是版籍不更賦無偏畤曾鈞進賢人嘉靖時以右副都御史總理河道徐邳等十七州縣連被水患鈞乃䟽劉伶臺至赤晏廟八十里築草灣老黃河口餘三里溝新開河高家堰並建閘築隄閲數月工成民以安居周如斗餘姚人嘉靖中以御史巡按蘇松時倭患方棘而歲又不登如斗悉心經畫外應軍旅内撫士民奏免田租數十萬石奉命監軍將吏畏服期滿當代以士民請更留一年曹邦輔定陶人嘉靖中以右僉都御史巡撫應天時倭寇犯南京破溧水邦輔督兵進剿賊走太湖追及之盡殱其衆鄭曉海鹽人嘉靖時以兵部侍郎總督漕運時大江南北皆被倭患曉懸重賞捕戮其嚮導請增設泰州海防副使築瓜洲城諸海口皆増兵設堠遂連破之斬馘甚衆餘賊潰去唐龍蘭溪人以右僉都御史總督漕運兼撫鳳陽諸府壽州正陽關榷稅通泰二州虛田稅及漕卒船料皆人所患苦並奏罷之俞大猷晉江人嘉靖時為蘇松副總兵時倭寇猖獗總督張經檄速戰大猷不可俟諸軍畢集大破之又擊倭蘇州倭出海走生擒其魁别倭犯吳江又破之於鶯脰湖倭懼皆遁江南遂安劉景韶崇陽人嘉靖時為淮揚道副使饒將略每戰必身先士卒自丁堰至廟灣大小十餘戰巨寇畢殲又山西驍將邱升以倭警調援淮揚景韶挾與俱所向無不克後升自仲家園追賊至鍋團輕騎先進為賊所圍馬蹶死於陣朱衡萬安人嘉靖末以工部尚書兼右副都御史總理河漕時河決沛縣飛雲橋塞運道衡開新渠一百九十四里築馬家橋隄以遏飛雲橋隄決口漕艘通行無阻海瑞瓊山人隆慶中巡撫應天十府屬吏憚其威莫不飭厲䟽請濬吳淞白茆通流入海民賴其利甫半歲去小民號泣載路家繪像祀之後卒官南京潘季馴烏程人萬厯初以右都御史兼工部侍郎總理河漕時河決崔鎮全淮南徙高堰湖隄大壞維揚高寶閒皆為巨浸季馴相度地勢條上六事河工以成本朝乾隆二十二年高宗純皇帝南巡奉㫖建祠春秋致祭劉東星泌水人萬厯中以工部侍郎總理河漕開濬元賈魯所浚故道起曲里鋪至三仙臺抵小浮橋又濬漕渠自徐邳至宿又奏開泇河南通淮海引漕甚便卒於官李化龍長垣人萬厯中以工部侍郎總理河道與巡撫李三才開泇河由直河入泇口抵夏鎮二百六十里避黃河吕梁之險漕至今便焉周起元海澄人天啟閒巡撫吳中為政持大體尚清淨性剛介不畏彊禦織造内監李實倚魏忠賢勢貪暴不法誣勘蘇州同知楊姜起元申救因䟽實侵尅罪忠賢怒逮死獄中張國維東陽人崇禎中擢僉都御史巡撫應天十府流寇犯江北國維往來堵剿得稍靖在事六年以寛惠得民尤究心水道輯三吳水利全書建蘇州石塘松江海隄濬江陰鎮江漕渠立社學修常平倉並有成績祁彪佳山陰人崇禎中巡按蘇松諸郡首以弊政當革者十良法當復者十徧詢屬吏而行之風采大著吳中積猾最多訪其尤甚者四人大㑹縉紳父老立杖殺之遠近震慴後擢巡撫史可法大興人崇禎八年分巡池州安慶監江北諸軍蒐軍實治戰具流賊不敢犯十年擢右僉都御史巡撫安慶屢敗賊衆十四年總督漕運時漕輓每歲缺餉幾至百萬可法大濬南河祛除宿弊殆盡又興屯田繕城郭威望大著福王時以東閣大學士督師淮揚揚州破慷慨就死何騰蛟黎平衞人崇禎中官淮揚兵備僉事討平土寇程有宇等數萬衆部内晏然本朝馬國柱漢軍正白旗人順治四年總督江南時八旗駐防兵民不相習國柱盡心撫戢令行禁止兵民相安李日芃漢軍正藍旗人順治七年搮江都御史時沿江多盜日芃令五里置汛兵稽之行旅晏然海寇犯鎮江遣將堵剿斬獲甚衆刋定經賦全書剙立書院來四方學者士民德之李嵩陽封邱人順治七年提學江南時士習靡譎尚詞華棄義理嵩陽痛革之遵用傳註文體乃正秦世禎廣寕人順治八年巡按江南墨吏蠧胥誅逐不遺理囚多所平反漕卒為横索贈無藝疏請立五米五銀法著為令李來泰撫州人順治十二年督學江南所拔皆孤寒知名士尋任蘇松糧儲復分守蘇松常道厯官清慎能持大體不事威嚴而所部懾服郎廷佐漢軍鑲黃旗人順治十三年總督江南捍海口有功石廷柱漢軍正藍旗人順治十三年以鎮海將軍駐鎮江能飭兵安民民閒稱為石佛額楚滿洲鑲黃旗人江南都統善綏戢兵民吳逆之亂提兵援江右軍律嚴明所至安堵郎賽漢軍正紅旗人江南都統時𥘉設軍屯法紀嚴肅廛市晏然李森先平度州人順治中巡按江南置姦胥之虐民者十一人於法民大悅陳培禎奉天人順治中江南左布政以廉幹稱海宼薄城食盡民將為變培禎開聚寶門以通運人心乃安與總兵梁化鳳潛開小東門出不意擊賊大破之梁化鳳榆林人崇明鎮總兵海寇出沒不常化鳳収復平渾平安大安聯福等沙寇氛稍息鎮兵皆寄居民聞化鳳始建營房處之兵民稱便順治十六年赴援江寕突圍入守潛自閒道出擊賊大敗遂復潤州崔華平山人順治進士由揚州知府擢任兩淮鹽運使寛於督課商得休息而賦悉辦先是湖南長沙各府因用兵蠲引三十九萬一千有奇有請補行蠲引者計課可四十餘萬兩華力言不便以兩淮浮課甚重又帶加斤商力疲乏若再補行蠲引必致額售者滯銷誤課事遂寢周維新奉天人以副都統住鎮江戢兵禮士人皆德之馬祜滿洲鑲紅旗人康熙八年巡撫江南疏蠲全省逋賦百九十餘萬又請賑淮揚六郡之𬒳水災者开其賦除之又濬河以時蓄洩民賴其利後霖雨為災以憂卒官遺疏極陳水災民困無一語及私方國棟順天宛平人順治舉人康熙十二年除守蘇松常道地濵太湖隄岸歲久傾圯國棟親率吏民併力修築又修沿海墩臺及吳淞劉河兩閘區畫經費不以優民時值官兵進征閩粤羽書旁午中獨國棟事事與民休息芻茭糗糧之需日儲以俟軍興賴以無之而民閒晏然若不知有兵事者王之鼎漢軍正紅旗人鎮海將軍禮遇士人而御兵極嚴有古名將風靳輔漢軍鑲紅旗人康熙中總督河道大挑山清高寶四州縣運河詳審兩淮全局陳經理河工事宜八疏復請開中河三百餘里令漕艘由仲家莊閘而上即入中河避百八十里黃河湍悍之險勞績茂著卒諡文襄雍正十二年入祀賢良祠于成龍永寕人康熙中總督兩江貪墨吏望風解綬豪猾皆潛徙他境杜苞苴減火耗清營伍除蠧商剏立虹橋書院檄取髙才之士講習其中親自誨訓自奉儉約以疾卒官諡清端入祀賢良祠湯斌睢州人康熙中巡撫江蘇吳俗奢靡裁之以禮立嫁娶䘮葬定式又累䟽陳吳民疾苦淮揚水災倡屬捐濟撫吳三年食惟䟽菜還朝之日吳人攀送者數千人卒諡文正入祀賢良祠施世綸漢軍鑲黃旗人康熙中累擢淮徐道總督漕運革羨金劾貪舟除蠧役號稱嚴明傅臘塔滿洲鑲黃旗人康熙中總督江南薦賢能斥貪墨讞獄明慎摘發如神請免江寕號房蓬搭地租銀八千兩又䟽請江南鄉試増廣解額三載卒於官入祀賢良祠許汝霖海寕人康熙中督學江南手定甲乙釐正文體人咸服其公鑑張鵬翮遂寕人康熙中總理河道徧行勘履悉心經畫拆攔黃壩築高堰廣闢清口疏人字芒稻等河又請改中河築隄三義壩每歲糧艘通行無阻黃淮皆循故道所著有河防記入祀賢良祠張泰交陽城人康熙中督學江南刻苦勵操雖周親宿好莫敢干以私陳鵬年湘潭人康熙中總督河道時漕渠歲澀遣幹吏直溯淮源䟽其上流使清水暢達㑹黃濟運又挑濬黃河南北岸引河四道以疾卒於官諡勤恪入祀賢良祠張伯行儀封人康熙中巡撫江蘇清正著聞豪猾望風逺遁舉劾屬員無所阿徇奏請蠲瓜洲浮稅賑恤高寶下河災黎撫吳五載官吏莫敢冒法貪濫邵嗣堯猗氏人康熙進士以參議督江南學政杜絕苞苴論文宗尚簡質著四書講義傳示學者尋以勞疾卒士民思之為立祠祀焉徐士林文登人康熙進士乾隆年閒擢至江蘇布政使時湖廣資送山東流民經過兩江數至三千有奇蜂擁江干恃眔逞刁士林分别資送處置得宜尋授江蘇廵撫覈議淮鹽俱如所請徐淮海等處被水賑濟撫䘏全活甚衆又勸捐輸社倉積貯充裕以病卒予入京師賢良祠蘇州名宦祠齊蘇勒滿洲正白旗人雍正初總督河道疏復瓜洲花園港運道建閘啓閉以順水勢堵瓜洲城西新開河道以免江水逼城之患莅政清勤河防完固卒諡勤恪入祀賢良祠馮景夏桐郷人雍正中任蘇松糧儲道剔弊除蠧不避嫌怨改用小口倉斛以杜溢收盡革陋規浮費漕政肅清民成稱頌又清查松常二府積欠稽覈精詳為人所不能及尹繼善滿洲鑲黃旗人乾隆年閒三任兩江總督晉大學士繼善恭正端厚前後厯任二十年愛民養士整飭吏治不尚嚴厲而吏民畏懷不動聲色而大小悉就卒諡文端入祀賢良祠陳宏謀臨桂人乾隆二十二年任江蘇巡撫尋授雨廣總督二十三年以總督衘仍管江蘇巡撫宏謀精性理之學為政綜覈名實清漕弊禁淫祠崇樸黜華治無不舉以東閣大學士予告回籍卒於途贈太子太傅諡文恭入祀賢良祠劉墉諸城人乾隆二十四年督江蘇學政奏士習官方略云生監中滋事妄為者府州縣多所瞻顧既不肯速為審斷又不欲太分皁白闒穴怠玩訟棍蠧吏因得互售其姦詔襃其留心政體四十二年再督學江蘇官至體仁閣大學士卒諡文清入祀賢良祠康基田興縣人諳習河務洊任河道總督乾隆五十四年周家樓漫溢適上游挑溜大埽將陷基田上埽搶鑲被大溜翻入河底為埽所壓撈救得生屢緣事降禠俱留工効力嘉慶十三年以知府銜隨尚書長麟等赴江南勘河查出天龍閘迤東十八里屯有前河臣靳輔所建石閘二座足以減黃利運請㫖興修賞加道銜並花翎胡高望仁和人乾隆戊申己酉兩科連主江南試旋奉命督學江蘇者再端士習拔寒畯被其化者謂愛人如慈父誨人如嚴師官至都察院左都御史嘉慶三年卒五年𥙷諡文恪入祀賢良祠費淳仁和人乾隆六十年任江蘇巡撫嘉慶四年總督兩江奏挑徐州食城河以利農田就漕糧調濟以濟疲丁官至體仁閣大學士卒諡文恪岳起滿洲鑲白旗人嘉慶四年任江蘇巡撫嚴禁州縣浮收䟽清查漕弊章程詔襃其操守清㓗在督撫中最為出衆卒贈太子太保銜許兆椿雲夢人嘉慶初厯松江江寕知府擢蘇松糧道十四年授漕運總督奏請減造江廣漕運剝船節省銀四十萬兩卒祀名宦祠總纂官臣王廣隆恭纂輯前提調官臣張日章恭覆輯校對官臣吳思權恭校校對官臣賀式韓恭覆校大清一統志江寕府江蘇省治在蘇州府西北四百五十里東西距三百四十里南北距三百八十里東至鎮江府丹陽縣界一百六十里西至安徽和州界一百八十里南至安徽寕國府宣城縣界二百四十里北至安徽泗州天長縣界一百四十里東南至鎮江府溧陽縣界一百九十里西南至安徽太平府當塗縣界一百三十五里東北渡江至揚州府儀徵縣界一百三十五里西北渡江至安徽滁州界一百四十里自府治至京師二千四百四十五里分野天文斗牛女分野星紀之次建置沿革禹貢揚州之域春秋吳地戰國屬越後屬楚置金陵邑秦改曰秣陵屬鄣郡漢為丹陽郡地北境為臨淮郡地後漢因之北境堂邑改屬廣陵建安十六年孫權建都呉志權徙治秣陵明年改秣陵爲建業移置丹陽郡兼置楊州晉平呉因之東晉改丹陽内史爲尹北境僑置秦郡宋齊梁陳因之隋開皇初廢郡改曰蔣州大業三年復曰丹陽郡唐武德三年復曰揚州七年又改蔣州八年復曰揚州置大都督府九年揚州移治江都分屬宣潤二州至德二載置江寕郡乾元元年改曰昇州唐書方鎮表是年置浙江西道節度使兼江寕軍使治昇州尋徙蘇州上元二年州廢光啟三年復置昇州屬江南道天祐二年楊行密建大都督府五代楊吳武義二年改曰金陵府石晉天福二年南唐李氏建都改爲江寕府謂之西都以江都為東都宋開寶八年復為昇州天禧二年升為江寕府建康軍節度仁宗初封昇王也屬江南東路建炎三年改為建康府元至元十四年升為建康路二十三年自杭州移江南諸道行御史臺於此天厯二年改為集慶路明太祖元年始定都於此改曰應天府置江南行中書省永樂二年以為行在正統六年定為南京本朝改曰江寕府隸江蘇布政使司乾隆二十五年增設江