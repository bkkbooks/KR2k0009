南二十五里源出荆塘山西南流九曲入石臼湖又石湖㵎花溪港俱流入石臼湖曲水在上元縣北建康志晉海西公於鍾山立流杯曲水以延百僚水經注云舊樂遊苑晉元嘉中以其地爲曲水本朝乾隆十六年高宗純皇帝南巡御製曲水用謝惠連韻即效其體詩亭水在句容縣東建康志源出亭山南流遶縣城東又南與赤山湖合流入秦淮舊志又有石溪在縣北三十里源出胄山與亭山水合流入赤山湖按秦淮水諸書言一源出句容華山今華山無水當即亭山諸水也輿圖句容縣東北有水南流經縣東西南流有運河水自東南來注之西流經柘塘鎮北與溧水縣之水合西北流湯泉水自北來注之又西北入上元界即此呉漕水在溧水縣南流入石臼湖建康志源出東廬山南流入呉漕又曰溧水一派西流爲呉王漕楊行密時漕運所行橫山水在溧水縣西三十五里有兩源出橫山東㑹於望湖山下至石湫壩合秦淮河鄱陽浦在上元縣西建康志在石城西上通秦淮下入馬昻洲九里達江乘梁鄱陽王嘗於此置屯田因名又江乘浦在上元縣西北十七里南徐州記江乘縣西二里有大浦源出石城山東入大江蟹浦在上元縣西北十六里輿地志白下城西南有蟹浦源出鍾山北流九里入江秣陵浦建康志在江寕縣東南五十里溉田四十頃輿地志以舊縣爲名源出竹堂山北流十里入葛塘湖又十里入長溪合於秦淮府志源出上元縣竹堂山牧馬浦建康志在縣東南三十九里黄元之丹陽記云牧馬亭東南一里有牧馬浦晉永和中所置流入秦淮浦南朝放牧多在此又有義溝瀆在縣東二十里源出東青村下入秦淮溉田百餘頃王安石詩霹靂溝西路柴荆四五家輿地紀勝溝在縣東五里江寕浦在江寕縣西南南史梁敬帝初王僧辯迎立蕭淵明於齊既濟江㑹於江寕浦建康志在縣南七十五里源出安徽當塗縣界板橋浦在江寕縣西南晉康帝時譙王無忌餞禇裒於板橋齊謝眺有之宣城出新林浦向板橋詩梁太清二年侯景犯建康由板橋至朱雀航南寰宇記在縣南四十七里源出觀山流三十七里注大江建康志在城西南三十里新林浦在江寕縣西南齊永明五年起新林苑梁太清二年侯景之叛韋燦柳中禮等赴援合軍屯新林宋開寶七年曹彬等伐南唐自采石敗其兵於新林港建康志在縣西南二十里源出牛頭山西流七里入大江大桑浦寰宇記在江寕縣西南十二里吳大帝時平南將軍吕範屯大桑即此其水從蔡洲通大江查浦在江寕縣西晉蘇峻之亂陶侃入援屯於查浦又義熙六年盧循犯建康劉裕屯石頭柵淮斷查浦宋元徽二年桂楊王休範之亂陳顯達自查浦渡淮縁石頭北道入承明門建康志呉時夾淮立柵自石頭南上十里至查浦又南上十里至新亭又南上十里至新林又南上十里至板橋又東上三十里至烈洲通鑑注在大江南岸直秦淮口舊志在縣西南十里又西有沙門浦温嶠屯軍處便民港在上元縣東舊有沙溪一道自鎮江師古灘逕句容至上元長百里許歲久湮塞本朝乾隆四十七年督臣奏請開濬寛深引注江水入新港自鎮江舟行至江寕可越黃天蕩江路之險行旅稱便四十八年賜名曰便民港四十九年高宗純皇帝南巡有御製便民港紀事詩竹篠港在上元縣東北建康志竹篠河西至靖安東至石步南連直瀆北臨大江由靖安港口至城四十里有竹篠鎮接句容縣界石步港在上元縣東北建康志攝山西有石步港去縣四十里北達大江有羅落浦在縣東北六十里合於攝湖又曰石步橋下為羅落浦宋武帝進至羅落橋即此大城港在江寕縣西南三十里納大江東流㑹板橋新林等浦之水又東與陰山河合又東北與秦淮河合又北為三汊河流至龍江關外入江明初改為大勝港置大勝關於此下蜀港在句容縣北唐書上元初劉展以廣陵叛潛自上流濟襲下蜀宋史紹興十一年海陵王南侵虞允吝駐京口命苗定駐下蜀為援建康志在縣北六十里府城東北百里後有河入大江俗曰官港即古漕河也蒲塘港在溧水縣南二十五里又還步港在縣東南三十五里二水皆源出方山西流入石臼湖或曰即孫吳時蒲里塘也程駕港在六合縣西二十里其水上通竹鎮源出三山南流入滁河運瀆輿地紀勝在上元縣西北一里半建康志呉赤烏二年使左臺御史郄儉鑿城西開溝入秦准通吳越運船也城内有倉名苑倉府志今自三山門内斗門橋南引秦淮北流至内橋與青溪合又西從鐵窗櫺出城者其故迹也直瀆在上元縣東北晉書温嶠討蘇峻遣王愆期屯軍直瀆輿地紀勝在幕府山東北建康志在城東北三十五里東北接竹篠港流入大江傍有直瀆山直瀆洞其道直故名破岡瀆在句容縣東南六朝時運道也吳志赤烏八年遣校尉陳勳將三萬人鑿句容中道山直至雲陽西城通㑹市作邸閣其後因曰破岡建康志在縣東南二十五里建康實錄呉鑿以通吴㑹舩艦上下十四埭晉齊宋因之梁以太子名綱改為破墪瀆尋廢潮溝在上元縣西梁書天監四年以嚴植之兼五經博士開館潮溝輿地紀勝在縣西四里輿地志吳大帝所鑿以引潮接青溪抵秦淮西通運瀆北連後湖又建康志有鐵冶溝在縣北馬鞍山下有地三畝餘皆鐵梁時聚江南之鐵載往淮上棄所聚之餘於此其地堅不可入九曲溝在句容縣治東南河子溝在六合縣東南二十五里舊名急流江今名急水溝舊志宋淳熙中所開新河也下流入大江又岳子河在溝東金烏珠屯瓜步岳飛遣其子雲鑿此河襲之因名今俗呼鴨子河東溝在六合縣東南瓜步山之東接儀徵縣界舊志宋紹興閒所開為商旅艤舟之所江防隘口也舟子洲寰宇記在上元縣西五里輿地志梁天監十三年以朱雀門東北淮水紆曲數有水患乃鑿通之中央為洲四方諸郡秀士上計者憩止於此金陵記在城南隅周迴七里當朱雀航長樂渡之閒馬卭洲在上元縣西北梁太清三年南兖州刺史南康王㑹理等援臺城至馬卭州寰宇記在縣西北三十三里南滁洲記臨沂西入江北三里有洲晉帝渡江牧馬於其所故名通鑑注即江乘蒲洲之地與白下城相近新洲在上元縣北三國志孫綝使具黨孫慮襲執朱據於此晉書孫恩至白石欲掩建康不備聞劉牢之引軍還至新洲不敢進而去宋書武帝微時嘗伐荻新洲建康志一名薛家洲在縣北四十里與幕府山相對有上新洲下新洲通鑑注在京口西大江中意即今之金珠沙也闔廬洲在上元縣北晉書元帝初江東草創盜賊多有賀循言江中劇地惟有闔廬一處地勢險奥逃亡所聚宜以重兵備戍即此穊洲建康志在上元縣東北七十五里周三十八里南徐州記石壠山北中有洲百姓於洲上穊種所收倍於平陸烈洲在江寕縣西南晉書㑹稽王昱㑹桓温於烈洲共議征討寰宇記在縣西南八十里周六十里輿地志呉舊津所内有小水堪泊舟商人多停此以避烈風故名亦名溧洲上有小山形如栗相近又有龍潭洲迷子洲在江寕縣西南王安石詩迷子山前漲一洲建康志在縣南四十五里又簰槍洲在縣西南三十五里舊志南唐保大中治宫室取材上江成巨筏至此時㑹潮退為浮沙所沫漲成洲渚又董雲洲在縣西南十五里西有小江名曰澧江又名澧冮場上有田五百頃茄子洲在江寕縣西南晉咸和中陶侃等討蘇峻郗鑒自廣陵帥師渡江與侃㑹於茄子浦寰宇記在縣西南十三里永昌初忽崩陷數里其形曲折凡作九灣舟行者依馬蔡洲在江寕縣西南晉書王敦在石頭欲禁私伐蔡洲荻參軍温嶠曰中原有菽庶民采之乃止又蘇峻之亂陶侃温嶠等入援舟師四萬次於蔡洲元和志在縣西十二里江中寰宇記周五十五里通鑑注在石頭西岸又梁承聖元年王僧辯督諸軍至張公洲注張公洲即蔡洲之别渚白鷺洲在江寕縣西南唐李白詩朝别朱雀門暮宿白鷺洲又二水中分白鷺洲宋史曹彬伐南唐破其兵於白鷺洲寰宇記在縣西三里大江中心通志在府西三里與新林浦相對長命洲寰宇記在江寕縣西四里輿地志梁武帝遣人放生於此仍置十户在洲中掌穀粟以飼之建康志在石頭城前九里汀在上元縣東南五十里東下入秦淮溉田五百二十頃即九里固汝南灣建康志在上元縣東八里當秦淮曲折處晉汝南王渡江居此因名此水釀酒極佳灣東冶亭也又桐林灣在秦淮南逼近府城舊植桐甚盛故名烏龍潭在上元縣北建康志水旱祈禱屢應舊志近清涼門虎踞關夏月多荷西岸皆園亭濮家潭在高淳縣東五里廣百畝大旱不竭又潭灣在縣東南十五里廣二百餘畝長二里天淵池在上元縣北宋書景平二年遊天淵池建康志宋元嘉二十三年鑿一名天泉池陳江總有華林園天淵池銘今宫城後法寶寺西南荒池尚餘一畝即此池也西池在上元縣北晉書明帝為太子時起西池樓觀温嶠諫止之丹陽記呉太子登所鑿謂之西苑晉明帝為太子時重修建康志在太初宫西門外縣志今名太子湖在縣北六里九曲池在上元縣東北建康志在臺城東東宫城梁昭明太子所鑿覆杯池建康志在上元縣北三里元帝以酒廢政王導諌之帝覆杯池中以為戒因名龍池在句容懸東南明統志在茅山天聖觀梁陶宏景養龍子於池中宋真宗嘗敕中使取龍以進尋送歸池有御製觀龍歌刻於石天池在句容縣茅山絶頂又有碧玉池飲馬池在江浦縣西十五里西華山北俗傳項羽曽飲馬於此六合龍池輿地紀勝在六合縣南五里今為放生池舊志周十里傍臨大道水味如泉蓮花池在高淳縣南三十里尚書塘在溧水縣西琛山周數十里淵深莫測大旱不涸沸泉建康志在句容縣東虎耳山又丹陽記縣東三十五里有龍岡岡頂有沸潭周十二丈聞人聲便沸朱沙泉即丹沙浤明統志在句容縣燕洞山東有大石盆常無盈耗續志在中茅峯撫掌泉在句容縣東南建康志在茅山崇壽觀前雖旱不涸聞擊掌之聲湧出如沸其味甚佳冬時常暖亦呼冬温泉又田公泉在茅山玉晨觀東南一里玉液泉在茅山崇壽觀後海眼泉在積金中茅之西湯泉府境百二一在句容縣西北射烏山之東麓南麓俱有泉噴湧初出處太熱不可手探土人用其流處為池貯水以供澡浴之用一在江浦縣西南三十五里數泓湧出流入後河近泉之田賴以灌溉相傳梁昭明太子曾浴於此因名太子泉明初更名香泉湯溝泉在江浦縣北三十里駱駝嶺下北入三汊河溉田數十頃珍珠泉在江浦縣東北二十里定山西南麓東流入江龍王泉在高淳縣東三十里味香冽能俞疾景陽井在上元縣北建康志一名胭脂井又名辱井在臺城内輿地紀勝今白蓮閣下有小池面方丈餘或曰即景陽井應潮井酉陽雜俎蔣山有應潮井在半山閒輿地紀勝在上元縣東十里蔣山頭陀寺中與江潮盈縮相應寶公井在上元縣大市街心響井在江寕縣南六十里明一統志井欄有元祐五年四字或以紗帛蒙其上擊之作鼔聲投以瓦石則其聲如鐘磬上方井在溧水縣西二十里上方寺中縣志井上有石刻世傳孫鐘種瓜井也戴橋井在溧水縣南五里其水香冽可愈疾又金井在縣南其泉可灌溉天井在高淳縣東六十里竹山東畔深尺許泉促石孔出居民引以溉田尋真井在高淳縣北二十五里尋真觀内相傳許旌陽煉丹井也
