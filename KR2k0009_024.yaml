於雞籠山使聚徒教授齊永明二年竟陵王子良鎮西州開西邸於雞籠山即此寰宇記西接落星岡北臨棲元塘狀如雞籠晉元帝等五陵皆在山之陽建康志在上元縣西北六七里許覆舟山之西其北臨元武湖上宋時甞以黒龍見湖中改名龍山府志明初於山巔築臺置儀表名觀象臺亦名欽天山左右列十廟繚以朱垣東麓有憑虚閣普濟塔在閣後又西為祇闇山山頂有北極閣本朝康熙二十三年聖祖仁皇帝南巡臨幸其上御書曠觀二字勒碑建亭乾隆十六年高宗純皇帝南巡御製登雞嗚山即事詩二十二年御製題雞鳴山憑虚閣詩二十七年御製雞鳴山詩四望山晉書咸和中蘇峻據石頭温嶠於四望磯築壘以逼賊寰宇記在上元縣西北十五里西臨大江南連石頭北接盧龍山縣志呉大帝嘗與葛元共登通志在府西北十里定淮門外馬鞍山建康志在上元縣西北十里西臨大江東接石頭山又江寕縣東南三十五里亦有馬鞍山盧龍山寰宇記在上元縣西北二十里西臨大江舊經云晉元帝𥘉渡江以其山連石頭開鑿為固故以盧龍為名建康志在縣西北二十五里舊與馬鞍山相接秦時鑿山至今溝内石骨連焉府志山首突出城堞明太祖甞伏兵大破陳友諒於山下又有金陵岡在盧龍馬鞍二山之下秦所鑿以斷王氣者相傳即瘞金處幕府山宋書禮志元嘉二十五年設武帳於幕府山南史敬帝末齊軍踰鍾山將據北郊壇陳霸先率麾下出幕府山南大戰齊師大潰陳書禎明初幸幕府山校獵輿地紀勝晉元帝初過江王導建幕府其上因名有虎跑泉俗傳即古宣武場也建康志在城西北二十里周三十里南接盧龍石頭府志山隴多石居人於此煅石取灰又名石灰山明初陳友諒侵建康太祖命常遇春伏兵於石灰山側即此山有五峯南曰北固峽中有石洞幽邃中峯有虎跑泉西北峯曰峽蘿亦名翠蘿上有違摩洞又東南麓曰武帳岡宋元嘉二十二年以衡陽王義季爲南兖州刺史餞之於武帳岡即此本朝乾隆二十二年高宗純皇帝南巡御製幕府山詩三十年四十九年俱有御製望幕府山百詠詩大壯觀山陳書太建十一年幸大壯觀閲武建康志在上元縣北十八里東接鍾山南臨元武湖北臨蠡湖西有水下注平陸陳宣帝起大壯觀於此府志山與直瀆山接舊有蠡湖元時築為塘以溉田今廢直瀆山建康志在上元縣北三十五里傍有直瀆洞東西有水流入大江通志在府北二十五里觀音山舊志在上元縣北三十里觀音門外北濱大江西引幕府諸山東連臨沂衡陽諸山形如繡錯皆懸崖峭壁共捍大江真天設之險也有觀音閣永濟寺有石臨瞰江水形如飛燕曰燕子磯通志燕子磯磴道盤曲而上丹崖翠壁淩江欲飛絶頂有亭本朝巡屢幸此乾隆十六年聖祖仁皇帝南高宗純皇帝南巡御書德水香林江天淨界覺岸氣攝怒濤扁額及對聯御製觀音山詩燕子磯詩永濟禪院花笑軒小憩詩二十二年二十七年三十年四十五年四十九年㬪邀宸翰天章照耀江表四十九年仁宗睿皇帝扈蹕有御製燕子磯詩鍾山在上元縣東北朝陽門外諸葛亮曾使建業謂孫權曰鍾山龍蟠其後權避祖諱改名蔣山晉咸和三年蘇峻自横江濟至蔣山宋高祖初周續之移病鍾山元嘉二十四年蕭思話從帝登鍾山北嶺中道有盤石清泉上使於石上彈琴齊永元元年崔慧景叛遣千餘人魚貫緣蔣山自西巖夜下鼔呌臨城中臺軍驚潰梁天監十一年築西靜壇於鍾山太清二年侯景迫臺城邵陵王綸自京口入援徑指鍾山營于愛敬寺景黨大駭陳禎明末隋賀若弼趨建康進據鍾山皆即此地隋書志江寕縣有蔣山唐六典江南道名山之一元和志在縣東北十八里古金陵山也縣邑之名由是而立呉大帝時蔣子文發神異於此因改名曰名鍾山江表上已常遊於此為衆山之蔣山宋復傑寰宇記在縣東北十五里周六十一里東連青龍雁門等山西臨青溪北連雉亭南有鍾浦水流入秦淮晉謝尚齊周容梁阮孝緒劉孝標並隱居此山建康志山高百五十八丈其最秀者有屏風嶺東有八功人德水西有道光泉宋熙泉其北泉僅容一勺挹之不竭皆山之髙峯絶頂有一勝處道書為第三十一洞名朱湖大生之天明通志有漆園桐園㯶園皆在鍾山之陽洪武中植以備用者府志嘉靖中詔改為神烈山江時望氣者云望之又名紫金山以晉元帝未渡常有紫氣也又名聖遊山又名北山本朝乾隆三十年高宗純皇帝南巡御製鍾山詩覆舟山一名龍舟山又名元武山宋書禮志晉成帝世立北郊於覆丹山南太祖以其地為樂遊苑陳書大建七年甘露頻降樂遊苑詔立甘露亭元和志覆舟山在上元縣東北十里鍾山西足也形如覆舟故名方輿勝覽覆舟山東連鍾山北臨元武湖宋元嘉中甞改名元武建康志周三里高三十一丈東際清溪北臨真武湖東麓為東陵桓元使桓謙屯處又東為白石坡陶侃斬蘇峻處通志在府東北太平門内舊有甘露亭瑤臺閬風亭藏冰井臨沂山建康志在上元縣東北四十里周三十里東北接落星山西臨大江西南有東晉僑置之臨沂舊縣城又雉亭山亦在縣東北四十里與舊縣相望俗呼為騎亭山石邁古蹟編齊武帝東遊鍾山射雉故名又東北五里有衡陽山西北有水下湖落星山寰宇記在上元縣東北三十五里東接臨沂西接攝山北臨大江南徐州記云臨沂縣前有落星山吳大帝時山西江上置三層高樓呉都賦云饗戎旅於落星之樓建康志有落九里里人採銅於此故名聚寶山建康志在江寕縣南雨花臺側上多細石如瑪瑙俗呼爲聚寶山通志在府南聚寶門外山麓曰梅岡爲郡人遊覽勝地又戚家山亦在聚寶門外鄭文寶江南遺事韓熙載嘗居此山縣志山絶頂平曠爲雨花臺本朝乾隆二十二年二十七年三十年有高宗純皇帝南巡皆御製雨花臺詩梓桐山建康