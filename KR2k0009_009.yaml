南行唐縣牛飲山白鹿谷滋水所出東至新市入滹沱水元和志滋水在行唐縣南二十六里北去正定縣三十里寰宇記資河從九門縣東北界入無極界東南入滹沱河舊志滋河源出山西靈邱縣枚回嶺東南流逕靈夀縣北五十里至行唐縣西南二十七里張茂村伏流不見至府東北三十里南孟社復出又東南逕稾城縣北三十里又東入無極縣環縣西南東三面而東北入深澤縣界每秋水澇輒有漲溢之患行唐縣志滋河河源最多其大者有五一岀阜平縣白蛇嶺流曰汊河南流入靈夀縣界义村南流一出山西五臺縣南山之南東流與汊河㑹一出靈夀縣界北山五嶽寨一出王母山北峪一出王母山東峪俱至靈夀縣西北五河村合流又東至滋峪東南又有西山之小河入焉故名滋水東過行唐逾新樂經稾城東北抵祁州與沙水滙流按輿圖今滋河發源五臺縣東與射虎川東西分流十餘里即入邊牆至府界漢志出行唐是也元和郡縣志舊志謂源出靈邱又謂至行唐縣伏流皆與今水道不合行唐縣志謂㑹五河始名滋河亦總舉相入之水言其正源則在山西界也又古與滹沱合流今折而東北與滱沙二水合不入滹沱矣西韓河在正定縣西二十里源出縣西北大鳴泉東南流至縣南注於滹沱圖説謂之清水河本朝乾隆十年興修水利挑濬寛深又縣西有柏棠河其源亦本大鳴泉以柏棠村得名乾隆十年挑濬長八里引水至䕶城河脈絡滋長田畝受涵濡之利又縣東有東大道河縣東南有林濟河並經疏浚以分洩䕶城河之水其下游為只照河在藁城縣西北合旺泉柏棠之水以次宣洩由此入滹沱為府治諸水之尾閭洨河源出獲鹿縣南東流逕欒城縣西又南入趙州界漢書地理志石邑縣井陘山汶水所出東南至廮陶入泜舊志洨水上源有四泉一出獲鹿縣南蓮花營一出縣南洚北村二泉相去五六里東流十餘里而合又十餘里至竇嫗村入欒城界其二泉岀竇嫗村西北三里名石牛港相去六百歩皆乳泉漫流平地東行二百餘步又三里許與前二水合四水交流故名洨水又東經欒城縣西十五里元氏縣之北沙河東北流合焉又東南入趙州界計長四十五里下流至寕晉縣入大陸澤宋咸平五年河北漕臣景望開鎮州常山南河入洨水至趙州以利漕即此本朝乾隆十二年二十八年兩經挑䜜東岸土隄一道長二十五里金水河源出獲鹿縣封龍山東北流逕縣城西南隅又東合磨刀泉轉東南流經元氏縣北十五里又東至欒城縣合洨河歳久淤廢明萬厯四十二年欒城令蘇繼歐甞重濬又磨刀泉源出獲鹿縣北小山流逕城東又南流入金水又孝河在獲鹿縣西北二十里或曰即金水上流之别名槐河源出贊皇縣西東北流經元氏縣南又東流入高邑縣界亦名泜水即古沮水也漢書地理志元氏縣沮水首受中邱西山窮泉谷東至堂陽入河元和志泜水在贊皇縣西南三十五里即韓信斬陳餘處太平寰宇記桑欽水經云槐水出黃石山逹元氏縣界一曰渡水舊志槐水出黃沙嶺流經贊皇縣西北十里入元氏縣界經縣西南六里合泜水自下亦通謂為泜水又東南厯高邑柏鄉達寕晉縣入胡盧河按今之槐水即古泜水至今之泜水乃别一小水舊志謂槐水為泜水之别源非是又按此為北泜水非臨城敦輿山之水也後人混為一水亦誤今槐河計長六十里兩旁有水渠二十二道引水灌田民資其利甚鉅泜水河在元氏縣源出封龍山東南流經縣西南六里𥿄屯村入槐河沙河在元氏縣西北八里西山諸水所滙也亦名猪龍河東流至趙州界合洨水計長十里又有北沙河在縣西北三十里亦出西山流經割鬚嶺封龍山東至欒城縣西入洨水衞河在靈夀縣東漢書地理志靈夀縣禹貢衞水出東北東入滹沱縣志衞河在縣東十里俗名雷溝河源出縣東北十四里良同村南流至縣東南合滹沱河嵩陽河在靈夀縣西南五里一作松偹河源出楸山東南流經縣西南兩關外又東流至縣東南入滹沱河又縣東關外有淤泥河亦曰温泉南流入嵩陽河居人資以灌溉旺婁河在平山縣西十五里泉甚煖隆冬不冰居民造楮於此亦名之為望樓河濊河在平山縣北舊入行唐縣界即木刀溝上源古石臼河也袁宏後漢紀永平中理滹沱石臼河從都盧至羊腸倉欲令通漕太原吏人苦役連年無成轉運所經三百八十九隘前後溺死者不可勝算建初三年從鄧訓言罷其役寰宇記濊水出房山亦謂石臼水又謂之鹿水出行唐東入博陵謂之木刀溝又謂之袈裟水從此過石疃山南流入滹沱舊志濊河在平山縣西北六十里東流至縣東北入滹沱今上流為滋水所亂故道已湮下流淤塞亦不復東行也按此河亦名蒲吾渠後漢書注引古今注曰永平十年作常山滹沱河蒲吾渠通漕船即此平陽河在阜平縣東六十里發源大茂山南流入派河又班峪河在縣東四十里發源縣界炭火鋪鷂子河在縣東十五里發源山西靈邱縣又有小河在縣東關外發源大派山皆南流逕縣東入派河派河即沙河也自山西繁峙縣流入逕阜平縣南又東南厯曲陽逕行唐縣東又東南逕新樂縣西南又東過定州界至祁州合於滋河通鑑晉隆安元年魏主珪進軍新市慕容麟退阻派水又唐至德元載郭子儀擊史思明至行唐敗之於沙河胡三省注沙河在新樂行唐二縣間寰宇記靈壽縣有派水流逕白羊山下從行唐東過温泉入房山界北使録自正定府七十里過沙河至新樂又四十五里至定州舊志源岀龍泉關外長城嶺東麓流逕大派山西南又東逕王快鎮南又東南過曲陽縣逕新樂縣南門外至縣東南㑹郜河乃南下東轉入定州界一名沙水亦曰長溪胭脂河在阜平縣西南五十里發源縣界清竿嶺東流入派河水有紅色故名又當城河在縣西南四十里發源山西五臺縣流至縣南與胭脂河合北流河在阜平縣龍泉關外發源關西八里之印鈔石山下流至縣西北入派河郜河在行唐縣南一里許一作告河源出縣西北兩嶺口山谷間曰潁河南行三十里逕箕山之東許由村之南曰洗耳溪又東南曰部河自行唐之高壘村東入新樂之西曹村㑹大沙河出境入定州計長二十里又行唐縣西北三十五里有甘泉河源出甘泉廟南流入郜河賈莊河在行唐縣北二十里源出縣西北武荘社北山曰曲河東流逕縣東北賈莊村曰賈莊河又東入派河浴河在新樂縣西五里一名金水河源出縣西南十五里中同村浴兒池東流分為二皆與木刀溝㑹曰三汊河與藁城縣接界井陘水在獲鹿縣東北水經注井陘水岀井陘山世謂之鹿泉水東北流屈逕陳餘壘南又南逕樂陽縣城西東注綿蔓水元和志鹿泉水一名陘水南去石邑縣十里按此水今堙聖水在靈壽縣西源出縣西北二十五里白石村之聖水峪亦曰聖水洼上有清風砦又大鳴川在縣西北九十里亦曰大名川又名錦川源出横山嶺西團箔口東下流俱注於滹沱淴淴水在平山縣西一百里自山半涌出達於平地灌田數十頃明正徳二年於淴淴水口建城置戍泲水在贊皇縣南東流入高邑縣界一名白溝水漢書地理志房子縣贊皇山石濟水所出東至廮陶入泜隋書地理志贊皇縣有白溝元和郡縣志濟水岀贊皇山東北流去縣南十里此别一水應劭以為四瀆誤也舊志今名沙水在縣西南六十里源出本縣大石門按寰宇記謂即槐水誤木刀溝在新樂縣西南舊自平山行唐縣流入又東逕無極縣北又東入保定府祁州界元和志木刀溝在新樂縣東南二十四里溝旁人姓木名刀因名又在陘邑縣南三里太平寰宇記亦名長淋溝舊志新樂縣西三十五里接行唐界地卑下行唐諸山溪之水匯於此南流為林河至縣西二十里長林橋㑹閔泉水又南折東經縣南三汊河口合浴河水凡六十里又東南入無極縣界去縣西北二十里此即木刀故道也明萬厯中知縣趙璿嘗濬之因名趙澤河本朝順治中知縣林華皖重濬又名曰林河今俗訛為牧道溝其下流已堙餘水與沙河相通按今溝水出新樂縣境閔鎮村東流經藳城定州界入無極長四十五里乾隆二十八年挑濬寛深又按林河出新樂境之北青同村與木刀溝水異源人以其水歸入木刀故誤號木刀爲林河究之兩水各别未可混一大唐渠唐書地理志獲鹿縣東北十里有大唐渠自平山至石邑引太曰渠溉田又有禮教渠總章二年自石邑西北引太白渠東流入正定界以溉田天寶二年又自石邑引大唐渠東南流四十三里入太白渠七里澗在井陘縣東北諸山溪之水在縣北境者皆滙流於此南入綿蔓河黑龍潭在贊皇縣西南七十里上有龍神廟龍潭灣在欒城縣南五里昔時冶河支流飲馬池明統志在行唐縣東南尉遲敬德開以飲馬上有鄂國公廟蓮花池在行唐縣東畿輔通志蓮花池泉從地湧寛以畝計迤邐東南流龍泉自西北來㑹倚橋爲閘隨塍爲溝本朝雍正五年挑修改水田爲旱河其利滋溥恒陽第一泉在正定縣西門外迤南䕶城河中舊名甘泉甘冽異他水白雀泉在正定縣西南三里灌田數十頃相傳泉舊在白雀寺中故名大鳴泉在正定縣西北三十里即西韓河上源也有泉數十穴大者如車輪溉田百餘頃少東有小鳴泉又有雕橋泉在縣西二十里源出大鳴泉凡四十五穴明宣徳初知縣李守義引水溉田後淤塞萬厯四年知縣周應中復濬又開三陽河俱由丁家橋斜角頭李家荘入河溉田數十頃本朝乾隆十年興修水利重加開濬涼樓坡泉在正定縣東北三里東南流為周河入滹沱旺泉在正定縣東北隅大可數畝一支南流入城河今廢一攴西南流經西洋朱福屯等村明萬厯初知縣周應中開濬大為民利後久堙廢本朝乾隆十年命總督高斌相視疏濬成通渠上建亭曰導醴十五年有高宗純皇帝時廵駐蹕於此御製九日幸旺泉導醴亭登高詩蒙泉在元氏縣封龍山半又有龍泉亦在封龍山河西泉在平山縣西二十五里平地湧泉數處灌田數百頃温泉在平山縣西四十里泉從土中沸出温煖可浴又有温泉在阜平縣西南四十里野狐泉在贊皇縣西南五十里泉水湧岀遂成大河下通槐水龍井在正定縣北龍王廟前旱禱輒應聖井在無極縣北十五里旱禱多應邑民稱為聖泉前提調官臣沈兆澐恭纂輯提調官臣王廣䕃恭覆輯校對官臣吳思權恭校校對官臣章詒燕恭覆校
