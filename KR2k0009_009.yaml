百姓大悦以恩信為治寇盗亦息州郡表上其狀遷武陵太守楊璇烏傷人靈帝時為勃海太守有異政南北朝魏崔休清河東武城人宣武𥘉為勃海太守下車先戮豪猾數人姦盜莫不擒翦清身率下部内安之時大儒張吾貴名盛山東休招延禮接儒者稱之齊高浟神武第五子武定六年為滄州刺史為政嚴察纎芥知人間事合境號為神明境内無盜政化為當時第一天保四年徴為侍中人吏送别悲號有老公數百人相率具饌曰自殿下來五載民不識吏吏不欺民殿下惟飲此鄉水未食百姓食聊獻薄蔬浟重其意為食一口隋令狐熙燉煌人高祖時拜滄州刺史時山東承齊之敝户口簿籍類不以實熙令自歸首至者一萬戸在職數年風教大洽稱為良二千石唐薛大鼎汾陰人高祖時遷滄州刺史州境有無棣河隋末填廢大鼎浚治屬之海商賈流行歌曰新河得通舟楫利直達滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被又疏長蘆漳衡三渠洩汙潦水不為害解琬元城人武后時為滄州刺史為政引大體部人順附李乾祐長安人拜滄州刺史强幹有聲姜思度魏人為滄州刺史于州東南浚二渠一注屯氏河一注漳河并引浮水入海民賴其利穆凝河内人調鹽山縣尉安祿山反署劉道元為景城守凝募兵斬之檄州縣并力捍賊周代選盧龍人為魯城令安祿山反率縣人拒戰死之烏重允憲宗時為横海軍命者以刺史失權節度使建言河朔能拒朝鎮將領軍多威福也使刺史得職大將雖有祿山思明之姦能據一州為叛哉臣所管三州輒還刺史職各主其兵固請廢景州法制修立時以為宜殷侑陳州人文宗時拜義昌軍節度使時痍荒之餘侑單身之官與下共勞苦以仁惠為治歲中流户俱襁屬而還遂為營田丐耕牛三萬詔度支賜帛四萬匹佐其市初州兵三萬仰廪度支侑始至一歲自以賦入贍其半二載則周用乃奏罷度支所賜户口滋饒廥儲盈腐上下便安五代漢王景萊州掖人為横海軍節度使乾祐初幽州民多渡關求食至滄州境者五千人景善懷撫給田處之臨政不尚刻削民有過必面詰之不至大過即諭而釋去入朝民遮道留不獲有截景馬鐙者宋趙鎔樂陵人太宗時知滄州完城塹嚴戰具寇嘗數百騎至境聞有備即引去柴禹錫大名人太宗時知滄州勤於政治部民詣濱州列狀以聞何承矩河南人端拱初知滄州節度副使甞論關南水利請于順安砦西開易河蒲口導水東注于海築隄貯水爲屯田收地利以實邊設險固以防塞太宗嘉納之尋以爲河北縁邊屯田使稻田廣斥民享其利李允則孟人真宗時知滄州廵視州境濬浮陽湖葺營壘官舍間穿井泉未幾遼人來攻老幼皆入保而水不乏斵冰代礟遼人遂解去田京鹿邑人知滄州招集流民爲之經畫除稅租凡増戸一萬八千李參須城人仁宗時知鹽山縣歲饑諭富室出粟平其直予民不能糴者給以糠籺全活數萬人李夀朋緱氏人仁宗時知滄州地震壞城郭帑庾壽朋以蓆爲屋督吏寀繕葺未數月復其舊括蕪田三萬頃縱民耕擇其壯者使習兵河方北湧隨塞之夀朋度必東潰諭居民徙避後三縣四鎮果墊焉司馬光岀使薦其能孟元洺州人仁宗時權知滄州民鬻鹽爲生歲荒鹽多不售民無以自給元度軍食有餘悉用以易鹽由是民不轉徙張問襄陽人熙寕末知滄州自新法行問獨不阿時好嵗饑爲帝言民間常平助役之苦語甚切直唐恪錢塘人大觀中知滄州河決水犯城下恪乘城救理水去城得全乃上疏請暫免保甲保馬呈閲及復諸縣租等第未報悉便宜罷行之金張大節五臺人世宗時爲横海軍節度使郡境有巨盗久不獲大節設䇿擒之後河決於衞横流而東滄境有九河故道大節即相宜繕隄水不爲害趙重福豐州人爲滄州鹽副使民煑鹵爲鹽賣以給食鹽官往往杖殺之重福不忍殺人嵗滿課殿尚書右丞完顔匡三司使按楚琥知其事乃以歲荒薄其罰按楚琥舊作按出虎今改正明王彬永樂初知青縣以河決未及築隄禾稼盡沒痛不能救投水而死屍漂入縣甬道吏民憐之遂于隄上建祠名曰神隄劉福重慶人成化間以山東按察司副使備兵天津營造衞城有能名王之寀朝邑人萬厯間知慶雲縣縣當九河下流歲有水患之寀相度地勢集民疏濬水不爲災民獲灌漑之利邑多荒地民不能耕爲買牛給無力者邑人立祠祀之張文煥掖縣人崇禎間知青縣已卯城破死之本朝王應春籍無考任天津遊擊順治三年土寇薛承旗居灣頭應春往捕獲其黨三人馬一匹行近唐官屯賊偵知之率衆出劫鎗矢並發傷應春馬首馬驚入村被鉤落馬死又遊擊趙成功剿土寇羅守宇力竭而死遊擊孔道興亦同時擊賊陣亡事聞賜䘏各如例王廷貴籍無考任滄州吏目順治三年滄州盜李翔羽肆刼廷貴率捕役鄉兵出捕至王官村賊百餘驟至鄉兵失利廷貴遇害事聞賜䘏如例張必科蓋州人順治四年知慶雲縣强毅有志節受事未兩月宿弊盡革㑹土寇至必科率衆登陴捍禦賊至輒射殺之賊悉衆來攻必科射斃數賊弦斷手傷擲弓曰命也城破自焚死贈僉事李芳春蓋州人順治閒知慶雲縣邑當殘破之餘芳春年少賊甚易之乃與鎮防郭天培等密謀勦捕賊黨二千餘人訓練鄉民皆知守禦賊相戒不敢入境趙良棟寕夏人康熙十二年以總兵官鎮天津整隊伍勤簡練士馬雄勁爲諸鎮最張奎祥華容人乾隆間知滄州嚴禁包納政聲大著修築南關隄岸州人呼爲張公隄以升任去人物漢雋不疑勃海人治春秋爲郡文學進退必以禮武帝末徴拜青州刺史昭帝初擢京兆尹吏民敬其威信有男子詣北闕自謂衞大子詔公卿雜識視莫敢發言不疑後到叱從吏收縛曰昔蒯瞶違命出奔輒拒不納春秋是之衞太子得罪先帝此罪人也遂送詔獄天子與霍光聞而嘉之曰公卿大臣當用經術明于大誼由是名聲重于朝廷後致仕卒鮑宣高城人好學明經哀帝𥘉徴爲諌大夫居位常上書諫爭其言少文多質是時丁傅子弟並進董賢貴幸宣上書切諌帝以宣名儒優容之後拜爲司隸尋以罪下廷尉太學諸生千餘人守闕上書乃減死一等髠鉗徙上黨王莽秉政隂除漢忠直臣不附已者遂遇害王調勃海人李固門生梁冀誣固與劉文劉鮪共爲妖言下獄調貫械上書證固之枉太后明之乃赦固巴肅高城人察孝廉厯慎令貝邱長皆以郡守非其人辭病去後拜議郎與竇武陳蕃等謀誅閹宦武等遇害肅亦坐黨禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閤解印綬與俱去肅曰爲人臣者有謀不敢隱有罪不逃刑遂𬒳害三國魏韓宣勃海人累官大鴻臚始南陽韓暨以夙德在宣前爲大鴻臚及宣在後亦稱職故時人語曰大鴻臚小鴻臚前後治行曷相如晉石苞南皮人雅曠有智局仕魏屢遷驃騎將軍武帝即位進位大司馬封樂陵郡公在位稱爲忠勤子崇官衞尉刁彝饒安人父恊元帝時官尚書令死于王敦之難敦誅後彝斬讐人黨以首祭父墓詣廷尉請罪朝廷特宥之由是知名仕至徐兗二州刺史南北朝魏刁廱協曽孫劉裕以嫌誅刁氏廱奔姚興後歸魏以建威將軍討宋徙鎮濟陽賜爵東安伯後除薄骨律鎮將皇興中與隴西王源賀中書監高允並以耆年賜几杖劎履上殿􅾰性寛柔好尚文典手不釋書所著文百有餘篇卒年九十五謚曰簡刁沖廱曽孫十三而孤孝慕過人家世貴逹從師于外自同諸生學通諸經隂陽圖緯算數天文風氣之書當世服其精博性壯烈不畏强禦延昌中司徒高肇擅恣威權沖抗表極言辭㫖懇直神䴥末襲爵東安侯卒諡安憲先生刁雙廱族孫少好學兼涉文史為中山王英所知賞後中山王熙起兵誅元義事敗熙弟畧投命于雙雙藏䕶周年時購畧甚切畧苦求南轉雙遣從子昌送逹江左明帝末為西兖州刺史盜悉擒獲州境清肅遷驃騎大將軍卒諡清穆齊李鉉南皮人家素貧常春夏務農冬乃入學年十六從浮陽李周仁受毛詩尚書章武劉子猛受禮記常山房虯受周官儀禮漁陽鮮于靈馥受左氏又與州里楊元懿河間宗惠振等結友詣大儒徐遵明受業潛居討論撰定孝經論語毛詩三禮義疏及三傳異同周易義例合三十餘卷又刪正六藝經注中謬字名曰字辨仕終國子博士隋王伽章武人開皇未為齊州行參軍被州使送流囚李参等七十餘人詣京師行次滎陽伽憐其辛苦盡脱去枷鎖與期曰某日當至京師流人咸悦依期而至帝聞異之召伽及流人賜宴殿廷而赦之詔曰使官盡王伽之儔人盡李參之輩刑措不用其何遠哉於是擢伽為雍令政有能名唐許法慎清池人甫三嵗已有知時母病不飲乳慘慘有憂色或以珍餌詭悦之輒不食還以進母後母䘮常廬墓天寶中表其閭高適滄州人明皇時舉有道科肅宗時累擢諫議大夫負氣敢言權近側目李輔國惡之岀為蜀彭二州刺史後為西川節度使徴入為散騎常侍封勃海縣侯卒諡曰忠適尚節義以功名自許為政寛簡所莅人便之年五十始為詩即工每一篇已好事者輒傳布賈耽南皮人天寶中舉明經補臨清尉累進汾州刺史政有異績貞元九年拜同中書門下平章事封魏國公順宗立進檢校司空左僕射卒謚元靖耽嗜觀書老益勤尤悉地理譔古今郡國縣道四夷述古郡國題以墨今州縣以朱刋落疏舛多所釐正又著貞元十道錄為相十三年檢身勵行每歸第對賓客無少倦家人近習不見其喜愠世謂淳德有常者高元裕勃海人第進士召為右補闕敬宗時宦豎恣放大臣不得進見元裕切諫累進中書舍人鄭注入翰林元裕當書命乃言以醫術侍注愧五百累官人有司不能決湘受詔鞫河北轉運使終知廣州湘事隨以白長于吏治真宗時厯邊郡所至出入必廣儲蓋為備豫計軍旅閒頗著能名胡元興滄州土成人母死負墳太平興國中旌表門閭張凝無棣人真宗時任北作坊使屢破遼兵遷邠寕環慶靈州路副部署兼安撫使邊境獲安澶淵之役遼人北凝為縁邊安撫使躡其後乃不敢歸所過侵掠以畧奪凝忠勇好功名累任貲子昭逺西北善訓士年十六凝與卒賞賜多以犒遼戰挺身陷敵軍家無餘昭遠從行即單騎疾呼凝出左右披突入陣中掖靡不敢動張知白清池人幼篤學中進士第累遷京東轉運使德應天因陳時羣臣賀瑞星知白以為人治道之要帝謂宰臣曰知白君當修可謂乃心朝廷矣拜給事中參知政事王欽若多相失因稱疾辭位仁宗時以工部尚為相議論書同中書門下平章事知貴清約如寒士白在相卒贈太位慎名器無毫髮私雖顯傅中書令諡文節知白九歲其殯不父終邢州殯于佛寺及遼寇河北寺宇頽廢可辨知白既登第徒行訪得之其衣衾皆可驗衆歎其誠孝李之純無棣人舉進士熙寕中累官成都路轉運使成都歲發官米六千石捐直與民言者謂惠下損上之純言蜀人恃此為生奈何奪之事遂止累遷御史中丞疏救蘇軾蘇轍被論誣妄為劉拯所劾出知單州從弟之儀能為文尢工尺牘登第幾三十年乃從蘇軾於定州幕府厯樞密院編修官通判原州金師安石清州人承安中進士補尚書省令史宣宗南遷留平章完顔承暉守燕都承暉將就死以遺衆托安石使赴行在安石閒道走汴帝嘉之擢樞密院經厯官至大中累遷尚書右丞臺諫劾近侍張文夀張仁夀李麟之安石亦論列三人不巳帝怒甚有㫖切責數百言安石驟任用遭摧折及卒帝甚惜之陳岢滄州人大安初進士天興閒為右司諫遇事輒言無少隱及汴京被兵屢上封事言得失切中時病時相錫占哈什等沮之䇿不行識者惜焉錫占哈什舊作赤盞合喜今改正元張榮清州人從金太保明安降元後領軍匠從征西域諸國至木倫河不能渉帝召問濟河之䇿榮請造舟以一月為期乃督工匠造船百艘遂濟河帝嘉其能累升鎮國上將軍木倫河舊作莫蘭河今改正劉正清州人少讀書習吏事累官至中書右丞多所建白仁宗初政風動天下正與諸老臣陳贊之力居多拜榮祿大夫平章政事卒諡忠宣陳顥清州人幼頴悟日記誦千百言以薦入宿衞尋為仁宗潛邸説書日開陳古聖賢君艱貞之道拜集賢大學士時伺帝燕閒輒取聖經所載大經大法有切治體者陳之每見嘉納後辭祿家居文宗立復起為大學士卒追封薊國公諡文忠顥岀入禁闥數十年樂談人善而惡聞人過士大夫因其薦拔以至顯列有終身莫知所自者楊乘滄州人至正初為介休縣尹民饑為盜乘招之皆棄兵願為良民累官江浙行省左右司員外郎免官寓居松江張士誠入平江遣張經招乘乘讓經平日讀書云何經俯首不能對經促行急乃整衣冠自經死明馬昂滄州人永樂中舉人正統時累遷副都御史參贊甘肅軍務討平赤斤蒙古罕東等衞蕃族擒索諾穆巴勒等自是不敢犯邊景泰初總督兩廣平蠻寇進兵部尚書尋命總督陜西未行㑹曹欽反昂討平之加太子太保終户部尚書卒謚恭襄索諾穆巴勒舊作鎖南奔今改正王翺鹽山人永樂進士正統時厯官都御史出鎮撫江西陜西改督遼東軍務又改兩廣皆有異績景泰末為吏部尚書英宗復辟眷顧益厚召對便殿稱先生而不名翺為人剛明廉直憂國奉公忘情恩怨為時名臣成化初卒贈太保諡忠肅强珍滄州人成化進士知涇縣奏減賦額民為立祠擢御史巡按遼東劾奏廵撫陳鉞罪忤汪直謫戍遼東直敗復官宏治時官南京右通政向化靜海衞人父上為衞指揮坐罪憤而投海死化求屍不得亦投海死巳而與父屍並浮出衆收葬之殷尚質天津衞人嘉靖中襲指揮僉事厯太原大同參將擢遼東總兵遇敵赴鬬兵盡援絶殁於陣贈少保諡忠愍本朝王正志靜海人順治初以僉都御史廵撫延綏軍政修明邊境乂安姜瓖叛正志檄諸將固守參將王永疆開門納賊正志死之詔贈左都御史廕一子周天命天津人順治初為天津參將土寇莽塞等聚衆肆掠天命率兵赴剿力戰而死事聞優卹廕其弟明命都司經厯王顯謨天津人為漳州府同知海寇陷城被執不屈賊怒埋其身露首餓死詔贈按察司副使李尚賢慶雲人順治閒土寇圍城尚賢突圍出赴鹽山求援道遇賊被執紿曰我能開門納衆賊信之隨至城下尚賢大聲語城上人曰奉使無狀為賊所執今死矣賊單弱諸軍幸堅守無慮也賊怒殺之勵杜訥靜海人學問淵通尤工書法以諸生恭繕世祖章皇帝實錄議敘授福寕州同未赴賜六品俸入直内廷㝷授翰林院編修累遷刑部侍郎岀入文恪雍正九年禁闥二十餘年小心慎密卒諡詔贈太子太傅禮部尚書人祀賢良祠陳奉勅滄州人以父喪廬墓旌隋光啟天津人為永州衞守備康熙二十七年湖廣督標裁兵夏逢龍糾衆倡亂光啟嬰城固守力竭而死事聞贈卹如例勵廷儀杜訥子康熙進士授編修累遷刑部尚書世宗憲皇帝御書矜慎平恕額賜之加太子少傅調吏部尚書卒諡文恭入祀賢良祠柴堪棟南皮人諸生性至孝父母皆年登九十色養備至友愛庶弟以所應得産讓之卒入祀鄉賢祠俞金鼇天津人乾隆武進士授侍衞洊升肅州鎮總兵辦理伊犁屯田收穫豐裕擢烏嚕木齊都統四十九年任甘肅提督固原囘民李化玉等滋事剿平之旋調湖廣調直隸未起程適辰州勾補寨苗人石滿宜等聚衆倡亂金鼇聞報馳往擒首犯燬賊巢仍留湖廣以病乞休加左都督卒周大綸天津人貢生任彰化縣丞乾隆五十二年逆匪林爽文滋事罵賊被戕又張芝馨南皮人任彰化縣竹塹廵檢同時遇害事聞均卹廢如例黄應文天津人以經厯署巴東縣事嘉慶元年邪匪聶人傑等滋事應文㑹營弁督勦屢有殱獲後追擊林之華黨匪於長陽縣之查角石㑹大雨賊圍甚急應文手刃數人以衆寡不敵與其子廪生掞並殁於陣事聞加等議卹章潮天津人任四川長夀縣典史嘉慶二年教匪突至擊賊陣亡事聞議卹如例劉揮慶雲人武進士任甘肅守備嘉慶四年於鞏昌府什川鎮擊賊陣亡事聞議卹如例列女漢雋不疑母不疑爲京兆尹每行縣錄囚徒還其母輒問不疑有所平反活幾何人苟不疑多所平反母喜笑爲飲食語言異於他時或無所岀母怒爲之不食故不疑爲吏嚴而不殘鮑宣妻桓氏勃海桓氏女字少君宣常就少君父學父奇其清苦以女妻之裝送甚盛宣不說妻乃悉歸侍御服飾更著短布裳與宣共輓鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之唐趙氏女滄州鹽院吏趙璘之女咸通六年璘犯罪應死將刑女請隨父死自訴七歲喪母父長育之辭㫖甚哀鹽使崔據義之遂具以聞詔嘉之且減璘死宋賈玭妻王氏黃中母也黃中參知政事太宗召見其母命坐謂曰教子如是真孟母矣作詩賜之頒賜甚厚黃中改知澶州陛辭上謂侍臣曰朕甞念黃中母有賢徳七十餘年未覺老每與之語甚明敏後黄中卒旣葬母入謝上賜白金三百兩謂之曰勿以諸孫爲念朕當不忘也元劉平妻胡氏滄州人至元閒平當戍棗陽軍攜家以行夜宿沙河有虎銜平去胡氏拔刀追及斫虎扶平扺陽城以傷卒事聞詔卹其母子仍旌異之明樊德華妻楊氏靜海人正徳間流賊陷靜海𬒳虜氏怒罵賊以金帛誘之終不屈遂遇害屍僵立不仆陳俞妻賈氏慶雲人正德六年兵變值舅病卒家人挽之去氏痛哭曰舅尚未歛婦何惜一死兵至縱火迫之出罵不絶口刃及身無完膚與舅屍同燼年二十五馬氏女青縣人崇禎十二年兵變女年十六𬒳逼不從遇害王文棟妻劉氏鹽山人崇禎已卯兵變攜女避地窖中兵搜得欲犯之氏投地詈罵母女同被戕馬斯臧妻姜氏慶雲人結縭甫三月斯臧卒氏欲從死不得㑹祭墓姑令小姑與之偕氏紿小姑曰燎𥿄用薪可往採之小姑行氏遂縊于墓側本朝馮鼎錫妻