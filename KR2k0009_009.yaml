body:
  text: 天津府在直隸省治東四百六十里東西距一百八十里南北距三百三十三里東至海一百里西至順天府霸州界八十里南至山東武定府樂陵縣界三百里北至順天府武清縣界三十三里東南至山東武定府海豐縣界三百二十里西南至河間府東光縣界三百一十里東北至順天府寶坻縣治一百六十里西北至武清縣界一百二十里自府治至京師二百五十里分野天文尾箕析木及虚危元枵之次府治及靜海青縣為燕分野滄州以南屬虚危之宿為齊分野建置沿革禹貢冀兗二州之域府治屬冀滄州屬兗周為幽兗二州之域戰國為燕齊二國之境秦為漁陽上谷二郡地漢為漁陽勃海二郡地後漢因之晉為燕國章武國及勃海郡地後魏為浮陽章武勃海三郡地分屬滄瀛冀三州隋屬河間勃海二郡地唐為瀛滄二州地宋金為清滄二州地元因之明永樂初置天津左右三衞為河間府地本朝初設關置總兵鎮守雍正三年改天津衞為直隸州九年升為天津府領州一縣六天津縣附郭東西距一百三十五里南北距七十里東至海一百里西至靜海縣界三十五里南至靜海縣界三十五里北至順天府武清縣界三十五里東南至海一百十里西南至靜海縣界二十里東北至順天府寶坻縣界五十里西北至武清縣界五十里本漢勃海郡章武縣及漁陽郡泉州縣地唐以後為滄州地元為靜海縣地置海津鎮明永樂二年築城置戍三年置天津衞及天津左衞四年人置右衞本朝初因之雍正二年改衞爲州九年升爲天津府置天津縣爲府治靜海縣在府西南七十五里東南距二百里南北距百里東至海一百六十里西至順天府大城縣界四十里南至青縣界四十里北至順天府武清縣界六十里東南至滄州界七十五里西南至青縣治九十里東北至武清縣界七十五里西北至順天府霸州治一百二十里本漢章武東平舒二縣地宋爲清州窩口砦金明昌四年以其地置靖海縣屬清州元至元二年并入會川縣尋復置屬清州明洪武初改靖曰靜七年屬河間府本朝初因之雍正三年改屬天津州九年屬天津府青縣在府西南一百六十里東西距六十七里南北距一百四十里東至靜海縣界四十里西至順天府大城縣界二十七里南至滄州界九十里北至靜海縣界五十里東南至滄州界三十里西南至河間府交河縣界七十里東北至靜海縣界四十五里西北至大城縣界四十里漢置參户縣屬勃海郡後漢省入章武縣隋爲長蘆魯城二縣地唐乾寕中置乾寕軍五代晉天福初地入遼置永安縣寕州周顯德六年收復仍曰乾為治宋初軍廢屬滄州太平興寕軍並置國七年復置乾鎮元寕軍並改永安縣曰乾寕熙符二年復置縣崇寕三年又寕六年省縣為省縣大觀二年升乾寕軍為清州清州屬河北東路政和三貞元元年賜名乾寕郡金仍曰年改縣曰㑹川元太宗二年改州曰清𥘉省㑹川縣入寕府七年復曰清州屬河間路明州洪武七年廢清州為青縣屬河間府改屬天本朝初津州九因之雍正三年年屬天津府滄州在府南少西一百八十里東西距一百三十里南北百三十里西至青縣界一距七十五里東至海一百步南至南皮縣三十五里陵縣北至青縣界四十里東南至山東武定府樂界一百里西南至河間府交河縣界七十里東北上谷至海一百三十郡地漢高帝五里西北至青縣治七十里秦年置勃海郡治浮陽縣屬冀州後漢徙郡治南皮以浮陽為屬縣晉因大和十一年於浮陽縣置浮陽郡熙平二之後魏年又分置滄州蘆縣置治饒安縣隋開皇初郡廢於後周漳河郡尋廢十六年又分置景州所置長十八年改浮陽縣曰清池大業初二州皆廢為勃海河間二郡地唐武徳元年復置滄州治清池天寶元年改景城郡乾元元年復曰滄州屬河北道興元三年置橫海軍節度使五代梁乾化三年改曰順化軍後唐復曰横海軍宋亦曰滄州景城郡橫海軍節度屬河北東路金仍曰滄州元屬河間路明洪武初始以州治清池縣省入屬河間府本朝初因之雍正七年升為直隸州領南皮鹽山慶雲東光四縣九年改屬天津府南皮縣在府西南二百五十里東西距七十里南北距八十五里東至滄州界五十里西至河間府交河縣界二十里南至河間府寕津縣界五十里北至滄州界三十五里東南至山東武定府樂陵縣界七十里西南至河間府東光縣界十五里東北至滄州治七十里西北至河間府河間縣治一百四十里秦置南皮縣漢屬勃海郡後漢移郡來治晉因之後魏世祖改郡曰滄水太和二十一年復故東魏移郡治東光以南皮屬之隋屬勃海郡唐武德四年屬觀州貞觀元年屬滄州長慶二年改屬景州太和四年又還滄州景福元年又屬景州五代周顯德二年屬滄州宋金元明俱因之本朝初屬河間府雍正七年屬滄州九年改屬天津府鹽山縣在府南二百六十里東西距八十里南北距一百里東至山東武定府海豐縣界六十里西至滄州界二十里南至山東武定府樂陵縣界四十里北至滄州界六十里東南至慶雲縣界三十里西南至河間府寕津縣治一百二十里東北至海一百二十里西北至滄州界二十里春秋齊無棣邑漢置高城縣屬勃海郡為都尉治後漢曰高成侯國晉因之後魏太和中屬浮陽郡興和十分立東西河郡及隰城縣武定末罷仍屬浮陽郡隋開皇十八年改曰鹽山屬勃海郡唐武徳四年置東鹽州貞觀元年州廢改屬滄州五代宋金元明俱因之本朝初屬河間府雍正七年屬滄州九年改屬天津府慶雲縣在府南少東三百二十里東西距四十五里南北距四十五里東至山東武定府海豐縣界三十里西至鹽山縣界十五里南至山東武定府陽信縣界三十里北至鹽山縣界十五里東南至陽信縣界三十五里西南至山東武定府樂陵縣界二十里東北至海豐縣界二十里西北至鹽山縣治六十里春秋齊北境漢勃海郡陽信縣地隋開皇六年分置無棣縣屬勃海郡唐初屬滄州貞觀元年并入陽信八年復置太和二年改屬棣州尋還滄州五代因之宋治平元年徙治東界元初分無棣之半置西無棣縣仍屬滄州至元二年並入樂陵尋復置明永樂初避諱改曰慶雲仍屬滄州本朝初屬河間府雍正七年屬滄州九年改屬天津府形勢東環大海西眺瀛滄枕漳衞之長流倚盧白之重阻北瞻京邑居然屏翰南俯登萊似列几筵天津廳壁記地當九河津要路通七省舟車舊衞學記千淀歸墟百川赴壑輸將要地商賈通津舊衞志風俗地當衝要人雜五方重修分司署舊記民性淳良俗皆敦朴以農桑為先務以詩書為要領舊衞志城池天津府城周九里十三歩門四外有濠明永樂二年建本朝雍正三年奉敕修乾隆二十六年重修天津縣附郭靜海縣城周六里門三濠廣二丈八尺本朝乾隆十二年修青縣城周五里門三濠廣二丈宋時建本朝乾隆十二年修滄州城周八里門五濠廣四丈五尺明天順五年建本朝乾隆八年修南皮縣城周二千三百丈門四明萬厯四十二年改建本朝乾隆十三年修鹽山縣城周九里門三外有濠明成化二年建本朝康熙九年岐乾隆十三年重修慶雲縣城周四里門三濠廣二大明成化三年築本朝順治康熙年間修乾隆十四年重修學校天津府學在府治東即舊衞學明正統元年建本朝雍正十一年修入學額數二十五名商學十五名天津縣學在府學西本朝雍正十二年建入學額數十八名靜海縣學在縣治東南明洪武初建入學額數十八名青縣學舊在城内明洪武四年移建縣東衞河西岸萬厯十三年又改建於舊學西入學額數十五名滄州學在州治東南明洪武𥘉建本朝順治年間屢修入學額數十五名南皮縣學在縣治東南元至元三年建本朝順治中修入學額數十二名鹽山縣學在縣治西北明洪武九年建本朝順治九年修入學額數十五名慶雲縣學在縣治東南明洪武六年建本朝康熙年間修入學額數十二名問津書院在天津府城内本朝乾隆十六年建嘉慶十二年修三取書院在天津縣治東本朝康熙五十八年建乾隆二十年修嘉慶十二年重修瀛海書院在静海縣治本朝乾隆二十一年建嘉慶元年知縣莫謩修滄曲書院在滄州治本朝乾隆二十三年建香魚書院在鹽山縣治本朝乾隆三年知縣金昌世建古棣書院在慶雲縣治本朝乾隆六十年知縣張元英建户口原額人丁三萬二千四百三十五今滋生男婦大小共一百六十萬八百二十二名口計三十七五萬一十二百户田賦田有地五奇額萬二徵地千丁七正百二雜銀十八一十頃一三萬十二八畝千八二分百九十六九十兩七七石錢五三斗分八六升釐豆八合四二百勺山川中山在青縣瀑數十南丈二俗里山呼為巖高高土聳懸岡西山在西青縣南五里衍四周昔人高峻甞立其砦頂於平此條山在滄舊志州謂城北三里唐陽城所隱按今攷山城所在滄居州中條二山山在牽合蒲州並稱此與中山彼無在涉青不縣可條從大小台山大金台史山地在理南志皮南縣皮北縣小有台大山小在台其山東河北按間府舊志州謂者在滄非篋山在山鹽山北魏縣東氏土水經地記注曰浮高水東城東逕篋北五十山里寰有篋宇記山長七篋山一里名隋峽書山地在理志鹽山縣東南四有十箧里鹽山隋元書和地理志在志鹽縣東山南縣八有鹽山十里闊山寰宇縣東記南在九鹽山十里郡國縣道記曰此山及鹽山並低小無峯巒樹木舊志縣東南境止三十五里無鹽闊二山即境外亦無之騮山在鹽山縣東北七十里接山東海豐縣界一名小山老烏山在慶雲縣寰宇記無棣縣有老烏山縣志起縣治東南由學宫跨文運井左縁城址蜿蜒一里餘至於鬲津北岸長城嶺在慶雲縣南四十里又有卧龍岡在縣東南二里鬲津河中五龍岡在南皮縣南五十里相傳神女產龍處有卧兒臺拖裙嶺過街樓下有龍灣又有覆盆井在岡下姚村渤海在天津縣東一百二十里南自鹽山縣東北接山東海豐縣界又北經滄州青縣靜海至府東諸川滙入處折東北接順天府寶坻寕河二縣界古曰勃海應劭曰海之旁出者為勃漢置勃海郡以此按天津舊稱海套東連旅順南控登州廟島為重𬈑門户中復有沙橫亙如闑洋舶非乘潮不能進故明季倭寇從未敢至天津元時海運皆由東直沾入口至明永樂中㑹通河成始罷本朝瀛海恬波梯航重譯康熙中盛京嵗歉自津轉粟不三日而即逹近則盛京糧羨值平估販者雲集津門矣乾隆三十二年高宗純皇帝廵幸天津有御製觀海詩紀其事南運河即衞河自河間府東光交河二縣流入逕南皮縣西又北逕滄州城西又北入青縣境滹沱舊河及老漳河自西來㑹之又北逕靜海縣城西又北流至天津縣西折而東北與子牙河北運河合曰三岔河又東流入於海即古清漳二水所合流也唐宋以來謂之永濟渠水經注清河自東光縣東北逕南皮縣故城西又北逕北皮城東左㑹滹沱别瀆又東北浮水故瀆出焉又北逕浮陽縣故城西又東北滹沱别瀆注焉謂之合河又東北過􅐮邑北􅐮水出焉又東北過鄉邑南又東北逕紵姑邑南又東北逕窮河邑南東北至泉州縣北入滹沱又東逕漂榆邑故城南入於海又曰衡漳逕建成縣左㑹滹沱别瀆又東北入清河謂之合口又逕北皮亭浮陽縣章武縣故城西枝瀆出焉謂之􅐮水東北逕參户渟北又逕東平舒縣故城南又東北分為二水一水右出為澱一水北注滹沱謂之􅐮口清漳亂流而東注於海寰宇記永濟河在清池縣西三十里自南皮縣入乾寕軍亦呼為御河又御河在乾寕縣南十歩從滄州流入又東北一百九十里入潮河合流向東七十里於獨流口入海金史地理志南皮清池㑹川三縣皆置河倉舊志衞河自滄州以下本西漢時大河所經東漢以後為清漳二瀆所經隋時開為永濟渠宋皇祐初河合永濟渠仍為大河所經南渡後大河南徙而衞河如故金元以來皆漕運所經也張希良河防考天津運河北自武清縣界三岔河起南至東岸南皮縣西岸交河縣界止厯天津靜海青縣滄州共三百四十五里本朝乾隆二年以後屢經疏治増築隄壩其興濟捷地兩減河所以分洩運河盛漲亦節次疏濬使暢流無滯三十年復以青縣之鮑家嘴為舊滹沱河老漳河黒龍港諸河及故城景州阜城東光交河諸州縣􅅹水所歸每當南運河盛漲時鮑家嘴不能下注反虞運河之倒灌而西乃於青縣之十里窪開挑引河由新河口下入於千金泊歸子牙正河其鮑家嘴仍建石閘一座視内外水勢盈縮以時啓閉於是旁流無壅運道益安北運河在天津縣北亦名白河即潞河也自順天府武清縣流入至縣北三岔口與南運河會詳見順天府子牙河即滹沱下流自河間府獻縣西南分流入靜海縣與大城分界以經子牙村得名又東北流入天津府城北與南北二運可㑹為三岔河入海河歸海舊志一名鹽河又名沿河按子牙河自大城縣之張家莊下至王家口正支分流其修濬工程詳見順天府志至王家口以下向與淀通易致淤塞本朝乾隆十年自王家口之北莊兒頭起築格淀隄東屬於天津之紅橋以隔别之使大河别由陳家泊改溜東行三十二年高宗純皇帝巡幸天津相視河淀以莊兒頭西至三灘里為子牙入淀舊道今河水北趨而淀水往往南溢為患因命接築淀隄十六里餘西屬於千里長隄自是清淀濁流更無侵溢之患嘉慶十七年復加疏濬滹沱河自河間府獻縣之完固口分流出單家橋東行經青縣南七十里之杜林鎮與老漳河㑹至鮑家嘴入南運河謂之合河口本朝雍正四年以濁流淤運塞完固口使滹沱專由臧家橋東流為子牙河而故道遂為無源􅅹水所歸近年屢經濬治按漢志滹沱河從河東至文安入海寰宇記高陽莫縣大城文安皆為滹沱所經蓋古滹沱經流本在河間西北合易水而東今子牙河自獻縣分流由文安大城而東其上流雖南徙而下流則與古合乃滹沱正流也其自青縣西南來合漳河者乃樂成之滹沱别河舊以子牙為支水而入漳之别瀆反謂之正流乃沿襲之誤又舊志謂水經注獨缺滹沱今按水經雖無滹沱之目而濁漳易滱巨馬諸篇中往往互見且滹沱大川見於周禮禮記桑經當自為一篇考寰宇記於蒲津滋水白馬渠大浦淀各條下凡四引水經皆有滹沱之文而今本水經注無之可知水經原有滹沱水篇宋初尚存而其後散佚耳竟謂桑酈獨缺此水亦非也漳河自河間府交河縣界來至杜林鎮與滹沱舊河合又北至青縣南二里鮑家嘴合於南運河其合處曰岔河口亦曰汊河口水勢洶涌闊數十丈按漳水自山東邱縣分流一北行至冀州合滹沱所謂新漳河也一東北行至青縣合滹沱入衞所謂老漳河也今自上流改由館陶入衛二支皆微又按水經注衡漳水自建成東北合清河唐書薛大鼎爲滄州刺史衡漳二渠洩汙漆水不爲害地理志清池縣西四十里有衡漳隄二顯慶元年築西北六十里有衡漳東隄開元十年築寰宇記衡漳水在廢乾符縣西六十里皆在今滄州界内舊志謂今漳水自交河東北入青縣不經州界以州西至衞河青縣界僅一百歩故屬青縣非水道有改也古界河在静海縣西北亦曰潮河古名爲滹沱易水巨馬三水匯流處自文安運河入合南運河宋遼以此河爲界故名今文安大城之水皆㑹於武清縣三角淀入白河不入南運河矣減水河有二一在滄州南十五里甎河以近捷地鎮今亦呼捷地減河一在青縣南興濟鎮曰興濟河皆明宏治中開以洩衞河泛溢之水久堙塞本朝雍正四年重濬甎河百二十里興濟河九十里各建滚水石壩引水分入海港滄青水勢藉以宣洩乾隆二年以後屢經疏導令汎員專司啓閉三十二年高宗純皇帝命重加修築運河益收分洩之利三十六年並疏濬下游引河及歧口入海處俾成建瓴之勢焉清河在青縣西南五十里又有湛河泗河共三河皆無源爲交東北北入流經滄於海又州南有迎十里又北經州河在清池縣西城東一里又東南二十三里從南皮來分漳州東南五十河入四里浮水舊鹽山縣志浮水東北百在滄里陽通河在滄州東南唐書地理志清池縣東南河開元十六年開又縣南十五里十五里有陽通有陽通河隄亦是年築屯氏河在縣滄州南自南皮流入界漢書地理志屯氏又東入河東北鹽至山章武入河唐海顔師古曰屯音大書地理志南皮縣古門反隋室毛河自臨誤以津經為毛氏縣入清池開七里元十年從南皮開寰宇記毛來又呼為棣河在河又清池縣屯氏小西南五十河在鹽山縣南十北流入歩東海無棣河自南皮縣流逕滄州逕鹽山慶雲二縣入南又東海豐縣界水經注清河自南皮縣故城南又東光東逕又東北樂亭北無棣溝岀又東逕新焉東逕鄉城北又東分城南又為二瀆又東逕樂陵郡北又東南逕高城縣故城南與枝東逕宛瀆合枝鄉故瀆上承無東又棣溝南逕樂陵東北注無棣溝郡西又東南逕千童縣故城無棣溝又東北逕鹽山東北入海元和志無棣河在饒安縣南二十里唐書地理志清池縣西南五十七里有無棣河開元十六年開又無棣縣有無棣溝通海隋末廢永徽元年刺史薛大鼎開寰宇記無棣河一名赤河在饒安縣東南四十里又東逕無棣縣南又東與鬲津枯溝合而入海舊志有古河自南皮流經鹽山縣南四十里又東經慶雲縣北十二里又東至崔家口與鬲津河㑹經海豐縣入海疑即無棣河或以為即古黃河石碑河在滄州􅰫河之南自蔡家窪東北流經舊滄州與􅰫河㑹長一百五十餘里此河無源為境内􅅹水所歸本朝乾隆十二年開濬寛深於是各窪之水得所容洩無泛溢之患又大蓮淀在石􅰫河東南寛二十餘里雖旱不涸魚蒲之利居民賴焉明溝河在滄州西唐書地理志清池縣西四十五里有明溝河隄二皆永徽三年築獻河在慶雲縣南本名陷河齊乘東無棣縣北有陷河濶數里西通德棣東至海舊志在慶雲縣南三十里即寕津縣土河之下流自樂陵縣流入分南北二派南派入霑化北派由慶雲至海豐馬谷山前土河口入海按此河齊乘以為即鈎盤河縣志以為即篤馬河之别名又謂即禹貢簡河恐皆無據大河故道在府南自河間府東光縣流入經南皮滄州青縣静海而逹於天津此西漢時大河入海之道亦即宋時河合河水至章武入永濟渠北流之道也漢書地理志海水經注大河故瀆東北至東光故城西而北與漳水㑹又淇水注云清河自東光縣又東北右㑹大河故瀆又東北逕南皮浮陽二縣西漳水注云衡漳水東北過章武縣西又東北過平舒縣南東入海蓋西漢以前河自東光北至章武漳衞皆合之以達海水經注所謂清漳二瀆河之舊道也王莽時河東徙千乘其故道遂為漳衞所占至宋皇祐元入海即今衞河所行年河自澶州合永濟渠北流之道也宋史河渠志黃御河帶北行入獨流東砦經乾寕軍滄州等八砦邊界直入大海其近海口闊六七百步深八九丈三女砦以西闊三四百歩深五六北之獨流口海口今直沽入丈獨流砦即静海縣海之處也其在今南皮鹽山慶雲及山東海豐諸縣界者乃宋嘉祐中二股河東流之故道宋史河渠志初商湖決河自魏之北至恩冀乾寕入於海是謂北流嘉祐八年河流派於魏之第六埽遂為二股自魏恩東至德滄入於海是謂東流熙寕初議者專欲導東流閉北流元豐四年河復注於御河於是北流盛而東流閉元符二年河大決於内黃於是並勢北行而東流遂絶河間府志寕津縣古黄河隄在縣西三十里東北入南皮界或謂即鬲津河故道慶雲縣志古黃河自南皮由鹽山孟家店至慶雲縣黒牛王店又東逕海豐境達於海即古無棣河或謂即宋時二股河故道也又按禹貢導河又北播為九河同為逆河入於海孔安國傳同合為一大河名逆河而入於勃海漢書地理志勃海郡莽曰迎河南皮縣莽曰迎河亭寰宇記迎河在清池縣西南二十三里從南皮來説者謂迎河即逆河古時九河至南皮縣界合流今天津北之直沽為衆流所歸潮汐迎之則逆行而上疑即所謂逆河上至滄州南皮以㑹九河蓋直沽即逆河入海之處東光南皮之間乃九河㑹流之始也九河故道在府南滄州諸縣界一曰徒駭河在滄州西唐書地理志清池縣西五十里有徒駭河隄永徽三年築宋史河渠志元符三年張商英請開木門口泄徒駭河東流是也一曰胡蘇河自河間府東光寕津流入經南皮滄州慶雲入山東海豐界元和志胡蘇河在饒安縣西五十里寰宇記一名赤河其水赤渾色在無棣縣西三百歩自饒安縣東一百里入海舊志在慶雲縣西南十二里流經分水鎮東北十三里與鬲津河合是也一曰在南皮慶雲鹽山三縣界南皮縣志河在鬲津河縣東南四十五里又東逕慶雲縣金史地理志無棣縣有鬲津河慶雲縣志自山東樂陵縣流入又東北經鹽山三里縣崔家口有汊河即又東入山東海豐縣界又縣西南鬲津之支流縣西五里有紀家河亦流入二十二鬲津河又滄州志有覆釡河在慶雲縣南里即鈎盤北派自山東樂陵縣流入又東入海豐縣界金史地理志南皮縣有潔河明一統志在南皮城外十餘步又太史河在縣治北又慶雲縣志有馬頰至縣城東南隅河自山東樂陵縣流入經分水鎮入鬲津河又有篤馬河在縣南三十里即禹貢簡河也按九河之書溝洫志成帝時許商言古説九説諸家不一漢河之名有徒駭胡蘇鬲津三河今見在成平東光鬲界中漢時近古止得其三唐人遂得其六輿地廣記又得其一故昔人以為皆似言謂爾雅九河之是而非孔穎達尚書疏據許商次從北而南既知三河之處則其餘六者馬頰太史覆釡在東光簡潔鈎盤在東光之南鬲縣之北之北成平之南其河填塞時有故道今處于欽河間弓高以東至平原鬲津往往有其遺齊乘謂衝漳即徒駭清滄二州之間有古河隄數重太史等河當在其地滄州之南有大蓮澱西踰東光東至海即胡蘇河澱南至西無棣縣百餘里間有大河沙河即簡潔河東無棣北有陷河即鈎盤河濱州北有士傷河即鬲津河舊志多採其説然亦未可盡信至今棣一縣之地近志所載遂有慶雲海豐不過隋無六七其附會可知然徒駭胡蘇鬲津自屬有據則其餘六河故當不逺聖祖仁皇帝御製論九河蹟相去故道折衷羣籍謂指在濟南者過南指在永平者過北當不岀今滄景二三百里間而逆河入海亦在今天津之直沽昔之聚訟無稽始有定論矣直沽在府城北南則衞河合南路之水北則白河受北路之水西則丁字沽受三角淀之木皆至北三岔口合流東注舊名小直沽其東南十城東里曰大直沽地勢平衍每遇霖潦羣流漲溢故有大直沽之名又東南百餘里為大茫無涯涘沽口衆水由此入海即通典所云三㑹海口也新志亦謂之海河南北運淀河之㑹流也自天直沽今津東北三岔口迄大沽口長一百二十里葛沽在天津縣東九十里相去十里曰新河又曰大沽長四十餘里明天順初議開海濱二沽以通薊州運道即北又東為郝家沽合大沽流入海鹹水沽在天津縣東南六十里業十二年厭次人格謙即古豆子䴚也為盜在豆子䴚隋書大中王世充破斬之括地志自渤海至平原其間濱海之處土人多謂之豆子䴚羅氏曰河間之豆子䴚今鹹水沽是也東去縣志鹹水沽在海四十里地斥鹵廣數十里靜海東一百二十里乃出海要地本朝乾隆四年於鹹水沽開引河一道遶大韓家莊巨葛莊等處宣洩大泊及秋漢港之積水使歸海河並建有閘座以時宣節二十九年總督方觀承以鹹水沽地勢本高不虞海潮倒灌奏請改石閘爲木橋其引河則屢經疏濬俾􅓵利導焉西沽在天津縣北三里子牙河入北運河處也其上流爲大清河又丁字沽在西沽北清河入運河縱横作丁字形故有是名自此達北運河長四十里淀水浩淼至是始有涯岸故又名曰河頭本朝乾隆三十二年高宗純皇帝廵幸天津迴鑾經西沽閲視有御製詩明月沽在慶雲東北七十里胡蘇鬲津諸水匯聚於此爲濱海產鹽之所平虜渠在滄州北元和郡縣志在魯城縣郭内魏武北伐匈奴所開寰宇記在廢乾符縣南二百步劉公渠在鹽山縣西南五十里縣境舊承無棣溝下流大小羣川悉附入海無棣溝塞每患泛溢明萬厯四十二年知縣劉子諴自縣西南開渠至縣東南四十里高家灣合古黃河入海今復堙十字圍在天津城東南五十里明萬厯時江應蛟爲天津巡撫見白塘葛沽一帶地斥鹵不耕種乃穿渠灌水墾稻田二千餘畝以防海官軍萬人分種屯政火興本朝雍正八年陳儀爲營田觀察使於天津仿應蛟遺制築十字圍三面開渠與海河通潮來渠滿則閉之以供灌溉白塘葛沽之間斥鹵盡變膏腴李彪淀唐書地理志清池縣西五十里有李彪淀東隄永徽三年築舊志在滄州西南十里塌河淀在天津縣東北田十里起寕河縣迄天津攩道沽周百里為北運河筐兒港減水容畜之地按天津諸水在運河北者以塌河淀為歸宿其下游由賈家沽陳家溝二河入海河歸海歲久淤塞本朝雍正六年乾隆九年屢加疏濬其西又有賈家口河亦以洩塌河淀之水與陳家溝匯流入海河乾隆十一年並經挑濬寛深使淀水暢流無盈溢之患盤古溝在青縣南為黒龍港東支及滹沱故道所經又受上游無源􅅹水運河每不能容本朝乾隆三十年於此濬河築隄使東支暢逹於中支而滹沱故道之水亦得資分洩之利九域志謂乾寕縣有盤古溝水深三丈大旱不涸者即此尹兒灣在天津縣東明永樂六年陳瑄總督海運創百萬倉於直沽尹兒灣築城置衞今去城八里有運糧河舊自海口達尹兒灣之運路也黑龍灣在鹽山縣南十八里河間府舊志有土臺高丈許上建龍王廟夏秋積水成川西濼在青縣東南廢興濟縣西南東西横亙凡十餘里南北二十餘里秋水四至一望無際三堂濼在滄州北宋史河渠志熙寕六年命屯田使閻士良專修樸椿囗增灌東塘淀濼先是滄州北三堂等塘濼為黃河所注其後河改而濼塞程昉嘗請開琵琶灣引河水而功不成至是士良請堰水絶御河引西塘水灌之故有是命舊志今堙廢無考仵清池在滄州東南元和志在凊池縣東南十五里寰宇記在縣東南十九里水澄味鹹未嘗枯涸輿地廣記浮陽城南有大蓮淀魏延興二年淀水溢注破仵清村因潴為池池内時有鯔魚言與海潛通齊乘今曰大梁五龍堂元至元間重濬州志堂有八角井每大旱禱雨輒應薩摩陂在滄州北元和志在長蘆縣北十五里周迴五十里有魚蒲之利馬家口在天津縣東南一里許洩南淀之水又寇家口在縣南十里許通水淀之利獨流口在静海縣北二十里寰宇記御河合潮河東北至獨流口入海按九域志宋史河渠志皆以獨流口為御河入界河之蓋入海處其東處寰宇記則以為御河入海之處口也又明統志有獨流河在興濟縣北縣四至十靜海五里郎兒口在滄州南接南皮縣界元史河渠志延祐三年滄州民告往水年御河水無所洩浸溢民萬户恐傷其屯田築塞郎兒口故田廬乞遣官疏闢四年都水監遣官相視減水故郎兒口道名曰及下流盤河令故河至滄州三十開郎兒口增濬故餘里乃河決積水州由南滄州城北四十里去達滹沱河以入海南皮縣東北四十舊志五里郎今兒口在名邱淀俗呼為蔡家窪毛公井在舊滄州志清池縣城内有甘東北隅唐井開元二書十地理年縣令毛某母老苦穿池湧泉而甘水鹹無以養縣舎民謂之毛公井前提調官臣沈兆澐恭纂輯提調官臣王廣䕃恭覆輯校對官臣王式和恭校校對官臣沈維鈺恭覆校大清一統志天津府二古蹟漂榆故城在天津縣北晉咸康四年石虎遣其將桃豹王華帥舟師十萬出漂榆津即此水經注清河東逕漂榆邑故城南俗謂之角飛城趙記云石勒使王述煮鹽於角飛即城異名矣魏氏上地記曰高城縣東北一百里北盡漂榆東臨巨海民煮海水藉鹽為業即此城也清河自是入於海參户故城在青縣南漢元朔三年封河間獻王子免為侯國屬勃海郡後漢省水經注􅐮水東北逕參户亭應劭曰平舒縣西南五十里有參戸亭故縣也世謂之平虜城元和志參户故城一曰木門城在長蘆縣西北四十里寰宇記在縣西北四十六里輿地志云中有大樹因名木門舊志木門鎮在今縣西南三十里蓋以故城得名長蘆故城今滄州治本漢參户縣地後周大象二年置長蘆縣以水為名隋初於縣西北三里置漳河郡以縣屬之郡尋廢十六年置景州大業二年廢屬河閒郡唐武徳四年又置景州五年置總管府貞觀元年州廢屬滄州舊治永濟河西開元十四年大雨漂没十六年移治河東一里宋乾徳二年廢入清池後復置熙寕四年又省為鎮入清池明永樂初移州治於此浮水故城在倉州東隋開皇十六年分高城縣置大業初仍省入唐武德五年又置屬東鹽州貞觀元年省十二年移饒安縣治此屬滄州宋熙寕四年省為鎮入清池金史地理志清池縣有新饒安鎮即此府志浮水故城在州東五十里按此城自貞觀中為饒安縣治元和志寰宇記皆以饒安為在州南九十里然考浮水東北流未嘗南岀當從府志在州東為是其在州南者則故千童城也滄州故城在今滄州東南漢置浮陽縣在浮水之陽故名後漢建武十五年封劉植兄歆為侯國屬勃海郡後魏太和十一年改置浮陽郡屬流州景明初罷