body:
  text: 翁牛特二旗在古北口東北五百二十里東西距三百里南北距一百六十里東至阿嚕科爾沁界西至熱河禁地界南至喀喇沁及敖漢界北至巴林及克什克騰界至京師七百六十里建置沿革唐饒樂都督府地遼置饒州匡義軍節度屬上京道統長樂臨河安民三縣金為北京路地元為上都路地明初以烏梁海部長置衞為外藩後自稱翁牛特服屬於阿嚕科爾沁烏梁海改見前本朝天聰七年其濟農遜杜棱偕其弟棟岱青率部落來歸崇德元年封遜杜棱為多羅杜棱郡王世襲主右翼至嘉慶十一年以拉特那濟爾迪襲封凡十一世附鎮國公二一崇德八年封世襲一康熙六十一年封輔國公尋晉貝子累襲至嘉慶二十一年降襲鎮國公棟岱青亦於崇德元年賜多羅達爾漢岱青號世襲主左翼順治十一年晉封其子叟塞為貝子十八年晉封貝勒至嘉慶二年以達瑪琳扎布襲封凡九世共爵四其貢道由喜峯口遜杜棱舊作索音今改正右翼駐英什爾哈齊特呼郎在古北口東北五百二十里東西距二百四十里南北距一百六十里東至左翼界一百二十里西至熱河禁地界一百二十里南至喀喇沁右翼界八十里北至克什克騰界八十里東南至敖漢界九十五里西南至喀喇沁右翼界六十里東北至左翼界六十里山在右翼南三十里蒙古名阿惠喀喇山半有三洞内有佛像及金皇統三年明萬厯四十五年兩碑碑上刻遮蓋山靈峯院千佛洞云馬囊噶山在右翼西南四十五里山東麓有一塔巴倫桑噶蘇台山在右翼西南一百十里大黑山有二一在右翼西南一百二十里一在右翼西四十里蒙古名巴顏喀喇額類蘇圖山在右翼西南一百二十里松山在右翼西南一百二十里蒙古名納喇蘇台徒古爾喀喇山在右翼西七十里奴克爾山在右翼西八十里博多克圖山在右翼西一百里柞山在右翼西一百五里蒙古名敖爾折烏魯蘇圖山在右翼西一百五里舍爾吐山在右翼西一百十里温都爾花山在右翼西一百十里虎山在右翼西一百十里蒙古名巴爾圖鄭庫納山在右翼西一百十里慶雲山在右翼西一百十五里蒙古名墨爾根得伯僧山在右翼西一百二十里杈枒山在右翼西一百二十里蒙古名碧頭蛇爾巴顏布爾噶蘇台山在右翼西北一百里老虎山在右翼西北一百五里蒙古名鄂爾查爾巴爾圖黃山在右翼西北一百四十里蒙古名洪戈爾峩博又名泥杵渾都爾碧爾山褪莫克山在右翼西北一百六十里他賁虎都克山在右翼北三十里烏得呼花山在右翼北五十里馬鞍山在右翼北六十里蒙古名西喇得伯僧海他漢山在右翼北八十里方山在右翼東北二十里蒙古名都爾巴金蟠羊山在右翼東北三十里蒙古名衣馬圖小黑山在右翼東北四十里蒙古名巴哈喀喇恩德山在右翼東北四十五里蒙古名拜斯哈爾布爾克爾圖山在右翼東北五十里繫輪山在右翼東北六十里蒙古名特克爾忒俄爾綽克山在右翼東北六十五里小華山在左翼東二十里蒙古名巴哈哈爾占大松山在左翼東二十里蒙古名伊克納喇蘇台兆呼圖插漢拖羅海山在左翼南五十里河拖戈沁山在左翼西南八十里俄爾綽克山在左翼西南八十里蟠羊山在左翼西南一百里蒙古名衣馬圖勃突山在左翼西三十里蒙古名布墩吐頽山在左翼西四十里蒙古名巴爾哈岱山丹山在左翼西一百三十里蒙古名薩喇納台喀喇古爾板土爾哈山有二一在左翼西北七十里一在左翼北三十里翁戈綽爾山在左翼西北一百三十里神山在左翼西北一百四十里蒙古名翁公叟几山在左翼西北一百五十里柳山在左翼西北一百五十里蒙古名布爾噶台哈達圖山在左翼北三十里􅊵麛山在左翼東北四十里蒙古名布靖克五藍峯在右翼東三十里席喇諾海五藍峯在右翼西南一百里扎喇峯左翼所駐地哈馬爾峯在左翼西一百五十里阿爾齊土插漢岡在左翼東南八十里碧七克圖嶺在右翼南八十里賀爾圖嶺在右翼西南六十里拜布哈嶺在右翼西南一百二十里鵰窠嶺在右翼西七十五里蒙古名岳洛圖楊木嶺在右翼西北一百二十里蒙古名烏里雅蘇台色爾和朔嶺在右翼西北一百二十里蝦蟆嶺在右翼西北一百五十里梟嶺在左翼西南一百十里蒙古名烏里烏拉岱谷在右翼西一百十里西白河在右翼南八十里自喀喇沁北流入境東北流㑹獐河入老河按翁牛特為今承德府之赤峯縣境故如潢河老河西白河諸水彼此互見焉獐河在右翼西南蒙古名西爾哈自喀喇沁流入境東北流經巴顏喀喇山東北㑹英金河又東經五藍峯北入老河高凉河在右翼西南一百二十里蒙古名拜布哈源出拜布哈嶺東南流㑹布墩河入宜孫河布墩河源出右翼西南一百五十里西流㑹宜孫河南入灤河車爾伯呼河在右翼西八十里源出奴克都呼爾山東南流㑹獐河巴倫撒拉河在右翼西一百十五里源出葛爾齊老東北東南流經巴爾圖山折東北流㑹烏拉岱河烏拉岱河在右翼西北一百二十里源出楊木嶺南流經博多克圖山折東北流㑹獐河英金河在右翼西北一百五十里亦曰潁河源出蝦蟆嶺東南流㑹獐河又東入老河珠爾河在右翼西北一百五十里東南流會奴古台河英金河奴古台河在右翼西北一百六十里源出褪莫克山東流㑹英金河拜拉河在右翼北八十里源出海喇漢山南流會英金河卓索河在右翼北八十里源出海他漢山東流㑹獐河入老河落馬河在右翼北八十里蒙古名白爾格源出海他漢山之西北東南流經布爾克圖山入老河老河在左翼東南一百里自敖漢流入境東北流㑹潢河潢河在左翼北四十里金史臨潢府有潢河自克什克騰流入境東南流入扎魯特界七金泊在左翼西南八十里穆惠泉在右翼東南一百二十里東流㑹老河温泉