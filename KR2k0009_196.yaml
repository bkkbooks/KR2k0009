府不領縣惟領蕃户以史大奈為都督十一年大奈死復廢府以地屬靈州二十二年又分置豐州天寶元年改為九原郡乾元元年復為豐州東至勝州五百三十里西南至靈州九百里東南至夏州七百五十里西北至河西城八十里又九原縣郭下本漢之廣牧縣地永徽四年重置縣其城周隋閒謂之甘草城唐書唐休璟傳永淳中突厥圍豐州朝廷議棄豐保靈夏休璟上疏曰豐州控河遏寇號為襟帶自秦漢以來常郡縣之土田良美宜耕牧隋季喪亂不能堅守乃遷就靈慶戎羯得以乘利而交侵始以靈夏為邊唐初募人實之西北一隅得以完固今而廢之則河防地復為賊有而靈夏亦不足以自安非國家利也高宗從其言按豐州至宋慶厯中陷於西夏嘉祐七年復以府州蘿泊川置豐州地在今河套東南陜西府谷縣之北非此之隋唐所置豐州也朔方舊城在右翼後旗界内詩小雅城彼朔方史記匈奴傳秦始皇使蒙恬將十萬衆北擊胡悉收河南地因河為塞築四十四縣城臨河十餘年諸侯叛秦匈奴復稍度河南與中國界於故塞後冒頓南并樓煩白羊河南王悉復收秦使蒙恬所奪匈奴地與漢關故河南朔至朝那膚施漢書衞青傳元朔元年青為車騎將軍明年出雲中以西至高闕走白羊樓煩王遂以河南地為朔方郡使蘇建築朔方城後漢書順帝紀永和五年徙朔方居五原魏志建安二十年省朔方郡晉書載記赫連勃勃父衞辰苻堅以為西單于屯代來城遂有朔方之地為魏所殺姚興以勃勃為五原公鎮朔方義熙二年僭稱大夏水經注河水東南逕朔方縣舊城東北括地志朔州故城夏州朔方縣北什賁舊城是元和志什賁之號蓋番語也按朔方郡前漢治三封後漢治臨戎而朔方縣為屬縣郡地南連北地東界五原雲中東南接西河上郡河之北岸為高闕塞至赫連勃勃始於朔方之南奢延水之北築統萬城元魏於此置夏州隋唐因之號朔方郡在今榆林府西南二百里非漢朔方舊地明統志又以寕夏衛為朔方不知寕夏乃漢北地郡富平縣北境唐之靈州地與漢朔方無涉也渠搜舊城在朔方舊城東漢置屬朔方郡為中部都尉治後漢省水經注河水自朔方東轉逕渠搜縣舊城北廣牧舊城在朔方舊城西漢置屬朔方郡為東部都尉冶後漢末省水經注南河自臨河縣南臨戎縣北又東逕廣牧縣舊城北臨戎舊城在朔方舊城西河向北流之東岸漢書地理志朔方郡領臨戎縣武帝元朔五年城後漢書郡國志朔方郡治臨戎縣水經注河水北逕臨戎縣舊城西元朔五年立舊朔方郡治元和志豐州永豐縣在州西一百六十里本漢臨戎舊地後漢末廢北人又謂之賀葛真城周武保定三年於此置永豐鎮隋開皇五年廢鎮置永豐縣武德六年省永徽元年復置延綏志臨戎縣舊城咂把湖在其内按前漢朔方郡治三封三封舊城在套外黃河西岸水經注曰河水東北逕三封縣故城東十三州志云在臨戎縣西一百四十里是也元和志曰漢武帝置朔方理在三封在豐州西一百里其地在今鄂爾多斯右翼後旗正西河外窳渾舊城沃壄舊城皆在套外水經注河水北過朔方臨戎縣西又北有枝渠東出謂之錮口東逕沃壄舊城南又北屈而為南河出焉又北迤西溢於窳渾縣舊城東又屈而東流為北河按此則沃壄舊城當在今套外河水北流一曲之西而窳渾舊城則在今阿爾坦山之南騰格里湖之側朔方一郡惟此三縣在套外耳臨河舊城在朔方舊城西北漢置屬朔方郡後漢省水經注河水自高闕南又東逕臨河縣舊城北又南河東逕臨戎縣故城北又東逕臨河縣南按黃河北流逕古朔方之西行五百餘里一支分為二歧東注水經所謂南河也其北河流至套外之阿爾布坦山南迤西溢為大河土名騰格里腦兒即古屠申澤也自此屈而東流過古高闕南行二百里許稍東南流又折而西南與南河合水經所謂北河南屈逕河目縣左又南合南河是也始直向東行經古五原之南至大土爾根河入河處始轉向東南行過古東勝州境以地勢測之漢臨河縣在北河之南南河之北水經所謂自高闕南而東逕舊城北者北河也自臨戎縣北而東逕縣南者南河也大成舊城在左翼前旗界漢置屬河西郡後漢曰大城改屬朔方郡後廢後漢書南匈奴傳逢侯將萬餘騎向滿夷谷鄧鴻等追擊逢侯於大成塞破之富昌舊城在左翼前旗界漢書地理志西河郡武帝元朔四年置治富昌縣有鹽官後漢書順帝紀永和五年南匈奴左部叛徙西河居離石注離石在郡南五百九里西河本都平定縣至此徙於離石水經注湳水東逕富昌縣舊城南隋書地理志榆林郡富昌開皇十年置榆林舊志富昌舊城在舊勝州南按漢書西河郡自治富昌後漢書注謂初都平定當是後漢初所徙治也隋復置富昌屬榆林唐初省其地直今榆林府東北美稷舊城在左翼前旗東南漢置屬西河郡後漢因之晉省水經注湳水出西河郡美稷縣按通典隰城縣有美稷鄉在今山西平定州界乃後漢中平中所徙置非前漢舊縣也白土舊城在左翼中旗南漢置屬上郡後漢因之晉省水經注圁水出白土縣圁谷東逕其縣南括地志白土故城在鹽池東北三百九十里按其地近今神木縣北勝州舊城在左翼後旗隋書地理志榆林郡開皇二十年置勝州大業初置郡元和志勝州戰國時爲趙地始皇時爲雲中郡漢末匈奴侵邊其地遂空晉末屬赫連氏後魏迄周往往置鎮不立郡縣隋開皇三年於此置榆林郡七年又置榆林縣屬雲州二十年割雲中之榆林富昌金河三縣置勝州大業五年以勝州爲榆林郡十五年郡人郭子和以城入突厥武徳四年子和歸國其地又陷梁師都貞觀二年平師都三年仍隋舊理置勝州以決勝爲名西南至麟州四百里至夏州九百里南至銀州七百里北至豐州七百里又榆林郡郭下本漢沙南縣地北近榆林因名屬雲州二十年改屬勝州榆林關在縣東三十里開皇三年置寰宇記勝州西北至河十里正東至河四十里陜西通志勝州城在榆休衞東北四百五十里按其地在套内東北瀕黃河屈南流處與遼金東勝州相近但隔河耳又按唐勝州在豐州東不在南元和志於豐州下既云東至勝州五百三十里此又云北至豐州七百里疑誤代來城在左翼界内晉書赫連勃勃載記苻堅以衞辰爲西單于督攝河西諸部屯代來城通鑑晉太元十六年魏王珪自五原金津南濟河徑入衞辰國直扺其所居悅跋城胡三省注悅跋城即代來城也舊宥州在右翼前旗西南有新舊二州俱唐置元和志廢宥州在鹽州東北三百里開元二十六年置寶應以後廢新宥州在廢宥州東北三百里東至麟州六百里西南至靈州六百五十里南至鹽州六百里初調露元年於靈州南境置魯麗含塞依契等六州以處突厥降户長安四年併爲匡長二州神龍三年復置蘭池都督府在鹽州白池縣北八十里仍分六州各爲一縣以隸之開元十一年康待賓叛克定後遷其人於河南江淮諸州二十六年還其餘黨於此置宥州以寛宥爲名也後爲寕朔郡領縣三曰懷德延恩歸仁天寶中宥州寄理經略軍寶應以後因循遂廢元和九年詔復於經略軍城置宥州乃爲上州於州郭下置延恩縣爲上縣改隸夏綏銀觀察使又自州北至天德置新館十一所從天德取夏州乘傳奏事四日餘便至京師舊唐書地理志宥州天寶元年為寕朔郡至德二年改為懷德郡都督府乾元元年復為宥州元和十五年移治長澤縣為吐蕃所破長慶四年夏州節度使李祐復置高望舊縣在右翼前旗直榆林北漢置屬上郡為北部都尉治後漢省虎猛舊縣在左翼前旗界内直榆林北漢置屬西河郡後漢省又漢置西河郡領增山縣北部都尉治有道西出眩雷塞又穀羅縣武澤在西北後漢俱省其地俱在今套内之南與榆林邊界接境河濱舊縣在左翼前旗界内元和志河濱縣本漢沙南縣地後魏及周為銀城縣地隋為榆林縣地貞觀三年於此置河濱縣東臨河岸因以為名改雲州為威州立嘉名也八年廢威州以縣屬勝州河濱關在縣東北貞觀七年置唐書地理志勝州河濱縣貞觀三年以縣置雲州四年曰威州八年州廢來屬寰宇記縣在勝州南一百九十里五代時與州俱廢按此在黃河西岸為唐時勝州之河濱若遼置東勝州亦領榆林河濱二縣其地在黃河東岸非隋唐舊地也舊白城在右翼前旗界内直榆林西元和志故白城一名契吳城在夏州朔方縣北一百二十五里契吳山赫連氏因山所築勃勃嘗所歎美故其子因立此城以立勃勃之廟安北都護府在旗界内唐置開元十年自中受降城徙治豐勝二州之境十二年又徙治天德軍榆谿塞在旗界内史記趙世家武靈王二十年西略地至榆中林胡王獻馬歸注正義曰勝州北河北岸也漢書韓安國傳王恢曰蒙恬為秦侵胡辟數千里以河為境累石為城樹榆為塞又衛青傳青度西河至高闕遂西定河南地按榆谿舊塞絶梓嶺梁北河注師古曰上郡北有諸次山諸次水出焉東逕榆林塞為榆谿言軍尋此塞而行也水經注諸次水東逕榆林塞世又謂之榆林山即漢書所謂榆谿舊塞者也自谿西去悉榆林之藪矣緣厯沙嶺屆龜兹縣西去故謂廣長榆也王恢云樹榆為塞謂此也通典榆林塞在勝州榆林郡南界元和志榆林縣地北近榆林即漢之榆谿塞霍冀九邊圖說秦榆谿舊塞西屬朔方東為河西南有上郡而黃河三面環之漢厯隋唐皆為邊鎮宋沒於西夏後為章孔興所據明初定陜西設綏德衞於發兵屯迨榆林西略豐州築城東勝以統領套内自正統末盡為吉納父子所據都督王楨遮築榆林城於上郡僅足蔽延安綏德而已榆林宫在勝州舊城中元和志隋榆林宫在州城内煬帝大業三年置因榆林郡為名後煬帝北巡陳兵塞表因幸此宫突厥啓民可汗獻馬及兵器新帳因賦詩云前纂修官臣高人鑑恭纂輯纂修官臣桂文燿恭覆輯校對官臣賀式韓恭校校對官臣許誦恆恭覆校
