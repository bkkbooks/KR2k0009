body:
  text: 承德府在直隸省治東北七百八十里東西距一千二百里南北距三百五十八里以平泉州赤峯縣兩屬統計之八百十里東至盛京錦州府錦縣界七百五十里西至直隸口北道屬獨石口廳界四百五十里南至遵化州界一百五十里北至木蘭圍場界二百十八里東南至永平府臨榆縣界五百八十里西南至順天府密雲縣古北口界一百九十里東北至錦州府廣寕縣界一千零十五里西北至口北道屬多倫諾爾廳界五百六十里自府治至京師四百二十里分野天文尾箕析木之次漢書地理志自危四度至斗六度謂之析木之次燕之分也唐書天文志尾箕析木津得上谷漁陽右北平古北燕孤竹無終諸國建置沿革古為山戎東胡地戰國屬燕秦為漁陽右北平遼西郡邊外接東胡地漢初為匈奴地武帝時為塞境後入於烏桓後漢為烏桓鮮卑地後盡入於鮮卑三國魏為鮮卑軻比能地晉初鮮卑諸部分據之屬鮮卑段氏宇文氏其後併於慕容氏為前燕苻堅滅燕為秦地慕容垂復國為後燕馮跋時為北燕北魏為安州營州及厙莫奚契丹地齊周為厙莫奚地隋為奚地其東南境屬營州隋書地理志遼西郡舊置營州統縣一柳城唐與隋同唐書地理志營州柳城郡上都督府本遼西郡萬嵗通天初為契丹所䧟開元五年還治柳城天寶元年更名柳城郡縣一柳城西北接奚北接契丹遼為中京道大定府興中府諸州及上京道臨潢府諸州地金為北京路大定府興中府及西京路桓州地元爲上都路興州利州大寕路大定諸縣及全寕路魯王分地明初屬北平府㝷改屬北平行都司爲大寕新城富峪會州全寕營州興州諸衛地永樂元年徙衞于山南盡割大寕諸衛地卑烏梁海於是諸地盡入於朶顔泰寕後爲察哈爾所併其屬爲喀喇沁翁牛特土黙特敖漢柰曼巴林喀爾喀左翼諸部本朝龍興諸部相率歸誠編列旗分康熙四十二年肇建避暑山莊于熱河爲每歲巡幸駐蹕之所雍正元年設熱河廳十一年改設承德州乾隆七年罷州仍設熱河廳四十三年改設承德府屬直隸省領州一縣五灤平縣在府西南即喀喇河屯廳境東西距四百四十五里南北距二百六十八里東至府界四十里西至口北道屬獨石口廳界四百五里南至古北口界一百三十八里北至豐寕縣界一百三十里東南至順天府密雲縣界西南至獨石口廳界東北至府界西北至獨石口廳界漢上谷郡女祁縣地北魏為安州廣陽郡廣興縣地西境為禦夷鎭地後併入厙莫奚北齊周隋唐因之遼為中京道北安州興化軍興化縣金為北京路興州寕朔軍縣仍舊元廢軍省縣入州屬上都路尋置興安縣明初為興州衛後廢入朵顔衞本朝初内屬乾隆七年設喀喇河屯廳四十三年改設灤平縣屬承德府豐寕縣在府西北即四旗廳地東西距五百二十里南北距二百二十里東至府界二百五十里西至獨石口廳界二百七十里南至灤平縣界六十里北至圍場界一百六十里東南至府界西南至獨石口廳界東北至圍場界西北至多倫諾爾廳界漢至北燕與府同北魏為安州廣陽郡燕樂縣及方城縣地西南境為禦夷鎮地北境為厙莫奚地北齊周隋唐因之遼為中京道北安州利民縣西境奚王府地金為北京路興州興化縣宜興縣地西北境為西京道桓州地元為上都路興州興安縣宜興縣地西北境為開平府開平縣地明初為興州衛開平衞地後廢入朵顏衞本朝初内屬乾隆元年設四旗廳轄察哈爾鑲白正藍鑲黄正白四旗四十三年改設豐寕縣屬承德府平泉州在府東即八溝廳地東西距五百四十里南北距四百九十里東至建昌縣界三百里西至府界二百四十里南至永平府遷安縣邊界一百三十里北至赤峯縣界三百六十里東南至建昌縣界西南至府界東北至建昌縣界西北為喀喇沁右翼接圍場界漢右北平郡平剛縣地北魏及齊為營州建德郡陽武縣冀陽郡平剛縣地隋為遼西郡地西境為奚地唐為奚地遼為中京大定府大定縣及長興勸農富庶文定升平歸化金源諸縣恩州恩化縣澤州神山縣地金為北京大定府大定長興富庶金源神山諸縣地元為大寕路大定富庶金源諸縣及惠州地明初為大寕新城富峪會州諸衛後廢入朶顏衛本朝初内屬雍正八年設八溝廳乾隆四十三年改設平泉州屬承德府赤峯縣在府東北即烏蘭哈達廳地東西距二百七十里南北距三百二十里東至建昌縣界一百二十里西至圍場界一百五十里南至平泉州界六十里北至烏珠穆沁克什克騰諸旗界二百六十里東南至建昌縣界西南至平泉州界東北至烏珠穆沁旗界西北至克什克騰旗界漢遼西郡文成縣地隋唐為契丹國地遼為中京道高州三韓縣上京道松山州松山縣饒州長樂縣臨河縣安民縣上京臨潢府臨潢定霸保和潞宣化諸縣地金為北京路大定府三韓松山靜封諸縣全州安豐縣臨潢府臨潢縣盧川縣地元為大寕路高州上都路松州全寕路全寕縣及魯王分地明初為大寕衛全寕衛地後廢入朶顔衞本朝初内屬雍正七年設八溝廳乾隆三十九年於八溝廳北析置烏蘭哈達廳轄南境之翁牛特右翼旗北境之翁牛特左翼旗巴林旗四十三年改設赤峯縣隸承徳府建昌縣在府東南即塔子溝廳地東西距二百六十里南北距六百八十五里東至朝陽縣界一百二十里西至平泉州界一百四十里南至永平府臨榆縣邊界二百六十里北至烏珠穆沁界四百二十五里東南至盛京錦州府錦縣界西南至永平府遷安縣邊界東北至朝陽縣界西北至赤峯縣界漢遼西郡交黎臨榆諸縣地北魏為營州建德郡石城縣廣都縣冀陽郡柳城縣地隋為遼西郡地北境為契丹地唐為營州柳城郡柳城縣地後與契丹雜居北境契丹西境奚地遼為中京道利外阜俗縣澤州龍山縣榆州和衆縣永和縣東南境兼得隰州海濱縣地北境惠州惠和縣兼得髙州三韓縣地金為北京路利州阜俗縣龍山縣大定府和衆縣東南境兼得瑞州海濱縣比境大定府惠和縣兼得三韓縣地元為大寕路和衆縣龍山縣利州東南境兼得瑞州地南境惠州地北境惠和縣明初為營州衛地後廢入泰寕衛本朝初内屬乾隆三年設塔子溝廳廳南境為喀喇沁右翼旗北境為敖漢旗四十三年改設建昌縣屬承德府朝陽縣在府東北即三座塔廳地東西距二百六十里南北距五百三十里東至盛京錦州府義州界一百三十里西至建昌縣界一百三十里南至建昌縣界一百五十里北至科爾沁旗界三百八十里東南至錦州府錦縣界西南至建昌縣界東北至錦州府寕遠縣界西北至建昌縣界漢柳城交黎二縣地北魏為營州昌黎郡龍城縣廣興縣定荒縣地北齊為營州龍城縣廣興縣隋初為營州建德郡後廢州置總管府改置遼西郡龍山縣後改柳城縣唐為營州柳城郡北境自魏齊以後俱為契丹地遼為中京道興中府興中縣及營邱象雷閭山諸縣建州安德州川州武安州成州東境兼得宜州宏政縣西境兼得大武府神水縣東南境兼得來州地金為北京路興中府興中縣及建州大定府武平縣東境兼得義州宏政縣同昌縣元為大寕路興中州建州川州武平縣東境兼得義州懿州地西北境兼得魯王分地明初為營州衛地後廢入泰寕衛本朝初内屬乾隆三年設塔子溝廰三十九年於廳東境析置三座塔㕔廳東北境為土默特左翼旗西北境為土黙特右翼旗又北為柰曼旗又東北兼轄喀爾喀庫倫兩旗地四十三年改設朝陽縣屬承德府形勝北界興安大嶺錘峯東峙廣仁西控形勢之雄甲於紫塞欽定熱河志風俗萃神臯之廬井人服先疇沃奥壤之耕桑户敦古處欽定熱河志行宫避暑山莊在承徳府治東北聖祖仁皇帝歲巡塞外駐蹕熱河康熙四十二年肇建避暑山莊為時巡展覲臨朝聽政之所隂陽和㑹靈境天開俯武列之水挹磬錘之峯曡石繚垣上加雉堞如紫禁城之制週十六里三分南為三門中麗正門東德匯門西碧峯門其東及東北西北門各一東門外長隄蜿蜒北起獅子溝南盡沙隄觜延袤十二里甃石七層廣約丈許宫左湖右山山勢自北而西曰梨樹峪曰松林峪曰榛子峪曰西峪迴抱如環湖水自東北演迤而南至萬樹園之陽淨練澄空沙隄曲徑如意洲在焉其北為千林島瀑源來自西峪垂於涌翠巖之巔匯注湖中湖岸曲榭長橋引而東南至德匯門之左為出水牐以時蓄洩敞殿飛樓平臺奥室因地形任天趣不崇華飾妙極自然洵為玉塞之神臯金庭之奥域有聖祖仁皇帝御製避暑山莊記高宗純皇帝御製避暑山莊詩序避暑山莊後序避暑山莊百韻詩仁宗睿皇帝御製木蘭記謹案帝法祖巡行歲涖山莊高宗純皇仁宗睿皇帝紹繼前猷詰戎綏遠天文炳煥象緯昭陳非尺幅所能殫述茲以統志為志地之書謹錄聖製之有關地理者標列御題以昭示萬世餘篇不備述後倣此三十六景聖祖仁皇帝既建避暑山莊延攬勝概錫以三十六景之名皆御書題額並府御製三十六景詩繪圖成帙埀示冊高宗純皇帝有御製恭跋皇祖聖祖仁皇帝御製避暑山莊三十六景詩文乾隆六年有御製恭和皇祖聖祖仁皇帝御製避暑山莊三十六景詩十八年有御製避暑山莊三十六景詩煙波致爽澹泊敬誠殿後第三重為殿七楹宏敞高明旁挹雲嵐後帶湖渚為三十六景之冠芝徑雲隄由萬壑松風之前北行長隄蜿蜒徑分三洲若芝英雲朵隄左右皆湖中架木為橋南北樹寶坊湖波鏡影勝趣天成無暑清涼芝徑雲隄之東北洲曰如意建殿三重第一重面南為門五楹四面皆水門當其前湖風徐度人天勝境延薫山館如意洲正殿七楹左右配殿各五楹在無暑清涼内第二重南向楹宇敦樸薫風時來水芳巖秀延薰山館後殿十五楹在如意洲最深處鏡波繞岸瑶石依欄聖祖仁皇帝嘗以幾暇讀書其中殿之東閣高宗純皇帝御書額曰隨安室萬壑松風前殿據岡背湖漸近湖為坡陁殿五楹北向長松數百樹掩映週廻笙鏞迭奏高宗純皇帝御題曰紀恩堂有御製避暑山莊紀恩堂記殿後三楹曰鑑始齋坡下亭曰晴碧亭松鶴清越山莊内西偏為榛子峪殿門五楹南向青蓋垂陰九臯振響後殿高宗純皇帝御題曰靜餘軒雲山勝地煙波致爽之後高樓北向俯瞰羣峯雲嵐秀蔚樓之西楹奉佛像高宗純皇帝御題曰蓮花室四面雲山山莊西北隅最高處搆亭其上凌霄切漢羣山拱揖各開生面數百里外如列屏嶂北枕雙峯山莊内直北山頂有亭翼然西北金山東北黒山排空屹向如天門雙闕對拱檐楹亭前兩石筍秀削青瑶鐫聖祖仁皇帝暨高宗純皇帝和章於其上西嶺晨霞自雲帆月舫右行傑閣巋然臨波面岫紫霞晨映錦章繡錯在雲岑木杪之間錘峯落照山莊東五里為磬錘峯就山莊西嶺搆亭與四面雲山亭相望紅輪西照是峯迥出孤標揚暉天際南山積雪亭在山莊正北高據山巔塞地高寒杪秋雪下南望諸峯皎然寒玉梨花伴月山莊西北曰梨雲峪入峪平岡逶迤幽澗潺鳴當春時梨花萬樹豔挹清輝為壺天勝境曲水荷香亭在北山麓南向下映曲沼芙蕖萬柄翠蓋紅葩翛然香遠風泉清聽松鶴清越之西置三楹有泉出兩山間琤淙穿注風來澗響與鶴韻松聲相應答内為秋􅊹齋濠濮間想澄湖之北搆亭凡四面此亭在如意洲上水木明瑟魚鳥因依天宇咸暢湖之東岸有阜巍然上搆殿宇三楹積翠中天層霄紫漢皆歸一覽暖溜暄波熱河以水得名山莊東北隅有牐湯泉餘潤自宫墻外演迤流入建閣其上潄玉跳波靈潤蒸蔚泉源石壁懸崖直下旁無路蹊飛流百丈從石壁瀉出磨崖恭勒聖祖仁皇帝御書西為半月湖更西有亭曰矚朝霞青楓緑嶼越泉源石壁而北跨巔面南置三楹錦樹分叢丹霞競彩其中殿五楹曰風泉滿清聽門外三楹面西曰霞標皆聖祖仁皇帝御書扁額東嚮四楹高宗純皇帝御書額曰吟紅榭鶯囀喬木亭當萬樹園之陽近俯清波遠連叢樾和風澹蕩時鳥嚶鳴見萬物得所之樂香遠益清萬樹園東南金山之陰前殿五楹下臨曲沼涼軒明淨緑房紫葩芬菲襲人後三楹曰紫浮軒西八楹曰依綠齋皆聖祖仁皇帝御題齋左有亭高宗純皇帝御書額曰含澄景金蓮映日延薰山館之右有殿五楹西嚮環蒔金蓮花亞葉交枝含風浥露晨景初出金彩鮮新旁室三楹高宗純皇帝御書額曰川巖明秀遠近泉聲縁長隄而北石路半里許漸聞水聲摐金戞玉水樂琅然殿三楹南嚮其東曰聚香齋殿後為亭曰聽瀑外三楹南嚮高宗純皇帝御書額曰招涼榭雲帆月舫仿舟形作室上為樓北嚮在如意洲延薰山館之西芳渚臨流由萬壑松風西行折而北傍湖一曲有亭南嚮巨石嵌空清流倒影夾岸嘉水灌叢芳草如織雲容水態梨樹峪之東山麓砥平殿五楹東嚮横峯側嶺獻秀爭竒繚白縈青波光無際其西向樓三楹曰曠觀澄泉繞石入梨樹峪一徑青蒼泉自石竇流出依山曲折有亭北嚮倚層巘鏡清漪雲根綠淨響若璆琳澄波曡翠亭三楹北向在如意洲之陰湖光一碧遠極天際其北翠壁千㝷浮光掩映風景幽絶石磯觀魚由遠近泉聲而下清溪一曲有石磯平廣作亭其上東嚮俯視澄波潛鱗涵泳一一可數鏡水雲岑天宇咸暢閣下有殿五楹西嚮倚山搆宇水周三面曲廊外布迴抱如半月檻陰架亭額曰金山下有亭曰芳洲皆高宗純皇帝御書雙湖夾鏡水自東北入南匯山泉鍾為大湖隄橋左右分一湖為二跨橋寶坊二其北額曰雙湖夾鏡長虹飲練在長橋南岸與雙湖夾鏡坊對峙兩岸煙瀾渺瀰彌望如一甫田叢樾湖北岸最東一亭與萬樹園相近平原茂木奥如翳如聖祖仁皇帝駐蹕山莊為閲習步圍之地水流雲在湖北岸最西一亭漸近長隄湖水澄虚空明上下悠然與造化同符聖祖仁皇帝御題三十六景以茲為殿再題三十六景乾隆十九年高宗純皇帝駐蹕避暑山莊於聖祖仁皇帝御題三十六景之外再題三十六景標題皆以三言有即聖祖仁皇帝御題額者有為帝新題額者雲巒獻秀川岫呈奇高宗純皇覲揚綏撫之烈經緯制度之宜均於是見焉有宗純皇帝御製再題避暑山莊三十六景詩高麗正門山荘正南一門崇宏廣大門左右爲朝房内則恭懸聖祖仁皇帝避暑山莊題額每秋巡之期臣工啟事外藩展覲皆由於此勤政殿麗正門之左南嚮殿二重前五楹曰勤政殿高宗純皇帝敬天法民隱巡行所至離宫别殿悉循祖式勤圓明園之制題以勤政殿内面南額曰正大光明面北額曰高明博厚後殿前簷額曰卷阿勝境後簷面北額曰雲牖松扉殿前樓五楹長廊周匝凡慶賚燕饗之典於斯御焉松鶴齋澹泊敬誠殿之東搆大殿七楹是地爲昔年高宗純皇帝恭奉孝聖憲皇后頣養之所岫列喬松庭翔雪羽循聖祖仁皇帝松鶴清越之義高宗純皇帝題額曰松鶴齋如意湖作亭於湖曲東嚮前臨如意洲芷岸䕃林苔堦潄水洲勢逶迤如芝英之半偃亭之西爲芳園居青雀舫山莊勝趣實在一水濺瀑渟泉咸匯湖中有御舟題曰青雀舫泛月衝雨漾碧摇青靈境畢獻舟有塢在臨芳墅旁綺望樓碧峯門之左倚城為樓凡九楹北嚮登臨極望水木雲巒組分繡錯後樓三楹南嚮恭懸聖祖仁皇帝御題額曰坦坦蕩蕩馴鹿坡塞山産鹿孶息蕃衍而山莊所畜為特馴山逕逶迤儦俟成羣樂依文囿高宗純皇帝御書馴鹿坡三字勒於石水心榭石梁跨水南北坊各一中為榭三楹飛桷高騫虛簷洞朗上下天光影落空際逾石梁而北有亭名曰牣魚頣志堂清舒山館之西數楹南嚮恭懸聖祖仁皇帝御題額曰頣志堂又曰光風霽月其西有殿東嚮曰學古堂均為幾餘典學之所暢遠臺清舒山館之左因周垣舊基互為長廊下依綠水有臺巍然登臨縱覽萬象森羅靜好堂在清舒山館之後筠篁叢碧巘岫縈青堂外飛樓疏櫺四啟曰澄霽樓樓下堂室區分曰風泉滿清聽曰山水含清輝曰高山流水曰岫幌並聖祖仁皇帝御書冷香亭靜寄山房之側有亭臨水東嚮山莊荷花秋深未落與晚菊寒梅同韻亭北三楹曰峽琴軒與亭鱗次採菱渡湖之南有小舟可登搆亭其漘形如一笠新菱出水帶露縈煙亭後殿三楹曰環碧觀蓮所延薫山館西南崇亭傍水南嚮芙蕖萬柄涵光照影天葩瓊蘂洵為甲觀清輝亨如意洲東臨水一亭垂楊披岸亭角出柳陰中有清曠絶塵之趣般若相清暉亭西精舍一區南嚮中奉佛像額曰法林寺内殿三楹額曰般若相皆聖祖仁皇帝御題滄浪嶼嶼不滿十弓而峭壁直下有千仞之勢中為小池石髮冒池如綠雲浮空有室三楹後簷北嚮恭懸聖祖仁皇帝御書題額一片雲由延薰山館再折而東面山殿八楹雲陰乍起紛郁輪囷極靜深之趣蘋香沜萬樹園之東南湖水分流一鑑澄澈中多青蘋丰茸淺蔚清香襲人水濱殿三楹南嚮萬樹園北倚山南臨湖其中平原數千畞嘉木羅植師蕆事高宗純皇帝御書碣曰萬樹園自西錫宴觀燈馬伎咸在斯園試馬埭萬樹園西南草柔地曠馳道如弦雲錦成羣騰驤沛艾大駕巡幸於此考牧高宗純皇帝御書碣曰試馬埭嘉樹軒萬樹園東為軒凡三楹南嚮老樹輪囷垂䕃數十畞長榮永鬯皆百年前物樂成閣嘉樹軒之上重閣五楹一重曰開襟霄漢再重曰樂成閣塞田遠近崇墉比櫛童叟慶舞遹觀厥成宿雲簷宫城東北隅山盡處當惠迪吉門因勢高敞搆平臺以攬勝雲氣往來若宿簷際曰惠迪吉澄觀齋宫城東北殿五楹西南聖祖仁皇帝御書其前簷額曰澄觀齋高宗純皇帝御書前匯山莊諸水綠波翠影遠近交映翠雲巖澄觀齋之後有亭翼然晨霞暮靄絢紫緋青巖巒交複雲氣特多聖祖仁皇帝御題曰翠雲巖亭後摩崖勒聖祖仁皇帝御書大字曰雲巖罨畫忩自青楓綠嶼折而東曲室窈深疎櫺洞啟峯嶺林泉咸在几席儼如罨畫凌太虛北山之巔置亭拔地倚天顥氣清英飄飄有凌雲之致下為殿五楹額曰清溪遠流東三楹為含粹齋千尺雪玉琴軒之東數十武有瀑泉懸流噴薄搆殿五楹高宗純皇帝御題千尺雪額瀑源來自雲根捲沫跳波寒光四射清景獨絶寕靜齋千尺雪之後依山搆齋倚山帶溪曰寕靜後樓恭懸高宗純皇帝御題聖祖仁皇帝御書曰清敝玉琴軒與寕靜齋並峙當衆流潡湍間觸石琮琤清越相應臨芳墅水流雲在亭之隔岸西折而南臨芳墅在焉為殿五楹曲渚迴汀藥欄荷沼芬郁左右知魚磯臨芳墅前殿五楹面南踞湖之北與采菱渡相對羣魚出游為潛為躍並呈天趣涌翠巖瀑自巖而下巖間搆殿三楹東嚮晨㬢朝爽空翠四合殿後為佛廬有樓三楹額曰自在天素尚齋梨峪中搆殿五楹面南地在山巔因高得勢軒宇曠然結搆渾樸不施雕繢永恬居素尚齋之前殿五楹面南水木澄明煙巒靜妙景物恬和如遊瓊島後三十六景至此而攬其全澹泊敬誠山莊正殿凡七楹聖祖仁皇帝御題曰澹泊敬誠恭懸每高宗純皇帝萬夀聖節祝墨寶嘏臚歡遠臣肆覲則御茲殿左右配殿各五楹後殿亦五楹曰依清曠亦聖祖仁皇帝御書墨寶東偏高宗純皇帝御題額曰寶筏喻清舒山館在水心榭之東北凡五楹恭懸聖祖仁皇帝御題内曰承慶堂高宗純皇帝御題額曰煙霞澄鮮東楹奉聖祖仁皇帝宸翰牓曰冰奩内曰含德齋後簷額曰聚雲複岫山房西南隅别殿曰蘿月松風謹案自清舒山館以下每歲仁宗睿皇帝臨幸皆有高宗純皇帝御製題詠天藻所摛焜燿日月不及備載恭識於此戒得堂清舒山館之東堂五楹南嚮高宗純皇帝御題額曰戒得堂有御製戒得堂記戒得堂後記堂之後廡曰鏡香亭堂北層樓特起曰問月樓樓之東為羣玉亭其南有軒曰舍古自軒而南為來薫書屋又南為佳䕃室室外有齋三楹俯臨流水曰面水齋繼德堂在松鶴齋後乾隆五十五年奉命葺治如煙波致爽之制高宗純皇帝御題額曰繼德堂春好軒在萬樹園東南濱湖軒凡五楹軒後一亭曰巢翠亭靜寄山房山房環澄湖踞平阜穆然淵靜宛在水中又内為瑩心堂額曰閒止又内為湖山罨畫門南嚮牓曰月色江聲煙雨樓如意洲北舊名青蓮島建樓五楹四面臨水一碧無際高宗純皇帝御題額曰煙雨樓樓外搆屋三楹曰青楊書屋溪旁搆齋曰對山齋山頂有亭曰翼然亭綠雲樓越涌翠巖有樓聳峙地當西峪為瀑源所自出疊嶂層雲滃然四合額曰綠雲樓旁三楹曰木映花承又前三楹曰水月精舍創得齋西峪最深處踞山為屋三楹曰創得齋其後右偏為樓三楹曰夕佳樓前小樓二楹曰桃碧室内牓曰一塵不染觀瀑亭山莊崖館雲阿深林穹谷咸以瀑流増勝乳竇穿空雲根吐溜搆亭山麓高宗純皇帝御題曰觀瀑半山有亭御書瀑源二字由是再陟而上為笠雲亭食蔗居由觀瀑而窮其源緣山取逕繚繞數折至食蔗居凡三楹松林峪之勝境也徑既幽迥地復高敞奥如曠如轉深轉妙左二楹額曰小許菴右有亭曰倚翠亭東北山亭曰松巖敞晴齋山莊西北隅緣岡冠嶺搆堂其上秋高氣朗蒼碧千里門外有橋竒石森列左曰青綺書屋右曰繪韻樓秀起堂西峪中峯特起列岫層巒奔趨拱極據峯為堂備攬諸勝登臨振衣如在天半其下曰經畬書屋東北曰振藻樓堂後山如屏障雲際一亭曰眺遠亭靜含太古山房鷲雲寺之側萬嶂環列築山房一區額曰靜含太古邃谷穹林纖塵不到由西廊而出曰不遮山樓向南得小亭額曰趣亭有真意軒自西峪至秀起堂山逕縈紆架屋數楹高宗純皇帝御題曰有真意軒軒外林巒高下一草一木曲呈真趣軒左曰空翠書樓右曰小有佳處後有亭額曰對畫亭碧靜堂倚山為堂絶巘浮青在煙嵐縹緲間額曰碧靜堂堂之左曰松壑間樓右曰靜賞室跨澗為樓曰淨練溪僂含青齋架巖為屋曡石成階與敞晴齋隔溪相望額曰含青齋内面北額曰清暉娯人左曰挹秀書屋右曰松霞室玉岑精舍山莊西北溯澗流而上至山麓攢峯竦岫如縣圃積玉精舍三楹額曰玉岑室右偏曰貯雲簷穿雲陟逕有亭二曰湧玉曰積翠依山梁搆室曰小滄浪文園獅子林清舒山館之前度地為園模山範水藴淑懷竒因倪瓚獅子林圖之式備十有六景之勝高宗純皇帝御題曰文園獅子林乾隆三十九年四十年四十四年四十五年皆有御製題文園獅子林十六景詩其目曰獅子林曰虹橋曰假山曰納景堂曰清閟閣曰藤架曰磴道曰占峯亭曰清淑齋曰少香幢曰探真書屋曰延景樓曰畫舫曰雲林石室曰横碧軒曰水門文津閣山莊千尺雪之後卜高明爽塏用浙江范氏天一閣之式建為高閣以藏四庫全書高宗純皇帝御題曰文津閣與紫禁之文淵御園之文源京之文溯四閣並峙琅函瓊册輝燭霄漢有盛御製文津閣記題文津閣諸詩閣前為趣亭東為月臺西則西山層巘屏列宜照齋山莊西北門内倚石城搆齋五楹臨風致爽晴照宜人右為屬霄樓左為卻炎榭由榭而東為就松室其後為積嘉亭山近軒在山莊西北峯巒窈窕環抱檐楹當萬山深處宫門三楹南嚮正殿五楹殿西三楹額曰清娛室東五楹曰養粹堂堂之南為延山樓西嚮敞亭三楹竒石嵌空迴廊曲注額曰簇竒廊東峯之頂草亭一區有松蒼然額曰古松書屋獅子園園以傍獅子嶺得名世宗憲皇帝在藩邸扈從賜居於此中多世宗憲皇帝題額園額則聖祖仁皇帝賜書也東西宫門五楹其南碧水廻環北岸亭三楹額曰翠柏蒼松逾橋而南恭懸聖祖仁皇帝賜額前五楹額曰芳蘭砌曰樂山書屋書屋東環以迴廊中峙方亭又東南殿三楹額曰水情月意後殿三楹東有亭額曰環翠北有待月亭在殿東南前殿五楹後殿三楹