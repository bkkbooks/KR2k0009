還鎮據守周帝遣使招慰不受敕書保凝於齊爲宗藩保疆厲節迄爲齊守竞不臣周隋初爲所㓕死之隋韋冲京兆杜陵人拜營州總管容貌都雅寛厚能得衆心懷撫靺鞨契丹皆能致其死力奚霫畏懼朝貢相續唐宋慶禮洺州永年人爲河北度支營田使元宗欲復營州於柳城慶禮盛陳其利詔慶禮等築城興役三旬而畢功遷檢校營州都督開屯田八十餘所數年間倉廪頗實居人漸殷慶禮爲政清嚴勤於聽理所厯之處人吏不敢犯遼耶律富勒敦六院林牙圖魯僕四世孫有治幹太平十六年知興中府以獄空聞富勒敦舊作僕里篤圖魯僕舊作􅊳吕不也今改正馬人望遼東人咸雍中進士爲松山縣令歲運澤州官炭獨役松山人望請於中京留守均役他邑留守怒下吏繫幾百日復引詰之不屈留守喜曰君爲民如此後必大用以事聞於朝悉從所請金完顔阿喜宗室子襲職北京路筈柏山明安聽訟明決人爱信之明安改見順天府名宦高德基遼陽渤海人大定三年遷同知北京路都轉運使事是年秋土河泛溢水入京城德基遽命開長樂門䟽分使入御溝以殺其勢水不能為害盧克忠貴德州鳳集人大定二年除北京副留守會民艱食克忠下令凡有蓄積者計留一歲糧悉平其價糶之由是無捐瘠之患劉煥中山人累遷北京巡警使涖政嚴明捕二惡少杖於庭中戒之曰孝弟敬慎則為君子暴戾隱賊則為小人自今以往母狃於故習國有明罰吾不得私也自是無敢犯者㝷遷同知北京留守事元姚天福絳州人累遷山北道按察使其民鮮知稼穡天福教以樹藝皆致蕃富民為建祠刻石紀之伊蘇蒙古人倜儻有能名拜中書平章政事賊䧟大定詔伊蘇往討平之既而賊雷特穆爾巴哈等陷永平詔伊蘇出師遂復灤州及遷安縣又復昌黎撫寕二縣儲粟十萬芻藳山積居民殷富乃分命官屬勞來安集其民使什伍相保以事耕種民為立石頌勲德伊蘇舊作也速雷特穆爾巴哈舊作挖帖木兒不花今並改正本朝嵩阿禮滿洲正藍旗人知平泉州嘗語人曰治民首在整躬興利尤宜革弊性廉介聽斷公明州署舊規凡柴炭草束之類皆四郷輦運以應阿禮悉除之至今氏受免輸之惠秩滿去攀轅卧轍者直達鳳皇嶺外以子長麟大學士贈光祿大夫夏熙上虞人任熱河巡檢立義冢建祠廟有利於民者百廢具舉熙負幹濟才㑹乾隆己卯庚寅大水溢蕩廬舍奉㫖重濬新河民獲安居計績予遷未幾卒民思其德為建祠祀之福克金布滿洲正藍旗人嘉慶二十一年知豐寕縣公明亷慎折獄持平不事刑苛民安其教令三年歲皆稔有馬産雙駒之異熙昌蒙古正藍旗人嘉慶二十二年權熱河都統在任八閲月惠政周洽盜賊屏迹庶獄無留牘研以虛衷他人刑求之弗得者昌以片言折其心既去士民懷之不置陳琳天長人嘉慶二十二年任豐寕縣巡檢兼管典史事清正明決所理得當屏餽遺事有便於閭閶者職或不得專力為請雖譴訶弗避也去之日百姓泣送道左數十里人物北魏谷渾昌黎人父衮勇冠一軍渾少有父風任俠好氣晚乃折節受經被服類儒者以善隸書爲侍中左右從征赫連昌賜爵濮陽公渾正直有操行性不苟合然不以富貴驕人時議以此稱之按前燕錄咸康三年徙昌黎郡築好城以逼乙連其地在龍城以西爲今平泉州境魏因之故谷渾以下稱昌黎人者皆載入卷中韓秀昌黎人拜廣武将軍聰敏清辨才任喉舌命掌樞密韓麒麟昌黎人㓜而好學美姿容善騎射除冠軍將軍齊州刺史在官寡於刑罸以新附之人未階臺宦士人沈抑宜擢用豪望從之麒麟立性恭慎恒置律令坐旁臨終之日惟有素絹數十疋其清貧如此子興宗顯宗皆有才學顯宗除著作佐郎兼中書侍郎性剛直能面折死爭常撰馮氏燕志孝友傳各十卷行於世唐侯希逸營州人天寶末爲州禆將守保定城安祿山反使中人傳命希逸斬以徇又斬其偽將徐歸道遣使上聞授平盧節度使數有功以孤軍無援乃拔其軍二萬浮海入青州據之肅宗因以爲平盧淄青節度使寶應初與諸軍討平史朝義加檢校工部尚書圖形凌煙閣李惠登柳城人爲平盧軍禆將安禄山反自拔來歸後拜隋州刺史州數被亂野如爇人無處業惠登雖樸素無學術視人所謂利者行之所謂害者去之率心所安暗與古合政清靜居二十年人歌舞之詔加御史大夫遼姚景行興中人重熙進士累官翰林學士樞密副使參知政事性敦厚廉直人望歸之道宗時多被顧問為北府宰相咸雍初出為武定軍節度使明年驛召拜南院樞密使帝有意伐宋以景行諫止大康初鎮遼興為上京留守卒謚文憲竇景融中京人中書令振之子聰敏好學清寕中進士累官南樞密副使監修國史知樞密院事賜同德功臣封陳國公加太子太保授武定軍節度使審決冤滯以獄空聞拜中京留守卒諡肅憲子瑜官三司副使太公鼎大定人先世籍遼陽統和中徙豪右以實中京留家於大定登咸雍進士調瀋州觀察判官改良鄉令有惠政天祚中厯長寕軍節度使改東京户部使時盜殺留守蕭保先公鼎單騎行郡陳以禍福安輯如故拜中京留守乘傳赴官境内肅清子昌齡官左承制昌嗣洺州刺史昌朝鎮寕軍節度使馬保忠營州人謹重寡欲好立節操太平間授洗馬改著作郎殿中丞興宗朝為樞密使守太師兼政事令封燕國公金田灝興中人太祖時知真定府事招降齊博等賊衆五千餘人累遷行臺左丞彰德軍節度使是時新定力役灝蠲籍之半而上之故相之繇賦比他州獨輕改同簽燕京留守入為刑部尚書請老卒於家鄧儼宜民人天德進士累官左司郎中掌機務者數年世宗嘗謂宰臣曰鄧儼奏事心識甚明吏部掌銓選當得通練之人於是改擢吏部侍郎明昌初遷户部尚書㝷知歸德府事致仕卒完顔博洽北京路明安人明昌進士調中都左警巡判官豪右屏跡除監察御史劾罷平章政事布色揆貞祐間以御史中丞行尚書省元帥府於河中便宜行事廷議欲棄河東徙其民以實陜西博洽上書極諫忤宰執意罷為中丞河南大水充宣慰副使奏免亳州糧三十餘萬石博洽純直不能與時低昂嘗曰生為男子當益國澤民其他不可學也元光中以言事過切左遷㝷仍行尚書省於河中卒博洽舊作伯嘉布色舊作僕散今並改正王維翰龍山人大定中進士遷永霸令縣豪設事陳訴維翰窮究其詐杖殺之健訟衰息累除同知保靜軍節度使檢括户籍一郡稱平遷侍御史拜參知政事貞祐初罷為定海軍節度使鎮撫兵備遇敵結營堡自守力窮不屈死之鄭子𣆀大定府人有文名天德中擢進士第三正隆二年命與諸進士雜試復擢第一改侍御史京畿旱詔子𣆀決囚遂澍雨人以比顔真卿顯宗深器重之改吏部侍郎兼修國史子𣆀英俊有直氣其為文亦然所著詩文二千餘篇孫德淵興中州人大定淮士遷沙河令有惠政累官大理丞審官院奏德淵剛正幹能可任繁劇遂再任貞祐中拜工部尚書攝御史中丞致仕卒冀禹錫龍山人崇慶進士入仕以能稱初任沈邱簿為令所誣坐廢朝士累薦為當途所阻得扶風丞末帝東遷擢為應奉翰林文字充尚書省都事富察官奴之變家人都請羸服免禍不從赴水死富察改見順天府名宦元劉亨安川州人太師穆呼哩經畧遼東命亨安充行軍總管從王師渡河入關敗金人於三峯山從征巴蜀出竒制勝戰功居多進圍成都亨安為先鋒大破之有喬長官與亨安爭功未幾攻城喬為砲所傷亨安負之以出喬感愧從軍十年累著勲伐所獲金帛悉推與將佐士卒咸樂為用穆呼哩舊作木華黎今改正姚樞柳城人後遷洛陽少力學楊惟中與之偕覲太宗世宗在藩邸待以客禮詢治道樞為書數千言陳治平大經及救時之弊即位立十道宣撫使以樞使東平拜中書左丞昭文館大學士卒諡曰文獻子煒仕為平章政事從子燧官至翰林學士承㫖以文章大家知名卒諡曰文趙炳灤陽人父宏有勇畧為征行兵馬都元帥炳㓜失怙恃鞠於從兄歲饑遇盜欲殺之兄解衣就縛炳年十二泣請代兄盜驚異舍去甫冠侍世祖於潛邸恪勤不怠遂蒙眷遇中統元年判北京宣撫司有政績人為刑部侍郎遷遼東提刑按察使豪猾屏迹帝以關中重地思得剛鯁舊臣以臨之授炳京北路總管兼府尹遇事即制以法關民以安為運使郭琮所害帝立誅琮子六仁顯仁表仁榮等俱登顯仕張庭珍全州人授同簽土番經畧使以朝列大夫使安南諭其世子來入朝安南遂服授襄陽行省郎中以功遷中順大夫宋平拜大司農卿南京路總管兼開封府尹卒於官庭珍性清慎丞相巴延甞語人曰諸將渡江鮮不荒貪惟我與國寶始終自守時人以此重之國寶庭珍字也巴延舊作伯顔今改正張庭瑞庭珍弟㓜以功業自許兵法地志星厯卜筮無不推究以宿衛從憲宗伐蜀屢立戰功授成都總管舟楫兵仗糧儲皆倚以辦蜀平擢諸部宣慰使甚得戎夷心改潭州總管卒王克敬大寕人㓜竒穎大寕習尚少文克敬獨孜孜為儒者事仕為浙江行省照磨監四明倭人互市撫以恩意帖然無敢譁拜監察御史㝷遷左司都事擢江西道亷訪司副使轉兩浙鹽運司使首減紹興民食鹽五千引入為吏部尚書所著有詩文奏議傳於世崔敬大寕人通刑名法律之學累遷監察御史出僉山北亷訪司事治獄多平反至正初遷河南又遷江東所至抑豪强惠下窮洗冤訟百廢具舉除刑部侍郎㝷拜中書參知政事卒贈資善大夫劉廷讓大寕人至順初北方兵起廷讓挈家避山中有㓜弟方乳兵急廷讓棄己子抱㓜弟扶母疾驅得免事聞旌之居喪廬墓者有北京張洪範興中石抺昌齡明呉澄興州人洪武末以功累官指揮僉事燕兵起隨駕克懷來等城卒贈梁國公諡莊勇本朝馬瑢承德人㓜穎敏弱冠以文章名乾隆庚子舉於鄉及門數十人各有所得平生不尚浮譽務以明體達用為立教之本承德之有科名葢自瑢始康文英承德人樂善不吝嘗捐田立義冢俾客死及無力瘞埋者無露骴其他舉類是者無不樂為之趙可立承德人乾隆六年百有二歲恭值高宗純皇帝巡幸塞外扶兒迎謁道左尚能道前朝事賜御製七言絶句詩一首楊珍豐寕人每歲歉煮糜粥施綿褌老而不倦鄉鄰義之王宏信承德人由行伍任河屯協守備嘉慶三年隨征川匪以功進遊擊一日探賊遇伏困垓中宏信往來衝突賊復大至馬躓弗得起力竭被害事聞廕卹如例入祀昭忠祠黄益慶平泉人任八溝營暖泉外委嘉慶三年隨征川匪於大鵬寨擊賊陣亡事聞廕卹如例同時死難者旗伍劉士太崔國祥王珨傅訓劉文漢張瑶黄顯何旺民伍許琨白文委崔鳳儀劉輔劉福增宋洪陳守義陳守志張保李成德楊國亮于强呉傑李國玉于永勝尹朝榮周禮佟福張得旺李進祿張洪亮馬後張起馬成均照例議䘏朱予德豐寕人其先浙江人嘉慶十五年歲大饑會有鬻女者予德解囊贈之撫其女成人歲稔令還家全婚配邑瀕東河每盛漲多水患予德出家貲築捍壩以衛民廛至今頼之復創立義學建文昌祠孶孶爲善洵足風焉流寓北魏奚兜烏侯子世祖時親侍左右隨從征討常持御劍後以罪徙龍城尋徴爲知臣監賜爵富城侯列女遼邢簡妻陳氏營州人甫笄通經義及詩賦一覽成誦好吟咏既于歸孝舅姑閨門和睦親黨推重有六子親教以經後二子抱樸抱質皆以賢位宰相卒贈魯國夫人金王維翰妻姚氏利州龍山人維翰以遇敵死難氏亦不屈死贈芮國夫人諡貞潔元蕭趙氏大寕人年二十夫病劇氏為巨棺以死自誓夫殁自經死家人同棺葬焉又大寕趙臛兒妻安氏陳恭妻張氏武夀妻劉氏宋敬先妻謝氏薩里妻蕭氏興州某妻魏氏利州高托卜嘉妻白氏俱夫亡殉節被旌蕯里舊作撒里高托卜嘉舊作塔必也今俱改正段氏大寕人浙江省左丞潘公有七姫皆良家子敵抵境公力不支召七姫謂曰我受國重恩義不顧家脱有不夙戒若等毋為人嗤也段氏年十八跪請先死趨入室以帨自經六人亦相繼縊死本朝楊富妻叢氏承德人夫亡撫孤守節以夀終子永平妻于氏年二十九而寡遺孤遇竒婚李氏甫六年亦寡三世同貞又錢玉成妻張氏姜成化妻宋氏子富有妻馬氏張桂林妻李氏姜瑞妻張氏李際泰妻呉氏原大治妻張氏裘大慧妻王氏孟承綱繼妻張氏張鈞妻錢氏陳兆鳳妻姚氏梁仁妻葛氏遲中仁妻莫氏呉廷柱妻王氏呉裕珍妻勞氏王彦母孫氏郭祥妻徐氏李承勲妻孫氏趙廷勲妻曹氏柴如玉妻朱氏姜文玉妻戚氏姜巽言妻王氏趙志恒妻劉氏王槐茂妻李氏李某妻喬氏舒成林妻趙氏魏明和妻王氏郭萬里妻姜氏楊君貞妻王氏李蘭妻姜氏曲天瑞妻劉氏左玉環妻姜氏趙廷珍妻郭氏高聖傑妻康氏黄思妻丁氏董錦妻門氏姜宗智妻鮑氏勞得祿妻紀氏孫慶元妻李氏王之惠妻吕氏楊全禮妻王氏楊君起繼妻華氏李夢鳳妻焉氏李文發媳潘氏宋士俊妻紀氏劉起妻米氏崔鉅妻曲氏孟維屏妻劉氏盛之軒妻李氏任泮妻程氏尹廷諤妻王氏孟銓妻崔氏李同媳焉氏劉惠妻劉氏閻昭妻王氏王友母張氏楊君璽妻王氏李希周妻董氏朱文成妻趙氏衡廷璽妻胡氏子智勇妻張氏紀藴躬妻宋氏尹吉妻李氏董其五妻王氏姜智恒妻某氏張富美妻高氏李希孔妻冷氏孫寶山妻王氏孟信妻朱氏劉量妻郭氏劉某妻王氏張煥妻宋氏劉宗哲妻孫氏王殿邦妻李氏周雅妻丁氏楊珍妻宋氏姜淑妻馬氏劉德寶妻周氏陳明妻盧氏薛銀貴妻馬氏呉宗舜妻王氏子永福妻某氏朱文亮妻劉氏孫碩德妻于氏楊丕照妻姜氏王學禮妻王氏宋文治妻楊氏于進和妻孫氏李國興妻佟氏丁文英妻林氏黄學升妻丁氏任先瑞妻羅氏任國泰妻周氏翟運旺妻劉氏劉名山妻杜氏閻德潤妻韓氏邵曰頌妻王氏吕元長妻陳氏郭萬春妻王氏李發仁妻潘氏劉志元妻林氏辛富妻孫氏吕敬妻王氏吕善妻郭氏紀自珠妻王氏郭起妻姜氏宋有才妻黄氏孫國盛妻楊氏劉永泰妻邸氏王容妻胡氏孫雲久妻高氏劉宗哲妻帥氏任普之嫂王氏馬儀龍妻李氏俱夫亡守節紀維新聘妻馬氏承德人甫納采維新病瘵勢日劇壻家通辭令改議氏聞之慟不欲生泣求過門侍疾父母舅姑不忍違其意爲諏吉成禮實俟期而婚也夫殁或勸之歸氏正色曰婦人義不二既許稱未亡願爲死者事父母以終李琳妻王氏承德人年二十適琳紡絍佐讀貧能助志琳館於外有窺者語犯之氏忿詈窺者逸氏自經死諸生某有詩十章表其烈又李文妻冀氏楊得貴妻劉氏叢林學妻張氏俱夫亡自盡以殉于起仁妻田氏承德人夫亡守節乾隆年閒旌盧氏女灤平人守正捐軀同縣烈婦傅某妻郭氏劉三妻林氏節婦陳廷端妻張氏蕭起鳳妻鄭氏均乾隆年間旌柏氏女平泉柏世興女字潘某未婚而潘殁女縞素自經同州烈婦王興妻朱氏劉秉恒妻龍氏孫貝妻叢氏節婦趙某妻童氏陳明吉妻汪氏白天潔妻劉氏宿禮妻王氏于之禮妻林氏趙立妻賈氏姚錋妻張氏胡漢公妻言氏朱繼熊妻胡氏全岡妻王氏薛佑庭妻陳氏張希文媳王氏馮翽妻傅氏宋光禮妻郭氏楊學禮妻蔡氏閻盡恭妻王氏單珍妻趙氏張文妻果氏隋福隆妻盧氏均乾隆年間旌白福旺妻劉氏平泉人守正捐軀同州烈婦傅守榮妻張氏節婦趙辛妻韓氏蔡應中妻尹氏均乾隆年間旌朱永梁妻王氏豐寕人年十九而寡矢志守節同縣節婦高某妻丁氏滕文錦妻張氏於國禧繼妻姚氏孫訓妻史氏靳全亮妻郭氏張盛道妻王氏張紹宏妻馬氏王士璇妻徐氏高萬超妻任氏均乾隆年間旌姜氏女豐寕姜璽照女年十六遇暴不從𬒳害同縣辛仲舉女趙景全女屈成富妻孫氏俱守正捐軀均乾隆年間旌初成章妻王氏建昌人夫亡撫孤守節越十餘年子亦殤氏泣曰吾之所以不忍殉夫者爲孤在也今猶視息遺憾地下乎遂自經死同縣節婦郝成妻倪氏潘起鳳妻趙氏劉某妻張氏陳聲遠妻劉氏均乾隆年間旌孫趕子妻尹氏建昌人守正捐軀乾隆五十七年旌滕彥臣妻董氏赤峯人夫亡撫子珍成立娶妻王氏未幾珍亦卒兩世甇焭苦節相勵同縣節婦戰國禮妻李氏李大寛妻張氏趙洙源妻張氏劉芳妻魏氏均乾隆年間旌劉進才妻楊氏赤峯人守正捐軀乾隆年間旌齊大妻王氏朝陽人守正捐軀乾隆年間旌袁某妻劉氏承德人守正捐軀嘉慶年間旌范氏女平泉人范學智女守正捐軀同州辛得義女均嘉慶年間旌劉文魁妻秦氏豐寕人守正捐軀同縣節婦朱大鋕妻張氏朱炤亭妻沈氏高萼廷妻周氏劉順聘妻賈氏均嘉慶年間旌侯大妻曹氏建昌人守正捐軀同縣烈婦于徐氏均嘉慶年間旌王氏女赤峯人名順姐守正捐軀同縣王坡姐均嘉慶年間旌杜希傳母韓氏朝陽人守正捐軀嘉慶年間旌土産棉綢府境多有之其細而白者不減吳中土人名為土綢鹿塞山産鹿甚盛其角自兩义四义六义至八义年久則數至八义以外蒙古稱鹿謂布古今圍場地及府屬多有稱布古圖者皆以有鹿得名麅形似麞蒙古謂麅為朱爾諸地有稱朱爾圖者皆以有麅處得名麈青羊飛鼠虎豹唐書地理志營州土貢豹尾山羊貂穀夜亮木金蓮花榆耳口北志出獨石口外人薓唐書地理志檀州營州俱土貢人薓
