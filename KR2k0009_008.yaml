body:
  text: 河閒府在直隸省治南一百四十里東西距一百六十里南北距三百四十五里東至天津府青縣界一百里西至保定府蠡縣界六十里南至山東濟南府徳州界二百二十五里北至保定府雄縣界一百二十里東南至天津府南皮縣治一百四十里西南至冀州治二百三十里東北至順天府文安縣治一百三十里西北至保定府安州治一百四十里自府治至京師四百一十里分野天文尾箕析木及虚危元枵之次今府治及各縣皆尾箕之宿爲燕分野景州則虚危之宿爲齊分野建置沿革禹貢冀州之域南境兼屬燕春秋爲兗齊及晉東陽地戰國爲燕趙二國之境戰國策張儀說趙武靈王割河閒以事秦秦爲鉅鹿上谷二郡地按漢書樊噲從攻秦河閒守軍于杠里是秦時已有河閒郡然不知治在何所漢初為鉅鹿涿二郡地文帝二年始分置河閒國治樂成今獻縣屬冀州後漢初併入信都國和帝永元二年復置晉因之後魏初為河閒郡屬定州太和十一年始分定冀二州置瀛州寰宇記以瀛海為名隋開皇初廢郡存州大業初復改州為河閒郡唐武德四年復曰瀛州天寶元年復曰河閒郡乾元元年復曰瀛州屬河北道五代晉天福元年割屬遼周顯德元年收復宋仍曰瀛州河閒郡大觀二年升為河閒府置瀛海軍節度屬河北東路金天㑹七年為河北東路治置總管府正隆閒復置瀛海軍節度元至元二年置河閒路總管府屬中書省明洪武元年曰河閒府永樂初直隸京師本朝初因之領州二縣十六順治六年省興濟縣雍正三年以靜海青二縣改屬天津州七年升滄州為直隸州以南皮鹽山慶雲東光四縣屬之九年以南皮鹽山慶雲屬天津府束光縣復来屬今領州一縣十河閒縣附郭東西距七十三里南北距六十里東至獻縣界七十里西至肅寕縣界三里南至獻縣界二十五里北至任邱縣界三十五里東南至獻縣界二十五里西南至肅寕縣界十二里東北至順天府大城縣界一百十里西北至保定府高陽縣界二十里漢置州鄉武垣二縣俱屬涿郡後漢省州鄉以武垣屬河閒國晉因之後魏太和十一年移河閒郡治武垣又置瀛州於縣之趙都軍城隋大業𥘉置河閒縣為河閒郡治省武垣入焉唐為瀛州治宋為河閒府治金因之元為河閒路治明為河閒府治本朝因之獻縣在府南六十里東西距百四十里南北距七十五里東至天津府青縣界一百里西至深州饒陽縣界四十里南至交河縣界四十里北至河閒縣界三十五里東南至交河縣治五十里西南至深州武强縣界二十五里東北至青縣治一百六十里西北至肅寕縣治八十里本漢藥成縣為河閒國治後漢因之晉曰楽城仍為國治後魏太和十一年徙郡治武垣以縣屬之隋開皇十八年改曰廣城仁夀元年又改曰樂夀仍屬河間郡大業未竇建德都此唐武德四年建德平還屬瀛州大厯中改屬深州元和十年復隷瀛州後又改屬深州五代因之宋至道三年還屬瀛州金天會七年升為夀州天德三年改曰獻州屬河北東路元至元二年廢州仍為樂壽縣未幾復為州屬河閒路明初省縣入州洪武八年又降州為獻縣屬河閒府本朝因之阜城縣在府南百四十里東西距三十六里南北距三十里東至東光縣界三十里西至冀州武邑縣界六里南至景州界二十五里北至交河縣界八里東南至景州界三十里西南至武邑縣界十五里東北至交河縣界三十五里西北至深州武强縣治六十里漢置阜城縣屬勃海郡後漢徙廢晉復置後魏分屬武邑郡隋開皇九年屬觀州大業二年屬信都郡唐武德四年屬觀州貞觀十七年屬冀州天祐二年改曰漢阜五代漢復故宋淳化元年屬永靜軍嘉祐八年省為鎮入東光熙寕十年復置金屬景州元因之明洪武七年屬河閒府本朝因之肅寕縣在府西四十里東西距五十七里南北距四十里東至河閒縣界三十七里西至保定府蠡縣界二十里南至深州饒陽縣界二十里北至保定府高陽縣界二十里東南至獻縣治八十里西南至深州安平縣治九十里東北至任邱縣治八十里西北至保定府高陽縣治六十里本漢武垣縣地隋唐為河閒縣地宋雍熙初置平虜寨景德二年改為肅寕城金升為縣屬河閒府元至元二年廢為鎮入河閒縣尋復置屬河閒路明屬河閒府本朝因之任邱縣在府北七十里東西距八十五里南北距九十三里東至順天府大城縣界七十里西至保定府高陽縣界十五里南至河閒縣界三十五里北至保定府雄縣界五十八里東南至河閒縣界四十里西南至肅寕縣治八十里東北至順天府文安縣治七十里西北至保定府安州治七十里本戰國燕鄚邑漢置鄚阿陵高郭三縣俱屬涿郡後漢省阿陵高郭二縣以鄚縣屬河閒國晉因之後魏及隋屬河閒郡唐武德四年改屬滿州五年分置任邱縣屬瀛州景雲二年於鄚縣置鄚州併領任邱開元十三年改鄚為莫天寶初改州為文安郡乾元元年復曰莫州屬河北道五代晉天福元年地入遼周顯德六年收復宋熙寕六年省莫縣入任邱移州治之屬河北東路金貞祐二年州縣俱廢改置莫亭縣元𥘉復於莫亭置莫州併置任邱縣屬之至元二年州縣俱省入河閒後復置屬河閒路明洪武七年省莫州入任邱屬河閒府本朝因之交河縣在府東南一百十里東西距八十里南北距四十八里東至天津府南皮縣界五十里西至深州武强縣界三十里南至東光縣界八里北至獻縣界四十里東南至東光縣界六里西南至阜城縣治四十五里東北至天津府青縣界一百五里西北至獻縣界二十里漢置建成成平景城三縣皆屬勃海郡後漢省建成景城以成平屬河閒國晉因之後魏延昌二年移縣治故景城屬章武郡隋開皇十八年改成平曰景城屬河閒郡唐武德四年屬瀛州貞觀元年屬滄州大厯七年還屬瀛州長慶二年分屬景州大中後又屬瀛州宋熙寕六年省景城入樂夀縣金大定七年始分樂夀置交河縣屬獻州元至元二年又省入樂夀尋復置明洪武七年屬河閒府本朝因之寕津縣在府東南二百三十一里東西距八十里南北距六十五里東至山東武定府樂陵縣界五十里西至吳橋縣界三十里南至山東濟南府德平縣界二十五里北至天津府南皮縣界四十里東南至武定府治一百三十里西南至濟南府德州界三十五里東北至天津府滄州界四十五里西北至東光縣治七十里本漢東光臨樂二縣地屬勃海郡後漢省臨樂晉置新樂縣屬樂陵國後魏省隋開皇十六年置胡蘇縣屬平原郡唐武德四年屬觀州六年屬滄州仍移州來治貞觀元年州還治清池仍以縣屬觀州十七年又屬滄州天寶元年改名臨津貞元三年屬景州長慶元年還屬滄州二年又屬景州太和四年又屬滄州景福元年仍屬景州五代周顯徳二年還屬滄州宋熙寕六年省入南皮縣金改置寕津縣屬景州元初屬濟南路至元二年屬河閒路明屬河閒府本朝因之景州在府東南一百九十里東西距八十八里南北距六十五里東至呉橋縣界十八里西至冀州棗强縣界七十里南至山東濟南府徳州界三十五里北至阜城縣界三十里東南至吳橋縣治四十里西南至故城縣界八十里東北至東光縣界四十里西北至冀州武邑縣界八十里漢置修縣屬信都國後漢改屬勃海郡晉及後魏因之隋開皇五年改修曰蓨仍屬信都郡唐武德四年於弓高縣置觀州以縣屬之貞觀十七年州廢改屬德州永泰元年還屬冀州五代宋因之金始以蓨縣屬景州元初升為元州後復為蓨縣至元二年自東光移景州來治屬河閒路明𥘉省蓨縣入州屬河閒府本朝因之吳橋縣在府東南二百四十里東西距四十五里南北距六十五里東至寕津縣界二十五里西至景州界二十里南至山東濟南府德州界二十五里北至東光縣界四十里東南至濟南府陵縣界三十里西南至德州界二十五里東北至寕津縣治五十里西北至景州治四十里漢置安縣屬平原郡後漢省晉置東安陵縣屬勃海郡後魏去東字隋大業初併入東光唐武德四年復置安陵縣屬觀州貞觀十七年屬徳州宋景祐二年省入將陵縣金始分將陵之吳橋鎮置吳橋縣屬景州元明因之本朝屬河閒府東光縣在府東南一百六十里東西距六十五里南北距五十五里東至天津府南皮縣界三十五里西至阜城縣界三十里南至吴橋縣界二十里北至南皮縣界三十五里東南至寕津縣治六十里西南至景州治六十里東北至南皮縣治四十五里西北至交河縣治四十里漢置東光縣屬勃海郡後漢至晉魏因之東魏移勃海郡於此隋開皇初郡廢九年於縣置觀州大業初州廢以縣屬平原郡唐武德四年於弓高置觀州以縣屬之貞觀十七年州廢縣屬滄州貞兀二年又於弓高置景州以縣屬之長慶元年州廢還屬滄州二年又屬景州太和四年又還滄州景福元年又屬景州天祐五年移州來治五代周顯德二年廢景州為定遠軍屬滄州宋太平興國六年以單直隸京師景德元年改曰永静軍屬河北東路金𥘉仍升為景州七安中避諱改曰觀州元初復曰景州至元二年始移州治蓨縣以東光為屬縣明因之本朝屬河閒府雍正七年改屬滄州九年還屬河閒府故城縣在府南二百八十里東西距七十五里南北距五十五里東至山東濟南府德州界二十五里西至冀州棗强縣界五十里南至山東東昌府武城縣界二十五里北至景州界三十里東南至東昌府恩縣界十八里西南至武城縣界二十五里東北至德州界二十里西北至景州界三十里漢置廣川厯二縣皆屬信都國後漢省厯縣為廣川縣地北齊為棗强縣地隋為長河縣地唐元和四年移長河縣治此十年又徙廢元初以唐故長河縣置故城縣屬河閒路至元二年併為故城鎮是年復置屬景州明因之本朝屬河閒府形勢九河之㑹五壘之居寰宇記東瀕滄海西麓太行古碑記南枕滹沱北背高河元獻州記當水陸要衝四方供億皆取給焉元史地理志北據三關南面九河府志風俗河閒之民其氣清厥性相近爾雅疏人性敦厚務在農桑隋書地理志質厚少文多專經術大率氣勇尚義號為强忮土平而近邊習於戰鬬宋史地理志古稱禮樂之國衣冠文物之盛比於鄒魯元李繼本送董景凝序寡求不爭有古人風元獻州記俗尚祈禱信鬼神圖經城池河閒府城周十六里門四濠廣五丈宋熙寕中築明萬厯十年甃甎本朝乾隆九年修河閒縣附郭獻縣城周六里門四濠廣三文金天㑹八年建明成化二年重建本朝康熙七年修乾隆三年重修阜城縣城舊土城周五里門四環城為濠濠外有隄明成化二年拓東城二里增設二門本朝康熙九年修乾隆十年重修四十四年甃甎肅寕縣城舊土城周六里明天啟五年改建甎城周六里有奇門二濠廣四丈外又為土牆周八里本朝康熙五十六年修乾隆十六年重修任邱縣城周五里有奇門四明洪武七年築萬厯三十八年甃甎濠廣五丈引王帶河水外有䕶城隄本朝乾隆十六年修交河縣城周六里門四明宏治中築隆慶中甃甎本朝康熙十年修乾隆十六年重修寕津縣城周三里門四濠廣一丈五尺明景泰三年築隆慶二年甃甎本朝乾隆十七年修三十三年重修景州城舊土城周四里門四濠廣二丈元天厯閒築本朝康熙十一年修乾隆九年撤舊增築二十三年改建甎陴吴橋縣城周四里有奇門四明正統二年因舊址築崇禎十一年改建甎城東光縣城舊土城周三里有奇明崇禎十一年改建甎城周六里門四濠廣三丈本朝康熙十年修乾隆十三年重修故城縣城周四里門四濠廣二丈五尺明成化二年築本朝康熙六年修乾隆十五年重修學校河閒府學在府治東南元至元六年建本