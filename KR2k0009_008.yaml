上書乞留數年李繪平棘人靜帝時爲瀛州刺史行墾田法民用以足瀛州三郡俱請爲繪立碑於郡街北齊堯雄長子人神武時代兄傑爲瀛州刺史時禁網疎闊官司相與聚歛惟雄義然後取接下以恩甚為吏民所懷李稚廉高邑人遷瀛州長史神武行經冀部總合河北六州文籍商榷户口增損親自部分多在馬上徴責文簿指影取備事非一緒稚廉應機立成恒先期㑹為諸州準的神武深加慰勉隋侯莫陳穎代人高祖時為瀛州刺史有惠政坐事免官百姓送者莫不流涕相與立碑頌清德郭衍介休人開皇五年為瀛州刺史遇大水屬縣多漂沒衍備船栰并齎糧食拯救之民多獲濟先開倉脤恤後始奏聞帝大善之敬肅蒲坂人開皇中為安陵令有能名來護兒江都人仁夀初為瀛州刺史以善政聞頻見勞勉煬帝嗣位被徴入朝百姓攀戀累日不能出境詣闕上書致請者前後數百人帝謂曰卿昔為名將今又為良二千石可謂兼美矣唐盧士叡武德時為瀛州刺史劉黒闥叛遣輕騎破其郛拒戰半日為賊擒欲使說下城堡不從見殺馬匡武武德五年為瀛州刺史劉黒闥陷瀛州匡武死之鄭德本武德時為瀛州刺史與滄州薛大鼎冀州賈敦頤皆有治名河北稱鐺腳刺史賈敦頤寃句人貞觀時為瀛州刺史州瀕滹沱滱二水歲湓溢壊室廬浸洳數百里敦頤為立隄堰水不能暴百姓利之杜希望萬年人為安陵令都督宋慶禮表其異政魚思賢開元中為任邱令開通利渠以洩陂淀得地二百餘頃百姓利之號其陂曰魚君陂穆凝河内人史思明略境郡守召凝攝東光令賊遣使誘凝凝斬以狥宋馬仁瑀夏津人開寳四年遷瀛州防禦使兄子嘗飲醉誤殺平民繫當死民家自言非有宿恨但過誤耳願以過失殺傷論仁瑀曰我為長吏而兄子殺人此怙勢非過失也仁瑀豈以私親而亂國法哉遂論如律王晉卿河朔人開寶四年為鄚州刺史在郡謹斥堠善撫循士卒皆樂為用邊民安堵高繼勳蒙城人眞宗時知瀛州時歲饑募富人出粟以給貧者明年大稔木生連理者四郡人上治狀請留李延渥晉陽人咸平中知瀛州遼來攻延渥率州兵拒守遼遁去楊延昭太原人即延朗咸平中為鄚州刺史遼南侵延昭伏銳兵於羊山西自北掩擊且戰且退及西山伏發遼大敗獲其將函首以獻進本州團練使張綸汝陰人知瀛州興利除害有循吏風張亢臨濮人知瀛州增拓城關馭軍吏嚴明民繪像祀之唐介江陵人知任邱縣當遼使往來道驛使以誅索破家為苦介坐驛門令曰非法所應給一切勿與稍毁吾什器者必執之皆帖服以去沿邊塘水歲溢害民田中人楊懷敏欲割邑西十一邨地瀦漲潦介築隄闌之民以為利包拯合肥人知瀛州諸州以公錢貿易積所負十餘萬悉奏除之程戡陽翟人知瀛州遼使過稱疾求著帽見戡使謂曰有疾可毋相見見必如禮使者語屈冠而見石元孫浚儀人知鄚州有治績彭思永廬陵人英宗時知瀛州北俗以桑麻為産民懼賦不敢藝日益貧思永始奏更之李師中楚邱人神宗時知瀛州師中志尚甚高在官不貴威罰務以信服人去之日民擁道遮泣馬不得行張景憲河南人神宗時知瀛州上言比歲不登民積逋欠今方小稔而官督使并償道路流言其禍甚於凶歲願使寛假帝從之王克臣洛陽人神宗時知瀛州有告外閒入境密㫖趣具獄株連甚衆克臣陰緩之已而得為閒者於他道孫永長社人神宗時知瀛州河決於貝瀛冀尤甚民租以災免者州縣懼常平法徴催如故永連章論止帝從之仍發粟以賑李肅之濮州人神宗時知瀛州大雨地震官舍民廬皆摧陷肅之出入泥潦中給草囷以儲庾粟之暴露者為苃舍以居流民啓廩賑給嚴備盜竊帝聞而嘉之遣使勞賜韓宗武雍邱人為河閒令値河溢增隄護城吏率兵五百伐材近郊雖墓木亦不免父老遮道而泣宗武入府白罷之王漢之常山人徽宗時知瀛州嘗上言自何承矩規塘濼之地屯田東達於海其後又修保塞五州為隄道備種所宜木至三百萬本此中國萬世之利也今寖失其道願講行之金韓錫漁陽人大定初同知河閒府事帝引見誡之曰聞皇族居彼者縱甚卿當以法繩之錫下車宣布詔言後無有撓政害民者富察鼎夀上京赫書河人大定閒授河閒尹號令必行豪右屏迹有宗室居河閒侵削居民鼎夀奏徙其族於平州郡内大治富察鼎夀舊作蒲察鼎壽赫書河舊作曷速河今並改正石抹元毅咸平人為寕津令有劇盜白晝恣刼為民害元毅以術防捍賊散去李完馬邑人明昌中為河閒府治中提刑司言完習法律有治劇才軍民無閒語遷刺史仍以璽書襃諭路鐸冀州人章宗時為景州刺史述十二訓皆勸人為善遍諭州郡使知之高錫遼陽人貞祐初累遷河北東路按察轉運使城破自投城下而死元謝讓穎昌人為河閒等路都轉運鹽司經厯先是竈户在軍籍者悉除其名以丁多寡為額輸鹽其後多僱舊户代為煮鹽而僱錢甚薄讓言軍户既落籍為民當與舊竈户均役既令代役豈宜復薄其傭使重困乎自今僱人必厚値乃聽先是逃亡户率令見户代納其鹽由是豪强者以計免而貧弱愈困譲令驗物力多寡比次甲乙以均之高源晉州人至元時除河閒等路都轉運副使撫治有條竈户逃者皆復業常賦外羡餘幾十萬緡德爾鄂什伊吾廬人延祐四年為河閒路總管歲饑出俸金及官庫所積賑之活數十萬人河閒當水陸要衝四方供億皆取紿焉德爾鄂什立法調遣民便之復建言增置便習弓馬尉一人益邏兵之數於是盜賊屏息德爾鄂什舊作迭里威失今改正吕思誠平定人天厯初授蓨縣尹差民户為三等均其徭役令社學共祀孔子每歳春行田樹蓄勤敏者賞以農器流民聞風復業印識文簿卑社長藏之季月報縣不孝弟不事生業者悉書之罰其輸作他日買羊劉智社民李持酒來見愬其弟匿羊思誠叱之退玉青兄弟四人友愛彌篤思誠至其家取酒勸酬李之兄弟聞之各自切責悔前過析居三十年復還同爨縣多淫祠思誠悉命毁之惟存董仲舒祠趙師魯文安人天厯中為河閒路轉運鹽使除害興利法度修飭絶巡察之姦省州縣廚傳贈遺之費竈户商人無不便之歲課遂大增暇日又割己俸率僚吏新孔子廟命吏往江右製雅樂聘工師春秋釋奠士論稱之王思誠磁陽人至正時為河閒路總管磁河水頻溢決鐵燈竿思誠集民作隄晝夜督工期月而塞民獲耕藝歲用大稔南皮民父祖嘗瀕御河種柳輸課於官後河決柳沒官猶徵之子孫不能償思誠請於朝除之郡庭生嘉禾三本僚屬欲上進思誠曰吾常惡人行異政沽美名乃止所轄景州廣川鎭董仲舒故里也河閒尊福鄉毛萇舊居也皆請建書院置山長明向朴慈谿人建文時獻縣知縣燕兵起獻當其衝而舊無城郭朴集民守禦與燕將譚淵戰敗懷印而死呉源永豐人永樂中為吳橋知縣勤於撫字賦役均平洪熙元年秩滿民乞留命再任劉深臨汾人永樂末為景州知州善於撫字景多水患開惠民渠以洩之每秩滿民輒保留治景凡三十餘年廖謨泰和人正統閒為河閒同知潔己愛民弭盜息訟民大悅後知府缺民數千走闕下請即用謨帝嘉許之政績益懋吏民戴之無閒言楊貢正統中為交河典史會知縣遷去民詣闕乞用貢吏部以發身掾吏難之帝曰若拘以資格用人之途狹矣遂授之果以稱職聞洪遠徽州人宏治三年授交河知縣興學勸農鉏姦革弊發粟賑饑全活者甚衆程㸅南城人正德中為景州學正訓士務砥名節上官命主瀛州書院選十八學弟子從之顔孕紹曲阜人崇禎十五年為河閒知府歲大饑死亡載道寇盜充斥拊循甚至大兵臨城與參議趙珽同知姚汝明知縣陳三接等堅守時援兵率逗留不進孕紹知城必破預集一家老幼於室中積薪燒之而身往城上策戰守及城破趨歸官舍舉火焚室衣冠北向再拜躍火中同死贈光祿卿本朝乾隆四十一年賜諡忠烈予入忠義祠趙珽慈谿人崇禎中為河閒兵備僉事大兵破城珽死之一門十四人俱同死贈太僕卿本朝乾隆四十一年賜諡烈愍予入忠義祠姚汝明夏縣人崇禎中河閒同知城破與妾任氏同死贈僉事本朝乾隆四十一年賜諡節愍予入忠義祠陳三接文水人崇禎中知河閒縣歲旱饑人相食三接至雨即降有疑獄數年不決三接立決之妻武氏賢三接見封疆多故遣之歸荅曰夫死忠婦死節分也我安忍歸城破三接巷戰死武氏亦從之贈按察僉事本朝乾隆四十一年賜諡烈愍予入忠義祠吕大成萊蕪人崇􅍬末授阜城知縣城破不屈死本朝乾隆四十一年賜諡節愍予入忠義祠白慧元清㵎人崇禎中為任邱知縣以守城功命減俸行取因忤大閹將逮治而大兵抵城下慧元佐代者李廉仲守城無何廉仲遁慧元力戰死贈按察僉事本朝乾隆四十一年賜諡節愍予入忠義祠王九鼎崇禎中任故城知縣城潰戰死城上朝乾隆四十一年賜諡節愍本予入忠義祠劉廷訓通州人崇禎中為吳橋訓導大兵至知縣縋城遁廷訓語守者曰守死逃亦死曷若死於守為忠義鬼乎率衆堅守三晝夜城外天發如雨而廷訓受傷束胸力戰又中六矢乃死本朝乾隆四十一年賜諡烈愍予入忠義祠本朝徐淳奉天人順治二年知任邱縣拯難卹殘孑遺安堵入祀名宦祠王德教奉天人順治三年知河閒府四年土賊起河閒東至天津及運河左右皆擾蠡縣賊率衆逼城德教與兵備道王維新嬰城守委守備王丕承章羽泰分汛抵禦丕承羽泰潛通賊乘大雨引寇自南門入德教聞變率家人巷戰死於南門巡檢潘柱典史邵鯤隨戰與維新同日死事聞贈德教光祿寺卿維新太僕寺卿柱鯤皆賜卹維新奉天人柱籍無考鯤紹興人劉果諸城人順治進士知河閒縣才識敏練康熙八年聖祖仁皇帝駕幸河閒問民疾苦父老以果治狀奏召見襃之牆鼎墊江人康熙中知交河縣勤於政事巨細必親公餘手撰邑志爲當時推重嚴曾業浙江人康熙中知交河縣捐貲繕黌序建義學延通儒爲師多所成就力行保甲匪類屏絕境内肅然黃世發貴州人康熙中知肅寕縣教民以農桑爲業穿井以供灌溉邑苦乏薪世發令植柳數萬株於郭外不三年而材足供㸑在任十三年悃愊無華民咸愛敬之雍正年閒詔贈四品服仍留治縣事後擢水利營田觀察使杜于藩江都人康熙中知吳橋縣治獄如神無枉無縱穿渠導水邑不被患在任十三年以擢任去民思之立祠以祀方嵋江都人乾隆八年知河閒縣初至境以旱告災往時城居者例不入賑嵋曰此獨非我赤子乎雖違例干譴無憾乃步行遍查不濫不遺全活無算前提調官臣沈兆澐恭纂輯提調官臣王廣䕃恭覆輯校對官臣王允灌恭校校對官臣章詒燕恭覆校大清一統志河閒府三人物漢毛萇趙人初魯有大毛公為詩詁訓傳於家至萇治詩尤精是為小毛公以詩授同國貫長卿萇為河閒獻王博士是時言詩者有齊魯韓三家毛詩未得立於學官後三家皆廢而毛詩乃大行東漢鄭衆賈逵並傳之馬融作毛詩注而鄭康成更為之箋萇官至北海太守按班書言毛公趙人而不言河閒然考河閒一郡在戰國時燕齊趙實兼得之史記趙惠文王取齊昔陽為今故城縣地又言趙與燕鄚易是今之任邱亦趙地又班書以董仲舒為廣川人而儒林傳復云於趙則董仲舒董本廣川而亦云趙愈可證河閒之必有趙地矣至漢文封趙幽王弟遂為趙王而别分趙河閒地以封遂弟辟疆是漢初河閒實屬趙國班稱萇以詩授同國貫長卿不云同郡而云同國正與書萇為趙人同一義例舊志不載萇於人物附辨於此董仲舒廣川人少治春秋孝景時為博士非禮不行士皆尊師之武帝時以賢良對䇿天子覽而異之以為江都相事易王王素驕好勇仲舒以禮匡正王敬重焉仲舒為人廉直公孫宏嫉之時膠西王尤縱恣數害吏二千石宏乃言獨仲舒可使相膠西王聞仲舒大儒善待之以病免仲舒凡兩相國輙事驕王正身率下數上疏諫爭教令國中所居而治家居以修學著書為事朝廷有大議輙使使就問之以夀終後劉向稱為王佐材云按漢之廣川當為今景州及棗強縣地然江都遺跡在景州者班班可考當為州人無疑至舊志有以德州為廣川者以晉武帝改廣川為長河移屬平原故也實非漢之舊矣劉輔河閒人漢宗室舉孝廉為襄賁令上書言得失擢為諫大夫成帝欲立趙倢伃為后先下詔封倢伃父臨為列侯輔上書諫繫祕獄以辛慶忌等論救乃減死論為鬼薪張敏鄚縣人建初二年舉孝廉四遷為尚書時有人侮辱人父而其子殺之肅宗貰其死自後因以為比遂定為輕侮法敏屢諫駮正和帝從之尋拜司隸校尉厯遷汝南潁川太守徴拜司空劉淑樂成人好學明五經教授諸生常數百人五府連辟不就舉賢良方正辭以疾桓帝聞淑高名使輿病詣京師對策為天下第一拜議郎陳時政得失災異之占事皆效驗遷尚書納忠建議多所補益又遷侍中虎賁中郎將上疏以為宜罷宦官辭甚切直帝以淑宗室之賢特加敬異每有疑事常密諮之靈帝卽位宦官譖之下獄自殺張超鄚縣人良之後有文才靈帝時為車騎將軍朱儁别部司馬著賦頌等十九篇又善於草書妙絶時人世共傳之三國魏邢子昻鄚縣人從田疇遊積五年太祖辟為冀州從事時人稱之曰德行堂堂邢子昻累遷左馮翊病去時太祖諸子高選官屬令曰侯家吏宜得淵深法度如邢子昻輩遂以為平原侯植家丞子昻防閑以禮無所屈撓由是不合文帝時厯官尚書僕射賜爵關内侯張郃鄚縣人初從袁紹後歸太祖拜偏將軍與張遼俱為軍鋒屢立戰功文帝踐阼封鄚侯諸葛亮出祁山遣郃督諸軍拒亮將馬謖於街亭大破之拜征西車騎將軍郃識變數善處營陣料戰勢地形無不如計雖武將而愛樂儒士嘗薦同鄉卑湛經明行修詔嘉之後與諸葛亮戰中飛矢死諡壯侯沐並河閒人少孤苦為名吏有志介不畏強禦晉孟觀東光人少好讀書解天文惠帝時累官積弩將軍氐帥齊萬年反關中以觀沈毅有文武材用命討之觀身當矢石大戰十數生擒萬年威慴氐羌徴拜右將軍觀子平為淮南王允前鋒將軍討趙王倫戰死封孚蓨縣人慕容德時常外總機事内參密謀雖位任崇重謙虚博納甚有大臣之體文筆多傳於世南北朝魏高允蓨縣人少有奇度博通經史天文術數尤好春秋公羊世祖時拜中書侍郎使以經授東宫為郎二十七年不徙官諸子常樵採自給高宗時拜中書令恒呼為令公而不名顯祖卽位引入禁中參決大政贊帝傳位高祖進爵咸陽公允厯事五帝出入三省五十餘年忠勤廉慎隨事匡諫多所裨益軍國書檄皆出其手卒年九十八贈侍中司空諡曰文子忱長安太守為政寛惠百姓懷之忱弟懷恬淡退靜位東陽王諮議參軍子綽沈雅有度量博涉經史厯豫并二州刺史允弟燮亦有文武才太武詔徴辭疾不應封囘蓨縣人孝明帝時累遷瀛州刺史以水潦表求賑恤免其兵調州内賴之厯度支都官二尚書冀州大中正鄭雲諂事長秋卿劉騰得為安州刺史詣囘問安州治生何事為便囘曰卿荷國寵靈位至方伯宜思方畧以濟百姓如何問治生乎雲慙失色領御史中尉劾奏僕射元欽時人稱之終右光祿大夫諡孝宣子隆之弱冠時仕州郡主簿尋參齊神武經畧凡四為侍中再為吏部尚書一為僕射四為冀州刺史卒贈太保諡宣懿子子繪和理有器局仕齊官至尚書右僕射諡簡封軌囘族叔通覽經傳與武邑孫惠蔚善惠蔚每推軌曰封生之於經義吾所弗如太和中拜著作郎累遷廷尉少卿軌以方直自業嘗以務德慎言修身之本姦囘讒佞世之巨害乃為務德慎言遠佞防姦四戒長子偉伯博學有才思弱冠除太學博士朝廷廣集儒學議明堂制度偉伯上圖説六卷後蕭寳夤為逆偉伯謀舉義兵事發見害邢巒鄚縣人少好學博覽書傳有文才幹畧宣武時累遷尚書都督梁漢諸軍事開地千里梁人侵軼徐兗以巒都督東討諸軍事破梁軍於宿豫豫州人白早生殺刺史以城入梁詔巒討之兵至懸瓠斬早生遷殿中尚書加撫軍將軍卒於官諡文定巒才兼文武朝野瞻望上下悼惜之邢晏巒弟博涉經史官至滄州刺史晏篤於義讓初為南兗州例得一子釋褐乃啟其孤弟子子慎為朝請後為滄州復啟其孤兄子昕為府主簿而其子並未從宦世人以此多之信都芳河閒人少明算術兼有巧思嘗云算厯元妙機巧精微每一沈思不聞雷霆之聲其用心如此所撰注勾股史宗樂書遁甲經四術周髀宗之屬甚多北齊邢邵巒族弟十歲能屬文聰明強記日誦萬餘言孝昌初為著作佐郎累遷太常寺中書監攝國子祭酒時頓居三職並是文學之首當時榮之授特進卒邵率情簡素内行修謹晚年尤以五經章句為意窮其指要吉凶禮儀公私諮禀質疑去惑為世指南與濟陰温子昇為文字之冠世謂之温刑魏收雖天才豓發而年在二公之後故子㫒死後方稱魏邢焉權㑹鄚縣人志尚沈雅動遵禮則少受鄭易妙盡幽微詩書三禮文義該洽兼明風角仕齊厯國子博士參掌雖繁教授不闕臨機答難酬報如響為諸儒所推邢峙鄚縣人通三禮左氏春秋仕齊為國子助教以經入授皇太子峙方正純厚有儒者風㕑宰進太子食菜有邪蒿峙令去之曰此菜有不正之名非殿下宜食文宣聞而嘉之累遷清河太守周李棠蓨縣人祖伯貴魏宣武時官至魯郡守有孝行居父喪哀毁過禮遂以毁卒棠幼孤好學有志操西魏末為車騎大將散騎常侍尉遲迥伐蜀棠應募先使喻之既入成都蕭撝問迥軍中委曲棠不對撝乃苦辱之棠曰我有死而巳義不為爾移志也遂害之熊安生阜城人博通五經專以三禮教授弟子以遠方至者千餘人仕齊為國子博士時後周既行周禮有宿疑數十條莫能辨天和三年尹公正使齊與齊人語及周禮齊人不能對乃令安生置賓館一一演説究其根本公正嗟服還具言之武帝帝大欽重之及入鄴首幸其第引與同坐給安車入朝敕令參議五禮拜露門博士安生學為儒宗若劉焯劉炫皆其門人所著周禮禮記孝經義疏並行於世黎景熙鄚縣人少以孝行聞從祖廣精字義楷篆景熙傳習之有書千餘卷雖窮居獨處不以饑寒易操周文徴入關令正定古今文字大統末拜著作佐郎勤於所職著述不怠保定三年盛營宫室春夏大旱景熙上封事力諫上嘉之仕終儀同三司隋楊慶河閒人祖元父剛並以至孝知名慶頗涉書記郡察孝廉以侍養不赴母疾不解襟帶者七旬及居母喪哀毁骨立負土成墳齊文宣表其門閭賜帛粟隋高祖受禪授平陽太守公孫景茂阜城人博涉經史仕魏為太常博士多所損益時人稱為書庫厯大理正有能名開皇初詔徴入朝訪以政術遷息州刺史厯伊州道州仁壽中復拜淄州刺史前後厯職皆有德政稱為良牧死之日諸州人吏赴喪者數千人或不及葬皆望墳慟哭野祭而去高熲蓨縣人周時以平齊功拜開府高祖受禪拜尚書左僕射封勃海郡公晉王廣大舉伐陳以熲為元帥長史三軍皆取斷於熲陳平加上柱國進爵齊國公後為煬帝所誅熲有文武大畧明達政務及蒙任寄竭誠盡節進引貞良以天下為已任蘇威楊素賀若弼韓擒虎等皆熲所薦各盡其用為一代名臣執政將二十年朝野推服物無異議論者以為真宰相張煚鄚縣人父羡少好學多所通涉當世推重仕周終司成中大夫典國史煚好學有父風隋高祖受禪拜尚書右丞丁父憂柴毁骨立累遷民部尚書煚性和厚有識度甚有時譽後拜冀州刺史稱為良二千石高勱蓨縣人齊清河王岳之子性剛直有才幹斛律明月每有征伐引之為副高祖為丞相甚器之開皇七年上取陳五䇿及大舉伐陳以勱為行軍總管下江州以功拜上開府盧大翼河閒人七歲詣學日誦數千言號神童尤善占候算厯之術前後所言皆中隱於白鹿山張胄元蓨縣人博學多通尤精術數高祖時徴授雲騎尉直太史參議律厯事胄元所推步甚精密由是擢拜太史令劉炫景城人少聰敏與信都劉焯閉户讀書十年不出炫眸子精明視日不眩強記默識左畫方右畫圓誦目數耳聽五官並舉無有遺失周時奉勅與著作郎王邵同修國史雖遍三省竟不得官開皇之末朝野皆以遼東為意炫謂不可伐作撫夷論以諷煬帝卽位牛宏引炫修律令諸郡置學官及流外給廩皆發自炫授太學博士後歸鄉里以教授為業卒後其門人諡曰宣德先生著論語述義春秋攻昧五經正名孝經春秋尚書毛詩述義等書並行於世劉善經河閒人博物洽聞尤善詞筆厯著作佐郎太子舍人著酬德傳諸劉譜四聲指歸行於世唐李綱蓨縣人少慷慨尚風節仕周為齊王憲參軍宣帝將殺憲召僚屬誣坐其罪綱矢死無撓辭憲誅故吏奔匿綱撫棺號慟為瘞訖乃去高祖受禪拜禮部尚書兼太子詹事頻諫太子不聽固請老解尚書貞觀四年復為少師以足疾賜步輿乘至閣問以政事卒諡曰貞高儉勱子敏惠有度量觀書一見輒誦敏於占對秦王領雍州牧薦為治中親重之累官吏部尚書封許國公雅負裁鑑又詳氏譜所署用人無不當者太宗卽位遷尚書右僕射卒贈司徒諡文獻儉凡有獻納縉紳屬目奏議輒焚其藁家人無見者子履行居母喪毁甚太宗諭使強食尚東陽公主官益州大都督府長史高馮蓨縣人居母喪以孝聞貞觀初拜監察御史彈劾不避權要轉中書舍人列上五事帝稱善進太子右庶子數上書言得失辭極切至帝賜鍾乳一劑曰爾進藥石之言朕以藥石相報後為吏部侍郎善銓序人物賜以金背鏡一況其清鑒遷中書令進爵蓨縣公卒諡曰憲張士衡樂壽人尢歲居母喪哀慕過禮博士劉軌思奇之授以詩禮又從熊安生劉焯等受經貫知大義仕隋為餘杭令以老還家大業時諸儒廢學唐興士衡復教授鄉里太子承乾慕風迎至謁太宗洛陽宫賜之食擢崇賢館學士數規太子過失不能用太子廢罷歸鄉里士衡以禮教諸生當時永平賈公彦趙李元植皆以經學顯李安靜網之孫兄安仁永徽中為太子左庶子太子忠廢還邸僚屬奔散獨安仁泣拜而去安靜天授中為右衞將軍武氏革命羣臣皆勸進安靜獨無所請及收繫獄來俊臣問狀安靜曰正以我唐舊臣殺之可也俊臣誣殺之㑹昌中贈太子少師自綱五世同居安仁安静復以義烈聞世稱李氏不衰袁恕已東光人仕累司刑少卿知相王府司馬與誅二張又從相王統南牙兵備非常以功加中書侍郎同中書門下三品封南陽郡公將作少匠楊務廉者以工巧進恕已恐其啟游娱侈麗之漸力請於中宗斥之拜中書令特進南陽郡王罷政事後流環州武三思遣周利殺之諡貞烈王晙景城人少孤好學擢明經第厯殿中侍御史景龍末除桂川都督州人刻石頌德進隴右羣牧使吐蕃宼臨洮率所部迎擊大敗之進并州都督長史討突厥有功遷朔方行軍大總管封清源公累拜兵部尚書同中書門下三品充朔方軍節度大使卒贈尚書左丞相諡曰忠烈晙氣貌偉特時謂熊虎相感慕節氣有古人風其接下肅壹吏人畏愛始二張之誣魏元忠晙獨上疏申治卒後信安王禕討奚於幽州告捷言戰時咸見晙與部將麾赴敵帝乃遣使祭晙廟進諸子官劉長卿河閒人開元閒進士官至隨州刺史有詩集十卷行於世邢君牙樂壽人少從軍以戰功厯果毅折衝郎將代宗時以扈從功累封河閒郡公德宗出奉天李晟率君牙倍道赴難晟入朝代為鳳翔節度使吐蕃歲犯邊君牙勸耕講戰以為備戎不能侵卒贈司空袁高恕巳孫少慷慨有節尚擢進士第累遷給事中德宗將起盧杞為饒州刺史高當草詔見宰相言不可别命舍人作詔詔岀高執不下奏曰杞為相誣下罔上使陛下越在草莽羣臣願食其肉陛下赦不誅止貶新州今復拜刺史誠失天下望又力爭帝前請前死翌日帝遣使慰高曰卿言切至已如奏憲宗時贈禮部尚書高瑀蓨縣人少沈邃喜言兵釋褐右金吾胄曹參軍遷陳蔡二州刺史宰相裴度韋處厚以瑀治陳蔡素有狀乃拜忠武節度使瑀寛和所至稱治士人懷之高重儉五世孫以明經中第敬宗慎置侍講學士重以簡厚惇正與選再擢國子祭酒文宗好左氏春秋命分列國各為書成四十篇與鄭覃刋定九經於石出為鄂岳觀察使以美政𬒳褒卒贈少保封敖蓨縣人元和中進士為李德𥙿所器累官翰林學士屬辭贍敏語切而理勝武宗使作詔慰邊將曰傷居爾體痛在朕躬帝善其辭賜以宫錦大中時厯平盧興元節度使平寇有功仕終尚書右僕射張濬河閒人以處士薦為度支員外郎黄巢亂僖宗召拜諫議大夫王鐸奏署都統判官時王敬武在平盧累召不肯應濬往説之責以君臣大分敬武卽引軍從濬而西賊平累拜同中書門下平章事乾寕中以左僕射致仕劉季述亂濬徒步入洛泣諭張全義謀王室之難朱全忠脅昭宗東遷畏濬構他鎮兵使全義殺之宋李罕澄阜城人七世同居漢乾祐三年詔改鄉里名及旌其門閭太平興國六年長史以漢賜詔書來上復旌表之盧懷忠河閒人少有膂力善騎射周顯德初監沂州軍以所部破海州功居多郎州軍亂宋太祖遣懷忠使荆南還奏曰繼冲甲兵雖整而控弦不過三萬年穀雖登而民苦暴斂觀其形勢日不暇給卽以懷忠爲前軍步都監荆湖平以功遷内酒坊使王繼升阜城人性謹愿太宗藩邸時信任之卽位累遷泉州兵馬都監詩平游洋洞民召領諸道水陸發運事號爲稱職子昭遠形質魁偉有膂力從征太原爲流矢所中血漬甲縷戰益急厯官知天雄軍卒諡惠和楊嗣瀛州人兄信官殿前都指揮使善部分士年嗣累遷保州團練使時楊延昭方爲刺史嗣言嘗與延昭爲同官驟居其上不可願守舊官帝嘉其讓乃遷延昭官嗣與延昭久居北邊俱以善戰聞時謂之二楊高珪鄚州人八世同居真宗時旌表蠲其課調劉摰東光人嘉祐中擢甲科累遷監察御史裏行未及陛對卽奏論數事及入見神宗問卿從學王安石耶安石極稱卿器識對曰臣東北人少孤獨學不識安石也上疏言君子小人之分又論率錢助役有十害安石使曽布作十難以詰之且劾摰欺誕懷向背摰卽條對所難以伸其説復上疏極言青苗均輸助役之害謫監衡州鹽倉哲宗時召為侍御史疏論蔡確章惇過惡皆罷去又請免常平免役法引朱光庭王巖叟為言官累拜門下侍郎尚書右僕射摰性峭直有氣節通達明鋭觸機輒發不為利怵威誘自初輔政至為相修嚴憲法辨别邪正勇於去惡竟為朋䜛奇中貶死新州紹興初贈少師諡忠肅龔夬瀛州人第進士徽宗時累官殿中侍御史始上殿卽抗疏請辨忠邪時章惇蔡卞用事夬首論其惡又論蔡京姦罪於是三人者皆去後編管房州紹興中贈右諫議弟大壯亦有重名夬嘗稱為畏友張慤樂夀人元祐進士累遷計度都轉運使高宗時為兵馬大元帥募兵勤王慤飛輓踵道建議卽元帥府印給鹽鈔以便商旅不閲旬得緡錢五十萬以佐軍高宗器重之權知北京畱守官至中書侍郎卒諡忠穆慤在朝諤諤有大臣節帝每念之謂慤謀國盡忠遇事敢諫古之遺直也遼劉景河閒人好學能文初為翰林學士屢直諫不聽景宗卽位以景忠實遷尚書宣政殿學士上方欲倚用書其笏曰劉景可為宰相厯武定開遠二軍節度使致仕子慎行為北府宰相時上多卽宴飲行誅賞慎行諫止之金許安仁交河人幼孤能自刻苦讀書善屬文登大定進士厯翰林院修撰同知制誥賈鉉路伯建薦其守道端慤立已純正超授禮部郎中兼左補闕明昌四年上將幸景明宫安仁與同列疏諫遂罷幸出為澤州刺史作無隱論十篇上之升汾陽軍節度使致仕卒諡文簡許古安仁子明昌中詞賦進士貞祐初拜監察御史宣宗遷汴信任丞相高琪無恢復之謀古上疏直言詔付尚書省累遷右司諫兼侍御史數上疏言時事時稱其直哀宗時以左司諫致仕劉完素河閒人嘗遇異人陳先生飲以酒大醉及寤洞達醫術若有授之者乃撰運氣要㫖論精要宣明論慮庸醫或出妄説又著素問元機原病式特舉二百八十四字注二萬餘言自號通元處士明道同河閒人洪武初薦授太常寺贊禮郎出為番禺知縣性剛毅軍衞非禮一切抗弗從民賴以安永嘉侯朱亮祖至數撼同同不為動亮祖兄弟怙勢為姦同按治之布政使徐本雅重同同方笞一醫未竟本欲急得醫遣卒來語令釋之同岸然曰徐公乃亦效永嘉侯耶卒為亮祖搆陷死同器宇魁岸奉母備甘㫖與妻子同粗糲其峭直出於天性既死縣民悼惜之劉敏肅寕人洪武初舉孝廉為中書吏常暮以小車市蘆龍江關旦載歸而後入治事妻織蘆為席鬻以奉母或瞷亡以績帛瓦器遺其家者敏懸於梁後遺者復來卒還之為楚相府錄事中書以没官女婦給文臣家衆勸其請給以事母敏辭曰事母乃子婦事何預他人及省臣敗吏多坐誅敏獨無所預帝賢之擢工部侍郎改刑部出為徽州府同知有惠政卒於官于大節任邱人天順進士厯御史出按畿輔宼掠永平中官漫言追擊出境大節劾其罔再按湖廣因地震疏陳時政缺失八事辭甚切忤憲宗意左遷鶴慶推官累官浙江山東按察使並著政聲大節素矜名檢薄嗜好仕宦三十年始終一操黄文任邱人生四歲父經商出越四十餘年不歸文既以諸生貢入國學詢知父在鄧州奔赴遍訪得之迎歸與母完聚孝養備至天順中旌表周東阜城人成化進士厯官大理寺少卿命勘事陜西寘鐇之變殉節死孫博景州人成化進士授兵科給事中疏論汪直設西廠擅作威福直大怒召博厲聲詬之博不爲屈官終山西僉事李旦獻縣人成化進士授刑部主事因星變上陳十事曰正君心親宗室制宦官惜名器絶珍玩别賢否撫流移恤畿甸整邊防納諍諫言並切直忤㫖貶鎮遠通判未幾卒馬中錫故城人父偉爲唐府長史以直諫忤王械送京師中錫方幼奔訴訟冤父竟得白成化中登進士授刑科給事中萬貴妃弟通驕横再疏論列兩𬒳廷杖嘉祥公主侵畿内民田勘還之民又劾太監汪直直怒使人詗之無所得乃止累遷右副都御史巡撫宣府遼東入爲兵部侍郎忤劉瑾勒致仕尋斥為民瑾死起撫大同中錫居官廉所至革弊任怨正德六年大盜劉六等起以中錫為右都御史統禁兵南征下令招撫賊益熾𬒳逮死於獄後追復原官張瑋景州人成化進士擢御史宏治時累遷右副都御史巡撫寕夏有威名生平端謹自守不置生産終漕運總督屈伸任邱人成化進士授給事中宏治時湖廣大饑請遣大臣發廩蠲逋減田租平冤獄黜貪殘罷不急役弛山澤禁帝卽付撫按行之時帝視朝頗晏塞上數有警伸請帝勵精庶政又勸時御便殿延見羣臣帝嘉納焉伸在諫垣久識大體守正議侃直不阿未及遷而卒廖紀東光人宏治進士嘉靖初厯官吏部尚書光祿署丞何淵請建世室祀獻帝紀執不可復抗疏爭之議竟寢御史魏有本以劾郭勛救馬永謫官紀從容為言有本得無謫卒贈太保諡僖靖杜蕙任邱人正德進士厯麗江府同知天性孝友四世同居父喪廬墓三年母年九十九得疾蕙年八十二侍奉不懈殁亦廬墓三年卒年九十七劉元震任邱人隆慶進士選庶吉士授編修神宗時厯國子祭酒檢束諸生置旌善紀過二簿示懲勸因進詩經注疏規諷切至帝嘉納之累遷吏部侍郎掌詹事府以三殿災疏言宜懋建元子和協天人不報性至孝得父母書必南向頓首而後啟以母年近百歲乞養親歸卒贈吏部尚書諡文莊弟元霖萬厯進士累官工部尚書時大工繁興元霖盡瘁拮据耗蠧為清卒贈太子太保余繼登交河人萬厯進士改庶吉士授檢討進右中允充日講官以講筵久輟侍臣無所納忠與同官馮琦進通鑑講義傅以時政闕失厯禮部侍郎攝部事請罷一切誅求開採之害民者又請躬祀郊廟冊立元子停礦税中官皆不省繼登自署部事請元子冊立冠婚疏累上不得請鬱鬱成疾連章乞休不許卒於官諡文恪繼登樸直慎密寡言笑當大事言議侃侃居家廉約病革時擁粗布衾羊毳覆足而已李楨宁任邱人萬厯進士厯官山西按察使罷歸任邱被圍佐知縣白慧元城守及城破率家衆格鬬身中數槊而死本朝乾隆四十一年賜諡忠烈賈太初河閒人崇禎進士授襄陽知縣罷歸十五年大兵破城太初死之本朝乾隆四十一年賜諡節愍范景文吳橋人幼負器識登萬厯進士授東昌推官用治行高等擢吏部主事厯文選司郎中魏忠賢魏廣微用事景文雖與同鄉不一詣其門亦不附東林孤立行意而巳視事未彌月謝病去崇禎初累官南京兵部尚書屢遣兵戍池河浦口援廬州扼滁陽有警輒發節制精明熊文燦之撫張獻忠景文極言獻忠叵測卒如其言楊嗣昌奪情輔政黄道周等交諫獲罪景文論救亦削籍十六年起工部尚書尋兼東閣大學士李自成漸逼有請帝南幸者命集議閣中景文曰固結人心堅守待援此外非臣所知都城陷赴雙塔寺旁古井死本朝順治九年賜諡文忠孟兆样交河人天啟進士崇禎中累官刑部右侍郎賊簿都城詔大臣分守兆祥駐正陽門城陷或勸兆祥還邸厲聲曰社稷已覆吾將安之仰天號慟冠帶望闕拜遂自經死子章明甫成進士兆祥語之曰我大臣當死汝未就職可去對曰人生大節惟君與父君父死臣子何生焉亦投繯死兆祥妻吕氏章明妻王氏亦同日縊死本朝順治九年賜兆祥諡忠靖章明諡貞孝本朝曲良貴獻縣人貢生知陕西興不州順治三年叛賊孫守法糾流賊劉二虎等圍州城良貴率衆捍禦賊攻兩月不克而城内糧盡援絶姦民内應啟門納賊良貴罵賊死詔贈布政司參議劉三章景州人順治進士知山西懷仁縣姜瓖之亂攖城捍衛城賴以全累擢福建漳南道僉事值凶寇亂三章勒兵剿捕以計擒其渠帥餘黨悉平轉江南兵備副使卒入祀鄉賢祠左敬祖河閒人順治己丑進士改庶吉士授編修累官左副都御史博通六籍尤精於易著有易經抄訓理學真傳卒入祀鄉賢祠白惺涵河閒人性至孝大兵破河閒與其父皆被執將就戮惺涵解衣請代父死情辭哀切軍中義之得俱釋去登順治進士官至吏部考功郎中李儀古河閒人父天敘官平涼府通判有靖寇功儀古登順治進士改庶吉士授檢討累官内宏文院侍讀學士文章品詣為一時景仰卒入祀鄉賢祠馬之東光人少居父喪廬墓三年登順治進士授行人累官陕西提學僉事精明嚴正請託不行卒入祀鄉賢祠馬廷贊之族兄順治進士知宜都縣時流氛未靖廷贊訓練鄉勇多方捍禦民賴安堵在任數年田疇大闢地無曠土民咸被其澤卒入祀鄉賢祠賈錫穎景州人年十四時刧賊王小廷入其家父光彝祖母周伯父光顯光祖俱遇害錫穎匿暗處得脱後二年里社為迎神會會者萬人小廷以招撫為平人與焉錫穎伺之酒肆乘其酣飲持刀自後刺之洞胸卽斬首割心赴父墓哭莫畢詣官自首有司義而釋之時順治八年也竇豸吳橋人善騎射膽力過人順治初土賊竊發遊擊梁某被圍豸率壯士二十人馳援圍遂解梁因言於有司使團練鄉勇禦賊賊不敢犯後大舉來宼豸力戰賊圍之數里短兵格鬬而死劉子正呉橋人順治進士知山東邱縣勸農興學善政具舉擢禮部主事卒入祀鄉賢祠劉澤厚呉橋人年十五隨母省外家於河南值流寇陷城負母而逃與賊格鬬身被重創卒脱母於難登順治進士知江安縣有惠政會十三家餘黨剽掠至縣澤厚身督家丁近敵遂死於陣詔贈按察使僉事張咸景州人諸生幼喪母常趨墓所號泣過者感嘆家貧授徒養父體無全衣而親極甘㫖性廉介有鄉人以屋宅值千金相贈者卻勿受王琯交河人康熙進士知陜西保安縣邑在萬山中兵火之後居民稀少琯至教以開墾栽種不二年遂爲樂土擢吏部主事出爲雲南參議分守永昌撫禦諸酋威德兼著遷湖廣提學副使屏絶苞苴振拔寒畯士紳立碑頌德琯力止之卒祀鄉賢祠祕丕笈故城人康熙進士累官陜西提學僉事杜絶請託所拔皆名雋丕笈潛心理學著有詩書日抄卒入祀鄉賢祠蘇俊大交河人幼值父病侍湯藥衣不解帶者數月及長究心經籍以拔貢任贑州推官著有四書講義卒入祀鄉賢祠龎塏任邱人舉人康熙十八年應博學鴻詞科授檢討出爲福建建寕知府㑹浦城令以嚴苛激變邑人乘夜焚冊局殺吏罷市令懼而逃塏聞兼程赴浦城集紳士明倫堂諭無生亂變遂定僅坐重罪一人流二人浦人感之立書院以祀未幾告歸塏涉獵經史工詩文所著有叢碧山房集王蘭生交河人性純孝嗜程朱之學康熙五十一年被薦為内廷校書賜舉人及進士改庶吉士授編修累遷刑部侍郎薦舉無私刑獄能察卒入祀鄉賢祠哈元生河閒人由行伍洊擢守備雍正二年隨剿貴州狆家苗烏蒙土知府祿萬鍾擾東川其黨隴慶侯助逆元生與四川兵協剿賊據險拒元生冒矢石奮攻克之六年剿米貼苗陸氏破險設伏搗其巢又會剿助陸氏之雷波土司楊明義累遷副將八年烏蒙復叛元生擊破賊數萬躪賊營八十餘直抵烏蒙捷賞銀萬兩旋擢雲貴提督緣事革職尋聞賞副將銜卒贈總兵子尚德隨元生至雲南授千總烏蒙齎疏奏捷升遊擊尚德屢著勞績苗人聞風畏懼洊擢古州鎮總兵緣事革職復賞副將銜邊連寶任邱人貢生乾隆元年薦舉博學鴻詞十四年復薦經學辭不赴所著有隨園集哈攀龍河閒人乾隆武進士授頭等侍衞洊升漳州鎮總兵十三年統兵由美卧溝攻取撒卧山大松林噶達等寨分兵進剿馬溝右梁下營旋往金川軍營署松潘鎮總兵拔石卡一殺番賊數千擢湖廣提督調貴州二十五年卒於任哈國興攀龍子乾隆武進士授三等侍衞洊升雲南參將三十一年緬甸匪目召散等據孟良肆擾國興督戰有功厯擢雲南提督三十七年官兵進討小金川國興奮勇出力命為參贊大臣隨大軍克明郭宗焚賊經樓整兵進取果爾烏谷山麓直壓美諾賊巢又隨大軍攻克布朗郭宗僧桑格遁大兵直抵木達僧桑格之父澤旺出降小金川底定國興旋病卒詔贈太子太保諡壯武命圖形紫光閣子文虎廕授守備擢陜西都司三十八年於木果木陣亡入祀昭忠祠王之鋭河閒人少志學以躬行為務兄暴於行父母殁盡據遺産擯之鋭於外無怨色安溪李光地視學畿輔深賞之授以河洛算數音韻之學以選貢入都厯官國子助教性耿介恬退好施與乾隆十七年耆學祭酒以三人上之鋭與焉上詢國子召見病不能行明年卒於家年七十有九紀昀獻縣人乾隆進士改庶吉士授編修累擢禮部尚書恊辦大學士加太子少保卒諡文達盷學問淹通詞章敏捷乾隆三十八年開四庫全書館昀充纂修官旋爲總辦搜輯永樂大典中逸篇墜簡及海内祕笈書萬餘部釐其應刋應鈔應存者依經史子集部分類聚撮其大凡列成總目爲提要二百卷又奉勅輯簡明書目一編五十七年奏請鄉會試春秋題以左傳本事爲文參用公羊穀樂之說罷胡安國傳不用所纂輯如熱河志厯代職官表河源紀畧八旗通志曁方畧㑹典三通諸館咸總其事焉徐岱任邱人七世同居雍睦無閒乾隆年閒旌管輝燦呉橋人嘉慶元年任湖北竹山營把總於竹山縣擊賊陣亡事聞議卹如例楊基鵬景州人武舉嘉慶元年以趙州汛千總隨剿湖北賊匪於江坎二道陣亡事聞議卹如例流寓宋王倫莘縣人建炎初選能專對者以倫光大金通問使往來議和不決最後金遷之河閒遂不復遣居六年金欲以爲平灣三路都轉運使倫曰奉命而來非降也金益脅以威遣使來趨倫拒益力金縊殺之家鉉翁眉州人宋末官僉書樞密院事使元被畱宋亡旦夕哭泣元欲官之不受改館河閒以春秋教授弟子數為諸生談宋室遺事或流涕太息元成宗時始放還列女南北朝魏封卓妻劉氏蓨縣人成婚一夕卓官於京師後以事伏法氏得凶聞一慟而絶唐高叡妻秦氏河閒人叡為嬀州刺史為默啜所攻州陷叡仰藥不死默啜示以寶帶異𫀆曰降我賜爾官不降且死叡視秦秦曰君受天子恩當以死報賊一品官亦安足榮自是皆睻目不語默啜知不可屈並殺之殷保晦妻封氏封敖孫也名絢能文章草隸保晦厯校書郎黄巢入長安共匿蘭陵里明日保晦逃賊悦封色欲取之固拒誘説萬詞不答賊怒曰從我生不然膏我劒封罵曰我守正而死猶生也終不辱遂遇害宋王昭遠祖母郭氏阜城人初郭常對昭遠母指昭遠曰此兒有貴相他日必至公侯指昭懿曰此兒俸錢過二萬不能勝矣後果如其言元孫氏女河閒人父病癩十年女禱於天願以身代且吮其膿血旬月而愈明陳氏劉氏李氏吕氏陳氏女俱獻縣人居單橋陳氏邱希嶽妻同弟希嵩妻劉氏希華妻李氏又陳氏妹四姐及弟陳獻妻吕氏俱為流賊所掠五人義不受辱相率投水死知縣杜珝奏旌其門曰單橋五節曹氏女阜城人曹端女名春桃正德六年流寇陷城𬒳獲女卽投水死賊急援之迫令更衣女怒罵賊忿亂剉之而死時年十五嘉靖十三年知縣劉良卿立祠祀之温氏女交河人正德閒依伯母劉避流賊難賊見女欲犯之女怒罵賊縛女馬上女投地不得遂奮身抉賊一目眼睛突出賊痛甚截女十指碎其尸而去趙見妻陳氏呉橋人正德閒流賊劉七掠其家見氏欲犯之氏怒罵衆賊強逼氏罵愈厲賊怒支解之劉氏女故城人劉鉞女名若蘭嘗納采某姓某家貧避地遠