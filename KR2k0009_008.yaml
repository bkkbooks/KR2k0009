欽姐宋大法女節婦紀陛周妻張氏紀中寶繼妻盧氏王曰劻妻許氏王邦翰妻穆氏陳大林妻王氏李師尹妻張氏紀琳妻李氏紀汝嶙妻李氏均嘉慶年閒旌多中規妻汲氏阜城人夫亡守節同縣節婦梁雲龍妻王氏烈婦多米氏均嘉慶年閒旌趙林妻韓氏肅寕人守正捐軀同縣節婦王永泰妻滑氏邊范氏均嘉慶年閒旌舒其綸妻梁氏任邱人夫亡守節同縣烈婦耿許氏耿李氏賈富妻呉氏顧其林妻王氏烈女張四姐節婦劉廷璐妻周氏均嘉慶年閒旌趙希曾女趙氏交河人守正捐軀嘉慶年閒旌曹思忠妻班氏寕津人夫亡守節同縣節婦戰耘書妻王氏均嘉慶年閒旌王良梅妻逍氏景州人夫亡守節同州節婦張鳳詔妻呉氏馬德深妻吕氏戈瑽妻張氏韓振邦妻劉氏裴鏳妻呉氏烈婦馬元英妻朱氏聶張氏均嘉慶年閒旌劉自強妻申氏吳橋人夫亡守節同縣烈婦李張氏節婦范喆妻梁氏祝德峻妻張氏均嘉慶年閒旌呉氏女住姐東光人守正捐軀同縣節婦王進孝妻邢氏曹幅貴妻王氏郭文成妻趙氏胡維妻王氏烈女徐文姐王大姐均嘉慶年閒旌劉汝翼妻祕氏故城人夫亡守節嘉慶年閒旌仙釋漢元俗居河閒數百年餌巴豆雲母賣藥都市河閒王患瘕服之下蛇十餘頭問其故俗曰此六世餘殃非王所招也王家老舍人言父世巳見俗俗行日中無影驗之果然王欲妻以女夜亡去後人常見於恒山中唐俞靈璝河閒人入衡山九真觀修道十餘年南嶽赤君授以囘風術行之二十年能坐見天下事如在掌中然自晦不爲異後入九疑山仙去土産黍府志黍之美者曰耙齒金穗青而長者曰羅裙帶麫府志故城出善麫者細若綫絹唐書地理志瀛州莫州土貢舊志東光絹明代頗爲人所稱棉府志寕津種棉者幾半歲無大水其利倍入布寰宇記瀛州産府志出斜文布土布又景州龍華鎮所出潔白細好比於呉中席帽府志河閒出席帽宻緻精好價值頗高又出柳箕斗之類唐時土貢柳箱是其遺業也簟唐書地理志景州土貢葦簟寰宇記定遠軍土産水葱席茅簟金史地理志河閒府産藺席府志産葱薦蒲席又産蘆花被蒲花褥藥寰宇記瀛州産蔓荆子莫州産蓯蓉金史地理志河閒府産香附子桃舊志府界産桃甚大雖熟不紅味美肅寕縣者尤佳府志云肅寕人種桃為業如藝稼然其佳者曰淋水桃又有宻桃自樹落之行未及三里卽破味尤甘美深州亦産桃或謂勝於肅寕香梨交河縣出府志云人謂之交梨其味香脆業者如肅寕之種桃亦産棗小而甘乾之以充籩實頻婆果文官果蓮芹菜菘菜各處皆有羊府志河閒民多牧羊者謂之瀛羊言城北郊有瀛水以飲羊則肥而不羶兎府志地多兎唐書地理志河閒歲貢兎皮蓋取為筆材魚金史地理志府産乾魚明志河閒任邱二縣出魚按河閒為古兗州地桑土既蠶列於禹貢唐宋時河閒貢絹貢絲莫州貢棉近來東光阜城諸縣雖有絹而皆不中衣服僅堪以飾屏笥故凡舊志所列絲棉等物及寰宇記載瀛莫産人薓概不可以為今之土産謹附記
