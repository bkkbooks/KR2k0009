在大寧縣東門外金大定三年建晉文公廟在蒲縣西南一里翠屏山上寰宇記在蒲縣西南坡上唐武德三年置縣志城內亦有廟寺觀安國寺在州治西初名龍紀寺唐武德初建宋至道初改今額天安寺在州北一里舊名天王寺唐建明末廢本朝順治初釋道興重建彌陀寺在大寧縣西關東南隅元至治間建明洪武初併福勝寺入焉雲峯寺在蒲縣西南一里翠屏山上欠廢本朝康熙五十一年重建龍興寺在蒲縣北五里金泰和二年建明洪武中併興國清涼二寺入焉興化寺在永和縣治西南金明昌五年建明洪武中併昭陽丈八佛二寺入焉龍巖寺在永和縣南六十里龍巖山宋初敕建祈真觀在州治西金建邱長春嘗修煉於此龍泉院在州東七十里紫荆山舊名普照寺唐建久圮明有僧掘地得甎上刻宋元祐中重修龍泉院記因募建名宦南北朝周韓裦潁陽人汾州刺史先是齊兵數入人廢耕桑裦至會齊兵來不下屬縣多被抄掠齊人喜其無備不能追躡竟不為營壘裦巳先勒精鋭伏北山分據險阻邀其歸路乘其怠縱伏擊之盡獲其衆復請一切放還以德報怨詔許之自此抄兵大息唐李琛唐宗室武德中以襄武郡王鎮隰州政寬簡人愛便之狄惟謙仁傑之後會昌中為隰州刺史有治聲五代漢侯仁矩隰州刺史至郡決滯訟一日釋繫囚百餘獄為之空民皆悅服周李謙溥盂人顯德四年權隰州刺史事至郡亟命濬城隍嚴兵備八日敵果來薄謙溥登城徐步按視戰具敵不敢動旬餘大發衝車攻城謙溥夜縋死士百餘出城襲之敵大擾衆悉遁去宋薛奎正平人為隰州軍事推官州民常聚博僧舍一日盜殺寺奴取財去博者適至血偶涴衣邏卒捕送州拷訊誣服奎獨疑之白州緩其獄後果得殺人者金劉汲大定間由進士為蒲縣令政簡而清民俗康阜張翰大定末以進士調輔隰州軍事判官有誣兄弟三人為劫者翰廉得狀白於州釋之元楊思聰大定人大德間為大寧尹政刑清簡蝗不入境邑人立碑頌之明霍毅蒲城人永樂間知大寧縣公平忠厚剖決詳明以縣地磽瘠諭民植桑棗以治生興利除害民安其業胡貞扶風人正統𥘉知永和縣修學校築城郭常買牛數百頭以給耕者貧民賴之吳智餘姚人正德中謫知隰州值歲歉乃建一倉名曰祿惠凡俸有羡餘及訟獄之願輸粟者悉貯以賑貧乏由是流移漸歸又隰士不習戴記智始講授咸奉為經師邵蕙寧州人隆慶中知大寧縣增設關城廣置倉舍又於南北門外築石堤一帶以捍河水民賴以安韓超然臨淄人隆慶中知蒲縣剛方清介民不忍欺開通會渠以溉民田至今尚賴其利葛蘭信陽人嘉靖初知蒲縣斷獄明允鄰邑有不決者咸質成之遇歲歉倉有餘儲多所賑救范守巳洧川人萬厯二十九年謫知隰州城負東山麓每山泉暴漲輒為水嚙守巳於隍外築堤一百餘丈以遏水勢又改築州城伐石為基睥睨皆用瓴甓余建隆開化人萬厯中知永和縣操履清貞及致仕東裝無具州守臨餞忽報地陷得古錢一窖守曰此天為廉吏腸也令充資斧建隆弗取徒步而歸羅永新三河人天啓中知蒲縣重修石堰以衛民田人咸感之左中道崇禎中大寧教諭端嚴有師範流寇破城或以無守土責勸之去中道斥之卒殉難史掌文良鄉人崇禎中大寧典史時盜賊蜂起掌文至適築濬城池因督其事咸勸趨之時走山谷捕盜民以少安壬申流寇攻城亟掌文分地而守力屈死之本朝王添貴奉天人順治六年知隰州薑瓖之變土賊蜂起隰州尤甚添貴率大兵搗其穴賊潰走令還歸農將領疑居民從賊議屠城添貴力請始獲免事平安輯流亡善政日舉隰人德之吳興祚奉天清河人順治十二年知大寧縣當流寇蹂躪後四境凋弊興祚捐逋賦開荒穢約束吏胥俾無擾民再期民多復業治行稱最徐士鶚浙江人順治六年大寧縣典史薑瓖之變守城甚力城破與妻子偕死郭琯沙河人順治二年知蒲縣性通敏里閈利病無不周知凡有興舉吏不敢問或微詞餂之輒大聲呵曰汝輩弟奉行文書何得與民事聞者即咋舌退鍾蘿豹宛平人永和縣典史薑瓖之變誓以身殉城陷不屈死祀忠烈祠錢以塏嘉善人康熙四十四年以進士知隰州政尚寬簡遺惠在民嘗創建紫川書院以便士子誦讀其餘興廢舉墜甚多梅鋗宣城人康熙十四年以進士知大寧縣嚴取舍善聽訟誡吏胥不得受百姓一錢吏胥多化之朱元祫嘉定人康熙十八年以進士知蒲縣邑有墾荒虛課七百餘兩民以輸幼為艱元祫力請得免其政治一時稱最人物唐劉和永和人仕至兵部尚書高誼偉績推重當時子訓官至丹陽等州覲察制置使封開國侯宋趙友隰州人七世同居咸平中旌表蠲其課調二百十五元韓升隰州人太祖時為本州刺史以策干穆瑚黎署干夫長經略有功授户部尚書佩金虎符子奭相繼為本州刺史穆瑚黎舊作木華黎今改正王克敬字叔能大寧人初任江浙左右司都事厯監察御史紹興路總管兩浙鹽運使所在務崇寬厚纍遷南臺治書侍御史以正綱紀自任不阿宗戚聲譽益著元統中以江浙參政請老時稱名卿卒封粱郡公諡文肅明曹需永和人洪武間由歲貢除授山東道御史秉正持憲人以真御史稱之家居尤為清謹曹鼎蒲人成化間父為綏德州倉大使卒於官貧不能歸鼎置櫬車中妻引於前而自後推之行至河畔糧絶相向哭忽大風飄樹葉滿車前探視之得棗數斗遂得糊口扶柩歸里人以為誠孝所感李善永和人宏治中歲貢流寇至邑治失守善拒賊力戰死子世隆世竒亦被難垂死復蘇追賊至臨汾獲之寸磔以報父事聞特旌義士史光代字射墟隰州人萬厯中拔貢授上蔡主簿遷鄖陽府通判所至以勤慎稱崇禎間流賊陷州城光代適家居罵賊死兄光前萬厯中捐粟干石賑飢與光代同日盡節安民字熙寰大寧人有至性事親能養志親病便溺悉手自浣濯居鄉醇謹崇禎初以貢授褎城知縣號廉平吏六年寇至城破被執不屈死本朝乾隆四十一年賜諡節愍張斗辰字薇垣大寧人歲貢生崇禎間流賊破縣城斗辰率衆與賊巷戰自辰至午力屈被執罹難本朝李呈祥字麟野本州人明崇禎舉人官至兵部郎順治初年分守大梁道築河堤數百里開陳橋舊河直南路至今便之再遷武昌及天津道官至工部侍郎皆有廉聲宋斗星本州人順治六年土賊王登憲糾其黨攻州之曇索堡斗星率僕及鄉人捍禦賊衆不能支間道走汾州請兵三百人兼程至賊退踞老兒山斗星伏兵山側縱數人誘賊賊遽出戰伏起乘之賊大亂斬擒無算堡獲全李允字寶山本州人康熙五年官湖廣參將賊聚湖南七連玶統兵援剿連戰三晝夜力竭自盡事聞贈恤馮聖真大寧人家貧傭作以養父每饋食至不敢先嘗必疾趨執爨供父食乃還傭所或饋少腆即攜歸以食父主者知之復以食饋其父聖真不肯曰焉有一人傭而二人食者比父卒負土為墳哀毁三年邑令特旌之張起雲大寧人由千總洊升總兵勤勞王事素有賢聲雍正九年調署廣東提督以病未赴卒賜祭葬諡恪毅命直省建祠祀之流寓明陳敏交址人宣德中由監生除大寧訓導有學行堪為人師九年遷教諭以老乞休時用兵不得歸遂占籍於此仍給原俸終其身列女元杜氏大寧人少寡守志割肉療姑病蕭某妻趙氏名哇兒大寧人年二十夫病劇謂哇兒曰我死汝年少若何哇兒曰君幸自寬脫有不諱妾不獨生遂命匠制巨棺夫殁即自經死家人同棺斂葬焉明王家材妻宋氏隰州人明末避流寇甎樓上樓陷宋墜下股折賊執之揮指刺賊目賊怒殺之李清秀妻員氏隰州人流賊至被掠罵賊死之又馮鍾靈妻郭氏劉兆麟妻馮氏俱被掠不屈死李呈蘭妻馮氏隰州人年十八聞賊至抱幼女投井死又牛友月妻宋氏牛大吉妻蘇氏史記妻楊氏俱遇賊赴井死張二美妻馬氏大寧人崇禎二年寇起被掠縶馬於野將汚之泣罵不從賊縛馬上載之行不數武力躍墮高崖賊怒趨崖下碎其尸又劉鳳翔妻馬氏安三益妻張氏俱以罵賊被殺張斗星妻李氏大寧人崇禎間寇陷城攜室女祿孩同赴井死事聞旌表又馬上乘妻曹氏張拱北妻劉氏夫弟拱辰妻賀氏俱以寇變義不受辱死薛可教妻高氏永和人崇禎間流寇破城投城下死馮氏永和籍寓蒲縣崇禎中歲大飢人相食夫強其改節馮乃摘耳環匝餅和毒食之死本朝宋德盛妻王氏本州人適德盛未期遇流寇被掠不屈遂遇害霍顯才繼妻郭氏永和人早寡富家爭欲娶之矢死不從常佩利刃自防以節終年七十餘郭世旺妻李氏永和人遭歲荒疫夫將鬻以度日知不能免遂投河死又馮氏夫將賣與秦人投繯死成仁儒妻王氏本州人夫亡守節同州節婦蘇橿妻曹氏穆添幅妻鄭氏俱乾隆年間旌武繼周妻段氏蒲人守正捐軀同縣節婦曹孔修妻王氏俱乾隆年間旌曹曹氏本州人失其夫名義烈可風同州烈女馬看燈兒節婦景希善妻蘇氏俱嘉慶年間旌仙釋明無名僧嘉靖間住大寧縣西道教村土人房芝供養之後火出鼻中焚其軀芝築龕瘞之土産蜜元和志隰州貢白蜜蠟元和志隰州貢黃蠟麝香元和志隰州貢箕柳蒲縣出有數種金絲最佳秋可任為簸箕龍鬚席寰宇記出溫泉縣按唐書地理志隰州土貢胡女布元和志及寰宇記亦載之今州只産青麻一種木棉亦間有之意非此二者所成附記於此纂修官臣馮芝恭纂總纂官臣顧蓴許應藻恭覆輯校對官臣王積順恭校
