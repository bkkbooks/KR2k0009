入境兵索與縣尹張名昭主簿商顯祖協謀備禦民賴以安嶽索舊作藥僧今改正達魯噶齊已見前明顧登洪武十年知絳州精強有心計凡廟社祠壇踵前牧經理者或修或建規制悉備朱凱肅寧人景泰初知垣曲縣興學校勸農桑政績甚著王汝績金溪人正統中知絳州土狹賦重人鮮知學而健於訟汝績勸民耕桑盡墾不食之土後乃大修學宫廣延師儒以訓民間子弟自是獄訟衰息田里晏然劉智長凊人正統十四年知絳縣政尚公平滿九載當代民詣闕乞留進秩六品仍知縣事政績益著又九載致仕民遮道泣送賈定通許人成化十八年知絳州絳有積欠官薪逋者破家弗克完定通一州丁户足其數自是絳薪歲無逋患立善惡二籍歲終核其實賞罰有差會大飢疫絳人獨全活因上救荒八事其他平盜決疑獄俱以吏材著吳璇高唐人宏治九年知坦曲縣建倉庾廣儲蓄以備凶歲增拓學舍俾弟子誦習其中親為講解後調繁聞喜政聲尤著羅田光山人嘉靖中知聞喜縣修治堤堰民感頌之名曰羅公渠高文學寶坻人嘉靖中知河津縣縣有瓜峪泉自唐長孫恕鑿渠為山水衝壞文學興工修之三月告成高一百尺厚六丈上為橋疏支渠溉田甚多宋應昌仁和人隆慶元年知絳州州城濱汾患水囓應昌築石堤護之民間地糧多飛詭為之清文弊永絶凡供具一不以煩民民懷其德王象乾新城人隆慶中知聞喜縣大興水利萬厯元年創建護城石堤張汝乾洛南人隆慶中知河津縣遮馬峪渠上下二渠唐長孫恕所鑿上渠溉乾澗等田元大德中雨壞民供賦甚苦自是汝乾捐資鑿山通渠水利復興申田靈夀人萬厯初知聞喜縣胥吏或進羡餘指戒石語以矢之布袍蔬食妻子皆儉約自甘喬允升孟津人萬厯中知聞喜縣時錢糧合户催徴姦民每多牽纍乃設門簿民以為便至今行之雷復豫高陵人萬厯中知聞喜縣引白土溝溉姚村等田民德之號雷公渠趙文炳任人萬厯中知垣曲縣創築護城石堤未成行取入京後巡按山西發金檄縣修築自是城無水患王豫立涇陽人萬厯二十四年知稷小縣時礦使四出大璫將臨稷妄云鳳凰山銀可採民洶洶不安豫立走使説止之會大吏檄用條鞭法起徵士民皆不便又力為申請得不行去任之日囊無一錢吳峻萬厯中知稷山縣嘗立大社集諸生論文創建薛村堤􅚈澗水溉田二百餘頃白鯤南和人萬厯中知河津縣修遮馬峪故渠引灌民田至今賴之張耀三原人天啓中知聞喜懸慈惠撫民民為立祠秦宗文武陽人崇禎五年垣曲典史流寇入犯宗文督鄉勇隨大兵進剿與賊遇力戰死事聞祀忠烈祠本朝張文德奉天人順治三年知垣曲縣潔己愛民刑獄一清卒於官士民垂涕建祠祀之李榮宗費人順治四年以進士任垣曲縣薑瓖之亂城陷被執罵賊死贈按察司僉事祀忠烈祠又典史周茂覺浙江人亦死於城守鄒起鳳正藍旗漢軍順治七年授垣曲縣時薑瓖賊黨踞縣城一年大兵至議屠戮起鳳將之任適在軍亟請於主曰脅從無辜宜開釋與之更始且有土無人亦安用此曠土為遂獲免董爾性洛陽人順治十六年知垣曲縣明決果斷志在利民嘗鑿城東渠引水溉田民號董公渠其餘興復甚多許榖常熟人康熙四十二年以庶吉士改知垣曲縣噢咻疾苦有古循吏風勤於課士雋異者輒加禮由是窮鄉後進皆勸文風日盛許自俊嘉定人康熙十九年以進士知聞喜縣攜一子一僕之任食脫粟飯菜羮往來會城䇿蹇而巳用法平民多勸輸乞休去行李蕭然一時稱清白吏孟孔脈富平人康熙元年以舉人知稷山縣聽斷明決訟者心服歲飢民多鬻子女捐俸贖還之朱天爵正紅旗漢軍康熙十八年知稷山縣甘淡泊御胥吏極嚴舊馬草豆出自民天爵給價購買客兵過境上銜勒有方不為民纍崔鳴鷟內邱人康熙八年以進士知河津縣革弊均利事集而民不擾父喪民冒風雪走上官請留鳴鷟乃以中夜去後數年有同姓宦過縣民傳是鳴鷟爭出郊迎既知其訛皆嘆息而返人物漢裴茂聞喜人靈帝時厯縣令郡守尚書建安初以奉使率導關中諸將討李傕有功封列侯三國魏裴潛字文行茂之子武帝定荆州參丞相軍事遷倉曹屬武帝問劉備才略潛曰使居中國能亂人而不能為治也若乘間守險足為一方主出為代郡守有功明帝時纍官尚書令奏正分職料簡名實出事使斷官府者百五十餘條正始五年薨諡曰貞侯其家教上下相奉事有似於石奮其履檢校度自魏興少能及焉裴徽字文季潛弟有高材逺度善言元妙仕魏為冀州刺史封蘭陵子母邱儉字仲恭聞喜人父興黃初中為武威太守討伐叛逆有功封高陽鄉侯儉襲父爵明帝即位為尚書郎纍遷荆州刺史帝圖討遼東以儉有幹䇿徙幽州遼東平進封安邑侯正始中數討高句驪破走句驪王宫追奔至肅慎氏南界刻石紀功齊王廢儉感明帝顧命舉兵討司馬師不克被殺論者以忠臣目之子甸字子邦為治書侍御史有名京邑儉之討師甸與謀焉晉裴秀字秀彥潛之子八歲能屬文時人語曰後進領袖有裴秀襲父爵清陽亭侯纍官尚書僕射魏延熙初官制秀所改也武帝即王位拜尚書令既受禪封巨鹿郡公進司空作禹貢地域圖十八篇精審可依據藏於祕府秀創制朝儀廣陳刑政朝廷多遵用之薨諡曰元裴楷字叔則徽之子弱冠知名尤精老易以清通選為吏部郎纍遷侍中平吳之後為帝陳三五之風敘漢魏盛衰之迹帝稱善與楊駿婚親不阿附封臨海侯性寬厚與物無忤不持儉素亦淡退不樂處勢卒諡曰元二凡黎康子瓚及憲並知名裴頠字逸民秀少子宏雅有逺識武帝時為國子祭酒兼右軍將軍以誅楊駿功封武昌侯奏修國學刻石寫經纍遷尚書每授一職殷勤固讓博引古今成敗以為言進尚書左僕射專任門下事頠患時俗浮虛著崇有論以釋其蔽後為趙王倫所害惠帝反正復其官諡曰成郭瑗聞喜人為尚書都令史時尚書杜預有所增損瑗多駮正之以公方稱終建平太守郭璞字景純瑗之子博學有高才詞賦為中興之冠妙隂陽占算有郭公者客居河東精卜筮以青囊中書九卷授之由是洞五行卜筮之術能禳災轉禍過江為著作佐郎屢上疏論時事遷尚書郎數言便宜多有匡益後為王敦所害追贈宏農太守子驁官至臨賀太守裴嶷字文冀聞喜人清方有幹略為昌黎太守被徵達遼西道梗乃投慕容廆為長史遣使建鄴帝試留嶷以觀之嶷以廆萬里表誠宜還反命帝乃遣還廆後謂羣臣曰裴長史名重中朝而降屈於此豈非天以授孤也官至樂浪太守南北朝魏裴駿聞喜人幼聰慧親表稱為神駒因以為字弱冠通涉經史方檢有禮度鄉里宗敬焉蓋吳作亂關中來襲聞喜駿率厲鄉豪奔赴之賊退太祖親討蓋吳引見駿大悅謂崔浩曰駿有當世才忠義可嘉補中書博士浩亦深器駿目為三河領袖轉中書侍郎卒贈泰州刺史聞喜侯諡曰康子修宣皆博學清辨以孝友聞吳悉達聞喜人凡弟三人並幼父母為人殺號慕感人及長報仇避地永安昆弟同居四十餘載閨門和睦讓逸競勞雖儉年糊饘不繼客過必傾所有鄰人孤貧者莫不解衣輟糧以相賑恤刺史以悉達兄弟行著鄉里表贈其父渤海太守悉達後欲改葬亡失墳墓號哭晝夜忽足下地陷得父銘記因遷葬曽祖以下三世九喪傾盡資業不假於人哀感毁悴有過初喪有司奏聞標閭復役以彰孝義裴延俊字平子聞喜人徽八世孫父山嵩以平蜀賊丁蟲功贈東雍州刺史延俊少孤事後母以孝聞涉獵墳史頗有才筆舉秀才高第明帝時纍官幽州刺史考績為天下最拜太常卿莊帝初於河隂遇害贈儀同三司都督雍州刺史子元直敬猷並有學尚與父同時遇害俱贈官裴敬憲字孝虞駿之孫少有志行學博才清淡於榮利舉秀才高第除太學博士工隸草解音律以五言之作擅名後進共宗之世有德於鄉孝昌中賊過其廬輒不犯年三十三卒永興三年贈中書侍郎諡曰文弟莊伯文章與敬憲相亞為臨淮王彧記室參軍聞兄疾徑歸以侍疾憔悴病卒贈通直散騎侍郎諡曰獻裴邃聞喜人性方嚴為州里所推挹大統三年東魏來寇邃乃糾合鄉人分據險要以自固及李弼略地東境邃為之鄉導多所降下周文嘉之封澄城縣子卒於正平郡守贈儀同三司定州刺史北齊裴景鸞延俊從子與弟景鴻並有逸才河東呼景鸞為驥子景鴻為龍文景鸞位華州刺史景鴻和夷郡守鴻子叔卿博涉有孝行時號裴曽子周裴果字戎昭聞喜人少慷慨有志略從文帝戰河橋及芒山勇冠當時補帳前都督屢著戰功纍官隆州刺史加持節驃騎大將軍開府儀同三司封冠軍縣公果性嚴猛能決斷抑挫豪右申理屈滯厯牧數州號為稱職卒諡曰質子孝仁涉獵經史為長安鎮將扞禦齊人甚有威邊之略裴寬字長寬聞喜人博涉羣書親殁撫諸弟以篤友聞魏孝明時釋褐員外散騎侍郎孝武西遷寬將家屬避難於大石嶺大統中授都督同軌防長史與東魏戰被擒齊文襄厚遇之卒遁歸授持節帥都督封夏陽縣男天和二年為汾州刺史陳將程靈洗率衆攻城寬募驍兵頻挫其鋭苦戰三十餘日會雨水暴長城陷𬒳執卒於江左裴漢字仲霄寬之弟操尚宏雅聰敏好學魏大統五年除大丞相府士曹行參軍轉墨曹理識明贍斷割如流天和中加車騎大將軍儀同三司時晉公護擅權搢紳諂附漢直道自守故八年不徙職雅好賓遊留連宴賞自寬殁後絶遊從不聽琴瑟撫養兄弟子情甚篤至卒贈晉州刺史裴文舉字道裕邃之子少忠謹涉獵經史孝閔踐阼襲爵澄城縣子齊公憲鎮劍南以為總管府中郎遷絳州刺史所在廉約入為司憲中大夫進爵為伯文舉早喪父其兄在山東唯與弟璣幼相訓養友愛甚篤璣早亡文舉撫視遺孤逾於己子時人以此稱之隋王隆字伯高龍門入開皇初國子博士精易春秋教授生徒時稱王氏學著興廢要論七篇文帝比之陸賈從弟仲華邃於易亦為當時宗裴子通聞喜人以大中大夫居母喪哭喪明有白烏巢家樾兄弟八人皆以孝聞詔表閭世謂義門裴氏王通字仲淹隆之子幼篤學慨然有濟蒼生之志仁夀中詣長安奏太平十二䇿不見用退居河汾著書講學依春秋例自獲麟後厯秦漢至後魏著紀年之書曰元經又依孔子家語揚雄法言為客主對答之説曰中説皆為儒士所稱義寧元年卒門人薛收等相與議諡曰文中子唐王績字無功通之弟性簡放隋大業中舉孝弟廉潔授祕書正字因亂還鄉種漆釀酒蒔藥草自供著書東臯自號東臯子武德初待詔門下省故事官給酒日三升或問官何樂曰良醖可戀耳侍中陳叔達聞之日給一斗時稱斗酒學士貞觀初棄官去著醉鄉記以次劉伶酒德頌其飲至五斗不亂著五斗先生傳豫知終日命簿葬自志其墓敬君宏絳人纍功厯驃騎將軍封黔昌侯以屯營兵守元武門死隱太子之難薛仁貴龍門人貞觀中天子自征遼東仁貴應募遼兵二十萬拒戰仁貴著白衣持戟腰兩弓呼而馳所向披靡遼遂奔潰帝召見歎異遷右領軍中郎將高宗幸萬年宫山水暴至仁貴登門大呼帝遽出乘高獲免嘉其忠賜以御馬顯慶中屢破高麗及契丹拜左武衛將軍擊鐵勒於天山時九姓衆十餘萬仁貴以三箭定之乾封初以降扶餘等四十城拜本衛大將軍封平陽郡公裴行儉字守約聞喜人貞觀中舉明經為長安令高宗將立武昭儀行儉以為國家憂從此始與長孫無忌褚遂良祕議語泄左除西州府都督長史麟德中遷吏部侍郎典選有能名吐蕃叛出為洮州道討平之拜禮部侍郎為檢校右衛大將軍封聞喜縣公行儉通兵法善知人兼工草隸論士先器識而後文藝所引偏裨類為世名將卒諡曰獻王勃字子安通之孫父福畤雍州司户參軍勃六歲善文辭九歲得顔師古注漢書作指瑕以擲其失麟德初對策高第後為虢州參軍勃屬文先磨墨數升酣飲引被卧及寤援筆成篇不易一字時謂腹稿兄勔涇州刺史兄勮弟助皆第進士勮宏文館學士兼知天官侍郎助七歲喪母哀號鄰里為泣居父喪哀毁骨立官監察御史裏行初勔勮勃皆著才名杜易簡稱為三珠樹其後助劼又以文顯劼早卒少弟勸亦有文裴敬彝聞喜人子通曾孫七歲能文年十四詣巡察使唐臨直其父臨黃令智周枉臨竒之試命作賦賦工父罪巳釋表敬彝於朝補陳王府典籖一日匆泣涕謂左右曰大人病吾輒痛今心悸而痛事叵測乃請急倍道歸而父巳卒羸毁踰禮厯太子左庶子武后時為酷吏所陷死嶺南裴守真稷山人早孤母喪哀毁癯盡舉進士六科連中養寡姊甚謹世推其禮法纍授太常博士善容典時謂才稱其官天授中為司府丞推核詔獄全免數十姓不合武后旨出外終安州刺史子子餘事繼母孝居官清終𡵨王府長史裴炎字子隆聞喜人寬厚有竒節舉明經及第纍遷黃門侍郎調露中拜中書令武后廢中宗炎固爭請歸政后大怒繫獄坐死睿宗立贈太尉諡曰忠從子佃先以太僕丞坐流嶺南上變陳得失謂宜還太子東宫罷諸武權不然豪傑乘時而動后怒杖之朝流瀼州中宗復位召授太子詹事丞終東京留守薛季昶龍門人武后時上書自布衣擢監察御史後為洛州長史與桓彥範等誅張易之等功進户部侍郎李昶請收諸武不見聽五王失柄貶淡州司馬即仰藥死睿宗立贈御史大夫敬暉字仲華絳州平陽人弱冠舉明經聖厯初為衛州刺史武后幸長安為東都副留守皆有治聲長安二年授中臺右丞以誅二張功為侍中纍封平陽郡王初易之巳誅薛季昶請收諸武暉亦苦諫不從尋請降諸武王爵為公三思憤誣以罪遂放瓊州為周利貞所害睿宗時追復官爵諡肅愍按唐有平陽郡無平陽縣而絳州則有正平太平二縣唐書以為平陽人傳寫誤也薛訥字慎言仁貴子突厥擾河北武后以訥世將詔為安東經略使對同明殿具言突厥以廬陵王藉口今雖還東宫議不堅信若太子無動賊不討而解后納其言屢處邊任皆有戰功開元初召為左軍節度吐蕃寇臨洮詔訥擊破之拜左羽林大將軍復封平陽郡公訥性沉勇寡言其用兵臨大敵益壯卒贈太常卿諡昭定孫平年十二為磁州刺史纍授右衛將軍在衛三十年厯汝州刺史鄭滑平廬節度使皆有功績以司徒致仕卒年八十裴漼聞喜人父炎之為同州司户參軍永年令皆有能名後病廢漼侍疾父殁始擢明經纍官監察御史時崔湜鄭愔坐姦贓詔漼按訊而安樂公主上官昭容為阿右漼執正其罪天下稱之纍進中書舍人睿宗造金仙玉真二觀時旱甚役不止漼上奏極諫開元中為吏部侍郎甄拔士為多終太子賓客諡曰懿裴寬漼從祖弟性友愛通敏不受苞苴舉拔萃為河南丞纍改太常博士禮部言忌日享廟應用樂寬議廟尊忌卑則作樂廟卑忌尊則備而不奏中書今張説善之請如寬議遷刑部員外郎執法不阿纍厯藩鎮為政清簡人皆愛之為禮部尚書卒天寶間稱舊德以寬為首子諝居東都裴光廷字連城行儉子靜默寡交厯臺省皆稱職明皇有事岱宗中書令張説恐諸蕃乘隙竊發議加兵守邉用光廷策遣使突厥召其大臣赴行在邊塞晏然纍拜侍中兼吏部尚書因行儉設長名榜銓注為循資格遷宏文館學土撰搖山往則維城前軌二篇獻之手制褒美後封正平縣男初知星者言上象變不利大臣請禳之光廷曰使禍可禳而去則福亦祝而來也論者以為知命卒諡忠獻子真開元末起居郎夀王瑁以母寵欲立為太子真諌明皇改容謝之授給事中辭不拜俄授祠部員外郎卒裴耀卿字煥之守真次子擢童子舉梢遷祕書省正字纍厯州縣皆有德於民開元中遷京兆尹請廣漕運以實關輔并陳置倉納祖水陸易道運徐疾諸便宜上然其訃拜黃門侍郎同中書門下平章事充轉運使三年積七百萬石省運費三十萬緡或勸以此緡納上答曰以國財求寵可乎敕吏為和市費天寶初進尚書左僕射卒諡文獻子佶第進士補校書郎纍官工部尚書為人清徑明鋭篤於義所與友皆第一流居官有守當時重之高秀岩稷山人開元中從擊吐蕃以功授萬福府别將纍遷户部尚書兼河東節度使安史之亂秀岩奔行在獻謀刻日期復兩京隨郭子儀舉兵預有勞績後封渤海郡王裴遵慶字少良聞喜人幼而博學外晦內明始為大理丞全救役夫誤被論逆者數十族頻擢吏部員外郎判南曹視簿課詳而不苛世稱吏事第一肅宗時拜黃門侍郎同平章事纍遷尚書右僕射性惇正老而彌謹每薦賢有來謝者以為恥諌而見從即內益畏雖親近但記其削藁疏數而莫知所言卒年九十餘子向能以學行持門户有孝睦稱厯任州縣俱著名迹官至吏部尚書向子寅御史大夫寅子樞昭宗時為門下侍郎平章事進右僕射後為朱全忠所殺裴垍字宏中聞喜人擢進士第以賢良方正對策第一補美原尉纍遷中書舍人李吉甫相求人物於垍即疏三十許人吉甫籍薦之天下翕然稱得人吉甫罷拜中書侍郎同中書門下平章事課吏治分淑慝憲宗順納常呼其官而不名垍器局峻整持法度雖宿貴前望不敢干以私諫官言得失執政多忌之惟垍獎勵使盡言所引擢選任罔不精明故元和之治百度武修舉云裴潾聞喜人少篤學善隸書元和初為左輔闕會伐蔡以中人領使潾諌以為內人及外事職分亂矣帝雖不用而嘉其忠擢起居舍人憲宗喜方土柳泌為治丹劑潾極諌貶江陵令穆宗立泌誅召還纍官兵部侍郎潾以道自任悉心事上疾黨附不為權近所持卒諡曰敬裴度字中立聞喜人貞元初擢進士第舉賢良方正異等調河隂尉纍遷司封員外郎田宏正效魏博六州於朝憲宗遣度宣諭魏人歡服淮蔡作亂中外惴恐度誓不與賊偕存即拜門下侍郎平章事督諸軍力戰擒元濟撫定其人册勳封晉國公後屢為纎人所搆旋罷旋相開成三年徴拜中書令薨贈太師諡文忠配享憲宗廟廷度神觀邁爽操守堅正名震四夷其威譽德業比郭汾陽而用不用常為天下重輕事四朝以全德始終及殁天下莫不思其風烈子識官撿校尚書右僕射厯六節度皆有可述卒諡曰昭識弟諗纍官工部尚書太子少師封河東郡公黃巢盜國迫以偽官不從遇害王質字華卿龍門人通五世孫舉進士中甲科由祕書省正字纍遷諫議大夫宋申錫為鄭注所搆與諫官伏闕爭申錫得不死終宣歙觀察使卒諡曰定質清白畏慎為政必先究風俗所至有惠愛與李德裕善厚而中立不為黨云盧陵龍門人舉進士官至工部尚書讀書龍門山注春秋孝經時有大議陵每以經義決之宋裴濟字仲浦聞喜人唐相耀卿八世孫後徙居河中由太原鎮將厯知鎮定二州威績甚著咸平初領順州團練使知靈州夏人大集斷餉道孤軍無援城陷死之贈鎮江軍節度使濟在諸使中甚有聲望及殁夏人惜之薛奎字宿藝正平人父化光善術數嘗以平晉策干太宗奎進士及第由隰州推官纍厯中外咸著政績仁宗朝遂參知政事卒諡簡肅奎性剛不苟合遇事敢言及參政事謀議無所避能知人范仲淹龎籍明鎬自為吏部選人皆以公輔許之張觀字思政絳人中服勤辭學科擢為第一仁宗時以給事中權御史中丞詔求直言上四事河北大雨水又條七事纍拜左丞丁父憂哀毁遏人既練而卒諡文孝觀趣向恬曠持廉少欲仁宗飛白書清字賜之韓退稷山人母死負土成墳徒跣終喪隱嵩山詔賜粟帛號安逸處士趙鼎字元鎮聞喜人崇寧五年進士第隨高宗南渡纍官右司諫陳四十事施行三十有六遷殿中侍御史拜御史中丞上言吳越介在一隅非進取中原之地宜以公安為行闕而屯重兵於襄陽運江浙之粟以資川陜之兵經營大業計無出此尋以言事忤旨出外召拜參知政事進尚書右僕射同中書門下平章事上嘗語張浚曰趙鼎真宰相天使佐朕中興宗社之幸也後以張浚不悅出知紹興府浚去位鼎復入相專事固本以圖復讐不主和議秦檜忌之再出知紹興厯數州移吉陽軍為檜所逼不食死天下聞而悲之孝宗即位諡忠簡贈太傅追封豐國公配享高宗廟廷中興賢相以鼎為稱首云邵雲龍門人金兵陷蒲城雲集少年數百壁山谷時出撓之李彥仙遣客説以義遂來歸纍有功官武翼郎陜州破𬒳執羅索欲命以千户長大罵不屈羅索怒釘木架上置解州城外五日磔之罵不絶羅索舊作婁宿今改正金李愈字景韓正平人中正隆五年詞賦進士第授曹王傅從王宴賜北部還上表言事章宗嘉其忠納用焉纍擢河南路提刑使憲臺廉察九路提刑以愈為最泰和二年上將幸長樂川愈切諌不從復諫曰北部侵我舊疆不謀雪恥復欲北幸一旦不警恐丞相樞密不足恃且皇嗣未定豈可逺事逸遊上異其言未幾授河平軍節度使改知河中府卒諡清獻梁襄字公贊絳州人登大定進士第纍官薛王府掾世宗將幸金蓮川襄上疏極諫為罷行由是以直聲聞遷監察御史終保大軍節度使襄學問該博練習典故膳服常淡泊云陳規字正叔稷山人明昌五年詞賦進士南渡為監察御史劾參政侯摰警巡使馮祥宣宗嘉其敢言又上章陳八事皆救時切務宰執惡之正大元年召為右司諫改充補闕數言事得失劾姦佞多見嘉納後出為中京留守卒規博學能詩文為人剛毅質直言事不少假借朝望甚重凡宫中舉士上必曰恐陳規有言渾源劉從益見其所上八事歎曰宰相材也南渡後諫官稱許古陳規而規不以訐直自名尤見重云死之日家無一金知友為葬焉李革字君美河津人讀書一再誦輒記不忘大定中進士由真定主簿纍厯大興府治中知府圖克坦納木布貴幸用事遣所親以進取誘革革拒之興定元年知平陽府事權參知政事時興兵伐宋革上書論諌不納平陽𬒳圍禆將出降元兵入城乃自殺贈尚書右丞圖克坦納木布舊作徒單南平今改正段鐸字文仲稷山人少孤以孝謹聞與兄鈞同登詞賦進士人稱河東二段鈞以文行著未仕卒鐸由長安簿厯官華州防禦使所至有異績封武威郡開國侯鈞曽孫克己成己同登進士趙秉文深器之目為二妙成己授宜陽簿金亡不仕元尉遲德誠字信甫絳州人厯官太子率更丞至大二年遷家令司丞仁宗以為謹恪常賜酒帛侍左右數薦士出未嘗語人選河東山西道宣慰司同知有治績延祐初拜遼東廉訪使卒張仲儀字伯威絳人元末為杭州路總管府判官稱能吏海寧潮溢沒民田廬仲儀禱於海神水隨退轉江西行中書省左右司都使歲飢民將為變仲儀單騎出撫之皆感泣散去復請於省臣發粟賑濟民遂大定擢撫州路總管告歸明高鐸字鳴道絳州人洪武中鄉試第一登進士厯官刑部侍郎僉都御史嘗築留都城開三山街奏遷金臺驛為侯馬驛才識通敏朝野倚以為重卒贈尚書石堅絳人永樂中官行人司行人會高麗不庭抗疏請往平之上問計對曰兵難遙度陛下第命臣臣必有以報陛下上竒其言許之堅單騎往見高麗王宣布朝廷威德王笑曰子未知死所敢大言乎堅曰吾知汝必殺我中朝問罪興師汝亡無曰矣王屈服遂修朝貢以功擢按察僉事薛瑄字德溫河津人父楨由鄉貢纍任鄢陵教諭有師範瑄永樂進士授御史時相三楊欲見之謝不往正統初遷山東提學僉事王振以同鄉故擢大理寺少卿欲一見不可遇之東閣振趨揖之亦不加禮振大怒因事下獄論死振蒼頭忽泣㸑下振為感動得釋景泰中擢大理寺卿英宗復辟拜禮部右侍郎兼翰林學士入閣預機務所陳皆關君德事巳見石亨曹吉祥亂政遂乞歸瑄學一本程朱以復性為主充養邃密言動皆可法著讀書録二十卷學者宗之卒贈禮部尚書諡文清隆慶中從祀兩廡陳璽絳州諸生父恕為貴州參議卒於官璽扶櫬歸葬廬墓有雙鵲來巢之異天順中被旌王衡字宗銓稷山人天順進士知淳安縣屏豪強裁浮冗擢監察御史出按遼東清理北畿軍政屢條奏事務及劾鎮撫不職侃侃有竒節出守松江廣平二府升浙江參政轉陜西布政使所至修實政不以權貴少挫竟𬒳誣歸韓重字淳夫絳州人成化進士官給事中劾方六李孜省交結中官梁芳等左道要寵詔謫芳南京御用監逮孜省錦衣獄纍遷右副都御史巡撫遼陽復論罷鎮守太監梁玘貪橫尋移撫湖廣會平黔中都勻之亂重以運餉功褒賞擢兵部侍郎晉南京工部尚書憤劉瑾亂政致仕瑾矯旨羈留揚州疽發背卒瑾誅賜祭葬陶廷信絳州人成化十七年由鄉試第一成進士宏冶中厯固原兵備副使執法不撓正德初遷刑部侍郎忤劉瑾下獄革職瑾誅起左副都御史總管漕運已進右都御史巡視浙江賑災禦賊築隄多著功績世宗初凡三督漕軍民習其政不嚴而肅尋拜工部尚書改南京兵部乞休歸廷信清儉質朴直道而行時稱名德卒贈少保諡恭介陶滋廷信子以進士授行人諫武宗南巡杖闕下謫國子學正著石鼓正誤一書嘉靖初厯兵部郎中率同官爭大禮再受杖謫戍榆林赦還卒隆慶中贈太常少卿文皓垣曲人宏治進士厯知平原衡水二縣有惠政擢御史時劉瑾扇毒皓奉命雪冤獄善類多所全活升河南按察副使誅魯山盜王昭等嘉靖中進階正議大夫張守中字大石聞喜人嘉靖中舉人授保定通判遷通州知州多異政擢雲南兵備僉事大治亭障戎器墾荒萊歲增課萬石萬厯初纍擢右僉都御史巡撫延綏斥貪殘摧豪右將吏趨職惟謹録功進右副都御史卒官贈兵部左侍郎翟繡裳聞喜人嘉靖進士知雄縣厯陜西僉事兵備關西時􅉰賊叛繡裳單騎入穴諭以朝廷恩義賊衆輸服遷山東參議分守遼海轉參政升僉都御史巡撫順天咸著功績尋致仕歸以名檢自勵家居二十餘年卒李俸聞喜人萬厯進士知嵩縣厯刑部主事梃擊事起張差巳承逆謀同官相顧不敢録俸力爭乃得入獄詞遂為鄭氏黨所惡以京察奪官天啓中贈光祿少卿辛全字復元絳州人幼稱神童家貧廢學年十五復讀書見程朱語歎曰吾固謂天地間當有此等人也父殁哀毁盡禮事母兄以孝友聞師安邑曹於汴長安馮從吾崇禎八年以歲貢入都尚書賀逢聖祭酒倪元璐等交章論薦及卒私諡文敬先生魯世任宇愧尹垣曲人性端方事親孝從安邑曹於汴學又交絳州辛全學日有聞天啓舉人崇禎中為鄭州知州建天中書院集士子講肄其中逺近樂從者千人十三年秋給事中范士髦薦於朝稱為德行醇儒堪繼薛瑄陳獻章之後十五年流賊來犯親勒民兵禦之戰敗自剄死本朝乾隆四十一年賜諡忠節趙輝字黃如河津人崇禎中進士授户部主事兩督倉儲力祛姦蠧纍遷霸州兵防副使十五年十一月城破輝整衣冠自盡季子稔同死贈光祿卿本朝乾隆四十一年賜諡烈愍暢一鵬字圖南河津人天性孝友崇禎中舉人知尉氏縣甫數月政聲四起城破罵賊死一年本朝乾隆四十賜諡節愍本朝李翀霄字息六本州貢生官中書大兵征湖南參贊軍前尋遷上荆南道副使為將軍築營房八千有竒民兵胥賴遷江寧兵備海寇來犯督兵擊之踐殺殆盡遷四川按察使平反脅從株連繫獄者三百人殱其渠首三人餘悉赦之終江西布政使張其郁垣曲貢生順治初知餘干縣時土寇就撫姦民多告訐其郁懲之置不問援兵多桀驁繩以法子女繫營內者立還之前令屢為賊害其郁出入賊巢至再賊感其誠胥投戈為良民歲飢曲賑之全活甚衆瞿鳳翥字象陸聞喜人順治丙戌進士遷饒州知府有盜踞山中時出為民害鳳翥遣老卒持書諭之賊感泣解散以卓異擢屯田道上屯務十事著為令卒福建驛鹽道子貞儀拔貢生營葬事甫訖嘔血死董復真聞喜人父嘉德為族人承公毆殺訟冤抵死在獄闖賊破縣囚胥逸承公出入自如順治八年復真遇之田畔徑撲殺之詣縣請罪縣覆前案獲免郭自修絳人知安逺縣攜二僕之任尋以石城失守調知石城甫至山賊張自聖來攻自修督兵守禦久之城破被執誘降大罵不少屈自聖怒手刃之邑人斂葬後六十年孫惟屏往迎櫬歸石城人郊祭者猶數十里不絶任宏祥字昌祉河津人順治辛卯舉人事母以孝聞纍官漢川知縣武昌裁兵煽變夜駕小舟赴彝陵乞師身任轉餉并請署兵為前鋒賊望見披靡縛偽官至轅門斬之不妄殺一人總兵嚴某辟參帷幄浹旬江漢悉平士民立石頌之黨成字憲公本州人自幼事濂洛之學家甚貧取與一介不苟與人語率本經術魏象樞聞其名致書講學三返卒不答象樞益高之弟子李育秀字子潛克宗其學育秀弟子柴平富性端方好小學內則諸書祖父母亡寢苫枕塊不入內者六年崔爾仰字子高聞喜人順治戊戌進士授晉州知州勸學墾荒治行著聞入為吏部員外郎時懸賞格招閩越降人至者相屬爾仰嚴核符牒印劄得無濫遷户部郎中開復諸生逋糧者五百四十餘人出為浙江提學僉事以勞遘疾卒張克嶷聞喜人康熙己未進士以庶吉士纍遷刑部郎中執法堅確無所畏避出知潮州府清廉慈惠屬邑姦民斬竿起邑令閉門治守具克嶷曰第登白葉岐山竪旗鳴鼓聲言大兵且至彼將自潰何用張皇為如其言賊黨果斬渠魁以獻其決事如此吳伯宗稷山人幼喪父母弟伯祧伯樂為人掠賣不知處伯宗厯秦蜀楚豫越遍求之不得入京師遇人輒泣問聞高翰林者知弟所在因宛轉以情告高哀之為馳書江西召伯樂來而伯祧書至謂以尋弟故亦被人掠賣關外閻氏伯宗立至關外見閻索其弟閻匿伯祧不出訴之官箠幾死卧月餘訴如前又箠幾死伯宗卒不懼越三年號訴如初閻知不可奪縱伯祧出伯示與偕入京而伯樂亦自江西來兄弟獲全喜且泣一時縉紳盛稱之董攔門垣曲農家子不識字日傭數錢奉父母年十四父病無錢營醫藥禱祠廟請斷指以代父病語訖遂斷三指觀者感歎父尋愈攔門亦無恙王錫絳人父聘士為陜西同心驛丞錫從往未半載父殁錫典衣裝以斂即歸里盡棄産以迎櫬時沍寒守備緩之且為乞賻贈錫力辭即日就途晝以繩繫棺自挽夜露宿棺側而號抵家墮指裂頸無復人形母喬卧病二載奉事尤力殁祔父墓慟幾絶弟瑆瑧幼錫字之俾皆有室雍正八年旌陳佐周絳人十五歲父所性卒毁甚事母李氏尤畏謹母病延醫徒步百里外遇盜將殺之林中虎突出盜驚散虎逡巡去母殁寢柩側三年不入內雍正八年旌黃以靜本州人父殁哀毁逾禮事母尤孝撫弱弟友愛備至乾隆十一年旌李養亨本州監生孝行著聞嘉慶十五年旌流寓唐韋况京兆人少隱王屋山薦為右拾遺不拜未幾以起居郎召半載奪官去徙家龍門纍徴不起元和初就拜諫議大夫數月致任况雖世貴而志沖逺不為名利所遷當世重其風標宋趙延京兆人為學修潔端己不恥菲薄後定居於絳之稷邑列女唐薛仁貴妻柳氏龍門人仁貴少貧賤將改葬其先柳曰夫有高世之材要須遇時乃發今天子自征遼東求猛將盍圖功名以自顯富貴還鄉葬未晚仁貴乃往應募果立竒功為名將李德武妻裴氏字淑英聞喜人安邑公矩之女以孝聞嫁李甫踰歲德武坐罪徙嶺南矩欲離婚德武曰吾方貶無還理子必儷他族於此長訣矣答曰夫天也可背乎以死自誓讀列女傳見述不更嫁者曰不踐二庭婦人之常何異而載之書厯十年德武未還矩決嫁之淑英斷髮不食竟不可奪後德武赦還為夫婦如初裴光廷母厙狄氏聞喜人有婦德武后召入宫為御正甚見親寵裴仲將妻李楚媛太宗孫紀王慎之女封東光縣主八歲父王慎有疾不食內外稱之適太子司儀郎裴仲將克修婦道侍姑疾親嘗湯藥娣姒皆得其歡心時妃主以奢侈相矜主獨儉素姊弟曰人生富貴在得志答曰我幼好禮今行之不違非得志而何榮貴儻來物可恃以陵人乎及父王慎死號泣嘔血數升免喪絶膏沐二十年宋趙鼎母樊氏聞喜人鼎四歲而孤樊教之通經史百家之書卒為南渡名相元姚天福母趙氏絳州人天福拜御史時母戒之曰古稱私而忘公委質為臣當罄所衷以塞其職勿以吾為恤俾吾追蹤陵母死之日猶生之年也天福亦請於憲府曰監察職當言路倘獲罪幸不為親纍世祖聞而歎曰母子義烈之言當於古人中求之明張勛妻賈氏聞喜人通經史善詩能左手書工行草事舅姑盡道處妯娌宗姻恩禮兼至與夫處終身相敬如賓勛勤學貧不能購書賈乃寫録其講論有經生不能及者勛殁孫守中方五歲後中進士為名臣賈之教也郭永固妻焦氏絳人永固為甘泉知縣死難焦亦罵賊殉夫並獲贈恤王承廕妻談氏絳人避亂柴家山寇至義不辱攜女暨劉承祚妻某氏同墜千尺深崖尸完無損人驚異之又靳育竒妻劉氏聞寇警攜女投井李時元妻王氏罵賊被殺高應命妻梁氏稷山人年十七無子應命病篤訣於母曰兒亡新婦當嫁梁泣曰此言胡為及我比應命卒誓不改適事舅姑盡禮守節六十五年夀八十二卒周誦妻侯氏河津人年二十一夫亡守節八十餘年足不踰户庭夀一百有三歲張平妻許氏絳州人平父被賊縛平求代脫父平見殺許縊死又趙芉妻閻氏夫為賊所執閻尋夫被殺談汝蘭妻石氏垣曲人崇禎六年避亂東石家堡堡破被執至村西強之行石大罵引刀自刎趙應命妻張氏垣曲人年二十闖賊破寨張與姪女三進將死之賊易其幼誘之曰我能庇汝張攜女疾投千尺崖下尸裂腦破賊驚散而去薛宗善妻張氏聞喜人年二十七始歸宗善未幾流賊起被掠罵不絶聲賊怒以三矢穿口而死鄉人私諡貞娥又楊貴川妻張氏為流寇所掠大罵賊刺殺之王曰廷妻李氏聞喜人崇禎末翻山鷂兵傍河南下家被掠殺其夫執之上馬李痛哭大罵投地數四兵怒斫死盧養蒙妻高氏絳人崇禎中盜起攜女避難至翼城南道逢一嬰孩啼泣熟視之乃姪高榜也問其父於途人咸謂遇賊死高流涕並負姪行行里許力不能支私自忖曰吾兄止此一子棄之便絶高嗣我自可無女不可父母無後於是棄女攜姪去暨賊退高與姪歸其兄竟未死先在途得遇高氏女而負歸矣後一年高亦生子張荆璞妻馬氏絳人流賊破堡馬墜堡幾斃賊迫之溺於池罵不輟被刃而死暢家傅妻薛氏河津人年二十二夫故守節三十年子一鵬為尉氏知縣隨之任流賊破城一鵬殉難薛閉門自焚死又程簡妻程氏李胎子妻李氏俱少寡流賊入境程投井死李罵賊被殺本朝王槐三妻傅氏本州人遭亂為賊所執紿之曰有瘞金於汾湄偕往取之賊信且喜至則投水死賊相視愕然文曲瑩妻趙氏垣曲人姑卧病三載貧不能繼醫藥祝天求代病危割股獻神以進姑病頓愈馮養宅妻王氏聞喜人薑瓖之亂寇至邱村掠王氏匿空室寇牽之王曰母牽我自行抱子出門從容投井死又楊玉泰女孫花鈴李貴美妻銀鈴俱被執罵賊死石含玘妻吉氏絳人暮遇寇與家人五六避屋上為賊所窺問乘屋者幾人吉曰我一而巳遂自投而下罵不絶口賊殺之餘皆得免李邦輔妻邵氏絳人遇賊逼之瞑目曰有死而巳肯從賊耶賊怒揪其髮殆盡哭罵不巳賊碎其尸去姑王氏本州人夫亡殉節同州烈婦郝成儀妻張氏節婦周宗凱妻樊氏黃萬體妻崔氏段煒然妻韓氏席麟徑妻鄭氏宗萬方繼妻張氏董公績妻薛氏席世後繼妻侯氏陳薄妻梁氏馮宜家妻陳氏席畚徑妻朱氏梁太儀妻陶氏李養祖妻王氏李自新妻張氏柴俊儀妻李氏常有康妻趙氏彭鍹妻崔氏楊印章妻郝氏閻錫妻李氏吳克恭妻王氏吉夢麟妻王氏蔡從周妻衛氏南宫廷翼繼妻薛氏李上芾妻