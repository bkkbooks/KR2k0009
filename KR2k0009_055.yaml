body:
  text: 河東郡地漢置臨汾縣屬河東郡後漢因之晉改屬平陽郡後魏世祖於縣置東雍州及南太平郡神麚元年改郡曰征平太和十八年州廢改郡曰正平東魏天平初復置東雍州後周武成二年改曰絳州隋開皇初郡廢寰宇記開皇三年罷郡自玉壁移絳州於東雍州城即今之州治十八年改臨汾縣曰正平大業初州廢改曰絳郡唐武德元年罷郡置絳州總管府三年府罷為絳州天寶初復曰絳郡乾元元年復為絳州屬河東道五代因之宋曰絳州絳郡金天會六年置絳陽軍節度使興定二年升為晉安府屬河東南路金史地理志總管河東南路兵馬三年置河東南路轉運司元復曰絳州元史地理志初為絳州行元帥府河解二州諸縣皆隸後罷元帥府仍為絳州屬平陽路明洪武初省州治正平縣入州屬平陽府本朝初因之雍正二年升為直隸州屬山西省領縣五垣曲縣在州東南二百十里東西距九十五里南北距一百十五里東至河南懷慶府濟源縣界十五里西至解州夏縣界八十里南至河南河南府澠池縣界五里北至平陽府翼城縣界一百十里東南至澠池縣界五里西南至解州平陸縣界五十里東北至澤州府陽城縣界一百二十里西北至絳縣界八十里戰國魏土垣邑漢置垣縣屬河東郡後漢魏晉因之後魏皇興四年改置白水縣兼置邵上郡太和中郡廢屬河內郡孝昌中復置邵郡後周世宗元年於郡置邵州武成元年改白水縣曰亳城隋開皇初郡廢大業初州廢改亳城曰垣縣屬絳郡義寧元年於縣置邵原郡唐武德元年復曰邵州九年州廢屬絳州龍朔二年改屬洛州乾封二年還屬絳州天授三年又屬洛州長安二年還屬絳州貞元三年改屬陜州元和三年還屬絳州五代因之宋改垣曲縣金興定四年割屬翼州元初仍屬絳州至元二年省入絳縣十六年復置明因之本朝雍正二年割屬解州八年屬絳州聞喜縣在州南七十里東西距六十五里南北距四十五里東至絳縣界四十五里西至解州夏縣界二十里南至夏縣界十里北至本州界三十五里東南至絳縣界七十里西南至夏縣界二十里東北至平陽府曲沃縣界五十五里西北至稷山縣界三十五里春秋晉曲沃邑秦改曰左邑漢元鼎六年分置聞喜縣皆屬河東郡後漢省左邑移聞喜治之晉因之後魏改屬正平郡隋屬絳郡大業末改為桐鄉唐武德元年復為聞喜屬絳州元和中屬河中府五代漢乾祐元年割屬解州宋金元明因之本朝初屬平陽府雍正七年改屬絳州絳縣在州東南八十里東西距八十五里南北距七十里東至垣曲縣界六十里西至聞喜縣界二十五里南至垣曲縣界五十里北至平陽府曲沃縣界二十里東南至垣曲縣界五十里西南至聞喜縣界三十里東北至平陽府翼城縣界四十里西北至曲沃縣界三十五里漢聞喜縣地後魏太和十八年置南絳縣建義初又置南絳郡西魏恭帝郡縣皆去南字後周初置晉州建德五年州廢隋開皇初郡廢屬絳州大業初屬絳郡義寧元年屬翼城郡唐武德初屬澮州四年屬絳州五代及宋因之金興定四年割屬翼州元仍屬絳州明因之本朝初屬平陽府雍正七年改屬絳州稷山縣在州西五十里東西距五十里南北距八十五里東至本州界二十五里西至河津縣界二十五里南至解州夏縣界五十五里北至平陽府鄉寧縣界三十里東南至聞喜縣界四十五里西南至蒲州府萬泉縣界三十五里東北至平陽府太平縣界三十里西北至河津縣界三十里漢聞喜縣地後魏太和十一年分置高涼縣兼置高涼郡西魏改龍門郡後周保定初置勳州總管府後改曰絳州隋開皇初州移郡廢十八年改縣曰稷山屬絳州大業初屬絳郡唐屬絳州光化初改屬河中府五代唐同光二年還屬絳州宋因之金屬晉安府元明俱屬絳州本朝初屬平陽府雍正二年改屬絳州河津縣在州西一百里東西距四十里南北距七十里東至稷山縣界二十五里西至黃河陜西同州府韓城界十五里南至蒲州府榮河縣界三十五里北至平陽府鄉寧縣界三十五里東南至蒲州府萬泉縣界四十里西南至榮河縣界三十五里東北至鄉寧縣界四十里西北至韓城縣界二十五里商時耿邑後為耿國春秋晉大夫趙夙采邑戰國魏皮氏邑秦置皮氏縣漢屬河東郡後漢因之晉屬平陽郡後魏太平真君七年改曰龍門屬高涼郡後置龍門郡隋開皇初郡廢十六年割屬蒲州大業三年屬河東郡唐武德元年屬泰州二年自汾陰徙泰州來治貞觀十七年州廢屬絳州大順二年改屬河中府五代及宋初因之宣和二年改曰河津金元因之明屬蒲州本朝初屬平陽府雍正二年改屬絳州形勢北枕九原南襟峨嶺姑射傑峙於西北汾澮環繞於東南介在兩河雄視三晉州志風俗人性剛悍多勇敢然勤稼穡好蓄積明統志民奉上急公士尚亷恥淳厚易治州志城池絳州城周九里門二池廣三丈隋開皇初土築明嘉靖間甃甎本朝順治六年修康熙二年三十九年重修垣曲縣城周四里門三池廣一丈五尺西魏大統中土築金季展築明隆廢間甃甎本朝康熙七年修四十四年重修聞喜縣城周五里門四池廣三丈唐元和中土築明嘉靖中甃甎本朝順治十六年修康熙四十年重修絳縣城周五里門三池深一丈唐武德初土築明隆慶中增築本朝順治康熙中屢修稷山縣城周五里門五池廣一丈五尺隋開皇中土築明嘉靖中甃甎本朝康熙四十六年修河津縣城周三里門三池深淺有差元皇慶中土築明崇禎中甃甎本朝順治康熙中屢修學校絳州學在州治東北宋景祐間建明時屢修本朝順治間修康熙六年十九年重修入學額數二十名垣曲縣學在縣治北舊在城外東北元至元中移建今址本朝順治元年燬十三年重修入學額數十二名聞喜縣學在縣治東北宋咸平中建元明屢修本朝康熙二十年修乾隆二年重修入學額數二十名絳縣學在縣治東南後唐長興中建明正德中拓址增修本朝順治六年燬八年重建康熙十六年四十年重修入學額數十五名稷山縣學在縣治東南唐貞元中建金貞祐中燬元初復建本朝康熙十九年修三十八年重修入學額數十五名河津縣學在縣治東元皇慶初建明正德中重建本朝康熙九年修入學額數十二名啓光書院在州城舊名啓光樓明宗人肄業地本朝康熙中改建東雍書院在州城本朝雍正二年建桂林書院在州城本朝乾隆十年建絃歌書院在垣曲縣本朝乾隆十七年建涑水書院在聞喜縣本朝康熙中建香山書院在聞喜縣本朝乾隆二十九年建涑陽書院在絳縣城內元泰定中建在縣西本朝乾隆二十一年遷建思文書院在稷山縣本朝乾隆二十八年建文清書院在河津縣本薛瑄故宅明宏治中建以祀瑄本朝乾隆二十九年重建龍門書院在河津縣本朝康熙中建按舊志載崇禮書院在州城明宏治中敕建勉庸書院在垣曲縣學西明天啓初由西門內移建董澤書院在聞喜縣宋相趙鼎世居董澤其後六世孫篔仕元為國子博士請作書院於其鄉今並廢謹附記戶口原額人丁九萬八千三百九十三今滋生男婦共一百一萬七千三百一十二名口計一十五萬六千四百一十六户田賦田地三萬四千二百八十七頃九十三畝二分有奇額徵地丁正雜銀二十六萬八千六百四十五兩三錢六分六釐糧三百三十三石五斗五升有奇山川鼓山在州西北二十五里唐溫大雅創業起居注義寧元年帝宿於絳郡西北之鼓山去郡二十餘里元和郡縣志謂之古堆州志鼓山即鼓堆周四里高五丈穹窿而圓狀如覆釡人馬踐履有聲故名下有泉池馬首山在州西北四十里俗名馬頭山州志左傳趙盾田於首山即此上有龍祠禱雨輒應與稷山縣及平陽府鄉寧縣接界定境山在州西北五十里寰宇記唐長安中部人與慈州人爭界因以青山為界天寶六載敕改為定境山金史地理志正平縣有定境山九原山在州北二十里寰宇記九原一名九京晉大夫趙盾葬所禮記謂趙文子觀處有古水出此原西蓋即水經注所謂黃阜也鳳凰山在垣曲縣東里許狀如飛鳳鷹嘴山在垣曲縣西南五十里黃河繞其下虎兒山在垣曲縣西四十里高九十丈周十里上有風洞墨山在垣曲縣西五十里一名黑山高一百七十丈周十三里山經雨水流皆黑隋書地理志垣縣有黑山轉山在垣曲縣西七十里與橫嶺山遙相接其山坡多回曲轉折又縣西七十里有椅山中條山在垣曲縣西接夏縣界下臨黃河迤邐至縣南里許為條山之尾懸泉山在垣曲縣西北六十里山腰有懸泉又北有麻姑山折腰山在垣曲縣西北七十里中低而兩頭皆昂相傳舊有銅礦鑿久脊摧一名礦谷水經注倚亳川水出北山礦谷寨子山在垣曲縣北三十里相傳金時十八村人避兵於此又縣北三十里有佛山四十里有牛心山三錐山在垣曲縣北八十里三峯如錐方廣五十里多産藥舊嘗産銅濟源山在垣曲縣東北十餘里俗傳濟水發源於此諸馮山在垣曲縣東北五十里鼓鍾山在垣曲縣東北六十里山有金牛洞山海經鼓鍾之山帝臺之所以觴百神也水經注教水徑鼓鍾山峽縣志訛為瞽冢山以為瞽瞍葬此誤王屋山在垣曲縣東北一百里與澤州府陽城縣及河南懷慶府濟源縣接界山海經王屋之山是多石㶌水出焉注云今在河東垣縣北㶌沇聲相近一水且即濟也漢書地理志垣縣禹貢王屋山在東北沇水所出後漢書郡國志垣縣有王屋山注引博物記曰山在東狀如垣焦山在聞喜縣東接絳縣界中條支峯司馬相如上林賦凌三嵕之危郭璞三蒼注三嵕在聞喜按焦山與湯寨山為邑巨鎮三嵕或指此香山在聞喜縣東南三里高一百八十丈周八里平陽府志上有裴晉公祠三塔鼎峙景山在聞喜縣東南三十里即中條最高峯一名湯寨山又名湯王山上有湯廟下有葛寨村山海經景山南望鹽坂之澤北望少澤其隂多赭其陽多玉隋書地理志聞喜縣有景山元和志在縣東南十八里縣志舊産銅唐置冶於此橫嶺山在聞喜縣東南山脊橫亘故名跨絳及垣曲二縣界在聞喜縣者名小橫嶺在絳縣南四十里者名大橫嶺在垣曲縣西北八十里者名清廉山其入口處多風俗名風山水經注洮水源出清野山世以為清襄山又清水出清廉山之西嶺世亦謂清營山按清廉清營清野清襄雖四名其實皆橫嶺山也華池山在絳縣東十五里上有龍王祠又縣南十五里有湫池龍王廟太行山在絳縣東二十里縣人謂之南山其西南有白雲洞又在垣曲縣北八十里縣人名之曰鋸齒山北抵陽城延袤八十餘里太隂山在絳縣東南十五里寰宇記在絳縣東南十里崖壁峭絶陽景不到因名教山在絳縣東南一名厯山接垣曲縣界山海經教山教水出焉水經注教山高三十里上有泉不測其深山周圍五六里少草木寰宇記教山今名效山亦名罩山在縣東南八十五里垣曲縣志厯山在諸馮山後山頭平廣相傳舜耕處上有石碌碡數百下有舜井絳山在絳縣西北二十里與曲沃縣接界寰宇記在絳縣西十八里西入聞喜縣界東距白馬山備窮山在絳縣東北二十五里見元和志山出鐵礦穴五所稷山在稷山縣南五十里左傳宣公十五年晉侯治兵於稷杜預注河東聞喜縣西有稷山後漢書郡國志聞喜邑有稷山亭劉昭注在縣西五十里水經注稷山在汾水南四十里詩山東西二十里南北三十里高十二里上有稷祠下有穆亭元和志在稷山縣南五十五里縣以此名縣志一名稷神山后稷始教稼穡地也俗呼稷王山跨聞喜萬泉安邑夏縣界下有漉漉泉紫金山在稷山縣西北三十里上有仙掌峯聖王山在稷山縣北三十里危峯峭聳迥出羣山姑射山在河津縣東接本州界疏屬