front:
  text: 大清一統志絳州在山西省治西南七百十里東西距一百三十五里南北距一百里東至平陽府曲沃縣界十里西至陜西同州府韓城縣界一百二十五里南至解州夏縣界八十里北至平陽府太平縣界二十里東南至河南澠池縣界二百十五里西南至蒲州府榮河縣界一百四十里東北至太平縣界四十五里西北至平陽府鄉寧縣界五十里本州境東西距四十里南北距五十里東至曲沃縣界十里西至稷山縣界三十里南至聞喜縣界三十里北至太平縣界二十里東南至絳縣界十五里西南至稷山縣界四十里東北至太平縣界三十里西北至稷山縣界五十里自州治至京師一千八百里分野天文觜參分野實沈之次建置沿革禹貢冀州之域春秋屬晉戰國屬魏秦為
