亦不敢欺故老咸云數十年未有也張綰緬弟大同中為豫章內史在郡逑制旨禮記正言義四姓衣冠士子聽者常數百人安城人劉敬宫挾妖道聚黨攻郡有衆數萬進寇豫章新淦縣綰修城隍設戰備募召敢勇得萬餘人旬月間賊黨悉平蕭勵武帝從子遷豫章內史道不拾遺男女異路去郡之日吏人悲泣數百里中舟乘填塞各齎糧以送陳周羅㬋尋陽人宣帝時為豫章內史獄訟庭決不關吏手民懷其惠立碑頌德隋豆盧通昌黎陡河人開皇中遷洪州總管在職寬惠杜彥雲中人開皇中拜洪州總管甚有治名榮建緒無終人開皇中為洪州刺史有能名蘇孝慈扶風人仁壽初為洪州總管有惠政唐吳兢浚儀人遷洪州刺史表臧嘉猷劉眘虛之里以勵風俗韓朝宗長安人為洪州刺史在郡乞罷貢梅煎以乳柑代之天寶初召為京兆尹宋王明大名成安人開寶中金陵平詔明安撫諸郡因命知洪州袁逢吉鄢陵人開寶中為豐城令知州王明與轉運使張去華條上治狀李虛巳建安人太宗時通判洪州時父寅春秋高寅母尚無恙虛巳雙舉迎侍臨東湖築第宇以居後人知洪州欒崇吉封邱人真宗時知洪州有司歲斂民財造舟崇吉至奏罷之夏竦德安人仁宗初知洪州洪俗尚鬼多巫覡惑民竦索部中得千餘家敕還農業毁其淫祠以聞詔江浙以南悉禁絶之楊告綿竹人為豐城主簿邑有賊殺人投尸於江人知主名而畏不敢言告聞親往擒賊有言賊欲報怨者告不為動既而果乘夜欲刺告告又捕致於法境內肅然余靖曲江人仁宗時知新建縣趙概虞城人仁宗時知洪州城西南薄章江有泛溢之虞概作石隄二百丈高五丈以障其衝水不為患僚吏鄭陶饒奭挾持郡事為不法前守莫能制州之歸代卒皆故時羣盜奭造飛語曰卒得廪米陳惡有怨言不更給善米且生變概不答卒有自容州戌逃歸而犯夜者斬之以徇因收陶奭抵罪闔府股栗張瓌全椒人仁宗時知洪州營校督役苛急其徒三百人將以夜殺之求不獲持鍤譟其門請易校瓌召問諭遣明日推治黠者十人不為易校程師孟吳人知洪州積石為江隄濬章溝揭北閘以節水升降後無水患民為立生祠周敦頤道州營道人為分寧主簿有獄久不決敦頤至一訊立辨邑人驚曰老吏不如也知南昌南昌人皆曰是能辨分寧獄者富家大姓黠吏惡少惴惴焉不獨以得罪於令為憂而以汚穢善政為恥曽鞏南豐人神宗時知洪州歲大疫鞏命縣鎮亭傳悉儲藥待求軍民不能自養者資其飲食衣衾之具分醫視診書其全失多寡為殿最師征安南所過州為萬人備他吏暴誅亟飲民不堪命鞏先期區處師去市里不知孔宗翰孔子四十六代孫知洪州以治間胡世將晉陵人高宗時知洪州兼江西安撫制置使屬建昌兵變殺守倅嬰城以叛世將以便宜發兵討平之張浚綿竹人紹興二十五年以觀文殿大學士判洪州吳芾仙居人孝宗時知隆興府芾前後守六郡各因其俗為寬猛吏莫容姦民懷惠利楊萬里吉水人孝宗時知奉新縣戢追胥不入鄉逋賦者揭其名市中民歡趨之賦不擾而足縣以大治程回應天寧陵人孝宗時知進賢縣縣大水無稻麥郡蠲租稅至薄迥白於府悉蠲之境內有婦人傭身紡績以養姑其子為人牧牛亦乾飯以養祖母迥白郡給以錢粟韓邈嘉泰中知隆興府奏隆興惟分寧産茶他縣無茶而豪民武斷者乃請引窮索一鄉使認茶租非便於是禁非産茶縣不許民擅認茶租王居安黃巖人寧宗時知隆興府初盜起郴黑風洞羅世傳為之倡李元勵之徒並起江西列城皆震朝廷以居安為帥督戰於黃山勝之賊走韶州密為方略誅元勵斬世傳羣盜次第平居安在軍賞厚罰明將吏盡力用以賊擊賊之策故兵民無傷江西人祠而祝之刻石紀功趙崇憲餘干人寧宗時知南昌縣事奉行荒政所活甚衆真德秀浦城人嘉定中知隆興府承寬弛之後稍濟以嚴尤留意軍政欲分鄂州軍屯武昌及通廣鹽於贛與南安以弭汀贛鹽寇未及行值母喪歸明年蘄黃失守盜起南安討之數載始平人服其先見趙良淳餘干人度宗時知分寧縣分寧江西劇邑俗尚譁訐良淳不用刑戮不任吏胥取民之敦孝者身親尊禮之至甚桀驁者乃繩以法俗為少革元李廉廬陵人龍興路録事日治公事夜課諸生綽哈扎拉台氏靖安縣逹嚕噶齊至正十二年蘄黃賊數萬來寇綽哈率衆戰於象湖大破之乃起進士胡斗元等謀畫而以勇士黃雲為前鋒自二月至八月戰屢捷而賊黨益盛黃雲戰死綽哈𬒳圍尋為賊所執殺於富州子明安圖襲父職為逹嚕噶齊十三年率衆敗賊將復縣治十四年賊兵復至明安圖迎戰力竭賊執而咼之綽哈舊作潮海扎拉台舊作扎刺台逹嚕噶齊舊作逹嚕花赤明安圖舊作民安圖今俱改正黃紹臨川人至正中為靖安尹蘄黃賊起與達嚕噶齊綽哈同集義兵為禦賊計賊來寇紹赴行省求援道阻絶既至龍興亦被圍後圍解與明安圖招諭叛境遇賊於建昌之高坪與戰不勝正衣怒罵為賊所害明葉琛麗水人知洪都府降將祝宗康泰反琛𬒳執不屈大罵死之追封南陽郡侯祀功臣廟張沖龍巖人正統中知進賢縣多惠政有瑞蓮靈芝野蠶成繭之異秩滿奏留又九年卒於官百姓巷哭祀之吕聲桐廬人天順中知進賢縣敏捷有才幹凡所修舉功能立就邑嘗多疫聲剪瓜齋沐禱神七晝夜不少怠又建社學數十區以訓蒙人咸感之張翥長洲人成化中知南昌府性剛鯁達吏事剖決如流中官王慶索賂不與臨行挾翥上舟欲挫辱之民號擁登舟奪翥以歸祝瀚山隂人宏治中知南昌府亷明有威出餘金墾田二萬畝以贍諸生築墟五百餘處有靈鵲巢梁馴雁隨車之異李承勳嘉魚人由工部郎中遷南昌知府正德六年贛州賊犯新淦靖安賊據王嶺瑪瑙崖華林賊陷瑞州諸道兵不敢前承勳督民兵剿數有功華林賊殺副使周憲憲軍大潰承勳單騎入憲營衆復集都御史陳金即檄承勳討賊大破之賊遂平萬士賢南海人正德中任靖安知縣瑪瑙賊亂士賢練兵築城佐知府李承勳討平之宸濠反遣宋祥四等募瑪瑙餘黨士賢斬祥四等以定衆志宸濠擒後省刑節用撫恤瘡痍尤至劉源清東平人正德中授進賢知縣宸濠反源清誓衆以死守計積薪環室命家人曰事急火吾家一僕逸手刃以徇縣中諸惡少與賊通者悉杖殺之宸濠妃弟婁伯歸上饒募兵源清邀戮之賊檄至立斬其使會餘干知縣馬津龍津驛丞孫天祐亦起兵拒賊賊遂不敢東窺劉守緒興國州人正德中知奉新縣宸濠反守緒率兵出間道夜襲賊伏於新舊墳厰破之遂復南昌顧佖成都人正德中知豐城縣積粟數萬石水旱減價以糶宸濠反佖捕斬從逆者四十八人以徇極力備禦後從王守仁討賊有功遷大理丞商大節鍾祥人嘉靖中知豐城縣縣無城纍遭寇掠大節始城之捕境內巨寇幾盡本朝楊泰偏關人順治初知靖安縣金聲桓叛城陷泰自殺徐鳳鳴奉天人順治中知進賢縣土寇入侵鳳鳴率衆與戰矢集其面氣益奮手殺數十人賊懼引去黎士毅長汀人順治中知南昌縣邑舊稅溢額士毅力請上官奏除之山賊彭氏以偽劄聚衆攻剽四出督兵捕斬其魁林鍾南平人順治中由豐城丞知靖安縣邑多盜官兵進剿賊拒險不出鍾屏騎間入賊營諭以禍福衆感動悉出就撫賊既平議請蠲租減耗與之更始屠尚江南常州人順治中知靖安縣盧洪十倡亂華坊坪尚與參將張允重率兵協攻踰月平之會兩粵用兵奉檄造舟尚設法措置而民不知在官三載無封殖之私張慎行南宫人順治中知靖安縣時安義黠寇猝至慎行募集鄉勇出奇計追逐殲之魏雙鳳獲鹿人康熙中知新建縣大兵自楚入廣軍需旁午雙鳳理之𥙿如以暇創立縣治學宫修驛築塘課士西昌書院績最擢御史王斗樞諸城人康熙中知進賢縣繕城隍新學校墾荒田若干頃時閩亂土賊間起南康盜李標等溯湖上焚掠連晝夜斗樞奉檄進剿多斬獲董宏毅奉天正紅旗人康熙中知奉新縣時耿逆煽亂賊至逼城宏毅率官兵捍禦手斬為內應者發矢先斃偽左將軍生擒六人賊潰城賴以全明年賊萬餘踞城北獅山炮石雨下宏毅殲其前鋒又斬賊於邑之棉花地賊悉平邑遭亂後丁缺田荒為繪圖申請減賦之半在職四載勤勞奉公任暄猷汝寧人康熙中知寧州戍卒亂連山賊入攻把總周焜戰殁暄猷練鄉勇數千三戰皆破之楊周憲大興人知新建縣江西舊多火患教民疏列火巷遇災多免延燎遞卒役勞而食薄購田贍之修學建書院善政畢舉嘗葺邑志著羣書衍義前總纂官臣許應藻恭纂輯提調官臣張日章恭覆輯校對官臣李孚忠恭校校對官臣沈維鈺恭覆校大清一統志南昌府三人物漢李淑豫章人更始初為軍師將軍時所授官爵皆羣小賈豎淑上書諫更始怒繫淑詔獄何湯南昌人事桓榮為高弟以才名拜郎中守開陽門候上微行夜還湯閉門不納明旦賜食建武十六年夏旱公卿皆暴露請雨洛陽令著車蓋出門湯將衛士鉤令車收案詔免令官拜湯虎賁中郎將上嘗歎曰赳赳武夫公侯干城何湯之謂也後以明經授太子尚書推薦桓榮榮之顯由湯云程曽南昌人習嚴氏春秋講授數百人著書百餘篇皆五經通難又作孟子章句建初三年舉孝廉除海西令唐檀南昌人習京氏易韓詩顔氏春秋元初七年郡界有芝草生太守劉祗欲上言檀曰方今外戚豪盛陽道微弱斯豈嘉瑞乎乃止永建中舉孝廉除郎中是時白虹貫日檀因上便宜三事陳其咎徵棄官去著書二十八篇名唐子徐稚南昌人家貧常自耕稼非其力不食恭儉義讓所居服其德屢辟公府不起太守陳蕃在郡不接賓客惟稚來特設一榻去則懸之後舉有道家拜太原太守皆不就延熹二年陳蕃胡廣等上疏薦稚宜登三事桓帝以安車元纁修禮徵之不至時稱南州高士徐允樨子篤行孝弟亦隱居不仕太守華歆禮請相見不詣漢末寇賊縱橫皆轉相約敕不犯其閭三國吳聶友豫章人少為縣吏虞翻徙交州縣令使友送之翻與語竒焉為書與豫章太守謝斐以為功曹使至都諸葛恪友之時論謂顧子默子直其間無所復容恪欲以友居其間由是知名楊迪豫章人黃龍時為宣詔郎時廷尉監隱蕃交結豪傑自衛將軍全琮等皆傾心敬待惟迪及南陽羊衜拒不與通蕃後叛衆乃服之晉熊遠南昌人元帝初纍遷尚書左丞散騎常侍帝每歎其公忠轉御史中丞時尚書刁協用事遠奏免協官冬雷電遠上疏陳三失補會稽內史王敦作逆加遠將軍拒不受還拜太常卿敦深憚之幸靈建昌人少號為癡後為人療疾去妖怪輒有驗性至恭見人即先拜言必自名周旋江州間十餘年賴其術以濟者極多羅企生豫章人為殷仲堪咨議參軍仲堪敗文武無送者惟企生從焉桓元至荆州或勸其詣元企生曰殷侯遇我以國士不能共殄醜逆亦何面目復求生乎元聞之大怒即收企生問所欲言惟乞一弟以養母遂遇害南北朝宋胡藩南昌人少孤居喪以孝聞過江陵知殷仲堪必敗武帝召參軍事從征伐屢立竒功封山陽縣男纍遷太子左衛率卒諡壯侯雷次宗南昌人少入廬山篤志好學尤明三禮毛詩不受徵辟元嘉十五年徵至都開館難籠山聚徒教授久之還廬山後又徵詣都築室鐘山謂之招隱館使為太子諸王講經卒於鐘山子肅之頗傳其業梁滕曇恭南昌人五嵗母楊氏患熱思食寒瓜土俗不産曇恭厯訪不能得銜悲哀切俄遇一桑門曰我有兩瓜分一相遺還以與母舉室驚異尋訪桑門莫知所在及父母卒哀慟幾絶蔬食終身豫章內史王僧虔引為功曹不就王儉號為滕曾子唐沈季詮洪州豫章人事母孝未嘗與人爭皆以為怯季詮曰吾怯乎為人子者可遺憂於親乎貞觀中侍母渡江暴風母溺死季詮號哭投江中少頃持母臂浮出水上都督謝叔方具禮祭而葬之劉眘虛新吳人開元中為崇文館校書郎與孟浩然王昌齡友善評者目其詩情幽興遠思苦語竒可以傑立江表臧嘉猷南昌人開元中刺史吳兢召之不赴著無求論以見志天寶間詔至都堂論政左相李適之稱其學究天人宜加拔擢嘉猷以親老不仕賜束帛歸命以所居里為旌賢坊王季友豐城人家貧賣屨博極羣書善為詩李勉觀察江西引為賓客甚敬之宋胡仲堯奉新人纍世聚居至數百口雍熙初詔旌其門淳化中州境旱仲堯發廪減市直以賑飢太宗嘉之除本州助教纍遷國子主簿致仕弟仲容淳化五年賀壽寧節授試校書郎又以御書賜之公卿多賦詩稱美纍遷光祿丞致仕陳恕南昌人太平興國進士通判灃州厯知大名府皆以吏幹聞拜鹽鐵使釐去宿弊太宗深器之題殿柱曰真鹽鐵陳恕真宗時拜吏部侍郎知貢舉取王曾為首歎曰名世才也母亡哀慕過甚遂至羸瘠遷尚書左丞病劇薦寇準自代恕多識典故精於吏理前後掌利柄十餘年強力幹事胥吏畏服有稱職之譽袁抗南昌人舉進士纍遷益州路轉運使三司歲市綾錦鹿胎萬二千匹抗奏蠲其半黎州歲售蠻馬詔擇不任戰者却之抗以諸部仰此衣食請如舊制召為三司鹽鐵副使改少府監卒抗喜藏書至萬卷江西士大夫家鮮及也子陟刻厲好學善為詩終殿中丞陳執中恕之子以父任為祕書正字真宗時大臣無敢言建儲者執中進演要三篇以早定天下根本為説帝袖其疏示輔臣遂立皇太子慶厯中同中書門下平章事封岐國公在中書八年不敢干以私四方問遺不及門卒贈太師諡曰恭余良肱分寧人第進士調荆南司理參軍通判杭州知虔州皆有善政除三司判官關陜用兵朝議貸都下民錢良肱爭之議遂格提舉汴河司時議伐汴隄木以資狹河良肱屢爭不能得請不與其事遷光祿卿知宣州治為江東最子卞博學多大略知沅州討平五溪叛蠻卞弟爽尚氣自信應元豐詔上便宜十五事言過剴切元祐末復請太皇太后還政章惇恨爽不附已除名竄封州崇寧中與卞俱入黨藉黃庠分寧人博學強記超敏過人初至京師就舉國子監開封府禮部皆第一比引試崇政殿以疾不時入天子遣內侍即邸舍撫問賜藥劑時庠名動京師所作程文傳誦天下近世布衣罕比黃廉分寧人第進士厯州縣神宗詔訪時務對甚悉擢監察御史裏行河決曹村壞民田廬受詔安撫所活二十五萬元祐初為戶部郎中陸師閔茶法為川陜害遣廉按察奏罷其太甚者纍拜給事中黃庭堅分寧人幼警悟讀書數過輒成誦舉進士調葉縣尉知太和縣以平易治哲宗立召為校書郎神宗實録成擢起居舍人性篤孝母病彌年衣不解帶及亡廬墓下哀毁幾殆紹聖初出知鄂州章惇蔡卞惡之貶涪州别駕黔州安置徙戎州徽宗初起知太平州復謫宜州卒庭堅學問文章天成性得與張耒朝補之秦觀俱遊蘇軾門天下稱為四學士而庭堅尤長於詩世以之配軾稱蘇黃自號山谷道人范璿豐城人政和進士知甌寧縣柣滿人爭留之列治狀十事於郡守以聞遷兵部員外郎上言帝王弔伐事語剴切時秦檜主和議璿力爭曰宰相須開懷聽天下人言安可以私意害公議耶出知南劍州著有松溪集徐俯分寧人父禧以獻策纍官給事中元豐中城永樂詔禧往相其事夏人趨新城禧亟赴拒戰城陷死之贈吏部尚書諡忠愍俯以父蔭授通直郎纍至司門郎張邦昌僭位遂致仕建炎初用薦為右諫議大夫纍擢權參知政事俯有俊才與曾幾吕本中遊有詩集六卷李大性本端州人其先積中入元祐黨籍始家豫章大性少力學習本朝典故以父任入官纍遷工部郎陳傅良彭龜年等以言事相繼去大性抗疏力諫孝宗崩光宗疾未能執喪大性疏言若待金使祭奠然後執喪則貽譏中外厯戶部尚書開禧將用兵大性條陳利害忤韓托胄出知江陵府除刑兵二部尚書再知平江府卒諡文惠與弟大異大東並為名臣黃疇若豐城人淳熙進士知廬陵縣治為諸邑最開禧初應詔言急務拜監察御史多所陳奏吳􅬞叛後朝廷擇人命疇若知成都府蠲積欠罷冗員平諸蠻留蜀四年弊根蠹穴苗耨髮擳召權兵部尚書以煥章閣學士致仕所著有竹坡集范應鈴豐城人開禧進士調永新尉纍知崇仁縣吉州皆有政績召為金部郎官遷尚左郎官所言皆讜直厯大理少卿卒應鈴開明磊落守正不阿别白是非見義必為不以得失利害動心徐鹿卿稱其經術似兒寬決獄似雋不疑治民似龔遂風米似范滂理財似劉晏而正大過之人以為名言所著西堂雜著十卷對越集四十九卷羅必元進賢人嘉定進士調撫州司法參軍知餘干縣皆有風力淳祐中通判贛州賈似道總領荆湖尅剝日甚必元上疏以為蠧國脈傷民命似道銜之改知汀州為丁大全按去度宗朝直寶章閣致仕必元嘗從危禎包遜學見理甚明風節甚高鄉人皆尊慕之徐鹿卿豐城人博通經史以文學名於鄉嘉定中第進士都城火應詔上封事真德秀稱其氣平論正有憂愛之誠心厯知安南縣建昌軍治行大孚擢度支郎官入對極陳時弊為江東轉運判官兼領太平移浙東提點刑獄皆有政績擢太府少卿請定國本正紀綱立規模上嘉納之纍官禮部侍郎卒諡清正鹿卿居家孝友喜怒不形居官廉約毫髮不妄取所著有泉谷文集奏議講義及手編唐宋文類文苑菁華黃畇分寧人嘗從朱熹學熹深期之而畇亦以道自任反覆辨論必無所疑然後上舉進士知盧陽縣獠人感悅遷知台州葉適謂畇條目建置憂民如家著有復齋集徐經孫初名子柔豐城人寶慶進士纍官太子詹事輔導東宫敷陳經義隨事啓迪景定三年春雷詔求直言經孫所對切中時病公田法行經孫條其利害忤賈似道免歸冷應徵分寧人寶慶進士調廬陵主簿即以廉能著知萬載縣葉夢得列其行事風厲餘邑景定初知德慶府擒伏洞獠經略雷宜中薦應徵可大用纍遷直寶章閣廣南東路經略安撫使屢平大寇未嘗輕殺笞杖以降亦加審慎至其臨事輒斷雖勢要不為撓奪黃介分寧人制置使朱祀孫帥蜀介上攻守策祀孫愛之以自隨後家居率鄉民為保聚計元兵至介堅守且射且詬面中六矢不為動再戰身𬒳鏇如蝟面頸復中十三矢倚柵而死家童陳力亦戰死子用中以母劉氏被掠及壯求母四方逾十年得於京師以歸州里稱黃孝子云元熊朋來豫章人教授生徒儒者倚以為重朝廷以東南儒學之士惟福建廬陵最盛特起為兩郡教授所至考古篆籀文字調律吕協歌詩以興雅樂既滿考家居門人歸之者日盛旁近舍皆滿至不能容朋來為説經義老益不倦其學尤深三禮有集三十卷學者稱天慵先生雷光霆寧州人家居教授程巨夫詹天遊皆其徒也嘗著九經輯義史子辨詩義指南若干卷至元中遣使徵之未至卒學者稱龍光先生陰幼遇奉新人家數百口五世同居著有韻府羣玉兄幼達字中夫為注釋趙一德新建人至元中𬒳俘至燕為鄭留守家奴厯事三世一日拜請於其主鄭阿爾薩蘭欲歸視父母伏地涕泣阿爾薩蘭母子感動許之期一歲而返一德至家父兄已殁惟母在年八十餘一德葬父兄畢如期而返阿爾薩蘭母子歎其孝縱為良將辭歸會阿爾薩蘭以冤𬒳誅詔簿録其家羣奴各亡去一德獨留詣中書訴枉得雪還其籍阿爾薩蘭之母嘆曰疾風徑草於汝見之遺以田廬不受而去皇慶元年旌其門阿爾薩蘭舊作阿思蘭今改正揭徯斯富州人父來成宋鄉進士徯斯讀書刻苦父子自為師友大德間程巨夫盧摯薦於朝三入翰林天厯初開奎章閣首擢授經郎教勳戚大臣子孫文宗時有咨訪恆以字呼之而不名甚見親重元統初纍升侍講學士知經筵修遼金宋三史卒追封豫章郡公諡文安徯斯少窮約暨有祿入輒愀然曰吾親未嘗享是為文嚴整簡當詩尤清婉麗密朝廷大典册及元勳茂德銘辭必以命焉熊凱南昌人精理學以明經開孰四十餘年時稱遙溪先生子東造詣高遠從遊益衆凱門人熊良輔最知名有易傳集疏風雅遺音小學入門等書熊復新建人以五經教授鄉里四方來學者常數百人著春秋成紀湯霖新建人少喪父事母至孝母嘗病熱曰惟得冰我病可愈時天氣甚燠霖求冰不得纍日號哭池上忽聞池中戞戞有聲乃冰澌也取以奉母病果愈焉齊哩克扣本輝和爾人父文質官於江西因家龍興兄弟五人俱登第克扣由翰林出監潮州罷歸至正間紅巾賊起檄守北門城陷投井死妻妾子女死者十一人齊哩克扣舊作偰列篪輝和爾舊作畏兀今俱改正胡斗元靖安人至正十年領鄉薦第一署鰲溪書院山長賊至靖安斗元以鄉兵擊敗之入縣治與達嚕噶齊綽哈共圖戰守及綽哈被執賊脅之使降罵不屈以土埋其腰不死又縛至暗室斗元仆牆以出逃入深山而死巴延子中其先西域人祖父仕江西因家焉由東湖書院山長辟為分省都事使守贛州陳友諒破贛子中間道走閩出竒計復建昌浮海如元都獻捷纍遷吏部侍郎持節發廣東何真兵救閩至則廖永忠已降何真子中墮馬折足致軍前脅降之不屈義釋之乃潛隱進賢之北山明洪武十二年詔以幣聘使者至子中曰事晚矣為歌七章飲鴆而死巴延舊作伯顏今改正明李叔正靖安人年十二能詩為江西十才子之一洪武初以薦徴為國子學正改渭南丞復召為助教時帝方加意國學而諸生多貴胄不率教叔正嚴立規條旦夕端坐督課無倦色擢監察御史纍遷禮部尚書卒於官妻夏氏當陳友諒陷南昌時投井死叔正遂終身不再娶朱善豐城人九嵗通經史能屬文隱山中著詩經解頤史輯洪武八年廷試第一授修撰擢文淵閣大學士論説多稱旨嘗講家人卦心針帝大悅告歸卒正德中諡文恪朱夢炎進賢人以博洽聞洪武初召居賓館命集古事為質直語以教公卿子弟除國子博士纍拜禮部尚書帝方稽古右文夢炎援古證今剖析源流如指諸掌朝論甚服曾秉正南昌人洪武初為海州學正以天變詔羣臣言事秉正上疏數千言帝嘉之召為思文監丞厯通政使數言事忤旨罷免貧不能歸鬻其四歲女帝聞大怒置腐刑死包實夫進賢人父希魯嘗受尚書於吳澄動履端嚴為後進楷法實夫明經篤學事親至孝洪武中嘗暮歸遇虎曳入林中實夫拜且告曰爾食我何恨如父母衰老缺義何虎復曳至故處而去人因名其地為拜虎岡胡儼南昌人洪武中舉鄉試厯三縣教諭建文初授桐城知縣多善政桐人祀之朱邑祠成祖即位以解縉薦授檢討直文淵閣拜國子監祭酒朝廷大著作多命儼居國學二十年教範嚴肅進太子賓客致仕宣德初以禮部侍郎召辭歸黃宗載豐城人永樂初為湖廣僉事姦猾莫敢犯坐事謫橫青驛驛夫起為御史彈劾不少避巡按交址及歸無私槖纍遷南京吏部尚書乞休歸宗載持廉守正學問文章皆負時望向寶進賢人授兵部員外擢應天府尹永樂時纍遭譴謫宣宗即位召為右都御史兼詹事尋掌南京都察院致仕寶有文學居官廉介士論重之龔鐩南昌人永樂中厯雲南僉事秩滿還朝言時政闕失忤旨下獄用薦起原官宣德末再用薦擢四川按察使決淹獄杜牽連居官四十餘年家無儲蓄劉端南昌人官大理丞成祖即位遣端還職命治方孝儒獄時方暑月坐縱孝孺息樹陰劓鼻死同邑王高與端同年進士又同為大理丞亦坐縱孝孺劓死隆慶初俱敕祀南昌大節祠王讓南昌人由舉人為國子學録成祖知其孝行命入侍皇太孫説書太孫升儲由助教擢贊善既即位超拜吏部右侍郎讓言誠行篤有儒者矩度居官亦善自守史安豐城人永樂進士授禮部郎中宣德二年交址復叛安從兵部尚書李慶及安遠侯柳升討之升連破賊柵有矜色安曰驕者兵家所忌賊示弱以誘我未可知宜設備升不聽果中伏敗沒安死之熊概豐城人永樂進士授御史擢廣西按察使調廣東宣德初擢大理卿巡視江南浙西八郡捕治豪惡不少貸於是姦宄帖息閭閻清靜賜璽書獎勵遷右都御史兼署刑部尋感風眩卒萬觀南昌人永樂進士授御史出知嚴州府居九年考績為天下第一改陽平府治聲益著擢山東布政使范衷豐城人永樂進士厯壽昌知縣汝州知州一以清節自持妻子告乏亦不顧吏部尚書王直舉天下廉吏數人衷為第一性至孝廬父墓瓜生連枝有白兔三常馴擾墓側鄉人莫不高其行况鍾靖安人永樂中由吏員授禮部主事遷郎中宣德中擢知蘇州府賜敕以遣之至則鋤強植弱興利除害不遺餘力秩滿當遷郡人乞留詔進二秩再任卒於官吏民聚哭立祠祀之熊尚初南昌人始為吏以才擢都察院經厯正統中用薦遷泉州知府盜起上官檄之監軍不旬日降賊數百已而賊逼城下守將不敢禦尚初提民兵數百拒於古陵坡力戰而死郡人哀之為配享忠臣廟丁鉉豐城人以進士厯刑部郎中正統三年超拜右侍郎嘗理茶四川賑飢山東河南皆著惠愛十四年扈駕北征死於土木之難景泰初贈尚書後諡襄愍王得仁新建人本姓謝五歲喪母哀號如成人初為衛吏以才薦授汀州府經厯秩滿當遷軍民數千乞留詔贈秩再任推官缺英宗從軍民請就令遷擢政績益著率兵討賊遘疾卒喪還哭奠者屬路天順末詔立祠祀之子一夔天順四年進士第一授修撰進諭德成化七年彗星見應詔陳五事語極剴摯被旨切責纍遷工部尚書卒贈太子少保諡文莊李裕豐城人景泰進士授御史巡按陜西有強直聲擢山東按察使平大峴山賊寨七十餘纍遷右副都御史總督漕運兼巡撫江北諸府皆有治績後以吏部尚書致仕楊瑄豐城人景泰進士授御史剛直尚氣節天順中印馬畿內至河間民遮訴曹吉祥石亨奪其田瑄以聞並列二人怙寵專權狀帝語閣臣曰真御史也後為亨等所陷下獄論死會大風雨雹得從末減改戍半道赦還或謂當詣亨吉祥謝卒不往復戍南丹憲宗即位還故官遷浙江副使厯十餘年政績卓然進按察使卒於官熊懷豐城人天順進士由刑部主事知廣平府厯廣東左布政使皆有治行性嚴重寡言笑薄嗜欲議論侃侃居官嚴於自守未嘗通問政府終南京刑部侍郎張元禎南昌人五歲能詩登天順進士選庶吉士授編修憲宗立疏請行三年喪預修英宗實録與執政議不合引疾歸居家講求性命之學閲二十年宏治初詔修憲宗實録疏勸帝行王道反覆萬言纍進學士充經筵日講官掌詹事府帝晚年德益進元禎因請讀太極圖説通書西銘諸書帝亟取觀之喜曰天生斯人以開朕也武宗立進吏部左侍郎尋卒天啓初追諡文恪劉志清豐城人六世同居成化中旌表楊峻進賢人成化進士知丹徒縣有治聲擢御史清軍湖廣除衛所勾戶補軍之害摘姦發弊吏莫能欺厯浙江布政使鎮守太監橫取於民峻面數其罪勢稍戢遷南京光祿卿諸上供常制外悉從減省致仕歸所居與縣鄰十年未嘗入其庭親喪廬墓至老不宴飲艾璞南昌人成化進士纍官都御史巡撫蘇松諸郡平崇明巨寇施鈕魏國公徐俌爭民田璞勘實歸之民俌賄劉瑾搆璞逮獄編管海南為民瑾誅復官致仕璞嘗奉詔求言陳修德六事聖政七事為光祿請減齋醮供事冗費侃侃有直臣風楊廉豐城人父崇受業吳與弼門人胡九韶得其端緒官至永州知府廉承家學早以文行稱成化末舉進士選庶吉士授南京戶科給事中數言時政厯順天府尹擢南京禮部右侍郎武宗將南巡疏諫不報及至南京命百官戎服朝見廉乞用常儀更請謁見太廟報許世宗嗣位就遷尚書疏爭大禮不納遂乞歸廉與羅欽順友善為居敬窮理之學自禮樂錢穀至星厯算數具識本末著書二十餘種學者稱月湖先生卒贈太子太保諡文恪陳伯宣靖安人為諸生親喪廬墓子恩復刺血和藥愈母疾宏治中父子並旌楊源瑄子以通曉天文授五官監候正德初劉瑾亂政源以星象搖動霾霧時作奏言小人擅權下將叛上瑾怒矯旨杖三十尋又奏火星入太微垣帝座前乞收攬政柄思患預防瑾復矯旨杖六十謫戍肅州以創卒於河陽驛其妻斬蘆荻葬之熹宗時賜諡忠懷葉釗豐城人宏治進士厯南京刑部員外郎武宗立應詔陳八事中言中官典兵之禍且國初宦官悉隸禮部請復舊制易置司禮罷革東厰使不得擅權亂政劉瑾見疏憤甚又乞詔還劉大夏宥諫官戴銑等瑾益怒逮下詔獄削籍歸講學嶽麓石鼓書院瑾誅起禮部員外郎已先卒學者祀之石鼓書院朱廷聲進賢人宏治進士授御史正德初尚膳太監劉杲以病乞改督京倉廷聲言方議改革不當復增以失信天下尋與御史趙佑徐鈺等交章極論中官之罪劉瑾指為姦黨勒罷之瑾誅起浙江僉事嘉靖中厯右副都御史巡撫湖廣終刑部右侍郎宋景奉新人宏治進士知睢州以廉辦稱嘉靖中厯山西副使布政使皆有政績纍遷南京兵部尚書參贊機務奏裁守備參隨私人汰革冗費省公私錢六十餘萬入為左都御史景練達國體志行剛方不通私情卒贈太子少保諡莊靖熊浹南昌人正德進士授禮科給事中宸濠將變浹與同邑御史熊蘭草奏授御史蕭淮上之出核松潘邊餉劾副總兵張傑貪虐狀奪其職世宗踐阼疏言宜推崇本生纍遷右都御史掌院事會刑部郎中魏應召按張福獄浹是應召議帝怒禠職久之起為南京禮部尚書尋召入為兵部尚書改吏部以疏論乩仙之妄忤旨斥為民浹雖由議禮顯然不甚黨比尤愛護人才其去吏部也善類多思之隆慶初復官卒諡恭肅熊蘭南昌人正德進士授御史宸濠蓄異志蘭發其謀巡按廣東所至旌廉黜貪人莫敢犯弟葛以學行聞宸濠招之不可羈禁歲餘終不附辜增南昌人宸濠反見迫抗節不屈一家百口皆死葉景恩新建人居吳城宸濠捕景恩脅降之不屈死濠兵過吳城弟景充以二百人邀擊不勝族衆四十九人皆死之萬木新建人宸濠反與同邑鄭山集鄉人結寨自固賊黨謝重一馳馬入村執縛睢陽廟前并馬生焚之後與山飲江上為賊所傷趨見宸濠烙而椎之皆罵賊死趙楠南昌人為諸生兄模嘗捐粟佐賑宸濠夜捕模索金楠代兄往脅以威不屈被掠而死舒芬進賢人正德十二年進士第一授修撰時武宗數微行芬疏諫不報及議南巡復偕編修崔桐等上疏極諫帝怒命跪闕下五日杖三十謫福建市舶副提舉世宗即位召復故官帝欲尊崇本生芬偕其僚連章極諫尋與同官楊慎等伏左順門哭爭帝怒下廷杖旋遭母喪歸卒芬負氣峻厲以倡明絶學為已任貫串諸經尤精於周禮學者稱梓溪先生萬厯中追諡文節萬潮進賢人正德進士官禮部主事以諫南巡下獄廷杖與舒芬夏良勝陳九川稱江西四諫世宗立起故官厯浙江參政忤權貴調廣西纍遷右都御史巡撫延綏所至著政績余禎奉新人正德進士嘉靖初為兵部主事以伏闕爭大禮廷杖死穆宗立贈光祿少卿周期雍寧州人正德進士授南京御史劉瑾既誅為瑾斥者悉起兼劾羣閹者未得録期雍偕同官王佩力請遂皆召用焦芳劉宇猶在列劉大夏韓文楊守隨林瀚張敷華未雪期雍皆極論之嘉靖初授浙江參議討平溫處礦盜纍遷右僉都御史巡撫順天終刑部尚書魏良弼新建人嘉靖進士厯刑科給事中巡視京營劾罷保定侯梁永福太僕卿曽直等直聲大著南京御史馬敡等以劾吏部尚書王瓊𬒳逮良弼請釋之帝怒下詔獄贖職遷禮科都給事彗星見劾罷大學士張孚敬踰月復劾吏部尚書汪鋐忤旨奪俸及孚敬再起柄政與鋐修前隙遂以考察削職隆慶𥘉即家拜太常卿卒天啓初追諡忠簡魏良政良弼弟王守仁撫江西與良弼弟良器良貴咸學焉良政功尤專孝友淳朴燕居無惰容嘗曰不尤人何人不可處不纍事何事不可為舉鄉試第一而卒良弼嘗言吾夢中見師伊輒汗流浹背其為兄敬憚如此魏良器性超穎絶人王守仁亟稱之主白鹿書院生徒至數百人其學雖宗良知而踐履平實學者稱藥湖先生弟良貴亦以學行重官右副都御史李遂豐城人少從歐陽德學登嘉靖進士厯禮部郎中忤尚書夏言下獄謪湖州同知纍遷右僉都御史提督操江軍政忤旨罷歸會倭擾江北以故官撫鄖陽四府前後二十餘戰賊盡殄遷南京兵部侍郎振武營軍變遂撫安之密捕首惡治罪以功擢南京參贊尚書捕斬妖僧申嚴什伍留都自是無患以老致仕卒贈太子太保諡襄敏弟逢由進士為吏枓給事中侍郎劉源清下吏逢救之坐並繫得釋改戶科世宗幸承天偕同官諫下獄謫永福典史終德安知府曽鈞進賢人嘉靖進士擢禮科給事中奏罷四方銀埸劾罷參贊尚書劉龍又劾翊國公郭勛禮部尚書嚴嵩等直聲震一時出為雲南副使四川參政皆有聲纍遷右副都御史總理河道四年功績甚著入為刑部右侍郎乞歸卒贈尚書諡恭肅萬虞愷南昌人嘉靖進士擢南京兵科給事中核武職冗員黜戚畹冒襲及他越資遷授者百二十人尋劾罷南京戶部尚書閔楷督儲都御史劉渠出為山東參議厯右副都御史總督漕儲所至著政績終刑部右侍郎虞愷敦朴有行義不務為名高一時推為長者萬思謙南昌人學宗王守仁嘉靖進士知嘉定縣築城備倭厯官南京太常卿會張居正奪情視事移書責之坐罷萬恭南昌人嘉靖進士厯大理卿寇逼通州帝方急兵事遂擢兵部右侍郎恭列上選兵議將練兵車火器諸事皆報可後巡撫山西總理河道皆有功績恭強毅敏達諳國家大計一時稱才臣吳桂芳新建人嘉靖進士厯禮部主事揚州知府禦倭有功纍遷兵部右侍郎提督兩廣軍務羣盜李亞元葉丹樓連歲為患新舊倭繼至桂芳次第討平之萬厯初總督漕運兼撫鳳陽開草灣及老黃河故道修築高郵東西二堤尋命兼理河漕進工部尚書卒贈太子少保江治進賢人幼有孝行受知於孫燧王守仁嘉靖中舉進士厯廣東僉事公廉有聲掌鹽政吏以羡金進叱却之隆慶初纍遷南京工部右侍郎力裁織造浮費湖口舊設關榷稅治言於戶部尚書馬森罷之致仕歸杜門謝客惟與窮交子弟講勵德行年九十餘卒天啓初諡恭恪李遷新建人嘉靖進士隆慶中纍擢兵部右侍郎總督兩廣與巡撫殷正茂等討平古田擒巨寇韋銀豹黃朝猛等又擊破惠潮山寇召為南京刑部尚書引􅔂歸遷出入中外三十年不妄取一錢歸時年七十母喪廬墓不怠卒諡恭介劉顯南昌人膂力絶人家貧入蜀為武生嘉靖中宜賓苗亂顯從官軍陷陳格殺五十餘人擒首惡三人諸軍繼進賊盡平由是知名厯蘇松參將大破倭於安東遷副總兵倭劫江北又盡殄之擢署都督僉事節制振武營軍尋以總兵官鎮廣東與參將戚繼光等共破福建倭又以江北倭未平移鎮狼山隆慶初改鎮貴州剿平㺜賊會四川都蠻反命顯往鎮屬以軍事不期月羣蠻蕩平復擊四川番沒舌丟骨人荒諸寨斬其首惡撫餘衆諸番畏威咸獻首惡西陲以安蔡國珍奉新人嘉靖進士嚴嵩當國欲羅致門下不應出為福建提學副使以侍養歸家居垂二十年起廢籍厯吏部侍郎進尚書三殿災率諸臣請修省又倡廷臣詣文華門請舉皇長子册立冠婚言必得請方退不許尋稱疾乞休國珍素有學行為時望所屬卒贈太子太保諡恭靖魏時亮南昌人嘉靖進士官兵科給事疏言四方多盜皆由民貧而吏不恤請安輯災民蠲除逋課酌常平義倉以贖鍰備糴詔允行隆慶初上疏諫不視朝劾中官王本無人臣禮尋又極言宗祿不給邊餉不支公私交困請立宗學給宗田又興屯鹽諸政語皆切實其他陳奏甚多萬厯中纍遷右副都御史攝京營戎政終南京刑部尚書卒諡莊靖衷貞吉南昌人嘉靖進士知松江府以廉直聞纍遷河南巡撫歲荐飢表請發栗分部周賑全活數十萬衆召為左都御史卒贈太子太保諡簡肅李材遂子少受學於鄒守益得王守仁之傳嘉靖末舉進士纍遷廣東僉事討平羅旁賊又殲倭於海口進副使萬厯𥘉張居正柄國引疾去起厯雲南洱海參政備兵金騰大破𬗟甸擢鄖陽巡撫巡按劾材在雲南冒軍功逮下詔獄論死幽繫五年乃戍鎮海衛所至輒講學至戍所學徒益衆久之赦還卒學者稱見羅先生子熲父逮獄時始婚於家聞變挾一蒼頭囚服詣獄侍奉六載父出戍又隨侍十三年天啓改元伏闕訴父冤得雪內外薦辟不就鄧子龍豐城人驍勇絶倫嘉靖中應辟平江西賊纍功為廣東把總萬厯初從張元勳平巨盜賴元爵陳金鶯羅紹清等纍遷湖廣參將討平麻陽靖州諸苗緬甸犯雲南詔移永昌屢破賊衆進副總兵丁改十寨賊作亂奮擊大破之倭陷朝鮮子龍提水軍為前鋒時年踰七十意氣彌厲攜壯士二百直前奮擊忽他舟誤擲火器入子龍舟中舟焚乘勢來攻力戰死贈都督僉事廟祀朝鮮鄧以讚新建人隆慶五年會試第一廷試第三授編修萬厯初座主張居正柄政移疾歸後厯南京祭酒就擢禮部侍郎轉吏部再疏請建儲且力斥三王並封之非事竟寢召為吏部右侍郎力辭不拜以讚生有異質好讀書講學而篤於孝行立志端潔登第二十餘年在官僅一考居母憂不勝喪而卒贈禮部尚書諡文潔塗杰新建人隆慶進士由龍遊知縣入為御史擢光祿少卿三王並封詔下杰與本寺丞王學曾合疏力爭忤旨削籍熹宗時贈太常少卿萬國欽新建人萬厯進士為御史時不避權貴和爾齊諸部犯臨洮鞏昌帝召閣臣咨方略申時行以欵貢足恃為言國欽抗疏極言時行等朋姦誤國且列其納賄數事謫劍州判官後終南京刑部郎中和爾齊舊作火落赤今改正劉幼安南昌人萬厯進士授編修厯左中允直皇子講幄時册立未舉外議紛紜幼安旁慰曲喻依於仁孝光宗心識之礦使四出幼安發憤上疏極言稅監李道王朝諸不法狀不報以母病歸起南京祭酒三載復奉母歸後召為禮部侍郎未至卒贈尚書諡文簡陳道亨新建人萬厯進士厯南京吏部郎中同里鄧以讚衷貞吉亦官南都人號江右三清由湖廣參政遷山東按察使右布政使轉福建所至不私一錢以右副都提督操江光宗立總理河道妖賊徐鴻儒作亂道亨守濟寧扼諸要害運道獲通拜南京兵部尚書楊璉劾魏忠賢被譙責道亨偕九卿力爭不納遂乞歸崇禎初贈太子少保諡清襄子宏緒好學能文為晉州知州坐事謫湖州經厯罷歸纍薦不起饒伸進賢人萬厯進士授工部主事時黃洪憲典順天鄉試首録閣臣王錫爵子衡申時行壻李鴻亦預焉禮部郎中高桂發其事反奪俸伸抗疏爭之下詔獄削籍起南京工部主事纍遷刑部侍郎熹宗時魏忠賢亂政告歸所輯學海六百餘卷時稱其浩博兄位亦進士纍官工部侍郎母劉氏年百歲兄弟同歸侍養稱盛事劉一燝南昌人萬厯進士選庶吉士纍官禮部侍郎光宗立晉尚書兼東閣大學士帝崩李選侍匿皇長子不出一燝入臨畢大言誰敢匿新天子者乃出之一燝急趨前呼萬歲掖升輦至文華殿即東宮位明日羣臣疏請移宫一燝偕同官請即日降旨佇立宫門以俟選侍不得已移他宫事始大定熹宗踐祚與韓爌同心輔政發內帑抑近幸登俊良搜遺逸中外欣欣望治已而魏忠賢客氏漸用事羣小附和力攻一燝遂致仕歸忠賢矯旨削奪崇禎初復官卒贈少師後追諡文端兄一焜萬厯進士厯考功郎中掌京察盡斥執政私人纍官右僉都御史巡撫浙江政績甚著朱謀㙔獻王權七世孫封鎮國中尉曾祖宸浫石城鎮國將軍却宸濠餽遺以方正著父多奉國將軍端謹好經術親課謀㙔經史謀㙔束修自好貫串羣籍通曉朝家典故萬厯中以中尉理石城王府事典藩政三十年宗人咸就約束所著書百二十種皆手自繕寫及卒南州人士私諡為貞靜先生又朱多􅖷瑞昌王府鎮國中尉博學工詞賦草書得晉人遺法多煃字用晦封奉國將軍專意著述王世貞定為續五子之一多炡亦奉國將軍敏穎絶人善詩歌兼工繪事皆謀㙔諸父行也多炡子謀堚亦能詩湯顯祖嘗序其集章潢南昌人年十六即有志聖賢之學以通天地人曰儒自命輯自古河圖太極諸圖及天道地道人道悉以類編次凡百二十七卷曰圖書編又著周易象義詩經原體書經原始春秋竊義禮記劄言論語約言諸書弟子從遊者甚衆主白鹿書院御史吳達可薦之吏部侍郎楊時喬請遙授順天府儒學訓導如陳獻章來知德故事報可私諡文德先生劉綎顯子勇敢有父風每遇敵提刀陷陳軍中號曰劉大刀初以廕為指揮使從顯平九絲蠻先登勇冠諸軍緬甸犯雲南擢遊擊往征賊首嶽鳳聞其至懼乞降乘勝攻蠻莫及孟養二酋皆削平進副總兵鎮其地坐事革任羅雄土司者繼榮叛遣綎進討斬繼榮賊盡平録功為廣西參將朝鮮用師充禦倭總兵官斬獲獨多遷四川總兵討平播酋楊應龍進左都督建昌猓亂命綎討之傾其巢萬厯四十七年同楊鎬出遼東遇大兵於阿卜達喇戰死綎於諸將中最驍勇大小數百戰威名震海內天啓初贈少保祠曰表忠本朝乾隆四十一年賜諡忠壯阿卜達喇舊作阿布達里今改正張神武新建人萬厯中武會試第一遼左兵興以經略袁應泰薦命從征神武率親丁二百四十餘疾馳至廣寧遼陽已失巡撫薛國用留之不可遂率所部前進戰殁餘人俱死之贈都督僉事本朝乾隆四十一年賜諡烈愍萬燝恭之孫萬厯進士天啓初遷工部員外郎時楊漣等以劾魏忠賢𬒳嚴旨燝憤甚抗章極論忠賢大怒矯旨廷杖一百又命羣閹毆之遂卒崇禎初贈光祿卿後諡忠貞胡良機南昌人萬厯進士天啓初擢御史疏論乳媪中涓請停內操又疏言魏忠賢之惡不減汪直劉瑾忠賢深恨之出按貴州遂斥為民崇禎初起按宣大又為中官王坤劾罷後為南京吏部主事吳羽文南昌人萬厯進士崇禎中厯官文選郎中痛絶諸弊數與溫體仁抵牾賊毁皇陵有詔肆赦體仁令刑部以逆案入詔內羽文執止之而議起錢龍錫李邦華等體仁搆之坐謫戍久之復官萬時華南昌人性至孝以文名海內學使侯洞曾稱為真儒祀之學宫著有溉園集薑曰廣新建人萬厯進士授編修天啓時使朝鮮還陳海外情形有裨軍國者八事魏忠賢以其為東林黜之崇禎初官至詹事掌南京翰林院福王立拜禮部尚書兼東閣大學士與高宏圖協心輔政為馬士英所惡嗾其黨誣劾之遂力求去位曰廣骨鯁廉介有古大臣風扼於憸邪未竟其用李曰輔南昌人萬厯中舉于鄉為成都推官偕諸將攻復重慶崇禎四年擢南京御史帝遣中官出鎮抗疏爭之謫廣東布政使照磨歸隱西山香城寺讀濂洛書不輟十餘年卒傅冠進賢人天啓初進士及第崇禎中纍官東閣大學士罷歸唐王時以原官督師恢復江西尋致仕後被執不屈死於汀州血漬地久而猶鮮本朝乾隆四十一年賜諡忠烈李右讜豐城人天啓進士擢御史號敢言崇禎五年出按淮揚時中官在外率橫恣衆懼莫敢言右讜獨列上督理鹽漕太監楊顯名貪恣事狀請并治其黨顯名遂誣訐右讜調他曹南渡初復官萬元吉南昌人天啓進士厯潮州歸德推官崇禎中楊嗣昌出督師奏為軍前監紀甚著勞績纍官南京兵部郎中福王時進太僕少卿監視江北軍務四鎮不協元吉輯和之及南都覆走福建唐王擢為兵部右侍郎總督江西湖廣諸軍兼巡撫南贛與楊廷麟等守贛州城破赴水死本朝乾隆四十一年賜諡忠節武起潛進賢人天啓進士初為武清知縣有諸生為人所訐納金酒甕以獻起潛召學官及諸生發之治縣一年有聲調繁遵化縣坐事被劾解官候代會大兵臨遵化起潛與後任知縣徐澤憑城拒守城破並殉難本朝乾隆四十一年賜諡節愍李汝璨南昌人崇禎初進士知蘄水縣有政聲入為刑科給事中數有論建久旱求言疏諫回天四要忤旨下獄削籍歸京師陷衰絰哀號作祈死文未幾卒諶吉臣南昌人父應華萬厯時以參將援朝鮮戰殁吉臣由舉人為雲夢知縣李自成陷城不屈見殺本朝乾隆四十一年賜諡烈愍陳美新建人崇禎中由鄉舉薦為常山知縣再知宜城縣嘗擊敗張獻忠兵巡撫薦於朝未及擢用李自成兵寇宜城美固拒八晝夜城陷抗罵不屈為賊支解本朝乾隆四十一年賜諡忠烈魏時光南昌人崇禎時為廣濟典史邑遭殘破長吏設排兵三百人委之教練賊據州河口憚時光不敢渡時光募死士乘夜襲其營手殺數賊賊不敢逼俄賊大至部卒皆散時光單騎據高坡又殺數人賊環繞之靷絶𬒳執不屈死本朝乾隆四十一年賜諡烈愍龔新南昌人崇禎時為內鄉知縣李自成陷城不屈死本朝乾隆四十一年賜諡節愍萬敬宗南昌人崇禎末由貢生為光化知縣到官以死自誓賊薄城闔門殉節賊義之城獲全本朝乾隆四十一年賜諡節愍王錫新建人崇禎進士知巴縣張獻忠攻重慶悉力捍禦城陷被執大罵不屈賊縛樹上射之又臠而烙之既死復燬其骨本朝乾隆四十一年賜諡節愍熊緯南昌人崇禎末進士授行人兩都既覆常涕泣悲憤後走延平唐王擢為給事中從至㓅州城潰不屈死本朝乾隆四十一年賜諡節愍萬文英南昌人崇禎進士為鳳陽推官賊破城時文英卧病賊索之子元亨年十六泣語父曰兒不得復事親矣出門呼曰若索官何為我即官也賊縶之顧見其師萬師尹亦被縶紿賊曰若欲得者官耳何縶此賤吏賊遂釋之元亨乃極口大罵賊怒斷頸死文英獲免福王時起禮部主事丁艱不赴唐王授為兵部員外監黃道周諸軍協守廣信諸軍敗於鉛山文英舉家赴水死本朝乾隆人授順昌宣化知縣厯升太僕寺卿太朝入祀鄉賢祠徐文漣奉新人明萬厯丁酉舉人由教諭升漵州府同知當奢酋蹂􅏳之後奉檄經略永寧請建城於大壩及古藺州控扼險阻又改土歸流丈田起科於是荒徼土田盡入版圖本朝入祀鄉賢祠塗文煥奉新人明萬厯癸未進士仕至浙江溫州府知府潔已愛民所至豪猾為之斂迹本朝入祀鄉賢祠甘文翰奉新人天性純篤事母以孝聞選嘉魚知縣修學校治津梁減火耗革陋規訟至立即剖決邑以大治嘉人以名宦祀之本朝入祀鄉賢祠宋士中奉新人明萬厯庚子舉人授豐縣知縣有異政擢淮安府同知以開河工議敘擬內擢以事忤逆璫寢不行遂拂衣歸卒祀鄉賢祠帥衆奉新人明萬厯丙辰進士授淳安知縣擢浙江道御史逆璫擅政抗疏指陳時政語侵璫上怒鐫職尋召還在臺前後數十疏多切中時事祀金華名宦入祀鄉賢祠張應辰奉新人甫一歲而孤依於叔父母事之如所生德養醇厚學問深邃家貧以教授生徒為事歲入給用外悉以周井里窮乏卒入祀鄉賢祠本朝辜正南昌人順治初知河南濟源縣墾荒千餘頃以勞卒官貧不能殮士民賻助乃得持喪歸朱師聖進賢人金聲桓叛掠其家師聖與父易衣父逸而師聖被執抗節不屈賊怒殺之彭士望南昌人少有雋才及長好談經濟慕漳浦黃道周為人裹糧走謁及道周繫獄為之傾身營救嘗參揚州幕辭歸徙家寧都與魏禧輩讀書金精山之易堂諸人各以名節詩文相砥礪士望尤重躬行務實學鄉人有死節者子幼被掠士望傾槖贖之為娶婦其急風義類如此劉崑南昌人順治進士由束鹿知縣擢雲南府同知吳三桂叛遣使諭降不屈𬒳杖遣戍騰衝衛雲南平詔授登州府同知遷知常德府致仕張焜南昌人順治中由鄉舉知永夀縣縣數遭寇躪城廬盡燬焜至重築新城邑故無井焜披榛得泉山巔疏導入城父老相傳此宋吕大防惠民泉涸廢數百年一旦復之是歲境內穀多雙穗有至八九穗者吳三桂叛總督摩囉檄焜參贊軍務以勞卒摩囉舊作莫洛今改正羅士毅新建人順治進士知廣東信宜縣民多積逋士毅請上官奏除不可則鬻産代償豁冤獄十餘人報最為粵東第一遷知陜州致仕歸率僮僕耕作飦粥不給怡然若素郭曰燧新建人順治進士由郎中出知台州府海寇入侵曰燧身先士卒擊却之繕治城垣多方捍緝以母老乞養杜門不履城市三十餘年喻昌新建人讀書精醫術兼通釋典遊吳中僑居常熟治療多竒中年八十預知死期坐論而化所著醫門法律尚論篇行於世傅宏烈進賢人順治初知慶陽府首發吳三桂逆謀謫戍廣西甲寅之亂陷賊中宏烈佯與賊結而密通𣢾於朝備陳賊可滅狀賊平即軍中授廣西巡撫時梧柳諸郡猶未下加撫蠻滅寇將軍使規取象林以討賊宏烈感激拜表即行次栁州降卒復叛挾如賊營遇害贈兵部尚書諡忠毅朱紱進賢人順治進士由庶吉士改浙江道監察御史巡視漕務力却饋遺巡視河東鹽政亦然纍升都察院左僉都御史致仕歸家無餘財入祀鄉賢祠李永昌奉新人以把總守南豐閩賊犯城永昌率其子名芳出戰斬四百餘級追至沙洲賊衆突至名芳馬陷見殺永昌戰益力矢盡猶手刃數十人乃自刎事聞贈永昌參將名芳都司僉書賜祭葬廕子弟一人熊一瀟南昌人康熙進士由庶吉士改御史有直聲纍遷順天府尹建貢院號舍疏免地租以紓民困厯工刑二部侍郎改兵部督捕督捕職緝逃人例嚴連坐一瀟請止罪家長餘不問從之以工部尚書致仕在官四十餘年以清慎稱曹家甲新建人康熙進士性剛毅知龍溪縣以不能事上官罷職尤精形家言登眺名勝足迹半天下著地理原本四卷聖祖仁皇帝特召相視蒙古地形理藩院奏請官之以老病辭歸卒大學士朱軾志墓周尚功豐城人由行伍任陜西略陽守備轉江南福山都司海寇入京口尚功率兵赴援寇解去升福延永安營遊擊擒山賊李月高又搜捕餘黨陳楚生等悉平之調陜西興安右營遊擊簡搜軍實夙弊以清調永寧中營遊擊吳逆之亂不從去官住永寧康熙十九年賊胡國柱圍城踰月城陷尚功被執罵賊不屈全家𬒳害乾隆二十九年入祀昭忠祠丁蕙豐城人以孝稱父病亟刺血和藥飲之即愈康熙中舉進士改庶吉士纍官福建提學僉事登萊副使所至有聲致仕歸濬沙湖及蘆花港以資灌溉鄉人利之甘顯祖奉新人舉于鄉以孝稱年十六土寇竊發身負七旬祖母陳暨母熊並幼弟走竄山谷遇賊泣請以身代祖母及母弟死賊釋之三任教職以正學朂諸生以子汝來貴贈兵部尚書甘汝來顯祖長子康熙進士知淶水縣有侍衛畢里克欺擾邑民汝來治之以擅鎖職官罣吏議聖祖仁皇帝廉其實即復職罷淶民雜派歲六千餘金調新安開白楊隄以溉民田知太平府罷龍州土司定思明土司與安南祿州界招撫土官岑應宸擒姦逆莫東旺羅文罡纍官吏部尚書贈太子少保諡莊恪帥我奉新人康熙舉人官中書甲寅寇變奉父母匿深山時母病與僕舁竹輿走踵血淋漓不止後父病篤祈天請代夢神告以松節可療輒應所著有墨瀾亭集簡齋詩文稿劉吳龍南昌人雍正癸卯進士由庶吉士改吏部主事在任十年銓務公平冰蘖自守後任江蘇學政得士甚盛及入為刑部尚書留心讞決無枉無縱卒於官諡清慤與甘顯祖甘汝來帥我俱入祀鄉賢祠周萬達新建人為諸生數十年踐履篤實學問該博學者多尊師之雍正元年舉於鄉尋卒李湖南昌人乾隆丙辰進士厯任至廣東巡撫守已清約綜練政務知無不為在巡撫任整飭吏治規條肅然粵東積弊一清卒贈尚書諡恭毅入祀賢良祠曹秀先新建人乾隆丙辰進士由編修厯官至禮部尚書讀書務砥礪為有用之學厯任部職謹慎恪勤凡數典試皆稱得士視學江蘇以整飭士習為務嘗奉命勘浙西水道籌畫水利奏行之工書刻石最富卒贈太子太傅諡文恪裘曰修新建人乾隆巳未進士由編修厯官至工部尚書太子少傅曰修學品端醇才猷練達入直內廷屢膺使命審理案件查勘河南江南直隸水利盡心經畫卒諡文達吳一嵩新建人乾隆乙慶知府三十八丑進士知河南正陽縣厯四川重年以用兵金川調辦站務總理大營糧務逆酋薄大營率糧臺官吏悉力拒守被害於木果木贈道銜祀昭忠祠又彭元瑋南昌人四川候補知府亦在木果木軍營陳亡賜恤入祀昭忠祠又馬雄南昌人任陜西略陽守備乾隆三十八年以陳亡豫恤入祀昭忠祠又黃彬南昌人任廣東崖州樂安巡檢以被匪拒捕射傷身死贈按察司知事彭元瑞南昌人乾隆丁丑進士由編修纍官至工部尚書孝友承家文章經國性廉潔而好施人皆德之卒贈協辦大學士諡文勤入祀鄉賢祠裘行簡曰修子欽賜舉人授內閣中書纍官兵部侍郎署直隸總督所至興滯補弊廉介自矢公俸所餘於義舉絶不少吝以勞瘁卒恩給一品恤典諡恭勤入祀鄉賢祠黃麒瑞南昌人由監生候選同知性孝友置義田千畝以贍族設義孰教之歲飢於捐賑常數外復出千金以資展賑又捐二千金於漏澤園為掩胔之資生平義舉不可悉數入祀鄉賢祠萬承風義寧州人乾隆辛丑進士改庶吉士授檢討纍官兵部侍郎居心正直立品端方任廣東學政首革陋規厯主文衡俱能得士卒晉贈禮部尚書諡文恪入祀鄉賢祠流寓晉范宣陳留人家於豫章太守殷羡見宣茅茨不完欲為改宅宣固辭之庾爰之以宣素貧厚餉給之宣又不受間居屢空常以誦讀為業譙國戴逵等皆聞風宗仰自逺而至諷讀之聲有若齊魯唐權臯丹徒人安祿山亂客洪州時南北道梗踰年詔命不至有中人過州頗求取無厭南昌令王遘欲按之謀於臯臯良久不答泣曰今何由致天子使而遽欲治之遘悟厚謝之施肩吾分州人以洪州西山為仙靈窟宅卜居終隱著西山集五代南唐鍾蒨隨兄懷建家豫章仕唐為檢校勤政殿學士宋師入金陵蒨朝服坐於家兵入闔門殉難陳陶嶺南人隱居洪州西山種柑橙令山童賣之自給妻子亦知讀書陶以修鍊為事後不知所終宋邵成章欽宗朝內侍康王即位上疏具黃潛善汪伯彥之罪帝怒除名南雄州編管久之帝思成章忠直召赴行在其徒譖之遂止之於洪州金人入洪聞其名訪得之謂之曰知公忠直能事吾主可享富貴不應脅以威亦不從金人曰忠臣也吾不忍殺蘇雲卿廣漢人紹興中來豫章東湖結廬獨居灌園織屨鄰曲稱曰蘇翁少與張浚為布衣交浚為相馳書幣屬豫章帥漕親造其廬必為致之帥漕密物色得之出書函金幣請共載辭不可期以詰朝上謁旦遣使迎伺排闥入書幣不啓翁已遁竟不知所往元黃雲撫州人寓靖安以勇捷稱至正中蘄黃賊攻靖安達嚕噶齊綽哈以雲為前鋒戰屢捷後賊黨益盛衆寡不敵雲身中數十創噴血罵賊而死達嚕噶齊綽哈譯俱見前明謝復祁門人初從吳與弼遊晚卜室西山之麓學者稱西山先生列女南齊萬晞豫章人少孀居無子事舅姑尤孝父母欲奪而嫁之誓死不許內史顧憲之賜以束帛表其節義唐段居貞妻謝氏字小娥豫章人居貞本厯陽俠少年娶歲餘與謝父同賈江湖上並為盜所殺小娥赴江流人救免夢父及夫告所殺主名為申蘭申春兄弟乃名盜亡命者也小娥詭服為男子物色歲餘得蘭於江州春於獨樹浦因託傭蘭家見所盜服用故在出入二期一日蘭盡集羣偷釃酒與春醉卧小娥閉戶拔刀斬蘭首大呼捕賊鄉人踰牆擒春得贓千萬其黨數十小娥悉疏其人上之官皆抵死乃還豫韋人爭聘之不許祝髮事浮屠道垢衣糲飯終身宋彭烈女分寧人從父泰入山伐薪父遇虎將不脫女拔刀斫虎奪其父而還事聞詔賜粟帛敕州縣歲時存問吳中孚妻進賢人少寡景定元年兵亂攜孤女自沉於縣之染步曰義不辱吾夫元霍榮妻段氏龍興人榮無子嘗乞人為養子榮卒段年二十六養舅姑以孝稱舅姑歿榮諸父仲汶貪其産謂段曰汝子假子也可令歸宗汝無子宜改適即入室引針刺面墨漬之誓死不二大德二年旌其門鄭伯文妻丁氏新建人大德間伯文病將殁丁與訣曰君脫有不諱妾當從但君父母已老妾且忍死以奉其餘必不改適他人以負君伯文卒丁年二十七居喪哀毁服除父母屢議奪嫁之丁每聞必慟哭父遂止舅姑常病丁夙夜護視衣不解帶及死喪葬盡禮事上表其門陳淑真富州人陳璧女璧故儒者避亂移家隆興淑真七歲能誦詩鼓琴至正十八年陳友諒寇隆興淑真取琴彈之曲終流泣曰吾絶絃於斯乎父母怪問之曰陷城必遭辱不如早死明日賊至其居鄰東湖遂溺焉水淺不死賊抽矢脅之上岸淑真不從射殺之劉氏二女龍興人長曰貞年十九次曰孫年十七皆未嫁陳友諒寇龍興其母泣謂曰城或破置汝何地二女曰即死不辱父母也城陷二女登樓自縊婢鄭奴亦自縊高烈女寧州人年十七有殊色元季盜起匿巖穴中盜得之抗聲曰我室女無父母命豈敢擅事人盜甘言誘之不屈拔刀欲殺欣然受刃而死明劉天瑞妻熊氏南昌人年二十三而寡生子仲高娶喻氏年二十亦寡生子觀方四歲婦姑紡績自給觀竟成立孫曾二十餘人熊年九十一喻亦八十二人以為節孝之報余繼妻熊氏字謇奴豐城人年二十一歸繼繼疾不起熊出篋中衣對繼紉二襲泣謂曰有不幸吾當服之俱死繼卒視殮畢即衣所紉衣自經同日合葬徐試妻胡氏豐城人試卒未葬鄰家火子婦李氏撫柩籲天誓與俱焚火及屋泣謂胡曰婦在此姑亟自全胡不肯去姑婦抱持號泣天忽反風環燒百餘家唯柩所獨存觀者嘆異賴文璧妻胡氏字負貞豐城人歸賴僅兩旬夫溺死即自沉於水家人救免母憐其少欲嫁之胡不從聞納聘遂自經葉氏女字兆姺南昌人幼字新建李氏子光庭光庭死女年十三誓不改嫁父母以其幼強受他人聘即自縊潘濡妻熊氏豐城人熊懷女夫溺死熊破鏡以半納夫柩半自隨年八十三卒遺命以半鏡殉郭匡晉妻溫氏新建人事舅姑極孝姑失明晨夕侍側飲食親調以進行必扶攜伺就枕然後即安姑疾刲股療之立愈及夫卒溫年二十一子幼或諷更適誓以死守至九十餘乃卒趙孝女名郡珍進賢人趙叔式女正德中叔式為吏攜家京師母萬氏病郡珍親嘗湯藥衣不解帶者纍月母殁遂自縊胡鍠妻何氏進賢人正德六年寇至姑老疾不能行何負之踰牆避焉姑尋卒其冬寇復至衆皆逃避何泣守姑柩不去𬒳執投水死諶珂妻蕭氏南昌人正德七年流賊至蕭攜幼子避東坪墟賊追及欲辱之投井死諶烓妻陳氏豐城人烓為南湖嘴巡司吏正德七年流賊執陳與女壽英欲汚之厲聲罵賊俱被支解余陽妻張氏奉新人年二十一華林賊入境掠張至旅店欲辱之張大罵見殺同縣易功廉妻江氏年二十五為賊所執驅之行據地不起賊斷其首而去樊鳳英南昌人樊昱女字新建萬尚宏將嫁而尚宏病鳳英為廢寢食及聞訃至即登樓自縊萬氏女字會貞新建人萬國龍女許字南昌胡欽恭欽恭痘殤會貞易縞衣白母欲臨其喪不許乘間自經同縣萬言女字考英許字閔士毅士毅夭欲往哭之父母不可亦自經死聶莊妻潘氏豐城人莊行賈泗洲病殁舅姑促令改嫁投水死同縣蔣欽妻黎氏嘉靖中寇至恐為所汚投小池以面入泥中死葉惟青妻魏氏新建人年十九夫亡遺腹生子自昻教之成立凡三刲股一救姑一救夫一救父世稱其節孝祝氏寧州人許聘同里盧榮未嫁而榮病革女請往視慰之曰君不諱我為立後遂斷一指以誓榮卒立兄弟子繼之一日忽謂諸婦曰我將浴若等且去浴竟更衣無疾而逝黃廷繼妻陳氏南昌人于歸半載廷繼客遊南畿家甚貧夜分紡績以供菽水三年夫殁於外訃至七日不食自經死塗崇義妻淦氏靖安人崇禎末紅巾賊至與崇義弟崇信妻