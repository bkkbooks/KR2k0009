日鄉人於此以船競渡刺史張栖貞懸孝經於標竿賞之俗謂懷蛟水或曰孝經潭大汾潭在樂平縣東北三十里鵞塘盤石下深不可測呉王潭在徳興縣東南五十五里清澈可鑑潭底有巖如屋縣志宋張燾毁長沙王廟投其像於江祝曰隨所止復祀之像溯流三里許止潭中遂為立廟因名又有徐公潭在縣南四十里銀潭在徳興縣東北九十里崖深數丈有眼直通山頂流杯池在府城西南千户所宋范仲淹所鑿又有白蓮池在府西匯桃源山水天仙池在樂平縣東北十里龍泉池在浮梁縣南六十里明統志水深莫測歲旱投以楮鏹有魚銜之而下即雨淬劍池在德興縣南七里相傳呉芮淬劍於此又化龍池在縣學東宋紹興中鑿甯家陂在浮梁縣南其水北注昌江名小坑港相傳梁末所鑿溉田二千餘畝明正徳間重浚東良陂在萬年縣東門外水極深廣明正德間用石築清潔灣在鄱陽縣東螺洲南岸寰宇記在縣東南七里隋開皇中太守梁文謙蒞官清潔取此灣水以自供後人思其徳號為清潔灣佛指泉在浮梁縣西能仁寺前井底有石指其泉從上湧出味甘洌冬夏不竭明統志作市佛泉膽泉在徳興縣有二一在縣東十五里一在縣東三十里亦曰銅泉以泉浸鐵數日輒類朽木刮取其屑鍛鍊成銅元史至正十二年中書省臣張理獻言徳興三處膽水浸鐵可以成銅宜各立銅冶場即此白沙在鄱陽縣西漢武帝使下瀨將軍出白沙即此史記索隱今豫章東北二百里接鄱陽界地名白沙有小水入湖名曰沙坑寰宇記白沙在縣西水路一百二十里沙白如雪因以為名七星井在府城内宋范仲淹鑿舊有七竅如北斗形今湮龍井在餘干縣東南八十里歳旱汲水禱之輒有應焉龍女井在餘干縣西南六十里明統志相傳楊呉時有蔡氏女年十六父母欲嫁之女不從父母撻之因投井追至無跡但見雙履浮水上時以為龍女今歲旱輒禱焉劍井在浮梁縣治東明統志相傳晉藺真人卓劍處其水清洌大旱不竭
