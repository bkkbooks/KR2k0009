front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_114-1a}
body:
  text: 南昌府二古蹟建昌故城在奉新縣西後漢永元十六年分海昏置建安中孫策嘗以太史慈為建昌都尉劉宋元嘉二年徙縣治海昏而故城廢按寰宇記有太史城在奉新縣西四十里太史慈創置周廻三里西南有城角山東南有磐山北枕江水其地險固基址尚存蓋即建昌故城也南昌舊城在今南昌縣東漢置水經注南昌縣城漢高祖六年始命灌嬰以為豫章郡治此即灌嬰所築也圖經南昌縣凡三改五移隋開皇中自郡西南徙之城北唐貞觀中徙附邵城明初又移今治城邑考漢城周十里八十四步南曰松陽門西曰臯門昌門東北二門各以方隅為名晉咸安中飥守范甯更闢東北西北二門唐初築城之西南隅垂拱初都督李景嘉又增築之凡八門元和四年刺史韋丹更築城東北隅於是廣倍漢城宋築洪州城又倍於舊周三十里門十六紹興六年李綱帥洪州以城北歲湧江沙截城東北隅入三里許爲十二門元因宋舊其城西面瞰江不利守禦明太祖定洪都乃命改築今城古今記漢豫章城亦曰灌嬰城在今縣東灌城鄉城隍橋西今爲黄城寺府志城中故有子城三國呉五鳳二年太守張俊於城東城造雙闕亦曰雙門南唐建爲南都俗呼雙門爲東西華門仍舊都之號也元建行省於子城内明永樂元年爲寕王府正德十四年宸濠反府廢乃闢中爲行道通行旅鍾陵舊城在進賢縣西北漢南昌縣之東境晉析置鍾陵縣後省梁陳時復置南史梁武帝擢郭祖深爲豫章鍾陵令又陳武帝封從子褒爲鍾陵縣侯是也隋時廢唐武德五年復置八年又廢入南昌宋改置進賢鎮崇寕二年升爲縣即今治也縣志宋時割南昌縣歸仁崇禮崇信真隱四鄉及新建縣玉溪東西二鄉置縣大觀二年復返新建二鄉而割南昌欽風鄉益之今有鍾陵市在縣東南昌縣界又有鍾陵鄉故城蓋在今二縣界豫寕舊城在武寕縣西寰宇記武寕縣在州西北三百六十里後漢建安中分海昏立西安縣晉太康元年改為豫寕宋書王僧綽封豫寕侯即此陳武帝立豫寕郡隋廢郡以豫寕入建昌隸洪州唐長安四年分建昌置武寕景雲元年又改豫寕寶應元年以避御名依舊為武寕縣志故城在縣西二十里甘羅村唐天寶四年移於今治按唐㑹要貞元十五年武寕縣民鄧廣奏武寕所隸凡二十鄉而太清鄉甘羅村縣令所治在焉據此則貞元時猶治甘羅村移治當在其後非天寶時也又寰宇記別載西安故城在分寕縣西二十里即今義寕州之西兩地相隔甚遠疑誤孫州故城在南昌縣西南唐武徳五年分豫章縣地別置南昌縣又置孫州治焉八年州縣俱廢豐城故城在今豐城縣西南本富城縣晉改置豐城唐徙今治顧野王輿地志後漢建安中初立富城縣於富水之西晉太康元年改為豐城縣移於豐水之西元和志豐城縣北至洪州一百四十七里晉故城在今縣南四十一里即雷孔章得寶劍處也寰宇記縣在州西南一百三十里又故豐城豫章記云呉末時恒於此有小赤氣見於牛斗之間占者以為呉方興惟張華以為不然雷煥謂寶物精在豫章之城遂以煥為令至縣掘獄地得龍泉太阿二劍曹學佺名勝志唐永徽初遷縣於章水東始為今治縣志富城故城在縣南六十里富城鄉豐城故城在縣西南劍池側又有呉臯城在縣西赤岡山下一名黄金城今為榮塘市廣豐故城在豐城縣東梁置寰宇記梁大通二年分豐城立廣豐新安二縣屬巴山郡陳初廢新安入廣豐尤大二年移巴山郡於廣豐縣西二里獨瀦水南岸築立城郭隋開皇九年廢巴山郡又併豐城縣入廣豐即故巴山郡城也又避諱改豐城縣大業十三年林士宏毁城邑遂廢唐武徳五年復立縣志故城在縣東二十五里今為廣豐鄉新呉故城在奉新縣西後漢置宋書州郡志豫章新呉漢靈帝中平中立隋書地理志開皇九年併新呉入建昌唐書地理志武德五年析建昌置新呉縣八年省永淳二年復置元和志縣東至洪州一百五十里舊隸楚今新屬呉故曰新呉宋史地理志隆興府奉新唐新呉縣南唐改縣志故城在今縣西三十里唐神龍二年東徙於馮川之北即今縣治也分寕舊城即今義寕州治唐㑹要貞元十五年武寕縣民鄧廣等奏曰縣治太清鄉西鄉趨縣餘三百里小民徃返疲於道路伏見並西八鄉有常洲亥市居其中於八鄉道里實為均一請即市建縣為便詔可明年因建為縣元和志分寕縣東南至洪州六百五十里刺史李巽奏分武寕西界置因以為名寰宇記縣本武寕之亥市其地凡十二支去武寕二百餘里艾縣舊城在義寕州西本春秋呉邑左傳哀公二十年呉公子慶忌出居於艾漢置縣屬豫章郡隋省入建昌寰宇記分寕縣有古艾城新志艾城在州西百里龍岡坪故城猶存西平舊城在義寕州寰宇記在分寕縣西二百九十七里漢書云鄧通西平人即此縣也隋省按西平未詳建置疑舊屬西安之地劉繇城豫章記劉繇城在豫章縣北四十里寰宇記在南昌縣東北三十八里蓋孫策畧地曲阿攻揚州刺史劉繇敗奔豫章築城自保人號為劉繇城齊城在南昌縣東南輿地志呉大帝太元二年立孫奮為齊王都武昌諸葛恪徙奮於此水經注豫章郡東南二十餘里有一城號曰齊王城蓋孫奮離宫也墌口城在南昌縣西南七十里梁末廣州刺史蕭勃舉兵遣其將歐陽頠傅泰出南康趨豫章傅泰據墌口城與周文有相持即此或曰城在吉安府北七十里似誤墌一作蹠都尉城在南昌縣南三十里北與府城相連縣志隋大業二年置三年廢昌邑城在新建縣西北六十里慨口劉昭後漢志注海昏縣有昌邑城豫章記曰城東十三里江邊名慨口昌邑王每乘海東望至此輒憤慨而還故謂之慨口寰宇記城在州北水路一百三十七里縣志今名逰塘城椒邱城在新建縣北虞溥江表傳孫策在椒邱遣虞翻說華歆豫章記建安五年孫策起兵破劉勲於尋陽謀取豫章太守華歆築此城以禦之寰宇記椒邱城在州北水路屈曲一百四十八里王步城在新建縣北水經注贛水東北逕王步步側有城云是孫奮為齊王鎮此呉城在豐城縣東南三十里俗傳呉孫權祖鍾居此黄中城在進賢縣南五里一名黄牛城余城在奉新縣西寰宇記在奉新縣西十五里梁書云于慶入洪州遂攻新呉縣余孝頃起兵拒之築此城周三里百五十步黄城在奉新縣西南奉新鄉野田中有平坡周圍一里相傳宋岳飛引兵經此累土為屯宿之所越王城在奉新縣西五十里明統志相傳越王勾踐伐楚屯兵於此武安城在武寕縣東南十五里武安山上四面如壁其上平坦元末邑人胡紹遠兄弟保障鄉民於此立寨亦名武安寨升平里故新建縣治寰宇記新建縣本南昌縣地太平興國六年割南昌水西十四鄉置縣仍於州城升平里故唐將林仁肇私第充縣廨署府志故縣治在郡城東隅度支步在新建縣西北水經注贛水北厯度支步是晉度支校尉立府處步即水渚也縣志度支步在縣西北五里梅福宅在南昌縣寰宇記在州東北三里西接開元觀東西墨池書堂餘址猶存徐穉宅在南昌縣南水經注贛水北厯南塘塘之東有孺子宅際湖南小洲上寰宇記在州東北三里梅福宅東戴叔倫宅在進賢縣東棲賢山今為書院呉猛宅在義寕州南東津側今為丹霞觀亦名呉仙里黄庭堅宅在義寕州西二十五里雙井北岸有永思堂旁有釣臺下有水曰明月灣物華樓在南昌縣洗馬池上宋嘉祐中建王安石詩千里名城楚上遊江山多在物華樓其址今為府學射圃夕佳樓在新建縣西北元末齊哩克扣闔門死難有司徙其樓於西北城角以旌忠烈名齊家樓明萬厯間更名夕佳樓齊哩克扣舊作偰列篪今改正涵虚閣在南昌縣東湖北宋國子博士李寅建楊億作記滕王閣舊在新建縣西章江門上西臨大江唐顯慶四年滕王元嬰都督洪州時建後都督以九日宴僚屬於閣上王勃省父過南昌與宴為序後又有王緒為賦王仲舒為記韓愈所謂讀三王所為序賦記壯其文詞者也宋元時俱重修明太祖幸南昌嘗宴詞臣閣上後頽廢景泰中重搆在章江門外額曰西江第一樓成化間葺治復曰滕王閣後再燬本朝康熙年間凡三建閣左有亭以奉御書滕王閣序秋屏閣在新建縣城北十五里宋曽鞏云豫章城中凡樓觀見西山正且盡者惟秋屏閣耳本朝康熙二十八年重建於北蘭寺内逍遥閣在新建縣西山宋洪炎有詩三賢閣在奉新縣治東祀宋周敦頣蘇軾黄庭堅元歐陽原功爲記碧波亭一名渌波在南昌縣東湖西望江亭在南昌縣東湖百花洲上唐韋丹築南塘隄以捍潦水因建亭列岫亭在新建縣北龍沙前對西山取謝朓窻中列遠岫句爲名龍沙亭在新建縣北龍沙岡本唐洪州熊氏清風亭權徳輿有序明萬厯中移建龍光寺南寶氣亭在豐城縣西北瞰大江有二碑刻唐李徳𥙿劍池賦四望亭在武寕縣治西宋李綱建豫章臺在新建縣北七里龍沙岡南宋元時有之後圯明太祖破陳友諒駐南昌築臺諭父老於此嘯臺在進賢縣北龍岐山元辛好禮建施肩吾石室在新建縣西去天寶洞十里唐元和中肩吾舉進士退隱於此嘗著山居百韻詩蘇翁浦在南昌縣東湖百花洲上宋隱士廣漢蘇雲卿蒔蔬織屨於此亦稱三洲蘇圃關隘市汊巡司在南昌縣南六十里章江濱舊置巡司今因之又舊置驛南去豐城縣之劍江驛百里生米渡巡司在新建縣南四十里生米渡口本朝乾隆三十年改烏山巡司置又舊有趙家圍巡司在縣東北七十里今移於武寕之高坪市大江口巡司在豐城縣西大江岸本朝乾隆三十年改柿源巡司置又舊有江滸口巡司在縣西南早禾洲明宣徳四年置今裁梅莊巡司在進賢縣東南六十餘里梅莊市本朝乾隆三十年改鄔子寨巡司置兼管潤陂巡司舊置水驛於其右今廢又舊有花園巡司在縣東南四十里明置本朝雍正六年裁龍山巡司在縣北一百里明正統初置後廢羅坊巡司在奉新縣西六十里明初置今因之又白沙場在縣西七十里亦名富溪舊置巡司今廢高坪巡司在武寕縣西北六十里高坪市本朝雍正六年置八曡嶺巡司在義寕州南八曡嶺明正統四年置巡司後廢本朝雍正六年復置排埠塘巡司在義寕州西南武鄉本朝雍正六年置三江口鎮在南昌縣東南舊里巡司本朝雍正七年移駐長來館乾隆四十四年裁巡司置主簿仍駐此呉城鎮在新建縣北一百八十里呉城驛南本朝雍正七年移南康府同知駐此乾隆三十年改屬南昌府兼移昌邑巡司駐此四十四年裁巡司置主簿仍駐此芊韶鎮在南昌縣南一百里陳永定初周文育擊歐陽頠自豫章偽遁由間道兼行至芊韶芊韶上流則苦竹灘諸營下流則墌口城石頭諸營文育據其中築城饗士頠等大駭退入泥溪即此泥溪在臨江府新淦縣樵舍鎮在新建縣西北六十里九域志新建縣有大安新城樵舍大通西嶺松湖六鎮明正德中王守仁擒宸濠於此舊置巡司及驛丞今皆裁松湖鎮在豐城縣西北六十里接新建縣界港口鎮在豐城縣東此九域志豐城縣有港口河湖曲江赤江四鎮舊志明初置巡司於縣北三十里大港口後移於縣東北十五里小港口正徳七年革又有河湖巡司亦廢曲江鎮在豐城縣東北十里又赤岡市在縣西十五里赤岡山下即古赤岡鎮也昌邑鄉在新建縣西昌邑山舊置巡司本朝乾隆四十四年裁柿源鄉在豐城縣南一百里明洪武初置巡司本朝乾隆三十年移駐大江口銅鼔營在義寕州西南一百五十里明萬厯四年建設守備駐此有城周一里有竒本朝雍正二年移瑞州府同知南瑞鎮後營遊擊及千把總駐此鄔子寨在進賢縣東北一百餘里與餘干瑞洪鎮相對明洪武初置巡司本朝乾隆三十年移駐梅莊百丈寨在奉新縣西百丈山下