body:
  text: 土關在麻城縣北九十里接河南光州光山縣界穆陵關在麻城縣北一百里一作木陵關接河南光州光山縣界梁書夏侯䕫傳普通八年敕夔出義陽道攻平靖穆陵隂山三關克之元和志穆陵關在麻城縣西北八十八里穆陵山上西至白沙關八十里在黄州北二百里至光州一百四十九里唐書地理志麻城西北有木陵關通鑑唐元和十二年鄂岳觀察使李道古引兵出穆陵關攻中州隂山關在麻城縣東北六十里一名殷山畈魏書田益宗傳呉子陽寇三關益宗遣梅興之歩騎四千進至陰山關南八十餘里元和志隂山關北至光州殷城縣二百里在黄州東北二百十里在麻城縣東北一百一里西至穆陵關一百里唐書地理志黄州麻城縣東北有陰山關長嶺關在麻城縣東北一百里接河南光州商城縣界但店鎮巡司在黄岡縣東六十里團風巡司在黄岡縣西北五十里隔江接武昌府武昌縣界明置巡司本朝因之陽邏巡司在黄岡縣西北一百二十里隔江接武昌府江夏縣界設把總一員領兵駐防又有驛臨江有渡九域志黄岡縣有齊安久長靈山團風陽邏沙湖龍陂七鎮倉子埠巡司在黄岡縣西北一百五十里本朝嘉慶十四年置中和巡司在黄安縣東南五十里黄陂站巡司在黄安縣西北九十里蘭溪巡司在蘄水縣西南四十里濱江巴河巡司在蘄水縣西七十里即水經注之巴水戌也多雲鎮巡司在羅田縣東北一百四十里鵞籠山巡司在麻城縣西四十里一名䥫壁關虎頭關巡司在麻城縣東北七十里距隂山關十里形勢最險兩山千仞一澗衝激茅山鎮巡司在蘄州西六十里明洪武初置巡司本朝因之大同鎮巡司在蘄州北一百二十里明正統五年置巡司本朝因之龍坪鎮巡司在廣濟縣東南一百十里濱江馬口巡司在廣濟縣西南七十里濱江孔壠鎮巡司在黄梅縣南五十里新開路巡司在黄梅縣西南七十里濱江亭前鎮巡司在黃梅縣東北四十里舊為亭前驛今改設巡司仍兼管驛丞事三江口鎮在黃岡縣西三十里隔江接武昌府武昌縣界有渡與地紀勝在團風鎮之下有江三路而下至此會合為一桃花鎮在黄安縣東三十里宋元時為孔道舊有煙墩每舍相望遗址猶存石橋鎮在羅田縣東二十里一名石橋畈宋於北置縣元移縣於今治廢為鎮宋史地理志元祐八年以蘄水縣石橋為羅田縣白杲鎮在麻城縣東南三十里望花山鎮在麻城縣南四十里岐亭鎮在麻城縣西南七十里有城明嘉靖五年築本朝分同知駐守於此九域志麻城縣有𡵨亭故縣白沙永泰桑林永安六鎮邵伯温聞見後錄陳公弼之子慥居黄州之岐亭東坡謫黄相得懽甚蘄口鎮在蘄州西三十里蘄水入江之口也亦曰蘄陽口古名永安戍今謂之挂口塘九域志蘄春縣有蘄口鎮蘄陽鎮在蘄州北吕王山下皇城鎮在蘄州東北一百二十里逵城鎮在蘄州東北一百三十里武穴鎮在廣濟縣南七十里外江内湖最為險要武黃同知駐此舊有巡司今栽名勝志武家穴旁臨大江下扺黄梅之楊家穴長一百九十里隄路横亘其中商賈時集盤塘鎮在廣濟縣西南三十里獨山鎮在黄梅縣東二十里東觀鎮在黃梅縣東五十里上新鎮在黄梅縣南十五里下新鎮在黄梅縣南二十里濯港鎮在黄梅縣南二十里黄連鎮在黃梅縣南五十里唐思穴鎮在黄梅縣南七十里清江鎮在黄梅縣南九十里舊設廵司今改設縣丞楊家穴鎮在黄梅縣西南九十里鎮淮砦在黄岡縣北宋端平元年孟珙屯黄州慮軍民雜處因高阜為齊安鎮淮二砦以處諸軍臺山砦在黄安縣北一百里天臺山上元史董文炳傳世祖伐宋至淮西臺山砦命文炳往取之又鄭鼎傳從世祖南伐攻大勝關破臺山砦擒其守者黃楊砦在黃安縣北天臺山東十餘里巖多黄楊周迴峭壁如臺上平曠有池沼可田可居石壟砦在羅田縣東南四十里觀音砦在羅田縣東南六十里雁門砦在羅田縣西八十里鼓羊砦在羅田縣西北四十里周家砦在羅田縣北六十里甚澰峻熊崖砦在羅田縣東北十里望英砦在羅田縣東北四十里天山砦在羅田縣東北一百三十里多雲鎮南一名天堂砦元末徐壽輝甞據此周砦在廣濟縣東北五十五里縣志石龍坡北十里為周砦元末紅巾之亂邑人周樗率衆保此血戰却賊因名滕家河堡在羅田縣西七十五里南接蘄水縣界西接麻城縣界其地為商旅往來通衢明萬厯三年築堡齊安驛在黃岡縣南濱江李坪驛在黄岡縣北五十里本名蘱草坪宋賈似道奪還元俘卒於此明置驛本朝初因之今裁巴水驛在蘄水縣西四十里浠川驛在蘄水縣西西河驛在蘄州北六十里廣濟驛在廣濟縣城内雙城驛在廣濟縣東六十里接黄梅縣界張家店在黄岡縣北一百二十里九官店在黄安縣東十五里王福店在麻城縣北四十里舊有公館街埠市在黄岡縣西北一百三十里盤石市在黄岡縣北六十里閻家河市在麻城縣東十五里相傳唐閻伯璵故里宋埠市在麻城縣西南六十里濱河為水陸要衝津梁相隱橋在黄岡縣城東二里安國寺前韓琦讀書處魚博橋在黄岡縣東七十里陽真橋在黄安縣西南三十里路通漢陽府黄陂縣高柳橋在黄安縣西北六十里路通河南光山羅山二縣綠楊橋在蘄水縣東一里宋蘇軾綠楊橋詞序春夜行溪水中過酒家飲酒醉乘月至一溪橋上解鞍少休及覺已曉亂山蔥蘢不謂人世也書此詞橋上按名勝志綠楊橋舊名一溪橋因子瞻詞有解鞍欹枕綠楊橋之句遂更名似誤花橋在麻城縣東十五里望魯橋在麻城縣東六十里龜峯山之麓岐亭橋在麻城縣西南七十里相傳蘇軾與陳慥曾遊此相近有蘇歩橋亦為蘇陳遊處横槎橋在蘄州西北五十里西河驛傍宋史李誠之傳嘉定十四年金人犯黄州誠之迎擊遇於横槎橋大破之大名橋在蘄州北赤東湖口明嘉靖十