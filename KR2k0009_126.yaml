霽善斷決訟為衰息境素有火災及虎患江水嘗暴溢壞民廬至是咸不為害九年賜誥旌異戴中新淦人成化時知黃梅縣蒞政明敏縣治學宫倉庫郵舍皆中所葺治莊轍上元人成化時知蘄州建明倫堂樂育堂貯書樓以教肓諸生時劇盜逼境兵民有𬒳殱者悉優恤其家潘珏婺源人成化中知蘄水縣不攜家纍廨宇蕭然人或勸新之珏曰我興一事民即多一事城內有津人競渡或致淹溺珏架梁以鐵揵之民不病涉北郭外置倉二十四所又增修水次倉後知蘄州作阜民倉踰年大旱發倉賑民多所全濟益廣倉厫積粟至八萬餘石盧濬天台人宏治中知黃州府多惠政時三江口有水妖歲壞舟楫濬移檄投水中妖遂滅余貴綿州人正德間知黃州府寬猛適宜軍民安堵於城內鑿二十餘井以便民劉規巴縣人官御史正德中以忤劉瑾謫知麻城縣為政務以德化民王世祿廣德人正德中知麻城縣縣河每衝激為患世祿别鑿新河以殺水勢為政簡易愷悌事不繁而民賴以安楊最射洪人嘉靖間知黃州府清嚴峭直人不敢于以私凡乘傳貴人聞其風多迂道避之吳淮鎮江人嘉靖間知黃州府製學宫禮器建號舍數十楹於東坡書院拔諸生茂異者講習其中一時人材稱盛黎泮樂平人嘉靖中知麻城縣歲大祲盜賊蜂起泮擒數人治之仍命富民開倉庾平價糶食足而盜亦息尚德恆南充人嘉靖中知麻城縣建倉於𡵨亭以謹蓋藏便輸稅塗宗濬南昌人萬厯中知黃岡縣值歲飢流亡過半宗濬至勤恤民隱全活甚衆錢節用富順人知麻城縣萬厯初詔天下繕城節用出藏以充公費分作以均任役七閲月而城成閻士選江都人萬厯中知蘄水縣時方聖學諸生悅之稱關西夫子後殉甲申之難本朝乾隆四十一年賜諡忠節趙利珍滕縣人崇禎中知黃安縣流寇亂屢却走之賊相戒不敢近郊李希沆慶陽人崇禎中知黃岡縣時寇𦦨方熾希沆設四險集邑中義勇士拒守選四守以領之有警希沆輒單騎先馳如是者經嵗羣寇相戒謂黃岡鐵城鐵人勿敢犯魏時光南昌人廣濟縣典史素勇敢能以雙刀馳擊崇禎中流寇猖獗時光募勇壯夜襲賊營殺賊首數十人賊不敢薄已而賊間道奄至衆潰時光手持利刃砍賊賊環攻之𬒳執不屈死本朝乾隆四十一年賜諡烈愍馬人龍鎮筸人崇禎間知黃州府率兵千餘剿賊至麻城遇滿天星等數十萬衆力戰於隂山河賊尸蔽野會大雨賊四面攻之遂被害本朝乾隆四十一年賜諡節愍嶽璧蘄州人為本州衛指揮崇禎中流賊至被執欲降之厲聲罵賊賊刃之仆地將絶瞋目曰我死為鬼當滅汝時大雪血流丈餘目眥不合本朝乾隆四十一年明諡烈愍許文岐仁和人崇禎中知黃州府破流寇殺賊魁一隻虎獄有重囚縱歸省皆如約至擢江防兵備副使駐蘄州守蘄四年屢戰卻賊荆襄失守左良玉潰兵南下文歧立馬江口兵不敢犯十六年張獻忠陷城𬒳執不屈死本朝乾隆四十一年賜諡忠烈梁志仁江寧人崇禎末知羅田縣流賊羅汝才等攻城城陷志仁持長矛巷戰殺六賊力窮被執罵賊不屈死其妻唐氏同𬒳執亦罵賊死時教諭吳鳳來訓導盧大受典史單思仁同日死節本朝乾隆四十一年志仁賜諡烈愍餘三人祀忠義祠孫自一光山人知黃岡縣張獻忠陷城死之本朝乾隆四十一年賜諡節愍施廷賢浦江人黃梅知縣崇禎十七年張獻忠陷城巷戰𬒳執勸降不屈自刎死本朝乾隆四十一年賜諡節愍郭金城四川人崇禎末以裨將守羅田流寇薄城大戰斬首百餘追至英山賊大集困三日突圍轉戰力盡被執不屈死本朝乾隆四十一年賜諡烈愍蕭頌聖定遠人明末麻城教諭流寇陷城不屈死本朝乾隆四十一年賜諡節愍吳文奕福建人崇禎末蘄水縣丞寇亂守城南樓寢處數年城陷死之本朝乾隆四十一年豫祀忠義祠吳文燮福建人黃岡縣丞崇禎十六年張獻忠陷城守汛地不去死之本朝乾隆四十一年豫祀忠義祠童天申施州人明未蘄水訓導流寇陷城不屈死本朝乾隆四十一年豫祀忠義祠曽發祥鍾祥人明末廣濟教諭流寇圍城發祥協力堅守城陷死之本朝乾隆四十一年豫祀忠義祠孫瑋鍾祥人明末蘄水教諭流寇陷城朝服坐明倫堂罵賊死本朝乾隆四十一年豫祀忠義祠鄒孕孝臨川人蘄水教諭左兵至罵賊遇害本朝乾隆四十一年豫祀忠義祠本朝吕陽無錫人順治中為江防道僉事駐黃州平劇盜李有實等力行保甲以淸盜源民以蘇息白秉正奉天杏山人順治初黃州府同知斷事明決時東山屢不靖秉正剿撫兼行四閲月平定四十八寨丁期昌安邑人順治初黃州推官精律例多所平反舉亷官第一劉國安奉天人順治中知黃岡縣縣當水陸安衝徵發接踵國安長於肆應事集而民不擾縣多火患豫設撲滅其有警輒身先往救遂不成災胡效順邵陽人順治中廣濟訓導縣令以私忿辱士效順力申其冤陳通邑疾苦於上官士民德之王絲合肥人順治中黃州推官斷獄明慎每定爰書至忌寢食巡按多委以讞決范可奇康熙初知黃州府治道路築隄防於濱江渡口多設大舟以救溺施槥瘞骨至今傳其惠政于成龍山西永寧人康熙中知黃州府東山寇起成龍計擒渠魁餘黨悉平性剛嚴明決善斷疑獄姦豪斂迹時討吳逆大軍雲集成龍辦軍需勞續丕暮薑橚保德人康熙中知麻城縣定徵收條例催科不擾力行保甲法在任三年無盜警招來商旅縣大治舒士貴大興人康熙中知黃州府舊例市儈由府給牒猾吏藉派纍民士貴力革其弊刊碑永禁宋犖商邱人由廕生授黃州府通判政嚴而惠盜賊皆遠遁凋敝漸復捐俸修雪堂竹樓舊迹在任六載丁內艱去任百姓呼號送之祀名宦人物南北朝宋董陽西陽人三世同居外無異門內無異煙元嘉七年詔榜門曰篤行董氏之閭蠲一門租布唐李玭黃梅人開元時明皇立廬山使者廟詔所在學士製碑文作者六百八十一人獨玭文稱旨詔舉玭博學宏詞不赴或勸之玭曰世所謂詞學何如張九齡裴耀卿賢今概以相李林甫罷去豫安能保克終築室東山麻林窪稱衡門居士以壽終宋潘大臨字邠老黃岡人少警敏不羈以詩名與蘇軾黃庭堅張耒遊雅所推重弟大觀亦能詩龎安時字安常蘄水人兒時讀書過目輒記家世醫靈樞太素甲乙諸祕書及經傳百家之涉其道者靡不通貫著難經解數萬言又作本蔊補遺為人治病率十愈八九踵門求疹者為辟邸舍居之親視飦粥藥物必愈而後遣余玠字義夫蘄州人趙葵為淮東制置使留之幕中以功進工部郎嘉熙元年與元兵戰於汴城河陰有功授淮東提點刑獄淳祐元年提兵援安豐升制置副使尋授四川安撫制置使大更敝政徙合州城於釣魚山屯兵聚糧蜀以富實丞相謝方叔倡言玠失因召還一夕暴卒蜀人莫不悲慕梅應春字雪樵廣濟人寶祐進士初為餘干令遷瀘州安撫使有政績纍官禮部尚書子國淳工詩賦宋亡隱居不仕纍聘不起元薛天定蘄水人宋末聚義兵保鄉里世祖下江南拜為防守官纍官兩淮防禦都招討至治中寇至淮力戰死事聞贈總管諡威武周古象蘄水人宋末元兵南下古象被掠至幽薊遂贅蒙古氏生子未嘗喜妻問故曰母在鄉欲得歸省妻許之且囑曰母在當奉養毋以妾故復來及歸母尚無恙古象奉母盡孝母殁廬墓其妻亦終身不嫁聞妻亡古象重其義遂不更娶滕賓字玉霄黃岡人至大間為翰林學士有文名何朝舉廣濟人有志操師事饒魯養志巖阿不樂仕進吳應澍黃岡人好義樂施貧不能葬者助之多建橋築井以便民歲飢常設食於路詔徴不起御書西山處士賜之李清七蘄水人與弟清八俱以勇敢聞徐壽輝陷蘄召之將授官匿不出逼之不屈見殺鄉人立廟祀之李宗可蘄州人有勇略善槊余闕妻以兄女擢為州判統軍陳友諒攻安慶城破宗可橫槊入賊中擊殺甚多聞關死驅其家屬盡殺之乃自剄張大九廣濟人幼習左氏春秋見天下兵起遂隱陳友諒強起官之不可友諒怒刖其兩足明康茂才字夀卿蘄州人元末結義兵保鄉里太祖克集慶率餘兵來降太祖命為都水營田使興屯田陳友諒寇應天茂才設伏大破之攻左君弼於廬州從太祖大戰彭蠡伐張士誠大戰尹山橋磯其鋭卒遷同知大都督府事從大將軍徐達經略中原留鎮河中撫綏瘡痍民立石頌德陜西平留鎮山西後從征漢中還軍道卒追封蘄國公諡武義薛徴天定孫元末為兩淮水陸都統制太祖遣左司郎中吳明遠齎手詔召之遂渡江從太祖太祖屏人與語大悅令參幕府畫奇策屢中命督軍事軍政修飭徐麟字月齋廣濟人太祖起兵由儒士辟為司農田署令洪武初擢河南府同知時元降臣宋玉與其散卒謀叛以五更為期麟偵知戒司漏者故達晷刻以誤之黎明遣鎮撫胡溥率邏卒擒之就擢知府後改蘄州以便祿養吳琳字朝陽應澍子太祖下武昌詹同薦為國子助教與同並教胄子文采不如同而經術過之洪武六年纍遷吏部尚書踰年乞歸帝嘗遣使察之使者至傍舍一農人坐小杌起拔稻苗布田貌甚端謹使者前曰此有吳尚書在否農人斂乎對曰琳是也使者以狀聞帝為嘉歎劉廣羅田人有瞻略洪武中以軍功為指揮僉事守永平敵騎內侵廣率四十餘騎遇於城北力戰死之事聞遣使護喪至京賜鈔以葬劉文煥廣濟人與兄文輝運糧愆期當死文輝以長請坐文煥以兄子幼詣吏請代不已有司上其狀命宥之則文煥己死矣太祖書義民二字奬之張訓黃梅人官鴻臚序班告歸養親聞建文帝遇難拜辭其父士英曰忠孝不能兩全矣乃正衣冠北面拜投井死遂名其井曰忠井王聰蘄水人以燕山中護衛百户從起兵纍遷都指揮使封武城侯從邱福出塞戰死追封漳國公諡武毅薛均徵子性峻潔敦孝誼以薦舉赴南畿上十策授泰州同知旋除知合州治行為天下第一成祖時擢應天府尹益崇尚清約年七十七乞歸進秩禮部侍郎終於家王燾蘄水人七世同居少長三百餘人庭無間言巡方御史微服私造其門有二叟坐見一婦人抱嬰兒至肅然起立問其故曰此兒雖小諸父行也御史喜曰不謂此間尚有古風請於朝旌其門曰孝義鄭達字叔通廣濟人宣德中任盩厔知縣開渠溉田千頃秦民賴之秩滿會崑山大飢詔加達六品俸往蒞之始至尫羸載道達設粥賑飢疫作遍給醫藥全活百萬人曹翼蘄州人宣德中為御史巡按陜西劾鎮守中官占種屯田擅役士卒田迄還民正統四年授僉都御史督甘肅軍務鋤豪強恤軍士在邊十年以剛正見稱擢副都御史致仕吕鏞蘄水人正統時知淸流縣鄧茂七陷清流邑無城郭鏞力不支具服端坐庭中罵賊死趙説麻城人父母同日殁説負土成墳廬其旁有二白鵲來巢正統中旌表鄒來學字時敏麻城人宣德進士為戶部主事督餉關陜規畫有條正統中從征麓川有功十四年邊警以副都御史出督軍務扼險守隘邊境賴之景泰中巡撫南畿請存京儲備賑復設輪運法以省軍費道卒行笥惟奏議數卷謝昶字永明黃岡人正統進士由御史出知九江府有循聲巡撫貴州平麻陽筸子坪蠻有功後致仕歸周鑑字以人麻城人正統進士授御史景泰時按江西大學士陳循子不法鑑抵其罪遷雲南副使到官開寶泉壩溉田數頃後擢山東按察使乞歸劉訓字忠言麻城人正統進士知金壇縣有惠政邑人王豪錢澍貧而好學訓以俸資給後俱成進士吏部尚書王翺疏其治行為天下第一擢山西參政董朴字汝浮麻城人成化進士授行人後知重慶府厯參政所至稱亷直薄田敝廬終老為詩類陶韋時稱董五言子士毅為四川南充知縣一介不取有素菜布衣破繖羸馬之謡李文祥字天瑞麻城人成化進士大學士萬安重其才欲引附已款於家文祥素鄙安安屬題畫鳩文祥有春來風雨尋常事莫把天恩當巳恩之句安銜之孝宗即位文祥上封事語切直謫陜西咸寧丞宏治二年召為職方主事李汰字清之蘄水人成化舉人授永新訓導轉義烏教諭立教以操存踐履為先刻小學家禮等書俾學者講習修義烏縣志郡守饋之金汰受之以修學宫考績還家遂不仕周廷徴字公賢麻城人正德中以教諭擢御史按陜西時安化王置鐇反廷徴與遊擊仇某計擒之既而太監張永至盡奪寧夏將士功寧夏幾再變廷徴力為撫定而白其功於朝升九江兵備流賊劉六等南窺廷徴晝夜籌畫賊不敢逼張思齊字希賢蘄州人宏治進士授四會知縣邑罹水患民相聚為盜思齊築隄别為渠以導水遂成沃壤擢四川僉事有河曰麻衣灘水險壞舟思齊治之不復為患尋改霸州副使有民控中官奪産者思齊歸産於民沒中官家財入官上其狀部使者不報遂投劾歸馮翺宇世舉蘄州人為諸生時旁舍火翺負其母及先世告身以出餘無所問二弟早亡撫其孤如己子為兖州推官治獄多所平反郡守委督所屬逋賦故有賂遺或以例告翺驚曰此何例耶召賂者亟還之民陳大中字時甫蘄水人正德進士知慶遠府土官舊各贄金帛於守大中卻之獞酋藍錢壓為寇商旅非結衆持械莫敢行大中率民兵直搗其穴擒其酋戮其黨境遂安擢轉運使致仕邢寰字伯宇黃梅人正德進士厯吏科都給事中時帝幸大同久而不返寰等疏請駕還復偕同官力諌皆不省尋詔躬往泰山進香寰等伏闕固爭帝遣人慰諭始退太監畢真保宸濠孝行寰疏駮之宸濠反帝假親征南幸屢請回鑾世宗即位多所舉劾終官南昌知府張正福羅田人正德中流冦掠黃州正福及弟正顯姪友舜友珠應募剿賊皆深入賊壘力戰死沙瑞字鳳翔黃梅人事親至孝任王府紀善宸濠反瑞泣諫宸濠恚曰若不從且死瑞曰死何傷豈可失臣節宸濠囚之瑞慟哭自經死劉天和字養和麻城人正德進士自禮部主事改御史按陕西忤鎮守中官廖鏜被逮部民哭送者萬餘人下詔獄謫金壇丞嘉靖初纍擢右僉都御史督甘肅屯政奏當興革者十事田利大興改撫陜西請撤鎮守中官及罷為民患者三十餘事帝皆從之洮岷番蠢動平湖店大盜及漢中妖賊天和皆討平之改理河道疏汴河及山東七十二泉不三月訖工因歲飢蠲徭賦尋以兵部侍郎總制三邊倣秦紘雙輪車以禦敵濟農頻入冦敗之晉尚書又屢破濟農殺其子小十王後召還朝專督團營陶仲文以刺迎稱戚屬天和返其刺曰吾中外姻連無是人仲文銜之屬言官劾其老遂乞歸卒贈少保諡莊襄濟農舊作吉囊今改正石金字南仲黃梅人正德進士授御史立朝敢言與漢陽戴金齊名江西副使胡世安發宸濠妤狀逮詔獄舉朝莫敢言金力救之嘉靖初按廣西土官岑猛亂金與尚書王守仁戮力勦平世宗用方士邵元節祈禱禁中金上疏切諌復與喻希禮上言時政疏入俱謫戍久之宥免許恩蘄水人弱冠時鄰家火延及恩舍恩冒烈𦦨救母俱焚死火止骸燼止存兩手尚抱母身曹圭字廷獻黃岡人正德進士纍官御史出按廣西平猺獞有功復按陜西時武宗遣中官迎指揮韶鳳妻過陕圭遮留疏論之竟得已厯官清儉所有餘俸不置私産與異母弟共之王廷陳字稚欽黃岡人由進士選庶吉士武宗南巡與同館舒芬等七人疏諌帝怒罰跪五日杖於廷出知𥙿州忤巡按御史喻茂堅削籍歸廷陳才高以詩文著名有夢澤集行世王澄字克清羅田人正德進士初令番禺有政績厯官户部郎中時尚衣太監王某恃寵而橫奪民田産園林澄奏還之氏督淮餉歲大飢割俸以賑全活甚衆郭慶字善甫黃岡人正德中舉人質直力學聞王守仁講學東南徒步往從之三年始歸充然有得授清平令勤於撫字割俸給貧民牛種五年乞歸民立祠祀之吳璋黃岡人倜儻負氣長折節讀書為邑掾吏嘉靖初議大禮諸臣忤旨被譴甚多璋曰吾豈不可效陳東之於李綱乎徒步詣闕上書申救楊廷和等語激切甚世宗怒下錦以衛獄杖八十後數日太廟災世宗問曰湖廣上疏小吏何在守者疑帝不能容壓死以報世宗曰惜哉朕有以用之也喻希禮字節之麻城人嘉靖進士擢御史會議大禮杖謫者多斃荒徼希禮上疏極諫時禁中建醮壇希禮亦極諫世宗震怒大學士力救之廷杖謫戍六安十餘年會赦歸史玉明廣濟人父早喪傭工奉母母老艱起居玉明負至田間躬自進食母卒廬墓側有虎患或勸其遷居玉明泣曰吾父祖在此雖為虎食不忍去也虎至玉明拜之弭耳去嘉靖初卒於墓舍鄉人建亭顔曰孝子立碑於所耕田畔以旌心張明道字希程羅田人嘉靖進士厯官江西按察副使少有大志不營財利嘗著綱目發明居官清約政績𢡟著為一時循良之冠黃卷字景文麻城人嘉靖進士仕至陜西副使年四十餘致仕躬耕經歲不入城市同郡耿定向周宏禴往訪嘗竊窺其室一敗榻而已嗟嘆久之劉采字與質麻城人嘉靖進士初知宿州會歲飢約已𥙿民妻孥僅供饘粥當路督課急采移帑金代輸至秋民爭償無逋者厯郎署藩臬二十五年所至以亷能稱遷副都御史巡撫山東先是邊食告匱詔采礦金又每歲秋屯兵􅎔淸以防入衛御史請開膠萊河通海運東人甚苦之米悉為奏罷纍遷南京戶部尚書致仕胡明庶字公輔羅田人嘉靖進士篤志力學尤精理數嘗取皇極經世律吕新書章分句解衍為圖弟明睿力學多聞兄弟友愛建書院於黃道山麓以經學教授生徒胡明通羅田人幼育於諸兄事兄如父同居四十年庭無間言領鄉薦以兄疾不會試兄卒以己産卑兄子後知信豐縣值嵗飢設法賑濟捐俸以益之弭盜有功擢判金華府甫一月聞母墓圯遂告歸家居儉約日講程未書不輟學者稱東郊先生弟明書同舉於鄉文學亦齊名著有元溪集方民懷字𢡟元黃安人嘉靖舉人絶迹公府者二十年嘗寓旅舍有女來奔叱之女跪曰父為債窘故耳民懷急取裳金周而遣之為林縣令五載多惠政陳萬卷字德僃黃岡人嘉靖間安平典史邑中白蓮教妖人聚衆謀襲城萬卷知之即日率鄉兵急搗其巢賊方會飲舉事聞萬卷至整衆出禦萬卷格鬬擒其帥賊作幻術甲騎起空中萬卷默禱大呼風雨驟至人馬皆墜乃翦紙為之也於是衆悉就縛所遺資財秋毫無取安平人立廟祀之顧問字子承蘄州人嘉靖進士纍官浙江僉事恬靜清謹人稱為茹菜顧公丁內外艱廬墓六年隆慶間任福建參政乞歸講明理學言動必本於道嘗自編日程疏功過耿定向稱之曰子承真聖人之徒也弟闕字子良嘉靖進士授刑部郎居喪同問廬墓纍遷福建按察副使年四十致仕弟兄俱以道學相劘切奚世亮字明仲黃岡人嘉靖進士官延平同知會倭入冦興化缺守上官檄世亮攝府事世亮疾馳入城固守固踰月親冒矢石城陷猶轉戰身𬒳數創死事聞恤廕瞿晟字景明黃梅人嘉靖進士授户部員外郎會有邊警晟計畫軍儲凡六十晝夜鬚髮盡白出知廣平府鑿長渠三百里築四閘蓄泄廣平自是豐饒耿定向字在倫黃安人嘉靖進士由行人擢御史劾吏部尚書吳鵬姦貪鵬以是罷督學南畿建崇政書院以講學巡撫福建平海冦晉户部倉場尚書告歸居天臺山與弟定力講明正學誨迪後進學者宗之卒贈太子太保諡恭簡李時珍字東璧蘄州人由諸生為楚王府奉祠正精於醫術著本草綱目精詳該洽萬厯時子建元以父遺表及書列上詔頒行天下時珍工文詞他所撰亦多袁文仕黃岡人性至孝兄某𬒳誣繫獄文仕代赴理死杖下高澄字汝清黃岡人大父暴疾刺血籲天請代疾愈大母雙瞽澄日舐之不飲酒茹葷入內者二十年目復明事父母飲食必嘗而後進父疾枕有百金欲卑季子澄令弟浣枕而佯外出父卒廬墓三年人以其所居稱南城公李學梅黃安人母殁日匍匐墓側棲榛莽間一日雨大作隔溪不能渡望墓號曰兒在此遇雪則藁卧雪中父歿亦如之師里人張高得聞王守仁之學為耿定向所重周宏祖麻城人嘉靖進士隆慶中為御史出督屯田馬政穆宗加恩宦寺宏祖馳疏切諫又請蠲淮南州縣被水馬戶折價請汰內府監局錦衣衛光祿寺文思院冗員及行社倉法詔皆從之災異陳言指斥時政詔市珍寶抗疏力爭萬厯中官至南京光祿卿王廷瞻字稚表黃岡人嘉靖進士為御史督畿輔屯政穆宗在𥙿邸欲易莊田廷瞻不可隆慶元年大雨水請蠲皇莊租又請限勳戚田從之萬厯中以僉都御史巡撫四川平番冦遷兵部右侍郎巡撫鳯陽開宏濟河於寶應至今賴之官至南京刑部尚書張步雲字子雲廣濟人由舉人纍官太平知府時酋長例得襲一酋未有子犯法繫獄直指録囚得偶歸而婦娠生子及議襲其弟謀奪之誣子非酋出賂步雲弗受乃拘父子於庭刺血驗之以情申監司監司受賂不直之步雲罷官歸劉天衢字一登廣濟人隆慶進士萬厯初為御史數上書指切政府出為山東僉事擢陜西參議駐興安興安患水天衢捐資築隄全活甚衆改雲南副使直指巡哀牢汰兵兵鼓譟劫執同知天衢穿隧通賊卧榻密出之賊大沮遂平之遷金滄道左參政值緬甸入冦天衢移駐騰衝集八郡材官及諸司土兵分討之盡復故地纍遷太僕卿致仕耿定力字子健定向季弟隆慶進士纍官按察副使督閩學頒楊羅李諸大儒微言以訓士遷操江僉都御史疏陳礦使之害官至兵部侍郎定力學以求仁為宗真修實踐超然自得周宏禴字元孚宏祖弟萬厯進士官順天通判劾奏兵部尚書張學顔及中官張鯨謫判代州遷户部主事時章奏多留中宏禴疏諫且請早建儲後擢御史巡視寧夏巡撫梁問孟取官帑交際劾罷之河東有秦漢二壩宏禴易以石濬北達鴛鴦諸湖大興水利尋坐事罷歸梅國禎字克生麻城人萬厯進士知固安縣政通人和暇日較射每就射所決訟數語立遣政最入為御史西部降人博貝反命國禎監李如松軍以往如松用國禎謀破賊博貝自焚死以功擢太僕少卿官至兵部右侍郎博目舊作哱拜今改正瞿九思字睿夫晟子少有異稟十五歲作定志論從耿定向遊厯主白鹿濂溪嶽麓石鼓書院萬厯初膺鄉薦為知縣張維翰所誣被逮子甲年十四上書訟冤得釋九思晚年作中庸位肓圖聲樂編實用編又作古樂測孔廟禮樂考等書以薦授翰林待詔不赴其門人張復湛深理學博極羣書所著有黃河源流圖考復休寧人居黃梅唐治黃岡人以掾授冠帶醇行若儒者鄰家火父柩在堂不及舁出治伏柩上為火所逼死而室獨存柩無恙萬厯中旌王大謨字允惟廣濟人萬厯進士知太湖縣御史列薦入為刑部主事錦衣張某卒孽子爭財自殺大謨􅏺之得實具詞平允神宗大悅每歲熱審中官南面尚書以下侍坐大謨進曰天威咫尺使者當下中官怒詬衆變色大謨不為動上疏爭之遷員外郎出督學雲南捐俸搆五華書院聚諸生講學擢廣西左參議致仕石崑玉字汝重黃梅人萬厯進士厯饒蘇二州知府淸勤愛民被誣客職尋起知紹興有惠政纍遷僉都御史巡撫大同在鎮四年威惠並著樊玉衡字以齊黃岡人萬厯進士由廣信推官擢御史性強直敢言疏請皇長子出閣講學及三王不宜並封神宗怒謫戍雷州長子鼎伏闕請代不許光宗立起官以太常少卿致仕閔廷甲字翼墟蘄水人萬厯進士授常州府推官廉直有聲擢吏部文選司郎中時神宗欲立福王為嗣廷甲同孟養浩等伏闕上疏力諫坐鐫秩後官至通政使吳化字敦之黃安人萬厯進士授鎮江推官數決疑獄遠近神之纍遷户部主事舒其志字元渚廣濟人萬厯進士纍遷江西按察使兼攝九江饒州二府事淮王惑於寵姫欲立其子而錮世子於私室姬子左右班校皆巨盜出沒彭蠡間剽掠其志廉得其狀悉捕置諸法旋謁王正譬之王悟立世子於宫中而罪姫及其子稅璫李道榷湖口關括財騰怨其志密令戍卒聚蘆葦中圍磯縱火道怖遁去熊嗣先字懷慎麻城人萬厯舉人官敘州府同知以督兵死於奢崇明之難事聞贈廕韋宗孝黃岡人事母至孝萬厯中為嵩明州吏自寇烏格陷城被執不屈闔門殉節贈本州同知烏格舊作阿克今改正田金浦字麗水蘄州人萬厯十六年流民劉少溪倡亂浦聚義勇捍衛鄉閭知州徐希明擢浦守營防禦本境會賊聲言攻城浦與州判陳策赴剿選騎深入斬首數十賊奔潰以力疲憩叢竹間賊忽大至奮臂殺賊不支而死其子宗演冒鋒刃負尸以歸鄉人建烈士廟祀之樊玉衝字棠軒玉衡弟萬厯進士知商城縣以德化民訟者多引去中使採礦至商城氣𦦨張甚玉衝不為動調崑山五年乞歸後督學董其昌請諡曰孝介從之李長庚字酉鄉麻城人萬厯進士授户部主事厯江西布政使所在勵清操擢副都御史巡撫山東盡心荒政民賴以蘇遷戶部侍郎督遼餉請留金花銀濟邊崇禎初起吏部尚書修撰陳于泰疏陳時弊中官王坤奏駮長庚劾坤後與溫體仁不合免官梅之煥字彬文麻城人少工騎射有將略萬厯進士授吏科給事中東厰太監李浚誣拷商人之煥抗疏劾之出為廣東副使平海冦表進進僉都御史巡撫南贛天啓初陳序劾之煥為楊漣黨削籍崇禎初起撫甘肅套冦入犯大破之溫體仁用事之煥遺書中朝暴其過惡悍卒王進才倡亂之煥誅之以溫體仁譖落職家居麻城多盜之煥率健兒助吏捕之無脫者十年流賊薄城勸鄉人子弟授兵登陴賊引去十三年復官卒胡士容字仁常廣濟人萬厯進士授長洲知縣有惠政天啓中纍遷薊州監軍僉事崔呈秀屬其妻弟為材官拒弗聽有贓吏捕急投崔氏第取論如法府縣為魏忠賢立生祠士容禁之遷江西副使被誣逮鎮撫獄崇禎初起輔陜西副使石有恆字泊常黃梅人萬厯進士知長興縣海冦至為所執不屈死之事聞諡忠烈劉僑字東鄉麻城人世襲錦衣職授北鎮撫司魏忠賢屬陷王文言僑不從削籍歸崇禎初起用命訊喬允升易應昌僑素重二人端方保全之後委緝六部十三省事僑極言耳目難信忤旨謫戍馮元揚疏僑忠直宜還職報可未用卒王一桂字爾持黃岡人萬厯舉人崇禎間以戶部郎督餉昌平昌平陷闔門死節凡二十七人事聞贈太僕卿本朝乾隆四十一年賜諡忠烈王家銯字愧修黃岡人天啓舉人崇禎中以户部主事督糧延綏秩滿將代李自成攻城家録留守堞多壞時天寒令運水冰城賊少卻會寧夏諸賊合攻援絶城陷引刀自裁獲救蘇蘸頸血書忠義二字復縊死事聞贈光祿少卿本朝乾隆四十一年賜諡節愍遊之雲字飛卿廣濟人崇禎時官陜西苑馬寺監正流冦圍城登陴拒守七日不食城陷死之本朝乾隆四十一年豫祀忠義祠鄧祖禹字又元蘄水人由武舉厯官遊擊屢立功出備辰沅破苗賊飛天王等崇禎中流冦入楚移鎮黃州屢戰卻賊總督令禦賊於應城賊圍之數重祖禹力戰被執欲降之祖禹曰須換卻心肝乃降賊怒剖其心本朝乾隆四十一年賜諡忠烈王教民蘄水人父三捷為樂陵丞崇禎中流冦􅊳至執三捷將殺之教民求以身代賊殺之而舍其父樊維城字紫蓋玉衡子萬厯進士為禮部主事天啓末魏忠賢用事謫上林院典簿崇禎初抗疏請誅忠賢及其黨張體乾等斫崔呈秀棺戮其尺褒恤楊漣等十四人召選賀逢聖等三十二人斥吏科程爾翼釋御史方震孺帝並從之纍官福建僉事罷歸張獻忠破黃州維城罵賊刃洞胸死本朝乾隆四十一年賜諡烈愍郭以重黃岡人世為衛指揮崇禎末黃州城陷自他所來赴難妻欲止之叱曰朝家卑我十三葉金紫不能易一死耶賊至欲脅之去露刀懾之以重即奪賊刀斬一賊俄賊麏至遂赴水死本朝乾隆四十一年賜諡烈愍易道暹字曦侯黃岡諸生好學尚氣節明末冠至子為瑚奉母走青峯巖道暹亦攜幼子為連出避道遇賊脅令從道暹厲色叱之賊將殺道暹為連請代賊並殺之未幾為瑚亦被殺本朝乾隆四十一年豫祀忠義祠張邦翼字君弼蘄州人萬厯進士官至江西布政使以廉能稱崇禎末家居張獻忠陷靳被害本朝乾隆四十一年賜諡節愍李新字即巖蘄州人崇禎舉人為陕西僉事家居城陷舉家被執欲降之抗罵不屈死本朝乾隆四十一年賜諡忠烈李梃字赤存蘄州人天啓進七知博野縣有異政擢遵化兵備副使善決疑獄歲飢設糜賑濟全活甚衆後家居張獻忠陷蘄不屈被害本朝乾隆四十一年賜諡節愍董一化字南鯤蘄州人以歲貢除知仁化縣平冤獄改知印江縣致仕流冦破城死之本朝乾隆四十一年賜諡節愍石礪字用之崑玉孫崇禎末冦熾礪破産繕城捍禦勞瘁死邑人私諡曰端毅周之訓字無逸黃岡人萬厯進士崇禎中官濟南副使大兵下濟南之訓望闕再拜死闔門死節贈光祿卿本朝乾隆四十一年賜諡節愍李樹初字客天蘄州人萬厯進士崇禎中官山西按察副使致政家居築磐石符險二寨以禦冦流賊破城被執不屈與長子廷慶同遇害次子具慶陳狀允祀鄉賢本朝乾隆四十一年賜諡節愍張開熙廣濟諸生素以忠孝自砥礪遭流賊亂罵賊不屈死本朝乾隆四十一年豫祀忠義祠王邦衡與其子鯉為羅田諸生同為流寇所執不屈死本朝乾隆四十一年俱豫祀忠義祠於斯行黃岡人流冦破團風鎮被執不屈死本朝乾隆四十一年豫祀忠義祠周啓元字善長黃岡人天啓舉人崇禎中知高苑縣流冦陷城殉節死本朝乾隆四十一年賜諡節愍饒京字黃山蘄州人天啓進士官御史自淮揚巡撫歸流賊陷城死之本朝乾隆四十一年賜諡節愍又同時死節者有諸生李化龍孫任盧如鼎如鼎以禦賊闔家被害乾隆四十一年俱豫祀忠義祠於斯昌黃岡人崇禎己卯舉人慷慨好節義以督師萬元吉薦授兵部主事協守贛州城破斯昌被執不屈死本朝乾隆四十一年賜諡忠愍余士瑋字季美黃岡人崇禎進士為九江府推官左兵叛抗節不屈斷其左臂父老泣扶出城越十日卒於廬山本朝乾隆四十一年賜諡節愍胡士定字振常廣濟人官潁州衛經厯流賊陷城罵賊死後其子玉成亦殉節本朝乾隆四十一年俱豫祀忠義祠蕭繼元黃岡人父為酷吏所斃與弟繼芃詣闕鳴冤書不得達而酷吏疑其從弟繼忠為翼誣以盜榜笞且死宗族牽纍者甚衆芃曰事急矣伍員伍尚事在也復具疏詞甚哀切繼元懷入自剄闕下竟得旨下芃刑部獄行撫按勘問抵酷吏罪出繼芃繼忠於獄芃天啓甲子舉於鄉馮雲路黃岡貢生好學勵行從賀逢聖講學寓居武昌崇禎十六年城陷投安湖死生員汪延升從雲路遊亦死焉本朝乾隆四十一年俱豫祀忠義祠熊一作雯黃岡諸生與本邑馮雲路同寓鄂城破前一日别馮云大丈夫當從節義中尋實地耳賊至怒罵奮身投荷池死本朝乾隆四十一年豫祀忠義祠徐斐黃岡人明末母為流冦所執斐請以身代不許母遇害斐罵賊賊磔殺之汪世植字晉卿黃岡人負母避流冦遇賊見殺時廣濟人陳類兒亦以救母見殺於流冦程為常蘄水人明末與徐玉蘭蔡巨人胡方壺徐用極督鄉兵禦流冦戰死本朝乾隆四十一年俱豫祀忠義祠史子見黃岡人明末里有毛主伯為獻賊偽總兵至新家衝招兵子見殺之賊怒下令三日不獲殺主伯者屠其鄉子見挺身往賊磔之肉俱盡骨猶屹立不仆乃鎖其頸骨於彰孝坊夜分鎖脫骨走臨湖寺次日賊大索獲之復刃其首至今鄉人以為神家祠之本朝乾隆四十一年豫祀忠義祠周應泰麻城人官寧羌知州崇禎十年流冦陷城以匿印罵賊與子蕖同時遇害本朝乾隆四十一年賜諡節愍方堯相黃岡人官成都同知崇禎十七年獻賊冦成都堯相協守監紀軍事兵食不足自投於池以救免城陷被執不屈遂殺於萬里橋下本朝乾隆四十一年賜諡節愍曹大震字子旦黃岡人為流冦所執不屈死本朝乾隆四十一年豫祀忠義祠程之奇黃岡貢生官荆門州訓導崇禎十五年冬闖賊攻荆門之奇與學正張郊芳盟諸生於明倫堂佐州牧守之援絶城陷俱不屈死本朝乾隆四十一年並豫祀忠義祠陳顯元蘄州人由副榜授新安令以城堞傾頺不利禦冦率士民入保闕門寨闖賊檄降立碎其檄及來犯死守月餘力竭而陷見賊怒罵遂支解死新安人立祠祀之年本朝乾隆四十一賜諡忠烈戴瑾字可懷黃岡人明末聚義兵禦流冦於馬鞍山之隘賊招之不降積薪焚之子孫及勇士三百七十人俱燼時同縣曹上謨王子見余季貞俱以扞城禦賊見殺本朝乾隆四十一年俱豫祀忠義祠盧爾惇字以崇黃安人博學知兵闖賊冦楚爾惇設方略募義勇賊不敢犯邑城應詔舉賢良方正授巴州牧獻賊入川所向無堅城巴城當賊衝被攻甚亟爾惇見一賊偉狀貌意必渠魁躬引火器中之墮馬復蘇偵之果張獻忠也報成都楊閣部嗣昌以便宜擢成都監軍副使卒以矢窮糧盡援絶城陷巷戰被創死周之茂字松如麻城人崇禎進士厯官工部郎中服闋需次都下闖賊至搜得之迫使跪不屈折其臂而死四十一年本朝乾隆賜諡烈愍余鈁字有定黃梅人以諸生為荆府鳴贊流賊陷蘄州竒其貌欲誘降之鈁罵賊賊怒殺之闔門皆被害本朝乾隆四十一年豫祀忠義祠本朝張百程字日闢黃安人能文兼精騎射明季冦亂百程應試安陸冦逼城射殺緋衣白馬賊遣健僕濟阻水婦女數百人結堡保聚鄉里土冦起討平之活其脅從者至本朝以壽終王躬俊黃岡人好義有智略立義學以訓鄉人子弟倣朱子社倉法倡捐米榖遇歲旱計口賑給孔子河有問津書院燬於兵紏衆捐修置田供祭國初東山未靖大軍進剿躬俊集鄉勇從軍籌餉贊方略不匝月冦平當事者議題敘力辭不受杜濬字于皇黃岡人詩文豪健自闢町畦有變雅堂集行世耿應衡字玉齊黃安人性孝友明末為諸生由徴辟授遵化司李國初纍官鄜州兵備道寧紹台副使初嘗遊江浙習知利弊及官台凡所因革悉中時務先是安邑賦役繁重雖有條鞭之法而里甲不淸胥役飛詭民不聊生應衡倡為書一之議始稱平公私皆便祀鄉賢官撫渙字萃之蘄水人順治初由國學生為會稽知縣郡守激民變撫渙亦遇害事聞贈按察司僉事嘉慶六年輔給恩騎尉世職劉子壯字克猷黃岡人文章雄健順治已丑進士第一授修撰請告歸嘗遊吳門有小吏被誣繫獄白縣令脫之捐金贖難婦俾完聚曹本榮字木欣黃岡人順治己丑進士改庶吉士以清節自勵纍遷至國史院侍讀學士初任編修時上聖學疏千言有嘉納之及任司業刋白鹿洞學規以教士奉詔敕同傅以漸撰易經通注九卷鎔鑄衆説詞理簡明為説經之圭臬又著五大儒語要周張精義王羅擇編諸書病亟門生計東在側猶教以窮理盡性之學子宜溥舉博學宏詞官檢討李本晟字暘若蘄州人順治已丑進士由部郎出治中河遷蒼梧道纍擢雲南布政使在官幾二十年淸修淡泊息事安人後奉裁歸里吳逆之變以本晟久轄滇南密遣諜授以偽劄晟縛以獻事聞授太常卿遷大理出為浙江巡撫益正己率屬屏絶苞苴蕭然若家食未幾卒賜祭葬汪基遠字星伯黃岡人順治己五進士知東鄉縣縣有劇盜基遠捕得其黨盜率衆劫縣遂遇害賜祭葬廕于嘉慶六年輔給恩騎尉世職王澤宏字涓來黃岡人順治乙未進士厯官禮部尚書疏請移湘口關還設九江商民便之尤工詩福淸魏憲稱其五古則鄴下彭澤七古則浣花徂徠近體則絳州鹿門飄飄乎如蟬蛻之遇秋風泠然善矣子材升材任俱善詩各有集行世宋必達字其在黃岡人順治辛丑進士知寧都縣時破闌賊張志在奉檄誅賊黨必達白上官免脅從者罷歸王風采字汝載黃岡人康熙己未進士授會稽知縣以戢豪強安閭左為務性強記城市窮鄉其富家窶子狹邪武斷之徒能厯厯指其名每一牘入懸揣之輒得其主使與曲折之故及坐􅈦事片語摘伏無遁情任會稽十四年民德之從祀名宦金德嘉字會公廣濟人父之純以舉人知興安州流冦薄城誓以死守及援至夾擊之圍乃解擢漢中知府會疾卒興安人廟祀之德嘉以順治十七年舉於鄉至康熙二十一年舉會試第一授檢討又七年告歸益肆力於詩古文具有法度陳大輦字子京黃岡人康熙壬戌進士授永安知州其地猺獞雜處諭以嫁娶喪葬之禮講學興教調西隆革頑輯暴以沿行第一擢福建鹽運分司厯分巡臺厦道整飭兵備培植學校撫綏番落生番歸化者八社以勞勩卒官張希良字石虹黃安人康熙乙丑進士官侍講致仕歸卒年八十有二希良湛深古學所著有春秋大義宋史剛文章瀚海格物內外編諸書其詩文為士林推重張金基字寶持廣濟人性孝友順治初負母避亂山中嚼雪得生康熙中以舉人授沔陽教諭教士有法卒官諸生泣送於江上者數百人孫如芝字素公黃岡人康熙中以舉人知筠連縣親喪歸次江安值吳逆叛賊帥執欲官之不屈死陶之駿黃岡人康熙中為茂名縣丞土賊倡亂之駿率兵禦之歿於陳事聞廕千劉醇驥字千里廣濟人性簡靜方直勤學不倦工古文辭嘗歎宋元來文體日卑奉左國史漢為矩矱顧景星字黃公蘄水人博學善詩文著白茅堂集黃公説字數十卷靖乃勷黃岡人家貧力學尤精三禮性慷慨有經濟才本境山冦蠢動乃勷力贊太守于成龍討平之子道謨康熙辛丑進士選庶常移疾歸為文深閎博雅根柢經史所著有禮記過庭紀聞編及果園全集行世高有功蘄水人康熙中署廣東虎門協右營都司征海冠戰死事聞贈廕賜祭葬胡搢思廣濟人康熙中為鎮安府通判時雲南土富州州判沈文崇子紹基作亂據府城搢思扺蓮化嶺賊拒不得入乃招集民衆并調田州等土司兵議剿賊遽棄城走據上甲馬隘搢思既入城官兵未至賊乘夜攻陷之搢思罵賊遇害乾隆二十九年豫祀昭忠祠瘳士貞黃梅舉人知營山縣值談宏黨彭時亨叛被執不屈賊怒殺之事聞贈按察司僉事賜祭葬廕一子應拔官汶川知縣嘉慶六年補給恩騎尉世職胡一漣字公侑廣濟拔貢官兖州通判先是香爐口河決久未治一漣躬督畚鍤工成擢東昌府同知內遷郎中出榷龍江關有亷名會荆襄長隄衝決一漣請發帑修築兩府賴之擢廣西觀察以道梗留廣東兼管學政旋授廣西布政使以疾致仕徐本仙字佑倫蘄水人康熙庚子舉人以知縣試用雲南權昆陽知州雲南有滇池方三百里而海口僅數文由柴厰達螳螂川有山溪五道旁入沙少淤流弗能惕近海田輒淹沒有建言五溪為一俾急流以刷沙者大吏訪於本仙本仙力言其害上官不能奪補文山知縣纍遷至糧儲副使酆正暹黃岡人為海城典史金川土豪王守祿通島舶為姦正暹巖治之守祿賂以千金不受陰賄庖人鴆之卒事覺守祿等六人伏誅鄧一隆黃岡人家世孝友一隆尤恭謹勤儉著家規十六條家訓四十二章嵗二次集男女序班會講又立功過薄以勸懲黎明子弟入孰誦讀婦女集內室冶女紅財物悉貯公所推一人掌其出入服食無私年老及有病者别優養之八世同居內外無間言雍正元年旌施惠蘄水人家極貧父卒傭其身以治喪葬日供王家役雞初鳴出拾蘆根以給母薪食則餘半以養母冬寒母無綿乃刈艾為絮以衣之負母避亂為賊所執叩頭流血乞以身代賊義而釋之雍正元年旌同時有戴華凌者居喪廬墓宋士吉者筆耕養母並旌王廷詔蘄州諸生有孝行奉母向氏避賊於黑山洞口值強寇來劫妻張氏以身蔽向連受三刃得免後母病疽張口吮之及卒廷詔廬墓三年同州有余藩者以守母柩不忍離受害妻張氏守節終身並旌徐生明字哉生羅田人父為流賊所執願以身代賊義而釋之及父卒廬墓三年子巨亦以孝稱王國英字紫衢蘄水人性孝友雍正五年以諸生舉孝廉方正授宛平縣知縣有惠政縣數被水逋賦積十餘年國英捐亷代償之後纍遷至廣東鹽運使劉洪度字若子廣濟人由國子生知岑溪縣猺獞時出剽掠洪度練鄉勇擒其渠魁諭以義而遣之遂感激向化擢知石屏州以進藏功晉威遠府同知擒土豪刁瀚除其害攝鎮遠府兼管恩樂縣事雍正五年猓黑犯城力戰死事聞贈知府曹大聲字子先黃岡人父疾侍寢不離中夜火起負父出不能踰閾為烈焰所逼死雍正七年旌吕希煜字孟陽黃岡人性至孝執父喪盜入其家索財無所得希煜守父棺不去遇害雍正八年旌李長青字春山黃岡人乾隆戊辰進士授福建寧德縣知縣洊升陜西同州府知府所在多惠政潔已奉公訓士愛氏嘉慶二十一年豫祀陜西名宦祠邱恩榮字駕六黃岡人乾隆辛未進士授萊蕪知縣屢剖疑獄鄰邑蝗起飭鄉氏豫為捕具入境依法捕之蝗遂絶調泰安疏治泰山泉源引汶水歸運河民甚利之纍遷嶽州知府調衡州卒於官劉崑黃安諸生嘉慶二年豫省教匪闌入黃安崑倡義捐資團練鄉勇設卡堵禦遇賊被戕同時遇害者弟洪子琪玉監生熊之炅熊文炳及熊席鼎熊萬輝能朝之熊擢楚熊孔朝熊立舉熊大研張永順俱於八年豫祀忠義祠王九兒蘄水人州判王悅民僕也順治初隨主行與流冦遇目主人使逸去賊擒九兒問主何在不言賊先剜其目次斷手每一揮刀問主何在終不肯言流寓南北朝宋鮑照東海郯人文辭瞻逸臨川王義慶在江州引為佐史客居尋陽唐李泌京兆人天寶中待詔翰林楊國忠惡之斥置蘄春郡宋陳宗達江州人義門陳伯宣之後康定初徙居黃梅以孝友著韓琦安陽人兄琚天聖中守黃州琦從兄於黃寓居安國寺讀書蘇軾眉山人神宗時貶汝州團練副使安置黃州軾與田父野老相從溪山間築室東坡自號東坡居士陳慥眉州青神人太常少卿希亮子遁於黃州之岐亭庵居疏食不與世相聞山中人見其所著帽方屋而髙因謂之方山子蘇軾謫居於黃過𡵨亭適見之為作方山子傳劉摰東光人紹聖初以在相位時改新法奪職居黃州再貶蘄州居住張耒淮陰人紹聖中坐黨籍謫監黃州酒稅徽宗立起通判黃州坐聞蘇軾計為舉哀行服貶黃州别駕安置於黃士人就學者衆朱服烏程人徽宗時坐與蘇軾遊貶海州團練副使蘄州安置陳過庭山陰人宣和中與蔡京王黼朱勔忤出知蘄州未半道謫海州團練副使黃州安置孫傳海州人宣和末高麗入貢所過調夫騷然煩費傳言索民力以妨農功於中國無益執政以其論同蘇軾奏貶蘄州安置元龍仁夫永新人至正中徙居黃州明五經為時矜式學者稱為麟洲先生吳大中弋陽人徙居羅田與其妻皆善事父母皇慶間有司以孝聞詔旌其門明詹同字同文婺源人元米遇亂家黃州太祖下武昌召為國子博士列女元張氏二烈女蘄州人父為總管長女年二十一次年十九俱未適人至正十一年冦遍蘄相攜投州北蓮花池死蒲忭女黃梅人年十六為紅巾賊所執欲汚之女紿賊於山橋僻處拔簪刺賊日仆地餘賊至追刃之罵不絶口死明劉烈女羅田人受姚氏聘未婚而夫殁人欲娶之不從縊死蔡永忠妻王氏廣濟人寡居數載姑逼嫁之赴水死李富妻項氏黃岡人正德中為流冦所劫投江死劉烈女黃岡人正德中流寇逼黃劫入舟中不為備女投江死胡烈女黃安人正德中年十六為流寇所掠欲汚之女曰死則死耳身不可辱賊怒刃之張烈女蘄州人正德中避寇於江南大山磯窰中賊搜得欲汚之女罵不從并其母邱氏遇害陶烈女羅田人正德中為流寇所掠罵賊死劉漢妻張氏麻城人正德中漢任商水知縣流冦至城陷張同女鸞山諡死張文秀女蘄州人正德間流冦逼蘄文秀攜女出避賊獲女欲汚之女罵不從被害杜鈺妻樊氏黃岡人鈺以救弟溺水卒樊不食死劉鵬妻盧氏黃岡人夫卒自縊死劉康妻熊氏麻城人許聘未嫁康病劇女割左股遺康食之聞訃請於父往哭慟幾絶姑泣曰女未適吾兒可無死女曰吾不死安歸卒死之王封帶妻杜氏黃岡人夫卒不食死張烈女未詳何許人已受聘父徙居黃岡之團風鎮復以女許富商女自剄死李文明妻胡氏黃梅人文明死胡廬於墓側植雙柏踰年皆茂收者偶折左柏枝胡號泣曰左夫道也左枝折吾夫其有遺憾乎浹月左長與右齊人咸以為誠所感朱廷傑妻陶氏黃岡人字廷傑未婚廷傑卒自經死程安國妻徐氏蘄水人夫卒投水死李新期妻申氏蘄水人夫卒強暴強委禽焉申斷髮不從強暴劫之至家自縊死姚相妻劉氏羅田人字相未婚相死人爭取之劉不從自經死周宏烈妻李氏麻城人夫病篤即不食先夫一日卒周宏祁妻喻氏麻城人夫卒以哀毁死奚世亮妻王氏黃岡人嘉靖中世亮殉節王甚少苦節七十餘年萬厯間三次存問年九十四卒詔建坊旌並賜葬秦一才妻杜氏大理人為黃岡秦一才繼室時年十八一才無子卒杜請其弟治兩棺三年喪畢服鴆以殉劉文妻毛氏麻城人又早死毛解書工詩求者百計勸誘卒不動壽八十餘旌表石元岱妻王氏黃梅人年三十餘孀居苦節至年七十有盜入室舉家走王獨不出盜執問故王曰吾夫棄世時屬我無踰此門直敢偷生以背遺口乎羣盜義而釋之蔡純仁妻張氏黃岡人年十七歸純仁甫期而夫殁舅姑欲嫁之張引刀割耳甓封其户寇掠鄉村張繫組於頸以待盜過門不入得不死純仁弟信亦夭其娣徐與張同居守節縣令應存初捐俸置産贍之王寵麟妻李氏麻城人夫卒後四十日不食戒家人勿遽蓋棺族衆果欺其遺孤李從棺中言豫知汝輩必出此衆慚懼去乃瞑董應長妻鄒氏麻城人夫卒絶食死賈爟妻袁氏黃岡人年十四適爟二年而爟亡遺腹生一女歸依其父獨處一室女紅之外翻閲內典比嫁女誡之曰汝往矣自汝父死吾目未嘗視男子婦人一生此目不可輕視人也聞者莫不敬服洗馬畈烈婦蘄州人不知其姓氏崇禎中為流寇所執矢不受汚兵以刃剖其腹婦以手抱嬰兒一手捧腹立以待夫夫至付兒放手死王靈妻孟氏蘄水人流冠突至露刃脅之上馬孟罵賊不從賊恚甚磔之何之旦妻李氏蘄水人流冦至逼之去不從賊衆共扶之李罵益厲嚙賊求死賊怒刺之創遍體死時一婢抱李幼女在側賊奪女將殺之婢不與因伏地以身翼女賊怒亂刺百餘創并女俱死徐一三妻畢氏蘄水人為流賊所執脅以刃抗聲罵賊遂見殺郭鞏妻柴氏蘄水人流冦至被執柴曰吾家纍世淸德安能從賊求生耶可速殺我即伏地求死賊就背間斫之見肝死南有杞妻李氏蘄水人性純謹事舅姑以孝聞為流寇所執促之上馬李厲聲罵賊不止乃亂斫之死楊啓顔妻王氏廣濟人啓顔病疽久潰王事之謹不辭勞瘁流寇至掠婦以行賊得他婦輒縛置馬上王紿之曰吾何逃行可也行十餘里躍入道旁大渠死越二旬尸植立水中面色如生馮如集妻龔氏廣濟人為流賊所執求死不得詭曰夫有珍寶埋某林中汝可取之指其處賊果往龔出佩刀自刺死張伯瑜女名褔媛廣濟人隨父避兵湖上冦至父為所傷女亦被執強使乘馬女不從大罵鞭之見血罵不絶遂被害張烈女廣濟人流冦入境與二嫂同避賊解帶自縊未死賊至解而蘇之女罵不從賊磔殺之潘龍躍妻唐氏廣濟人張獻忠破廣濟執龍躍欲刃之唐跪泣乞代死賊不許遽投水死女巽大亦從死賊意動始釋龍躍胡晬然妻聞氏羅田人崇禎中為流冦所執抗志不辱大罵曰賊奴速殺我賊怒支解之王烶妻胡氏羅田人流賊破城被掠逼汚之不從奪刀自剄死喻於義妻董氏羅田人流寇破城潛赴泮池溺死越十餘日面色如生蔡容遠女羅田人年十九流冦破城被執不從斷髮毁容賊婦力保全之經五日賊令