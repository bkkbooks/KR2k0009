賜諡忠烈羅萬象南昌人崇禎中知潛江縣始至會邑大飢民嘯聚剽奪萬象擒巨魁二人斬之其黨遂散沈夀崇宣城人明末為興都留守司賊破城壽崇朝服北面拜畢坐堂上厲聲叱賊賊直前砍之仆地曰得死所矣罵不絶口死一子同時遇害本朝乾隆四十一年賜諡烈愍張自新分宜人京山典史崇禎間統民兵往剿流賊死於羅漢嶺本朝乾隆四十一年豫祀忠義祠本朝李啓元大興人順治中知安陸府平易近民務存寬厚尤加意學校值湖南用兵措置軍需不擾民而事集以積勞卒官民祠祀之蔚之煥大興人康熙初安陸府經厯會剿西山寇李來亨等檄之煥轉餉隨軍至興山縣七連坪賊兵來犯堅守芻糧弗去賊執脅降不屈支解死事聞優恤人物漢劉焉字君郎竟陵人魯恭王後也居陽城山中積學教授舉賢良方正厯官宗正太常時靈帝政治衰缺四方兵寇焉建議改置牧伯乃出領益州牧犍為太守任岐及賈龍反攻焉焉擊殺之四子範誕璋瑁興平元年征西將軍馬騰與範謀誅李傕戰敗範及誕並見殺璋領益州牧從别駕張松説迎劉備以拒曹操遂出降備遷璋於公安南北朝宋張興世字文德竟陵人隨王元謨伐蠻征南郡王義宣俱有功官龍驤將軍領水軍拒袁顗建議以奇兵潛據上流遏其糧道顗衆飢走遂平江陵封作唐縣侯徙光祿大夫梁張齊馮翊人世居橫桑少有膽氣從南兖州刺史張稷為荆府司馬中兵參軍高祖受禪以翊戴功封安昌縣侯厯陽太守在郡有淸政吏事甚備遷巴西太守討平賊姚景和遷已西梓潼太守大破魏軍於葭萌在益部纍年與士卒同勤苦調給衣糧資用人無困乏既為物情所附蠻獠亦不敢犯威名行於庸蜀遷信武將軍卒官諡曰壯唐陸羽字鴻漸竟陵人不知所生有僧得諸水濱既長以易自筮得蹇之漸曰鴻漸於陸其羽可用為儀乃以陸為氏名而字之幼時其師教以旁行書答曰終鮮兄弟而絶後嗣得為孝乎師怒使執糞除汚以苦之又使牧牛潛以竹畫牛背為字得張衡兩都賦不能讀歎曰歲月往矣奈何不知書嗚咽不自勝因亡去為優人作詼諧數千言太守李齊物異之授以書遂廬火門山聞人善若在已見有遇者規切至忤人闔門著書久之詔拜太子文學徙太常寺太祝不就職嘗隱苕溪自號桑苧翁又號竟陵子貞元末卒羽嗜茶著茶經三篇宋張徽竟陵人以詩名所著有滄浪集司馬光范純仁皆與友善弟徹七持使節八割郡符公清超邁以廉著節張迪竟陵人元豐進士纍官諫議大夫有諍臣風烈陳嘉言竟陵人為郡學諭文行著於鄉里開禧間金兵入境䝱之降嘉言大罵自沉於水同室六人俱死祝松竟陵人舉進士調長水簿端平𥘉城陷死之民立祠以祀元程巨夫名文海避武宗諱以字行京山人世祖時纍官集賢直學士奏陳五事取會江南仕籍通南北之選立考功厯置貪贓籍給江南官吏俸朝廷多採行之拜侍御史求賢江南巨夫薦趙孟俯等二十餘人帝皆擢用至元中僧格專政巨夫上疏請淸尚書之政損行省之權羅言利之官行恤民之事僧格怒奏請殺之不許出為閩海道肅政廉訪使至大中為翰林學士承旨皇慶中詔議行貢舉法巨夫言經學當主程朱文章宜革宿弊後以病乞歸特授光祿大夫給驛南還卒贈大司徒柱國追封楚國公諡文憲僧格舊作桑哥今改正明張從道字質德京山人洪武舉人判廬州永樂𥘉知徽州府調永平興學教民遇歲飢不待報賑發全活甚衆姚善字克一鍾祥人洪武舉人厯官蘇州知府吳中大治燕兵南下善密結常鎮嘉松四郡守練民兵為備建文四年詔兼督蘇松常鎮嘉興五府兵勤王未及戰燕王入京被執死之正德十二年崇祀鄉賢本朝乾隆四十一年賜諡忠烈梁用鍾祥人洪武中户部主事厯升重慶知府有善政卒官民遮道送如失所怙唐素京山人景泰舉人知崑山縣有殊政徵為南京御史擢廣西僉事從龍字雲峯鍾祥人成化舉人知麻哈州教以冠裳詩書擢知懷慶府致仕王希旦字景哲京山人成化進士纍官廣東僉事黎人作亂討平之郭軒字文載竟陵人成化舉人除盧氏教諭擢福建連江知縣卒官軒以剛正見重諸生顯者過縣必拜其墓孫交字志同鍾祥人成化進士尚書王恕薦為選郎交所推引皆正人正德時厯户部尚書遇四方告飢輒請蠲租發帑遣大臣賑恤裁抑近幸不少假用事者不便之遂罷歸世宗立起故官首請帝日讀祖訓寒暑毋輟經筵日講帝褎納焉時帑藏殫盧交裁冗食定經制宿弊為清罷減中官監督倉場者復請淸汰上林苑內臣多報許尋乞歸手詔加太子太保卒諡榮僖劉洪字希範鍾祥人成化進士厯官僉都御史巡撫貴州值米魯叛剪餘黨城其要處進右都御史周憲字時敏鍾祥人宏治進士厯官江西副使討華林賊被執罵賊死事聞贈按察使諡節愍憲兵敗時子幹救父力戰墮崖死詔旌其門曰孝烈魯鐸字振之竟陵入屈呼寵並逃時寵母未葬寵不肯去遂衰服迎賊賊執以去旋感其義釋歸後登鄉薦初杲字啓昭潛江人正德進士嘉靖初授御史議大禮引經抗疏忤旨廷杖幾斃後劾都御史席書憸邪側目尋轉河南僉事擢雲南參政乞休商大節字孟堅鍾祥人嘉靖進士知豐城縣厯廣東僉事以治行聞纍官右僉都御史巡撫保定召理院事諳逹薄都城詔城中居民及四方入應武舉者登陴守以大節率五城御史統之發帑金令便宜募士屢條上軍民急務比寇退復命兼管民兵經略京城內外訓練鼓舞軍容甚壯擢右副都御史經略如故仇鸞惡大節獨為一軍不受節制乃請畫地分守大節爭之帝方寵鸞責大節懷姦避難下獄論斬卒於獄隆慶𥘉贈兵部尚書諡端愍諳達舊作俺答今改正王格字汝化京山人嘉靖進士大禮議起格持正論忤張孚敬出知永興縣尋擢南京户部主事轉員外監稅蘇松升四川僉事調河南僉事分巡河北世宗南巡格不肯賂中官乃譖之被逮杖謫穆宗時授太僕寺少卿致任里居五十餘年著詩文百卷奉詔存問年九十四卒王宗茂字時育京山人嘉靖進士以行人擢南京御史時先後劾嚴嵩者皆得禍中外懾其威宗茂拜官甫三月即疏劾嵩負國八罪并劾子世蕃與其黨萬寀不法狀疏上謫平陽縣丞隆慶𥘉贈光祿少卿張師載字巨卿潛江人嘉靖進士擢南京給事中時嚴嵩柄國師載抗疏劾其黨嵩銜之出為萊州知府嵩令人伺其隙竟不可得歐陽柟潛江人事親孝一日羣盜入室獲其父柟挺以身代賊怒斷指流血父賴免後以歲貢官德興多善政錢錞字鳴叔鍾祥人嘉靖進士知江隂縣倭寇至力戰死之事聞贈廕曾省吾鍾祥人嘉靖進士纍官四川巡撫平土司祁蠻之亂拓地四百餘里以功進工部尚書高岱字伯宗京山人嘉靖進士官刑部郎中時董傳策張翀吳時來等疏劾嚴嵩嵩欲致之死岱力言於尚書鄭曉得遣戍又為治裝送之出郊嵩大恕會景王之國出為長史岱善屬文採國家大事為鴻猷録又著樵論楚漢餘談西曹集弟啓口山皆有才名劉侃字正言京山人嘉靖進士任户部郎廉正有聲出知成都府平薛兆乾擢洮岷道副使有善政厯官福建左轄所著有新陽詩草吳文佳字士美竟陵人嘉靖進士由徽州府推官擢刑户二部主事司榷臨清關以廉能聞厯吏禮兵工給事中督昭陵工省費巨萬郭正域稱其孝謹似萬石君厚德似陳太邱深造似程伯淳云劉寅字敬甫潛江人嘉靖舉人官山東道御史有經理川湖及飭從儉二疏剴切精詳以直諫名於時魯思字睿甫竟陵人嘉靖舉人嘗得其族人鐸闡發朱陸同異憬然有悟於知行合一內外交致之理晚年析理彌精從遊日廣人稱淨潭先生程宗簡字叔可竟陵人以明經補河南永寧訓導時京山李維楨觀察中州延以優禮曰鄉之望也敢以秩視於是藩臬皆矜式旋引老乞休居家一以至性典型子弟學富才敏所著詞賦得古人立言深旨年八旬邑宰以鄉飲大賓肅之辭不就其卒也維楨題所瘞曰程有道先生之墓熊湄字子退竟陵人著聖學歸一宗旨發明尊德性道問學為入德之門與雲夢彭魯岡孝感楊恥菴羅東山葉啓安本邑黃于麻鄒元芝諸君子相講貫學者稱為虎嶺先生鄒元芝字殿生竟陵人慧性自天日讀線裝書一寸著易學古今正義書學章句讀禮記聖學經義詩學章句誦春秋經學本義易見書信詩蔽禮約春秋不贊於漢儒訓詁之外獨闡聖學奧旨其他天文地理聲音律吕辨訛正謬皆有成書學者稱為三澨先生李維楨字本安京山人隆慶進士博聞強記王世貞再主文柄有後五才子之目維楨其一也由編修厯外任三十餘年天啓初召為南京禮部侍郎進尚書有大泌山房集周嘉謨字明卿竟陵人隆慶進士厯官四川按察使榷稅中官邱乘雲播虐嘉謨檄所司拒絶而榜殺姦民助虐者乘雲為少戢纍遷吏部尚書光宗即位鄭貴妃邀封皇太后嘉謨以大義責貴妃事乃寢光宗大漸嘉謨受顧命時李選侍居乾淸宫嘉謨草疏率羣臣請移宫楊漣左光斗繼之五日選侍始移噦鸞宫嘉謨秉銓公正無私惟才是任為魏忠賢所惡致仕歸忠賢黨周維持復劾之遂削籍崇禎初起南京吏部尚書加太子太保劉垓字達可潛江人隆慶進士初任太平推官有聲入為祠部郎吳中行趙用賢劾大學士張居正奪情廷杖垓救之𬒳謪起視雲南學政得士心致仕歸田閉門講學人士翕然宗之陳所學字正甫竟陵人萬厯進士厯官山西巡撫晉戶部尚書值楊漣疏劾魏忠賢禍且不測所學疏救不報璫邀閣部議事所學力折之忠賢默然遂告歸所著有松竹園諸集談完字伯起京山人萬厯舉人官銅仁推官移同知臨洮府俱有清節治行郝敬字仲輿京山人萬厯進士知縉雲永嘉二縣有聲擢戶科給事中時用師朝鮮餉不繼敬列上損益十事條奏屯田十六策山東稅監陳增貪橫敬屢劾之謫知江隂投劾歸杜門著九經解諸書起南京行人辭不赴劉應同字襟河潛江人萬厯進士知漢中府郡有張桓侯廟里人嵗為神娶婦一不應則多水旱疾疫蓋妖物慿之應同至火其廟一郡震懾是年亦殊無故里人感德立祠祀焉歐陽東鳳字千仞潛江人性至孝舉於鄉知縣憫其貧遺田二頃謝不受萬厯中成進士知興化縣遷知平樂府調常州遷潁州兵備副使並有政績胡承詔字君麻竟陵人由進士授來江令民苦徭役多逋亡承詔安集之調內江令民病鹽課乃親履勘諸井酌其平上官以為允並條馬價雜稅皆便於民旋擢主事遷郎中提學四川任滿遷河南參議當去蜀會奢崇明叛自留禦賊分扞東城卒以謀略取勝天啓末所在省會皆祠魏閹蜀撫尤其私人將庀材鳩工承詔持不可乃止會璫敗以計最升太僕卿鍾惺字伯敬竟陵人萬厯進士厯官南京禮部郎中僦秦淮水閣讀史有所見即筆之名曰史懷取厯代詩與同邑談元春商訂其所素取標新領異世傳詩歸是也又著隱秀軒集卒祀鄉賢曾發祥鍾祥人為廣濟教諭流賊陷城不屈死本朝乾隆四十一年子祀忠義祠孫瑋字公之鍾祥人為蘄水訓導流賊破城罵賊死本朝乾隆四十一年豫祀忠義祠胡恆字公占竟陵人萬厯舉人厯官川南道副使崇禎末流賊陷成都恆率諸路兵馳救戰敗被獲不屈死兄懷亦死李自成之難一年本朝乾隆四十賜諡烈愍黃卷字蘭輝鍾祥人天啓舉人事母至孝官呈貢知縣與上官語不合挂冠歸聞北京失守不食死本朝乾隆四十一年賜諡節愍談元春字友夏竟陵人天啓末鄉試第一事母孝善屬文所著有嶽歸堂稿鵠灣集與鍾惺並以詩名時稱為竟陵體元春好遊足迹遍東南喜揚人善士賴以成名者甚衆卒祀鄉賢歐陽璲字􅒖嶁潛江人崇禎中知盱眙縣廉明有聲後致仕歸流寇陷郢被執與妻同殉本朝乾隆四十一年賜諡節愍朱士完字符禺潛江人崇禎舉人流寇陷城被執至泗港士完囓指血書已盡節處遂自縊賊所過焚燬士完所題壁巋然獨存本朝乾隆四十一年豫祀忠義祠邱甡字兩生潛江人性至孝崇禎中流寇至母適病甡負母以逃遇賊以母病哀懇賊為之動但截其耳釋去越日母死於背棺而瘞之淺土甡號呼痛哭兩日忽有應聲自土中出啓視則母已蘇矣咸謂至孝所感郭鐄潛江人諸生之輅少子流賊至之輅誡諸子攜家屬避賊鐄兄鉶同父母俱遇害鐄聞之即訣妻子往求親骨凡枕骸沉尸靡不審視終不獲絶粒七日至尸盡處自沈水死兄鈿鍾為賊所執亦不屈死之彭大翮字仲翔竟陵人有學行京山郝敬遣子師之賊逼承天大翮上所著平賊方略當事不能用遂自立一寨同兄修翮姪龍躍聚衆擊賊斬獲甚衆賊怒乘雨夜襲之兵敗俱赴水死本朝乾隆四十一年豫祀忠義祠楊文薦字幼字京山人崇禎進士出萬元吉之門官兵科給事中元吉被圍於贑文薦奉使湖南過贑見事急即入城共圖守禦城破執送南昌不食卒姚文衡鍾祥人官商水知縣崇禎十四年前令王化行守城被害文衡代甫數月賊復陷城攜印赴井死本朝乾隆四十一年賜諡節愍陳纁字紘公鍾祥人崇禎進士厯官榆林道副使隨瑞王入蜀張獻忠破城舉家殉難一年本朝乾隆四十賜諡節愍王幹鍾祥諸生流寇陷城闔門赴水死本朝乾隆四十一年豫祀忠義祠李哲京山諸生為流寇所獲不屈死王應翼京山人官許州知州崇禎十四年闖賊陷城被害子國同死節本朝乾隆四十一年賜諡節愍從所向鍾祥人官刑部王事告歸崇禎十六年流賊陷城同子士默士熊不屈死本朝乾隆四十一年賜諡節愍劉振孫字麟似竟陵諸生賊陷承天振孫潛圖恢復謀泄遂遇害一年本朝乾隆四十豫祀忠義祠李向中鍾祥人崇禎進士授長興知縣調秀水福王時厯車駕郎中蘇松兵備副使唐王以為尚寶卿閩事敗避海濱魯王召為右僉都御史從航海進兵部尚書及大兵破舟下召向中不至發兵捕之以衰絰見帥叱之曰前聘汝不至今捕即至何也向中從容曰前則辭官今就戮耳乾隆四十一年賜諡忠節本朝劉延唐字延綏天門人明崇禎進士本朝順治初總督佟養和聞其賢委署荊西道副使招撫流寇小秦王等三萬餘衆綏輯安陸荆州襄陽三府流民父喪歸撫孤姪成立修縣學設義孰建橋梁掩胔骼鄉人德之王第魁字聚五鍾祥人順治中由生員特授荆州知府撫恤凋殘大著治績厯官江南布政使疏請蠲積逋集流亡全活甚衆生平以孝著崇祀鄉賢塗起鵬字當世潛江人順治中知平樂縣寇犯境力戰援絶城陷𬒳執不屈死贈廣西按察司僉事嘉慶六年補給恩騎尉世職盧偀字鴻士天門人順治進士康熙初知商南縣吳逆賊黨陷城不屈死十七年贈陜西按察司僉事賜祭葬廕一子嘉慶六年補給恩騎尉世職沈倫字彝士天門人順治進士康熙初知梧州府時梧疆初闢倫多方招徠民漸安集未幾大兵討尚賊倫籌兵食不纍民革鹽厰浮費以惠商後賊陷城不屈死之高登先字于岸鍾祥人言行不苟至性過人母死未葬流寇至守母柩弗去賊義而釋之順治中成進士康熙初知浙扛山隂縣除耗羡捐雜徭尤加意造士縣巨猾害民登先廉得之悉置於法盜聞之不敢入境十三年諸暨何克忠倡亂應耿逆守將征之不克登先單騎往諭立解散改知常熟縣詳請減蘇松浮糧擢知涿州州有水怪為害登先焚檄投水中怪遂絶高華鍾祥諸生父久賈滇南絶無音問華以母故不敢離比娶妻知婦能養即白其母往尋於是冒險阻衝瘴癘犯猛虎毒蛇之境屢瀕於死凡三年足迹幾遍晝夜號哭無復生理夢神語其父在某猓夷山中覺後求之果得其父乃奉以歸家貧身課讀妻紡績以供饘粥父卒以天年終鄉里咸稱其純孝云朱載震字悔人潛江人知石泉縣有循聲著東浦集力追古作者龔則敬字輿德天門人繼母殁廬墓三年芝産於側撫育弱弟備極肫篤王全臣字仲山鍾祥人康熙甲戌進士授汲縣知縣遷寧夏同知創開大淸渠民賴其利擢永北知府調平涼遷潼商道副使時大軍駐塞外轉輸不繼全臣集諸商帳中告之故俾盡出凡可食者以食軍償如值軍心始定閲兩月餉道通而上官諱言遲誤向所貸以給軍者皆諉為全臣虧項後事白特旨隨副都統范時繹往陜西辦理軍需明年往甘肅屯田效力全臣開墾草萊疏通水利漸成沃壤尋授安西兵僃道時土魯番向化安置瓜州全臣督率兵役闢地開渠築城堡及公私廨舍服食器用無不備具於是扎薩克公暨諸酋目胥得安堵龔學海字醇齋天門人乾隆丁己進士由編修厯官侍讀學士出為兖沂曹道以病歸起補嶽常澧道以罣誤降補貴州同知時逆苗香要等聚衆攻丹江土城卑薄恃江水為限學海先期盡收江船苗不得渡會大雨暴漲逆苗始星散官兵設計剿擒之總督吳逹善上其狀擢貴東道不數年卒於官周彥芝天門人貢生乾隆十一年以孝行旌流寓宋張伯常河南人隱居不仕移居郢州司馬光范純仁曾鞏俱有詩寄贈吕大防藍田人哲宗時上官均等論其墮壞王安石役法貶祕書監分司南京居郢州張耒淮隂人紹聖初謫監復州酒稅嘗構鴻軒於復後判黃州有望復州鴻軒詩元孔克學曲阜人通經學士林推重元末荆州學正寓沱潛間有集傳世胡興第江西人至正間僑寓京山築室佛指山下子孫三世同居明正統六年輸粟運關中賑飢命旌其門曰尚義之門列女元張楚材妻翟氏竟陵人年二十餘夫死守節終身與吳伯璋妻王氏至正間旌表明郢靖王妃郭氏鳳陽人武定侯英女永樂十二年王薨踰月妃慟哭曰王舍我去未亡人無子尚誰恃引鏡寫容付宫人曰俟諸女長令識母遂自經卒溫某妻唐氏京山人年十九夫卒立嗣守節終身又同縣黎忠妻魏氏王宗著妻熊氏祝喬年妻潘氏馮忠妻郝氏胡應科妻李氏俱少寡守節終身戴富妻徐氏鍾祥人夫早死撫孤守節又同縣陸鏜妻楊氏撫遺腹子守節張國詔妻黃氏夫死無子甘貧守節朱進妻高氏潛江人從舅姑官廣東年二十生二子舅姑與夫俱亡高扶三喪歸葬守節六十年又同縣方應奎妻陳氏年十七歸方生二子夫卒誓死守節終身宋允孝妻丁氏京山人年十七適宋才六月夫亡痛哭不食死任氏三烈任高四川人官竟陵訓導隆慶中升江西萬載教諭攜妻李氏及二女赴任舟宿華嚴湖羣盜挾刀突入欲汚高女長女瑞絶裾投水次女留罵賊𬒳殺李氏亦投水死三日尸浮水面交相抱面如生俱葬於竟陵謂之三烈墓劉崇文妻程氏竟陵人年十三未嫁崇文死請於父往奠成服謁舅姑閉門守節蕭瑞蛟妻沈氏竟陵人夫卒有欲奪其志者自經死初薦妻李氏潛江人年十七夫亡無子痛哭不食誓死以殉姑泣勸曰死固婦職吾老曷依則有俱死耳因勉進饘粥别處一室三十年如一日萬厯中旌梁宣文妻蔣氏潛江人年二十六夫亡遺孤甫四月鄰有富人賄其舅欲強娶之蔣抱子投河救得免遭舅姑喪負土成墳隆慶三年漢水夜漲鄰舍盡陷獨蔣室如故晨起亟遷居始陷聞者以為孝節所感萬厯中旌李某妻陳氏鍾祥人早寡無子歸父家守志坐卧小樓足不下樓者三十年臨終謂其婢曰我死慎勿以男子舁我家人忽其言命男子登樓舁之氣絶踰時矣復起坐曰始吾言若何而今若輩至此家人驚怖從其言目乃暝劉堪妻胡氏潛江人夫亡無子泣血旬日絶水榖舅曰奈吾老何勉起葬夫畢廬墓左歲一再歸省舅會大氷侵兆域親負畚鍤障之竟弗潰鄰火哭拜呼天風乃反歲飢盜起家人勸且歸避胡曰吾貧嫠也即不測此正吾死所萬厯中旌陳盛杬妻尹氏竟陵人年十六而寡足弗踰閾鄰火延及其寢姑促使避之扃鑰弗啓忽反風滅焰胡東谷妻戴氏竟陵人年十六夫死撫前妻子守節歲儉藜藿不充苦志不移劉芳聲妻吳氏竟陵人年三十無子夫溺死吳臨河泣七日尸浮起吳殮之誓與同穴其女適雙氏早寡與母同守節終身樊伯妻吳氏竟陵人夫死以毁卒王全壽妻鄭氏潛江人姑張氏病篤泣籲身代姑竟不起鄭哭踊哀痛不食死葬之日羣鳥悲鳴集墓人以為孝感劉世則妻田氏京山人于歸時夫己病朝夕供藥餌者三年竟不起既殮引繩自經侍婢救之因紿守者出闔户縊死王紹先妻陳氏鍾祥人紹先官昭勇將軍陳自幼喜讀列女傳紹先死陳年二十餘事姑以孝聞撫二子成立詔建坊旌年八十餘流寇陷城自縊死祝某妻李氏京山人年十五未婚壻病卒父母欲其改嫁佯許之自製衰服同母往拜柩前一慟幾絶遂不歸與姑同寢紡績以供饔飱崇禎九年以不從賊死李馥先妻胡氏鍾祥人年十七事姑以孝聞流賊犯境左良玉師潰沿江大掠胡掖姑避南岡嶺遇亂兵胡泣曰吾甘死姑側義不辱於賊溺水死徐夔妻談氏竟陵人談必昌女未嫁夫死誓不適人左良玉潰兵掠境逼辱不從遇害徐惟妻唐氏竟陵人二十七而寡流寇逼之不辱死張繼登妻曾氏鍾祥人繼登官中書舍人崇禎末城破義不受賊汚自縊死莫一杜妻歐陽氏潛江人崇禎末寇掠沔陽一杜偕父逃覓舟呼婦同行婦曰舟甚狹翁在吾願死此一杜父既渡復回舟抵岸將載婦騎已至殺一杜欲縶婦汚之婦罵曰吾名家子肯近汝賊耶賊怒磔之劉賢妻鄭氏竟陵人崇禎末城陷賊欲犯之鄭自焚死楊初泰妻徐氏鍾祥人崇禎末城破抱十齡女投天坑水中死同時吳璣妻張氏錦衣百户周鼎臣媳王氏生員李陪媳從氏俱以拒賊見殺柴學參妻劉氏潛江人學參為諸生崇禎末募鄉勇拒賊見獲縶之營中學參曰倡首者我也肯靦顔從賊耶賊遂殺之劉見夫死即求偕斃賊百計誘之不從賊怒解其尸王第魁妻江氏鍾祥人流寇將至與姒江氏同投水死李紹桐妻王氏京山人明末亂兵猝至王投潭死時同縣袁勳妻鄢氏袁紳妻楊氏袁昌運妻李氏皆罵賊死覽心亭婦人不知姓氏里居為流賊掠至亭上罵賊死徐同寅妻鄒氏竟陵人夫卒守節聞左兵西下不食死胡恆妻樊氏竟陵人恆為副使殉節死樊亦投水卒子之驊從死其妻朱氏刺面斷髮守節終身徐伯榮妻程氏竟陵人左兵西下攜女及子婦熊氏赴水死本朝朱若士妻張氏京山人夫殁強暴欲強娶之投花臺堰中死張喬妻楊氏京山人夫亡不食死順治年間旌邵世錦妻張氏鍾祥人未婚夫卒自經死康熙年間旌盧天樹妻高氏京山人夫亡未葬遭火起高繞棺呼天忽大雨如注火滅人以為精誠所感守節四十五年康熙年間旌鄧先培妻吳氏鍾祥人夫亡守節雍正十一年旌又同邑楊亦恭妻汪氏余世鏞妻彭氏陳慤妻溫氏朱燻妻徐氏龔朝柱妻李氏劉廷鋭妻朱氏羅應逵妻王氏李輝祖妻鄭氏監生鄭崑妻戴氏向楷妻陸氏生員王鈵妻塗氏龔輝先妻戴氏孫國楹妻謝氏賀賢佐妻曾氏雷舉參妻吳氏生員茹其璋妻宋氏邵國珍妻李氏杜文亮妻張氏生員賀天佐妻王氏劉鑒妻鄭氏原任廣西賓州吏目陸錦矅妻陶氏王世澤妻向氏王丈昌妻蔣氏舉人徐時會妻畢氏貢生韓文經妻張氏貢生艾似芝妻賴氏艾睿妻唐氏李有高妻胡氏周之紀妻馬氏陳國祚妻何氏鄧林妻蘇氏曾鴻妻龔氏胡朝縉妻章氏謝生瑛妻尹氏王瑜妻汪氏潘寅妻李氏陳格妻龍氏監生熊鉦妻楊氏李作正妻胡氏曾如瑛妻楊氏胡梓妻武氏監生曹志大妻王氏生員解聨魁妻曽氏周尚宗妻閻氏馮愷妻張氏韓士傑妻張氏韓士俊妻孟氏劉士泉妻李氏生員艾兆鸞妻張氏監生王式璠妻向氏左輔周妻朱氏項煒妻宋氏生員陳國銓妻聶氏陳禹妻龔氏賀耀祖妻薛氏劉大全妻王氏生員陳玉珣妻孔氏生員周慈永妻李氏舒維邦妻蔡氏王宏文聘妻楊氏吏員酆鳳巒妻陳氏朱浤妻蕭氏李惺妻熊氏劉栻妻鄧氏