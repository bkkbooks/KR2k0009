front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_070-1a}
body:
  text: 開封府四人物唐鄭元璹開封人性察慧愛尚文㙯隋不襲父譯沛國公爵更封莘國公唐初授太常卿突厥處羅可汗寇汾晉詔元璹諭罷可汗兵不聽囚之數年始得還帝曰卿可輩張騫蘇武矣拜鴻驢鄉突厥提精騎數十萬攻太原詔元璹持節往隨語折讓數其背約突厥愧服引還朝廷賜書褒美後轉左武侯大將軍以老致仕元璹幹敏所至常有譽五聘絶域危不脫終不自為解從孫杲知名武后世終天官侍郎郭孝恪陽翟人少有奇節不治資彥隋亂率少年數百附李密使與李績守黎陽密敗績遣孝恪送款封陽翟郡公拜宋州刺史詔與績經略武牢以東竇建德之援洛也孝恪上謁秦王進計曰王世充力竭計窮建德悉衆遠不糧餉阻絶若固守武牢以軍汜水隨機應變擒殄必矣秦王然之賊平置酒大會語諸將曰孝恪䇿擒賊王功固在諸君右遷上往國厯貝趙江涇四州刺史所至有能名貞觀中拜崑邱道副大總管進討龜兹中流矢卒鄭善果滎澤人父誠周大將軍開封縣公討尉遲迥戰死善果方九􅍲襲爵家人為其幼弗告也及受詔號泣不自勝入唐擢太子左庶子封滎陽郡公數為太子陳得失檢校大理卿兼民部尚書奉法持正風節顯公卿間詔與裴寂等十人每奏事得升殿時以為榮李元道世居鄭州唐貞觀初纍遷給事中姑臧縣男出為幽州長史都督王君廓不法每以義裁紏之嘗遺元道婢乃艮家子遣去不納擢常州刺史加銀青光祿大夫以祿歸第卒李日知滎陽人及進士第天授中厯司刑丞時法令嚴吏爭為酷日知獨平寬嘗免一囚死少卿胡元禮曰吾不去曹囚無生理日知曰僕不去曹囚無死法皆以狀讞而武后用日知議為給事中母老病取急調待數日鬚髮輒白母未及封而卒方葬吏乃齎贈制日知殞絶於道左右為泣莫能視服除纍遷黃門侍郎景龍初同中書門下平章事初安樂公主館第成中宗行幸燕從官賦詩日知獨以規戒睿宗他曰謂曰嚮非公挺直何能爾即拜侍中後乞骸骨許之開元三年卒劉仁軌尉氏人少貧賤好學以通博聞為陳倉尉部人折衝都尉魯凝豪縱犯法仁軌搒殺之擢咸陽丞纍遷給事中為李義府所惡出為青州刺史時伐遼使督漕而船覆沒坐免官以白衣隨軍初蘇定方平百濟留郎將劉仁願守其城後百濟復叛引兵圍仁願詔仁軌檢校帶方州刺史統衆並發新羅兵為援仁軌請所頒厯及宗廟諱謂人曰當削平遼海頒示本朝正朔皆如其言纍功封樂城縣男拜同中書門下三品咸亨五年為雞林道大總管東伐新羅破之進爵為公卒陪葬乾陵崔知溫鄢陵人仕為左千牛稍遷靈州司馬境有渾斛薩萬帳數擾齊民知溫表徙河北自是人得就耕遷籣州刺史黨項羌三萬入寇知溫披闔不設備羌怪之不敢進會將軍權善才率兵至大破其衆分降口五百贈知溫知溫辭纍遷尚書左丞永隆初特詔同門下三品遷中書令卒諡曰忠崔知悌知溫兄為中書侍郎與戴至德郝處俊李敬元等同賜飛白書贊而知悌以忠勤見表遷尚書左丞裴行儉之破突厥斬泥熟匐殘落保狼山詔知悌馳往定襄慰將士佐行儉平夷寇有功終户部尚書格輔元浚儀人父處仁仕隋為剡丞與同郡王孝逸繁師元靖君亮鄭祖咸鄭師善李行簡盧協皆有名號陳留八俊輔元擢明經纍遷同鳳閣鸞臺平章事忤諸武來俊臣誣輔元謀反遂及誅子遵亦舉明經第亡命匿中牟十餘年神龍初訴父冤擢贊善大夫輔元兄希元洛州司法參軍同章懹太子注范蔚宗後漢書者吳兢浚儀人少厲志貫知經史方直寡諧惟與魏元忠朱敬則遊二人薦兢才堪論撰詔直史館修國史纍遷起居郎明皇時數陳得失帝頗納之進封長垣縣男卒年八十兢敘事簡核號良史初與劉知幾撰定武后實録敘張昌宗誘張説誣證魏元忠事賴宋璟等激厲轉禍為忠後説為相屢以情蘄改辭曰㧦公之情何名實録卒不改世謂今董狐云白履忠浚儀人貫知文史居古大梁城時號梁邱子景雲中召為校書郎棄官去開元十年刑部尚書王志愔薦履忠博學守操國子監祭酒楊瑒又表其賢召赴京師辭疾不任職詔拜朝散大夫乞還手詔許逰京師徐反里閭履忠留數月乃去鄭潛曜滎陽人父萬鈞駙馬都尉滎陽郡公母代國長公主開元中王寢疾潛矅侍左右造次不去纍三月不靧面主疾劇刺血為書請諸神丐以身代火書而神許二字獨不化翌日立愈戒左右無敢言後尚臨晉長公主厯太僕光祿卿鄭虔滎陽人天寶初為協律郎元宗愛其才置廣文館以虔為博士虔善圖山水好書嘗自寫其詩并畫以獻帝大署其尾曰鄭虔三絶遷著作郎安祿山反偽授虔水部郎中因稱風緩求攝市令潛以密章達靈武賊平貶台州司户參軍事後數年卒虔學長於地理山川險易方隅物産兵戍衆寡無不詳嘗為天寶軍防録言典事該諸儒服其善著書時號鄭廣文劉昌開封人善騎射天寶末從張介然討安祿山史朝義圍宋州城中食盡且降昌説刺史李岑以待救俄而李光弻援兵至賊夜潰劉元佐鎮汴擢昌左廂兵馬使以三千兵守寧陵李希烈衆五萬攻之相距四十餘日賊數敗乃解去加檢校工部尚書貞元中遷四鎮北廷行營兼涇原節度以㓛檢校尚書右僕射封南川郡王在邊凡十五年軍有羡食邊障以安朱忠亮浚儀人舉明經不中往事薛嵩為禆將屯普潤開田峙糧以功擢太子賓客朱泚亂率麾下四十騎至奉天封東陽郡王為定難功臣憲宗立授涇原四鎮節度使改封丹陽卒鄭雲逵滎陽人登進士第去客燕朔朱滔辟為判官滔助田悅雲逵諫不從遂棄室自歸德宗擢諌議大夫帝在梁雲逵依李晟晟表以為軍司馬元和初為京兆尹卒鄭餘慶滎陽人少善屬文擢進士第貞元十四年拜中書侍郎同中書門下平章事每奏對多傅經義以事貶柳州司馬憲宗立復拜同中書門下平章事時主書滑渙與宦人劉光琦相倚為姦執政頗姑息至餘慶議事渙傲然指畫諸宰相前餘慶叱去後渙以贓敗帝寖聞叱去事善之纍遷尚書左僕射帝患典制不倫謂餘慶淹該前載乃詔為詳定使凡增損儀規號稱詳衷穆宗立加檢校司徒餘慶少砥礪行己完潔仕四朝其祿悉賙所親後生內謁必諄諄教以經義卒諡曰貞鄭珣瑜滎澤人少孤值天寶亂退耕陸渾山以養母不干州里大厯中以諷諫主文科高第授大理評事纍遷吏部侍郎為河南尹清靜惠下召進門下侍郎同中書門下平章事順宗立王叔文內交閹人攘撓政機韋執誼為宰相居外奉行與叔文同飯閣下珣瑜曰吾可復居此乎命左右取馬歸臥家不出七日罷為吏部尚書卒諡文獻鄭絪餘慶從父行也幼有竒志善屬文擢進士宏詞高第纍遷中書舍人德宗置六軍統軍除制用白麻中尉竇文瑒陰諷宰相進擬如統軍比絪當作制奏言陛下特以寵文瑒耶遂著為令也帝悟并罷統軍用麻順宗病不得語王叔文與牛美人用事憚廣陵王雄睿欲危之帝召絪草立太子詔絪輒書曰立嫡以長帝頷乃定憲宗即位拜中書門下平章事太和中以太子太傅致仕卒諡曰宣絪本以儒術進守道寡欲所居不為烜赫事以篤實稱善名理學世以耆德推之鄭覃珣瑜子以蔭輔宏文校書郎擢諌議大夫憲宗取五中官為和糴使覃奏罷之寶厯初擢京兆尹文宗召為侍講學士進工部侍郎覃於經術該深醇篤守正帝尤重之拜同中書門下平章事封滎陽郡公覃既名儒故以宰相領祭酒請太學五經經置博士武宗初授司空致仕卒覃清正退約位相國所居第不加飾內無妾媵鄭朗覃弟始辟山南幕府入遷右拾遺擢起居郎文宗與宰相議政適見朗執筆螭頭下謂曰向所論事亦記之乎朕將觀之朗曰臣執筆所書者史也故事天子不觀史帝悅謂宰相曰朗可謂善守職者纍拜工部尚書同中書門下平章事中人李敬實排朗騶導馳去朗以聞宣宗即斥敬實久之以疾自陳罷為太子少師卒鄭浣餘慶子本名涵第進士纍遷右輔闕敢言無所諱憲宗謂餘慶曰涵卿令子而朕直臣也可更相賀遷考功員外郎時刺史或迫吏下紀功愛涵請責觀察使以杜其欺文宗立入為侍講學士帝使萃擷經史為要録愛其博而精試舉諸條摘問之隨即酬析無留答因賜金紫服纍進尚書左丞出為山南西道節度使以户部尚書召未拜卒諡曰宣子處誨文辭秀拔仕厯宣武節度使撰明皇雜録為時盛傳鄭肅滎陽人以儒世家肅力於學有根柢第進士書判拔萃輔興平尉纍擢太常少卿博士有疑議往咨必據經條答開成二年拜吏部侍郎兼賓客為太子授經既而太子為讒所乘肅因入見言天下大本不可輕動意致深切帝為動容朝廷謂肅臨義不可奪挺挺有大臣節會昌五年以檢校尚書右僕射同中書門下平章事與李德𥙿協心輔政宣宗即位罷為荆南節度使卒諡文簡孫仁規仁表皆豪爽有文劉瑑仁軌五世孫第進士遷左拾遺諫罷武宗方士言多懇愊大中初擢翰林學士宣宗始復關隴書詔夜數十瑑捉筆遽成辭皆允切遷刑部侍郎乃裒彚敕令可用者由武德訖大中凡二千八百五十六事參訂重輕號大中刑律統類以聞法家推其詳進宣武軍節度使徙河東節度使未幾詔同中書門下平章事領度支加工部尚書卒鄭從讜浣子及進士第輔校書郎咸通中為吏部侍郎銓次明允出為河東節度徙定武以善最聞改嶺南節度交廣晏然僖宗立召為刑部尚書擢同中書門下平章事河東兵亂復拜河東節度兼行營招討使既視事推捕反賊誅其首惡士皆寒毛惕伏中和三年召拜司空復秉政以􅔂乞骸骨拜太子太保還第卒諡文忠鄭亞滎陽人爽邁有文舉進士賢良方正書判拔萃三中其科李德𥙿高其才守浙西辟置幕府擢監察御史纍拜給事中出為桂管觀察使貶循州刺史卒鄭畋亞子舉進士以書判拔萃擢渭南尉宣宗時入翰林為學士知制誥僖宗立以兵部侍郎進同中書門下平章事請以嶺南鹽鐵委廣州節度使嵗煮海取鹽直四十萬緡市虔吉米以贍安南罷荆洪等漕役再遷門下侍郎封滎陽郡候乾符六年罷明年為鳳翔隴西節度使黃巢陷東都遣兵戍京師以家財勞行妻自紝戎衣給戰士帝之梁洋畋請便宜從事賊將王璠來攻畋設伏兵鏖戰殺賊二萬級與涇原諸帥約盟傳檄天下遠近咸聳各思治兵立功巢大懼因是不敢西謀復拜司空門下侍郎平章事坐籌帷幄終能復國卒諡文昭鄭裔綽覃子峭立有父風以門蔭進纍遷諫議大夫宣宗初劉潼授桂管觀察使裔綽固爭潼𬒳責未久不宜付廉察帝追罷之遷給事中楊漢公為荆南節度使坐貪沓貶尋拜同州刺史裔綽與鄭公輿封還制書諫曰同州太宗興王地當愼所付且漢公墨沒敗官奈何以重地私之帝變色翌口貶商州刺史後終太子少保鄭綮滎陽人及進士第厯廬州刺史􅍲滿去贏錢千緡藏州庫後它盜至終不犯鄭使君錢遷給事中杜宏徽任中書舍人綮以其兄讓能輔政不宜處禁要上還制書不報輒移病去昭宗時拜禮部侍郎同中書門下平章事張士巖汴州人性至孝父病藥須鯉魚冬月冰合有獺銜魚至前得以供父父遂愈母癰士巖吮血父亡廬墓有虎狼依之五代梁王延鄭州長豐人少好學嘗以賦謁梁相李琪琪為之稱譽拜中書舍人權知貢舉人皆稱其公纍遷刑部尚書以太子少保致仕卒延為人重然諾與其弟規相友愛五代之際稱其家法焉宋梁周翰管城人幼好學十嵗能屬詞周廣順二年舉進士宋初為祕書郎直史館乾德中獻擬制二十篇擢右拾遺五代以來文體卑弱周翰與高錫柳開范杲習尚淳古齊名友善當時有高梁柳范之稱改左輔闕會將郊祀上疏請減諸道租賦以寬民力雍熙中兼史館修撰復置左右史命周翰與李宗諤分領之咸平三年召入為翰林學士受詔與趙安易同修屬籍唐末喪亂籍譜罕存周翰創意為之頗有倫貫遷工部侍郎卒有集五十卷及續因話録趙修己浚儀人少精天文推步之學晉天福中李守真表為司户參軍軍中占候多中守真陰懷異志修己屢以禍福諭之不聽遂辭疾歸周祖鎮鄴奏參軍謀密與決渡河之計即位以為鴻臚少卿遷司天監顯德中纍加檢校户部尚書宋初遷太府卿判監事石守信浚儀人仕周領洪州防禦使太祖即位改領歸德軍節度李筠叛守信討平之移鎮鄆州乾德初稱疾乞解兵權帝從之纍拜中書令加檢校太師晉封衛國公卒諡武烈薛居正浚儀人少好學有大志後唐清泰初登第宋建隆三年為樞密直學士乾德初加兵部侍郎時河南府飢逃亡者四萬家居正馳傳招集浹旬間民盡復業以本官參知政事監修五代史逾年畢進平章事益修政事以副上意太平興國初進位司空卒諡文惠居正性孝行純居家儉約為相任寬簡不好苛察士君子以此多之好讀書為文落筆不能自休子帷吉集為三十卷上之賜名文惠集咸平元年配享藝祖廟廷和峴浚儀人父凝晉宰相峴厯任著作郎建隆初授太常博士乾德中詔峴議禮多所更定帝以雅樂聲高詔峴講求其理以均節之自是八音和暢纍官太常丞分司西京端拱初以所著奉常集五卷祕閣集二十卷注釋武成王廟讚五卷奏御上甚嘉之授主客郎中卒弟㠓太平興國八年擢進士第增益父凝所著疑獄集為三卷并輔注古今孝弟集成十卷以獻纍官左正言與王旦同判吏部銓劉廷翰浚儀人父紹隱晉天福中以隊長戍魏博范延光反力戰死周世宗鎮澶淵廷翰以膂力隸帳下即位纍從征伐宋初預平上黨維揚太平興國時遷雲州觀察使率兵屯真定遼兵南侵廷翰大敗其衆於蒲城以功領大同軍節度纍官大名尹天雄軍節度廷翰自衛士至上將寬厚容衆雖不事威嚴而長於御下高頔雍邱人後唐清泰中舉進士乙科周顯億中為天雄軍掌書記以病免雍熙中宰相宋琪言其素行廉介老而彌厲拜左補闕致仕卒頔有清節力學強記手寫書千餘卷符彥卿待之甚厚或過致優給頔計口受費餘皆不納孔守正浚儀人周世宗征淮南以材勇選為東班水旨宋初遷驍雄副指揮使太祖征太原遼兵來援晉陽守正大敗之從征晉陽率兵力戰晉軍遂潰從征范陽擊敗遼兵自是遼兵不敢近塞纍官安化軍留後卒許均開封人建隆中應募征遼州以功輔武騎十將開寶中從征金陵率衆陷水寨從征河東攻隆州城先登遷副都指揮使出屯杭州端拱𥘉從擒趙保忠咸平初從殺賊黨於廣都纍遷永興軍部署車駕將巡澶淵詔均與向敏中等提總諸州巡檢捕盜事至河陽召赴行在有王長壽者聚徒剽劫均以方略擒長壽斬獲惡黨皆盡擢本州團練使尋知代州代還卒子懷德善騎射擊刺擢鄜延路副總管夏人入寇破之又解延州圍纍遷保寧進雄二節度周審玉開封人父勳事唐明宗纍立戰功周顯德初審玉蔭輔殿直從世宗於瓦橋關甚見親信建隆初纍遷西京作坊使雍熙中遼兵犯塞審玉為監軍先鋒劉緒陷賊審玉躍馬趨擊拔緒而還以勇敢聞咸平初知鳳翔府代還俄丁內艱服闋拜章請老得千牛衛大將軍致仕盧斌開封人以筆札事晉邸太平興國初補殿直雍熙中領兵屯霸州會大舉北伐斌以千弩斫寨遼兵遁去遂克涿州端拱中纍官梓遂十二州都巡檢使許便宜從事在川陜六年以孤軍禦寇纍立戰功還拜東上閣門使檢校左僕射成平初卒常思德開封人周顯德初以材勇應募纍遷神衛都虞侯䔨熙𥘉從曹彬征幽州淳化中李順叛蜀命往夔峽招捕盡殲其黨以功授汝州刺史初曹彬北征不利至涿州左右皆潰散獨思德以所部護至易州語人曰既備戎行則與主帥同死生可也若視利害以為去就將何面日見君父乎咸平初改陳留都監換左神武大將軍卒尹繼倫浚儀人建隆時為殿直預平嶺表下金陵太平興國初充北面緣邊都巡檢使端拱中遼兵入寇繼倫奮擊殺其將衆驚清死者無數餘悉引去遼兵相戒曰當避黑面大王以繼倫面黑故也纍遷靈慶兵馬副都部署卒袁逢吉鄢陵人四嵗能誦爾雅孝經七嵗兼通論語尚書開寶八年擢三傳第除豐城令淳化中厯水部郎中宰相呂蒙正薦其有經術至道𥘉知夔州纍拜鴻臚少卿卒逢吉性修謹練達時務初鄆州牧馬草地侵民田數百頃牒欣連上凡五遣使按視不決逢吉受命往則悉還所侵田民咸德之宋準雍邱人開寶中舉進士擢甲科授祕書郎直史館使遼復命稱旨雍熙中纍遷金部郎中端拱二年卒準美風儀善談論辭采清麗蒞官所至有聲盧多遜之南流也李穆坐同門生黜免準因奏事盛言穆有檢操常惡多遜專恣固非其黨也帝悟復穆官時論以此稱之孔維雍邱人乾德四年九經及第太平興國初擢授太子左贊善大夫使高麗王治問禮維對以君臣父子之道升降等威之序治悅曰今日復見中國之夫子也雍熙三年擢國子司業將有事藉田維起周禮至於唐書凡沿革制度並錶以獻觀者稱其博又上書請禁原𧖟以利國馬帝嘉其援引經據以章付史館拜國子祭酒兼工部侍郎卒維以經術受知嘗建議乞廣太學受詔與學官校定五經疏義未畢卒戴興雍邱人年十餘嵗以勇力聞太平興國時遷御龍直副指揮使從征太原先登端拱中出師鎮定二州時盜賊羣起會五巡檢兵討之踰月不能克興陰勒所部潛出擊之擒戮殆盡淳化五年為定武節度使咸平𥘉知京兆府卒上官正開封人少舉三傳雍熙中召授殿前承旨淳化中轉作坊副使李順之亂正奮勵士氣以禦之斬馘殆盡超為劒門刺史又擢崇儀使領昭州刺史初川賊甚盛朝議深以棧路為憂正以孤軍力戰挫賊鋒自是閣道無壅師得長驅而入尋與雷有終並為西川招討使景德中再表引年授左龍武大將軍平川防禦使以本官致仕按正為作坊副使在淳化中舊作雍熙中誤今據宋史改正畢士安代州雲中人少好學事繼母祝氏以孝聞祝氏曰學必求良師友乃與如鄭得楊璞韓丕劉錫為友因為鄭人乾德四年舉進士真宗立拜工部侍郎樞密直學士景德𥘉兼祕書監應詔陳選將餉兵理財之策真宗嘉納進參知政事入謝真宗曰行且相卿士安對曰臣駑朽不足以勝任寇準兼資忠義喜斷大事此宰相才也未閲月以本官與準同拜平章事二年卒諡文簡士安端方沈雅有清識藴藉美風采善談吐所至以嚴正稱嘗權知開封府事時近臣有恃勢強娶民間定婚女其家訴於府士安奏還之楊璞新鄭人善歌詩士大夫多傳誦與畢士安尤相善每乘牛往來郭店自稱東野遺民嘗杖䇿入嵩山窮絶處搆思為歌詩兄數年得百餘篇𬒳召還作歸耕賦以見志真宗朝諸陵道出鄭州遣使以茶帛賜之張煦開封人雍熙二年為鎮定邢趙山西土門路都巡檢使遼騎兵剽境上煦以所部走之咸平中王均亂蜀以煦為綿漢劎門路都巡檢使賊平以功就還正使為邠寧環慶路鈐轄纍躡寇入賊中掩殺甚衆有詔嘉奬天禧三年徙并代鈐轄以老疾求近郡得知磁州卒煦明術數善相宅時稱其妙薛惟吉浚儀人少有勇力以蔭纍官右千牛衛大將軍丁父憂居喪有禮多接賢士大夫頗涉獵書史時論翕然稱之帝令知澶州厯遷左領軍衛大將軍折節下士輕財好施所至有能聲向敏中開封人父瑀仕漢符離令性嚴毅躬自教督敏中太平興國進士判大理寺時沒入祖吉贓錢分賜法吏敏中引鍾離意委珠事獨不受厯知樞密院同平章事天憘初加吏部尚書進右僕射兼門下侍郎是日翰林學士李宗諤當對帝曰朕未嘗除僕射敏中應喜賀客必多卿往觀之既至門闌寂然宗諤入賀敏中但唯唯使人問庖中今日有親賓飲宴否亦無一人明日以所見對帝曰向敏中大耐官職三年進左僕射昭文館大學士卒諡文簡敏中姿表瓌碩有儀矩性端辱豈弟多智曉民政善處繁劇愼於采拔居大任三十年時以重德目之子傳範以父任厯密州觀察使以索中資千餘萬葬族人在殯者六十四喪石保興浚儀人父守信領歸德節度保興以蔭輔供奉官年最少應對明白帝奇之纍遷銀夏綏府都巡檢使至道初擊岌伽羅膩數族殱之咸平中知威虜軍夏人入鈔保興發官庫給戰士主者國執不可保興曰城急如此安假中覆事定覆而不允願以家財償之拜棣州防禦使徙知邢州改澶州以疾還京師未幾卒弟保吉景德初纍官武寧軍節度同平章事冬幸澶淵命與李繼隆為排陳使遼騎數萬驟至城下保吉不介馬而馳當其鋒遼人引去大中祥符初加檢校太師卒李繼宣浚儀人乾德中補右班殿直栽十七嵗命往陜西捕虎殺二十餘生致二虎一豹以獻雍熙三年曹彬北伐繼宣從先鋒力戰以功超授崇儀使纍遷鎮州行營鈐轄屢吹遼兵咸平四年纍拜西上閣門使領康州刺史為前陳鈐轄敵至繼宣整所部與秦翰師合勢大戰敵走上羊山繼宣逐之環山麓馬中矢斃凡三易馬進至牟山谷大克捷詔書稱奬加官及食邑大中祥符初授西京水南郡巡檢使六年卒蔚昭敏祥符人真宗為襄王昭敏自東班殿侍選隸府帝即位纍遷崇儀使冀貝行營兵馬都監遼以五千騎突至昭敏敗之敵遁去師不失一人咸平中為鎮定高陽關三路先鋒遼兵退趨莫州昭敏追至州東三十里斬首萬餘級擒生口甚衆遼人委器甲遁去纍遷保靜軍節度使卒張耆開封人年十一給事真宗藩邸咸平中為鎮州行營鈐轄又徙定州遼兵圍望都耆間道往援城己陷矣耆與力戰身被數創殺其裊將遷昭州團練使明年遼兵復入帝欲親征者奏邊事十餘條帝東封遷殿前都虞侯時建玉清宫耆疏謂殫國財力非所以水天意景德中纍遷樞密使加尚書左僕射封徐國公者為人重密有智頗知傳記及術數之學言象緯輒中以太子太師致仕卒王顯開封人性謹介不好狎未嘗踐市肆纍遷至樞密使加檢校太師改授山南東道節度同中書門下平章事定州路行營都部署河北都轉運使兼知定州吏民言顯治狀願借留景德初徙知天雄軍卒子希逸以蔭補供奉官好學尤熟唐史聚書萬餘卷咸平初加祠部員外郎崔立鄢陵人祖周度仕周為泰寧軍節度判官慕容彥超叛周度以大義青之見殺立舉進士第纍遷太常少卿厯知棣漢相潞兖鄆涇七州開河溉田賑飢弛賦所全活甚衆性淳謹尤喜論事大中祥符間帝既封禪士大夫爭奏上符瑞獻贊頌立獨言水發徐州旱連江淮無為烈風金陵失火天所以警驕惰戒淫佚也區區符瑞何足為治道言哉前後上四十餘事進尚書工部侍郎致仕卒王繼英祥符人咸平𥘉領恩州刺史拜宣徽北院使知樞密院事小心懼靖以勤敏稱帝倚賴之景德𥘉授樞密使加特進檢校太傅卒王延德東明人延德總角宣祖愛其謹重召置左右太宗尹京署為親校尤被倚信咸平初出知華州為東舊城都巡檢使明年請告還郡卒延德所至好㦏集近事掌御廚則為司膳録掌皇城司則為皇城記事録從郊祀為行宫使則為南郊録奉詔修內則為版築記從靈駕則為永熙皇堂録山陵提轄諸司記及治郡則為下車奏報録先是詔使官修太祖太宗實録多以國初事訪延德又上太宗南宫事迹三卷劉師道東明人雍熙二年舉進士厯幕職十年擢著作左郎出知彭州就加監察御史大中祥符二年以兵部郎中知潭州敏於吏事所至有聲嵗滿加樞密直學士擢左司郎中卒師道性慷慨尚氣善談世務與人交敦篤工為詩多與楊億輩酬唱當時稱之李及其先范陽人後徙鄭州及舉進士再調升州觀察推官寇準薦其才纍拜御史中丞及資質清介所治簡嚴喜慰薦下吏而樂道人之善在杭州惡其風俗輕靡不事宴遊一日胃雪出郊衆謂當置酒召客獨造林逋清談至暮而歸白守素開封人以蔭補東班承旨以善射授供奉官三遷至供備庫使真宗以威虜扼北道要害尤甚聞中素久練邊計命為鈐轄戌順安景德元年遼侵長城守素發兵破之斬首級獲器械甚衆徙屯冀州轉運使劉綜舉其智勇材任將帥加領康州刺史儀為真定鈐轄遼兵內侵敗其前鋒守素居邊嵗久北庭頗畏服之再遷南作坊使卒史方開封人補殿侍澧州民訴下溪州蠻侵其土地遣乘驛往視自竹踈驛至申文崖復地四百餘里得所掠五百餘人又置澧州武口楊泉索溪四寨以扼賊衝就知邵州徙澧州天禧中遷愛州刺史西京作坊使卒陳越尉氏人少好學尤精厯代史善屬文詞氣俊拔咸平中舉賢良策入第四等解褐將作監丞遷著作佐郎直史館預修册府元龜車駕朝陵掌留司名表時稱為工自是兩府箋奏多命草之勳貴家以銘志請者甚衆遷太常丞擢左正言越耿概任氣喜針切朋友放曠杯酒家徒壁立不以屑意大中祥符五年卒李居正開封人七世同居又張仁過亦開封人四世同居咸平中旌表仍蠲其課調王世及河陰人聚居至七百口纍數十百年詔加旌表仍蠲其課調張希一耆之子以父任纍官河北緣邊安撫副使請徙邊兵內地以寬糴費每州嵗為市平糴邊穀使人不能高下其價戌卒之孥給糧光軍士一日使其家為伍保坐以逃亡之纍皆著為法纍使遼遼人嘗以雄州不當禁漁界河及役白溝兩屬為言希一曰界河之禁起於大國統和年移文尚存白溝本輸中國田祖我太宗特除之自是大國侵年立稅故名兩屬惡有中國不役之理遼人詞塞以均州防禦使提舉集禧觀卒弟利一以蔭纍遷西上閣門使嘉州團練使遼人刺兩屬民為兵民不堪其辱利一綏徠之有大姓舉族南徙慕而來者至二萬利一發廪賑恤且移告涿州自是不敢復刺終雄州團練使鞠詠開封人少孤好學自立舉進士試祕書省校書郎知山陰縣天聖初召為監察御史錢惟演自亳州來朝圖入相詠言惟演憸險若遂以為相必大失天下望語諫官劉隨曰若相惟演當取白麻廷毁之惟演乃亟去時王欽若復相詠疾欽若阿倚數睥睨其短出通判信州欽若卒還詠殿中侍御史天聖六年夏大星晝殞詠條上五事河北京師旱飢奏請出太倉米十萬石賑之八年特置天章閣待制以詠及范諷為之明年詠卒嘗著道釋雜言數十篇魚周詢雍邱人早孤好學舉進士第纍拜右諫議大夫權御史中丞慶厯八年手詔近臣訪天下之務執政及近臣所對多疏闊帝頗嘉周詢詳敏出知永興軍改知成德軍周詢性和易聞見該洽明吏事及卒帝嗟悼之韓億雍邱人舉進士厯知永城洋州相州有治聲仁宗時判大理寺丞三司更茶法嵗課不登億承詔劾之由丞相而下皆坐罰以樞密直學士知益州賑救貧民疏九升江溉田數千頃景祐二年同知樞密院事時承平久武備不戒乃請二府各列上才任將帥者數十人稍試用之除户部侍郎參知政事官至尚書左丞以太子少傅致仕卒諡忠獻億性方重治家嚴飭雖燕居未嘗有惰容親舊之孤貧者嘗給其婚葬每見諸路有攟拾官吏小過者輒顔邑不懌曰奈何錮之於盛世子綜舉進士中第通判鄧州天雄軍河溢金隄民依邱冢綜令曰能濟一人豫市錢民爭操舟筏以濟己而邱冢多潰纍遷邢部員外郎知制誥張逸滎陽人進士及第知襄州鄧城縣有能名知州謝泌將薦逸先設几莚置章其上望闕再拜曰老臣為朝廷得一良吏纍遷尚書兵部郎中以樞密直學士知益州卒於官楊仲元管城人第進士調宛邱主簿厯官光祿卿改中散大夫戒諸子曰吾居官五十年未嘗以私怒加人雖杖刑之微苟有兩比不敢與重法以是為報國耳劉平祥符人剛直任俠善弓馬讀書強記進士及第拜監察御史數上疏論事為丁謂所忌寶元初遷鄜延路副總管元昊盛兵圍延州平督騎兵晝夜倍道行至三川口都監黃德和巡檢万俟政郭遵所將兵悉至結陳東行與敵遇德和衆潰平轉鬬三日被執死贈朔方軍節度使兼侍中諡壯武平弟兼濟以蔭輔三班奉職善騎射讀兵書知大旨擢左侍禁鄜延路兵馬都監夏人寇邊兼濟敗之纍遷河北緣邊安撫副使知雄州徙冀州改欣州卒郭遵開封人家世以武功稱遵少隸軍籍稍遷殿前指揮使乾興中徙延州西路都巡檢使元昊寇延遵遇敵馳馬入陳所向披靡黃德和兵潰遵奮擊期必死敵縱遵使深入攢兵注射馬踠仆地𬒳殺特贈果州團練使任福其先河東人後徙開封仁宗時纍擢秦鳳路副總管詔陜西增城壘器械福受命四十日而戰守之備皆具以功纍拜賀州防禦使元昊謀寇渭川福引輕騎趨戰斬首數百夏人棄馬駝佯北福踵屯好水川追奔至籠竿城伙發自山背下擊士卒多墜崖塹相覆壓福力戰身被十餘矢有小校劉進勸福自免福曰吾為文將兵敗以死報國耳揮四刃鐵簡挺身決鬬鎗中左頰絶其喉而死子懷亮亦死之贈武勝軍節度使兼侍中王圭開封人少拳勇善騎射能用鐵杵鐵鞭仁宗時為涇原路行營都監至黑山焚敵族帳獲首級馬駝甚衆會敵大入以兵五千從任福屯好水川連戰三日鞭鐵撓曲手掌盡製奮擊自若馬中鏃兄三易猶馳擊殺數十人矢中目乃還夜中卒贈金州觀察使桑懌雍邱人勇力過人有謀略嘗遭大水有粟二廩將以舟載之見百姓走避水者遂棄其粟而載之嵗飢聚人共食其粟盡而止擢右班殿直明道末京西有惡賊二十三人樞密院召懌往捕盡擒諸盜還樞密吏求銀為致閣門祇候懌曰用賂得官非我欲也宜州蠻叛官軍不能制因命懌往盡手殺之還授閣門祗候寶元初遷鄜延路都監徙涇原路屯鎮戎軍與任福遇敵於好水川力戰而死贈解州防禦使丁度祥符人強力學問大中祥符中登服勤詞學科為大理評事判史部南曹上書論六事章獻太后善之𩔶遷翰林學士條上十策名曰備邊要覽慶厯中拜鍴明殿學士知審刑院帝嘗曰度在侍從十五年數論天下事未嘗及私擢樞密副使參知政事遷尚書左丞卒諡文簡度性淳質不為威儀居一室十餘年左右無姬侍然喜論事在經筵嵗久帝每以學士呼之而不名馬遂開封人為北京指揮使聞王則叛詣留守賈昌朝請擊賊昌朝因使持榜入貝州招降諭以禍福輒不答遂奮起扼則喉毆之流血賊黨攢刀聚譟至斷一臂猶詈則曰妖賊恨不斬汝萬段賊支解之仁宗歎息贈宫苑使封其妻旌忠縣君官其子五人後得殺遂者驍捷卒石慶使其子剖心而察之范恪開封人康定元年以功遷供備庫副使恪有弓勝一石七斗其前鏃如鏵名曰鏵弓凡所發必中至一箭貫二人臨難敢前數有戰功纍遷侍衛親軍馬步軍副都指揮使出為永興寧副都總管卒孫節開封人以才勇補右侍禁與狄青同在延州數攻破敵寨有功纍遷西京左藏庫副使及青討儂智高辟隸麾下至歸仁鋪節為前鋒直前搏戰賊鋭甚鏖戰山下中鎗而殁贈忠武軍節度留後宋庠安州安陸人後徙開封之雍邱天聖初舉進士第一擢大理評事遷左正言郭皇后廢庠與御史伏閣門爭論久之知制誥為翰林學士寶元中以右諫議大夫參知政事􅙈儒稚練故事自執政遇事輒分別是非厯官檢校太尉同平章事充樞密使封莒國公數言國家當愼固根本畿輔宿兵常盈四十萬羡則出補更戍祖宗初謀也不宜輕改英宗即位封鄭國公判亳州以鎮靜為治以司空致仕卒諡元獻庠與弟祁俱以名擅天下讀書至老不倦天資忠厚嘗曰逆詐恃明殘人矜才吾終身弗為也人以此稱其長者子充國性剛介刻意問學自謂宰相子不與寒士競進仁宗召試賜進士纍官至太常禮院以孝稱宋祁庠之弟與庠同時舉進士人呼曰二宋以大小别之釋褐復州推官遷太常博士詔定新樂遷尚書工部員外郎權三司度支判官方陜西用兵調費日蹙上疏請去三冘節三費為翰林學士改龍圖閣學士史館修撰修唐書纍遷工部尚書拜翰林學士承旨卒祁兄弟皆以文學顯而祁尤能之善議論修唐書十餘年出入內外常以稿自隨所至治事明峻好修條教追諡曰景文王拱辰咸平人年十九舉進士第一通判懷州慶厯元年為翰林學士權知開對府拜御史中丞夏竦除樞密使拱辰因對極論之帝未省遽起拱辰前引裾乃納其説竦遂罷熙寧元年王安石惡其異己出為應天府改武安軍節度使三路籍民為保甲禁令苛急往往去為盜拱辰抗言其害曰非止困其財力奪其農時是以法驅之使陷於罪罟也上章不己帝悟於是第五等户得免哲宗立徙節彰德加檢校太師卒鄭向陳留人舉進士中甲科纍遷兩浙轉運副使疏潤州蒜山漕河扺於江人少為便擢知制誥使遼以龍圖閣直學士知杭州卒五代亂亡史册多漏失向著開皇紀三十卷托拾遺事稍有補焉江休復陳留人少強學博覽為文淳雅尤善於詩進士起家為桂陽監藍山尉騎驢之官每據鞍讀書至迷失道舉書判拔萃遷殿中丞纍官尚書刑部郎中卒休復外簡曠而內行甚飭事孀姑如母為政簡易嘗著神告一篇言皇嗣未立假神告祖宗之意冀以感悟又嘗言昭憲太后子孫多流落民間宜甄録之著唐宜鑑十五卷春秋世論三十卷文集二十卷段少連開封人美姿表倜儻有識度舉服勤詞學科試祕書省校書郎纍擢天章閣待制知厯州范仲淹薦少連才堪將帥遷龍圖閣直學士知涇州改渭州少連通敏有才遇事無大小決遣如流不為棹勢所屈既卒朝廷歎惜之郭稹祥符人舉進士中甲科為河南縣主簿除國子監直講以資淺還孫奭奏稹學問通博他選莫及乃得留纍遷刑部員外郎康定元年使於契丹契丹人與出觀獵延稹射稹一發中走兔衆皆愕視還轉兵部知制誥擢龍圖閣直學士權知開封府卒稹性和易文思敏贍尤刻意於賦聚古書畫不計其資購求之劉謙開封人少輔衛士數遷至捧日右廂都指揮使領嘉州團練使元昊反改環慶路馬步軍總管兼知邠州邠人愛之徙知涇州未行會賊寇鎮戎軍謙引兵深入破其聚落而還以功擢象州防禦使卒程戡陽翟人少力學舉進士甲科輔涇川觀察推官通判許州徙虔州纍進樞密直學士知成都府四遷給事中人言蜀且有變仁宗自擇戡再知益州召拜參知政事奏禁蜀人妖言誣民者改樞密副使尋拜鄜延路經略安撫使判延州英宗即位以安武軍節度留再任告老章纍上召還道卒戡久在邊安重習事治不近名趙滋開封人父士隆為邠寧環慶路監督戰沒録滋三班奉職滋少果敢任氣有智略康定初以右侍禁選捕京西叛卒有功後為涇原儀渭鎮戎軍都巡檢厯知雄州英宗即位領端州防禦使卒滋馭軍嚴戰卒舊不復役滋役之如廂兵莫敢有言繕治城壁樓櫓至於簿書米鹽皆有條法性尤廉謹月得公使酒不以入家馬懷德祥符人為延州南安寨主東路巡檢以范仲淹韓琦薦授閣門祇候後為鄜延路都監時用兵久民多亡散懷德招輯有方英宗即位遷靜難軍節度觀察留後召還卒嘗因戰流矢中其顙鏇入於骨以弩絃繫鏃發機而出之郭恩開封人初隸諸班纍遷代并鈐轄管勾麟府軍馬事夏人嵗侵屈野河西地經略使龎籍檄麟州增築二堡內侍黃道元脅恩率步騎循屈野河北而行至匆里堆敵騎交至恩力戰𬒳執不肯降自殺贈同州觀察使張洞祥符人幼開悟卓犖不羣時元昊擾邊洞以布衣求上方略擢試將作監主簿尋舉進士中第再調潁州推官知州歐陽修甚重之纍遷太常博士在館閣久數有建明出知棣州召棹開封府推官英宗即位轉司封員外郎對便殿稱旨遂欲進用大臣忌之出為江西轉運使移淮南卒張孜開封人輔三班奉職纍遷正定路兵馬鈐轄厯知莫貝瀛三州遼欲背盟富弼往使孜為副安重習事以勞遷西上閣門使拜單州團練使并代副總管河東更鐵錢法人情疑二兵相率扣府欲訴閉門不納是日幾亂孜䇿馬從數卒往諭之皆散還營纍遷寧建軍節度使楊燧開封人善騎射應募從征貝州穴城以入賊平功第一輔神衛指揮使立從佂儂智高手殺數十人衆乘之而捷遷罃州團練使英宗時纍拜寧遠軍節度殿前副指揮使卒燧初穴貝州城時為叛兵所傷同行卒劉順救之得免及貴順已死訪恤其家甚至故人妻子貧不能活者一切收養人推其義馬從先祥符人少盡力於學由進士纍官太常少卿知宿州代還知壽州以老辭英宗諭遣之曰聞卿治行籍甚壽尤重於宿姑為朕往轉工部侍郎致仕從先性整嚴雖盛夏不袒跣晚學佛預言其終時年七十六崴而卒孫固管城人擢進士第調磁州司户參軍從平貝州為文彥博言脅從罔治之義但誅首惡餘無所及遷祕書丞宰相韓琦知其賢諭使來見固不肯往琦益器重之神宗即位擢工部郎中天章閣待制仁宗問王安石可相否對曰安石狷狹少容必欲求賢相吕公著司馬光韓維其人也青苗法出極陳其不便元祐二年拜門下侍郎知樞密院事卒諡溫靖固宅心誠粹不喜矯亢與人居久而益信故更厯夷除而不為人所害張茂則開封人初補小黃門五遷至西頭供奉官領御藥院仁宗不豫中夜促召茂則趨入扶衛左右或欲掩宫門茂則曰事無可慮何至使中外生疑熙寧初同司馬光相視恩冀深瀛四州生隄及六塔二股河利害進入內都知纍乞退休哲宗即位遷寧國軍留後卒茂則性儉素食不重味衣裘纍十數年不易崇寧中入黨籍李舜舉開封人少補黃門熙寧中進內侍押班制置涇原軍焉舜舉入奏事退詣中書王圭迎勞之曰朝廷以邊事屬押班無西顧之憂矣舜舉曰四郊多壘此卿大夫之辱相公當國而以邊事屬內臣可乎內臣止供禁廷灑婦豈可當將相之任聞者代圭愧焉轉嘉州團練使沈括城水樂遣舜舉計議被圍急斷衣襟作奏曰臣死無所恨願朝廷勿輕此賊尋以死聞贈昭信軍節度使諡忠敏舜舉資性安重與人言未嘗及宫省事頗覽書傳能文辭筆禮神宗嘗書李舜舉公忠奉上恭勤檢身始終惟一以安以榮十九字賜之羅拯祥符人第進士厯官江淮發運所至有政績加天章閣待制徙知永興軍青潁秦三州卒拯性和柔不與人較曲直為發運使時與副使皮公弻不協公弼徙他道御史劾其貸官錢拯力為辦理錢公輔為諫官嘗論拯短而公輔姻黨多在拯部內往往薦進之或譏以德報怨拯曰同僚不協所見異耳諌官所言職也又何怨乎時人成服其長者吕誨開封人性純厚力學不妄與人交登進士第由屯田員外郎為殿中侍御史樞密副使程戡結貴幸致位政地誨疏其過又劾宋庠陳升之出知江州上疏請建皇嗣英宗即位都知任守忠間諜東朝播為惡言誨上書開陳大義詞旨深切遂論守忠罪惡內臣王昭明等為陜西四路鈐轄誨言自唐以來舉兵不利未有不自監軍者卒罷之治平二年遷兵部員外郎兼侍御史知雜事濮議起誨引義固爭下遷知鄿州神宗立拜御史中丞王安石執政時多謂得人誨上疏曰安石初無遠略惟務改作立異罔上欺下文言飾非誤天下蒼生必斯人也出知鄧州改知河南致仕卒韓絳綜之弟舉進士甲科厯户部判官江南飢為體量安撫使行便民事數十條宣州守廖詢貪暴置諸理民大悅擢右正言乞守河陽召判流內銓河決商胡李仲昌議開六塔河而患滋甚命絳宣撫河北時宰主仲昌人莫敢異絳劾其蠹國害民仲昌遂竄嶺表纍遷翰林學士御史中丞正定守吕溱犯法從官通章請貰之絳曰法行當自貴者始更相請援則公道廢矣并劾諸請者溱遂絀神宗立拜同中書門下平章事昭文館大學士哲宗立封康國公以司空檢校太尉致仕卒韓維絳之弟以進士奏名禮部方億輔政不肯試大廷受蔭入官父沒不仕宰相薦其靜退召試辭不就歐陽修薦為檢討知太常禮院神宗封淮陽郡王潁王維皆為記室王嘗與論天下事語及功名維曰聖人功名因事始見不可有功名心王稱善進知制誥知通進銀臺司御史吕誨等以濮議得罪維請追還前詔復誨等職不從遂闔門待罪熙寧二年遷翰林學士知開封府明年為御史中丞以兄絳在樞密力辭王安石亦惡其言保甲事復使為開封始分置八廂決輕刑轂下清肅出知襄州召為學士承旨天久不雨維言當痛自責己廣求直言又疏言青苗錢之害上感悟即命維草詔權罷方田保甲是日雨元祐中拜門下侍郎以太子少傅致仕紹聖中坐元祐黨謫均州安置諸于乞納官爵聽父里居哲宗許之元符元年卒韓縝維之弟登進士第簽書南京判官仁宗以水災求直言縝上疏曰國本未立無以繫天下之心詞極剴切前此武臣不執親喪縝言三年之喪古今通制遂著令崇班以上聽持服纍遷龍圖閣直學士哲宗立拜尚書右僕射兼中書侍郎首相蔡確與章惇誣東朝縝暴其姦狀以太于太保致仕卒孫甫陽翟人少好學日誦數千言舉進士及第為華州推官遷大理寺丞杜衍辟為永興司鍊衍為樞密副使薦於朝授祕閣校理是􅍲詔三館臣僚言知甫進十二事改右正言纍上疏言事建議鯁亮不私出知鄧州厯江東兩浙韓運使卒甫性徑果善持論有文集七卷著唐史記七十五卷陳繹開封人中進士第為館閣校勘集賢校理刋定前漢書英宗臨政淵默繹獻五針曰主斷明微廣攬省變稽古同判刑部獄訟有情法相忤者讞之多所平反帝稱其文學為實録檢討官神宗時拜翰林學士後為大中大夫盛陶鄭州人第進士熙寧中為監察御史慶州李復圭輕敵敗國程昉開河無功藉水政以擾州縣皆疏其過二人實王安石所主陶不少屈出簽書隨州判官久之入為太常博士至侍御史陳官穴之敝進權禮部侍郎以龍圖閣待制知應天府卒畢仲衍士安曾孫舉進士第調沈邱令歐陽修呂公著薦人司農為主簿吳充引為中書檢正奉使至遼宴射連破的衆驚異以祕閣校理同知太常禮院為官制局檢討官制文字千萬計區别分類損益刪補曲盡其當撰中書備對三十卷士大夫爭傳其書擢起居郎卒畢仲遊仲衍弟與仲衍同登第調壽邱柘城主簿元祐初為軍器尉丞召試學士院擢第一加集賢校理開封府推官出提點河東路刑獄韓縝歎為真清繼知耀州嵗大旱揭諭境內不室相勸發廩就食者十七萬九千口無一人去其鄉徽宗時入為吏部郎中言學宫祀伯魚子思野服幅巾為不稱詔皆追侯之仲遊早受知於司馬光呂公著不及用范純仁尢知之當國時又適居母喪故米嘗得尺寸進仲遊為文切於事理而有根柢不為遊誇詭誕戲弄不莊之語王光祖圭之子為供奉官閣門祗候熙軍中改沿邊安撫都監進副使界河巡檢遼以兵數萬壓境光祖在舟中盡撒户牖命子襄往冒白刃取從約除正定鈐轄徙梓夔積功至四方館使知瀘州厯涇原河東定州路副總管卒燕達開封人以材武隸禁籍授內殿崇班為延州巡檢纍拜忠州刺史郭逵討安南為行營馬步軍副都總管初渡嶺聞前鋒過敵達卷甲趨之蠻驚潰請降拜榮州防禦使元豐中進武康軍節度使哲宗立徙節武信卒達起行伍喜讀書神宗嘗稱其忠實可任孫路開封人進士及第元豐中為御史言不合新政下遷通判蘭州夏人入寇論捍禦功進伍階除陜西轉軍判官元祐初為禮部員外郎司馬光將棄河湟召問路路挾輿地圖示光曰自通遠至熙州才通一徑熙之北己接夏境若捐以與敵一道危矣光幡然曰賴以訪君不然幾誤國事議遂止知慶州徙熙州召拜兵部尚書以龍圖閣學士知成都徽宗立厯太原河南永興軍河中府卒向經敏中孫以蔭至虞部員外郎神宗即位進廣州團練使知陳州移知河陽有善政遷明州觀察使召還提舉景陵宫復出知青州卒經所至勤吏治事皆自省決頗欲以才見於用故數請外輔向綜經之弟知歙縣厯知隨鼎漳汾密棣沂七州兵久惰會初置官提舉教之急衆不悅監兵夜排闥告變綜就寢自若明日大閲申嚴號令賞其高強罰其不進者卒亦無事性寬裕善治劇於姦惡不少恕官中散大夫卒賈嵓開封人善騎射起家從戎神宗選材武以為內殿承制纍遷步軍都虞候濠州團練使卒嵓在兵間二十年有智略能拊御士卒所向輒勝王恩開封人以善射入羽林神宗偉其貌補供備庫副使遷涇原將守邊有方略羌人避不敢犯遷武信軍節度使以檢校司徒致仕劉舜卿開封人父鈞監鎮戎軍兵馬與子堯卿戰死於好水舜卿年十嵗録為供奉官元祐初進神龍衛四廂都指揮使知熙州夏人連西羌鬼章城洮州將大舉入寇舜卿乘其未集擊之宵濟拜金川黎明至臨洮城下一鼓克之俘鬼章並首領九人斬馘數千計遷徐州觀察使知渭州卒諡毅敏舜卿知書曉吏事謹文法善料敵著名北州安燾開封人登第調蔡州觀察推官歐陽修薦為祕閣校理元豐初高麗新通使假燾左諫議大夫往報之使還以知禮即授所假官知審刑院決剖滯訟五百餘案元豐六年同知樞密院夏人款塞乞還侵疆遂欲并棄熙河燾固爭之為門下侍即徽宗立上疏言自紹聖以來用事之臣持紹述之名誑惑君父又言東京黨禍已萌願戒履霜之漸崇寧中降祁州團練副使再嵗還洛中卒張近開封人第進士纍遷大理正發運使呂溫卿以不法聞近受詔鞫治哲宗諭之曰此出朕命卿毋畏惠卿對曰法之所在雖陛下不能使臣輕重何惠卿也以集賢修撰知瀛州遼使為夏人請命而宿兵以臨近請亦出秦甲戌北道伐其謀纍遷顯謨閣待制直學士徙知太原府卒田畫陽翟人樞密使况之從子以任為校書郎調磁州録事參軍知西河縣議論慷慨有前輩風與鄒浩以氣節相激勵元符中浩為諫官畫監京城門既而以病歸許邸狀報立后畫謂人曰志完不言可以絶交矣浩言之得罪畫迎諸途浩出涕畫正色責曰使志完隱默官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉願君母以此舉自滿士所當為者未止此也浩歎謝曰君之贈我厚矣建中靖國初入為大宗正丞曹布數羅致之不為屈知淮陽軍疾卒張藴開封人將家子也從軍為小校從征安南次富良江諸軍猶豫未進藴褰裳先濟衆隨之蠻遁走知綏德等六城儲粟至三十萬斛取宥州屢破夏人纍遷榮州刺史開德河陽馬步軍副總管顯肅皇后母自鄭氏再適藴徽宗屢欲以恩進其官輒力辭不受人以為賢韓宗武縝之子第進士韓宗彥鎮瀛州辟為河間令徽宗即位為祕書丞因日食上疏言甚切直哲宗將祔廟中旨索省中書畫甚急宗武言先帝祔廟陛下哀慕方深而丹青之玩索取不己播之於外懼損聖德疏入太后對宰相奬歎除都官員外郎為淮南轉運判官前使者貨上供錢禁庭遣使來索宗武奏其狀詞極鯁切坐貶秩罷歸卒路昌衡祥符人起進士至太常博士紹聖中以寶文閣待制知開封府進直學士知成都徽宗立上書言頻年以來西方用兵致興大役利源害政侫臣蔽主四者皆隂之過盛落職入黨籍卒張克公陽翟人起進士大觀中遷殿中侍御史蔡京再相克公與石公弼論其罪京罷纍遷右諫議大夫京猶留京師會星變克公復論之中其隱慝京致仕張商英為相克公拜御史中丞疏其罪十商英罷京復召銜克公弗置徽宗知之徙吏部尚書京欲以銓綜稽違中克公既又擲其知貢舉事帝以為所取得人不問居吏部六年卒崔鶠雍邱人父毗徙居潁州遂為陽翟人登進士第調鳳州司户參軍筠州推官徽宗時以日食求言鶠上書極言司馬光之忠章惇之姦帝覽而善之以為相州教授後蔡京條籍上書人以鶠為邪等免所居官久之調績溪令移病師始居郟城治地數畝為婆娑園屏處十餘年人咸尊師之宣和六年起通判寧化軍召為殿中侍御史既至而欽宗即仜授右正言上書極論蔡京之罪時議重之匆得攣疾不能行三求去帝惜之不許以龍圖閣直學士主管嵩山崇福宫命下而卒鶠生平為文至多尤長於詩清峭雄深有法度無子壻衛昻集其遺文三十卷傳於世按翟鶠舊志開封府許州府俱載入詳略各異而志雍邱者不注明陽翟志陽翟者不注明雍邱仐據宋史詳悉載明歸入𣏌縣郭僎祥符人以父任調東海縣尉權祥符縣尉時童貫子師閔死敕葬邑境僎任道途之役貫命撤民屋之當道者僎先籍童氏屋數十間欲毁之貫遽令勿毁由是民屋得免辟權咸平縣丞靖康初勤王兵有剽掠邑界者僎率民擊之得犯者斬以徇尋知宣誠縣通判全州權浮梁宰未行有賊張頂花者己逼縣境衆止之僎曰安逸則就艱危則辭非吾所學賊偽降入邑為變僎端坐公署罵賊遇害詔贈承議郎録其後二人張克戩耆曾孫第進士厯衛尉丞宣和七年知汾州全兵來攻克戩畢力捍禦數選徑卒撓敵營焚其柵敵引去靖康元年金兵復逼城克戩召令兵民曰吾義不忍負國家辱父祖身帥將士擐甲登陴敵屢卻而援師不至金兵入猶率衆巷戰金兵募生致之克戩歸索朝服南向拜舞自引決一家死者八人贈延康殿學士紹興中諡忠確程迪開封人父博古部鄜延兵戰死永樂迪以蔭得官宣和中從楊惟中征方臘有功加武功大夫榮州團練使諸使合薦迪忠義謀略可任將帥大赴行在金兵渡河以迪提舉永興路軍馬措置民兵金人急攻迪率偏裨以下東鄉會盟危急必以死相應慷慨嗚咽同盟皆感泣城破迪持短兵接戰身被創幾遍絶而復蘇猶厲聲叱戰不已遂死之贈明州觀察使諡恭愍趙遹開封人大觀初為梓州路轉運判官以勞升轉運副使俄為正使政和五年晏州寇叛以遹為瀘南招討使晏州平拓地環二千里加龍圖閣直學士拜兵部尚書與童貫有隙出知成德軍徙熙州致仕卒吕由誠誨之李子幼明爽有智略范鎮司馬光皆器重之厯知雅嘉溫綿四州皆有治績靖康元年宰相庚恪薦由誠剛直有家法宜任臺臣至京與恪議不合力辭求退靖康初知襲慶府金兵四集由誠與判官趙令佳同心誓守城陷俱被執金人欲生降之由誠不屈乃殺其子仍於前由誠不顧與令佳同遇害子偰與其家四十口皆被執無生還者贈通奉大夫張叔夜耆之孫少喜言兵以蔭為蘭州録事參軍大觀中為開封少尹獻文召試制誥賜進士出身纍進禮部侍郎為蔡京所忌以徽猷閣學士待制知海州徙濟南府屢平山東劇盜以功進龍圖閣直學士知青州靖康改元金兵南下乞假騎兵與諸將併力斷其歸路不報徙鄧州領南道都總管金兵再至趨入衛即自將中寧子伯奮將前軍仲熊將後軍合三萬人與金兵大戰斬其金環貴將二人城陷叔夜被創猶父子力戰車駕出郊從二帝北行請立太子道中不食粟即次白溝馭者曰過界河矣叔夜矍然起仰天大呼遂不復語明日卒贈開府儀同三司諡忠文李璆汴人登政和進士第調陳州教授入為國子博士宣和三年廷議取燕璆上疏切諫謫監英州清溪鎮赦還試中考舍人建言元祐名臣子孫久𬒳廢錮宜少寬之紹興中山東盜起璆條奏十事忤大臣意罷紹興四年以集賢殿修撰知吉州纍遷徽猷閣直學士四川安撫制置使治蜀之政多可紀胡閎休開封人靖康初創知兵科閎休應試中優等補承信即二帝詣金營閎休欲結義士劫之何栗禁上之從辛道宗勤王南渡以忠義進兩官湖湘盜起嶽飛辟閎休為主管機宜文字以誅鍾子儀功進成忠郎飛被誣死閎休發憤杜門佯疾十年卒有勤王忠義集藏於家何灌祥符人武選登第提舉熙河蘭湟弓箭手葺渠引水得美田二萬六千頃金兵南下悉出禁旅付梁方平守黎陽灌請留以衛根本不從靖康元年金兵叩京城灌守西隅背城拒戰凡三日𬒳創沒於陳子薊閣門宣贊舍人從父戰箭貫左臂拔出之病創死帳下韓綜雷彥興各手殺數人從以死李震汴人靖康初金兵迫京師震時為小校所部三百人出戰殺人焉七百餘巳而被執金兵問欽宗所在震曰伐官家非爾所門金人怒絣諸庭柱臠割膚肉垂盡腹有餘氣猶罵不絶口李升汴人起進士為吏有廉名金兵破汴以刀砍其父升前捍之與父俱死謝皋開封人為鎮撫使統制官李成陷虢州欲降之皋指腹示賊曰此吾赤心也自剖其心以死向子韶開封人登元符三年進士第纍官東京轉運副使屬郡郭奉世進萬緡羡餘户部請賞之子詔劾奉世且言近臣首開聚斂之端寖不可長士論韙之知淮寧府建炎二年金兵薄淮寧子韶率諸弟城守遣其子赴宗澤乞援兵未至城陷率軍民巷戰力屈為所執金人欲降之左右抑令屈膝子韶直立不動戟手貴罵金人殺之闔門皆遇害贈通議大夫諡忠毅閻進隸宣武建炎初遣使通問進從行既至雲中府金人拘留使者散處之進亡去凡三亡乃見殺臨刑謂行刑者曰吾南向受刃南則我皇帝行在也行刑者曳其臂令面北進踊身直起盤旋數四卒南向就死進武校尉朱績亦從之分在尼雅合所未幾亡去追還尼雅合大怒績含笑死梃下尼雅合舊作粘罕今改正曹勛陽翟人父組以閣門宣贊舍人為睿思殿應制勛用恩輔承信郎特命赴進士廷試賜甲科為武吏如故靖康初除武義大夫從徽宗北遷過河十餘日出御衣書領中命勛間行詣康王勛日燕山遁歸建炎元年七月至南京以御衣所書進並建議募死士航海入金奉徽宗由海道歸執政難之出勛於外九年不遷紹興十一年為容州觀察使充金國報謝副使及見金主正使何鑄伏地不能言勛反覆開諭金主首肯許還梓宫及大后勛歸金遣高居安等衛送太后至臨安勛充接伴使後拜昭信軍節度使孝宗朝加太尉卒趙令襟德昭元孫博學能文靖康初言事忤旨奪官紹興七年張浚罷令襟請留浚言官論之復罷秦檜嗛令襟欲置之死誣與張浚李光謀逆會檜死乃獲免趙子嵩燕懿王五世孫汴京失守起兵勤王移徼中外上諸路毋受張邦昌偽赦又移書責邦昌康王即位子嵩請放諸路常平積欠錢并建三屯之議除延康學士韓公裔開封人以三館吏輔官充康土府內知客金兵逼京師遂從康王出使王將南與公裔謀間道潛師夜起遲明至相磁人竟無知者纍遷貴州防禦使以事忤廣濳善降三官帝念其舊勞召復故官恩寵優厚俄除保寧軍承宣使秦儈銜之與外祠檜死復提舉佑神觀升華容節度使致仕卒邢煥開封人以父任調汜水縣主簿詔納其女為康王妃康王即位進徽猷閣待制樞密都承旨屢奏馬伸言事切當宗澤忠勞可倚黃濳善汪伯彥誤國尋遷保靜軍承宣使以病免紹興二年入對首陳川陜形勢利害請幸荆南分兵以圖恢復帝甚嘉之擢慶遠軍節度使煥涉學有文節儉自持未嘗恃恩私請識者取焉卒諡恭簡趙士㒟郇康孝王第四子康王建大元帥府士㒟請於孟太后奉王承大統從之黃濳善等用事士㒟論其誤國苗劉作亂士㒟貽書張浚呂頤浩趣其勤王金人歸河南陜西地命士㒟謁陵寢以數言事忤秦檜嶽飛被誣士㒟以百口保之檜大怒奪官謫居於建凡十二年而薨韋璞開封人隆興初以司農少卿為金國告哀使金主錫宴其館使欲用樂璞不可及入見命璞吉服又不可乃以凶服見紹熙初授明州觀察使十年不遷帝嘉其恬遇授清遠軍節度使金楊伯元尉氏人登大定三年進士第調郾城主簿纍官工部侍郎安武軍節度使致仕卒伯元以才幹多被委任兩為推排定課使纍為審録官人稱其平每有疑獄必專遣決明辨多中理諡曰達元田滋開封人至元二年由汴梁路總管府知事入為御史臺掾拜監察御史既克宋滋建言江南新附民情未安宜立行御史臺以鎮之詔從其言遂超拜行御史臺侍御史大德二年遷浙江廉訪使改濟南路總管尋拜陜西行省參知政事時陜西不雨三年滋禱於神到官果大雨即開倉以麥五千餘石給小民之無種者俾來嵗收成以償民大悅卒諡莊肅劉好禮祥符人憲宗時廉訪府辟為參議至元五年應詔建言凡有司奏請宜先啓皇太子俾得閲習庶政以為社稷生靈之福陜西重地宜封皇子諸王以鎮之創築都城宜給直以市民地選格不宜以中統三年為限帝是其言敕中書施行遷益蘭州等五部斷事官以比古之都護益蘭民俗不知陶冶水無舟航好禮請工匠於朝以教其民或言榷鹽酒可以佐經費好禮曰朝廷設官要荒務以綏遠欲奪其利耶言者慚服厯澧州路總管入為户部尚書劉德泉杞縣人早喪母父榮再娶王氏生二子俱幼德泉撫之及王氏病卒乃益相友愛至元末嵗飢父欲使欣居德泉泣止不能得乃各受其業以去久之父卒弟凡同爨如初尹辛洧川人至治初遊學京師忽夢母病心怪之馳歸母己亡居廬蔬食哀毁骨立每雞鳴而起手冶祭饌詣墓所哭奠之風雪不廢父輔臣嘗病疫辛侍奉湯藥衣不解帶嘗糞以驗差劇夜禱於天願代父命數日愈鄉里嗟異之丁煦汴梁人八世同居州縣請於朝廷加旌表趙育管城人其先三世同㸑育官福州司獄滿歸以母老不復仕一日會諸弟涕申遺訓願世世無異處自是大小百口略無間言育長兄端早世嫂劉氏守志育率家人事之甚恭次兄選繼殁嫂王氏育母以其少許歸改嫁王曰婦無再嫁之義願終事姑育妹贅王佑佑亡妹念佑母無子乞歸養之人謂孝友節義萃育一家元貞初表之韓因汴梁人少習舉子業負氣不羣盜據汝寧官軍討之久不下會朝廷詔赦叛逆募可持詔入賊者因應命乃借因以唐州判官使焉賊不聽因出乘馬周賊屯大言曰汝革好百姓何不出降歸田里而甘從逆賊驅使耶賊渠追因責其所言因極口肆罵賊怒寸割因劉源中牟人母吳氏年七十餘病甚不能行適兵亂火及其家鄰里俱逃源力不能救乃呼天號江趨入抱母為火所焚扈鐸蘭陽人蚤孤育於伯父伯父卒遺腹生一男鐸嘗自抱哺與同起臥十年不少怠弟有􅔂鐸夜稽顙哀禱曰天不伐余家鐸父子間可去一人勿喪吾弟使伯父無後也明日弟愈母卒哀毁踰禮廬於墓側不理家事宗族勸之歸鐸曰今嵗凶多盜吾家雖貧安知墓中無可欲乎倘驚吾親之靈雖生何為卒守廬不去歸暘汴梁人勞無師傳而精敏過人登至順元年進士第授同知潁州事鋤姦擊強人不敢以年少易之化縣人范孟謀不軌詐為詔使至河南省中殺平章移喇特穆爾召官屬及去位者置用之使暘北守黃河口暘力拒不從繫於獄賊敗汚賊者皆獲罪暘獨免拜監察御史入謝帝賜以上尊巳而辭官歸養親汴上親既殁家食久之七年遷右司都事順江酋長樂孫求內附請立宣撫司及置郡縣二十三處暘言郡縣果設有事不救則孤來附之意救之則罷中國而事外夷抗辨甚力卒從暘言纍遷翰林直學士至正十二年除刑部尚書以疾辭十七年以集賢學士致仕卒移喇特穆爾舊作月魯帖木兒今改正陳祖仁汴人性嗜學有文名至正二年對䇿魁多士授翰林修撰同知制誥厯遷翰林直學士除參議中書省事帝欲修上都宮闕工役大興祖仁上疏極誎帝嘉納之二十三年拜治書侍御史時宦者包布哈與宣政使託歡內恃皇太子外結丞相吹斯佳勒驕恣不法祖仁再上疏斥言其惡出為甘肅行省參知政事拜中書參知政事遇事敢言與時宰議論不合明兵至為亂軍所害祖仁負氣剛正學博而精自天文地理律𩔶兵陳術數百家之説皆通其要為文簡質而清麗世多稱之包布哈舊作朴不花託歡舊作索歡吹斯佳勒舊作搠思監仐並改正張貞汴人元統初進士任高郵令性剛介門無私謁抑稁強辨冤獄人稱神明拜監察御史纍上疏言禍亂之由不報辭官去居河中安邑山谷間纍徵不起胡伴侶密縣人父實嘗患心疾數月幾死更數醫俱莫能療伴侶乃齋沐焚杳泣告於天刲右脅割脂一片煎藥以進父疾遂瘳其傷亦旋愈朝廷旌表其門前總纂官臣張琴恭纂輯提調官臣張日章恭覆輯校對官臣夏勳恭校校對官臣帝詒燕恭覆校大清一統志開封府五人物明任昂河陰人早有文譽元末舉進士授晉寧縣不就隱居以經史自娛明洪武初薦起為襄垣訓導擢御史十五年拜禮部尚書帝加意太學命昂增定監規八條明年條上科場成式取士之制始定奏毁天下淫祠其合祀典者宜正其稱號皆從之明年以鄉飲酒禮頒行天下復令制大成樂器分頒天下儒學旋署吏部告歸趙羾祥符人洪武中舉鄉試入太學授兵部職方司主軍圖天下要害厄塞屯戍所宜以進帝以為才遷浙江右參政䇿捕海寇有功永樂中使交址部其餽擢刑部侍即改禮部進尚書致仕卒羾性精敏厯事五朝位列卿自奉如寒素邱鐸祥符人母疾晝夜泣禱乞以身代及卒哀慟幾絶結廬墓側朝夕上食如生時富寒夜月黑悲風蕭瑟鐸輒繞墓號曰兒在斯山深多虎聞鐸哭聲即避去時稱真孝子張宗魯鈞州人四歲失明年二十遭亂負母路氏逃難其妻扶掖以行歲飢宗魯賣卜以為養日給不足妻採野菜以繼之亂平宗魯奉母還故鄉竭力供養母卒仍求其前母曹氏沈氏遺骸合葬父墓洪武十七年旌王良祥符人建文中厯官刑部侍郎出為浙江按察使燕王即帝位遣使者召良良執使者將斬之衆劫之去良集諸司印九於私第遂積薪自焚後贈副都御史諡忠毅楊本中牟人初為太學生建文中以才略應募授錦衣鎮撫從李景隆北伐有功景隆不以聞尋以孤軍獨出被掄繫北平獄後被殺邊升滎澤人建文時為兵部侍郎燕兵至不屈死追贈太子太保兵部尚書諡果愍張輔祥符人燕師起從父玉力戰為指揮同知玉殁東昌輔統其兵積功封信安伯進新城侯永樂五年安南國亂輔率兵往討連戰大捷平其國摛其偽主黎季犛父子檻送京師振旅還進封英國公未幾賊黨簡定反僭稱王輔再討平之師旋其黨陳季擴復反僭稱帝輔又計平之凡三出三擒其酋威振四夷洪熙初進太師掌中軍都督府事輔雄毅方嚴治軍整肅厯事四朝連姻帝室而小心謹慎善遠權勢與三楊蹇夏等同心輔政二十餘年海內晏然輔有力焉正統十四年從征至土木死於難追封定興王諡忠烈王彰鄭州人洪武舉人纍擢吏科給事中永樂初厯禮户二部侍郎陜西大疫奉使祀西嶽新安民鬻子女償賦彰奏為蠲除贖還所鬻改右副都御史諸所論劾甚衆久之逃右都御史宣德元年彰自良鄉抵南京巡撫軍民事竣復命巡視薊州永平山海諸關隘卒於官高舉祥符人弱冠代父戍邊舉永樂逃士選庶吉士授兵科給事中持正不阿慷慨敢言坐是不合時解官歸其居不蔽風日惡衣菲食怡怡如也巡撫于謙過其廬即止辟道其見重如此邢恭鄭州人宣德進士授編修恭性孝友嫡母殁自京師奔喪晝夜兼行不入城郭既葬廬墓三年屢有祥應朝廷表其門王宇祥符人正統進士授甫京户部主事擢撫州知府厯山東布政使以右副都御史巡撫宣府大同石亨及從子彪驕恣宇抗疏論其姦乞置之法聞者敬憚為大理卿平反為多七年卒宇剛介所至有盛名婁良通許人正統進士授刑部主事從北狩額森欲降之不屈額森怒刃其背良辭色益厲定其節釋之還遷郎中纍官右副都御史額森舊作也先今改正馬文升鈞州人景泰進士授御史厯按山西湖廣風裁甚著擢福建按察使成化中懼副都御史巡撫陜西與總督項忠討平滿四尋總制三邊軍務厯兵部侍郎忤汪直下詔獄謫戍起巡撫遼東宏治初再遷至兵部尚書居職十三年盡心戎務轉吏部進退人才公正無私正德初乞歸卒諡端肅文升有文武才長於應變功在邊鎮尢多解禮鄢陵人幼純篤父母殁廬於墓又同邑張縉幼失怙恃育於祖母劉祖母歿廬於墓次有赤蛇蒼免馴授之異天順中旌表王繼祥符人成化進士授監察御史出按山西時帝遣中使採紫碧山石膽經年不獲繼請罷之中官怒曰石膽古書所載安得云無繼曰麒麟鳯凰非古書所載耶於何求之事遂寢纍遷户部侍郎進尚書中官李廣以左道寵大臣競賄結之繼不與通及廣敗言官并請罪大臣與廣交通者上宥不問翌日早朝空班謝罪惟繼與馬文升垂紳屹立無怍色改南京兵部尚書卒楊謐儀封人成化進士授崑山知縣治最擢御史宏治初巡撫宣府在鎮五年邊備修舉擢兵部侍即與馬文升同心共整兵政劉忠陳留人成化進士授編修進侍讀學士正德初劉瑾用事忠因進講附經義規帝闕失指斥近幸尢切瑾惡之出為南京禮部侍郎擢禮部尚書就改吏部瑾誅以本官兼文淵閣大學士與張永魏彬左疏乞致仕嘉靖初屢薦不起卒諡文肅陳鎧祥符人性至孝家貧妻死不復娶父遘痿疾十餘年躬執炊㸑調湯樂朝夕扶持無少懈比卒哀毁骨立季父老無子鎧請侍養宏治中旌表李鉞祥符人宏治進士除御史正德初因災異偕同官論斥中官季興寧謹苗逹高鳳等罪劉瑾惡之瑾敗遷四川副使敗流賊方四等嘉靖初總三邊料黨多中寇至輒敗之纍擢兵部尚書兼都團營中官刁永請輔監局軍匠鉞言四方飢荒若冗食不節太倉儲可立盡帝頗納其言已而中官陳乞還至帝輒許之鉞連章執奏失帝意遂乞歸卒諡恭簡子惠正德進士官行人諌武宗南巡廷杖死贈御史高朗𣏌縣人父母相繼殁負土成壟廬居十餘年正德中旌其門王廷相儀封人宏治進士選庶吉士授兵科給事中嘗上疏陳時政帝嘉納之正德初忤劉瑾謫亳州判官以御史按陜西裁抑鎮守中官廖堂謫贑榆丞嘉靖中巡撫四川討平芒部賊沙保纍遷南京兵部尚書初有詔省進貢快船守備太監賴義復求增廷相請酌物輕重以定船數而大減宣德以後傳旨非祖制者入為左都御史加兵部尚書提督團營加太子太保卒廷相博學好議論以經術稱隆慶初追諡肅敏李濂祥符人少負俊才馳聲河雒間正德中舉鄉試第一成進士授沔陽知州纍擢山西僉事大計免歸益肆力於學遂以古文名於時初受知李夢陽後不屑附和里居四十餘年所著有嵩渚集百卷及汴京遺迹志行世張漢卿儀封人正德進士授魏縣知縣徵拜則科給事中嘗陳杜僥幸廣儲積慎刑獄三事深切時弊武宗將南巡偕同官伏闕諫嘉靖初興獻帝議加皇號漢卿力言不可又倡衆伏闕兩受杖斥為民鄭自璧祥符人正德進士選庶吉士除工科給事中嘉靖初后父陳萬言請西安門外新宅詔子之自璧疏爭尋以伏闕爭大禮受杖奄人奪民業為莊田自璧備言其弊帝命勘者嚴治民患稍除三遷至兵科都給事中論中官冒賞劾郭勛姦貪桂萼請起王瓊於邊自璧言瓊罪宜追治萼引姦祁請并論不納自璧最敢言權幸側目謫江隂丞後廷臣屢論薦竟不召時植通許人由國子生授梁山主簿攝縣事賊藍四等略地植拒卻之斬獲數十級踰月復至相拒數日城陷説降之不屈被殺人劉嵩高尉氏人正德七年賊破鄢陵及尉氏嵩高居村倡衆守禦被執怵之使從嵩高罵愈厲闔門受害者四十七人陳希金鈞州人由歲貢為教諭父卒廬墓流賊人境終不去正德中旌表張鯤鈞州人正德進士為吏部主事嘉靖初以議禮被杖瀕死直氣不屈厯官布政使工詩文與三原馬理等齊名號稱八俊高叔嗣祥符人嘉靖進士授工部主事改吏部厯遷湖廣按察使卒叔嗣少受知李夢陽及官吏部與三原馬理武成王道以文藝相磨切為詩清新婉約名著當時張鹵儀封人嘉靖進士由知縣治行異等擢給事中隆慶初上新政三事請預建太子慎選內侍帝納之遼王憲㸅多行不義鹵具以聞又劾中官孟沖擅邀內旨罪纍擢右僉都御史巡撫保定大璫馮保家保定使請於鹵欲為建坊鹵曰勞氏以媚士大夫且不可况內璫乎保銜之入拜大理卿尋出為南京太常卿以忤張居正致仕張孟男中牟人嘉靖進士廣平惟官擢御史有風節再遷尚寶丞高拱以內閣兼吏部拱妻孟男姑也自公事外無私語拱憾之四歲不遷及拱逐親知皆引匿孟男獨留拱邸為治裝送之郊張居正擢孟男太僕少卿孟男不附失居正意不調久之居正敗遷南京工部侍即就改户部時留都儲峙耗竭孟男受事不再歲遂有七年之蓄礦稅患日劇孟男臨卒草遺疏數千言極陳其害屬其子上之陳耀文祥符人嘉靖進士厯官陜西行太㒒卿好古無所不覽明中葉推博學者無過新都楊慎耀文托其謬誤作正楊人服其淹洽所輯有天中記數百卷高拱新鄭人嘉靖進士由庶吉士授編修厯禮部尚書文淵閣大學士隆慶初與首輔徐階不相能去位階去起前官掌吏部事時方多故拱所建白皆大破常格明逹治體在吏部授諸司以籍使署人才賢否月要而歲會之倉猝舉用皆得其人進柱國中極殿大學士神宗即位張居正與中官馮保比逐之歸居家數年卒諡文襄侯于趙𣏌縣人嘉靖進士厯工科給事中前後疏數十上多步貴近神宗立戚畹武清伯李某請帑三萬金營菟表帝以太后故允其請于趙抗疏極諌舉朝色動帝袖其疏不使太后知于趙得無恙而事以寢尋與張居正忤出為江西參政晉山西巡撫山西賦重歲逋常十數萬計具疏請蠲得減五之一以母憂歸遂不復出王述古禹州人萬厯進士厯刑部郎中力爭妖書楚藩之獄多所全貸遷陽和兵備道釐正代藩廢立預議順義王封事持議堅正録功進布政使將遷巡撫會河南試官疑䇿言六經亂天下而有餘述古憤甚力詆之忤朝貴意不果遷而卒述古與高攀龍薛敷教同出趙南皇門共相砥礪以名節顯王惟儉祥符人萬厯進士授濰縣知縣遷兵部職方主事削籍歸天啓時厯官工部侍郎魏忠賢黨劾之落職間居惟儉資敏嗜學初被廢肆力經史百家苦宋史繁蕪手加刪定自為一書世推博物君子云都任祥符人萬厯進士授南京兵部主事屢遷山西按察使性剛嚴多忤物以大計貶秩歸後起右布政使兼副使飭榆林兵備崇禎十六年李自成遣其將來寇任急集軍民慷慨流涕諭以大義誓死固守賊遣使招降斬以徇城陷任猶巷戰力不支被執賊曰若降無憂富貴也任大罵不屈遂見殺本朝乾隆四十一年賜諡烈愍劉之鳳中牟人萬厯進士擢御史天啓中魏忠賢開內操之鳳劾之遂見斥崇禎初起原官纍遷刑部尚書忤中官鄧希誥又劾首輔周延儒遂陷之下獄死許可徵尉氏人萬厯進士厯官都御史旋里崇禎時寇至可徵率衆逆擊城陷闔門俱死同邑死難者李會崇禎舉人城陷賊迫之降大罵自投城下死又劉文耀陳留人以歲貢任鞏縣教諭致仕里居罵賊不屈死劉煋儀封人崇禎武進士授信陽守備守城城陷死之高興亦儀封人罵賊死王有根祥符諸生督社兵直入賊營中箭死木朝乾隆四十一年許可徵與劉煋均賜諡烈愍李會劉文耀王有根均豫祀忠義祠毛文炳鄭州人崇禎進士擢吏科給事中憂歸與有司禦賊以全城起故官楊嗣昌督師議調民兵討賊文炳言民可守不可調帝從之出為山西兵備副使守太原李自成陷其城文蛃被執誘以官不從抗罵被殺妻趙氏妾李氏亦投井死本朝乾隆四十一年賜諡烈愍余爵禹州人崇禎進士纍遷兵部職方司主事罷歸揚嗣昌出督師請以故官參謀軍事尋又從督師丁啓睿於河南破賊鄧州十五年開封圍急監左良玉軍往援戰敗被執罵賊死贈太撲少卿本朝乾隆四十一年賜諡烈愍魏持衡密縣人纍官太僕卿致仕家居流賊陷城執之使跪持衡挺立抗罵遂遇害馬體健密縣人天啓舉人崇禎末闖賊圍城城中食盡體健盡出家資以餉士卒城破被執與子驤俱不屈死本朝乾隆四十一年豫祀忠義祠劉理順𣏌縣人崇禎進士帝親擢第一還宫喜曰朕今日得一耆碩矣授修撰朝退輒鍵户讀書非其人不與交厯右諭德入侍經筵兼東宫講官甲申之變理順具袍笏北面再拜自經死妻萬氏妾李氏皆殉本朝順治十年賜諡文烈鄭封祥符人崇禎進士以御史出巡廣西甲申流寇破京城封聞之不食死子庚錫抱父尸哭八日亦死吳傑杞縣人性孤介舉於鄉猶躬耕不輟母亡貧不能葬適流寇至居民皆逃傑獨守母柩不去賊至歎曰孝哉此子戒勿犯後為壺關知縣卒貧至無以殮李光壂祥符諸生事親以李稱崇禎末流寇攻汴光壂充左所總社率民兵守城後流寇復攻汴結義勇社出城與賊戰屢有斬獲敘功以知縣用本朝乾隆七年祀鄉賢本朝楊礦祥符人任襄陽知府有政聲順治三年總兵王光恩結流寇叛劫府庫礦率民壯禦之轉戰至北門力不敵遂遇害事聞贈太僕寺卿潘朝佑𣏌縣人順治丙戌進士授襄陽知縣四年賊王關鎖為變朝佑罵賊不屈死事聞贈按察使僉事高元美祥符舉人任山東廣河廳同知順治五年土寇丁維嶽黨李化鯨陷曹縣元美督工於曹家口𬒳執不屈死趙翀鄭州人順治初任蘭州知州七年􅉰賊破蘭州死之事聞贈布政使參議韓范蘭陽人少有膽略明崇禎末流寇圍城范募義勇捍禦捕得城中為內應者斬之又擒斬巨寇明山等四十餘人城得全登順治丙戌進士授廬州府推官有積蠧久為民害范揭其罪杖殺之奉檄剿寇二關渠魁授首脅從皆免廬屬轉漕運辨每以私載留滯范釐剔有法運不後期以卓異內遷卒史載蘭陽人順治丙戌進士授工部主事治山東河閘時閘俱頽壞繕修之費無所出載取廢石使夫役刈草燒灰得數千萬計親督勸之旋底成功後知嘉興府有巨寇嘯聚太湖聞載下車即遠遁去諸生蔣姓兄弟爭財兄以厚賄求直載怒擲之於地曰以此金與爾弟不猶愈乎蔣感悟遂為兄弟如初馬其昌杞縣人順治丙戌進士少孤事母以孝稱授平谷知縣時畿南初定有巨姦強占民田其昌申部重懲之豪強屏息民情始安調長沙知縣長沙版籍新附民多流亡其昌還定安集以勞瘁卒於官李登鼇蘭陽人順治丙戌舉人巳丑會試副榜授南雄府推官慎刑罰恤民命釋疑獄積滯者數十案大辟可矜者七人性耿介不能承上官風旨乞歸書笥外無長物粵中推為廉吏焉王章炳通許人有膽略兄章燦有婢素怨燦流寇至婢為寇虜教寇殺燦甚慘炳潛奔寇壘誘婢出手撲殺之登順治丁亥進士授鄖陽府推官執法不撓民無冤獄時楚寇未乎竭蹶守城郡以安堵致仕歸趙耀奎鄭州人幼喪母三年不飲酒茹葷明末流寇猖獗耀奎輸資助郡守葺城及賊薄城下耀奎親撫士卒勞以酒食衆感奮無不以一當百城獲全入本朝任范縣知縣兵燹之餘凋敝殊甚力勸農桑漸至富庶復官襄陽通判遷泉州同知卒孟學孔鄭州人順治丙戍進士授建寧府推宫值士宸作亂摛其渠魁福清賈人為姦民訐訟立斷其獄以金來謝叱去之陳一太鄭州人順治已丑進士授平和知縣海寇作亂殉難死李光座祥符人順治已丑進士知均州時流寇餘孽未靖光座示以恩威反側悉安纍遷江西按察使民無冤獄會滇閩搆逆愚民陷賊甚衆光座出被脅者五百餘人尚金章儀封人順治巳丑進士知沁水縣時薑瓖雖已授首而餘黨猖獗如故金章開誠撫諭賊衆悉降因寬徭賦集流亡沁民漸以復業奏最擢刑部員外郎進郎中讞獄多所平反尋提督廣西學政丁敬杞縣人順治已丑進士授海豐知縣邑多豪橫専恣敬亷得其名列諸籍有犯輒數其罪立斃之纍遷廣西賓州道賓地界蠻徼猺獞雜處敬恩威並用邊境以安時思恩府屬縣有盜入城殺官劫庫者府鍛錬平民成獄敬識其冤密捕賊置諸法而釋其無辜者一時有神明之頌劉嗣美陳留人順治巳丑進士由庶吉士改授御史巡按山西整飭紀綱清釐宿弊疏請免徴貢綢及發粟賑飢析居兵民人皆稱便旋輔荆西道參議罷歸閉户講學張光祖新鄭人順冶巳丑進士任恩縣知縣潔已愛民時恩多盜光祖募健勇悉剪除之恩有河舟役民苦之光祖立陳其弊得免擢兵部員外郎軍政嚴肅後督學四川剔弊端絶苞苴士風丕變馮瀚鄭州人明末寇亂父赴中牟城破瀚負母逃路遇父𬒳賊縛瀚哀懇痛哭願以身代賊義而釋之遂渡河寄居原武采樵負擔以養其親本朝定鼎後歸里年且三十矣勵志讀書補州庠生父母歿哀毁幾滅性既葬廬墓終身乾隆三年旌余正華禹州人年未冠食餼於庠崇禎壬午父爵與流賊戰死朱仙鎮正華奉母轉徙數千里避寇亂本朝定鼎始歸里旋貢成均或勸之仕泣曰吾父致身於君吾獨不當竭力於母乎歸侍膝下食必親嘗事必稟命母卒哀毁骨立年八十六病劇自為棺三寸語家人曰吾父馬革未獲吾何忽厚以附身慎勿違吾意使吾魂魄不安也乾隆八年旌王福杞縣人善騎射初任千總從征曹縣榆園纍立戰功厯廣東水師都司康熙七年與海寇力戰死贈遊擊子鎮國襲雲騎尉閻閭淳𣏌縣人順治甲午舉人知平陽縣地多荒蕪閭淳設法開墾數百餘頃擢知涇州值平涼叛將王輔臣之變大將軍駐師於涇閭淳措辦供應無缺及師罷尢加意招徠百姓害除逋糧民多復業侯元棐𣏌縣人順治辛丑進士知德清縣以廉惠稱嘗卻漕胥餽金兑運弊絶值霪雨害稼條陳事宜巡撫范承謨悉奏行之聞父喪徒跣數千里嘔血卒張心易杞縣人拔貢生除陜西秦州同知諸生運略陽逎糧二百石舊多積逋心易署學篆乃聚諸生勸諭役其富者而釋貧者旬日事集檄署伏羌縣事陜例丁稅較重規避百鍴心易設法稽核增丁六千有竒而豁其中老病殘廢者四千餘丁民大感悅石如連陳留人康熙丙辰進士任崇陽知縣值夏逆倡亂守令望風遁如連縛逆哨率兵登陴固守官兵至旋平以養親歸再補平江知縣教民禮讓人以為有卓魯之風王珽祥符人性純孝年八歲時侍祖疾母刲股療翁珽知之卒飲泣不言與子震符同登鄉榜康熙乙丑進士入都謁選一夕夢中忽驚悸恍愡母刲股時情狀急馳歸母疾已劇人以為誠孝所感服除就銓授新貴知縣尋告歸生平學宗程朱於易尤稱深邃云張伯行儀封人康熙乙丑進士授中書舍人丁父艱回籍戊寅夏大雨水泛溢入城伯行募民夫囊沙土填築水不為害輔山東濟寧道纍遷福建巡撫閩省人稠田寡嵗遣官赴浙江買米平糶多置社倉以備積貯永安大田等邑姦徒竄伏山谷間煽惑愚民為孽伯行設法招撫其豪陳首魁吳海等餘黨解散治尚嚴明貪吏姦胥盡寬於法移撫江蘇時江南頻歲災祲伯行疏請賑救辛卯秋科場弊發疏劾督臣噶禮營私壞法督臣亦馳疏訐之聖祖鑒伯行清介仍豫留任而黜噶禮越三年入署倉場侍郎厯宦禮部尚耆卒諡清恪伯行天性朴誠而好學不倦凡所設施皆本實踐生平尤以崇程朱為已任張師載伯行子康熙丁酉舉人蔭授户部員外郎厯官江南河道總督指畫修防洞中肯綮卒贈太子少保諡慤敬李長安密縣貢生任阜陽知縣遷廬州府同知卒貧不能歸葬阜陽士民感長安惠政捐資以助葬入祀鄉賢張星祥符貢生事父母先意承志敦尚實行學求心得入祀鄉賢劉朝祐祥符諸生親疾籲天願減巳算以延親壽及殁哀毁骨立五世同居雍睦無間言雍正三年舉孝廉方正授􅌕縣知縣又同邑蘇涓年十五母病嘗糞以驗差劇雍正中旌李鳴德滎澤諸生父任徐州訓導疾作嗚德扶持調護垢衣溺器躬自浣濯及卒徒步千里扶櫬旋葬廬墓三年乾隆初旌又汜水庠生周大訓監生孫芮俱以孝友旌王道中禹州人以孝友教子孫五世一堂百口共食人以為有張公藝風乾隆間旌又蔡元齡新鄭人亦以孝友旌王玉成祥符人任澠池泛千總嘉慶元年隨剿湖北教匪於欒川鎮陳亡同縣千總程運棟劉天貴把總張印均擊賊陳亡先後事聞均廕雲騎尉世職張榮標𣏌縣武舉任河北鎮千總嘉慶元年隨剿湖北教匪於欒川鎮陳亡事聞廕雲騎尉世職張東林祥符人乾隆庚子武進士任陜西撫標守備嘉慶二年隨剿紫陽一帶邪匪有功擢甘肅涇州都司旋擢西安遊擊四年擊賊於馬鬃嶺刀竭陳亡同縣李隨鹿任南陽鎮千總二年隨征陜西教匪於梅子壩陳亡孫餘慶任撫標千總徐秋魁任嵩江把總四年隨剿四川賊匪奮不顧身遂遇害事聞議恤均豫雲騎尉世職牛振標蘭陽武舉嘉慶元年隨剿陜西教匪殺賊有功厯任千總七年於雁子編陳亡事聞廕雲騎尉世職流寓漢崔篆安平人建武中容居滎陽閉門潛思著周易林六十四篇用決吉凶多占驗郭泰介休人初就成皋屈伯彥學三年業畢唐盧照鄰范陽人客居龍門山疾甚足孿一手又廢乃去具茨山下買園數十畝疏潁水周舍復預為墓偃卧其中宋趙開普州安居人大觀初買田尉氏與四方英俊遊因詷知天下利弊所當罷行者如是七年慨然有道變救弊意楊億浦城人從祖徽之知許州億往依焉務學晝夜不息有别墅在陽翟後以太常少卿分司西京朱辨婺源人朝説之見其詩奇之與歸新鄭妻以兄女新鄭介汴洛間多故家遺俗辨遊其中聞見日廣元羊仁廬江人至元初阿珠兵南下仁家為所掠父𬒳殺母及兄弟皆散去仁年七歲賣為汴人李子安家奴力作二十餘年子安憐之縱為良仁蹤迹得母於潁州兄於睢州弟於邯鄲皆為役尚無恙乃遍懇親故貸得鈔百錠詣求贖之經營百計更六年乃得遂大小二十餘口復聚居孝友甚篤鄉里美之大德十二年旌其家阿珠舊作阿术今改正明薛瑄山西河津人父貞永樂中除鄢陵教諭時制郡邑乏科貢之士司訓者遣戌貞憂之瑄於是隨父任補諸生登庚子河甫鄉試第一明年成進士後以理學名於世李夢陽慶陽人父正官周王府教授徙居開封母夢日墜懷而生故名阮漢文浙江人徙居尉氏積學嗜奇究心當世之務中州士翕然師之崇禎末寇掠尉氏必欲生致之漢文義不忍舍城去為賊所得遂大罵而死列女漢緱氏女名玉陳留外黃人為從父報仇殺夫氏之黨始執玉以告令梁配配欲論殺玉同郡申屠蟠年十五進諫曰玉之節義足以感無恥之孫激忍辱之子不遭明時尚當表旌廬墓况在清聽而不加哀矜配善其言乃為讞得減死論三國魏辛憲英陽翟人侍中毗之女有才鑒初文帝為太子抱毗頸曰辛君知我善否毗以告憲英憲英歎曰太子代君主宗廟社稷宜戚而喜何以能久弟辛敞子辛琇俱用其言得免曹爽鍾會之難晉庾袞妻荀氏樂氏荀袞前妻樂袞繼妻皆宦族富室及適袞俱棄華麗散資財與袞同安貧苦相敬如賓南北朝宋垣曇深妻鄭氏字獻英滎陽人曇深雅有學行劉楷為交州刺史曇深隨楷未至交州而卒鄭時年二十子文凝始生仍隨楷到鎮晝夜紡織傍無親援自勵冰霜居一年告楷求還間關危險至鄉葬畢曰可以下見先姑矣文凝年甫四歲親教經禮訓以義方州里稱美魏董景起妻張氏陳留人景起早亡張時年十六痛夫少喪哀傷過禮疏食布衣又無兒總獨守貞操期以闔棺鄉曲高之終見標異張洪初妻劉氏滎陽人年十七夫亡遺腹生子三歲又殁其舅姑年老朝夕奉養率禮無違兄矜其少寡欲奪而嫁之劉氏自誓弗許以終其身史㬇周妻耿氏滎陽人年十七適映周㬇周卒敗氏恐父母奪其志因葬映周哀哭而殞見者莫不悲歎詔標榜其門刁思遵妻魯氏滎陽人始笄適思遵未逾月而思遵亡母家矜其少寡别許他氏氏聞之以死自誓父母不達其志遂經郡訴稱刁氏吝護寡女不使歸氏乃與老姑步詣司徒府自告情狀有司聞奏詔曰貞夫節婦古今同尚可令本司依式標榜唐李氏女汴人年八歲父亡殯於堂十年朝夕臨及笄母欲嫁之斷髮乞終養居母喪哀號過人自庀葬具州里送葬者千餘人廬於墓負上成墳蒔松數百鄭善果母崔氏善果年十四為沂州刺史纍遷魯郡太守母崔賢明曉政事嘗坐閣內聽善果處決或當理則悅有不可則引至床前責愧之故善果所至有績賈直言妻董氏汴人直言貶嶺南以妻少乃訣曰生死不可期吾去可急嫁董不答引繩束髮封以帛使直言署曰非君手不解直言貶二十年乃還署究然及湯沐髮墮無餘五代漢趙氏九女五代時寇亂中牟白沙鎮趙氏有九女逼於寇皆義不受辱連縊而死里人瘞之號九女塜宋朱氏開封民婦家貧賣巾屨以給其夫大犯法徙武昌父母將嫁之朱於其夫將行前一日自經死曰及吾夫未去使知吾義不屈也吳充為開封判官作詩紀其事張晉卿妻丁氏新鄭人參知政事度五世孫也靖康中與晉卿避兵於大騩山金兵入山為所得挾之鞍上丁自投於地戟手大罵連呼曰我九即死耳誓不受辱於爾輩復挾上馬再三罵不巳卒乃忿然舉梃縱擊遂死杖下元霍氏二婦鄭州人尹氏夫耀卿歿姑命其更嫁尹氏曰婦之行一節而巳再嫁為失節妾不忍為也姑不能強楊氏夫顯慶歿慮姑逼其嫁即先白姑曰妾聞娣姒猶兄弟也宜相好焉今姒既留妾可獨去乎願與共修婦道以終事吾姑姑曰果能若是吾何言哉於是同處二十餘年以節孝聞並命褒美丁尚賢妻李氏汴梁人年二十餘至正十五年賊至欲劫之李氏怒曰吾家六世義門豈肯從賊以辱身乎闔門三百口俱𬒳害孟志剛妻衣氏汴梁人志剛殁貧無子有司給以棺木氏紿匠者曰幸大其棺吾夫有遺衣欲盡實其中匠從之是夕祭其夫自縊萬昱妻范氏𣏌縣人昱事丞相台布哈被命逺行屬范曰吾兄歿惟餘一息必不兩全當棄已子范敬諾尋遇兵變遂棄子而存姪昱後復舉一子人以為義感名之曰義台布哈舊作泰不華今改正曹德妻侯氏鈞州人德病死侯語人曰年少夫亡婦人之不幸也欲守吾志而時值亂離如此其能免乎遂於墓自經死明陳氏女祥符人許字楊瑄瑄卒女請死父母不許請往哭又不許私剪髮囑媒氏往置瑄懷女遂素服以居無何父謀更許聘女縊死正德中瑄從子永康將改葬瑄求陳合焉賈永昌妻高氏祥符人婚三月而永昌殁高將從死母泣而止之高曰嗟母謂百年永耶卒就縊成化末旌黃智妻蔣氏儀封人年二十而智殁三日不食遂自縊忽迅雷震其室始覺而救之及蘇誓志以終宏治末旌田鋭妻張氏鋭祥符人嘗刲股療母廬墓者三年鋭亡張曰吾不愧為孝子婦足矣遂縊以殉李甫二女尉氏人正德七年流賊至與同邑李傑女及朱宗妻尹氏俱死難高安妻楚氏密縣人安為御史病卒楚乃引刀刲其右耳誓不二志正德中旌陳貢女鈞州人年十七流賊趙風子掠鈞州執之女厲聲叱罵賊怒收父母家屬盡殱之女罵不絶乘間投井死郜氏女鈞州人正德中流賊將入境父母欲攜之逃女辭賊至投入井賊出之女以汲瓶破賊額賊怒殺之時植妻賈氏通許人植為梁山主簿城陷不屈死賈聞之曰夫死忠吾不能死義乎即自縊女三才年甫九歲亦赴火死事聞旌表史貞女杞縣人字孔宏業未嫁而宏業卒欲往殉之母不許七日不食母知不可奪為製縞衣素棠送之孔氏逮暮辭舅姑整衣自經死有白氣縷縷騰屋上達旦始消縣令劉廷簠為庀葬詔旌其門四烈女俱鄭州人嘉靖間賊師尚詔作亂過鄭有四女偕逃羣賊執之女誓不從賊遂殺之於城東南尸暴露俄天大風覆土成墳高二丈周圍數十丈武氏四婦文選妻冉氏文詔妻劉氏文質妻王氏文全妻宋氏俱鄭州人四婦並二十餘歲夫卒守節知州魯世任旌其門曰一醮不改四婦同心柳金妻張氏祥符人居通許年二十而金死谷姓者謀娶之金兄利其財而許之紿以母病趨歸省中途覺有變求死不得谷欲犯之唾且罵曰吾豈從汝為狗彘行哉谷鞭之數百卒不從而死吉安妻谷氏蘭陽人谷生二女妾張氏生子福安卒女向母求其資谷不許舉以畀福偕張婺矛牙居四十餘年張駿烈妻趙氏滎陽人其舅諸生張拱辰先巳死於賊後亂甚父欲挈氏避河北氏指拱辰之柩曰不守此而遠去求生不孝莫大焉賊至投崖死張紹載妻陳氏滎陽人流寇陷滎陽投井死兩女與媳馬氏殉之王所友妻李氏鄭州人城陷負姑而逃遇賊將刃其姑請代不聽以身翼姑罵不絶口賊殺之姑得免同州趙鎔妻王氏以拒賊被戕羅奇才妻任氏媳王氏賊至恐見辱先自縊郝鳴鳳妻邢氏汜水人寇掠汜氏負祜走賊殺姑劫氏行氏怒曰何不殺我賊義之不忍殺氏大罵乃見害同縣張令望妻周氏為賊所執紿曰河旁有金賊俯求之氏握刀殺二賊自沈於河陳經濟妻趙氏禹州人經濟官至參政趙封淑人賊兵犯禹家人泣勸曰微服可生趙曰正服可死冠珮拜闕賊至以大義責之見害連健妻劉氏禹州人年十七適健闖賊破城逼之劉堅持姑𥚑不從遂遇害死三日家人殮之色如生徐宗武女密縣人年十六流寇陷城女被執逼之上馬女不從自仆於地者三厲聲罵曰我恨不碎汝頭肯從汝耶賊大怒亂刃之阮泰妻朱氏祥符人泰任廣臺知縣殉甲中難朱與同死其死於京師者朱光晉妻鄭氏鄭逹妻朱氏皆祥符人死於寇者杜階妻馬氏杞縣人王召妻張氏羅萬一妻李氏皆通許人劉竹繼妻趙氏竹本綿州人由通許訓導升任涼州趙與前妻之子澤遠留通許寇掠其子趙以身翼且罵為賊攢刺死候嘉謨妻郎氏尉氏人城陷召其女及孫女婦張氏外孫女劉氏以義訓之諸女縊乃從容就繯趙千里妻盧氏白賁妻王氏皆尉氏人盧罵賊見殺王拜祖廟就縊范為銓妻趙氏洧川人事姑孝城陷負姑以走遇賊焚其姑氏躍入焰中同死家人收遺骸氏猶抱姑尸焉本朝劉文星妻周氏尉氏人年二十婺矛牙居紡織供舅姑明末寇起氏縊救之蘇守志終其身同縣王宇靜妻馬氏歸宇靜六年而寡無子