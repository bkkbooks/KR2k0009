body:
  text: 德安府在湖北省治西北三百二十里東西距三百八十里南北距三百八十里東至漢陽府孝感縣界八十里西至襄陽府棗陽縣界三百里南至漢陽府漢川縣界二百里北至河南汝寕府信陽州界一百八十里東南至漢陽府孝感縣治一百里西南至安陸府京山縣治一百八十里東北至河南信陽州界一百八十里西北至襄陽府棗陽縣治三百十里自府治至京師二千四百八十里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州之域春秋時鄖國後屬楚秦屬南郡漢分置江夏郡屬荆州後漢魏晉因之劉宋孝建元年分江夏置安陸郡屬郢州齊因之梁天監七年又分置南司州尋罷西魏大統十六年置安州總管府周改曰溳州陳復置南司州尋廢隋開皇初廢安陸郡以安州領縣大業初改曰安陸郡唐武德四年復曰安州天寶初曰安陸郡乾元元年復曰安州屬淮南道五代因之宋仍曰安州安陸郡置安遠軍節度使屬荆湖北路宣和元年升為德安府建炎四年為安陸漢陽鎮撫使紹興三年仍屬荆湖北路元仍曰德安府屬荆湖北路明洪武初降為州屬黃州府十三年復為德安府隸湖廣布政使司本朝因之康熙三年屬湖北省領州一縣四安陸縣附郭東西距一百九十里南北距一百七十里東至雲夢縣界六十里西至隨州界一百三十里南至應城縣界八十里北至應山縣界九十里東南至漢陽府孝感縣治一百里西南至安陸府京山縣治一百八十里東北至應山縣界五十里西北至隨州界五十里漢置安陸縣屬江夏郡後漢因之晉爲江夏郡治宋爲安陸郡治齊梁因之西魏爲安州治隋仍爲郡治唐爲安州治五代因之宋爲德安府治元因之明洪武初省入徳安州三年復置安陸縣爲德安府治本朝因之雲夢縣在府東南六十里東西距五十里南北距九十三里東至漢陽府孝感縣界三十里西至應城縣界二十里南至漢陽府漢川縣界五十三里北至安陸縣界四十里東南至漢川縣界四十里西南至應城縣界十里東北至孝感縣界二十里西北至安陸縣界四十里漢安陸縣地西魏大統十六年置雲夢縣屬城陽郡隋屬安陸郡唐屬安州宋熙寕二年省爲鎮入安陸縣元祐初復置屬德安府紹興七年移治仵落市十八年復舊治元明屬德安府本朝因之應城縣在府南八十里東西距九十里南北距一百三里東至雲夢縣界三十里西至安陸府京山縣界六十里南至漢陽府漢川縣界六十里北至安陸縣界四十三里東南至漢川縣治一百十里西南至安陸府天門縣治一百三十里東北至雲夢縣治四十里西北至京山縣治六十里漢安陸縣地南北朝宋置應城縣屬安陸郡齊因之西魏兼置城陽郡隋開皇初郡廢大業初改縣曰應陽仍屬安陸郡唐武德四年復曰應城屬安州元和二年省入雲夢太和二年復置五代梁開平元年又改曰應陽唐同光元年復故宋屬德安府元因之明洪武十年併入雲夢縣十三年復置本朝因之隨州在府西北一百三十里東西距三百三十里南北距三百四十里東至安陸縣界一百三十里西至安陸府鍾祥縣界二百里南至安陸府京山縣界九十里北至河南南陽府唐縣界二百五十里東南至安陸縣界一百三十里西南至鍾祥縣治三百里東北至河南汝寕府信陽州治二百五十里西北至襄陽府棗陽縣治一百八十里春秋時隨國漢置隨縣屬南陽郡後漢因之晉初屬義陽郡太康九年置隨國屬荆州宋孝建元年屬郢州永光元年屬雍州泰始五年改曰隨陽郡元徽四年屬司州齊梁曰隨郡西魏大統十六年置并州廢帝三年改曰隨州隋開皇初廢隨郡大業初改隨州曰漢東郡唐武德三年後為隨州天寶初曰漢東郡乾元初復曰隨州屬山南東道宋曰隨州漢東郡乾德五年置崇義軍太平興國元年改曰崇信軍屬京西南路元仍曰隨州屬德安府明初改州為縣後復置州以州治隨縣省入本朝因之應山縣在府北九十里東西距一百三十里南北距一百三十里東至漢陽府孝感縣界七十里西至隨州界六十里南至安陸縣界四十里北至河南汝寕府信陽州界九十里東南至孝感縣治一百八十里西南至應城縣治一百八十里東北至汝寕府羅山縣治三百五十里西北至襄陽府棗陽縣治二百八十里漢隨縣地梁大同二年分置永陽縣兼置應州隋開皇十八年改縣曰應山大業初州廢縣屬安陸郡唐武德四年復置應州七年州廢縣屬安州五代因之宋屬德安府嘉定中改蜀隨州元因之明洪武九年省入隨縣十三年復置隸德安府本朝因之形勢連翼軫之分野控荆襄之遠勢唐李白代答孟少府移文北接隨唐東黄南鄂西接荆郢亦江漢閒一都會也地理通釋巖石狹隘道路交錯文獻通考風俗陂池沃衍魏志王基傳士民純秀幾同鄒魯之風宋滕元發啟土風淳厚士多秀傑宋周必大茇堂記俗喜儒學名勝之流相望宋李元衡學田記城池德安府城周六里有奇高二丈餘門四有濠明洪武二年建嘉靖中築北門月城左右為門建城樓本朝康熙中安陸縣附郭雲夢縣城周三里有奇門四有濠明成化中築隆慶中増築萬厯中甃甓本朝順治中重修應城縣城周五里有奇門六有濠明成化中築嘉靖三十六年甃甓本朝康熙雍正中屢修隨州城周三里有奇高一丈五尺門四有濠明洪武初建成化中濬池宏治中築䕶城隄嘉靖中又築郭外土城增西北二門濬濠本朝雍正三年修濬應山縣城周三里有奇門四有濠明嘉靖中建本朝順治初修學校德安府學在府治東宋淳熙初建於三皇臺前明嘉靖中徙今所本朝順治中修入學額數二十名安陸縣學在縣治東府學西明洪武中建於清風街嘉靖中徙今所本朝康熙中修入學額數十五名雲夢縣學在縣治東明洪武中建本朝康熙中重修入學額數十五名應城縣學在縣治東明