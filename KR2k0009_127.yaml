大洪山奇峯寺有僧數百轉運使疑其有姦狀令往按華審其無他僧賂以金不受即令僧轉賑饑民多所全活李孝基趙郡人仁宗時知隨州所治雖劇然事來亟㫁甫日中庭已空矣或問其術曰無他省事耳司馬旦夏縣人知安州治郡有大體所施設取於適理便事范純仁吳縣人英宗時通判安州力求人間利病隨時興革朞月政化大行風俗改易至哲宗時爲相復忤章惇落職知隨州滕元發東陽人神宗時言新法之害黜知安州多善政謝良佐上蔡人徽宗時應城令時胡安國以典書使者行部過之不敢閒以他事因介紹請以弟子禮見入見吏卒植立庭中如土木偶人肅然起敬遂稟學焉陳規安邱人靖康末安陸令盜祝進等攻德安府守棄城遁父老請規攝守事規遣兵討進連戰敗之建炎元年除知德安府李孝義張世以歩騎數萬薄城陽稱受詔招規規登城視其營壘曰此詐也亟為備夜半孝義兵圍城遂大敗之與羣盜楊進相持十八日進技窮以百人自衛抵濠上求和規出城與交臂語進感之折箭為誓而去董平引衆窺城遣其黨李居正黄進入城求犒規斬進授居正兵為前鋒大破之吳柔勝宣州人嘉定中知隨州時再議和好戒開邊隙旁塞之民事與北界相涉不問法輕重皆殺之郡民梁臯有馬為北人所盜追之急北人以矢拒臯臯與其徒亦發二矢北界以為言郡下七人於獄柔勝至立破械縱之具始末報北界而已收土豪孟宗政扈再興隸帳下後宗政再興皆為名將築隨州及棗陽城招四方亡命得千人立軍曰忠勇營柵器械悉備趙方衡山人嘉定中知隨州時南北初講和旱蝗相仍方親走四郊以禱一夕大雨蝗盡死歲大熟元德格蘇高昌人至元中德安府達魯噶齊土人蔡知府者以衆叛德格蘇率衆平之主將怒將屠其城德格蘇請曰叛者蔡知府數人而已城中人何預焉盍誅其黨與而止毋令濫及非辜主將嘉其誠懇城遂得全德格蘇舊作鐵哥术達魯噶齊舊作達魯花赤今改正明張寛福建人洪武中知德安府兵燹之後署廨學校殘燬寛修葺之下令州縣招徠耕種子弟可教者督以誦習在任七年去汪灌休寕人洪武初知雲夢縣創學勸農民久而慕之杜智蕪湖人洪武中知隨州以催科考殿例當遣廷臣奏其治狀詔乘傳復任諸葛平陽朔人洪武閒知應山縣廉能愛民均徭簡賦吏服其威民安其惠孫士良永樂初知應山縣政事簡惠賦役以均未三考人户増三千餘口開墾荒田五十餘頃朱幹永樂初知應城縣律已公正政勤而廉民懐吏戢秩滿升知隨州陳家慶頴上人永樂閒知安陸縣精敏有才節縮甲里賦均徭簡乃酌量其法名曰便民政畧徧諭閭閻俾民不為吏胥所欺陳莘廣西人永樂閒知隨州咨訪利病循行阡陌或微服與野老談使盡言布政悉協人情闢田四百餘頃民受其利范理天台人正統時知德安府隨州民田為楚王䕶衞所占猶令輸賦理奏悉還民歲再巡屬邑省耕牧廉疾苦部内大治饒政望江人正統中德安府學教授荘重謹飭教有成規雖祁寒盛暑不輟吕禴昆明人成化中知隨州嚴明廉慎值歲旱民饑禴素衣跣足禱雨發倉賑貧初夏民納祇候錢禴曰五穀未登錢必假貸於人者令還主候秋赴納胡世安仁和人宏治中德安府推官時𡵨王初就藩從官驕世安裁之他日復請湖田堅侍不可黄鞏莆田人宏治時德安府推官諸所修舉以正風俗作人材為先飭學宫表董孝子祠周衝宜興人正德時知應城縣實心任事以道化民立謝上蔡祠建常平倉李逢豐城人嘉靖間知德安府明敏剛毅務先教化黠吏莠民悉置之法徐元貞繁昌人嘉靖時知德安府嚴毅仁恕下車輒令曰農民力不能耕者吿守為備耕具遷立學宫歲荒即募流民築河隄民得活而水無患吳哲貴州人嘉靖中知應城縣有機畧邑土城數圯哲延富民集讌邑庭議陶甓甃之皆欣然各任力所優注多寡丈尺於籍中已乃分地書姓名標識之民樂事勸功匝月而城成潘淵天台人嘉靖時知雲夢縣濬史河口利塘及楊家河築隄捍水雲夢既享其利應城安陸俱無水患唐可大秦州人嘉靖中以德安府通判攝雲夢縣事邑有天井湖寛四百餘畝居民據爲利可大廉得其實清覈還官請置爲學田以給學宫贍貧士羅黃裳高明人嘉靖中知雲夢縣逐積猾恤貧困當景藩就國及丧還經楊家河黄裳威望素著又饒幹用故奄䜿慴服而民不擾朱之臣成都人萬厯中知德安府下車之日爲文以誓神曰瞿塘灧澦臣之歸路妄攜一文浪翻舟覆爲如水堂以延問字者名士多出其門龎應賓瀘州人萬厯中同知德安府事凡地方利害閭閻苦樂悉周知之人皆熟識見即問疾苦若家人郡人咸以大父稱之鄭二陽開封人天啟中德安府推官治獄多所平反歲大祲煑粥活人公餘集郡子弟講學擇知名士爲塾師應山楊璉死璫禍懸贓巨萬爲作募疏醵金詞義悲壯觀者泣下爭輸助焉張紹登餘干人崇禎間知應城縣清廉耿介不畏强禦流寇陷城紹登冠帶端坐堂上賊將手擒之紹登奮拳毆賊賊衆擁上遂被害贈太僕少卿本朝乾隆四十一年賜諡烈愍李之經永興人應城教諭賊破城率民拒戰死之子應泰亦以身殉本朝乾隆四十一年予祀忠義祠張國勲黄陂人崇禎間應城訓導流寇䧟城罵賊死贈國子監學正蔡宗虞四川人崇禎間知雲夢縣聞寇警鑿濠増堞團練編户激獎義勇九年冬寇圍城攻七晝夜宗虞悉力堵禦數擒賊将援至圍遂解諶吉臣新建人崇禎間知雲夢縣闖賊陷城吉臣𬒳執不屈遂遇害本朝乾隆四十一年賜諡烈愍王燾崑山人崇禎間知隨州殲滅土寇李良喬又禦流賊擊斬三百餘人賊攻益力相持二十餘日燾知必敗整冠帶自經死賊焚其署燾屍直立不仆賊駭走已覓州印得之燾所立尺土下贈太常少卿謚烈愍本朝乾隆四十一年賜諡節愍濮有容分水人崇禎中知安陸縣流賊陷城闔門十九人死難一年本朝乾隆四十賜諡烈愍徐世淳嘉興人崇禎間知隨州流賊圍城募士死守躬自登陴拒戰城陷率鄉兵巷戰中數十創死其子肇梁及兩妾臧獲等死者二十餘人事聞贈太僕少卿諭祭葬立廟州城本朝乾隆四十一年賜謚烈愍佘塙銅陵人隨州州判崇禎十四年三月賊至知州徐世淳殉節七月賊再至塙署州印城陷罵賊死本朝乾隆四十一年賜諡節愍沈元鑑金壇人隨州吏目獻賊犯隨防守兩月援不至被執脅降不從死本朝乾隆四十一年予祀忠義祠本朝吳宗孟寳豐人順治進士知雲夢縣留心撫輯民困以甦縣多盗設法弭捕殆盡楚俗好鬼宗孟察縣境内淫祠悉毁之白彦良武進人康熙進士知雲夢縣軫民疾苦時里長最為民累彦良首除之劉景齡字鶴年漢軍人乾隆武進士任德安營㕘将亷明公恕得軍民心嘉慶元年教匪據孝感胡家寨景齡令城中嚴守自幸所部攻賊馬䧟淖中遇害事聞予雲騎尉世職軍民建祠祀之人物周季梁隨大夫楚武王侵隨使薳章求成焉隨人使少師董成王毁軍而納少師少師歸請追楚師季梁止之曰天方授楚楚之羸其誘我也君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐鬬穀於菟字子文生於䢵楚成王時代子元為令尹未明而立於朝日晦而歸食自毁其家以紓難三仕不喜三已不愠舉子玉為令尹悉告以舊令尹之政孔子甞稱之曰忠鬭克黄令尹子文孫楚箴尹也楚滅若敖氏克黄使於齊還聞亂其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子丈無後何以勸善使後其所改命曰生漢黄香字文彊安陸人年九歲失母思慕憔悴年十二太守劉䕶召署門下孝子甚見愛敬香博學能文京師號曰天下無雙江夏黄童初除郎中肅宗詔詣東觀讀所未嘗見書後召詣安福殿言政事拜尚書郎數陳得失累遷尚書令遂管樞機甚見親重香祗勤物務憂公如家東平清河奏妖言卿仲遼等所連及且千人香科别據奏全活甚衆每郡國疑罪務求輕科人曉習邊事均量軍政皆得事宜在位多所薦達周章字次叔隨人為郡功曹時竇憲封冠軍侯就國章從太守行春冠軍至太守欲謁之章進諫不聽前拔佩刀絶馬鞅乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章舉孝廉六遷為五官中郎將永初元年代尹勒為司空家無餘財諸子易衣而出并日而食黃瓊字世英香子永建中徵拜議郞遷尚書僕射初瓊隨父在臺閣習見故事及居職練連官曹爭議朝堂莫能抗奪遷尚書令元嘉元年為司空桓帝欲褒崇大將軍梁冀使二千石以上㑹議其禮胡廣等咸稱冀之勲德制度賞賚宜比周公瓊獨建議比霍光鄧禹朝廷從之冀以為恨為太尉翼所託辟召一無所用舉奏州郡素行貪汙至死徙者十餘人海内翕然望之尋五侯擅權自度力不能匡乃稱疾不起疾篤復上疏諌卒贈車騎將軍諡忠侯漢濱老父不知何許人桓帝幸竟陵過雲夢百姓莫不觀者老父獨耕不輟尚書郎張温使問之笑而不答温下道百歩與之言老父曰我野人了不達所語昔聖王宰世茅茨土階而萬人以安今子之君勞人自逸縱游無忌子何忍欲人觀之乎温大慙問其姓名不答而去黃琬瓊孫少辯慧瓊爲魏郡太守建和元年日食太后詔問瓊所食多少瓊思其對而未知所况琬年七歲在旁曰何不言日食之餘如月之初瓊大驚即以其言應詔後拜童子郎辭不就知名京師稍遷五官中郎将陳蕃深相敬待數與議事爲權富郎所中傷䧟以朋黨禁錮幾二十年光和末太尉楊賜薦拜議郎累遷豫州牧董卓秉政徴爲司徒遷太尉封陽泉鄉侯卓議遷都長安琬駮之坐免及徙西都轉司隸校尉與王允同謀誅卓及卓将李傕郭汜破長安收琬下獄死晉王傴江夏人官江安令張昌搆亂江夏士庶莫不從之惟傴與秀才吕㽔不從昌以三公位徵之傴㽔密將宗室北奔汝南投豫州刺史劉喬郷人期思令李權常安令呉鳳孝廉呉暢紏合善士得五百餘家追隨傴等不豫妖逆李充字宏度江夏人善楷書辟丞相王導掾轉記室叅軍甞著學箴深抑虚無之士爲大著作郎於時典籍混亂充刪除煩重以類相從分作四部甚有條貫累遷中書侍郎卒官子禺亦有文義多所述作郡舉孝廉從兄式以平隠著稱善楷隷中興初仕至侍中南北朝陳徐度字孝節安陸人初從梁始興内史蕭介征諸山洞以驍勇聞侯景之亂陳武帝克廣州平蔡路飬破李遷仕計畫多出於度景平封廣德縣侯梁敬帝時徐嗣徽等引齊寇濟江度破之陳天嘉元年以平王琳功封湘東郡公終官司空贈太尉諡忠肅徐敬成度子㓜聰慧好讀書機警善占對以識鑒知名光大元年隨呉明徹平華皎五年復隨明徹北討齊人皆城守弗敢岀克淮陰山陽盬城三郡仍進克鬱州進號壯武将軍卒官安州刺史諡曰忠唐樊興安州人從唐公平長安授左監門將軍從秦王積戰功多封營國公貞觀六年陵州獠反命討之又從李靖撃吐谷渾改封襄城郡公太宗征遼以興忠謹副房喬留守京師卒贈左武侯大將軍洪州都督許紹字嗣宗安陸人元皇帝爲安州總管紹兒時與高祖同學相愛大業末任夷陵通守後王世充篡立以黔安武陵澧陽歸國封安陸郡公擊走蕭銑將楊道生擒銑将陳普環取銑荆門城制書褒美進譙國公卒於軍貞觀中贈荆州都督子圉師有器幹研涉藝文擢進士第龍朔中為左相坐子罪免官久之為䖍州刺史遷相州以寛治州人刻石頌美進户部尚書卒贈幽州都督諡曰簡許欽寂紹曾縣嗣封譙國公萬歲通天元年契丹入寇詔為隴山軍討擊副使戰崇州敗為敵所擒方圍安東脅令説屬城未下者欽寂呼安東都䕶裴元珪曰賊朝夕當滅幸謹守遂被害贈蘄州刺史謚曰忠弟欽明以軍功累遷涼州都督嘗輕騎按部㑹突厥黙啜兵奄至被執見害兄弟死王事世稱其忠郝處俊安陸人父相貴甑山縣公處俊十歲而孤故吏歸賵辭不受及長好學貞觀中第進士襲父爵累遷吏部侍郎高麗叛詔處俊副李勣討之入敵境賊遽至處俊據胡牀不顧密遣精鋭撃之賊郤入拜東臺侍郎轉中書侍郞監修國史上元初帝觀酺翔鸞閣時赤縣與太常音伎分東西朋帝詔雍王賢主東周王顯主西因以角勝處俊曰二王春秋少意操未定乃分朋造黨使相誇爭勝負非所以導仁義示雍和也帝遽止帝多疾欲遜位武后處俊諌沮拜侍中罷爲太子少保武后雖忌之以其操履無玷不能害卒贈開府儀同三司荆州大都督孫象賢垂拱中爲太子通事舍人后素銜處俊因事誅之臨刑極罵乃死五周鄭建中安陸人家饒貲好施舍遇親故必周之毎大雨過輒載瓦代人補屋漏隆冬月蠲僦舍錢無算宋連舜賓字輔之應山人少舉毛詩不中遂歸飬其父正不復仕家多貲悉散以周鄉里教其二子庶庠以學曰此吾貲也歲饑出穀萬斛減價以糶及卒遠近往哭歐陽修曰連處士以一布衣終於家應山人至今思之其長老教子弟必以處士爲法曰爲人如連公足矣宋庠字公序安陸人本名郊登第後改名舉進士試禮部皆第一郭皇后廢庠與御史伏閤爭論坐罰金密州豪王澥殺人宰相陳堯佐右澥庠力爭卒抵死寶元中以右諌議大夫參知政事儒雅練習故事後以檢校太尉同平章事充樞密使封莒國公英宗即位改封鄭國公以司空致仕卒贈太尉諡元獻帝爲篆墓碑曰忠規德範之碑庠儉約不好聲色讀書至老不倦天資忠厚嘗曰逆詐恃明殘人矜才吾終身弗爲也宋祁字子京與兄庠同舉進士禮部奏祁第一章獻太后不欲以弟先兄乃擢庠第一而寘祁第十累遷太常博士李照定新樂胡瑗鑄鐘磬祁皆典之改龍圓學士史館修撰修唐書景祐中詔求直言祁上奏主於强君威别邪正急先務皆切中時病唐書成遷左丞進工部尚書卒遺奏請擇宗室賢材進爵爲王爲匕鬯之主又自爲誌銘及治戒以授其子祁兄弟皆以文學顯而祁尤能文善議論後諡景文連庶字君錫舜賓子舉進士調商水尉夀春今縣大冶以母老乞監陳州税求歸久之歐陽修祖無擇言庶文學行義宜在䑓閣起知崑山縣辭遷職方員外郎卒連庠字元愷庶弟登科爲都官郎中敏於政事號良吏庠始與庶在鄉里時宋郊兄弟歐陽修皆依之及二宋貴達不阿其志退居二十年守道好修非其人不交非其義秋毫不可沔也鄭獬字毅夫建中孫少負俊材登進士第一知制誥英宗即位獬言陛下初臨御宜詔内外許令盡言臣下進見乞虛心訪以得失帝嘉納之神宗初拜翰林學士以不肯用新法為王安石所惡出知杭州徙青州方散青苗錢獬言但見其害不忍民無罪而䧟憲網引疾祈閑提舉鴻慶宫卒家貧子弱其柩藁殯僧屋十餘年滕甫為安州乃克葬劉逵字公路隨州人進士高第累遷中書侍郎首勸徽宗碎元祐黨碑㝟上書邪籍之禁凡蔡京所行悖禮虐民事稍稍澄正未滿歲御史余深石公弼論逵專恣反覆罷知毫州連萬夫應山人𥙷將仕郎建炎四年羣賊犯應山萬夫率邑人保山砦賊不能犯寇浪子者以兵至圍之三日卒破砦賊知萬夫勇敢有謀欲留為用萬夫怒厲聲罵賊為所害贈右承務郎王登字景宋德安人淳熙四年進士調興山主簿邊事亟制置使吳淵具書幣招登登至沙市椎牛釃酒得七千人竟立奇功於沮河趙葵為制置使握登手曰景宋一身膽惜相見晚也俾參宣撫司遷軍器少監京西提點刑獄威聲日振李庭芝字祥甫應山人後徙隨州復徙德安嘉熙末荆帥孟珙以庭芝權建始縣期年民皆知戰守淳祐初舉進士第辟洪幕中珙卒棄官歸後主管兩淮制置司事守揚州破李璮兵咸淳末元兵圍揚遣使招降庭芝悉誅之既而益王遣使招庭芝庭芝至泰州禆将以城降庭芝赴蓮池水淺不得死被執至揚遇害邊居誼隨州人初事李庭芝積戰功至都統制咸淳十年以京湖制置帳前都統守新城居誼善御下得士心凡戰守之其治之皆有法元兵至沙陽居誼率舟師拒之吕文焕居誼故主將也已降元招居誼不從又射榜檄入壁中居誼曰吾欲與㕘政語耳文焕聞之以為居誼降己也馳馬至伏弩亂發中文焕及馬馬仆幾鈎得之衆挾文焕以他馬奔越二日總制黄順降其部曲欲縋城出居誼悉驅入當門斬之文焕乃麾兵攻城居誼取家金盡散將士往來督戰城破火發居誼拔劍自殺不殊赴火死丞相巴延壯其勇購得其屍燼中觀之事聞贈利州觀察使立廟死所巴延舊作伯顔今改正元趙復字仁甫德安人元兵䧟德安姚樞奉詔即軍中求儒得復以歸世祖在潛邸召問曰我欲取宋卿可導之乎對曰宋吾父母國未有童寅字以敬隨州人永樂進士官至江西按察使廉介勤恪卒官家無餘貲程春震字時舉雲夢人成化進士授建昌知縣以通敏强幹聞擢御史巡按大同廣西皆有聲以忤汪直左遷安岳知縣邑大旱賑恤安集全活甚衆徐珪字必信應城人宏治初為刑部吏時李廣用事其黨楊鵬監東廠頗專恣珪手疏千言乞革東廠下詔獄踰年廣敗陳鳳梧以為言授桐郷丞加知州服俸陳金字汝礪應城人成化進士知婺源縣有異政厯官右副都御史巡撫雲南孟養與孟密搆兵金遣官撫之其酋罷兵修貢正德初擢右都御史總督兩廣軍務平馬坪洛容獞亂江西盗起以金總制南畿浙江福建廣東湖廣軍務累破劇賊加少保入掌都察院事致仕金虛心好善剛果有為志在立功不問家事陳才傑應山人性孝友正德七年劉六等寇應山才傑領民赴戰死之安大峞雲夢人沖澹不樂仕進博學好古兼精緯候正德末年夜占異之曰帝星明於江漢其應在安陸州踰年世宗果從興邸入繼年九十四卧疾猶倚牀披覧不輟子孫勸止之曰吾以書藥疾也學者稱為曲湖先生顔木字惟喬應山人正德進士居都下與黄岡王廷陳稱楚兩傑知許州改知毫州坐中傷免性嗜書善研究文思精勁歸益淬厲名節居馬坪二十餘年吟誦不輟學者翕然宗之傅鳳翔字德輝應山人嘉靖進士知上蔡縣拜御史按江西浙江卓有風采累官兵部石侍郎以通敏稱高翀字允升安陸人嘉靖進士累官右副都御史巡撫貴州平苗亂誅叛卒李昂劉鵬字南夫安陸人嘉靖間夀藩軍尉横擾市民郡守抑之王疏劾守詔廷尉訊鵬佐守對簿守事白左遷就見其廬鵬不見守歎服久之呉一魁安陸人父道東以誣論辟一魁年十二徒跣赴京師值肅宗郊祀伏道旁陳寃狀帝嘉其孝宥其父賜帛馳驛歸里周珫字潤夫應城人嘉靖進士知永嘉縣入為吏科給事中剛正不撓世宗南巡䟽擊權貴廷杖謫典史起知婺源縣累遷兵部右侍郎病免李㓜滋字元樹應城人嘉靖進士授行人改禮科給事中以拂權貴意謫邵武縣丞移安慶推官累官工部尚書以治河功加火子少保性端嚴不輕假人嚬笑莅官持法居鄉以秉禮稱楊芷字次泉安陸人嘉靖進士知呉江縣平毛葫蘆之亂擢工部主事累遷江西布政使吿歸嘗謂其諸子曰我觀子弟之不肖者只是未甞讀書學力既到俗氣自消人以為名言陳德潤字玉甫應城人温雅端方勤學勵行為諸生邑令盧湘延以訓子久之湘子歸貴陽而湘以事被繋郡獄潛以二篋寄德潤所人無知者湘暴卒越二年其子自貴陽來迎柩德潤呼至家持篋付之曰令君寄也封識如故其子請剖物以謝不受劉伯燮字元甫安陸人隆處進士授户部主事改工科給事中遇事敢言彈劾不避權要督學滇南操執清慎累官廣東按察使以母老不赴陳榘字應虹應城人隆慶進士性嚴正明治體莅官廉能以户部尚書卒官贈少保李諮字藎伯應山人以貢入太學知平武縣多善政奔䘮歸邑人立石頌之居鄊循禮鄉人稱為和節先生鄒觀光字孚如雲夢人萬厯進士為吏部郎公平廉正門無私謁性孝友丁父憂廬墓三年藏書數千卷於學宫勒石記之俾士就讀建尚行書院講學學者多從之與吉安鄒元標齊名時稱二郎先生官至太僕卿何宗彦字君美隨州人萬厯進士累官詹事遷禮部侍郎屢疏請東宫講學皇孫就傅宗彦清修有執遇事侃侃時望甚隆旋乞假去光宗立即家拜禮部尚書兼東閣大學士還朝屢加少師兼吏部侍郎卒贈太傅諡文毅楊紹中字長源雲夢人萬厯進士知餘干縣累遷為貴州監軍副使以計擒叛苗擢雲南布政使致仕歸楊漣字文孺應山人萬厯進士知常熟縣擢兵科給事中光宗不豫鄭貴妃據乾清宫帝趣禮部封貴妃為皇太后漣與左光斗昌言於朝共詰責鄭飬性令貴妃移居後宫漣遂劾崔文昇用藥無狀請推問且言貴妃封號尤乖典常請亟寝前命疏上逐文昇停封太后命光宗晏駕諸大臣慮皇長子勢孤欲共託之李選侍漣曰天子豈可託婦人且選侍豈可託㓜主者遂趣諸大臣趨乾清宫奉駕至文華殿中官欲奪還漣訶之奉駕入慈慶宫是時李選侍居乾清漣抗䟽論之選侍遂移宫天啟二年擢太常少卿進左副都御史魏忠賢用事漣劾忠賢二十四大罪遂削籍尋逮下詔獄酷法拷訊於夜中斃之産入官不及千金母妻止宿譙樓二子至乞食以飬徵贓令急鄉人競出貲助之下至賣菜傭亦為輸助其節義感人如此崇禎初贈太子太保諡忠烈兄清諸生時同漣讀書山中慕里中二宋二連人亦以宋連目之清以貢生厯官金華同知漣被璫禍罷官家居事雪復同知衢州府致仕王瑊字崑璧應城人萬厯進士厯官甘肅巡撫入為兵部侍郎時魏忠賢專横瑊遂不為禮拂衣歸流寇陷城瑊率家人捍禦力不支𬒳害一年本朝乾隆四十賜謚節愍饒可久字甄安應城人事母徐氏以孝聞崇禎初知大興縣以疏改三朝要典謫光祿寺典薄閹黨除累還知府守制歸流賊薄城可之率衆堅守及城䧟命妻程氏曰臣宜忠婦宜節吾已分死汝軰各早為計其妻及女遂縊死可久被執賊强使拜罵曰頭可斷膝不可屈賊怒刃之本朝乾隆四十一年賜謚節愍袁啟觀字君白雲夢諸生流賊至啟觀立寨自守賊執之去不屈遇害本朝乾隆四十一年予祀忠義祠喻於義隨州貢生流賊陷城於義以母老不能出城遇賊跪求母命遂𬒳殺母守尸痛哭賊感動遂釋其母劉申錫隨州舉人崇禎中豫養死士百人及賊陷城倡義圖復兵敗為賊將白旺所殺百人皆戰死本朝乾隆四十一年予祀忠義祠廖應元字乾初安陸諸生流寇至鄉民皆結寨自保賊將白旺連陷數寨應元益堅守為奸執送罵賊而死本朝乾隆四十一年予祀忠義祠黄在中字暢美雲夢諸生少嗜學事母以孝聞祟禎末授徒應城時母年八十餘喪明寇至在中負母逃為賊所得賊刃其母在中抱母屍且哭且罵賊怒亦殺之趙士選隨州人崇禎時流寇至士選同父避難峯峩寨父病行遲未至寨被執士選願以身代賊遂釋其父而執士選至黄州適其家耕牛亦被掠在營牛見士選垂淚士選亦泣賊憐而並釋之李儲元字敏真雲夢人篤於孝友母疾嘗藥餌浣厠牏晨夕不懈母卒哀毁骨立流賊熾儲元聚族立砦賊誘砦長盡攜男婦入城儲元堅守拒之竟免於難寇可教字圖雲應城人累官工部郎中李自成陷京師罵賊死同縣徐晤可官錦衣百户亦殉其難年本朝乾隆四十一賜諡節愍范純元字建侯應城人流賊陷城父被執純元號泣曰吾願就戮無傷吾父賊並殺之柳宗旦字鼎極雲夢諸生教授里塾以資給諸弟歲饑設粥賑流民流賊陷城欲官之宗旦大罵賊怒斧其首死妻劉氏亦以節終同縣朱善昌左璞皆不屈於賊死宗旦與善昌璞俱於本朝乾隆四十一年予祀忠義祠李聯元雲夢人居曲水湖離城三里許流寇夜襲城過其地聯元恐城中不知率族衆大呼聲聞城内賊怒擒殺之一年本朝乾隆四十予祀忠義祠施爾奇字簡之雲夢諸生流寇犯其里伏梃拒之被害其妻劉氏與女同往救俱死同縣柳列奎亦以拒賊見殺本朝乾隆四十一年予祀忠義祠張用晦雲夢諸生流寇陷白雲寨義兵恢復用晦起兵應之戰敗不屈死年本朝乾隆四十一予祀忠義祠本朝洪起元字瑞芝應城人明末從父避亂遇賊欲殺其父起元奪刀殺賊本朝順治二年應募授千總金聲桓叛於南昌起元時署寕都遊擊率兵從巡撫劉武元禦賊斬戮無算廣東叛鎮李成棟犯贑州起元與叅將鮑虎撃破之康熙十三年閩藩耿精忠叛招誘起元起元發其書擊賊於白米堰黄瑞山等處屢斬賊將十五年平常山淳安諸賊恢復雲和松陽諸城累官至左都督楊之易字元仲漣子方漣𬒳逮欲赴闕上書請以身代漣力止之本朝累官知松江府兼海防同知賊匪據南匯之易討平之提督呉勝兆叛之易罵賊遇害事間贈江南按察副使賜祭葬周宗成隨州人性孝友重節義明季流寇肆掠宗成避亂鄂城城陷負老母攜孤姪奔還隨州結義砦練鄉卒合郡難民爭依之賊不敢犯連年饑饉多方賑濟全活無算至本朝以講學為事鄉里共欽之康熙五年祀鄉賢洪一棟起元子以軍功授臺灣海防同知稽查水口商船驗到放行不受私餽臺灣民鮮葢藏旱澇無備一棟請平糶民得無飢秩滿當代士民請留在任九年卒於官從祀名宦祠黄蘇字奎臨雲夢人順治已亥進士為掖縣令甫下車雪七姓寃獄邑瀕海民苦逃盜株連蘇嚴緝捕除渠魁民賴以安治行為山左最徐則敏應城人康熙間知蕭山縣操守廉介禮士恤民值大造丈量則敏清其弊由是貧弱免賠糧之累許治字均宇雲夢人乾隆已未進士知華亭縣秋雨傷稼松江六縣民紛紛持死禾塞府署提督黄某方勒兵防變治急趨軍門止之至府署婉轉開導踰時始散復力請於守報災賑卹調元和令檄辦越江隄工凡礙廬墓處治白大吏稍紆曲以保全之程大中字拳時應城人乾隆丁丑進士授青溪知縣績學能文著四書偶見五卷又著别錄十種内四書識遺一種博洽精慎盛行於世陳方順安陸人少孤事母以孝聞母殁廬墓七年乾隆年閒旌周文瑞監生應城縣人事親能致色養親殁廬墓哀慕感動鄉鄰與邑民陳建勲俱於嘉慶元年以孝行旌許兆椿雲夢人乾隆壬辰進士由編修改御史洊升巡撫厯吏刑工倉場侍郎及漕運總督守松江時所屬七邑災歉兆椿禀請報災緩征上海令撓其事兆椿復請曰災重民困今之持異説者非注意錢漕之利即全不關心民瘼之員願勿聴大吏查勘得實卒從其請遊擊楊天相報獲洋盗張茅等十七名總督檄兆椿訊狀始知茅等皆閩民渡洋貿易者有蹤跡可憑立子平反讞定遊擊寘重典巡撫貴州擒黎平苗匪歐桃等二百餘名旬日蕆事苗境無驚任倉場侍郎五十日查辦蠧吏高天鳳積弊倉儲肅清嘉慶二十一年予祀江蘇名宦祠流寓漢馬武南陽湖陽人少時避讎客居江夏王莽未竟陵西陽三老起兵於郡界武往從之後從世祖擊賊拜捕虜将軍封揚虛侯戴良汝南慎陽人再辟司空府彌年不到州郡迫之乃將妻子逃入江夏山中優游不任以夀終岑晊南陽棘陽人罹黨錮之禍李固杜喬誅晊逃竄終於江夏山中唐李白蜀人遊安州娶許氏女讀書白兆山之麓題其石曰桃花巖宋歐陽修廬陵人從父華為隨州推官修少孤因寓於隨列女元趙孝婦應城人早寡事姑孝家貧傭織於人得美食必持歸奉姑嘗念姑老一旦不諱倉卒無棺乃鬻子買杉成槥置於家鄰家火孝婦亟扶姑出避棺重不可移乃撫膺大哭曰吾賣兒得棺今将燬於火可若何風忽返得不焚人以為孝感所致宋孝女應城人母劉氏因産得廢疾女十歲始知曰母為我致疾我當報之及笄翦髪誓不適人養母四十餘年志操無玷母死未踰月而殞明葉貞明妻陳氏隨州人正德中流賊劉六等掠隨陳挈二子以避遇賊欲汚之不從殺其二子以脅之又不從乃刳其孕而死同時華貞妻陳氏劉本根妻席氏俱應山人亦罵賊不辱而死呉金妻周氏應山人流賊入境欲污之不從乃縛几上剖腹而死朱比妻張氏安陸人未嫁比卒父母為議婚女曰吾身已許朱矣豈得復有二言是夜自經死巡撫汪道昆奏表其墓劉自義妻李氏安陸人夫卒殮畢絶粒死陳大佑妻周氏安陸人年二十四夫亡家甚貧父母欲奪其志不從居城南三十里鯉魚灘一夕山水暴至周身伏夫柩誓與俱没水忽退丈許比閭漂没周氏獨存徐某妻張氏應城人名廉姊幼字徐年十七婿夭父母將改聘女登樓自刎端坐不僵事聞建坊墓後張宏初妻周氏應城人夫亡自刎死關坤妻安氏雲夢人年十九夫歿欲殉之不得越月聞其母疾乃奉夫主往母所母微諷欲奪其志安號泣不應登樓縊死嚴一敬妻姜氏安陸人夫卒子㓜撫子成立𥙷諸生乃謂子曰吾以汝故不早殉地下未盡之事汝自勉之遂絶粒死周治岐妻王氏安陸人夫卒有欲奪其志者引斧欲自斷其臂乃止黄應泰妻佘氏應城人夫卒事姑盡孝族中有欲奪其志者火其旁舍將及室忽大雨滅火人異之教子師憲􅈾鄉薦曰吾可以見汝父地下矣不食死熊雲斐妻吕氏隨州人雲斐随父任旱死吕年十九欲自盡姑勸之吕勉扶夫櫬歸葬畢盡散其所有閉户七日不食死楊漣妻詹氏應山人事繼姑以孝聞姑病刳股者三漣罹璫禍庶子之環甫生撫之如己出彭濛妻陳氏應山人年十五適濠濛貧陳脱簪珥奉舅姑膳濠死抱屍痛哭斷左手中指翦髮為三一付姑一付母一裹斷指納濛棺中絶粒七日而亡貧不能殮縣令姫文華捐俸殯之王國俊妻黄氏應山人未婚而國俊卒女請父母徃弔即留殯殰畢遂留餋姑明年營葬事畢乃拜訣母與姑不食九日死王芳妻楊氏應山人芳墜於水楊亟赴救之芳溺益深遂俱死何志崇妻饒氏應城人知府饒可久女流