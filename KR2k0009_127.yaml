對飲劉便先起云今正伐荻不宜久廢張亦無以留之青楊巷在江陵縣東南沙市北史何妥傳蘭陵蕭眘有雋才住青楊巷妥住白楊頭時人爲之語曰世有兩雋白楊何妥青楊蕭眘垂車坊在江陵縣東方輿勝覽朱昂太宗朝爲翰林學士引年請老上以荆南故苑賜之力辭乃賜城東一坊是時知制誥陳堯咨爲尹爲題其坊曰垂車津鄉在枝江縣西左傳莊公十八年巴人伐楚十九年楚子禦之大敗於津水經注枝江縣西三里有津鄉郭仲産云㝷楚禦巴人枝江是其途便此津鄉即其地也渚宫在江陵縣城内西北隅左傳文公十年子西沿漢泝江將入郢王在渚宫下見之水經注今城楚船官地春秋之渚宫名勝志渚宫楚之别宫梁元帝於渚宫故地修造臺榭湘東苑在江陵縣城内今廢渚宫故事湘東王繹於子城中造湘東苑穿池構山長數百丈植蓮浦中緣岸雜以奇木其上有通陂閣跨水為之南有芙蓉亭東有禊飲堂堂後有隱士亭亭北有真武堂堂有射堋馬埒其西有鄉射堂堂置行堋可得移動東南有連理堂堂前柰生連理當時以為湘東踐祚之瑞北有映月亭修竹堂縣水齋前有高山山有石洞潛行委宛二百餘歩山上有陽雲樓樓極髙峻遠近皆見北有臨風亭明月樓又有竹林堂一柱觀在松滋縣東邱家湖中渚宫故事宋􅎔川王義慶在鎮於羅公洲立觀甚大而惟一柱故名府志宋紹興二十年松滋縣令吕令問移觀之名於大橋五花館在江陵縣城内錢易南部新書荆南城中舊有五花館待賓客之上地也萬卷閣在江陵縣治東明統志宋咸平初朱昂與弟協致仕於所居建此閣藏其手抄書萬卷故名釣臺在江陵縣東水經注龍陂北有楚莊王釣臺高三丈四尺南北六丈東西九丈漸臺在江陵縣東六十里劉向列女傳貞姜齊侯六昭王夫人昭王出遊留之漸䑓之上綘帳臺在江陵縣西南方輿勝覽漢馬融為南郡太守坐高堂施絳帳前授生徒後列女樂今子城鼓角樓之西絳帳臺是其處也落帽臺在江陵縣西北龍山以晉孟嘉事築大暑臺在江陵縣束北水經注赤湖東北有大暑臺高六丈餘縱横八尺一名清署堂秀字層明通望周博遊者登之以暢遠情輿地紀勝宋臨川王義慶在郡築清署臺按寰字記作大楚臺讀書臺在江陵縣東南北朝梁文範先生劉蚪讀書處名勝志江陵城東法相院五代時髙從誨建有讀書堂蓋本之南梁文範先生也濯纓臺有二一在江陵縣西唐相段文昌嘗於江陵街西見有大宅門枕流渠醉後濯纓而言曰我為江陵節度必買此宅衆皆笑之後果鎮荆遂買此宅時人呼為濯纓䑓一在監利縣北輿地紀勝楚屈原濯纓處董王臺在石首縣北五十里相傳董允與諸葛亮駐兵處繫馬臺在石首縣南八十里相傳岳飛討楊么時在此繋馬章華臺在監利縣西北左傳昭公七年楚子成章華之臺杜須注臺今在華容城内水經注離湖側有章華臺臺高十丈基廣十五丈左邱明曰楚築䑓於章華之上章昭以爲章華亦地名也括地志章華臺在荆州安興縣東八十里范致明岳陽風土記華容世傳有章臺非也古章臺在今監利縣離湖上荆䑓在監利縣此渚宫故事昭王欲遊荆䑓司馬子期進曰荆臺之遊左江右湖前望獵山下臨方望其樂使人遺老而忘死願大王無遊焉明統志家語楚王遊荆臺即此庾臺在枝江縣東百里洲北輿地紀勝相傳庾子山宅吳相䑓在宜都縣南三里明統志呉相陸遜引兵屯此因建將軍臺在宜都縣北五里沙灣村周十餘丈相傳亦陸遜所建樓霞樓在江陵縣西水經注江陵城西有棲霞樓俯臨通隍吐納江流縣志劉宋臨川王義慶建清德樓在江陵縣治前王應麟玊海後周長孫儉爲荆州刺史吏民請爲儉立清德樓建碑頌德詔許之雄楚樓在江陵縣北城上唐杜甫有西北城樓雄楚都句高氏因以名城樓或作楚雄樓非江漢樓在江陵縣城内高氏建劉恕十國春秋元貞元年建樓於内城東門上曰江漢樓望沙樓在江陵縣城東南南平高季興建樓以望沙津名曰望沙陳堯咨更名仲宣樓曲江樓在江陵縣東南舊名南樓唐長史張九齡嘗登樓賦詩宋張拭重建易名朱子有記竹林堂在江陵縣城内寰宇記竹林堂宋臨川王義慶所作梁元帝因而修之堂前有竹名桂竹其西有篠冬月抽笋似桂而辛博古堂在江陵縣東輿地紀勝在新東門外燕人田偉歸朝授江陵尉因家於此藏書至五萬七千卷黄魯直過之曰吾校禁中祕書游江南文士家圖書之富未有過田氏者望堂在宜都縣西北水經注夷道城東北有望堂地特峻下臨清江遊矚之名勝也百花亭在江陵縣東四十里名勝志江陵縣東梁家臺上舊有百花亭唐李頎詩云百花亭漫漫一柱觀登蒼幽棲亭在江陵縣城内宋朱昂致仕時所建陳堯咨為題其額曰幽棲江亭有二一在江陵縣城南大江北岸宋黄庭堅得吳城龍女詞處一在松滋縣治後唐杜甫孟浩然俱有詩杜息亭在公安縣西南斗隄一名公安山館一名少陵草堂因唐杜甫憩息於此後人建亭杜甫集大厯三年戊申正月去夔出峽三月至江陵秋移居公安名勝志中隄口有少陵草堂有亭曰杜息唐杜甫移居公安山館詩云雞鳴問前館蓋山館者古郵也繍林亭在石首縣西南二里黄庭堅題扁止渴亭在宜都縣南十五里山谷間有泉味甚佳行者於巖畔鑿竅得水止渴因以名亭合江亭在宜都縣北濱江唐建後圯元大德四年重建明嘉靖中重修孫光憲北夢瑣言唐路侍中巖鎮宜都後移鎮渚宫祖帳今江亭以官妓行雲等十人侍宴巖即於離筵作感恩多詞十首至今傳播猇亭在宜都縣北三十里大江北岸一名興善坊今名虎腦背市三國蜀志先主傳章武二年陸遜大破先主軍於猇亭孟撫莊在公安縣南門外宋孟珙開間荆襄曾置莊於此白蓮莊在公安縣北明户部尚書鄒文武故居有荷池數十頃為一縣之勝王氏義門在石首縣東明初義民王堡之後累世同居禇都督義門在松滋縣境名勝志松滋有禇都督義門相傳是禇遂良子孫宋鄭獬有詩宋玉宅在江陵縣城西三里北周庾信居之庾信哀江南賦誅茅宋玉之宅羅含宅在江陵縣西北晋書羅含傳含轉荆州别駕以𪠘舍喧擾於城西池小洲上立茅屋織葦為席而居名勝志今承天寺是其故址郭仲產宅在江陵縣東渚宫故事郭仲産為南郡從事宅在江陵城東十五里枇杷寺南其村亦名枇杷村王鎮惡宅在江陵縣東五里今為靈曜寺宗少文宅在江陵縣東南史宗少文傳少文於江陵三湖立宅梁震宅在江陵縣東六十里江陵縣有多寶陂江漢志云昔荆䑓處士梁震所居名梁家䑓胡安國宅在江陵縣北地名新店安國有宅於此子孫遂居焉元時曾復其家伍員宅在監利縣西北相傳宅中有倒插槐員奔呉時所植劉蚪宅在松滋縣境渚宫故事松滋縣陟屺寺即劉虯宅故址劉凝之宅在枝江縣東水經注枝江縣東二里有縣人劉凝之故宅陸法和宅在枝江縣東范儕精廬在枝江縣東北水經注富城洲上有道士范儕精廬自言巴東人少游荆土而多盤桓縣界惡衣麤食蕭散自得言來事多驗而辭不可詳人心欲見歘然而對貌言㝷求終弗遇也雖逕跨諸洲而舟人未嘗見其濟涉後東遊廣陵卒於彼土儕本無定止處宿憩一小庵而已弟子慕之於其昔遊共立精舍以存其人韋宙别業在江陵縣東北夢瑣言唐相國韋公宙善治生江陵府東有别業良四美産最號膏腴而積稻如坻皆為滯穂鼉穴在公安縣西南廖解村盧溥江表傳公安有靈鼉鳴童謡曰白鼉鳴龜背平南郡城中可長生守死不去義無成及諸葛恪被誅弟融果刮金印龜服之而死名勝志三國時有靈鼉鳴此其穴也前纂修官臣羅家彦恭纂總纂官臣廖鴻藻恭覆輯校對官臣裴鑑恭校
