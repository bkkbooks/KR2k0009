  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_165-1a}
body:
  text: 廣州府列女南北朝宋陳南妻戴氏南海熙安人南為軍士早夭戴矢志守節孝事舅姑有求聘者告其軍主戴知事不得已遂自縊死元嘉中刺史陸徽為立貞節坊唐七歲女子南海人武后時其兄進至京后命賦别兄詩即曰别路雲初起離亭葉正飛所嗟人異雁不作一行歸宋李昌期妻何氏東莞人夫早逝何守志足不踰閾舅姑有疾禱天求代尋愈咸淳十年縣令為立孝婦坊劉元妻周氏南海人宋季為強賊所逼投蘭石海死後七日尸浮倚於石衣裾整然遂於其地建祠李頤妻陳氏東莞人生子佳而頤死矢志教子宋少帝自閩入廣陳氏遣子佳應詔勤王與之訣曰汝宜竭忠勿以老人為念佳既行陳氏趨至黃木灣赴水死佳至崖山得潮州教授還家哀母不見乃築望親臺於烏沙之陽陳連撰精衛詞弔之元談仲悅女新會人年十七至正二年土寇作亂被執投潭水死越八日父得其尸面目如生明洪武三年建祠於潭側扁曰丫髻廟陳以安妻趙氏新會人至正十二年寇亂夫為賊所殺氏被執以箭自刺而死蕭積善妻何氏新會人至正十七年賊首殺其夫意在何氏遣賊衆環其居必劫致之何氏度不免白父母飲賊衆於堂紿伴者曰吾埋金叉井旁石下往取為飾伴者信之遂投井死明王受祖妻萬氏南海人洪武初蘇友輕作亂萬氏為官軍所獲獻於南海衛指揮盧諸諸愛其色欲納之氏哭罵不絶死於南門外梁紀慶妻關氏南海人夫墮崖死關矢志養姑比姑卒貧不能葬因併夫柩焚之薪既熾奮身躍入焰中死岑甲妻林氏番禺人甲為富民佃富民見林悅之賂其舅姑與夫將脅之林度不免自縊死曹世興妻謝氏番禺人夫卒自剄以殉周氏女番禺人許字屈敏忠甫定聘而敏忠卒女欲奔喪父不許未幾密議以敏忠弟續婚及親迎女私以綵服衷白衣搴帷而出則宛然奔喪婦也遂大哭曰吾此來固欲與吾夫同穴豈可為亂倫事父知不可奪聽其守節終身馬時安妻湯氏新會人正統間為賊所掠湯罵賊被殺時張寅妻蘇氏亦罵賊赴水死又有龎氏李氏俱自縊死林興妻蘇氏香山人正統己巳黃蕭養攻城四境奔潰興時為指揮統屬軍於外孤城危在旦夕蘇率兵𬒳甲緣城拒守親冒矢石城賴以安蕭思敬女新會人年十八景泰初黃蕭養既平水軍討鄉民之從亂者見女有色執之脅以利刃誓死不受辱被殺熊睿妻伍氏增城人正德間為賊所掠逼之使行伍坐地哭罵不動賊怒殺之同邑曹子英女年十七匿竹林間為賊所獲觸竹而死陳雍妻顧氏增城人夫卒遺腹生子母令改嫁顧變色曰吾忍以孤兒呼他人父乎搶地幾死母知不可奪乃止正德間盜劫其鄉戒其黨曰此節婦鄉也母驚犯同邑黎日虞妻湛氏早寡遺孤周歲母勸其再適湛抱孤泣曰兒不死以有此子耳及孤又殤遂自縊死又陳如金妻劉氏夫亡父母欲奪其志不食死姚以詵妻李氏順德人以詵卒氏將身殉家人防視甚謹一夕整妝潛出飛鳳橋下投水死梁氏女東莞人蜆蛹襯民之女嘉靖壬辰賊許折桂掠其村女時年十七奮罵投水死又海南柵村王氏女三人嘉靖癸丑為劇賊何亞八所掠俱不受辱聯袂投水葉其瑞妻王氏東莞人夫操舟為生歲大祲計無所出私鬻王於博羅劵成泣語王故且示之金王知無反理佯謂夫曰得此亦足自活遂登舟及至寶潭忽躍入潭中舟人遑遽走報其瑞其瑞從上流號哭奔赴尸躍出去所沒處逆流已數十步若相迎者人皆異之方愫一妻張氏東莞人夫死於寇張聞取遺衣招魂作藁以葬謂家人曰我死必葬諸藁衣之側遂自縊死又同邑梁夢昌妻張氏夫卒值虞期晨起結束自縊歐陽勔妻黎氏從化人嘉靖癸亥賊李亞元掠境黎攜幼子走避遇賊被執紿賊曰吾從若請免吾子即囑其子逸去乃出金釧請贖賊不許厲聲詬賊為所殺同時又有歐陽騰妻蕭氏亦以罵賊遇害李伯亨妻許氏新會人嘉靖間古兜盜發許被掠一子在抱盜逼以行許奮罵不屈盜怒先殺其子罵益厲遂殺之同邑易鶴妻馮氏易天準妻劉氏戴彰緒妻林氏楊泮妻伍氏李某妻莫氏及方曰載女林東老女俱以不受賊辱罵賊赴水死又陳興伯女年十六嘉靖甲寅為海寇所掠誓不受辱乘間投水死越數日其父尋至石觜海得其尸狀貌如生王道夫妻談氏三水人嘉靖間為山賊所掠渡江中流紿賊渴甚乞釋縛就飲賊許之投水而死又黎輔妻梁氏早寡事姑孝賊掠其鄉奮身救姑為賊所殺蔡氏女新寧人嘉靖初年十六從父避亂何村為賊所掠縛至窯頭蔡抗聲大罵以首觸石流血賊怒殺之利仁妻陳氏新安人嘉靖間與仁弟叔彞妻廖氏同為賊所掠不屈死之又有梁氏遊氏二女及方時登妻鄭氏方時爵妻鄭氏俱以罵賊被害黎彭齡妻陳氏番禺人生子方璐而夫死陳撫孤守節尋聞從兄子壯死難遂匿方璐於眢井自赴水死又同縣彭烈女本良家子貧鬻為富家婢已許字某僕矣主瞰其美欲私之女堅不可主遂數撻僕背流血復逐之以絶其意女知不免自扼吭死事聞令罪其主使治葬北郭樹華表萬厯中勒石旌其墓梁夢陽妻李氏順德人年二十而夫卒欲從死以家貧舅姑在堂身有遺娠而止越月生子矢志飬翁姑紡績以給翁殁典衣殮葬姑喪亦如之御史葛徴竒題旌建坊梁宏道妻胡氏龍門人早寡其父強令改嫁服毒自盡同邑談經濟妻徐氏劉耀妻葉氏俱以夫亡絶粒死劉氏女香山人萬厯間海賊劫其鄉家人奔潰女力梯其母踰牆脫避復還欲襁負其幼妹為賊所執擁之登舟女乘間赴水死黃鶴仙妻盧氏番禺人明末城破為亂軍所脅盧大罵曰吾命婦豈受辱乎遂投水死同邑郭景相妻黃氏屈一鳴妻黃氏黎士奇妻樊氏李應春母樊氏樊良佐妻周氏及女媳十餘人皆以被難不屈死又何大化妻陳氏年二十為賊所執堅不受辱投烈火死李夔妻張氏順德人崇禎末為盜掠至大陂徑不屈被殺同邑梁公詔妻陳氏少寡守志賊劫其鄉赴江死林公燮妻張氏東莞人明末城破張氏抱兒赴水死越四日尸浮兒猶在抱見者傷之同時有盧上􅦞妻張氏以頭觸石死陳喬宇妻梁氏增城人崇禎中流賊掠縣梁𬒳執不屈奪賊刀自刎同邑陳戴妻曾氏及聶氏女俱引刀自刎死黃燦陽妻張氏及黃一祁三女黃森然二妹俱墜樓死黃無隅妻馮氏黃華石妻賴氏為賊所逼不從遇害吳元明女新安人崇禎末劉香入寇隨母避亂為賊所得女以石擊賊遂為所殺同邑林氏女為葉麗明家婢賊縛其主將殺以祭旗林奔投賊營泣請身代賊殺之主竟得釋本朝盧健吾妻李氏南海人夫亡守節時年二十二順治七年年百歲沐浴隱几無疾而終方齋姑南海人明少保方獻夫元孫女與寡嫂某氏同居順治七年兩藩入粵屯兵北郊齋姑恐遭掠與嫂同赴水死樊應元女番禺人順治三年花山賊亂女被掠罵賊而死五年李成棟發兵剿村郝載霞妻何氏同二女自焚同時馮當世妻何氏家於沙灣值遷界之役有兵狎之義不受辱抱二女自沈於海梁仕昌妻黃氏番禺人順治七年廣州城破恐遭掠投井死同時參將張某妾王桂卿羅士賢妻鍾氏王家泰妻張氏林氏女天濠街婦人逸其夫姓均因城破自盡又梁氏婦因夫被害視殮畢自刎以殉十年海寇掠境劉若纘妻李氏被執不屈死同時關氏逸其夫名亦死於是難又許氏三女長智聰次智隆許和宗女次智積許明宗女值寇掠潭山三女懼辱同投一井里人憐而合葬之劉氏女番禺人受聘於黎氏未嫁夫卒父母欲奪其節自經死何子攸聘妻劉氏順德人未嫁夫亡守節順治十六年旌黃緝熙聘妻梁氏順德人未嫁夫亡守節順治十四年海賊掠境拒賊被害同縣胡贊釐妻嚴氏夫亡守節遭黃圃寇亂被掠死之鍾諧玉妻林氏東莞人夫亡守節養姑教子順治間旌同邑趙儒妻鍾氏夫亡守節順治十八年旌黃虞彥妻范氏東莞人順治三年山寇破城范與虞彥訣揮之去解囊中金授之驅二女同投井中其後虞彥被俘竟以金贖得免又同縣蕭子居妻林氏夫婦𬒳難為兵所執林紿兵釋其夫還取金夫去已逺遂觸刃死曾升妻李氏從化人順治三年花山賊掠境李攜子女走避𬒳執以頭觸石死何弼生妻廖氏龍門人順治初為山賊所掠與其女士敬及何元正妻王氏何鴻羽妾陳氏廖通元女何岸子妹俱義不受辱死之又廖閏奇妻劉氏順治十八年賊破杜潭與其女弟相對自刎張思敏妻周氏新會人夫亡守節飬姑教子順治十三年旌利應昌女新會人順治三年遇寇逼之紿賊引至井旁猝躍以入馮亞斗妻潘氏新會人順治十一年李定國圍城急城中兵殺人以食潘偕亞斗碎户為薪舉火自焚同時梁學慊女以身代父林應雒妻莫氏林宜逢妻陳氏以身代姑吳孟􅥴妻談氏吳師讓妻黃氏夏月賓妻關氏以身代夫均死之魯赫妻徐氏夫婦同被執徐願以身代徐俟夫去遠罵賊而死妾李氏亦以不受辱死又李氏莫氏亡其夫名李代夫死莫早寡為兵所脅觸牆而死古嘉賢妻勞氏與其姒任氏及二女勞氏女正娘湯世耀聘妻黃金繡楊春魁妻胡氏古周平妻李氏女靈娘陳基砥妻許氏黃日耀季女尹振明女黃圭瓚妻黎氏同幼女英姬李仲珍妻何氏周三可女陳念其女與其母黃氏張耀思妻徐氏潘時益妻李氏張光初妻區氏余孚先妻潘氏張某妻馮氏楊苑秋妻伍氏俱以懼辱捐軀王聲桂妻歐陽氏魯氏二女吳細權妻林氏許康策妻陳氏俱以罵賊被害容士望母麥氏新會人時亂兵肆掠麥登樓自縊未絶兵解繯驅至􅴷步江猝投水中鄉人立祠祀之號麥仙娘廟又二馮氏者張雲際之母無妻遭賊劫俱投井捐軀黃肇揚妻麥氏香山人順治十年為亂兵所掠乘間投水同時繆志臯妻楊氏遭梁賊之變懼為所汚偕子婦唐氏俱投水死方氏女香山人名秀貞許字李棐龍順治十二年海寇竊發母女皆為所執女紿賊令母歸辦贖度母行已遠即躍入海中其後又有盧尚雍妻鄭氏陳昌昆妻梁氏俱遭海寇之難不從遇害何月客妾談氏香山人僑寓順德月客為把總以戰亡輿尸歸談投水以殉蕭欽相妻毛氏香山人順治九年賊梁子直犯城毛與其小姑許字繆昆卿者恐為賊污同時自沈於池同邑楊思誠妾夏氏李鳳侣妻高氏王簡生妻程氏俱以不受賊辱投井蕭子讓妻胡氏李公憲妻郭氏麥君貺妻李氏何嘉會妻袁氏俱以夫亡殉節烈女劉氏許字楊貫六未嫁夫亡葬柩經其門遂投繯獲救後聞有求婚者復自經又楊氏女許字鄭式徽夫殁訃聞即嘔血誓死父母知不可奪乃歸鄭仍不食死金有庫妻白氏南海人夫亡守節康熙六年旌同邑尚之忠妻孔氏李天佑妻馬氏舒尚夢妻殷氏姪婦姚氏徐尚友妻蘇氏陳廷璣妻羅氏莫自強妻佟氏蔡長泰妻賴氏劉德明妻張氏潘于俊妻倫氏潘啓相妻蘇氏葉光龍妻黎氏邱紹金妻劉氏羅作謀妻何氏陳宗行妻何氏何松兆妻劉氏何體甡妻杜氏張萃雄妻梁氏蒙帷彥妻李氏黃耀型妻梁氏徐翰選妻梁氏盧崇修妻龎氏潘恪賢妻馮氏洗臯客妻黃氏麥宏泰妻徐氏龎宇璧妻招氏麥宣馥妻黃氏陳瑜文妻洗氏馬遠妻陳氏梁鼎妻姚氏陳在思妻楊氏吳貫之妻謝氏麥齊性妻馮氏甘作甫妻何氏何德麟妻高氏羅子恆妻林氏潘憲忠妻彭氏何相魯妻林氏何光弼妻梁氏張全仁妻周氏區起敬妻李氏方士成妻吳氏梁俊客妻陸氏何騰兆妻梁氏李貞子妻關氏張廷連妻區氏許海涵妻龎氏何昌文妻陳氏曹槐三妻盧氏郭顯妻黎氏杜文韜妻陳氏羅國𥙿妻何氏羅淑最妻黎氏烈婦馮夢蓮妻霍氏王命召妻滕氏貞女鄧吉生聘妻談氏葉勤成聘妻盧氏黃志麟聘妻梁氏關福階聘妻易氏陳師臣聘妻莫氏李飛鴻聘妻區氏曾翔遠聘妻黎氏李遇榮聘妻潘氏烈女黃望吕聘妻鄧氏均康熙年間旌林烈女南