大軍至逢龍拒戰於南雄師潰乃正衣冠自縊死元買住蒙古人為韶州同知以廉介聞至正十二年郴寇攻韶州急前後兩戰大敗之復樂昌乳源又力疾出剿戰死張鳳儀蒙古人為韶州經厯與同知買住禦寇𬒳執不屈死子萬里敗賊復仁化縣獲賊首剖肝生食之事聞補父官至正二十二年陳友諒遣將圍韶城破罵賊被殺李鼎湖南人家於樂昌鄉人剽掠州同知買住欲屠之鼎勸止乃以鼎為護民巡檢尋以功升乳源主簿知縣事及寇攻乳源鼎出禦賊望見曰是救我輩屠戮者解甲去明索彥勝燕山人洪武二年任樂昌知縣時無城郭百姓散處乃築城濬池均賦役招流移民始復業張安仁九江人洪武初為乳源知縣以興學建城功行省參政周禎奏請旌賚王詢永豐人永樂中韶州推官中官鄭和奉使海外橫捕韶民三人伴送家人贖以金不許詢至舟徑挾以歸湛禮錢塘人正統間知韶州府奏免歲貢黃藤嘗遣吏督稅樂昌多求索令械繫以來禮嘉奬之甲乙爭田禮斷歸乙甲訴於藩司司知其偽拘甲付府第慰遣去約五日來辨其寬厚類如此杜宥江隂人天順中知英德縣時鄰境多寇遣死士焚其營賊始驚潰劉信鳯陽人成化中知乳源縣政簡刑清性至孝母卒一慟而絶貧無子士民葬之東城保睿南通州人宏治中知曲江縣鋤姦恤苦清介自持顧節嘉興人宏治中知翁源縣修城興學不科斂而用足歲飢請賑生沽甚多邑之羊徑山峯髙路隘每多伏莽節治為坦途行旅便之李增龍溪人正德中知樂昌縣東西山猺嘯聚增訓兵緝捕所向皆克後流賊千餘攻城開門迎敵敗走之時有湖兵指良為賊增白於兵備王大用釋之皆感泣黃天暘南安人正德中知英德縣中官遣使取英石天暘曰無用之物何必勞民卒却之李渭思南人嘉靖末知韶州府先是民苦役多為盜渭集僚屬諭曰欲民無盜君輩當先弭盜心否則是身為盜幟也聞者凛然治最當遷民相率乞留詔進一官留任符錫新喻人嘉靖初通判韶州毁淫祠興社學剿平九連山賊李英等改徴銀發驛以絶驛傳科擾至今便之唐必治平樂人隆慶中為乳源縣丞嘗自言不愛官不愛錢不愛生翁源大征奉檄督剿殞於陳邑人立祠祀之胡尚仁全州人萬厯中知英德縣奉例清丈按圖親臨至今稅畝秩然嚴遵試賀縣人萬厯中知英德縣讞訟平允贖鍰悉令剃藥草根以代服毒輕生之風遂息時稅璫橫行含洭之津梁堯山之錫礦羣姦因此嘯聚遵試嚴治姦完戍配之因議補其稅編入條鞭民得不擾王孫蘭無錫人崇禎中厯官廣東副使分巡駐韶州有平猺賊功張獻忠由長沙衡州來犯乞援於督撫不應歎曰事不可為矣吾盍先死遂自縊潘復敏新昌人崇禎時知曲江縣視事未久即修城積粟為戰守計人或迂之後楚寇自樂昌薄韶竭力捍禦城賴以完本朝李棟蘄水人順治中知樂昌縣廉介自持賑恤窮困置義倉建書院士民戴之蔡嘉復西安人順治四年知仁化縣時兵燹後人民離散嘉復開誠招撫百姓聞風而歸在任一年卒子鍾台奔喪亦卒士民袁之葬水南塔下郭宏纘漳浦人順治四年知乳源縣山賊謀攻乳源纘詗知預上方略及賊至纘陽坐城樓痛飲賊易之無何援兵至出賊不意徑渡河擊之賊衆披靡俘斬甚夥劉世豸雄縣人康熙二年守韶州在任七年圜扉生草捐修學舍創建書院以憂去郡人思之二十一年祀名宦李煦奉天籍昌邑人康熙十七年知韶州府招集流亡修復學校力行教化弊絶風清改任時民為立遺愛祠於湘江門外苟金薇合州舉人性孝友潛心理學康熙三十七年宰曲江愛民如子培飬士林邑人立祠尸祝熊惟祺孝感人康熙七年知仁化縣鹽引遞年報商折納士民挈家逃竄村市為墟惟祺設法招商承折除報充之害又捐金建學宫振興士類四民樂業徐應仕籍未詳康熙中署翁源縣時王碧山賊寇城應仕率兵登制勝樓親冒矢石挽弩射賊多應弦斃城獲全田從典陽城人康熙進士三十四年任英德令朔望宣讀上諭集耆老子弟諄諄告誡修葺學宫建近聖齊捐俸買田以為課誦之費邑當衝道賦役不均從典革去陋規俾無偏纍邑中連岡復嶂不逞之徒盜採銅鉛兼胠篋探丸從典嚴緝之盜源以清旱魃為災率士庶虔禱甘霖立沛丙子丁丑洊飢民多仳􅍣設賑平糶流民德之人物漢何丹字伯張湞陽人鴻嘉初舉茂才為含洭長纍遷中大夫以忤王莽出為松滋令慈祥豈弟卒於官晉張魴字叔魚曲江人太寧初舉孝廉咸康中為含洭令惠政流洽關津夜行無驚白鹿羣遊民因以名其邑城與城南之山徴為尚書郎南北朝梁張偲曲江人侯景寇京師陳髙祖率兵赴援偲率千餘人從之破蔡路養殺李遷仕及與景戰於石頭皆有功授江州刺史陳侯安都字成師曲江人髙祖為始興太守入援臺城安都募驍勇從之以平侯景功封富川縣子襲王僧辨破徐嗣徽及拒齊師於姑熟纍戰皆捷進曲江郡公尋都督南豫州兼刺史討余孝勱及王琳將曹慶常衆愛等悉平之文帝即位晉司空威名甚重羣臣無出其右留異據東陽復奉詔東討躬自接戰大敗之異脫身奔晉陽安都收其人馬甲仗振旅而歸以功加侍中大將軍纍增食邑五千户唐鄧文進曲江人武德中為本州刺史蕭銑攻樂昌文進堅守纍立戰功殁贈鷹揚上衛將軍廟食樂昌張九齡字子夀曲江人七歲知屬文張説謫嶺南一見厚遇之景龍元年擢進士授校書郎厯官祕書少監集賢院學士擢工部侍郎知制誥尋居母喪有紫芝白鳩之異開元中徴拜同平章事中書令封始興伯時天長節百僚多獻珍異惟九齡進千秋金鑑録具陳前古廢興之道帝賞異之會范陽節度使張守圭以斬可突千功帝欲徵為侍中九齡曰宰相惟賢是授安可以賞功遂止李林甫奏對稱旨帝欲相之九齡曰恐異日為社稷憂帝不聽林甫既相引牛仙客為尚書預政事九齡持不可帝不悅以尚書右丞相罷政事卒諡文獻九齡文學冠一時諤諤有大臣節天下稱曲江公而不名武惠妃謀陷太子英九齡力持之安祿山討奚契丹敗帝欲曲宥九齡曰祿山喪師不可不誅且弗誅必為後患帝卒不聽及遷蜀思其先見為流涕遣使祭之厚恤其家弟九臯九章皆有名於世子拯居父喪有節行為伊闕令祿山陷河洛終不受偽職賊平擢太子贊善大夫張仲方曲江人九臯孫貞元進士補祕書省正字厯官鄭州刺史敬宗即位徵為諌議大夫會詔淮南節度使王播造競渡船三十艘費用甚巨仲方論諍堅苦帝為減三之二鄠令崔發以辱黃門繫獄逄赦不見宥仲方曰恩𬒳天下流昆蟲而不行御前乎發由是得不死纍加光祿大夫上柱國封曲江縣伯卒贈禮部尚書諡曰成劉柯字希仁曲江人童年嗜學著書甚多後登進士第厯官史館馬植稱其文為韓愈流亞薦之朝纍遷侍御史邵謁翁源人少為縣吏令有客目使搘床者三瞪視曰吏豈搘牀者耶令怒撾之掉臂出截髮懸縣門去築室羅江水石中博通經史百家工詩尤長古樂府有司舉之隸太學明王佐得其集於祕間梓傳之五代南漢薛崇譽曲江人仕南漢纍官至開府儀同三司僉書點檢司事宋太祖遣師克廣州崇譽義不降被執死之宋李訪曲江人善事父母居喪廬墓有白鳥集廬之祥事聞仁宗詔旌其門王式字用之曲江人唐宰相圭之後初圭子敬直貶嶺南子孫遂家焉式耿介自立以孝行稱天聖初登進士纍官大理寺丞知梅州子陶博學有俊才亦登進士官至京東提刑所至著績余靖字安道曲江人天聖進士纍遷集賢校理會范仲淹貶饒州靖言仲淹以刺大臣得重譴臣恐鉗天下口疏入落職監筠州酒稅尋起為太常博士進修起居注擢知制誥時元昊既降朝廷方擬册封而遼人以兵臨西境請母與和當為中國討賤朝議難之靖言遼人不可輕信即遣靖假諌議大夫往見遼主於九十九衆辨論如流卒屈其議朝廷遂封元昊邊陲晏如儂智高反雍州乘勝掠九郡乃以靖為祕書監知桂州經略廣東西路同狄青孫沔討賊於歸仁敗之智高遁入海島雍州平晉工部侍郎鎮撫嶺海復遣人入特磨道擒智髙母子弟三人械至關下斬之詔加集賢院學士徙知潭州尋改青州皇祐五年交址蠻寇雍州殺五巡檢拜靖廣西體量安撫使靖至移檄交址召其用事臣費嘉祐貴之嘉祐歸致首惡五人斬欽州境上尋以尚書右丞知廣州首奏罷番舶稅務英宗即位拜工部尚書卒贈刑部尚書諡曰襄談必字子思樂昌人甫六歲日誦萬言慶厯中進士調雍州推官交址破雍必死之纍贈太子太傅明景泰中追諡忠愍李渤字子文樂昌人以學行稱登嘉祐進士官至朝奉郎知白州弟巖嘉祐中以上書召見崇政殿特賜同進士出身官至朝奉郎知象州梅鼎臣翁源人天聖二年進士官至殿中丞直諌有聲子佐天聖五年進士知藤州操履清白為時所稱鄧弼亮乳源人祖戡天聖進士官至殿中丞父堂皇祐進士官至郡守弼亮登元祐進士為新興令力行教化不尚刑罰當時稱之侯晉升字德昭曲江人元豐進士為程鄉令與蘇軾善嘗著新論利害炳然文亦溫麗軾極稱之後知南恩州期年而卒劉暐翁源人博學洽聞熙寧中進士厯官中外有聲崇寧初置廣南東路提舉學事司歲察師儒優劣諸生勤惰命暐充之其教士子立課程稽實行崇信讓雖鄉曲一無所私成倬翁源人年二十餘始讀書通晤經術尤深易數熙寧間王安石薦為閣門祇候終西京左藏庫使石汝礪英德人精通五經尤深於易嘗進所著易解易圖於朝為王安石所抑蘇軾謫惠州與論易理竟日不忍别又以琴準樂律著碧落子琴斷鄭樵稱之鄭敦義字尚仁英德人以鄉薦厯潮陽令哲宗朝諌止市牛革徽宗即位復上書陳時政詔進一階李南仲英德人性敏慧日誦數千言十歲舉神童授從仕郎省親歸讀書羅浮著羅浮賦提舉儒學韓謹劉暐皆重其學行人呼其讀書處曰李秀巖云蕭雅樂昌人徽宗朝與弟雄及維同擢高第雅以承事郎判廣州雄以奉議郎守桂陽維以宣教郎宰吉水皆有政聲時稱為三蕭鄧孝廉字淸臣曲江人建炎進士為韶州教授擢通判雍州攝郡事歲飢發廩賑之不足繼以俸金全活甚衆尋遷德慶知府胡彥忠曲江人性孝友五世同居慶元中經幹吳豐以狀聞詔旌其門鄭玠字太玉英德人嘉熙中對策極言天下事正言李昴英亟稱之淳祐中釋褐知博羅縣廉清自持政成人和部使者薦之擢為太府丞元鄧可賢乳源人至正中郴寇陷乳源可賢率民置寨矢死守諭衆曰忠孝大節生死常事因遣子一源趨韶上方略於同知買住遂率兵破賊賊復悉衆來攻凡兩月糧盡可賢奮身出戰𬒳執子弟七人俱死之寨民四百家無一降者明李時秀字廷實英德人洪武中舉於鄉永樂朝為御史劾藩王不法貶交址縣吏中途召還擢山東按察副使鄭子誠字本明乳源人洪熙間舉賢良官御史正統元年奉敕巡視西邊又巡宣大奏築土木城以防不虞不報引疾歸黃裳曲江人正統進士授監察御史法司會審疑獄俄頃辨析多得其情都御史陳鎰雅重之嘗按兩浙鹽法及蘇常諸郡所至有惠政己巳扈從北征殁於土木詔恤其家鄧容樂昌人正統進士奉使楚藩却其金後為永豐知縣閩寇犯境容伏兵大破之寇復悉衆至力戰被害事聞贈光祿少卿諡忠毅白瑩字潤禧樂昌人正統進士官戶科給事中嘗奏土木陳亡諸臣子弟宜徴入國學讀書請賜􅈴臣鄧文進死節臣談必鄧容諡疏罷樂昌河泊所及減桑絲紅船額稅諌垣重之鄧瑗樂昌人容長子景泰中鄉舉厯官湖廣僉事有清操湖廣與貴州接壤徴發煩劇民甚苦之瑗不奉檄遂致仕歸蒙景澄仁化人母喪廬墓盡歸省父夜宿廬及父卒景澄年八十復廬墓以終龔鎮和樂昌人正德間從知縣李增督兵禦寇調勦華林寨搗其巢復解乳源之圍戰死撫按命勒碑題其墓曰義勇陳璘翁源人嘉靖末潮州賊張連作亂璘獻策軍門領兵平翁源乳源英德河源諸賊大征羅旁開建一州二縣援朝鮮戰錦山勳績甚著萬厯中以湖廣總兵官征播州奪楊應龍尸生擒酋子纍官左都督特進光祿大夫卒贈太子太傅范漢字印泉英德人萬厯中流賊行劫漢兄弟率兵追賊至野豬灣殺百餘人奪回被虜男女數百以援兵不至與弟潮皆戰死南韶兵備劉穩旌之李能一英德人崇禎四年流賊掠境能一與賊力鬬斬八九人賊以槍刺之即奪其槍復斃二賊𬒳執逼令跪厲聲罵賊不屈而死鄧葵樂昌人容之裔孫崇禎四年流賊破城葵身護縣令林開馥罵賊而死本朝歐士擢樂昌人性至孝明末流寇掠樂昌士擢負七旬母避難厯盡險阻旬日乃止順治五年飢發已粟存活甚衆死不能殮者施棺槨聽民自取邑人至今思之胡甲桂翁源人順治十六年父獻忠為賊所掠甲桂時年十三涕泣辭母乞食行扺長寧縣叩賊營痛哭求以身代釋父歸辦贖賊從之迄冬大兵進剿賊竟殺甲桂又仁化縣孝子蒙化鵬雍正九年旌李晨英德人乾隆己酉拔貢四川候補州判署墊江縣丞嘉慶三年教匪擾蜀晨領鄉勇禦於高灘賊猝至被執不屈死事聞入祀昭忠祠張英翁源人官南雄協把總嘉慶三年隨征川匪陳殁於雲臺山八年祀昭忠祠流寓宋鄭俠福清人神宗時吕惠卿執政俠上疏論列坐訕謗編管英州既至得僧屋將壓者居之英人無貧賤富貴皆加敬爭遣子弟從學為築室以遷哲宗立始得歸元符七年再竄於英徽宗立赦還孔平仲新喻人紹聖中以黨籍謫惠州别駕安置英州劉安世大名人以元祐黨章惇尤惡之安置英州家願眉山人徽宗時以曽入黨籍謫監英州酒稅朱翌安慶人紹興中官中書秦􅝸惡其不附已謫韶州十四年名山勝地皆翌所題詠時稱為詩豪洪皓番陽人紹興中使金歸秦檜忌之安置英州居九年始復朝奉郎吕祖儉婺州人寧宗時因上書訴趙汝愚之忠送韶州安置在謫所讀書窮理賣藥自給龔茂良興化軍人淳熙中疏恢復六事謝廓然劾之遂責降安置英州父子卒於貶所列女唐虞氏英德人唐末黃巢破西衡州其夫為寨將戰殁虞氏躬擐甲胄率昆弟及鄉兵迎戰賊敗北虞氏亦死之鄉人為立廟以祀宋吳琪妻談氏湞陽人紹興中英州盜起𬒳執盜欲妻之談怒罵曰良家女豈偶賊耶遂被害龔自立妻張氏樂昌人嘉定三年郴寇入境夫妻襁負二稚竄匿為賊所獲張與夫訣曰妾死無憾二子幸善撫之中道紿賊曰吾渴欲就飲可暫解縛遂投江死郡守方信儒建祠祀之元吳貞秀湞陽人年及筓許嫁未適至正十二年郴寇陷城貞秀被執義不受辱投井而死明劉細奴妻伍氏曲江人永德中偕夫往翁源傭工一日夫汲水被虎噬去伍氏徒手逐之曳其夫足虎棄其夫轉噬伍氏夫妻俱死鄧朝觀妻李氏曲江人嘉靖三十二年羅山賊至氏年二十二並其兒被掠賊欲污之驅至樹下紿賊曰勿怖吾兒需解縛乃從汝乘間員其兒投水死明日尸浮負兒自若蒙士彥妻趙氏仁化人嘉靖中與其姑談氏俱為賊執賊欲殺其姑趙抱姑願以身代賊併殺乾黃思位妻羅氏英德人年二十生子方襁褓崇禎初賊至被執至塘邊罵賊赴水死賊義之為置孤於地而去張子厚妻廖氏樂昌人崇禎末流寇破城被執抗罵不屈死吳驤之妻劉氏仁化人崇禎末為亂兵所掠扶之上馬劉知不免乃從容騎坐以釋其疑行至赤石徑見路旁有大塘遂投塘而死本朝易氏女名閨超乳源人年十八未字順治四年叛兵羅士璧劫掠城市父肇文被執閨超洎縊又順治八年曹寇掠楊家圍圍破楊婦陳氏亦自縊死李三近妾孫氏樂昌人順治八年曹寇破城與女紅姑俱被掠母女罵賊同時遇害李光亨妻張氏翁源人與妾劉氏俱虜於賊義不受辱投懸崖以死同邑林萬妻沈氏有硃色賊掠之亦大罵不屈死朱元泰妻招氏曲江人早寡奉翁姑孝撫繼子慈康熙四十七年旌鄺宏毅妻張氏樂昌人宏毅病亟張以死訣及葬畢遂自盡同邑張日晃妻蘇氏夫卒慟哭七日不食而死張紱妻蕭氏樂昌人年二十一守節養舅姑撫孤子越七十餘年同邑張綋妻蕭氏守節五十五年均康熙年間旌莫蔡元妻李氏曲江人夫亡守節雍正七年旌同邑許學賢妻袁氏烈婦周彬妻楊氏談夢韶妻鄭氏均雍正年間旌李霞妻鄧氏樂昌人夫亡守節雍正四年旌同邑李樹嵩妻羅氏蘇著妻駱氏薛謙六妻駱氏均雍正年間旌黎人質妻葉氏仁化人夫亡守節同邑談康國妻蒙氏均雍正六年旌賴大為妻許氏翁源人夫亡守節同邑趙熙元妻劉氏妾許氏均雍正十三年旌鄧朝輔妻莫氏曲江人夫亡守節乾隆三十九年旌同邑烈婦李經書妻曾氏張文魁妻華氏烈女侯瑞安女均乾隆年間旌李一韓妻鄧氏樂昌人夫亡守節乾隆十年旌同邑鄧求達妻陸氏蕭公耀妻熊氏烈婦傅井滿妻陳氏烈女沈廷現女仙妹均乾隆年間旌劉德中妻盧氏仁化人夫亡守節乾隆十八年旌同邑烈婦劉文達妻葉氏陳謙瑞妻楊氏均乾隆年間旌羅開飬妻邱氏乳源人守正捐軀乾隆十九年旌張麗纓妻胡氏翁源人夫亡守節乾隆二十九年旌同邑甘發棠妻熊氏何汝貞妻羅氏朱典集妻劉氏張四妹妻吳氏烈婦林耉七妻江氏羅輔成妻朱氏烈女張氏女首齡均乾隆年間旌張文載妻何氏英德人夫亡守節乾陸二年旌同邑吳鋭妻鍾氏鄭源寵妻范氏蕭茂妻黃氏陳爾驥妻劉氏陳履亨妻張氏烈婦龍士達妻鄧氏林大猷妻吳氏巫友聰妻江氏范永祥妻張氏李緝易妻范氏朱昌文妻姚氏烈女吳天崇女細嬌莫廷昌妹大滿姐均乾隆年間旌談志仁妻鄧氏曲江人夫亡守節嘉慶六年旌同邑李成斐妻陳氏二十五年旌張長娣樂昌人及笄未字守正捐軀嘉慶九年旌楊發孫妻吳氏仁化人夫亡守節嘉慶十三年旌李秀姬乳源人守正捐軀嘉慶二十二年旌劉雲鵬妻張氏翁源人夫亡守節嘉慶四年旌同邑羅金聲妻李氏許魁道妻戴氏林作材妻李氏鄒亮疇妻凃氏沈子浩妻李氏張某妻戴氏戴某妻楊氏烈婦華某妻林氏均嘉慶年間旌楊照妻李氏英德人夫亡守節嘉慶二十二年旌同邑烈婦林氏陸某妻吳氏均嘉慶年間旌仙釋唐慧能姓盧氏其先范陽人父官新州生能得法於黃梅五祖傳其衣鉢在廣州法性寺披度受戒乃歸曹溪元和十年詔諡大鑒禪師塔曰靈照之塔柳宗元有曹溪第六祖賜諡碑文五代南漢文偃嘉興人張氏子參睦州悟入再見雪峯密授宗印遂出嶺遍謁諸方後住雲門光泰寺乾和七年示寂宋乾德元年秀華宫使特進李託監修韶州諸寺院啓塔顔貌如生封慈雲匡正宏明禪師天下目為雲門宗范嵩大陂人年二十二歲貧不識字因牛特水最險嵩日修路遇二人舁之過水以一丸與嵩吞之遂解悟能吟詩後入羅浮不知所終明憨山全椒人蔡姓年十二祝髠於金陵古長干寺長入五臺山後遠遁東海之牢山神宗再徴不應賜帑金固辭使者強之因以賑飢者使持籍還報尋住曹溪演法一日浴罷焚香危坐而逝先是有採珠開礦使入粵殊驛騷過曹溪憨山徐與言利害由是珠罷採礦額令有司歲解粵人誦其德行臘姓劉氏少為諸生録科冠軍好讀貞復白沙集明季祝髮依朝宗和尚本朝順治初欲􅐚嶺往寶華未果駐錫青蓮庵坐化留偈云處處皆為般若場山山自有白雲莊丈夫各解翻身去豈肯甘心負臭囊土産銀元和志曲江縣有銀山出銀九域志曲江翁源樂昌真陽含洭皆有銀場銅九域志曲江真陽二縣有銅場輿地紀勝始饒之張潛博通方伎得雙鐵為銅之法使其子甲詣闕獻之朝廷行之鉛山及潮之興利韶之涔水潭之永興皆其法也鐡九域志仁化縣有鐵場鉛九域志翁源樂昌仁化二縣有鉛場布元和志韶州貢麻布竹布九域志英州貢紵布明統志翁源出紵霜布蘭桂元和志韶州貢甲香水馬蚺蛇鮫魚皮寰宇記俱韶州産鍾乳元和志韶州貢鍾乳柳宗元與崔連州書鍾乳始興為上次乃廣連石斛元和志韶州貢英石輿地紀勝英之山石擅名天下明統志英德縣出峯巒聳秀巖竇分明無斧鑿痕有金玉聲又樂昌出樂石協修官臣許應藻恭纂總纂官臣廖鴻藻恭覆輯校對官臣吳思權恭校
