body:
  text: 麗江府在雲南省治西北一千二百四十里東西距七百四十五里南北距二百九十里東至永北廳界一百三十里西至怒夷界六百十五里南至大理府賓川州界二百三十五里北至蒙畨界五十五里東南至永北廳界三百二十里西南至大理府雲龍州界六百三十里東北至永北廳界四百八十里西北至西畨界四百五十里自府治至京師一萬一千七百六十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢梁州荒裔漢越巂郡西徼地三國漢為建寧郡晉以後為寧州隋屬巂州唐因之後入於蠻為越析詔唐書南蠻傳其先渠帥有六自號六詔南詔一曰越析詔又越析詔居故越析州南詔蒙氏置麗水節度宋時磨些蠻據此元初擊降之元史地理志麗江路兩漢至隋唐皆為越巂郡西徼地昔磨蠻些蠻居之遂為越析詔二部皆烏蠻種居鐵橋貞元中其地歸南詔元憲宗三年征大理從金沙江濟磨些負固不服四年春平之明統志宋時為磨些蠻酋蒙錯錯所據置察罕章管民官至元八年改為宣慰司十三年改置麗江路軍民總管府二十二年府廢更立宣撫司元史地理志於通安巨津之間立宣撫司隸雲南行省明洪武十五年改麗江土府三十年改為麗江軍民府隸雲南布政使司本朝因之順治十六年仍改麗江土府雍正元年改土官設知府屬雲南省今領州二縣一舊有土官木氏世襲知府雍正元年降襲通判乾隆三十五年設麗江首縣又改鶴慶府為州并所領劎川州俱歸府轄麗江縣附郭東西距七百四十五里南北距一百里東至永北廳界一百三十里西至怒夷界六百十五里南至鶴慶州界四十五里北至中甸界五十五里東南至鶴慶州界一百三十五里西南至大理府雲龍州界六百三十里東北至永北廳界四百五十里西北至維西界四百五十里本朝乾隆三十五年置鶴慶州在府東南三百五十五里東西距二百十里南北距一百七十里東至永北廳界一百二十里西至劍川州界九十里南至大理府賓川州界一百二十里北至麗江縣界五十里東南至永北廳界一百二十里西南至大理府浪穹縣界一百八十里東北至永北廳界四百八十里西北至劍川州界一百十五里漢益州郡地後漢改屬永昌郡三國漢屬建寧郡唐初為越析詔地貞觀二十三年屬南詔蒙氏太和時蒙氏置謀統部後為鄭買嗣所奪後唐據於楊干真後晉歸於段思平宋世因之元𥘉內附置鶴州屬大理萬户府至元二十三年置鶴慶路軍民府屬雲南行省明洪武中改為鶴慶府本朝初因之乾隆三十五年改為州屬麗江府劍川州在府城南九十里東西距一百九十里南北距二百四十里東至鶴慶州界四十里西至麗江縣界一百五十里南至大理府浪穹縣界一百九十里北至麗江縣界五十里東南至鶴慶州界四十里西南至大理府雲龍州界一百六十里東北至麗江縣界二十里西北至麗江縣界五十五里漢益州郡地唐時為羅魯城又名劍川顯慶初浪穹詔與南詔戰不勝走保劍川更稱劍浪治後為南詔所併置劍川節度宋段氏時改為義督瞼元初置義督千户至元中改為劍川縣屬鶴慶路明洪武十七年升為州屬鶴慶府本朝初因之乾隆三十五年屬麗江府中甸同知在府北五十五里東西距三百六十里南北距五百六十四里東至麗江縣界二百三十里西至維西界一百三十里南至麗江縣界二百八十四里北至四川里塘界二百八十里東南至麗江縣界一百五十里西南至維西界二百一十里東北至里塘界一百二十里西北至維西界一百四十里本唐吐蕃鐵橋節度使地元為麗江路地明為麗江府地本朝因之吳逆之變以地與達賴喇嘛雍正五年來屬移劍川州判駐防其地乾隆五十一年改同知仍隸麗江府維西通判在府西北五十七里東西距一千一百五十里南北距三百三十五里東至麗江縣七十里西至川藏擦瓦岡界一千八十里南至麗江縣界二十五里北至中甸界三百一十里東南至麗江縣界七十里西南至麗江縣界七十里東北至中甸界三百二十里西北至川藏界七百二十里本唐吐蕃鐵橋節度使地元為麗江路地明為麗江府地本朝因之吳逆之變以地與達賴喇嘛雍正五年來屬移鶴慶府通判駐防其地乾隆三十五年鶴慶改州通判亦屬麗江仍駐維西形勢橫連千里雄據九睒明統志天塹則金沙黑水地利則鐵橋石門通志內固大理外控番戎山川明秀險阻足據舊鶴慶府志金華為鎮劍水為帶左鎖石關右截江嘴劍川州志州學在州治南舊為府學明正德十一年建崇禎四年重建夲朝康熙雍正中纍修乾隆三十五年改為州學入學額數二十名劎川州學在州治南明洪武二十三年建本朝康熙中重修乾隆十一年移建城外西北隅入學額數二十名雪山書院在府治本朝乾隆二年知府管學宣修玉河書院在府治西本朝乾隆四年修復性書院在鶴慶州治南明隆慶間建金華書院在劍川州西門外金華山明隆慶間建户口原額人丁共二千三百四十四今滋生男婦大小共三十一萬七千三百五十九名口計五萬五千二百四十九户又屯民男婦大小共三萬三千二百七十七名口計五千八百五十八户田賦田地四千四百九十五頃六十五畝有奇額征地丁正雜銀六千六百三十兩一錢六分米一萬二千七百六十八石八斗七井四合五勺山川東山在麗江縣東二十里一名吳烈山峯巒起伏環拱郡治通志有吳烈山神祠在東山麓阿那山在縣境廢寶山州南二十五里上有阿那和故寨又州北八十里有珊蘭閣山三臺山在縣南十五里三峯聳秀為郡之案山馬左墅山在縣南三十五里土人常為牧地珊碧外龍山在縣西南二十里孤峯聳翠多産箭竹雪盤山在縣西南舊蘭州南十里四時常有積雪老君山在縣境舊蘭州西北二十里古名如刺鈞山頂有深潭五所土人常放氂牛於此謂之牧牛山舊志在府西南二百五十里一名羅鈞山自番界來亘四百餘里金沙環其左瀾滄繞其右世傳老君修丹於此山頂丹竈尚存又有梓潼遺筆在巖上乃化書春光泄柳條之句山上有龍潭凡九十犯之風雨輒至福源山在縣境舊蘭州北延亘東南五十餘里黃山在縣西峯巒秀美綴若聯珠為郡右翼民居市肆環繞其下中通二衢為中甸維西要路象山在縣西北五里形如伏象山下有泉府志即鶴慶州漾共江源也雪山在縣西北二十里明楊慎雲南山川志一名玉龍山條岡百里巋嵬十峯上插雲霄下臨麗水山巔積雪經夏不消巖崖澗谷清泉飛流蒙氏異牟尋封為北嶽滇載記一名聳雪山其山九峯積雪四時玉立萬仭千里望之若在咫尺圖説遙望之若與蜀松州諸山相接或謂之雪嶺唐貞元中韋臯約雲南共襲吐蕃驅之雲嶺之外蓋即雪嶺外也通志雪山兩崖壁立金沙江貫其中花馬山在縣境舊巨津州東南一百五十里崖壁上有石色斑斕類花馬因名昔磨些詔自名其國為花馬本此通志元世祖滅大理時三睒土酋麥良內附破鐵橋之花馬國以功授職即此又金馬山在州東北二十里有石五色狀如馬漢藪山在縣境舊巨津州西北二百八十里高萬仭上有三湖各寬五畝深不可測果鋪山在縣境舊臨西縣西今入番界峯頂山在鶴慶州東十七里明統志峯巒起伏南接龍珠山北扺麗江界下有五泉可以溉田府志一名石瑤山高三十餘里遠瞰洱水頂有佛寺郡人於三有望日投弓矢祈嗣月山在鶴慶州東南二十里積石圍繞形如半月又十里為龍華山林壑深秀石泉迸冽上多梵字一郡之勝觀也象眠山在鶴慶州南二十五里有石穴百餘潛泄漾共之水入金沙江龍珠山在鶴慶州南二十五里明統志前聳後平下有石穴漾共江過焉每歲四月郡人祀之以禳水災俗傳昔有龍吸珠於此因名龍珠山按是山疑即象眠山之連麓而異名者豸角山在鶴慶州南二十五里以形似故名桃樹江出其下山峯突起建塔于上天馬山在鶴慶州南三十里其狀如馬半子山在鶴慶州南一百二十里産礦山北有泉自大凹中石床下湧出伏流半里許出為二流民甚利之謂之仙女井方丈山在鶴慶州南一百二十里巍然峻拔山半有洞中有池深不可測水滴巖下若金石音蒙氏琢觀音像於壁故又名觀音山南詔名山十七此其一也南接點蒼去大理府浪穹縣四十里朝霞山在鶴慶州西南十里常有霞籠其頂又西南十里有宣化山又西南二里有馬耳山佛光寨山在鶴慶州西南一百二十里昔普顔篤作亂據此覆釡山在鶴慶州西五里為州鎮山形如覆釡峯巒秀拔南北諸山皆拱翼之又有金燈山在覆釡下亦名秀臺山其相抱者曰仰止山逢密山在鶴慶州西二十五里三峯入雲中有青元洞石孔玲瓏伏流相接頗稱奇境每歲六月六日逰人燃松炬而入乃窮其勝拱面山在鶴慶州西北五里高百仭一峯聳秀拱向州治林蠻環映山多白石瑩然如雪又西北二里有石寨山四面皆險頂稍平湯乾山在鶴慶州北三十里産紫石青崖山在劍川州東十五里上産青石狀如翠屏金山在劍川州南有二山并峙一赤色如金一白色如銀謂之金山銀渡相傳其地不可耕夜合山在劍川州南二十里形如卧牛劍湖繞山麓而出石寶山在劍川州南五十里層巒峭壁上有石坪方數十畝昔為高僧養道之所中有羅漢迹州志山在州西南二十里有石自然具佛座獅象鐘鼓之形梵剎凌空花木叢匝最為奇境明李元陽有遊石寶山記中山州志在石寶山南一里巖石壁立鐫梵像數百莊嚴經久不變謂之中山石佛旁有石如羣蛙俗呼為聽法蛙又有峻崖名金棲雞在中山南二里石面有巨人掌迹其火如箕金華山在劍川州西一里山脈自番界羅均山來延亘四十餘里山頂常有紫氣如金為一州之鎮劍和山在劍川州西四里山形如劍石羅摩山在劍川州東北七十里峯高百餘丈屹立如巨人狀又名將軍山白芝山在維西通判治西北四百二十里冬春積雪梭石坡山在維西通判治北三百餘里亂石如梭南松嶺在鶴慶州南二十里鍾賢嶺在劍川州南六里與金華山峯巒相接土岡在鶴慶州西南十八里南岡在劍川州南二十五里一名羊鼻山俗謂點蒼山落足於此又有石明月在州南一百三十里崖壁上有白石如輪田間水映皎若明月文壁峯在鶴慶州東十里羣峯秀異七坪峯在鶴慶州南七十里通志在龍珠山東南筆架峯在鶴慶州東北二十里三峯並峙中峯特出如筆架大孟巖在鶴慶州東南一百三十里石壁橫亘三十餘里形如城郭上多古樹幽禽其相近又有煉場巖巖石疊架數十仭大成坡在鶴慶州東南六十八里頂有泉深廣尺許不溢不涸謂之一碗水其西又有小成坡為舊順州及大理府并永北廳之孔道金斗坡在鶴慶州西南五十里下有銀泉瀾滄江在麗江縣西南三百里明統志源出吐蕃嵯和歌甸流經舊蘭州西北三十里李元陽黑水考禹貢導黑水至於三危入於南海隴蜀之水無入於南海惟滇之瀾滄江潞江二水皆由吐蕃西北東與雍州相連接其水皆入南海然潞江西南流蜿蜒緬中內外皆夷於梁州境若不相屬惟瀾滄由西北迤邐向東南徘徊雲南郡縣之界至交趾入海今水內皆為漢人水外則為夷緬禹之所導於以分别梁州界者惟瀾滄之水足以當之元史至元八年大理勸農官張立道使交趾并黑水跨雲南以至其國此亦一證隴蜀滇三方鼎立雍以黑水為西界對西河而言也梁以黑水為南界又對華陽而言也惟三危之山不可考耳禹貢錐指瀾滄居河源之東黑水自三危而南則必入於河矣安能越河而南與瀾滄相接以入南海瀾滄非雍州黑水之下流甚明滇志瀾滄江源出嵯和歌甸之鹿石山一名鹿滄江亦曰浪滄