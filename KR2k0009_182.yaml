或曰即黑水祠也何公祠在保山縣儒學南記明巡撫何孟春象山祠在保山縣太保山麓祀明處士楊元節孝婦祠在保山縣西明御史陰汝登建祀閬州守妻宋氏本朝康熙三年改建於易羅池後兵燹廢四十年重修昭忠祠在保山縣馬王廟內本朝嘉慶八年建寺觀法明寺在保山縣太保山麓蒙氏時建明天順間重修為習儀之所法寶寺在保山縣南法寶山蒙氏異牟尋建報恩寺在保山縣北靈鷲山蒙氏時建元泰定間重建俗呼為大寺名宦漢陳立臨卭人為不韋令蠻夷畏之鄭純廣漢人明帝時西部都尉為政清潔化行夷貊君長感慕皆獻土珍頌德美天子嘉之即以為永昌太守純與哀牢夷人約邑豪歲輸布貫頭衣二領鹽一斛以為常賦夷俗安之曹鸞巴人熹平五年為永昌太守時黨錮甚嚴鸞上書曰夫黨人者或耆老淵德或衣冠英賢此宜股肱王室左右大猷而久被禁錮災異屢見水旱薦臻皆由於此帝怒殺之馮灝廣漢人建和間任永昌太守多異績欒巴內黃人靈帝時坐陳竇黨謫永昌太守上書極諫理陳竇之冤帝怒下獄自殺三國漢王伉蜀郡人章武時為永昌郡丞與郡吏吕凱帥吏民拒雍闓諸葛亮表為永昌太守封亭侯費詩犍為人章武中為牂牁太守昭烈即位詩上疏諫左遷永昌從事霍弋枝江人章武末年永昌郡夷獠恃險不賓數為寇害乃以弋領永昌太守率偏師討之遂斬其豪帥郡界以靜明葉學則德興人雅善詩歌洪武間為永平社學師始開文教胡淵定海人洪武間掌金齒司事初李觀建郡城於太保山淵拓而廣之金滄副使林俊臣創名宦祠淵首與焉子深繼掌金齒使事興學勸農安邊勵俗有賢聲孫志在鎮二十餘年內外綏輯人民安堵方政全椒人正統中以副將軍討麓川酋長思任發斬首三十餘級頃之夷兵四集諸軍無繼之者乃遣其子瑛曰汝即歸我死今日矣瑛泣請避之政叱曰無多言將死戰分也遂策馬而進夷兵攢為泥贈威遠伯諡忠毅郡人立祠祀之同時戰死者都指揮同知顧勇陳翊侯義江洪郭本融縣人天順間以御史遷永平主簿剛直廉介常言永平小邑不宜冗員召還後請裁主簿不復設嚴時泰餘姚人嘉靖二年為永昌知府時永昌初復時泰立法定制綏柔瘡痍控制夷𤏡督博士弟子勤課業以風勵文學所著有專城録戴希灝柳州人嘉靖中任永昌府同知愷悌亷明絶請託却夷金興水利勤講課在任八載遷長史去之日行李蕭然士民遮道今崇祀薑龍蘇州人嘉靖間任瀾滄兵備道立哨設守盜賊屏息楊慎作蜻蛉謡頌之多士凝隆慶中宣撫緬甸莽瑞體作亂遣使召之士凝宣中國威德言中原幅員之廣如雲南其百一緬所轄特千一耳瑞體頗懼士凝歸遇潞江安撫線貴方投緬責其負國興釁適指揮方諡率兵戍蠻哈士凝盡以瑞體之䇿告之時土司惟士凝為服順後養子嶽鳯鴆殺之鄧子龍豐城人萬厯十一年為永昌參將緬人犯施甸焚掠極慘子龍追及於攀枝樹下大敗之斬景宗直以靖灣甸擒罕虔父子以開耿馬捉莽裕以平阿坡築建關城多其指畫李材豐城人萬厯十四年任兵備道正倫紀禁掠屠俗先恥讓男女别途日延紳士講修身之學後為御史蘇酇所誣被逮郡人薛繼茂訟其冤始釋漆文昌瑞州人沈毅有謀略為永昌撫夷同知萬厯十六年緬兵犯猛密土司子思化思豪奔蠻莫巡撫蕭彥令文昌往撫單騎入蠻莫宣朝廷德意化豪匍伏聽命十七年姚營兵鼓譟所至劫掠將為雲梯攻城甚危急巡撫楊紹程按部永昌委文昌出城散給叛兵資費押之出境又議屯田二十四甸又於各險隘建八關三堡皆親履相度悉中機宜緬夷不敢內窺騰永之民至今尸祝李朝籍貫未詳萬厯間任把總征緬戰死巡撫陳用賓建祠祀之同時有目把者義𤏡人亦力戰死用賓作詩弔之祁秉忠陜西人萬厯末為永昌參將賊銀定歹成等以二千餘騎入塞剽掠秉忠初就任即提兵三百拒之轉戰兩晝夜賊敗遁追還被掠人畜過半陳錫爵廣東人天啓間任永昌同知殲叛夷懲師巫嚴保甲清軍餉獎士類興利剔弊質成者稱神君焉李選石屏州人崇禎間任保山教諭癸未三月獄囚叛焚府堂選入救火諭囚以大義為囚刺死劉廷標上杭人厯永昌通判沙定洲之亂黔國公沐天波走永昌既而孫可望入滇破定洲移檄永昌索道府印時廷標署府印謀守瀾滄江以拒賊天波懼諭廷標等以印往廷標堅不豫士民恐及禍咸就署力謮且以死危之廷標笑曰若謂我畏死乎因取酒置毒將飲衆乃散去是夕監司王運開先自經廷標聞之曰男子哉我老人反後耶遂沐浴賦詩三章亦自經本朝乾隆四十一年俱賜諡節愍弟廷樞賊脅以官抗志不屈後值兵亂撫掌疾呼曰吾與兄何可二其行也先殺其幼子與妻張氏自縊死王運開之弟運閎隨兄至永兄與廷標殉難偕廷樞共殯殮之為賊脅至潞江手一紙付僕躍入中流沈丈許復起衆急救揮手止之乃殁讀其字曰得我骨葬於兄側題曰夾江兄弟之墓數日後於沙岸得尸顔色如生本朝乾隆四十一年子入忠義祠王應龍工部尚書桂王入緬率子追之不及同縊於永昌朱慈煃吉王明宗室聞兵亂與妃張氏同縊死其時同殉難者松滋王瑞昌王皆失名又有宗室朱儀漆晉王李定國黔國公沐天波敘國公馬惟興文安侯馬吉翔及弟雄飛泰安伯竇民望綏凝伯蒲纓總兵姚文相黃華宇熊惟賢王自金安朝柱王升陳謙王啓隆龔勳中軍薑成德通政朱藴金吏部尚書鄧士廉禮部侍郎楊載靖東將軍魏豹御史塢昌琦任國璽錦衣衛趙民鑑王大雄王國相吳承應朱文魁任子信張拱極劉相宋宗宰劉廣凝兄弟宋國柱丁調鼎太常博士鄧居詔主客司王祖望儀制司裴廷謨武選司郭璘序班尹襄千户鄭文遠李既白淩雲百户吳麻子學録潘璜典簿齊應選勳戚王維恭張宗伯旗鼓吳承爵司禮李國泰秉筆李茂芳東宫典璽楊宗華李崇貴內監陳德遠等十八人又內監周盧曹沈楊五人失其名本朝王家相咸寧人康熙間任永昌知府時初平吳逆整綱飭紀摘伏如神事關農桑風教皆悉力舉行入祀名宦祠張承賜遼東人康熙間任永昌知府潔已愛民培養士類倡捐濟貧田二百六十畝蘇爾相靈州人乾隆三十四年總督彰寶檄至緬促貢緬囚之百計誘爾相降終不屈至七年乃送之歸洊升至騰越總兵同時被羈不屈者隴川土把總多朝相貴州兵彭文賢劉成龍吳老昭通兵馬文彩王登科人物三國漢吕凱字季平不韋人仕郡五官掾功曹時雍闓等降於吳凱與府丞蜀郡王伉帥厲吏民閉境拒闓丞相亮南征表凱及伉功言凱等執忠絶域十有餘年臣不意永昌風俗敦直乃爾以凱為雲南太守封陽遷亭侯會為叛夷所害子祥嗣仕晉為南夷校尉祥子及孫世為永昌太守李雄破寧州諸吕獨不肯附舉郡固守明楊元字務本保山人精邵子先天數學為諸生卒業太學歸隱居不仕甘貧樂道當路重之饋遺皆弗受或封識待其去任返之著納甲圖九圭數學基指南號象山先生丁嵩保山人家貧事母孝洪熙間舉懷才抱德辭不就宣德間詔草野直言嵩上機務八䇿一曰正心術二曰重經筵三曰開言路四曰用賢才五曰總大綱六曰汰冗兵七曰重守令八曰崇節儉上嘉納徴之道病卒所著有橫峯樵唱張升字德輝保山人通天文地理從尚書王驥征麓川有功授官不就秣陵陶凝讚之謂為後學之儀表林泉之英傑卒年九十二著有地理圖説中星圖説諸書張昺字德逺保山人天資清後嗜學飭行正統初舉為弟子師嘗以千金置義田於蒲縹以資宗族之貧者婚葬孤孀皆有常給子弟有不善責令改而後已鄉人有貸者焚其劵周貧不欲人知有犯不校善行草書所著有鈍庵稿地理撮要鍾應奇永平人天順間母病姚營叛兵入其家應竒泣涕求以身代兵感其孝母子俱得全徐訥字敏行保山人年十三父遘疾幾殆訥稽顙籲天願以身代父病果愈後父殁廬墓三年朝夕哀號有青蛇繞蟇之異成化間詔旌其門張志淳字進之保山人成化中進士官至南京户部右侍郎嘗言張綵之姦綵銜之後竟被劾歸兵備道劉節倡復永昌府以除鎮守之害志淳多所孹畫羣姦失利相切齒而終不為浮議所動所著有南園集西銘通南園漫録永昌二芳記從弟志信宏治中舉人亦負重望著有介軒東籬二集胡亢字希賢保山人父殁時亢年十二三日不食既葬結廬墓側每哭泣輒有鳥雀集樹悲鳴哭止乃散戈諫金齒衛人宏治中以太僕丞出為湖廣僉事所至以廉幹稱捕擒巨寇賚子有加吳章字廷獻金齒衛人嘗問學於王守仁授長夀教諭倡明理學教人以致知力行學者宗之張鐘字子鳴金齒衛人為嶽州推官不屈閹宦厯南京工部郎中以疾歸家居五十年卒惟圖書數卷張含字愈光金齒衛人少隨父志淳官京師與楊慎同學及慎謫滇遂為昕夕之友著禺山集同郡湯琮陶凝張志舉程廣曹遇皆有詩名張志淳極稱之張合字懋觀含弟嘉靖中進士厯湖廣副使以疾歸時欲清查夷田人心洶洶合上書五千言遂寢其事馬繼龍字雲卿保山人嘉靖中舉人官車駕司員外郎著有梅樵集尤工於七言律金齒明詩禺山後一人而已張必煥保山人嘉靖中舉人知江安縣正直無私不畏強禦有老婦訴豕為虎攫必煥牒山神是夜虎銜餘豕至人服其神著有存拙稿延明精集陳一鶴保山人隆慶中舉人居家孝友置義田以助鄉鄰設義地以埋枯骨夜覺有盜一鶴曰祇有銀二兩可於窗外接之有竊其穀者一鶴見而避之不欲識其面馬葉如保山人萬厯中為貴州安平道時貴州安奢二酋亂商旅不通藩臬皆缺葉如出都朝列祖餞者皆曰公此行與虞詡之朝歌何異葉如曰食祿死事分也至黔單騎諭其渠帥撫綏備至黔中大定後制使抵黔拊其背曰公一人賢於十萬師矣以功轉兩淮會鹺石應嵩保山人萬厯中進士知江陵縣操持嚴毅遇事剛斷豪猾斂迹會水泛為害應嵩督民作隄後調靈寶縣有礦徒數千入其郛應嵩登城拒之手刃二人指麾力戰賊大潰事聞升南京兵部主事浦口城為南都保障江水侵囓南城盡圯應嵩築石隄以防江計石隄七百餘丈江霧未開即視事三面俱新省費十餘萬薛繼茂字懋敬保山人萬厯中進士刻厲有大志厯湖廣御史上書論郊廟不親請建國本等事初並封之議神宗謀於閣臣王錫爵以為可及旨出舉朝爭詆錫爵惟繼茂一疏最和平又疏出滇臬李材獄按黔請增解額五人為怨者所中削籍後追録忠直贈光祿少卿王國治保山人萬厯中知新繁縣值奢酋叛以全城功晉刑部郎中有內侍獲譴以千金求宥力却之閃繼迪保山人萬厯中舉人任吏部司務漕澗賊臨城建議主剿施甸激變建議主撫皆中機宜鄉人立祠子仲儼禮部右侍郎曽忤魏璫削籍次仲侗皆有詩名趙之炎初名千里保山人萬厯中由户部郎致仕歸遭流寇之亂三拒偽職救飢埋骨建養生院置義田收贖被虜子女人感其德符節保山人其友丁良病以幼兒並白金百兩託節節厚撫其子且教之比長挈金授之封識依然鄰婦迫於飢寒自縊節救之活給衣食厯二十年終不見婦面婦卒葬之著有丘圾堆集張化樞永平人由舉人知江南無為州流寇攻城城陷被執罵賊而死本朝乾隆間賜諡節愍傭作人永平人姓名失傳萬厯間為人傭作事母至孝一日見逐於主人哀求不納哭而去曰母老無食奈何忽夢人撫其背曰某山有竹搖之可得米如言以往果得米似稻而較長味甚美李君植保山人官瀾滄衛指揮孫可望入滇君植領軍赴援大理值賊圍城力戰死本朝乾隆四十一年賜諡烈愍陸九衢保山人嶍峨訓導流寇陷城衣冠坐明倫堂罵賊遇害本朝乾隆四十一年賜諡節愍徐一中保山諸生事母以孝稱母死柩停室中時有火災一中抱柩哭禱火頓息人以為孝德所感潘嗣魁保山人事大父孀母以孝聞置義田焚借劵崇禎間行保舉法閃仲儼舉以應詔後中舉人石聲和保山諸生崇禎間刑部郎中王國治舉應孝廉丁亥流賦入城聲和與子吉皆死之馮時可保山諸生尚節義善屬文流寇之亂闔門死節王顯隆字樂天保山諸生弟顯卿字樂心素友愛丁亥遇兵亂俱自焚馬生保山人失其名丁亥流寇至永郡惡少爭焚香迎之馬生獨閉門縱火舉家自焚死本朝乾隆四十一年豫入忠義祠張登元字文蔚保山諸生已亥兵至闔門死節本朝乾隆四十一年豫入忠義祠劉德本保山人已亥兵至永昌德本哭語其妻曰時事至此吾儕小人何以生為遂積薪樓下夫妻子女五口俱自焚死十一年本朝乾隆四豫入忠義祠陳正猷保山諸坐己亥兵亂正猷偕妻避於東山繼而兵至自縊死本朝乾隆四十一年豫入忠義祠祝維霍保山諸生已亥兵亂投井死本朝乾隆四十一年豫入忠義祠張文達保山人由舉人知錢塘縣後官霸昌兵備道時討流寇傾家助餉以憂去任聞流寇北至遂還騎入衛京師已陷赴驛亭自縊死本朝嘉慶十三年恩準入鄉賢祠同郡貢生丁軍亨沈嗣振俱明末殉難本朝王宏祚字懋自保山人由舉人任户部郎中順治初擢岢嵐道以才能召入仍為户部郎中是時天下初定圖籍散失宏祚練習故事奉修賦役全書多所釐正擢太僕卿纍遷尚書加太子太師上籌滇條議十餘事改兵部尚書致仕卒諡端簡徐崇嶽字石公保山人康熙中舉人赴公車不第樂志林泉殫心著述吳三桂重其名強之仕不屈所著有造適軒集流寓元托克托字大用順帝時中書左丞至正中伐徐州賊破之又破張士誠於高郵城下哈瑪爾忌其功嗾御史袁賽因等劾之詔削官爵再徙雲南之鎮西路騰衝知府高惠欲字之女辭曰吾罪人也安敢念此後再徙阿輕乞之地惠以前不受其女發兵圍之哈瑪爾矯詔遣使鴆之卒年四十二托克托舊作脫脫哈瑪爾舊作哈麻今俱改正明范從文字復之崑山人文正公十三世孫洪武中以奉使稱旨擢御史後謫戍莊浪又改戌金齒十年赦歸著有小學章詁後齋集等書高莘山東人洪武中以起居注謫戌金齒時武官恣橫欲延為館賓免其從役莘以守分執役辭乃使之守門終日執殳會大雨武官并其妻孥辱之泥塗衣裳狼籍殊無戚容其耿介如此周志鋐字元亮永安人洪武中以翰林謫戌金齒精春秋人稱節孝先生葉景和南京人從父母戍永昌母有殊色解官千户欲私之其母不從凌辱備至父亡欲置之死景和時年十四逃還京撾登聞鼓即時召入俾盡言千户論斬令景和監視之楊慎新都人廷試第一嘉靖初以諫大禮戍永昌衛安鳳變起圍木密所慎戎服往援賊敗去安寧守欲榷民鹽牛稅慎謂此刀錐者宜推與民軍官言海口役為利督丁夫六千人下海民苦之慎以書告執政俱報罷戍永昌三十二年放浪湖山覃精著述卒於滇劉寅崞縣人以罪謫金齒賣藥授徒著書不輟萬厯中巡撫陳用賓祀於會城與漢王褒明楊慎為三賢云刀怕文宣撫怕舉之弟怕舉死罕拔為緬招于崖許怕文代襲其兄職怕文拒之與戰緬兵大至潰奔永昌列女元黃善妻張氏永昌人名藥師年十六適善生子定善卒家貧守節撫育遺孤大德中定赴京訴其母之貞操詔旌其門明李勤妻張氏永昌人年二十六夫亡孝養孀姑苦節五十餘年卒洪武年旌司郡夏安妻葉氏白浩妻閃氏朱鑑繼妻徐氏胡來覲妻陸氏閃訓妻馬氏俱夫亡苦節詔旌其門李某妻季氏永昌人夫失名氏早孀有殊色都督毛勝鎮永昌欲強娶之氏以死自誓勝不能屈同郡趙璿妻鄭氏蔣希賢妻袁氏劉儀妻李氏俱夫亡苦節厯四十餘年卒謝定妻住氏永昌人夫罷四川開縣令僑寓不歸翁姑年八十餘氏紡績以養之及卒鬻所居小室以葬遂不食而死多士凝妻罕氏木邦女也士凝死緬兵攻之罕氏懷印信并二子奔永昌求援當事不應遣之歸亦為嶽鳳所害早正妻永昌人阿昌羅板寨百夫長早正娶羅古寨土舍女為繼室正病妻事之謹及亡大慟不食而死梁毅女永昌衛人年十六父母他出女適獨居惡少挑之女大怒泣訴於母遂自縊死楊椿妻張氏金齒衛人年二十五夫亡子幼家貧勵志守節厯四十餘年卒宋氏金華人夫任閬中守以事死獄中仍籍其家氏隨姑來戍金齒長途奉姑不少懈過盤江題詩郵亭壁訴其冤苦御史陰汝登建祠永昌刻其詩於石俞富妻阮氏合肥人富籍金齒從征安南與弟祥俱戰死阮氏暨祥妻黃氏年未二十俱誓死無他學士汪諧旌其門張思仁妻王氏山陰人隨夫戍金齒年二十六夫卒父母欲改嫁之氏以親老子幼矢志靡他卒不能奪宣德年旌同邑梁貴妻趙氏夫戍金齒卒苦節撫孤詔旌其門吳貴二女鞏昌人父任永昌指揮卒無子二女間關叩闕求為置嗣誓守貞以終戈諫妾韓氏無錫人諫金齒衛人宦東昌納為妾厯官僉事卒氏守節自誓或憐其少欲奪之遂自縊瞿爵妻朱氏保山人年二十三夫卒無子食貧守節嘉靖間旌同縣周科妻張氏年二十九夫亡一子方幼族人利其資迫令改適氏以死自誓守節四十餘年萬厯年旌潘承志妻邵氏保山人年二十三夫隨父任卒氏茹苦撫孤厯五十餘年同縣陳謨妻田氏劉遇曉妻張氏周士玉妻楊氏尹先哲妻戚氏張士彥妻鄧氏俱早歲夫亡苦節五十餘年袁必通妻張氏保山人年二十九夫亡苦節五十餘年卒子熙早殞媳陳氏亦苦節四十餘年同縣劉傑妻毛氏閃應華妻穆氏陳大猷妻馮氏孔宗明妻劉氏王重光妻段氏陳溥妻趙氏易源鼎妻龍氏李達妻席氏俱早歲夫亡食貧苦節王啓龍妻吳氏保山人夫任總兵流寇之亂氏與妾周氏將自縊人見而救之氏正色曰君與我夫厚宜速我死今反相救欲我等為蠻婦乎與周氏同時縊死同縣朱廣運妻戚氏邱世第妻陸氏周運泰妻吳氏朱統妻閃氏丁長祐妻閃氏王聖修妻水氏薑承德妻楊氏石應岷妾徐氏田氏俱遇賊不屈死又趙天俊妻樊氏左拱極妻鄭氏潘繼善妻周氏吳德光妻陸氏石元鳯妻閔氏俱入祀節孝祠丁列妻張氏永平人年十八夫亡撫遺腹子苦節五十餘年與同縣吳氏張氏同旌張本妻胡氏永平人年二十八夫亡與妾陳氏同心守節厯六十餘年同縣楊廷詔妻謝氏吳承祚妻繆氏廖惟熺妻吳氏鍾伯玫妻楊氏俱早嵗夫亡終身苦節朱錫命妻羅氏雲州人錫命於萬厯間殺賊陳亡食貧守節撫孤成立盧蕙妻寧氏瀾滄衛人蕙任思州府經厯銅苗作亂氏被虜投河死鄒天涯妻董氏永平人流寇至被虜至玉皇閣下投井死同縣李煒妻董氏李自奇兵亂被虜不從投井死楊爾俊妻金氏浩一元妻葉氏馬吉翔女遇賊不屈俱自盡陳其養妻祝氏保山人夫卒孝事舅姑撫子成立為流賊康勇所逼漆面毁容乃免已亥被虜投河遇救得蘇吉王妃張氏兵亂自縊時有桂王貴人劉氏同縊死松滋王妃失其氏顧侍妾將分娩先令自縊俟氣絶乃自刎吳承爵妻永平人失其氏兵亂一子一女先令自縊曰與其留作蠻子莫若與之俱死耳乃自縊同時王國璽妻失其氏亦自縊齊環妾永平人失其氏環為大理卿歿妾遺腹生一子所居狹隘且人衆求死不得紿女伴河邊觀水忽曰吾去矣抱其子投水死吳佩妻謝氏佩為保山諸生氏孝事繼姑流寇將至即置酒與姑訣以二子付其夫善撫之潛登樓自縊同縣石瑜妻胡氏自縊時年二十劉廷樞妻張氏保山人廷樞既殉節氏先縊其二子乃自縊水潔妻陳氏潔為保山諸生流寇至氏避山林被虜至東河邊高聲語同伴曰吾南門外陳氏女也言畢即投河死又城東南騎龍寺有女子年方筓縊於寺中尼曰此恐被辱而自死者惜其姓氏無考閔連城妻石氏保山人流寇至被虜解所挾奩物與夫投河死同縣舉人張世明妻侯氏亦投水死諸生王若實女賊欲犯之不從被刺死馮時可母王氏永昌人流寇亂氏率女及媳自焚張登元妻潘氏保山人已亥兵至氏先誘二子出與夫舉火自焚同縣劉得本妻失其氏亦自焚死陳正猷妻石氏保山人兵亂偕夫避東山既而兵至投水死又祝維霍妻失其氏同時投井死本朝吳必隆妻陸氏保山人未婚夫卒守志終身同縣侯順天妻趙氏俞某妻王氏吳新誥妻周氏張應魁妻張氏皆奔喪守貞於乾隆間先後旌陸自翰妻李氏保山人未嫁夫卒泣血奔喪旋以父老回家歲時一省其姑父卒乃歸張鳳翺妻童氏保山人年二十九夫亡孝養舅姑撫遺腹子成諸生同縣龐德俊妻王氏年二十八夫亡夫叔欲奪其志氏以死拒子早殞撫孤孫成立趙秉良妻楊氏年少夫亡翁有殘疾氏誠心療治鄰憫其貧為議婚氏以死誓守節撫孤厯三十四年又范紹文妻黃氏白太元妻王氏張從良妻施氏趙宗妻楊氏葛延相妻楊氏張維妻宋氏徐幹妻楊氏均乾隆間旌劉秉乾妻陶氏永平人年少夫亡孝姑守節教子成名乾隆間旌袁鼎妻邵氏保山人夫亡守節與同縣胡經妻李氏陳嘉言妻曽氏周于京妻閻氏馬存憲妻趙氏均嘉慶間旌蘇爾相妻張氏甘肅靈州人爾相奉檄往緬甸總督彰寶聞訛傳被執己降氏被逮遣新疆大呼曰奉檄而出何言執也我夫忠貞斷無降賊事遂手刃其子天德并二女隨自刎仙釋唐無言和尚姓李世為蒙氏清平官生時掌有文曰無言因名年十五依圓淨法師精研律論融貫教乘手書大乘般若經千餘卷死得五色舍利遂於棲賢寺旁建塔奉之並見雲南府仙釋門道超段氏子童蒙出家戒行清苦常入定巖間有異鳥銜花麋鹿馴卧之異臨終謂其徒曰勿茶毗三年後當葬我於西山及期起視顔色如生衆嘆異之遂為立塔明不二頭陀姓任少為永昌郡吏素好道嘗過一坊下得隂府律皆其所犯遂棄家雲遊至應天府趺坐市中巡城御史責之命安插古寺內寺有妖不二趺坐夜有蛇長數丈口如盆自上而下欲吞之不二端坐叱曰吾在此不去將誅汝蛇遁入廊下人以此感動捐萬金修德普寺居之又常見其髮有五色後坐化海闊福建人雲遊至永昌居沙木河石碑寺晝夜趺坐戒行精嚴獨居數十年髮白轉黑齒落重生百三歲圓寂於劉家庵祖復號立禪四川宗藩棄位修道遍厯名山至寶臺山創剎聚徒常跏趺深林虎豹潛匿開山請藏三十年無少怠每於枯木下立禪又以指燃燭十指皆盡及入滅令盛以木桶外束以三鐵篐言篐三斷則出世今已二斷矣蓬頭道者字洞元不知何許人崇禎間雲遊至永趺坐市中無所求與之錢隨以給貧人後歸東山寶鼎寺每於盤石上靜坐山禽翔集於身人以此異之土産金後漢書郡國志博南南界出金注華陽國志曰西山高三十里越得瀾滄水有金沙洗取融為金瑪瑙出保山縣瑪瑙山巔有紅白色相間者曰纏絲瑪瑙有紅如胭脂者曰紅瑪瑙有色白如玉面光潤者曰白瑪瑙有紫色者曰紫瑛瑪瑙其體脆而易破製之甚難碁永昌之碁甲於天下製法以瑪瑙石合紫瑛石研為粉加以鉛硝投以藥料合煆之用長鐵蘸其汁滴以成碁其牙色深黑者最堅次取緑者稍脆又蠟色雜色及黑白俱有花者其下也蔞葉藤葉似葛蔓附於樹可為醬即漢書所謂蒟醬也實似桑椹皮黑肉白味辛合檳榔食之可禦瘴癘時魚出保山縣瀾滄江即東南之鯖魚也味極美雷鳴始出茶灣甸土州孟通山出芭蕉灣甸土州出可食大藥鎮康土州出鮮子鎮康土州出大如棗總纂官臣顧蓴恭纂并覆輯校對官臣梁慎猷恭校
