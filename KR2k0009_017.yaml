詔許之除光禄大夫延昌間封卒贈瀛州棗强縣開國男刺史謚曰戴劉獻之饒陽人少之輒孤貧雅謂之曰好詩傳博觀衆籍時人有子若能入孝出弟忠信仁從學者獻讓不待出户天下自知是學者莫不倘不能然於立身之道有所益乎由高其行義希造其門孝文幸中山詔徵典内校書固以疾辭時中山張吾貴與獻之齊名皆稱儒宗吾貴門徒千人行業可稱者寡獻之著錄數百而巳皆通經之士以是辨其優劣崔孝芬挺長子早博學好文有才識章孝文召見甚嗟賞之襲父兼吏部尚書孝芬善爵厯官太談論愛好常卿加後進終儀同三司日忻然商確古今令聽者忘疲所著文章數十篇弟孝偉孝演孝直孝政俱孝義慈厚孝演孝政先亡孝芬等哭泣弟同哀慟絶肉蔬食居挺弟振旣亡容貌孝芬毁瘠見者承奉叔母傷之始挺兄李氏若事所生旦夕温諮決撫從清出入弟宣伯啟覲子朗家如事一以同氣焉劉蘭武邑人年三十餘始受春秋且讀三詩禮於中年之後立山王保安家貧無以自給且耕黌舍聚徒二百讀左氏五日一遍兼通五識為儒者經甚為精悉又明隂陽博物多所宗永平中仕為國子助教馬八龍武强人八龍聞輕財重義友人即奔赴負屍而武遂縣尹歸以家財靈哲在軍喪亡殯葬為制緦麻撫其遺孤恩如所生州郡表列詔旌其門李几安平人家有二七世共居同財十二房一百九十八口役卑幼長幼競集濟濟風禮著聞至于作鄉里歎美標其門閭齊崔伯謙安平人直少奉孤公貧真善養良佐母也神族武弟召暹𥙷當相時府寵功要曹伯稱謙之與曰之清舊寮同信大門行非徵吉赴凶未鄴百嘗姓造號請泣天遮保道初除除南濟鉅北鹿太太寸守恩在郡七轉銀年獄青光無禄停大囚夫徵卒蘇瓊武州强刺人史幼曹時芝嘗芝謁東戲問荆曰卿為欲府官長否流對參曰軍設除官南求清人河非太人寸求姦官芝盜止異息其化對行署俗美南在中郡有六人年頻人告庶謀懷反之前遷後三皆公付郎瓊中推趙檢州事及多清申河雪京師疑蘇為珍之之語官曰至斷大獄理無卿周崔士謙辯魏之為孫殷父州楷刺仕史葛榮稱良䧟牧城性闔至門死孝與之弟士説謙特仕相周友累遷荆愛雖復州年刺位史並號高資及產説皆無子宏私度焉並居家奉其嚴遺肅子曠訓云隋李德林安該平博人墳典敬善慕屬之文齊遭天父保艱八反年葬舉故秀里才隆射冬䇿單五衰條跣考足州皆為里上周物武一帝以克委齊之授高内祖史受上顧士命詔以誥格德林式為及丞用相山府東屬人三方内構史亂令軍虞書慶填委則勸文高章祖百盡端滅不宇加文治氏點惟及德受林禪授固爭以加爲所不撰可文帝集怒由五十是卷品行位於不世崔彭士母謙以子孝少孤聞性事剛毅騎有將武軍畧恒工典騎射宿衞善性周謹官尚密在書省高闥祖二踐十祚餘累轉年每驃當上慎在之仗義危上坐稱終善日累未遷甞左有領惰大容將嘗軍說君卒諡臣曰戒肅崔仲方挺志曾仲孫方少獻好二讀十書䇿有帝文大武才奇之畧高周祖武受帝禪有與滅高齊熲議位正上朔開服府色事爵固勸安除六縣公官爲依虢漢州魏之刺史舊上並書從論之取進陳之總策管及時大諸舉伐陳以爲羌猶未賓附行詔軍總仲方管後數擊之與載賊轉三㑹十州餘戰太諸守部乞悉骸平骨厯信卒於都家崔廓安平通涉人山博東覽學書者籍皆多宗所之不子應賾辟七召歲與能趙屬郡文李士開皇謙初爲射忘策年之高第友詔時與稱諸崔李儒定禮水樂授漿不協入律口郎蘇者五威日雅後重之歴起母居憂去舍人職越性王至長孝史孫萬夀武强八年十四就阜城熊安生受五經兼博涉子史善屬文李徳林見而奇之高祖受禪滕穆王引為文學官終大理司直唐李百藥德林子七歲能屬文父友讀徐陵文有刈琅邪之稻之語歎不得其事百藥進曰春秋鄅子籍稻杜預謂在琅邪客大驚號奇童貞觀中累遷散騎常侍宗正卿卒謚曰康百藥才行為天下推重持父母䘮還鄉徒跣數千里服雖除貎癯瘠者累年好獎薦後進得俸祿與親黨共之翰藻沈鬱詩尤其所長樵厮皆能諷之所撰齊史行於世劉君良饒陽人四世同居族兄弟猶同産門内斗粟尺帛無所私隋末荒饉妻勸異居君良即斥去妻召兄弟流涕以告天下亂鄉人共依之築為堡因號曰義成堡深州别駕楊宏業至其居凡六院共一庖子弟皆有禮節歎悒而去貞觀六年表其門閭李安期百藥子亦七歲屬文父貶桂州遇盜將加以刃安期跪泣請代盜哀釋之高宗即位遷中書舍人預決國事帝屢責侍臣不能進賢安期曰比見公卿有所薦進皆劾為朋黨所以人爭噤黙避謗帝納之尋檢校東臺侍郎同東西臺三品期三世掌制誥卒諡曰烈孫羲冲又自德林至安為中書舎人張鷟陸澤人早慧絶倫稱天下調無露初雙八登進以制士第考舉皆甲功郎騫味道見所對科累遷鴻臚丞四参選判錢萬為選銓府最員外郎員半萬中時號青錢學士十新稱鷟文辭猶羅日本使至青銅必出金寶購司門員其文終外郎崔元暐安䘮平廬人少以學行稱居有燕更巢共乳甘親露降庭樹謁執政長安忌之元年為天官改文昌左丞侍武郎當公后曰卿介然不受私改職乃聞令史設鳳閣齋相慶此欲侍郎以誅二肆張其貪功為耳中卿為朕書令俄還舊官再遷拜博陵郡王罷政居貧事後寓郊流墅古州道病羣從皆自卒諡文遠㑹食獻元與弟暐三世不異昇尤友愛昇為司辟兄刑少弟守卿時宋璟劾張昌正如此子璩有文宗不軌學終禮昇執論大部侍郎李湛饒陽誅二人義張以府子六敬暉及歲授湛為周王府文學張柬之將右羽林將軍總禁兵請太子至宰相而元武湛為門斬關入初中興功臣世義府不以以立武后父惡為貶得云劉幽求武强人等誅二聖厯中舉制科高張不殺武三思幽第授朝邑求謂曰公尉桓彥範等無葬地矣旣参大而五王䇿是夜皆為三號令詔思搆死臨淄王入誅勅一出其手睿宗立韋后預爵徐國公先天修國史元年為尚書右僕射同崔湜附太平公主有逆中書門下三品監計幽求説元宗早圖之未發而言泄乃流封州太平公主誅即日召復開元初進尚書左丞相未幾又貶恚憤卒諡曰文獻魏知古陸澤人方直有雅才擢進士第睿宗時累遷黄門侍郎誎造金仙玉真觀帝嘉其直以左為侍中從散獵騎常侍同中書門下三品渭川獻詩以諷明年封梁先天國公元年竇懷貞詭謀崇不協亂國罷政知古密發其姦後改紫微令與姚事卒宋璟聞而歎曰叔向古遺直元子産古遺愛乎贈幽州兼之者其魏公都督諡曰忠崔渙璩子博論議十綜經術歲居父長䘮哀毁如成郎楊國忠人起家亳州惡不附已岀司功参軍累遷司門員外為巴太守明皇西狩迎謁於道帝同平章事見占奏以為明治肅宗立為江淮宣體即日拜門下侍郎諭選𥙷使收采遺逸不以政渙親論故自嫌其姦載代惡宗時之貶遷道御史州刺大史夫元卒謚載曰輔元崔倫安進平人居父䘮徒跣士第厯吏部員外䕶柩郎安行禄千山里反道䧟路為賊不流涕汙偽及官寶逼應二為書年以約城右庶中降子倫使不吐從蕃留更囚二邏年執娑城倫至涇閲六年州終不屈乃遷尚書許左還代宗丞卒贈見工之部為尚感動嗚咽書諡曰敬張薦鷟孫敏鋭有文詞能史館為修周撰官左氏真卿為春秋李希為顔烈所真拘卿所薦上賞疏大厯中充請執希烈母至境名伏匿上京以師贖真平擢卿左盧杞拾遺持詔之不報復用杞朱泚為刺反詭姓史薦論杞奸兵亂惡禮不物當用殘替德宗納之用薦為太貞元元常博士年帝參綴親典郊時更儀畧如舊又章後使吐擢蕃誎薦議大占對夫裴詳辯延三齡必欲使絶域斥之使使始兼御史回中鶻丞後贈大禮夫次部尚赤書嶺被諡曰病憲卒崔良佐安門平人人居諡曰白鹿貞文山孝父所春秋著又有集三十國卷崔造安平美張人正永則泰中三人與韓㑹友善皆盧自東謂王佐才時比州發所號部四兵夔官建州二千以待刺史朱泚亂命德宗嘉之造輒馳貞元二檄年以給事故事中以不同次中書門下用之造以平錢章事帝謂造榖諸使罔上敢言自私能立請兩税江委淮本道轉運觀使察使悉停諸以度支還尚道水陸運轉書省宰相分度支領六巡曹院韓滉未持幾不罷可為改太帝以滉轉子庶子所運江請悉淮餘罷以如造憂卒請崔衍倫子天寶謹厯末擢蘇虢明二經州調富平刺史遷尉宣繼母李歙池觀不慈衍事之察使為百姓益所懷周幕府奏於親族聘皆名士葬埋嫁娶衍儉倚以約畏法室無妾濟者數十家及媵禄卒不稍能蕆粟䘮稱表諸之贈朝工賜賻帛三百部尚書諡曰段懿米崔縱渙子渙縱棄金之貶部員外税郎就鹽鐵養使訖德元載世不求宗出奉天縱聞達後為勸李懷光西水陸運奔命懷光兩次河中趨遂遷及延不奉天進縱以金帛遷御史大夫先度曰濟處大體不者急即賜衆紬事厯爭太常士卿封第遷常山右拾縣公卒諡曰忠遺擢河南尹政孫碣及進績著聞五代晉李自倫深州子光人為本州厚六世同司居功天參軍福四自高祖訓迄年户部上其自倫事下州按驗不義鄉匡聖妄勅以里為仁所和居飛里旌鳬鄉為表門閭孝宋李昉饒陽人漢乾祐宋琪進士居相宋初位久累拜求其工部尚書太能繼之者宿平興舊無國中趙普踰於昉遂命參各進知政䇿昉事俄引漢拜平唐故章事端拱事以屈已初修邊警急好弭兵詔羣臣息民為言時昉和論稱厚多之淳化恕不念中以特進司舊惡素與盧空致仕多遜善卒諡文正多遜屢譖昉於此益上後太宗言重之子宗訥及多遜事昉為習典禮厯官比解釋上由部郎中周仁美深州人開時牛耶泥寶中累以軍功族累歲為寇仁遷右班美擊破都知戍環州之至道初復叛因奏曰誘縛臣老酋於長二十戎門多八人戌外自是諸族慴郡前後征行畏嘗召體被三見十餘創今日庭下一日得對萬乘足矣留補倘或備員宿衞立馬步軍副都軍頭殿王濟饒陽人父恕後殺將並害唐時濟濟童子及第開寶中知秀州為盜所伏屍號慟謂賊曰吾父巳死吾安用鎮生州為政賊績義大之捨著拜去雍熙中監察御史𥙷龍溪主所言皆切簿於及時通咸判平初以以獻刑卒網官尚知繁請刪洪州遺定奏制以勅進又賢著備邊退佞罷䇿十五土木不條急之所費畏為避言少濟時頗深涉州經刺史好史念讀全左鎖氏一春秋性見器之剛金直鎖無殁濟撫援置其祿孤仕李宗諤宗得訥官弟由七鄉歲舉能第屬文進士恥累以官父起任居舍士人將從郊幸命大判名上疏大常時論樂邊工事以景年德二勞遷年𥙷為至翰林有不學知聲者至右宗諌諤議素大曉夫音宗律諤遂加究心審典定禮又藏著書樂萬纂以卷内獻行官淳至事與弟繼宗母諒以友孝愛聞二尤篤兄勤早接世士奉類嫂奬字孤拔後恩進禮士兼人盡皆歸卷仰之子昭工述隸官書至有尚文書集六右丞十李昭遘宗時諤楊從億子嘗幼過其家勘復出為拜鹽億鐵命為賦判官初旣成議罷億天嘉歎下職後田薦及授公館閣使錢校昭遘執鄭州以卒為性不和可易累擢不忤天物章閣能守待制知家法邢神留陸人澤父超以年十毆六死詣里吏胥求罪代當死特詔神減留死明張鳳安官平給人父事中益永樂主八年事讞促征江西漠叛北獄殁於平反陣數鳯百宣人德正初統進三士年授法刑部司坐事重盡地繫獄宜歲擢儲鳳二本百部萬侍石郎為改根南本京計户從部之上遂言留為令都尋命兼督户部尚糧書儲英廉宗謹復善辟執調法南時號京户板張部卒景鳯泰有中召孝行為性淳樸身同故人學友死蘇聘洪其好女面為斥子鳯婦教及為其鳳子屬而官養其猶然母鳯終待之如初耿寛饒陽人居成化七中世旌同劉俊深授州人青州成推化官進毎士行部御布史衣累匹遷馬河不南列僉騶事從副讞獄使其明節決愈强梗勵終慴日伏閉徴授門不通閣一與謁飲獨然好性飲酒介人酒不人能至有輒所開干本朝呉夲植安節平本人植父登恂順明治末進官深士選州庶訓吉導城士授陷編死修兩士為以國病子歸監本司植業剛訓毅諸有生守有為法侍遷侍讀時講有厯侍讀朱山人學者以妖術惑衆勢甚張本植於衆坐叱之人或為之危未幾山人伏誅始服其先見為司業時有博士羊琦性戇直同官欲去之本植持不可後琦由吏部郎出為井陘僉事迂道過其居固求一見卒不許其耿介如此杜盡誠深州人性至孝家貧傭身養親有勸之娶者不從乃先為弟娶婦又孝童六指不離左右皃姓積兩劉氏八歲而孤十歲侍母病晝夜年不少異母殁長號不止稍長語及父母輒哀泣不食王之俊深州人父母殁廬於墓側前後十六年康熙年閒旌許景淹饒陽人任廣南府經厯乾隆三十二年隨征緬甸擊賊以賊衆兵少𬒳圍景淹埋餉銀遣家人齎印信馳報大營力竭死之事聞贈鑾儀衞經厯郭承緒饒陽人由武舉效力期滿選授嘉慶五年山東守備屢立戰功洊升臺莊營參將擊賊於三岔河伏賊三面環繞刀矛相接鏖戰逾時死之事聞議卹廕雲騎尉荀士立安平人父患痿疾竭力侍奉母殁廬墓三年嘉十七年慶旌流寓隋劉焯昌亭人少好學與河間劉炫結友聞武强交津橋劉智海家素多墳籍焯與炫就之讀書經十載雖衣食不繼晏如也遂皆以儒學知名列女漢劉氏安平崔寔母有母儀淑徳博覧書傳寔為五原太守時母嘗訓以臨民之政寔之善績母有助焉南北朝魏孫道温妻趙氏安平人万俟醜奴之反圍岐州久之無在同憂遂相援趙乃率負土謂城中婦女曰州城將陷義晝夜培城竟免賊難大統六年賜夫岐州刺史贈趙安平縣君唐崔元暐母盧氏安平人嘗戒元暐曰比見親表仕者務多財以奉親而親不究所從來必出於祿廪則善如其不然何異盜乎若今不能忠清無以戴天履地宜識吾意故元暐所守以清白名李某妻王氏深州人李氏數歸歲夫死無子養嫠姑姑乃亡葬送如禮晝耕夜織能辦生事逾二十年鄉人服其義爭遣女妻往師其風訓明周傑妻崔氏深州人傑官兵科給事中病卒崔奉骸骨歸葬奠畢告其親族曰夫亡無子義當同穴遂自經合葬焉洪武中旌李茂妻高氏深州人茂病卧氏奉湯藥惟謹及死盡散家貲為喪具復搆一棺置尸側至夜沐浴更衣自經死與茂合葬洪武中詔旌其門曰貞烈傅形嘉妻岳氏深州人形嘉病革囑氏曰爾年少亟改適氏以死自誓及形嘉卒憑尸號哭遂自經洪武中旌李氏女武强人年十七正德間為流賊所刧脅以刃堅拒不從賊怒刃其腹支解而死同縣武氏女年十六亦為流賊所逼罵不已賊腰斬之翟得妻張氏安平人年二十一夫以國子生卒於京邸氏聞之自經死符應科妻田氏饒陽人早寡守志教子讀書為諸生崇禎末遇難攜甥女同投井死同縣許聨昌妻石氏亂兵入其家氏墜樓而死趙彥良妻王氏饒陽人夫死子方週嵗兄憐其少欲嫁之矢志不移躬事蠶績以奉舅姑苦節五十一年卒事聞詔旌其門夲朝張光紹妻魯氏深州人夫亡守節明崇禎末遭亂攜子女匿地窖中兵捜得之厲聲以拒身被九創絶而復甦同州劉奇妻尹氏夫死截髮毁容奉兩世孀姑撫孤成立李培陽妻高氏夫死姑將奪氏志以死自誓苦節終身孫守利妻王氏夫亡撫子及孫至九十三歲卒陳國増妻張氏深州人年二十二夫死自經以殉同州馮淳妻齊氏馮喜公妻李氏俱為强暴所逼不從被害張師寅妻王氏武强人與妾章氏早寡同心守節王年至八十七歲章年至九十五歲路武妻馬氏武强人與同縣劉玉和妻吕氏楊資妻張氏皆以拒暴不辱同被害金光斗女大姐饒陽人為强暴所逼不從遇害楊三友妻王氏安平人年十八喪夫葬畢閉户自縊張門四節婦安平人張國珍妻王氏子窪妻陸氏孫魁五妻宋氏曾孫鴻印妻李氏俱年少夫亡撫孤成立四世著節鄉里稱之同縣靳成名妻王氏早寡守節至九十餘歲卒种寅妻郭氏深州人夫殁姑老時鹽徒竊發以刃脅其姑氏涕泣求死以代賊感其孝義得免守節以終同州節婦葛箎妻劉氏馮朋妻黄氏趙克復妻王氏盧超凡氏妾劉氏孟成裔妻高氏馬之驪妻韓妻姚氏趙命禄妻杜氏郗鑑妻高氏李為英妻邪氏温妻趙氏孔高俊繼妻劉氏林天梁妻杜氏孫超凡妻王氏張翔生妻馮氏楊名立忠妻張氏趙漢高勉妻張氏妻白氏姜際奇妻王氏趙寛妾蔣蘇應第妻國氏高金盛妻張氏王氏榮貴妻于氏王氏茹重邢廷薦妻徐氏李名福妻德妻趙氏李時熙妻呉氏屈氏陳章妻劉大有妻胡氏王奉義妻蔡氏劉仲盛妻趙氏李廷栗妻田妻王氏劉鑑妻氏馬尚元妻劉張氏魏昌氏高書香妻尹劉氏氏張郗瀚士英妻孟氏趙克和妻葛氏魯子晟妻張氏趙還宗妻張氏盧彤翥妻王妻氏張可仁妻純妻武氏劉氏李徳隆妻蔡氏趙驊妻韓氏高四義妻竇氏曹俊奇妻史氏史王光麟趾妻朱氏張氏田單士培妻劉氏張學文妻高氏自强妻趙氏馮珂妻鄭氏趙德薛廷樞焯妻張妻氏田綸妻王勲妻周氏氏馬滿國錫印妻景氏趙永安妻彭氏李世魯妻李氏烈婦何滿囤妻蔡氏均乾隆年間旌張星法妾李氏武强人星法臨終以其幼無子命正室遣嫁之年李誓死不從遂引刀毁容同縣節婦郭唐妻王氏郝鳯儀妻馬氏左澐妻高氏劉成美妻張氏郭夔妻杜氏郭濬妻楊氏張恒妻多氏烈婦張大度妻盧氏劉玉河妻李氏烈女張寛姐均乾隆年間旌王宏璋妻趙氏饒陽人青年矢志不踰閨閣終身無笑容同縣王孝妻劉氏丁世爵妻楊氏孫震妻冉氏羅尚信妻高