body:
  text: 深州直隸州在直隸省治南二百八十二里東西距一百二十三里南北距一百一十五里東至河間府交河縣界六十八里西至保定府束鹿縣界五十五里南至冀州衡水縣界五十里北至保定府蠡縣界六十五里東南至冀州武邑縣治六十里南至束鹿縣治六十五里東北至河問府河間縣治一百六十里西北至定州深澤縣治七十里本州境東西距九十三里南北距九十里東至武强縣界三十八里西至束鹿縣界五十五里南至衡木縣界五十里北至安平縣界四十里東南至冀州武邑縣治六十里西南至束鹿縣治六十五里東北至饒陽縣治七十里西北至深澤縣治七十里自州治至京師六百一十二里分野天文昴畢分野大梁之次建置沿革禹貢冀州之域春秋時晉地戰國屬趙秦爲鉅鹿郡地漢置下博縣屬信都國後漢屬安平國晉因之後魏屬長樂郡隋屬信都郡開皇中分置深州在今安平縣唐武德初屬冀州六年自信都移州治此貞觀元年還舊治以下博屬深州時州治饒陽十七年深州廢縣屬冀州先天二年分置陸澤縣仍置深州以下博屬之按唐書地理志下博縣開元二年隸冀州永泰元年復屬深州舊唐志無此文元和志下博縣仍屬冀州天寶初改饒陽郡乾元初復曰深州屬河北道五代周顯德二年分置靜安軍宋太平興國七年以下博縣屬靜安軍雍熙二年軍廢以下博屬深州四年改下博曰靜安移深州來治省陸澤入之屬河北西路金曰深州屬河北東路元初屬河間府太宗十年改屬真定路明洪武初以州治靜安縣省入屬真定府本朝初因之雍正二年升為直隸州領縣三武强縣在州東五十里東西距四十二里南北距四十八里東至河間府交河縣界三十里西至州界十二里南至冀州武邑縣界八里北至饒陽縣界四十里東南至武邑縣界十二里西南至冀州衡水縣界十八里東北至河間府獻縣界三十五里西北至州界十五里漢置武隧縣屬河間國後漢曰武遂改屬安平國晉初因之後又分置武强縣俱屬武邑郡後魏皇始二年移武邑郡治武强神光二年省武强太和十八年復置北齊廢郡併武遂縣入武强隋屬信都郡唐武徳四年屬冀州貞觀元年改屬深州十七年屬冀州先天二年又屬深州開元二年復屬冀州永奉初仍屬深州唐未還屬冀州五代周又屬深州宋金因之元初於縣置東武州太宗六年州廢還屬深州十一年改屬祁州中統二年改屬晉州明因之本朝初屬正定府雍正二年改屬深州饒陽縣在州東北六十里東西距五十里南北距五十里東至河間府獻縣界三十里西至安平縣界二十里南至州界三十里北至河間府肅寕縣界二十里東南至武强縣治六十里西南至州界二十五里東北至河間府河間縣治九十里西北至保定府蠡縣治七十里本戰國趙饒邑漢置饒陽縣屬涿郡後漢屬安平國晉屬博陵國後魏屬博陵郡隋開皇三年屬定州十六年屬深州大業初改屬河間郡唐武德四年移深州治此貞觀十七年州廢屬瀛州先天二年仍屬深州五代宋金因之元改屬晉州明因之本朝初屬正定府雍正二年改屬深州安平縣在州北五十里東西距五十里南北距三十五里東至饒陽縣界十七里西至定州深澤縣界三十三里南至州界十里北至保定府蠡縣界二十五里東南至武强縣治九十里西南至保定府束鹿縣治九十里東北至河間府肅寕縣治八十里西北至保定府博野縣界二十五里漢置安平縣屬涿郡為都尉治後漢改屬安平國晉泰始初改置博陵國於此後魏為博陵郡治隋開皇初郡廢十六年於縣置深州大業初州廢屬博陵郡唐武徳四年復置深州㝷徙州治饒陽以安平屬之貞觀十七年屬定州先天二年仍屬深州五代宋金因之元太祖十九年於縣置南平州太宗七年復廢為縣中統二年改屬晉州明因之本朝初屬正定府雍正二年改屬深州形勢廣袤爽嵦周廻翕聚明金㓜孜深州八景記介瀛冀鎮定閒所謂四通五達之郊府志風俗士樂孝友敦詩書民力織作勤畎畝舊志城池深州城周八里門四濠廣二丈明景泰𥘉築正德六年增高五尺萬厯二十二年甃甎本朝康熙十年修乾隆二十年嘉慶二十五年重修武强縣城周四里有竒門四明成化十年改築本朝康熙五年修饒陽縣城周四里門三濠廣二丈明成化五年築外有䕶城隄周八里本朝順治二年修安平縣城有内外二城内城周五里有竒門四明成化中建正徳六年又於西南北三面增築土垣周八里門三謂之外城嘉靖二十六年又増築禦水土隄六里有竒本朝康熙二十五年修乾隆三十三年重修學校深州學在州治東明永樂中建本朝康熙八年修乾隆五十五年嘉慶二十五年重修入學額數十五名武强縣學在縣治東南元至正間建本朝順治康熙年間屢修入學額數十二名饒陽縣學在縣治北元元貞中建入學額數十五名安平縣學在縣治東北元至元中建本朝康熙二十六年修入學額數十八名文瑞書院在州西三里舊名博陵本朝乾隆十八年建嘉慶二十五年修易今名靜安書院在州西吕仙祠旁本朝乾隆二十一年建萃升書院在武强縣治近聖書院在饒陽縣治按舊志載恒麓書院在州城内明嘉靖間建久廢謹附記戸口原額人丁一十九萬八千六百十婦大小共二十六萬六千四百五八今滋生男十八名口計五萬五千三百九戸田賦田地二萬五千四百二十四頃四十三畝四分有竒額徵地丁正雜銀九萬五千九百七十九兩九錢四分六釐米二十六石四斗九升三合二勺山川滹沱河舊自保定府束鹿縣流逕安平縣南又東逕州北又東北逕饒陽縣北入河間府獻縣界後漢書更始二年光武自饒陽南出至滹沱河無船適遇冰合得過進至下博註滹沱河舊在饒陽南曹操因饒河故瀆決令北注新溝水所以今在饒陽縣北元和志滹沱河在安平縣南二十三里又北去饒陽縣四十五里舊志滹沱河自宋熙寕以後往往決溢金元至明決徙數見明初自束鹿縣流逕州南傳家池抵衡水縣界入永樂四年北徙東流出武强縣界十六年又改漳逕衡水縣入漳成化八年改由晉州南入寕晉泊正德十三年紫城口淤分為二股二仍南入寕晉一東由鴉兒河逕州城南既而二股併流東行由束鹿逕州界至武强小范店會清河後復自束鹿徒由州北至武强北壞獻縣隄未㡬復移逕州南東北入獻縣嘉靖三十七年又徙饒陽隆慶三年水決束鹿泛溢州界為害尤甚萬厯中又北徙田州北出饒陽縣界三十五年又南徙逕州城南四十五年復移城北天啟後漸徙而南本朝順治二年由束鹿南厯冀州入漳而州境遂無水患康熙五年復自束鹿分道決入州境清水河鴉兒河亦名丫兒河在州南二十里自束鹿縣流入下流過獻縣南合於胡慮河春冬則涸雨潦則盈舊志河在滹沱衡漳間蓋支流兩分合而為河因名丫兒又有龍治河在州東南五十里亦滹沱支流東逕武强縣南入漳胡盧河在州東南即滹沱漳淦之會流自冀州衡水縣流入州界又東北逕武邑縣北武强縣南又東北入河間府阜城縣界又名清水河本漳水故道也水經注衡漳水自桃縣又北逕鄔縣故城東又東北逕下博縣故城西逶迤東北注謂之九䋫西逕樂鄉縣故城南又東列葭水注之漳水又東北逕武邑郡南又東逕武强縣北又東北逕武隧縣故城南白馬河注之又東逕武邑縣北又東北右合張平口故溝又逕東昌縣故城北又東北左會滹沱故瀆謂之合口元和志長蘆水在下博縣南寰宇記衡漳水在武强縣南五里通鑑遼自晉漢以來屢寇河北無藩蘺之限周顯德二年言事者稱深冀之間有胡盧河横互數百里可浚之以限其奔突因詔王彦超韓通浚胡盧河築城於李宴口留兵戍之宋史河渠志淳化二年從河北轉運使請自深州新砦鎮開新河導胡盧河分為二派凡二百里抵常山以通漕運金史河渠志衡水逕深州㑹於滹沱以來獻州清州之餉州志胡盧河舊在州南四十里今自衡水逕武邑不逕州界武强縣志清河水在縣東南十八里舊逕縣東小范店入阜城縣界今由縣東北入獻縣界又縣南十三里有雁河縣東北三十里有亭子河縣西北八里有于家河下流俱入清水河古白馬河在饒陽縣南東南流入武强縣界水經注白馬河水上承滹沱東逕樂鄉縣北饒陽縣南又東南逕武邑郡北而東入衡水謂之交津口寰宇記枯白馬渠在縣南今名白馬溝趙記云魏白馬王彪所鑿故名俗謂之黄河舊志有古黄河在縣南八里闊十里兩岸皆有古隄即此古饒河在饒陽縣西南應劭曰饒陽縣在饒河之陽舊志在縣西南三十里本滹沱支河昔時北注入易水今堙滋河在饒陽縣北縣志舊自保定府祁州合沙唐二河逕縣北二十里許每夏秋衝決為患歲修隄防明嘉靖間徙流蠡縣水發時猶潰溢本朝順治二三年皆入縣境鐵燈竿河在饒陽縣北舊時滹沱之水自此決入保定蠡縣與唐滋沙諸水匯流復東入於河間府城北今堙院西口河在安平縣北上流即派水自祁州三岔口與唐滋二水合流入縣界下流入博野蠡縣界元和志安平縣有派水今名彊河西自定州義豐縣流入今謂之院西口河在縣北二十五里大陸澤在州北元和志在陸澤縣南三里即禹貢大陸澤縣因以名蓮花池在州東四十里為水聚處賈家溝在武强縣東北今理即漢祭遵壘北枕衡漳水是也九域志雍熙三年縣省四年復置改曰靜安始自陸澤移深州治此舊志明洪武初省縣入州永樂十年滹沱漳水決溢城壞因徙州呉家莊即今治也陸澤故城在州北唐置縣為深州治舊唐書地理志先天二年分饒陽鹿城界置鹿澤縣於古􅙉城宋史地理志雍熙四年廢鹿澤縣舊志陸澤城在州東北五里又見束鹿武遂故城在武强縣東北漢置武隧縣後漢改曰武遂北齊省元和志武遂故城在武强縣東北三十一里秦破趙將扈輒於武隧即此也縣志今為沙窪村武强故城有二一在今武强縣東北漢高帝六年封功臣嚴不識為武强侯後漢建武元年又封大司空王梁為武强侯皆未置縣通鑑注引宋白曰武强故城在今縣東北三十里一在今武强縣西南晉惠帝時封盧志為武强侯葢自是始爲縣後魏神光中省太和十八年復置唐屬冀州元和志縣西南至冀州一百三十里本漢武隧縣地晉於此置武强縣故城在縣西南二十五里即漢時侯邑也寰宇記西晉置縣因漢古城以名高齊移於今理其城即後魏武邑郡治道武皇始二年築九域志縣在深州東北六十里縣志舊城村在縣南五里饒陽故城有二一在今饒陽縣東本趙饒邑史記趙悼襄王六年封長安君以饒後漢書郡國志饒陽故名饒是也北齊始移治魯口城而故城廢括地志饒陽故城在今縣東北二十里一在今饒陽縣南即魯口城也晉永和六年慕容儁擊後趙至無終趙將王午鄧恒棄薊城走保魯口魏書地形志饒陽有魯口城元和志饒陽縣西南至深州三十里縣理城晉魯口城也公孫泉叛司馬宣王征之鑿滹沱入派水以運糧因築此城葢滹沱有魯沱之名因號魯口後魏道武皇始二年車駕幸魯口即此寰宇記北齊天保五年移饒陽縣於今理即後魏虜渠口置虜口鎮於此九域志縣在深州北九十里葢宋時又遷而北也舊志有故城在縣南二里亦曰故城村又有光武城在縣西南三十里一名羅城蕪蔞故城在饒陽縣東北隋開皇十六年置蕪蔞縣大業初省入饒陽唐武德四年復置貞觀元年又省元和志蕪蔞故城在饒陽縣東北三十五里隋縣也葢因東北蕪蔞亭為名安平故城今安平縣治漢置縣高帝六年封鄂千秋為侯邑自晉至北齊皆為博陵郡治唐屬深州元和志縣東南至州五十三里寰宇記城北面有臺俗謂