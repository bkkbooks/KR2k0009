蠲除澄多所省減民以忻賴又明黜陟賞罸之法表減公園地以給無業貧口禁造布絹不任衣者竇瑗遼西遼陽人天平中轉中山太守聲譽甚美為吏民所懷齊獻武王班書州郡稱瑗政績以為勸勵北齊高浟高祖第五子武定中為定州刺史境内無盜政化為當時第一陸彥師臨漳人為中山太守有惠政高叡神武弟子天保二年為定州刺史時年十七留心庶事紏擿姦非勸課農桑接禮民儁所部大治稱為良牧隋韋協杜陵人為定州刺史有能名唐李元通藍田人高祖時拜定州總管為劉黒闥所破愛其才欲以為將元通曰我當守節焉能降志於賊耶囚之故吏有餉飲饌者元通縱飲謂守者曰我善劍舞可借刀因舞劍悲歌曲終仰天太息曰大丈夫不能保所守尚何視息耶乃潰腹死李元軌太宗弟封霍王為定州刺史􅊳厥寇州元軌令開城門偃旗幟虜疑不敢入夜遁去州人李嘉運潛結賦詔窮誅支黨元軌以寇近且强人心危但殺李嘉運餘無所詰因自劾帝喜曰朕固悔之非王之明幾失定州矣孫彥高聖厯初為定州刺史􅊳厥入寇彥高死之杜中立大中時為義武軍節度使舊傜車三千乘歲輓鹽海濱民苦之中立置飛雪將數百人具舟以載自是民不勞軍食足王處存萬年人僖宗時為義武軍節度使黄巢陷長安處存號哭不俟詔分麾下兵二千間道至山南衞乘輿宋劉知信邢州人雍熙中知定州兼兵馬鈐轄押大陣右偏一日宴犒將士遼騎乗間至知信不介而出追之數十里斬獲甚衆裴濟河中人太宗時知定州遼三萬騎來攻濟逆擊於徐河斬獲甚衆後復知定州改知鎮州在鎮定凡十五年威績甚著呉元扆太原人咸平中知定州時王超王繼忠皆與遼人戰元扆䇿其必敗急發兵䕶河橋既而超等果敗遼人乗之至橋見陳兵甚盛遂引去考滿吏民詣闕䟽其善政願借留樹碑表德詔褒之歲旱吏自召巫以土龍請雨元扆曰巫本妖民安能上格惟精誠可以動天乃潔齊祈禱澍雨霑洽王德用趙州人仁宗時爲定州路都總管訓練士卒久之士殊可用遼使諜者來覘或請捕殺之徳用曰第舍之彼得實以告是服人之兵以不戰也明日大閲援枹鼓之士皆踴躍進退坐作終日不戮一人覘者歸告遼遂復議和韓琦安陽人仁宗時知定州初定州兵狃平貝州功需賞齎出怨語至欲譟城下琦聞之以爲不治且亂用軍制勒習誅其无無良者士死攻戰則賞賻其家籍其孤嫠既廪之恩威並行又做古三陣法日月訓齊之由是中山兵精勁冠河朔又賑活饑民數百萬璽書褒激鄰道視以爲準韓璹汲人知定州安喜縣爲政强力能使吏不求賄韓琦薦其才趙滋開封人仁宗時為定州路駐泊都監嘗因給軍食同列言粟不善滋叱之曰爾欲以是怒衆耶使衆有一言當先斬爾以徇韓琦聞而壯之以為真將帥材蔡抗宋城人英宗時知定州郡兵番戍室家留營多不謹抗下令悉按以法戍者感焉孫長卿揚州人知定州熙寕元年河北地震城郭倉庾皆隤長卿盡力繕補神宗知其能轉兵部侍郎再留任長卿性廉潔當得園利八十萬悉歸之公滕元發東陽人神宗時知定州初入郡言新法之害且曰臣始以意度其不可耳今為郡乃親見之歳旱求言又䟽奏新法害民但得一手詔有不便者悉罷之則民心悦而天意解矣吕公著夀州人元豐五年除資政殿學士定州路安撫使及至定具謝表曰進不敢希功而生事退不敢弛備以曠官傳誦者以為摭實王巖叟清平人神宗時知安喜縣有法吏罷居鄉里導人為訟巖叟捕撻於市衆皆竦然定州守吕公著歎曰此古良吏也蘇軾眉山人元祐八年知定州時軍政壞弛諸衛卒驕惰不教軍校𧖟食其廩賜前守不敢誰何軾取貪汙者配隸遠惡繕修營房禁止飲博軍中衣食稍足乃部勒戰法衆皆畏服㑹春大閲將吏久廢上下之分軾命舉舊典將吏戎服執事副總管王光祖自謂老將恥之稱疾不至軾召書吏使為奏光祖懼而出訖事無一慢者定人言自韓琦去後不見此禮至今矣黄實陳州人哲宗時知定州朝㫖籍民兵旁郡因縁擾困實懷檄不下而畫利害請之事得寢管師仁龍泉人徽宗時知定州時承平百餘年邊備不整遼横使再至為西人請侵疆朝廷詔師仁設備至則下命增陴浚隍繕葺甲胄遼使懼不知所裁師仁預為計度一日而舉衆十萬轉盻迄成外間無知者日與賓客燕集以示閒暇使敵不疑帝手詔奨激陳遘永州人欽宗時知中山府金兵再至遘冐圍入城堅壁拒守京都䧟割兩河求和遘弟適至中山臨城諭㫖遘遥語之曰吾兄弟平居以名義自處豈當賣國家乎適泣曰兄但盡力勿以弟為念遘呼總管使盡括城中兵出擊總管辭遂斬以殉又呼歩將沙振往振固辭遘固遣之振怒且懼衷刃以入害遘於堂及其子錫并僕妾十七人振出帳下卒執而捽裂之金丁暐仁宛平人大定三年除定武軍節度副使而節度使同知皆闕暐仁為政無留訟劉仲洙宛平人大定中調深澤令縣近滹沱河時秋成水忽暴溢極力䕶塞遂無害有盜夜發居民震驚仲洙率縣卒生執其一餘衆遂潰旦明掩捕皆獲㝷以廉能進官一階元王善藁城人知中山府屬縣新樂地居衝要迎送供給倍於他縣皆取於民善均其勞逸所徴或未給輒出家資代輸民徳之又放家僮五百人為民民咸懷其恩蕭拜住遼石抺斯氏成宗時知中山府以憂去官屬仁宗過中山有同官譖於近侍曰知州去官幝迎候煩勞耳帝頷之適行田野間見老嫗問之曰府中官孰賢嫗對曰有蕭知府餘不知也復過神祠見數老人焚香羅拜遣問之曰汝軰何所禱咸對曰蕭知府奔喪還欲其速來是以禱也帝意遂釋石抹斯氏舊作石抺氏今改正明王源龍巖人永樂中知深澤縣修學舍築長隄勸民及時嫁娶革其爭財之俗以上書言事忤㫖下吏㑹赦復官奏免逋負歳饑輒發栗賑救坐是被逮民爭先輸納即贖還高聞宣德時深澤典史潔已惠民當遷民乞留即擢知縣事王約寕鄉人正統間知定州持身端謹涖事公勤衛拉特入寇約多方捍禦境賴以安衞拉特舊作瓦刺今改正王詔厯城人嘉靖中知定州政化大行有蜀生道其境遺槖裝百金訴於詔詔曰汝第往當有為汝守者往則果有一人守之生叩之守者曰人有棄子於道者我侯為流涕活之我忍攫金使君流落於侯之境乎卒還之民貧不能市牛詔倣武侯木牛法用以耕力得半牛周寅金鄉人嘉靖中知曲陽縣縣北水漲為民患築長隄二百餘丈以鎮之民賴以安唐鋐睢州人崇禎中知定州大兵破城不屈死贈布政使司右參議本朝符渭英金壇人順治中授深澤知縣水旱後民多流亡渭英招之復業居五年民親之如父母許來音龍溪人順治中授深澤知縣時令民間牧養官馬又歲徵狐皮民苦之來音請罷養馬以銀代狐皮縣南北滹沱澬河二水歳漂溢來音相度修築水不為災人物漢觟陽鴻中山人以孟氏易教授有名稱永平中為少府張鈞中山人靈帝時為郎中張讓等專恣張角作亂鈞上書言斬十常侍頭以謝百姓可不須師旅大寇自消帝以鈞章示讓等皆免冠徒跣頓首詔視事如故鈞復重上如前章不報御史承讓等㫖遂誣奏鈞學黄巾道收掠死獄中晉張忠中山人永嘉之亂隱於泰山恬靜寡慾清虚服氣年在期頤而視聽無爽符堅徴至長安賜以冠衣不受堅欲官之辭歸行達華山而死謚安道先生南北朝魏李先盧奴人太祖時為尚書右中兵郎再遷博士定州大中正太祖問天下何者最善可以益人之神智先曰惟有經書三皇五帝治化之典可以𥙷王者神智又問朕欲集天下書籍如何可備對曰主之所好集亦不難於是頒制天下經籍稍集太宗即位拜安都將軍夀春侯卒謚文懿張吾貴中山人舉太學博士從酈銓受禮牛天祐受易祐麤為開發而已吾貴覽讀一遍便即别構戸牖聚徒千數而不講傳生徒竊議之吾貴乃詣劉蘭蘭為講左氏三旬之中兼讀杜預服䖍注䟽櫽括兩家異同悉舉諸生後集便為講之義例無窮皆多新異蘭仍伏聽學者益竒之不仕而終齊馮偉安喜人少聰敏多所通解尤明禮傳閉門不出將三十年不問生産不交賓客專精殫思無所不通趙郡王出鎮定州命駕致請甚見禮重將舉充秀才固辭不就歲餘請還贈遺甚厚一無所納及還𧖟而衣耕而食簞食瓢飲不改其樂以夀終隋杜臺卿曲陽人父弻膠州刺史臺卿少好學博覧書記仕齊厯官中書黄門侍郎及周武帝平齊歸鄉里以禮記春秋講授弟子開皇𥘉𬒳徴入朝嘗採月令觸類而廣之為書成玉燭寶典十二卷奏之拜著作郎致仕有集十五卷齊記二十卷兄子公瞻好學有家風李文博博陵人性貞介鯁直開皇中直秘書内省典校羣籍守道居貧清操愈厲不妄通賓客恒以禮法自處儕軰莫不敬憚焉文博本為經學後讀史書於諸子及論尤所該洽性長議論善屬文為薛道衡所知著治道集十卷唐支叔才定州人隋末荒饉夜丐食野中還進母為賊所執欲殺之告以誠賊憫其孝為之解縛母病癰叔才吮瘡注藥及卒廬於墓有白鵲止廬旁高宗時表其家崔仁師安喜人武徳初擢制舉貞觀初為殿中侍御史時青州有男子謀逆有司捕支黨填獄詔仁師按覆坐止魁惡十餘人他悉原縱大理少卿孫伏伽謂原雪者衆慮有變仁師曰豈有知枉不申為身謀者使吾以一介易十囚命固願也及敕使覆訊舉無異辭遷度支郎中嘗口陳移用費數千名太宗詔黄門侍郎杜正倫持簿使仁師對唱無一謬帝竒之累遷中書侍郎參知機務崔琯博陵人父頲官同州刺史生八子皆有才世以擬漢荀氏八龍琯舉進士賢良方正皆高第太和初遷工部侍郎京兆尹宋申錫為䜛所危宦豎切齒時罕敢辯者琯固請出獄付外天下重其賢終山南西道節度使弟珙為人有威重精吏治官至中書侍郎進尚書左僕射從子澹遠澹舉止秀峙時謂玉而冠者當時推名德者為之首官吏部侍郎遠有文而風致整峻世目為飣座棃言座所珍也官至中書侍郎劉禹錫中山人擢進士第登博學宏詞科工文章由監察御史擢屯田員外郎以附王叔文坐貶久之為主客郎中裴度雅知禹錫薦為集賢直學士出為蘇州刺史遷太子賓客加檢校禮部尚書素善詩晚節猶精白居易嘗推為詩豪宋杜審瓊安喜人昭憲皇太后昆仲五人世居常山以積善聞長兄審琦仕後唐為義軍指揮使審瓊乾徳中累官點檢侍衞歩軍司事性醇質在公畏慎侍衞勤謹徼巡京邑里閈清靜卒謚恭僖弟審肇厯官濰州刺史謚温肅審進累加開封儀同三司鎮陜二十餘年勸農敦本民庶便之雖居位節制無驕矜之色人服其醇厚卒謚恭惠劉斌定州人父加友為從弟志元所殺景德中斌挾刃伺志元於道刺之不中詣吏自陳州具獄上請詔釋斌罪高賦中山人舉進士厯知衢州州民世蓄蠱毒害人賦悉擒治蠱患遂絶徙知唐州增闢田三萬餘頃兩州生為立祠擢提點河南刑獄又判太常寺進集賢院學士在朝多所建明以通議大夫致仕金石皋定州人𥙷郡吏廉潔自持隨魯王伸披攻青州以皋言百姓安堵伸披指其座謂皋曰汝子孫必有居此座者隨至定州唐縣人王某謀為亂書其縣人姓名於籍無慮數千人其黨持籍詣州發之皋主鞫治是時冬月皋抱籍上廳事佯為頓仆覆其籍爐火中盡焚之不可復得其姓名止坐為首者餘皆得釋伸披改見永平府山川石琚皋之子沈厚好學中進士第一大定中累遷吏部尚書銓法詳明拜尚書左丞世宗將行郊祀議配享琚謂當以太祖配上從其言進平章政事封莘國公拜右丞相致仕世宗謂宰臣知人最為難事帷石琚為相時往往舉能其官大定末世宗欲立元妃為后以問琚琚曰元妃之立本無異詞如東宫何世宗又問琚曰元妃自有子元妃立東宮搖矣世宗乃止卒謚文憲劉煥中山人宋末兵起城中久乏食煥尚幼煮糠覈而食之自飲其清者以醲厚者供其母鄉里異之稍長讀書不怠登天徳元年進士為中都市令以廉升京兆推官累遷同知北京留守事世宗幸上京所過州郡大發民夫治道煥所部惟平治端好而己上嘉其意遷遼東路轉運使卒元田忠良中山人好學通儒家雜家言劉秉忠薦於世祖召見謂侍臣曰是雖以陰陽家進必將為國用令試星厯遁甲諸書官之司天帝問用兵江南困於襄樊累年不決奈何對曰在酉年矣十一年問南征將士能渡江否奏曰明年正月當奏㨗二十年帝將征日本召忠良擇日出師忠良曰僻陋海隅何足勞天戈不聽後果無功延祐中厯官光祿大夫卒贈太師謚忠獻明王達定州人性至孝父喪廬墓盜取其衣去越日復還之曰君孝子吾不忍也憲宗時賜旌王懷義深澤人善射父世美為山東萊陽縣丞正徳六年流賊攻城懷義隨父守北門射殺賊首十餘人餘賊復攻東門又與戰甚力翼日城䧟力戰脱父於難遂死之年二十五張鎬定州人嘉靖進士累官按察副使備兵岢嵐轉右參政經理營田剪荆棘冒霜雪為士卒先窮邊曠土皆成沃壤又於偏頭關諸要害修築垣臺三百餘里戰守之具皆備以功升寕夏巡撫疏河渠資灌漑以實軍儲冬設冰牆以待敵敵至輒失利去本朝郝浴定州人順治進士授御史廵按四川時劉文秀等據滇黔吳三桂領兵進討無功川東西皆失守三桂將退走漢中浴一晝夜七馳書趣之還為指授方畧與賊戰遂大破之因條上安蜀諸疏且密陳三桂跋扈狀三桂深銜之摭浴疏中語誣以冒功謫戍奉天三桂反起浴故官巡鹽兩淮釐剔㝛弊商民稱便擢副都御史巡撫廣西粤經兵革後閭閻凋敝浴專意撫綏甚得民心以勞瘁卒於官子林康熙進士累官禮部侍郎加尚書致仕亦有賢聲宋時化深澤生員有孝行父年九十餘殁時化已老居喪哀號盡禮有羣烏翔集墓前不去年百歲乃卒雍正年間旌谷毓玿曲陽人事父母以孝稱父殁廬墓三年乾隆年間旌韓景祥定州人由行伍拔補倒馬關外委嘉慶五年隨勦陜西賊匪於上津堡擊賊陣亡事聞議卹廕雲騎尉列女唐崔琯祖母唐氏事姑長孫氏至孝長孫年高無齒氏每旦櫛縰笄拜階下升堂乳姑長孫不粒食數年一日病召長幼言吾無以報吾婦願後子孫皆如婦孝世謂崔氏昌大有所本云明何毅妻施氏定州人毅卒水漿不入口欲自殺姑勸阻之遂奉舅姑以終撫子成立詔旌之施安妻王氏定州人年十五歸安事舅姑至孝安卒虔奉舅姑撫孤成立守節四十餘年詔旌之楊家麟繼妻周氏曲陽人家麟殁氏年十六誓以身殉不得閒遂朝夕泣血哀毁成疾不能起令女奴扶掖至柩前觸柩死李英妻丁氏定州人夫殁守志事姑盡孝厯久不渝楊崙妻楊氏曲陽人崙早卒事舅姑彌謹崇禎末偕其媳安氏避兵山中兵至楊懼不免自投崖下而死安亦隨墜崖死韓氏女曲陽人年十四未字崇禎末兵至欲犯之堅拒不從遂被殺郝生妻李氏定州人歸同里郝生崇禎末州被兵生將奉親避山東留李與二子居其母家生將發李哭指庭中井語曰若有變即潔身此中以衣袂為識旁有白線一行者即我也比城破藏二子他所入井死兵退出其尸顔色如生本朝陳尚貴女三姐定州人與同州王七妻康氏皆以不辱强暴死康熙年間旌楊昇妻甄氏定州人夫亡守節夫叔屢欲嫁之不從陵虐百端不改其操課子讀書為諸生雍正年間旌趙元吉妻宋氏深澤人夫亡守節遇劫盜入室氏義不受辱以刀刺喉死同縣烈婦李通妻呉氏遇强不從忿恚投井死均雍正年間旌趙氏女春姐定州人為强暴所逼不受辱死同州烈女温亮山女二姐彭氏女來姐王書祖烈婦温氏支比哥妻周氏耿運聖妻劉氏唐春賢妻潘氏龎嘉文妻劉氏李靈妻王氏節婦何君美妻高氏鄭樹績妻劉氏劉緯妻郝氏劉文章妻張氏高大士妻田氏王維藩妻馬氏韓子愚妻高氏王玉妻李氏邢士宇妻趙氏竇尚義妻劉氏孫彥妻夏氏田拔萃妻田氏均乾隆年間旌李金錫妻賈氏深澤人夫亡殮畢自縊以殉同縣節婦田飛妻韓氏張進修妻毛氏李景泌妻鄭氏李嗣晟妻黎氏劉怡妻紀氏陳起舞妻袁氏烈女譚錫姐均乾隆年間旌杜昌嗣妻荀氏曲陽人夫殁氏奉舅姑以孝聞撫孤成立守節六十一年同縣節婦高連妻李氏張高才妻劉氏劉秉正妻劉氏晉倫妻陳氏王朝棟妻閻氏夏鼎著妻劉氏趙徳望妻陳氏趙宏業妻韓氏張名正妻劉氏荀佩妻張氏楊名儒妻葛氏冉起榮妻唐氏李艾妻支氏焦嗣宗妻王氏彭承家妻楊氏高白山妻解氏李士英妻侯氏李起美妻楊氏楊偉任妻郝氏張賜妻劉氏劉尚忠妻楊氏王琫妻范氏楊更朝妻石氏楊有順妻孟氏郭建畿妻王氏郭鴻聲妻孟氏李芳世妻張氏甄守智妻田氏甄守仁妻王氏陳述魁妻侯氏劉清獻妻董氏楊茂妻楊氏張連妻郭氏王自好妻張氏田科第妻蔚氏田霆妻劉氏烈婦商保存妻焦氏李貴庭妻楊氏劉世明妻李氏靳富貴妻趙氏烈女白銀姐均乾隆年間旌陳九成妻鹿氏定州人夫亡守節同縣節婦王連妻楊氏王緒妻王氏白雲嵐妻楊氏烈婦楊治家妻劉氏韓二妻呉氏均嘉慶年間旌劉文明妻王氏深澤人守正捐軀同縣節婦趙劉氏均嘉慶年間旌石邦文妻王氏曲陽人守正捐軀同縣烈婦王懷敏妻劉氏陳見漋妻李氏馮義幅妻孫氏劉占金妻葛氏陳李氏白楊氏烈女張煥皃均嘉慶年間旌仙釋南北朝魏李皎先少子師事冠謙之遂服氣絶粒隱於恒山年九十餘顔如少童一旦沐浴冠帯家人異之俄而坐卒道士咸稱其得尸解仙道土産棃寰宇記定州土產槾棃甆器寰宇記定州土産州志窰器珍於天下江南好事者往往蓄之索諸定蔑如也按舊志載唐書地理志定州土貢羅綢細綾瑞綾兩窠綾獨窠綾三包綾熟線綾宋書地理志中山府貢大花綾謹附記前提調官臣沈兆澐恭纂輯提調官臣王廣蔭恭覆輯校對官臣賀式韓恭校校對官臣宗稷辰恭覆校
