body:
  text: 山西省在京師西南一千二百里東西距八百八十里南北距二千一百五十里東至直隸正定府升陘縣界三百七十五里西至陜西綏德州吳堡縣界五百五里南至河南陜州界一千二十里北至殺虎口外四子部落喀爾喀右翼毛明安各蒙古界一千一百三十里東南至河南衛輝府輝縣界八百五十里西南至陜西同州府朝邑縣界一千一百五里東北至直隸宣化府懷安絲界六百七十里西北至陜西榆林府府谷縣界八百八十里分野天文昴畢及觜觿參分野大梁實沈之次漢書地理志趙地昴畢之分又太原定襄雲中上黨趙分也魏地觜觿參之分唐書地理走河中絳晉慈隰石太原汾欣潞澤沁遼為實沈分代雲朔嵐憲為大梁分建置沿革古冀州之域虞分置并州夏仍為冀州周曰并州周禮職方氏正北曰并州成王封叔虞為唐國後改晉國戰國屬趙兼屬韓魏今平陽蒲州二府絳解吉隰四州為魏地潞安澤州二府遼沁二州為韓地秦置太原上黨河東雲中雁門代郡漢元封中置并州領太原上黨西河雲中定襄雁門六郡河東郡屬司隸代郡屬幽州後漢因之刺史始治晉陽建安十八年省并州入冀州二十年省雲中定襄二郡改置新興郡三國魏黃初元年復置并州晉因之增置樂平郡惠帝改新興郡為晉昌郡晉書地理志魏并州自陘嶺以北皆棄之至晉因而不改永嘉後陷按永興元年劉淵據離石稱漢永嘉三年遷都平陽以雍州刺史鎮平陽幽州刺史鎮離石劉聰改置左右司隸大興後地入石勒太和五年入於苻堅以并州刺史鎮晉陽分置雍州治蒲坂太元十一年地屬慕容永十九年慕容垂克永獲其所統新舊八郡以并州刺史鎮晉陽雍州刺史鎮長子二十一年入於姚興以并冀二州牧鎮蒲坂後皆入於元魏後魏皇始元年仍置并州治晉陽天興元年遷都平城置司州又分置秦東雍朔肆汾五州神麚元年置雍州治蒲坂延和元年改秦州太平真君四年置東雍州治正平郡置朔州治盛樂七年置肆州治九原太和十二年置汾州治蒲子城太和十八年遷洛改司州為恆州又分置朔晉顯蔚建五州正光五年别置朔州治懷朔鎮孝昌中置唐州治平陽建義元年改為晉州永安二年置顯州寄治汾州六璧置蔚州寄治并州塢縣三年置建州治高都城東魏又增置東雍南汾廓武四州北齊於并州置省後周建德五年平齊置并州總管府隋開皇二年罷總管置河北道行臺三年罷郡置州九年廢行臺復置并州總管府大業元年府罷三年改諸州為郡屬冀州刺史隋書地理志太原上黨長平河東絳文城臨汾龍泉西河離石雁門樓煩馬邑定襄等郡屬冀州唐武德元年復改諸郡為州置并州總管府又分置蒲州潞州二總管府開元中分置河東道唐書地理志河東道治河中府領太原府晉絳慈隰汾沁遼嵐憲石欣代雲朔蔚潞澤十七州天寶以後分置河東河中澤潞三節度使唐書方鎮表開元八年置天兵軍節度使治太原十八年改為河東節度使至德二載又置澤潞節度使冶潞州河中節度使治河中五代晉天福初割蔚朔雲應等州入契丹周廣順初劉崇據太原是為北漢并汾遼沁石欣代嵐憲等州皆入焉宋太平興國四年平北漢仍為河東路宋史地理志河東路領太原隆德平陽三府絳澤代欣汾遼憲嵐石隰慈麟應豐十四州慶祚威勝平定岢嵐寧化火山保德晉寧八軍其雲州屬遼遼重熙十三年建為西京道遼史地理志西京道領蔚應朔武宏德豐雲內東勝等州宋宣和四年來歸别號雲中府路七年兩路俱入於金為河東西京兩路天會六年又分河東為南北路金史地理志河東南路領平陽河中二府隰吉絳解澤潞遼沁八州河東北路領太原府晉欣汾石葭代隩嵐管平定寧化岢嵐保德十三州西京路領大同府豐宏淨桓撫朔武應蔚雲內寧逺東勝十二州元置河東山西道宣慰使司及肅政廉訪司統屬中書省元史地理志晉寧路領河中府絳潞澤解霍隰沁遼吉九州冀寧路領汾石欣臨平定保德崞管代臺興堅嵐盂十四州大同路領宏應朔武豐渾源雲內東勝八州明洪武元年置山西行中書省於太原九年改為山西等處承宣布政使司初領太原大同平陽三府遼沁潞澤汾五州嘉靖八年升潞州為潞安府萬厯二十三年升汾州為府本朝因之為山西省雍正元年於歸化城增設同知二年以舊隸太原府平定欣代保德四州舊隸平陽府蒲解絳吉隰五州俱升為置隸州置朔平寧武二府六年升蒲澤二州俱為府乾隆四年增置綏逺城同知二十五年又以歸綏所屬地增置歸化城托克托城清水河薩拉齊和林格爾五通判與歸綏二廳並屬歸綏道二十九年裁歸化城通判三十七年改吉州屬平陽府升霍州為直隸州今領府九直隸州十廳六太原府平陽府蒲州府潞安府汾州府澤州府大同府寧武府朔平府平定直隸州欣州直隸州代州直隸州保德直隸州霍州直隸州解州直隸州絳州直隸州隰州直隸州沁州直隸州遼州直隸州歸化城廳綏逺城廳托克托城廳清水河廳薩拉齊廳和林格爾廳形勢東據太行自澤潞以北達於大同東境皆太行山中分河東河北實為天下之脊南通懷孟自河南懷慶府孟縣而南西指洛陽東指汴梁為中原要膂西薄於河自陜西榆林東北折而南經廢東勝州又南經大同太原汾州平陽四府至蒲州府西南折而東入河南懷慶府界蓋山西西南二面之險北邊沙漠自大同北境舊去沙漠七百餘里分列戍守為防禦要地其名山則有雷首山一名中條山在蒲州府東南十五里底柱山在平陽府平陸縣東南五十里恆山在大同府渾源州南二十里即北嶽霍山在平陽府霍州東南三十里亦名太嶽句注山一名西陘山又名雁門山在代州西北二十五里五臺山在代州五臺縣東北一百四十里北接大同府界延亘五百