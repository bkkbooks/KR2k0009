賊難以力制常嚴烽堠明購賞以結寇心芳將隋昱遂謀脅芳降伋芳乃亡入胸奴郭丹穰人建武中遷并州牧有清平稱周舉汝陽人順帝時為并州刺史太原舊俗以介子推焚骸有龍忌之禁至其亡月輒一月寒食莫敢煙㸑歲多死者舉到州作弔書置子推廟宣示愚民使還溫食於是衆惑稍解風俗頗革趙岐長陵人延熹元年為并州刺史有守邊策三國魏梁習柘人以别部司馬領并州刺史時胡狄在界吏民亡叛入其部落共為寇害習誘諭招納稍薦舉其豪右發諸丁強以為義從勇力吏民去後稍移其家前後送鄴凡數萬口其不從命者興兵致討斬首千數降附者萬計單于恭順名王稽顙部曲服事供職同於編户邊境肅清百姓布野勤勸農桑令行禁止貢達名士咸顯於世在州二十餘年而居處貧窮無方面珍物陳泰許昌人正始中為并州刺史加振威將軍使持節護胸奴中郎將懷桑夷民甚有威惠京邑貴人多寄寶貨因泰市婢泰皆挂之於壁不發其封及徵為尚書悉以還之晉魯芝郿人宣帝時為使持節領并州刺史綏輯有方劉琨魏昌人永嘉元年為并州刺史加振威將軍時并土飢荒百姓無復人色琨至翦除荆棘收葬枯骸造府朝建市獄寇盜互來掩襲恆以城門為戰場百姓負楯而耕屬鞬而耨琨撫循勞來甚得物情劉淵時在離石相去三百里琨密遣離間其部降者萬餘淵甚懼遂徙居蒲子城隋李雄高邑人後入長安晉王廣鎮并州以雄為河北行臺兵部尚書當官正直侃然有不可犯之色王甚敬憚吏民稱焉唐李傑滏陽人神龍中為河東巡察黜陟使課最諸道郭子儀鄭人廣德元年兼河東副元帥河中節度使鎮河中李光弼柳城人天寶中為河東節度使拔常山趙郡敗安慶緒史思明之兵於太原王忠嗣鄭人天寶初為河東節度使持重安邊不生事訓練士馬隨缺繕補軍中士氣盛日夜思戰忠嗣縱詭間伺虜隙時出奇兵襲敵所向無不克每出召屬長付以兵使授士卒雖弓矢亦志姓名其上軍還遺弦亡鏃皆按名第罪以是部下人自勸器甲充牣據要險築城堡斥地甚逺王思禮高麗人入居營州乾元中為河東節度副大使持法嚴明士不敢犯器甲精良儲粟至百萬斛馬燧郟城人大厯中為河東節度使時太原兵力衰單燧募得數千人補騎士教之戰數月悉成精卒造器用皆完鋭居一年闢廣場肄兵得三萬威震北方德宗初年北邊數有警燧念晉陽王業所基宜固險以示敵乃引晉水架汾而屬之城瀦為東隍省守陴萬人又釃汾環城樹以固隄李懷光反河中詔燧為河東奉誠軍行營副元帥與渾瑊駱元光合討之時天下蝗兵乏食中朝臣請宥懷光燧入朝為天子自言之且得三十日糧足平河中許之不閲月河中平渾瑊本鐵勒九姓之渾部世為臯蘭都督朱泚平授河中絳慈隰節度使與馬燧同討李懷光懷光平還屯河中貞元後天子恐藩侯生事稍桀驁則姑息之惟瑊奏論不盡從可輒私喜曰上不疑我故治蒲十六年常持軍猜間不能入裴諝聞喜人代宗時為河東租庸鹽鐡使時關輔旱入計帝召至便殿問榷酤利嵗出納幾何諝久不對帝問之諝曰臣自河東來涉三百里農人愁嘆穀粟未種誠謂陛下先訪疾苦而乃責臣以利故未敢對帝曰微公言朕不聞此李自良泗水人貞元中為河東節度使居治九年舉不愆法簡儉易循民不知有軍上下諧附嚴綬華陰人憲宗時為河東節度使選兵遣大將李光顔助平夏州楊惠琳及蜀劉闢在鎮九年尚寬惠治稱著聞士馬孳息嘗大閲旗幟周七十里回鶻梅録將軍在會聞金鼓震伏吕元膺東平人元和中為河中節度使時方鎮多姑息獨元膺秉正自持監軍及中人往來者無不嚴憚郗士美金鄉人憲宗時充昭義節度使昭義自李抱真以來皆武臣私厨月費米千石羊千首酒數千斛潞人困甚士美悉去之出廩錢市物自給又盧從史時日具三百人膳以餉牙兵士美亦罷之討王承宗大將王獻為前鋒恣橫逗撓士美斬以徇親鼓之遂大破賊時諸鎮兵繞賊多玩寇犯法獨士美兵鋭整最先有功辛祕隴西人憲宗時拜昭義軍節度使時潞人雕耗祕至則約出入嗇用度比四年儲錢十七萬緡糧七十萬斛器械堅良復為完鎮裴度元和末為河東節度使李載義自稱恆山愍王之後文宗時為河東節度使回鶻使者嵗入朝所過暴慢吏不敢呵禁但嚴兵自守虜狃習益謷悍載義召大酋戒之因悉罷所防兵酋嚴憚之訖無犯者柳公綽華原人太和四年為河東節度使遭歲惡撙節用度輟宴飲衣食與士卒均北虜遣梅録將軍李暢以馬萬匹來市所過皆厚勞飭兵以防襲奪至太原公綽獨使牙將單騎勞問待以至意闢牙門令譯官引謁宴不加常暢德之出涕徐驅道中不妄馳獵陘北有沙陀部勇武喜鬬為九姓六州所長公綽召其酋朱邪執宜治廢柵十一募兵三千留屯塞上其妻母來太原者令夫人飲食問遺之沙陀感恩故悉力保障劉沔彭城人會昌初為河東節度使兼招撫回鶻進屯雁門關回鶻冦雲州沔擊之斬七禆將敗其衆迎太和公主還詔録李靖平頡利事賜之李固言其先趙人會昌初領河中節度使蒲津河水歲壞梁吏撤笮用舟邀乞行人固言至悉除之帝伐回鶻詔方鎮獻財助軍上疏固諫石雄徐州人會昌中由晉絳行營節度使徙河中時劉稹為雄所破勢危蹙其大將郭誼密獻款請斬稹首自歸衆疑其詐雄大言曰稹之叛誼為主謀今欲殺稹乃誼自謀又何疑以七千人徑薄潞受誼降焉畢誠偃師人宣宗時為河東節度使河東尤近胡復修杷頭七十烽謹候虜冦不敢入盧簡求蒲人為河東節度使太原統吐渾契苾沙陀三部難馴制他帥或與詛盟質子弟然冦略不為止簡求歸所質開示至誠虜憚其恩信不敢亂崔彥昭清河人懿宗時為河東節度使先是沙陀諸部多犯法彥昭撫循有威惠三年境內大治鄭從讜榮陽人僖宗時為河東節度使兼行營招討使詔自擇參佐皆一時之選時承張彥球所部軍亂剽冦日旁午從讜既視事姦無廋情乃推捕反賊誅其首惡釋彥球不問而付以兵得其死力下皆惕伏孫揆武水人昭宗討李克用授揆昭義軍節度使以本道兵會戰克用伏兵刁黃嶺執揆厚禮而將用之揆大罵不屈克用怒使以鋸解之至死詈聲不絶五代唐李嗣昭太谷人天祐三年為昭義軍節度使梁遣李思安將兵十萬攻潞築夾城以圍之又遣人招降嗣昭嗣昭斬其使者閉門拒守踰年莊宗始攻破夾城嗣昭完緝兵民撫綏甚有恩意宋李允則盂人太平興國中使河東路決繫囚原逋欠李若拙萬年人同勾當河東轉運兼雲應等八州事嘗詣闕言邊事太宗嘉之索湘鹽山人端拱中為河東轉運使王超等率師趨烏白池抵無定河水涸軍渴乏湘輦大鍬千枝至令鑿井衆賴以濟姚鉉廬州合肥人至道中為河東轉運使上言所在官吏有經畫利濟事可長久者歲終書厯受代日録付新官俾之遵守若事有灼然非便聽上聞俟報改正詔從之鄭文寶景德初契丹入邊徙文寶為河東轉運使文寶安輯所部募鄉兵張邊備又領番漢兵赴河北手詔褒諭宋搏掖人真宗時為河東轉運使上言大通監冶鐵盈積可備諸州數十年鼓鑄願罷採以紓民又請糾諸州丁壯為兵以增戎備在任凡十一年河東接西北境邊事未息屯帥甚廣博經制漕運以幹治稱陳堯佐閬中人真宗時為河東路轉運使地寒民貧仰石炭為生奏除其稅又減澤州大廣冶鐵課數十萬孫沖平棘人真宗時為河東轉運使會汾州軍譟捽守佐堂下劫之城中戒備沖至州命弛備置酒張樂推首惡十六人斬之遂定崔嶧長安人為河東轉運使會更錢法潞州民大擾推其首惡誅之人心遂定楊偕坊州人仁宗時為河東都轉運使召選三路民為兵偕言方今兵不為少苟多而不練則其勢易敗又困國而難供時論者惟務多兵而偕論常如此杜衍山陰人提點河東路刑獄按行潞州折冤獄髙繼升知石州人告繼升連蕃族謀變逮捕繫冶久不決衍辨其誣抵告者罪寧化軍守將鞫人死罪不以實衍覆正之文彥博介休人仁宗時以直史館為河東轉運副使鄜州餉道回逺銀城河外有唐時故道廢而弗治彥博父洎為轉運使日將復之未及而卒彥博嗣成父志益儲粟元昊來寇圍城十日知有備乃解去遷天章閣待制都轉運使熙寧九年拜司空河東節度使包拯合肥人為河東轉運使耿介自持常經理鹺政以通商販軍國賴焉范仲淹吳縣人仁宗時邊陲有警以仲淹為河東陜西宣撫使賜黃金百兩悉分遺邊將歐陽修廬陵人仁宗時奉使河東言欣代岢嵐多禁地廢田願令民得耕之歲得粟數百萬斛凡河東賦斂過重民所不堪者奏罷十數事何郯成都人仁宗時為河東都轉運使故相梁適帥太原病不能視事內臣蘇安靜鈐轄兵馬怙寵不法皆劾奏之任顓夀光人仁宗時為河東轉運使每行部必擇僚佐之賢者一人與俱凡事必與議未嘗以胥吏自隨人安其政周沆益都人仁宗時為河東轉運使民盜鑄鐵錢法不能禁沆故抑錢價鑄者以無利自息王舉元鎮定人仁宗時為河東轉運使夏人來爭屈野地舉元從數騎渡河設幕與之議示以赤心夏人感服趙滋開封人管勾河東經略司公事建言代州寧化軍有地萬頃皆肥美可募人田作教戰射為堡寨人以為利程師孟吳人提點河東路刑獄晉多土山旁接川谷春夏大雨水蜀如黃河可溉灌師孟開渠築堰淤良田萬八千頃裒其事為水利圖經頒之州縣閻詢天興人為河東轉運使言三路土兵疲老者聽其族以強壯者代從之張景憲河南人熙寧中為河東都轉運使議者欲分河東為兩路景憲言本道地肥磽相雜州縣貧富亦異正宜有無相通分之不便議遂寢劉庠彭城人神宗時除河東轉運使庠計一路之産鐵利為饒請復舊冶鼓鑄通隰州鹽􅈨博易以濟用又請募民入粟塞下豫為足食計後以龍圖閣直學士知太原府募民子弟剽鋭工技擊者籍為勇敢又倣漢謫戍法貰流以下罪徙實河外邊備修飭陳安石河陽人熙寧中韓絳鎮太原議行鹽法與鹽司多不合乃以安石為河東都轉運使議始定謂其僚曰興事當有漸急則擾乃出鹽付民而卑之券使隨所得貿易鬻畢仍歸劵私販為減黃廉分寧人提點河東刑獄遼人求代北地廉言分水畫境失中國險固其後遼人果略取兩不耕地下臨雁門父老以為恨王靖莘縣人提點河東刑獄長子縣賊殺人捕治十數輩不得實皆釋去靖閲其牘曰此真賊也教吏曲折訊囚果服罪畢仲遊鄭人哲宗時提點河東路刑獄太原銅器名天下獨不市一物懼人以為矯且行買二茶七時韓縝鎮太原曰如公叔可謂真清矣范純粹仲淹子哲宗時帥河東奏晉絳陜三州土腴人多違法或改易種色或遣子弟公皂監穫貪污猥賤乞下監司改正從之吳時邛州人徽宗時提舉河東常平歲飢發分粟以賑民童貫經略北方每訪以邊事輒不答郭忠孝河南人宣和間為河東路提舉解梁猗氏與河東接壤盜販鹽者數百為羣歲起大獄轉相告引抵罪者衆忠孝止治其首餘悉寬貸郭永元城人提點河東刑獄時高宗命宗澤守京師將復兩河檄永與大名帥相犄角不數日聲振河朔已沒州縣皆復應宋軍金人亦畏之不敢動後劉豫來冦無援城陷不屈死金耶律懷義遼宗室天會初為西南路招討使新降諸部兵革之餘多匱乏懷義擇衝要地建城市通商賈自是衣食歲滋畜牧蕃息范承吉天眷六年河東北路轉運使時承宋弊民賦繁重承吉為經畫立法簡便所入增十數萬斛官既足而民亦有餘富珠哩阿老罕隆州人為西南招討使有司督本路明安人户所貸官粟富珠哩阿老罕乞俟豐年從之軍人有以甲葉貿易諸物天德榷場及界外歲採銅礦或因私挾兵鐵與之貿易皆一切禁絶上番軍不許用親戚奴婢及傭雇者營塹損圯以時修葺兵民皆畏愛之富珠哩阿老罕舊作孛术魯阿魯罕明安舊作猛安今並改正張亨漷陰人章宗時為河東南北路提刑使兼勸農採訪事存大體略苛細訪利病條十三事以聞上嘉納之舒穆嚕元毅咸平人本名神思明昌中遷汾陽軍節度副使時石嵐間賊黨嘯聚肆行剽掠朝廷命元毅捕之賊畏而遁元毅追襲盡殪之二境以安舒穆嚕元毅舊作石抹元毅今改正伊喇益中都路人承安末為河東南北路按察使舊制在位官有不任職委所屬上司體訪許州府長二互相舉申益言此傷禮讓恐同官因之不睦别生姦弊乞止令按察使糾劾似為得體又言隨路點軍官與富人飲會獻遺宜嚴究治上皆納之伊喇益舊作移刺益今改正畢蘭阿魯岱貞祐初昭義軍節度使繕完州縣之可守者不可守者徙其民依險為柵澤州舊隸昭義軍後改隸孟州復議遷城畢蘭阿魯岱奏遷城則失太行之險而沁南昭義不通問矣詔澤州復隸昭義軍是歲潼關失守畢蘭阿魯岱陳河北利害曰河東河北之勢全恃潞州潞州兵強則國家基本漸可復立乞復置潞州帥府詔從之畢蘭阿魯岱舊作必蘭阿魯帶今改正完顏從坦金宗室貞祐中充宣差都提控安撫山西軍民上書言絳解二州民皆恃鹽布易米今大陽等渡不許粟麥過河乞罷其禁官稅十三則公私皆濟又言中條以南諸縣為陜洛襟喉乞加兵分戍平陸産銀鐵若以鹽易米募工煉冶可以廣財用備戎器尚書省議惟許放大陽等渡李革河津人興定元年以知平陽府事權參知政事為河東行省太原兵缺食革移粟七萬石濟之二年宣差葉赫素色至河東時晚禾未熟牒行省耕毀清野革奏今歲雨澤及時秋成可待如令耕毁民將不堪詔從革奏十月平陽𬒳圍城中軍不滿六千屢出戰旬日間傷者過半徵兵吉霍隰三州不時至禆將李懷德縋城出降兵自城東南入左右請革上馬突圍出革嘆曰吾不能保此城何面目見天子汝輩可去矣乃自殺葉赫素色舊作黏割梭失今改正完顏額楚瑚隆安府人汾陽軍節度使兼經略使興定二年九月城破死焉完顏額楚瑚舊作完顔訛出虎今改正納赫布魯都大名路人貞祐間授元帥右監軍兼昭義軍節度使行元帥府事興定二年潞州破力戰死贈御史大夫納赫布魯都舊作納哈蒲刺都今改正元瑚蘭大同人太宗時為山西大達魯噶齊西方多盜郡縣捕不得計所失值倍償郡縣苦之有甄軍判者率羣盜往來阜平曲陽間殺人軍源界而奪之財縣以失捕當償瑚蘭曰此大盜也縣豈能制哉即遣千人捕甄殺之勸其餘黨害乃除瑚蘭舊作忽蘭達魯噶齊舊作達魯花赤今並改正張德輝交城人世祖即位起德輝為汀東南北路宣撫使下車擊豪強黜贓吏均賦役耆耋不逺數千里來見曰六十年不復見此太平官長矣民情愛戴奉之若神明李德輝潞人中統末山西宣慰使權勢之家籍民為奴者咸按而免之復業近千人焉姚天福雁門人至元時為河東道提刑按察副使時北鄙兵興轉輸繁急河東民苦徭役天福以反側為憂劾執政失計奏罷之雷膺渾源人至元十一年僉河東山西道提刑按察司事以稱職聞程思廉東勝州人成宗即位除河東山西廉訪使太原歲飼諸王駝馬一萬四千餘匹思廉為請止飼千匹平陽諸郡歲輸租稅於北方民甚苦之思亷為請得輸河東近倉舊法決事咸有議劄權歸曹吏思廉自判牘尾某當某罪吏皆束手達爾瑪高昌人大德時河東道廉訪副使隰州村民賽社因醉毆殺姚甲為首者乘間逃去有司逮同會者繫獄厯歲不決達爾瑪曰殺人者既逃存亡不可知此輩皆罣誤無罪而反桎梏耶悉縱之達爾瑪舊作答里麻今改正尉遲德誠絳州人至大四年為河東山西道宣慰司同知擊姦吏寬稅斂上計京師入見帝賜以食擢工部尚書王思誠滋陽人至正時出僉河東山西道肅政廉訪司事行部武鄉縣監縣來迓思誠語吏屬曰此必贓吏未幾有訴於道側者曰得母訴監縣敓汝馬乎曰然監縣抵罪吏屬問先知之故曰衣敝衣乘駿馬非詐而何明張孟兼浦江人洪武中山西僉事廉徑疾惡糾摘姦猾吏民聞張僉事行部凛然墮膽鄭辰西安人永樂中為山西按察使糾治貪濁不少貸潞州盜起入山谷撫諭皆感泣復為良民王驥束鹿人永樂中為兵科給事中使山西奏免鹽池逋課二十餘萬張政廣德人宣德初以御史巡按山西時諸郡逋租至二百餘萬石政請隨土産折納民大稱便斥貪除暴治行稱最就拜山西按察使風紀益振黃常祖涵江人山西布政司左參議并晉地瘠民貧歲凶多流亡常祖奏乞招徠免役三年悉復業平陽有盜千人為患常祖推誠諭之不旬日皆降子謙錢塘人宣德中以兵部右侍郎巡撫河南山西至官遍厯諸州縣察所宜興革一歲章數上英宗時請以兩省積榖每歲支給缺食下户府州縣吏秩滿當遷即豫備糧儲未足不聽離任自是儲偫充滿民無水旱憂又以大同在塞外懸遠請别設御史治之而盡奪鎮將之役卒私墾者為官屯邊用亦溢徐永達歸德人正統初為山西按察使巡按御史非法用刑劾罷之日蔬食再餐妻家居紡績以供其衣卒之日貧不能具棺巡撫于謙解金帶以賻白圭南宫人正統中巡按山西辨疑獄百餘部檄朔州課鈔益三之二圭疏爭復三十取一之舊石璞臨漳人正統中山西布政使剛直有治行景泰初以兵部尚書出募山西義勇又出理大同軍餉及歸無第宅人服其清邱陵蘭陽人天順中為山西布政使善理劇不憚勞苦袪弊戢姦甚有威惠朱鑑晉江人以副都御史巡撫山西時額森日窺塞下鑑修築各州縣及沿邊城堡聚置騎甲萬餘募壯勇一萬七千人以謹防禦景泰初寇數萬攻雁門關命鑑移鎮雁門冦旋引去額森舊作也先今改正雷復寧遠人成化七年巡撫山西端恪守法得軍民心屢禦邊警賜敕奬勞時山西大祲復疏請發帑賑贍上從之卒於官何喬新廣昌人成化中巡撫山西能卻敵惠民後山西大飢喬新以刑部左侍郎往賑請盡蠲租賦發內帑及鹽課銀數萬兩又設法勸諭得粟數十萬石擇有司分賑又募兵疏溝渠償以粟共活三十餘萬人還流民十四餘萬户胡謐會稽人成化中山西提學副使論諸生文高下悉當山西故無志自謐創之葉淇山陽人成化二十年以右僉都御史巡撫山西歲大飢請發帑三萬金賑濟部內宗室吉凶費皆取之民間淇請停止明年澤潞旱奏蠲秋糧九十五萬石民得蘇息楊一清巴陵人成化末山西提學僉事師範端嚴人才高下甄别不爽表節義禁浮華士人翕然宗之顧佐臨淮人宏治中巡撫山西宗室第宅官為繕費不資佐請悉令自營治正統末權發太原平陽民戍邊後遂久不代奏令代還張敷華安福人宏治中以右副都御史巡撫山西部內賦輸大同困於折價敷華請太原以北利轉運者仍輸米民便之吳道安河內人宏治中山西副使整飭三關兵備道創築寧武新城設寧武所及沿邊堡寨募軍充實武備一新叢蘭文登人正德八年以右都御史總制宣大山西軍務霍什以五萬騎自萬全右衛趨蔚州大掠又三萬騎入平魯城南蘭陰置伏使人為田間餉而躬率兵追冦冦走掠食食有毒多踣伏兵乘之遂遁霍什舊作火篩今改正李鉞祥符人武宗時僉都御史巡撫山西小王子入白羊口鉞度宣大有備必窺岢嵐五臺間乃亟畫戰守冦果犯岢嵐敗之朱裳沙河人正德初以御史巡鹽河東時有幸臣遣人牟鹽利裳禁勿豫有夤緣奏乞鹽引者下户部尚書石玠曰汝無庸朱御史不汝聽也戴鱀鄞人正德中山西按察使整飭憲典官吏憚之有閹殺人匿宗室家吏不敢問鱀收捕付獄有知縣受賕殺人巡按知其與權貴有連釋之鱀為正法宋景奉新人嘉靖初山西副使汾州介休飢民聚為盜景擒其魁而撫其被脅者從為山西布政使太原民多逃徙所遺田責稅現户景召人佃墾而輕其賦定九則徵民皆賴之毛伯溫吉水人嘉靖中總督宣大山西軍務大同鎮邊鎮川宏賜鎮河鎮鹵五堡相距二百里極邊近賊帳伯溫修築之募軍三千防守給以間田永除其賦邊防賴之王儀文安人嘉靖中山西右參政分守冀寧冦抵清源城儀洞開城門冦疑引去按行所部築城郭積糗糧榆次平定間皆有城冦不敢犯翟鵬撫寧衛人嘉靖中俺答大入山西以鵬為總督修築邊牆九百三十餘里增新墩及護墩堡建營舍又得地萬四千九百餘頃人給五十畝省倉儲無算諸所規畫多著為令以功進兵部尚書曾銑江都人嘉靖中巡撫山西經歲寇不犯邊增築邊牆四百餘里進兵部侍郎韓邦奇朝邑人嘉靖中以右副都御史巡撫山西為政嚴肅有司供具悉不納將吏懾服應檟建昌人嘉靖中以右副都御史巡撫山西時所部歲被兵檟簡精鋭葺營堡謹斥堠聚兵扼要害敵知有備不敢犯翁萬達揭陽人嘉靖中以兵部右侍郎總督宣大山西保定軍務儲戎器謹偵候明賞罰將卒母敢離次得降人厚撫之益知敵情又請築大同宣府邊牆千餘里凡牆堞近逺濠堡深廣曲盡其宜由是敵不敢輕犯牆內戍者得以暇耕牧邊費日省後以卻敵功進兵部尚書楊守謙徐州人嘉靖中以右僉都御史巡撫山西請偏頭老營堡二所餘地千九百餘頃興舉營田薦副使張鎬為提調牛種取給本土其後秋穫當帑金十萬邊關穀價頓減十五李淶容城人嘉靖中山西總兵俺答瞰三關以淶拒險不敢入俄突神池利民堡淶迎戰於野豬溝驅之出境晉署都督同知丁璋嘉靖中山西副總兵二十年俺答入寧武關璋大戰於石湖嶺與遊擊周宇死之贈恤如制吳嶽汶上人嘉靖中厯山西副使右布政使並以清靜得民高叔嗣祥符人嘉靖中山西左參政斷疑獄十二事時稱神明葛守禮德平人嘉靖中山西按察使汾俗狡悍二王府多招納亡命守禮嚴保甲簡遊徼盜發立擒治境內帖然孫繼魯雲南人嘉靖中為山西參政分守冀南數繩約宗藩自遷按察使赴太原宗藩百餘人擁馬發其裝見敝衣外無長物愕然曰百餘年無此清吏矣載酒追送以謝過焉後撫山西上言邊事忤旨犯法楊博蒲州人嘉靖時以兵部尚書總督宣大山西軍務時大同方解圍博亟請蠲被兵田租因擇丁壯為義勇分隸諸將復造偏箱車百輛分置左右衛使有警則相聲援築堡濬濠數出奇兵襲敵敵為徙帳萬恭南昌人嘉靖末以僉都御史巡撫山西屢摧勍敵緣河築牆以防套冦東掠又教民用水車溉田民大利之楊巍海豐人隆慶初巡撫山西所部驛遞銀歲徵五十四萬巍請減四之一修築沿邊城堡千餘里檄散大盜李九經黨旋乞養母去宋纁商邱人隆慶初以御史巡撫山西俺答陷石州將士捕七十七人當斬纁訊得其誣釋者殆半王崇古蒲州人隆慶四年以兵部侍郎總督宣大山西軍務時俺答納叛人趙全等屢為邊害俺答孫巴罕內齊以俺答奪其妻怒忿來降崇古因以款俺答使以叛人趙全等易而歸之俺答遂縛全等來獻於是歸巴罕並封俺答通貢布俺答誓不犯大同邊境休息巴罕內齊舊作把漢那吉今改正王世貞太倉人隆慶中山西按察使有廉能名方逢時嘉魚人隆慶中左僉都御史巡撫大同與總督王崇古定計挾巴罕以索叛人趙全等於俺答以功進兵部尚書萬厯初代崇古總督宣大山西軍務申明貢布之約兩人首尾共濟邊境遂安沈子木歸安人萬厯初山西布政使晉中大飢仿鄭俠流民圖奏上得捐帑十萬為賑全活甚衆進本省巡撫威惠並行吏肅民安王象坤新城人萬厯中山西左布政使有清操多惠政都御史溫純請顯陟一人以風天下謂莫如象坤孫維城邱縣人萬厯間山西按察使冦小酋安圖恃驍健挾市龍門請以五千鐵騎待命闕下維城知其虛實禁止之乃獻出邊屬夷自贖毋敢挾市幕府上其功進右布政使安圖舊作安􅊵今改正李維楨京山人萬厯間山西按察使明斷如神不事苛刻纂修山西通志考核精詳當時號為信書吕坤寧陵人萬厯中以右僉都御史巡撫山西約將吏不得私餽遺飭邊防恤民瘼庶政畢舉嘗厯三關見將校無知兵者嚴行訓練又立保甲法籍丁壯令各習戎器而拔其尤者為長由是列城皆有武備魏允貞南樂人萬厯二十一年以右僉都御史巡撫山西裁幕府歲供及州縣冗費以其銀數萬繕亭障建烽堠置器市馬易粟又奏免平陽歲額站銀八萬以所省郵傳羡銀補之雁門平定軍以逋屯糧竄徙奏除其租招令復業岢嵐互市省撫賞銀六萬汾州有兩郡王宗人與軍民雜處知州秩卑不能制奏改為府時邊鎮廢弛允貞視要害築邊牆萬有數丈政聲大著上亦數嘉其能會詔中官張忠等採礦山西抗疏極諫張忠等暴橫不法疏暴其罪皆不報遂乞養親歸士民為立祠吳甡興化人崇禎七年擢僉都御史巡撫山西時陜豫流賊每冬月輒履冰渡河肆掠甡相地險易令嚴警備賊至多被傷自是連三歲無一潛渡者濵河二千里皆得休息又平境內大盜賀宗漢劉浩然高加計每行軍樹二白旗凡脅從及老弱婦女跪其下即免死􅊩事四年軍民戴若慈母盧象升宜興人崇禎九年總督宣大山西軍務大興屯田二年積穀二十萬石暇則率將士較射發無不中竟象升在事塞上宴然後死難本朝乾隆四十一年賜諡忠肅蔡懋德崑山人崇禎中以僉都御史巡撫山西數平盜亂十六年冬流賊陷陜西自蒲州北抵保德二千餘里悉與賊鄰恃黃河為限窮冬冰合賊騎得長驅懋德以疲卒三千當數十萬強冦日奔走平陽汾州間猶屢挫之大慶風陵吉鄉諸渡晉王趣懋德還守太原賊即渡河陷平陽李自成遣使招降懋德斬之太原陷與中軍副總兵應時盛偕至三立祠縊死福王時議諡忠襄本朝乾隆四十一年賜諡忠恪時盛遼陽人城陷後殺數十人而出還顧不見懋德復斫門入懋德死亦取弓弦自勒死趙建極永寧人山西左布政使流賊攻太原偕巡撫蔡懋德及諸監司等分門守禦城陷危坐公堂賊擁見李自成迫之跪不屈授以官大罵遂見殺本朝乾隆四十一年賜諡節愍藺剛中陵縣人山西副使從蔡懋德守太原時調陽和兵三千拹守剛中疑其為賊內應移之南關外果叛迎賊城陷𬒳執説之降大罵賊殺之首既墮復躍起丈餘賊皆辟易本朝乾隆四十一年賜諡忠愍周遇吉錦州人崇禎十五年以左都督為山西總兵官汰老弱繕甲仗練勇敢一軍特精李自成陷全陜將犯山西遇吉以沿河千餘里賊處處可渡分兵扼其上流以下流蒲坂屬之巡撫蔡懋德及平陽太原陷賊遂破欣圍代遇吉先在代遏其北犯乃憑城固守潛出兵奮擊數日殺賊無數會食盡援絶退保寧武關賊踵至遇吉發大炮設伏復殺賊二萬人城陷被執大罵不屈賊叢射殺之妻劉氏亦據公廨登屋而射每一矢斃一賊賊不敢逼縱火焚之闔家盡死後自成入京師每語人曰他鎮復有一周總兵吾安得至此福王時贈太保諡忠武祀旌忠祠本朝乾隆四十一年賜諡忠武本朝馬柱國奉天人順治初巡撫山西時流冦據太原凡八月柱國至即擊破之盡誅餘孽之匿民間者安集撫循民漸復業時客兵數往來苦供億繁柱國悉心措置里閈若不知有兵者康熙三年祀名宦黃徽孕晉江人順治初巡按山西時三晉初定民尚多竄山谷間徽孕單騎開諭悉令復業先是闖賊據晉徵賦已過半及賊平徽孕疏請已經偽官徵者盡豁之民有死義者悉具狀以聞又請録用紳士之賢者及設學臣立師儒復站銀禁告訐四事皆次第舉行申朝紀奉天人順治二年巡撫山西下車劾貪吏數十人屬員肅然站銀舊額一十五萬明季裁充餉驛費不足派之里甲至二十萬有奇朝紀請復其舊驛馬官牧無得纍民勒石郡邑民德之剿陽城土賊王希堯汾州叛兵李本清寧鄉逆民楊春暢數有功五年卒祀名宦祝世昌奉天人順治初巡撫山西時大同降將薑瓖叛郡邑震動世昌力請發兵殄滅辦餉數十萬民不病擾事平疏請豁逋賦七百萬石徭十餘萬丁未幾卒於官百姓巷哭孫茂蘭遼陽人順治四年山西左布政使時駐防兵圈民地胥以廢藩土田給之而屯丁多抗不輸租茂蘭繩以法民得安業或兵民相搆茂蘭用情理訊之咸服其平劉宏遇奉天人順治七年巡撫山西時薑瓖初平村聚多蹂躪逋賦巨萬宏遇疏請得豁又恤諸死事家建忠烈祠祀之九年旱飢遣使分賑全活甚衆汾流侵會城築隄障之既去民懷其德建祠祀焉劉嗣美陳留人順治中巡按山西彈劾不避權貴時微行訪民疾苦姦胥墨吏憚之辨卒占民居者令胥出賃直草豆輸會城市魁緣典守以肆勒索立置之法晉人稱為真御史云李之芳武定人順治十六年巡按山西措注有條貪墨吏多斂迹王庭嘉興人順治末山西右布政使以廉潔倡屬吏令盡心牧養慎出納吏不得上下其手郡邑肅然及去民歌思不輟穆臣滿洲人康熙十五年山西按察使持法平遇訟者輒以善言和解散銀米於囚必親詣獄按名給之張鵬翮遂寧人康熙二十四年官河東轉運使力請巡鹽使者題豁加課督修城隍四面甎甃在官三年以清廉著郝惟謙霸州人康熙二十八年以御史巡視河東鹽政請豁浮徵以充正課又修護城渠堰令按丁分工書於籍有毁壞輒按名重築自是渠堰無不固者劉元勳咸陽人康熙間山西糧驛道以養馬費有正供而晉皆民養嚴禁之委賑大同不漏不冒所駐地有槐一株民號為劉公槐覺羅石麟正紅旗人雍正五年任山西巡撫於晉省鄰界僻路處添設墩臺營汛奏給佐雜等官養廉銀兩又以蒲州平垣潞澤各營汛廣兵單請加設辨兵俱下部議行書麟滿洲鑲黃旗人乾隆五十五年任山西巡撫董率屬員留心民事朱圭大興人乾隆三十四年任山西布政使