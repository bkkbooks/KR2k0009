body:
  text: 紹興府在浙江省治東南一百三十八里東西距三百二十里南北距二百九十里東至寕波府慈谿縣界一百九十里西至杭州府錢塘縣界一百三十里南至金華府東陽縣界二百五十里北至海四十里東南至台州府天台縣界三百里西南至杭州府富陽縣界一百九十二里東北至慈谿縣界二百二十七里西北至錢塘縣界一百二十五里自府治至京師四千四百五十里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋時爲越國顯王時併於楚秦爲會稽郡地郡治呉三國呉志注秦始皇二十五年以呉越地爲會稽郡治呉漢初因之漢書地理志注高帝六年爲荆國十二年更名呉景帝四年礽名會稽郡屬揚州後漢永建四年始移會稽郡來治山陰東晉爲會稽國咸和四年內史王舒父名會求改它郡朝議改㑹曰鄶宋爲會稽郡孝建初於郡置東揚州永光元年州廢齊因之梁普通五年復置東揚州太平元年罷陳天嘉三年復置隋平陳改爲呉州置總管府大業初改越州尋復曰會稽郡唐武德四年復爲越州置總管府七年改爲都督府天寶元年曰會稽郡屬江南東道乾元元年復曰越州唐書方鎮表乾元元年置浙江東道節度使治越州大厯五年廢爲觀察使十四年廢浙江東道觀察隸浙江西道建中元年復置浙江東道中和三年又升爲義勝軍節度光啟三年改曰咸勝軍節度乾寕二年又改鎮東節度五代時屬呉越錢氏號爲東府宋初仍爲越州會稽郡鎮東軍節度太平興國三年罷浙東軍止稱越州大觀元年升為帥府兩浙東路兵馬鈐轄紹興元年升紹興府為浙東路治元至元十三年改紹興路屬江浙行中書省浙東海右道明初復曰紹興府屬浙江布政司本朝因之隸浙江省領縣八山陰縣附郭治府西偏東西距五十六里南北距九十里東至會稽縣界一里西至蕭山縣界五十五里南至諸暨縣界五十里北至海四十里東南至諸暨縣界四十里西南至諸暨縣界一百十里東北至會稽縣界三里西北至海岸三十里春秋越國都漢置山陰縣屬會稽郡後漢水建四年為會稽郡治晉及宋齊以後因之隋平陳廢入會稽縣唐武德七年複置八年省垂拱二年復置大厯二年又廢七年復置元和七年又廢十年復置五代因之宋為紹興府治元為紹興路治明為紹興府治本朝因之會稽縣附郭治府東偏東西距九十三里南北距一百四十里東至上虞縣界九十二里西至山陰縣界一里南至嵊縣界一百十里北至每三十里東南至嵊縣界一百二十里西南至諸暨縣界八十里東北至上虞縣界七十五里西北至山陰縣界三里漢山陰縣地隋開皇九年置會稽縣為會稽郡治唐為越州治五代因之宋為紹興府治元為紹興路治明為紹興府治本朝因之蕭山縣在府西北一百十一里東西距七十三里南北距一百里東至山陰縣界五十里西至杭州府錢塘縣界二十三里南至諸暨縣界六十五里北至杭州府仁和縣界三十五里東南至山陰縣界五十一里西南至杭州府富陽縣界四十八里東北至山陰縣界四十九里西北至錢塘縣界十五里漢置餘暨縣屬會稽郡後漢因之三國呉太平二年改曰永興晉及宋齊以後因之隋開皇中省入會稽縣唐儀鳳二年復置永興縣屬越州天寶元年改曰蕭山五代因之宋屬紹興府元屬紹興路明屬紹興府本朝因之諸暨縣在府西南一百十里東西距一百二十里南北距一百五十里東至山陰縣界七十里西至杭州府富陽縣界五十里南至金華府義烏縣界六十里北至蕭山縣界九十里東南至嵊縣界八十里西南至金華府浦江縣界九十里東北至山陰縣界九十里西北至富陽縣界七十里秦置諸暨縣屬會稽郡漢至隋皆因之唐屬越州五代初改暨陽後復因之宋屬紹興府元元貞初升為州至正十九年改為諸全州二十六年復改為縣屬紹興路明初改諸全州洪武二年復為諸暨縣屬紹興府本朝因之餘姚縣在府東北一百八十里東西距五十里南北距一百九十五里東至寕波府慈谿縣界二十里西至上虞縣界三十里南至嵊縣界一百六十里北至海三十五里東南至慈谿縣界三十五里西南至上虞縣界六十里東北至慈谿縣界七十里西北至上虞縣界七十里漢置餘姚縣屬會稽郡晉宋以後因之隋初省入句章縣唐武德四年復置縣兼置姚州七年州廢縣屬越州五代因之宋屬紹興府元元貞初升為州屬紹興路明洪武二年復降為縣屬紹興府本朝因之上虞縣在府東一百二十里東西距五十六里南北距一百三十里束至餘姚縣界二十八里西至會稽縣界二十八里南至嵊縣界七十里北至海六十里東南至餘姚縣界四十五里西南至嵊縣界九十里東北至餘姚縣界二十里西北至會稽縣界八十七里秦置上虞縣屬會稽郡後漢永建四年分立始寕縣晉宋以後因之隋開皇中並廢入會稽縣唐貞元中復置上虞縣屬越州長慶初廢入餘姚後復置五代因之宋屬紹興府元屬紹興路明屬紹興府本朝因之嵊縣在府東南一百八十里東西距二百七十里南北距七十里東至寕波府奉化縣界一百四十里西至諸暨縣界一百三十里南至新昌縣界十五里北至會稽縣界五十五里東南至新昌縣界七十里西南至金華府東陽縣界九十里東北至上虞縣界六十里西北至會稽縣界七十里漢置剡縣屬會稽郡晉至隋皆因之唐武德四年於縣置嵊州及剡城縣八年廢嵊及剡城改剡縣屬越州五代呉越改爲瞻縣宋宣和八年改爲嵊縣屬紹興府元屬紹興路明屬紹興府本朝因之新昌縣在府東南二百二十里東西距一百三十里南北距一百五十里東至台州府寕每縣界一百里西至嵊縣界三十里南至金華府東陽縣界一百二十里北至嵊縣界三十里東南至台州府天台縣界一百二十里西南至嵊縣界四十里東北至寕波府奉化縣界一百里西北至嵊縣界十五里本漢剡縣地五代晉天福五年呉越析置新昌縣仍屬越州宋屬紹興府元屬紹興路明屬紹興府本朝因之形勢東漸巨海西通五湖南暢無垠北渚浙江南山攸居實爲州鎮三國虞翻語千巖競秀萬壑爭流晉書顧愷之傳帶每傍湖良疇數十萬頃膏腴上地畝直一金宋書孔季恭傳贊帶山傍海膏腴重地宋史地理志鑑水環其前臥龍擁其後稽山出其東秦望直其南祝穆方輿勝覽風俗飯稻羮魚或火耕而水耨果隋蠃蛤不待賈而足地勢饒食無饑饉之患史記貨殖傳勤儉好學絃誦比屋宋嘉泰志晉遷江左中原衣冠之盛咸萃於越為六州文物之藪高人文士雲合景從司馬相郡志有陂池灌溉之利絲布魚鹽之饒舊志城池紹興府城周二十里有奇門五水門四元至正中增築西南隸山陰東北隸會稽城濠在東南者皆有隄以障湖水西因渠漕抵江北引衆水入海本朝順治雍正年間屢加修葺乾隆三十一年重修蕭山縣城周五里門四水門三濠廣三丈明嘉靖三十二年築本朝順治雍正年間屢修乾隆三十一年重修諸暨縣城周四里門四水門三明嘉靖中重築本朝順治十五年修乾隆三十一年重修餘姚縣城周九里門五水門二元末築四面皆引江為濠又有新城在姚江南岸亦名江南城周八里有奇明嘉靖中築與舊城隔江相對本朝順治十五年增修乾隆三十一年重修上虞縣城周十三里門五水門二明嘉靖中因元舊址重築本朝康熙八年修乾隆三十一年重修嵊縣城周七里有奇門四明嘉靖中築本朝順治十五年修乾隆三十一年重修新昌縣城周六里門四東西北三面皆引溪為池南面憑山明嘉靖中築本朝順治十五年修乾隆三十一年重修學校紹興府學在府治東南宋嘉祐中遷建本朝康熙雍正中屢修入學額數二十五名山陰縣學在縣治南宋崇寕中建入學額數二十五名會稽縣學在縣治南宋崇寕中建入學額數二十五名蕭山縣學在縣南門外宋紹興間建入學額數二十五名諸暨縣學在縣治西宋淳熙閒遷建入學額數二十五名餘姚縣學在縣南新城中宋元豐初建本朝順治九年重建入學額數二十五名上虞縣學在縣治東南宋慶厯中建入學額數二十名嵊縣學在縣治西南明嘉靖中遷建入學額數二十名新昌縣學在縣治東南宋紹興中建入學額數二十名蕺山書院在府治東北三里蕺山上明劉宗周講學於此舊名蕺里書院本朝康熙五十五年知府俞卿重修龍山書院在山陰縣治桂屏庵乾隆四十八年撤庵建此稽山書院在會稽縣治捨子橋舊為證人書院明嘉靖間知府洪珠建劉宗周講學於此本朝康熙五十九年知府俞卿等重修今名古小學筆花書院在蕭山縣北里許乾隆十三年建毓秀書院在諸暨縣學宫側乾隆二十四年建龍山書院在餘姚縣龍泉山乾隆二十四年建承澤書院在上虞縣金罍山東舊名泳澤元至元間建明萬厯間重修本朝乾隆五十四年重修剡山書院在嵊縣學宫泮池右乾隆五十六年建又輔仁書院乾隆五十四年知縣唐仁埴建南明書院在新昌縣通會門内乾隆十六年建又舊稽山書院在府治臥龍山西岡宋呉革建和靖書院在會稽縣東南十五里玉笥山蘭亭書院在山陰縣南二十五里晉王羲之修禊所道南書院在蕭山縣西二里德惠祠右明竇昱建清惠書院在蕭山縣治山麓本朝康熙年建紫山書院在諸暨縣西門内明嘉靖年建姚江書院在餘姚縣城南明崇禎間邑人蘇璞建以祀王守仁高節書院在餘姚縣東北十里陳山宋淳祐中劉黻建月林書院在上虞縣清風峽宋潘時建慈湖書院艇湖書院宗傳書院在嵊縣治並明建石鼓書院在新昌縣西石鼓山宋石亞之建今皆廢户口原額人丁二十六萬九千七百四十八今滋生男婦五百三十八萬九千八百三十名口計六十九萬一千九百九十八户又屯運男婦一千七百名口計二百七十一戸田賦田地共六萬七千六百五十五頃一十四畝一分零額徵地丁銀四十一萬八千五百六十六兩七錢一分零米四萬四千八百七十六石三斗二升五合零山川臥龍山在山陰縣治後盤旋囘繞形如臥龍越大夫文種葬此又名種山一作重山今府治據其東麓康熙二十七年聖祖南廵駐蹕於此改名興隆山其東隅為火珠山火珠之下為峨眉山龜山在臥龍山南一名飛來山又名怪山呉越春秋范蠡築城既成怪山自至怪山者鄉琊東武海中山一夕自來故曰怪山水經注山形似龜故亦有龜山之稱越起靈臺於山上以望雲物川巖明秀亦為勝地舊志一名寶林山上有應天塔今呼塔山陽堂山在臥龍山南三里郡城跨其上後漢鮑蓋葬此一名鮑郎山山北舊有鮑郎祠郡國志鮑郎一名信蕺山在臥龍山東北三里山産蕺越王句踐嘗採食之晉王羲之宅在焉後捨宅為戒珠寺故又名戒珠山其東南為白馬山白馬山東為彭山舊云彭祖隱居之地侯山在山陰縣南九里水經注侯山孤立長湖中晉車騎將軍孔敬康少時遯世棲迹此山舊志在縣南四里以孔愉後封侯故名俗稱九里山昔時去縣之數也亦名小隱山亭山在山陰縣南十里晉司空何無忌為郡置亭山上因名唐乾寕中錢鏐攻董昌克其亭山寨即此陳音山在山隂縣西南四里吳越春秋范蠡進善射者陳音越王使敎士習射北郊之外軍士皆能用弓弩之巧陳音死葬於國西號其葬所曰陳音山麻林山在山陰縣西南十五里越絶書一名多山句踐欲伐吳種麻以為弓絃使齊人守之越謂齊人曰多故名法華山在山陰縣西南二十五里十峯聳峙下有雙澗唐李紳詩云十峯掛碧落雙澗縈清漣蘭渚山在山陰縣西南二十七里即越絶書句踐種蘭渚田及晉王羲之修禊處一名蘭亭山宋祥興元年㑹稽唐珏等以玉函葬宋六陵骨於此木客山在山陰縣西南二十七里水經注浙江逕木客村耆彦云句踐使工人伐榮楯欲以獻呉久不得歸工人憂思作木客吟後人因以名地柯山在山陰縣西南三十五里上有石佛高十餘丈下有水曰柯水項里山在山陰縣西南三十里世傳項羽流寓於此棲山在山陰縣西南九十里越王句踐於此棲兵一名越王崢越王山在山陰縣西南一百二十里昔越王嘗棲兵於此今其上有走馬岡伏兵路洗馬池支更樓故址相近為青化山上有石屋有龍湫麻溪水環於山麓連麓者相傳浮邱公煉丹於此巔有丹井為浮邱山牛頭山在山陰縣西六十五里與蕭山接界唐天寶間改名臨江山有石疎理中通入水則浮名浮石明王守仁改名浮峯塗山在山陰縣西北四十五里相傳即禹會諸侯處又相近有西余山一名西扆謂禹負扆朝諸侯處蜀阜山在山陰縣西北五十里一名獨婦山越絶書獨婦山者句踐將伐呉徙寡婦置獨山上以為死士示得專一也又舊經云山自蜀飛來帶兒婦二十餘人善織美錦自言家在西蜀故名蜀阜山白洋山在山陰縣西北五十里舊名烏風山瀕海亦名龜山南麓舊設白洋巡司梅山在山陰縣北十八里一名巫山越絶書越􅸾神之官死葬其上縣志漢梅福居此故名下有泉名子真泉下馬山在山陰縣北二十五里相傳秦始皇東巡息駕於此故名山有石如蟾亦名蟾山俗名蝦蟆山兩崖夾水石骨横亘水底曰石檻玉山在山陰縣北三十里兩崖對峙唐貞元元年浙東觀察使皇甫政鑿此山置閘八以洩府境及蕭山縣之水出三江口入海石城山在山陰縣東北三十里范坰呉越備史乾寕三年錢鏐討董昌攻石城去越三十里即此今山下為石城土城山在會稽縣東六里越絶書越王得西施敎習於北壇利邱里土城三年而獻呉亦名西施山葛山在會稽縣東十里相傳句踐種葛處箬蕡山在會稽縣東十二里舊經云秦始皇東遊於此供芻草俗呼遶門山石帆山在會稽縣東十五里水經注射的山北則石帆山山東北有孤石高二十餘丈廣八丈望之如帆因以為名稷山在會稽縣東五十里隋書地理志會稽縣有稷山舊名穢山相傳越王種菜於此後漢謝夷吾為穢鄉嗇夫即此越絶云句踐齋戒臺也梁載言十道志一名棕山山之東南有義峯峯頂有黑白二龍池土人於此禱雨銀山在會稽縣東五十里無草木産銀砂㠙山在會稽縣東七十里高鋭如削一名蒿尖山下臨舜江與上虞縣接壤相傳漢駱夫人學道於此昇仙有石室石井丹竈存焉會稽山在會稽縣東南十三里周禮職方氏揚州鎮山曰會稽山海經會稽之山四方其上多金玉其下多砆石勺水出焉越絶書禹到大越上茅山大會計爵有德封有功更名茅山曰會稽史記秦始皇三十七年出遊上會稽祭大禹望於南海而立石刻頌秦德輿地志會稽山一名衡山其山有石狀如覆鬴亦名覆鬴山水經注會稽山古防山也又曰棟山越絶云棟猶鎮也隋書開皇十四年詔以會稽山為南鎮道書山周三百五十里有陽明洞為第十一洞天宛委山在會稽縣東南十五里會稽山東三里上有石匱壁立干雲升者累梯而上十道志石匱山一名宛委一名玉笥一名大柱昔禹得金簡玉字於此遁甲開山圖云禹治水至會稽宿衡嶺宛委之神奏玉匱書十二卷禹開之得赤珪如日碧珪如月是也寶山在會稽縣東南二十五里一名上臯山以北接下臯山而名宋攢宮在焉犬亭山在會稽縣東南三十里舊經越絶書並云句踐畜犬獵南山白鹿即此一名犬山一曰狗山又名吼山石壁峭削百餘仞又有石笋高數十丈俱以採石鑿成山北岸有小阜曰曹山玲瓏若戸牖積水成潭移舟可入赤堇山在會稽縣東南三十里歐冶子為越王鑄劎處一名鑄浦山越絶書赤堇之山破而出錫是也旁有井亦以歐冶名秦望山在會稽縣東南四十里水經注山在州城正南為衆峯之傑陟境便見史記云秦始皇登之以望南海自平地以取山頂七里懸磴孤陒徑路險絶何山在會稽縣東南四十七里西與雲門山相接以何子季居此得名山勢峻絶靜林山在會稽縣東南五十八里其西有銅牛山相傳越王鑄冶處水經注銅牛山有銅穴三十許丈穴中有大樹神廟山上有冶官諸葛山在會稽縣東南六十里高數十仞周五十里其尖如斛亦名石斛尖山有懸流百丈下注其聲如雷旁有鷹嘴巖高數十丈上多鷹巢巖口山在會稽縣東南七十里下有九井深不可測巔有巨石如塔高險不可登山東有石洞寛廣如屋可容數十人穀米山在會稽縣東南七十里十道志舜嘗耕此山天降嘉穀故名太平山在會稽縣東南七十八里晉謝敷隱居山中十餘年以親老還若耶孫綽有太平山銘按太平山有三一在會稽一在餘姚一在上虞上虞之山一名傘山惟餘姚之山最著謝敷所隱屬會稽屬餘姚抑或屬上虞俱未詳何縣今繫於此從舊志也射的山在會稽縣南十五里賀循會稽記山半有石室是仙人射堂東高巖有射的石遠望山的如射侯形圓如鏡土人常以占穀食貴賤的明則米賤昬則米貴諺曰射的白斛一百射的元斛一千白鶴山在會稽縣南十六里山側有石室砥平可容數十人又名箭羽山雲門山在會稽縣南三十二里亦名東山齊永明中何子季去國子祭酒還東山隱居敎授梁天監四年選學生往雲門從子季受業山之南為刺涪山陰壁兀立盛夏爽然如秋亦名明覺山蓋明覺寺基也頂有池不涸若耶山在會稽縣南四十四里元鼎六年討東越越侯為戈船下瀨將軍出若耶齊明帝末何子季隱居若耶山山發洪水樹石漂沒其室獨存寰宇記若耶山葛元所隱山下有壇刻石山在會稽縣西南七十里一名鵝鼻山自諸暨入會稽此山最高水經注秦始皇刻石尚存山側丞相李斯所篆也豐山在㑹稽縣東北六十二里㠙山西北臨曹娥江中和四年錢鏐破劉漢宏將朱裦於曹娥埭進屯豐山即此鹿池山在會稽縣東北水經注鏡湖水自東北注江通海水側有白鹿山又湖北有三小山謂之鹿野山按呉越春秋乃越之麋苑也相距二里有少微山宋職方郎齊唐隱居之所鳳凰山在蕭山縣東三十里一名慈姑山石崖之間有望夫石峽山在蕭山縣南三十里兩山相夾亦名前峡山後峽山又金雞影山在縣南六十里亦名峽山八面向江有雞籠石石巖山在蕭山縣西南十二里其形如獅亦名獅子峯頂有香泉糠金山在蕭山縣西南十八里湘湖中日照其上彩灼如細金又有擪烏山東方朔神異記亞夫斷蕭山南嶺將擪於烏江蓋江東以擲為擪云又荷山俱在湖中虎爪山在蕭山縣西南五十里下臨大江與錢塘富陽分境山勢迴環盤薄踞峙江濱其南與浦江諸暨諸山相聯絡龍門山在蕭山縣西南八十里兩山對峙上有龍湫一名大洪山大山在蕭山縣西南九十里盤亘深逺一名長山其南最高者曰鏡臺山一名白石山又名筆架山晉許詢修煉之所有元度巖仙人洞草木皆香可療疾又曰百藥山濱江而北九里有州口山相傳錢鏐嘗欲置州於此蕭山在蕭山縣治西漢書地理志餘暨縣蕭山潘水所岀寰宇記山在縣西一里又名西山有林泉之勝唐以此名縣按舊志晉許詢於此憑林築室有蕭然自適之趣故又名蕭然山但簫山名早見漢志則其名不始於詢本朝乾隆十六年高宗純皇帝南廵有御製蕭山道中作詩城山在蕭山縣西九里中卑四高宛如城堞相傅句踐保此以拒呉亦名越王城又曰越王臺李白詩西陵拱越臺謂此其前兩峯對峙亦謂之馬門山半有池曰洗馬泉産嘉魚冠山在蕭山縣西十七里山形如冠有泉甚甘美連山在蕭山縣西二十里長岡九里相傳秦始皇欲置石橋渡浙江今山下有石柱數十列於江際亦名青山翠嶂山在蕭山縣西二十五里一名夏駕山水經注西陵湖東有夏架山即此多苮草可織蓆北幹山在蕭山縣北一里晉許詢家於此山其巔曰玉頂峯今名四望臺山麓有幹泉去虎山在蕭山縣北五里山有虎予坳相傳宋景德中有猛虎常傷人一夕負子渡江西去縣令杜守一因名其山荏山在蕭山縣東北十里相傳越王種荏於此俗呼長山洛思山在蕭山縣東北三十二里山下有朱室塢水經注句踐百里之封西至朱室即此龕山在蕭山縣東北五十里其形如龕下瞰浙江與赭山對峙其西有小山名鼈子山江出其間曰鼈子門亦曰海門為錢塘之鎖鑰明嘉靖中叅將湯克寛大敗倭寇於此舊有龕山寨赭山在蕭山縣東北五十里其地為南沙聚處稠密之區按赭山向歸海寕州管轄嘉慶十六年改屬蕭山五岫山在諸暨縣東六十里峯巒秀出者五與會稽山雲門山相連鐵崖山在諸暨縣東六十里岡巒澗壑盤紆數里上有二峯一峯名柯公尖有龍湫一峯岩石峻立色如鐵元末楊維楨居此因以為號寶掌山在諸暨縣東南四十五里一名千嵗巖唐貞觀中寶掌禪師開巖於此中有石室可容百餘人東白山在諸暨縣東南九十里高峻為縣境諸山冠與嵊縣接界詳見下苧蘿山在諸暨縣南五里呉越春秋句踐得苧蘿山鬻薪之女曰西施註在諸暨南五里一名蘿山下臨浣江江中有院紗石按後漢郡國志引越絶書云蕭山西施之所出今蕭山亦有苧蘿山西施里句乘山在諸暨縣南五十里國語句踐之地南至於句無韋昭注諸暨有句無亭括地志謂即句乘山山有九層亦名九層山俗呼為九乘山石鼓山在諸暨縣南五十里山下盤石如鼓扣之有聲多產黄精白术竹箭金澗山在諸暨縣南六十里下有坑宋元間嘗產金如糠粃命官淘採鎔錬無成明永樂四年遣行人驗視無冶鑄跡亦罷五指山在諸暨縣西南六十五里山形如指豐江繞其東北明初依此山築諸全州新城石柱山在諸暨縣西南七十里接金華府浦江縣界上有石柱水發其南者為南源西為西源長山在諸暨縣西一里南北長十餘里高千餘丈其頂平博有石室可坐百人一名陶朱山北有戚家嶺一曰七岡中為桃花嶺南為范蠡巖柜傅蠡嘗居此五洩山在諸暨縣西五十里水經注洩溪中道有兩高山夾谿造雲壁立凡有五洩洩懸三十餘丈廣十丈中二洩不可得至登山逺望乃得見之下洩懸百餘丈水勢高急聲震水外上洩懸二百餘丈望若雲埀此是瀑布土人號為洩也舊志五洩山泉沿厯五級下注溪壑山連亘深遠有十六峯二十五巖洞谷溪澗之屬不可勝紀俗名小雁蕩西接浦江富陽二縣界雞冠山在諸暨縣西五十里王象之輿地紀勝山形如雞冠出奇石其文若星月花獸上有玉女冢漁櫓山在諸暨縣北二十五里特峙兩江之中為縣後鎮銀冶山在諸暨縣北三十里唐書地理志諸暨縣有銀冶杭烏山在諸暨縣北七十五里聳拔霄漢曡嶂七十有二中一峯特高風雨晦冥常聞樂聲號鼓吹峯羅壁山在餘姚縣南十八里明統志山有漢虞國墅襟帶溪山巖谷大勢具體金谷晉郗愔為會稽内史因卜居焉大蘭山在餘姚縣南八十里相傳劉綱夫婦於此仙去其南與四明山相接東有九曲分水諸嶺唐咸通初王式討裘甫擒之剡縣餘黨逸入大蘭山諸將追獲之即此四明山在餘姚縣南一百十里詳見鄞縣塢山在餘姚縣西南十二里舊經云支道林居剡毎逺來塢山或問之答曰謝安石昔來見就輒移旬日今舉目觸情不覺欣賞烏膽山在餘姚縣西南三十里山峯特高航海者視為指南東明山在餘姚縣西南五十里亦名東山為四明水口白水山在餘姚縣西南六十里山壁峭立有泉四十二道投空而下是曰白水其嶺亦名瀑布嶺為四明山之西趾太平山在餘姚縣西南八十里與上虞縣接界東連四明其形如繖一名繖山餘姚江源出此其相連者曰菁山姚江初出亦名菁江以此龍泉山在餘姚縣治西一名靈緒山一名嶼山三峯挺秀如畫南俯姚江有泉雖微不竭謂之龍泉呉女山在