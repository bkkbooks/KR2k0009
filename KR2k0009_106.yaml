還之問宏何所欲宏曰常患若耶溪戴薪為難願旦南風暮北風後果然故若耶溪風至今猶然呼為鄭公風也與地紀勝其地世號樵風涇宋之問詩歸舟何慮遠日暮有樵風南池在山陰縣東南二十六里范蠡養魚之處墨池在山陰縣西南二十五里即王右軍墨池遺跡又按宋志云每朝廷恩命至池水必先黒禹池在會稽縣東南禹陵前唐賀知章乞為放生池因名賀家池白龍潭在上虞縣西三十五里輿地紀勝有三潭凡祈禱者僅至下潭已目眩股慄太湖潭在嵊縣東六十里太湖山水清潔而色似赤舊名丹池三懸潭在嵊縣西南貴門山中四山石壁如劚丹翠萬狀山半泉湧如噴瀦為三潭最幽勝鹿苑潭在嵊縣西四十五里輿地紀勝歳旱禱雨投簡潭内驟雨即至百丈潭在嵊縣西五十里百丈巖下飛瀑所注為黌院水口鄭公泉在會稽縣東南水經注若耶溪東寒溪之北有鄭公泉泉方數丈冬溫夏涼漢太尉鄭宏宿居潭側因以名泉華清泉在餘姚縣東北十里客星山南麓廣僅尺咫而泉流不竭灌田頗廣禹井漢書地理志會稽山上有禹井水經注會稽山東有硎去廟七里深不見底謂之禹井龍井在餘姚縣治西宋蘇軾詩餘姚古縣亦何有龍井白泉甘勝乳古蹟山陰故城今府治呉越春秋越王欲築城立郭分設里閭委屬於相國范蠡乃擬法紫宫築小城周千一百二十一歩一圓三方西北立龍飛翼之樓以象天門東南伏漏石竇以象地户陵門四達以象八風外郭築城而缺西北示服事呉也越絶書句踐小城山陰城也周二里二百二十三歩又有大城周二十里七十二步范蠡所築也李宗諤圖經隋開皇中楊素修郡城廣四十五里名羅城又築子城周十里西北二面皆因重山為城不設濠塹宋嘉祐中守臣刁約修子城北因臥龍山環屬於南西抵於堙尾周五里有奇後廢今府治東有鎮東閣即子城之正東門也餘暨故城在蕭山縣西漢置應劭曰呉王闔閭弟夫槩之所邑水經注永興縣在會稽東北一百二十里漢末童謡云天子當興東南三餘之間故孫權改餘暨曰永興縣梁書陳慶之以功封永興縣侯唐更名蕭山始移今治元和志縣東北至越州一百里縣志永興縣治舊在縣西長興鄉諸暨故城今諸暨縣治元和志縣東北去越州一百四十四里越王允常所居界内有暨浦諸山因以為名餘姚故城今餘姚縣治水經注餘姚縣城是呉將所築南臨江津北背巨海周處風土記舜支庶所封舜姚姓故曰餘姚元和志縣西去越州一百四十五里上虞故城在今上虞縣西北漢置水經注縣本司鹽都尉治也地名虞賓晉太康地記日舜避丹朱於此故以名縣百官從之故縣北有百官橋亦云禹與諸侯會事訖因相與虞樂二說不同未知孰是元和志縣西去越州九十六里故城西枕上虞江府志舊治在今縣西北四十里之百官市唐長慶二年徙今治剡縣故城在嵊縣西南漢置元和志北去越州一百八十五里漢舊縣故城在今縣西南一十二里呉賀齊為令移理今所新昌故城在今新昌縣東寰宇記在越州東南二百二十里唐末錢鏐割據錢塘時以去溫州之道路孔遠人物稍繁且無館驛乃析剡縣一十三鄉置新昌縣縣志舊有土城在今城東久廢漢寕舊縣在諸暨縣漢興平二年分諸暨大門村為漢寕縣呉改呉寕縣尋廢今大門里即其地義安舊縣在諸暨縣東北五十里宋乾道八年置淳熙元年廢今為楓橋鎮始寕舊縣在上虞縣西南五十里後漢分上虞縣置屬會稽郡水經注浦陽江東北逕始寕縣西本上虞之南鄉也漢順帝永建四年陽羨周嘉上書始分之舊治水西常有皮潮之患晉中興之初治今處隋初省剡城舊縣在嵊縣境唐武德四年析剡為剡城縣七年廢入剡縣苦竹城在山陰縣西南二十九里越絶書苦竹城者句踐伐吳還封范蠡子也水經注其地為苦竹里舊志唐時為苦竹館石城在山陰縣東北三十里石城山下亦句踐遺跡唐乾寕三年錢鏐討董昌自西陵趨石城或謂之石頭城越王城在會稽縣東南會稽山上左傳哀公元年呉入越越子以甲楯五千保於會稽舊志秦縣治此侯城在會稽縣東五十八里相傳無餘所都水經注秦望山南有嶕峴峴裏有大城越王無餘之舊都也故句踐語范蠡口先君無餘國在南山之陽社稷宗廟在湖之南西陵城在蕭山縣西十二里舊名固陵水經注浙江東逕固陵城北昔范蠡築城於浙江之濱言可以固守謂之固陵今之西陵也後漢建安初會稽守王朗拒孫䇿於固陵六朝時謂之西陵牛埭呉越時以陵非吉語改曰西興宋為西興鎮今為西興場錢清城在蕭山縣東南臨浦元末張士誠將吕珍築跨江南北於東西兩頭作栅為浮城於江面以通舟楫尋廢新城在諸暨縣西南六十里明初諸暨守將謝再興叛降於張士誠李文忠在嚴州聞亂親引兵馳一百六十里遇賊於義烏擊破之丈忠度地去舊城六十里並五指山築城以守之賊來攻不能下後復取諸暨乃還舊治虞家城在餘姚縣東北三十里嶼山南相傳漢日南太守虞國居此郡志謂國宅在治西一里虞諸山南以此爲虞世南宅嵩城在上虞縣西北六十里晉時孫恩攻上虞袁崧作扈瀆壘禦之嵩城之名始此舊置戌守明初置臨山衞城遂廢今有嵩城市浴龍宫在山陰縣西郭門外虹橋北宋理宗母家也舊傳理宗童時偕弟與芮浴於河史彌逺客余天錫舟過此夢龍負舟驚覺視之則兩兒也還白彌逺後代濟王爲帝今橋上會龍石尚存飛翼樓在山陰縣西三里高十五丈越范蠡所築以壓呉者自唐以來爲望海亭又爲五桂亭宋汪綱復建爲樓自爲記明嘉靖中改爲越望亭晩對樓在府治後宋洪邁建取杜甫翠屏宜對晚之句臨眺之際盡得湖山之勝拂雲樓在府城内臥龍山上宋汪綱建取元微之詩州城繚繞拂雲堆之句以名蓬萊閣在府城内臥龍山上五代時錢鏐建宋王十朋有賦元改建蓬萊堂韓性爲記曲水閣在臥龍山西麓宋景祐間太守蔣堂建取蘭亭故事爲名又有惠風閣宋史浩建與曲水相接有若閣道今爲飛蓋堂鎮東閣在府治左即舊子城之鎮東門舊志宋元以來名鎮東閣智永書閣在會稽縣雲門寺永居此臨書凡三十年所退筆頭五大簏葬之號退筆塚人來乞書如市户限爲之穿用鐵裹之時人謂之鐵門限李紳書堂在嵊縣北龍藏寺側紳少年肄業於此清白堂在府治内宋范仲淹建堂側有清白泉清思堂在府治内宋趙抃有詩刻石飛蓋堂在府西園最爲遊燕勝處宋宣和書學博士徐兢書額觀風堂在府治西臥龍山東麓宋紹興中曹泳建民事堂在府治西宋王十朋建有賦鎮越堂在府治宋汪綱建自作記讀書堂在上虞縣西北東漢朱侍中儁讀書處有洗硯池按郡志誤作朱買臣不知買臣實呉人今嘉興府也萬卷堂在新昌縣南八里宋石待旦建堂貯書爲義學舊傳杜衍而下七十二人由此登科秋風亭在觀風堂側宋汪綱記云此亭辛幼安賦詞膾炙人口白樓亭在府城内會稽記種山南有白樓亭江夏太守宋輔於此立學教授東亭在府治北古為餞客之所唐人如宋之問輩皆有詩史浩改築蓬萊館然邦人猶謂之東亭又有西亭在府治西北唐孫逖亦有詩適南亭在山陰縣北梅山頂宋熙寕中郡守程師孟築陸佃為記鑑湖一曲亭在府西南常禧門外唐賀知章宅後為天長觀宋守史浩建亭又名懷賀亭蘭亭在山陰縣西南二十七里晉永和九年王羲之與謝安等四十二人修禊於此有蘭亭序水經注湖口有亭曰蘭亭亦曰蘭上里呉郡太守謝朂封蘭亭侯蓋取此以為封號太守王廙之移亭在水中司空何無忌臨郡起亭於山椒夲朝康熙三十四年奉勅重建聖祖御書蘭亭序刻石立亭上三十七年御書蘭亭二大字懸之乾隆十六年高宗臨幸有御製蘭亭即事蘭亭恭詠皇祖撫帖御筆蘭亭襍詠諸詩柯亭在山陰縣西南四十里會稽記漢末蔡邕避難會稽宿於柯亭仰觀椽竹知有奇響因取為笛遂為寶器寰宇記千秋亭一名柯亭又名高遷亭本朝乾隆十六年高宗南巡有御製題柯亭詩嘉慶五年守令於亭後立祠祀邕子敬亭在會稽縣東南雲門山下即王獻之山亭也唐王勃嘗修禊於此麗句亭在蕭山縣之秦君里名勝志唐詩人秦系所居戴叔倫有詩呉越兩山亭在蕭山縣北幹山宋景德中令杜守一建元貝瓊有記翫江亭在蕭山縣西興渡口明宏治中重建改名鎮海樓仇亭漢書地理志上虞有仇亭水經注仇亭在縣之東北一十里江北嵊山亭在嵊縣東北嵊山下挾溪亭在嵊縣西剡山頂輿地紀勝旁有俯山堂溪山勝絶戴溪亭在嵊縣剡溪晉王子猷居山陰夜雪初霽怱憶戴逵時在剡便乘小舟詣之造門不前而退今人稱為戴溪邑令姜仲開建戴溪亭越王臺在府城内種山東北越王句踐登眺之所宋汪綱復建在臥龍山西麓觀臺在府城内龜山上一名遊臺一名靈臺越王句踐所建以望雲物又呉越春秋句踐起離宫於淮陽宿臺在於高平駕臺在於成邱立苑於樂野燕臺在於石室齋臺在於襟山離宫越絶書作離臺淮陽里名在會稽縣東南二里高平里名在會稽縣東十里成邱今安成里樂野今樂瀆村石室在會稽縣東南十里襟山當作稷山在會稽縣東二十五里又水經注鼔吹山西有賀臺越伐呉還而成故名祭忠臺在餘姚縣龍泉山絶頂明正統間王振用事翰林侍講安福劉球上疏死詔獄餘姚成器與劉素不識面率同志祭之因名陳爼豆之石曰祭忠臺旁刻三大字王守仁書呉越王東府在臥龍山東麓即府治也呉越備史唐乾寕三年武肅王平董昌改威勝軍為鎮東軍拜武肅鎮海鎮東軍節度遂有越州之地梁開平二年升為大都督府謂之東府周廣順元年大元帥呉越國王即越州東府築宫室治圍圃花卉山石池塘亭苑宋福王府在府東坊宋嘉定十七年理宗即位以同母弟與芮奉祀父榮王開府山陰蕺山之南府東大池其臺沼也疏山軒在嵊縣西東白山南齊褚伯玉建又太平館在西白山齊高帝建爲褚伯玉隱居所活水軒在山陰縣鏡湖上張德麟講學之所宋濂篆額日門館在餘姚縣西南太平山粱杜京産講學之所陶宏景有碑范蠡宅在諸暨縣西長山側今爲翠峯寺鄭宏宅在會稽縣東南若耶溪側孟嘗故宅在上虞縣南一里又東一里有還珠門今有孟村陳囂故宅在會稽縣東二里黄昌故宅在餘姚縣西南一里水經注江水又南逕黄橋下臨江有漢蜀郡太守黄昌宅橋本昌創建也虞國故宅在餘姚縣西輿地志縣西嶼山有漢日南太守虞國宅國在日南愛及民物出有雙雁隨軒秩滿還家雁與偕至故有雁池虞翻故宅在餘姚縣靈緒山會稽記昔虞翻嘗誡子孫曰可留江北居後世當相繼代興今諸虞氏由此悉居江北也江彪故宅在山陰縣東北三里寰宇記郭北有江橋即彪所居之地孔瑜故宅在山陰縣西南四里候山下水經注侯山孤立長湖中晉車騎將軍孔敬康少時棲迹於此王右軍故宅在山陰縣東北六里戒珠寺有養鵝池洗硯池題扇橋存焉今寺右有羲之祠堂謝安故宅在上虞縣西南東山即今國慶院址孫盛晉陽秋安石家於上虞優游山林六七年即此處又東山有孫綽宅謝敷故宅在會稽縣東南五雲門外一里或云在雲門寺東戴逵故宅初在嵊縣剡源溪鄉後徙縣西三十里桃源鄉又縣西二十里孝節鄉有地名逵溪則逵别業也郭偉故宅在會稽縣治東南晉驃騎大將軍郭偉宅今大中禹跡寺是也謝元故宅在上虞縣西南四十里其地有車騎山相近為太康湖水經注浦陽江自嶀山東北逕太康湖車騎將軍謝元舊居所在右濱長江左旁連山平陵修通􅊹湖逺鏡江曲起樓悉是桐梓居民號為桐亭樓何充故宅在會稽縣東南七十里充嘗為會稽内史居此宅後為福慶寺張嵊故宅在嵊縣西桃源鄉嚴維