時廟工需木徽大賈持金以饋峻拒之何天啓貴溪人嘉靖中以給事中謫淳安縣丞攝縣事懲猾吏禁姦民戢礦賊最多善政海瑞瓊山人嘉靖中知淳安縣布袍脱粟令老僕藝蔬自給總督胡宗憲子過淳安怒驛吏倒懸之瑞曰曩胡公按部令所過母供張今其行裝盛必非胡公子發槖金數千納之庫馳告宗憲宗憲無以罪都御史鄢懋卿行部過供具甚薄抗言邑小不足容車馬𢡟卿素聞瑞名爲斂威去而囑巡鹽御史袁淳誣瑞謫興國州判官陳􅉓青州人隆慶中爲嚴州通判㩦一子一僕布衣疏食奉母之餘悉賬貧乏及罪贖莫辨者蕭元綱泰和人萬厯中知淳安縣修靈隄濬古渠築二湖陂創賓興書院闢建縣治皆以俸金佐之民爲立生祠蔡模武進人萬厯中知淳安縣時供億煩苦模至悉倚辦公帑不以累民清豪猾乾没之弊建祠以祀海瑞去官後民即以瑞祠並祀之潘絲婺源人萬厯中嚴州通判署分水縣事舊丁户多浮額民苦之乃稽故牘去浮丁千數再攝建德縣蠲歲徵八百有奇石有恒黄梅人萬厯中知遂安縣下車以避勞邀利畏禍三者自誓不用民間一物屏絶饋遺聽斷明決庭階肅然本朝董珙嵩縣人順治七年知壽昌縣先是邑中差役煩多民不勝祗應珙非正役不差壬辰寇犯浙西三衢震動珙嚴偵探問出奇兵殺賊縣境倚以安輯在任三年清操如一日梁浩然濱州人康熙七年知嚴州府值歳饑力請蠲賬又設廠煑粥老幼不能就食者按户口給未清丈民田悉除隱射濬兩河築下河以資灌溉耿精忠亂山多伏莽浩然練習鄉勇捍禦周密四境晏然項一經漢陽人康熙八年知建德縣縣田自明萬厯中編册後歲久版籍紛亂黠吏得恣行飛灑賦額愈混會編審一經倡為歸號法令民按號收田計畝加額由民民得以實田供税建龍山書院集士肄業其中大兵討耿精忠一切軍需經營盡瘁以薦擢考功主事王光鼎漢軍鑲黄旗人康熙中知嚴州府夏旱穀價騰湧光鼎捐貲買米平糶又勸富民出粟民頼以安時有妖狐為祟民間女子多為所魔光鼎親製檄文告城隍神驅之患遂息郡境灘髙水急津渡最險建德之小里埠桐廬之南關外尤甚光鼎增設渡船至今便之人物晉夏孝先桐廬人少䘮二親負土成墳數年不勝卒南北朝陳周文育字景德壽昌人本姓項少孤貧義興人周薈養為己子從武帝討侯景為府司馬以功累遷散騎常侍徐嗣徽引北齊來寇文育頻戰有功進爵壽昌縣公後為熊曇朗所害贈侍中司空諡忠愍唐何起門建德人事親至孝父死廬墓累有異徵大厯中刺史蕭定以狀聞詔旌表陳京桐廬人有至行親䘮廬墓刺史蕭定以聞詔旌表章八元桐廬人大厯進士遷協律郎子孝標元和進士為山南東道從事試大理評事孫碣乾符進士三世以詩名祝希進桐廬人父丧廬墓側生芝草産靈蛇元和中詔旌其門又睦州許利川居母䘮以孝聞亦被旌表皇甫湜字持正睦州新安人元和進士為陸渾尉仕至工部郎中裴度留守東都辟為判官作福先寺碑援筆立就從韓愈遊愈愛其才文章與張籍李翺齊名施肩吾字希聖睦州人元和進士隱居洪州西山同時徐凝官至金部侍郎並有詩名李頻字德新壽昌人少秀悟多所記覽尤長於詩大中八年登進士第調秘書郎遷武功令縣大治擢侍御史守法不阿狥累遷都官員外郎表丐建州刺史以禮法治下更布條教郡賴以安卒於官戴元益桐廬人五世同居家有紫微木生連理枝咸通八年刺史以聞詔蠲徭役旌其閭又睦州方良琨亦以數世同居被旌方干字雄飛桐廬人工詩與鄭仁規李頻陶詳為三益友咸通中遯於會稽鑑湖之濱釣魚為樂世稱元英先生方昊字太初淳安人以節義自高唐亡遁於巖穴呉越錢氏招之不往聚徒講學以終其身宋江公望字民表睦州人舉進士建中靖國元年由太常博士拜左司諫抗疏極論時政時内苑蓄珍禽奇獸公望力言非初政所宜帝悉命從之惟一白鷴蓄久以拄杖逐之不去乃刻公望姓名於杖頭以識其諫蔡京為政編管南安軍過教還家建炎中卒贈右諫議大夫方慤字性夫桐廬人性至孝父死廬墓登宣和進士厯官禮部侍郎所至以剛廉稱著禮記集解朱子嘗曰方氏禮記解不可以其新學而黜之詹良臣字元公分水人舉進士不第以恩得官調縉雲尉方臘起其黨犯處州守貳俱遁良臣曰捕盜尉職也縱不勝敢愛死乎率弓兵數人出禦之皆被執誘使降良臣曰汝輩不知求生顧欲降我耶旦暮官軍至汝肉飼狗鼠矣賊怒臠其肉使自啖之良臣吐且罵至死不絶聲徽宗聞而傷之贈通直郎官其子孫二人劉晏字平甫嚴州人宣和四年授通直郎金兵圍京師以晏總遼東兵號赤心隊建炎初從劉正彦擊淮西賊丁進進黨見晏軍不戰而降遷朝散郎正彥反晏以衆歸韓世忠羣寇犯常州晏出奇破之後追擊賊戚方於宣城爲賊所害贈龍圖閣待制立廟死所號曰義烈喻樗字子才建德人少慕伊洛之學中建炎三年進士第趙鼎居常山引爲上客紹興初高宗親征樗爲鼎言宜召張浚宣撫江淮鼎入奏起浚浚至執鼎手曰此行舉措皆合人心鼎笑曰子才之功也樗於是往來鼎浚間多所裨益以鼎薦授秘書省正字㝷以言和議非便忤秦檜意出知懐寕縣通判衢州孝宗即位提舉浙東常平以治績聞所著有大學中庸論語解及玉泉語錄錢時字子是淳安人受業楊簡之門絶意科舉究明理學江東提刑袁甫作象山書院招主講席學者興起丞相喬行簡薦授秘閣校勘未幾出佐浙東倉幕㝷召入史館檢閲轉對敷陳剴切授江東帥屬歸所著有周易釋傳尚書演義學詩管見春秋大㫖四書管見兩漢筆記等書葉義問字審言壽昌人建炎初登進士第爲饒州教授攝郡事輒發常平米賑饑通判江州忤秦檜罷去檜死召至言臺諌廢置在人主檜親黨宜盡罷逐以言得罪者宜敘復擢殿中侍御史樞密湯鵬舉效檜所爲植黨鉏異己者義問累章劾罷之累拜同知樞密院事詹儀之字體仁遂安人紹興進士平居以問學為事淳熙中知信州時朱子吕祖謙俱在鵝湖儀之往復辨問無虚日及帥廣東以濂溪舊治立祠曲江後論廣鹽官鬻之弊上嘉之除吏部侍郎權知静江討平安化蠻己中蜚語安置袁州歸卒趙彥肅字子欽建德人乾道進士仕至寕海郡節度推官所著有易説廣學雄辨士冠士婚饋食圖學者稱復齋先生洪璞字叔正淳安人紹熙進士仕為鎮東節度推官陳備邊八䇿楊簡薦之曰守官數十年而無屋可居舉家三百指而無田可養其廉介如此子揚祖召試館職除正字亦有學行徐梅龜字臞叟壽昌人舉進士為霍邱尉嘉熙初元兵大至與子尚古皆死之贈宣教郎尚古贈承信郎呉洪德字長翁淳安人淳祐進士厯官金部員外郎元兵入臨安抗節死弟雄飛字次翁景定進士累官太常簿國亡募兵赴難死方逢辰字君錫淳安人淳祐中廷對第一累官兵部侍郎國史修撰時宰相鄭清之賈似道擅權逢辰力詆其非稱疾歸除吏禮二部尚書俱不拜授徒講學所著有孝經解易外傳尚書釋傳學庸注釋諸書學者稱蛟峯先生弟逢振字君玉景定進士累官太府寺簿宋亡隱於家元初徴不起講學石峽書院以終何夢桂字巖叟淳安人咸淳進士通判吉州擢御史轉太府卿致仕歸宋亡不仕所著有易衍中庸致用等書於易學尤精元余丙遂安人幼喪母泣血成疾父亡不忍葬結廬於古山下殯其中日閉户守視有牧童遺火延殯廬丙與子慈亟撲不止欲投身火中俄暴雨火滅姜兼淳安人七歲而孤與二兄養母至孝母喪廬墓朝夕哭奠躬自樵爨荒山中蔬食飲水一衰麻寒暑不易同里陳氏戴氏子不能事其父母聞之皆慚悔迎養方道叡字以愚逢辰曾孫至順進士授翰林編修撰后妃功臣諸傳累遷江西行省員外郎明初兩被召不起所著有春秋集釋魯淵字道源淳安人勵志為學舉進士為華亭丞明初屢徴不就所著有春秋節傳及䇿府樞要明徐舫字方舟桐廬人幼輕俠既習科舉業復棄之專為歌詩元行省叅政蘇天爵將薦之舫避去築室江臯日苦吟於雲煙出没間劉基被徴過桐廬邀之同行舫荷簔笠以見酌酒賦詩而别所著有瑶林滄江二集徐尊生字大年淳安人洪武初以遺逸舉與修元史竣事復編禮書修日厯時宋濂乞致仕舉尊生自代拜翰林應奉文字草制悉稱㫖以老疾乞歸所著有春秋論及懷歸等藁張瑛字彦華建德人永樂中舉於鄉入國學厯刑部員外郎正統時擢建寕知府鄧茂七作亂瑛率軍分三路襲敗之遂奪其砦進右叅政仍知府事茂七既誅其黨林拾得等轉掠城下瑛與從父敬禦之乘勝逐北陷伏中敬死瑛被執大罵不屈死贈福建按察使俞鑑字元器桐廬人正統進士授兵部職方主事英宗北征郎中胡安當從行稱疾求代鑑慷慨許諾或以子幼家遠沮之鑑厲聲曰此豈臣子言身家時乎尚書鄺埜知其賢數與計事鑑曰惟力勸班師耳時不能用從至土木遇害景泰初贈承德郎姚夔字大章桐廬人正統進士授吏科給事中陳時政八事景泰初擢南京刑部侍郎㝷改禮部偕羣臣請復太子天順中進禮部尚書成化初以災異屢見乞罷西山新建塔院斥遠阿叱哩之徒勸視經筵裁決庶政帝優㫖答之慈懿太后崩中㫖議别葬夔率羣臣伏哭文華門竟得如禮進吏部屢陳時弊多採納夔才遠器宏表裏洞達朝議未定者一言立決掌銓衡黜陟平允以延攬人才為務卒贈少保諡文敏子璧天順進士官兵部郎中項忠劾汪直璧豫謀遂下獄謫廣西思明同知謝病歸商輅字宏載淳安人正統中鄉會殿試皆第一授修撰郕王監國入叅機務徐珵倡南遷議輅力沮之進侍講景泰中累遷兵部左侍郎兼左春坊大學士景帝不豫輅建議請立東宫奏未及入而石亨輩已迎復上皇諷言官劾之斥為民成化初以原官入閣首陳勤學訥諌儲將防邊省冗官設社倉崇先聖號廣造士法凡八事帝嘉納之累進吏部尚書謹身殿大學士帝將復郕王位號輅極言王有社稷功帝意遂決時汪直督西廠數興大獄輅條直十罪遂罷西廠宦者忌之因力求去卒贈太傅諡文毅胡拱辰字共之淳安人正統進士知黟縣有惠政擢御史疏陳時弊八事景帝即位屢疏多採納出為貴州叅政威行邊徼厯廣西四川布政皆有平寇功成化中進兵部侍郎首疏請定儲位言甚剴切拜工部尚書節財省事人皆便之以老乞歸宏治中巡按御史陳銓言拱辰退休十餘年生平清操如一日乞加禮異詔有司給廩祿正德初年九十遣行人存問卒贈太子太傅諡莊懿俞藎字廷臣桐廬人天順進士擢御史出按江西治外戚王氏萬氏宗族恣横罪坐事謫澧州判官大築陂堰溉田萬頃累遷鄖陽知府乞歸何紹正字繼宗淳安人宏治進士授行人正德初擢吏科給事中劾河南鎮守中官廖堂倚劉瑾勢擅擬遷調瑾啣之坐頒厯導駕失儀杖之闕下謫海州判官累遷池州知府築銅陵五十餘圩以備旱澇宸濠反攻安慶紹正登陴固守池賴以安終江西叅政俞諌字良佐桐廬人藎之子宏治進士授長清知縣累遷河南僉事擒嵩賊吕梅厯江西叅議平大帽山賊鍾士高正德六年擢右僉都御史治水蘇杭諸郡修治圩塘民享其利㝷進右副都御史提督操江姚源賊王浩八叛詔諌督諸軍討平之兼領江西巡撫再擊平臨川新淦賊討斬劇賊徐九齡羣盜悉平進都御史宸濠諷言官劾之召還嘉靖初以故官總督漕運後討滅礦盜王堂等召掌都察院事卒贈太子太保諡莊襄王浚字德深建德人正德進士任薊州知州以抑制劉瑾家奴下錦衣獄㝷釋遷刑部員外郎復諫武宗南巡廷杖後遷貴州副使苗獠呉尚賢等倡亂討平之累宫刑部侍郎致仕汪喬年字歲星遂安人天啓進士厯青州知府以治行卓異遷登萊兵備副使崇禎十四年擢右僉都御史廵撫陜西時李自成己破河南總督傅宗龍敗殁於項城詔擢喬年兵部右侍郎總督三邊軍務喬年收散亡調邊卒率總兵賀人龍等出潼關賊方圍左良玉於郾城甚急而其老寨屯襄城喬年議趨襄城賊必還救良玉乘背夾擊可大破乃簡精騎馳至襄城賊以數十萬衆來逆人龍等未陣而奔喬年嘆曰此吾死所也率殘卒入城拒守外援不至城陷卷戰手刃三賊爲賊所執大罵賊割其舌磔殺之本朝乾隆四十一年賜諡忠烈張連曜字景明建德人崇禎中以薦授巴州同知張獻忠圍城踰月連曜晝夜死守及陷罵賊死本朝乾隆四十一年賜入忠義祠邵子灼字季可建德人崇禎中以明經授郟縣知縣張獻忠來攻勢不支乃整衣冠懷印綬曰此人臣致身時也城陷死之本朝乾隆四十一年賜諡節愍胡尚綵字景素淳安人崇禎中為鳳陽衛經厯流賊犯境同留守協力奮撃却之已賊復至被執不屈死本朝乾隆四十一年賜入忠義祠張日新字心白建德人崇禎時由歲貢為宿松訓導遷齊東教諭見海内寇起時與諸生講藝習射招土寇安守夏降之及齊東被圍與守夏登陴守城陷及子光裔死之妻方氏立自刎守夏亦從之死本朝乾隆四十一年賜入忠義祠濮有容分水人崇禎末由舉人授安陸知縣流賊薄城竭力拒守賊合兵圍之遂陷一門十九人皆死本朝乾隆四十一年賜諡烈愍本朝徐萬照分水諸生父志進明襄陽通判順治初山賊執志進索餽貧無以應萬照奔前救父願以身代賊不聽殺志進萬照以頭觸之亦遇害毛周尹字藩侯遂安人少有至性母卒哀毁骨立順治乙未山寇掠其父之恒索財取贖周尹鬻產稱貸三赴賊營求贖不得力已竭號泣請以身質父歸周尹竟死於賊康熙間旌其門同邑詹符負父避亂賊追及以身蔽父被殺父卒免毛際可字會侯遂安人順治戊戌進士授彰德府推官時盜犯房有才等十三人獄已定際可廉得其冤釋之改固城知縣修湑河五門堰以溉田再補祥符以博學宏詞薦罷歸閉户著書文名大著翁旦壽昌人順治十二年以武進士任廣西守備追剿土寇陣殁又王賜元桐廬人康熙二年以長沙照磨死郝摇旗之難方象瑛字渭仁遂安人九歲能詩登康熙丁未進士以中書舍人薦試博學宏詞授編修㝷告歸所著有健松齋集徐士訥字恂若淳安人康熙丙辰進士授嵩縣知縣有治績湯斌稱之曰冰清玉潔實心愛民海内第一廉吏也擢知濟寕州歲飢賑恤全活十萬餘人卒於官嵩濟民並祀之方楘如字文翰淳安人康熙丙戌進士官豐潤知縣博聞強記鈎貫百家嘗摘漢儒箋註之舛者論祫禘郊廟之制尤精確制藝尤膾炙人口乾隆初舉博學宏詞旋舉經學皆不就年八十餘卒著有集虛齋集徐亮之桐廬人母殁築盧依墓以桐杖植於墓旁左右各活一枝年六十九卒於廬乾隆三十一年以孝旌表申屠開基桐廬人父患背癰開基往浦江求醫暮經羊角嶺遇虎乃跪地對天黙禱虎竟帖尾去及醫至曰毒已深入不可出宜不治開基泣涕請以口吮癰冀出膿血以減其毒醫曰若既能爲其難姑試之開基吮膿血至盡醫爲投以藥父疾竟愈乾隆三十五年以孝旌表又遂安縣任鼎福俞樹勳方之琪王思祖童愷余琪余性初呉可職姚鳳翺並以孝聞於康熙雍正乾隆間先後旌表呉文邁建德縣人以孝聞嘉慶十六年旌表流寓漢嚴光餘姚人少與光武同遊學光武即位除爲諫議大夫不屈歸耕於富春山後人名其釣處爲嚴陵瀨唐喻鳧南昌人其先遭亂數遷開成中鳧以詩名聞於時徙家睦州之分水縣嘗與方干賦詩往還宋黃裳延平人嘗遊桐廬讀書浮橋禪定院又寓居閬仙洞自號紫元翁豐稷明州人徽宗時以劾蔡京安置睦州家於青溪汪瑞友陳留人靖康初上書辨宣仁誣謗遭黜渡江寓居桐廬之蘆茨源自號七里先生謝翺長溪人少倜儻有大志文天祥開府延平翺叅軍事天祥死翺去之浙東登嚴子陵釣臺設天祥主以竹如意擊石作楚歌招之後卒即瘞子陵臺南著有詩八卷文二十卷明王宗顯和州人元末避亂僑居嚴州胡大海克嚴禮遇之克婺太祖即以宗顯知府事列女宋徐氏二女建德人長清次淳年及笄元兵下嚴州父師頃㩦之避於薛山父適出而兵奄至清謂淳曰吾家世清白豈可受辱遂相牽投崖死元王氏女建德人至大間父出耘舍旁遇豹為所噬曳之升山父大呼女識父聲驚趨救以父所棄鋤擊豹腦殺之父乃得生俞士淵妻童氏嚴州人姑性嚴待之寡恩童柔順無少拂其意至正十三年賊陷威平官軍復之乃縱兵剽掠至士淵家童以身蔽姑衆欲汚之大罵不屈卒以刀擊其左臂又一卒斷其兩臂罵猶不絶遂遇害明何道妻鄭氏淳安人年十八而寡家貧無子守志不屈舅姑欲奪其節自縊死張佑妻宋氏淳安人年十九歸佑二年佑卒時有挾勢欲其更適者逼令登輿度力不能勝乃佯許諾入室沐浴更衣從容自縊何金鹿妻魯氏淳安人年十六適何甫三載夫亡家貧舅姑憫其無子許再適童氏子魯聞自經死方氏女淳安人年十六許聘徐應芳未嫁應芳殁女聞欲奔喪父母不許乃毁容剪髮服衰哭勺漿不入口舅姑逆之歸勤婦職舅姑殁代執子喪立嗣承祧曰吾今可遂初志矣不食卒童敦妻李氏壽昌人少寡舅為其夫營葬所氏請結壙於旁示無他志父逼令改適氏知勢不可遏又慮死夫家遺禍舅姑乃屬舅姑以後事泣拜而歸自經死舅姑為送衣衾及棺至與敦合葬李志安妻劉氏壽昌人夫亡父母欲奪而嫁之劉號哭哀愬父母執愈堅遂製長幡繪夫及己像於上置篋中泣别舅姑歸父母喜出迎劉已投池死宣德元年旌表又淳安鄭二枝妻方氏夫亡誓守後父以利啗其舅強委禽方飲藥死隆慶中旌表呉俸妻童氏壽昌人俸亡遺二孤尚乳誓不再適日㩦二孤號泣淚枯眇一目子就外傅躬紡績以充修