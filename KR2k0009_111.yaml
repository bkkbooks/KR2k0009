body:
  text: 嚴州府在浙江省治西南二百七十里東西距三百七十里南北距一百七十五里東至杭州府富陽縣界一百四十里西至安徽徽州府歙縣界二百三十里南至金華府蘭谿縣界四十里北至杭州府於潛縣界一百三十五里東南至金華府治一百四十五里西南至衢州府治二百里東北至杭州府治二百七十里西北至歙縣治三百十里自府治至京師三千五百八十里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋屬呉後屬越戰國屬楚秦為會稽鄣二郡地漢屬㑹稽丹陽二郡東境為富陽縣地屬㑹稽西境為歙縣地屬丹陽後漢屬呉丹陽二郡建安十三年孫呉始分置始新等縣又於始新置新都郡治在今府西境晉太康元年改曰新安郡宋齊以後因之隋平陳郡廢仁夀三年復置睦州大業初改為遂安郡治雉山縣即漢始新縣唐武德四年復於雉山縣置睦州又於桐廬縣置嚴州七年廢嚴州以睦州為東睦州八年復曰睦州萬歲通天二年始移治建德縣天寶初改新定郡屬江南東道乾元初復曰睦州屬浙江東道五代屬呉越國宋亦曰睦州新定郡屬兩浙路宣和初升為建德軍節度三年改曰嚴州遂安軍節度咸淳元年升為建德府以高度二宗皆嘗為潛邸也屬浙西路元至元十四年改建德路屬江浙行省明初改建安府洪武八年改曰嚴州府屬浙江布政使司本朝因之隸浙江省領縣六建德縣附郭東西距一百三十五里南北距一百里東至桐廬縣界五十五里西至淳安縣界八十里南至金華府蘭溪縣界四十里北至分水縣界六十里東南至金華府浦江縣界七十五里西南至壽昌縣界六十里東北至桐廬縣界六十里西北至分水縣界五十五里漢會稽郡富春縣地三國呉黃武四年始析置建德縣屬呉郡晉以後因之隋平陳廢入金華縣唐武德四年復置屬嚴州七年與州俱廢永淳二年分桐廬雉山二縣復置屬睦州萬歲通天二年始移睦州來治五代因之宋為建德府治元為建德路治明為嚴州府治本朝因之淳安縣在府西一百六十五里東西距一百五十三里南北距二百二里東至建德縣界八十里西至遂安縣界七十三里南至遂安縣界四十三里北至杭州府昌化縣界一百五十九里東南至夀昌縣界七十五里西南至遂安縣界二十里東北至分水縣界八十六里西北至安徽徽州府歙縣界九十七里漢丹陽郡歙縣地後漢建安十三年孫權析置始新縣并置新都郡晉為新安郡治宋齊以後因之隋平陳改縣曰新安仁壽中為睦州治大業初改縣曰雉山為遂安郡治唐初仍為睦州治文明元年又改曰新安萬歲通天二年始移州治建德以縣屬焉開元二十年改曰還淳永貞元年避諱又改曰青溪五代因之宋宣和三年改曰淳化紹興元年始改曰淳安屬建德府元屬建德路明屬嚴州府本朝因之桐廬縣在府東北九十五里東西距八十五里南北距一百二十里東至杭州府富陽縣界四十五里西至建德縣界四十里南至金華府浦江縣界七十里北至分水縣界五十里東南至浦江縣界九十里西南至建德縣界四十里東北至杭州府新城縣界四十里西北至分水縣界七十里漢富春縣地三國呉黄武四年始分縣之桐溪鄉置祠廬縣屬呉邵晉宋以後因之隋平陳縣廢仁夀中復置屬遂安郡唐武德四年於縣置嚴州七年州廢屬睦州五代呉越改屬杭州宋太平興國三年還屬睦州南宋屬建德府元屬建德路明屬嚴州府本朝因之遂安縣在府西少南一百八十里東西距一百三十三里南北距一百二十四里東至淳安縣界四十三里西至安徽徽州府休寕縣界九十里南至衢州府西安縣界七十九里北至淳安縣界四十五里東南至淳安縣界三十七里西南至衢州府開化縣界七十里東北至淳安縣界四十里西北至淳安縣界四十二里漢丹陽郡歙縣地後漢建安十三年孫權置新定縣屬新都郡晉太康元年改曰遂安屬新安郡宋齊以後因之隋平陳省入新安仁壽三年復置屬遂安郡唐屬睦州五代因之宋屬建德府元屬建德路明屬嚴州府本朝因之夀昌縣在府西南九十里東西距一百里南北距九十里東至建德縣界二十五里西至遂安縣界七十五里南至衢州府龍游縣界四十里北至淳安縣界五十里東南至金華府蘭溪縣界三十五里西南至衢州府西安縣界六十里東北至建德縣界三十里西北至淳安縣界五十里漢富春縣地三國吳分立新昌縣晉太康元年改曰夀昌屬呉郡宋齊以後因之隋廢唐永昌元年分雉山縣復置載初元年廢神龍元年復置屬睦州五代因之宋屬建德府元屬建德路明屬嚴州府本朝因之分水縣在府西北一百二十三里東西距一百十里南北距七十五里東至杭州府新城縣界六十里西至淳安縣界五十里南至建德縣界六十三里北至杭州府於潛縣界十二里東南至桐廬縣界二十里西南至建德縣界五十里東北至杭州府臨安縣界六十三里西北至淳安縣界七十八里漢富春縣地三國呉以後為桐廬縣地唐武德四年始析置分水縣屬嚴州七年仍廢入桐廬如意元年復置曰武盛縣屬睦州神龍元年復曰分水五代因之宋屬建德府元屬建德路明屬嚴州府本朝因之形勢據浙江上游當甌歙數道之衝宋錢勰浮橋記羣峯囘環一水縈帶宋蘇頌雲香閣記溪山秀妙號清涼國新定志四達皆巇險之道郡志州境山谷居多地狹且瘠圖經序風俗俗號輯睦因以名邦可以無事治不可以多事理圖經山嶮土磽蠶桑是務蒸茶割漆以要商賈貿易之利方輿勝覽民貧而嗇多文學之士明統志城池嚴州府城周八里二十三步門五東西北有濠明初因舊址改築本朝康熙雍正中屢修淳安縣城無城止立四門桐廬縣城無城止立四門遂安縣城周四里一百十六步門五明正德八年築本朝乾隆十年三十