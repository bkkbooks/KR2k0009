若水武陵人至元間授温州路總管初至郡值歳歉廣招米艘民賴以濟趙鳳儀汴人延祐四年為温州路總管創廟學延名師以淑後進瑞安飛雲渡舟屢為暴風所覆設法豫備立石江滸政治以能名賈達保定人泰定二年知平陽州事亷幹精明委讞他邑疑獄悉得其情赴省經金華有萬户伊實默者縱兵暴橫民苦之達造其門責以大義伊實默遂拜謝軍兵自是肅然伊實黙舊作翼石抹今改正尊達實哩高昌人至正十年温州路總管時方國珍寇城官民逃散獨與千户呉世顯哈迪爾等擊卻之賊退治城郭繕甲兵後賊再至不敢近尊達實哩舊作左答納失里哈迪爾舊作黒的兒今俱改正明王銘和州人洪武初由長淮衞指揮僉事移温州繕城濬濠悉倍於舊又加築外垣起海神山屬郭公山首尾二千餘丈宏敞壯麗屹然東浙巨鎮帝甚嘉之嘗請告暫還州之士女遮道送迎長吏皆相顧嘆自謂有愧王指揮多焉王全山東人洪武九年為温州同知處州賊葉丁香優瑞安民多脇從延安侯唐勝宗統兵至府欲縱殺全持不可勝宗怒欲斬全全曰良民不從叛挈妻子來此可縱殺乎勝宗意解民得免黃信中餘千人永樂中知樂清縣奸民紿寡婦至京誣告鄉人謀叛而已逸去有司擊其婦以聞詔行所司會鞫獄久不決信中亷得其情力抵為誣獲全者甚衆盜殺一家三人獄久不決信中禱於神得真盜遠近稱之何文淵廣昌人宣德五年知温州府居三年政化大行入覲道括蒼嶺永嘉丞遣其子以金贐卻之後人為立卻金館既復任益盡心職業暇則與諸生章綸革論經史處州盜起官軍討之不克文淵詗知賊據烏風洞悉捕其渠魁時都指揮李貴等執平民使誣服文淵移牒言賊己獲於是二百餘人皆得釋民有兄弟爭財諭以天倫大義兄弟感悔如初劉謙祥符人宣德中代何文淵知府事數年政舉民安王允厯城人景泰中為温州知府以撫艱弱祛蠧敝為首務山賊出没羅洋親入巢穴計擒之諸善政為浙稱首文林長洲人成化中授永嘉知縣擊豪右毁淫祠疏通水利丈量漏賦及新漲田以足糧額廉聲大著尋遷知府民益安其政范奎湘陰人成化中知温州府得民心被論調官州人章綸爲南京禮部侍郎奏言奎解官之日士民三萬人哭泣攀轅留十八日乃得去請還之以慰民望章下所司竟報寢劉遜安福人成化十六年任永嘉知縣廉介不阿剖決積獄邑無冤民頒白鹿洞規以訓士邑人肖像祀之秦煌蒲岐所百户嘉靖中防海倭寇大至以孤舟力戰援絶被執罵賊而死黃釧安溪人厯官温州同知嘉靖三十四年倭入犯釧擊走之知倭必復來日夜爲死守計又三年倭果大至釧出城逆擊分軍爲三釧將中軍其二軍帥皆䊵袴子約左右相應援及釧與倭遇力戰良久倭方不支二軍帥望敵而潰倭合兵擊釧釧腹背受敵爲倭所得脅之降不屈令以金贖釧且笑且罵曰爾不知黄大夫不受錢耶倭怒裸而寸斬之事聞贈叅議官一子有司建祠楊岳清江人嘉靖中爲温州通判倭寇猝至薄郡城岳守東門擐甲督戰民千百號城下悉縋入給以薪米凡相持七畫夜隨機應變倭始退走何鈁常熟人萬厯中知平陽縣以官田均四則增改折以補府庫民便之築鳳浦埭蓄三十六源水灌田四十萬畝本朝熊應鳳酆都人順治三年任温州守備平陽縣初入版圖山寇乘盧襲城據守應鳳自郡馳破之移汛盤石十五年海寇人犯城陷不屈死闔門死者三十二人事聞贈副將賜祭一壇張聯標直隸玉田人知泰順縣順治四年流寇陷城被執脅降不從死之劉偉德化人順治十六年以通判攝樂清縣事時縣被寇燬城邑為墟徵餉甚急偉嘆曰民顛連若此重以徵求是驅之死也我官可罷餉決不可徴力為申請得免王世顯漢陽人康熙三年知永嘉縣吏事精敏時嚴海禁鹽場俱置界外民苦淡食世顯申請於内地煎燒鹽商百計撓之不為動馬琾陜西人康熙十一年知永嘉縣明決有才十三年閩變守將内叛脅之不屈遂遇害事聞贈按察使司僉事廕一子楊春芳四川萬縣人任温州城守副將康熙十二年耿逆寇浙春芳率兵力戰多所斬獲瑞安陷被執大罵賊怒磔殺之贈太子少保左都督魏萬侯奉天人任温鎮左營逰擊甲寅閩變寇圍瑞安縣萬侯率師赴援至北湖嶺斬馘甚衆以後軍不至偕子棟力戰死於慈湖贈副將時百總崔堯龍亦戰死北湖嶺下蘇穆岱滿洲正藍旗人任樂清副將耿逆陷温人無固志穆岱堅意拒守為其下所害穆岱舊作木代今改正徐天平厯城人任温鎮左營千總康熙十五年與賊戰於大西山被創死事聞賜祭一壇廕一子人物南北朝宋張進之永嘉安固人少有志行厯五官主簿永寕安固二縣領校尉家世富足荒年散財救贍鄉里全濟者甚多太守王味之有罪當見收逃避進之家供奉經時盡其誠力味之嘗避地墮水沈没進之投水拯救相與沈淪久而得免時劫掠充下至進之門輒相約勒不得侵犯其信義所感如此元嘉初詔蠲其徭役俞僉永嘉人孫恩之亂永嘉太守司馬逸之被害妻子並死兵寇之際莫敢收藏僉為郡吏以家財冒難棺斂逸之等六喪送至都葬畢乃歸鄉里宋陳侃温州人五世同居太宗時詔旌其門許景衡字少伊瑞安人元祐進士宣和六年召為御史朝廷用童貫為河東北宣撫使將北伐景衡論其貪謬不可用者數十事不報以忤王黼為所逐高宗即位除御史中丞黄潛善欲逐東京留守宗澤景衡力爭之帝悟澤乃安除尚書右丞黄潛善等素惡其異己譖罷之行至京口卒諡忠簡景衡得程頤之學志慮忠純議論不與時俯仰既没高宗思之詔賜其家温州官舍一區劉安節字元承永嘉人與從弟安上師事程頤登元符進士除御史決大獄多所平反後謫知饒州徙宣州值水疫安節設法拯救全活甚多安上字元禮紹興進士厯官給事中學者稱為二劉林石字介夫瑞安人父喪廬墓三年母年一百十九歲石年九十餘白首執喪不踰禮節時新學盛行石獨以春秋敎授鄉里學者稱塘嶴先生薛良顯字貴勤瑞安人崇寕進士累官大宗正丞出為江東轉運使江寕軍校周德作亂良顯聞變率衆與戰斬十餘級力不勝死之事聞贈卹良渥黄友字龍友平陽人崇寕進士調永嘉瑞安二縣主簿攝華陰令有政聲方臘竊發友同諸將收復所至披靡通判澶州會郭藥師以常勝軍叛燕士嚮應友獨領數千人與戰躬冒矢石破裂唇齒欽宗召對進直徽猷䦚制置司叅謀官同种師中解太原圍友遣兵三千奪榆次得糧萬餘斛明日大軍進十里而止友亟白師中地非利不聽迨曉兵果四合衆潰敵執友欲降之厲聲曰男兒死耳遂遇害帝書忠節傳家旌其閭官其後八人仰忻字天貺永嘉人力學以篤行稱年五十餘執母喪盡孝禮躬自負土廬於墓側有慈烏白竹之瑞紹聖中郡守楊蟠表其里孝廉坊大觀二年以行取士郡以忻應詔未幾卒特贈將仕郎呉表臣字正仲永嘉人大觀進士累官遷右正言高宗詔臺諫條陳大利害表臣之䇿多見用累遷吏部尚書翰林學士秦檜欲使使金議地界指政事堂曰歸來可坐此表臣不答又以議大禮忤意罷去起知婺州進敷文閣直學士提舉太平興國宫晚號湛然居士自奉無異布衣時鄉論推其清約薛弼字直老永嘉人政和進士靖康中為湖南運判贊岳飛討平楊么除户部郎官再知荆南桃源巨盜任俊既招安復謀叛不能制乃以委弼弼許俊以靖州俊至則斬以徇福州盗作詔弼至郡四年盡平之累擢敷文閣待制卒諡忠簡婁寅亮字陟明永嘉人政和進士為上虞丞建炎四年高宗至越寅亮上疏乞選太祖諸孫有賢德者視秩親王俾牧九州以待皇嗣之生庶幾上慰在天之靈下係人心之望帝讀之感悟擢監察御史秦檜惡之諷言者論罷職陳桷字季壬平陽人政和二年廷對第三紹興初為金部郎中時言事者率毛舉細務桷抗言今當專講治道之丰修政事以攘敵國又言刺史縣令不能得人乞選監司重其權久其任厯太常少卿除權禮部侍郎普安郡王出閣桷以國本未立宜厚其禮以繫天下望乃以皇子出閣禮上之忤秦檜遂罷後知襄陽府改知廣州充廣南東路經略安撫使未至卒桷寛洪醖藉以誠接物而恬於榮利不附秦檜自號無相居士有文集十六卷蕭振字德起平陽人政和進士調信州儀曹婺州兵曹俱有異績任滿歸以執政薦召封敷奏數事皆中時病拜監察御史累官敷文閣學士知成都府兼安撫制置使振好奬善類在蜀威行惠孚卒之日民老稚相與聚哭於道家居頻江見渡者多溺死振造大舟傭工以濟人感其德相與名其江為蕭家渡云丁仲修字敏之温州人方臘黨俞道安陷樂清將渡江仲修帥鄉兵禦諸樂灣鄉兵失據而散仲修以餘兵與賊戰力屈死之張闡字大猷永嘉人幼力學博涉經史善屬文宣和進士厯鄂台二州敎授紹興中累遷秘書郎秦檜每薦臺諫必先諭以己意嘗謂闡曰秘書久次欲以臺中相處何如闡謝曰得老死秘書幸矣檜默然竟罷主管台州崇道觀厯泉衢二州通判孝宗在王邸妙選宫僚謂莊重老誠無踰闡者改命祠部兼建王府贊讀孝宗即位權工部侍郎應詔條時務惟闡與王十朋指陳時事斥權倖無所囘隱除工部尚書兼侍讀引疾乞骸骨以顯謨閣直學士提舉太平興國宫卒朱子嘗言秦檜力主和議士大夫始終言金人不可和者惟胡銓張闡耳徐震瑞安人宣和間睦寇至吹臺嶺震率義兵捍禦力戰死之氏為立祠薛徽言字德老温州人登進士第紹興二年以權監察御史宣諭湖南時郴道桂陽旱饑徽言請於朝不待報即諭漕臣發衡永米以賑而以經制銀市米償之使還以呂頤浩言出知興國軍入為郎遷起居舍人秦檜與金人議和徽言與晏敦復等七人疏爭之一日檜於上前論和徽言直前引義固爭反覆數刻後中寒疾卒王十朋宇龜齡樂清人資穎悟日誦數千言及長有文行秦檜死高宗親䇿士擢十朋第一學者誦其䇿以擬古晁董除秘書郎秦檜久塞言路至是十朋與馮方李浩相繼論事上多嘉納孝宗受禪累遷侍御史每見必陳恢復之計因論史浩八罪上為出浩又論史正志林安宅奸皆罷去之張浚失律自劾十朋疏乞用浚以堅恢復之志改除吏部侍郎刀辭出知饒州移知䕫州湖州泉州凡厯四郡布上恩恤民隱所至人繪而祀之以龍圖閣學士致仕卒諡忠文子聞詩聞禮皆篤學自立聞詩知光州提點江東刑獄聞禮知常州江東轉運判官為治能守家法鄭伯熊字景望永嘉人紹興進士厯官宗正少卿以直龍圖閣知建寕府卒伯熊與薛季宣皆以學行聞而伯熊於古人經制治法討論尤精薛季宣字士龍徽言子年十七從荆南帥辟書寫機宜文字獲事袁溉漑嘗從程頤學盡以其學授之於古封建井田鄉遂司馬法之制靡不研究講畫皆可行於時樞密使王炎薦於朝召為大理寺主簿時淮北民多款塞者宰相虞允文白遣季宣行淮西收以實邊季宣為表廢田相原隰户授屋丁授田凡為户六百八十有五分處肥黄州間並遣歸正者振業之及還屢進讜言帝輒稱善除大理正出知湖州改知常州未上卒季宣於詩書春秋中庸大學論語皆有訓義藏於家徐誼字子宜温州人乾道進士累官太常丞孝宗臨御久事皆上決執政惟奉㫖而行羣下多恐懼顧望誼諌曰若是則人主日聖人臣日愚陛下誰與共功名乎及論樂制誼對以宫亂則荒其君驕商亂則陂其臣壊上改容曰卿可謂不以官自隳矣孝宗崩光宗疾誼與趙汝愚決䇿請太皇太后立寕宗進權工部侍郎知韓伲胄必為國患告汝愚宜飽其欲而遠之不聽後責南安軍安置久之復官厯知建康隆興二府卒諡忠文王自中字道甫平陽人少負奇氣自立崖岸由是忤世乾道四年議遣歸正人自中伏麗正門爭論坐斥徽州放還淳熙中登進士第爲分水令樞宻使王藺薦召對帝壯其言將改秩爲籍田令以諫疏罷後厯知信州卒葉適字正則永嘉人爲文藻思英發登淳熙進士召爲太學正遷博士嘗薦陳傳良等三十四人於丞相後皆召用時稱得人㑹朱子爲林栗所劾適上疏爭之出知蘄州入爲尚書左選郎官孝宗崩光宗不能執喪適贊趙汝愚内禪計遂定寕宗即位遷國子司業爲御史胡紘劾罷起知泉州厯權工部侍郎改吏部知建康府累進寶文閣學士卒諡忠定學者稱水心先生戴溪字肖望永嘉人淳熙五年爲别頭省試第一厯官太子詹事兼秘書監景獻太子命類易詩春秋論語孟子資治通鑑各爲說以進權工部尚書以龍圖閣學士致仕卒諡文端所著有通鑑筆議將鑑論㫁諸書族子栩亦有學行著東都事略林逢龍字慶雲平陽人弟廷龍字雷發俱太學生咸淳中兄弟同叩閽言事忤賈似道歸田里後逢龍又上封事乞正似道誤國罪急調兵解襄樊圍似道怒削其籍押還本貫屏迹居山元兵至温素聞逄龍名索得之逢龍攘臂怒罵以腹觸刃而死廷龍亦被執不屈同日遇害陳傅良字君舉瑞安人師事鄭伯熊薛季宣入太學與張栻呂祖謙友善登進士甲科敎授泰州改太學錄出通判福州光宗時累遷起居舍人帝不朝重華宫傅良切諫至趨上引帝裾不聽傅良哭於庭下殿徑行寕宗即位召為中書舍人兼侍讀直學士院會詔朱熹與在外宫觀傅良言熹難進易退内批之下皋朝驚愕臣不敢書行熹於是進寶文閣待制與郡嘉泰二年知泉州進寶謨閣待制終於家諡文節學者稱止齊先生所著有詩解詁周禮説春秋後傳左氏章指行於世曹叔逺字器逺瑞安人少學於陳傅良登紹興進士為國子學錄忤韓侂胄罷後累官權禮部侍郎遇事獻替多所禆益終徽猷閣待制諡文肅嘗編永嘉譜識者謂其有史才林略字孔英永嘉人慶元進士累遷左右司諌兼侍讀告帝曰虚心以為從諫之本從諫以為求治之本升侍御史試右諌議大夫嘉熙三年同僉書樞密院事以資政殿學士致仕曹豳字西士叔遠族子嘉泰進士調重慶府司法叅軍郡守度正欲薦之辭曰章司錄母老請先乏正敬嘆厯浙西提舉常斗面陳和糴折納之弊移折東提點刑獄召為左司諫與王萬郭磊卿徐清叟俱員直聲號嘉熙四諫進禮部侍郎不拜疏七上進古詩以寓規正知福州再以侍郎召為臺臣所沮遂守寶章閭侍制致仕卒諡文恭薛叔似字象先永嘉人遊太學解褐國子錄初登對論祖宗立國之初除二税外取民甚輕自熙寕以來賦日増而民困兹甚孝宗嘉納除樞密院編修時倣唐制置補闕拾遺上自除叔似左補闕遂劾首相王淮去位光宗受禪厯權户部侍郎韓伲胄開邊除兵部尚書宣撫使伲胄誅謫福州卒諡恭翼叔似雅慕朱子窮道德性命之㫖談天文地理鐘律象數之學有藁二十卷蔡幼學字行之瑞安人年十八試禮部第一從陳傅良遊文輒出傅良右孝宗聞之因䇿士將置首列時外成張説用事宰相虞允文梁克家皆陰附之幼學對䇿切直帝不懌允文尤惡之遂得下第敎授廣德軍光宗立擢校書郎寕宗即位幼學應詔陳言帝稱善將進用之時韓侂胄方用事指正人爲偽學幼學遂力求外補除提舉福建常平後遷國子司業兼權中書舍人侂胄旣誅餘黨尚塞正路幼學次第彈劾竄黜尤衆號稱職厯權兵部尚書兼太子詹事卒幼學器質凝重語不妄發中年述作益窮根本嘗績司馬光公卿百官表年厯大事記備志辨疑編年政要列傳舉要凡百餘篇傳於世葉味道初名賀孫以字行更字知道温州人少刻志好古學師事朱子試禮部第一登嘉定進士第調鄂州敎授理宗時授太學博士兼崇政殿說書故事說書之職止於通鑑而不及經味道請先說論語詔從之所奏陳無一言不切於君身推致於治道遷秘書著作佐郎卒所著有四書說大學議義及經筵口奏等書陳埴字器之永嘉人少穎悟從朱子遊所見超卓登嘉定進士以通直郎致仕四方從學數百人稱爲潛室先生所著禹貢辨木鐘集等書行世劉黻字聲伯樂清人淳祐十年試入太學時丁大全逐丞相董槐將奪其位黻率同舍生伏闕上書言朝廷進退大臣當以禮時執政送南安軍安置至南安盡取濂洛諸子之書輯成十卷名曰濓洛論語及大全貶還太學侍御史陳垓誣程公許右正言蔡榮誣王之純黻又率諸生上書極論咸淳中拜監察御史厯刑部侍郎試吏部尚書江上潰師陳宜中謀擁二王入海以兵逆黻及羅浮以疾卒侯畐字道子樂清人三貢於郷兩試轉單司皆第一以武舉授合浦尉寶祐五年通判海州兼河南府計議官李松壽據山東突出漣泗畐鏖戰城下死之闔室遇害諡節毅仍立廟其鄉畐所著有霜厓集陳宜中字與權永嘉人入太學有文譽寶祐中與黃鏞劉黻林測祖陳宗曾唯六人上書攻丁大全大全怒削宜中籍拘管他州號為六君子景定三年廷試第二德祐元年以知樞密院事拜右丞相益王立復以為左丞相井澳之敗欲奉王走占城乃先如占城遂不反後元兵伐占城宜中走暹弟自中字與可登咸淳第宋末同秀王至闕遇元兵力戰死陳虞之字雲翁永嘉人登咸淳第遷秘書省兼國史院元兵至温虞之率子姓鄉人登芙蓉巖死守越一歲為所敗遂自剄從者八百餘人皆死之潘方平陽人寶祐進士調慶元府市舶提舉慶元降附方不屈赴水死徐臻温州人父官河南徳祐元年臻往省以道阻會文天祥勤王臻往依之以筆札典樞密小心精練天祥被執臻脱難復來願從天祥北行扶持患難備殫忠款至隆興病死林景熙字德陽平陽人上舍釋褐厯泉州敎授禮部架閣宋亡不仕嘉木揚喇勒智發宋諸陵棄其遺骨景熙與同里鄭朴翁等數人相率為採藥者以草囊拾之又聞理宗顱骨為北兵投湖中復以錢購漁者網而獲乃盛二函葬之越山植冬青樹為識賦冬青行所著詩六卷曰白石樵唱朴翁字宗仁歸隱薌山瀑下景熙銘其墓有精衞填海馮霄銜土之句聞者悲之嘉木揚喇勒智譯見前元李孝光字季和樂清人少博學篤志復古隱居雁蕩山五峯下四方之士遠來受學名譽日聞台哈布哈以師事之至正七年以秘書監著作郎召見帝於宣文閣進孝經圖説帝大悦賜上尊升秘書監丞卒於官孝光以文章負名當世其文一取法古人而不趨世尚非先秦兩漢語弗以措辭有文集二十卷台合布哈譯見前史伯璿字文璣平陽人少嗜學博通經史深得朱子宗㫖著四書管窺以發明之又著管窺外編辨論諸經史天文地理古今制度名物終身隱居不仕張庸字存中温州人精太乙數以䇿于經略使李國鳳承制授福建行省員外郎治兵杉關頃之計事赴京師因進太乙數圖順帝喜之擢秘書少監命庸團結房山除刑部尚書仍領團結會諸寨既降庸守駱駝谷請援於庫庫特穆爾不報獨堅守拒戰衆將潰庸無去志已而寨民執庸出降庸不屈被殺庫庫特穆爾舊作擴廓帖木兒今改正彭廷堅字允誠瑞安人至正進士厯同知建寕路總管府事定建陽浦城邵武諸賊升同知福建道宣慰使司副都元帥鎮邵武時鎮撫萬户岳煥素悍縱卒爲暴廷堅欲繩以法煥懼使部卒詐爲賊兵突入衆潰廷堅獨留不去遂遇害民哀泣如喪父母立祠像歲時祭禱贈中憲大夫福建道宣慰使都元帥封忠愍侯周樂瑞安人父日成通經能文海賊竊據温州拘日成置海舟上樂隨往事其父甚謹一日賊酋遣人沈日成於水樂泣請曰我有祖母幸留父侍養以巳代父死不聽樂抱父不忍捨遂同死焉桂完澤永嘉人爲平江路管軍鎮撫爲仇家所訴免官會賊攻昱嶺關行省假前官令從征完澤勇於討賊再戰關下皆勝尋又與賊闗爲所執其妻弟金德亦被擒脅之降德意未決完澤呼曰金舅男兒即死不可聽賊德曰此言最是因大罵賊怒剖二人之腹高明字則誠平陽人至正進士授處州錄事辟行省掾方國珍欲留置幕下即日解官旅寓鄞之櫟社明太祖聞其名召之以老疾辭還卒於家所著有柔克齋集趙汸稱其學博而深才高而贍云明孔克表平陽人至聖五十五代孫博學篤行尤精史學洪武中薦爲翰林修撰承詔注釋羣經賜名羣經類要卓敬字惟恭瑞安人性至孝讀書十行俱下舉洪武進士除户科給事中鯁直無所避乘間言諸王服飾與太子埒尊卑無序帝器用之厯户部侍郎建文初密疏言燕王雄才大略酷類高帝北平形勢之地士馬精強今宜徙封南昌羽翼既翦變無從生帝不能用燕王即位被執責以建議徙燕離間骨肉敬厲聲曰惜先帝不用敬言耳帝怒猶憐其才命擊獄使人諷以管仲魏徵事敬終不屈乃斬之誅其三族敬立朝慷慨美丰姿善談論凡天官輿地律厯兵刑諸家無不博究成祖嘗嘆曰國家養士三十年惟得一卓敬萬厯初詔建祠表墓福王時贈太子太保户部尚書諡忠貞本朝乾隆四十一年賜諡忠毅樂清樵夫不知姓名適負薪至港橋聞市人語云天子自焚死燕王即位假方博士卓侍郎等長吁失聲曰國既就篡我不願為其氓遂投橋下水中死本朝乾隆四十一年入祀忠義祠鄭士達字達世瑞安人洪武中以貢任肥鄉訓導燕兵南下徇廣平有議迎附者士達毅然曰我儒官也若效順如綱常何激守臣相與堅壁以守不克棄官歸永樂三年坐戍右屯衞慷慨而行竟死戍所黄淮字宗豫永嘉人洪武進士授中書舍人成祖即位召對稱㫖命入翰林直文淵閣進侍讀議立太子淮請立嫡以長太子立遷左春坊大學士帝再北巡淮並居守遷翰林學士以漢王譖下詔獄十年仁宗即位釋為通政使兼武英殿大學士進少保户部尚書及宣宗即位親征漢庶人淮留守如故既而乞歸卒諡文簡黄養正名蒙以字行瑞安人父潮光從卓敬學以貢任國子學正養正隨父至京永樂中以善書授中書舍人官至太常少卿正統中從駕北征死於土木之變景泰初贈太常卿鮑輝字叔大平陽人宣德進士授工科給事中改刑科數有建白英宗北征扈駕至土木死之景泰初贈官廕其子章綸字大經樂清人正統進士景泰初召為儀制郎中慷慨論事上太平十六䇿五年因災異復陳修德弭災十四事其大者謂内官不可干政佞臣不可假事權後宫不可盛聲色宜時朝謁兩宫皇太后於上皇展友于之情更請復汪后以正母儀還沂王儲位定天下之大本疏入帝大怒立下詔獄搒掠逼引交通南内瀕死無一語杖死復甦英宗復位擢禮部右侍郎綸既以大節為帝所重而性亢直不能諧俗石亨楊善共短之調南京屢有直言當事多不喜為侍郎二十年請老去卒贈南京禮部尚書諡恭毅子元應字順德成化進士為南京給事中偕同官極論陳鉞罪忤㫖停俸孝宗嗣位上治本五事官終廣東布政使陳璋字宗獻樂清人宏治進士厯刑部郎中疏諫武宗南巡廷杖嘉靖初擢大理卿後起刑部侍郎言官馮恩下狹刀救得不死謝病歸項喬字遷之永嘉人嘉靖進士仕至廣東叅政張孚敬當國以喬同里嘗欲引致華要謝却之仕宦二十餘年所至以善政聞平居未嘗一日廢書研窮理奥多獨得輒劄記以自鏡為文不事險棘靡豔所著有甌東文集王德字汝修永嘉人嘉靖進士授户科給事中定國公徐延德丐無極諸縣閒田為業德抗疏劾之李默長吏部怒德倨出為嶺南兵備僉事與撫按爭事落職閒住鄉居憤倭亂傾貲募健兒為保障計倭自梅頭至大掠德偕族父沛督義兵擊之至龍灣軍敗手射殺數人罵賊死倭自是不敢越德鄉事聞贈太僕少卿立祠曰愍忠沛贈太僕丞立祠予廕侯一元字舜舉樂清人僉事廷訓子嘉靖𥘉廷訓上書言不當考本生及私藩邸舊人逮繫獄一元年十三伏闕上書得謫判泗州既而希㫖者以他事再下獄乃再上陳冤狀都御史唐龍奇之出其父舉嘉靖進士授南京刑部主事累遷江西右布政使所至有惠政著詩十文二卷呉寶秀字汝珍平陽人萬厯進士授大理評事厯寺正出為南康知府湖口税監李道横甚揚帆直入湖口寶秀不與通會漕舟南道欲榷其貨遣爪牙吏還乘北風持牒捕漕卒寶秀拒不發道大怒飛章劾寶秀阻撓税稽詔遠寶秀下詔獄大學士及南北諸臣論救者疏十餘上釋為民歸家逾年中贈太僕少卿賜祭錄卒天啟其一子王瑞柟字廷馝永嘉人天啟進士授蘇州推官有聲厯職方員外郎擢湖廣兵備僉事崇禎十一年張獻忠據榖城乞撫總理熊文燦許不捷文之瑞柟言賊以計愚我誠合兵擊之何患燦怒不從乃列上從征歸農解散三䇿又不用明年獻忠叛瑞柟先巳丁内艱歸獻忠留書於壁言己之叛總理使然且曰不納我金者惟王兵備一人耳由是瑞名大著服闋未及陷作絶命詩自縊本朝乾隆四十一用而都年城賜諡忠莭本朝曾三鳳泰順人順治丙戌山寇焚劫鄉聚三鳯為練長率鄉兵禦守寇張甚三鳳奮身殺賊死之弟三重三益皆死之一門忠義鄉人立祠祀焉侯贈祖樂清人康熙十五年閩寇謀襲寕波贈祖偵知之以告知縣盛應宗令密報寕郡為賊所獲罵賊死同縣王福嘉慶十二年以温州營把總追剿洋匪至廣東外洋漂殁魏際隆永嘉人官黄巖鎮千總乾隆五十二年從剿林奭文殁於陣同縣陳世棟陳彪俱以把總同時戰殁又把總周耀光馮光陞徐大鏞外委黄金標張大魁俱於嘉慶年間追擊洋匪陣殁均議卹如例趙龍茂瑞安人乾隆九年旌表孝子列女三國吳瞿素永嘉人雖遭寇劫死不虧行為朱育所稱晉浣紗女永嘉人居蜃川莫知姓名家貧踰笄不嫁事母孝常紡績為養夜浣紗而旦成布及母卒抱石自沈里人為之立祠仍建浣紗坊表之唐盧氏女永嘉人居盧嶴一日與母同行遇虎將噬其母盧以身代後有人見其跨虎而行里為建祠上塘宋理宗朝封曰孝祐宋孫氏永嘉人許配馬氏子未婚元兵入城被執欲犯之不屈而死鮑氏二女名嫆娘婉娘樂清人元兵至走匿山中爲將所得欲汚之不從俱投高崖而死元黃福妻蕭氏永嘉人年十九夫亡無子其舅姑以衰暮無依欲納義子以蕭配之蕭力爭不能止乃佯許因請葬其夫畢扃户自縊死劉公寛妻侯氏永嘉人時方明善據郡公寛保守南溪爲其下金興所害侯氏收歛夫屍號泣曰寇至必辱我不如先死遂自縊趙氏女平陽人年二十未嫁爲賊所執紿賊取藏金自投於厠而死孫信妻黄氏平陽人至正十四年爲賊所掠并之行時賊燒民居火正烈黄躍投火死周誠德妻陳氏平陽人方明善攻平陽誠德戰敗攜陳避至徑口陳度不免先自縊死誠德殯之而去尋亦被殺明俞氏女名姻奴永嘉人父殁家貧母再適郡人劉斌姻奴無歸隨母入斌家母亡斌前妻子欲犯之百計諷誘不從一日持刃迫脅終不屈遂被殺陳氏女名盼瑞安人陳德升女幼許配鄰家子既而鄰子有盜行女不肯嫁父母欲改適復不從及鄰子死家人委曲勸諭終不聽獨居一室室後一井朝夕自汲不飲他水誓志以終林儉妻黄氏永嘉人夫早卒兄弟議奪之再適黄聞欲泣飾笄服赴河死程子文妻楊氏永嘉人年十八歸程不逾年夫溺死誓不再醮越五稔舅姑憐之曰吾家貧汝又無子能孀守乎族人又苦勸之楊截髮割耳抱石自沈詰旦得屍江渚面色如生胡廷相妻陳氏瑞安人嘉靖中海寇犯境廷相方卧病鄰婦呼陳俱去陳曰夫病何之已而閭巷悉奔竄陳乃扶夫出門至滴水巖遇賊驅之去賊強負陳於背陳大號嚙賊耳賊怒以刀刺其腹而死錢氏女樂清人嘉靖中寇劫白石女年十八與諸婦匿米篩岡洞中己而寇至女知事急遂躍千仞崖死錢氏女樂清人倭寇至父泳與妻女俱被執至龍泉潭女紿賊曰妾願隨行盍釋我父母乎賊喜乃麾其父母亟去而身隨賊行至合胡橋度父母巳逺乃躍投於水賊怒以戈搠死王氏樂清人嫁徐某嘉靖中倭至王夜紉其附身衣襦為必死計及寇至遽以兒并首飾授其婢曰必活吾兒遂自溺死王崇端妻管氏樂清人夫亡子僅兩月守節凡十三載倭寇至匿鹽窖中賊搜得驅之去不從賊怒磔殺之李萬妻潘氏平陽人萬故無子潘依於母家其父欲令改適既納幣及期潛自縊死李宗來妾馬氏樂清人宗來娶趙氏生子守繼甫期而宗來卒外家奪趙志并欲攜氏往氏誓死不從撫守繼補諸生以終其節呉寶秀妻陳氏平陽人寶秀守南康為湖口税監李道所誣被逮陳慟哭請偕行寶秀不可乃括餘貲及簪珥付其妾曰夫子行以為路費夜自經死南康士民建祠祀之方日升妻林氏永嘉人夫亡族有逼之嫁者林覺號泣赴水以救止林請夫木主拜泣抱主觸胸而死朱國祚妻許氏平陽人明末值亂軍至許堆草端坐其上舉火自焚死本朝李應官妻呉氏樂清人徙居平陽順治五年山寇作亂氏被掠即擲釵飾餌賊賊爭取之遂乘間投江死屍逆流四十里面色如生同縣呉德擊妻汪氏被海寇逼脅不從受刃而死趙應彩妻戴氏海寇陷城被獲至水邊躍入死趙存洵妻馬氏夫亡絶粒而死又永嘉施曉宇妻楊氏避亂山中兵逼汚不從被殺張聨標妾傅氏泰順人聯標爲羅陽知縣氏從行值山寇陷邑執氏拘於偽營賊渠百計誘不從令衆賊環刃脅之終不屈遂殺之林元標妻馮氏永嘉人順治甲午海艘掠郡氏與元標同被執賊首欲妻之氏投海死又同縣蔣世鵬妻林氏順治丁酉不汚賊死黃阿繼妻柳氏永嘉人順治戊戌海寇入犯氏遇賊度不能免抱子投河死賊義之取富室棺爲殮曰此烈婦也林占春妻童氏永嘉人耿精忠之變避入陳雅山寇至掠羣婦閉一室氏取竹簪自釘耳中不死乃抽賊刃㫁其喉寇嗟嘆而去鄭應瓚妻戴氏永嘉人土寇嘯聚氏恐見汚乘夜投溪死王靜媛永嘉人幼許呉氏爲室未婚夫死女往哭奠遂立志不嫁富室欲委禽焉女斷髪自誓終莫能奪王兆炎妻陳氏瑞安人康熙己未海寇登岸氏為所掠大罵不肯行賊曵至五六里氏髮盡落罵益厲賊怒刃之又平陽楊希華妻陳氏被掠賊以刃加氏頸逼汚之大罵不從遂遇害東湖烈婦樂清人失其姓康熙十四年閩寇亂婦被掠投望萊橋下死同縣趙君楊妻張氏隨夫避難遭掠至湖邊投水死又永嘉黄厥昌妻董氏避山中被脅投峭壁下死又鄭國幹妻徐氏楊敬與妻陳氏俱投溪死又節婦趙君質妻李氏趙手人妻谷氏黄琦妻李氏谷世昌妻黄氏朱廷棟妻錢氏朱尹邦妻金氏朱梓材妻侯氏俱於康熙雍正年間旌表李國禎妻蔡氏平陽人年二十二夫亡姑欲嫁之自經死同縣陳鯤妻黄氏陳博妻鮑氏曹調元妻杜氏王仁妻程氏陳郁妻呉氏施鐘篆妻白氏王朝泰妻金氏張球妾金氏余上棟妻陳氏張一純妻應氏夏咸泰妻王氏伊師益妻杜氏呉元鼎妻林氏陳其文妻戴氏伍可珍妻鄭氏並夫亡守節康熙雍正間旌表潘世志妻夏氏泰順人世志死於賊氏將以身殉家人救甦事舅撫孤守志弗渝順治年間旌又胡大詩妻林氏夏茂梓妻張氏王煒妻梅氏高聯霞妻夏氏梅元隸妻林氏王立經妻周氏胡大傅妻葉氏饒宗烈妻呉氏包茂正妻何氏潘仲視妻夏氏王念臣妻葉氏胡大展妻林氏並康熙雍正年間旌表王兆祥妻白氏永嘉人夫亡守節同縣陳應芳妻蔣氏葉德亮妻徐氏繆元濬妻江氏葉文驤妻張氏金之賢妻何氏劉子斌妻魏氏夏曰瑚妻施氏徐仲雲妻陳氏徐洪法妻董氏陳良拱妻林氏謝希瑞妻戴氏呉仁友妻黄氏朱幼哲妻董氏張維孝妻林氏金文綸妻董氏呉東美妻張氏陳良輔妻謝氏李偉翰妻徐氏陳國修妻蔡氏朱以陞妻張氏張振節妻屠氏邵鰲妻葉氏邵文顯妻賈氏杜廷揚妻朱氏張允發妻詹氏周天奇妻葉氏李國臣妻張氏王竹林妻陳氏王鵬化妻鄭氏翁子咸妻杜氏葉應芳妻張氏徐憲公妻董氏劉圖忠妻鄭氏周奇功妻伍氏王成均妻林氏葉幼足妻夏氏張廷三妻朱氏曾毅妻劉氏又貞女戴氏方紹正未婚妻張氏曾錫泮未婚妻焦氏俱於乾隆年間旌金學海妻胡氏沈瑞佑妻黄氏呉泰妻項氏劉起元妻趙氏陳亦介妻諸氏金世輝妻謝氏王天煒妻葉氏李世卓妻金氏管光鳳妻方氏諸朝瑞妻蘇氏徐祥烈妻葉氏生員黄祚妻王氏俱於嘉慶年間旌阮王錫妻余氏瑞安人夫亡守節同縣姜勳妻呉氏張鼎新妻王氏趙宗綉妻陳氏胡時露妻林氏何燧妻虞氏周邦耀繼妻陳氏陳于鰲妻葉氏方尚恭妻胡氏劉灝妻石氏繆維寶妻林氏項昌䕃妻胡氏蔣國琦妻張氏杜璟妻顔氏繆允珠妻林氏胡式逑妻蔡氏陳子盛妻顔氏池秉仁妻李氏高王謨妻周氏章丹桂妻宋氏又烈婦陳士林妻呉氏以拒强被毆死貞女鮑鴻哲未婚妻鍾氏鍾岳未婚妻胡氏俱於乾隆年間旌黄聖茂妻薛氏池秉㳟妻蔡氏柯夢其妻林氏王定山妻戴氏王朝棟妻周氏鄭芳蘭妻章氏唐元錫妻胡氏貢生項翊妻王氏貢生蔣鐸繼妻趙氏謝正禮妻陳氏蔣應摽妻呉氏俱於嘉慶年間旌高爾鏡妻諸葛氏樂清人夫亡守節同縣鄭應澐妻陳氏俞朝玉妻何氏王國節妻鄭氏陳錫如妻林氏徐元慶妻王氏周希玉妻蔣氏周光鍵妻謝氏楊國聖妻黄氏徐賡臣妻倪氏朱熙伯妻王氏鄭瑞華妻虞氏陳敬和妻王氏連君彩妻朱氏史文標妻顧氏周謹妾唐氏高宏文妻盧氏妾楊氏俱於乾隆年間旌徐公勉妻鄭氏周時銈妻趙氏唐益凱妻林氏朱廷奎妻呉氏倪世鵬妻管氏趙汝遐妻林氏朱伯煦妻李氏葉秉坊妻朱氏趙翼珍妻鄭氏趙翼灝妻林氏林希燾妻朱氏又烈婦陳葉氏以拒姦被殺俱於嘉慶年間旌林允祥妻陳氏平陽人夫亡守節同縣陳元範妻繆氏王德傑妻黃氏陳繼涵妻牛氏陳効清妻呉氏金夢雷妻周氏應重連妻余氏周天伋妻全氏陳家格妻張氏陳文傑妻呉氏陳聖誥妻劉氏章仲全妻陳氏汪基繼妻游氏林繼貞妻陳氏方應魁妻張氏朱式金妻史氏趙宗聖妻王氏陳鳳姚妻張氏顧德馨妾厲氏孫國謨妻王氏鍾靈妻謝氏陳應虎妻黃氏顧徳薦妻林氏馮敬宗妻黄氏陳際會妻呉氏陳光燕妻黃氏俱於乾隆年間旌黄炳然妻項氏黄維有妻林氏夏維川妻王氏陳成誥妻斿氏梁用妻金氏陳夏煊妻趙氏應欽士妻楊氏項沛浩妻蕭氏徐有寛妻蘇氏監生鄭明誠妻黃氏又貞女王氏俱於嘉慶年間旌潘秉天妻夏氏泰順人夫亡守節同縣林茂麟妻董氏包惟儼妻張氏陶九瑩妻夏氏董士推妻梅氏徐士炎妻夏氏陳魁春妻王氏卓文統妻王氏饒世佐妻夏氏呉正城妻羅氏薛開春妻林氏林茂季妻薛氏呉鼎魁妻陶氏呉士瑛妻周氏王盛銘妻胡氏胡承詔妻董氏王立行妻夏氏呉維康妻周氏包惟雷妻林氏梅枝秀妻夏氏張正暉妻柳氏王翰妻曾氏梅枝丈妻徐氏張正槱妻馮氏高學傅妻葉氏高聯球妻孫氏夏士瓛妻包氏胡文詩妻林氏潘學辛妻楊氏王盛鎬妻夏氏俱於乾隆年間旌徐士炎妻夏氏饒肇唐妻林氏王國佐妻曾氏楊文嵩妻劉氏陶守麟妻林氏潘明善妻夏氏俱於嘉慶年間旌又玉環廳民婦呉劉氏因被謔捐軀於嘉慶年間旌附列於此仙釋三國呉朱孺子永寕人居大若巖下師王元真授以要訣嘗於溪畔見二犬逐之入枸𣏌叢中掘得其根狀如犬煑食之遂仙去唐馬湘梁時卜居瑞安縣之西峴山毎有柴霞覆其上其居左右有二十八井上應列宿傅隱遥永嘉人居大若巖辟榖修煉調露元年上昇今巖畔有登仙石宋張無夢永嘉人開元觀道士宋真宗召對講謙卦上問獨説謙卦何也對曰方大有時宜守之以謙上大悦特賜詩寵之還山宿覺温州人卯歳出家淨光寺叅六祖於曹溪嘗著禪宗悟修圓㫖十篇觀心十門證道歌時有梵僧傳其歌稱為東土大乘經乾符元年賜諡無相大師元布袋永嘉人名景元叅蔣山圓悟有得悟曰我這裏師禪都被元首