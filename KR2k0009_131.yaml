至謂屬吏曰此豈人情乎無閉糶以重困民削其禁自是商賈流通貨物益饒韋貫之名純以字行為湖南觀察使時國用不足遣鹽鐵副使程异督諸道賦租异諷州縣厚斂以獻貫之不忍横賦而所獻不中异意因取屬内六州畱錢繼之左遷太子詹事分司東都李皋太宗五世孫嗣爵曹王建中元年拜湖南觀察使先是部將王國良反討之再嵗不能下皋至投國良書中其忌諱國良羞畏乞降猶狐鼠進退皋即假為使者從一騎踔五百里抵國良壁鞭其門大呼曰我曹王來受降國良今安在國良錯愕迎拜盡降其衆柳公綽京兆華原人元和中為湖南觀察使黔巫東鄙蠻獠雜擾盜弄庫兵賊脅守帥公綽提卒五百屯武岡告以天子威命亂人大恐投刃頓服奉職輸賦崔郾博陵人敬宗時任鄂岳觀察使湖南萑蒲是樷郾修治鎧仗造艨艟小艦駛追窮躡上下千里期月盡獲羣盗更清簡少事財用有餘人遂安泰五代南唐邊鎬事烈祖累遷通事舍人馬希萼入潭州命鎬討長沙破其軍於龍囘關希萼希崇相繼送款盡遷馬氏之族歸於金陵以功拜湖南節度使鎬帥湘潭市不易肆楚人甚喜號邊菩薩宋慕容延釗太原人建隆二年為湖南道行營前軍都部署時賊將汪端與衆數千擾朗州延釗禽之磔於市荆湘旣平加檢校太尉其從子徳琛咸平二年轉荆湖北路鈐轄蠻擾澧鼎境上德琛戰於北汊奪耕牛鎧甲斬馘以歸李處耘上黨人建隆初朗州軍亂詔慕容延釗率師討之以處耘為都監處耘發卒萬餘人趨朗州又先遣别將分兵趨岳州大破賊於三江口又遇賊帥張富於澧江擊敗之遂北至敖山砦賊棄砦走俘獲甚衆隨遣麾下將田守奇帥師渡江獲賊帥汪端遂入潭州盡得荆湖之地徐的建州建安人仁宗時徙湖北路轉運使辰州蠻彭仕羲為寇的開示恩信蠻黨悔過自歸區希範等寇衡湘命的招撫之旣至再宿蠻相繼降以郊祀近召還計事蠻復叛除湖南按撫使至桂陽降者復衆其諸峒不降者的復討平之卒於軍潘夙大名人仁宗時郡州蠻叛湖南騷動遷轉運使專制蠻事親督兵破其團峒九十劉䕫崇安人仁宗時蠻唐和寇邊以右諫議大夫知潭州兼安撫司使初至遣人諭蠻酋使降不從乃舉兵擊破其巢穴蠻遁去前將以帛購蠻首至是有持首取購者按問乃輙殺平民誅之而罷購州境獲安劉沆永新人湖南蠻􅍹數出寇至殺官吏以沆知潭州兼安撫司使許便宜從事流大發兵至桂陽招降二千餘人使散居所部而蠻酋降者皆奏命以官又募上兵分捕餘黨斬馘甚衆周沆益都人湖南蠻唐盤二族寇暴殺居民官軍數不利以沆為轉運使沆言蠻驟勝方驕未易鬪力且其地險氣毒人驍悍不能敵請選州兵三千人習知山川技藝者徑搗其巢俟其勢窮力屈乃可順撫朝廷用其策二族皆降加直史館知潭州他道兵來戍者率兩期乃代多死瘴癘沆請以期為斷戍人便之曾孝序晉江人哲宗時知潭州以論􅍹事不合落職尋復知潭州道州􅍹人叛乘高恃險毒矢下射於兩山横巨木以守孝序夜遣饒鋭攀援而上以大兵繼進破之嶭弼永嘉人靖康中改湖南運判楊幺據洞庭命岳飛討之么陸耕水戰樓船十餘丈官軍不得近弼曰彼之所長可避而不可鬬今天旱湖水落洪若連筏斷江路藳其上流使彼之長坐廢而精騎直搗其壘則破壞在目前矣飛曰善兼旬積寇盡平時道殣相望弼以聞命給錢米賑之民賴以甦再知荆南桃源劇盜伍俊招安復叛弼許以靖州俊喜曰我得靖則地過桃源遠矣俊至則斬以徇韓世忠延安人建炎二年以荆湖宣撫副使移師長沙時賊劉忠衆數萬據白面山世忠請半月效捷遂與賊對壘奕棋張飲堅壁不動一夕設伏夾擊大破之斬劉忠湖南遂平李綱邵武人紹興二年為湖廣宣撫使兼知潭州時江湘間盜賊數萬綱悉平之上言荆南一帶當屯宿重兵倚為形勢使四川之號令可通襄漢之聲援可接乃可漸圖恢復議未及行罷提舉崇福宫張浚漢州綿竹人紹興四年以都督視師江上時巨寇楊幺據洞庭屢攻不克浚以建康東南都會洞庭據上流不先去為腹心害請自行至醴陵釋囚數百人皆幺諜者給以文書俾招諭諸寨皆讙以湖南控帶二廣與溪峒蠻獠接連草竊間作武備空虚乃疏請創湖南飛虎軍聽帥臣節制詔委以規畫事皆立辦雄鎮一方為江上諸軍之冠李椿永平人孝宗時湖南兵役之餘以椿重厚可倚命待制顯謨閣知潭州兼安撫司至則撫摩凋瘵復稅酒法人以為便嵗旱蠲租十一萬給常平米二萬糶又數萬民以全活潭新制飛虎軍或以為非便椿曰長沙一都㑹控扼湖嶺鎮撫蠻􅍹何可無軍亦在馭之而巳劉珙崇安人乾道中湖南早郴州李金為亂以珙知潭州兼安撫司入境移書制置使請以便宜出師卽遣田寶楊欽以兵至珙知其暑行疲怠發夫數程出迎之至則犒賜過望軍士感奮珙知欽可用檄諸將皆受其節制欽與寶連戰破賊賊黨執金以降後再知潭州湖北茶盜數十人入境疆吏以告珙掲榜諭以自新聲言兵且至令屬州縣具數千人食盜果散去擒諸首惡餘隸軍籍朱子名熹婺源人紹興中監潭州南嶽廟光宗時差知潭州有㫖長沙巨屏得賢為重遂拜命會洞獠擾屬郡因遣諭以禍福皆降之中敕令嚴武備戢姦吏抑豪民所至興學校明教化四方學者畢至真德秀浦城人嘉定十五年為湖南安撫司以廉仁公勤四字勵僚屬以周惇頤胡安國朱子張栻學術源流勉其士罷榷酤除斛面米申免和糴立惠民倉嵗出糶五萬石又易榖九萬五千石公置社倉徧及鄉落别立慈幼倉立義阡惠政畢舉月試諸軍射捐其囘易之利及官田租凡營中病者死未葬者孕者嫁娶者贍給有差曹彥約都昌人嘉定間湖南運判時盜羅世傳李元礪李新等相繼䧟桂陽茶陵安仁三縣彥約至人心始定遷湖南安撫督諸將擊破李新新死其黨李如松降遂復桂陽世傳素與元礪有隙請圖元礪以自効彥約與錢萬緍犒其師世傳遂擒元礪餘黨悉平世傳旣自以為功桀驁不肯出峒彥約密遣閒誘其黨胡友睦許以重賞友睦遂殺世傳向士璧常州人理宗時湖南安撫司升湖南制置副使兼知潭州元將烏蘭哈達兵自交阯北還前鋒至城下攻圍急士璧竭力守禦聞後隊且至遣王輔佑率五百人往覘之遇於南嶽市一戰有功潭州圍遂解烏蘭哈達舊作兀良哈䚟今改正董槐定遠人嘉熙閒知潭州主管湖南安撫司公事時三邊急於守禦督府日夜徵發間閻困苦槐畫䇿應之令民不傷而軍需亦不匱汪立信六安人景定中充湖南安撫司知潭州至官罷供帳之物官庫所積錢連嵗代民納夏稅貧無告者予錢粟病者加藥餌雨雪旱潦軍民皆有給興學校士習為變以潭為湖湘重鎮創威敵軍所募精鋭數千人後果賴其用文天祥吉水人咸淳九年起為湖南提刑疏決淹滯一路無獄連平巨寇道路肅清因見故相江萬里萬里數奇天祥志節語及國事愀然曰吾老矣觀天時人事當有變吾閲人多矣世道之責其在君乎元許楫忻州人至元中擢湖南按察副使武岡富民有毆死出征軍人者陰以財誘佃者代巳𣢾伏楫得其情釋佃者終繫富民人服其明郭昂彰徳林州人至元閒為沅州安撫司同知佩金符招降溪洞八十餘柵後進安遠大將軍徇沅州復新化安仁二縣擒劇賊張虎降其衆三千餘人悉使歸民軍還衆斂白金以獻一無所受阿里海牙畏吾兒人行荆湘等路樞密院事進行省右丞至鄂招潭州守李芾不聽乃移兵長沙拔湘陰至潭芾力屈自殺其將劉孝忠以城降諸將欲屠之阿里海牙曰是州生靈數百萬若悉殺之非上諭伯顏以曹兵不殺意也復發倉以食饑者遣使徇全道桂陽永衡武岡寶慶諸郡得州五十八未嘗事殺戮其取民悉從輕賦民所在立祠祀之劉國傑安東中州人至元二十三年拜湖廣左丞首平湖南盜李萬二二十五年又平湖南盗詹一仔等於衡永寶慶間斬盜首餘衆悉降或請阬之傑曰多殺不可況殺降耶乃相要地置三屯遷其衆使雜耕屯中卒爲良民又平道州獠寇禽永州盜以功加行樞密副使元貞元年加湖廣行省平章政事經畫盜賊出入之所周湖廣四境皆有屯戍制度周密諸蠻不能復寇盜賊悉平入朝賜玉帶錦衣弓矢楊惟中宏州人太宗時請立周惇頣祠建太極書院延趙復王粹等講授其聞遂通聖賢學慨然欲以道濟天下世祖總統東師奏爲江淮荆湖南北路宣撫使俾建行臺以先啟行宣布恩信明鄧愈虹縣人明太祖時以愈爲湖廣行省平章往鎮其地披荆棘立軍府營屯練卒拊循招徠威惠甚著洪武五年辰澧諸蠻作亂命爲征南將軍討平之克四十八峝薛瑄河津人宣徳閒爲御史監湖南銀場奏罷採麩金黜貪墨正風俗政事稍暇卽進諸生講學不倦馬謹新樂人由御史爲湖廣右布政使正統末湖南苗叛掠靖州謹與參將張善擊敗之景泰初復破臘婆諸峒又與參將李震擊破青龍渡馬楊山諸賊又破賊於武岡諸砦聞風𣢾附周季鳳寕州人官湖廣右布政使厯任最久徳澤在人後以平郴州寇擢都御史姚文灝貴溪人成化中提學湖廣慨然以作人自任崇正學黜浮靡自謂所能者三毁譽不入請託不行賄賂不通嘗過洞庭舟幾危端坐風止後卒於官貧不能斂僚寀治喪乃還秦金無錫人宏治中巡撫湖廣諸王府所據山場湖蕩皆奏還之官降盜賀璋羅大洪復叛討平之郴州桂陽􅍹龔福全稱王金先後大破擒之楚亂遂平張勉學長洲人嘉靖中分巡長沙平藩府租額聽縣徵解民便之分守衡永宣布恩惠民苗懾服陳覲餘姚人隆慶初任上湖南兵備副使禦廣西寇韋銀豹為一方保障衡永人立祠祀之李天植廣徳人萬厯中分巡長寶察吏詰戎百務具舉尤盡心文教延張元忭講學嶽麓惜陰兩書院造就甚衆陳璸漳浦人崇禎中以右參議分守湖南討平八排賊十六年張獻忠陷長沙圍澧州璸往救兵敗不屈死本朝張兆羆漢中人順治六平任上湖南道兵備副使綏緝流逋奏免荒田賦民以安集九年再罹兵燹兆羆撫卹備至捐資賑饑病者濟以醫藥全活甚衆王燧川北人順治六年任岳常道副使駐澧州西山賊肆虐掠燧守城捍禦城賴以完給民牛種墾蕪田政暇集諸生講學風教一振趙廷臣鐵嶺衞人順治十年任下湖南道僉事以清幹稱時軍需旁午廷臣倉卒立辦夜常秉燭治文書剖決無畱滯屢平反冤獄加意恤民行路為之感泣尤嚴絶苞苴歲時餽獻不敢至其門趙廷標錢塘人順治十三年任下湖南道僉事十八年擢驛鹽糧儲道副使時劇賊剽刧廷標飭部卒蹤跡籍記盡獲其黨斬其渠魁二人餘縱令歸農莫敢復為惡者湘東兵以採樵為名轉掠百里請於大府治之軍民俱安周召南奉天人康熙初巡撫偏沅首疏驛遞夫馬之困檄州縣各建義學文風大振三年移節長沙長沙駐巡撫自召南始郎永清奉天人康熙三年任湖南布政使司永寶諸府溪流悍急歲漕為艱永清力請改折著為令湘衡以南舊食粤鹽灘險道遠商民交病申請改食淮鹽至今利便丁思孔奉天人康熙二十三年巡撫湖南時逆藩始平拊循凋瘵務存寛恤振興文教疏請頒國子監校刋經史置嶽麓書院捐田數百畝資膏火政暇集諸生講論至今書院有丁公講堂尋遷總督郭琇卽墨人康熙中總督湖廣以湖南地曠民未生聚請清丈復減賦額十分之三又疏禁八事曰錢糧攤費包收之弊宜除陋規雜派之多宜去徴糧之滚單宜行訟棍宜治濫刑宜革捕役誣盜屍親抄掠强族阻葬宜懲特㫖褒嘉并從所請湖南積榖百萬四千八百石有奇琇請五分積貯五分碾米以平米價又請以沅州總兵移駐鎮筸増湖廣鄉試中額十三名俱下部行趙申喬武進人康熙四十一年任偏沅巡撫聖祖仁皇帝以湖南道遠官吏多私徵加耗勅申喬盡革之申喬大書聖諭勒石建亭檄告屬吏且言澄清端本自巡撫始苟有不法官民可共聲其罪於是屬吏惴恐禁革一切私派定頒漕米斗斛官為收解驛站夫馬工料銀於本州縣坐支倒馬隨時支補又革鹽商規例酌府州道里遠近平鹽價運丁按月徴給二耗及行月糧先給後報州縣列上貞節有踰月具請者即按懲胥吏復請準舊例給建坊銀葺古賢祠奪還侵地屬吏進見霽容接之使得盡言利弊惟嫉惡如仇未嘗少貸鎮筸紅苗未靖諭以威徳苗人歸化者三百餘砦在任八年常俸外一介不取簿書填委率親自勘決擢左都御史民謳思之所在建祠繪像雍正八年入祀賢良祠額稜特滿洲鑲紅旗人康熙四十九年遷湖廣提督紅苗向負固額稜特宣布威徳開導多方遂歸化五十二年擢總督靜鎮寛大奉命勘湖南荒地四萬六千頃疏請聽民墾種俟成熟种以下則舊有藩庫羨餘供制府額稜特各發州縣買榖備賑造船百艘以資緝捕修孔道橋梁凡所興舉民利賴焉祀名宦潘宗洛宜興人康熙年間督學湖廣清節自厲虚懷樂善文教大興復巡撫湖南清操如一尤加意於學校時疏請分闈避洞庭之險議發自趙申喬至宗洛復請之士多追感焉陳璸廣東人康熙五十四年任湖南巡撫風裁峻厲屏絶苞苴民戴其惠雍正八年入祀賢良祠李發甲雲南河陽人康熙五十五年任湖南巡撫時水災急發甲立借帑銀五千兩以賑乏絶出倉谷以平市價然後馳奏民困以蘇剔蠧釐姦公清尤著建湖南書院俾諸生肄業兩疏力請兩省分闈雍正元年始從之以勞卒於官士民爲建專祠楊宗仁奉天人雍正元年任湖廣總督廉潔勤敏餽遺屏絶瀕水隄防嵗時巡行修築年獲屢豐尤加意武備疾革數日前猶閲兵不稍怠以勞卒於官入祀賢良祠邁柱滿洲鑲藍旗人雍正五年任總督奏征苗用鵰剿法嚴民苗市易之禁及設寨長練土勇皆議行請停醴陵桂束二縣閒礦收苗疆軍器改鋤犁其法皆可遵守後入爲大學士史貽直溧陽人任湖廣總督時田淮鹽引滯議嚴法禁貽直言湖南邊郡去淮絶遠商販旣不時至官店收買亦勞費生姦令民舍賤買貴亦不近情與其更張而公私交困孰若仍舊而商民兩安又與巡撫髙其倬禽剿城步叛苗復疏陳洞庭舵桿洲石臺工程善後五事至今為利孫嘉淦興縣人乾隆六年任湖廣總督正巳率下苞苴不行疏定治苗之法於寨中立寨長峝中取寨長信服者為峝長使約束之而統於縣令又言城歩綏寕所屬九峝改設遊擊於花園汛移駐文員均如所請高其倬漢軍人乾隆年閒任湖南巡撫時城步綏寕二縣􅍹紏黨焚刼其倬偕總督史貽直剿平之為政平易治事克勤喜愠不形於色所至人咸懷之陳宏謀臨桂人乾隆二十年任湖南巡撫奏以衡陽事繁析其縣為清泉分理賦訟布政使楊灝侵扣榖價奏劾之飭屬力行社倉法其榖不足借常平穀與之俟本息裕還常平二十八年進尚書署總督仍兼巡撫事又疏言洞庭湖亘八百餘里容納川黔粤楚之水濱湖居民多築圍墾田與水爭地恐湖面愈狹漫決為患請多掘水口使私圍盡廢不許再築得㫖以為知大體居官清慎自矢慈惠愛民尤加意學校其所設施必為久遠之計其頒布經籍遺規湘中士人至今誦習不衰顏希深連平人乾隆中任湖南巡撫建普濟堂於北關外以養窮民居男女六百人以為常額月給錢米歳給綿衣病予醫藥死予棺具葬地法良意美久而可行希深卒羣祀之堂東陸燿呉江人乾隆四十九年任湖南巡撫奏増嶽麓城南兩書院膏火又奏請停催湘陰桂陽等三十州縣社倉息榖俱報可居官以清惠著卒之日貧無以斂士民祠祀之李湖南昌人乾隆中任湖南巡撫以清節自厲勸農課士孜孜不倦與丁思孔李發甲陸燿並祀三閭大夫祠盧文弨餘姚人乾隆中任湖南學政以經學課士甄拔多名材姚頤太和人乾隆中任湖南學政校士公明時有冰清玉潔之目尋擢湖南按察使亦以清惠稱錢澧昆明人乾隆中任湖南學政風格峭厲每試士正襟坐廳事終日不倦嘗大書用嚴二字於試院聞者肅然在任六年未嘗禠一諸生至今人見其所書莫不心敬之張姚成仁和人乾隆中任湖南學政秉經酌雅力絀浮靡士論宗之傅鼐浙江山陰人由鳯凰廳同知知府銜命總理邊務累官至湖南按察使權奇有才武厯苗疆十餘年躬親行陣訓練鄉勇號飛隊前後剿定諸寨所向克捷其所設施務為經久之䇿時大營甫撤降苗叛服不常鼐於三廰永保相其險要建立碉卡哨臺分撥練丁戍守計口屯田省帑項以鉅萬計其閒田以為嵗修廩給奬賞祭祀師儒養濟育嬰之費苗旣帖服遂設苗弁數百人用資彈壓立義學百數十所教之禮讓始請苗生取中鄉舉苗益格心及卒得㫖軫惜贈巡撫銜命後之監司守其法祀名宦葉佩蓀歸安人乾隆中任湖南布政使廉惠愛民首捐俸增獄麓書院膏火立保甲規條令州縣力行嘉慶中有㫖頒其保甲法令直省行之劉君輔㑹澤人乾隆五十九年任湖廣提督時鎮筸乾州苗同時蠢動邊疆大震君輔自常德督兵協剿兩解永綏之圍君輔與貴州安籠總兵花連布皆驍勇為苗所憚苗號花連布為花虎君輔髯而黑因號黑虎云阿林保滿洲正白旗人嘉慶年閒任湖南巡撫値監臨秋試貢院有井屆試期味輙變阿林保躬禱之泉頓清冽永綏逆苗石宗四叛專任同知傅鼐平定其地嚴設戍堡均田養丁備耕守之計功出自鼐能得人者實阿林保也富志那滿洲正紅旗人任鎮筸鎮總兵嘉慶五年晒金塘黑苗不靖富志那與同知傅鼐等督兵奮擊苗震懼乞降初鼐議建碉卡屯丁壯邊備漸嚴而苗頗不利遂紏衆攻阻大吏謂釁啟自鼐將劾治之富志那力爭乃止至今碉卡完固屯田利興苗患遂永息人稱鼐之功亦誦富志那不置云纂修官臣高人鑑恭纂輯提調官臣張日章