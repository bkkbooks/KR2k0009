body:
  text: 湖南省在京師西南三千五百八十五里東西距一千四百二十里南北距一千一百五十里東至江西南昌府義寕州界二百八十五里西至貴州銅仁府銅仁縣界一千一百三十五里南至廣東連州界七百六十五里北至湖北荆州府監利縣界三百八十五里東南至廣東韶州府仁化縣界七百九十里西南至廣西平樂府恭城縣界九百五十九里東北至湖北武昌府通城縣界六百四十里西北至四川重慶府酉陽州界九百里分野天文翼軫分野鶉尾之次晉書天文志零陵入軫十一度桂陽入軫六度武陵入軫十度長沙入軫十六度建置沿革禹貢荆州之域周為荆州南境春秋戰國屬楚秦置長沙郡及黔中郡地漢高帝置桂陽武陵二郡建長沙國漢書呉芮傳呉芮徙為長沙王都臨湘武帝時又增置零陵郡俱屬荆州後漢因之廢長沙國為郡建安中零陵武陵屬蜀漢長沙桂陽屬呉後俱屬呉增置天門衡陽湘東邵陵營陽五郡晉平呉廢營陽郡增置南平郡俱屬荆州惠帝以桂陽郡屬江州懷帝又分置湘州治臨湘領長沙衡陽湘東零陵邵陵等郡水嘉元年置咸和三年省義熙八年復置十二年又省穆帝時復置營陽郡南北朝宋亦為湘州武帝永初三年復立湘州領郡十長沙衡陽桂陽零陵營陽湘東邵陵在今省境廣興今屬廣東臨慶始建今屬廣西又増置巴陵郡初屬湘州後屬郢州武陵郡亦屬郢州惟南平天門二郡仍屬荆州齊並因之梁増置羅巴武郴等州陳有湘巴沅郴四州隋大業初廢諸州改為長沙巴陵衡山武陵澧陽零陵桂陽等郡俱屬荆州唐武德初復改諸郡為州四年置潭州總管府七年改都督府開元二十一年又分屬江南西及山南東黔中道江南西道領鄂岳潭衡永道郴邵八州山南東道領澧朗二州黔中道領辰錦敘業溪五州廣德二年置湖南觀察使唐書方鎮表至德二載置衡州防禦使領衡涪岳潭郴邵永道八州治衡州上元二年廢廣德二年置湖南觀察使領衡潭邵永道五州治衡州大厯四年徙治潭州中和三年升欽化軍節度光啟元年改武安軍節度五代時為楚馬殷所據殷所據潭衡澧朗岳道永邵辰郴溪錦奬十三州為今省境餘屬廣東廣西周廣順𥘉地入南唐旣而劉言取之尋又為周行逢所據在今省境者惟郴州屬南漢溪錦奬三州仍為蠻地宋平湖南分置湖南北路元豐中改荆湖南北路鼎澧岳辰沅靖屬湖北路潭衡道永郴邵桂陽監屬湖南路後湖南路又增置武岡茶陵二軍元為湖廣行省地岳州常徳澧州辰州沅州靖州六路屬江南湖北道天臨衡州道州永州郴州寶慶武岡桂陽八路茶陵耒陽常寕三州屬嶺北湖南道明屬湖廣布政使司岳州長沙常徳衡州永州寶慶辰州七府郴靖二州為本省境萬厯二十八年始置偏沅巡撫治偏橋鎮本朝康熙三年分置湖南布政使司為湖南省是年移偏沅巡撫駐長沙府雍正二年改為湖南巡撫七年置永順府升岳州府屬澧州十年升衡州府屬桂陽州均直隸布政司乾隆元年升辰州府屬沅州為府嘉慶二年升辰州府屬乾州鳳凰永綏三廳二十二年析沅州府芷江縣地置晃州廳均直隸布政司今領府九直隸州四直隸廳四長沙府岳州府寶慶府衡州府常德府辰州府沅州府永州府永順府澧州桂陽州靖州郴州乾州廳鳳凰廳永綏廳晃州廳形勢東控安成長沙衡州二府東接江西袁州吉安二府晉安成郡地南連嶺嶠五嶺在境者三騎田嶺在郴州都龎嶺在永州府永明縣甿渚嶺在永州府江華縣自騎田而東則為江西南安府之大庾嶺自甿渚嶺而西則為廣西桂林府之臨源嶺西通黔蜀辰州府西接貴州思州鎮遠銅仁黎平諸府永順府接四川酉陽土司界北限大江岳州府巴陵臨湘華容三縣濱江澧州接荆州公安縣其北卽大江其名山則有衡山在衡州府衡山縣西五嶽之一九疑在永州府寕遠縣南六十里其大川則有湘水自廣西全州東北流入永州府東安縣南至府城西瀟水入之謂之瀟湘又東北流至衡州府北烝水入之謂之烝湘又北流逕長沙府至湘陰縣北達青草湖而注於洞庭沅水自貴州黎平府天柱縣流入靖州會同縣東北流逕辰州府又東北流逕常徳府至龍陽縣北沅江縣西入洞庭湖常德辰州二府漸潕辰敘酉諸水及五溪皆附沅水以達洞庭資水出澧州安福縣西南厯山東北流逕慈利石門二縣過州城南至安鄉縣北入洞庭湖洞庭湖在岳州府巴陵縣之西華容縣及澧州安鄉縣之南常徳府龍陽縣之東北沅江縣之南長沙府湘陰縣之西北南為青草湖西為赤沙湖合而為一周圍八百餘里其重險則有荆江口在岳州府城北十五里亦名三江口大江與洞庭湖匯流處壺頭在常徳府桃源縣之西南辰州府沅陵縣之東北自楚入黔要道文職官巡撫駐長沙府提督學政駐長沙府布政使司布政使理問庫大使廣盈按察使司按察使照磨司獄督理糧儲道駐長沙府庫大使廣盈鹽法道兼轄長寶二府駐長沙府分巡岳常澧道駐澧州分巡衡永郴桂道駐衡州府分巡長沅永靖道駐鳯凰廳長沙府知府同知通判府學教授訓導經厯司獄知州茶陵州判州學學正訓導吏目知縣十一員長沙善化湘潭湘陰寕鄉瀏陽醴陵益陽湘鄉攸縣安化縣丞七員長沙善化俱駐本城湘潭駐朱亭湘陰駐林子口瀏陽益陽俱駐本城湘鄉駐永豐市縣學教諭十一員訓導十一員巡檢九員長沙屬橋頭湘潭屬黄茅湘陰屬新市大荆鎮瀏陽屬梅子園駐永安市醴陵屬渌口湘鄉屬婁底市攸縣屬鳳嶺茶陵州屬視渡口典史十一員岳州府知府同知通判府學教授訓導經厯知縣四員巴陵臨湘華容平江縣丞巴陵駐楊林街乾隆十年裁邵陽縣丞移設縣學教諭四員訓導四員主簿巴陵鹿角巡檢四員臨湘屬長安桃林華容屬黄家穴平江屬長夀典史四員寶慶府知府同