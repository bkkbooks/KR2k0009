  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_198-1a}
body:
  text: 西藏在四川雲南徼外東西六千四百餘里南北六千五百餘里東至四川界東南至雲南界西至西域回部大沙海界北至青海及回部界其貢道由西寧以達於京師一萬四千餘里建置沿革古西南徼外諸羌戎地兩漢魏晉種落無聞自吐蕃始祖鶻丹木巴鶻丹木巴舊作鶻提勃窣野今改正居析支水西并諸羌據其地厯後周及隋猶未通中國其君長稱為贊普唐貞觀八年始遣使者來朝十五年妻以宗室女文成公主既而滅吐谷渾盡臣羊同黨項諸羌幅員萬餘里唐末衰弱宋時亦號吐蕃朝貢不絶元憲宗始於河州置吐蕃宣慰司都元帥府又於四川徼外置碉門魚通黎雅長河西寧等處宣撫司世祖時復置烏斯藏烏斯藏舊作烏思藏今改正郡縣其地以吐蕃僧帕克斯巴帕克斯巳舊作八思巴今改正為大寶法王帝師領之嗣者數世弟子號司空司徒國公佩金玉印明洪武六年以攝帝師納木嘉勒藏博納木喜勒藏博舊作喃加己藏卜今改正為熾盛佛寶國師給玉印置烏斯藏朵卡木二指揮司及宣慰司招討司萬户府千户所以元國公納木喀斯丹拜嘉木燦納木喀斯丹拜嘉木燦舊作南哥思丹八亦監藏今改正等領之永樂中復封番僧為大寶法王大乘法王大慈法王闡教王闡化王輔教王贊善王護教王凡八王並給印誥比歲或間歲朝貢宣德成化間又纍加封號其地有僧號達賴喇嘛居拉薩之布達拉廟主前藏班禪喇嘛居日喀則城之扎什倫布廟扎什淪布舊作拉式魯木布今改正主後藏番俗崇奉又在諸番王之上本朝崇德七年達賴喇嘛即遣使歸誠至順治九年來朝世祖章皇帝賜以金册金印授為西天大善自在佛領天下釋教普通瓦赤喇怛喇達賴喇嘛嗣後與班禪喇嘛各遣使貢獻不絶其部落號圖伯特又曰唐古特最尊者曰達賴喇嘛曰班禪額爾德尼其代喇嘛理事者曰第巴又有汗則蒙古部長為之其俗相傳有宗喀巴者居喇薩始興黃教後世曰根敦佳木左立第巴以治國事索諾木佳木左始稱達賴喇嘛又傳雲旦佳木左阿旺羅卜藏佳木左時藏之藏巴汗威虐部下毁棄佛教第巴乞師於厄魯特顧實汗擊滅藏巴汗遂留其長子達顔為汗及孫拉藏亦為汗云阿旺舊作阿王今改正康熙三十二年封第巴為圖伯特國王賜金印時達賴喇嘛示寂第巴匿不以聞潛與厄魯特噶爾丹相為表裏及召喇嘛班禪呼圖克圖來京第巴又阻之不至四十四年達賴汗拉藏誅第巴以聞聖祖嘉之賜金册印封為輔教恭順汗遣侍郎赫夀等安撫其地又允拉藏所請復立阿旺伊什嘉穆錯為達賴喇嘛五十二年封班禪呼圖克圖為班禪額爾德尼依達賴喇嘛之例錫以册印其後準噶爾䇿妄阿喇布坦興師侵藏害拉藏汗焚毀寺廟迫逐僧衆禁阿旺伊什嘉穆錯於扎克畢喇廟五十八年遣兵進藏立即討平之廢阿旺伊什嘉穆錯封羅卜藏噶勒藏嘉穆錯為達賴喇嘛送歸布達拉廟掌興法教番衆皆嚮風附化康熙六十年聖祖仁皇帝御製平定西藏碑文曰昔者太宗文皇帝之崇德七年班禪額爾德尼達賴喇嘛顧實汗謂東土有聖人出特遣使自人迹不至之區經讐敵之國閲數年始達於盛京至今八十載同行善事俱為施主頗極安寧後達賴喇嘛之殁第巴隱匿不奏者十有六年任意妄行拉藏滅之復興其法因而允從拉藏苦苦腦兒羣衆公同之請中間䇿妄阿喇布坦妄生事端動準噶爾之衆肆行姦詐滅壞達賴喇嘛並廢第五輩達賴之塔辱衊班禪毁壞寺廟殺戮喇嘛名為興法而實減之且欲竊據圖伯特國朕以其所為非法爰命皇子為大將軍王又遣朕子孫等調發滿洲蒙古緑旗兵各數萬厯煙瘴之地士馬安然而至賊泉三次乘夜盜營我兵奮勇擊殺賊皆喪膽逺遁一矢不發平定西藏振興法教賜今呼畢爾罕册印封為第六輩達賴喇嘛安置禪禢撫綏圖伯特僧俗人衆各復生業於是文武臣工咸謂王師西討厯瘴癘險遠之區曽未半載朝建殊勳實從古所未有而諸蒙古部落及圖伯特酋長亦合詞奏曰皇帝勇略神武超越注代天兵所臨邪魔掃蕩復興蒙古向所尊奉法教喀木藏衛等部人衆咸得拔離湯火樂土安居如此盛德大業非臣下頌揚所能宣罄請賜御製碑文鐫勒招提以垂永久爰紀斯文立石西藏俾中外知達賴喇嘛等三朝恭順之誠諸部落纍世崇奉法教之意朕之此舉所以除逆撫順綏衆興教云爾世宗憲皇帝嗣位撤回官兵以貝子康濟鼐總理其地仍特簡大臣駐藏管轄雍正五年西藏噶隆阿爾布巴等叛殺康濟鼐後藏辦理噶隆事務之札薩克台吉頗羅鼐走避以聞遣兵進剿明年頗羅鼐率衆部落入藏阿爾布巴等伏誅安輯如故封頗羅鼐為固山貝子九年晉封多羅貝勒辦理衛藏噶隆事務乾隆四年晉封多羅郡王給印轄衛藏等處十二年以其次子珠爾默特納穆扎爾襲封十五年以謀逆伏誅今設扎薩克輔國公一珠爾默特䇿布登貝勒頗羅鼐之長子雍正八年授一等台吉九年晉封輔國公十一年晉鎮國公乾隆十六年子珠爾默特旺扎納降襲輔國公四十三年子諾爾布朋素克襲五十九年子額琳沁彭楚克襲嘉慶二十年子車旺珠美襲扎薩克一等台吉三一諾顏和碩齊貝勒頗羅鼐之弟雍正六年授一等台吉乾隆元年弟車臣哈什哈襲五年弟齊旺多爾濟襲十年兄子旺對襲三十一年子索諾木喇什襲四十八年詔世襲五十七年子策凌旺楚克多爾濟襲一索諾木達爾扎雍正七年封輔國公乾隆九年子恭格丹津襲三十八年子納木扎勒襲四十八年改世襲一等台吉五十七年子奇雅多爾旺瞿襲嘉慶十二年子色綸彭蘇襲一喀錫鼐色布登喇什本阿里總管雍正五年擊賊陳殁追授一等台吉六年子噶錫巴納木扎勒色布騰襲九年晉輔國公世襲乾隆五年弟班第達襲五十四年子丹津班珠爾襲五十七年子敏珠爾索諾木班珠勒降襲一等台吉四十四年班禪額爾德尼來朝欽賜玉寶玉册及珠幣等物示寂於京邸並賜金塔護送回藏其地有四曰衛曰藏其東境曰喀木其西境曰阿里共轄城六十餘一切賦稅俱獻之達賴喇嘛等其進貢二年一次貢道由西寧入其互市在四川西徼打箭爐之地衛在四川打箭爐西北三千餘里即烏斯藏也番字烏加斯字切音作衛蓋彼時尚有微識西番字者而不知切音之為衛也居諸藏之中故亦名中藏東自木魯烏蘇西岸西海部落界西至噶木巴拉嶺藏界一千五百三十三里南自鄂木拉岡沖嶺北至牙爾佳藏布河二千二百餘里藏在衛西南五百餘里東自噶穆巴拉嶺衛界西至麻爾嶽木嶺阿里界一千八百八十二里南自帕里宗城之畢木拉嶺北至者巴部落之北打魯克雨木撮池一千三百餘里喀木在衛東南八百三十二里近雲南麗江府之北東自鴉龍江西岸西至努卜公拉嶺衛界一千四百里南自噶克拉岡里山北至木魯島蘇南岸一千七百里東南自雲南塔城關西北至索克宗城西海部落界一千八百五十里東北自西海部落界阿克多穆拉山西南至塞勒麻岡里山一千五百里阿里為西藏之極西邊境東自藏界麻爾嶽木嶺西至巴第和木布嶺二千一百餘里南自臣木薩喇嶺北至烏巴拉嶺一千三百餘里衛地諸城首曰喇薩在四川打箭爐西北三千四百八十里本無城有大廟土人共傳唐文成公主所建今達賴喇嘛居此有五千餘户所居多二三層樓遇有事即保守此地其餘凡有官舍民居之處於山上造樓居依山為塹即謂之城曰得秦城在喇薩東南三十八里奈布東城在喇薩東南二百二十里桑里城在喇薩東南二百五十一里垂佳普郎城在喇薩東南二百六十里野而古城在喇薩東南三百十里達克匝城在喇薩東南三百三十七里則庫城在喇薩東南三百四十里滿撮納城在喇薩東南四百四十里拉巴隨城在喇薩東南四百四十里扎木達城在喇薩東南五百四十四里達喇馬宗城在喇薩東南五百六十里古魯納木吉牙城在喇薩東南六百二十里碩噶城在喇薩東南六百四十里朱木宗城在喇薩東南七百五十里東順城在喇薩東南七百七十里則布拉岡城在喇薩東南八百七十里納城在喇薩東南九百六十里吉尼城在喇薩東南九百八十里日噶牛城在喇薩西南三十里楚舒爾城在喇薩西南一百十五里日喀爾公喀爾城在喇薩西南一百四十里有番民二萬餘家為衛地最大之城嶽吉牙來雜城在喇薩西南三百三十里多宗城在喇薩西南四百二十呈僧格宗城在喇薩西南四百三十里董郭爾城在喇薩西二十五里第巴達克匝城在喇薩東北九十二里倫朱布宗城在喇薩東北一百二十里墨魯恭噶城在喇薩東北一百五十里蓬多城在喇薩東北一百七十里已上凡三十城量地大小人之多寡各設宗布木一二人管理民事凡五户出一兵每馬兵二十五各步兵二十五名設一丁布木轄之其兵多之地丁布木一城有至數十人者凡人馬糗糧器棫皆按户均派有用時傳集事畢仍為民又衛地東北與青海諸部接界處哈喇烏蘇設一堪布喇嘛木魯烏蘇設一蒙古寨桑以供應往來使者馬匹鄉導及文移郵遞之處藏地諸城首曰日喀則城在喇薩西南五百三十三里其先藏巴汗居此今為班禪喇嘛所居户二萬三千餘兵五千三百餘其餘曰林奔城在日喀則城東一百九十一里納噶拉則城在日喀則城東二百五十里拜的城在日喀則城東三百三十二里拜納木城在日喀則城東南七十里季陽則城在日喀則城東南一百二十里户三萬餘兵七千五百餘烏雨克靈喀城在日喀則城東南三百七千里丁吉牙城在日喀則城西南四百十里羅西噶爾城在日喀則城西南五百四十里帕爾宗城在日喀則城西南六百四十里盆蘇克靈城在日喀則城西南七百二十三里濟隆城在日喀則城西南七百四十里阿里宗城在日喀則城西南七百六十里尼牙拉木宗城在日喀則城西南七百八十里尚納木林城在日喀則城西北一百十里章拉則城在日喀則城西北八百十里章阿布林城在日喀則城西北九百七里巳上凡十七城惟日喀則李陽則二城最大其俗制與衛略同喀木諸城首曰巳塘城在喇薩東南二千五百里又節達穆城在巴塘城東南五百八十里其地舊名中甸桑阿充宗城在巴塘城西南六百里匝坐里岡城在巴塘城西北三百五十里薄宗城在巴塘城西北六百里蘇爾莽城在巴塘城西北八百里羅隆宗城在巴塘城西北八百五千里解凍城在巴塘城西北九百五十里舒班多城在巴塘城西北一千一百五十五里達爾宗城索克宗城俱在巴塘城西北一千二百二十里滚卓克宗城在巴塘城北二百八十里裏塘城在巴塘城東北三百里本朝康熙五十年以巴塘裏塘隸四川中甸隸雲南並設官兵駐防阿里諸城布拉木達克喇城在布拉木之地距喇薩西南二千五百餘里其所屬有喀爾多木日底二城又古格扎什魯木布則城在喇薩西南二千四百九十餘里其所屬有沖龍則布龍楚木爾的三城拉達克城在喇薩西南三千七百五十餘里其所屬有扎石剛丁木剛喀式三城畢底城在喇薩西南三千八百餘里魯多克城在喇薩西北二千九百三十餘里巳上諸城每户出兵一名但設宗布木無丁布木官附屬部落噶克卜部落在喇薩東南八百四十里衛喀木邊界之閏與羅克卜扎國接界其相近有恭布部落番夷三千餘户每􅍲進馬二匹於達賴喇嘛薩噶部落在日喀則城西南八百三里其西四百二十里有卓書特部落乃藏之西界阿里之東界者巴部落在日喀則城西四百二十里己上三部落皆設喇嘛一人頭目一人以統之羅部落在日喀則城西南一千一百十里噶爾道營在喇薩西北二千五百餘里達克喇古