里入衣達池池廣一百餘里從此池轉東南流一百五十餘里入喀喇池池廣一百二十餘里從南流出名喀喇烏蘇稍東北流四百五十餘里至索克宗城南百餘里出衛地入喀木境名鄂爾宜楚轉東南二百餘里又稍東過羅隆宗城北流三百餘里折南流八百餘里經米喇隆地又二百餘里入怒夷界名怒江自怒夷界南流三百餘里入雲南麗江府界名潞江經野人界又南經永昌府及潞江安撫司境流至緬甸入南海明統志潞江舊名怒江源出雍望經潞江安撫司之北蒙氏封為四瀆之一按舊輿圖西番之西大流沙之南湧出一澤名曰嘉湖南流為潞江以今考之嘉湖即喀喇池也蒙古名黑為喀喇水為烏蘇此水大於瀾滄葉榆而色深黑故名其上源出於衛地之布哈大澤淵澄黝黑又多伏流以此為禹貢之黑水則名稱猶舊較之指瀾滄葉榆為黑水者猶為略有依據也龍川江番名薄藏布河在薄宗城南二里有二源一源發於薄宗城東北三百餘里春多嶺名鴨龍河合六水西南流一源發於薄宗城西北五百餘里東拉嶺名厄楚河合十餘水東南流至薄宗城前二水合流名薄藏布河西南流經噶克卜部落及羅克卜札所屬之們布部落入雲南騰越州界為龍川江明統志龍川江源出娥昌蠻地七藏甸傍高黎共山北渡口有古藤索橋下流至太公城合大盈江雲南通志其源有三一出明光山一出阿幸山一出南香甸山三水合流名龍川江下流至虎踞關入緬瀾滄江在匝坐里岡城東一百里番名拉楚河有二源一源發於匝坐里岡城西北一千餘里格爾吉匝噶那山名匝楚河一源發於匝坐里岡城西北八百餘里巴喇克拉丹蘇克山名鄂穆楚河俱東南流折而南至匝坐里岡城東北三百餘里義木多廟前二水合流名拉楚河又南流九百餘里至雲南塔城關西入雲南麗江府界為瀾滄江又流經永昌順寧蒙化景東諸府厯阿瓦國老撾地入交址界注於南海按後漢書顯宗始通博南山度蘭倉水蘭倉之名始於此華陽國志水經注皆不能考其源滇志瀾滄江源出吐番嵯和歌甸之鹿石山一名鹿滄江亦曰浪滄江亦作蘭滄水南入大理府雲龍州界其説得之蓋嵯和歌甸即今匝坐里岡城地也番名拉楚亦瀾滄聲之轉也明人李元陽著黑水辨史秉信著岡脊黑水辨俱以此為禹貢之黑水元陽云瀾滄江潞江皆由吐番北來蓋與雍州相連水勢並洶湧皆入南海然潞江西南趨緬中內外皆夷其於梁州之境若不相屬惟瀾滄由西北向東南徘徊雲南郡縣之間至交址入海今水內皆為漢人水外皆為夷緬則禹之所導於分别梁州界者惟瀾滄足以當之元史至元二年大理勸農官張立道使交址並黑水跨雲南以至其國觀此則瀾滄江之為黑水益彰彰明矣元陽之論雖詳今考瀾滄潞江上流相近皆發源番地入南海然瀾滄源近未必即雍州又絶無黑水之名不如潞江之源遠而水深黑也若以潞江皆經夷地不屬梁州異於瀾滄之綿厯雲南郡縣則禹貢之流沙三危在前代時豈亦皆內地乎邊裔郡縣之界兩漢以來巳多變遷豈可執今之輿地定禹貢之疆域乎且交址自唐以前皆隸中國未聞言黑水經其地元史所謂黑水蓋亦後人強名未可據以為證金沙江古名麗水一名神川一名犂牛河今番名木魯烏蘇一名布賴楚河又名巴楚河源出衛之喇薩西北八百餘里至那木唐龍山北轉東南流八百餘里入喀木境名布拉楚河又南流少西八百餘里至巴塘西六十里名巴楚河又轉東南流六百餘里至雲南麗江府界為金沙江自麗江府雪山之北折而東南經永北武定二府至四川會川衛西南入四川界與打沖河合折東北經東川府西馬湖府南至敘州府與川江合自發源處至入內地流四千餘里受大水數十小水無數水深流急沿江煙瘴最多以江出沙金故名唐書南蠻傳貞元五年南詔異牟尋大破吐蕃於神川遂斷鐵橋溺死以萬計又西域傳多彌木西羌屬吐蕃號難磨濱犁牛河土多黃金又地理志渡西月河二百一十里至多彌國西界又經犁牛河渡藤橋百里至列驛明統志金沙江古名麗水源出吐蕃界犁石下名犁水訛犁為麗流經巨津通安寶山三州按犁石者以其石如牛也其水因之得名故有犁牛之稱舊志謂此即古若水不知若水即今鴉龍江其下流名打沖河非金沙江也或謂此即繩水按水經注若水徑越嶲大莋縣入繩繩水出徼外山海經曰巴遂之山繩水出焉東南流分為二水其一水枝流東出徑廣柔縣東流注於江其一水南徑旄牛道至大莋與若水合自下亦通謂之繩水矣今金沙江下流正與打沖河合其説似之唐樊綽以麗水為禹貢之黑水云與瀰渃江合經驃國東入南海程大昌疑其源流狹小不足以合雍梁二州疆境然今金沙江自與大江合不入南海非黑水也明僧宗泐望河源詩自記云河源出自抹必力赤巴山番人呼黃河為抹處犁牛河為必力處赤巴者分界也其山西南所出之水則流入犁牛河東北之水是為河源今自黃河源至金沙江源僅三百六十餘里中隔巴顏喀喇山河源在山之東金沙江源在山之西南宗泐之言與今頗合必力處即布賴楚聲相近也又徐宏祖溯江記源云禹貢言岷山導江乃泛濫中國之始非發源也中國入河之水為省五入江之水為省十一計其吐納江倍於河按其發源河自崑崙之北江亦自崑崙之西非江源短而河源長也宏祖蓋以金沙江為大江之正源前人巳有言之者第非出於周覽故其言雖是而未能條析凡水之源必以遠且大者為主而近者小者附之金沙江自發源厯雲南至敘州府行七千里始與岷江合較岷江之源遠三四倍大亦倍之昔人守禹貢岷山導江之文不敢别有異辭然岷山特導江所始非即江源猶導河積石非即河源也以今考之江凡三源最遠而大者莫如金沙其次則鴉龍又其次則岷江三源金沙