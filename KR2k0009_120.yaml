body:
  text: 九江郡漢置宜春縣屬豫章郡後漢因之三國呉屬安成郡晉宋以後因之隋平陳始置袁州寰宇記隋平陳後土人文盛擁衆自守開皇十年平之十一年置袁州因袁山為名大業初改為宜春郡隋末林士宏蕭銑相繼有其地唐武徳四年復曰袁州天寶初曰宜春郡乾元初復曰袁州屬江南西道五代初屬楊呉後屬南唐宋亦曰袁州宜春郡屬江南西路元初隸湖南行省至元十九年曰袁州路隸江西行省明初曰袁州府屬江西布政使司本朝因之屬江西省領縣四宜春縣附郭東西距九十里南北距一百三十里東至分宜縣界四十里西至萍鄉縣界五十里南至吉安府安福縣界六十里北至萬載縣界七十里東南至分宜縣界五十里西南至吉安府安福縣界六十里東北至萬載縣界八十里西北至萍鄉縣界一百二十里漢置宜春縣屬豫章郡後漢因之三國呉寶鼎二年改屬安成郡晉太康中改曰宜陽宋齊以後因之隋初爲袁州治開皇十八年復曰宜春大業初爲宜春郡治唐復爲袁州治宋因之元爲袁州路治明爲袁州府治本朝因之分宜縣在府東八十里東西距六十里南北距一百五十五里東至臨江府新喻縣界二十里西至宜春縣界四十里南至吉安府安福縣界五十里北至瑞州府上高縣界一百五里東南至吉安府廬陵縣界五十里西南至宜春縣界一百里東北至瑞州府上高縣界一百里西北至宜春縣界九十里漢宜春縣地宋雍熙初析置分宜縣屬袁州元屬袁州路明屬袁州府本朝因之萍鄉縣在府西一百四十里東西距一百五十里南北距一百八十里東至宜春縣界九十里西至湖南長沙府醴陵縣界六十里南至吉安府安福縣界八十里北至湖南長沙府瀏陽縣界一百里東南至吉安府安福縣界百二十里西南至湖南長沙府攸縣界一百十里東北至宜春縣界九十里西北至湖南長沙府醴陵縣界九十里漢宜春縣地三國呉寶鼎二年析置萍鄉縣屬安成郡晉及宋齊以後因之隋改屬宜春郡唐屬袁州宋因之元元貞元年升爲州屬袁州路明洪武二年仍爲縣屬袁州府本朝因之萬載縣在府北九十里東西距一百四十五里南北距一百九十五里東至瑞州府上高縣界十五里西至湖南長沙府瀏陽縣界一百三十里南至宜春縣界十五里北至南昌府義寕州界一百八十里東南至分宜縣界十五里西南至宜春縣界九十里東北至瑞州府新昌縣界六十里西北至湖南長沙府瀏陽縣界一百二十里漢豫章郡建城縣地三國呉黄武中析置陽樂縣屬豫章郡晉大康元年改曰康樂宋齊以後因之隋省五代南唐保大十年置萬載縣屬筠州宋開寶八年改屬袁州宣和三年改曰建成紹興二年復曰萬載元屬袁州路明屬袁州府本朝因之形勢秀水東奔萍川西注唐袁皓詩山水秀麗寰宇記江右奥區王象之輿地紀勝當湖漢之孔道作呉楚之疆圉明申時行記風俗州小地狹賦税及時唐韓愈袁州謝表藝文儒術為盛杜佑通典士夫秀而文細民險而健宋黄庭堅道院賦地接湖湘俗雜呉楚宋楊侃郡廳記士力學而知亷恥民樂善而好儉嗇宋阮閔無訟堂記務本力農志定用約元虞集記城池袁州府城周八里有竒門四北枕秀江三面濬濠唐武徳中因舊址築後屢拓築明洪武初增築本朝順治三年修康熙三年乾隆十二年二十五年重修冝春縣附郭分宜縣城周二里二百二十四歩門五明正德七年創築嘉靖中改築本朝康熙年間修乾隆二十五年重修萍鄉縣城周五里三十六歩門五明正德中土築萬厯中甃石增築本朝康熙二年修乾隆二十五年三十七年嘉慶二十三年重修萬載縣城周六里門七明正德時土築萬厯間甃甎本朝康熙三年修二十一年乾隆九年重修學校袁州府學在府治東唐天寶五年刺史房琯始建於城南南唐保大十年移郡治西南宋皇祐五年遷今所本朝康熙五年修入學額數二十名宜春縣學在袁山門外秀山北舊在縣治西宋淳熙間遷今所明洪武中重建夲朝屢經修葺入學額數十二名分宜縣學在縣治東宋初建於縣西五里後屢遷端平初徙建今所咸熙中又遷安仁驛明初復遷舊址本朝康熙四年重建入學額數十五名萍鄉縣學在縣西隅唐武德間建在縣東南後屢遷明嘉靖中始遷今所本朝順治十年重建康熙年間修入學額數十二名萬載縣學在縣治東宋崇寕間建明𥘉重建本朝順治十三年增修康熙年間重修入學原額十二名嘉慶十年增四名高士書院在府城北外廂學宫之右明萬厯癸已提學錢檟建南軒書院在府城東湖上宋端平中建祀張栻元至元間陛虞集有記案舊志載鈐岡書院在分宜縣西門外宋建祀周張二程朱五子宗濓書院在萍鄉縣東蘆溪鎮宋建祀周也濓溪書院在萍鄉縣治南明建胡安定書院在萍鄉縣東二里安定讀書之所張巖書院在萬載縣西元建祀宋周程張郡司馬六君子虞集為記今俱廢謹附記户口原額人丁三萬六千三百三十八今滋生男婦大小共七十六萬八千五十六名口計十六萬三千六百二十九户又衛所屯軍男婦大小共一萬六千九百三十九名口計二千七百九户田賦田地二萬三千六百八十七頃八十二畝一分有竒額徴地丁銀九萬二千三十兩五錢八分一釐米八千二十五石五斗六升三勺袁州衛屯田在府屬四縣共二百八頃六十二畝一分有奇額徴地丁銀一千九百五十二兩九錢六分三釐山川震山在宜春縣東十里亦名馬鞍山下有巖幽晦深險唐盧肇記山本名呼岡在城東方望之若冠冕同麓異峯四首相屬两仰成形如畫震卦因易其名西北有石室臨溪之涘邑人彭搆雲嘗釣巖下寶應中詔徵不就時太守名其巖曰徵君釣臺雕山在宜春縣東二十里高百大周二十里湖岡山在宜春縣南十五里晉鄧表居此山頂有煉丹臺養丹池朝斗石蟠龍山在宜春縣南四十里自麓至巔凡三十六曲峭壁奔湍為一州之勝上有蟠龍寺唐末南平王鍾傅所建木平山在宜春縣南七十里山有三峯中曰妙廣在曰瑞光右曰慈雲仰山在宜春縣南八十里周數百里高聳萬仞府之鎮也其最勝者曰集雲峯山中石徑縈迴飛瀑湍駛夐異人境山下有唐鄭谷讀書處又小仰山在縣南三十里一名水晶山晉鄧表修煉於此又名鄧表峯上有星壇石臼藥竈坤長山在宜春縣西南七里脈自坤方來連亘甚遠一名旗山書堂山有二一在宜春縣西南三十里唐盧肇讀書處一在萬載縣西八十里山谷深鬱常有雲霧世傳習鑿齒讀書於此老山在宜春縣西南六十里崇高峻拔山巔飛瀑下注爲清􅅹江望鳳山在宜春縣西七十里周六十里高三里中有一峯如鳳將墳山在宜春縣西一百里周四十里高三里相傳漢武帝時有将軍易洸者領兵至宜春卒於此因葬焉石屋山在宜春西北三十餘里有洞深百餘丈喝斷山在宜春縣西北一百二十里與萬載萍鄉及湖南瀏陽縣接境兩山對峙如天門中通一徑爲入省往來必由之道險隘斗絶袁山在宜春縣東北五里昔隱士袁京居此死葬其側因名其北曰小袁山迴聳相對鐘山在分宜縣東十里下瞰秀江水南曰南鐘山水北曰北鐘山亦名鐘山峽峽長九十餘里與臨江府新喻縣接界寰宇記山在州東九十里裴子野宋畧云永嘉元年因洪水有大鐘從山流出時人得之驗其銘曰泰時樂器因名又按安成記云鐘山臨水阻峻春夏湍洑湧沸噴上白沙如米兩岸石上各九十餘里名曰米沙以之候歲若一岸偏饒則其方豐穰民以爲準仙臺山在分宜縣東南五里羣山相抱一峯高聳銀山在分宜縣南二十里嶺多白石如銀清風山在分宜縣南三十里相傳晉時有黄仙姑修煉於此有煉丹池昌山在分宜縣西二十里周迴十八里下瞰秀江亦曰昌山峡寰宇記舊名傷山袁江流其間巨石枕岸潺激舟行多傾覆故名顧野王輿地記晉永嘉四年羅子魯於山峽堰斷為陂灌田四百餘頃梁大同二年廢時人以傷非善徵改為昌山玉岡山在分宜縣西二十里雪山在分宜縣西二十五里古木繁隂冬有積雪又縣西三十里有甘竹山光子山在分宜縣西四十里相傳晉時有渝川侯李林字光子者葬此因名大梅山在分宜縣西六十里其山多梅又有桃溪山環抱溪泉清泉山有二一在分宜縣北十里山有池其水清澈一在萬載縣東北四十五里林木森聳瀑布懸流俗名小仰山臺山在分宜縣北二十五里山頂平夷廣數畝若臺貴山在分宜縣北四十里地産鐡唐書地理志宜春縣有鐵縣志宋雍熙初置貴山鐡務後廢龍王山在分宜縣北七十里又縣北八十里有雞足山其相近有陳重山棗木山又三峯山在縣北一百里毛仙山在萍鄉縣東二十三里宋時置毛仙驛於山下為往來通道九嶷山在萍鄉縣東七十里連帶九峯山側二峯峭拔若雙鶴飛舞名仙鶴嶺羅霄山在萍鄉縣東一百里高數千丈延袤百餘里上有羅霄洞旁有葛仙壇壇生二竹風動如掃人謂之掃壇竹壇側有黄龍潭山下又有石潭深不可測袁江之源出焉武功山在萍鄉縣東南一百二十里與羅霄山相連俱跨吉安府安福縣界宋紹興中峒㓂猖獗州將趙扆統軍剿捕立柵山上一名葛仙峯相傳葛元煉丹處雲葢山在萍鄉縣東南一百二十里挺㧞高聳旦暮有雲霞往來其上筆架山在萍鄉縣南里許舊名迎鳳嶺後建三浮圖於上形如筆架因改今名俗又名塔嶺徐仙山在萍鄉縣西三里兩山相峙舊有徐姓者隱此又西十里有青山石姥山在萍鄉縣西五十里上多杉木寰宇記山側有石狀如姥因名五金山在萍鄉縣西七十里五峯連帶皆西向故名又有小南嶽亦在縣西七十里上插雲表登之可盡覽一邑之勝南源山在萍鄉縣北五十里其山平坦上有石似羅漢名羅漢岩山南有廣利院院前有泉四時不竭又南為浴石山楊岐山在萍鄉縣北七十里世傳為楊朱泣岐之所一作煬岐山寰宇記煬帝曾經此因名有煬帝壇見劉禹錫文明統志傍有玉女殿内有九石房相映如屏風人謂仙人所居相近者為瑶金山唐普濟襌師道場上有淥水洞靈丹井楚山在萍鄉縣北九十里相傳楚昭王曾經此山巔有楚王臺遺蹟龍山在萬載縣治後龍江經其下其勢峢崺為縣之鎮官衙綴倚其麓俗呼官山東岐山在萬載縣東七里與瑞州府上高縣接境有峯曰鵞鼻元虞集以為似蜀中之鵞鼻因名雞籠山在萬載縣東南五里平地宇起周迴􅌉旋巉石壁立西南有洞從穴入可容數人有泉四時不竭峯頂山在萬載縣西南三十里高可望郡城有泉清冽可以灌溉東臺山在萬載縣西南九十里山皆石壁稳山在萬載縣西八里兩山對峙中通一徑俗呼隠山關其相接者曰坤山聳峻嵯峨東曙不及惟斜陽可到往來者皆經其上又銀山在縣西十五里上有巨石㓗白如銀山半有洞可容數百人湯周山在萬載縣西三十里相傳晉時有湯周二人得仙於此有棋盤試劍石遺址九龍山在萬載縣西一百里山有九峯又西二十里曰鐵山地産鐡與湖南瀏陽縣分界紫葢山在萬載縣西北十五里山勢崇聳屹若車葢舊名雲葢山後改今名五雷山在萬載縣北二十里五山相連又四十里山在縣北三十五里其山周廻四十里故名皂山在萬載縣北六十里色如皂與瑞州府新昌縣接界一名連香嶺謝山在萬載縣北七十里府志以宋謝靈運得名泉石甚勝龍門山在萬載縣北九十里羣峯環聳中有四路狀如龍門南源嶺在宜春縣東四十里嶺凡五俗名南源五嶺分水嶺在宜春縣東南六十餘里與嚴營山寨相近皆為防扼洞㓂之所澗富嶺在宜春縣南六十里與吉安府安福縣接界宋嘉定四年嘗於此置寨以遏桞㓂大將嶺在宜春縣西北九十里周十五里山腰有泉名水漿湖嚴嶺在宜