front:
  text: 大清一統志袁州府在江西省治西少南四百里東西距二百九十里南北距二百一十里東至臨江府新喻縣界一百里西至湖南長沙府醴陡縣界一百九十里南至吉安府安福縣界六十里北至瑞州府新昌縣界一百五十里東南至吉安府治二百四十里西南至湖南長沙府攸縣界二百五十里東北至瑞州府上高縣治二百里西北至湖南長沙府瀏陽縣治二百八十里自府治至京師六千七十五里分野天文斗分野星紀之次建置沿革禹貢揚州之域春秋屬呉戰國屬楚秦屬
  hash: sha256:7b1959308987b39c97da7bd39fe0f106408158822eebca4de8f394509e00d322
