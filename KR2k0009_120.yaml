典確不尚浮藻龍鐔萬載人年十九選入南宫召對稱㫖命同隨春坊官入直講數年詔治水於泰州視軍遼東川雲所經利弊悉以聞太祖嘉其能特授浙江按察使以不避權貴為忌者所中遷長洲知縣歸侍飬歲餘起為晉府左長史燕兵起北檄徴晉兵鐔泣固拒之成祖入正大統械鐔下錦衣獄不屈死年僅四十易直分宜人父坐事繫獄請代不得自縛跪府門外獲釋父母殁並廬墓三年正徳中旌表黄子澄分宜人洪武十八年會試第一及第授編修伴讀東宫累官太常卿惠帝即位兼翰林學士與齊泰謀削諸王燕兵起以誅泰及子澄為名京城破執不屈磔死闔族皆斬一子變姓名為田經家湖廣咸寕正德中進士黄表其後云一年本朝乾隆四十賜子澄諡忠慤袁繼咸宜春人天啟進士崇禎中為御史謫行人遷主客員外數以直言被責厯山西提學僉事湖廣參議所至有聲擢右僉都御史巡撫鄖陽以襄陽失陷遣戍貴州起故官總理河北屯政進兵部右侍郎總督江西湖廣應天安慶軍務駐九江時賊巳陷武昌左良玉兵東下人情洶􅍅繼咸遇良玉於蕪湖激以忠義遂復還武昌福王時屢陳時政多切直為馬士英所阻左良玉反至九江繼咸詣其舟責以大義良玉約不破城駐軍候旨繼咸歸方集諸將謀拒守而部將郝效忠等與良玉兵合掠城中會良玉死其子夢庚與效忠俱降本朝繼咸不屈見殺乾隆四十年賜諡忠毅本朝張自烈宜春人博學洽聞著四書大全辨諸家辨古今文辨正字通十餘種累徴不就晚卜居廬山年七十七卒楊嘉禎宜春人順治三年兵亂父文盛避之山堂兵且至嘉禎從間道渡水報父水急被溺流至深猶躍岀水西曰速走速走遂死陳之龍宜春人天啟鄉舉明敏英達有文武才厯官至西安同知順治乙酉擢授巡撫廬鳳淮揚等處地方加意拊循威惠並著以疾歸卒祀鄉賢流寓晉習鑿齒襄陽人因苻堅亂避地萬載今墓在分宜宋陳瓘沙縣人徽宗時除名編管袁州靖康初贈諫議大夫諡忠肅呉師古宜興人紹興初胡銓上書乞斬秦檜師古鋟木傳其書為人所訐流袁州知浹汾州人岳飛下大理獄浹上書聲其冤流袁州列女元龍均用妻陳氏萬載人至元三年兵亂被掠自刎死陳九淵妻袁氏分宜人元季兵亂邑萬户王同者聞袁美姿容殺其夫欲娶袁遂自刎明孫氏女宜春人許配陽遵哲陽當戍遼東父議别婚孫自縊而死孫氏女分宜人許配歐陽翯翯當戍父議他適即自縊且曰及吾夫未去使知吾無異志也常氏女名秀蘭萬載人年十七遇鄉賊欲辱之拒罵甚厲賊磔之陳夀妻某氏分宜人未成婚夀得惡疾其父遣媒辭絶女不從竟歸夀事之三年不懈夀念巳疾不瘳徒累婦私市砒欲自盡婦覺之竊飲其半夀服大吐疾愈婦亦嘔出不死後夫婦偕老生二子人以為貞烈之報朱銶妻蘇氏宜春人年二十餘夫亡無子銶兄弟强之他適蘇誓死不從有部郎聞欲娶之蘇歎曰吾無庸生奚庸富貴孀居五十年卒甘棠茂妻王氏萍鄉人崇禎中楚賊陷萍鄉夫婦俱被執王紿賊釋其夫乃投江死王道明妻易氏宜春人為左良玉兵所掠牽其手易憤罵曰吾手豈可汚奪刀自㫁之遂遇害彭汝明妻張氏宜春人又汝聽妻湯氏汝楫妻張氏俱以不從賊被殺旌表李京妻劉氏宜春人與同縣彭克成妻袁氏俱為左兵所掠哭罵而死潘鑾妻翟氏宜春人左兵肆掠翟挈幼子避山巖兵圍之不屈引刀自刎死劉和積妻袁氏宜春人年二十二夫亡撫其子芳聲僅二歲崇禎末遭兵不辱死媳楊氏年二十四芳聲殁守節撫遺腹子應壁人稱一門雙節劉先四妻易氏宜春人崇禎末遭亂被執不從投清􅅹江死同縣梁峻禎妻聞氏亦被掠不屈為賊所殺張懷相妻潘氏宜春人年十四歸張數年夫卒潘孝事舅姑紡績教其子厯三十年崇禎時亂避兵於集雲鄉被執奪刀自刎死本朝陳昌言妻劉氏宜春人善事翁姑康熙十三年棚寇亂劉攜子婦潘氏匿龍陂嶺五日不食賊至不能起度必受汚投石擊之俱被殺范僎妻余氏宜春人年二十夫殁未幾舅亦殁遺孤六月隣黨侵之余力持門户事姑十有七年以孝稱何之鰲妻李氏萍鄉人夀百嵗康熙五十五年表其門曰節夀彭錦妻樂氏宜春人夫亡守節同縣羅文繡妻謝氏何之楩妻呉氏張朝煜妻易氏魏裕邦妻胡氏黄秉瑜妻易氏謝作霖妻邱氏余泰山妻劉氏花彩妻晏氏彭梅妻單氏晏澤妻龍氏吏目彭加爵妻施氏龍熙妻李氏錢士繪妻周氏陳慰祖妻張氏施榮妻吕氏烈婦胡奇賢妻曹氏彭以銀妻張氏均乾隆年間旌楊邦吉妻王氏分宜人夫亡守節同縣趙繼顔妻張氏歐陽信妻王氏王昭鏞妻金氏李搢妻謝氏鍾琳妻曹氏嚴宗堡妻黄氏經厯嚴宗期妻朱氏趙廷來妻張氏傅蒂寵妻李氏袁鳴妻丁氏黄紹中妻林氏張世峻妻鍾氏嚴秉璋妻裘氏萬定琳妻胡氏宋紹儼妻周氏均乾隆年間旌陳徳璗妻彭氏萍鄉人夫亡守節同縣鄧培英妻蔡氏劉殿邦妻易氏何鏜妻陳氏喻奎章妻黄氏何學聖妻劉氏譚相高妻顔氏鄧錫鯨妻施氏施德洋妻喻氏李道涵妻施氏蕭世乾妻劉氏烈婦楊違春妻李氏易文祥妻劉氏羅受昌妻彭氏均乾隆年閒旌郭祚升妻辛氏萬載人夫亡守節同縣郭邦相妻宋氏宋啟洙妻敖氏聞光裕妻宋氏郭鍾才妻宋氏喻照夫妻李氏鮑大本妻郭氏楊光賢妻李氏辛汝俊妻王氏文倬妻辛氏唐裕泰妻辛氏唐開摰妻辛氏周嗣召妻張氏周繼熙妻王氏李時英妻羅氏龍培德妻辛氏王錫晉妻林氏巫興周妻黄氏龍錦妻郭氏張志高妻孫氏曹繼周妻湯氏郭邦瑋妻巢氏周繼烈妻辛氏汪朝流妻龍氏鄧鍔妻李氏黄秉中妻曾氏彭英文妻龍氏彭英能妻汪氏曹錫組妻汪氏辛秋妻郭氏陳邦光妻郭氏楊之澄妻袁氏湯之海妻辛氏張啟宇妻辛氏郭治和妻韓氏辛基布妻汪氏郭洵妻劉氏張朝選妻郭氏聞九成妻汪氏均乾隆年