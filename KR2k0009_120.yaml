訓之拒戰厲聲罵賊與自仁俱被害贈訓之直秘閣諡忠果自仁通直郎邑人為立祠李璆汴人紹興四年知吉州江西兵素剽悍璆始視事即相挺為亂亟捕誅首謀者撫循其餘大布恩信境内遂安張大經南城人紹興中宰龍泉有善政諸司列薦王師道兖州人紹興中為吉州栗傳砦巡檢與盜戰於吳村每射輒斃賊有伏於民居者挺身力戰遂死立廟其地謝諤新喻人為吉州錄事參軍因死者舊瘞以鞂往往暴骨諤白郡取官船棄材以棺殮之嵗大祲饑民萬餘求廩官吏罔措諤植五色旗分部給糶頃刻而定趙蕃玉山人高宗時為泰和主簿受知於楊萬里劉清之臨江人孝宗時調萬安丞州議減常平米直清之曰在我有政則大家得錢細民得米兩適其便乃請均境内之地為八俾有栗者分賑其鄉民甚賴之趙希言淳熙中為吉州司理屬邑有冤獄希言理出之用楊萬里周必大薦改授臨江府司法黄疇若豐城然淳熙中知廬陵縣州常以六月督畸零税疇若念民方鞎食取任内縣用錢三十餘緍為民代輸兩年諸司舉為邑最范應鈴豐城人開禧初調永新尉縣當龍泉茶陵溪峒之衝寇甫平喜亂者詐為驚擾應鈴廉得主名捽而治之安撫使奏弛民租詔下如章既而復征應鈴力爭訖得請民大悅後江石峒寇為亂吉州七邑被殘復以應鈴知吉州下車首以練兵足食為先務然後去冗吏覈軍籍汰老弱以次罷行永新禾山羣盜嘯聚數日間應者干數應鈴察過客趙希邵有才畧檄之攝邑調郡兵結隅保分道搗其巢穴擒之誅其為首七人一郷以定贛叛卒朱光賊殺主帥密遣諜以厚賞捕之張洽清江人嘉定中知永新縣有獄吏受財乘間訊囚搒笞使誣服亟執付獄上於郡黥之湖南酃寇作亂洽單車往延見隅官訪利害因行安福境結約土濠未幾南安舒寇將來犯境聞有備乃去楊大異醴陵人寕宗末調龍泉尉攝邑令適嵗饑提刑同遣吏和糴米二萬石於邑米價頓增民乏食大異即以提刑司所糴者如價發糶民甚德之冷應徴分寕人寶慶中調廬陵主簿夕廉能著有愬事臺府者必曰願下廬陵清主簿尤為楊長孺所識拔葉夢得寕海人淳祐中提舉江西常平兼知吉州節制悍将置社倉義倉平反李義山受贓之寃江萬里都昌人淳祐中知吉州創白鷺洲書院以居學者講誦之業大振元張懋范陽人至元中吉州路總管惡衣糲食率之以儉慎刑平政處之以公新府治設義倉郡萬户蘇良恃勢為暴為之翼者有十虎之目民甚苦之乃白憲府盡誅十虎奪良虎符黜之民大悦流亡來歸者數千家相率為生祠以祀之明劉齊太祖初為行省參政守吉安守將李明道潛納陳友諒兵城遂陷執齊欲降之不屈送友諒所殺於洪都城下顧文昱嘉定人洪武初知泰和州氏好訟光遠為長榜誨諭來訟者俾居譙門上思三日然後投諜其真負寃者始為疏理未兩月民不復訟境有虎為檄告神虎一夕去前知泰和者為安慶呉去疾有惠政州人語良牧必以二人為首云錢本忠武進人洪武中知吉水縣有廉名詿誤罷官百姓號泣乞留得還任卒於官留葬吉水民爭負土營墳藺芳夏縣人永樂中知吉安府寛厚廉潔吉水民詣闕言縣産銀請置冶芳力奏其妄事得寝民甚徳之陳本深鄞人宣德五年知吉安府郡多豪强好訐訟巨猾彭搏等十九人横閭里本深密遣人與相結召與飲伏壯土後堂猝起拉殺之皆曳其尸以岀一府大驚樂安大盜曾子良據大盤山衆萬餘本深設伏大破之斬子良其為政舉大綱不屑苛細大猾既殱府中無事每晨起升堂有所訟呼至榻前析曲直遣之亦不受狀有抑不伸者雖三尺童子皆得往白久之民恥爭訟尤折節士人飾治學宫奏新先儒祠廟滿九載當遷郡人乞留詔予正三品俸又九載請老既去民肖像祀之何澄四川人正統中知安福縣嘗築寅陂浚渠道復密湖以溉民田秩滿民乞留詔還任張瑄江浦人景泰中知吉安府俗尚巫迎神無休日瑄遇諸塗投神水中無何瑄遘疾危父老皆言神為祟請復之瑄怒不許疾亦愈嵗大饑陳諜上官不俟報輒發廩賑貸居八年以薦擢廣東右布政使張淳合肥人宏治中知吉安府俗好訟蔓引動數百人淳涖以嚴明訟遂衰止版籍多淆亂淳為釐正役均弊絶府故有堂食錢淳悉以給還嵗省民數千兩民為立祠王昂掲揚人宏治中知永豐縣持廉秉公化民以德民有兄弟爭訟者入庭恥之遂自平舊俗有喪必椎牛釃酒以速弔客昂導以禮教俗少變毁淫祠增社學凡事關風化者為之恐後邑稱賢令必曰昂云張本錢塘人宏治間知吉安府郡多豪猾有隙輒聚黨千人相挺擊本下車即械繫其尤而奏請聚至十人以上者發遣戍由是皆讋服莫敢犯陸震蘭谿人正德中知泰和縣時劉瑾擅政以逋鹽課誣民縣中當償者萬計震力白上官得免鎮守中官嵗徵貢絺為減其額邑有浮糧累民震稽賦籍得詭寄隱匿者萬五十石以補之親行鄉落勸課農桑增築學舍居諸生躬為講授毁淫祠祀忠節建倉縣左儲穀待賑立保伍法使民備盜盜不敢入境泰和人生祠之王守仁餘姚人正德中知廬陵縣伍文定松滋人正德中知吉安府討平永豐及大茅山賊巳與王守仁破桶岡横水諸賊巢宸濠反迎王守仁定計討平之王冕洛陽人正德中知萬安縣宸濠反冕募壯士從王守仁攻南昌又獻火攻策敗之鄱陽宸濠易小舟遁冕部卒追及之遂就擒唐侃丹徒人正德中知永豐縣之官不攜妻子獨與一二僮僕日飯蔬豆羹以居俗刁訟尚鬼又好俳優侃悉禁止之陸粲長洲人嘉靖中知永新縣縣多盜乃損益保伍法召諸窩盜者貰其罪令立功自贖前後獲盜數百人悉斃之姦猾屏迹靳學顔濟寕人嘉靖中知吉安府盡罷供具爱民節用刑不妄施數月庭中無事胥吏無所牟一錢危嶽點陽人嘉靖中爲吉安推官剛毅有大節雖貴勢無所撓嘗攝安福縣事躬履畝以量田豪猾無敢逞志卒於官貧無以殮劉修巳新蔡人嘉靖中爲吉安推官鞫獄明決日夕手撰獄詞不他寄耳目嘗攝吉水事其在府一言無所假及涖吉水主尺童子可以牽衣告語縣民視其去來以爲欣戚卒於官士民若喪所親徐學聚蘭谿人萬厯中知吉水縣仍嵗旱澇拯恤有力嘗築隄三十里民號為徐公隄徐懋衡婺源人萬厯中知永新縣立官解法以蘇民困大吏下其法於諸郡江右官解自此始劉綿祚武進人崇禎中知永豐縣鄰境九蓮山賊窟其中綿祚屢請會剿賊怒率衆來攻綿祚出擊三戰三捷賊益大至綿祚伏兵黄牛峒誘賊復大破之縣境以安陸運昌仁和人崇禎中知永豐縣請免逋租數萬調吉水取河壖棄地代民田浮賦平山盜抑宗室暴横治行為一時冠梁于涘江都人崇禎末知萬安縣南昌失守大兵至縣諭之降不從繫南昌獄數月自縊死夲朝乾隆四十一年賜諡節愍本朝趙世猷順天人順治初知安福縣捐一切文法與民休息嵗丁亥大歉石米至銀七兩世猷多方拯救為糜以賑所活甚衆悍兵往來境上掠財物無可誰何世猷力戢之士民感德薛世瑞范縣人順治初知龍泉縣時吉安初破不軌之徒多竄名營伍肆行焚掠世瑞日往來營伍中見被掠者輒救出之請緩催科以蘇民困戊子大饑世瑞嘗市麰麥不可得至夜乃一食其清操愛民如此鄧秉恒聊城人順治中知永豐縣釐剔姦蠧率鄉兵剿平山寇郡舊食廣鹽時鹽已不行而課存秉恒内召疏免其課闔郡德之蕭恒三原人順治中知安福縣邑田為沙水所侵多虚賦請於巡按御史奏減糧千餘石以憂去同郷袁時泰繼之以清慎稱邑人謡曰前有蕭父後有袁母
