body:
  text: 湖北省在京師西南三千一百五十五里東西距二千四百四十里南北距六百八十里東至安徽安慶府宿松縣界五百五十里西至四川夔州府巫山縣界一千八百九十里南至湖南岳州府臨湘縣界四百里北至河南汝寕府羅山縣界二百八十里東南至江西九江府瑞昌縣界四百五十里西南至四川酉陽直隸州彭水縣界二千五百十五里東北至安徽六安直隸州霍山縣界四百六十里西北至陜西商州直隸州山陽縣界一千四百七十里分野天文翼軫分野鶉尾之次晉書天文志自張十二度至軫十一度為鶉尾楚之分野南郡入翼十度江夏入翼十二度建置沿革禹貢荆州之域周亦為荆州春秋為楚國及隨鄧弦黄唐鄖庸穀夔州絞盧鄾鄀貳軫權厲諸小國地戰國屬楚漢初項羽建衡山臨江二國史記項羽本紀項王立呉芮為衡山王都邾共敖為臨江王都江陵㝷并於漢高帝分置江夏南郡二郡武帝元封五年置十三部刺史此為荆州北境後漢因之初刺史治武陵郡漢壽在今湖南境漢末劉表為荆州治襄陽在今省境內建安中分屬劉先主孫權曹操晉書地理志建安十三年魏武盡得荆州之地及敗於赤壁南郡以南屬呉呉後遂與蜀分荆州南郡零陵武陵以西為蜀江夏桂陽長沙三郡為呉南陽襄陽南鄉為魏按南郡江夏襄陽南鄉俱在今省境南陽今屬河南餘皆屬湖南三國分屬呉魏杜佑通典劉備殁後所分之地悉復屬呉而荆州南北雙立呉荆州治南郡領南郡江夏蘄春武陵宜都長沙零陵桂陽等郡増置武昌建平天門衡陽湘東邵陵營陽等郡魏荆州治宛領江夏襄陽義陽弋陽等郡按天門衡陽湘東邵陵營陽今屬湖南義陽今屬河南餘俱在省境呉人嘗立郢州見宋書州郡志旋廢其所領郡未詳晉平呉并荆州為一荊州初治襄陽平呉後治江陵領江夏南郡襄陽新城魏興上庸建平宜都武昌南平武陵天門長沙衡陽湘東零陵邵陵桂陽等十八郡廢義陽蘄春營陽三郡以弋陽郡屬豫州惠帝時立江州以桂陽武昌屬焉元帝時僑置新興南河東二郡孝武時又僑置雍州於襄陽遥領京兆始平扶風河南廣平義成北河南七郡按南平以下九郡今屬湖南餘俱在省境南北朝宋亦為荆州領南郡南平天門宜都巴東汶陽南義陽新興南河東建平永寕武寕等郡當時亦僑置雍州領舊郡七増南上洛馮翊南天水建昌華山五郡其義陽随陽安陸南汝南四郡屬司州增置郢州治夏口領江夏竟陵武陵武昌巴陵西陽六郡其魏興新城上庸及新置北上洛屬梁州齊并因之荆州領南郡天門宜都等郡郢州仍領舊郡七又增置襄陽安蠻府南襄等郡屬焉其魏興新城上庸等五郡仍屬梁州隨安陸二郡屬司州梁亦為荆郢雍州雍州仍治襄陽増置北江治鹿城關義治羅田岐治房陵綏治綏陽南洛治上洛北新治新陽南司治安陸土治龍巢應治水陽宜治夷陵等州而漢東之地㝷入西魏梁大寶元年即西魏大統十六年西魏克安陸盡有漢東之地寖及荆襄西魏恭帝元年克江陵立蕭察為梁王居荆州時改雍州曰襄州南洛為上州北新曰温州南司曰安州宜州曰拓州其義土應諸州仍舊廢岐綏北郢三州增置蔡昌基鄀平岳隨唐順諸州旋為周有亦置荆襄諸州改安州曰溳州拓州曰硤州南司曰黄州廢岳州増置沔弋亭遷豐復臨江施諸州惟北江州初屬齊改曰湘州増置衡州巴州南司州羅州周滅齊改羅州曰蘄州湘州復曰北江州餘皆仍舊陳承梁緒僅有郢州别置荆州治公安隋仍周舊置荆州都督府開皇九年并有陳地大業初改爲南郡夷陵竟陵沔陽清江襄陽漢東安陸永安義陽江夏等郡俱屬荆州唐武德初復改諸郡爲州五年置荆州大總管府舊唐書地理志武德五年荆州置大總管管荆辰朗澧東松基沈復巴睦崇硤平等十三州統潭桂高交循夔康欽尹九州六年改爲大都督督荆辰澧朗東松岳硤玉八州仍統潭桂交䕫高欽尹七州其沈復睦崇四州循康二州都督不統八年廢玊州貞觀二年降爲都督府惟督前七州其桂潭等七州不統龍朔二年升爲大都督督硤岳復郢四州貞觀初諸州分屬淮南及山南道開元二十一年又分屬江南西及淮南山南東黔中道江南西道領鄂州治南道領蘄黄安三州山南東道治襄州領江陵府硤歸隨均房復郢諸州黔中道領施州至德二載置山南東道唐書方鎮表至德元載置襄陽防禦守捉使二載升為山南東道節度使領襄鄧隨唐安均房金商九州治襄州貞元三年増領復州會昌四年廢是年復置文德元年賜號忠義軍天祐三年忠義軍節度使復為山南東道節度使及荆南節度使唐書方鎮表至德二載置荆南節度使領荆澧朗郢復䕫硤忠萬歸十州治荆州上元元年領澧朗忠硤四州二年領涪衡潭岳郴衡永道連九州廣德二年罷領忠涪二州以衡潭邵永道五州隸湖南觀察使永泰元年罷領岳州大厯元年復領澧朗涪三州元和三年涪州隸黔中節度使太和六年廢節度使置都團練觀察使開成三年復置元和初置武昌軍節度使唐書方鎮表乾元二年置鄂岳沔三州都團練守捉使治鄂州上元元年鄂州隸荆南節度使永泰元年升觀察使增領鄂蘄黄三州元和元年升為武昌軍節度使増置安黄二州五年罷節度使置鄂岳都團練觀察使大中元年復置節度使二年罷四年復六年罷文德元年復置五代時為楊行密高季興所分據黄蘄鄂三州屬楊行密後屬南唐周廣順五年蘄黄二州為周所取高季興有荆歸硤三州惟襄均房隨鄂復安七州世屬中朝宋建隆三年平高季興八年滅南唐置湖北及京西路元豐中改荆湖北路分置京西南路荆湖北路初治鄂州尋治江陵領德安府復硤歸三州荆門漢陽二軍南渡後增置夀昌軍在今省境其餘今屬湖南京西南路治襄陽府領隨房均郢四州在今省境餘今屬河南陜西淮南西路夔州路蘄黄二州屬淮南西路施州屬夔州路元置湖廣等處行中書省治武昌路在省境者武昌興國二路漢陽府及歸州屬湖廣行省之江南湖北道亦分屬河南行省在省境者襄陽蘄州黄州三路屬河南行省之河南江北道中興硤州二路安陸沔陽德安三府荆門一州屬河南行省之山南江北道惟施州屬四川行省之䕫路明洪武初仍設湖廣行省九年改置湖廣等處承宣布政使司統轄湖南北正統三年設湖廣巡撫崇禎間設總督俱駐武昌本朝康熙三年分置湖北省領府八武昌漢陽黄州安陸徳安荆州襄陽鄖陽雍正六年升荆州府屬歸州為直隸州十三年升荆州府屬夷陵州為宜昌府降歸州直隸州為州屬焉以舊屬歸州之恩施縣治置施南府乾隆五十六年升安陸府屬荆門州為直隸州共領府十直隸州一武昌府漢陽府黄州府安陸府德安府荆州府襄陽府鄖陽府宜昌府施南府荆門直隸州形勢東連湓浦湓口戍今江西九江府自黄蘄而下則九江為都㑹南距湖湘荆州府石首監利二縣接岳州府巴陵華容二縣其南則洞庭湖湘江及諸水所匯西據三峽三峽起自四川䕫州府奉節巫山二縣之東達於宜昌之西連山疊嶂凡六七百里北帶漢川自漢而北即河南陜西之境其名山則有荆山在襄陽府南漳縣西南漳水出焉禹貢􅍮州之名由此內方今名章山在安陸府鍾祥縣東荆門州西大别在漢陽府北江漢合流處其大川則有江水自四川巫山縣流入逕宜昌府及荆州府厯沔陽州南境過嘉魚縣西北至武昌府城西漢陽府城東會漢水復北折而東厯武昌府北自廣濟黄梅縣南入安徽宿松縣界其南則江西德化縣自西而東厯境內者約一千八百里漢水自陜西白河縣流入厯鄖陽府至襄陽府城北折而東南又南逕安陸府西至漢陽府城東北㑹大江沮水源出鄖陽府房縣南景山東南流入襄陽府南章縣人南逕荆門州遠安縣至安陛府當陽縣北合漳水又西至荆州府江陵縣入大江漳水源出襄陽府南漳縣荆山東南至安陸府當陽縣北合沮水入大江其重險則有夏口即漢水入江之口在武昌府城西荆門在荆州府宜都縣西北五十里北對虎牙山上合下開江流其中為楚西塞西陵在宜昌府西北二十五里西接四川夔州府之瞿塘巫峽江水厯峽中至西陵峽口始漫為平流府當其衝故自古倚為重鎮地居津要形屬上游為東南之澤國實菽粟之巨區舊志文職官總督通轄湖北湖南駐武昌府巡撫駐武昌府提督學政駐武昌府布政使駐武昌府經厯照磨兼管鹽道庫大使庫大使廣備按察使駐武昌府經厯司獄督糧道駐武昌府庫大使鹽法兼分守武昌道駐武昌府分巡漢黄德道駐黄州府分守安襄鄖荆道駐襄陽府分巡荆宜施道駐荆州府武昌府知府同知通判府學敎授訓導經厯司獄知州興國州判州學學正訓導吏目知縣九員江夏武昌嘉魚蒲圻咸寕崇陽通城大冶通山縣丞三員江夏武昌蒲圻縣學敎諭九員訓導九員巡檢十二員鮎魚口金口滸黄灘山坡金子磯白湖簰州石頭港口富池黄顙道士洑典史九員漢陽府知府同知駐漢口通判府學敎授訓導經厯司獄知州沔陽州同駐新隄州判駐仙桃鎮州學學正訓導吏目知縣四員漢陽漢川孝感黄陂縣丞二員舊設漢陽黄陂二員嘉慶十一年裁黄陂一缺移設孝感縣學敎諭四員訓導四員巡檢十二員禮智仁義新灘沌口蔡店劉家隔小里潭馬溪河灄口大城潭鍋底灣沙鎮舊有小河一員嘉慶十一年改駐灄口典史四員黄州府知府同知二員一駐岐亭鎮一駐武穴鎮通判府學敎授訓導經厯舊有司獄嘉慶十四年裁以經厯兼管知州蘄州判州學學正訓導吏目知縣七員黄岡蘄水羅田麻城黄安廣濟黄梅縣丞四員黄岡蘄水麻城黄梅縣學敎諭七員訓導七員巡檢十八員團風楊邏但店中和黄陂站巴河蘭溪多雲虎頭關鵞籠大同茅山龍坪馬口新開口孔壠亭前嘉慶十四年増設倉子埠一員典史七員安陸府知府同知舊駐沙洋乾隆五十六年移駐臼口府學敎授訓導經厯舊有照磨一員乾隆四十八年裁知縣四員鍾祥京山潛江天門舊有當陽一員乾隆五十六年改隸荆門州縣丞三員鍾祥京山天門主簿潛江縣學敎諭四員訓導四員巡檢四員麗陽宋河高家場乾鎮典史四員德安府知府同知通判府學敎授訓導經厯司獄知州隨州同駐祝林總乾隆三十六年移鶴峯州五里坪一缺改隸州判駐唐縣鎮嘉慶十五年設州學學正訓導吏目知縣四員安陸雲夢應城應山縣學敎諭四員訓導四員巡檢五員長江埠合河店梅邱鎮高城總三里店舊有唐縣鎮一員嘉慶十五年裁典史四員荆州府知府同知二員一駐府城一駐萬城隄通判駐沙市府學敎授訓導經厯司獄知縣七員江陵公安石首監利松滋枝江宜都舊有遠安一縣乾隆五十六年改隸荆門州縣丞四員江陵公安石首監利縣學敎諭七員訓導七員主簿二員一駐郝穴口一駐朱家河俱乾隆五十六年設巡檢八員沙市虎渡口龍灣市孱陵白螺磯窰圻分鹽所磨盤洲舊有郝穴口朱家河二員乾隆五十六年裁典史七員襄陽府知府同知駐樊城通判府學敎授訓導經厯兼管司獄知州均州學學正訓導吏目知縣六員襄陽宜城南漳棗陽榖城光化縣丞襄陽縣學敎諭六員訓導六員主簿一員駐棗陽縣平林店嘉慶十年設巡檢六員吕堰雙溝田家集方家堰石花街左旗營典史六員鄖陽府知府通判舊駐府城嘉慶十五年移駐上津堡府學敎授訓導經厯兼管司獄知縣六員鄖房竹山竹谿鄖西保康縣學敎諭六員訓導六員巡檢四員舊設板橋山黄龍鎮上津堡三員乾隆四十八年増設九道梁一員嘉慶十一年移上津堡一員駐官渡河典史六員宜昌府知府同知舊駐漁陽關嘉慶十五年移