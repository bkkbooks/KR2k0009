破石勒將平襄陽拜大將軍庾亮潁川鄢陵人成帝時都督江荆豫益梁雍六州諸軍事領江荆豫三州刺史鎮武昌時後趙主石勒新殂亮欲開復中原乃解豫州授毛寶使與西陽太宁樊峻精兵一萬俱戍邾城又以陶稱為南中郎將率部曲五千人入沔中弟翼為南蠻校尉鎮江陵陳囂為梁州刺史趣子午谷又遣偏師伐蜀執偽荆州刺史李閎巴郡太守黄植送於京師亮率大衆十萬據石頭城為諸軍聲援庾冰亮弟康帝即位除都督江荆寕益梁交廣七州豫州之四郡軍事鎮武昌㝷卒於官冰天性清慎常以儉約自居臨卒謂長史江霦曰吾將逝矣恨報國之志不展死之日斂以時服無以官物也及卒無絹為衾室無媵妾家無私積世以此稱之庾翼冰弟咸康中授都督江荆司雍梁益六州諸軍事鎮武昌每竭志能勞謙匪懈戎政嚴明經畧深遠數年之中公私充實河以南皆懷歸附後趙汝南太守率數千人詣翼降翼又遣使東至遼東西到涼州要結二方欲同大舉慕容皝張駿並報使請期翼雅有大志以平中原滅巴蜀為己任請移鎮襄陽後趙遣五六百騎出樊城翼遣冠軍將軍曹據追擊於橈溝北破之翼綏來荒遠盡招納之宜立賓館置典賓穆帝即位還鎮夏口繕修軍器大佃積榖欲圖後舉遣益州刺史周撫西陽太守曹據伐蜀破蜀將季桓於江陽永和元年卒於官謝尚陳國陽夏人建元初督江夏義陽隨三郡軍事江夏相為政清簡始到官郡府以布四十匹為尚造烏布帳尚壞之以為軍襦袴時庾翼鎮武昌尚數詣翼諮謀軍事嘗與翼共射翼曰卿若破的當以皷吹相賞尚應聲中之翼即以其副給之桓沖譙國龍亢人穆帝時督荆州七郡諸軍事鎮襄陽與兄温破姚襄軍郗恢高平金鄉人孝武時督梁秦雍司荆陽并等州諸軍事雍州刺史鎮襄陽甚得關隴之和降附者動以千計南北朝宋劉粹沛郡蕭人文帝時持節督雍梁南北秦四州荆州之南陽竟陵順陽襄陽新野隨六郡諸軍事在任簡役愛民唐李孝恭宗室平蕭銑遷荆州道總管置屯田立銅冶百姓利之遷襄州道行臺左僕射時嶺表未平孝恭分遣使者綏輯安慰款附者四十九州韋倫京兆人第五琦薦倫才擢荆襄道租庸使襄州裨將康楚元亂刺史王政棄城遁賊南襲江陵絶漢沔餉道倫調兵屯鄧州厚撫降賊擒楚元以獻收租庸二百萬緡來瑱邠州永壽人乾元三年為山南東道節度使時襄州部將張維瑾殺其使瑱至維瑾降上元二年破史思明餘黨於魯山俘賊渠又戰汝州斬首萬級李承趙州高邑人徳宗時為山南東道節度使時李希烈猶據襄州帝慮不受命欲以楚兵衞送承承辭請以單騎入既至希烈舍承外館迫脅萬端承晏然誓以死守希烈不能屈遂大掠去襄漢蕩然承輯綏撫安之居二年闔境完復希烈雖去留部校守覘承因得任所厚臧叔雅結希烈腹心周會等謀殺希烈希烈之死承首謀也樊澤河中人德宗時累遷山南東道司馬就拜節度使諸將憚其材武數與李希烈角禽驃將張嘉瑜杜文朝梁俊之等賊氣沮縮遂取唐隨二州貞元三年為荆南節度使會山南東道卒亂剽居人以澤威惠著襄漢聞復徙山南東道卒於官李皋太宗五世孫嗣曹王德宗時遷荆南節度使江陵東北傍漢有古障不治歲輒溢皋修塞之得其下良田五千頃規江南廢洲為廬舍構二橋跨江而流人自占者二千餘家由荆抵樂鄉二百里間數十墟聚不井飲皋命鑿井以便人貞元初吳少誠擅蔡徙皋鎮山南東道皋練兵峙糧市囘鶻馬以益戰騎歲時大畋以敎士少誠畏之皋性勤儉能知人疾苦叅聽微隱盡得吏下短長其賞罰必信所至常平物估豪舉不得擅其利敎為戰艦合二輪蹈之鼓水疾進駛於陣馬有所造作皆用省而利長以物遺人必自視衡量庫帛皆印署以杜吏謾裴胄絳州聞喜人德宗雅記胄才拜荆南節度使是時方鎮爭剥下希恩製重錦異綾名貢奉有中使者即悉公帑市歡冑待之有節獻賞值不數金宴勞止三爵柳公綽京兆華原人元和中為鄂岳觀察使時方討呉元濟詔發鄂岳卒五千隸安州刺史李聽公綽請自行許之抵安州謂聽曰兩郡守何所統壹吾欲署公職以兵法從事聽許之即以都知兵馬使中軍先鋒行營都虞侯三牒授之選兵六千屬焉戒諸校曰行營事一決都將聽被用畏威遂盡力軍出公綽數省問士卒家疾病生死厚給之婦人放蕩者沈之江軍中感服故鄂軍每戰輒克長慶中遷山南東道節度使行部至鄧縣吏有納賄舞文二人同繫獄縣令以公綽素持法謂必殺貪者公綽判曰贓吏犯法法在姦吏犯法法亡誅舞文者崔郾貝州武城人敬宗時為鄂岳觀察使自蔡人叛鄂岳常苦兵江湖盜賊顯行郾修治鎧仗造蒙衝駛追窮躡上下千里歲中悉捕平初郾嘗為虢州觀察使治虢以寛經月不笞一人及涖鄂則嚴法峻誅一不貸或問其故曰陜土瘠而民勞吾撫之不暇猶恐其優鄂土沃民剽非用威莫能治聞者服焉裴度河東聞喜人太和中出為山南東道節度使白罷元和所置臨漢監收千馬納之校以善田四百頃還襄人王起揚州人為山南東道節度使瀕漢塘堰聯屬吏弗克治起至部先修復與民約為水令遂無凶年高元裕渤海人拜山南東道節度使在鎮五年奏蠲逋賦盧鈞京兆藍田人會昌中漢水害襄陽拜鈞山南東道節度使築隄六千步以障漢暴盧肇作詩以美之徐商新鄭人宣宗時遷山南東道節度使襄多山棚為剽賊商取材卒為捕盜將别為屯營寇所發輒迹捕捕必得遂為精兵趙匡凝蔡州人昭宗時為山南東道節度使不三年以威惠聞天祜元年封楚王時諸道不上供惟匡凝歲貢賦天子朱全忠方圖天下遣人諭止之匡凝流涕曰吾為國屏蔽渠敢有他志宋李惟清下邑人太平興國五年為荆湖北路轉運使兼總南路嘗入奏事太宗問曰荆潮累年豐稔又無徭役民間蘇否惟清曰臣見官賣鹽民以三斗稻價方可買一斤乃詔斤減十錢度支許仲宣建議歲賦鹽於鄉村與户稅均納詔惟清詳定奏言以鹽配民非便乃罷帝又問民間苦樂惟清言荆湖民市官酒轉鬻斗給耗二升今三司給一升民多他圖而歲課甚減詔復其舊岳飛相州湯陰人紹興四年李成挾金人破襄陽唐鄧隨郢諸州及信陽軍除飛荆南鄂岳制置使尋命兼統黄復諸州飛奏襄陽六郡為恢復中原基本當先取六郡議營田以足軍食遂破李成悉復諸郡乃以隨郢唐鄧信陽並為襄陽府路隸飛飛奏襄陽等六郡人户闕牛種乞量給官錢免官私逋負州縣官以招集流亡為殿最六年入覲面陳襄陽自收復後未置監司州縣無以按察帝從之又令湖北襄陽府自知州通判以下賢否許飛得自黜陟張浚至江上命飛屯襄陽以窺中原改武勝定國軍節度使置司襄陽汪澈饒州浮梁人紹興末為湖北京西宣諭使時欲置襄守荆南澈奏襄陽為荆楚門户不可棄留呉拱守襄敵騎奄至拱大戰漢水上敵衆敗走孝宗即位以澈督軍荆襄澈以襄漢沃壤請因古長渠築堰募民卒雜耕給種興牛歲可登榖七十萬斛功緒畧就虞允文隆州仁壽人隆興元年除湖北京西制置使時朝議欲棄唐鄧海泗四州允文五疏力爭三年拜四州宣撫使過襄陽奏修府城趙葵衡山人寶祜三年鎮荆湖城荆門及郢州范天順荆潮都統也襄陽受圍天順守戰尤力及吕文煥出降天順仰天嘆曰生為宋臣死當為宋鬼即所守處縊死贈定江軍承宣使元廉希憲輝和爾人世祖渡江取鄂州命希憲入籍府庫希憲引儒生百餘拜伏軍門因言王師渡江凡軍中俘獲士人宜官購遣還以廣異恩世祖嘉納之後行省荆南至建即日禁剽奪通商販録宋故幕僚以備采訪拒却珍玩禁殺俘獲及質賣妻子者先是江陵城外蓄水捍禦希憲命法之得良田數萬畝以為貧民之業發倉乘二十萬斛賑公安饑大興學校選敎官置經籍旦日親詣講舍以勵諸生西南溪峒越境請降以疾召還江陵民泣留不得畫像建祠希憲環装蕭然惟琴書自隨而已輝和爾舊作畏吾今改賈居貞真定獲鹿人至元十二年伯顔伐宋居貞以僉行省事留鄂發倉廩以賑流亡宋宗室子孫流寓者廩食之不變其服而行其楮幣東南未下州郡商旅留滯者給引以歸之免括商稅並湖荻禁一方安之十四年拜湖北宣慰使時驕將悍卒合謀擾民居貞出視事人恃以無恐及行鄂之老幼號送於道刻其像於石祀之泮宫桑結河西人為湖廣行省平章事時威順王歲嘗出獵民病之又廣園囿萃倡妓役巨賈以網大利有司莫敢忤結至謁王王闔中門啟左扉召入結引繩牀坐王中門曰吾受命作牧非王私臣焉得由不正之道入乎王命啟中門結入嚴詞責王王謝過悉罷其所為有妖僧恃寵横恣結命掩捕之得妻妾女樂十八人罪而籍之由是豪强斂手至正十一年汝潁賊起結任鄭萬户擒其渠魁數十人桑結舊作星吉今改正明鄧愈虹縣人洪武初為湖廣行省平章鎮襄陽立軍府營練屯卒拊循招徠威惠甚著薛瑄河津金無錫人正德中巡撫湖廣諸王府所據山場湖蕩皆奏還之官降盜賀璋羅大洪復叛討平之郴州貴陽猺翼福全稱王金破其砦禽之武宗親征宸濠武昌與江西接壤江彬干求暴横金抗䟽論列凡有事以身當之官民皆免於禍張邦奇鄞縣人正德時為湖廣提學副使下敎曰學不孔顔行不曹閔雖文如雄褒吾不取也在任三四年諸生競力於正學應檟遂昌人嘉靖末為湖廣提學副使清廉方正楚愍王召宴不赴餽遺不納王銜之及王被世子英燿害長史受金以中風報檟發其事英燿伏誅顔鯨慈谿人督學湖廣清介不阿楚藩常有所屬鯨峻却之試畢集諸生於濂溪書院講學率以為常熊宇奇新建人萬厯時為湖廣提學僉事衡鑑精明所拔多知名士試江夏置賀逢聖第一熊廷弼第二評曰賀生清廟之器熊生干將莫邪也後賀至大學士熊為經畧皆如其言楊世恩湖廣副總兵崇禎十二年羅汝才惠登相分屯興山遠安夷陵告急世恩往援由重陽坪深入被圍援絶陷賊死本朝乾隆四十一年賜諡烈愍宋一鶴直隸清苑人以右僉都御史巡撫湖廣幼習兵事屢有戰功乞養候代崇禎十六年闖賊䧟承天城守不支自刎死本朝乾隆四十一年賜諡烈愍本朝李承尹三原人順治初提學湖廣人頌公明遷兵備叅議慈惠廉潔民有鬻婦償債者捐俸贖之安陸有官柴供有司承尹蠲其征城東蓮花池嘗有魚課承尹立碑永蠲民感其惠李蔭祖漢軍正黄旗人順治十三年授湖廣總督時大兵進勦貴州而流賊郝永忠等擁衆十餘萬踞鄖襄間優糧運䕃祖疏請移襄陽水師及均黄漢陽諸營兵二千駐守榖城扼賊上流又以九谿界連巴蜀賊窺伺肘腋撥武昌洞庭營兵屯備均經議行十五年漢陽天門潛江沔陽被水䕃祖請賑卹乞罷卒諭令速拯得所以疾賜祭葬入祀名宦祠李呈祥翼城人順治間任潮廣兵巡叅議時興國州有負固未服者呈祥多方招徕之勵己清正決獄明斷治行丕著王自新句容人順治時提學湖廣起衰振靡試卷必親校閲積勞成疾卒官江漢之士莫不悲泣翟鳳翥曲沃人任潮廣右布政使好賢樂善修江漢書院選士數百人講濂洛之學士多成就汪錞金德嘉周之麟其尤著者劉楗大成人任潮廣布政使屬吏有貪殘者聞楗至解印綬去會三省兵合剿山寇芻糧數十萬取辦旦夕楗輸送無闕後仕至刑部尚書諡端毅劉兆麒漢軍鑲白旗人康熙元年任湖廣巡撫西山李來亨搆逆兆麒籌兵餉不以累民闢高冠山南地為敎場訓練士卒軍容丕振又嘗置獄田收其租以衣食罪囚高其位鐵嶺人康熙中為軍營叅領從帥范達禮出師襄陽征呉逆會總兵楊來嘉叛命其位率二十騎覘虛實猝遇賊衆二萬人於土地嶺其位出不意衝宇之賊驚潰且斫且馳至南漳入城守禦衣上血模糊刀刃盡缺叛賊譚洪率舟師三萬向鄖陽其位以百人扼楊溪鋪賊蠭至其位踞崖射賊矢無虚發相特七十日糧盡煮馬鞍以食誓必死會副都統李麟隆擊破賊乃全師歸由是每戰必先登前後給功牌十二蔣永修宜興人督學潮廣釐正文體葺學宫二十四處修復石鼓書院請復周子世襲建義倉義學敦勵士行表揚節孝人咸勸興張道祥徐州人康熙二十二年任潮北按察使清慎明決庭無冤民冬給罪囚赭衣夏給茗戒獄卒無得淩轢嚴禁所屬獄訟勿株連平民買洪山地為義塚贖鄧劉兩姓子女俾完聚及卒蕭然無餘資徐治都漢軍正白旗人任夷陵鎮總兵以平賊功遷提督夏逢龍作亂據武昌破漢陽犯德安治都率兵至應城縣殺偽副將以下諸賊渠逢龍以萬衆圍攻應城治都夾擊之賊奔德安再遣將敗之遂復武昌獲逢龍磔之軍前授鎮平將軍仍管提督事卒贈太子太保諡襄毅葉映榴上海人康熙二十七年任湖北督糧叅議清廉惠爱夏逢龍搆逆欲脅為偽官映榴有母在署命子扶出城遣僕齎遺疏馳進並封印呈繳具朝服望北拜升堂自剄百姓聞之號泣震地事聞贈工部侍郎諡忠節廕子為知州御嘗旌忠二字褒之楚人為立祠宣德仁紹興人任湖北都司夏逢龍之變冠帶自經於堂上事聞贈副將廕一子守備呉琠沁州人厯官湖北巡撫時夏逆初平歲饑民流琠招徠安集捐米賑饑全活甚衆次年秦省饑民流入襄鄖間加意撫卹得還本籍就擢總督政尚慈惠斥深文之吏整飭營伍作興士類吏畏民懷額稜特滿洲鑲紅旗人康熙四十五年任荆州副都統四十九年遷提督紅苗向負固額稜特宣布威德開導多方遂歸化五十二年就擢總督靜鎮寛大潮南北例有藩庫羨餘供制府額稜特各發州縣衞所買榖備賑造巡船百艘以資緝捕修孔道橋梁凡所興舉民利賴焉郭世隆漢軍鑲紅旗人康熙四十六年授湖廣總督條奏防守紅苗三款均如所請內遷刑部尚書卒入祀名宦祠陳詵海寕人康熙中舉人四十七年任湖北巡撫禁私派平市價嚴督隄工却絶餽贐潔已愛民恪勤素著厯官至禮部尚書卒賜祭葬諡清恪入祀名宦祠石琳漢軍正白旗人康熙中任下荆南道時襄陽總兵楊來嘉副將洪福叛應呉三桂踞房縣保康竹山煽誘醜徒嘯聚劫掠琳同總兵劉成龍搜剿斬獲甚衆撫定各砦洞櫂湖北巡撫卒賜祭葬入祀名宦祠楊宗仁漢軍正白旗人雍正元年任湖廣總督廉潔勤敏鹽商舊規數萬金及諸餽遺悉屏絶荆關舊有落地稅司榷者算及行旅宗仁飭正供外毋許絲毫苛取每春輕騎出郊勸農捐俸備物給老壯以示奬勵諄諄敎以孝弟忠信闢公所一區朔朢躬詣其地宣講聖諭廣訓懇摯詳明僚屬軍民咸振興鼓舞瀕水隄防歲時巡行修築年獲屢豐鄰境偶有饑民入楚先給糜粥旋復按名註册寒予衣歸給糧咸獲安全去尤加意武備各屬武弁考核精覈標兵按期校習賞罰公明士卒競奮莫不挽强命中疾革前數日猶閲兵不稍怠以勞卒官贈少保諡清端世襲騎都尉民立祠祀之雍正十年入祀賢良祠魯之裕字亮儕先世麻城人後由太湖籍舉康熙丙子江南鄉試雍正十年分守安襄鄖道明違政體築䕶城老龍隄議免太和山税建書院修理先賢祠宇下荆南道志其所手纂也後調清河道卒呉達善滿洲正紅旗人乾隆丙辰進士二十九年任湖廣總督三十一年調陜甘三十三年復任湖廣正已率屬百廢具修先是湖北沿江上下劫盜肆行商民頗以為患達善飭屬嚴緝解審後立寘之法自是江行安謐舟師估客至今猶稱頌不置諡勤毅入祀賢良祠呉垣海豐人乾隆五十年授潮北巡撫是秋值江夏等縣旱災疏請平糶募客赴川買米接濟查辦災賑事宜實心經理操守謹飭卒於官賜祭葬卹典如例書麟滿洲鑲黄旗人嘉慶五年以協辦大學士總督湖廣時敎匪肆優川陜楚三省房保二縣光為要區書麟馳至軍親履行陣搜捕不遺餘力積勞成疾卒自以剿賊未盡屬身後以行衣殮贈太子太傅諡文勤前纂修官臣羅家彦恭纂總纂官臣廖鴻藻恭覆輯校對官臣易長華恭校大清一統志武昌府湖北省治東西距五百三十二里南北距四百七十二里東至江西九江府瑞昌縣界五百二十五里西至漢陽府漢陽縣界七里南至湖南岳州府平江縣界四百里北至黄州府黄岡縣界七十二里東南至江西南昌府武寕縣治四百五十里西南至岳州府臨湘縣界六百三十里東北至黄岡縣治一百八十五里西北至漢陽府黄陂縣治一百二十里自府治至京師三千一百五十五里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州之域周屬楚秦屬南郡漢屬江夏郡南境為長沙國地後漢因之三國呉分東境置武昌郡晉為武昌郡地南境為長沙建昌二郡地屬荆州李吉甫元和郡縣志晉庾翼爲荆州曽理於此後屬江州初冶武昌後移治尋陽南境屬湘州自晉懷帝永嘉元年分置湘州至宋文帝元嘉二十九年時置時省省時郡仍屬荆州南北朝宋孝建元年仍移江夏郡治分置郢州按江夏郡治漢在今德安府之雲夢縣呉孫權築城於魯山陸渙所治今漢陽府漢陽縣之魯山也魏文聘爲江夏太守治石陽在今黃陂縣嘉平中王基城上昶徙江夏郡治之在今德安府界盖是時呉魏各有江夏郡晉既平呉仍魏之舊治於安陸至劉宋之季又移江夏郡於江南之夏口城自後無復移易按明統志舊通志武昌府志皆云漢江夏郡治沙羨今考從漢書郡國志云凡縣名先書者郡所治也兩漢書江夏郡先書西陵最後乃書沙羨可見漢江夏郡治西陵非沙羨也輿地紀勝雲夢縣即漢西陵縣地新志漢陽府之黄陂黄州府之黄岡麻城德安府之雲夢皆漢西陵縣地也舊志又云孫權築夏口城於江北尋移魯山據水經注夏口城在黄鵠山乃今江夏縣境在江南非江北也魯山自有城爲呉江