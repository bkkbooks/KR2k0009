山相夾水中多石其中爲大洪東西爲小洪行者不下吕梁之險鏡潭在蒲圻縣南左岸爲金獅觀右岸爲鮑家洲界石潭在蒲圻縣西北蒲圻湖及諸湖之水咸匯於此有石屹立水中當蒲圻嘉魚兩縣界因名風潭在蒲圻縣陸水中有巨石出水中高可十丈名曰海船頭鸕鷀潭在蒲圻縣陸水中峭壁對峙黄龍潭在蒲圻縣陸水中岸有黄龍鎮旁有磯龍迴潭在蒲圻縣陸水中中有石梁盤渦漩洑水勢險絶老龍潭在通城縣南三十五里龍蟄其中旱禱輒應百丈潭在通城縣西南三十五里每陰雨有聲如鐘石牛潭在通城縣東三里水中有石如牛開其頤世傳南唐時洪都廩米多耗占者以爲此牛所啖遂鑿其頤自是不復耗曲水池在江夏縣東十五里寰宇記梁邵陵王綸爲太守雅好賓客樂詩酒嘗慕王右軍蘭亭流觴曲水之興故效之洗劍池在武昌縣西西山中松風閣下世傳呉王淬劍於此有石刻洗劍池三字旁有井清冽異常卓刀泉在江夏縣東十里明統志在漢昭烈郊壇下世傳關忠義卓刀於此飛錫泉在江夏縣東南四十里八分山明統志昔駱禪師飛錫騰至泉所因建道場雖久旱甚雨泉無盈涸鹿跑泉輿地紀勝在江夏縣東南六十里大觀山上烏龍泉在江夏縣南七十里縣志峯迴路轉處巨石夾道或立或伏其水夏涼冬温甘甚醴泉在武昌縣治堂左相傳令賢則泉湧岀白巖泉在武昌縣南一百六十里方輿勝覽泉石幽絶有馬祖禪師道場菩薩泉在武昌縣西樊山宋蘇軾菩薩泉銘序寒溪少西數百步别為西山寺有泉出於嵌竇間色白而甘號菩薩泉名勝志西山有泉曰菩薩水晉時書滴滴泉三字刻於崖頂蜜泉在嘉魚縣南其水甘如蜜故名温泉在嘉魚縣西南石頭港其水常温冬月可浴又咸寕縣南潛山下亦有温泉浴可愈疾湯泉在蒲圻縣南五里冬夏常沸炎䒱上達又崇陽縣東北十里亦有湯泉寰宇記湯泉在龍頭山可以愈疾縣志在城岡嶺上泉眼周四五文沸熱如湯神山泉在蒲圻縣東北名勝志神山泉發源神山湖水環繞泉湧湖中其深莫測鳴水泉在咸寕縣南四十里與寓仙洞相通其水東流入雙汊港名勝志鳴水泉飛沙泉其地可雩沈泉在咸寕縣西五十里明統志源出蒲圻境入咸寕縣界數里下注大石竇中聲如萬鼓遂伏流不見分水泉在通城縣南四十里黄龍山下分二流一南入江西南昌府武寕縣一西流入陸水玉泉在興國州東六十里高二丈五尺如瀑布狀雙泉在興國州東七十里輿地紀勝有雙泉院院之東西兩泉並湧故名三潮水在興國州西北四十里泉一日三湧故名金水潭泉在大冶縣東五里一名蛟潭異泉在大冶縣東囘山唐元結有異泉銘顔真卿書輿地紀勝天寶十三載囘山之巔忽有飛泉湧出垂流四百仞元結名之曰異泉龍窟洞泉在大冶縣西南三十里天臺山下泉流四時不竭聖水泉在大冶縣東北旱久泉湧則雨雨久泉湧則晴故名石航泉在通山縣東二里出石航山大泉洞水流數十丈常有四足魚長二尺許出没水中泉港泉在通山縣東三十里沈水山龍塘下溉田數頃阮婆泉在通山縣南翠屏山下與井灣泉通井灣泉在通山縣西五里與石航泉通銅盤井在府治南明統志昔有銅盤蓋井底日汲不竭故名浪花井在江夏縣東十五里明統志在大洪山南塔下名曰無影塔水常沸湧如浪其脈通江義井在通城縣東二十五里縣志昔吳述道七代不分共飲其井故名前纂修官臣羅家彦恭纂總纂官臣廖鴻藻恭覆輯校對官臣丁運泰恭校
