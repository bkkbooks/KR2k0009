front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_132-1a}
body:
  text: 長沙府二古蹟臨湘故城在府城南今善化縣界楚青陽地史記秦始皇紀荆王獻青陽以西注青陽長沙縣是也水經注臨湘縣治湘水濱臨川側故即名焉秦滅楚立長沙郡即青陽之地漢高祖以封呉芮是城即芮築晉懐帝永嘉元年分荆州湘中諸郡立湘州治此城之西北有故市北對臨湘縣之新治縣治西北有北津城隋書地理志長沙郡長沙舊曰臨湘平陳縣改名焉按漢時臨湘縣城為長沙郡治者在今城之南而今之長沙縣治即水經所謂臨湘新治南北朝宋所徙本在城外隋唐時包入城中宋又移縣治於府城東定王臺明洪武初移建北門内西偏十一年改建於北門外萬厯二十四年復今所常豐故城在長沙縣東九域志乾徳三年升常豐埸為縣開寶中省入長沙按宋史常作長又五代漢乾祐三年楚王馬希範嘗置龍喜縣今無考湘西故城在湘潭縣南三國呉分置屬衡陽郡宋爲衡陽郡治隋改衡山唐徙治改名湘潭而故城廢宋書州郡志衡陽内史呉太平二年分長沙西部都尉立領縣湘西水經注湘水又厯湘西縣南分湘南置也衡陽郡治湘南太守何承天徙郡湘西隋書地理志衡山舊置衡陽郡平陳郡廢并衡山湘鄉湘東三縣入焉舊唐書地理志隋衡山縣天寶八年移治洛口改名湘潭九域志湘西縣在湘潭縣南一百六十里按隋衡山縣有二一隸長沙郡舊屬衡陽者即故湘西縣所改得名在後一隸衡山郡舊屬湘東乃呉晉故縣即今衡州府屬之衡山縣或謂隋合二衡山爲一者非也至梁天監中分陰山縣立湘潭縣在今攸縣唐天寶中移長沙之衡山於洛口改名湘潭而元和郡縣志謂即陰山之湘潭亦非也湘南故城在湘潭縣西六十里秦置湘南縣漢屬長沙國後漢爲湘南侯國三國呉仍爲縣爲衡陽郡治齊廢水經注衡陽郡呉孫亮分長沙西部立治湘南元和志潭州湘潭縣東北至州一百四十里陸路一百二十里本漢湘南縣地按舊志湘南故城在縣西六寕城而謂十里今俗名為花石城或以此為建縣南湘潭故城為湘南故城者誤湘陰故城在領今湘陰縣西北宋書州郡志縣湘陰元徽二年分益陽羅湘東太守湘西及巴峽流及羅民立隋書地理志巴陵郡湘陰梁置州陳廢州平陳廢郡及湘陰入岳陽岳陽郡縣置玉州尋改州元和岳陽為湘陰廢玉山縣入志湘陰縣北至岳州二百焉十二年廢玉三十里本羅縣地府志劉宋湘陰故城在縣西北五十陰縣城在今縣南二十里白烏潭五代里隋唐湘周廣順三年遷今治宋紹興赤竹城五年復遷初遷治今治羅縣故城在湘陰縣東北漢置屬長沙國隋志長沙屬巴陵郡唐省入岳州之湘陰漢書地理國羅注應劭曰楚文王徙羅子自枝江居此隋書地理志巴陵郡大業初改曰羅州統縣羅開皇九年廢呉昌湘濱二縣入唐書地理志岳州巴陵郡湘元和二志陰武徳六年省羅縣入羅縣故城在湘陰東北焉括地及六十里新康故城在寕鄉縣西十里三國吳析益陽縣地陽縣晉曰新康屬衡陽郡宋齊因之隋置新并入益陽唐復置尋省宋復置寕郷縣而此城廢宋書州郡志衡陽内史領縣新康呉曰新陽晉武帝太康元年更名隋書地理志益陽平陳併新康贈入焉舊唐書地理志益陽武德四年分置新康縣七年省入九域志太平興國二年析長沙縣地置寕鄉縣在潭州西一百里瀏陽故城在今瀏陽縣東三國呉析臨湘縣北境置屬長沙郡隋元業初省入長沙縣而故城廢唐景龍初復置即今治兀初遷居仁鎮明初復唐舊治宋書州郡志長沙内史領縣瀏陽呉立元和志潭州瀏陽縣西至州一百五十里本漢長沙縣地呉置瀏陽因縣南瀏陽水為名隋平陳廢景龍二年復置益陽故城在今益陽縣東漢置屬長沙國後漢建安二十年孫權與蜀爭荆州遣魯肅將兵拒關忠義於益陽是城肅所築也晉以後屬衡陽郡隋改屬長沙郡唐移今治漢書地理志長沙國益陽湘山在北舊唐書地理志益陽故城在今縣東八十里縣志故城在今儒學後北路之旁猶存遺址相傳登之望見長沙城邑人馬宛然三百餘里悉可審辨又滄水鋪宋建炎閒曾移治於彼一載連道故城在湘鄉縣西漢置縣屬長沙國後漢屬長沙郡晉屬衡陽郡南北朝宋者入湘郷漢書地理志長沙國連道水經注漣水逕連道縣縣故城在湘郷縣西一百六十里方輿紀要連道故城或亦謂之龍城唐初嘗移湘鄉縣治龍城尋還舊治攸縣故城在今攸縣東漢置屬長沙國後漢晉宋俱屬長沙郡梁陳間改曰攸水隋省入湘潭唐復置攸縣五代梁時徙今治而故城廢宋書州郡志長沙内史領攸縣漢舊縣水經注攸縣北帶攸溪蓋即溪以名縣也隋書地理志湘潭平陳廢攸水縣入焉元和志攸縣西南陸路至衡州三百四十五里本漢舊縣武徳四年分湘潭縣置唐書地理志衡州攸武德四年置南雲州貞觀元年州廢縣志五代梁時遷建縣治改屬潭州在今城南門外明洪武初又遷今所陰山故城在攸縣西北六十里三國吳置屬湘東郡晉以後因之隋省入湘潭縣唐復置㝷又省宋書州郡志湘東太守領縣陰山呉湘東郡有陰山縣疑是呉所立隋書地理志衡山郡湘潭平陳廢陰山縣入湘潭元和志陰山縣以縣東一百二十里陰山為名唐書地理志衡州攸武徳四年析置陰山縣貞觀元年省按漢書王子侯表陽山侯宗長沙孝王子初元元年封在桂陽地理志桂陽郡陰山今廣東連州之陽山縣也水經注以為即此陰山誤又唐書地理志武徳四年析攸縣置安樂新興二縣屬南雲州貞觀初仍省今無考湘潭故城在攸縣西北梁置縣陳隋因之唐改為衡山縣隋書地理志衡山郡領湘潭平陳廢茶陵攸水建寕陰山四縣入焉元和志梁天監中分陰山立湘潭縣天寶八年改為衡山舊志其地當在今衡山縣東攸縣界攸有陰山江可知也安化故城在今安化縣東唘安坪宋置明遷今治宋史神宗紀熙寕五年章惇開梅山置安化縣又蠻夷傳梅山蠻恃險為邊患章惇招納之檄諭開梅山得其地東起安鄉司徒嶺西抵邵陽白沙砦北界益陽四里河南止湘鄉佛子嶺籍其民户丁田築武陽關峽二城置安化縣府志安化故治在伊溪之東宋建炎中遷伊溪西元至正中燬於兵明洪武中始開設今治茶陵故城在今茶陵州東五十里漢置縣屬長沙國後漢屬長沙郡晉屬湘東郡宋齊因之隋省入湘潭而此城廢唐復置即今州治宋書州郡志湘東郡茶陵漢舊縣屬長沙隋書地理志湘潭平陳廢茶陵縣入元和志衡州茶陵縣西南水路至衡州三百四十五里本長沙縣界齊永明七年入湘東郡開皇九年為湘潭縣武德四年置茶陵縣貞觀九年廢聖厯元年復舊以南陵茶水為名寰宇記漢茶陵故城在攸縣東一百四十里俗名茶王城城塚記古茶王城在州東五十里漢元朔中節侯訢所築建寕舊城在湘潭縣北三國呉置縣隋省入湘潭宋書州郡志長沙内史領縣建寕隋書地里志湘潭平陳廢建寕縣入焉故尉城在長沙縣西北七十里元和志孫權發程普為長沙縣西部都尉以防關忠義立此城赤竹城在湘陰縣南十七里府志宋紹興初知縣胡昭建縣治於其地謂之新縣今遺址尚存馬王城在茶陵州東八十里茶水北岸亦名古城五代時馬氏所築鄂王城在茶陵州相傳宋岳飛屯兵之所金州城在茶陵州兆祥符圖經金州城鄧宜所築城塚記在州北十里長沙舊治在善化縣南南北朝時治所水經注湘水逕船官西北對長沙郡郡在水東州城南舊治在城中後乃移此善化舊治在今善化縣南縣治舊在郡城南明洪武四年移置城内十四年復置於南門外去城五里成化十六年始移郡治東即今治也甘興霸故壘在益陽縣南一里又名夜月臺水經注關侯瀬南對甘興霸故壘縣志呉甘興霸屯兵之所每夜月淒清如聞金鐵之聲故又名夜月臺關忠義故壘在益陽縣西南建安中關忠義屯兵於此與魯肅隔江相拒長沙舊衞在府城内明建本朝康熙二十七年裁茶陵舊衞在茶陵州城内本朝康熙二十七年裁銀場在瀏陽縣北焦溪嶺九域志縣有永興焦溪二銀場茶場在安化縣西北資江上縣志宋置安化縣遂立茶場伊溪中山資江束平諸處皆産茶比他處稍徍碧湘宫在善化縣南明統志長沙城南門之側有碧湘宫五代時馬希範置九龍殿在善化縣德潤門外五代馬希範建又縣西南有文昭國馬殷建今俱廢清風閣在湘潭縣治後名勝志宋張栻建飛鴻閣在瀏陽縣治後本名歸鴻樓山堂肆考歸鴻樓宋楊時建取目送歸鴻之義自爲圖記之後張方邵修建易今名遺經閣在瀏陽縣南宋李氏所建其子弟多從張栻遊朱子嘗爲其關題詩御書閣在醴陵縣宋歐曰登真其前有陽修記縣東三十里有宫山世傳仙人王喬煉藥於内唐開元間天子書六大至京師閲焉巳而還之又字賜而掲焉太宗時取賜御書飛白字使藏之其後登真大火獨飛一探其私笈以市工白書存康定元年道士彭知材復宫之舊建樓若干尺以藏賜書定王臺在長沙縣東方輿勝覽俗傳定王載米搏長安土築臺於此以望其母唐姬之墓八景臺在長沙縣西宋臺祐中築宋迪作圖陳傅良建二亭於旁八景曰瀟湘夜雨洞庭秋月逺浦歸㠶平沙落夕照山市晴嵐江天暮雪宋米脰煙寺晚鐘漁村芾元揭奚斯俱有詩道鄉臺在善化縣西嶽麓寺傍宋鄒浩號道鄉謫衡過潭爲州守温益所逐山僧留宿於此後張栻築臺以表之朱子刻石曰道鄉因以名臺又朱子嘗改嶽麓山頂曰赫曦亦名赫曦臺諭苗臺在善化縣嶽麓山右朱子帥潭時建傑靈臺在湘潭縣東明萬厯中建旁有萬樓臺高三十尺樓高四十尺明李騰芳有碑記望京臺在湘陰縣北望京鎮府志元順帝爲太子時出居靖江迎歸即位至此問何地名對曰望京乃登高北望時蛙鳴聒耳帝勅土神禁之至今無聲俗亦謂之禁蛙臺慕嚴臺在寕鄉縣東南九十里宋隱士謝楚華慕嚴子陵高風因鐫慕嚴臺三字於石魯肅臺在益陽縣西門内三國呉魯肅將兵拒關忠義之處今馬王廟即其故址紫荆臺在湘鄉縣西二里名勝志縣西有紫荆臺池水環之水起臺亦起水落臺亦落上有紫荆樹植臺之側故名識山樓在寕鄉縣西大溈山之南宋易祓建自爲記釣月樓在安化縣北三十里仙溪上宋隱士王南美建戴氏堂在府治東東池上唐戴簡築柳宗元有潭州東池戴氏堂記敬簡堂在府治後宋張安國建兩壁書中庸大學中屏篆顔淵問仁章朱子有詩張栻為之記四絶堂在善化縣嶽麓山下道林寺中唐乾符中建袁浩作記蓋指沈傳師裴休筆札宋之問杜甫篇章宋治平中蔣之竒謂沈杜固無間言裴本學歐陽詢書寺幸有詢四大字當為一絶又不應近舍韓愈詩逺及之問乃更為詮次去裴宋增歐韓其後周必大又合古今同異之論衍四為六作六絶堂來諗堂在湘潭縣南宋胡穎築以奉母宋史胡頴傳穎官南兼提舉常平即家置司作來諗浙西提刑移湖堂奉母居之百泉軒在善化縣西嶽麓書院右宋朱子及張栻講學時所建元呉澄有重修百泉軒記流盃亭在府城内馬氏修褉之所亭下有池文天祥有詩望湘亭在長沙縣西湘江濵亦名湘江亭唐劉長卿元㣲之李羣玉鄭谷俱有湘江亭詩湘水亭在長沙縣西唐魏萬成所居楚秀亭在長沙縣西北唐裴㐲建亦名裴公臺春暉亭在長沙縣北宋蘇軾有題潭州徐氏春暉亭詩風雩亭在善化縣西嶽麓書院南宋劉珙建翠㣲亭在善化縣西天馬山宋乾道間建有朱子題額望嶽亭在湘潭縣西陶公山下又有釣魚亭與望嶽亭並峙相傳皆晉陶侃所築泳飛亭在湘陰縣東宋淳熙開建即南堤放生亭也寶祐間重修杜公亭在湘陰縣東唐杜甫嘗泊舟江滸宋紹興中縣尹趙誥建亭於南堤名清風亭慶元中始易今名飛鷃亭在