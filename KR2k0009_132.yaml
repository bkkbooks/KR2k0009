潭州石霜山後參道吾有省避世混俗於長沙瀏陽人莫能識洞山曰瀏陽乃有古佛居石霜二十年常坐不卧僖宗聞其名專使賜紫堅辭不受光啟四年坐化齊已本姓胡名得生潭州人與貫休並有聲同師石霜五代周草衣不知何許人居草衣巖上足不履地口不嘗味三十餘年坐一繩牀而已宋洪藴長沙人本姓藍習方技之書以醫術知名太祖召見賜號廣利大師尤工診切每先歲時言人生死無不應真如大溈山僧臨川聞氏子戒律精嚴放參後輙自作務希白潭州人作書有晉人風度慶厯中嘗以淳化閣帖模刻於潭之郡齋有古法帖十卷邵琥湘陰人少與兄玘弟珪同遊太學遇至人後歸都嶠山卓庵修煉元符初蘇軾自嶺表歸訪㙈於庵畱旬餘㙈後立草庵西蜀峩眉山遁去不知所終元易公居影珠山下日執畚修路至今巖上鐫至止壬戍易公修路八字及老織屨易食餘則惠人每負稈於坐旁焚之且織且焚晝夜不輟一日稈烟不散結為白雲遂乘之去今名其地為草鞋灣立石屋祀之明逸僧不知其名嘗題詩於安化縣西之石城橋寺壁云手把青苗插野田低頭便見水中天六根清淨方成道退步分明是向前又云粗布縫衣禦雪冬一鍼一綫要從容如今世路多荆棘休得郎當大様縫後不知所終土產鐵明統志瀏陽攸安化茶陵寕鄉醴陵六縣出鉛醴陵縣出硃砂水銀明統志俱安化縣出海金砂明統志長沙善化攸湘潭四縣出苧布府志湘鄉攸瀏陽茶陵四州縣出茶府志安化縣岀鸕鷀府志湘陰縣出玉面貍明統志安化縣出纂修官臣高人鑑恭纂輯提調官臣張日章恭覆輯校對官臣李孚忠恭校校對官臣沈維鈺恭覆校
