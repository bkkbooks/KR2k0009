禪師建崇福寺在安化縣北七十里浮泥山宋熙寕中建旌忠寺在茶陵州西宋岳飛建以祀征曹成戰死之士白鶴觀在湘陰縣東白鶴山相傳爲陶澹故宅景德觀在寕鄉縣西一百三十里宋至行機精解醫藥治法雜出著傷寒論金匱方行世民賴全活抗徐丹陽人有膽智策略延熹八年三府表薦遷長沙太守桂陽胡蘭朱蓋等冦零陵徐與度尚等擊破斬之孫堅富春人中平間長沙賊區星自稱將軍衆萬餘人攻圍城邑乃以堅為長沙太守到郡親率將士施設方畧旬月之間克破星等周朝郭石亦率將衆起於零桂與星相應遂越境尋討三郡肅然晉虞潭餘姚人清貞有檢操大司馬齊王冏用為祭酒徙醴陵令值張昌作亂郡縣多從之潭獨起兵斬昌別將鄧穆等以軍功進爵都亭侯崔敷長沙太守永嘉中益州流人汝班等作亂於湘州執刺史茍眺敷遇害周崎邵陵人為湘州從事王敦之難譙王氶使求救於外被執大呼城中堅守賊殺之南北朝宋張茂度呉郡人為長沙大守素有吏能職事甚理庾深之新野人元嘉間自輔國長史為長沙内史南郡王義宣為逆深之見害子孫亦死追贈冠軍將軍顧覬之呉郡人孝建㤗始間兩為湘州刺史善於涖民治甚有績裴昭明聞喜人元徽中長沙郡丞罷任刺史王藴之請曰卿清貧必無還資湘中人士有須一命之禮者吾不愛也昭明曰下官忝為郡佐不能光益上府豈以鴻都之事仰累清風齊劉坦南陽人和帝時楊公則為湘州刺史帥師赴夏口乃除坦長沙太守行湘州事坦嘗在湘州多舊恩道迎者甚衆下車簡選堪事吏分詣十郡悉發人丁運租米三十餘萬斛致之義師支糧用給王僧粲謀反前湘州鎮軍鍾元紹潛謀内應坦聞偽為不知因理訟如常至夜故開城門以疑之元紹詣坦問故坦久留與語密遣親兵收其家書元紹首㐲即斬之焚其書餘黨無所問州部遂安梁蕭修鄱陽王恢子元帝時拜湘州刺史長沙頻遇兵荒人户凋敝修務穡勸分未期年流民至者三千餘家王琳山陰人湘州刺史果勁絶人又能傾身下士得將卒心所得賞物不以絲毫入家平侯景之亂功為第一唐張謂河南人明皇時潭州刺史有善政著長沙風土碑記又有湘中記宋潘美大名人太祖時潭州防禦使嶺南劉鋹數冦桂陽江華美擊走之溪洞蠻獠不時侵畧頗為民患美窮其巢穴多所殺獲餘加慰撫夷落遂定石㬢太原人太祖時潭州鈐轄開寶八年領兵敗南唐軍二千餘於袁州平梅山板倉諸洞蠻冦俘馘數千人朱洞開寶中知潭州始創嶽麓書院陳傅良言自未守作書院五六十載之間教化大洽學者振振雅馴行義修好庻幾於古為吏者劉審瓊范陽人太宗時知潭州州素多火日調民積水為防民甚勞審瓊至悉罷之以便民李沆洺州肥鄉人太平興國進士為將作監丞通判潭州趙昌言掌漕湖外時謂沆有台輔之量表聞於朝何承矩河南人太平興國中徙知潭州凡六年囹圄屢空詔嘉奬之馬知節薊縣人太宗時監潭州兵時何承矩為守鎮以文雅飾吏治知節慕之因折節讀書李允則盂縣人太平興國中知潭州初馬氏暴斂州人出絹謂之地税潘美定湖南計屋輸絹謂之屋税營田户給牛歲輸米四斛牛死猶輸謂之枯骨税又輸茶税以三十五觔為一大觔允則靖除三税民皆便之湖湘多山田可以藝粟而民情不耕乃下令月所給馬芻皆輸本色由是山田悉墾湖南饑欲發官廩先賑後奏轉運使不可允則曰須報踰月則無及矣明年洊饑復欲先賑轉運使又不可允則請以家貲為質乃得發廩賤糶因募饑民堪役者隸軍籍得萬人轉運使請發所募兵禦邵州蠻允則曰無民益戍是長邊患也且新募饑瘠未任出戍乃奏罷之魏廷式宗城人至道中知潭州湖南土地行天民喜訟產有根柢巧偽難辨者廷式立裁之吏民咸服楊覃浙江人景德中知潭州王師討宜賊軍需多出長沙曹利用以聞詔書襃勞劉師道東明人大中祥符二年知潭州長沙當湖嶺都會剖煩析滯案無留事加左司郎中馬亮合肥人真宗時知潭州屬縣有亡命卒剽攻為郷閭患人共謀殺之事覺法當死者四人亮咸貸之曰為民去害而反坐以死罪非法意也徙昇川趙抃西安人為武安軍節度推官人有赦前偽造印更赦而用者吏議當死抃曰赦前不用赦後不造不當死遂以疑讞宥生之一府皆服李若谷徐州人仁宗時知潭州洞庭賊數邀商人船殺人輙投水中當捕獲以無驗每貸死隸他州既而逃歸復攻掠若谷擒致之磔於市自是冦稍息王罕華陽人知潭州為政務適人情不加威罰有狂婦數訴事出言無章前守每叱逐之罕獨引至前委曲徐問久稍可曉乃本為人妻夫死妾遂逐婦而據家貲因憤恚成疾罕為治妾而反其貲婦艮愈郡人傳為神明事聞詔書褒諭賜絹三匹陳希亮青城人天聖中知長沙縣有僧出入章獻后家恃勢據氏地希亮捕治寘諸法一縣大聳郴州竹場有偽為劵給輸户送官者事覺輸户當死希亮察其非辜出之已而果得其偽造者齊廓㑹稽人提點荆湖南路刑獄潭州鞫繫囚七人為强盜當論死廓訊得其狀非强付州使劾正乃悉免死唐介江陵人仁宗時潭州通判時潭州諸吏有私買巨賈明珠之獄帝曰唐介必不肯買按之果然余良肱分寕人知湘陰縣縣逋米數千石歲責里胥代輸良肱論列之遂蠲其籍李南公鄭州人知長沙縣有嫠婦攜兒以嫁七年兒族取兒婦謂非前夫子訟於官南公問兒年族曰九歲婦曰七歲問其齒曰去年毁矣南公曰八歲而齔尚何爭命兒歸族劉元瑜河南人知潭州猺人數為寇元瑜使州人楊謂入梅山説酋長出聽命因厚犒之籍以為民千二百户何正臣新淦人神宋時知潭州時詔州縣聽民以家貲易鹽吏或推行失指正臣條上其害謂無益於民亦不足以佐國用遂寢之徐天麟臨江人潭州通判興學明教有惠政張頡桃源人知益陽縣縣接梅山溪洞多蠻獠出没頡按禁地約束召猺人耕墾上其事不報熙寕中克梅山朝使言頡昔令益陽首建梅山之議今日成功懽輿於頡詔賜絹三百疋彭友芳攸縣人熙寕中茶陵主簿時上三郷民貧而山居輸潭州造船木以折歳祖江行千餘里其費數倍友芳白䕶漕請均出木即縣造舟公私兩便茶陵造舟上供議自友芳始毛漸江山人熙寕中知寕郷縣經理五谿因陳利害於察訪使委以區畫遂建新化安化二縣尋擢著作郎改知安化謂猺人畏果報之説因俗立教創五寺以誘化其心苗猺始服又立學校明教化作開梅山頌以紀之王定民元祐中知湘陰縣時州縣無學肄業之士惟歸書院定民始創學宫於南浦於是居業有所楊時將樂人知瀏陽縣有惠政民思之不忘張運貴溪人靖康中遷攸縣尉高宗南渡劇賊王在據𡵨山潭帥徵兵戍岳運獨將二千先至岳賊平趙聿之安定郡王叔康子建炎中為成忠郎金人圍潭州帥臣向子諲率衆守城聿之隸東壁子諲巡城顧聿之曰君宗室可不效他人苟簡聿之感慨流涕金兵登城縱火城陷聿之巷戰大罵而死將官武經郎劉玠亦死之事聞贈聿之左監門衞大將軍玠武經大夫其後帥臣朱子為請立廟賜號忠節孟彥卿洛州人建炎中通判潭川潭城中叛卒焚掠自東門出帥臣向子諲命彥郷領兵追之已而招安其衆未幾潰兵杜彥自袁州入瀏陽遂犯善化長沙二縣彥卿率民兵拒之手殺數人賊退還瀏陽彥卿追戰俄而民兵有自潰者賊遂乘之彥卿被害事聞贈直龍圖閣官其家三人後立廟祀之趙民彥建炎中潭州添差通判潰兵杜彥入瀏陽通判孟彥卿死之民彥以民兵赴鏖戰瀏陽城南依山為陣殺傷甚衆偶為間者折其旗衆驚謂民彥已敗遂潰民彥被執賊殺之事聞贈直龍圖閣范如圭建陽人武安軍節度推官始至帥將斬人如圭白其誤帥為己署不易也如圭正色曰奈何重易一字而輕數人之命帥瞿然從之自是府中事無大小悉以咨焉勾濤新繁人高宗時知潭州秦檜嘗令人諭意欲與共政濤以書謝之檜諷言官劾之不報濤上書論時事之害政者帝嘉其忠直李植臨淮人高宗時知湘陰縣經楊幺蕩析植披荆棘立縣治發廩粟振困乏專以撫摩為急王庻慶陽人紹興時知潭州敷政寛平民懷其德劉錡德順人以忤秦檜出荆南或言錡名將不當久閒乃命知潭州六年軍民安輯築室昭山之下居焉徐夢莘臨江人紹興末知湘隂縣縣少田多盜㑹湖南帥括盜耕湖田者悉輸租號增耕税他邑多移他賦應命夢莘獨謂邑無新田祖税無從出帥恚其私於民攟摭其過莫能得由是反器重之夢莘益務教化湘陰士始興於學劉頴西安人孝宗時簽判潭州王佐為帥負其能盛氣以臨僚吏穎約以中道佐屈而改及陳峒反所擒賊多頴計帥上其功曰簽判宜居臣上召監進奏院王師愈金華人孝宗時知長沙縣民以事至者降意撫循罷無名征斂毁淫祠驅散妖賊禁巫鬻乳香俗為變帥臣論薦遷荆湖轉運使徐應龍浦城人淳熙中調湖南撿法官潭獲刼盜首謀者已繫獄妄指逸者為首及獲逸盜治之急遂誣服應龍閲實為首從不明法當奏提刑盧彥德將寘逸盜於死應龍與之辨彥德不能奪聞者交薦之范機延平人知寕鄉縣時漢上用兵軍需百出機調度有方不使毫髪病民是冬襄陽警聲摇湖湘間父老謀徙大溈機曰制動當以靜倉皇委去是自擾也卒不為動明年江陵警潭帥欲調民守城機謂必不可帥悟而止既而饑疫並作機為粥食饑徐範侯官人嘉定中通判潭州值湖湘大旱賑救多所禆益王相嘉定中知湘陰縣南有東西二湖先無有障之者水溢則巨浸茫然人皆病涉相始築隄其間延袤數里民依以居即所謂南隄也李燔建昌人理宗時通判潭州真德秀為長沙帥一府之事咸以諮燔洪天錫晉江人理宗時知潭州戢盜賊尊先賢踰年大治徐經孫寶慶中瀏陽主簿厯臨武令通判潭州部牙契錢至州有告者曰朝廷方下令頒行十七界㑹子若此錢皆用㑹少須則獲大利矣經孫曰此錢出諸公庫吾納㑹而私取外欺其民内欺其心奚可哉詰旦悉以所部錢上之王邁興化軍仙遊人潭州觀察推官易袚聞其至戒人曰此君不可犯清勢家冐占田數百畝劉子邁紹定中知茶陵軍强敏有志時歲大歉子邁設法振恤民賴全活者甚衆茶陵舊無城寇至則入保山砦子邁乃城之又鑄鐵犀鎮水民甚利之黃端卿理宗時茶陵丞死郴寇之難詔進官三秩官一子將仕郎立廟茶陵李芾廣平人理宗時辟湖南安撫使幕官攝湘潭令縣多大家前令束手不敢犯芾稽籍出賦不避貴勢賦役大均德佑初知潭州元兵圍城芾慷慨登陴與諸將分地而守日以忠義勉其將士乘城殊死戰元兵登城衡守尹穀參議楊霆死芾召帳下沈忠曰吾分當死吾家人亦不可辱於俘汝盡殺之而後殺我忠泣諾取酒醉其家人徧刃之芾亦引領受刃忠縱火焚其居還家殺妻子復至火所大慟乃自刎幕屬顏應焱陳億孫皆死陳毅潰圍戰死事聞賜芾端明殿大學士諡忠烈李長庚湘潭縣丞元兵入寇冠帶坐學宫不屈死諸生葬之學宫旁元楊處仁冠州人皇慶間知湘陰州首停荒田之税興學勸農朞月訟簡獄空厯年逋賦不廹而足流民皆復業焉謝端遂寕人延祐初同知湘陰州事猾吏束手不敢舞文法豪民無賴者遠避去使者行部旁郡滯訟皆委端讞剖決如流聲譽卓然虞槃仁夀人泰定間任湘鄉州判官有富民殺人使隸己者坐之上下皆阿從槃獨不署卒正其罪時妖巫倡言偽火槃奔救不遑偵得刦人者訊之盡得巫黨論如法諸吏民大服明海源善江西人洪武初知安化縣時新設縣治源善勤於政事以孰鹿皮為鞭使民知愧而己民愛敬不忍欺史希賢無為州人洪武初知瀏陽縣開創邑治興建學校起頺振湮邑人立祠祀之吳顯蘇州人洪武初改湘鄉州為縣顯即以知州為令創建縣治招還流民墾荒田八千餘𤱔黃思讓淮安人洪武中知湘陰縣勤庻政善斷訟獄時兵燹之餘思讓招流移創營學民至今思之吳履蘭谿人洪武中知安化縣初豪民集衆為兵天下既定兵皆散獨豪長易氏率所部入山江陰侯吳良議討之履口招之宜來不來誅未晚易氏果至亊逐十艮籍故兵之為農者民大恐履召耆老慰諭之取其願為兵者數人而止朱詡徐州人洪武中知湘潭縣性廉潔門無私謁每食粗糲鹽豉而已邑有虎患民欲設穽詡口猛獸害人令之過也惟修德以弭之耳未幾虎遁夫方慶淮安人洪武中知湘潭縣時索海船價甚急使者繫民箠楚甚酷慶口物料弗完責在有司徒刑民無益請寛之使者弗從慶期五日媮所負遂悉縱之民感其德果如期盡償之廖謨泰和人水樂中知長沙縣時方用師交阯謨制置適宜民不告病地多虎設機穽補之不能止謨為禱於神虎遂屏息洪鈞新城人永樂中知長沙府政通人和有甘露降於郡齋人咸賦詩紀瑞劉燾安康人永樂中知長沙府慈祥愷弟不施鞭朴有不善者勸諭之人咸悦服徐亨仁和人正統中知茶陵州歲歉募民之富而義者得榖五千石並出官帑賑之多所全活又奏減田租民懷其惠韓璟寕德人天順中知湘陰縣茌政公勤開辟田野勸民積粟以備賑造橋梁道路時有芝草瑞蓮之祥人謂善政所致周範豐城人成化初知長沙府時藩王初就國䕶從者驕横肆奪範執法禁制民賴以安盛時樂平人成化中知善化縣㑹親藩開國征調繁重時悉心經畫民不告困縣舊治在城外時出俸遷建入城陳鋼應天人成化中長沙府通判除冗費決疑獄去之日行李蕭然卒後士民以鋼從祀嶽麓書院彭琢吉水人宏治中長沙推官以俸入修嶽麓書院置田養士卒官貧不能斂董豫㑹稽人宏治中知茶陵州州多訟捕其尢寘之法遷建學宫士風蔚起歲旱奏減租賦者再民徳之楊茂元鄞人宏治間以言事滴長沙府同知以興起斯文為任加意書院表章隱德厯官刑部侍郎長沙人祀之六君子祠秦鉞慈溪人正德中知攸縣廉幹機警縣治為流賊焚毁鉞為更創趙以敬普安人正德中知茶陵州部使督數歲逋賦時值饑饉民不聊生敬悉以官帑貸之季本㑹稽人嘉靖中以御史出知長沙府早聞王守仁論學之㫖開講嶽麓書院四方士多從之罷歸身殁幾不能殮蘇志皋固安人嘉靖中知瀏陽縣邑糧多虚射貧民有儺賠之苦志皋力行保甲法俾無田者歸於有田公私稱便俗尚淫祀志皋謂非有功於民者弗在祀典盡毁之張西銘濱州人嘉靖中知長沙府在任六年清操敏幹始終如一嘗揭一聯云政拙不求妻子潤心勞惟有鬼神知韓嘉㑹眉州人嘉靖中知湘潭縣世宗幸承天奉檄供辦盈縮有方民不知勞歲旱疫捐俸備粥藥復請捐賑全活甚衆劉漢揭陽人嘉靖間知安化縣居官清苦歲旱出禱霖雨屢應城南火漢為拜求火隨滅以疾去官後令於廨舍壁中得所遺手書十數𥿄皆自警語因歎服焉王奇橙惠安人嘉靖中知益陽縣邑有巨盗為亂奇橙以計招其渠魁伏兵斬之卒官貧不能殮王相丹徒人嘉靖中知益陽縣剛廉有守嘗大書署門云禮義出入惟爾之休財貨出入惟爾之羞卒之日同官為賻殮其妻郤之曰此吾夹所不取者竟不受陳以道永寕人嘉靖中知湘陰縣以直忤當道歸行槖蕭然邑人競遺之不受曰吾攜一片湘雲歸作黔山清供所受多矣陸南陽武進人隆慶中知善化縣捐俸築邑南隄數十里人號陸公隄有被枉擬辟者力辨其冤得免人刻像祀之李實瀘州人隆慶中知湘潭縣所設施悉出至誠嘗作短歌勸諭吏胥弗受人錢使人於麗譙歌之聽者皆為感泣李仕亨銅梁人萬厯中知善化縣時遭旱疫仕亨出俸錢給饘粥藥餌置義塜以掩胔骼又力請蠲租賑恤得報可唐源錢塘人萬厯中知善化縣嘗條議開南源港利舟船以通商禁夫馬私斂以甦民困歲當大水力請蠲賑全活萬計六年考滿以勞卒何節漢川人萬厯中知長沙府案無留牘繕城堡清賦役興學校覈屯伍諸政犁然具舉徐可行宣化人萬厯中知寕鄉縣為政平易與父老子弟歡若家人時禁網疎濶民鮮姦宄兩臺數議調繁可行辭曰吾樂縣俗渟樸願無以易朱志宜春人萬厯中知瀏陽縣見民俗奢僭志風以節儉胥役有褎衣大褏者即命剪截之有履絲曳縞者輒訶責曰爾非民膏何從得此質獄偶施敲朴輒泣下秩未滿自引去馮祖望武進人萬厯中知瀏陽縣下車覩逃亡滿目逋賦鉅萬遂躬履阡陌清勘田畝有瀏民七苦八難之請浮糧蕪壤俱從輕減民被實惠董翼合江人萬厯中知益陽縣縣東鄉頻年患水翼捐穀募民建隄障水延袤二萬餘丈湖鄉賴之揭士奇廣吕人萬厯中知湘鄉縣時水旱頻仍士奇煖征弛刑廣儲榖石力請蠲民田租之半得報可後創建社倉社學趙彬洛陽人萬厯中知長沙縣到官見户口流移錢糧隠射乃方田均賦編為十五里三廂其荒田不可開者另為糧册緩徵之縣治孤懸北城外請於上官割俸緡及贖鍰遷之城内不以累民晏朝寅名山人萬厯中知醴陵縣却羨餘以償逋賦請免代編沔陽江夏銀米邑人德之性抗直不媚上官部使者行縣輒為斂手王秉乾華陽人天啓中知湘陰縣邊餉起秉乾不忍派民覈城中官地令居民承買得數千金充餉秉乾對父老泣曰此可權一時耳後此民困將何極也朱三才嵩明州人崇禎中知醴陵縣時臨藍寇亂犯境三才率鄉勇禦之賊遁去治醴陵七年創書舍修橋梁率多美政余自怡徽州人崇禎中知湘陰縣著慎刑錄薄責必記用重刑則加圈以誌之時臨藍寇橫行長岳間自怡親率郷勇堵禦寇知有備乃解圍去楊枝起華亭人崇禎中知湘陰縣催科有法内設六書完欠之數内書司之外書不與置勿欺簿手授耆民自注荒熟荒者設法蠲之尢長於聽斷民有兩母牛共將一犢爭辨不決枝起以三木囊犢首一母牛獨哀號抵觸因以犢歸之十二年寇圍長沙遣偵者冒差官至邑枝起陽不知設宴禮之使縱觀庫藏賊知空虚果不復入楊開大埔人崇禎中知湘陰縣張獻忠陷長沙列城俱潰開度力不能支退守白鶴山募郷勇為恢復計賊乘間執之誘以官不從脅以刃復不屈因驅之於河家屬十七人皆溺死蔡道憲晉江人崇禎中長沙府推官時多盜偵察立獲吉藩宗為暴先治而後啓王張獻忠陷武吕直犯長沙道憲募兵拒守及總兵尹先氏戰敗歸賊乘勝奪門入先民乞降道憲北面頓首泣曰臣不職以死謝天子旋被執罵不絶口賊怒磔之磔且死猶作恨聲賊詰之曰恨不殺尹先民健卒淩國俊陳世科等九人俱從死事聞詔贈太僕卿諡忠烈特祠祀焉時照磨莫可及亦殉節死周二南雲南人崇禎中為府通判盡心職事與蔡道憲深相得道憲死二南力請於上官獲請䘏久之擢岳州知府士民固留以新秩還長沙李自成自興國間道入境二南督兵鏖戰殁於陣事聞贈太僕寺卿並祀忠烈祠呉士義常州人崇禎中長沙縣丞獻賊陷城被執不屈死祀羣忠閣李完珍山東人崇禎中長沙府經厯署益陽縣事獻賊寇長沙死之楊一位臨湘人崇禎中湘鄉訓導礦寇嘯聚天王寺一位與邑令募民抗賊以計擒之葺學宫課士子多所造就邱存忠雲南人崇禎中知寕鄉縣流賊破湖南存忠懷印避為姦吏所怨執付賊賊為置酒付印仍令宰寕存忠抗詞泣下賊怒縳去至道林被殺賴大雅贛州人崇禎中益陽教諭為張獻忠所執脅之從不屈正衣冠端坐罵賊賊怒殺之經句面色如生本朝張宏猷奉天人順治中知長沙府有肆應才當軍興時公務旁午一切簿書皆手自裁定為政嚴明不苛民皆稱之蘇宏謨遼陽人順治中長沙府同知時兵民雜處加意撫輯甚得人和高天爵奉天人順治中知長沙府時討李定國綜理軍政籌軍餉事集而兵民帖然以父疾解組去老幼號泣遮留不得熊應昌蘄州人順治中知茶陵州時流賊初平馳招來之檄定賦役之式革耗外之羨申讀法勤月課於發姦摘㐲尢精朱前詒無為州人康熙中知長沙縣均賦役勸農桑新學校百廢具舉熊學熊南昌人康熙中知湘陰縣縣經水災穀貴甚平價反昻學熊乃益增之遠商踵至價頓賤舊牘中有寡婦一子被誣論死欲生之上官有難色力爭平反罪人遂得時方巡撫執姦民無辜被繫者數十人學熊盡釋之李玠同州人康熙中知湘郷縣淸漏册咸浮派均區編都大吏下其治以為各屬法值偏災發縣民賴全活纂修官臣高人鑑恭纂輯提調官臣張日章恭覆輯校對官臣賀式韓恭校校對官臣章詒燕恭覆校大清一統志長沙府四人物漢梅鋗益陽人高帝時爲長沙王呉芮將時帝攻南陽遇鋗與偕攻析酈降之及項羽相王以芮率百越立爲衡山王其將梅鋗功多封十萬户爲列侯羽死上以芮鋗有功從入武關徙芮爲長沙王鋗從之家益陽因姓所居曰梅山芮得江漢民心皆鋗之力古初長沙人父喪未葬鄰人失火初匍匐柩上以身捍火火爲之㓕太守郅惲甄異之以爲首舉祝良長沙人并州刺史性勇決永和二年日南徼外蠻反李固薦之拜九真大守良單車入賊中設方畧降者數萬嶺外復平羅宏長沙人爲交州刺史春行冬息徧厯所部咨詢疾苦太守多解綬請罪宏廉實舉發貪殘斂迹劉壽長沙人順帝時爲洛陽令歳旱祈雨不得暴身階庭告誠引罪遂得雨人爲之頌曰天久不雨蒸人失所精誠感應滂沱下雨虞芝長沙人州辟南陽從事太守張忠連姻王室罪名入重芝依法執按刺史畏勢召芝芝曰吾年往志盡譬如八百錢馬死生同價且欲立效於明時耳遂投傳去三國漢蔣琬湘鄉人從先主入蜀諸葛亮嘗稱蔣琬社稷之器非百里才亮住漢中琬統府事常足兵食相給亮每言公炎託志忠雅當共贊王業密表後主云臣若不幸後事宜以付琬亮卒累官尚書令封安陽亭侯時亮初喪遠近危悚琬舉止如常衆望漸服延熙初詔琬屯軍漢中又命開府加大司馬九年卒諡曰恭魏桓階長沙人祖超厯典州郡父勝尚書皆有名南方階仕郡功曹太守孫堅舉階孝廉除尚書郎父喪還鄉里㑹堅擊劉表戰死階冒難詣表乞堅喪表義而與之久之辟為從事祭酒欲妻以妻妹蔡氏階自陳已結婚拒而不受因辭疾告退魏太祖定荆州辟為丞相掾主簿遷趙郡太守魏國初建為虎賁中郎將侍中時太子未定而臨葘侯植有寵階數陳文帝徳優齒長宜為儲副公規密諫前後懇至遷尚書典選舉文帝踐阼遷尚書令封高鄉亭侯卒諡曰貞子嘉尚公主死王事孫陵有名於晉官至滎陽太守呉桓彝階弟仕呉為尚書孫琳議廢其主亮彝不肯署名琳怒殺之晉虞悝長沙人與弟望並有士操少仕州郡兄弟更為治中别駕譙王氶臨州㑹王敦作逆氶乃命悝為長史望為司馬督䕶諸軍湘東大守鄭澹王敦姊夫也不順氶㫖遣望討之望率衆一旅直入郡斬澹以狥及魏乂來攻望力戰死城破悝復為乂所害敦平贈悝襄陽太守望滎陽太守桓雄長沙人少仕州郡譙王氶為湘州刺史命為主簿王敦之逆氶為敦將魏乂所執佐吏奔散雄與西曹韓階從事武延並毁服為僮豎隨氶向武昌乂見雄姿貌知非凡人因害之韓階長沙人性廉謹篤慎為閭里所敬愛刺史譙王氶辟為儀曹祭酒轉西曹書佐及氶為魏乂所執送武昌階與武延等同心隨從在氶左右桓雄被害之後二人執志愈固及氶遇禍階延親營殯殮送柩還都朝夕哭奠葬畢乃還鄧騫長沙人少有志氣為鄉鄰所重刺史譙王氶命為主簿使説甘車卓畱為參軍以母老辭騫節操忠信庾亮稱為長者厯武陵始興太守遷大司農卒於官鄧粲騫子少以高潔著名不應州郡辟命荆州刺史桓沖卑詞厚禮請粲為别駕粲嘉其好賢乃起應召後患足疾求去不聽令卧視事以病篤乞骸骨許之粲以父騫有忠信言而世無知者乃著元明紀十篇行於世易雄瀏陽人仕郡為主簿張昌之亂執太守萬嗣將殺之雄與賊爭論曲直賊怒叱使牽雄斬之雄趨出自若賊乃舍之由是知名舉孝廉為州主簿後為春陵令刺史譙王氶拒王敦雄承符馳檄募衆千人敦遣魏乂李恒攻之力屈城陷遇害王矩長沙人父毅廣州刺史甚得南越之情矩初為南平太守豫討陳恢有功遷廣州刺史南北朝齊孫普濟長沙人居喪未葬鄰家火延及舍普濟號慟伏棺上以身蔽火鄰人往救已悶絶累日方蘇陳歐陽頠長沙人公正有匡濟才厯官鎮南將軍廣州刺史進號征南將軍陽山郡公時頠弟盛為交州刺史次弟邃為衡州刺史合門顯貴名振南土天嘉四年卒諡曰穆子紇唐歐陽詢紇子敏悟絶人博貫經史高祖微時數與遊旣卽位累擢給事中詢初倣王羲之書後險勁過之貞觀初厯太子率更令宏文館學士封渤海男卒年八十五歐陽通詢子儀鳳中累遷中書舍人居母喪詔奪哀入朝徒跣非公事不語還家輙號慟居廬四年不釋服冬月家人以氊絮潛置席下通覺卽撤去天授初轉司禮卿判納言事輔政月餘㑹張嘉福請以武承嗣爲太子通與岑長倩等固爭忤諸武意下獄死神龍初追復官爵戴簡長沙人以文行累爲連帥所賓禮貢之澤宫而志不願仕好孔氏書帝及莊老莫不總覽嘗有堂因東城爲池環之九里遊覽之勝於是爲最柳宗元作記楊祥醴陵人太平節度使漢公之裔因避地遷於此事親孝親亡哀毁泣盡繼以血廬墓終身有白芝白兎白烏之瑞事聞於朝詔植坊墓道以表之劉蛻長沙人咸通進士爲左拾遺與起居郎張雲疏論右拾遺令狐滈貶山陽令垂老瘞文爲塚刻石爲銘王璘長沙人詞富學贍應日試萬言科請十書吏皆給筆札口授十書吏手不停札未亭午已就七千言時路巖當軸召之璘不往巖怒亟罷萬言科後放浪山水聞隱於詩五代漢劉昌嗣湘鄉人漢時為磁相二州刺史隱帝遇害昌嗣避地衡山馬氏招以賓禮不赴周行逢逼以偽禄昌嗣曰我嘗致身漢氏縱不能為夷齊獨不可效梅福乎遂改姓范號愚叟躬耕饘粥自給楚王仝湘郷人仕馬氏為上軍指揮使嘗與梅山􅍹戰勝逐北孤軍無援力戰而死里人感其忠義為之立廟徐仲雅自關中遷居長沙為馬氏十八學士之一累諫馬希範不用周行逢累欲用之仲雅不屈廖偃長沙人父光圖馬氏十八學士之首馬希萼之廢也偃與彭師暠據衡山奉之請命南唐南唐以為道州刺史死於王逵之難宋蒙延永長沙人五代末知賓州宋初以捍賊死節子少連補左班殿直以邕州功加殿前承㫖李耕潭州人聚居至七百餘口累數十百年真宗時旌表蠲其課調孫景修長沙人少孤受教於母咸平中舉進士官至太常少卿老而念母之心不忘撰賢母録又集古今家誡四十九人蘇軾為之序畢田長沙人博學工詩真宗朝以吏部郎兼侍講一日居經筵値天寒奏蠲臨湘七郡科調里人德之周式湘陰人以行義著為嶽麓書院山長大中祥符閒召拜國子主簿詔畱講諸王宫式固謝還山教授丁雋醴陵人習春秋時稱丁三傳兄弟十七人義聚三百口五世同居家無閒言大中祥符中詔旌其門曰義和坊彭介湘陰人天禧進士厯官柳州刺史有廉聲劉琦長沙人生二歲母陷於兵及長請於父往求母徧厯河南北淮東西數歲後得於貴池迎以歸養十五年父沒又三年母沒終喪蔬食有司以聞表其門曰孝義狄棐長沙人舉進士知廣州代還不以南海物自隨人稱其廉拜右諫議大夫龍圖閣學士厯知陜鄭州河中河南府棐在河中時有中貴過郡言將援棐於上前棐答以他語退謂所親曰我湘潭一寒士今官侍從可以老而自汚耶其為政愷悌不為表襮死之日家無餘貲狄栗棐弟嘗知榖城縣民多豪猾以法繩之歲饑米貴發常平倉以賑有司劾其擅帝原之厯官大理寺丞歐陽修稱為廉吏志其墓胥偃長沙人少力學舉進士累遷工部郎中入翰林為學士權知開封府忻州地震偃上言宜選將練師以防邊塞未幾卒偃未仕時家有良田數十頃旣貴悉以予族人嘗與謝絳受詔試中書吏大臣有以簡授偃者偃不發視亟焚之歐陽修始見偃愛其文召至門下妻以女子元衡有學行為尚書都官員外郎狄遵度棐子少頴悟篤志於學以父任為襄縣主簿居數月棄去好為古文著春秋雜説多所發明有集十二卷弟遵禮試秘書省知蘄縣有能聲陟駕部郎黄庭堅志其墓董南美湘鄉人隱居漣水極為蘇黄所重鄧忠臣湘陰人居玉池山學者稱玉池先生神宗時進士累官考功郎中入元祐黨籍卒贈祕閣修撰弟孝臣宣和間累辟不起彭天益攸縣人元祐中鄉薦後為太學博士以議論不合出為湖南提舉大觀初上封事力言權姦誤國年五十致仕居司空山翛然有物外意所著有瑞麟集鄧淵湘陰人登崇寕三年第初仕酈延經畧使入奏邊機徽宗嘉其敏練除國子丞遷虞部員外郎大觀𥘉値星變求言淵上封事言多剴𥘉蔡京惡之左遷監酒税知懷州畢贊長沙人仕郡為引贊吏性至孝父母皆年八十餘轉運使表其事詔贊解職終養譚世勣長沙人元符進士教授郴州時王氏學盛行世勣雅不喜卻其書不觀又中詞學兼茂科除祕書省正字時蔡京子攸領書局同舍郎多翕附以取貴仕世勣泊如也六年不遷蔡京罷為司門員外郎稍遷吏部京再相復罷久之還吏部擢中書舍人以謹命令惜名器廣言路吝賜予正上供省浮費六事言於上為當路所嫉徽宗禪位請釋奠先聖不當以王安石配再扈車駕至金帥帳以十害説其用事者言講和之利詞意忠激金人聳聽張邦昌僣國稱疾不起以憂卒建炎初贈端明殿學士諡端潔從父申政和進士官王府贊讀張邦昌以為屯田郎中力辭不起紹興四年知筠州以歲饑請緩征忤監司降秩遂致仕歸民祠祀之丁仁醴陵人登進士第累遷淮蜀制幕及高沙之變仁諭以順逆降之知無為軍依城築堰郡人感德名曰丁公堰王以凝湘潭人父長孺守靖州因言事落職以凝在太學抗章申冤尋佐鼎澧帥幕靖康之難以凝走鼎州乞師躬率入援解太原圍建炎元年以宣撫參謀制置襄鄧招諭桑仲等以老乞歸養母孫方武長沙人爲州學正金人入城方武率居民連日巷戰金人四面縱火方武挺身罵不絶口死之後祠於學袁顯益陽人勇敢過人建炎聞湘寇楊幺猖獗顯團鄉兵以捍力盡爲賊所得賊欲用之顯罵賊不屈赴鼎鑊死謝淳瀏陽人建炎三年潰兵杜彥自袁州入瀏陽害潭州通判孟彥卿添差通判趙民彥以民兵赴之淳以才勇衆推之率民兵爲前鋒助民彥戰淳手殺十數人力屈被執事聞贈成忠郎官其子睎古丁公膺醴陵人紹郵尉金兵興初爲高至力戰死之朝廷嘉其忠官其子倚終衡山令弟公億與兄公萬當靖康時避難於鄉賊得公萬縛之將就炮烙公億願以身代賊義而釋之一家獲全王玠善化人蘄黄鎮撫使孔彦舟叛玠開陳百端不聽玠罵曰恨不斬汝萬段彥舟怒并玠家屬沉之龍眼磯盧元亮安化人居資江濱積學能文操行純固兄弟九人元亮居長盡以產業分給諸弟已纎毫無所取王南美安化人隱伊溪之桂巖博治經史尤邃於易執經問難者不遠數百里而至置義莊以養族屬之孤貧者其所居有鈞月樓耕雲堂謝英寕鄉人隱居教授著書自娛孝宗時累辟不就所著有志伊錄湯璹瀏陽人淳熙進士上疏言初召朱熹爲侍講官四方仰望啟沃之益曾未踰時輙聽其去必駭物論宜追召熹還仍授講職疏上不報由是寖忤權相意而璹之直聲亦大聞於時厯禮部駕部郎中出知常州入爲大理寺卿進直徽猷閣卒璹負直槩與韓侂胄陳自強不合故起復制詞有清風峻節之語然屢爲奸黨中傷生平奉祠閒居之日多於敭厯劉子駒長沙人多聞彊記清貧苦節乾道中朱子與張栻謁之時子駒已老尚能談說往事衮衮不休氣貌醇古自然有前輩風度子姪無欲無咎閉門安貧謹守家法李作乂瀏陽人淳熙閒官迪功郎與其子曰南擇縣南建遺經閣藏書萬卷朱子反張栻賦詩美之孫之傳能守其業三世以學行稱呉獵醴陵人登進士第光宗以疾久不覲重華宫獵上疏詞甚切又白宰相畱正乞召朱熹楊萬里慶元初除監察御史㑹偽學禁興獵又上疏諫尋劾罷久之除户部員外郎總領湖廣江西京西財賦獵計金人懲紹興未年之敗今其來必出荆襄踰湖乃輸湖南米於襄陽五十萬石又以湖北漕司和糴米三十萬石分輸荆郢安信四郡蓄銀帛百萬計以備進討拔董逵孟宗政柴發等分列要郡後皆為名將除祕書少監首陳邊事旋以四川安撫制置使兼知成都府嘉定六年召還卒家無餘貲蜀人思其政畫像祀之獵初從張栻學乾道初朱子㑹栻於潭獵又親炙湖湘之學一出於正獵實表率之卒諡文定瞿景鴻潭州人五世同居詔旌其門鄭應龍長沙人慶元中進士調潭州功曹掾有兵士盜帥金下獄株連數人皆坐流應龍力爭帥意未解應龍曰若使罪及無辜有去官而已帥歎曰其人若不勝衣乃能直如此楊大異醴陵人從胡宏受春秋嘉定中登進士授衡陽簿調龍泉尉皆有惠政移安遠尉除四川制置司參議官元兵入成都大異巷戰身被數創死越宿復甦部曲負以逃擢大理寺丞平反冤獄者七召對極言時政得失理宗曰是四川死節更生楊大異耶論事剴切有用之才也進直祕閣提點廣東刑獄廣海幅員數千里道不拾遺報政爲最年未六十卽乞致仕除祕書修撰提舉崇禧觀歸田里居醴陵鄉與民居無異學者從之講肄相與發明經㫖條析理學食祠禄者二十四年卒年八十二彪虎臣湘鄉人嘗從胡安國父子遊講明正學不事進取子居正受業張栻之門充嶽麓書院山長人稱爲彪夫子劉宗源茶陵人以義兵破郴寇李全黨二十餘萬淳熙中於北湖塘戰死自持其首跨馬仗劎還至其家馬嘶三聲而仆詔贈保義郎祠祀王容湘鄉人淳熙閒登進士第一累官禮部侍郎卒贈銀青光録大夫登第有詩云名實兩言雖樸語始終一節悉真誠龔輿湘陰人乾道進士從朱子遊爲湘東檢法按郡不受餽遺官終福建運幹易祓寕鄉人淳熙進士第一厯官禮部尚書著有周禮周易總義禹貢疆理記易學舉隅周禮釋疑漢南北軍制等書寶慶三年封寕陽縣男黎貴臣醴陵人性淳確從朱子遊一時士類多宗之鍾震湘潭人師事朱子築主一書院以講學真德秀帥潭延典郡教稱爲主一先生端平初詔授侍讀周奭湘鄉人張栻講學潭州奭受業於門稱高弟嘉定閒真德秀帥潭命縣令徐質夫作漣溪書院以奭主教事馬胡顯湘潭人勇力絶人其母趙方女弟也方在襄陽每出兵必使顯及其子葵各領精兵分道赴戰摧堅陷陣前無勁敵累官檢校太尉弟穎亦嘗從舅氏趙范討李全紹定五年登進士第厯浙西提點刑獄移湖南兼提舉嘗平毁淫祠數千區以正風俗衡州有靈祠吏民素所畏事穎撤之遷廣東經畧安撫使移節廣西尋遷荆湖總領財賦穎臨政善斷不畏強禦咸淳閒卒歐海茶陵人師事楊萬里淳熙五年授零陵令作勸農十詩真德秀稱爲循良之遺皮龍榮醴陵人淳祐進士除祕書郎擢著作郎入對因及真德秀崔與之之廉願陛下崇奬之以風天下遷吏部員外郎兼直講入對言忠王之學願陛下身教之於内帝皆嘉納景定二年拜參知政事咸淳元年免帝偶問龍榮安在賈似道恐其召用劾徙衡州居住未至而沒龍榮少有志畧精於春秋有文集三十卷楊霆大異子少有遠志以世澤補將仕郎辟荆湖制置司幹官呂文德爲帥密薦諸朝除通判江陵府德祐初起湖南安撫司參議與李芾協力戰守出奇應變帥府機務芾一以委之城破霆及妻妾皆死顏應焱茶陵人第進士潭帥李芾薦為湖南安撫節度判官德祐中元兵圍潭州城將陷應焱謂芾曰事勢至此奈何芾曰吾分甘死諸君自為計旣而芾舉家以火自焚應焱亦赴火死尹穀長沙人性剛直壯厲第進士調常德推官知崇陽縣所至廉正有聲丁内艱家居教授不改儒業潭城受兵帥臣李芾禮以為參謀共畫備禦䇿三月援兵不至穀知城危與妻子訣召弟岳秀使出以存尹氏祀乃積薪扄户朝服望闕拜已先取厯官誥身焚之卽縱火自焚鄰家救之火熾不可前但於烈焰中遙見穀正冠端笏危坐闔門少長皆死焉譚端伯茶陵人平生以忠義自許文天祥舉贛兵勤王端伯亦起兵應之後為元兵所獲不屈而死王夢應攸縣人咸淳進士廬陵尉臨安失守夢應率同邑呉希奭陳子全起兵勤王馳疏奏聞又遣使通桂帥遂復袁州旣而兵敗夢應奔永新卒胡復三湘郷人理宗時領鄉薦德祐乙亥挈家避元兵於上符山為遊騎所執降之不可遂遇害劉榮叔湘潭人起兵於貞女山拒元兵潰舉家飲藥死惟遣二子竄匿以全宗祀陳仁子茶陵人宋末膺薦舉不仕於元博學好古輯文選補遺四十卷營别墅於東山市人因呼為東山陳氏同時有王顯謨者亦抗節隱鶩山丁開長沙人負氣敢言安撫向士璧被問開獨詣闕上疏具陳士璧功大軍府小費不宜推究書奏羈管揚州元張康湘潭人早孤力學旁通術數宋亡隱衡山至元中世祖召授著作佐郎禮遇殊厚帝欲征日本命康以太乙推之康奏曰南國甫定民力未蘇且今年大乙無算舉兵不利帝嘗賜太史院錢分千貫以與康不受衆服其廉遷祕書監丞謝一魯瀏陽人至元進士嘗為石林書院山長賊陷潭州一魯奉親匿巖谷中官兵復郡邑亡者稍歸乃遷理故業俄而賊復至生縛一魯一魯罵賊甚厲舉家咸遇害劉履泰益陽人博通經史仁宗時詔授慶州書院山長仕至靖州通道令歐陽原功瀏陽人八歲能日記數千言及長經史百家靡不研究伊洛諸儒源委尤為淹貫延祐中登第原功性度雍容處已儉約為政廉平厯官四十餘年三任成均兩為祭酒六入翰林三拜承㫖修實録大典遼金宋三史屢主文衡兩知貢舉凡宗廟朝廷文冊制誥多出其手海内名山大川釋老之宫王公貴人墓隧之碑得其文詞以為榮卒年八十五封楚國公諡曰文有圭齋集數百卷周鏜瀏陽人泰定進士授衡陽縣丞再調大冶縣尹治行為諸縣最擢翰林院國史編修官遷四川儒學提舉使道還家盜起湖南北郡縣皆陷瀏陽無城守盜至鏜告其兄弟使遠引自謂我受國恩當死母為相累也賊至得鏜欲推以為主鏜怒目厲聲大罵賊知其不可屈乃殺之陳泰茶陵人舉於鄉官龍泉簿以詩名有所安遺集劉畊孫茶陵人至順中厯建徳徽州瑞州三路推官所至有政績至正十二年蘄黄賊攻破湖南畊孫傾家貲募義丁以援茶陵賊至輙卻故茶陵久不失守十五年轉寕國路推官㑹長鎗鎻南班等來侵境畊孫率兵乘城固守援絶城陷與弟燾孫長子碩皆殉節李祁茶陵人元統進士累官浙江儒學副提舉元將亡隱居永新山明初徴聘不起所著有雲陽集明陳凝茶陵人元末從軍至金陵代諸將言事太祖異之厯中書省參議出知廣徳州歲大旱奏免租從之遷兵部尚書浙江行省參政復召為御史中丞以嚴見憚人比汲長孺云陳南賓名光𥙿以字行茶陵人元末官全州學政洪武二年除無棣縣丞轉膠州同知所至以教化為先十八年拜國子助教入見上命講洪範九疇辨晰甚詳教國士尤善訓迪窮日無惰容擢蜀府長史蜀王好學禮士南賓隨事規諌王益敬禮之年八十卒作詩清勁有法蜀人至今傳誦之賀興隆安化人元至正閒率民兵保障鄉閭陳友諒兵起授興隆參軍後歸太祖仍予故官隨徐達取辰州又隨胡海克寶慶路獲元元帥唐隆卽授寶慶指揮同知㑹邵陽賊周文貴等侵境率兵與戰衝其前鋒援兵不至死之贈湖廣行省參知政事黄英醴陵人元末授修武校尉率孤軍克復武昌取糧安慶以衆歸附太祖充先鋒守江陰從大軍討樅陽卒於陣追封江夏縣男劉三吾名如孫以字行茶陵人仕元為廣西副提舉洪武十八年始召為左贊善遷翰林學士年七十三矣三吾博覽善記應對詳敏屢承顧問御製書成多使為序時編輯故典及禮制等書皆所鑒定賜賚寵渥永樂初卒彭友信攸縣人洪武初廷試至京遇上微行見虹霓口占詩命友信續之信不知是帝應聲成詩上大悦明晨召對上曰此秀才有學有行命為北平布政使夏原吉湘陰人洪武舉人官户部主事太祖器之擢本部右侍郎建文初遷福建採訪使成祖即位進左侍郎拜尚書尋命治水蘇松著勞績後以議北征忤上意繫獄仁宗立復官加太子少保兼太子太傅宣宗立原吉與蹇義三楊同心輔政中外以安宣德中命解部事入閣預機務卒贈太師諡忠靖原吉清端寛厚厯事五朝未嘗有過為時名臣子瑄敏悟喜讀書原吉卒拜尚寶丞屢陳邊事終南京太常寺少卿瑄子崇文有文學成化進士厯右通政論事慷慨多見采行周幹瀏陽人洪武中以貢生授江西布政司照磨廉慎有為累擢御史永樂中厯江西右布政使有惠政瀏陽初開鐵冶鍊造官鐵解京鐵不堪用而解難足額幹建言免之易先湘陰人永樂中由國子生授交阯諒山知府有善政歲滿當遷士民相率乞畱命晉二秩還任宣德中黎利反陷交阯攻破其城先佩印自縊妻孥十八口同日死諡忠節復其家張武瀏陽人豁達有勇力稍涉書史為燕山䕶衛百户從成祖起兵累功封成陽侯卒贈潞國公諡忠毅王偉攸縣人隨父戍宣府年十二仁宗北巡獻安邊頌正統閒舉進士改翰林授户部主事英宗北狩偉糾集士民守廣平有功遷兵部職方郎時文移填委偉援筆立就少保于謙專任之擢兵部右侍郎視邊有小田兒本中國人陰為邊患偉與謙謀以計賺至陽和城伏勇士於道殺之自是邊境肅然天順初為石亨族歸尋召復原官五年以病歸張驥安化人永樂舉人入國學宣德初授御史出按江西慮囚福建平反及千人陞大理少卿廵撫山東設法賑饑全活甚衆又奏罷撫民官百姓便之調浙江巡撫擊斬礦賊蘇牙等招降賊首陳鑑胡所至咸有建樹景泰初召還卒於道李鑑安化人正統進士博學工詩厯官惠州知府政事精敏所著有慎庵集唐震醴陵人正統進士厯官户部侍郎兩署尚書事公勤廉慎參議四川督建昌邊餉修城建堡政績最著有土官爭地殺人暮夜以金賂震震卻之捕置於法以參政歸越嶲民立祠祀之羅琥茶陵人正統中通判南陽積粟麥二十萬石撫流民萬餘户築封邱隄八十餘里改衢州以捕冦功進侍郎子鑑宏治進士授户科給事厯廣東參議四川布政有能績以忤劉瑾落職瑾敗起巡撫尋致仕李東陽茶陵人以戍籍隸京師四歲能書大字景帝召見賜楮筆果鈔中天順進士入翰林累遷禮部侍郎文淵閣大學士預機務多所匡正受顧命輔翼武宗所疏論皆治忽大計巳而慶藩叛霸州賊起悉如東陽言卒賴其畫討定之劉瑾用事一時善類賴以保全者甚多瑾誅加特進後以議調邊軍入衛陳十不便狀不聽遂累疏乞休東陽文章典麗樂府有漢魏風卒贈太師諡曰文正黄寶長沙人成化進士厯吏部郎典選事公慎廉明厯官大常卿擢都御史巡撫陜西時潼關大饑城堡多圯寶肅紀律清壁壘儲饋餉遠烽燧秦地以安以忤劉瑾罷歸瑾誅復起巡撫山東移疾歸有東岡集劉憲益陽人成化進士拜監察御史厯遷都御史巡撫寕夏値北邊有警憲募土兵禦之捷聞賜金帛有差後忤劉瑾逺繫詔獄卒羅安益陽人成化進士授户部主事使兩廣以清幹名中貴不能干為山東僉事舉屯政毁淫祠轉四川副使苗蠻兇虐懼罪以金賂安安卻而誅之改貴州參政普安兵起督餉有功邵敏湘陰人成化進士官户部主事母喪廬墓一夕虎至忽數鹿逐之去旁產芝數本人謂孝感所致事聞詔旌其門徐廷用醴陵人宏治進士任户部主事督收諸倉場芻税剗剔姦弊人莫敢干以私宣大用兵以廷用理軍餉區畫有方陞郎中楊志學長沙人宏治進士厯官都御史廵撫大同邊卒桀驁帥弗能戢志學諭以至誠恩威兼濟一軍帖然擢户部侍郎晉尚書扈世廟巡幸興都乘閒奏免貧民租税卒贈太子太保諡康惠蘇純湘陰人宏治中舉人事父母及繼祖母盡孝先後居喪不入内寢者七載葬母百事躬親中寒疾卒正德中旌表孫泰醴陵人宏治舉人知銅梁縣多惠政鄰邑詞訟咸質成焉持身清苦在任十年惟一僕自隨拜監察御史賀憲益陽人宏治舉人知四川灌縣致仕事父母盡孝生事祭葬動循古禮年九十語及輙淚下弟被溺求尸弗得哭江上再晝夜聲不息尸為湧出張孚敬秉國招之不起易舒誥攸縣人宏治進士授檢討劉瑾擅權人爭趨附舒誥獨不屈改南京户部主事瑾入翰林以親老乞歸杜門郤掃家居十四年敗復卒龍誥攸縣人正德進士知臨川縣時東鄉多盜久不能平誥詣賊壘諭降之遷户部主事厯郎中督賦江西疏免逋累出守廬州歲饑出賑疏罷馬價茶牙諸税酌常平濟糶諸法著為令累遷廣西參政以病歸張治茶陵人正德㑹試第一選庶吉士授編修嘉靖時厯兩京吏部侍郎南京吏部尚書持身方正鋭然以辨邪正為已任累進禮部尚書文淵閣大學士進太子太保治博學有文詞明習典故及秉政時嚴嵩專權悒悒不自得遂病卒諡文隱隆慶初改諡文毅楊守謙志學子嘉靖進士厯都御史督保定軍務嘉靖十年都城被困守謙不候調發卽提兵入援晉兵部侍郎督戰益急援兵未至守謙欲堅壁以待中貴嫉其功謗爲逗遛下獄論死時論惜之隆慶初贈尚書諡慤愍魏煥長沙人嘉靖進士授嘉興府推官厯兵部員外郎擢四川僉事明習世務畱心邊防所著有九邊圖考蜀東撫苗實録周之屏湘潭人嘉靖進士厯官布政使初知吉安有譁卒入府門僚吏散走之屏卽嚴鼓升堂語之曰若輩有所訴守能爲若白若爲亂則守不懼死汝曹罪不貸矣卒皆釋戈拜一郡獲安胡廷輔瀏陽人嘉靖進士授户部主事轉工部員外郎嘗奏罷蘇杭監造歲費省數千金陞廣東南雄知府羅尹凱益陽人嘉靖舉人父養二鶴父旣殁聞鶴唳則仰天大哭初令饒平政簡無私在官未嘗肉食饒人祀之遷鬱林知州清操益勵歸槖蕭然廖希顏茶陵人嘉靖進士知高安縣陞工部主事扈駕承天尋遷郎中擢山西提學講學河汾書院時寇氛甚熾御史檄令剿捕殱之進浙江按察使陳葵生茶陵人賊寇嚴溪父其鼎被執索貲不獲將刃之葵生號泣入營請貸紿賊云歸父執我可得重賂賊信而釋之及賂不至賊詰之葵生曰我貧安從得賂吾代父死耳賊怒殺之周策寕鄉人任貴縣知縣盜刼永淳庫長吏思自脱以平民抵罪郡守以上亦幸得盜不復問策疑之出誣服劉紀等二十四人於獄後賓州果得真盜人服其神周采䇿子嘉靖進士任禮科敷奏務持大體陞四川布政雲南巡撫以清介聞假歸卒賜祭葬鄧巍瀏陽人嘉靖進士授溧水知縣入為御史疏劾權貴拜杖直節凜然奉命巡邊嘗以單騎按行營伍厯鳳陽知府歲饑賑卹全活者數萬致仕歸年八十五卒李棠長沙人嘉靖進士授禮部主事厯僉都御史宣大總督王崇古以諳達就撫條封貢八事廷議紛紜獨棠極言當許帝從之巡撫南贛討平韶州山賊終南京吏部右侍郎仕宦三十年不營生產以介潔稱天啟諡恭懿諳達舊作俺答今改初追正洪懋德湘鄉人萬厯舉人為宿松令以清慎著事父至孝罷官歸授徒自給經營諸弟婚學周悉豐贍礦賊破湘鄉肆掠入其家懋德整衣待之容色無變賊無所犯賊退人怪之懋德曰吾不見有賊賊固不吾害也劉宏化長沙人萬厯進士厯刑科給事首糾輔臣附權貴内臣僭批答有直聲議移官紅丸之案侃侃不阿㑹熊廷弼論死宏化力爭之坐受熊賄罷官崇禎初起兵科都給事累遷南大理寺卿以疾歸羅其綸茶陵人萬厯舉人授太康教諭徴修熹宗實録遷瓊州推官黎人騷動幾二十年其綸單騎宣諭殱其渠入其地為水㑹所璽書褒奬讞嶺東北獄釋冤辟八十三人累擢郎中年八十四卒笥篋蕭然僅有遺稿李騰芳湘潭人萬厯進士入内閣掌制誥以忤魏忠賢削籍歸忠賢誅擢禮部侍郎召對條奏悉稱㫖晉尚書卒贈太子太保胡應台瀏陽人萬厯進士官兵科給事中轉吏科以直忤時相出為江西督學稱得人厯太僕卿巡撫應天振綱肅紀執法不阿旋督兩廣威名益著召為南京刑部尚書以忤璫奪職崇禎初起南京兵部尚書疏乞終養歸羅喻義益陽人萬厯進士天啟初官南京國子祭酒諸生陸萬齡等請為魏忠賢立祠太學右喻義懲其倡率者三人乃止忠賢聞之大怒削籍崇禎中厯官禮部左侍郎充日講官撰尚書講義於正文外旁及時事以違例革職卒謚文介洪雲蒸攸縣人萬厯進士累官嶺南道副使崇禎六年粤寇張文斌等憑險四掠誘擒之平九連山題建連平州賜賚有差擢按察使七年海寇劉香老圍海豐屢挫其衆香老懼乞撫雲蒸單騎按其壘賊畱之雲蒸陰檄閫將鄭芝龍進剿兵至以雲蒸在不卽攻雲蒸方在賊船急揮手曰母以我為念滅此以報朝廷可也香老怒之沈屍海中越五日浮屍沙口有鶴張翼覆之舟人特祀焉黄洽中善化人萬厯進士標格孤介初知歸安縣有聲厯户部郎知太原南安二府所至畏其清強在太原奏蠲地畝荒税二萬餘兩在南安蠲木價五萬緡屢薦邉才不就家居杜門不出課諸子悉有文名陶汝礪寕鄉人早聘呉氏將娶呉病瞽呉氏請絶婚汝礪曰旣盟而棄婦將安歸卒娶之親迎之日呉目復明後知泰順縣以愷悌聞王柱長沙人為諸生時教授生徒動循禮法太守葛登知其名延為子師有同里被誣人命者已抵罪柱力白其冤得釋絶口不言逾時其人始知願以身供役柱力辭之天啟中以貢生授德安教諭遷知繁昌縣在官六載有清名水溢堤潰捐俸修築陞無為知州未赴卒民立祠祀之郭都賢益陽人天啟進士授行人出為江西提學稱得士累遷都御史巡撫江西黜貪墨奬循良風骨凜然人不敢犯凡關國計民生章疏反復待可乃己晉兵部侍郎石萬程湘潭人天啟進士授户部郎中出守徽州值魏忠賢榷黄山開採歲利以數萬計萬程力爭不得卽掛冠去遂奪職崇禎閒起知常州遷温處兵備副使降海寇張宏銘等萬餘人以病乞休去周堪賡寕鄉人天啟進士知永春縣調福清治行為八閩冠擢御史巡按真順等處持法平允多所全活厯遷府尹時河工屢潰以工部侍郎兼副都御史往治數月功成省帑金三十萬上大嘉賚假歸卒陳來學攸縣人天啟舉人臨藍賊破攸縣來學率家丁捍禦不克死之婁琇湘陰人天啟舉人崇禎中知涇州李自成犯城琇招募義勇為拒守計邑人感其忠協力固守賊悉衆攻之城陷被執慷慨就戮罵不絶口妻亦不屈被殺事聞贈太僕卿楊㑹英寕鄉人天啟舉人厯國子學録擢兵曹闖賊陷京師不屈死又同邑彭日浴獻賊脅授偽職不受死之有罵賊詩十數首馮一第善化人天啟舉人以詩文名張獻忠陷長沙一第將乞師他方賊繫其母兄以招之乃歸賊斷其兩手置營中一夕死母兄獲免從祀忠烈祠有史發二十卷又同邑呉愉崇禎舉人從知府周二南禦賊被殺附祀二忠祠廖國遴長沙人崇禎進士授揚州推官時内官楊顯名奉使作威國遴糾其專擅調保定修城賑濟備嘗勞瘁擢户科給事中上守邊諸策後同鄉熊開元劾周延儒忌者謂疏出國遴手以他事下詔獄尋釋歸謝肇元湘潭人天啟進士知嘉定州請裁溢額税著祥刑息訟錄轉户部郎累遷按察使鎮潁夀時獻賊蹂躪城邑肇元躬擐甲横戈冒矢石賊多授首境内獲安以勞卒贈大僕寺卿蕭偉長沙人崇禎中武舉授王㑹都司峒蠻為寇偉單騎深入陷蠻死之姪鍵武學生亦以勇力著獻賊陷郡不屈死彭友元益陽人崇禎中母病篤友元痛哭呼天剖胸割肝一片烹以進母母食而愈欠之餘肝迸出如癅見者泣下洪法臣攸縣人崇禎中拔貢叛將張克成縱掠法臣責以忠義指陳利害被執罵不絶口死之又同邑王景熙為總兵鎮武岡亦抗節死本朝乾隆四十一年俱賜諡烈愍龍孔蒸湘鄉人崇禎舉人流寇破長沙授偽職誓死不屈尋扶母避寇山中已奮躍上峻坂顧老母在坂下援之遂遇害呉從明湘陰人崇禎舉人知遵義縣多惠政擢蘇州同知督運為闖賊所得死之本朝乾隆四十一年賜入忠義祠陶顯位寕鄉人年十大讀易有疑聞豐城李氏家傳易學遂裹糧往受業三年學成始歸後任桃源訓導又嘗攝縣篆有暮夜投金者卻不受旣歸後以易學授里中年近八十嗜學不衰著有周易學㫖李有斐善化諸生左兵抄掠挈家潛山中為所執身被數創夜忍痛負母走母渴取血飲之復被執索金不獲乃殺之唐韻湘潭諸生張獻忠陷城與父鶴翔母錢氏俱被執賊殺錢韻拊屍慟哭求死賊憐而釋之韻終抱屍不去泣血數日死母旁本朝乾隆四十一年賜入忠義祠黃鳳德湘陰人張獻忠陷長沙知縣楊開退保白鶴山為恢復計鳳德左右擁衞佐召募賊怒先捕開并家屬十七人沈於河乃磔鳳德并戮其妻同時死難者諸生譚景悦蕭贊黄文炳黄甲甲之子先炳譚孔昭一年俱本朝乾隆四十賜入忠義祠周敏中益陽人知清流縣張獻忠破城為賊所執敏中不屈索冠帶賊弗與敏中厲聲罵賊死之本朝乾隆四十一年賜諡節愍又同邑鍾鳴謙吉藩内使呂公還並殉獻賊之難本朝乾隆四十一年賜入忠義祠易應達益陽諸生獻賊之亂舉家避山中父咸凝被執應達挺身求代因遇害父得不死又諸生温崑來潘若洙及弟若鴻俱死難本朝乾隆四十一年俱賜入忠義祠文昌拱醴陵人性孝友喜讀書為賊所執詞氣慷慨抗節而死本朝乾隆四十一年賜入忠義祠譚思敬湘潭人與子清遠俱以義勇聞張獻忠陷湘潭大掠村落思敬父子力戰潰圍去後被執為賊所磔本朝乾隆四十一年賜入忠義祠謝承任茶陵人襲指揮使崇禎末調貴陽粤寇萬餘蹂躪猖獗令委城去承任督羸卒誓守城陷被執罵不絶口遂遇害事聞勅建廟祀之四十一年本朝乾隆賜諡烈愍胡湛攸縣人三中武舉官把總崇禎末臨藍賊犯攸湛率鄉勇力戰死賊亦潰遁不敢逼詔贈官本朝乾隆四十一年賜入忠義祠張孟寕鄉人儒家子以貧傭書於孝廉楊某家獻賊至楊被執孟於萬軍中突呼而前求代死賊為感動遂得釋本朝胡爾愷長沙人明進士洪承疇薦為吏科給事中在職一年章數十上其言湖南凋敝尤切厯禮部左侍郎遺疏猶陳平催徴禁營造抑侵漁革夫轎四事趙開心長沙人由進士任御史厯官工部尚書兼督倉埸居官有鯁直聲陳六禮攸縣諸生順治三年有山賊之警六禮率鄉勇禦之被執罵賊死妻朱氏亦自縊詔旌其門尹惟日茶陵人順治進士知和平縣才識敏練九連山寇猖獗四省會剿不克惟日單騎深入招降之請設官駐守岑岡以安反側以勞瘁卒官民祀之王守仁祠張愫湘陰人張獻忠之亂愫甫十齡扶其祖奔城賊欲殺其祖愫以身翼蔽連受數刃賊義而舍之父殁廬墓三年詔旌之温世儒益陽人父崑來死獻賊之難世儒甫六歳哀毁過人康熙十一年舉於郷呉逆搆亂徴世儒逃避不辱陳鵬年湘潭人康熙進士初知西安縣復流民雪冤婦旋守江寕革重耗去關蠧後守蘇州攝藩篆平糶濬河鋤兇理枉雖疊遭吏議而聖眷愈優以修書總裁臨視河道値武陟馬營口決兼漕渠淺淤鵬年躬親相度請於馬營上流及王家溝官莊峪諸處各閒引河以殺水勢壩埽旋合旋潰官民悉力竟告成功實授總河以勞卒於官諭賜祭葬諡恪勤祀賢良祠王之鈇湘陰諸生積學篤行舉動必依禮法授徒玉笥山先課以小學近思錄始及五經百家子史一時遊其門者皆彬彬可觀易貞言湘鄉人天性純和父卒廬墓三年事母盡色養終身不懈著周易講義家訓等書康熙五十一年旌王文清寕鄉人雍正進士官宗人府主事篤實淳厚年九十餘猶嗜書不倦與修三禮義疏著考古源流數百卷卒祀鄉賢祠張璨湘潭舉人官無錫令以清潔休養為治不數月丁内艱邑人哭送雍正甲辰特㫖赴京賜御府物授河閒知府未幾授副使道銜未行改長蘆運使璨繪災民圖以奏上動色咨嗟旋擢大理寺少卿璨工古文詞書法嘗自題其小齋曰相在室王岱湘潭人官順天府教授博涉羣籍卓犖自負好金石圖書之屬放遊山水所至與賢豪交著有了葊集李文炤善化舉人生而頴悟年十歳隨父遊學宫卽慨然有志聖賢之學凡六經傳注程朱緒言以及天文地理離騷參同契諸書無不推究精詳主講嶽麓書院謹守朱子教人之法一時從遊之士甚衆著有周易本義拾遺周禮集傳春秋集傳近思錄集解通書解拾遺西銘解拾遺正蒙集解家禮拾遺恒齋全集乾隆三年賜入鄉賢祠郭焌善化人舉鄉試第一乾隆閒薦舉學行累官國子監助教為人孝友工詩古文著有羅洋草陳之駓攸縣人貢生穎博絶倫才名震一時陶排七安化人事父至孝父病狂投身資江中排七急援之遂同溺死時年甫十四也後尋得其屍猶兩手持父臂弗脱羅源漢長沙人乾隆進士官至工部尚書敡厯五十餘年寅清端恪工書翰得米南宮筆法一時推重羅典湘潭人乾隆進士官至鴻臚寺少卿督學四川進諸生勗以敦品力學士習文風為之一振主講嶽麓書院二十餘年出其門者皆知以學行自重特㫖紀錄年九十餘重赴鹿鳴著有五經管見數百卷陶之典寕鄉人由拔貢生考授中書父殁廬墓三年未嘗見齒著有冠松巖全集嶽麓志陶瓶子史錄彭思眷茶陵人父彥病篤籲天願減已算延親壽夢神許延三紀果符其數母殁廬墓有負債將鬻妻以償者適妻暴病窘欲自溺思春為代償之問姓名不以告子維新官兵部尚書時思眷年踰八十猶能燈下作小楷陶士僙寕鄉舉人初官崇仁令屢雪冤獄有神明稱値水災不俟報開倉發賑全活無算上知其才擢柳州知府甫三月丁母艱服闋授蘇松太道旋擢福建按察使有叛案株連甚衆士僙至卽日釋無辜七十餘人未一載洊厯閩藩司盡發吏胥諸姦弊豪猾皆斂手屏息以勞瘁卒於官士僙性精敏遇事一本樸誠故所至有聲唐煥善化人乾隆辛酉郷舉知平陰縣修學校繕城隍明慎折獄逾年邑大治調知昌邑縣築土為隄遏濰水之衝又設土牛植櫸柳為久固計民利賴焉著有尚書辨譌石嶺詩集等書黃立隆寕鄉人乾隆癸酉拔貢生初知鉅鹿縣後擢大名府時山東賊王倫擾臨清與府接壞立隆募鄉勇分屯團練賊不敢窺調知天津府値歲旱辦賑不冐不遺全沾無算以勞疾告歸卒子湘南諸生奉繼母章佳氏至孝鞭撻皆跪受年二十九卒張九鉞湘潭人乾隆壬午舉人知峽江縣旋調南豐南昌俱有政聲後因公降職游嵩洛閒詩文益雄奇渾古總督畢沅雅重之主昭潭講席游其門者多所成就著有陶園文集詩集等書行世李芳燝湘鄉人幼遭賊亂父母俱被掠芳燝棄家尋親至貴州營負父歸復求其母於寶慶鄉村得生還其兄弟三人俱殁於兵哭覓其屍以葬乾隆七年勅祀鄉賢入忠孝祠劉其淑攸縣歳貢生父病目幾盲其淑每夜泣禱北斗一夕方拜祝忽流星墜垣父目頓明乾隆初旌表建坊歐陽再思攸縣諸生事親能養志療孤字貧久而不倦乾隆初旌表建坊周碩勲寕郷人官潮州知府勸課農桑畱心民事勅祀鄉賢祠張九思善化人邃於經史性方嚴取與不苟陳夢元攸縣人乾隆進士授檢討明習掌故居官淡於進取同館諸城竇光鼐大興朱筠輩皆雅重之謝振定湘鄉人乾隆進士授編修轉御史巡視南漕糧艘人瓜儀阻風禱於神得濟因請建風神廟嗣是渡江者輙得順風京口人呼為謝公風嘉慶丙辰巡視東城有勢家奴乘車違制振定焚之被劾落職已未由特恩起為禮部主事應詔言事條陳甚悉賀德瀚寕鄉人乾隆鄉舉官山東知縣所至有聲最後署定陶値河南教匪倡亂闌人縣境戰不勝德瀚冠帶上堂厲聲罵賊死事聞贈知府銜給祭葬予雲騎尉世職祀昭忠祠余廷燦長沙人乾隆進士授檢討充三通館纂修尋以母老陳請歸養母卒啜粥寢苫值暴雨入倚廬地沮洳家人藉以片板麾去之廷燦學有原本於天文律厯勾股六書之學俱鈎元提要成一家言尤工古文著有存吾文集劉權之長沙人乾隆進士由編修洊官都御史丁未大挑各直省舉人權之奏派王大臣命下之日卽赴内閣部寺司員均令迴避不得持稿入閣畫諾並派科道以司紏察而吏胥無所售姦晉體仁閣大學士以原官致仕卒賜祭葬諡文恪張九鐔湘潭人乾隆進士授編修年已六十人以耆宿重之四十時喪偶不復娶亦不置妾居官日惟閉户著書晚年以子世浣知曲沃縣迎養官署著有笙雅堂文集行世鄧永亮長沙人乾隆間由千總隨征金川屢次捕賊功列頭等洊升廣東南雄協都司署增城營參將五十三年隨征安南奮勇撃賊力竭陣亡事聞議卹廕雲騎尉季光德善化人乾隆閒隨征金川累次殺賊受傷又隨剿臺灣有功由外委洊升鎮筸鎮標守備六十年隨征黔楚逆苗擊賊於鴉酉陣亡同時長沙人官千總宋開範官外委穆上得俱以追捕苗匪力戰陣亡事聞議卹均廕雲騎尉鍾名諒善化人嘉慶閒官撫標右營把總五年隨總兵明亮擊甘肅逆賊於烟燉集力戰殁於陣事聞議卹廕雲騎尉羅愈顯益陽人孝友肫摰曲體親心捐金給產為族叔延後歲饑積栗賑貧鄉黨賴以生活嘉慶十五年旌陶必銓安化人為諸生有名淹貫經史畱心經濟尤長於天文禮制樂律開方諸法學者稱為萸江先生少貧嘗拾薪摘茗荈易米以就學値儉歲躬操標梩畚鍤以瘞道殍篤於孝友父殁母李氏病危取糞嘗之以驗甘苦夜夢其父孝信謂曰爾母卽愈母自苦已而果然里有虎患為文牒土神虎尋去民居有祟乞文祭之亦無患人以比昌黎之驅鱷著有萸江詩存古文存等書嘉慶二十二年勅祀鄉賢祠流寓周屈原名平楚同姓也為懷王左徒上官大夫䜛而疏之頃襄王立令尹子蘭與上官大夫短原於王遷之江南於是作漁父諸篇以見志懷石自投汨羅以死湘中記屈潭之左有玉笥山屈平之放棲於此晉陶淡鄱陽人侃之孫於長沙臨湘山中結廬居之養一白鹿以自偶親故有候之者輙移渡㵎水莫得近之州舉秀才淡聞遂轉逃羅縣埤山中南北朝齊孫淡太原人居長沙事母孝母疾不眠食以差爲期母哀之後有疾不使知也豫章王領湘州辟驃騎行參軍建元三年蠲租税表門閣卒於家唐裴休濟源人乾符中由太子少保分司東郡厯荆南節度使因僑寓焉嘗講道益陽有白鹿啣花而聽過瀏陽霜華寺畱象笏鎮山門宋李植臨淮人秦檜當國凡帥府舊僚率皆屏黜植卽乞祠奉親寓居醴陵十有九年杜門不仕胡宏崇安人安國次子安國提舉湖南學事遂居衡山宏遊寕鄉而樂之築室講道其閒張栻綿竹人紹興閒隨父浚知潭州因寓城南後又築城南書院於妙高峯與朱子講學胡大履宏子與弟大時俱受業張栻之門而大時則其婿也世其家學大履兄弟俱嘗學於朱子大時又嘗學於陸九淵李安國洪都人悦安化山水靈奇卜築伊溪側隱居讀書自號梅山老人歐陽新吉州人寓居長沙聞宗人歐陽守道至往訪之初猶未識也晤語相契守道卽請於轉運副使呉子良禮新為嶽麓書院講書新講禮記天降時雨山川出雲一章守道起曰長沙自有仲齊吾何為至此仲齊新字也鄧得遇邛州人徙居湘鄉累官靖州知府元兵至得遇朝服南望拜辭書幅紙云宋室忠臣鄧氏孝子不忍偷生甘於溺死彭咸故居乃我潭府三閭大夫吾之儔侶優哉遊哉吾得其所竟自沈於水列女晉尹虞二女長沙人虞以始興太守起兵討杜􅋶戰敗二女為􅋶所獲並有國色􅋶將妻之女曰我父二千石終不能為賊婦有死而已弢並害之唐歐陽通母徐氏長沙人通少孤母教以父書懼其惰常遺錢使市父書通遂刻意橅放數年書亞於父號大小歐陽體宋張氏安化人嘉定閒遇賊蔡六脅以利刃欲汚之不從遇害胥氏三節婦長沙人胥偃子元衡有學行為尚書員外郎並其子茂諶俱早卒偃妻直史館刁約之妹與元衡婦韓茂諶婦謝寡居丹陽閨門有法江淮人稱之趙淮妾長沙人逸其姓氏德祐中從淮戍銀杏壩淮兵敗俱執至瓜洲元帥阿珠惡淮不肯招降李庭芝殺而棄其屍江濱妾俘一軍校帳下乃解衣中金遣其左右告之曰妾夙事趙運使今其死不葬妾誠不能忘情願因公言掩埋當終身事相公無憾矣軍校憐其言使數兵輿如江上妾聚薪焚淮骨置瓦缶中自抱持操小舟至急流仰天慟哭躍水而死阿珠舊作阿术今改正元歐陽原功母李氏瀏陽人原功幼𡵨嶷母親授孝經論語小學等書遂成大儒于同祖妻曹氏茶陵人父德夫教授湖湘閒同祖在諸生中因以女妻馬至正二十年茶陵陷曹氏聞婦女多被驅逐謂其夫及子曰我義不受辱顧舅年老汝等善事之遂自刎死妾李氏亦自刎劉頲妻段氏茶陵人至正末紅巾賊起破獲自沉於水賊救之大罵死之數日家人得其屍面如生焉明駱文吾妻車氏長沙人避兵山中被執逼告夫所匿處佯許諾引至油鋪橋投水死翌日面如生同縣黎天俊妻王氏蔡三逵妻趙氏同被執亦逼告夫所匿處二氏終不言俱遇害諸生謝三台妻王氏同姑嫂子女七人溺水死長沙女子崇禎末張獻忠陷城兵吏皆逃惟女子執戈登陴賊入持戈擊賊賊曰官兵失守汝一女子何能為女曰吾以愧天下之為男子者大罵以戈逐之遂遇害王醇宇妻郭氏善化人二十早寡崇禎十六年避兵山中與子以程相失俱被執郭投楓樹渡死以程至王家坪聞母溺亦赴水死後數日家人覓其屍母子攜手如生石麒妻周氏善化人年二十麒死左兵肆掠為所穫懼汚陽欣然就道行經龍洞潭忽振躍投水死文在中妻張氏湘潭人張獻忠之亂男婦共匿一山賊至疾驅諸婦下張獨抱一木大呼曰死卽死此耳移一步不得賊殺之唐世起妻歐陽氏湘潭人張獻忠之難世起及妻子俱為賊所得歐陽氏語世起曰汝與子逸去我自為計明旦賊詰之以實告怒而殺之其子覓至屍所閲一月面如生同縣諸生王載及妻闕氏被執夫婦皆不屈死唐吉㑹妻錢氏湘潭人張獻忠之亂吉㑹爲賊所執將刃之錢在山中急出賊縱其夫欲汚之錢大罵賊怒乃殺之胡士柱妻蔣氏湘隂人崇禎末兵寇相掠挈室逃竄猝被執士柱以蔣故逡廵不忍去被殺蔣奮身而前伏屍旁痛哭賊械繫之罵哭益厲賊怒殺之何敏遜妻潘氏湘陰人張獻忠搜山潘行絶壁下度不能免顧敏遜使速避行不數武潘以頭觸石死黃昌妻蔡氏寕鄉人昌死哀毁數絶父兄勸慰之不從一日自經死是日昌冢裂遂合葬焉楊才英妻胡氏寕鄉人爲左兵所執逼之解衣搶地大罵賊怒剖其腹死王某妻詹氏益陽人張獻忠之難被執行經絶壁奮身躍入深淵死何一蕃妻王氏益陽人張獻忠破城被執殺一蕃欲汚王氏王曰待瘞夫從汝瘞畢乃大罵赴水死廖某妻謝氏湘郷人崇禎末爲亂兵所俘求脱不得乃指懐中子紿軍校曰吾夫匿葦中吾以子付之當從汝去賊以爲然謝至河旁抱子投水死王用器妻羅氏安化人年二十二夫亡誓不再適有謀奪其節者斷一指以絶之張逵妻王氏安化人逵為流賊所執欲并執王乃以首飾投賊脱去俄報逵𬒳拷幾死曰夫死我生何為自沈池中死王道純妻譚氏茶陵人夫死自縊劉大煥妻彭氏茶陵人避亂黄塘夫婦俱被執彭厲聲曰殺夫不如殺我言未竟奪刃自刎賊大驚大煥因得免本朝郭凌雲妻王氏湘潭人値流賊肆掠據地罵不起遂遇害順治年閒旌譚伯生妻陳氏茶陵人遇流寇偪汚之奪刀自刎死順治年閒旌劉宗唐妻枊氏長沙人夫亡守節同縣節婦蕭楷妻趙氏甘士俊妻李氏均康熙年閒旌唐大年繼妻俞氏善化人夫亡守節康熙年閒旌唐公弼妻姜氏湘潭人夫亡守節同縣節婦呉士觀妻馬氏均康熙年閒旌黃士亨妻陳氏湘陰人夫亡守節同縣節婦易仁壽妻葛氏將之棻妻黄氏蔣效儒妻胡氏李象珠妻王氏均康熙年間旌黎復淳妻黄氏寕鄉人夫亡守節同縣節婦黄夢弼妻楊氏均康熙年閒旌汪天溥妻魯氏瀏陽人遇賊不汚遂受害同縣節婦尋諸妻首氏羅大恭妻彭氏蕭朝貢妻李氏魯元禄妻李氏周天遜妻王氏均康熙年閒旌廖登宸妻唐氏醴陵人夫亡守節同縣節婦文其蔚妻張氏均康熙年閒旌温逢光妻徐氏益陽人夫亡守節同縣節婦蕭明銓妻周氏熊超妻鄧氏均康熙年閒旌易道生妻鄧氏湘鄉人葬夫日土寇突至鄧持刀誓死賊義之弗犯而去同縣節婦王之藩妻賈氏張元輝妻章氏許國柱妻聶氏劉鉉生妻郭氏葛之光妻李氏均康熙年閒旌劉詢妻周氏攸縣人夫七守節同縣節婦陳六禮妻朱氏謝啟元妻李氏劉鐸妻蔡氏均康熙年閒旌柳同一妻金氏長沙人夫亡守節同縣節婦謝昌裔妻唐氏李枝芳妻黎氏楊有德妻蕭氏任可鳳妻楊氏黄自色妻王氏王枚吉妻某氏均雍正年閒旌劉學孔妻譚氏善化人大亡守節同縣節婦黄士珍妻劉氏鄧緯章妻陳氏均雍正年間旌陳鶴年妻何氏湘潭人夫亡守節同縣節婦賓諦命妻宋氏關問明妻魯氏馬尚乾妻程氏王又珣妻劉氏錢世瑞妻王氏何象鼎妻莫氏劉長祚妻鄭氏金振聲妻張氏張先發妻馬氏李軼羣妻姜氏媳張氏劉大堯妻羅氏宋紹妻李氏陳子睿妻朱氏均雍正年閒旌易廣生妻殷氏湘陰人廣生家甚貧父母旣受聘欲改盟殷吞一環誓自盡以救甦旣嫁而廣生卒父母又欲奪其志截髪毁容日哭於夫冡冡樹為枯同縣節婦黄日䢰妻周氏朱之辰妻王氏劉云鳳妻蕭氏戴而藻妻周氏蔣之蓉妻彭氏楊枝亨妻黄氏李天東妻周氏彭志怡妻文氏江啟賢妻胡氏曽啟文妻鍾氏黄道法妻蘇氏蔣之衮妻殷氏楊之拔妻蔣氏萬惠方妻傅氏向廷獻妻朱氏均雍正年閒旌黄光璉妻許氏寕鄉人夫亡守節同縣節婦裔坤妻黄氏陶顯永妻李氏黄煌妻喻氏均雍正年間旌羅文清妻朱氏醴陵人夫亡守節雍正年閒旌王德俊妻盛氏益陽人夫亡守節同縣節婦曹廷濬妻卜氏趙明昱妻劉氏曾德教妻歐陽氏曹耀祥妻曾氏魏耀祖妻劉氏莫簡䕃妻曹氏徐曰豫妻陳氏熊應台妾李氏徐曰復妻曹氏郭宏受妻張氏曹景衞妻劉氏丁苞邦妻何氏張晉毓妻聶氏夏逢唐妻徐氏熊輶妻郭氏均雍正年閒旌曹泰賢妻鄧氏湘鄉人夫亡守節同縣節婦歐陽象清妻王氏賀郊芳繼妻歐陽氏葛世堂妻張氏均雍正年閒旌羅蔚妻譚氏攸縣人夫亡守節同縣節婦劉大徳母周氏劉楚英妻謝氏夏茂秀妻褚氏劉成邦妻胡氏彭宏憲妻夏氏劉三烈妻譚氏劉誠妻胡氏文鼒妻賀氏均雍正年閒旌劉茂資妻譚氏茶陵人夫亡守節雍正年閒旌戴子質妻陳氏長沙人夫亡守節同縣節婦李生茂妻陳氏周正坎妻李氏陳元越妻朱氏侯天培妻劉氏張問仕妻王氏李斐文妻柳氏李年馥妻張氏劉之謨妻林氏張維周妻徐氏張臨周妻呉氏金玉輝妻程氏康自甯妻黄氏沈遠羔妻朱氏梁彰章妻柳氏舒從龍妻龔氏謝枝蕡妻蕭氏唐振文妻吕氏師元淳妻杜氏馮文合妾彭氏呉濂妻桂氏林月丹妻劉氏楊和春妻陳氏林之翺妻周氏劉大猷妻梁氏饒先培妻呉氏曹椿妻石氏宋桓楷妻黄氏宋昌祺妻鄧氏魏琭妻車氏劉正桂妻陳氏楊世妻周氏侯國學妻李氏譚逢