body:
  text: 松江府在江蘇省蘇州府東南一百六十里江寧府東南六百二十里東西距一百六十里南北距一百五十二里東至大海一百里西至蘇州府吳江縣界六十里南至大海七十二里北至蘇州府崑山縣界八十里東南至大海一百十里西南至浙江嘉興府嘉善縣界五十里東北至太倉州嘉定縣界一百十里西北至蘇州府長洲縣界一百里自府治至京師二千九百五十里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋吳地後屬越戰國屬楚秦屬會稽郡漢為會稽郡婁縣由拳海鹽三縣地後漢分屬吳郡晉及宋齊因之梁陳隋為崑山縣地唐天寶十載始析置華亭縣屬蘇州五代時吳越分屬秀州宋屬嘉興府元至元十四年始於縣置華亭府十五年改松江府屬嘉興路二十九年屬江浙行省泰定三年罷府天厯初復故府志元泰定中罷府仍屬嘉興路立都水庸田司於府治天厯元年罷司復為府明亦曰松江府直隸南京本朝屬江蘇省領縣七廳一華亭縣附郭治府東偏東西距八十七里南北距一百十六里東至奉賢縣界二十七里西至金山縣界六十里南至海八十里北至婁縣界三十六里東南至奉賢縣界九十里西南至金山縣界八十里東北至上海縣界五十四里西北至婁縣界一里漢會稽郡由拳海鹽婁三縣地後漢屬吳郡三國吳以後為嘉興海鹽婁三縣地梁以後兼為崑山縣地唐天寶十載始割嘉興海鹽崑山州三縣宋屬地置華嘉興府亭縣元至屬蘇州元十四五年代時吳越改為華亭府治屬十秀五年松為松江府治江府治本明朝仍因為之婁縣附距郭治十九府里西偏南北東距西二十里七南里東至至金山華縣亭縣界十界一二里里北西至至青青浦浦縣縣界界十十五八里東縣南界至四華亭縣十五里界一里東北至西上南至海縣浙江界五嘉十興府嘉四里西善北至青浦縣界二以後兼為崑山十七縣地里漢由拳唐以後為海鹽華亭婁縣三縣地地本梁朝順治華亭十三縣並年析治府置與郭下奉賢縣在府距七東九十一十里里東西南北距六十界四三里十四東里至南南至匯縣界華亭縣二十界四七十里五西里至華亭縣北至南匯縣界十四十里八里東北東南至南至匯海縣一里界二西十南四至里華西亭縣北至界六華亭縣本界朝七雍十二里本正三年析華置亭縣地屬松江府金山縣在十府南二里七東西距十西至浙里江南北距嘉興府六平十湖四縣里東界九至里華亭縣界一南至海一里里北至婁縣界六十三里東南至海二里西南至浙江平湖縣界九里東北至華亭縣界六十四里西北至婁縣界八十一里故小官鎮地明洪武十九年建金山衛本朝雍正三年改為縣屬松江府上海縣在府東北九十里東西距六十六里南北距八十四里東至川沙廳界三十里西至青浦縣界三十六里南至奉賢縣界七十二里北至太倉州寶山縣界十二里東南至南匯縣界八十里西南至華亭縣界三十六里東北至寶山縣界十八里西北至太倉州嘉定縣界三十六里漢海鹽婁二縣地梁以後為海鹽崑山二縣地唐宋為華亭縣地元至元二十九年析置上海縣屬松江府泰定三年屬嘉興路天厯元年復屬松江府明沿其舊本朝因之南匯縣在府東百二十里東西距八十三里南北距七十三里東至海二十三里西至上海縣界六十里南至奉賢縣界二十四里北至川沙廳界四十九里東南至海三十里西南至奉賢縣界八十四里東北至川沙廳界五十里西北至上海縣界七十里本上海縣地本朝雍正三年析置屬松江府青浦縣在府西北五十里東西距九十五里南北距八十二里東至上海縣界五十五里西至蘇州府吳江縣界四十里南至婁縣界四十里北至太倉州嘉定縣界四十二里東南至婁縣界七十二里西南至吳江縣界四十五里東北至嘉定縣界五十五里西北至蘇州府崑山縣界三十里漢婁縣地梁以後為崑山縣地唐以上海華亭二縣地明嘉靖二後為華亭縣地元為十一年析置青浦縣三十二年廢萬厯元年復置屬松江府本朝雍正三年析置福泉縣與青浦同治乾隆八年仍省入川沙廳在府東北一百二十里東西距三十里南北距二十八里東至海十二里西至南匯縣界十八里南至上海縣界一里北至上海縣界二十七里東南至南匯縣界半里西南至南匯縣界六里東北至太倉州實山縣界三十六里西北至上海縣界二十四里本朝乾隆八年裁福泉縣併入青浦嘉慶十年析上海南匯兩縣地置屬松冮府形勢水淖而清山孺而淨九域志負海枕江平疇沃野宋魏了翁學記佩帶江湖南瀕大海宋唐詢華亭十詠詩序府稱澤國以九峯勝通志風俗顧陸之裔居於華亭者最著故士奮於學民興於仁魏了翁學記儒官翼翼不異鄒魯元趙孟俯記勤耕織之勞務魚鹽之利府志城池松江府城周九里有奇門四濠廣十丈明初增築本朝康熙年間修乾隆三十八年重修華亭婁二縣附郭奉賢縣城舊為青村城周六里門四濠廣十丈本朝康熙二十二年修雍正三年置縣治乾隆四十年重修金山縣城舊治金山衛乾隆二十四年移治洙涇鎮城未建上海縣城周九里有奇門六濠廣六丈明嘉靖中築本朝康熙十九年修雍正九年乾隆四十年重修南匯縣城舊為南匯城周九里有奇門四濠廣十丈本朝康熙二十二年修雍正三年置縣治五年乾隆四十年重修青浦縣城周六里有奇門五濠廣三丈明萬厯初築川沙廳城周四里門四明嘉靖間築本朝康熙年間屢修乾隆三十七年嘉慶十年重修學校松江府學在南門內宋元豐七年建華亭學元改為府學本朝順治十六年屢加修葺康熙二十三年乾隆五十二年嘉慶五年重修入學額數二十五名華亭縣學在縣治西南元改建本朝順治十二年修康熙十九年乾隆三十三年嘉慶十年重修入學額數十六名舊額十三名雍正三年裁金山衛併入三名婁縣學與華亭縣同入學額數十六名舊額十三名雍正三年裁金山衛併入三名奉賢縣學在縣治東南本朝雍正四年置縣學附華亭乾隆二十六年始建四十九年修五十七年重修入學額數十三名舊額十二名雍正三年裁金山衛併入一名金山縣學即舊金山衛學本朝順治十五年修乾隆五十三年嘉慶十一年重修入學額數十三名舊額十二名雍正三年裁金山衛併入一名上海縣學在縣治東南元延祐元年建本朝順治康熙年間屢修乾隆四十六年嘉慶十三年重修入學額數十四名舊額十三名雍正三年裁金山衛併入一名南匯縣學在縣治東門內本朝雍正五年建乾隆三十六年修五十八年重修入學額數十五名舊額十二名雍正三年裁金山衛併入三名青浦縣學在縣治東南明萬厯初建本朝順治康熙年間屢修乾隆五十三年嘉慶八年重修入學額數二十五名雲間書院在府學後舊在城外本朝乾隆五十三年建嘉慶七年改建景賢書院在府治東南舊為唐宋忠良祠本朝嘉慶七年因其地改建書院并祠肇文書院在奉賢縣青村城內本朝嘉慶十年建文遊書院在奉賢縣南橋鎮南本朝嘉慶十年建敬業書院在上海縣治東北舊名申江書院本朝乾隆十三年建三十三年改建易今名嘉慶十七年修惠南書院在南匯縣學署東本朝乾登二十九年建四十九年修青溪書院在青浦縣城南本朝嘉慶元年建十八年修孔宅書院在青浦縣北舊有孔子廟宋因地立書院元至正間里人章弻修清忠書院在青浦縣青龍鎮西南本章夢賢義墩其子元澤請於朝以宋仁宗賜遠祖得象清忠二字易今名戶口原額人丁二十萬九千九百四今滋生男婦大小共二百六十三萬一千五百九十名口又鎮海衛併金山幫屯丁一萬四千二百八十一名口田賦田地四萬一百四頃九十九畝九分有奇額徵地丁正雜銀四十四萬一百三十七兩四錢二分八釐又雜辦銀一千四百一十七兩一錢五釐米四十二萬七千七百三十六石六升六合六勺又鎮海衛併金山幫屯田三百八十三頃七十畝九分有奇額徵丁糧銀五千八百六十七兩一錢三分七釐米四百一十二石八升三合六勺山川崑山在婁縣西北寰宇記華亭谷東二十里有崑山陸遜父祖墓在焉輿地紀勝在華亭縣西北二十三里長谷之東機雲兄弟皆有辭學人以為玉出崑岡故名府志山形圓秀而潤旁無附麗望之如覆盎然梁置崑山縣在此山之北後遷縣治於馬鞍山下俗遂指馬鞍為崑山而以此為小崑山按唐志華亭分嘉分崑山嘉興海鹽三縣地置又興縣置元和志於崑山縣注云云在蘇州東七十里梁置並未嘗言遷治也蓋今華亭婁縣之北及青浦之境本皆崑山縣地故遙取以為名耳府志謂崑山舊治在山北誤橫雲山在婁縣西北輿地紀勝本名橫山唐天寶六載改名頂有白龍洞山陽以采石缺然下通澱山湖府志在崑山東北成窪又東為小橫山與橫雲接隴而中介一水其東北壁立數仭人呼為小赤壁機山在婁縣西北府志在橫雲山後南北相望以晉陸機得名下有平原村亦以機為平原內史也按吳郡圖經崑山之北有機雲兩山雲山即橫雲也干山在婁縣西北機山劎於此故名又以東相傳干將曾鑄山形似馬名天馬山上志華有浮圖七級登覽者極江亭地岸海多平原大川其海之觀元山之聯絡楊維楨於三泖者十有三名於海內其一曰干將者九之者九甲也許山在金中金山縣山東東南海去乍浦金山所皆吳淞隔一三潮竹嶼山在金山達岸山縣在東竹南七十八里又嶼東南二里相望又去縣有蘇山西八十八里北洋山在金山羊山周縣東南海中一作七十餘里四圍環抱中有水一口可通如大湖凡巔有一池十八泉味嶴可容獨淡海數百艘惟北面艘往來取給於此海防考南自定海北自吳淞皆以洋山為扼要金山在金山縣南輿地紀勝在海中縣東南九十小金山里北亦在有寒穴泉縣東南海府志去海一中又有浮山潮之涉又有在金山西按出楊維沒於楨志雲海云淞之南之中即指有大金小此二山也金查山在金山縣張堰鎮南下臨大海東接華山人查玉成曾煉丹於亭縣此今界新有浴志相傳丹井秦山在金山縣張堰鎮相傳始皇曾西府志俗登此故名傳為秦望山一曰內有仙人洞甚深秦駐山邃又有坑産白堊俗名白善山柘山在金山縣北柘湖中湖巳涸山在平陸生柘樹因名茶山在上海縣東南大海中海防考在上海縣南蹌巡司界與浙江之海鹽定海海中諸山相聯絡相近有陳錢山陸寶山在青浦縣東南輿地紀勝在華亭北二十里本陸氏家山府志界鳳凰玉屏之間向列九峯之後以取土遂夷為平一地厙公山在青浦縣東南與陸寶隔溪相對昔有厙公隱此故名蘭笋山在青浦縣南舊名余山相傳有余氏居此故名新志其高與干山等東西二峯延互數里招提蘭若隱現其中望之穠郁深秀明陳繼儒施紹莘隱此土宜茶有泉名洗心甚清冽産笋香如蘭年聖祖仁皇帝南巡本朝康熙四十九賜名蘭笋薛山在青浦縣南蘭笋山東中隔一水下嘗掘地得石志曰玉屏又稱玉屏山下有羅池吳地記薛道約居此故名鍾賈山在青浦縣南府志在干山東一水左限沈涇塘與盧山對峙相傳以鍾賈二姓居此故名或以介九峯間故又名中介山盧山在青浦縣南府志在沈涇塘疑以盧姓得名頺然一邱參峙於干將鍾賈間下有水一泓清激如泉神山在青浦縣南一名秀林山又名細林山梁簡文帝神山銘序本名秀林山或稱辰山在華亭西北二十餘里僻在一方雖非巨麓而自古神仙往往託迹實震旦之靈阜也輿地紀勝細林山本名神山唐天寶六載改名府志在盧山之南中有仙椅峯屯雲峯錦濤峯礙雲石甘白泉諸勝澱山