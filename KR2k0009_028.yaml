十五萬口有奇禮部尚書于文傅有記胡存道諸暨人至正中為松江府學訓導苗兵亂將焚學舍存道叱賊曰吾與學存亡若即殺我我學不可燬也賊怒刃之遂罵賊而死何緝泰州人至正末知上海縣興學校勸農桑毁淫祠斥巫覡明刑正法勸善懲惡民俗以變明蕭九萬南昌人洪武間知華亭縣嘗書容忍思慮四字疏其義揭門屏聞以誨訟者疏陳民弊五事忤旨被逮臨刑齧指血録詩報母云微臣斬首丹心在尚有英魂返故鄉周繼瑜洪武末為松江同知燕師渡江瑜募兵勤王不克械至京磔於市本朝乾隆四十年豫諡烈愍侯端盱眙人永樂中授金山衛指揮同知十六年倭寇入犯端巷戰被重傷復招散卒進戰焚賊船十餘艘賊不得歸遂盡殲之黃子威進賢人永樂中知松江府居身廉潔治民有方歲大水躬履鄉邑賑救民忘其災以母憂去官宣德初已更三守民猶念之乞還任帝從之治行益著魏驥蕭山人永樂中授府學訓導督課精勤每夜分自攜茗粥勞問諸生感激自奮多成就王源龍巖人水樂中為松江同知奏捐積逋數十萬石平反冤獄時稱神明趙豫安肅人宣德中知松江府與民休息雖煢獨亦得諸府言情擇民謹厚者為吏訓以禮法每訟者至好言諭之曰明日來逾宿忿漸平止不來故有松江太守明日來之謡在職十年清靜如一日張楨正統中上海縣丞撫字有方民乞於巡撫周忱奏用為上海知縣政聲大著王衡稷山人成化中知松江府清嚴公正人不敢干以私止息嚚訟囹圄數空民運糧至瓜州淮安交兌者苦官軍摧剝有司不敢言衡疏其弊請就支於本倉且劾總兵官不戢軍士有旨約束而二運皆停中貴人以織造至松多所需索衡以法裁之皆斂手不敢肆興學校重經術賓禮賢俊諸生見者無長幼與之均禮在官七年清介如一日樊瑩常山人成化中知松江府前知府王衡廉明威惠瑩操行與之並而劑賦役祛姦蠧過之頌聲翕然聶豹永豐人正德中知華亭縣濬境內諸塘港民不苦水復業者三千餘戶鄭洛書莆田人嘉靖初知上海縣縣民善訟為擇鄉老以時勸行遜讓而懲其不率期年訟漸息設義冢社學社倉規制悉備尤善摘發姦伏一邑號為神明劉東陽四川人嘉靖中上海縣丞倭黨蕭顯來寇追擊之於太平寺衆潰走遇害方廉浙江新城人嘉靖中知松江府時數歲中倭連至增陴浚塹建歒樓為守禦計賊不獲逞上海故無城亟議築之賊猝至竟賴以全又立賞格募健兒俾自保聚遣客兵過半閭里婁然何繼之廣東人嘉背中知松江府時歲大祲繼之發賑平糶安集流亡全活者甚衆俞大猷泉州人嘉靖間為南直隸副總兵駐金山衛始至兵不滿三百乃權集河船土兵扼險守要明年海寇攻金山禦郤之旋將永順兵禦賊王家涇又以閩兵戰陸涇壩皆大捷柘林之賊遂空已復破賊於吳淞江三板沙茶山洋江南賊盡平許維新堂邑人萬厯間知松江府明敏廉幹政持大體風俗為之一變維新於兵獄錢殺無不通曉吏抱牘次第待署而已然深察民隱虛懷聽受未嘗簡忽與士大夫往還必訪政事得失閭閻疾苦秩滿父老設生位道旁供明鏡止水以送之彭長宜海鹽人崇禎中知上海縣時浙西民變巡撫遣乒戍川沙修怨者告捕益急長宜口民變非盜賊比有司治之足矣遂撤兵分别昭雪獲免者甚衆民逋賦多畏鞭北恆賄吏祈免而賦益不登長宜第省其羡入勸諭速輸勿豫杖民間感悅賦入倍他日方嶽貢穀城人崇禎時知松江府海濱多盜獲輒杖殺之東南臨大海海水時齧土為禾患易以石隄二十里遂為永利郡漕數十萬石而諸倉乃去城五里為築城護之凡救荒助役繕城課士咸有成績舉卓異者數以督賦不如額十四年不得調嶽貢安之士民亦惟恐其去麥而炫高明人崇禎間知上海縣歲旱率吏民步禱有龍見於龍華雨立至明年春麥秀兩歧有虎暴旋即遁去坐事免百姓罷市詣臺乞留而炫固辭始聽去繪圖四以紀德政龍見甘雨歧麥虎渡河也眭明永丹陽人崇禎中華亭教諭大兵下松江明永題詩明倫堂投繯死本朝楊之易應山人順治二年任松江同知提督吳勝兆謀逆之易不從被殺之易楊漣子也康熙年間奉旨贈恤傅世烈奉天人順治三年知松江府值吳易遣其黨窺松江西倉城率兵往襲之擒獲多名以功遷徽寧道未行時吳勝兆叛養死士困鬬甚力世烈冒鋒刃直前衆披靡盡殺賊黨擒勝兆以身受重創逾時卒事聞加贈恤廕閻紹慶魯山人順治六年知上海縣屏斥姦宄徵輸有法每大寒暑不笞一人而賦自辦十二年海寇犯境鎮辨王璟誣縣民通寇紹慶詣臺使力保之全活甚衆有海邦讞略一百六十條李復興濱州人康熙三年知婁縣郡民舊苦里役逃亡相屬復興立均田均役法悉罷年首甲首諸名知府張羽明請於巡撫韓世琦使松郡諸屬皆用其法郡人為祠祀之白龍潭上任辰旦蕭山人康熙六年知上海縣敏於聽斷修吳淞閘十月而工成民不病役上海沒水田六十餘畝賦額未除輸者輒破家前官屢勘不得實辰旦曰往來泥沙中按册釐其荒者籍上得減除額徵有差史彬天津人康熙十六年知婁縣時均田均役初行籍以中飽者頗言未便賴彬力持其説事乃定在婁三載省刑恤訟崇文教勤賑恤禁火耗革濫差民愛之如父母有一輪明月萬里清風之頌張庚惠來人康熙二十七年知青浦縣修學宫復尊經閣縣多姦吏庚繩以法使不得逞民間疾苦無隱不達年餘罷去民攀留者填塞城闉不得出乃築惠來書院居之俞兆嶽海寧人雍正元年除松江同知免浮糧築海塘土易以石巡撫李衛查勘海塘疏言惟俞兆嶽所築工程合式十年秋颶風海溢松江新塘無害周中鋐山陰人知華亭縣政簡而不弛刑協而不煩雍正二年邑被水災力請賑濟多所蘇全四年知松江府會濬吳淞江於劉家河築堰地近海洪流雄悍薪楗難施堰未成舟覆沒於水事聞贈太僕卿賜祭葬欽連長興人雍正三年知南匯縣時縣新設事皆創始連規畫井然廉明強幹愛民如子再任再罷縣人至今尸祝之戴仁行濟寧人雍正十三年知福泉縣性和而介遇事裁決必親不假手幕僚胥吏一切徴賦隨其物力之便完及限額而止民無差擾輸納踊躍乾隆六七兩年奏銷十分全完通省所未有也周隆謙天津人乾隆十六年知青浦縣首建義孰加惠童蒙民有不馴者喻以理無不洗心革面徵漕無勺合贏躬親較視胥吏不得緣以為姦在任三年謳歌載道調任去百姓如失慈父母焉許治雲夢人乾隆二十二年知華亭縣自奉儉約徵漕無絲毫沾潤尤講求水利田資灌溉民甚德之龎作棟江西人乾隆二十二年知金山縣綜核名實不濫不苛錢糧出納尤能潔已奉公制府尹繼善條陳漕政有倣照龎今收漕之語總纂官臣王廣蔭恭纂輯前提調官臣張日章恭覆輯校對官臣賀式韓恭校恭覆校大清一統志松江府三人物三國吳陸遜吳郡人始仕幕府厯右護軍鎮西將軍封婁侯昭烈帝率大衆向西界權命遜為大都督破其四十餘營改封江陵侯諸葛亮秉政與權連和時事所宜權輒令遜語亮並刻權印以置遜所赤烏七年為丞相疏陳太子正統魯王藩臣當使寵秩有差彼此得所上下相安權責讓遜憤恚卒陸瑁遜弟好學篤義公車徴拜議郎選曹尚書孫權欲親征公孫淵瑁上疏諌權嘉其詞理端切遂不行陸凱遜族子赤烏中除儋耳太守討朱崖有功遷建武校尉討山賊克捷纍拜征北將軍領豫州牧孫晧寶鼎初遷左丞相時政事多謬凱上書諫義形於色表疏皆指事不飾忠懇內發陸允凱弟為尚書選曹郎太子和聞其名待以殊禮會魯王霸與和分爭隂相譖搆允坐收下獄楚毒備至終無他辭赤烏十一年交部騷動以允為刺史安南校尉喻以恩信務崇招納渠黨出降交城清泰徴為西陵都督封都亭侯陸抗遜子拜建武校尉建衡二年都督信陵西陵諸軍事聞都下政令多闕數上言陳事宜破西陵誅步闡貌無矜色得將士歡心拜大司馬荆州牧卒晉陸機抗子少有異才文章冠世慨吳之亡乃著辨亡論二篇太康末與弟雲俱入洛張華見之曰伐吳之役利獲二俊纍遷太子洗馬著作郎厯中書郎時齊王冏矜功自伐機作豪士賦以刺成都王穎表機為平原內史假後將軍軍敗穎怒收殺之所著文章二百餘篇行於世陸雲機弟性情正有才理與兄齊名號二陸為浚儀令一縣稱其神明厯中書侍郎成都王穎表為清河內史兄機敗並收殺雲所著文章三百四十九篇又撰新書十篇並行於世陸喜瑁子機從父兄少有聲名好學著書百篇又作西州清論傳於世宋衛膚敏華亭人宣和進士纍官祕書省校書郎命假給事中使金既至知金兵已舉不為屈斡喇布遣人約相見欲使之拜膚敏曰兩國之臣相見而用君臣禮是北朝一國而兩君也長揖而人以語折之為所留靖康初始還高宗時遷衛尉少卿建議山東淮南諸路徙民入城為清野計命大臣留守汴京車駕早幸江寧帝頗納之遷中書舍人凡命令不合公議者率封還之纍遷禮部侍郎卒斡喇布舊作斡離不今改正儲泳華亭人居周浦有詩名精陰陽五行通儒元理著有祛疑説弟溒亦以詩名柳約華亭人大觀進士深於經學大為儒者師慕靖康初權殿中侍御史論三鎮不可棄高宗時金人大入列郡震恐莫有奔問官守者約於橫潰中屹保孤城悉力捍禦擢權戶部侍郎未幾以敷文閣待制食祠祿卒約天性至孝母病泣禱於天願損已壽以益親母尋愈曹應符華亭人謹身飭行為鄉里推重咸淳中登進士授衢州司户參軍會宋亡遂隱不仕族人光遠以進士辟監華豐莊改軍器監簿宋亡亦不仕云謝國光華亭人宋亡不仕元治書侍郎程巨夫奉詔使江南搜訪遺賢以國光薦杜門稱疾堅辭不赴棲隱終身衛富益華亭人宋亡設壇祭文陸死事諸人詞極悲愴隱居教授不應有司之薦後攜子避地霅上卒年九十有六元任仁發華亭人世居青龍年十八舉於鄉元兵南下主帥見而器之委招安海島引為青龍水陸巡警官纍遷二都水監凡水議皆仁發主之任守宰具奏政績後以浙東道宣慰副使致仕著有水利書十卷行世周之翰華亭人幼穎悟博究羣書尤通象數之學有乾坤闔闢天地生成陰陽變化山川流峙四圖并贊以發明其奧講授於鄉以終陸居仁華亭人泰定中舉於鄉工詩古文與楊維楨錢維善遊殁同葬干山號三高士墓湯文英華亭人世篤孝友八世同居至元間表其閭復其家姚玭華亭人至正中奉母避亂屢瀕於危及母遇疾暮夜思食魚無從得家養一烏甚馴優玭諭以意即飛去攫一魚至人咸稱異行省聞而辟之以親老不就徐初華亭人早喪母父信後母讒初事之益謹父悟曰汝吾孝子也後母子長不事事𥘉愛之不衰至正中浙右警初糾率鄉勇數千禦寇或誣其有異志縛送泖上軍初厲聲曰我欲反率斥鹵氓蹈海去矣尚能戴我頭見將軍乎將軍欲率土有民必歸諸正天下烏有自首賊也帥壯其言釋之薦以官卒不赴彭汝器上海人博學有史材嘗評宋史謂杜后遺命立太宗與宋宣公舍與夷而立穆公同為貽亂於後太宗問傳代之事趙普知為太宗謀而不知為太祖謀欺天之罪不可逭神宗將崩宣仁后預製小黃𫀆以備倉卒立哲宗稱宋賢后當以宣仁為首餘悉類此曾遇華亭人博學敏文辭尤邃七書工筆札以薦授安吉縣丞致仕與王昭大詹潤徐順孫同遊齊譽時稱雲間四俊吕良佐上海人好學有才氣與楊維楨陸居仁遊嘗為應奎文會至正兵起總帥欲板為華亭尹辭請以白衣議事帥賢之因俾自集白甲保障鄉里全活者千餘家明沈德四華亭人祖母病割股肉療之即愈已而祖父病又割股以進亦愈洪武中旌表何廣上海人洪武中以明經知任邱縣卓有惠政升江西僉事再升湖廣參議所至皆著能聲嘗著律解辨疑法家宗之袁凱華亭人博學有才辨洪武間薦授御史武臣恃功驕恣凱上言請於都督府延通經學古之士令諸武臣於都堂聽講或罹過誤宜加矜恕帝納其言凱工詩有盛名嘗在楊維楨座賦白燕擅場人稱之為袁白燕陸宗善華亭人洪武中以實學高行舉於鄉再令劇邑所至有惠政善為詩流麗雄偉而不忘歸正書法亦清徑子顧言顧行並有詩名沈度華亭人成祖初詔部簡能書者入翰林度與其選凡金版玉册用之朝廷藏祕府頒屬國必命度書遂由翰林典籍纍遷侍講學士弟粲亦以工書為中書舍人擢侍講終太常少卿兄弟並篤孝友為士林所重管訥華亭人工詩能文有蚓竅集評者謂與袁景文並駕夏衡華亭人永樂中纍官至太常卿成祖北征宣宗討武定州皆預扈從衡蒞事內閣最久謙厚縝密未嘗泄禁中語廉靜寡欲公退閉門獨坐泊如也衛青華亭人由薊州百戶改山東備倭永樂十八年蒲臺妖婦唐賽兒作亂青方屯海上率千騎晝夜馳至城下大敗之帝聞賜書勞青擢山東指揮使英宗立進都督僉事青有孝行善撫士卒居海上十餘載海濱人請於朝立祠祀焉葉宗人華亭人永樂中知錢塘縣縣為浙江省會徭重豪猾有力往往搆黠吏得財役貧宗人令民自占甲乙書於策以次簽役按察使周新嘗潛入其室見厨中惟魚臘一裹歎息去明日召宗人共食飲至醉用儀仗導之歸時呼為錢塘一葉清黃翰華亭人永樂進士授江西按察僉事升參議改參廣東厯山東按察使罷歸卒翰為人豪俊多權略嘗聽政都察院有疑獄一問即決居官所至能舉職江西人以左道或衆廣東畜蠱毒採生殺人皆捕誅之俗為一變其為文豪健敏捷未嘗起草字畫亦道徑行草題署得名錢溥華亭人正統進士試薔薇露詩稱旨授檢討厯南京吏部尚書致仕卒諡文通溥少有文名既擢第聲譽勃起嘗與楊一清論學一清韙之又與巡撫周忱論便民條約復移書當事論積荒召佃煎鹽水次倉四事多見施行弟博亦有文名夏寅華亭人力學工詩正統進士纍官南京吏部郎中成化初考滿入都上陳時政多議行厯浙江右參政處州民有苦虐政走聚山谷者曰須夏公來乃歸寅檄至果散終山東右布政使寅清直無黨援嘗語人曰君子有三可惜此生不學一可惜此日聞過二可惜此身一敗三可惜世傳為名言張説華亭人天順進士厯刑部員外郎成化中督浙江學政力拒請託校士有聲孝宗立纍官吏部侍郎嘗兩攝選事衆稱公允遷南京右都御史就改吏兵二部尚書以年老乞休卒贈太子太保諡莊簡唐珣華亭人天順進士知合州屢遷福州知府厯順天府尹善治劇豪強戢服再擢右都御史總督兩廣軍務討平江盜賜敕嘉勞卒於鎮廣人思之不衰張祚華亭人景泰進士授御史遷廣東按察僉事廉慎精密嶺表信服之會韓雍討蠻寇以祚有才識檄使從征大破靈山縣及高廉二州諸賊祚雖用兵不樂以武節見新興新會民多通盜東莞土豪倡亂皆解散之誅首惡而已擢河南副使致仕歸王霽上海人成化進士知黃州府民愛戴秩滿賜誥旌異宏治初為太僕卿以馬政廢弛奏行士事宿弊悉釐畿輔山東河南逋課馬至萬餘匹請令折價公私便之用薦巡撫山東益有聲終大理寺卿張弼華亭人成化進士知南安府毁淫祠建社學士民為立祠弼善詩文工草書張東海之名流播外裔有鶴城東海渚稿曹時中華亭人成化進士授刑部主事厯雲南僉事單車之官以治行聞宏治中遷浙江副使屏絶苞苴威令大行為人端謹和易至析義理臨事機權衡可否確然不能易工詩及書遭喪廬墓有芝産焉都御史林俊嘗舉以自代錢福華亭人宏治庚戌試禮部廷對皆第一授修撰詩文藻麗敏妙登第後名聲烜赫逺近以箋版乞題者無虛日顧清華亭人宏治時鄉試第一成進士授編修正德初劉瑾柄政清獨不與通出為南京兵部員外郎瑾誅纍擢禮部右侍郎與尚書毛澄請建儲宫罷巡幸疏凡數十上嘉靖初以南京禮部侍郎進尚書致仕卒諡文僖張鳴鳳上海人宏治進士正德𥘉官御史劾大僚張元貞等六人復與同官葛浩等疏留劉健謝遷諫用劉瑾馬永成等下詔獄豫杖削籍後起湖廣僉事進副使鳴鳳初令永康有政績在湖湘治復最以母憂歸卒陸深上海人宏治進士改庶吉士授編修世宗時進詹事掌翰林院卒諡文𥙿深少與徐禎卿相磨切為文章有名工書博雅為詞臣冠曹閔上海人知沙縣事被徵民號泣攀留纍日不得去官御史與張鳴鳳等同得罪後當起官以養母不出母終枕塊得寒疾死張宏至弼子宏治丙辰進士授刑科給事中十二年陳初政漸不克終八事皆切時弊時親王之國所次舍悉多耗費宏至力言之為稍裁損孝宗晚年從廷臣請遣官核騰驤四衛虛冒弊尋中止宏至抗章爭卒核之武宗立以戶科右給事中奉使安南還遷都給事中卒潘恩上海人嘉靖進士知鈞州有聲厯撫河南著威惠纍擢刑部尚書左都御史列上振憲紀四事時嚴嵩柄國恩禮法自持嵩不能撓尋以年老致仕恩有器量其為外吏竿牘不達京師立朝能守正萬厯初賜存問卒贈太子少保諡恭定子允哲允端皆進士董傳策華亭人嘉靖進士除刑部主事三十七年疏嚴嵩稔惡誤國六罪下獄問主使拷掠慘毒再絶復蘇會地震得宥謫戍南寧穆宗立召復故官隆慶中纍遷南京大理鄉進禮工二部侍郎馮恩華亭人嘉靖進士除行人學於王守仁擢南京御史極論大學士張孚敬方獻夫右都御史汪鋐姦狀帝大怒詔下獄論死及朝審鋐已為冢宰主筆東向坐令拽恩使向西跪恩起立不屈且罵鋐厯數其罪觀者皆曰是御史非但口如鐵其膝其膽其骨皆鐵也因稱四鐵御史長子行可時年十三刺血上書請代父死帝覽疏感動乃得戍雷州越六年遇赦還穆宗初即家拜大理寺丞致仕行可後舉於鄉厯官有善政徐階華亭人嘉靖進士授編修厯禮部尚書東閣大學士時嚴嵩為首輔深嫉之階智足相馭嵩不能圖嘗密疏發仇鸞罪狀鸞坐得罪嵩以楊繼盛疏引二王欲竟其獄以階言遂止外事嵩甚謹內深自結於帝卒逐嵩乃盡反嵩行事屏絶苞苴收召人望優假言官嘉隆之政多所匡救其保全裕王止帝幸顯陵功尤大帝崩迎立裕王密具遺詔盡起大禮大獄言事諸臣纍官吏部尚書建極殿大學士尋與高拱不協去位卒贈太師諡文貞元孫念祖以諸生授中書乙酉松江破與妻張氏妾陸氏李氏皆自溢死本朝乾隆四十一年賜諡節愍陸樹聲華亭人嘉靖中會試第一改庶吉士授編修厯太常卿掌南京祭酒事整飭學規著條教十二以勵諸生神宗初纍拜禮部尚書迤北要增歲幣兵部將許之樹聲力爭卒不能奪萬厯中陳時政十事語多切時弊樹聲端介恬雅難進易退通籍六十餘年居官未及一紀卒贈太子太保諡文定弟樹德嘉靖進士砥行飭檢名德亞於兄子彥章萬厯進士官南京刑部侍郎以節概聞楊允繩華亭人嘉靖進士授兵科給事中劾兵部尚書趙廷瑞舉動乖違廷瑞遂奪職時倭患日棘胡宗憲趙文華方督兵與嚴嵩深相結大肆貪黷允繩極論其弊未幾巡視光祿劾丞胡膏偽增物直膏窘誣允繩誹謗齋醮下獄廷杖竟棄市穆宗立贈光祿少卿天啓初諡忠恪周思兼華亭人嘉靖進士知平度州舉治行第一當遷州人走闕請復留一年擢工部員外郎進郎中出為湖廣僉事岷府宗室將軍殺人思兼廉得其姦狀縛姦黨悉繫獄乃列其罪奏聞以艱歸不復出卒王圻青浦人嘉靖進士授清江令擢御史忤時相謫外厯遷陜西參議致仕歸築室松江之濱種梅萬樹曰梅花源以著書為事有續文獻通考三才圖繪諸書行世人皆服其博洽龔愷華亭人嘉靖進士官御史馬市開命尚書史道主之道徇俺答請以粟豆易牛羊愷劾道委靡遷就世宗杖愷八十既杖官如故尋列靖江王驕恣狀疏止大征粵寇終湖廣副使莫如忠華亭人嘉靖進士纍官浙江布政使潔修自好夏言死西市門下士咸避匿如忠治其喪時論多之善草書詩文有體要子是龍十嵗能文皇甫汸王世貞亟稱之尤工書法包節先世嘉興人其父始遷華亭節生五歲而孤母躬教育之舉嘉靖進士纍官御史劾兵部尚書張瓚貪穢出按雲南以疾歸起故官再按湖廣顯陵守備中官廖斌擅威福節欲繩之語先泄為斌所陷逮詣詔獄榜掠永戍莊浪衛節念母不克終養日飲泣病死弟孝後節三年舉進士纍官御史與兄節分居南北臺並著風采又皆有至性時並稱其孝喬鏜上海人國子生下筆有奇氣嘗遠遊心動馳歸則父正以思子病見之喜而愈島夷內寇鏜首發練土兵議幕府奇之又為畫便計塞川沙口濬海塘外壕次第行之出戰皆捷滅倭之功實始於此既上功將不次需用竟以謗讟故恚恨卒鄉人思其功建仰德祠祀之子木十歲能文十三為諸生倭入寇父鏜奉橔練鄉兵士大夫皆守陴賊衆擁東人皆東守木堅西備賊果夜渡西濠梯入陴發炮殪者甚衆隆慶中成進士知安吉洲罷貢粟勾股其田區别高下豪右斂手遷潞安同知河南僉事井陘兵備所至有異政會失直指意謝病不出徐獻忠華亭人由鄉舉知奉化縣居二年罷歸愛吳興山水逐徙居焉時棹小艇扣舷吟弄以天隨元真自况初工時文後肆力於九經作春秋稽傳録洪範或問大易心印四書本義及三江水利考山房九笈樂府原唐詩品凡數百卷為人孝友內外淳備自著述外無他嗜好工真草書卒友人王世貞輩私諡之曰文惠何良俊華亭人少篤學二十年不下樓與弟良傳並負俊才當路知其名以歲貢特授翰林院孔目久之意不樂嘆曰吾有清森閣在海上藏書四萬卷名畫百籖乃棄此而僕僕牛馬走乎遂移疾歸良傅官禮部郎中徐億華亭人親喪廬墓墓距家四里每祭祀還家未嘗入內暮仍宿廬中喪既除猶不食鹽酪不括髮者十年垂老入市市人聚觀有邀至家令子孫識之曰此徐孝子也嘉靖中賜旌唐汝詢華亭人五歲失明日端坐聽諸兄占畢因通諸經子史百家及稗官野乘皆以耳受善屬文尤工詩箋注唐詩援據精博人咸稱服有編篷姑蔑二集唐文獻華亭人萬厯殿試第一自修撰厯詹事既爭郭正域事遂失政府意尋拜禮部右侍郎掌翰林院事初文獻出趙用賢門以名節相矜許同年生給事中李沂劾張鯨𬒳廷杖文獻掖之出資給其湯藥掌翰林日當考察執政欲庇一人執不許卒贈禮部尚書諡文恪吳炯華亭人萬厯進士厯兵部主事性恬淡居家十二年始起故官久之進光祿丞顧憲成講學東林書院為御史徐兆魁醜詆炯為奏辨詞婉事析黨人亦莫能難兩捐萬金佐軍餉家無贏資官終太僕寺卿徐三重青浦人萬厯進士授刑部主事時張居正當國政尚嚴三重獨持平為尚書嚴清所器令總諸司奏章益矜恕有聲三年謝病歸學者稱為鴻州先生其學以考亭為宗自壯至老編摩未嘗釋手士大夫語家法者率推徐氏為第一所著有庸齋日記信古餘論徐氏家則諸書子貞稷舉進士官四川副使亦以清節聞葉有聲上海人萬厯進士由知縣擢禮科給事中疏劾魏忠賢削籍崇禎初復官終副都御史董其昌華亭人父漢儒有學行其昌舉萬厯進士改庶吉士授編修皇長子出閣充講官坐失執政意出為湖廣副使移疾歸起故官督湖廣學政不徇情囑為勢家所怨謝事歸光宗立召為太常少卿天啓二年擢本寺卿時修神宗實録命往南方採輯章疏及遺事其昌廣搜博徵録成三百本書成表進有詔褒美擢禮部右侍郎尋轉左拜南京禮部尚書閹豎用事其昌深自引遠踰年請告歸詔加太子太保致仕卒贈太子太傅福王時諡文敏其昌天才俊逸少負重名魏璫薰轑衣冠奄人請書翰者一切謝絶然不激不隨故得免於黨人之禍書法超越諸家獨探神妙其畫集宋元諸家之長四方金石刻得其制作手書以為二絶人擬之米芾趙孟俯云夏嘉遇華亭人萬厯進士授保定推官用治行徵當擢諫職為齊楚浙三黨所沮授禮部主事會遼東喪事嘉遇劾閣臣方從哲兵部趙興邦受賕墮邊未報而興邦遷秩嘉遇益憤屢疏劾之興邦卒引去光宗立嘉遇遷考功員外郎佐趙南星秉公銓注左光斗魏大中皆善之及南星去位左魏獄興嘉遇亦被逮憤恨發病卒崇禎𥘉贈太常少卿許譽卿華亭人萬厯進士由金華推官授給事中楊漣劾魏忠賢譽卿抗疏繼之又論救趙南星高攀龍坐鐫秩歸崇禎初起兵科給事中鳳陽陷譽卿痛憤劾樞輔誤國屢疏攻溫體仁皆不見用吏部尚書謝升希體仁意出之南京尋削籍福王時起光祿卿辭不赴錢龍錫華亭人萬厯進士纍官吏部右侍郎天啓時忤魏忠賢削其籍崇禎初起禮部尚書兼東閣大學士加太子太保初御史高捷史􅒇罷王永光力引之頗為龍錫所扼二人大恨及袁崇煥殺毛文龍捷遂上疏言文龍之死龍錫實主之􅒇復繼言之遂逮戍定海衛福王時始復官還里徐光啓上海人萬厯進士改庶吉士厯贊善從西洋人利瑪竇學天文厯算火器盡其術遂偏習兵機屯田鹽策水利諸書遼東四路師敗京師震動纍疏請練兵自效神宗壯之超擢少詹事兼河南道御史練兵通州天啓中遼陽破請多鑄西洋大炮資城守帝善其言旋擢禮部右侍郎為閹黨所黜崇禎初召還復申練兵屯鹽之説擢禮部尚書監督西洋人纂厯書數百卷以本官兼東閣大學士卒纍贈太保諡文定詔進其所著農政全書喬一琦上海人萬厯武舉四十七年以遊擊監朝解兵出寬甸道與劉綎並禦大兵於阿布達哩岡軍敗投滴水崖死贈都督同知本朝乾隆四十一年賜諡忠烈孫士美上海人以舉人授舒城教諭崇禎八年流寇犯舒城士美代縣令堅守城獲全擢知深州崇禎十一年大兵至力守三日城破自刎父訥同時自縊一家死者十三人本朝乾隆四十一年士美賜諡烈愍訥祀忠義祠同縣瞿騫知滕縣崇禎十五年隆四十一年大兵破城死之乾賜諡烈愍張錫眉上海人崇禎舉人甲申闖變命妻黃氏及妾女俱赴水死遍身自書姓名而縊本朝乾隆四十一年入祀忠義祠施大經上海人萬厯舉人通判瑞州璫議採木大經抗言曰開採名為利其實厲民民迫為盜貴人能撲滅乎璫語塞遂止監郡多惠政既引疾歸起惠州通判轉崇府審理正歸著澤谷農書若干卷子沛天啓初以貢授河南通判會出師給素𫀆士譁兵備楊嗣昌以屬沛使易五色一夕而具師遂發轉南康同知不赴嗣昌督師致書邀之亦不應溥崇禎間以貢授永清衛經厯遷知樂亭縣未赴闖賊破京師溥嘆曰父兄皆荷國思我豈可失臣節仰藥死本朝乾隆四十一年賜諡節愍陳繼儒華亭人少與董其昌齊名工詩善畫重然諾饒智勇王錫爵王世貞雅重之名動一時四方縉紳及山人遊客過從無虛日下至野店僧寮悉懸其畫像崇禎中公卿交薦屢奉詔徵用不赴年八十餘卒衛時春華亭人新城伯穎元孫嗣爵崇禎時掌後府京師陷時春懷鐵券閣門十七人皆赴井死王鍾彥華亭人崇禎時工部員外郎闖賊至守彰義門燈燎守將韓某開門納賊被執不屈死本朝乾隆四十一年賜諡烈愍宋天顯華亭人崇禎中內閣中書舍人京城陷為賊所執逼書偽詔罵賊觸階死本朝乾隆四十一年賜諡烈愍沈猶龍華亭人萬厯進士由知縣擢御史纍官都御史總督兩廣平海寇乙酉守城被執不屈死本朝乾隆四十一年賜諡忠烈李世祺青浦人天啓進士授行人崇禎三年擢刑科給事中疏劾大學士溫體仁吳宗達并劾兵部尚書張鳳儀溺職狀帝怒貶福建按察司檢校久之起行人司副屢遷太僕寺卿明亡杜門不出卒李待問華亭人崇禎進士授中書舍人工文章南京破被執不屈死本朝乾隆四十一年賜諡忠烈吳嘉印華亭人天啓舉人厯官戶部主事南京破時方奉使出城聞變亟還謁方孝孺祠從容投繯死一年本朝乾隆四十賜諡節愍陳子龍華亭人生有異才工舉子業兼治詩賦古文崇禎十年舉進士選紹興推官東陽諸生許都反旬日間聚衆數萬巡按御史左光先命子龍為監軍討平之以功擢兵科給事中福王立上江防之策知時事不可為遂乞歸後數年坐事死嘗輯名臣疏議曰經世文編行於世本朝乾隆四十一年賜專諡忠裕夏允彝華亭人弱冠舉於鄉好古博學崇禎十年與陳子龍同舉進士知長樂縣善決疑獄吏部尚書鄭三俊舉天下廉能知縣七人以允彝為首被薦入都未及用而北都陷南還南都失守賦絶命詞赴水死本朝乾隆四十一年賜諡忠烈子完淳七歲能詩文以子龍獄連及逮下吏談笑自如臨刑色不變本朝乾隆四十一年賜諡節愍兄之旭亦縊死文廟同縣舉人徐孚遠生員戴浤以松江破赴水死上海諸生馬元調僑居嘉定城破死之本朝乾隆四十一年俱豫入忠義祠章曠華亭人崇禎進士知沔陽州擢按察使僉事監武漢軍張獻忠破武昌曠崎嶇軍伍調畫有方以功纍加兵部尚書卒於行間張肯堂華亭人天啓進士知濬縣弭盜安民聲績甚著入為御史纍遷右僉都御史巡撫福建與鄭芝龍擁立唐王兵敗衣冠南向坐視其四妾一媳一女孫先縊死乃自縊本朝乾隆四十一年賜諡忠穆包爾庚上海人崇禎進士知羅定州鎮兵譁守道被圍爾庚單騎馳諭皆下馬羅拜一州獲靖猺蠻跳梁總督率師剿捕弗戢爾庚開誠布公許其自新渠魁感激來歸擢兵科給事中以母老乞歸養本朝順治初舉山林隱逸徴聘不起何剛上海人英敏負才略崇禎中舉於鄉十七年入都陳選練滅賊諸䇿擢職方主事募兵金華都城陷還鄉先是陳子龍夏允彝將聨絡海舟直達天津捐資召募得二千人訓練以待至是福王命剛統之進本司員外郎從史可法守揚州城破投井死本朝乾隆四十一年賜諡忠節侯承祖上海人崇禎末以衛指揮署南匯所印政教嚴飭立囤法以絶飛灑吏不敢欺擢參將大兵至令軍士守城自率兵出禦城破力竭與長子世祿俱被執就戮本朝乾隆四十一年賜承祖諡忠烈世祿入忠義祠王域華亭人崇禎時官江西按察使副使管建昌府事大兵破建昌械至武昌被戮本朝乾隆四十一年賜諡烈愍同縣章簡明末知羅源暮兵守南門城破死之本朝乾隆四十一年賜諡節愍陳于階上海人為欽天監博士本朝官兵下南京自縊於公署乾隆四十一年賜諡節愍朱永佑上海人崇禎進士官吏部左侍郎從唐王至舟山城破被戮死本朝乾隆四十一年賜諡烈愍王維恭華亭人明末以左軍都督府掌府事華亭侯從桂王入緬死難一年本朝乾隆四十賜諡烈愍本朝周茂源華亭人順治進士厯刑部郎中知處州府山路險仄募民開鑿二百餘里皆成坦途又招集流亡給牛種墾田一千八百餘頃罷官家居日事著述有鶴靜堂集李雯上海人力學好古與陳子龍齊名明崇禎間雯父逢申被謫戍而非其罪雯叩閽陳辨得白闖賊破京師逢申盡節死順治初廷臣交薦雯才可用授內院中書沈荃青浦人順治九年廷對第三人授編修出為河南大梁道有政績厯官詹事卒諡文恪荃學行醇潔好奬進士類書法尤有名王廣心華亭人順治進士授行人遷御史巡視京東二倉條陳漕政前後三十餘疏蠧弊肅清又修築通會河挽輸無阻以親老乞歸卒崇祀鄉賢祠顧大申華亭人順治進士授工部主事分司夏鎮河道節省公費以築鎮城人服其廉幹又設兩湖書院以造士擢洮岷道僉事卒於官大申少有經濟多所著論江南之濬劉河吳淞江皆用其議云施維翰華亭人順治進士授臨江推官擢御史條奏皆關大體屢遷右副都御史巡撫山東再遷浙江總督前院劾軍士鼓譟一案縲絏二百餘人維翰至即日會讞多平反調福建總督未抵任卒諡清惠王光承華亭人歲貢生博學工詩文淡於榮利明季屢辭徵辟與弟烈隱居上海新場鎮躬耕養父足不入城市者三十餘年卒著有鎌山堂集沈天成華亭人康熙十三年福建耿精忠反執總督范成謨天成在幕亦被械繫厯三載不屈及聞范殉節即自縊事聞贈國子學正有聽鵑詩一卷被繫時作葉映榴上海人順治進士改庶吉士厯官湖北糧道康熙二十七年武昌兵變露刃呼譟入巡撫轅門巡撫避匿映榴挺身出諭賊不應逼之從逆瞋目叱之賊勒入署以兵環守乃繕遺疏付家入升公座罵賊自刎賊大驚入拜而去事聞贈工部右侍郎廕一子御書忠節二字諡之王頊齡華亭人康熙進士授太常博士已未舉博學宏詞改授編修纂修明史纍官工部尚書武英殿大學士雍正初以老乞休世宗憲皇帝手敕慰留年八十四卒贈少傅諡文恭頊齡以文學進厯卿曹諳練典故在政府八載恪誠純一以風度稱又與頊齡同舉鴻博者錢金甫上海人康熙進士授編修終通政使吳元龍婁縣人康熙進士以郎中改授編修終侍講王鴻緒頊齡弟康熙進士授編修厯侍讀學士妖人朱方旦以左道惑衆鴻緒疏列其三大罪方旦伏法纍遷左都御史總裁明史自工部尚書轉戶部解任歸後復吕入都修詩經傳説彚纂及省方盛典並為總裁官所著明史藁列傳二百餘卷焦袁熹婁縣人康熙舉人五十二年詔求實學之士華亭王頊齡安溪李光地交章薦奉旨召見以親老固辭袁熹至性純孝究心先儒之學師事陸隴其所著各經説太極圖𫐠等書數十卷俱能發宋儒所未發所居浦南之焦家村學者稱南浦先生張照婁縣人康熙進士授檢討入直南書房纍官刑部尚書照學殖淹贍才思敏給書法雄徑屢荷宸奬卒贈太保諡文敏吳燧上海人康熙副貢燧學問純粹深博性恬退居家孝友鄉黨稱焉張照張起麟顧成天輩皆從其學著有存初文集子啓秀諸生亦有文譽黃之雋先世安徽休寧人徙居江蘇華亭康熙進士改庶吉士雍正元年奏中元祭聖祖仁皇帝文稱旨授編修厯官中允乾隆元年薦舉博學鴻詞撰述甚富編唐堂集六十卷嘗集唐人詩句為香屑集十八卷凡古今體九百三十餘首又集唐人文句為之序亦三千餘言沈大成金山人貢生覃精經史諸子百家咸能貫串性恬淡不應科舉著有學福齋集蔡湘上海人監生工詩文有聲譽與王士禎朱彝尊輩倡和皆服其才客死交城年甫二十有竹濤集胡寶瑔青浦人雍正舉人乾隆八年由內閣中書入直軍機遷侍讀尋授福建道御史轉戶科給事中厯順天府府丞府尹副都御史兵部侍郎巡撫山西調河南江西卒諡恪靖寶瑔性敏給久直軍機遇事慎默輒自言能見鬼神以謝問朝政者乾隆十三年從經略傅恆定金川歸與飲至儒臣榮之喬光烈上海人一琦從曽孫乾隆進士知寶雞縣到官日釋冤獄開水利勸農桑修學校厯官河南布政使所在有聲會黃河口決光烈親率官辨駐隄撈救難民以萬計總理工賑動帑至二百三十萬擢貴州巡撫調任湖南整飭吏治軫念民艱以事削職旋起甘肅布政使卒著有最樂堂集許椿婁縣人舉乾隆六年浙江榜鄉薦知內江縣有惠政會金酋不靖大吏檄辦糧站死木果木之難贈道銜入祀昭忠祠王昶青浦人乾隆進士二十二年高宗純皇帝南巡召試授內閣中書轉員外郎以從征緬甸金川有功賞戴花翎纍官刑部侍郎告歸昶生平以勤慎自持敡厯中外三十餘年並著懋績曹錫寶上海人乾隆進士擢御史疏劾大學士和珅家人劉全服舍踰制疏入會勘無左證部議鐫級改革職留任嘉慶四年贈副都御史陸錫熊上海人乾隆進士二十七年召試授內閣中書入直軍機洊升郎中會編輯四庫全書因仿劉向曾鞏之例作提要載於卷首編擬稱旨授侍讀纍官左副都御史卒錫熊學問賅洽貫通古今若契丹國志勝朝殉節諸臣録舊五代史河源記略厯代職官表八旗通志凡有經進之書皆與編纂自著有篁村集寶奎堂集趙文哲上海人乾隆二十七年召試授內閣中書三十三年坐事論罷會用師緬甸軍前效力復原官尋升戶部主事時小金川搆釁隨將軍溫福進剿死木果木之難贈光祿寺少卿入祀昭忠祠馬汝良松江人安籠鎮中營守備從征緬甸擊賊葫蘆口陳亡事聞廕恤如例王春煦婁縣人乾隆進士授編修擢御史知宜昌府嘉慶元年川楚教匪滋事賊首林之華等屯據長陽縣之榔坪遊擊邱作訓知縣黃應文赴援被害春煦至長陽守孤城者六月殲賊無算城卒獲全五年四月卒於官贈道銜趙秉沖文哲次子由國子生薦直懋勤殿乾隆四十七年賜舉人授內閣中書厯部科卿寺纍官戶部侍郎嘉慶十九年卒恤典如例張位中上海人乾隆進士知射洪縣廉能為蜀令最嘉慶五年教匪訌北川其黨由梁山竄大竹位中被檄署縣方葺雉堞撫流亡部署未竟而賊麕至率團練兵出禦斃數十人又親射殪一人以衆寡不敵死之事聞豫恤入祀昭忠祠孟景源上海人由行伍洊升江西水師南昌營守備嘉慶元年隨征湖北邪匪連日轉戰被傷殁於陳事聞議恤廕雲騎尉世職鍾德華亭人由行伍洊升直隸涿州營守備嘉慶元年署忠順營都司調赴湖北隨征教匪纍戰有功二年隨四川總兵百祥剿賊於蓬州之徐家場殲戮甚衆旋有步隊賊由巴州來援德併力抗拒身受重傷卒事聞加等議恤廕雲騎尉入祀昭忠祠葉炳銓華亭人由行伍洊升陜西興漢鎮遊擊嘉慶二年防守洵陽屬之閭河口突有自楚竄回邪匪至南岸水淺處測探偷渡炳銓率兵衆追殺殲戮無數三年截剿賊匪樊人傑等賊兵恃衆不退炳銓奮勇衝殺力竭陳亡事聞議恤廕雲騎尉總纂官臣王廣蔭恭纂輯前提調官臣張日章恭覆輯校對官臣賀式韓恭校恭覆校大清一統志松江府四流寓唐朱放襄州人遭寇亂避地雲間貞元初召為拾遺劉長卿贈以詩云詔書徵拜脫荷裳身在東山閉草堂閶闔九門通禁籍華亭一鶴在朝行滄洲離别風煙遠青瑣幽深漏刻長今日卻回垂釣處海鷗相見已高翔然放終不就也宋梅堯臣宛陵人工詩初廕主簿後賜進士纍官尚書都官員外郎以叔詢知蘇州往來於青龍鎮間著有青龍雜志林景曦平陽人咸淳間纍官從政郎元兵南下遂不復仕至元十五年楊漣真伽盡發宋諸陵時景曦未得高孝兩朝骨為兩函貯之葬紹興之蘭渚山植冬青樹志之後居雲間最久有雲間懷古諸作時稱霽山先生章楶浦城人始仕試大理寺評事監華亭鹽稅樂其風土因家於青龍江之嵩宅纍官至樞密院封秦國公諡莊敏邵桂淳安人咸淳進士授處州教授國亡不仕娶曹澤女因家於松之小蒸為斯文領袖四十年元楊乘濱州渤海人纍官江浙行省左右司員外郎坐海寇掠漕糧舟免官寓居松江張士誠入平江其徒郭良弼董綬言乘於士誠招之乘曰是欲引我以濟其惡耶乃與客痛飲竟日整衣冠自經死任士林奉化人少穎悟書經目不忘文章沈厚正大一以理為宗不作廋語棘人喉舌趙孟俯輩咸推為今之柳河東大德間攜家華亭與衛山齋善有訪山齋詩及興聖塔華藏諸院記至大初舉安定書院山長卒錢惟善錢塘人舉鄉首寓居華亭經明行修有羅剎江賦著名於時詩法唐人尤極清致柯九思仙居人以廕補華亭尉不就文宗即位擢為典瑞院都事直奎章閣授鑒書博士罷官後流寫松江九思善畫竹石得文同華意至正間卒黃公望莆田人工山水通算術輔浙省掾忤權貴棄去黃冠野服往來三吳間至松與曹知白善多留小蒸後其地有精九章算術者蓋其傳也明楊維楨山隂人避地富春山徙錢塘張士誠纍招不赴徙居松築元圃蓬臺於松江上海內薦紳大夫與東南才俊之士造門納履無虛日嘗吹鐵笛作梅花弄見者以為神仙中人洪武中將召用遣翰林詹同奉幣詣門維楨賦老寡婦謡一章以進帝成其志仍給安車歸山陶宗儀黃巖人家貧教授松江張士誠據吳署為軍咨不赴洪武中命有司舉人才宗儀引疾不就著有輟耕録説郛書史會要四書備遺傳於世孫作江陰人元末挈家入吳惟載三代藏書兩敝簏門弟子為買田築室於松焉洪武初授編修纍官國子司業著有滄螺集王震蘇州人洪武初嘗徵校大祀樂後徙華亭時𥘉頒大成樂諸郡皆聘震教習永樂初復徴以老疾辭著有八音圖彭溪稿王逢江陰人太祖欲辟用之堅卧不赴隱居上海之烏泥涇歌詠自適洪武十五年以文學徵有司敦迫上道時子掖為通事司令以父年老叩頭泣請乃命吏部符止之著有梧溪詩集七卷秦裕伯大名人纍官福建行省郎中世亂棄官避地上海以養母吳元年太祖檄起之𥙿伯對使者曰裕伯受元爵祿而背之不忠也母喪不終忘哀而出不孝也不忠不孝之人何益人國洪武初復起之稱疾太祖手書諭曰海濱之兵好鬬𥙿伯智謀之士堅不起恐有後悔遂入朝命以官屢辭後為待制尋出知隴州楊基其先蜀人文采秀麗為名流所稱洪武初遊松江為府學訓導與邱克莊錢希賢同官當時分教有司得自延聘皆極州里之選列女元王子溫妻諸氏華亭人家貧以女工自給略無愠色至正中兵掠松江子溫欲挈以逃氏泣曰奈何以我一婦人纍君君第往我自為計乃與鄰嫗避於城隅陋室中賊入鄰嫗多為所汚氏獨怒罵不屈賊掣刃剖其腹罵不絶口而死朱道存妻費氏上海人名元琇至正間苗寇陷城氏被執寇露刃欲犯氏怒罵不已寇怒刳之妹元徽嫁陶氏年三十夫亡誓死不嫁時稱雙節沈景新母妻上海人至正中景新為上海吏苗寇至姑婦俱為所掠欲汚之姑婦大罵寇怒殺其姑縛婦髮馬尾曳殺之明任仕中妻俞氏上海人年二十一而寡子女俱幼誓不改適撫教子女女長適俞邦用邦用亦早喪或勸女改嫁女曰再嫁則俞氏祭祀誰奉且辱吾母乃歸與母同居守節洪武初旌為雙節之門張文通妻俞氏上海人文通疾革語氏曰吾將死汝年少無子宜自為計氏泣曰父命事夫夫死無子將何從願從夫子於地下文通殁是夕俞自縊鄧林妻湯氏上海人通孝經列女傳歸未久而寡鄧族利其産迫使改嫁湯曰我生死鄧家耳乃盡其資以還鄧族躬織絍自給年九十三卒錢岐妻宋氏華亭人夫殁自縊家人救之不得死遂不食卒年二十五事聞旌表張氏三節婦華亭人張璿妻胡氏張璣妻瞿氏張珩妻楊氏俱夫亡守節成化中詔旌三節之門蔡倫妻唐氏上海人夫亡守志有二子長子式堅娶侯氏亦早卒姑婦並以節著成化中旌表張氏松江楊王山妾納氏踰月以妻妬使之大歸張屏居南京楊亦數往來所贈以千計後二十餘年楊坐纍家破怏怏失明張聞直造楊廬拜主母大慟悉出向所贈具妝嫁其二女并為二子納室踰年楊死遂守節而終何四妻王氏青浦人嘉靖中倭寇至被執不屈死尸浮於河越三日父母收其尸兩手猶握襟帶云韓洪謨妻張氏華亭人嘉靖中倭亂洪謨被殺張號哭赴死所俱死之同縣陸野塘妻亦被執不屈死陶氏女華亭人家貧未嫁嘉靖中倭寇至與其母避賊賊及俱沈於河有鄰女張氏亦為寇所逼投河死朱氏二女華亭人嘉靖中倭寇入城與婢張連𬒮投水死朱世勳妻王氏華亭人嘉靖中倭亂與其小姑投水死同縣朱煥妻焦氏談應禮妻高氏俱不辱遇害萬盛年妻蘇氏上海人盛年有膂力善騎射萬厯中戰死於滴水涯凶問至蘇泣曰夫能死忠我獨不能死節乎遂自經死許烈婦松江人贅嚴氏子為壻嚴飲博不治生諸博徒共謀誘嚴以金嚴即以意誨婦婦叱之屢加箠撻不從一日諸惡少以酒肴進婦拔刀自刎死年二十五上海烈婦失其姓既嫁夫患瘋舅姑恐子喪而婦去謀奪以妻少子婦覺告其夫夫泣遣之歸夫死舅姑不以告露棺水濱以俗忌惡疾也氏聞盂飯至棺所哭祭祭畢以巾羃面投水死黃龍妻顧氏上海人夫殁姑許配他姓顧佯語姑曰幸延吾母為别母至具酒食泣拜曰大人幸自愛長與膝下辭矣偽起更衣遂入室自經死張亮臣妻楊氏上海人亮臣殁遺腹生男楊勉終喪托孤親族自縊同縣唐子亮妻杜氏夫亡無子自經死華廷璋妻陶氏夫亡赴水舅姑救之不食死李君盈妻孫氏少寡事姑鞠子厯十年子既婚召子婦曰向不死待汝成立耳汝善事祖母遂不食死又貞女秦小姑許字華明徵明徵夭小姑聞訃不食請奔喪七年骨立死於柩前吕延禧妻吳氏青浦人延禧亡撫孤守節甲申之變絶食死明年郡被兵其子吕稷守母喪不去遂遇害時稱一門節孝陳君修妻楊氏婁縣人居潢溪鼎革時有遊卒執君修將害之氏趨救許以身代得釋執氏氏紿曰我有藏金攜以同往信而釋之躍入􅅹瀆塘卒怒挺矛叢刺溪水為赤越二日尸浮水上得就殮焉同時死節者有徽商孫氏婦懦生孫諤妻顧氏又總兵吳志葵妻范氏志葵死自刎以殉侯承祖妻周氏承祖父子殉難氏偕長女自刎死百戶濮寅妻常氏寅守城為仇所殺氏即縊死其僕婦陸氏為寅夫婦埋掩有欲汚之者不從臠殺之張乾妻衛氏城破偕姑竇氏赴水死陳元爵妻某氏夫婦偕死徐念祖妻張氏念祖死難氏與子婦等十七人俱自縊死張六妻某氏遭亂六入白黨為盜既死官判氏改適人氏下堂以裙帶絞頸死王彥章妻楊氏華亭人夫亡養舅姑撫孤子子端亦早死端妻倪氏事姑不嫁並守節義本朝沈匡濟妾翟氏華亭人夫殁坐卧一小樓亂兵至投井死同縣吳期伸妻沈氏亦投井死沈元齡妻葉氏夫亡自縊配祀三烈祠張氏女幼為莊氏養媳夫亡舅議以女配姪女聞信投水死程迪聘妻錢氏迪殤錢閉户自縊盧氏本僕婦夫病革語盧年少可他適盧以死自誓夫亡盧絶粒死黃士英妻潘氏夫亡遂閉戶自縊魯祥妻張氏婁縣人其姑故娼也因與祥共迫氏為娼氏不從箠撻脅之氏潛赴萬安橋急湍中死八日得其尸面如生衣上下百結里人為立祠墓側顧仲修妾姚氏金山人仲修及妻相繼死翁欲奪其志氏投水死同縣董謹妾華氏夫亡僅育一女及女嫁遂自盡喬軫妻馬氏上海人夫亡守節順治初旌顧揚妻倪氏上海人海寇劫其家氏觸牆死同縣馬鳴仲妻顧氏為遊兵所掠不受辱投水死沈春妻顧氏姑與春之叔母謀共逐春氏偕春赴吳淞閘死陸升階妻曹氏唐元晟妻楊氏吳連妻張氏周某妻張氏顧德修妻王氏童嘉恕妻禇氏徐俊妻張氏某妻唐氏夏某妻瞿氏徐士述妻趙氏徐大祿妻秦氏俱夫亡自盡喬以韶妻何氏避亂之母家遇遊兵掠之不從赴水死烈女何佩父死母寡許字未婚避兵洋涇一騎􅊳至逼汚之何泣且罵遇害母亦死顧宏妻唐氏南匯人夫亡母勸改適氏號慟欲死幼女哀哭願偕死並沈於河同縣唐望麟妻潘氏馬繼援妾孫氏俱夫亡自盡唐嘉會聘妻楊氏青浦人未嫁而嘉會亡父母欲議婚女聞之自經死與嘉會合葬順治年間旌沈廷棟妻曹氏青浦人遇賊不屈抱幼女投貞溪死同縣蘇惠妻葉氏陶尚象妻周氏俱夫亡絶粒死宋雍妻顧氏奉賢人夫亡守節康熙年間旌馮飛五妻蔡氏上海人夫亡守節同縣馮德甫妻汪氏馮仲章妻沈氏均夫亡守節烈婦王五妻陳氏守正捐軀俱康熙年間旌張鍙妻田氏金山人夫亡守節同縣程志文妾張氏蔡氏金大成妻王氏徐貞九妻張氏張洪妻郁氏黃允疇妻程氏陳靜逺妻胡氏姚宏炯妻馮氏朱文炳妻鄭氏王其義妻姚氏陳秩華妻曹氏周丕文妻陸氏陸渭公妻顧氏夏汝訥妻黃氏沈爾堪妻張氏沈宗鎬妻黃氏林銓妻曾氏方榕妻孫氏張光民妻田氏光民子臻妻吳氏均夫亡守節俱雍正年間旌張旦兮妻范氏上海人守正捐軀同縣顧奇妻某氏顧定妻朱氏均守正捐軀俱雍正年間旌包良有妻朱氏南匯人夫亡守節同縣邵珩妻翁