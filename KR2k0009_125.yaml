front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_125-1a}
body:
  text: 漢陽府名宦三國魏文聘南陽宛人曹操定荆州江夏與吳接民心不安乃以聘為江夏太守屢有戰功文帝立使聘别屯沔口止石梵禦吳有功遷後將軍封新野侯孫權以五萬衆圍聘於石陽聘堅守不動權去聘追擊破之在江夏數十年有威恩名震敵國吳不敢侵唐張廷珪河南濟源人開元中為沔州刺史在官有德化賈載至德中為沔州刺史未朞月而政和於訟堂西搆秋興亭狄仁傑并州太原人中宗時復州刺史有惠政李齊物隴西人天寳中竟陵太守拔陸羽於優人中授以書後遂知名子生於復遂名復後亦為竟陵太守按復州或治竟陵或治沔陽参錯不一今考舊唐書自貞觀七年移治沔陽天寶元年改為竟陵郡則此竟陵太守在沔陽與梁以前治竟陵者異至唐後復州多治竟陵宋理宗端平初仍徙沔陽故所載名宦各隨朝代分隸於漢陽安陸二府崔訏貞元中復州刺史韓愈有送雀復州序謂崔君之仁足以蘇復人宋程遹河南人太平興國中知黄陂縣清謹過人張先開封人天聖中爲漢陽司理叅軍歐陽修稱其臨事果決程珦河南人仁宗時爲黄陂尉慈恕而剛斷吳處厚邵武人元祐中知漢陽軍有善政張汝明廬陵人神宗時簽書漢陽判官時官田法行受牒按境内主者多不親行汝眀躬臨閲實雨雪不渝以故吏不得通賕謝而税均游酢建陽人徽宗時知漢陽軍召郡中士子講明性理俾風俗醇美曹彦約都昌人慶元初攝漢陽軍事時金人大入彦約搜訪土豪得許卨俾總民兵趙觀俾訪水道党仲昇使將宣撫司軍屯郡城彦約授觀方畧逆擊金人自遣死士焚其戰艦晝夜死戰以守禦功就知漢陽嘉定元年應詔陳言乞緩成幣飭邊備爲決勝之策黃幹閩縣人慶元時知漢陽軍值歲饑糴客米發常平以賑制置司下令欲移本軍之粟而禁其糴幹不從荒政具舉旁郡饑民輻輳惠撫均一願歸者給之糧不願者給廬居之民大感悦趙鄖慶元閒知漢陽軍事築隄置閘以除水患善政著聞謝憲子端平中知孝感縣政尚禮敎招集遠近士發明朱子之學時廣平儒者竇黙避冦来依因得伊洛性理之書以頒士子徐安民淳祐三年知漢陽軍事出己資營繕城闉官舎壇壝又植松杉榆柳三萬餘本於城内外曰十年後可以資官民用其綜理周密如此楊文仲眉州彭山人理宗時復州敎授轉運使印應飛辟入幕明嫠婦冤獄應飛悉從之施子仁宋末知復州時元兵攻襄陽随守張龜夀荆門守朱楊祖郢守喬士安皆委郡去惟子仁固守城陷死之翟國榮端宗時復州副將遇元兵戰爛泥湖死之贈團練使立廟復州元仇公度黃陂縣尹以清慎著事無大小斷決如流盧克治開州人知漢陽府時郡縣新附人心猶惶懼克治宣布上德撫慰綏輯一郡向化白景亮南陽人由南恩知州升沔陽府尹奏最於朝先是民閒徭役不盡校田畝以為則吏得高下其手景亮始覈驗田畝以均之大小家咸便安之學政久弛諸生無廩膳廟像祭器有缺景亮皆為之備儒風大振張寛至正閒守沔陽州有廉能聲歲潦請於朝給賑一郡生全俞述祖象山人為沔陽府推官至正十二年蘄黃賊迫州境述祖領民兵守綠水洪兵力不支沔陽城陷述祖為賊所執械至其偽主徐夀輝所誘之降述祖罵不輟夀輝怒支解之有子方五嵗亦死事聞贈奉訓大夫禮部郎中象山縣男明蘇恭讓玉田人洪武初知漢陽府治簡而明嚴而不苛每有重役輒詣上官陳説多得減省民蒙其利趙廷蘭和州人洪武初知漢陽縣有幹局創建縣治民不告勞朝廷嘗遣使徵陳氏散卒他縣多以民丁應廷蘭獨言無有民以不擾王叔英黃巖人洪武時知漢陽縣多惠政歲旱絶食以禱即雨既而雨不止復禱即霽龔巖崇明人建文時知孝感縣剛決無所曲庇循行勞來所至見德徐述建德人永樂中知漢陽府歲歉民艱於租諭闗市得穀數十萬代民輸足朱祐邵武人宣德中知漢陽府府舊無廩庾軍民渡江輸於武昌祐奏請立倉府城民甚便之陳惠鄞縣人正統初知漢川縣專尚德化勸農興學士民德之羅勉吉水人正統閒知孝感縣精心澡刷境内秩然所修舉悉計永久何淡順德人成化中知漢陽府築隄堰滋灌溉敎民力農興起學校士多成就沈熊浙江人成化中知漢陽府清靜愛民不通請謁林堪莆田人成化中知漢川縣平易近民亷介不苟公餘與諸生講論道藝日夕不倦李恒儀封人成化中知黃陂縣歲饑盜起恒多方賑濟招集之盜遂息縣初未知畜羊種麥植棗桑恒咸敎之董傑涇陽人宏治初知沔陽州時大旱即開廩賑民復蠲其租甫三日以事逮去乃悉取賑劵焚焉民感其惠泣送之樊景麟新繁人嘉靖中知漢陽府水囓城址景麟為隄以防之不欲勞民躬率隷役随地斂石有時與家僮共負巨石移署前轉運江岸昌應㑹莆田人嘉靖中知漢川縣縣當漢江下流歲患沈災應會輕徭緩賦極意撫循景王出封安陸中官藉勢橫索應會力持弗與中官怒誣奏逮獄累月竟坐調民思之為立祠漢江上謝廷茝富順人嘉靖閒知黃陂縣正己愛民舊多滯獄剖決如流雖稚子婦人皆得以情自達暇即與諸生課講龍興海陽人嘉靖中知孝感縣會礦賊為患興率民兵殱之修築縣城民以無恐張綸音朝邑人萬厯間知漢陽府劇盜艤舟待客攫其貲而沈之江綸音嚴捕得數十人一日械集署門前悉杖殺之民得安枕蔣以化常熟人萬厯閒知孝感縣政務寬平常巡行郭外召父老問民疾苦給牛種資其匱乏公暇進諸生講藝歲大祲躬為糜粥餔之道有胔骼輒斂瘞余桂萼上饒人萬厯閒知孝感縣會疫桂萼為擇醫施藥民多全活復置地十餘畝葬民之死無所歸者修城池置學田輯縣志百度修舉朱珏休寕人萬厯中黃陂縣典史潔己執法專鋤豪右黃安耿尚書定向嘗嘆美之張大治保縣人天啟中知漢川縣始至故媕婀不振黠吏乘機欺之月餘悉得其姓氏并奸狀一日復以事至大治厲色訶之曰汝復來欺我乎歴數其奸猾事各置之法一豪民計奪隣家地誣以盜縛送於官大治不問但厲聲叱縛者曰汝何不獻地以解之豪民膽落服罪去一時驚以為神孫光祚石屏人崇禎中知漢川縣獻賊犯劉家隔光祚率衆禦之賊渡鯉魚灘乘其半濟擊之賊溺死甚衆自是不敢犯縣故無城光祚創築李鑑四川人崇禎時知黃陂縣時流冦猖獗率衆數萬圍城三日鑑嬰城固守民有訛言者鏗私取死囚斬其首懸之訛言遂止賊亦驚散雍鳴鑾成都人崇禎中知孝感縣縣為冦衝鳴鑾晝夜乘城繕樓櫓練鄉勇賊至輒却走之城賴以全章曠華亭人崇禎中知沔陽州有惠政李自成冦沔奸民迎賊曠設計捕斬之賊稍退既而大至曠且戰且守賊解圍去隣郡皆恃沔陽以自固趙元有福建人崇禎末知黄陂縣縣饑且疫冦踵至元有悉力防禦城陷死之本朝乾隆四十一年賜諡節愍夏統春桐城人崇禎末黃陂縣丞攝黃安黃梅皆有聲時全楚多陷賊至誓以死守凡十五晝夜城陷被執賊欲以為守統春大罵賊怒斷其右手復以左手指罵又斷之罵益厲賊斷其舌剜其目統春猶以頭觸賊遂支解之本朝乾隆四十一年賜諡烈愍薛聞禮武進人崇禎時黄陂主簿值歲大祲漕糧責逋急民無以應聞禮轉貸千金輸之流冦至挾與俱去欲官之聞禮乘閒脱歸率吏民攻賊賊復大至殺之罵不絶口本朝乾隆四十一年賜諡烈愍馬飈同官人崇禎末為沔陽州倅李自成攻城飈戰於城東殺賊數百賊圍愈急飈乃下馬短兵接戰力竭被執賊壯其勇欲降之飈怒罵賊以槍洞其腹而死其僕馬旺石秀亦罵賊死事聞贈知府本朝乾隆四十一年賜諡忠烈孟宗孔階州人漢陽敎諭闖賊陷城自縊死本朝乾隆四十一年予祀忠義祠本朝郜炳元長垣人順治進士知孝感縣時民人未集加意撫循雞籠山土冦竊發乘夜襲城炳元偕典史郎元振集鄉勇守禦城陷俱被害炳元妻馬氏紉衣百結亦罵賊死恩䘏有差趙一柱餘姚人順治中任沔陽州同知西山冦發殉節死康熙七年贈知州賜祭邵大業大興人雍正進士授黄陂知縣潔己惠民乾隆丁已邑大水捐俸拯溺復散給口糧以待官民困以甦又捐築東坂理趣林毛清河靳家灣等隄凡一千一百餘丈士民德之稱邵公隄人物晉朱伺字仲文安陸人張昌之逆伺恥與同縣求割安陸東界别爲灄陽縣遂爲灄陽人伺有武勇而訥率部黨滅昌後陳敏作亂陶侃署伺爲左甄破敏前鋒敏弟恢稱荆州刺史在武昌侃率伺進討破之敏恢既平以功封亭侯領騎督随侃討杜􅌢有殊功夏口之戰射殺賊大帥數人賊於水邊作陣伺邀之箭中其脛氣色不變賊潰追擊之死者大半加威遠將軍建興中陳聲斷江抄掠伺邀聲弟斬之圍聲於董城其黨斬聲出降又平蜀賊龔高加廣威將軍領竟陵内史杜曾等陷楊口壘伺被傷賊養伺妻子百口遣人招伺伺不從還甑山卒唐張抃孝昌人爲張廵禆将尹子奇圍睢陽巡使抃請救於許叔冀叔冀不許城陷與南霽雲等三十六人不屈死宋張錫字貺之漢陽人進士甲科歴知南昌新州東明以治績聞李及瀳爲御史丁謂貶崖州議還内地錫疏謂奸邪弄國本與天下共棄之今腹還是違天下意由是止徙雷州玉清昭應宫災連繫甚衆錫言天災反以罪人恐重天怒獄遂解累遷至翰林侍讀學士判太常寺國子監錫淳重清約雖貴奉養如少賤時讀書老而彌篤張昌中漢陽人處家以義厯世不分党仲昇漢川人開禧時金人入境仲昇擊其砦殺千餘人中流矢死事聞贈修武郎官其二子汪涯宇萬頃漢陽人賈似道督師延爲賓客元世祖圍武昌似道乞和師退欲作露布獻功涯瞋目曰啗人以利而退其師又欺主上何露布爲似道怒撾殺之元景厚字德載漢陽人領鄉薦至京師中書左丞許有壬師事焉明丁普郎黃陂人太祖時爲行樞密院同知數有戰功從太祖與陳友諒戰於鄱陽湖自辰至午普郎身被十餘創首脱猶執兵若戰狀植立不仆敵驚爲神贈濟陽郡公立廟祀康郎山唐宗孝感人洪武中官江西右参議亷明平恕致仕家無餘貲御史徐瑛造之湫隘不容騶從屬縣令廣其居宗力辭之曰予在里中不能拯人之急而又奪之使不有安宇乎遂止戴景文字希敬漢陽人洪武中舉於鄉擢王府伴讀景文以輔導自任動規以正遂與世子不合不數月解組年甫四十棲隱三十年授徒講學力田自給歐陽謙字伯益沔陽人洪武中監察御史優於文學所著有滄浪集虞信字尚沈沔陽人永樂中監察御史有直聲厯四川山東按察使張瓚字宗器孝感人正統進士厯工部郎中出知寕波府中官怙勢黷貨瓚疏劾之其黨皆伏罪巡撫四川討平苗亂奏立安定宣撫司遷户部左侍郎督漕巡撫鳳陽卒於官程昂字文軒孝感人其五世祖希哲自元季居洪樂鄉至昂五世不分治家務遵禮法宏治中旌表王炎字廷用孝感人成化進士授户部主事厲風節不屈於權貴宏治時外戚夀安侯張鶴齡奪河閒民田炎同侍郎許進往按炎據法奏覆戚畹側目正德中厯山西布政時中官劉瑾用事瑾父葬冠葢奠送相望同列强之往炎曰吾體骨不媚終不能濡跡權路弗往瑾深銜之坐以他故免官歸及瑾敗臺官疏薦起御史未任卒劉鈺字世美沔陽人成化進士督課九江羨餘悉貯府庫後知常州處州二府悉有善政劉奎字文瑞孝感人性孤介剛峻宏治中授廬州府同知時武宗南巡江彬等作威福奎攝邳州事不為禮彬銜之調永寕同知辭免歸途遇雨逆旅人秦氏椎牛具享入其堂有秦檜像奎怒起曰吾幾為造次所誤時徒御己休冒雨去之戴金字純甫漢陽人正德進士世宗時擢御史獨立敢言與黃梅石金同表儀朝署時人目之曰楚有二金臺中錚錚厯官至兵部尚書朱衣字子宜漢陽人正德進士授御史清軍江北值大饑人相食衣便宜賑濟全活甚衆是時方爭大禮世宗召羣臣議門下衣直言忤張璁罷職家居童承敘字士疇沔陽人正德進士才具敏瞻楊廷和楊一清雅重之嘗奉使唐藩却其餽遺經筵進講以用正人端國本為先肅宗嘉之後為國子司業與關中吕柟倡明正學圜橋門者萬計朱寵字德承漢陽人嘉靖進士以治海門課績第一擢御史既入臺適嚴嵩柄政慨然草疏欲劾之未上而父卒乃痛哭扼腕去與漢川張緒講求理學家貧至糧絶弗顧學者稱為漢水先生張緒字文綸漢川人嘉靖舉人受業安福鄒守益厯官户部員外郎與耿定向羅汝芳講學不輟當事惡之謫官稍遷知德陽縣告歸室廬蕭然布衣脱粟晏如也學者稱為甑山先生及卒鄉人私諡曰介肅鄭佶黃陂人孝友篤行剛直不阿嘉靖中為豐城知縣時嚴嵩用事佶無所徇改商城擒劇盜遷大理評事㑹給諌呉時来主事董傳策疏繫嵩時來等下獄或屬佶致之死佶曰殺骨鯁臣以媚權倖謂天下後世何守雲南繩黔國公沐朝弼以藩臣禮謫判通州禦倭寇有俘獲功後守尋甸歸俸餘悉分給三黨家無長物王霽黄陂人操履端潔父早卒事母至孝嘉靖時知吉水縣守保寕擢雲南按察使皆有治績以太僕卿致仕歸吉水羅洪先最慎許可獨重霽顔其堂曰清白方一鳳字丹山黃陂人受業於羅欽順以樹人善俗為己任士有就正者敎以克己自反遷善改過唐希臯字子謨孝感人師事錢德洪以歲貢授興國知縣治尚敎化歸里置求仁館聚衆講學嘗曰吾與親友子弟為遷善改過之學雖桑榆之景無多亦庶幾古人得正而斃之道程學博字近約孝感人嘉靖進士授工部主事遷知重慶府清嚴剛直於郡治前構屋設竈以居質訊者決獄不淹時案無留牘白蓮妖衆倡亂學博殱之累遷貴州參議平東川烏蒙烏撒蠻遷雲南兵備副使擒下苴諸寨賊擢行太僕寺卿致仕尹良佐字志伊漢川人隆慶進士為龍川知縣撫平山冦調丹陽以最聞召拜御史侍經筵條上治河封事巡按河東督理鹽政奏濬大小二池以疾歸踰年卒尹應元字乾泰漢川人萬厯進士累官僉都御史巡撫山東時太監陳增以礦税為民厲誣坐益都知縣吳宗堯應元奏劾之宗堯遂得免蕭良有字漢沖漢陽人萬厯進士授編修時有三王並封之議良有上疏固爭遷國子祭酒敎士以李時勉陳敬宗為法弟良譽亦負時望視學河南時稱二蕭云王一凱字君華黄陂人游於耿定向之門講學二十年厯知武康崇德二縣遷西安府同知皆有聲以病免邑令慕之造其廬贈一𥿄書八人姓名一凱曰此何人令曰盜也可得百金為公夀耳一凱曰真盜法不應赦非盜情則可矜二者之間何以敎之令慙而退胡天起字仰文黃陂人爲程朱之學不競時名萬厯十六年歲大祲傾所有以贍親族其貧不能婚葬者助之道拾遺金楬榜還之初無子悉以田財分給其姪晩而舉子置舊業不復問子明垣成進士黃彦士字抑美黃陂人萬厯進士官御史會有孝定太后之喪贊神宗行三年喪示後世法神宗是之光宗踐祚上言十一事天啟初復上講學疏巡按河南未發見潞藩税監橫杖其黨數人請立徹税監卒以抗直左遷歸孫世恪字貞伯漢陽人萬厯舉人天啟初官國子學正楊漣劾魏忠賢世恪同祭酒蔡毅中等亦具奏言忠賢罪不可赦忠賢矯㫖切責毅中旋引去世恪亦歸沈惟耀字斗伯孝感人以貢入京師楊漣出都門人莫敢餞惟耀獨送於盧溝以少女字其子而别明年漣死詔獄惟耀爲具衣冠歸其喪官終廣東平遠知縣陳家棟字巨任黃陂人初游京師楊漣以劾魏忠賢尸於朝親故莫敢收家棟獨往枕尸哭緹騎欲捕之家棟感以大義卒收其尸去尋以國子生授建寕府經歴不以官卑隳節操李若愚字愚公漢陽人萬厯進士選温州府推官天啟中舉卓異赴考選媚璫者指為楊漣死友署下考久之遷刑部主事因天旱陳言請誅魏忠賢并許顯純等以慰忠魂累官浙江參政歸崇禎時起太僕寺卿不赴程註字爾雅孝感人萬厯進士厯官禮戸吏三科給事中時客魏子弟世襲錦衣註奏世職太濫引祖制以裁之不報於是婦寺惡之削其籍令養馬直役崇禎初起大理少卿累遷刑部侍郎秦聚奎字仲默漢陽人萬厯進士天啟中厯官順天府尹時魏忠賢子良弼封侯開府議毁陰陽學以廣其居聚奎疏言事關國體不敢奉詔觸忠賢怒奪職歸後徴拜太常光祿太僕諸卿皆不赴王立益黃陂人事繼母以孝聞自置産分兄弟子族人困糧役鬻田代償嘗獲偷兒與之酒食化導之偷兒痛哭改行王家賓字獻叔漢陽人父卒廬墓三年天啟中官陜州知州廵撫檄建魏忠賢生祠家賓投筆歎曰死無以見偒大洪於地下不奉檄大洪都御史漣字也尋被劾罷王道直字履之漢川人天啟進士授保定府推官勁直不阿知府欲建魏忠賢祠道直持不可崇禎元年擢御史厯官左都御史掌院事莊烈帝書名御屏注曰小心謹慎後謝病歸陳致中字正吾黃陂人隱居桑田蘭山閒不入城市四十年長子尭道聘劉氏女聾而痿女父母請别娶致中曰棄婦不仁毁盟不信何以示子孫即迎歸父八旬遇冦見執致中護持父傷左股冦曰烈士也扶而去之程良籌字持卿註子天啟進士魏忠賢檀國以父故削籍崇禎元年起授行人遷吏部員外郎六年流冦陷荆襄良籌同參政夏時亨立砦白雲山起義與戰四十日卻走之遂引兵克復孝感雲夢兵潰被執不屈死事聞贈太常少卿鄧謙字少子孝感人崇禎進士授大理評事厯山東糧儲副使十二年大兵下德州謙與叔父有正俱死之一門從死者四十六人謙於本朝乾隆四十一年賜諡忠烈陳夀字伯龍黄陂人居父喪日夕不離苫次流冦至見夀守棺不去疑有財貨夀跪泣曰曷殺我勿驚先人賊義之獲免經畧盧象昇聞其事曰忠孝一揆此人不可失羅致幕下後告歸以夀終熊祚延字祈公孝感人力學敦行居家孝友好施與里中貧不能婚葬者嘗鬻産以應流冦至避亂白雲山中賊大舉來攻率衆禦之會風霾畫晦士卒相失以十餘騎從閒道陷泥濘中被執罵賊不屈死十一年本朝乾隆四予祀忠義祠吳暢春字梅初漢陽人為潛山天堂寨巡檢崇禎八年流寇蔓延暢春謂天堂雖小鎮賊所必爭造器械積糗糧募勇敢士書誓死報國於衣裾閒史可法備兵安慶知暢春賢馳札勞曰官有崇卑忠義無兩暢春太息曰士為知己者死况國事孔棘乎一日賊百人誘戰暢春追至梅家寨伏兵四起暢春力鬬手刃數人力屈被執賊逼之降暢春大罵不屈死可法白其事得䘏廕本朝乾隆四十一年賜諡烈愍張國勲黄陂人應城訓導崇禎九年與知縣張紹登分城守比賊焚縣學投烈焰中死全家殉節本朝乾隆四十一年予祀忠義祠傅可知字伯求黃陂人㓜為諸生喪父廬墓三年六十喪母啜粥亦三年嘗道拾遺金坐待其人還之崇禎十六年賊至令養馬曰我為士人數十年肯役於賊耶延頸就刃死本朝乾隆四十一年予祀忠義祠秦民湯漢陽人官榮縣知縣崇禎十七年獻賊破城被執不屈射死本朝乾隆四十一年賜諡烈愍艾吾鼎漢川人官興文知縣崇禎十七年署宜賓縣事獻賊陷城閨門被難本朝乾隆四十一年賜諡烈愍程道夀字應正孝感人以歲貢生授来安知縣旋告歸崇禎末賊陷江北諸郡邑道夀結鄉勇抗賊後被執令為書招降白雲山義旅道夀罵曰吾不能助義軍滅汝肯招之乎賊怒殺之事聞贈太僕寺卿本朝乾隆四十一年予祀忠義祠劉成治字廣如漢陽人崇禎進士厯官户部侍郎明亡自經死本朝乾隆四十一年賜諡節愍王會篇漢陽人崇禎中任武昌府學敎授誨諸生以忠孝為先貧者資其書籍筆楮張獻忠陷城闔門三十餘口殉難傅如圭字元錫孝感人崇禎中以保舉授知縣未仕移家武昌流冦陷城與子邦霖邦貞殉節死如圭於本朝乾隆四十一年賜諡節愍舒顯應字孟錫孝感人官鳳翔知府移家武昌流冦陷城死之本朝乾隆四十一年賜諡節愍熊烈獻字無競黃陂人以貢主通判濟南時流冦訌烈獻調兵食無缺後城陷與二子俱殉節死本朝乾隆四十一年賜諡節愍劉申錫字爾受孝感人天啟舉人明末冦亂立砦二郎畈保聚砦破罵賊死事聞贈知州本朝乾隆四十一年予祀忠義祠譚德化字君明黃陂人性孝友父疾嘗糞為驗兄被誣繫獄德化以身代事卒白友人游蜀三年不歸給其家薪米塗遇凍餓者垂斃負之歸給衣食後為流冦所害朱日薦沔陽諸生流賊至率鄉兵拒賊斬首數十被執支解死蕭鳴霄漢川人崇禎時武舉巡撫宋一鶴辟為參軍殺賊有功授辰州府參將弗就家居冦至圍城鳴霄力戰卻之一城獲全喻甲孝感人明末流賊至甲乘城飛巨石撃賊賊遁縣人勒石銘功蕭芳黃陂人母呉氏守節撫孤後有疾芳刲胸以療人稱其一門節孝本朝張士彦字恢浩漢陽人性至孝母病衣不解帶置義田以贍其族明末賊就撫為兵者皆得乘馬郵傳苦之士彦鬻産買馬以供流冦為患士彦置水陸二砦俾民保聚至本朝以夀終朱天慶字開子漢陽人明末流賊陷城天慶負母逃賊刃其母以身翼蔽創幾死孤甥被掠天慶徒步走九江穿重壘求之以歸至本朝以貢生終夏元瑞字掄伯孝感人嘗拾遺金還其人後又有鬻幼子而遺金者元瑞為償之贖還流冦所掠婦女數十人歲饑煑糜粥所活無算又運米於湖南賑饑家竟以是貧寠池國鼎孝感人年八歲值明末冦亂其父他出祖母王氏年八十不能行家人各奔散國鼎獨依祖母不去賊至以身障祖母劫以刃傷首不為動賊義而釋之至本朝以貢生仕至蒲城令母喪哀毁卒黄文旦字敬渝孝感人博學篤行嘗容江右值金聲桓作亂欲招致之文旦夜踰城遁晚歲家益貧以文史日娯彭大夀字松友孝感人究心理學採先儒語錄參考經傳訂輯成書又輯朱子家禮及邱濬所裁定者斟酌時宜取可通行名曰通禮嘗授徒於雲夢遂家焉遠近問業者踵至當事欲見之以老辭卒無子門人為卜葬建祠劉承謨字君顯沔陽人順治中知臨高縣海冦陷城不屈死贈廣東按察司僉事賜祭葬廕子熊伯龍字次侯漢陽人順治己丑進士第二授翰林院編修厯官侍讀學士性孤介砥礪名節在館閣二十年文章推重一世好汲引後學精於藻鑑主試浙江督學順天及官祭酒多所識拔呉正治字賡菴漢陽人父嵓有孝行正治順治己丑進士由編修遷右庶子出為江西南昌道歲暮單騎行部按獄其非法淹繫者悉釋之遷陜西按察使誅巨猾民皆稱快内升刑部侍郎審釋江南無辜諸生二百餘人議奉行赦欵宜速禁狀外指攀皆切中機宜遷督捕侍郎時姦宄借逃人肆毒毎誣及平人正治疏請除十家連坐之令擢左都御史疏言緝逃事例及因歲旱請暫停直隸玉田灤州等處葢造旗兵營房厯禮工兩部尚書康熙十八年乞休諭嘉其端勤誠慎慰留之晉武英殿大學士後加太子太傅致仕卒諡文僖李昌祚字文孫若愚孫順治壬辰進士由翰林檢討出守河北大興水利累遷大盧卿盡心平反時鄖陽民聚衆祈雨誤毆長吏有司以謀叛聞昌祚平心讞之置為首者於法餘悉釋免廣東諸生某父為人毆死其人會赦免某擊殺之法司議抵罪昌祚援復仇議末減山東逆案株及無辜昌祚覈實省釋者無算以養母歸熊賜履字敬修祚延子順治戊戌進士官檢討館閣著作多出其手康熙中以學士上書數千言悉蒙嘉納遷掌院事尋拜武英殿大學士罷歸二十七年召授禮部尚書調吏部三十八年復入閣四十二年乞休卒諡文端有居官清正學問優贍之諭賜履八主文衡修實錄方畧明史等書皆充總裁官潛心理學所著有學統閑道劄記及文集若干卷姚締虞字厯升黃陂人祖錠事母至孝讀書馬鞍山雖大風雨必歸省締虞順治己亥進士任成都府推官屢辨冤獄改知安化縣捐俸代輸逋賦擢給事中厯僉都御史巡撫四川禁絶苞苴屬吏敬畏卒賜祭葬葉封字井叔黃陂人順治己亥進士官主事博學工詩與新城王士正等號十子羅誥字八書孝感人順治己亥進士以母老徒步歸養不仕孜孜講學聞遠近有同志者芒鞋襆被往訪求之年五十卒項一經字韋菴漢陽人順治己亥進士知建德縣土賊竊發率衆平之民閒生女多不舉一經為文勸誡其俗乃革厯汝南道副使汝俗役夫悍橫凡喪娶必索重貲乃行一經嚴懲之於是吉凶禮咸速舉官至貴州按察使武之亨孝感人順治進士知鳳翔縣撫綏有法給牛種免荒糧邑人德之擢慶陽府同知土賊嘯聚之亨率衆討平之後官至陜西提學僉事程正言字納菴孝感諸生少孤事母以孝聞讀書過目不忘待兄弟友愛無間有故人子無歸訪給田宅人咸義之子大純好學敦行誼由貢生官黃岡敎諭獎訓士類多所成就又同邑李惠父病疽吮之得愈後以孝行旌江蘩字采白漢陽人康熙拔貢授靈寶知縣河南自闖賊蹂躪田宅半汚萊我朝定鼎後減其額税惟靈寶虚糧二萬餘石尚未盡豁蘩至三請於院司竟得蠲免合境歡騰擢監察御史厯官左都御史張仲璜字半玉漢陽人由貢生授梧州府同知大蓉山巨盜盧元登數為民害仲璜計擒其魁餘黨皆散黃儀漢陽人父金階以孝行著康熙四十四年旌儀承父志益敦本行父殁貧不能葬守柩哀號及葬廬墓三年夜有巨蟒護之所植瓜皆一蒂二實及母卒哀毁如居父喪時觀者流涕雍正元年旌金階父子純孝時人名其所居為孝子里鄔光德字佑人漢陽人雍正五年歲歉流民四集光德建席棚百閒使得棲息出粟助官賑曹莊頻水捐築長隄數百丈設義渡建石橋置義塚隆冬施衣煑粥又捐資助普濟育嬰二堂費漢口鎮市廛稠密遇火輒延燒不止光德買民房當衝要者拆為火巷今大興巷大亨巷是也乾隆十一年以義行旌子明适能繼父志江夏沙湖濱江遇潦病涉明适捐囊築隄十里乾隆二十二年三十四年漢口雨值大水明适伐木為浮梁以便行者歳歉屢捐糴煑粥并荷旌表羅鳴序字懷夷漢陽人康熙舉人厯麻哈州知州雍正十二年兼攝黄平時方奉移駐新城之令而倉庫監獄皆在舊城明年古州苗叛直犯新城鳴序督兵守禦請援未至勢不支遣人賫兩州印赴省又密令舊城瘞庫金於他處及城陷保玉皇閣與賊巷戰力竭自經死事聞贈道銜廕恤如例予祀忠義祠嘉慶六年補給恩騎尉世職孫章字倬菴漢陽人由舉人厯刑部郎中出知惠州府免博羅夫役民立祠祀之平糶賑粥立法尤善總督趙宏燦薦升左江道未任而卒曾思謀漢陽人性至孝夏逢龍之變家人俱避匿思謀獨負父行賊執其母思謀乞以身代賊斫其臂思謀哀懇不已賊義而釋之母卒未葬隣火延其室思謀撫棺號慟不去比火熄前後俱燼惟停柩之室獨存既葬廬墓三年父遘疾思謀終夜䖍禱果瘳以侍疾勞瘁卒雍正九年旌妻彭氏守節奉舅雍正八年旌王戩字孟穀漢陽人博學工詩古文辭著突星閣集數十卷李堂字也升沔陽人乾隆壬戌進士厯知雲南禄豐定遠太和浪穹諸縣課農興學潔己愛民擢鹽井提舉遷沂州知府調湖州濬七十二漊疏通水利又倡建愛山書院與諸生講切士風為之一振後以親老告養歸熊天楷字芥圃漢陽人乾隆甲戌進士授清豐知縣時開州有割辮疑獄株繫多人知府李湖檄天楷覆審省釋者衆民慶更生黄河漫決檄州辦秫料天楷取羨金平買數日畢集不累閭閻遇偏災率先補助申請未下按户先給民無流亡徐諗字折衷漢陽貢生授布政司經厯厯漢州知州乾隆三十六年大兵討金川檄諗赴登春策應糧餉未幾逆酋犯營乃督衆拒賊力竭遇害事聞贈道銜廕恤如例予祀昭忠祠夏展成黄陂人善事繼母母癱痿展成扶持彌謹一夕夢神人令起行至旦全愈人以為孝感所致方光祀字振光漢川人山東陽穀縣典史乾隆中逆匪王倫倡亂光祀罵賊不屈死恩予卹廕姪兆義同時被害並入祀昭忠祠蕭文燦漢川人嵗貢生任當陽訓導嘉慶元年教匪陷當陽文燦墜樓死事聞䘏廕蕭効用漢陽人諸生蕭尭寀僕也巨猾孫景三劫堯寀金逮捕急聚衆夜至堯寀家手刃一老嫗遂誣堯寀殺人論死值巡按大讞効用列冤狀自刎於堂上以明主不殺人事得平反景三坐罪蕭篔漢陽人年十五聞父在都有疾涕泣赴侍傭書以養凡六載父殁扶柩旋楚舟至道士洑遇風覆篔抱柩漂流三十餘里有救之者篔手不釋柩因並柩獲焉時嚴寒篔已僵凍越日忽蘇自言姓氏里居乃强起向柩再拜曰吾從吾父於地下拜訖而絶鄉人哀之以其父柩並還篔聘妻胡氏聞信自經以救免守貞立嗣嘉慶十六年同旌流寓漢董永青州千乘人奉父徙居安陸殁不能葬鬻身傭干以營葬事董黯句章人事母孝比隣有王寄者母以黯能孝諷寄寄忌之伺黯出辱其母黯恨之及母死斬寄首以祭母自陳於官和帝詔釋其罪且召拜郎中不就元李孟上黨人徙居孝感生而敏悟倜儻有大志通貫經史遠近之士多從之至元三年拜中書平章政事同知樞密院卒諡文忠察罕西域板勒紇城人仁宗時官平章乞歸居孝感白雲山别墅以白雲自號人多稱其長者薩天錫蒙古人僑寓孝感傅學能文登泰定中進士列女宋汪涯母漢陽人涯以忤賈似道撾死母曰汝死於忠我則不辱可以下報先君矣亦自沉於江元武僉事妻陳氏漢陽人夫卒恐父母奪其志以墨自刺其面為痛念夫情四字誓不再嫁明袁子傑妻熊氏沔陽人年二十四夫亡守節終身永樂中旌表馬把攬妻王氏沔陽人把攬從軍亡王年二十五守節至死永樂中旌表劉養恬妻易氏孝感人字養恬未嫁養恬卒易往事姑姑卒葬畢絶粒死王備武妻梅氏黄陂人夫卒遺腹生子正德中流冦入境被執不屈毁其面年六十餘卒朱國臣妻馮氏黄陂人早寡富人强欲娶之馮斷髪焚其居得免有司坐富人罪而旌其閭萬一洵妻丁氏黄陂人夫卒家貧以女紅易食哺姑與遺孤而自啖糠覈姑殁以毁卒王某妻石氏漢陽人夫卒時有一子又有遺腹未生富民某百計謀娶之不從一日石舟過南湖富民於湖中劫之石抱其子投水死家訟之官誅富民為烈婦立碑張一魯妻黃氏漢川人一魯亡黃僅十六歲父憐其幼改聘涂姓黃聞之自經嬸許氏救之尋自剄嫂楊氏奪其刀得不死縣令聞之加旌獎復其徭役歲給帛粟吳景妻任氏沔陽人年二十五夫亡守節訓子姑患痿痺與同寝處左右抱持夜毎焚香籲天乞以身代姑殁蔬食終身宏治中旌又同縣呉紋妻高氏胡某妻張氏諸生張庠女曾聯妻郭氏陳之蘧妻費氏俱早寡誓死守節陳家棟妻劉氏黃陂人從夫至京師魏忠賢殺楊漣劉曰忠臣也贊夫收漣屍子世昌為九江小吏值流冦張獻忠入犯劉謂世昌曰戮力勤王庶不負所生世昌遂募健兒千人直搗賊營獻忠遁入夔州事聞擢世昌為總兵官封劉氏夫人卒年八十九袁三才妻龎氏黃陂人三才酗酒不務恒業謀質龎於富家龎知之泣曰我雖死不辱遂自剄郭方煜妻陶氏沔陽人年十八夫死有欲奪其志者一日晨起沐浴自經趙鈺妻鄭氏沔陽人鈺疾將死囘視鄭憕日不瞑鄭曰君得母疑我乎即自經於床楣鈺少甦囘盼出淚而絶黃日芳妻陳氏沔陽人日芳令霍邱崇禎八年流賊􅊳至城將破陳抱妾雲氏所生子卑老嫗逃出又顧妾李氏曰吾無德於汝當舍我去李泣不去同往治後赴水死譚德化妻楊氏黃陂人崇禎八年流冦至獲之複壁中大罵引刃死譚忠義妻黃氏黃陂人崇禎八年賊􅊳至隨姑匿夾室中為賊破壁取出姑被害黃奔河水淺不得没賊以亂石撃之頭腦盡裂不起賊怒以矛刺之身無完膚死李國祚女漢陽人流賊警倉卒出走遇賊欲汚之女且却且走身被數創至馬家湖邊終不可犯遂見害賊既去得其屍於湖中表裏縫密握拳透爪面色如生魏晉封妻吳氏漢陽人晉封卒百日哭祭畢自縊柩旁仲烈女湖川人隨父賈漢楊城破賊大索婦女執仲仲𠢐面披髪大罵賊命二賊挾之上馬終不肯行乃露刃迫之仲叱曰我豈畏死者遂見害汪卷妻徐氏漢陽人姑病刳肝救愈漢川尹大任妻龍氏亦割臂療姑王烈女漢川人許嫁未行聞夫卒自經死羅曰不從將刃汝邱曰我得死幸耳官兵旦夕至若求如我可得哉賊怒以油漬其衣束於木而焚之胡敬妻姚氏孝感人崇禎末李自成分兵陷孝感姚避亂南湖賊掠舟將入湖姚曰賊至必辱辱而後死晩矣遂攜二婢投水死張聲妻陳氏孝感人避亂萬金湖賊至羣赴水賊呼諸婦起曰起則生陳獨不起賊往援之罵曰死耳若何敢手我衣賊怒擊之陳抱其子入深水死丁之鴻妻宋氏孝感人之鴻避賊湖濱賊至宋呼其姒劉與女甥曰吾與爾皆婦人豈可為賊刃所汚相率投水死楊某妻唐氏孝感人唐鼇女字楊未嫁被賊執掖之上馬仆地不從刃脅之罵不絶口見殺時夏氏太衡女楊氏鳴桐女皆未字罵賊死王維侃妻余氏漢陽人崇禎末兵亂夫婦俱為所掠余紿兵釋夫遠去乃引頸就刃維侃感其節終身不娶李友桃女漢陽人左良玉兵叛女知不免預自約束凡衣裾閒無不重複紉綴賊至驅掖入舟將犯之女紿賊登岸即赴水賊怒引所佩刀殺之數日屍浮水面如生王明儉妻成氏漢川人左兵南卜與妾唐氏伏入池中恐不能免結帛相繆而死李正開妻駱氏漢川人為左兵所掠賊衆持刃逼之引頸受戮罵不絶口死周諏母何氏漢川人被左兵掠獲以手爪毁面兵怒斷其手足死王旦生妻程氏漢陽人旦生崇禎中副榜入京師流冦至程赴水死郭興妻張氏漢陽人興業漁為流寇所執欲殺之張請代遂見害熊鳴盛妻任氏漢陽人夫卒守節遇流寇被害女亦從死易可久妻陳氏漢陽人無子勸夫納妾生子兆羲開羲撫如已子流寇至罵賊死周烈婦漢陽人為流寇所掠欲犯之周毁賊面為賊所殺李珠妻徐氏漢陽人攜女避亂櫧山寇􅊳至欲犯之俱不從並見害羅漢鼎妻喻氏漢陽人為左兵所掠抗節死劉對生妻李氏太僕若愚次女李自成南遁肆掠李自沈於水子樹範樹駸從母死杜睆妻吳氏漢陽人流寇至語夫曰少緩死無及矣遂投水死馬呈祥妻楊氏漢川人夫卒小祥日自經死其姪敦義卒敦義妻殷氏亦於小祥日自經死有司表之曰雙烈曾烈女漢川人未嫁為流寇所掠罵賊死羅某妻胡氏漢川人白賊掠蔡店胡為所獲罵賊死張采妻萬氏漢川人婚數月值左兵肆掠投淺塘中以首埋入深泥死袁遵妻張氏黃陂人李自成南竄闔門被掠張及子婦段氏女袁氏俱罵賊死王立郁妻涂氏黃陂人避流寇於複壁閒賊搜得涂嚙賊斷指賊怒刃之碎首屠腸而死周伏受妻江氏孝感人夫卒楚王旗校欲占為妾自沉漳湖死沈時鼇妻易氏孝感人字時鼇未行夫卒自經死陳可化妻郭氏孝感人可化出游久不歸皆言已死强暴欲强娶之自經死陳于王妻郭氏孝感人夫早卒絶粒死楊洪柱妻萬氏孝感人字洪柱未行聞夫卒自經死徐遷繼妻席氏孝感人遷繼為武昌典史運餉卒於邊子甫數歲席扶櫬歸禫祭一慟而卒唐在衡妻湯氏孝感人生子三月夫卒撫孤為諸生娶婦生孫忌日設奠一慟而卒胡自聖妻黎氏孝感人夫卒既葬自經死高文煥妻乾氏孝感人夫卒守節李自成陷城投後園池中死程良孺妻傅氏孝感人良孺分司鳳陽倉流寇陷城傅懷勅印匿署左空屋賊焚屋搜匿傅額中刃復截一指死而勅印不失事聞旌表程正揆妻舒氏孝感人良孺子婦隨夫省親寇至死之唐烈妻陳氏孝感人流寇至義不受辱為賊所害同縣范允公妻沈氏魯近逵妻顔氏魯之筆妻李氏俱寇亂完節死彭焱妻胡氏老感人明末隨夫避亂黔陽㑹王進才作