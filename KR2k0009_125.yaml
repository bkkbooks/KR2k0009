置義豐長吉陽塘新蔡四縣八年省縣志黄梅舊治在縣西西去大河鋪一里其城址尚存長吉舊治在縣南二十里濯港之郭家嘴郭黙城在蘄水縣東通鑑陳大建五年郭默城降注晉氏不競劉石强盛郭黙轉徙而南築城以自保故有其名閻公城在麻城縣東閻家河畔相傳為閻伯璵故里竹敦城在麻城縣西北通鑑梁天監三年上遣馬仙琕築竹墩麻陽二城於三關南注麻陽即今黄州麻城縣翻車城在蘄州東元和志翻車故城在蘄春縣東南八十二里黥布歸漢築此城近翻車水因名江夏城在蘄州境寰宇記晉江夏王築樊噲城在廣濟縣南午山湖濱府志世傳漢高祖命樊噲征黥布築此屯兵徐平章城在廣濟縣西縣志元末縣人徐興舉賢良官平章築城縣西督兵禦紅巾賊賊相戒勿犯新城後蘄黄俱䧟而縣獨全今故址猶存東京城在黄梅縣境縣志與西京城皆黥布所築董公城在黄梅縣南濯港之南縣志昔有董姓者於此築城以避水與兵故名藥師城在黄梅縣北二十里縣志唐李藥師領兵過此築以避寇百萬城在黄梅縣東北縣志相傳唐曾元裕駐兵之所一名桐坡砦下有百萬坡相傳亦元裕所鑿馬柵在黄岡縣北通鑑梁大寶元年邵陵王綸引齊兵營馬栅距西陽八十里東坡在黄岡縣治東宋朱彧可談蘇子瞻謫黄州居州之東坡自號東坡居士其地今屬佛廟南坡在黄岡縣東南宋蘇軾集古氏南坡修竹數千竿盛夏不見曰蟬鳴鳥呼有山谷氣象竹林之西又有隙地數畝種桃李雜花陸游入蜀記坡西竹林古氏故物號南坡今已殘伐無幾地亦不在古氏矣龍邱在黄岡縣北一百二十里宋陳慥居此以地為號杏花村在麻城縣西南𡵨亭鎮有杏林杏泉宋陳慥隱處臨臯館在黄岡縣南大江濱亦名臨皐亭宋蘇軾與朱康叔尺牘已遷居江上臨皐亭甚清曠風晨月夕杖履野步酌江水飲之横江館在黄岡縣西明統志在赤壁山南晉龍驤將軍蒯恩建涵輝閣在蘄州北舊城方輿勝覽蘇子瞻在黄客有道其霽容天在水春態柳藏橋之句先生以色字易態字益賦涵輝閣也自是涵輝之名益著琴臺在黄岡縣西北三江口縣志相傳宋柳世隆破沈攸之嘗鼓琴於此鳳凰臺有二一在羅田縣西輿地紀勝羅田縣西三十里有鳳凰臺一在蘄州東北輿地紀勝在蘄春縣北鳳凰山百鳥無棲止其上者鮑照讀書臺在廣濟縣東北東衝山上涵暉樓在府治宋韓琦有詩張孝祥取赤壁賦中語改曰無盡藏樓後又有坐嘯堂及無倦味道二軒棲霞樓在黄岡縣西南陸游入蜀記棲霞樓本太守閣邱公所作樓頗華潔先是郡有瑞慶堂謂一故相所生之地後毁以新此樓月波樓在黄岡縣治西明統志月波樓在府治西北城上不知建自何代宋王禹偁有詩舊志以為禹偁建者誤詩序甚明今漢川門樓即其址竹樓在黄岡縣治西北宋王禹偁有記陸游入蜀記循小徑繚州宅之後至竹樓䂓模甚陋樓下稍東即赤壁磯鏡心樓在黄岡縣東北元建睡足堂在府治明統志王禹偁建取杜牧憶黄州詩平生睡足處雲夢澤南州之義相隱堂在府治側名勝志龎籍初為郡司理及後入相邦人即其地建堂因名雪堂在黄岡縣治東宋蘇軾建有記入蜀記東坡地勢平曠東起一壟頗高有屋三閒曰居士亭亭下面南一堂有東坡像是為雪堂方輿勝覽東坡去黄之日以雪堂付潘大臨兄弟居焉崇寕壬午黨禁興堂遂毀其後邦人屬神霄宫道士李斯立重建府志雪堂在城東明洪武戊申展築郡城舊址遂在城内今縣學其基也宏治閒改建於府沿東隅與竹樓相對東坡嘗於雪堂前植梅一株至嘉靖後始枯知府郭鳳儀廬之西南為亭以覽觀江山之勝而予兄子瞻名之曰快哉遺愛亭在黄岡縣治南明統志宋元豐中徐君猷為守有善政既去蘇軾以此名亭曡嶂亭在蘄水縣城内宋蘇軾所名洄瀾亭在蘄水縣南明統志在縣南蘭溪岸蘇軾游此見水盤旋書二字於石壁後人立亭名勝志洄瀾龍潭俱在城南蘇子瞻乘月泛舟處萬松亭在麻城縣西七里岡宋蘇軾萬松亭詩序麻城縣令張毅植萬松於道周以庇行者且以名其亭四見亭在蘄州西北舊治内宋治平中范純仁知蘄州建方輿勝覽四見亭在州北塔後環翠亭在蘄州西北舊城宋建輿地紀勝超然觀環翠亭俱在蘄春郡城鴛鴦亭在黄梅縣城内縣志世傳徐拭妻齊氏夫婦相和敬齊事姑甚孝所居有塘畜雙鴛鴦齊毎稱觴鴛鴦隨之姑死鴛鴦飛去齊思姑不已竟殞徐亦随亡里人悼之以思姑名其巷并建亭名鴛鴦云置馬亭在黄梅縣境後漢書郡國志尋陽有置馬亭劉勲士衆散處璧陰齋在黄岡縣城内方輿勝覽洪芻黄魯直之甥爲黄之其室爲璧陰齋魯直酒正名爲之銘前纂修官臣羅家彦恭纂總纂官臣廖鴻藻恭覆輯校對官臣周春祺恭校
