舊五之四且命吏曰吾知守已而已無妨後人勿著爲式仇悆益都人徽宗時爲高密丞攝縣事剖決如流事無淹夕民至懷餅餌以俟決遣猾吏楊蓋每隂疏令過脅持爲姦悆暴其罪黥之無不悦服州闕司録命悆攝事既行邑氓萬餘邀留至擁歸縣廨寇起萊密間戒其黨無犯高密境民賴以安宗澤義烏人知掖縣部使者得㫖市牛黄澤報曰方時疫癘牛飲其毒則結為黄今和氣横流牛安得黄使者怒欲劾邑官澤曰此澤意也獨銜以聞韓浩安陽人丞相琦孫守濰州建炎初金兵攻城浩率衆死守城陷力戰死通判朱庭傑身被數箭亦死權北海縣丞王允功司理叅軍王薦皆全家陷没浩特贈三品官官其家三人廷傑允功薦各官其家一人金劉仲洙宛平人明昌初為定海軍節度使歲飢仲洙表請開倉未報先為賑貸有司劾之罪以贖論王維翰龍山人貞祐初為定海軍節度使至鎮無兵備鄰郡皆望風奔潰維翰以孤城不可守乃縱百姓避難率吏民願從者奔東北山結營自守力窮被執不肯降妻姚氏亦與俱死詔贈中奉大夫姚氏芮國夫人謚貞潔元劉秉恕邢州人至元初為萊州總管有死囚六人獄己具秉恕疑之詳讞得其實六人賴以不死所至俱有惠政明趙禮洪武中知膠州膠為商舶輻輳之地吏多倚税為奸禮禁絶之遠近皆悦服凡州之城郭公署學宫壇壝皆禮所建置吳履蘭谿人洪武中知濰州山東民多以牛羊代税履與民計易以輸粟濰人德之居濰二年以愛民爲本有訟召而面直之不忍置於獄獄屢空馬伯行洪武中昌邑縣丞亷潔自守布衣糲食澹如也其妻子乗間言公居官乃澹薄如是伯行怒曰爾欲使我爲善耶欲使我爲非耶王眞鼇山衞指揮永樂中妖賊唐賽兒率黨衆圍諸城真率兵一百五十人擊賊衆盡戮之械首惡送京師擢真都指揮僉事仇鎮汾西人正統中知膠州膠州地鹹薄民多逋逃居者有包納之累鎮奏除荒地三千九百餘頃蠲税糧一萬七千餘石歲爲定額其後賦税易完野田日闢崔恭廣宗人正統中擢萊州知府循行屬邑獎善良去貪暴増繕學宫勤諸生訓課又善辨冤獄歲大旱蝗親督捕焚瘞發倉賑貸奏免逋租全活甚衆萊人歌頌比之漢楊震蕭昱山隂人成化中知高密縣招流亡爲鑄農噐使耕曠地縁河修隄濬溝人得盡力耕墾卒於官百姓號泣送之李楘任邱人宏治中知萊州府捕刼盜六十餘人招徠流亡數千人時勾稽屯地多議牧馬於萊楘力爭獲免氏飢輒發粟施粥暇則修葺學舍勵諸生以行業萊人爲刻石頌德蔡顯萊州衞人正德中本衞指揮僉事土賊入境顯禦之兵潰與三子淇英順俱戰死事聞贈顯都指揮僉事淇等並贈官雷子堅綏德州人正德中知平度州值土寇刼掠繕城池治噐械賊引去州賴以全于仕亷金壇人萬厯中分守萊州海右道叅議以倭警與萊州守王一言掖縣令衞三省築郡城備守禦後李九成寇萊州攻圍七月城堅不破萊人追德之爲刋其萊城議畧行世沈九疇鄞縣人萬厯中分守萊州海右道叅議平度飢民鼓煽九疇單車赴之擒治渠魁事賴以定朱萬年黎平人崇禎中知萊州府叛將李九成等陷登州率衆犯萊被圍數月賊詭乞降萬年往受爲賊所執萬年曰爾執我無益可以精騎從我呼守者出降賊果以五百騎擁至城下萬年大呼曰我被擒誓必死賊精鋭盡在此急發砲擊之砲發賊死過半萬年遇害事聞贈太常卿賜祭葬有司建祠官其子陳所聞文安人崇禎中知平度州李九成攻州城所聞率衆死守城破不屈遂遇害事聞贈太僕卿廕子入監盧宏引廣平人崇禎中平度州州同署知州事大兵下平度宏引死之同時殉者吏目房増偉李萃秀束鹿人崇禎中知昌邑縣大兵下昌邑萃秀死之本朝徐大用奉天人任萊州府知府清亷惠民尋以叅議道分守萊州順治十年膠鎮海時行為逆逼大用同入海不從遂遇害州人建憫忠祠祀之李煌宣城人為萊州推官海時行為逆召之煌至大罵不屈死吳友名商邱人順治十年任膠州營遊擊時鑒於海逆之變嚴肅隊伍輯和兵民與守土官協衷撫恤盡力保障後升即墨營叅將與膠唇齒相依前後凡五年恩澤沾溉民至今感頌之康霖生磁州人康熙初任即墨縣知縣清釐賦役夙弊頓除城北向係曠野無居民霖生捐俸為立􅒡市不數年闤闠櫛比邑資保障焉盧豫鑲紅旗舉人康熙五年任濰縣知縣留心民事常單騎走田野間咨詢疾苦遇士子則講論終日人不知其為長吏也在任六年濰人感而祀之人物漢蓋公膠西人孝惠初曹參為齊丞相聞蓋公善治黄老言使人厚幣請之蓋公為言治道參於是避正堂舍蓋公焉王仲不其人好道術明天文諸召作亂齊哀王襄謀發兵而數問於仲及濟北王興居反欲委兵師仲仲懼禍及乃浮海東奔樂浪山中王吉臯虞人少好學明經舉賢良為昌邑中尉王好遊獵吉上疏諌甚得輔弼之義久之霍光迎昌邑王吉即奏書戒王王既廢昌邑羣臣皆誅惟吉與龔遂以忠直數諌得減死復徵博士諌議大夫上疏言得失宣帝以其言迂濶不甚寵異遂謝病歸吉與貢禹為友世稱王陽在位貢公彈冠言其取舍同也元帝初即位遣使者徵貢禹與吉吉年老道病卒上悼之復遣使者弔祠云費直東萊人治易為郎至單父令長於卦筮亡章句徒以象象繋辭十篇文言解說上下經庸生膠東人孔氏有古文尚書孔安國以授都尉朝都尉朝授庸生庸生授清河胡常少子房鳯不其人以射䇿乙科為太史掌故太常舉方正為縣令都尉王根薦鳯明經通達擢為光禄大夫遷五官中郎將劉歆白左氏春秋可立哀帝以問諸儒皆不對鳯移書責讓太常博士上出鳯九江太守至青州牧王駿吉子初吉兼通五經能為騶氏春秋以詩論語教授好梁邱賀説易令子駿受焉駿以孝亷為郎左曹陳咸薦駿賢父子經明行修宜顯以厲俗光禄勲匡衡亦舉駿有専對才遷諫議大夫帝欲大用之出駿為京兆尹試以政事尋為御史大夫卒子崇以父任為郎厯刺史郡守治有能名累官大司空封扶平侯謝病乞骸骨避王莽也鄭崇高密人少為郡文學史至丞相大車屬傳喜為大司馬薦崇哀帝擢為尚書僕射數求見諌爭上初納用之每見曳革履上笑曰我識鄭尚書履聲久之上欲封祖母傳太后從弟商崇諫又以董賢貴寵過度諌由是重得罪尚書令趙昌奏崇與宗族通疑有奸上責崇曰君門如市何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄窮治死獄中逢萌都昌人家貧為亭長既而嘆曰大丈夫安能為人役哉遂去之長安縗絰赴㑹千餘人康成所注凡百餘萬言經傳洽熟稱純儒齊魯間宗之子益思孔融舉為孝亷及融為黄巾所圍益恩赴難隕身三國魏王基曲成人少孤叔父喬撫養甚篤基亦以孝稱黄初中察孝亷除郎中擢中書侍郎明帝盛修宫室上疏諫累官荆州刺史擊吳移其降民置夷陵縣高貴鄉公即位封常樂亭侯母邱儉文欽作亂以基為行監軍進兵逼項欽衆遂敗封安樂鄉侯上疏求分户二百賜叔父喬爵關内侯以報恩有詔特聽諸葛誕反基以本官行鎮東將軍事淮南定進封東武侯卒追贈司空諡曰景侯按舊統志登州府人物載三國王基考登州府所屬招遠縣為漢曲成地屬東萊郡今在縣治西四十里元魏以其地置東曲成而漢之曲成縣厯三國晉俱為郡治後分為西曲成省入掖縣王基本三國時人似當載入掖縣今從志内王章例改入萊州府晉劉毅掖人㓜有孝行勵清節魏末辟司隸都官從事京邑肅然咸寕初為司隸校尉糾正豪右時人方之諸葛豐蓋寛饒毅夙夜在公言議切直為朝野所式瞻然以峭直故不至公輔年七十告老以光禄大夫歸第卒武帝撫几驚曰失吾名臣不得生作三公即贈儀同三司劉暾毅子正直有父風武帝時累官侍御史武庫火尚書郭彰率百人自衞而不救火暾正色詰之彰伏不敢言遷太原内史趙王倫假征虜將軍不受與三王共與義惠帝復阼為左丞正色立朝三臺清肅五為司隸允恊物情王彌入洛百官殱焉彌以暾鄉里宿望故免於難後至東阿為石勒遊騎所獲遂遇害劉敏元北海人厲已修學好星厯隂陽術數永嘉末自齊西奔同縣管平年七十餘隨敏元西行及滎陽為盜所刼敏元已免乃還謂賊曰此公孤老敏元請以身代有一賊瞋目叱曰吾不放此公憂不得汝乎敏元奮劍曰吾豈望生耶當殺汝而後死前將斬之盜長遽止之而相謂曰義士也害之犯義乃俱免之後仕劉曜為中書侍郎太尉長史南北朝北齊趙僧巖北海人寥廓無常人莫能測劉善明為青州欲舉為秀才大驚拂衣而去後棲遲山谷常以一壺自隨一旦謂弟子曰吾今夕當死至夜果亡時人以為知命周唐永平夀人少有將帥才讀班超傳慨然有萬里之志正光中為北地太守永善馭下士人競為之用在北地四年與賊數十戰未嘗敗北永所營處至今猶稱唐公壘也累加衛將軍封平夀伯卒贈司空子陵少習武藝頗閑吏職位大都督應州刺史車騎大將軍儀同三司陵子悟美風儀博涉經史文詠可觀周大象中位至内史下大夫漢陽公唐瑾永子年十七周文聞其名因召拜尚書員外郎累遷尚書右丞吏部郎中於時魏室播遷庻務草創朝章國典瑾並參之遷戸部尚書轉吏部子謹南伐江陵以為元帥府長史軍中謀畧多出瑾焉江陵既平衣冠仕伍并没為僕隸瑾察其才行有片善者輒議免之軍還唯載書兩車歸論功進爵為公屢進司宗中大夫兼内史卒謚曰方瑾性方重有風格又好施與禄賜常散之宗族朝野稱之隋段艾振北海人少有膂力膽氣過人性剛直明達時務為宇文䕶親信授中外府兵曹武帝攻齊海昌王尉相貴於晉州文振有力焉後歸高祖伐陳授大將軍大業初以功進位右光禄大夫遼東之役卒於帥贈尚書右僕射北平侯諡曰襄松贇北海人性剛烈重名義為石門府隊正大業末賊楊厚來攻北海縣贇輕騎覘賊為厚所獲厚令贇謂城中云郡兵已破宜早歸降贇偽許之既至城下大呼曰我為官軍覘賊邂逅被執非力屈也今官軍大來賊徒寡弱旦暮擒翦不足為憂賊以刀築贇口斬斷其腰城中望之莫不流涕北海卒完户曹郎郭子賤上表奏之贈朝散大夫本郡通守唐張允濟北海人任隋為武陽令以愛利為行舉政尤異遷高陽郡丞郡缺太守獨統郡事吏下畏悦貞觀初累遷刑部侍郎封武城縣男擢幽州刺史蔣欽緒膠水人工文辭擢進士第累遷太常博士中宗始親郊國子祭酒祝欽明建言皇后應亞獻詔禮官議衆曲意阿徇欽緒獨抗言不可諸儒壯其節開元中以御史中丞録河南囚宣慰百姓賑窮乏徙吏部侍郎厯汴魏二州刺史卒性孤潔自守惟與賈曽郭利貞相友云蔣沇欽緒子博學少有名以孝亷授洛陽尉遷監察御史與兄演溶弟清俱為才吏有名天寳間沇累遷大理卿持法明審德宗出奉天沇奔行在為賊所拘欲誘署偽職沇絶食不應命竄伏里中不復見京師平乃出擢右散騎常侍卒蔣清沇弟舉明經中第調鞏丞東京留守李憕賢之表為判官與憕同死安禄山亂贈禮部侍郎太和初追諡曰忠郭航萊州人李師道叛郭昈為繒書藏衣絮間使航間道見李愿請兵擣賊愿白諸朝不得報航還昈所未幾師道召航昈疑事露欲引決航曰事覺吾獨死君無患卒自殺宋王廷義掖人開寳二年領横州團練使從征太原親鼓士乘城矢中其腦而卒贈建雄軍節度鞠常高密人少好學善屬文漢乾祐進士開寳中擢著作佐郎時任此官者惟常與楊徽之李若拙趙鄰幾四人皆有名於時徐承珪掖人㓜失父母與兄弟三人及其族二十口同甘藜藿衣服相讓厯四十年不改其操所居崇善鄉緝俗里木連理瓜瓠異蔓同實乾德初詔改鄉名義感里名和順吕昇萊州人父權失明剖腹探肝以救父疾父復能視而昇不死淳化中下詔賜粟帛祁暐膠水人淳化進士天禧中知濰州母卒葬州城南暐就墳側構小室號泣守䕶蔬食經六冬有白烏白兔馴繞墳側州人異之以狀聞詔賜粟帛今長吏每月存問蔡齊其先洛陽人曽祖綰爲膠水令因家焉齊舉進士第一儀狀俊偉舉止端重眞宗見之顧宰相寇準曰得人矣詔金吾給七騶傳呼以寵之狀元給騶自齊始也仁宗時累遷侍講學士太后修景德寺命齊爲記齊久之不上錢惟演附丁謂樞密題名輒削去寇準姓氏齊言於仁宗遽令磨去拜禮部侍郎參知政事卒諡文忠齊方重有風采性謙退不妄言有善未嘗自伐所薦龎籍楊偕劉隨段少連後率爲名臣孫祖德北海人進士及第累官尚書屯田員外郎通判西京留守司方冬苦寒詔罷内外工作而錢惟演督修天津橋格詔不下祖德曰詔書可稽留耶卒白罷役入爲殿中侍御史請章獻太后還政擢知諌院言郭后不當廢獲罪久之遷天章閣待制累除吏部侍郎致仕卒宋摶掖人開寳中得第累遷司封員外郎河東轉運使在任凡十一年經制漕運以幹治稱連徙他州郡輒乞留累秩刑部郎中使遼會疾遼主以車迎之二年卒吳奎北海人性强記於書無所不讀舉五經䇿賢良方正入等擢太常博士厯拜樞密副使神宗初參知政事御史中丞王陶以論事詆韓琦奎狀其過陶疏奎阿附出知青州司馬光諌曰奎名望清重今為陶絀奎恐大臣皆不自安乃召歸中書及琦罷相奎竟出知青州卒諡文肅林廣萊州人以捧日軍卒累立戰功拜衞州防禦使馬軍都虞侯為人有風義輕財好施學通左氏春秋臨事持重長於料敵以智損益八陣圖又撰約束百餘條列上邊地頗推行之其名聲聞於西夏王仲寳高密人初為刑部吏補章邱尉以捕盜有功厯官東上閣門使元昊寇延州仲寳將兵至賀蘭谷敗蕃將羅逋於長雞嶺遷涇原路總管安撫副使兼管勾秦鳯路軍馬事與西羌戰六盤山俘馘數百人時任福大敗好水川别將朱觀被圍仲寳以兵救之徙環慶路副都總管再徙澶州范仲淹以仲寳武幹未衰奏留之明年除左屯衞大將軍致仕卒蔡延慶齊從子中進士第累拜天章閣待制秦鳯等路都轉運使以應辦熙河軍需功進龍圖閣直學士王韶進師河州羌斷其歸路延慶檄兵赴救羌解去韶入朝延慶攝熙帥元夕張燈羌乘隙伏兵北關下遣其種二十九人偽請來屬將舉火内應延慶覘知悉斬以狥伏者宵潰厯官工部吏部侍郎延慶有學問平居簡黙遇亊能别白是非所至有惠政既為伯父齊後齊晚得子乃歸其宗籍家所有付之萊人義焉劉閴北海人以拳力為軍校從文彦博討貝州議者欲穿地道入閴曰穴地積土賊且知之城瀕河若晝囊土而夜投諸河宜無知者彦博以為然穴成閴持短兵先入衆始從登陴引繩而上遲明師畢入貝州平功第一屢擢冀州駐泊總管以左金吾大將軍致仕侯蒙高密人進士及第屢擢殿中侍御史星變求言蒙疏十事徽宗有大用意西將高永年死於羌帝怒親書五路將帥姓名敕蒙往秦州逮治既至奏釋劉仲武等不問累進尚書左丞中書侍郎忤蔡京罷知亳州宋江寇京東蒙上書言不如赦江使討方臘以自贖帝曰蒙居外不忘君忠臣也命知東平府未赴而卒綦崇禮高密人後徙濰之北海幼頴邁十歲能作邑人墓銘登重和元年上舍第高宗時召試政事堂為制誥三篇不淹晷而就辭翰奇偉拜中書舍人除吏部侍郎兼權直學士院時省曹簿書殘毁幾盡崇禮執銓法熟於典故吏不得容其私尋除翰林學士凡所撰詔命數百篇深得代言之體以寳文閣直學士知紹興府金人入侵崇禮得便宜行事七州晏然期年上印綬退居台州卒周中濰州人建炎中金兵攻城率家人乘城拒守中弟辛盡散其財帛以享戰士城陷中闔門百口皆死紹興中贈官朝議大夫辛次膺萊州人幼孤俊慧力學甫冠登政和進士第累遷吏部郎高宗召見首言救世之弊上勅所奏榜朝堂擢右正言屢劾秦檜妻兄王仲嶷王㬇章留中求去除直秘閣湖南提刑檜死屢起擢權給事中每章疏出天下韙之厯拜𠫭知政事以疾力祈免除資政殿學士提舉洞霄宫次膺孝友清介立朝蹇諤仕宦五十年無絲毫挂吏議為政貴清靜先德化所至人稱其不煩善屬文尤工於詩金錫占暉其先附於遼後家萊州暉慷慨有志畧遼季授禮賓副使領萊隰遷潤四州屯兵天輔六年降仍領其衆宋人乘間陷海州帥府以登萊沂密四州委暉經畫敵無敢窺其境者為定海軍節度使遷尚書右丞累封榮國公卒錫占暉舊作赤盞暉今改正徒單克安本名習顯其先金源縣人後占籍萊州克安資質渾厚寡言笑善騎射有勇畧大定𥘉厯左翼都統討遼遼平除太原尹尋治兵伐宋遂取楚州兵罷屢擢樞密副使世宗幸上京克安留輔太子行左丞相事太子薨克安嚴飭禁衞章宗時為郡王克安召太子侍讀完顔匡謹視勿去左右世宗還京師表請立皇太孫以繫天下望世宗嘆曰社稷臣也封延安郡王章宗立累進太師封淄王薨遺表言不及私諡曰忠烈配享世宗章宗廟廷圖像衍慶宫元王國昌高密人初為膠州千户中統初入覲世宗察其能遷左武衞親軍千户召問軍旅之事奏對甚悉帝嘉之人有上書言高麗境内黒山海道至宋境為近帝命國昌往視之泛海千餘里風濤洶湧從者恐勸還國昌神色自若遂至黒山乃還㑹遣使入日本命國昌屯於高麗之義安郡以為援卒於軍張緝膠人性孝友能詩文至正中領鄉薦由澤州儒學正轉泰州幕職棄之養親居揚州㑹亂賊突入卧内舉槍欲刺母姫氏緝以身蔽槍中緝脇三日而死明隋贇即墨人洪武初授英山主簿擒陳友諒餘孽王玉兒送京師太祖召見賜宴勞之累擢廣東按察使侯庸平度人生七歲父坐事謫閩南稍長母告之庸悲痛誓贖父罪洪武間舉進士拜吏科給事中請納官代父辭甚哀切上憫之詔還其父庸至謫所迎歸尋升吏部侍郎吕讓平度人洪武進士官行人使安南國王饋黄金及諸貨幣讓却之曰尉佗以區區之越與天子抗衡是召禍者也陸賈受金以分諸子是苟利者也王顧以尉佗自處而以陸賈處人何其陋哉後擢御史終陜西僉事鄧燧高密人洪武舉人任南和教諭署縣事燕兵起堅城固守後坐謫戍興州以死薛禄膠人起行伍從成祖起兵功最著累擢右都督封陽武侯仁宗立加太子太保予世券宣宗時加太保卒贈鄞國公諡忠武禄有勇而好謀紀律嚴切又善撫士卒人樂為用巋然為時宿將張信掖人以孝行聞永樂初命為尚寳司丞升少卿凡上表奏翰林書辭用寳函封畢授尚寳以髹版夾䕶然後行一日所上髹版内夾敵故紙命召問之其同官教之援翰林以覬倖免信曰不敢自欺况敢欺君父乎廷論重之儀智高密人洪武末舉耆儒厯知高郵州寳慶府並有聲累遷禮部左侍郎久之侍皇太孫講讀智有學行議論必持正年八十致仕卒季子銘厯官兵部尚書兼詹事孝友正直士論許之黄福昌邑人洪武中以太學生厯金吾前衞經厯工書論國家大計太祖奇之超拜工部右侍郎成祖初既郡縣交阯命福以尚書兼掌布政按察二司事福在交十九年威惠兼行交人感服仁宗立召還宣德初交阯復叛命福佐師征之失利交人獲福拜且泣䕶送出境英宗時加少保參贊南京守備卒福厯事六朝公忠廉恕憂國忘家老而彌篤兵部侍郎徐琦使安南回福與相見石城門外或指問安南來者曰汝識此大人否對曰南交草木亦知公名安得不識成化初贈太保諡忠宣戴綸高密人永樂中自訓導擢禮科給事中簡侍皇太孫講讀太孫好馳獵綸數諫諍深恨之及即位由洗馬擢兵部侍郎又以諫獵忤㫖出贊交阯軍務未幾坐怨望逮下詔獄帝親鞫之綸抗辨立撞死欒瑄膠人正統進士官刑部員外有中貴逮獄同官不敢鞫瑄按之卒置之法衆推服尋出知大同府境内晏然官亷平度人成化進士官户部郎中景州有民田萬頃界接東宫莊田為内侍冐占遣亷往勘内侍語亷曰田如歸我講讀官可得也廉曰以萬人命易一官吾所弗能竟以所占田歸之民藍章即墨人成化間進士擢御史屢遷左僉都御史忤劉瑾左遷撫州通判瑾敗復起巡撫陜西時蜀保兒寇掠漢中章選將練兵殱其首惡餘黨悉平終南京工部侍郎李介高密人成化進士選庻吉士改御史陳時政數事帝多採用之宏治初巡撫宣府厯兵部左右侍郎北寇謀犯大同命介往督軍餉介選將練兵大修戎備先後條上便宜十二事卒贈尚書毛紀掖人成化進士正德中累遷禮部尚書尋為大學士入預機務武宗南征紀佐楊廷和居守世宗即位録定䇿功加伯爵再疏辭免嘉靖初帝欲追尊興獻閣臣執奏忤㫖紀疏救之傳㫖切責遂乞歸里紀有學識居官亷靜簡重卒贈太保諡文簡匡翼之膠人成化進士擢御史累官四川副使時威茂土番寇擾翼之單騎詣營諭以禍福悉歸順以忤劉瑾謫知桐廬縣瑾既敗起廣東按察使高廸膠人宏治舉人厯太僕丞奉使宣大二鎮守令贐以金迪却之守臣曰例也迪笑曰以却金為例於後不亦可乎時稱其亷介藍田章子正德進士擢御史爭大禮被杖張璁掌都察院考察其屬落職歸先後論薦三十餘疏終不起翟瓚昌邑人正德進士授工科給事中有直聲出為河南僉事青羊寇反瓚首破賊巢厯升湖廣巡撫平安鄉巨寇以憂歸屢薦不起王邦直即墨人嘉靖中由明經為鹽山丞上書條奏十事優㫖褒答平生精研律吕著樂書正聲四十卷劉應節濰人嘉靖進士隆慶中以兵部右侍郎總督薊遼保定軍務奏罷永平密雲霸州采礦又議通漕密雲與清軍補兵之䇿一切規畫俱防邊要政累擢刑部尚書卒張鯉膠人萬厯中由明經厯知内鄉芮城二縣遷鄭府審理冡宰陸光祖舉天下清苦官鯉與焉升周府長史王漢掖人崇禎進士知高平縣調河南屢擒巨寇以計解李自成之圍尋授御史監左良玉軍救開封追賊朱仙鎮連戰皆㨗擢右僉都御史巡撫河南總兵官劉超叛漢密疏請討為兵部所洩巷戰死詔贈兵部尚書建祠致祭錢祚徵掖人崇禎時舉人厯官汝州知州蕩平土寇民賴以安十四年李自成來寇祚徵乘城死守身中流矢罵賊而死本朝乾隆四十一年賜諡節愍宋明佐昌邑人舉人撫後母弟友愛備至崇禎十五年大兵下昌邑死之本朝乾隆四十一年賜入忠義祠王曦如即墨人邑諸生李自成陷京師曦如衣冠詣文廟長號再拜以母老不敢即死八月母殁㬢如營葬畢乃自縊本朝乾隆四十一年賜入忠義祠何復平度人崇禎進士知高縣有却賊功厯知保定府時李自成遣其黨出固關正定同知邵宗元集議守城復聞之馳至相與僇力備禦賊攻益厲雉堞盡傾火箭中城西北樓焚死本朝乾隆四十一年賜諡烈愍高宏圖膠人萬厯進士官御史天啟初巡按陜西澄清吏治風裁肅然以忤魏忠賢罷職崇禎中厯遷工部右侍郎以爭中官張彝憲坐制復削籍歸福王時宏圖以户部尚書與姜曰廣協心輔政為馬士英阮大鋮所嫉遂謝政流寓會稽後絶粒而卒年本朝乾隆四十一賜諡忠烈本朝法寰膠人明天啟進士好讀書授徒墨水之濱多所裁成本朝除靜海知縣有惠政膠鎮海時行叛時寰里居罵賊而死二子爽選皆遇害張宏範膠人庠生家貧授徒至性孝友年五旬乏嗣妻趙氏為置一妾將就寢詢知妾故有夫縁被重累不得已自鬻遂危坐達旦即遣還之為士論所推卒祀鄉賢祠姜汝俶掖人順治元年由貢生授河間府推宫五年遷懷慶府通判未去任値姜瓖叛以運糧抵安郭驛聞賊至嘅然曰我當以死拒之解佩刀殺數賊力絀遇害劉方至掖人順治元年以恩貢授紹興府推官清介公明署上虞縣事山寇陷城不屈死之張愫掖人順治二年以貢生授紹興知府時海寇陷城死之藍潤即墨人順治丙戌進士自庻吉士厯徙侍從督學江左務拔寒畯轉福建右參政值海寇攻榕城率衆守之城得完又補廣東左參政招降蘆田横水諸寇尋秉臬江南轉楚藩坐前罣誤事削職歸郭琇即墨人少厲志清苦讀書深山中康熙庚戌進士知吳江縣循聲第一擢監察御史時江南困於水患琇首疏特㕘河臣累遷都察院左都御史風紀肅然以事放歸田里己卯起副都御史總制湖廣請改折南糧奏銷緩征減更名田租等疏天下受其賜以五疏乞休卒單烺高密人乾隆己未進士初知龍門縣勸民墾種改其專事畜牧之俗民便之厯宛平及西路同知復知廣平府與鉰仁府皆有政聲嘗言民為邦本愛民即所以報君也在廣平日民有議立烺生祠者斥止之民詣署羅拜去銅仁苗民多田土獄烺釐剔宿弊入其巢穴諭勿恃險為患皆感遵約束烺有至性能任事好學工詩著有大崑崙山人集韓夢周濰人乾隆丁丑進士知安徽來安縣有實政有文集行世胡邦佑昌邑人父有亮官湖廣衡州協副將乾隆八年邦佑由廕生厯任浙江貴州知府縁事革職再選雲南永北同知三十一年緬旬用兵轉餉軍中城陷遇害贈道銜王文章掖人由行伍洊升貴州鎮遠右營守備嘉慶四年隨剿賊匪力戰死李毓昌即墨人嘉慶戊辰進士江蘇即用知縣是年秋委查淮安府山陽縣賑務以不肯扶同侵冒為知縣王伸漢毒薨事聞得賜䘏有㫖加知府銜即照知府例御製憫忠詩三十韻勒碑墓左其叔泰清給武舉嗣子希佐給舉人准其一體㑹試十七年入祀鄉賢祠流寓漢公孫宏甾川薛人少家貧牧豕海上濰縣西南二十里程符山之麓有讀書臺在焉武帝時對䇿擢第一厯丞相封平津侯淳于恭淳于人善説老子清靜不慕榮名建武中郡舉孝亷司空辟皆不應客隱琅邪黔陬山遂數十年宋明僧紹平原鬲人明經有儒術永光中鎮北府辟功曹不就隱長廣郡嶗山聚徒立學列女晉韋逞母宋氏不知何郡人家世以儒學稱宋氏㓜䘮母及長父授以周宫音義後徙山東宋氏與夫推鹿車背負父所授書依膠東富人程安夀逞時年少宋氏晝則樵採夜則教逞逞遂學成名立事苻堅為太常堅憫禮樂遺闕時博士奏宋氏傳父業可以傳授後生於是就家立講堂置生員百二十人隔紗幔而受業號為宣文君宋王氏雙女膠人靖康中從母避亂被執女紿曰縱母還當從汝母既免二人俱赴海里人葬其屍海岸號曰雙女塜金相琪妻欒氏濰人琪為司吏貞祐三年賊陷城琪與欒氏及子俱為所得賊見欒悦之殺琪及其子而誘欒欒奮起以頭觸賊而仆罵曰我豈為犬彘所汚者哉賊怒殺之追封西河縣君諡莊潔李英妻張氏濰人英為監察御史貞祐初元兵取濰州入其家張氏俱以所有財物與之既而令張上馬曰汝品官妻當復為夫人張曰我死則為李氏鬼頓坐不起遂見殺追封龍西郡夫人諡莊潔明劉倫聘妻趙氏膠人年十八正德六年土宼猝至邑趙在室搗衣自如一賊突入欲犯之趙怒以衣杵擊賊遂遇害馬堂妻欒氏膠人年十七適堂正德六年土賊入寇以兵脅之欒抗聲辱罵為賊所害李棟妻王氏昌邑人正德七其舅與兄堅欲嫁之陳遂攜其女投水死同縣劉成祥妻吳氏李廷斌妻孫氏妾趙氏孔萬年妻丁氏宋伸妻高氏張士諤妻魏氏譚昕妻周氏王騮妻周氏胡永基妻王氏夏琮妻徐氏唐希俊妻王氏陳夢契妻吳氏馮廷彦妻王氏劉珍妻吳氏張進才妻王氏劉汲妻程氏俱夫亡殉節王慜妻夏氏昌邑人同縣陳光顯妻邵氏于珩妻馮氏王䇿妻劉氏楊垓妻宋氏俱夫亡殉節欒瑛甫妻高氏膠人順治十年海時行叛氏為亂兵所刼大罵不屈死同州郭自華妻崔氏欒昇妻宋氏欒檀妻高氏高自卑妻王氏劉仲祥妻郭氏于成龍妾逢氏俱聞變死難韓士楷妻張氏膠人夫亡自縊同州李沅妻薛氏高時妻紀氏紀湄妻張氏夏大亨妻李氏法象燨妻張氏董之瑛妻李氏雒獻圖妻張氏匡慕盛妻薛氏高玻妻崔氏薛竹兆妻唐氏高昆妻張氏李蕡妻王氏周大椿妻高氏王淇度妻高氏張鳯儀妻鄭氏紀于璋妻張氏薛希玠妻趙氏趙伯恭妻李氏張喬年妻高氏談必中妾楊氏俱夫亡殉節王文烺妻鄭氏高密人文烺邑諸生順治元年山賊入城焚掠紳士氏不受辱與夫同被殺單嘉猷妻李氏高密人嘉猷惑於䜛嬖不同寢食李奉事惟謹夫病禱以身代夫亦愧悔及夫死遂自縊同縣李仙品妻高氏單儼妻王氏李世深妻單氏李嶸妻劉氏鄧瑢妻趙氏曹恒吉妻王氏傅廷遇妻單氏孫選妻倪氏趙理妻李氏管植妻高氏范梅妻宋氏姚佃君妻郭氏劉淳妻馬氏欒三滿妻李氏俱夫亡殉節江滸妻黄氏即墨人夫亡自縊同縣牛希昌妻趙氏江從周妻孫氏宋德忬妻黄氏孫貞理妻張氏孫日休妻楊氏孫崇妻張氏張宏妻王氏黄貞復妻張氏黄培妾劉氏江兆錝妻王氏朱紹祖妻孫氏孫肯横妻王氏孫道方妻姜氏周祚晉妻孫氏周喬齡妻孫氏李爾炳妻江氏江范妻寗氏李貞妻孫氏孫應中妻王氏江兆鎏妻周氏黄爵妻遲氏劉漢妻尹氏俱夫亡守節陳三義妻王氏掖人未嫁氏失明父以女瞽辭婚三義曰吾聘時未瞽也竟娶之三年而目復明三義客死於外氏聞之曰夫不負吾吾豈負夫者乃自縊同縣烈婦潘璉妻霍氏錢纘美妻李氏節婦周學古妻王氏均康熙年間旌張典繼妻王氏平度人夫亡遺一子前妻子長己子十四歲而頴悟過之每課督輒撻其子以示儆後二子皆得成立同州烈婦王能充妻冷氏于廣生妻楊氏于養定妻葛氏均康熙年間旌杜良彦妻譚氏濰人夫亡撫遺腹子世昌入庠娶郭氏生孫履亨而世昌殁及孫履亨娶于氏而孫又夭三世孀居一門苦節同縣節婦吳士鸞妻張氏劉夢德妻李氏陳維城妻王氏丁誌妻韓氏韓濬妻王氏郭汝舟妻譚氏秦之標妻李氏譚洽妻張氏王廷瑜妻牟氏均