body:
  text: 萊州府在山東省治東北六百八十里東西距二百九十里南北距四百三十里東至登州府招遠縣界六十里西至青州府夀光縣界二百三十里南至海三百五十里北至渤海八十里東南至海三百五十里西南至青州府諸城縣界二百六十里東北至登州府招遠縣界八十里西北至海倉口七十五里自府治至京師一千四百里分野天文虚危分野元枵之次建置沿革禹貢青州之域春秋爲齊萊介州四國地戰國屬齊秦屬齊郡漢高帝始分置東萊郡寰宇記以萊在齊之東陲故名東萊後漢爲東萊郡地時郡徙治黃縣爲今登州府晉爲東萊國宋曰東萊郡後魏皇興四年置光州寰宇記取界内光水為名隋開皇初郡廢五年改光州為萊州大業初復曰東萊郡唐武德四年復曰萊州天寶初復曰東萊郡乾元初復曰萊州屬河南道五代因之宋屬京東東路金曰萊州置定海軍節度屬山東東路元初屬益都路中統五年屬淄萊路至元二年屬般陽路明洪武九年升為萊州府屬山東布政使司本朝因之屬山東省領州二縣五掖縣附郭東西距一百四十五里南北距一百里東至登州府萊陽縣界六十五里西至昌邑縣界八十里南至平度州界四十里北至渤海六十里東南至平度州界五十五里西南至平度州界六十里東北至登州府黄縣界八十里西北至海口四十里春秋萊國地戰國齊夜邑漢置掖縣為東萊郡治後漢為掖侯國屬東萊郡晉為國治宋屬東萊郡後魏皇興四年兼為光州治隋仍為東萊郡治唐為萊州治五代宋金元皆因之明為萊州府治本朝因之平度州在府城南少西一百里東西距一百五十五里南北距一百三十里東至登州府萊陽縣界七十七里西至昌邑縣界七十八里南至膠州界七十七里北至掖縣界五十五里東南至即墨縣界七十五里西南至高密縣界七十五里東北至登州府招遠縣界二百里西北至昌邑縣界八十里漢置膠東國治即墨領郁秩縣後漢為侯國屬北海郡晉宋因之後魏為長廣郡治北齊廢郡為長廣縣隋仁夀元年改曰膠水縣屬東萊郡唐屬萊州五代宋金元皆因之明洪武二十二年置平度州省膠水縣入之仍屬萊州府本朝因之濰縣在府城南少西二百八十里東西距八十五里南北距一百二十里東至昌邑縣界六十里西至青州府昌樂縣界二十五里南至昌樂縣界四十里北至海八十里東南至青州府安邱縣界六十里西南至青州府昌樂縣界四十里東北至昌邑縣治八十里西北至青州府夀光縣界四十里漢置平夀縣屬北海郡後漢及晉宋因之後魏為北海郡治北齊改曰高陽郡隋開皇初郡廢改置下密縣十六丘於縣置濰州大業初州廢改縣曰北海屬北海郡唐武德二年復置濰州八年州廢以縣屬青州五代因之宋建隆三年於縣置北海軍乾德三年復升為濰州屬京東東路金屬山東東路元屬益都路明洪武初以州治北海縣省入九年廢州為濰縣十九年改屬平度州隸萊州府本朝屬萊州府昌邑縣在府城西一百一十里東西距八十里南北距一百九十里東至平度州界五十里西至濰縣界三十里南至高密縣界一百里北至海九十里東南至高密縣界六十里西南至青州府安邱縣界六十里東北至掖縣界七十里西北至濰縣界五十里漢置都昌縣屬北海郡後漢因之晉屬齊郡宋省唐武德二年置訾亭縣屬濰州六年省宋建隆三年始於故縣界改置昌邑縣屬濰州金元因之明初屬青州府洪武九年改屬萊州府二十一年屬平度州仍隸萊州府本朝屬萊州府膠州在府城南二百二十里東西距五十五里南北距一百七十里東至即墨縣界三十里西至高密縣界二十五里南至海一百二十里北至平度州界五十里東南至海二十五里西南至青州府諸城縣界三百二十里東北至即墨縣界七十里西北至高密縣界三十里春秋介國戰國屬齊漢置黔陬縣屬琅邪郡後漢為黔陬侯國屬東萊郡晉初屬城陽郡元康十年改屬高密郡宋初為高密郡治孝武廢郡改屬北海郡魏仍屬高密郡隋開皇初郡廢十六年改置膠西縣大業初省黔陬縣入焉屬高密郡唐武德六年省膠西入高密宋元祐三年復置膠西縣兼臨海軍使屬密州金因之元太祖始於縣置膠州屬益都路明洪武初省膠西縣入州屬青州府九年改屬萊州府本朝因之高密縣在府城南少西一百五十五里東西距八十里南北距一百里東至膠州界三十里西至青州府安邱縣界五十里南至青州府諸城縣界六十里北至平度州界四十里東南至膠州界二十五里西南至青州府諸城縣界六十里東北至平度州界五十里西北至昌邑縣界二十五里漢初置高密縣屬齊國文帝十六年分置膠西國元封三年國除為膠西郡本始元年改置高密國治高密兼領夷安縣後漢建武十三年省高密國二縣皆屬北海國晉初屬城陽郡元康十年復置高密國二縣屬之宋孝武仍併屬北海後魏延昌中復置高密郡治高密領夷安北齊徙郡治東武省夷安縣入之隋屬高密郡唐屬密州武德六年移縣治夷安城五代及宋金因之元改屬膠州明初屬青州府洪武九年改屬膠州仍隸萊州府本朝屬萊州府即墨縣在府城南少東二百五十里東西距一百八十里南北距一百六十里東至海一百二十里西至膠州界六十里南至海九十里北至登州府萊陽縣界七十里東南至海六十里西南至膠州界七十里東北至登州府萊陽縣界八十里西北至平度州界七十里戰國齊即墨邑地漢置不其縣屬琅邪郡後漢為不期侯國屬東萊郡晉仍曰不其咸寕二年置長廣郡於此劉宋因之泰始四年又分置東青州於此後魏徙長廣郡治膠東以不其為屬縣北齊縣廢隋開皇十六年始改置即墨縣屬東萊郡唐屬萊州五代及宋金因之元太祖二十二年改屬膠州至元二年省入掖膠水二縣尋復置明初屬青州府洪武二年改屬膠州仍隸萊州府本朝屬萊州府形勢土疎水闊山高海深寰宇記羅山亘其東濰水阻其西神山距其南渤海枕其北内屏青齊外控遼碣舊志風俗人性剛强志氣緩慢此水土之風也寰宇記男有魚鹽之利女有織紡之素澹泊自足不尚文飾元志城池萊州府城周五里有奇門四池廣四丈明洪武四年築本朝康熙年間屢修乾隆二十一年六十年重修掖縣附郭平度州城周五里有奇門三池廣一丈八尺明洪武二十二年修本朝乾隆五十八年増修濰縣城周九里有奇門四池廣二丈明崇禎十二年增築本朝乾隆十三年修昌邑縣城周五里門三池廣二丈明萬厯五年増築崇禎十三年甃甎本朝乾隆五十八年修嘉慶二十五年重修膠州城周四里門三池廣二丈五尺明初築洪武八年甃甎萬厯年間增修本朝順治十六年修康熙七年五十一年乾隆三十二年重修高密縣城周三里有奇門四池廣二丈元舊址明嘉靖二年修本朝順治康熙年間屢修乾隆三年重修即墨縣城周四里門三池廣二丈正德二年修萬厯二十八年甃􅰫本朝康熙二十六年修四十三年六十一年乾隆十五年五十八年重修學校萊州府學在府治東南宋明道間建明成化初修本朝順治十五年修康熙五年重修入學額數二十名掖縣學在縣治西南舊在城南明成化初圮於河遷今所本朝順治十四年修康熙二十七年四十八年乾隆二十一年重修入學額數二十名平度州學在州治東北元元統間建明洪武十六年修本朝順治年間屢修入學額數十五名舊額十二名嘉慶十四年增三名濰縣學在縣治東南元延祐元年建明洪武三年修本朝康熙九年修乾隆六年重修入學額數十五名昌邑縣學在縣治東金大定間建明洪武三年修本朝順治三年修十七年乾隆六年重修入學額數十五名舊額十二名嘉慶二十三年増三名膠州學在州治東南金承安間建元末燬明洪武八年重建本朝順治康熙年間屢修乾隆十六年重修入學額數二十名又歸併靈山衞學五名共二十五名高密縣學在縣治東南元至元三年建明洪武初重建本朝康熙二十六年修入學額數十五名卽墨縣學在縣治東元至元間建明洪武九年重建本朝康熙九年修十二年重修入學額數十五名又歸併鼇山衞學八名共二十三名北海書院在府治東舊為推官署本朝康熙五十六年按察使黃炳改建海山書院在府治南本朝康熙三十年海防道丁蕙建膠東書院在平度州東本朝乾隆二十六年建膠西書院在膠州城内本朝乾隆五十二年建靈山書院在膠州南靈山衞城内本朝乾隆五十二年建按舊志載東萊書院在府治西南明正德間遷府學之東祀宋儒吕祖謙又東萊小學在府治南明萬厯三十年知府魏文明建蔡文忠書院在平度州東明正統間為宋蔡齊建太泉之南有太泉書院明正德六年知府官賢建兩髻山中有兩山書院明嘉靖二年建麓臺書院在濰縣西南二十里相傳漢公孫宏讀書於此明尚書劉應節建四知書院在昌邑縣南門外本漢楊震祠明隆慶間改建東崖書院在卽墨縣治東明成化間侍郎藍章建鄭公書院在卽墨縣東南二十里不其山下舊有鄭康成祠明正德間改建今並廢戸口原額人丁二十三萬一百八十二今滋生男婦大小共三百三十七萬四千十七名口計民戸共十七萬四千一百二十七户田賦田地二萬六千六百四十七頃四十三畝一釐有奇額徵地丁正雜銀三十萬零五千七百七十一兩七錢四分四釐米二千六百六石二斗四升七合七勺穀七百三十一石二斗九升九合八勺山川雄山在掖縣東七里大基山在掖縣東二十里于欽齊乘上有道士谷流泉花竹地占高敞郡之甲勝高望山在掖縣東南十五里府志峯巒秀特可以望遠稍東為筆架山又南五里為南山舊志平度州西北四十五里亦有高望山下有寒巖石俗呼為海眼石寒同山在掖縣東南十五里府志俗名神山有洞七俱極幽勝元和志掖水源出此陽邱山在掖縣東南三十里亦名馬鞍山漢書地理志曲城有陽邱山沽水所出黄山在掖縣南四十里府志産白石如玉斧山在掖縣西北五里俗名福山魏書崔挺傳除光州刺史掖城西北有斧山挺於頂上欲營觀宇故老言龍道不可久立挺遂營之數年果無風雨之異既代即為風雹所毁相近有祿山對峙六曲山在平度州東五十里州志上有膠東康王陵一名靈臺山金泉山在平度州東南三十五里魏書地形志長廣有金泉山寰宇記在州東南四十里三户山在平度州西南七十里漢郊祀志宣帝神爵元年以方士言祠三户山於下密魏書地形志即墨縣有三戸山今訛為三固山文山在平度州西十八里州志其西有武山對峙世傳秦始皇東巡集文武於此因名下有秦王河大豁山在平度州西北二十五里晏謨齊記盧鄉城東南有豁口又有小豁山相連故曰大豁山州志二山相對中通驛路蘇村河出焉之萊山在平度州西北五十里曹學佺名勝志漢人祀月之處山有秦篆懸崖間人莫能辨公沙山在平度州北十八里州志相傳漢公沙穆故居在此天柱山在平度州北五十里府志絶頂巉巖聳立如柱魏光州刺史鄭道昭銘曰孤峯秀峙高冠霄星實曰天柱鎮帶萊城懸崖萬仭峻極霞亭據日開月麗景流精按北齊書鄭述祖傳𫐠祖父道昭為兗州於城南小山起齋亭刻石為記述祖時年九歲及為刺史往尋舊迹得一破石有銘云中岳先生鄭道昭之白雲堂述祖對之嗚咽及考魏書北史鄭道昭傳皆言厯光青一州刺史未嘗莅兗也北史又云述祖父於鄭城南小山起齋亭兗無鄭城鄭城在高密縣鄭康成故里去天柱山不遠山有二碑一曰魏故中書令鄭文公之碑故吏主簿程天賜等撰永平四年刋一曰天柱山銘使持節都督光州諸軍事車騎