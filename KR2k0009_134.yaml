官王潤丏請不應械其從人為姦利者潤不敢逞後仕至少保陳枬上虞人嘉靖中知寶慶府妖賊李承賢倡亂元溪諸賊及武岡州蠻皆應之枬勒兵討平之周後叔太倉人嘉靖中以忤嚴世蕃由員外郎謫武岡州同知攝知府事岷藩横虐一切以法繩之胡采嵊縣人隆慶中知城步縣粤苗闌入縣境采武備嚴整而苗不敢犯夷苗密邇縣治多自相攻殺采親履其地諭以禮讓苗遣子弟入學向化林培東莞人萬厯中知新化縣廣置社學教民値嵗大祲捐俸賑饑修水利立義倉免貢路邸茶民有死於盜者捕不得禱於神卽獲咸感戴若神明馬彭商英臨安人萬厯中知新寕縣建古賢坊置義冡剏橋梁表節烈以母老退民祠之雲路亭熊茂松高安人崇禎中知寶慶府黜墨吏興學勸農士民祀之稱清正太守祠李夢日東莞人崇禎中寶慶府推官湘鄉賊犯境部勒鄉勇直前剿禦賊道去巳而偕副將尹先民討平之赦其脅從者張軌端華亭人崇禎中知邵陽縣湘鄉寇警晝夜守城以勞勩死李振珽鄞縣人崇禎中知寶慶府張獻忠破城被執至衡陽不屈赴湘水死何三傑定州人崇禎中寶慶府通判張獻忠陷城衣帶閒書舍生取義四字赴水死譚文祐蓬溪人崇禎中知武岡州時宗藩横虐文祐以抗直庇民土寇袁有志等聚衆攻城文祐招義勇圖恢復與劉承應破其壘平之以功擢僉事劉佐嶍峨人分守寶慶明末殉節死王紱貴州人崇禎中邵陽教諭張獻忠陷城不屈死之王世定福建人為寶慶府學教授明末死節蔣虎為寶慶鎮將明末與諸將孫華聶鳴鶴張承明張大勝皆力戰死蕭曠劉大翰皆兵敗自刎死陶垬姚安人明末知寶慶府時流寇告警珙率鄉勇勦之以忤岷王罷歸中途為寇所害本朝何衡泗天人順治初知武岡州賊陳友龍來攻與鎮將賀雲拒守三月餘食盡城陷衡泗與雲登清渠門樓縱大自焚死傅鸞祥蘭陽人順治中知寶慶府歳旱賑濟多所全活粤鹽價昂為民病條易淮引民甚便之王蔚邢臺人順治中知新寕縣革重耗輯苗􅍹繕完城郭振興學校治續稱最梁碧海蘭陽人康熙中知寶慶府􅍲饑講求荒政分給牛種去任民罷市泣送為立遺愛碑崔錡沁源人康熙中知新寕縣折獄平允不事鉤校洞中隱微尋常不苟嚬笑而誘掖士子片善不遺陳珙卯武人康熙中知新化縣値歳饑罷供應開廩賑民湖南仰給淮鹽新化僻逺鹽不至力請貯鹽長沙聽民轉販遂著為令縣有虎患焚牒於社虎為出境蔣德重貴筑人雍正中知城步縣峝􅍹蒲寅山倡亂徳重隨營進剿擒渠魁於應聲巖邑人立祠祀之杜珣直隸新安人乾隆五年知城步縣值横嶺苗􅍹犯順邑境戒嚴珣招集流亡募鄉勇增城守民恃以無恐及大軍集役夫運餉數月不解帶苗平以勞瘁卒䝉恩卹廕一子入監鄭子僑潮陽人乾隆中知寳慶府政成民和改建濂溪書院以身董率文化大興門人蔣士銓送以詩曰名宦從來兼教養淸才自古説沅湘高應遴任邱人乾隆中知邵陽縣坦易不求立異而興利除弊毅然自任以調任去人皆思慕王淦錢塘人乾隆五年任城步横嶺廵檢値龍家溪苗負嵎抗拒淦同營弁歐國墇等往撫為苗所執大罵不屈苗怒投淦深箐遇害事間廕一子入監建祠致祀人物晉周崎邵陵人為湘州從事王敦之難譙王承使崎求救於外與周該俱為魏乂偵人所執乂謂崎曰汝為我語城中稱大將軍巳破劉隗戴淵甘卓住襄陽無復異議外援理絶如是者我當活汝崎偽許之既到城下大呼曰王敦軍敗於湖甘安南已克武昌卽日分遣大衆來赴此急努力堅守賊今散矣乂於是數而殺之唐鄧處訥龍潭人僖宗時從欽化軍節度使閔頊頊以為邵州刺史周岳陷潭州頊為准西將黄皓所殺處訥哭受諸將弔礪甲訓兵積八年結朗州雷滿為援攻岳斬之昭宗詔拜武安軍節度使劉建鋒馬殷來攻處訥遣蔣勛等禦之殷説降勛建鋒用邵州旗鎧趨潭州守者以為勛軍納之處訥遂為建鋒所殺按通鑑僖宗時授閔勗節度使以鄧處訥為邵州刺史應作閔朂此作閔頊似誤宋李傑邵陽人神宗初進士厯守永州鋒州提刑東川元豐中以金部大夫出師湖南所至皆有能聲官至大理卿買書萬卷以遺郡庠置田數千畝以贍同族呉潛有義莊記同莊後記侯延慶有同莊記周欽武岡人宣和中峒蠻叛欽挺身往諭苗感激輸誠以功擢德州刺史金兵南下帥師勤王死之楊再興武岡人從岳飛屯襄陽破業陽衆二千殺孫都統及統制滿在復長水縣盡復西京險要中原響應復蔡州飛敗金人於郾城金人合兵逼飛再興單騎直入殺數百人而還金人復至再興以三百騎禦於小商橋殺二千餘人戰死獲屍焚之得箭鏃二升金彥邵陽人力學善屬文天資敦厚喜振困窶而敦孝友邵人號義門金氏胡寅嘗記其事聶致堯邵陽人事親孝臨財廉周給貧困鄉人列其事守宰以聞詔旌其門張栻為之題額王元春邵陽人慶元進士初為零陵令有治績厯官吏部侍郎有清譽李友直武岡人淳祐進士家傍石羊渡水險急雨至更甚友直父世楫始造舟以渡往來者友直以舟險更捐資建橋鄉人徳之元李璋新寕人至元閒為平江州吏目損妙十五萬買膏腴田四百畝助贍學校楊完者城步人世為土官至正時招至淮南剿賊有功累官江浙行省參政擊破張士誠復杭州城遷江浙右丞士誠屢為所敗請降丞相達識鐵睦爾忌其功授士誠太尉復據城如故惟憚完者達識鐵睦爾尤忌其專兵計誘殺之士誠遂據杭不可制事聞贈完者潭國公諡忠愍明梁徳遠邵陽人洪武進士時父任郎中有罪繫獄徳逺辭不赴宴及父謫戍又請以身代太祖憫其孝赦父罪而授德遠給事中有直聲後謫太平知縣民感其意肖像祀之劉必榮武岡人洪武中厯鴻臚少卿永樂閒交阯黎季犛叛命必榮撫安之至境季犛巳竄必榮冒險涉逺直抵其穴季犛聞之遽出迓表獻