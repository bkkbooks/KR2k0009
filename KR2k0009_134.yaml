泉建昌人紹熙中為衡陽教授善教人士子歸之陸九淵最稱其教李修巳豐城人慶元中衡陽令有政聲當路交薦將召之以哭故相趙汝愚入黨禁李肅臨川人衡州教授善教士齋舍無所容闢武侯祠以居之趙逢龍鄞縣人厯知衡州每至官有司例設供悵悉命徹去日具蔬飯坐公署事至即面問决遣爲政務寛恕撫諭惻怛一以天埋民彝爲言民不忍欺居官自常俸外一介不取民賦有逋負悉爲代輸尤究心荒政以羨餘爲平糶本薛寘昌國人衡陽主簿時史彌堅帥湖南寇起黑風洞檄寘往撫賊聞其姓氏遂投戈退楊文仲彭山人以忤賈似道出知衡州運餉有法而民不擾以所得米八千石立思濟倉穆演祖天彭人爲衡陽尉元將烏蘭哈達自雲南大理入廣南道其先鋒破永州衡守令聞之皆走時演祖戍石灣聞難馳入城收散亡以守俄而烏蘭哈達兵大至進駐青草灣欲絶湘夾攻演祖提兵江東岸楊林廟相拒七晝夜募死士沉所聚舟烏蘭哈達遁去城賴以完按烏蘭哈達譯改見前統部名宦門王興真定人衡州鎮將駐安仁元兵至力拒不屈死元趙宏偉潁川人至元十七年授衡州路總管府治中羣盜出沒其境宏偉計其地興屯田民旣足食盜亦爲農郡遂安謚趙忠至正間衡山令政急所先南嶽書院圮壞竭力修復劉燾孫至正末爲常寕州儒學正湖南陷常寕長吏棄城走民奉印請燾孫為城守城賴以完者一年外援俱絶城遂陷死之明高從訓洪武初通判衡州克平其政視民如子轉同知擢知府亊時庶事草昧從訓定章程創郡治興學校課耕桑恩信久而愈孚紀惟正洪武中衡山主簿剛正有為亷潔自守坐事以部民乞宥立擢陜西叅議余鐸池州人初任安仁主簿邑多流亡逋負鐸奏撥茶陵屯糧籌補民稍安集當代父老詣闕乞留遷知本縣益多惠政方素易樂平人永樂初為衡州同知有舖卒訴年老惟一子為虎所噬素易為文檄山神明日虎死道側史中德化人永樂中衡州通判守法卹民不畏强禦擢知本府有中貴人黷貨虐民中亷其歸裝執以聞上命戮之由是名震中外在郡九年遷陜西參政胡湜蕪湖人永樂間知􅌕縣正大亷公有虎傷人湜告于神其虎立斃鄒良樂安人正統初以薦擢知衡州府歲饑便宜發粟賑濟性鯁直不憚豪貴而撫小民以慈陳善弋陽人知安仁縣愛惜民力一無所擾尤嚴于治盜境内安戢毁禁淫祠以培文教為已任編户逃亡征徭重累奏其姦狀事發悉寘之法民稱神明田興吳思南人萬厯間衡陽縣丞居官亷靜惟一子一僕從食皆粗惡嘗奉檄勘災自攜供具往倦則䕃樹下不入民舍遂暍死百姓皆為流涕鄧國材横州人萬厯中知衡山縣始至即教民樹桑禁人毁折人指為鄧公桑嘗微行田間見民之藝桑多者親慰勞之聞織絍聲賜以茶米在任數年田野增治人恥游惰吏不敢犯民不忍欺潘甲第新安人萬厯中知耒陽縣和介愛民解綬歸猶以差繁賦重痛陳於憲司人稱之曰潘父朱學忠萬厯末知耒陽縣嘗録囚見獄舍卑隘重犯與輕犯同居囚多疾疫學忠遷賓館于儀門之左即以其地剏外監十餘房别處輕犯其中尸所需竈厠寝舍一一整潔故獄亦然由是囚無疫死者莊大化霑益州人天啟中知􅌕縣性介不妄取民一錢衙齋清冷晨炊往往不繼六載考滿貧無以治歸裝士民醇金贈行力卻之張鵬翼西光人崇禎中知衡陽縣張獻忠來攻諸司皆委城去鵬翼獨守空城執賊偵者數人斃之亂稍定飛檄請援吏持檄散去賊至脅之降不屈大罵賊縛而投之江妻子俱赴水死董我前富順人崇禎中知衡山縣嵗祲為民析雨暴行烈日中月餘不懈時雨洊至及獻賊寇衡山城陷同教諭分宜彭允中俱抗節死本朝趙廷標錢塘人順治七年任衡州府同知請免荒田賦捐俸煮糜賑饑全活甚衆王鸞翀長垣人康熙初知衡陽縣縣有逋賦七千餘石皆里民代償鸞翀懇請于上官題免勤于勸課田疇闢而賦亦充至今縣人德之姚克欽夏人康熙中知衡山縣時苦科派里甲有軟擡名目姦胥巧為浮征克欽歎曰民困如此尚忍因以為利乎乃令民自輸納額外者悉蠲之任四年去民皆流泣王仕雲歙縣人康熙五年為衡州推官府有流民逋賦皆坐見户輸官連引逮繫仕雲皆釋之蠧役作姦者杖而械諸市縣鉦于門訴冤者擊之懲勢宦家僕之尤横者以裁缺去職合郡歌思顧奕芬長洲人康熙五年知常寕縣值大兵凱旋軍需孔亟奕芬催科撫字民賴不困尤加意造士在任十六年民愛之如慈父祀名宦張翼山西人雍正二年知衡山縣悃愊無華亷潔自愛悉除陋規嘗署公堂云衾影何慚此事敢盟衡嶽廟肝腸畧轉他年難過洞庭湖以抗直𬒳議方解任即晨炊不繼士民攜蔬果焚香送之號泣之聲徹江干事白起用豫省縣令節概如故謝仲坃陽春人乾隆中知常寕縣峻卻餽遺履勘至鄉自裹行糧至嚼生萊菔供饌月兩課士兢兢以節行戒勉後七年過縣民歡呼迎之者數十里人物漢谷朗耒陽人事繼母以孝聞仕至大中大夫交南叛朗往征之恩威大著遷九真太守蔡倫耒陽人永平末給事宫掖和帝即位轉中常侍與參帷幄盡心敦慎數犯顔匡弼得失以竹簡不便於人乃造意用樹膚麻頭及敝布魚網以為紙帝善其能天下咸稱蔡侯紙羅訓耒陽人東漢處士隱居邑之樟楻嶺三國漢劉巴烝陽人少知名荆州牧劉耒辟茂才不就諸葛亮數稱薦之先主辟為左將軍西曹掾先主為漢中王代法正為尚書令躬履清儉不治産業恭黙守靜退無私交先主稱尊號凡諸文誥敕命皆巴所作晉羅含耒陽人嘗晝卧夢一鳥文采異常飛入口中自比藻思日新刺史庾亮以爲江夏從事桓温臨州𥙷征西㕘軍轉州别駕以廨舍喧擾于城西池小洲上立茅屋布衣蔬食晏如也俄遷宜都太守轉廷尉長沙相李義􅌕縣人有勇力明帝時盜起荆湘義頃貲市兵器率鄉民追擊大破之境賴以安荆州牧陶侃召至麾下分兵擊賊力戰有功鄉民歲時祀之名其地曰太尉原南北朝陳鄧正直衡陽人永定初刺史歐陽頠知其賢辟爲盧陽令罷征弭盜修城濬河興學校人多稱之唐趙知微衡山人穆宗朝以布衣上言時政詞㫖激切帝命宰相慰諭之宰相因賀天子納諫然竟不能用曹松衡州人學賈島爲詩天復初及第同時王希羽劉象柯榮鄭希彦皆已七十餘時謂五老榜授校書郎五代南唐廖凝衡陽人隱居南岳南唐李景聘爲彭澤令慕陶元亮高風視亊未幾嘆曰昔淵明不以五斗折腰吾何久爲人役惻愴若轅下駒耶即解即歸復起爲連州刺史尋歸隱楚譚進頗􅌕縣人具文武才馬殷召爲左殿大將軍殷死子希範立進頗父䘮母疾乞治䘮不許遂歸希範怒自將兵討之進頗不為備曰生以忠死以孝吾何恨焉乃血指寫書自陳無叛意書畢而刎廖融衡陽人隱居衡山與任鵠凌憺王正已相友善皆一時名士不樂進取不徇勢利獨耽山水蜀歐陽彬衡山人博學能文先以所著書詣馬氏不用乃走入蜀獻賦蜀王悦之擢居清要後官至尚書左丞出為夔州節度使尋解官歸衡山宋朱昻其先京兆人父葆光寓潭州遂家衡山周世宗南征韓令坤統兵揚州時昻北遊江淮謁見陳治亂方略令坤器之令攝永正縣有治蹟宋初為衡州録事叅軍累官峽路轉運使真宗即位遂知制誥入翰林為學士請老以工部侍郎致仕賜宴玉津園閒居自稱退叟于所居建二亭曰知止曰幽棲弟協仕為主客郎中後亦告歸時人以比二疏曹裕耒陽人舉進士第為潭州司録叅軍能辨枉獄後宰溧水值歲旱蝗漕使以歲計不足諷諸邑裕曰吾能忍視其死而不救乎卒以實聞裕子洪第進士為永興令邑小民貧正供匱乏洪歎曰吾八厯縣未嘗横斂豈以暮年倒行逆施乎遂棄官歸侯友彰衡山人皇祐進士為臨武尉改桂林丞亷謹儉約取與不苟居官十年布衣蔬食無異寒士有同年生訪之輿從綺麗友彰飯以蔬糲客去其子以貧約為羞友彰曰寇平仲位兼將相而宅無樓臺𬒳何人也因為詩有遺汝不如亷之句人傳誦之鄭向衡陽人大中祥符進士官龍圖閣學士教其甥周子成大儒撰五代開皇紀三十卷又起居注故事三卷鄭平衡陽人天禧進士永州判官兼監衡州茭源銀冶歐陽修稱其自信不疑知命不惑得失不累其心喜愠不見其色廖偁衡山人天禧進士好古能文手所著有朱陵編弟倚舉於有司不第歐陽修嘗為文送之趙棠衡山人少從胡宏學慷慨有大志嘗見張浚於督府浚雅敬其才欲以右選官之棠不為屈累以䇿言兵事浚奇之命子栻與棠交龔蓋卿常寕人以明經擢第從朱子明義理之學為右正言以直事君朱子池州語録蓋卿所纂王居仁常寕人執經張栻之門深有造詣既登進士遂隱居不仕自號習隱廖謙衡陽人從朱子講學於南嶽朱子教以打破舉子程文應用詩文之厄理會學問謙毅然承之侯宣衡山人少遊四方好與名士交還家築室一區俾遊學者往來館焉時湖南學道最盛遊學之士踵至如歸宣館延二十餘年不倦遠近稱爲松林處士趙方棠子從張栻學淳熙中進士知青陽縣累官顯謨閣學士擢刑部尚書俄得疾貽書宰相論疆場大計卒贈太師謚忠肅方起自儒生帥邊十年以戰爲守留意人才知名士皆抜爲大吏諸名將多出其麾下推誠擢任致其死力使朝廷無北顧之憂故其殁也人皆惜之趙范方子嘉定十三年與弟葵殱金人於高頭十四年又敗金人於天長授制置安撫使彭義斌請范合謀討李全范告於制置使不報史彌遠訪將材於葵葵以范對進范直敷文閣淮東提點刑獄范曰弟而薦兄不順以母老辭乃上書彌遠具言江淮戰守機宜朝廷乃召范禀議紹定中又請罷調停之議朝㫖許范刺射陽胡兵就聽節制於是討賊之謀决遂戮全進范兵部侍郎加工部尚書趙葵方子嘉定中屢敗金人紹定中李全攻揚州葵親出搏戰屢戰皆㨗遂殺全六年知揚州留揚八年墾田治兵邊備益飭拜右丞相尋出為宣撫使封冀國公卒贈太傅謚忠靖李芾衡陽人生而聰警少自樹立以蔭補南安司户咸淳元年入知臨安府賈似道誣以賍罪罷之元兵取鄂始起為湖南提刑未幾似道兵潰蕪湖乃復芾官知潭州兼湖南安撫使元兵既下江陵以大兵攻潭芾舉家死之贈端明殿學士謚忠節陳億孫安仁人咸淳進士除湖南安撫司叅議與李芾同死潭州之難趙淮葵從子李全之叛屢立戰功累官至淮東轉運使德祐中戍銀樹壩兵敗與其妾俱𬒳執至瓜州元帥阿珠使淮招李庭芝許以大官淮陽許諾至揚州城下乃大呼曰李庭芝男子死耳毋降也元帥怒殺之阿珠改見長沙府列女門張堂其先綿竹人僕射浚之後徙居衡山益王即位於福州詔天下勤王堂起兵衡州移檄安化諸獠得民兵數千文天祥督兵梅嶺相與接應復衡山等縣既而兵敗被執元叅政崔斌欲降之堂罵曰今日降何以貝我祖魏公於地下斌命述起兵始末堂奮筆斥罵千百言斌怒殺之趙璠衡山人登進士第與其叔父漂起兵湘鄉應文天祥授軍器監元曾圭衡山人世業儒為零陵縣尉慕顔真卿元次山風節文采命其子堯臣捐家貲建浯溪書院祀之又割私田三百餘畞以廩學者趙洪其先臨淄人徙家衡山八歲中童子科累官右文殿修撰刑部侍郎劉彭夀衡山人辟本縣教諭其教以五經四書為本延祐登進士第授桂陽縣丞後陞淳安縣尹每月吉陞座講書士庶聽講不倦風俗為之一變明李存安仁人穎悟該傅與貴溪祝蕃逺遊上饒陳明逺之門有司以髙蹈􅏀園舉者三皆辭朝臣薦之又辭洪武中卒有竢菴集茹瑺衡山人洪武中由國子監生除承勅郎累官兵部尚書太子少保建文時改吏部與黄子澄不相能出掌河南布政司事尋復召為兵部尚書永樂初封忠誠伯旋遣歸里過長沙以谷王橞隂蓄異志遂不謁王王以為言陳瑛劾瑺違祖制下獄死人皆惜之王詔衡陽人正統進士授禮科給事中在諫坦二十餘年多所建白進通政司右叅議勅視易州工厰興利釐弊具有成績擢工部左侍郎出浚運河以疾請老劉文衡陽人天順進士官給事中弹劾不避權貴人皆憚之成化中論宫闈事落職直聲大震謝文祥耒陽人成化進士改庶吉士授御史數上封事指斥時政謫南陵縣丞李東陽劉大夏陳獻章軰俱壯其節贈以詩年三十七即掛冠歸歐陽涵安仁人成化舉人知儀真縣歲旱竭誠祈禱澍雨三日忽有一鶴自天而下馴繞於庭民咸以為清節所感謝海安仁人童時父為猺賊所掠每念其父輙泣血成化中第進士親詣苗疆贖父知父己殁乃想象刻木針取指血漬之歸葬廬墓三年誓不禄位母强之始仕授惠州通判苗賊叛平之黄瓊安仁人成化中知藁城縣滹沱河溢幾没城瓊登城祭禱水立退灤城高陽二縣民饑將為亂瓊白郡守發廩往賑亂乃已以剛直忤上官遂投劾歸家居三十年壽八十二卒貧無以殮妻子至不能自給胡文璧耒陽人宏治進士正德中厯天津兵備副使中官張忠督直沽田莊縱羣小牟利商民失業文璧捕治之遂為忠所搆械繫詔獄謫延安府照磨嘉靖初累官四川按察使謝訥文祥子宏治進士授户科給亊中奉勅稽兩廣糧儲人不敢干以私遷刑科給事中值逆瑾專擅糾合言路首發大姦武宗嘉其直瑾誅擢工科都給事道卒劉黻衡陽人正德進士授行人武宗南巡上疏切諫受杖改南京國子監學正世廟繼統詔復黻官授御史按蜀有威望未幾疏請終養所著有易卦變兩州奏議童訓及詩文若干卷甯欽衡陽人官禦史武宗南巡抗疏力請回鑾又奏革吉府漁税定遞馬之制減帶徵之數郡人至今德之朱炳如衡陽人嘉靖進士官行人奉使藩府餽遺無所受進御史按鹺兩淮積贖鍰三萬金牒漕司以佐邊備賑後出守泉州單騎入境與一老蒼頭相卧處好奬拔士類泉士比之真德秀王十朋厯兩浙運使陜西布政使益勵名節坐不附張居正罷周廷叅衡山人嘉靖進士知海寕縣時倭寇海上聲言取錢塘一路廷叅遣素所練壯士密投入倭中誘之先渡設伏邀擊所遣壯士從中起賊衆奔潰遂擒其渠劉穏􅌕縣人嘉靖進士厯南韶兵備道獞賊猖獗穏單騎至賊壘諭解之計擒山寇馬五等進本道副使賊帥官祖政狡而勇穏密令其所親圖之而故洩其事於祖政果相猜忌格鬬死者六百人旋出師㑹勦殺祖政於黄岡築英德城以扼賊吭南韶以安以疾歸再起廣東叅政晉南太僕寺卿祝詠衡陽人嘉靖進士厯户兵二科給事中以方鯁忤倖臣㑹星變應詔有黨執政者故指事應為解詠力破其姦出按甘肅諸夷誣許撫鎮大臣事驗覆得實不復株連論列邊事如燒河套復屯田諸議當事尤忌之出為太平知府左遷兩淮鹽運同知皆有直聲陞四川松潘兵備副使撫視籌畫洞悉利弊擢陜西左叅政疾卒伍讓衡陽人隆慶進士官刑部員外郎有緹騎捕諸平民為盜者白釋之累遷河南叅議時汝南經馬鞍山賊叛後道殣相望讓悉心安集所活甚多餘黨據髙老山讓出竒兵捕之斬獲畧盡遷南贛道副使陳宗契衡陽人萬厯進士選庶吉士改御史時陜西税璫梁永蠱害按臣徐懋恒宗契專䟽請誅永以伸國法又糾遼左税監髙淮擅預兵機乞正其罪直聲震輦下天啟初厯通政叅議魏忠賢擅政諷使附已即日上䟽乞歸年九十餘卒江朝翰衡陽人七世同居與弟朝林皆至孝母黄氏疾凡四割股母夀八十七乃終里中父老欲聞於當路朝翰力辭士論益尚之又衡陽縣有甯允伯甯維成􅌕縣有潘體皆為親割股以孝稱呉邦卿常寕人父䘮廬墓妻死終身不再娶捐田助學以孝義聞阮以頤常寕人少孤母胡氏撫以成立崇禎末寇變母卧疾不能起以頤侍母側以死衞之旋為兵所傷而母得全王世宗衡陽人事繼母篤孝病侍湯藥至為嘗糞以驗疾淺深母病頓愈又安仁縣有曾宗卷亦為母嘗糞以孝聞本朝譚振萃􅌕縣諸生值大疫母殁時流寇未靖棺不得具振萃號慟三日卒王夫之衡陽人父朝聘以貢遊北雍當得官㑹温體仁當國選郎承意㫖索賂朝聘曰仕以榮親而賂以取辱可乎遂投𬒮歸夫之舉崇禎壬午鄉試性至孝以文章志節重於時精研六經尤神契横渠正蒙之説康熙間吳逆踞衡湘夫之逃入深山呉逆平巡撫餽粟帛請見夫之病辭帛受粟著有五經稗疏四書讀大全說說文廣義等書兄介之參之俱以孝行聞廖聯翼衡陽人順治進士知孟津縣到官即廉得姦宄伏法縣人畏服值旱蝗捐俸賑饑全活甚衆擢内閣中書舍人詹象鼎常寕諸生縣人卜遷學宫皆曰象鼎宅地吉象鼎曰果吉吾當毁宅不願獨利也由是新學遂成陳國寶常寕人母羅氏病不起徧謁醫有道士卑藥少許言得人乳頭共烹可愈國寶籲天割乳和藥奉母病果瘥唐崇勲衡山人康熙舉人知靖安縣歲饑不待報發廩賑民有盜殺寺僧刧其貲遺一扇與寺中舊傭工名字同遂捕繫之獄已具崇勲廉其枉釋之後獲盜於隣界則遺扇人姓字也一縣稱神官至户部員外郎歐陽紹修衡山人奉父母避兵山中猶手一卷自隨﨑嶇巖谷間定省未嘗廢禮父母殁諸弟中有欲蕩其産者紹修掩户自撾由是感悟課子若孫甚嚴家門整肅信義著於鄉里孫正煥乾隆進士授編修改御史在諫垣敷陳皆關大體父殁哀毁成疫生平束身禮法克紹家聲焉丁懷德衡山人事親孝父殁廬墓三年母老且病飲食起居必身親省五世同居百口無間言病革呼家人泣曰吾不能終養老母雖死不暝目其勿殮於正寝以彰不孝之罪聞者惻然海鳳翥衡陽人康熙進士知直隸龍門縣首革私派勒石永禁繕城勸學諸務畢舉外艱再補錢塘縣歲饑設法賑濟以疾歸卒於家祀龍門名宦聶燾衡山人乾隆進士知鎮安縣㑹大兵征金川軍需馬匹燾即於龍駒寨捐貲雇用大兵遄行居民安堵舊置社倉遠者或四五百里民䭾負維艱燾酌於野珠土茅二坪移建兩社民咸稱便考最第一調知鳳翔以内艱歸家居養父數十年彭齡衡山諸生精春秋學淹貫三傳折衷程氏胡氏所批閲不下數十家性恬淡喜吟詠每出一篇曠然有絶塵想潘世洪衡陽人官衡州協中營外委乾隆六十年隨征黔楚逆苗追捕龍團附近苗匪陣亡同縣人夏尚惠官外委以兵䕶高村殺賊甚多奮勇衝擊力竭殁於陣事聞議卹均廕雲騎尉劉正麒衡陽人官湖北鄖陽協右營守備嘉慶三年隨勦川省邪匪屢獲戰功蒙賞戴藍翎是年十二月追捕邪匪於墊江長夀等處奮力爭先受傷陣亡事聞議䘏廕雲騎尉劉敎五衡山人性敦孝友親亡廬墓終䘮鄉里重之其妻彭氏亦克盡婦道均嘉慶二十五年旌按彭氏並載列女門流寓晉劉驎之南陽人好遊山澤志存遁逸嘗採藥至衡山深入忘返見一澗水水南有二石囷一閉一開水深廣不得過欲還失道遇伐弓人問徑僅得還家或説囷中皆仙靈草藥諸襍物驎之欲更尋索終不復知處也南北朝宋宗炳涅縣人好山水愛逺遊西涉荆巫南登衡嶽因結宇衡山欲懷尚平之志有疾還江陵劉凝之枝江人性好山水一旦攜妻子泛江湖隱居衡山之陽登髙嶺絶人迹為小屋居之採藥服食妻子皆從其志唐李泌京兆人肅宗時隱衡山有詔給三品禄賜隱士服為治屋廬杜甫襄陽人大厯中出瞿塘下江陵泝沅湘以登衡山因客耒陽遊嶽祠大水遽至涉旬不得食縣令具舟迎之乃得還尋卒於衡朱葆光南陽人梁祖代唐葆光與唐舊臣顔蕘李濤數軰挈家南渡寓潭州每正旦長至必序立北望號慟殆二十年後濤北歸葆光樂衡山之勝遂家焉五代漢劉昌嗣湘鄉人隱帝遇害避居衡山馬殷周行逢招之皆不屈乃改姓范號愚叟躬耕終身宋趙抃蘭谿人神宗時罷相居衡山鄒浩常州人第進士蔡京當國忌浩使其黨爲偽疏以激上怒謫衡州胡安國崇安人哲宗時提舉湖南學事患居當兵衝徙於荆再徙於衡從子寅以忤秦檜退居衡山著書講學子宏居衡山二十年玩心神明不舍晝夜張栻師事之又從子實與朱子張南軒遊胡銓廬陵人建炎中疏斥秦檜編管新州檜死量移衡州嘗寓西湖與衡士講學其中曾幾河南人避地衡嶽又從胡安國遊其學益粹爲文純正雅健詩尤工張栻綿竹人受學於胡宏居衡山時朱子勾管南嶽廟栻與往來講學并唱和詩文周必大廬陵人遊學安仁讀書於清溪及縣東之玉峯呉翌建陽人遊學衡山師事胡宏復與張栻遊遂買田築室於衡山之下一以明理修身為要謝絶科舉之學當路聘為嶽麓書院山長不就自稱南嶽居士李椿永年人避地南嶽耒陽貧無以為養不得專志於學年三十始學易官至敷文閣直學士朱子嘗銘其墓稱其不阿主好不詭時譽明陳獻章新㑹人遊衡山始與衡諸生講學於兜率寺從者至不能容再遊南嶽復與諸生講學其上烈女明包有榮妻鍾氏衡陽人姑病疽吮之而愈鄒榮華妻楊氏衡陽人崇禎中臨藍寇逼楊年二十一倉惶走避突與賊遇度不免遂赴水死倪民恒妾劉氏衡陽人張獻忠陷衡州劉時年二十被執挈之上馬劉大罵不從賊怒刳其心而死同時殉節者孫鳴衡妹孫氏鄒應昌妻劉氏張若瓊妻沈氏劉思文女胡遵典妻譚氏皆罵賊不屈死劉廷耀妻朱氏衡山人年十七廷耀以五日競渡溺死其母兄納賂强朱改適富家子朱聞之大慟密自檢飭走江濱躍水死董惟嶽妻歐陽氏衡山人流寇夜焚其家惟嶽鬬死歐陽率子弟敵賊不勝奮身赴火死康國妻賓氏衡山人早寡崇禎間衡湘寇作舉家被執賓紿賊曰舍我父與弟願奉百年賊釋之賓至柳樹塘遽躍水死時衡陽縣諸生朱武英妻王氏亦抗節死蔣閶妻鄭氏耒陽人閶任訓導卒於嶺南鄭扶櫬歸塟經理家務畢入室自縊死謝士珍妻劉氏耒陽人夫亡殉節死羅文繡妻聶氏常寕人父庭鳳嘗授以内則女誡諸篇文繡挈妻經月浦溺於水聶挽之不及亦投水中舟人亟舉篙援之却篙而沉越七日兩死並浮有司塟而表之李在公妻鄧氏常寕人崇禎中礦寇攻城鄧被執將汚之以死拒不從瞷守者失防遂赴江死其尸逆流三里陳思詩妻劉氏安仁人值猺賊攻縣被執將汚之劉引首就刃曰吾死不辱也賊怒置薪兩袖中火發膚裂越七日死尹文光妻劉氏􅌕縣人值流寇至居民走避劉年甫十八侍姑病匿山澤中爲賊所執欲汚之不從賊以刄加其頸卒不屈賊怒殺之本朝羅興恒妻譚氏􅌕縣人紅賊至被執投湘水死順治年間旌唐嶷勲妻劉氏衡山人夫亡守節康熙年間旌謝賜梅妻梁氏耒陽人夫亡守節康熙年間旌李開美妻周氏常寕人夫亡守節同縣節婦李祜臣妻詹氏均康熙年間旌謝義立妻侯氏安仁人夫亡守節同縣節婦李任賢妻唐氏劉復舉妻謝氏侯一德妻吕氏侯徽妻蔡氏孝女何新秀養親守貞均康熙年間旌廖章妻魏氏衡陽人夫亡守節雍正年間旌文爾篤妻顔氏衡山人同縣節婦單坤筮妻沈氏均夫亡守節俱雍正年間旌段昌紀妻鄒氏常寕人夫亡守節同縣節婦譚繼誦妻胡氏均雍正年間旌謝尚金妻許氏衡陽人夫亡守節同縣節婦王羨予妻曾氏周如章妻鐘氏譚德愈妻范氏丁竒珍妻史氏王乃吉妻歐陽氏子婦蔣氏周氏楊耀祖妻唐氏范廷燕妻劉氏周若儼妻曾氏劉維忠妻胡氏祝維藩妻歐陽氏楊正冕妻彭氏周楊沛妻彭氏李升庠妻唐氏王仁懐妻徐氏唐少伯妻曾氏唐端邇妻劉氏王百訓妻劉氏魏藻妻李氏陶作楷妻胡氏周若燦妻李氏王之福妻全氏王百拙妻唐氏呉興鍾妻許氏楊永緒妻蕭氏鄒萬和妻李氏盛時治妻李氏劉盛光妻陳氏宋圖學妻周氏楊興憲妻夏氏常明漢妻劉氏蔣國植妻王氏黄鈞妻鄒氏聶以德妻常氏王百甯妻蔣氏李源富妻鄒氏