body:
  text: 大清一統志嘉興府二名宦三國吳步隲淮陰人除海鹽令性寛雅博研道藝訓齊風俗南北朝宋沈演之武康人元嘉中為嘉興令有能名梁劉霽平原人天監中岀為海鹽令以和理著稱陳徐份郯人為海鹽令甚有治績唐朱自勉廣德中為嘉禾屯田都知嘉禾大田二十七屯自勉畫為封疆濬其畝澮朝巡夕課自是屯無下歲民始殷富大厯間為長興令士民頌之如嘉禾李諤長慶中為海鹽令開古涇三百以禦旱澇又創長豐閘二節宣水利宋魯宗道譙人真宗時調海鹽令縣東南舊有港導海水至邑下歲久堙塞宗道發鄉丁疏治之人號魯公浦劉師道東明人景德初改知秀州敏於吏事吏民畏愛李餘慶連江人景德中通判秀州境多鹽盗餘慶作華亭海鹽監俾業鹽者歲入常緡以杜私販又為石隄自平望至吳江捍除水患葛宫江陰人真宗時徙知秀州秀介江湖間吏爲關涇瀆上以征往來間有婚嫁趨期者多不免宫命悉毁之桺植真州人知秀州植畏慎寡言笑所至官舍蔬果不輒採家無長物時稱其廉高覿宿州蘄人爲嘉興主簿謙已愛民有循吏風龎籍武城人仁宗時知秀州曉律令長於吏事持法深峭治民有惠愛李惟幾河内人嘉祐中知海鹽歲洊饑上書漕使請官錢貸民糴種濬溝洫樹木閘置鄉底堰三十餘所水旱有備民獲歲稔何執中龍泉人元祐中知海鹽縣爲政識先後邑人紀其十異洪皓鄙陽人宣和中爲秀州司錄大水皓白郡守以拯荒自任發廩捐直以糶民坌集皓恐其紛競乃別以青白幟涅其手識之令嚴而惠偏浙東綱米過城下皓復白守邀留之守不可皓曰願以一身易十萬命人感之切骨號洪佛子趙叔近宋宗室建炎元年守秀州杭卒陳通反詔辛道宗將西兵討之兵潰爲亂抵城下叔近乘城諭以禍福通斂兵去楊存中崞縣人爲閤門祗候建炎二年討賊徐明於嘉興先登主帥將屠城存中力諫止之戮其渠魁郡頼以定朱良吳人為海鹽尉金兵入境良被甲執戈集所部百餘人奮擊衆為披靡力不敵死事聞官其子思孜等姚憲剡人知秀州土豪舍匿亡命為姦盜州縣莫敢詰憲擒之並支黨悉置於法焚其巢穴州里遂安浙西大饑憲請輸粟萬斛以賑朝廷賜書奬之程俱開化人建炎初知秀州金兵渡江遣掠秀州俱厲兵守禦時朝議主和遂乞病歸趙士醫叔近族子為秀州兵馬都監建炎四年金兵入州士醫乘城拒戰城䧟死之贈武翼大夫黄灝都昌人建炎中知秀州兼提舉浙西常平州大饑莩殣相望朝㫖停夏稅灝更請停秋苗不俟報行之言者罪其專削兩秩而從其請孫大雅乾道二年知秀州奏請於諸港浦分作牐堰或斗門及漲涇堰兩創築月河置一牐其兩柱金口基址並以石為之啟閉以時民頼其利邱崈江陰軍人乾道間知秀州時華亭捍海堰廢且百年鹹潮歲大入壞並海田蘇湖皆被其害崈至海口訪遺址已淪沒乃奏創築三月堰成三赴訴之明吕文燧永康人洪武初知嘉興府松江民作亂襲嘉興文燧柵内署率壯士拒守而請援於李文忠移兵擒之諸將因欲屠城文燧爭曰據城者賊也民何罪釋不問畢輝洪武中知崇德縣與縣丞齊搏同心執法不容奸慝太祖遣行人齎勅奬勞賜以醴酒戴􅒐浮梁人永樂中由鄉舉官嘉興教授有學行富人數輩遣其奴子入學􅒐不可賄上官强之執愈堅見忤坐他事去職田玉内江人正統中為桐鄉知縣時閩浙盜起軍需繁急玉經畫有方民以不提丁父憂服闋民乞還任詔從之蔡楫沛縣人為嘉興知縣初至官岀滯囚二百餘人勸率富民納逋糧四十八萬有奇置善惡兩牌民皆感愧趨善黄懋元氏人正純間為嘉興府築捍海隄建濟衆倉繕完澉浦乍浦二城好賢樂善有古循良風楊繼宗陽城人成化中知嘉興府以一僕自隨署齋蕭然時集父老問疾苦為祛除之興社學遇學官以賓禮文教大興御史孔儒清軍里老多撻死繼宗榜曰御史杖人至死者詣府報名儒銜之瀕行突入府署發篋視敝洪異龍溪人正德中知崇德縣開天長河以灌田邑之千乘鄉蕪地盡成沃壤何源廣昌人嘉靖中知嘉興縣雪郭杰十年冤獄邑稱神明杜造冊詭寄止鹽課增額官舍蕭然顧廷對泰州人嘉靖中為平湖知縣創均徭法以便民龎尚鵬按浙頒其制行之各郡蔡逢時寕國人萬厯中知海鹽縣行均甲法以三百二十畝受一役而户勿論於是富者無詭匿貧者無偏累役法稱平又革坊廂丁田役立門攤雇夫法至今便之黄希憲金谿人萬厯間知嘉興府以清白自矢置天鑒簿登記贖鍰毫不自私聽訟必情理相參勤於課士小民水旱步禱輒應鄭振先武進人萬厯間知嘉興縣馭下嚴胥徒市魁惴惴守功令經理賦法酌北運之宜條上四款皆曲中時弊民困以蘇會大祲駕小船至村落問民疾苦發滯榖萬斛民得更生本朝史載蘭陽人順治中知嘉興府剛直不畏强禦屬吏餽送一無所受吏民畏愛尹從王山東人順治中為嘉興推官清嚴疾惡豪右避跡立漕糧交兌法軍民不相見至今遵行之鄭鈺大興人任嘉興守備順治十七年會剿石門賊力戰陣亡事聞賜卹廕李見龍蒙陰人康熙初知秀水縣布衣蔬食刻苦自勵賦役驛遞皆有條理不以累民莫大勲宜興人康熙初知嘉興縣立官解白糧法至今便之在任七載清介之守始終不易梁徽介休人乾隆中知嘉善縣清嚴勤慎邑支河多盜募技勇者巡緝盜斂跡邑西北鄙地卑田禾被淹徽擇農隙時築圩岸禦水至今便之嘉慶五年賜祀名宦李賡芸嘉定人乾隆進士嘉慶元年知平湖縣下車之日首謁陸清獻祠悉法其治盡心撫字訓士除奸邑中稱神明以治最擢同知尋守嘉興正已敢以苞苴進巡撫阮率屬生辰令節閉門却埽莫元理浙漕持官民軍三者之平多用其言至今沿其法糶分廠賑民以粥實惠徧郡屬水災奉檄減及全活數十萬人人物漢張武由拳人父業郡門下掾送太守妻子還鄉里至河内亭遇盜戰死亡失尸骸武年幼不及識父後之太學受業每節持父遺劒至亡處祭醊而還太守第五倫嘉其行舉孝廉遭母喪過毁傷父魂靈不返因哀慟絶命嚴忌本姓莊避明帝諱改嚴由拳人與司馬相如俱好詞賦受知梁孝王子助舉賢良對䇿百餘人武帝善助對獨擢爲中大夫晉韓績字興齋嘉興人少好文學以潛退爲操布衣蔬食不交當世東士並宗敬焉咸康末會稽内史孔愉薦之召拜博士稱老病不起唐邱爲嘉興人事繼母孝甞有靈芝生堂下官至太子右庶子及致仕年八十餘而母無恙詔給俸祿之半善爲詩與王維劉長卿友善陸贄字敬輿嘉興人十八第進士中博學宏詞又以書判拔萃𥙷渭南尉德宗素聞其名召爲翰林學士從狩奉天機務填總書詔日數百贄初若不經思逮成皆周盡事情旁吏承寫不給而贄沛然有餘帝倚之常居中參決可否時號内相甞爲帝言今盜遍天下宜痛自咎悔以惑人心故所下制書雖武人悍卒無不流涕勸帝推誠納諌及發瓊林大盈二庫以賜貧民以勞遷諫議大夫仍爲學士爲權倖阻抑乆不得相貞元八年以中書侍郎同中書門下平章事裴延齡以奸佞得君贄苦諌帝不懌罷爲太子賓客竟受延齡譖貶忠州别駕順宗立召還召未至卒贈兵部尚書諡曰宣贄小心精潔未嘗有過遇事有可否必言之或規其太過贄曰我上不負天子下不負所學遑他惜乎所上論諌數十百篇譏陳時病皆本仁義可爲後世法族孫扆光啟進士爲中書舍人工詞敏速同僚皆遜不及官至同中書門下平章事朱全忠殺之白馬驛徐岱字處仁嘉興人於學無所不通大厯中劉晏表爲校書郎觀察使李栖筠欽其賢署所居爲復禮鄉貞元初爲太子諸王侍讀遷給事中史館修撰性篤慎不談人短宗族孤懦者皆爲婚嫁卒贈禮部尚書顧况字逋翁海鹽人長於歌詩嘗爲韓滉節度判官德宗時徵爲著作郎後結廬茅山上自號華陽真逸子非熊亦有名宋謝炎字化南嘉興人慕韓柳爲文與盧禎齊名時謂之盧謝端拱初舉進士知華容公安二縣卒著有文集二十卷婁機字彦發嘉興人乾道進士寕宗時爲秘書郎皇太子就傅以機兼資善堂小學教授日陳正言正道隨事開明多所禆益擢御史蘇師旦怙勢妄作獨憚機韓侂胄議開邊機極口阻之遂以言去後召為吏部侍郎進叅知政敝蠧紛然機裨贊甚多以資政殿事時瘡痍方深學士致仕機撫其弟模棟卒為善士居郷以誠接物稱獎人才不遺寸長深於書學尺牘人多藏弆輔廣字漢卿父逵本趙州人乾道間吕祖謙遊祖謙殁師事朱官統制居崇德廣初從子與黄幹並稱時偽學禁興蔡元定貶死廣獨侍朱子不去入京師居太學之南集同志講學不輟堅忍篤信終始不渝嘗主崇德學事以躬行倡率其徒學者稱傳貽先生所著有論孟答問六經集解通鑑集義四書纂疏日新錄諸書常楙字長孺其先蜀人曾祖少師同居海鹽遂世為海鹽人舉淳祐進士自常熟尉調臨安判所至以公廉稱知廣德不候請岀社倉粟施賑拜監察御史知無不言尋為兩浙轉運使捐己貲修曰海晏塘邑人築鹽新塘三千六百二十五丈名德之知平江奏蠲苗稅五十餘萬復以郡守例緡為民食軍餉助改浙東安撫使水災捐楮請糴民食不至乏絶召為刑部侍郎值除吏部侍郎㕘知政事卒陸德輿字載之崇德人由童子科登第有文名官至吏部尚書弟文輿通經史官按判官宋亡隱居不察司仕趙孟堅字子固海鹽人系岀安定郡王登寶慶進士厯官集英殿修撰户景定初遷翰林學士承知嚴州歲饑賑五萬㫖孟堅修雅博識善餘筆札工詩文宋亡不仕陳塏字子爽嘉興人累官太府卿懽工部侍郎以直言罷未幾進集英殿修撰厯權吏户兵三部侍郎瑞明殿學士卒諡清毅塏屢厯麾節軍民愛戴而又樂薦士所著可齋瓿稿二十卷陶菊隱嘉興人以號行德祐末元兵南菊隱聞勤王之詔散家財招集下義兵謁文丞相於軍中宋亡遺士流寓者多以當時同邑有趙孟僴華亭有殷澄稱秀州三為依義元張伯淳字師道崇德人九歲舉童子科至元累官福建廉訪司知事以薦召見世中祖問冗官風憲鹽篋楮幣皆當時大議所對悉稱㫖授翰林直學士告歸後又拜侍講學士卒有文集若干卷吳鎮字仲圭嘉興人性高介隱居不仕工詞翰善畫山水竹石每題詩其上時稱為三絶以愛梅自號梅花道人戚敬嘉興人過禮既事母至孝母殁哀葬廬墓以木刻母毁像事之如生張有司論其功士誠掠秀州敬散家財保鄉里辭曰敬為墳墓計敢希賞耶陸正字行正海鹽人贄之後讀書一律吕象數之學始名唐輔宋亡覽終身不忘旁通更名而隱世祖平一宇内訪之不起明鮑恂字仲孚崇德人受易於吳澄有學行元末為温州路學士洪武四年以科舉取用薦召對便殿士召恂同宋濓為考試官十五年命為文華殿大學士輔道東宫恂年己八十餘固辭遂放還所著有易傳大義及西溪漫稿貝瓊字廷琚崇德人篤志好學博通經史百家言善屬文洪武初聘修元史既成受賜歸後舉至京授國子助教後改中都國子監教勲臣子弟瓊學行素優雖將校武夫皆知禮重致仕歸尋卒所著有清江集子翺字季翔官楚府紀善亦能詩王嘉會字原禮嘉興稱㫖授翰林人洪武初以慶徵賦詩院檢討擢國子監司業時方新太學諸生常數千人嘉會與祭酒宗訥嚴立學規終日危坐講解無虚晷以老疾請優詔留之年八十卒官賻卹者甚厚沈夀康海鹽人性至孝與崇德程本立友善期以聖賢實學臺薦與官辭不就鄉人稱孝隱先生洪武中旌其閭程本立字原道崇德人少有大志聞金華朱克修得朱子之學往從之游洪武中以明經薦為秦府引禮舍人後改周府禮官坐累謫雲南馬龍他郎甸長官司吏目土酋煽亂本立單騎往諭悉感悅後復叛西平侯沐英等屬本立行縣典兵事且撫且禦本立不避艱險往來綏輯凡九年民夷安業建文初徵入翰林預修太祖實錄遷右僉都御史出為江西副使未行燕兵入自縊死福王時贈太常卿諡忠介本朝乾隆四十一年賜諡節愍楊任嘉興人洪武中由人材起家厯官袁州致仕靖難師起引疾歸後黄子澄至任家謀舉事為人告被執磔死福王時贈太僕少卿本朝乾隆四十一年賜諡烈愍葉春字景暘海鹽人起家掾吏厯禮部郎中遷福建右叅政與熊㮣巡視應天蘇杭等八府既還復奉命涖浙西凡三治事於鄉人無議其私者官至刑部右侍郎吕原字逢原秀水人正統時鄉試第一廷試第二授編修厯左春坊大學士天順初改通政司叅議兼侍講尋入内閣石亨曹吉祥貴倨獨敬原原與岳正列其在内閣守正持重與李賢彭時相罪狀得甚疏留中原歡庶政稱理進翰林侍郎諡文學士遭母喪歸葬以懿子㦂字秉之以父哀毁廕累卒贈遷太禮部左常卿採集厯朝祀典沿二事俱見施行革爲條例上本寺利便十劉瑾用事再疏乞罷歸項忠字藎臣嘉興人正統進士授刑部主宗䧟北庭乘間南還景泰中由事進員外郎從英郎中遷廣東副使從征瀧水猺有功天順初以平洮岷羌亂疏鄭白渠溉田副七都御史巡撫陜萬餘頃成化四西年滿俊反冒矢石命忠總督軍務往討之大小三百餘戰親卒擒之進右都御史劉通黨李原作亂復詔忠討平之撫開西廠恣横忠輯流民百萬拜兵部尚書時汪直倡九卿劾罷之未幾爲直所中落職直敗復官致仕歸卒贈太子太保諡襄毅子經字成之成化進士厯江西叅政居官亦有聲沈琮字公禮平湖泰中弟珒亦人正統進舉進士爲士爲南京武庫主事景御史父母殁並廬墓終喪珒竟卒於墓所天順中被旌琮後爲廣州知府崔永字彦齡海鹽人嵗而孤母韓改七適同邑桑慎慎為御史坐事謪海南攜韓往永既長徒步至瓊州求母時慎已殁有司以配屬不許歸永復走京師哀請於朝得許舟行遭風而覆永入水負母母得活永竟感寒疾死江西布政司以聞予祭葬仍給驛歸其母張安字靖之海鹽人景泰進士授禮斜給事中景帝得疾適過星變詔罷明年元會安言四方來覲不得一覩天顔必至訛言相驚帝疾不能從而奪門之變作天順中曹石竊柄事關禮科者安輒裁損朝鮮讐殺毛憐詔安偕都指揮武忠往解遂釋兵憲宗初皇太后生辰姚夔等請設齋醮安言無益徒傷大體乃止後以論救王徽等與内閣忤出為汀州知府尋乞歸屠勲字元勲平湖人成化進士厯刑部郎中有疑獄或事干權貴尚書輒屬勲勳剖決無滯宏治𥘉為大理少卿應詔言十事漳州温文進亂勲往視諭以禍福誅其渠一方遂靖累遷副都御史巡撫順天整飭薊州邊備聲績最著厯右都御史協理院事武宗立進刑部尚書劉瑾亂政引疾去卒贈太保諡康僖子應埈舉進士厯官諭德工於文潘蕃字廷芳崇德人成化進士厯刑部郎蕃按中雲南鎮守中官錢能為巡撫王恕所劾詔盡得其實出守鄖陽撫循流民皆成土著宏治時以右副都御史巡撫四川蠻人服其威信進右都御史總督兩廣屢平劇賊正德初入為南京刑部尚書踰年致仕劉瑾用事詘以罪與劉大夏俱戍肅瑾誅復官歸無屋稅他人宅居焉吳昂字德翼海鹽人登宏治進士厯少受學海寕祝萃假牛棚讀書福建僉事福寕有訟妻殺夫者獄成昂疑有冤禱諸神夢一福子者嘗與其夫行賈捕訊兒據人腹訪里有杜之遂伏又與平古田賊遷山東副使後福建右布政司致以仕趙漢字鴻逵平湖人正徳進士授建昌推官擢給事中嘉靖初疏劾不聽同廷臣哭太監崔文興䜛亂政宜急賜譴逐爭大禮詔繫獄廷杖尋以疾去起遷工科都久專機政給事中疏言内閣桂萼翟鑾曠職張璁未聞求賢共濟忤㫖奪俸終山西㕘政陸杰字元望平湖人正德進士父淞光祿少卿常以言事忤劉瑾下詔獄志授兵部主事武宗南巡伏闕極諫杖幾斃厯廣東布政司湖廣巡撫俱有聲績進工部侍郎卒贈工部尚書鍾梁字彦材海鹽人正德進士為工部郎諌武宗南巡杖闕下幾斃嘉靖初慮囚江南平反者數百人出知濟南南昌俱有聲績年四十即乞歸張徽字德卿秀水人正德進士嘉靖初授大理評事會議興獻大禮忤㫖廷杖尋復官進寺副慮囚雲南釋殊死以下百餘人轉寺正出知南雄府有惠政鄭曉字窒甫海鹽人嘉靖進士博洽多聞尤諳典故授職方主事嘗撰次九邊圖志以爭大禮廷杖調吏部厯考功郎中會考察京官大學士嚴嵩欲去素所不悅者曉執不可嵩欲以子世蕃為尚寶丞曉又爭之遂以事謫和州同知後厯兵部侍郎總督漕運有破倭功累擢刑部尚書遷吏部又改刑部時嵩勢益熾為所扼志不盡行尋落職卒復官隆慶初贈太子太保諡端簡所著有吾學編陸垹字秀卿嘉善人嘉靖進士初任南刑曹嚴嵩屢謁之垹拒不見曰此人雖有時名實奸雄也厯岳州知府有政績先是有巨木飃入境前守不知為殿材以遺侍郎方鈍督木使者誤論垹或勸自白垹曰二公皆賢者辨則彼將獲罪竟自承之巡按御史伊敏生薦於朝擢太僕少卿敏生亦以薦賢得增秩垹仕至巡撫河南右僉都御史錢薇字懋垣海鹽人嘉靖進士厯禮科給事中先後論大學士李時工部尚書温仁和外戚蔣綸禮部尚書夏言又劾翊國公郭勲不法七事既因星變極言主德闕失所致帝深銜之及帝將南巡又疏諌會選官僚偕同官請集内閣九卿公舉帝挾前憾斥為民既歸務講學足不及公府隆慶初贈太常寺少卿鄭履淳字叔初曉子嘉靖進士厯尚寶丞隆慶三年上疏言羣小侮常明良疏隔自開闢以來未有若是而可以永安者語極劉切帝大怒杖之百繫獄逾年釋為民神宗立起尚實丞遷光祿少卿卒陸光祖字與繩平湖人嘉靖進士厯儀制郎中議事識大體改考功文選務汲引人才超擢廉能下僚競勸累遷工部侍郎與張居正不合引歸尋召𥙷吏部凡居正所擯老成名德悉為起用帝知其清直書名御屏進尚書舉許孚遠顧憲成等二十二人時論翕然卒贈太子太保諡莊簡張應治字體徵秀水人嘉靖進士厯南京户科給事中初南京司禮監增造神帛廣募工匠徵派料價甚為民累遂疏請一切停罷報可又以災異勸停内批罷廵幸撤織造内臣語甚切直應治居帝諌垣力抗權倖數進讜言時號稱職會高拱秉銓憾應治嘗劾己出為九江知府萬厯初以治最遷南京兵備副使陸長庚字元白平湖人萬厯進士授知州條陳水兌緞價採煤三廣大德事民困以甦入為刑部主事厯擢廣西桂時猺賊為亂用兵三萬五千費餉十三平道叅政萬長庚力請於制府得撤兵僅留三千守荔浦賊果懈防守遣兵夜襲之擒其魁諸洞悉平累官兵部侍郎丁賓字禮原嘉善人隆慶進士擢御史張居正劉臺以贓屬賓往治力辭忤居正意去官誣久之起南京大理丞遷南京右僉都御史兼督操江率將校巡視江防增兵戍守部内晏然妖民劉天緒事覺兵部尚書孫鑛欲事力平反論七人死餘皆窮治賔時攝刑部大獲釋擢南京工部尚理書致仕賔官南都三十年每遇旱潦輒請賑貸出財佐之撫按上其先後事加太子太保崇禎時家卒諡清惠沈思孝字純父嘉興人隆慶進事張居正父喪奪情思士厯刑部孝與員外主郎艾穆合疏極諌廷杖八十戍神電衞後召復厯大理卿中官郝金以矯懿㫖下獄刑部薄其罪思孝駁正誅之遷右都御史協理戎政極論内閣趙志臯兵部石星誤主日本封貢之罪引疾歸卒贈太子太保黄洪憲字懋忠秀水人隆慶進士授庶吉士厯官至侍讀學士會忌者以試事中之遂乞歸洪憲端謹淳厚至取予尤嚴一介使朝鮮歸止攜圖書數卷諸牢禮庭實皆籍記遣譯者謝却之朝鮮人為立却金亭所著有朝鮮志學易詳說學詩多識碧山學士等稿馮夢禎字開之秀水人萬厯會試第一官編修張居正奪情夢禎詣其子嗣修力言不可忤居正病免後復官累遷南國子監祭酒與諸生砥名節正文體尋中蜚語歸陳泰來字伯符平湖人萬厯進士厯禮部員外郎三王並封詔下泰來與郎中于孔兼疏爭之考功郎中趙南星削籍又抗疏論救忤旨謫饒平典史卒天啟中贈光祿少卿馬應圖字心易平湖人萬厯進士厯南京禮部郎中上疏譏切執政又劾給事齊世臣等忤㫖謫大同典史久之起刑部主事進員外郎疏請建儲不報尋卒吳宏濟字春陽秀水人萬厯進士擢御史疏劾福建巡撫司汝濟大理卿吳定戎政侍郎郝杰等不納三王並封詔下偕同官抗疏力爭已以論救高攀龍語侵首輔王錫爵斥為民天啟初贈光祿少卿朱國祚字養淳秀水人萬厯十一年進士廷對第一授修撰進諭德擢禮部侍郎攝部事時儲位未定國祚爭國本至數十疏後因災異請修省並陳安人心收人望通下情清濫獄四事其言剴切會有䜛者遂乞歸里居光宗立拜禮部尚書兼東閣大學士入叅機事天啟三年進少保户部尚書改武英殿累疏乞歸卒贈太傅諡文恪國祚居官廉慎持大體時稱長者岳元聲字之初嘉興人萬厯進士知旌德縣以强項稱遷國子監丞諫止選良家女入宫進工部郎中爭三王並封又極論關白之亂與政府忤削籍歸天啟初起厯太僕卿晉南兵部侍郎劾魏忠賢不法事罷歸徐從治字肩虞海鹽人萬厯進士除桐城知縣累遷兖東副使討擒妖賊徐鴻儒錄功進山東右布政使崇禎初以故秩飭薊州兵備軍缺餉而譁圍遵撫從治單騎往諭亂遂與登萊撫定孔有德臣謝璉分反擢右副都御史巡撫守萊州賊攻城七十餘山東日從治隨方備援兵不至禦賊不能下而尚書熊明遇惑於撫議從治三疏爭之不能得閲兵城上中礮死贈兵部尚書建祠曰忠烈本朝乾隆四十一年賜諡忠愍徐必達字德夫秀水人萬厯進士知溧水縣築石臼湖隄奏除齊等姻戚子孫軍籍遷光祿丞陳白糧利弊十一泰事從之厯應天府尹天啟初以右僉都御史督操江軍白蓮賊將窺徐州必達募銳卒會山東兵擊破之進兵部侍郎王允昌字永叔嘉興同知分理永人萬厯舉人寕衛事天啟為貴陽初奢崇明父子掠拜自縊賊永寕反允昌刺血焚其屍一門十三草三揭繳即上官人皆遇害贈光祿再寺卿魏大中字孔時嘉善人萬厯進士官行人初擢工科給事中彈劾無所避邪天啟黨為之四側目遷吏科大罪忠賢疑都給稿出事中楊漣疏劾魏忠賢二大中而大中又率同官繼十之遂削籍尋逮下詔初贈太常卿諡忠獄與揚漣左節長子學洢光斗同字子敬夕斃崇禎為諸生好學工文有至性大中被逮學洢晝伏夜行隨檻車而北營救不得以喪歸日夕號哭卒詔旌為孝子次子學濂崇禎癸未進士改庶吉士甲申國變縊死胡震亨字孝轅海鹽人由舉人厯合肥知縣定州知州皆有惠政入為職方員外郎震亨雅知兵嘗與宿將劉綎論兵綎亦心折焉性好學家多藏書所撰有唐音統籤海鹽圖經諸書行世同時有姚士麟字叔祥亦博洽與震亨善費彦芳字爾英石門人萬厯間以舉人知隆德縣崇禎中流寇䧟城被執罵賊而死本朝乾隆四十一年賜諡烈愍彭期生字觀民海鹽人父宗孟為御史有聲期生舉進士厯知濟南府坐事謫張獻忠亂江西都御史李邦華薦為江西兵備僉事駐吉安後偕楊廷麟守贑州城破冠帶自刎死贈太僕寺卿本朝乾隆四十一年賜諡節愍項元汴字子京嘉興人自號墨林居士工繪事精於鑒賞其所藏法書名畫極一時之盛以天籟閣項墨林印記識之吳麟徵字聖生海鹽人天啟進士崇禎中累官吏科都給事中遇事敢言流寇日熾疏請撤寕遠兵專力守關内遷太常少卿賊薄京師麟徵守西直門募死士縋城擊賊多斬獲城䧟遂自經福王時贈兵部右侍郎諡忠節本朝順治間賜諡貞肅徐石麒字寶摩嘉興人天啟進士授工部營繕主事筦節慎庫忤魏忠賢削籍崇禎初起南京禮部主事累遷刑部侍郎暑部事時帝以刑威御下法官多深文附會與重比石麟以次審理多所平反至封疆大案又執法不少貸尋推尚書以輕擬姜埰熊開元罪落職福王時召拜吏部尚書與馬士英輩不協遂歸及郡城將破朝服自縊妻孫氏亦赴水死本朝乾隆四十一年賜諡忠懿徐一源字宙盂海鹽人為歸德衛經厯崇禎十五年流寇犯歸德一源分防北門殺賊甚衆城破猶巷戰被執罵賊死一年本朝乾隆四十賜諡烈愍沈方字大愚桐鄉人崇禎中以副榜授荆門州同知李自成羅汝才等亂河南方甫至巡撫宋一鶴檄使禦賊方以舟師破之江上川兵二萬應調過荊門知州以疾去州人惶竄方馳還攝州事詣營中勞問開曉大義軍皆肅然無犯賊逼城方率民兵死守城䧟不屈遂遇害一家十八人皆死之本朝乾隆四十一年賜諡節愍徐世淳字中明必達子崇禎中由舉人授永嘉教諭再遷隨州知州張獻忠䧟襄陽遂來犯世淳曉夜固守援絶城䧟世淳勒馬巷戰為亂刀砍死子肇梁慟哭罵賊一家十八人皆死事聞贈太僕卿肇梁贈國子監助教本朝乾隆四十一年賜諡烈愍湯芬字方侯嘉善人崇禎進士福王時為史可法監紀推官後分守興泉大兵至興化城破芬緋衣坐堂上被殺死本朝乾隆四十一年賜諡烈愍陸清原字嗣白平湖人崇禎進士除增城知縣擢御史巡按福建知漳州賊梁良率衆萬餘攻城清原計擒賊内應者復從間道擊之獲其渠魁斬以殉明亡沉江死十一年本朝乾隆四賜諡忠節項嘉謨字君禹嘉興人工詩畫以武健授薊遼守備後棄官歸南都破盡束所著詩文於懷率其二子翼心及妾張氏投天星湖死本朝乾隆四十一年賜諡節愍陸燦字振玉平湖人崇禎進士授濟南推官己卯城䧟死之妻孫氏妾王氏及子凡同死者三十七人又李毓新字香之嘉興人崇禎進士授潮州司理閩寇姜世英等犯湯執中嘉興肇慶遂遇害次子禎先抱父屍死又人廬陵縣丞崇禎壬午粤寇逼郡城執中率民勇集鄉兵禦賊𬒳害俱於本朝乾隆四十一年賜諡節愍又訓導陸士鉉字古雪平湖人甲貢為溧陽縣申聞變絶粒死張貳德秀水人以鄉丞轉湖都司經厯罷歸城破與妻侯氏俱死女適同邑徐世淳子肇梁亦自縊俱於本朝乾隆四十一年賜入忠義祠吳爾壎字介之石門人警逼召對徳政崇禎進士授庶吉士時闖賊殿明亡拔佩刀斷一指授孝廉祝淵曰願間道依史可寄吾家為信法遂死之本朝翁自涵字仲膠州升順治初以守將海時行舉人厯官給驕恣自涵疏事中時劾之繼而時行果叛前後章疏凡十上皆關大計性至孝以奔父喪遂不起錢楞字芃生嘉善人順治三年隨征入閩署將樂縣山寇吳長文等圍縣城無兵楞與丞方抗督鄉勇登陴拒守凡九月城城破率家丁巷戰手刃二賊馬蹶被殺雍正五年楞孫以塏具陳前事請卹追贈僉事以塏戊辰進士官至禮部尚書諡恭恪屠洪基嘉興人順治八年知陽山縣賊馬寶犯城洪基固守賊不能破會援至出城夾擊斬獲甚衆明年賊復率步騎萬餘來攻城䧟𬒳執不風罵賊死曹溶字潔躬秀水人明崇禎進士入本朝累官户部侍郎終山西副使博學工詩文又曹爾堪字子顧嘉善人順治進士由庶吉士授編修累官侍講學士有南溪集行世杜臻字肇余秀水人順治進士入翰林累遷吏部侍郎時耿尚逆黨悉降督撫議以海壖棄地處之命臻往視形勢徧厯沿海區置有方遷刑部尚書舊制獄囚月給米煤獄吏率乾没囚多瘐死臻力清其弊囚皆感泣改兵部時以兵冗耗餉議裁汰臻以遽裁則衆無所歸請自後缺伍勿補數年自減從之轉禮部致仕歸王庭字言遠嘉興人工文詞順治進士厯官廣州知府江西山西布政俱以清操稱所著有秋澗詩等集陸隴其字稼書平湖人康熙進士知嘉定縣潔己愛民德教大行忤上官罷歸左都御史魏象樞再疏論薦復職補靈夀知縣行取擢御史上肅官方扶名教等疏天下傳之隴其素行純粹其學一本程朱以居敬窮理為宗點勘宋元以來諸儒之說辨析是非窮年矻矻一言一動充養自然所著困勉錄三魚堂集四書大全松陽講義等書皆有功聖道雍正二年詔從祀文廟乾隆元年贈内閣學士兼禮部侍郎諡清獻張履祥桐鄉人幼孤貧受論孟於其母母曰孔孟即兩家無父兒也既長從劉宗周聞慎獨之學晚乃專意程朱立身端直一以躬行為務居常親習農事著補農書及揚園全書三十四卷沈璜字若水嘉興人諸生潛心理學見義必為敦孝弟尚任睦拯人急難不遺餘力義行之稱遠近無間言訓課子孫並登科第著有均田平賦議殁祀鄉賢葉燮嘉興人父紹袁明天啟進士燮幼頴悟年四歲紹袁授以楚詞即能成誦長工詩文本朝康熙初成進士知寶應縣時三逆未靖邑當衝劇軍務匆促無少間又值歲歉民飢而境内運河數百里且虞潰決燮極意籌畫百計𥙷苴無懈事無累民以抗直不附上官意與嘉定知縣陸隴其同罷歸著有已畦文集王士正稱其詩古文能自成一家言彭孫遹字駿孫海鹽人順治進士授中書舍人康熙十八年試博學宏討第一授編修累官吏部侍郎乞歸孫遹賦才敏速尤工詩詞同時徐嘉炎字勝力陸葇字義山平湖人俱以薦試入翰林官並至内閣學士朱彝尊字錫鬯秀水人少穎悟書過目輒成誦肆力古學客遊南北必槖載經史百家以自隨康熙十八年召試博學宏詞授檢討入直内廷未幾罷歸彝尊博極羣書尤長於考据為詩清新贍麗與新城王士正齊名日下舊聞明詩綜凡數百所著經義考曝書亭集卷子昆田亦能詩早卒又同邑盛世佐官龍里知縣譔儀禮集編四十卷集衆解而研辨之持論嚴謹諸家謬誤辨尤詳陸棻平湖人原名世枋康熙初進士尋舉博學宏詞授編修直南書房厯官至内閣學士嘗在閣奏勾決本請出矜疑二十餘人棻性簡易尤孝友居顯貴欿然不自足年七十卒著有雅坪文稿詞譜若干卷姪奎勲性恬淡不競榮利年幾週甲始成康熙六十年進士選庶吉士授編修尋告歸主廣西秀峰書院創立學規仿朱子白鹿洞意成就甚衆奎勲初於醫卜術數韜鈐步算之道書靡不旁究有陸堂易後乃篤志說經著學字音舉要等書譚吉璁嘉興人少有孝行與朱彝尊李良年同膺博學宏詞薦報罷以諸生試國子監第一授宏文館撰文中書舍人岀知延安府吳逆之亂吉璁守榆林城獨完事平論功優敘著有肅松錄延綏鎮志爾雅綱目嘉樹堂集王翃字介人嘉興人詩為陳子龍所推許同邑周篔字青士隱居市廛秀水李良年字武曾並好學能詩朱彝尊少居梅會里以三人為師友終身嚴事之吳涵字容大石門人康熙進士由編修厯官副都厯工刑御史疏二部侍請禁止湖南加派安插四川流郎進吏部兼翰林院掌院學士民釐清銓法一月衢吏不得上前預列應選應補姓名次序揭於通下其手又念舉人㨂選壅滯疏請單月兼選著為令都御史以病告升左歸高士奇字澹湖遊人自錢塘徙平京師聖祖聞其林厯詹名召見試事直内廷詩文法書皆第一授中書改翰二十年以養母歸即家拜禮部侍郎兼學士卒諡文恪馮景夏字伯陽桐鄉人康熙癸酉舉人知長安縣嘗決疑獄釋無辜厯知膠州築隄捍海人稱馮公隄轉蘇松糧儲道嘗以吏藉斛為奸斛方口大浮則已多斛高口窄雖浮亦少議製小口斛力請行之他省取以為式雍正間奉㫖清查常州府屬積欠悉心勘核分立官侵吏蝕民欠三冊舊弊肅清升安徽布政使厯官刑部侍郎致仕卒張行健海鹽人官安徽良禾巡檢康熙十三年饒州土寇犯祁門縣城䧟被執不屈賊斷其兩臂罵益厲納坎中以刃剚其腹死家屬咸同遇害事聞贈經厯陸紹琦字景韓秀水人康熙己丑進士授檢討厯官太常寺少卿清勤奉職常視學粤西禁絶飛撥之弊士習一新自言生平不妄交一人不妄為一事不妄取一錢聞者信之子樹本乾隆丁巳進士授編修掌教鴛湖書院二十年魁人碩士多出其門下錢陳羣字主敬嘉興人康熙辛丑進士選庶吉士授編修厯官至刑部侍郎乾隆十七年乞歸尋加尚書銜賜在家食俸再晉太子太傅卒時年九十餘贈太傅諡文端入祀賢良祠陳羣素工詩恩遇耄而逾渥子汝誠字立之乾隆戊辰進士選庶吉士授編修入直南書房厯官至刑部侍郎卒次子汝恭乾隆丁卯舉人知杰陽縣課農桑勵學校務求實政士民德之終安慶府同知諸錦字襄七秀水人雍正甲辰進士選庶常改教授乾隆元年試博學宏詞授編修重入翰苑官贊善著有絳樹閣詩文集程緒祖字纘三嘉善人家貧力學屢躓場屋遂絶意仕進訓課諸子孝友任卹敦本睦族布衣蔬食神明不衰夀至一百三歲乾隆三十六年旌表子鍾彦雍正癸丑進士由庶常擢諌臺多所建白奏築西直門外至西苑石道至今往來便之終太常寺少卿著有南村草堂集許椿字董園嘉善人乾隆辛酉舉人知内江縣先是王師征緬甸灌縣令沈鵬督解騾馬沈母老而病椿請代行嗣金川蠢動司臺站轉輸不竭六月賊突至椿率站夫力戰死之事聞賜祭葬贈道銜入祀郷賢又黄殿臣秀水人乾隆五十二年以温州營千總檄赴臺灣剿林爽文擒獲甚衆後力戰殁於陣同時戰殁者有澎湖營千總陳淮平湖人均卹如例馮浩字養吾桐鄉人乾隆戊辰進士官戸科給事中居臺省屏絶聲氣以病歸足不至公庭子應榴官江西布政使浩就養不見一屬吏著孟亭詩文集及李玉溪詩文集詳註嘉慶七年賜祀鄉賢錢載字坤一秀水人以副貢生舉博學宏詞再舉經學乾隆壬申進士改庶常由編修官至禮部侍郎入直尚書房立身廉謹有節概五典鄉試一視學政所至稱得士工畫進呈所畫梅花高宗題長律一首士論榮之祁起元桐鄉人乾隆四十五年旌表孝子又婁東秀水人張世昌平湖人俱以孝子於乾隆年間旌吳元凱方樹業俱平湖人謝觀瀾嘉興人陳元朗秀水人李應占海鹽人俱以孝子於嘉慶年間旌流寓漢施延沛國蘄人避地吳郡海鹽家貧嘗賃作由拳半路亭食其力以養母是時吳會未分山陰馮敷為督郵到縣延持箒往敷知其賢者下車入亭請與飲食脫衣與之餉錢不受順帝時官至太尉宋陳舜俞烏程人時青苗法行棄官歸居秀之白牛村自號白牛居士錢顗無錫人熙安初以論事貶自衢徙秀州家貧母老至貸親舊以給朝餔而怡然無謫官之色蘇軾遺以詩有烏府先生鐵作肝之句世稱為鐵肝御史顔復復聖裔厯官禮部尚書建炎南渡家石門鎮北子孫自為村落號陋巷村趙汝愚鄱陽人孝宗乾道間魁多士寓石門之洲錢李曾伯覃懷人七開大閫儒而知兵逺人聞風敬憚後移居在嘉興元顧阿英崑山人意氣自豪僑居嘉興合溪漁釣五湖三泖間自稱金粟道人明徐一夔天台人工文元末避地嘉善所居有獨柞軒自為記高巽志蕭縣人博學多文元末寓居嘉興夏允彝華亭人寄籍嘉善官吏部考功主事遭國變自沉於河而死列女漢許升妻吕氏名榮由拳人升少為博徒榮數勸修學輒流涕升感激自勵遂以成名赴本州辟至夀春為盜所害刺史獲盜榮詣州手斷其頭以祭升後郡遭賊義不受辱被殺元吳守正妻禹氏名淑靖紹興人徙家石門至正中盗䧟城氏攜幼女登舟以避盜入其舟將犯之乃抱女投水死柳烈女嘉興人至正末紅巾賊䧟嘉興女年十八同父母竄匿賊得之驅行至河滸投水死錢氏二女嘉興人紅巾之亂賊至其家二女義不受辱相與結𬒮投河死今名為烈女河明朱士廉妻董氏名淑貞海鹽董鎮女贅士廉於家年二十四夫亡生子甫九月誓不改適迎姑終養洪武中旌蔡氏石門人許字何鶴齡鶴齡多行不義兩家父母俱議改婚蔡誓死不從遂歸鶴齡夫日事淫博蔡泣諌冀悔悟及翁死鶴齡不為理喪蔡罄衣資經理殯葬夫愈兇暴逼以不義蔡懼辱身遂經死姚􅕈妻周氏海鹽人名福蓮􅕈死家甚貧父議改適投河而死張安妾高氏李氏高名寒香李名晚翠年皆十四五相繼事安安疾革屬子必嫁之二妾聞而悲慟皆翦髪誓死同居一樓者三十九年家人罕見其面有司以聞詔旌雙節張貞女秀水人張紐之女年十四許字劉伯春未娶而卒女號泣翦髪自為詩祭之三年服闋即絶粒旬日死時年二十項貞女秀水人字周應祁精女工通列女傳事祖母及母極孝聞周病瘵即持齋黙祝願以身代及訃聞父母欲秘其事而女己喻乃潛易縞素而紉其下裳大書於几上曰上告父母兒不得奉一日懽今爲周郎死遂自縊兩家從其志竟合葬焉朱貴妻范氏石門人貴爲冦所害范厲聲奮臂爪賊面賊剖其腹猶罵不絶口又吳鸞妻戴氏寇執將犯之戴力拒被殺葉氏女嘉興人字錢氏子未嫁嘉靖中母與女爲倭所執欲辱其母女時年十七給以身代求釋母母得脫遂罵賊投吳家塘水死時曾巖妻張氏遇倭不辱亦投河死袁烺妻吕氏烺嘉善諸生明季兵亂吕竊烺匕首佩之一日舟行遇兵遂赴水兵以鈎攬其髪吕出匕首截斷其髪乃沒錢淳妻曹氏嘉善人明季兵亂隣婦勸俱逃曹恐往遇辱遂抱幼女赴水死越五日淳歸得屍面如生漳南黄道周傳其事沈氏秀水人年二十一適張未半載遇亂被掠持刀自殺守者奪之乘間投河而死徐世淳妾趙氏倪氏秀水人崇禎末從世淳官隨州流賊害世淳趙氏被執不從罵賊而死倪氏以匿得免賊去慟哭求世淳及趙遺骸棺殮之扶櫬以歸苦節三十餘年世淳死難血衣什襲如故每展對輒嗚咽流涕又世淳子肇梁同父死難妻張氏在家亦自經徐爾榖妻孫氏嘉興人爾榖為尚書石麒繼子以父殉節圍城冒險求骸歸葬遂遁跡湖泖遭禍繫獄知不免以書報孫使早為計孫方飯得書閲畢微哂婢詢之太息曰夫復何言時一女在抱棄之赴水死立而不仆趙氏女平湖人字嘉興戴𥙿津未婚戴卒女脫簪投繯母救之不食但以手扣胸呼往嘉興者三遂絶時秋暑就殮顔色如生歸戴合葬李氏女嘉興人李夢康女性至孝四歲喪母哀如成人事後母以孝聞嘗告其父曰母早世兒何忍去膝下父悲其志聽之父病禱於天有青鳥啣朱實墜藥鐺中人稱為孝感卒年四十有七黄道周題其墓黄一卷妻崔氏海鹽人明末避亂石馬山聞兵至先投幼女於池與長女躍入水死一卷受創危急中忽見崔撲面迎刃得不死越七日屍浮水岀面傷刀痕宛然人咸嘆其靈異劉濓妻馬氏平湖人歸劉一年而寡翁貧利其再適氏閉戸自經救之蘇翁陰納沈氏聘其姑誘與俱出令女奴抱持過沈舟婦投河不得呼天而號須臾風雨晝晦疾雷擊舟沈懼乃旋舟還之苦節以終李士標妻孫氏嘉興人士標官山東海寕州州同崇禎壬午冷口兵督守益力入圍州城甚迫士標疾篤卧起於城上竟卒於雉堞間城遂䧟孫氏率其妾婢僕凡二十三人同日死之又同縣徐石麒妻孫氏項嘉謨妾張氏秀水張貳德妻侯氏俱明末城破同夫死難本朝夏承啟妻周氏石門人順治初被兵掠將逼之堅拒不從罵不絶口死同邑金氏女年十五為盗所執峻拒之投水死姚應鶴妻金氏桐鄉人夫亡衆逼金嫁金投繯以救得免匿母家復脅之金乃泣歸縫紉周身衣拊棺長慟投河抱橋柱死潘文昇妻孫氏海鹽人夫亡矢志撫孤有叔與孫比屋潛許嫁鍾氏孫瞯知即績麻為繩匿之居至期叔告以故孫黙然不應設盃羮奠其夫自縊死邱永侯妻顧氏秀水人夫亡無子紡織養姑十六年里豪糾黨謀娶顧佯許諾閉户自經倪天池妻許氏海鹽人年十入歸倪甫五月夫卒翁繼逝夫兄逼氏嫁糾衆劫之許號天投水以救得免後又至許毁面據井以待曰有入吾門者吾死此衆乃退時内外無倚饔飧不繼族衆憐其苦節月給米膳之年八十二卒吳氏桐鄉人嫁桂某未匝月夫亡號慟欲殉姑曰吾子天而汝又死吾將誰依乃勤紡織奉姑十餘年姑卒或勸之更適吳曰吾所以不死者為姑在耳姑既葬吾事畢矣遂自縊死莊烈女平湖農家女里有無賴乘女父他出夜操戈入室强逼之女守義不屈自經死同邑朱烈女母亡居喪次其姊婿突入欲犯之遂自經死李載華妻徐氏平湖入舅姑逝盡出衣飾營殮殯載華哀毁身殞徐年二十飲泣撫孤踰時孤又殤徐託族人葬三喪畢闔户自經死徐浤妾嚴氏桐鄉人浤病革以嚴無子令他適嚴矢志自守正室丁氏病奉侍湯藥數年不倦及丁没盡出所有營葬兩棺絶粒七日而死時年二十五生員戚維峻妻鍾氏嘉興人同縣四川學政曾王孫妾傅氏監生王元震妻李氏陳枚詹妻姜氏監生王六符妻韓氏蒯廷鑑妻沈氏馮敬軾妻湯氏陳士琦妻周氏吳晉濤妻夏氏生員曾郊妻李氏貢生陸載之妻方氏監生胡廷樞妻李氏范聖宣繼妻沈氏胡士榮妻徐氏李如蘭妻方氏張玉文妻王氏生員馬迴瀾繼妻陳氏沈維仁妻凌氏繼妻高氏梅雪賓妻陳氏陸廷翼妻繆氏王漢褒繼妻陸氏湯紀剛繼妻石氏支威遠妻張氏朱松年妻吕氏王聖與妻張氏監生王士宏妻曹氏周公遜妻俞氏尤貞憲妻韓氏陸欽彦妻蔣氏懷鼎臣妻石氏施本定妻萬氏李耕餘妻張氏施光射妻朱氏徐天英妻胡氏杜百特妻張氏沈敬南妾許氏薛麟書妻吳氏監生屠錫綬妻錢氏費其淵妻宋氏郭右元妻沈氏馮星槎妻王氏顧元春妻王氏金大表妻李氏程天瑞妻李氏程仁瑞妻沈氏孫祈斌繼妻胡氏生員盛定逺妻虞氏胡洪芳妻戴氏沈二最妻属氏曹起鳳妻陳氏生員周旭妻陸氏崔沛妻陸氏孫陞榮妻任氏蕭煥文妻徐氏張樹屏妻禇氏禇言妻金氏汪汝翼妻姚氏金如梁妻盛氏監生馮允和妻江氏錢有蒼妻孫氏鄧元瑛妻周氏沈斌甫妻曹氏鄭聖璋妻程氏張茂德妻吳氏生員孫衡世妻包氏陳