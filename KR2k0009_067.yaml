黃河朱源甚髙順其所趨則沙隨水去遇曲則勢逆而易怒故其道在逢灣取直漳水濁輕而來源平坦若津道徑直則水浮沙沉隨路澱積惟使之多灣則左衝石激水不得定沙亦隨去治漳之法所由與治河不同謹附記漳河在邱縣本朝順治九年自直隸廣平元城等處直注邱縣分為二道一從縣西徑直隸廣宗縣入滹沱河一從縣東徑直隸清河縣北至青縣入運河康熙四十七年入邱上流盡塞而全漳會於東昌府館陶縣古屯氏河在州境自東昌府館陶縣東北流徑夏津縣之南又東北徑高唐州及恩縣界漢書地理志魏郡館陶河水别出為屯氏河東北至漳武入海過郡四行千五百里又溝洫志屯氏河東北徑魏郡清河信都渤海入海廣深與大河等元帝永光五年河決靈鳴犢口而屯氏河絶成帝初清河都尉馮逡請開屯氏河使分流殺水力水經屯氏河徑館淘縣東又東北别河出焉又東徑甘陵之信鄉縣故城南又東徑甘陵縣故城北徑靈縣北又東北徑鄃縣與鳴犢河故瀆合又東徑清河郡北又東北徑陵鄉南又東北徑東武城縣故城南又東北徑東陽縣故城南元和志屯氏河俗名毛河在館陶縣西二里夏津縣北舊志今冠縣館陶邱縣茌平高唐俱有屯氏河故道又有熙河在茌平縣北七十里北流至高唐州入濟南府禹城縣界其源無考蓋即屯氏河也按元和志謂永濟渠南自汲郡引清淇二水東北入臨清此渠蓋漢屯氏故瀆也後人緣此為説清淇屯氏遂混而為一以水經注考之屯氏河自大河決出徑館陶清淵之東而東出清河縣之南清淇水徑館陶清淵之西而出清河之北今考衛河所行自臨清以上則皆古清淇也自臨清以下行清河縣南則古屯氏也與元和志之言頗合然今衛河自武城以下又皆清淇所行非屯氏所能至矣馬頰河在夏津縣東三十里自曹州府濮州朝城縣流入東北流徑莘縣西五十里又北徑堂邑縣西十二里又北徑清平縣十二里又東北徑高唐州西北二十里又東北徑恩縣南二十里津期店亦名津期河又徑縣東十二里東北入濟南府平原縣界按禹貢九河之馬頰孔頴達謂在東光之北通典云在平原郡界與今州境無涉唐時有馬頰河出澶州清豐縣界東北流至平昌合篤馬河即此河也宋至和二年李仲昌議開六塔河引歸橫隴故道歐陽修言六塔止是别河下流已為濱棣德博之患是宋之六塔實行唐之馬頰惟李仲昌所開引商胡決流使之東南入橫隴故道為異耳至嘉祐五年河流派於魏之第五掃二股河自魏恩東至於德滄入海當時馬煩故道又為二股河所行今此河或斷或續故道具存蓋即唐之馬頰宋之六塔二服也沙河在州南舊城東門外東北徑夏津縣西十五里又東北徑武城縣東南十五里又東北入恩縣界舊志相傳為古趙河無水則積沙水盛則成河東流至海或入高唐馬頰河一字河在武城縣西河防志黃河舊經縣境金明昌五年河犯武城隄門年鑿新河修石岸十四里有奇以塞之元時河自河南原武縣決而東南此河遂絶新河在武城縣西北即運河引渠也本朝乾隆三年因城東北隅逼近運河發帑市民地挑濬引河自三官廟前至大三里口計長三百九十丈引水由西北入運以護城垣康臺澤在邱縣東魏書地形志廣平郡平恩縣有康臺澤元和志康臺澤在縣東五里中洲在州城西汶衛二水相會處元時即名中洲其時未有甎板二閘止有舊會通河入衛今則宛在中央始成洲矣東曰鼇頭磯砌以石如鼇頭築觀音閣其上新舊四閘分建左右焉廣濟泉在州西又有通濟普惠二泉俱瀕運河晦顯泉在州南舊城內又有潄玉清惠威武鎮定遺澤洙泗淵源等泉各甃石為井以助會通河之流琉璃井在州城西南古迹臨清故城在今臨清州南本漢清淵縣地後魏析置臨清縣唐屬貝州元和志縣東北至貝州六十里寰宇記縣在大名府東北一百五十里州志宋建炎中患水移治曹仁鎮明洪武二年徙縣治於故縣北八里臨清閘即今治也清淵故城在州西南漢置縣屬魏郡三國魏改屬陽平郡晉及後魏因之北齊改置於貝邱縣界而故城廢水經注淇水又東過清淵縣故城西又厯縣之西北為清淵故縣有清淵之名矣世謂之魚池城非也州志清淵廢縣在臨清州西南四十里按舊唐志臨清即漢清泉縣後魏改名今考地形志清淵與臨清並列元和志亦謂臨清本清泉縣地其非改名可知劉昫誤也東武城故城在武城縣西本戰國時趙邑漢置東武城縣晉太康中去東字北齊移縣於故信城縣隋開皇初改為清河别置武城縣於此唐移治永濟渠西宋大觀中移於今治金峙以故城為鎮元和志貝州武城縣西南至州四十二里府志武城縣武城舊治在縣西十里漢時建宋大觀間衛河決徒今治復陽故城在武城縣東北漢置縣屬清河郡後漢省水經注清河又東北徑復陽縣故城西地理風俗記東武城西北三十里有復陽亭故縣也世名之曰檻城鄃縣故城今夏津縣治本後魏清河縣地隋開皇十六年自今德州平原縣界徙置鄃縣於此唐天寶元年改曰夏津元和志貝州夏津縣西北至州九十里寰宇記夏津縣魏府東北二百五十里府志夏津縣新縣店在縣西北三十里隋開皇間改置夏津唐罹水患徙今治按漢鄃縣在今濟南府平原縣西南水經注河水故瀆東徑鄃縣故城東又東徑平原縣故城西是也後漢書馬武傳注亦云鄃縣故城在今德州平原縣西南後魏時猶治鄃城自北齊廢後隋復改置於此實非漢縣故地元和志謂夏津即漢鄃縣而諸志從之誤也舊志謂漢鄃縣在夏津界别以縣西北之孫生鎮為隋之夏津唐徙今治考隋志開皇十六年置夏津縣大業初廢入清河縣改北齊之武城為清河即今直隸清河縣今夏津西與清河接界疑隋所置夏津即在今縣之地唐時改名當即因比舊志似非無據但隋之夏津偶置尋廢而唐書元和志但承鄃縣言之不及夏津其遺址不可考矣至隋之鄃縣即唐之夏津以元和志寰宇記道理考之即今縣治為是舊志云在東北又謂在西北皆非也信鄉故城在夏津縣西漢置縣亦曰新鄉為侯國後漢省入甘陵水經注屯氏河故瀆東徑甘陵之信鄉縣故城南地理志曰順帝更名安平應劭曰甘陵西北十七里有信鄉故縣也按漢書地理志注孟康曰順帝更名安平水經注亦引之今考郡國志無此縣平恩故城在邱縣西漢地節三年封許廣漢為侯國後漢曰平恩縣應劭曰縣蓋館陶之别鄉舊唐書地理志平恩縣隋自斥漳移於平恩故城置寰宇記高齊天保七年徙治斥漳城在今廣平府威縣隋開皇六年還治平恩九域志縣在洺州東九十里金省入曲周金史地理志曲周縣有平恩鎮是也元改置今縣按邱縣之名自元時始立而明統志云本館陶之别鄉漢析置邱縣屬魏郡不知何據府志又云漢置斥邱縣斥邱即春秋晉乾侯邑魯昭公所處在今直隸廣平府成安縣界闞駰曰地多斥鹵故曰斥邱與邱縣無涉也南曲故城在邱縣北漢置縣屬廣平郡後漢省人平恩縣水經注衡漳故瀆東北徑南曲縣故城西應劭曰平恩北四十里有南曲亭故縣也沙邱廢縣在州西隋開皇十六年析臨清縣置大業初省唐武德五年復置屬毛州貞觀元年省侯城廢縣在武城縣西南本故陵鄉應劭曰東武城西南七十里有陵鄉故縣也後魏置侯城縣屬清河郡水經注清河東北徑陵鄉西後漢封太僕梁松為侯國故世謂之梁侯城遂立侯城縣治此永濟舊縣在州南唐置屬貝州元和志縣東北至州一百十里本漢貝邱縣地臨清縣之南偏大厯七年田承嗣奏於張橋行市置以西並永濟渠而名寰宇記縣在魏府北九十里熙寧五年省為鎮入館陶尋改屬臨清榆陽城在州境水經注淇水東北徑榆陽城北漢昭帝封江德為榆陽侯文穎曰邑在魏郡清淵潄玉亭在州城內明大學士楊守址記又有秀林亭在城外絃歌臺在武城縣西十里舊縣址高九尺上有子遊祠寰宇記臺在御河北岸按魯武城在今沂州府費縣巳於兗州府古迹武城下詳加辨證此臺因漢東武城之名誤為魯邑從而傅會不足據謹附記德星堂在武城縣唐崔鄲建宣宗以其一門孝友題其堂曰德星關隘臨清關在州運河上明宣德間設本朝因之舊用御史及戶部官監收船料商稅今改歸巡撫管理王家淺巡司在州北十五里本朝乾隆三十六年移裴家圈巡司駐此甲馬營巡司在武城縣東北二十五里縣志相傳宋太祖誕生之地明置巡司本朝康熙七年裁尋復設按宋史本紀太祖生於洛陽夾馬營與此地無涉縣志傅會不足信也曹仁鎮在州南八里金史地理志臨清州有曹仁鎮州志宋時常移臨清縣治曹仁鎮今會通渠南宋舊城是搖鞍鎮在州西南六十里州志五代漢高祖屯兵處饒陽鎮在武城縣西北三十里九域志武城有饒陽頓宗竇保舊縣四鎮孫生鎮在夏津縣北二十五里金史地理志夏津縣有孫生鎮縣志嘗徙縣於此一名新縣臨清衛在州治東明置指揮使本朝設守備及領運千總焦屯堡在邱縣東清遞運所在州西南二里又西南五里有會通稅課局裴家圈在夏津縣西四十里運河所經為往來要津舊置巡司本朝乾隆三十六年移駐甲馬營清源水馬驛在州城西南隅舊有驛丞今裁渡河水驛在州北五十里甲馬營水驛在武城縣東北二十五里運河東岸舊有驛丞今裁津梁通濟橋在州新城內臨清閘東當汶水北瀉處明嘉靖二十七年建石橋如閘制以蓄泄河水永濟橋在州外城內會通臨清二閘浮橋也以木四十丈為巨筏絶河橫亘俗名天橋廣濟橋在州西衛河上太平橋在武城縣東門外馬頰橋在夏津縣東南三十里橋側有龍潭禱雨輒應屯氏河橋在夏津縣東北三十里一名董姑橋又卞官橋在縣東北四十里隄堰古隄自臨清州南逾會通河而北繞州城東南東北入夏津縣境抱縣城又東北入恩縣界繞縣西入濟南府界舊志隄堰亘數百里其委絶海蓋古之隄防也或謂之鯀隄寰宇記鯀隄在厯亭縣東三十五里衛河隄在夏津縣西北衛河東岸舊隄北自武城縣界橫河口南至臨清州界二十里口計十九處長五千三百丈有奇又有新隄夾衛河兩岸東岸八處長一千三百九十八丈有奇西岸四處北至武城劉家道口南至潘家口長一千八百五丈又有月隄在縣西衛河之東西兩岸也外不足以防水患故重築內隄歲久缺壞明嘉靖中三修本朝順治中修築完固道墓在武城縣南二里祠廟陳瑄祠在州西南明永樂間瑄疏運河有功故祠焉成湯廟在邱縣城中東北隅明天順三年建春秋上戊致祭子遊廟在武城縣西十里邑人歲時致祭汶河神廟在本州甎閘東雍正八年本朝敕建衛河神廟在本州廣濟橋南本朝康熙十四年建漳河神廟有二一在州城板閘外本朝康熙六十年建雍正三年敕封福漕漳河神一在館陶縣西南四十里館陶鎮本朝雍正四年建敕封惠濟漳河神寺觀清涼寺在州南門外明成化間建寺內雙檜連抱高六七尋枝幹挺拔數百年物也大安寺在州治西明永樂中建大雲寺在夏津縣東二十里唐時建資佛寺在夏津縣治北舊有塔高十二級明宏治中於塔中掘出石槨金棺內有水晶瓶藏舍利七粒又中一石匣上刻太平興國八年定光佛舍利也洪濟寺在邱縣治東宋皇祐中建無為觀在州城南一里運河上即三官廟本朝康熙四十二年聖祖仁皇帝御書是額因改觀名乾隆三十年高宗純皇帝南巡經此御賜額曰福祐津途三十六年四十一年四十五年四十九年皆有御製無為觀詩名宦南北朝魏房恭懿洛陽人仕齊厯平恩令有能名唐賈耽滄州南皮人天寶中舉明經輔臨清尉上書論事徙太平宋周渭昭州恭城人建隆𥘉擢右贊善大夫時魏帥符彥卿専恣朝廷選常參官強幹者蒞其屬邑以渭知永濟縣彥卿郊迎渭推於馬上就館始與相見略不降屈縣有盜傷人而逸渭捕獲并暴廋匿者按誅之不以送府陳䎦澶州臨河人知夏津縣時轉運使盧七倫魯利用壻也怙勢聽獄不以直訟者不已付䎦評決䎦直之御史知雜韓億聞具事奏為監察御史金劉源館陶人以館陶尉升臨清丞未半載德化流行政令清肅民皆德之明李真卿永嘉人洪武間知臨清縣亷能善撫字卒於官民悲泣如喪所親執紼送葬者至三千餘人虞鎬餘姚人正統四年知邱縣先是漳河東泛漂沒田廬鎬築長隄禦之水不為害後遂名虞公隄張翰京山人正德初知夏津縣甫至即令郭外之民徙居城中曠地未幾流賊至剽掠諸縣翰率士民固守賊不能近遂引去保障之功山東稱最易時中晉江人嘉靖中知夏津縣有惠政後遷順天府推官終養歸道出夏津老稚歡迎數舍爭獻果脯將别有哭失聲者高重光保定人崇禎中由貢生為鄉訓導有佐平盜功擢知邱縣大兵至抱印赴井死本朝黃道圭廣東海豐人康熙二十九年知邱縣邱土瘠人貧道圭下車即除舊弊二十三條屢遭旱潦為請發粟賑濟有可惠民之事無不力舉以勞卒於官宋元徴廬江人康熙三十三年知夏津縣廉潔明允值天旱疏濬漕河隨濬隨淤而漕艘已入境元徵朝服禱於龍神水忽騰湧沙分舟過不費牽挽人咸異之朱國祥鑲黃旗漢軍康熙十三年知夏津縣凡六年興利除弊知無不為創設新莊安插流民另編為甲以卓異升去三十七年復知東昌府夏民聞之趨迎幾至空市阿錫鼐滿洲鑲白旗人康熙三十九年以監察御史督理臨清鈔關性清約周知商人之瘼平衡會計罷偵邏之擾人者濬河例在季冬因施粥河上民忘其寒州人頌之陳留武鑲白旗漢軍雍正十年知臨清州民間不知胥役之擾又勸民間墾荒田百餘頃盡成沃壤設立普濟堂州人感化助田百餘畝後遷知登州府人物漢趙苞東武城人從兄忠為中常侍苞深恥門族有宦官名勢不與交通初仕州郡舉孝亷纍遷遼西太守以到官明年遣使迎母及妻子道經柳城值鮮卑入寇遂為所劫質載以擊郡苞悲號謂母曰今為王臣義不得顧私恩毁忠節母遙謂曰人各有命何得相顧以虧忠義苞即時進戰賊悉摧破其母妻皆為所害苞殯殮畢自載歸葬桓帝遣使弔慰封鄃侯苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也何而目立於天下遂嘔血而死三國魏崔季圭東武城人少尚武事後就鄭康成受學歸以琴書自娛袁紹辟為騎都尉數諫紹不聽紹卒二子爭欲得季圭遂稱疾固辭太祖破袁氏領冀州牧辟為別駕從事傅文帝於鄴世子出田獵變易服乘季圭書諫宜燔翳捐褶以塞衆望魏國初建拜尚書時太子未立臨災侯有才而愛太祖密訪於外季圭答春秋之義立子以長遷中尉季圭聲姿高暢眉目疏朗鬚長四尺甚有威重朝士瞻望而太祖亦敬憚焉會有白季圭傲世怨謗者遂賜死為世所痛惜崔林季圭從弟少時晚成季圭異之太祖定冀州召除塢長纍遷御史中丞文帝踐阼拜尚舊出為幽州刺史遷大鴻臚龜兹王遣世子來朝朝廷褒賞甚厚餘國遣子通使連屬林恐所遣或非真的而道路護送所損滋多乃移書燉煌喻指並録前世待遇諸國豐約故事使有恆常明帝即位賜爵關內侯轉光祿􅈴司隸校尉林為政推誠簡存大體是以去後每輒見思景初元年司徒司空並缺孟康薦林忠直不回清儉守約後年遂為司空進封安陽亭侯南北朝宋崔懷順東武城人父邪利魯郡太守元嘉中為魏所獲懷順即日遣妻布衣蔬食如居喪禮歲時向北流涕泰始初淮北入魏懷順因此歸北至代都而邪利已卒懷順絶而復蘇載喪還青州徒跣冰雪天氣寒酷而手足不傷時人以為孝感喪畢以弟在南齊建元𥘉逃歸而弟已亡懷順孤貧宗黨哀之日斂給其斗米永明中卒按清河郡之武城本漢東武城舊縣宋時已入於魏又南徐州南清河郡有東武城宋元嘉中僑置其地在今鎮江考崔懷順以下六人本傳或稱東武城人或稱清河郡人其文不一據宋志永嘉之亂幽冀流民相率過江則此六人實清河武城人而遷徙南清河郡之東武城者也以例論之南朝之人不應附載北朝郡縣但僑置郡縣名表內向不標列姑依舊統志各從其原占籍貫存之附識於此齊崔祖思季圭七世孫少有志氣好讀書高帝在淮陰祖思為上輔國主簿甚見親待遷齊國內史帝受禪轉給事中黃門侍郎武帝即位祖思啓陳政事以為宜修文序開武校崇儉素罷雜伎上優詔報答後為青冀二州刺史卒上深加歎惜祖思叔父景真位平昌太守有惠政子元祖有學行好屬文厯位驍騎將軍出為東海郡太守崔慰祖東武城人父慶緒永明中為梁州刺史慰祖解褐奉朝請父喪不食鹽母曰毁不滅性當不進肴羞耳如何絶鹽吾今亦不食矣不得已從之父梁州資財千萬散與宗族料得父時假貰文疏悉焚之好學聚書至萬卷鄰里假借未嘗為辭建武中從兄慧景舉慰祖碩學帝欲試以百里辭不就沈約謝朓嘗於吏部省中問慰祖地理中所不悉十餘事慰祖酬據精悉朓歎曰假使班馬復生無以過此著海岱志起太公迄西晉人物為四十卷未成卒梁崔靈恩清河武城人少篤學遍習五經尤精三禮三傳纍遷步兵校尉國子監博士聚徒講授聽者常數百人性拙朴無風采及解晣經理甚有精致先是儒者論天互執渾蓋二儀靈恩立義以渾蓋為一出為桂州刺史卒於官集注毛詩二十二卷周禮四十卷製三禮義宗四十七卷左氏經傳義二十二卷左氏條例十卷公羊榖梁文句義十卷陳張譏清河武城人幼聰俊有語幼喪母有錯綵經帕思理年十四通孝經論即母之遺製每歲時輒對帕哽噎不能勝及丁父憂居喪過禮天嘉中為國子助教纍官東宫學士譏性恬靜不求榮利所居宅營山池植花果講周易老莊而教授所撰尚書周易毛詩孝經論語老莊諸義後主嘗敕就其家寫入祕閣張正見東武城人幼好學有清才纍遷尚書度支郎通直散騎侍郎有集十四卷五言詩尤善魏崔宏魏司空林六世孫少有俊才號冀州神童太祖征慕容寶素聞其名遣使追求與語説之以為黃門侍郎與張兗對總機要草創制度遷吏部尚書時命有司制官爵撰朝儀協音樂定律令申科禁宏總裁之以為永式及置八部大人宏通暑三十六曹勢傾朝廷而約儉自居不營産業帝益重之厚加餽賜賜爵白馬侯太宗將即位清河王紹聞人心不安大出財帛頒賜朝士宏獨不受及即位命宏居門下虛已訪問拜天部大人進爵為公卒贈司空諡文貞崔徽宏弟少有文才與渤海高演俱知名厯位祕書監賜爵貝邱侯樂安王範鎮長安世祖遷忠清舊德之士與範俱鎮以徽為鎮西將軍副將行樂安王傅進爵濟南公徽為政務存大體性好人倫引接賓客講論道義誨誘後進終日不止以疾還京師卒崔逞魏中尉季圭六世孫少好學有文才遭亂孤貧講誦不廢歸魏拜尚書除御史中丞以事賜死太祖深悔之子頤纍官散騎尚書賜爵清河侯為大鴻臚持節䇿拜揚難當奉使數返光揚朝命世祖善之逞兄適亦有名於時為慕容垂尚好施甚收書左丞適曾孫延夀輕財鄉曲之譽為冀州主簿崔浩宏之長子少好學博覽經史元象陰陽百家之言無不關綜弱冠為通直郎少遷著作郎太祖常置左右太宗初拜博士祭酒賜爵武城子恆與經國大謀後浩進講書傳論近世人物帝大悅賜御縹醪酒十瓢水晶戎鹽一兩曰朕味卿言若此鹽酒故與卿同其旨也初浩父病篤乃翦爪截髮夜禱北極求以身代家人罕有知者及居喪盡禮襲爵白馬公朝廷禮儀優文策詔軍國書記盡關於浩始光中進東郡公拜太常卿時議討赫連昌擊蠕蠕朝臣盡不欲行浩贊成之大軍既還加侍中特進撫軍大將軍左光祿大夫以賞謀謨之功敕諸尚書凡軍國大計所不能決者皆先咨浩然後行遷司徒詔浩總理史務監祕書事後𬒳誅崔寬祖形隨晉南陽王保避地隴右遂仕沮渠李皓父剖每慷慨有懷東土世祖西巡使寬送款世祖嘉之拜寬岐陽令賜爵沂水男徵剖詣京師未至卒諡元贈武陵公寬還京封安國子家於武城居司空林舊墟後襲爵武陵公拜陜城鎮將號曰能政子衡少以孝行著稱為內祕書中散襲父爵蠕蠕犯寒上書陳備禦之方便國利民之策凡五十餘條除秦州刺史徙爵徐郡公卒崔休逞元孫少孤貧矯然自立孝文時頻遷給事黃門侍郎休勒學公事軍旅之隙手不釋卷孝文南伐以休為尚書左丞轉長史宣武初出為渤海大守部內安之入為吏部郎中遷散騎常侍權兼選任多所拔擢後為司徒右長史公平清潔厯幽青二州刺史皆以清白稱纍官殿中尚書久在臺閣明習典故每朝廷疑義咸取正焉卒諡文貞路恃慶陽平清淵人有幹用為鄉閭所稱太和中除奉朝請以從兄文舉有才望因推讓之孝文遂並拜焉纍遷定州河間王琛長史琛貪暴肆意恃慶每進苦言卒贈左將軍安州刺史路雍清淵人宣武時為東魏郡太守涖政清勤值年儉自出家栗賑賜貧窘靈太后下詔褒美賜廄馬衣被稍遷南青州刺史卒張讜東武城人為東徐州刺史以􅈴賜爵中陸侯讜性開通篤於撫恤青齊之士雖疏族末姻咸相敬視寵要勢家無所顧避高允之徒甚器待之卒贈青州刺史按東武城本漢縣晉太康中去東字魏志因之而列傳仍稱東武城人似乎自相矛盾考隋志有武城舊曰東武城之文而北齊列傳亦有稱東武城人者疑魏又嘗加東字但志不具耳附識於此崔亮東武城人家貧傭書自業李沖薦之纍遷尚書二千石郎高祖在洛馳驛徵亮兼吏部郎遷中書侍郎兼尚書左丞雖厯顯任其妻不免親事舂簸世宗親政遷給事黃門侍郎仍兼吏部郎亮自參選事垂將十年亷慎明決為尚書郭祚所委遷度支尚書領御史中尉自遷都之後經略四方又營洛邑費用甚廣亮在度支别立條格歲省億計又議修汴蔡二渠以通邊運公私賴焉厯雍州定州刺史以平硤石功進號鎮北將軍纍轉尚書僕射卒崔光韶亮從父弟事親以孝聞初除奉朝請與弟光伯操業相侔特相友愛遂讓官於光伯孝文嘉而許之太和中遷青州平東府長史府解敕知州事孝莊初河間邢杲率流民攻逼州郡州人乞光韶為長史以鎮之尋為東道軍司及元皓入洛自河以南莫不風靡刺史廣陵王欣集文武議所從光韶抗言元皓受制梁國稱兵本朝所宜切齒乃斬皓使遷廷尉卿時祕書監祖瑩以贓𬒳劾太尉陽城王徽等為瑩求寬光韶執意不回永安未遂還鄉里刺史侯淵謀為不軌夜劫光韶責以謀略光韶曰起兵須有名義使君今日舉動直是作賊耳知復何計淵雖恨之而不敢害除征東將軍金紫光祿大夫不起卒於家崔隆宗東武城人簡率友愛居喪以孝聞為蘭陵燕二郡太守仁信待物檢慎至誠見重於時卒諡曰孝北齊崔冏逞元孫幼好學泛覽經傳多技藝尤工相術武平中為散騎常侍性亷謹恭儉所得俸秩必分親故終鴻臚卿張晏之東武城人祖彝仕魏厯官尚書爵平陸侯晏之幼孤有至性為母鄭氏教誨動依禮典從爾朱榮平元皓賜爵武城子高嶽征潁川以為都督中兵參軍兼記室晏之文士兼有武幹深為嶽所歎賞齊天保𥘉行北徐州事尋即真為吏人所愛百姓制清德頌數篇周崔彥穆魏司空林九世孫幼明悟神采卓然魏吏部尚書李神雋有知人之鑒見而嘆曰王佐才也大統三年拜榮陽郡守賜爵千乘縣侯纍遷司農卿時軍國草創衆務殷繁太祖引彥穆入幕府兼掌文翰世宗初進驃騎大將軍開府儀同三司陳氏請敦鄰好詔彥穆使焉甚為江表所稱後加授上大將軍進爵東郡公卒隋崔儦休之孫少與范陽盧思道隴西辛德源友善博覽羣言解屬文開皇四年徵授給事郎纍遷員外散騎侍郎仁夀中卒張乾威晏之子性聰敏涉獵羣書其世父皓之謂人曰吾家千里駒也開皇中為晉王屬王美其才及即位授內史舍人儀同三司尋拜謁者大夫從幸江都以本官攝江都贊治稱為幹理時帝數巡幸百姓疲弊乾威上封事以諫帝不悅自此見疏未幾卒弟乾雄亦有才器厯壽春陽地二縣令俱有治績唐崔善為武城及兵人巧於厯數高祖為太守以禮接之起署大將軍府司戶參軍封清河縣公擢尚書左丞用清察稱傅仁均撰戊寅厯李淳風詆其疏帝令善為考二家得失多所裁正貞觀𥘉為陜州卒初天下刺史厯大理司農二卿出為奉州刺史既定羣臣居喪者皆奪服善為建言其弊始許終喪孫伏伽武城人武德初上疏言事帝大悅即以為治書侍御史時軍興賦重伏伽數請言若李綱釐損帝語裴寂曰我虛心孫伏伽可謂誼臣矣東都盡下冀聞嘉平大赦天下又欲責賊支黨伏伽以為宜一切加原又表置諫官帝皆欽納太宗即位封樂安縣男纍遷大理卿時司農市木橦倍理伏伽曰緣官市值與民韋悰劾吏隱沒事下大貴故民值賤臣見司農識大體不遠見其罪帝顧悰曰卿不逮伏伽矣久之出為陜州刺史致仕卒程名振平恩人高祖詔授永寧令使率兵經略河北劉黑闥陷洺州殺名振母妻賊平請手靳黑闥以其首祭母拜營州長史封東平衛將軍平郡公轉洺州刺史太宗征遼東拜右驍壤道行軍總管攻沙卑城破獨山陳皆以少擊泉號為名將遷營州都督擊高麗於貴端水焚其新城厯晉蒲二州刺史鏤方道總管卒張文瓘武明城人幼孤事母兄以孝友聞貞觀初第經輔并州參軍時李績為長史嘗歎曰稚圭今之管東西臺舍人蕭吾所不及績入參知政事乾封二朝因極推引纍授年遂與績同為宰相俄知左史事時高宗造蓬來上陽合璧等宫復征討四夷京師養廄馬萬匹帑廥寖虛文瓘諫帝善其言為減廄馬數千兼大理卿不旬日四百扺罪者無怨言時以執法平恕方戴斷疑獄胄性嚴正未嘗回叛將討之容諸司奏議悉心糾駮帝故委之新羅文瓘力疾請息兵修德以懷異俗詔可卒諡曰懿四子潛沛洽涉皆至三品時家兄子錫久視𥘉為鳳閣侍郎同平章謂萬石張事請還廬陵王遷工不為張易之所右神龍中部尚書纍封平原郡公卒程務挺名振子少從父征討以勇力聞拜右領軍衛中郎將破雲州阿史那伏念叛詔裴行儉討突厥六萬騎於之以務挺副時伏念屯金牙山務挺引兵赴之伏念懼乃降遷右武衛將軍封平原郡公綏州部落稽胡白鐵余叛詔務挺討之生擒白鐵余後以左武衛大將軍為單于道安撫大使突厥憚之不敢盜邊武后以譖殺之突厥聞務挺死率相慶為立祠每出師輒禱焉路敬淳臨清人少志學足不履門居親喪倚廬不出者三年服除號慟入門形容癯毁妻不之識後擢進士第天授中再遷太子司議郎兼修國史崇賢館學士數受詔纂輯慶恤儀興武后稱之尢明姓系著姓略衣冠系録等百餘篇自魏晉以降推本其來皆有條序唐初姓譜學唯敬淳名家其後柳沖韋述蕭穎士孔至名有撰次然皆本之路氏弟敬潛少與敬淳齊名厯懷州録事參軍位中書舍人崔隱甫武城人儦曾孫解褐兵曹參軍遷殿中侍御史內供奉浮屠惠範倚太平公主脅人子女隱甫劾狀反為所擠貶卭州司馬明皇立擢汾州長史遷洛陽令纍拜御史大夫帝詔校外官嵗考異時參審竟春未定隱甫一日會朝集使詢逮檢實其暮皆訖議者服其敏遷刑部尚書纍封清河郡公卒諡曰忠始帝欲相隱甫謂曰牛仙客可與語卿嘗見否對曰未也帝曰可見之隱甫終不詣他日又問對如𥘉帝乃不用隱甫所至潔介自守明吏治在職以強正稱云崔琳武城人祖義元厯官御史大夫封清邱縣公琳明政事開元中與高仲舒同為中書舍人侍中宋璟親禮之每所訪逮嘗曰古事問仲舒今事問琳尚何疑纍遷太子少保天寶二年卒祕書監潘肅聞之泫然曰遺愛也琳與弟太子詹事圭光祿卿瑶俱列棨戟世號三戟崔家崔羣武城人未冠舉進士陸贄主貢舉梁肅薦其有公輔才擢甲科舉賢良方正纍遷右補闕翰林學士中書舍人數陳讜言憲宗嘉納元和十三年以中書侍郎同中書門下平章事時皇甫鎛言利幸於帝陰藉左右求宰相羣數言其佞邪不可用既入對及開元天寶事羣言安危在出令存亡繫所任世謂祿山反為治亂分時臣謂罷張九齡相李林甫則治亂固已分矣以是諷帝故鎛銜之帝卒相鎛罷羣為湖南觀察使穆宗立以吏部侍郎召厯御史大夫武寧荆南節度使拜吏部尚書卒崔邠武城人父倕三世一㸑當時言治家者推其法至德初獻賦行在肅宗異其文位吏部侍郎邠第進士復擢賢良方正授渭南尉遷輔闕上疏論裴延齡姦以鯁亮知名由中書舍人再遷吏部侍郎性溫裕沈密行已簡儉憲宗器之裴垍薦邠才可宰相會病不拜久乃為太常卿知吏部尚書銓故事太常始視事大閲四部樂都人縱觀邠自第去帽親導母輿公卿見者皆避道都人榮之卒諡文簡崔郾邠弟中進士第纍遷吏部員外郎下不敢欺每擬吏親挾格褒黜必當寒遠無留才三遷諫議大夫穆宗立荒於遊畋郾進諫帝動容慰謝敬宗嗣位拜翰林侍講學士旋進中書舍人謝曰陛下使臣侍講厯半載不一問經義臣無功不足副厚恩帝慚謝與高重類六經要言為十篇上之以便觀省遷禮部侍郎出為虢州觀察使改鄂嶽等州又觀察浙西皆有治繢卒諡曰德郾不藏資有輒周急親舊居家怡然子弟自化五子瑶瑰瑾珮璆俱達官弟鄲厯官中書侍郎崔氏四世緦麻同㸑兄弟六人至三品邠郾鄲凡為禮部五吏部再居光德里搆便齋宣宗聞而歎曰鄲一門孝友可為士族法因題曰德星堂宋王彥超臨清人性溫和恭謹能禮下士初為中書令代還復為永興軍節度乾德二年鎮鳳翔開寶二年為右金吾衛上將軍判街杖事太平興國六年封邠國公彥超語人曰人臣七十致仕古之制也我當知止表求得請盡斥去僕妾之冗食者居處服用咸遵儉約卒贈尚書令馬仁瑀夏津人善射挽弓二百斤宋𥘉以功厯領諸郡防禦使後為密州防禦使太祖征晉陽命仁瑀率師巡邊至上谷漁陽遼人素聞仁瑀名不敢出盜起兗州賊首周弼毛襲甚勇悍仁瑀率十餘卒入泰山擒弼盡獲其黨魯郊遂安纍遷朔州觀察使判瀛州事金宋九嘉夏津人為人剛直豪邁少遊太學有能賦聲從李純甫讀書為文有奇氣與雷淵李經相伯仲至寧元年進士厯藍田高陵扶風三水四縣令咸以能稱入為翰林應奉正大中以疾去明劉昱武城人洪武中由吏科給事中遷右通政出為河南左參政吏民畏憚改交址右參政永樂六年征交址從尚書劉俊贊沐晟軍務𬒳圍死之王士嘉武城人永樂初知大同山隂縣善決疑獄稱為神明厯工部員外郎擢陜西參政正統𥘉召拜禮部右侍郎致仕為人狷介有守與尚書吳中同里士嘉薄其為人中每見之不覺自失閻閎臨清人正德進士改翰林院庶吉士授吏科給事中世宗自藩邸入繼大統敕車騎由正陽門閎叩頭曰殿下未即位尚不得由天子門嘉靖初大學士楊廷和以定䇿功進封伯又議大賞迎扈諸臣閎言敘援立則威柄移私隨從則侍御驕恐纍初政事遂寢以劾論權要忤旨謫雲南蒙自縣丞纍官提學副使乞歸卒王道武城人正德進士改庶吉士以事祖母及繼母力辭改應天教授擢吏部郎選法公平門無私謁以薦授左春坊諭德引疾歸嘉靖間起南祭酒厯吏部侍郎卒於官孫維城邱縣人隆慶進士厯知濬縣太康任邱三縣皆有治績萬厯初為南京監察御史劾僉都御史胡檟媚權姦殺正士檟坐落職戍邊大學士許國欲庇一大僚屬京察勿劾維城不可尋出為永平知府纍遷赤城兵備進右布政使移守宣府核減賞費浮冒者嵗積羡銀十四萬市租五千秩滿拜僉都御史巡撫延綏與諸酋吉囊卜莊等甲約束條上善後六事皆如請尋卒於官謝榛臨清人刻意為歌詩有聞於時西遊彰德趙康王賓禮之嘉靖恭馬體乾趙金階壽張生員王鳴岡武生王廷桂擊賊死之均議恤如例列女明宋德成妻薑氏臨清人德成知贊黃縣薑隨之任巨寇入官罟薑投井賊出之逼令食薑罵曰俟官軍勦爾醢為脯吾當食之拔簪剔出一月示賊曰吾已成廢人矣請速殺賊怒害之按舊志載武城主簿姚廷尉二女一名王果一名王香正德六年流賊陷城執二女驅之出郭登舟及中流並投河賊去王果已死玉香浮出仍蘇謹附記王氏女武城人流賊至縣賊首傳令無入上人家母因呼女往避舍西王秀才家女曰兒生不識王秀才何可往後遇賊投路傍眢井賊誘之不出遂死井中本朝喻援妻胡氏本州人許配未婚而援夭氏堅欲往弔父母不得已許之既至哭拜柩前謂父曰女于歸矣請終服而後返父憐其志令其母與之偕三年喪畢無疾而終雲福履妻黑氏本州人福履陳亡氏求遺骸不得一慟而絶胡源渤妻董氏本州人年十五夫亡守節卒年九十五歲閻山妻李氏本州人山雙目失明氏以女紅易粟糊口山病貧無醫藥氏翦髮令其子鬻於市山故氏守貞不渝順治初州經兵燹子罹於難氏負孤孫逺遁夜行二百餘里得免撫之成立卒年七十餘孟守道妻李氏武城人年十七夫亡守節壽登一百七歲霍慎行妻時氏夏津人慎行為讐家誣訐死氏痛哭謂夫弟立行曰我女流不能為夫鳴冤當相從地下兄之讐惟君圖之言訖自刎立行因連控得白兄冤同縣李珖妻張氏王本祥妻李氏俱遇暴不辱死朱健妻班氏本州人夫亡守節同州劉希舜妻李氏尹㟍妻周氏朱克纘妻廉氏黑臺妻陳氏林通溡妻周氏烈婦劉天哲妻祝氏趙某妻來氏胡思抃妻劉氏均乾隆年間旌談氏女名二妞武城人年十六守正捐軀同縣節婦米清男妻周氏張芝妻霍氏王士彥妻朱氏米鑑妻柴氏劉汝𣏌妻夏氏王敬修妻吳氏尤可良妻王氏劉奇桂妻李氏烈婦徐林妻安氏苑成妻王氏均乾隆年問旌張瓚妻姚氏夏津人夫亡守節教子成立同縣節婦許銓妻賀氏冉擇光妻王氏冉祕妻時氏郭永錫妻潘氏張希聖妻郭氏烈婦張彬妻張氏均乾隆年間旌李氏女名愛姐邱人守正捐軀同縣烈婦劉張氏李張氏節婦劉求信妻霍氏石唐氏均乾隆年間旌程永煒妻王氏本川人人亡守節同州徐培妻路氏孫漢妻閻氏王錫光妻李氏主大傳妻張氏王叔齡妻劉氏王岫妻劉氏均嘉慶年間旌宋存誠妻王氏武城人夫亡守節同縣蘇綖妻李氏均嘉慶年間旌劉棟妻張氏夏津人夫亡守節嘉慶年間旌萬起志妻吳氏邱人守正捐軀同縣節婦劉李氏石宗文妻唐氏徐劉氏均嘉慶年間旌土産絲綿州境俱出絹州出羊皮州出舊市張家口皮及東鹿小羔皮硝熟之後改市西皮較他處特柔而氣不羶此水土之異也氊州出精緻甲於他處棉花州境皆出舊宜志木夏津棉桃州産即不白露節始熟樹不實故種桃之地三高大三年後歲而一易俗謂臨之桃梨各縣皆鵝梨瓶有梨其種以州有紅及武消城秋白者為香水佳甎州廠出有四窯清州有承十二舊設工辦以體堅質部細司員色白督理今聲清者改歸臨為上前提調官臣鄭紹謙恭纂并覆輯校對官臣宗稷辰恭校
