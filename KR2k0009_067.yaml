body:
  text: 大清一統志濟寧直隸州在一山百東四省十治里西南南北一距百一八百十八里十東里西東距至兗百州里府南鄒至縣江界蘇四徐十州里西府豐至縣曹界州一府百巨四野十縣里界北一至兗縣州界府四汶十上里縣西界南四至十曹五州里東府單南縣至界兗一州百府二滋十陽里東汶北上至縣兗界州四府十滋五陽里縣本界州五境十東里西西距北八至十兗里州南府北距祥一縣百五界四里東十里至南兗至州魚府臺鄒縣縣界界六四十十里里北西至至兗嘉州府十汶里上西縣南界至四金十鄉五縣里界東六南十至里兗東州北府至鄒兗縣州界府四滋陽里縣自界州五治十至里西京北師至一兗千州二府百汶里上縣界四十五分野天文房心分野大火之次建置沿革禹貢徐兗二州之域春秋任國戰國屬齊秦屬碭郡漢置任城縣屬東平國後漢元和初分置任城國晉永嘉後以縣屬高平郡宋初因之後廢後魏神龜初置任城郡并置縣為郡治北齊天保七年改郡曰高平隋開皇初郡復廢縣屬魯郡唐屬兗州五代周屬濟州宋因之金天德二年移州治任城元初仍曰濟州至元六年徙治巨野八年升為濟寧府還治任城尋復徙十二年復置濟州屬濟寧府十五年移府來治而徙州治巨野尋復故十六年升為濟寧路明洪武元年改路為府十八年降為州縣省入屬兗州府本朝因之雍正二年升為直隸州領嘉祥巨野鄆城八年仍屬兗州府乾隆四十一年仍升為直隸州屬山東省領汶上嘉祥魚一四十五年以汶上還屬兗州府割金鄉來屬領縣三金鄉縣在州西南九十里東西距五十五里南北距七十里東至魚臺縣界十五里西至曹州府城武縣界四十里南至江蘇徐州府豐縣界三十里北至嘉祥縣界四十里東南至江蘇徐州府豐縣界二十五里西南至曹州府單縣界三十里東北至濟寧州治一百里西北至曹州府巨野縣治九十里秦置昌邑縣漢置山陽郡治昌邑兼領東緡縣後漢分置金鄉縣晉改山陽為高平國仍治昌邑領金鄉縣劉宋移高平郡治高平省昌邑入金鄉屬之隋屬濟陰郡唐武德四年於縣置金州五年州廢又移戴州治此貞觀十七年州廢縣屬兗州五代周廣順二年改屬濟州宋金因之元屬濟寧路明初屬濟寧府洪武十八年改屬兗州府本朝因之乾隆四十五年改屬濟寧州山陽郡後漢因之晉屬高平國宋及後魏因之北齊廢隋開皇十六年復置屬彭城郡唐𥘉屬金州尋屬戴州貞觀十七年改屬兗州寶應元年改縣曰魚臺五代後唐以縣屬兗州宋金因之元太宗七年屬濟州至元二年省入金鄉縣三年復置明初屬徐州尋屬濟南府洪武十八年改屬兗州府本朝初因之乾隆四十一年改屬濟寧州形勢南通江淮北連河濟控邳徐之津要振宋衛之咽喉顧祖禹讀史方輿紀要高塹深隍水陸交會南北衝要之區舊志風俗士俗古遠風流清高賢良間生掩映天下李白任城廳壁記氓務耕種願朴畏法急公賦怯爭訟舊志城池濟寧州城周九里門四池廣四丈五尺明洪武三年改築本朝康熙年間修乾隆三十六年高宗純皇帝東巡有御製過濟寧城詩嘉慶十六年重修金鄉縣城周七里有奇門四池廣四丈六尺外為重隄周十一里明萬厯六年因舊址甃甎本朝康熙十二年修四十九年乾隆三十六年重修嘉祥縣城周四里門五池廣里許創自金皇統間明成化初改築崇禎間甃石本朝康熙年間修乾隆五十六年重修魚臺縣城周七里外環以隄本元泰定中築本朝乾隆二十二年城圯於水移建董家店周三里有奇門三池廣三丈學校濟寧州學在州治東北元至元間建明洪武正統間修本朝順治康熙年間屢修入學額數二十名金鄉縣學在縣治東金大定間建本朝康熙五年修入學額數十五名嘉祥縣學在縣治南元至元三年建後圯明洪武三年復建嘉靖九年兵備道嚴時道撤城隍廟改建三十四年仍還故址本朝順治八年重建入學額數十二名魚臺縣學在縣治西北明洪武二年建本朝康熙三十年修入學額數二十名講德書院在州治東北本朝康熙二十年建任城書院在州治東本朝乾隆二十八年建山陽書院在金鄉縣治東本朝乾隆二十五年重建曾子書院在嘉祥縣南南武山下相傳曾子讀書處崇德書院在魚臺縣東二十里穀亭鎮户口原顛人丁九萬二千三百一十五今滋生男婦大小共八十八萬九千三百五十名口計民户共十七萬三千三百三户田賦田地三萬三千二百七十五頃八十六畒一分六釐有奇額徵地丁正雜銀六萬九千三十兩六錢四分六釐麥改米三百七十九石五斗二升一合九勺米一萬一千四十五石五斗四升五合七勺山川兩城山在州東南五十里蛇蜒如屏下臨南陽湖其東又有馬陵牛來二山承注山在州南四十里元和志在任城縣東南七十六里相傳女媧生處下有女媧廟縉雲山在州西南三十里北瞰重湖西聯九十九峯漕河繞其左有登臨之勝一名晉陽山彭子山在州西北三十里一作彭山運河帆檣近在几席頗稱勝境其對峙者為曠山在州西北二十里陽山在金鄉縣西北二十五里山石堅可作碑碣蜿蜒而東兩峯相峙中有隘口其北有石屏葛山在其後魚山在其右以在羣山之陽因名金鄉山在金鄉縣西北三十七里接曹州府巨野縣界縣以此名木經注金鄉數山皆空中穴口謂之隧戴延之西征記曰焦氏山北數山有漢司隸校尉魯恭穿山得白蛇白兔不以葬更葬山南鑿而得金故曰金鄉山冡前石廟四壁皆青石隱起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像皆刻石記之文字分明府志山陰有凊涼洞架十餘丈內鑿石作四小閣相傳秦始皇避暑宮也山上有泉其西有橋曰秦梁相傳亦始皇所造郗山在嘉祥縣東南五里縣志相傳晉郗鑒居此俗謂之登臺又縣有二青山大青山在縣西南十五里迤南相接者曰焦氏山小青山在縣西八里在運河西岸亦謂之嘉祥山璺山在嘉祥縣東南五里頂有澗深丈許其北為卧龍山縣西十里又有西卧龍山華林山在嘉祥縣東南十五里山北高嶺上有寨基又名東寨山亦曰龍華山華林泉出山下流㵼成渠農田賴以灌溉其東為東磨山頂平可耕山圓如磨又縣南二十餘里有青龍山二十四里有雲頭山二十五里有大鼎山山南麓有圓城淡臺山在嘉祥縣南三里縣志相傳淡臺滅明家此塔山在嘉祥縣南二十里高出縣境羣山上有石塔其相接者曰范山小金山富山崱山在嘉祥縣南四十里其山崱嵂高大橫亘數里因名南武山在嘉祥縣南四十五里其南有曾子墓挾山在嘉祥縣西南二十里與焦氏山相連上有聖水井冬夏不盈涸郎山在嘉祥縣西南三十五里山頂平曠約十餘畝周回皆有隄形今亦曰狼山遂山在嘉祥縣西南五十三里其西有古洞深二里秉燭可入亦名滿家洞又平山在縣西五十五里山巔四平如掌泉土甘肥可以耕稼垞山在嘉祥縣西北十里與小青山相連上有伏羲廟萌山在嘉祥縣東北峯巖秀拔石如萌芽左右舒翼縣治實枕之稍東為橫山獨坐山柏山皆在城外而山麓相接獨山在魚臺縣東北黃山前巍然獨秀故名又有廟山以伏義廟故名與獨山相峙黃山在魚臺縣東北五十里山有黃良等九泉其後有雲寨山左有鳯凰山旁有平山兗山金莎嶺在金鄉縣東一里官道左西自曹縣定陶東抵魚臺綿亘三百餘里因地異名實一嶺也上有莎草映日如金故名春城堆在金鄉縣東三里其形崎嶇如城魚垞堆在金鄉縣西八里其形如魚菏水故道自曹州府巨野縣流徑金鄉縣北又東徑魚臺縣南七里入於泗水禹貢浮於淮泗達於菏桑欽水經濟水至乘氏縣西分為二南為菏水北為濟瀆又其一水東流者過乘氏縣南又東過昌邑縣北又東徑金鄉縣南又東過東緡縣北又東過朱鮪冡又東過方與縣北為菏水東徑重鄉城南注又東徑武棠亭北又東徑泛母亭北又東與巨野黃水合又東徑秦梁又東過湖陸縣南東入於菏水即泲水之所芭注以成湖澤者也而泗又曰東與泗水合於穀亭城下俗謂之黃水菏水即濟水也一名五丈溝西口元和志魚臺縣自金鄉縣界流入去縣十里又東南其上流在今曹州流合泗水接菏即濟水分流府及定陶巨野二縣界禹貢所謂導菏澤及濟水東至于菏是也而其下流則自金鄉方與至湖陸以合於泗方與湖陸即今魚臺縣地禹貢所謂浮于淮泗達于菏蓋自泗至菏自菏至濟也又按水經濟水東過方與縣北為菏水泗水南過方與縣東菏水從西來注之是菏水入泗當在今魚臺縣南境舊志作東徑魚臺縣北入泗于水道未協今從縣志運河在州境自兗州府滕縣東南六十里西北徑魚臺縣東北三十里折而北徑濟寧州西三里與嘉祥縣分界本朝康熙間濟寧東岸舊隄圯廢河臣靳輔建議修築自石佛閘起至魯橋沙州寺止又修嘉祥縣尹家溝石閘以蓄蜀山湖之水乾隆四年增築蜀山湖東面馬場湖北面圈隄十四年修建濟寧汛董家口滚水壩三十丈分泗河暴漲之水入蜀山湖濟運二十三年因魚臺縣地勢窪下昭陽蜀山兩湖受水過大擇辛莊橋土堅之所建滚水􅄵二十丈以泄水勢濟運由是十八水口宣泄得宜而上遊汶泗諸水道咸資挽運矣康熙二十四年聖祖仁皇帝南巡御製閲河隄詩四十八年有御製舟過濟寧州詩過八閘詩乾隆三十年四十九年巡俱有御製過濟寧詩高宗純皇帝南按今兗境漕渠所資之水在汶沂泗洸兗州府志云金口之堰修而泗水盡入於漕戴村之堰修而汶水盡入於漕蓋漕之利尤在汶與泗也餘詳兗州府卷舊運河在魚臺縣東北二十里昭陽湖西即泗水故道也顧祖禹川瀆異同考自沛縣北湖陸城閘十二里至孟陽閘又十八里至八里灣閘又十八里至榖亭閘又十八里至南陽閘此舊運河所經之道也河防志舊運河在昭陽湖西岸由沛縣城東至孟陽泊入境又北二十里至於穀亭鎮又北二十里為廣運閘明初所開牛頭河是也嘉靖四十三年河決飛雲橋運道各阻乃開夏鎮新可以達南陽此渠不復行舟既而曹單決口塞可太亦絶維牛頭河下流運渠暴漲則溢而入也新開河自曹州府城武縣北東南流徑金鄉縣南三十里魚臺縣西北二十里又東南至江蘇沛縣界河防志長一百有六里舊以土沙壅塞不能泄水以濟運本朝康熙二十九年疏濬深廣自是宣泄無患又汶上縣西南二十里亦有新開河明正統八年鑿以泄山谷之水西流入運河牛頭河自本州流徑魚臺縣東北至塌場口入於舊運河縣志明初開此以資徑道故建永通閘於此正統以後防塌場口之潰故建廣運閘於南漕渠水盛由此行舟黃河自曹州雙河口來亦由此入運自運渠東徙河水南流此河與故渠同塞馬場河在本州西十里運河東岸周四十里洸泗二水所滙也北接蜀山湖西臨運河有安居十里斗門閘二座以備蓄泄淶河在金鄉縣北縣志從單縣入金鄉石晉時所開首受汴水北抵濟河南通徐沛即宋之漕河也元末湮廢又有壽河在金鄉縣治東四瀦環流源通淶水今僅存遺迹淡臺河在嘉祥縣南三里黃河支流自曹州府巨野縣入境經淡臺山下東流入蓮花池池在城南四里長可三里其水清瑩冬夏不涸雨潦時淡臺河水注焉雨止則塞桓公溝在金鄉縣北故道自曾州府巨野縣流入又東南至魚臺縣入菏水晉書桓溫傳太和四年悉衆北伐次金鄉時亢旱水道不通乃鑿巨野三百餘里以通舟運水經注黃水東徑巨野縣北又東徑咸亭北又東南徑任城郡之亢父縣故城西其中謂之桓公溝南至方與縣入於菏水宣聖墨池在本州魯橋閘下俗名硯瓦溝南池在州南其上有少陵祠唐杜甫同任城許主簿遊