國報恩寺在嘉祥縣南三十里蜀山唐貞元中建有石羅漢數百長壽寺在魚臺縣東五十里元皇慶中建白鶴觀在金鄉縣東唐高宗東封有白鶴下焉詔郡縣為觀以白鶴名有唐先天金大定碑記名宦漢袁安汝陽人明帝時除陰平長任城令所在史人畏而愛之秦彭茂陵人建初元年遷山陽太守以禮訓人不仕刑罰為人設四誡以定六親長幼之禮有遵奉教化者擢為鄉三老以勸勉之吏有過咎罷遣而巳不加恥辱百姓懷愛莫有欺犯興起稻田數十頃每於農月親度頃畝分别肥瘠差為三品各立文簿藏之鄉縣於是姦吏無所容詐詔以所立條式並下州郡在職六年遷穎川太守劉祐安國人桓帝時為仕城令兗州舉為尤異宋劉顏彭城人除任城主簿嵗飢發大姓所積粟活數千人李迪知兗州辟顔為從事石延年幽州人家於宋城真宗時知金鄉縣有治名徐處仁穀熟人知濟州金鄉縣以薦者言召見徽宗問京東嵗事處仁以旱蝗對問邑有盜賊乎曰有之帝謂處仁不欺明方克勤寧海人太祖徵為濟寧知府時始詔民墾荒閲三嵗乃稅吏徵率不侯期民輒棄去田復荒克勤與民約稅如期置田為九等吏不得為姦野以日闢又立社學數百區葺孔子廟堂教化興起視事三年户增數倍一郡饒足克勤為治以德化為本不喜近名嘗曰近名必立威立威必殃民吾不忍也戴䎦澠池人成化時知魚臺縣才識敏練興利除弊知無不為人服其明斷本朝李順昌直隸新安人康熙元年任濟寧知州州為運道咽喉夫役旁午額設之外向派里中每因一夫而擾及一里順昌為均輸之法先定保甲按日而遞役之民困以蘇羅大美閬中人康熙十五年任魚臺知縣因嵗荒代民墊解以省追呼欠而免其償十七年奉文協濟彭口派夫百名大美力請豁除後遂永免為例陳士凱全州人康熙三十八年授魚臺知縣邑瀕河多水患士凱設為拯濟之法委曲詳盡民不知勞人物漢張長安山陽人事王式授詩為博士論石至淮陽中尉兄子遊卿為諫議大渠夫以詩授元帝張就山陽人受詩泰山栗豐至大官徒衆尤盛張無故山陽人從平陵張山拊受尚書無故善修章句為廣陵太傅守小夏侯説文丁恭東緡人習羊嚴氏春公秋學義精明建武初為諫議大夫博士封關內侯遷少府諸生自逺方至者著録數千人當世稱為大儒厯官至騎都尉光武每事咨訪焉范式金鄉大少遊太學與汝南張劭為友並告歸鄉里式謂劭曰後二年當過拜尊親乃共刻期日後期方至劭白母設饌候之其日式果到升堂拜飲而别後劭卒式忽夢見劭呼曰巨卿吾以某日死當以爾時葬式寤悲泣便馳往赴之未到喪已發柩不肯進移時式至執紼引柩於是乃前後到京師受業太學時諸生長沙陳平子與式未相見𬒳病將亡謂其妻曰山陽范巨卿烈士也可以託死乃裂素為書以遺式式乃營護平子妻兒身自送喪於臨湘哭别而去後舉州茂才四遷荆州刺史後遷廬江太守卒於官鄭均任城人兄為縣吏頗受禮遺均脫身為傭得錢帛歸以與兄曰物盡可復得為吏坐贓終身捐棄兄感其言遂為廉潔均好義篤實養寡嫂孤兒恩禮敦至不應州郡辟召肅宗朝公車特徴拜議郎稱病乞歸帝東巡過任城幸均舍敕賜尚書祿以終其身時人號為白衣尚書魏應任城人少好學習魯詩建初四年拜五官中郎將經明行修弟子自逺方至著録數十人肅宗其重之時會諸儒於白虎觀講論五經同異使應專掌難問帝親臨稱制如石渠故事再遷騎都尉卒於官張匡山陽人習韓詩作章句後舉有道博士徴不就度尚湖陸人為郡上計吏拜郎中厯遷文安令延熹五年長沙零陵賊合七八千人自稱將軍入桂陽蒼梧南海交址尚書朱穆舉尚自右校令擢為荆州刺史桂陽賊帥畏尚威名徙入山谷尚窮追數百里入南海破其三屯遂平之七年封右鄉侯遷桂陽太守明平徵還京師時荆州兵朱蓋等與桂陽賊明蘭等復攻桂陽焚燒郡縣於是以尚為中郎將登兵討擊大破之後以尚為荆州刺史後為遼東太守延熹九年卒於官單揚湖陸人以孤特清苦自立善明天官算術舉孝廉厯官尚書三國漢伊籍山陽人隨先主人益州以為左將軍從事中郎遣使於吳孫權聞其才辨欲逆折以辭籍適入撲權曰勞事無道之君籍即對曰一拜一起未足為勞機捷類如此後遷昭文將軍與諸葛亮法正劉巴李嚴共造蜀科蜀科之制由此五人焉魏梁茂昌邑人少好學論議常據經典以處是非魏國初建厯官尚書僕射中尉奉常文帝在東宫為太子太傅甚見敬禮後卒於官滿寵昌邑人從太祖力戰有功文帝即位破吳於江陵拜伏波將軍厯封昌邑侯太和三年以前將軍代曹休都督揚州諸軍事拜征東將軍時孫權嵗來合肥寵屢擊退之景初二年以年老徵還遷太尉寵不治産業家無餘財卒諡景侯子偉嗣偉以格度知名官至衛尉王弼山陽人好論儒道辭才逸辨注易及老子為尚書郎年二十餘卒晉虞溥昌邑人專心墳籍注春秋經傳撰江表傳及文章詩賦數十篇卒於洛郗鑒金鄉人少孤貧專覽經籍以儒雅著名於時所在飢荒州中之士有感其恩義者相與資贍鑒復分所得以恤宗族及鄉曲孤老賴而全濟者甚多明帝即位王敦專制內外危逼仗鑿為外援假節鎮合肥敦忌之徵還遂與帝謀滅敦錢鳯攻逼京都鑒以尚書令領諸屯營鳯等平封高平侯帝以其有器望萬幾動靜輒問之纍官至太尉卒諡文成郗愔鑒子性至孝居父母憂殆將滅性與姊夫王羲之高士許詢並有邁世之風簡文帝輔政纍遷都督徐兗青幽揚州晉陵諸軍事領齊兗二州刺史雖居藩鎮非其好也及帝踐阼就加鎮軍都督浙江東五郡軍事久之以年老乞骸骨卒贈侍中司空諡文穆子超字景興一字嘉賓卓犖不羈善談論年四十二先愔卒南北朝宋檀道濟金鄉人少孤居喪備禮奉兄姊以和謹稱武帝北伐道濟為前鋒所獲俘囚皆釋而遣之中原感悅歸者甚衆文帝侵魏以道濟都督征討諸軍事轉戰多捷威名甚重朝廷疑之文帝寢疾彭城王義康矯詔收付廷尉道濟見收脫幘投地曰乃壞汝萬里長城齊檀超金鄉人好談詠自比晉郗超高帝賞愛之以超與驃騎記室江淹掌史職上表立條例史功未就卒魏徐招金鄉人少好法律及朝廷舊事發言措筆辨析秋毫永安初射䇿甲科除員外散騎常侍領尚書儀曹郎中爾朱世隆屯兵河橋莊帝以招為行臺左丞自武牢北渡引馬埸河內之衆以抗世隆後爾朱兆得招鎖送洛陽仲遠將斬之招曰不虧君命得死為幸仲遠釋之後卒於度支尚書隋遊元任城人為治書侍御史宇文述等敗績元按其狀述遣家僮造請元不之見按之愈急帝嘉其公正奉使黎陽楊元感作逆屢脅以兵竟不屈見害唐郗純金鄉人舉進士拔萃制策皆高第張九齡李雍素稱之自拾遺七遷至中書舍人處事不回為宰相元載所忌時魚朝恩以牙將李琮署兩街功德使恃勢辱京兆尹崔昭純詣載請速處其罪載不納遂辭疾還東都德宗立召為太子左庶子集賢殿學士不拜改詹事致仕卒郗士美純子年十二通五經史記漢書父友蕭潁士顔真卿栁芳嘗曰吾曹異日當交二郗之間矣厯昭義節度使昭義自李抱真以來皆武臣私廚月費米六千石羊千首酒數十斛潞人困甚士美至悉去之又盧從史時日具三百人膳以餉牙兵士美亦罷之討王承宗大將王獻恣橫逗撓士美即斬以徇親鼓之大破賊下三營環柏鄉時諸鎮兵合十餘萬多玩寇犯法獨士美兵鋭整最先有功威震兩河以疾召拜工部尚書後檢校刑部尚書為忠武節度卒贈尚書左僕射諡曰景宋李邴任城人徽宗時遷翰林學士命賦詩高麗使者請傳録以歸高宗即位召為兵部侍郎時苗劉迫上遜位邴諭以逆順禍福之理密勸殿帥王元以禁旅擊賊紹興五年邴條上戰陳守備措畫綏懷五事不報間居十七年卒諡文敏有草堂集一百卷金李演任城人泰和六年進士第一除應奉翰林文字再丁父母憂居鄉里貞祐初任城𬒳兵演墨衰為濟州刺史畫守禦䇿召集州人為兵搏戰三日衆皆市人不能戰逃散演被執大將見其冠服非常且知其名問之曰汝李應奉乎演答曰我是也使之跪不肯以好語撫之亦不聽許之官祿演曰我書生也本朝何負於我而利人之官祿哉大將怒擊折其脛遂曳出殺之時年三寸餘贈濟州刺史詔有司為立碑云元馬紹金鄉人至元間拜參知政事屢進讜言都城種苜蓿地分給居民權勢因取為己有以一區授紹紹獨不取桑哥敗迹其所嘗行賂者索其籍閲之獨無紹名元貞元年遷中書右丞行江浙省事大德三年移河南省事卒明朱清濟寧人天順四年進士為南京兵科給事中時軍政不肅壯者投權門老弱備行伍清奉詔核閲彈劾不避權勢或勸隱默自全清曰某受天子耳目寄顧惟身家自利乎卒見忤權貴謫四川布政照磨曹玉嘉祥人宏治中進士授御史巡按廬揚等處東公執法為當道所不容遷陜西僉事會雲南有思田之變命玉往撫慰之玉至思田降論功當遷忌者抑之不果巳而致仕正德初特以平雲南功加俸一級召用而玉卒胡汝桂金鄉人嘉靖中進士由刑部主事厯吏部文選郎中擢太常少卿好學慕古與同志者講陽明之學月旦為會海內翕然一倣范文正公遺規恐久而廢弛呈官刋石以期不朽卒祀鄉賢祠徐萬安本州人由行伍洊升陜西建安堡都司嘉慶四年隨勦邪匪多著戰功後力竭遇害事聞賜恤廕雲騎尉流寓唐李白山東人客任城與孔巢父韓準裴政張叔明陶沔居徂徠山日沈飲號竹溪六逸列女南北朝宋檀道濟妻向氏金鄉人道濟進司空鎮壽陽朝廷疑畏之元嘉十二年召道濟入朝向氏曰夫高世之勳道家所忌今無事相召禍其至矣後果為義康所害明吳憲妻李氏魚臺人崇禎時流賊起憲𬒳執將死李引頸願以身代遂遇害夫竟免於難焦繼泉妻張氏濟寧人夫亡守節崇禎甲申聞流賊陷京師大慟縊死同縣劉中行妻任氏客寓揚州會城破呼女同縊死本朝邵純妻高氏本州人順治初土寇掠州境縳純拷掠索金時高避樓上聞夫急遂趨而下賊舍純逼高高大罵不絶口賊怒殺之徐國柱妻吳氏本州人國柱病有族無賴子乘間誘之氏不從遂自縊馬氏女本州人許字王姓未婚而王卒聞訃自縊周治皥妻蘇氏金鄉人夫亡自縊死同縣劉玫妻吳氏周矩妻李氏俱夫亡自盡金榮貴妻陳氏嘉祥人夫亡守正捐軀夏九圍妻王氏魚臺人守正捐軀王揚庭妻張氏本州人年二十八夫亡孝養舅姑撫孤至成立守節四十餘年順治年間旌閔時茂妻魏氏本州人夫亡孝事病翁撫孤成立同州節婦李哲妻吕氏宋慧妻趙氏汪傑妻程氏王用霖妻楊氏均康熙年間旌孟輔德妻李氏金鄉人夫亡守節撫孤厯四十年與同縣郭昆梅妻李氏均康熙年間旌周象巽妻胡氏金鄉人年十九夫亡未殮縊死遂同日窆康熙年間旌張筠妻阮氏嘉祥人于歸月餘為土寇所掠大罵不受辱賊怒殺之同縣蘇州元女亦罵賊遇害均康熙年間旌劉浩妻董氏嘉祥人夫亡縊死同縣烈婦徐聖躋妻楊氏烈女鹿氏女名令姑節婦王鳯帷妻陳氏監生張􅥯妻高氏石育喬妻高氏均康熙年間旌韓一龍妻陳氏魚臺人夫亡守節康熙年間旌高光妻胡氏金鄉人夫亡守節雍正年間旌樊民瞻妻聶氏魚臺人早孀順治𥘉榆園土寇掠穀亭鎮氏與其女皆自縊雍正年間旌程正善妻孫氏魚臺人正善賈於單惡少詐正善札以病亟招之氏曰夫之死生命也婦人無早夜獨行之理遂守共捐軀雍正年間旌李永錫妻周氏本州人夫亡守節同州宗維濂妻張氏徐守業妻郭氏劉汝龍妻潘氏楊洽妻王氏周森紹妻方氏劉永智妻張氏喬世榮妻路氏尹可法妻聞氏時超妾王氏陳際元妻仲氏李時菶妻許