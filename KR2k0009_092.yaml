馬羌反叛連年賢擊斬其渠帥於是隴右復平馬續茂陵人永建五年為護羌校尉前校尉韓皓轉湟中屯田置兩河閒以逼羣羌羌恐見圖乃解仇詛盟各自儆備續欲先示恩信移屯田還湟中羌意乃安至陽嘉三年種羌良封等後寇隴西漢陽續擊破之趙沖漢安元年為護羌校尉招懷叛羌罕種率邑落五千餘户詣沖降三年與漢陽太守張貢擊破燒何種羌於參􅒋又破之於阿陽於是諸種前後三萬餘户詣涼州刺史降建康元年沖復追叛羌遇伏戰歿沖雖身死而前後多所斬獲羌由是衰耗永嘉初封沖子愷義陽亭侯第五訪長陵人永壽元年為護羌校尉邊境服其威信西陲無事种暠洛陽人梁太后以為涼州刺史甚得民心被徵當還吏人詣闕請留太后歎曰未聞刺史得人心若是乃許之暠復留一年遷漢陽太守戎夷男女送至漢陽界暠相與揖謝千里不得乘車段熲姑臧人延熹二年爲護羌校尉燒當等八種羌寇隴西金城塞熲轉戰連年屢擊破之爲涼州刺史郭閎所誣徵下獄羌遂陸梁吏人守闕訟熲以千數時寇勢轉盛涼州幾亡六年復以熲爲校尉進擊諸羌至永康元年而西羌弭定建寕二年而東羌悉平凡百八十戰斬三萬八千六百餘級熲行軍仁愛士卒有疾病者親自瞻省手爲裏創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂爲死戰皇甫規朝那人延熹四年爲中郎將持節監關西兵討叛羌零吾等破之先零諸種慕規威信相勸降者十餘萬明年規因發其騎兵討隴右東羌遂遣使乞降涼州復通先是安定太守孫儁受取狼籍屬國都尉李翕督軍御史張禀多殺降羌涼州刺史郭閎漢陽太守趙熹並老弱不堪任職而皆倚恃權貴不遵法度規到州界悉條奏其罪或免或誅羌人聞之翕然反善沈氏大豪滇昌饑恬等十餘萬口復詣規降三國魏張既高陵人文帝初置涼州以鄒岐爲刺史盧水胡反帝召岐以既代之既渡河深入潛軍由且次至武威胡以爲神引朝廷未即討恭仁募趫盪倍道進遂克二城縱所俘還衆感悦遂相與縛行威降李大亮涇陽人貞觀初為涼州都督嘗有臺使見名鷹諷大亮獻之大亮密表曰陛下絶田獵久而使者求鷹信陛下意耶乃乖昔㫖如其擅求是使非其才太宗報書曰有臣如此朕何憂唐休璟始平人聖厯中授涼州都督持節隴右諸軍副大使吐蕃大將麴莽布支率騎數萬寇涼州休璟被甲先登六戰皆克斬二將獲首二千五百築京觀而還郭元振貴鄉人武后時拜涼州都督初州境廣輪纔四百里虜來必傅城下元振始於南峽口置和戎城北磧置白亭軍制束要路遂拓境千五百里自是州無虜憂又遣甘州刺史李漢通闢屯田盡水陸之利稻收豐衍支廥十年牛羊𬒳野治涼五歲善撫御夷夏畏慕令行禁止道不舉遺河西諸郡置生祠揭碑頌德蕭嵩開元十四年吐著陷瓜州殺涼州守將王君毚河隴大震帝擇堪任邊者時嵩已領朔方節度使徙河西節度判涼州事嵩表裴寛郭虛己牛仙客置幕府以張守珪為瓜州刺史完樹陴﨩懷保邊人與吐蕃戰祁連城下自晨迄晡賊大潰哭震山谷帝大怳授嵩同中書門下三品王忠嗣華州鄭人天寶初為河西隴右節度使兼權朔方河東節度佩四將印勁兵重地控制萬里數出戰青海積石虜輒奔破又討吐谷渾於墨離平其國哥舒翰天寶中為河西節度使攻破吐蕃洪濟大漠門等城收黃河九曲以其地置洮陽郡並置神䇿宛秀二軍李晟臨潭人興元𥘉拜鳳翔隴右涇原節度使兼行營副元帥時涇州倚邊數戕其帥晟請治不龔命者因以訓耕積粟實塞下羈制西戎至鳳翔亂將王斌等十餘人以次伏誅至涇田希鑒迎謁執之并其黨石章等悉伏誅常曰河隴之陷非吐蕃能取之皆將臣貪沓暴其種落不得耕稼日益東徙自棄之爾因悉家貲懷輯降附吐蕃尚結贊興兵踰隴岐晟選兵伏汧陽擊之又攻摧沙堡拔之會張延賞當國與晟有隙遂罷其兵李聽晟之子為靈鹽節度使部有光祿渠久廢聽始復屯田以省轉餉即引渠溉塞下地千頃復賴其利宋劉綜虞鄉人咸平中為陜西轉運副使時梁鼎議禁解鹽官自貨鬻命綜制置青白鹽事綜條上利害力言非便卒罷其事俄充轉運使獻議於鎮戎軍置屯田務又錄唐安國鎮制置城壕鎮戎古記石本以進詔從其請王博文濟陰人真宗時為陜西轉運使屬羌叛寇原州環州杜澄趙世隆戰沒博文劾奏周文質王懷信為涇原環慶兩路鈐轄玩寇逗留耗用邊費請用曹瑋田敏代之寇遂平俞獻卿歙人仁宗時除陜西轉運使時邊吏因事邀功涇原路鈐轄擅於武英州鑿邊壕置堡寨獻郷度必招寇患亟檄罷之未幾賊果至殺將士塞所鑿壕而去陳繹開封人為陜西轉運副使時方行青苗法繹止環慶等六州毋散青苗錢且留常平倉物以備用條例司劾其罪詔釋之游師雄武功人哲宗時為陜西轉運判官提點秦鳳路刑獄夏人侵涇原復入熙河師雄言宜於定西通渭之閒建安遮納迷結珠三柵及護畊七堡以固藩籬鄭僅彭城人為陜西都轉運使論餽餉河湟功進顯謨閣待制僅請籍閒田為官莊是歲鎮戎德順收榖十餘萬毛漸江山人為陜西轉運使攝帥涇原日夜治兵乘夏人犯邊遣將擣其虛遂破沒煙寨盧法原徳清人紹興初為川陜等路宣撫處置副使方巨盜充斥秦隴叛兵欲窺蜀法原極意拊循嚴為備禦傳檄諸路人心稍安視山川險阻分地置將前後屢捷上所倚重金毛碩甘陵人天德二年充陜西路轉運使碩以陜右荒邊種藝不過麻粟蕎麥賦入甚薄市井交易惟川絹乾薑商賈不通酒税之入耗減請視汴京燕京例給交鈔通行而鞏會德順道路多險鹽斤引數太重請一引分作三四以從輕便朝廷皆從之秦州倉粟陳積而百姓有支移者止就本州折納其直公私便之盧庸豐潤人至寕元年為陜西按察副使夏人犯邊庸繕治平涼城池積芻栗團結土兵為備夏人掠鎮戎陷涇邠遂圍平涼庸矢盡募人取夏兵射城上箭以濟急用出府庫賞有功者人樂為死平涼賴以完貞祐二年詔賞功進官四階遷按察轉運使元廉希憲輝和爾人世祖即位為京兆四川宣撫使雅圖罕反時關中無兵備希憲命汪惟良將秦鞏諸軍進六盤又發蜀卒更戌及在家餘丁令蒙古官伯沁將之雅圖罕聞京兆有備遂西渡河趨甘州阿勒達爾復自和林提兵與之合時諸將失利河右大震朝議欲棄兩川退守興元希憲力言不可㑹親王哈坦及汪惟良伯沁等合兵復戰西涼大敗之俘斬略盡得二叛首以送梟之市事聞帝大嘉之曰希憲真男子也進平章政事輝和爾舊作畏吾雅圖罕舊作洋都海阿勒達爾舊作阿藍荅兒伯沁舊作八春哈坦舊作合丹今並改商挺濟陰人世祖初以廉希憲及挺宣撫陜蜀雅圖罕反阿勒達爾自和林引兵南來挺與希憲定議令伯沁汪惟良發兵禦之戰於甘州殺阿勒達爾雅圖罕事聞帝大悦曰商孟卿古之良將也巴圖蒙古人延祐元年拜甘肅行省平章政事時米價騰湧陸輓每石費二百緡巴圖為經畫計所省至四百餘萬緡自是諸倉俱充溢甘州氣寒地瘠少稔歲民饑則發粟賑之春闕種則貸之於是兵饟既足民食亦給詔賜名鷹胄甲弓矢及鈔五千緡以勞焉巴圖舊作伯都蒙古舊作忙兀今並改鼐滿台穆呼哩五世孫至治三年拜甘肅行省平章政事佩金虎符甘肅歲糴糧於蘭州多至二萬石距寕夏各千餘里至甘州自甘州又千餘里始達額齊訥路而寕夏距額齊訥僅千里鼐滿台令輓者自寕夏徑趨額齊訥歲省費六十萬緡鼐滿台舊作乃蠻台穆呼里舊作木華黎今並改額齊訥譯見前明宋晟定遠人洪武中充總兵官鎮甘肅先是西域諸國來朝貢者多為哈瑪爾王烏訥錫所遏帝怒決計征之晟令軍中多具糧糗疾馳十里奄至城下即日克之擒其王子及僞國公以下三十餘人收其部落輜重以歸建文初仍鎮甘肅成祖即位入朝擢左都督拜平羌將軍遣還鎮尋以招降功多晉封侯爵晟四鎮凉州前後二十餘年威信著絶域帝專任以邊事所奏輒報可敕便宜行事哈瑪爾舊作哈悔里烏訥錫舊作兀納失今並改李彬定遠人永樂𥘉命往甘肅經略降酋涼州克德緷反彬令土官李英追躡之盡俘其衆尋佩征虜將軍印總兵鎮甘肅赤斤蒙古縛克德緷以獻帝嘉其功賞賚甚厚克德緷舊作老的罕今改費瓛定遠人永樂中充總兵官鎮甘肅以涼州多閒田請給軍屯墾足邊餉從之瓛為人和易善撫士在鎮十五年境内安諡柴車錢塘人正統𥘉協贊甘肅軍務調遣得宜多爾濟寇涼州副總兵劉廣喪師不以實聞反要功賞車劾其罔又奏寕夏等處守將失律前後章數十上甚剴切岷州土官冒功得升車反覆論不可卒罷所升官詔嘉之多爾濟舊作朶兒只今改金濂山隂人正統三年擢僉都御史參贊寕夏軍務寕夏舊有五渠而鳴沙州七星漢伯石灰三渠淤濂請濬之溉蕪田一千三百餘頃時詔富民輸米助賑千石以上襃以壐書濂言邊地栗貴請并旌不及千石者儲由此充宋誠晟曾孫天順中佩征西將軍印鎮甘肅邊備修飭西陲晏然徐廷璋羅山人成化中以右僉都御史巡撫甘肅數條上邊務且請設肅州學校其山丹涼莊等已建學者諸生得食廩充貢如中土帝多從之在鎮七年武備整飭調撫寕夏大築邊牆塹山堙谷互數百里邊人賴保障時余子俊撫延綏馬文升撫陜西廷璋名與埓稱關中三巡撫朱英桂陽人成化十年以右副都御史巡撫甘肅先後陳安邊二十八事其請徙居戎安流離簡貢使於時務尤切積軍儲三十萬不以聞或問之答曰此邊臣常事何足言賈俊束鹿人成化十三年以右僉都御史巡撫寕夏單車就途不攜家既至肅憲度申軍令將吏畏其威莫不自勵在鎮七年軍民樂業王璽廣陵人成化中以署都督僉事鎮守甘肅與番人畫疆域立界石復洪武𥘉舊制初哈密為土魯番所據璽以計復之并復刺木等八城授都督同知壐習韜略諳文事勇而有謀番人憚之羅明延平人宏治初以右副都御史巡撫甘肅言鎮守中官競尚貢獻皆扣剋軍資或巧奪番人乞嚴禁止從之甘州城北有湖數十頃舊聽軍民採草後為勢要所據以明言歸之官明莅陜久凡所張馳及進退邊將皆協輿論又請增貢士額製古樂器易文廟俗樂邊人益善之許進靈寶人宏治七年以右僉都御史巡撫甘肅時土魯番酋攻陷哈密執忠順王建巴使其將牙蘭守之進潛師千里襲破其城牙蘭遯去自是番酋畏讋遣使上書謝罪以建巴及金印來歸西域遂定建巴舊作陜巴今改陳九疇曹州人正德中為肅州兵備副使番酋蘇爾塔瑪蘇爾遣斬巴爾斯等以馳馬至肅州詭言乞和隂令其黨為内應九疇廉知賊計執其黨賊知有備遂遯還嘉靖初擢右僉都御史廵撫甘肅蘇爾塔瑪蘇爾復以二萬騎圍肅州九疇自甘州疾馳至擊走之論功進副都御史蘇爾塔瑪蘇爾舊作速檀滿速兒斬巴爾斯舊作斬巴思今改劉天和麻城人嘉靖初以右僉都御史督甘肅屯政請以肅州丁壯及山陜流民於近邊耕牧且推行於諸邊㝷奏當興革者十事田利大興楊守禮蒲州人嘉靖初以右副都御史廵撫寕夏寇犯固原守禮邀擊破之進右都御史代劉天和為總督錄前後功進兵部尚書劉濟騰驤衞人嘉靖初以吏科給事中出覈甘肅邊餉奏革涼州分守中官及永昌新添遊兵軍民稱便寇天敘榆次人嘉靖三年以右僉都御史廵撫甘肅回賊犯山丹督将士擒其長托克塔瑪西域貢獅子犀牛西狗天敘請却之不聽㝷移撫陜西托克塔瑪舊作脱脱木兒今改翟鵬撫寕衛人嘉靖七年以右僉都御史廵撫寕夏時邊政久弛壯卒私役中官家守邊者並羸老不任兵又番休無期鵬盡清占役使得迭更野雞臺二十餘墩孤懸塞外久棄不守鵬盡復之歲大祲請於朝蠲租發帑民獲蘇