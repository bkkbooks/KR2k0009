  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_092-1a}
body:
  text: 甘肅統部在京師西南四千四十里東西距二千一百二十里南北距二千四百十里東至陜西邠州長武縣界一千里西至河州閣門番界一千一百二十里南至四川龍安府平武縣界一千三百七十里北至伊伯勒山一千四十里東南至陜西漢中府略陽縣界一千二百三十里西南至洮州廳番界九百三十里東北至陜西延安府保安縣界一千四百三十里西北至安西州外新疆及伊犂新疆界四千一百四十里伊伯勒舊作亦不刺今改分野天文東井輿鬼分野鶉首之次唐書天文志初東井十二度終柳六度自漢三輔及北地上郡安定西自隴坻至河右西南盡巴蜀漢中之地建置沿革禹貢雍州之域春秋戰國時屬秦及西戎地史記自隴以西有緜諸緄戎翟䝠之戎岐梁山涇漆之北有義渠大荔烏氏朐衍之戎各散居谿谷自有君長其後義渠之戎築城郭以自守至秦昭王伐殘義渠於是秦有隴西北地上郡秦併天下置隴西北地二郡漢武帝分置天水安定漢書地理志二郡俱元鼎三年置武都漢書地理志元鼎六年置三郡又得匈奴昆邪王地開置武威酒泉漢書武帝紀二郡俱元狩二年置張掖敦煌漢書武帝紀二郡俱元鼎六年置四郡昭帝始元六年又分置金城郡晉書地理志張掖酒泉敦煌武威金城謂之河西五郡地勢西北邪出在南山之閒南隔西羌西通西域於時號為斷匈奴右臂俱屬涼州部晉書地理志涼州以地處西方常寒涼也按漢書地理志武帝改雍曰涼蕭望之傳亦以隴西以北安定以西八郡為凉州而隴西等十郡下缺載所屬州名以後漢志參之蓋皆涼州部也後漢亦曰涼州治隴縣永平十七年改天水為漢陽郡中平五年分漢陽置南安郡後獻帝又分張掖置西郡以張掖居延屬國為西海郡興平元年分河西四郡置雍州晉書地理志作五郡建安十八年罷涼州并屬雍州獻帝起居注時省涼州雍州得安定隴西漢陽北地武都武威金城西平西郡張掖張掖屬國酒泉敦煌西海漢興永陽南安等郡三國屬魏復置涼州晉書地理志魏分隴右置秦州領護羌校尉中閒暫廢晉因之晉書地理志涼州統金城西平武威張掖西郡酒泉敦煌西海八郡元康五年惠帝分敦煌酒泉立晉昌郡又分置秦州晉書地理志泰始五年置秦州治冀城太康三年罷併雍州七年復立鎭上邽統隴西南安天水略陽武都陰平六郡惠帝分隴西置狄道郡張駿又立武始郡永寕初涼州為張氏所有分置河沙二州晉書地理志張軌於姑臧西北置武興郡又分西平置晉興郡張寔分金城立廣武郡張駿分武威武興西平張掖酒泉建康西郡湟河晉興須武合十一郡為涼州興晉金城武始南安永晉大夏武威漢中為河州孰煌晉昌西域都護戊己校尉玉門大護軍三郡三營為沙州張天錫又别置臨松郡是後秦涼二州之地相繼割據分為西秦五涼張軌為前涼都姑臧始晉永寕元年至太元元年地入苻秦呂光為後涼亦都姑臧始太元十年至隆安二年呂隆降姚興其地三分秃髪烏孤為南涼都樂都始隆安元年至義熙十年地入西秦沮渠䝉遜為北涼初都張掖後遷姑臧始隆安元年至宋元嘉十六年地入後魏李暠為西涼都酒泉始隆安四年至宋永初元年地入北涼乞伏國仁為西秦有河南地初都苑川後都枹罕始太元十年至宋元嘉七年為赫連定所滅地屬吐谷渾又永嘉後氐楊氏據仇池地義熙三年立北秦州至宋元嘉中討平之尋入後魏後魏神䴥大延中併有其地仍為秦涼二州又分置涇神䴥二年置豳皇興二年置華州太和十一年改班州十四年改邠州二十年又改南秦太和十二年置梁州正始初改河太和十六年即乞伏乾歸都置原正光五年置靈瓜改張氏沙州置鄯上三州皆孝昌中置渭永安三年置諸州西魏增置朔鹽會甘武岷鄧等州廢帝三年改豳州為寕州南秦為成州後周增置文洮宕廓㬪芳等州隋開皇初增置蘭豐二州三年廢郡存州大業初改諸州為安定本涇州北地本寕州大業初復曰豳州宏化本西魏朔州後周廢開皇十六年置慶州平涼本原州鹽川本鹽州靈武本靈州五原本豐州天水本秦州隴西本渭州金城本蘭州枹罕本河州澆河本廓州西平本鄯州武威本涼州張掖本甘州敦煌本瓜州諸郡唐武德初復改諸郡為州貞觀元年置隴右道治秦州領河渭鄯蘭臨階洮岷郭㬪宕涼沙瓜甘肅伊西共十九州北庭安西二都護府兼屬關内山南二道涇原渭武寕慶靈威雄警會鹽豐等十三州屬關内道成文扶三州屬山南西道後又分置朔方河西隴右涇原諸節度使貞元後河西隴右之地悉陷吐蕃唐書地理志大中後吐蕃微弱秦武二州漸復故地置官守五年張義潮以瓜沙伊肅鄯甘河西蘭岷廓十一州來歸而宣懿不暇疆理唯名存有司而已五代時分屬中國吐蕃及岐蜀按王存職方考梁時止有靈鹽二州其寕慶涇原渭武等州初屬岐後屬唐秦階成三州初屬前蜀同光時屬唐初漢又入蜀周世宗復取之文州則屬後蜀又有威州晉置周改環州宋初屬陜西路熙寕五年分置秦鳳路兼屬永興軍路秦鳳路治秦州領涇熙成岷渭原階河蘭等州鎮戎德順通遠三軍後增積石震武懷德三軍西寕樂廓西安洮會六州又改通遠軍為鞏州其慶陽府環寕二州及定邊軍則屬永興軍路文州别屬利州路其朔方河西之地皆屬西夏宋史夏國傳咸平五年繼遷攻陷靈州以為西平府遂為都乾興二年德明城懷遠鎮為興州以居元昊仍居興州河之内外州郡凡二十有二河南之州九曰靈洪宥銀夏石鹽南威會河西之州九曰興定懷永涼甘肅瓜沙熙秦河外之州四曰西寕樂廓積石紹興中陜西地入金分置慶原臨洮二路兼屬鳳翔路慶原路舊作陜西之路領慶陽府環寕原涇等州臨洮路皇統二年置熙秦路大定二十七年更名領臨洮府積石洮蘭鞏會河六州又平涼府及德順鎮戎秦州分屬鳳翔路其文階成岷四州則仍屬宋利州路西安州定邊軍則賜夏國與夏以河為界元屬陜西等處行中書省至元十八年分置甘肅等處行中書省鞏昌平涼臨洮慶陽四府涇開成莊浪秦隴寕定西鎮原西和環金靜寕蘭會徽階成金洋洮岷貴德文等二十二州及河州路俱屬陜西行省甘肅行省所領為甘州永昌肅州沙州額齊訥寕夏府烏拉噶七路山丹西寕二州額齊訥舊作亦集乃烏拉噶舊作兀刺海今並改明屬陜西布政使司洪武二十五年又置陜西行都指揮使司於甘州領諸衞所領甘州左右前中後肅州山丹永昌涼州鎮番莊浪西寕十二衛鎮夷古浪高臺碾伯四千户所本朝康熙二年以陜西右布政使司駐鞏昌領臨洮鞏昌平涼慶陽四府五年改曰甘肅布政使司移治蘭州雍正二年省行都司及諸衞所改置甘州涼州寕夏西寕四府於古瓜沙地置安西沙州柳溝三衞以安西同知領之於古赤斤衞地置靖逆衞赤金所以靖逆同知領之七年改肅州衞為州并升鞏昌之秦階二州俱為直隸州乾隆三年移臨洮府治蘭州改曰蘭州府二十四年省安西廳及所轄之安西柳溝沙州三衞又省靖逆廳及所轄之靖逆衞赤金所置安西府三十八年於巴勒庫勒置鎮西府於新疆烏嚕木齊置迪化直隸州三十九年改安西府為安西直隸州四十二年升平涼府之涇州為直隸州凡領府九直隸州六蘭州府鞏昌府平涼府慶陽府寕夏府甘州府涼州府西寕府鎮西府涇州直隸州秦州直隸州階州直隸州肅州直隸州安西直隸州迪化直隸州形勢東接邠岐平涼府東與鳳翔邠州皆接境南控巴蜀階州文縣之南與四川龍安府接界即古陰平道也西抵羌戎甘涼西寕兆岷以西皆古羌戎地北屆流沙居延澤在甘州邊外元時為額齊訥路即古弱水流沙又西北為肅州安西皆以沙漠為界額齊訥改見前其名山則有隴山在秦州清水縣東北及平涼府靜寕州東華亭縣西南延互而北抵固原州界古稱隴西隴右以此嶓冢漢書地理志西縣有禹貢嶓冢山西漢水所出在今秦州西南七十里崆峒即开頭山在平涼縣西三十里西傾在鞏昌府洮州廳西南四百餘里番界一名嵹臺山又名西强山積石在蘭州府河州西南番界一名大積石山又有小積石山在河州西北百二十里乃古唐述山也賀蘭在寕夏府西六十里陽屏寕夏西阻北番延互五百餘里為邊塞巨防祁連在甘州府西南二百里古張掖酒泉二郡界上一名天山東西連互甘肅界三危在安西直隸州敦煌縣南三十里其大川則有黃河源出西番東北流由歸德所入塞經西寕府南河州北又東北經蘭州靖遠縣北至寕夏府南釃為漢唐諸渠又東北出塞經鄂爾多斯界西漢水源出秦州西南嶓冢山西南流經西和縣西徽縣南合兩當水入漢中府畧陽縣界渭水源出蘭州府渭源縣西烏鼠山東流經鞏昌府及寕遠伏羌縣北通渭縣南秦州北清水縣南入鳳翔府隴州界涇水源出平涼府西开頭山東流經府城北又東經涇州北入邠州長武縣界洮水源出洮州廳西南西傾山東北流經岷州北臨洮府西至蘭州西入黃河湟水源出西寕塞外東流經西寕碾伯二縣合浩亹水至蘭州西入黃河其重險則有蕭關在平涼府固原州東南三十里襟帶西涼咽喉靈武為北面之險嘉峪關在肅州西七十里明初置為中外巨防玉門關在敦煌縣西北故龍勒縣西北一百十八里漢置為通西域之北道又有陽關在故縣西六里謂之南道山川雄壯邊屯墾闢為新疆之孔道實天府之要區舊志文職官陜甘總督兼管巡撫事駐蘭州府乾隆二十九年改甘肅巡撫衙門為陜甘總督署令總督移駐兼管巡撫事提督陜甘學政駐陜西省布政使駐蘭州府廣積庫大使照磨按察使駐蘭州府照磨兼管茶馬大使司獄舊志按察使衙門無司獄乾隆二十八年裁河州茶馬大使改設按察使司獄以按察使照磨兼管茶馬大使分巡蘭州道駐蘭州府原名臨洮道乾隆二十八年改為驛傳道兼巡蘭州府五十五年改為分巡蘭州道分巡平慶涇兵備道駐固原州兼管鹽法驛務舊駐平涼府乾隆十三年改駐固原分巡鞏秦階道駐岷州舊設洮岷道乾隆二十八年改今名兼管驛務分巡寕夏兵備道駐寕夏府兼管鹽法驛務分守甘涼兵備道駐涼州府舊設甘州道駐甘州府後改涼莊道駐涼州府後復改今名兼管驛務分巡西寕兵備道駐西寕府兼管驛務分巡安肅兵備道駐肅州兼管驛務舊名肅州道乾隆三十七年兼轄安西改名安肅道分巡鎮迪糧務兵備道駐烏嚕木齊舊設安西道乾隆二十四年移駐哈密三十二年仍由哈密移駐安西三十七年移駐巴里坤改爲巴里坤糧務兵備道四十二年移駐烏嚕木齊改名鎮迪道蘭州府知府同知駐循化舊設河州同知乾隆三十六年改蘭州同知移駐聞展府學敎授訓導二員一駐循化經厯知州二員狄道河州州判二員狄道州州判駐沙泥河州州判駐太子寺乾隆四十一年裁四十六年復設州學學正二員訓導狄道州吏目二員知縣四員臯蘭金渭源靖遠縣丞臯蘭駐紅水堡縣學敎諭二員臯蘭靖遠訓導三員臯蘭金渭源主簿臯蘭舊設河橋同知乾隆三十六年栽四十一年添設主簿管理河橋典史四員鞏昌府知府府學敎授訓導經厯知州岷州學學正吏目知縣八員隴西安定會寕通渭漳寕遠伏羌西和縣學敎諭二員隴西安定訓導八員典史八員洮州廳撫番同知敎授照磨兼司獄事舊設茶馬大使乾隆二十四年裁平涼府知府鹽茶同知舊駐固原州城乾隆十四年移駐海噶都府學敎授訓導經厯照磨乾隆二十六年裁瓦亭驛巡檢改設鹽茶廳照磨兼管司獄知州二員靜寕固原州學學正二員吏目二員知縣三員平涼華亭隆德縣丞隆德駐莊浪舊設莊浪縣乾隆四十二年