front:
  text: 大清一統志忻州在山西省治北一百四十里東西距三百四十五里南北距一百里東至平定州盂縣界一百二十里西至太原府嵐縣界二百二十里南至太原府陽曲縣界四十里北至代州崞縣界六十里東南至陽曲縣界六十五里西南至汾州府永寕州界三百三十里東北至代州五臺縣界七十五里西北至寕武府五寨縣界二百八十里本州境東西距一百三十五里南北距一百里東至定襄縣界二十五里西至静樂縣界一百十里南至陽曲縣界四十里北至崞縣界六十里東南至陽曲縣界四十里西南至陽曲縣界六十里東北至定襄縣界四十里西北至崞縣界六十五里自州治至京師一千三百里分野天文昴畢及參分野大梁實沈之次建置沿革古并州之域春秋晉地戰國屬趙秦爲太
