body:
  text: 原郡地漢太原陽曲縣地後漢建安二十年置新興郡治九原縣三國魏及晉初因之元康中改爲晉昌郡尋復名後魏太平真君七年置肆州永安中改郡曰永安治定襄縣後周徙州於鴈門郡隋開皇初復置新興郡尋廢十八年置忻州治秀容縣大業三年州廢義寕初仍置新興郡唐武德元年復曰忻州天寶初曰定襄郡乾元初復曰忻州屬河東道五代因之宋曰忻州定襄郡屬河東路金曰忻州屬河東北路元屬冀寕路明初以州治秀容縣省入仍曰忻州屬太原府本朝因之雍正二年升為直隸州屬山西省領縣二定襄縣在州東少北五十里東西距九十里南北距五十五里東至代州五臺縣界七十里西至本州界二十里南至太原府陽曲縣界二十五里北至代州崞縣界三十里東南至陽曲縣界三十里西南至本州界三十五里東北至五臺縣界三十五里西北至崞縣界三十五里漢置陽曲縣屬太原郡後漢因之建安末改置定襄縣屬新興郡三國魏及晉因之後魏永安中為永安郡治北齊省改置平寇縣隋開皇十年省入秀容唐武德四年復分秀容置定襄縣屬忻州五代因之宋熙寕五年省入秀容元祐初復置仍屬忻州金元明不改本朝因之靜樂縣在州西一百八十里東西距一百二十里南北距一百九十里東至本州界九十里西至太原府嵐縣界三十里南至太原府交城縣界一百三十里北至寕武府寕武縣界六十里東南至太原府陽曲縣界九十里西南至嵐縣界三十里東北至本州界六十里西北至太原府岢嵐州界一百二十里漢汾陽縣地後漢末為新興郡地後魏為永安郡地北齊於今嵐縣地置岢嵐縣隋開皇十八年移縣治此改曰汾源大業四年又改曰靜樂於縣置樓煩郡唐武德四年罷郡置管州五年曰北管州六年州省以縣屬嵐州五代因之宋咸平二年置靜樂軍五年廢軍自樓煩縣移憲州來治熙寕三年州廢縣仍屬嵐州十年復置憲州治此政和五年賜州名汾陽郡屬河東道金天徳三年改曰管州屬河東北路元廢縣入管州屬冀寕路明洪武三年州廢復置靜樂縣屬太原府本朝雍正二年改屬忻州形勢翼蔽晉陽控帶雲朔左衞勾注之塞南扼石嶺之關屹為襟要續文獻通考風俗地寒物儉民貧而嗇士夫恬然自守蚩愚利之不庸州志城池忻州城周九里有奇門四池廣丈餘明萬厯中因舊土城甃甎本朝乾隆三十一年修定襄縣城周四里有奇門三池廣二丈七尺明萬厯中因舊址甃甎本朝康熙四十三年修雍正三年重修靜樂縣城周四里有奇門二池二重廣四文宋時土築明正統中增築萬厯中甃甎本朝乾隆三十二年修學校忻州學在州治西北舊在治西南五代晉天福初建明宏治中移建今所本朝康熙十六年修二十七年五十八年重修入學額數二十名定襄縣學在縣治東北舊在南城外元大德中建明洪武中移建今所本朝康熙四十六年修入學額數十二名靜樂縣學在縣治東岑山上宋大觀初建明洪武初改建山之東隅萬厯中復舊址本朝康熙二十四年修入學額數八名秀容書院在州城内本朝乾隆四十年建晉昌書院在定襄縣城内本朝乾隆十六年建恒麓書院在靜樂縣本朝乾隆十六年建懸崖有清涼石香鑪石滴水崖青龍池諸勝雲中山在州西北八十里多産藥草下有谷雲中水出焉其相屬者為雙尖山大嶺山在州西北一百里北連代州崞縣之黄嵬山西接静樂縣界程侯山在州北四十里水經注忻水東厯程候山山甚層鋭其下舊有採金處俗謂之金山隋書地理志秀容縣有程侯山寰宇記在縣西北三十五里新志俗傳即程嬰匿孤處又北十里即忻口諸山踞滹沱河曲按程嬰藏孤處應在平定州盂縣藏山此與定襄縣武峪山藏孤臺並出附會在以備攷武子谷山在定襄縣東二十里峯巒高峻相近有五石峪山十八盤山在定襄縣東三十里旋折而上凡十八盤武峪山在定襄縣東南十五里上有藏孤臺俗傳程嬰藏孤於此相近有紅砂山琵琶山又南十里有窯頭山七巖山在定襄縣東南十八里以山有七洞名一名摩笄山上有聖母祠居士山在定襄縣東南三十里名勝志山下有流泉泉側石室有碑曰魏武定任城王居士室歐陽修集古錄云魏宗室封任城王者數人其國中絶不知武定中封任城王者何人也山有居士臺臺上舊有浮圖七級八峯尖山在定襄縣東南三十里以八峯聳峙而名相近有熊兒水山叢蒙山在定襄縣南二十五里山自西北環繞而東南羣峯聯絡至此益端聳紅泉山在定襄縣西南三十里山石紅類硃砂泉源不絶横山在定襄縣西北三十里又相近有鳳凰山漆郎山在定襄縣北三十里亦名柏樹嶺山山洞内刻漆郎像俗傳即豫讓漆身處相近有鐵石山有黒石可以吸鐵神山在定襄縣東北十五里平地壘石突兀如盤上有神仙寨聖阜山在定襄縣東北二十里挺然孤峙下有温泉聖阜水出焉元和郡縣志聖阜今名聖人山石上足跡猶存牛臺山在定襄縣東北三十里又東北十里有五公段木青石諸山岑峯山在靜樂縣治東五十步岡巒延亘城之東北隅跨其上愚山在靜樂縣東五里巖下甚平曠又娘娘山在縣東十五里峯巒聳如列笋下有温泉四稜山在靜樂縣東二十五里兩嶺山在静樂縣東七十里派自管涔山來西北諸郡并榆林寕夏取道於此懸鐘山在靜樂縣東七十五里狀如鐘多沙石不生草木上有石寨曰馬寨桃子山在靜樂縣東南五十里有泉旱禱多應又東南十里有閣雷山二十里有羅漢山皆兩嶺山之支脈天柱山在靜樂縣南三里相傳後魏天柱大將軍爾朱榮嘗過此因名山間有金龍泉石峽山在靜楽縣南六十里石峽如門有石峽泉流注汾水周洪山在靜樂縣南七十里一名周公山明統志宇文周公巡方至此因名山之西北十里有渥洼池石門山在靜樂縣南樓煩鎮西北二十五里兩峯聳立其狀如門臨春山在靜樂縣南一百二十里寰宇記在樓煩縣南七十里天池縣界高百餘丈西南接石樓山下有泉流入鴈門村注于汾河紫石山在靜樂縣南接交城縣界石可為硯石龍山在靜樂縣南接交城縣界有兩石墜地如龍一名夾龍山龍和山在靜樂縣西南接嵐縣界一名花果山黑風山在靜樂縣西北五里山側有竅秋冬常出黑風蘆衙尖山在靜樂縣西北接岢嵐州界一名蘆芽山縣志前有荷葉坪山後有林溪山右有神林山延袤數百里縣及嵐縣處其南麓岢嵐五寨處其西麓寕武神池處其北麓忻州崞縣處其東麓馬頭山在靜樂縣北五十里以形似名屹槎山在靜樂縣東北六十里西通磨官谷谷中有磨川水流注汾水刁胡山在靜樂縣東北接本州界亦名鵰狐山相近有黄菜山巾字山在靜樂縣東北接本州界絶頂處狀如巾字山巖布石如雲滴水如雨積而為瀨清潔如銀有堡管涔山在靜樂縣東北接本州界山海經北次二經之首在河之東其首枕汾名曰管涔其上無木而多草其下多玉汾水岀焉淮南子地形訓汾水出燕京水經注燕京亦管涔之異名也其山重阜修巖有草無木隋書地理志靜樂縣有管涔山元和志在縣北一百三十里舊志其山盤踞甚廣不可以道里計自靜樂跨寕武岢嵐朔州界周迴百餘里按諸書皆作管獨寰宇記作菅云其山多菅草故牧馬水在州南五里一東北流入雲中水又有鵠索河在縣西三十里有灌溉之利碾河在靜樂縣東有二源一出縣東北巾字山一出縣東懸鐘山合流經縣南二里入汾監河在靜樂縣南七十里源出縣西南一百四十里獨石河村東流至樓煩鎮南一里入汾社干河在靜樂縣西南十五里源出太原府嵐縣梅家庄東流入汾河興嵐臨三縣及永寕州皆取道於此嵐河在靜樂縣西南接嵐縣界源出太原府嵐縣即淥水大賢二河下流逕古石門入縣界合龍泉水又十五里過進牛村東北入汾右折而入石硤羊兒河在靜樂縣西源出太原府嵐縣鹿逕嶺下流逕縣西南一里東入汾河綠水泉在州東十五里東流入牧馬河海滿泉在州西北三十五里之嘉禾堡灌田十餘頃南入雲中河又南營屯有前山泉亦灌田千餘畝又大溝泉出浮屠山南一滴泉出浮屠山北合流俱入雲中河三㑹泉在定襄縣南叢蒙山麓三泉合流一曰吕布池一曰娘娘池一曰龍液泉四時不涸浸灌數里亦名三會水合牧馬水入滹沱河寰宇記三㑹水出九原縣西經定襄縣界古蹟九原故城今州治漢九原縣為五原郡治在今大同縣西北黄河外後漢僑置縣於此後魏省入定襄三國志魏武帝紀漢建安二十年省雲中定襄五原朔方郡郡置一縣領其民合以為新興郡晉書地理志新興郡治九原縣魏書地形志肆州治九原天賜二年為鎮太平真君七年置州又定襄縣太平真君七年併九原屬焉元和郡縣志忻州即漢太原郡之陽曲縣地縣在今州東四十五里定襄縣理是也後漢末曹操立新興郡理九原即今州是也後魏宣武帝于今州西北十八里故州城移肆州理此隋開皇十八年改置忻州按後漢末九原縣屬新興郡隋開皇中復置忻州移後魏明元帝所置秀容縣於此為州治又按州志肆州故城在州城西北五十里河管村東南又新興郡故城在州南二十里相傳後漢建安中曹操所築亦名建安城平寇故城在州東十五里東晉置縣隋省魏書地形志永安郡領平寇縣隋書地理志秀容縣後齊于此置平寇縣開皇十年廢元和志秀容縣後魏莊帝于今縣東十里置平寇縣又定襄縣高齊武成帝移平寇縣于此隋開皇十年移平寇縣于崞城肆盧故城在州西東晉置肆盧郡及肆盧縣後魏郡廢縣屬秀容郡齊省魏書地形志肆盧縣治新㑹城秀容故城在州西北五十里後魏置縣為秀容郡治隋徙魏書地形志肆州領秀容郡永興二年置太平真君七年併肆盧敷城二郡屬焉治秀容縣亦永興二年置有秀容城元和志隋開皇十八年于縣西北五十里秀容故城移後魏所置秀容縣于今理陽曲故城即今定襄縣治漢置縣後漢建安二十年改置定襄縣漢書地理志太原郡陽曲縣應劭曰河千里一曲當其陽故曰陽曲也元和志定襄縣東至忻州四十五里本漢陽曲縣後漢末移陽曲縣于太原界于此置定襄縣屬新興郡高齊省武成帝移平寇縣于此隋開皇十年移平寇縣于崞城武德曰年于漢陽曲城重置定襄縣晉昌故城在定襄縣西北晉書地理志新興郡領晉昌縣魏書地形志定襄縣太平真君七年併晉昌縣屬焉三堆故城今靜樂縣治晉永嘉後嘗為縣魏書地形志平寇縣太平真君七年併三堆屬焉北齊書文宣帝紀天保四年山胡圍離石帝討之因巡三堆戍大狩而歸元和志靜樂縣西至嵐州四十五里城内有堆阜三俗名三堆城隋開皇三年自今宜芳縣北移岢嵐縣於三堆城十八年改為汾源縣大業二年改為靜樂縣按寰宇記三堆城在縣南八十里故縣城恐悞樓煩故城在靜樂縣南七十里唐初為監牧地後置縣屬憲州宋改屬嵐州金因之元省舊唐書地理志憲州舊樓煩監牧也先隸隴右節度使至德後屬内飛龍使龍紀元年特置憲州于樓煩監仍置樓煩縣郡城開元四年王毛仲築樓煩縣龍紀元年于監西一里置宋史地理志憲州初治樓煩咸平五年移治靜樂樓煩改隸嵐州元史地理志憲州太祖十六年以嵐州之樓煩併入本州縣志樓煩鎮東臨汾水西抵周洪山通交城縣南址尚存北址水衝廢按漢樓煩縣在寕武府界此唐所置縣非漢故地也天池故城在靜樂縣西南唐末置縣宋省舊唐書地理志憲州天池縣在州西南五十里本置于孔河館乾元後移置于安明谷口道人堡下五代㑹要唐長興元年吐谷渾內附于天池川靜樂安置宋史地理志靜樂縣咸平五年廢天池縣入焉縣志樓煩鎮之西馬家莊有故城蓋