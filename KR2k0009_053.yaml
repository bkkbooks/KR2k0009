光顔亦厯代州刺史宋陳恕南昌人精史治太宗時知代州楊業太原人太宗以業老於邊事遷代州刺史兼三交駐泊兵馬都部署契丹入雁門業自西京岀由小徑至雁門北口南嚮擊敗之以功遷雲州觀察使仍判代州自是契丹望見業旗即引去張齊賢冤句人徙家洛陽雍熙三年知代州與部署潘美同領沿邊兵馬遼兵薄城下齊賢選廂軍二千岀誓衆慷慨一以當百遼兵遂卻乃夜發兵二百人持一幟負一束芻距州城西南三十里列幟然芻遼兵駭走齊賢先伏兵於土墱砦掩擊之柳開大名人真宗即位命治代州開至葺城壘治戰具甚有方畧周永清世家靈州祖美歸京師永清為河北沿邊安撫副使知代州契丹無名求地永清入對言疆境不可輕與人臣職守土不願行固遣之復上章陳利害竟以母病辭劉文質保塞人天禧中知代州先是蕃部獲逃卒給絹二疋茶五斤卒皆論死時捕得百三十九人文質取二十九人以赦後論如法餘悉配隸他州張亢臨濮人仁宗時為并代副都總管知代州兼河東沿邊安撫使増廣堡砦以廣田牧蕃漢歸者數千户歲減戍兵萬人河外遂為并汾屏蔽劉永年并州人仁宗時知代州契丹取西山木積十餘里輦載相屬永年遣人焚之一夕盡契丹移檄捕縱火盜永年曰盜在我境何預汝事馮行已河陽人皇祐中知代州時五臺山寺調廂兵義勇繕葺為除和糴穀三萬行已謂不可捐歲入之儲事不急之務劉舜卿開州人神宗時知代州遼遣諜盜西關鎖舜卿易舊鐍而大之後以鎖來歸曰吾未嘗亡鎖也引視納之不能受遂慙去誅諜者史抗濟源人宣和末為代州沿邊安撫副使金人圍代急抗呼二子稽古稽哲謂曰吾將死事汝輩能不負國當令家屬自裁然後同赴義二子泣曰唯父命至城破父子三人突圍力戰死於城隅李翼新泰人宣和末為代州西路都巡檢使屯崞縣金人取代執守將嗣本遣諭降翼射卻之帥士卒堅守金兵入翼挺身搏戰被執不屈與縣令李聳丞王唐臣尉劉子英監酒閻城同死之張忠輔宣和末為將同崔中折可與守崞縣金人來攻嬰城固守中有二心忠輔宣言曰必欲降請先殺我中紿斬忠輔開城門可與被執不屈死之可與兄可求建炎中言於朝官可與之子五人而忠輔不與士論惜之可與雲中人王忠植紹興十年知代州舉兵復石代等十一州金璞薩忠義上京巴爾古河人海陵時為震武軍節度使火山賊李鐵鎗乘暑來攻璞薩忠義單衣從一騎迎擊之射殺數人賊乃退璞薩忠義舊作僕散忠義巴爾古河舊作已盧古河今並改正完顔衷中都人世祖曾孫大定中授代州宣鋭軍都指揮使歲旱州委禱雨於五臺靈潭步致其水兩隨下人為刻石記之鄂通醜和尚為代州經畧使貞祐四年八月元兵攻代州鄂通醜和尚禦戰敗績身被數創被執欲降之不屈死鄂通醜和尚舊作奥敦醜和尚今改正明陸亨晉江人洪武中以吉安侯鎮守雁門繕甲練兵戎伍整肅州關城堡營建甚堅至今賴之劉英寶坻人洪武間知繁峙縣居官亷潔賦役均平嘗以抗疏言事解官父老數十人備列治狀詣闕請留得復任李昇盩厔人洪武閒五臺典史值秋霜殺禾即以狀聞乞賑布政司委官勘稱不實置昇於獄昇曰為民獲罪雖死何憾耆庻争訴其誣得復職曹鼐寕晉人宣徳二年以舉人授代州學正課諸生有聲時年十九徐綬昌平人成化間知崞縣歲飢親詣富室貸米以賑全活萬餘人比稔悉為徴還馬通同州人宏治中知繁峙縣縣故頑梗逋賦不知學通勤於化導俗為一變㑹大水没禾他邑承風㫖減報通獨詣司臺力争得報全災他邑民以不生繁峙為恨郭宗臯福山人嘉靖十七年代州兵備副使自奉約而法令嚴兇豪潛伏撫民以恩有隱咸得自達聞訃奔喪即日徒步號哭歸送者萬餘人李士元洛陽人嘉靖中知代州州使客旁午民苦供億士元特設支房命謹愿吏掌之歲輸有節又上官遣吏來督賦輒索財物不應則捶館人士元命如數以給輒報上官後雖强卑之不敢受卒以不善事上官論罷楊啟允狄道人知五臺縣世宗建三殿募邑民伐山採木二十萬時亢旱水竭艱輓運啟允禱於天夕果大雨木盡浮岀南居益渭南人萬厯二十九年雁門叅政繕治亭障省費萬計閻夢夔鹿邑人崇禎末代州㕘將流賊破城抗節死本朝許可用蓋州人順治四年為雁平道劉遷攻代州城可用堅守密遣人期天軍合剿遷遂授首代人立祠祀之李延夀奉天人姜瓖之亂五臺被圍延夀以宣府總兵往援值竇村爲賊巢佯言進剿代州潛出峨口夜抵竇村擒斬無遺慰脇從者數百人餘賊守堯山巖巖高數百丈設長圍募死士數十夜破之賊遂墜崖死其被誣通賊者盡釋之在五臺二年班師百姓建祠以祀劉正任邱人順治初知代州州人某爲仇家所訐禍不測力白其枉得釋懷數百金以謝卻之姜瓖作亂代人劉遷應之賊數萬攻城百日正守禦甚力大軍至圍解或指聚落爲賊黨正抗聲折之密令具牛酒犒師胥獲免范印心河内人順治五年以進士知崞縣克勤其職姜瓖亂殫力守御邑獲安官兵往返芻糧備而不擾又請蠲逋賦贖俘掠婦女民甚徳之崔尚質奉天人順治四年知繁峙縣治行第一時劉遷亂尚質守城力屈死之家人皆自焚死贈按察司僉事祀忠烈祠周遠祚臨汾人順治初繁峙縣敎諭姜瓖勒授偽職不屈死張道祥徐州人康熙十三年任雁平道多善政代州飢捐俸金煮粥以賑又購米平糶全活甚衆人物漢周黨字伯况廣武人束身修志州里稱高王莽竊位託疾杜門後賊暴縱横唯至廣武過城不入建武中徵為議郎以病去職復被徴引見自陳願守所志帝乃許焉遂隱居澠池著書上下篇而終邑人賢而祠之殷謨字君長雁門人守節不仕王莽世建武中徴並不到荀恁字君大廣武人少修清節資財千萬父越卒悉散於九族隱居山澤以求厥志王莽末匈奴入寇聞恁名節相約不入荀氏里光武徵以病不至永平初應東平王蒼之辟㝷罷歸卒於家王霸字儒仲廣武人少有清節王莽篡位棄冠帶絶交宦建武中徴到尚書以病歸隱居守志連徴不至晉秦秀字元良雲中人少敦學行以忠直知名咸寕中為博士議何曽賈充諡及訟王濬平吳功世多稱之後議齊王攸事忤㫖除名㝷復起為博士卒於官范隆字元嵩雁門人生而父亡四歲喪母䟽族范廣愍而養之隆好學修謹奉廣如父博通經籍着春秋三傳撰三禮吉凶宗紀甚有條義惠帝時隱迹不應州郡之命南北朝魏張黎原平人善書計太祖知待之太宗器其忠亮賜爵廣平公世祖時以鎮北將軍征赫連定有功進號征北大將軍鎮長安清約公平甚著聲稱恭宗初與崔浩等輔政忠於奉上非公不言官至太尉後以議不合㫖免莫含繁畤人劉琨為并州辟含從事含居近塞下常往來於魏穆帝愛其才器及為代王備置官屬求舍於琨琨遣入參國官常參軍國大謀卒於左將軍關内侯子顯知名於時昭成世為左常侍顯子雲好學善射道武時執金吾太武克赫連昌詔雲與常山王素留鎮統萬進爵安定公雲撫慰新舊皆得其所唐茹汝升代州人長安閒為僕射時本郡西峨谷水溢汝升理泉脈穿渠灌田里人安業即峪口立廟祀之五代唐史敬思雁門人晉王為雁門節度使時敬思為九府都督從入關破黄巢復京師常為先鋒晉王過梁梁王置酒上源驛獨敬思等十餘人侍晉王醉留宿梁兵攻之敬思登驛樓射殺梁兵十餘人晉王與從者縋門岀敬思為梁兵所殺史建瑭敬思子初為先鋒梁兵數為建瑭所殺相戒常避史先鋒後敗梁兵於柏鄉加檢校左僕射又敗梁兵於下博橋敗劉鄩於故元城累以功厯貝相二州刺史卒李嗣本雁門人本姓張世為銅冶鎮將少事太祖太祖愛之賜姓李累以戰功遷代州刺史雲州防禦使振武節度使號威信可汗從莊宗下洺滋諸州還軍振武契丹入代北攻破蔚州嗣本戰没郭崇韜雁門人為河東敎練使明敏以幹材稱累遷兵部尚書樞密使勸莊宗襲汴州八日滅梁以謀議居佐命功第一賜鐵劵拜侍中成徳軍節度使崇韜盡忠國家建天下利害二十五事施行之遇事切諌無所迴避宦官伶人用事不便共讒搆殺之明宗即位詔許歸葬晉史匡翰建塘子尚髙祖之女匡翰為將沉毅有謀接下以禮與部曲語未嘗不名厯懷和二州刺史終成徳軍節度使所至兵民稱慕之史氏世為將而匡翰好讀書尤善春秋三傳與學者講論終日無倦安彥威字國俊崞人善射頗知兵法髙祖入立時拜北京留守徙鎮歸徳遷西京留守皆有惠政丁母憂哀毁過制彥威與安太妃同宗出帝事以為舅彥威未嘗言及卒太妃臨哭人始知其同宗宋楊宗閔崞人爲永興軍路副總管靖康中金兵圍永興與經畧使唐重提調程迪提刑郭忠孝等拒守城陷不屈死諡忠介楊震字子發宗閔子以巡檢從折可存討方臘追至黄巖賊帥吕師囊扼險拒守震以輕兵縁山背憑高鼔譟賊驚走生得師囊進秩五䓁還知麟州建安砦契丹亡將濟濟哩驅幽薊叛卒與夏人奚人圍建安矢盡力乏城不守與子居中執中力戰沒諡忠毅濟濟哩舊作小鞠䩮今改正楊存中本名沂中字正甫震子少警敏力能絶人學孫吳兵法善騎射父震及難時存中從征河北故獨免由忠翊郎累官至檢校少保兼領殿前都指揮使乾道二年以太師致仕卒追封和王諡武恭存中天資忠孝勇敢大小二百餘戰身被五十餘創宿衞出入四十餘年最寡過高宗嘗以郭子儀比之金張大節字信之五臺人天徳進士累官戸部郎中定襄退吏誣縣民匿銅者十八村大節亷得其實抵吏罪章宗即位擢中都路都轉運使言河東賦重宜減從之授震武軍節度使部有銀冶有司皆以官榷爲便大節曰山澤之利當與民共宜諭民授地輸課則遊手者有所資於官亦便上亦從之大節忠實剛直果於從政又善弈當世推為第一子巖叟字孟弼大定中進士累官太常卿兼國子祭酒大安三年朝廷議塞諸城門為兵備巖叟曰是任城而不任人也莫若遣兵擇將背城疾戰時論多之胥鼎字和之繁畤人由進士第累官至平陽府兼河東南路兵馬都總管建言利害十三事宣宗多採納之拜本路宣撫使㝷權尚書左丞行省於平陽設方畧拒戰屢郤元兵興定初進拜平章政事封莘國公鼎忠勤練達國事善料敵威望甚隆人樂為用朝廷倚重之楊慥字叔玉五臺人能文承安進士累官户部尚書資器雅重識朝廷大體處事皆有法度王特起字正之崞人好學工於詞賦泰和中由進士為真定録事㕘軍有惠政累遷司竹監使卒聶天驥字元吉五臺人至寕元年進士興定初辟為尚書省令史時胥吏擅威士人往往附之獨天驥不少假借哀宗遷歸徳天驥以右司員外郎留汴中崔立之變天驥被創甚臥十餘日其女舜英謁醫救療天驥笑曰吾幸得死兒女曹尚欲活我耶竟鬰鬰以死禹顯雁門人貞祐初以戰功授義勝軍節度使兼沁州招撫副使元光二年元攻河東顯扼龍猪谷夾攻敗之擒元帥韓光國所厯州縣悉復之守襄垣八年元大帥攻之數四不能拔㝷權元帥府都監至大六年軍内變被擒帥以鐵繩鈐之密遁去元兵追執不屈死劉㑹繁時人興定閒起布衣為監州判官政績著聞累遷堅州都元帥兼節度使喬天翼五臺人天興末為合河令元兵陷城不屈死元趙惟賢崞人博學能文仕至太常禮儀院奉禮郎著春秋集傳等書姚天福字君祥本絳州人父居實避兵徙雁門天福糿讀春秋通大義及長以才辟懷仁丞至元中拜監察御史每廷折權臣世祖嘉其直時按行畿内有出使者凌民取賄天福得其狀奏戮之以徇豪右慴服厯河東淮西湖北山北諸道按察使威惠並行所在稱治大徳四年拜叅知政事大都路總管兼大興府尹後之尹京者莫及焉卒於官皇甫徳崞人議論英發穆瑚黎器之數諮時務拜信威將軍本州觀察判官鋤强梗植良善興學勸農為時良牧穆瑚黎舊作木華黎今改正殷仲温繁畤人父珍有隱徳州縣屢辟不就仲温亷慎精敏起家奉宸副使有政績五遷朝列大夫僉中書院事皇甫世忠崞人性純孝母卒廬墓盡哀自祖而下封墓高丈餘皆自築手為血裂未幾卒明弋謙代州人永樂中進士授御史遷大理少卿直陳時政多見納後以言事太激觸仁宗怒已而嘉其清鯁擢副都御史往四川治採禾中官暴横遂寢其役後罷官卒韓士琦繁峙人永樂中舉人厯陜西關内道天順閒賊定山等亂士琦討平之生擒其魁猶子鐸有勇畧士琦嘗困於賊鐸奮身馳救得岀趙文博字子約代州人景泰進士授監察御史天順中劾石亨曹吉祥下獄㝷貶淳化知縣有善政亨敗擢衞輝知府終河南巡撫右副都御史田益字損之崞人天順中舉人知光山縣政稱第一擢監察御史權倖歛迹巡按鳯陽獄多平反墨吏望風解綬官至陜西兵備僉事梁璟宇廷美崞人事父以孝稱天順末進士成化時厯兵科都給事中請寬減山西民預征又請順天永平分設巡撫從之以請起致仕尚書王竑李秉而斥都御史王越並及宫闈事被杖尋擢陜西叅政進布政使在陜十五年多政績累遷户部尚書卒孫璽代州人宏治中舉人知扶風縣時蜀盗攻陷郡邑都御史藍章檄璽至畧陽盗至畧陽縣令竄去璽力拒不敵死贈光禄寺少卿劉繹字以成代州人宏治進士以戸部主事督理遼東糧儲正徳中觸劉瑾怒罷為民尋起監察御史遷衞輝知府有禦賊功終長蘆運使王汝敬代州人正徳中進士官行人亢直不容棄官歸養親卒廬墓雨雪凍死王源五臺人宏治進士四川按察使僉事正徳中禦賊藍廷瑞死贈副使安瑄五臺人正徳中夏邑丞流寇入境城守不支罵賊遇害詔贈開封同知王貫崞人㓜喪父事母張至孝母卒悲號幾死既葬廬墓三年有白兔烏鴉繞集王夢弼代州人嘉靖中進士厯刑科都給事中楚世子獄具詔無覆奏即行刑夢弼曰楚獄誠無冤但覆奏制也竟三覆奏㝷晉都御史巡撫寕夏有戰功謝蘭字興徳振武衛人嘉靖進士授真定推官厯副都御史巡撫陜西功徳及民轉兵部侍郎卒董暘繁峙人以戰功累官逰擊嘉靖閒敵入馬市口戰死贈鎮國將軍祀褒忠祠子一奎一元仕皆至總兵都督並推良將楊恂字純伯代州人萬厯進士累官户科都給事中疏節財四議皆近倖所不便格不行復論輔臣趙志臯張位貶按察司經厯楊夢弼五臺人萬厯中以舉人知浙川縣調滎澤皆有平賊功遷開封同知以藩邸不法事詣闕陳奏王懼遺金十萬並封其金以聞詔削王籍為庻人丁父喪歸以哀毁卒崔賢代州人由舉人知新河縣崇禎中殉難被贈䘏本朝乾隆四十一年賜諡節愍孫傳庭字伯雅振武衞人萬厯進士天啟中由商邱知縣入為吏部主事魏忠賢亂政乞歸崇禎九年擢右僉都御史巡撫陜西擒斬流賊累建大功忤楊嗣昌下獄十五年起兵部侍郎總督陜西明年加尚書督師出關剿賊師潰轉入潼關賊破關城陷陣死本朝乾隆四十一年賜諡忠靖李景時崞人崇禎中以貢生任濟南通判釐奸剔弊有能聲徳州兵亂撫按檄景時往諭降之流賊破濟南景時曰吾職守土殉國分也但老母在家不可以不訣馳歸白母母曰臣死忠子死孝汝自爲之景時遂服藥而死高斗垣繁峙人性孤鯁崇禎中知西平縣以清慎得民城陷不屈死本朝乾隆四十一年賜諡節愍本朝馮如京字秋水本州人順治初授永平知府累遷廣東左布政使屢平巨盜每上疏陳事次第施行母殁如京年六十餘居喪哀毁骨立服闋未幾而卒馮亨期本州人㓜喪父折産裁取十之三姜瓖之亂州人劉遷應之謀襲城亨期密白當事爲備賊夜至不敢動知謀出於亨期遂殺其子於城下亨期捐家資募士乞援雲中三遣乃達城獲全嘗遊揚州聞有身負官帑就繫者立解槖贈之高鼎大同籍五臺人闖寇焚掠糾里中諸少年自保寇不敢窺順治初自叅將厯官總兵從平吳三桂王輔臣叛被羈知賊虛實密遣人歸報大兵至舉衆來㑹以功至四川松潘鎮總兵幸雲中駐蹕其家聖祖仁皇帝賜扁旌之張燻字孔昭五臺人順治中舉人嗜讀書不事章句以古聖賢自期居喪毁甚以孝聞姜瓖脅之佯疾被縛中道逸歸賊怒追掠縱火殺其妻子七人兄失明燻推譲田宅居茅屋講道洎病危坐不少倚遺命不用音樂殮端坐而逝張琳崞縣諸生賊攻大陽堡琳糾衆禦之殺賊數人既而賊大至力戰被殺李旦時崞縣貢生景時弟順治初姜瓖作亂道出崞旦時率鄉勇禦之以棺自隨示必死兵力不支被執罵賊死其子含玉猶子養兆同日死難奉㫖旌表旦時弟朂時亦貢生性孝友尤多智畧痛旦時死密偵賊黨得殺旦時者三人計擒之馘以祭於是餘賊不敢復至後為陵川訓導以敎澤著張誌崞人雍正初武舉事母至孝母死廬墓墓前枯樹復榮有鳥來集其上乾隆八年旌表馮鍾宿字垣拱本州人性孝友父慶曽署安西兵備道卒於任鍾宿時為中書舍人聞訃奔馳扶櫬歸葬居喪三年幾滅性以母老不仕與諸弟相愛怡怡如也周恤鄉里力行不怠者二十餘年乾隆四十五年入祀鄉賢郎廷劻本州庠生秉性恬澹不慕仕進孝友敦睦樂善不倦嘉慶二十三年入化鄉賢流寓隋盧太翼河間人博綜羣書嘗隱白鹿山數年徙居林慮山茱萸𡼏請業者自遠而至後憚其煩逃於五臺山與弟子數人廬巖下蕭然絶世魏先生宋人逸其名隋初太常議樂如聚訟先生為調律樂遂和太常欲薦而官之先生不可受帛二百段歸寓雁門以帛市酒旦夕歡飲時李密敗黎陽亡命雁門先生見之曰子氣沮而目亂心揺而語偷方今捕蒲山黨得非長者乎密驚起曰既知我能免我否先生曰子非帝王規模又非將相才畧吾望氣晉汾有異人岀能往事之當不失富貴密終不能用其言而敗宋姚孝錫豐縣人徽宗時任五臺簿因家五臺縣境歳飢出家藏萬石賑濟全活甚泉滕茂實臨安人靖康元年以工部員外郎假侍郎副路允迪出使為金所留時兄裪通判代州巳先降金尼稚哈素聞茂實名乃遷之代州又自汴取其弟華實同居以慰其意茂實聞欽宗將至即自為哀辭且篆宋工部侍郎滕茂實墓九字授其友朔寕府司理董詵欽宗及郊茂實具冠幘迎謁拜伏號泣請從行金人不許憂憤成疾卒雲中尼雅哈舊作粘罕今改明趙南星高邑人天啟中以吏部尚書謫戍代州處之怡然本朝李因篤富平人博學工詩文康熙初曹溶觀察三晉因篤從之至代州愛其風土人物居句注夏屋閒者十年列女漢王霸妻不知何氏之女霸少立高節妻亦美志行初霸與同郡令狐子伯爲友後子伯爲楚相其子爲郡功曹令子奉書於霸霸子時方畊於野聞賓至投耒而歸見令狐子沮怍不能仰視霸月之有愧容客去妻曰君少修清節子伯之貴孰與君之高奈何忘宿志而慙兒女子乎霸起而笑遂共終隱金聶孝女字舜英尚書左右司員外郎天驥長女讀書知義理適進士張伯豪伯豪卒依父母居及哀宗遷歸徳天驥留汴崔立刼殺宰相天驥被創甚舜英刲股以進天驥死舜英自以年少葬父之明日絶脰而死合葬伯豪墓元吉彥亨妻馬氏崞人夫死自誓終身不二與譚君澤妻張氏王徳素妻辛氏至順以來俱以貞節被旌明弋福妻王氏代州人成化末福為御史王以姑老留侍養姑齒落不能食王乳之始疾嘗糞甘苦後福卒京師姑憂死王不食三日殯殮成禮鄉人稱其孝事聞褒贈劉夀貞五臺人舉人劉復初女字同邑盧春未嫁而春客死及歸葬夀貞變服披髪奔號櫬前葬如禮遂往事舅姑終身盡孝事聞旌表婢感其貞節亦不適人夀貞卒為尼又有劉氏女許字崞縣張氏子張殁往弔自刎柩前被詔旌表冀廷威妻王氏代州人家雁門都堡俺荅破堡被執王大罵寇怒攢殺而裂其屍要聚剛二女崞人正統間俺荅入寇二女被執犯之不從以善言紿至崖邊俱投崖死後人名其崖曰烈女崖王維垣妻賀氏代州人父璠病割股療之適維垣事翁姑孝謹維垣卒翦髪以殉守節五十六年撫孤成立其女弟適崞縣程子朝年十九而孀其節亦如其姊云李欽妻趙氏崞人年二十夫亡守節姑兩目盲祝於天以舌䑛之左目復明石錦妻田氏崞人御史田益女少刲股愈父疾錦卒割耳殉葬年七十而終楊茂三女崞人富民吕廷要强聘為妾三女恥辱身相繼縊死有司為旌表立祠陳淑英五臺人許字劉氏子未婚劉亡女遂奔喪守節事舅姑克盡孝道年六十餘又同縣王奇中妻陳氏陳紀妻孫氏陳俊妻師氏陳价妻王氏俱以守節奉詔旌表陳福朝妻田氏五臺人年十九夫亡誓與俱死竟自縊曲致化妻楊氏五臺人致化以秋闈被放抑鬰而卒氏密縊於柩側事聞旌表孫嗣芳妻王氏五臺人嗣芳省試卒於客邸柩歸氏縊以殉事聞旌表徐光明妻康氏五臺人娶三月光明卒父母令改適氏曰腹有遺娠得男可繼徐氏且夫肉未寒何忍議此及生子不育遂自縊事聞旌表曲秋葉靈邱曲大保女歲祲大保攜妻子就食五臺僦居安崇徳家崇徳見其美屢欲私之女峻拒哭訴於父母父母去不決女憤恚自縊死時年十七歲事聞旌表孫傳庭妻張氏代州人傳庭總督陜西兵陷戰亡張在西安聞之率三妾二女俱投井死寇良政妻張氏崞人崇禎七年流賊肆掠抱幼子投井死同縣張桂妻祁氏聞桂為賊所執呼號奔救願生桂以養舅姑而已代挂死賊從之行數十里欲自盡賊語曰吾即汝夫母為念汝家也氏怒罵不止賊臠殺之又同縣張計生妻賀氏夫卒自縊蘇奈妻皇甫氏崞人奈卒營殮具氏謂匠曰斲棺令可容二人潛自縊李昌時妻王氏崞人夫卒五日不食死於柩側陳光先妻張氏崞人時年二十一光先棄家從黄冠遊數載知無歸志㑹有以改適勸者氏大慟絶食十一日死具題旌表又同縣譚子信妻靳氏任彪妻賀氏武本妻李氏程可久妻楊氏李三戒妻靳氏俱以守節被旌糜岩妻侯氏繁峙人守節被旌本朝王維妻楊氏五臺人明末流賊至與夫相失恐不免遂自殺後以夫官吏部郎中贈淑人又任氏適夏縣柴雲龍寄居五臺夫為商被刧身死任聞自縊以殉蔡貴妻王氏本州人年二十五夫旅卒王方娠矢殉家人止之舉男甫彌月柩歸里乘閒自縊康熙年閒旌王則堯妻安氏五臺人採田薊於野遇强暴逼汚之恕罵奔逸訴於縣引刀刺頸未死復自經羅清妻沈氏五臺人年二十夫亡殉節狄貞女崞人糿字張夢麟將嫁夫卒奔喪守志事舅姑極謹康熙年閒旌杜青雲妻王氏五臺人守正捐軀雍正年閒旌賀烈女崞人許字郝琪未婚夫亡女奔喪侍婢安氏從之既葬與婢俱經死雍正年閒旌張允中妻封氏崞人允中任銓曹遘疾封憂慘甚允中恐其殉己囑曰慎勿以二柩累長途封然之旋里乃自縊郎起發妻馬氏本州人守正被戕同州烈婦李小小妻王氏高文章妻樊氏陳步武妻李氏烈女劉繼武女崔仙桃沈金金節婦張翺妻畢氏妾孟氏張翔妻劉氏孫章錦妻馮氏張儒魁妻楊氏陳宫華妻閻氏任振翺妻白氏龎敦修妻張氏馮偉妻孫氏黄秉鑰妻張氏張廷瓚妻閻氏柔銀妻温氏崔永寬妻王氏施永吉妻吳氏興妻柳氏李位妻王氏李儒妻韓氏李瓊林妻張氏劉實妻路氏閻于謙妻賈氏馮思恭妻范氏趙郁文妻李氏劉泰妻高氏賈公欽妻高氏王正梅妻汪氏馮棉祚妻范氏陳錫常妻黄氏陳錫爵妻張氏俱嘉慶年閒旌馬東喜妻董氏五臺人守正捐軀同縣烈女王二有女老仕節婦王恩洋妻張氏楊萬鵬妻趙氏俱嘉慶年間旌甯亢氏崞人夫失名守正捐軀同縣烈婦張素子妻張氏貞女蘭儲聘妻張氏節婦弓招妻楊氏王夢龍妻索氏樊繼賢妻蘇氏周開基妻王氏邸通富妻李氏鄭麗中妻王氏李朝陽妻王氏趙來賓妻武氏蘭慎修妻李氏賈足録妻李氏陳萬肇妻李氏曹必因妻何氏趙有年妻蕭氏郭貴林妻解氏段嗣績妻李氏俱嘉慶年閒旌李舉妻宋氏繁峙人守正捐軀同縣烈婦劉玉廷妻原氏穆開運妻郭氏張宣妻任氏節婦何廷悦妻韓氏趙中獻妻劉氏孟兆鳳妻郭氏俱嘉慶年閒旌仙釋北魏靈辨懸甕山沙門熙平初頂戴華嚴日夜行道於五頂之閒足破血流曾無少怠一夕松下坐急爾心光凝湛自是一切文字觸目冰釋造華嚴論一百卷孝明帝請於式乾殿敷揚奥㫖宰輔重臣皆北面而聽後終於清涼曇鸞大師雁門人年十四即岀家窮研經論因注大乘經成疾周行醫療遂往江南陶隱居所得仙方十卷歸魏依方修法後至潞州逢三藏菩提留支師以觀經授之曰修此當得解脱生死也師即受行調心鍊氣魏主重之號爲神鸞卒之日異香滿室隋解脱和尚代州那氏子嘗於東臺麓見草衣比邱跏趺石上即前叩首語曰夫解脱者當求諸己而由人乎於是狂機頓歇深契大法普度垂五十餘年莫知所終唐澄觀㑹稽人大厯中入五臺駐錫大華嚴寺博覽六藝圖史九流異學竺經梵字及四圍五聖聖教世典等書靡不該洽自是筆無停思注述華嚴無閒貞元十二年上遣河東節度使禮部尚書備禮迎入京翻譯烏茶國所進華嚴既就進之上大悦憲宗時賜號清涼國師宋真寶代州人五臺山僧正能外死生靖康之擾與其徒習武事於山中欽宗召對便殿令還山聚兵助討州破被執曰吾法中有口囘之罪吾既許宋以死豈當妄言也怡然就戮金蘇陀室利中印度那蘭陀寺僧慕清涼文殊住處與弟子七人航海而來殞者三還者三惟蘇陀室利六載始逹臺山時年八十五矣經一臺頂誦華嚴十部禪寂七日不息不食後化於靈鷲峰弟子佛佗闍毘收舍利八合持歸西土明葛爾麻烏斯藏人太宗聞其名遣使迎之至京封如來大寳法王西天大善自在佛性樂林泉奏辭遊五臺遣使衞送命重修大顯通寺居之後疏别入寂大化無物相傳關吏見法王適西奏上所賜玉玦云葛爾麻舊作葛哩麻今改正本朝阿王老藏俗姓賈順天西山人十歲出家順治中攝齋受戒西天上士諦視曰此中有五臺主人衆皆惘然後果以兼通番漢選主五臺年七十退居長坐不臥聖祖仁皇帝幸五臺賜號清涼老人老藏丹貝蒙古人入衞籍為趙氏順治中挂錫五臺沖澹疎朗解文義工翰墨仁皇帝西巡特聖祖獎賚之土産鐵州志有鐵冶鐵砂磁器石炭五臺縣志天和山岀又五洞山岀煤炭豹尾唐書地理志代州貢白鵰羽元和志代州貢鵰羽五具青碌唐書地理志代州貢青碌五臺縣志北臺寳山産石碌紫石五臺縣志石有紫硯石紫英又段畝山出紫緑紋石可為硯崞縣志鳳凰山有石可為硯按山海經郭璞傳瓀石出雁門山白者如水中有赤色豈即此耶天花五臺縣志五臺山産天花五臺山志雨餘菌生黄曰天花白莖紫繖謂之地菜又有銀盤蔴姑猴頭蔴姑皆菌屬牧兒得一本輒易一縑廣羣芳譜五臺山天花蕈一名天花菜形如松花而有香氣食之甚美聖祖仁皇帝御製天花詩乾隆十一年二十六年四十六年御製恭和高宗純皇帝並有聖祖仁皇帝元韻詩麝香仙茅唐書地理志代州土貢麝香五臺縣志縣岀麝香曲洧記聞五臺有草名長松亦名仙茅有患麻瘋者入山異僧指示此藥服之兩眉更生廣羣芳譜引本草亦云五臺山有仙茅按隋書稱五臺山地多藥物縣志所列近百種意此二種乃專産也金蓮花五臺山志山有旱金蓮如真金傳是文殊聖蹟廣羣芳譜色金黄七瓣兩層蘂亦黄色一莖數朶若蓮而小六月盛開遼史道宗幸黑山賞金蓮元周伯琦上都紀行詩上都金蓮花蓋塞外産本朝康熙中聖祖仁皇帝命移植避署山莊三十六景其一曰金蓮映日種又有緑色者聖祖仁皇帝御製詩賦及柳梢青詞又有緑金蓮花詩高宗純皇帝有恭和聖祖仁皇帝元韻詩鷄足草瞢夢夕登草菩線草五臺山志有異草鷄足瞢夢夕登五臺縣志又有菩線草按廣羣芳譜引本草有鷄腳草赤莖對葉如百合苗蓋藥屬惜志不言其狀未知與鷄足同異餘亦未詳按唐書地理志代州貢蜜五代史僧繼融於柏谷置銀洞鑿礦取銀一統志代州鳳遊峪出銅代州志州有銀洞五臺縣志五臺山北臺有寶山産銀崞縣志縣西七里有蟾酥池泉自地岀舊産蟾酥金元好問有詩今皆無之又太平寰宇記代州賦麻布崞縣志福夀山温泉冬月可以漚麻不言出布山海經泰戲山有獸名䍶爾雅西方有比肩獸其名謂之蹷郭璞註今雁門廣武縣夏屋山中有獸形如兔俗名蹷鼠並附識於此纂修官臣馮芝恭纂總纂官臣顧蒓許應藻恭覆輯校對官臣趙徳潾恭校
