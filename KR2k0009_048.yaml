body:
  text: 大清一統志平陽府名宦三國魏呂虔伍城人魏武使將家兵守湖陸時襄陵校尉杜松部民炅母作亂命虔代松虔誘炅母渠率及同惡數十人賜酒食伏壯士其側察炅母等醉盡格殺之撫其餘衆賊悉平晉劉毅掖人魏末僑居平陽太守杜恕靖為功曹沙汰郡吏百餘人三魏稱馬為之語曰但聞劉功曹不聞杜府君李重鐘武人惠帝時為平陽太守崇德化修學校表篤行拔賢能清簡無欲正身率下在職三年彈黜四縣李矩本郡人元帝時領平陽太守時飢疫相仍矩盡心撫恤百姓賴焉會長安羣盜東下所在多虜掠矩遣部將擊破之盡得賊所掠婦女千餘人諸將以為非矩所部欲遂留之矩曰俱是國家臣妾焉有彼此乃一時遣之南北朝魏穆亮代人孝文時除征南大將軍領護西戎校尉仇池鎮將宕昌王梁彌機死子彌博立為吐谷渾所逼來奔仇池亮以彌博凶悖氏羌所棄機兄子彌承戎人歸樂表請納之孝文從焉于是擊走吐谷渾立彌承而還氏豪楊卜自延興以來從軍二十一戰前鎮將抑而不間亮表為廣業太守豪右咸服境內大安吳平仁孝文時定陽令有恩信户增數倍吏民懷之刺史穆羆為之請留從之房謨洛陽人以晉州刺史攝南汾州事先時境接西魏土人多受其官為之防守至是鎮將及都督守令前後降附者三百餘人謨撫接殷勤人樂為用西魏懼乃增置城戍慕義者自相糾合擊破之自是龍門以北西魏戍皆平寇俊上谷人孝昌中為鹽池都將仍主簿永安初華州人史底與司徒楊椿訟田長史以椿勢貴皆言椿直欲以田給椿俊曰史底窮人楊則橫奪其地若欲損不足以給有餘未敢聞命遂以地還史底孝莊帝後知之嘉俊守正不撓拜司馬其附椿者咸責焉封子繪蓚人孝靜初為平陽太守晉州北界霍山千里徑山坂高峻每大軍往來士馬勞苦子繪請于舊徑東谷别開一路從之仍令子繪領汾晉二州夫修治旬日而就時齊神武新總六軍路經新道嘉其省便賜榖二百斛劉豐普樂人永安初齊神武上為南汾州刺史與諸將征討平定寇亂周梁士彥烏氏人從武帝拔晉州除刺史帝還齊後主親攻圍之樓堞皆盡短兵相接士彥慷慨謂將士曰死在今日吾為爾先于是勇烈齊奮呼聲動地無不一當百齊師少却乃令妻妾及軍人子女晝夜修城三日而就武帝六軍亦至齊師圍解隋周搖洛陽人周武帝時拜晉州總管時文帝為定州總管文獻后自京師詣之路經晉州搖主禮甚薄既而白后曰公廨甚富于財限于法不敢輒費又王臣無得效私其質直如此文帝以其奉法每嘉之唐崔翳清河人曲沃令永徽元年引古堆水溉田百餘頃劉齊賢觀城人高宗朝由侍御史出為晉州司馬帝以其方直尊憚之時將軍史興宗從獵苑中言晉州出佳鷂可捕取帝曰齊賢豈捕鷂人耶陶善鼎高宗時晉州臨汾令治百金泊引潏水溉田張懷器武城人中宗初為翼城令引翔高泉開會陰道以便汲者行者又闢荒田五百餘頃邑人愛之蕭至忠沂州人中宗時為晉州刺史治有名李訴臨潭人憲宗時為晉州刺史以治異等加金紫光祿大夫石雄徐州人武宗時李彥佐討劉稹逗留以雄為晉絳行營諸軍副使助彥佐雄受命勒兵越烏嶺破賊五壁斬獲千計賊大震雄臨財亷每朝廷賜豫輒置軍門白取一匹縑餘悉分士伍由是衆感發無不奮武宗喜曰今將帥義而勇罕有雄比者就拜行營節度使王式其先太原人家揚州大中中為晉州刺史飭郵傳器用畢給會河曲大歉民流徙他州不納獨式勞恤之活數千人時特峨胡亦飢將入掠汾澮間式嚴備不敢道境報其種落曰晉州刺史當避之以善最稱五代梁徐懷玉焦夷人太祖時為晉州刺史晉數攻之懷玉堅守敗晉師于洪洞唐張仲溫長興初為翼城令縣治舊在翔高山下仲溫為察原隰泉流之宜移治王逢寨迄今尚仍其地周楊廷璋正定人世宗時以為建雄軍節度使在鎮數年頗有惠愛前後率兵入太原境拔仁義高壁等寨并人棄沁州二百里退保新城廷璋遂置保安興同白壁等十餘寨顯德六年率所部入河東界下保寨十三宋初吏民詣闕請立碑頌功德太祖命盧多遜撰文賜之李謙溥盂人世宗時為晉州兵馬都監以偏師入河東境頻致克捷宋荆罕儒信都人建隆初為晉州兵馬鈐轄嘗領千餘騎抵汾州城下焚其草市退次京土原劉鈞遣大將郝貴超領餘衆襲罕儒罕儒錦𫀆衷甲據胡床享士方割羊臂臑以啖上馬揮兵徑犯敵鋒手殺十數人遇害劉鈞素聞罕儒勇欲生致之聞其死求殺罕儒者戮之太祖痛惜不巳崔遵度淄川人太平興國中為臨汾主簿饋芻粟三抵綏州涉無定河沙水混流陷溺相繼遵度憫之著銘以紀端拱初轉運副使夏侯濤上其勤狀召對便坐擢著作佐郎陳希古天禧中以祕書著作郎知翼城事有文學多所振刷百度修舉風俗一變李及之濮州人知晉州吏事精明居官稱職劉舒皇祐中任鄉寧令縣治瀕河數遭水患舒改遷今治自是民有安宇文彥博介休人仁宗時知翼城縣事有惠政後人思之稱其所建河亭曰潞公軒扈周卿太名人嘉祐中為襄陵令視事終日無倦色未半載刑清訟簡劉恕筠州人英宗時為和川令發強摘伏一時能史自以為不及郡守得罪被劾屬吏皆連坐下獄恕恤其妻子如巳骨肉李周馮翊人洪洞令民有世絶而官録其産者其族晚得遺劵周取以還之郡吏咎周周曰利民所以利國也縣南有澗支流溢入歲賦災楗調徒遏之周始築新隄民不告病呂誨開封人神宗初知晉州時彥開封人哲宗時為晉州守減職田所入什七八佃户始脫苛斂之苦李察開封人以朝奉郎知翼城縣事政平訟簡不喜鉤距時時訪民間疾苦民皆頌之金張浩渤海人天眷中為平陽尹平陽多盜臨汾男子夜掠人婦浩捕得榜殺之盜遂衰息近郊有淫祠郡人頗事之廟祝田主爭香火之利纍年不決浩撤其祠屋投其像于水中強宗黠吏屏迹英敢犯郡中大治劉徽柔安次人遷洪洞令門敏善聽斷縣人楊遠者投牒于縣以為夜雨屋壞壓其姪死號訴哀切徽柔熟視而笑曰汝利姪財而殺之乃誣雨耶叱付獄其人立伏曰公神明也不敢延死遂置于法秩滿縣人遮戀不得去者彌日為立生祠刻石頌德楊伯雄藁城人為平陽令先是張浩治平陽有惠政及伯雄為尹百姓稱之曰前有張後有楊丁暐仁宛平人遷和川令申明法禁羣小屏息或走入他縣避之有董祐者最強悍畏服暐仁以刀斷指誓終身不復犯法凡租賦與百姓前為期不事𫾣撲率比他邑先辦李晏高平人皇統間授嶽陽令兼攝隰州蒲縣積牘盈案晏立判百餘事衆皆畏服孫九鼎定襄人以尚書員外郎知翼城縣事時多盜賊鼎多方勦捕之梟其渠魁餘黨悉解散邑賴以安胥鼎繁畤人貞祐二年知平陽府兼河東南路兵馬都總管就拜宣撫使元兵掠霍吉隰三州已而步騎合六萬圍平陽急攻者十餘日鼎遣兵屢却之招還脅從人七千有奇續至者又六千餘俱令復業拜樞密副使權尚書左丞行省于平陽纍有陳請無不從者鼎通達吏事有度量為政靜鎮無賢不肖皆得其歡心完顔從坦金宗室權元帥左監軍行元帥府事與參知政事李革同守平陽元兵至平陽提控郭用戰于城北濠壖被執不屈死城陷從坦自殺贈武昌軍節度使任厚禮興定中任吉州同知元兵陷城厚禮與其妻墜崖死元李守賢義州人知平陽府事兼本路兵馬都總管太宗南伐取道平陽見田野不治以問守賢對曰民貧窘乏耕具詔給牛萬頭仍徙關中生口墾地河東後平陽當移粟萬石輸雲中守賢奏以百姓疲敝不任挽載帝嘉納之李伯溫守賢從兄行平陽元帥府事鎮青龍堡平陽巳陷弟守忠被執選驍勇拒守金人盡鋭來攻守卒多夜遁李成開水門導敵入伯溫登堞樓謂左右曰吾兄弟受方面之寄當以死報國弟巳被執我不可再辱拔劍殺家屬投井中以刀植柱刺心而死金人登樓見伯溫抱柱如生無不嗟歎李守正守賢弟為平陽守活俘鹵甚衆以功授榮祿大夫河東南路兵馬都元帥金完顔哈達攻平陽守正先以救隰州中矢傷足及是棗瘡戰殁大帥以其兄守忠代完顔哈達舊作完顔合達今改正李守忠守賢弟為河東南路兵馬都元帥兼知平陽府事金襲擊招討使伊照爾于洪洞師潰入城城陷金人執守忠至汴誘降守忠罵之金人怒置守忠鐵籠中火災死按舊以伯溫為守賢從兄守正守忠為守賢弟乃從元史守賢本傳若忠義傳伯溫世系誤敘不可從伊照爾舊作按扎兒今改正鄭鼎陽城人至元三年遷平陽路總管歲旱鼎下車而雨平陽地狹人衆常乏食鼎導汾水溉民田千餘頃開潞河鵬黃嶺道以來上黨之粟修學校厲風俗建橫澗古橋以便行旅民德之王惲汲縣人至元中為平陽路總管府判官初太平縣有獄蔓引三百餘人五年不決惲一訊即得其實乃盡出所逮繫者時境內久旱是夕大雨楊宜翼城人任本縣令為政亷明不任刑罰南川水灌田甚廣民爭訟不巳宜斷理明允遂為定例縣東有炭窰歲久患圯壓宜相地别開民甚便之凡三十餘年無病民事王元禮至正初尹襄陵扶植善良摧抑姦慝興學校于征戰之餘有古循吏風郝信臣至順間任太平尹有惠政明徐鐸南昌人洪武初以户部侍郎改知平陽府疏濬水利改建臨汾縣學他所建置皆有益于民李諒濰縣人洪武初知翼城縣修建壇壝廟學移縣治以遠水患除姦宄安良善遇事必以公正持之徐彪商河人洪武末臨汾縣丞存心亷恕復流離闢荒蕪均徭役簡詞訟政有成效升本府同知官民信服境內肅清袁景甘泉人洪武間太平主簿有清標貧能自守隆冬單衣理事有小吏夜持緼袍遺之辭弗受至旦諭衆痛懲之自是姦頑斂迹劉濬臨川人永樂初知臨汾縣有亷節政平訟簡吏民不敢欺萬觀南昌人宣德中知平陽府政績茂異有芝生堯祠棟上士民皆言使君德化所致觀曰太守知奉職而已芝非吾事也王彧開州人正統六年知洪洞縣濬霍泉廣溉民田其民田濱河為水沙衝徙者彧悉為核免其賦民皆賴之張文在西平人成化間知平陽府行朱子社倉法築學宮遠聘耆儒主師席為政五載獄無繫囚劉機咸寧人成化十九年知曲沃縣每歲巡行阡陌教民播種勸栽桑棗各三百株民有罪令入棗贖積數萬斛歲飢賑粟不給發棗繼之民不病災張鼐厯城人成化十二年知襄陵縣縣俗故偷葬鼐至力革之以從厚在任十六年以廉恪顯李咨故城人成化間知襄陵縣嘗置二牌書民善惡于其上示勸懲民皆耻于為惡歲祲出粟煮糜以食飢者多所全活郭桂咸寧人正德中知平陽府課耕桑導禮義盜賊衰息藩府各戢其下不敢梗法浦鋐文登人正德十三年知洪洞縣潔已愛民振興文教嘗改佛殿為學宫規制宏敞以治行徴拜御史單訥棗強人嘉靖四十二年知翼城縣性介而勤庭無留牘丞以帑金羡餘餽叱而却之會疾革邑人參議劉志賻以木償其值及卒士民流涕張一敬朝城人隆慶間知鄉寧縣精明強殺均役清田為一時循史冠何出光扶溝人萬厯十一年知曲沃縣城南有澮水瀕河地舊為沙磧出光導民引水溉田民獲其利歲大祲發倉賑貸設醫局以療民疾全活甚衆毛炯任邱人萬厯中知汾西縣政尚清簡絶私謁又教民織絍隙地督植桑棗由是衣食漸饒李枝咸寧人萬厯初知鄉寧縣均賦役賑貧乏築城濬河具有成績李時茂乾州人萬厯中知鄉寧縣馭史嚴明政事修舉善斷獄鄰民爭訟者咸願得時茂決之袁葵東明人崇禎中知洪洞縣歲飢請蠲租出見棄兒于道命收哺後皆以袁為氏李乘雲高陽人崇禎中知浮山縣流賊數萬來寇乘雲手發一矢斃其魁衆遂遁纍遷山西僉事本朝徐來麟奉天人順治五年知平陽府薑瓖叛遣其黨平德攻平陽來麟捍禦獲全延安王老虎應賊渡河拔汾州復攻平陽來麟與巡撫王無黨參將范永宗固守間出擊之擒其將劉光明賊攻益急會大兵至解圍走來麟追斬賊首劉四亨于峪口村敗之安應麟奉天人順治六年知浮山縣薑瓖餘孽踞縣東南令千總秦文英耆老張三鳳入賊巢諭之降八百餘人悉遣歸農請豁荒糧數千石修縣治之為賊毁者趙昉武城人順治二年以進士知翼城縣慈惠有才略時東山邪教倡亂昉密請兵勦之殲其渠魁城獲全何斯美鎮番衛人順治五年以舉人知翼城縣薑瓖叛翼被兵尤數斯美與弟斯盛督鄉勇禦之六年七月賊數萬猝至圍城九日夜斯美力拒戰城卒完遷開封府同知弟斯盛亦有戰功後以勦賊殁于陳翼人建兩祠祀之又翼城典史之子王國安亦與斯盛同戰死時同死事者鎮標營都司魯班禮後贈遊擊沂鎮營遊擊劉懋德後贈參將俱祀忠烈祠侯世爵奉天人順治七年知鄉寧縣薑瓖黨衛敏破城據之焚掠甚慘世爵簡厲士卒躬自督率誓不與賊並立賊懼委城去世爵招撫流亡慰安反側閲二年民始更生及解去百姓攀轅流涕許占魁蒲城人順治十一年任平陽副將盜張武等踞山中肆劫為害占魁受事佯不問分兵布隘口一日大雪率精騎二百徑入山賊衆皆竄伏遂縛武而散其餘黨擢都督僉事袁國梓華亭人順治巳丑進士康熙十二年知平陽府早起即據堂治文書端嚴苦神至日昃不懈事至片言裁之悉中要害蠧胥斂手不敢肆石文晟奉天人康熙三十年知平陽府時歲飢方有造船運米役上官又令民輸草三十五萬束于大同文晟請就近收買罷之又言賑飢煮粥止便少壯能就食者老病婦孺且坐斃請散賑官親厯山僻按户給之全活無算王輔奉天人康熙三十三年知平陽府有幹略三十四年平陽地震火數起官署民舍多燬堵豪暴乘間剽掠悉擒置重典民始獲安死者給以棺不足以席又不足則為大冡數十别男女埋之又榜招他郡邑人占籍曠地胥為永業間者爭集戶口不大耗云王承露益都人康熙二十二年以進士知臨汾縣見上官輒抗論是非不少屈舊正供外多浮取于民承露悉裁去之王槐一彰德人康熙二十二年以舉人知浮山縣舊輸價丁糧者十年例一辦公務費踰正額商人高鹽價且和以沙土民多坐私鹽論罪槐一悉禁止之訐訟令自拘立剖曲直胥役終歲不出縣門三署鄰邑皆著能聲蔣鳴龍建德人康熙八年以拔貢知汾西縣相度汾濱濬棗平舊渠又築一隄于前加樓村濬三渠于福珠衛家灘後團柏村田不苦旱又革民養馬協費建馬厰驛舍胥得治體人物漢靳強其先西河人後徙曲沃以郎中騎從漢高祖擊項羽遷中尉破鍾離昧封汾陽侯衛青字仲卿平陽人為人仁善退讓奉法遵職由建章監侍中纍官車騎將軍封長平侯拜為大司馬大將軍凡七出擊胸奴收河南地置朔方郡再益封凡萬六千三百户元封五年卒諡烈侯霍去病衛青姊子年十八為侍中善騎射為嫖姚校尉封冠軍侯遷大司馬驃騎將軍凡六出擊胸奴開河西酒泉之地西方益少胡寇四益封凡萬七千七百户去病為人少言不泄有氣敢任上嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法天子為治第令視之對曰胸奴未滅何以家為上益愛重之卒諡景桓侯霍光字子孟去病異母弟武帝時為奉車都尉出入禁闥二十餘年小心謹慎未嘗有過後元二年為大司馬大將軍受遺詔輔少主封博陵侯政事一決于光訖十三年百姓充實四夷賓服昭帝崩立昌邑王賀以淫亂廢復迎立宣帝光秉政前後二十年地節二年薨諡曰宣成甘露中上思股肱之美圖形麒麟閣光居第一尹翁歸字子兄平陽人為市吏諸霍奴客莫敢犯田延年為河東太守行縣至平陽翁歸自稱文武兼備惟所施設除補卒吏延年大重之徙署督郵舉亷為緱氏尉厯宏農都尉徴拜東海太守以高第入守右扶風滿歲為真扶風大治翁歸為政雖任刑其在公卿之間清潔自守溫良謙退不以行能驕人甚得名譽于朝廷元康四年卒家無餘財紹賜翁歸子黃金百斤以奉祭祀翁歸三子皆為郡守少子岑厯位九卿至後將軍三國魏賈逵字梁道襄陵人漢末為絳邑長郭援攻河東城將潰絳父老與援要不害逹既潰援欲使逵為將以兵劫之逵不動將斬之絳吏民皆乘城呼曰負要殺我賢君願俱死耳左右多為請乃免復為丞相主簿魏武伐蜀先遣逵至斜谷觀形勢道逢水衡載囚人數十車逵以軍事急輒窮竟重者一人皆放其餘魏武善之拜諫議大夫魏武殂洛陽鄢陵候彰從長安來赴問逵先王璽綬所在逵正色曰太子在鄴國有儲副先王璽綬非君侯所宜問也文帝即王位遷魏郡太守豫州刺史黃初中以伐吳功封陽里亭侯明帝立復陳攻取之計帝善之薨諡曰肅候逵少好春秋左傳通兵法忠直有謀為刺史守令威恩兼著朝廷重之徐晃字公明揚人為郡吏從楊奉討賊有功拜騎都尉李傕郭汜亂長安晃説奉令與天子還洛陽封都亭侯後歸魏拜禆將軍戰功最多遷平寇將軍破樊襄陽之圍魏武稱其功踰孫武穰苴及案行諸營晃將士獨駐陳不動魏武歎曰徐將軍可謂有周亞夫之風矣文帝踐阼纍封陽平侯性儉約畏慎將軍常遠斥堠先為不可勝然後戰追奔爭利士不暇食太和元年卒諡曰壯侯晉韋忠字子節平陽人年十二喪父哀慕毁悴杖而後起服闋尚廬墓所司空張華辟之辭疾不起太守陳楚迫為功曹會山羌破郡楚出走賊射之中三創忠冒刃伏楚以身捍之亦遭五矢賊相謂曰義士也舍之李矩字世迥平陽人勇毅多權略為征西將軍梁王彤牙門將伐氐齊萬年有殊功封東明亭侯其後破石勒于滎陽破劉聰從弟暢于韓王故壘破劉聰太子粲于孟津北岸莫不以少擊衆戰勝獲多勒遂挫衄聰憤恚發病而死元帝深嘉其功纍官都督司州諸軍事司州刺史安西將軍纍封平陽縣侯矩乃心王室以衆少不足立功每慷慨憤歎卒為石勒將石良所敗率衆南歸至魯陽縣卒賈模字思範逵之孫沉深有智算起家邵陵令纍官車騎司馬豫誅楊駿封平陽鄉侯尋擢侍中模盡忠匡弼推張華裴頠同心輔政卒諡曰成鄧攸字伯道襄陵人其祖父殷亮直強正官至中庶子攸少孤居喪以孝聞永嘉末沒于石勒諸胡敬之石勒過泗水攸擔其兒及其弟子綏以逃度不能兩全乃棄其子而去至江東為太子中庶子出為吳郡守亷明得百姓心纍遷尚書左僕射每有進退無喜愠之色攸棄子之後竟無嗣時人義而哀之曰天道無知使鄧伯道無兒唐柴紹字嗣昌臨汾人隋太子千牛備身高祖妻以平陽公主將起兵授右領軍大都督府長史領彀騎先抵霍邑城下力戰有功從下臨汾絳郡遂平京師高祖即位纍從征討以功多進封霍國公遷右驍衛大將軍吐谷渾黨項寇邊大敗之貞觀二年平梁師都轉左衛大將軍出為華州刺史加鎮軍大將軍徙譙國卒諡曰襄尹知章翼城人明六經長安中擢定王府文學纍遷國子博士馬懷素緒定祕書奏知章是正文字于易老莊書尤縣解弟子貧者賙給之性和厚人不見有喜愠未嘗問産業卒官所注傳頗多行于時五代晉桑維翰字國僑舉進士及第高祖辟為河陽節度掌書記其後嘗以自從求援于遼滅唐興晉皆維翰力也高祖既立以為翰林學士纍遷中書侍郎同中書門下平章事兼樞密使出帝即位景延廣用事與遼絶盟未幾拜維翰中書令復為樞密使封魏國公事無巨細一以委之數月之間百度寖理後以讒罷為開封尹維翰遂稱疾稀復朝見遼攻京師張彥澤以兵入府維翰厲聲曰吾晉大臣自當死國安得無禮彥澤股栗不敢仰視退使人縊殺之按本傳河南人而墓及故宅並在今浮山縣東北夾榆村故從舊志載之蓋或遷于河南而返葬神山也宋孫復字明復平陽人舉進士不第退居泰山學春秋著尊王發微十二篇范仲淹富弼言復有經術除祕書省校書郎國子監直講纍遷殿中丞卒復既病韓琦言于仁宗選書吏給𥿄筆命其門人祖無擇就復家得書十五萬言録藏祕閣特官其一子郭純洪洞人治平中進士官至宣德郎長於史學溫公稱其有遷固才寧智曲沃人舉鄉貢進士精通五經教授晉絳元祐中上問樞密副使王巖叟曰從誰學對曰從河東寧先生其德行學問一時重之許孝恭字光祖曲沃人嗜讀書嘗棲晉賢山屏絶聲色足不至城郭仕彭州九隴縣尉兼主簿事時李文吉劫彭州官吏盡避孝恭獨率公徒拒之卒擒文吉官至虞部員外郎史緒字仲昌曲沃人徽宗時為左清道帥府副遷驍衛將軍世明法律為人莊毅明恕雖家人相對無惰容居官決讞持平卒贈武衛大將軍李居仁曲沃人少孤事母至孝授徒以養母殁手築墳高四丈餘時名其巷曰孝母名其族曰墳臺李氏金馮延登字子俊吉鄉人承安二年登詞賦進士第至大七年以國子祭酒假翰林學士承旨使于元被留使招鳳翔帥降對曰臣奉書請和招降豈使職諭之再三執義不回乃叱左右以刀截去其鬚延登岸然不動監之豐州二年後放還哀宗撫慰久之復以為祭酒厯禮吏二部侍郎權刑部尚書元兵圍汴京為騎兵所得欲擁而北行延登義不受辱遂躍入井中死之楊貞字平甫吉州人明昌中舉進士仕至河東南路招撫吉隰便宜經略使相度險要築牛心寨以禦元兵子克義戰殁元兵攻之急命其子克敬克讓俱死妻孟氏自經乃南望再拜焚其廬自投後河中尸浮水上門人為之收葬焉鄭時昌字仲康洪洞人性孝友八歲通易大定間對䇿第一世宗命典樞要辭不受就汾州教授衍河汾之傳理學大明元許國禎字進之曲沃人博通經史尤精醫術世祖在潛邸國禎以醫徴能直諫後從征雲南參預機密世祖圍鄂州獲宋人數百族諸將欲盡坑之國禎請誅其凶暴者餘皆獲免及師還招降民數十萬口罷飢顛仆國禎自發蔡州軍儲糧賑之全活甚衆至元十二年為禮部尚書嘗上疏言慎財賦禁服色明法律嚴武備設諫官均衛兵建學校立朝儀事多施行凡所薦引皆知名士終翰林集賢大學士諡忠憲追封薊國公許扆字君黼國禎子從父事世祖于潛邸世祖俾從許衡學入備宿衛忠慎小心除禮部尚書每外國使至必命與之語辭理明辨莫不傾服與丞相安同善國政多所禆益纍遷陕西行省右丞有惠于民民畫像祀之仁宗時國有大政詔近侍即其家問之特授榮祿大夫司徒卒追封趙國公諡僖簡安同舊作安童今改正傅巖起汾西人由進士任陜省都事凡二十三遷至中書左丞皆著聲績以上疏忤權貴罷歸屢徴不起卒諡正獻封河東郡公郭狗狗翼城人父安戍大良平宋將史太尉陷大良平全家被俘狗狗年五嵗曰勿殺我父當殺我史問得其年曰五歲兒能為是言吾當全汝家以騎送安等往合州道遇兵騎驚散安家俱得還御史以事聞命旌之張著字仲明襄陵人至元初舉詞賦既而歎曰士當以遠大自期遂沈潛伊洛之學調潞城簿以親老西歸至元中薦授平陽路教授成就後進晉人以文名者多出其門喬彝字仲常晉寧人性高介有守至正十八年賊由垣曲縣襲晉寧城陷城中死者十二三彝整冠衣令妻子輩循次投井中而巳隨赴之賊平贈臨汾尹賜諡純潔屈繼平字正卿翼城人七歲而孤性敏強記至元間中鄉舉以程朱之學誘進學者翼城人知有程朱之學自繼平始張翥字仲舉晉寧人通經義工詩至正初以隱逸起為國于助教會修遼金宋三史為國史院編修官史成纍遷翰林侍講學士兼祭酒勤於誘掖學者樂親炙之俄除學士承旨博洛特穆爾入京師命翥草詔削奪洪霍特穆爾官爵翥不從曰吾臂可斷筆不能操也及博洛特穆爾誅詔以翥為河南行省平章政事致仕博洛特穆爾舊作索羅帖木兒洪霍特穆爾舊作擴廓帖木兒今並改正胡光遠太平人母喪廬墓一夕夢母欲食魚晨起號天求魚見生魚五尾列墓前俱有囓䀶鄰里聚觀有獺出草中去衆知是獺所獻以狀聞於官表其閭李謙亨曲沃人英宗時以儒士辟厯內臺侍御史時建西山寺謙亨與御史四人上疏極諌帝怒決杖文面安置納哩罕後思其忠鯁呂還授浙東海右二道廉訪使封隴西郡侯諡忠肅納哩罕舊作奴兒干今改正李忠晉寧人幼孤事母至孝大德七年地震郇保山移民廬摧壓將近忠家分為二行五十餘步復合忠家獨完靳昺字克昌曲沃人兄榮為奎章閣承制學士奉母王氏官於朝母殁喪還家至平定大雷雨水驟至昺伏柩上榮呼之避水昺不忍舍去遂為水所沒後得柩及昺尸詔賜孝子靳昺碑孫抑字希武洪洞人登進士第仕至刑部郎中關保之變挈父母妻子避兵平陽柏樹村有亂兵至村拔白刃脅抑母求財將斫之抑以身蔽母請代受斫母乃得釋抑父被掠不知所之抑出入死地求之屢瀕危殆卒得父歸馮愈吉州人父敬夫病篤籲天割股肉調藥以進父遂愈至正間旌表明仇敬字中立曲沃人少與郝修已同棲紫金山篤學礪行洪武初舉鄉試第一登進士授綏德知州遷鞏昌知府皆有治績以憂歸卒於苫次子基以布衣直諌舉高麗平泉尹郝修已曲沃人洪武九年舉明經第一授戶科給事中敢諫改朝城知縣居官亷謹任滿偕其妻負囊步歸朝廷聞而嘉之擢刑部郎中賜紫金山一區子孫世居之且薄其賦以示旌劉平翼城人洪武聞知宜黃縣負擔至任亷介有政聲職滿歸邑人爭送之平曰昔負擔來今負擔去宜也何送為祝信襄陵人性醇謹事親備極孝養洪武中以貢授金華判清節自勵遷太僕寺少卿崔敏字好學襄陵人生四十日其父仕元為綿竹尹不相識者三十年敏依母兄以居寇亂又相失稍定入陜尋母不得即入川抵綿竹時城邑蕭然求父冢無知者復還陜訪親故得其處乃負其骸以歸時稱崔孝子韓永浮山人建文時户科給事中壬午六月北兵克都城召永欲官之不屈死王錫翼城人永樂舉人授郿縣教諭擢户科給事中彈劾不避權貴纍官右通政忠誠亷慎人不忍欺續鳳臨汾諸生父殁既葬晝往哭奠夜歸奉母母年八十一卒廬墓三年白燕來集枯木復生正統中旌表劉元貞翼城人父卒廬墓三年哀毁骨立有羣鳥飛繞異草叢生瓜蒂開蓮之異宣德中旌表衛英字時獻洪洞人景泰舉人除鳳翔通判宏治初為開封知府不以妻子自隨所得俸寄之于庫以河南參政致仕纍薦不起父母殁俱廬墓巡撫韓邦奇建忠孝亷節坊旌之韓文字貫道洪洞人宋宰相琦後生時父夢紫衣人抱送文彥博至其家故名之曰文成化初進士除工科給事中劾都御史王越語涉兩宫帝怒杖之文華殿謫參議宏治中厯南京兵部尚書歲祲請豫給軍餉三月户部難之文曰救荒如救焚能忍死待耶乃發廪十六萬石召拜户部尚書力遏權幸武宗立舊奄馬永成劉瑾等八人用事文偕諸大臣伏闕極諫明日召至左順門文復力爭竟不得未幾落職指為姦黨榜諸朝堂瑾誅復官致仕卒贈太傅諡忠定陳福浮山人有膂力善劍聞英宗北狩誓死難至大同北門與額森戰斬馘甚衆會大暑七日不解甲勞憊而卒額森舊作也先今改正陳孜字敏學福子成化進士初授慈溪知縣纍官貴州左布政使致仕所至有異政尤尚亷潔每於庭前懸楊震却金圖杜餽問者李浩字師孟曲沃人成化進士授都水主事纍遷兵部員外郎清畿內土田奪豪右侵占者還之民厯順天府尹時久旱疏論民所疾苦事當罷行者詔嘉納之劉瑾擅政無名需求浩一切裁抑數與面議可否不阿瑾偵其過無所得官至禮部尚書卒賜祭葬諡莊簡王泰字道亨翼城人成化進士厯知儀封衡水二縣升南京刑部主事遷員外郎劉瑾用事索賄泰曰以賄獲官吾不為也遂乞歸瑾誅復起用纍官山東按察使以清慎稱張潤字汝霖臨汾人宏治進士正德時為給事中劉瑾誅劾其餘黨罷黜者十二人瑾嘗增遼東諸衛屯田糧額以潤言復故厯撫順天寧夏皆有聲嘉靖中為工部尚書時工役繁興奏西苑仁夀宫及鼓樓六聖碑亭乞暫停罷帝採納焉後以戶部尚書致仕卒贈太子太保諡恭肅李大經臨汾人親喪廬墓正德中旌表子承芳亦如之丁汝謙字子益吉州人正德甲戌進士授太常寺博士擢禮科給事中世宗初議興獻禮忤旨謫曲周丞遷永平推官終四川安綏道所至皆有亷能聲周怡字順之太平人嘉靖進士除順德推官舉卓異推吏科給事中所摧擊率當時有勢力大臣在廷多側目二十二年六月以救吏部尚書許讚等刺大學士翟鑾嚴嵩廷杖繫詔獄隆慶元年擢太常少卿陳新政五事語多刺中貴由是忤旨出為登萊兵備僉事後復召為太常少卿未任卒天啓初追諡恭節王與齡字受甫鄉寧人嘉靖中進士除蘇州府推官治訟端平纍遷文選司郎中澄清銓敘所推薦皆亷靜老成大學士翟鑾嚴嵩有所囑皆不從遂被陷削籍歸徴不起隆慶初追贈太常寺少卿王凛鄉寧人家貧性至孝父病久思得肉食凛謀之婦翦髮易之道經龍神廟致禱夢神語曰此去十里杏樹下有泉可飲明旦汲水飲父父病尋愈楊天民字正甫太平人萬厯進士授朝城知縣有異政擢禮科給事中時方纂修國史與御史牛應元請復建文年號從之劾文武官之貪黷及妄奏捷者四人論罪有差尋進右給事中册立久稽再疏請不報二十九年五月復偕同官切諫帝大怒謫貴州永從典史天啓中贈光祿少卿李宏道字汝大襄陵人萬厯進士任南陽知縣擢兵科給事中以直言出為頴川僉事後纍調監司告歸生平篤學窮理著有易輔傳春秋會傳周禮解諸書高邦佐字以道襄陵人萬厯進士授夀光知縣厯永平知府天津兵備副使神木參政皆有治績天啓初任廣寧參政殉難贈太僕寺卿諡忠節鄭崇儉字大章鄉寧人萬厯末進士授河南推官厯濟寧兵備副使皆有政聲崇禎中纍遷兵部右侍郎總督陜西三邊軍務擊流賊張獻忠先後獲首功三千級降賊將四十人威名大震後被陷下獄誅羣臣冤之張䱋化字襄海太平人天啓進士授寶雞知縣調繁盩厔俱有善政後纍官關西分守道會流寇攻城竭力戰守城得完崇禎末殉節死桑拱陽字暉升臨汾人受業曹于汴大書敬字于室以自勵崇禎中舉于鄉巡撫蔡懋德請講學于三立書院聞者感勵李自成陷平陽不食死范藝茂洪洞諸生有學行崇禎末避難卦地山夜半賊執其父藝茂隨之入城賊大怒曰汝聞令否對曰偕來者令當死如父老且病何請受刑賊義而釋之同縣王昌祉父亦為賊所執昌祉請代受刑賊憐其孝亦釋之史可觀翼城人崇禎末文華殿中書舍人加鴻臚少卿城陷自縊死本朝乾隆四十一年賜諡節愍袁雅度翼城人性至孝闖賊陷翼執其祖母薛氏責餉雅度請代賊以刀斫其臂流血如注呼曰願死不願見祖母受刑也薛獲釋賊縛雅度械之械立壞如是者再賊驚愕舍去本朝樊嶷字九嶷臨汾人狷介負氣節從學辛復元之門順治初知盩厔縣崇教化抑奔競一意休養上官以為迂以事罷之民爭餽千金一無所受及歸貧不能舉火泊如也王永命字九如臨汾人順治戊子舉人知遷安縣以興學校絶苞苴勸農事為務邑人稱之擢行人病歸永命事父母孝居喪寢苫枕塊者三年以孝子旌著有懷堂等集晉淑軾字長眉洪洞人順治丙戌進士知中牟縣以治行最行取兵科給事中轉工科例出知大名府時巨寇任鳳亭巢踞四省界淑軾攜一役抵巢招撫之鳳亭感泣聽命奏授副將五臺寇高三聞之亦就撫焉纍遷通政使卒王牧民浮山人順治初以貢授平湖縣丞甫蒞任海寇猝至城陷被執不屈死衛周印字斯盛曲沃人明崇禎進士少孤事母以孝聞順治初巡按畿南撫流亡招攜二解散羣盜一境晏然還掌河南道厯兵部左右侍郎性簡重與人不設城府而臨事不為利害惑人咸重之衛周祚字聞石周印弟明崇禎進士順治初為吏部文選司郎中銓政清肅不可干以私纍遷工部尚書督修三殿省內府金錢數十萬散帳畿南措置有方加少保改史部尚書保和殿大學士卒諡文清周祚厯官四十餘年再入政府田廬無改以清簡慎密受知始終弗替子台瑺知福建漳州府有威惠調臺灣教以禮義番俗一變終兩廣鹽運使張冕曲沃諸生多謀略順治間盜起圍城者再竭力守禦城得全上官鉝字三立翼城人明崇禎進士順治初為中書舍人纍遷大理寺少卿多所平反厯左副都御史疏數十上尋以劾滇廣閩三藩跋扈狀左遷太常卿後三藩皆以謀逆誅人稱其有先識兄鑑字金之順治進士潞安府教授厯吏部郎尋以嘉湖僉事擢河南分守參議所在清肅有善政劉漢卿翼城人順治初知耀州尋監郃陽軍遷保寧同知所在有平賊功終肇慶知府又同縣薛鳳鳴順治初知盩厔縣潔巳愛民招降叛黨人皆德之曹續祖字子成鄉寧人順治甲午舉人性至孝以養母終身不仕母殁居喪悉遵家禮儀節年八十猶莊誦宋六子書著書凡數十種蔣宏道字扶三臨汾人順治巳亥進士選庶吉士授檢討纍遷至禮部右侍郎凡遇諸大典禮多所諳悉尋調户部侍郎升左都御史康熙三十四年平陽地震特詔平陽所屬之人現官京師者給假歸視其家宏道至鄉里即大集父老子弟宣布朝廷德意詢民疾苦然後抵家更捐資助恤又日與當事周視城垣經營修理後以日疾解職四十二年卒賜祭葬具如典禮焉晉淑京洪洞人以歲貢授盂縣訓導未任請老淑京七歲喪父數日母亦殉卒叔承宿撫字之既長留心理學行誼醇備執叔之喪哀慕盡禮尤好義多善舉邑人誦服之李天植曲沃人未生時父客于外不通問者十餘年既長與母訣誓不得父不歸徒步求之三十載至廣東高要縣境時父死久柩三易其處矣乃函骨以歸葬李栻臨汾人生六月父殁揚州既長泣請於母往尋之至揚不得蹤迹號泣街衢忽遇父執聶姓者示以所葬處遂負骨歸王師臨汾大少以孝聞母患目疾甚苦師屢以古餂之遂得復明又嘗中蜈蚣毒負痛不起師吮之立愈雍正庚戌成進士初知元城縣纍擢至江蘇巡撫居官以清介自持尤多善政吏民咸感之乾隆十六年卒于官入祀鄉賢雒潤臨汾人性孝友七嵗喪父哀毁如成人鄉黨稱重之嘗延師以教族里之子弟其貧不自給及無力嫁娶者並賑濟之任定襄縣訓導督課有方以敦品力學為首務乾隆四十一年入祀鄉賢崔應招臨汾人孝義著聞乾隆年間旌高鵬元洪洞貢生孝義著聞同縣孝義監生景洪彥嶽湧儒童楊宏鉞劉嗣勝俱乾隆年間旌樊翔鳳曲沃人孝義著間乾隆年間旌鄭振聲鄉寧貢生孝義著聞同縣楊維藩閻柷鄭孝先俱乾隆年間旌陳鳳翀吉州人孝行純摯父病籲天求以身代及殁哀毁踰禮三年不離柩側乾隆二年旌蘭第錫吉州人乾隆十五年舉人由教諭保題知縣厯官至江南河道總督居官以亷潔聞卒後遺産僅值百金嘉慶四年入祀鄉賢祠裴宗錫曲沃人原任雲南巡撫嘉慶十五年入祀鄉賢祠劉秉恬洪洞人乾隆二十六年由舉人取中中書洊升兵部侍郎三十七年赴金川軍營經理糧務屢蒙嘉奬四十五年仕雲南巡撫安辦銅鹽事務調倉場侍郎籌辦截漕事宜得旨議敘嘉慶五年調兵部侍郎卒晉嵩元洪洞諸生孝友著聞同縣孝子生員陳美士陳拱辰監生董修業俱嘉慶年間旌翟必羾曲沃人孝行著聞同縣孝子王丕澍俱嘉慶年間旌賈存仁浮山人孝行著聞同縣孝子張樅俱嘉慶年間旌流寓晉庾珉鄢陵人厯官侍中懷帝殁於劉淵珉從在平陽淵大會使帝行酒珉不勝悲憤載拜上酒因大號哭賊惡之並遇害太元末追諡曰貞辛勉狄道人懷帝侍中隨帝至平陽劉聰將署為光祿大夫固辭不受聰遣喬度賫藥酒逼之勉曰大丈夫豈以數年之命而虧高節事二姓引藥將飲度遽止之曰真義士也歎息而去聰嘉其貞節為築室于平陽西山月致酒米勉亦辭不受年八十卒辛賓勉族弟愍帝時為尚書郎及帝蒙塵于平陽劉聰使帝行酒洗爵賓起抱帝大哭聰曰前殺庾珉輩不足為成耶引出加害焉唐員半千全節人羇丱通書史客晉州州舉童子房元齡異之對詔高第李拯字昌時隴西人咸通中進士纍佐府幕黃巢亂避地平陽後為考功郎中知制誥時襄王煴之難拯嘗退朝望南山而吟吟已涕下襄王敗拯為亂兵所殺妻盧氏斷一臂死金曹之謙應州人興定中進士寓平陽三十載講明道學遠近多來從遊元張從諫寧波人官學士元亡遂遠遁佯狂乞于翼城市中後以詩贈學諭學諭憫其寒令諸生遺之以布從諫曰何相輕如此古之却衣而斃者何人哉遂索詩而反其布列女晉柳氏襄陵人賈充母重節義竟不知充與成濟事以濟不忠數遣罵之及將亡充問所欲言柳曰吾教汝迎李新婦尚不肯安問他事遂無言唐平陽公主高祖第三女下嫁臨汾柴紹紹從高祖走并州主于鄠發家資招南山亡命得數百人以應帝因略地盩厔武功始平皆下之申法誓衆禁剽奪遠近咸附勒兵七萬威震關中號娘子軍武德六年薨以軍功特加鼓吹以葬金張慥妻馮氏名妙真吉州人刑部尚書延登之女年十八適進士張慥慥為洛州主簿會鄜州受兵守臣橔慥往平涼督行軍芻粟妙真奉舅姑居洛川城陷扶舅姑匿窟室中為亂兵所得即與舅姑訣攜三子俱赴井死趙烈女臨汾人年二十未嫁寇亂被掠紿賊曰吾取所藏金以遺汝遂還投井死元周珠赫妻崔氏臨汾人從周珠赫官平陽金將攻城克之令官屬妻子敢匿者死時周珠赫使在上黨崔氏抱幼子貞詭言于將將使軍吏書其臂出之崔氏曰婦人臂使人執而書非禮也以金賂吏使懸筆書袖既出與貞伏土窖三日得免巳而周珠赫亡崔年二十九誓不更嫁有權貴求娶輒自爬毁其面四十年未嘗妄言笑治家教子有法人比古烈婦云周珠赫舊作周术忽今改正刁茂先妻劉氏臨汾人嫁五十日夫卒哀號過情遂自縊人救之泣曰婦人從一而終何救為竟不食而死事聞旌表其門秦閏夫妻柴氏晉寧人賊犯晉寧閏夫前妻子陷賊中既而得脫有惡少嘗滅仇家仇訴于官軍事連閏夫長子法當誅柴氏引已子詣官泣訴曰從惡者吾次子非長子也次子亦引為巳罪鞫之幾死不易其言官反疑次于非柴所出既得其情義之遂釋其長子而次于亦得不死詔旌之且復其家宋仲榮妻梁氏翼城人舅殁負土為墳明張晟妻李氏臨汾人晟元末為乾州學正卒于官時關中兵起道梗不能還子文元甫九歲李紡績度日兵稍息遂與子負骸骨歸葬守節終身永樂初旌表李洪妻張氏曲沃人洪早卒遺孤金方七月張撫之誓不再適母欲奪其志不從遂絶粒死事聞旌表常俊俊曲沃人常銘女未字正德六年為流寇所掠投井死衛好艾太平人年十三惡少牽衣戲之怒罵投井死尸出目不瞑眥裂出血巡按御史表其墓韓居觀妻鄭氏洪洞人崇禎末闖賊陷都城居觀偕鄭及二子出遁道經定興匿稠桑下賊奄至鄭謂居觀曰我不死君父子必不免遂縊桑中年二十二又趙國士妻范氏年十九夫亡二子皆幼甘貧守節闖賊至范恐辱身投井死李伸妻吉氏洪洞人崇禎末闖賊犯太原時伸為守備吉勸之力戰且朂以殉難及城陷脫叉自刺其頸不死尋抱幼女投井中寇去具斂面如生郭九仭妻張氏浮山人崇禎中賊至被獲欲犯之張誘以善言防稍懈即投崖而死齊鳴臯妻張氏浮山人崇禎中為賊所掠迫之俱去時張方有重服紿賊曰我既行宜易吉服以從賊意弛遂乘間投井死又齊國才妻葛氏亦被執與張相繼死節俱旌表孟鳴陽母王氏嶽陽人年二十一夫亡鳴陽才三歲守節紡績以養崇禎五年為流寇所掠大罵不屈死同時范志科妻王氏范志大妻周氏俱為賊所獲投崖下王死周未死復自縊于樹范蘭香嶽陽人范星鼎之妹年十四有娑色遭流賊亂度不能免遂縊死周承通母王氏曲沃人崇禎初流寇入境王匿山洞中洞破𬒳掠王怒拉賊同墜千尺崖下死之賊亦死吳中豸妻衛氏曲沃人崇禎末流寇至衛登樓以避聞羣賊縛其夫肆毒厲聲罵賊倒墜樓下死羣賊為之咋舌事聞旌表又李柵妻秦氏夫為賊掠去疾投百尺崖下絶而復蘇眇目折足終身殘廢常鴻洙繼妻楊氏翼城人嫁未三載夫亡無子楊矢志守節崇禎五年流寇亂被掠罵不絶聲賊怒腰斬之旁賊憐其節瘞之而法劉聲宏妻陳氏翼城人年二十守節撫孤經亂被掠投河死張黑子妻賀氏襄陵人年三十清白自守流賊至度不能免閉門縊死劉廷瓚妻梁氏襄陵人僑寓江都乙酉城陷攜二子登樓舉火自焚高榮妻師氏鄉寧人年二十夫亡誓不再適夫弟欲奪其志遂抱石投潭水死成烈女鄉寧人成大化女年十六未字避亂山中為賊所執欲汚之女好言紿賊賊釋手即投崖死曹宏績妻賀氏吉州人崇禎末隨父母避兵山寨流寇攻之急女恐為賊玷遂呼母與訣投崖死之母張氏亦撞壁死本朝烈婦某氏平陽人薑瓖之亂被掠逼辱瀕死不從行至定州唐城村清水河側書絶命詞于廟壁自縊而死州牧為棺殮致祭葬之廟後勒詞于石云張應奇妻陳氏嶽陽人早寡厯兵荒節彌厲夀百餘歲卒許炳妻李氏曲沃人薑瓖之亂避山堡間堡破呼子婦李氏投崖下身死子婦殘廢同時梁永建妻仇氏李振采妻尉氏李登壇妻馬氏俱投崖死李鯤龍妻解氏曲沃人寇至被執大呼躍入井同時趙應春妻李氏郭明儒妻行氏俱投井死趙國昌妻禇氏曲沃人避寇汾曲小堡堡破被執上馬不從賊怒斫死巳而復蘇抉面折股終身殘毁同時吕雲樞妻許氏郭可盛妻趙氏俱以罵賊遇害王繡妻耿氏翼城人薑