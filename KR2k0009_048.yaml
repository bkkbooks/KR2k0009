汾陰祠在廟前村北本朝康熙二年因舊祠重建介之推祠在萬泉縣南一里介山上水經注介山上有神廟廟側有靈泉祭之日用而不耗河瀆神廟在永濟縣南門外唐書地理志河中府河西縣開元十五年自朝邑徙河瀆祠於此寰宇記河瀆廟在河西縣正西北城外一里文獻通考宋乾德六年有司請祭西海河瀆並於河中府大中祥符四年親謁奠河瀆廟元李好文廟記西海荒逺望祀於河東之河中與河瀆為二廟合為一都宫舊志唐郭子儀建肅宗時封靈源公宋仁宗封顯聖靈源王元至正中加封靈源神祐宏濟王明洪武初改稱大河之神本朝載之祀典纍遣官致祭聖祖仁皇帝特頒加御書砥柱河津額雍正初封西瀆潤育大河之神西海神廟在永濟縣南門外河瀆廟西唐天寶中封廣潤王宋加封通聖廣潤王元至元中敕建廟加封廣潤靈通王明洪武初稱西海之神本朝載之祀典纍遣官致祭聖祖仁皇帝特頒御書源遠流長扁額雍正三年加封西海正恆龍王之神夷齊廟在永濟縣南首陽山魏書宣武紀正始元年詔立夷齊廟於首陽山寰宇記伯夷叔齊祠在河東縣北三十里明張四維記其廟貌所肇宋黃庭堅元王惲咸謂起自唐代而郡志云自晉太康考後魏酈道元注水經巳稱雷首山有夷齊廟及漢蔡雍所撰夷齊碑記內述其事原於平陽蘇騰漢人固巳祠之不獨唐晉也禹廟有二一在永濟縣西門外黃河東岸元世祖中統三年修河中禹廟賜名建極宫一在萬泉縣南三里晉文公廟有二一在臨晉縣北三十里舊説文公西拒秦兵駐此後因立廟一在猗氏縣張嶽鎮湯廟有二一在虞鄉縣東十里故市鎮一在榮河縣東北十里以伊尹仲虺配享宋開寶六年敕修本朝屢遣官致祭后稷廟在萬泉縣西金崇慶初明正德中祈雨皆應郇伯廟在猗氏縣治東北舊射圃地寺觀開元寺在永濟縣東關內宋真宗大中祥符四年祀后土幸開元寺明洪武初併廣慧普濟淨業善慶湖北五寺入焉普救寺在永濟縣東五里唐釋道積修建十年乃成本名西永清院五代時改今名高爽華博東臨郡冶南望河山像設三層巖廊四合明初併廣儀旌勛藏海乾明四寺入焉棲巖寺在永濟縣東二十五里中條山北後周建德中建初名靈居隋仁夀初改今額明洪武初併白塔寺入焉寺有望川亭宋宣和中建西望秦川萬固寺在永濟縣東南十五里中條山麓唐大中間建初名建元後改今額明洪武中併白石讃歎竹溪雲蓋淨土五寺入焉又護國寺在縣北三十里景福寺在永濟縣南二十里有明神宗御書額宏法寺在臨晉縣東南二十里聖夀寺在臨晉縣西北五里一名西閣聖夀寺又縣西北二十五里有聖壽寺石佛寺在虞鄉縣西南三里即古百梯寺內有唐虞鄉令劉行忠幡竿銘石又延祚寺在縣西北十五里唐建宋太平興國二年敕修靈峰寺在虞鄉縣西南十里方山上唐咸通中重建八龍寺在榮河縣東十五里李莊宋建大覺寺在榮河縣北三十里唐垂拱初建法藏寺在萬泉縣東南馮底村唐尉遲敬德監修又正覺寺在縣東南景村唐龍朔初建法雲寺在萬泉縣南十里通志寺在介山絶頂宏麗精巧甲於一方元泰定九年建明萬厯八年建石城周七十丈下生寺在萬泉縣有二一在四望村金天興初建寺有光武祠祠前有龍柏相傳漢光武嘗繫馬於此一在北解村元延祐中建仁夀寺在猗氏縣東北二里峩嵋南麓隋唐間榜曰白禪後改大雲宋熙寧中賜額夀聖元至正間改今名明洪武初併宏福千佛廣福夀聖聖安慈氏寶泉七寺入焉又東北有妙道寺今名雁塔寺慶雲觀有二一在府城東二十里元泰定初建後併道靖祐聖遠塵復真摩雲五觀入焉一在榮河縣北四十里元至大初建通元觀在永濟縣南六十里九峰山下有明萬厯二十七年賜道藏一部敕一道並存棲霞觀在永濟縣通志唐天寶初為通元先生張果敕建今城東有五老峰有張果洞通真觀在臨晉縣城內東南隅元泰定中建丹陽觀在虞鄉縣東南十里王官谷內即唐司空圖隱處金大定初建靈峰觀在虞鄉縣西南十里五老山靈峰下本名無相隋開皇中更名逰仙唐貞觀中又名大明貞元中羅通微修煉於此詔改今名道清觀在虞鄉縣西南十五里方山下通志侯憨子升仙處觀旁有硃砂洞以大石覆壓洞口石色皆赤內有井水恆滿太清觀有二一在猗氏縣東南二十里金大定中建一在萬泉縣西門內元延祐中建純陽宫在永濟縣南一百二十里南張村名勝志吕洞賓宅在蒲州東南永樂鎮今為純陽宫通志唐為吕公祠又為觀元中統三年重建改為宫後併法逸玉泉棲霞長春通元峽石六觀入焉殿後有古柏及連理銀杏樹數人合抱傳為吕公手植又有寥陽宫在縣西南元至正初建藥師院在臨晉縣東北甘泉坊唐天寶中建
