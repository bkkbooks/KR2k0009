body:
  text: 九江府二關隘九江鈔關在德化縣西二里明景泰初置户部分司以榷商税嘉靖初以磯險湍急立新厰於海天隄尋復還舊所本朝康熙二十一年移駐湖口縣設税厰於鐘山之側每年差部臣一員監督雍正元年口關形甚險商船不利停泊世宗憲皇帝念湖特命移歸九江别設分司於大姑塘停差監督令巡撫選賢能官二員駐劄收税商船由湖廣抵江西者納税九江由江西至湖廣者納税大姑塘自是商民往來咸稱便焉大姑塘巡司在德化縣東南三十五里大姑塘本朝雍正二年置并設千總駐防城子鎮巡司在徳化縣西四十里大江北明洪武初置巡司本朝康熙初裁尋復置雍正二年移駐大姑塘乾隆七年復置二十三年移駐小池口五十二年改石城縣赤江巡司復置小池口巡司在德化縣北本朝乾隆二十三年置肇陳口巡司在瑞昌縣西肇陳口與湖北興國州接界本朝乾隆九年置馬當鎮巡司在彭澤縣北三十里元至正中置於馬當山麓明洪武六年移置本朝因之南湖嘴鎮在德化縣東四十里臨彭蠡湖口明洪武初置巡司成化十三年置南湖營於此南岸起下巢湖東至馬當山計三百二十五里北岸起湖北廣濟縣龍坪鎮東至安徽宿松縣沙灣計二百四十里皆爲汛地後罷天啟四年并裁巡司龍開河鎮在德化縣西明洪武初置巡司天啟二年裁湖口鎮在湖口縣南一里明初置巡司嘉靖中移建上石鐘山西本朝康熙五年裁柘磯鎮在湖口縣北四里柘磯旁磯出半江甚險舊設遞運所明萬厯中廢又有湖口禁江河泊所在縣治北一里沙頭港明洪武二年置嘉靖間廢茭石磯鎮在湖口縣北二十五里明初置巡司嘉靖十一年移於黃茅潭去茭石五里本朝康熙五年裁峯山磯鎮在彭澤縣西南三里長洑嶺之陽明初置於縣西三十里正統十一年因地僻改置於此今裁又縣西南二十里有黄土港河泊所東北四十里有仰天池河泊所俱明初置今廢南湖營在湖口縣西南上鐘山右明成化十三年設守備於徳化縣之南湖嘴正徳六年廢嘉靖四十一年以江湖多盜復設守備於湖口仍名南湖營本朝康熙元年増設南湖營水師遊擊分轄沿江營汛後裁遊擊設守備十總各一員及把總二員駐防雍正十年改守備為都司鶴問寨河泊所在德化縣西南十五里宋元時置寨以近鶴問湖而名明洪武初於此置河泊所今裁又小江河泊所在縣北十里封郭洲明正統五年以沙池高頭湖二處河泊所併入今裁又官湖旁有官湖河泊所城西龍開河渡口有魚苗厰舊皆官收魚税處白水堡在德安縣西一百里東界瑞昌之新義西接武寕之眉山北距瑞昌之南劉坂南距建昌之河滸四界相連舊設官兵成守通遠驛在德化縣南六十里明初設驛丞於此本朝乾隆二十七年兼管巡檢事潯陽驛在德化縣東北江濱宋元以來皆置城西門外明萬厯四十一年改置於此本朝雍正四年裁瀼溪驛在瑞昌縣治東南宋紹興中置後廢彭蠡驛在湖口縣南一里明初置本朝雍正四年裁龍城驛在彭澤縣治北半里舊名彭澤水驛明洪武元年更名後遷縣治左本朝雍正四年裁又縣北四十里舊有楊枝馬站元至正初置明初與縣南舊縣站俱廢湖口税厰在湖口縣治西南上鐘山麓明嘉靖四十二年添設榷安慶入鄱陽往來商税隆慶初言者以湖口兩山夾峙岸石巉阻江濤汛激舟不能泊因罷萬厯二十六年復置四十三年復撤本朝康熙二十一年移九江鈔關於湖口縣改南湖營㕘將舊署為關署五十七年巡撫白潢以湖關處江湖交滙之區商舟停泊屢患漂溺疏請於關右里許開濬武曲港以泊商船改建關署於港之西北岸後港漸淤塞商旅仍蹈前險雍正二年移歸九江舊署女兒港市在德化縣東南三十五里彭蠡北出之道今大姑塘巡司駐此人小池口市在縣北大江北岸接湖北黄梅縣界清江鎮清湓市在瑞昌縣南四十里劉家市在湖口縣南四十里商旅居民極為繁盛都昌湖口二縣俱貿易於此津梁太平橋在德化縣東南白鶴鄉跨廬山澗路通鶴問湖唐開元中建明成化萬厯中修思賢橋在德化縣南甘棠湖上元時建以思李渤而名本朝移建南門外玉波橋在德化縣西湓浦港上俗名花橋龍開河浮橋在德化縣西龍開河上舊在小江南岸海天隄宋建明宏治中修後移置上流以避水勢明末廢本朝康熙六年重建設船十二夫四名德化瑞昌兩縣管之又有龍開河渡明嘉靖中督關岑萬以河岸土疎雨後難行築石隄於兩岸長六十餘丈廣二丈萬厯末移水滸廟前虎溪橋在德化縣廬山東林寺前上有三笑亭相傳即晉慧遠送陶潛陸修靜過溪處女兒橋在德安縣西北一里許跨箬山河路通建昌武寕潘溪橋在德安縣東北二十五里通德化分水諸流大雨則百川會合人莫敢渡明成化中建石梁輿梁橋在德安縣東北明洪武五年建木橋後屢為山水衝圯嘉靖二十九年易以石白龍橋在瑞昌縣治西瀼溪上宋建又西里許為汪家橋明成化中建下厯橋在瑞昌縣西二十五里為武寕徳安孔道虹橋在湖口縣城南門外虹橋港上元大徳中建文橋在湖口縣南三十里宋淳熙中建本朝順治十三年重建南湖嘴渡在徳化縣東五十里又縣南五十里有鶴問寨渡縣北有潯陽渡盧家灘渡在德安縣西二十里為義寕州及武寕縣通衢本朝康熙十二年知縣姚文燕造舟二置田二十畝為渡夫食蒼城渡在瑞昌縣西南一里路通德化又百涉渡在縣北二十里路通廣濟勞家渡在湖口縣南十里春夏水漲居人駕舟往來其北岸有勞家渡橋本朝康熙二年架石為梁水漲始以舟渡雙溪渡在彭澤縣北七十里隄堰甘棠湖隄在徳化縣南本名南湖隄唐長慶二年刺史李渤築隄長三千五百尺李翶為記府志郡城前臨湖水藉湖為濠以通舟楫李隄乆廢明嘉靖中增修復圯夏秋則苦泛溢冬春則病淺涸萬厯四十一年兵備副使葛寅亮築石隄一百八十餘丈増廣一重名西城隄又建石閘以備蓄洩亦曰西城閘即今新壩秋水隄在府境唐書地理志潯陽東有秋水隄太和三年刺史韋珩築西有斷洪隄會昌三年刺史張又新築以窒水害省志今失其址謝公隄在德化縣西地名泥塗嘴上為龍開河官簰夾二水衝激崩陷無常明嘉靖中兵備謝迪築隄備之長半里海天隄在德化縣西五里一名海船窩元時海運造舟處也路通瑞昌舊為湖澤行者必資舟楫以濟明正德初始募築隄長五六里植柳千株於上以春秋水漲若海天無際故名今廢李公隄在德化縣北明正德九年郡守李從正甃石為隄以䕶庾樓磯一帶城址封郭洲隄在徳化縣東北大江北岸其洲綿亙三十餘里民田三萬六千餘畝及南昌九江蘄州三衞屯田皆在焉每患江水侵溢無所捍蔽明萬厯三年知縣俞汝為築隄自小池口抵德化嘴延袤三千餘丈三十六年又建石閘以為蓄洩四十一年霪雨壞隄兵備副使葛寅亮修復之桑落洲隄在徳化縣東北江北岸明萬厯初巡撫潘季馴役徳化湖口黄梅宿松四邑之民南昌九江蘄州三屯之卒分地築隄令九江同知宋純仁專董其事五閲月而訖工延袤七十餘里東隄在瑞昌縣城東明萬厯十六年築延袤三里江公隄在瑞昌縣南縣志瀼溪舊自倉城西折而東去城半里許明宣德中知縣劉仁宅改濬新河令直抵城下折而東萬厯七年以溪水齧城復開舊道引河南徙歲久衝激愈甚本朝康熙十一年知縣江皋復濬新河築隄長五十八丈障囘水勢人呼江公隄長虹隄在湖口縣虹橋港口明萬厯中築以捍波濤泊商船本朝康熙年間修蘇觀隄在湖口縣蘇觀渡舊有古隄長二里許後圯於水明天順中知縣董紱修築數百丈萬厯中重築後復圯本朝順治年間重修林木蔭翳湖光瀲灧為一縣之勝流陂堰在瑞昌縣西二十里溉田數百頃明崇禎中邑人蔡廷寵築赤松閘在德化縣西七十里明萬厯四十八年建又縣北三十里有嚴家閘接湖北黃梅縣界亦明萬厯中建陵墓晉陶侃母墓在徳化縣西白鶴鄉相傳陶侃葬母於此有異人化鶴而去今鶴問湖以此而名陶潛墓在德化縣西南楚城鄉面陽山麓有祠唐鄭善果墓在德安縣葛洪山下善果爲江州刺史卒於官葬此宋馬適墓在湖口縣南馬家灣幞頭山周元公墓在德化縣西栗樹嶺南周元公先葬其母於此後卒即葬母墓之左王韶墓在德安縣望夫山下姚興墓在彭澤縣南八十里鮑家嶺欽宗時戰殁和州收葬於此岳飛母墓在徳化縣西南五十里株嶺之麓飛鎮江州時母姚氏殁高宗賜葬於此明正徳中建祠顔希孔墓在彭澤縣鳳凰山麓元燕公楠墓在德安縣烏石山祠廟陶桓公祠有三一在府城東一在府城南龍溪一在湖口縣城内祀晉陶侃李忠文祠在府治東祀元總管李黼明宏治中以從子秉昭配祀岳忠武祠在府治南明正德七年建白樂天祠在府治西湓浦門内宋徐鉉有記陶靖節祠有三一在徳化縣柴桑山下一在湖口縣一在彭澤縣治東濓溪祠在德化縣廬山之麓明正統初御史徐傑副使焦宏即書院故址改建爲祠肖像其中張横渠祠在德化縣赤松鄉元建後廢本朝順治十一年重建五賢祠在德安縣祀宋郡守李澗楊沂王秬李邦獻李若川五人多遺惠民爲立祠義烈祠在瑞昌縣城東明嘉靖四十年流賊犯廣信巡撫胡松檄瑞昌柯談呉黄王五姓鄉兵剿之事平錄死事者三十人立祠祀之元次山祠在瑞昌縣西瀼溪旁陶狄二賢祠在彭澤縣南唐景龍中建祀陶潛狄仁傑後縣移治祠廢元周錯守江州復合祠祀之狄梁公廟在彭澤縣南四十里宋賜額顯正廟范仲淹記明賜額曰唐司空梁國狄文惠公之廟又有祠在湖口縣下觀音巖寺觀能仁寺在府治東梁建舊名承天院明宏治中改今名龍池寺在德化縣甘棠湖北舊名龍泉精舍晉僧慧遠建明洪武十一年改今名東林寺在德化縣南廬山麓晉太元九年慧遠創建謝靈運為鑿池種蓮號蓮社初為律寺宋改為禪寺紹興間燬明洪武六年重建本朝順治十三年重修西林寺在廬山麓與東林寺相對晉太元中僧慧永建隋開皇中修唐宋尤盛元時燬明洪武十四年復建上大林寺在廬山西大林峯南晉建元末燬明宣徳中重建寺前有寶樹二曲幹垂枝圓旋如蓋又中大林寺在廬山錦澗橋北下大林寺在橋西上化成寺在廬山講經臺下相近有上崇福寺皆晉慧遠建又中化成寺在香鑪峯右隋開皇中建下化成寺在香鑪峯下晉建天池寺在廬山巔宋嘉定中建上有池名天池其水四時不竭寺因以名羅漢寺在德安縣南二里羅漢橋西楊呉順義元年建宋大中祥符元年改淨土院明成化間重建輿地紀勝南唐時有鐵羅漢五百軀宋曹翰拔江州載置潁川新造佛舍東山寺在瑞昌縣治東宋祥符中建上鐘山寺在湖口縣南上鐘山唐咸通元年建名崇壽寺宋隆興中重建改今名本朝康熙中重建下鐘山寺在湖口縣北下鐘山唐龍紀元年建名寶鐘院宋嘉祐中改今名本朝順治中重建太乙觀在德化縣廬山雙劍峯下又名祥符觀即晉董奉種杏處夀聖觀在府城西明統志宋慶元間大疫有楊真君施符水飲者即愈民請立祠寕宗親書額曰洞庭順利之祠嘉定間又書壽聖觀三大字賜之太平宫在德化縣南三十里唐開元中建名九天採訪祠宋宣和中改太平興國宫萬夀宫在府治南明洪武中建名宦三國呉徐盛琅邪莒人以别部司馬統兵五百人守柴桑長拒黄祖祖子射嘗率數千人下攻盛盛時吏士不滿二百與相拒擊傷射千餘人巳乃開門出戰大破之射遂絶迹不復為寇陸抗呉郡呉人赤烏九年遷立節中郎將與諸葛恪換屯柴桑太平二年拜為柴桑督梁沈瑀呉興武康人天監中出為安南長史尋陽太守性崛强毎忤刺史蕭穎達穎達銜之瑀謂人曰我死而後已終不能傾側面從遂為所害陳孔奐山陰人光大二年出為康樂侯長史尋陽太守行江州事奐在職清儉多所規正徐儉東海郯人後主時遷尋陽内史為政嚴明盜賊靜息隋韋洸杜陵人陳平拜江州總管率步騎二萬畧定九江唐鄭善果榮澤人貞觀初拜江州刺史卒李亶高祖孫封豫章王高宗時治江州有美政狄仁傑太原人武后時為來俊臣所搆貶彭澤令邑人為置生祠韋應物長安人德宗時調江州刺史白居易下邽人憲宗時貶江州司馬既失志能順適所遇久之徙忠州刺史後江州人為立祠焉李渤洛陽人元和中遷江州刺史度支使張平叔斂天下逋租渤上言度支所收貞元流户賦錢四百四十萬臣州田二千頃今旱死者千九百頃若徇度支所斂臣懼天下謂陛下當大旱責民三十年逋賦臣刺史上不能奉詔下不忍民窮無所逃死請放歸田里有詔蠲責渤又治湖水築隄七百步使人不病涉入為職方郎中錢徽呉興人穆宗時貶江州刺史初州有盜刦貢船捕吏取江濱惡少年二百人擊訊徽按其枉悉縱去數日舒州得真盜州有牛田錢百萬刺史以給宴飲贈餉者徽曰此農耕之備可他用哉命代貧民租入五代南唐胡則後主末為江州指揮使金陵陷曹彬以後主手書喻郡縣悉以城降書至江州刺史謝産賓集將佐謀納欵則率同列入攻彦賓殺之衆推為刺史號令肅然堅壁死守太祖命曹翰攻之堅不可破翰軍死傷者衆㑹則疾革不能起城始陷宋康戩高麗人太宗時知江州以清白幹力聞吕誨開封人嘉祐六年出知江州劉述湖州人神宗時以忤王安石出知江州踰歲提舉崇禧觀卒唐敏求當塗人宣和六年調徳化簿盜起敏求挺身率衆捍賊度力不能支諭以禍福賦憤詆觸譟而前遂遇害趙士嶐太宗之後以功授江東路鈐轄李成遣其黨馬進圍九江守臣姚舜明與士嶐及副鈐轄劉紹先禦之時僅罷卒數千捍賊百餘日城中食盡舜明紹先棄城去士嶐獨糾合部曲餘民守域城破衆號呼曰無殺我趙鈐轄成素服士嶐之義欲以為偽安撫使士嶐怒罵隂裂帛以書示諸子遂仰藥卒賊怒并害其家數十口贈武功大夫趙士遒宗室子守官江州紹興五年馬進寇江州士遒遇害贈武徳大夫岳飛湯隂人紹興二年授武安軍承宣使屯江州甫入境安撫李回檄飛捕劇賊馬友郝通劉忠李通李宗亮張式皆平之三年春召赴行在江西宣諭劉大中奏飛兵有紀律人恃以安今赴行在恐盜復起不果行時䖍吉盜連兵寇掠諸郡飛悉破降之郭彦章高宗時爲瑞昌令宣撫使張俊駐師九江遣卒以書至瑞昌彦章揣知卒與獄囚通乃械繫之俊訴於朝彦章坐免張綱言近時州縣吏多獻諛當路彦章不隨流俗是能奉法守職今不奬而黜何以示勸葉義問壽昌人通判江州豫章守張宗元忤秦檜或中以飛語事下漕臣張常先宗元道九江常先檄義問拘其舟義問曰吾甘得罪不爲不祥常先白檜罷去林栗福清人孝宗初知江州有㫖省併江州屯駐一軍栗奏本州上至鄂渚七百里下至池陽五百里萬一有警鄂渚之成上越荆襄池陽之師下流增備中間千里藩籬誠為虚闕無以一夫之議而廢長江千里之防由是軍得無動韓彦直延安人乾道中進江西轉運兼權知江州時朝廷還岳飛家資産多在九江歳久業數易主吏緣為奸彦直搜剔隱匿盡還岳氏唐文若眉山人孝宗時知江州金復大入官軍悉戍淮文若謂上流當嚴兵備以定民志奏籍鄉丁五萬訓練有法人倚以固解嚴和糴大起郡之數八萬文若以勞民堅請得減什三黄灝都昌人孝宗時知德化縣以興學校崇政化為本歳饑行賑給有方劉穎衢州西安人光宗時除江西運判江州德化縣田逃徙大半守乞蠲税不報頴以見種之税均於荒萊民願耕者第減之上供自若而田盡復李孟傳上虞人寕宗時知江州獄訟止息趙崇憲餘干人寕宗時知江州郡民歳苦和糴崇憲疏於朝永蠲之且轉糴旁郡穀别廩儲之以備歳儉瑞昌民負茶引錢新舊累積為緡十七萬有奇皆困不能償會新劵行視舊價幾倍蓗崇憲歎曰負茶之民愈困矣亟請以新劵一償舊券二詔從之受賜者千餘家修陂塘以廣溉灌凡數千所董槐定遠人嘉熙三年知江州秋流民渡江來歸者十餘萬槐發粟賑之至者如歸焉時襄漢揚楚間無頼者往往為羣盜浮光人翟金寓黄陂有衆三千餘稍出擄掠槐令客説下全徙之陽烏洲使雜耕蘄黄間用為禆將於是曹聰劉清之屬皆來自歸淳祐二年復為沿江制置副使兼知江州視其賦則吏侵甚下敎且誅之吏震恐槐因除民患大計軍實常若敵至禆將盧淵凶猾不受命斬以徇軍中肅然元曹靖國大德中彭澤尹為政簡而亷諸廢墜多修復民徳之為立惠愛亭李黼潁人授江州路總管至正十一年盜𧺫黼治城濠修器械募丁壯分守要害且上攻守之策於江西行省請兵屯江北以扼賊衝不報十二年正月賊渡江陷武昌乘勝破瑞昌兵至境黼身先士卒大呼陷陣賊大敗逐北六十里殺獲二萬餘謂左右曰賊不利於陸必由水道以舟薄我乃以長木冒鐵錐暗植沿岸水中謂之七里樁賊舟果至遇樁不得動發火翎箭射之焚溺死者無算巳而賊勢更熾黼守孤城無日不戰中外援絶賊入與之巷戰知力不敵揮劍叱曰殺我母殺百姓與從子秉昭俱罵賊而死郡民哭聲震元相率具棺葬東門外贈隴西郡公謚忠文詔立廟江州賜額日崇烈張士熙莒人至正中湖口尹有惠政民勒碑頌之明孔復博興人永樂初以御史出知九江府號亷明王銘建安人永樂中知德安縣邑有虎患銘禱於城隍一夕雷擊於縣西之箬山隴求䎦新昌人宣徳中授九江通判禁民淫祀時敕建天池寺督役者擾民民訴於䎦䎦遂躬督之人喜赴工歳歉勸富民出粟以賑民頼全活劉仁宅華容人宣德末知瑞昌縣流民千餘家匿山中邏者索賄不得誣以反衆議加兵仁宅單騎招之民爭出訴遂罷兵擢廣西副使馬驄臨桂人正統中知德化縣甘棠湖隄歲久浸壞驄甃以巨石植柳於隄上以䕶之修葺濓溪祠升工部主事未去卒於官民為葬廬山麓王春嘉定人宏治中知德安縣亷能謹恪百廢具舉嚴緝盜賊境内肅然去之日攀轅者塞道黄源閩縣人正德初知瑞昌縣有介節邑故無城亟請於上鳩工甃築不日落成藍淦閩縣人嘉靖中知湖口縣御史按部至立清亷貪酷四表令屬吏自揣其行立表下衆莫敢措步淦直趨亷字下御史曰藍令之賢不止此當更進一步即以嶺北一人薦之朱公節山隂人嘉靖中知彭澤縣時海寇竊發日閲士卒修城守寇不敢窺先是屯軍雜居境内蔑視縣令公節令每屯按數出一軍束以伍法給之餉使屯小孤并分守縣四門同民兵訓練是後屯軍始就縣官約束俞汝為華亭人隆慶中知德化縣濱江有封郭洲民田其中歲苦水泛汝為築隄數千丈以絶産變價為之不煩公私人享其利宋子恭榮經人萬厯中知彭澤縣蠲無名之征罷非時之役有飲人以藥而攫其財者積十餘年隣里莫能知一日子恭過其門有鴝鵒自樓投袖中子恭異之曰是必有冤一訊即服人以為神謝廷訓晉江人萬厯中知德化縣歲薦饑民相刦廷訓躬至潯關坐待米舫之下水者量其多寡而平糴之時申時行柄國呉商倚為名廷訓并留之以是獲罪去父老號哭相送呉秀呉江人萬厯中知九江府開南薰門建甘棠湖閘開便商河掘老觀塘多所修具舉崔掄奇夏邑人順治中以兵部郎中榷關九江值郡火災出三千金以賑好儒學新濓溪書院復烟水亭搆樓以祀古賢江殷道漢陽人康熙九年知九江府值歲荒捐俸設粥不給請帑銀二萬餘兩米七千餘石以賑存活甚衆甯維邦奉天人康熙二十一年授德化知縣行次潛山聞征滇囘師將過九江維邦疾馳赴任軍士有射殺人者走匿舟中維邦亷得之請置於法自是過者秋毫無犯先是征糧責成里長奸猾乘機侵蝕弊端日滋維邦勒碑永禁民困始甦人物晉周訪本汝南安城人漢末避地江南至訪四世因家尋陽少沈毅果斷元帝渡江以為揚烈將軍屯尋陽鄂陵討斬華軼遂平江州帝以訪為尋陽太守復命與諸軍共征杜􅌢􅌢將張彦陷豫章訪追彦斬之􅌢遣杜宏出海昏湓口騷動訪步上柴桑與賊戰斬首數百賊退保廬陵訪追擊敗之遂奔臨賀進龍驤將軍賜爵尋陽縣侯時荆州賊帥杜曾等聚兵數萬寇害江沔元帝命訪擊之曾大潰遂定漢沔以功遷梁州刺史屯襄陽務農訓卒遠近悦服訪智勇過人為中興名將王敦雖懷逆謀終訪之世未敢為非卒贈征西將軍諡曰壯二子撫光撫厯益州刺史進爵建城縣公光為尋陽太守撫子楚監梁益二州襲爵建城公世在梁益甚得物情陶侃本鄱陽人呉平徙家尋陽早孤貧為縣吏察孝亷除郎中劉宏辟為南蠻長史破襄陽賊張昌封東鄉侯陳敏亂宏以侃為江夏太守所向必破遷武昌太守拜荆州刺史破杜􅌢克長沙王敦忌侃功左轉廣州刺史杜宏等反侃擊破之以功封柴桑侯進征南大將軍都督荆雍益梁州諸軍事領荆州刺史蘇峻作逆侃與温嶠等會石頭督諸軍斬峻封長沙郡公都督交廣寕七州軍事又督江州移鎮武昌西伐樊城平襄陽拜大將軍年七十六薨諡曰桓侃在軍四十一載雄毅有權明悟善斷自南陵至夷陵數千里中路不拾遺尚書梅侃稱其機神明鑒似魏武忠順勤勞似孔明陸抗諸人不及也子十七人瞻為蘇峻所害諡敏悼兄子臻有勇畧智謀咸和中為南郡太守領南蠻校尉臻弟輿果烈善戰以功畧遷武威將軍後與杜􅌢戰被重創卒侃哭之慟贈長沙太守翟湯尋陽人篤行純素仁讓亷潔不屑世事耕而後食人有餽贈雖釡庾無所受永嘉末寇害相繼聞湯名德皆不敢犯司徒王導辟不就隱於縣界南山咸康中征西大將軍庾亮上書薦之徴為國子博士不起康帝復以散騎常侍徵固辭老疾不至年七十三卒於家翟莊湯子少以孝友著遵湯之操不交人物耕而後食端居蓽門歠菽飲水州府禮命及公車徵並不就子矯亦有高操屢辭辟命周虓訪曾孫楚子少有節操厯官梓潼太守寕康初苻堅將楊安寇梓潼虓固守涪城遣步騎送母妻從漢水抵江陵為堅將朱彤邀獲虓遂降安堅欲以為尚書虓不從乃止毎見堅輒箕踞坐後與堅兄子謀襲堅事泄堅引問狀虓曰世荷晉恩生為晉臣死為晉鬼復何問乎堅曰殺之適成其名徙太原竟以病卒子興迎喪謝㓜度上疏表其節雖蘇武不復過贈龍驤將軍益州刺史陶潛侃曾孫少有高趣博學善屬文嘗著五柳先生傳以自况親老家貧起為州祭酒不堪吏職少目自解歸州召主簿不就躬耕自資後為彭澤令郡遣督郵至縣吏白應束帶見之潛曰吾不能為五斗米折腰向鄉里小兒即日解印綬去職賦歸去來辭義熙末徵著作郎不就自以曾祖晉世宰輔耻復屈身後代自宋高祖王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晉氏年號自永初以來唯云甲子而巳卒年六十三世號靖節先生南北朝宋翟法賜矯之子少守家業立室廬山項喪親後便不復還家不食五榖以獸皮及結草為衣雖鄉親中表莫能見焉徵辟一無所就後家人至石室尋求因復遠徙違避徵聘遁迹幽深卒於巖石間梁張孝秀南陽宛人徙居尋陽仕州中從事史遇刺史陳伯之叛孝秀與州中士大夫謀襲之事覺逃入東林伯之得其母郭殺之孝秀遣妻妾入匡山修行學道性通率不好浮華嘗冠榖皮巾躡蒲履手執并閭皮麈尾服寒食散盛冬卧於石上博涉羣書專精釋典普通三年卒隋周羅㬋尋陽人陳宣帝時與齊師周將戰勇冠三軍都督霍州諸軍事平山賊十二峒除右軍將軍始安縣伯賜金銀三千盡散之將士宣帝歎美之晉王伐陳都督巴峽緣江諸軍事陳主被擒上江猶不不晉王遣陳主手書命之羅㬋大臨三日乃降拜上儀同三司煬帝即位漢王諒反詔副楊素討平之陳主卒羅㬋請一臨哭衰絰送至墓所葬還釋服而後入朝世稱其有禮時諒餘黨據絳晉等州詔羅㬋行絳晉吕三州事進兵圍之為流矢所中卒宋夏承皓德安人太宗時上平晉策遷右侍禁契丹南侵承皓由間道發兵與契丹遇戰没河朔褒贈崇儀使子竦厯官樞密使封英國公許祚德化人八世同居長㓜七百八十一口太平興國七年旌其門閭淳化二年本州言祚家春秋嘗乏食詔歲貸米千斛陳兢德安人陳宜都王叔明之後叔明五世孫兼唐右補闕兼生京秘書少監無子以從子褒為嗣褒生灌灌孫伯宣避難泉川註司馬遷史記行於世後游廬山因居德安以著作佐郎召不起宣伯子崇為江州長史益置園田為家法戒子孫擇羣從掌其事建書堂敎誨之僖宗時嘗詔旌其門南唐又為立義門免其徭役崇子衮衮子昉十三世同居長㓜七百口不蓄僕妾上下婣睦人無間言每食必羣坐廣堂未成人者别為一席有犬百餘亦置一槽共食一犬不至羣犬亦皆不食建書樓於别墅延四方之士肄業者多依焉鄉里率化爭訟稀少開寶初平江南知州張齊請仍舊免其徭役昉弟之子鴻兢即鴻之弟淳化元年知州康戩言兢家常苦食不足詔本州每歲貸粟二千石兢死其從父弟旭每歲止受貸粟之半云省嗇而食可及秋成太宗以遠民義聚復能固亷節為之歎息大中祥符四年以旭為江州助敎旭卒弟藴主家事天聖元年又以藴為助敎藴卒弟泰主之泰弟度太子中舍從子延賞可並舉進士為職方員外郎王韶德安人第進士客游陜西訪邊事熙寕元年詣闕上平戎䇿三篇其畧以為西夏可取欲取西夏當先復河湟神宗召問方畧以韶管秦鳳路經畧司機宜文字蕃部俞龍珂在青唐最大韶引數騎直抵其帳諭之龍珂率屬内附帝志復河隴築古渭砦為通遠軍以韶知軍事擊諸羌破之遂城武勝建為鎮洮軍復擊走轄戩降其部落更鎮洮為熙州以熙河洮岷通遠為一路進韶龍圖閣待制知熙州六年取河州連拔宕岷二州曡洮羌酋砦以城附七年入朝聞景思立敗於踏白城賊圍河州韶馳至熙以兵繞出踏白後焚八十帳俘轄戩以獻拜觀文殿學士禮部侍郎召為樞密副使轄戩舊作瞎征今改正王厚韶子少從父兵間暢習羌事官累通直郎紹聖中幹當熙河公事會羌酋轄戩隆贊爭國厚獻議復故地元符元年師下邈川降轄戩次青唐隆贊出迎遂定湟鄯崇寕初朝廷患衆羌扇結命厚安撫洮西遂拔湟州以功進威州團練使熙河經畧安撫三年厚將大軍擊羌大敗之諸酋開鄯州降遂入廓州拜武勝軍節度觀察留後入朝提舉醴泉觀隆贊舊作龍拶今改正連萬夫德安人補將仕郎建炎四年羣賊犯應山萬夫率邑人保山砦賊不能犯寇浪子者以兵至圍之三日卒破之賊知萬夫勇敢有謀欲留為用萬夫怒厲聲罵賊為所害贈右承務郎王阮韶曾孫父彦博靖康勤王有功阮少好學尚氣節辭辨奮發見朱子於考亭朱子大悦之登龍興元年進士時孝宗即位有詔經理建業以圖進取而大臣巽懦幸安計未決阮試禮部對策言之知貢舉范成大讀之歎曰人傑也調都昌主簿移永州敎授獻書請罷呉楚牧馬而積馬於蜀以省綱繹之費歲時分牧之資凡數千言紹興中知濠州日講守備金不敢南侵改撫州韓侂胄宿間阮名將誘以美官夜遣客詣阮阮不答陛對畢拂衣出關侂胄大怒批㫖予祠於是歸廬山盡棄人間事從容觴詠而已王登德安人少讀書喜古兵法慷慨有大志不事生産出制置使孟珙幕府淳祐四年舉進士呉淵爲制置使邊事甚急憶登才畧具書幣招之登至立奇功於沮河趙葵爲制置使見登握手曰景宋一身膽惜相見晚也俾㕘宣撫州兼京西兩節馬光祖爲制置使辟充㕘謀官遷軍器少監京西提點刑獄登威聲目振忌者讒之以是議論不合開慶元年提兵援蜀約日合戰登經理軍事怱絶倒五臟出血而卒顔希孔彭澤人爲縣主簿元師南下取安慶江州希孔率民兵八百人聚舟載石戰於江中飛石四擊敵舟幾敗已而石盡力屈被害元趙復德安人太宗命太子科綽帥師伐宋德安以嘗逆戰其民皆俘戮無遺復掛俘籍以九族俱殘不欲北與姚樞訣欲投水樞曉以徒死無益復强從之先是南北道絶載籍不相通至是復以所記程朱所著諸經傳註盡錄以付樞至燕學子從者百餘人世祖在潛邸嘗召見問曰我欲取宋卿可導之乎對曰宋吾父母國未有引人以伐吾父母者世祖悦因不强之仕楊維中聞復議論始嗜其學乃與樞建太極書院請復講授其中由是許衡郝經劉因皆得其書而尊信之北方知有程朱之學自復始學者稱之日江漢先生科綽舊作闊岀今改正黄澤其先長安人唐末徙資州父儀可隨兄驥子官九江因家焉澤生有異質慨然以明經學道為志好為苦思屢以成疾疾止復思久之如有所見作易春秋二經解二禮祭祀述畧大德中江西省臣聞其名授景星書院山長又為山長於洪之東湖書院學者益衆秩滿辭歸閉門授徒以養親不復言仕呉澄嘗觀其書以為平生所見明經士未嘗有能企及之者戴羽德安人隱居積學徵辟皆不就著武侯通傳三卷史評一卷虞集為之序范士奇江州人累世同居詔表其門劉受二德化人至正間為池州推官張士誠兵起受二戰於城西渡口敗績衆皆逃受二還城死守城陷不屈死之明張羽徳化人從父宦江浙兵阻不得歸與友徐賁卜居呉興領鄉薦為安定書院山長與高啟輩為詩友洪武𥘉徵至京師授太常司丞以事竄嶺表未半道召還知不免投龍江死羽文章精潔有法尤長於詩作畫師小米所著有静居集黃信彭澤人洪武中由太學生擢監察御史有能聲遷廣西按察使尋改湖廣持正不撓官至都察院右副都御史豐慶瑞昌人正統進士景泰中以給事中諫易儲事逮繫詔獄英宗復辟井河南左叅政論周府内官不法帝嘉之擢右布政使黄材德化人天性孝友父病刲股和粥以進父殁後妻見其股瘢始知之王廷翰彭澤人正德十四年宸濠兵掠縣廷翰率鄉兵與賊戰死之丁湛彭澤人嘉靖進士厯禮科給事中疏發嚴嵩罪狀廷杖幾死謫邵武推官累遷浙江副使嵩以舊恨追罪之落職嵩敗遂不復仕歐陽一敬彭澤人嘉靖進士厯刑科給事中劾罷禮部尚書董份遷兵科都給事言廣西總兵不當用勲臣因劾恭順侯呉繼爵罷之以俞大猷代寇入陜西劾總督陳其學巡撫戴才俱奪官又以軍政劾英國公張溶總兵官董一奎等九人不職俱貶斥隆慶初劾大學士高拱專擅宜罷斥巳而陳兵政八事皆議行南京振武營兵由是罷去積患遂除中官吕用等典京營一敬力諫事寢俄擢太常少卿拱再起柄政一敬即日告歸田化龍德化人以材武署南湖營守備進剿永豐賊斬獲甚多賊退伏山林化龍深入被重圍矢盡援絶力戰而死永豐人立廟祀之董四民九江衞世職百户明末總制袁繼咸聞其技勇召致麾下授都司左良玉兵東下四民見事急命其妻史氏妾姚氏並二子先投池登城射殺數人拔刀自刎本朝乾隆四十一年賜諡烈愍徐行可九江衞世襲指揮僉事㓜讀書明大義左良玉兵陷城行可母汪氏投井死妻鄒氏婦陳氏繼之行可大書於屏曰世受國恩合門殉節以報投筆向北自經於望京門城樓一年本朝乾隆四十賜諡烈愍本朝廖士貞徳化人由舉人知四川營山縣逆賊彭時亨陷城被執不屈遇害贈按察使僉事廕一子入監周岱生徳化人由拔貢授貴州餘慶知縣丁内艱服闋知廣西平南縣招撫流民開墾荒蕪又以地不産蔬敎民樹藝康熙十三年呉三桂叛賊將緱成德來攻岱生率鄉兵擊却之踰月復至岱生奮力拒戰賊攻益急死者三十餘人矢且盡入城固守旬日援絶城陷妻楊氏自刎死賊執岱生誘之降大罵不屈遇害長子儒罵賊亦見殺次子儻尋父母兄屍告潯州守上其事僉事贈按察使予祭葬張孺子湖口人同父刈蘆於洲有虎突至攫其父孺子追及之以杖連擊虎首砰然有聲遂脱父難療治而愈劉鎮寶彭澤人給事中堂子康熙庚子舉人授雲南烏蒙通判雍正八年逆蠻為亂鎮寶不屈遇害贈按察使僉事予祭葬廖介德化人孝行著聞乾隆年間旌陳奉兹德化人乾隆進士由知縣厯安徽江寕江蘇布政使勞心庶務政肅風清曽任建昌道往來西藏開誠布信所至多感化之在江寕時值徐屬水潰獨捐俸亷遣吏散給灾黎卒於官入祀鄉賢祠文德翼瑞昌人崇楨進士司理嘉興平反得釋者甚多持法不避權貴值國變遠遯歙之商山研究經史著述極富入祀鄉賢祠劉曉彭澤人少負志節國朝定鼎曉挾策行間佐參帷幄由宜章令遷永寕知州從將軍傅宏烈進剿呉逆有功授平樂知府攻拔賀縣殺賊萬計晉參議旋加監軍道進剿蠻苗以勿掠勿擄為戒西人德之建祠祀焉因病乞休卒於家入祀鄉賢祠流寓南北朝宋周續之建昌人入廬山事沙門慧遠時彭城劉遺民遁迹廬山陶淵明亦不應徵命謂之尋陽三隱宗炳涅陽人高祖辟為主簿不起乃入廬山就釋慧遠考尋文義兄臧為南平太守逼與俱還雷次宗南昌人少入廬山事沙門慧遠篤志好學尤明毛詩隱退不交世務齊宗測炳之孫永明三年徵太子舍人不就遂往廬山止祖舊宅魚復侯子響為江州厚遣贈遺測曰少有狂疾尋山採藥遠來至此量腹而進松术度形而衣薜蘿淡然巳足豈容當此横施建武二年徴為司徒主簿不就梁劉慧斐彭城人為梁安成王法曹行參軍嘗途經尋陽游匡山過處士張孝秀相得甚懽遂有終焉之志因不仕居東林寺又於山北搆園一所號曰離垢園人謂為離垢先生唐李白成紀人安祿山反轉側宿松匡廬間未王璘辟為府僚佐璘起兵逃還彭澤璘敗當誅郭子儀請解官以贖有詔長流夜郎會赦還潯陽坐事下獄宋若思將兵赴河南道潯陽釋囚辟為參謀未幾辭職元結河南人天寶末兵興嘗家瀼濱自稱浪士蕭存穎士子建中初遷比部郎中疾裴延齡之奸棄官隱廬山卒韓愈少為存所知自袁州還過存廬山故居而諸子前死惟一女在為經贍其家宋楊徽之浦城人常肄業於潯陽廬山周惇頣營道人熙寕中知南康軍因家廬山蓮花峯下前有溪合於湓口因取營道所居濓溪以名之陳瓘沙縣人徽宗時復承事郎卜居江州復有譖之者至不許輒岀城張所青州人高宗時言黄潛善奸邪不可用恐害新政乃罷御史謫鳯州團練副使江州安置王庶慶陽人紹興中御史中丞勾龍如淵劾庶本趙鼎所薦欺君罔上庶罷歸至九江被命奪職徙家居焉元趙汸休寕人聞九江黃澤有學術往從之游澤之學以精思自悟為主其敎人引而不發汸一再登門乃得六經疑義千餘條以歸已復往留二歳得口授六十四卦大義與春秋之要明桑喬揚州人官御史嘉靖間謫九江居廬山北林隱菴所著有廬山紀事列女晉陶侃母湛氏尋陽人侃就學母紡績資給侃為尋陽吏監魚梁以鮓一罌遺母母不啟視遺書責之曰爾為史以官物遺我是増吾憂也范逵來寓宿時大雪母出所卧薪薦剉以秣其馬又密截髪供殽饈逵聞之太息曰非是母不能生此子侃後以忠正為名臣陶潛妻翟氏尋陽人能安苦節與潛同志夫耕於前妻鋤於後明劉相妻黃氏德化人相為諸生迎父喪於臨清哀毁死柩至家黄觸頭流血欲以死殉時年二十一形毀骨立衰絰十餘年事繼姑益謹姑殁殯葬盡禮閨門肅然雖處貧苦而怨聲不聞人皆賢之張仲偉妻周氏名端秀湖口人年十九歸張生子一歲夫亡舅姑以家貧子㓜欲奪其志周曰願為張氏鬼不作他人妻守節三十年鄉里敬重之王守邦妻陶氏彭澤人年二十夫暴亡翁痛其子越宿亦亡陶歎曰吾死姑何依乃營葬夫豫虛其右以示同穴孀居二十餘年事姑盡孝人無閒言計偉妻劉氏名玉蘭彭澤人年十八適偉五載夫亡哀痛嘔血不食而卒余孝繡湖口余志通女年十八家貧未受聘正德七年為流賊所刦投河死又有諶烓妻失其姓烓為湖南巡司吏妻與二女居流賊突至欲汚之三人罵不絶口俱被支解而死曹鉦妻徐氏湖口人年十七夫死有富民厚聘求之徐沐浴更衣自縊死衞廷珪妻孫氏呉縣人隨夫商販寓潯陽小江口宸濠陷九江夫適他往所親急邀孫共逃孫謂兩女金蓮玉蓮曰我輩異鄉人汝父不在逃將安之女曰生死不相離要當為父全此身耳於是母女共一長繩自束赴河死同時有九江衛李溥妹年十五未字賊至投井死孫光啟妻黄氏湖口人年十七歸孫七月而夫亡遺腹四月其父以家貧欲奪其節遂引刀截耳絶食七日後生子夢陽補弟子員萬厯八年旌朱貞女德化人年十六許字勞欽亮未嫁夫亡女奔喪自縊合葬南薫門外萬厯九年旌王佳傳妻歐陽氏彭澤人事姑至孝夫亡氏年十八撫遺腹子紡績爲生父母欲嫁之乃鍼刺其額爲誓死守節字用宇黔涅之深入膚裏里人稱爲黑頭節婦朱元初妻吕氏德化人嘗刲股救姑疾夫病又刲股進之亦愈三乳生六子人謂孝德所致馮士一妻丁氏彭澤人嫁踰年而寡止遺一女哀毁欲死以姑老强起姑病刲股和藥及姑殁女嫁氏曰吾事畢矣竟觸夫墓死其女葬之去馮墓數十步冢上木枝悉向夫墓呉氏女名四貞湖口人崇禎初許聘周氏未嫁其夫不得於繼母欲罷婚女聞之赴水死黄開先妻李氏德化人事舅姑孝撫前妻子如巳出左良玉兵至李誓不辱赴金魚池死同縣舉人萬有年妻毛氏被執不辱賊裂其尸繆用中妻陳氏廖士貞祖母王氏後母萬氏妻史氏朱召亷妻金氏並二女一婢俱自縊死朱景賢妻張氏德化人通經傳事舅姑孝左良玉兵陷城積薪自焚死同縣楊氏南贛總兵徐必達妻聞夫戰死石陽之螺山即投繯以殉李氏女年十六許聘黄氏未嫁夫亡誓不再適為賊所執引頸受戮魏光宇妻陳氏同婦孫氏投井死萬堯化妻樊氏德安人為賊兵所掠不從斫胸死文華衮妻何氏瑞昌人遇闖賊敗兵欲汚之罵賊死汪應祥妻沈氏湖口人左良玉兵至應祥負母走氏自經死姪女年十三亦死其旁王秉陽妻洪氏彭澤人避地陶潭鄉左良玉兵掠之厲罵被殺本朝鄧之元妻孫氏瑞昌人順治五年金聲桓叛氏為賊兵所掠憤罵被殺王娥德化人王屠女值火延燒其家屠醉卧娥年僅十二奔烈焰中呼之不醒遂共死周岱生妻楊氏德化人隨夫在平南康熙十三年賊陷平南岱生被執楊從之罵賊不絶口行至桂平和墟社自剄死經厯董英瘞之後次子儻收其骨歸葬事聞贈宜人桂登琛妻孫氏徳安人年十九將嫁而登琛殁孫泣請奔喪父母不可遂持服矢節一日其姊歸諷以他適厲聲答曰人各有志母多言服闋自經死事聞旌表劉焜妻高氏德化人年二十五夫亡矢志守節祖姑年老不能食高日以乳進閲數載祖姑貌若嬰兒年九十二乃卒敎四子俱成立岳繼忠妻湯氏德化人夫亡守節同縣萬昭妻黄氏邢繼楷妻馮氏呉繼珖妻張氏孫纘穎妻廖氏黄鉞妻王氏萬朝璽妻繆氏黄士熹妻陳氏陳文漋妻龔氏饒士銓妻羅氏汪文昇妻楊氏烈婦吕瑞瑚妻凌氏均乾隆年間旌鄔顯秀妻曹氏德安人年十七嬪於鄔氏二十五顯秀亡遺子甫一齡姑七十有一氏守節自矢養姑以終天年敎子克有成立壽八十有五同縣熊學源妻廖氏鄧瑞子妻張氏閔柱妻劉氏李仲生妻羅氏鄒霖妻戴氏鄒上選妻熊氏烈婦李繁明妻徐氏均乾隆年間旌熊士駒妻李氏瑞昌人年十七歸熊六載夫殁誓以死殉時祖姑在堂舅姑止之氏敬事祖姑與翁姑克盡婦職敎子祥繩列庠序年七十七卒同縣范以璋妻黄氏楊亶生妻余氏周加位妻桂氏向登庸妻胡氏董愛山妻王氏陳應孚妻郭氏陳以旗妻胡氏李加甄妻周氏張宋業妻鄧氏李大羣妻蔡氏李時序妻陳氏聶主寛妻熊氏呉洪彬妻陳氏曹之權妻周氏周正趙妻陳氏文存洛妻楊氏朱宗魯妻陳氏周定尚妻鄒氏烈婦劉尚義妻何氏貞女朱漋甸未婚妻陳氏周洪未婚妻盧氏均乾隆年間旌江正任妻饒氏湖口人年二十喪夫遺孤三歲翁姑無倚氏上事下敎守節六十餘年同縣王為伊妻曹氏周召西妻呉氏楊永祿妻呉氏蕭瓚玉妻余氏楊以悦妻張氏周立逢妾丁氏屈家俐妻江氏崔仕甲妻呉氏沈文著妻曹氏譚文煥妻余氏周學臣妻柳氏段澳淇妻梅氏烈婦殷懷昇妻徐氏余廷賢妻段氏余繼椿妻曹氏沈萬里妻梅氏周儼妻彭氏方云來妻沈氏王鄭氏曹瑞毛妻許氏烈女沈道銈未婚妻柳氏均乾隆年間旌湯基元妻歐陽氏彭澤人年二十一夫亡越七月子鍾繼始生撫孤子奉舅姑厯五十年如一日同縣歐陽垓妻張氏歐陽瑜妻汪氏柯在楊妻屠氏許自洪妻歐陽氏項秉芳妻汪氏丁名忠妻柯氏諶煥妻歐陽氏方學龍妻項氏烈婦胡文光妾江氏胡瑞節妾王氏均乾隆年間旌項之綱妻李氏德化人夫亡守節同縣黄步鰲妻鄒氏邢廷珍妻陳氏烈婦李運貴妻朱氏貞女蔡辨佳未婚妻駱氏均嘉慶年間旌陳明顯妻尤氏德安人夫亡守節同縣鄭立豪妻王氏鄭立棟妻閔氏徐中濬妻聶氏廪生羅克紱妻鄧氏烈婦洪楊氏貞女汪際輝未婚妻熊氏烈女邱妹均嘉慶年間旌何平夀妻徐氏瑞昌人夫亡守節同縣周彭繡妻楊氏周宜也妻王氏馮信儒妻陳氏陶粤風妻萬氏均嘉慶年間旌張拱妻潘氏湖口人夫亡守節同縣曹本萃妻楊氏曹繼慶妻饒氏楊嵐妻崔氏貞女曹繼賢未婚妻沈氏均嘉慶年間旌李萬檉妻宗氏彭澤人夫亡守節同縣烈婦程令儀妻朱氏貞女項琮璡未婚妻洪氏均嘉慶年間旌仙釋晉董奉侯官人居廬山太乙觀為人治病不取錢愈者使栽杏數年得十餘