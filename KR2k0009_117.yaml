兼崇文院檢討獻大寳箴預修册府元龜遷右正言充龍圖閣待制數有建白厯諫議大夫兼秘書監同修國史國史成遷工部侍郎參知政事彭年性敏給博聞强記所得俸賜唯市書籍所著文集百卷唐紀四十卷江白建昌人景徳進士父禹錫有節義高年不仕躬自教授大中祥符初獻東封詩十五篇有詔嘉美賜粟帛歲時存問及卒白自鄞尉罷還負土營葬廬於墓側藜羮芒屩晝夜號泣終制猶然事聞詔賜粟帛瞿肅建昌軍人四世同居家百五十口長幼孝弟鄉人化之眞宗時旌表李覯南城人親老以教授自資學者嘗數百人皇祐初范文正公薦為試太學助教上明堂定制圖召為說書著有周禮致太平論平土書禮論熙寕中門人鄧潤甫上其退居類稿官其子參魯郊社齋郎曾鞏易占子少警敏援筆成文歐陽修一見竒之登嘉祐進士厯知齊襄洪福明亳滄諸州所在多竒績拜中書舎人卒鞏性孝友父亡事繼母益至撫四弟九妹於委廢單弱之中宦學婚娶一出其力為文原本六經斟酌於司馬遷韓愈一時作者莫能過也後追諡文定所著有續元豐類稿四十卷傳世曽肇鞏弟舉進士元祐中厯中書舎人吏部侍郎屢有讜言徽宗即位遷翰林學士崇寕初落職安置汀州卒自熙寕以來四十年大臣更用事邪正相傾軋肇身更其間數不合兄布在相位移書切告謂當引用善人以杜章惇蔡卞復起之萌布不能從卒不免肇天資仁厚而容貌端嚴自少力學博覽經傳為文温潤有法更十一州類多善政紹興初諡文昭所著有曲阜集四十卷西掖集十二卷内則五十卷外則三十卷曽叔卿鞏族兄家苦貧一介不取妻子困於饑寒而拊庇孤􅑏唯恐失其意起家進士至著作佐郎鄧潤甫建昌人皇祐進士熙寕中遷翰林學士哲宗立惟潤甫在院一夕草制二十有二修神宗實録以母喪去終制除禮部尚書章惇議重謫吕大防劉摯潤甫不以為然曰俟見上當力爭無何暴卒諡安惠何坦廣昌人淳熙進士知將樂縣擢連州所至以善治聞屢遷廣東提刑亷平為嶺南之冠卒諡文定所著有西疇常見百川學海陳宗禮南豐人淳熙進士累官參知政事以直言清節著卒贈旴江郡公諡文定王無咎南城人嘉祐進士為天台令棄官從王安石游好書力學寒暑行役不少釋學者歸之常數百人吕南公南城人熙寕中試禮闈不遇築室灌園益著書借史筆以褒善貶惡以衮斧名所居齋元祐初曽肇疏稱其讀書為文不事俗學安貧守道志希古人堪充師表科廷議欲命以官末及而卒遺文曰灌園先生集朱京南豐人父軾有隱德京博學淹貫登進土甲科神宗朝擢監察御史風神峻整見者憚之目為眞御史李涓南豐人知鄂州崇陽縣靖康之難募兵六百勤王或靖徐之涓曰事急矣當持一信報天子為東南倡出家錢買牛酒犒軍衆感泣卽日引而東北至蔡州大與敵遇血戰死焉曽怘鞏孫補太學内舎生官通判温州須次於越建炎初金人陷越怘被執辭氣不屈金盡驅其家屬四十口同日殺之越南門外肇孫悟宣和進士靖康閒為亳州士曹金人破亳悟被執抗詞嫚罵衆刃劘之妻奴同日被害張大經南城人紹興進士知龍泉儀眞俱有善政召拜御史言諸路荒政不實飛蝗順多願加恐懼申飭大臣又言民力竭而愁歎多軍士貧而怨嗟衆願疏出憸腐抑絶倖門以通奉大夫致仕人方之孔戣包恢建昌人嘉定進士為光澤主簿平寇亂教授建寕監虎翼軍募土豪討唐石之寇改沿海制置司幹官歲饑盜起金壇溧陽閒恢部諸將誅夷之通判台州討温寇景定初擢禮部侍郎尋為中書舎人林希逸奏恢守法奉公其心如水後為刑部尚書僉樞宻院事封南城縣侯蕭雷龍新城人景定進士通判衢州權知府事元兵薄城下不降脫還建昌與里人黄巡檢起兵為縣尹劉聖仲所獲死之呉楚材南城人德祐元年建昌降楚材糾集民兵自領村率衆將攻城甫至近郊之龜湖北兵三道蹴之進攻領村楚材失利且乏援衆多解去走光澤為人所執及其子應登以獻呉浚為江西制置招討使斬楚材父子傳首諸邑益王立贈朝奉郎卽邵武境上立廟賜名忠勇元程鉅夫名文海避武宗諱以字行其先自徽州從家建昌世祖召見竒之屢遷集賢直學士奏陳五事又請興建國學搜訪遺逸帝嘉納之奉詔求賢於江南薦趙孟頫等二十餘人帝皆擢用僧格專政鉅夫上疏極諫累官翰林學士承㫖致仕卒進封楚國公諡文憲僧格舊作桑哥今改正黃覺經南城人五歲因亂失母稍長誓必求母所在渡江涉淮行乞而往衝冐風雪備厯艱苦於汝州梁縣得其母以歸有司請旌其閭明魏源南城人永樂進士官御史多建白宣德時由浙江按察副史擢刑部右侍郎拜尚書出理宣府大同邊務易將卒增亭障實軍伍邊備大飭稱一時能臣何文淵廣昌人永樂進士授御史厯按山東四川時烏蒙奸民什伽告其知府禄詔謀逆詔發軍討文淵檄止所調軍白其誣英宗北狩起爲吏部侍郎額森請迎車駕還京廷議不決文淵曰此事雖十上章不得請不巳草奏詣闕力請鑾輿南還進本部尚書額森舊作也先今改正鄧棨南城人永樂進士授御史巡按蘇松有聲宣宗從父老請再巡一年以才望超擢陜西按察使召拜右副都御史正統十四年從帝北狩没於土木贈右都御史諡襄敏謝定住廣昌人性至孝年十二母抱幼子覔牛遇虎定住奮前擊之虎逸去扶母行虎復追嚙母頸再擊之去行數武虎嚙母右足定住取石亂擊虎乃舍去母子三人並全成祖特召見嘉奬賜旌其門何喬新廣昌人景泰進士宏治中厯官刑部右侍郎劉吉等忌喬新剛正出為南京刑部尚書拜疏乞歸博綜羣籍聞異書輒借抄積三萬餘帙皆手校讐著𫐠甚富尤篤濓洛之學與人寡合氣節友彭紹學問友邱濬而巳卒賜諡文肅所著有宋元史臆見周禮集註策府羣玉續編勲賢琬炎集椒邱集五世孫源嘉靖進士累官吏部侍郎濤嘉靖鄕薦第一篤行博學與兄源弟沆齊名人稱何氏三鳳張昇南城人成化進士及第授修撰宏治中遷庶子劉吉當國昇因天變厯數其納賄縱子等十罪厯禮部尚書遇災異輒進直言正德初劉瑾竊柄昇謝病歸卒諡文僖所著有柏崖文集十四卷詩集二十二卷和唐詩十卷行世羅玘南城人成化末領京闈鄉試第一舉進士授編修臺諫以救劉遜盡下獄玘言當優容以全國體正徳初遷南京太常劉瑾亂政李東陽依違其閒玘為東陽所舉士貽書責以大義且請削門生籍累擢南京吏部右侍郎遇事嚴謹僚屬畏憚考績赴都遂致仕宸濠慕其名遣使餽玘避之深山及叛玘巳病馳書守臣約討賊木舉而卒學者稱圭峯先生所著有類說及圭峯奏議圭峯文集行世黎崇南城人居父喪哀禮兼至及葬結廬墓側三年不櫛沐免喪猶縞衣糲食與同縣潘烈新城余永壽皆以孝行重於鄉國何垕新城人宏治進士曾祖澄仁宗時以學行推擇與楊溥共直文淵閣垕與鄭康等五六人夙夜淬厲為克已愼獨之學窮年不出山母卒廬墓三年宏治中厯官戸部員外郎劉瑾聞垕有古琴欲得之垕曰琴非所惜毀吾行耳竟不與乃出為程番知府境内苗獠雜居垕善撫綏所著有易經諸解夏良勝南城人正德中舉鄕試第一成進士為考功員外郎流賊方熾條上用兵便宜及有詔南廵具疏極言禍患且至廷杖除名世宗立復官大禮議起數偕僚長力爭及張璁等超擢又連章執不可為議禮者切齒謫茶陵知州尋黜為民戍遼東三萬衛卒穆宗立贈太常卿羅汝芳南城人嘉靖進士除太湖知縣召諸生論學公事多決於講坐厯寕國知府民兄弟爭產汝芳對之泣民亦泣訟乃巳創開元㑹罪囚亦令聽講後遷雲南參政為嚴嵩所惡劾罷初汝芳從永新顔鈞學後鈞繫獄汝芳供養獄中鬻產救之得減戍汝芳罷官鈞亦赦歸事之飲食必躬進人皆以為難鄧元錫南城人博覽經史喪父水漿不入口年十七行社倉法惠其鄉人從羅汝芳游嘉靖中舉於郷復從鄒守益劉邦采劉陽諸宿儒論學學者稱潛谷先生先後論薦不赴萬厯中詔以翰林待詔徵之甫離家而卒元錫之學雖本於王守仁而不盡宗其說時心學盛行元錫力排之所著五經緯函史上下編明書並行於世李經綸南豐人覃精經籍作詩教考禮經類編王守仁湛若水兩家之學盛行經綸申程朱之意作衛道錄及大學稽中傳譚青南豐人永樂甲申下詔求賢編修朱紘以青應詔除旌德知縣四年𫐠職京師吏都課最書上擢工科給事命往江淮復奏稱旨旌德父老望青轍不返詣闕請留詔還青旌德以内秩徃久之無事乃退再調龍陽卒祀旌徳名宦黄釗南豐人舉嘉靖戊子鄉試授廣州通判廣多盜釗虚平訊察一無枉濫有劇盜以重賄營脫釗論如法東莞寇起郡邑震動指揮督兵扞捕兵敗乃委罪縣尉巡檢釗力爭曰指揮世享國祿職主征伐遇寇輒奔遁自保反委罪下吏乎得不罪調判萊州末幾報罷歸休周朝瑞南城人萬厯中爲給事中泰昌初以愼初三要諫忤旨降級天啟初復官首疏沈㴶爲邪黨後同楊漣左光斗以忤魏璫備受慘酷斃獄崇禎初追贈太僕卿諡忠毅著有兩朝奏議呉煥南城人八世同居天啟中旌表鄧思銘南城諸生聞李自成陷京師集其儕數十人爲庠兵朔望習射學技擊圖報國仇及南都陷益王舉兵建昌召致幕下城陷死之本朝乾隆四十一年入祀鄉賢祠張紹登南城人萬厯丁酉舉人崇禎中爲應城知縣賊來犯偕訓導張國勲力却之賊復來攻紹登力守乞援上司副將鄒祖禹來救賊乘間登南城紹登還署端坐堂上賊大至被殺本朝乾隆四十一年賜諡烈愍湯來賀南豐人崇禎進士司理揚州以亷著歲饑設賑全活萬計興平伯高傑淫毒州民來賀設竒計擒之擢主事出爲粤東海道海寇羅亞福聚衆數萬勢强甚縶其父數年來賀曰罪人不孥顧及其父耶釋之三日亞福降累官兵部侍郎兼巡撫告歸卒入祀鄉賢祠蕭漢南豐人崇禎進士知鍾祥縣不徇請謁武備修舉十五年冬將入覲聞襄陽陷慨然請上官罷行賊薄城漢辭家廟設帨於妻媵曰男死忠女當死節佐巡撫宋一鶴拒賊殺傷甚衆元旦突圍謁獻陵賊騎環之漢大呼鍾祥令在此若革不得侵陵寢賊挾之去送吉祥寺令僧謹視之漢覔死具不得於僧榻得剃刀自剄詔贈大理寺丞本朝乾隆四十一年賜諡忠烈劉大年崇禎進士授兵部主事奉使南京還道厯城城破遂抗節死贈光祿少卿本朝乾隆四十一年賜諡節愍黃端伯新城人崇禎進士福王立授儀制主事南京潰有勸入山隱空門者答曰臨難無苟免藉口釋氏以偷生耶及被繫獄中作明夷錄臨刑一卒左刃之手戰慄而退又一卒右刃復然端伯曰須先刺我心頭始可斷從之乃絕本朝乾隆四十一年賜諡烈愍本朝黃熙南豐人順治進士居父喪三年疏食不入内室奉母居山砦母殁忽所居延燎熙撫棺大慟願以身同燼俄而風返人以為純孝所感黃汝榜南豐人順治丙戌歲貢生授徒十里外暮必歸省母不入内辛卯教諭臨川僅數月盡以所得俸金贖祭田歸祠先是其祖釗嘗捐俸贖田人以為祖孫繼美云梅遇南城人順治中為奉新教諭土寇攻城今皇遽失措遇代督民兵登陴固守飛礮及左右傷數人不為懼寇退城全擢知陜西郿縣縣經兵燹後田半荒蕪遇力請上官奏減逋賦開古横渠四十里漑田皆成沃壤終叙永同知魯瑗新城人康熙進士授檢䚯典試山西稱得士為國子司業時集諸生講論娓娓不倦累升右通政致仕主教豫章書院平生無疾言遽色人自不敢干以私學者稱西村先生梅之珩南城人康熙進士厯官少詹事當閩逆搆亂躪及建郡之珩奉父母避兵窮谷豫儲糗脯以奉啜蕨自給通籍之後屢司文衡所得皆名士一時有知人之目趙師璟南豐人順治甲午貢於鄉豐邑虛糧絶丁莫可究詰致里長恒破家鬻妻孥死囹圄者纍纍相隨屬璟為請命有司集紳士正直者討其弊源創立彚戸法糧始有實數可稽丁始有定名可指飛詭絶弊邑人如去湯火人祀鄉賢祠趙希階南豐人康熙丙午舉於鄉授公安令守下屬縣索例金階曰書生安得剝民以媚上吾不忍為也邑濱江苦盜階下車悉得其黨羽淵藪掩捕皆服辜斗湖決户口流亡相地築月隄亙四里捍之雨晴祈禱應如響百姓稱神焉任滿致政歸魏方泰廣昌人康熙進士厯官禮部侍郎三歲喪母曰夜號泣不止家人竒之及長嘗以不得奉母為恨言及輒泣下康熙五十四年以右通政督運西陲軍糧進秩禮部踰年致仕歸厚恤貧乏鄉人德之湯椿年南豐人孝行著聞乾隆年間旌甘京南豐諸生時邑荒且苦寇京出力免荒稅均賦役賑饑民平砦寇皆得行其志京文原本經術著述甚富入祀鄉賢祠鄒昌祺南豐人順治鄉舉恥事干謁有影占其產者弗與爭嫠婦為虛糧累不得巳改適竭財賑之耿逆變焚僇慘甚賊相戒勿毀其垣入祀鄉賢祠李長祚南豐人康熙進土知衡山縣修學宫創文峯書院舊令於賦役外加派雜費倍正供長祚申請禁革勒碑以示乆逺調溆浦行李蕭然告歸卒入祀鄕賢祠譚尚忠南豐人乾隆辛未進士授户部主事累官山西安徽雲南巡撫内召為刑部吏部侍郎矢志清勤秉性孝友教民取士具有實心卒於官入祀鄉賢祠流寓宋李綱邵武人欽宗時以綱專主戰議喪師費財授保靜軍節度副使建昌軍安置呉潛寕國人泰定十年進士第一開慶時特進左丞相先是元兵渡江賈似道在漢陽御史饒應子請移之黃州似道以為潛欲殺已銜之令御史沈炎劾潛措置無方落職謫建昌軍陳蒙咸淳間為太府寺主簿嘗入對極言似道為相國政闕失後為淮東總領似道誣以貪汙安置於建昌軍籍錄其家列女宋謝泌妻侯氏南豐人家貧事姑孝謹盜起姑疾篤不能去侯號泣姑側盜刃之仆溝中賊退漸甦後姑與夫俱亡子幼艾母欲嫁之侯曰吾守貧以養子雖餓死亦命也樂氏二女南豐人紹定二年盜入境將逼之一赴水死一見殺元曾闓妻李氏南豐人夫亡守節至元中峒寇猝至翁遇害李奔窖中賊引之岀罵賊受刃而死曾粉娘南豐曾塔卿女年十八值紅巾賊掠之去至呉家坊橋仆地大罵曰我良家女子豈從汝耶賊怒殺之揭貞女廣昌人早失父母同兄嫂避亂山中倉皇相失獨抱兄子竄身荆棘中為邏卒所獲誘之不可遂受刃死明甯顔孫妻危氏南城人夫亡時年二十七誓不二志翁姑老而子幼氏勤紡績以資養姑殁營葬盡禮守節四十四年洪武中旌羅撝妻胡氏南豐人撝官南充陸路先行胡舟覆抱楫浮沈舟人手援輒引去遂死焉越二旬夫至溺所祭之屍出自舟旁容體不變趙從顯妻熊氏南豐人年二十四而寡斷指自誓撫孤及長娶李氏甫得孫而子卒李氏與姑並居一室有慮其連孀勸之他適者李氏哭益哀遂盲所撫三歲孤旣長復先兩節婦卒所娶婦符氏復寡年二十七子方二歲當是時一孤免三寡婦人益危之符氏曰苦節三世是呱呱者而不予卑乎事姑及大姑益謹隆慶初旌趙從傅妻李氏南豐人年二十二夫亡長子三歲幼甫四月有强嫁之者輿及門李氏始知時方炊卽以釡中糜沃其首首爛髪盡脫輿夫皆反走後愈遂秃里人無不知趙氏有光頭節婦者馮紹綱妻盧氏南豐人年二十寡矢志守節姑將嫁之盧氏趨夫墓所縊死高宏妻揭氏廣昌人宏卒於建昌喪歸揭迎之朝夕哀哭屢絶而甦月餘自縊事聞旌表黄繪妻饒氏南城人事繼姑盡孝年二十七夫亡遺孤半歲亦卒有富家附其賢欲娶之饒斷髮自誓守節終身何永孚妻李氏廣昌人年十四于歸越二年永孚死柩前設木橙坐而哭橙爲之刓姑病朝夕祝告請以身代旣殁哀慟嘔血死張文孺妻劉氏南城人年二十六夫亡姻戚憐其子幼家貧咸勸改適劉朝夕號泣喪明守節三十餘年正統中旌張世昌妻劉氏廣昌人年十九于歸生二子俱卒世昌病二年不起劉侍湯藥不離左右世昌卒劉拔髪納於棺中誓不改節卒踐言奏開旌表何本容妻聶氏廣昌人年十六于歸本容病聶割股救治不效卒守節終身劉敏妻揭氏廣昌人年十六于歸閱七月敏疾革囑揭改適揭號泣曰脫有不幸當相從於地下但念公姑垂老妾當誓死無他敏亡孝養舅姑尋舅卒夫之姊夫窺鬻產之利百計圖改其操揭忿詈欲自經操執益勵事聞旌表謝勝華妻朱氏南豐人年二十六夫卒子幼家貧躬織絍以養老姑厯艱危不少變姑殁號泣喪明正統中旌邱宏妻儲氏南豐人正德中流寇猝至宏卧疾度不能免自投於池儲牽衣隨夫溺死同縣李楽妻曾氏為賊所執投崖死李惟廣女貴姑罵賊被磔死黃鵾妻李氏廣昌人正德中為流寇所執欲辱之罵曰我儒家婦欲殺卽殺豈從汝耶復持其子刦之李不顧賊遂刃之胡泰妻趙氏南豐人正德中寇至與妯娌符庻姑鮑同奉姑陳避難溪口坪陳老病相持不忍去遇賊驅之趙罵賊被殺符及鮑皆投水死魏寵妻何氏廣昌人年二十五夫亡守節正德中寇至何攜幼子走母家遇賊掠之義不受汚賊奪子刃之何遂投水死劉祥妻黄氏廣昌人年十八于歸家貧紡績供養老姑半載祥卒黃事姑益謹里豪聶姓慕其色私賄父姑受聘黃度不免赴水死李氏二女南城人長名銀瑛次名玉瑛嘉靖中寇起見他婦為賊所掠並赴水死呉宗澄妻傅氏南豐人嘉靖中流寇逼荷石砦將破傅拜告於夫投崖而死同時有呉氏女名友弟亦投崖死鄧氏雙節婦新城鄧塤母徐氏年二十三而寡守節撫孤塤長娶王氏嘉靖中閩寇入境掠二婦至水尾洲欲殺徐以逼王二人相持痛哭罵賊而死縣立雙節祠以表之胡汝棡妻曽氏南豐人事姑至孝年二十二夫亡夫兄欲奪其志赴水死毛貞女南城人許字何中徳未嫁而中徳死女趨赴執喪遂留事姑姑殁不食死劉三善妻胡氏南城人早寡守節舅姑將嫁之自縊死何貞女南城人許字馮時行時行死何年十四毀容易服母諒其志遣歸馮氏會母殁何慟曰末亡人忍死者懼傷母心耳母巳殁矣奚生焉遂不食死揭廷才妻傅氏廣昌人年十七于歸夫亡哀慟欲殉姑曰吾老且肓爾死安能獨生乃止姑病刺血和湯以進及姑殁遂絶粒七日而卒徐汝寛妻唐氏廣昌人年十七于歸未幾汝寛疾將終執手與訣唐曰母憂君特先數武耳殮葬畢自縊死本朝饒子鼎妻李氏廣昌人年十六歸饒生一女夫殁將葬囑匠作一虛穴姑以年耄女少諭之乃不死越六年姑殁女復夭遂自刎王夢蘭聘妻張氏南城人未嫁而夢蘭卒張赴弔遂從王氏守貞奉姑終身盛鍾琦妻李氏南城人夫殁哀毀自盡順治十二年旌葉調元妻傅氏南城人未嫁而調元客死喪歸傅泣告父母往弔痛夫無兄弟乃留養姑守節五十年康熙六十年旌湯大勲妻李氏南豐人幼聰敏通毛詩内則年二十六夫亡居常衣布茹蔬而延師課子必極豐潔康熙六十年旌揭斯䄔妻呉氏南豐人年二十一夫亡撫遺腹子事舅姑至孝一日歸母家忽心動恐舅姑有變急歸明日舅果卒里有為債家所逼鬻妻以償者呉脫簪釧保全之守節三十載雍正四年旌譚易妻符氏南豐人易善屬文屢冠童子軍而不售卒時符年始二十八長子四齡幼子甫晬符氏夜課子不為姑息毎襲拾夫遺文祭則出之輒拊卷悲哀至課孫猶末巳屏左道絶鉛華貞靜之操聞於里閈雍正四年旌楊大􆈨妻鄧氏南城人舉人鄧炅女歸楊六年夫亡遺腹一子城時舅姑俱殁東明官舎會耿精忠叛南北道梗閒關扶櫬歸撫幼叔同所生丙辰竄居山砦賊攻危急盡出簪珥裂尺帛裹置兩免袖閒書其上曰取此活兩免命自懷利刃坐井欄上砦破擬自裁幸保無恙年八十餘以壽終城復早隕妻涂氏事孀姑極孝遺腹生一子尚鑾舉於鄕均雍正七年旌易鴻岸妻徐氏南城人年二十三而寡翁死閩中徐拮据歸其柩喪葬如禮撫遺腹子守志四十四年饒典妻梅氏南城人年十九夫亡撫孤守節及子夭猶撫兩孫苦節五十二年雍正八年旌馮宗岱妻胡氏新城人年二十七夫亡守節事舅姑以孝聞兄銓知范縣數以書招甥胡令勿往且貽兄書勸以潔已愛民四子俱夭撫孫成立守節五十年雍正八年旌梅國棟妻鄧氏南城人幼淑慧能讀曲禮女火諸書事舅姑孝謹雍正甲辰國棟赴公車客死河南鄧聞訃呼搶不欲生念夫柩未歸一子羸弱暫起食拮据迎夫柩營葬畢作遺囑累千言而卒李巽妻胡氏南豐人年二十六夫亡家貧冬夜織紝以供姑膳姑病扶掖摩撫常達旦苦節三十六年李偉妻封氏南豐人年十八歸偉值閩寇亂避斗門砦賊帥踞城肆掠逼開砦門氏懼辱與李四兒妻沈氏李士先妻包氏俱投崖死范揚先妻王氏南城人夫亡守節同縣余淇妻錢氏江士華妻呉氏傅鈞妻崔氏陶度妻高氏高淮妻王氏梅溶妻黄氏李標妻余氏黃登選妻羅氏邱甘望妻傅氏李國鼎妻黄氏劉秉乾妻徐氏周君任妻劉氏黄其芳妻李氏邵曰鵬妻龔氏胡文藻妻呉氏劉艮妻黄氏王聖瑞妻余氏李杜吟妻王氏劉錫佩妻陶氏梅廷任妻周氏陶應麟妻倪氏呉之璜妻萬氏陶治安妻劉氏黃朝棟妻李氏梅善卿妻羅氏楊日酥妻羅氏歐陽士俊妻崔氏胡君贊妻阮氏鄧儆妻林氏李占甲妻陶氏羅良璧妻曾氏周維瑜妻王氏劉士實妾熊氏曾邵妻丁氏王元祜妻閻氏楊炳妻王氏鄢君能妻崔氏汪紹宸妻黃氏危九疇妻王氏鄧觀逵妻雷氏崔琮妻蔡氏胡學禹妻王氏朱輪妻黃氏鄧蘭妻朱氏全夢聖妻徐氏劉希式妻王氏姚俶妻林氏丁僎妻章氏張鴻業妻黄氏余來元妻黃氏曾勣妻趙氏丁箕山妻許氏廖庭雋妻呉氏雷厚也妻楊氏梅輝如妾鈕氏陶䕫妻丁氏劉孔章妻程氏羅朝宗妻徐氏呉魯瞻妻鄧氏呉元勲妻夏氏謝恩妻毛氏羅興詩妻黄氏曹天祐妻劉氏烈婦周維藩妻呉氏邱惟邠妻黃氏聞斌妻程氏均乾隆年間旌李士照妻封氏南豐人夫亡守節同縣李天植妻鄒氏余兆球妻羅氏劉宣妻李氏余允愚妻劉氏湯大垣妻劉氏生員劉嘉沐妻李氏李軾妻劉氏鄧鳳儀妻唐氏李邦彦妻胡氏傅濂妻趙氏廿監二妻呉氏湯民懷妻譚氏趙與鳧妻湯氏趙與迅妻胡氏劉尚衡妻饒氏趙與勲妻鄧氏謝紹琪妻盧氏李良義妻曽氏李邦彬妻張氏趙孟諮妻張氏趙宜福妻許氏唐家釗妻甘氏黄振榮妻聶氏甘邦壽妻羅氏趙蔚南妻胡氏譚廷柱妻趙氏趙宜抃妻胡氏劉易妻李氏趙宜霈妻黃氏監生聶有蔚妻李氏劉應泰妻高氏危良燦妻黎氏曾孕慶妻彭氏劉茂順妻戴氏李鳳誥妻黄氏聶時禧妻唐氏周傅景妻杜氏湯廷鼎妻呉氏傅聖睿妻包氏趙湘妻黄氏傅高竒妻趙氏謝方舟妻熊氏程藹妻李氏曾塾詔妻揭氏曾文燈妻湯氏曾章旬妻陳氏徐嘉經妻湯氏鄒秉乾妻姚氏邱良佑妻儲氏陳嘉政妻張氏譚自伯妻趙氏揭士妻胡氏甘夢洪妻林氏楊家罕妻黄氏呉夢麟妻李氏周裔洪妻饒氏何曰欽妻湯氏彭元龍妻梅氏黄應綬妻湯氏揭承懋妻謝氏鄧盛旭妻趙氏蕭珮璜妻林氏張士鉅妻王氏陳廷綬妻平氏平兹鍇妻李氏湯朝楫妻譚氏黄尚行妻彭氏李宏嵩妻曾氏唐致三妻趙氏張日斗妻呉氏黄邦驤妻曾氏周學秀妻陳氏譚必發妻甘氏熊士黌妾馮氏魯廷璧妻朱氏江大昇妻李氏陳以忠妻李氏杜繼凱妻潘氏譚尚恕妻潘氏趙宜棟妻嚴氏烈婦劉夢松妻李氏江勝章妻李氏貞女趙氏均乾隆年間旌鄧全縉妻楊氏新城人幼孝父母旣歸全縉考舅姑不數年而寡抱幼兒避兵亂蒙難堅貞卒完其節同縣朱大紳妻魯氏魯津妻楊氏魯鐸妻涂氏黄有瑗妻饒氏魯福妻鄧氏魯宁妻潘氏黄國言妻程氏楊大業妻黃氏余世隆妻鄧氏鄧在憲妻黄氏鄧侯汝妻孔氏鄧鍾䕫