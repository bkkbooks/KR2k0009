值黃巾屠破之餘洪收撫離叛百姓復安三國魏胡質夀春人太祖時遷征東將軍假節都督青徐諸軍事廣農積榖有兼年之儲置東征臺且佃且守又通渠諸郡利舟楫嚴設備以待敵海邊無事性沈實內察不以其節檢物所在見思及卒家無餘財惟有賜衣書篋而已孫觀泰山人青州刺史從征孫權於濡須口為流矢所中力戰不顧太祖勞之曰將軍被創深重而猛氣益奮不當為國愛身乎轉振威將軍創甚遂卒司馬朗溫人太祖時遷兗州刺史政化大行百姓稱之雖在軍旅常粗衣惡食儉以率下雅好人倫典籍後征吳至居巢卒州人追思之王凌祁人文帝時為兗州刺史討孫權有功遷青州時海濱乘喪亂之後法度未整凌布政施教賞善罰惡甚有綱紀百姓稱之鍾育長杜人正光中淮南既平為青州刺史以治績見稱州泰南陽人為兗州刺史時諸葛誕反吳遣文欽等救之朱異率三萬人為文欽增勢泰拒異於陽淵追戰破之晉魯芝扶風人魏常道鄉公時遷監青州諸軍事武帝踐阼以芝清忠履正素無居宅使軍兵作屋五十間衛瓘安邑人武帝時轉征東將軍青州刺史加征東大將軍青州牧所在皆有政績胡威夀春人質子武帝時拜青州刺史帝謂威曰卿與父孰清對曰臣不如也臣父清恐人知臣清恐人不知是臣不及父遠也劉演魏昌人太尉琨之兄子琨將討石勒以演領兗州刺史鎮廩邱演斬王桑走趙固得衆七千人為石勒所攻演拒戰勒退元帝拜為都督荀羡臨潁人穆帝時監青州諸軍事領兗州刺史慕容蘭以數萬衆屯汴羡自洸水引汶通渠至於東阿征之遂斬蘭帝將封之固辭不受謝幼度陽夏人孝武時苻堅強盛朝廷求鎮禦者謝安舉幼度拜建武將軍兗州刺史連敗堅軍復遣監軍劉襲攻堅兗州刺史張崇於鄄城走之又進攻廣固降堅青州討㝏拜兗海沂密節度使時新建府軍士多獷驁沛明示法制搜閲以時軍政大治烏重允張掖人穆宗時為天平軍節度使善撫士與下同甘苦待官屬有禮當時名士如溫造石洪皆在幕府既沒士二十餘人刲股以祭崔宏禮博陵人穆宗時為天平軍節度使纍以破賊功加檢校尚書左僕射薛平龍門人穆宗時詔分淄青齊登萊五州為平盧軍徙平為節度使王庭湊闈棣州詔平出援平遣將率兵往救因饋餉不足衆潰平悉帑資募卒掩賊降餘黨引謀亂者二十人斬堂皇下脅從者皆縱還田里威鎮一方在鎮六年徭役均平寶厯初入朝民障路願留數日得出令狐楚宜州人敬宗時為天平軍節度使始鄆帥每至以州錢二百萬入私藏楚獨辭不受又毁李師古園檻僭制者久之徙節河東召為吏部尚書王承元薊人太和五年徙平盧淄青節度使始鹽禁未嘗行兩河承元請歸有司由是兗鄆諸鎮皆知奉法承元資性仁裕所至愛利殷侑陳州人文帝時為天平軍節度使自李師道亂賊入盡為軍資侑以餉軍有贏當上送官裁制經費嵗以錢十五萬緡栗五萬石歸有司柳仲郢京兆人咸通五年為天平軍節度使尚氣義不奏祥瑞不度浮屠摘貪吏濟單弱嵗凶必貸匱蠲負里無逋家薛崇僖宗時為天平軍節度使黃巢寇兗州崇與賊戰不克死之曹全晸中和間為天平軍節度使韓簡寇鄆州全晸死之五代周符彥卿宛邱人初鎮兗州改鎮鄆州又為天平軍節度使以寬惠得人心李榖汝陰人世宗時河大決齊鄆發十數州丁壯塞之命榖領護刻期就功宋沈繼宗太康人太宗時使京東計度財賦濮州土貢銀課民織造不折省稅鄆州節度配屬縣納藥物皆為民病繼宗歸厯言於上除其弊李惟清章邱人太宗時為京東轉運使會募丁壯為義軍惟清曰若是天下不耕矣三上疏諫由是獨選河北而餘路悉罷陳若拙盧龍人淳化中河決鄆州擢京東轉運使發卒塞王陵口又於齊州浚導水勢設隄於采金山奏免六州所料梢木五百萬民甚便之柴成務濟陰人淳化二年為京東轉運使會宋州河決成務上言河水所經地肥饒願免其租稅勸民種藝從之陳知微高郵人真宗時為京東轉運副使不務皎察嘗奏還東平監所侵民田六百八十家又決古廣濟河以通運道榮諲任城人真宗時為京東轉運使萊陽産銀砂民有私採者事露安撫使欲論以劫盜諲曰山澤之利人得有之貸免甚衆張錫漢陽人仁宗時為京東轉運使淄青徐濮鄆諸州人冒耕河壖地數起爭訟錫命籍其地收租絹嵗二十餘萬訟者亦息李璋上黨人仁宗時為天平軍節度使徙曹州觀察使帝書忠孝李璋字並祕書圖籍賜之吕居簡河南人慶厯中提點京東刑獄時夏竦有憾於石介介死竦言於上曰介未嘗死北走鄰國矣遣中使發棺驗之居簡曰介死必有親族門生會葬令結狀保證以聞事乃白徐州妖人孔直溫挾左道誘軍士為變居簡究黨與貸詿誤斬直溫等濮州復叛居簡獲首惡誅之因大閲兵享勞姦不得發陳希亮眉州人嘉祐中遷京東轉運使大猾有號截道虎者捕流海島徐州守暴苛以細過籍民産獲小盜使自誣抵希亮言其狀廢去楊日嚴河南人為京東轉運使會青徐飢日嚴請江淮陜西轉粟五十萬以賑貧民又開清河八十里培河隄起倉廪以便漕運趙滋開封人為京東東路都巡檢乳山寨兵叛殺巡檢滋馳入其壘次第推問得黨與百餘人付獄衆莫敢動在京東五年數獲盜不自言安撫使富弼奏之乃超授供備庫副使王舉元真定人為京東轉運使沙門島多流人守吏顧貨槖陰殺之舉元請立監以較賞罰自是全活者甚衆向子韶開封人神宗時京東轉運副使屬郡郭奉世進萬緡羡餘戶部聶昌請賞之以勸天下子韶劾奉世且言近臣首開聚斂之端漸不可長士論韙之馬默城武人神宗時提點京東刑獄性剛嚴疾惡部吏望風投檄金鄉令以賄著其父方執政貽書曰馬公素剛汝有過將不免令悉取不義之物焚撤之王居卿萊陽人神宗時提舉京東刑獄鹽鐵判官改京東轉運使青州河貫城中居卿即城上立飛梁設樓櫓下建門以時啓閉水患以息鮮于侁閬州人神宗時為京東西路轉運使河決澶淵議欲勿塞侁言夏秋雨淫猶溢而害若縱大河注其中民為魚矣作議河書上之哲宗立復使京東司馬光言於朝曰以侁之賢不宜使居外顧齊魯之區凋敝已極須侁往救之安得如侁百輩布列天下乎士民聞其重臨如見慈父母金趙鑑章邱人山東東路轉運副使行臺宰相欲以故宋宦者權都水監鑑曰誤國閹豎汴人視為寇讐付以美官將失人望遂不用天德初起為濟州刺史楊伯淵藁城人山東東路轉運使正隆末羣盜蜂起州縣往往罹害獨濟南賴伯淵保全伊拉益明安人承安時為山東西路轉運使有敕使按行山東益奏乞止令調於近甸何必驚遠方耳目書聞上命有司治使者罪伊拉益舊作移刺益明安舊作猛安今俱改正承暉章宗時為山東路統軍使時山東盜起潛匿泰山巖穴間按察使請發數萬人刋除林木承暉奏曰山不可赭齊人易勤驅之入山必有凍餓失所之患此誨盜非止盜也議遂寢璞薩安貞蒙古人貞祐二年除山東路統軍安撫使益都縣人楊安兒聚黨劫掠萊州徐汝賢登州耿格皆以城降遂僭號改元陷寧海攻濰密等州縣據穆陵關欲取益都安貞以璞薩留嘉完顔額倫為左右翼軍昌邑東徐汝賢以衆十萬來拒轉戰三十里殺獲不可勝計至萊賊大敗復萊州斬徐汝賢安兒脫身走乘舟入海舟人擊之墜水死三年殺黨與劉二祖等前後擊獲以萬計遷樞密副使四年餘黨復擾山東安貞遣兵討殺九萬人降者三萬餘賊首郝定僅以身免衆皆安慰復業璞薩安貞舊作僕散安貞薩留嘉舊作僕散留家完顔額倫舊作完顔訛論今俱改正完顔弼明安人貞祐中山東西路宣撫副使時劉二祖餘黨保濟南勒子堌弼遣人招之皆降元兵圍東平弼百計應戰久之解去弼愛民省費軍民無相訟有古良將風元石圭新泰人太祖時山東諸路都元帥領兵破曹與金將連戰數晝夜馬仆被擒囚至汴金主壯其為人誘以名爵圭奮然曰吾身仕大朝官居光祿復能受封他國耶怡然就死色不變其麾下立社兗州祀焉嚴實長清人太宗時授東平路行軍萬戶破濮曹楚邱定陶上黨約東將士戒勿屠掠全活者衆嚴忠濟實之第二子也太宗時襲東平路行軍萬戶管民長官開府布政一法其父養老尊賢興學造士治為諸道第一齊榮顯聊城人從嚴實入朝授東平路總管府參議兼博州防禦使時攻淮顯詣南道出東平民間供給費銀二萬錠榮斷事官訴之得折兑賦稅民賴以不困宋子貞長子人金末率衆歸東平行臺嚴實招置幕府用為詳議官兼提舉學校時飢民北徙子貞多方賑救全活數萬人金士之流寓者悉引見周給且薦用之故東平人材多於他鎮太宗命為行臺右司郎中行臺所統五十餘城子貞命官分三道糾察官吏始有綱紀東平將校占民為部曲戶謂之腳塞擅其賦役幾四百所子貞請罷歸州縣人以為便實卒子忠濟請於朝授參議東平府事兼提舉太常禮樂子貞作新廟樂延致生徒每季程試必親臨之齊魯儒風為之一變薩克蘇回鶻人世祖時為山東行省都督民乏牛具為之上聞驗民丁力官給之統軍韶布哈田遊無度元帥伊蘇岱爾據民田為牧地薩克蘇隨事奏聞山東屢歉為請發粟賑恤蠲租東人刻石頌德薩克蘇舊作撒吉思韶布哈舊作抄不花伊蘇岱爾舊作野連答爾今俱改正達爾瑪高昌人除濟寧路總管興學勸農百廢俱修元統三年遷山東廉訪使時山東盜起白晝殺掠達爾瑪以為官吏貪汚所致先劾去之而後上擒賊方略朝廷嘉納之即遣兵擒獲齊魯以安達爾瑪舊作答里麻今改正王玉汝鄆人初為東平行臺令史夏津災奏請復其民一嵗朝廷將以東平地分封諸勳貴玉汝奏不可事得寢纍官兗州觀察使董文炳藁城人中統二年李璮平山東猶未靖以文炳為山東東路經略使至益都留兵於外從數騎入居府不設警衛召璮故將吏曰天子使經略使撫汝得便宜除將吏汝等勉取金銀符使不敢格上命所部大悅山東以安董文用藁城人中統八年授山東東西道巡行勸農使山東自經兵燹野多曠土文用巡行勸勵無間幽僻入登州境見其墾闢有方以郡守伊拉瑪為能作詩表異之於是列郡咸勸地利畢興五年之間政績為天下勸農使之最伊拉瑪舊作移刺某今改正姚樞柳城人世祖時立十道宣撫使以樞使東平既至郡置勸農檢察二人以監之推物力以均賦役罷鐵官王磐永年人中統時拜益都等路宣撫副使以疾免居青州李璮謀不軌磐馳入京師以聞世祖嘉其誠節撫勞甚厚命磐參議東平行臺事璮平召拜翰林直學士徐世隆西華人中統十四年為山東提刑按察使時有妖言獄所司逮捕凡數百人世隆剖析詿誤者十八九悉縱遣之張德輝交城人世祖時為東平路宣慰使春旱禱泰山而雨奏免遠輸豆粟二十萬斛和糶粟十萬斛孀婦馬氏將鬻其女以納逋賦分已俸代償之仍蠲其額張惠新繁人至元元年行省山東以銀贖俘囚三百餘家為民其不能歸者使為僧建寺居之李璮之亂民被軍士虜掠者甚衆惠至大括軍中悉縱之又奏選良吏去冗官以蘇民困胡祗遹武安人至元時為濟寧路總管上八事於樞府升為山東東西道提刑按察使所至抑豪右扶寡弱敦教化厲士風民有父子兄弟相訟者必諭以天倫之重不獲已則繩以法何榮祖廣平人成宗時為山東東西道按察使時宣慰使樂實姚演開膠州海道糧舶遇暴風多漂沒實等督諸漕卒償之榜掠慘毒自殺者相繼榮祖即草辭以奏詔免其徵吳鼎燕人大德十一年山東諸郡飢詔鼎往賑之朝議發粟四萬石鈔折米一萬石鼎謂同使者曰民得鈔將何從易米不如仍與之米同使者曰朝議已定恐不可復得鼎曰人命豈不重於米耶言於朝得所請張升平州人天厯初出為山東道廉訪使時方有警有司請完城以為備升曰民恃我以生完城是棄民也由是民皆安之蓋苗元城人至正時為山東廉訪副使益都淄萊地舊稱産金朝廷建一府六所綜其事民嵗買金以輸官至是六十年矣民有忤其官長意輒謂所居有金礦掘地及泉而後止猾吏為姦利莫敢誰何苗建言罷之為山東廉訪使民飢為盜所在羣聚乃上救荒弭盜十二事劾宣慰使骫骳不法者有司援例欲徵苗所得職田苗曰年荒民困吾無以救尚忍徴斂以肥已耶輒命巳之同僚皆無敢取太平京兆鄠人順帝時為淮南行省左丞相兼知行樞密院事總制諸軍駐於濟寧時諸軍久出糧餉苦不繼太平命有司給牛具以種麥自濟寧達於海州民不擾而兵賴以濟布顔布哈蒙古人山東宣慰使轉平章行省守禦益都明兵壓境捍城自戰城陷不屈死之布顔布哈舊作普顔不花今改正申榮順帝時平章山東行省守東昌榮見列郡皆降告其父曰兒不能全忠孝有一死報國耳遂自經張俊順帝時為山東行樞密知院性沉靜有智謀善用兵明兵取益都俊悉力拒守城破攜妻子投井死于德文順帝時為山東宣慰使副使明兵取益都城破德文與僉事齊都皆不屈而死明安然穎州人洪武初為山東中書省參知政事立心平正撫綏勤勞祿止養身餘給公用後遷御史大夫陳迪宣城人洪武中為山東布政司參政捕蝗弭盜民甚德之鐵鉉鄧州人建文初為山東布政司參政燕兵起李景隆駐兵德州鉉督餉未嘗乏缺景隆軍敗南奔鉉固守濟南既而𬒳圍相持不下令軍民詐降開城門候成祖入急下鐵板幾中比戰令軍士噪罵成祖大怒攻三月不克乃去以東昌之捷升右布政使尋進兵部尚書燕師渡江鉉屯淮上兵潰成祖即位執之至反背坐廷中嫚罵令其一回顧終不可遂磔於市時年三十七陳士啓泰和人永樂中為山東右參政每事盡心不察察為明不苛急責效行部督徭賦期不峻事集而民不擾段民武進人永樂間山東妖婦唐賽兒作亂三司官以縱寇誅以民為山東布政司參政下車敷宣德意整飭紀綱撫綏殘氓剗革宿弊時索唐賽兒甚急逮天下尼媪幾萬人民力為矜宥人情始安王質泰和人正統初為山東右布政使廉勤果毅人服其公尤以清譽聞張驥安化人正統間以大理少卿巡撫山東值嵗大飢設法賑救全活甚衆嘗請奏復曹州治薦知縣范希正為知州希正後為良吏山東設巡撫自驥始東人至今稱之年富懷遠人正統間以副都御史巡撫山東廉靜寡欲遇事敢為按行諸郡官吏畏服姦豪屏迹東昌多夷人頑獷弗率富奏徙之南方境內大治薛瑄河津人正統間為山東提學僉事揭白鹿洞學規開示學者延見諸生親為講解雖片長不忍棄其黜汰者必追其所入廪由是士莫不奮盛時望無錫人成化間巡撫山東旱飢時望露禱於天大雨霑溉稿禾復蘇乃舉救荒之政既賑餘粟百餘萬石又推行九則法於諸府斥貪暴表忠良除苛政民心翕然歸之馬諒和州人正統間山東布政司左參議民有惑於後妻欲置子於法諒諭父母曰爾子凶德乃吾屬教令之失非由爾之罪父母感悟請釋還為孝子郭觀武進人正統間巡按山東首劾三司正佐三四人郡邑庶僚以貪墨去者甚衆疑獄積嵗未決者悉為剖斷王宇祥符人天順間為山東石布政使時屢嵗不登民皆流移上以璽書諭宇安撫之宇盡心賑濟民賴全活林總寧德人天順初以左僉都御史出賑山東發粟三十五萬餘石銀錢鈔布各巨萬計活飢民百四十五萬給牛種者亦數萬復奏蠲流田租二十餘萬民困以蘇張鑑南充人成化間以右僉都御史巡撫山東悃愊無華而持行高潔居官砥節首公務去民害見田多荒蕪上墾闢事宜請除其宿負優復三年又請流民還者官給田契牛種因命兼督理營田山東巡撫之兼督理營田者自鑑始牟俸巴縣人成化間以副都御史巡撫山東值嵗大飢經理賑濟全活數萬人大小清河湮塞建議修濬民大稱便陳善成化間為山東按察司副使於是張秋屢扼於運河之衝甚為民患善令民治隄壘石東岸十二里盡南旺湖西岸八十里盡沙河以達臨清植柳數百萬株隄以益固許進靈寶人成化間以監察御史巡按山東剛正嚴肅貪汚望風解組減長清等縣鹽船閘夫革濟寧等處濫設夫役賑恤飢荒平反獄囚劉大夏華容人宏治初河決張秋命大夏以右副都御史往治於孫家渡四府營築長隄亘三百六十里又修築黃陵岡及張秋沙灣水乃大治工巨而費甚省由是漕運無虞居民免患王霽上海人宏治時以右僉都御史巡撫山東嵗旱大飢屢疏乞免漕糧臨清閘稅請改徴米濟賑先後發米二百七十六萬石銀三十七萬四千兩有奇活飢民二百六十三萬餘人流移復業者萬三千八百餘戶楊茂元鄞人宏治中為山東按察副使河決張秋上命中官李興等往治茂元奏言中官恣橫外戚擅權宜專任都御史劉大夏召興還朝忤旨逮繫父老遮道乞還不聽趙璜安福人正德七年以右僉都御史巡撫山東時民困於盜璜區畫科徭公私便焉有河壖地數百里號膏腴璜募流民使墾而除其租番僧乞徵以充齋糧帝已許之璜上書立爭得免曲阜為賊殘破璜請移縣就闕里從之姚鏌慈溪人正德時為山東左布政使居官不以家纍自隨與隸皆得出入寢所守藏吏以羡金四千進鏌正色叱之武宗巡幸鏌舟誤觸帝舟左右以告帝棄知鏌材略笑曰是髯翁也釋之黃瓚儀徵人正德間以都御史巡撫山東節用賑恤值武宗南巡調度有方民以不擾孫燧餘姚人任山東按察使明習法律獨持憲體朝命三司按歸善王慮有他擬檄兵為防燧毅然往不終朝而獄具許逵固始人正德間為山東按察使僉事整飭武定兵備時流賊勢盛終不敢入其境薑洪廣德人正德初任山東左布政使時流賊猖獗洪飭兵繕守民恃無擾王相光州人正德間以監察御史巡按山東入境訪除民蠧摘伏如神按臨清捕豪官稔惡者數輩付於法為朱安所誣逮繫吏民擁轍號泣朱節山陰人嘉靖二年以監察御史巡按山東時兵旱相仍礦賊竊發節親率軍士搜捕盡絶以勞疾卒於官陳沂鄞人嘉靖間遷山東左參政按視沂莒滕費諸州縣察其災傷為發帑市牛給民墾藝寬其租又蠲除種馬還木諸徭民獲蘇息嘗遇張璁於德州璁謂曰行當召公沂謝曰齊民困甚苟行沂恤災之疏勝受德也王世貞太倉人嘉靖中山東兵備副使青州多豪民巨盜有司不能制世貞集強壯教之射嚴行保甲又於州邑畫地為界使義官統之定捕盜賞罰之格於顔神鎮築城為衛行之期年盜盡解散趙彥膚施人天啓間巡撫山東值妖寇徐鴻儒作亂陷鄒滕諸州縣彥討平之東省獲安勞永嘉石門人崇禎初為山東按察使時新城陷永嘉急檄州縣繕城郭備器械衆志以固論保障功轉布政使時兵火逃亡呼庚轉急永嘉調度有方餉得不絶擢登萊巡撫蔡懋德崑山人崇禎時守濟南道進按察使持讞平允獄訟衰息徐從治海鹽人崇禎間以右副都御史巡撫山東登州陷與登萊巡撫謝璉同入萊州固守多方備禦中樞惑於浮議命主事張國臣往撫賊從治三上疏力言賊不可撫狀不報閲兵城上為飛炮擊死鄧謙孝感人崇禎時官山東兵備道濟南城潰謙戰於城上與季父有徵同死母莫氏亦不食死贈光祿丞又鹽運使灌陽唐世熊亦死之張秉文桐城人崇禎初為山東布政使濟南圍急秉文與巡按宋學洙等分門死守晝夜不解甲城破偕其妻方氏妾陳氏投水死贈太常寺卿宋學洙長洲人崇禎時巡按山東大兵南下學洙方巡章邱聞警疾馳入濟南曰此省會地藩封在焉守備單弱乃爾吾死是城必矣兵薄城下學洙守南門城破死之本朝徐大用奉天人初任萊州守秩滿即以參議道分守萊州順治十年膠州總兵官海時行素驕蹇奉調南征大用監其軍時行嗾兵為逆逼大用同入海太用不從遂遇害施閏章宣城人順治十三年任提學僉事以名教自任開講明湖之上東省士風為之丕變祖澤溥奉天人順治十八年總督山東土寇于七聚衆據棲霞之鋸齒牙山官兵莫敢入澤溥身先士卒一日之內克其三寨賊衆悉降乃相度機宜分兵戍守登萊悉平蔣國柱奉天人順治十八年以副都御史巡撫山東自明季重斂之餘糧有包荒役有雜派國柱一切奏除之民困以蘇郎永清正黃旗漢軍初任東昌道值禁旅南征東昌為水陸衝要輸挽特繁永清多方調度兵民無不輯協厯官布按二司康熙二十五年官至本省巡撫在東省四十年頗著勞績靳輔鑲黃旗漢軍康熙十六年以兵部尚書總督河道時駱馬湖水勢橫決運船商舟皆罹其害輔請開新河以避其險其效頗驗著有治河書卒賜祭葬諡文襄入祀賢良祠徐旭齡錢塘人康熙二十二年巡撫山東甫下車劾貪墨數人吏治肅清禁漕糧收兑之弊革河夫僉派之擾豪猾望風斂迹卒賜祭葬諡清獻宋犖商邱人康熙二十六年任山東按察使東省命案最繁率多輕生犖令州縣驗實立案必究及唆訟之人盡法繩之刁風頓息嵗歉運家粟以助賑東人德之佛倫正白旗滿洲人康熙二十八年巡撫山東時東省吏治頗有因循佛倫整綱飭紀肅然一變張鵬翮遂寧人康熙三十九年任河道總督節浮冒汰冗員恤工役經理河道者十年境內多沐其惠卒賜祭葬諡文端入祀賢良祠張伯行儀封人康熙四十二年任濟寧河道操履清徑以不欺為本所著居濟一得十卷凡疏濬宣泄之宜古今同異之辨討論詳備司河務者每資考鏡焉卒賜祭葬諡清恪趙申季武進人康熙四十五年提督山東學政清廉謹恪苞苴請託皆不至其門校文必親自點勘夜漏非三下不休體素羸竟以疾卒於官黃叔琳大興人康熙四十八年提督山東學政修復濟南之白雪青州之松林兩書院又拔諸生之尤者入書院督課之遷去後士民祀之於松林書院以次宋賢王曽等十三人之後陳鵬年長沙人康熙六十年任河道總督時武陟口屢決鵬年親詣河干立風雪中兼工築岸工竣竟以勞卒於官賜祭葬諡恪勤入祀賢良祠嵇曾筠無錫人雍正五年以河南副總河兼管東省河工七年總督河道除曹單徭河陋規核定運河夫役工食需用土方以取土近遠估定工價人皆便之卒賜祭葬諡文敏入祀賢良祠和舜武鑲藍旗滿洲人嘉慶二十年任山東布政使整飭吏治頗洽輿情二十三年擢巡撫疏請勒限清釐積案分别勸懲章程卒賜祭葬諡恭慎提調官前總纂臣鄭紹謙恭纂并覆輯校對官臣李孚忠恭校大清一統志濟南府在山東省治東西距三百六十里南北距二百八十里東至青州府臨淄縣界二百五十里西至東昌府高唐州界一百十里南至泰安府泰安縣界一百四十里北至武定府商河縣界一百四十里東南至青州府博山縣界二百三十里西南至東昌府茌平縣界一百三十里東北至武定府惠民縣界一百八十里西北至直隸河間府景州界三百里自府治至京師八百里分野天文虛危分野元枵之次建置沿革禹貢青州之域周為齊地秦屬齊郡漢初分置濟南郡文帝十六年為濟南國西南境為濟北國西北境為平原郡東南境為千乘郡地景帝二年國除為郡後漢建武十五年復為濟南國三國屬魏晉曰濟南郡宋元嘉九年僑置冀州北境屬魏後魏皇興三年改曰齊州隋開皇初郡廢大業初改為齊郡唐武德元年復曰齊州二年置總管府貞觀元年府罷七年又置都督府天寶初改曰臨淄郡五年復曰齊郡乾元初復曰齊州屬河南道唐書方鎮表乾寧二年置武肅軍防禦使天復元年罷五代因之宋初曰齊州濟南郡治平二年置興德軍節度政和六年升為濟南府屬京東東路宋史地理志至道三年屬京東路熙寧七年分屬