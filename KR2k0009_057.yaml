長清至厯城皆濟水故道其在濟陽齊東者漯水故道也今謂之鹽河水經注濟水徑平陰城西右迤為湄湖又東北至垣苗城西河水自泗瀆口東北流注之又東北與湄溝合又徑盧縣故城北又徑什城北又過盧縣北東北與中川水合又東北右會玉水又東北濼水注之謂之濼口又東北徑華不注山又東北徑臺縣巨合水注之又東北徑臺縣北又東北合芹溝水又東北過菅縣南通典東平以東有水流經濟南淄川北海界中入海者謂之清河蓋汶水菏澤之合流非古時之濟水也齊乘自巨野北出至四瀆津與河合流者乃齊之清河水經所謂得其通稱者是也胡渭禹貢錐指齊乘以大清河為古濟水小清河劉豫所創志家皆沿其説黃子鴻非之曰以水經注元和志寰宇記諸書考之濟水最南漯水在中河水最北今小清河所經自厯城以東如章邱鄒平長山新城高苑博興樂安諸縣皆古濟水所行而大清河所經自厯城以上至東阿固皆濟水故道自厯城東北如濟陽齊東青城諸縣則皆古漯水所行蒲臺以北則故河水所經蓋宋時河嘗行漯瀆及河去則大清河兼行河漯二瀆其小清河所行則斷為濟水故道也自與漯水合而清河之名遂被於漯據水經漯水徑著縣故城南著即今濟陽而縣南有大清河是知大清河即漯其水自厯城入濟陽乃近世所決非唐清河入海之故道也濟陽之流日盛則章邱之流日微故劉豫堰濼水使東以益之其所行者實濟水故道而志家反以濟陽之大清河為古濟舛謬殊甚然大清河自厯城入濟陽及濱州以東入海之道不知決於何年意者宋神宗時河嘗合北清河入海始開此道其後金明昌五年河復由此入海久而後去流益深廣此大清河所以浩浩而小清河所以屢濬屢塞也歟運河自東昌府恩縣流徑直隸故城南東北流復入德州西南新窯口北流經德州城西又東北流經德州北之桑園鎮入直隸吳橋縣界即古清河也本隋之永濟渠一名衛河又名御河桑欽水經清河自武城棗強者徑廣川故城南又東北徑厯城故城南又東北與張甲屯洚故瀆合又至修縣元和志永濟渠在縣西去縣十里明統紀永樂十年宋禮言德州西北衛河東北岸至舊黃河十三里可開小引河合泄水入舊黃河至海豐大沽河入海從之山東通志明宏治中都御史白昂於德州之南四女寺鑿文河至九龍口入古黃河歸海本朝康熙四十四年即於四女寺建減水閘雍正四年改為滾水壩九年復挑濬支河而宋禮所開引河湮廢已久衛河屢患漲溢十三年巡撫嶽濬請於德州之北哨馬營開濬支河東行至漕村隄口入鉤盤河東北流會老黃河入海即於哨馬營建滾水石壩水漲則泄之歸海又以德州城西牆垣正當衛河之衝乃於衛河西岸自馬家回溜起至舊月河頭别開引河南北長二百六十餘丈其舊河建有攔水壩使水勢全歸引河徑趨哨馬營於是州城藉以鞏固又乾隆二十八年於運河西方菴對岸濬引河四百九十餘丈南自魏家莊後接運河起北至老隄頭入運河二十九年復加疏濬其四女寺支河及滾水壩亦並加濬築焉乾隆十三年十六年二十一年二十七年巡幸經此俱有高宗純皇帝御製運河詩淯河在章邱縣東一里亦曰繡江其源即百脈水也水經注百脈水出土鼓縣故城西水源方百步百泉俱出故謂之百脈水西北流徑陽邱縣故城中又西北出城又北徑黃巾固又北注濟元和志百脈水出亭山縣東北平地寰宇記百脈水在縣北百步闊三丈經縣界屈曲六十里入濟齊乘百脈水即繡江也合麻灣水東北流徑章邱城東又北入小清河舊志百脈水在縣南三十里明水鎮西麻灣在其右三里其側即淨明泉東麻灣在百脈左百餘步皆瓜漏河所伏流而復出者四泉合而北流合淯河又北至縣城東為繡江又西北至水寨合白雲湖又北入小清有淯口鎮瓜漏河在章邱縣西南七里源出縣西南百里山峪中東北至明社莊之石崖泊然而止土人名其處為滲水灣自灣以北二十里至於月宫枯河崖側有泉一泓又東北四十里至於明水則湧百派麻灣諸泉夏秋積雨羣峪之水來匯溢於城南五里會於淯河既霽則枯涸如故故曰漏河獺河在章邱縣東北七里即古楊渚溝也水經注楊渚溝水徑於陵城西南西北徑土鼓城東又西北徑章邱城東又北徑寧城西而北流注濟寰宇記楊渚水一名獺河在縣東十里闊一丈出逢陵故城西南二十里齊乘在縣東七里出長白山之王村峪舊志西北流至柳塘口經小清河故道入鄒平長山新城界會孝婦河東流入海後人訛獺為漯謂即古之漯水誤白條溝河在鄒平縣東七里即古魚子溝也魏書地形志東魏郡安陽有魚溝水經魚子溝水南出長白山東柳泉口流徑於陵故城西北流注於瀧水明史河渠志永樂九年浚鄒平縣白條溝三十餘里濟南府志嘉靖九年知縣葉林重濬本朝康熙二十八年知縣程素期復行疏治引入小清河按縣志白條溝河源有二一出鑑埠一出楊隄合流於漯河一名魚子溝與水經注南出長白山西北流注瀧水之文不合齊乘以沙河為魚子溝與志亦不合並存俟考沙河在鄒平縣西一里齊乘蒙水俗名沙河出長白山葫蘆峪水經謂之魚子溝東入孝婦河孝婦河在淄川縣西一里古瀧水也自青州府益都縣流入經縣西界北流經長山縣南門外又東北流經新城縣西北二十里入小清河曰坌河口水經注瀧水南出長城中北流至般陽縣故城西南與般水會又北徑其縣西北流至萌水口又西北至梁鄒東南與魚子溝水合北注濟寰宇記古名孝水乾溝河在長山縣西南三十里源出長白山東北流入孝婦河或謂即古魚子溝也又有瀦龍河亦出長白山北流入小清河潦溜河在新城縣東南三十里舊志源出鐵山北流至索鎮店西南入烏河徒駭河即漯水下流也自齊河縣北八十里東北流經臨邑縣南三十里又東徑濟陽縣界又東北入武定府惠民縣界俗名小土河舊志或云即屯氏别河本朝乾隆十三年二十二年二十七年高宗純皇帝巡幸經此俱有御製徒駭河詩按漯之為土當由齊音相近而訛至九河故道聖祖仁皇帝御論謂當不出直隸之滄景二三百里間折衷至當而濟南武定諸水道多有蒙其名者舊志濫引先儒注疏及諸家之辨證今皆削去古瓠子河在齊河縣西十里水經瓠子河自茌平縣瓠里渠又東北過祝阿縣為濟渠注河水自泗口出為濟水濟河二瀆合而東注於祝阿也縣志宋時名熙河蘇轍熙河賦稱在漢元光河決瓠子是也今湮趙牛河在齊河縣西二十里舊曰利民河西南自長清連楊隄西北至禹城界長百餘里地勢窪下夏秋水溢淹沒禾稼明洪武十七年知縣趙清縣丞牛文濬河闊十五步深二丈民至今賴之故名趙牛河溫聰河在齊河縣西北二十五里滕官屯西鄉民溫聰議開以泄劉洪坡水故名倪倫河在齊河縣北二十五里晏城南初楊家坡秋水大注淹沒禾稼鄉民倪倫請開河以泄水故名減水河在齊東縣東二里一名陳溝明成化元年開濬南引章邱之白雲湖流徑薛家渡口由馬家窪入大清河舊志馬家窪近小清河與白雲湖相接一遇水潦河水即通小清河而瀰漫於馬家窪民田多被其害因築渠以泄之大清河而汙池變為膏腴又有禦寇河在縣西南三里明正德六年開濬南通減水河北通大清河今其迹猶存俗名乾河壩水河在齊東縣西明成化十一年知縣李寬開濬以泄歸蘇鎮之水亦引白雲湖新莊流入縣境紆回二十五里至延安鎮西二里入大清河古黃河德州及臨邑禹城陵縣皆漢平原郡地為黃河所經故道自東昌府恩縣流入經平原縣西北流經德州東又北流入直隸吳橋縣界水經注大河故瀆自靈縣又東徑鄃縣故城東又東徑平原縣故城西而北絶屯氏三瀆北徑繹幕縣故城東北西流徑平原鬲縣故城西又東北徑平原縣枝津百出至安陵縣遂絶此西漢時故道元和志云王莽枯河在將陵縣西去縣十里舊志云黃河崖在州東南二十餘里其遺迹也其一自高唐州流徑平原縣東又東北徑陵縣南又東北徑臨邑縣北與德平分界又東北入武定府樂陵縣界水經注大河自高唐縣故城西又北左徑安德城東而北為鹿角津東北至般縣樂陵此蓋東漢以後故道元和志臨邑縣黃河在縣北七十里平原縣黃河南去縣五十里長河縣黃河東去縣五里皆其遺迹也又長清縣亦有黃河元和志在縣北去縣五十里蓋唐以前河流所經而寰宇記謂禹城縣之黃河自長清流入又東北入臨邑界與桑酈所述順逆判殊蓋宋時所經非漢故道也本朝乾隆十六年二十七年高宗純皇帝南巡經此有御製老黃河詩按古黃河上承恩縣四女寺及德州哨馬營兩支河之水東北流至吳橋縣之玉泉莊會鉤盤河下流經直隸寧津南皮及武定府之樂陵海豐諸縣至大沽河口入海山東通志自德州至樂陵縣本鬲津河故道今通謂之老黃河本朝雍正九年以後屢加濬治以泄衛河盛漲運道安流永資利賴矣漯河自東昌府高唐州流入經禹城縣西二里又東北徑齊河縣北境入臨邑縣界俗名大土河水經注漯水自東武陽徑博平縣又東出於高唐縣俗亦謂之原河又東北徑瑗縣故城西又徑高唐縣故城東又東北徑漯陰縣故城北又東北徑著縣故城南又東北徑崔氏城北又東徑鄒平縣故城北又東北徑東鄒城北元和志臨淄縣漯水北去縣七里按漯河自宋以前嘗為大河經流寰宇記云有古黃河在臨邑縣南二十里上自禹城下入臨濟即此又有聖水在章邱縣東十里源出小荆山西入漯河商河在禹城縣北流徑平原縣東又東北徑陵縣南又東北徑德平縣南東流入武定府商河縣界水經注商河首受河亦漯水及澤水所潭水淵而不流世謂之清水雖沙漲填塞厥迹尚存厯澤而北謂之落里坑徑張公城西又北重源潛發曰小漳河商漳聲相近故讀移耳又北徑平原縣東又徑安德縣故城南又東北徑平昌縣故城南又東徑般縣故城南又東至東陵寰宇記商水在安縣西南八十里舊志今自平原以北斷續過半矣泔河在長清縣南二十里源出米山北流至城南入孝婦河鉤盤河在陵縣東四十五里曰盤河店舊志自陵縣東南臨邑西北分為二水其一東經德平商河北行至武定之陽信縣南二十里而斷為截河鋪其一自德平西北流入武定之樂陵經海豐之南霑化之北至久山鎮入海寰宇記云在樂陵東南從德州平昌來輿地記云在樂陵古王翁河在平原縣西南蓋黃河枝津也三國魏志孫禮傳清河平原爭界禮以烈祖初封平原時圖決之宜屬平原實以王翁河為限古屯氏河在平原縣北水經屯氏别河北瀆東徑繹幕縣故城南又東北徑重平縣故城南又東入信陽縣今無水屯氏别河南瀆自平原東絶大河故瀆又徑平原縣故城北東北枝津又出東北至安德縣界東會商河南瀆又東北於平原界又有枝渠右出至安德縣遂絶縣志自隋疏為永濟渠古迹遂不可考篤馬河即馬頰河自東昌府恩縣流入平原縣之西南境東北流徑德州東陵縣西又東北徑德平縣西北入武定府樂陵縣界漢書溝洫志鴻嘉四年河溢河隄都尉許商與丞相史孫禁共行視圖方略禁以為可決平原金隄開通大河令入故篤馬河至海五百餘里商以為禁所欲開者在九河南失水之迹處勢平夷旱則淤絶水則為敗不可許後漢書郡國志平原地道記曰有篤馬河水經注屯氏别河南瀆首受大河故瀆東出亦通謂之篤馬河東北徑安德縣故城西又東北徑臨齊城南又屈徑其城東故瀆廣四十步又東北徑重邱縣故城西又東北徑西平昌縣故城北又徑般縣故城北寰宇記篤馬河即古馬頰河山東通志篤馬河亦名馬頰非禹迹也四望湖在厯城縣西即大明湖之别渚按寰宇記在縣西二百餘步其水分流入縣城與孝感水合今考城西無入城之水疑古今水道不同也濯纓湖在厯城縣城內西北本名灰泉齊乘府城內灰泉最大自北珍珠以下皆匯於此周圍廣數畝當是大明湖之源也明統志元憲使珊珠希仁改今名珊珠希仁舊作珊竹希仁今改正大明湖在厯城縣西北隅周十餘里水經注濼水北為大明湖西即大明寺寺東北兩面側湖池上有客亭左右楸桐負日俯仰目對魚鳥極望水木明瑟可謂濠梁之性物我無違矣湖水引瀆東入西郭東至厯城西而側城北注又上承東城厯祠下泉源競發其水北流徑厯城東又北引水為流杯池州僚賓燕公私多萃其上明統志大明湖源出舜泉其大占府城三之一由北水門出與濟水合瀰漫無際遙望華不注峯若在水中蓋厯下城絶勝處也舊志今濼水達城北流而不入城舜泉亦止成一井不流惟北珍珠濯纓諸泉北流入湖耳湖境亦多為居民填塞治圃環沼僅成曲港可通小舟而蔬果魚蟹之屬其為民利多矣本朝乾隆十三年有高宗純皇帝東巡經此御製大明湖詩蓮子湖酉陽雜俎厯城北二里有蓮子湖周環二十里湖中多蓮花紅緑間明乍疑濯錦有魚船掩映罟罾疏布遠望之者若珠網浮杯也鵲山湖在厯城縣北二十里湖北岸有鵲山故名寰宇記濼水與厯水合流同入鵲山湖舊志自劉豫導濼東行而水不及鵲山湖矣舊有亭亦久廢白雲湖淯河之下流也自章邱縣西北七里流徑厯城縣東北合小清河周五十里俗名劉郎中泊有魚藕菱芡之利明洪武初設河泊所十七年革湄湖在長清縣西南五里東西三十里南北二十五里水經注濟水右迤為湄湖方四十里爾雅水草交為湄釋名曰湄眉也臨水如眉元和志謂之淯溝泊錦繡川在厯城縣南中宫鎮東一名北川延袤六十餘里流徑中宫鎮南亦名中宫河下流入長清縣即水經注之玉水也府志今名大澗溝夾澗芍藥叢生春時絶勝又有錦陽錦雲二川略相聯屬八會津在鄒平縣南元和志濟陽縣八會津在縣南一里相傳水陸所湊其路有八故名按今鄒平縣即唐之濟陽縣地此水今湮四瀆津在臨邑故縣東水經注河水東北流徑四瀆津津西側岸臨河有四瀆祠東對四瀆口川瀆異同考臨邑東有四瀆津大河故道所經也唐五行志云永徽六年齊州河溢即此地耿家陂在長清縣西北三十里周二十里下流入大清河百花洲在厯城縣大明湖南方廣數十里居民廬舍圍旋環繞本朝乾隆十三年高宗統皇帝東巡經此御製有用宋曽鞏百花洲韻詩黑水潭在德平縣西北三十五里望之水色如黛故名曩流注篤馬河今涸黑龍潭在平原縣西二十里古馬頰河側興龍寺下其深叵測遇旱禱雨取水於此白鹿淵在德平縣東水經注般河又東為白鹿淵南北三百步東西千餘步徑三丈餘其水冬清夏濁渟而不流趵突泉在厯城縣西曾鞏齊州二堂記云泰山之北與齊之東南諸谷之水西北匯於黑水之灣又西北匯於柏崖之灣而至於渴馬之崖則泊然而止自崖以北至於厯城之西蓋五十里而有泉湧出高或至數尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄粳於黑水之灣者而見之於此蓋泉自渴馬崖潛流地中而自此復出也其注而北則謂之濼水達於清河以入於海明統志一名瀑流府志上有觀瀾亭本朝康熙二十三年聖祖仁皇帝駕幸濟南賜額曰激湍曰源清流潔并御製趵突泉詩乾隆十三年有御製恭依高宗純皇帝東巡經此聖祖趵突泉韻及再題趵突泉諸詩珍珠泉有南北二泉南泉在府城內鐵佛巷東今淤北泉在白雲樓前右有劉氏泉左有溪亭泉今在巡撫公廨本朝康熙二十三年聖祖仁皇帝御書扁曰清漪二十八年再幸復賜扁曰作霖并御製觀珍珠泉詩乾隆十三年有高宗純皇帝東巡亦御製珍珠泉詩金線泉在府城西元好問濟南行記金線泉有紋若金線夷猶池面泉今為靈泉菴齊乘厯下名泉有曰金線曰趵突曰皇華曰柳絮曰卧牛曰東高曰潄玉曰無憂曰石灣曰酒泉曰湛露曰滿井曰北煮粳曰散水曰溪亭曰濯纓曰灰泉曰知魚曰硃砂曰劉氏曰雲棲曰登州曰望水曰洗鉢曰淺井曰馬跑曰舜井曰珍珠曰香泉曰鑑泉曰杜康曰金虎曰黑虎曰東蜜脂曰西蜜脂曰孝感曰玉環曰羅姑曰混沙曰灰池曰南珍珠曰芙蓉曰滴水曰灰灣曰懸清曰雙桃曰溫泉曰汝泉曰龍門曰染池曰懸泉曰都泉曰柳泉曰車前曰煮粳曰爐泉曰白虎曰甘露曰林汲曰白泉曰金沙曰白龍曰花泉曰獨狐曰醴泉曰漿水曰南煮粳曰苦苣曰尉斗曰鹿泉曰龍居合章邱百脈總七十二見名泉碑天鏡泉在厯城縣西門外舊志新附名泉有五十七其一名天鏡在龍潭南方廣一畝淨明泉在章邱縣南齊乘明水一名淨明泉出百脈西北石橋邊其泉至潔纎塵不留土人以洗目退昏翳合西麻灣入繡江徐壁濟水論濟水分支伏流地中至縣西南出為瓜漏河至滲水灣乃伏入地中至是始出而為百脈淨明東西麻灣四泉合而北流為濟河又北流至城東為繡江西北至水寨會為白雲湖又東北入小清河始與濼水會又東入大清乃復濟水之本原云醴泉在鄒平縣西南二十二里泉深丈許旁有醴泉寺相傳僧寶志卓錫於此又曰范公泉蓋宋范仲淹讀書處也其西有聖水井卓錫泉在長清縣東南靈巖山又有黃龍泉雙鶴泉甘露泉俱在靈巖寺旁七仙泉在長清縣東南六十里又有白石泉衆水相合即沙溝水上源也清沙泊在新城縣西北二十五里縣志岔河之委溢而成湖又名落鴈湖中有界石北為高苑南為新城龎家泊在新城縣北二十五里接高苑縣界麻大泊在新城縣東北三十里接博興高苑縣界俗名官湖又名錦秋湖周五六十里蒲葦叢生芙渠如錦其中有魚龍灣水流旋轉不定相傳有龍窟其水溢而北流至博興南入烏河又見