body:
  text: 大清一統志山東統部在京師南八百里東西距一千六百四十里南北距八百十里東至大海一千三百里西至直隸大名府元城縣界三百四十里南至江南徐州府沛縣界五百七十里北至直隸河間府寧津縣界二百四十里東南至江南淮安府海州界六百八十里西南至河南歸德府商邱縣界六百八十里東北至渤海四百二十里西北至直隸冀州南宫縣界三百一十里分野天文虛危奎婁分野元枵降婁之次兼室壁房心昴畢分野娵訾大火大梁之次齊地虛危分野屬青州自須女十度至危十五度為元枵之次今濟南府青州府登州府萊州府武定府及兗州府之陽榖東昌府之聊城堂邑博平茌平清平高唐州臨清州之夏津泰安府之東阿平陰當其地魯地奎婁分野屬徐州自奎五度至胃六度為降婁之次今兗州府沂州府泰安府及萊州府之高密即墨膠州平度州當其地衛地營室東壁分野屬并州自危十六度至奎四度為娵訾之次今曹州府之濮州范縣觀城朝城兗州府之汶上夀張東昌府之莘縣冠縣館陶臨清州邱縣泰安府之東平州當其地宋地房心分野屬豫州自氐五度至尾七度為大火之次今曹州府及濟寧州金鄉魚臺當其地趙地昴畢分野屬冀州自胃七度至畢十一度為大梁之次今東昌府之恩縣臨清州之武城當其地建置沿革禹貢青徐及兗豫四州之域禹貢濟河惟兗州海岱惟青州海岱及淮惟徐州又豫州導菏澤今濟南青登萊及泰安府東阿平陰之北境皆古青州地兗州與曹州府之巨野泰安府之東平州及新泰萊蕪之南境皆古徐州地東昌與兗州府之陽榖壽張曹州府之鄆城及濟南青州二府之西北境皆古兗州地曹州府古豫州地周為青兗豫三州地周禮職方氏正東曰青州河東曰兗州漢書地理志周改禹徐州合之於青禹貢九州兼有青徐爾雅無青周禮無徐郭璞爾雅注云疑是殷制春秋為齊魯及衛宋曹滕薛邾莒𣏌諸國地戰國屬齊并屬楚趙今青州濟南武定及東昌之西境州縣泰安之肥城萊蕪東阿平陰兗之陽榖壽張曹之范縣春秋齊國地登萊春秋紀萊牟介莒諸國地戰國並屬齊兗州府及沂之沂水日照曹之單縣巨野鄆城泰安之新泰東平春秋魯國地戰國後南屬楚北屬齊曹州府之濮州朝城觀城春秋衛地戰國屬齊後又屬趙濟寧州之金鄉春秋宋地曹州府之曹縣定陶春秋曹國地後屬宋戰國屬齊兗州府之鄒縣春秋邾國地戰國改名鄒國滕縣春秋滕薛小邾三國地沂州府之莒州春秋莒國地東昌府之館陶冠縣莘縣恩縣臨清州之武城縣春秋晉地戰國屬趙臨清州邱縣為趙東鄙高唐州為齊西鄙夏津為齊趙二國邊界秦兼天下置齊郡琅邪郡薛郡東郡漢初分齊為三國史記秦楚之際月表項羽分齊為三國臨淄王田都都臨淄濟北王田安都博陽膠東王田市都即墨尋并於漢分置諸郡國改薛郡為魯國後漢書郡國志魯國秦薛郡高后改元封五年置十三州部刺史為青兗徐三州地青州領平原千乘濟南齊北海東萊六郡災川膠東高密三國兗州領東山陽濟陰泰山四郡城陽東平二國而琅邪東海二郡及魯國屬徐州皆今山東省所屬之地按災川膠東高密三國漢志不言所屬以本文故齊推之當屬青州魯國漢志屬豫州後漢書郡國志魯國本屬徐州光武改屬豫州推之前志亦據書成時所屬而言也後漢屬青徐兗豫四州青州刺史治臨淄領濟南國平原郡樂安國北海國東萊郡齊國徐州刺史治郯領東海郡琅邪國而東郡東平國任城國泰山郡濟北國山陽郡濟陰郡並屬兗州魯國屬豫州三國魏因之晉初分屬兗豫冀青徐五州晉書地理志兗州統濮陽國濟陽郡高平國任城國東平國濟北國泰山郡豫州統魯郡冀州統平原國樂陵國青州統齊國濟南郡樂安國城陽郡東萊國長廣郡徐州統東海郡琅邪國東莞郡永嘉後為後趙前燕前秦南燕所有晉志惠帝末兗州豫州冀州青州淪於石氏徐州所得惟半季龍末遼西段龕據青州慕容恪克之苻氏平燕盡有其地苻氏敗刺史苻朗以州降晉置幽州刺史鎮廣固隆安四年慕容德都之復改為青州德以并州牧鎮陰平幽州刺史鎮發干徐州刺史鎮莒城青州刺史鎮東萊兗州刺史鎮梁父慕容超移青州於東萊郡義熙五年劉裕平南燕仍為兗徐青三州地宋元嘉九年分青州置冀州二十年省兗州尋復置泰始三年分徐州置東徐州宋書州郡志青州刺史領郡齊郡濟南樂安高密平昌北海東萊泰原長廣冀州刺史領郡平原樂陵徐州刺史領郡蘭陵東海東莞東安琅邪陽平濟陰北濟陰平昌兗州刺史元嘉二十年省分郡屬徐冀州三十年六月復立領郡泰山高平魯郡東平陽平濟北後魏為司領郡陽平冀領郡安德兗領郡泰山魯高平任城東平東陽平青領郡齊北海樂安渤海高陽河間樂陵齊本劉宋冀州皇興三年更名領郡東魏東平原東清河廣川濟南太原五州又增置濟泰常八年置領郡濟北平原東平南清河東濟北光皇興四年分青州置領郡東萊長廣東牟東徐孝昌元年置領郡下邳武原郯西兗孝昌三年置領郡沛濟陰膠永安二年置領郡東武高密平昌南青太和二十二年改領郡東安東莞北徐永安二年置領郡東泰山琅邪七州共領四十二郡北齊因之後周置總管府於青州隋開皇三年廢郡為州十四年總管府廢大業元年於兗州置都督府三年改諸州為郡分屬豫濟陰郡屬兗東平濟北渤海平原四郡屬青北海齊東萊高密四郡屬徐魯琅邪二郡屬四州唐武德初復以郡為州二年置齊州總管府管齊鄒東泰談淄濟六州四年又置青州管青維登牟莒密萊乘八州德州管博德棣觀四州鄆州管鄆濮兗戴曹五州三總管府七年改總管府為都督府貞觀元年府罷諸州分屬河南河北道採訪使鄆曹濮兗沂青淄密登萊齊棣十二州屬河南道博德二州屬河北道七年復置齊州都督府十四年又置兗州都督府天寶元年仍改州為郡至德二載復以郡為州分置淄青平盧天平泰寧四州節度使唐書方鎮表至德元載置青密節度使治北海乾元二年升鄆濟兗都防禦使為節度使治兗州上元二年置淄沂節度使治沂州尋以侯希逸引兵保青州併領淄沂遂號淄青平盧節度使寶應元年廢兗鄆節度使元和十四年又置鄆濮節度使治鄆州十五年賜號天平軍節度使長慶元年升沂海觀察使為節度使治兗州乾寧四年賜號泰寧軍節度使五代梁唐因之晉置威信軍於曹州漢初廢周復於曹州置彰信軍宋初屬京東及河北路熙寧七年分京東為東西兩路濟南府青密沂登萊濰淄七州屬京東東路襲慶興仁東平三府濟單濮三州屬京東西路而博德恩棣濱五州屬河北路金改京東為山東始有山東之名仍分東西兩路東路領益都濟南二府濰淄沂密登萊莒棣濱寧海十州西路領東平府兗曹濟博滕泰安七州而恩濮二州屬大名路單州屬南京路元分置燕南河北道山東東西肅政廉訪司及山東東西道宣慰司直隸中書省謂之腹裏東平東昌濟寧三路曹濮德恩冠高唐泰安七州屬燕南河北道濟南般陽二路寧海州屬山東東西道而益都路屬宣慰司明洪武元年置山東行中書省治青州九年移治濟南尋改置山東承宣布政使司領六府濟南兗州東昌青州登州萊州一十四州八十九縣濟南府領武定德濱三州二十六縣兗州府領濟寧沂東平曹四州二十三縣東昌府領臨清高唐濮三州十五縣青州府領莒州十三縣登州府領寧海州七縣萊州府領平度膠二州五縣本朝因之為山東省雍正二年升濟南府之泰安武定濱兗州府之濟寧曹沂等六州為直隸州八年濟寧州仍屬兗州府十二年升武定沂二州為府濱州改屬武定十三年升泰安曹二州為府乾隆四十一年升濟寧州並東昌府之臨清州為直隸州共領府十州二濟南府兗州府東昌府青州府登州府萊州府武定府沂州府泰安府曹州府濟寧直隸州臨清直隸州形勢東據海東南接江南海州贛榆縣境為安東日照諸城折而東為膠州即墨萊陽海陽文登至榮城折而北又折而西為文登寧海福山蓬萊黃縣招遠掖縣昌邑濰縣壽光樂安利津霑化海豐折而北抵直隸之鹽山縣界凡千餘里自登州以南皆岸大海自萊州以東則曰渤海亦曰少海南起登州沙門島北至永平碣石為渤海之口廣五百里晉書地理志舜以青州越海分為營州是古青州之境跨有北海也榮城以東有元人海運故道自濟南兗州東昌泰安曹州五府外當大海一面之險者武定東北境沂州東南境當兩面之險者青州萊州北境南境當三面之險者登州東南北皆以海為境南距徐邳舊運河自江南徐州府入境新運河自邳州入境西接宋衛今河南歸德直隸大名為古宋衛之地北連燕趙今直隸河間為古燕趙之地其名山則有泰山在泰安府五嶽之東嶽也亦曰岱宗沂山在青州府臨朐縣是為東鎮琅邪在青州府諸城縣其大川則有黃河黃河故道禹漯川經今武城德州德平北又東北經樂陵海豐西北又東流入海東漢以後河經今觀城南朝城莘縣東堂邑東南聊城博平茌平北折而北流經禹城西平原陵縣東又折而東經德平臨邑商河北樂陵惠民南又東經濱州蒲臺南至利津東南入海自唐迄宋初河北流一支經今濮州北朝城莘縣堂邑西折而東北經清平夏津德州南德平北又東北經惠民陽信北至霑化東北入海其南流一支經今濮州東北范縣陽榖東阿平陰長清臨邑西北折而東經濱州利津北東入海自宋仁宗以後河北流一支經今冠縣館陶臨清武城德州西北流入直隸景州東光界東流一支經今朝城莘縣堂邑聊城西北又東經高唐平原德平商河惠民陽信北至霑化東北入海自金章宗以後河由今菏澤北濮州南東北至鄆城東北夀張東南注於梁山濼南北分流北派由北清河入海經今東阿平陰長清西北折而東經齊河東齊東西青城蒲臺北濱州南至利津東入海南派由南清河入淮經今東平汶上西南嘉祥東北濟寧西南魚臺之東流入江南沛縣界明宏治中築斷黃陵岡北流始絶今從河南考城東流入經曹單二縣南東南流入江南豐縣碭山界運河即會通河元至元中所開明永樂九年濬故道自濟寧北至臨清凡三百八十五里南至江南沛縣凡三百里而南旺湖地勢特高於是相地置閘以時啓閉自分水北至臨清地降九十尺為閘十有七而達衛河南至沛縣沽頭地降百六十尺為閘二十有一而達河淮舊志運河凡七百七里入衛河又四百里始出境達京師山東境內由魚臺至臨清得汶洸泗沂四水共泉百七十餘會於泗水而分流於漕渠為閘百三十為淺二百二十皆有司分掌之而統於總河新志運河南自江於嶽宗受秩清宴呈休聲教漸被之餘不徒以山河十二為雄矣舊志文職官巡撫駐濟南府兼提督銜監督臨清關務總督河道駐濟寧州雍正元年添設副總河一員十三年裁嘉慶十九年復設副總河尋裁提督學政布政司經厯庫大使廣儲按察司經厯司獄督糧道駐德州管理漕糧兼管德常臨清倉事務庫大使分守濟東泰武臨道駐濟南府管理驛傳事務轄濟東泰武四府臨清一州分守登萊青兵備道駐登州府分巡兗沂曹濟兵備道駐兗州府兼管驛傳事務及曹單曹儀二廳黃河工程分巡運河兵備道駐濟寧州管黃運河隄兼管河庫道事鹽運使駐濟南府兼理鹽法道及河南商邱九州縣江南徐州府六州縣鹽法運同濱樂分司駐濱州運判膠萊分司駐膠州經厯庫大使益昌批驗所大使二員厯城濼口蒲臺北關鹽場大使十員樂安縣王家岡夀光縣官臺諸城縣信陽福山縣登寧掖縣西由膠州石河利津縣永阜霑化