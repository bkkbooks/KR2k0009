兄建緒性亮直有學識仕周為載師下大夫儀同三司及平齊留鎮鄴城與文帝有舊留為丞相加位開府拜息州刺史後兼始洪二州刺史所至著能名著齊紀三十卷遼韓知古玉田人善謀有識量太祖召見與語賢之命參謀議信任甚篤時儀法疏濶知古援據故典參酌國俗使國人易知而易行纍遷中書令為佐命功臣之一耶律隆運韓知古孫本名德讓統和中賜姓名重厚有智略明治體侍景宗以謹飭聞代父匡嗣為上京留守甚有聲尋復代父守南京擊敗宋兵於高梁河纍遷南院樞密使與耶律斜軫同受顧命立梁王為帝總宿衛事封楚國公纍拜大丞相封晉王卒諡文忠弟德威性剛介善馳射纍遷權西南招討使統和初黨項寇邊一戰劫之後與耶律善補敗宋將楊繼業加開府儀同三司政事門下平章事從子制心開泰中拜上京留守封漆水郡王以皇后外弟恩遇日隆每內晏歡洽輒避之皇后不悅曰汝不樂耶制心對曰寵責鮮能長保以是為憂耳一日沐浴更衣而逝追封陳王金傅霖玉田人第進士纍官至義軍節度副使行部臨潢遇敵戰死子輔之善承先志以忠厚節義世其家文史藝業尢極精微居常痛父沒於國事力學登進士授職滎陽令時蒙古兵自關陜集河洛期取汴京兵既壓境輔之以一邑令力不能支遂抗節不屈死元莽喀岱蒙古人始家於遵化元世祖時官至右丞相守正不阿今郡中張氏即其子姓張拾遵化人幼孤力作養母元末名隸戍籍每晨起拜母而後赴伍暮歸亦如之母病目旦夕籲天臥冰上幾一月翔知府簡靜端万慎取豫將考滿以病卒於官及櫬還别無長物惟圖書數卷而巳祀鄉賢汪逢淵遵化人天啓舉人少孤事母至孝後為國子助教遷工部主事忤當事左遷河東運判崇禎十五年升寧海知州未幾寇至逢淵會紳士力守卒以身殉祀名宦同縣時方罡天啓舉人厯官邠州道副使方入覲適流寇陷京不屈而死張一經尚書守直孫廕授户部員外郎流寇陷城死之張人龍知河南寶豐縣流寇破城不屈而死張光祖任薊州營守備崇禎末以身殉城本朝乾隆四十一年均賜諡節愍曹廷元遵化諸生早失母事父至孝父病晝夜侍湯藥禱天願以身代比卒勺水不入口者五日哀毁骨立結廬墓側朝夕哭奠三年如一日墳前草木未春而青人咸以為孝感之徵云本朝谷應泰豐潤人順治進士任浙江提學僉事虛公校士所拔多一時名俊陸隴其其尢粹者也應泰嗜博覽思采集有明一代典章事實購得山陰張岱石匱藏書用袁樞通鑑紀事本末例為明紀事本末八十卷每篇論斷仿晉書體以駢偶行文遣詞隸事曲折詳盡又著築益堂集傳於世張聯標玉田人知浙江泰順縣順治四年明魯王將程煌聚衆二千餘陷泰順聯標死之李興元遵化人官雲南按察使吳三桂之變脅授偽職不從拘之蒙化六年不屈遇害子蔭秀奇秀皆從死贈太常卿廕子萃秀入監李昌汴豐潤人順治初知山西興縣薑瓖叛昌汴抗節不屈罵賊死贈按察司僉事曹雲望豐潤貢生父官代州值薑壤亂雲望率壯勇冒矢石佐父拒守父母卒皆廬墓三年不樂仕進嘗出資代人完逋賦其人感激願納女為妾却弗受建書舍十數楹以教生徒從學者雲集賈光前遵化人兵部尚書應元孫巡撫維鑰子孝義著聞順治初詔求維鑰後遂以布衣引見賜四品服俸復其田宅聶時秀豐潤人偕兄時彥隨父慎任雞澤訓導父卒於官扶櫬歸舟次漳河遇寇執時秀兄弟索財不得欲剖其棺時秀哀求不獲乃奮臂大呼曰苟暴父尸何以生為遂罵賊赴水死賊怒復欲殺時彥子捷元方十歲延頸迎刃曰我可殺乞留父命賊義而釋之乃得歸而完葬焉李維鈺遵化人以祖君賢任南昌總兵廕授刑部主事出為漳州知府時海澄令以事失宜民大譁至毁官廨人情洶洶上下相疑畏不敢發維鈺單騎臨其邑擒渠魁治之餘不問民賴以安李國梁豐潤人乾隆丁丑一甲一名武進士授侍衛洊升湖廣提督四十六年命剿四川嘓匪擒賊有功旋調直隸提督卒詔贈太子少保諡恪慎王宗武遵化人官臺灣都司乾隆五十一年剿捕逆匪林爽文陳亡事聞議恤列女明徐來儀妻盧氏遵化人來儀為諸生嘉靖三十六年有寇警來儀手殺數賊後被執盧罵不輟遂俱遇害李氏女玉田李淮女正德七年流賊入境女年十七被執至山中欲汚之不從支解而死胡海妻王氏豐潤人海為興州前屯衛千户病殁王少無子父母欲奪其志泣曰苟事二姓不如從夫於地下遂自縊死本朝李奇秀妻田氏遵化人奇秀按察使李興元于康熙十二年興元殉節於滇奇秀並遇害氏聞凶問慟哭不食死同州節婦李懸妻劉氏汪基妻蔣氏王之璽妻戴氏王敬止妻李氏金守禮妻張氏張斗耀妻王氏蕭漢相妻張氏梅元璋妻李氏裴自榮妻詹氏謝升妻竇氏王易相妻李氏高應宿妻劉氏戴爾漢妻王氏白尚淳妻翟氏劉瑞妻黃氏劉淳妻趙氏孔文琦妻張氏李之彥妻李氏歐陽沁妻邢氏陸成先妻張氏劉萬銀妻萬氏趙明玉妻楊氏梁志仁妻寇氏李德華妻韓氏丁三樂妻劉氏梁之柱妻李氏許勳妻李氏鄧起妻張氏楊文煥妻趙氏王進儒妻袁氏張奇珍妻屈氏王文妻程氏陸洪妻侯氏徐士俊妻楊氏魯宗禮妻吳氏李宏勳妻李氏王朝士妻馬氏李熹妻張氏侯耀宗妻邊氏李維斌妻劉氏陳雅言妻張氏李汝連妻王氏皇甫鐸妻谷氏栁文富妻張氏李烑妻溫氏均乾隆年間旌費揚武妻汪氏羅文峪駐防馬甲滿洲人夫亡守節乾隆年間旌靜維精妻陳氏玉田人夫亡守節同縣節婦任顯逹妻陳氏鄧文妻張氏王大用妻范氏袁志逹妻張氏袁樂天妻段氏時天保妻高氏李成玉妻吉氏王國柱妻李氏吳純一妻王氏張信臣妻賈氏田可逹妻朱氏田君寵妻黃氏桑汝霖妻張氏安爾玶妻何氏韓秀安妻王氏王有富妻張氏荆自立妻張氏江嵐妻陳氏傅秀生