body:
  text: 遵化直隸州在直隸省治東六百三十里東西距一百六十里南北距二百二十八里東至永平府灤州界九十里西至順天府薊州界七十里南至順天府寧河縣界海口二百十里北至羅文峪關十八里東南至永平府樂亭縣治二百八十里西南至順天府寶坻縣治一百八十里東北至喜峯口關二十里西北至馬蘭峪六十里本州境東西距一百二十里南北距七十里東至永平府遷安縣界五十里西至薊州界七十里南至豐潤縣界五十里北至羅文峪關二十里東南至豐潤縣界七十里東北至喜峯口一百二十里西南至玉田縣界七十里西北至馬蘭峪六十里自州治至京師三百二十里分野天文尾箕分野析木之次宋史中台下星主冀遵化分野永平志遵化分野當尾七度清類天文分野書謂在尾六度建置沿革禹貢冀州之域有虞分為幽州地周屬幽州為燕地封召公見輿圖要略春秋為無終子國燕昭王置漁陽郡秦始皇帝并燕為右北平漢置徐無俊靡二縣屬右北平郡後漢因之晉移北平郡治徐無後省俊靡入之後魏太平真君七年郡廢以縣屬漁陽郡北周省徐無入無終唐為玉田縣地五代唐始置遵化縣屬薊州按州志謂唐天寶元年改薊州為漁陽置遵化縣今考元和郡縣志無之惟此為平州置馬監蓋誤以後唐為唐也遼重熙中於縣置景州清安軍一曰清武軍宋宣和四年賜名灤川郡金廢州以縣屬薊州元明因之明並設三衛一所遵化衛東勝右衛忠義中衛寬河守禦千户所國初並裁本朝康熙十五年以陵寢重地升縣為州屬順天府乾隆八年升為直隸州以永平府所屬之玉田豐潤二縣來屬領縣二玉田縣在州西南三十里東西距七十五里南北距一百二十里東至豐潤縣界三十里西至順天府薊州界四十五里南至順天府寧河縣界九十里北至州界三十里東南至豐潤縣界五十三里西南至順天府寶坻縣界四十二里東北至州界四十四里西北至薊州界五十二里在春秋時為大鹵之區漢為右北平郡無終縣地隋末改無終縣為漁陽縣唐武德二年分漁陽别置無終縣貞觀元年省乾封二年復置屬幽州萬嵗通天元年改曰玉田神龍元年改屬營州開元四年還屬幽州八年復屬營州十一年又屬幽州十八年改屬薊州遼因之宋宣和六年於縣置經州七年入金州廢縣仍屬薊州元明因之本朝初屬順天府雍正三年改屬永平府乾隆八年改屬遵化州豐潤縣在州東南七十里東西距七十三里南北距二百五十里東至永平府灤州界三十里西至玉田縣界四十三里南至海二百里北至州界五十里東南至灤州界一百二十里西南至順天府寶坻縣界一百里東北至永平府遷安縣界六十里西北至州界五十里漢置土垠縣屬右北平郡後漢移郡來治晉移郡治徐無以土垠屬之後魏郡廢二縣改屬漁陽郡北齊廢土垠後周又省徐無唐為玉田縣地金泰和中始分置豐閏縣屬薊州元至元二年省入玉田四年復置明洪武初改閏曰潤本朝康熙十五年改屬遵化州雍正三年改屬永平府乾隆八年仍屬遵化州形勢羣川繞其東南重山阻其西北於京師有臂指之勢遵化舊志地雄脈遠鞏皇朝億萬載之基遵化新志風俗性緩尚儒仗氣任俠九域志人多技藝秀者讀書次則騎射耐勞苦隋書地理志人性寬舒沈摯多材自古多豪傑之士蹈禮義而服聲名輿圖備考土厚水甘俗尚義勇人多豪俠習於戎馬元志風俗朴茂敦尚節義宋范鎮幽都賦城池遵化州城周六里有奇門四濠廣三丈唐時土築明洪武十一年甃甎嘉靖萬厯年間屢修本朝順治九年修康熙五十年乾隆十六年四十九年重修玉田縣城周四里有奇門三本土築明成化三年甃甎崇禎八年修本朝乾隆十五年修二十九年四十四年重修豐潤縣城周四里有奇門四濠廣二丈舊土築明正統十四年甃甎嘉靖隆慶崇禎年間俱修本朝乾隆十七年修二十九年四十八年重修學校遵化州學在州治西南金正隆初建元大德元年修明代厯有修葺本朝順治四年以來屢修入學額數十八名玉田縣學在縣治西遼乾統中建明嘉靖中改建西關外萬厯六年移於此本朝以來屢修入學額數十五名豐潤縣學在縣治東南金大定中建明洪武中修本朝以來屢修入學額數二十三名按文廟中有古鼎重五十斤埤海及隨隱漫録以為劉宋孝建元年八月二日作以享太廟者長安客話云或以為商時物也燕山書院在州城內本朝乾隆三十九年即義學改建浭陽書院在豐潤縣城內南偏本朝乾隆十九年即舊營田觀察使署改建户口原額人丁一萬二千六百四十四今滋生男婦大小共七十萬二千三百一十六名口計一十萬九千七百一户田賦田地一萬八千八百九十七頃八十七畝二分有奇額徴地丁正雜銀二萬五千六百四十三兩山川昌瑞山在州西北七十里本名豐臺嶺賜名鳳臺山康熙二年封為本朝初昌瑞山山脈自太行來重岡疊阜鳳翥龍蟠嵯峨數百仭前有金星峯後有分水嶺諸山聳峙環抱左有鮎魚關馬蘭峪右有寬佃峪黃花山千巖萬壑朝宗回拱左右兩水分流夾繞俱匯於龍虎峪崇隆鞏固洵國家億萬年鍾祥福地謹詳載首卷勝水峪在昌瑞山石麓砂抱水環局尊脈貴氣勢綿逺篤厚延洪黃圖萬年之慶凝護於此謹詳載首卷鐵山在州東五里高三十仭橫亙南北中斷如峽山石黝黑景忠山在州東六十里舊名陰山高數十里為境內諸山冠明總兵馬永建三忠祠於其上易今名本朝康熙十六年聖祖仁皇帝御題靈山秀色四字葡萄山在州東南三十里上多葡萄故名磨臺山在州東南四十里高百仭頂圓如磨南龍山在州南八里其北有北龍山兩山相望蜿蜒如龍釣臺山在州南十里高百餘仭下有溪潭可釣清風山在州南十七里山甚高秀登其上則肅爽如秋故名明月山在州南二十里高三百仭上有石穴南北相連望之如明月筆架山在州南二十里三峯如筆架左與明月相連中斷處為小燕口峽有石如臥牛其上杵迹遍滿名曰試杵石又桃花山在州南二十五里重山疊嶂上多桃樹白冶山在州南五十里俗傳上有白冶子鑄劎處靈靈山在州南五十里高九百仞邱壑盤鬱巖洞幽勝上有靈靈寺夾山在州西南四十里兩山相夾高數百仞山東面懸崖為水門口峽州境諸水匯流出此蒼山在州西南六十五里梨河及諸水匯流於其前關山在州西三十里以近邊關故名岈髻山在州西北二十里高千丈舍身臺山在州東北二十五里高千仞昔有僧人捨身於山礀中因名五峯山在州東北二十五里山勢磅礴五峯突起故名鳳山在州東北二十五里其形如鳳相近有瑤峯山白石璀璨如列瓊瑤乳山在州東北三十里山形如乳州治發脈於此三臺山在州東北九十里盤曲三層又東北二十里為大團亭山其北又有小團亭山皆州境之險要也松亭山在州東北一百二十里上多古松圍子山在玉田縣東四十里四周延迤如椅故名蜂山在玉田縣西三十里又西十里有螺山盤旋如螺下有泉可資灌溉樂臺山在玉田縣西北十八里藍水源出此燕山在玉田縣西北二十五里接豐潤縣界自西山一帶迤邐東來延袤數百里抵海岸為中外巨防宋蘇轍詩所謂首銜西山麓尾挂東海岸者也晉書咸康四年石虎攻段遼遼北平相陽𥙿登燕山以自固即此水經注庚水徑燕山懸巖之側有石鼓去地百餘丈望若數百石囷有石梁貫之鼓之東南有石人援桴狀同擊勢按縣志别載石鼓山在縣西北二十五里相傳唐太宗東征聚兵擊石聲如鼓故名考其方向即水經注所云石鼓也方輿路程考辨兩見之誤今附注於此龐山在玉田縣西北二十五里四崖壁立亦名旁山名勝志旁山南即種玉山也旁為石鼓聖水盤山在玉田縣西北三十里有水一區最甘美因名文龍山在玉田縣西北三十里山之陽有三泉瀠洄如瀑多茂林緑陰覆翳盛夏不暑西峯環拱出山之右東望龐山諸峯秀削駢列為縣境最勝處蓋燕山之別隴也白山在玉田縣西北四十里麻山在玉田縣北十五里一名古溪山與龐山岡隴相接九峯山在玉田縣北二十里山有九峯並峙相近有洞山山有石洞徐無山在玉田縣東北二十里後漢建安中田疇入徐無山營深險平敞地而居之十一年曹操伐烏桓令疇為鄉導上徐無山出盧龍水經注庚水南流厯徐無山開山圖曰山出不灰之木生火之石注其木色黑似炭而無葉有石赤色如丹以二石相磨則火發以然無灰之木可以終日今無之小泉山在玉田縣東北二十里有泉出石罅間相近為大泉山舊亦有泉今淤無終山在玉田縣東北三十里詳見薊州按玉田以無終種玉得名古為無終縣則取山以名縣可知今志以山去薊州近而距玉田遠故入無終於薊州翁同而於玉田亦附見無終今仍舊志兩見焉中山在玉田縣東北三十里無終山之南相近曰常山其西有天橋峪朝月山在豐潤縣東八十里兩峯突起有洞圓徹如新月因名其南為古石城山狀如石鼓唐山在豐潤縣東南四十里石可煅灰以給陶冶車軸山在豐潤縣南十里孤圎而高若臥轂然鴉鶻山在豐潤縣西北二十里高數百丈中有二石穴俗呼孟家洞趙家洞山西北有狼山管山對峙中有路通遵化謂之狼山營亦名兩山口靈應山在豐潤縣西北四十里懸崖壁立石畔有泉噴沫而下注於流沙河上有石洞二黨峪山在豐潤縣西北五十里屹若高臺旁方而頂平枇杷山在豐潤縣北三里勢甚平廣王化山在豐潤縣北五里金窰山在豐潤縣北二十六里勢極險峻腰有石洞壁間宛如門扇而又可開相傳昔嘗産礦因名其頂有路通行旅陳宫山在豐潤縣北七十里東西綿亙數十里東臨還鄉河西接黃土嶺山南有峯曰華山念經峪山在豐潤縣東北其山危峻澗谷逶迤多産榛馬頭山在豐潤縣東北四十五里有數峯最高一峯狀若馬首偏崖山在豐潤縣東北五十里東峻西低有崖壁立高數百仭相近又有水頭山崖兒口山在豐潤縣東北八十里衆峯連亙東斷為崖兒口有水自崖出是為還鄉河腰帶山在豐潤縣東北八十里還鄉河東山腰有白石一帶望之若白雲橫亙故名其南百餘步有白崖如屋下一竇深尺許泉流其中名曰靈泉蘆兒嶺在州東五十里與遷安縣接界梨河出此龍門峽在州南十里其山上合下開開處高六丈許水自懸崖傾瀉而下穿石城奔蕩之聲轟然若雷龍虎峪在州西南六十里馬蘭峪在州西北六十里昌瑞山東寬佃峪在州西北六十里昌瑞山西城子峪在州北十二里片石峪在州東北十二里州北五里河出此口西南流楸子峪在玉田縣石鼓山之後林木叢茂峯巒環繞為邑之勝鎮虎峪在玉田縣北三十里中有鯉魚洞烏龍洞在玉田縣北十一里麻山西南洞中盤曲深二三里灤河在州東七十里源出獨石口外自潘家口流入州境又百八十里至遷安縣詳見永平府志一名灤江梨河在州南十里源出遷安縣界蘆兒嶺經州界西南流七十里與諸水合名曰合河一名張子河入薊州界名沽河即薊州運河之上流也自是復由寶坻縣至小河口入玉田縣境南流入寧河縣界本朝乾隆二十八年修濬築隄鹿角河在州西南七十里其地窪下向苦水患明縣令辛志登開渠泄之遂成膏腴清水河在州西六里源出口外自沙坡峪流入經州西流會沙河湯河在州西五十里源出口外自馬蘭關流入南流至水門口會沙河入梨河水經注溫泉水出北山溪即溫源也其水南流百步便伏流於地下水盛則通注灅水州志又有魏家河在州西北五十里源出鮎魚關外南流合湯河金泉河在州西源出馬蘭關外西南流至薊州東馬伸橋入梨河亦曰淋河按水經注藍水出北山東屈而