以事至州怙寵恣橫為陽阿所阻彥良歸妄加毁訾尋遣人代州民千餘詣闕請留即日授武安州觀察使金靖安民永興縣人興定四年封易水公十月安民出兵至礬山元兵圍安民所居山寨守寨提控馬豹等以安民妻子及老弱出降安民軍中聞之駭亂衆議欲降以保室家安民及經厯官郝端不從遂遇害明李某失名太康人建文時任廣昌令燕王兵至守義不屈墜城死妻亦自經子秉道方幼土屯里老張真匿為已子宣德間復姓今為廣昌望族張友聞洪熙時為易州判官以冗員當汰部民言其律已嚴處事公勤於撫字乞改督本州馬政詔許之孫大祈黃岡人萬厯時知易州屢值荒饉親賑飢民存活數十萬礦使橫虐力抗被謫本朝韓璵沁水人順治十六年為易州兵備道下車遍詢民間利病而罷行之丁憂去民送至固關尚不忍還沈志禮山陰人授易州知州康熙六年水潦溢入城中志禮晝夜疏導水退民賴全活甘汝來奉新人康熙五十七年知淶水縣邑有鴉鶻人畢哩克者恃勢強占民屋且毆民至死汝來鎖其黨畢哩克至公庭大噪汝來並鎖而痛鞭之夜逸去乃誣奏汝來奉旨發部質審淶人匍匐申訴者不可勝數吏議以擅鎖職官請削籍特旨復職自此強悍斂迹人物晉祖納逎人性至孝少孤貧常自炊㸑以養母元帝作相引為軍咨祭酒溫嶠以納州里父黨敬而拜之嶠既為時用盛言納有名理除光祿大夫祖逖納弟慷慨有節尚博覽書記該涉古今見者謂有贊世才具與劉琨俱為司州主簿共被同寢中夜聞荒雞鳴蹴琨覺曰此非惡聲也因起舞京師大亂逖率親黨避地淮泗元帝徴為軍咨祭酒以社稷傾覆常懷振復之志尋為豫州刺史渡江擊楫誓曰不清中原而復濟者有如大江遂部兵與石勒相持由是黃河以南盡為晉土卒之日豫州士女如失父母南北朝宋祖沖之逎人稽古有巧思初元嘉中用何承天所製厯比古十一家為密沖之以為尚疏乃更造新法上表言之孝武令善厯者難之不能屈著易老莊義釋論語孝經注九章造綴術數十篇官至長水校尉子暅之巧思入神以父所造厯時尚未行更修之官至太府卿梁祖皓暅之子志節慷慨有文武才略少傳家業善算厯大同中拜廣陵太守侯景亂皓起兵襲殺其將軍紹先馳檄討景景引兵圍之城破被執車裂以殉北魏祖瑩逎人年八嵗能誦詩書十二為中書學生耽書聲譽甚盛內外親屬呼為聖小兒及長好屬文與陳郡袁翻齊名纍官車騎大將軍瑩以文章見重嘗語人曰文章須自出機杼成一家風骨何能共人同生活也性爽俠有節氣士有窮厄以命歸之必見存拯士亦以此多之朱長生廣昌人孝文時為散騎常侍使高車于提為副高車王欲降之長生與提厲聲曰烈士豈畏死耶舍之拘三年還孝文嘉其節拜河內太守與提並賜男爵宋田敏本易州牙吏雍熙中曹彬為敵阻兵涿州敏應王繼恩募由岐溝關持書抵彬彬上其事太祖召見補易州靜寨指揮使遼攻北唐河大將李繼隆為敵所乘敏以百騎擊走之咸平中敗遼於遂城西羊山斬獲無算遷北平寨總管諜知遼主去北平十里夜襲其營敵大驚遂引衆去厯官至儀州防禦使在邊二十餘年功伐最盛金張通古易縣人讀書過目不忘該綜經史善屬文遼天慶二年進士第補樞密院令史遁去屏居大凝山下金侍中劉彥宗與通古素善薦之因仕金天德初拜司徒封瀋王海陵御下嚴親王大臣未嘗少假以顔色惟見通古必以禮貌正隆初致仕進封曹王通古天資樂易不為表襮雖居宰相自奉如寒素焉任詢易州軍市人慷慨多大節書為當時第一畫亦入妙品登正隆二年進士厯益都判官北京鹽使致仕張元素易州人八嵗試童子科二十七試經義進士犯廟諱下第乃去學醫無所知名夜夢有人用大斧鑿開心竅納書數卷於其中自是洞徹醫術治病多不用古方自為家法云麻九疇易州人三嵗識字七嵗能草書作大字一時目為神童章宗召見問汝入宫殿中亦懼怯否對曰君臣父子也子豈懼父耶帝大奇之既長博通五經於易春秋尤長興定末試開封府詞賦第二經義第一再試南省復然聲譽大振雖婦孺皆知其名正大初特賜進士官至應奉翰林文字謝病去元趙柔淶水人有膽略善騎射好施豫金末避兵西山柵險以保鄉井時劉伯元等亦各聚衆數千聞柔信義共推為長柔明號令嚴約束為衆所服太祖破紫荆關柔以眔歸授涿易二州長官後羣盜並起柔單騎説降其衆以功纍遷正定涿等路兵馬都元帥卒封天水郡公賜諡莊靜何伯祥易縣人從張柔來歸太祖平河朔伯祥擒其驍將王子昌悉平西山諸寨拔洛陽破蔡州論功居多授易州等處軍民總管以功賜錦衣金甲世祖南伐伯祥參預軍事多所獻納卒追封易國公諡武昌鞏彥暉易州人以武勇稱代兄彥榮為百户隸千户何伯祥麾下從伐宋破棗陽泗州之役諸將無敢渡塹水者彥暉徑渡殺其將登月城將下顧百祥失所在乃反求之力戰翼伯祥以出由是百祥與彥暉如親兄弟事聞授銀符牌兵渡江次武昌宋援兵四集彥暉逐之伏出被圍彥暉矢盡遂投水中敵援之而出載歸江州不屈死何瑋伯祥次子始襲父職知易州以平宋功厯遷御史中丞陳當時要務十條成宗崩丞相阿瑚泰奉皇后旨集廷臣議祔廟及攝政事瑋難之阿瑚泰變色曰中丞謂不可行獨不畏死耶衆皆危懼瑋從容曰死畏不義耳苟死於義夫復何畏武宗即位厯官河南行中書省平章政事卒追封梁國公諡文正阿瑚泰舊作阿忽台今改正敬儼易州人父元長有學行官至太常博士儼嗜學善屬文初選中書省掾朱清張瑄為海運萬户豪縱不法適儼典其文牘嘗致厚賂儼怒拒之二人伏誅權貴皆以賄敗連坐惟儼不與大德中為監察御史纍官平章政事卒諡文忠明李德成淶水人少孤元末隨母避寇騎且逼母投河死德成思母不置既長娶王氏亦有孝思一夕夢母謂已曰我處水下寒不得出覺而大慟旦即與妻徒跣行三百里抵死所卧冰七日冰融數十丈恍惚若見母而他處冰堅如故洪武初舉孝廉永樂初官至陜西布政使謝定住廣昌人年十二隨母出遇虎將噬其母定住奮前擊之虎逸去如是者三母獲全永樂中召見賜米鈔旌其門張鵬淶水人景泰進士授御史剛直尚氣節按大同宣府奉使江南皆有聲天順元年偕同宫劾石亨曹吉祥不法謫戍遼東尋改廣西亨敗赦還纍官兵部尚書太子少保卒諡懿簡霍恩易州人宏治進士除上蔡知縣正德六年流寇竊發恩預為守備賊齊彥名遣人勒降恩戮之以徇於軍賊大怒悉衆攻城恩力禦之城陷被執令易服見恩叱之迫使跪恩趺坐地上罵不絶口賊以刃插其口中罵益厲遂遇害頊斷無血惟白氣一縷數日後顔色如生目猶瞋視事聞贈光祿少卿諡忠烈命建忠節坊立祠以祀劉斯潔易州人嘉下城即賊入矣及城陷恩拔刀下城劉臺上見之即自縊未絶復以簪刺心死隗好詩妻冀氏淶水人夫亡值寇亂攜前妻二子及己子避難遇賊欲殺前子氏哀泣欲以已子代賊詢其故義而釋之守節至九十餘嵗吳喬妻鞠氏廣昌人姑患臂痛不治氏籲天願捨臂代姑姑愈乃斷一臂以完前志同縣吳安妻郭氏仲孺妻劉氏俱自縊殉夫本朝趙壧妻萬氏易州人夫亡孝事衰翁撫孤成立復早卒與婦李氏共守訓四孫皆為諸生康熙年間旌田虎妻王氏易州人夫殁有諷以改適者氏閉户絶食姑諭之遂奉姑守志以終同州節婦邱璜妻侯氏邱士愈妻馬氏張履素妻郭氏張藴華妻孫氏田之棟妻崔氏鄭守花妻孫氏連士功妻李氏姚士奇妻郭氏劉興諤妻繆氏張得王妻章氏張璠妻李氏史珻妻高氏錢高選妻雷氏劉璋妻張氏董鐸妻郭氏劉永修妻繆氏均乾隆年間旌楊振文妻劉氏淶水人年十七而寡遺孤未彌月氏撫孤戌立守志三十餘年同縣節婦傅永正妻張氏汪憲準妻錢氏盧繼忠妻翟氏張瑗妻孫氏均乾隆年間旌趙安妻陳氏廣昌人夫故事姑至孝遺孤甫周嵗撫之成立同縣節婦張彩妻李氏王居妻楊氏胡樹德妻李氏胡維新妻李氏郭人龍妻張氏均乾隆年間旌孫雨田妻王氏易州人夫亡守節同州烈婦趙名山妻韓氏王汝達妻王氏楊治家妻劉氏邢李氏李韓氏均嘉慶年間旌董三德妻郭氏淶水人夫亡守節同縣烈婦王某妻王氏烈女張繼周女均嘉慶年間旌侯詔妻董氏廣昌人夫亡守節同縣馬中正妻張氏李奇照妻康氏均嘉慶年間旌土産棉淶水縣出不灰木州境出亦出廣昌縣白石山可作火爐等器栗明志易州出鏡易州出酒淶水縣出按舊志載生絹易州最著唐書地理志易州土貢紬今皆無之又杜佑通典上谷郡貢墨二百挺唐書地理志易州土貢墨今歙人造墨尚云按易水法製謹附記前提調官臣沈兆澐恭纂輯提調官臣王廣蔭恭覆輯校對官臣吳思權恭校校對官臣宗稷辰恭覆校
