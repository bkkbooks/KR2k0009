body:
  text: 慶陽府在甘肅省治東一千一百八十里東西距三百一十里南北距四百二十里東至陜西延安府甘泉縣界一百八十里西至涇州鎮原縣界一百三十里南至陜西邠州界二百二十里北至陜西延安府定邊縣界二百里東南至陜西邠州三水縣界二百九十里西南至涇州治二百二十里東北至陜西延安府保安縣界二百五十里西北至寧夏府靈州花馬池所界三百八十里自府治至京師由吳堡二千五百里由大慶關路三千七十里分野天文東井輿鬼分野鶉首之次建置沿革禹貢雍州之域春秋戰國義渠戎地秦置北地郡漢因之郡治在府境北後漢以後廢西魏大統十一年置朔州後周保定元年州廢隋開皇十六年復置慶州大業初改州曰宏化郡唐武德元年復曰慶州六年置總管府七年改都督府舊唐書地理志貞觀元年罷府四年復置五年又罷開元四年復置天寶初改為安化郡至德元載改順化郡乾元初復曰慶州屬關內道五代因之文獻通考慶州李茂貞建定安軍節度梁為武靜軍九域志唐定安軍節度後唐降軍事宋曰慶州安化郡屬陜西路慶厯元年分置環慶路政和七年升慶陽軍節度宣和七年改慶陽府金亦曰慶陽府金史地理志初改安國軍後置安定軍節度皇統二年置慶原路總管府元降為散府屬鞏昌路明曰慶陽府屬陜西布政使司本朝屬甘肅省領州一縣四安化縣附郭東西距一百六十里南北距九十里東至合水縣界三十里西至涇州鎮原縣界一百三十里南至合水縣界二十里北至環縣界七十里東南至合水縣治六十里西南至涇州治二百二十里東北至陜西延安府保安縣界一百三十里西北至環縣界五十里漢置郁郅縣屬北地郡後漢廢隋開皇十六年置合水縣為慶州治大業初為宏化郡治唐武德六年徙置宏化縣又改合水縣曰合川同為州治貞觀元年併合川縣入宏化神龍元年改宏化曰安化至德元載又改曰順化五代因之宋乾德二年復曰安化仍為慶州治後為慶陽府治金因之元至元七年省縣入府明復置仍為府治本朝因之合水縣在府東七十里東西距一百七十里南北距一百五十里東至陜西鄜州界一百二十里西至安化縣界五十里南至寧州界五十里北至陜西延安府保安縣界一百里東南至陜西鄜州中部縣治三百里西南至寧州治一百四十里東北至陜西延安府甘泉縣治二百五十里西北至環縣治二百五十里漢置略畔道屬北地郡後漢廢後魏為襄樂縣地西魏僑置蔚州後周廢州置北地郡隋開皇初郡廢義寧元年分合水縣置樂蟠縣屬宏化郡唐武德六年又分置蟠交縣天寶元年改蟠交曰合水縣皆屬慶州五代周省合水縣入樂蟠宋熙寧四年省樂蟠縣復置合水縣屬慶陽府金元明皆仍舊本朝因之環縣在府西北一百八十里東西距二百三十里南北距三百里東至陜西延安府保安縣界一百三十里西至平涼府固原州界一百里南至安化縣界九十里北至寧夏府靈州花馬池所界二百十里東南至安化縣界八十里西南至涇州鎮原縣界二百里東北至陜西延安府定邊縣界一百二十里西北至固原州界八十五里秦置北地郡漢置馬嶺縣為郡治兼領方渠縣後漢廢隋大業元年復置馬嶺縣屬宏化郡唐屬慶州景龍元年分置方渠縣亦屬慶州五代時縣廢為鎮屬靈州晉天福四年於方渠鎮置威州又置通遠縣為州治周廣順二年改曰環州隸環慶路顯德四年降通遠軍宋淳化五年復為環州金屬慶原路元省通遠縣入州屬鞏昌路明降州為縣屬慶陽府本朝因之正寧縣在府東南二百四十里東西距一百三十里南北距三十五里東至陕西鄜州宜君縣界一百十里西至寧州界二十里南至陕西邠州三水縣界五里北至寧州界三十里東南至三水縣界二十里西南至邠州治八十里東北至鄜州中部縣界七十里西北至寧州界四十里漢北地郡泥陽縣地後魏置陽周縣屬趙興郡西魏於縣置顯州後周州廢隋開皇中改縣曰羅川屬北地郡唐屬寧州天寶初改曰真寧五代宋金元因之明萬厯間改屬慶陽府本朝乾隆年間改曰正寧寧州在府南一百五十里東西距二百一十里南北距一百三十里東至陜西鄜州中部縣界一百五十里西至涇州界六十里南至陜西邠州界七十里北至合水縣界六十里東南至正寧縣界五十里西南至邠州長武縣治九十里東北至鄜州治二百七十里西北至涇州鎮原縣治一百八十里春秋戰國義渠戎地秦為北地郡地漢置泥陽縣屬北地郡後漢因之漢末廢後魏太平真君二年置定安縣兼置趙興郡皇興二年置華州延興二年為三縣鎮太和十一年改曰班州十四年改曰邠州二十年又曰豳州西魏廢帝二年改曰寧州隋開皇初郡廢大業初復曰豳州尋改州為北地郡唐武德初復曰寧州貞觀元年置都督府四年府罷天寶初改曰彭原郡乾元初復曰寧州屬關內道五代因之宋曰寧州彭原郡屬永興軍路宣和元年置興寧軍節度屬環慶路金曰寧州皇統二年罷軍屬慶原路大定七年改縣曰安定元仍曰寧州至元七年省州治安定縣入州屬鞏昌路明初改屬慶陽府本朝因之形勢襟帶兩川拱揖羣峯北控羌胡南藩關陜府志原阜錯列溝澗輻輳山川險固為關輔保障明文在中觀宇篇賦風俗好稼穡務本業有先王遺風舊慶州志民淳而不爭士慤而有文宋章粢安化樓記好勇尚武安化縣官署記城池慶陽府城周七里十三步因原阜之勢而成其形似鳳謂之鳳凰城門四四面有濠明成化初增築南關甕城周三里本朝順治十五年修乾隆三十三年重修安化縣附郭合水縣城周三里一百八十步門二濠廣三丈三尺宋熙寧中築明末燬本朝順治十四年修雍正年間添建城樓乾隆三十三年重修嘉慶三年補修環縣城周五里三百五十步