兵器者遵誨部署帳下欲討之夏人懼盡歸所略拜伏請罪遵誨撫慰令去自是各謹封略秋毫不敢犯侯贇并州太原人太平興國七年知靈州按視蕃落宴犒以時得邊士心部內大治在朔方凡十餘年帝念其久求可代者而難其人侯延廣汾州平遙人淳化初知靈州部下嚴整戎人悅服李繼遷避其鋒尋護李繼隆軍平夏臺至道間李繼遷寇靈州復使知靈州兼兵馬都部署延廣引數十騎至鎮戎人素服其威皆相率引避慕容德豐太原人淳化中知靈州榖價踴貴德豐出私廩賑飢民全活甚衆轉引進使賊入境率兵擊走之獲羊馬甚衆郭密貝州經城人淳化中夏人寇邊以密有武略充靈州兵馬都部署訓練士卒號令嚴肅夏人畏服邊境賴以安謐王昭遠冀州阜城人至道中李繼遷優西鄙絶靈武糧道命昭遠為靈州路都部署護二十五州芻粟竟達靈武繼遷不敢犯楊瓊汾州西河人至道中為靈慶路副都部署河外都巡檢使賊纍寇疆瓊固捍有功導黃河溉民田數千頃敗賊於合河鎮北賊騎掠城下擊破之並賜詔嘉諭裴濟絳州聞喜人咸平中李繼遷叛以濟知靈州兼都部署至州二年謀輯八鎮興屯田之利民甚賴之其年清遠軍陷夏人大集斷餉道孤軍絶援濟刺指血染奏求救甚急兵不至城陷死之元多爾濟西夏寧州人世祖召見問欲何仕對曰西夏營田實占正軍儻有調用又妨耕作土瘠野曠十未墾一南北屯聚以來子弟蕃息稍衆若以其成丁者别編入籍以實屯力則地利多而兵有餘矣請為其總管以盡措畫帝可之乃授中興路新民總管至官録其子弟之壯者墾田塞黃河九口開其三流凡三載賦額增倍多爾濟舊作朵兒赤今改張文謙邢州沙河人至元元年詔文謙以中書左丞行省西夏中興等路羌俗素鄙野事無統記文謙得蜀士陷於俘虜者五六人理而出之使習吏事旬日間簿書有品式子弟亦知讀書俗為一變浚唐來漢延二渠溉田十數萬頃人蒙其利董文用真定豪城人至元改元為西夏中興等路行省郎中中興自琿塔罕之亂民間相恐動竄匿山谷文用至鎮之以靜民乃安始開唐來漢延秦家等渠􅛮中興西涼等州之土為水田若干於是民之歸者户四五萬悉授田種頒農具時諸王徹伯爾特穆爾鎮西方其下縱橫需索文用輒面折以法中興遂定徹伯爾特穆爾舊作只必鐵木兒今改袁裕洛陽人至元中授西夏中興等路新民安撫副使兼本道巡行勸農副使時徙鄂民萬餘於西夏有司雖與廩食而流離顚沛猶多裕與安撫使圖吉請於朝計丁給地立三屯使耕以自養官民便之又言西夏羌渾雜居驅良莫辨宜驗己有從良書者則為良民從之得八千餘人官給牛具使力田為農圖吉舊作獨吉今改明寧正夀州人洪武中以河州衛指揮使兼領寧夏衛事以河水利溉田修築漢唐舊渠開屯數萬頃兵食饒足陳懋壽州人永樂六年以伯爵佩征西將軍印鎮寧夏善撫降卒得其歡心降故元丞相札卜及平章司徒國公知院十餘人衆三萬盡收所部人口及孳畜數萬獻俘京師進封侯尋從北征屢鎮軍夏宣德三年奏徙靈州城懋在鎮久威名震漠北札卜舊作咱卜今改史昭合肥人宣德七年以征西將軍鎮守寧夏博迪達爾瑪犯邊遣兵擊之至庫得察罕俘獲甚衆進都督同知正統初昭以寧夏孤懸河外自河以東抵綏德延袤二千里曠遠難守乃請於花馬池築哨馬營增設烽堠直接哈喇烏蘇之境邊備大固進右都督居寧夏十二年老成持重兵政修舉博迪達爾瑪舊作孛的打里麻庫得察罕舊作闊臺察罕哈喇烏蘇舊作哈喇兀速今並改羅綺磁州人正統九年以御史參贊寧夏軍務踰年當代還軍民請復任擢大理寺丞參贊如故指揮任信陳斌皆王振黨綺劾之忤振謫戍遼東薑漢榆林衛人正德四年以總兵官鎮寧夏馭軍嚴整得將士心王置鐇謀逆與其黨何錦周昂置酒召漢及巡撫安唯學等酒半錦率其徒直入即座上執漢脅從己漢奮起怒罵不屈遂殺之子奭訟於朝詔賜祭葬有司為之立祠齊之鸞桐城人嘉靖初為寧夏僉事飢民採蓬子為食之鸞為取二封一進於帝一貽閣臣且言時事語極切帝付之所司時方大修邊牆之鸞董役巡撫朝東臯稱其能舉以自代周尚文西安後衛人嘉靖九年擢暑都督僉事充寧夏總兵官王瓊築邊牆尚文督其役且濬渠開屯軍民皆利之李如松朝鮮人萬厯二十年布木巴反寧夏命如松為提督陜西討逆軍務總兵官先是諸將董一奎麻貴等數攻城不下如松至攻益力亦不克及決䇿水攻布木巴窘遣養子克爾克往勾套寇如松令部將李凝追斬之已套寇以萬餘騎至張亮堡如松力戰手斬士卒畏縮者寇竟敗去水侵北關城崩如松及蕭如薰等以鋭師襲之布木巴及子承恩自斬叛黨劉東暘許朝乞貸死於是盡滅布木巴族録功進左都督布木巴舊作哱拜克爾克舊作克力蓋今並改梅國楨麻城人萬厯中為御史時布木巴據寧夏師久無功國楨疏薦李如松為提督詔從之即命國楨監其軍時賊外以求撫緩兵而陰結寇為助然糧盡勢困國楨乃定計決黃河灌城城毀賊退據大城國楨使間紿其黨互相殺以降布木巴自焚死論功擢太僕少卿馬孔英宣府塞外人積戰功為寧夏參將萬厯二十年布木巴反引套寇入掠孔英屢擊敗之布色圖入下馬關從麻貴邀擊大獲進本鎮副總兵二十四年卓哩克圖宰桑犯平虜橫城孔英偕參將鄧鳳力戰斬獲多賜金幣令推大將缺兵部以孔英降人格不用乃擢署都督僉事以總兵官涖舊任尋進秩為真卓哩克圖宰桑又兩犯平虜興武孔英俱大敗之布色圖舊作卜失兔卓哩克圖宰桑舊作著力兔宰僧今並改蕭如薰延安衛人萬厯中厯官寧夏參將守平虜城二十年布木巴據寧夏賊黨土文秀徇平虜如薰堅守不下以伏兵誘賊射布木巴養子雲死城獲全事聞擢為寧夏總兵官盡統延綏甘肅固原諸援軍與李如松等共平賊進署都督同知賀虎臣保定人崇禎二年擢總兵官鎮守寧夏時賊王嘉允陷府谷其黨李老柴應之攻合水虎臣戰於盤谷敗之又擊斬慶陽賊渠劉六六年察罕呼圖克圖合套寇薄靈州虎臣力戰死贈都督僉事後又贈都督同知察罕呼圖克圖舊作插漢酋虎墩兔今改本朝黎士宏長汀人康熙𥘉擢洮岷道副使移寧夏佐提督張勇贊畫軍機申嚴守禦綏靖反側又請免衛所逋糧七萬五千石寇平敘功升右參政丹達禮滿洲人康熙二十七年任寧夏道時官兵駐防在城民頗懼達禮請於督撫割城中一隅以居軍士嚴立教條不許擾民親督夫役採芻茭於湖灘不事科斂而軍馬自給又濬渠修學善政甚多人物漢傅燮北地靈州人少師事太尉劉寬再舉孝廉為護軍司馬與左中郎將皇甫嵩俱討張角燮疾中官上書奏之及角破宦者趙忠譖之故功多不封後拜議郎朝廷重其方格每公卿有缺為衆議所歸權貴多嫉之出為漢陽太守賊王國圉漢陽燮臨陳戰殁諡曰壯節侯子幹位至扶風太守南北朝宋傅亮靈州人父瑗以學業知名位至安成太守兄迪宋初終五兵尚書亮博涉經史尤善文詞義熙中纍遷中書黃門侍郎宋武帝受禪封建城縣公入直中書省專典詔命加尚書僕射進始興郡公傅隆亮族兄少孤貧有學行義熙初厯佐三軍前麾八年除給事中元嘉初為御史中丞甚得司直之體出為義興太守在郡有能名纍轉太常拜光祿大夫致仕手不釋卷特精三禮傅炎靈州人父僧祐山陰令有能名炎仕宋為武康令遷山隂令並著能名二縣皆謂之傅聖賜爵新亭侯元徽初遷尚書左丞母喪鄰家失火延燒炎屋炎抱柩不動鄰人赴救乃得俱全齊高帝輔政復以炎為山陰令炎父子並著奇績時云諸傅有治縣譜子孫相傳不以示人官至南郡內史齊傅􅔘炎子有能名為吳令有問丈人發姦摘伏惠化如神何以至此答曰無他也惟勤而清清則憲綱自行勤則事無不理憲綱行則吏不能欺事理則物無凝滯欲不理得乎梁傅昭靈州人六歲而孤哀毁如成人仕齊為聰明學士永明中纍遷員外郎明帝時為中書通事舍人時居此職者皆權傾天下獨昭廉靜無干豫梁武帝素重昭厯安成內史臨海太守遷散騎常侍金紫光祿大夫昭所涖官常以清靜為政居朝廷無所請謁終日端居以書記為樂雖老不衰博極古今世稱為學府卒諡曰貞傅映昭弟兄弟友睦修身勵行非禮不動昭卒映喪之如父年逾七十哀戚過禮天監中為烏程令卒於大中大夫傅岐􅔘子纍官太僕司農卿兼中書通事舍人貞陽侯蕭淵明囚於魏遣使還述魏欲通和衆然之岐獨曰必是高澄設間令貞陽遣使侯景自疑必圖禍亂不可許不從景果舉兵入寇後景乞割江右四州安置部下當解圍還鎮及與景盟城中文武冀得解圍岐獨言賊舉兵為逆豈有求和及景背盟莫不歎服詔封南豐縣侯固辭不受唐侯知道程俱羅俱靈武人居親喪穿壙作冢皆身執其勞鄉人助者即哭而卻之廬墳次哭泣無節知道七年俱羅三年不止知道垢塵積首率夜半傅墳踴而哭鳥獸為悲號李華作二孝贊表其行史憲忠靈武人少為魏牙門將田宏正討齊蔡常為先鋒閲三十戰中流矢酣鬬不解由是著名兄憲誠節度魏博表為貝州刺史魏亂奔京師厯涇原朔方振武節度使廉儉少欲所至莫不懷德纍封北海縣子檢校尚書左僕射史孝章魏博節度使憲誠子憲誠數姦命孝章乘間諫涕下沾襟文宗賢之擢節度副使憲誠欲助李同捷孝章切爭憲誠稍憚其義又勸出師討同捷即敕孝章統之進檢校工部尚書未幾授節度使終鄜坊節度宋周美靈州回樂人少隸朔方軍以才武稱真宗幸澶淵常令宿衛元昊反以功纍遷鄜延副都總管進馬軍副都指揮使卒贈忠武軍節度使諡忠毅自陜西用兵諸將多不利美前後十餘戰平族帳二百焚二十一招種落內附者十一族復城堡甚多所得祿賜多分其下及死家無餘資周永清美之孫龎籍言其忠勇加閣門祗候押時服賜夏國夏人受賜不跪詰之恐而跪知德順軍擊賊有功徙知代州契丹求地命永清二韓縝分畫入對言疆境不可輕與人不願行固遣之復上章陳利害竟以母病辭去終東上閣門使元高智耀河西人世仕夏國智耀登本國進士第夏亡隱賀蘭山太宗訪求將用之遽辭歸後見憲宗言儒者宜蠲徭役以教育之世宗即位召見力言儒術有補治道帝異其言即拜翰林學士又言國初庶政草創紀綱未張宜倣前代置御史臺以紏肅官常至元五年立御史臺用其議也擢西夏中興等路提刑按察使尋病卒追封公爵諡文忠李恆其先姓於彌氏唐末賜姓李世為西夏國主生有異質中統三年為尚書斷事官遷益都淄萊萬户從伐宋取襄陽下湖廣江西追文天祥至空坑嶺海平拜資善大夫中書左丞從征交址中毒矢卒諡武愍追封滕國公來阿巴齊寧夏人世祖時屢有戰功由宿衛纍官湖廣等處行尚書省右丞征陳日烜中毒矢死子濟賽為碩達勒達屯田總管府達嚕噶齊納顏叛戰於高麗雙城調萬安軍達嚕噶齊平黎蠻有功遷雷州路總管來阿巴齊舊作來阿八赤濟賽舊作寄僧碩達勒逹舊作水達達逹嚕噶齊舊作達魯花赤納顔舊作乃顏今改高睿智耀子年十六授符寶郎出入禁闥恭謹詳雅厯嘉興路總管浙西淮東廉訪使所至有政績兩為江南行臺御史中丞務持大體有儒者風卒贈太傅追封公爵諡貞簡楊多爾濟河西寧夏人事仁宗於藩邸佐平內難仁宗居東宫以為大中大夫家令丞日夕侍側雖休沐不至家衆敬憚之會兄卒涕泣不勝哀事寡嫂有禮待兄子不異己子家人化之仁宗始總大政執誤國者將盡按誅之多爾濟曰為政而尚殺非帝王治也帝感其言特誅其尤者民大悅服帝與中書平章李孟論元從人才孟以多爾濟為第一帝然之纍拜御史中丞進集賢大學士為權臣特木德克所害後贈夏國公諡襄愍楊多爾濟舊作楊朵兒只特木德克舊作鐵木迭兒今並改楊布哈多爾濟子幼有才氣能以禮自持好讀書善書仁宗欲召為翰林直學士力辭遭家難益自勵節為學以蔭補武備司提點轉僉河東廉訪使事時河東民飢先捐己資以賑請未得命即發倉廩繼之民賴不死天厯初陜西諸軍拒詔諸郡邑守吏率民逃布哈獨率衆出禦陳潰遂見殺至順二年贈禮部尚書楊布哈舊作楊不花今改明徐琦本錢塘人其祖戍寧夏遂家焉幼力學通經史永樂中舉進士厯兵部員外郎宣宗初命清天下軍伍擢右通政副章敞使安南餽遺無所受還拜南京兵部右侍郎帝以安南貢賦不如額南征士卒未盡返復命琦往時黎利已死其子麟疑未決琦宣布威德曉以禍福麟懼貢方物以謝帝悅命落戍籍宴賚甚厚正統初災異屢見琦陳弭災十事悉嘉納之命參贊南京機務進尚書時軍衛無學校琦請天下衛所視府州縣皆立學校從之琦居官務持大體明敏有斷卒諡貞襄楊忠寧夏人世官中衛指揮使以功進都指揮僉事廉介有謀勇正德五年安化王置鐇反其黨丁廣將殺巡撫安唯學忠時在側罵賊被殺同官李睿聞變馳至置鐇所門閉不得入大罵為賊所殺百户張欽亦以不從逆遇害事聞贈官豫廕表忠睿曰忠烈之門欽曰忠節之門胡侍寧夏人嘉靖初由進士厯官鴻臚少卿張璁桂萼既擢學士侍劾二人越禮背經因據所奏反覆辨論凡千餘言帝怒命逮治以言官論救謫潞州同知瀋府宗室勛注以事憾侍奏侍怨望謗訕大禮斥為民馬世龍寧夏人狀貌魁梧多膂力由世職舉武會試厯宣府遊擊天啓二年擢承平副總兵孫承宗薦擢山海總兵謝病歸崇禎六年察罕呼圖克圖合套寇犯寧夏詔世龍為總兵設伏邀擊大破之屢奏奇捷威名震西塞夏景華平羅人成化十年舉於鄉任河南彰德府推官立身正直有異政本朝乾隆八年崇祀鄉賢祠本朝劉芳名寧夏人順治二年任寧夏總兵平固原叛將武大定秦州賊賀珍王元馬德作亂芳名先後擒斬之又招降香山諸寇十六年加左都督同提督梁化鳳擊海寇於崇明遇疾卒於軍中贈太子太保諡忠肅馬凝寧夏人順治初從劉芳名擒秦州賊王元馬德又恢復河州莊浪以功授中軍副將從剿番回功最擢總兵下川滇駐防緬甸會剿水西所在有功官至湖廣提督陳福寧夏人父尚智孝友性生鄉黨無間福於順治初以守備從征有功纍遷夔州副將康熙十三年擢寧夏總兵吳三桂叛三輔臣據平涼遙應之洮蘭以東皆為所陷時鎮軍前已調赴征川留者十之二三人情恇懼多持兩端福按劒曰敢異議者斬遂整兵東復花馬池定邊斬偽將朱龍倪五等即移師西向固原次惠安堡會歲暮大雪衆請暫歸福不聽夜中兵變遂遇害先是福家纍尚留川吳三桂以書及偽札招之福遣弟壽由塞外間關奏聞奉詔授陜西提督未至而福已殁贈三等公世職諡忠愍趙良棟延安府人後官寧夏因家焉父名淮居恆解衣推食歲荒煮粥賑飢全活不可勝計良棟於順治初隨親王入關委暑寧夏水利都司從總督孟喬芳剿叛回有功授高臺遊擊尋以平水西功擢廣羅總兵丁父憂歸起大同總兵移鎮天津吳三桂反平涼提督王輔臣亦叛寧夏提督陳福遇害關陜優亂詔良棟安撫馳驛至寧夏定其亂乃練兵儲餉規畫進取康熙十八年領兵西渡白江連戰敗賊直抵成都下其城捷入授勇略將軍進兵部尚書總督雲貴全蜀底定進軍雲南時楚粵兵圍滇城久弗克良棟至攻七日而城下還朝授鑾儀衛使尋以疾歸後敘功授一等子世職卒諡襄忠良棟早歲從戎身經百戰所向有功性剛直馭兵嚴而有恩克成都日市肆不移及下雲南秋毫無取有古名將風長子宏燦隨良棟師征討皆有功由寧夏總兵纍官至兩廣總督入為兵部尚書卒諡敏恪次子宏燮由直隸完縣知縣纍官至直隸巡撫勤勞供職旗民輯睦盜案稀少加總督銜卒諡肅敏李日榮中衛人幼從軍王輔臣之亂日榮從王進寶恢復臨洮又隨征四川纍官廣東順德總兵師帝賓寧夏人趙良棟征川帝賓以遊擊留守寧夏時役民挽運軍需帝賓謂鎮民半已出征豈可再令挽運固請止之及良棟師旋奏云臣之得以成功者因有師帝賓在無內憂也擢襄陽總兵移涼州居官絶侵漁杜苞苴屏聲色介然特立涼人立祠祀之子懿德初任西寧守備厯遷至甘肅提督馬際伯寧夏人從趙良棟征川滇屢立戰功由寧夏遊擊纍官至四川提督撫輯軍民甚有方略張國梁寧朔人初名谷貞由行伍隨征四川雲南以功纍升至湖廣鎮筸總兵擢雲南提督舊例副參遊守在外題補康熙十一年新例必銜缺相當者保題不得其人聽候部推國梁疏言雲南地處極邊向無都司缺從前保題者俱以守備補遊擊越缺已經二等等而上之參將副將更無一銜缺相當之員雖有熟練邊情者格於新例惟候部推省分遠近不同到任遲速未定所選果能彼省勢必題留若聽其來者恐非才幹又不諳邊情無益行伍且武辨挈家厯萬里履任未久又復遷移若非素豐而欲其廉潔自持恐難必得營伍如何整理請仍照舊例許督撫提臣遴選補用部議從之雍正元年卒豫祭葬加贈右都督諡勤果江琦寧夏人世為衛職琦生而英勇從趙良棟征討川滇及從征噶爾丹皆有功厯河北延綏總兵擢甘肅提督所至有恩威稱司尢經寧夏人從征川滇及出塞俱有功纍官宣化總兵罷歸康熙五十七年從征西藏遇賊死之又有鎮人馮琇官固原參將隨師至木魯烏蘇遇賊力戰死羅萬倉寧夏人厯官至臺灣北路參將朱一貴反萬倉力戰援絶死之趙坤寧朔人由行伍從征噶爾丹有功纍遷至雲南鶴麗總兵康熙五十八年大將寧定西藏坤偕都統至中甸宣示恩威又率標兵進勦由內