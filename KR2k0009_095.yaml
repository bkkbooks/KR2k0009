淹檄令與蔣偕築細腰城世衡時卧病即起將所部甲士晝夜與築城成而卒郭逵洛陽人為環慶兵馬都監遭母憂不得解官凡三請乃許慶帥杜杞贐以錢四十萬謝弗受傅求考城人知慶州環之定邊寨蕃官蘇恩以小過疑懼而遁將佐議致討求謂恩非素攜二者乘以兵必走邊患但遣禆將從十數卒扣其帳開以禍福恩感泣還寨如初馬懷德祥符人為環慶路副都總管環州蕃官蘇恩以其屬叛往降之安俊太原人仁宗時為環州都監破趙元昊吃江井那等諸寨安撫使韓琦上其功遷環慶路都監武英太原人仁宗時為環慶路駐泊都監破黨平族又從任福破白豹城高敏登州人為環慶都監主蕃部事羌人以兵三十萬來寇總管楊逐駐兵大義以敏為先鋒將夏人攻奪大順水寨敏出戰多所斬獲次榆木援兵不至中流矢死贈嘉州刺史孫沔會稽人仁宗時凡三知慶州邊人服其能劉几洛陽人孫沔薦其才堪將帥使知寧州俗喜巫軍校仗妖法結其徒亂有日几使他兵伏壘門以伺夜半盡擒之蔡挺宋城人英宗時知慶州上書論攻守大計夏人大入諒祚親帥軍攻大順城挺料城堅不可破而柔遠城惡亟遣總管張玉將鋭師守之諒祚移寇柔遠玉夜斫營夏人驚擾潰去挺築城馬練平為荔原堡分屬羌三千人守之孫長卿揚州人英宗時知慶州州據險高患無水長卿鑿百井皆及泉泥陽有羅川馬嶺上搆危棧下臨不測之淵過者惴恐長卿訪得唐故道闢為通塗蕭注新喻人熙寧初知寧州環慶李信之敗列城皆堅壁注獨啓關夜宴如平時張舜民邠州人神宗時為寰樂令王安石倡新法舜民上書言不當與小民爭利時人壯之吕由誠開封人知合水縣王中立种諤征靈州由誠部運隨軍天寒食盡他邑役夫多潰去惟由誠所部分無失者趙卨依政人神宗時知慶州夏人欲襲其新壘大治攻械卨具上撓夏計及夏侵蘭州卨遣曲珍將兵直抵鹽韋俘馘千人其酋栧厥嵬名宿兵於賀蘭原時出攻邊卨遣將李照甫蕃官歸仁左右分擊又合耿端彥趨賀蘭原伏兵平夏生擒嵬名護老幼三萬餘俞充鄞人神宗時知慶州慶陽兵驕小繩治輒肆悖充嚴約束斬妄言者於軍門聞有病苦則巡撫勞餉死不能舉者出私財以周其喪以故莫不畏威而懷惠環州田與夏境犬牙交錯每獲必遭掠多棄弗理充檄所部復以時耕植慕家族山夷叛舉户亡入西者且三百充遣將張守約耀兵塞上夏人亟反之鄭僅彭城人知寧州諸軍多殺老弱持首要賞僅下令非強壯而能生致者賞半之有內附羌追寇得老人不忍殺擒之乃其父也相持哭一軍感動時諸路爭進討奏捷僅獨保境不生事寇亦不犯姚兕五原人神宗時為環慶巡檢與夏人戰一矢斃其酋衆潰因乘之遂破蘭浪敵大舉寇邊諸寨皆受圍兕時駐荔原堡先羌未至據險張疑兵伺便輒出有悍酋帥臨陳甚武兒斬其首還手射數百人又遣子雄引壯騎馳掩其後所向必克敵退攻大順城兕復往救轉鬬三日斬級數千卒全二城慶軍叛兕以親兵守西關盜不得入而奔兕追及下馬與語皆感泣羅拜誓無復為亂張守約濮州人神宗時知環州慕家族黠很難制搖動種落勒兵討擒之范純仁仲淹子神宗時知慶州秦中方飢擅發常平粟賑貸僚屬請奏而須報純仁曰報至無及矣吾當獨任其責或謗其所全活不實詔遣使按視會秋大稔民歡曰公實活我忍纍公耶畫夜爭輸還之環州种古執熟羌為盜流南方過慶呼冤純仁以屬吏非盜也古避罪讕訟詔御史治於寧州純仁就逮民萬數遮馬涕泗不得行至有自投於河者獄成古以誣告謫加純仁以他過黜知信陽軍范純粹純仁弟哲宗時代兄知慶州時與夏議分疆界純粹請棄所取夏地曰爭地未棄則邊隙無時可除宜修明戰守救援之法朝廷是之及夏侵涇原純粹遣將曲珍破之於曲律搗橫山夏衆遁去章楶浦城人哲宗時知慶州時朝議戢兵捐葭蘆安疆等四寨豫夏夏時得寨益驕粢言夏嗜利畏威不有懲艾邊不得保息宜稍取其土疆如古削地之制以固吾圍然後諸路出兵擇據要害勢將自蹙矣遂乘便出討以致其師夏果入圍環州楶遣驍將折可適伏兵洪德城邀擊之斬護甚衆又預置毒於牛圈瀦水夏人馬飲者多死孫路開封人哲宗時知慶州章惇柄國復議取棄地時諸道相視未進路聲言修舊壘載器甲樓鹵頓大順城下夜半趨安疆遲明據之六日而城完遂築興平橫山曲珍隴干人元祐初為環慶副總管夏人寇涇原號四十萬珍搗盧馳三百里破之曲律山俘斬千八百人解其圍范子奇河南人哲宗時知慶州廣儲蓄繕城柵嚴守備羈黠羌推誠待下人樂為用錢即錢塘人徽宗時知慶州至鎮築安邊城歸德堡開地萬頃縱耕其中歲得粟數十萬強霓自金歸宋知環州隆興間金兵圍環州與其弟震堅守孤城招誘使降不屈城陷死焉並贈觀察使金龎迪延安人熙宗海陵時為慶陽尹厯三考不易以治最聞詔書褒美西人榮之楊仲武保安人皇統初除知寧州關中洊飢境內盜賊縱橫仲武悉為下之馬諷漷隂人天德初為寧州刺史民有告謀不軌者株連數十百人諷察其無狀乃究問告者告者具伏其誣衆皆歡呼感泣盧庸豐潤人大定二十八年進士調定平縣令治舊堰引涇水溉田民賴其利明衡嶽西平人建文時知慶陽府性廉潔常祿外一毫不取劉綱禹州人永樂中知寧州事因俗為治廢墜具興有龍尾湫時出光怪手射滅之泄其水一巨黿也行野中橫石為矼馬驚不敢渡視之則范仲淹所撰狄仁傑碑起之為立祠焉居寧三十四年整肅如一日仁宗賜璽書召問進曰品服俸正統中乞歸送者涕泣載道寧民祀之狄仁傑祠中段復興陽穀人崇禎時為陜西右參議分守慶陽李自成據西安傳檄諭降復興裂其檄集衆守踰月賊薄城圍數匝發炮石殺賊滿濠久之勢不支拜辭其母乘城督戰城陷焚其