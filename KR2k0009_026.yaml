純皇賜扁額並九年命畫苑摹倪卷真迹永藏吳中四十仁宗睿皇帝隨扈有恭和御製獅子林詩名宦漢任延南陽宛人更始元年拜會稽都尉時中土士避亂江南延聘請髙行嚴子陵等待以師友之禮掾吏貧者分祿給之省諸卒耕公田以周窮急行縣慰勉孝子又禮致隱士龍邱萇署議曹祭酒郡中賢士爭往官焉鍾離意山陰人建武初為郡督郵時部縣亭長有受人酒醴者府下記按之意封選記言於太守曰政化之本由近及逺宜先清府內且闊略遠縣細微之愆太守賢之遂任以縣事第五倫京兆長陵人建武中拜會稽太守躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與民之貧羸者其俗多淫祀民常以牛祭神用是財産困匱前後郡將莫敢禁倫移書屬縣曉告百姓屠牛者吏輒行罰後遂斷絶民得以安永平五年坐法徴老小攀車扣馬號呼相隨及詣廷尉吏民上書守闕者千餘人得免歸彭修昆陵人建武中守吳令與太守俱出討賊賊望見車馬競射之修障扞太守中流矢死太守得金賊素聞其恩信即殺弩中修其能梁江革考城人高祖時監吳郡時境內荒儉劫盜公行革至郡惟有公給仗身二十人百姓皆懼不能靖冦革廣施恩撫明行制令盜賊靜息民吏安之何逺剡人梁初嘗監吳郡性耿介疾強富如仇讐視貧細如子弟特為豪右所憚尤厲清節妻子飢寒不以動心所至立祠祀之何敬容廬江人普通中為吳郡太守為政勤恤民隱辨訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之謝舉陽夏人大同中為吳郡太守先是何敬客居郡有美績世稱為何吳郡及舉為政聲迹略相比王規臨沂人中大通時為吳郡太守主書芮珍宗家在吳前守宰皆傾意附之規遇之甚薄珍宗密奏規不理郡事俄徵為左民尚書郡吏民千餘人詣闕請留不許陳沈君理吳興人永定初為吳郡太守是時兵革未靖軍國之用成資東境君理招集士卒修治器械民下悅附深以幹理見稱隋劉權豐人開皇中拜蘇州刺史時江南初平物情尚擾權撫以恩信甚得民和唐岑仲翔江陵人為長州時兄義為金壇今弟仲休為溧水令皆有治績宰相語本道巡察御史母遺江東三岑韋應物京兆長安人建中時為蘇州刺史性高潔與顧況劉長卿邱丹秦系皎然之儔相酬唱于頔洛陽人貞元中蘇州刺史罷淫祠濬溝澮端路衢為政有績滕遂貞元中為長洲令攝吳縣人歌之曰朝判長洲暮判吳道不捨遺人不孤王仲舒并州祁人元和中為蘇州刺史變瓦屋純火災賦調常與民為期不擾自辦范傳正順陽人元和中蘇州刺史有殊政崔俊京兆長安人長慶中蘇州刺史性介潔視贓負者若仇奏課第一白居易下邽人寶厯中為蘇州刺史狄兼謨太原人太和中由鄭州改蘇州刺史以治最擢給事中劉禹錫洛陽人太和中為蘇州刺史以政最賜金紫服楊發馮翊人大中時為蘇州刺史治以恭長慈幼為先宋王禹稱巨野人太平興國中知長洲縣同年生羅處約時宰吳縣日相賦咏人多傳誦宋璫渭南人淳化中三吳歲飢民疾病多死擇長吏養治之命璠知蘇州璫體豐碩素病足至州地卑濕疾益甚或勸其謝疾北歸璫曰天子以民病俾我綏撫我以身病而辭焉非臣子之大義也陳省華閬中人至道中知蘇州遇水災省華復流民數千户殍者悉瘞之詔書褒美陳靖莆田人天禧中知蘇州王質大名莘人天聖中通判蘇州州守黃宗旦得盜鑄錢者百人下獄治退告質曰吾以術鈉致得之質曰以鈎人置之死而又喜仁者之政固如是乎宗旦慚沮為薄其罪張方平南京人景祐中知崑山縣司馬光夏縣人父池在杭求簽蘇州判官事以便親許之滕宗諒河南人慶厯中知蘇州梅摯新繁人慶厯中通判蘇州二浙飢官貸種食已而督償頗急摯言借貸本以行惠乃重困民認緩翰期蔡抗宋城人嘉祐中知蘇州州並江湖民田苦風潮害抗築長隄自城屬崑山亙八十里民得立塍堨大以為利韓正彥安陽人嘉祐中知崑山縣創石隄疏三門得良田數萬頃民立祠祀之滕元發東陽人哲宗時知蘇州孫覺高郵人神宗時知蘇州劉拯南陵人無豐中知常熟縣有善政縣人稱之常安民卭州人元豐中知長洲縣以主信為治人不忍欺追科不下吏使民自輸先他邑以辦王覿如臯人元祐中加直龍圖閣知蘇州州有狡吏善刺守將意以撓權覿窮其姦狀置於法一郡肅然民歌咏其政有吏行水上人在鏡心之語洪彥升樂平人調常熟尉奉母之官既至前尉欲申期三月以規薦而中分俸入彥升處僧舍卻俸不納如約始交印張克戩開封人徽宗時知吳縣吳為浙劇邑民春爭大姓怙勢持官府克戩一裁以法姦猾屏氣召拜衛尉丞趙訓之秦悼王五世孫知吳縣朱勔怙勢役州縣訓之不為屈勔嘗執數輩詣縣請治訓之悉縱之忤勔遂移疾去陳公輔臨海人調平江教授朱勔方嬖幸公輔絶不與交勔有兄喪諸生欲往弔公輔不豫告張浚綿竹人建炎三年金人南侵車駕幸錢塘留朱勝非於吳門捍禦以浚同節制軍馬巳而勝非召浚獨留時潰兵數萬所至剽掠浚招集甫定會苗傅劉正彥作亂改元赦書至平江浚命守臣湯東野祕不宣謀起兵討賊時吕頤浩節制建業劉光世領兵鎮江浚齎蠟書約頤浩光世以兵來會而命張俊分兵扼吳江上疏請復辟趙鼎聞喜人知平江府胡松年懷仁人建炎中知平江府未入境貪吏解印斂迹以興利除害十七事揭於都市百姓便之李光上虞人徽宗時知常熟縣朱勔父沖倚勢暴橫光械治其家僮沖怒風部使者移令吳江光不為屈紹興中除顯謨閣直學士移守平江趙彥倓為平江節度推官攝宜興縣時以牧馬劵科為負嘗預用二年後稅民以此病彥倓請諸司奏釋宿逋禁預借積弊遂絶向子諲臨江人紹興中知平江府金使議和將入境子諲不肯拜金詔忤秦檜意致仕蕭燧臨江軍人紹興中授平江府觀察推官時秦檜當國其親黨密告燧秋試必主文漕臺燧詰其故曰丞相有子就舉欲以屬公燧怒曰初仕敢欺心耶劉穎西安人紹興中知常熟縣後知平江府梁克家晉江人紹興中投平江簽判時金主亮死克家移書陳俊卿謂敵雖遁吾兵力未振不量力而動將有後悔俊卿以白丞相陳康伯歎其逺慮召為祕書省正字周葵宜興人紹興中知平江府金使絡繹於道葵不為禮李衡江都人高宗時授吳江主簿有部使者怙勢作威侵剝下民衡不忍以敲撲迎合投劾於府拂衣而歸洪遵番陽人紹興中金兵由海道窺二浙朝廷以浙西副總管李寶禦之寶駐兵平江以遵嘗薦寶乃命遵知平江及寶以舟師搗膠西凡資糧器械舟楫皆遵供億寶成功而歸遵之助為多先是朝廷慮商舶為敵得悉拘入官既而不返並海縣團萃巨艦及募水手民兵皆縶留未得去遵因對論之以船還商而聽水手自便吳人德之張孝祥烏江人隆興中知平江府事繁劇孝祥剖決庭無滯訟屬邑大姓並海囊橐為姦利孝祥捕治籍其家得榖粟數萬明年吳中大飢迄賴以濟虞允文仁夀人隆興中以顯謨閣學士知平江府汪應辰玉山人乾道中以端明殿學士知平江府袁韶慶元人嘉泰中為吳江丞蘇師旦恃韓托胄威福撓役法提舉常平黃榮檄韶核田以定役師旦密諭意言吳江多姻黨儻相容當薦為京朝官韶不聽是歲更定户籍承徭賦皆師旦黨師旦諷言者將論去榮亟以是事白於朝且薦之沈作賓歸安人開禧中知平江府請得節制許浦水軍詔可郡有使臣故海盜也作賓使招誘其黨既至慰勉之又得強勇者幾千人置將統之號曰義士復募郡城內外惡少亦有幾千人號曰壯士衣糧器械皆視官軍而輕捷善鬬過之於是海道不警市井無譁唐璘古田人嘉定中調吳縣尉以鯁直聞吳淵寧國人紹定中知平江府歲大祲因淵全活者四十二萬三千五百人孫子秀餘姚人紹定中調吳江主簿有妖人稱水仙郡守王遂將使治之莫敢行子秀奮然請佳焚其廬碎其像沈其人於太湖曰實汝水仙之名矣妖遂絶日詣學宫與諸生討論義理吳潛寧國人嘉熙中知平江府條具財計凋敝本末以寬郡民與轉運使王野爭論利害授寶謨閣待制提舉太平興國宫陳塏嘉興人淳祐中知平江府兼淮浙發運使户部侍郎趙必願舉塏最詔特轉一官胡穎湘潭人知平江府兼浙西提黠刑獄榮王府十二人行劫穎悉斬之逾旬命沈於江黃震慈溪人寶祐中調吳縣尉吳多豪勢家告私債則以屬尉民多凍飢窘苦死尉卒手震至不受貴家告府檄攝其縣及攝長洲華亭皆有聲程元鳳徽州人寶祐中判平江府兼淮浙發運使奏免修明局米五萬石包恢建昌人景定中知平江府兼發運豪有奪民包舉田寄公租誣上者恢上疏指以為小民祈天永命之一事帝覽奏惻然罪任事者即歸民田常懋武康人淳祐中調常熟尉辟平江府百萬倉檢察不受和棹事例戢吏卒暴取度宗時知平江值旱故事郡守合得緡錢十五萬懋悉以為民食軍餉助蠲苗九萬稅十三萬版悵十六萬又蠲新苗二萬八千大寬公私之力飛蝗幾及境疾風飄入太湖節浮費修府庫既代有送還事例自給吏卒外餘金萬楮懋悉不受吏驚曰人言常侍郎不受錢果然文天祥吉水人德祐中知平江府元王都中福寧人世祖時以父功授平江路總菅府治中時年甫十七僚吏見其年少頗易視之都中遇事剖析動中肯綮皆􅌓眙不敢欺崑山有詭易官田者事覺而八年不決都中為披故牘洞見底裏其人乃伏辜學舍久壞而郡守缺都中曰聖人之道人所共由何獨守得為乎乃首募大家合錢新其禮殿桂完澤永嘉人嘗從西江左丞李托爾留京師得為平江路管軍鎮撫會賊攻昱嶺關完澤討之凡再戰皆勝尋又與賊鬪為所執其妻弟金德亦被擒臨以白刃脅之降皆不屈賊怒剖二人之腹而死托爾舊作朵兒今改正孔文貞東平人至元中為常熟縣尹歲大潦率民疏境內港浦泄積水而注之江秋乃大稔明魏觀蒲圻人洪武中為蘇州知府適承前太守虐政後務去煩苛與民休息興學校禮賢士盡心民事課績為天下最遷四川參政因部民乞留命還任初張士誠以府治為宫而别遷府治觀還治舊基又濬錦帆涇興水利或諧其興既滅之基坐棄市王觀祥符人由鄉薦擢蘇州知府公廉有威發姦摘伏民憚若神有黠吏錢英屢陷官長觀縛至庭捶殺之姦豪屏迹太祖遣行人齎敕褒之與前守李亨魏觀後守姚善況鍾皆賢稱姑蘇五太守姚善安陸人建文中知蘇州府初太祖以吳俗奢僭重懲以法黠者更持人長短訟獄滋多善務持大體不屑苛細訟為衰止部內布衣賢士咸加優禮政譽翕然劉幹修武人永樂中從户部尚書夏原吉按吳治水改長洲縣丞常躬厯塍陌勞田畯問所疾苦未嘗鞭笞一人卒於官貧不能斂部民助歸其喪葬衣冠於半塘況鍾靖安人宣德中知蘇州府始至羣吏抱牘請判鍾惟吏所欲行止越三日召詰之曰若輩舞文久罪當死立捶殺數人一府大震丁憂將去民歌曰況太守民父母願復來養田叟乞留於朝者三千餘人詔許復任奏免田租七十餘萬石興利去弊鋤強扶弱興學校禮文儒九年秩滿當遷郡民二萬餘人乞再任詔進二秩如民請明年卒吏民聚哭立祠祀之朱勝金華人正統間知蘇州府政尚中和而吏治精練物無遁情案無滯牘嘗曰吏貪吾詞不付房隸卒貪吾不行杖獄卒貪吾不繫囚人歎服之郭南正統中為常熟知縣縣苦役南酌輸米以給役費民甚便之僚屬有事於鄉令以食物隨行縣産軟粟南食之而甘曰後必有以此貢上者為民永世害矣命悉拔之龍晉南京人景泰初為常熟知縣有善政常疏吳淞江獲一石文曰得一龍江水通績用果成林鶚太平人天順時知蘇州府一切簡靖即有建革必審核再三吳人重其名旦夕責效頗笑守迂緩已而見其深思曲算圖久逺利乃稱太守為康濟之才雍泰咸寧人成化中知吳縣太湖水漲沒田千頃泰議作隄富豪讒之於府泰執而痛杖之隄卒成為民利稱雍公隄民有妾亡去妾父訟夫密殺女匿尸湖石下泰曰彼密殺汝女汝何以知匿石下此必汝殺他人女冀得賂耳一拷而服邢宥文昌人成化時知蘇州府有姦民攬納秋賦捕置之法以其贓萬緍隄沙河甓官道一府利之大水民飢不待奏輒發米二十萬斛以賑宥素廉介及治蘇以儒學飭吏治嚴而不苛楊子器慈溪人宏治元年知崑山縣興修水利振起學校過墩師之門泌下車升坐取童子課程校之奬勵若子弟然毁淫祠百餘區土木像投諸水大邑民立祠祀之九年為常熟知縣蘇州諸水率由常熟白茅港入海侍郎徐貫既疏治之己而有漲沙當海口潮汐增淤水患如故子器相許浦塘便近可疏乃率民濬之遂為水利曹鳳上蔡人宏治中知蘇州府俗事五通神每禱祀輒擊牲舉樂謂之恭筵費甚巨鳳禁之焚其廟像巫覡尼師不得出入士庶家置義冢禁火葬裁定婚喪禮使無奢越善政甚著方豪開化人正德中知崑山縣歲大潦民皆逃散豪解冠帶自繫郡獄上奏乞蠲徴獲報可宋儀望永豐人嘉靖中知吳縣民輸白糧京師輒破家儀望令諸區各出公田計役受田贍之下令禁火葬置義冢郭外創子遊祠為文學書院集諸生講習其中王儀文安人嘉靖中為蘇州知府以田額混淆履畝丈之使縣各為籍吏不能欺由是以八事定田賦以三條核稅課徭役雜辦無所不均人人便之治為知府第一任環長治人嘉靖中為蘇州同知時東南倭患起官軍屢北環有才略性慷慨獨以身任之嘗遇賊身被三槍幾殆宰夫直前捍之乃免而宰夫竟死巳賊復至裹創出海擊之竟敗賊纍以功擢右參政蘇松兵備及卒詔建祠蘇州有司春秋致祭曹自守茌平人嘉靖中知吳縣清苦儉約三年不置一衣夜不扃署後去官吳民過其里見一叟賣藥市中視之即自守也遂驚拜道左王鈇順天人有才略嘉靖進士知常熟縣縣大猾匿亡命作姦鈇招之貰其罪使為己用巳而倭冦至鈇語之曰我延爾命正為今日也衆許諾於是立為耆長俾部署子弟合邑中防卒日夕訓練縣故無城鈇議城之訖工而冦至鈇纍戰卻賊又與指揮孔燾破賊寨焚其舟二十七艘溺死無箕尋追賊至海濱陷淖中遇害贈太僕少卿樊玉衡黃岡人萬厯中知崑山縣縣水災自駕小艇驗視與飢民對啖菜粥朝議方急逋賦玉衡曰民逋賦時我止數齡耳今其人巳老且死何忍窮追耶止不徴民益樂輸恐後編審户役三日而畢蕭景腆福建人萬厯中長洲縣丞太監張志聰過郡指索縣令郭波不得縛之車後景腆率所部弓乎直前奪波且手批志聰市民皆梯屋飛瓦助之事聞逮詔獄得免死吳人立碑記其事葉成章同安人萬厯間長洲令甫至漫不省事既而判決如流邑中利弊洞若觀火吏胥屏息以最擢御史民立祠祀之耿橘瀋陽衛人萬厯中知常熟縣首復子遊書院講求水利開嘗福山塘三丈浦奚浦李墓塘梅李塘貴涇橫瀝湖漕橫浦六尺溝等河工畢而民不擾邑民世享其利著有常熟水利興革實政二書楊漣應山人萬厯中知常熟縣亷直不撓築雲和隄五十里設義學聚邑之秀民延師教之民為立祠焉石崑玉黃梅人由饒州知府以才調蘇州清勤愛民歲飢賑濟有法巡撫李淶因事中之落職候勘士民數千人詣淶訟冤誣卒白後以福建右參政舉治行卓異廷謁時吏部尚書趙煥見曰此石蘇州耶遂擢右僉都御史巡撫大同陳洪謐晉江人崇禎中知蘇州府歲飢榖騰貴惡少年直入人家盜劫倉粟洪謐捕亂首杖殺之乃發廩賑貸勸富人平糶大興工役使少壯者得食民以不飢吳江民變即單騎往諭皆羅拜自伏性慈和非重犯不施鞭撲人號陳母馮元揚慈溪人崇禎八年以布政司參議備兵蘇松時溫體仁與唐世濟橫於湖州其鄉人為盜太湖率以兩家為與主人莫敢問元揚捕得輒發露之最後獲其魁則世濟族子也立置之法太倉人陸文聲訐張溥張采倡復社亂天下元揚稱二人好學真修斥文聲誣妄遂忤體仁意謫官熊開元湖廣人崇禎中知吳江縣舊南北糧運役法不均開元均配畫一民歌其德本朝丁允元日照人順治二年知蘇州府時定鼎之初庶事草創允元練習典故因事釐正綱紀粲然尤加意人才所識拔多知名士湯家相趙城人順治已丑進士知常熟縣潔己愛民釐别耗蠧撫恤流亡善政具舉前令以𬒳劾逮問家相常左右之力白其誣時江南五郡逋賦二百萬緡得旨俱奪職家相坐免士民爭先輸納不踰宿而額足且以治狀走訴當事請留弗獲郭文雄文水人順治十六年知崑山縣為政簡易得民民有逋賦者揭姓名縣門不遣一役而輸者如市邑俗多借人命為訟端文雄令毆人至死者里鄰公舉得實即坐之姦民有居為奇貨來告者論如律自是命案漸稀卒於官邑民葬之馬鞍山南吳道煌宛平人康熙二年知蘇州府郡舊有逋賦數百萬道煌悉緩其徵曰吾下考不辭也卒以免官民為祠祀之孫繼德州人知長洲縣邑賦五十萬以徵不及額去官者前後相屬繼主於緩徴以蘇民曰巳辦下考矣斷獄光平允受事日即有上官吏來趣成前令盜案繼察獄詞知盜乃誣入者盡出之卒得真盜沈思舉汀州人康熙中知長洲縣鞭撲不施而課賦無缺立需索單於里甲月一填報輿皂斂迹歲旱且蝗思舉禱於神蝗去而雨大至遂以有秋以盜案免官民祀之前令葉成章祠題曰雙清于宗堯遼東廣寧衛人年十九知常熟縣人或易之宗堯鋭意吏事釐姦興利百務具舉雖老成不逮邑素苦於漕宗堯視事三月盡除其害性孤介不受一錢豪強畏之無敢干其法者三年卒於官邑男女皆巷哭留葬虞山之麓郭琇即墨人康熙中知吳江縣材力強幹屢斷疑獄民驚為神徵輸行版串法分為十限胥吏無從假手總督于成龍巡撫湯斌皆稱其清而能以卓異特薦孔允祖曲阜人以貢生任經厯署吳江縣事時縣經兵火城無居民允祖招撫勤恤又以兵駐邑為民患請上官撤去之順治三年剿土冦陳亡事聞議恤如例總纂官臣王廣蔭恭纂輯前提調官臣張日章恭覆輯校對官臣吳華淳恭校校對官臣賀式韓恭覆校
