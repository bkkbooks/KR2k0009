望齊門吳越春秋闔閭為太子波聘齊女女少思齊日夜號泣因病乃起北門名曰望齊門令女往遊其上府志東北門也一曰巫門越絶書吳有巫門吳地記作平門子胥平齊大軍從此出故號平門東北三里有巫咸墳亦號巫門吳郡志巫字類平因訛今有平門塘府志北門也儲城在吳縣西南吳地記胥門南三里有儲城吳王儲糧之所魚城在吳縣西南吳地記胥門南十五里有魚城續圖經蓋吳王控越之地宜為吳城謂之魚城誤周必大南歸録魚城基厚而方土極細故久不壞越城在吳縣西南十八里石湖旁吳郡志在胥門外吳王在姑蘇越築此城以逼之城堞髣佛具在苦酒城在吳縣西南二十里吳郡志魚城西南有故城長老云吳王築以釀酒今俗呼為苦酒城吳地記在胥門西南三里石城在吳縣西吳越春秋闔閭興樂石城越絶書闔閭所置美人離城也章懷太子曰在吳縣西南吳郡志硯石山有石城去姑蘇山十里居東城在長洲縣界越絶書居東城者闔閭所遊去縣二十里劉昭注訛為居巢城搖城在長洲縣東南越絶書搖城吳王子居焉後越王搖居之姑蘇志在縣東南三十八里今其地名大姚鴨城在長洲縣匠門外東南二十里沙里中寰宇記吳王養鴨所也又東五里有豨巷是養豬之所又東二里有豆園吳王養馬處麋湖城在長洲縣北五十里越絶書闔閭所置麋也又巫門外有麋湖西城越宋王城也又有太公城章祈城並在縣東北姑蘇志章祈疑即􅝄􅖥在今二十二都鴻城在元和縣東婁門外越絶書故越王城也又有後城堵城並在縣東南數十里今尹山鄉有堵城里巫欐城在元和縣東十五里越絶書闔閭所置諸侯逺客離城也又有欐溪城闔閭所置船宫也陽城在元和縣東北三十里環繞有湖曰陽城湖相城在元和縣東北五十里相傳子胥𥘉築城時先於此相地壘土為城下溼乃止其地因以為名南武城在崑山縣西北漢書地理志婁縣有南武城闔閭所造以候越越絶書婁縣有城去縣三十里今為鄉姑蘇志有武城村在朱塘鄉三四保府志又有巴城在縣西北十八里金城在縣東三里度城在縣東南七十里相傳為黃巢築西鹿城江南通志西鹿城在崑山下有卜將軍廟碑云葬於崑山西鹿城雉城在崑山縣西北十八里陶城在常熟縣東三十里相近又有閭城郭城利城皆有遺址而陶城尤大與莫城等今縣境共有十二城唐廣明中盜起詔諸道州縣於墅落許立城堡集民兵自衛縣城之多蓋以此支塘城在常熟縣東四十五里元末張士誠浚白茆時因故城址修築今為支塘市莫城在常熟縣東南十二里相傳莫邪鑄劒之所亦謂之劔城今有廟曰莫邪大王或謂之莫邪城有塘曰莫門又縣東四十里有莫城樂史以為漢莫寵築以壯海防者扈城在常熟縣北五里世傳吳王建離宫扈蹕故名今有扈城村九里城在常熟縣北九里琴川志今縣北福山塘東岸直九折塘口有古城址今尚存去縣十三四里尚墅城在常熟縣北十八里通志張士誠入福山港修此城以屯兵金鳳城在常熟縣北四十里舊志唐天祐中吳越所築在金鳯山下故名即今福山城址鵧城在昭文縣東北十五里又有朗城亦在縣境養魚城寰宇記在吳江縣西二十五里吳王養魚之所陌城在吳江縣北一名石頭城亦名酒城又名壇城史記正義子胥見夢越軍令從東南入越王乃回軍從蘇州東南三十里三江口向下三里臨江北岸立壇殺白馬祭子胥杯動酒盡因立廟於江上今其側有浦名上壇浦寰宇記石頭城在吳縣東南三十五里大江邊一名陌城夫差既殺子胥後悔之臨江築塘創設祭奠百姓緣為立廟於此吳郡志酒城在壇塘邊一名壇城夫差祭子胥處臨祭勸酒故名干隧在長洲縣西北戰國策蘇秦曰越王以散卒三千禽夫差于干隧史記正義干隧在吳縣西北四十餘里甪里在吳縣西南史記四皓有甪里先生正義吳人姓周太伯之後今太湖中洞庭山西南中有祿里村是吳郡志有角頭即角里在洞庭山村烏夜村在吳江縣南吳郡志晉穆帝后何準女寓居縣南産后於此將産之夕有羣烏夜驚於村落衆共異之自後烏夜鳴必邀恩赦雞陂墟在元和縣東越絶書婁門外雞陂墟吳王所以畜雞去縣二十里本朝乾隆二十二年南巡髙宗純皇帝御製有雞陂墟詩鶴市在元和縣東吳越春秋闔閭葬女舞白鶴於市中令萬民隨而觀之還使男女與鶴俱入羡門因發機以掩之縣志今縣東有鶴舞橋南園在吳縣治府學旁宋王禹稱為長洲令常攜客醉飲於此有詩云他年我若功成後乞與南園作醉鄉續圖經南園之興自吳越廣陵王元璙帥中吳好冶林圃於是釃流為池積土為山島嶼峯巒出於巧思求致異木積歲皆合抱舊有三閣八亭二臺龜首旋螺之類歲久摧圮其存者猶有流杯四照百花藥室惹雲風月等處每春縱士女遊覽焉又有元璙别宅與南園相近本朝乾隆二十二年御製寄題南園詩梧桐園在吳縣西南吳郡志在吳宫本吳王夫差園也樂府曰梧宫秋吳王愁新志在館娃宫側辟疆園在吳縣界晉時顧辟疆之園也王獻之入會稽經吳門先不識主人值辟疆方集賓友酣燕園中而獻之遊厯既畢指麾好惡旁若無人唐時其園猶在顧况嘗假以居陸龜蒙詩吳之辟疆園在昔勝槩敵前聞富修竹後説紛怪石不知清景在盡付任君宅續圗經任晦宅見於皮陸詩有深林曲沼危亭幽砌殆即辟疆之園也今任園亦不可考本朝乾隆二十二年二十七年御製有辟疆園詩西園在長洲縣東吳郡志本郡圃之西隙地直子城甚袤今為教場俗呼後設場拙政園在婁門外茂樹曲池勝甲吳下長洲苑在長洲縣西南越絶書闔閭走犬長洲漢書枚乘説吳王濞曰漢修治上林圈守禽獸不如長洲之苑服虔曰吳苑孟康曰以江水洲為苑也韋昭曰長洲在吳東晉左思吳都賦佩長洲之茂苑元和志長洲取長洲苑為名苑在縣西南七十里吳郡志長洲在姑蘇南太湖北闔閭遊獵處也樂圃在吳縣北續圖經本錢氏廢圃廣輪逾三十畞高岡清池粗有勝致長文棲隱於此號曰樂圃吳郡志錢氏時號金谷館娃宫在吳縣西南越絶書吳人於硯石山作館娃宫吳都賦幸乎館娃之宫張女樂而娛羣臣吳郡志靈巖山頂舊有秀峯寺即吳館娃宫也吳地記閭閭城西有硯石山上有館娃宫今靈巖寺即其地本朝乾隆十六年二十二年二十七年四十五年御製靈巖詩雜詠有館娃宫詩五疉沈德潛韻南城宫在長洲縣東越絶書南城宫在長樂里吳郡志又有美女宫夫差所作土城周百九十步句踐所進美女西施鄭旦之宫室也吳宫在長洲縣東陸龜蒙問吳宫辭序云甫里之鄉曰吳宫在長洲縣東南五十里其名存其迹滅悵然興懷因作辭以問之今有吳宫鄉東宫西宫在長洲縣界闔閭所建越絶書東宫周一里二百七十步西宫在長秋周一里二十六步又前宫後宫西宫在吳江縣沈張湖之西皆吳王夫差離宫也今村名猶沿其舊黃堂在長洲縣東吳郡志春申君子假君之殿也後太守居之數失火塗以雄黃遂名黃堂即今太守正廳是也天下郡治皆名黃堂倣此木蘭堂在長洲縣束吳郡志在郡治後唐張搏自湖州刺史移蘇州於堂前大植木蘭花當盛開時燕郡中詩客陸龜蒙詩為一時絶唱又雙蓮堂在木蘭堂後舊芙蓉堂也至和初郡守吕濟叔建三賢堂在長洲縣東吳郡志舊名思賢亭祀韋應物白居易劉禹錫紹興中重建改曰三賢堂本朝乾隆二十二年御製有三賢堂詩二十七年三十年四十五年四十九年俱有御製三賢堂用高啓韻詩七檜堂在長洲縣南輿地紀勝在天慶觀之東葉參少卿守吳因居焉作此堂以佚老三瑞堂在長洲縣西楓橋宋孝子姚淳所居其先墓有甘露靈芝瑞參之異蘇軾嘗為賦詩有楓橋三瑞皆目見之句四賢堂在崑山縣城內姑蘇志宋孝宗朝李衡為御史與諫官王希吕相繼論張説不報時給事中莫濟不書敕直學士周必大不草制四人同時去國布衣莊治賦四賢詩以紀之其後衡之孫潛作堂於家畫四賢像並祀之半隱堂在崑山縣治宋莫仲宣所築又有西園其别墅也韓托胄當國仲宣間居十年號西園居士玉山草堂在崑山縣西界溪上府志元顧仲瑛築亦曰玉山佳處園池亭榭詩酒觴詠時稱吳中第一楊維楨為之記城南佳趣堂在常熟縣虞山東芝溪上姑蘇志邑人虞子賢嘗得朱子和張忠獻城南佳趣雜詠真迹遂以名堂元周伯琦書額齊雲樓在長洲縣郡治後子城上即古月華樓吳地記唐曹恭王所建白居易有齊雲樓晚望詩今名飛雲閣本朝乾隆二十二年御製有齊雲閣詩初陽樓在長洲縣東吳郡志在郡中池上皮日休詩危樓新製號初陽觀風樓在長洲子城西龔明之中吳紀聞唐時謂之西樓白居易有西樓命宴詩後更為觀風今復為西樓虹月樓在新陽縣通闠橋西元人朱君璧善畫嘗作紫霧龍宫圖十年始就人謂其妙入神品後兵亂君璧抱圖坐樓中寇望虹氣貫月疑有寶蹤迹而至攘取觀之怒裂而去楊鐡崖易其名曰虹月樓並記之虎邱閣在元和縣虎邱山元陶九成輟耕録平江虎邱閣版上有一竅當日色清朗時以掌大白𥿄承其影則一寺之形勝悉見於此而頂反居下本朝乾隆二十二年御製有虎邱閣詩滄浪亭在郡學之南葉夢得石林詩話錢氏廣陵王元璙别圃宋蘇舜欽得之築亭曰滄浪因作滄浪亭記吳郡志積水彌數十畞旁有小山高下曲折與水相縈帶府志子美死屢易主後亭為章申公家所有紹興後歸韓世忠家俗名韓王園本朝乾隆二十二年四十九年有御製滄浪亭詩金閶亭在吳縣閶門外陸龜蒙謂梁鴻墓在金閶亭下一里是也池光亭在長洲縣郡宅後池北唐白居易命名紹興十七年郡守鄭滋重建四照亭在長洲縣郡圃東北宋郡守王渙為屋四合各植花石隨時之宜又有秀野亭在城北郡守洪遵建胥屏亭在長洲縣西北寰宇記虎邱東北十里有胥屏亭流杯亭在長洲縣北吳地記在女墳湖西二百步闔閭三月三日泛舟遊賞之處范公亭在崑山縣薦嚴寺後圃宋參政范成大讀書寺中遊息於此因名松江亭在吳江縣東吳淞江口唐白居易有淞江亭攜樂觀魚詩方輿勝覽又有吳江亭宋蘇舜欽有詩鱸鄉亭在吳江縣東長橋上吳郡志始陳堯佐題松陵詩有秋風斜日鱸魚鄉之句紹興中林肇為令作亭江上以鱸鄉名之本朝乾隆二十二年有御製鱸鄉亭詩垂虹亭在吳江縣長橋宋慶厯中令李問建蘇軾自杭移高密與張子野等俱在松江夜半月出置酒垂虹亭上吳郡志吳江利往橋有亭曰垂虹而世並以名橋按米芾詩所謂垂虹秋色滿東南是也如歸亭在吳江縣東南吳郡志在松江蔡襄題壁云蘇州吳江之濱有亭曰如歸者隘壞不可居康定元年知縣事祕書丞張先始為大之醉眠亭在吳江縣松江吳郡志李無晦所居李高尚不仕徙居松江治園亭號醉眠放鶴亭在支硎山西南峯寺中今寺廢而亭存即支公别庵也本朝乾隆二十七年御製放鶴亭戲題詩般若臺在吳縣城內吳地記晉何曾置在吳縣西二里東北有般若橋姑蘇臺在吳縣西南越絶書胥門外有九曲路闔閭造以遊姑胥之臺而望太湖去縣三十里又子胥諫夫差不聽曰吾見鹿豕遊姑胥之臺也史記正義臺在吳縣西南三十里橫山西北姑蘇山上吳地記闔閭造此經營九年始成其臺高三百丈望見三百里本朝乾隆十六年御製吳山十六景有蘇臺春景詩射臺在吳縣西南越絶書射臺二一在華池平昌里一在安陽里吳地記在吳縣橫山安平里任昉述異記吳王射臺柱礎皆伏龜郊臺在吳縣西南吳郡志在橫山東麓下臨石湖壇壝之形儼然相傳吳僭王時或曾祀帝也本朝乾隆二十二年御製郊臺詩琴臺寰宇記吳縣硯石山有琴臺續圖經又有響