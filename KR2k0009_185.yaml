body:
  text: 大清一統志貴州統部在京師西南七千六百四十里東西距一千九十里南北距七百七十里東至湖南晃州廳界五百四十里西至雲南曲靖府霑益州界五百五十里南至廣西慶遠府南丹州界二百二十里北至四川重慶府綦江縣界五百五十里東南至廣西柳州府懷遠縣界三百五十里西南至雲南曲靖府平彞縣界五百三十里東北至湖南永綏廳界五百二十里西北至雲南東川府會澤縣界五百六十里分野天文井鬼翼軫分野鶉首鶉尾之次漢書地理志秦地於天官東井輿鬼之分野也西南有牂牁宜屬焉楚地翼軫之分野也今之武陵楚分也唐書地理志劒南道漢牂牁之地總為鶉首分江南道夷播思費溱為鶉尾分清類天文分野之書井鬼分鶉首之次翼軫分鶉尾之次建置沿革禹貢荆梁二州徼外商周為鬼方地戰國屬楚為黔中地兼為夜郎且蘭諸國史記西南夷列傳注正義曰今瀘州南大江南岸本夜郎國水經注豚水東逕且蘭縣謂之牂牁水水廣數里縣臨江上故且蘭國也秦屬黔中郡漢初為南夷地元鼎六年開置牂牁郡史記西南夷傳已平頭蘭遂平南夷為牂牁郡正義曰崔浩云牂牁繫船杙也常氏華陽國志云莊蹻伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎以且蘭有椓船牁處乃改其名為牂牁漢書地理志牂牁郡元鼎六年開縣十七水經汪且蘭縣故且蘭侯國也一名頭蘭牂牁郡治也牂牁江中兩山名左思呉都賦云吐浪牂牁者也元和志費州播州漢置牂牁郡按牂牁史記正義崔常兩說與水經注義各不同未知孰是史記後漢書作牂牁漢書水經注作牂柯元和志作䍧牁兼為武陵郡地元封五年屬荆益二州刺史漢書地理志武陵郡屬荆州牂牁郡屬益州後漢因之三國分屬吳蜀漢晉分屬荆益寕三州後屬荆寕二州晉書地理志荆州武陵郡益州牂牁郡寕州興古郡宋書州郡志晉太安二年寕州増牂牁郡宋屬寕郢二州宋書州郡志寕州刺史領郡牂牁太守興古太守孝武孝建元年分荆州之武陵立郢州武陵太守領縣酉陽長黚陽長齊梁因之陳屬武州陳書文帝紀天嘉元年分荆州置武州治武陵郡兼屬蠻獠元和志夷州本徼外蠻夷地自漢至陳並屬牂牁郡厯代恃險多不賓附按通典隋書寕州至梁末為西爨蠻所據則牂牁興古二郡此時蓋已入蠻周置費州舊唐書地理志費州漢牂牁郡地久不臣附周宣政元年信州總管龍門公裕招慰生獠王元殊多質等歸國乃置費州隋初屬庸州牂州費州後改州為郡屬梁州刺史舊唐書地理志費州隋黔安郡之涪川縣播州隋牂牁郡之牂牁縣思州隋巴東郡之務川縣夷州隋明陽郡之綏陽縣大業末入於蠻通典牂牁巨帥姓謝氏舊臣中國代為本土牧守隋末大亂遂絶唐武德初復開置諸州唐書地理志武德二年以隋明陽郡之信安縣置義州三年以牂牁蠻地置建安縣為牂州牂牁蠻别部置平蠻縣為充州四年以蠻地置矩州隋巴東郡之務川縣置務州又以務州之安夷縣置夷州改牂州為牁州後仍改牁州為牂州五年改義州為智州貞觀元年廢夷州三年以東謝蠻地置都尚縣為應州以南謝蠻地置石牛縣為南夀州以西趙蠻地置明州四年改務州為思州南夀州為莊州以思州之涪川縣開南蠻置費州黔州之都上縣開南蠻置夷州貞觀元年屬江南道四年屬黔州都督府元和志貞觀四年於黔州置都督府總施業辰智牂充務應莊九州按舊唐書地理志武德四年置黔州都督府今考通典諸書武德七年改諸總管府為都督府則黔州都督之置當依元和志為是施業辰三州俱在今湖北湖南省境十一年置莊州都督府以黔州都督府諸州來屬舊唐書地理志黔州都督府貞觀十一年督思辰施牢費夷巫應播充莊牂炎池矩十五州其年罷都督府置莊州都督府寰宇記莊州天授三年升為都督府統三十六州按唐書志貞觀九年於隋牂牁郡之牂牁縣置恭水縣為郎州十一年廢郎州及恭水縣改智州為牢州徙治義泉縣又徙夷州於綏陽縣十三年以牂牁地復置恭水縣為播州十六年廢牢州開山洞置榮懿縣為溱州夜郎縣為珍州寰宇記貞觀十七年廓闢邊夷置播川鎮後以鎮為珍州長安四年改舞州開元十三年又改鶴州十四年復為珍州今考新舊唐志元和志改舞州鶴州者奬州也寰宇記疑誤又按莊州置都督之年及所統州數寰宇記與舊唐志不合今以舊唐志為正景龍四年罷莊州都督府置播州都督府先天二年罷播州都督府復以諸州屬黔州都督府舊唐書地理志播州都督先天二年廢復以黔州為都督天寶元年改黔州為黔中郡依舊都督施夷播思費奬珍溱商九州又領充明勞羲福建邦炎清莊峩蠻牂鼓儒琳鸞令那暉郝總敦侯免牁契稜添普寕功亮茷龍延訓鄉雙整懸撫次水矩思源逸殷南平勲姜龍小等五十小州皆羈縻寄治山谷按唐書志鼓作建作犍邦作䢴儒作濡郝作都侯作候免作晃契作樊茷龍作茂龍鄉作卿雙作雙城撫次水作撫水龍作襲又有應蒍寶鴻四州無牁州其諸州所治多不知所在開元二十一年屬黔中道採訪使天寶元年改諸州為郡舊唐書地理志夷州天寶元年改為義泉郡播州改為播川郡思州改為安夷郡費州改為涪川郡溱州改為溱溪郡珍州改為夜郎郡乾元元年仍改諸郡為州大順元年屬武泰軍節度使唐書方鎮表大厯十二年置黔州經畧招討觀察使領夷思費播溱珍等州大順元年賜黔州觀察使號武泰軍節度使五代時復為蠻地文獻通考夜郎國唐置費珍莊炎播郎牂夷等州唐末王建據西川由是不通中國後唐天成二年牂牁清州刺史宋朝化等一百五十人來朝孟知祥據蜀復不通朝貢明統志普安州蒙氏時為南詔東鄙播州唐末沒於夷溱州五代時淪於蠻黎平府五代時思州田氏據其地宋初為羈縻地宋史西南溪洞諸蠻傳乾德三年珍州刺史田景遷内附開寶元年景遷言本州連嵗災沴乞改為高州從之太平興國三年夷州蠻任朗政等來貢淳化五年費州來貢熙寕後置州屬夔州路轉運使宋史地理志夔州路南平軍溱溪砦本羈縻溱州熙寕七年招納置榮懿等砦隸恭州後隸南平軍大觀二年别置溱州及溱溪夜郎兩縣宣和二年廢州及縣以溱溪砦為名隸南平軍珍州唐末沒於夷大觀二年大駱解上下族帥獻其地復建為珍州綏陽本覊縻夷州大觀三年酋長獻其地建為承州領綏陽都上義泉安夷洋川五縣宣和三年廢州及都上等縣以綏陽縣隸珍州播州大觀二年南平夷人楊文貴等獻其地建為州領播川琅川帶水三縣宣和三年廢其城隸南平軍端平三年復以白錦堡為播州三縣仍廢嘉熙三年復設播州充安撫使咸淳末以珍州來屬又遵義砦大觀二年播州楊文貴獻其地建遵義軍及遵義縣宣和三年廢州及縣以遵義砦為名隸珍州開禧三年升軍嘉定十一年復為砦思州政和八年建領務川邛水安夷三縣宣和四年廢州為務川城邛水安夷二縣皆作堡隸黔州紹興元年復為思州務川安夷邛水並復元置思州宣慰司播州宣慰司八番宣慰司順元宣撫司新添葛蠻安撫司貴州宣慰司並屬湖廣等處行中書省元史地理志湖廣等處行中書省八番順元蠻夷官管番民總管順元等路軍民安撫司思州軍民安撫司播州軍民安撫司新添葛蠻安撫司又世祖紀至元十八年勅鎮遠隸潭州行省二十一年改思播二州隸順元路宣撫司二十二年以荆湖行省所隸八番羅甸隸四川行省二十六年以八番羅甸隸湖廣行省二十八年以湖廣行省八番羅甸司復隸四川行省割八番洞蠻自四川隸湖廣行省普安路普定路屬雲南等處行中書省烏撒宣慰司都雲定雲安撫司屬四川等處行中書省明洪武初仍分屬湖廣四川雲南十五年置貴州都指揮使司永樂十一年置貴州等處承宣布政使司明實録永樂十一年以思州二十二長官司分設思州新化黎平石阡四府思南十七長官司分設思南鎮逺銅仁烏羅四府而於貴州設貴州等處承宣布政使司以總八府仍與貴州都司同管貴州宣慰司十三年改普安安撫司為普安州隸布政司宣德九年并新化府入黎平府正統三年革烏羅府隸銅仁思南二府又改貴州金筑安撫司井鎮寕州永寕州安順州俱隸貴州布政司成化十二年設程番府宏治七年設都勻府隆慶三年更名程番府為貴陽府萬厯二十九年分播地為二郡以關為界關内屬川曰遵義關外屬黔曰平越其二府與貴陽府俱加軍民二字以便兼攝三十年升安順州為安順軍民府本朝因之為貴州省領貴陽安順平越都勻鎮遠思南石阡思州銅仁黎平十府康熙四年增置黔西府以宣慰司之水西城置平遠府以水西宣慰司之比喇壩置大定府以水西宣慰司之大方城置改烏撒軍民府為威寕府來隸舊隸四川布政司至是改名來隸二十三年罷黔西平遠二府俱改為州隸大定府二十六年罷貴州都指揮使司又罷大定府改為州與平遠黔西二州俱隸威寕府雍正五年增置南籠府舊置南籠通判於安籠所為南籠廳至是改為府以安順府所屬普安州及安南普安二縣并新設永豐州隸焉七年以遵義府來隸舊隸四川至是來隸仍置大定府罷威寕府為州隸大定府乾隆四十一年置仁懷直隸廳罷遵義通判即其所駐仁懷舊縣地為仁懷直隸廳嘉慶二年改南籠府為興義府以所屬永豐州改為貞豐州三年以普安州屬黄草壩地置興義縣改銅仁府屬之松桃同知為松桃直隸廳三年改平越府為平越直隸州罷平越縣以黄平州改隸鎮遠府十四年升興義府屬之普安州為普安直隸州十六年改為直隸廳共領府十二直隸州一直隸廳三貴陽府安順府都勻府鎮遠府思南府石阡府思州府銅仁府黎平府大定府興義府遵義府平越直隸州松桃直隸廳普安直隸廳仁懷直隸廳形勢居天下之西南東阻五溪西控六詔南連百粤北距三巴舊志上則盤江旋繞下則㵲溪順流沈思充志關雄虎踞路繞羊腸衞既齊志窮地之險極天之峻一人荷㦸萬夫趦趄周廷用記坤位雄都邊陲厄塞滇楚鎖鑰蜀粵藩屏舊志文職官雲貴總督管轄雲南貴州兩省駐雲南省城巡撫駐貴陽府提督學政駐貴陽府布政使司布政使經厯舊有照磨乾隆十四年裁庫大使豐濟按察使司按察使照磨司獄糧驛道兼貴平石等處巡道事駐貴陽府分巡貴西兵備道駐威寕州舊駐安順府乾隆十七年改駐分巡貴東兵備道駐古州貴陽府知府同知駐長寨舊有通判乾隆三十五年裁府學敎授訓導經厯舊有司獄嘉慶二年裁以經厯兼管知州三員開定番廣順州判二員定番一駐大塘一駐羅斛羅斛州判原屬興義府之貞豐州乾隆十四年改隸州學學正三員訓導三員吏目三員知縣四員貴筑貴定龍里修文貴筑舊有縣丞嘉慶二年裁縣學敎諭四員訓導四員典史四員巡檢修文縣札佐司乾隆十五年設安順府知府同知駐郎岱通判駐歸化營府學敎授訓導經厯駐舊安順州知州二員永寕鎮寕州學學正二員訓導二員吏目二員知縣三員普定清鎮安平縣學敎諭三員訓導三員典史三員巡檢二員安順府羊場塘乾隆二十年設永寕州慕役司嘉慶三年設都勻府知府理苗同知駐八寨理苗通判二員一駐丹江一駐都江府學敎授訓導經厯知州二員麻哈獨山州同獨山駐三角􅋭州學學正二員訓導二員吏目二員知縣三員都勻清平荔波縣丞二員清平駐凱里荔波駐方村縣學敎諭二員訓導三員典史三員鎮遠府知府理苗同知駐台拱理苗通判駐清江府學敎授訓導經厯知州黄平舊隸平越府嘉慶三年改隸州學學正訓導吏目知縣三員鎮遠施秉天柱縣丞三員鎮遠