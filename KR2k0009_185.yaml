同仁不間遠邇特置大帥安集招懷非有徵求於汝也蠻人大悅阿爾哈雅輝和爾人為荆湖行省平章事鎮潭州至元十六年降八番羅甸蠻以其總管文龍兒入見置宣慰司八番羅甸卧龍羅畨大龍遏蠻盧番小龍石番方番洪番程番並置安撫以鎮之凡所得州峒夷山獠不可勝計大率以口舌降之未嘗專事殺戮又其取民悉定從輕賦民所在立祠祀之阿爾哈雅舊作阿里海牙輝和爾舊作畏吾兒今俱改正劉繼昌至元中為兩淮招討使經厯十六年潭州行省阿爾哈雅遣招下西南諸番繼昌深入險阻大播德威八番兩江溪洞皆降附焉詔以龍方零等為小龍番等處安撫使仍以兵三千戌之番境始安阿爾哈雅譯見前李德輝潞縣人至元十七年為安西行省左丞時西南夷羅施鬼國復叛詔雲南湖廣四川兵討之兵且壓境德輝適被命在播乃馳驛止三道兵勿進遣張季思諭鬼國趣降其長阿察熟德輝名曰是活合州李公耶其言明信可恃即身至播州降乃改鬼國為順元路以其酋為宣撫使其後有譖德輝受鬼國馬千數者帝曰是人朕所素知雖一羊不妄受安有是耶其年德輝受降至黄平以病卒贈中書右丞諡忠宣伊遜岱宗沙卜珠台人至元中為四川西道宣慰使加都元帥羅施鬼國亦奚不薛叛詔以四川兵會雲南江南兵討之至會靈關亦奚不薛遣先鋒阿麻阿豆等將數萬衆迎敵伊遜岱宗馳入其軍挾阿麻阿豆出斬之亦奚不薛懼率所部五萬餘户降以功拜西川等處行中書省右丞伊遜岱宗舊作也速答兒沙卜珠台舊作珊竹帶今俱改正蘇赫蒙古人至元十九年亦奚不薛叛置順元等路軍民宣慰司以蘇赫為宣慰使經理諸蠻降八番金竹等百餘砦得户三萬四千悉以其地為郡縣置順元路金竹府貴州以統之東連九溪十八洞南至交趾西至雲南咸受節制蘇赫舊作速哥今改正李呼朗圭一名庭玉隴西人至元二十一年以四川南道宣慰使與㕘政奇爾濟蘇僉省怕克巴左丞汪惟正分兵進取五溪洞蠻伐山通道連亘千里諸蠻酋長皆率衆來降尋以老病歸李呼朗圭舊作李忽蘭吉奇爾濟蘇舊作曲里吉思怕克巴舊作巴八今俱改正烏魯斯喀爾氏人至元二十六年置八番羅甸宣慰司以烏魯斯為宣慰使時諸蠻叛服不常烏魯斯平之乃立安撫等司以守焉二十八年平揚都要等明年為八番順元等處宣慰使都元帥大德六年授通奉大夫羅羅思宣慰使兼管軍萬户武宗立召還烏魯斯舊作斡羅思喀爾氏舊作思康里氏今俱改正莽哈岱契丹人世祖時為隨路新軍總管統領山西兩路新軍從行省伊遜岱宗征蜀及思播有功升萬户從攻羅必甸破之成宗即位授烏撒宣慰使遷大理金齒等處宣慰使都元帥六年烏撒羅羅斯叛討平之九年討普安羅雄州叛賊阿填擒殺之進驃騎衞上將軍遥授雲南行中書省左丞行大理金齒等處宣慰使都元帥卒於軍贈平章政事封濮國公莽哈岱舊作忙古帶今改正伊遜岱宗譯見前張宏綱東安人大德五年從右丞劉深征八百媳婦師次順元土官宋隆濟糾合諸蠻為亂宏綱力戰殁贈宣忠秉義功臣追封齊郡公劉國傑女直人烏庫哩氏改姓劉氏元貞元年為湖廣行省平章政事大德五年羅鬼女子蛇節反烏撤烏蒙東川芒部諸蠻從之陷貴州詔國傑將兵討之賊兵勁利且多健馬官軍戰失利國傑令軍士人持一盾布釘其上俟陣合即棄盾偽遁賊逐之馬奮不能止遇盾皆仆國傑鼓之賊大敗既而復合衆請戰國傑不應數日度其氣衰一鼓破走之追戰數十里擒斬蛇節宋隆濟阿女等西南夷悉平烏庫哩舊作烏古倫今改正曹伯啟碭山人延祐元年遷刑部侍郎八番帥擅殺啟邊釁朝廷用師伐之命伯啟往詰其事次沅州道梗伯啟恐兵往則彼驚將致亂乃遣令史楊鵬單騎往諭新帥備得其情止奏坐前帥擅殺罪邊民以安明呉良定遠人洪武五年古州八萬諸洞蠻為亂良以江陰侯充總兵官佩征南副將軍印率師討之次零溪進攻銅鼓五開潭溪克之既而擣地青滅龍里通洪州所向皆捷獨秦洞巖山苗據險久不下良以計襲破之殲其衆古州八萬皆降收撫洞苗二百餘所籍其民以其地隸思州宣慰司傅友德碭山人洪武三年封潁川侯九年命友德巡行川蜀雅播之境因兵威降金筑普定諸山寨十四年充征南將軍率左副將軍藍玉右副將軍沐英將步騎三十萬討雲南至湖廣分遣都督胡海洋等將兵五萬由永寕趨烏撒而自率大軍由辰沅趨貴州克普定普安降諸苗蠻遂擊烏撒循格孤山而南以通永寕之兵遣兩將軍趨雲南友德城烏撒羣蠻來爭奮擊破之得七星關以通畢節烏撒諸蠻復叛討之斬首三萬餘級獲牛馬十餘萬靄翠宋欽皆降蠻地悉平進封潁國公費聚五河人洪武十四年從傅友德征雲南克普定明年置貴州都司以聚與梅思祖同署司事未幾諸蠻復叛副安陸侯吳復討之攻關索嶺及阿咱等砦悉下之蠻地始定梅思祖夏邑人洪武十五年與費聚同署貴州都指揮司事宣布德威民蠻安之呉復合肥人洪武十四年從傅友德征雲南克普定城水西充總兵官剿捕諸蠻遂由關索嶺開箐道取廣西十六年克墨定苗至吉刺堡築安莊新城平七百房諸砦斬獲萬計轉餉盤江金瘡發遂卒追封黔國公湯和鳳陽人洪武十八年思州諸洞蠻作亂命和爲將軍從楚王討之時蠻出沒不常聞師至輒竄匿山谷間退則復出剽掠和抵其地恐蠻人驚潰乃於諸洞分屯立柵與蠻雜耕使不復疑久之以計擒其魁餘黨悉潰師還留兵鎮之俞通淵巢縣人洪武二十四年古州銀賴蠻反命通淵統諸軍討之克銀賴諸洞俘斬無算明年封越巂侯楊文含山人洪武二十九年古州蠻林小斯以妖術倡亂命楚王湘王討之文以左都督充總兵官佩征蠻前將軍印簡徒二十萬由沅州伐山開路二百餘里營天柱縣率偏師直抵洪州泊里永從諸洞砦分道夾攻大破之擒馘二萬餘人韓觀虹縣人洪武二十九年古州蠻叛拜征虜副將軍從楊文討平之移兵擊五開與顧成討定水西諸堡還理左府都督事陳迪宣城人洪武中官雲南右布政使普定曲靖烏撒苗煽亂迪率土兵擊破之獻俘於朝賜金幣顧成江都人洪武初授成都後衞指揮僉事八年調守貴州時羣蠻叛服不常成連歲出兵平之十四年從傅友德征雲南為前鋒首克普定以功進指揮使奏革普定府析其地為州三長官司六留治之大布恩信諸蠻帖伏進貴州都指揮同知平康佐都勻諸蠻俘斬萬計二十九年遷右軍都督僉事佩征南將軍印征水西五開天柱天堂西堡平洲諸叛苗皆誅其魁撫綏餘衆凡所破六洞一百三十七砦黔由是平封鎮遠侯仍鎮貴州永樂十一年思州宣慰使田琛與辰州知府黄禧連兵擅攻思南宣慰使田宗鼎命成以兵五萬壓境琛禧就縛於是分思州思南地更置州縣遂設貴州布政司臺羅苗作亂成充總兵官率二都司三衞兵討之斬酋普亮盡戮叛黨威震百蠻蠻人為立生祠蔣廷瓚滑縣人永樂初以行人討平思州思南叛苗後為貴州左布政使撫輯逺人具有規畫卒於官黔中人祀之楊廉泰州人永樂閒擢貴州右㕘議在黔六年以清節著及卒貧不能歸里葬於城東三坡林子孫因家焉蕭授華容人永樂十六年以右軍都督僉事充總兵官鎮守湖廣貴州宣德初乖西巴香諸洞砦作亂而昆阻北諸砦亦恃險不輸服授遣都指揮蘇保會宣慰宋斌攻昆阻北砦連破之斬偽王卓把同等數百人乖西諸蠻皆震懾歸命其後西堡蠻阿骨等與底砦清平平越普安谷把諸蠻相聚為寇而都勻蠻韋翁同復誘蔡郎等五十三砦作亂授遣指揮李政陳原顧勇次第平之進都督同知佩征蠻副將軍印正統元年普定蠻阿遲阿哈等叛授遣顧勇等搗其巢擒阿哈等已而計砂賊首苗金蟲苗總牌糾洪江生苗作亂偽立統千侯統萬侯授督兵抵計砂分遣都指揮鄭通攻三洞馬煜攻黄柏山破之斬總牌金蟲等生苗盡降授為人沉毅多計算馭軍嚴整在鎮二十餘年威信大行寇賊稀少論功進左都督召至京以老致仕卒贈臨武伯呉訥常熟人宣德三年巡按貴州綜覈精明百度整飭將代還土人訴闕乞留不許或以百金佐裝訥尋寄還封識如故易節萬載人宣德間為貴州左布政使寛猛得宜民夷思之不忘應履平奉化人宣德初為貴州按察使時山雲鎮廣西歲調貴州軍萬人春秋更代還多逃亡則取原衞軍以補履平奏貴州四境皆苗蠻今衞軍逃於廣西而以在水西苗阿忽等六族皆自訴乞歸化詔璡隨方處置方瑛全椒人景泰初貴州羣苗叛以瑛爲右副總兵與保定伯梁珤侍郎侯璡率師討平之進右都督遂命瑛鎮守其地尋以計平白石崖賊功進左都督未幾四川草塘苗黄龍韋保作亂剽播州西坪黄灘瑛與巡撫蔣琳㑹川兵進剿賊魁皆就縛因分兵克中潮山及三百灘乖西谷種乖立諸砦執偽王谷蟻丁等斬首七千餘封南和伯召還督京營軍務明年湖廣苗叛拜瑛平蠻將軍率京軍討之瑛連破鬼板等一百六十餘砦與尚書石璞移兵天柱率陳友等分擊天崖諸砦復大破之克砦二百七十擒偽侯伯以下一百二人時英宗已復位召璞還命瑛留鎮貴州湖廣瑛討蒙能餘黨克銅鼓藕洞諸砦一百九十五覃洞上隆諸苗咸斬賊渠納款帝嘉其功進爵爲侯天順二年東苗千把豬等僭偽號攻部勻諸衞命瑛與巡撫白圭合川雲貴軍討之克六百餘砦邊方悉定瑛前後克諸砦幾二千俘斬四萬餘平苗之功前此無與比者尋卒於鎮王來慈谿人景泰元年貴州苗韋同烈作亂以來爲右都御史代侯璡總督軍務同烈以衆數萬據興隆復劫平越清平諸衞來遣都督毛勝陳友及方瑛三道進而來與保定伯梁珤大軍繼之先後破三百餘砦賊懼縛同烈并賊將五十八人降餘悉解散遂移軍清平且檄四川兵共剿都勻草塘諸賊皆降賊平來奏乞班師詔留來珤鎮撫尋命來兼巡撫貴州廣通王徽蝶結苗酋楊文伯等為亂來連戰破之尋召為南京工部尚書劉玉磁州人天順初以右㕘將分守貴州從方瑛討東苗殲千把豬討西堡苗縶其魁楚得先後斬首千級毁其巢而還旋改右副總兵鎮守貴州何淡順德人成化中官貴州左㕘政生熟苗相攻郡縣騷然撫按檄淡往招之淡單騎深入諭以威德苗各釋甲散去尋以親老乞歸居官三十年其歸也貧不能舉火知縣呉廷舉稱為呉隱之之流恒分俸給之彭倫永定人成化初以指揮使守備貴州清浪諸處討破茅坪銅鼓叛苗賊入乾溪肆掠倫擊走之以邛水諸砦不即邀遏乃丁令賊入境能生致與重賞縱者置諸法由是諸司各約所屬凡生苗軼入即擒之倫大會所部縛俘囚訊得實寘之高竿令卒亂射殺之罪輕者截耳鼻使去曰以此識再犯不赦矣因令諸砦樹牌為界羣苗股栗不敢犯其後邛水十四砦苗復糾洪江生苗為逆倫分五哨夾攻之縶其魁餘黨悉平録功進都督僉事厯官至貴州總兵以老致仕孔鏞長洲人成化五年以右副都御史巡撫貴州清平部苗阿溪者桀驁多智其養子曰阿刺有勇力横行諸部中守臣皆納其賂鏞行部至清平聞指揮王通曉大義因詢之通言溪所昵者指揮王曾總旗陳瑞今欲致溪必先得此二人而後溪可圖也翌日鏞大會將校詰責二人二人輸實遂以計擒溪磔之羣蠻震懾雞背苗恃險為亂鏞亦討平焉何喬新廣昌人成化中官刑部侍郎播州宣慰楊輝寵庶子友欲奪嫡子愛爵與之乃立友為凱里宣撫使而誣愛交通唐王朝廷命喬新勘之友賄諸權貴皆為游說喬新至與巡撫劉璋白愛誣而奪友宣撫安置别縣播人遂安喬新後官刑部尚書致仕家居愛遣使厚致贈且獻良材可為櫬者喬新堅却之顧溥成元孫襲封鎮遠侯宏治五年貴州都勻蠻乜富架作亂滇蜀道梗詔溥充行軍總兵官討之分五路刻期並進誘誅富架父子斬首萬計加太子太保鄧廷瓚巴陵人成化中知程番府治行卓著宏治二年以右副都御史巡撫貴州都勻苗乜富架長脚等作亂勅廷瓚提督軍務同湖廣總兵官顧溥貴州總兵官王通等討之副使呉倬遣熟苗詐降富架誘令入寇伏兵擒其父子官軍乘勝抵其巢連破百餘砦生縶長脚以歸羣蠻震慴廷瓚言都勻清平舊設二衞九長官司其人皆世禄恣虐請改為府縣設流官與土官兼治因上善後十一事設都勻府一獨山麻哈州二清平縣一論功進右都御史張廉歸安人成化時擢貴州按察使奏誅印江豪酋改置為縣宏治九年以右副都御史巡撫其地疏言屬府黎平僻遠與湖廣五開衞相錯宜聽湖廣兵備副使節制又請削鎮遠土官置縣如印江例皆從之王軾公安人宏治十三年貴州普安賊婦米魯與其黨福佑等作亂命軾兼左副都御史往督軍務軾至以貴州兵力不足用便宜調廣西湖廣雲南四川官軍土兵八萬人合貴州兵分八道進攻之米魯福佑出戰土官鳳英等格殺二人餘黨遂平録功加太子少保鄒文盛公安人正德十一年以副都御史巡撫貴州討清平苗阿旁阿階阿革及龍頭都蘭都蓬密西大支馬羅諸砦黒苗皆平之陳克宅餘姚人嘉靖初為御史巡按貴州時隴政搆亂朝議用兵而歲辦物料為公私擾克宅奏止輸十二詔從之行旅患盤江瘴氣克宅鑿山開道以避之十三年復以右副都御史巡撫其地都勻囤賊阿向逆命克宅募死士夜升絶壁以繩梯度軍大破之諸洞悉平徐問武進人嘉靖十一年拜右副都御史巡撫貴州獨山州賊蒙鉞為亂問督大兵分道入誅之撫黔三年日進長吏求疾苦盡利便甚得黔人心召為兵部右侍郎疏言兩廣雲貴半土司深山密箐猺獞羅𤏡所窟穴邊將喜功召釁好為掃穴之舉王師每入巨憝潛蹤所誅戮率無辜赤子興大兵費厚餉以易無辜命非陛下好生意宜勅邊臣布威信嚴阨塞謹哨探使各安邊境以絶禍萌帝深納其言石簡寕海人嘉靖二十二年為貴州左布政使五溪諸蠻四出劫掠官軍剿之不克撫按以簡威望檄使招撫簡單騎往諭蠻皆投順尋以病致仕張嶽惠安人嘉靖中以右都御史總督湖廣貴州四川軍務開府沅州時苗酋龍許保及其黨呉黒苗為亂貴州巡撫李義主撫嶽劾罷之使總兵官沈希儀等分道進師而躬入銅仁督之許保黑苗以次就擒苗患以息沈希儀貴縣人嘉靖十九年為四川左㕘將分守敘瀘及貴州迤西諸處二十六年以都督同知充貴州總兵官從總督張嶽平銅仁叛苗龍許保呉黒苗尋以病歸石邦憲清平衞人嘉靖中署都指揮僉事充銅仁㕘將龍許保呉黑苗叛總督張嶽以邦憲有謀勇令討之破苗砦十有五使使購老猫老等執許保送軍門復以計購烏朗土官田興邦等斬黒苗進署都督僉事充總兵官代沈希儀鎮貴州臺黎砦苗關保倡亂四川容山廣西洪江諸苗為應邦憲與湖廣兵分道討破之播州苗盧阿項為亂邦憲以兵七千兼調水西兵進逼其巢擒賊首父子斬獲四百七十餘人進署都督同知破地隆阡叛苗四砦又破答千諸砦擒其魁於是諸苗悉降播州容山副長官土舍韓甸與正長官土舍張問相攻甸屢勝遂糾生苗剽湖廣境垂二十年邦憲討破之斬甸容山平進右都督尋與巡撫呉維嶽招降平州叛酋楊珂又剿平龍里衞賊阿利等隆慶元年剿平鎮逺苗又破誅白泥土官楊贇及苗酋龍力水等邦憲生長黔土熟苗情善用兵大小數十百戰無不摧破所得俸賜悉以饗士家無贏資爲總兵官十七年威震蠻中與四川何卿廣西沈希儀並稱一時名將卒贈左都督胡桂芳金谿人萬厯中以右副都御史巡撫貴州金筑安撫土舍金大章與其黨爲亂桂芳遣兵擊破之賊懼求納地乃改爲廣順州設流官撫治而以大章爲土官知州不治民事一方遂定邢玠益都人萬厯二十二年播州宣慰使楊應龍叛敗官軍於白石詔以玠爲兵部左侍郎總督川貴軍務討之玠檄諭應龍應龍面縛議罪於其黨黄元阿羔執以獻詔應龍輸四萬金贖爲民斬元等重慶市加玠右都御史江東之歙縣人萬厯進士爲御史有直聲二十四年巡撫貴州置備賑右文等田恤隱惠藥等局黔人德之稱賢撫者必以東之爲最李化龍長垣人萬厯二十七年播州楊應龍復叛詔以化龍為兵部右侍郎總督湖廣川貴軍務討之化龍先檄水西兵三萬守貴州明年二月大誓文武分八道進兵川師四路總兵劉綎由綦江馬孔英由南川呉廣由合江副將曹希彬受廣節制由永寕黔師三路總兵童元鎮由烏江宣慰使安疆臣由沙溪總兵李應祥由興隆楚師一路分兩翼總兵陳璘由白泥副總兵陳良玭受璘節制由龍泉每路兵三萬官兵三之土司七之五月大㑹海龍囤下築長圍困之六月劉綎先破土月二城應龍自焚死出師凡百有十四日而賊滅以其地置遵義平越二府晉兵部尚書加少保郭子章氣和人萬厯二十七年為右副都御史巡撫貴州與總督李化龍共滅楊應龍改其地為流官叙功進右都御史兼兵部右侍郎尋令總兵陳璘討皮林苗又平貴州東西二路苗朝議征紅苗子章力言不可乃止撫黔九年洞悉民隱凡所設施咸有利益劉綎南昌人萬厯中以四川總兵官從李化龍征播州搗楠木山陽簡臺三峒與賊大戰李漢壩生擒其魁餘賊奔入峒乘勢追之遂盡克三峒楊朝棟統銳卒數萬由松坎魚渡羅古池三道並進綎伏百人於羅古待松坎賊伏萬人於營外待魚渡賊賊至伏起綎率部下轉戰斬首數百追奔五十里踰夜郎舊城克滴淚三坡瓦窰坪石虎諸隘直抵婁山關分奇兵爲左右間道趨關後而自督大軍仰攻奪其關追至永安莊進克後水囤營於冠子山尋㑹諸將逼海龍囤下與諸將共平賊綎功爲多進左都督世廕指揮使本朝乾隆四十一年賜諡忠壯陳璘翁源人萬厯中征播璘以湖廣總兵官由偏橋進攻克大小三渡關乘勝抵海龍囤下楊應龍死偏沅巡撫江鐸命璘移師討皮林賊黨悉平遂以總兵官鎮貴州時仲家苗盤踞貴龍平新間剽掠無虛日璘督討平之部内遂靖先敘平播功加左都督再以平苗功贈太子太保呉廣廣東人萬厯中征播廣以總兵官出合江賊將郭通緒扼穿崖囤廣督主漢軍擊破之分四哨進攻崖門連戰紅碗水土崖分水關皆捷會諸道軍逼海龍囤旋與陳璘從囤後登楊應龍死獲其子朝棟及妻田氏出應龍屍烈焰中廣中毒矣絶而復甦遂以本官鎮四川踰年卒贈都督同知世廕千户馬孔英宣府人萬厯中征播孔英以總兵官出南川道獨險遠去楊應龍海龍囤六七百里孔英用土官鄭葵路麟爲鄉導鼓行而前連破桑木九杵黒水諸關苦竹羊崖銅鼓諸砦進營金子壩奪養馬城直抵海龍第二關下時諸道兵未至孔英軍獨深入居數日劉綎亦至乃合兵克海崖海門諸關賊走保囤上尋滅録功進都督同知世廕千戸久之以總兵官鎮貴州罷歸卒李橒鄞人萬厯四十七年擢右僉都御史巡撫貴州時安邦彥已有反謀橒累疏請増兵益餉中朝置不問會橒被劾六疏乞休始得請以王三善代而奢崇明已反重慶陷遵義貴陽大震橒遂留視事與巡按御史史永安募兵儲米治戰守具遣總兵官張彦方等援四川已而邦彥遂挾宣慰使安位反統水西軍及羅鬼苗仲數萬直趨貴陽橒聞變亟議城守會藩臬守令咸入覲城中文武無幾人乃分兵爲五令提學劉錫元及㕘議邵應正都司劉嘉言故副總兵劉岳分禦四門橒自當北門之衝永安居譙樓團街市兵以防内雙賊至盡銳攻北城橒迎戰敗之轉攻東門爲錫元所却持數日賊多死乃日夕分番馳突以疲官兵又沿山為營柵隔内外後聞新撫王三善將進兵乃日夜攻架木高坡以瞰南城橒永安募死士燔之火五日夜賊盡攻擊之術終不能拔閲八月三善抵城下圍始解方被圍時城中食盡知縣周思稷自殺以餉軍升米白銀二十兩橒盡焚書籍冠服預戒家人急則自盡皆授以刀環城中户十萬後僅餘二百人孤軍卒定皆橒及永安錫元功史永安武定人天啟初以御史巡按貴州安邦彦將至或諷永安以巡行去不聽賊圍既久城中食盡永安召諸將士為作飲血歌以見志後晉太常少卿劉錫元長洲人天啟初為貴州提學安邦彦圍城錫元督諸生日夜巡守圍解晉秩副使崇禎中任寕夏㕘政王三善永城人天啟元年以左僉都御史代李橒巡撫貴州明年二月安邦彦反圍貴陽橒及巡按御史史永安連章告急趣三善赴援三善進駐平越十二月朔三善分兵為三副使阿天麟等從清水江進為右部僉事楊世賞等從都勻進為左部自將二萬人與㕘議向日昇副總兵劉超等由中路當賊鋒舟次新安遇賊酋阿成超偕部卒張良俊直前斬其頭賊衆披靡遂奪龍里城進兵畢節鋪賊渠安邦俊中礮死生獲邦彦弟阿倫遂抵貴陽城下賊解圍去三善舉超為總兵官令渡陸廣趨大方搗安位巢總兵官張彦方渡鴨池搗邦彦巢漢土兵各三萬剋期並進三年正月超渡陸廣賊薄之獨山官軍大敗賊遂攻破鴨池軍諸苗見王師失利復蠭起遠近大震三善急遣諸將攻之擒其酋宋萬化邦彦為之奪氣會奢崇明為川師所窘逃入貴州龍場依邦彥三善乃自將六萬人渡烏江與賊戰於漆山身自督陣曰戰不捷此即吾致身處也將士殊死戰賊衆大敗邦彦狼狽走三善遂抵大方入居安位第位偕母奢社輝走火灼堡邦彦竄織金三善屯大方久食盡四年正月焚大方廬舍而東賊躡之中軍㕘將王建中副總兵秦民屏戰殁官軍行且戰至内莊後軍為賊所斷三善還救降賊陳其愚衝三善墜馬三善知有變急解印綬付家人拔刀自刎不殊羣賊擁之去罵不屈遂被害同知梁思泰主事田景猷等同死者四十餘人崇禎初贈兵部尚書立祠祀之九年冬敘解圍功贈太子太保秦民屏忠州人女土官秦良玉之弟天啟初為都司僉書以解成都圍進副總兵三年冬從王三善戰大方屢捷明年正月戰死二子佐明祚明皆重傷良玉疏請卹詔贈都督同知立祠賜祭而官其二子岳具仰延安人厯官户部郎中貴州亂朝議具仰知兵用為監軍副使内莊之敗賊執之以要撫後具仰馳蠟書於外為邦彦所殺贈光禄寺卿蔡復一同安人奢崇明安邦顔反貴州巡撫王三善敗殁進復一兵部右侍郎代之時兵食盡絀復一勞來拊循人心乃定尋代楊述中總督貴州雲南湖廣軍務兼巡撫貴州復一集將吏申嚴紀律遣總理魯欽等救凱里㕘將尹伸副使楊世賞等救普定俱却之遂發兵通盤江路斬逆酋沙國珍又大破賊於汪家沖長驅至織金搜邦彦不得乃班師是役也焚賊巢數十里獲牛馬甲仗無算五年正月欽等旋師渡河賊從後襲擊諸營盡潰復一自劾遂解任俟代與巡按御史傅宗龍計剿破烏粟螺螄長田及兩江十五砦叛苗又遣劉超等討平越苗阿秋等破百七十砦十月卒於平越軍中贈兵部尚書傅宗龍昆明人萬厯中為御史以疾乞歸天啟四年貴州巡撫王三善敗殁乃即家起宗龍巡按其地兼監軍宗龍盡知黔中要害及土酋逆順將士勇怯巡撫蔡復一深信之請勅宗龍專理軍務設中軍旗鼓禆將以下聽賞罰可之五年正月總理魯欽敗績於陸廣河諸苗復蠢動復一與宗龍謀討破烏粟螺螄長田諸叛苗大破平越賊毁其砦百七十賊黨漸孤會復一卒代者王瑊諸事悉倚辦宗龍乃漸翦水外逆黨復擊破安邦彦於趙官屯斬老蟲添威名大著巡按踰二歲詔加太僕少卿其冬以丁艱歸袁善雲南人故為㕘將以事罷天啟中貴州巡撫沈儆炌奏復其官令討安邦彦賊陷普安圍安南善攻破之通上六衞道王三善之沒六衞復梗善䕶御史傅宗龍赴黔道復通七年加都督同知崇禎初卒於官魯欽長清人厯都督僉事充保定總兵官安邦彦叛命欽為總理總川貴湖廣漢土軍從王三善防剿擒苗酋宋萬化何中尉進營紅崖五戰斬首萬八千直抵大方欽功為多及三善敗於内莊總督蔡復一遣欽及總兵官劉超救凱里拔賊巖頭砦遂移師克平茶已而邦彦盡驅玀鬼結四十營於斑鳩灣分犯普定復一令欽及總兵官黄鉞分道禦之欽率部將張雲鵬等大敗賊於汪家沖邦彦渡河西奔欽督諸將窮追深入織金明年正月渡河還中伏敗死者數千人充為事官立功自贖會長田苗酋阿賈天保助邦彦為亂復一以兵屬欽討之大戰米墩山生擒天保阿賈先後斬賊魁五十四人破焚一百七十四砦詔免欽為事官總理如故未幾邦彦復大舉入寇欽禦之河上連戰數日夜賊直逼欽壘將士逃竄遂自刎欽勇敢善戰為西南大將之冦崇禎初贈少保左都督賜祭葬建祠曰旌忠陸夢龍㑹稽人萬厯中厯江西副使天啟四年貴州賊未靖總督蔡復一薦夢龍知兵改右㕘政監軍討賊安邦彦犯普定夢龍偕總兵黄鉞以三千人禦之曉行大霧中直前薄賊大敗之三山苗叛思州告急夢龍夜遣中軍呉家相進搗賊巢撾苗鼓聲振山谷苗大奔潰焚其巢而還周鴻圖即墨人起家宿遷知縣天啟初安邦彦亂圍貴陽巡撫侯恂薦鴻圖監紀軍事解其圍遷貴陽同知時龍里衞為賊殘破鴻圖繕城飭備招集拊循民恃為固升平越知府會勻哈叛苗與邦彦相倚為亂巡撫王瑊及御史傅宗龍使監㕘將胡從儀及都司張雲鵬軍分道搜山所向摧破以功擢副使分巡新鎮道時鴻圖駐平越轄下六衞㕘議段伯炌駐安莊轄上六衞千餘里閒奸宄屏息崇禎初以右㕘政分守銅仁諸府苗畏其威不敢竊發胡從儀山西人天啟三年分鎮新添偏橋諸衞先是下六衞積苦苗患從儀徧厯苗洞得其山川險易出沒之路畫地分守柝聲相聞四年以逰擊援普定功多既而破賊長田以㕘將討平勻哈又與諸將平老蟲添又平苗賊汪抱角進都督僉事召為保定總兵官卒於京邸黔人為立真將軍碑朱燮元山陰人天啟四年安邦彦陷貴州巡撫王三善軍沒明年廷議命燮元以兵部尚書督貴州雲南廣西諸軍移鎮貴陽六年燮元以父喪歸代以尚書張鶴鳴鶴鳴視師年餘未嘗一戰崇禎元年復召燮元代之兼巡撫貴州時寇亂久井里蕭條貴陽民不及五百家燮元招流移廣開墾募勇敢檄雲南兵下烏撒四川兵出永寕下畢節而親率大軍駐陸廣逼大方邦彦聞之分守陸廣鴨池三岔諸要害别以一軍趨遵義與奢崇明合兵犯赤水燮元授計總兵許成名令誘賊抵永寕而急遣總兵官林兆鼎從三岔入副將王國正從陸廣入劉養鯤從遵義入合傾其巢邦彦恃勇擬先破永寕軍還拒諸將急索戰四川總兵官侯良柱副使劉可訓遇賊十萬於五峯山桃紅壩大破之賊奔據山巔諸將乘霚力攻賊復大敗又追敗之紅土川二年八月十有七日邦彦崇明皆授首燮元乘兵威脅走安邊復烏撒檄招水西宣慰使安位位不決燮元攻之百餘日斬級萬餘養鯤復遣人入大方燒其室廬位大恐三年春遣使乞降燮元受之貴州遂靖乃於沿河築城三十六以新開地分給有功之將令其世襲其冬討平定番鎮寕叛苗通威清等上六衞及平越清平偏橋鎮遠四衞道路凡一千六百餘里十一年春卒於官燮元鎮西南久治事明果行軍務持重謀定後戰禦蠻以忠信不妄殺苗民懷之劉可訓未詳何籍人天啟三年為四川僉事監軍奢崇明走龍場壩可訓督諸將進剿功最多崇禎元年改敘瀘副使仍監諸將軍二年與總兵侯良柱破賊卜萬於五峯山斬崇明及安邦彦後擢右僉都御史盧安世赤水衞人萬厯中為富順教諭天啟初奢崇明反帝用大學士孫承宗言超擢僉事監軍討賊屢戰有功五年四月總督朱燮元上言自遵義五路進兵永寕破巢之後大小數百戰擒獲幾四萬人招撫羣賊及漢土苗仲二十九萬三千二百餘人皆監司李仙品劉可訓鄭朝棟盧安世等功武將則林兆鼎秦翼明羅象乾土官則陳治安冉紹文悅先民等進安世貴州右㕘議遷四川副使遵義監軍又數有功崇禎初與世廕武職進右㕘政林兆鼎福建人以總兵官鎮貴州崇禎三年定番鎮寕苗為亂討平之四年湖廣苗黑酋剽劫偏橋諸處兆鼎遣將進剿攻拔二百餘寨加左都督召遷南京右府卒贈太子少保朱家民曲靖人天啟二年官貴陽知府邦彦圍貴陽家民奉王三善命乞援兵於四川又借河南兵共解其圍乃撫傷殘招流移寛徭賦遠邇悅服丁父憂奪情擢安普監軍副使加右㕘政崇禎時就遷按察使左布政以平寇功加俸一級久之致仕卒於家自邦彦亂雲貴諸土酋盡反攻陷安南等上六衞雲南路斷其後路雖通羣苗猶出沒為患家民率㕘將許成名等討平盤江外阿野魯頗諸砦於是相度盤江西坡板橋海子馬場諸要害築石城五宿兵以衞居民帝嘉其績皆錫以名家民又於其間築城六廨舍廬井畢備羣苗惕息道路晏然盤江居雲貴交兩岸壁立水深無底廣三十餘丈家民倣瀾滄橋制置鐵索鐵柱横木為板橋建鼓樓築月城以䕶之遂為永利張耀三原人崇禎末厯官貴州按察使就遷本省布政使孫可望李定國等率衆攻貴州城陷執見其帥帥與耀皆秦人說之降執其妾媵怵之終不屈大罵被殺并殺其家屬十三人本朝乾隆四十一年賜諡忠烈本朝宗室洛託鑲藍旗都統順治十五年以平南靖寇大將軍督師取黔甫至境賊望風遁四月入貴陽軍令嚴肅秋毫無優七月賊遣兵襲黔一夕奄至城下洛託令士卒開門以待賊知有備引去分兵寇青巖又敗走之自是不敢窺黔既而王師進滇遂定西南趙廷臣漢軍鑲黄旗人順治十五年夏四月王師定黔秋九月廷臣奉命巡撫下車日延見父老博採旁咨盡得民疾苦狀凡所條禁措置悉中窾要定賦額請蠲賑興學校禁貪横嚴騷擾民困