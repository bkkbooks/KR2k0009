司司獄陳玉環自經而死本朝乾隆四十一年顧人龍等四十一人俱入祀忠烈祠金鎮貴開州人厯官至總兵崇禎末狆苗圍州城鎮責與知州黃嘉雋協力守城城陷二人俱遇害汪澤民開州人有志畧崇禎十六年狆苗王阿辛等謀劫城澤民聞變密白知州黃嘉雋賊知事泄遣黨七人夜抵澤民寢所刃其腹將死命其妻以紙筆納腹中曰死當書賊狀訴於神死逾旬衆賊各遇澤民追逐墜峻坡肌内盡裂而死李科開州人厯官至副總兵崇禎末流寇侵境科率兵次茶山渡與賊戰沒於陣本朝乾隆四十一年賜諡烈愍何兆柳開州人崇禎庚午舉人水西賊化沙杓圍副將方國安於大方城總督朱燮元委兆柳救援兆柳捐貲助餉救國安斬化沙杓流賊入黔兆柳招集義勇捍其郷孫可望殺之籍其家子東鳳鳴鳳並死之本朝康熙年間少子人鳳白其冤於經畧洪承疇事聞給還家產本朝諶文學開州人康熙元年貢生吳逆叛强之仕逃匿得免事平補鄖陽令請老家居年八十餘卒汪啟德貴定人有至性年十歲父病篤刲股以進父竟殁哀毁如成人行道為之感泣朱重義貴定廩生事庶母撫幼弟克盡孝友純行著聞金昆開州人有孝行鄉里無間言乾隆中旌又同州牆焯黄維章均事親盡孝為宗黨所推徐暹貴定人康熙辛卯舉人任四川保寕府通判廉明正直民情愛頌居郷端謹士林咸推重之嘉慶十七年入祀鄉賢祠陳嗣虞龍里人少孤事叔父誠敬叔父疾憂形於色以舉人任四川新繁縣知縣有惠政致仕歸教誨後進多所成就嘉慶十年入祀鄉賢祠朱射斗貴筑人乾隆中以行伍隨征大小金川積軍功厯升四川川北鎮總兵嘉慶五年率兵征剿川陜逆匪追賊至蓬溪縣高院場被傷陣亡賜諡勇烈恩賞二等輕車都尉世職入祀昭忠祠王凱貴筑人乾隆中以行伍隨征大小金川積軍功厯升湖北宜昌鎮總兵嘉慶二年剿堵鄖縣均州賊匪為南北兩路軍營策應四年敗賊於房縣乘勝直追連敗之於王家山北峯寺等處五年賊奔遠安踞馬鞍山凱率兵攻左山梁殲斃甚衆身先士卒冒險直上林中伏賊宇出圍繞凱中矛傷猶手弓連斃三賊歿於陣賜祭葬諡壯勇恩賞騎都尉兼一雲騎尉世職入祀昭忠祠流寓明楊慎新都人正德中進士授翰林院修撰嘉靖五年以議大禮謫戍永昌嘗往來黔中著有流寓雜吟列女元桑烏遜妻托克托章桑烏遜為達嚕噶齊早卒章不忍獨生以死殉之延祐二年旌表桑烏遜舊作相兀孫托克托章舊作脱脱真達嚕噶齊舊作達魯花赤今俱改正明朱宣妻劉氏名慧貴州衞人性至孝母病割股以進後適宣年二十一宣没劉守節撫孤以終夏玘妻陳氏郡人玘卒陳以死自誓葬畢閉門自縊按各省人物列女均載本州縣籍貫無書郡人之例惟貴州一省除遵義府外其貴陽等十一府皆有親轄地方其地户口人丁不隸州縣而徑屬於府名為郡籍與他省不同今悉確查文冊書為郡人冠於所轄州縣之首以昭核實謹標義例於首府安順都勻鎮遠思南石阡思州銅仁黎平大定興義十府圴倣此周汝麟妻薛氏郡人安邦彦圍城恐被辱抱幼女投水死又同時有潘思聰妾程氏亦仰藥死俱被旌李秉玉妻湯氏郡人安邦彦作亂湯同兄避難聞賊至懼汚投水死戴氏女龍里人幼許聘陳世傑未歸而傑卒戴矢志不嫁奉父母盡孝御史題旌劉山松妻呉氏郡人呉子麒女幼諳書史以山松出遊久不歸依母家十餘年聞流寇將至即懷利刃以待至則自刎死呉中芸妻陳氏郡人年三十而寡流寇至抱幼子自沈於溪楊玉驄妻湯氏郡人湯景明女流賊入黔聞夫被執投水死邱禾嘉妻姚氏貴定人禾嘉官遼東巡撫卒於京邸姚上疏扶櫬歸里流賊䧟城懼汚投井死姚聖言妻陳氏貴定人流賊䧟城陳恐被辱自投於井親戚救之引避山中聞賊至投崖死孫南光妻朱氏郡人南光早卒朱守節流賊破城罵賊投井死張承祖妻呉氏定番人流賊破城呉恐被汚赴蓮花池死本朝冉瓖妻越氏郡人年十六適瓖甫數月而瓖卒越志期殉節待壤大殮畢與其從婢蘭英均投繯而死康熙四十三年旌梁國輔妻高氏貴筑人年十九夫卒舅姑欲令改適已有成議高聞之悲泣終夕平旦更衣拜奠夫柩畢即入室自縊死康熙四十三年旌謝二姑開州人謝克明姪女幼孤克明撫為已女年十四未字克明夫婦病且死一日之聞再割股以進病皆愈里人異之康熙中旌楊質素妻簡氏開州人年二十夫故守節四十餘年康熙中旌楊郁妻何氏修文人郁客死普安何聞之解帶自縊死凌國士妻白氏貴定人事姑孝謹姑病痿痺每食則舉七以飯之察其寒暄以時易寢褥夜則坐姑之旁假寐衣不解帶者數年姑病亟割股和藥以進遂稍瘳邑人共稱為孝婦朱景運妻劉氏郡人夫亡矢志撫孤備極艱苦有欲奪其志者氏截髪毁容以却之謀者猶未息乃引利錐自刺左目旁觀悚歎事遂寢雍正二年旌刁玫妻歸氏修文人夫亡守節四十餘年事祖翁姑俱盡孝道雍正中旌張其翽聘妻李氏貴定人幼喜讀書未嫁而張卒女衰服往守節矣志不二其母勸令改適女翦髪齧指自經者再乃止守節十年而歿李萃妻呉氏郡人夫歿守節乾隆六年旌同郡陳起聰妻秦氏袁育物妻文氏羅鼎元妻周氏張玠妻楊氏袁若琅妻朱氏張聯芳妻王氏劉士貞妻房氏魯友仲妻鮑氏趙宗源妻胡氏盧肇鄰妻黄氏張天祿妻彭氏徐琮妻陳氏鄒毓先妻王氏呉從魯妻劉氏楊増妻姜氏徐章妻呉氏李慧妻汪氏徐盛伯妻周氏何德秀妻尹氏朱文達妻劉氏謝廷芳妻熊氏馬天中妻徐氏烈婦李亶妻謝氏王和林妻舒氏貞女汪以鎔聘妻袁氏均乾隆年間旌按舊志於乾隆年間旌表之列女不著各州縣本籍但彚載一條注明同府云云例實疏率斷不可沿今溯查文冊有可徵者分析改正本係郡籍書爲郡人本係各州縣籍書爲某州縣人俾與