角徧飲主人不食肉止食魚蝦葬用棺以繖覆墓上期年而火之以十一月為歲首以牛馬雞牲骨用末糝和之以作醋至酸臭為佳多蓄蠱毒每以殺人斂百物之毒以染箭鏃中人血濡縷立死性險譎嗜殺最為强悍楊保性奸狡婚姻祭葬悉同漢人龍里居多花苗在貴筑廣順等處男女拆敗布緝條以織衣無衿竅而納諸首以青布裹頭婦人斂馬􅐢尾雜人髪為髲大如斗籠以梳裳服先用蠟繪花於布而染之既染去蠟則花見飾袖以錦故曰花苗昔三苗之裔其人有名無姓有屬無長不知正朔以十二辰屬為期無文字刻木為信架木如鳥巢寢處炊爨與牲畜俱夜無臥其掘地爇柴以反側食麥稗雜野蔬閒有稻則儲以待正供每歲孟春合男女於野跳月擇偶以季夏為歲首喪則環哭盡哀葬不用棺病不服藥惟禱於巫鬼動作必卜或折茅或熟雞驗其脛骨與腦諸苗之俗大都類此東苗西苗在貴筑之谷池里男髽髻著短衣色尚淺藍首以織花布條束髪婦著花裳無袖惟遮覆前後俗與花苗同克孟牯羊苗在廣順州金筑司擇懸崖鑿竅而居不設牀第構竹梯上下高者百仞耕不輓犂以錢鎛發土耰而不耘男女躧笙而偶免乳而歸其聘財親死不哭笑舞洁唱謂之閙尸明年聞杜鵑聲則閉户號泣曰鳥猶歲至親不復矣谷藺苗在定番州性兇頑善擊刺出入必持槍弩蠻黨皆畏之總纂官臣廖鴻藻恭纂并覆輯校對官臣丁運泰恭校
