body:
  text: 鎮江府在江蘇省蘇州府西北三百七十里江寕府東少北一百八十里東西距二百二十里南北距一百三十六里東至常州府宜與縣界一百六十里西至江寕府句容縣界六十里南至常州府武進縣界一百八里北至揚州府江都縣界二十八里東南至宜典縣界二百十里西南至安徽廣德州建平縣治三百七十里東北至常州府靖江縣界一百二十里西北至揚州府儀徵縣界七十里自府治至京師二千三百里分野天文斗牛分野星紀之次建置沿革禹貢揚州之域春秋時吳地戰國屬楚秦屬會稽郡漢初屬江都國後屬會稽郡後漢屬吳郡三國吳曰京城元和志建安十三年孫權自吳徒治丹徒曰京城十六年遷建棠復於此置京口鎮晉太康二年置毘陵郡治丹徒永嘉五年以東海王世子名毘改晉陵郡宋書州郡志大興初郡及丹彼縣悉治京口至義熙九年復還晉陵咸和四年僑置徐州永和中僑置南東海郡劉宋永初二年立南徐州宋志永嘉之亂徐兗流民相車過淮亦有過江居晉陡郡界者咸和四年郗鑒於晉陵諸縣及江北皆僑立郡縣以司牧之徐兗二州或治江北義熙十年始分淮北爲北徐州淮南猶爲徐州水𥘉二年加徐州曰南徐而淮北但曰徐元嘉八年更以江北爲南兗州江南爲南徐州謂之北府齊因之梁天監元年改南東海曰蘭陵郡陳永定二年復曰東海郡隋平陳州郡俱廢改曰延陵縣開皇十五年罷縣置潤州取州東潤浦爲名大業三年州廢爲延陵縣屬江都郡唐武德三年復置潤州天寶元年改丹陽郡乾元初復曰潤州又升為丹陽軍屬江南東道建中初置鎮海軍節度唐書方鎮表建中二年合浙江東西道置節度使治潤州尋賜號鎮海軍節度五代屬南唐唐末錢鏐移鎮海節度於杭州而潤州為楊行密所有復置鎮海軍於此宋仍曰潤州丹陽郡開寶八年改鎮江軍政和三年升為鎮江府以徽宗潛邸故屬兩浙路南宋屬浙西路元為鎮江路安撫使司至元十三年改鎮江路總管二十六年置鎮江路總管府屬江浙行省浙西路明初曰江淮府洪武四年改鎮江府直隸南京本朝屬江蘇省領縣三雍正八年以原隸江寕府之溧陽縣來屬今領縣四丹徒縣附郭東西距一百三十里南北距七十八里東至丹陽縣界七十里西至江寕府句容縣界六十里南至丹陽縣界五十里北至揚州府江都縣界二十八里東南至丹陽縣界六十五里西南至句容縣界九十里東北至通州泰興縣界一百里西北至揚州府儀微縣界七十里春秋吳朱方邑後屬楚更名谷陽秦置丹徒縣漢屬會稽郡後漢屬呉郡三國吳嘉禾三年改曰武進縣晉太康二年復曰丹徒為毘陵郡治尋屬毘陵郡永嘉五年為晉陵郡治永和中僑置郯縣為南東海郡治義熙九年移晉陵郡還晉陵并以丹徒屬南東海郡宋仍之梁屬蘭陵郡陳屬東海郡隋開皇九年改為延陵縣省丹徒入之十五年為潤州治大業三年州廢屬江都郡唐武德三年復曰丹徒為潤州治五代因之宋為鎮江府治元為鎮江路治明為鎮江府治本朝因之丹陽縣在府東南七十五里東至常州里東西距府武進縣八十八里南北距六十界五十八里西至丹徒縣界三十里界二十五里南至金壇縣界四十里北至丹徒縣東南至武進縣界六十里西南至江寕府句容里西北至縣界四十五里丹徒縣界三十東里北至戰國武進縣界七十楚雲陽邑秦置曲阿縣漢年改曰雲屬會陽晉稽郡後漢太康二年屬吳郡仍改曲三阿國吳屬毘嘉禾三陵郡宋屬晉陵郡齊因之梁屬江都郡唐武德三年於蘭陵郡陳屬東海郡隋屬縣置雲州五年改曰簡州以地有曰丹陽簡瀆故名八年州廢縣五代因之宋屬鎮屬潤州天寶元年改江府元屬鎮江路明屬鎮江府本朝因之溧陽縣在距府西南二九十八里百四十南北距里東西一百五十里溧水東至常縣界八州十府宜興里南至縣界十安徽廣八里西至江德州界七十寕府里北至江十里寕府句西南至容縣界八十里廣德州建平縣東南至宜興縣治九治一百二十里東北至金壇里春秋縣治吳瀨九十里西北至溧渚秦置溧陽縣隸水鄣縣治一百三十郡漢屬丹陽郡後因漢因之隋之開三皇國吳十八省年晉併太入康溧元水年隷復宣置州宋唐齊武以德後三年州復置廢還屬揚州屬宣州九光年啟復三屬年宣州乾又屬昇元州元年屬昇州五代南唐屬潤路州十宋屬建五年升康溧府陽元府至十元六十四年升溧年改路二十州八屬建康年降縣元縣貞屬元應年天仍府升州本至朝順初元年屬江屬集寕府慶雍路正明八初年復改為屬鎮府江金壇縣在府南北南距一八百十六里十東里至東常西州距府一武百進里縣界至三溧十陽五里縣界西五至十江里寕北府至句丹容陽縣縣界界六三十十五里里南東南至十常里州東府北宜至興丹縣陽界縣五界十三里十西里南西至北溧至陽丹縣界徒縣七界六十十五里年春析秋曲吳阿地地秦漢置金會山稽府郡後曲因阿為縣縣地唐隋初開皇隸蔣州武壇縣德八屬潤年州省五入代延因陵之縣宋垂拱四屬鎮江年府復元置屬改鎮曰金江路明屬鎮本朝江因府之形勢襟帶江山表裏華甸經途四達包總形勝宋書文帝紀因山爲壘緣江爲境通典揚州之都會京口之重鎮宋徐鈜集千山所環中横巨浸形勝之雄控制南北宋汪藻鎮江府月觀記南控江湖北拒淮泗山川形勝自昔用武處方輿紀要風俗士大夫崇靖退貴氣節民庶循禮義守業不競嘉定志土風質而厚士風淳而直咸淳志六代之風流人物綜萃於斯三吳之山川林泉肇發於此宋徐鉉甘露寺記城池鎮江府城周九里有奇門四南北二水關自南關至西門憑漕河餘設濠明初仍舊址築本朝康熙元年修雍正九年重修丹徒縣附郭丹陽縣城周九里門六水門二濠廣八尺明嘉靖中築本朝康熙元年修溧陽縣城周四里有奇門四水門二濠廣五丈明初仍舊址築本朝康熙雍正年間屢修乾隆三年重修金壇縣城周三里有奇門六水門二濠廣二丈明嘉靖中築本朝順治康熙年間屢修學校鎮江府學在府治東日精山明景泰中建本朝順治康熙雍正年間屢修入學額數二十五名丹徒縣學在縣治東聖像山南麓明嘉靖初建本朝順治康熙雍正年間屢修入學額數二十五名丹陽縣學在縣治東明嘉靖間建本朝順治康熙年間屢修入學額數二十五名溧陽縣學在縣治東南隅明洪武初建本朝康熙五年修三十五年重修入學額數二十五名金壇縣學在縣治東明洪武中建本朝順治康熙雍正年間屢修入學額數二十五名杏壇書院在丹徒縣治東聖像山本朝順治十三年建三山書院在丹徒縣治西南宋建淮海書院於北固山元遷儒林里明崇禎間改建易名香山書院本朝順治五年增葺樓舍改今名寶晉書院在丹徒縣治北固山麓本朝乾隆二十八年因米芾寶晉齋舊址建濓溪書院有二一在丹徒縣治東南宋周子依舅氏鄭向嘗居此後人因建書院舊在黄鶴山下明正統中移建今所一在丹陽縣學東本朝雍正間建嘉義書院在溧陽縣治北明嘉靖中建申義書院在金壇縣治西宋太府丞張鎬家塾金沙學舍在金壇縣治東本朝乾隆十年建按舊志載丹徒有清風書院丹陽有練湖書院溧陽有金淵書院金壇有茅山書院今俱廢謹附記户口原額人丁十三萬七千六百三十七今滋生男婦大小共二百十九萬四千六百五十四名口又鎮江衛屯丁四萬二百二十一名口田賦田地五萬二百六十三頃二十一畝三分有奇額徵地丁正雜銀三十萬四千一百二十一兩八錢七分二分二釐米二釐又十一雜辦銀七萬三十七百七十七十一兩石二斗二錢七七升七合四勺又勺豆鎮江一千衛屯三田百四十一千七七石百十八斗三三頃六升七十六合三畝九分有釐又奇額丹徒微省丁衞糧銀屯田四千五百六十二十三頃三十八四兩畝七分七分九五釐有米一奇額百七徴銀十七十四石三兩斗一錢二三升六分合八四釐勺山川聖像山在丹諱改徒名縣治其南舊名麓為夀今邱縣以避學輿地紀孔子勝宋武帝舊武帝積宅基也又弩臺府志引輿二山地記皆在唐府頽山有治西南日精山在丹徒縣治華山在東府北府學西學南内有上月有日臺遺觀遺址又址一名萬有月歲山東山在丹甫冉徒縣詩北東三固多里陳一名迹東花山山復唐皇盛遊京峴山在丹徒縣東五里宋鮑照有赭衣徒鑿京從峴拜陵南坑登鑿京峴處在詩南徐故縣西州北記六秦時里丹命徒峴掘東南其石寰宇記為龍目引二梁與湖集武帝望覽在今京峴山鎮江府盤治行東似龍京口因山得名府志本二山此為京山今縣西南五里有峴山云通志本朝順治十八年敗海寇於此乾隆二十二年三十年四十五年宗純皇帝南巡俱有御製京峴山高詩焦山在丹徒縣東九里大江中與金山對峙相距十里許自京峴東北至馬鞍雩山象山入江而為此山亦名譙山江淹有譙山述懷詩通典縣有京口譙山戍一名樵山輿地紀勝以後漢處士焦先隱此而名一名浮玉今巖石有題刻浮玉山字舊志宋建炎中韓世忠以八千人屯焦山德祐初張世傑等舟師次焦山即此府志較金山差大山巔盤礴處曰焦仙嶺西曰觀音巖有東泠泉心經石南曰羅漢巖西南曰瘞鶴巖有霹靂石陀羅尼經石釣魚臺石又海雲巖半麓有三詔洞鑽丹石傍曰棧道巖有角觗石東北有善財石有石屏醉石蝦蟇石西北碧桃灣東北青玉塢餘支東岀有二島對峙江流中曰海門山亦名雙峯山世稱金焦北固為京口三山云本朝乾隆十六年高宗純皇帝南巡建行宫於上有御製山詩並和蘇軾韻詩二十二年二十七年三遊焦十年四十五年四十九年並有御製遊焦山㬪韻詩㬪蘇軾韻詩仁宗睿皇帝隨扈御製焦山歌雩山在丹徒縣東三十里名見南史上有昭應廟禱雨輒應又相近有大瀆山華山在丹徒縣東六十三里即樂府所謂華山畿也鼎石山在丹徒縣東南三里與京峴山相望上有石塔一名釡鼎山又五垔有唐山峴山在丹徒縣東南五里亦名獸窟因建地藏寺於此又名九華山其北為檀山白兔山在丹徒縣東南十五里明繞志宋刁約葬此有白兔躍岀故名馬蹟山在丹徒縣東南三十五里與地紀勝上有青童君馬蹟故名府志在今紫府觀即道書第四十九福地上有二洞曰黄龍青龍其一潛通華陽菊花山在丹徒縣南三里其對峙者為天福山俗呼虎頭山黄鶴山在丹徒縣南三里本名黄鵠山宋書元嘉中衡陽王義李鎮京口迎戴仲容求止黄鵠山北有竹林精舍林澗甚美太祖嘗曰吾東巡之日當宴戴公山下也隋志延陵縣有黄鵠山寰宇記在縣西南三里宋高祖潛龍時常遊竹林寺遊息於此嘗有黄鶴飛舞改為黄鶴寺俗又名鴻鶴山又磨笄山在山東南府志戴仲容女於此磨筓誓不適人因名夾山在丹徒縣南四里唐僧夾山於此説法寺名竹林又福田山洪山俱相近迴龍山在丹徒縣南七里下有八公巖林壑靜䆳緣谷口入溪流涓涓曰八公洞招隱山在丹徒縣南七里元和志獸窟山一名招隱山即隱士戴仲容所居寰宇記梁昭明太子嘗請書於此因名招隱今石案猶存上有招隱洞下有真殊泉虎跑泉昭明所開古井及亭唐李徳裕作記又靈山在縣南四十里長山在丹徒縣南二十五里上有靈泉下流與練湖通溉田甚廣高驪山在丹徒縣西南五十里一名句驪山隋書地理志延陵有句驪山寰宇記在縣西南七十里梁武帝輿駕東行記云自覆船山酒甖山南次高驪輿地紀勝覆船山在縣西南五十里亦謂㔶船又名酒􅑥陽彭山在丹徒縣西一里銀山在丹徒縣西二里江口即故土山也唐劉禹錫