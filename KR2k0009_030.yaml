城人天監中為曲阿令著美績蕭藻蘭陵人武帝時使持節督南徐州刺史侯景叛藻遣子彧率所部兵入援及城開景遣其儀同蕭邕代之據京口藻因之感氣疾或勸奔江北曰吾國台鉉任寄特隆既不能誅翦逆賊正當死耳因不食而薨蕭秀安成王文帝第七子也天監初為南徐州刺史京口自崔慧景亂後累被兵革民戸流散秀招懷撫納惠愛大行年饑以私財贍百姓所濟甚多隋達奚明大業初溧陽令疏決涇瀆以備旱澇民資利賴唐謝元超武德初潤州刺史重開南北謝塘以溉田民受其利畢構偃師人神龍初潤州刺史政有惠愛岑羲江陵人武后時為金壇令有治績尹元貞武后時曲阿令徐敬業起兵下潤州元貞率兵赴援戰敗被擒不屈死贈州刺史諡曰莊劉延嗣彭城人潤州司馬徐敬業攻城延嗣與刺史李思文固守城䧟敬業邀以降延嗣曰吾世蒙恩今城不守所負多矣詎能苟生為宗族羞繫江都獄敬業敗錄忠遷汾州刺史裴寬閒喜人景雲中為潤州參軍刺史韋詵休日登樓見人於後圃有所瘞藏者訪諸吏曰參軍裴寛也遂與偕來詵問狀答曰寬義不以苞苴汚家適有人以鹿為餉致而去不敢自欺故瘞焉詵深嗟異之武平一名甄以字行潁川郡王載德子元宗時諫不納貶金壇令既謫而名不衰齊澣義豐人元宗時潤州刺史州北距瓜步沙尾紆匯六十里舟多敗溺澣徙漕路由京口埭治伊婁渠以達揚子歲無覆舟減運錢數十萬又立伊婁埭官征其入招還流人五百戸置明州以安輯之韋損永泰初潤州刺史州有練塘久廢損復置以溉丹陽金壇延陵之田民賴其利蕭定大厯中澗州刺史有司差天下刺史治最定與常州蕭復豪州張鎰為第一韓滉長安人德宗時檢校禮部尚書為鎮海軍節度使綏輯百姓均租調不踰年境内稱治閻敬之丹陽郡太守永王璘反進至當塗敬之將兵拒之及璘戰於伊婁埭死之薛平寶元和中潤州刺史敦風俗守法度人甚安之理身澰薄常衣一緑𫀆十餘年不易賜朱服乃易去竇易直始平人元和中潤州刺史部將王國清指漕貨淹積不能前激衆謀亂易直械送獄其黨羣讙入獄篡取之易直縛為亂者三百人盡斬之李德裕贊皇人太和中潤州刺史鎮海軍節度使潤承王國清亂德裕自儉約以留州財贍兵雖儉而均故士無怨再期財賦復集杜審權杜陵人咸通中以檢校司空兼潤州刺史鎮海軍節度使清重寡言視事有當處非日入未始就内寢坐必斂袵若對大賓孟郊武康人貞元時為溧陽尉迎母奉養放情於山水間五代南唐吕延貞昇元中知丹陽縣開濬練湖作斗門以通灌注盧絳南昌人潤州節度使常陳京口至澗壁衝要之道宜立柵屯戍又召募便習水道者數千人立為偏禆督習水戰累於海門遮䕶越人船舫宋師圍金陵絳出舟師救圍麾兵三戰越人三北宋范仲淹吳縣人寶元中知潤州親學校敎士子政尚寬厚錢彥遠錢塘人知潤州時旱蝗民乏食彥遠發常平倉脤救之部使者詰其專且摧價彥遠不為屈王琪舒人知潤州臨事精敏有訟立決時轉運使欲濬常潤漕河琪陳其不便詔寢役張昇韓城人皇祐中由御史知潤州郡有民出外數日有報井中尸者其妻驚往視之哭曰吾夫也昇令其親屬就驗以井深不可辨昇曰何以獨婦人知之收付所司果姦夫所殺而婦人豫謀王覿如臯人神宗時潤州推官二浙旱郡遣吏視苗傷承監司風㫖不敢多除稅覿受檄覆按歎曰旱勢如此民食已絶倒廪贍之猶懼不克濟尚可責以賦耶盡除之監司怒捃摭百出會朝廷遣使賑貸覿為言民閒利病使者賢之薦諸朝林希福州人元祐中知潤州奏復吕城堰置上下閘以時啓閉許元宣城人知丹陽縣開濬練湖決水一寸為漕渠一尺法盜決湖者死會歲旱元請借湖水溉田不待報決之州遣吏按問元曰罷令可也竞不能詰歲乃大熟鄭驤玉山人元符中知溧陽歲饑民多逃亡漕司按籍督逋賦驤盡去其籍使者欲繩以法驤曰著令約二稅為定數今不除則逋愈多民愈貧賦愈不辦使者不能屈時議自建康鑿漕渠導太湖以通大江將破數州民田調江浙丁夫所費百萬計驤條析利病力止之虞奕錢塘人徽宗時知鎮江府愛民桴鼓金兵終不能渡相持黄天蕩者四十八日岳飛湯隂人紹興十一年詔同張浚往楚州措置邊防總韓世忠軍還駐鎮江劉子羽崇安人紹興十一年知鎮江府金人入寇子羽建議清野淮東之人皆徙鎮江撫以恩信雖兵民雜居無敢相侵者劉穎西安人紹興中溧陽主簿時張俊留守建康金師初退府索民租未入者穎白俊言師旅之後宜先撫摩當盡蠲逋賦俊喜即奏停免張子蓋成紀人紹興三十二年金人攻海州急以子蓋為鎮江都統往援之進次石湫堰時敵衆萬騎子蓋率精銳數千騎擊之殊死戰敵大敗擁溺石湫河死者半圍遂解汪藻德興人紹興中以顯謨閣學士知鎮江建炎之亂鎮江歲輸米不如數轉運使按視計負數萬扃鑰而去軍食不繼藻適至命破錀給之曰官軍張頣待哺米在廩中而不與食雖錮南山猶有隙也全活者無數李衡江都人知溧陽縣專以誠意化民民莫不敬夏秋二稅以期日榜縣門鄉無吏迹而輸送先他邑辦厯任四年獄無重囚隆興二年金攻淮堧官沿海者多送其孥衡獨自浙右移家入縣民心大安盜蝟起旁境而溧陽安靖自如蔡洸仙游人知鎮江府會西溪卒移屯建康舳艫相街時久旱郡民築陂瀦水灌溉漕司檄郡決之父老泣訴洸曰吾不忍獲罪百姓卻之巳而大雨漕運通歲亦大熟趙彥逾孝宗時知鎮江府郡適旱饑彥逾節浮費發栗賑糶民賴以濟陳居仁興化軍人孝宗時守鎮江值歲大旱請以緡錢十四萬給兵食不報為書以義撼丞相然後許間遣糴運於荆楚商人商人曰是陳待制耶爭以粟就糴所存沽數萬計因饑民治古海鮮界港為石䃮丹徒境上蓄洩以時以通漕運辛棄疾厯城人慶元時知鎮江府賜金帶傅伯成濟源人嘉定初知鎭江府全活饑民瘞藏野殍不可勝數圌山砦兵數與海盜為地伯成廉知姓名悉收捕之貸其死黥隸諸軍韓冠卿湯隂人嘉泰初知金壇年饑為書白郡及部使者聞於朝詔免中下戸負租錢九千餘緡米麥半之沈作賓歸安人慶元時權鎮江府請留戍兵千人又欲以江閩新軍二千人易舊軍千人備不虞朝廷難之遂請祠吳淵寕國人理宗時知鎮江府定防江軍之優後𣸪知鎮江府兼都大提舉浙西沿海諸州兵船歲大祲淵全活者五十六萬八千餘人孫子秀餘姚人理宗時知金壇縣嚴保伍釐經界結義役一切與民休息訟者使齎牒自詣里正并􅗪証來然後行不實者往往自匿其牒惟豪黠有犯則痛繩不少貸淮民流入以萬計賑給撫恤樹廬舍括田使耕拔其能者分治之崇學校明敎化行鄉飲酒禮訪國初茅山書院故址新之以待遠方遊學之士吳潛寕國人理宗時淮東總領兼知鎮江府立邊儲防禦等十有五事董槐定遠人紹興中權通判鎮江府會李全叛涉淮臨大江槐即日將兵濟江而西全遁去乃還王萬婺州人端平中通判鎮江時金初亡當路多知其人豪也咨問者旁午鄭清之初謀乘虛取河洛萬謂當急為自治之規已而元兵壓境理宗下罪巳詔吳泳起草又以咨萬謂宜以振厲奮發興感人心為條具沿邊事宜徧告大臣要官王埜金華人淳祐二年知鎮江府兼都大提舉浙西兵船増創水艦就楊子江習水戰登金山指麾之是冬揚子江有警急調張孝信所領遊兵救之而退陶居仁蕪湖人爲鎮江錄事參軍北兵破鎮江居仁見軌仰使降居仁曰詎可失忠義求苟生耶得以死報朝廷夫何恨竟不屈遂見殺李成大建昌人德祐初知金壇縣元兵至與寄居官潘大同大本率民兵巷戰不勝大同兄弟死之吏民挾成大降乃潛與胡用存謀復金壇事泄繫獄榜掠不屈殺其二子以懼之終不屈笑曰子為父死臣為君死卒殺之事聞贈朝散大夫直祕閣諡忠節莫謙之宜興僧人德祐初糾合義士捍禦鄉閭授溧陽尉與元兵戰殁贈武功大夫元張晉亨南宫人至元十一年詔伐宋由安慶渡江丞相巴延留之戍鎮江兼與民政一以鎮靜為務戰焦山瓜洲皆有功黄中天德中金壇縣尹奏免邑人無徴之税萬餘石嘗大水圩田盡没中為民告災得蠲賦明孔克忠曲阜人洪武初金壇主簿廉約有才幹生擒劇盜魏辛七等百餘人以殄民患董復昌鄱陽人洪武末知丹陽縣修復練湖隄岸置金斗門三處劉辰金華人建文中御史知鎮江府瀕江田八十餘頃久淪於水賦如故辰請除之境内閘堰廢壞者悉修復溉田甚衆林鶚太平人天順中知鎮江府郡漕河經孟清勢甚險鶚請按京口牐甘露壩故迹濬之以通舟楫春夏以閘秋冬以壩功力省便永以為利胡鑑正統初知丹徒縣奏言本邑額貢蘆薪洪熙改元免半折鈔此屬不急之務請罷之以省民力詔從之劉訓麻城人正統間知金壇縣建預倉積榖備荒修明倫堂給諸生遊學資每親行郊野勸課農桑暇則躬治蔬圃巡撫周忱為僉魚菜戸各一輪供以助其廉治行為天下第一擢御史熊佑傅興人成化中知鎮江府歲大祲奉蠲逋稅平糶煑糜荒政備舉嘗修練湖石堰以便蓄洩鑿鮑村陳瀆等港以殺丁角延陵諸水開爛況洪以溉吳家沙田民資其利劉天和麻城人正德中以御史謫金壇縣丞升本縣知縣縣築上城始於前令董桐六門兩關皆成於天和又築建昌都圩二閘以資灌溉設釐弊冊置義冢楊榮永川人宏治中以御史謫溧陽知縣濬百丈溝八百餘丈中存九壩以利灌溉乂建義倉於城南沈錬會稽人嘉靖間知溧陽縣性嚴明有犯立捕治不少貸姦猾畏罪茅坤歸安人嘉靖中知丹徒縣歲祲多方賑恤民賴以生梁瑾臨汾人嘉靖中金壇主簿治園蔬自給剔馬政諸弊時鹽寇騰江上檄進剿力載勝賊幾獲其魁暴風覆舟過害梁銓仁和人萬厯中知金壇縣邑中經費多淆雜虧缺銓取他所奇贏補其最急漕羨以給軍耗外悉除之城西濠一帶久成衢道時海上警鳩民濬治深廣城守有備本朝張承恩昌平人順治二年以副將佐守鎮江時疆宇初平姦穴未靖承恩招撫宿賊康三錫等境内晏然胡延年光州人順治二年知金壇縣湖寇薄城肆焚掠延年急請官兵至身自臨陣殺賊城賴以全塗廓奉天鐵嶺諸生順治二年從下江南以功知鎮江府時太湖盜出没道路為梗廓分設鄉兵守禦郡境以安官兵征折東取道京口城廓豫儲舟楫供億無闕民不知兵流亡漸集課農桑新學校巡按御史史詥疏薦之石廷柱奉天人順治乙未拜鎮海大將軍駐鎮江綏乂百姓嚴飭兵伍未嘗有隻騎入城民間稱曰石佛先是張名振三冦京口勢甚張至是聞風遠遁管效忠奉天人順治十三年提督江南綠營兵駐防京口巳亥冦衆十萬來犯效忠以五百人竭力捍禦相持二十日及恢復京口多方䕶持郡民得免俘戮賀應旌肥鄉人順治十五年知丹陽縣適海冦犯鎮江應旌請兵駐防悉力守禦城賴以完羅明昇南陽人鎮江巡江營都司順治十六年海冦䧟瓜洲明昇奮身䧟陣遇害鄒儀周南平人康熙初知丹徒縣請建營房兵民不擾徵輸悉除耗羡士民勒石焦山紀之後死耿逆之難總纂官臣王廣䕃恭纂輯前提調官臣張日章恭覆輯校對官臣賀式韓恭校恭覆校大清一統志鎮江府三人物漢包咸曲阿人師事博士右師細君習魯詩論語建武初舉孝廉除郎中入授皇太子論語又為其章句永平五年遷大鴻臚每進見錫以几杖經傳有疑輒遣小黄門就問顯宗以咸有師傳恩而素清苦常特賞賜珍玩俸禄增於諸卿咸皆散與諸生之貧者病篤駕臨視尋卒子福拜郎中亦以論語入授和帝左恢曲阿人官尚書左丞京師稱其清高遷會稽太守子忠為邑令所至有異政三國吳韋昭雲陽人少好學能文諸葛恪表為太史令撰吳書孫休踐祚為中書郎博士祭洒命昭依劉向故事校定羣書孫晧即位封高陵亭侯為侍中常領左國史晧欲為父和作紀昭執以但宜為傳如是非一後積嫌忿收付獄華覈疏救不聽遂誅之所著有孝經國語註及洞紀三卷又官職訓辨釋名各一卷子隆亦有文學華覈武進人以文學為䎵府郎遷中書丞蜀為魏所并覈詣宫門拜表以聞孫晧營新宫制度宏侈上疏諫不納後遷東觀令領右國史覈前後陳便宜及貢薦良能解釋罪過書百俆上皆有𥙷益殷禮雲陽人有潛識由吳縣丞除郎中使蜀諸葛亮稱之曰東呉菰蘆中乃有此人遷零陵太守卒晉徐邈其先姑幕人祖澄之遷居京口邈膺薦補中書舍人毎被顧問輒有獻替多所匡益轉祠部郎中前衛率領本郡大中正授太子經安王立拜驍騎將軍所著有榖梁傳注又撰正五經音訓弟廣學精純厯文淵祭酒成晉紀四十六卷南北朝宋劉穆之其先東莞人世居京口武帝克京城署府主簿從平建鄴諸大處分倉卒立定遂任以腹心動止咨焉穆之竭節盡誠無所遺隱厯遷尚書僕射領監軍中軍二府軍司將軍丹陽尹内總朝政外供軍旅決斷如流事無壅滯累遷侍中司徒封南昌縣侯卒高祖受禪思佐命元勲追封南康郡公諡文宣檀道濟其父金鄉人世居京口少孤事兄姊以和謹稱武帝建義從平京城累遷太尉參軍武帝北伐道濟為先鋒所至望風降服所獲俘囚皆釋而遣之以佐命功封永修縣公文帝使西伐謝晦事平遷征南大將軍元嘉八年督諸軍北畧與魏軍戰多捷以資運竭全軍而返魏甚憚之進位司空鎮夀陽彭城王義康矯詔誅之劉秀之穆之從兄子少孤貧東海何承天雅相器重以女妻之厯邑令有政聲兄欽之為朱齡石參軍隨齡石敗没秀之哀戚不歡宴者十年累官尚書僕射出為雍州刺史卒諡忠成秀之野率無風味而心力堅定勵官清潔家無餘財關康之其先河東人世居京口少篤學下邳趙繹以文義見稱康之與友善晉陵顧悅之難王弼易義四十餘條康之中王難顧遠有情理又為毛詩義經籍疑帶多所論釋累徴辟一無所就棄絶人事守志閒居泰始初復徴聘以疾辭齊諸葛璩其先陽都人世居京口幼事關康之博涉經史復事臧榮緒榮緒著晉書稱璩有發摘之功方之壺遂江祀薦為議曹從事辭不赴性勤於誨誘後生就學者日至太守張友為起講舍旦夕孜孜講誦不輟唐桓彥範丹陽人以門䕃官司尉主簿擢御史長安中為司刑少卿上言自文明後得罪惟揚豫博三州不免他可悉赦疏十上卒見聽張東之誅易之等引與定策中宗復位以爲侍中封譙郡公每諫帝以社稷爲重令皇后無干外朝又言僧慧範左道亂政不省加特進封扶陽郡王武三思矯制殺之睿宗即位追復官爵諡忠烈馬懷素丹徒人博通經史擢進士第累遷御史魏元忠爲張易之搆謫嶺表崔貞慎獨孤禕之祖道易之使人告貞慎等與元忠謀反武后詔懷素按之貞慎等乃免宰相李迥秀藉易之勢斂賕諉法懐素劾罷之轉禮部員外郎遷考功覈取實才權貴謁請不能阿撓開元𥘉爲戸部侍郎封常山縣公兼昭文館學士篤學子未嘗廢卷謙恭慎畏推爲長者卒贈潤州刺史諡曰文施敬本丹陽人開元中爲四門助敎元宗將封禪有司講求典儀敬本上言舊制盥手洗爵侍中主之祀天神太祝主之皆非禮詔張說引敬木熟悉其議後遷祕書郎卒丁仙芝曲阿人開元進士任餘杭尉居官清謹工詩蔡希周曲阿人開元進士厯官御史與弟希寂俱以詩名陶幹京口人開元進士厯官禮部員外郎工詩皇甫冉丹陽人師事蕭頴士以文名天寶中進士第一授無錫尉大厯初累遷右補闕奉使江表卒於家有詩集三卷弟曾累官至殿中侍御史與冉齊名權臯畧陽人徙丹徒擢進士第為臨清尉安祿山籍其名表署幕府度禄山且叛奉母南奔高適表試大理評事淮南採訪判官永王舉兵脅士大夫臯詭姓名以免明皇聞之拜御史後客洪州顔真卿表為行軍司馬召拜起居舍人固辭常曰吾潔身亂世以全吾志欲持是受名耶卒贈祕書少監諡貞孝包融延陵人官集賢學士工詩與賀知章賀朝萬張若虚邢巨齊融俱以文詞俊秀名揚於上京長子佶次子何俱天寶進士世稱二包與儲光羲等十八人皆有詩名殷璠彚次其詩為丹陽集戴叔倫金壇人劉晏管鹽鐵表主運湖南嗣曹王臯領湖南工西表佐幕府臯討李希烈留叔倫領府事守撫州刺史作均水法俗便利之詔書襃美封譙縣男加金紫服後遷容管經畧使綏徠夷落威名流聞德宗嘗賦中和節詩遣使者以寵賜世以為榮有詩集十卷權德輿皐子徙家丹陽人未冠以文章練湖上七歲居父喪哭踊如成稱幕府交辟之德宗聞其才召為太常博士改左補闕裴延齡判度支德輿疏斥其罔上不省再遷中書舍人知禮部貢舉甄品詳諦元和初拜禮陳古今本末以部尚書同覺悟人主平章事徳輿善辨論開為輔相寛和不為察察名卒諡曰文權璩德輿子元和初進士厯御史時李訓挾寵以周易博士任翰林璩與高元裕鄭肅韓佽連章劾訓傾覆隂巧且亂國不聽及訓誅時人多璩明禍福大體能世其家張祜南陽人以曲阿池風遂家焉性嗜水有南海遺石工詩許渾丹陽人太和進士厯官御史歸隱京口丁卯橋别墅有丁卯集殷遥潤州人能詩隱居不仕宋吳淑丹陽人父文仕吳至中允淑幼俊爽屬文敏速韓熙載潘佑深加器重以薦試授大理評事預修太平御覽廣記文苑英華等書厯祕閣校理嘗獻九弦琴五弦阮頌太宗賞其學問優愽又作事類賦百篇以獻詔令注釋淑分為三十卷累遷職方員外郎淑純靜好古詞學典雅工篆隸有集十卷説文五義三卷吳遵路淑子進士第累官殿中丞為祕閣校理章獻太后稱制遵路條奏十餘事語皆切直元昊反建議復民兵除天章閣待制河東路糧草受詔料㨂河東鄉民可為兵者諸路視計置以為法知永興軍卒遵路博學知大體母喪廬墓為政簡易不為聲威立朝敢言無所阿倚旣没室無長物范仲淹分俸賙其家子瑛為尚書比部員外郎不待老而歸焉刁衎其先上蔡人因父彥能仕南唐賜田京口遂家焉衎從李煜入宋出知桐廬縣上書諌淫刑厯知婺光廬潁諸州輒有政績孫約天聖進士為館閣校理直史館出知揚州作藏春塢歸隱蘇軾輩皆敬事之陳汝奭由晉江徒丹徒寶元進士知海州歲饑不俟報發廪賑後母卒終身不仕子龍輔嘉祐進士知建昌軍秩滿亦不仕葛勝仲丹陽人登進士第為太學正累遷太常卿宋自建隆至治平所行典禮歐陽修嘗裒集為書百篇號太常因革禮詔勝仲續増為三百卷詔藏太常及建春宫以勝仲兼諭德為仁孝學三論獻之太子復採春秋戰國以來厯代太子成敗善惡之迹日進數事詔嘉之徙國子祭酒卒諡文康著有丹陽集八十卷邵必丹陽人舉進士累遷開封府推官入修起居注知制誥雄州種木道上契丹濳遣人夜伐去人數漁界河中事聞命必往使必以理折契丹屈之邵亢必從子范仲淹舉茂才異等除建康軍節度推官趙元昊叛獻兵說十篇入爲國子監直史館英宗訪以世事稱之曰學士真國器也擢同修起居注建言頴王且授室願耒用古昏禮公主下降不宜厭舅姑之尊帝深納之神宗時授樞密副使卒贈吏部尚書諡安簡蘇頌同安人父紳葬丹陽因徙居之第進士累遷集賢校理富弼常稱爲古君子與韓琦同表其廉退英宗時遷度支判官元祐七年拜右僕射兼中書門下侍郎頌爲相務在使百官守法遵職量能授任深戒疆場之臣邀功喜事論議有未安者毅然力爭之爵累趙郡公王存丹陽人慶厯進士累遷知太常禮院嘗論圜丘合祭天地非古當親祀北郊如周制與王安石厚安石執政數引與論事不合即謝不往累上書陳時政因及大臣無所附麗皆時人難言者元祐初拜尚書丞存性寛厚不爲詭激之行至其所守確不可奪司馬光常稱之卒贈光祿大夫諡莊定姚闢金壇人皇祐進士授項城令通州通判所至有聲闢究心六經與蘇洵同修禮書有太常因革禮一百卷顧方丹陽人皇祐進士為明州象山令召父老詢民問利病建學以敎民大悦服卒於官立祠祀焉陳廓金壇人父亢家饒勇於為義常開速瀆河廓登進士厯廣東轉運判官奏罷羨財鄒浩稱其與弟彥通文高學博趨操堅正蔡肇丹陽人父淵家饒於財以讓兄弟而擔簦以遊四方登進士乙科厯知海州肇能文長於詩第進士厯官户部員外郎編修國史進起居郎中書舍人有丹陽集三十卷弟載亦工詩張綱丹陽人以上舍及第徽宗知綱五中首選特除太學正遷校書郎論事與蔡京不合擠之去久之還故官累除給事中進徽猷閣待制引年致仕秦檜用事久綱卧家二十年絶不與通問檜死召為吏部侍郎參知政事常書座右曰以直行已以正立朝以靜退高天下其篤守如此卒諡文簡洪擬丹陽人登進士宣和中為御史時王黼蔡京更用事擬中立無所附會高宗如越執政議移蹕饒信間擬上疏力爭累遷吏部尚書復提舉太平觀卒諡文憲有淨智先生集及注杜詩二十卷蔣猷金壇人舉進士政和四年拜御史中丞有直聲常論楊戩不當除節度使趙良嗣不宜出入禁中又疏孟昌齡徐鑄等姦狀累官徽猷閣直學士翟汝文父思自開封徙居丹陽汝文登進士第徽宗時拜中書舍人外制典雅一時稱之紹興初除參知政事秦檜劾汝文等專檀罷去汝文性剛不為檜屈常對案相詬好古博雅精於篆籕有文集行世卒諡忠惠陳東丹陽人倜儻負氣蔡京王黼用事人莫敢指言獨東無所隱諱以貢入太學飲宗即位率其徒伏闕上書請誅六賊以謝天下謂蔡京梁師成李彦朱勔王黼童貫六人李綱罷東復率諸生伏宣徳門上書於是亟詔綱入復領行營補東官除太學錄東又請誅蔡氏且力辭官以歸高宗即位相李綱詔東至未得對會綱去乃上書乞留綱而罷黄潛善汪伯彥不報會布衣歐陽澈亦上書言事潛善遽以語激怒髙宗與澈同斬於市越三年高宗感悟追贈東承事郎洪興祖丹陽人登政和疏乞收人心納上舍第高宗謀䇿安民情時壯為太國威常博士上又論國家再造一宜以藝祖上疏具言朝廷紀為法紹綱之失興四為時年蘇湖地宰所惡主震應管太詔平觀興要㫖祖好古文古博學著老莊本㫖周易通義繫孝經序贊離騷楚詞考異行於世辭劉宰金壇人耤田令紹興屢辭進士厯任知縣改添差通判建有能聲理康府又辭宗以乞致為仕端平初時相收召譽望畧盡所與之耳宰剛大正直明敏仁恕不能致施惠鄉者宰與崔邦其德實多隱居三十年於書靡有漫塘文集語鋉行世所不卒諡讀所著文清王遂金壇人嘉泰進士紹定中拜御奔競劾史嵩之史疏論進欺君誤國君子李知退小人正風俗息孝梁成大莫澤三凶之罪又上邊邊閫者六帝皆事言當今之急務在朝廷者五善之累遷權工部尚書卒諡正在肅趙淮丹徒人以從無為軍德祐父葵賜時元兵第洛陽自江州家馬咸淳下淮於銀中知樹東壩招集義兵聚扼建康東出之糧兵造艦除江於長蕩湖倚㞯山置東轉運使冬元兵分寨以道進臨安淮屯豐登圩戰敗見烏珠不屈被殺其妾翠蓮緑雲殉焉時有進士錢應高聞淮變憤不食赴荆溪死茅湘丹徒人慷慨者大志以陸秀夫薦授兵部侍郎從幸海上元兵逼崖山赴水死元徐鈺鎮江人始冠侍父鎮之婺源過小溪鎮乘輿失足墮水中鈺投溪擁鎮出鎮得挽行舟以升鈺力憊水勢湍急遂溺死江浙行省言狀旌其閭孫瑾丹徒人父喪哀毁嚴冬跣足而步及葬載柩渡江潮渡方湧俄順風翼帆如覆平地事繼母唐氏尤孝常患擁瑾親吮之又䘮目瑾䑛之復明唐卒將葬苦雨瑾夜哭乞天霽至旦雲日開朗甫掩壙隂氣復合雨注數日不止縣上狀旌之明郭任丹徒人廉慎有能建文初官戸部侍郎燕兵起主調軍食燕王師入京𬒳擒不屈死之一年本朝乾隆四十賜諡烈愍張德明丹徒人建文中為戸科給事中犒師東昌遇燕兵𬒳執不屈死虞謙金壇人洪武中由國于生擢刑部郎中如杭州府建文中請限僧道田人無過五畝餘給貧民從之永樂中厯右副都御史屢巡外郡著賢聲仁宗立改大理卿治獄必求其平常語人曰彼無恨斯我無恨矣會詔求直言謙奏七事皆見納工詩畫所著有玉雪齋集譚廣丹徒人初為燕山䕶衛百户從燕王起兵積功為都指揮僉事永樂中兩從岀塞進都督僉事仁宗初擢左都督鎮宣府六年以守邊勞封永安伯卒諡襄毅丁璣丹徒人成化進士除中耆舍人以星變極論時政得失力詆李孜省繼曉左道亂政帝怒因事謫普安州判孝宗初厯廣東提學副使璣涵養深䆳崇正闢邪獨立不懼自粤入覲卒於途遠近悼之殷敏金壇人宏治進士厯官户部郎中督九門税鈔劉瑾欲增斂敏持不可遷福建僉事時峒賊猖獗敏調發餽運倉卒賊逼城竭力保障設疑兵退之湯禮敬丹陽人宏治進士授行人擢刑科給事中正德初言上天屢示災譴不謹天戒惟走馬射獵遊樂無度四月雷電雨雹當六陽用事隂氣乃與之抗此倖臣竊權忠鯁疎達之應又偕九郷伏闕請誅八黨宦竪切恨之中以事謫冀州判官繆樗溧陽人舉進士由東陽知縣擢南御史孝宗立偕同官陳時政八事因劾尹直杜銘等不職時號敢言尋劾中官蔣琮爲所䧟謫莒州判官唐侃丹徒人正德中由郷舉知永豐縣遷武定知州政聲甚著擢刑部員外學所讀書處有鄰女夜奔之拒勿郎卒侃從丁璣納其父坐繫侃請代不得藉草寢釋乃止其操性貞地逾歲父潔如此殷士望丹徒人嘉靖中倭寇入犯父被掠士望請代炙刀刺受之怡然死賊笑而試之火遂兩釋之後獲旌姜寶丹陽人嘉靖進士授編修以不附嚴嵩出爲四川提學僉建提學副使再遷國子監祭酒復積分法事轉福以造就人才累官至南禮部尚書致仕家居置義田立義學鄉人德之王韜孟金壇人嘉靖進士由吉安推官拜南吏科給事中疏劾張瓚嚴嵩胡守中等與巨姦郭勛相結納守中竟得罪嵩入閣復偕同官陳等劾嵩及子世蕃貪汚納賄嵩恨甚久之出爲山東僉事以任滿入都道病後期嵩遂奪其官面官三韜孟在臺常劾罷方十九人直聲甚著王樵金壇人嘉靖進士授行人厯刑部員外郎著讀律私箋甚精覈以山東僉事移疾歸萬厯初張居正雅知樵起擢尚寶卿劉臺劾居正居正乞歸諸曹奏留之樵擉請全諫臣以安大臣引文彥博待唐介故事居正大恚出為南鴻臚卿厯右都御史致仕樵恬淡誠慤温然長者遽經學易書春秋皆有纂述卒贈太子太保諡恭簡馬從謙溧陽人嘉靖進士授工部主事厯光祿少卿中官杜泰乾没光祿歲費鉅萬為從謙奏發泰因誣以誹謗下詔獄杖死子有驊為父請卹贈太常少卿時同邑御史狄斯彬亦劾泰謫宣武典史史際溧陽人嘉靖進士以文選司主事改春坊旋乞歸置義莊義墪修明倫堂濬𨄌龍關蠲田二頃資貧士㑹歲饑發廪以濟更出粟開闢沙漲堰存活數千人倭犯江浙際募死士追擊之巡撫海瑞上其事進尚寶卿䕃子繼書指揮僉事于孔兼金壇人萬厯進士厯官禮部郎中閣臣王家屏以爭冊立求去孔兼上疏乞留詔議並封三王孔兼率同官立諌事得寢後疏救考功郎趙南星謫安吉州判尋投牒歸杜門讀書矩矱整肅鄉人稱之無閒言天啟中贈卷祿少卿從弟仕廉亦萬厯進士厯官南戸部侍郎有清望徐有聲金壇人崇禎間授戸部郎中督儲大同神樞營草場京師陷被執不屈支解死本朝乾隆四十一年賜諡烈愍賀應選丹陽人天啟舉人崇禎末知資陽縣張獻忠攻城應選悉力固守城䧟被執罵賊死闔門十七人皆被害十一年本朝乾隆四賜諡忠烈荆本澈丹陽人崇禎間授職方郎中初為温體仁所怒免官後監下江軍殁於浙東本朝乾隆四十一年賜諡節愍史覲宸金壇人石屏籍知順慶府崇禎十七年張獻忠攻城募兵力禦城䧟𬒳執死之本朝乾隆四十一年賜諡節愍鄧藩錫金壇人崇禎進士知兗州府甫低任繕守具崇禎十五年大兵至藩錫與監軍參議王維新竭力死守城潰維新戰殁藩錫以不降𬒳殺事聞贈太僕少卿本朝乾隆四十一年賜諡忠節王明汲金壇人崇禎中授贛州同知城破死之本朝乾隆四十一年賜諡烈愍陳冊金壇人崇禎間署屏山縣流寇䧟城罵賊死本朝乾隆四十一年入忠義祠沈元鑑金壇人崇禎間為隨州吏目張獻忠犯隨元鑑同知州晝夜防禦閱兩月城䧟脅降元鑑不屈遂過害其子文淵赴難賊縛其手死而復甦負元鑑骸骨歸葬本朝乾隆四十一年入忠義祠荆偉丹陽人崇禎末以選貢知墊江縣賊龔遂等依山爲阻數出剽掠偉設奇破之會張獻忠窺蜀遂約爲内應城陷𬒳執不屈死本朝乾隆四十一年賜諡節愍眭明永丹陽人崇禎舉人華亭敎諭大兵破松江題絶命詞於明倫堂自縊死本朝乾隆四十一年入忠義祠馮厚敦金壇人江陰訓導大兵下江隂與典史閻應元登陣固守三月城破應元投水死厚教自經明倫堂妻女亦同死本朝乾隆四十一年賜諡節愍潘文先丹徒人江隂訓導罷官後大兵破城與訓導馮厚敦同死時同邑卜大經官綿州與史張獻忠䧟城與其僕俱縊死本朝乾隆四十一年並入忠義祠王定遠鎮江人鎮江衛千户崇禎十年禦賊宿松奮勇殺賊死本朝乾隆四十一年入忠義祠王介休丹陽生員李自成䧟京師不食七日死同邑生員江應坤張映發劉慶遠金飇吕家齊饒餘汪自盤王廷佩俱死之本朝乾隆四十一年並入忠義祠王榮圖金壇人甲申聞變殉節同邑生員王明灝王希高布衣王汝紹俱死節本朝乾隆四十一年並入忠義祠本朝張鳳儀丹徒人父柏性仁厚樂施濟鳯儀少孤性孝友貫通史學子九徴順治乙酉郷試第一登進士博學礪名節厯官文選郎出為河南提學以公清著九徵長子玉栽康熙丁未廷對第二官編修亦䆳於史學吳贊元丹陽人明庚午舉人順治二年授中書擢御史巡按江西時豫章初定反側未安贊元撫輯有方遂收建饒廣贛諸府奏免袁瑞二郡浮糧郡人尸祝之蔣超金壇人順治丁亥進士第三人官編修刻苦謮書甚於諸生視學畿甸文敎大振事竣力請解官遍遊名山至蜀之峨嵋結廬於伏虎寺側復至成都修通志趺坐而終超性廉靜於名利無所嗜手錄書至數百卷所著有綏庵集荆其惇丹陽人順治進士知郾城縣時師行絡繹徵索不時其惇自卧大將軍幕府外言曰郾民不給役獨令可使耳大將軍知其廉以故郾獨弗擾縣苦浮潦築隄龍塘河口捍水患郾人德之植荊隄上號荆隄芮城凓陽人明季諸生博通羣書文行為一時冠同學陳名夏馬世俊皆師事之後棄諸生高隱杜門著述與同邑湯泰享談易象有黙契者海冦入犯江寕重城名以厚禮聘城峻卻不汚偽命郷里服其高識所著有禮記通志滄浪吟何應仕丹徒人順治初以貢授推官改知永嘉縣築長埭為民田利時駐防兵以剿盗多所浮繫應仕白於帥分别釋之冦䧟鄰邑老弱來歸者數萬帥慮變不内應仕涕泣請盡内其人寇逼城誓以死殉城卒完永嘉人圖像以祀李琚丹徒人順治初武舉授福建興化衛千緫有剿寇功擢閩安鎮水師守備丙申秋賊犯福州琚連戰三日身𬒳數十創殁於陣其闔家五十餘口皆遇害事聞贈都司何金城丹徒人由舉人知湖州府以慈惠得民斷獄遇矜疑即為昭雪卒於官貧無餘素同官助其喪馬世俊溧陽人淹貫經史負文帝重名順冶辛丑廷對第一性樸素釋褐日捧宫𫀆無與馬僕從徒步歸寓在史館朝夕一編宴會送迎多謝絶所著有匡庵集戴舜年金壇人生五歲族人擊殺其父恃富豪賄諸當事事遂己舜年雖幼見其祖母時切齒飲泣黙識之年二十途遇其讐舉手中鉏擊之讐破腦死即詣縣自言狀令義之繫待報可僅予杖時丹徒法治朝以父為兵所害哭三晝夜眼出血帥遂取兵斬於市冤得伸黃洪元丹陽人父國相為同里虞庠隂溺死洪元與弟奇元稍長誓志報讐及母卒遂殺庠詣縣自歸且爭死有司錄繫洪元釋其弟事聞詔並釋之張玉書九微次子順治進士選庶吉士授編修厯禮部尚書康熙庚午晉大學士輔政二十年卒諡文貞玉書學問淵雅風格巖然在講幄毎據經義納忠有請行封禪者玉書謂非古禮事遂止從聖祖仁皇帝幸南河又從平定厄魯特恪共匪懈得大臣體雍正中入祀賢良祠乾隆十六年御賜風度端凝額旌其閭張鵬丹徒人順治進士由中書擢吏科給事中條奏俱稱㫖任山東巡撫疏言萊青等府額徵解運臨倉米麥脚價累民請改折色歲省蓆草脚費銀數萬民甚便之官至吏部左侍郎卒賜祭莫史鶴齡溧陽人康熙進士官編修以文學書翰稱㫖屢荷恩賜乞假歸養卒賜祭葬蓋異數云賀上林丹陽人父天敘以事忤今繫獄將殺之上林年十八謀脱父不得聞巡撫將至涉江溯淮迎舟大呼騶從呵之不得前遂投河死檢其衣得一紙則白久冤狀也巡撫按部具得令不法狀釋天敘於獄郷人為立賀孝子祠姜兆錫丹徒人康熙舉人飭行勵學捐田贍族人召充三禮館纂修官有所輯九經行世王澍金壇人康熙進士家貧勵學朁心理境書法尤工擢户科給事中多所建白章奏必焚其稿所着有禹貢譜困學鋉淳化閣帖考正蔣振生原名衡貢生能詩文精楷法授英山敎諭辭不仕恭寫十三經進呈乾隆六年賜國子監學正史貽直鶴䶖孫康熙進士由檢討厯文淵閣大學士卒贈太保諡文靖入祀賢良祠貽直年十八通籍逮事三朝敭厯中外恩春才哀慈聖慶典與文臣九老命遊香山又以重預瓊林上製詩賜之王步青金壇人雍正進士官編修性沖澹學務質實工文著四書大全選時藝分八集為初學所宗卒入祀郷賢祠于敏中金壇人乾隆丁巳廷對第一厯官文華殿大學士文淵閣領閣事卒諡文襄久直樞近熟習掌故平定金川時軍書旁午敏中承㫖書諭夙夜殫心功成圖像紫光閣吉夢熊丹陽人乾隆壬申進士由編修擢御史多所建白洊升至通政使入直上書房前後三十年盡心供職屢掌文衡所得多知名士卒入祀郷賢祠王行儉溧陽人由舉人知南鄭縣緣事革職嘉慶元年邪教滋事行儉投效軍營防守汝河賊至迎擊殲斃數十人賊四面圍裹力竭遇害事聞照知州例議卹廕雲騎尉流寓漢焦先一作焦光河東人漢末隱於焦山冬夏袒露後野火燒其廬因露寢遭大雪坦卧不移嘗三詔不起因以三詔名洞晉祖逖范陽人元帝用為軍諮祭酒居丹徒之京口常懷振復社稷之志帝乃以逖為奮威將軍豫州刺史使自招募仍將本流徙部曲百餘家渡江中流擊楫誓曰祖逖不能清中原而復濟者有如大江詞色壯厲衆皆感歎劉毅沛人後家京口與劉裕何無忌等同舉義兵興復帝室初毅丁憂在家義旗之興遂墨絰從事至軍役漸息上表乞還京口終喪禮不許累遷荆州刺史都督諸軍事何無忌郯人鎮北將軍劉牢之即其舅也時鎮京口無忌往依焉隨牢之南征桓靈寶及靈寶篡位無忌還京口與劉毅素善遂共舉義兵累遷江州刺史鎮南將軍南北朝宋戴安道譙郡銍人衡陽王義季鎮京口長史張邵與安道婣通迎來止黄鵠山義季亟從之遊安道野服不改常度齊臧榮緒東莞莒人隱居京口敎授純篤好學括東西晉為一書紀錄志傳百一十卷自號披褐先生與關康之俱隱京口時號為二隱梁陶宏景由秣陵遷句曲山自號華陽隱居與武帝為故交有大議必諮之時人謂之山中宰相唐李紳亳州譙人世宦南方客潤州紳短小精捍於詩最有名時號短李葬母有烏衘芝墜輤車宋石延年幽州人為三喪未舉留滯丹陽范仲淹遣子純仁往姑蘇運麥五百斛舟次丹陽見延年延年云三喪在淺土欲葬之而北歸無可與謀者純仁即以麥舟付之辛次膺萊州人幼孤依從母外氏於丹徒登進士第厯官參知政事孝友清介立朝謇諤元偰文質其先畏吾人父哈喇布哈爲廣東運司死王事諡忠愍文質十歲割股療母時以父忠母節子孝爲三絶文質以䕃監厯官廣東宣慰司副都元帥所至破賊清獄歸老溧陽沙漲里季子琳沁至順進士官潮陽尹後歸南昌舊寓會賊亂檄守東門城䧟不辱妻子十一人同日死哈喇布哈舊作哈喇普化琳沁舊作列箎今俱改正明楊一清安寕人少居巴陵父喪卜葬丹徒遂家焉武宗時以大學士乞休歸宸濠反一清以鎮江要地請調軍儲粟以備之會帝南征幸一清第樂飲兩晝夜一清賡御製以十數從容風止帝遂不爲江折行列女宋竇氏女丹徒人父母早亡爲媒氏所誤許字一舊僕成婚始識之投并死明仲憼妻趙氏丹徒人年十九夫亡家貧父母欲嫁之自剔其目以示不可奪事翁姑以孝聞錢璽妻嚴氏丹陽人與子鷺妻金氏子聚妻蕭氏共守節時稱一門三節張綖妻錢氏丹徒人綖攜氏避兵山中兵突至偕一婢赴水死綖嫂萬氏亦同死時稱一門雙節查爾瑩妻戴氏丹徒人避兵塌山為所掠投水死同縣胡覲龍妻陳氏夫殁鄰里勸之改適遂自經顧世賞妻吳氏顧驊妻李氏同避兵投石坑死王世春妻趙氏妄尤氏俱避寇投池死殷氏女名金丹徒人孝子士望女弟盜縛其母女哀號請代盗兩釋之睦燔妻徐氏丹陽人燔卒氏孀居事姑盡孝撫子坦又早亡與子婦曹氏三代守節姜士進妻蔣氏丹陽人頴悟喜讀書夫亡蔣求死不獲乃於繐帳前掘坑埋甕貯水笑曰吾將種白蓮於北此花出泥淖無所染令亡者知吾心耳家人信之防梢懈蔣乘閒濡首甕中死荆潹妻于氏丹陽人聞兵將至謂潹曰請先殺妾夫不忍氏曰君不自殺以血賊刃耶遂俱死邵氏婢丹陽大俠邵方家婢也方生子儀今婢襁褓之萬厯初張居正惡方屬巡墲捕殺之並逮儀儀甫三歲婢立把以付沈應奎曰邵氏之祀在君矣此子生婢死無憾捕者至繫婢毒掠終無言儀得免於難楊廷茂妻王氏溧陽人年十八夫亡截髪守志紡績以奉姑同縣彭久康妻潘氏年二十夫亡氏有妹亦寡交刺中心不改四字於左臂以自勵楊氏女溧陽人年十五父母繼亡矢志不字刺守貞二字以示志撫弟成立蔣氏女溧陽人許字史傳心夫病請歸侍疾夫卒自經萬敬妻史氏金壇人嫁未逾年夫亡氏絶粒三日葬畢自經死于天篤妻王氏金壇人夫亡將葬觸棺死與夫同穴史洪綸妻賀氏金壇人年二十夫亡事姑盡孝一日火延夫柩氏守烈焰中忽雨火得滅有大盜經其尸相戒勿犯節烈家屢辭旌不受鄧蕃錫妾張氏金壇人蕃錫守兗州崇禎壬午城䧟死之氏聞即攜子投井死董氏金壇人許字張某會有怙勢求娶者董不從自刎死同縣傅氏女亦宇人未適夫死父母更許他姓女自縊于氏女金壇人許字進士賀鼎為繼室賀以讒繫獄寄書辭婚女不從鼎父孟巖憂悸成疾女請於父曰舅老無子在側請歸賀氏父許之後鼎釋獄病不起訃至氏爲鼎立後治喪皆有禮法馮氏女金壇人聞父厚敦及母王氏死江隂即絶食自縊死王氏三女金壇人二爲王潺金女一爲王逸女崇禎末兵亂三女避長蕩湖業葦中賊操筏至勒之置筏上三女倚背手互相持至急湍處併身曲踊連頓其足筏覆與賊俱溺明日賊屍盡浮惟三女屍不出月餘兩家求得之猶堅相持父母哭而披其手始開葬湖壖家樹必三椏有連理者本朝陳太初妻夏氏丹徒人夫亡無子葬畢自經同縣王士宏妻尹氏亦夫亡殉節夏氏女丹徒人順治閒盗犯鎮工逼之氏赴大死同縣卞宸俞妻顔氏王世春妻趙氏妾尢氏顧世賞妻吳氏子婦李氏張翥妻孫氏均過賊不辱投水死葛允民妻眭氏丹陽人夫亡守節敬事舅如撫孤成立同縣陳懋勲妻李氏陳邦正妻夏氏均夫亡守節俱順治年間旌楊永美妻巫氏金壇人夫亡守節撫孤成立順治年閒旌余有德妻趙氏丹徒人遇暴不汚死同縣姜廷貴妻趙氏亦遇暴不汚死俱康熙年閒旌龔行妻謝氏丹徒人由興化從夫避水患居邑之南關口邑人田五窺氏及氏女美數挑之氏嚴拒田詭計以行負債訴官官勿辨笞行令償氏念非捐身冤不白與女哭牽臂投湖死田論如律俱康熙年閒旌周大順妻盧氏丹陽人夫亡守節同縣顧紹弼妻程氏莊日盛妻李氏均夫亡守節俱康熙年閒旌馬世位妻周氏溧陽人夫亡無子父母欲奪其志氏捩折其脛痛絶方蘇守節備極辛苦同縣潘瑞封妻史氏吕鳴和妻曹氏黄正庭妻張氏均夫亡守節俱康熙年閒旌虞魁東妻史氏金壇人夫亡守節同縣史培元妻王氏李枝奇妻楊氏均夫亡守節俱康熙年閒旌陳樹槐聘妻朱氏丹徒人未婚夫亡女聞訃服原聘衣自縊雍正元年旌張懋勲妻管氏丹陽人夫亡守節同縣淩士達妻田氏王炯理妻趙氏賀衍芳妻潘氏賀廷寶妻束氏眭鼎鏋妻桓氏荆瀾妻賀氏鄒翥妻吳氏郭天成妻張氏賀梅妻惲氏均夫亡守節俱雍正年閒旌史夏治妻黄氏溧陽人夫亡守節同縣周在䕃妻陳氏周掄元妻吳氏均夫亡守節俱雍正年閒旌于芝祐妻王氏金壇人夫亡守節孝事舅姑撫嗣子成立弟房若妻王氏亦卑寡事伯姆如姑嫜紡績教子俱雍正年閒旌談善妻沙氏丹徒人夫亡守節與子孝妻楊氏孫瑞生妻童氏三世孀居一門勵志同縣陳應龍妻楊氏陳仁聲妻田氏王民紱妻桞氏趙光妻王氏張明培妻吳氏錢志琳妻柳氏盛士標妻團氏余永橋妻吳氏余永賢妻錢氏張啟光妻何氏李應魁妻業氏孫久宗妻夏氏郭承恩妻王氏沈如慶妻吳氏包元濂妻劉氏張宏志妻蔣氏程康民妻黄氏李芬芳妻錢氏王瀛妻章氏程中貞妻吳氏周汝駿妻何氏華政吾妻楊氏沈一餘妻王氏徐宏誠