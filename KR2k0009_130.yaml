body:
  text: 宜昌府在湖北省治西一千八十里東西距五百九十里南北距四百一十里東至荆門州當陽縣界一百四十里西至四川夔州府巫山縣界四百五十里南至荆州府宜都縣界六十里北至襄陽府南漳縣界三百五十里東南至當陽縣界一百四十里西南至湖南澧州石門縣界三百五十里東北至荆門州遠安縣界九十里西北至鄖陽府房縣界五百六十五里自府治至京師三千五百四十里分野天文翼軫分野鶉尾之次建置沿革禹貢荆州之域春秋戰國楚地漢南郡地為都尉治建安十三年為臨江郡地蜀漢為宜都郡地晉宋齊因之梁置宜州西魏改曰拓州北周改曰硤州隋大業初改曰夷陵郡唐武德二年改曰硤州天寶初曰夷陵郡屬山南東道乾元初復曰硤州五代初屬蜀後屬南平宋曰硤州夷陵郡屬荆湖北路元至正十七年升為硤州路屬荆湖北路明洪武初改曰硤州府九年降為夷陵州屬荆州府本朝初因之雍正十三年升為宜昌府屬湖北省領州二縣五東湖縣附郭東西距一百九十五里南北距三百二十五里東至荆門州當陽縣界九十里西至長陽縣界一百五里南至荆州府宜都縣界五十里北至襄陽府南漳縣界二百七十五里東南至當陽縣界九十里西南至長陽縣界五十里東北至荆門州遠安縣界一百二十里西北至歸州界二百里漢置夷陵縣屬南郡建安中屬臨江郡蜀漢屬宜都郡呉黃武元年改縣曰西陵晉太康元年復曰夷陵宋齊因之梁置宜州西魏改曰拓州北周改曰硤州隋大業初為夷陵郡治唐宋因之元為硤州路治明初為硤州府治洪武九年府降為夷陵州以夷陵縣省入屬荆州府本朝雍正十三年改設東湖縣為宜昌府治歸州在府西北三百五里東西距二百五十五里南北距一百九十里東至東湖縣界一百九十里西至巴東縣界六十五里南至長陽縣界一百四十里北至興山縣界五十里東南至東湖縣界一百四十里西南至巴東縣界一百二十里東北至興山縣界五十里西北至巴東縣界六十五里漢置秭歸縣屬南郡後漢因之建安中孫權分屬固陵郡尋廢三國呉永安三年分置建平郡晉平呉屬達平郡宋齊因之周改縣曰長寕兼置秭歸郡隋開皇初郡廢縣仍曰秭歸屬信州唐武德二年析置歸州天寶初改曰巴東郡屬山南東道乾元初復曰歸州五代初屬蜀後屬南平宋亦曰東郡隸荆湖北路元至元十二年立安撫歸州巴司十四年升為歸州路總管府十六年復降為州屬湖廣行省明洪武元年州廢縣属夷陵州尋復置歸州以秭歸縣省入隸荆州府本朝雍正六年改為直隸州十三年改屬宜昌府長陽縣在府西南七十六里東西距二百二十五里南北距一百五十四里東至荆州府宜都縣界二十五里西至巴東縣界二百里南至長樂縣界九十四里北至歸州界六十里東南至長樂縣界一百五里西南至巴東縣界一百七十五里東北至東湖縣界四十二里西北至歸州界二百里漢置佷山縣屬武陵郡後漢改屬南郡三國漢屬宜都郡晉太康元年改口輿山尋復曰佷山仍屬宜都郡宋齊因之隋開皇八年改置長楊縣並置睦州十七年州廢屬南郡唐曰長陽縣武德四年復置睦州八年州廢縣屬東松州貞觀八年屬硤州五代及宋因之元屬硤州路明屬夷陵州隸荆州府本朝初因之雍正六年改屬歸州十三年改屬宜昌府興山縣在府北三百十里東西距二百五十里南北距三百十里東至東湖縣界一百里西至巴東縣界一百五十里南至歸州界四十里北至鄖陽府房縣界二百七十里東南至東湖縣界九十里西南至歸州界五十里東北至鄖陽府保康縣界一百四十五里西北至房縣界一百八十五里漢秭歸縣地三國呉置興山縣屬建平郡晉因之宋省唐武徳三年復置屬歸州宋熙寕五年省入秭歸元祐初復置元因之明正統七年省入巴東縣成化七年復置尋又廢宏治二年復置仍屬歸州本朝初因之雍正十三年改屬宜昌府巴東縣在府西四百二十五里東西距一百四十五里南北距九百五十里東至歸州界五十五里西至四川夔州府巫山縣界九十里南至長陽縣界三百五十里北至鄖陽府房縣界六百里東南至歸州界三十里西南至鶴峯州界三百五十里東北至歸州界二十里西北至夔州府巫山縣界一百六十里漢南郡巫縣地梁置歸鄉縣並置信陵郡後周郡廢改縣曰樂鄉屬信州隋開皇末改曰巴東大業中屬巴東郡唐屬歸州宋元因之明洪武九年改屬夷陵州後復屬歸州本朝初出心雍正十三年改屬宜昌府長樂縣在府南一百九十一里東西距三百里南北距七十二里東至長陽縣界一百二十五里西至鶴峯州界一百七十五里南至湖南澧州石門縣界二十里北至長陽縣界五十二里東南至石門縣界一百四十里西南至鶴峯州界一百四十里東北至長陽縣界三十五里西北至鶴峯州界一百五十里元以前為蠻地明洪武六年置五峯石寶長官司十四年廢永樂五年復置隸容美宣撫司尋廢本朝雍正十三年改置長樂縣屬宜昌府鶴峯州在府南四百七十一里東西距一百九十五里南北距三百四十五里東至長樂縣界九十里西至施南府宣恩縣界一百五里南至湖南澧州慈利縣界二百里北至巴東縣界一百四十五里東南至澧州石門縣界一百六十二里西南至湖南永順府桑植縣界五十里東北至長樂縣界一百四十五里西北至施南府建始縣界一百四十五里本晉施州建始縣地後為蠻地元至正十一年立四川容美峒軍民總管府明洪武四年置宣撫司尋廢永樂四年復置隸施州衞百二十二丈巴東縣城舊無城南依巴山北背大江自然城塹也長樂縣城周三里有竒高丈餘門四本朝乾隆二年建四十四年修鶴峯州城周三里有竒高丈餘門四本朝乾隆二年建學校宜昌府學在府治文昌門内本朝乾隆年間建入學額數二十名東湖縣學在府治東北卽夷陵州學明洪武初建明末燬本朝順治中重建康熙中屢修入學額數十五名歸州學在州治後舊在州北明萬厯中遷建今所後燬本朝康熙四年重建入學額數十二名長陽縣學在縣治西舊在縣治東本朝順治中遷建今所康熙雍正乾隆中屢修入學額數八名興山縣學在縣治東舊在東門外明正德年閒遷建今所本朝康熙三十六年修入學額數八名巴東縣學在縣治東明洪武初建隆慶閒遷夀安寺萬厯中復舊本朝康熙十一年重建入學額數八名長樂縣學在縣東門内本朝乾隆三十二年建入學額數七名鶴峯州學在州東門内本朝乾隆三十二年建入學額數八名六一書院在東湖縣治東明嘉靖中建祀宋歐陽修因以課士墨池書院在府城東門内星街康熙中建乾隆十二年重修清江書院在長陽縣治東五峯書院在長樂縣城内學署左半里乾隆三十五年建嘉慶十七年修户口原額人丁二千四十九今滋生男婦共七十三萬三千六百二十五名口計一十萬六千四百二户田賦田地山塘一萬八千八百八十四頃三十三畝五分有竒額徵地丁正雜銀九千三百八十五兩五錢八分七釐山川對馬山在東湖縣東五里虎牙山在東湖縣東南三十里下有虎牙灘宋范成大集虎牙灘又名荆門十二碚屬夷陵孤山在東湖縣南五里一名葛道山一名郭道山水經注江南岸有山孤秀從江中仰望壁立峻絶袁山松記云上至其嶺容十許人四望諸山畧盡其勢寰宇記陸抗故城之南有孤山輿地紀勝晉郭景純結廬於此方輿勝覽相傳葛稚川修鍊處執笏山在東湖縣南二十里高百餘丈旁有小山相連如執笏狀其東曰將軍帽山五龍山在東湖縣西南十五里大江之西五峯連峙蜿蜒如龍按寰宇記以五龍山屬遠安縣今考遠安在府北境荆州遠安府縣志並不載遠安有此山惟盛宏之荆州記云建平郡南有五龍山考三國呉嘗於秭歸置建平郡盛所指即今歸州夷陵州志則云五龍山在大江西滸又歸州舊有建平驛亦在江濱按圖考之五龍當在兩州交界之所後人以寰宇記訛冩遂謂山在府北且以盛記並載尤誤天臺山在東湖縣西南二十里一名四面山上有天臺觀觀中有鐘聲聞二十里昔西山有寇為害土人結砦其上有警鳴鐘州兵輒渡江擊之境内頼以保全高筓山在東湖縣西四十里一名高筐山一名雞籠山寰宇記袁山松句將山記云登句將北見高筓山嶷然半天荆州圖副云昔堯時大水此山不沒如筓也望州山在東湖縣西宋范成大自硤州登陸至秭歸有大望州小望州詩大望州詩云望州山頭天四低東瞰夷陵西秭歸斷江山在東湖縣西北二十餘里水經注江水厯禹斷江南峽北有七谷村兩山閒有水清深潭而不流耆舊傳言昔是大江及禹治水此江小不足㵼水禹更開今峽口水勢並衝此江遂絶於今謂之斷江也石鼻山在東湖縣西北三十里一名石簰山又名石簰峽宋史地理志峽州建炎中移治石鼻山陸游入蜀記石簰峽石穴中有石宛如老翁持漁竿狀輿地紀勝夷陵志云後周移峽州治於石鼻山其山隔大江高五百餘仞廣袤二十里下臨江流中有石横亘六七十丈如簰筏然天柱山在東湖縣西北三十五里入蜀記蝦蟇碚稍西有一峯孤起侵雲名天柱峯自此山勢稍平馬鞍山在東湖縣西北六十里三國呉志陸遜傳黄武元年劉備率大衆來至夷陵界遜破其二十餘營備升馬鞍山陳兵自繞黄牛山在東湖縣西北八十里亦稱黄牛峽水經注江水又東逕黄牛山下有灘名曰黄牛灘南岸重嶺曡起最外高崖閒有色如人負刀牽牛人黒牛黄成就分明旣人迹所絶莫能究焉此巖旣高加江湍迂迴雖途經信宿猶望見此物故行者謠云朝發黄牛暮宿黄牛言水路迂深迴望如一矣宋范成大集黄牛峽山自此直至平喜壩千峯重曡靡不奇峭方山在東湖縣東北一百二十里袁崧宜都記其嶺四方素崖如壁山上有神祠場特生一竹茂好其標垂場中有塵埃積則風起動此竹拂去如灑埽者破石山在歸州東十五里山有大石破為十字登陟者經其閒蒼雲山在歸州東二十九里山色蒼翠疑與雲接下有龍湫麝香山在歸州東一百十里多麝朱雀山在歸州南里許與州治相對楚臺山在歸州南十五里舊有臺今廢雞籠山在歸州南二十里相近有香爐山又十里為福朝山又三十里為龍王山禱雨多應又二十里為兩面山八學士山在歸州南山有八曡皆朝州治盧家山在歸州西南四十里龍山在歸州西二里有水簾洞其水挂崖而下卧牛山在歸州北二里以形似名五枝山在歸州北一百里一名五龍山荆州記建平郡有五龍山山峯嶕嶢凌雲特聳狀若龍形側柏山在歸州境又境内有曲尺山屈曲山藏口山紗帽山在長陽縣治東又一里為石橋山又一里為蓮子山又六里為挂榜巖石色青白相閒彷彿字畫旁有文筆峯金子山在長陽縣南二里又二十八里為香花山相近有雙桂巖又二十里為將軍山上有藺將軍廟又南四十里為挂鐘巖風井山在長陽縣西南一名方山一名重山荆州記宜都佷山山上有風穴口大數尺每冬夏出入之際吹拂在右常淨暑月經之凜然有衣裘想水經注長楊溪源風井山回曲有異勢穴口大如盆袁山松云夏則風出冬則風入春秋分則靜人有冬過者置笠穴中風吸之經月還步楊溪得其笠則知潛通矣桃符山在長陽縣西南一百五十里長楊溪源出此神魚山在長陽縣西南水經注射堂村東谷中有石穴清泉潰流三十許步水中有神魚居民釣魚先陳所需拜請得魚過數者波湧風起樹木摧折按名勝志謂在宜都縣界者誤綺黄山在長陽縣西三十里相傳漢綺里季夏黄公嘗隱此相近有靈巫山寶尖山又十里有石笋山又四十里有桑木山資邱山在