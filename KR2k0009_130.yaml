不忍負祖宗何可辱投崖死本朝楊佐國字荆湖荆門人順治進士累官知商州吳逆賊黨圍城佐國竭力拒守賊退猶出沒無常佐國巡厯山谷多方擒捕境以安擢刑部員外郎有貴家殺人同官多瞻徇佐國獨持正尚書魏象樞亟稱之卒從其議出為南韶道副使招撫花山賊置花縣再署按察使屢辯冤獄遷太僕少卿卒官胡作梅字修予荆門人康熙壬戌進士授檢討累官禮部侍郎五十五年以澤旺蠢動奉命督糧餉時已病痺衆勸之辭作梅曰王事也死而後已至軍前禁剋滅懲侵蝕軍士感動踰年卒卒前一日猶力疾視米數周厯營伍事聞賜祭葬入祀昭忠祠胡克寬字東易作梅子以舉人知松江府明決有才勤於治訟上海有張姓者仇家誣爲通洋巨盜克寬廉其枉請予開釋命尚書張鵬翮訊之竟從克寛讞松江歲修海塘舊多糜費克寬實心綜覈節省數千金通詳貯庫其廉慎多類此江鼎金字紫九荆門人康熙乙丑進士授高苑知縣調署博興兩邑素苦丁役不實鼎金詳稽户冊孤寡逃絶必開除之民有我公減丁願公添丁之謡行取刑部主事晉郎中尋授直隸口北道多惠政民利賴之金秉祚字琢齋當陽人雍正己酉拔貢知興化縣淮揚大饑東祚籍極貧户八萬餘口請賑上官難之秉祚力爭得賑如數民無流亡調山陽令罷告訐嚴印記定里居叙次第經緯詳具以治行洊升徐州知府郡累歲災潦秉祚浚蕭縣廟橋朔里等河開碭山義興永定諸渠通銅山塞河一百二十里濬范家窪蔡家莊引河八道百姓稱便廖士宏遠安諸生父卒哀毁廬墓蔬食三年染疾不能廖以未終母喪悲痛卒雍正九年旌方雍璧遠安人父疾有藥草産深山山多虎雍璧採藥遇之泣告以父疾待藥虎竟去後父卒廬於墓側三年乃歸乾隆五十年旌王士達荆門州武生嘉慶三年敎匪入州境被執不屈死又監生王士道鄭德芳鄭德蕙鄭應坦鄭應坤鄭應堦俱同時拒賊死予祀忠義祠張大勲荆門州武生捐職千總嘉慶三年三月募鄉勇堵禦敎匪力竭捐軀同時謝抒等九人皆死之流寓梁沈約字休文吳興人為東陽太守遷侍中建昌侯卒於荆門今城西有沈約墓銘曰時日不利不能歸塋咸陽唐孟浩然襄陽人好節義隱居鹿門山年四十遊京師被放還山常往來荆門沮漳閒陪張曲江遊玉泉有詩今州南有孟子港宋孫何蔡州人以父鏞知荆門軍遂居焉幼嗜學為文必本於經淳化三年舉進士省闈及殿試俱第一官至知制誥有集四十卷弟僅咸平初及第端恪無競篤于儒學官至給事中侯仲良河東人寓當陽顔其居曰時習仲良二程之甥師事程明道朱子稱其學清白勁直胡安國崇安人父淵寓跡荆湘閒安國為蔡京所扼退居當陽之漳濱著有經筵正論春秋傳武夷集資治通鑑舉要補遺彊學力行志於康濟何參夷陵人博學孝義不求聞達隱居當陽明簡而可字敬所興山人萬厯舉人厯姚安知府居遠安崇禎七年賊陷城死之本朝乾隆四十一年賜諡節愍列女南北朝梁鄧元起母當陽人元起初為益州刺史過江陵迎其母母不肯出曰貧賤家兒忽得富貴詎可久保我即死不能與汝共入禍敗元起入蜀竟為蕭藻所害宋吳源妻盧氏荆門人源死節盧聞訃處置家事焚香泣拜曰夫為忠死妾為節死遂自縊鄉人為立雙節祠明楊堪妻胡氏荆門人年二十夫亡甘貧撫孤守節七十年又同州周之楨妻黄氏賀學詩妻劉氏俱年少撫孤守節終身夏某聘妻趙氏荆門人趙申陽女年十五許聘未行聞夏氏子病籲天請代訃至閉户自縊死龔兆奎妻楊氏荆門人夫卒無子事舅姑盡孝舅姑歿以毁卒汪文鋭妻王氏當陽人年二十七夫亡家貧無子勵志苦守又同縣盧友傑妻曹氏亦早寡守節蕭宗禹妻龔氏當陽人夫死絶粒七日卒劉拱辰妻王氏當陽人年二十二夫死守節事繼姑孝謹萬厯中旌王瑞妻羅氏荆門人夫卒自縊死彭九成妻白氏遠安人夫卒白年二十餘二孤方數歲孀居四十餘年陳瑞妻盧氏遠安人瑞卒盧年二十六忍死養姑姑卒兄憐其貧而無嗣勸之嫁遂閉門自縊董麟妻梁氏遠安人年二十餘撫二孤甘貧守節姑令改嫁梁指石誓至死不變子良相成立以孝聞旌其門曰節孝孫銓妻談氏遠安人銓死年十八守節六十六年教子尚信尚智俱明經九十四歲終建坊曰貞節鄒承先妻陳氏遠安人夫卒陳年二十有五守柩三年豫營後事畢閉户七日自盡遂與承先合葬萬厯中邑令立碑於孫公橋識之姚某妻劉氏荆門人劉澤甫女幼許聘姚氏子將笄姚死屢自經得救甦因曰吾無兄弟父母何依乃日侍父母父死族有利其家貲欲他字之者劉誓不他適萬厯中旌簡詢妻張氏遠安人張斗樞女讀書通詩文夫婦相敬如賓夫卒守節二十餘年萬邦孚妻李氏遠安人崇禎七年流寇犯遠安李被掠大罵不屈爲賊所磔蘇氏荆門人諸生蘇文亮女事姑盡孝崇禎十五年流寇陷城夫被執蘇赴水死李嵓妻任氏荆門人流寇至完節遇害栗芳春妻劉氏當陽人夫卒守節三十年流賊至遇害李如琦妻周氏遠安人夫卒守節三十餘年崇禎末流賊破砦周墜崖而死張鴻業妻李氏達安人崇禎末賊破砦觸崖死本朝楊琦妻李氏荆門人夫卒紡績所餘即以給族黨歲饑施粥糜飯餓者守節四十一年又同邑姚某妻雷氏守節四十三年俱雍正年閒旌陳瑾妻望氏遠安人瑾殁時氏年十九守志堅貞事舅姑極䖍子明旦邑諸生中年病殁媳張氏亦青年守節雍正九年並旌陳光寵妻江氏荆門人夫亡守節又同州監生單叔元妻姚氏承兆璽妻趙氏黄明鋐妻陳氏廖鎧妻蔡氏王大俸妻汪氏吳象峯妻楊氏周和錫妻藍氏李士崑妻傅氏吳祖泰妻王氏金大常妻古氏金文妻蕭氏車邦順妻唐氏陳永輝妻李氏萬必遇妻楊氏周家尚妻阮氏監生李士崇妻譚氏朱毓文未婚妻劉氏朱玉梅妻唐氏朱大紹妻王氏劉延祥妻