仁風大行虎皆負子渡河劉興齊武王縯次子建武中遷宏農太守有善政宏農縣吏張申有伏罪興收申案論郡中震慄時年旱分遣文學循行屬縣理寃獄宥小過甘雨乃降公沙穆膠東人爲宏農令縣界有螟蟲食稼百姓惶懼穆乃設壇請以身禱於是暴雨既霽而螟蟲自消百姓稱曰神明永夀元年霖雨大水三輔以東莫不淹沒穆明曉占候乃豫告令百姓徙居髙地故宏農人獨得免害皇甫規安定朝那人永康元年遷宏農太守三國魏賈逵襄陵人操征馬超過宏農曰此西道之要以逵領宏農太守召見計事大悅渭人曰使天下二千石悉如賈君吾復何憂進封陽里亭侯孟康安平人正始中爲宏農太守領典農校尉康到官清已奉職息獄訟緣民所欲因而利之令狐邵太原人爲宏農太守清如冰雪妻子希至官省舉善而教不好獄訟時郡無知經者乃厯問諸吏有欲行就師輒假遣令詣河東就樂詳學經粗明乃還因設學由是宏農學業轉興南北朝魏崔寛東武城人高宗時爲宏農太守永徽初卒於陜州崔善為武城人貞觀初為陜州刺史時議户張地狹者徙寬郷善為奏畿内户衆而丁壯悉籍府兵若聽徙皆在關東虚近實遠非經通計詔可姜師度魏人神龍初出為陜州刺史太原倉水陸運所湊轉屬諸河師度使依高為廥而貯米於舟以故人不勞盧奐滑州人為陜州刺史開元二十四年帝西還次陜嘉其美政題贊於㕔事曰專城之重分陜之雄外既利物内存匪躬斯為國寶不墜家風李齊物天寶初陜州刺史開底柱通漕路發重石下得古鐵㦸名曰平陸上之詔因以名縣韓休長安人明皇時為虢州刺史虢於東西京為近州乘輿所至常稅廏芻休請均賦他郡中書令張説曰免虢而與他州此守臣為私惠耳休復執論吏曰恐忤宰相意休曰刺史幸知民之敝而不救豈為政哉雖得罪所甘心焉訖如休請魏少游鉅鹿人肅宋時陜州刺史王師潰於鄴河洛震駭少游鎭守自若衛伯玉肅宗時領神䇿兵馬使出鎮陜州行營乾元二年賊將李歸仁以騎五千入寇伯玉與戰彊子坂破之史思明遣子朝義夜襲陜伯玉迎擊破之崔衍安平人虢州刺史虢居陜華閒而賦數倍入衍白太重裴延齡領度支方聚斂私謂衍前刺史無發明公當止衍不聽復奏州部多巖田又郵傳劇道屬嵗無秋民舉流亡不蠲咸租額人無生理徳宗詔度支減賦李泌京兆人貞元元年拜陜虢觀察使泌始鑿山開車道至三門以便饟漕衞次公河東人順宗時為陜虢觀察使蠲横租錢歲三百萬薛苹寶鼎人厯虢川刺史憲宗時奏最為治務在安人崔郾武城人敬宗時為虢州觀察使先是上供財乏奪吏俸助輸郾曰吏不能贍私安暇恤民吾不能獨治安得自封即以府常費代之人詔賦粟輸太倉者嵗數萬石民困於輸輦而致之河郾乃傍流為大廒受粟竇而注諸艚民悦忘輸之勞崔咸博平人敬宗時為陜虢觀察使日與賓客僚屬飲夜分輒決事裁剖精明無一毫差吏稱為神韋温萬年人為陜虢觀察使民當輸租而麥未熟吏白督之温曰使民貨田中穗以供賦可乎為緩期而賦辦李商隠河内人開成中調宏農尉以活獄忤觀察使孫簡將罷去㑹姚合代簡諭使還官高少逸渤海人宣宗時爲陜虢觀察使中人責硤石驛吏供餅惡鞭之少逸封餅以聞宣宗怒召使者責曰山谷閒是餅豈易具耶謫隸恭陵中人皆斂手宋杜審進安喜人乾德中知陜州就改保義軍節度累加開府儀同三司鎭陜二十餘年勸農敦本民庶便之李若谷徐州豐人眞宗時知陜州盜聚青灰山久不散遣牙吏持榜招諭之盜殺其黨與自歸師頏内黃人眞宗時知陜州時西鄙用兵鍕道所出軍士多亡命嘯聚爲盜頏嚴其巡捕盜越他境趙良規洛陽人眞宗時知陜州歲饑百姓請閣殘稅二分爲官伐芟以給河埽或以爲須報乃可行良規曰若爾無及矣檄縣遂行而以擅命自劾查道休寕人眞宗時知虢州蝗災民歉道不候報出廪米設粥糜以賑之又給州麥四千斛以爲種民賴以濟所全活者萬餘人孫唐卿青州人仁宗時通判陜州於吏事若素習民有母再適人而死及葬其父盜母之喪而同葬之有司論以法唐郷時權府事乃曰是知有孝不知有法耳釋之以聞李及之濮州人知陜州吏事精明居官稱職劉永年并州人仁宗時為陜州都監郭邈山等為盜永年密遣壯士夜渡河殺其兇桀二十餘衆遂散李彥仙彭原人靖康初為石壕尉堅守三觜民爭依之分兵四出下五十餘壁復陜州乘勝渡河郡邑皆響附事聞即命知陜州盡取家屬以來曰吾以家徇國與城存亡金再攻陜彥仙極力禦之城䧟率衆巷戰矢集於身左臂中刃不斷戰愈力金人惜其材欲生致之彥仙投河死金兵害其家屠其城全陜遂没禆將邵雲吕圓登宋炎賈何閻平趙成皆死並贈官邵興靖康初李彥仙知陜州興在神稷山以其衆來願受節制彥仙辟為統領河北忠義軍馬屯三門賴其力復虢州趙叔憑宋宗室建炎中為陜州都監金兵圍陜既久援兵不至城危遂死之通判王滸職官劉效陳思道馮經李岳杜開縣令張圯將佐盧亨等五十一人俱死無降者金尼瑪哈富勒瑚明安人貞祐四年為陜州宣撫副使元兵取潼關成卒皆潰富勒瑚禦戰兵敗死焉尼瑪哈富勒瑚舊作尼龎古蒲魯虎明安舊作猛安今並改正完顏仲德海蘭路人天興元年行尚書省事於陜州時武丹新敗陜州殘破仲徳復立山寨安撫軍民海蘭舊作合懶武丹舊作兀典今並改正元陳祜寕晉人中統元年除陜洛總管時州縣官以未給俸多貪暴祐獨以清愼見稱在官八年如始至之日明康茂才蘄州人洪武初留守陜州規運饋餉造浮橋招徠解絳諸州扼潼關秦兵不敢東向茂才善撫綏民立石頌德焉史記言當塗人崇禎中遷知陜州陜當賊衝記言出私財募士訓練之屢有斬獲老回回率數萬人攻城不得志去乘雪夜來襲而所練士方調他郡城遂陷賊欲降之叱曰有死知州無降知州也遂𬒳殺贈光祿少卿吳茂徵浙江人崇禎中為陜州判官十四年流寇入死之里人葬於大南關舊寺之西有碣本朝金鎭山陰人順治七年為闅郷知縣秋旱步禱霖雨霑足士民咸謂至誠所感十年春山南渠賊楊結子聚黨劫掠大為民患鎭請發兵㑹剿卒皆就撫邑賴以安江蘩漢陽人知靈寳縣能持廉遇事敢言時軍興旁午蘩督運糧餉軍需無缺而民不為累户有逋賊逃亡者繪圖以請悉獲蠲免劉瀾霸州人順治𥘉為盧氏知縣時葛黨餘孽未平瀾夜襲賊巢於鷄冠山獲賊獻馘民始安堵既而清地畝均賦稅勸文學課農桑建學宫立縣治張天澤謀叛襲城瀾登陴守禦左膊中矢請兵剿除從此大定張有年濟寕人乾隆十三年為河陜道興利除弊號令嚴明四十六年河決儀封北岸躬立壩頭督役堵禦新築陡䧟遂致漂沒事聞廕卹人物漢公乘興京兆尹王尊坐免吏民惜之湖三老公乘興等上書訟尊成瑨宏農人拜南陽太守下車欲振威嚴聞岑晊高名請為功曹又以張牧為賊曹吏瑨委心晊牧襃善糾違肅清朝府杜衆宏農人延熹中為五官掾時白馬令李雲送北寺獄衆傷雲以忠諌獲罪上書願與雲同日死帝愈怒遂并下廷尉俱死獄中張芝宏農人少持高操稱有道好草書家之衣帛必書而後練臨池學書水為之黒韋誕謂之草聖三國魏董遇宏農人明帝時為大司農遇善治老子作訓注又善左氏傳更為作朱墨別異有從學者遇云必當先讀百遍而義自見學者云苦無日遇言當以三餘或問三餘之意遇言冬者嵗之餘夜者日之餘隂雨者晴之餘也晉董景道宏農人少好學千里隨師晝夜誦讀不與人交通明春秋三傳京氏易馬氏尚書韓詩皆精究大義三禮之義專遵鄭氏著禮通論非駮諸儒演廣鄭旨永平中隱於商洛山潬琴歌嘯以自娛王濬宏農湖人恢廓有大志州郡辟河東從事守令有不廉潔者皆望風引去後參征南軍事羊祜深知待之累遷益州刺史加龍驤將軍監梁益諸軍事上疏請伐吳濬自率師兵不血刃攻無堅城夏口武昌無相支抗於是順流鼓棹逕造三山入於石頭皓乃備亡國之禮造於壘門濬收其圖籍封其府庫軍無私焉轉撫軍大將軍開府儀同三司卒諡曰武隋劉士龍宏農人開皇中官考功以明幹稱楊尚希宏農人少孤入太學周文帝釋奠令講孝經奇之擢國子博士隋受禪拜度支尚書出為河南道行臺上表罷天下諸郡奉詔廵省淮南還授上儀同尚希性惇厚兼以學業自通甚有雅望為朝廷所重拜蒲州刺史卒官諡曰平張須陁闅鄉人性剛烈有勇略弱冠從史萬嵗計西爨以功授儀同後從楊素擊平漢王諒加開府大業中為齊郡丞賊帥王薄冦掠郡境須陁大破之賊裴長才石子河等縱兵大掠須陁簡精兵倍道進擊斬數萬級賊左孝反等衆各萬計悉討平威振東夏以功遷齊郡通守轉滎陽通守李密取洛口倉逼滎陽須陁拒之密先伏數千人邀擊須陁敗乃仰天曰兵敗如此何面見天子乎乃下馬戰死唐常達陜人初從高祖征伐命為統軍拜隴州刺史時薛舉方强達敗其子仁杲舉遣將仵士政紿降伺隙劫之併其衆歸賊達不為懾仁杲十帝見逹勞曰君忠節正可求之古人為執士政殺之終隴西刺史張士貴盧氏人本名忽峍彎弓百五十斤左右射無空發從征伐有功又從平洛授虢州刺史帝曰顧令卿衣錦畫遊耳進封虢國公貞觀七年為龔州道行軍總管破反獠還帝聞其冒矢石先登勞之曰甞聞以忠報國者不顧身於公見之上官儀陜人當貞觀初擢第召授宏文館直學士遷祕書郎高宗時進西臺侍郎儀工詩其詞綺錯婉媚人多效之謂爲上官體麟德元年坐梁王忠事下獄死初武后專威福帝不能堪將廢爲庶人召儀與議使草詔左右奔告后后自申訴帝曰上官儀教我后由是深惡儀張齊賢陜人仕武后朝爲大常奉禮郎議告朔禮久之遷博士時東都置太社皆齊賢等參定中宗即位因武后東都廟改爲唐廟議滿七室以凉武昭王爲始祖齊賢上議不祖武昭王詔可累遷諌議大夫楊温闅鄉人漢太尉震十八代孫居父喪七日不食服除補平棘令武后時五遷州刺史有風績初張柬之代爲荆州共乘艫江中私語外家革命温悲涕慷慨志在王室東之執政引爲右羽林將軍與李多祚等定計斬二張進雲麾將軍封宏農郡公敬暉爲武三思所搆温知禍未已悉還官封不許睿宗立封魏國公令太子拜之卒諡曰忠子仲昌以通經爲修文生對䇿擢第一累遷監察御史坐累爲孝義令終吏部郎中仲昌資長於吏常分父祖賑宗黨御身以約善與人交士樂從之遊姚崇硤石人父懿貞觀中為巂州都督崇少倜儻尚氣節長好學下筆成章授濮州司倉參軍遷夏官郎中遼兵擾河北兵檄叢集崇奏決如流拜侍郎垂拱後以告言為功號曰羅織甚於漢之鉤黨崇請以一門百口保内外百官無反者進同鳯閣鸞臺三品張東之等謀誅二張崇參計議先天二年明皇講武新豐密召崇至曰卿宜遂相朕崇因奏十事帝曰朕能行之遷紫微令時承權戚干政之後綱紀墮壞崇常先有司罷冗職修制度擇百官各當其材開元中還宰政引宋璟自代授太子少保卒諡文獻獨孤信陜州人特達商才為河南刺史有惠政張彖陜州人力學有名時楊國忠權傾天下人勸象修謁彖曰君輩倚右相如泰山吾以為冰山耳皎日一出得無失所恃乎後及第授華陰尉勤於政事每有伸舉輒受抑制遂拂衣長往楊憑宏農人善文詞與弟凝凌皆有名大厯中踵擢進士第時號三楊憑重父遊尚氣節然諾召為監察御史累遷湖南江西觀察使入拜京兆尹與李夷簡有隙劾慿不法憲宗以憑治京兆有績但貶臨賀尉以太子詹事卒凝為兵部郎中凌最善文終侍御史楊敬之憑弟凌之子元和初擢第累遷屯田户部二郎中文宗尚儒術以宰相鄭覃兼國子祭酒俄以敬之弋未幾兼太常少卿是日二子戎載登科時號楊家三喜轉大理卿檢校工部尚書兼祭酒卒敬之嘗為華山賦示韓愈愈稱之士林傳布愛士類得其文章孜孜翫諷人以為癖雅愛項斯為詩所至稱之由是斯擢上第梁文貞闅鄉人少從軍守邊逮還親已亡自傷不得養即穿壙為門晨夕汛掃廬墓左痦默三十年家有所問畫文以對會官改新道出文貞廬前行旅見之皆為流涕有甘露降塋木白兔馴擾縣令刋石紀之陸扆嘉興人宰相贄族孫客於陜州遂家焉累進翰休學士工屬辭敏速若注射然一時書命同僚白謂不及昭宗優遇之累官尚書左丞後為柳璨所害五代梁高季興硤石人梁初拜荆南節度使荆州當唐之末為諸道所侵季興始至江陵一城而已兵火之後井邑凋零季興招緝綏撫人士歸之宋魚崇諒其先楚州山陽人後徙於陜幼能屬文厯仕至學士周祖踐阼書詔繁委皆崇諒爲之以母老求解官歸養訖太祖朝不起太宗即位詔授兵部侍郎致仕魏野陜州人嗜吟咏不求聞達有草堂集十卷大中祥符初遼使至言本國得其上帙願求全部詔與之與李瀆並被薦遣陜令招之野上言願守畎畝永荷帝力詔州縣長吏常加存撫卒贈秘書省著作郎韓川陜州人進士上第元祐初爲監察御史極論市易之害遷殿中侍御史疏言近制嵗舉守臣遇大州闕率在京師馳騖請求者得之至於奄厯郡縣治狀應法者顧出其下於是詔吏部更立法改太常少卿進吏禮二部侍郎厯知潁虢坊鄜青襄州卒宋炎陜州人蹶張命中補秉義郎金師圍城炎射死數百人比再圍炎以勁弩數百發毒矢殺千餘人城陷金師聲言求善射者貴之炎不應力戰死元岳藏齋陜州人幼篤志勤學水相史天澤征西過其家訪以治體具陳方略天澤以聞厯官河南總管終國子監祭酒明耿九疇盧氏人永樂進士天順初累遷右都御史石亨用事九疇將率屬劾之為所誣出之外亨敗召為南京刑部尚書卒諡清惠子𥙿景泰進士孝宗朝官禮部尚書時公私侈靡𥙿隨事救正歸於節儉改吏部卒諡文恪許進靈寶人成化進士除御史陳鉞激變遼東進率同官論之忤汪直廷杖幾殆宏治初廵撫大同邊防修整與分守中官石巖相訐生謫官土魯番攻䧟哈密使其將雅蘭守之馬文升薦進廵撫甘肅進謀潛師襲寇親率四千人出嘉峪關奄至成下雅蘭已先遁去餘八百人守臺未下總兵官劉凝耳語曰斬之即封侯可得也進不聽撫降之西域遂定正德閒代劉大夏為兵部尚書改吏部卒諡襄毅次子誥三子讚皆知名讚官至文淵閣大學士雅蘭舊作牙蘭今改正許誥進次子宏治已未進士由户科結事中厯官南京户部尚書其所學不襲前人要以踐諸實行達之世務為主為户科則劾中官貪暴為講官則有緝熙聖學疏為祭酒則奬風節抑華競以經世為士筌尊徳為學軌一時成均翕然化之由吏部擢户部所至稱治卒諡莊敏學者稱函谷先生崔儒投井死一年本朝乾隆四十賜諡節愍李中正盧氏人官車駕司主事以禦賊死年本朝乾隆四十一賜諡烈愍靳謙吉盧氏舉人賊入城𬒳執不屈罵賊死本朝蔡金鵬陜州人性孝友嫡母早喪事父及繼母克盡子道殁後各廬墓三年墓故在深山多猛獸或勸之歸弗聴為文以祭之虎狼屏跡金鵬有同母弟異母弟各二人俱交歡無閒郷里稱焉張鵾陜州人康熙乙未進士淹通經史又邃於易仕古浪知縣舊屬衛所時新改為縣察土俗民情政簡而寛邑人祀名宦祠勒石志之張鷲陜州人康熙時厯官蕪湖霍邱知縣並有惠政致仕歸修廣濟渠竭力為州人倡有四書精解鷄足山詩集道善堂文集張愈聚陜州人乾隆己卯舉人厯任四川州縣所至有惠政尤勤獄訟案無留牘法令嚴明川省嘓匪不敢入其境升嚴州知府潔已率屬六邑肅然師系淵陜州人事親以孝稱嘗拾遺金俟還主者朱貽培盧氏人嘉慶二年聞教匪將擾境護其父母入山藏匿而身率郷人禦賊力盡被執不屈死之同時死難者高照魁梁彦朝胡江王義賀銓及其子某朱君愛及其弟某余純粹及其姪某流寓漢劉茂晉陽人王莽專政茂棄官避世宏農山中教授鄭興開封人好古學建武中客居闅鄉以講授終不復仕楊震華隂人嘗客居於湖不荅州郡禮命數十年衆人謂之晚暮而震志益篤唐吳融山陰人昭宗時進户部侍郎鳳翔劫遷融不克從去客闅鄉王適幽州人善詩尤好讀書懷奇負氣聞金吾將軍李惟簡年少喜士見之語合遂薦為衛參軍嵗餘若有所不樂一旦載妻子入闅鄉南山時中書舍人王涯獨孤及諸人發書訊固辭不起宋張庭堅廣安軍人蔡京欲引為己用先令鄉人諭意庭堅不肯往京大恨遂編管虢州列女晉陜州婦不知姓氏年十九劉矅時婺居陜縣事叔姑甚謹其家欲嫁之婦毁面自誓後叔姑病死叔姑女誣婦殺其母有司不祭婦竟坐罪其境經歲不雨矅遣呼延謨為太守知其冤斬叔姑女以少牢祭婦墓諡曰孝烈貞婦是日大雨吕纂妻楊氏宏農人纂𬒳吕超所殺楊與侍婢十數人殯纂於城西將出宫超慮齎珍物出外搜之楊厲聲曰我旦夕死人何用金寶超將妻之謂其父桓曰后若自殺禍及卿宗桓以告楊曰大人本賣女於氏以圖富貴一之己甚其可再乎乃自殺吕紹妻張氏宏農人年十四紹死即請為尼吕隆見而悅之欲穢其行張升樓自投於地二脛皆折而死元亢起鳳妻張氏媳韓氏皆靈寶人起鳳殁張鞠彌月子甫受室而夭流寇至張挈韓避砦中韓恐砦破受辱紿姑出取薪火自焚死張孤守至九十七嵗卒明陳所見妻薛氏闅鄉人弱齡喪夫姑强受他聘薛置毒衣袵閒服之至中途死衣履皆紉不可解事聞旌表以守節旌者吕材妻李氏蘇六妻屈氏皆靈寳人以殉夫旌者唐情妻李氏陜州人康栗妻楊氏楊宋妻康氏靈寶人又任宏道妻王氏李雙印妻員氏陜州人任民