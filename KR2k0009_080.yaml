front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_080-1a}
body:
  text: 許州直隸州二名宦漢衛颯修武人建武二年除襄城令政有名迹劉方平原人章帝元和二年詔曰安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏人同聲謂之不煩斯近之矣范康重合人桓帝時為潁隂令有能迹三國魏滿寵昌邑人為許令曹洪有賓客在界數犯法寵收治之洪白魏武魏武召許主者寵知將欲原乃速殺之魏武喜曰當事不當爾耶故太尉楊彪收付縣獄尚書令荀或少府孔融等並屬寵勿加考掠寵一無所報考訊如法數日求見魏武曰楊彪考訊無他辭語此人有名海内若罪不明大失民望魏武即日赦出楊彪或融聞彪因此得出更善寵鄭渾開封人遷召陵令民皆剽輕不念產殖其生子無以相活率皆不舉渾所在奪其漁獵之具課使耕桑又兼問槄田重去子之法民初畏罪後稍豐給無不舉贍所育男女多以鄭爲字晉潘京漢壽人厯召陵令明于政術路不拾遺曹攄譙人惠帝時爲襄城太守時襄城屢經寇難攄綏懷振理旬月克復與流人王逌戰于酈縣後繼不至死之故吏百姓并奔喪會葬號哭即路如赴父母南北朝魏韋崇杜陵人高祖時除南潁川太守不好發摘細事甞云何用小察以傷大道吏民感之郡中大治高祖聞而加賞賜帛二百匹隋栁裘解人開皇中拜許州刺史在官清簡吏民懷之長孫平洛陽人間皇中爲許州刺史有善政公孫景茂阜城人開皇中爲道州刺史悉以秩俸買牛犢雞豬散惠孤弱不自存者好單騎巡人家閲視產業修理者襃揚稱述如有過惡隨即訓導由是人行義讓有無均通大村數百户皆如一家之務薛孺汾隂人開皇中爲襄城郡掾有惠政劉曠開皇中爲臨潁令清名善政爲天下第一尚書左僕射高熲言狀帝召見勞之加以殊奨房彥謙東武城人開皇中爲長葛令有惠化百姓號爲慈父上令使者巡察長吏以彥謙爲天下第一超授鄀州司馬吏民號泣相謂曰房明府今去吾屬何用生為其後百姓思之立碑頌德敬肅蒲坂人大業初遷潁川郡贊務五年朝東都帝令薛道衡為天下郡官之狀稱肅曰心如鐵石老而彌篤時宇文述用事其邑在潁川每有書屬肅肅未甞開封輒令使者持去述賓客放縱者以法繩之無所寛貸去官之日家無餘財唐燕欽融中宗時為許州司户參軍再上疏斥韋后擅政且逆節已萌后怒觀中宗召至庭撲殺之王珣祁人開元中出為許州長史嵗旱珣時假刺史事開廪賑民即自劾明皇赦之龎堅薛愿堅涇陽人愿汾陽人天寶中堅厯潁川太守安祿山反南陽節度使魯炅表堅為長史兼防禦副使以愿為潁川太守共守潁川賊將阿史那承慶悉鋭攻之傳城百里草木皆刋城中士單寡糧少而愿堅晝夜戰諸郡兵無援者自正月盡十一月賊踰城入二人不降死之來瑱永夀人天寶中拜潁川太守賊攻潁川方積粟多瑱完陴自如手射賊皆應弦仆前後俘殺甚衆賊目為來爵鐵高承簡幽州入元和中詔析上蔡郾城遂平西平四縣為溵州拜承簡刺史治郾城始開屯田列防庸瀕溵綿城二百里無復水敗皆為腴田先是賊築武宫以夸戰勞承簡夷其邱庀家財以葬葺儒宫備俎豆嵗時行禮野有荍實民得以食將吏立石頌功宋李重貴河陽人太祖時臨潁合流鎮將鎮有羣盜以其尚少謀夜入劫鈔重貴知之即築柵課民習射盜聞之潰去宋濤長安人太宗時知襄城縣以政績聞賜緋魚錢昆臨安人知許州為治寛簡便民崔立鄢陵人真宗時通判許州會滑州塞決河調民出芻楗命立提舉受納立計其用有餘而下户未輸者尚二百萬悉奏弛之李若谷豐人真宗時補長社縣尉州葺兵營課民輸木檄尉受之而吏以不中程多退斥欲因以取賕若谷度材别其長短大小為程置庭中使民自輸石普太原人真宗時徙知許州築大流堰引河通漕京師李遵勖上黨人真宗時知許州水軍多不練習遵勖命部校按劾拔去十七八姚仲孫商水人補許州司理參軍民婦馬氏夫𬒳殺指里胥殺之官捕繫辭服仲孫疑其枉知州王嗣宗怒曰若敢以身任之耶仲孫曰幸母遽決兾得徐辨後兩月果得殺人者劉越大名人甞知襄城縣有能名吳育建安人知襄城縣自秦悼王葬汝後子孫從葬皆出宦官典護嵗時上冢者往來呼索擾州縣育請凡官所須具成數毋容使者妄索羊豕悉出大官由是民省供費殆半宦官過者銜之或中夜叩縣門索牛駕車育拒不應宗子所過縱鷹犬暴民田入襄城境輒相戒約母敢縱者王舉正鎮定人仁宗時知許州光化軍叛卒轉寇旁境而州兵有謀起為應者舉正潛捕首惡者斬之李淑豐人仁宗時以右諌議大夫知許州嵗饑取民所食五種上之帝惻然為蠲其賦范純仁呉縣人仁宗時以著作佐郎知襄城縣襄城民不蠶織勸使植桑有罪而情輕者視所植多寡除其罰民益賴慕後呼為著作林梅堯臣宣城人仁宗時知襄城縣汝水暴至堯臣親率士民救護修築邑人賴之王平為許州司理參軍有女騎驢單行為盜所殺驢逸入他家吏捕得驢併致其人于獄平力辨其非久之果得正賊樂京荆南人神宗時知長葛縣助役法行京白提舉常平官言不便不肯治縣事自劾丐去鄒浩晉陵人調潁昌府教授吕公著范純仁為守皆禮遇之純仁屬撰樂語浩辭純仁曰翰林學士亦為之浩曰翰林學士則可祭酒司業則不可純仁敬謝孫永長社人知陳州徙潁昌永𥙿起陵許汝當運粟數十萬斛于陵下調民牛數萬永請而免徐處仁應天榖熟人徽宗時以顯謨閣直學士知潁昌府民有得罪宮掖者雖赦不原處仁為奏上童貫乘是擠之奪職葉夢得呉縣人帥潁昌府發帝平粟賑民常平使者劉寄惡之宦官楊戬用事寄請糴粳米輸後苑以媚戬戬委其屬持御筆來貴以米様如蘇州夢得極論潁昌地方與東南異願隨品色不報時旁郡糾民輸鏹就糴京師怨聲載道獨潁昌賴夢得得免李彥以黠吏告訐籍郟城舞陽隱田數千頃民詣府訴者八百户夢得上其事捕吏按治之郡人大悦楊再興紹興中岳飛敗金兵于郾城烏珠合兵逼之再興以單騎入其軍擒烏珠不獲手殺數百人而還烏珠憤甚頓兵十二萬于臨潁再興以人及三百騎遇萬户薩已敵于小商橋驟與之貝勒等百人再興戰戰殺死後二千獲其餘屍焚勒之舊得箭鏃作撤八二升孛堇今薩巴改正貝元劉天孚大名人元中知至許州害時檢校之者指屯田臨為古屯潁鄧艾口中書下天民稻田三百項有孚按實天孚為辨欲其非石章湛數上乃止河南岸以襄城民食滄鹽為界葉令妄徙葉縣民不于北食二解鹽里誣刻其民淩食私鹽襄城天繫孚治為百餘考其家兩縣鬬辨元界移石故葉倚挾漕處而葉縣勢今以被罪去嵗大俄羣烏來旱天啄蝗孚禱即雨始盡明年野有蝗天麥熟時有孚令民青蟲如岀蟊捕為害忽生大之許人立葉蟲盡嚼碑頌焉明王通遷安州判人永樂中官九載課為最許當遷奏民秩乞留還仕邵寶無錫人㑹諸生成于化末學宫授講許州知州月明義利公私朔之辨巫而遣言龍骨之躬勸出地中農桑倣為禍福朱子社寳取倉立骨毁于庭杖積散法又行巫計口以澆田偹凶法荒鄭振先武進人勸農課萬厯中士為首為許州知州務治行與邵以寳相埓韓澹淄川人崇禎中為許州同知署知州事李自成來攻澹竭力守禦賊怒始城上日得署州首當解圍澹仰天誓曰以我一人而得生千萬人雖刀鋸不悸也遂縋城而下為賊所害城破後始收殮顔色如生歐陽植陜西人為長葛教諭崇禎十四年流賊陷城知縣迎降植痛哭與舉人孟良屏貢生黄朝聘生員張範孔等抗志殺賊巷戰而死張信輝縣人崇禎中為襄城訓導十五年流賊陷襄城信將縊于文廟為賊所執至北關指賊而罵賊怒以刀斷其舌猶蘸血書翦寇二字于掌中賊害之趙鳳豸崇禎中為襄城典史賊陷襄城知縣曹思正𬒳殺鳳豸拒賊死本朝李正芳大興人順治二年以都司使駐鎮許州當亂後城坦傾圮者修築之城濠淤塞者開濬之民人流亡者招徠之捐給牛種墾荒成熟又于城廂鄉鎮各設義學以養以教民咸利賴焉荆其惇丹陽人知郾城縣初下車民未復業更值軍需絡繹河工峻急其惇安集招徠給免牛淹具以沒順資開墾減運柳鹽治十四年土寇乘引築龍塘堤百置夜登城開門引衆民入其惇庫印督家人卒無失衆役守庫印力事聞禦賊受傷死賜卹徐世法㑹河稽人知時蝗蝻許州葺學宫設義塾疏通徧地世法親督夫捕滅禾石梁潩水二稼不害祀名宦沈近思仁和人縣涖任康熙四十五八年修城築年授臨潁知堤建學捐榖人物漢灌夫潁隂人肯隨喪父孟從征呉歸奮曰願取楚死吳王呉軍中夫不若將軍頭以報父人不仇乃披得進乃甲持㦸馳入呉還夫身被數十軍至戲創適有下殺傷數十萬金良藥得不死聞天少瘳復下武帝請往呉軍破時爲淮陽太夫名守王霸潁陽人少爲獄吏常慷慨不樂父以爲功遣西曹令學長安光武過潁陽霸率賓客上史從渡河北從者漸引去而霸獨謁留及王候吏郎兵白無起船光武南馳不可渡官傳聞郎兵屬大懼令在後至滹沱霸徃視霸恐河驚衆還即詭謂官屬曰曰冰堅可渡遂霸權以濟事殆前至河河冰亦食光武天瑞也以爲軍正爵關内侯攻拔邯鄲霸追斬王郎得其璽綬從平河北光武即位以霸曉兵愛士可獨任拜爲偏將軍封富波侯建武九年拜上谷太守累以功增户邑三十年定封淮陵侯祭遵潁陽人少好經書家富給而恭儉䘮母負土起墳光武署爲門下史從征河北爲單市令舍中兒犯法遵格殺之進刺奸將軍建武二年拜征虜將軍封潁陽侯討隗囂卒于軍遵爲人廉約小心克己奉公賞賜盡予士卒家無私財身衣韋袴布被夫人裳不加緣帝以是重焉䘮禮成復親祀以太牢博士范升疏稱遵曰遵北平漁陽西拒隴蜀先登坻上深入洛陽所在吏人不知有軍遵爲將軍取士皆用儒術對酒設樂必雅歌投壺又建爲孔子立後奏置五經大夫可謂好禮悅樂守死善道者也諡曰成侯其後帝每嘆曰安得憂國奉公之臣如祭征虜者乎其見思如此傅俊襄城人光武徇襄城俊以亭長迎軍拜爲校尉及討河北使將潁川兵常從征伐世祖即位拜侍中封昆陽侯三年拜積弩將軍與岑彭擊破秦豐因將兵狥江東揚州悉定卒諡曰威堅鐔襄城人光武署主簿拜偏將軍從平河北與朱祐陽諸縣時董訢反擊降朱鮪別擊内黄平之徇南宛城鄧奉反修野吳漢敗走萬修病卒鐔獨孤絶一年間道路隔塞糧饋不至鐔食蔬菜與士卒共勞苦毎急輒先當矢石自被三創以此能全其衆及帝擊破訢奉以鐔為左曹常從征伐定封合肥侯祭彤遵從弟早孤以至孝稱遇乳而有志節皆野無烟火而獨在冢側賊見其尚幼奇而哀之光武以遵故拜彤黄門侍郎累拜遼東太守邊無寇警威聲楊于北方悉緣邊屯兵徴為太僕顯宗以為可屬重任十六罷年將萬餘騎出塞還坐下獄免彤性沈毅自恨無功遂嘔血死時烏桓鮮卑朝賀京師常過冢拜謁仰天號泣乃去杜安潁川人年十三入太學號曰奇童京師貴戚慕其名或遺之書安不發鑿壁藏之及後捕案貴戚賓客安開出書印封如故遂免之時人賢之仕至巴郡太守許慎召陵人五性淳篤少博學經籍馬融常推敬之時人語曰經無雙許叔重仕為郡功曹舉孝亷再遷除洨長卒于家初慎以五經傳説臧否不同于是撰為五經異義又作説文解字十四篇皆傳于世陳翔召陵人少知名察孝廉辟舉高第拜侍御史時元旦朝賀大將軍梁冀威儀不整翔奏其不敬請收案罪時人奇之遷揚州刺史補御史中丞坐黨事考北寺獄以無驗見原卒于家繆彤召陵人少孤兄弟四人皆同財產及各娶妻諸婦遂求分異彤深懷憤嘆乃掩户自撾弟及諸婦悉叩首謝罪遂更為敦睦之行仕縣為主簿縣令被章見考彤獨正其事拷掠苦毒備至體生蟲蛆踰四年令卒免太守梁湛召為決曹吏湛卒彤送喪還隴西㑹西羌叛湛妻子悉避去彤獨留躬自負土造墳關酉咸稱傳之共給車馬衣資不受而歸後辟公府為中牟令卒于官荀淑潁川潁陰人少有高行博學而不好章句當世名賢李固李膺等皆師宗之舉賢良方正對策譏刺貴倖為梁冀所忌出補朗陵侯相項之棄官歸閒居養志産業每增輒以贍宗族知友建和三年卒李膺時為尚書自表師喪子八人并有名稱人謂八龍潁陰令苑康名其里曰高陽里陳寔潁川許人少為縣吏有志好學縣令鄧邵奇之聽受業太學司空黄瓊辟選聞喜長再除太邱長及逮捕黨人事連寔餘人多逃避求免寔曰吾不就獄衆無所恃乃請囚焉遇赦得出寔在鄉閭平心率物其有爭訟輒求判正曉譬曲直退無怨者時有云任為刑罰所加無為陳君所短三公每缺議者歸之累徵不起年八十四卒海内赴者三萬餘人制衰麻者以百數共刋石立碑諡為文範先生鍾皓長社人世善刑律皓少以篤行稱以詩律教授門徒千餘人桓帝時前後九辟公府皆不就時皓及荀淑並為士大夫所歸慕李膺嘗嘆曰荀君清識難尚鍾君至德可師兄子瑾好學慕古有退讓風母為李膺姑與膺同年俱有令名膺祖太尉修嘗言瑾似我家性復以膺妹妻之屢辟州府未嘗屈志李膺潁川襄城人性簡亢無所交接惟以同郡荀淑陳寔為師友舉孝廉高第再遷青州刺史轉烏桓校尉徴拜司隸校尉諸黄門常侍皆鞠躬屏氣休沐不敢出宫省帝問故並叩頭曰畏李校尉是時綱記頽弛膺獨持風裁士有被其容接者名曰登龍門遭黨事下獄免歸陳蕃竇武秉政引為長樂少府陳竇之敗膺復廢收捕鉤黨詣獄考死范滂汝南征羌人少厲清節為州里潁川爲之語曰荀氏八龍慈明無雙桓帝時舉至孝拜郎中對䇿陳便宜奏入即棄官去後遭黨錮隱于海上以著述爲事獻帝初徵拜平原相累官司空與王允等欲共圖董卓㑹病卒所著禮易詩傳尚書正經春秋條例漢語公羊問几百餘篇陳紀寔之子以至徳稱凡弟孝養閨門雍和士皆推慕其風遭黨錮著書數萬言號曰陳子黨禁解四府並命無所屈就遭父憂每哀至輒嘔血絶氣服除而積毁消瘠殆將滅性豫州刺史嘉其至行表上尚書圖象百城以勵風俗董卓人洛陽就家拜五官中郎將不得已到京師早欲徙都長安紀曰宜修德政以懷不附遷移至尊計之末者累官尚書令大鴻臚弟諶與紀齊德同行父子並著高名時號三君毎宰府辟召常同時旌命羔雁成羣當世榮之劉翊潁隂人家世豐產周施而不有其惠曾行汝南界中遇陳國張李禮遠赴師喪寒冰車毁頓滯道路翊即下車與之不芒姓名而去獻帝遷都西京翊舉上計掾時道路隔絶翊夜行晝伏乃到長安詔書嘉其忠勤特拜議郎遷陳留太守散所握珍玩唯餘車馬自載東歸出關見士大夫病亡道次乃以馬易棺脫衣殮之又逢知故困乏不忍委去因殺所駕十以救其乏曰視殁不救非志士也遂俱餓死荀悅淑之孫年十二能説春秋篇牘多能記誦性沈静尤好著述獻帝時累遷秘書監侍中時政移曹氏悅志在獻替而謀無所用乃作申鑒五篇奏之帝以班固漢書文繁難省復令悅依左氏傳體撰漢紀三十篇辭約事詳論辨多美荀彧淑之孫少時南陽何容異之曰王佐才也舉孝廉再遷元父令董卓之亂棄官歸將宗族至冀州袁紹洔以上賓之禮彧聞曹澡有雄畧乃去從操操大悦曰吾子房也以為司馬建安九年操欲奉迎車駕彧勸之及帝都許昌以彧為侍中守尚書令常居中特重操每征伐在外軍國事皆與彧籌焉彧進操計謀之士從于攸鍾繇郭嘉等皆稱其舉説操先取呂布後圖袁紹操保官渡糧盡欲還師彧曰此用奇之時不可失也遂以奇兵破紹封萬嵗亭候董昭等欲進操國公加九錫彧謂不宜操心不能平南征孫權表彧持節參丞相軍事彧病留夀春操餽食發之乃空器也于是飲藥而卒三國魏荀攸彧從子獻帝時拜黄門侍郎與議郎鄭泰何容等謀刺殺董卓事垂就而覺會卓死得免棄官歸魏武迎天子都許徴攸為汝南太守人為尚書魏武與語大悦謂荀或鍾繇曰公達非常人也吾得與計事天下當何憂哉以為軍師冀州平魏武表稱前後克敵皆攸之謀于是封陵樹亭侯魏國初建為尚書令攸深密有智防自從魏武征伐常謀謨帷幄時人及子弟莫知其所言前後几畫奇䇿十二世不得盡聞從征孫權道卒魏武言之每流涕鍾繇皓之曾孫漢末舉孝廉辟三府為廷尉正黄門侍郎魏武有事山東表繇以侍中守司隸校尉持節督關中諸事委之以後事漢帝西遷洛陽繇徙關中民又招納亡叛以充之數年民户稍實魏國𥘉建為大理遷相國文帝在東宫賜繇五熟釡作銘以美之累封定陵侯遷太傳太和四年卒陳羣紀之子為兒時祖父寔常奇異之魯國孔融先與紀友後與羣交更為紀拜由是顯名魏武辟為司空西曹掾屬羣薦廣陵陳矯丹陽戴乾魏武皆用之後乾忠義死難矯為名臣世以羣為知人魏國既建遷御史中丞轉侍中在朝無適無莫雅仗名義不以非道假人徙為尚書制九品官人之法文帝踐阼累遷鎮軍大將軍錄尚書事受遺詔明帝踐位進封潁隂侯為司空錄尚書事卒諡曰靖羣多密陳得失每上封事輒削其草人或譏其居位拱黙正始中詔撰錄名臣奏議朝士乃見羣諌事皆嘆息焉陳泰羣之子青龍中除散騎侍郎正始中為并州刺史嘉平初代郭淮為征西將軍假節都督雍涼諸軍事司馬昭語荀顗曰元伯沈勇能斷必能辨賊後徴為尚書右僕射典選舉高貴鄉公薨泰垂涕入昭曰卿何以處我對曰誅賈充以謝天下昭曰為更思其次泰曰泰言惟有進于此不知其次景元元年卒諡曰穆荀粲彧之子諸兄並以儒術議論而粲獨好言道卒年二十九粲簡貴不與常人遊所交皆一時俊傑至葬夕赴者纔十餘人皆同時知名士也鍾毓繇之子年十四為散騎侍郎機捷談笑有父風遷黄門侍郎時大興洛陽宫室車駕幸許昌于城南以氊為殿備設魚龍蔓延民罷勞役毓諌以為水旱不時帑藏空虚凡此之類可須豐年又上宜復關内開荒地使民肆力于農事遂施行正始史為散騎侍郎失曹爽意出為魏郡太守爽既誅入為御史中丞侍中廷尉正元中加後將軍都督荆州卒晉荀顗彧之子性至孝博學洽聞理思周密仕魏累官侍中討毌邱儉有功封萬嵗亭侯遷尚書代陳泰為僕射領吏部綜核名實風俗澄正年踰耳順孝養蒸蒸以母憂去膱毁幾滅性海内稱之咸熙中改封臨淮侯入晉進爵為公尋遷侍中太尉行太子太傅顗明三禮習朝廷大儀薨諡曰康荀勖爽之曽孫十餘嵗能屬文既長博學逹於從政仕魏累官侍中入晉封濟北郡公拜中書監進光祿大夫掌樂事修律吕初勖於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝座進飯曰此勞薪所炊帝遣問膳夫實用故車腳世服其明識領祕書監與中書令張華整理記籍又得汲郡冢中古文竹書詔勖撰次以為中經列在祕書時議省州郡縣半吏勖以為省吏不如省官省官不如省事省事不如清心守尚書令薨孫綽博學有才能撰晉後書十五篇傳於世棗據長社人本姓棘其先避讐改焉據美容貌善文詞弱冠辟大將軍府出為山陽令厯官太子中庶子卒所著詩賦論四十五首子腆以文章顯仕至襄城太守弟嵩才藝尤美位散騎常侍為石勒所害荀藩勖之子元康中為黄門侍郎受詔成父所治鐘磬以從駕討齊王冏勲封西華縣公累遷尚書令荀組藩之弟弱冠夷雅有才識建興初為司空尚書左僕射元帝承制以組都督司州諸軍及西都不守組乃遣使移檄天下共勸進帝欲以組為司徒問太常賀循循曰組舊望清重忠勤顯著遷訓五品實允衆望於是拜司徒累遷太尉領太子太保荀崧彧元孫父頵羽林右監安陵鄉侯崧志操清純雅好文學泰始中襲父爵累遷侍中王彌入洛崧與百官奔密未至而母亡賊追將及同旅散走崧守喪號泣賊至被四創氣絶至夜方蘇乃葬母於密山服闋除襄陽太守遣主簿石覽將兵入洛修復山陵遷都督荆州江北諸軍事封曲陵公元帝初徴拜尚書僕射與刁協共定中興禮儀從弟馗早亡二息序廞年各數歲崧迎與共居恩同其子會臨淮公荀顗國嗣廢絶朝廷欲以崧子襲封崧以讓序論者稱焉累遷右光祿大夫開府儀同三司錄尚書事年雖衰老而孜孜興籍世以此嘉之蘇峻之難帝被逼幸石頭崧侍從不離卒諡曰敬荀邃藩之子解音樂善談論太興初拜侍中時刁協執權欲以邃為吏部尚書邃深拒之王敦討協復表為廷尉以疾不拜轉尚書蘇峻作亂邃與王導荀崧並侍帝於石頭卒諡曰靖荀闓邃之弟少有名稱京師為之語曰洛中英英荀道明齊王冏辟為掾冏敗暴尸三日莫敢收葬闓與冏故吏李述等露板請葬朝議聽之論者稱焉厯御史中丞侍中尚書封射陽公周崎召陵人為湘州從事王敦之難譙王承使崎求救於外為魏乂所獲臨以白刃曰汝為我語城中稱大將軍巳破劉隗戴淵外援理絶如是者我當活汝崎偽許之既到城下大呼曰王敦軍敗於于湖甘安南巳克武昌即日分遣大將來赴此急努力堅守賊今散矣於是為乂所害鍾雅長社人少孤好學有才志舉四行除汝陽令避亂東渡元帝以為記室參軍補宣城内史錢鳳作逆周玘為鳳起兵雅收合士庶討玘斬之鳳平徵拜尚書左丞遷御火中丞直法繩違百僚憚之蘇峻之難雅與劉超並侍衞天子或勸雅退雅曰國亂不能匡右危不能濟各遜遁以求免吾懼董狐執簡而至矣及帝幸石頭雅流涕步從為賊所害追贈光祿勲韓伯長社人清和有思理留心文藝潁川庾龢少所推服常稱之曰思理倫和我敬韓康伯累官侍中陳郡周勰居喪廢禮崇尚老荘伯領中正遂不通勰時人憚焉嘗作辨謙論為世所重轉丹陽尹吏部尚書領軍將軍卒荀蕤崧之子起家祕書郎稍遷尚書左丞㽔有儀操風望雅為簡文帝所重時桓温平蜀朝廷欲以豫章封温㽔曰若温復假王威北平河洛將何以加此於是乃止後除建威將軍呉國内史卒官荀羨𬎼之弟清和有準拜駙馬都尉累遷北中郎將徐州刺史監徐兖二州諸軍事時年二十八中興方伯未有如羨之少者以羨在事有能名故居以重任尋監青州又領兖州刺史鎮下邳慕容㒞將王騰趙盤寇瑯琊鄄城羨討擒之慕容蘭以數萬衆屯汴城甚為邊害羨自光水引汶通渠至于東阿以正之臨陣斬蘭帝將封之固辭不受在鎮撫納降附甚得衆心以病解職卒南北朝宋荀伯子羨之孫少好學博覽經傳仕晉為著作佐郎輿徐廣同修國史入宋累遷御史中丞涖職勤恪有匪躬之節立朝正色衆咸憚之卒于東陽太守文集傳于世梁鍾嶸長社人與凡岏弟嶼並好學有思理嶸仕齊為南康王國侍郎明帝躬親細務綱目密嶸上書諌止梁天監初衡陽王引為安朔記繁室專掌文翰遷西中郎晉安王記室卒官嶸嘗品古今五言詩論其優劣名為詩評岏位建康令著良史傳十卷嶼永嘉郡丞荀匠朂九世孫祖瓊年十五報父仇成都市以孝聞父法超仕齊為安復令卒官匠聞號痛氣絶既而奔喪每宿江渚商旅不忍聞其哭聲居父憂並兄服厯四年不出户不櫛沐髪皆秃落號哭無時目眥皆爛形體枯瘁雖家人不復識郡縣以狀言梁武帝遣中書舍人為除服擢為豫章王國左常侍竟以毁卒陳荀朗潁隂八少慷慨有將帥大畧侯景之亂梁簡文帝授朗豫州刺史令與外藩討景景敗于巴陵朗截破其後軍高祖八輔齊相蕭軌等寇據石頭城朗來赴因大破之永定元年賜爵興寕縣侯世祖即位令朗與侯安都等拒王琳琳平遷安北將軍散騎常侍合州刺史卒子法尚少俶儻有文武幹畧仕陳為都督郢州刺史入隋厯邵觀綿豐四州刺史巴東燉煌二郡太守隋庾自直潁州人少好學沈静寡欲大業中授著作佐郎自直解屬文于五言詩尤善恭愼不妄交遊帝有篇章先示自直自直稱善然後方出後以江都之變感激發病卒唐張善相襄城人大業末為里長督兵迹盜為衆附賴乃據許州奉李密密敗挈州以來詔即授伊州總管王世充攻之屢困賊遣使三輩請救朝廷未暇也城陷被執罵賊見殺高祖嘆曰吾負善相善相不負我乃封其子襄城郡公王求禮長社人武后時為左拾遺監察御史后方營明堂琱飾譎怪侈而不法求禮上書譏切久視二年三月大雨雪鳳閣侍郎蘇味道等以為瑞率羣臣入賀求禮言宰相變和陰陽而季春雨雪乃灾也果以為瑞則冬月雷以為瑞雷耶后為罷朝然以剛正故官齟齬終衛王府參軍孔璋許昌人明皇時李邕為陳州刺史㑹仇人告邕贓貸枉法下獄當死璋上書天子曰邕折二張之角挫韋氏之鋒奸謀沮解有功于國臣願以六尺之軀膏鈇鉞以代邕死疏奏邕得減死貶遵化尉流璋嶺南王沛許州許昌人少勇決為節度使上官涗所器署牙門將妻以女涚卒它壻田偁脅涗子襲領其軍謀殺監軍沛知其計密告之支黨悉擒德宗嘉美即拜行軍司馬李光顔討吳元濟奇沛風概署行營兵馬使數破賊有功時詔書趣戰諸將觀望不敢渡溵以壁沛引兵五千夜濟合流扼賊衝遂城以居於是諸軍繼渡圍郾城蔡將鄧懷金遂降蔡平加兼御史大夫復從光顔定淄青又救鹽州敗吐蕃以功擢刺史進拜兖海沂密節度使軍政大治以檢校工部尚書徙忠武卒子逢從父征伐累功加檢校右散騎常侍後亦至忠武節度使王博武許州人㑹昌中侍母至廣州及沙涌口暴風母溺死博武自投於水節度使盧貞俾吏沈罟獲三屍焉乃葬之表其墓曰孝子墓詔為刻石五代梁王重師許州長社人為人沈黙多智從梁祖平蔡攻兖鄆為拔山都指揮使苦戰齊魯間威震鄰敵遷潁州刺史梁祖攻濮州巳破濮人積草焚之兵不得入時重師病卧帳中諸將強之重師遽起悉取軍中氊毯沃以水蒙于火上率精卒以短兵􅊳入遂取濮州身𬒳八九創累遷佑國軍節度使甚有威惠謝彥章許州人事梁為騎將善將騎兵多而益辦累遷匡國軍節度使彦章為將好禮儒士雖居軍中常儒服或臨敵御衆肅然有將帥之威左右馳驟疾若風雨晉人望其行陣齊整相謂曰謝產章必在此也其名重敵中如此唐王建及許州人為匡衛指揮使從戰莘縣故元城皆先登陷陣以功累拜遼州刺史將銀槍効節軍從戰胡柳與梁爭土山莊宗呼其軍曰得山者勝建及以銀槍軍進遂得土山梁兵大敗晉為南北城于河上梁將賀瓌攻其南城以竹笮維戰艦于河晉兵不得渡南城危甚莊宗募能破梁戰艦者建及重鎧執矟呼曰吾今破之矣即以大甕積薪自上流縱火焚梁戰艦以二舟載甲士隨之斧其竹笮晉軍得渡瓌解圍去後為代州刺史卒宋焦守節長社人父繼勲仕至右金吾衛上將軍守節初𥙷左班殿直擢閤門祗候李順餘黨擾四川命與上官征討平之咸平中置江淮南荆潮路兵馬都監首被選擢又討施夔州叛蠻以大義諭其酋長皆悔過内附因為之畫界定釣入為宫苑副使奉使至遼館伴丁求説指遠山謂曰此黄龍府也守節應聲曰燕然山距此㡬許求說慚服三遷東上閤門使厯知襄鄧汝三州以右神武大將軍致仕卒李兌臨潁人登進士第由屯田員外郎為殿中侍御史按齊州叛卒獄成有欲夜篡囚者兌以便宜斬之人服其畧張堯佐判河陽兌言堯佐素無行能不宜以戚里故用改同知諌院狄青宣撫廣西内都知任守忠為副兌言以宦者觀軍容致主將掣肘非計仁宗為罷守忠擢天章閣待制知諌院兌在言職十年几所論諌不自表暴出知杭越廣州還知河陽徙鄧州為政簡嚴老益精明積官尚書右丞轉工部尚書致仕卒諡曰莊李先兌從弟起進士為䖍州觀察推官攝吉州永新令知信州南安軍撫楚州厯利梓江東淮南轉運使所至治官如家積官至祕書監致仕兄兌尚無恙事之彌篤卒年八十三子延玉年六十即棄官歸養人賢其家法云掌禹錫郾城人中進士第爲道州司李參軍試身言書判第一丁度薦爲侍御史上疏請嚴備西羌時議舉兵禹錫引周宣薄伐爲得漢武遠討爲失且建畫增步卒省騎兵英宗即位以尚書工部侍郎致仕卒禹錫矜慎畏法居家勤儉嘗預修皇祐方域圖志地理新書王洙推其稽考有勞賜三品服及校正類篇神農本草載藥石之名狀爲圖經著郡國手鑑一卷周易集解十卷靳裁之許昌人少聞伊洛柱氏之學胡安國人太學以裁之爲師裁之與安國論經史大義安國常述其言口士之品大概有三志于道德者功名不足以累其心志于功名者富貴不足以累其心志于富貴而巳者則亦無所不至矣朱子著論語集誰嘗引用之孫永長社人祖沖給事中永廕將作監主簿擢進士第至太常博士韓琦引爲諸王府侍讀神宗爲潁王出新鋉韓非子卑官僚讐定永曰非險簿刻核其書背六經之指願母留意及即位擢天章閣待制安撫陜西厯河北陜西都轉運使知泰和二州召還神宗問青苗助役之法於民便否對曰强民出息輸錢代徭不無重斂之患議復肉刑永奏刻人肌膚深害仁政不果行出知太原且行永言兵非輕用之物願軫不戢之禍入判將作進端明殿學士病不能朝神宗虛樞密位以待辭去益力哲宗召拜工部尚書永陳保馬保甲二役三事願一切罷去太皇太后納之遷吏部改資政殿學士未拜而卒永外和内勁議論常持平事或悖於理雖逼以亦不為屈與人交終身無怨讐范純仁蘇頌皆勢稱之為國器杜生潁昌人不知具名縣人呼為杜五郎所居去縣三十里有屋兩間與其子並居前空地丈餘即為籬門生不出尉孫軫往訪之問所以為生曰門者三十年黎陽昔時居邑之南有田五十畝與兄同耕迨兄子娶婦度所耕不足贍乃盡以與兄而攜妻子至此郷人借屋遂居之唯與人賣醫藥以給飦粥亦有時不繼後子能耕食足念鄉人貧以醫御自業者多已食既足不當更求他利由是擇日賣樂一切不為時盛寒布𫀆草屩室中枵然而氣韻閒曠言辭精簡葢有道之士也軫嗟歎流連久之乃去金張彀臨潁人大定末進士為同州觀察判官累進河東南路轉運使權行六部尚書安撫使卒彀天性孝友任子悉先諸弟俸入所得亦委其弟掌之未嘗問有無云元謝讓潁昌人糿潁悟好學及壮推擇為吏調河間等路鹽司經厯擢南臺御史劾江浙省臣不法臺綱益振累遷户部員外郎時東勝雲豐等州民飢乞糴鄰部憲司懼其販鬻為利閉其糴事聞於朝讓設法立禁閉糴者有罪三州之民賴以全活甚衆厯户部刑部尚書仁宗即位有㫖六部事疑不決者須讓共議而後上聞帝命中書省纂集典章以讓精律學使為校正官拜西臺侍御史卒丁文忠郾城人業鼓冶母和氏疾與弟文孝竭力調侍母卒文忠廬墓側不與妻面者三年父貴又疾醫不能療文忠造車一輛兄弟共御之載父禱於嵩山五臺泰安河瀆諸祠途遇異憎遺藥而愈延祐七年旌之明李敏襄城人景泰進士授御史明習法律有能名巡按畿内以薊州餉道經海口多遭覆溺建議别開二河以避險成化中由大同廵撫入為兵部右侍郎與尚書余子俊協心共濟部事稱理累遷户部尚書貴戚有請隙地及鷹房牧馬場者敏執不可事得寢極言皇莊之害請盡革莊役時不能用敏生平篤行誼所得禄賜悉以分昆弟故人家無餘財卒諡恭靖何清許州人任環縣訓導奔母喪徒步二千里徑詣墓所廬居三年成化中旌賈詠臨潁人宏治進士改庶吉士授編修嘉靖初進尚書入内閣參預機務因事納忠從容啟沃世宗親製詩襃諭後致仕歸劉校郾城人性至孝正德進士授刑部主事疏諌南巡被杖將死大呼曰吾死無恨恨不見老母耳謂子善事祖母及母母媿爾父遂絶辛自修襄城人嘉靖進士以知縣最擢吏科請量地劇易以除官量事繁簡以注考遷掌禮科彈劾不避權貴隆慶元年論奪尚書顧可學徐可成侍郎朱隆禧郭文英贈諡以可成由黄冠進文英由工匠進可學隆禧俱以方藥進也厯僉都御史巡撫保定遷南京右都御史劾御史沈汝梁貪狀上嘉之召為左都御史阿自失修素剛介至是掌計察益持正不政府意被訐引疾歸卒諡肅敏蘇繼歐許州人萬厯進士累遷考功郎中以楊漣黨削籍歸自經死崇禎初贈太常寺卿邢國璽長葛人崇禎進士授濰縣知縣改石城盡心氏事上官交薦入為户部主事時議開膠萊河國璽力陳其便擢登萊兵備僉事經埋河道十五年冬畿輔戒嚴奉詔入衛至龍岡遇大兵鏖戰墮馬死本朝乾隆四十一年賜諡烈愍孫六鳳許州人貢生孝友性成為學務實建宗祠立族約族人咸奉以為法明末流寇至境六鳳率衆抵禦殱賊無算嵗䘲捐穀以濟貧乏里黨賴之本朝嘉慶十一年祀郷賢本朝賈壯襄城人順治進士為懷寕知縣金聲桓之叛竭力守禦城賴以全督餉宣大分巡榆林所至兵民稱便祀鄉賢耿應張襄城人順治進士授荆州府推官鋤蠹役釐積弊一時治號肅清李溥郾城人順治進士任三原知縣值姜瓖之亂率衆死守賊遁去又翦滅流寇餘孽厯官户部郎中劉恩廣襄城人諸生潛心理學當流寇亂父漢臣被執恩廣方十歲號呼奔救至則父巳遇害矣乃哭收父屍賊怒截其耳鼻不肯去賊憐而釋之卒負父屍以歸兄弟同居終身無間言母亡哀毁嘔血卒郭萬國許州人由諸生從軍除銅仁知縣厯仕黔中所至有聲康熙十四年遷饒州知府時耿逆攻城萬國統家人血戰力竭死之事聞贈光禄寺卿劉澤久許州人授千總屢著戰功旋署鄖陽守備康熙十七年霍山之戰主將失利澤久突陣救援𬒳擒不屈死之李緝襄城人貢生仕偃師訓導天性孝友人無間言其教誨諸生不專文藝必以孝弟忠信為本嘉慶九年祀鄉賢孫昕許州人年六嵗母卒每泣盡哀父病出指血為表呼天祈減巳年以延父夀父疾㝷愈迨沒後哀毁骨立行年八十餘不忘孺慕性好施予嵗歉鬻產遠糴以周族鄰全活甚衆馬旺襄城人武生任外委嘉慶四年隨勦湖北教匪於高埡子擊賊陣亡事聞予雲騎尉世職又同縣額外外委崔振基於湖北霧渡河擊賊陣亡賞卹如例流寓漢禰衡般人建安初自荆州北遊許都恃才傲逸人皆憎之惟少府孔融高貴其才或問之曰當今許中誰最可者衡曰大兒孔文舉小兒楊徳祖南北朝魏王由霸城人罷郡後寓居潁川天平初元洪威搆逆大軍攻討為亂兵所害名流悼惜之唐陳夷行其先江左諸陳也世客潁川由進士第累遷吏部郎中為翰林學士開成二年進中書門下平章事楊嗣復李珏相次輔政夷行介特雅不與合引疾求去罷為吏部尚書武宗即位召還以足疾乞身罷為太子太保河中節度使卒宋文彥博介休人少與張昇高若訥從潁昌史炤學炤母異之曰貴人也待之甚厚范鎮華陽人神宗時以户部侍郎致仕徙居許范純祐吳縣人從父仲淹之鄧得疾昏廢卧許昌富弼守淮西過省之猶能慷慨道忠義范純仁與兄純祐居許純祐有心疾藥膳居服皆躬親時節之賈昌朝守北都請參幕府以兄辭宋庠薦試館職謝曰輦轂之下非兄養疾地也范正平純仁子蔡京當國羈管象州㑹赦得歸潁昌唐君益為守表其所居為忠直坊蘇轍眉山人崇寕中蔡京當國降朝請大夫罷祠居許州再復大中大夫致仕築室於許號潁濱遺老蘇過父軾卒於常州過葬軾汝州郟城小峨眉山遂家潁昌營湖隂水竹數畝名曰小斜川自號斜川居士有斜川集廿卷韓駒仙井監人嘗在許下從蘇轍學轍評其詩似儲光義金麻九疇易州人後居郾城徵為翰林應奉至大中棄官歸與張彀輩為㶏上之遊元好問秀容人常寓居郾城與麻九疇倡和元王磐永年人年方冠從麻九疇學於郾城客居貧甚日作糜一器畫為朝暮食大肆力於經史百代列女漢陰瑜妻荀氏名采潁川司空荀爽之女嫁為瑜妻明敏有才藝年十九瑜卒無子同郡郭奕喪偶爽以采許之采懐刃自誓爽命奪其刃逼命登車不得巳乃至郭氏多建炬燈正容竟夕奕不敢近因命左右辦浴既入室掩户以粉書扉曰屍還陰遂自縊晉王渾妻鍾氏繇之曾孫女數嵗能屬文及長聰慧宏雅博覽記籍美容止善嘯咏禮儀法度為中表所則既適渾與渾弟湛妻郝氏雅相親重郝不以賤下鍾鍾不以貴凌郝時人稱鍾夫人之禮郝夫人之法云韓伯母殷氏高明有行鄄城呉隱之丁父憂與伯鄰居母每聞隱之哭聲輟餐投筯為之悲泣既而謂康伯曰汝若居銓衡當舉如此輩人及康伯為吏部尚書隱之遂階清級荀崧小女名灌幼有奇節崧為襄城太守為杜曽所圍力弱食盡欲求救於故吏平南將軍石覽計無從出灌時年十三乃率勇士數十人踰城宇圍夜出賊追甚急灌督厲將士且戰且前得入魯陽山獲免自詣覽乞師又為崧書與南中郎將周訪請援訪即遣兵會石覽俱救崧賊聞兵至乃散走金蘇嗣之母白氏許州人宋門下侍郎蘇轍五世孫婦也年二十餘即寡居服除外家迎歸兄嫂竊議改醮氏微聞之牽車徑歸曰我蘇學士家婦又有子乃欲使我失身乎自是外家非有大故不往嘗於宅東北為祭室畫蘇軾蘇轍兩像圖黄州龍州故事壁間香火嚴潔躬自灑埽天興元年許州被兵嗣之為汴京廂官白拜辭祭室曰兒往京師老婦死不恨矣敢以告即自縊於室側家人并其屋焚之張鳳奴許州人天興中北兵攻蔡州矢石之際忽見一女子呼於城下曰我倡女張鳳奴也許州破𬒳俘至此彼軍不日去矣諸君努力爲國堅守無爲所欺也言竟投濠而死元李順兒許州儒士李讓之女也性聰慧頗涉經傳年十八未嫁至正十五年賊陷釣州密邇許昌父謂其母曰吾家以詩禮相傳此女必累我女聞之泣曰父母可自逃難勿以我爲憂須臾於後園自經而死明李逢昌妻吕氏郾城人夫早死有豪強欲強娶之遂自經死有司驗其屍忽怒風大作黄霧四塞時已踰三日面如生有司旌其門豪強服辜邢國璽妻袁氏長葛人國璽官副使殉難流賊至長葛子諸生爲法爲憲以捍賊死袁與子婦董氏高氏一女孫俱投淵死王玉璣妻李氏許州人崇禎中李自成破許城李爲所獲大罵遇害尹元正妻蕭氏媳張氏長葛人崇禎中李自成䧟長葛蕭挾張逃匿枳棘猝遇賊蕭𬒳執罵賊將加刃張躍出大呼曰此吾姑也願代死遂並遇害侯氏一門節烈襄城人崇禎末賊將陷城生員候新建謂其家人曰城破必爲所辱各宜自為謀子抒恮妻馮氏抒㥠妻王氏抒悰妻辛氏皆自經死母蔡氏年巳八旬亦投繯死本朝程氏三節婦臨潁人程可則妻唐氏夫亡誓志厯六十四年孫蛟龍復娶於唐二載而蛟龍殁唐撫子國正成立又與唐為婚僅半載而寡撫遺腹子以守程氏凡四世三節悉出唐氏又同縣陶正心妻吕氏陳國平妻袁氏均康熙年閒旌樊廷桂妻張氏襄城人以守志為鄰人王荆州王習武所殺三年不得主名荆州忽發狂自言與習武殺人狀遂自縊死令捕習武論抵同縣姚邵妻張氏苦節六十年田玉才妻戴氏亦守正捐軀均康熙年間旌魏震妻王氏許州人震拔貢生崇禎十四年以守城殉難遺孤纔二嵗三世喪未葬王悉力搘持撫孤庀葬事同州張氏女九姐以守正被戕均雍正年閒旌王甲生妻吕氏襄城人未嫁而甲生溺死請奔喪母阻之夜自經得救甦舅聞而逆之曰吾家甚貧且汝姑殁巳久往將何依女哭曰死生王婦也如舅言促婦死耳乃逆以歸哀號動鄰里比葬經潭水側踴身下投復以救免取伯氏子為嗣守節三十餘年同縣姚慎聘妻王氏夫亡守貞均雍正年間旌韓繼紹妻李氏許州人夫亡守節同州節婦胡珍妻黄氏周炳妻董氏楊文彩妻張氏商世彦妻王氏趙文英妻馮氏王思舜妻汪氏孫錫域妻呉氏劉士琦妻周氏黄宗舜妻范氏尚昱妻張氏孫延修妻張氏李從道妻樊氏吳興洛妻許氏蔣克明妻白氏許長餘妻趙氏魏之珻妻申氏郭于鎬妻張氏宋蘭妻孫氏高師允妻劉氏張純妻李氏王世德妻戴氏黄鉞妻趙氏何中立妻韓氏孫公禮妻李氏胡秉禮妻周氏姜義妻崔氏賀燧妻于氏張昆妻沈氏馬惠繼妻趙氏任見高妻王氏郭萬城妻王氏李文魁妻周氏張文學妻屈氏王璠妻李氏殷爾梅妻羅氏張彩妻賈氏郭鍇妻鍾氏宿士方妻徐氏韓佩瓆妻汪氏袁禧妻張氏閻盡倫妻楊氏甄良臣妻尚氏高宗思妻楊氏韓廷偉妻徐氏李兆榮妻周氏任洪智妻魏氏任之玿妻徐氏王之鵬妻宋氏魯升堂妻賈氏徐獻業妻王氏沙大定妻海氏楊生育妻張氏俎玹妻張氏周文禮妻楊氏孫益敬妻任氏孫如嵩妻王氏周居敬妻孫氏韓長祥妻周氏孫掌經妻鄭氏尚家駿妻劉氏吳宏玿妻尚氏烈婦子二妮妻吕氏翟穩成妻銀氏張馬妻張氏楊至民妻金氏李大顯妻蔡氏黄梁氏貞女張氏女烈女李章聘妻白氏劉桂姐尚氏女均乾隆年間旌寇璠妻賈氏臨潁人夫亡守節同縣田雷妻張氏宋汾妻周氏烈婦宋更寅聘妻陳氏馬悦兒妻韋氏均乾隆年間旌崔興祖妻李氏襄城人夫亡守節同縣節婦朱永祚妻戴氏馬羣妻李氏常復輝妻楊氏傅恂悅妻侯氏聶存惠妻馮氏李長秀妻孫氏耿裝妻李氏馮原澍妻李氏王佐妻古氏聶存新妻王氏田夢月妻姚氏王文錦妻戴氏張烈妻魏氏張炎妻趙氏張廷梅妻耿氏黄甲雩妻張氏趙乾元妻耿氏劉文煥妻藺氏張述秀妻劉氏李樹烈妻賈氏萬兆元妻朱氏楊遂妻張氏賀梅登妻查氏張溥妻李氏陳炳妻張氏賈昱妻李氏孟良才妻王氏張本濟妻謝氏趙俊