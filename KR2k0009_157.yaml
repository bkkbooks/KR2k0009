body:
  text: 漳州府在福建省治西南六百八十里東西距二百七十里南北距二百九十里東至泉州府同安縣界七十里西至汀州府永定縣界二百里南至海一百八十里北至泉州府安溪縣界一百十里東南至海一百八十里西南至廣東潮州府饒平縣界二百八十里東北至同安縣界一百二十里西北至龍巖州漳平縣界一百四十里自府治至京師七千五百二十五里分野天文牽牛須女分野星紀之次建置沿革禹貢揚州南境周七閩地後屬越秦為閩中郡地漢為會稽南海二郡地後漢為會稽南部都尉地三國吳為建安郡地晉以後為晉安義安二郡地梁分置龍溪縣屬南安郡隋屬建安郡唐初屬泉州即今福州垂拱二年置漳州初治漳浦後移龍溪天寶元年改漳浦郡乾元元年復曰漳州屬江南東道五代初屬王閩後屬南唐改曰南州宋乾德四年復曰漳州屬福建路元至元十八年升漳州路屬福建道宣慰司明洪武元年改曰漳州府屬福建布政使司本朝因之屬福建省領縣七舊領縣十雍正十一年升龍巖縣為龍巖直隸州割漳平寧洋二縣屬焉龍溪縣附郭東西距一百里南北距七十五里東至泉州府同安縣界七十里西至南靖縣界三十里南至漳浦縣界五十里北至長泰縣界二十五里東南至海澄縣治五十里西南至平和縣治二百十里東北至長泰縣治四十里西北至龍巖州漳平縣治二百二十里漢冶縣地晉以後為晉安縣地梁大同四年分置龍溪縣屬南安郡隋屬建安郡唐𥘉屬泉州開元二十九年割屬漳州乾元二年為漳州治五代宋因之元為漳州路治明為漳州府治本朝因之漳浦縣在府南一百二千里東西距一百四十里南北距一百十里東至海八十里西至南靖縣界六十里南至詔安縣界六十里北至龍溪縣界五十里東南至海八十里西南至詔安縣界八十里東北至海澄縣治七十里西北至南靖縣治一百三十里漢冶縣及南海郡揭陽縣地晉義熙九年分置綏安縣屬義安郡宋齊以後因之隋開皇十三年併入龍溪唐垂拱二年分置漳浦縣為漳州治乾元二年徙州治龍溪以漳浦為屬縣五代宋因之元屬漳州路明屬漳州府本朝因之海澄縣在府東南五十里東西距八十里南北距五十里東至漳浦縣界六十五里西至龍溪縣界十五里南至漳浦縣界四十里北至龍溪縣界十里東南至海一里西南至漳浦縣治七十里東北至泉州府同安縣治一百四十里西北至龍溪縣界十五里漢冶縣地晉以後為晉安縣地梁以後為龍溪縣地明嘉靖四十四年割龍溪及漳浦縣地置海澄縣屬漳州府本朝因之南靖縣在府西四十里東西距一百三十里南北距二百三十里東至龍溪縣界十里西至龍巖州漳平縣界一百二十里南至漳浦縣界一百里北至漳平縣界一百三十里東南至漳浦縣治一百三十里西南至平和縣界五十里東北至長泰縣治七十五里西北至漳平縣界一百里漢冶縣地晉以後為晉安縣地梁置蘭水縣屬南安郡隋開皇間省入龍溪縣元至治中析置南勝縣治在今縣西南至正十六年移南勝縣來治改曰南靖屬漳州路明屬漳州府本朝因之長泰縣在府東北四十里東西距九十五里南北距八十五里東至泉州府同安縣界六十里西至龍溪縣界三十五里南至龍溪縣界五里北至泉州府安溪縣八十里東南至同安縣界五十里西南至龍溪縣界十五里東北至同安縣界八十里西北至龍溪縣界五十里漢冶縣地晉以後為晉安縣地隋為南安縣地五代南唐保大中分置長泰縣屬泉州宋太平興國五年改屬漳州元屬漳州路明屬漳州府本朝因之平和縣在府西南二百五里東西距一百七十里南北距二百十里東至南靖縣界一百四十里西至廣東潮州府大埔縣界三十里南至詔安縣界一百里北至汀州府永定縣界一百十里東南至漳浦縣界一百八十里西南至潮州府饒平縣治一百里東北至南靖縣治一百七十里西北至永定縣治二百二十里漢冶縣地晉以後為晉安新羅二縣地梁為龍溪縣地後又為蘭水縣地隋仍為龍溪縣地唐為龍溪漳浦龍巖三縣地元初為南勝縣地至正以後為南靖縣地明正德十四年析南靖漳浦二縣地置平和縣屬漳州府本朝因之詔安縣在府西南二百五十里東西距一百二十里南北距七十里東至海八十里西至廣東潮州府饒平縣界四十里南至饒平縣界三十里北至平和縣界四十里東南至海三十里西南至饒平縣界一百里東北至漳浦縣界八十里西北至饒平縣界一百里漢南海郡揭陽縣地晉為綏安縣地唐垂拱二年置懷恩縣屬漳州開元二十九年省入漳浦縣明嘉靖九年析置詔安縣屬漳州府本朝因之形勢地極七閩境連百粵唐陳元光建郡表地曠土沃宋博自得道院記兩山擁翼二江襟帶宋陳淳北溪集山川清秀原野坦平蔚為江外名邦宋吳與圖經序控引番禺襟喉嶺表府志天寶紫芝奠於後丹霞名第拱於前鶴峯踞其左員山聳其右同上風俗其民務本不事末作而資用饒給宋傅自得道院記民有田以耕紡苧為布弗迫於衣食樂善遠罪宋郭祥正記質朴謹畏俗尚淫祀宋陳北溪集其人以業文為不資以舶海為恆産故文則揚葩而吐藻武則輕生而鬬雄明土世懋閩部疏城池漳州府城周十里三百四十二步門四南北水門二南臨大溪北依山溝東西浚濠宋咸平中建本朝順治十二年重建康熙三十六年修雍正十年乾隆二年嘉慶十二年重修龍溪縣附郭漳浦縣城周九里三百五十六步門四東西水門二宋乾道中建本朝順治十二年重建康熙四十六年修雍正二年乾隆十二年重修海澄縣城周三里三百二十四步門四明嘉靖三十六年建本朝康熙二十七年修雍正七年乾隆十二年重修南靖縣城周三里一百七十四步門四元至正十六年土築明嘉靖六年甃石本朝順冶十二年重建乾隆十二年修長泰縣城周五里二十三步門四東臨溪南浚濠西北因山為塹宋端平中土築明正德十三年甃石本朝順治十二年修乾隆十二年重修平和縣城周三里一百十二步門四水門二明正德十四年建本朝順治十二年重建詔安縣城周三里二百八十六步門四明宏治十七年因舊址拓建本朝順治十二年重建康熙六十年修雍正七年乾隆十二年重修學校漳州府學在府治東南隅宋慶厯中建本朝康熙二十一年修四十三年乾隆八年重修入學額數二十名龍溪縣學在縣治南宋嘉祐中建本朝康熙二十一年重建二十六年修乾隆八年三十六年重修入學額數二十名漳浦縣學在縣治南宋初建於縣西北隅凡再徙熙寧三年始建今所本朝康熙十九年修三十八年重修入學額數二十名海澄縣學在縣西九都城中明隆慶初建本朝康熙十年重建雍正四年修乾隆十一年二十二年重修入學額數二十名南靖縣學在縣治東元至正中建明嘉靖間遷新縣萬厯中復還故址本朝康熙二十年修三十五年乾隆八年三十四年重修入學額數二十名長泰縣學在縣治東宋紹興三年建嘉定間遷於縣東南紹定六年復還故址本朝順治十七年重建康熙二十一年修雍正六年乾隆三年重修入學額數十五名平和縣學在縣治南明正德十四年建本朝順治十八年修康熙三十一年乾隆二十五年重修入學額數二十名詔安縣學在縣治南明嘉靖十年建本朝順治十七年重建康熙十七年修四十三年乾隆十二年重修入學額數十五名丹霞書院在府治東南本朝乾隆二年建二十六年拓建芝山書院在府治西北登高山初名龍江書院宋郡守危稹建本朝康熙二十一年重建五十四年復即其東增建仰文書院尋合二書院為一改今名乾隆二十一年修霞北書院在府治北本朝康熙四十一年建乾隆二十年修鄴山書院在府治鄴侯山明崇禎間郡人黃道周講學於此建與善三近樂性諸堂本朝乾隆十四年改建錦江書院在龍漢縣十一都本朝康熙六十一年建乾隆十四年修觀瀾書院在龍溪縣十一都宋時建明洪武間遷於南陂宏治間遷於文山之麓止德四年移建察院西地儒山書院在海澄縣治北本朝乾隆二年建二十七年拓建九和書院在平和縣治後山本朝乾隆二十六年建丹詔書院在詔安縣南門內文公祠東本朝乾隆二十九年建按舊志載育德書院在府城西隅本朝康熙二十六年建建溪書院在龍溪縣西南翁建社明洪武間建養正書院在龍溪縣西南高亭山下明隆慶間郡守羅青霄建薌江書院在龍溪縣東北二十里明洪武二十二年建本朝康熙二十六年重建梁山書院在漳浦縣南梁山唐潘存實讀書處龍津書院在長泰縣東明洪武三十一年建石屏書院在詔安縣東漸山宋陳景肅講學處東瀛書院在詔安縣東懸鐘所南溟書院在詔安縣銅山所俱明嘉靖五年參政蔡潮建謹附記户口原額人丁一十九萬三百七十六今滋生男婦大小共三百三十三萬六千七百二十七名口計七十一萬二千一十七户又屯民男婦共六萬一千三十五名口計一萬四千三百四十户田賦田地一萬二百八十四頃七十三畝九分九釐有竒額徵地丁正雜銀一十四萬四千七十四兩三錢七分米二千七百五十二石二斗九升四合八勺屯田五百五十四頃八十八畝五分九釐有竒額徵丁糧銀一千六百六十五兩八錢一分五釐米八千八百五十二石四斗七升九合四勺山川隆夀山在府城東鄭樵通志居其下者人多夀考故名宋時在城內今附城址丹霞山在府城南閏書土石皆赤晨夕映日色若丹霞故郡東西南北四郊皆以霞稱保福山在府城西山為郡龍入脈之地登高山在府城西北隅方輿勝覽在州治西二里府志脈自天寶山來蜿蜒起伏三十餘里至郡城西北一峯聳拔名曰望高山其南麓為登高山原名紫芝山郡城繞焉項有威鎮亭明洪武中建山之東為日華萬松諸峯禪月隆夀等山其西為淨安峯為騰龍起鳳諸山舊志騰龍山一名龍亭山平地特起竒石攢湊俯瞰溪流相傳昔有龍騰溪中因建亭溪上而名相峙者曰起鳳山一名高亭山與日華諸峯綿亘連絡繞城內外皆紫芝之支隴也好景山在龍溪縣東十五里紆回起伏風景竒勝元和志縣東十五里至山險絶無路蓋即此人漳浦縣西北里許亦有好景山縣城枕其麓一名石虎山以山嶺有石如虎也文山在龍溪縣東二十里一名觀音巖北臨大溪三面通潮其右為水頭山脈自縣南太平嶺而下至溪而止與鳳凰石壁並稱為水口鳳凰山在龍溪縣東二十里與文山水頭品峙中有萬松嶺舊名馬岐為郡孔道明正統間郡人植松夾道連隂十里因改今名岐山在龍溪縣東二十餘塵宋郭功父嘗有𡵨山仙亭十咏府志由文山逾溪以北曰鶴鳴山亦名石壁山其下為雲洞又北而岐者為岐山二峯連峙延袤十里許秀𩌨龍江之上巖壑竒勝又有千人洞洞口狹而暗中甚寬朗容千人唐黃巢之亂民多避難於此白石山在龍溪縣東六十里山多白石一名鸛石山中有石硿可容千人相近曰覆舟山龍漈山在龍溪縣東南二十五里下有龍潭飛泉百尺直瀉而下旁有鳬翠山雙峰如削高出龍漈之上俗名魚刺山南巖山在龍溪縣南七里延袤數里峯巒竒秀怪石錯列有石獅寶月南泉玉泉諸巖以石獅為最勝下有清泉曰白鹿泉名第山在龍溪縣南十里方輿勝覽州有天成山一曰名第山志勝唐周匡物潘存實讀書於此元和十一年匡物進士及第為漳登進士之始十三年存實亦登進士憲宗敕改今名劉禹錫有名第山詩員山在龍溪縣西南十里前後望之分十二面頂有石池又有琵琶坂今名大仙巖天寶山在龍溪縣西北三十里五峯峭立周百餘里郡之望山也宋大中祥符中嘗産明珠