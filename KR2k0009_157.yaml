陵人嘉靖中知長泰縣值倭亂廷宣豫修城垣以備之踰年冦至率諸生王得麟等督民兵防守城賴以全龔有成嘉定人嘉靖中知詔安縣值倭發土冦乘縣有陷江虛懸米一千六百餘石民苦賠纍鳴謙曰激水之下必有洄洑之所才生泥泊乃率縣丞躬詣築田按田之廣狹受懸糧之多寡得六千四百餘畝又察諸詭沒者令歸户以輔懸糧士民勒碑頌之汪康謡休寧人萬厯中知漳州府有負重資販洋過逆風回舟者七十餘人時寨帥利其有誣為海寇將盡殲之康謡為剖晰矜全給還原金漳俗生女不舉康謡嚴諭禁止遇重獄虛心推鞫夜分不寐多所矜活以忤璫罷崇禎間起為福寧道朱廷益嘉興人萬厯中知漳浦縣以文學飾吏治先是議召商行鹽前令房寰力爭得罷至是復欲籍鹽船出港行榷廷益亟上房前牘事乃寢歲飢發庫金募飢民修馬道全活萬計當事韙之檄通省為式陳思謨河源人萬厯中龍溪主簿布衣疏食以治行升本縣尹嘗執經相講勸廨有産芝九莖之瑞尹瑾東莞人萬厯間為漳州府推官治獄多所平反嘗命家人於署種蔬自給政暇集諸生教以行誼民名其坊曰甘棠坊閔夢得烏程人萬厯間知漳州府寬平為政嘗均僧租以給民民立祠祀之施邦曜餘姚人天啓中知漳州府明爽廉幹盡知屬縣姦盜主名每發輒得闔郡驚為神盜劉香李魁竒橫行海上邦矅縶香母誘之香就擒魁竒請撫邦曜曰若然又為閩封殖一蠧也言於巡撫鄒維連卒討平之劉斯南昌人天啓中知海澄縣在任六年豪強屏迹捍遏紅夷繕縣城及學宫港口二城悉易以石并築陴水裔置銃炮待敵後人銃城炮臺實祖其制蔡以藩泉州人崇禎時為海澄營把總視師三日賊入寇與戰援絶而死知府施邦曜祠而祀之後又有同安吳兆燫亦官把總以破賊擢守備崇禎五年賊寇福滸亦戰死彭琯永州人崇禎中為漳州府推官古貌古心時稱兩古推官嘗署府事吏以羡金進曰此例也琯曰今日革之則不為例矣終却之本朝許國楠咸陽人順治初知漳浦縣修身潔已一介不取設計擒捕山冦浦人賴焉楊學臯謀陷城變出叵測國楠赴井死傅永吉漢軍鑲紅旗人順治中知長泰縣海寇圍城率驍勇力戰殪其渠永吉方射賊時中炮洞腹死城賴以全甘體垣奉天人順治中知海澄縣參將郝文興叛降賊攻陷海澄欲汙以偽命不受縛而沉諸海邑人建祠祀之王顯謨慈溪人漳州府同知攝平和縣事順治九年鄭寇攻平和顯謨率士民固守力屈城陷賊欲降之顯謨罵不已賊怒埋其身而露其首數日死歐陽明憲宿州人順治中知詔安縣平環沙寇蔡四踞烏山流劫遠近明憲定計搜捕脫囚縶男婦百餘人搗其穴葺學宫課諸生邑人銘德至今稱賢令者曰猶見歐陽也王三薦湖廣人康熙二年授漳州府推官性寬厚不事擊斷臬司責以舉劾三薦曰民困於下官疲於上推官不忍為察察之行卒於官士民惜之白拱薇沔陽人康熙六年知南靖縣弭水患均徭賦剔姦蠧除積弊康熙五十二年祀名宦祠傅宏基金華人康熙中漳州城守逰擊分防長泰縣海冦圍城宏基嬰城固守援絶城陷𬒳執不屈死陳汝咸鄞縣人康熙三十五年知漳浦縣均賦役革弊便民興學校建南溟書院并四門義學每朔望身往會講邑遇水災設法拯之全活者以千數士民愛戴在浦十三年改調南靖民環擁不得行夜半單騎啓北門而去旋行取刑部主事升大理寺少鄉曹家甲新建人康熙四十一年知龍溪縣除賦稅包納之弊催科不用吏役復為減耗之半俗多停柩不葬購北廂江東日照巖義塜三所以掩暴骸去之日民若失慈父攀轅數十里子繩柱為福建按察使進布政使復以厚德聞於官申景雲吳縣人雍正十三年知龍溪縣時有饋以盆蘭者發泥視之乃金也卻不受卒於官邑人士賻之乃得歸李芬漢軍正藍旗人乾隆三年知龍溪縣五年再任值歲歉平糶以蘇飢民開濬城濠使水不壅遏尤長於摘發猾吏無敢詆諆者人物唐周匡物字幾本龍溪人元和十一年進士名譽蚤著嘗賦軒轅古鏡歌王播見而異之御試學殖賦鶯出谷詩為時傳誦官至高州刺史即人舉進士自匡物始兄匡業亦登第為鄱陽令與匡物齊名潘存實字鎮之漳浦人與龍溪周匡物相友善恃稱周潘元和十三年試禮耕情田賦玉聲如樂詩登第厯官户部侍郎赫連韜漳浦人會昌咸通間與莆田陳黯並為布衣祭酒黃滔稱其有不羈之才而自坎於命同時有莆田王肱蕭樞林皓福州陳蔇陳發詹雄與黯韜齊名稱入賢謝翛龍溪人清心藻思迥拔流俗當僖宗西幸恥於事逆晦迹窮巖中與弟修著書自適至光啓回鑾乃出登第後人以其所居之山為文圃山又五季分裂主簿洪文用不為時屈宋熙寧間有石蕡者寧華甫以世胃薄遊鯁論忤權貴浩然而歸俱隱於此所著詩文皆以文圃名集數百年間後先相望清風照世鄉人楊志作三賢堂以祀之宋蔡瑗字希蘧龍溪人嘉祐進士厯典五郡纍官至朝請大夫徽宗時上封事言商三宗寅畏周文王無逸為萬世法帝嘉納之著有鵝城集及古今名賢録行世謝伯宜字希聖龍溪人熙寧進士知長興縣有惠政開水利蝗不入境厯官尚書都官郎秩滿家居疏通九十九坑之水築海成田由是八九都皆成沃土邑人祀之吳與字可權漳浦人元豐進士纍官通判潮州故人張天覺當國或諷之使見與曰平生與天覺語皆忠義反呈身千進乎卒不往家藏書二萬卷鄭樵稱海內藏書四家與其一也鄭柟字嘉樹龍溪人初立功西夏厯官修武郎靖康初金人圍都城柟為四門都巡檢力戰死劉光世上其事補其子綸承信郎高登字彥先漳浦人少孤力學宣和中為太學生金人犯京師登與陳東等上書乞斬六賊紹興中上疏萬言及時議六篇秦檜恐其譏巳編管營州聞朝廷行事小失則顰蹙不樂大失則慟哭隨之臨卒所言皆天下大計登事母至孝其學以慎獨為本其所設施治獄賑飢興學除暴咸有條理著家論忠辨等篇有東溪集行世後朱子為守奏乞褒録贈承務郎顔師魯字幾聖龍溪人紹興進士陳俊卿器重之為御史遇事盡言無所阿撓為國子祭酒學行素孚規約率以身先除禮部侍郎一時典禮多師魯裁定晉吏部尚書師魯孝友天至嘗曰窮達自有定分枉道希世徒喪所守故其大節確如金石進寶文間學士卒元泰定二年追諡定肅林宗臣字實夫龍溪人受業高登之門登乾道進士官主簿貽書執政罷本州鬻鹽素有藻鑒見陳淳謂曰習科舉之文非聖賢大業授以近思録淳卒為儒宗王遇字子合龍溪人乾道進士少受業於張栻吕祖謙之門與廖德明黃幹陳淳友善守毗陵歲旱講求荒政民被實惠厯官戶部郎中所著有論孟講義兩漢博議學者稱東湖先生孫昭先字延父龍溪人淳熙進士嘉泰𥘉除司農寺簿應詔陳闕失上疏言五事遷寺丞出知衢州嘉定中除吏部郎入對言朝綱未清邦用未節士氣未振民病未蘇四事官終大府少卿子叔謹厯知潮州有賢聲陳淳字安卿龍溪人朱子來守其鄉淳請受教朱子數語人以南來吾道喜得陳淳性至孝母病亟號泣於天乞以身代弟妹未有室家者皆婚嫁之葬宗族之喪無歸者居鄉不沽名恬然退守而憂時論事感慨動人嘗歎張陸王學問無源全用禪家宗旨反託聖門以自標榜遂發明吾道之體統師友之淵源用功之節目讀書之次序為四章以示學者以特奏恩授迪功郎安溪主簿未上而殁著有語孟學庸口義等書學者稱北溪先生黃子信長泰人嘉定四年特奏名以文學行誼為學者師調新會場鹽官清介不阿賦詩自娛所著有散翁集黃學臯字習之龍溪人博通經史尤長於詩書春秋朱子守漳學臯與同邑宋聞禮俱以稚年講論嘉定十六年登第終泉州察進時同郡朱飛卿亦受業朱子大全集中載其問答甚多石洪慶施允夀李唐咨林易簡並為朱子所稱延至學宫為諸生楷式陳夢立名植以字行漳浦人淳祐進士督嶺南兵馬帝昺航海植以舟師應援馳檄諸蠻圖立宋後聞張世傑覆舟變姓名匿九侯山臨終命葬海濱曰吾死猶可望崖山也弟格為監薄帝昺亡死之元林廣發字明卿龍溪人厯汀漳屯田萬户府經厯屢有差遣不及理府事兵民請諸分省曰願還林君活我邊人有三溪集傳世子弼明洪武中知登州民感其化所著有梅雪齋文集等書蕭景茂龍溪人性剛直孝友至元四年南勝縣民李知甫作亂掠龍溪景茂與兄佑集鄉丁拒之戰敗𬒳執賊脅使從已景茂罵曰我生為大元民死作隔洲鬼豈從汝為逆耶隔洲其所居里也賊臠其肉決其口至耳傍景茂罵不絶聲而死朝廷裦表之王初應長泰人至大四年從父義士樵劉嶺山有虎出叢棘中搏義士傷右肩初應赴救抽鐮刀刺虎鼻殺之義士得生又同縣施合德父真祐出耘為虎扼於田合德與從弟發仔持斧前殺虎父得生並旌其門明胡宗華龍溪人隱居武林赤石巖潛心理學自號草澗居士洪武𥘉以明經薦為本府訓導講説經籍為諸生法著草澗集六卷子宜衡承樂中舉賢良春同為教授俱篤學好修郡人稱三胡先生陳汶輝字耿光詔安人洪武初薦授禮科給事中帝頗好釋氏教汶輝疏言古帝王以來未有縉紳緇流雜居同事可相濟也帝不聽汶輝纍官大理少卿數言得失年九十餘最後忤旨投金水橋下死劉宗道名駟以字行龍溪人洪武中以秀才𬒳徵對策第一舉德行特異復居首拜都御史詔求直言上格君心澤民物二十事並見嘉納自是每侍食華蓋殿多所譏切為人所搆徙南詔著愛禮集十卷鄭人稱愛禮先生周宗起漳浦人洪武進士任寺丞燕兵入父子俱投水死李貞南靖人永樂乙未進士第二授翰林院編修與修五經四書大全後以不肯修佛書貶高州府教授卒唐泰字師廓長泰人通五經尤邃於易登永樂進士知祁州以文學辟召御試稱旨欲大用之以親老乞歸侍養四方受業者日衆隨才誨誘皆有成就著有思誠齋銘學者稱東里先生謝連字重器龍溪人宣德丁未進士第三纍遷侍講上治安䇿十五事中言王振不可用于謙胡濙王文可託後厯南京户部侍郎卒周宣字正舉龍溪人正銃進士授戶部主事出為潮州知府時潮冦竊發宣入境約日招降賊懷猶豫省臣欲乘勢盡戮宣謂脅從罔治全活以數萬計潮地悉平遷太僕寺卿所著有易齋稿潘榮字尊用龍溪人正統進士除吏科給事中景泰𥘉疏論停起復抑奔競數事帝納之數進讜言終南京户部尚書榮恬淡謹厚服官數十年奉職無過卒贈大子少保林雍字萬容龍溪人景泰進士授行人成化初上疏勸修德格天親賢講學請進周程朱子於顔曾思孟之後不報厯駕部郎中乞歸修藍田鄉約與鄉人規勸其學始終本末有序有要學者稱為蒙巷先生陳真晟字晦德改字剩夫漳浦人務為聖賢踐履之學嘗曰大學誠意乃鐵門關主一二字乃玉錀匙也天順間詣闕上程朱正學纂要不報家居作正教正考會通各有條例可據而行學者稱布衣先生著有布衣藏稿林同字進卿龍溪人天順進士為戶部郎中撮錢榖樞要作指南録厯官廣東左布政使巡按王哲奏為亷能第一沈源字澄之海澄人天順進士為南京御史因天變陳修德弭災十事皆切時政巡視上江諸勳貴不便為所中貶盧氏知縣均徭清訟政教大行魏富字仲禮龍溪人成化進士授御史巡按廣東時林蠻洞蛋為厲富廉不法吏置于理蠻蛋皆隸編户遷浙江副使明慎庶獄賑濟飢氏皆有實政擢撫順天持憲廉明無敢干者正德初遷刑部右侍郎致仕卒陳昂南靖人成化舉人授太常簿明飭禮樂考究律吕時宫庭慶賀雜用優伶昂奏聖誕之辰當備百順以事至尊而養其中和奈何用侏儒雜劇帝嘉之遷太僕丞旋升少卿著有法夔遺論洪異字大同龍溪人宏治舉人知崇德縣擒江淮劇盜開天長河溉田萬餘頃擢御史巡按廣東檄平海寇升廣西參議歸林魁字廷元龍溪人宏治進士為户部郎中永夀伯朱德見幸武宗欲廢太平倉賜之魁力諌西僧大乘法王奪民田疏其不法厯廣東參政歸著有白石稿歸田録林祺字子祥龍溪人母卒哀毁骨立足不踰户嘗輯續朱子伊洛淵源録考亭麗澤録古今指掌録戴時宗字宗道長泰人正德進士官吏部主事武宗南巡疏諌忤旨罰跪受杖厯文選郎中塞幸門清選法出橅鄖襄發粟賑濟全活二十餘萬人奏薛侃獄開釋株連甚衆入為左僉都御史歸蔡烈字文繼龍溪人受學於晉江蔡清及莆田陳茂烈隱居鶴鳴山之白雲洞嘉靖間詔舉遺逸以母老辭所著有孝經定本大學格物致知傳道南録朱子晚年定論大儒粹言蔡文字孚仲龍溪人嘉靖進士選庶吉士厯廣西參議除柳州劇盜及橫暴土酋纍官至貴州巡撫平都勻麻哈大華凡三奏捷以母喪歸卒盧岐嶷字希稷長泰人嘉靖進士為兵部郎條土平侯二䇿出為江西僉事賊冦臨江親與接戰斬獲數千級平之轉雲南參議以平鳳繼祖功擢貴州按察使蔡應科字思成龍溪人隆慶進士纍官右副都御史巡撫廣西軍民畏威溪洞蠻猺皆讋服屢遷南京左都御史時中朝朋黨既興是非淆亂應科以為憂言禍將貽之國卒于官唐堯欽字寅可長泰人隆慶進士厯官刑科都給事中帝給鄭貴妃祖鄭福墳價五千兩堯欽上疏言妃祖無與葬例貴戚肅然司禮監張鯨怙權黷貨事發帝誅遣其黨特宥鯨堯欽抗疏語多觸忌後官南京太㒒寺卿歸卒賜祭葬鄭懷魁字輅思龍溪人萬厯進士為户部郎管北新大軍二廨宿弊一清上供大璫索珠貝晴緑急懷魁抗疏得減十之三後為處州知府聽斷甚簡民稱半餐太守著有葵圃集鄭鼎字爾調龍溪人萬厯舉人為貴州廣順知州土酋安邦彥反罵賊不屈死僕從死者六人贈光祿寺卿有司建祠祀之馬鳴起字伯龍龍溪人萬厯進士為御史時保母客氏比魏璫權傾中外鳴起抗言六不便帝怒杖一百葉向高力爭之得不死崇禎中起官厯右都御史晉吏部尚書命下卒諡忠簡林釬字實甫龍溪人萬厯丙辰進士第三纍官祭酒一日國子生請立魏忠賢像釬斥之因稱病去崇禎𥘉復官陳用人理財靖冦安邊四䇿晉東閣大學士卒於官諡文穆張燮字紹和龍溪人萬厯舉人嗜學有文名崇禎中巡按以理學名儒薦有詔徴用不就所著詩文及他編輯凡數百卷蔡時鼎字台甫漳浦人萬厯進士為御史遇事敢言巡鹽兩淮疏列惠商裕課十事捐其羡為開河費置屬邑學田順天鄉試不售者造為飛語褫奪主考時鼎力爭忤旨謫典史後起吏部主事尋進南京禮部郎中卒官貧不具含殮士大夫賻而治其喪顔容暄字孚儒漳浦人萬厯進士任鳳陽知府崇禎中賊犯鳳陽容暄被執大罵賊杖殺之血浸石階宛如其像滌之不滅闔家俱從死事聞贈侍郎諡忠惠周起元字仲先海澄人萬厯進士巡按陜西風采甚著卒以東林故出為廣西參議天啓中擢撫蘇松劾織造中官李實貪恣不法數事魏忠賢銜之建起元斃獄中崇禎𥘉贈兵部侍郎諡忠愍特祠祀之林秉漢字伯昭長泰人萬厯進士授御史楚假王議起郭正域力請行勘首輔沈一貫庇王計逐正域秉漢亦請詳勘且言王既非假何憚於勘遂忤一貫貶貴州按察司檢校天啓中贈太僕少卿張佐治字思謨平和人萬厯進士厯寧波知府雪孀婦王氏冤獄捕殺人棄尸之盜人稱為神耀天津兵備道闢屯田數萬頃以勞卒於官林曰瑞字浴元詔安人萬厯進士厯官右僉都御史巡撫甘肅李自成陷甘州城罵賊被磔贈兵部尚書本朝乾隆四十一年賜諡忠烈陳璸字賓王漳浦人天啓進士崇禎十年為袁州府推官拒楚賊有功屢遷湖廣參議討平八柝賊十六年張獻忠陷長沙圍參政周鳳岐於澧州璸督兵往救軍敗被執欲降之奮罵不屈斷手剖肝而死事間贈都御史諡忠貞一年本朝乾隆四十賜諡忠烈陳士竒字平人漳浦人天啓進士厯官右僉都御史巡撫四川崇禎十六年候代將行聞京師告變留駐重慶遣將擊張獻忠援兵不至或勸公巳謝事宜去士竒不可賊抵城下擊以滚炮賊死無數後賊穴地轟城城陷士竒被執大罵賊將殺之忽雷雨晦冥咫尺不見久乃睛霽士竒罵不絶口而死贈兵部尚書本朝乾隆四十一年賜諡忠烈何楷字元子漳浦人生有異質讀書過目不忘天啓乙丑成進士值魏忠賢亂政不謁選而歸建紫芝書院講學其中崇禎時授給事中鳳陽陷疏劾撫按罪末刺輔臣溫體仁王應熊以訟獄繁興列上八議言最詳悉楊嗣昌奪情與黃道周等劾之調南京國子監丞福王時擢户部右侍郎唐王用為户部尚書以忤鄭芝龍請告歸卒楷博綜羣書邃於經學所著周易訂詁詩經世本春秋繹學者傳之黃道周字幼平漳浦人天啓進士授編修崇禎𥘉進中允疏陳用人行政之失刺大學士周延儒溫體仁斥為民九年復故官進右諭德以文章風節高天下嚴冷方剛不諧流俗公卿多畏而忌之所建白未嘗得一俞旨顧言不已以劾楊嗣昌奪情削籍謫戌廣西唐王時督師至婺源遇大兵被執死於金陵道周學貫古今精天文皇極諸書所著易象正三易洞璣及太函經用以推驗治亂百不失一所至學者雲集銅山有石室道周坐卧其中故稱石卿海澄人崇禎間以貢任山西理問署遼州事流冦至一韓出家資募士以守援絶城陷率家兵巷戰死一年本朝乾隆四十賜諡烈愍王興字電輝漳州人明季避地廣州順德之文村團練丁壯以恩信得衆心桂王入廣州興以功纍拜都督晉虎賁將軍拒守纍年大兵堅壁困之食且盡興妻率侍妾等十五人入內自經十五人分兩列從死興具冠服出堂上拜手解十六人尸置火藥上遂自焚本朝乾隆四十一年賜諡烈愍本朝朱王造字矯士平和人順治三年以貢任永寧州吳三桂亂王造義不從賊被繫死獄中黃梧字君宣平和人順治初以海澄來歸封一等公爵世襲康熙中耿逆變作梧病中投𬒮而起癰口迸裂遂卒贈太保諡忠恪子芳度襲爵守漳城叛將吳淑等開門降賊投井死賊臠解之贈王爵諡忠勇祀昭忠祠芳度妻李氏罵賊自經從弟芳名守北門被執不屈死伯父樞弟芳聲芳祐男女三十餘人俱遇害從弟芳世承襲公爵兼福建水師提督後平漳寇以疾卒於軍贈少保諡忠襄時與方度同死者總兵黃翼遊擊鄭宗渙及戴鏻陳謙張濟黃香蔡隆吳友朱武陳驥等俱豫贈恤同邑人賴升從梧攻復閩安授參將後守海澄被圍抗節死詔恤其家蔡而烜字邦鄂漳浦人順治戊戌進士知桐柏縣革陋規除冗投善決疑獄妻林氐教婦女治績紝民歌曰蔡公夫婦杜母召父致仕歸老幼遮道送之蔡而烷字邦璧而烜弟順治壬辰進士授東昌府推官多所平反臺使薦之有明如秋水肅若秋霜之語後謝病歸戴璣字利衡長泰人順治已丑進士厯官廣西參議分守柳州唐應元之亂親斬渠魁猺獞畏服以裁缺歸康熙十三年耿逆結海寇圍漳州璣出資招鄉勇捍禦賊遁去十七年長泰失守全家𬒳掠賊餌以官不屈絶粒死唐朝彝字偕藻漳浦人康熙丁未進士選庶吉士授御史疏請嚴禁官吏侵漁害民及上司差役往來濫派民夫折銀供應之弊厯官宗人府府丞乞歸通籍三十年不能營一室數椽自蔽處之怡然所著有先後天卦圖説祀鄉賢祠黃相龍溪人康熙十三年任廣東副將討高明壠泔賊被執不屈死事聞贈都督僉事廕其子歐陽凱漳浦人康熙六十年為臺灣鎮總兵逆匪朱一貴倡亂凱率兵剿捕賊黨數萬圍之於春牛埔力戰中鎗墜馬賊割其首去事聞贈太子少保祀昭忠祠藍廷珍字荆璞漳浦人厯官南澳鎮總兵康熙六十年臺灣朱一貴倡亂廷珍偕提督施世驃率師逼鹿耳門拔之乘勝取安平鎮賊衆尚數十萬復率精鋭掩擊連敗之臺灣平雍正元年擢福建水師提督卒贈太子少保諡襄毅孫元枚乾隆五十二年以福建水師提督授參贊統兵會剿林爽文卒於軍贈太子太保諡襄毅藍鼎元字玉霖廷珍族弟以拔貢隨征臺灣當羽檄交馳裁答如流決勝擒賊多出其計著平臺紀略東征記等書以薦入都上奏略五千言授普寧令所至多善政仕至廣州知府許雲海澄人康熙六十年為臺灣水師副將朱一貴攻郡城雲率子方度赴春牛埔援總兵歐陽凱至則鎮兵俱陷雲兵寡被圍衝􅊳血戰所向披靡次日賊大至雲矢窮炮盡重創遍體乃命其子方度曰我分當捐軀於此汝速出將安平鹿耳門各炮位密行封釘無卑賊用方度出雲左臂被賊斫斷猶手刃數人以殁賜祭葬祀昭忠祠同時陳亡者遊擊遊崇功被執不屈遇害者把總李茂吉均漳浦人蔡世遠字聞之漳浦人康熙已丑進士粹德高文並為時推重嘗主講福州鼇峯書院士習以端由編修厯官禮部左侍郎雍正元年入直上書房居官勤於其職作文以昌黎為宗嘗言惟理足可以載道氣盛可以達辭著有二希堂集御賜序以榮之卒贈尚書諡文勤乾隆四年祀鄉賢祠六十年加贈太傅次子長澐官兵部右侍郎莊亨陽字元仲南靖人康熙戊戌進士授灘縣令乾隆元年以薦授國子助教厯官徐州知府值水災亨陽相川澤詢耆民請開上遊水以泄異漲兩遇大荒勤於賑事擢淮海道海州有鹽河蓄水通商運故障塞海口雖異漲非遍告大府監司不能開亨陽請遇水漲先開而後報聞民免沈溺所著有河防算法書秋水堂集行世蔡新字次明世遠族子乾隆丙辰進士授編修入直上書房纍遷工部侍郎調刑部以母老歸養家居命為總師傅辭乞留養厯官吏禮兵工部尚書文華殿大學士新少孤篤於內行人品端正學問深醇在內廷四十一年恪共奉職乾隆五十年以年近八旬致仕歸加太子太師上親製詩章以寵其行有八閩鍾碩彥四輔仰英賢之句嘉慶四年卒於家贈太傅諡文恭八年祀鄉賢祠林國良海澄人由世職纍官廣東左翼鎮總兵嘉慶十三年六月追剿盜匪烏石二於了洲洋面力戰死事聞賜祭葬諡果壯祀昭忠祠流寓宋劉子羽崇安人紹興八年御史常同論子羽十罪上批出白州安置趙鼎曰上謂章疏中論及結吳玠事今方倚玠恐不自安同疏再上以散官安置漳州趙鼎間喜人紹興中為相謫官居漳州嶽震飛子飛被誣震謫嶺南後移於漳向士璧常州人貿似道疾其解漳州圍之功諷御史罷之出漳州安置明豐熙鄞縣人嘉靖初為翰林學士興獻王尊稱禮定熙疏諌不得命伏哭左順門遂下詔獄掠治復杖之闕廷遣戌鎮海衛屢更大赦不原熙處之怙然寓居雲洞日以讀書為事閲十有三年竟卒於戍所邵經邦仁和人嘉靖中以日食建言謫戍鎮海與同戍豐熙陳九川時相討論居三十七年卒李材豐城人為都御史坐事戍鎮海一時從逰者衆稱為見羅先生列女宋陳氏女龍溪人年十五父病禱神剔肝以進父食之愈慶厯間有司表其居曰旌孝坊吳與母王氏漳浦人適吳登早寡撫子與成立與為懷安令迎母居官舍母日治絲枲與請其少休母曰吾少而治之如吾兒治公事之外更復讀書何間然也數戒與以事君臨民大節令其勤公潔已移孝作忠無貽母羞與所至有聲母有力焉嶽氏飛女許配漳浦高登第四子飛被收女方幼抱銀瓶赴井死謝某妻林氏龍溪人年十九適謝踰年而寡父母欲奪而嫁之林誓不從為夫立後守節六十餘年蘇宋傑妻王氏龍溪人年二十一而寡時已有娠父母欲奪其志王指腹誓曰生男守男生女守女父母怒絶其往來既生男孀居八十五歲終子孫多貴顯元陳端才妻蔡氏名三玉龍溪人盜起漳州父廣瑞與端才各竄去三玉獨偕夫妹出避神祠中盜入斫夫妹見三玉美不忍傷驅納舟中行至柳營江迫妻之三玉佯許諾因起更衣自投