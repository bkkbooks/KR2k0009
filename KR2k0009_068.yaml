劇居民孳夥而太平久不知戰介然居屯不三日賊巳渡河士聞鉦鼓聲皆褫氣不能授甲凡旬六日城陷介然死之魯炅幽州薊人天寶末安禄山反旻為山南節度使保南陽潼關失守城中食盡斗米五十千一鼠四百餓者相枕藉𬒳圍凡一年晝夜戰守卒無救至德二載乃率衆宇圍走襄陽田承嗣尾擊旻殊死戰二日斬獲甚衆賊引去拜御史大夫襄鄧十州節度使張鎬博州人肅宋時以同平章事兼河南節度使都統淮南諸軍事賊圍宋州張巡告急鎬倍道進檄濠州刺史閭邱曉趨救之曉逗畱不進比鎬至而巡已陷鎬怒杖殺曉帝還京師封南陽郡公詔以本軍鎮汴州捕平殘宼李光弼柳城人肅宋時為河北節度使與九節度兵圍安慶緒於相州大戰鄴西敗之旣而史思明來援光弼拒賊戰尤力進都督府知諸道節度行營事未幾為天下兵馬副元帥會汴滑節度使許叔冀戰不利降賊思明乘勝西嚮光弼悉軍據河陽部曲重堅賊憚不敢犯屯白馬寺築城以守巳而與戰中潬大破逆黨賊又合衆攻北城光弼登陴望曰披軍雖鋭然方障而囂不足虞也乃督將出戰自麾旗者三諸軍爭奮賊衆奔敗斬萬餘級俘八千人以功進臨淮郡王令狐彰富平人肅宗時拜滑亳魏博節度使始滑當宼衝城邑墟榛彰躬訓吏下檢軍力農法令嚴無敢犯者田疇大闢庫委豐餘歳時貢賦如期田神功南宫人肅宋時為河南節度汴宋八州觀察使初賊圍宋州急李光弼奏遣神功往救賊解去又破法子營攻敬釭降之旣寢疾宋之將吏為祈禱報恩後力疾入朝卒代宗為撤樂贈司徒李勉高祖子鄭王元懿曹孫代宗時為汴宋節度使時汴將李靈耀反魏將田悦以兵來叩汴而屯勉與李忠臣馬燧合討之戰於匡城賊潰悦走河北靈耀奔韋城勉擒縛以獻斬闕下徳宗立詔勉為汴宋滑亳河陽等道都統劉晏曹州南華人代宗時領東都河南江淮轉運租庸鹽鐵常平使時大兵後京師斗米千錢農挽穂以輸晏自按行由汴入河觀三門遺跡至河陰鞏洛見梁公堰通濟渠及李傑新隄盡得其利病嵗致粟四十萬斛關中雖水旱物不翔貴帝勞曰卿朕酇侯也張延賞猗氏人大厯初除河南尹諸道營田副使河洛當兵衝邑里墟榛延賞政簡約輕徭賦疏河渠築宫廟數年流庸歸附都闕完雄有詔褒美旣而畱守東都治行第一曲環安邑人建中時以討李希烈功授陳許節度使二州比為宼徵民苦剽鹵客他縣環勤身節用寛賦歛簡條教不三歳歸者繦係訓農治兵穀食豐衍轉檢校尚書左僕射李泌京兆人貞元初拜陜虢觀察使始鑿山開章道至三門以便饟漕以勞進檢校禮部尚書賈耽南皮人徳宗時遷義成節度使淄青李納陰蓄奸謀冀有以逞其兵數千自行營運道出滑或請館於外耽曰與我隣道奈何疑之使暴於野命館城中宴廡下納士皆心服耽每獵從數百騎往往入納境納大喜然畏其徳不敢謀李復貞元十年鄭滑軍亂以復為節度使下令墾營田以廩其軍而賦不及民衆悦劉昌裔陽曲人徳宗時從曲環軍環卒上官涚知復務呉少誠引兵薄城涚欲遁去昌裔曰受詔而守死其職也賊攻堞壞昌裔密造飛棚聯栅卽募突將千人鑿城以出撃賊走之涚遂領陳許節度使涚卒昌裔代之命境上吏不得犯蔡人有來犯者縛送使自治少誠慚亦禁境上暴掠裴度聞喜人元和十二年拜彰義節度使詩蔡屯郾城是時諸道兵悉中官督監度奏罷之使將得専制決事一戰氣倍未幾蔡平度以蔡牙卒侍帳下或謂反側未安不可去備度笑曰元惡巳擒蔡人卽吾人也衆感泣李光顏太原人元和九年討蔡擢為忠武節度使時諸鎮兵環蔡十餘屯各相顧不肯前獨光顔先敗賊以功進尚書左僕射都統韓宏素蹇縱陰挾賊以自重且惡光顔忠力乃飾名姝以遺之光顔曰戰士皆棄妻子冒白刃奈何獨以女色為樂天子於光顔恩厚誓不與賊同生指心曰雖死不貳因嗚咽泣下將卒皆感激流涕於是士氣益勵賊至力戰卻之蔡平加檢校司空烏重允張掖人憲宗時為河陽節度使王師討蔡詔重允以兵壓賊境割汝州隸其軍與李光顔相犄角大小百餘戰凢三年賊平遷檢校司空進封邠國公初蔡將李端降重允蔡人執其妻殺之妻呼曰善事烏僕射其得士心如此李愬洮州臨潭人憲宗時為唐鄧節度使討蔡獲賊將李祐愬待以客禮問襲蔡之謀謀旣定遣告裴度師期愬乃率中軍三千夜起㑹大雨雪天晦夜半至懸瓠城賊晏然無知者黎明雪止愬入駐元齊外宅火南門元濟請罪檻送京師其黨二萬皆降袁滋朝山人憲宗時為義成節度使滑用武地東有淄青北魏博滋嚴備而推誠信務在懷來李師道田李安畏服之居七年百姓立祠祝祭薛平龍門人憲宗時為鄭滑莭度使始河溢瓠子東泛滑距城纔二里所平按求故道出黎陽西南因命其佐裴宏泰往請魏博節度使田宏正宏正許之乃籍民田所當者易以他地疏道三十里以釃水悍還壖田七百頃於河南自是滑人無患吕元膺東平人憲宗時拜東都畱守東都有李師道畱邸兵與山棚謀竊發事覺元膺擒破之始盜發都人震恐守兵弱不足恃元膺坐城門指縱部分意氣閒舒人賴以安韓充匡城人穆宗時詔充以宣武節度使統義成兵討李㝏戰郭橋破之㑹李質斬㝏先入汴充馳至城下汴人望見充歡躍無復貳者始帝遣人問破賊期充對以一月可破方二旬卽克帝喜曰充料敵如神加檢校司空籍㝏所脅為兵省悉縱之責首亂者斥出境由是内外安堵汴人愛賴之李珏趙郡人宣宗時為河陽節度使罷横征宿逋百餘萬後召珏去鎮而府庫十僖於前五代周王朴東平人世宗征淮朴畱京師廣新城通道路壯偉宏闊天厯六年世宗遣朴行視汴口作斗門還過故相李榖第疾作仆於坐上舁歸而卒宋程能建隆中為京西轉運使請定諸州户為九等著於籍上四等量輕重給役餘五等免之後有貧富隨時升降詔加裁定李符内黄人乾徳中以京西諸州錢帛不登選知京西南面轉運事奏便宜百餘條命著為令者凡四十八事盧之翰祁州人太宗時遷太常博士為京西轉運副使建議導潩河合於淮達許州以便漕運陳靖莆田人太宗務興農事靖議兩京東西千里檢責荒地及逃民産籍之募耕作賜耕者室廬牛犂種食不足則給以庫錢别其課為十分責州縣勸課分殿最為三等視殿最行賞罰候數歳盡罷屯田悉用賦民然後量人授田為定以法下三司雜議以靖為京西勸農使真宗時徙河南轉運使極論前李氏横賦十七事詔罷其尤甚者劉綜虞鄉人咸平初為河北轉運副使河北承兵宼之後民户凋敝州縣官皆四方之人不習風俗且有懷土之思以是政事多因循不舉綜建議請自今並以河朔人充之冀其安居勤於職事從之再為河北轉運使時邊事煩急轉漕之任尤所倚辦綜繼領其職號為詳練李若谷豊人真宗時為京東轉運使會河決白馬調取芻揵同列盧士倫協三司意趣刻擾郡縣而若谷寛之陳堯叟閬中人真宗時權東京畱守每裁剸刑禁雖大辟亦止面取狀亟決遣之以故獄無繫囚揚告綿竹人除京西轉運副使屬部嵗饑所至發公廩又募富室出粟賑之陳希亮眉州人嘉祐閒為京西轉運使石塘河役兵叛震動汝洛閒希亮輕騎出按賊道遇希亮相與列訴道周希亮徐問其所苦命一老兵送之曰以付業縣聽吾命旣至曰汝以自首皆無罪然必有首謀者衆不敢隱乃斬元以徇流軍校一人餘悉遣赴役如𥘉韓宗彥雍邱人厯提點京西京東刑獄應天府失入平民死罪獄成未決通判孫世安辨正之獄吏當坐法尹劉沆欲宥之宗彥舉按其事沆復止之宗彥疏沆於朝抵吏罪王舉元真定人仁宗時為京東轉運使沙門島多流人守吏顧貨槖陰殺之舉元請立監以較賞罰自是全活者衆趙滋開封人仁宗時京西軍賊張海久未伏誅命滋都大提舉陜西京西路捉賊數月賊平富弼河南人皇祐中為京東安撫使河朔大水民流京東弼擇所部豐稔者五州勸民出粟得十五萬斛益以官廩隨所在貯之得公私廬舍十餘萬區散處其人以便薪水官吏自前資待缺寄居者皆給其禄使卽民所聚選老弱病瘠者廩之山林河泊之利有可資以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請他日得以次受賞於朝率五日輒遣人以酒肉糗飯勞之出於至誠人人為盡力流民死者為大冢葬之明年麥大熟流民各以逺近受糧而歸凡活五十餘萬人募為兵又萬餘人夏安期徳安人為京西轉運使盜起部中剽刼州縣光化軍戍卒相繼叛勢且相合安期督將吏捕斬殆盡鮮于侁閬州人神宗時徙京東西路轉運副使河決澶淵議欲弗塞侁言東南匯澤惟雨濼夏秋雨霪猶溢而害若縱大河注其中民為魚矣作議河書上之神宗嘉納後兩路合為一以侁為轉運使唐義問江陵人熙寕中移京西轉運判官時陜西大舉兵多亡卒所至成聚義問請令詣官自陳給劵續食人以為便張景憲河南人為京西東轉運使王逵居鄆專持吏短長景憲疏論其惡編置宿州余良肱分寕人提舉汴河司汴水澱淤流且緩執政舉狹河議良肱謂方冬水涸宜自京左浚治以及畿右三年可使水復行地中又議伐汴堤木以資狹河良肱言自泗至京千餘里江淮漕卒接踵暑行多病暍藉蔭以休又其根盤錯與堤為固伐之不便喬執中高郵人神宗時提點京西北路刑獄時河決廣武埽危甚相聚莫敢登執中不顧立其上衆隨之如蟻附不日埽威李周馮翊人神宗時除提點京西刑獄時方興水利或請釃湍河為六渠以益鉗盧陂水度用工八十萬周曰湍河原高委下捍以堤猶患決溢若又導之必致為害乃疏言其未便明年河溢鄧城幾沒始思其議范純粹呉縣人呉居厚為京東轉運使數獻羨賦哲宗立居厚敗命純粹以直龍圖閣往代之盡革其苛政時蘇軾自登州召還同建募役之議軾謂純粹講比事精詳呉擇仁永興人徽宗時為京畿都轉運使鄭州城惡受命更築之或讒於帝曰新城雜以沙土反不如故帝怒密遣人取塊城上絾以來令衛卒三投之堅緻如削鐵讒不能售程振樂平人徽宗時提舉京東西路學事請立廟於鄒祀孟子以公孫丑萬章樂正子等配食從之李綱邵武人宣和末為東京畱守金兵攻汴綱身自督戰募壯士縋城而下殺傷數千人金兵乃退求和綱議阨要害絶糧道以復畿北郡縣執政不許旣而言者謂綱喪師費帑於是罷謫高宗卽位詔以資政殿大學士領開封府事綱在長沙聞命率湖南勤王之師入援條陳時政凡百餘疏俱不能行宗澤義烏人靖康初除京城畱守兼開封尹乃渡河約諸將共議事宜以圖收復於京城四壁各置使以領招集之兵又據形勢立堅壁二十四所於城外沿河為連珠砦連結河東河北山水砦忠義民兵於是諸路人馬咸聽節制烏珠謀攻汴京澤戒諸將竭力保䕶河梁以俟大軍之集金兵聞之夜斷河梁遁去烏珠舊作兀术今改正孫昭逺眉山人建炎元年遷河南尹西京畱守西道都總管至洛收集散七得義兵萬餘人柵伊陽使民入保金兵來攻其下欲擁昭遠南還昭遠罵曰若等平日衣食縣官不以此時報國南去何為叛兵怒反擊昭遠遂遇害向子諲臨江人為京畿轉運副使兼發運副使建炎初康王次濟州子諲獻金帛錢穀以助軍費張邦昌僭位使其甥劉達賫手書來子諲焚之械繫違於獄復遣子請康王率諸將渡河劉汲眉州人建炎中為京西安撫使金兵急攻京西汲下令城中有才武願殺敵者聴畱餘從便得敢死士四百人助守禦金兵攻益力或請汲去不許城破死之李迨東平人紹興九年金人歸三京命迨為京畿都轉運使孟庾時為權東京畱守潛通北使遣察其隱微庾不能平訟於朝且使人告迨曰北兵至矣迨曰吾家食禄二百年首可斷滕不可屈也如果然吾將極罵以死告者悚然而去後追罷職庾遂以京師降金翟興伊陽人高宗時為京西北路安撫制置使兼招討叛賊楊進屯鳴皐山興擊敗於魯山縣西京平又王俊據汝州興引兵攻破之金兵攻河陽遣將邀擊俘獲甚衆劉豫將遷汴以興屯伊陽憚之遣人啗其將楊偉以利偉乗閒殺興攜首奔豫弟進驍勇善戰如興追楊偉於汝洛閒馬驚墜塹為賊所害岳飛湯陰人紹興十年為河南北諸路招討使所遣諸將相繼奏捷飛百以輕騎駐郾城兵勢甚鋭鳥珠合兵逼郾城飛大敗之累戰皆捷中原大振飛進軍朱仙鎮父老百姓輓車牽牛載􅟿􅾷以餽義兵頂盆焚香迎侯者充滿道路自燕以南金號令不行李植臨淮人金人敗盟朝廷將大舉以植漕運有才畧授京西河北路計度轉運使措畫有方廷議倚重金龎迪正安人大定𥘉遷南京路都轉運使以省事惜費安靜為政河南稱之李愈正平人明昌中為河南路提刑司上言隨路提刑司乞畱官一員餘分部巡按又言本司見置許州乞移置南京為便並從之憲臺廉察九路提刑司以愈為最璞蕯揆上京人章宗時為河南路統軍使陜西提刑司舉揆剛直明斷獄無滯冤禁戢家人百姓莫識其面積石洮二州舊宼皆遁商旅得通於是進官一階仍詔褒諭璞薩揆舊作僕散揆今改正胥鼎繁峙人貞祐中爲河東南路兵馬都總管擢宣撫使建言利害十三事若積軍儲修黄河選官讞獄簡將練卒鈔法版籍之類朝廷頗採用焉正大二年以平章政事行尚書省於衛州力􅔂赴鎮州郡來歸者甚泉鼎通達吏事有度量爲政鎮靜所在無賢不肖皆得其歡心南渡以來書生鎮方面者惟鼎一人耳元楊奂乾州奉天人太宗時授河南路徵收課税所長官兼廉訪使奂旣至招致一時名士與之議政事約束簡易按行境内親問監務月課幾何難易若何有以增額言者奂責之曰剥下欺上我不爲也卽減元額四之一公私便之時論以爲前此漕司所未有楊惟中宏州人憲宗初立河南經畧司於汴梁以惟中爲使屯田於唐鄧申裕嵩汝蔡息亳潁諸州初萬户劉福爲河南道總管貪鄙殘酷虐害遺民二十餘年惟中至召福聽約束福稱疾不至惟中設大梴於坐復召之使謂福曰汝不奉命吾以軍法從事福不得巳乃至惟中卽握大梃擊仆之數日福无河南大治趙璧懷仁人憲宗時爲河南經畧使先是劉萬户貪淫暴戾郡中嫁娶必先賂之得請而後行咸呼之爲翁其黨董主簿尢恃勢爲虐強取民女有色者三十餘人壁至按其罪立斬之盡還民女崔斌馬邑人至元六年僉河南行省事時調曹濮民丁屯田南陽斌議罷屯民以近地兵多者補之民以爲便又議給濱棣青滄鹽劵募民以米貿之仍增價和糴遠近輸販輻輳餽餉不勞而集有㫖籍河南四路兵二萬以益襄樊斌奏河南户少而調繁實不堪命請減其半從之瑚遜回回人至元十五年爲河南宣慰司同知羣盜憑依山澤刧奪行路官軍收捕失利瑚遜遣土豪持檄諭之未幾賊二人來歸瑚遜賜之冠巾令遍諭其黨數日後招集爲首者十輩來羅拜庭下顧瞻異常遜命吏籍其姓氏爲民畱之使侍左右夜則令卧户外時時飲食之吏皆懼甚而羣盜自是相繼款服瑚遜舊作忽辛今改正程思廉東勝州人哈達行省河南署爲都事時方規取襄樊使任轉餉築城置倉以受粟轉輸者與民爭門不時至思廉令行者異路粟至多露積一夕大雨思廉安卧不起省中召詰之思廉曰此去敵近中夜騷動衆必驚疑縱有溧濕不過軍中一日糧早聞者韙之至元中遷河北河南道按察副使道過彰徳聞兩河歳饑徴租益急欲止之有司謂法當上請思廉曰若然民已不堪命矣即移文罷徴後果得請二十年河北復大饑流民渡河求食朝廷遣使絶河止之思廉曰河南河北皆吾民也亟今縱之且曰雖得罪死不恨章上不之罪衛輝懷孟大水思廉臨視賬貸全活甚衆水及城不没者數版卽修隄防露宿督役水不為患衛人徳之哈達舊作哈丹今改正王忱寕晉人世祖時為河北河南道提刑按察副使忱以江南人鬻子北方名曰養子實為奴也乞禁之潁州朱喜嘗俘於兵旣自贖主家利其貲復欲以為奴又有誣息州汪青為奴殺而奪其妻子及田宅者獄久不決忱皆正之張庭珍臨潢全州人世祖時拜南京路總管兼開封尹有控鶴軍士十餘人縱横街陌庭珍至察其必為盜急捕之得寳玩器服子女滿室窮索其黨俱殺之河決灌太康溧溺千里庭珍括商人漁子船及縳本為筏載糗糧四出救之全活甚衆水入善利門庭珍親督夫運薪岀捍之不能立乃頺城為堰水旣退卽發民增外防百三十里人免水憂尚文保定人元貞二年授河北河南肅政廉訪使大徳元年河決蒲口臺檄令文防之文言蒲口己決千有餘步迅疾東行得河舊瀆行二百里至歸徳横堤之下復合正流或強湮遏上決下潰功不可成蒲口不塞便朝廷從之㑹河朔郡縣爭言塞之便帝復從之明年蒲口復決塞河之役無歳無之是後水北入復河故道竞如文言額森布哈蒙古人大徳八年平章河南行省河決落黎堤勢甚危督有司先士卒以備之汴以無患額森布哈舊作也先不花今改正王約正定人仁宗初拜河南行省右丞有詔更銅錢銀鈔法且令天下税盡收至大鈔約度河南歳用鈔七萬錠必致上供不給乃下諸州凡至大至元鈔相半衆以妨詔命為言約曰吾豈不知第歳終諸事不集責亦非輕丞相伯勒齊泰贊曰善遣使白中書省臣大悦遂遍行天下伯勒齊泰舊作卜憐吉合今改正阿勒哈雅蒙古人至治𥘉為河南行省平章政事有惠政汴人懷思之天厯元年復鎮汴省時當艱難之際阿勒哈雅高價糴粟以峙糧儲命近郡分治戎器閲士卒括馬民閒以備不虞先是文宗卽位之詔已播告天下而陜西奉靖安王起兵擊潼關掠閿鄉披靈寶盪陜西陜安放兵四劫汴人大恐阿勒哈雅親出行撫其民修城關以備衝突立四門以通往來戒卒伍以嚴守備出入怡然如平時衆賴以安巳而靖安王軍散去解嚴報捷河勒哈雅舊作阿里海牙今改正齊里克特穆爾蒙古人天厯二年為河南行省平章政事黄河清有司以為瑞請聞於朝齊里克特穆爾曰吾知為臣忠為子孝天下治百姓安為瑞餘何益於治歳大饑議賑之其屬以為必自縣上之府府上之省然後以聞齊里克持穆爾慨然曰民饑死者已衆欲拘以常格則往復累月民存無幾矣卽發倉廩賑之乃請專擅之罪文宗聞而嘉之齊里克特穆爾舊作徹里帖木兒今改正多爾濟蒙古人順帝至元六年遷河南行省左丞相先是河南范孟為亂以詿誤連繫者千百計多爾濟至知其冤欲直之平章納麟乃原問官執其說不從巳而納麟還言於朝謂多爾濟心狥漢人多爾濟亦不恤也多爾濟舊作朶兒只今改正賈魯高平人至正四年河決白茅堤又決金堤命魯行都水監魯循行河道考察地形往復數千里備得要害爲圖上進二䇿其一議修築北堤以制横潰則用功省其一議疏塞並舉挽河東行使復故道其功數倍㑹遷石司郎中議未及竟十一年命魯以工部尚書總治河防使四月鳩工至十一月諸埽隄皆成水土工畢河復故道歸暘汴梁人至正五年除僉河南廉訪司事行部西京以法繩趙王府官屬之貪暴者王三遣吏請不爲動宣寕縣有殺人者蔓引數十人一讞得其情盡釋之沁州民郭仲玉爲人所殺有司以富察山爾當之暘察其誣蹤跡得其殺人者山爾遂不死富察山爾舊作蒲察山皃今改正董摶霄磁州人至正十八年拜河南行省右丞甫拜命毛貴兵巳至而營壘猶未完諸將謂摶霄曰賊至當如何摶霄曰當以死報國耳因抜劒督兵以戰賊兵突至摶霄前捽而問曰汝爲誰摶霄曰我董右丞也衆刺殺之無血惟見白氣冲天是日其弟昂霄亦死之明郭英臨淮人洪武初以指揮僉事從大軍北定中原進河南都指揮使時河南新罹兵燹邑片蕭然盜賊充斥英至綏緝流亡申明約束境内大治陳貞華亭人洪武中為河南右參政時黄河決貞勞來有方民不失業盜發汝寕將窺汴貞以計離其黨困其首張子誠等於均山降之亂平帝嘉其功降璽書褒勞之李昌祺廬陵人宣徳初為河南左布政使繩豪猾去貪琖疏滯舉廢救災恤貧與右布政使蕭省身共為治政化大行憂歸詔以侍郎魏源代而是時河南大早廷臣請起復昌棋奪喪赴官撫恤甚至省身泰和人居河南二十年治行與昌祺等于謙錢塘人宣徳中以兵部侍郎巡撫河南河南歳苦河患厚築堤障之五里置亭亭有長以時督治植榆柳鑿井以蔭行旅而飲渴者民皆稱便六年疏言河南積榖數百萬計請於每歳三月令府州縣申報缺食下户隨分支給俟秋成償官而免其老疾及貧不能價者詔可自是儲峙充溢境内無水旱憂在官九載入朝中官王振惡之諷其私人劾謙繫獄河南吏民伏闕上書請畱者以千數乃赦謙以大理少卿復往巡撫㑹山陜流民來就食者二十餘萬謙以河南懷慶二府積栗賬之又令布政使年富安集其衆給牛種以耕流民皆得其所前後在任十九年政績大著河南民世祀之王來慈谿人正統中遷河南左布政使黄河溢且齧汴城築堤捍之改左副御史巡撫河南額森内犯督兵勤王渡河聞宼退乃還額森舊作也先今改正年富懷遠人正統中遷河南右布政使歳饑流民二十餘萬公肆剽敚巡撫于謙委富撫之皆定土木之敗邊境道阻富奉檄轉餉無後期者王恕三原人成化初為河南左布政使南陽荆襄流民嘯聚為亂擢右副都御史撫治之恕與尚書白圭共平大盜劉通復討破其黨石龍嚴束所部無濫殺流民復業陳選臨海人成化六年以河南副使督學政汪直出巡撫臣以下皆拜謁選獨長揖直曰君何官曰提學副使曰大於都御史耶選曰提學何可比都御文業忝人師不敢自詘辱直氣懾好語遣之久之進按察使決遣輕繫數百人重囚多所平反囹圄為空治尚簡易獨於贓吏無所假然贓百金以上者坐六七鐶而止或問之答口奸人惜財亦惜命若盡挈所賂以貨要人卽法撓矣原傑陽城人成化時荆襄流民數十萬朝廷以為憂十二年命傑出撫傑宣布朝廷徳意令附籍乃於南陽增置南召桐柏二縣於汝州置伊陽縣擇隣境良吏以撫之流民得所四境亦皆帖然張瑄江浦人成化中巡撫河南薦按察使何喬新副使陳選人服其明河南軍糧先在元城交兑不便鈐制瑄乃置倉於彰徳水次軍民稱便值歳大饑瑄發廩賑濟設粥食饑者出官庫衣布給寒者全活數萬人何喬新廣昌人成化中遷河南按察使歳大饑故事賑貸迄秋止喬新曰止於秋謂秋成可仰也今秋可但已乎賑至明年麥熟乃止時方驅流民過當民竄山谷喬新躬往招之附籍者六萬餘户朱瑄鄞縣人成化時為左參議累遷右布政使撫輯流庸復業甚衆以河南地多平陸踰時不雨卽赤地千里因考求古蹟濬渠置牐藩府豪右兼并者悉為釐正水利大興河決張秋與都御史劉大夏悉心築塞黄陵岡口河患遂息舒清徳興人成化時為右參議黄河溢灌開封城同列多具舟自濟清獨率吏民防禦二日水降城卒無虞歳饑請輸漕米數十萬石賑之徐恪常熟人宏治初為河南巡撫悋素剛直所部多王府待法尤嚴因災傷奏寛民力多所蠲豁及移撫湖廣吏民罷市泣送者數千里不絶屬吏以羡金三千為贐悋揮去且自責曰吾不為人所信如此劉大夏華容人宏治六年河決張秋詔博選才臣往治王恕以大夏薦乃擢右副都御史以行大夏於孫家渡四府營疏上流以分水勢而築長堤捍之堤起胙城抵徐州亘三百六十里決口旣塞更修築黄陵岡水乃大治孝宗嘉之璽書褒美張鼐厯城人宏治初為河南僉事以協治黄陵岡功累遷至按察使鼐官河南久屢遭河患督治有方民為立祠龎泮天台人宏治時河南右布政使首革鎮守中官劉瑯及馬尚書家私役錢中㫖取洛陽壯丹疏奏罷之司禮中官李榮索古銅器鏡物泮曰物非土產而官取之民無以應則發及冢墓卒不予孫需徳興人宏治十五年巡撫河南時歳凶汴溢城且壞民懼需以平賈募民築堤堤成饑者亦濟中㫖取河南牡丹三百本需言不宜以耳目坃勞民力鎮守中官劉瑯爲民患需栽抑之瑯請曰公盍少縰繩墨使瑯得飲勺水需執不聽劉彼深州人河南副使有重獄岡列不能決者多推俊俊發伏鈎隱盡法乃止前後巡大梁河内所至弊絶及代去奸吏酌洒相慶彭澤蘭州人正徳時賊劉惠趙鐩等亂河南澤以右副都御史與咸寕伯仇鉞提督軍務討之陳便宜十一事務厚賞峻罰以激勸將吏鼔行薄賊大小數十戰違破之甫四月賊盡平秦金無錫人正徳初河南提學副使與前使邵寳齊名稱秦邵改右參政分守開封賊趙鐩剽掠河洛將犯封邱金率民兵偕參將宋振合擊於陳橋大破之李充嗣内江人正徳九年巡撫河南歳大祲謮發帑金移粟賑之不足則勸貸富室煑糜哺之踰月資遣還郷初鎮守中官廖堂假進貢名要求百端繼者以爲常充嗣極言其弊睢陽盜張鋭淅川盜王泰等相繼起皆應時討平楊志學徐州人正徳時爲河南左參政河北久不雨條上救荒十二事彰徳諸府兑運糧當徵者二十萬石志學不俟報下令停之驛傳舊以二户供一役民多破家志學令一大户佐以四中户民咸感悦何孟春郴州人正徳時爲河南參政廉公有威政績大著王以旂江寕人正徳中出按河南宸濠反鎮守太監劉璟倡議停鄉試以旂言河南去江西逺罷試無名乃止璟又言帝親征道且出汴牒取供頓銀四萬兩巡撫議予之以旂執不予陶諧㑹稽人嘉靖初爲河南管河副使命沿河植柳夾以葭葦有事采以爲埽民閒得無擾總理都御史請推行之諸道歳省費巨萬潘恩上海人嘉靖時巡撫河南徽王載埨貪虐與按臣共劾之伊王典楧驕横恩一切裁之河南素苦藩府自恩連制兩懌王民甚賴焉張永明烏程人嘉靖時巡撫河南伊王典楧恣横永明首發其罪後竟伏誅帝好祥瑞汝寕獲白鹿或請上之永明謝曰吾不能遺後世嗤卒不獻顧􅛁上元人嘉靖時河南副使與巡按御史論事不合封還其牒或尤之􅛁曰天子置按察司爲外臺寕令其枉法媚人耶信陽故有官租充監司私費􅛁獨不取時稱其介劉天和麻城人嘉靖中總理河道黄河南徙厯濟徐皆旁溢天和疏汴河自朱仙鎮至沛飛雲橋殺其下流疏山東七十二泉自鳧尼諸山達南旺河濬其上流役夫二萬不三月訖工故事南河八府歳役民治河不赴役者人各出銀天和因嵗饑請盡蠲旁河受役者課逺河未投者半之詔可王儀文安人嘉靖中巡按河南趙府輔國將軍祐掠數殺人招亡命劫敚積十餘年莫敢發儀偕巡撫呉山奏之奪爵禁錮顏鯨慈谿人嘉靖末以御史按河南伊王典楧結嚴嵩父于養礦盜為爪牙鯨密奏記徐階説諸大鐺絶其内援又盡捕王偵事飛騎託言防宼檄諸府分兵屯要害乃疏劾其罪帝震怒廢為庶人錮之高墻兩河人鼔舞稱慶鍾化民仁和人萬厯二十二年河南大饑化民以光禄丞兼河南道御史往賬荒政具舉旣竣繪圖以進尋以都御史撫河南討平南陽礦盜及夾河羣賊力諫礦使優民遍厯八府延父老問疾苦以勞瘁卒官士民相率請於朝詔賜祠曰忠惠程紹徳州人天啟中巡撫河南宗室居儀封者為盜窟紹列上其狀廢徙高墻臨漳民耕地得玉璽文曰受命於天旣夀永昌紹聞於朝言秦璽出適在臣疆欲遣官恭進闕庭跡涉貢媚且至尊所寶在徳不在璽方今名賢如鄒元標馮從吾等並王國禎祥珍寶不能汲至明庭徒獻符貢瑞臣竊羞之時中官魏忠賢方斥逐耆碩不悦命賚表官進之後忠賢勢日益張紹遂引疾歸范景文呉橋人崇禎二年巡撫河南練兵繕器爲保障計京師戒嚴帥所部八千人勤王餉皆自齎四方援兵多剽掠獨河南軍無所犯又以河南苦徭役力爲釐革慮代者更巳法上疏請有司實行一條鞭法徭役俱歸之官而令民稍助其費供應以市直平賈不立官價名帝令永著爲例呉光義涇縣人崇禎三年巡撫河南參劾藩宗除民害調兵助民夫築塞河決奬廉鋤強禦寇有方賊不敢犯本朝康熙十六年祀名宦蔡懋徳崑山人崇禎中遷河南右布政使時田荒榖貴吏日急催科賊流言先服者不輸租民日望其至懋徳亟檄州縣停征上疏自劾高名衡沂州人崇禎中巡按河南十四年李自成圍開封巡撫李仙風在河北名衡集衆堅守賊穴城將入守者投以火賊死無算始解去卽擢名衡撫河南自成復悉衆來名衡固守會楊文岳以援兵至賊解圍去祝萬齡咸寕人崇禎中遷河南副使監軍磁州輝縣之北有村曰水谷回賊竊據數十年萬齡合軍夾擊焚具巢三百餘賊遂平王漢掖縣人崇禎十五年巡按河南督諸將復開封追賊至朱仙鎮連戰皆捷擢右僉都御史撫河南總兵劉超反於永城漢聲言招撫與諸軍入城天忽雨賊乘而衝之遂遇害河南北士民聞之皆泣李乘雲高陽人崇禎十四年以僉事道分巡大梁行涖禹州李自成擁衆十餘萬薄南城乘雲率衆拒守城陷𬒳執罵不絶口賊支解之關永傑隴西人睢陳兵備道守陳州手刃賊𬒳執舉手指賊罵不絶口而死艾毓初米脂人分守汝南道南陽陷死於城門後守道王世綜亦𬒳賊執罵賊而死世綜達州人本朝張應祥奉天益州人仕明爲副將入本朝累遷汝南總兵官南陽數邊宼亂所在荒殘應祥修城郭築廬含設營房掩骼埋胔翦除叛賊王光泰等成惠甚著疆宇肅清呉景道漢軍正黄旗人順治二年由河南布政使遷巡撫駐節𣏌縣厯任十載招撫流民開墾荒蕪擒南陽大盗闢索等曹濮之亂委總兵高第綏輯歸徳秋毫不擾潛擒李化鯨餘黨加尚書歸許得功奉天開原衛人順治二年以左都督鎮汝南時軍壘初立諸多草創得功竭力經營什伍精嚴遂成巨鎮御下有紀民聞不知有兵金玉和遼束人順治元年以副都統署懷慶總兵事李自成黨掠河南犯濟源玉和領兵趨援至則城陷夜與賊戰遇害二等男爵世襲祀昭忠祠申朝紀漢軍鑲藍旗人順治元年以河北道駐懷慶李自成餘黨二萬餘來犯朝紀登城守禦晝夜不懈每女牆兵一民一戒勿譁譁者死賊周走呼曰城陷矣一人動朝紀手斬以狥守者益肅賊首於濠閒指揮朝紀以飛礮􅜔之賊黨悉驚竄後祀名宦亢得時崞縣人順治二年任巡撫號令嚴明吏民守法置學田延師造士文風蔚起塗廓奉天人順治四年分巡河北道副使為政一本至誠時山東賊劫武安一路廓率兵勦殺躬胃矢石遂遇害張存仁漢軍鑲藍旗人順治七年總督直隸河南山東三省時山東榆圍宼聚蔓延河南存仁剿撫有方寇賊屏跡百姓安堵樓希昊奉天人順治九年以參政分守南汝時賊黨呉加寛于七等煽亂希昊率葉令許鴻翔剿平之胡士梅錦州人順治十年為河南屯道闢荒地千餘里增課至二十七萬兩舉治行卓異李蔭祖漢軍正黄旗人順治十一年總督河南等三省疏請蠲賑安集流民劾管河道方大猷侵蝕工銀巨萬逮治以除民害後調任去卒祀名宦桑芸榆次人順治十二年以參政守南汝鋤暴恤良逮積蠧白福徳斃杖下歡頌載路十六年遷河南右布政使沈荃華亭人順治十三年為河南按察司副使分巡大梁時學宫多毁圮荃捐俸新之並修復聖賢祠墓頻年河夫柳束及軍需浩繁荃為申請禹鄭十餘州縣得減三分之一以憂去士民為建碑立祠于鵬舉金壇人順治十五年任睢陳兵巡道招集流亡給牛種墾田萬餘頃民獲其利張瑞徴萊陽人順治十六年任南汝道受事不數月平光商巨宼士民賴以安輯李昌祚漢陽人順治十六年任河北道參議除奸蠧禁私派築堌陽堤以禦河患濬廣濟渠以分泌水民賴其利徐化成奉天人順治十六年任河南左布政藩署自罹河患移駐雍邱康熙二年始歸省會化成捐俸更建民無所擾蔡含靈寕晉人康熙元年分巡睢陳道釐正賦役户口均平署臬篆熱審三百六十餘案多所平反以勞瘁卒官張九徴丹徒人康熙三年提學河南取士公明不受請託檄各郡邑修葺學官增設社學廣置書冊於庠序聽諸生就讀凡境内陵墓祠宇有關石教者並加葺治搜訪殉難名臣姓氏為表章之舉卓異史逸裘金壇人康熙七年提學河南考校公明所拔多單寒士教諸生以孝弟忠信為首務又檄郡縣有立行者申請旌以彰潛徳朱昌祚漢軍鑲白旗人總督河南等三省秉性忠耿端已率屬嚴飾將士兵民戢和佟鳳彩漢軍正藍旗人康熙十一年廵撫河南疏請修築河工盡出官僱不費民力又請罷協濟輓豆之役民甚徳之范周吳縣人康熙十一年任糧儲道節減漕項耗羡銀三萬餘兩以内升去任王永譽奉天人康熙十三年任提督時遣禁旅剿叛賊蔡禄于懷慶永譽由孟津渡河為犄角勢兵至擒之不煩血刃嚴戢部伍閭里晏然懷人徳之為生祠以祀郎永清奉天人康熙十三年任河南布政使䕶理撫篆題豁靈寶荒地宿逋又力請撥協楚米改解折色民便之石琳漢軍正白旗人康熙十三年任河南按察使禁旅南征駐牧於汴時當麥秋琳與統軍約令次於野不得入門里市琳坐其帳中四十餘日及去民得獲麥琳之力也王日藻華亭人康熙二十一年巡撫河南先任管河道素知中州民困以兑運為累乃抗疏請永改折色得報之日八郡若更生又恤堡夫樹堤柳人皆呼為王公新柳云蔣伊常熟人康熙二十四年提學河南嚴絶苞苴有暮夜投金者面唾之愧服而去學官及名賢祠墓多捐俸葺治以勞卒官士人皆為盡傷李國亮漢軍鑲黄旗人康熙三十五年由河南布政使擢任巡撫首務教化建修書院延名宿以訓課士子嚴飭武備禁除一切陋規河工夫役柳稍俱出官辦不以累民時稱賢夫吏云周銓元奉天錦州人康熙三十五年授河北道詳豁協辦江南柳束改河夫派協民閒者官自僱覓民獲更甦因小灘窵遠運米未便議改衛河水次官民便之徐潮錢塘人康熙三十九年巡撫河南性清介極力興利除弊屬官有貪虐者輙參劾不少貸吏治為之丕變甘國基漢軍正藍旗人康熙四十二年任河南布政使專意愛民造士減重耗懲貪酷延名師教士置義田以資諸生膏火一時成就者甚衆李苾大興人康照五十一年任河南布政使廉明仁恕時春夏亢旱二麥不登苾查勘成災州縣轉請題報得減錢糧若干其不成災者亦量加賑濟一時民慶更生陳鵬年湘潭人康熙六十年授河道總督値河決武陟鵬年親往堵禦風餐露處竟以勞瘁卒於其地尹㑹一博野人乾隆二年授河南巡撫崇學校教民務本以樹畜為王政所先廣栽樹木一百九十餘萬株立社學以教士置營倉以裕兵開封水奏請賑恤全活甚衆胡寳瑔婁縣人乾隆十七年為河南巡撫整飾吏治人舉其職豫省多積潦寳瑔請濬賈魯惠濟渦河巴溝四大幹河又於各邑開支河百餘以利疏洩而滋灌溉旋調江西巡撫後以楊橋河溢董理需人仍調河南巡撫尋卒於官贈太子太保兵部尚書諡恭靖馬慧裕漢軍正黄旗人嘉慶五年任河南布政使擒獲逆首劉之協勦除寶豐郟縣匪徒七年擢巡撫操守廉潔十三年以擢任去卒諡清恪前總纂官臣張琴恭秦輯捉調官臣張口章恭覆輯校對官臣吴士楨恭校校對官臣章詒絲恭覆校大清一統志開封府河南省治東西距三百七十里南北距二百八十六里東至歸徳府睢州界一百四十里西至河南府鞏縣界二百三十里南至陳州府西華縣界二百三十六里北至衛輝府封邱縣界五十里東南至陳州府太康縣界一百四十里西南至河南府登封縣界三百十五里東北至衛輝府考城縣界一百五十