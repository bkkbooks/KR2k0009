遠則直趨東昌德州赴溟渤而濟寕上下無運道矣開封地皆浮沙一經潰決瞬息數百丈工大而下埽難故河決之害北岸為大而北岸之害莫大於開封通志杞縣有蒲口通許縣有山龍口清水口封邱縣有金龍口大王廟口蘭陽有曹良耿金諸口皆昔時黄河潰決處又有大黄寺河一名埽頭河在祥符縣東北三十五里亦河之分流也汴河故道自懷慶府原武縣流入東南流經中牟縣北又東南流經府城南又東逕陳留縣北又東至杞縣北入歸徳府界即古蒗蕩渠也漢書地理志滎陽縣汴水在西南又有蒗蕩渠首受泲東南至陳入潁後漢書明帝紀永平十二年遣將作謁者王关修汴渠自滎陽至於千乘海口水經注陰溝水出河南陽武縣蒗蕩渠首受於大河卷縣故瀆故瀆東分為二世謂之陰溝水俱東絶濟東北會左瀆又東合右瀆又東南逕封邱縣絶濟瀆東南至大梁合蒗蕩梁梁溝既開蒗蕩渠故瀆實兼隂溝浚儀之稱逕大梁城北左屈溝與渠合俱東南流同受鴻溝沙水之目其川流之㑹左瀆東導者即汳水也又汳水出陰溝於浚儀縣北即蒗蕩渠也亦言以受旃然水而東自王賁灌大梁水出縣南而不逕其圠夏水洪泛則是瀆津通故渠即隂溝也隋書焬帝紀大業元年開通濟渠自西苑引穀洛水達於河自板者引河達於淮通典通濟渠即蒗蕩渠也宋史河渠志汴河自隋疏為永濟渠唐改名廣濟宋都大梁以孟州河陰縣南為汴首受黄河之口屬於淮泗歳漕江淮湖浙米數百萬以輸京師内外仰給焉故於諸水莫此為重至道元年問侍臣汴水疏鑿之由張泊曰禹於滎澤下分大河為陰溝引注東南以通淮泗至大梁浚儀縣西北復分為二渠一渠元經陽武縣中牟臺下為官渡水一渠始皇疏鑿以灌魏都謂之鴻溝蒗蕩渠自滎陽五出池口來注之其鴻溝即出河之溝亦曰蒗蕩渠漢明帝時始作浚儀渠靈帝建寕四年於敖城西北壘石為門以遏渠口故世謂之石門渠外東合濟水濟與河渠渾濤東注至敖山北米水至此又禦都之水邲人音汳即汴字古人避反字改從汴字渠水又東經滎陽北旃然水白縣東北入汴水滎陽西有二廣武城汴水自兩城門小澗中東流而出而濟流自茲乃絶惟汴渠首受旃然水謂之鴻渠晉太和中桓温北伐將通之不果劉裕西征復浚此渠而漕運焉隋煬帝詔皇甫誼開為永濟渠自後利於轉輸元豐元年内供奉宋用臣自任沙村谷口至汴口閒河五十里因伊洛水入汴河以通漕運改名清汴金史地理志開封府開封湯武中牟陳留有汴河府志元至元二十七年黄河決汴始淤塞舊府治南有汴渠故蹟即其地也按汴河源出滎陽為蒗蕩渠東流曰官渡水曰隂溝口汳水曰浚儀渠其自大梁城南分流者為鴻溝鴻溝南流兼沙水之目沙水支津又為睢水渦水名雖不一實則委别而源同也今大河所經即古汴水故道宋時又導汴人蔡以通陳穎之漕則在汴渠之南別爲蔡河即古鴻溝及沙水故道舊志混汴蔡爲一非是蔡河上流即汴河自中牟縣流經祥符縣南分流又東南流逕通許縣北又東南逕尉氏縣東入陳川府扶溝縣界即古鴻溝亦名河溝又名沙水史記河渠書禹治水之後滎陽下引河東南爲鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會於楚又蘇秦說魏王曰大王之地南有鴻溝秦始皇二十二年王賁攻魏引河溝灌大梁水經注渠水自中牟注大梁逕西赤城北左則故瀆出焉秦王賁斷故渠引水東南出以灌大梁謂之梁溝又東逕大梁城南分爲二水續述征記口汴沙到浚儀而分汴東注沙南流其水更南流逕梁王吹臺東有陰溝鴻溝之稱焉項羽與漢高分王指是水以爲東西之别渠水右與汜水合又東南逕開封縣睢渙二水出焉渠即沙水也音蔡許慎正作沙音沙水又東南逕牛首鄉東南魯渠水出焉又南逕斗城西又東南逕牛首亭東又東南八里溝出焉又東南逕陳留縣裘氏亭西又逕澹臺子羽冢東與八里溝合又南逕扶溝縣故城東魏書地形志汴水在大梁城東分為蔡渠通鑑周顯德六年自大梁城東導汴水入於蔡以通陳潁之漕三朝會要惠民河與蔡河一水建隆元年導閔河自新鄭與蔡水合貫京師南厯陳潁達夀春以通淮右於是以西南為閔河東南為蔡河至開寳六年始改閔河為惠民河宋史河渠志蔡河貫京師兼閔水洧水潩水以通舟閔水自尉氏厯祥符開封合於蔡是為惠民河洧水自許田注鄢陵東南厯扶溝合於蔡潩水出鄭之大隗山注臨潁厯鄢陵扶溝合於蔡凡許鄭諸水令堅白䧹丈八溝京索令西河禇河湖河雙河樂霸河皆會焉金史地理志祥符有蔡河尉氏有惠氏河舊志元至元二十七年黄河決祥符義塘灣蔡水上源堙明洪武八年大河南決挾潁入淮蔡河之下流亦絶又蔡河舊自祥符縣流入通許縣北分為二道名雙溝河下至縣西復合為一下入扶溝明初混入黄河今縣西北十里有西水窩其東二里有東水窩又縣北有七里灣皆蔡河瀦流之處也濄河汴河支流也水經注陰溝始亂蒗蕩終别於沙而濄水岀焉俗作渦今由通許杞縣及陳州府之太康淮寕歸德之鹿邑入江南境下達於准本朝乾隆二十二年桃濬深通乾河在祥符縣南門外自城濠起至高家樓入惠濟河本朝乾隆二十二年挑濬深通又萬夀觀東溝浚儀渠俱在城内宣洩積水入乾河陳家墳溝自陳家墳起至紅沙灣莊入乾河俱於二十二年挑濬五丈河在祥符縣北由府城北流入陳留縣界五代史周顯德四年詔疏汴水北入五丈河由是齊魯舟楫皆達於大梁九域志五丈河即禹貢之菏澤從都北厯陳晉及鄆其廣五丈舊名五丈河開寶六年詔改名廣濟河宋史河渠志廣濟河導菏水自開封厯陳留曹濟鄆建隆二年遣使浚之先是五大河泥淤不利行舟遂詔陳承昭於京城之西夾汴水造斗門引京索蔡河水通城濠入斗門俾架流汴水之上東進於