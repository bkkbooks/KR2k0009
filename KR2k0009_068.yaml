body:
  text: 河南統部在京師西南一千五百四十里東西距一千二百二十里南北距一千二百九十里東至江蘇徐州俯碭山縣界三百六十里西至陜西同州府潼關廰界八百六十里南至湖北黄州府黄安縣界八百五十里北至直隷廣平府成安縣界四百四十里東南至安徽潁州府潁上縣界五百六十里西南至湖北襄陽府襄陽縣界八百二十里東北至山東曹州府曹縣界二百里西北至山西遼州界七百四十里分野天文角亢氐房心室壁柳星張分野夀星大火娵訾鶉火之次唐書天文志角亢夀星也初軫十度中角八度終氏一度氏房心大大也初氏二度中房二度終尾六度營室東壁娵訾也初危十三度中營室十二度終奎一度柳七星張鶉火也初柳七度中七星七度終張十四度按角亢爲鄭分野屬古兖州今開封陳州汝寕光州及懷慶之南境南陽之北境當其地氐房心為宋分野屬古豫州今歸徳及閒封之東南境當其地室壁為衛分野屬古并州今衛輝彰徳懷慶當其地柳七星張為周分野屬古三河今河南南陽許陜汝三州當其地建置沿革禹貢荆河惟豫州風俗通稟中和之氣生埋安舒故云豫也按今光州兼古揚州域懷慶衛輝彰徳三府古冀州域周禮職方河南曰豫州春秋為周畿内及宋衛鄭許陳蔡諸國地兼秦晉楚之疆戰國為東西周及韓趙魏諸國地按河南春秋時畿内地戰國時半屬韓許州春秋時許地戰國為韓魏二國之境開封歸徳衛輝春秋時鄭宋衛三國地彰徳懷慶春秋時晉地後俱屬魏陳州汝寕春秋時陳蔡二國地南陽光州春秋時申鄧諸國地後俱屬楚南陽為楚韓分界汝州戰國屬韓陜州春秋時晉地後屬韓又屬秦秦并天下置三川潁川南陽碭四郡漢元封五年置十三部刺史分屬司隷及豫兖荆冀四州司隸領河内河南宏農豫州領潁川汝南梁國而魏郡屬冀州陳畱郡淮陽國屬兖州南陽郡屬荆州後漢都洛陽移司隸治焉時豫州刺史治譙為今安徽亳州建安中冀州治鄴為今彰德府三國屬魏景元中改司隸置司州晉初分屬司豫兖荆四州司州治洛陽領河南榮陽宏農汲河内魏郡豫州治陳領潁川汝南襄城汝陰梁國弋陽郡而陳畱仍屬兗州南陽仍屬荆州永嘉後為劉聰石勒所據永嘉五年劉聰陷洛陽太興元年李矩為司州刺史太寕三年石勒盡陷司州之地咸康三年石虎分司州之河南河内宏農滎陽兖州之陳畱為洛州改陳畱為建昌郡永和七年司州來歸尋復陷興寕三年陷於慕容燕太和四年入於苻泰隆安三年又入於姚秦仍置洛州義熙十二年劉裕克復仍置司州治虎牢領河南榮陽宏農實土三郡劉宋景平後入於後魏後魏初為洛州增置相天興四年置治鄴懷天安二年置治野王陜太和十一年置治陜豫卽宋司州皇興中改治縣瓠諸州太和十七年移都洛陽改洛州為司州尋又增置東豫十九年置治新息荆太和末置治穰郢正始元年改梁司州置襄孝昌中置治襄城廣永安中置治魯陽諸州東魏天平初移都於鄴以相州為司州改故司州為洛州增置梁鄭陽蔡析義北揚北豫北荆南襄諸州按自孝昌以後梁魏爭持東魏始盡得其地地形志又有光州西淮西楚南郢南朔等州皆仍梁置北齊因之後周平齊於相州置六府宣政初移六府於洛州置東京及總管府隋開皇二年廢總管府置河南道行臺三年廢大業元年建東都三年改諸州為河南滎陽本管州大業初改鄭州梁郡本宋州襄城本汝州潁川本許州汝南本蔡州淮陽本陳州宏農淅陽本浙州南陽本鄧州淯陽本淯州淮安本顯州已上十二郡屬豫州魏郡本相州汲郡本衛州河内本懷州已上三郡屬冀州弋陽本光州屬揚洲等郡唐武徳𥘉復改諸郡為州於洛陜汴豫懷相六州皆置總管府七年改都督府後罷顯慶二年於洛陽置東都開元二十一年分屬都畿採訪使河南河北淮南山南東道都畿治河南府領汝州河南道治汴州領陜虢鄭許蔡陳宋七州河北道領相磁懷衞孟五州而唐鄧二州屬山南東道光申二州屬淮南道至徳以後分置宣武陜西淮西河陽忠武等節度使唐書方鍞表至徳元年置河南節度使治汴州乾元元年廢置豫許節度使治豫州二年又置陜虢節度使治陜州陳鄭節度使治陳州上元元年改陜虢節度曰陜西尋罷寳應元年復置河南節度使又改豫許節度曰蔡汝廣徳元年置相衛節度使治相州大厯元年賜號昭義軍節度八年廢蔡汝節度徙淮西節度治汴州十四年還治蔡州更號申光蔡節度建中元年徙昭義節度治潞州二年置宣武軍節度治宋州又置河陽三城節度使四年復置陜節度使興元元年罷又移宣武節度治汴州貞元二年賜陳鄭節度號忠武軍十四年賜中光蔡節度號彰義軍元和十二年復為淮西節度十三年廢移忠武節度治許州中和二年復以蔡州置奉國軍節度使又置陜虢節度使龍紀元年賜號保義軍節度五代梁始都開封曰東都以河南為西都後唐復以河南為東都晉復都開封曰東京以河南為西京漢周至宋因之太平興國二年罷諸節度領州分諸府州軍仍屬河南等道至道三年分置京東京西及陜西河北諸路之地大中祥符七年以應天府為南京皇祐五年増置京畿路熙寕中又分京東西及西南西北等路京畿路領開封府陳許鄭州京東西路領應天府拱州京西南路領鄧唐二州京西北路領河南府孟蔡汝三州及信陽軍而相磁懷衞四州則屬河北西路陜虢二州則屬陜西路光州則屬淮南西路南渡後惟存信陽光州金初曰汴京貞元元年改置南京路及河北河東之地南京路治開封領河南歸徳二府睢陜鄧唐𥙿嵩汝許鈞陳蔡息鄭十三州而彰徳府濬衛輝滑四州屬河北西路懷孟二州屬河東南路虢州屬京兆府路元置河南江北行中書省治汴梁路領河南歸徳南陽汝寕四府鄭