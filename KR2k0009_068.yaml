聖水泉東流可溉田牽渠在鄭州東魏牽招爲廣武太守郡城井苦不可食招爲鑿渠引城外清泉注之民以爲便因名西湖在鄢陵縣西南二里宋時引城北蔡河水注之梁家湖在鄭州東二十里又大小回湖俱在州東三十里二湖相連下達中牟縣入黄河又螺螄湖在州東南三十里龍池湖在鄭州東李魏公廟後周三里許居民依水種蓮霧澤陂在祥符縣西南宋史河渠志熙寕九年提轄修京城所請引霧澤陂水至咸豐門合京索河元祐元年詔斥祥符霧澤陂募民承佃僧置水匱今涸舊志又有募天陂在府舊城西宋靖康初李綱與金兵戰於此觀省陂在陳留縣東唐書地理志陳留有觀省陂貞觀十年縣令劉雅決水溉田百頃蔡澤陂在尉氏縣西南水經注蔡澤陂岀鄢陵城西北陂東西五里南北十里縣志有大陂在縣西南四十里東流入扶溝縣界蓋即蔡澤陂也又有聖水石橋天支陂司馬寄生陂鴻雁蓮花渚陂旱則堅硧難耕潦則汪洋無際僕射陂在鄭州東南四里唐書地理志管城有僕射陂後魏孝文帝賜僕射李沖因以為名天寳六載更名廣仁池禁漁採寰宇記李氏陂在管城縣東四里周圍十八里曲洧舊聞僕射陂本以李沖得名近世訛為李靖崇寕中至賜廟額莫有正之者舊志今名城湖其西有雷家澤即此湖之源也白楊陂在汜水縣東魏書地形志雍邱有白楊陂水經注睢水逕雍邱縣故城北又東水積成湖俗謂之白楊陂方四十里板渚在汜水縣東北二十里水經注河水東逕板城北有津謂之板城渚口唐書武德四年竇建徳救王世充軍於成皋東原築宫板渚元和志在汜水縣東北三十五里凝碧池在祥符縣東南平臺側唐牧澤也宋真宗時鑿為池今淤金明池在祥符縣西五代周顯徳四年世宗謀伐南唐鑿池習水戰宋太祖置神衛水軍以習舟師太宗幸池閲水戰大中祥符六年詔諸軍選江淮習水卒於金明池試戰掉立為虎翼軍營於池側政和中又於池内建殿宇後燬又講武池在南薰門外故玉津園東宋建隆四年鑿以習水戰引蔡水注之名教戰池開寳六年改名講武今淤飲馬池在陳留縣西七里明洪武初幸汴駐蹕於此蓬池在尉氏縣東北一里許寰宇記池在縣北五里述征記大梁西南九十里尉氏縣有蓬池阮籍詩徘徊蓬池上囘首望大梁即此龍女池在鄢陵縣南焉欄鎮龍女廟前池周八丈歳旱禱雨輒應蓮花池在鄭州東三十里又一在汜水縣南西北流入汜龍池在密縣東北大騩鎮西南又縣西北蘭巖山有黒龍池黑龍潭在洧川縣東十五里相傳有龍濳伏又滎陽縣東北二十里榮澤縣東南五里皆有龍潭温家潭在鄢陵縣西北十八里羣岡矗起其最巔處津渠浩淼西折為淵澄清深潔大旱不竭龍潭在密縣東南三十里近大騩山麓有數源流注潭口兩岸皆石水流倒擊崖竅飛瀑如雷潭側峯巒峭拔其水瑩淨色如琉璃靈泉在滎陽縣東北二十五里四時不涸流入須河聖水泉在禹州北三十里旱禱輒應又有靈泉亦在禹州北平地湧出南流入潁金花泉在密縣南縱廣二畝自地湧出又縣北有交花泉縣北四十里有五龍泉一名五眼泉甘泉井在祥符縣治北明統志云魏國公徐達故宅洪武間河水入城井苦不能食永樂初忽湧此泉色瑩而味廿因名神井在杞縣西南陳留志雍邱城内有神井能興霧雹明統志云每嵗旱於此取水禱雨輒應龍井在尉氏縣南岳寨保旱禱多應漆井在鄢陵縣西七里陳寔祠前世傳太邱故宅内井井口内溙以隔鹻嵗旱禱雨於此琉璃井在儀封㕔請見亭西府志井皆自生琉璃不假甃造光耀自然又名聖井世傳夫子曾飲於此靈仙井在滎陽縣南二十五里靈仙寺前元延祐間龍見於井厄井在滎陽縣西十五里應劭風俗通漢高祖與項羽戰敗於京素遁入此井蛛網其口鳩正鳴其上追者以爲無人遂得脱因名湫水井在禹州城北省志世傳井源與靈泉聖水泉相通太旱不涸澇亦不溢前總纂官臣張琴恭纂輯提調官且張自章恭覆輯校對官臣吳士恭校校對官臣章絲恭覆校
