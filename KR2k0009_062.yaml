曰整頓灑掃以待劉公不可得也寵無言而去時稱長者弟方有二子岱繇兄弟齊名稱李篤黃人張儉亡命止篤家令操兵到門篤曰張儉知名天下亡非其罪忍執之乎令嘆息而去篤因緣送儉出塞以故得免三國吳太史慈黃人仕郡奏曹史會郡與州有隙慈詣公車門通郡章而為州家所疾避禍遼東北海相孔融聞而奇之及融為管亥所圍慈到平原説劉備到曲阿見劉繇會孫䇿至繇使慈偵視輕重獨與一騎卒遇䇿慈便前鬬會兩家兵騎各來赴于是解散慈與繇俱奔豫章慈進往涇縣䇿自攻討遂見囚執䇿解縛捉其手曰今日之事當與卿共之即署門下督劉磐數寇西安諸縣䇿以慈為建昌都尉拒磐磐遂絶迹慈美鬚髯猿臂善射弦不虛發年四十一卒劉基繇子年十四居父喪盡禮故吏餽餉皆無所受姿容美好孫權愛敬之權宴飲騎都尉虞翻醉酒犯忤權欲殺之基諫爭得免纍官郎中令權稱尊號改為光祿勳分平尚書事宋高敏登州人為涇原指揮使數與西夏戰范仲淹韓琦皆薦之厯利州路都監羌人以兵三十萬來寇敏出戰多所斬獲次榆木援兵不至中流矢死詔贈嘉州刺史孫思恭登州人神宗時纍官天章閣待制性不忤物犯而不挍篤於事上有所見必密疏以聞帝亦間訪以政歐陽修出政府思恭盡力救解出知江寧府思恭精關氏易尤妙於大衍嘗修天文院渾儀著堯年至熙寧長厯近世厯數之學未有能及之者金郭長倩文登人登皇統經義乙科仕至祕書少監兼禮部郎中修起居注與施明望王無競劉嵓老劉無黨相友善所撰石決明傳為時輩所稱有崑崙集行于世元隋世昌棲霞人父寶徙居萊陽世昌涉獵書史善騎射身長八尺鍛渾鐵為鎗重四十餘斤能左右擊刺宋兵聞鐵鎗名不敢近仕至安遠大將軍改沂郯上副萬户世昌前後厯數百戰體皆金瘡卒封定海郡侯諡忠勇薑彧萊陽人幼頴悟好學濟南守張榮辟為掾屢進參議官中統初李璮襲據濟南彧棄家招集散亡迎諸王哈布齊進兵討之賊衆出降彧請于王下令諸軍敢入城者論以軍法璮就擒城中安堵如故彧以功授大都督府參軍纍擢燕南河北道提刑按察使哈布齊舊作哈必赤今改正鄭將軍黃縣人逸其名性忠烈元末率衆屯士鄉城明徐達遣使封刃招之鄭引頸就刃人即葬于其地墓旁赤沙深數尺傳其頸血所濺也鄉人神之為立祠明高翼棲霞人洪武中以才行卓異薦纍官都察院左都御史佐征滇遼著勛績于守禮萊陽人洪武中以通經舉才識過人厯任有聲績纍遷陜西按察僉事卒于官所遺圖書衣衾而己胡琛黃縣人永樂舉人正統間厯福建興化太守討平劇寇鄧茂七朝議將大用而琛以終養告歸子鏞宰永寧善決疑獄有神明之稱曲鋭萊陽人成化進士厯僉都御史巡撫寧夏劉瑾怒其不附已勒令間住瑾誅復官階鋭有吏能所至獄無滯囚其在四川土官馬湖知府安鰲恣橫誘執之置之法疏請改流官州人德之許鋭登州衛人成化進士授行人擢御史宏治中中官梁芳專擅鋭劾罷之復以修省事劾罷劉吉徐溥等及按口北條邊務六事陳時政十二事按畿南以星變上言修政弭災八事後出為山西僉事卒陳鼎蓬萊人宏治進士為禮科給事中奏劾廖堂子姪夤緣鄉薦後以條陳弭盜機宜忤權璫斥歸嘉靖初用薦起授陜西參議遷延綏兵備副使著有威績纍遷應天府尹亷介剛正為時推服卜懷寧海州人幼孤母教之嚴常擊以杖母卒執杖而泣供其杖于母側廬墓三年詔旌之後官鄖陽通判孫祿登州人宏治進士𩔶户部郎中忤劉瑾禁錮瑾誅起知揚州有善政纍官應天府尹徐銘萊陽人以貢生通判大名府乞休歸正德中土寇劉六等陷城與馬負圖俱不屈而死劉文萃棲霞人正德初為諸生率衆禦土寇不勝𬒳執大罵死之叢蘭文登人幼嗜讀書自天官三式兵鈐醫術算數靡不討索登宏治進士官户科給事中論中官梁芳陳喜汪直韋興罪諸人遂廢正德初進左通政出理延綏屯田奏陳十事劉瑾大惡之矯旨嚴責瑾誅擢户部右侍郎巡視廬鳳滁和擊斬趙景隆召還論功增俸一級厯遷南京工部尚書卒贈太子少保浦鋐文登人正德進士知洪洞縣擢御史時尚書林俊去國中官秦文已斥復用鋐疏爭之且劾郭勛姦貪忤旨奪俸出按陜西連上四十餘疏御史楊爵以直諫繫詔獄鋐馳疏申救𬒳逮下詔獄榜掠備至爵迎哭之鋐曰此吾職也子無然七日而卒穆宗初贈光祿卿王時中黃縣人宏治進士知鄢陵縣尋擢御史以論劾劉瑾瑾銜之識其名于座已而時中巡按宣大瑾矯詔逮至京謫戍遼東鐵嶺衛瑾誅用薦起纍升僉都御史世宗時進刑部尚書御史馮恩疏列大臣邪正最詆時中奏入詔下恩獄將致之死時中擬減戍上忤世宗意時中竟落職而恩亦得不死時人服其雅量陳其學鼎子嘉靖進士擢御史緹帥陸炳倚勢專擅其學列疏劾之纍升總督陜西宣大軍務先後擒斬叛人邱富等九百有奇聲振邊塞退歸田里門巷蕭然課耕讀外無一切聲色之奉卒賜祭葬諡恭靖孫夢琛知思州府夢瑝訓導崇禎末孔有德破蓬萊俱死焉郭宗臯福山人嘉靖進士選庶吉士授御史以星隕上疏忤旨下詔獄尋釋纍擢右僉都御史巡撫順天條守邊五事以不附夏言嚴嵩罷歸後起撫大同宣府復以言事廷杖謫戍隆慶時擢兵部尚書致仕宗臯剛方嚴重言笑不苟性更友愛卒贈太子太保諡康介王言登州衛人嘉靖進士以庶吉士除御史嚴嵩以通家致之不屈大計榜己定嚴世蕃書其名于驛丞後遂歸張夢鯉萊陽人嘉靖進士以兵部郎中知開封府高拱有所屬輒持不行忤拱意秩滿以治行最格不行久之乃升靖邊兵備纍升僉都御史巡撫順天入為大理卿時張居正秉政九卿多絀下之夢鯉獨無加禮仕宦三十年家無贏資所居園荆扉槿落而己沃田登州衛人嘉靖中任都司禦倭淮陽賊寇天長田赴援斬獲甚衆賊益兵攻之戰死戚繼光蓬萊人幼倜儻負奇氣家貧好讀書通經史大義嘉靖中厯浙江參將以破浙東倭進秩三等倭犯江西福建皆命援擊戰功特盛尋升福建總督屢平劇寇威振南方人號戚家軍會薊門多警命以都督同知總理三鎮練兵事邊備修飭節制嚴明軍容為諸邊冠萬厯初進左都督加少保改廣東謝病歸所著紀效新書練兵事實談兵者奉為金科玉律焉王道一黃縣人萬厯進士宰大名調魏縣濬漳河歸故道魏免河患擢工部郎中出知邠州府平陽寇起相戒不入境後乞休加副使所著有日省録晝永編諸書宋玫萊陽人天啓進士纍官工部侍郎大兵攻登州玫與邑人趙士驥族兄應亨知縣陳顯際悉心城守城破死之本朝乾隆四十一年賜玫諡忠節士驥應亨顯際並諡忠愍張瑶登州人天啓進士為開封府推官後左遷河州判官未赴任旋里值李九成攻登州率家衆禦之城陷𬒳執罵賊遇害妻女四人俱投井死贈光祿少卿左懋第萊陽人崇禎進士知韓城縣流寇三薄城練兵擊却之尋擢户科給事中章數十上直聲振中外福王立召為僉都御史巡撫應天時本朝大兵連破李自成兵高宏圖議遣使通好懋第請行乃拜兵部右侍郎與左都督陳洪範偕至京洪範赴江南招諸將歸降懋第以不降死一年本朝乾隆四十賜諡忠貞薑埰萊陽人崇􅍬進士厯官禮科給事中風采清峻以直諫忤旨廷杖謫戍宣州衛將行而都城陷後流寓蘇州疾革時語其二子曰吾本奉命戍宣州死必葬我敬亭之麓二子如其言弟垓崇禎進士授行人見署中題名碑崔呈秀阮大鋮與魏大中並列立拜疏請去二人名及見兄埰下獄盡力營護後聞鄉邑已破父殉難一門死者二十餘人垓疏請代兄繫獄釋埰歸葬不許垓即奔葬奉母南走蘇州大鋮得志欲殺垓乃變姓名之寧波久之還至蘇州卒張國俊寧海州人天啓武舉任撫標千總討白蓮賊戰屢捷後在後岡山深入賊巢援不至𬒳執不屈死本朝乾隆四十一年賜入忠義祠李日舒棲霞人有勇力初為諸生崇禎中選將材日舒應募授河南守備流賊陷開封日舒力戰死本朝乾隆四十一年賜諡節愍黃承宗文登縣威海衛人以貢生知慶都縣崇禎中慶都兵變承宗同子朝瑄俱戰死妻劉氏亦自縊本朝乾隆四十一年賜諡節愍單經翰招逺人為諸生以節義自許崇禎末城陷經翰偕妻王氏同日自盡本朝乾隆四十一年賜入忠義祠沈迅萊陽人崇禎初進士知新城蠡二縣厯都給事中尋以保舉高光斗不當謪國子博士乞假歸城破闔門殉節死本朝乾隆四十一年賜諡烈愍本朝沈時化蓬萊人父夢鯨明季建寧同知順治四年土寇逼城夢鯨禦之時化及兄時宜與家丁沈平等並出戰夢鯨𬒳鎗傷重時化負之以逃死于僧寺時宜及沈平等二十餘人俱力戰死後督院提兵南下時化誓報父讐投充制府健卒斬關斫殺無算賊衆悉平乃扶父櫬歸里孫揚聲萊陽人由舉人授鄖陽府推官清操自勵淡泊甚于家居順治四年山寇猝發郡城失守揚聲挺身力戰𬒳執慷慨罵賊而死贈按察司僉事宋琬萊陽人順治丁亥進士授户部主事遷吏部郎出為隴西道擢浙江按察使時登州于七為亂琬同族子因宿憾思陷之遂以與聞逆謀告變立逮下獄閣門縲繫者三載巡撫蔣國柱鞫得誣狀得旨免罪放歸康熙十年起官吏曹尋授四川按察使十二年入覲值吳三桂叛聞變驚惋死琬敦孝友虛懷下士詩古文詞盛名滿天下時稱南施北宋施謂施閏章也李贊元海陽人五歲而孤事母盡孝家貧其母檢舊劵不下千金贊元悉焚之順治乙未成進士由庶吉士改授御史出按三楚巡視兩淮鹽政凡所施行多惠績纍升督捕侍郎條議分别窩逃及誤娶逃人外生之女當免議刋入條例後以兵部侍郎告歸卒王騭福山人順治乙未進士授户部主事厯任四川松茂道時滇賊劉起龍圍建昌騭轉餉濟兵剿撫邊寨賊平擢總督浙閩以户部尚書乞休歸高啓元萊陽人性孝友自甘淡泊初任昌樂教諭萊陽值寇凡族戚𬒳焚掠者皆招來之衣食不足且稱貸以繼升任安陽縣知縣宦囊所有悉以奉兄長不問出入解組歸益篤孝友四世一堂家教肅然袁夢吉榮成人任湖南武陵知縣值流賊餘黨之亂夢吉先事集流亡繕城堞練民壯捍禦月餘城陷𬒳執罵不絶聲遂𬒳害趙作舟海陽人康熙己未進士選庶吉士改刑曹疏理冤抑甚多纍升僉都御史前後厯六任皆清要歸時囊槖蕭然性嗜讀書多才略辛丑土寇于七逼衛時作舟家居出錢穀為戍兵饋餉與守土者共固圉危城得安皆其力也李本涵贊元子康熙戊辰進士事繼母以孝聞兄弟姊妹十九人共處未嘗有疾言遽色值萊陽飢本涵出錢穀以賑全活萬餘人衛城傾圯捐金倡修雉堞完固殁之日家無長物鹿廷瑄福山人康熙庚戌進士少以孝聞母病癰親為吮舐知吳橋縣奔父喪跣足走千餘里哀毁骨立見者傷之後補承德知縣有惠政卒于官滕國祥蓬萊人由行伍纍升登州水師遊擊體恤兵卒人皆樂為用號為鋭師康熙五十三年遇賊于雞鳴島為賊藥鎗所中負重創尚殺賊數十人氣盡乃仆贈驃騎將軍于錞蓬萊人七歲見祖母畏寒即知以身為暖被稍長念祖母與母兩世守節常泣下不止苦志經營以備孝養祖母病思鱣時當嚴寒錞入水求之即得人以為孝思所感林鍾岱文登人乾隆己未進士掌湖廣道監察御史為人剛方清慎辨論鯁直居鄉好義善施賑飢贍族卒祀鄉賢祠王懋賞福山人乾隆乙未一甲一名武進士由頭等侍衛授雲南景蒙營遊擊升湖南永州鎮總兵協剿湖南廣西湖北三省賊匪屢立戰功嘉慶六年迎擊川陜股匪斬獲甚多中矛傷卒賜恤廕騎都尉宋延清招遠人乾隆辛丑武進士由藍翎侍衛洊擢貴州大定協副將嘉慶三年在四川楊家􅄵擊賊受槍傷卒得旨