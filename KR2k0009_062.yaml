body:
  text: 大清一統志青州府三人物漢東郭先生齊人初齊王田榮怨項羽謀舉兵叛之劫齊士不與者死處士東郭先生與梁石君在劫中強從及榮敗二人相與入深山隱居至齊悼惠王時曹參為相禮下賢人蒯通見參曰東郭先生梁石君齊之俊士也願足下使人禮之參皆以為上賓田橫千乘人故齊王田氏族與兄儋榮皆豪傑宗強能得人陳涉起兄弟三人更王齊儋子市為齊王時橫為將平齊地及榮子廣為齊王橫相之政無巨細皆斷於相漢五年橫立項籍既滅漢王立為皇帝橫懼誅與其徒五百人入居海島帝以橫兄弟本定齊齊人賢者多附焉乃使赦橫罪而召之橫與二客乘傳詣雒陽未至三十里自剄帝以王者禮葬橫二客皆自剄從之餘五百人在海中聞橫死皆自殺劉敬齊人本姓婁高帝五年因虞將軍得見帝用其説西都關中賜姓劉氏拜為郎中號奉春歐陽生子世世相傳至曽孫高為博士高孫地餘以太子中庶子授太子經後為博士論石渠元帝即位地餘侍中貴幸至少府戒其子曰我死官屬送汝財物慎母受汝九卿儒者子孫以廉潔著可以自成及死少府官屬共送數百萬其子不受天子聞而嘉之賜錢百萬胡母生齊人治公羊春秋景帝時為博士與董仲舒同業仲舒著書稱其德年老歸教於齊齊之言春秋者宗事之轅固齊人治詩景帝時為博士竇太后好老子書召問固曰此家人言耳太后怒帝以固廉直拜為清河太傅疾免武帝即位復以賢良徵罷歸時巳九十餘矣公孫宏亦徵側目而視固固曰公孫子務正學以言無曲學以阿世諸齊以詩顯貴皆固弟子也鄒陽齊人景帝時吳王濞招致四方之士陽與嚴忌枚乘等至吳俱以文辨著名吳王怨望不朝陽奏書諫王不納去之梁從孝王遊陽有智略慷慨不苟合介於羊勝公孫詭之間勝等嫉陽惡之孝王下吏將殺之陽於獄中上書書奏孝王出之卒為上客嚴安臨淄人元光中與主父偃等上書言世務書奏召見帝曰何相見之晚也乃拜為郎中捷子齊人漢書藝文志道家捷子二篇王同東武人與雒陽人周王孫丁寬齊人服生受易田何皆著易傳數篇即墨成齊人受易王同至陽成相兒寬千乘人治尚書以郡國選詣博士受業孔安國貧無資用時行賃作帶經而鋤休息輒誦讀補廷尉文學卒史寬為人溫良廉智自將善屬文廷尉張湯奇其材及為御史大夫以寬為掾舉侍御史見武帝語經學帝説之擢中大夫遷左內史勸農桑理獄訟卑禮下士務在於得人心吏民大信愛之又表奏開六輔渠定水令以廣溉田收租稅時裁濶狹與民相假貸以負租課殿當免民聞皆恐失之大家牛車小家擔負輸租繦屬不絶課更以最帝愈奇寬奉詔與司馬遷等共定漢太初厯元符元年為御史大夫從東封泰山居位九歲以官卒周堪齊人事大夏侯勝受尚書宣帝時論於石渠經為最高後為太子少傅元帝即位領尚書事甚見尊任與太傅蕭望之等同心輔政為石顯等所譖免官尋擢為光祿勳左遷河東太守後以災異下詔褒堪徵拜光祿大夫領尚書事卒梁邱賀諸人為武騎從大中大夫京房受易更事田王孫宣帝時求房門人得賀待詔黃門詔入説易帝善之以為郎以筮有應由是近幸為大中大夫給事中至少府為人小心周密帝信重之年老終官子臨亦入説為黃門郎草露中奉使問諸儒於石渠臨學精熟宣帝選高材郎從臨講琅邪王吉使其子駿上疏從臨受易長孫順淄川人受詩王吉為博士任公淄川人為少府受公羊春秋於顔安樂魯伯琅邪人為會稽太守受易施讐伯授邴丹字曼容琅邪人著清名管路琅邪人為御史中丞受公羊春秋於疏廣又事顔安樂左咸琅邪人為郡守九卿受公羊春秋於冷豐徒衆尤盛王中琅邪人為元帝少府受公羊春秋於嚴彭祖家世傳業中授同郡公孫文文東平太傳徒衆尤盛貢禹琅邪人以明經潔行著聞徵為博士復舉賢良元帝即位徵為諫大夫上書崇節儉帝納其忠下詔令減食穀馬食肉獸省宜春苑又罷角抵諸戲厯御史大夫禹在位數言得失書數十止帝下其議令民産子七歲乃出口錢自此始又罷上林公館希幸御者及省建章甘泉宫等衛卒餘雖未盡從然嘉其質直諸葛豐琅邪人以明經為郡文學為人特立剛直元帝時擢為司隸校尉刺舉無所避京師為之語曰閭何濶逢諸葛帝嘉其節加光祿大夫時侍中許章以外屬貴幸奢淫不法豐欲奏其事適逢章欲收之章窘迫馳入宫門豐上奏於是收豐節旋徙城門校尉免為庶人終於家伏理東武人八世祖勝字子賤所謂濟南伏生者也後家東武理受詩於匡衡為當世名儒以詩授成帝為高密太傅皮容琅邪人受詩滿昌至大官徒衆尤盛徐良琅邪人受大戴禮為博士州牧郡守家世傳業由是大戴有徐氏之學師丹東武人治詩事匡衡舉孝廉為郎建始中丞相翟方進等舉丹論議深博廉正守道厯少府光祿勳侍中甚見尊重成帝末為太子太傅哀帝即位纍遷大司空丹以師傅居三公位得信於上書數十上多切直之言諫封帝舅后父及傅太后求尊號博引經義開陳婉切巳被劾免歸平帝初封義陽侯卒諡曰節伏湛理子性孝友少傳父業成帝時以父任為博士弟子更始立為平原太守光武即位徵拜尚書使典定舊制建武三年為大司徒封陽都侯彭寵反漁陽帝欲親征以湛諫而止徐異卿等據富平連攻之不下惟曰願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即日歸降湛雖在倉卒造次必於文德坐事免六年徙封不其侯遣就國四傳孫無忌亦傳家學順帝時為侍中屯騎校尉詔與議郎黃景校定中書五經百家藝術桓帝時復詔與景等共撰漢紀又自采集古令刪著要事號曰伏侯注邴漢琅邪人以清行徵用後為太中大夫王莽秉政乞骸骨薛方齊人為郡掾祭酒王莽以安車迎方因使者辭曰堯舜在上下有巢由莽説其言不強致居家以經教授著詩賦數十篇光武即位被徵道病卒又栗融亦齊人蘇章禽慶皆北海人並去官不仕王莽王璜琅邪人能傳費直易璜又傳古文尚書兒萌齊國人王莽時萌兄弟見執於赤眉將食之萌叩頭乞以身代賊哀而兩釋之徐房北海人與同郡逢萌平原李子雲王君公相友善並曉隂陽懷德獨行牟長臨濟人少習歐陽尚書不仕王莽建武二年拜為博士稍遷河內太守諸生講學者常千餘人著録前後萬人著尚書章句皆本之歐陽氏俗號牟氏章句坐事免復徵為中散大夫子紆隱居教授門生千人肅宗徵之欲以為博士卒於道淳于恭北海淳于人清靜不慕榮名王莽末歲飢兵起兄崇將為盜所烹恭請代得與俱免後崇卒恭養孤教學有不如法輒反杖自箠以感悟之兒慙而改過州郡連召不應幽居養志舉動必由禮度建初元年下詔美恭素行除為議郎遷侍中騎都尉禮待甚優其所薦名賢無不徵用進對陳政皆本道德帝未嘗不稱善五年卒於官詔刻石表閭伏隆湛子少以節操立名任郡督郵建武中張步兄弟擁重兵據齊地帝拜隆太中大夫持節使青徐招降郡國隆栘檄以告羣盜惶怖即降步遣使隨隆上書獻鰒魚拜隆光祿大夫復使於步隆招懷綏緝多來降附帝嘉其功比之酈生即拜步為東萊太守步猶豫未決欲留隆共守青徐隆不聽步遂執隆而受劉永封隆遣間使上書願以時進兵無以隆為念帝召隆父湛流涕以示之曰隆可謂有蘇武之節其後隆遂被殺伏恭湛兄子湛弟黯以明齊詩改定章句作解説九篇位至光祿勳以恭為後恭性孝少傳黯學以任為郎建武四年除劇令視事十三年以惠政公廉聞青州舉為尤異太常試經第一拜博士遷常山太守敦修學校教授不輟由是北州多為伏氏學永平四年帝臨雍於行禮中拜恭為司空儒者以為榮在位九年以病乞歸詔賜千石俸以終其身十五年行幸琅邪引遇如三公儀建初二年年九十帝行饗禮以恭為三老元和元年卒子壽官至東郡太守甄宇安邱人清淨少欲習嚴氏春秋教授嘗數百人建武中為州從事徵拜博士遷太子少傅卒於官傳業子普普傳子承承尤篤學講授亦嘗數百人諸儒以承三世傳業莫不歸服建初中舉孝廉卒於梁相子孫傳學不絶江革臨淄人遭亂負母避兵備經阻險得全於難建武末年與母歸鄉里稱之曰江巨孝母終至性殆滅嘗寢伏冡廬服竟不忍除永平初舉孝廉為郎補楚太僕建初初太尉牟融舉賢良方正纍遷五官中郎將每朝會帝嘗使虎賁扶持及進拜恆目禮焉時有疾不會輒令大官送醪膳恩寵有殊貴戚慕其行各奉書致禮革無所報受後乞骸骨轉諫議大夫賜告歸元和中帝思革至行詔賜穀千斛常以八月長史存問由是巨孝之稱行於天下周澤安邱人少習公羊嚴氏春秋隱居教授建武末辟大司馬府署議曹祭酒永平十年厯太常果敢直言數有據爭十八年拜侍中騎都尉後數為三老五更建初中致仕卒承宫姑幕人少孤年八歲為人牧豕鄉里徐子盛以春秋經授諸生宫樂其業因就聽經數年勤學不倦歸家教授遭亂將諸生避地漢中後與妻子之蒙隂山肆力耕種永平中徵詣公車帝臨雍詔拜博士遷左中郎將數納忠陳政論議切慤朝臣憚其節名播胸奴厯官侍中祭酒吳良臨淄人習大夏侯尚書初為郡吏歲旦入賀掾王望舉觴上壽稱太守功德良斥望佞邪欺諂願勿受其觴太守斂容而止轉良為公曹恥以言受進終不肯謁東平王蒼聞而辟署西曹甚相敬愛上疏薦良公方廉恪宜備宿衛顯宗以示公卿曰前以事見良鬚髮皓然衣冠甚偉蕭何舉韓信設壇而拜不復考試令以良為議郎後遷司徒長史每處大議輒據經典不希旨偶俗以徼時譽後坐事免復拜議郎卒牟融安邱人少博學以大夏侯尚書教授由茂才為豐令永平五年入為司隸校尉多所舉正百僚敬憚之十一年為大司農顯宗方勤萬幾每延謀政事判折獄訟融經明才高善論議帝數嗟嘆以為才堪宰相明年為司空舉動方重甚得大臣節肅宗即位遷太尉建初四年卒魏談琅邪人為飢寇所獲等輩數十人皆以次當烹賊見談謹厚獨令主爨暮則執縛賊有彝長公時哀談密為解縛令去談曰談為諸君執爨恆得遺餘餘人皆茹草萊不如食我長公義之並得免永平中為主家令劉毅北海敬王子初封平望侯永元中奪爵毅少以文辨稱元初元年上漢德論并憲論十二篇時劉珍鄧耽尹兊馬融共上書稱其美安帝嘉之賜錢三萬拜議郎郎顗安邱人父宗學京房易善風角星算六日七分望氣占候吉凶安帝徵之對策為諸儒表後拜吳令以博士徵宗恥以占驗見知懸印綬遁去終身不仕顗少傳父業隱居海畔研經占象朝夕無倦州郡舉有道方正不就順帝時災異屢見陽嘉二年正月公車徵乃詣闕拜章帝使對尚書顗條便宜七事復條四事以對勸帝早宣德澤以應天功書奏拜郎中不就歸其夏及明年災寇略如顗言後復徵不行滕撫劇人初任州郡稍遷涿令太守委任郡職兼領六縣在事七年道不拾遺順帝末盜賊羣起三公舉撫有文武才拜為九江都尉助御史中丞馮緄合兵共討撫前後擊破斬獲無算東南悉平振旅而還以撫為左馮翊所得賞賜盡分麾下性方直不交權勢宦官懷忿及論功當封太尉胡廣承旨黜撫天下冤之卒於家孫嵩安邱人桓帝時趙岐逃難四方嵩年二十餘見岐賣餅市中察非常人停車呼與共載岐素聞嵩名即以實告遂俱歸嵩先入白母迎入堂上饗之極歡藏岐復壁中數年後因赦出獻帝時嵩寓于劉表表不為禮時岐使荆州乃稱嵩素行篤烈因共表上為青州刺史童恢姑幕人父仲玉遭世凶荒傾家賑恤九族鄉里賴全者以百數早卒恢少仕州郡為吏靈帝時司徒楊賜聞其執法廉平乃辟之賜被劾當免掾屬悉去恢獨詣闕爭之乃得理掾屬悉歸府恢杖䇿而逝由是論者歸美除不其令一境清靜獄中無囚流人歸者二萬餘户青州舉尤異遷丹陽太守卒弟翊字漢文名高於恢宰府先辟之翊不肯往及恢被命乃就孝廉除須昌長有異政吏人為立碑趙祐北海人靈帝時為宦官與濟隂丁肅下邳徐衍南陽郭耽汝陽李巡等五人稱為清忠皆在里巷不爭威權祐博學多覽著作校書諸儒稱之任旐博昌人以至行稱漢末黃巾賊起到博昌相謂曰宿聞任子旟天下賢人也可入其鄉耶遂相帥而去由是聲聞逺近州郡並舉孝廉厯酸棗祝阿令邴原北海朱虛人少以操尚稱辟命皆不就黃巾起原將家屬入海住鬱洲山孔融為北海相舉原有道遂到遼東歸原者數百家遊學之士教授之聲不絶積十餘年遁還故土講述禮樂吟咏詩書門徒數百服道數十時鄭康成以博學洽聞注解典籍為儒雅所歸原亦以高遠清白頤志淡泊口無擇言身無擇行故英偉之士向焉海內咸稱青州有邴鄭之學管幼安北海朱虛人長八尺美鬚眉與平原華歆同縣邴原相交遊學異國並敬善陳仲弓黃巾之亂至遼東往見太守公孫度語惟經典不及世事乃因山為廬鑿壞為室越海避難者皆來就之旬月而成邑遂講詩書陳爼豆飾威儀明禮讓非學者無見也由是度安其賢民化其德魏黃初中徵為太中大夫明帝時以為光祿勳並辭不受卒年八十四三國魏任嘏旐子八歲喪母以至性見稱年十四始學三年中誦五經皆究其義兼包羣言無不綜覽邑中爭訟皆詣嘏質之其子弟有不順者父兄竊數之曰汝所行豈可令任君知耶其禮教所化率如此時訪召海內至德嘏應舉為臨淄侯庶子相國東曹屬尚書郎文帝時為黃門侍郎每納忠言帝嘉其淑慎纍遷河東太守所在化行王修營陵人七歲喪母母以社日亡修感念哀甚鄰里為之罷社徐幹北海人體道修行聰識洽聞與孔融陳琳王粲阮瑀應瑒劉楨稱建安七子建安中特加旌命以疾休後除上艾長又以疾不行及卒文帝書與元城令吳質曰偉長懷文抱質恬淡寡欲有箕山之志可謂彬彬君子著中論二十餘篇孫炎樂安人受學鄭康成之門人稱東州大儒徵為祕書監不就王肅集聖證論以譏短康成炎駮而釋之作周易春秋例毛詩禮記春秋三傳國語爾雅諸注又著書十餘篇吳孫邵北海人為孔融功曹融辭曰廊廟才也孫權統事數陳便宜以為應納貢聘從之黃武初為丞相封陽羡侯是儀營陵人本姓氏初為縣吏後仕郡郡相孔融令改為是依劉繇徙會稽孫權徵儀到專典機密拜騎都尉既定荆州都武昌拜裨將軍封都亭侯黃武中大破曹休遷偏將軍入闕省尚書事駕東遷使儀輔太子登留鎮太子敬之事先咨詢然後行後從太子遷建業拜侍中執法平諸官事典校郎吕一誣故江夏太守刁嘉謗訕國政權怒收繫驗問儀獨云無聞辭不傾移嘉得免以尚書僕射領魯王傅盡忠規諫儀事上勤與人恭不治産業數十年未嘗有過吕一厯白將相大臣罪獨無以白儀權歎曰使人盡如儀尚安用科法為年八十一卒滕允劇人少有節操美儀容弱冠尚公主起家丹陽太守徙吳會稽所在見稱太元元年為太常與諸葛恪等俱受遺詔峬政孫亮即位加衛將軍恪將伐魏允諫之為都下督掌統留事白日接賓客夜省文書或通曉不寐進爵高密侯孫峻欲城廣陵朝臣知其不可而莫敢言惟允諫之不從而功竟不就晉王裒修孫父儀為司馬昭司馬東關之敗昭曰誰任其咎儀曰責在元帥昭怒遂斬之裒少立操尚博學多能痛父非命未嘗西向而坐示不臣于晉也隱居教授徵辟皆不就廬於墓側旦夕至墓所拜跪攀柏哀號涕泣著樹樹為之枯母性畏雷母殁每雷輒到墓曰裒在此讀書至哀哀父母生我劬勞未嘗不三復流涕門人為廢蓼莪篇家貧躬耕及洛陽傾覆親族悉移渡江東裒戀墳壟不去遂為賊所害任愷博昌人尚魏明帝女纍遷員外散騎常侍武帝時為侍中封昌國縣侯愷有經國之幹以社稷為己任帝政事多咨焉性忠正惡賈充為人每裁抑之充計畫令與帝疏因稱愷才能宜任官人之責帝不之疑以為吏部尚書愷選舉公平盡心所職然侍覲轉希充黨乘間浸潤遂免官後起太僕轉太常以憂卒子罕幼有門風以淑行致稱厯官大鴻臚張載安平人父收蜀郡太守載性間雅博學有文章太康初至蜀省父經劍閣以蜀人恃險好亂因著銘以作誡益州刺史張敏表上其文武帝遣使鐫之劍閣又為濛泛賦司隸校尉傅休奕見而嗟嘆為之延譽遂知名起家佐著作郎厯官中書侍郎稱疾歸弟協與載齊名官河間內史亢亦有屬綴為散騎常侍領佐著作時人謂之三張左思臨淄人貌寢口訥而辭藻壯麗造齊都賦一年乃成復欲賦三都詣著作郎張載訪岷卭之事遂搆思十年門庭藩溷皆著筆紙得句便疏之自以所見不博求為祕書郎賦成皇甫謐為其序張載等復為注解司空張華見而嘆曰班張之流也于是競相傳寫洛陽為之紙貴齊王冏命為記室督辭不就以疾終徐苗高密淳于人纍世皆以博士為郡守曽祖華有至行祖邵為魏尚書令以廉直稱苗少家貧與弟賈就博士宋鈞受業遂為儒宗作五經同異評前後所造數萬言皆有意味性抗烈輕財貴義兼有知人之鑒數徵辟不就武惠時計吏至臺帝輒訪其安否光逸樂安人初為博昌小吏胡母輔之見而奇之呼與談果俊器後舉孝廉為州從事輔之薦於太傅􅚼尋避亂渡江與輔之謝鯤等酣飲時人謂之八達元帝以逸補軍咨祭酒為給事中卒於官伏滔安邱人有才學為大司馬桓溫參軍深加禮接從溫伐袁真以淮南屢叛著論二篇名曰正淮壽陽平以功封聞喜縣侯太元中拜著作郎專掌國史遷遊擊將軍卒子系之亦有文才厯官侍中尚書十六國苻秦王猛劇人家於魏郡少貧賤以鬻畚為業博學好兵書謹重嚴毅氣度宏遠遊鄴都時人莫識高平徐統見而奇之召為功曹不就隱於華山懷佐世之志桓溫入關猛披褐謁之捫蝨而言旁若無人拜高官都護猛仍還山苻堅聞其名遣吕婆樓招之一見便若平生堅僭位以猛為中書侍郎轉始平令一歲中五遷厯尚書令太子太傅加散騎常侍後率軍討慕容暐軍禁嚴明逺近帖然以功進封清河郡侯留鎮冀州聽以便宜從事入為丞相宰政公平流放尸素拔幽滯顯賢才外修兵革內崇儒學秦國遂致富強堅嘗敕太子宏長樂公丕等曰汝事王公如事我也其見重如此尋疾甚上疏言時政多所宏益堅覽之流涕及疾篤親臨省問猛言晉正朔相承願不以為圖鮮卑我之仇讐宜漸除之遂卒子永幽州刺史苻丕立纍進左丞相與慕容永戰於襄陵死之南燕晏謨青州人嬰之後慕容德時為秀才德如齊城問謨以齊之山川邱陵賢哲舊事謨厯對詳辨畫地成圖德深嘉之拜尚書郎立鐵冶於商山置鹽官於烏常澤以廣軍國之用南北朝宋王鎮惡猛孫以五月五日生故名鎮惡初為天門臨澧令武帝召至與語甚異焉謂諸佐曰所謂將門有將也即以為青州治中從事史行參太尉軍事屢戰有功武帝討劉毅加鎮惡振武將軍遣率百舸前發鎮惡晝夜兼行破江陵後二十日大軍方至以功封漢壽縣子晉義熙十二年武帝將北軍行龍驤將軍領前鋒鎮惡曰不伐轉為咨議參克咸陽誓不復濟江而還也及陷長安城武帝至勞之曰成吾霸業者真卿也以鎮惡領安西司馬馮翊太守委以捍禦之任為參軍沈田子所害武帝受命追封龍陽縣侯鎮惡被害弟康攜家出洛陽歸武帝即以為相國求還祝母值關陜不守康倡集義徒堅守六旬武帝嘉其節封西平縣男進號龍驤將軍迎康家還京邑魏賈思伯益都人世父元壽中書侍郎有學行思伯釋褐奉朝請纍遷中書侍郎任城王澄之圍鍾離也以思伯為軍司及澄失利思伯為後殿託以失道不伐其功昭帝時拜涼州刺史後轉衛尉卿時議建明堂多有同異思伯上議學者善之後為侍講中書舍人入授明帝杜氏春秋思伯少雖明經至是更延儒生夜講晝授性謙和傾身禮土卒諡文貞弟思同少勵志行雅好經史元皓之亂思同不降莊帝還宫封營陵縣男後為侍講授靜帝杜氏春秋拜侍中卒王憲猛孫皇始中道武見之曰此王猛之孫也厚禮以待之以為本州中正太武即位遷廷尉卿出為上谷太守清身率下風化大行尋拜外都大官移中都厯任二曹斷獄稱旨進爵北海公天安初卒孫益德樂安人其母為人所害益德童幼為母復仇還家哭於殯以待縣宫孝文文明太后以其幼而孝決又不逃罪特免之梁伏曼容滔曽孫少篤學老善易常施高坐有賓客輒升坐講説生徒常數十百人梁臺建以曼容舊儒召拜司馬出為臨海太守卒於官任昉博昌人幼好學早知名性至孝居喪盡禮續遭母憂嘗廬於墓側哭泣之地草為不生高祖克京邑霸府初開以昉為驃騎記室參軍及踐阼拜黃門侍郎轉御史中丞祕書監天監二年出為新安太守卒昉善屬文尤長載筆當世王公表奏莫不請焉家聚書萬餘卷率多異本所著文章數十萬言盛行於世好交結奬進坐上客恆有數十時人號曰任君第四子東里頗有父風官至尚書外兵部伏暅曼容子幼傳父業與任昉劉曼俱知名起家奉朝請仍兼太學博士高祖踐阼纍遷中書侍郎兼五經博士與徐勉等總知五禮事出為永陽內史在郡清潔治務安靜高祖善之厯豫章內史徵為給事黃門侍郎未及起卒於郡徐勉為之墓志子挺敏悟有才思好屬文齊末舉秀才對策第一高祖義師至見之甚悅謂曰顔子天監初除中軍參軍事於宅講論語聽者傾朝徵為京尹太清中卒北齊王昕劇人少篤學昕體素甚肥遭喪後遂終身羸瘠楊愔重其德素以為人之師表齊文宣踐阼拜七兵尚書以讒徙幽州後徵還判祠部尚書帝與朝臣酣飲昕稱疾不至遂斬之昕母清河崔氏學識有風訓生九子皆風流藴藉世號王氏九龍王晞昕弟幼而孝謹有器度淹雅好學齊神武訪朝廷子弟忠孝謹密者令與諸子遊晞與崔瞻等首應此選補中外府功曹參軍帶常山王演友及昭帝踐阼除晞散騎常侍仍兼領吏部郎中晞與尚書楊休之等共舉録厯代廢禮墜樂職司廢置朝饗異同輿服增損或道德高俊久在沉淪或巧言眩俗邪辟害政爰及田市舟車徵稅婚葬有不便於時者悉令詳思條奏尋拜太子太傅又兼中庶子帝欲以晞為侍中苦辭不受或勸晞勿自疏晞曰我閲要人多矣充詘少時鮮不敗績且性實疏緩不堪時務非不愛作熱官但思之爛熟耳性間淡寡欲雖王事鞅掌而雅操不移在並州人謂之物外司馬武平初厯官大鴻臚加儀同三司隋高構北海人性智辨好讀書工吏事厯官吏部侍郎有能聲所舉杜如晦房元䶖等後並至公輔論者稱構有知人之鑑唐崔信明益都人強記美文詞唐興竇建德僭號信明族弟敬素為賊鴻臚卿勸信明臣賊答曰昔申胥海隅釣師能固其節爾欲吾屈身賊中求斗筲耶遂踰城去隱太行山貞觀六年有詔拜興勢丞遷秦州令卒段志元臨淄人資質偉岸以驍果為秦王所識授右領軍大都督府軍頭下霍邑絳都攻永豐倉摧鋒最劉文靜拒屈突通於潼關為桑顯和所襲軍且潰志元率北騎馳殺中流矢突擊自如唐軍復振通敗走躡獲之授樂遊府車騎將軍從破竇建德平東都遷秦王府右二護軍隱太子嘗以金帛誘之拒不納秦王即位纍遷左驍衛大將軍封樊國公文德皇后葬勒兵衛章武門太宗夜遣使至志元所拒曰軍門不夜開使者示手詔志元曰夜不能辨不納帝歎曰真將軍周亞夫何以加改封褒國公厯鎮軍大將軍卒三世孫文昌疏爽任義節穆宗時拜平章事厯西川淮南荆南節度使子成式博學強記著酉陽雜爼官終太常少卿房元齡臨淄人幼警敏博綜典籍善屬文書兼草隸開皇中天下混一皆謂隋祚方永而元齡決其亡可立待年十八舉進士授羽騎尉太宗以燉煌公徇渭北杖䇿謁軍門一見知舊署行軍記室參軍公為秦王授府記室封臨淄侯征伐未嘗不從獨收人物致幕府軍符府檄駐馬即辦高祖曰若人機識是宜委任每為吾兒陳事千里外猶對面談太宗即位為中書令進尚書左僕射帝曰公為僕射當助朕廣耳目訪賢才乃敕細務屬左右丞大事關僕射徙梁國公居宰相積十五年進司空仍總朝政纍表固辭卒諡文昭孫既樂安人母喪廬墓哀毁骨立有醴泉湧於墓側里人名之曰孝源泉郭昈齊人舉進士為李師道判官憲宗時師道叛與高沐等引古今成敗前後諫説不能入及沐以欵結天子為師道所害並囚昈凡十年昈為繒書藏衣絮間使郭航間道見李願請奇兵三千浮海搗萊淄及王師討師道頗用其䇿航萊州人與昈世居齊第五泰益都人咸通中鄂州文學著左傳事類二十卷五代梁牛存節博昌人為人忠謹太祖愛之以為小校屢戰有功積官邢州團練使元帥府左都押衙太祖即位拜右千牛衛上將軍晉兵攻澤州急存節入城自守晉人解去遷匡國軍節度會朱友謙叛西連鳳翔同州水鹹無井支謙與岐兵合圍欲以渴疲之存節鑿井八尺水甘可飲友謙卒不能下末帝立徙鎮天平以功進太尉時梁晉方苦戰而存節病痟忠憤彌激治軍督士未嘗言疾將卒語其子知業曰忠孝吾子也不及其他唐夏魯奇青州人莊宗時為衛護指揮使時梁將劉鄩軍於垣水莊宗以百騎覘敵遇鄩伏兵圍之數重幾不得脫魯奇力戰手殺百餘人身被二十餘創與莊宗決圍而出莊宗奇之以為磁州刺史從戰中都擒王彥章遷河陽節度使為政有惠愛明宗時徙鎮武忠又徙武信東川董璋反攻遂州魯奇閉城拒之旬月救兵不至城中食盡魯奇自刎死晉石昻臨淄人家有書數千卷喜延四方之士士無遠近多就問學昻不求仕進節度使符習高其行召為臨淄今與監軍楊産朗忤即解官還家高祖時詔天下求孝悌之士户部尚書王權等上昻行義詔至以為宗正丞遷少卿出帝即位數上疏極諫不聽乃稱疾東歸以壽終漢蘇禹圭諸城人吐高祖為觀判官纍官至右僕射侍郎同平章事決斷無留滯用舍黜陟所議必當帝倚重之宋許仲宣青州人氣貌雄偉太祖召對便殿恱之擢太子中允知北海軍仲宣度其形勢廣袤可為州郡畫圖上之逐升為濰州從征并門掌給納四十餘州資糧悉能集事帝益知其強幹開寶四年知荆南轉運事及征江南又兼南面隨軍轉運事供饋無闕南唐平拜刑部郎中太祖時厯西川廣南轉運使擢諫議大夫後遷給事中齊得一諸城人幼嗜學及長教授鄉里士大夫子弟不遠百里就之肄業王萬徹為密州防禦使性貪暴執鄉民殺之而取其資産得一親族死者十餘人惟得一與兄脫身獲免詣闕上訴按鞫得實削官坐死有差得一乃歸布衣蔬食不樂仕進開寶中詔舉廉退孝弟之土本郡以得一應詔䇿試中選授章邱主簿張平臨朐人秦王廷美領貴州署為親使太宗即位詔補右班殿直監市木秦隴以功遷供奉官監陽平都木務兼造船舊造舟既成備漂失一舟調三户守之歲役數十平穿池引水繫舟其中不復調民雍熙初召還纍遷鹽鐵使卒平好史傳微時遇異書或解衣易之及貴聚書數千卷子從吉以蔭補殿直景德四年宜州軍校陳進叛命副曹利用為廣南東西路安撫使將兵討之以平賊功改莊宅副使李覺本京兆長安人唐之後裔其先徙家青州益都父成五代末以詩酒行公卿間善摹寫山水世傳以為寶覺性強毅而聰敏太平興國中舉九經起家將作監丞通判建州遷知泗州轉祕書丞命與孔維等校定五經正義奉使交州還遷國子博士端拱元年初令學官講説覺首預焉太宗幸監召覺對御講泰卦從臣皆列坐覺因述天地感通君臣相應之旨帝甚恱賜帛百匹俄獻時務䇿帝頗嘉奬尋以本官直史館遷司門員外郎卒覺纍上書言時務述養馬漕運屯田三事太宗嘉其詳備令送史館李宥覺子幼孤不好弄長讀書屬文不雜交遊舉進士調火山軍判官遷集賢校理遂直院知蘄州歲凶令牧養散委嬰孩所活甚衆後以諫議大夫知江寧府致仕起官太子賓客判留司御史臺卒宥性清介然與物無忤好奬拔士人既死家無餘財官賜錢十萬張宏益都人太平興國中舉進士為將作監丞遷著作郎與修太平御覽厯左拾遺太宗謂宏曰朕親擇羣材卿與吕蒙正皆中朕選纍官吏部侍郎真宗朝與王旦知登聞院再舉吏部卒王曽益都人咸平中鄉貢試禮部廷對皆第一楊億見其賦嘆曰王佐器也由將作監丞纍官參知政事真宗末入草遺詔黜丁謂之姦正色獨立朝廷倚以為重仁宗初即位拜平章事每進見言利害事審而中理多所薦拔尤惡僥幸既而太后不恱出知青州景祐元年復拜平章事封沂國公曾進退士人莫有知者范仲淹嘗謂曽曰明揚士類宰相之任公之盛德獨少此耳曾曰夫執政者恩欲歸己怨使誰歸仲淹服其言寶元元年卒諡文正仁宗篆其碑曰旌賢之碑改其鄉曰旌賢鄉凡大臣賜碑篆自曾始王子融本名皥字子融後以字為名曽弟祥符中進士及第纍遷太常丞同知禮院嘗論次國朝典禮因革為禮閣新編上之以其書藏太常權同糾察刑獄知河陽又集五代事為唐餘録六十卷以獻權判大理寺乃取讞獄輕重可為準者類次以為斷例厯官兵部侍郎卒張荷壽光人少師事种放與吳盾魏野楊朴宋澥友善性高潔為文奇澀著過非九篇詩文三卷賈同臨淄人五代時楊光逺反同祖崇率鄉里四百餘家保愚谷山全活者二千人同初名岡篤學好古真宗時登進士命改今名王欽若方貴盛聞同名欲致之固謝不往居八九年始補厯城主簿厯判兖州天聖初上書言丁謂之姦既白宜明告天下正符瑞之謬罷宫觀崇奉歸不急之衛兵收無名之實費又言寇準忠亮貶黜宜還之內地再遷殿中丞知棣州卒其友及門人諡曰存道先生楊光輔安邱人居莒州之馬耆山學者多從受經真宗時州守王博文薦為太學助教孫奭知兖州又薦為太常寺奉禮郎州學講書仁宗詔至命説尚書光輔講無逸一篇時年七十餘論説明暢帝恱欲留為學官固辭以國子監丞老於家子安國五經及第厯翰林侍講學士在經筵二十七年仁宗稱其行義淳質纍遷給事中卒傅霖青州人少與張詠同學霖隱不仕詠既顯求霖三十年不可得真宗時詠知陳州來謁閽吏白傅霖請見詠責之曰傅先生天下賢士吾尚不得為友汝何人敢名之詠因問昔何隱令何出霖曰子將去矣來報子耳詠曰詠亦自知之霖曰知復何言翌日别去後一月詠卒周沆益都人第進士知渤海縣厯開封府推官湖廣蠻唐盤二族寇暴以沆為轉運使朝廷用沆策二族皆降儂知高亂定仁宗命安撫廣西諭之曰嶺外地惡非賊所至處母庸行對曰君命仁也然遠民罹塗炭當宣布天子德澤遂往遍行郡邑擢河北都轉運使李仲昌建六塔河之議以為費省而功倍語沆行視沆言此役若成河必泛溢齊博濱棣之民其魚矣英宗時以户部侍郎致仕卒李之才青社人天聖中進士為入朴率從河南穆修受易修易受之种放放受之陳摶其圖書象數變通之妙秦漢以來鮮有知者之才初為衛州獲嘉主簿權共城令時邵雍居母憂之才扣門來謁勞苦之雍再拜願受業於是先示之以陸淳春秋意欲以春秋表儀五經既可語五經大旨則受業而終焉其後雍卒以易名世之才器大難乎識者棲遲久不調尹洙以書薦於葉道卿得應銓改大理寺丞世稱劉義叟厯法遠出古令上實之才授之寶厯五年卒邵雍表其墓按宋史本傳之才青社人世記三王世家注齊在東方故曰青社又益都縣有青社驛古人文字類稱青州為青社吏文遂相沿不改附記於此趙師民臨淄人九歲能屬文舉進士第孫奭辟兖州説書領諸城主簿師民學問精博奭自以為不及年五十來京師宋郊韓琦等列薦至檢討崇正殿説書遷宗正丞趙元昊反上書陳十五事及請任方面以圖報效在經筵十餘年甚見器異三遷刑部郎中復領宗正卒師民淳靜剛敏幼孤哀感年四十四始婚專以讀書為事勤於吏治政有惠愛趙禹青州人仁宗時上書言趙元昊必反宰相以禹狂言徙建州後元昊果反禹至京自理宰相怒下開封獄陳希亮言禹可賞不可罪乃以禹為徐州推官麻仲英臨淄人博學有行以親不逮養不肯仕韓琦富弼守青州致書幣薦其行義召為國子監助教東州學者咸尊師之明鎬安邱人進士補蘄州防禦推官仁宗時遷太常博士還朝帝問鎬所能薛奎稱其沉摰有謀能斷大事為陜西轉運使常閲同州廂軍得材武者三百人教以強弩奏為清邊軍最驍悍陜西河東頗仿置之王則叛命鎬為安撫使副文彥博平貝州以功拜參知政事卒諡文烈盧士宗昌樂人舉五經厯提點江西刑獄侍講楊安國以經術薦之仁宗御延和殿詔講官悉升殿聽其講易明日復命講泰卦授天章閣侍講賜三品服纍進銀臺司英宗時出知青州八辭帝曰學士忠純之操朕所素知豈當久處外及見諭知人安民之要勸帝守祖宗法神宗時以禮部侍郎致仕士宗以儒者長刑名之學前後在刑部審刑十餘年而主於仁恕任顓壽光人進士賜第擢鹽鐵判官仁宗時陜西鑄康定大錢顓曰壞五為一以一當十恐犯者衆卒如其言夏人納𣢾遣使要請十一事顓押伴曉以義辭折而去又遣使來欲自買賣且通青鹽增歲賜詔許置榷場其議多顓所發厯判三司憑由司為諒祚册禮使采托西夏風物山川道里出入攻取之要為治戎精要三篇上之進直史館遷河東轉運使厯知潭州渭州徒徐州以太子賓客致仕積官户部侍郎孫唐卿青州人少有學行年十七以書謁韓琦琦甚器之景祐中以進士為舉首有名通判陜州權府事於吏事若素習民有母再適人而死及葬其父盜母之喪而同葬之有司論以法唐卿曰是知有孝而不知有法耳乃釋之以聞未幾丁父憂毁瘠吐血而卒詔賻其家張擇行益都人進士起家為北海臨沂主簿厯右司諫與唐介包拯共論張堯佐除節度宣撫兩使不當語甚切又論河北兵多財不足願分兵就食內地不報遷户部郎中集賢殿修撰卒朱壽隆諸城人以蔭知九龍縣所至有聲以少府監知楊州終壽隆為人和厚而不屈於權貴狄青討賊欲殺禆將不用命者數人壽隆論罪不當死青感其言乃止蘇丕益都人有高行少時一試禮剖不中拂衣去居瀰水之濱五十年不踐城市歐陽修言於朝賜號曰沖退處士王贇青州人元豐元年贇父為人毆殺贇幼未能復讐幾冠刺讐斷支首當斬帝以殺讐祭父又自歸罪其情可矜詔貸死刺配鄰州韓晉卿安邱人為童子時日誦書數千言長以五經中第由主簿厯知同州壽州奏課第一元祐中官大理卿晉卿自仁宗朝巳典訟臬數與王安石等爭議終持之不肯變用是知名元豐置大理獄多內廷所付晉卿持平考核無所上下神宗稱其才諸州請讞大辟執政惡其多將劾不應讞者晉卿曰聽斷求所以生之苟讞而獲譴後不來矣議者又欲引唐日覆奏令天下庶戮悉奏決晉卿言可疑可矜者許上請祖宗之制也四海萬里必繫以聽明命恐自今瘐死者多於伏辜者矣朝廷皆行其説故世推其忠厚不以法家名之趙挺之諸城人舉熙寧進士哲宗朝為監察御史除給事中時蔡京為相帝謀置右輔京薦挺之隨拜尚書右僕射既相屢陳京姦惡且請去位避之帝因盡除京諸蠧法罷京召挺之見曰京所為一如卿言加挺之特進仍為右僕射卒諡清憲仇悆益都人大觀中進士授邠州司法所至有惠政南遷知廬州募兵復壽春張浚視師悆為畫䇿不用以忠義勉牛臯臯奮勇所向披靡寇遂自潰以悆克復守禦功加徽猷閣待制纍遷寶文閣學士陜西都轉運使秦檜以為異己落職從積官至左朝議大夫爵益都縣伯陳規安邱人中明法科靖康末為安陸令建炎元年知德安府倣古屯田制條上營屯田事宜詔嘉奬仍下其法於諸鎮屢立戰守功遷直學士知順昌府金兵將至會劉錡領兵赴京留守過境規迎至告以死守計布設粗畢而金兵薄城規與錡巡城督戰纍挫敵鋒烏珠自將鐵浮圖軍來援規勉激諸將軍殊死鬪斬獲無算烏珠遂還奏功遷樞密直學士移知廬州以疾卒有攻守方略傳於世規端毅寡言笑以忠義自許功名與諸將等而位不酬勞時共惜之烏珠舊作兀术今改正張所青州人登進士第厯監察御史高宗即位遣所按視陵寢還上疏論還京師有五利又條上兩河利害帝欲以其事付所會所言黃潛善姦邪責所團練副使安置江州李綱入相乃以所充河北招副使一切以使宜從事所方招來豪傑以王産為都統制嶽飛為準備將而綱已罷相所落直龍圖閣嶺南安置卒於貶所金劉珫益都人以功臣子補閣門祗候海陵忌宗室珫坐與往來斥居鄉里世宗即位珫兼馳上謁帝太恱呼其小字而謂之曰太平庶幾贊朕至大平矣纍遷左宣徽使以疾求補外除定海將軍節度使弟璣舉進士為國子祭酒太常少卿常同知漕運言省費事又嘗為户部員外郎條上便宜世宗嘉納之元樂均用益都人讀書斥口耳之學中統中守臣強之仕不受徙嶺南怡然就道嶺南守臣復薦之亦辭不受綦公直樂安人初為益都勸農官至元十年世祖知其勇召見同行荆南等處招討司使破宋軍奉旨從諸軍南伐至隆興宋軍突出公直敗之由是南安吉贛皆望風𣢾附公直又令第三子莽噶岱攻梅關入廣東至南海皆下之纍功授輔國上將軍都元帥宣慰使鎮别十八里請葬父以行至家計樂安梲課及貧民逋負悉以賜金代輸之後諸王海都叛侵别十八里公直從丞相巴顏進戰敗之追擊浸遠授兵不至第五子瑗力戰而死公直與妻及莽噶岱俱陷焉莽噶岱奔還為湖州萬户討衢州山賊有功加昭勇大將軍莽噶岱舊作忙古台今改正王英益都人有大節膂力絶人襲父職為莒州翼千户父子皆善用雙刀人號刀王討賊屢立戰功厯官懷遠大將軍至元三年賊李志甫起漳州劉虎仔起潮州時英巳致仕平章政事巴咱爾謂僚佐曰是非刀王不可乃使迎致英據鞍橫槊精神飛動及賊平英之功居多至正中毛貴陷益都英年已九十有六謂其子宏曰吾世受國恩今老矣縱不能事戎馬以報天子尚忍食異姓之粟以求生乎水漿不入口者數日遂卒巴咱爾舊作伯撒里今改正于欽益都人由助教纍官侍郎奉命山東周覽山川考水經地紀厯代沿革著齊乘六卷劉蕃樂安人為西臺御史彈劾無所避纍官中奉大夫遼陽行省參政治書侍御史傅公讓益都人元統初進士纍官亞中大夫西臺御史至正二十年宦者保布哈內恃太子外結吹斯戩驕恣不法公讓劾之左遷松江知府保布哈舊作朴不花吹斯戩舊作搠思監今俱改正齊文郁博興人至正中任山東宣慰僉事明兵下益都郁自縊死藁葬城外植棗樹一株識之枝皆北向其孫振遷葬植榆樹二株枝仍北向明馬愈臨朐人宣德中進士第一授修撰九年特簡史官及庶吉士三十七人進學文淵閣以愈為首正統五年以侍讀學士入閣參預機務愈以文學受知兩朝端重簡默門無私謁嘗奏天下獄久者多瘐死宜簡使者分道決遣帝納焉邊警方命將而别部使至衆議執之愈言賞善罰惡為治之本波及於善非法乘人之來執之不武帝然之厚遣其使厯官禮部左侍郎卒曹凱益都人正統中進士授刑科給事中磊落多壯節英宗北征諫甚力帝不從果陷凱慟哭竟日與王竑共擊馬順至死景泰中遷左給事中時令輸豆得補官凱爭曰近例輸豆四千石以上授指揮彼受祿十餘年費巳償矣乃令之世襲是彼取息長無窮也乞自今惟令帶俸不得任事傳襲文職則止原籍帶俸帝以為然命未授者悉如凱議用薦擢浙江右參政在浙數年聲甚著初凱為給事嘗劾武清侯石亨亨修前憾遂謫凱衛經厯卒劉珝壽光人正統中進士授編修成化十年厯吏部侍郎充講官如故每進講反覆開導詞氣㑆侃聞者為悚明年以本官兼翰林學士入閣預機務帝每呼東劉先生進户部尚書加太子太保乞休珝初遭母喪廬墓三年比歸父殁復廬於墓宏治中卒諡文和子鈧八歲時憲宗召見愛其聰敏命為中書舍人宫殿門閾高嘗提之出入厯官五十餘年嘉靖中至太常卿仍供事入閣鈗博學有行誼與長洲劉棨並淹貫故時稱二劉趙鑑壽光人成化中進士除蕭山知縣擢御史按宣大時邊帥久不進鑑上疏劾之又陳方略甚悉於是兵將奮勇連戰皆捷寇為遁去與劉瑾忤出知順德府正德八年進右副都御史巡撫甘肅恤民募兵大修邊務乃諭吐蕃復哈密侵地帝璽書嘉勞嘉靖二年厯官刑部尚書命按治諸巨姦咸得其情宸濠之叛宗室坐繫者衆鑑上疏請釋其株連者獲全二百餘人五年致仕卒諡康敏張文錦安邱人宏治中進士授户部主事正德初為劉瑾所陷逮繫詔獄斥為民瑾誅起故官再遷郎中督稅陜西條上籌邊𥙿民十事遷安慶知府度宸濠必反與都指揮楊鋭為禦備計宸濠浮江下文錦等慮其攻南都令軍士登城詬之宸濠乃留攻卒不能克璽書褒美擢太僕少卿嘉靖元年拜右副都御史巡撫大同三年文錦議設五堡堡成欲徙鎮兵戍之為亂兵所殺萬厯中追諡忠愍翟鑾諸城人家京師宏治中進士入翰林學優經濟明習典章厯官至大學士時張璁桂萼用事鑾守職奉法不敢阿比卒諡文懿馮裕臨朐人以戌籍生於遼東師事賀欽有學行正德初舉進士授華亭令厯知晉州所至多惠政遷户部郎數忤權貴乃密遣人偵伺𥙿闕失無所得益重之出守貴州遷副使先後七年屢建平蠻功解官歸卒顧鐸博興人正德初流賊入境鐸父殁未殮獨居守見賊劈踊無懼容賊曰空城中惟此一人必孝子也舍去後登進士為刑部郎中率同官抗疏論大禮被廷杖出為汝寧知府厯官太僕卿蔣暘樂安人正德中進士知沭陽縣擢御史督鹽河東及巡畿輔平羊山寇擒妖賊以千數時論偉之後忤權貴謫居吉州遷貴州兵備致仕陳經益都人正德中進士擢兵科給事中忠直敢言武宗末劾奏宸濠江彬餘黨帝覽疏顧左右曰此髯給事中也世宗時纍遷兵部尚書加太子少保時邊警日至經殫心籌畫條上防禦事宜帝皆允行邊臣議復河套經力陳其不可忤宰執意因乞致仕卒李舜臣樂安人生而警敏日記千言嘉靖中會試第一授户部主事厯官尚寶卿日惟閉門讀書考究六藝升應天府丞均賦愛人有惠政時宰忌之致仕屢薦不起馮惟訥𥙿子嘉靖中進士知宜興縣厯浙江督學剔使纍遷江西左布政入覲核吏能否部稱之曰鑿然不存兩可者獨馮公也以老乞休進光祿卿歸訥性孝友厯官所至皆奉母以行夜必候户外問寢食然後退所著有輯古詩紀等書馬文煒安邱人嘉靖中進士知確山縣折獄如神入為御史巡鹽兩淮上便宜六事報可積羡金十餘萬俱抵正額商困乃蘇厯守德安表二千石尤異煒名居首擢副使治兵荆南帝為江陵相張居正治第監奴橫行文煒縛置於獄中貴愧謝乃巳後巡撫江西以十事要約屬吏執法頗嚴中蜚語有旨改南京遂歸家居十八年卒李用敬益都人由進士擢給事中嘉靖中劾仇鸞驕縱趙文華督師劾張經用敬復上疏救理廷杖落職隆慶時復起用冀練益都人嘉靖中進士知長安縣以治行聞擢户部主事以抗直久不調嚴嵩敗纍擢光祿少卿神宗時至户部侍郎生平嚴敬自持言笑必謹不為矯激喜容接後進居官以清勤著卒諡端恪傅應兆臨朐人嘉靖中進士授平涼訓導以良知主敬主靜之説皆空言無徵獨主喻義以為士行準繩歸三十餘年卒私諡清毅先生石茂華益都人嘉靖中進士知濬縣厯知揚州府有破倭功纍遷右僉都御史巡撫甘肅轅門卒嘗以賞不時給羣譟茂華至立誅渠魁數人一軍懾服進右都御史總督陜西三邊軍務邊外要市諭以期額咸受約束其傍七十一部皆請命為外臣奏功拜兵部尚書致仕數年再總督三邊值早飢至人相食茂華日夜露禱得大雨復奏請蠲賦發倉全活者數千萬居秦六月竟以積勞嘔血卒將吏莫不流涕諡恭襄丁應璧壽光人嘉靖中進士授兵部主事值振武兵變朝議欲分其黨莫敢先發應璧假他事去其魁分置部位一軍乃定升南昌知府盧廷器昌樂人性勇烈起卒伍嘉靖中以把總征倭與子璿俱戰殁詔廕一子立祠祭之臧惟一諸城人嘉靖中進士厯文選郎中萬厯時纍遷順天府尹奏行寬恤十事巡撫河南詔取麒麟皮惟一疏諫忤旨遂乞歸終南京兵部侍郎卒子爾勸萬厯中進士厯官有政績開府寧夏大殱孛氏餘寇於賀蘭山入為兵部侍郎乞歸姪爾令天啓中進士擢禮部主事厯方面移疾歸崇禎十五年城破殉難邱蕣諸城人嘉靖中進士由行人擢刑科給事中帝久不視朝蕣言權臣不宜獨任朝綱不宜久弛嚴嵩深憾之隆慶中進大理少卿病免萬厯中擢左副都御史陳吏治積弊八事疏入帝稱善敕所司下撫按奉行不如詔者罪頃之又言積弊如故自劾不職請罷斥以警有位帝優詔報之拜南京吏部尚書卒諡簡肅石繼芳益都人嘉靖中由猗氏學博擢知桐城縣催料不優聽訟平允遷錦衣衛經厯衛帥毛澄私鬻校尉官上章劾之擢寧夏副使總兵哱拜有叛志因收其權裁之以法並請增牙兵備之未集而難作遂死焉朱鴻謨益都人隆慶中進士授吉安推官識鄒元標於諸生厚禮之擢南京御史元標及吳中行等以論張居正得罪鴻謨疏救語侵居正居正怒斥為民既歸杜門講學居正卒起故官出按江西撫應天蘇州十府皆有政聲厯官刑部右侍郎諡恭介馮子咸惟健子少孤事母孝母疾不解衣者踰年母殁哀毁骨立萬厯初舉於鄉再會試不第遂下赴講求濂洛之學嘗曰為學須剛與恆不剛則隳不恆則退治家宗顔氏家訓鄉人率其教多為善良馮琦裕曾孫幼頴敏絶人年十九舉進士授編修進侍講充日講官厯庶子三王並封議起移書王錫爵力爭之纍遷吏部侍郎涖政勤敏力抑營競萬厯二十七年災異數見琦草疏偕尚書李戴極言信用姦徒搜括民財之害拜禮部尚書東宫册立期迫中官以供費不給為詞琦弟户部主事瑗適輦餉銀四萬出都琦立追還給費事乃濟三十年帝有疾諭停礦稅既而悔之琦與同列合疏爭湖廣稅監陳奉以虐民撤還琦言遼東高淮等肆虐不減於奉並乞徵還帝將簡琦入閣為沈一貫所阻尋病卒遺疏請勵明作發章奏補缺官推誠接下收拾人心語極懇擊帝哀悼贈太子少保天啓初諡文敏趙秉忠益都人萬厯中殿試第一官翰林分校禮闈得孫承宗典試江南得張瑋姚希孟周順昌充日講官請加建文廟號纍遷禮部尚書以忤魏忠賢削籍曹珖益都人萬厯中進士授户部主事衛軍貸羣璫子錢償以月餉珖命減息軍困稍蘇補兵部巨璫私人求大帥珖不可厯南京太常少卿紅九議起珖力言宜窮姦狀天啓初加光祿卿厯大理卿值魏忠賢亂政請告歸御史盧承卿厯攻東林詆珖狎主邪盟遂削奪崇禎中拜工部尚書桂王重建府第議加江西河南等省賦十二萬有奇浙江逋織造銀十餘萬請編入正額珖皆持不可與中官張彝憲不協乞歸屢薦不起家居十四年卒張僎壽光人萬厯中進士授平陽推官性直亮平恕聽獄明允務期得情崇禎十五年城陷殉難十一年本朝乾隆四賜諡節愍顧頤博興人萬厯中進士纍官遼東參政殉難十一年本朝乾隆四賜諡節愍成勇樂安人天啓初會試對䇿極言宦官之禍被放又三年武進士同年邀謁魏忠賢持不可厯任推官崇禎時擢南京御史楊嗣昌奪情入閣黃道周諸人言之俱獲譴勇憤抗疏紏之遣戍寧波著有周易發西銘解等集孫康周安邱人天啓辛酉舉於鄉為遵化令有善政尋授太原守崇禎甲中春流賊至蒲坂以北郡縣靡然從之公謂同官曰睢陽之節見於今日嬰城固守城陷不屈死之本朝乾隆四十一年賜諡節愍李獻明壽光人崇禎初進士授保定推官二年遵化被圍時獻明以察核官庫在城中或謂此邑非君所轄去無罪獻明正色曰莫非王土安敢見危避難請守東門未幾城破死之本朝乾隆四十一年賜諡節愍李廉仲諸城人崇禎中進士知任邱縣廉潔有聲十一年城陷身冒矢石死於城下一門皆遇害丁茂桂壽光人以貢士知平谷柏鄉二縣皆有政績崇禎十五年城陷殉難本朝乾隆四十一年賜諡節愍謝耀臨淄人性至孝遇兵火守父柩不去死之張文浩博興人以貢生授安肅訓導遇亂或曰公無守城責文浩曰學官非國家臣子即分汛固守城陷死之本朝乾隆四十一年賜諡節愍來儀字爻先臨朐人崇禎中進士知蘭陽縣崇禎末與賊李自成戰身受三矢被執不屈賊囚之乘間脫歸謁撫按陳賊可圖狀詔命儀參軍未幾京師陷儀募豪傑赴難偽將襲執之義兵殺偽將儀獲免後為土寇所害本朝孫廷銓博山人順治二年薦授河間推官擢吏部主事纍遷吏部侍郎晉兵部尚書再遷户部拜大學士廷銓以銓曹起家於銓事最久以慎名器通淹滯為己任及入相勤修庶政終嵗未嘗休沐以終養歸里康熙十三年卒諡文定馬國徵傅興人順治舉人性純孝居喪三年未嘗見齒知大名縣不用鞭朴教化大行至歲終無爭訟者卒祀鄉賢名宦祠王荃可益都人順治丙戌進士以御史巡按粵西勞來安輯布朝廷威德墨吏皆望風解綬會滇寇猝至日夜拒守力盡被執不屈死之贈太僕少卿廕一子李邦彥益都人以貢生授汶上訓導順治三年土寇犯汶上邦彥與知縣分汛拒守力盡賊突入邦彥率僕從力戰殺十餘人被執不屈死祀名宦鄉賢祠馮溥臨朐人性英敏博綜經史順治丁亥進士授編修纍遷侍讀學士尋升吏部侍郎康熙初廷議每省遣大臣二人巡察督撫溥持不可乃止升左都御史有申嚴職任省刑薄斂諸疏未幾遷刑部尚書拜大學士在閣二載年七十四告休歸里加太子太傅卒諡文毅劉果諸城人順治已亥進士為太原推官改河間知縣俱著能聲入授刑部主事修大清律於條例異同多所訂正丁內艱歸遂不復起弟棨康熙乙丑進士由長沙令纍遷江西按察使多所平反旋擢四川布政使以勞卒於官張貞安邱人康熙壬子拔貢生善古文詞己未舉博學鴻詞以親喪不就所著有半部稿或語潛州集青州鄉賢傳安邱鄉賢傳諸書閻世繩昌樂人少孤力學康熙丙辰進士纍官左諭德告歸以曾孫循琦貴贈工部尚書有文集行於世李華之諸城人康熙丙辰進士由中書觀察粵東時瓊州洞黎猖獗華之單騎往諭更為布置營伍兵黎相安至今帖然香山澳門海寇竊發奉檄往剿不兩月而平厯湖北貴州按察使丹雲南布政使官終刑部侍郎楊定國益都人以軍功授福建漳州守備時海賊圍海澄定國冒死往救𬒳陷不屈支解死康熙十七年贈都司僉書廕一子王沛憻諸城人康熙甲子舉人四十三年邑大飢沛憻倡鄉紳認賑之法各量力賑其親族鄰里請以官米減價平糶人不知為歉歲厯任至廣西布政使五十八年聞邑中稍旱亟遺書其子命出家粟千石助賑雍正八年邑又大水沛憻家居仍倡率分賑縣人德之李澄中諸城人工詩文由博學鴻詞厯官翰林院侍讀致仕歸里清白自守足迹不入城市著有卧象山詩集艮齋文選諸書行世閻福玉安邱人由行伍纍遷黃巖鎮遊擊康熙五十一年巡海至牛頭門遇賊船相持盡日為飛炮所傷而死加贈副將廕一子崔仁益都人性至孝親喪廬墓終身劉統勳諸城人雍正甲辰進士授編修入直南書房洊升尚書為軍機大臣授大學士練達端方秉公持正有古大臣之風既膺簡任凡讞大獄督大工悉承命往蒞事無弗治者乾隆二十八年兼管翰林院掌院學士命為尚書房總師傅三十八年卒贈太傅諡文正入祀賢良祠閻循奇世繩曾孫乾隆壬戌進士厯官工部尚書以老成厯練為高宗純皇帝深知卒諡恭定從弟循觀性至孝丙戌成進士官吏部考功司主事有文集行世劉墉統勳子乾隆辛未進士授編修督學安徽以留心政體除山西太原江蘇江寧知府遷陜西臬司尋授內閣學士入直南書房旋由吏部侍郎出撫湖南署直隸總督晉吏部尚書命在尚書房總師傅上行走五十年授體仁閣大學士墉於政事外尤善書嘉慶七年卒於官贈太子太保諡文清入祀賢良祠王垂重諸城人由監生議敘四川縣丞改補潼川府經厯洊丹同知嘉慶三年署忠州事值寇至率紳士鄉勇邀擊之賊衆抵禦垂重受傷陳殁贈雲騎尉流寓漢嚴光一名遵會稽餘姚人少有高名與光武同遊學及光武即位光變名姓隱居不見光武思其䁂乃令以物色訪之後齊國上言有一男子披羊裘釣澤中帝疑為光乃備安車元纁遣使聘之三反而後至趙岐京兆長陵人延熹初避仇逃難四方自匿姓名賣餅北海市中安邱孫嵩藏之復壁中數年岐作厄屯歌二十三章薑肱彭城廣戚人靈帝時拜太中大夫詔書至門肱使家人對云久病就醫遂羸服間行竄伏靑州界中賣卜給食召命得斷家亦不知其處宋張邵烏江人建炎三年假禮部尚書充通問使至濰州翼日見左監軍撻攬命邵拜邵曰監軍與邵為南北朝後臣無相拜禮且以書抵之撻攬怒執邵送密州囚焉金時茂先日照縣沙溝酒監寓居諸城紅襖賊方郭三據密州過其村居民相率迎之賊以元帥自稱茂先怒謂衆曰此賊首耳何元帥之有方郭三聞而執之斷其腕茂先大罵賊復剔其目亂刀銼之至死罵不絶詔贈武節將軍同知斤州防禦使事列女漢緹縈臨淄人淳于意少女文帝四年意以刑罪當傳西之長安意有五女隨而泣意怒罵曰生子不生男緩急無可使者於是緹縈隨父西上書願入身為宫婢以贖父刑書聞帝悲其意此歲中遂除肉刑法晉左芬臨淄人左思妹少好學善綴文名亞於思武帝聞而納之泰始八年拜修儀後為貴嬪以才德見禮嘗獻楊皇后誄受詔作悼后頌及萬年公主誄其文甚麗帝每有方物異寶必詔為賦頌以是屢獲恩賜有答凡書及雜賦頌數十篇行於世唐房元齡妻盧氏臨淄人元齡微時病且死語曰吾病革君年少不可寡居善事後人盧泣入帷中剔一目示元齡明無他會元齡良愈禮之終身五代王凝妻李氏青州人凝為虢州司户參軍卒於官李氏攜幼女負骸東歸過開封旅舍主人不許其宿牽其臂出之李氏慟曰吾為婦人而此手為人所執耶即引斧斷其臂歐陽修五代史馮道傳論載其事甚詳宋毋卭妻馬氏益都人卭父母死負土成墳馬從卭朝夕哭三年不衰張廷榮妻王氏壽光人廷榮進士宣和末賊邢真執榮與父王以金帛贖之又欲逼其從王怒罵不止逐𬒳殺元焦士廉妻王氏博興人養姑至孝至正十七年毛貴作亂官軍競出虜掠王氏被執紿曰我家墓田有藏金可共取也信之隨王氏至墓所王氏哭曰我巳得死所矣實無藏金汝可於此殺我乃與妾杜氏皆遇害明常氏女名小課博興人正德六年年十六流賊犯境聞女美執其祖富以刃加頸脅之女聞自土窖中躍出曰我在此賊遂捨富將女女見富巳脫遂大罵賊支解之蓋耀妻顧氏博興人年十七歸耀三年耀卒氏水漿不入口者數日親戚勸慰乃食奉舅姑甚孝厯二祀舅卒未幾姑卒葬畢即以資財分給諸婢子自縊死顧思源妻張氏博興人思源青州衛千總城陷張與思源俱被執思源遇害兵欲犯張張大罵曰願夫婦同死一處兵怒殺之楊氏女博興人年十六字而未嫁賊入城女謂祖母王氏曰賊入城矣不可落賊手即投灣水而死王亦隨之死賊退家人求其尸兩尸手相挽不可解顏色如生李揚休妻張氏高苑人嫁甫七月揚休病殁號哭幾絶即日自經於椸上李珽妻張氏高苑人珽疾篤謂珽曰君不諱妾願從死巳而珽死遂自縊於柩側蕭氏女樂安人宗輔女正德中賊陷城女為所執罵賊支解而死詔建祠西門外劉允升妻隋氏樂安人夫亡水漿不入口母及姑使人守之閲月父語之曰汝年少而吾家富别求佳偶至易也氏佯許守者稍怠潛入室自縊死臧氏二婦昌樂人一臧宿妻一臧奉亭妻俱逸其姓正德七年並為流賊所執不從被殺盧文燦妻劉氏昌樂人廷器孫嘉靖中廷器與子璿戰殁文燦又早卒氏泣數日自縊死魏汝憲妻馬氏臨朐人汝憲為諸生病亡氏年十六不食三日誓必死家人防之稍懈自縊柩前謝惠妻孟氏臨朐人夫病垂絶孟先自縊夫及見之乃瞑林試妻李氏臨朐人試家甚貧清明日死氏慟絶比試斂以頭觸棺呼曰少待我當偕葬也夜半息漸微有頃死彭氏女安邱人幼字王枚臯未嫁枚臯殁誓不再適濰縣丁道平密囑其父欲娶之女察之六日不食道平悔而止心敬女節烈後聞其疾革贈以棺女語父曰可束葦埋我亟還丁氏棺地下欲見王枚臯也遂死王氏女名九栗安邱人年方及笄正德六年流賊劫城九栗與鄰人韓氏女詐為男子服為黠賊所識欲汚之九栗大罵不從賊怒剚劍於胸猶罵不絶口碎首而死高氏女安邱人正德七年流賊劫鄉村女避古墓中為賊所得復投井中不死賊綆出欲汚之女罵不從賊以刃脅之血濺頸將死猶罵不絶李敬中妻胡氏諸城人祖麗明為遂平知縣女年十七歸敬中生一女而夫卒哭踊甚哀比三日不哭盥櫛拜舅姑堂下曰婦不幸所天無子將從死者地下不得復事舅姑幸強飯自愛他日叔有子為亡人立嗣嵗時祭麥飯足矣姑及其母泣止之不可乃焚香告柩前顧家人曰洗含汝等親之不可近男子遂入室距户自縊母與姑捶門痛哭疾呼終不顧而死于通妻趙氏臨淄人崇禎中避難穴地而居通母被執通語賊曰有妻在可供使令亟呼趙出趙時年十七歸甫十七日厲聲罵賊延頸受刃母獲免魏琯妻劉氏壽光人琯官兵部侍郎崇禎十五年城陷氏與女京姐從容赴井死本朝王嶼妻仇氏益都人夫亡遺一子夫志守節越一年而子又殤人或有搖其志者氏曰烈女不更二夫守節者守夫之節原不在子之有無也夫兄憐其節以子喬年為嗣氏撫育之教以讀書順治二年補弟子員同縣石藎妻薑氏亦夫亡守節吕才智妻王氏博興人夫病傴僂家又貧窘氏晝夜操作無怨言會歲祲才智將鬻氏以求活氏曰汝廢人我去汝何依我身值幾何不如同死猶相依也終乞食以養生一子甫晬而夫死人謂其青年子幼必將他適而氏守節無纎毫瑕玷里黨皆稱之同縣樂玥妻許氏夫亡守節張輔武妻何氏高苑人明崇禎壬午之難夫𬒳掠久無音耗姑欲其改適氏以死自誓無子繼叔子為嗣不數年姑亡氏慮叔有異志乃盡以財産歸之叔曰吾未亡人孑然一身漚麻治菅足以自給姪當嗣此物非叔産乎叔由是乃安年七十餘卒同縣蔡錦妻張氏夫亡無子守節三十餘年均康熙年間旌薛應富妻劉氏樂安人夫亡守節有富室子謀欲強娶氏聞之自縊同縣烈婦吳燻妻李氏均康熙年間旌李應兊妻魏氏壽光人年少夫亡生子甫周歲明崇禎壬午負子避兵於紀城之孟氏樓樓焚氏急投烈焰中顱碎骨折母子皆不死乃潛伏榛莽中三日始返故居瓦礫寄棲伯父母家茹荼咽蘖撫孤守節五十餘年康熙二十二年旌夏廷玉妻張氏壽光人廷玉與母俱死於難氏年十八翁年五十九苦節孝養以姪為嗣後子娶媳翁尋殁氏大慟曰可以死矣乃不食七日卒丁煒宗妻劉氏壽光人年二十夫亡事姑甚孝一日所居被火而姑病在狀不能起