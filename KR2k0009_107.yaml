front:
  text: 大清一統志
  hash: sha256:406738661646ea950f323bc71cc52e73878bd2f322464415c37324c3ffec8adb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0009_SBCK_107-1a}
body:
  text: 紹興府名宦漢任延南陽宛人更始元年拜會稽都尉時年十九迎官驚其壯及到靜泊無為會稽頗稱多士延皆聘請省諸卒今耕公田以周窮急郡中賢士大夫爭往宦焉建武𥘉徵為九真太守第五倫京兆長陵人建武中拜會稽太守受俸栽留一月糧餘皆賤貿與民之貧羸者會稽俗多淫祀郡皆莫敢禁倫移書屬縣其巫祝有詐怖愚民者皆案論之百姓以安後坐法徵老小號呼相隨上書守闕者千餘人得免歸里馬臻茂陵人永和中為會稽太守創立鏡湖築塘蓄水周回三百一十里溉田九千餘頃從此郡無凶年劉寵牟平人桓帝時拜會稽太守簡除繁苛禁察非法郡中大化徵為將作大匠山隂縣有五六老叟自若耶山谷間出人齎百錢以送曰自明府下車狗不夜吠民不見吏今聞當見棄去故自扶奉送寵曰吾政何能及公言耶勤苦父老為人選一大錢受之度尚湖陸人桓帝時除上虞長為政嚴峻發摘姦非吏人謂之神明三國吳顧雍吳郡吳人為上虞長有治績孫權領會稽太守不之郡以雍為丞行太守事討除寇賊郡界安靖吏民歸服朱桓吳郡吳人孫權為將軍桓給事幕府除餘姚長往遇疫癘穀食荒貴桓分部良吏隱親醫藥飧粥相繼士民咸感戴之陸凱吳郡吳人黃武初為永興諸暨長所在有治績晉紀瞻秣陵人建興中除會稽內史時有詐作大將軍府符收諸暨令令已受拘瞻覺其詐便破檻出之訊問使者果伏詐妄諸葛恢陽都人元帝時為會稽太守臨行帝謂曰今之會稽昔之關中以君有蒞任之方是以相屈恢蒞官三年政清人和為諸郡首詔增秩中二千石顔含琅邪莘人元帝時令上虞簡而有威明而能斷何充廬江灊人成帝時除會稽內史在郡甚有德政薦徵士虞喜拔郡人謝奉魏顗等為佐吏王羲之臨沂人永和中為會稽內史時東土飢荒輒開倉賑貸朝廷賦役繁重吳會尤甚每上疏爭論之事多見從王述晉陽人穆帝時遷會稽內史蒞政清肅終日無事王彪之臨沂人廢帝時為會稽內史居郡八年豪右斂迹亡戶歸者三萬餘口桓溫下鎮姑孰四方修敬皆遣上佐綱紀彪之獨不遣遂去郡王鎮之臨沂人父隨之上虞令鎮之為剡上虞令並有能名內史謝輶請為山隂令復有殊績南北朝宋謝方明陽夏人武帝時為會稽太守江東民户殷盛風俗峻刻強弱相陵姦吏蜂起符書一下文攝相續方明深達政體不拘文法濶略苛細務存統領貴族豪士莫敢犯禁除比伍之坐判久繫之獄東土稱詠之徐豁姑幕人永初中為山隂令精練法理為時所推禇淡之河南陽翟人會稽太守景平二年富陽孫法先等攻沒縣邑建旗鳴鼓直攻山隂淡之身率所領出次近郊敗賊於柯亭江秉之考城人元嘉初為山隂令民户三萬政事繁擾訟訴殷積階庭常數百人秉之御繁以簡常得無事羊元保南城人元嘉中厯會稽太守亷素寡欲為政雖無殊績而去後嘗見思張𥙿吳人元嘉中除會稽太守素有吏能職事甚理顧凱之吳人元嘉中為山隂令山隂劇邑前後官長晝夜不得休事猶不舉凱之御繁以約縣用無事晝日垂簾門階間寂張岱裕子孝武帝時遷山隂令職事間理齊傅炎靈州人父僧佑宋時為山隂令有能名炎至泰始中亦為山隂令尢明察及髙帝輔政以山隂獄訟煩積復以炎為山隂令縣內稱神明無敢為偷後炎子􅔘亦為令三世官山隂並著竒績世傳傅民有治縣譜蕭子良武帝第二子廾明三年為會稽大守都督五郡宋孝武後徴求急速以郡縣遲緩始遣臺使公役勞擾髙帝踐祚子良陳之請息其弊敦義愛古郡人朱百年有至行先卒賜其妻米百斛蠲一人給其薪蘇周容安城人宋元徽中詔為判令有恩惠百姓思之建元中復為山隂令力請罷勞民雜役沈憲武康人建元中為山隂令政聲大著孔稚圭請假東歸謂人曰沈令料事時有天才陸慧曉吳人武陵王守會稽以慧曉為功曺復為西陽王左軍長史領會稽郡丞行郡事慧曉立身清肅僚佐以下造詣必起送之或謂長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人顧憲之凱之孫為東中郎長史行會稽郡事山隂人吕文度有寵於武帝於餘姚立邸頗縱橫憲之至郡即日除之時西陵戌主杜元懿以吳興歲儉會稽年登商旅往來倍歲求加稅格武帝以示會稽使陳得失憲之極言其實武帝從之由是以方直見知劉元明臨淮人厯山隂令治行為天下第一及去傳􅔘代之問元明答曰我有奇術卿家譜所不載臨別當相示既而曰作縣令惟日食一升飯而莫飲酒此第一策也梁邱仲孚烏程人齊明帝時為山隂令居職甚有聲稱百姓謡曰二傅沈劉不如一邱及武帝踐祚復為山隂令仲孚長於撥煩善適權變吏人敬服號稱神明庾蓽新野人武帝時為會稽郡丞行郡府事時承凋弊之後所在穀貴人多流散蓽撫循甚有治理惟守公祿清節逾厲至經日不舉火太守襄陽王聞而饋之蓽謝不受江革考城人天監中除武陵王長史會稽郡丞行府州事革門生故吏家多在東聞革至並賫持緣道迎候革悉拒不受至鎮惟資公俸食不兼味郡境殷廣辭訟曰數百革分判辨析曽無疑滯人安吏畏百城震恐將還贈遺一無所受惟乘臺所給一舸舸艚偏欹不得安卧乃於西陵岸取石十餘片以實之後人搆亭於江岸名取石亭裴子野聞喜人天監中為諸暨令不行鞭罰人有爭者示之以理百姓稱説合境無訟劉杳平原人普通中為餘姚令在縣清潔湘東王發教褒稱之陳褚玠陽翟人大建中除山隂令縣人張次的等與諸猾吏賄賂通姦全丁大户類多隱沒玠鎖次的等具狀啓臺宣帝遣使助玠搜括所出軍人八百餘户舍人曺義達為帝所寵縣民陳信豪富諂事義達信父顯文恃勢橫暴玠遣使執顯文鞭之於是吏民股栗信後因義達譖玠竟坐免官玠在任歲餘去官之曰不堪自致因留縣境種蔬菜以自給唐姚崇硤石人中宗時為越州刺史人德其惠政李俊之開元中為會稽令增修縣東北防海塘自上虞抵山隂百餘里以畜水溉田太和中令李左次又增修之郭密之天寶中為諸暨令築湖塘溉田二千餘頃崔協博陵人大厯中以户曺攝上虞令歲大旱賦無所出協請蠲不許傾家資代輸之孟簡平昌人元和中為浙東觀察便於山隂縣北開新河又於縣西北十里開運道塘後陸亘又置新徑斗門金堯恭寶厯二年為上虞令於縣西北置任嶼湖及黎湖溉田二百餘頃吳鐐乾寧初為會稽令董昌反問策於鐐鐐曰王為真諸侯遺榮子孫而不為乃作偽天子自取滅亡昌斬之族其家張遜乾寧初為山隂令董昌反召遜知御史臺固辭曰王自棄為天下笑遜不敢以身許也昌怒害之宋畢士安雲中人太平興國中知越州以寬大稱杜守一景德二年以大理丞出知蕭山有德政縣東五里多虎守一為政二年虎負子渡浙江去曾公亮晉江人天聖中知會稽縣民田鑑湖旁每患湖溢公亮立斗門泄水入曺娥江民受其利蔣堂宜興人景祜中知越州州有鑑湖溉田八千頃前守聽民自占多為豪右所侵堂奏復之范仲淹吳縣人寶元中知越州有惠政既去越人祠祀之謝景初陽夏人慶厯初知餘姚始作海塘捍水患禁上豪強占為田立閘及斗門啓閉規則王存丹陽人慶厯中擢上虞令有豪族殺人久莫敢問存至按以州吏受賕豪賂他官變其獄存反罷去張友直隂城人仁宗時知越州州民每春斂財大集僧道士女謂之祭天友直下令禁絶取所斂財以延諸生曾鞏南豐人嘉祜間通判越州州舊取酒務錢給幕牙錢不足賦諸鄉戶鞏立罷之歲飢諭富人自實粟總十五萬石視常平價稍增以豫民民得從便受粟不出田里而食有餘又貸之種糧使隨秋賦以償農事不乏陳舜俞烏程人熙寧三年知山隂縣靑苗法行舜俞不奉令因上疏自劾並極陳其害奏上誦監南康軍鹽酒稅趙抃西安人熙寧中知越州吳越大飢疫死者過半抃畫救荒之䇿療病埋死而生者以全復下令修城使自食其力越人得以不飢張詵浦城人熙寧中通判越州民苦衙前役詵科別人户籍其當役者以差人錢為雇人充皆以為便程師孟吳人熙寧中知越州為政簡嚴罪非死者不以屬吏發隱摘伏如神所部肅然鄭穆侯官人元豐三年知越州先是鑑湖旱乾民因田其中延袤百里官籍而稅之既而連年水溢民逋官租積萬緡穆奏免之遊酢建陽人元豐中調蕭山尉近臣薦其賢召為太學録楊時將樂人知蕭山縣有惠政劉韐崇安人宣和初知越州鑑湖為民侵耕官因收其租歲二萬斛政和間涸以為田衍至六倍􅊢中官應奉租太重而督索嚴多逃去韐請蠲之方臘陷衢婺越大震官吏悉遁或具舟請行韐曰吾為郡守當與城存亡益厲戰守備寇至擊敗之宋旅莆田人宣和中知剡縣方臘犯越越盜起應之縣吏多遁旅遣妻子浮海歸閩獨與民據守以忠義激勸部勒隊伍為豫備計俄而盜大至躬率壯鋭冒矢石雖頗殺獲終以力不敵死之贈朝散郎綦崇禮髙密人紹興四年知紹興府劉豫導金人入侵揚楚震擾髙宗次吳會崇禮以浙東一道為行都肘腋之地備豫不可不謹密疏於朝得便宜從事於是繕城郭厲兵甲輸錢帛以犒王師簡舟艦以扼海道疚心夙夜殆廢食寢及帝還七州晏然王十朋樂清人紹興中擢紹興府簽判既至或以書生易之十朋裁決如神吏姦不行張守晉陵人紹興中知紹興府會朝廷遣三使者括諸路財賦韓球在會稽所斂五十餘萬緡守既視事即求入覲為上言之詔追還三使葉容仙遊人紹興中知上虞縣凡徭役令民自推貨力甲乙不以付吏催租各書其數與民約使自持戶租至庭親視其入帥曺泳令夏稅先期送什之八容請少紓其期泳怒及參大熟民輸租反為諸邑最熊克建陽人紹興中知諸暨縣越帥課賦急克曰但獲罪不忍困吾民他日府遣幕僚閲視有無時方不雨克對之泣曰此豈催租時耶部使者芮輝行縣至其境謂克曰今乃見古循吏為表薦之趙鼎聞喜人紹興中以觀文殿大學士知紹興府後罷相再知府事吳芾仙居人隆興中知紹興府會稽賦重折色尤甚芾以攢宫在奏免支移折變鑑湖久廢會歲大飢出常平米募民浚治之謝深甫臨海人乾道二年調􅌘縣尉歲飢有死道旁者一嫗哭訴曰吾兒也傭於某家遭掠而斃深甫疑焉徐廉得嫗子他所召嫗出示之嫗驚伏曰某與某有隙賂我使誣告耳越帥方滋錢端禮皆薦深甫有廊廟才楊簡慈溪人乾道中為紹興府司理犴獄必親臨端默以聽使自吐露越陪都臺府鼎立簡中立無頗一府吏觸帥怒令鞫之簡白無罪命鞫平日簡曰吏過詎能免今曰實無罪必擲往事置之法某不敢奉命帥大怒簡爭愈力朱子為常平使者首薦之王希吕宿州人淳熙中知紹興府時和買絹最為民病希吕奏減六萬七千匹後守洪邁至核盡絶户四萬八千三百有奇減絹如其數越民始安王信麗水人紹熙初知紹興府奏免逋官錢絹綿米數十萬山隂境有湖四環皆田歲苦潦信創斗門導停瀦注之海築十一壩化滙浸為上腴民更其名曰王公湖築漁浦隄禁民不舉子置學田立義冡衆職修理葛邲吳興人慶元初判紹興府簡稽期會錢榖刑獄必親或謂大臣均佚有體邲曰崇大體而簡細務吾不為也沈作賓歸安人初通判紹興師守邱崈遇僚吏剛嚴作賓從容禆贊每濟以寬慶元中知紹興府韓托胄方用事族有居越者私釀公行作賓捕置於獄而竄逐其雙焉趙彥倓宗室子嘉定中知紹興府時楮價輕彥倓權以法民便之復鹿鳴禮置興賢莊以資其費築捍海石塘亦置莊以備增築會旱第民髙下捐其稅有差免輸湖籍田米舉緡錢四十萬以助荒政民賴以濟汪綱黟縣人嘉定末知紹興府蕭山有古運河西通錢塘東達台明沙漲三十餘里舟行則膠乃開浚八千餘大復創閘江口使淤不得入甃塗十里以達城闉於是舟車利沙諸暨十六鄉賴湖水灌溉勢家多侵為田湖流既束雨輒泛溢為患綱奏奪侵者湖始復舊瀕海塘堤易圮歲害民田綱備緡錢三萬專備修築郡臨海道軍伍單弱乃招水軍教習之寶慶初大水發粟蠲租民以不飢又奏免經總制窠虛額九萬五千緡宿弊盡革黃震慈溪人通判紹興獲海冦僇之後又提舉浙東常平鎮安飢民折盜賊萌芽元葉恆鄞人至元中判餘姚州事海隄決壞恆置石隄令完固自是無海患黃溍義烏人延祜中改諸暨州判官巡海官舸例以三載一新費出於官而責足於民有餘則總其事者私焉溍撙節浮蠧而以餘錢還民姦民以偽鈔結黨脅攘人財官吏聽其謀株連數百家郡府下溍鞫治一問皆引伏民患乃息張升平州人延祐中除紹興路總管初大德至大間越大飢且疫賦稅鹽課責里胥代納吏緣為姦升白行省蠲之平江歲輸海運糧布囊三萬舊今紹興製民苦之更數守置勿問升言麻非越土所生海漕實吳郡事卒請罷之升謹於繩吏果於去民漢故人心悅服李恭關隴人天歷初知餘姚州邑産紅米每別市白米充稅恭請以土産上輸營建廟學乞增置弟子員望湖田數百畒以益其廩宇文公諒吳興人至順中改同知餘姚州夏不雨公諒出禱輒應歲以有年民頌為別駕雨攝會稽縣申明冤滯所活者甚衆台哈布哈至正初紹興路總管革吏弊除設官牛租令民自實田以均賦役行鄉飲酒禮教民興讓越俗大化台哈布哈舊作泰不華今改正于嗣宗錢塘人至正初尹上虞以慈惠稱築石隄捍海默爾古思寧夏人至正中授紹興路録事司逹嚕噶齊尋遷行臺鎮撫治紹興時盜起浙東西郡縣多殘破獨默爾古思保障紹興境內晏然氏愛之如父母後為御史大夫拜珠所殺監察御史珍通糾之冤始白默爾古思舊作邁里古斯達嚕噶齊舊作達魯花赤拜珠舊作拜注珍通舊作真童令俱改正明欒鳳髙郵人太祖兵下浙東以鳯知諸暨州事亷謹愛民院判謝再興謀叛以兵挾鳳鳯不屈刃加頸氣益厲妻王氏以身蔽皆死凌漢原武人洪武初知會稽縣寬間仁恕愛民如子以事還繫久不決按察使陶晟入覲帝知其無罪命釋之召為御史唐鐸虹縣人洪武初知紹興府凡徵賦非土産者悉奏罷之餘姚上虞爭夏蓋湖水利經嵗不決鐸斷以至公民皆悅報李慶順義人洪武末以國子生署右僉都缷史授刑部員外知紹興府威信並濟庭無滯獄暇即躬理園蔬以供朝夕擢右都御史王耕單縣人水樂中知山隂縣有經濟才時方事營建征調繁興耕調劑節約不廢去亦不病民都昶海豐人永樂中知餘姚縣敬禮髙士張一民治事皆得體時營建北都徴發旁午邑恃昶無擾終九年吏莫敢取一錢瀕行民皆墮淚蘇琳蒙隂人正統問知蕭山縣時遣中官取櫻桃於縣索賂不與遂中傷之逮至京琳對曰朝廷以口腹殘民內官以威勢虐命吏臣是以抗之英宗曰直臣也令還職琳曰臣甘受責但求罷貢白是獲免彭誼東莞人天順初知紹興府歲飢輒發廩賑貸吏白當俟朝命誼曰民方急安得循故事耶築白馬閘障海潮厯九載多惠政戴琥浮梁人成化中知紹興府持身亷介馭八邑令長凛凜無犯暇則舉行鄉射每進諸生講論經史尤勤於水利疏防得宜功利甚溥李良山東人宏治初知山隂縣時運河土塘頽圯水溢害稼良甃以石亘五十餘里臧鳳曲阜人宏治中知嵊縣邑治臨大江水漲屢為民患鳳壘石為隄民至今賴之劉麟安仁人正德初出知紹興府劉瑾銜麟除官不謁謝甫五月托細故罷為氏士民醵金贐不受為建小劉祠以配漢劉寵毛伯溫吉水人正德中為紹興府推官每讞獄無縰無枉諸郡邑有訟冤者必求直於伯溫攝理盈案能譽大起尢好敦禮士大夫學行有聞必造門咨訪張煥太和人正德間知山隂縣時海溢漂廬舍煥發粟賑之比歲登今民築塘捍海復於上流建扁拖閘以時蓄泄自是邑無水患湯紹恩安嶽人嘉靖中知紹興府寬和亷信始至新學宫廣設社學歲大旱徒步禱烈日中雨即降緩刑罰恤貧弱旌節孝民情大和郡境諸水滙三工口入海海潮擁沙沙積水阻一遇霪潦不能宣泄良田盡成巨浸紹恩遍行水道於三江口建大閘為洞二十有八啓閉以時閘外兩涯築石隄四百餘大扼潮使不為閘患自是水田盡為沃壤民德之立廟閘左黃綰息縣人嘉靖中由刑部郎中出知紹興府以寬大為治始綰居部時鞫給事中陳洸罪後桂蕚反前案逮綰詣詔獄士民哭聲震野爭致贐綰止取二錢鄭藝莆田人嘉靖中知上虞縣縣舊無城藝始議築倭寇三至不敢犯又築沙湖蓄水濟旱禁豪民占湖以均水利同時薰山令施堯臣嵊縣令吳三畏新昌令萬鵬並以築城保障有功於民許承周崑山人隆慶中知蕭山縣廉敏明肅豪猾屏迹築北海塘以遏潮鄉民賴之田琯大田人萬歷初知新昌縣邑多盜琯每鄉廉真盜一人立為總甲令緝捕盜頓息修築南堤砩禁勢家侵占民利之毛夀南吳江人萬厯中知山隂縣邑有麻溪􅄵􅄵外為天樂鄉田三萬七千有奇為江湖衝齧乃築隄於貓山鄭家山之間以捍外潮民爭赴工不費一緡而事竣史垂則宜興人萬厯中知會稽縣以教養為事鑿曺娥壖地得磽田萬𤱔春耕時緩征徭停勾攝使得盡力農事民肖像祀之劉光復青陽人萬厯中知諸暨縣築麻溪壩導七堰治長墟捍水沿江起大隄開水門以時蓄泄又開通浣江以防泛溢謂之新江水患遂息董羽宸松江人萬厯中知餘姚縣姦民多與倭通羽宸亷得之按以法時鄉豪有殺族屬箝里甲勿以聞羽宸偵知親出其骸荆棘中正豪之罪人皆懾服王章武進人崇禎初知諸暨縣有聲甫半載以才調鄞縣諸暨民與鄞民爭挽章至相譁乃乘夜啓門而去陳子龍華亭人崇禎中紹興推官時東陽許都反聚衆數萬迫郡城巡按左光先以撫標兵命子龍為監軍討之都率卒三千保南寨子龍單騎入營責數其罪諭令歸降復挾都走山中散遣其衆孫蘭無錫人崇禎中知紹興府會嵗飢蘭定賑救法凡二十六則纎悉畢備浙東皆仿行之所全活者以千萬計本朝劉方至山東人順治三年以貢生授紹興推官政清刑簡視上虞篆山賊王嶽夀率衆攻城時守禦孤弜方至力戰死之贈按察司僉事張愫山東貢生知紹興府順治二年海冦鄭成功倡亂紹興姦民應之愫率會稽令官撫渙分設守禦援絶城陷𬒳執脅降不屈死之撫渙罵賊自剄賊支解其尸殺其家屬九人愫贈大僕寺卿撫渙蘄水人贈按察司僉事張邦福蘄水人順治十八年任紹興推官精敏練達摘發如神有訟者訴牒悉置內署勾攝罪犯惟姓名而已故訴者不知其訟訟者不知其訴書吏不能為姦詰訊之下情偽立辨許宏勳遼東人康熙十三年知紹興府耿精忠叛於閩諸暨新城嵊三邑姦民嘯聚圍攻郡城宏勳乘夜率兵出斬其渠魁餘悉撫諭散遣之郡境得安髙登先鍾祥人康熙十三年知山隂縣山賊竊發攻城幾陷登先率民守禦卒以安堵李鐸鐵嶺人康熙中知紹興府餘姚大水漂溺民人廬墓鐸與太守張恢坐贓籍其家詔頒賜羣臣意得珠璣悉以委地帝問故對曰贓穢之寶臣不敢拜帝嘆曰凊乎尚書之言乃更賜以庫錢意敢誎諍數封還詔書臣下過失輒救解之出為魯相卒官謝夷吾字堯卿山隂人少為郡吏太守第五倫擢為督郵舉孝亷除夀張令永平間蝗發泰山過夀張飛逝不集纍遷巨鹿太守所在愛育人物有善績王充字仲任上虞人少孤鄉里稱孝受業太學師事扶風班彪常遊洛陽布肆閲書一見輒能誦憶遂通衆流百家之言後歸屏居教授仕邵為功曺以數諫諍不合去充好論説有理實著論衡二十餘萬言友人謝夷吾薦充才學肅宗特詔公車徵病不行鄭宏字巨君山隂人西域都護吉從孫少為鄉嗇夫大守第五佮行春見而奇之召署督郵舉孝廉伏闕為其師焦貺訟冤躬送貺喪歸其妻子由是顯名授騶令纍遷淮隂大守建初中為尚書令前後所陳有補益王政者著之南宫以為故事元和初拜太尉病篤上書言竇憲之短悉還賜物敕妻子褐中布衣素棺殯殮以還鄉里綦母俊上虞人交址刺史安帝元初三年合浦蠻反遣御史任逴督州郡兵討之俊以蒼梧當合浦下蠻或流劫猝難回顧乃先保障蒼梧後往合浦所向摧靡功當封賞上書歸功於逴自謂致冦當誅詔下美之論者稱俊能讓賀純字仲真山隂人博學有重名安帝時為侍中江夏太守去官與黃瓊楊厚俱公車徵黃昌字聖真餘姚人曉習文法仕郡為決曺刺史行部奇之辟從事後拜宛令發姦伏稱神明遷蜀郡太守斷理莫不得所宿姦大惡皆奔走他境厯官大司農孟嘗字伯周上虞人少修操行仕郡為户曺史辨孝婦之寃後舉茂才遷合浦太守去珠復還人稱神明以病歸隱處窮澤身自耕傭欽其德者就所止而居焉桓帝時尚書楊喬薦之卒於家戴就字景成上虞人仕郡倉曺掾揚州刺史歐陽參奏大守成公浮贓罪遣部從事薛安按究安收就考掠酷慘備至就慷慨直辭神色不變安奇其壯節表釋之浮亦得免太守劉寵舉就孝亷官至光祿主事魏朗字少英上虞人詣太學受五經李膺之徒爭從之初辟司徒府遷彭城令會九真賊起共薦朗為九真都尉厲兵破賊桓帝美其功徴拜議郎遷尚書屢陳便宜有所補益被黨議免歸朱俊字公偉上虞人舉孝廉除蘭陵令光和初拜交址刺史以平賊功封都亭侯黃巾起拜右中郎將討潁川汝南陳國諸賊悉破平之又破黃中賊趙宏等封錢塘侯纍轉河南尹董卓擅政數請徙都長安惡俊異巳然貪其名重表遷太僕以自副俊不受極言西遷非計後卓入關留俊守洛陽俊乃東屯中牟移書州郡請師討卓初平中為太尉李傕郭汜相攻帝詔俊等往諭解汜不從遂留質俊等俊素剛即曰發病卒趙煜字長君山隂人少為縣吏棄去詣杜撫受韓詩究竟其術州召補從事不就舉有道卒於家煜著吳越春秋詩細歷神淵蔡雍讀詩細而嘆息以為長於論衡韓説子叔儒山隂人博通五經尤善圖緯之學舉孝廉與議郎蔡雍友善數陳災青及奏賦頌連珠稍遷侍中終江夏太守盛憲字孝章會稽人舉孝亷纍遷吳郡太守以疾去官憲最有名孫策平定吳會深忌之少府孔融與曺操書徵為騎都尉使命未至為䇿所害三國吳賀齊字公苗山隂人少為郡吏守剡長擊破山越建安初孫策察齊孝廉使領南部都尉事平張雅詹強及洪明等之亂遷威武中郎將討平丹陽黟歙賊又從孫權征合肥與陸遜討破鄱陽賊封山隂侯董襲字無代餘姚人武力過人從孫䇿討平山寇拜別部司馬孫權統事遷偏將軍從討黃祖襲為前部將敢死百人被兩鎧乘大舸突入艨衝裏襲以刀斷兩紲大軍遂進追斬黃祖功第一曺操出濡須襲督五樓船住濡口夜卒暴風左右乞襲出襲不肯船敗襲死虞翻字仲翔餘姚人少好學有髙氣孫䇿命為功曺出為富春長曺操辟不就孫權以為騎都尉數犯顔諫諍權積怒徙翻交州講學不倦門徒常數百人權後褎其亮直令交州給船遣還翻已終歸葬舊墓所著易注及論語國語老子訓注皆傳於世翻有十一子汜最知名仕至交州刺史汜弟忠宜都太守晉征吳忠堅守城潰被害魏滕字周林朗孫性剛直行不茍合雖遭困逼終不回撓初為功曺忤孫策幾殆賴太妃救得免歷鄱陽太守吳範字文則上虞人治厯數知風氣孫權起於東南範委身服事每有災祥輒推數言狀其術多效權以範為騎都尉領太史範為人剛直與親故交有終始素與魏滕善會權責怒滕謂敢有諫者死範髠頭自縛叩首流血言與涕並滕乃得免闞澤字德潤山隂人究覽羣籍兼通歷數孫權以為尚書遷中書令赤烏中拜太子太傅封都鄉侯每朝廷大議經典所疑輒咨訪之鍾離牧字子幹山隂人少居永興躬自墾田種稻臨熟縣民認之牧遂推與縣長召民欲繩以法牧為請釋民慚悔春所取稻送還牧不受民輸置道旁莫有取者牧由此發名纍遷南海武陵太守平五溪夷封都鄉侯子徇拜偏將軍戍西陵晉平吳徇領水軍督臨陳戰死謝承字偉平山隂人博學洽聞嘗所知見終身不忘仕吳拜五官郎中武陵太守撰後漢書百餘卷丁固字子賤山隂人父覽清身立行推財從弟以義讓稱固少喪父獨與母居家貧守約色養致敬初仕為尚書嘗夢松樹生其腹上謂人曰松字十八公也後十八歲吾其為公乎孫皓時遷司徒與陸凱孟宗同心憂國朱育山隂人少好奇字仕郡門下書佐嘗與太守濮陽興問對條答會稽古今人物及漢以來郡治遷徙甚詳敏後位至侍中推刺占射文藝多通皮延字叔然山隂人養母至孝居喪有白鳩巢廬側賀邵字興伯齊孫孫皓時領太子太傅皓政事曰弊邵上疏諫皓深恨之邵奉公貞正親近所憚乃共譖邵遂遇害晉夏方字文正永興人年十四家遭疫癘父母族屬死者十三人方夜則號哭晝則負土凡十有七載葬送得畢廬於墓鳥獸馴擾其旁吳時纍官五官中郎將入晉除髙山令在官三年州舉秀才還家卒夏統字仲御永興人幼孤貧養親以孝聞睦於兄弟每採梠求食星行夜歸或至海邊拘螊􅒹以資養後以母病篤詣洛中市藥遇賈充與語其應如響欲使之仕即俯而不答歸會稽竟不知所終賀循字彥先邵子操尚髙厲言行進止必以禮讓舉秀才除陽羡令徙武康政教大行建武初拜太常時宗廟始建舊儀多關朝廷疑滯皆咨之為當世儒宗卒贈司空諡曰穆循博覽衆書尤精禮傳雅有知人之鑒拔同郡揚方於卑陋卒成名於世虞潭字思奧翻孫忠之子清真有檢操州辟從事厯徙醴陵令張昌作亂潭起兵斬昌又與諸軍共討陳恢平杜􅌢纍遷宗正卿告歸會王含沈充等攻逼京師潭起義軍赴國難事平徵拜尚書出守吳興蘇峻反潭與陶侃郗鑒率衆禦之以前後功封武昌縣侯咸康中進衛將軍潭貌雖和柔而內堅明有膽決屢統軍旅鮮有傾敗終開府侍中卒諡孝烈兄子􅔎字思行有才望官至光祿大夫虞喜字仲安餘姚人少立操行博學好古纍徴不就郡察孝亷司徒辟公車徴拜博士皆不就咸康初何充疏薦喜髙尚邈世博聞強識詔以散騎常侍徴之又不就永和初有司議祧廟不能決朝廷遣使就咨之喜專心經傳又釋毛詩略注孝經為志林三十篇凡所著𫐠數十萬言孔愈字敬康山隂人幼孤養祖母以孝聞建興中纍遷侍中太常蘇峻反愈朝服守宗廟峻平溫嶠執愈手流涕曰持古人之節歲寒不凋者惟君一人耳轉尚書左僕射出為會稽內史句章縣有漢時舊陂愈為修復溉田二百餘頃皆成良業在郡三年乃營侯山下數畝地為宅草屋數間便棄官居之卒諡曰貞子汪字德澤位至侍中遷廣州刺史甚有政績次子安國亦以儒素顯歷尚書左右僕射楊方字公回會稽人好學有異才賀循稱之司徒王導辟為掾遷司徒參軍求逺郡欲間居著𫐠補髙梁太守在郡積年著五經鉤沈更撰吳越春秋行於世丁潭字世康固孫同郡孔愈字敬康張茂字偉康潭與齊名號會稽三康初為郡功曺察孝亷除郎中太興三年出為東陽太守以清潔見稱成帝時為侍中蘇峻亂帝蒙塵於石頭潭隨從不離帝側峻誅賜爵永安伯卒諡曰簡張茂字偉康山隂人少單貧有志行元帝時為吳興內史沈充反與三子並遇害弟盎為周札將軍充攻札亦死之虞預字叔安喜弟少好學有文章庾亮諸葛恢薦其才行召為著作郎進散騎常侍著晉書四十餘卷會稽典録二十篇孔羣字敬林愈從弟有智局志尚不羈蘇峻入石頭時匡術有寵於峻賓從甚盛羣與愈同行於橫塘遇之愈止與語而羣初不視術術怒欲刃之愈抱術乃免仕厯中丞子沈字德度與魏覬虞球虞存謝奉並為四族之俊孔坦字君平愈從子少方直有雅望元帝為晉王以坦為世子文學遷尚書郎王敦反與虞潭起義討沈充咸和中纍拜侍中時帝委政王導坦每從容勸帝宣博納朝臣咨諏善道由是忤導出為廷尉以疾去職卒諡曰簡謝沈字行思山隂人少孤事母至孝博學多識內史何無引為參軍以母老去職耕耘之暇研精墳籍康帝即位朝議疑七廟迭毁禮徵為太學博士以質疑滯遷著作郎撰晉書三十餘卷後漢書百卷及毛詩漢書外傳其才學在虞預右王徽之字子猷羲之子家於會稽性卓犖不羈嘗雪夜泛舟剡溪訪戴逵造門不前而返人問故曰乘興而來興盡而返豈必見安道耶性愛竹寄居空宅中便令種竹曰何可一日無此君仕至黃門侍郎王獻之字子敬羲之子髙邁不羈嘗與兄徽之操之俱詣謝安既出客問兄弟優劣安曰小者佳客問故安曰吉人之辭寡以其少言故知之工草􅊢七八歲時學書羲之嘆曰此兒後當復有大名太元中拜中書令卒諡曰憲謝敷字慶緒會稽人性澄靜寡欲入太平山十餘年徵召皆不就初月犯少微少微一名處士星占者以隱士當之譙國戴逵有美才人或憂之俄而敷卒南北朝宋孔靖字李恭愈孫為會稽內史釐整浮華剪罰遊惰由是境內肅清武帝北伐為大尉軍咨祭酒從平關洛拜侍中辭事東歸帝餞之戲馬臺百僚咸賦詩以述其美子靈符纍官至丹陽尹慤實有質幹每所厯官政績修理孔琳之字彥琳羣曽孫強正有志力桓元輔政欲廢錢用榖帛又議復肉刑皆以琳之議而止永初二年為御史中丞奏劾尚書令徐羡之百僚震肅莫敢犯禁遷祠部尚書致仕不治産業家尤貧素子邈有父風官至揚州中從事孫處字季髙永興人以字行從武帝征孫恩以功封新番縣侯盧循之難季髙率衆泛海襲破番禺循黨潰奔廣州復擊走之卒贈南海太守侯官縣侯賈恩諸暨人少有志行母亡未葬為鄰火所逼恩及妻柏氏號哭奔救鄰近赴助棺櫬得免恩及妻柏俱燒死有司奏改其里為孝義里蠲租布三世追贈恩天水郡顯親左尉郭世道永興人年十四喪父居喪過禮家貧傭力以養後母母亡負土成墳親戚共賻助微有所受葬畢傭賃倍還先直元嘉中散騎常侍袁愈表其淳行詔表所居獨楓里為孝行里蠲其祖調子原平字長泰父篤疾彌年原平未嘗睡卧及亡躬自營墓每歲節哀思不食墓前有田農月輒束帶垂涕以耕太守蔡興宗以俸米百斛餽之不受還都表其殊行按世道舊從南史作世通今據宋書改子字長泰舊作長恭係沿南史之訛今亦據宋書改正嚴世期山隂人性好施與贍貧乏恤老病殯葬宗親存育孩幼元嘉四年有司奏榜門曰義行嚴氏之門復其身徭役蠲租稅十年虞願字士恭餘姚人元嘉中為湘東王國常侍明帝立除通直散騎侍郎帝起湘宫寺費極侈願正色言曰此百姓賣兒貼婦所為有何功德帝大怒使人曳下殿願無異容出為晉安太守有異政後遷廷尉領東觀祭酒著五經論問撰會稽記文翰數十篇朱百年山隂人少有髙情攜妻孔氏人會稽南山伐樵採箬為業以樵箬置道旁須者隨其所堪多少留錢取去時為詩詠往往有髙勝之言與同縣孔覬友善家素貧母以冬月亡衣無絮自此不衣綿帛嘗寒時就覬宿覬以臥具覆之既覺引去曰綿定奇溫因流涕悲慟除太子舍人不就卒山中蔡興宗為會稽守餉百年妻米百斛遣婢詣郡固讓時以比梁鴻妻韓靈敏剡人早孤與兄靈珍並有孝行母亡家貧無以營葬兄弟共種瓜朝採瓜子暮已復生遂辦喪事齊公孫僧遠剡人居父喪至孝事母及伯父甚謹年飢省飧減食以養母及伯父兄弟亡貧無以葬身販貼與鄰里供送終之費躬負土種松柏兄姊未婚嫁乃自賣為之成禮髙帝即位詔表門閭蠲租稅孔道徽山隂人父祐隱於四明山太守王僧虔與張緒書曰孔祐敬康曾孫行動幽祇德標松桂引為主簿遂不可屈此古之遺德也道徽少厲髙行能世其家風隱居南山終身不窺都邑豫章王嶷辟西曺書佐不至鄉里宗纂之道徽兄子總亦有操行遇飢寒不可得衣食縣令邱仲孚薦之除竟陵王侍郎竟不至孔逖字世遠山隂人好典故學與王儉至交宋升明中為齊臺尚書儀曺郎屢針闕禮多見信納帝謂王儉曰逖真所謂儀曺不忝厥職也永明中為太子家今卒虞悰字景豫餘姚人少以孝聞仕齊纍遷祠部尚書鬱林廢悰竊嘆曰王徐遂縛袴廢天子天下豈有比理耶延興初領右軍明帝立悰稱疾不陪位帝欲引參佐命悰曰公卿戮力詎假朽老以匡贊維新因慟不自勝朝議欲糾之僕射徐孝嗣曰此亦古之遺直乃止稱疾篤還孔稚圭字德璋山隂人少學涉有美譽髙帝為驃騎召為記室參軍與江淹對掌辭筆纍遷太子詹事稚圭風韻清疏好文詠不樂世務憑几獨酌門庭之內草萊不剪中有蛙鳴或問之答曰我以此當兩部鼓吹戴僧靜永興人少有膽力便弓馬髙帝即位以功封建昌侯纍除淮南太守永明中巴東王子響殺僚佐武帝召僧靜領軍向江陵對曰天子兒過誤殺人忽遣軍西上人情惶懼臣不敢奉敕上不答而心善之徙髙平大守卒諡壯侯孔琇之山隂人舉孝亷為烏程令有吏能還遷通直郎輔吳令又以職事知名出為臨海太守在任清約隆昌初遷晉熙王冠軍長史行郢州事明帝輔政欲令殺晉熙王辭不許遂不食而死魏溫仁上虞人僕射徐孝嗣為東昏所殺故人莫敢收視獨溫仁奔赴以私財營其喪當時稱之梁賀瑒字德璉循元孫祖道力善三禮有盛名仕宋為建康今父損亦傳家業瑒舉明經為太學博士天建初為太常丞兼五經博士為皇太子定禮撰五經議時武帝創定禮樂瑒所建議多見施行著禮易老莊講疏數百篇及賓禮儀注百四十五卷子革字文明躬耕供養通三禮仕至南郡太守孔休源字慶緒山隂人舉秀才除尚書儀曺郎每逮訪前事休源隨機斷決曾無疑滯任昉謂之孔獨誦歷尚書左丞兼御史中丞正色直繩無所回避百僚咸憚之普通中授宣惠將軍監揚州事休源風範強正明練政體嘗以天下為已任武帝深委仗之纍居顯職性縝密未嘗言禁中事及卒帝為之流涕諡曰貞子賀琛字國寶瑒弟子家貧常販粟養母間則習業尤精三禮聚徒教授到溉聞名相造就席問難歎曰通儒碩學復見賀生因薦為郡功曺辭以母老普通中始應辟命纍遷尚書左丞凡郊廟諸儀多所創定武帝與語常移晷刻省中語曰上殿不下有賀雅琛容止間雅故時人呼之所撰三禮講疏五經滯義及諸儀注凡百餘篇孔子祛山隂人少孤貧勤苦力學遂通經術尤明古文尚書為西省學士助賀琛撰録書成纍遷中書通事舍人武帝撰五經講疏及孔子正言專使子祛檢閲羣書以為議證後加通直正員郎著尚書周易注及集禮論共三百餘卷孔僉山隂人通五經尤明三禮生徒數百人三為五經博士後為海鹽山隂二縣縣令張嵊字四山剡人鎮北將軍稷之子起家祕書郎纍遷吳興大守侯景陷京城嵊起義收集士卒繕築城壘邵陵王至錢塘遺板授嵊征東將軍賊將劉仁茂破義興遣使説嵊降嵊斬其使仍遣軍逆擊之侯景聞遣軍助仁茂嵊拒戰敗被執以送景子弟同遇害者十餘人賊平世祖追贈侍中中衛將軍開府儀同三司諡忠貞王琳字子珩山隂人少好武遂為將帥以功封建寧縣侯從王僧辨破侯景拜湘州刺史尋移廣州元帝為魏圍逼徴琳赴援師次長沙聞帝遇害率三軍縞素舉哀傳檄諸方為進取計時陳武帝推立敬帝以侍中司空徴不赴大營樓艦圖義舉敗陳將侯安都周文郁於沌口及敬帝亡琳立梁王引兵東下與陳師遇琳乘風舉火忽風逆反燒遂潰入齊封會稽郡公鎮夀陽會陳將吳明徹攻齊琳謂吳兵甚鋭勿軗門齊將不從戰敗城陷被殺諡忠武陳孔奐字休文琇之曽孫好學善屬文遭母憂以至孝聞武帝受禪除晉陵太守有惠政天嘉初徵為御史中丞奐性剛直糾劾不避權貴朝廷敬憚又達於政體百司滯事皆付咨決大建六年為吏部尚書凡所甄拔莫不悅服虞荔字山披餘姚人博覽墳籍善屬文梁武帝用為士林館學士以文史見知文帝即位領大著作初荔母隨荔入臺卒尋城陷情禮不伸終身蔬食布衣不聽音樂雖任遇隆重而居止儉素淡然無營性沈密凡所獻替莫有見其際者弟寄字次安弱冠舉秀才對策髙第陳寶應據閩中得寄甚喜欲引為僚屬固辭及寶應有逆謀寄每陳順逆之理知不可諫稱疾不起後又因書極諫寶應既擒敕寄還朝除建安王咨議寄少篤行造次必於仁厚至臨危執節詞氣凜然白刃不憚也賀德基字承業會稽人祖文發父淹仕梁俱為祠部郎並有名當世德基少遊學京邑積年不歸於禮記稱為精明位尚書祠部郎三世儒學俱為祠部時論美其不墜隋虞綽字士𥙿餘姚人傳學有俊才大業初為祕書學士奉詔撰長洲玉鏡等書綽所筆削帝嘗稱善纍遷著作佐郎唐賀德仁山隂人與從兄德基師事周宏正以文辭稱人為語曰學行可師賀德基文質彬彬賀德仁兄弟八人時比漢荀氏太守王伯山改所居甘滂里為髙陽云德仁在隋為齊王府屬髙祖時為東宫學士從子紀敳亦博學髙宗時紀為太子洗馬敳率更令兼太子侍讀皆為崇賢館學士虞世南字伯施荔子出繼寄為後辭章贍博名重當時太宗踐阼擢宏文館學士世南貌儒謹而中抗烈議論持正疏陳剴切帝嘗作宫體詩使賡和世南曰聖作誠工然體非雅正恐此詩一傳天下風靡臣不敢奉詔帝深嘉之每稱其德行忠直博學文詞書翰為五絶纍封永興縣公卒諡文懿孔紹安山隂人與兄紹新俱以文詞知名陳亡入隋徙居京兆閉門讀書外兄虞世南歎異之髙祖受禪紹安間行來奔因侍宴應詔詠石榴詩時人稱之詔撰梁史未成卒有文集五卷孔若思山隂人早孤其母躬訓教長以博學聞擢明經厯庫部郎中嘗曰仕宦至郎中足矣座右置水一石明止足之意中宗初敬暉桓彥範當國以若思多識古今凡大政事必咨質後行三遷禮部侍郎出為衛州刺史以清白著稱諡曰惠子至厯著作郎明氏族學撰百家類例康子元山隂人仕厯獻陵令開元初詔舉能治易老莊者張説以聞纍擢祕書少監帝將東之泰山張説引子元等商裁封禪儀官至宗正少卿賀知章字季真永興人證聖初擢進士開元中纍遷禮部侍郎兼集賢院學士明皇自為贊賜之肅宗為太子知章遷賓客授祕書監晚節自號四明狂客每醉屬辭筆不停書咸有可觀天寶初請為道士還鄉里詔許之賜鏡湖剡川一曲既行帝賜詩太子百官餞送乾元初贈禮部尚書秦系字公緒會稽人天寶末避亂剡溪留守薛兼訓奏為右衛率府倉曺參軍不就客泉州南安九曰山注老子彌年不出張建封聞系之不可致請就加校書郎系與劉長卿友善以詩相贈答其後東渡秣陵年八十餘卒徐浩字季海越州人擢明經有文辭張説薦為集賢校理肅宗立授中書舍人四方詔令多出其手兼尚書右丞建言故事有司斷獄必刑部審覆自李林甫楊國忠當國令有司就宰相府斷事尚書以下未省即署殊乖慎恤意請如故便詔可德宗時授越王傅進會稽郡公始浩父嶠之善書以法授浩益工世狀其法曰怒倪抉石渴驥奔泉羅珦會稽人寶應初詣闕上書授大常寺太祝署曺王臯幕府纍遷副使臯卒軍亂珦取首惡斬以徇召為奉天尹姦吏屏息擢廬州刺史再遷京兆尹並有惠政以老疾求解徙太子賓客子讓字景宣以文學早有譽舉進士宏辭賢良方正皆髙第為咸陽尉父喪幾毁滅不應辟者十餘年纍遷江西觀察使許伯會蕭山人舉孝廉上元中為衡陽博士母喪負土成墳不御絮帛嘗滋味野火將逮塋樹悲號於天俄而雨火滅歲旱泉湧廬前芝生墓側又同邑俞僅著孝友一門四代老幼八十餘口並經術貞廉觀察使孟簡書於圖經以勵風俗孔述睿山隂人篤孝嗜學大歷中擢司勳員外郎史館修撰德宗時纍官祕書少監𫐠睿性退讓未始忤物雖親朋宴集嚴默終日人皆畏之所次地理志本末最詳子敏行宇至之元和初官諫議大夫李絳遇害事由監軍楊叔元時無敢言獨敏行上書極論其罪卒贈工部侍郎張萬和諸暨人力學明經遭父母喪負土成墳兄弟廬於墓萬和卒子孝祥亦廬墓俱二十餘年詔旌其門吳融字子華山隂人祖翥有髙節大中時賜號文簡先生融力學富辭藻龍紀初及進士第韋昭度討蜀表掌書記纍遷翰林學士昭宗反正御南闕羣臣稱賀融最先至帝有指授疊十許藁融跪作詔少選而成語當意詳帝咨賞良久進户部侍郎五代吳越顧全武餘姚人事錢鏐為武勇都知兵馬使董昌亂其將徐淑合淮南兵共圍嘉興全武將軍往救破二寨還守西陵會蘇州告急全武請先取越後復姑蘇遂引兵攻昌擒之航海至嘉興破淮南十八營乘勝取蘇州拔松江無錫常熟華亭諸郡縣鮑君福字慶臣餘姚人以驍果稱歸武肅王功為諸軍之冠任衢州刺史一十二年後遷湖州纍職太保檢校太尉同平章事天福五年卒諡忠壯宋齊廓字公闢會稽人舉進士第纍遷江淮西南轉運使時奉使者競為苛刻邀聲名獨廓奉法如平時人以為長厚積官光祿卿直祕閣改祕書監卒杜衍字世昌山隂人總髮厲操尤篤於學大中祥符初擢進士甲科厯知外郡不以刑威督下吏民憚其清整仁宗特召為御史中丞奏大臣宣迭召見賜坐便殿以盡獻替兼判吏部流內銓吏不能為姦拜樞密使與富弼韓琦范仲淹共事欲盡革衆弊修紀綱而衍徑正清約尤裁抑僥幸每內降恩率寢格不行積詔旨至十數輒納帝前拜同平章事尋罷後以太子少師致仕封祁國公卒諡正獻孫沔字元規會稽人天禧進士材猛過人所在皆著能績三知慶州邊人服其能遷廣南安撫使會狄青敗儂智髙沔留治後事及還召為樞密院使致仕後英宗即位又以歐陽修薦起知河中府徙慶州復徙延州卒石待舉字寶臣新昌人天聖進士知上饒邑大治遷保州通判有雲翼軍與中貴人作亂侍舉率州兵數百人討之兵潰遂遇害齊唐字祖之山隂人少貧苦學得書皆自寫誦過一二即不忘登天聖進士兩應制科皆首選雨對䇿皆第一當道忌其切直復排去遷著作佐郎僉判南雄會交址進麒麟唐據史傳非之衆服其博物以職方員外致仕鑑湖東北有山最竒偉唐名之曰少微而卜築焉顧臨字子敦會稽人通經學為館閣校勘同知禮院神宗詔編武經要略陳言兵以仁義為本動靜之機安危所係不可輕也因條十事以獻元祐二年擢給事中拜河北都轉運使蘇軾等言臨姿性方正學有根本封駁議論有古人風宜留左右以補闕遺不報尋召還厯翰林學士紹聖初知定州徙應天河南府忌者指為黨人斥饒州居住卒裘承詢會稽人逺祖尚於晉義熙時徙居雲門山前當趙宋初年踰六百載十九世無異爨子弟習絃誦鄉里稱其敦睦大中祥符間詔旌門閭陸佃字農師山隂人居貧苦學夜無燈映月讀書受經於王安石而不以新法為是擢熙寧甲科補國子監直講安石以佃不附己專付之經術不復咨以政徽宗時為尚書右丞每欲參用元祐人才尤惡奔競又上言不宜窮治元祐黨讒者遂詆佃名在黨籍罷知亳州所著有埤雅禮象春秋後傳諸書二百餘卷石公弼本名公輔字國佐新昌人元祐進士徽宗時擢殿中侍御史論東南軍政之弊蘇杭造作局擾民之害大觀初拜御史中丞劾蔡京罪惡章數十上京始罷又言吏員猥冗宜復舊制仕途為清進兵部尚書出知襄州京再相謫台州安置赦歸卒陳過庭本名揚庭字賓王山隂人紹聖進士歷御史中丞睦冦竊發過庭言竄蔡京王黼二人則冦自平又朱勔父子竊取名器宜昭正典刑與權貴忤謫黃州安置欽宗立擢尚書右丞奉使至金金人拘之軍中後卒於燕山建炎中贈開府儀同諡忠肅李光字泰發上虞人崇寧進士師事劉安世欽宗受禪擢右司諫首陳制國用之要與大原攻守之䇿遷侍御史言王安石學術邪辟蔡京兄弟祖𫐠其説毒流四海不宜詔榜朝堂建炎中除知宣州盜戚方來攻光隨宜扼守城卒以全進參知政事極言秦檜懷姦誤國謫瓊州安置檜死復官卒諡莊簡子孟傳字文授纍官太府丞韓托胄願見之不肯以朝請大夫直寶謨閣致仕所著詩文九十餘卷博學多聞持身甚嚴時推能世其家石公揆字道任新昌人政和進士髙宗時拜侍御史疏論秦檜之姦章十上檜再相下公揆建昌獄久不釋而卒子晝問當父下獄時年十四奉母屏居苦學及檜死叩􅕡訟父冤詔復職晝問補將仕郎論兩淮榷場互市營田官莊之弊皆切時務官至朝請大夫陳槖字德應餘姚人登政和上舍第紹興初趙鼎李光薦其才除御史纍遷權刑部侍郎時秦檜力主和議槖疏謂和不可行檜憾之因力請去除徽猷閣待制知廣州留鎮三年民夷悅服後改婺州致仕槖博學剛介不事産業既謝事歸剡中僑寓僧寺曰糴以食王十朋論會稽人物曰杜祁公之後有陳德應云傅嵩卿字子駿山隂人政和中擢甲科授考功員外郎兼太子舍人以不從方士林靈素授符籙被譖出為蒲圻縣丞髙宗初除直龍圖閣知越州常慷慨欲以功名自見在上前議論尤感激未及大用而卒時人惜之有樵風溪堂集六十卷所作夏小正傳最行於世蔡定字元應會稽人家世微且貧父革依郡獄吏傭書以生使定學遊鄉校有稱獄吏以舞文坐罪革以詿誤年七十餘法當免胥削其年而入之罪獄具定號欣請代弗許知父終不可贖乃預為志銘其墓又為狀若詣府者結置𬒮間皆敘陳致死之由冀其父之必免也以建炎元年自赴河死府帥聞之驚曰真孝土命出革厚為定具斂而撫周其家黃開字必先諸暨人父汝楫宣和間方臘犯境掠士女索金帛汝揖罄數萬緡贖千餘人歸開登紹興進士博學好古邃於經術所著有論孟發揮周易圖説諸書官崇安令胡沂字周伯餘姚人父宗伋號醇儒沂頴異六歲誦五經皆畢紹興初登進士陸沈州縣三十載孝宗受禪擢殿中侍御史論列殿帥成閔罪狀及龍大淵曽覿市權植黨直聲震中外乾道中厯禮部尚書沂性恬退無所依附數請去遂以龍圖閣學士提舉興國宫卒諡獻肅王佐字宣子山隂人紹興中廷對第一為祕書省校書郎時秦熺提舉祕書省佐未嘗交一語熺不能平嗾言者論去之檜死起為尚書吏部員外郎檜妻王氏陳乞自稱沖真先生佐駁之知建康府預發妖人朱端明不軌事知潭州討捕栁州賊陳洞以忠勞備著超拜顯謨閣待制徙知臨安府進權戶部尚書石墩字子重新昌人紹興進士授桂陽簿調尤溪尉丞相史浩薦其才召對言甚剴切上嘉納之墩天性髙邁究心理學與朱子講明經傳宗旨所著中庸集解朱子嘗采之為集注一時學者多師事之及卒朱子為作墓志有文集十卷集周易大學中庸解數十卷傳於世陸遊字務觀佃之孫年十二能詩文廕補登仕郎試禮部置前列為秦檜所嫉檜死始以薦除敕令所刪定官孝宗初遷編修官召見賜進士出身以忤和議出為通判王炎宣撫川陜遊為炎陳進取之策又請以吳玠子拱代蜀帥吳挺以絶禍患及挺子曦叛其言始驗范成大帥蜀遊為參議官以文字交不拘禮法人譏其放因自號放翁纍升寶章閣待制致仕遊才氣超逸尢長於詩所著有劍南渭南等集行於世黃度字文叔新昌人隆興進士監登聞鼓院言養兵為巨患具屯田府衛十六篇上之紹熙四年守監察御史乞分蜀帥吳曦兵柄不從後曦果叛光宗以疾不朝重華宫度上書切諫寧宗即位改右正言韓托胄用事度具疏將論其姦托胄假御筆除知平江府厯知福州建康兼江淮制置使罷科糴輸送之擾活飢民百萬除見稅二十餘萬降巨盜招歸業者九萬家度以推挽人才為巳任每曰無以報國惟有此耳遷禮部尚書告歸卒諡宣獻度志在經世而以學為本著詩書周禮説史通厯代邊防諸書行於世王厚之字順伯諸暨人乾道進士官至浙東提刑以寶謨閣致仕平生好古博物尤注意金石刻文所著金石録考異考古印章等書精鑒絶識刻畫淺深箋辨無遺識者賞其博雅劉漢弼字正甫上虞人嘉定進士擢監察御史宰相史嵩之引用私人布列要地漢弼首疏劾之即引去既復以左司諫召疏論立聖心正君道謹事機伸士氣收人才五事除侍御史密奏宜聽嵩之終喪言皆剴切以戶部侍郎卒諡曰忠王爚字仲潛新昌人嘉定進士咸淳十年為左丞相兼樞密使德祐初進乎章軍國重事纍辭不許以言者罷平章充醴泉觀使尋卒爚為人清修剛徑賈似道歸葬母過新昌爚獨不見之後以元老入相植國勢危亡之際天下屬望卒與陳宜中不合而去毛遇順字鴻甫餘姚人嘉定進士拜侍御史首論史嵩之不當起復三學諸生皆朝廷元氣不宜斥逐前後疏數十上理宗書其名於屏寶祐初進兩淮制置使後論賈似道丁大全必誤國乞罷斥不報終大理卿孫子秀字元實餘姚人紹定進士調吳縣主簿歷知金壇縣通判慶元府主管浙東鹽事皆以政績著聞纍遷金部郎與丞相丁大全議不合去官開慶初為浙西提舉常平徙提點刑獄擊貪舉廉風采凛然犴獄為清度宗即位進太常少卿兼知臨安府以言罷起知婺州卒陳非熊字思齊新昌人景定中授稽山院長宋亡與吳觀奉趙宗室集義勇繕城守以圖恢復元兵薄城力戰死觀字叔大景定中入太學上書言邊事與非熊同為院長城陷被執不屈遇害唐震字景實會稽人少有介節既登第歷官所至以公廉稱擢浙西提刑忤賈似道免官咸淳十年起知饒州元兵略饒堅守不下明年元兵大至城破被執不屈與其兄椿及家人皆死之贈華文閣特制諡忠介孫嶸叟字仁則餘姚人第進士擢監察御史論賈似道罪重法輕當斬以示國法德祏初乞復倚任文天祥竄陳宜中留夢炎吕師孟等以作忠義之氣居官竭忠盡智排斥姦回不為身謀官至禮部侍郎卒諡忠敏何雲字士雲諸暨人德祐中元兵至傾資倡義築柵率鄉人禦戰不支與其子嵩並死之朱光字吉甫諸暨人元兵下江南遣禆將至縣招撫光與同邑張軫等率鄉人抵禦被執以火然之三日始絶軫亦不屈死唐珏字玉潛山隂人嘉木揚喇勒智發宋諸陵棄骨草莽間珏不勝憤痛行貸百餘金邀里中少年易以他骨造石函六收遺骸葬蘭亭山後又移宋故宫冬青樹植其上以識嘉木揚喇勒智舊作揚連真珈今改正元潘音字聲甫新昌人甫十歲宋亡見長老談崖山事輒涕下長從吳澄學泰定間澄以見召欲行音止之不從遂築室南洲山中隱居不出韓性字明善會稽人博綜羣籍尤深性理之學為文博逹俊偉自成一家四方受業者輻輳其門憲府舉為教官辭不就卒賜諡莊節先生所著禮記説詩音釋書辨疑若干卷王艮字止善諸暨人尚氣節讀書務明理以致用纍辟為吏所至以廉能稱官至淮東道宣慰副使石明三餘姚人與母居山中一日自外歸覓母不見見壁穿而臥內有三虎子知母為虎所害乃盡殺虎子礪巨斧立壁側伺母虎至砍其腦裂而死復往倚巖石旁執斧伺候斫殺牡虎明三亦立死不仆張目如生所執斧牢不可拔陸思孝山隂樵者性至孝母病痢醫禱久不效思孝方欲刲股肉為糜以進忽夢寐間恍若有神人授以藥劑得而異之即以奉母疾遂愈石永新昌人事親至孝值亂兵掠鄉里父謙孫年八十老不能行永員父匿山谷中亂兵執其父欲殺之永亟前抱父請以身代兵遂殺永而釋其父黃義貞字孟亷餘姚人篤學好修事親以孝聞大德間徴授博士辭不就隱居鳯亭夀一百五􅍲董旭新昌人博通羣書與默爾古思友善默爾古思欲興師討方國珍臺臣怨其不稟命殺之遂歸隱山中已而國珍據台慶欲羅致幕下強之終不屈遂遇害默爾古思改正見名宦楊維楨字廉夫諸暨人自號鐵崖泰定進士署天台尹會修遼金宋三史成著正統辨千餘言歐陽元功讀之歎曰百年後公論定於此矣擢江西儒學提舉未上會兵亂避地富春山徙錢塘辟之復固辭恆性醇篤家無儋石而臨財甚介鄉人奉為楷法吕不用初名必用字則行新昌人年十三應元至正鄉舉未午出院主文者奇之因其不終試為之深惜不用傳孔孟之學而故以文豪與陳東之宋濂劉基等為友洪武初以經明行修辟授本縣訓導時兵革初靖士不識文藝不用疏六緯四籍諸史之學授生徒一時蒸然向化後引疾解官纍辟不起趙俶字本初山隂人元至正進士洪武六年徴至論經史貫串古今除國子博士請以正定十三經頒示天下屏戰國策及隂陽讖卜諸書勿列學宫明年擇諸生頴拔者三十五人命俶􅌹領之教以古文以翰林待制致仕賜內帑錢治裝宋濂率同官暨諸生千餘人送之子圭玉兵部侍郎出知萊州有聲董曾字貫道旭之弟通經史善古文方國珍據台慶兄旭以不屈被害曽避居東陽太祖至金華以禮招致授無為知州陳友諒攻城被執不屈死王綱字性常餘姚人與弟秉常敬常並以文學名洪武初劉基薦之年巳七十太祖䇿以治道擢兵部郎除廣東參議撫定潮州亂民還遇海寇曺真截舟舁之去欲以為帥綱不從遇害子彥達年十六亦罵賊求死其首曰父忠子孝殺之不祥令綴羊革裹父尸而去彥達以父廕當得官痛父終身不仕唐肅字處敬山隂人通經史兼習隂陽醫卜書數洪武初用薦召修禮樂書擢應奉翰林文字科舉行為分考官免歸子之淳字愚士潛心著述建文時以方孝孺薦擢翰林侍讀領修書事卒於官謝肅上虞人學問該博洪武中以明繼舉授福建僉事坐事死與山隂唐肅齊名時號會稽二肅趙謙字撝謙初名古則餘姚人幼孤貧寄食山寺長遊四方與諸名人為友博究六經百氏之學尤精六書洪武中命詞臣修正韻謙應聘授國子典簿後為瓊山教諭卒於番禺所著有六書本義及聲音文字通劉謹字維勤山隂人洪武中父坐法戍雲南謹方六歲問家人雲南何在或以西南指之輒朝夕向之拜年十四遂奮身往尋閲六月扺其地艱苦萬狀遇父於逆旅相持號慟俄父患瘋痺謹告官乞代國法戍邊者惟十六以上嫡長男始許代時謹未成丁而兄謙先死乃歸家攜兄子以往悉鬻其産卑兄子始獲奉其父還家貧力營甘旨以養人稱其孝韓宜可字伯時山隂人洪武初薦授山隂教諭擢監察御史疏劾丞相胡惟庸等險惡姦佞出為江西僉事已入朝會賜諸司沒官男女為奴婢宜可不受且極論合門連坐之非所宜帝是其言後坐事將刑帝御謹身殿鞫之忽雷火繞殿中遂獲免建文時纍拜左副都御史周觀政山隂人洪武初薦授九江教授擢御史嘗監奉天門有中使將女樂入觀政止之中使曰有命觀政執不聽中使愠而入頃之出報曰御史且休女樂巳罷不用觀政又拒曰必面奉詔已而帝親出謂曰宫中音樂廢缺欲令內家肄習朕已悔之御史言是也纍官江西按察使胡粹中名由以字行山隂人博通經史尤長春秋洪武中聘為儒學訓導終楚府長史著讀史筆記元史續編葉砥字履道上虞人洪武進士除定襄丞坐事謫建文元年以薦授編修改廣西僉事有禦冦功永樂初坐書靖難事多微辭被逮籍其家惟敝廬圖書數篋仍與史職遷考功郎仁宗在東宫以砥為侍講乞郡出守饒州有惠政卒官孫冕正統進士厯官副都御史所至有聲陳思道字執中山隂人洪武中進士授刑部主事帝賞其執法超拜兵部右侍郎亷介自持人莫敢于以私改禮部左侍郎三疏乞歸居家不殖生産守令造門不得見時人欽其風節劉季篪名韶以字行餘姚人洪武進士除行人使滇蜀朝鮮悉却其餽擢陜西參政奏罷逋賦碙砂建文中召為刑部侍郎吏虧官錢誣千餘人俱為辨免冤獄多所平反永樂初預修大典後坐失出下獄降授兵部主事陳性善名復初以字行山隂人洪武進士授行人司副遷翰林檢討奉敕入便殿録祕書帝威嚴見者多震讋失措性善獨從容詳慎字畫端好太祖大悅建文帝即位擢禮部侍郎問治天下要道使手書以進深見採納燕師起改副都御史監軍靈壁戰敗被執北去俄縱還性善曰辱命罪也遂躍馬入河死本朝乾隆四十一年賜諡愍節按當時與性善同死者有黃墀陳子方皆餘姚人又有雲門僧若耶溪樵皆殉節不知姓名者並於乾隆四十一年列入祀典蔣貴字大富諸暨人由燕山護衛卒從成以耆老乞留還任宣德初卒官章敞字尚文會稽人永樂進士白庶吉士授刑部主事屢辦冤獄宣德五年擢禮部右侍郎兩使安南諭黎利父子得使臣體還致厚贐不受正統初晉府以護衛軍田廬請英宗命敞理之至則計軍分授餘給與民又同尚書胡濙考定新舊令式吏無能為姦魏驥字仲房蕭山人永樂中以進士副榜授松江訓導召修永樂大典遷太常博士擢太常卿正統初進吏部侍郎時王振怙寵淩公卿獨嚴重驥纍進南京吏部尚書景奉初致仕驥居官務持大體家居憂國及民老而彌篤倡修邑中諸塘堰以免水患布衣糲食不營産業教子孫孝弟力田倡理學勗後進雖在林野有補治化卒諡文靖謝澤字時用上虞人永樂進士歷廣西參政考績赴闕值英宗北狩遂以澤為通政使提督居庸白洋等關時守關士卒皆散敵大入澤猶率羸卒以禦勢不支遇害楊信民名誠以字行新昌人舉於鄉宣德時除工科給事中正統中清軍江西還奏民隱五事多議行擢廣東參議景帝監國用于謙薦守備白羊口賢廣柬賊黃蕭養攻廣州以信民為右僉都御史巡撫其地既至使人持檄入賊營諭以恩信蕭養曰得揚公一言死不憾信民單騎往諭賊黨爭羅拜將降信民忽暴卒軍民聚哭建祠祀之成化中賜諡恭惠黃璽字廷璽餘姚人兄伯震商十年不歸璽出求之經行萬里不得蹤迹至衡州禱南嶽廟夢神授以纏綿盜賊際狼狽江漢行二句一書生告之曰此杜甫舂陵行詩也舂陵今道州曷往尋之璽從其言既至無所遇一日入厠置傘道旁伯震適過之曰此吾鄉傘也取視之璽出問悲喜交至遂奉其兄以歸俞欽字振恭新昌人景泰進士由庶吉士授禮部主事成化初官兵部郎中會九姓土獠作亂詔本兵督師往討以欽參謀建議進兵拔二十餘寨斬獲六千餘人升太常卿纍兵部侍郎大同有警悉力區畫邊境以安毛吉字宗吉餘姚人景泰進士除刑部主事錦衣指揮門達怙勢作威吉執法不撓逹怒甚以疾失朝下錦衣獄達簡健卒挺擊幾死天順中擢廣東僉事分巡惠潮討平程鄉賊楊輝進副使移巡髙廉雷三府成化初餘賊攻新會縣吉屢敗之賊遁於陽江雲岫山官兵乘勝深入賊並力合攻師潰力戰死之贈按察使諡忠襄王淵字志默山隂人天順初進士除南京吏科給事中以氣節自持憲宗即位與同官王徽等疏言宦官宜遵祖制母許預政典兵置産立業家人義子悉編原籍為民嚴禁官吏與之交接中官牛玉安置南京淵復同徽等疏劾玉罪重罰輕乞正典刑並詆斥執政李賢逮詔獄謫茂州判官終順天府治中丁川字大容新昌人天順進士授監察御史成化中以災異上言請修德以回天變又言會昌侯孫繼宗父子權重宜加裁損萬貴妃專寵干預外政復上疏論諫遷順天府丞值旱蝗疏救荒禦災十五事升巡撫延綏進安邊十策悉允行聞母喪歸以哀毁卒何鑑字世光新昌人成化進士擢御史巡宣府大同劾巡撫鄭安以下數十人出為河南知府賑飢有法宏治中以石副都御史巡撫江南疏吳淞白茆諸渠以除水患歷刑部侍郎正德中為兵部尚書大盜劉六劉七倡亂逼近畿甸鑑處分守禦悉中機宜賊以次蕩平加太子太保宸濠謀復護衛鑑力遏之為姦黨所攻遂致仕謝遷上救時十要歷廣東提學副使母老乞歸嘉靖初言官交薦起太僕少卿改太常致仕屏居南山惟以發宗重明經傳為事及卒世府孝弟特詔豫葬何競字邦植蕭山人父舜賓為御史坐事謫戍廣西慶逺衛遇赦歸與縣令鄒魯有怨魯誣以潛逃復解慶逺又令瓜牙殺之中途競痛憤值魯遷去隂令親黨伏道旁魯過競袖鐵鎚奮擊曤其兩目乃與魯連鎖赴法司被嚴刑欲令誣伏母朱氏撾登聞鼓訟冤遣廷臣覆治會解人任寬首實於是當魯死罪競遣戍後赦歸競自父沒及卒凡十六年服衰終其身孫燧字德成餘姚人宏治進士正德中纍官河南布政宸濠逆謀日露朝議欲有節大臣制之擢燧副都御史巡撫江西燧至與副使許逵謀密為備七疏言宸濠必反輒為姦黨所匿不得達宸濠將反會生辰宴官屬明日燧及諸大吏入謝宸濠伏兵左右宣言奉太后密旨監國燧張目大罵偕許逵奮起力爭宸濠麾兵縛之皆挺立不屈罵不絶口遂遇害世宗即位贈禮部尚書諡忠烈長子堪字志健為諸生能文有膂力聞父訃與弟墀升挾刀赴之後以廕厯都督僉事事母至孝母沒哀毀卒墀字仲泉文學通瞻官尚寶卿亦以孝聞升字志高嘉靖進士汲第授編修官至禮部尚書嚴嵩柄國不肯依附卒諡文恪陶諧字世和會稽人宏治進士選庶吉士授工科給事中正德初劉瑾亂政諧請以瑾等誤國罪告於先帝罪之無赦瑾怒羅他事下詔獄廷杖謫戍肅州嘉靖初復官纍遷兵部侍郎總督兩廣剿平羣盜入為兵部左侍郎致仕卒諡莊敏孫大順字景熙嘉靖末進士諳練有裁決律身廉潔纍官廣西巡撫大臨字虞臣嘉靖進士及第授編修吳時來劾嚴嵩大臨為定疏革仕終吏部侍郎葛浩字天宏上虞人宏治進士擢御史敷陳時政闕失孝宗多採納正德初以劾劉瑾下詔獄黜為民瑾誅起知邵武府入覲陳利弊五事悉施行晉廣東參政平寇亂不妄殺一人厯大理卿致仕王守仁字伯安餘姚人父華字德輝性至孝成化進士廷對第一纍官南京吏部尚書守仁登宏治進士授刑部主事改兵部正德初以論救言官戴銑等忤劉瑾杖闕下謫龍場驛丞瑾誅移廬陵知縣厯鴻臚卿擢右僉都御史巡撫南贑平橫水左溪桶岡浰頭諸巨賊宸濠反圍安慶守仁起兵勤王攻下南昌逆擊大破之遂擒宸濠世宗立拜南京兵部尚書封新建伯思恩田州土酋盧蘇王受反命守仁總督兩廣至則定議招撫蘇受乞降進破斷藤峽賊攻克仙臺花相諸洞蠻盡平八寨事竣以病乞歸至南安卒守仁天姿異敏其學專主良知隆慶初追諡文成從祀孔廟曽孫先通以伯爵掌前軍都督府印甲申敕命守城城陷被執罵賊觸怒斷舌取心死極慘毒先通子業泰亦於乙酉殉難胡東皋字汝登餘姚人宏治進士厯南京刑部郎中讞大獄數十多所平反纍遷茂威兵備副使討平西番耿勺之亂進都御史巡撫寧夏奏築花馬池賀蘭山邊墻三百餘里改撫鄖陽未幾召還內臺陳時政十二以抗直忤執政會太廟災自劾去歸里後與宋冕胡鐸號姚江三廉冕字孔瞻沈􅐧有識厯官副都御史巡撫勛陽胡鐸字時振餘姚人宏治進士選庶吉士改刑科給事中忤劉瑾出為河東運副瑾誅擢任福建按察使司僉事獎儒雅雪冤獄遷督學副使士風丕變人稱為胡道學鐸造詣正大力排異説為南太僕卿閉門著𫐠作典學説異學辨諸書各有論正徐愛字曰仁餘姚人正德進士知祁州值劉六之亂有保障功官至工部侍郎初王守仁被謫里居愛與山隂蔡宗兖朱節從之學愛及門最先淵沖和粹守仁深器重之及卒守仁哭之慟宗兖字希淵節字守中皆正德進士宗兖官至四川提學僉事節以御史巡按山東致仕郁采字亮之山隂人正德進士由主事謫教諭遷裕州同知流賊起湖北采率裕人堅守多所斬獲城陷被執采罵賊不絶賊碎其輔頰而死贈光祿少卿蕭鳴鳳字子雍山隂人少從王守仁學登正德進士授御史抗章論救胡世安又劾王瓊江彬逞忿謫言官髙公韶及江彬恃寵恣肆士論壯之巡視山海關武宗將出塞捕虎鳴鳳疏諫因具陳官司掊尅兵民疾苦狀不報引疾歸起督南畿學政嘉靖初督學河南廣東皆廉正無私陳克宅字即卿餘姚人正德進士嘉靖中官御史坐爭大禮繫獄拜杖獲釋先後按貴州河南多所彈劾以忤禮部尚書廖紀出為松潘副使纍遷右副都御史巡撫貴州為事俞孜字景修山隂人為諸生敦行誼嘉靖初父華為流人徐鐸所害鐸亡走孜誓以死報蹤迹數十郡不可得後聞匿其甥楊氏家乃結力士十餘人往來偵伺且謁知府南太吉乞助大吉義之遣數卒與俱夜半驟入楊氏家呼鐸出見縛送於官置之法孜自是不復應舉養繼母以孝聞王畿字汝中山隂人受業王守仁之門守仁征思田留畿與錢德洪主書院舉嘉靖進士歷官武選郎中夏言斥為偽學謝病歸益務講學學者稱龍溪先生錢德洪字洪甫餘姚人與王畿同受業於王守仁舉嘉靖進士纍官刑部郎中坐論郭勛死罪斥為民遂周遊四方以講學為事學者稱緒山先生吕光洵字信卿新昌人嘉靖進士知溧陽縣治最擢御史論罷居守大臣擅增員役又請薛瑄陳獻章從祀文廟巡按蘇松疏通水利奏免旱租六十餘萬斛破海寇大洋還京與仇鸞爭馬市一日章十三上纍遷右都御史巡撫雲南討平叛蠻加兵部尚書率兵進攻武定馘其渠魁拓地置衛隆慶初移南京工部尚書致仕歸葉經字叔明上虞人嘉靖進士除常州推官擢御史劾嚴嵩受諸藩賄濫豫封爵嵩憾之又二年經按山東監鄉試試録上嵩指發䇿語為誹謗激帝怒逮繫詔獄廷杖八十斥為民創重卒隆慶初贈光祿少卿謝瑜字如卿上虞人嘉靖進士拜御史時武定侯郭勛請復遣內侍出鎮守瑜抗章奏始寢疏劾嚴嵩欺罔姦狀帝留疏切責又以邊防大壞上言張瓚與郭勛胡守中嚴嵩為四凶陛下巳去其二何不並屏逐之疏入復被譙責貶官逾三載大計嵩諷主者除名隆慶初贈太僕少卿沈鍊字純甫會稽人嘉靖進士知溧陽忤御史調茌平入為錦衣衛經歷性剛直疾惡如讐會諳達犯京師詔廷臣博議鍊昌言敵出嚴嵩父子上疏劾嵩十大罪帝大怒杖之數十謫佃保安邊人慕鍊忠義多遣子弟就學鍊惡嵩父子縛草象李林甫秦檜及嵩令子弟攢射之總督楊順巡按路楷承嵩旨誣鍊與白蓮妖人閻浩等謀亂遂棄市隆慶初贈光祿少卿天啓初諡忠愍諳逹舊作俺答今改正徐學詩字以言上虞人嘉靖進士歷刑部郎中諳逹薄京師既退詔陳制敵之䇿諸臣多掇細事以進學詩獨疏陳嚴嵩父子權姦釀成寇患帝頗感動方士陶仲文譖之下詔獄削籍歸隆慶初起南京通政司參議諳達改見前沈束字宗安會稽人嘉靖進士歷禮科給事中以論總兵周尚文及死事董暘江瀚宜豫恤典忤嚴嵩廷杖幾死錮詔獄十八年衣食屢絶惟日讀周易為疏解嵩敗束妻張氏伏闕上書請代三上不報乃與妾潘氏治女工給槖饘及束得釋還隆慶初擢南京右通政以疾辭不赴卒後張潘亦旋死時稱一門風節趙錦字元朴餘姚人嘉靖進士擢南京御史清軍雲南因元旦日食錦以為權姦亂政之應馳疏劾嚴嵩罪逮下詔獄拷訊斥為民穆宗即位起故官擢太常少卿尋巡撫貴州平叛苗龍得鮓等萬歷初歷南京禮吏二部尚書以忤張居正乞歸後拜左都御史改兵太子太部尚書卒贈保諡端肅孫鑨字文仲燧之孫升子舉嘉靖進士歷武選郎中世宗齋居鑨請朝羣臣且力詆近幸方士不報引疾歸萬歷初纍遷大理卿進吏部尚書大計京官力杜請謁與考功郎趙南星剖別邪正凡政府私人貶黜殆盡由是執政皆不悅遂乞休疏十上乃得歸卒諡清簡子如怯字世行萬厯進士官刑部主事以諫阻鄭貴妃進封貶朝陽典史如遊字景文亦萬厯進士纍遷禮部尚書光宗詔封李選侍為貴妃選侍要太子欲得皇后立號格如遊議而止熹宗立加文淵閣大學士致仕卒諡文恭吳兑字君澤山隂人嘉靖進士為武選郎清武爵之訛濫大盜曽一本久嘯聚海上閩師以殲魁捷聞朝論且行賞兑曰魁之真偽未可辨也請核實後一本果未得尺邊功核而賞自此始纍遷右僉都御史撫治宣府等處復總督薊遼先是屯糧溢額軍多積逋兑疏請赦逋流人歸業者給以牛種由是耕夫雲集因大器之利造大小炮練為陳法督撫九年府藏充牣邊境鞏固擢兵部尚書世襲錦衣千戶數月請告歸張嶽字汝宗餘姚人嘉靖進士擢給事中因言事語侵權要出為雲南參議萬歷初厯南京僉都御史張居正居父喪謀奪情南京尚書潘晟及諸言官咸上疏請留嶽獨馳疏言宜令奔喪居正怒嶽遂落職後纍官左副都御史陳有年字登之克宅子嘉靖進士歷驗封郎中與張居正不合謝病歸起稽勳厯考功文選謝絶請寄除目下中外皆服遷太常少卿以僉都御史巡撫江西纍遷吏部尚書引用僚屬極一時選别邪正斥貪頑崇退讓進遺佚朝野想望丰采執政大臣不便其所為會廷推閣臣列故大學士王家屏等名不稱上意謫文選郎顧憲成等有年疏救不納纍疏乞歸有年風節髙天下兩世膴仕無宅居其妻孥卒諡恭介駱問禮字纘亭諸暨人嘉靖進士厯南京刑科給事中隆慶初陳皇后移别宫問禮偕同官張應治抗疏爭之不報張居正請行大閲御史詹仰庇以直言禠官問禮皆力諫復條上面奏事宜十事帝不悅宦侍搆之謫楚雄府知事萬厯初官至湖廣副使徐渭字文長山隂入天才超軼工詩古文為諸生有盛名總督胡宗憲招致幕府管書記宗憲得白鹿將獻諸朝令渭草表以進世宗大悅宗憲以是重之渭知兵好竒計宗憲平定倭冦渭皆預謀及宗憲下獄遂發狂自廢後坐事繫獄得救免遂恣遊名山歸鍵户作書晝自給孫礦字文融鑨弟萬厯初會試第一有文名為考功文選郎澄清銓法名藉甚纍遷兵部侍郎總督薊遼軍務經略朝鮮時關白破朝鮮請封貢尚書石星主之礦力排星議疏言倭情多詐宜嚴為之備星不聽俄倭起兵封貢議絶星下獄礦亦罷後官南京兵部尚書周汝登字繼元嵊人萬厯進士授南京工部主事榷稅蕪湖關時當道增稅額汝登不忍苛民以缺額謫兩淮璽運判官建學延師場民向化纍官南京尚寶卿汝登師事王畿論者謂王守仁之學再傳至汝登云薑鏡字永明餘姚人萬厯進士授禮部主事進主客員外郎時皇儲未建鄭貴妃與司禮田義潛畜異謀鏡上疏劾奏義大怒條旨杖午門外神宗以其言直改革職光宗即位贈光祿卿鏡曽祖榮以劾逆瑾貶外父子羔以忤嚴嵩罷歸及子逢元以修三朝典要忤魏璫見屏薑氏世以直節聞而鏡尤卓卓云陶望齡字周望會稽人父承學嘉靖進士纍遷禮部尚書望齡少有文名舉萬厯會試第一廷試第三授編修妖書獄起沈一貫欲殺侍郎郭正域望齡見朱𢋫正色責以大義願棄官與正域同死𢋫言於一貫其獄始解厯官國子祭酒與弟奭齡皆講學有盛名卒諡文簡朱燮元字𢡟和山隂人萬厯進士除大理評事厯四川布政天啓初奢崇明反變元方入覲就道還治兵擊敗賊解成都圍擢右副都御史巡撫四川時安邦彥復叛貴州加燮元兵部尚書總督五省軍務合兵進剿斬奢崇明降安位黔蜀蕩平崇禎中論功進少師十一年卒於官王思任字季重山隂人萬厯進士博通文籍三為邑令遷袁州府推官有能聲歷刑工二部主事僉事江西魯王監國授詹事府詹事禮部侍郎未幾郡城失守思任屏家依祖墓於鳯林搆草亭顔之曰孤竹庵巡按御史王應昌請拜新命思任復書謝之自是遂不飲食卒錢象坤字宏載會稽人萬厯進士泰昌初官少詹事直講筵畢見中官王安與執政議事即趨出安使人延入堅不可時行立枷法慘甚象坤率同列固爭熹宗惻然多所寬釋天啓中再遷禮部侍郎六年廷推南禮部尚書魏忠