張焜芳字九山會稽人崇禎進士為南京户科給事中疏薦黃道周惠世揚陳子壯金光辰而為舊輔文震孟請恤被旨切責會糾太僕少卿史葬侵盜事為􅒇所訐遂罷職後起用北上扺臨清遇大兵𬒳執死之妻妾並投井死次子翰後亦死節于家本朝乾隆四十一年賜諡忠節嚴起恆字震生山隂人崇禎進士除刑部主事歷廣州知府衡永兵備副使所至民懷其德十六年張獻忠躪湖南吏民悉走起恆獨堅守永州唐王時擢户部右侍郎督湖南錢法永明王時拜文淵閣大學士從王奔南寧以阻孫可望王封為其將賀九儀所殺投尸於江流十餘里泊沙渚間虎負之登崖葬於山麓本朝乾隆四十一年賜諡忠節章正宸字羽侯會稽人崇禎進士由庶吉士改禮科給事中王應熊入閣不由廷推疏劾之下詔獄廷臣交救得釋巳召還遷吏科部給事中屢忤首輔周延儒又詆兵部尚書陳新甲姦邪既而會推閣臣失帝意謫戍均州福王時起故官遷大理丞後棄家為僧不知所終熊汝霖字雨殷餘姚人崇禎進士歷户科給事中疏言用將之失又論天下督撫得失及楊嗣昌誤國罪京師戒嚴汝霖分守東直門陳援剿機宜疏凡二十上忤旨謫福建按察司照磨福王時召為吏科後從魯王泛海為鄭彩所害孫嘉績字碩膚餘姚人大學士如遊孫登崇禎進士授南京兵部主事進職方郎中中官髙起潛求世蔭嘉績格之起潛乘間進讒下獄已黃道周亦下獄嘉績力為調護因從受易後刑部尚書徐石麒具爰書奏乃釋魯王航海從至舟山而死本朝乾隆四十一年賜諡節愍吳從義字𥙿強山隂人崇禎進士授長安知縣甫之官值比歲兵荒委曲賑恤訓練丁壯三百人擊賊有功朗大軍駐西安征求百出從義設法均輸民力稍寬城陷從容下城釋戎服襲冦裳望闕叩頭引刀自刺不死遂石擊死本投於井賊將引出之輒大罵賊怒推朝乾隆四十一年賜諡節愍俞志虞字際華新昌人崇禎進士授順慶府推官擢御史甲申奉差巡聞聞闖寇逼境吏曰他省可以避難志虞曰吾當以王事死豈可假王事以求生乎京城陷不食坐露地梓宫出東華門志乾虞匍匐往慟是夜遂縊死本朝隆四十一年賜諡節愍章尚絅字暗然會稽人以國學生歷官秦蒲長史崇禎末賊李自成陷城尚絅投印井中冠服趨秦藩端禮門再拜自縊贈按察司副使本朝乾隆四十一年賜諡節愍髙岱字魯瞻會稽人崇禎中以武生舉順天鄉試魯王監國授職方生事紹興失守即絶粒祈死子諸生朗泣拜父前曰兒請先之乃携巾服泛小舟紿舟子出海禱神北面再拜躍人海中舟子急入水救捽其中朗躍出水面正巾而殁岱日亦卒聞之曰兒果能先我乎自是不復言數本朝乾隆四十一年賜諡節愍朗亦列入祀典葉汝字衡生會稽人崇禎中由舉人歷兵部主事聞變與妻王氏出居桐塢賜墓諡所節並赴愍又水死永平道本中朝乾隆軍守備四十程應一琦年山陰人永平山破隂與人鄭崇國禎昌甲同申死妻寇陷亦殉都城節儀偽使封至知同縣陳官勸三迎益碎所佩死之印禮不屈部主死事監董餉元知會縣稽吳人道舟正餘山破姚目人揚縊於州學破宫兵縊部死主中事李開軍都督國府臨左山都衛督人舟義興山侯破鄭殉遵節謙死母會稽亦人以鄭諸遵生儉倡衆會稽起人兵舟從山魯破王殉至節鷺門投死翰林海死通政院編修徐使復儀吭上死虞光人祿浙寺東少破卿泣高奔績蹲紹山興投空人兵谷部以職死或方司云扼郎中金緬簡死山隂人禮難東鄉知部縣侍趙郎楊在德遴上餘虞姚人人流並賊從圍桂王城力入守不虞支投人獻井賊死一攻銅家梁死城者陷十不七屈人死銅署梁臨知清縣州顧旦事山上東布不政從使見理殺問薑妻來道氏元沈餘湖姚人死子濟廷南梁被圍從之城江陷油脅縣降典史章山獨贊贊元元會坐稽廳人不崇去禎賊十六脅降年不流屈寇躍至縣水死令避登州入參將馬聰會稽人崇禎間兵變守城援絶受重創被擒不屈遇害闔門並死以上諸臣俱於乾隆四十一年賜諡節愍趙嘉煒字景恩山隂人崇禎末任郫縣主簿守都江堰賊至脅之降不屈因射死而沈於江本朝乾隆四十一年列入祀典單國祚會稽人崇禎末為通海典史城陷握印坐堂上罵賊不屈被殺印猶在握縣人葬之諸葛山下本朝乾隆四十一年列入祀典又臨清州吏目陳翔龍蕭山人崇禎十五年大兵破臨清死節銅陵典史胡國瑨餘姚人左兵破城與知縣胡鯤化同死金華訓導潘大成新昌人城破父子同死之商邱主簿鄒光祚山隂人壬午城破罵賊死武安典史吳應科蕭山人崇禎中流寇犯境赴敵死郟縣主簿陳惟孝紹興人崇禎十五年城陷被執不屈死滎陽典史周崇禮山隂人崇禎八年流賊入境被執罵賊死平江主簿楊如雲紹興人賊陷城授以偽官大罵不從賊投之石壁潭死金山衛巡檢章自孝山隂人海寇橫劫率鄉勇拒之不克死鎮撫趙應時山隂人奉檄擊賊蕭顯於乍浦為賊所掩被創墜馬死以上職官俱於本朝乾隆四十一年列入祀典王育蓍字元趾會稽諸生受業於劉宗周杭州失守宗周絶粒未死育蓍上書勸早自裁遂自投栁橋下先宗周死本朝乾降四十一年列入祀典又王國宜嵊人昌平破與父馬佐同死生員潘集周卜年俱會稽人生員朱瑋山隂人生員傳日炯諸暨人浙東破俱殉節死又布衣倪文徵山隂人為蒙師紹興破掘坎坐缸中自瘞死俱於本朝乾隆四十一年列入祀典本朝沈文奎字清遠會稽人客遊遼左太宗文皇帝選士登第一充祕書院纂修官順治元年扈從入關仕畿南巡撫尋遷總督漕務時江淮初定文奎綏輯有方膠州將海時行叛率先會剿以功進兵部尚書劉汋山隂人宗周子宗周家居講學弟子聞教未逹輒私於汋汋應機開譬俱有條理宗周死明唐魯二王遣使祭誘汋官汋辭杜門絶人事考訂遺經以竟父業所臥榻假之祁氏臨終強起易之曰吾安可終於祁氏之榻陶宏才會稽人官東安縣典史順治三年土寇竊發宏才手刃數賊身中八矢𬒳執不屈死同縣王家瓚官如皋典史徐必遇官泰興主簿俱順治二年死方允珂之亂章德英官神木典史順治五年死薑瓖之亂均詔恤如例黃應乾上虞人知吳川縣順治九年李定國兵薄城應乾嬰城守力盡城陷死之吳興祚字伯成山陰人父執忠順治中官御史備兵漳泉諭降黃梧土寇有功興祚由貢生厯知萍鄉無錫有能聲康親王征閩知其才薦授福建按察使以計擒劇賊朱統錩散其黨就擢巡撫與總督姚啓聖敗鄭經將劉國軒於漳泉克定厦門晉兵部尚書終兩廣總督王之鼎字公調山陰人順治丁亥進士知祁縣有善政薑瓖叛之鼎殫力守禦時出奇奮擊多所斬獲賊悉鋭來攻援絶城陷被執罵不絶口遇害贈按察司僉事同縣周茂覺吳希賢王之佐俱以山西典史並死薑瓖之難王明臣知日照縣順治四年土寇攻城明臣固守賊不能下捨之去旋復聚衆來攻城陷死之戴光升龍南縣丞順治四年土寇倡亂光升率鄉兵擊敗之賊復援粵寇夜襲營光升死之陳炳新羅定州吏目順治十年死李定國之難吳錫綬字紫卿會稽人順治中舉武進士為羅定都司時平樂久為賊踞錫綬從撫蠻將軍傳宏烈集兵恢復五戰五捷直抵平樂賊吳世琮擁衆猝至決潯水以截援師錫綬奮力鏖戰糧盡矢絶自剄以死從死者數百人贈昭武將軍酈引昌字叔典諸暨人山東沂州同知隨征湖廣遷永州通判賊陷城昌及妻王氏子尚英皆死之贈湖廣按察司僉事同縣宣德仁任湖廣都司康熙二十七年夏逢龍據武昌城脅降不從遂自經家屬盡被害贈副將王焜字爾旭會稽人任廣西宜山知縣寇亂殉節死贈僉事王質山陰人康熙十八年高陵縣典史隨王進寶入川平賊有功升渠縣知縣以事赴會城為餘賊所執囚繫數月不屈死之贈僉事薑圖南字匯思山陰人順治已丑進士選庶吉士改御史巡視陜西茶馬吳逆鎮撫秦州軍伍多踰制圖南劾其無人臣禮再巡兩淮鹽務鹺政肅清姚啓聖字熙止會稽人由奉天籍中康熙癸卯舉人任香山知縣以詿誤去官甲寅率義兵破紫閬山賊起溫州同知加溫處道海賊鄭錦據臺灣啓聖為福建布政使擢總督首陳平海十疏遂復金門厦門賊退保澎湖啓聖晉秩太子少保兵部尚書以康熙癸亥六月進兵克澎湖七月錦子克塽降臺灣平卒於官王龍光字幼譽會稽諸生范承謨延之課子耿逆叛執承謨龍光與無錫嵇永仁並被囚賊授龍光筆札令草安民檄啖以偽官不從後精忠害承謨龍光與永仁偕死贈國子監助教胡升猷字允大山陰人順治進士授行人厯官至陜西漢興道時吳逆反全陜俱震升猷誓師登陴為堅守計吳逆必欲殺升猷賊將王屏藩與大兵搏戰升猷墜馬被執乃囚幽室掠治無完膚至六載吳逆敗乘間奔軍門聖祖嘉其抗節立擢四川按察使旋進大理卿右都御史刑部尚書薛人鳳字仲輝會稽人康熙十九年通判夔州解餉赴榆州道經萬縣值談宏叛被縛至天成山迫令降不從遇害贈僉事楊學泗字魯鐸諸暨諸生年十四喪父哀毁骨立三年如初喪母病刺血為疏號泣籲天病竟愈康熙甲寅山寇踞紫閬當富春諸暨要隘學泗糾集鄉勇探賊虛實狀密陳制府領兵進剿殱渠魁制府欲上功以母老力辭黃宗羲字太沖餘姚人父尊素明天啓時以御史死詔獄宗羲年十九懷疏訟冤後受業劉宗周研究先儒之學從遊日衆康熙十八年都御史徐元文薦於朝以老病辭詔取所著書宣付史館宗羲上下古今穿穴羣言自天官地志九流百氏之書無不精研所著有南雷文定及明儒學案若干卷學者稱梨洲先生弟宗炎著周易象辭尋門餘論圖書辨惑等卷力闢陳搏之學謂周易未經秦火不應獨禁其圖至為道家藏匿二千年至搏始出其學術大略與宗羲同而奡岸幾過之宗會亦負異才宗羲子百家傳宗羲之學著勾股測矩解原二卷時有三黃之目邵廷采餘姚人諸生祖曽可父貞顯皆傳王守仁之學至廷采初讀傳習録無所得既讀劉宗周人譜曰吾知王氏所始事矣嘗答李塨書曰致良知者主誠意陽明而後願學蕺山又念師友淵源及身而絶因作王子劉子王門第子劉門弟子等傳又作宋明遺民所知傳倪文正施忠愍諸傳凡數十篇弟子刻其文為思復堂集周之麟字石公蕭山人順治己亥進士由庶吉士授檢討官至通政使平生嚴取豫謹飭周密服官久田不及中人嘗語子弟曰我較諸生時服食不敢一分增氣概不敢一分減時以為名言卒賜祭葬胡拱軫山陰人父母年並八十值夜火拱軫起救方負母出火愈烈復入救父樓傾與父同盡明日出其尸拱軫以身蔽父體手障父面儼然如生巡按王元曦具題建坊厲世昌字周鼎會稽諸生父允讓於明崇禎末客遊嶺南卒大兵下嶺南廣東西道梗不通及事定世昌鋭意求父遺骸至南海蹤迹茫然世昌日夜哭叩頭禱於城隍神求夢及得夢凝思其意頓悟果得父棺於義塜牆下啓之骨已黝黑髏邊有髻簪舊物也嚙指血酒骨間滴之滲入乃大慟欲絶負而歸葬世昌年九十二以夀終子煌成進士官翰林人謂為孝行之報褚百五餘姚人康熙初耿逆黨犯嚴州百五以參將奉檄率兵往剿百五素稱驍勇屢奪險隘犬破之賊復悉鋭驟至百五左右衝決圍開復合歿於陳贈副將同時以都司招撫賊黨被戕者有蔡佳蕭山人均詔恤如例又趙一柱亦餘姚人順治中知沔陽州西山寇發殉節死贈知州吳師貞山陰人任興化鎮千總康熙十八年耿逆黨犯山陰師貞率兵二百挺戈奮擊入賊重圍中炮死子敦仁率十餘騎衝賊陳覓父尸死之同縣錢志泗興國縣典史康熙十三年以剿耿逆戰歿邱煥麟清平縣典史雍正十三年苗賊滋擾煥麟手刃數賊被磔死陳憲以黃平州幕同時死難馮啓宗官彰化縣典史朱慧昌官臺灣同知並於乾隆間以剿林爽文戰歿魯楙雷州吏目乾隆六年以往諭土賊被羈脅降不從賊棓殺之成國梴會稽人官江南遊擊康熙十三年耿逆黨擾浙江土寇應之國梴奉檄往剿時賊方據險隘國梴擊敗之賊復據嵊縣國梃率兵進剿斬五十餘擒十七人賊棄城遁復追斬百三十人是年賊復犯台州國梴衝破其圍賊退據水口國梴從上遊渡斬百餘人賊仍聚衆至國梴短兵接戰身受數刃陳歿贈參將同縣陸之蕃鄱陽縣丞康熙十四年死耿逆之難蔣鈖海澄營守備康熙十六年海寇犯同安鈖迎擊追剿中火鎗猶裹創力戰死之贈都司僉事章啓周漢川巡檢康熙間以招撫逆藩吳三桂殉節贈主簿魯仁圻鳳漢營千總康熙十四年王輔臣叛被執脅降不屈死諸士英新昌典史康熙十三年程鳳叛被執不屈死贈主簿陳天錫烏蒙司獄雍正八年烏蒙彝叛天錫憤鎮將握重兵不戰知城必陷手刃其妻自刎於官署金鑲紹興人官大洞巡檢康熙三十六年洞猺搆逆鑲挺身奮擊手刃四賊追至岑溪遇伏死章倫雲南試用州同雍正十年新昌猓彛叛罵賊死邵鮑河間典史順治三年土寇竊發死難倫鮑亦紹興人縣籍俱無考毛奇齡字大可蕭山人康熙十七年以諸生召試博學鴻詞授翰林檢討纂修明史嘗以所輯古今通韻十二卷進聖祖稱其淵洽後以病乞歸卒年九十四奇齡博覽載籍於學無所不窺好議論工詩古文辭撰述之富為一時冠門人編輯遺集分經集文二部凡五十種二百三十四卷四庫全書收奇齡所著書目多至四十餘部同里來蕃字成夫嘗作故明二畿賦與山陰徐緘並有俊才奇齡為作二友銘又張杉字南士亦與奇齡倡和有詩名胡惟宏字大生會稽人父患痼疾惟宏侍湯藥衣不解帶者十五年雪夜父渴思食梨城門已扃遂繞城隍號泣忽見一軍士指負堞一舍引之去得梨以歸詰旦往謝堞下不復有舍惟關忠義祠在焉始悟為神使父殁營葬東湖躬負土石建堤植木人稱孝子堤按山陰縣有孝子高啓燮俞昌祚會稽縣有孝子徐烈謝宗嶽施元龍諸暨縣有孝子周茂樞樓墨林樓永敬上虞縣有孝子葛延廉王金璧王全琮錢􅍲張成元張宏毅陳啓麟胡元彪陳作霖俱於乾隆年間先後旌表又山陰縣孝子胡書煜蕭山縣孝子汪洪海上虞縣孝子胡鍈並於嘉慶年間旌表周長發字蘭坡山陰人雍正甲辰進士選庶吉士改知縣復教諭乾隆元年召試博學宏詞授檢討才思敏贍入直上書房官至侍讀學士著有賜書堂文集胡天遊字稚威山陰人副榜貢生雍正十三年舉博學宏詞入京師大學士鄂爾泰問以兩戒形臠九乾躔度八十一家文墨口汨汨如傾海爾泰大驚嗣因廷試報罷延為三禮館纂修四方求詩文者麕至公卿爭欲致門下天遊不屑也䇿文或二千言論或數十字不合格三中乙科乾隆辛未再舉經學尋遊太原病卒又同邑徐廷槐字笠山雍正庚戌進士手所論著及刪定者凡七十餘種與天遊同舉制科廷槐尤工制藝得其指授者咸自名家童鈺字二樹山陰人以詩名越中嘗月下吟詩得輒綰一結記之比曉己二十四結矣畫蘭竹水石俱工尤喜畫梅有髙氏九棺未葬揮十紙助之窀穸立辦何煟字謙之山陰人以州同效力河工授桃源同知乾隆十三年擢河庫道轉兩淮鹽運使未幾罷職二十二年復授淮揚道旋隨大學士劉統勳赴豫堵築中牟縣楊橋黃河漫口成煟誠篤恪勤熟諳河務厯任開歸陳許山東運河河南河北各道河南按察市政兩司至巡撫俱兼管河務加總督兵部尚書銜卒贈太子太保諡恭惠邵晉涵廷采族孫乾隆進士歸班銓選會開四庫館充詔以編修入館編纂洊擢至侍講學士文淵閣直閣事晉涵博聞強識碩學知名尤長於史因見永樂大典采舊五代史乃薈萃編次復搜采羣書辨證條繫悉符原書一百五十卷之數書成館臣請仿劉昫舊唐書之例列於二十三史刋布學宫詔從之御製七言八韻詩題其首所著有爾雅正義並傳於世梁文標字師臣會稽人以資為刑部司獄恤囚備至尚書勵廷儀薦之擢本部主事讞獄直公所整襟達旦未嘗寢有阿達哈哈番在獄橫恣搒之生平勇於接物卒之日囊無餘錢嘉慶十四年入祀鄉賢祠梁國治字階平文標子乾隆戊辰進士廷試第一人由修撰厯官東閣大學士屢典試事視學安徽所至稱得士任封疆典樞要端醇謹慎不名一錢門庭索逋恆滿撫湖北時擒長江盜殆盡性孝友事寡嫂如母卒贈太子太保賜祭葬諡文定著有奏御集敬思堂詩鈔會稽書録嘉慶十三年入祀鄉賢祠何裕城字福天焨子以江南淮徐道署東河總督擢撫河南調陜西江西安徽卒裕城隨父任所熟悉河防其治水河南也築格堤加排水壩新河以成又濬五龍口等六渠撫江西時擒積盜四十餘人去任老幼數萬人渡江送之著有江南全河指要庭訓録嘉慶十二年入祀鄉賢祠吳璜字芳甸山陰人幼有時譽胸次浩落工詩同輩推服之乾隆庚辰進士以戶部主事改知州大兵征金川揀發軍前死木果木之難贈分巡道賜祭葬從祀昭忠祠夀同春字芝崖諸暨人以監生佐淡水廳同知程峻幕乾隆五十一年林爽文反峻被害同春年逾七十糾義旅擊賊奪其塹擒賊目數人尋遇伏馬蹶被執罵不絶口賊支解之事聞贈知縣蔭一子江林上虞人嘉慶元年以縣丞隨剿楚匪賊謀夜襲我軍偵知之悉斬內應俟其至擊敗之賊復以衆來林力戰圍急猶手刃數賊斬執旗賊首一人歿於陳蔣元龍諸暨人嘉慶十五年旌表義夫流寓漢梅福字子真夀春人為南昌尉上書譏切王氏不見納一朝棄妻子去九江傳以為仙其後有人見福於會稽變名姓為吳市門卒云桓煜字文林龍亢人初平中避地會稽主山陰鍾離意家太守王朗贈以服食不受越人化其節閭里不爭許靖平輿人董卓秉政靖與會稽太守王朗有舊往依之靖收恤親里經紀賑贍出於仁厚孫策東渡江靖身坐岸邊先載附從疏親悉發乃從後去見者歎息晉阮裕尉氏人居會稽剡縣纍辟不就或以問王羲之羲之曰此公近不驚寵辱雖古之沈冥何以過之孫綽中都人幼與兄統過江家於會稽遊放山水作遂初賦以致意謝安陽夏人寓居會稽與王羲之許詢支遁遊處出則漁弋山水入則言咏屬文棲遲東土雖放情邱壑而有公輔之望戴逵譙國人徙居會稽之剡縣性高潔棲遲衡門與琴書為友孝武帝時屢徴不己乃逃於吳會稽內史謝元慮逵逺遁不反上疏請勿召命許之逵復還剡子勃及容並隱遁有高名南北朝宋王宏之臨沂人家居會稽上虞從兄敬宏奏為太子庶子不就性好釣上虞江有三石頭宏之垂綸於此日夕載魚入上虞郭經親故之門各以一兩頭置門內而去孔淳之魯人居會稽剡縣性好山水每遊必窮幽峻或旬日忘歸會稽太守謝方明苦要之不肯往茅室蓬戶惟床上書數帙而已元嘉初復徵為散騎侍郎乃逃之上虞縣界家人莫知所在齋褚伯玉錢塘人少有隱操居剡之瀑布山三十餘年隔絶人物髙帝即位手詔吳會二郡以禮迎遣辭疾上不欲違其志敕於白石山立太平館居之何允字子季灊人仕至中書令建武初拜表辭職居會稽若耶山雲門寺初允兄點隱居吳郡山中至是允復隱世謂點為大山允為小山唐吳筠華隂人初居嵩山為道士祿山之亂因東入會稽剡中張志和金華人居江湖自稱煙波釣叟兄鶴齡為築室越州東郭觀察使陳少遊表其居為元貞坊買地大其閎號回軒巷門阻水無梁為構之名曰大失橋宋程迥寧陵人家於沙隨靖康之亂徙紹興之餘姚韓肖胄安陽人髙宗時知紹興府尋奉祠與其弟應胄寓居於越幾十年事母以孝聞元貢性之字友初師泰之子明初有薦之者遂改名悅居會稽耕漁自給既卒門人私諡之曰貞晦先生纂修官臣李煌恭纂前纂修官臣蔡賡揚恭纂前總纂官臣黃爵滋恭覆輯前校對官臣鄧遇辰恭校
