友人王昱收葬於南郊每歲寒食鄉人傾邑祭奠廣其冡至二畝餘按郟縣志辨誤云葬貞佐者為所舉孝子王錫元而作傳者門人同廷舉也至史所稱友人王里則縣前後志並無是人因附注以備考李希顔墓在郟縣西劉濟墓在郟縣西北大劉山之麓祠廟二程祠在州治西聖學書院內又寶豐縣西北有明道先生祠滕公祠在州西關祠有二俱祀明勝昭二賢祠在魯山縣祀唐元德秀元結三蘇祠在郟縣西北小峩嵋山兀至正中建三賢祠在郟縣治北祀漢銚期臧宫唐馬燧明嘉靖中建顏魯公廟在州治東龍興寺內廣成子廟在州西南崆洞山風伯廟在州東北風穴山膠東侯廟在寶豐縣治西南祀漢賈復本朝乾隆七年建寺觀龍泉寺在州城東北二十五里又魯山郟城寶豐俱有龍泉寺仙林寺在州東北四十里唐岑參有詩荷福寺在魯山縣城後街一名卧佛寺晉大安三年建本朝康熙年間修雍正二年重修潤國寺在魯山縣陽石保隋間皇十六年建宋太和五年重修開化寺在郟縣治東後魏時建本朝順治十一年修香山寺在寶豐縣東龍山內有古塔唐時建乾明寺在伊陽縣南現山之麓北齊天保中建敕名彌陀寺後唐曰天成寺宋改今名金山寺在伊陽縣城北五十里周天復十一年建玉陽觀在郟縣治南元泰定中建本朝順治十年修名宦漢馮魴湖陽人建武中為郟令時郟賊延褒等聚衆三千餘攻圍縣舍魴率吏士七十餘人力戰連日城陷帝聞馳赴按行鬪處嘉之曰此健令也褒等降帝以還魴魴責讓以行軍法聽各反農桑為令作耳目是時每有盜賊並為褒等所發無敢動者縣界清淨晉華談廣陵人惠帝時為郟令兵亂之後境內飢饉談傾心撫恤司徒王戎聞而善之出榖三百斛以助之甚有政績南北朝魏鄜道元涿鹿人景明中試守魯陽郡表立黌序崇勸學校山蠻服其威名不敢為寇弟道約繼兄守魯陽為政清淨吏民安之隋公孫景茂阜城人開皇中為伊州刺史以疾徵吏民號泣於道柳旦解人開皇中魯州刺史有能名唐張善相襄城人為伊州總管王世充攻之糧盡善相謂僚屬曰我為唐臣當效命君等無庸死斬我首以下賊可也衆泣曰與公同死愈於獨生城陷𬒳執罵賊見殺李皓開元初為汝州刺史政嚴簡有治稱昆弟繇東都省皓往來微行州人無知者其清慎如此元德秀河南人為魯山令有盜繫獄會虎為暴盜請格虎自贖許之吏白彼詭計德秀曰不可負約明日盜尸虎還舉縣嗟數元宗在東郡酺五鳳樓下命三百里縣令刺史各以聲樂集河內太守輦優伎數百被錦繡或作犀象瓌譎光麗德秀唯樂工數十人聯袂歌于蒍于于蒍于者德秀所為歌也帝聞歎曰賢人之言哉乃黜太守德秀益知名所得俸祿悉衣食人之孤遺者嵗滿笥餘一縑駕柴車去陸長源吳人為汝州刺史清白自守將去送車二乘曰吾祖罷魏州有東一乘而圖書牛之我愧不及先人云薛平龍門人為汝州刺史治有風績令狐緒華原人宣宗時為汝州刺史有佳政汝人請刻石頌德緒以弟綯當國固讓宣宗嘉其意乃止五代漢劉審交文安人隱帝時為汝州防禦使有能名卒州人聚哭柩前上疏乞留葬近郊詔特贈太尉使民得嵗時祠祭周姚內斌盧龍人世宗時為汝州刺史將代吏民詣闕舉留恭帝詔褒之宋竇卞冤句人通判汝州秦悼王葬汝宗室來汝者衆役兵三千郡守林濰以汝與其鄉近因使輦薪芻鐵石致其家衆怨憤遂挾大校叛卞啓闡招諭之少定乃密推首惡羈之請於朝詔濰致仕悉配從亂者江翺建陽人景德中為魯山縣令邑多曠土亢魆連嵗翺以黍稻性耐旱宜高原乃自建邑取種教民藝植自是皆為膴田王素莘人仁宗時知汝州政餘書不去手遇事立決待僚賓以謙恭待吏民以寬厚朱景偃師人英宗時知汝州葉驛道逺隸因為送者所虐多死景重禁以絶其患富弼河南人神宗時以僕射判汝州言新法臣所不曉不可以治郡願歸洛養疾許之李大臨華陽人由進士厯絳州推官用薦為祕閣校理以事責官監稅家故貧神宗擢知制誥纍格詔命出知汝州徙知梓州復官天章閣待制致仕卒世稱為三舍人之一程明道河南人監汝州監稅哲宗召為宗正丞未行而卒葛勝仲丹陽人徽宗時知汝州李彥括田破産者衆勝仲請蠲不當括者彥怒劾勝仲帝寢其奏趙子櫟燕懿王五世孫靖康中知汝州金兵破荆湖諸州獨子櫟能保境土李綱言於朝廷除寶文閣學士李安仁安慶人慶元中為寶豐令軫恤民依作興士類開渠以興水利三年之間致民富庶百弛具舉有能聲金姫汝作汝陽人授汝州招撫使天興初元兵至城城垂破汝作至招集士卒以死拒之兵退授防禦使其冬戰於襄郟得馬百餘士氣頗振遂為總帥二年中京破部曲謀以城降懼汝作不敢言乃以遷州入山白之怒曰朝廷以州事帥職委我生為金民死為金鬼汝輩欲避非欲降乎再言遷者斬八月州人梁臯作亂徑入州廨遂為所殺事聞哀宗甚嗟惜之元尚野撫字恩練總詹思鸞與進士袁熊瑞等謀不軌呈秀捕斬之十五年城陷不屈死邵子灼會清人崇禎中知郟縣李自成陷城遂𬒳殺郟吏先後死賊難者知縣俆廷試教諭雷振揚山西人訓導董耿光舞陽人皆署縣事主簿陳維孝紹興人典史胡士奇江西人劉名揚湖廣人李貞佐安邑人崇禎十四年知郟縣土寇竊發貞佐練鄉兵以備之又勞農課士邑有殉難二女拜其冡祀之民大悅李自成來寇貞佐集衆死守城陷有勸微服遁者不可賊執之見殺人厲聲曰驅百姓固守我也妄殺何為賊支解之母喬氏亦死贈河南僉事朱由緘明宗室知寶豐縣崇禎十四年死於李自成之難贈僉事又周之德陵縣人以洛陽丞署縣事亦死賊張人龍遵化人崇禎中知寶豐縣流寇陷城不屈死妻年少家奴數人欲亂之妻飲以酒潛遣婢告丞尉捕殺之乃扶櫬歸孔貞璞曲阜人崇禎中知伊陽縣時值流寇多方守禦賊懼不敢入城後至汝陽被執不屈死陳惟孝紹興人崇禎末為鄉縣丞流寇陷城𬒳執斷鼻斬手終不從遂殉節本朝徐鳳鳴奉天人順治十一年知郟縣招集河朔流民給牛種墾荒田創立鴻宅保以居之祀名宦張震維吳縣人康熙二十年知郟縣縣多水患震維設法開渠疏通淤滯遂成膏壤祀名宦王登魁奉天人康熙二十八年知汝州時疫癘盛行飛蝗蔽天魁率衆捕蝗開倉賑貸全活甚衆魯邑拐河山逆寇揭竿嘯聚魁率民兵殲其渠餘黨悉平祀名宦楊宫建浙江人康熙三十六年知寶豐縣廉介自矢庭無私謁開溝疏渠以備旱潦邑人賴之祀名宦章世麟宛平人康熙時知汝州聽斷明決以興廢舉墜鋤強扶弱為已任培又風賑飢民姦宄斂迹康其武河陽人康熙三十九年為伊陽知縣廉公有威恤民重士凡雜派諸弊革除殆盡淮任二載卒於官靈輀西歸士女泣送者數十里不絶人物漢馮異父城人好讀書通左氏春秋孫子兵法光武道經父城異開門奉迎署為主簿拜偏將軍從破王郎封應侯異為人謙退不伐行與諸將相達輒引軍避道進止皆有表識每所止舍諸將並坐論功異常獨屏樹下軍中號曰大樹將軍拜孟津將軍北攻天井關拔上黨兩城南下河南成臯以東十三縣及諸屯聚與寇恂合破蘇茂因渡河擊走朱鮪建武一年封陽夏侯代鄧禹討未眉拜征西大將軍大破亦眉於崤底又擊走延岑威行關中懷來百姓申理枉結出入三嵗上林成都六年朝京師帝賜以珍寶衣服異謝曰願國家無忘河北之難小臣不敢忘巾車之恩詔異軍枸邑未及至隗囂遣行巡取栒邑異潛往閉城乘其不意擊鼓建旗而出大破巡軍帝下璽書曰征西功若邱山猶自以為不足甍於軍諡曰節侯銚期郟人容貌絶異矜嚴有威光武聞期志義召署賊曹掾拜偏將軍别徇真定宋子攻拔樂陽槖肥纍從擊王郎將於巨鹿下先登破陳𬒳創中額攝幘復戰遂大破之拜虎牙大將軍從擊青犢赤眉身𬒳三創而戰方力賊遂破走光武即住封安成侯拜衛尉期重信義自為將有所降下未嘗虜掠及在朝廷憂國愛主其有不得於心必犯顏諫諍十年卒諡曰忠臧宫郟人從光武征戰諸將多稱其勇光武察宫勤力少言甚親納之以為偏將軍從破羣賊數陷陳卻敵建武二年封成安侯擊更始將於沮陽酈悉降之拜輔威將軍更封期思侯十一年將兵屯駱越破荆門拔綿竹破涪城斬公孫伖復拔繁郫滅公孫述定封朗陵侯斬妖巫等還遷城門拔尉轉左中郎將擊武溪賊降之宫以謹信質朴故常見任用永平元年卒諡曰愍張宗魯陽人鄧禹定河東聞宗數多權謀表為偏將軍禹軍到栒邑赤眉大衆且至禹欲引師進就堅城衆多懌為後拒宗曰死生有命宗豈辭難遂留後以死當之及禹還光武以宗為京輔都尉與馮異共擊關中破之建武六年拜大中大夫擊潁川桑中青冀琅琊盜賊悉皆破散於是沛楚東海臨淮羣盜懼其威武相捕斬者數千人青徐震栗後遷琅琊相樊英魯陽人少受業三輔習京氏易兼明五經隱於壺山之陽州郡前後禮請公卿舉賢良方正有道皆不行建光初䇿書徵英不至順帝備禮元纁徵之復固辭乃詔切責郡縣駕載上道英不得巳到京天子為設壇席賜几杖待以師傅之禮延問得失英不敢辭拜五官中郎將數月稱疾篤詔以為光祿大夫賜告歸延篤犨人少從潁川唐溪典受左氏傳稍長從馬融受業博通經傳及百家言舉孝廉為平陽侯相桓帝時徵拜議郎與朱穆邊韶共著作東觀帝數問政事篤密對動依典義遷左馮翊又徙京兆尹病免歸篤論解經傳多所駮正後儒以為折中所著詩論銘書應訊表教令凡二十篇張楷本成都人父霸葬梁縣遂家焉楷通嚴氏春秋古文尚書門徒常百人自父黨夙儒皆造門焉車馬填街楷輒從避之舉茂才除長陵令不至官隱居宏農山中學者隨之所居成市後華隂山南遂有公超市五府連辟舉賢良方正不就順帝詔曰張楷行慕原憲操擬夷齊徵命不至將主者優賢不足歟郡時以禮發遣復告疾建和三年詔安車備禮聘之辭以篤疾不行張陵楷子官至尚書元嘉中歲首朝賀梁冀帶劒入省陵呵叱之令出敕羽林虎賁奪冀劒即劾奏冀請廷尉論罪有詔以一歲俸贖百僚肅然初冀弟不疑為河南尹舉陵孝廉因謂曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色張處虛陵弟沈深有才略司空張溫數以禮辟不能致中平二年溫出征涼州將行處虛自田廬被褐帶索要説溫以誅黃門常侍溫不能行遂去隱居魯陽山中及董卓秉政舉侍御史不就卓臨以兵強起至道疾終唐孫處約始名道茂郟城人貞觀中為齊王祐記室祐多過失數上書切諫王誅帝得其書咨嘆之擢中書舍人高宗即位中書令杜正倫請增舍人員帝曰處約一人足辦我事止不除纍遷司禮少常伯麟德初以西臺侍郎同東西臺三品為少司成以老致仕孟詵梁人擢進士第武后時為台州司馬相王召為侍讀拜同州刺史神龍初致仕居伊陽山睿宗召將用之以老固辭詔河南春秋給羊酒糜粥尹畢構以詵有古人風名所居為子平里馬炫郟城人少以儒學聞隱蘇門山不應辟召至德中李光弼鎮太原始署書記常參軍謀光弼器焉厯連潤二州刺史以清白顯卒兵部尚書馬燧炫弟姿度魁傑沈勇多算李抱玉署為趙城尉纍進至鄭州刺史代宗聞其才詔拜檢校左散騎常侍為河南三城節度使討李靈耀破其餓狠軍又擊走田悅汴州平遷河南節度使威震北方建中二年朝京師封幽國公還軍田悅攻臨洺燧與李抱真李晟大破之進同中書門下平章事封北平郡王詔晟為副元帥討李懷光不閲月河中平遷光祿大夫兼侍中帝賜宸扆台衡二銘以言君臣相成之美勒石起義堂榜其顏以寵之與李晟皆圖像凌煙閣卒贈太傅諡莊武王虔休梁人少涉學有材武大厯中李抱真聞其名厚以幣招之授兵馬使以功擢步軍都虞侯封同昌郡王德宗時擢潞州左司馬令留後號令撫循軍中大治討司馬元誼之叛破之治潞二嵗遷昭義節度使卒贈尚書左僕射諡曰敬虔休性恪敏節用度既殁所部帑廩可支數嵗嘗得太常樂家劉玠撰繼天誕聖樂以獻後中和樂本此宋寇瑊臨汝人擢進士授蓬州軍事推官徙開封推官會施州蠻叛轉運使移瑊權領施州瑊擒其酋領以白艻子弟數百人築柵守其險要後為開封府判官真宗詬施州備禦之術命為梓州路轉運使擢樞密直學士時有議茶法者帝訪利害瑊曰河北兵食皆仰給於商旅若官盡其利則邊民困帝然之天禧中河決澶淵瑊視役河上隄墊數里衆皆奔潰而瑊獨留自若須臾水為折去天聖末使遼未行卒沈宣梁人母亡既葬不塞墓門三年晝負土夜拊棺而卧為墳廣百尺妻高氏亦有孝行元豐中褒賜粟帛孔􅌈隱居汝州滍陽城性孤潔喜讀書遇嵗飢分所餘賙不足者聞人之善若出於已動止必依禮法環所居百餘里人皆愛慕之葬其父廬墓三年州以行義聞賜粟帛授祕書省校書郎致仕卒贈太常丞牛臯魯山人初為射士與金兵戰屢勝纍遷蔡唐州信陽軍鎮撫使會嶽飛制置江西湖北臯隸飛軍拔隨州復農陽從平楊么與金師戰汴許間以功最除捧日天武四廂都指揮使紹興十七年都統制田師中大會諸將臯遇毒卒金宗端修汝州人大定中進士好學喜名節明昌間補尚書省令史承安初詔拜監察御史時元妃李氏兄弟干預朝政端修上書乞遠小人詔問小人為誰對曰小人者李喜兒兄弟也復上書言事宰相惡之坐以不實削一官改大理司直遷大理丞召見謂曰汝以幹能見用盡乃心力惟法是守勿同上位宰執所見如何汝其志之端修終以直道不振於時自守愈篤妻死不更娶獨居二十年士論高之為節度使卒官從孫汝作正大末保山棚有功入守汝州盡力城陷兵入欲降之不屈而死哀宗遣近侍張天錫贈昌武軍節度使明李希顏郟縣人隱居不仕太祖徵為諸王師規範嚴峻授右春坊古贊善諸王就藩希顏歸隱部使騶輿訪之途遇一老枕槖卧前驅蹴之起乃希顏也倚槖與語一時重其清德安德汝州人元季隱居不仕洪武初州舉為訓導兵燹之後家無藏書德手寫以授生徒以明經徵召對稱旨擢湖廣左參政劉濟郟縣人景泰中舉人仕至遼東苑馬寺少卿濟性至孝父喪廬墓三年哭奠如一日時邑內蝗獨不近塋域者十餘里成化間詔表其閭滕昭汝州人正統中由舉人厯御史四川有殺人獄久不決命昭往一訊伏罪成化初纍官副都御史總督漕運召還理院事踰年命往視福建置歸化縣以弭寇尋詔巡撫蘇松分立靖江縣民便之遷兵部左侍郎致仕黃錦郟縣人邑庠生事親至孝親卒廬墓三年宏治中奉詔旌表王錫引亦郟人有孝行知縣李貞佐嘗造廬禮之劉茂正德間流賊犯魯山闔境逃竄茂獨守母柩抱哭不去賊感為致賻堅卻不受因未屠一人焚一室境內保全孝所感也鄉人至今祀之徐文斾寶豐人父母繼殁廬墓六年有靈芝異鳥之應人為歌曰孝哉徐柏林生異草集靈禽柏林其字也以貢士終高嵩郟縣人嵩孫光霽光霽子定之三世廬墓王裔昌郟諸生父敬臣殺賊不勝投井死裔昌慟哭曰吾生何為亦投井死王暘汝州諸生賊執其母暘請代賊並殺之周卜厯郟縣人崇禎中舉人授內黃知縣以父喪旋里流賊李自成執而欲官之不從賊曰為我執知縣可代汝死人厯曰殺人以利巳仁者不為賊怒遂殺之同邑陳心學以選知縣不就歸亦不屈賊見殺四十一年本朝乾隆賜諡烈愍李愷汝州人廩生崇禎十四年李自成攻州城從知州錢祚徴守城晝夜不懈時城中乏食愷殺牛餉士二月城波愷妻溫氏投井死愷被執罵賊遇害本朝乾隆四十一年豫祀忠義祠陳維明魯山人崇禎末流寇起率子襄九修寨鑿濠保護鄉里本朝乾隆八年祀鄉賢本朝李模郟縣人順治己亥進士明末父世凊為流寇所害模號哭檢父尸躬負至城藳葬後任武強知縣革除加賦之弊纍官廣西提學道同軌郟縣人康熙乙酉舉人精洛聞之學言行可師從學甚衆所著有夔園真志堂等集任楓汝州人康熙丁未進士少遭寇亂奉親避難寶豐城破賊逼令降楓罵不屈賊刃其耳鼻罵益厲身被數創死而復蘇後官靈石知縣有惠政趙運會郟縣人任星子知縣嚴禁溺女之俗修白鹿洞書院增廩餼多所成就傅麟瑞魯山人諸生七世同居乾隆五十二年旌高宗純皇帝御書賜額曰敦睦傳家趙鋭魯山人嘉慶二年教匪至境鋭率鄉勇堵禦被害同時禦賊遇害者陳德功劉文章郭忠俱魯山人流寓三國魏韓暨堵陽人避亂魯陽山中山民合黨欲行寇掠暨散家財以供牛酒請其渠帥為陳安危山民化之終不為害宋崔鶠陽翟人蔡京籍上書人以鶠為邪等免官移病居郟城治地數畝為婆娑園屏處十餘年人無貴賤長少悉尊師之范祖述華陽人靖康初避地至汝州汝守趙子櫟邀與共守於是旁郡盡陷汝獨全元王磐永年人金末遷汴乃舉家南渡河居魯山年方冠從麻九疇學擢進士第授官不赴大肆力於經史百氏文辭宏放浩無涯涘郝經澤州人金末父思溫避地魯山河南亂居民匿害中亂兵以火熏灼之民多死經母許氏亦死經以蜜和寒葅汁決母齒飲之即蘇時經九嵗人皆異之列女唐李廷節妻崔氏乾符中廷節為郟城尉王仙芝攻汝州廷節被執賊見崔美將妻之詬曰我士人妻生死有命奈何受賊污賊怒刳其心食之宋王氏二婦汝州人建炎初金兵至汝州二婦為所掠擁置舟中乘間投漢江死尸皆浮出不壞收葬城外江上為雙冢以表之明趙志業妻于氏郟縣人刲股療母既歸趙姑病復刲股療之張鐸妻于氏汝州人崇禎十四年流賊破城入其門氏謂兩婢曰吾革今日必死曷若先出殺賊而斃猶不失為義烈鬼於是執梃而前賊先入者三出不意悉為所踣羣賊怒攢刺之皆死任楓妻王氏汝州人楓遇賊不屈將見殺氏以身捍刃賊欲牽之去不聽遂遇害宗引芳妻江氏魯山人崇禎十五年流賊之亂與長男進士麟祥妻袁氏率孫女孫婦九人登樓俱縊視其已死乃引刀自刎血濺於壁張美含二女郟縣人流賊破城二女相繼投井死胡中珠女汝州人年十四罵賊賊怒殺於樹下本朝翟廣寒妻朱氏汝州人廣寒殁氏遭寇亂負姑攜子涉厯艱險守志彌篤康熙三十二年旌張光妻程氏汝州人光殁氏年十八姑欲奪其志自縊焦璨妻馬氏汝州人早寡煎髮自誓遺腹産一男授室而亡氏率寡媳撫弱孫堅守苦節同州詹四福妻袁氏姚紀妻喬氏均雍正年間旌劉坤妻宋氏魯山人守正捐軀同縣烈婦劉得賢妻蕭氏劉柱妻吳氏烈女李愈女均雍正年間旌丁欽妻楊氏汝川人夫亡守節同州節婦于文會妻崔氏余固璋妻扈氏王崑妻丁氏張振騫妻錢氏張天培妻郭氏侯愫妻劉氏金君澤妻尚氏崔巍然妻閻氏閻藟妻劉氏金鼎九妻張氏張洪猷妻崔氏閻守正妻魯氏王鳳鳴妻魯氏吉殿才妻趙氏趙之頗妻于氏杜士標妻王氏李卓然妻張氏楊渤妻吳氏陳建勳妻石氏閻岱妻馬氏郭俊善妻郭氏高起義妻何氏張一桂妻穆氏張思敬妻李氏張晏妻王氏卒翟妻王氏李謙妻黃氏溫珖妻趙氏文登科妻姚氏程作霖妻梁氏宋敏妻張氏畢士秀妻邢氏馬鴻妻張氏王棟臣妻白氏沈執中妻陳氏王燦妻連氏趙邦俊妻張氏馬嶇倫妻滕氏楊明妻劉氏馬亮妻屈氏王楚妻李氏馬珖妻竇氏王翠峯妻趙氏張全妻翟氏陳嗣騫妻黃氏韓鳳和妻屈氏烈婦曹景詩媳孟氏趙海玉妻任氏趙景生妻周氏李小保妻馬氏杜雲妻王氏杜士榮妻焦氏烈女李氏女均乾隆年間旌郭郛妻李氏魯山人夫亡守節同縣節婦陳潤妻何氏陳仁繼妻張氏葉其華妻張氏杜宗妻高氏肅苛妻李氏趙曰志妻李氏烈婦方書妻金氏吳洛妻栗氏張采妻余氏晏仁妻王氏宋某妻張氏崔某妻張氏烈女董氏女毛氏女均乾隆年間旌馮熙世妻李氏郟縣人夫亡守節同縣節婦劉璿妻王氏袁自盛妻張氏孫有祿妻王氏李應元妻馮氏李應會妻王氏劉于幽妻姚氏靳道妻宋氏史諤妻趙氏李孔碩妻趙氏張見妻宋氏梁嵋妻鄭氏李怡妻李氏趙有容妻張氏王子煜妻徐氏周積德妻王氏劉養慎妻張氏趙汝明妻季氏馮良妻馬氏徐楷妻劉氏王一樟妻宋氏張克獻妻袁氏劉曰溫妻柳氏李聲烜妻王氏朱錦妻曹氏邵忠妻王氏烈婦程二貴妻王氏凌秀妻朱氏魏如敬妻杜氏董保妻李氏趙清門妻田氏李小保妻馬氏烈女趙魁均乾隆年間旌張琇妻劉氏寶豐人夫亡守節同縣節婦李斯羽妻劉氏姫纘武妻李氏田種秫妻張氏李元靜妻張氏黃懋賞妻溫氏彭景韓妻劉氏王理得妻李氏白濬妻李氏王琚妻吳氏張懷德妻王氏杜祚偉妻王氏丁之平妻牛氏杜延祚妻傅氏李作梅妻宋氏何而溫妻陳氏翟梅妻王氏馬文舉妻邱氏姫纘康妻孫氏禇文蘭妻賀氏何思㑣妻柏氏孫振妻張氏吳嘉林妻馬氏徐鴻妻陳氏王鏻妻趙氏孫宜祥妻劉氏郭玉道妻何氏烈婦雷泛妻張氏王江妻杜氏李繩妻王氏禇是來妻楊氏孟西平妻郝氏劉鐸妻閻氏烈女路氏女任氏女均乾隆年間旌張其績妻王氏伊陽人夫亡守節同縣莭婦趙炎妻張氏秦琛妻沈氏劉華峙妻孫氏趙藴妻霍氏翟父秀妻李氏陳汝翼妻曹氏陳汝為妻龔氏劉得馨妻宋氏劉得芳妻張氏張蘭妻陳氏趙晉輔妻丁氏王文元妻范氏楊天申妻劉氏邢可教妻傅氏趙良士妻梁氏吳珍妻石氏趙之相妻宋氏杜正魁妻鄅氏陳火妻孫氏李思忠妻尤氏馬士友妻申氏傅舉妻李氏師頌揚妻員氏孫士振妻師氏杜溯然妻曹氏張平章妻吕氏喬芢妻王氏張淑銘妻屈氏范君成妻趙氏趙元魁妻李氏辛曰正妻沈氏孫振發妻丁氏傅岱妻劉氏魏于瑞妻杜氏張鍭妻黃氏張天秩妻孫氏張夢賚妻馬氏張應拔妻劉氏張子輿妻汪氏黃巨琨妻趙氏李常繼妻胡氏劉需植妻傅氏劉需楷妻張氏許秉健妻張氏段瑾妻黃氏靳智妻李氏馬琇妻閻氏烈婦陳炎妻孫氏張詩妻武氏張董氏郭省子妻宋氏楊天保妻張氏劉得子妻常氏均乾隆年閲旌馬樂羣妻王氏汝州人夫亡守節同州節婦楊克恭妻馬氏薛梓妻王氏黃森妻羅氏姚賡虞妻李氏梁國相妻楊氏梁鉞妻陳氏孫永夀妻吳氏張文信妻馬氏烈婦李某妻孫氏程珍妻王氏均嘉慶年間旌胡鳳岐妻王氏魯山人夫亡守節同縣節婦史秉䇿妻趙氏史永清妻丁氏相觀妻史氏烈婦王建媳蕭氏郭台妻賈氏晏晚成妻王氏魏陳氏胡掄秀妻張氏均嘉慶年間旌郭埕妻王氏郟縣人夫亡守節同縣楊應良妻鄭氏烈婦王氏均嘉慶年間旌烈婦郭氏寶豐人守正捐軀同縣烈婦張鎮妻程氏烈女楊麥妮尹氏劉氏均嘉慶年間旌馬鏴妻劉氏伊陽人夫亡守節同縣節婦張育相妻吳氏劉模妻張氏王鯁忠妻吳氏趙鳯妻常氏楊生財妻雷氏王亮妻閻氏張書令妻杜氏楊芳妻趙氏王槐蓬妻邢氏均嘉慶年間旌仙釋古廣成子軒轅時人隱居崆洞山石室中黃帝問以至道之要周鬼谷子姓王名詡楚人嘗入雲夢山採藥得道晉張元化葛元弟子嘗寓汝州有前知之明一日召道士周元亨戒之曰吾化之後毋損吾軀既化元亨遵其命葬之後五年有汝卒戍蜀者逢一道士於山峽間謂曰我新去汝若為我持書與胡司馬周尊師逹之無遺卒返投書二人開緘乃元化親札謝二人葬之厚也遂率郡人發冡視之惟空棺有故履存焉唐真禪師開化間駐錫風穴山嘗習衡陽三昧其化大行示寂後守宰李皓闍維之得舍利千粒明皇諡為七祖土産絁唐書地理志土貢寰宇記土産純絹鐵州境出有冶錫州境出有洞石