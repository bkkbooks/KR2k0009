body:
  text: 光州直隸州在河南省治南八百里東西距二百四十五里南北距二百里東至安徽潁州府霍邱縣界一百二十五里西至汝寧府羅山縣界一百二十里南至湖北黃州府麻城縣界一百二十里北至汝寧府新蔡縣界八十里東南至湖北黃州府羅田縣界一百八十里西南至湖北黃州府黃安縣界二百十里東北至安徽潁州府潁上縣界一百六十里西北至汝寧府汝陽縣界一百三十里本州境東西距一百里南北距一百十里東至固始縣界七十里西至光山縣界三十里南至湖北黃州府麻城縣界七十里北至息縣界四十里東南至商城縣界六十里西南至光山縣界三十里東北至固始縣界七十里西北至息縣界六十里自州治至京師二千四百里分野天文角亢分野夀星之次建置沿革禹貢揚州之域周初為蔣黃弦三國春秋時為黃弦二國地戰國屬楚秦屬九江郡漢置弋陽縣屬汝南郡後漢因之三國魏始置弋陽郡南境為廬江郡地西北境為江夏郡地晉書地理志弋陽郡魏置晉及宋齊因之宋於西南境分立光城左郡後魏分置南北二弋陽縣郡治北弋陽梁置南郢州及定城郡時始置光州在今光山縣東魏因之北齊廢定城郡省北弋陽入南弋陽改曰定城縣隋開皇初州郡皆廢以縣屬弋陽郡唐武德三年置弦州貞觀元年州廢縣屬光州太極元年始移光州來治天寶元年又改曰弋陽郡乾元初復曰光州屬淮南道五代因之宋置光山軍節度屬淮南西路宋史地理志宣和元年賜軍額紹興二十八年改蔣州嘉熙元年徙治金剛臺尋後故元省定城縣入州屬汝寧府明洪武初屬鳳陽府十四年仍屬汝寧府本朝雍正二年升為直隸州領縣四光山縣在州城西南四十里東西距一百五里南北距二百里東至本州界二十里西至汝寧府羅山縣界八十五里南至湖北黃州府麻城縣界一百二十里北至息縣界八十里東南至商城縣界七十里西南至湖北黃州府黃安縣界一百八十里東北至本州界二十里西北至息縣治九十五里春秋弦國地漢置西陽縣屬江夏郡後漢因之晉改屬弋陽郡惠帝分置西陽郡永嘉後郡縣俱廢劉宋元嘉二十五年以豫部蠻民置光城縣屬弋陽郡大明中分置光城左郡蕭齊因之梁於縣置光州東魏因之隋開皇初郡廢十八年始置光山縣為光州治大業𥘉改州為弋陽郡唐武德三年復曰光州置總管府貞觀元年府罷大極元年移州治定城以縣屬焉五代因之宋紹聖中改曰期思尋復故後廢元至元十二年復置仍屬光州明並屬汝寧府本朝雍正二年改屬光州固始縣在州城東一百四十里東西距一百二十里南北距一百二十里東至安徽潁州府霍邱縣界五十里西至本州界七十里南至啇城縣界六十里北至潁州府阜陽縣界六十里東南至安徽六安州界九十里西南至商城縣治一百二十里東北至潁州府潁上縣界九十里西北至息縣界九十里春秋蓼國地漢置蓼縣屬六安國後漢改屬廬江郡晉屬安豐郡劉宋初省泰始中僑置新蔡郡及固始縣蕭齊為北新蔡郡後魏仍口新蔡郡梁復曰蓼縣東魏復曰固始後周改置澮州隋開皇初州郡皆廢以將屬弋陽郡唐屬光州宋元因之明初屬鳳陽府洪武十四年運屬光州本朝因之息縣在州城西北九十里東西距七十五里南北距八十五里東至本州界四十里西至汝寧府正陽縣界三十五里南至光山縣界十五里北至汝寧府汝陽縣界七十里東南至本州界六十里西南至汝寧府羅山縣界十八里東北至安徽潁州府阜陽縣界一百四十里西北至汝陽縣界七十里春秋時息國漢置新息縣屬汝南郡復漢晉因之劉宋分置南北二新息縣蕭齊因之後魏太和十九年置東豫州及汝南郡梁大通元年改曰西豫州太清元年又改曰淮州東魏武定七年後曰東豫州北齊復并為新息縣後周改曰息州隋開皇初郡廢大業初州廢縣仍屬汝南郡唐初復置息州貞觀初州廢屬蔡州五代及宋因之金太和八年復置息州屬南京路元中統三年州廢四年復置至元三年省縣入州屬汝寧府明洪武初降州為縣屬潁州七年改屬汝寧府光州本朝雍正二年改屬光州商城縣在州城東南一百二十里東西距一百七十五里南北距一百八十里東至安徽潁州府霍邱縣界一百十五里西至光山縣界六十里南至湖北黃州府羅田縣界一百二十里北至固始縣界六十里東南至羅田縣界一百二十里西南至黃州府麻城縣界九十里東北至固始縣治一百二十里西北至本州界六十里春秋吳雩婁邑漢置雩婁縣屬廬江郡後漢因之晉改屬安豐郡後廢劉宋元嘉二十五年復置屬弋陽郡尋屬邊城郡又僑置西苞信縣屬新蔡郡蕭齊時以西苞信屬北新蔡郡後魏改雩婁曰宇婁梁改西苞信曰苞信兼置義州齊周時宇婁縣廢隋𥘉改縣曰殷城屬弋陽郡唐武德初復置義州貞觀初州廢縣屬光州五代因之宋建隆初始改曰商城至道三年省入固始明成化十一年復置啇城縣屬汝寧府光州本朝雍正二年改屬光州形勢襟帶長淮控扼潁蔡面山負野四望平舒圖經風俗士貞慤而好文民朴勤而尚質舊志城池光州城州有南北兩城北城門五南城門六周九里池廣二丈明正德七年甃甎本朝順治六年修十六年康熙六十一年乾隆二十九年屢修光山縣城周七里有竒門四池廣三丈明正德十二年甃甎本朝明治十四年修康熙二十七年雍正七年乾隆元年重修固始縣城周六里門五池廣五尺本朝順治十五年修康熙二十七年圯重建乾隆八年修息縣城周五里門四池廣二丈五尺本朝順治七年修十五年康熙二十四年雍正七年重修商城縣城周六里門四池廣二丈五尺本朝順治三年修學校光州學在州治西元泰定間建馬祖常有碑明洪武中重建本朝康熙十年修二十一年雍正十一