鄰桐城人康熙十八年知光山縣值歲飢亟請立厰賑之公費不足益以私俸私俸又不足益以勸捐閲四月全活甚衆又捐修溫公祠每朔望率諸生拜畢即闡明溫公教旨反復啓導諸生咸守其訓去任復士民立祠祀之談永祚奉天人康熙二十二年知商城縣清丈田地計畝定稅與縣丞襲銓躬履原隰不辭勞悴使豪強無隱占之虞愚弱免偏苦之纍民甚德之為立生祠以祀載銓潛江人陸經遠宛平人康熙二十四年知息縣邑鹽引奏銷按畝派銀商鬻無引之鹽民納無鹽之引經遠力陳其弊請募商給本運鹽銷引永革按畝科派之害民霍然楊汝楫奉天人康熙二十六年知固始縣邑舊有史曲諸河可資灌溉渠道久湮沒汝楫相其原隰高下開渠置閘以通其流鑿陂樹埧以防其泄經營三載凡邑中巨浸如白鷺急流羊行諸河以次濬築并教以啓聞之法定為分灌之令詳委縣丞專司其事又建書院立齋房設義學數十處絃誦之聲達乎四境吳一嵩新建人乾隆中任光州知州值軍需河工大役不以絲毫浮費纍民創建弋陽書院以處學者并擴置龍門書院學田以贍寒士人物漢郭憲字子橫宋人王莽篡位拜憲郎中賜以衣服憲受焚之逃於東海之濱光武即位徵拜博士再遷光祿勳車駕西征隗囂憲諫曰天下初定車駕未可以動乃拔佩刀以斷車靷帝不從遂上隴從穎州起兵駕還歎曰恨不用子橫之言時胸奴數犯塞召百僚廷議憲以為天下疲敝不宜動衆諌爭不合乃伏地稱眩瞀不復言帝令兩郎扶下殿憲亦不拜帝曰嘗聞關東觥觥郭子橫竟不虛也憲遂以病辭退卒於家高獲字敬公新息人少與光武有舊師事司徒歐陽歙歙下獄當斬獲冠鐵冠帶鐵鑕諸闕請歙帝謂曰敬公朕獄用于為吏宜改常性對曰臣受性於父母不可改之於陛下出便辭去三公爭辟不應太守鮑昱每行縣輒式其閭獲遂逺遁江南三國吳丁奉安豐人少以驍勇為小將數隨征伐戰國常冠軍孫亮即位為冠軍將軍封都亭侯魏遣諸葛誕等攻東興奉率麾下三千人據徐塘天寒雪敵置酒高會奉使兵解鎧持短兵斫之魏兵遂潰遷滅寇將軍尋進封安豐侯孫休即位奉與張布斬孫琳遷大將軍徙家臨川卒唐盧祖尚樂安人以俠聞隋大業末募壯士捕盜時年十九善禦衆所向有功盜畏不入境歸高祖封弋陽郡公從趙郡王孝恭討輔公祏為前軍總管下宣歙進擊賊帥破之貞觀初詔為交州都督托疾固辭帝怒命斬朝堂既而悔之詔復其官陳元光光州人博覽經書總章間從其父政領將卒五十八姓以戍閩政卒元光代領其衆任玉鈴衛翊府左郎將會廣寇諸變陳謙等攻陷潮陽元光往平之詔進嶺南行軍總管垂拱二年上疏請建一州於泉湖間以控嶺表乞刺史主其事裴炎狄仁傑等議非元光不可遂允其請仍世守刺史由是方數千里無抱鼓之舉後寇復叛元光輕騎以往步兵徒期遂為戮所殞事聞賜諡忠殺百姓立廟祀之方竦弋陽人景雲初進士纍官鸞臺侍郎開元中封禪為禮儀使竦搜舉典禮容止間雅明皇歎其知禮封雲亭侯王潮固始人僖宗人蜀王堵合郡盜取光州劫豪傑置軍中潮署軍正拔衆南走次南安伏叢翳徂縛緒以徇衆曰天子蒙難今當出交廣入巴罰以幹王室悉師將行會泉州刺史廖彥若貪暴州人迎潮殺之遂有其地昭宗假潮福建觀察使進節度使檢校尚書左僕射卒王審邽潮弟為泉州刺史檢校司徒喜儒術通書春秋善吏治中原亂公卿多來依以免禍審邽作招賢院禮之董陽光山人三世同居外無異門內無異煙詔榜其門曰篤行董氏之門李植弋陽人數世同居天子旌表門閭賜衷帛州縣存問五代梁王延嗣光州人唐亡梁太祖卦王審知為閩王延嗣力諌曰義不帝秦此其時也時強藩巨鎮多僭號審知雖不樂其言然終其身不失臣節延嗣之力也詹君澤光州人避亂遷閩隱植德山下嘗詣閩王上書閩王昶欲留之君澤以詩謝曰周粟縱容安忍食葛廬頻顧漫勞思宋王彬固始人年十八以賓貢入太學淳化三年進士及第厯雍邱尉通判筠州厯知撫州皆有異政纍遷太常少卿卒王宗望固始人以蔭纍擢夔州路轉運副使哲宗即位賞軍萬州彌旬不給庖卒朱明謀亂宗望聞變自夔疾驅至先命給賞然後斬明以徇朝廷嘉之遷倉部郎中司農少卿江淮發運使以集賢殿修撰知鄆州卒董道明褒信人母死出葬道明潛匿墓中人瘞之經三日家人發塜取之道明無恙終身廬於墓側元詹士龍固始人父宋都統筠殁於鄂州士龍甫三歲隨母北徙董文炳以見元世祖世祖歎曰此忠臣子汝善養之既長士龍知巳非董出即晝夜痛哭他日從獵滹沱懇求復姓文炳戲曰試為投石水中浮則爾從士龍祝天曰吾父有靈石當暫浮因以石投水沉而復浮者數四文炳愕然曰天也遂許之厯官廣西道僉事致仕卒馬祖常本天山人父潤同知漳州路總管府事家於光州祖常七歲知學得錢即以市書既長益篤延祐初鄉貢會試皆第一廷試第二授應奉翰林文字拜監察御史上書請御正衙立朝儀御史執簡太史執筆英宗為太子又詣慎簡師傅姦臣圖璊德爾威權自恣祖常劾奏其十罪仁宗黜罷之兩知貢舉時稱得人元統初拜御史中丞以疾辭歸復除江南陜西行臺中丞皆不赴卒諡文貞祖常立朝久多所建明薦賢拔滯知無不言工文章宏贍而精核自成一家言尢致力於詩密圓清麗文宗嘗謂中原碩儒惟祖常云圖瑞德爾舊作鐵木迭兒今改正賽音布哈息州人幼卓犖不羈善騎射有膽略至正間紅巾陷郡邑倡義翦捕嘗單騎斬數十級裂眥一叱所向辟易城邑望風皆下復從平章洪霍討博洛於大同破之遂於漠北拓地數千里纍進太傅中書左丞相河南江北知樞密院事賽音布哈舊作賽音不花洪霍舊作擴廓博洛舊作孛羅今並改正明何德光州人元季江淮兵起德杖䇿來歸從定江南諸郡轉征吳楚屢立戰功授驍騎衛千户纍擢左軍都督僉事扈從北征還卒追封廬江侯諡壯毅王平息縣人有高才善辨論以清白自持洪武中以國子監生擢監察御史永樂初纍官右分都御史後以福建左參政從英國公張輔平交址進交址右布政使時蠻夷梗化平與都督黃中往鎮其地民賴以安熊翀光州人成化進士授武進知縣以薦拜監察御史按江西時宸濠戚屬毛氏橫於鄉翀密訪追捕悉置之法豪強屏息纍升南京户部尚書致仕卒翀剛介嚴毅人不敢干以私所著有止庵集閻倫息縣人弱冠舉於鄉父殁哀毁骨立既葬築寶冢側晨夕悲號感動行路登成化進士厯官禮部郎中乞歸卒子道隆亦以孝稱居父母喪廬墓六年仕為章邱主簿嶽仲明固始人少多清節隱居不仕嘗廬墓九年有司以孝亷舉三召不起賜號純孝先生同邑諸生陳璋亦母殁廬墓事關旌表喻謙光州人母卒哀毁幾至滅性廬墓三年悲號無間寒暑墓産靈芝地湧甘泉事聞旌為孝子熊驂固始人宏治初舉於卿授萊蕪知縣與流賊戰死贈光祿寺丞龔來富光州人宣德間以軍功世襲錦衣衛指揮正德中上數出遊來富犯顔極諫上怒殺之時年一百三十八歲矣汪壁商城人宏治進士官御史正德聞侯疏劾劉瑾為權璫排陷而死中外惜之王相光山人正德進士授沐陽知縣擢監察御史抗疏諌南巡劾江彬等結黨亂政出按山東為彬等搆陷逮謫高郵州判官卒熊榮光山人正德進士授行人諌武宗南巡𬒳杖降學録尋擢御史按山東平礦賊之亂移按雲南協征岑猛有功厯官參政邢祥息縣人以歲貢任滿城主簿致仕歸正德六年流寇來攻祥助有司守城城陷被執叱賊聲厲遂遇害贈知縣周敘息縣人正德進士為大理寺正武宗南巡敘抗疏極諌杖闕下謪縣丞嘉靖初復官纍遷工部尚書卒黃綰息縣人正德進士授刑部主事諫武宗南巡受杖嘉靖初遷郎中守法不阿治姦人陳洸獄忤桂萼出為紹興知府坐前議獄事被逮死獄中隆慶初贈太常少卿許逵固始人正德進士授樂陵知縣流賊犯境逵多方禦戰俘馘甚衆擢山東僉事遷江西副使時豪濠謀逆伏甲縛巡撫孫燧逵爭之賊斫其頸屹不動遂遇害纍贈禮部尚書諡忠節子易孫䢿俱以孝稱朱冠固始人正德進士授監察御史巡兩淮鹽政疏陳四事上嘉納之未幾寇陷固始父紀率義兵與賊戰闔門遇害冠聞變痛絶水漿不入口者八日比歸哀毁骨立屢薦不起言及家難輒涕泣不絶竟以是感疾卒王建固始人母卒廬於墓側晨夕哭奠值歲荒盜過其廬相戒勿擾弟述有犯建輒自鞭其背以警弟𫐠遂愧改行周澤商城人性篤孝人比之黃香兄洋為里黨所誣陷澤時年十二挺身代罪幽囹圄者二十四年後巡按御史得其情嘉歎遂釋之黃榮商城人年甫弱冠母卒終身廬於墓側鄉人名其里曰孝子里劉繪光州人磊落負奇氣嘉靖中舉鄉試第一成進士授行人改户科給事中屢抗疏論事兩劾大學士翟鑾夏言及尚書許讚巡撫劉臬楚書給事中邢如默等徇私植黨出繪為重慶知府上官交薦其賢而政府憾之遂罷歸子黃裳以進士厯兵部員外郎時倭破朝鮮以黃裳贊畫宋應昌軍事擊賊城下追殺金甲倭録功擢邊道副使喻時光州人嘉靖進士授吳江知縣以治行卓越擢御史疏劾嚴嵩諸不法事素服候訊闕下上弗究纍遷右副都御史總理漕運立賞格擒大盜奏減部稅額江淮間德之尋總督三邊協理戎政以南京户部侍郎卒汪若霖光州人父治厯官保定知府有異政若霖萬厯進士纍遷禮科給事中歲久旱疏稱洪範傳云言之不從其罰恆暘因厯舉數事尋又言廷推不宜一人專主當參衆論並籍舉主姓名復連坐之法詔允行其他彈劾甚多皆切直有體扶克儉光山人萬厯進士選庶吉士改御史出按遼東發李成梁骨功欺蔽狀忤執政意謫縣丞後厯太常卿奏復天下學校禮儀悉遵祖制纍遷刑部侍郎卒諡忠毅蔡毅中光山人祖鳳翹父光俱以理學稱毅中性至孝母病夏月思冰盂水忽凍居喪廬墓有紫芝白鳥之祥登萬厯進士授翰林檢討時礦稅為民害毅中取祖訓會典諸書禁戒礦稅者集為二卷上之天啓初厯官禮部右侍郎進呈六經注疏會楊澾以劾魏忠賢被譴毅中抗疏請除肘腋之姦忤旨斥歸卒諡文莊夏之令光山人萬歷進上授汶縣知縣調歙縣俱有聲擢御史疏劾中官魏忠賢矯旨建訊笞驚險卒崇禎初贈大僕寺卿李若星息縣人萬歷進士授武強知縣調正定以廉幹稱擢御史論事皆洞切時弊纍升右僉都御史巡撫甘肅怍魏忠賢被逮杖戍廉州崇禎初擢工部右侍即總河道歲節省十七萬金後以兵部左侍郎總督川貴五省卒周汝璣商城人萬厯進亡以池州推官擢郡史忤權璫出為淮陽僉事疏通鹽利轉淮海副使築隄捕盜遷武昌道剿流寇有方略升湖廣左布政使奏免逋賦百五十餘萬民德之洪引衡商城人萬厯進士厯官陽和道副使歸鄉里崇禎中獻賊破城引衛守北門率衆力戰遇害本朝乾隆四十一年豫入忠義祠唐時明固始人性孝友博通經籍萬厯木卿舉第一纍官鳯翔知府崇禎中闖城破西安時明登陴誓守賊入城誘降不從執赴西安自諡於道本朝乾隆四十一年豫入忠義祠朱耀固始人與父充義及兩兄炳思城並以勇聞崇禎八年流寇圍城耀父子四人刀戰却之明年賊復至耀領兵奮擊手馘賊數十級陷伏中為賊所得大罵死本朝乾隆四十一年豫入忠義祠父及兩兄賈勇報仇賊大敗奔竄固邑得全王多福息縣人舉明經嘗為項城教諭里居闖賊強官之不從自經死本朝乾隆四十一年賜諡節愍黃炯光州人天啓進士授南宫知縣政治卓異纍擢陜西按察使崇禎中城陷被執不屈與妻王氏投水死贈太常寺卿諡忠烈子彝如亦戰死於賊詔旌表吳大朴固始人天啓進士知江南當塗縣值