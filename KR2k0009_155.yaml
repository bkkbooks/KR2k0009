裁浮靡邑有東湖溉田二十餘頃隄壞即下流南港為石隄三百丈民蒙其利陳居仁莆田人慶元初知福州入境有饑民嘯聚部分牙兵遮擊之首惡計窮自經死治宗室之横暴申蠱毒之嚴禁黄度新昌人嘉定中知福州始至訟牒日千餘度隨事裁決日未中而畢真德秀浦城人端平初知福州罷市令司閩縣里正苦督賦罷之屬縣苦貴糴便宜發常平倉賑之海寇縱横次第擒殄聘耆儒臨講席以敎郡之子弟王邁仙遊人為南外睦宗院教授真德秀守福州邁竭忠以裨郡政游義肅建陽人嘉熙間知連江縣復東湖浚九昇創平糴倉以利民陳宜中永嘉人景定中知福州在官得民心洪天錫晉江人理宗時知古田縣行鄉飲酒禮邑劇牒訴猥多天錫剖決無留難有倚藩邸勢殺人者誅之不少貸杜杲邵武人福建提點刑獄陳彭壽檄攝閩尉民有甲之子死誣己殺之驗髪中得沙而甲舍旁有池沙類髪中者鞫問子果溺死元董楨至順中知閩清縣為政恩威兼至在官六年流亡多歸之劉濬河南人至正間為連江縣巡檢江西賊王善攻破福州衆皆潰去濬妻史有才畧悉出奩物募兵濬與其子健帥兵突陣屢捷斬前鋒五人賊兵大至鏖戰三時頃濬中箭墜馬被獲濬忿㦸手大罵賊縛濬階下先斫一指罵彌厲再斫一指亦如之指且盡斫兩腕次及兩足濬色不少變罵聲猶不絶遂割其喉舌而死健歸結壯士百餘人入賊營斬殺父者並擒王善等事上立祠祀之吕復至正末以行省命攝長樂縣尹福州既下復曰吾世食君祿今雖攝官若不以死報國無以見先人於地下引繩自經死明鄭復初開封人洪武四年知羅源縣大兵勦山寇復初慮被擄者遭戮親詣軍中辨釋無辜亂定復撫其民招使復業趙允潮陽人洪武中長樂丞縣十一都海塘隄圯害稼允為修築至今賴之齊普天台人宣德間知長樂縣事親以孝聞躬修率下不嚴而治黄瑜香山人景泰中知長樂縣改建學校進諸生討論有兄弟相訟者開導之皆涕泣相讓而退以直道忤上官浩然求去民立祠祀焉唐珣華亭人成化間知福州府增置書院創迎春亭於東郊以省耕斂江洲可田者令民墾之築塘於五虎山下以捍海潮均會城監司徭役於七郡置義倉設叢塚凡便民之事無不力為之潘府上虞人宏治初知長樂縣作橋河滸以渡行人改南山寺為書院聚士講學教民遵行朱子家禮時周行郊野勞問疾苦田夫野老咸得獻其誠境内大治歐陽鐸泰和人正德末知福州府數裁鎮守中貴横需中貴尚春怒至攘臂肆詈鐸不為動會議里役以諸貴家多産請得與民分役民困為蘇嘉靖三年舉治行第一唐相灌陽人正德間連江典史明於折獄嘗築湖閘有功邑人歌之汪文盛崇陽人嘉靖三年知福州府值歳大祲疏乞蠲租發廩復四鄰社倉仿朱子備荒法行之為郡興水利開上王舊港塞新河灌田四千餘頃葉經上虞人嘉靖間福州推官勵節操矜容止遇事屹然後入為臺諌尤尚名節為宵小所憚閔溶福州左衛指揮使嘉靖末倭寇閩溶率兵禦之前後斬首千級後與賊戰舟山力不敵死汪泗論休寕人萬厯中以進士知福清興除利弊定倉糧折色之例歲省編戸金錢以萬計尤加意振興文敎士皆悅服周順昌呉縣人萬厯末福州推官稅監高寀横甚獨不為禮又捕置其下之作奸者民賴以蘇崇禎初贈太常寺卿諡忠介夏允彝華亭人崇禎中知長樂縣視民若子善決疑獄居五年邑大治本朝翁曰賓署永福縣順治三年山宼陷城不屈死周景福蘇州人知永福縣順治四年賊陷城不屈絶食死楊繼生閬州人順治三年知連江縣寇陷城繼生縊死城樓妻劉氏同日殉節李岱生高密人康熙初知長樂縣潔已愛民時遷界議起瀕海人戸應調遷者有糧無地多逃散岱生力為申請豁浮賦廣招徠民感其德王之儀漢軍正藍旗人康熙中知福州府耿逆之亂變起倉卒人人震慴之儀獨奮呼曰賊敢反耶語未絶刀㦸交下立斃長子琅妻張氏皆自殺劉嘉猷金谿人康熙中知侯官縣忠信慈惠有古循良風耿逆之變被害廖有功奉天人任福州千總耿逆變亂總督范承謨被執有功大呼奮救手刃十餘人躍馬至通衢逆兵追擊遂遇害吳廷華仁和人康熙中由中書舍人出任福州海防同知所至以經學飾吏治值臺灣諸羅奸民揭竿事起倉卒令弁束手廷華按形勢糾兵民分督殲其魁民以安集所著有三禮疑義閩人士奉為圭臬戴永樸烏程人乾隆九年知長樂縣重濬文洽浦及濵􅦎湖溉田七萬餘畝民徳之立祠祀焉人物唐侯固字子重閩縣人太和九年及第官至鄜坊靈武易定節度使同平章事固操履仁厚言動皆有規準鄉人愛而敬之鄭諴字申虞閩縣人會昌進士累官國子司業郢安鄧三州刺史誠與同邑林滋詹雄並有文名時號閩中三絶林朂字公懋閩縣人大中五年以開元禮登科厯官至吉州刺史清節著聞民服其廉謂在官惟飲吉水而已林慎思字䖍中長樂人成通進士自校書郎至水部郎中僖宗時與宦者燕嬉慎思累疏切諫不納出為萬年令黄巢入長安迫以偽秩慎思不屈罵賊死著有續孟子伸蒙子諸書王棨字輔之福清人咸通進士復中博學宏詞科累官水部郎中博學工詩賦著有麟角集行世黄璞字德温侯官人大順進士官崇文館校書郎昭宗時歸隱杜門自號霧居子著閩川名士傳及文集二十卷子仁藻仁渥仁渭從弟滔與璞同時館職號一門五學士翁承贊字文饒福清人乾寕三年進士第三再中博學宏詞科厯右拾遺抗章言方鎮交結權倖終必誤國直聲震中外遷諫議大夫歸賜郷名文秀里曰光賢朱温以門下侍郎召稱􅔂不起著有晝錦宏詞等集張謹字信美閩縣人累官福建招討使黄巢寇閩中謹與戰於鐵山多所斬獲賊以奇兵絶餉道士卒乏食疲困謹與偏將鄧榮等十八人馳突賊陣自旦至晡十八人俱死謹握刀箕踞瞠目大罵為賊所害黃碣閩縣人初為閩小將喜學問董昌為威勝軍節度使表碣自副昌反碣諫曰大王不盡忠王朝妄自尊大誅滅無種矣昌大怒斬碣滅其家昌敗詔贈司徒李彦堅字成實閩縣人累官御史中丞乾符間黄巢寇閩命守建州未至刺史李乾祐棄城走彦堅召募民兵與賊戰於政和之高宅不克退保東漈賊進逼之自刃死宋黃夷簡字明舉福州人少孤好學有名江東隨錢俶來朝掌名表人稱得體祥符中特授檢校秘書監謝德權字士衡福州人父文節南唐時以驍勇聞拒宋師戰殁咸平中德權提點京師倉草場有兇人劉煜僧澄雅訟執政真宗命德權與謝秘等鞫之按驗無狀秘謂追攝大臣獄狀乃具徳權日若使大臣無罪受辱則人君何以使臣臣下何以事君事乃解命城新樂縣又命浚北平砦濠葺蒲隂城提轄三司衙司德權為設條制均其差役劉若虚字叔揚閩縣人咸平進士以大理評事厯屯田員外郎知邵武軍卒若虛事親孝親有疾不食酒肉居親側雖大暑必嚴衣冠丁謂為相聞若虛名欲屈見之終辭不往林㮣字端父福清人父高厯知建平縣有治行㮣幼警悟登景祐元年進士為校書郎程琳禁蜀人不得自為渠堰㮣奏罷之又言蜀飢願罷川峽漕發常平粟貸民租除商旅之禁官至集賢校理著有史論辨國語劉彝字執中若虛從子慶厯進士幼從胡瑗學瑗稱其善治水神宗時為都水丞久雨汴漲彝請啟楊橋斗門水遂退著七經中義百七十卷明善集三十卷居易集三十卷陳襄字述古侯官人慶厯進士少與陳烈周希孟鄭穆為友相與倡道海濱謂之四先生襄為侍御史論青苗法不便望貶斥王安石吕惠卿以謝天下又乞罷韓絳政府韓維不當為中丞劉𫐠范純仁無罪宜復官皆不聽尋直學士院在經筵時神宗嘗訪人才之可用者襄以司馬光韓維吕公著蘇頌范純仁蘇軾至鄭俠三十三人對陳烈字季慈侯官人篤於孝友學行端飭里中人敬之冠婚喪祭請而後行屢詔不起公卿交薦以爲本州敎授歐陽修又言之召爲國子直講皆不拜周希孟字公闢侯官人通五經尤邃於易部使者交薦其賢授將仕郎試四門助敎上表辭門下敎授七百餘人著有詩春秋義并文集鄭穆字閎中侯官人皇祐進士性好學容止必以禮元祐初拝國子祭酒請老空學出祖汴東門外都人聚觀許將字沖元閩縣人嘉祐八年進士第一歐陽修讀其賦曰君辭氣似沂公未可量也紹聖初拜門下平章事章惇蔡卞羅織元祐諸臣欲舉漢唐誅戮故事將諌曰本朝治道所以遠過漢唐者未嘗輒戮大臣也又奏發司馬光墓將曰發人之墓非盛德事乃止後爲朱諤誣劾致仕奉祠卒諡文定子份崇寕進士官國史編修厯知鄧蔡揚州有惠政遷龍圖閣學士王囘字深父侯官人敦行孝友不求名譽舉嘉祐進士爲衛真簿有所不合稱病自免在廷多薦者與常秩友善熙寕中秩上其文集補其子汾爲郊社齋郎囘弟向字子直同寕容季皆舉進士為文長於序事林旦字次中㮣之子嘉祐進士熙寕中為監察御史裏行以論李定事罷元祐初拜侍御史論吕惠卿鄧綰及崔台符賈種民之罪皆逐之子膚坐元符上書陷黨籍鄭俠字介夫福清人治平進士數以書言法之為民害者於王安石久之監安上門流民扶攜塞道身無完衣被鎖械員瓦揭木賣以償官俠知安石不可諌悉繪所見為圖奏疏詣閤門不納乃假稱密急發馬遞上之銀臺司安石去吕惠卿執政俠又上書論之惠卿議置之死帝曰俠所言非為身也豈宜深罪徙英州哲宗立始得歸徽宗時還故官又為蔡京所奪陳祥道字祐之閩清人治平進士著禮書一百五十卷近臣以聞詔尚書給紙筆錄進除國子監直講官終秘書省正字劉詵字應伯福清人熙寕進士崇寕初上厯代雅樂因革及宋制作之㫖言宋火德音尚徵臣按古制旋十二宫以七聲得正徵一調徽宗是其言厯官太常少卿纂續因革禮詵居母喪盡禮有雙芝生墓側人以為孝感陳暘字晉之祥道弟紹聖進士建中靖國初進迓衡集以勸導紹述趙挺之言暘所著樂書貫帛明備乞援其兄祥道進禮書故事給札既上遷太常丞為講議司叅詳禮樂官厯禮部侍郎張觷字柔直侯官人舉進士不與世詭隨時蔡京當國求訓子弟者或以觷薦觷謂諸生日汝曹學走乎諸生駭問觷曰天下被而翁破壞賊來先至而家惟善走庶可逃死耳京見觷問計觷以羅天下忠義之士分布内外為第一義以楊時薦後累官秘閣修撰卒辛炳字如晦侯官人元符進士權侍御史蔡京改轉般倉為直達綱炳極疏其弊紹興中劾罷吕頣浩又論張浚敗事誤國進中丞言和議不可恃宜講求守禦攻戰之䇿黄龜年字德邵永福人崇寕進士累官侍御史劾秦檜專主和議植黨專權並劾檜黨王㬇等罷之又請以檜惡暴於天下朱廷傑字世英永福人崇寕進士建炎中為北海令尋攝倅時金兵來犯官屬悉遁廷傑獨堅守城隅有水取野葛投之敵多中毒死俄金兵破城廷傑與知州韓浩力戰死李彌遜字似之連江人僑居吳縣父撰為彭澤令以介特稱彌遜登大觀進士建炎中厯中書舍人户部侍郎秦檜再相胡銓范如圭曽開相繼貶逐彌遜請對力陳議和之不可檜嘗邀彌遜私第曰政府方虚員苟和好無異議當以兩地相凂彌遜拒之次日上疏言愈切直檜大怒彌遜引疾帝諭留之上疏乞歸落職家居十餘年卒朝廷思其忠節詔復敷文閣待制諡忠肅弟彌大工部尚書彌正吏部郎中曽孫韶端明殿學士皆立朝有風節朱倬字漢章閩縣人宣和進士紹興中帝以劉豫為憂倬因賜對䇿其必敗屢忤秦檜復遷中丞奏疏數十進叅知政事史浩虞允文陳俊卿等皆倬所薦卒諡忠靖黄祖舜字繼道福清人宣和進士紹興中權刑部侍郎進論語講義兼給事中楊愿家乞遺表恩祖舜言愿隂濟秦檜寢其命秦熺贈太傅祖舜奏追奪之林之奇字少頴侯官人從吕本中學登紹興進士為校書郎朝廷欲令學者叅用王安石三經義之奇言王氏三經率為新法地正所謂邪說詖行淫詞之不可訓者金兵欲南下之奇作書抵當路以為金非果欲戰所以堅吾和欲與之和宜無憚於戰則其權在我東萊吕祖謙嘗受學焉有書春秋周禮説論孟揚子講義道山紀聞等書行世王蘋字信伯福清人言行純懿為程門高弟紹興中孫佑列其學行於朝召見賜進士出身除秘書省正字官至左朝奉郎胡安國薦蘋謂其學有師承識通時務使司獻納必有補於聖躬楊時嘗曰同門後來成就莫踰吾信伯矣著有論語集解著作集行世蕭德藻字東大閩清人紹興進士為烏程令後遂家焉居屏山自號千巖老人楊萬里稱近世詩人若范石湖之清新尤梁溪之平淡陸放翁之敷腴蕭千巖之工緻余所畏也著有千巖擇稿黄洽字德潤侯官人隆興中為御史所論列未嘗攟摭細故拜叅知政事竭誠無所趨避嘗言居家不欺親仕不欺君仰不欺天俯不欺人幽不欺鬼神何用求福報有文集奏議八十五卷鄭湜字溥之閩縣人乾道進士慶元中官起居郎權直學士院趙汝愚罷相湜草制有持危定傾任忠竭節語韓侂胄以其無貶詞惡之出知福州後為刑部侍郎入偽學黨劉砥字履之長樂人六歳日誦千言弟礪字用之幼頴悟中童子科聞朱予得濂洛之傳俱師事焉朱子深器之乾道二年同舉進士以時方攻道學遂不復仕進鄭昭先字景紹閩縣人淳熙進士初授浦城主簿聞朱子講明濂洛之旨往遊其門擢知歸安縣居官有惠政累遷諌議大夫知樞密院事進右丞相辭不拜昭先居政府以愛護人材振拔淹滯為己任卒諡文清有日湖遺稿五十卷行世林亦之字學可福清人師事莆田林光朝趙汝愚帥閩上其學業於朝命未下卒學者稱網山先生亦之傳其學於同邑陳藻藻傳於同邑林希逸希逸既貴言於朝以亦之與藻經明行修終於布衣宜褒錄以勵後學詔贈迪功郎敖陶孫字器之福清人韓侂胄用事朱子貶外陶孫時遊太學以詩送之趙汝愚死貶所復哭之以詩揭通衢壁上侂冑大怒遣捕陶孫變姓名得免後登慶元五年進士官温陵簽判陳貴誼字正甫福清人慶元進士再中博學宏詞科累官太學博士時議更楮幣貴誼援熙寕新法為諌理宗時遷中書舎人内侍濫受恩賞輒封還詔書拜叅知政事五上章乞歸將行猶以出師汴洛上疏力爭黄幹字直卿閩縣人父瑀建炎中為監察御史以篤行直道著聞幹受業朱子朱子嘗曰直卿志堅思苦與之處甚有益遂以其子妻之編禮書獨以喪祭二編屬之病革以深衣及所著書授幹田吾道之託在此吾無憾矣厯官臨川新淦令通判安豐軍知漢陽軍安慶府皆有善政理宗召赴行在所奏事除大理丞不拜為御史李楠所劾遂歸里弟子日盛編禮著書日不暇給朝夕往來質疑請益如朱子時卒諡文肅學者稱勉齋先生有經解文集行世林用中字擇之古田人慶元間特奏名從朱子學朱子喜其篤信嘗目之曰畏友與蔡元定齊名弟允中字擴之朱子稱其晦外而明於内樸外而敏其中時兄弟同受業者又有侯官陳孔夙陳孔碩潘植潘柄永福林學蒙林學履陳韡字子華侯官人父孔碩為朱子吕祖謙門人韡登開禧進士與弟韔從葉適學淮帥賈涉辟京東河北幹官韡為畫䇿遂有堂門之捷紹定初盜起閩中以韡為招捕使汀境皆平再平衢寇又破贛寇陳三槍斬之累官叅知政事卒贈太師諡忠肅楊宏中字充甫侯官人弱冠𥙷國子生趙汝愚竄永州宏中與諸生林仲麟徐範張衜蔣傳周端朝五人上書不報則繳副封於臺諌侍從韓侂冑將竄之嶺南余端禮丐免遠徙上許之乃送太平州編管天下號為六君子宏中登開禧進士以余嶸等薦累遷太學正夏旱上封事指切無隱時論益壯之又有華岳字子西為武學生韓侂胄當國將有事北征岳上書論之侂冑誅為殿前司官屬謀去丞相史彌遠下臨安獄帝欲生之彌遠曰是欲殺臣者竟杖死東市徐範字彛父侯官人少孤授徒養母與兄同舉於鄉入太學丞相趙汝愚去位祭酒李祥博士楊簡論救之俱被斥逐範與同舍生叩閽上書書奉送五百里編管範謫臨海後登嘉定進士累遷國子監主簿入對言願懲既往之失廢無用之文一意養民以培國本許應龍字恭甫閩縣人嘉定進士累遷宗學博士寳慶初再遷著作郎岀知潮州時有盜陳三槍與鍾全合黨逼潮應龍訓練有備賊不敢犯羣寇悉平朝廷嘉其治潮親勞焉拜僉書樞密院事卒贈銀青光祿大夫諡文簡鄭性之字信之初名自誠侯官人嘉定元年進士第一媏平初召為吏部侍郎請開言路以通壅蔽性之少從朱子學治郡所至務崇敎化厚風俗為民去害就利立朝無所依附累拜叅知政事卒諡文定著有端平奏議宋編年備要行世張磻字渭老羅源人嘉定進士淳祐四年史嵩之有奪情起復之命磻因太學發䇿言之會臺臣共論其事遂寢後嵩之終禫謀復入磻時為大司成率同列言之甚切復格不行由此名動天下累官叅知政事卒贈少師唐璘字伯玉古田人嘉定進士為御史疏論執政鄭清之妄庸誤國及請號召土豪經理荆襄急擇師臣安集淮西數事居母喪袁毁不食久之遂卒璘立臺僅百日直聲震朝野世謂唐介再見林夔孫字子武古田人從朱子遊黨禁起學者懼禍多變其學夔孫從講論不輟嘉定七年特奏名為縣尉有書本義中庸章句蒙谷集行世時受業朱子者同邑林師魯林大春程若中余偶蔣康國閩縣鄭文遹曽逢震侯官林憲卿長樂陳枅鄭申之連江林謨皆其最著也趙汝騰字茂實古田人登寶慶進士官秘書郎輪對言節用先自乘輿宫掖始累遷禮部尚書言前後奸諛之臣何益陛下而深損於聖德興利之臣何益陛下而深戕於國脈則陛下私惠羣小之心可以息矣黄師雍字子敬閩清人寶慶進士少從黄幹學恥出史彌遠門不往見之爲監察御史首疏削金淵秩史嵩之終喪正言李昴英殿中侍御史章炎共疏乞竄斥之師雍亦上疏論列又乞籍􆃰之家隸張叔儀皆從之官終禮部侍郎潘牥字庭堅閩縣人端平二年策進士牥對陛下承休上帝皈德匹夫何異爲人子孫身荷父母劬勞之賜乃指豪奴悍婢爲恩私之地日食應詔上封事曰熙寕初元日食詔郡縣掩骼故王一坏淺土其爲暴骸亦大矣請以王禮改葬常挺字方叔連江人嘉熙進士爲御史疏言邊閫三事辟實才奏實功招實兵朝廷二事選良吏擢正人官終叅知政事林琦閩縣人德祐二年元兵迫臨安琦於赭山結集忠義數千人捍禦海道以功𥙷宣敎郎文天祥開府南劍琦佐其幕及潮州移屯琦俱被執至建康以憂憤死鄭思貞字憶翁號所南連江人以太學生應博學宏詞科元兵南下叩闕上書元人爭物色之遂變名思肖僑居呉下坐必向南時望臨安舊都野哭若狂終身不見朝士林同字子真福清人舉進士厯知縣解官家居益王立張世傑圍泉州乃率鄉人黄必大劉仝祖即其家開忠義局起義兵復永福縣時王積翁以福安送𣢾世傑實密約北兵至屠永福同盛服坐堂上囓指血書壁云生為忠義臣死為忠義鬼俄見執不屈死元敖繼公字君善長樂人精硏經史尤長於三禮以儀禮一經鄭氏舊註多疵因詳為刪定取賈䟽及先儒之說補其闕文附以己見名曰集說大德中寓居吳興呉士多從之遊趙子昂其弟子也後以薦為信州教授林興祖字宗起羅源人至治進士知鉛山州誅州豪吳友文州中稱治擢道州路總管峒猺叛聞興祖至憚其威名不敢犯林泉生字清源永福人天厯二年鄉舉授福清州司知海寇充斥以計殲之轉泉州經厯泉民負酒挩者多瘐死悉破械出之司理漳州畲洞相戒勿犯擢知福清州會紅巾寇連江乃創保甲置屯栅誅鹽丁謀亂者七人捕殺長樂謀為内應者三十餘人賊驚潰俗好訟有殺孤幼以誣人求直者立連逮親鄰法民不敢犯著有春秋論㫁覺是集明林鴻字子羽福清人洪武時以人才薦至京師太祖臨軒試龍池孤㕍二詩稱㫖名動長安厯官膳部員外郎與閩縣周元鄭定侯官黄元王褒唐泰長樂高棅王恭陳亮永福王偁號閩中十才子林英字章叔古田人洪武末以貢為監察御史建文四年燕兵入抗節不屈死妻宋氏亦自經死福王時追諡毅節本朝乾隆四十一年賜諡節愍葉福字叔疇閩縣人建文進士為刑科給事中燕兵至福守金川門城陷死之十一年本朝乾隆四賜諡節愍連楹古田人建文中官御史京師陷叩馬欲犯成祖被殺屍直立不仆高棅字彦恢更名廷禮長樂人博學善屬文永樂中厯官典籍所輯有唐詩品彚唐詩正聲行於世馬鐸字彦聲長樂人永樂壬辰進士第一博通經史臨義勇為洪熙中帝謂揚士奇曰馬鐸可為質實無二每翰林學士國子祭酒缺常命鐸攝之李騏字德良長樂人初名馬永樂丁酉鄉試戊戌廷試皆第一御改今名耿介有氣節在内廷纂修及典畿試以公慎著事父母孝奉繼母尤謹交友和而直人有過必面告之退無所毁黄澤字敷仲閩縣人永樂進士官河南左叅政拊循南陽流民無失所者宣德𥘉上疏陳十事其言遠嬖倖尤切時弊擢浙江布政使請罷銀冶諸坑語甚切摯王善字師舜侯官人永樂進士為刑部主事決獄平恕有誣其受賕者成祖因善入朝留也遣使檢其邸惟賜鈔半錠歎曰廉吏也擢郎中宣德中為雲南叅政以廉惠聞姚銑字孟聲侯官人永樂進士正統初用大臣薦授兵科都給事中已已北狩銑扈駕死薩琦字廷珪先西域人後著籍閩縣宣德中舉進士選庶吉士預修實錄厯官禮部侍郎有文學為人狷介持正不苟合黄鎬字叔高侯官人正統進士以御史按貴州時羣苗叛圍鎬於平越鎬固守九月城卒全成化時為南京户部尚書卒贈太子少保諡襄敏趙榮字孟仁閩縣人為中書舍人英宗北狩額森兵屯德勝門朝議遣使榮獨請行景泰元年復與都御史楊善往迎英宗天順中進尚書額森舊作也先今改正謝士元字仲仁長樂人景泰進士厯建昌知府治行稱最宏治初累官右副都御史巡撫四川士元性孝友家居行誼甚備治官事如其家遇事不顧利害必達其志林錦字彦章連江人景泰中廣寇充斥巡撫葉盛檄錦署靈山縣事賊不敢逼成化初擢廉州知府進副使皆有政績錦前後雖在兵間而以修學校勸農桑為務所在祀之陳煒字文耀閩縣人天順進士成化初擢御史疏劾錦衣指揮使門達竊弄威福上寘於法中外稱快厯官浙江布政使高瑶字庭堅閩縣人由鄉舉為荆門州訓導成化三年陳十事其一言郕王宜追加廟號盡親親之恩帝感其言久之竟復帝號後知番禺有異政林瀚字亨天閩縣人父元美永樂進士撫州知府有惠政瀚舉成化丙戌進士授編修屢遷禮部右侍郎掌國子監事敎士嚴而有恩力拒請謁以次營立署舍師儒免僦居再遷南京吏部尚書以災異率羣僚陳十二事正德初復陳養正心崇正道務正學親正人四事已而率羣僚條列時政十二就改兵部數裁抑内臣劉瑾銜之謫叅政瑾誅復官致仕卒贈太子太保諡文安子庭㭿庭機庭㭿子炫庭機子燫烴皆舉進士庭㭿工部尚書贈少保諡康懿庭機入翰林厯南京國子祭酒終南京禮部尚書孝友婣睦為士類所宗贈太子太保諡文僖炫仕至通政叅議燫亦入翰林厯國子祭酒南京禮部尚書文學行誼不愧祖父贈太子少保諡文恪明世三世為尚書且為祭酒並諡文林氏一家而已烴亦至南京工部尚書恬淡貞素不墜家聲林世勤字天懋燫次子性篤孝父卒枕塊三年哀毁骨立侍母黄氏不離側有靈芝三見枯篁復青禾兩歧瓜雙蒂之異御史上其事被旌林泮字用養閩縣人成化進士厯廣州知府有平蠻功正德時屢遷南京户部尚書劉瑾惡其不附己未出都遂令致仕泮居官廉歸無第宅常寓止僧寺及卒不能殮有司為庀喪具天啟初追諡恭靖林廷玉字粹夫侯官人成化進士授吏科給事中宏治初條籌邊翊治十事又上保治八箴劾太監王瓚弟碧冒濫授職奸僧繼曉漏網逋誅轉工科給事中以劾程敏政下獄謫判海州入為通政以僉都御史巡撫保定劾太僕寺丞張鑑點馬貪黷調掌南都察院事乞歸正德中閩卒倡亂廷玉與高文達造壘諭以朝廷威德羣黨解散未幾復亂又撫定之嘉靖末詔立祠與文達並祀許天錫字啟束閩縣人宏治進士由庶吉士除吏科給事中大同失事奉詔往覈上巡撫洪漢等敗衂掩覆狀又因天變疏請京官五品以下六年考察堂上官悉令自陳遂著為令正德時因清覈內庫得劉瑾侵匿數十事將奏聞瑾怒夜中遣人縊殺之鄭善夫字繼之閩縣人宏治進士武宗南巡偕同列切諌被杖嘉靖中用薦起刑部郎中為人矜名敦行婚嫁七弟妹貲財悉推與之葬母黨二十餘人所交盡天下名士虚懷下善人皆愛而親之作詩力摹少陵有少谷集二十五卷劉世揚字實甫閩縣人正德進士由庶吉士除給事中嘉靖初議加興獻帝皇號世掦疏諫又列上先朝直臣舒芬等二十人請加恩數以旌忠直由是諸臣各進秩一等既偕同官劾張璁桂蕚黨王瓊彭澤等又陳修省八事語皆切時弊為璁等所搆謫江西布政司照磨厯官河南提學僉事所至皆有聲謝蕡字維盛閩縣人正德進士授禮科給事中嘉靖初疏諫乳媪劉氏宫人孫氏濫封因勸節恩澤戢内侍南京災疏請勉力行修德政以荅天心復陳科舉之弊諸所建白皆關國體大禮議起與百官伏闕泣諫詔杖闕下福建海門自鑿新港民日以敝蕡上疏陳六害乞塞之以甦地方弭海寇從之出知太平府未任卒隆慶初錄嘉靖言事諸臣贈太常寺少卿林春澤字德敷侯官人正德進士授户部主事武宗南巡諫者皆廷杖罰跪春澤疏千餘言救之得免江彬扈從擅威福春澤持正不阿彬為氣奪後為程番知府歸春澤邃於禮經詩詞宏偉著有人瑞集卒年百有四歳張經字廷彜侯官人正德進士嘉靖初為給事中劾尚書金獻民等又極言官校之害請罷勿遣總督兩廣討平㫁藤峽賊侯公丁等與尚書毛伯温定計撫定安南積功進兵部尚書倭寇起命經總制七省軍務便宜行事選將練兵為搗巢計會趙文華以祭海至與浙江巡按御史湖宗憲比趨速戰經固俟永靖保順兵至文華怒疏劾經比被逮而經方大戰於王江涇斬賊首一千九百餘級卒不赦論斬隆慶初復官諡襄愍林公黼字質夫長樂人正德進士官大理評事時帝下詔南巡諸臣諫者皆罰跪闕前禍且不測公黼偕同官懇諫請寛諸臣罪帝怒加甚詔下獄被杖死公黼夜草疏時聞暗中泣歎聲奮筆不顧嘉靖初贈太常丞福王時追諡忠恪馬森字孔養侯官人嘉靖進士授户部主事累遷江西巡撫入為刑部侍郎改户部調大理卿屢駮疑獄與鄭曉周延稱為三平遷户部尚書隆慶初嘗命中官崔敏取户部銀市黄金森言故事御札皆由内閣下無司禮徑傳者事乃止既又命購珠寶森亦力爭不聽尋以母老乞養歸值閩卒倡亂諭散之鄉人為立祠卒贈太子少保諡恭敏鄭世威字中孚長樂人嘉靖進士官江西僉事副使數以事忤夏言嚴嵩遷四川叅政時嚴嵩方柄政遂致仕嵩敗以薦起累擢左副都御史再遷刑部侍郎詔採珠寳疏諫不聽謝病歸世威篤志正學持身嚴苦家居環堵蕭然躬課耕桑卒贈刑部尚書諡恭介陳見福清人嘉靖中舉於鄉倭寇來犯率家衆禦之與訓導鄔中涵同被執罵賊不屈死陳第字季立連江人初為諸生都督俞大猷聞其名召致幕下授以古今兵法南北戰守方畧尚書譚綸見而奇之用為京營裨將厯蘇鎮遊擊將軍居鎭十年邊備甚飭萬厯十一年戚繼光罷鎮邊事漸壞遂棄官歸所著有毛詩古音考伏羲先天圖贊尚書疏衍麟經直指屈宋音義松軒講義防海事宜蘇門兵事東番記五岳遊事諸書林大有永福人嘉靖間倭陷城大有時為諸生與知縣周煥並力戰死鄧原岳字汝高閩縣人萬厯進士為雲南提學僉事税璫恣横其爪牙笞辱諸生原岳捕治之荷校於市長於詩所著有西樓存稿徐􅎾字惟起閩縣人博聞多識善草隸書積書鼇峯書舍至數萬卷以布衣終兄熥字惟和萬厯舉人與􅎾俱擅才名閩中詩文自林鴻高棅後閱百餘年鄭善夫繼之迨萬厯年曹學佺徐􅎾輩繼起謝肇淛鄧原岳和之風雅復振焉林材字謹任閩縣人萬厯進士官工科給事中伉直敢言以忤時謫典史天啟中厯南京通政使崇禎初贈右都御史董應舉字崇相閩縣人萬厯進士天啟初累官太常少卿時遼事方棘疏陳急務數事又請營田近京乃擢太僕卿經理天津至山海屯務應舉安插遼東流民萬數千人廣募開墾獲穀充餉進工部侍郎兼户部并理鹽政為魏黨劾歸應舉好學善古文居官慷慨任事在鄉里好興利捍患人皆頒之翁正春字兆震侯官人萬厯壬辰進士第一累官禮部左侍郎署部事作八箴以獻王貴妃薨以費多久不葬正春言貴妃誕育元良奈何以天下儉青宫輟講久屢疏懇請並及福王之國瑞王婚禮語並切摯天啟初以抗論忤魏忠賢被㫖譙責乞歸仕至禮部尚書卒諡文簡曹學佺字能始侯官人萬厯進士天啟二年官廣西叅議劉廷元以附魏忠賢得志劾學佺私撰野史遂削籍崇禎初起副使辭不就明亡入山投繯死平生詩文甚富總名石倉集本朝乾隆四十一年賜諡忠節謝肇淛字在杭長樂人萬厯進士為工部郎中視河張秋作北河紀畧詳載河流源委及厯代治河利病岀為雲南叅政極言礦稅害民帝亦容之學詩於王穉登有小草齋集葉向高字進卿福清人萬厯進士選庶吉士累官吏部尚書建極殿大學士時神宗倦勤庶政不理朝署空虚羣黨角立向高深憂之在位務以調劑羣情輯和異同為事數言時政得失帝不能納遂因病歸光宗立召還天啟改元魏忠賢擅政欲興大獄憚向高未敢逞一時善類賴以保全已知時事不可為力求去位忠賢遂無所顧忌大肆羅織善類為之一空年六十九卒於家崇禎初贈太師諡文忠郭應響字希聲福清人萬厯丙午舉鄉試第一崇禎五年以榆林兵備副使署鄜延事賊犯鄜州應響禦之斬常山虎等十五人至是混天猴率衆夜突至應響登北關集士卒拒守手殺三賊力不支遂死事聞贈太常寺卿諡忠烈林汝翥字大葳福清人萬厯舉人授沛縣知縣以功擢御史天啟中巡視京城忤魏忠賢矯㫖廷杖削籍歸崇禎初起瓊州道魯王召為兵部右侍郎與同邑員外郎林垐攻福寕戰敗被執吞金屑死垐殁於陣本朝乾隆四十一年賜汝翥諡忠節垐諡烈愍鄭逢蘭字楚澤侯官人天啟舉人崇禎末官兵部員外郎闖賊破京師逢蘭分守西直門被執不屈齧舌噴血罵賊觸牆死本朝乾隆四十一年賜諡節愍馬思理字達生長樂人天啟進士厯官右通政以涂仲吉疏救黄道周事下獄後得岀明亡不食死同邑撫州同知高飛聲御史王恩及閩縣中書鄭羽儀福清袁州同知李時興永福給事中鄢正畿御史林逢經皆死之本朝乾隆四十一年俱賜諡節愍黃儒字三未永福人天啟舉人崇禎末知榮經縣張獻忠餘黨陷城令儒屈膝儒不從罵不絶口遂磔死妾林氏李氏皆焚死本朝乾隆四十一年賜諡節愍胡上琛字席公閩縣人世襲福州右衛指揮使好讀書能詩崇禎丙子舉武鄉試唐王時署都督僉事王被執上琛謂家人曰吾世臣不可苟活妾劉年二十願同死上琛喜曰汝幼婦亦能死耶遂整冠帶賦詩題壁共飲藥酒而卒年本朝乾隆四十一賜諡節愍劉沂春字泗哲長樂人崇禎進士厯官刑部主事行人熊開元以建言繫獄沂春讞之不阿上意屢㫖鐫責遂落職歸鄢廷誨字藎獻永福人崇禎中以歳貢授登封縣令流賊破城不屈死本朝乾隆四十一年賜諡節愍本朝陳丹赤字獻之侯官人順治辛卯舉人初為四川推官遷兵部郎中擢分巡温處道值耿逆變作總兵祖宏勲將叛擁兵郡城大觀亭邀丹赤議事丹赤至城守楊春芳厲聲曰兵餉俱無何以出戰丹赤曰提標前鋒已集計有五千何謂無兵糧甫給至六月何謂無餉封疆之臣守死封疆不知其他也宏勲目左右執斧者劈其肩丹赤罵聲不絶即挾出磔殺之事聞贈通政使諡忠毅子一夔以廕知浙江安吉州入為兵部刑部郎岀守湖州寕波所在興利除弊公廉愛民擢浙江糧儲道後以服闋赴召卒於都囊槖蕭然至無以為殮祀名宦祠陳子達字仲兼閩縣人順治壬辰進士官檢討敭厯楚蜀秦所至皆有實績後臬秦愈清慎自砥人謂有關西四知風以裁缺歸雖久宦不置田廬僑寓柘浦蕭然若儒素云蕭震字長源侯官人順治壬辰進士由順德推官擢御史假歸值耿逆變作陰與邵武府張瑞午建昌府高天爵密圖討賊謀洩縊死南關下方震被執時妻林氏與妾張氏子婦鄭氏婢曾氏先後懸樑投井死雍正六年諭祭建坊祀忠臣廟震生平遇事敢言為文章上追史漢著有西臺奏議蟄菴存稿道山紀畧諸書鄭江字若谷侯官人慷慨有至性母葉病將革江刲股羮進母霍然愈後父母殁遇諱日或展墓哀痛若𥘉喪時戊子大饑數斛榖可易頃田江語其妻陳曰人為子孫田宅計吾為兄弟目前計竟不以糓易田其孝友類如此次子開極少年登第由翰林厯官諭徳孝友敦睦一如其父致仕四十餘年當事罕見其面碩德耆年為一時重望何履鉌福清人泰寕諸生事父至孝順治丁酉海寇至履鉌父率鄉勇禦之被困履鉌冒死突救父已攖刃履鉌抱屍踴哭不去遂遇害陳彦弼字子卿連江人母病脚且瞽卧牀二十年彦弼承奉無懈順治丁亥土寇謀陷縣城隂使人夜開門彦弼率衆力拒之邑賴無恙黄成富連江人力於耕作同居六世家有六十餘口凡工作諸藝皆令其子弟自習之各執其事諸婦遇兒饑則乳之不問為誰兒遇衣垢則浣之不問為誰衣客至治具供食家長主之家中不聞一言蔣垣字用崇侯官人康熙壬子舉人母歿刺血追寫遺像廬墓三年有羣烏集鳴墓側人咸以為孝感耿逆變亂逃匿橘園洲逆黨以宿學交薦垣詐為廢疾拒之密約李天然等謀内應以延王師事洩天然等十三人被害垣遁得免雍正二年祀忠孝祠時又有同邑呉士宏者興其父江夏知縣吳日來舉人陳學夔俱遯跡橘園洲三年中堅辭逆職誓死不屈雍正二年祀忠義祠施大晁字觀宏福清人康熙癸丑進士耿逆變亂羅致紳士大晁抗節不受逆職偽縣令李傳甲偵知匿所逼以偽檄大晁忠憤激烈嚼舌唾罵逆黨羣毆之嘔血死李馥字汝嘉福清人康熙甲子舉人由刑部郎中出守重慶郡經流寇亂後田賦無考馥履畝清丈侵佔弊息累遷江蘇按察使制府擒治奸民株連百餘人馥察其冤濫者盡白釋之擢浙江巡撫時亢旱請截漕二十萬民不知飢又漕米例用白糧馥疏請兼用紅白民便之在官以廉慎稱歸田二十年借屋以棲與士大夫文酒往還年八十餘卒林文英字碧山侯官人康熙戊辰進士由庶吉士厯禮部郎出守保定瓊州性至孝丁内外艱苫塊三年舉動一稟家禮生平崇正學厯官所至修建蘇軾邱濬楊繼盛海瑞祠宇卒於瓊祀名宦祠余正健字乾行古田人康熙丁丑進士由編修累遷國子監祭酒督學江南條敎不煩苞苴請謁無一及者疏請范仲淹從祀廟廷上廉其學守召為順天府尹剔奸弊省囹圄勤於奉職數月晉秩副都御史再奉命督學滇南疾作予告歸乾隆十三年祀郷賢祠黄任字于莘永福人康熙壬午舉人知四會縣罷官歸里惟端石數枚詩稿兩束而已所著詩流麗悱惻尤長於七絶嘉興杭世駿著全閩詩話謂其秀韻獨岀兼饒逸氣較諸體更為擅場家居蓄十硯因以名其齋鄭任鑰字惟啟長樂人康熙丙戌進士選庶吉士厯官侍講典試江西督學江南所拔多知名士雍正初元擢湖南布政使尋調湖北升巡撫署湖廣總督討湖南逆賊謝錄正等平之入為副都御史命往江南查倉榖民戴之建祠祀焉著有朱子或問小註自治要纂諸書林侗字同人侯官人博涉經史精於金石碑板為尤溪敎諭以親老歸隱城西荔水莊著有來齋選古金石考畧諸書弟佶字吉人受詩於王士正康熙􅩐辰欽賜進士官内閣中書平生博覽羣書尤得力於韓曾工篆隸行楷著有樸學齋詩文集及焦山古鼎甘泉宫瓦詩各一卷許友字有介侯官人工詩及書畫為朱彛尊所稱著有米友堂集子遇遇子鼎均皆有宦績自友至其曾孫王臣以下同居七世丁衍百餘乾隆五十年旌御書扁額曰海國醇風林枝春字繼仁福清人乾隆丁已進士第二授編修厯官通政司副使性孝友讀書崇實學督學河南時有三敎堂百餘所設儒道釋三像以佛居中枝春奏禁之乞假歸掌敎鼇峯書院朔望集諸生於講堂示以立品持躬之要文章器識之大閩士爭岀其門家居十一年卒孟超然字朝舉閩縣人乾隆庚辰進士由庶吉士厯官吏部考功司郎中督學四川清操甚著歸里後主鼇峯書院講席課士有方成材者衆嘉慶二十一年祀鄉賢祠流寓陳虞寄餘姚人張彪往臨川强寄俱行彪將鄭瑋刦寄奔晉安時陳寳應據閩中得寄甚喜寄每陳逆順之理以諷諫寶應不從乃居東山偽稱腳疾不起宋張浚綿竹人辛炳為御史中丞率同列劾浚提舉洞霄宫居福州元圖多卜鼎回回人累官廣東廉訪司僉事寓居福州城陷以石繫其腰投井死其兄曰穆嚕鼎者官達康曰赫嚕鼎者官信州亦皆死國難云圖多卜鼎舊作獲獨歩丁穆嚕鼎舊作穆魯丁赫嚕鼎舊作海魯丁今並改正王翰靈武人累官福州路治中元亡屏居永福山中洪武初有薦之者翰曰女可更適人哉遂自引決列女五代石氏二女羅源人長月英次雪英王審知時青巾賊亂二女遇賊不屈投水死水旁有石人因命曰十八娘巖宋唐璘母古田人璘擢監察御史有憂色母問其故璘曰此官須為朝廷爭是非一咈上意或忤權貴恐重為大人累母曰而第盡言吾有而兄在勿憂璘居官大節母敎之助為多陳氏閩縣人笄年守志壽踰九十理宗時詔旌其門林子埜妻陳氏長樂人年十八歸林甫十七日而寡守節不移至九十餘卒詔旌其門李仲敏妻王氏福清人適仲敏早卒王年二十三哀慟幾絶既殯乃屏家人自縊死劉仝祖妻林氏福清人宋末仝祖起義兵亡命自經死林氏為有司所執令具反狀林叱曰林劉二族世為宋臣欲以忠義報國何為反乎遂遇害元陳氏長樂人海賊刦石梁其夫適在縣郭陳氏遇賊被執且行且罵賊亂捶之扶以登舟罵不已自投江中其父方卧病見其女至呼之不應駭曰吾豈夢耶既而自賊中歸者言陳氏死狀明日屍逆流而上止石梁岸旁鄉里莫不駭歎乃舁歸葬之穆什頁庫妻色目人穆什頁庫奉使廣東妻留福州時悍卒為變逼脇之穆付頁庫妻因持斧擊殺卒遂為同營卒所殺時長樂柯宗實妻陳氏古田蔣國秀妻陳氏林氏女娥皆遇賊𬒳害穆什頁庫舊作馬速忽今改正明李廣妻盧氏名佳娘福清人成婚甫十月廣卒既殮哭輒僵仆伺家人防懈潛入室自縊同邑游政妻倪氏亦夫亡自經韓一敬繼妻林氏福清人夫死踰年撫前子成立遂與娣姒訣抱鏡自投於江陳九敘妻吳氏長樂人嘉靖中為倭寇所獲驅之不行罵不絶口延頸受刃賊遍斫其膚而死同邑林長淮妻陳氏適長淮一載長淮病以目睨婦婦揣知夫意入室自經為家人所覺越三日夫亡後自縊死陳商聘妻王瓊妹福清人許字未婚而商卒請於母歸陳為持喪居數歳㑹倭寇作被執不辱拾刀自殺賊義而殮之林侹妻何氏福清人嘉靖中倭亂侹父子被執侹求免父執己氏見翁還而夫不在欲自殺以殉家慰以稍待既而有言侹死狀何為夫招魂從容自縊時同邑張季臨妻林氏亦與姑同𬒳執氏願以身代姑得免氏紿賊曰我宅前池中有金寶賊信之氏導往自投於水賊刺殺之林師學妻廉氏夫婦被擄擁迫登舟謂夫曰汝可潛歸吾死矣不受辱也遂投海死鄭大鸞妻周氏福清人夫卒氏絶而甦者三既殯夫於寢右氏命左之詰旦自經於柩側乃知其虛右以待也鄭濬元聘妻俞氏福清人受聘未婚夫死奔喪哭奠以刀自刎姑遽奪之又以簪刺不死復自經姑又解救之竟絶粒二十八日而死林用進妻謝氏福清人夫早卒氏誓以身殉絶粒待斃越旬餘不死取所藏金雜鉛粉吞之又不死面腫目湧僅留殘喘偶家人挈用進書篋至大慟嘔血盈盆遂絶年二十有一林汝瞻妻尤氏羅源人廣東流寇至一家被擄舟至鑑江港口氏歎曰此為吾故土死於此足矣遂抱女投江中一時諸媳妯娌三十四口皆同死本朝林儼妻翁氏侯官人儼溺水死翁矢節不移寇掠洪塘被執露刃逼之不從且罵斷手屠面終不屈賊怒寸磔之葉日炳聘妻陳氏侯官人許字未婚夫卒訃至陳閉尸自縊以救免乃毁妝茹素守貞十一年日炳父母俱逝其兄弟以禮迎歸擇兄子為嗣時方襁褓氏朝夕對木主器奠又六年嗣子己六嵗即於所居投繯殉節年三十六同邑王荷天妻莊氏王孔璽妻陳氏俱夫亡殉節張大光婢張氏亦以烈殉林邦楨妻鄭氏侯官人事姑以孝聞夫卒家貧矢志撫孤苦節幾三十年守禮不踰尺寸親課二子學成人稱賢母又同邑鄭澍聘妻郭氏幼聼慧善書字未婚而澍夭氏歸鄭門執婦道甚謹夫家欲以其節請旌謝曰吾自盡吾職耳敢因以為名哉年七十八卒其貞靜為人所難林德翯妻黄氏福清人海寇突至黄遇賊刦之行不從賊刃之斷五指仆地賊義而捨之後德翯遘疾黄知不起誓以死殉夫卒七日乃縊林百驎妻黄氏福清人驎溺死黄為夫殮畢以刀割喉流血仆地氣絶復甦即引喉傷向石階往來刮磨為家人救持