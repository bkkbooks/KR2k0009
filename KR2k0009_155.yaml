front:
  text: 大清一統志福州府津梁去思橋在府城內東門舊名澳橋宋郡守謝必甃石重建後人思之故名又有横嶼斗門橋在縣東為閩及連江二縣水利所關安泰橋在府城內南街宋宣和中郡守陸藻建並創亭其上亭今廢萬壽橋在閩縣南十里跨南臺江上元大徳七年建本朝乾隆五十九年重修石梁長三百餘丈水門三十九翼以石欄南北搆亭俗名大橋中洲橋在閩縣萬壽橋之南又名江南橋本朝乾隆十六年因舊址甃石為梁長四百四十尺廣三十八尺邑人何際逑等捐修巡撫潘思榘為記行善橋在閩縣雙溪里本朝乾隆三十五年修又相近有鳳坂墩橋四十九年修江墘橋善潭橋聖公橋秀嶺墩橋上下渡橋俱五十五年修歸善橋長壽橋俱六十年修長福橋在閩縣鼓山里本朝嘉慶元年修又相近有福善橋將軍橋通濟橋俱二年修十四門橋在侯官縣西南超山下釃水爲十四道洪山橋在侯官縣西十里洪塘鋪口明成化中建本朝康熙二十五年乾隆二十四年修嘉慶二十三年重修長一百二十三文水門三十有四蓋橋屋九十三間府境橋梁洪山與萬夀最巨太平橋在長樂縣東一名觀音橋明隆慶五年重建錦橋在長樂縣東南宋淳熙十二年建石梁十五間長五十丈上接元佑港下通漳港其石欄鑱文如錦故名龍江橋在福清縣東南十五里宋政和三年建長一百八十餘丈爲梁四十有二初名螺江橋後更名永平紹興中又改今名
