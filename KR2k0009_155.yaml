理究治理書牘曰鶴雖帶牌犬不識字禽獸相殘於人何事人服其不撓張琦鄞縣人正德十年知興化府政尚簡易以儒術飾吏治有古循吏風每臨山水輒題詩巖壁號文章太守課績為一時冠雷應龍上元人正德中知莆田縣有鬻子納税者出俸贖還且痛自引咎曰我獨不能為陽城俾民至此哉時與郡守溤馴並稱良吏鍾善經順德人正德中為興化推官決獄明允以亷能著奸人楊日新詐為朝官入境僚屬率加禮善經立縛治之鎮守太監使人執府吏善經曰府吏即有罪府官治之勅使何得自執卒不與蔡宗兖山陰人正德中為興化府學敎授會御史行學故事敎官率弟子員長跪宗兖令諸生列立道旁明倫堂會講宗兖請遵令甲陪坐忤御史即辭去蘇廖鎔雷州人正德十六年任仙遊典史嘉靖初寇薄仙邑率兵往禦寇不敢近白仁涿州人為興化衛千户嘉靖二十四年與海寇戰於東嶽廟口兵寡力困死於賊事聞贈明威將軍陳大有南海人嘉靖四十二年知仙遊縣倭寇破莆乘鋭來攻大有諭衆堅守經五十餘日叅將戚繼光援至城賴以全易道談巴陵人嘉靖四十二年知興化府郡新被倭道談繕城樓築羅城夫保館夫二役最為弊法道談白去之周大禮崑山人嘉靖間知興化府嚴緝盜牛諸犯置之法民賴以安嘗請發帑錢數千緡糴粟以濟饑民全活無數又置公田於游洋人呼為周公洋鄭思道永嘉人萬厯十年為興化衛經厯給散月糧斥罷例錢奉檄勘屯田䇿馬以行裹糧自隨厯九載清苦一轍徐觀復上虞人萬厯四十一年知仙遊縣稔知邑有食鹽之苦以龍華寺廢租抵輸鹽課秩未滿調去民立祠祀之吳麟徵海鹽人天啟中任興化推官清潔自守人莫敢干以私凡訟獄寃滯多所平反祁彪佳山隂人天啟末任興化推官遇事明敏讞決多得情實劉永祚武進人崇禎間由選貢生屢遷興化同知禽賊曾旺後以副使知興化府事大兵入城仰藥死本朝黎樹聲烏程人順治四年以福州推官署興化府事海寇逼城晝夜巡守十餘月明年城破與遊擊尚香䇿巷戰力竭死事聞贈按察司僉事廕一子陳有虞富平人順治十年知仙遊縣海寇迫城與遊擊王嘉禎嚴督守禦夜遣鄉壯縋城擊賊明年圍益急援兵不至賊穿地入城遂陷有虞揮刀巷戰死嘉禎力竭猶手刃一賊死於東城事聞贈卹張彦珩洛陽人順治十一年知興化府歲饑繪流民圖進之發粟為糜以賑饑者史允琦江寕人順治十六年任興化推官性明決吏不敢以身扞文網鞫獄多平反康亷采陵縣人康熙初任興化推官治尚寛厚不忍輕置人於法接士温温飲人以和趙世安漢軍鑲紅旗人康熙二十七年擢興化同知嚴毅有幹畧尤嚴禁賭博凡摴蒱之戲有犯必懲罰鍰入公為修木蘭陂之用沈起元太倉人雍正中由吏部員外郎岀知興化府居官嚴肅而慈惠毁淫祠興水利鋤暴安良士民徳之其書院督課鼓勵士子尤詳而有法人物南北朝陳鄭露字恩叟莆田人自永泰徙居搆書堂於南山與弟莊淑共修儒業莆人化之號南湖三先生郡人業儒自露始唐林披字茂則莆田人天寶十一年以明經擢第授臨汀郡曹椽地多山鬼淫祠著無鬼論暁民以御史大夫李栖筠薦檢校太子詹事兼蘇州别駕贈睦州刺史子九人皆官刺史號九牧林家林藻字緯乾披次子少有志尚與歐陽詹讀書龜巖學成負筴而西以詞賦擢貞元七年進士省試合浦還珠賦主司杜黄裳謂其語有神助官至殿中侍御史邑人第進士自藻始林藴字夢復披六子貞元四年以明經及第西川節度使韋臯辟爲推官劉闢反藴切諌闢怒命殺之又惜其直陰戒刑人抽劍磨其頸以脅服之藴叱曰死即死我頸豈頑奴砥石耶闢捨之及闢敗藴名重京師遷禮部員外郎出爲邵州刺史卒林攢字仰山披從孫貞元初爲福唐尉母老未及迎而病攢聞棄官還及母亡水漿不入口五日自埏甓作塚廬其右有白烏來甘露降觀察使遣官驗實露將晞而復集烏亦囘翔詔作二闕於墓前又表其閭時號闕下林家鄭良士字君夢仙遊人景福二年獻詩五百篇授國子四門博士累遷御史中丞後棄官歸王審知辟爲左散騎常侍著有白巖詩文集中壘集徐寅字昭夢莆田人乾寕進士授祕書省正字平主博涉經史尤長於賦著有賦五卷詩八卷探龍集五卷黄滔字文江莆田人乾寕進士唐末强藩多僭位王審知據全關終其身爲節將滔規正有力焉朱温移唐祚遂不復西中州名士避地來閩者悉主於滔著有文集十五卷泉山秀句集三十卷宋潘慎修字成德莆田人以父承祐任爲南唐秘書省正字開寶末李煜遣隨其弟從鎰入貢捷書至邸吏督從鎰入賀慎修以爲國且亡當待罪何賀也從鎰即奉表請罪帝嘉其得體景德初擢爲右諌議大夫翰林院侍讀學士從幸澶州遘疾詔令先歸卒慎修風度藴藉博涉文史善清談士大夫與之遊者咸推其素尚有集五卷陳靖字道卿莆田人好學通古今謁轉運使楊克巽陳討賊䇿授陽翟主簿遼兵犯邊上機畧五䇿累遷太常博士議均田命爲京西勸農使厯江南轉運使極論前李氏横賦於民凡十七事詔為罷其尤者後以秘書監致仕卒靖平生多建畫而於農事尤詳嘗取淳化咸平以來所陳表章目曰勸農奏議錄上之方偕字齊古莆田人大中祥符五年進士為温州軍事推官累遷御史臺推直官澧州逃卒至農民家誣告民事摩駝神逮其族三百人繫獄久不決偕被詔就劾事遂辨卒以誣告論死南京鴻慶宫災偕引漢罷原廟故事請勿復修偕以吏事進治杭州有能聲以太常少卿分司西京遷光祿卿卒蔡襄字君謨莆田人天聖進士為西京留守推官慶厯初知諫院兼修起居注任職論事無所囘撓御史唐介劾宰相貶春州襄疏言此必死之謫得改英州進知制誥每除授非當職輒封還之後乞知杭州拜端明殿學士以往尋卒諡忠惠襄工書為當時第一於朋友尚信義弟高字君山第進士為長溪尉及太康簿誅盜安民刻苦力學遺稿十數萬言皆經世要務年二十八卒襄孫傳著述甚多厯官南京留守司佃崇寕二年進士第二與弟伷伸俱有聲號三蔡任澤字天錫仙遊人仙遊夫人母弟英宗入繼大統授西頭供奉官尋拜嘉州刺史卒澤起田里際㑹恩寵能自安繩檢帝欲廣其居固辭當任子弗請其篤謹如此茅知至仙遊人橾尚介潔不求聞達著有周詩義至性書黄隱字仲光莆田人治平進士官侍御史剛直敢言元祐初為國子司業力排王安石之學取三經板火之朱紱字君貺仙遊人治平進士厯都官員外郎後入元祐黨籍五年起知福州蔡京復相紱遂罷傅楫字元通仙遊人少從陳襄學襄以女妻之登治平進士調揚州司户叅軍徽宗以端王就資善堂學進楫侍講翊善一府嚴憚之徽宗即位拜中書舍人時曾布當國凡命令有不當用人有未厭悉極論之帝多所延訪楫每以遵祖宗法度安静自然為言在朝歲餘見事寖異歎曰禍其始此乎遂丐去以龍圖閣待制知亳州卒王囘字景深仙遊人熙寕進士為睦親宅講書與鄒浩友善賢妃劉氏立浩將論之囘曰事孰有大於此者乎浩南遷人莫敢顧囘斂錢與治裝邏者以聞逮詣詔獄獄上除名即徒歩出都門徽宗立召復官卒陳次升字當時仙遊人熙寕進士知安邱縣紹聖中為御史轉殿中吕升卿察訪廣南次升言升卿資性慘刻乃止尋擬謫監全州酒税改南安軍徽宗立召為侍御史極論章惇蔡卞曾布蔡京之惡竄惇於雷居卞於池出京於江寕遷右諫議大夫獻體道稽古修身仁民崇儉節用六事言多規切崇寕初以寳文閣待制知潁昌府降集賢殿修撰尋徙建昌編管循州皆以論京卞故政和中復舊職卒方公袞字汝補莆田人元豐進士擢諸王宫敎授韓琦稱其論事剴切正而不阿立巳公忠清而不撓阮駿字千里莆田人紹聖進士為河南府少尹金兵南下駿率部兵擁䕶神御殿兵敗抱神御指敵大罵死之張弼字舜元仙遊人恬淡好學尤刻意於易推明為書有漢晉易家所不到者紹聖初大臣以其名聞并上所著易解九卷賜號葆光處士陳淬字君銳莆田人宣和中拜忠州團練使真定府路副總管金兵入真定淬以孤軍禦之妻孥八人皆遇害建炎元年敗金兵於南華擢知恩州王善襲恩淬與長子仲剛拒戰賊飛刃及淬仲剛以身蔽刃死明年善復圍陳州淬大敗善兵李成叛詔淬討之三戰三捷永幾金兵犯板橋淬獨與戰力盡大罵與從子仲敏俱死詔贈拱衛大夫明州觀察使林冲之字和叔莆田人元符進士厯御史臺檢法官靖康初爲主客郎中副陳過庭使金同被拘執冲之奮厲見詞色金人怒徙之奉聖州逼仕偽齊不屈徙上京又不屈置顯州極北沍寒之地幽佛寺十餘年病亟恨國讎未復南向一慟而絶僧窆之寺隅洪皓選朝以聞詔與二子官子郁從子震霆郁爲福建茶司幹官建州卒爲亂郁入諭遇害震仕至秘書少監以不附二蔡有聲霆爲勅令所刪定官詆紹興和議謂不宜置二帝萬里外不通問即挂冠岀都門權臣怒廢放以死莆人稱爲忠義林氏即所居立祠宋旅字廷實莆田人大觀進士知剡縣方臘之亂旅率民拒守力不敵死之方軫字叔時莆田人以廕補太廟齋郎蔡京復相軫列其罪千二百餘言詔以疏示京下御史臺鞫治獄具編管嶺南後官鄞縣令陳自仁字克廣莆田人宣和進士爲永豐縣尉隆祐太后䕶衛兵叛自仁集尉卒調民兵戮力拒討兵疲援絶與知縣趙訓之皆戰死鄭振字亨叔仙遊人建炎中盜楊勍起邑令檄振糾集民兵禦之振力戰賊衆遁去羣盜曾少龍等衆至數萬帥司檄振行盜素聞振名不戰自屈盜詹夜义入振井里振帥衆拒之遇害里人為振立祠鄭樵字漁仲莆田人好著書游名山大川搜奇訪古遇藏書家必借留讀盡乃去初為經㫖禮樂文字天文地理蟲魚草木方書之學皆有論辨紹興中召對帝曰聞卿名久矣敷陳古學自成一家何相見之晚耶授右迪功郎入為樞密院編修官金兵犯邊樵言歲星在宋金主將自斃後果然帝幸建康命以通志進㑹病卒樵居夾漈山學者稱夾漈先生郭義重字處仁莆田人早遊太學以操尚稱紹興七年隨駕至錢塘聞母喪徒跣奔歸每一慟輒嘔血聚土為墳手蒔松竹而廬於其旁甘露降於墓上烏鵲馴集詔旌其閭於所居前安綽楔左右建土臺仍植所宜木黄公度字師憲莆田人紹興八年進士第一除秘書正字時秦檜當國坐與趙鼎往來譏切時政岀判肇慶府秦檜死召還遷考功員外郎著有知稼集陳俊卿字應求莆田人紹興八年進士第二授泉州觀察推官秩滿秦檜當國察其不附已以為南外睦宗院敎授檜死召兼王府教授正色特立孝宗時授尚書右僕射同中書門下平章事兼樞密使俊卿以用人為巳任所除吏皆一時選後以少師魏國公致仕薨上聞嗟悼輟視朝贈太保諡正獻俊卿孝友忠敬得於天資清嚴好禮終日無惰容平居恂恂若不能言而在朝廷正色危論分别邪正斥權勢無顧避凡所奏請關治亂安危之大其薨也朱子往哭之乂狀其行有集二十卷子守定宓皆從朱子受學龔茂良字實之莆田人紹興進士厯官監察御史江浙大水詔陳闕失茂良䟽曰願先去心腹之疾然後政事闕失可次第言矣時内侍梁珂曾覿龍大淵皆用事故茂良及之拜參知政事淮南旱奏取封樁米十四萬賑之後疏言恢復六事謝廓然因劾之遂責降安置英州既卒上曰茂良本無罪復資政殿學士諡莊敏茂良平生不喜言兵去國之日乃言恢復事没數年朱子從其子得副本讀之則事雖言恢復而其意乃極論不可輕舉猶平生素論也深為之歎息云陳居仁字安行莆田人父膏為御史鄞僧王法恩謀逆事覺或請屠城膏力論多殺非盛世事脅從悉寛宥之居仁年十四而孤蔭授鉛山尉紹興中舉進士有勸以一見秦檜可得美官終不自通魏杞以宗正少卿使金辟居仁幕下諭金人開適入卒成禮減歲幣而還知徽州秩滿為户部右曹郎官命未下朝方推㑹要賞帝曰陳居仁治行為天下第一賞之再進華文閣直學士提舉太平興國宫卒居仁風度凝遠處巳應物一以誠信臨事毅然有守所至號稱循吏皆立祠祀之有奏議制藳詩文行世林光朝字謙之莆田人聞吳中陸子正受學於尹焞從之游專心聖賢踐履之學通六經貫百氏言動必以禮南渡後以伊洛之學倡東南自光朝始登隆興元年進士調袁州司户叅軍大臣論薦召試館職厯著作佐郎出為廣西提點刑獄移廣東茶寇薄嶺南光朝自將郡兵擊敗之除中書舍人謝廓然由曾覿薦賜同進士出身除侍御史光朝曰是輕臺諫而羞科目也立封還詞頭後引疾提舉興國宫卒諡文節有集二十卷學者稱艾軒先生劉夙字賓之莆田人與弟朔師事林光朝登紹興進士除著作郎疏言嚴法守裁僥倖等事後知温州引疾歸卒子彌正嘗為朱子定諡曰文彌正子克莊淳祐中除秘書少監兼中書舍人奏史嵩之罪為章炎劾罷尋復職厯龍圖閣學士致仕卒諡文定著有後村居士集葉顗仙遊人中武藝謀畧科官承節郎守禦京城金兵圍急謂弟容曰忠孝不能兩全吾登陴死爾歸養相持泣别力戰死葉容字子昂顗弟紹興進士為南海主簿賀正中薦容靜退召見論國讎未復其語剴切帝嘉納之又言恢復莫先於將相張浚無恙是天留以相陛下也除吏部侍郎林安宅王伯庠論之鞫對無蹟上曰卿之清德自是愈光矣進尚書左僕射薦汪應辰王十朋等上嘉納後以觀文殿學士致仕卒諡正簡容為人簡易清介與物若無忤處大事毅然不可奪自初任至宰相服食僮妾田宅不改其舊鄭僑字惠叔莆田人乾道五年進士第一以春秋侍講東宫拳拳於父子君臣君子小人之際累遷中書舍人充金國賀正使趣就東上闔門進書不屈遣囘慶元中拜參知政事進知樞密院事上章求退以觀文殿學士致仕卒贈太師諡忠惠陳卓字立道居仁子紹熙進士知江州移寕國府丞相以故欲見之卓謝不往丞相益器之進簽書樞密院事丐祠卒鄭勲字景周仙遊人嘉泰進士知博羅縣戍卒亂焚掠州縣動衣冠坐㕔事賊迫之不為動遂遇害事聞贈朝奉郎方信孺字孚若莆田人有雋材以父崧卿䕃補番禺縣尉韓侂胄開邊釁假信孺朝奉郎使金自春至秋三往返以口舌折强敞歸忤侂冑奪三秩已而王柟定和議增幣儀皆信孺所持不可者柟歸具言金人每問信孺安在乃起通判肇慶府陳宓字師復俊卿子以父任厯泉州南安監税主管南外睦宗院嘉定中入監進奏院上封事丞相史彌遠不樂而中宮慶壽三牙獻遺為之罷卻累官直秘閣進職一等致仕宓天性剛毅信道尤篤自言居官必如顏真卿居家必如陶潛而深愛諸葛亮身死家無餘財庫無餘帛之言庶乎能蹈其實者端平初贈直龍圖閣著有論語註義問荅文集等書鄭可學字子上莆田人早孤撫諸弟裹糧千里從朱子遊朱子嘗以刪定大學一編示諸生曰此書欲付得其人惟子上可託凡學者有問必使可學正之竟日端坐不見怠容著有春秋博議師說三朝北盟舉要黄士毅字子洪莆田人僑寓呉中慶元中學禁方嚴徒歩入閩師事朱子命日觀一書夜叩所見居數月授以大學章句而歸自是充然有得嘗譔次朱子書説文集語類三書方耒字耕道莆田人少孤力學家貧奉母師事朱子於建安朱子稱其明敏强毅進學不倦時同受業者又有同郡方大壯方壬余元王邁字實之仙遊人嘉定進士為潭州觀察推官俄召試學士院因策楮幣論及時事真徳秀聞而善之又言呉知古陳洵益撓政輪對言君不可欺天臣不可欺君厚權臣而薄同氣為欺天之著淳祐中以亢旱求言邁奏七事而以徹龍翔官立濟王後為先後予祠卒邁以學問文章發身尤練世務評宰輔世服其公陳均字平甫莆田人嘗用綱目義例為宋編年舉要備要二書端平𥘉詔取其書賜迪功郎陳咸字逢儒莆田人辟四川宣撫幕吳曦叛首脅之咸不往曦誅安丙奏以咸總蜀賦咸晝夜精勤調度有方卓得慶字善夫莆田人紹定進士厯著作郎景炎二年兼制司叅謀官元兵逼城被執與二子規權俱死李丑父字良翁莆田人端平進士除太學博士忤丁大全罷起為著作郎言苛征黷貨及競侈等事提舉湖南常平義倉尋罷陳文龍字君賁俊卿五世從孫能文章負氣節咸淳五年廷對第一賈似道禮重之拜監察御史臺中相承凡有建白皆呈藳似道文龍獨不呈藳又請罷范文虎趙潛黄萬石似道大怒使臺臣劾罷之尋起為左司諫累遷叅知政事乞歸益王稱制復以文龍叅知政事興化石手軍叛討平之已而建寕泉福皆降於元文龍發民兵堅守力窮𬒳執欲降之不屈餓死其從叔瓚復舉兵殺叛將林華據興化未幾城破巷戰死之元郭道卿莆田人四世祖義重至孝鄉人為立孝子祠至元初盜起居人竄匿道卿與弟佐卿獨守孝子祠不去被執盜將殺佐卿道卿泣告曰吾有兒巳長弟弱子㓜請代弟死佐卿亦泣告曰吾家事賴兄以理請殺我道卿丙引頸就刃盜相顧曰汝孝門兄弟若此吾何忍害兩釋之陳旅字衆仲莆田人少孤力學用薦為閩海儒學官適御史中丞馬祖常使泉南一見奇之謂曰子館閣器也胡為留滯於此因相勉游京師既至學士虞集見其所為文歎曰此所謂我老將休付子斯文者矣與祖常交口游譽於諸公間除國子助敎居三年考滿諸生不忍其去請於朝再任焉林以順字子木莆田人至治進士知慶元縣有弟殺兄隂以賂免以順發其獄誅之移浦江縣平反冤獄升江西儒學提舉改知福清州時豪强横起海港中多劫殺以順以次捕除除福州路同知卒鄭杓字子經仙遊人嘗著春秋解義表義覽古編次夾漈餘聲樂府又著衍極書吳與弼謂其考論字學最為近正宣撫使齊履謙為上於朝林濟孫字石友仙遊人元久罷科舉至元元年始再舉行濟孫第進士第一授翰林院修撰尋除侍講時饑饉洊至盗賊蜂起濟孫上治安十䇿順帝奇其才三年奉詔與歐陽元吕思議修宋遼金三史十一年上治河十䇿詔同運使賈魯塞北河通南河以復故道凡五閱月告竣明呉源字性傳莆田人洪武中以林廷綱薦授四輔官兼太子賓客以老乞歸後復召爲國子司業卒官所著有文集二十卷及莆陽名公事蹟陳彦囘字士淵莆田人建文初知徽州府有善政燕兵逼江左糾集義勇勤王及成祖嗣位械入京不屈死四十一年本朝乾隆賜諡忠烈陳繼之莆田人建文進士爲户科給事中江南僧道多腴田繼之請人限五畝餘以賦民從之燕兵起疏陳備禦六事復請除徐增夀以阻其謀不聽成祖即位不屈死本朝乾隆四十一年賜諡節愍林長懋字景時莆田人永樂中由敎授擢翰林編修簡侍皇太孫講讀太孫好射獵長懋數直諌及即位由中允岀爲鬰林知州坐怨望逮繫詔獄英宗立始命復任有善政黄約仲名守以字行莆田人少負才名永樂初應詔至京試上林曉鶯及天馬歌擢第一官翰林典籍預修永樂大典進檢討有黄檢討集林時字學敏莆田人永樂進士厯陜西僉事奏請鳳延等郡民與寕夏甘涼戍卒得以粟布自相對輸又奏設武學令軍中子弟得由科目進用於是天下皆設衛學翁世資字資甫莆田人正統進士授户部主事天順元年擢工部右侍郎時東南水潦蘇杭織造世資議減其半貶知衡州成化中遷江西左布政使奏蠲民賦百七十餘萬石巡撫山東歲饑發廪賑卹民賴以濟厯户部左侍郎進尚書以太子少保致仕卒著有冰崖集陳俊字時英莆田人正統進士授户部主事成化時升南京太常少卿累遷南京吏部尚書加太子少保俊誠心體國識大體負徳望稱一時名臣卒諡康懿柯潛字孟時莆田人數歲能詩景泰二年進士第一授修撰屢遷翰林學士少詹事慈懿太后之喪率僚屬疏請祔葬未報潛曰朝廷大事臣子大節舍是奚所用心再疏爭之竟得如禮為學士時即院中搆清風亭植二柏於後堂人稱其亭為柯亭柏為學士相陳變字廷輔仙遊人景泰舉人肄業太學會兩京御史缺員詔嚴考監生拔其尤者與進士相兼補用變名在優等拜監察御史巡視倉儲剔蠧釐奸豪强不得逞遷廣東僉事時洋船諸司皆有例錢變獨不受未三載卒於官彭韶字鳳儀莆田人天順進士厯刑部員外郎成化中疏論僉都御史張岐憸邪乞召還王竑李秉葉盛忤㫖下獄尋復職進郎中太后弟周或乞武强武邑二縣閒田命偕御史季悰覆勘周視徑歸上疏自劾曰誠不忍奪小民衣食附益貴戚復下獄得釋時與何喬新並有重名人稱何彭宏治初為刑部侍郎巡視浙江改吏部與尚書王恕甄别人才士路為清進刑部尚書秉節無私事關大體皆抗疏極論與王恕及喬新稱三大老而貴戚近習深疾之遂乞休歸卒贈太子少保諡惠安吳希賢字汝賢莆田人天順進士官檢討預修英宗實錄有貴介密求為父增飾其美希賢曰吾將見董狐於地下可曲筆乎後官侍講學士卒陳音字師韶莆田人天順進士授編修疏陳養君德進人才開言路闢異端四事權璫黄賜母死翰林有欲往弔者音艴然曰翰林清要相率而拜内豎之門天下謂何厯官太常卿楊琅字朝重莆田人天順進士授御史威化初詔罷鎮守中官巳復求鎭琅抗疏切諌及羅倫謫官又言士氣不可沮抑被㫖切責琅居職敢言頗為時忌出為山東提學僉事鄭紀字廷綱仙遊人天順進士官檢討累遷太常少卿武宗在東官紀采帝王嘉言善行繪圖作贊名曰聖功圖以進厯南京户部尚書致仕卒黃仲昭名潛以字行莆田人成化進士授編修與章懋荘㫤同以直諌被杖謫官宏治𥘉起江西提學僉事誨士以正學乞休歸日事著述學者稱未軒先生所著有未軒集周瑛字梁石莆田人成化進士知廣德州宏治初為四川叅政進右布政使咸有善績尤勵清操其學以居敬為主嘗謂心存然後可以窮理學者稱翠渠先生周軫字公載瑛從子成化進士授戸部主事時因星變求直言軫言變由梁芳李孜省輩請誅之並請汰内豎罷方書親儒臣重臺諌杜僥倖數事不納出為山東運使林元甫字秉仁莆田人成化進士授工科給事中言事忤旨調外任巳復遷都給事中諫受土魯番獅子汪直王越謀起用諫止之因災異又陳七事皆切時政子有孚有年有祿有孚由進士官給事中嘉靖初鄧繼曾直言下獄總兵朱麟有罪被劾帝不問有孚抗章論之有年官御史武宗遣中官迎佛衛藏上疏切諫繫獄母死廬墓火至反風有祿官安慶同知宸濠反戮力固守有功衛藏舊作烏斯藏今改正林俊字待用莆田人成化進士除刑部主事進員外疏請斬妖僧繼曉並罪中貴梁芳下詔獄謫姚州判官尋復官進雲南按察使調湖廣引疾歸起南京右僉都御史督操江薦謝鐸儲瓘楊廉曹時中處士劉閔堪輔導皇儲江西民王武為盜命俊巡視悉擒賊黨宸濠貪暴俊屢裁抑之正德四年撫四川賊起大破之璽書奬勵尋致仕嘉靖初起工部尚書有大政侃侃陳論中外想望其丰采後乞致仕卒俊厯事四朝抗辭敢諫以禮進退始終一節隆慶初贈少保諡貞肅鄭瑗字仲璧莆田人成化進士為文章渾雄深粹詩有唐人風所著有蜩笑集宋端儀字孔時莆田人成化進士官禮部主事雲南缺提學官部議屬之偶為吏所洩端儀曰啟事未登已喧傳衆口人其謂我何力辭之進員外郎擢廣東提學僉事力祛積弊抑奔競時望鬱然子元瀚知朝陽縣有善政邑人祠祀之陳仁字子居莆田人成化進士宏治中官户部郎中闕里文廟災疏請修省陜西進古璽抗疏斥其偽正徳初劉瑾以贗銀事坐尚書韓文罪仁並調後遷南京兵部員外郎瑾誅累擢至浙江右布政使鄭寶字時珍莆田人成化舉人官鬰林州同知署北流縣事賊李通寶攻縣寶經畧庫藏案牘選卒間道䕶至州身率兵與戰陷堅被創死子圭馳救亦死焉事聞贈官張炫字德昭仙遊人成化舉人知博羅縣有聲以老歸結茅金石山著有金石遺音十卷方良永字夀卿莆田人宏治進士督逋兩廣峻郤饋遺擢廣東僉事瓊州賊符南蛇為亂會兵討平之正德初父喪除待銓闕下鴻臚導詣左順門叩頭畢令東向揖劉瑾良永竟岀瑾怒勒致仕瑾誅起湖廣副使遷山東右布政使調浙江左布政使尋乞休嘉靖中起巡撫應天推刑部尚書乞致仕未報卒諡簡肅良永侍父疾衣不解帶者三月居喪倚廬哀毁稱純孝焉弟良節官廣東布政使有治行子重杰舉於鄉以孝聞鄭岳字汝華莆田人宏治進士授刑部主事嘉靖初為大理卿帝數不豫岳請遵聖祖寡欲勤治之訓退朝即御文華裁決章奏日暮還宫以養壽命之源又陳刑獄失平八事遷兵部右侍郎轉左乞休歸陳茂烈字時周莆田人宏治進士奉使廣東受業陳獻章之門退作靜思錄入為監察御史𫀆服樸陋乘一疲馬彈劾一無所避以母老終養治畦汲水身自操作吏部以其貧奏給月米林俊謂其頴悟既深充養益熟隱衷粹行可對天地質鬼神黄憲之流也劉閔字子賢莆田人生而純慤絶意科舉求古聖禔躬訓家之法率而行之宏治中僉都御史林俊上言皇太子年踰幼學罕接外傅豫敎未備布衣劉閔恭慎純粹孝行高古日無二粥身無完衣處之晏如監司劉大夏徐貫知府王弼等恒禮敬之臣謂可禮致令布衣入侍必能涵育薫陶裨益睿質時不能用正徳元年遥授儒學訓導黄鞏字伯固莆田人宏治進士正德中由德安推官厯武選郎中南巡詔下本江彬誘惑鞏請誅彬不可上疏切諫下詔獄復跪午門五日廷杖斥為民既歸潛心著述日中未㸑晏如也嘉靖初召為南京大理丞卒贈大理少卿天啟初追諡忠𥙿馬思聰字懋聞莆田人宏治進士厯南京户部主事督糧江西宸濠反被執不屈絶食六日死贈光祿少卿林大輅字以乘莆田人正德進士宫工部員外郎武宗南巡黄鞏以諌下詔獄大輅與同官蔣山卿何遵疏救帝怒廷杖百尋外謫妻黄氏被誣以咒詛並逮入獄廷鞫備極慘毒後得免嘉靖時大輅官至巡撫湖廣副都御史所著有槐瘖集張曰韜字席珍莆田人正德進士授常州推官嘉靖初召為御史席耆以中㫖拜尚書曰韜抗疏力爭後抗論大禮既受杖猶占䟽劾姦人陳洸罪未幾竟死隆慶初追贈光祿少卿鄭一鵬字九萬莆田人正德進士改庶吉士嘉靖初官户科左給事中一鵬性伉直居諫垣中最敢言武定侯郭勛欲得虎賁左衛以廣其第一鵬劾以驕縱罔上勛甚銜之復以李福達獄劾勛因坐以妄奏拷掠除名卒隆慶初贈光祿少卿戴大賓字寅仲莆田人正德戊辰進士第三授編修劉瑾兄女有才姿欲室之為飾邸舍大賓佯狂得免馬明衡字子莘思聰子正德進士授太常博士嘉靖初為御史甫句日昭聖皇太后生辰有㫖免命婦朝賀明衡與同官朱淛疏諫並得罪同縣林應驄明衡同年進士官户部員外郎以疏救淛明衡謫聞喜縣丞代其長朝覲疏陳時事多議行朱淛字必東莆田人嘉靖進士授御史甫閱月疏諌免賀皇太后生辰帝怒欲殺之閣臣蔣冕為請乃杖八子除名淛為人長者鄉里利病必與有司言家居三十餘年卒隆慶初贈光祿少卿柯維騏字奇純莆田人嘉靖進士授南京户部主事未赴引疾歸專志讀書門下四百餘人維騏作左右二銘講義問答等篇訓學者以務實合宋遼金三史為一義例嚴整名曰宋史新編所作詩文集並行於世維騏家困甚終不妄取世味無所嗜隆慶初廷臣復薦授承德郎致仕鄒守愚字君哲莆田人嘉靖進士厯廣州知府有能名議征安南擢守愚為副使乃上便宜五事親提兵入亷州先聲大震㑹憂去起補江西轉湖廣叅政禦苗賑饑有功入為戸部侍郎賑卹陜西河南以勞卒贈右都御史諡襄惠郭應聘字君賓莆田人嘉靖進士授户部主事以不附嚴嵩出為南寕知府用治行第一擢威茂兵備副使累遷廣西布政使所至有擊賊功巡撫廣西討平府江及懷逺諸猺進總督兩廣厯遷南京兵部尚書與海瑞躬行儉素南都士大夫侈汰之習爲之一變卒贈太子少保諡襄靖林潤字若雨莆田人嘉靖進士授臨川知縣以事之永豐寇猝至計卻之徵授南京御史首論祭酒沈坤擅殺人置之理伊王典楧不道復糾之嚴世蕃戍雷州不赴羅龍文戍潯州逃還徽州潤按視江防馳疏乞正刑章詔潤逮捕遂㐲誅隆慶元年巡撫應天多惠政居三年卒潤鄉郡興化陷倭特疏請蠲復賑卹鄉人德之喪歸遮道四十里爲位祭哭凡三日陳經邦字公望莆田人嘉靖進士授編修神宗在東宮經邦侍講讀即位復充經筵毎進講音吐洪亮上改容聽之張居正奪情朝臣皆希㫖疏留經邦獨否以此銜之居正卒始擢禮部侍郎進尚書尋乞歸卒陳雄仙遊人母病卧榻旁九年山寇至欲刄其丹請以身代賊兩釋焉林兆珂字孟鳴莆田人萬厯進士官刑部郎厯知廉州安慶乞歸著有宙合多識二編戴士衡字章尹莆田人萬厯進士厯吏科給事中屢有建白皆禆時政後以力爭國本謫戍天啟中贈太僕少卿黄諫卿字箴伯莆田人萬厯舉人崇禎間官四川兵備張獻忠陷蜀諫卿獨至瀘州遇賊抗節不屈死僕鄭奇等五人亦從死贈太僕卿一年本朝乾隆四十賜諡烈愍朱繼祚莆田人萬厯進士授編修崇禎初厯官南京禮部尚書唐王時召為東閣大學士王敗繼祚舉兵應魯王攻取興化大兵至繼祚死之本朝乾隆四十一年賜諡忠節同邑給事中林嵋字小眉由進士為吳江知縣蘇州失歸從唐王至是自縊死本朝乾隆四十一年賜諡節愍曾楚卿字元贊莆田人萬厯進士授檢討天啟初官南京禮部侍郎宦寺擅政楚卿以為憂累疏言之巨璫矯㫖以張鼐謗議朝政連及楚卿并削職歸崇禎初起侍郎進尚書乞林卒鄭瑞星字廷奎仙遊人萬厯進士知信陽州改調崖州州峒蠻久為民患瑞星恩威並用遂歸化州賴以安擢刑部員外左遷贛郡通判郡長淮之廟灣盜藪也瑞星築壕擒賊首陳注華等自是商舶無虞性嗜學雖莅事亦以文史自隨尋以養歸王家彦字開美莆田人天啟進士官刑科給事中崇禎初疏陳太僕種馬徵銀之弊累遷户部分侍郎都城被兵命協理戎政寢處城樓者半載十七年賊逼京師分守安定門城陷自縊死贈兵部尚書諡忠端本朝順治𥘉賜諡忠毅林衍培字仲卿莆田人崇禎已卯以貢入雍值遴選雍貢准舉人用授江西興國知縣毎讞獄片言斷折時土寇躪吉贛興國為贛門户衍培選内外壯丁以忠義激發之訓練精鋭屢挫賊鋒邑恃以無恐當事重其才薦授職方主事仍管縣事賊不敢犯擢為監軍僉事以母年老堅請歸養屢徵不起林不息字司䈁莆田人崇禎中以貢生知臨湘縣張獻忠既破武昌所過望風走不息獨誓死守獻忠以百騎來偵不息獲二十七騎尸之城上賊悉衆來攻城陷被執斷手割耳鼻罵不絶聲死本朝乾隆四十一年賜諡烈愍林佳鼎字漢宗莆田人崇禎進士厯官廣東提學副使公慎自矢凛若神明明亡蹈海死本朝乾隆四十一年賜諡節愍同邑舉人林尊賓闖賊陷京師死之本朝乾隆四十一年祀忠義祠黃斌卿字明輔莆田人崇禎中以功累遷浙江副總兵駐防舟山招撫賊船百餘艘降其魁陳虎威名益著甲申聞變率舟師入援爲馬士英阮大鋮所沮浮海歸死於舟山同邑曾英爲十三崖都司張獻忠餘賊詭降軍亂中矢躍入江中死本朝乾隆四十一年俱賜諡節愍林蘭友字翰菳仙遊人崇禎進士知臨桂縣時宗藩有謀奪嫡者蘭友曉以禍福刑其罪首藩嗣以定擢南京御史疏劾大學士張至發薛國觀楊嗣昌吏部尚書田惟嘉等與何楷黄道周劉同升趙士春稱長安五諫本朝林煇章字繼袞莆田人順治中授平樂府推官擢守鞏昌加意拊循蠲除積逋以勞卒於官張松齡宇鶴生莆田人順治進士選庶吉士擢給事中奉命清刑獄疏錢法轉四川叅議以裁缺歸耿逆變作逼受逆職不從被囚數月終不屈卒劉從龍字孟乾莆田人順治舉人知遂安縣耿逆寇遂安從龍率民兵登陴固守賊帥數以書招之從龍函其書併所獲逆黨上之督撫有堅守孤城誓死無二之語總督李之芳疏聞得㫖劉從龍三首逆書忠貞可嘉俟事平日以員外郎用會病歸卒彭鵬字奮斯莆田人順治舉人康熙甲寅耿逆變作逼脅受職堅卧不起逆平授三河知縣以廉能第一擢工科給事中關中旱蝗鵬陳顛連狀詔發米賑之居言路歲餘彈劾無所避後巡撫粵東卒賜祭葬王鳳九字而軒莆田人順治舉人知涉縣捐築水隄忤上官劾歸時耿逆蓄異志拘鳳九餌以好官不為屈得閒逃歸耿敗家居著書三十年晩尤究心理數性命天文地理之學於漢宋儒外多所發明著有霞菴文集四卷吳名煌字繩朱仙遊人母董氏有賢德善訓課名煌舉順治間鄉試授廣平府推官治獄多所平反曲周盜賺城劫獄有司捕未獲以良民抵名煌反覆辨訊屢拂上官意不稍屈卒為之白以裁缺歸劉渭龍字載公莆田人康熙舉人耿逆為亂欲招致之屢加逼脅渭龍翦髮匿深山露眠草食幾浹旬死雍正三年祀忠孝祠吳英字為高莆田人康熙中海寇煽亂從征金門厦門授都司耿逆叛率師收復温台處州諸縣鄭經四出攻畧英分兵三路克之洊升同安鎮總兵從施琅進取臺澎入覲奏臺灣設兵八千請半為鎮守半為屯種則兵有恒産而饟可省半厯福建水師提督加授威畧將軍存問卒於官贈太子少保御製七言詩賜祭葬朱天貴莆田人康熙中授平陽鎮總兵從征臺灣攻克澎湖奮勇追擊斬獲無算會中礮死詔贈太子少保諡忠壯祀昭忠祠陳維屏字選士莆田人康熙中率兵千餘扼泉南以克東石功授興化鎮左營守備與吳英收復澎湖功加左都督遷寕夏遊擊三十五年從征噶爾丹屯守翁錦策應糧餉大師凱旋翁錦未奉撤囘至九月始令班師敵以數萬衆追之維屏率所部千餘騎死戰被重創卒事聞賜祭葬廕一子守備噶爾丹舊作噶呾翁錦舊作甕金今並改正聶國翰莆田人康熙中由臺灣把總以功厯官遊擊遷象山副將施粥賑饑兵民德之進金門鎮總兵調南澳屢值歲歉捐貲賑濟全活無算卒於官詔贈都督僉事祀忠義祠施而寛字容臣仙遊人康熙中委署同安守備值王師南征海寇而寛率偏師進勦復海擅平海湄洲直抵金厦兩島奉檄從攻澎湖克臺灣功加左都督累遷虎門副將㑹洋盗騷擾而寛單騎往撫平之遷狼山鎮總兵絶規例甄將材立義塾瘞遺骼士民感其德爲建祠立碑卒於官贈太子少保賜祭葬程震元字清士仙遊人康熙舉人知新田縣新田故巖邑俗悍民困𥘉下車即禁雜派革行户除值日絶餽送民愛戴之時苗民梗化加意撫綏邑賴以安擢刑部主事邑人立去思碑朱孟愷仙遊人事父以孝聞父每讌集孟愷必詣酒所露立門外以俟扶歸海寇陷仙遊舁父逃山中道遇寇將殺其父請以身代寇感其孝釋之叔死於寇遺骸莫辨孟愷淋指血認歸父殁廬墓三年雍正四年旌陳克明時田人嘉慶十八年以孝旌流寓唐孔仲良曲阜人貞元中官莆田今因家涵江歐陽詹晉江人未第時與林藴等讀書於莆田之南山靈巖精舎又有别墅在福平山下卒葬於靈巖浮屠之隂後裔遂居莆焉宋趙鼎聞喜人秦檜忌其復用諷王次翁論其嘗受偽命乾没都督府錢十七萬緡謫官居興化軍林亦之福清人謁林光朝於紅泉師之三十餘年遂爲高弟光朝卒亦之嗣居講席亦之卒其門人陳藻復繼之後藻門人林希逸即城山立祠以祀光朝及亦之藻并刻其遺文爲三先生集列女唐江梅妃莆田人開元中選爲妃會楊太真入侍作樓東賦以寓意明皇嘗封珍珠一斛賜妃妃不受以詩付使者曰桂葉雙眉久不描殘妝和淚汚紅綃長門自是無梳洗何必明珠慰寂寥明皇覽詩惻然令樂工度爲新聲號一斛珠及安祿山犯闕妃守節不屈死宋蔡高妻程氏莆田人高爲太康主簿卒官民以錢百二十千爲賻程泣曰吾家世爲亷吏不可以此汚吾夫卻不受鄭如理聘妻伊氏莆田人未嫁夫亡伊服喪三年畢自縊殉之林坊妻薛氏莆田人坊死薛年十八父母議嫁之薛漆身爲癩以自堅其志陳文龍母林氏詩田人文龍爲元人械繫送杭餓死母繫福州尼寺中病甚無醫藥左右視之泣下母曰吾與吾兒同死又何恨亦死衆歎口有斯母宜有斯兒為收葬之陳用虎妻朱氏用虎文龍弟文龍被執其母以繫卒朱亦自縊死明蔡本澄妻戴氏名清莆田人歸本澄年甫十四居二年本澄以世籍戍遼東戴父與約曰遼左天未五年不歸吾女當改嫁矣至期父語清如約清泣不從獨居十五年本澄歸而病殁清哀毁幾絶父潛受吳公瑞聘清聞之曰人呼女蔡本澄婦又云吳耶公瑞訟之官官判令守節表曰寡婦清之門時同邑歐茂仁妻胡氏守節嚴若内外重之俞某妻徐氏字徳英莆田人善屬文早寡女紅外未嘗釋卷所著有建文紀孟母贊方某聘妻林氏字貞一莆田人年十三許字方氏子未婚而方逺戍尋卒貞一為服喪三年守節終身許有容聘妻陳氏名冰娘莆田人年十八未婚夫死以烈殉同邑朱紀聘妻翁氏林嘉猷聘妻鄭一娘卓爾植聘妻何氏舒郎聘妻陳若瑛俱未婚殉節朱朝勲妻陳氏莆田人夫病刲股籲天請代及卒視殮畢自縊同邑朱雲衢妻陳氏魏雲章妻林氏陳端妻黄氏顧大名妻林氏吳鴻猷妻莫氏唐端位妻張氏陳伯瑜妻林氏俱夫死殉節詹秉直妻黄氏莆田人嘉靖間倭寇猝至與姑同被獲賊索姑金帛箠撻慘酷黄號哭願以身代賊殺其姑黄厲聲哭罵奪其刀自殺事聞旌表同邑黄河妻陳氏城陷賊執河以索鏹陳遍貸無所得乃詣賊圍告賊曰必放夫岀鏹乃可得逾旬河不至賊以為紿巳割其乳立斃林廷準妻黄氏莆田人廷準祖母王遇賊欲刃之廷準曰祖母守節願殺吾賊殺準而釋王氏黄氏聞夫死不食死準弟廷溉亦為賊所殺婦鄭氏𬒳繫自投白馬潭中同邑陳準妻邱氏王待魁女王二娘李塗妻陳氏雍士憲妻林氏鄭日新妾蕭翠鬟水關旁女釘壁女子二丱女邱氏女劉氏二女俱遇寇抗節死北門嫗莆田人賊殺其姑抱哭同死林承芳妻鄭氏莆田人遇賊憤罵賊怒割其左耳罵益厲復割其右耳又罵賊割其鼻逐之時夫死室燬乃歸父母家與弟拾野菜取松毛以自給又後村婦人失其姓氏容色甚盛遇賊請受刃賊不忍殺置之房乃自垢其面請死益切復以火燬面皮決之賊舍之槐樹女子賊入莆田與父同執賊欲執其父取金贖女曰吾女流無能為也可放吾父賊出其父女知父貧無所取金遂代父死方孝女莆田人父瀾官凉師卒女年十四偕叔扶櫬南歸渡揚子江櫬舟覆女大哭赴水死經三日屍浮父櫬之旁同泊南岸嚴士貞聘妻薛氏仙遊人未婚而夫卒訃至欲奔喪父母難之翼日訣父母入門衰絰拜哭七日不食端坐自經死本朝魏煜妻黄氏莆田人㓜時母嬰危病䖍籲而應年十六歸煜翁病篤刲股調羹以進亦愈煜卒黃年二十四苦節以終吳公拔妻陳氏莆田人早寡順治中海寇至姑被擒陳挺身救姑姑得脱而巳被留寇逼之引頸受刃死同邑林國鼎女陳開妻林氏吳誠聘妻趙氏謝某聘妻湯氏俱寇變不辱死葉如橓妻吳氏仙遊人與林茂烈妻陳氏俱寇變不辱死又同邑何琮妻陳氏屠玉珊妻林氏俱夫亡殉節鄭福聘妻周氏莆田人年十七許字鄭福福於康熙癸亥從攻澎湖墮海死周奔夫家守節事姑以女紅供甘㫖二十年如一日同邑邱陽仲聘妻黄氏歐元聘妻林氏郭尾聘妻楊氏連某聘妻戴氏陳麟聘妻俞氏俱未婚守節蕭傑妻陳氏莆田人夫病剖肝和藥以進立愈明年又病復剖肝不效遂自縊同邑張誨妻鄒氏邱晉仲妻陳氏林興妻周氏林翼生妻張氏陳七欽妻李氏姚某妻范氏潘仁師妻吳氏潘舜光妻吳氏俱夫亡殉節鄭雪聘妻陳氏名義娘莆田人許字鄭雪雪漁人也没於海氏聞訃奔其門拜謁舅姑哭祭江滸歸而自縊同邑朱點聘妻黄來姊歐潛聘妻黄氏陳三郎聘妻劉氏侯某聘妻曾道娘王天麟聘妻黄氏林文恢聘妻趙氏曾申聘妻鄭氏曾科聘妻林涵姐林普聘妻宋氏俱未婚殉節林榮署妻陳氏仙遊人年十九夫死絶粒十日翁姑以雙老無依諭之遂忍死奉侍翁病篤刲股得痊姑病目以舌舐之目復明守節三十年陳元士妻黄氏仙遊人元士歿遺子一五齡一甫三月氏茹苦集蓼以養以教先是地多海氛氏奉姑避難艱危中忍飢哺姑糗糒以時進姑病目翳每晨䑛之目為重明人稱孝感鄭光春妻葉氏莆田人年二十三夫往雲南不返家貧翁姑俱老子文炳㓜姑患瘋癱七年氏操作持家課子讀書嗣為翁姑營窀穸四十八年中備嘗辛勤雍正年間旌後文炳娶吳氏合卺之日文炳以父客遊不忍成婚吳逡巡問故因勸其行且曰堂上事身任之文炳遂行比歸而吳已逝一門節孝鄉人重之陳昊伯妻林氏莆田人夫亡守節同邑朱如玉妻張氏生員黄嶠妻林氏林鳳慶妻余氏俱雍正年間旌林大韶妻辜氏莆田人夫亡守節同邑陳憲紀妻郭氏卓君墀妻張氏廩生黄斐妻喻氏貢生李樹本妻林氏鄭珩菴妻黄氏敎諭陳射斗妻李氏黄懋潤妻陳氏陳聖敏妻劉氏陳建中妻程氏葉萬璣妻林氏周潛妻林氏張懷寛妻陳氏鄭獻壽妻郭氏程學成妻朱氏陳元長妻黄氏陳元雲妻李氏陳元模妻林氏陳黃氏陳㓜蘭妻李氏顔啟芳妻陳氏顔旨妻陳氏陳十兒妻張氏黃廷若妻任氏黄聖美妻陳氏嚴宗妻蔡氏黄震甫妻陳氏吳堯煒妻林氏劉廣侯妻謝氏詹聖儉妻林氏朱孟嘗妻