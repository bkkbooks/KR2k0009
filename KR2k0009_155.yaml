body:
  text: 龍首橋在福清縣東南宋建明萬厯三十四年重建本朝康熙十年雍正五年修乾隆二十六年重修長五十五丈光賢橋在福清縣西南蒜嶺跨東溪之上本朝乾隆十六年修交溪橋在福清縣西宋宣和四年建跨交溪長四十丈爲梁二十後又改名登龍通仙橋在連江縣東安每嶺之西一名仙安橋宋嘉定十六年建本朝乾隆三十六年修又鼓樓巷橋在學宫陳祠前初甚狹亦於是年拓修通濟橋在連江縣南跨鼇江累石為梁凡一十六間長五十六丈有奇俗呼為江南橋宋政和中建本朝康熙雍正乾隆年間屢修嘉慶六年重修安利橋在連江縣西南宋建為梁十九長六十五丈初名惠政橋後改又名潘渡橋迎恩橋在連江縣西門外本朝康熙四十二年重建嘉慶六年修朱公橋在連江縣西北宋嘉祐三年建長二十一丈水門七本朝康熙𥘉修乾隆四十四年重修拱辰橋在連江縣北門外本朝康熙五十一年修嘉慶六年重修溪尾橋在連江縣北長十餘丈宋淳熙三年建本朝乾隆二十八年重建嘉慶二年修賢義橋在連江縣舊名塔橋長十七丈明萬厯四年修本朝雍正十三年乾隆二十六年嘉慶元年重修紅亭橋在連江縣本朝康熙八年建嘉慶七年修并建橋亭週溪橋在連江縣陀嶺本朝雍正五年修嘉慶九年重修傅溪橋在連江縣白鷺洋本朝康熙四十九年建嘉慶元年修又普利橋乾隆十三年建嘉慶元年修金橋在連江縣官嶺本朝乾隆三十三年建嘉慶九年修長興橋在羅源縣招賢里明嘉靖間建萬安橋在古田縣東跨東溪搆亭其上四十七間元建丁字橋在古田縣東北六十里地名重峯宋建二水合流一縱一横形如丁字故名玉帶橋在屏南縣南有王帶河故名龍津橋在閩清縣東宋建元至正十年重建覆以亭樟鎮橋在永福縣東大樟溪口大義渡在閩縣東南唐貞觀中州帥衛總持見其處商旅賓主有序因名三山志蔡襄知福州日自大義渡夾道植松達於泉漳人歌之日夾道松夾道松問誰栽之我蔡公行人六月不知暑千古萬古摇清風西峽渡在閩縣東南峽門風濤險惡元至正中置渡船兩岸有亭為行人憩息之所陽崎渡在侯官縣西南波流最險元鄭潛造舟濟之有石刻曰鄭公渡又澤苗渡一名白苗渡亦潛所置隄堰海隄在閩縣新唐書志在閩縣東五里太和二年令李茸築先是每六月潮水鹹鹵禾苗多死隄成瀦水植稻其地三百户皆為良田西湖隄在侯官縣府志在府西南三里因湖八里有餘為隄一千三百六十二丈有竒乾隆十三年總督喀爾吉善巡撫潘思榘興工疏濬為隄長樂海隄在長樂縣新唐書志在長樂縣東十里太和七年令李茸築立十斗門以禦潮旱則瀦水雨則洩水遂成良田棉亭洋隄在福清縣西南自雙髻山至鷓鴣峯下宋祥符元年僧惟真截溪十八派築隄八百十丈溉田四十餘頃又白麟蟹嶼二洋皆在逕江金山邊長千餘丈淋汶堰在侯官縣西長二百餘丈明萬厯間築本朝康熙五十九年溪漲衝決雍正六年修洋塘在長樂縣東長一千二百丈以蓄清禦鹹大為民利又有西洋塘長九百五十丈舊志二塘即今所謂白芒坑也相近又有崔塘西抵海垾長一千一百二十丈閭山塘在長樂縣東一名旅山塘長三十餘歩明洪武中典史黃本築瀦陳塘港水以溉田又海路塘長一千五百餘丈東至小嶼山南至沙京斗門宋時築以障海潮明初修普塘在長樂縣東南長一千五百丈隄長三萬餘丈明宏治十二年知縣王渙修大塘在長樂縣西南長三千七百丈從二斗門達海旱則瀦潦則洩又縣南有丁塘長七百丈前曽塘長二百丈瑞雲陂在侯官縣保安里長一百十丈闊三尺深二尺祥符陂在福清縣東南一名石塘陂長五里宋祥符中知縣郎簡築元符陂在福清縣西南唐天寳間築名天寶陂宋祥符中修元符中知縣莊柔正鎔銅汁以固其基名元符陂圳長七百餘丈蘇溪陂在福清縣西南宋天聖中築溉田千餘頃派别為蓮塘十六頃賢良陂在閩清縣西南舊志宋陳暘拜石得泉獲灌溉之利暘嘗應賢良科故名南莊潭壩在羅源縣西南半里引羅川水溉田二千餘畝又蔣坑壩在縣西北半里引水溉縣北田百餘頃陵墓漢閩越王郢墓在閩縣東遂勝里閩越王無諸墓在閩縣南二里嘉崇里祖廟亭後有廟在南臺山東越王餘善墓在侯官縣西舊懷安縣靈碁里大妃小妃墓在永福縣寰宇記在永福縣東南五十里昔越王葬二妃於此鑄鐵蓋以掩之唐陳巖墓在侯官縣北通志在府城北關外太平里歲久湮没本朝康熙四十三年土人掘地得叅軍黄璞所撰巖墓銘石移置府學中五十年里人修復巖墓納銘於塜搆山亭其旁按五代史閩世家光啟二年福建觀察使陳巖表王潮泉州刺史景福元年巖卒其壻范暉自稱留後則巖之墓當在景福乾寕間也林慎思墓在長樂縣東十四都大墓山常袞墓在永福縣通志在永福縣葛嶺袞卒於官子遂宰永福卜居連江葬袞於此本朝雍正七年修五代閩王王審知墓在侯官縣北蓮花峯下通志明宣德四年為盜所發萬厯三十六年裔孫苑馬卿臨海王亮重修宋劉彝墓在閩縣東東山薯坑許將墓在閩縣東北湯門外澗田楊宏中墓在閩縣厚山林之奇墓在侯官縣西一都清泉山本朝雍正八年修李綱墓在侯官縣西北沙溪山黃幹墓在侯官縣北長箕山朱倬墓在侯官縣賢沙山黃洽墓在侯官縣靈光山趙以夫墓在長樂縣東十餘歩鄭性之墓在長樂縣南八都阮山高應松墓在長樂縣泉元里敖陶孫墓在福清縣東東臯山林公遇墓在福清縣西南清遠里翁陂山劉砥墓在福清縣西修仁里應乾寺後李彌遜墓在連江縣南新安里石門寺側劉礪墓在連江縣寶林寺東張磻墓在羅源縣西重下里鳳山寺後趙汝騰墓在古田縣西十二都半坑壠林用中墓在古田縣北屏山下鄭俠墓在閩清縣西南新豐